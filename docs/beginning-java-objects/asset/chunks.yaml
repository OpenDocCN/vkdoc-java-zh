  raw: '### Interpreting Exception Stack Traces


    As we saw previously, when an exception arises that we haven’t properly handled,
    a **stack trace**`—`that is, a report by the JVM of where things went wrong and
    how we got there`—`is displayed in the command window. Interpreting an exception
    stack trace is quite easy; let’s use a code example that would generate such a
    trace to illustrate how this is done.


    Please read the inline comments carefully in the following three-class example
    to see where a potential `NullPointerException` problem is lurking!


    ```

    public class Professor {

    // Our simplistic Professor class has only one attribute.

    private Student advisee;

    public void setAdvisee(Student s) {

    advisee = s;

    }

    public void printAdviseeInfo() {

    // A bit of delegation.

    advisee.print();

    }

    }

    // ---------------------------------

    public class Student {

    // Our Student class has only one attribute, and no way to set its value.

    // Thus, the name attribute of a Student will be initialized to the value

    // null, and will REMAIN null.

    private String name;

    public void print() {

    // Since the name attribute is guaranteed to be null here,

    // this line will generate a NullPointerException at run time.

    if (name.length() > 5) System.out.println(name);

    }

    }

    // ---------------------------------

    public class PSExample {

    public static void main(String[] args) {

    Student s = new Student();

    Professor p = new Professor();

    // Link the objects together.

    p.setAdvisee(s);

    // This next line of code will in turn invoke the print

    // method of p''s Student advisee, which as we saw above is

    // going to generate a NullPointerException at run time.

    p.printAdviseeInfo();

    }

    }

    ```


    When we run this program, we’d see the following stack trace:


    ```

    java PSExample

    Exception in thread "main" java.lang.NullPointerException

    at Student.print(Student.java:10)

    at Professor.printAdviseeInfo(Professor.java:11)

    at PSExample.main(PSExample.java:12)

    ```


    Reading the stack trace from top to bottom


    *   The actual `NullPointerException` arose on line 10 of the `Student` class:


    *   ***That*** line of code is within the body of the `print` method of the `Student`
    class, which was invoked from line 11 of the `Professor` class:


    ```

    if (name.length() > 5) System.out.println(name); // line 10 of Student

    ```


    *   And ***that*** line of code is within the body of the `printAdviseeInfo` method
    of the `Professor` class, which was in turn invoked from the `PSExample` class’s
    `main` method on line 12:


    ```

    advisee.print(); // line 11 of Professor

    ```


    ```

    p.printAdviseeInfo(); // line 12 of PSExample

    ```


    Whenever a stack trace arises from an exception, the ***first*** place we should
    look to diagnose and repair the problem is the line of code that is reported as
    the ***first*** item in the stack trace: line 10 of the `Student` class, in this
    particular example. If in inspecting this line we cannot understand why the exception
    arises, we look to the second item in the stack trace, then the third, etc., until
    we have looked far enough back in the call history to determine why things went
    awry.


    ### The Exception Class Hierarchy


    As mentioned in passing earlier in the chapter, the generic `Exception` class,
    included in the `java.lang` package, is the superclass of all exception types
    in Java. As illustrated in Figure [13-24](#78624_3_En_13_Chapter.xhtml#Fig24)
    (taken from Oracle’s online Java documentation), there are ***many*** direct subclasses
    of the `Exception` class, and these continue to change with new versions of the
    Java language.


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig24_HTML.jpg)


    The screen displays the java dot lang dot object, all implemented interfaces,
    direct known subclasses list of 24 subclasses.


    Figure 13-24


    The `java.lang.Exception` class has **many** “offspring”!


    A `catch` clause for a given exception type *X* will catch that specific type
    of exception ***or any of its subtypes***, by virtue of the “is a” nature of inheritance.
    For this reason, it’s important to list `catch` clauses in most specific to least
    specific order after a `try` block; that is, from lowest-level subclass to superclass.
    Let’s use a specific example to illustrate why this is so.


    For our example, we’ll perform a database access operation (as pseudocode); operations
    against databases, including possible exceptions that result from such operations,
    are governed by classes belonging to the `java.sql` package. We’ll deal in this
    example with three types of successively more general exceptions:


    *   `DataTruncation` is the most specific type of exception that we’ll concern
    ourselves with in this example. As its name implies, a `DataTruncation` exception
    occurs if data that is being written to a database happens to get ***truncated***,
    as, for example, when a particularly long `String` value is written to a database
    field that can only accommodate 255 characters.


    *   `DataTruncation` exceptions are a special case/subtype of the more general
    `SQLWarning` exception type. `SQLWarning` exceptions are thrown whenever any sort
    of database access problem occurs that, while not fatal, is significant enough
    to warrant alerting an application about.


    *   `SQLWarning` exceptions, in turn, are a special case/subclass of the more
    general `SQLException` class of exceptions. `SQLException`s are thrown when anything
    at all of concern arises in the course of interacting with a database, ranging
    from attempting to log on using an invalid password to trying to access a nonexistent
    table to attempting to submit a poorly formed SQL query.


    *   Finally, `SQLException` is a direct subclass of the generic `Exception` class.


    This inheritance “lineage” is illustrated in Figure [13-25](#78624_3_En_13_Chapter.xhtml#Fig25).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig25_HTML.jpg)


    The screen displays java dot S Q L, class data truncation, with 6 classes, java
    dot S Q L dot data truncation.


    Figure 13-25


    The inheritance “lineage” of the `java.sql.DataTruncation` exception type


    The following code snippet presents one way for us to write the `try`/`catch`
    code for handling `DataTruncation` (and other sorts of database-related) exceptions;
    note that we’d need to include the appropriate `import` directive(s) to either
    import all of the `java.sql` classes or just those that we’re referencing in our
    code:


    ```

    try {

    // Pseudocode.

    attempt to write data to a database

    }

    catch (DataTruncation e1) {

    // Catch the most specific exception type first;

    // details omitted ...

    }

    catch (SQLWarning e2) {

    // ... then, the next most specific ...

    // Details omitted.

    }

    catch (SQLException e3) {

    // ... working our way up to the most general.

    // Details omitted.

    }

    ```


    Since a `DataTruncation` exception is a type of `SQLException` by virtue of inheritance,
    we could alternatively choose to write this code with a ***single*** `catch` clause,
    as follows:


    ```

    try {

    // Pseudocode.

    database access operation ...

    }

    catch (SQLException e) {

    // This will catch DataTruncation exceptions along with

    // all other (sub)types of SQLException.

    // Details omitted.

    }

    ```'
