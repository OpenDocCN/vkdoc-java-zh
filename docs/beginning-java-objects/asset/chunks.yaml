    ## 识别属性


    为了确定每个领域类应具有哪些属性，我们需要再次仔细阅读需求规格说明书，从中寻找线索。在之前从候选类列表中剔除部分名词/名词短语时，我们已经偶然发现了一些属性：


    *   对于`Section`类，我们识别出“星期几”、“教室”、“座位容量”、“学期”和“时间段”作为属性。

    *   对于`Student`类，我们识别出“学位”作为属性。


    在为类分配属性时，我们还可以运用任何关于该领域的先验知识。例如，根据我们对大学运作方式的了解，可以推断所有学生都需要某种学号作为属性，即使这在 SRS 规格说明书中并未提及。这是一个需要返回向最终用户确认的细节。


    最后，我们还可以研究现有遗留系统中类似信息的表示方式，以此作为确定类属性的线索。例如，如果大学中已存在一个基于关系数据库设计的学生计费系统，我们可能希望研究存储学生信息的关系数据库表结构。该表中已有的列——如姓名、地址、出生日期等——都是潜在的属性选择。


    ## UML 表示法：对抽象概念的静态方面建模


    现在，我们对模型的静态方面有了更深入的理解，可以准备以图形方式呈现这些内容，以补充我们为 SRS 编写的叙述性文档。我们将使用 UML 来生成**类图**。以下是模型各方面应如何表示的规则。


    ### 类、属性和操作


    我们将类表示为矩形。当我们首次构思一个类时——在知道其任何属性或方法之前——只需将类名放入矩形中，如图 10-5 所示。


    ![](img/78624_3_En_10_Fig5_HTML.png)


    一个标有“学生”的矩形块被另一个深色阴影的矩形块包围。


    图 10-5


    `Student`类的 UML 表示


    ***抽象***类通过将类名以斜体呈现来表示，如图 10-6 所示。


    ![](img/78624_3_En_10_Fig6_HTML.png)


    一个标有“人”的矩形块被另一个深色阴影的矩形块包围。


    图 10-6


    抽象类的 UML 表示


    当我们需要反映类的属性和行为时，我们将类矩形划分为三个**隔间**——类名隔间、属性隔间和操作隔间——如图 10-7 所示。注意，UML 倾向于使用“操作”而非“方法”的术语，以强调该图旨在独立于编程语言。


    ![](img/78624_3_En_10_Fig7_HTML.png)


    一个矩形块分为三个部分，每部分包含一组文本。从上到下依次为：类名、属性隔间和操作隔间。


    图 10-7


    类矩形被划分为三个隔间


    某些 CASE 工具在首次创建类时，会自动显示所有三个（空的）隔间，即使我们尚未指定任何属性或操作，如图 10-8 所示。


    ![](img/78624_3_En_10_Fig8_HTML.png)


    一个矩形块被分为三个部分，顶部标有“学生”。


    图 10-8


    某些 CASE 工具呈现的另一种 UML 类表示


    当我们开始确定特定类需要哪些属性和/或操作时，我们可以根据需要以或多或少的细节将这些内容添加到图中。


    我们可以选择仅列出属性名称（见图 10-9），或者指定其名称及类型（见图 10-10）。


    ![](img/78624_3_En_10_Fig10_HTML.png)


    一个矩形块水平分为三个部分。顶部标有“学生”，中间部分提供了姓名、SSN、出生日期和 GPA 的数据类型。底部部分为空白。


    图 10-10


    有时同时显示属性名称和类型


    ![](img/78624_3_En_10_Fig9_HTML.png)


    一个矩形块水平分为三个部分。顶部标有“学生”，中间部分提供了姓名、SSN、出生日期和 GPA 的数据类型。底部部分为空白。


    图 10-9


    有时仅显示属性名称


    我们甚至可能希望为属性指定初始值，例如`gpa : double = 0.0`，尽管这不太常见。


    静态属性通过在其名称下加下划线来标识（见图 10-11）。


    ![](img/78624_3_En_10_Fig11_HTML.png)


    一个矩形块水平分为三个部分。顶部标有“学生”，中间部分包含“总学生数”、“姓名”、“SSN”和“出生日期”。底部部分为空白。


    图 10-11


    通过下划线标识静态属性


    我们可以选择仅在类矩形的操作隔间中列出操作名称，如图 10-12 所示，或者也可以选择使用扩展形式的操作定义，如图 10-13 中为`registerForCourse`操作所做的那样。


    ![](img/78624_3_En_10_Fig13_HTML.png)

