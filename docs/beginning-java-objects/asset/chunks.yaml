- fmt: "### An Interesting Twist on Polymorphism\n\nLet’s now explore an interesting\
    \ polymorphic phenomenon specific to abstract classes: it’s possible for a ***concrete***\
    \ method in an abstract class to invoke an ***abstract*** method in the ***same***\
    \ class. This is illustrated in the following code, where the concrete `initializeCourse`\
    \ method invokes the abstract `establishCourseSchedule` method:\n\n```\npublic\
    \ abstract class Course {\n// Details omitted.\n// An abstract method ...\npublic\
    \ abstract void establishCourseSchedule(String startDate,\nString endDate);\n\
    // ... and a concretely implemented method that INVOKES the\n// abstract method.\n\
    public void initializeCourse(Professor p, String s, String e) {\n// We assume\
    \ that both assignInstructor and reserveClassroom are\n// implemented methods\
    \ of the Course class ... details omitted.\nassignInstructor(p);\nreserveClassroom();\n\
    // Here, we're invoking an abstract method -- HOW IS THIS POSSIBLE???\nestablishCourseSchedule(s,\
    \ e);\n}\n}\n```\n\n***How can this be possible***? That is, how will we ever\
    \ be able to invoke the `initializeCourse` method if there is no ***body*** defined\
    \ for the `establishCourseSchedule` method upon which `initializeCourse` depends?\
    \ The fact of the matter is that the compiler will never let us get into this\
    \ predicament, for the following reasons:\n\n- First of all, recall that it’s\
    \ impossible to invoke `initializeCourse` on a `Course` object specifically because\
    \ we cannot ***instantiate*** a `Course` object in the first place—`Course` is\
    \ abstract!\n\n- Then, for any class ***derived*** from `Course` (e.g., `LectureCourse`),\
    \ one of two sets of circumstances will be true:\n    - `LectureCourse` will provide\
    \ implementations of ***all*** abstract methods that it has inherited—`establishCourseSchedule`\
    \ included—such that, at run time, there will be no ambiguity as to what the `initializeCourse`\
    \ method is to do behind the scenes:\n\n        ```\n        LectureCourse l =\
    \ new LectureCourse();\n        // This next line of code is perfectly fine, because\
    \ behind the\n        // scenes, initializeCourse will invoke the establishCourseSchedule\n\
    \        // method that LectureCourse has implemented.\n        l.initializeCourse(p,\
    \ s, e);\n        ```\n\n    - Alternatively, if `LectureCourse` ***doesn’t***\
    \ implement `establishCourseSchedule`, then `LectureCourse` will by definition\
    \ be an abstract class, such that we won’t be able to instantiate a `LectureCourse`\
    \ object in the first place:\n\n        ```\n        // Now THIS line of code\
    \ won't compile, because LectureCourse is abstract ...\n        LectureCourse\
    \ l = new LectureCourse();\n        // ... and so we'll never reach this ambiguous\
    \ situation at run time!\n        l.initializeCourse(p, s, e);\n        ```\n\n\
    We thus see that implementing a method X that in turn relies on an ***abstract***\
    \ method Y is a “safe” thing to do, because by the time we’re ever able to ***invoke***\
    \ method X on an object, the fact that the object exists means that all of its\
    \ methods (including Y) have been implemented. Thus, in writing X, we can count\
    \ on the ***future*** availability of a method Y that hasn’t been implemented\
    \ yet.\n\n## Interfaces\n\nRecall that a class is an abstraction of a real-world\
    \ object from which some of the unessential details have been omitted. We can\
    \ therefore see that an ***abstract*** class is ***more*** abstract than a ***concrete***\
    \ class, because with an abstract class we’ve omitted the details for how one\
    \ or more particular services are to be performed.\n\nNow, let’s take the notion\
    \ of abstractness one step further. With an abstract class, we are able to avoid\
    \ programming the bodies of methods that are declared to be abstract. But what\
    \ about the ***data structure*** of such a class? In our abstract `Course` class\
    \ example, we went ahead and prescribed the attributes that we thought would be\
    \ needed generically by all types of courses, so that a common data structure\
    \ would be inherited by all subclasses:\n\n```\nprivate String courseName;\nprivate\
    \ String courseNumber;\nprivate int creditValue;\nprivate ArrayList enrolledStudents;\n\
    private Professor instructor;\n```\n\nSuppose we only wanted to specify common\
    \ ***behaviors*** of `Course`s and not even ***bother*** with declaring attributes.\
    \ Attributes are, after all, typically declared to be private; we may not wish\
    \ to mandate the private data structure that a subclass must use in order to achieve\
    \ the desired public behaviors, instead leaving it up to the designer of the subclass\
    \ to ultimately make this determination.\n\nAs an example, say that we wanted\
    \ to define what it means to teach at a university. Perhaps, in order to teach,\
    \ an object would need to be able to perform the following services:\n\n- Agree\
    \ to teach a particular course.\n- Designate a textbook to be used for the course.\n\
    - Define a syllabus for the course.\n- Approve the enrollment of a particular\
    \ student in the course.\n\nEach of these behaviors could be formalized by specifying\
    \ a method header, representing how an object that is ***capable of teaching***\
    \ would be asked to perform each behavior:\n\n```\npublic boolean agreeToTeach(Course\
    \ c)\npublic void designateTextbook(TextBook b, Course c)\npublic Syllabus defineSyllabus(Course\
    \ c)\npublic boolean approveEnrollment(Student s, Course c)\n```\n\nWe could then\
    \ declare an `abstract` class called `Teacher` that prescribes no data structure\
    \ and only ***abstract*** methods:\n\n```\npublic abstract class Teacher {\n//\
    \ We omit attribute declarations entirely, allowing subclasses to establish\n\
    // their own class-specific data structures.\n// We declare only abstract methods.\n\
    public abstract boolean agreeToTeach(Course c);\npublic abstract void designateTextbook(TextBook\
    \ b, Course c);\npublic abstract Syllabus defineSyllabus(Course c);\npublic abstract\
    \ boolean approveEnrollment(Student s, Course c);\n}\n```\n\nWe then proceed to\
    \ create `Professor` as a concrete derivation of `Teacher`:\n\n```\npublic Professor\
    \ extends Teacher {\n// Declare relevant attributes.\nprivate String name;\nprivate\
    \ String employeeID;\nprivate ArrayList teachingAssignments; // of Section objects\n\
    // etc.\n// Provide concrete implementations of all inherited abstract methods.\n\
    public boolean agreeToTeach(Course c) { ... }\npublic void designateTextbook(TextBook\
    \ b, Course c) { ... }\npublic Syllabus defineSyllabus(Course c) { ... }\npublic\
    \ boolean approveEnrollment(Student s, Course c) { ... }\n// Additional methods\
    \ can also be declared - details omitted.\n}\n```\n\nHowever, if our intention\
    \ is to declare a set of abstract method headers to define what it means to assume\
    \ a certain ***role*** within an application (such as teaching) without imposing\
    \ either data structure or concrete behavior on the subclasses, then the preferred\
    \ way to do so in Java is with an **interface**.\n\nHere’s how we’d render the\
    \ abstract `Teacher` class with an equivalent interface:\n\n```\n// Note use of\
    \ \"interface\" vs. \"abstract class\" keywords.\npublic interface Teacher {\n\
    boolean agreeToTeach(Course c);\nvoid designateTextbook(TextBook b, Course c);\n\
    Syllabus defineSyllabus(Course c);\nboolean approveEnrollment(Student s, Course\
    \ c);\n}\n```\n\nHere are some observations about interface syntax:"
