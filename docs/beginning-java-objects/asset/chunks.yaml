- fmt: '# 排版后的内容


    教授很可能同时指导多名学生，因此像`studentAdvisee`这样只能引用单个`Student`对象的属性并不是特别有用。我们将在第[6](#78624_3_En_6_Chapter.xhtml)章讨论**集合**时介绍处理此问题的技术，我们还将看到集合对于定义`Professor`的`teachingAssignments`属性以及`Student`的`courseLoad`和`transcript`属性非常有用。


    `worksFor`属性表示教授所属的院系。我们可以选择将其表示为简单的`String`类型（例如"MATH"），也可以表示为维护`Department`对象句柄的引用变量——具体来说，就是代表"现实世界"中数学系的`Department`对象。当然，这样做需要我们定义一个新类`Department`的属性和方法。


    正如我们将在本书第2部分进一步讨论的那样，是否需要发明一个新的用户定义类型/类来表示特定的现实世界概念/抽象，这个决定并不总是明确的。


    ### 编译"技巧"："桩化"类


    如果我们想按前面所示的方式用Java编写`Student`和`Professor`类，那么这两个类都无法单独编译；也就是说，如果我们只编写`Student`类的代码：


    ```java

    // Student.java

    public class Student {

    // Attribute declarations typically appear first ...

    String name;

    String studentId;

    Date birthDate;

    String address;

    String major;

    double gpa;

    Professor advisor;

    // etc.

    }

    ```


    而尚未编写`Professor`类（`Professor.java`）的代码，我们会在`Student`上得到如下编译错误：


    ```

    Student.java: cannot find symbol

    symbol   : class Professor

    location : class Student

    Professor advisor;

    ^

    ```


    因为我们还没有向Java编译器定义"`Professor`"作为一种类型。


    我们可以等到同时编写完`Student`和`Professor`类后再尝试编译它们中的任何一个，但如果我们引入第三个类呢？


    ```java

    public class Student {

    String name;

    Professor advisor;

    Department major;

    // etc.

    }

    public class Professor {

    String name;

    Student advisee;

    Department worksFor;

    // etc.

    }

    public class Department {

    String name;

    Professor chairman;

    // etc.

    }

    ```


    或者第四个类、第五个类？我们必须**全部**编写完才能编译**其中任何一个**吗？


    幸运的是，我们可以使用**桩化**类的技术来临时解决编译类X时引用尚未编写的类Y的问题。回到我们最初编写的`Student`类：


    ```java

    // Student.java

    public class Student {

    // Attribute declarations typically appear first ...

    String name;

    // etc.

    Professor advisor;

    // etc.

    }

    ```


    我们可以临时编写一个"骨架"`Professor`类，如下所示：


    ```java

    // Professor.java

    // A "stub" class:  note that the body consists of a pair of empty braces!

    public class Professor { }

    ```


    尽管这个`Professor`类定义可能很简单，但Java编译器仍将其视为**合法的**类定义，编译后将生成`Professor.class`字节码文件。


    当我们现在尝试编译`Student.java`文件时，编译器会将"`Professor`"视为有效符号——具体来说，是一个用户定义类型的名称——并且`Student`也能正确编译。


    回想一下，我们可以使用单个命令同时编译`Student.java`和`Professor.java`（"桩"）文件：


    `javac *.java`


    也就是说，`Professor.java`不需要先单独编译。


    ### 组合


    每当我们创建一个类（如`Student`或`Professor`），其中有一个或多个属性本身是对其他对象的引用时，我们就在使用一种称为**组合**的面向对象技术。对象可以概念上相互嵌套的层数是无限的，因此组合使我们能够建模非常复杂的现实世界概念。事实证明，大多数"有趣的"类都使用了组合。


    使用组合时，从概念上看，我们似乎是在物理上将对象一个嵌套在另一个内部，如图[3-15](#78624_3_En_3_Chapter.xhtml#Fig15)所示。


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig15_HTML.png)


    *图3-15 概念上的对象"嵌套"*


    实际的对象嵌套（即在一个类内部声明另一个类）在许多面向对象编程语言中是可能的，并且有时确实有意义——也就是说，如果对象A从面向对象应用程序的角度来看不需要有自己的生命周期，并且它存在的唯一目的是为封闭对象B服务。


    *   例如，把你的大脑想象成一个只存在于你的身体（另一个对象）上下文中的对象。


    *   作为与SRS相关的对象嵌套示例，让我们考虑一个用于跟踪特定课程中学生成绩的成绩簿。如果我们定义一个`GradeBook`类，然后创建`GradeBook`对象作为属性——每个`Course`对象一个——那么每个`GradeBook`对象完全存在于其关联的`Course`对象的上下文中可能是合理的。没有其他对象需要直接与`GradeBook`通信；如果`Student`对象想向`Course`对象询问该`Student`获得了什么成绩，`Course`对象可能会在内部查询其嵌入的`GradeBook`对象，并简单地将一个字母成绩返回给`Student`。


    然而，我们经常遇到这样的情况——就像示例中的`Student`和`Professor`类一样——对象A需要引用对象B，对象B需要反向引用对象A，并且**两个**对象都需要能够独立于彼此响应应用程序整体发出的请求。在这种情况下，句柄就派上用场了！


    实际上，我们**并不是**将整个对象作为属性存储在其他对象内部；相反，我们存储的是对对象的**引用**。当对象A的属性被定义为对象引用B时，这两个对象在内存中独立存在，并且仅在需要交互时有一种便捷的方式找到对方。把你自己想象成一个对象，把你的手机号码想象成你的引用。其他人——"对象"——可以通过你的手机号码联系你，随时与你通话，即使他们不知道你的物理位置；反之，如果你有他们的手机号码，你也可以随时给他们打电话。


    使用句柄的内存分配在概念上可能类似于图[3-16](#78624_3_En_3_Chapter.xhtml#Fig16)。


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig16_HTML.jpg)


    *图3-16 对象在内存中独立存在并相互维护句柄*


    采用这种方法，每个对象只在内存中分配一次：


    *   `Student`对象通过其`advisor`属性/句柄/**引用**，知道如何在需要时找到其导师（`Professor`）对象并与之通信。


    *   `Professor`对象通过其`advisee`属性/句柄/**引用**，知道如何在需要时找到其指导学生（`Student`）对象并与之通信。


    你将在第[4](#78624_3_En_4_Chapter.xhtml)章学习如何在Java中实际编写这种对象间通信的代码。'
  raw: '*   It’s likely that a professor will be advising several students simultaneously,
    so having an attribute like `studentAdvisee` that can reference only a ***single***
    `Student` object is not terribly useful. We’ll discuss techniques for handling
    this in Chapter [6](#78624_3_En_6_Chapter.xhtml), when we discuss **collections**,
    which we’ll also see as being useful for defining the `teachingAssignments` attribute
    of `Professor` and the `courseLoad` and `transcript` attributes of `Student`.


    *   The `worksFor` attribute represents the department to which a professor is
    assigned. We can choose to represent this as either a simple `String` representing
    the department name, for example, “MATH”, or as a reference variable that maintains
    a handle on a `Department` object—specifically, the `Department` object representing
    the “real-world” Math Department. Of course, to do so would require us to define
    the attributes and methods for a new class called `Department`.


    As we’ll discuss further in Part 2 of this book, the decision of whether or not
    we need to invent a new user-defined type/class to represent a particular real-world
    concept/abstraction isn’t always clear-cut.


    ### A Compilation “Trick”: “Stubbing Out” Classes


    If we were to want to program the `Student` and `Professor` classes in Java as
    shown earlier, neither one could be compiled in isolation; that is, if we merely
    wrote the code for the `Student` class


    ```

    // Student.java

    public class Student {

    // Attribute declarations typically appear first ...

    String name;

    String studentId;

    Date birthDate;

    String address;

    String major;

    double gpa;

    Professor advisor;

    // etc.

    }

    ```


    without having yet written the code for the `Professor` class (`Professor.java`),
    we’d get a compilation error on `Student` as follows


    ```

    Student.java: cannot find symbol

    symbol   : class Professor

    location : class Student

    Professor advisor;

    ^

    ```


    because we haven’t yet defined “`Professor`” as a type to the Java compiler.


    We could wait until we’ve programmed both the `Student` and `Professor` classes
    before attempting to compile either one of them, but what if we were to introduce
    a third class into the mix


    ```

    public class Student {

    String name;

    Professor advisor;

    Department major;

    // etc.

    }

    public class Professor {

    String name;

    Student advisee;

    Department worksFor;

    // etc.

    }

    public class Department {

    String name;

    Professor chairman;

    // etc.

    }

    ```


    or a fourth class or a fifth? Must we program ***all*** of them before compiling
    any ***one*** of them?


    Fortunately, we can use the technique of **stubbing out** a class to temporarily
    work around issues related to compiling a class X that refers to a class Y, which
    we haven’t yet programmed. Going back to our `Student` class as originally written


    ```

    // Student.java

    public class Student {

    // Attribute declarations typically appear first ...

    String name;

    // etc.

    Professor advisor;

    // etc.

    }

    ```


    we can temporarily code a “bare-bones” `Professor` class as follows:


    ```

    // Professor.java

    // A "stub" class:  note that the body consists of a pair of empty braces!

    public class Professor { }

    ```


    Trivial as this `Professor` class definition may be, it is nonetheless considered
    to be a ***legitimate*** class definition by the Java compiler that, when compiled,
    will yield a `Professor.class` bytecode file.


    When we now attempt to compile our `Student.java` file, the compiler will indeed
    deem “`Professor`” to be a valid symbol—specifically, the name of a user-defined
    type—and `Student` will compile properly, as well.


    Recall that we can compile the `Student.java` and `Professor.java` (“stub”) files
    simultaneously with the single command


    `javac *.java`


    That is, `Professor.java` needn’t be compiled separately first.


    ### Composition


    Whenever we create a class, such as `Student` or `Professor`, in which one or
    more of the attributes are themselves references to other objects, we are employing
    an OO technique known as **composition**. The number of levels to which objects
    can be conceptually bundled inside one another is endless, and so composition
    enables us to model very sophisticated real-world concepts. As it turns out, most
    “interesting” classes employ composition.


    With composition, it may conceptually seem as though we’re physically nesting
    objects one inside the other, as depicted in Figure [3-15](#78624_3_En_3_Chapter.xhtml#Fig15).


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig15_HTML.png)


    An illustration of a cloud labeled student object A has a table inside. The table
    includes the name Joe Blow, student I D 12345 and an advisor with a cloud labeled
    professor object B.


    Figure 3-15


    Conceptual object “nesting”


    Actual object nesting (i.e., declaring one class inside of another) is possible
    in many OO programming languages, and it does indeed sometimes make sense—namely,
    if an object A doesn’t need to have a life of its own from the standpoint of an
    OO application and it exists only for the purpose of serving enclosing object
    B**.**


    *   Think of your brain, for example, as an object that exists only within the
    context of your body (another object).


    *   As an example of object nesting relevant to the SRS, let’s consider a grade
    book used to track student performance in a particular course. If we were to define
    a `GradeBook` class and then create `GradeBook` objects as attributes—one per
    `Course` object—then it might be reasonable for each `GradeBook` object to exist
    wholly within the context of its associated `Course` object. No other objects
    would need to communicate with the `GradeBook` directly; if a `Student` object
    wished to ask a `Course` object what grade the `Student` has earned, the `Course`
    object might internally consult its embedded `GradeBook` object and simply hand
    a letter grade back to the `Student`.


    However, we often encounter the situation—as with the sample `Student` and `Professor`
    classes—in which an object A needs to refer to an object B, object B needs to
    refer back to object A, and ***both*** objects need to be able to respond to requests
    independently of each other as made by the application as a whole. In such a case,
    handles come to the rescue!


    In reality, we are ***not*** storing whole objects as attributes inside of other
    objects; rather, we are storing ***references*** to objects. When an attribute
    of an object A is defined in terms of an object reference B, the two objects exist
    separately in memory and simply have a convenient way of finding one another whenever
    it’s necessary for them to interact. Think of yourself as an object and your cellular
    phone number as your reference. Other people—“objects”—can reach you via your
    cell phone number to speak with you whenever they need to, even though they don’t
    know where you’re physically located; and conversely, if you have their cell phone
    numbers, you can call them whenever you like.


    Memory allocation using handles might look something like Figure [3-16](#78624_3_En_3_Chapter.xhtml#Fig16)
    conceptually.


    ![](images/78624_3_En_3_Chapter/78624_3_En_3_Fig16_HTML.jpg)


    An illustration of two clouds labeled student object A and professor object B.
    Student object A includes the name Joe Blow, student I D 12345, and advisor. And
    professor object B includes the name Doctor Smith, an employee I D 987, and advisee.
    They are connected to each other.


    Figure 3-16


    Objects exist separately in memory and maintain handles on one another


    With this approach, each object is allocated in memory only once:


    *   The `Student` object knows how to find and communicate with its advisor (`Professor`)
    object whenever it needs to through its `advisor` attribute/handle/***reference***.


    *   The `Professor` object knows how to find and communicate with its advisee
    (`Student`) object whenever it needs to through its `advisee` attribute/handle/***reference***.


    You’ll learn how to actually code such object intercommunication in Java in Chapter
    [4](#78624_3_En_4_Chapter.xhtml).'
  trans: '

    *   教授很可能同时指导多名学生，因此像 `studentAdvisee` 这样只能引用***单个*** `Student` 对象的属性，其作用非常有限。我们将在第
    6 章讨论**集合**时介绍处理这种情况的技术，届时我们也会看到，集合对于定义 `Professor` 的 `teachingAssignments` 属性以及
    `Student` 的 `courseLoad` 和 `transcript` 属性也很有用。


    *   `worksFor` 属性表示教授所属的院系。我们可以选择将其表示为一个简单的 `String` 类型，用于存储院系名称，例如“MATH”；也可以将其表示为一个引用变量，该变量持有对
    `Department` 对象的句柄——具体来说，就是代表“现实世界”中数学系的 `Department` 对象。当然，这样做需要我们为一个名为 `Department`
    的新类定义属性和方法。


    正如我们将在本书第 2 部分进一步讨论的那样，是否需要发明一个新的用户自定义类型/类来表示特定的现实世界概念/抽象，这个决定并不总是那么明确。


    ### 编译“技巧”：“桩化”类


    如果我们想按前面所示的方式用 Java 编写 `Student` 和 `Professor` 类，那么这两个类都无法单独编译；也就是说，如果我们只编写了 `Student`
    类的代码


    ```

    // Student.java

    public class Student {

    // 属性声明通常放在最前面 ...

    String name;

    String studentId;

    Date birthDate;

    String address;

    String major;

    double gpa;

    Professor advisor;

    // 等等

    }

    ```


    而尚未编写 `Professor` 类（`Professor.java`）的代码，那么在编译 `Student` 时就会得到如下编译错误


    ```

    Student.java: 找不到符号

    符号:   类 Professor

    位置: 类 Student

    Professor advisor;

    ^

    ```


    因为我们还没有向 Java 编译器将“`Professor`”定义为一个类型。


    我们可以等到 `Student` 和 `Professor` 两个类都编写完成后再尝试编译其中任何一个，但如果我们再引入第三个类呢？


    ```

    public class Student {

    String name;

    Professor advisor;

    Department major;

    // 等等

    }

    public class Professor {

    String name;

    Student advisee;

    Department worksFor;

    // 等等

    }

    public class Department {

    String name;

    Professor chairman;

    // 等等

    }

    ```


    或者第四个类、第五个类？我们是否必须将***所有***类都编写完成后，才能编译其中***任何一个***类？


    幸运的是，我们可以使用**桩化**类的技术，临时解决编译类 X（它引用了尚未编写的类 Y）时遇到的问题。回到我们最初编写的 `Student` 类


    ```

    // Student.java

    public class Student {

    // 属性声明通常放在最前面 ...

    String name;

    // 等等

    Professor advisor;

    // 等等

    }

    ```


    我们可以临时编写一个“骨架”版的 `Professor` 类，如下所示：


    ```

    // Professor.java

    // 一个“桩”类：注意类体由一对空花括号组成！

    public class Professor { }

    ```


    尽管这个 `Professor` 类的定义可能很简单，但 Java 编译器仍会将其视为一个***合法***的类定义，编译后会生成一个 `Professor.class`
    字节码文件。


    当我们现在尝试编译 `Student.java` 文件时，编译器会将“`Professor`”视为一个有效的符号——具体来说，是一个用户自定义类型的名称——因此
    `Student` 也能正常编译。


    回想一下，我们可以使用单个命令同时编译 `Student.java` 和 `Professor.java`（“桩”文件）


    `javac *.java`


    也就是说，`Professor.java` 不需要先单独编译。


    ### 组合


    每当我们创建一个类（例如 `Student` 或 `Professor`），并且该类的一个或多个属性本身是对其他对象的引用时，我们就在使用一种称为**组合**的面向对象技术。对象在概念上可以相互嵌套的层数是无限的，因此组合使我们能够对非常复杂的现实世界概念进行建模。事实证明，大多数“有趣的”类都使用了组合。


    使用组合时，从概念上看，我们似乎是在物理上将对象一个嵌套在另一个内部，如图 3-15 所示。


    ![](img/78624_3_En_3_Fig15_HTML.png)


    一个标有“学生对象 A”的云朵图示，内部有一个表格。表格包含姓名 Joe Blow、学生 ID 12345 以及一个顾问，顾问指向一个标有“教授对象 B”的云朵。


    图 3-15


    概念上的对象“嵌套”


    实际的对象嵌套（即在另一个类内部声明一个类）在许多面向对象编程语言中都是可行的，并且有时确实有意义——也就是说，如果从面向对象应用程序的角度来看，对象 A
    不需要有自己的生命周期，并且它的存在仅仅是为了服务于其所属的对象 B**。**


    *   例如，把你的大脑想象成一个只存在于你的身体（另一个对象）这个上下文中的对象。


    *   作为与 SRS 相关的对象嵌套示例，让我们考虑一个用于跟踪学生在特定课程中表现的成绩簿。如果我们定义一个 `GradeBook` 类，然后创建 `GradeBook`
    对象作为属性——每个 `Course` 对象一个——那么每个 `GradeBook` 对象完全存在于其关联的 `Course` 对象的上下文中可能是合理的。其他对象不需要直接与
    `GradeBook` 通信；如果一个 `Student` 对象想向 `Course` 对象询问该 `Student` 获得了什么成绩，`Course` 对象可以在内部查询其嵌入的
    `GradeBook` 对象，然后简单地将一个字母等级返回给 `Student`。


    然而，我们经常会遇到这样的情况——就像示例中的 `Student` 和 `Professor` 类一样——对象 A 需要引用对象 B，对象 B 也需要反向引用对象
    A，并且***两个***对象都需要能够独立于彼此，响应整个应用程序发出的请求。在这种情况下，句柄就派上用场了！


    实际上，我们并***不是***将整个对象作为属性存储在其他对象内部；相反，我们存储的是对对象的***引用***。当对象 A 的一个属性被定义为对象引用 B
    时，这两个对象在内存中独立存在，并且只是在需要交互时，有一种便捷的方式找到对方。把你自己想象成一个对象，把你的手机号码想象成你的引用。其他人——“对象”——可以通过你的手机号码联系到你，随时与你通话，即使他们不知道你的实际位置；反之，如果你有他们的手机号码，你也可以随时给他们打电话。


    使用句柄进行内存分配在概念上可能类似于图 3-16。


    ![](img/78624_3_En_3_Fig16_HTML.jpg)


    两个云朵的图示，分别标有“学生对象 A”和“教授对象 B”。学生对象 A 包含姓名 Joe Blow、学生 ID 12345 和顾问。教授对象 B 包含姓名
    Doctor Smith、员工 ID 987 和受指导者。它们相互连接。


    图 3-16


    对象在内存中独立存在，并相互持有句柄


    采用这种方法，每个对象只在内存中分配一次：


    *   `Student` 对象知道如何通过其 `advisor` 属性/句柄/***引用***，在需要时找到并与其顾问（`Professor`）对象通信。


    *   `Professor` 对象知道如何通过其 `advisee` 属性/句柄/***引用***，在需要时找到并与其受指导者（`Student`）对象通信。


    你将在第 4 章学习如何在 Java 中实际编写这种对象间通信的代码。

