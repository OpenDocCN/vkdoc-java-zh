    \ 抽象类也可以声明具体方法。``public void print() {``System.out.println(name);``}``// 等等``}`\
    \ | `public interface Teacher {``// 接口不能规定数据结构。``// 我们无需使用 \"public\" 或``// \"\
    abstract\" 关键字——接口声明的所有方法``// 默认自动为 public 和 abstract。``void agreeToTeach(Course\
