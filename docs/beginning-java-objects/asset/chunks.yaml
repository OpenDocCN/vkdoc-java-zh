  raw: '## Revised SRS Class Diagram


    Going back to the SRS class diagram that we produced in Chapter [10](#78624_3_En_10_Chapter.xhtml),
    let’s reflect all of the new insights—some behavioral, some structural—that we’ve
    gained from analyzing one scenario/sequence diagram (see Figure [11-14](#78624_3_En_11_Chapter.xhtml#Fig14)).


    ![](images/78624_3_En_11_Chapter/78624_3_En_11_Fig14_HTML.jpg)


    A diagram illustrates the relationships between several elements, including the
    person, the plan of study, courses, sections, the transcript entry, the transcript,
    and the schedule of classes. These elements are interconnected and represent different
    aspects of a student''s academic journey, from selecting courses and scheduling
    classes to tracking progress through the transcript.


    Figure 11-14


    Revised SRS class diagram


    Note that we’ve decided not to reflect the `confirmSeatAvailability` “housekeeping”
    method at this time, as we suspect that it will be a private method and don’t
    wish to clutter our diagram. The decision of whether to reflect private methods
    on a class diagram—or, for that matter, to reflect ***any*** feature of a class—is
    up to the modeler, because again, the purpose of the diagram is to communicate,
    and too much detail can actually lessen a diagram’s effectiveness in this regard.


    We must remember to update the SRS data dictionary any time we add classes, attributes,
    relationships, or methods to our model. Here’s a suggested format for how we might
    wish to describe a method in the dictionary:


    *   ***Method***: `enroll`


    *   ***Defined for class***: `Section`


    *   ***Header***: `boolean enroll(Student s)`


    *   ***Description***: This method enrolls the designated person in the section,
    unless (a) the section is already full, (b) the student’s plan of study doesn’t
    call for this course, or (c) the student hasn’t met the prerequisites. It returns
    a `boolean` value to indicate success (`true`) or failure (`false`) of the enrollment.


    ## Summary


    In this chapter, you’ve seen how the process of dynamic modeling is a complementary
    technique to the static modeling that enriches our overall understanding of the
    problem to be automated, hence enabling us to improve our object “blueprint,”
    also known as a class diagram. In particular, you’ve seen


    *   How events trigger state changes


    *   How to develop scenarios, based on use cases


    *   How to represent these as UML interaction diagrams: sequence diagrams or,
    alternatively, communication diagrams


    *   How to glean information from sequence diagrams concerning the behaviors expected
    of objects—that is, the methods that our classes will need to implement—so as
    to round out our class diagram


    *   How sequence diagrams can also yield additional knowledge about the structural
    aspects of a system


    EXERCISES


    1.  Devise an “interesting” scenario, and prepare the corresponding sequence diagram,
    for the problem area whose requirements you defined for Exercise 3 in Chapter
    [2](#78624_3_En_2_Chapter.xhtml).


    2.  Provide a list of all of the method headers that you would add to each of
    your classes based on the sequence diagram that you prepared for Exercise 7\.
    Also, note any new classes, attributes, or relationships that would be needed.


    1.  Mary Jones, an existing customer of the pharmacy, brings in a prescription
    for eye drops to have it filled.


    2.  The pharmacist checks to see if Ms. Jones has previously had a prescription
    filled for this item.


    3.  The pharmacist discovers that she has and furthermore that the last time it
    was refilled was less than a month ago.


    4.  Knowing that her insurance won’t authorize payment for this same prescription
    so soon, the pharmacist informs Ms. Jones, and she decides to wait to have it
    filled at a later date.


    1.  Provide a list of all of the method headers that you would add to each of
    your classes based on the sequence diagram that you prepared for Exercise 2\.
    Also, note any new classes, attributes, or relationships that would be needed.


    2.  Prepare a second sequence diagram for the SRS case study, representing a scenario
    of your own choosing based upon any of the SRS use cases identified in Chapter
    [9](#78624_3_En_9_Chapter.xhtml). This scenario should be significantly different
    from those presented in this chapter and from the scenario in Exercise 2\. You
    must also narrate the scenario as was done for Exercise 2.


    3.  Provide a list of all of the method headers that you would add to each of
    your classes based on the sequence diagram that you prepared for Exercise 4\.
    Also, note any new classes, attributes, or relationships that would be needed.


    4.  Prepare a sequence diagram to represent the following scenario for the Prescription
    Tracking System (PTS) case study presented in the Appendix:


    1.  Mary, a student, logs on to the SRS.


    2.  She indicates that she wishes to drop ART 222, section 1.


    3.  ART 222, section 1, is removed from Mary’s course load.


    4.  The system determines that Joe, another student, is waitlisted for this section.


    5.  The section is added to Joe’s current course load.


    6.  An email is sent to Joe notifying him that ART 222 has been added to his course
    load.


    1.  Prepare a sequence diagram for Scenario #2 as presented earlier in this chapter.


    2.  Prepare a sequence diagram to represent the following scenario for the SRS
    case study:


    # 12. Wrapping Up Our Modeling Efforts


    [Testing the Model](#78624_3_En_12_Chapter.xhtml#Sec1) [Revisiting Requirements](#78624_3_En_12_Chapter.xhtml#Sec2)
    [Reusing Models: A Word About Design Patterns](#78624_3_En_12_Chapter.xhtml#Sec3)
    [Summary](#78624_3_En_12_Chapter.xhtml#Sec4)


    Having used the techniques for static and dynamic modeling presented in Chapters
    [10](#78624_3_En_10_Chapter.xhtml) and [11](#78624_3_En_11_Chapter.xhtml), respectively,
    we’ve arrived at a fairly thorough object model of the SRS—or so it seems! Before
    we embark upon implementing our class diagram as Java code in Part 3 of the book,
    however, we need to make sure that our model is as accurate and representative
    of the goal system as possible.


    In this chapter, we’ll


    *   Explore some simple techniques for testing our model.


    *   Talk about the notion of reusing models.'
  trans: '

    ## 修订后的 SRS 类图


    回到我们在第 10 章中绘制的 SRS 类图，让我们反思一下从分析一个场景/时序图（见图 11-14）中获得的所有新见解——有些是行为层面的，有些是结构层面的。


    ![](img/78624_3_En_11_Fig14_HTML.jpg)


    该图展示了多个元素之间的关系，包括人员、学习计划、课程、教学班、成绩单条目、成绩单以及课程表。这些元素相互关联，代表了学生学术旅程的不同方面，从选择课程和安排课表，到通过成绩单跟踪学习进度。


    图 11-14


    修订后的 SRS 类图


    请注意，我们决定暂时不反映 `confirmSeatAvailability` 这个“内务管理”方法，因为我们推测它将是一个私有方法，并且不希望让我们的图表变得杂乱。是否在类图中反映私有方法——或者就此而言，是否反映类的***任何***特性——取决于建模者，因为再次强调，图表的目的是为了沟通，而过多细节实际上可能会降低图表在这方面的有效性。


    我们必须记住，每当我们向模型添加类、属性、关系或方法时，都要更新 SRS 数据字典。以下是我们可能希望在字典中描述方法的一种建议格式：


    *   ***方法***：`enroll`


    *   ***所属类***：`Section`


    *   ***方法头***：`boolean enroll(Student s)`


    *   ***描述***：此方法将指定人员注册到该教学班，除非出现以下情况：(a) 该教学班已满，(b) 学生的学习计划不要求此课程，或 (c) 学生未满足先修课程要求。该方法返回一个
    `boolean` 值，以指示注册成功（`true`）或失败（`false`）。


    ## 本章小结


    在本章中，您已经了解到动态建模过程是如何作为静态建模的补充技术，丰富我们对待自动化问题的整体理解，从而帮助我们改进对象“蓝图”（也称为类图）。具体来说，您已经了解到：


    *   事件如何触发状态变化

    *   如何基于用例开发场景

    *   如何将这些场景表示为 UML 交互图：时序图，或者通信图

    *   如何从时序图中收集关于对象预期行为的信息——即我们的类需要实现的方法——从而完善我们的类图

    *   时序图如何也能提供关于系统结构方面的额外知识


    练习


    1.  针对你在第 2 章练习 3 中定义需求的问题领域，设计一个“有趣的”场景，并准备相应的时序图。


    2.  根据你为练习 7 准备的时序图，提供一个你将添加到每个类中的所有方法头的列表。同时，注明任何需要新增的类、属性或关系。


    1.  药店的现有顾客玛丽·琼斯带来一张眼药水处方，要求配药。

    2.  药剂师检查琼斯女士之前是否配过这种药。

    3.  药剂师发现她配过，而且上次续配的时间还不到一个月。

    4.  药剂师知道她的保险公司不会这么快就批准为同一张处方付款，于是告知了琼斯女士，她决定等以后再配。


    1.  根据你为练习 2 准备的时序图，提供一个你将添加到每个类中的所有方法头的列表。同时，注明任何需要新增的类、属性或关系。


    2.  为 SRS 案例研究准备第二个时序图，基于你在第 9 章中确定的任意 SRS 用例，自行选择一个场景。该场景应与本章中呈现的场景以及练习 2 中的场景有显著不同。你还必须像练习
    2 那样叙述该场景。


    3.  根据你为练习 4 准备的时序图，提供一个你将添加到每个类中的所有方法头的列表。同时，注明任何需要新增的类、属性或关系。


    4.  准备一个时序图，以表示附录中介绍的处方跟踪系统（PTS）案例研究的以下场景：


    1.  学生玛丽登录 SRS 系统。

    2.  她表示希望退选 ART 222 课程的第 1 教学班。

    3.  ART 222 课程的第 1 教学班从玛丽的课程负荷中移除。

    4.  系统确定另一名学生乔正在该教学班的候补名单上。

    5.  该教学班被添加到乔当前的课程负荷中。

    6.  系统向乔发送一封电子邮件，通知他 ART 222 课程已添加到他的课程负荷中。


    1.  为本章前面介绍的场景 #2 准备一个时序图。


    2.  为 SRS 案例研究准备一个时序图，以表示以下场景：


    # 12. 收尾我们的建模工作


    测试模型 重新审视需求 复用模型：关于设计模式的一点说明 本章小结


    通过使用第 10 章和第 11 章分别介绍的静态和动态建模技术，我们已经得到了一个相当全面的 SRS 对象模型——至少看起来如此！然而，在本书第三部分着手将我们的类图实现为
    Java 代码之前，我们需要确保我们的模型尽可能准确，并且尽可能代表目标系统。


    在本章中，我们将：


    *   探讨一些测试模型的简单技术。

    *   讨论模型复用的概念。

