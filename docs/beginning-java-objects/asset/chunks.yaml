    ### 反映多重性


    你在第 5 章中已经了解到，对于类 `A` 和类 `B` 之间的给定关联类型 `X`，术语“多重性”指的是：必须/可能与类型 `B` 的某个给定实例相关联的类型
    `A` 的对象实例数量，反之亦然。在准备类图时，我们会在关联线的每一端进行标记，以指明从该线另一端所属类的对象角度来看，其多重性应为何值。换句话说：


    *   我们在 `B` 端标记的是，可以与单个 `A` 实例相关联的 `B` 实例的数量。

    *   我们在 `A` 端标记的是，可以与单个 `B` 实例相关联的 `A` 实例的数量。


    如图 10-27 所示。


    ![](img/78624_3_En_10_Fig27_HTML.jpg)


    一幅插图，展示了两个分别标记为 A 和 B 的矩形块，通过一条从左到右的线连接。左侧的文字说明有多少个 A 的实例可以与单个 B 的实例相关联。右侧的文字说明有多少个
    B 的实例可以与一个 A 的实例相关联。


    图 10-27

    指示类之间的多重性


    作为回顾，给定一个属于类 `A` 的单个对象，类型 `B` 的对象与之关联的方式有四种不同的场景：


    *   `A` 类型的对象可能与 ***恰好一个*** `B` 类型对象的实例相关联，例如“一个 `Student` (`A`) *拥有* 一个 `Transcript`
    (`B`)”这种情况。在这里，每个 `A` 的实例 ***必须*** 存在一个 `B` 的实例。

    *   `A` 类型的对象可能与 ***至多一个*** `B` 类型对象的实例相关联，例如“一个 `Professor` (`A`) *担任* 一个 `Department`
    (`B`) 的*系主任*”这种情况。在这里，每个 `A` 的实例 ***可选*** 地存在一个 `B` 的实例。

    *   `A` 类型的对象可能与 ***一个或多个*** `B` 类型对象的实例相关联，例如“一个 `Department` (`A`) *雇佣* ***多个***
    `Professor` (`B`)”这种情况。在这里，每个 `A` 的实例 ***必须*** 存在至少一个 `B` 的实例。

    *   `A` 类型的对象可能与 ***零个或多个*** `B` 类型对象的实例相关联，例如“一个 `Student` (`A`) *正在修读* ***多个***
    `Section` (`B`)”这种情况。（在我们假设的大学里，学生可以休学一学期。）在这里，每个 `A` 的实例 ***可选*** 地存在至少一个 `B`
    的实例。


    在 UML 表示法中，多重性符号如下：


    *   “恰好一个” 用符号 “1” 表示。

    *   “至多一个” 用符号 “0..1” 表示，也可以解读为“零或一”。

    *   “一个或多个” 用符号 “1..*” 表示。

    *   “零个或多个” 用符号 “0..*” 表示。

    *   当我们知道多重性应该是“多个”，但不确定（或不想指定）是“零个或多个”还是“一个或多个”时，我们使用符号 “*”。

    *   甚至可以表示一个任意的显式数值范围 *x*..*y*，例如使用 “3..7” 来表示“一个 `Department` 雇佣的 `Professor`
    不少于三名，且不超过七名”。


    以下是一些 UML 示例：


    “一个 `Student` *拥有* 恰好一个 `Transcript`，并且一个 `Transcript` *属于* 恰好一个 `Student`。”（见图
    10-28。）


    ![](img/78624_3_En_10_Fig28_HTML.jpg)


    一幅插图，展示了两个分别标记为 student 和 transcript 的矩形块，通过一条从左到右的线连接。中间线上的文字是 has a。


    图 10-28

    强制性一对一多重性的示例


    “一个 `Professor` *为* 恰好一个 `Department` *工作*，但一个 `Department` *拥有* 多个（一个或多个）`Professor`
    作为雇员。”（见图 10-29。）


    ![](img/78624_3_En_10_Fig29_HTML.jpg)


    一幅插图，展示了两个分别标记为 professor 和 department 的矩形块，通过一条从左到右的线连接。中间线上的文字是 works for。


    图 10-29

    强制性一对多多重性的示例


    “一个 `Professor` *可选地担任* 至多一个 `Department` 的*系主任*，而一个 `Department` *拥有* 恰好一个 `Professor`
    担任系主任角色。”（见图 10-30。）


    ![](img/78624_3_En_10_Fig30_HTML.jpg)


    一幅插图，展示了两个分别标记为 professor 和 department 的矩形块，通过一条从左到右的线连接。中间线上的文字是 chairs。


    图 10-30

    可选性一对多多重性的示例


    “一个 `Student` *修读* 多个（零个或多个）`Section`，并且一个 `Section` *被* 多个（零个或多个）`Student` *修读*。”（见图
    10-31。）


    ![](img/78624_3_En_10_Fig31_HTML.jpg)


    一幅插图，展示了两个分别标记为 student 和 section 的矩形块，通过一条从左到右的线连接。中间线上的文字是 attends。每个块都标有 0
    dot, dot star。


    图 10-31

    可选性多对多多重性的示例


    一个 `Section` 如果持续没有 `Student` 报名修读，很可能会被取消；尽管如此，在 `Section` 首次通过 SRS 开放注册后的一段时间内，它可能没有
    `Student` 注册。


    “一个 `Course` *是* 多个（零个或多个）`Course` *的先修课程*，并且一个 `Course` *可以有* 多个（零个或多个）*先修* `Course`。”（见图
    10-32。）


    ![](img/78624_3_En_10_Fig32_HTML.png)


    一幅插图，展示了两个矩形块。前景中的块标记为 course，背景中的块表示 prerequisite。每个块都标有 0 dot, dot star。


    图 10-32

    自反关联上可选性多对多多重性的示例


    我们在聚合以及简单关联上都反映多重性。例如，图 10-33 中所示的 UML 表示法将被解释为：“一个（学生的）`Plan of Study` *由* 多个
    `Course` *组成*；任何给定的 `Course` *可以被包含在* 多个不同的（学生的）`Plan` `of Study` 中。”


    ![](img/78624_3_En_10_Fig33_HTML.png)


    一幅插图，展示了两个分别标记为 course 和 plan of study 的矩形块。course 指向 plan of study 的一个箭头。


    图 10-33

    在聚合上反映多重性


    然而，在继承关系上反映多重性是没有意义的，因为正如第 4 章所讨论的，继承暗示了***类***之间的关系，但***不是*** ***对象***之间的关系。也就是说，图
    10-34 中所示的表示法暗示，任何属于 *Subclass B* 的对象，凭借“is a”关系，也***同时***是 *Superclass A* 的一个实例。


    ![](img/78624_3_En_10_Fig34_HTML.png)


    一幅插图，展示了两个分别标记为 superclass A 和 subclass B 的矩形块。subclass b 指向 superclass A 的一个箭头。


    图 10-34

    多重性修饰不适用于继承关系


    如果我们想要说明类型 `A` 和 `B` 的不同对象之间的某种关系，例如“一个 `Manager` *监督* 一个 `Employee`”，我们需要在这些类之间引入一个独立于其继承关系的单独关联，如图
    10-35 所示。


    ![](img/78624_3_En_10_Fig35_HTML.png)


    一幅插图，展示了两个矩形块，底部标记为 manager 的块指向顶部标记为 employee 的块的一个箭头。中间的文字是 supervises。


    图 10-35

