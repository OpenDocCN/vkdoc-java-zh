    A second overloaded form of constructor, `StringTokenizer(String s, String delimiter)`,
    can be used if we want to specify a ***specific*** delimiter to be used when parsing
    a `String`. For example, to parse along slash (/) boundaries, as when perhaps
    parsing a date, we’d write code as follows (observe that we enclose the delimiter,
    which can be ***one or more*** characters long, within ***double*** quote marks):


    ```

    String date = "11/17/1985";

    // Note use of double quote marks below.

    StringTokenizer st = new StringTokenizer(date, "/");

    while (st.hasMoreTokens()) {

    System.out.println(st.nextToken());

    }

    ```


    Output:


    ```


    ```


    Note that the delimiter`—`“`/`”, in this example`—`is stripped off each token.


    As another example, to parse on the three-character delimiter “`-#-`”, we’d write


    ```

    String fruit = "apple-#-banana-#-cherry";

    StringTokenizer st = new StringTokenizer(fruit, "-#-");

    while (st.hasMoreTokens()) {

    System.out.println(st.nextToken());

    }

    ```


    Output:


    ```

    apple

    banana

    cherry

    ```


    As our final example, let’s assume that we’re reading records one by one from
    a file and want to parse on tab characters only vs. on all white space; we’d write
    code as follows:


    ```

    // Pseudocode.

    String record = read a record from a file;

    // Parse on tabs only, not on all white space.

    StringTokenizer st = new StringTokenizer(record, "\t");

    while (st.hasMoreTokens()) {

    System.out.println(st.nextToken());

    }

    ```


    Assuming that `record` contains the following text (where *<tab>* indicates the
    presence of an invisible tab character)


    ```

    Bill Jost123-45-6789Cleveland, Ohio

    ```


    we’d observe the following output:


    ```

    Bill Jost

    123-45-6789

    Cleveland, Ohio

    ```


    Note that the blank spaces between words have been left intact; had we instead
    parsed this record with the default `StringTokenizer`, which parses on all white
    space


    ```

    // Pseudocode.

    String record = read a record from a file;

    // Parse on any/all white space.

    StringTokenizer st = new StringTokenizer(record);

    while (st.hasMoreTokens()) {

    System.out.println(st.nextToken());

    }

    ```


    we’d have gotten the following as output instead:


    ```

    Bill

    Jost

    123-45-6789

    Cleveland,

    Ohio

    ```


    `StringTokenizer`s are particularly useful when reading and parsing structured
    records from data files; we’ll use this technique in building our SRS application,
    in Chapter [15](#78624_3_En_15_Chapter.xhtml).


    ### Instantiating Strings and the String Literal Pool


    There are two ways to instantiate `String` objects in Java. The first, which we’ve
    seen in use many times before, allows us to simply assign a literal value to a
    `String` variable:


    ```

    String s = "I am a String!";

    ```


    But, because `String`s are objects, we may also use the `new` keyword to formally
    invoke an explicit `String` constructor, as follows:


    ```

    String t = new String("I am a String, too!");

    ```


    We’ll refer to the first way of instantiating `String`s`—`the way that ***doesn’t***
    use the `new` operator`—`as the ***“shortcut” method*** of `String` instantiation
    and the second way as the ***formal method***. There is a subtle difference in
    terms of what happens behind the scenes with these two methods of `String` instantiation,
    as follows.


    When we use the shortcut method of `String` instantiation


    ```

    String x = "Foo"; // shortcut method

    ```


    the JVM checks its `String` **literal pool**`—`a special place in the JVM’s memory
    that enables automatic shared access to `String` objects`—`to see if there is
    already a `String` object in the literal pool with that exact same value:


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig11_HTML.jpg)


    The diagram illustrates the string literal pool within the J V M with four balloons.
    In one balloon, the word foo is written with threads X and Y.


    Figure 13-11


    Using the shortcut method of `String` instantiation inserts a newly created `String`
    object into the `String` literal pool


    *   If so, the JVM ***reuses*** that existing instance without creating a second.


    *   Conversely, if a matching instance is ***not*** found in the literal pool,
    the JVM creates one and places it in the literal pool. This is illustrated conceptually
    in Figure [13-11](#78624_3_En_13_Chapter.xhtml#Fig11).


    Let’s now use the shortcut method a second time in the same program, in an attempt
    to instantiate another `String` object `y` with the same value as `x`:


    ```

    String x = "Foo";

    String y = "Foo"; // shortcut method again

    ```


    This time, since the JVM finds an instance of a `String` with the value `"Foo"`
    in the literal pool from when we instantiated `x`, the JVM assigns `y` as a ***second***
    handle to the ***same*** `String` object. This is illustrated conceptually in
    Figure [13-12](#78624_3_En_13_Chapter.xhtml#Fig12).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig12_HTML.jpg)


    The diagram illustrates the string literal pool within the JVM with four balloons.
    In one balloon, the word foo is written with threads X and Y.


    Figure 13-12


    Two shortcut instantiations of `String`s with the same value wind up sharing the
    same `String` object within the `String` literal pool


    Now, let’s declare and instantiate a third `String` variable `z` in the same program,
    giving it the same value as `x` and `y`. However, rather than using the shortcut
    method for `String` instantiation with `z`, we’ll use the `new` keyword to explicitly
    invoke a `String` constructor:


    ```

    String x = "Foo";

    String y = "Foo";

    String z = new String("Foo");  // formal method this time

    ```


    Our use of `new` instructs the JVM to ***bypass*** the literal pool: that is,
    a ***brand-new*** instance of a `String` object with the value `"Foo"` will be
    created ***outside*** of the literal pool, as illustrated in Figure [13-13](#78624_3_En_13_Chapter.xhtml#Fig13).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig13_HTML.jpg)


    The diagram illustrates the string literal pool within the J V M with four balloons.
    In one balloon, the word foo is written with threads X and Y. The outer balloon
    is labeled Z and foo is written on it.


    Figure 13-13


    Use of the `new` keyword to instantiate a `String`, on the other hand, explicitly
    creates a new `String` instance every time


    Figure [13-14](#78624_3_En_13_Chapter.xhtml#Fig14) completes our example, wherein
    we create a fourth similarly valued `String`, `w`, again using the formal method:


    ```

    String x = "Foo";

    String y = "Foo";

    String z = new String("Foo");

    String w = new String("Foo");  // formal method again

    ```'
