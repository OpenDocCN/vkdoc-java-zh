- fmt: '### Accepting Command-Line Arguments: The `args` Array


    We learned in Chapter [2](#78624_3_En_2_Chapter.xhtml) that to invoke a Java program
    from the command line, we type the command `java` (to launch the JVM) followed
    by the name of the class/bytecode file containing the official `main` method,
    for example:


    ```

    java Simple

    ```


    We’ve also learned that it’s possible to control certain aspects of the JVM’s
    behavior through the use of command-line options; such flags go between the `java`
    command and the class name. For example, we learned earlier in this chapter that
    we can establish the ***classpath*** of a program—that is, inform the JVM of where
    to search for bytecode files—by using the `-cp` option, as in:


    ```

    java -cp C:\Foo\A.jar;D:\Bar\B.jar Simple

    ```


    We can also initialize our own programs by passing in command-line information
    of our own design when we invoke them. Such data comes ***after*** the name of
    the program on the command line:


    ```

    java ClassFileName arg1 arg2 […] argN

    ```


    For example:


    ```

    java ComputeTotal 123 456 789

    ```


    or


    ```

    java AnalyzeWords -sort DOG GUPPY GIRAFFE HIPPOPOTAMUS CAT

    ```


    Such so-called **command-line arguments** get passed to the `main` method of the
    Java program as a `String` array called `args` (or whatever else we wish to name
    it), as declared by the `main` method header:


    ```

    public static void main(String[] args) { ...

    ```


    Inside the `main` method, we can do with `args` whatever we’d do with any other
    array; for example, determine its length, access individual `String` items within
    the array, and so forth, as we discussed in Chapter [6](#78624_3_En_6_Chapter.xhtml).


    Let’s look at a few example programs that take advantage of command-line arguments.
    This first example is quite simple; it simply prints out information about the
    arguments that it has received:


    ```

    public class FruitExample {

    public static void main(String[] args) {

    System.out.println("The args array contains " + args.length + " entries." );

    for (int i = 0; i < args.length; i++) {

    System.out.println("Argument #" + i + " = |" + args[i] + "|");

    }

    }

    }

    ```


    If we run the program as follows:


    ```

    java FruitExample apple banana cherry

    ```


    we’d get the following output:


    ```

    The args array contains 3 entries.

    Argument #0 = |apple|

    Argument #1 = |banana|

    Argument #2 = |cherry|

    ```


    If we want to provide arguments that contain spaces, we’d enclose them in double
    quotes, as follows:


    ```

    java FruitExample "green apple" "yellow banana" "black cherry"

    ```


    Output:


    ```

    The args array contains 3 entries.

    Argument #0 = |green apple|

    Argument #1 = |yellow banana|

    Argument #2 = |black cherry|

    ```


    And if we were to run our program with no command-line arguments whatsoever:


    ```

    java FruitExample

    ```


    it would report the following:


    ```

    The args array contains 0 entries.

    ```


    ### Introducing Custom Command-Line Flags to Control a Program’s Behavior


    Let’s look at a second example that is a bit more elaborate; in this program,
    called `AnalyzeWords`, we introduce a custom command-line option of our own invention,
    `-sort`, to control the program’s behavior.


    *   At a minimum, `AnalyzeWords` will inspect however many command-line arguments
    are provided by the user to determine the length of the shortest and longest of
    them.

    *   Optionally, based on the presence of the `-sort` option as a command-line
    argument, the program will also print out a list of the words in sorted order,
    eliminating duplicates.


    We’ll present the code in its entirety first, discussing it afterward:


    ```

    import java.util.TreeSet;

    public class AnalyzeWords {

    public static void main(String[] args) {

    // Let''s start with a bit of error checking.

    // If the user forgot to provide command line input, let''s

    // report this as an error.

    if (args.length == 0) {

    System.out.println("Usage:  java AnalyzeWords [-sort] list_of_words");

    System.out.println("e.g.:   java AnalyzeWords -sort ZEBRA " +

    "ELEPHANT RAT MONKEY");

    System.exit(0);

    }

    // Initialize a few items.

    boolean sort = false;

    TreeSet sortedWords = new TreeSet();

    String shortest = null;

    String longest = null;

    for (int i = 0; i < args.length; i++) {

    // Watch for the presence of the -sort flag.

    if (args[i].equals("-sort")) {

    sort = true;

    continue;

    }

    // If we haven''t yet set the shortest and longest words, set them

    // to the first word we encounter.

    if (shortest == null) {

    shortest = args[i];

    longest = args[i];

    }

    // Otherwise, compare the current word to the shortest and longest

    // words we''ve seen so far.

    else {

    if (args[i].length() > longest.length()) longest = args[i];

    if (args[i].length() < shortest.length()) shortest = args[i];

    }

    // Add the word to the TreeSet so as to sort them automatically,

    // whether the user asked for them to be sorted or not; if the

    // user didn''t ask for them to be sorted, we''ll simply suppress

    // displaying this information.

    sortedWords.add(args[i]);

    }

    if (sort) {

    System.out.println("Sorted words:");

    for (String s : sortedWords) {

    System.out.println("\t" + s);

    }

    }

    System.out.println("The shortest word was " + shortest.length() +

    " characters long.");

    System.out.println("The longest word was " + longest.length() +

    " characters long.");

    }

    }

    ```


    Let’s now review noteworthy sections of the program in detail.


    Because this program requires command-line input in order for it to do anything
    meaningful, we’re going to check the length of (number of command-line arguments
    found within) the `args` array. If the length is 0, we’re going to inform the
    user of how the program is to be used:


    ```

    // If the user forgot to provide command line input, let''s

    // report this as an error.

    if (args.length == 0) {

    System.out.println("Usage:  java AnalyzeWords [-sort] list_of_words");

    System.out.println("e.g.:   java AnalyzeWords -sort ZEBRA " +

    "ELEPHANT RAT MONKEY");

    ```


    Then we’re going to terminate the program—there’s no need to go any further if
    there’s no input to process:


    ```

    System.exit(0);

    }

    ```


    Next, we declare a few variables:


    *   A `boolean` flag, `sort`, that we’ll set later in the program if we detect
    that the user has provided the optional `-sort` command-line argument:


    ```

    // Keep track of whether the user wants to optionally sort the words,

    // in addition to analyzing them.

    boolean sort = false;

    ```


    *   A `TreeSet` collection—recall from our discussion of collections in Chapter
    [6](#78624_3_En_6_Chapter.xhtml) that sets have the property of eliminating duplicates.
    `TreeSet`s, in particular, automatically sort their contents:


    ```

    TreeSet sortedWords = new TreeSet();

    ```


    *   Two `String`s that will maintain handles on the shortest and longest words
    that we’ve seen as of every new argument that we process:


    ```

    // We''ll keep track of the shortest and longest words as we go.

    String shortest = null;

    String longest = null;

    ```


    We then iterate through the `args` array. If we discover the `-sort` option in
    the command-line input, we set our `boolean sort` flag to `true` and then use
    the `continue` statement to jump to the next word in the `args` array—we don’t
    want to process the `-sort` option as a true “word” with respect to our analysis:


    ```

    for (int i = 0; i < args.length; i++) {

    // Watch for the presence of the -sort flag.

    if (args[i].equals("-sort")) {

    sort = true;

    continue;

    }

    ```'
