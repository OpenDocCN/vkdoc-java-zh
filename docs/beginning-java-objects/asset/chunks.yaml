- fmt: '### Static Initializers


    We learned in Chapter [5](#78624_3_En_5_Chapter.xhtml) that constructors are used
    to initialize an object’s state when it is first instantiated:


    ```

    public class Student {

    private String name;

    private String major;

    // etc.

    // Constructor.

    public Student(String n) {

    setName(n);

    setMajor("TBD"); // default value

    // etc.

    }

    // etc.

    }

    ```


    The initialization code contained within a constructor is executed each time a
    new object of a given type is instantiated; thus, we wouldn’t want to include
    code to initialize a `static` variable in such a constructor:


    ```

    public class Student {

    private String name;

    private String major;

    private int studentIDNo;

    private static int nextAvailableStudentIDNo;

    // etc.

    // Constructor.

    public Student(String n) {

    setName(n);

    setMajor("TBD"); // default value

    // etc.

    // This would be a problem – we’d be resetting

    // the value of nextAvailableStudentIdNo

    // to 10000 with eachnew Student object that we create.

    nextAvailableStudentIdNo = 10000;

    setStudentIDNo(nextAvailableStudentIDNo++);

    // etc.

    }

    // etc.

    }

    ```


    It’s possible to define initialization code that will get performed only ***once***
    in a given application invocation—specifically, when the class’s bytecode of which
    it is a part is first loaded into the JVM—by enclosing it in what is known as
    a `static` code block, thus creating a **static initializer**. The general syntax
    for doing so is shown in the following:


    ```

    public class Student {

    private String name;

    private String major;

    private int studentIDNo;

    private static int nextAvailableStudentIDNo;

    // etc.

    // A static initializer.

    static {

    // Whatever code is enclosed within this block

    // will be executed once, when the enclosing

    // class (Student, in this case) is loaded into

    // the JVM’s memory.

    nextAvailableStudentIDNo = 10000;

    }

    // Constructor.

    public Student(String n) {

    setName(n);

    setMajor("TBD"); // default value

    // etc.

    setStudentIDNo(nextAvailableStudentIDNo++);

    // etc.

    }

    // etc.

    }

    ```


    We can of course do anything that makes good sense within a static initializer:
    in addition to initializing static variables, we can establish resources for an
    application, such as a file or database connection, that need only be performed
    once per application session.


    ## Variable Initialization, Revisited


    Recall our discussion of variable initialization in Chapter [2](#78624_3_En_2_Chapter.xhtml):


    > *In Java, most variables aren’t automatically assigned an initial value when
    they are declared; we must explicitly assign a value to a variable before the
    variable’s name is referenced in a subsequent Java expression in order to avoid
    compilation errors.*


    For example, this next bit of code


    ```

    1  public class Problem {

    2      public static void main(String[] args) {

    3          // Declare several local variables within the main() method.

    4          int i;  // not automatically initialized

    5          int j;  // ditto

    6          j = i;  // compilation error!

    7      }

    8  }

    ```


    was shown to produce the following compilation error on line 6:


    ```

    Variable i may not have been initialized

    ```


    We thus learned that it’s best to explicitly initialize such variables, for example:


    ```

    public class NotAProblem {

    public static void main(String[] args) {

    // Declare several local variables within the main method and

    // explicitly initialize them all.

    int i = 0;

    double x = 0.0;

    boolean test = false;

    Student student = null;

    // etc.

    }

    }

    ```


    Out of necessity, we oversimplified the explanation of variable initialization
    when we first discussed this topic in Chapter [2](#78624_3_En_2_Chapter.xhtml)
    because we hadn’t yet introduced the notion of objects and attributes. To properly
    discuss initialization in Java, we must distinguish among


    *   ***Local variables***—that is, variables declared ***within a method*** and
    whose scope is therefore only the extent of the enclosing method


    *   ***Attributes*** of a class, a.k.a. ***instance variables*** in Java (because
    they are variables whose values are associated with an object/class ***instance***
    as we discussed in Chapter [7](#78624_3_En_7_Chapter.xhtml))


    *   ***Static variables*** (informally referred to as “static attributes”) of
    a class


    As it turns out


    *   All ***local variables***, whether declared to be of one of the eight primitive
    Java types or of a reference type, are considered by the compiler to be ***uninitialized***
    until they have been explicitly initialized within a program.


    *   All ***instance/static variables***, on the other hand, whether declared to
    be of a simple Java type or of a reference type, are ***automatically initialized
    to the default zero-equivalent value for the type in question***.


    Thus, in the following code example


    ```

    public class Student {

    // Attributes/instance variables.

    private int age;

    private boolean isHonorsStudent;

    private double gpa;

    private Professor advisor;

    // A static/class variable.

    private static int totalStudents;

    void someMethod() {

    // Local variables.

    int x;

    boolean flag;

    double y;

    Professor p;

    // etc.

    // Details of method body omitted.

    }

    // etc.

    ```


    variables would be initialized as shown in Table [13-2](#78624_3_En_13_Chapter.xhtml#Tab2).


    Therefore, when first instantiated, an object has the appropriate data structure
    as prescribed by its class, but all of its attributes will be initialized to their
    zero-equivalent values.


    ### Variable Arguments (varargs)


    The **varargs**, or variable arguments, feature of Java introduced with version
    5.0 allows us to declare methods that can accept a ***variable*** number of ***similarly
    typed*** arguments. To declare a method as accepting a variable number of arguments,
    the syntax is as follows:


    ```

    accessibility returnType methodName(argType ... args) {

    // Iterate through the args array; details omitted.

    }

    ```


    where `args` is the name of a parameter representing an ***array*** of type `argType`
    and ***the explicit inclusion of an ellipsis*** “`...`” between `argType` and
    `args` signals that `args` is actually to be treated as an array of zero or more
    elements of type `argType`.


    Within a so-called **varargs method**, we iterate through the `args` array in
    similar fashion to the way that we learned to iterate through the `args` array
    of the `main` method earlier in this chapter to read command-line arguments. Whereas
    the `main` method of an application can only accept an array of `String` values
    as `arg`(ument)`s`, however


    ```

    public static void main(String[] args) { // etc.

    ```


    a varargs method in general may declare its `args` parameter to be of ***any***
    type:


    *   A predefined reference type, such as `String`: `public void foo(String ...
    args) {`

    *   A primitive type, such as `int`: `public void foo(int ... args) {`

    *   A user-defined type, such as `Person`: `public void foo(Person ... args) {`


    (Note that square brackets `[]` are ***not*** needed for `args` to serve as an
    array; this happens automatically by virtue of our inclusion of an ellipsis “`...`”.)


    The following example illustrates the use of varargs methods to accept `String`,
    `int`, `Person`, and `Object` arguments, respectively; for purposes of this example,
    we assume that `Student` and `Professor` are subclasses of the `Person` (super)class
    and that `Pineapple`, `Bicycle`, and `Cloud` are three unrelated classes all derived
    directly from `Object`:'
