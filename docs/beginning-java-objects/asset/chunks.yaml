    \ of Derived Types](#78624_3_En_6_Chapter.xhtml#Sec37) [Revisiting Our Student\
    \ Class Design](#78624_3_En_6_Chapter.xhtml#Sec38) [The courseLoad Attribute of\
    \ Student](#78624_3_En_6_Chapter.xhtml#Sec39) [The transcript Attribute of Student](#78624_3_En_6_Chapter.xhtml#Sec40)\
    \ [The transcript Attribute, Take 2](#78624_3_En_6_Chapter.xhtml#Sec41) [Our Completed\
    \ Student Data Structure](#78624_3_En_6_Chapter.xhtml#Sec42) [Summary](#78624_3_En_6_Chapter.xhtml#Sec43)\n\
    \nYou learned about the process of creating objects based on class definitions,\
    \ a process known as **instantiation**, in Chapter [3](#78624_3_En_3_Chapter.xhtml).\
    \ When we’re only creating a few objects, we can afford to declare individualized\
    \ reference variables for these objects: `Student`s `s1`, `s2`, and `s3`, perhaps,\
    \ or `Professor`s `profA`, `profB`, and `profC`. But, at other times, individualized\
    \ reference variables are impractical:\n\n*   Sometimes, there will be too many\
    \ objects, as when creating `Course` objects to represent the hundreds of courses\
    \ in a university’s course catalog.\n\n*   Worse yet, we may not even ***know***\
    \ how many objects of a particular type we’ll need to instantiate at ***run time***\
    \ and so cannot declare a predefined number of reference variables at ***compile\
    \ time***.\n\nFortunately, OOPLs solve this problem by providing a special category\
    \ of object called a **collection** that is used to hold and organize references\
    \ to other objects.\n\nIn this chapter, you’ll learn about\n\n*   The properties\
    \ of three generic collection types: **ordered lists**, **sets**, and **dictionaries**\n\
    \n*   The specifics of several different predefined Java collection types/classes,\
    \ along with how we represent and manipulate classic arrays in Java\n\n*   How\
    \ logically related classes like collections are bundled together in Java into\
    \ **packages** and how we must **import** packages if we wish to make use of the\
    \ classes that they contain\n\n*   How collections enable us to model very sophisticated\
    \ real-world concepts or situations\n\n*   Design techniques for inventing our\
    \ own collection types\n\n## What Are Collections?\n\nWe’d like a way to gather\
    \ up objects as they are created so that we can manage them as a group and operate\
    \ on them collectively, along with referring to them individually when necessary,\
    \ for example:\n\n*   A professor may wish to step through all `Student` objects\
    \ registered for a particular course that the professor is teaching in order to\
    \ assign their final semester grades.\n\n*   The Student Registration System (SRS)\
    \ application as a whole may need to iterate through all of the `Course` objects\
    \ in the current schedule of classes to determine if any of them should be canceled\
    \ due to insufficient enrollment.\n\nWe use a special type of object called a\
    \ **collection** to organize other objects. Think of a collection like an egg\
    \ carton and the objects it holds like the eggs: both the egg carton and the eggs\
    \ are objects, but with decidedly different properties.\n\n### Collections Are\
    \ Defined by Classes and Must Be Instantiated\n\nThe Java language predefines\
    \ a number of different collection classes. As with any class, a collection object\
    \ must be instantiated before it can be put to work. That is, if we merely declare\
    \ a reference variable to be of a collection type\n\n```\nCollectionType x;\n\
    ```\n\nfor example\n\n```\nArrayList x;  // ArrayList is one of Java's predefined\
    \ collection types.\n```\n\nthen until we “hand” `x` a ***specific*** collection\
    \ object to ***refer*** to, `x` is said to be undefined.\n\nNote the use of less-than\
    \ greater-than symbols to surround/specify the type of object the collection is\
    \ to manage: ArrayList<Student>. We will discuss the concept of generics a bit\
    \ later in this chapter.\n\nWe must take the distinct step of using the `new`\
    \ operator to invoke a specific constructor for the type of collection that we\
    \ wish to create:\n\n```\nx = new CollectionType();\n```\n\nFor example:\n\n```\n\
    x = new ArrayList();\n```\n\nThink of the newly created collection object as an\
    \ ***empty*** egg carton and the reference variable referring to the collection\
    \ as the handle that allows us to locate and access—***reference***—this “egg\
    \ carton” in the JVM’s memory whenever we’d like.\n\nIf we leave the element type\
    \ off the instantiation statement, as in\n\n```\nx = new ArrayList();\n```\n\n\
    then the element type is implied by the declaration of x to be `Student.` I prefer\
    \ to explicitly list the element type."
  trans: "\n6.  回顾你迄今为止学到的关于 Java 和面向对象编程语言（OOPL）的所有知识，列举出所有能够 (a) 促进代码复用以及 (b) 在代码部署后因需求变更而最小化连锁反应的语言机制。\n\
    \n7.  给定以下简单的类：`FarmAnimal`、`Horse` 和 `Cow`\n\n```\n    public class FarmAnimal\
    \ {\n    private String name;\n    public String getName() {\n    return name;\n\
    \    }\n    public void setName(String n) {\n    name = n;\n    }\n    public\
    \ void makeSound() {\n    System.out.println(getName() + \" makes a sound ...\"\
    );\n    }\n    }\n    public class Cow extends FarmAnimal {\n    public void makeSound()\
    \ {\n    System.out.println(getName() + \" goes Moooooo ...\");\n    }\n    }\n\
    \    public class Horse extends FarmAnimal {\n    public void setName(String n)\
    \ {\n    super.setName(n + \" [a Horse]\");\n    }\n    }\n    ```\n\n以下客户端代码会打印出什么？\n\
    \n```\n    Cow c = new Cow();\n    Horse h = new Horse();\n    c.setName(\"Elsie\"\
    );\n    h.setName(\"Mr. Ed\");\n    c.makeSound();\n    h.makeSound();\n    ```\n\
    \n# 6. 对象集合\n\n什么是集合？ 集合由类定义且必须实例化 集合组织对其他对象的引用 集合是封装的 三种通用集合类型 有序列表 字典 集合 作为简单集合的数组\
    \ 声明和实例化数组 访问单个数组元素 初始化数组内容 操作对象数组 一种更复杂的集合类型：ArrayList 类 使用 ArrayList 类：一个示例\
    \ 导入指令和包 类的命名空间 用户自定义包和默认包 泛型 ArrayList 特性 遍历 ArrayList 将 ArrayList 的内容复制到数组中\
    \ HashMap 集合类 TreeMap 类 同一个对象可以被多个集合同时引用 发明我们自己的集合类型 方法 #1：从头设计一个新的集合类 方法 #2：扩展一个预定义的集合类\
    \ (MyIntCollection) 方法 #3：封装一个标准集合 (MyIntCollection2) 方法 #2 与方法 #3 的权衡 作为方法返回类型的集合\
    \ 派生类型的集合 重新审视我们的 Student 类设计 Student 的 courseLoad 属性 Student 的 transcript 属性\
    \ transcript 属性，第二版 我们完成的 Student 数据结构 总结\n\n你在第 3 章中学习了基于类定义创建对象的过程，这个过程被称为**实例化**。当我们只创建少量对象时，我们可以为这些对象声明单独的引用变量：例如，`Student`\
    \ 的 `s1`、`s2` 和 `s3`，或者 `Professor` 的 `profA`、`profB` 和 `profC`。但在其他时候，单独的引用变量是不切实际的：\n\
    \n*   有时，对象数量会太多，例如创建 `Course` 对象来表示大学课程目录中的数百门课程时。\n\n*   更糟糕的是，我们甚至可能***不知道***在***运行时***需要实例化特定类型的多少个对象，因此无法在***编译时***声明预定义数量的引用变量。\n\
    \n幸运的是，面向对象编程语言通过提供一种称为**集合**的特殊对象类别来解决这个问题，该类别用于保存和组织对其他对象的引用。\n\n在本章中，你将学习：\n\
    \n*   三种通用集合类型的属性：**有序列表**、**集合**和**字典**\n\n*   几种不同的预定义 Java 集合类型/类的具体细节，以及我们如何在\
    \ Java 中表示和操作经典数组\n\n*   像集合这样逻辑相关的类如何在 Java 中被捆绑到**包**中，以及如果我们想使用包中包含的类，我们必须如何**导入**包\n\
    \n*   集合如何使我们能够对非常复杂的现实世界概念或情况进行建模\n\n*   发明我们自己的集合类型的设计技巧\n\n## 什么是集合？\n\n我们希望有一种方法可以在对象创建时将它们收集起来，以便我们可以将它们作为一个组进行管理并集体操作，同时在必要时单独引用它们，例如：\n\
    \n*   一位教授可能希望遍历注册了其教授的某门特定课程的所有 `Student` 对象，以便分配他们的期末成绩。\n\n*   学生注册系统（SRS）应用程序作为一个整体，可能需要遍历当前课程表中的所有\
    \ `Course` 对象，以确定是否有任何课程因注册人数不足而应被取消。\n\n我们使用一种称为**集合**的特殊对象类型来组织其他对象。可以把集合想象成一个鸡蛋盒，而它包含的对象就像鸡蛋：鸡蛋盒和鸡蛋都是对象，但具有截然不同的属性。\n\
    \n### 集合由类定义且必须实例化\n\nJava 语言预定义了许多不同的集合类。与任何类一样，集合对象必须先实例化才能投入使用。也就是说，如果我们仅仅声明一个引用变量为集合类型\n\
    \n```\nCollectionType x;\n```\n\n例如\n\n```\nArrayList x;  // ArrayList 是 Java\
    \ 预定义的集合类型之一。\n```\n\n那么，在我们“交给”`x` 一个***特定的***集合对象来***引用***之前，`x` 被认为是未定义的。\n\
    \n注意使用尖括号来包围/指定集合要管理的对象类型：`ArrayList<Student>`。我们将在本章稍后讨论泛型的概念。\n\n我们必须采取明确的步骤，使用\
    \ `new` 运算符来调用我们希望创建的集合类型的特定构造函数：\n\n```\nx = new CollectionType();\n```\n\n例如：\n\
    \n```\nx = new ArrayList();\n```\n\n将新创建的集合对象想象成一个***空的***鸡蛋盒，而引用该集合的引用变量则是一个手柄，允许我们在需要时定位和访问——***引用***——JVM\
    \ 内存中的这个“鸡蛋盒”。\n\n如果我们在实例化语句中省略元素类型，例如\n\n```\nx = new ArrayList();\n```\n\n那么元素类型将由\
    \ `x` 的声明隐含为 `Student`。我倾向于显式列出元素类型。\n"
- fmt: '### Collections Are Encapsulated


    We don’t need to know the private details of how object references are stored
    internally to a specific type of collection in order to use the collection properly;
    we only need to know a collection’s **public features**—in particular, its public
    method headers—in order to choose an appropriate collection type for a particular
    situation and to use it effectively.


    Virtually all collections, regardless of type and regardless of the programming
    language in which they are implemented, provide, at a minimum, methods for:


    - Adding objects

    - Removing objects

    - Retrieving specific individual objects

    - Iterating through the objects in some predetermined order

    - Getting a count of the number of objects presently referenced by the collection

    - Answering a true/false question as to whether a particular object’s reference
    is in the collection or not


    Throughout this chapter, we’ll talk casually about manipulating **objects** in
    collections, but please remember that, with Java, what we really mean is that
    we’re manipulating object **references**.


    ### Three Generic Types of Collection


    Before diving into the specifics of some of Java’s predefined collection classes,
    let’s talk first about the general properties of three basic collection types
    implemented by most OO languages:


    - Ordered lists

    - Dictionaries

    - Sets


    #### Ordered Lists


    An **ordered list** is a type of collection that allows us to insert items in
    a particular order and later retrieve them in that same order. Specific objects
    can also be retrieved based on their position in the list (e.g., we can retrieve
    the first or last or *n*th item).


    The vast majority of collection types—ordered lists included—needn’t be assigned
    an explicit capacity (in terms of “egg-carton compartments”) at the time that
    they are instantiated; collections automatically expand as new items are added.
    Conversely, when an item is removed from most collection types—including ordered
    lists—the “hole” that would have been left behind is automatically closed up,
    as shown in Figure 6-3.


    ![A schematic of arrays of blocks. The top array has 8 blocks with 1 block removed
    and the text, when an item is removed from a collection. The bottom array has
    7 blocks joined with arrows and text, the hole automatically closes up.](images/78624_3_En_6_Chapter/78624_3_En_6_Fig3_HTML.jpg)


    **Figure 6-3** Most collections automatically shrink in size as items are removed


    When we talk about classic arrays as a **particular** type of ordered list later
    in this chapter, we’ll see that they alone have some limitations in this regard.


    By default, items are added at the end of an ordered list, unless explicit instructions
    are given to insert an item at a different position.


    An example of where we might use an ordered list in building our SRS would be
    to manage a waitlist for a course that has become full. Because the order with
    which `Student` objects are added to such a list is preserved, we can be fair
    about selecting students from the waitlist in first-come, first-served fashion
    should seats later become available in the course.


    Several predefined Java classes implement the notion of ordered list collections:
    `ArrayList`, `LinkedList`, `Stack`, `Vector`, etc. We’ll use the `ArrayList` class
    in building the SRS, and so we’ll discuss the details of working with `ArrayList`s
    a bit later in this chapter.


    #### Dictionaries


    A **dictionary**—also known as a **map**—provides a means for storing each object
    reference along with a unique **lookup key** that can later be used to quickly
    retrieve the object (see Figure 6-4).


    The key is often contrived based on a unique combination of one or more of the
    object’s attribute values. For example, a `Student` object’s student ID number
    would make an excellent key, because its value is inherently unique for each `Student`.


    ![A diagram of a key with the label 11111 - 11 is mapped to a table on the right.
    The table has 2 columns and 4 rows. The columns are key and object reference,
    with each row of object reference mapped to a balloon.](images/78624_3_En_6_Chapter/78624_3_En_6_Fig4_HTML.jpg)


    **Figure 6-4** Dictionary collections accommodate direct access by key


    Items in a dictionary can typically also be iterated through one by one, typically
    in ascending key (or some other predetermined) order.


    The SRS might use a dictionary, indexed on course number, to manage its course
    catalog. With so many course offerings to keep track of, being able to “pluck”
    the appropriate `Course` object from a collection directly (instead of having
    to step through an ordered list one by one to find it) adds greatly to the efficiency
    of the application.


    Several examples of predefined Java classes that implement the notion of a dictionary
    are `HashMap`, `Hashtable`, and `TreeMap`. We’ll discuss the details of working
    with these specific collection types a bit later in this chapter.


    #### Sets


    A **set** is an **unordered** collection, which means that there is no way to
    ask for a particular item by number/position once it has been inserted into the
    set. Using a set is analogous to tossing an assortment of differently colored
    marbles into a sack (see Figure 6-5): we can reach into the sack (set) to pull
    out the marbles (objects) one by one, but there is no predictability as to the
    order with which we’ll pull them out as compared with the order in which we put
    them in.


    ![An illustration of a tied sack of marbles. A text reads placing objects in a
    set is like placing marbles in a sack.](images/78624_3_En_6_Chapter/78624_3_En_6_Fig5_HTML.jpg)


    **Figure 6-5** A set is an unordered collection


    We can also perform tests on a set to determine whether or not a given specific
    object has been previously added to the set, just as we can answer the question
    “Is the blue marble in the bag?”


    Note that duplicate entries aren’t allowed in a set. That is, if we were to create
    a set of `Student` object references and a reference to a particular `Student`
    object had already been placed in that set, then a second reference to the **same**
    `Student` object couldn’t be subsequently added to the same set; the set would
    simply ignore our request. This **isn’t** true of collections in general. If warranted
    by the requirements of our application, we can add several references to the **same**
    `Student` object to a given ordered list or dictionary instance, as illustrated
    in Figure 6-6.


    ![An array of 4 blocks. The first and third block is mapped to a balloon. A text
    reads, the same object may be referenced multiple times within the same collection.](images/78624_3_En_6_Chapter/78624_3_En_6_Fig6_HTML.jpg)


    **Figure 6-6** Collections other than sets accommodate multiple references to
    the same object


    An example of where we might use sets in building our SRS would be to group students
    according to the academic departments that they are majoring in. Then, if a particular
    course—say, Biology 216—requires that a student be a biology major in order to
    register, it would be a trivial matter to determine whether or not a particular
    `Student` is a member of the “Biology Department Majors” set.


    Two predefined Java classes that implement the notion of a set are `HashSet` and
    `TreeSet`; we do not use sets in building the SRS and so will not be discussing
    them further.


    > **Note:** Declaring a `TreeSet` that will contain custom object types like `Student`s
    requires that we declare the class as **implementing the `Comparable` interface**.
    We will be discussing interfaces in Chapter 7, but will not be using sets in building
    the SRS.'
