    中的退选按钮用于退选课程。B 中的添加按钮指向 C 并添加课程。


    图 15-3


    控制器监控用户采取的操作（按钮点击），以确定在后台执行哪些操作。（圆圈中的数字与下面编号事件列表中的条目相对应。）


    1.  如果学生在网页 A 上输入其学生 ID 和密码并点击登录按钮，控制器将使用学生在 STUDENTID 和 PASSWORD 输入字段中提供的信息，调用
    SRSPersistenceLayer 的 initialize() 方法来查询数据库中具有这些凭据的学生；如果登录成功，控制器将在执行该页面中的嵌入式代码以显示学生当前的课程列表后，显示网页
    B。

    2.  如果学生在网页 B 上点击添加按钮，控制器将使用 SRSPersistenceLayer 查询数据库中所有可用课程的列表；然后，控制器将在执行网页
    C 中的代码以将所有课程显示为列表后，显示网页 C。

    3.  如果学生在网页 C 上选择了一门课程并点击注册按钮，控制器将更新学生对象的课程负载，使用 SRSPersistenceLayer 将新更新的学生数据存储到数据库中，并在重新运行代码以显示所有学生已注册课程（以便新添加的课程出现）后，返回到网页
    B。

    4.  网页 C 上的“返回课程负载”按钮的功能与网页 C 上的“注册”按钮类似。

    5.  如果学生正在查看页面 B 并想要退选一个课程，他们从列表中选择该课程并点击退选按钮。控制器将更新学生对象的课程负载，使用数据层将新更新的学生数据存储到数据库中，并通过重新运行代码来刷新页面
    B，以显示所有学生已注册课程（已移除退选的课程）。

    6.  点击屏幕 B 上的注销按钮将断开与会话的数据库连接，注销学生，并重新显示登录页面 A。


