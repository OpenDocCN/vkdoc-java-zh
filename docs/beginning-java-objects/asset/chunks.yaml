    A `for` statement is a programming construct that is used to execute one or more
    statements a certain number of times. The general syntax of the `for` statement
    is as follows:


    ```

    for (initializer; condition; iterator) {

    code to execute while condition evaluates to true

    }

    ```


    A `for` statement defines three elements that are separated by semicolons and
    placed in parentheses after the `for` keyword: the **initializer**, the **condition**,
    and the **iterator**. The ***initializer*** is used to provide an initial value
    for a **loop control variable**. The variable can be declared as part of the initializer,
    or it can be declared earlier in the code, ahead of the `for` statement, for example:


    ```

    // The loop control variable ''i'' is declared within the for statement:

    for (int i = 0; condition; iterator) {

    code to execute while condition evaluates to true

    }

    // Note that i is no longer recognized by the compiler when the ''for'' loop exits,

    // because it was effectively declared within the ''for'' loop – we''ll talk about
    the

    // scope of a variable later in this chapter.

    ```


    or


    ```

    // The loop control variable ''i'' is declared prior to the start of the ''for''
    loop:

    int i;

    for (i = 0; condition; iterator) {

    code to execute while condition evaluates to true

    }

    ```


    The ***condition*** is a logical expression that typically involves the loop control
    variable:


    ```

    for (int i = 0; i < 5; iterator) {

    code to execute as long as the value of i remains less than 5

    }

    ```


    The ***iterator*** typically increments or decrements the loop control variable:


    ```

    for (int i = 0; i < 5; i++) {

    code to execute as long as the value of i remains less than 5

    }

    ```


    Again, note the use of a semicolon (`;`) after the initializer and condition,
    but ***not*** after the iterator.


    Here’s a breakdown of how a `for` loop operates:


    1.  When program execution reaches a `for` statement, the initializer is executed
    first (and only once).


    2.  The ***condition*** is then evaluated. If the condition evaluates to `true`,
    the block of code following the parentheses is executed.


    3.  After the block of code finishes, the iterator is executed.


    4.  The condition is then reevaluated. If the condition is still `true`, the block
    of code is executed once again, followed by execution of the iterator statement.


    This process repeats until the condition becomes `false`, at which point the `for`
    loop terminates.


    Here’s a simple example that uses nested `for` statements to generate a simple
    multiplication table. The loop control variables, `j` and `k`, are declared inside
    their respective `for` statements. As long as the conditions in the respective
    `for` statements are met, the block of code following the `for` statement is executed.
    The `++` operator is used to increment the values of `j` and `k` each time the
    respective block of code is executed:


    ```

    public class ForDemo {

    public static void main(String[] args) {

    // Compute a simple multiplication table.

    for (int j = 1; j <= 4; j++) {

    for (int k = 1; k <= 4; k++) {

    System.out.println(j + " * " + k + " = " + (j * k));

    }

    }

    }

    }

    ```


