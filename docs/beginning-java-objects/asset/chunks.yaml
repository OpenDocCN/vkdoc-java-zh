- fmt: '### Section Attributes


    In addition to the following handful of relatively simple attributes:


    ```

    //------------

    // Attributes.

    //------------

    private int sectionNo;

    private char dayOfWeek;

    private String timeOfDay;

    private String room;

    private int seatingCapacity;

    ```


    the `Section` class participates in numerous relationships with other classes:


    - ***offered as***, a one-to-many association with `Course`

    - An unnamed, one-to-many aggregation with `ScheduleOfClasses`

    - ***teaches***, a one-to-many association with `Professor`

    - ***attends***, a many-to-many association with `Student`


    The *attends* association is in turn affiliated with an association class, `TranscriptEntry`.
    You learned in Chapter [10](#78624_3_En_10_Chapter.xhtml) that an association
    class can alternatively be depicted in a class diagram as having direct relationships
    with the classes at either end of the association, as shown in Figure [14-8](#78624_3_En_14_Chapter.xhtml#Fig8).


    ![](images/78624_3_En_14_Chapter/78624_3_En_14_Fig8_HTML.jpg)


    The block diagrams of the student and section are directly connected to the transcript
    entry and transcript. The student is connected to the section via attends to earn
    grades and maintain the transcript.


    **Figure 14-8** An alternative UML representation of the `TranscriptEntry` association
    class


    And so we’ll encode a fifth relationship for the `Section` class, namely:


    - ***assigns grade***, a one-to-many association with the `TranscriptEntry` class


    (You may be wondering whether we should now go back and adjust the `Student` class
    to reflect the *earns grade* association with the `TranscriptEntry` class as a
    `Student` class attribute. The decision of whether or not to implement a particular
    relationship in code depends in part on what we anticipate our usage patterns
    to be, as discussed in Chapter [10](#78624_3_En_10_Chapter.xhtml). We’ll defer
    the decision of what to do with *earns grade* until we talk about the `TranscriptEntry`
    class in a bit more depth later in this chapter.)


    We’ll represent these five relationships in terms of `Section` attributes as follows:


    - A `Section` object need only maintain a handle on one other object for those
    one-to-many relationships in which `Section` occupies the “many” end, namely:


    ```

    private Course representedCourse;

    private ScheduleOfClasses offeredIn;

    private Professor instructor;

    ```


    - For the two situations in which `Section` needs to maintain handles on ***collections***
    of objects—`Student`s and `TranscriptEntry`s—we are going to employ `HashMap`s
    instead of `ArrayList`s this time. We do so because it is conceivable that we’ll
    have a frequent need to “pluck” a given item from the collection directly, and
    a `HashMap`—as a dictionary-type collection—provides a key-based lookup mechanism
    that is ideal for this purpose.


    - For the `HashMap` of `Student` object references, we’ll use a `String` representing
    the `Student`’s Social Security number (`ssn`) as a key for looking up a `Student`:


    ```

    // The enrolledStudents HashMap stores Student object references,

    // using each Student''s ssn as a String key.

    private HashMap enrolledStudents;

    ```


    - For the `HashMap` of `TranscriptEntry` object references, on the other hand,
    we’ll use a `Student` object as a whole as a key for looking up that particular
    `Student`’s `TranscriptEntry` as issued by this `Section`:


    ```

    // The assignedGrades HashMap stores TranscriptEntry object

    // references, using a reference to the Student to whom it belongs

    // as the key.

    private HashMap assignedGrades;

    ```


    ### The Use of an Enum(eration) Type


    In the `Section` class, we encounter our first use of an `enum`(eration), which
    as you learned in Chapter [13](#78624_3_En_13_Chapter.xhtml) is an excellent means
    of defining a finite list of symbolic values. In this particular situation, we
    want to define some status codes that the `Section` class can use when signaling
    the outcome of an enrollment attempt.


    We discussed the syntax of an `enum` type in detail in Chapter [13](#78624_3_En_13_Chapter.xhtml).
    The following code defines four symbolic values to represent four different outcomes
    of an enrollment attempt—`success`, `secFull`, `prereq`, and `prevEnroll`—each
    of which correlates to a `String` value as indicated:


    ```

    public enum EnrollmentStatus {

    // Enumerate the values that the enum can assume.

    success("enrollment successful!  :o)"),

    secFull("enrollment failed:  section was full.  :op"),

    prereq("enrollment failed; prerequisites not satisfied.  :op"),

    prevEnroll("enrollment failed; previously enrolled.  :op");

    // This represents the value of an enum instance.

    private final String value;

    // A "constructor" of sorts (used above).

    EnrollmentStatus(String value) {

    this.value = value;

    }

    // Accessor for the value of an enum instance.

    public String value() {

    return value;

    }

    }

    ```


    Let’s look at how these values are put to use by studying the `enroll` method
    of `Section`.'
