- fmt: '# Our “Completed” Student Registration System Class Diagram


    By applying all that we’ve covered in this chapter about static modeling, we can
    produce the UML class diagram for the SRS shown in Figure [10-57](#78624_3_En_10_Chapter.xhtml#Fig57).
    Of course, as I’ve said repeatedly, this isn’t the only correct way to model the
    requirements, nor is it necessarily the “best” model that we could have produced;
    but it is an accurate, concise, and correct model of the static aspects of the
    problem to be automated.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig57_HTML.jpg)


    A model diagram represents the interconnection among multiple blocks denoting
    professor, person, student, plan of study, course, section, transcript entry,
    and transcript. It denotes distinct attributes of each variable.


    **Figure 10-57** Our “completed” SRS class diagram


    There are a few things worth noting.


    We opted to use the “generic” **many** notation (`*` for the UML) rather than
    specifying `0..*` or `1..*`; this is often adequate during the initial modeling
    stages of a project.


    Note that we’ve reflected two separate many-to-many associations between the `Student`
    and `Section` classes: *waitlisted for* and *attends*. A given `Student` may be
    waitlisted for many different `Section`s, and they may be registered for/attending
    many **other** `Section`s. What this model doesn’t reflect is the fact that a
    `Student` is **not** permitted to simultaneously be attending and waitlisted for
    the **same** `Section`. Constraints such as these can be reflected as textual
    notes on the diagram, enclosed in curly braces, or omitted from the diagram but
    spelled out in the data dictionary. In the diagram excerpt in Figure [10-58](#78624_3_En_10_Chapter.xhtml#Fig58),
    we use the annotation `{ xor }` to represent an “exclusive or” situation between
    the two associations: a `Student` can either be *waitlisted* for or *attending*
    a given `Section`, but not both.


    As mentioned earlier in this chapter, we’re able to get by with a single *attends*
    association to handle both the `Section`s that a `Student` is currently attending
    and those that they have attended in the past. The date of attendance—past or
    present—is reflected by the “semester” attribute of the `Section` class; also,
    for any courses that are currently in progress, the value of the “grade” attribute
    of the `TranscriptEntry` association class would be as of yet undetermined.


    We could have also reflected an association class on the *waitlisted for* association
    representing a given `Student`’s position in the waitlist for a particular `Section`,
    and then we could have gone on to model the notion of a `WaitList` as an aggregation
    of `WaitListEntry` objects (see Figure [10-58](#78624_3_En_10_Chapter.xhtml#Fig58)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig58_HTML.jpg)


    A block diagram represents the relation between 4 blocks labeled student, section,
    waitlist, and waitlist entry. It explains the student attends the section. The
    section has a waitlist. The waitlist is comprised of the waitlist entry, where
    the data type is Integer.


    **Figure 10-58** A `WaitList` can be modeled as an aggregation of `WaitListEntry`
    objects


    Since we’re going to want to use the object model to gain user confirmation that
    we understand their primary requirements, we needn’t clutter the diagram with
    such behind-the-scenes implementation details just yet, however.


    We renamed the association class for the *attends* relationship; it was introduced
    earlier in this chapter as `GradeReceived`, but is now called `TranscriptEntry`.
    We’ve also introduced an aggregation relationship between the `TranscriptEntry`
    class and another new class called `Transcript` (see Figure [10-59](#78624_3_En_10_Chapter.xhtml#Fig59)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig59_HTML.jpg)


    A block diagram represents the interaction between the blocks labeled student,
    section, transcript entry, and transcript. It explains the student attends a section
    and the section has a waitlist for students. The transcript entry comprises the
    grade. The transcript maintains the entries of the student.


    **Figure 10-59** A `Transcript` is an aggregation of `TranscriptEntry` objects


    Let’s explore how all of this evolved.


    When the *attends* association was first introduced earlier in this chapter, we
    portrayed it as shown in Figure [10-60](#78624_3_En_10_Chapter.xhtml#Fig60).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig60_HTML.jpg)


    A block diagram explains the student attends a section. The student receives a
    grade. The data type for the grade is String.


    **Figure 10-60** Initial portrayal of the attends association


    We then realized that it could equivalently be represented as a **pair** of one-to-many
    associations *issues* and *receives* (see Figure [10-61](#78624_3_En_10_Chapter.xhtml#Fig61)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig61_HTML.jpg)


    A block diagram explains a student receives a grade, and the section issues a
    grade. The data type of grade is String. It also denotes that the student attends
    the section.


    **Figure 10-61** The attends association may be portrayed alternatively as issues
    and receives


    In this alternative form, it’s clear that any individual `GradeReceived` object
    maintains one handle on a `Student` object and another handle on a `Section` object
    and can ask either of them for information whenever necessary. The `Section` object,
    in turn, maintains a handle on the `Course` object that it represents by virtue
    of the *offered as* association. It’s a trivial matter, therefore, for the `GradeReceived`
    object to request the values of attributes `semester`, `courseNo`, `courseName`,
    and `credits` from the `Section` object (which would in turn have to ask its associated
    `Course` object for the last three of these four values); this is illustrated
    conceptually in Figure [10-62](#78624_3_En_10_Chapter.xhtml#Fig62).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig62_HTML.jpg)


    A block diagram represents the interactions between the student, grade, section,
    and course. A text at the top reads, if the grade received object pulls these
    values together, we have a transcript entry. It also indicates the fields related
    to each element.


    **Figure 10-62** `GradeReceived` has access to all of the makings of a `TranscriptEntry`


    If the `GradeReceived` object pulls these values together, we have everything
    that we need for a line item entry on a student’s transcript, as shown in Figure
    [10-63](#78624_3_En_10_Chapter.xhtml#Fig63).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig63_HTML.jpg)


    A rectangular block represents a table titled transcript for Joe Blow. The table
    exhibits the details of the course number, credits, course name, grade received,
    and credits earned. The name of the semester reads spring 2005. A text at the
    bottom explains the definition of credits earned.


    **Figure 10-63** A sample transcript report


    Therefore, we see that renaming the association class from `GradeReceived` to
    `TranscriptEntry` makes good sense. It was then a natural step to aggregate these
    into a `Transcript` class.


    Our SRS diagram is a little “light” in terms of attributes; we’ve reflected only
    those that we’ll minimally need when we code the model layer of the SRS in Part
    3.


    Of course, we now need to go back to the data dictionary to capture definitions
    of all of the new attributes, relationships, and classes that we’ve identified
    in putting together this model. The following sidebar shows our revised SRS data
    dictionary.


    ## The Revised SRS Data Dictionary


    **Classes**'
  raw: '## Our “Completed” Student Registration System Class Diagram


    By applying all that we’ve covered in this chapter about static modeling, we can
    produce the UML class diagram for the SRS shown in Figure [10-57](#78624_3_En_10_Chapter.xhtml#Fig57).
    Of course, as I’ve said repeatedly, this isn’t the only correct way to model the
    requirements, nor is it necessarily the “best” model that we could have produced;
    but it is an accurate, concise, and correct model of the static aspects of the
    problem to be automated.


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig57_HTML.jpg)


    A model diagram represents the interconnection among multiple blocks denoting
    professor, person, student, plan of study, course, section, transcript entry,
    and transcript. It denotes distinct attributes of each variable.


    Figure 10-57


    Our “completed” SRS class diagram


    There are a few things worth noting.


    We opted to use the “generic” ***many*** notation (`*` for the UML) rather than
    specifying `0..*` or `1..*`; this is often adequate during the initial modeling
    stages of a project.


    Note that we’ve reflected two separate many-to-many associations between the `Student`
    and `Section` classes: *waitlisted for* and *attends*. A given `Student` may be
    waitlisted for many different `Section`s, and they may be registered for/attending
    many ***other*** `Section`s. What this model doesn’t reflect is the fact that
    a `Student` is ***not*** permitted to simultaneously be attending and waitlisted
    for the ***same*** `Section`. Constraints such as these can be reflected as textual
    notes on the diagram, enclosed in curly braces, or omitted from the diagram but
    spelled out in the data dictionary. In the diagram excerpt in Figure [10-58](#78624_3_En_10_Chapter.xhtml#Fig58),
    we use the annotation `{ xor }` to represent an “exclusive or” situation between
    the two associations: a `Student` can either be *waitlisted* for or *attending*
    a given `Section`, but not both.


    As mentioned earlier in this chapter, we’re able to get by with a single *attends*
    association to handle both the `Section`s that a `Student` is currently attending
    and those that they have attended in the past. The date of attendance—past or
    present—is reflected by the “semester” attribute of the `Section` class; also,
    for any courses that are currently in progress, the value of the “grade” attribute
    of the `TranscriptEntry` association class would be as of yet undetermined.


    We could have also reflected an association class on the *waitlisted for* association
    representing a given `Student`’s position in the waitlist for a particular `Section`,
    and then we could have gone on to model the notion of a `WaitList` as an aggregation
    of `WaitListEntry` objects (see Figure [10-58](#78624_3_En_10_Chapter.xhtml#Fig58)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig58_HTML.jpg)


    A block diagram represents the relation between 4 blocks labeled student, section,
    waitlist, and waitlist entry. It explains the student attends the section. The
    section has a waitlist. The waitlist is comprised of the waitlist entry, where
    the data type is Integer.


    Figure 10-58


    A `WaitList` can be modeled as an aggregation of `WaitListEntry` objects


    Since we’re going to want to use the object model to gain user confirmation that
    we understand their primary requirements, we needn’t clutter the diagram with
    such behind-the-scenes implementation details just yet, however.


    We renamed the association class for the *attends* relationship; it was introduced
    earlier in this chapter as `GradeReceived`, but is now called `TranscriptEntry`.
    We’ve also introduced an aggregation relationship between the `TranscriptEntry`
    class and another new class called `Transcript` (see Figure [10-59](#78624_3_En_10_Chapter.xhtml#Fig59)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig59_HTML.jpg)


    A block diagram represents the interaction between the blocks labeled student,
    section, transcript entry, and transcript. It explains the student attends a section
    and the section has a waitlist for students. The transcript entry comprises the
    grade. The transcript maintains the entries of the student.


    Figure 10-59


    A `Transcript` is an aggregation of `TranscriptEntry` objects


    Let’s explore how all of this evolved.


    When the *attends* association was first introduced earlier in this chapter, we
    portrayed it as shown in Figure [10-60](#78624_3_En_10_Chapter.xhtml#Fig60).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig60_HTML.jpg)


    A block diagram explains the student attends a section. The student receives a
    grade. The data type for the grade is String.


    Figure 10-60


    Initial portrayal of the attends association


    We then realized that it could equivalently be represented as a ***pair*** of
    one-to-many associations *issues* and *receives* (see Figure [10-61](#78624_3_En_10_Chapter.xhtml#Fig61)).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig61_HTML.jpg)


    A block diagram explains a student receives a grade, and the section issues a
    grade. The data type of grade is String. It also denotes that the student attends
    the section.


    Figure 10-61


    The attends association may be portrayed alternatively as issues and receives


    In this alternative form, it’s clear that any individual `GradeReceived` object
    maintains one handle on a `Student` object and another handle on a `Section` object
    and can ask either of them for information whenever necessary. The `Section` object,
    in turn, maintains a handle on the `Course` object that it represents by virtue
    of the *offered as* association. It’s a trivial matter, therefore, for the `GradeReceived`
    object to request the values of attributes `semester`, `courseNo`, `courseName`,
    and `credits` from the `Section` object (which would in turn have to ask its associated
    `Course` object for the last three of these four values); this is illustrated
    conceptually in Figure [10-62](#78624_3_En_10_Chapter.xhtml#Fig62).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig62_HTML.jpg)


    A block diagram represents the interactions between the student, grade, section,
    and course. A text at the top reads, if the grade received object pulls these
    values together, we have a transcript entry. It also indicates the fields related
    to each element.


    Figure 10-62


    `GradeReceived` has access to all of the makings of a `TranscriptEntry`


    If the `GradeReceived` object pulls these values together, we have everything
    that we need for a line item entry on a student’s transcript, as shown in Figure
    [10-63](#78624_3_En_10_Chapter.xhtml#Fig63).


    ![](images/78624_3_En_10_Chapter/78624_3_En_10_Fig63_HTML.jpg)


    A rectangular block represents a table titled transcript for Joe Blow. The table
    exhibits the details of the course number, credits, course name, grade received,
    and credits earned. The name of the semester reads spring 2005\. A text at the
    bottom explains the definition of credits earned.


    Figure 10-63


    A sample transcript report


    Therefore, we see that renaming the association class from `GradeReceived` to
    `TranscriptEntry` makes good sense. It was then a natural step to aggregate these
    into a `Transcript` class.


    Our SRS diagram is a little “light” in terms of attributes; we’ve reflected only
    those that we’ll minimally need when we code the model layer of the SRS in Part
    3.


    Of course, we now need to go back to the data dictionary to capture definitions
    of all of the new attributes, relationships, and classes that we’ve identified
    in putting together this model. The following sidebar shows our revised SRS data
    dictionary.


    THE REVISED SRS DATA DICTIONARY


    **Classes**'
  trans: '

    ## 我们“完成”的学生注册系统类图


    通过应用本章关于静态建模所涵盖的所有内容，我们可以为 SRS 生成如图 10-57 所示的 UML 类图。当然，正如我反复强调的，这并不是对需求进行建模的唯一正确方法，也未必是我们能得出的“最佳”模型；但它是对待自动化问题的静态方面的一个准确、简洁且正确的模型。


    ![](img/78624_3_En_10_Fig57_HTML.jpg)


    一个模型图展示了多个模块之间的相互连接，这些模块分别代表教授、人员、学生、学习计划、课程、教学班、成绩单条目和成绩单。它标明了每个变量的不同属性。


    图 10-57


    我们“完成”的 SRS 类图


    有几点值得注意。


    我们选择使用“通用”的 ***多*** 重数标记（UML 中的 `*`），而不是指定 `0..*` 或 `1..*`；这在项目的初始建模阶段通常已经足够。


    请注意，我们在 `Student` 和 `Section` 类之间反映了两个独立的多对多关联：*等待列表* 和 *参加*。一个给定的 `Student` 可能被列入多个不同
    `Section` 的等待列表，同时他们也可能注册/参加许多 ***其他*** `Section`。这个模型没有反映的是，一个 `Student` ***不能***
    同时参加和等待同一个 `Section`。像这样的约束可以在图上用花括号括起来的文本注释来反映，或者从图中省略但在数据字典中详细说明。在图 10-58 的图例摘录中，我们使用注释
    `{ xor }` 来表示两个关联之间的“异或”情况：一个 `Student` 要么被列入给定 `Section` 的*等待列表*，要么*参加*该 `Section`，但不能同时进行。


    正如本章前面提到的，我们可以通过一个单一的 *attends* 关联来处理 `Student` 当前正在参加的 `Section` 以及过去参加过的 `Section`。参加日期——过去或现在——由
    `Section` 类的“semester”属性反映；此外，对于任何正在进行的课程，`TranscriptEntry` 关联类的“grade”属性值目前尚未确定。


    我们本可以在 *waitlisted for* 关联上反映一个关联类，表示给定 `Student` 在特定 `Section` 等待列表中的位置，然后我们可以继续将
    `WaitList` 的概念建模为 `WaitListEntry` 对象的聚合（见图 10-58）。


    ![](img/78624_3_En_10_Fig58_HTML.jpg)


    一个框图展示了标记为学生、教学班、等待列表和等待列表条目的四个模块之间的关系。它解释了学生参加教学班。教学班有一个等待列表。等待列表由等待列表条目组成，其数据类型为整数。


    图 10-58


    `WaitList` 可以建模为 `WaitListEntry` 对象的聚合


    然而，由于我们打算使用对象模型来获得用户对我们理解其主要需求的确认，我们暂时不必用这些幕后的实现细节来使图表变得杂乱。


    我们重命名了 *attends* 关系的关联类；它在本章前面被引入时称为 `GradeReceived`，但现在被称为 `TranscriptEntry`。我们还引入了
    `TranscriptEntry` 类与另一个名为 `Transcript` 的新类之间的聚合关系（见图 10-59）。


    ![](img/78624_3_En_10_Fig59_HTML.jpg)


    一个框图展示了标记为学生、教学班、成绩单条目和成绩单的模块之间的交互。它解释了学生参加一个教学班，并且教学班有学生的等待列表。成绩单条目包含成绩。成绩单维护学生的条目。


    图 10-59


    `Transcript` 是 `TranscriptEntry` 对象的聚合


    让我们探讨这一切是如何演变的。


    当本章前面首次引入 *attends* 关联时，我们将其描绘如图 10-60 所示。


    ![](img/78624_3_En_10_Fig60_HTML.jpg)


    一个框图解释了学生参加一个教学班。学生收到一个成绩。成绩的数据类型是字符串。


    图 10-60


    attends 关联的初始描绘


    然后我们意识到，它可以等效地表示为一***对*** 一对多关联 *issues* 和 *receives*（见图 10-61）。


    ![](img/78624_3_En_10_Fig61_HTML.jpg)


    一个框图解释了学生收到一个成绩，教学班发布一个成绩。成绩的数据类型是字符串。它还表示学生参加该教学班。


    图 10-61


    attends 关联可以替代性地描绘为 issues 和 receives


    在这种替代形式中，很明显任何单个 `GradeReceived` 对象都持有一个指向 `Student` 对象的句柄和另一个指向 `Section` 对象的句柄，并且可以在需要时向它们中的任何一个请求信息。反过来，`Section`
    对象通过 *offered as* 关联持有一个指向它所代表的 `Course` 对象的句柄。因此，对于 `GradeReceived` 对象来说，向 `Section`
    对象请求属性 `semester`、`courseNo`、`courseName` 和 `credits` 的值是一件简单的事情（而 `Section` 对象又必须向其关联的
    `Course` 对象请求这四个值中的后三个）；这在概念上如图 10-62 所示。


    ![](img/78624_3_En_10_Fig62_HTML.jpg)


    一个框图展示了学生、成绩、教学班和课程之间的交互。顶部有一段文字：如果 GradeReceived 对象将这些值整合在一起，我们就得到了一个成绩单条目。它还指出了与每个元素相关的字段。


    图 10-62


    `GradeReceived` 可以访问构成 `TranscriptEntry` 的所有要素


    如果 `GradeReceived` 对象将这些值整合在一起，我们就拥有了学生成绩单上一条明细条目所需的一切，如图 10-63 所示。


    ![](img/78624_3_En_10_Fig63_HTML.jpg)


    一个矩形框代表一个标题为“Joe Blow 的成绩单”的表格。该表格展示了课程编号、学分、课程名称、所获成绩和已获学分的详细信息。学期名称显示为“2005
    年春季”。底部有一段文字解释了已获学分的定义。


    图 10-63


    一份示例成绩单报告


    因此，我们看到将关联类从 `GradeReceived` 重命名为 `TranscriptEntry` 是很有意义的。然后，将这些聚合到一个 `Transcript`
    类中就是一个自然的步骤了。


    我们的 SRS 图在属性方面有点“单薄”；我们只反映了在第三部分编写 SRS 模型层时最低限度需要的那些属性。


    当然，我们现在需要回到数据字典，以捕获我们在构建此模型时确定的所有新属性、关系和类的定义。下面的侧边栏显示了我们修订后的 SRS 数据字典。


    修订后的 SRS 数据字典


    **类**

    '
- fmt: '# 术语定义


    - **Course:** 一个学期内的一系列讲座、作业、考试等，均与特定学科领域相关，通常对应特定数量的学分，是攻读学位的学习单元。例如，“Beginning
    Objects”是信息系统工程理学硕士学位的必修课程。


    - **Person:** 与大学相关的人类个体。


    - **PlanOfStudy:** 学生为满足特定学位的课程要求而计划修读的课程列表。


    - **Professor:** 教授某个教学班（`Section`）或指导学生（`Student`）的教职员工。


    - **Section:** 特定课程在特定学期、特定星期几和特定时间段的授课安排。（例如，课程“Beginning Objects”在2025年春季学期每周一13:00至15:00授课。）


    - **Student:** 当前在大学注册，并有资格注册一个或多个教学班（`Section`）的人员。


    - **Transcript:** 某位学生（`Student`）在本大学迄今为止所修所有课程（`Course`）的记录，包括每门课程（`Course`）的修读学期、所得成绩和授予的学分，并反映累计获得的总学分以及该学生（`Student`）的绩点（GPA）。


    - **TranscriptEntry:** 成绩单（`Transcript`）中的单个条目，反映课程（`Course`）编号和名称、修读学期、学分值和所得成绩。


    # 关系


    - **Advises—教授指导学生:** 教授被指派在整个学生的学术生涯中监督其学术追求，直至学生获得学位。导师就课程选择、专业机会以及学生可能遇到的任何学业问题向其指导对象提供咨询。


    - **Attends—学生参加教学班:** 学生注册某个教学班（`Section`），参加一个学期的课堂会议，并完成所有作业和考试，最终获得代表学生对该学科掌握程度的字母等级。


    - **Calls for—学习计划要求修读课程:** 学生只有在学习计划（`PlanOfStudy`）中列出的课程（`Course`）才能修读。学习计划可在学生导师批准后进行修改。


    - **Maintains—学生维护成绩单:** 每次学生完成一门课程（`Course`），该课程及所得成绩的记录都会被添加到学生的成绩单（`Transcript`）中。


    - **Observes—学生遵循学习计划:** 参见“`Calls for`”关联的说明。


    - **Offered as—课程以教学班形式提供:** 同一门课程（`Course`）可以在给定学期内多次授课，当然也可以在课程的“生命周期”内跨多个学期授课——即，直到该学科内容被认为对学生群体不再有价值，或没有合格的教师来教授该课程为止。


    - **Prerequisite—一门课程是另一门课程的先修课程:** 如果确定课程A的学科内容是理解课程B学科内容的必要背景，则课程A被称为课程B的先修课程。学生通常不能修读课程B，除非他们已成功完成课程A，或者能够以其他方式证明掌握了课程A的学科内容。


    - **Teaches—教授教授教学班:** 教授负责授课、布置有深度的家庭作业、考核学生，并确保向学生提供高质量的课程学科内容。


    - **Waitlisted for—学生被列入教学班候补名单:** 如果一个教学班（`Section`）“已满”——例如，基于教室容量或被认为有效的教学学生组规模，注册该课程的最大学生数——那么有兴趣的学生可能会被列入候补名单，以便在该课程后续有空位时获得考虑。


    （`Transcript` 和 `TranscriptEntry` 之间的聚合关系）


    （`Person` 作为 `Professor` 的特化）


    （`Person` 作为 `Student` 的特化）


    # 属性


    - **Person.ssn:** 分配给个人的唯一社会安全号码（SSN）。


    - **Person.name:** 个人姓名，格式为“姓, 名”。


    - **Professor.title:** 教授获得的职称（例如，“兼职教授”）。


    - **Student.major:** 反映学生主要学习的院系（例如，数学）。（我们假设学生只能指定一个主修专业。）


    - **Student.degree:** 学生正在攻读的学位（例如，理学硕士学位）。


    - **TranscriptEntry.grade:** 字母等级A、B、C、D或F，可带有可选的+/-后缀，例如A+或C–。


    - **Course.courseNo:** 分配给课程的唯一ID，由院系代号加上院系内的唯一数字ID组成（例如，`MATH 101`）。


    - **Course.courseName:** 描述课程学科内容的完整名称（例如，“Beginning Objects”）。


    - **Course.credits:** 一门课程所值的单元数或学分数，大致相当于一周内在课堂上的小时数（通常，全学期讲座课程为三个学分）。


    - **Section.sectionNo:** 用于区分特定课程的一个教学班/授课安排与同一学期同一课程的另一授课安排的唯一编号（例如，`MATH 101`，教学班编号1）。


    - **Section.dayOfWeek:** 讲座课程上课的星期几。


    - **Section.timeOfDay:** 课程上课的时间（范围）（例如，14:00至16:00）。


    - **Section.semester:** 表示教学班开设的学期（例如，2025年春季）。


    - **Section.room:** 教学班上课的建筑和房间号（例如，创新厅，333室）。


    - **Section.seatingCapacity:** 允许注册教学班的最大学生人数。'
  raw: '*   ***Course:*** A semester-long series of lectures, assignments, exams,
    etc. that all relate to a particular subject area and that are typically associated
    with a particular number of credit hours, a unit of study toward a degree. For
    example, Beginning Objects is a required **course** for the Master of Science
    degree in information systems technology.


    *   ***Person:*** A human being associated with the university.


    *   ***PlanOfStudy:*** A list of the **courses** that a student intends to take
    to fulfill the **course** requirements for a particular degree.


    *   ***Professor:*** A member of the faculty who teaches **sections** or advises
    **students**.


    *   ***Section:*** The offering of a particular **course** during a particular
    semester on a particular day of the week and at a particular time of day. (For
    example, **course** Beginning Objects is taught in the Spring 2025 semester on
    Mondays from 1:00 to 3:00 p.m.)


    *   ***Student:*** A person who is currently enrolled at the university and who
    is eligible to register for one or more **sections**.


    *   ***Transcript:*** A record of all of the **courses** taken to date by a particular
    **student** at this university, including which semester each **course** was taken
    in, the grade received, and the credits granted for the **course**, as well as
    reflecting an overall total number of credits earned and the **student’s** grade
    point average (GPA).


    *   ***TranscriptEntry:*** A single line item from a **transcript**, reflecting
    the **course** number and name, semester taken, value in credit hours, and grade
    received.


    **Relationships**


    *   ***Advises—a professor advises a student:*** A professor is assigned to oversee
    a student’s academic pursuits for the student’s entire academic career, leading
    up to their attainment of a degree. An advisor counsels their advisees regarding
    course selection, professional opportunities, and any academic problems the student
    might be having.


    *   ***Attends—a student attends a section:*** A student registers for a section,
    attends class meetings for a semester, and participates in all assignments and
    examinations, culminating in the award of a letter grade representing the student’s
    mastery of the subject matter.


    *   ***Calls for—a plan of study calls for a course:*** A student may take a course
    only if it’s called out by their plan of study. The plan of study may be amended,
    with a student’s advisor’s approval.


    *   ***Maintains—a student maintains a transcript:*** Each time a student completes
    a course, a record of the course and the grade received is added to the student’s
    transcript.


    *   ***Observes—a student observes a plan of study:*** See notes for the ***calls
    for*** association.


    *   ***Offered as—a course is offered as a section:*** The same course can be
    taught numerous times in a given semester and of course over numerous semesters
    for the “lifetime” of a course—that is, until such time as the subject matter
    is no longer considered to be of value to the student body or there is no qualified
    faculty to teach the course.


    *   ***Prerequisite—a course is a prerequisite for another course:*** If it’s
    determined that the subject matter of a course A is necessary background to understanding
    the subject matter of a course B, then course A is said to be a prerequisite of
    course B. A student typically may not take course B unless they have either successfully
    completed course A or can otherwise demonstrate mastery of the subject matter
    of course A.


    *   ***Teaches—a professor teaches a section:*** A professor is responsible for
    delivering lectures, assigning thoughtful homework assignments, examining students,
    and otherwise ensuring that a quality treatment of the subject matter of a course
    is made available to students.


    *   ***Waitlisted for—a student is waitlisted for a section:*** If a section is
    “full”—for example, the maximum number of students signed up for the course based
    on either the classroom capacity or the student group size deemed effective for
    teaching—then interested students may be placed on a waitlist, to be given consideration
    should seats in the course subsequently become available.


    (aggregation between Transcript and TranscriptEntry)


    (specialization of Person as Professor)


    (specialization of Person as Student)


    **Attributes**


    *   ***Person.ssn:*** The unique Social Security number (SSN) assigned to an individual.


    *   [***Person.name:***](http://person.name) The person’s name, in “last name,
    first name” order.


    *   ***Professor.title:*** The rank attained by the professor (e.g., “Adjunct
    Professor”).


    *   ***Student.major:*** A reflection of the department in which a student’s primary
    studies lie (e.g., Mathematics). (We assume that a student may designate only
    a single major.)


    *   ***Student.degree:*** The degree that a student is pursuing (e.g., Master
    of Science degree).


    *   ***TranscriptEntry.grade:*** A letter grade of A, B, C, D, or F, with an optional
    +/– suffix, such as A+ or C–.


    *   ***Course.courseNo:*** A unique ID assigned to a course, consisting of the
    department designation plus a unique numeric ID within the department (e.g., MATH
    101).


    *   ***Course.courseName:*** A full name describing the subject matter of a course
    (e.g., Beginning Objects).


    *   ***Course.credits:*** The number of units or credit hours a course is worth,
    roughly equating to the number of hours spent in the classroom in a single week
    (typically, three credits for a full-semester lecture course).


    *   ***Section.sectionNo:*** A unique number assigned to distinguish one section/offering
    of a particular course from another offering of the same course in the same semester
    (e.g., MATH 101, section no. 1).


    *   ***Section.dayOfWeek:*** The day of the week on which the lecture course meets.


    *   ***Section.timeOfDay:*** The time (range) during which the course meets (e.g.,
    2:00 to 4:00 p.m.).


    *   ***Section.semester:*** An indication of the scholastic semester in which
    a section is offered (e.g., Spring 2025).


    *   ***Section.room:*** The building and room number where the section will be
    meeting (e.g., Innovation Hall, Room 333).


    *   ***Section.seatingCapacity:*** The maximum number of students permitted to
    register for a section.'
  trans: '

    *   ***课程：*** 指一个学期内围绕特定学科领域展开的一系列讲座、作业、考试等，通常对应特定学分数，是攻读学位的学业单元。例如，“面向对象入门”是信息技术系统理学硕士学位的必修**课程**。


    *   ***人员：*** 指与大学相关的个人。


    *   ***学习计划：*** 学生为满足特定学位的**课程**要求而计划修读的**课程**列表。


    *   ***教授：*** 负责教授**教学班**或指导**学生**的教职人员。


    *   ***教学班：*** 特定**课程**在特定学期、特定星期几和特定时间段的开设形式。（例如，**课程**“面向对象入门”在 2025 年春季学期每周一
    13:00 至 15:00 授课。）


    *   ***学生：*** 当前在大学注册，并有资格注册一个或多个**教学班**的个人。


    *   ***成绩单：*** 记录特定**学生**在本大学迄今为止所修所有**课程**的文件，包括每门**课程**的修读学期、所得成绩、授予学分，并反映累计总学分和**学生**的绩点（GPA）。


    *   ***成绩单条目：*** **成绩单**中的单行项目，反映**课程**编号与名称、修读学期、学分数值和所得成绩。


    **关系**


    *   ***指导——教授指导学生：*** 教授被指派在整个学生的学术生涯中监督其学业，直至学生获得学位。指导老师就课程选择、职业机会以及学生可能遇到的任何学业问题向其指导对象提供建议。


    *   ***参加——学生参加教学班：*** 学生注册教学班，参加一学期的课堂会议，并完成所有作业和考试，最终获得代表学生掌握该学科程度的字母等级。


    *   ***要求——学习计划要求课程：*** 学生只有在学习计划中列出的课程才能修读。学习计划可在学生指导老师的批准下进行修改。


    *   ***维护——学生维护成绩单：*** 每次学生完成一门课程，该课程及所得成绩的记录都会被添加到学生的成绩单中。


    *   ***遵循——学生遵循学习计划：*** 参见***要求***关联的注释。


    *   ***开设为——课程开设为教学班：*** 同一门课程可以在给定学期内多次授课，当然也可以在课程的“生命周期”内跨越多个学期授课——即直到该学科内容被认为对学生群体不再有价值，或没有合格的教师来教授该课程为止。


    *   ***先修课程——一门课程是另一门课程的先修课程：*** 如果确定课程 A 的学科内容是理解课程 B 学科内容的必要基础，则课程 A 被称为课程 B
    的先修课程。学生通常只有在成功完成课程 A 或能以其他方式证明掌握了课程 A 的学科内容后，才能修读课程 B。


    *   ***教授——教授教授教学班：*** 教授负责授课、布置有深度的作业、考核学生，并确保向学生提供高质量的课程学科内容教学。


    *   ***等待名单——学生被列入教学班等待名单：*** 如果某个教学班“已满”——例如，基于教室容量或被认为教学有效的学生小组规模，注册该课程的学生人数达到上限——那么有兴趣的学生可能会被列入等待名单，以便在该课程后续有空位时获得考虑。


    （成绩单与成绩单条目之间的聚合关系）


    （人员作为教授的特化）


    （人员作为学生的特化）


    **属性**


    *   ***Person.ssn：*** 分配给个人的唯一社会安全号码（SSN）。


    *   [***Person.name：***](http://person.name) 个人姓名，格式为“姓，名”。


    *   ***Professor.title：*** 教授获得的职称（例如，“兼职教授”）。


    *   ***Student.major：*** 反映学生主修学科所在的院系（例如，数学）。（我们假设学生只能指定一个主修专业。）


    *   ***Student.degree：*** 学生正在攻读的学位（例如，理学硕士学位）。


    *   ***TranscriptEntry.grade：*** 字母等级 A、B、C、D 或 F，可带有可选的+/-后缀，例如 A+或 C–。


    *   ***Course.courseNo：*** 分配给课程的唯一 ID，由院系代号加院系内唯一数字 ID 组成（例如，MATH 101）。


    *   ***Course.courseName：*** 描述课程学科内容的完整名称（例如，面向对象入门）。


    *   ***Course.credits：*** 课程所值的单元或学分数，大致相当于单周在课堂上的小时数（通常，全学期讲座课程为三个学分）。


    *   ***Section.sectionNo：*** 用于区分同一课程在同一学期内不同教学班/开设形式的唯一编号（例如，MATH 101，教学班编号 1）。


    *   ***Section.dayOfWeek：*** 讲座课程上课的星期几。


    *   ***Section.timeOfDay：*** 课程上课的时间（范围）（例如，14:00 至 16:00）。


    *   ***Section.semester：*** 表明教学班开设的学期（例如，2025 年春季）。


    *   ***Section.room：*** 教学班上课的教学楼和房间号（例如，创新厅，333 室）。


    *   ***Section.seatingCapacity：*** 允许注册教学班的最大学生人数。

