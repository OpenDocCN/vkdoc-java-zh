    By now, you’ve hopefully gained a solid appreciation for how powerful object-oriented
    languages are for modeling complex real-world situations. By way of review:


    * We can create our own user-defined types, also known as classes, to model objects
    of arbitrary complexity, as we discussed in Chapter [3](#78624_3_En_3_Chapter.xhtml).

    * We can arrange these types into class hierarchies to take advantage of the inheritance
    mechanism of OO languages, as we discussed in Chapter [5](#78624_3_En_5_Chapter.xhtml).

    * Through encapsulation and information hiding, we can shield client code from
    changes that we make to the private implementation details of our classes, making
    objects responsible for ensuring the integrity of their own data, as we discussed
    in Chapter [4](#78624_3_En_4_Chapter.xhtml).

    * We can design relationships between classes into their very “bone structure”
    so that collaborating objects can be linked together in memory at run time, as
    we discussed in Chapter [5](#78624_3_En_5_Chapter.xhtml).

    * Classes can model the most complex of real-world concepts, particularly when
    we take advantage of collections, as we did when modeling the `transcript` attribute
    of the `Student` class in Chapter [6](#78624_3_En_6_Chapter.xhtml).


    You might wonder how there could possibly be anything left in our OO bag of tricks!
    However, as powerful as all of the preceding OO language features are, there are
    still a few more important features of objects to be discussed.


    In this chapter, you’ll learn:


    * How a ***single*** line of code, representing a message—for example, `x.foo();`—can
    exhibit a variety of behaviors at run time

    * How we can specify ***what*** an object’s mission should be without going to
    the trouble of specifying the details of ***how*** the object is to carry out
    that mission and also under what circumstances we’d want to be able to do so

    * How an object can have a “split personality” by exhibiting the behaviors of
    two or more different types of object

    * Creative ways for an entire class of objects to easily and efficiently share
    data without breaking the spirit of encapsulation

    * How features can be defined that are associated with a class as a whole rather
    than with an instance of a class and how we can take advantage of this capability
    to design ***utility classes***

    * How we may declare variables whose values, once assigned, remain constant while
    an application is executing'
