    ### Garbage Collection


    As it turns out, if all of an object’s handles are released, it might seem as
    though the memory that the object occupies within the JVM would be permanently
    wasted. In a language like C++, this can indeed happen if programmers don’t explicitly
    take care to reclaim the memory of an object that is no longer needed before all
    of its handles are dropped. Failure to do so is a chronic source of problems in
    C++ programs and is commonly known as a **memory leak**.


    In C++, this is accomplished via the statement


    `x.delete();`


    but such a statement is unnecessary in Java, for reasons that we are about to
    discuss.


    With Java, on the other hand, the JVM periodically performs **garbage collection**,
    a process that automatically reclaims the memory of “lost” objects for us while
    an application is executing. Here’s how the Java garbage collector works:


    *   If there are no remaining active references to an object, it becomes a ***candidate***
    for garbage collection.


    *   The garbage collector doesn’t ***immediately*** recycle the object, however;
    rather, garbage collection occurs whenever the JVM determines that the application
    is getting low on free memory or when the JVM is otherwise idle.


    *   So, for some period of time, the “orphaned” object will still exist in memory—we
    simply won’t have any handles/reference variables with which to access it.


    The inclusion of garbage collection in Java has virtually eliminated memory leaks
    of the type that arose in C++. Note that it is still possible for the JVM itself
    to run out of memory, however, if we maintain handles on too many active objects
    simultaneously. Thus, a Java programmer cannot be totally oblivious to memory
    management; managing memory is just less error-prone in Java than it is in C/C++.


    ## Objects As Attributes


    When I first discussed the attributes and methods associated with the `Student`
    class, I stated that some of the attributes could be represented by predefined
    types provided by the Java language, whereas the types of a few others (`advisor`,
    `courseLoad`, and `transcript`) were temporarily left unspecified. Let’s now put
    what you’ve learned about user-defined types to good use with respect to one of
    these attributes: the `Student` class’s `advisor` attribute.


    Rather than declaring the `advisor` attribute as simply a `String` representing
    the advisor’s name, we’ll declare it to be of user-defined type—namely, type `Professor`,
    another class that we’ve invented. This attribute type is reflected in Table [3-2](#78624_3_En_3_Chapter.xhtml#Tab2).


    Table 3-2


    Student Class Attributes Revisited


    | Attribute | Type |

    | --- | --- |

    | `name` | `String` |

    | `studentID` | `String` |

    | `birthDate` | `Date` |

    | `address` | `String` |

    | `major` | `String` |

    | `gpa` | `double` |

    | **advisor** | **Professor** |

    | `courseLoad` | ??? |

    | `transcript` | ??? |


    This is reflected as well as in our `Student` class declaration:


    ```

    public class Student {

    // Attribute declarations typically appear first ...

    String name;

    String studentId;

    Date birthDate;

    String address;

    String major;

    double gpa;

    // A class is a user-defined type, and so we may declare attributes

    // to be of such a type.

    Professor advisor;

    // type? courseLoad - we''ll declare this attribute later.

    // type? transcript – ditto.

    // ... followed by method declarations (details omitted for now).

    }

    ```


    By having declared the `advisor` attribute to be of type `Professor`—that is,
    by having the `advisor` attribute serve as a ***reference variable***—we’ve just
    enabled a `Student` object to maintain a handle on the actual `Professor` object
    that represents the professor who is advising the student.


    The `Professor` class, in turn, might be defined to have the attributes listed
    in Table [3-3](#78624_3_En_3_Chapter.xhtml#Tab3).


    Table 3-3


    Professor Class Attributes


    | Attribute | Type |

    | --- | --- |

    | `Name` | `String` |

    | `employeeID` | `String` |

    | `birthdate` | `Date` |

    | `Address` | `String` |

    | `worksFor` | `String (or Department)` |

    | **Advisee** | **Student** |

    | `teachingAssignments` | ??? |


    Again, by having declared the `advisee` attribute to be of type `Student`—that
    is, by making the `advisee` attribute a reference variable—we’ve just given a
    `Professor` object a way to hold on to/refer to the actual `Student` object that
    represents the student whom the professor is advising.


    The methods of the `Professor` class might be as follows:


    *   `transferToDepartment`


    *   `adviseStudent`


    *   `agreeToTeachCourse`


    *   `assignGrades`


    *   And so forth


    Just as we did for the `Student` class earlier in the chapter, we’d render this
    `Professor` class design in Java code as follows:


    ```

    public class Professor {

    // Attributes.

    String name;

    String employeeId;

    Date birthDate;

    String address;

    String worksFor;

    Student advisee;

    double gpa;

    // type? teachingAssignments – we''ll declare this attribute later.

    // ... followed by method declarations (details omitted for now).

    }

    ```


    This class definition would reside in a source file named `Professor.java` and
    would be subsequently compiled into bytecode form as a file named `Professor.class`.


    Note that, as mentioned earlier for the `Student` class, we’d need to insert the
    declaration


    `import java.util.Date;`


    ahead of the declaration


    `public class Professor { ... }`


    in order for the code to compile properly.


    The following are a few noteworthy points about the `Professor` class:'
