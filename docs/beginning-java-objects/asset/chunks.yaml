    \ pseudocode:\n\n    ```\n    // This is real code:\n    for (int i = 0; i <=\
    \ 10; i++) {\n    // This is pseudocode!\n    compute the grade for the ith Student\n\
    \    }\n    ```\n\n## Which Version of Java Is This Book Based On?\n\nAs mentioned\
    \ previously, Oracle Corporation continues to release new versions of the Java\
    \ language on a regular basis. The ***good news*** is that, because I focus only\
    \ on core Java language syntax in my book—language features that have been stable\
    \ since Java’s inception—this book isn’t version specific. The techniques and\
    \ concepts that you’ll learn by reading my book will serve you equally well when\
    \ new versions of Java appear. That being said, all of the code examples in BJO\
    \ are compatible with Java versions 8 through 17\\. (Generally speaking, new versions\
    \ of the Java language are forward-compatible, meaning that code written for an\
    \ older version of the language will compile properly in a newer version.)"
  trans: "\n### 第一部分：对象基础入门\n\n在深入探讨对象建模的具体方法以及 Java 中面向对象编程的细节之前，确保我们对对象相关术语的理解保持一致至关重要。第一部分包含第\
    \ 1 章至第 7 章，将从定义所有软件开发方法（无论是否面向对象）所依赖的基本概念入手，循序渐进地展开。不过，这些章节会迅速过渡到高级对象概念的讨论，因此到第一部分结束时，你将具备“对象敏锐度”。\n\
    \n### 第二部分：对象建模 101\n\n在第二部分（本书第 8 章至第 12 章）中，我将重点阐述我们在开发应用程序对象模型时所做工作的基本原则，以及更重要的是，***为什么***要这样做——这些原则是所有对象建模技术所共有的。熟悉\
    \ UML 非常重要，因此我会教你 UML 的基础知识，并在本书的所有具体建模示例中使用它。运用这些章节中介绍的建模技术，我们将为学生注册系统（SRS）开发一个对象模型“蓝图”，该系统的需求规格说明将在本引言末尾给出。\n\
    \n### 第三部分：将对象“蓝图”转化为 Java 代码\n\n在本书的第三部分（第 13 章至第 15 章）中，我将演示如何将我们在第二部分中开发的 SRS\
    \ 对象模型转化为一个功能完备的 Java 应用程序，使其作为三层应用程序中的**模型层**。同时，我们还将从概念上讨论如何利用第三方技术来提供用户界面（即**表示层**）和数据持久化（即**数据层**）。SRS\
    \ 源代码可从 GitHub（`github.com/Apress/Beginning-Java-Objects-3e`）下载，我强烈建议你在阅读到该章节时下载并尝试运行这些代码。\n\
    \nSRS 的需求规格说明采用叙述性风格编写，这也是软件系统需求常见的表达方式。你可能会自信地认为今天就能构建一个应用程序来解决这个问题，但读完本书后，你应该会对自己将其构建为***面向对象***应用程序的能力更有信心。附录中提供了另外三个案例研究——分别针对处方跟踪系统（PTS）、会议室预订系统和航空订票系统；这些案例将作为每章末尾许多练习题的基础。\n\
    \n最后一章提供了一些建议，指导你在读完本书后如何继续你的面向对象探索之旅。在该章中，我为你推荐了一份书单，根据你应用所学知识的不同意图，这些书籍将帮助你达到更高水平的熟练度。\n\
    \n## 排版约定\n\n为了帮助你充分利用本书内容并掌握要点，我们在全书中使用了一些排版约定。\n\n例如：\n\n注释以这种形式呈现，反映重要的背景信息。\n\
    \n至于正文中的样式：\n\n*   当我们引入重要词汇时，会使用**粗体**进行突出显示。\n\n*   我们会在正文中以如下方式显示文件名、URL 和代码：`objectstart.com`。\n\
    \n*   在较长的代码段落中，如果我们想特别引起你对某些行的注意，会使用**粗体**标记这些代码行：\n\n    ```\n    // 粗体用于引起对新增或重要代码的注意：\n\
    \    Student s = new Student();\n    // 而未加粗的代码则是在当前上下文中不太重要，或之前已经见过的代码。\n   \
    \ int x = 3;\n    ```\n\n*   我们使用*斜体*与`常规代码字体`来区分伪代码：\n\n    ```\n    // 这是真实代码：\n\
    \    for (int i = 0; i <= 10; i++) {\n    // 这是伪代码！\n    compute the grade for\
    \ the ith Student\n    }\n    ```\n\n## 本书基于哪个 Java 版本？\n\n如前所述，甲骨文公司持续定期发布 Java\
    \ 语言的新版本。***好消息是***，由于本书只关注核心 Java 语言语法——即自 Java 诞生以来一直稳定的语言特性——因此本书并不限定于特定版本。当你阅读本书所学到的技术和概念，在\
    \ Java 新版本出现时同样适用。话虽如此，本书中的所有代码示例均兼容 Java 8 至 17 版本。（一般来说，Java 语言的新版本是向前兼容的，这意味着为旧版本语言编写的代码在新版本中也能正确编译。）\n"
- fmt: '# A Final Thought Before We Get Started


    A lot of the material in my book—particularly at the beginning of Part 1—may seem
    overly simplistic to experienced programmers. This is because much of object technology
    is founded on basic software engineering principles that have been in practice
    for many years and, in many cases, just repackaged slightly differently. There
    are indeed a few new tricks that make OO languages extremely powerful and that
    were virtually impossible to achieve with non-OO languages—`inheritance` and `polymorphism`,
    for example, which you’ll learn more about in Chapters [5](#78624_3_En_5_Chapter.xhtml)
    and [7](#78624_3_En_7_Chapter.xhtml), respectively. (Such techniques can be simulated
    by hand in a non-OO language, just as programmers could program their own database
    management system (DBMS) from scratch instead of using a commercial product like
    Oracle or SQL Server—but who’d *want* to?)


    The biggest challenge for *experienced* programmers in becoming proficient with
    objects is in reorienting the manner in which they think about the problem they
    will be automating:


    - Software engineers/programmers who have developed applications using non–object-oriented
    methods often have to “unlearn” certain approaches used in the traditional methods
    of software analysis and design.

    - Paradoxically, people just starting out as programmers (or as OO modelers) sometimes
    have an easier time when learning the OO approach to software development as their
    *only* approach.


    Fortunately, the way we need to think about objects when developing software turns
    out to be the natural way that people think about the world in general. So learning
    to “think” objects—and to program them in Java—is as easy as (Part) 1, (Part)
    2, (Part) 3!


    Source code for this book can be found at [https://github.com/Apress/Beginning-Java-Objects-3rd-ed](https://github.com/Apress/Beginning-Java-Objects-3rd-ed).


    # Student Registration System (SRS) Case Study


    ## STUDENT REGISTRATION SYSTEM (SRS) REQUIREMENTS SPECIFICATION


    We have been asked to develop an automated Student Registration System (SRS).
    This system will enable students to register online for courses each semester,
    as well as tracking a student’s progress toward completion of their degree.


    When a student first enrolls at the university, they use the SRS to set forth
    a plan of study as to which courses they plan on taking to satisfy a particular
    degree program and choose a faculty advisor. The SRS will verify whether or not
    the proposed plan of study satisfies the requirements of the degree that the student
    is seeking. Once a plan of study has been established, then, during the registration
    period preceding each semester, students are able to view the schedule of classes
    online and choose whichever classes they wish to attend, indicating the preferred
    section (day of the week and time of day) if the class is offered by more than
    one professor. The SRS will verify whether or not the student has satisfied the
    necessary prerequisites for each requested course by referring to the student’s
    online transcript of courses completed and grades received (the student may review
    their transcript online at any time).


    Assuming that (a) the prerequisites for the requested course(s) are satisfied,
    (b) the course(s) meets one of the student’s plan of study requirements, and (c)
    there is room available in each of the class(es), the student is enrolled in the
    class(es).


    If (a) and (b) are satisfied, but (c) is not, the student is placed on a first-come,
    first-served waiting list. If a class/section that they were previously waitlisted
    for becomes available (either because some other student has dropped the class
    or because the seating capacity for the class has been increased), the student
    is automatically enrolled in the waitlisted class, and an email message to that
    effect is sent to the student. It is their responsibility to drop the class if
    it is no longer desired; otherwise, they will be billed for the course.


    # Part I: The ABCs of Objects


    # 1. Abstraction and Modeling


    [Simplification Through Abstraction](#78624_3_En_1_Chapter.xhtml#Sec1) [Generalization
    Through Abstraction](#78624_3_En_1_Chapter.xhtml#Sec2) [Organizing Abstractions
    into Classification Hierarchies](#78624_3_En_1_Chapter.xhtml#Sec3) [Abstraction
    as the Basis for Software Development](#78624_3_En_1_Chapter.xhtml#Sec4) [Reuse
    of Abstractions](#78624_3_En_1_Chapter.xhtml#Sec5) [Inherent Challenges](#78624_3_En_1_Chapter.xhtml#Sec6)
    [What Does It Take to Be a Successful Object Modeler?](#78624_3_En_1_Chapter.xhtml#Sec7)
    [Summary](#78624_3_En_1_Chapter.xhtml#Sec8)


    As human beings, we’re flooded with information every day of our lives. Even if
    we could temporarily turn off all of the sources of “e-information” that are constantly
    bombarding us—emails, voicemails, podcasts, tweets, and the like—our five senses
    alone collect millions of bits of information per day just from our surroundings.
    Yet, we manage to make sense out of all of this information, typically without
    getting overwhelmed. Our brains naturally simplify the details of all that we
    observe so that these details are manageable through a process known as `abstraction`.


    In this chapter, you’ll learn


    - How abstraction serves to simplify our view of the world

    - How we organize our knowledge hierarchically to minimize the amount of information
    that we have to mentally juggle at any given time

    - The relevance of abstraction to software development

    - The inherent challenges that we face as software developers when attempting
    to model a real-word situation in software'
