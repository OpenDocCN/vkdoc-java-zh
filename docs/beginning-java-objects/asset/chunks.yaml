    \ cases, the involvement of the objects at either end of the relationship may\
    \ be optional or mandatory.\n\n*   That an ***aggregation*** is a special type\
    \ of association that implies containment.\n\n*   How to derive new classes based\
    \ on existing classes through ***inheritance*** and what the do’s and don’ts are\
    \ when deriving these new classes`—`specifically, how we can ***extend*** a superclass\
    \ and ***specialize*** it by ***adding features*** or ***overriding methods***.\n\
    \n*   How class hierarchies develop over time and what we can do to try to avoid\
    \ ripple effects to our application as the class hierarchy changes with evolving\
    \ requirements.\n\n*   Some of the complexities of constructors with respect to\
    \ inheritance.\n\n*   Why multiple inheritance can be so troublesome to implement\
    \ in an OO language.\n\nExercises\n\n1.  Given the following pairs of classes,\
    \ what associations might exist between them from the perspective of the PTS case\
    \ study described in the Appendix? Be sure to specify multiplicity as well as\
    \ option/mandatory qualities.\n    *   `Pharmacist-Prescription`\n\n*   `Prescription-Medication`\n\
    \n*   `Patient-Prescription`\n\n*   `Patient-Medication`\n\n2.  Go back to your\
    \ solution for Exercise 3 at the end of Chapter [4](#78624_3_En_4_Chapter.xhtml)\
    \ For all of the classes you suggested, list the pairwise associations that you\
    \ might envision occurring between them.\n\n3.  If the class `FeatureFilm` were\
    \ defined to have the following methods\n\n```\n    public void update(Actor a,\
    \ String title)\n    public void update(Actor a, Actor b, String title)\n    public\
    \ void update(String topic, String title)\n    ```\n\nwhich of the following additional\
    \ method headers would be allowed by the compiler?\n\n```\n    public boolean\
    \ update(String category, String theater)\n    public boolean update(String title,\
    \ Actor a)\n    public void update(Actor a, Actor b, String title)\n    public\
    \ void update(Actor a, Actor b)\n    ```\n\n4.  [*Coding*] Try coding the `FeatureFilm`\
    \ class discussed in Exercise 3 to verify your answer for Exercise 3\\. (Recall\
    \ that you can “stub out” the `Actor` class by creating a file named `Actor.java`\
    \ that contains the single line\n\n```\n    public class Actor { }\n    ```\n\n\
    This satisfies the compiler that `Actor` is a legitimate type.)\n\n5.  Given the\
    \ following simplistic code, which illustrates overloading, overriding, and straight\
    \ inheritance of methods across four classes—`Vehicle`, `Automobile`, `Truck`,\
    \ and `SportsCar`\n\n```\n    public class Vehicle {\n    String name;\n    public\
    \ void fuel(String fuelType) {\n    // details omitted ...\n    }\n    public\
    \ boolean fuel(String fuelType, int amount) {\n    // details omitted ...\n  \
    \  }\n    }\n    public class Automobile extends Vehicle {\n    public void fuel(String\
    \ fuelType, String timeFueled) {\n    // details omitted ...\n    }\n    public\
    \ boolean fuel(String fuelType, int amount) {\n    // ...\n    }\n    }\n    public\
    \ class Truck extends Vehicle {\n    public void fuel(String fuelType) {\n   \
    \ // ...\n    }\n    }\n    public class SportsCar extends Automobile {\n    public\
    \ void fuel(String fuelType) {\n    // ...\n    }\n    public void fuel(String\
    \ fuelType, String timeFueled) {\n    // ...\n    }\n    }\n    ```\n\nhow many\
    \ different `Fuel` argument signatures would each of the four classes recognize?\
    \ List these."
  trans: "\n后来，我们决定通过创建两个子类——`Professor` 和 `Student`——来特化 `Person`，这两个子类各自添加了一些属性，并重写了\
    \ `printDescription` 方法以利用它们新添加的属性，如下所示：\n\n```\npublic class Student extends\
    \ Person {\n// 我们添加了两个属性。\nprivate String major;\nprivate String studentId;\n\
    // 访问器方法细节已省略。\n// 重写从 Person 继承而来的此方法。\npublic String printDescription() {\n\
    return getName() + \" [\" + getMajor() + \"; \" +\ngetStudentId() + \"]\";\n//\
    \ 例如：\"Mary Smith [Math; 10273]\"\n}\n}\n//------------------------------------\n\
    public class Professor extends Person {\n// 我们添加了两个属性。\nprivate String title;\n\
    private String employeeId;\n// 访问器方法细节已省略。\n// 重写从 Person 继承而来的此方法。\npublic String\
    \ printDescription() {\nreturn getName() + \" [\" + getTitle() + \"; \"\n+ getEmployeeId()\
    \ + \"]\";\n// 例如：\"Harry Henderson [Chairman; A723]\"\n}\n}\n```\n\n请注意，这两个子类都以不同的方式重写了\
    \ `printDescription` 方法，以利用各自类独有的属性。\n\n在该系统演进的未来某个时刻，我们确定需要将单个对象同时表示为 `Student`\
    \ 和 `Professor`，因此我们创建了混合类 `StudentProfessor`，作为 `Student` 和 `Professor` 两者的子类。我们并不特别想添加任何属性或方法——我们只想融合两个超类的特性——因此我们理想中希望按如下方式声明\
    \ `StudentProfessor`：\n\n*   `StudentProfessor` 不能同时继承 `Professor` 和 `Student`\
    \ 版本的 `printDescription` 方法，因为那样我们最终会在 `ProfessorStudent` 中得到两个签名相同的（重载）方法，这是\
    \ Java 编译器所不允许的。\n\n*   很可能我们***两者都不想***继承，因为两者都没有充分利用另一个超类的属性。也就是说，`Professor`\
    \ 版本的 `printDescription` 对从 `Student` 继承的 `getMajor` 和 `getStudentId` 方法一无所知，同样，`Student`\
    \ 版本的 `printDescription` 也不知道从 `Professor` 继承的 `getTitle` 或 `getEmployeeId` 方法。\n\
    \n*   如果我们确实希望使用其中一个超类的方法版本而不是另一个，我们必须发明某种方式来告知编译器我们想要继承哪一个。\n\n```\n// * * *\
    \ 重要提示：这在 Java 中是不允许的！！！ * * *\npublic class StudentProfessor extends Professor\
    \ and Student { }\n// 将类体留空是可以的；该类本身并非真正的“空”，因为它继承了其所有祖先的特性。然而，我们这样做会遇到一个障碍：\n\
    ```\n\n这只是一个简单的例子，但它仍然说明了为什么多重继承会如此成问题。（在后面的章节中，我们将介绍**接口**的概念，以说明我们如何规避 Java\
    \ 中缺乏多重继承的问题。）\n\n## 再论面向对象编程语言的三个显著特征\n\n在第 3 章中，我们指出了编程语言要被视为真正的面向对象语言所必需的三个关键特征。我们现在已经详细讨论了这三个特征中的前两个：\n\
    \n*   （程序员创建的）***用户定义类型***，如第 3 章所述\n\n*   ***继承***，如本章所述\n\n*   多态性\n\n剩下的就是讨论**多态性**，这是即将到来的一章（准确地说，是第\
    \ 7 章）的主题之一。然而，我们首先要稍微绕个弯，讨论一下如何通过使用一种称为**集合**的特殊对象类型来收集和组织我们创建的对象组。\n\n## 总结\n\
    \n在本章中，你学到了\n\n*   ***关联***描述的是类之间的关系——即两个特定类型/类的对象之间潜在的关系——而***链接***描述的是属于这些类的两个对象之间的实际关系。\n\
    \n*   我们根据类型 X 的多少个对象可以链接到类型 Y 的给定对象，反之亦然，来定义类 X 和 Y 之间关联的***多重性***。可能的多重性包括一对一\
    \ (1:1)、一对多 (1:m) 和多对多 (m:m)。在所有这些情况下，关系两端对象的参与可以是可选的或强制的。\n\n*   ***聚合***是一种特殊类型的关联，暗示着包含关系。\n\
    \n*   如何通过***继承***基于现有类派生新类，以及在派生这些新类时应该做什么和不应该做什么——具体来说，我们如何通过***添加特性***或***重写方法***来***扩展***超类并***特化***它。\n\
    \n*   类层次结构如何随时间发展，以及当类层次结构随着需求变化而变化时，我们可以做些什么来尽量避免对应用程序产生连锁影响。\n\n*   构造函数在继承方面的一些复杂性。\n\
    \n*   为什么多重继承在面向对象语言中实现起来如此麻烦。\n\n## 练习\n\n1.  给定以下类对，从附录中描述的 PTS 案例研究的角度来看，它们之间可能存在哪些关联？请务必指定多重性以及可选/强制性质。\n\
    \    *   `Pharmacist-Prescription`\n\n*   `Prescription-Medication`\n\n*   `Patient-Prescription`\n\
    \n*   `Patient-Medication`\n\n2.  回到你在第 4 章末尾练习 3 的解决方案。对于你建议的所有类，列出你设想它们之间可能存在的成对关联。\n\
    \n3.  如果类 `FeatureFilm` 被定义为具有以下方法\n\n```\n    public void update(Actor a, String\
    \ title)\n    public void update(Actor a, Actor b, String title)\n    public void\
    \ update(String topic, String title)\n    ```\n\n那么编译器会允许以下哪些额外的方法头？\n\n```\n\
    \    public boolean update(String category, String theater)\n    public boolean\
    \ update(String title, Actor a)\n    public void update(Actor a, Actor b, String\
    \ title)\n    public void update(Actor a, Actor b)\n    ```\n\n4.  [*编码*] 尝试编写练习\
    \ 3 中讨论的 `FeatureFilm` 类，以验证你对练习 3 的答案。（回想一下，你可以通过创建一个名为 `Actor.java` 的文件来“存根”`Actor`\
    \ 类，该文件包含一行代码\n\n```\n    public class Actor { }\n    ```\n\n这向编译器表明 `Actor` 是一个合法的类型。）\n\
    \n5.  给定以下简单的代码，它展示了跨四个类——`Vehicle`、`Automobile`、`Truck` 和 `SportsCar`——的方法重载、重写和直接继承\n\
    \n```\n    public class Vehicle {\n    String name;\n    public void fuel(String\
    \ fuelType) {\n    // 细节已省略 ...\n    }\n    public boolean fuel(String fuelType,\
    \ int amount) {\n    // 细节已省略 ...\n    }\n    }\n    public class Automobile extends\
    \ Vehicle {\n    public void fuel(String fuelType, String timeFueled) {\n    //\
    \ 细节已省略 ...\n    }\n    public boolean fuel(String fuelType, int amount) {\n \
    \   // ...\n    }\n    }\n    public class Truck extends Vehicle {\n    public\
    \ void fuel(String fuelType) {\n    // ...\n    }\n    }\n    public class SportsCar\
    \ extends Automobile {\n    public void fuel(String fuelType) {\n    // ...\n\
    \    }\n    public void fuel(String fuelType, String timeFueled) {\n    // ...\n\
    \    }\n    }\n    ```\n\n这四个类各自能识别出多少种不同的 `Fuel` 参数签名？请列出这些签名。\n"
- fmt: "6.  Reflecting on all that you’ve learned about Java and OOPLs in general\
    \ thus far, recount all of the language mechanisms that (a) facilitate code reuse\
    \ and (b) minimize ripple effects due to requirements changes after code has been\
    \ deployed.\n\n7.  Given the following simplistic classes, `FarmAnimal`, `Horse`,\
    \ and `Cow`\n\n```\npublic class FarmAnimal {\n    private String name;\n    public\
    \ String getName() {\n        return name;\n    }\n    public void setName(String\
    \ n) {\n        name = n;\n    }\n    public void makeSound() {\n        System.out.println(getName()\
    \ + \" makes a sound ...\");\n    }\n}\npublic class Cow extends FarmAnimal {\n\
    \    public void makeSound() {\n        System.out.println(getName() + \" goes\
    \ Moooooo ...\");\n    }\n}\npublic class Horse extends FarmAnimal {\n    public\
    \ void setName(String n) {\n        super.setName(n + \" [a Horse]\");\n    }\n\
    }\n```\n\nwhat would be printed by the following client code?\n\n```\nCow c =\
    \ new Cow();\nHorse h = new Horse();\nc.setName(\"Elsie\");\nh.setName(\"Mr. Ed\"\
    );\nc.makeSound();\nh.makeSound();\n```\n\n# 6. Collections of Objects\n\n[What\
    \ Are Collections?](#78624_3_En_6_Chapter.xhtml#Sec1) [Collections Are Defined\
