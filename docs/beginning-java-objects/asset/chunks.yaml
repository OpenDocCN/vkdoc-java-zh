    Student s4 = new Student();

    // etc.

    Professor p1 = new Professor();

    Professor p2 = new Professor();

    // etc.

    // Details omitted ...

    s1.setFacultyAdvisor(p1);

    s2.setfacultyAdvisor(p1);

    s3.setFacultyAdvisor(p2);

    s4.setFacultyAdvisor(p2);

    // etc.

    ```


    ## The Power of Encapsulation Plus Information Hiding


    You learned earlier that encapsulation is the mechanism that bundles together
    the state (attribute values) and behavior (methods) of an object. Now that you’ve
    gained some insights into public/private accessibility, encapsulation warrants
    a more in-depth discussion.


    It’s useful to think of an object as a “fortress” that “guards” its data—namely,
    the values of all of its attributes. Rather than trying to march straight through
    the walls of a fortress, which typically results in death and destruction (!),
    we ideally would approach the guard at the gate to ask permission to enter. Generally
    speaking, the same is true for objects: we can’t directly access the values of
    an object’s privately declared attributes without an object’s permission and knowledge—that
    is, without using one of an object’s publicly accessible methods to access the
    attribute’s value.


    Assume that you’ve just met someone for the first time and wish to know their
    name. One way to determine their name would be to reach into their pocket, pull
    out their wallet, and look at their driver’s license—essentially, accessing their
    private attribute values without their permission! The more socially acceptable
    way would be to simply ask them for their name—akin to using their `getName` method—and
    to allow them to respond accordingly. They may respond with their formal name
    or a nickname or an alias, or they may say, “It’s none of your business!”—but
    the important point is that you’re giving the person (object) ***control*** over
    their response based on how the logic of the accessor method is coded.


    By restricting access to an object’s private attributes through public accessors,
    we derive three important benefits:


    *   Preventing unauthorized access to encapsulated data


    *   Helping ensure data integrity


    *   Limiting “ripple effects” that can otherwise occur throughout an application
    when the private implementation details of a class must change


    Let’s discuss each of these benefits in detail.


    ### Preventing Unauthorized Access to Encapsulated Data


    Some of the information that a `Student` object maintains about itself—say, the
    student’s identification number—may be highly confidential. A `Student` object
    may choose to selectively pass along this information when necessary—for example,
    when registering for a course—but may not wish to hand out this information to
    any object that happens to casually ask for it.


    Simply by making the attribute private, and intentionally omitting a public “get”
    method with which to request the attribute’s value, there’d be no way for another
    object to request the `Student` object’s identification number.'
  trans: '

    ### IDE 生成的 Get/Set 方法


    在大多数 IDE 中，get 和 set 方法都是自动生成的。在这种情况下，传入 set 方法的参数名称通常与属性名称相同，例如：


    ```

    public class Student {

    String majorField;

    // 其他细节省略

    public void setMajorField(String majorField) {

    this.majorField = majorField;

    }

    ```


    在上述代码中，`majorField` 前面使用关键字 `this` 后跟一个点号 (`.`)，是向编译器指示：***局部变量*** `majorField`
    的值将被传递给同名的***属性***。


    ### 属性值的“持久性”


    由于我之前没有明确说明，而且这一点可能并非对所有人都显而易见，我现在想提请注意一个事实：只要对象本身在内存中存在，其属性值就会持续存在。也就是说，一旦我们在应用程序中实例化一个
    `Student` 对象


    ```

    Student s = new Student();

    ```


    那么，我们分配给 `s` 属性的任何值


    ```

    s.setName("Mel");

    ```


    都会持续存在，直到该值被显式更改


    ```

    // 重命名 Student s。

    s.setName("Klemmie");

    ```


    或者整个对象被 Java 虚拟机 (JVM) 垃圾回收为止——我们在第 3 章讨论过这个过程。因此，回到我们在第 3 章中将对象比作氦气球的类比，只要代表
    `Student s` 的“氦气球”保持“充气”状态，每当我们向 `s` 询问其姓名时，它都会“记住”我们***最后***分配给其 `name` 属性的值。


    ### 从客户端代码使用访问器方法


    我们已经知道如何从客户端代码使用点号表示法来调用对象上的方法，因此在对象引用上调用访问器方法时，我们将采用相同的方式：


    ```

    Student s = new Student();

    // 修改（"set"）属性值。

    s.setName("Joe");

    // 读取（"get"）属性值。

    System.out.println("Name: " +  s.getName());

    ```


    我在本章前面承诺过要讨论如何通知某个 `Student` 对象其 `facultyAdvisor` 是哪位特定的 `Professor`；既然你已经了解了“set”方法，这简直易如反掌！假设
    (a) `facultyAdvisor` 是 `Student` 类的一个属性，声明类型为 `Professor`，并且 (b) 我们为此属性编写了一个“标准”头为
    `public void setFacultyAdvisor(Professor p)` 的“set”方法，那么以下是用于“让”学生认识其导师的客户端代码：


    ```

    Student s1 = new Student();

    Student s2 = new Student();

    Student s3 = new Student();

    Student s4 = new Student();

    // 等等。

    Professor p1 = new Professor();

    Professor p2 = new Professor();

    // 等等。

    // 细节省略 ...

    s1.setFacultyAdvisor(p1);

    s2.setfacultyAdvisor(p1);

    s3.setFacultyAdvisor(p2);

    s4.setFacultyAdvisor(p2);

    // 等等。

    ```


    ## 封装加信息隐藏的强大之处


    你之前了解到，封装是一种将对象的状态（属性值）和行为（方法）捆绑在一起的机制。既然你已经对 public/private 可访问性有了一些了解，那么封装值得更深入的讨论。


    将对象视为一座“守卫”其数据——即其所有属性值——的“堡垒”是很有用的。与其试图直接穿过堡垒的墙壁（这通常会导致死亡和毁灭 (!)），我们理想的做法是接近门口的守卫，请求允许进入。一般来说，对象也是如此：未经对象的许可和知情——也就是说，如果不使用对象的某个可公开访问的方法来访问属性值——我们就无法直接访问对象私有声明的属性的值。


    假设你刚认识一个人，想知道他们的名字。确定他们名字的一种方法是把手伸进他们的口袋，掏出钱包，查看他们的驾照——这本质上是在未经他们许可的情况下访问他们的私有属性值！更符合社会规范的方式是直接询问他们的名字——类似于使用他们的
    `getName` 方法——并让他们做出相应的回应。他们可能会用正式姓名、昵称或化名来回应，也可能会说：“这不关你的事！”——但重点是，你给予了这个人（对象）根据访问器方法的逻辑编码方式来***控制***其回应的能力。


    通过公共访问器限制对对象私有属性的访问，我们获得了三个重要的好处：


    *   防止对封装数据的未授权访问

    *   有助于确保数据完整性

    *   当类的私有实现细节必须更改时，限制可能在整个应用程序中发生的“连锁效应”


    让我们详细讨论这些好处。


    ### 防止对封装数据的未授权访问


    `Student` 对象维护的关于自身的一些信息——例如，学生的身份证号码——可能是高度机密的。`Student` 对象可能会在必要时选择性地传递这些信息——例如，在注册课程时——但可能不希望将此类信息提供给任何碰巧随意询问它的对象。


    只需将属性设为私有，并有意省略用于请求该属性值的公共“get”方法，其他对象就无法请求 `Student` 对象的身份证号码。

