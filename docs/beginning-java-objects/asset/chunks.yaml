- fmt: '#### Example #2


    The Java language provides many predefined interfaces. One such example is the
    `Collection` interface of the `java.util` package. The `Collection` interface
    enforces implementation of 14 methods, many of which—`add`, `addAll`, `clear`,
    `contains`, `isEmpty`, `remove`, `size`, etc.—we discussed when talking about
    various collection classes in Chapter [6](#78624_3_En_6_Chapter.xhtml). These
    14 methods collectively define the services that an object has to be able to provide
    in order to perform in the role of a proper `Collection` in a Java application.


    The `Collection` interface is implemented by numerous predefined Java `Collection`
    classes, including the `ArrayList` class. In fact, the **collections framework**
    is based on a total of ***12*** interfaces, including `Map`, `SortedMap`, `Collection`,
    `Set`, `List`, and `SortedSet`. The relationships between these interfaces and
    the various collection classes that we have discussed are illustrated in Figure
    [7-6](#78624_3_En_7_Chapter.xhtml#Fig6).


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig6_HTML.jpg)


    3 tree diagrams of the following predefined collection interfaces and classes.
    Collection and set with the abstract collection, list and sorted list with abstract
    sets, map and sorted map with abstract, tree, hash, and weak hash maps.


    Figure 7-6


    The “family tree” of the predefined collection classes that we’ve discussed


    All Java Collections Are Not Created Equal!


    Figure [7-6](#78624_3_En_7_Chapter.xhtml#Fig6) points out an interesting phenomenon
    regarding the `TreeMap` and `HashMap` classes, two of the predefined collection
    types that we discussed in Chapter [6](#78624_3_En_6_Chapter.xhtml). While `TreeMap`s
    and `HashMap`s are indeed collections in the ***generic*** sense in that they
    organize references to other objects, these classes do ***not*** implement the
    `Collection` interface. Hence, client code such as the following will ***not***
    compile


    ```

    Collection c = new TreeMap();

    ```


    because a `TreeMap`, while being a collection (in the lowercase “c” sense of the
    word), is not truly a `Collection` (in the formal, uppercase “C” sense). The following
    compilation error message would be generated:


    ```

    incompatible types:

    found:    java.util.TreeMap

    required: java.util.Collection

    ```


    Similarly, an array is not truly a `Collection` in the uppercase “C” sense of
    the term either, and so the following won’t compile either:


    ```

    Collection c = new Student[20];

    ```


    Here’s the compilation error:


    ```

    incompatible types:

    found:    Student[]

    required: java.util.Collection

    ```


    On the other hand, the following client code ***will*** compile


    ```

    Collection c = new ArrayList;

    ```


    because the `ArrayList` class is derived from the `AbstractCollection` class,
    which implements the `Collection` interface; hence, an `ArrayList` ***is a***
    `Collection` (uppercase “C”) in the true uppercase “C” sense.


    If we design methods that are to operate on collections of objects to accept a
    ***generic*** `Collection` reference as an argument (rather than requiring that
    a ***specific*** type of collection be passed in), such methods will be much more
    versatile; client code will be free to pass in whatever `Collection` type it wishes.


    By way of example, let’s say that we wish to design an `enrollStudents` method
    for the `Course` class so that client code can pass in a collection of `Student`s
    to enroll them all at once. If we were to specify a particular collection type
    as a parameter to the method—say, an `ArrayList`


    ```

    import java.util.ArrayList;

    public class Course {

    // Details omitted ...

    // Accept a specific collection type as an argument.

    public void enrollStudents(ArrayList x) {

    for (Student s : x)  {

    this.enroll(s);

    }

    }

    // etc.

    }

    ```


    then client code would be forced to pass in an `ArrayList` as an argument. However,
    if we design the method to accept a ***generic*** `Collection` as an argument
    instead


    ```

    import java.util.Collection;

    public class Course {

    // details omitted ...

    // Accept a generic Collection reference as an argument.

    public void enrollStudents(Collection c) {

    for (Student s : x)  {

    this.enroll(s);

    }

    }

    }

    ```


    then client code using this method will be able to pass in an `ArrayList` of `Student`
    references


    ```

    Course c = new Course();

    ArrayList al = new ArrayList();

    // Populate al with Students ... details omitted.

    // Pass in an ArrayList ...

    c.enrollStudents(al);

    ```


    or a `Vector` of `Student` references (another built-in type)


    ```

    // Client code.

    Course c = new Course();

    Vector v = new Vector();

    // Populate v with Students ... details omitted.

    // Pass in a Vector ...

    c.enrollStudents(v);

    ```


    or any other type of `Collection` desired.


    The same is true for methods that ***return*** collections of objects: if we design
    them to return generic `Collection`s instead of specific collection types, then
    we are free to change the internal details of what type of collection we’re crafting.
    Recall our discussion from Chapter [6](#78624_3_En_6_Chapter.xhtml) of the `getRegisteredStudents`
    method of the `Course` class. I’ve repeated that code here for your convenience:


    ```

    import java.util.ArrayList;

    public class Course {

    private ArrayList enrolledStudents;

    // Details omitted ...

    // The following method returns a reference to an entire collection –

    // specifically, an ArrayList - containing however many Students are

    // registered for the course in question.

    public ArrayList getRegisteredStudents() {

    return enrolledStudents;

    }

    // etc.

    }

    ```


    Because we declared `getRegisteredStudents` to have a return type of `ArrayList`
    (a specific collection type), we’re going to run into problems later on if we
    decide to change the type of the encapsulated `enrolledStudents` collection from
    `ArrayList` to some other collection type. In essence, we’ve exposed client code
    to what should be a ***private*** detail of the `Course` class: namely, the type
    of collection that we’re using ***internally*** to manage `Student` references.


    If we instead declare `getRegisteredStudents` to return a ***generic*** `Collection`
    as follows


    ```

    import java.util.ArrayList;

    import java.util.Collection;

    public class Course {

    // We''re still maintaining an ArrayList internally.

    private ArrayList enrolledStudents;

    // Details omitted ...

    // However, we''ve now "hidden" the fact that we''re using an ArrayList

    // internally by returning it as a generic Collection instead.

    public Collection getRegisteredStudents() {

    // We''re allowed to do this, because enrolledStudents is an ArrayList,

    // and an ArrayList IS A Collection.

    return enrolledStudents;

    }

    // etc.

    }

    ```


    we’re now free to change the type of internal collection that we’re using (a ***private***
    detail) without impacting the signature of the `getRegisteredStudents` method
    (a ***public*** detail). For example, we may wish to switch from an `ArrayList`
    to a `TreeSet` to take advantage of a set’s inherent elimination of duplicate
    entries (recall our discussion of this aspect of set-type collections from Chapter
    [6](#78624_3_En_6_Chapter.xhtml)):


    ```

    import java.util.TreeSet;

    import java.util.Collection;

    public class Course {

    // We''ve switched to a different Collection type internally.

    private TreeSet enrolledStudents;

    // Details omitted ...

    // This method signature needn''t change!!!

    public Collection getRegisteredStudents() {

    // We''re allowed to do this, because enrolledStudents is a TreeSet,

    // and a TreeSet IS A Collection.

    return enrolledStudents;

    }

    // etc.

    }

    ```


    Be certain to master the notion of interfaces—both predefined and user-defined—to
    harness their power in your code!'
  raw: '#### Example #2


    The Java language provides many predefined interfaces. One such example is the
    `Collection` interface of the `java.util` package. The `Collection` interface
    enforces implementation of 14 methods, many of which—`add`, `addAll`, `clear`,
    `contains`, `isEmpty`, `remove`, `size`, etc.—we discussed when talking about
    various collection classes in Chapter [6](#78624_3_En_6_Chapter.xhtml). These
    14 methods collectively define the services that an object has to be able to provide
    in order to perform in the role of a proper `Collection` in a Java application.


    The `Collection` interface is implemented by numerous predefined Java `Collection`
    classes, including the `ArrayList` class. In fact, the **collections framework**
    is based on a total of ***12*** interfaces, including `Map`, `SortedMap`, `Collection`,
    `Set`, `List`, and `SortedSet`. The relationships between these interfaces and
    the various collection classes that we have discussed are illustrated in Figure
    [7-6](#78624_3_En_7_Chapter.xhtml#Fig6).


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig6_HTML.jpg)


    3 tree diagrams of the following predefined collection interfaces and classes.
    Collection and set with the abstract collection, list and sorted list with abstract
    sets, map and sorted map with abstract, tree, hash, and weak hash maps.


    Figure 7-6


    The “family tree” of the predefined collection classes that we’ve discussed


    All Java Collections Are Not Created Equal!


    Figure [7-6](#78624_3_En_7_Chapter.xhtml#Fig6) points out an interesting phenomenon
    regarding the `TreeMap` and `HashMap` classes, two of the predefined collection
    types that we discussed in Chapter [6](#78624_3_En_6_Chapter.xhtml). While `TreeMap`s
    and `HashMap`s are indeed collections in the ***generic*** sense in that they
    organize references to other objects, these classes do ***not*** implement the
    `Collection` interface. Hence, client code such as the following will ***not***
    compile


    ```

    Collection c = new TreeMap();

    ```


    because a `TreeMap`, while being a collection (in the lowercase “c” sense of the
    word), is not truly a `Collection` (in the formal, uppercase “C” sense). The following
    compilation error message would be generated:


    ```

    incompatible types:

    found:    java.util.TreeMap

    required: java.util.Collection

    ```


    Similarly, an array is not truly a `Collection` in the uppercase “C” sense of
    the term either, and so the following won’t compile either:


    ```

    Collection c = new Student[20];

    ```


    Here’s the compilation error:


    ```

    incompatible types:

    found:    Student[]

    required: java.util.Collection

    ```


    On the other hand, the following client code ***will*** compile


    ```

    Collection c = new ArrayList;

    ```


    because the `ArrayList` class is derived from the `AbstractCollection` class,
    which implements the `Collection` interface; hence, an `ArrayList` ***is a***
    `Collection` (uppercase “C”) in the true uppercase “C” sense.


    If we design methods that are to operate on collections of objects to accept a
    ***generic*** `Collection` reference as an argument (rather than requiring that
    a ***specific*** type of collection be passed in), such methods will be much more
    versatile; client code will be free to pass in whatever `Collection` type it wishes.


    By way of example, let’s say that we wish to design an `enrollStudents` method
    for the `Course` class so that client code can pass in a collection of `Student`s
    to enroll them all at once. If we were to specify a particular collection type
    as a parameter to the method—say, an `ArrayList`


    ```

    import java.util.ArrayList;

    public class Course {

    // Details omitted ...

    // Accept a specific collection type as an argument.

    public void enrollStudents(ArrayList x) {

    for (Student s : x)  {

    this.enroll(s);

    }

    }

    // etc.

    }

    ```


    then client code would be forced to pass in an `ArrayList` as an argument. However,
    if we design the method to accept a ***generic*** `Collection` as an argument
    instead


    ```

    import java.util.Collection;

    public class Course {

    // details omitted ...

    // Accept a generic Collection reference as an argument.

    public void enrollStudents(Collection c) {

    for (Student s : x)  {

    this.enroll(s);

    }

    }

    }

    ```


    then client code using this method will be able to pass in an `ArrayList` of `Student`
    references


    ```

    Course c = new Course();

    ArrayList al = new ArrayList();

    // Populate al with Students ... details omitted.

    // Pass in an ArrayList ...

    c.enrollStudents(al);

    ```


    or a `Vector` of `Student` references (another built-in type)


    ```

    // Client code.

    Course c = new Course();

    Vector v = new Vector();

    // Populate v with Students ... details omitted.

    // Pass in a Vector ...

    c.enrollStudents(v);

    ```


    or any other type of `Collection` desired.


    The same is true for methods that ***return*** collections of objects: if we design
    them to return generic `Collection`s instead of specific collection types, then
    we are free to change the internal details of what type of collection we’re crafting.
    Recall our discussion from Chapter [6](#78624_3_En_6_Chapter.xhtml) of the `getRegisteredStudents`
    method of the `Course` class. I’ve repeated that code here for your convenience:


    ```

    import java.util.ArrayList;

    public class Course {

    private ArrayList enrolledStudents;

    // Details omitted ...

    // The following method returns a reference to an entire collection –

    // specifically, an ArrayList - containing however many Students are

    // registered for the course in question.

    public ArrayList getRegisteredStudents() {

    return enrolledStudents;

    }

    // etc.

    }

    ```


    Because we declared `getRegisteredStudents` to have a return type of `ArrayList`
    (a specific collection type), we’re going to run into problems later on if we
    decide to change the type of the encapsulated `enrolledStudents` collection from
    `ArrayList` to some other collection type. In essence, we’ve exposed client code
    to what should be a ***private*** detail of the `Course` class: namely, the type
    of collection that we’re using ***internally*** to manage `Student` references.


    If we instead declare `getRegisteredStudents` to return a ***generic*** `Collection`
    as follows


    ```

    import java.util.ArrayList;

    import java.util.Collection;

    public class Course {

    // We''re still maintaining an ArrayList internally.

    private ArrayList enrolledStudents;

    // Details omitted ...

    // However, we''ve now "hidden" the fact that we''re using an ArrayList

    // internally by returning it as a generic Collection instead.

    public Collection getRegisteredStudents() {

    // We''re allowed to do this, because enrolledStudents is an ArrayList,

    // and an ArrayList IS A Collection.

    return enrolledStudents;

    }

    // etc.

    }

    ```


    we’re now free to change the type of internal collection that we’re using (a ***private***
    detail) without impacting the signature of the `getRegisteredStudents` method
    (a ***public*** detail). For example, we may wish to switch from an `ArrayList`
    to a `TreeSet` to take advantage of a set’s inherent elimination of duplicate
    entries (recall our discussion of this aspect of set-type collections from Chapter
    [6](#78624_3_En_6_Chapter.xhtml)):


    ```

    import java.util.TreeSet;

    import java.util.Collection;

    public class Course {

    // We''ve switched to a different Collection type internally.

    private TreeSet enrolledStudents;

    // Details omitted ...

    // This method signature needn''t change!!!

    public Collection getRegisteredStudents() {

    // We''re allowed to do this, because enrolledStudents is a TreeSet,

    // and a TreeSet IS A Collection.

    return enrolledStudents;

    }

    // etc.

    }

    ```


    Be certain to master the notion of interfaces—both predefined and user-defined—to
    harness their power in your code!'
  trans: '

    #### 示例 #2


    Java 语言提供了许多预定义的接口。`java.util` 包中的 `Collection` 接口就是这样一个例子。`Collection` 接口强制要求实现
    14 个方法，其中许多方法——如 `add`、`addAll`、`clear`、`contains`、`isEmpty`、`remove`、`size` 等——我们在第
    6 章讨论各种集合类时已经介绍过。这 14 个方法共同定义了对象为了在 Java 应用程序中扮演一个合格的 `Collection` 角色所必须提供的服务。


    `Collection` 接口由许多预定义的 Java `Collection` 类实现，包括 `ArrayList` 类。事实上，**集合框架** 总共基于
    ***12*** 个接口，包括 `Map`、`SortedMap`、`Collection`、`Set`、`List` 和 `SortedSet`。这些接口与我们讨论过的各种集合类之间的关系如图
    7-6 所示。


    ![](img/78624_3_En_7_Fig6_HTML.jpg)


    以下预定义集合接口和类的 3 个树状图。Collection 和 Set 与 AbstractCollection、AbstractSet、AbstractList
    和 AbstractSequentialList；List 和 SortedSet 与 AbstractSet；Map 和 SortedMap 与 AbstractMap、TreeMap、HashMap
    和 WeakHashMap。


    图 7-6


    我们讨论过的预定义集合类的“族谱”


    并非所有 Java 集合生而平等！


    图 7-6 指出了关于 `TreeMap` 和 `HashMap` 类的一个有趣现象，这两个类是我们第 6 章讨论过的预定义集合类型。虽然 `TreeMap`
    和 `HashMap` 在***广义***上确实是集合，因为它们组织了对其他对象的引用，但这些类并***没有***实现 `Collection` 接口。因此，像下面这样的客户端代码将***无法***编译：


    ```

    Collection c = new TreeMap();

    ```


    因为一个 `TreeMap`，虽然是一个集合（取小写“c”的含义），但并不是真正的 `Collection`（取正式的、大写“C”的含义）。将会生成以下编译错误信息：


    ```

    不兼容的类型：

    找到：    java.util.TreeMap

    需要： java.util.Collection

    ```


    类似地，数组也不是大写“C”意义上的真正 `Collection`，因此以下代码也无法编译：


    ```

    Collection c = new Student[20];

    ```


    编译错误如下：


    ```

    不兼容的类型：

    找到：    Student[]

    需要： java.util.Collection

    ```


    另一方面，以下客户端代码***可以***编译：


    ```

    Collection c = new ArrayList();

    ```


    因为 `ArrayList` 类派生自 `AbstractCollection` 类，而 `AbstractCollection` 实现了 `Collection`
    接口；因此，一个 `ArrayList` ***是一个*** `Collection`（大写“C”），是真正大写“C”意义上的。


    如果我们设计操作对象集合的方法时，接受一个***泛型*** `Collection` 引用作为参数（而不是要求传入一个***特定***类型的集合），那么这些方法将更加通用；客户端代码可以自由地传入它想要的任何
    `Collection` 类型。


    举例来说，假设我们想为 `Course` 类设计一个 `enrollStudents` 方法，以便客户端代码可以传入一个 `Student` 集合来一次性注册所有学生。如果我们指定一个特定的集合类型作为方法的参数——比如
    `ArrayList`：


    ```

    import java.util.ArrayList;

    public class Course {

    // 细节省略...

    // 接受一个特定的集合类型作为参数。

    public void enrollStudents(ArrayList x) {

    for (Student s : x)  {

    this.enroll(s);

    }

    }

    // 等等

    }

    ```


    那么客户端代码将被迫传入一个 `ArrayList` 作为参数。然而，如果我们设计该方法接受一个***泛型*** `Collection` 作为参数：


    ```

    import java.util.Collection;

    public class Course {

    // 细节省略...

    // 接受一个泛型 Collection 引用作为参数。

    public void enrollStudents(Collection c) {

    for (Student s : x)  {

    this.enroll(s);

    }

    }

    }

    ```


    那么使用此方法的客户端代码将能够传入一个 `Student` 引用的 `ArrayList`：


    ```

    Course c = new Course();

    ArrayList al = new ArrayList();

    // 用 Student 对象填充 al ... 细节省略。

    // 传入一个 ArrayList ...

    c.enrollStudents(al);

    ```


    或者一个 `Student` 引用的 `Vector`（另一种内置类型）：


    ```

    // 客户端代码。

    Course c = new Course();

    Vector v = new Vector();

    // 用 Student 对象填充 v ... 细节省略。

    // 传入一个 Vector ...

    c.enrollStudents(v);

    ```


    或者任何其他所需的 `Collection` 类型。


    对于***返回***对象集合的方法也是如此：如果我们设计它们返回泛型 `Collection` 而不是特定的集合类型，那么我们就可以自由地更改内部构建集合类型的细节。回想一下我们在第
    6 章讨论的 `Course` 类的 `getRegisteredStudents` 方法。为了方便起见，我在这里重复了那段代码：


    ```

    import java.util.ArrayList;

    public class Course {

    private ArrayList enrolledStudents;

    // 细节省略...

    // 以下方法返回对整个集合的引用——

    // 具体来说，是一个 ArrayList——其中包含注册到该课程的所有 Student 对象。

    public ArrayList getRegisteredStudents() {

    return enrolledStudents;

    }

    // 等等

    }

    ```


    因为我们将 `getRegisteredStudents` 的返回类型声明为 `ArrayList`（一种特定的集合类型），如果我们以后决定将封装的 `enrolledStudents`
    集合的类型从 `ArrayList` 更改为其他集合类型，就会遇到问题。本质上，我们已经向客户端代码暴露了本应是 `Course` 类***私有***的细节：即我们***内部***用于管理
    `Student` 引用的集合类型。


    如果我们改为将 `getRegisteredStudents` 声明为返回一个***泛型*** `Collection`，如下所示：


    ```

    import java.util.ArrayList;

    import java.util.Collection;

    public class Course {

    // 我们内部仍然维护一个 ArrayList。

    private ArrayList enrolledStudents;

    // 细节省略...

    // 然而，我们现在通过将其作为泛型 Collection 返回，“隐藏”了我们在内部使用 ArrayList 的事实。

    public Collection getRegisteredStudents() {

    // 这是允许的，因为 enrolledStudents 是一个 ArrayList，

    // 而 ArrayList 是一个 Collection。

    return enrolledStudents;

    }

    // 等等

    }

    ```


    我们现在可以自由地更改所使用的内部集合类型（一个***私有***细节），而不会影响 `getRegisteredStudents` 方法的签名（一个***公有***细节）。例如，我们可能希望从
    `ArrayList` 切换到 `TreeSet`，以利用集合固有的消除重复条目的特性（回想一下我们在第 6 章关于集合类型这一方面的讨论）：


    ```

    import java.util.TreeSet;

    import java.util.Collection;

    public class Course {

    // 我们在内部切换到了不同的 Collection 类型。

    private TreeSet enrolledStudents;

    // 细节省略...

    // 这个方法签名无需改变！！！

    public Collection getRegisteredStudents() {

    // 这是允许的，因为 enrolledStudents 是一个 TreeSet，

    // 而 TreeSet 是一个 Collection。

    return enrolledStudents;

    }

    // 等等

    }

    ```


    请务必掌握接口的概念——无论是预定义的还是用户定义的——以便在你的代码中利用它们的力量！

    '
- fmt: "# 排版后的内容\n\n在[第6章](#78624_3_En_6_Chapter.xhtml)中，我们开始讨论创建自定义集合时提到，如果需要，我们可以从头发明一种自定义集合类型，但Java语言提供了如此多的预定义集合类型，以至于通常没有必要这样做。然而，如果你发现自己想要发明一种全新的集合类型，而不扩展任何***预定义***的集合类型，请确保你的集合类型至少实现了预定义的`Collection`接口：\n\
    \n```\nimport java.util.Collection;\n\npublic class MyBrandNewCollectionType implements\
    \ Collection { ... }\n```\n\n这样，你的集合类型就可以在任何需要通用`Collection`的上下文中使用。\n\n## 静态特性\n\
    \n到目前为止，我们讨论的所有属性都与类的单个实例相关联。例如，每个`Student`对象都有自己的`String name`属性副本，并且可以独立于其他`Student`对象对其***各自***的属性副本进行操作（参见[图7-7](#78624_3_En_7_Chapter.xhtml#Fig7)）。\n\
    \n![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig7_HTML.jpg)\n\n一个学生类的示意图，包含姓名、社会安全号码等，映射到Fred、Mary和Steve的3个独立属性。\n\
    \n**图7-7** 对象管理各自的属性值\n\n在应用程序中，可能会出现这样的情况：我们希望属于特定类的所有对象***共享***某个变量的单个值，而不是让每个对象将该变量作为属性维护自己的副本。Java语言通过**静态变量**满足这一需求，这些变量与整个类相关联，而不是与单个对象相关联。\n\
    \n### 静态变量\n\n假设有一些通用信息——例如，大学注册学生总数的计数——我们希望***所有***`Student`对象都能共享该信息。我们可以将其实现为`Student`类的一个简单属性`int\
    \ totalStudents`，以及用于操作该属性的代码，如下所示：\n\n```\npublic class Student {\n    private\
    \ int totalStudents;\n    // 其他属性细节省略。\n    // 访问器方法。\n    public int getTotalStudents()\
    \ {\n        return totalStudents;\n    }\n    public void setTotalStudents(int\
    \ x) {\n        totalStudents = x;\n    }\n    // 其他杂项方法。\n    public int reportTotalEnrollment()\
    \ {\n        System.out.println(\"Total Enrollment:  \" + getTotalStudents());\n\
    \    }\n    public void incrementEnrollment() {\n        setTotalStudents(getTotalStudents()\
    \ + 1);\n    }\n    // 等等。\n}\n```\n\n然而，这是一种不太理想的设计方法，因为每当实例化一个***新***`Student`时，客户端代码必须在系统中的***每个***`Student`对象上调用`incrementEnrollment`方法，以确保***所有***`Student`对象在学生总数上保持一致：\n\
    \n```\n// 客户端代码。\n// 创建一个Student ...\nStudent s1 = new Student();\n// ... 并增加注册计数。\n\
    s1.incrementEnrollment();\n// 细节省略 ...\n// 稍后，我们创建另一个Student ...\nStudent s2 =\
    \ new Student();\n// ... 并且必须记得为BOTH增加注册计数。\ns1.incrementEnrollment();\ns2.incrementEnrollment();\n\
    // 更多细节省略 ...\n// 再后来，我们创建了另一个Student ...\nStudent s3 = new Student();\n// ...\
    \ 并且必须记得为ALL THREE增加注册计数！\ns1.incrementEnrollment();\ns2.incrementEnrollment();\n\
    s3.incrementEnrollment();\n// 呼！\n```\n\n幸运的是，有一个简单的解决方案：我们可以通过使用`static`关键字将`totalStudents`指定为`Student`类的所谓**静态变量**：\n\
    \n```\npublic class Student {\n    // totalStudents现在被声明为静态属性。\n    private static\
    \ int totalStudents;\n    // 其他属性细节省略。\n    // 接下来的三个方法与Student的先前版本相同。\n    public\
    \ int getTotalStudents() {\n        return totalStudents;\n    }\n    public void\
    \ setTotalStudents(int x) {\n        totalStudents = x;\n    }\n    public int\
    \ reportTotalEnrollment() {\n        System.out.println(\"Total Enrollment:  \"\
    \ + getTotalStudents());\n    }\n    // 此方法已被声明为静态。\n    public static void incrementEnrollment()\
    \ {\n        setTotalStudents(getTotalStudents() + 1);\n    }\n}\n```\n\n静态变量也被随意称为“静态属性”，但由于我更喜欢将“属性”理解为“属于单个对象的数据项”，我通常更倾向于使用“静态变量”这一术语。\n\
    \n这导致`totalStudents`变量与整个`Student`类相关联，如图[7-8](#78624_3_En_7_Chapter.xhtml#Fig8)所示。\n\
    \n![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig8_HTML.jpg)\n\n一个学生类的示意图，包含姓名、社会安全号码和总学生数，映射到Fred、Mary和Steve的3个独立属性。学生类中总学生数字段被高亮显示。\n\
    \n**图7-8** 静态变量与整个类相关联\n\n这使我们能够简化客户端代码如下：\n\n```\n// 客户端代码。\n// 创建三个Student，每次只为THAT\
    \ STUDENT ONLY增加注册计数。\nStudent s1 = new Student();\ns1.incrementEnrollment();\n\
    // 稍后 ...\nStudent s2 = new Student();\ns2.incrementEnrollment();\n// 再后来 ...\n\
    Student s3 = new Student();\ns3.incrementEnrollment();\n```\n\n每次我们为***一个***`Student`调用`incrementEnrollment`时，其他`Student`对象也会受益，因为它们都共享***相同***的`totalStudents`值。为了演示这一点，让我们让每个`Student`对象报告总注册人数：\n\
    \n```\ns1.reportTotalEnrollment();\ns2.reportTotalEnrollment();\ns3.reportTotalEnrollment();\n\
    ```\n\n输出如下（所有`Student`对象一致！）：\n\n```\nTotal Enrollment:  3\nTotal Enrollment:\
    \  3\nTotal Enrollment:  3\n```\n\n实际上，由于此变量有效地与整个`Student`类相关联，我们甚至可以让`Student`***类***调用`reportTotalEnrollment`，并且会得到相同的输出：\n\
    \n```\nStudent.reportTotalEnrollment();\n```\n\n输出如下：\n\n```\nTotal Enrollment:\
    \  3\n```\n\n请注意，我们使用点表示法与整个类通信，而不是与单个对象通信。然而，这只有在所讨论的方法——在本例中是`reportTotalEnrollment`——被声明为**静态方法**时才可能实现。在讨论静态方法之前，让我们先看看对`Student`类设计的最后一个改进。\n\
    \n### 设计改进：隐藏实现细节\n\n由于我们希望在创建新`Student`时增加`totalStudentCount`，我们可以将这样的逻辑插入到`Student`类的构造函数中，以自动执行：\n\
    \n```\npublic class Student {\n    private static int totalStudents;\n    // 其他细节省略。\n\
    \    // 构造函数。\n    public Student(...) {\n        // 细节省略。\n        // 每次实例化新Student时自动增加学生计数。\n\
    \        totalStudents++;\n    }\n    // 等等。\n}\n```\n\n从而消除了对`incrementEnrollment`方法的需求。这使得我们的客户端代码更加简洁：\n\
    \n```\n// 客户端代码。\n// 创建三个Student，每次自动增加totalStudents值。\nStudent s1 = new Student();\n\
    Student s2 = new Student();\nStudent s3 = new Student();\ns1.reportTotalEnrollment();\n\
    s2.reportTotalEnrollment();\ns3.reportTotalEnrollment();\nStudent.reportTotalEnrollment();\n\
    ```\n\n输出如下：\n\n```\nTotal Enrollment:  3\nTotal Enrollment:  3\nTotal Enrollment:\
    \  3\nTotal Enrollment:  3\n```\n\n这也使我们的客户端代码***万无一失***：我们不再有在创建每个`Student`后忘记显式调用`incrementEnrollment`的风险。如前所述，***只要可能，最好将此类实现细节隐藏在类内部，以减轻客户端代码的负担，从而减少逻辑错误的可能性***。"
  raw: 'In Chapter [6](#78624_3_En_6_Chapter.xhtml), our discussion of creating custom
    collections started out by mentioning that we could, if desired, invent a custom
    collection type from scratch, but that the Java language provides so many predefined
    collection types that doing so is not usually necessary. However, should you ever
    find yourself wanting to invent a brand-new collection type without extending
    one of the ***predefined*** collection types, be certain that your collection
    type implements the predefined `Collection` interface, at a minimum


    `import java.util.Collection;`


    `public class MyBrandNewCollectionType implements Collection { ... }`


    so that your collection type will be usable in any context where a generic `Collection`
    is required.


    ## Static Features


    Up until this point, all of the attributes that we’ve discussed have been associated
    with an individual instance of a class. Every `Student` object has its own copy
    of the `String name` attribute, for example, and can manipulate its value independently
    of what other `Student` objects are doing with ***their*** copies of the same
    attribute (see Figure [7-7](#78624_3_En_7_Chapter.xhtml#Fig7)).


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig7_HTML.jpg)


    A diagram of the student class with name, social security number, and others is
    mapped to 3 individual attributes for Fred, Mary, and Steve.


    Figure 7-7


    Objects manage their individual attribute values


    Circumstances can arise in an application where we’ll want all objects belonging
    to a particular class to ***share*** a single value of a particular variable instead
    of having each object maintain its own copy of that variable as an attribute.
    The Java language satisfies this need through **static variables** that are associated
    with classes as a whole rather than with individual objects.


    ### Static Variables


    Suppose there was some piece of general information—say, the count of the total
    number of students enrolled at the university—that we wanted ***all*** `Student`
    objects to have shared knowledge of. We could implement this as a simple attribute
    of the `Student` class, `int totalStudents`, along with code for manipulating
    the attribute as shown here:


    ```

    public class Student {

    private int totalStudents;

    // Other attribute details omitted.

    // Accessor methods.

    public int getTotalStudents() {

    return totalStudents;

    }

    public void setTotalStudents(int x) {

    totalStudents = x;

    }

    // Other miscellaneous methods.

    public int reportTotalEnrollment() {

    System.out.println("Total Enrollment:  " + getTotalStudents());

    }

    public void incrementEnrollment() {

    setTotalStudents(getTotalStudents() + 1);

    }

    // etc.

    }

    ```


    This would be a less-than-desirable design approach, however, because client code
    would have to invoke the `incrementEnrollment` method on ***every*** `Student`
    object in the system any time a ***new*** `Student` was instantiated, to ensure
    that ***all*** `Student`s were in agreement on the total student count:


    ```

    // Client code.

    // Create a Student ...

    Student s1 = new Student();

    // ... and increment the enrollment count.

    s1.incrementEnrollment();

    // Details omitted ...

    // Later, we create another Student ...

    Student s2 = new Student();

    // ... and have to remember to increment the enrollment count for BOTH.

    s1.incrementEnrollment();

    s2.incrementEnrollment();

    // More details omitted ...

    // Still later, we create yet another Student ...

    Student s3 = new Student();

    // ... and have to remember to increment the enrollment count for ALL THREE!

    s1.incrementEnrollment();

    s2.incrementEnrollment();

    s3.incrementEnrollment();

    // Phew!

    ```


    Fortunately, there is a simple solution: we can designate `totalStudents` to be
    what is known as a **static variable** of the `Student` class through use of the
    `static` keyword:


    ```

    public class Student {

    // totalStudents is now declared to be a static attribute.

    private static int totalStudents;

    // Other attribute details omitted.

    // The next three methods are unchanged from the previous version of Student.

    public int getTotalStudents() {

    return totalStudents;

    }

    public void setTotalStudents(int x) {

    totalStudents = x;

    }

    public int reportTotalEnrollment() {

    System.out.println("Total Enrollment:  " + getTotalStudents());

    }

    // This method has been declared to be static.

    public static void incrementEnrollment() {

    setTotalStudents(getTotalStudents() + 1);

    }

    }

    ```


    Static variables are also casually referred to as “static attributes,” but since
    I prefer the notion of an “attribute” as “a data item belonging to an individual
    object,” I generally favor the nomenclature of “static variables” instead.


    This causes the `totalStudents` variable to be associated with the `Student` class
    as a whole, as represented conceptually in Figure [7-8](#78624_3_En_7_Chapter.xhtml#Fig8).


    ![](images/78624_3_En_7_Chapter/78624_3_En_7_Fig8_HTML.jpg)


    A diagram of a student class with name, social security number, and total students
    is mapped to 3 individual attributes for Fred, Mary, and Steve. The student class
    has the total students field highlighted.


    Figure 7-8


    Static variables are associated with a class as a whole


    This enables us to simplify our client code as follows:


    ```

    // Client code.

    // Create three Students, incrementing the enrollment each time

    // FOR THAT STUDENT ONLY.

    Student s1 = new Student();

    s1.incrementEnrollment();

    // Later ...

    Student s2 = new Student();

    s2.incrementEnrollment();

    // Still later ...

    Student s3 = new Student();

    s3.incrementEnrollment();

    ```


    Each time we invoke `incrementEnrollment` for ***one*** `Student`, the others
    will benefit, because they all share the ***same*** `totalStudents` value. To
    demonstrate this, let’s ask each `Student` object to report on total enrollment:


    ```

    s1.reportTotalEnrollment();

    s2.reportTotalEnrollment();

    s3.reportTotalEnrollment();

    ```


    Here’s the output (all `Student`s agree!):


    ```

    Total Enrollment:  3

    Total Enrollment:  3

    Total Enrollment:  3

    ```


    In fact, since this variable is effectively associated with the `Student` class
    as a whole, we can even ask the `Student` ***class*** to `reportTotalEnrollment`,
    and we’ll get the same output:


    ```

    Student.reportTotalEnrollment();

    ```


    Here’s the output:


    ```

    Total Enrollment:  3

    ```


    Note that we’re using dot notation to talk to a class as a whole vs. talking to
    individual objects. This is only possible, however, if the method in question—in
    this case, `reportTotalEnrollment`—is declared to be a **static method**. Before
    we discuss static methods, however, let’s look at one final improvement to the
    design of our `Student` class.


    ### A Design Improvement: Burying Implementation Details


    Since we want to increment `totalStudentCount` whenever we create a new `Student`,
    we can insert such logic into the `Student` class’s constructor(s) to do so automatically


    ```

    public class Student {

    private static int totalStudents;

    // Other details omitted.

    // Constructor.

    public Student(...) {

    // Details omitted.

    // Automatically increment the student count every time we

    // instantiate a new Student.

    totalStudents++;

    }

    // etc.

    }

    ```


    thereby eliminating the need for an `incrementEnrollment` method. This makes our
    client code much more concise:


    ```

    // Client code.

    // Create three Students, AUTOMATICALLY incrementing the totalStudents value

    // each time.

    Student s1 = new Student();

    Student s2 = new Student();

    Student s3 = new Student();

    s1.reportTotalEnrollment();

    s2.reportTotalEnrollment();

    s3.reportTotalEnrollment();

    Student.reportTotalEnrollment();

    ```


    Here’s the output:


    ```

    Total Enrollment:  3

    Total Enrollment:  3

    Total Enrollment:  3

    Total Enrollment:  3

    ```


    It also makes our client code ***foolproof***: we no longer run the risk of forgetting
    to invoke `incrementEnrollment` explicitly after creating each `Student`. As mentioned
    before, ***whenever possible, it’s desirable to bury such implementation details
    inside of a class, to lessen the burden on—and hence to lessen the likelihood
    for logic errors in—client code***.'
  trans: '

    在第 6 章中，我们讨论创建自定义集合时曾提到，虽然理论上可以从头发明一种全新的集合类型，但 Java 语言提供了如此丰富的预定义集合类型，以至于通常无需这样做。不过，如果你确实想在不扩展任何***预定义***集合类型的前提下创建一种全新的集合类型，请务必确保你的集合类型至少实现了预定义的
    `Collection` 接口：


    `import java.util.Collection;`


    `public class MyBrandNewCollectionType implements Collection { ... }`


    这样，你的集合类型就能在任何需要通用 `Collection` 的上下文中使用。


    ## 静态特性


    到目前为止，我们讨论的所有属性都与类的单个实例相关联。例如，每个 `Student` 对象都有自己的 `String name` 属性副本，并且可以独立于其他
    `Student` 对象对***它们***的同一属性副本进行操作（见图 7-7）。


    ![](img/78624_3_En_7_Fig7_HTML.jpg)


    一个学生类示意图，其中姓名、社保号等属性分别映射到 Fred、Mary 和 Steve 三个对象的独立属性。


    图 7-7


    对象管理各自的属性值


    在应用程序中，有时会出现这样的情况：我们希望属于某个特定类的所有对象***共享***某个变量的单一值，而不是让每个对象都维护该变量作为自己的属性副本。Java
    语言通过**静态变量**来满足这一需求，静态变量与整个类相关联，而非与单个对象相关联。


    ### 静态变量


    假设有一些通用信息——例如，大学注册学生总数的计数——我们希望***所有*** `Student` 对象都能共享这一信息。我们可以将其实现为 `Student`
    类的一个简单属性 `int totalStudents`，并编写操作该属性的代码，如下所示：


    ```

    public class Student {

    private int totalStudents;

    // 其他属性细节省略。

    // 访问器方法。

    public int getTotalStudents() {

    return totalStudents;

    }

    public void setTotalStudents(int x) {

    totalStudents = x;

    }

    // 其他杂项方法。

    public int reportTotalEnrollment() {

    System.out.println("总注册人数：" + getTotalStudents());

    }

    public void incrementEnrollment() {

    setTotalStudents(getTotalStudents() + 1);

    }

    // 等等。

    }

    ```


    然而，这是一种不太理想的设计方法，因为每当实例化一个***新*** `Student` 时，客户端代码都必须对系统中***每一个*** `Student`
    对象调用 `incrementEnrollment` 方法，以确保***所有*** `Student` 对象在学生总数上保持一致：


    ```

    // 客户端代码。

    // 创建一个 Student ...

    Student s1 = new Student();

    // ... 并增加注册人数。

    s1.incrementEnrollment();

    // 细节省略 ...

    // 稍后，我们创建另一个 Student ...

    Student s2 = new Student();

    // ... 并且必须记得为两个对象都增加注册人数。

    s1.incrementEnrollment();

    s2.incrementEnrollment();

    // 更多细节省略 ...

    // 再后来，我们又创建了一个 Student ...

    Student s3 = new Student();

    // ... 并且必须记得为所有三个对象都增加注册人数！

    s1.incrementEnrollment();

    s2.incrementEnrollment();

    s3.incrementEnrollment();

    // 呼！

    ```


    幸运的是，有一个简单的解决方案：我们可以通过使用 `static` 关键字，将 `totalStudents` 指定为 `Student` 类的一个**静态变量**：


    ```

    public class Student {

    // totalStudents 现在被声明为静态属性。

    private static int totalStudents;

    // 其他属性细节省略。

    // 接下来的三个方法与之前版本的 Student 相同。

    public int getTotalStudents() {

    return totalStudents;

    }

    public void setTotalStudents(int x) {

    totalStudents = x;

    }

    public int reportTotalEnrollment() {

    System.out.println("总注册人数：" + getTotalStudents());

    }

    // 此方法已被声明为静态方法。

    public static void incrementEnrollment() {

    setTotalStudents(getTotalStudents() + 1);

    }

    }

    ```


    静态变量有时也被非正式地称为“静态属性”，但由于我更倾向于将“属性”理解为“属于单个对象的数据项”，因此我通常更喜欢使用“静态变量”这一术语。


    这样，`totalStudents` 变量就与整个 `Student` 类相关联，如图 7-8 的概念所示。


    ![](img/78624_3_En_7_Fig8_HTML.jpg)


    一个学生类示意图，其中姓名、社保号和总学生数分别映射到 Fred、Mary 和 Steve 三个对象的独立属性。学生类中的总学生数字段被高亮显示。


    图 7-8


    静态变量与整个类相关联


    这使我们能够将客户端代码简化为如下形式：


    ```

    // 客户端代码。

    // 创建三个 Student，每次只为该 Student 增加注册人数。

    Student s1 = new Student();

    s1.incrementEnrollment();

    // 稍后 ...

    Student s2 = new Student();

    s2.incrementEnrollment();

    // 再后来 ...

    Student s3 = new Student();

    s3.incrementEnrollment();

    ```


    每次我们为***一个*** `Student` 调用 `incrementEnrollment` 时，其他 `Student` 对象也会受益，因为它们都共享***同一个***
    `totalStudents` 值。为了演示这一点，我们让每个 `Student` 对象报告总注册人数：


    ```

    s1.reportTotalEnrollment();

    s2.reportTotalEnrollment();

    s3.reportTotalEnrollment();

    ```


    输出如下（所有 `Student` 对象结果一致！）：


    ```

    总注册人数：3

    总注册人数：3

    总注册人数：3

    ```


    实际上，由于这个变量实际上与整个 `Student` 类相关联，我们甚至可以让 `Student` ***类*** 调用 `reportTotalEnrollment`，也会得到相同的输出：


    ```

    Student.reportTotalEnrollment();

    ```


    输出如下：


    ```

    总注册人数：3

    ```


    请注意，我们使用点号表示法与整个类通信，而不是与单个对象通信。然而，这只有在相关方法（本例中为 `reportTotalEnrollment`）被声明为**静态方法**时才可能实现。不过，在讨论静态方法之前，让我们先看看对
    `Student` 类设计的最后一项改进。


    ### 设计改进：隐藏实现细节


    由于我们希望在每次创建新 `Student` 时增加 `totalStudentCount`，我们可以将此类逻辑插入到 `Student` 类的构造函数中，使其自动执行：


    ```

    public class Student {

    private static int totalStudents;

    // 其他细节省略。

    // 构造函数。

    public Student(...) {

    // 细节省略。

    // 每次实例化新 Student 时自动增加学生计数。

    totalStudents++;

    }

    // 等等。

    }

    ```


    这样就无需再使用 `incrementEnrollment` 方法。这使得我们的客户端代码更加简洁：


    ```

    // 客户端代码。

    // 创建三个 Student，每次自动增加 totalStudents 值。

    Student s1 = new Student();

    Student s2 = new Student();

    Student s3 = new Student();

    s1.reportTotalEnrollment();

    s2.reportTotalEnrollment();

    s3.reportTotalEnrollment();

    Student.reportTotalEnrollment();

    ```


    输出如下：


    ```

    总注册人数：3

    总注册人数：3

    总注册人数：3

    总注册人数：3

    ```


    这也使我们的客户端代码***万无一失***：我们不再有忘记在创建每个 `Student` 后显式调用 `incrementEnrollment` 的风险。如前所述，***只要可能，最好将此类实现细节隐藏在类内部，以减轻客户端代码的负担，从而降低逻辑错误的可能性***。

