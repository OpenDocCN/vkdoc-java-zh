- fmt: '### Testing the Equality of Objects


    What does it mean to say that two objects are “equal”? When speaking of generic
    `Object`s, we say that two objects (or, more precisely, two object ***references***)
    are equal if they both refer to precisely the same object in memory (i.e., if
    the references both point to the same exact memory location in the JVM). Java
    provides two ways for determining the equality of two `Object` references `x`
    and `y`:


    - The double equal sign operator (`==`), which we’ve seen used several times previously
    in this book, first to compare the values of simple data types in Chapter [2](#78624_3_En_2_Chapter.xhtml)


    ```

    int x = 3;

    int y = 3;

    if (x == y) { ...

    ```


    and then to compare the identities of `String` references earlier in Chapter [13](#78624_3_En_13_Chapter.xhtml):


    - The `boolean equals` method, which is inherited by all objects from the `Object`
    class; we used this method with the `String` class earlier in this chapter.


    ```

    String x = "foo";

    String y = "foo";

    // Do x and y refer to the same String object?

    if (x == y) { ...

    ```


    As defined for `Object`s generically, the `==` operator and the `equals` method
    can be used interchangeably to test whether two references refer to exactly the
    same `Object`. Here’s some example code to illustrate these two alternative approaches:


    ```

    public class EqualsTest1 {

    public static void main(String[] args) {

    // We''ll create one generic Object...

    Object o1 = new Object();

    // ... and maintain two handles on it (o1 and o2).

    Object o2 = o1;

    // We''ll create a second different Object object, and will

    // use variable o3 to maintain a handle on it.

    Object o3 = new Object();

    ```


    This is illustrated conceptually in Figure [13-26](#78624_3_En_13_Chapter.xhtml#Fig26).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig26_HTML.png)


    The diagram illustrates two objects, labeled Object 1 and Object 2, and two balloons
    that represent their respective memory regions. Object 1 has two threads, labeled
    01 and 02, while Object 2 has one thread labeled 03.


    Figure 13-26


    We’ve created two generic `Objects`


    Then, if we execute the following code (note our use of nested `boolean` expressions
    within the `println` statements)


    ```

    // Are o1 and o2 "equal"?

    System.out.println("The expression o1 == o2 evaluates to: " + (o1 == o2));

    System.out.println("The expression o1.equals(o2) evaluates to: " +

    (o1.equals(o2)));

    // Are o1 and o3 "equal"?

    System.out.println("The expression o1 == o3 evaluates to: " + (o1 == o3));

    System.out.println("The expression o1.equals(o3) evaluates to: " +

    (o1.equals(o3)));

    ```


    the following output results:


    ```

    The expression o1 == o2 evaluates to: true

    The expression o1.equals(o2) evaluates to: true

    The expression o1 == o3 evaluates to: false

    The expression o1.equals(o3) evaluates to: false

    ```


    This is because `o1` and `o2` are truly referring to exactly the same `Object`,
    whereas `o3` is referring to a different `Object`.


    Let’s repeat the example, this time using `Person` objects:


    ```

    public class EqualsTest2 {

    public static void main(String[] args) {

    // We''ll create one Person object ...

    Person p1 = new Person("222-22-2222", "Fred");

    // ... and maintain two handles on it (p1 and p2).

    Person p2 = p1;

    // We''ll create a second different Person object with exactly the same

    // attribute values as the first Person object that we created, and will

    // use variable p3 to maintain a handle on this second object.

    Person p3 = new Person("222-22-2222", "Fred");

    ```


    When we execute the following code


    ```

    // Are p1 and p2 "equal"?

    System.out.println("The expression p1 == p2 evaluates to: " + (p1 == p2));

    System.out.println("The expression p1.equals(p2) evaluates to: " +

    (p1.equals(p2)));

    // Are p1 and p3 "equal"?

    System.out.println("The expression p1 == p3 evaluates to: " + (p1 == p3));

    System.out.println("The expression p1.equals(p3) evaluates to: " +

    (p1.equals(p3)));

    ```


    we get the same sort of result as we did for generic `Object`s:


    ```

    The expression p1 == p2 evaluates to: true

    The expression p1.equals(p2) evaluates to: true

    The expression p1 == p3 evaluates to: false

    The expression p1.equals(p3) evaluates to: false

    ```


    Even though `p1` and `p3` are referring to `Person` objects with ***identical
    attribute values***, they are nonetheless physically distinct `Person` instances,
    and so `p1` is not considered to be “equal to” `p3`.


    Let’s repeat this example one final time, this time using `String`s. We’ll formally
    instantiate the `String`s to avoid the `String` literal pool, ensuring that we
    truly do create physically separate instances of `String` objects:


    ```

    public class EqualsTest3 {

    public static void main(String[] args) {

    // We''ll create one String object, using the formal method of

    // String instantiation ...

    String s1 = new String("hello");

    // ... and maintain two handles on it (s1 and s2).

    String s2 = s1;

    // We''ll explicitly instantiate a second String object,

    // with EXACTLY THE SAME VALUE as the first String object –

    // "hello" –  and will use variable s3 to maintain a handle

    // on this second String.

    String s3 = new String("hello");

    ```


    This is illustrated conceptually in Figure [13-27](#78624_3_En_13_Chapter.xhtml#Fig27).


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig27_HTML.jpg)


    The diagram illustrates two objects, labeled hello string 1 and hello string 2,
    and two balloons that represent their respective memory regions. Hello 1 has two
    threads, labeled S 1 and S 2, while string 2 has one thread labeled S 3.


    Figure 13-27


    We’ve created two physically distinct `String` instances with the same value,
    “`hello`”


    When we execute the following client code


    ```

    // Are s1 and s2 "equal"?

    System.out.println("The expression s1 == s2 evaluates to: " + (s1 == s2));

    System.out.println("The expression s1.equals(s2) evaluates to: " + (s1.equals(s2)));

    // Are s1 and s3 "equal"?

    System.out.println("The expression s1 == s3 evaluates to: " + (s1 == s3));

    System.out.println("The expression s1.equals(s3) evaluates to: " + (s1.equals(s3)));

    ```


    the following output results:


    ```

    The expression s1 == s2 evaluates to: true

    The expression s1.equals(s2) evaluates to: true

    The expression s1 == s3 evaluates to: false

    The expression s1.equals(s3) evaluates to: true

    ```


    Note that when comparing `String`s with the `equals` method, the `equals` method
    behaves ***differently*** than it did for generic `Object`s and for `Person` objects:
    that is, `s1` and `s3` are deemed to be “equal” ***despite the fact that they
    refer to physically different*** **String** ***instances!*** Compare the preceding
    last line of output


    ```

    The expression s1.equals(s3) evaluates to: true

    ```


    with the corresponding lines of output from our `Object` and `Person` examples:


    ```

    The expression o1.equals(o3) evaluates to: false

    ```


    and:


    ```

    The expression p1.equals(p3) evaluates to: false

    ```


    How is it that the `equals` method behaves differently for `String`s than it does
    for other object types? As it turns out, the `String` class ***overrides*** the
    `equals` method as defined by the `Object` class so that it compares `String`
    ***values*** rather than `String` ***identities***. In fact, many of the predefined
    Java classes have overridden the `equals` method as inherited from `Object` to
    perform a relevant, class-specific comparison, for example, the wrapper classes
    (`Boolean`, `Integer`, `Double`, etc.), the `Date` class, and others. And, of
    course, we can override the `equals` method for our own classes, as well; let’s
    see how this is accomplished.'
