  trans: '

    ## 对象作为客户端与供应方


    在之前 `Course` 对象与 `Student` 对象之间传递消息的例子中，我们可以将 `Course` 对象 `c` 视为 `Student` 对象
    `s` 的**客户端**，因为 `c` 请求 `s` 执行其方法之一——即 `getTranscript`——作为对 `c` 的一项***服务***。这与现实世界中***你***作为客户，请求会计师、律师或建筑师提供服务的概念完全相同。类似地，当
    `c` 请求 `t` 执行其 `successfulCompletion` 方法时，`c` 也是 `Transcript t` 的客户端。因此，我们将调用对象
    X 上方法的代码称为相对于 X 的**客户端代码**，因为此类代码受益于 X 提供的服务。


    让我们看几个与几页前涉及 `Course`、`Student` 和 `Transcript` 对象的消息传递示例相对应的客户端代码示例。第一个代码示例取自应用程序的
    `main` 方法，它实例化了两个对象——`Course c` 和 `Student s`——并调用了其中一个对象的方法，使它们开始“对话”：


    ```

    public class MyApp {

    public static void main(String[] args) {

    Course c = new Course();

    Student s = new Student();

    // 细节省略...

    // 调用 Course 对象 c 上的方法。

    // （这在前面的图中标记为消息 (1)；该图中标记为 (6) 的返回值

    // 被捕获到布尔变量 "success" 中。）

    boolean success = c.register(s);

    // 等等。

    }

    }

    ```


    在此示例中，`main` 方法体被视为相对于 `Course` 对象 `c` 的***客户端代码***，因为 `main` 方法请求 `c` 执行其 `register`
    方法作为一项服务。


    现在让我们看看在 `Course` 类内部实现 `register` 方法体的代码：


    ```

    public class Course {

    // 属性细节省略...

    public boolean register(Student s) {

    boolean outcome = false;

    // 获取 Student s 的 Transcript 对象的句柄。

    // （这在前面的图中标记为消息 (2)。）

    Transcript t = s.getTranscript();

    // （此方法的返回值在前面的图中标记为 (3)。）

    // 现在，请求该 Transcript 对象提供服务。

    // （假设 c2 是某个先修课程 Course 的句柄...）

    // （这在前面的图中标记为消息 (4)。）

    if (t.successfulCompletion(c2)) {

    // （下一个返回值在前面的图中标记为 (5)。）

    outcome = true;

    }

    else {

    outcome = false;

    }

    return outcome;

    }

    // 等等。

    ```


    我们看到，`Course` 类的 `register` 方法体被视为相对于 `Student` 对象 `s` **和** `Transcript` 对象 `t`
    的***客户端代码***，因为这段代码请求 `s` 和 `t` 各自执行一项服务：`s.getTranscript()` 和 `t.successfulCompletion(c2)`。


    每当对象 A 是对象 B 的客户端时，对象 B 反过来可以被视为 A 的**供应方**。请注意，两个对象之间的客户端和供应方角色并非绝对；这些角色仅在特定消息传递事件期间有效。如果我请你把面包递给我，我是你的客户端，你是我的供应方；如果片刻之后你请我把黄油递给你，那么你是我的客户端，我是你的供应方。


    关于对象作为客户端和供应方的概念，在 Bertrand Meyer 所著的 *Object-Oriented Software Construction*（Prentice
    Hall，2000 年）中有进一步讨论。


    ## 信息隐藏/可访问性


    正如我们一直使用点符号向对象发送消息一样，我们也可以使用点符号来引用对象的属性。例如，如果我们声明一个引用变量 `x` 的类型为 `Student`，我们可以从客户端代码中通过以下符号引用
    `Student x` 的任何属性：


    ```

    x.attribute_name

    ```


    其中点用于限定所关注***属性***的名称，该名称属于表示该对象的引用变量：`x.name`、`x.gpa` 等。


    以下是一些额外的示例：


    ```

    // 实例化两个对象。

    Student x = new Student();

    Student y = new Student();

    // 使用点符号将属性作为变量访问。

    // 分配学生 x 的姓名...

    x.name = "John Smith";

    // ...以及学生 y 的姓名。

    y.name = "Joe Blow";

    // 比较两个学生的年龄。

    if (x.age == y.age) { ... }

    ```


    然而，仅仅因为我们***可以***以这种方式访问属性，并不意味着我们***应该***这样做。我们有很多理由希望***限制***对对象数据的访问，以便让对象完全控制其数据何时以及如何被修改，并且有多种机制可以让我们借助
    Java 编译器来强制执行此类限制。


    在实践中，对象通常会限制对其某些特性（属性或方法）的访问。这种限制被称为**信息隐藏**。在一个设计良好的面向对象应用程序中，一个类通常会公开其对象***能做什么***——即对象能够提供的服务，通过类的方法头声明——但***隐藏***其内部细节，包括它们***如何***执行这些服务以及为了***支持***这些服务而在内部维护的数据（属性）。


    打个比方，想想干洗店的黄页广告。这样的广告会宣传干洗店提供的服务——即他们***能为你做什么***：“我们清洗正装”、“我们专长清洗地毯”等等。然而，广告通常***不会***透露他们***如何***进行清洗的细节——例如，他们使用哪些特定的化学品或设备——因为你，潜在客户，无需知道这些细节就能判断某家干洗店是否能提供你所需的服务。


    我们使用术语**可访问性**来指代对象的某个特定特性是否可以在声明它的类之外被访问——即是否可以通过点符号从客户端代码访问。特性的可访问性是通过在其声明开头放置一个**访问修饰符**关键字来确定的：


    ```

    public class MyClass {

    // 属性。

    access-modifier int x;

    // 等等。

    // 方法。

    access-modifier void foo() { ... }

    // 等等。

    }

    ```


    Java 定义了多种不同的访问修饰符。让我们探讨使用两个主要访问修饰符 `private` 和 `public` 的含义。


    还有第三个访问修饰符 `protected`，以及默认的 `package` 级别访问权限，我们将在本书后面再讨论。

