    \ program requirements, we learn the following:\n\n*   Every degree program specifies\
    \ five “core” courses—that is, courses that a student ***must*** take. For example,\
    \ for the degree of Master of Science in information technology (MSIT), students\
    \ are required to complete the following five core courses:\n    *   Analysis\
    \ of Algorithms\n\n*   Application Programming Design\n\n*   Computer Systems\
    \ Architecture\n\n*   Data Structures\n\n*   Information Systems Project Management\n\
    \n*   Students are expected to select an area of specialization, known as a **concentration**,\
    \ within their degree program. For the MSIT degree, our university offers three\
    \ different concentrations:\n    *   Object Technology\n\n*   Database Management\
    \ Systems\n\n*   Networking and Communications\n\n*   Each concentration in turn\
    \ specifies three mandatory, concentration-specific courses. For the MSIT degree\
    \ with a concentration in Object Technology, the required concentration-specific\
    \ courses are\n    *   Object Methods for Software Development\n\n*   Advanced\
    \ Java Programming\n\n*   Object Database Management Systems\n\n*   Finally, the\
    \ student must take two additional electives to bring their course total to ten.\n\
    \nPhew! To model all of these interdependencies would require a fairly complex\
    \ class diagram structure, as shown in Figure [12-1](#78624_3_En_12_Chapter.xhtml#Fig1).\n\
    \n![](images/78624_3_En_12_Chapter/78624_3_En_12_Fig1_HTML.jpg)\n\nA block diagram\
    \ illustrates the degree program, concentration, plan of study, and courses, which\
    \ are interrelated with defined core requirements, fulfillment, observation, and\
    \ required courses as core, concentration, and electives.\n\nFigure 12-1\n\nModeling\
    \ degree program requirements proves to be rather complicated\n\nWe go back to\
    \ our project sponsors—the future users of the SRS—and break the news to them\
    \ that we’ve just uncovered a previously missed requirement that is going to significantly\
    \ increase the complexity and cost of our automation effort. The sponsors decide\
    \ that having the SRS verify the correctness of a student’s plan of study is too\
    \ ambitious a goal; they instead decide that a student will use the SRS to submit\
    \ a ***proposed*** plan of study, but that their advisor will then be responsible\
    \ for ***subsequently*** verifying and approving it. So all we wind up having\
    \ to do to correct our SRS class diagram as last presented is to add one attribute\
    \ to the `PlanOfStudy` class, reflecting the date on which it was approved, and\
    \ a new *approves* association connecting the `Professor` class to the `PlanOfStudy`\
    \ class, and we’re good to go!\n\nNote that we don’t need to add an `approvePlan`\
    \ method to the `PlanOfStudy` class, because as discussed in Chapter [10](#78624_3_En_10_Chapter.xhtml)\
    \ we may assume the presence of “set” methods for all attributes; the `setDateApproved`\
    \ method would suffice for marking a plan as approved. And the *approves* association\
    \ between the `PlanOfStudy` and `Professor` classes (see the diagram excerpt in\
    \ Figure [12-2](#78624_3_En_12_Chapter.xhtml#Fig2)) ensures us that each `PlanOfStudy`\
    \ object will maintain a handle on the `Professor` object who actually approved\
    \ the plan on the date indicated.\n\n![](images/78624_3_En_12_Chapter/78624_3_En_12_Fig2_HTML.jpg)\n\
    \nA block diagram illustrates four segmented boxes, which include Person, Plan\
    \ of Study, Professor, and Student table. At the top, an arrow mark indicates\
    \ approval of the Plan of Study, including the date approved, verification of\
    \ the plan, observation of the student's major and degree enrollment, and advice\
    \ for the professor's title and person.\n\nFigure 12-2\n\nMaking minor adjustments\
    \ to the SRS class diagram"
  trans: "\n## 测试模型\n\n测试模型并非“高深莫测”；相反，它需要一些旨在识别错误和/或遗漏的常识性措施。\n\n*   首先，重新审视所有与需求相关的项目文档——原始问题陈述和支持性用例——以确保没有遗漏任何需求。稍后我们将对我们的\
    \ SRS 模型进行此项操作。\n\n*   对模型进行至少两次独立的正式走查：一次与开发团队成员进行，另一次与系统的未来用户进行。在每次走查之前，请确保提前足够时间将以下文档的副本分发给每位参与者，以便他们有时间进行审阅（如果他们愿意的话），但要做好在会议上讨论这些文档重要方面的准备，以防参与者没有审阅：\n\
    \    *   问题陈述叙述的执行摘要版本\n\n    *   类图\n\n    *   数据字典\n\n    *   用例文档\n\n    *\
    \   重要场景及相应的消息跟踪图\n\n在项目的这个阶段，你希望已经教会了用户如何阅读 UML 图，并且他们已经非正式地看到了不断演变的模型的多次迭代。然而，如果即将进行的走查中有任何参与者不熟悉任何符号，请提前花时间在这方面对他们进行指导。（本书第\
    \ 10 章和第 11 章中包含的信息应该足以作为此类教程的基础。）\n\n在进行走查时，指定一个人担任讲解员和讨论主持人，另一个人负责记录重要的讨论内容，特别是需要进行的更改。让一个人同时尝试做这两件事会分散注意力，并可能导致遗漏重要笔记。如果合适，你甚至可以安排录音讨论。\n\
    \n在整个评审过程中保持开放的心态。为自己努力完成的工作辩护是人之常情，但请记住，在 SRS 还只是一个纸面框架时发现并纠正缺陷，远比将其转化为代码之后要好得多。\n\
    \n## 重新审视需求\n\n在重新审视 SRS 案例研究的问题陈述时，我们发现我们确实***遗漏***了一个需求，即：\n\n*SRS 将验证所提议的学习计划是否满足学生所攻读学位的要求。*\n\
    \n我们没有将 `Degree` 建模为一个类——回想一下，我们在第 10 章中曾争论过是否要这样做，最终决定不这样做。就此而言，我们也没有在我们的模型中反映特定学位课程的要求。让我们看看现在要正确地做到这一点需要做些什么。\n\
    \n通过研究我们大学指定学位课程要求的方式，我们了解到以下内容：\n\n*   每个学位课程都规定了五门“核心”课程——即学生***必须***修读的课程。例如，对于信息技术理学硕士（MSIT）学位，学生需要完成以下五门核心课程：\n\
    \    *   算法分析\n\n*   应用程序编程设计\n\n*   计算机系统架构\n\n*   数据结构\n\n*   信息系统项目管理\n\n*\
    \   学生需要在其学位课程中选择一个专业领域，称为**专业方向**。对于 MSIT 学位，我们大学提供三个不同的专业方向：\n    *   对象技术\n\
    \n*   数据库管理系统\n\n*   网络与通信\n\n*   每个专业方向又规定了三门必修的、特定于该方向的课程。对于以对象技术为专业方向的 MSIT\
    \ 学位，所需的特定方向课程是：\n    *   面向对象的软件开发方法\n\n*   高级 Java 编程\n\n*   对象数据库管理系统\n\n*\
    \   最后，学生必须选修另外两门选修课，使其课程总数达到十门。\n\n哎呀！要对所有这些相互依赖关系进行建模，需要一个相当复杂的类图结构，如图 12-1\
    \ 所示。\n\n![](img/78624_3_En_12_Fig1_HTML.jpg)\n\n一个框图说明了学位课程、专业方向、学习计划和课程，这些通过定义的核心要求、实现、观察以及作为核心、专业方向和选修课的必修课程相互关联。\n\
    \n图 12-1\n\n对学位课程要求进行建模证明是相当复杂的\n\n我们回到项目发起人——SRS 的未来用户——那里，向他们通报我们刚刚发现了一个之前遗漏的需求，这将显著增加我们自动化工作的复杂性和成本。发起人决定，让\
    \ SRS 验证学生学习计划的正确性是一个过于雄心勃勃的目标；他们转而决定，学生将使用 SRS 提交一个***提议的***学习计划，但随后将由他们的导师负责***随后***验证和批准该计划。因此，为了纠正我们上次展示的\
    \ SRS 类图，我们最终需要做的只是向 `PlanOfStudy` 类添加一个属性，反映其被批准的日期，以及一个连接 `Professor` 类和 `PlanOfStudy`\
    \ 类的新 *approves* 关联，这样就可以了！\n\n请注意，我们不需要向 `PlanOfStudy` 类添加 `approvePlan` 方法，因为正如在第\
    \ 10 章中讨论的那样，我们可以假设所有属性都存在“set”方法；`setDateApproved` 方法就足以将计划标记为已批准。而 `PlanOfStudy`\
    \ 和 `Professor` 类之间的 *approves* 关联（参见图 12-2 中的图示片段）确保每个 `PlanOfStudy` 对象将维护一个指向实际在指定日期批准该计划的\
    \ `Professor` 对象的句柄。\n\n![](img/78624_3_En_12_Fig2_HTML.jpg)\n\n一个框图说明了四个分段框，包括人员、学习计划、教授和学生表。顶部有一个箭头标记表示对学习计划的批准，包括批准日期、计划验证、对学生专业和学位注册的观察，以及教授职称和人员的建议。\n\
    \n图 12-2\n\n对 SRS 类图进行微小调整\n"
- fmt: '# Reusing Models: A Word About Design Patterns


    As we discussed in Chapter [2](#78624_3_En_2_Chapter.xhtml), when learning about
    something new, we automatically search our “mental archive” for other abstractions/models
    that we’ve previously built and mastered, to look for similarities that we can
    build upon. This technique of comparing features to find an abstraction that is
    similar enough to be reused effectively is known as **pattern reuse**. As it turns
    out, pattern reuse is an important technique for object-oriented software development.


    Let’s say that after we finish up our SRS class diagram, we’re called upon to
    model a system for a small travel agency, Wild Blue Yonder (WBY). As a brand-new
    travel agency, WBY wishes to offer a level of customer service above and beyond
    their well-established competitors, and so they decide to enable their customers
    to make travel reservations online via the Web (most of WBY’s competitors take
    such requests over the phone).


    For any given travel package—let’s say a ten-day trip to Ireland—WBY offers numerous
    trips throughout the year. Each trip has a maximum client capacity, so if a client
    can’t get a confirmed seat for one of the trips, they may request a position on
    a first-come, first-served waitlist.


    In order to keep track of each client’s overall experience with WBY, the travel
    agency plans on following up with each client after a trip to conduct a satisfaction
    survey and will ask the client to rate their experience for that trip on a scale
    of 1 to 10, with 10 being outstanding. By doing so, WBY can determine which trips
    are the most successful, so as to offer them more frequently in the future, as
    well as perhaps eliminating those that are less popular. WBY will also be able
    to make more informed recommendations for future trips that a given client is
    likely to enjoy by studying that client’s travel satisfaction history.


    In reflecting on the requirements for this system, we experience déjà vu! We recognize
    that many aspects of the WBY system requirements are similar to those of the SRS.
    In fact, we’re able to reuse the overall structure, or ***pattern***, of the SRS
    object model by making the following class substitutions:


    - Substitute `TravelPackage` for `Course`.

    - Substitute `Trip` for `Section`.

    - Substitute `Client` for `Student`.

    - Substitute `TripRecord` for `TranscriptEntry`.

    - Substitute `TravelHistory` for `Transcript`.


    Note that all of the relationships among these classes—their names, types, and
    even their multiplicities—remain unchanged from the SRS class diagram (see Figure
    [12-3](#78624_3_En_12_Chapter.xhtml#Fig3)).


    ![](images/78624_3_En_12_Chapter/78624_3_En_12_Fig3_HTML.jpg)


    A block diagram illustrates a travel agency system, which includes four segmented
    boxes, Travel Package, Trip, Client, and Trip Record. These boxes are interrelated
    with other elements such as Travel History, Offered as, Waitlisted, Reservation,
    Satisfaction Rating, and Maintains.


    **Figure 12-3** Reusing the SRS design pattern for WBY


    Such an exact match is exceptionally rare when reusing design patterns; don’t
    be afraid to change some things (eliminate classes or associations, change multiplicities,
    etc.) in order to facilitate reuse of a similar, but not identical, pattern.


    Having recognized the similarities between these two designs, we’re poised to
    take advantage of quite a bit of reuse with regard to the code of these two systems,
    as well. In fact, had we anticipated the need for developing these two systems
    prior to developing either one, we could have taken steps up front to develop
    a ***generic*** pattern that could have been used as the basis for both systems,
    as well as any future reservation systems we might be called upon to model, as
    illustrated in Figure [12-4](#78624_3_En_12_Chapter.xhtml#Fig4).


    ![](images/78624_3_En_12_Chapter/78624_3_En_12_Fig4_HTML.jpg)


    A block diagram illustrates a reservation system consisting of four segmented
    boxes, Product, Offered as, Offering, and Waiting List. These boxes are interrelated
    with other elements such as Secured, Consumer, Transaction Record, History, and
    Maintain.


    **Figure 12-4** A general-purpose class diagram for reservation systems


    Many useful, reusable patterns have been studied and documented; before embarking
    on a new object modeling project, it’s worth exploring whether any of these may
    be a suitable starting point.


    ## Summary


    Learning to model a problem from the perspective of objects is a bit like learning
    to ride a bicycle. You can read all the books ever published on the subject of
    successful bicycle riding, but until you actually sit on the seat, grab the handlebars,
    and start pedaling, you won’t get a real sense of what it means to ride. You’ll
    probably wobble at first, but with a bit of a boost from training wheels or a
    friendly hand to steady you, you’ll be riding off on your own with time. The same
    is true of object modeling: with practice, you’ll get an intuitive feel for what
    makes a good candidate class, a useful scenario, and so on.


    In this chapter, we


    - Discussed techniques for verifying the accuracy and completeness of a class
    diagram

    - Looked at how object models can be reused/adapted to other problems with similar
    requirements


    ## Exercises


    1.  Conduct a walk-through of one of the class diagrams that you prepared as an
    exercise for Chapter [10](#78624_3_En_10_Chapter.xhtml)—either the Prescription
    Tracking System (PTS) case study presented in the Appendix or the problem area
    whose requirements you defined for Exercise 3 in Chapter [1](#78624_3_En_1_Chapter.xhtml)—with
    a classmate or coworker. Report on any insights that you gained as a result of
    doing so.


    2.  Think of two other problem areas where the reservation pattern that we identified
    for the Wild Blue Yonder travel agency might also apply. What adjustments, if
    any, would you need to make to the reservation pattern in order to use it in those
    situations?


    # Part III Translating an Object Blueprint into Java Code'
