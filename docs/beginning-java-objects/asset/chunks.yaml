    The course points an arrow toward the plan of study.


    Figure 10-33


    Reflecting multiplicity on an aggregation


    It makes no sense to reflect multiplicity on inheritance relationships, however,
    because as discussed in Chapter [4](#78624_3_En_4_Chapter.xhtml), inheritance
    implies a relationship between ***classes***, but ***not*** between ***objects***.
    That is, the notation shown in Figure [10-34](#78624_3_En_10_Chapter.xhtml#Fig34)
