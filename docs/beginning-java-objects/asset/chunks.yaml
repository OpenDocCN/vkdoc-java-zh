    public static void main(String[] args) {

    Student s = new Student();

    // 细节省略。

    s.age = 23; // 这能编译通过，但不可取。

    }

    }

    ```


    一般来说，这是一种不好的做法，原因在第 4 章已详细讨论过。


    ***选项 #2***：我们可以将 `age` 的访问权限修改为 `protected`，在 `Person` 中：

