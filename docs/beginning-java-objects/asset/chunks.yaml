  trans: "\n### 多态性的一个有趣变体\n\n现在让我们探讨一个抽象类特有的有趣多态现象：抽象类中的***具体***方法可以调用***同一个***类中的***抽象***方法。下面的代码展示了这一点，其中具体的\
    \ `initializeCourse` 方法调用了抽象的 `establishCourseSchedule` 方法：\n\n```\npublic abstract\
    \ class Course {\n// 细节已省略。\n// 一个抽象方法 ...\npublic abstract void establishCourseSchedule(String\
    \ startDate,\nString endDate);\n// ... 以及一个具体实现的方法，该方法调用了抽象方法。\npublic void initializeCourse(Professor\
    \ p, String s, String e) {\n// 我们假设 assignInstructor 和 reserveClassroom 都是 Course\
    \ 类中已实现的方法……细节已省略。\nassignInstructor(p);\nreserveClassroom();\n// 在这里，我们正在调用一个抽象方法——这怎么可能？？？\n\
    establishCourseSchedule(s, e);\n}\n}\n```\n\n***这怎么可能***？也就是说，如果 `initializeCourse`\
    \ 所依赖的 `establishCourseSchedule` 方法没有定义***方法体***，我们怎么可能调用 `initializeCourse` 方法呢？事实是，编译器绝不会让我们陷入这种困境，原因如下：\n\
    \n*   首先，回想一下，我们不可能在 `Course` 对象上调用 `initializeCourse`，因为我们首先就无法***实例化***一个 `Course`\
    \ 对象——`Course` 是抽象的！\n\n*   其次，对于任何从 `Course` ***派生***的类（例如 `LectureCourse`），会出现以下两种情况之一：\n\
    \    *   `LectureCourse` 将提供其继承的***所有***抽象方法（包括 `establishCourseSchedule`）的实现，这样在运行时，`initializeCourse`\
    \ 方法在幕后要做什么就不会有任何歧义：\n\n        ```\n        LectureCourse l = new LectureCourse();\n\
    \        // 下一行代码完全没问题，因为在幕后，initializeCourse 将调用\n        // LectureCourse 已实现的\
    \ establishCourseSchedule 方法。\n        l.initializeCourse(p, s, e);\n        ```\n\
    \n    *   或者，如果 `LectureCourse` ***没有***实现 `establishCourseSchedule`，那么 `LectureCourse`\
    \ 根据定义将是一个抽象类，这样我们首先就无法实例化一个 `LectureCourse` 对象：\n\n        ```\n        // 现在这行代码将无法编译，因为\
    \ LectureCourse 是抽象的……\n        LectureCourse l = new LectureCourse();\n     \
    \   // ……因此我们在运行时永远不会遇到这种歧义情况！\n        l.initializeCourse(p, s, e);\n       \
    \ ```\n\n因此，我们看到，实现一个方法 X，而 X 又依赖于一个***抽象***方法 Y，这是一件“安全”的事情，因为当我们能够在某个对象上***调用***方法\
    \ X 时，该对象的存在本身就意味着它的所有方法（包括 Y）都已被实现。因此，在编写 X 时，我们可以依赖于一个尚未实现的 Y 方法在***将来***的可用性。\n\
    \n## 接口\n\n回想一下，类是对现实世界对象的抽象，其中省略了一些非本质的细节。因此，我们可以看到，***抽象***类比***具体***类***更加***抽象，因为通过抽象类，我们省略了一个或多个特定服务如何执行的细节。\n\
    \n现在，让我们将抽象的概念再推进一步。使用抽象类，我们可以避免编写声明为抽象的方法的方法体。但是，这样的类的***数据结构***呢？在我们的抽象 `Course`\
    \ 类示例中，我们预先规定了我们认为所有类型的课程普遍需要的属性，以便所有子类都能继承一个通用的数据结构：\n\n```\nprivate String courseName;\n\
    private String courseNumber;\nprivate int creditValue;\nprivate ArrayList enrolledStudents;\n\
    private Professor instructor;\n```\n\n假设我们只想指定 `Course` 的通用***行为***，甚至***不想费心***去声明属性。毕竟，属性通常被声明为私有的；我们可能不希望强制规定子类为了实现所需的公共行为而必须使用的私有数据结构，而是将最终决定权留给子类的设计者。\n\
    \n举个例子，假设我们想定义在大学里教学意味着什么。也许，为了教学，一个对象需要能够执行以下服务：\n\n*   同意教授某门特定课程。\n*   指定该课程要使用的教科书。\n\
    *   为该课程定义教学大纲。\n*   批准特定学生注册该课程。\n\n这些行为中的每一个都可以通过指定一个方法头来形式化，表示一个***能够教学***的对象将如何被要求执行每个行为：\n\
    \n```\npublic boolean agreeToTeach(Course c)\npublic void designateTextbook(TextBook\
    \ b, Course c)\npublic Syllabus defineSyllabus(Course c)\npublic boolean approveEnrollment(Student\
    \ s, Course c)\n```\n\n然后，我们可以声明一个名为 `Teacher` 的 `abstract` 类，它不规定任何数据结构，只包含***抽象***方法：\n\
    \n```\npublic abstract class Teacher {\n// 我们完全省略了属性声明，允许子类建立自己的类特定数据结构。\n// 我们只声明抽象方法。\n\
    public abstract boolean agreeToTeach(Course c);\npublic abstract void designateTextbook(TextBook\
    \ b, Course c);\npublic abstract Syllabus defineSyllabus(Course c);\npublic abstract\
    \ boolean approveEnrollment(Student s, Course c);\n}\n```\n\n然后，我们继续创建 `Professor`\
    \ 作为 `Teacher` 的具体派生类：\n\n```\npublic Professor extends Teacher {\n// 声明相关属性。\n\
    private String name;\nprivate String employeeID;\nprivate ArrayList teachingAssignments;\
    \ // Section 对象\n// 等等。\n// 提供所有继承的抽象方法的具体实现。\npublic boolean agreeToTeach(Course\
    \ c) { ... }\npublic void designateTextbook(TextBook b, Course c) { ... }\npublic\
    \ Syllabus defineSyllabus(Course c) { ... }\npublic boolean approveEnrollment(Student\
    \ s, Course c) { ... }\n// 也可以声明其他方法 - 细节已省略。\n}\n```\n\n然而，如果我们的意图是声明一组抽象方法头，以定义在应用程序中承担某个***角色***（例如教学）意味着什么，同时又不将数据结构或具体行为强加给子类，那么在\
    \ Java 中，首选的方式是使用**接口**。\n\n以下是我们如何使用等效的接口来呈现抽象的 `Teacher` 类：\n\n```\n// 注意使用\
    \ \"interface\" 关键字与 \"abstract class\" 关键字的区别。\npublic interface Teacher {\n\
    boolean agreeToTeach(Course c);\nvoid designateTextbook(TextBook b, Course c);\n\
    Syllabus defineSyllabus(Course c);\nboolean approveEnrollment(Student s, Course\
    \ c);\n}\n```\n\n以下是一些关于接口语法的观察：\n"
- fmt: "*   We use the keyword `interface` rather than `class` when declaring them:\n\
    \n```\npublic interface Teacher { ... }\n```\n\n*   Because all of an interface’s\
