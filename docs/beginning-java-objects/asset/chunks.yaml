  raw: 'Why would we ever bother to use ***three*** `catch` clauses when one will
    suffice? Because the more specific an exception we catch, the more specific our
    recovery code can be:


    ```

    try {

    // Pseudocode.

    database access operations that are liable to throw, among other

    types of exceptions, DataTruncation exceptions ...

    }

    catch (DataTruncation e1) {

    // Pseudocode.

    respond SPECIFICALLY to data truncation issues ...

    }

    catch (SQLWarning e2) { ... }

    catch (SQLException e3) { ... }

    ```


    The following alternative version would ***not*** be appropriate because the three
    catch clauses are listed in least specific to most specific order; thus, the ***first***
    `catch` clause would always catch all forms of `SQLException`, and the latter
    two `catch` clauses would never be reached:


    ```

    try {

    // Pseudocode.

    database access operation ...

    }

    catch (SQLException e1) {

    // This catch clause will catch any/all SQLExceptions, including

    // SQLWarnings and DataTruncations ... details omitted.

    }

    catch (SQLWarning e2) {

    // This catch clause is wasted – it can never be reached!

    }

    catch (DataTruncation e3) {

    // This catch clause is also wasted – it can never be reached!

    }

    ```


    ### Catching the Generic Exception Type


    Some programmers use the “lazy” approach of catching the most generic `Exception`
    type and then doing ***nothing*** to recover, just to silence the compiler:


    ```

    try {

    // Pseudocode.

    do anything!!!

    }

    catch (Exception e) { } // Empty braces => do NOTHING to recover!!!

    ```


    ***This is not a good practice!*** By doing so, we’re masking the fact that an
    exception has occurred: our program may be in a serious state of dysfunction,
    perhaps coming to a screeching halt (!), but will remain ***silent*** as to why
    because the `catch` clause shown previously suppresses the typical stack trace
    that would otherwise typically be displayed.


    This is not to say that we should never catch generic `Exception`s; one legitimate
    case where we might wish to do so is if we are writing a special-purpose error
    handling subsystem for an application, as suggested by the following pseudocode:


    ```

    public class Example {

    public static void main(String[] args) {

    try {

    // Pseudocode.

    all of our main application logic is here ...

    }

    catch (Exception e) {

    // Invoke a static method on a custom

    // MyExceptionHandler class that we''ve written.

    MyExceptionHandler.handleException(e);

    }

    }

    }

    ```


    Here we assume that the static `handleException` method of a custom `MyExceptionHandler`
    class that we’ve developed encapsulates logic for handling all exceptions generated
    throughout our application in a central, consistent fashion (perhaps by recording
    them in an application log file or alerting a system administrator to the issue
    in real time).


    ### Compiler Enforcement of Exception Handling


    Generally speaking, the Java compiler will force us to enclose code that is liable
    to throw an exception in a `try` block with an appropriate `catch` block(s). For
    example, if we were attempting to read data from a file, as we’ll do in earnest
    in Chapter [15](#78624_3_En_15_Chapter.xhtml)


    ```

    public class FileIOExample {

    public static void main(String[] args) {

    // Pseudocode.

    open the file of interest;

    while (end of file not yet reached) {

    read next line from file;

    // etc.

    }

    }

    }

    ```


    we’d get compiler errors complaining that our attempts to open a file, read from
    a file, etc. must be handled:


    ```

    Unreported exception java.io.FileNotFoundException; must be caught or

    declared to be thrown

    ```


    In such a situation, we have two choices:


    *   Ideally, we’d enclose the code in question in a `try` block with an appropriate
    `catch` block(s):


    *   Alternatively, we may add a throws clause to the header of the method in which
    the uncaught exception might arise, as illustrated in the following:


    ```

    import java.io.FileNotFoundException;

    public class FileIOExample {

    public static void main(String[] args) {

    try {

    // Pseudocode.

    open the file of interest;

    while (end of file not yet reached) {

    read next line from file;

    // etc.

    }

    }

    catch (FileNotFoundException e) { ... }

    // etc.

    ```


    ```

    import java.io.FileNotFoundException;

    public class FileIOExample {

    // By adding the throws clause to the main method declaration, we avoid

    // having to worry about catching FileNotFoundExceptions.

    public static void main(String[] args) throws FileNotFoundException {

    // Pseudocode.

    open the file of interest;

    while (end of file not yet reached) {

    read next line from file;

    // etc.

    }

    }

    }

    ```


    The only types of exception that the compiler doesn’t mandate catching are those
    derived from the `RuntimeException` class, which is a direct subclass of the `Exception`
    class. Several of the more commonly encountered `RuntimeException` types are `NullPointerException`,
    `ArithmeticException` (which arises when we attempt an illegal arithmetic operation,
    such as dividing by zero), and `ClassCastException` (which, as we discussed in
    Chapter [7](#78624_3_En_7_Chapter.xhtml), arises if we try to incorrectly cast
    an object reference to an inappropriate type). Typically, these types of exception
    represent design flaws that we should “bulletproof” our application against as
    we are building it, before it ever goes into production.


    ### Taking Advantage of the Exception That We’ve Caught


    Note that the declaration of a `catch` clause looks somewhat like a method header
    declaration in that we declare a parameter of type `Exception` (or one of its
    subtypes) to be passed in as an argument to the `catch` block:


    ```

    catch (SomeExceptionType variableName) { ... }

    ```


    However, we don’t explicitly invoke a `catch` block from our program the way we
    directly invoke a method. Instead, as mentioned earlier, the JVM automatically
    transfers control to a `catch` block if an exception arises at run time; as it
    does so, the JVM also passes the `catch` block a reference to an object representing
    the type of exception that has occurred. We can therefore invoke methods on the
    exception object to help in diagnosing the problem, for example:


    *   We can invoke the `String getMessage()` method on the exception object to
    obtain a text message describing the problem that has arisen:


    ```

    try {

    // Pseudocode.

    try to open a non-existent file named Foo.dat ...

    }

    catch (FileNotFoundException e) {

    System.out.println("Error opening file " + e.getMessage());

    }

    ```


    Output:


    *   We can invoke the `void printStackTrace()` method to display a traditional
    stack trace in the command window (recall that stack traces only occur ***automatically***
    if we ***don’t*** handle an exception):


    ```

    Error opening file Foo.dat (The system cannot find the file specified)

    ```


    ```

    try {

    // Pseudocode.

    try to open a non-existent file named Foo.dat ...

    }

    catch (FileNotFoundException e) {

    e.printStackTrace();

    }

    ```'
