- fmt: '# Printing to the Console Window


    Most applications communicate information to users by displaying messages via
    an application’s graphical user interface. However, it’s also useful at times
    to be able to display simple text messages to the console window from which we’re
    running a program as a quick and dirty way of verifying that a program is working
    properly.


    To print text messages to the screen, we use the following syntax:


    ```

    System.out.println(expression to be printed);

    ```


    The `System.out.println` method can accept very complex expressions and does its
    best to ultimately turn these into a single `String` value, which then gets displayed
    on the screen. Here are a few examples:


    ```

    System.out.println("Hi!");         // Printing a String literal/constant.

    String s = "Hi!";

    System.out.println(s);             // Printing the value of a String variable.

    String t = "foo";

    String u = "bar";

    System.out.println(t + u + "!");   // Using the String concatenation operator
    (+)

    // to print "foobar!".

    int x = 3;

    int y = 4;

    System.out.println(x);             // Prints the String representation of the

    // integer value 3 to the screen.

    System.out.println(x + y);         // Computes the sum of x and y, then prints
    the

    // String representation of the integer value 7

    // to the screen.

    ```


    Note that on the last line of code, the plus sign (`+`) is interpreted as the
    **addition** operator, not as the `String` **concatenation** operator, because
    it separates two variables that are both declared to be of type `int`. So the
    sum of 3 + 4 is computed to be 7, which is then printed. In the next example,
    however, we get different (and arguably undesired) behavior:


    ```

    System.out.println("The sum of x plus y is: " + x + y);

    ```


    The preceding line of code causes the following to be printed:


    ```

    The sum of x plus y is: 34

    ```


    Why is this? Recall that we evaluate expressions from left to right, and so since
    the first of the two plus signs separates a `String` literal and an `int`


    ```

    System.out.println("The sum of x plus y is: " + x + y);

    ```


    the first plus sign is interpreted as a `String` concatenation operator, producing
    the intermediate `String` value `"The sum of x plus y is: 3"`. The second plus
    sign separates this intermediate `String` value from an `int`, and so the second
    plus sign is **also** interpreted as a `String` concatenation operator, producing
    the final `String` value `"The sum of x plus y is: 34"`, which is printed to the
    command window.


    To print the **correct** sum of `x` and `y`, we must force the second plus sign
    to be interpreted as an integer addition operator by enclosing the addition expression
    in nested parentheses:


    ```

    System.out.println("The sum of x plus y is: " + (x + y));

    ```


    The nested parentheses cause the innermost expression to be evaluated first, thus
    computing the sum of `x + y` properly. Hence, this `println` statement displays
    the correct message on the screen:


    ```

    The sum of x plus y is: 7

    ```


    When writing code that involves complex expressions, it’s a good idea to use parentheses
    liberally to make your intentions clear to the compiler. Extra parentheses, when
    used correctly, never hurt!


    ## print vs. println


    When we call the `System.out.println` method, whatever expression is enclosed
    inside the parentheses will be printed, followed by a (platform-dependent) **line
    terminator**. The following code snippet


    ```

    System.out.println("First line.");

    System.out.println("Second line.");

    System.out.println("Third line.");

    ```


    produces three separate lines of output:


    ```

    First line.

    Second line.

    Third line.

    ```


    In contrast, the `System.out.print()` method


    ```

    System.out.print(expression to be printed);

    ```


    causes whatever expression is enclosed in parentheses to be printed **without**
    a trailing line terminator. Using `print` in combination with `println` allows
    us to generate a **single** line of output across a **series** of Java statements,
    as shown by the following example:


    ```

    System.out.print("J");        // Using print here.

    System.out.print("AV");       // Using print here.

    System.out.println("A!!!");   // Note use of println as the last statement.

    ```


    This code snippet produces a single line of output:


    ```

    JAVA!!!

    ```


    When a single print statement gets too long to fit on a single line, as in this
    example


    ```

    // Pseudocode.

    statement;

    another statement;

    System.out.println("Here''s an example of a single print statement

    that is very long ... SO long that it wraps around and makes the program

    listing difficult to read.");

    yet another statement;

    ```


    we can make a program listing more readable by breaking up the contents of such
    a statement into multiple concatenated `String` expressions and then breaking
    the statement along plus-sign boundaries:


    ```

    // Pseudocode.

    statement;

    another statement;

    System.out.println("Here''s an example of how " +

    "to break up a long print statement " +

    "with plus signs.");

    yet another statement;

    ```


    Even though the preceding `System.out.println` call is broken across three lines
    of code, it will be printed as a single line of output:


    ```

    Here''s an example of how to break up a long print statement with plus signs.

    ```


    ## Escape Sequences


    Java defines a number of **escape sequences** so that we can represent special
    characters, such as newline and tab characters, within `String` or `char` literals.
    The most commonly used escape sequences are listed in Table 2-5.


    Table 2-5


    Java Escape Sequences


    | Escape Sequence | Description |

    | --- | --- |

    | `\n` | Newline |

    | `\b` | Backspace |

    | `\t` | Tab |

    | `\\` | Backslash |

    | `\''` | Single quote, used within single quotes (e.g., `char singleQuote = ''\'''';`)
    |

    | `\"` | Double quote, used within double quotes (e.g., `String doubleQuote =
    "\"";`) |


    One or more escape sequences can be included in the expression that is passed
    to the `print` and `println` methods. For example, consider the following code
    snippet:


    ```

    System.out.println("One ...");

    System.out.println("\t... two ...");

    System.out.println("\t\t... three ... \"WHEEE!!!\"");

    ```


    When the preceding code is executed, the following output is displayed:


    ```

    One ...

    ... two ...

    ... three ... "WHEEE!!!"

    ```


    The second and third lines of output have been indented one and two tab positions,
    respectively, by virtue of the use of `\t`, and the expression `"WHEEE!!!"` is
    printed enclosed in double quotes because of our use of `\"`.


    ## Elements of Java Style


    One of the trademarks of good programmers is that they produce **human-readable**
    code, so that their colleagues will be able to work with and modify their programs.
    The following sections present some guidelines and conventions that will help
    you produce clear, readable Java code.'
