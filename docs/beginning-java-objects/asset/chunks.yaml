- fmt: "### Interpreting Exception Stack Traces\n\nAs we saw previously, when an exception\
    \ arises that we haven’t properly handled, a **stack trace** — that is, a report\
    \ by the JVM of where things went wrong and how we got there — is displayed in\
    \ the command window. Interpreting an exception stack trace is quite easy; let’s\
    \ use a code example that would generate such a trace to illustrate how this is\
    \ done.\n\nPlease read the inline comments carefully in the following three-class\
    \ example to see where a potential `NullPointerException` problem is lurking!\n\
    \n```\npublic class Professor {\n    // Our simplistic Professor class has only\
    \ one attribute.\n    private Student advisee;\n    public void setAdvisee(Student\
    \ s) {\n        advisee = s;\n    }\n    public void printAdviseeInfo() {\n  \
    \      // A bit of delegation.\n        advisee.print();\n    }\n}\n// ---------------------------------\n\
    public class Student {\n    // Our Student class has only one attribute, and no\
    \ way to set its value.\n    // Thus, the name attribute of a Student will be\
    \ initialized to the value\n    // null, and will REMAIN null.\n    private String\
    \ name;\n    public void print() {\n        // Since the name attribute is guaranteed\
    \ to be null here,\n        // this line will generate a NullPointerException\
    \ at run time.\n        if (name.length() > 5) System.out.println(name);\n   \
    \ }\n}\n// ---------------------------------\npublic class PSExample {\n    public\
    \ static void main(String[] args) {\n        Student s = new Student();\n    \
    \    Professor p = new Professor();\n        // Link the objects together.\n \
    \       p.setAdvisee(s);\n        // This next line of code will in turn invoke\
    \ the print\n        // method of p's Student advisee, which as we saw above is\n\
    \        // going to generate a NullPointerException at run time.\n        p.printAdviseeInfo();\n\
    \    }\n}\n```\n\nWhen we run this program, we’d see the following stack trace:\n\
    \n```\njava PSExample\nException in thread \"main\" java.lang.NullPointerException\n\
    \    at Student.print(Student.java:10)\n    at Professor.printAdviseeInfo(Professor.java:11)\n\
    \    at PSExample.main(PSExample.java:12)\n```\n\nReading the stack trace from\
    \ top to bottom:\n\n- The actual `NullPointerException` arose on line 10 of the\
    \ `Student` class:\n- ***That*** line of code is within the body of the `print`\
    \ method of the `Student` class, which was invoked from line 11 of the `Professor`\
    \ class:\n\n```\nif (name.length() > 5) System.out.println(name); // line 10 of\
    \ Student\n```\n\n- And ***that*** line of code is within the body of the `printAdviseeInfo`\
    \ method of the `Professor` class, which was in turn invoked from the `PSExample`\
