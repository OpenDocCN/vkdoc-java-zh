    ## 构建基于 Web 的表示层


    为了构建基于 Web 的表示层，我们必须首先确定所有必要的不同网页，以便为用户提供原始需求所要求的功能。对于 SRS 系统，最少的页面集合可能包括图 15-2
    中所示的那些页面：


    ![](img/78624_3_En_15_Fig2_HTML.jpg)


    3 个 S R S 用户界面模块，分别标记为 A、B 和 C。A 是一个包含学生 ID 和密码的登录窗口。B 显示学生 ID 和课程，并带有退选、添加和注销按钮。C
    包含 Math 101、102 和 103 的课程目录，并带有注册和返回课程负载按钮。


    图 15-2


    构建简单 SRS 用户界面所需的最少网页集合


    *   ***A***：初始登录页面

    *   ***B***：显示已登录学生当前课程负载的页面，带有添加课程、退选课程或注销按钮

    *   ***C***：按院系排序列出所有可用课程的页面，以便学生搜索和选择感兴趣的课程，并带有注册课程或返回当前课程负载页面而不执行操作的按钮


    每个页面由静态 HTML 内容以及可选的、用于为该用户定制页面内容的嵌入式可执行代码组成。


    例如，初始登录页面 (A) 将完全是静态 HTML：一个简单的表单，包含两个用于收集学生唯一 ID 号和密码的输入字段，以及一个提交按钮，如下所示（请注意，这是不完整的
    HTML）：


    登录页面的格式永远不会改变，因此完全是静态 HTML。


