  raw: '#### getEnrolledSections( )


    The `getEnrolledSections` method used previously is a simple one-liner:


    ```

    public Collection getEnrolledSections() {

    return attends;

    }

    ```


    Note the return type of the method: we’re returning what is actually an `ArrayList`
    reference as a ***generic*** `Collection` reference instead. As you learned in
    Chapter [7](#78624_3_En_7_Chapter.xhtml), `Collection` is a predefined interface
    within the `java.util` package, and since the `ArrayList` class ***implements***
    the `Collection` interface, an `ArrayList` ***is a*** `Collection`. By returning
    an interface type—`Collection`—rather than an explicit class type—`ArrayList`—from
    this method, we reserve the right to change the type of collection that we use
    internally to the `Student` in the future without subjecting client code to a
    ripple effect, a benefit of interfaces that we discussed at length in Chapter
    [7](#78624_3_En_7_Chapter.xhtml).


    We must also remember to include the following `import` directive at the beginning
    of our `Student` class declaration:


    ```

    import java.util.Collection;

    ```


    #### printTranscript( )


    The `printTranscript` method is a straightforward example of ***delegation***.
    We use the `Student`’s `getTranscript` method to retrieve a handle on the `Transcript`
    object that belongs to this `Student` and then invoke the `display` method for
    that `Transcript` object (you’ll see the details of this later in the chapter,
    when we discuss the `Transcript` class):


    ```

    public void printTranscript() {

    this.getTranscript().display();

    }

    ```


    Note that, once again, we could have accomplished this with two lines of code
    instead of one:


    ```

    public void printTranscript() {

    Transcript t = this.getTranscript();

    t.display();

    }

    ```


    But the “chained” version is more concise.


    Next, we’ll turn our attention to the `Professor` class.


    ### The Professor Class (Bidirectionality of Relationships)


    Figure [14-4](#78624_3_En_14_Chapter.xhtml#Fig4) shows the UML representation
    of the `Professor` class.


    ![](images/78624_3_En_14_Chapter/78624_3_En_14_Fig4_HTML.jpg)


    A block diagram of a professor with the title, department, and the command of
    agree to teach is directly connected to the person block with the social security
    number and name.


    Figure 14-4


    The `Professor` class


    Because the code that is necessary to implement the `Professor` class of `Person`
    is so similar to that of `Student`, I’ll comment only on those features of `Professor`
    that are particularly noteworthy. I encourage you to look at the full code of
    the `Professor` class, however, to reinforce your ability to read and interpret
    Java syntax.


    #### Professor Attributes


    The `Professor` class is involved in one association—the one-to-many *teaches*
    association with the `Section` class—and so we must provide a means for a `Professor`
    object to maintain multiple `Section` handles, which we do by creating a `teaches`
    attribute of type `ArrayList`:


    ```

    //------------

    // Attributes.

    //------------

    private String title;

    private String department;

    private ArrayList teaches;

    ```


    #### agreeToTeach( )


    Our class diagram calls for us to implement an `agreeToTeach` method. This method
    accepts a `Section` object reference as an argument and begins by storing this
    reference in the `teaches ArrayList`:


    ```

    public void agreeToTeach(Section s) {

    teaches.add(s);

    ```


    Associations, as modeled in a UML class diagram, are assumed to be bidirectional.
    When implementing associations in ***code***, however, we must think about whether
    or not bidirectionality is important on a case-by-case basis for each association.


    *   Can we think of any situations in which a `Professor` object would need to
    know which `Sections` it is responsible for teaching? Yes—for example, when we
    ask a `Professor` object to print out its teaching assignments.


    *   How about the reverse? That is, can we think of any situations in which a
    `Section` object would need to know who is teaching it? Yes—for example, when
    we print out a `Student`’s course schedule.


    So not only must we store a reference to the `Section` object in the `Professor`’s
    `teaches ArrayList`, but also we must make sure that the `Section` object is somehow
    notified that this `Professor` is going to be its instructor. We accomplish this
    by invoking the `Section` object’s `setInstructor` method, passing in a handle
    on the `Professor` object whose method we are in the midst of executing via the
    `this` keyword, a technique for object self-referencing that we discussed in Chapter
    [13](#78624_3_En_13_Chapter.xhtml):


    ```

    // We want to link these objects bidirectionally.

    s.setInstructor(this);

    }

    ```


