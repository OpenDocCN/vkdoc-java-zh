- fmt: "### The `final` Keyword\n\nThe Java `final` keyword can be applied to variables,\
    \ methods, and classes as a whole. A **final variable** is a variable that can\
    \ be assigned a value only once in a program; after that first assignment, the\
    \ variable’s value cannot be changed. We declare such a variable by placing the\
    \ `final` keyword just before the type of the variable, as follows:\n\n```\npublic\
    \ class Example {\n// A static variable can be declared to be final ...\npublic\
    \ static final Student x;\n// ... as can a (nonstatic) attribute.\nprivate final\
    \ int y;\npublic void someMethod() {\n// Even a local variable may be declared\
    \ to be final.\nfinal int z;\n// etc.\n```\n\nWhereas a *local* `final` variable\
    \ can be assigned a value separately from its declaration, we cannot do so for\
    \ other final *variables*; that is, in the following expanded example, we’ll get\
    \ compilation errors on the lines so marked:\n\n```\npublic class Example {\n\
    // A static variable can be declared to be final ...\npublic static final Student\
    \ x;\n// ... as can a (nonstatic) attribute.\nprivate final int y;\npublic void\
    \ someMethod() {\n// Even a local variable may be declared to be final.\nfinal\
    \ int z;\n// However, whereas we ARE permitted to assign a local\n// final variable\
    \ a value in a method separately from its\n// declaration ...\nz = 3;\n// .. we\
    \ CANNOT do so for final static variables or for attributes.\nx = new Student();\
    \  // Compilation error!\ny = 2;  // Compilation error!\n}\n// etc.\n```\n\nThe\
    \ compiler will generate the following error messages:\n\n```\ncannot assign a\
    \ value to final variable x\nx = 1;\n^\ncannot assign a value to final variable\
    \ y\ny = 2;\n^\n```\n\nTo avoid such a problem, we must assign values to *class\
    \ and instance* final variables at the time that we declare them:\n\n```\npublic\
    \ class Example {\n// Assign values to static final variables/final attributes\
    \ at the\n// same time that we declare them.\npublic static final int x = 1;\n\
    private final int y = 2;\n// etc.\n```\n\nGoing back to our `Math` class example,\
    \ we can now see that if `Math.PI` is declared to be a *final* static variable,\
    \ client code will be prohibited from modifying its value, as it should be.\n\n\
    As another example, recall from our discussion of arrays in Chapter [6](#78624_3_En_6_Chapter.xhtml)\
    \ that arrays have a public `length` attribute whose value represents the capacity\
    \ of the array:\n\n```\nint[] x = new int[9];\nfor (int i = 0; i < x.length; i++)\
    \ { … }\n```\n\nAs it turns out, the `length` attribute is declared to be `final`\
    \ so that we are prevented from changing its value programmatically. Continuing\
    \ the preceding example, the following won’t compile:\n\n```\n// Let's try to\
    \ enlarge the array!\nx.length = 12;  // this won't compile\n```\n\nThe compilation\
    \ error that is produced is as follows:\n\n```\ncannot assign value to final variable\
    \ length\nx.length = 12;\n^\n```\n\n#### Public Static Final Variables and Interfaces\n\
    \nAs stated earlier in the chapter, interfaces are not permitted to declare variables,\
    \ but for one exception: as it turns out, interfaces are allowed to declare `public\
    \ static final` variables to serve as *global constants*—that is, constant values\
    \ that are in scope and hence accessible throughout an entire application.\n\n\
    Let’s say, for example, that when a university administrator hires a new professor,\
    \ they must designate whether the professor is going to be working full-time or\
    \ part-time. If we wish, we can declare `public static final` variables of the\
    \ `Administrator` interface to symbolically represent these two values, as shown\
    \ in the following code, to be passed in as argument values to the `hireProfessor`\
    \ method:\n\n```\npublic interface Administrator {\n// Defining symbolic values\
    \ to use as argument values for the second parameter of\n// the hireProfessor\
    \ method.\npublic static final int FULL_TIME = 1;\npublic static final int PART_TIME\
    \ = 2;\n// Valid values for workStatus are FULL_TIME (1) or PART_TIME (2).\npublic\
    \ boolean hireProfessor(Professor p, int workStatus);\n// Other method headers\
    \ declared; details omitted.\n}\n```\n\nThis enables client code to take advantage\
    \ of such values when invoking the `hireProfessor` method, as follows:\n\n```\n\
    // Client code.\nAdministrator pAdmin = new Professor();\nProfessor p = new Professor();\n\
    // Hire p as a full-time faculty member.\npAdmin.hireProfessor(p, Administrator.FULL_TIME);\n\
    ```\n\nThe naming convention for a `public static final` variable of either a\
    \ class or an interface is rather unusual: we traditionally use all uppercase\
    \ characters to name them and hence use underscore characters (`_`) to visually\
    \ separate words in multiword names—for example, `FULL_TIME` and `PART_TIME`.\
    \ This explains why the `Math` class’s `public static final PI` attribute is written\
    \ in all uppercase—`Math.PI` vs. `Math.pi`, for example.\n\nIn Chapter [13](#78624_3_En_13_Chapter.xhtml),\
    \ you’ll learn about **enum**(eration)s, a language feature that provides a more\
    \ elegant way to accomplish the same purpose.\n\nAs mentioned earlier, the `final`\
    \ keyword may also be applied to methods and to classes as a whole:\n\n*   A method\
    \ declared to be `final` cannot be overridden in a subclass:\n\n    ```\n    public\
    \ class Person {\n    // Details omitted.\n    public final int computeAge() {\
    \ ... }\n    // etc.\n    }\n    ```\n\n*   A class declared to be final cannot\
    \ be subclassed:\n\n    ```\n    // No subclasses may be derived from this class.\n\
    \    public final class PhDStudent extends GraduateStudent { ... }\n    ```\n\n\
    \    Numerous predefined Java classes are declared to be `final`. One such example\
    \ is the `java.lang.String` class.\n\n### Custom Utility Classes\n\nWe can take\
    \ advantage of the same techniques used to create predefined Java utility classes\
    \ like the `Math` class to create our own *custom* utility classes. For example,\
    \ suppose that we are going to have a frequent need to do temperature conversions\
    \ from degrees Fahrenheit to degrees Centigrade and vice versa. We could invent\
    \ a utility class called `Temperature` as follows:\n\n```\n// A utility class\
    \ to provide F=>C and C=>F conversions.\npublic class Temperature {\npublic static\
    \ double FahrenheitToCentigrade(double tempF) {\nreturn (tempF - 32.0) * (5.0/9.0);\n\
    }\npublic static double CentigradeToFahrenheit(double tempC) {\nreturn tempC *\
    \ (9.0/5.0) + 32.0;\n}\n}\n```\n\nThen, to use this class, we’d simply write client\
    \ code as follows:\n\n```\ndouble degreesF = 212.0;\ndouble degreesC = Temperature.FahrenheitToCentigrade(degreesF);\n\
    System.out.println(\"A temperature of \" + degreesF + \" degrees F = \" +\ndegreesC\
    \ + \"degrees C\");\n```\n\nThis would give us the following output:\n\n```\n\
    A temperature of 212.0 degrees F = 100.0 degrees C\n```\n\nWe might even wish\
    \ to include some commonly used constants—say, the boiling and freezing points\
    \ of water in both F and C terms—as `public static final` variables in our utility\
    \ class:\n\n```\n// A utility class to provide F=>C and C=>F conversions.\npublic\
    \ class Temperature {\n// We've added some public static final variables.\npublic\
    \ static final double FAHRENHEIT_FREEZING = 32.0;\npublic static final double\
    \ CENTIGRADE_FREEZING = 0.0;\npublic static final double FAHRENHEIT_BOILING =\
    \ 212.0;\npublic static final double CENTIGRADE_BOILING = 100.0;\npublic static\
    \ double FahrenheitToCentigrade(double tempF) {\n// We can utilize our new attributes\
    \ in our method code.\nreturn (tempF  - FAHRENHEIT_FREEZING) * (5.0/9.0);\n}\n\
    public static double CentigradeToFahrenheit(double tempC) {\n// Ditto.\nreturn\
    \ tempC * (9.0/5.0) + FAHRENHEIT_FREEZING;\n}\n}\n```\n\nWe could then take advantage\
    \ of these constants in our client code, as well:\n\n```\nSoup s = new Soup(\"\
    chicken noodle\");\n// Bring the soup to a boil.\nif (s.getTemperature() < Temperature.FAHRENHEIT_BOILING)\
    \ {\ns.cook();\n}\n```\n\nBecause all of the features of the `Temperature` class\
    \ are `static`, we need never instantiate a `Temperature` object in our application."
