    You received a solid introduction to Java syntax in Part 1 of this book, particularly
    as it pertains to illustrating fundamental object concepts. Before we dive into
    the specifics of coding the model layer of the Student Registration System (SRS),
    however, we’d like to introduce you to a few more details about the Java language
    that we’ll subsequently take advantage of when coding the SRS model layer.


    In this chapter, you’ll learn about


    *   The nature and purpose of Java archive (“jar”) files


    *   The mechanics of Java documentation comments


    *   The object nature of `String`s


    *   A special type of class called an `enum` that can be used to enumerate the
    explicit values that a particular variable is allowed to assume


    *   How we can form highly complex expressions by chaining messages


    *   How objects refer to themselves from within their own methods


    *   The nature of Java run-time exceptions and how to gracefully handle them,
    including defining and using our own custom exception types


    *   Several approaches for providing input to command-line-driven “GUI-less” programs


    *   Some important features of the Java `Object` class


    ## Java-Specific Terminology


    As mentioned previously, the purpose of this book is to educate you on object
    principles that are, for the most part, language neutral, and so I’ve favored
    generic (and sometimes informal) OO terminology over Java-specific terminology
    as used by Oracle. That being said, I’d now like to expose you to ***Java-specific
    terminology*** for a number of basic object concepts as used in the formal Java
    Language Specification (JLS) maintained by Oracle Corporation.


    Table 13-1


    Comparing Generic OO vs. Java Terminology


    | Generic OO Terminology Used in This Book | Formal Java-Specific Terminology
    as Used by Sun Microsystems | Used to Describe the Following Notion |

    | --- | --- | --- |

    | Attribute | field, instance variable | A variable that is created once per object,
    that is, per each instance of a class. Each object has its own separate set of
    instance variables. |

    | static variable (informal: static attribute) | static field, class variable
    | A variable that exists only once per class. |

    | Method | instance method | A function that is invoked on an object. |

    | static method | class method | A function that can be called on a class as a
    whole, without reference to a specific object. Class methods can neither call
    instance methods nor access instance variables. |

    | Feature | member | Those components of a class that can potentially be inherited:
    for example, instance/class variables and instance/class methods, but ***not***
    constructors. |


    To round out this terminology, the term **local variable** refers to a variable
    that is declared inside of a method and hence is locally scoped relative to that
    method. (Method parameters are also local to the method, but Java distinguishes
    them from “local variables”). Local variables are neither static nor instance
    variables.


    Here is a code snippet that illustrates all three types of variable:


    ```

    public class Student {

    // Attributes.

    private String name;  // <== name is an instance variable

    private static int totalStudents;  // <== totalStudents is a

    //  class variable

    // Methods.

    public void foo(int y) { // <== parameter y is local to the method

    int x;  // <== x is a local variable

    // etc.

    }

    // etc.

    }

    ```


    ## Java Archive (jar) Files


    The Java bytecode comprising an application is commonly bundled and delivered
    in the form of a **Java archive (“jar”) file**. Let’s use a simple application
    as an example, consisting of


    *   Three user-defined types`—`classes `Person`, `Student`, and `Professor`


    *   A `main` method wrapper class called `MyApp`


    to illustrate the use of jar files. The code for our simple example is shown in
    the following


    ```

    public class Person {

    private String name;

    public void setName(String n) {

    name = n;

    }

    }

    public class Student extends Person {

    private Professor advisor;

    public void setAdvisor(Professor p) {

    advisor = p;

    }

    }

    public class Professor extends Person {

    private String title;

    public void setTitle(String t) {

    title = t;

    }

    }

    ```


    to support the following program:


    ```

    public class MyApp {

    public static void main(String[] args) {

    Professor p = new Professor();

    Student s = new Student();

    s.setAdvisor(p);

    }

    }

    ```'
