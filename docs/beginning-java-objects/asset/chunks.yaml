  trans: '

    ### 状态/数据/属性


    如果我们希望记录一名学生的信息，可能需要哪些数据？一些示例如下：


    *   学生的姓名


    *   学生的学号


    *   学生的出生日期


    *   学生的地址


    *   学生指定的主修专业领域


    *   学生的累计平均绩点（即 GPA）


    *   学生的指导老师是谁


    *   学生本学期当前已注册的课程列表（即学生当前的***课程负荷***）


    *   学生迄今为止所修全部课程的历史记录，包括每门课程的修读学期/年份以及所获成绩（即学生的***成绩单***）


    *   等等


    那么，对于一门学术课程呢？也许我们希望记录：


    *   课程编号（例如“ART 101”）


    *   课程名称（例如“篮子编织入门”）


    *   学生在注册本课程前必须成功完成的所有课程列表（即课程的***先修课程***）


    *   该课程对应的学分学时数


    *   经批准可教授本课程的教授名单


    *   等等


    在对象术语中，用于描述对象的数据元素被称为对象的**属性**。


    一个对象的属性值，当被整体考量时，被认为定义了该对象的**状态**或状况。例如，如果我们想判断一名学生是否“符合毕业条件”（一种***状态***），我们可能会查看以下组合：


    *   学生的成绩单（一个***属性值***）


    *   学生当前已注册的课程列表（第二个***属性值***）


    以确定该学生是否确实有望在当前学年结束时满足其选定主修专业的课程要求（第三个属性值）。


    某个给定的属性可能很简单——例如 GPA，它可以表示为一个简单的浮点数（在 Java 中可能是 `double`）——也可能很复杂，例如“成绩单”，它代表了一个相当广泛的信息集合，没有简单的表示方式。


    刚接触对象范式的新手程序员常常会问：“为什么不用 `String` 来表示成绩单呢？一个***很长的*** `String`，毫无疑问，但终究还是一个 `String`
    吧？” 在后续的章节中，你将了解到，用面向对象的术语来表示学生成绩单的概念，有一种更为优雅的方式。


    ### 行为/操作/方法


    现在，让我们重新审视这两种对象——学生和课程——并讨论这些对象各自的行为。


    一个学生的行为（至少是与学术事务相关的！）可能包括：


    *   注册一门课程


    *   退选一门课程


    *   指定主修专业领域


    *   选择一位指导老师


    *   告知我们他们的 GPA


    *   告知我们他们是否修过某门特定课程，如果修过，该课程是在何时修读、由哪位教授授课以及学生获得了什么成绩


    要想象一个像课程这样无生命的、概念性的对象具有行为，有点困难，但如果我们把课程想象成一个有生命的东西，我们可以设想课程的行为可能包括：


    *   允许学生注册


    *   判断某个学生是否已经注册


    *   告知我们到目前为止有多少学生已注册，或者反过来，在课程满员前还剩多少名额


    *   告知我们它的先修课程是什么


    *   告知我们该课程值多少学分学时


    *   告知我们本学期指派哪位教授教授这门课程


    *   等等


    当我们具体讨论软件对象时，我们将对象的行为（也称为其**操作**）定义为：对象为了***访问***其属性值（数据）所做的事情，以及对象为了***修改/维护***其属性值（数据）所做的事情。


    如果我们花点时间回顾一下前面列出的我们对学生期望的行为，我们会发现每个操作都涉及学生的一个或多个属性，例如：


    *   告知你他们的 GPA 涉及***访问***学生“GPA”属性的值。


    *   选择主修专业领域涉及***修改***学生“主修专业领域”属性的值。


    *   注册一门课程涉及***修改***学生“课程负荷”属性的值。


    既然你最近了解到，一个对象的属性值集合定义了它的状态，那么你现在可以看到，操作能够***改变对象的状态***。假设我们将一个尚未选择主修专业领域的学生状态定义为“未申报”学生。要求这样一个学生对象执行其“选择主修专业领域”方法，将导致该对象更新其“主修专业领域”属性的值，以反映新选定的主修专业。这样，学生的状态就从“未申报”变为“已申报”。


    另一种思考对象操作的方式是，将其视为可以代表应用程序向对象请求的***服务***。例如，我们可以要求一个课程对象执行的一项服务是，向我们提供当前已注册该课程的所有学生列表（即***学生名册***）。


    当我们真正开始用 Java 这样的语言来编程实现对象的行为时，我们将操作在编程语言中的表示称为**方法**，而严格来说，“操作”这个术语通常用于指代概念上的行为。

    '
- fmt: '# What Is a Class?


    A **class** is an abstraction describing the common features of all objects in
    a group of similar objects. For example, a class called `Student` could be created
    to describe all student objects recognized by the SRS.


    A class defines:


    - The **data structure** (i.e., the names and types of **attributes**) of each
    and every object belonging to that class

    - The operations/**methods** to be performed by such objects: specifically, what
    these operations are, how an object is formally called upon to perform them, and
    what behind-the-scenes actions an object has to take to actually carry them out


    For example, the `Student` class might be designed to have the nine attributes
    listed in Table 3-1.


    **Table 3-1** Proposed Attributes of the `Student` Class


    | Attribute | Java Type |

    | --- | --- |

    | `name` | `String` |

    | `studentId` | `String` |

    | `birthDate` | `Date` |

    | `address` | `String` |

    | `major` | `String` |

    | `gpa` | `Double` |

    | `advisor` | ??? |

    | `courseLoad` | ??? |

    | `transcript` | ??? |


    Note that many of the `Student` attributes can be represented by built-in Java
    types (e.g., `String`, `double`, and `Date`) but that a few of the attributes—`advisor`,
    `courseLoad`, and `transcript`—are too complex for built-in Java types to handle.
    You’ll learn how to tackle such attributes a bit later on in the book.


    In terms of operations, the `Student` class might define five methods whose names
    are as follows:


    - `registerForCourse`

    - `dropCourse`

    - `chooseMajor`

    - `changeAdvisor`

    - `printTranscript`


    You’ll learn how to formally declare methods in Java in Chapter 4.


    Note that an object can only do those things for which methods have been defined
    by the object’s class. In that respect, an object is like an appliance: it can
    do whatever it was designed to do (a DVD player provides buttons to play, pause,
    stop, and seek a particular movie scene) and nothing more (you can’t ask a DVD
    to toast a bagel—at least not with much chance of success!). So an important aspect
    of successfully designing an object is making sure to anticipate all of the behaviors
    it will need to perform in order to carry out its “mission” within the system.
    You’ll learn how to formally determine what an object’s mission, data structure,
    and behaviors should be, based on the overall requirements for the application
    that it is to support, in Part 2 of the book.


    The term **feature** is used to collectively refer to both the attributes and
    methods of a class. That is, a class definition that includes nine attribute declarations
    and five method declarations is said to have 14 features.


    ## A Note Regarding Naming Conventions


    All object-oriented programming languages (OOPLs), including Java, uphold the
    following naming conventions:


    - When naming classes, we begin with an **uppercase** letter, but use mixed case
    for the name overall: `Student`, `Course`, `Professor`, and so on. When the name
    of a class would ideally be stated as a multiword phrase, such as “course catalog,”
    we start each word with a capital letter and concatenate the words without using
    spaces, dashes, or underscores to separate them—for example, `CourseCatalog`.
    This style is known as **Pascal casing**.


    - The convention for attribute and method names is to start with a **lowercase**
    letter, but to capitalize the first letter of any subsequent words in the name.
    Typical attribute names might thus be `name`, `studentId`, or `courseLoad`, while
    typical method names might thus be `registerForCourse` and `printTranscript`.
    This style is known as **camel casing**.


    ## Declaring a Class, Java Style


    Once we’ve determined what common data structure and behaviors we wish to impart
    to a set of similar objects, we must formally declare them as attributes and methods
    in the context of a Java class. For example, we’d program the `Student` class
    data structure as presented in Table 3-1 as follows:


    ```

    public class Student {

    // Attribute declarations typically appear first in a class declaration ...

    String name;

    String studentId;

    Date birthDate;

    String address;

    String major;

    double gpa;

    // type? advisor – we''ll declare this attribute later

    // type? courseLoad - ditto

    // type? transcript - ditto

    // ... followed by method declarations (details omitted – you''ll

    // learn how to program methods in Java in Chapter 4.)

    }

    ```


    As with all Java class definitions that you’ve seen thus far in the book, this
    class definition would reside in a source file named `ClassName.java` (`Student.java`,
    to be specific) and would be subsequently compiled into bytecode form as a file
    named `Student.class`. Note that the reserved word `public` appears in the class
    declaration. We will be discussing the notion of public visibility later in the
    book.


    Note that, for the preceding code to compile, we’d need to insert the statement:


    ```

    import java.util.Date;

    ```


    ahead of the declaration:


    ```

    public class Student { ... }

    ```


    We’ll discuss `import` directives in Chapter 6.


    Note that our `Student` class is not required to declare a `main` method. Unlike
    the classes shown previously in the book, which served to encapsulate a program’s
    `main` method:


    ```

    public class Simple {

    public static void main(String[] args) {

    System.out.println("I love Java!!!");

    }

    }

    ```


    the `Student` class serves a different purpose: namely, we’re defining what the
    data structure and behaviors of `Student` objects should be. Because the `Student`
    class does not contain a `main` method, it makes no sense to try to execute its
    bytecode with the JVM—typing:


    ```

    java Student

    ```


    results in the error message:


    ```

    Error: main method not found in class Student, please define the main method as:

    public static void main(String [] args)

    ```'
