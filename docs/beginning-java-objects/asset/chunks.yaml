- fmt: '# Exceptions to the Public/Private Rule


    Even though it’s often the case that


    - Attributes are declared to be `private`

    - Methods are declared to be `public`

    - Private attributes are accessed through public methods


    there are numerous exceptions to this rule.


    **Exception #1—Internal housekeeping attributes**: An attribute may be used by
    a class strictly for internal housekeeping purposes. (Like the dishwashing detergent
    you keep under the sink, guests needn’t know about it!) For such attributes, we
    needn’t bother to provide public accessors.


    One example for the `Student` class might be an `int` attribute `countOfDsAndFs`,
    used to keep track of how many poor grades a student has received in order to
    determine whether or not the student is on academic probation. We may in turn
    provide a `Student` class method `onAcademicProbation` as follows:


    ```

    public class Student {

    // Private housekeeping attribute.

    private int countOfDsAndFs;

    // other attributes omitted from this example ...

    public boolean onAcademicProbation() {

    boolean onProbation = false;

    // If the student received more than three substandard grades,

    // he or she will be put on academic probation.

    if (countOfDsAndFs > 3) {

    onProbation = true;

    }

    return onProbation;

    }

    // other methods omitted from this example ...

    }

    ```


    The `onAcademicProbation` method uses the value of private attribute `countOfDsAndFs`
    to determine whether a student is on academic probation, but no client code need
    ever know that there is such an attribute as `countOfDsAndFs`, and so no explicit
    public accessor methods are provided for this attribute. Such attributes are instead
    set as a side effect of performing some other method, as in the following example,
    also taken from the `Student` class:


    ```

    public void completeCourse(String courseName, int creditHours, char grade) {

    // Updating this private attribute is considered to be a

    // "side effect" of completing a course.

    if (grade == ''D'' || grade == ''F'') countOfDsAndFs++;

    // Other processing details omitted from this example ...

    }

    ```


    **Exception #2—Internal housekeeping methods**: Some methods may be used strictly
    for internal housekeeping purposes, as well, in which case these may also be declared
    private rather than public. (A neighbor needn’t know that we have a maid who comes
    to clean every other week!)


    An example of such a `Student` method might be `updateGpa`, which recomputes the
    value of the `gpa` attribute each time a student completes another course and
    receives a grade. The only time that this method may ever need to be called is
    perhaps from within another method of `Student`—for example, the public `completeCourse`
    method—as follows:


    ```

    public class Student {

    private double gpa;

    private int totalCoursesTaken;

    private int totalQualityPointsEarned;

    private int countOfDsAndFs;

    // other details omitted ...

    public void completeCourse(String courseName,

    int creditHours, char grade) {

    if (grade == ''D'' || grade == ''F'') {

    countOfDsAndFs++;

    }

    // Record grade in transcript.

    // details omitted ...

    // Update an attribute ...

    totalCoursesTaken = totalCoursesTaken + 1;

    // ... and call a PRIVATE housekeeping method from within this

    // public method to adjust the student''s GPA accordingly.

    updateGpa(creditHours, grade);

    }

    // The details of HOW the GPA gets updated are a deep, dark

    // secret! Even the EXISTENCE of this next method is hidden from

    // the "outside world" (i.e., inaccessible from client code) by

    // virtue of its having been declared to be PRIVATE.

    private void updateGpa(int creditHours, char grade) {

    int letterGradeValue = 0;

    if (grade == ''A'') letterGradeValue = 4;

    if (grade == ''B'') letterGradeValue = 3;

    if (grade == ''C'') letterGradeValue = 2;

    if (grade == ''D'') letterGradeValue = 1;

    // For an ''F'', it remains 0.

    int qualityPoints = creditHours * letterGradeValue;

    // Update two attributes.

    totalQualityPointsEarned =

    totalQualityPointsEarned + qualityPoints;

    gpa = totalQualityPointsEarned/totalCoursesTaken;

    }

    }

    ```


    Client code shouldn’t be able to directly cause a `Student` object’s `gpa` to
    be updated; this should only occur as a side effect of completing a course. By
    making the `updateGpa` method private, we’ve prevented any client code from explicitly
    invoking this method to manipulate this attribute’s value out of context.


    **Exception #3—“Read-only” attributes**: If we provide only a “get” method for
    an attribute, but no “set” method, then that attribute is rendered effectively
    read-only from the perspective of client code. We might do so, for example, with
    a student’s ID number that, once set by the system at the time of `Student` object
    creation, should remain unchanged:


    ```

    public class Student {

    private String studentId;

    // details omitted

    // We render studentId as a read-only attribute by only writing a get method

    // for it.

    public String getStudentId() {

    return studentId;

    }

    // The set method is intentionally omitted from the class.

    }

    ```


    How do we ever set such an attribute’s value initially? We’ve already seen that
    some attributes’ values get modified as a side effect of performing a method (as
    with the `countOfDsAndFs` attribute that we discussed earlier). We’ll also see
    how to explicitly initialize such a read-only attribute a bit later in this chapter,
    when we talk about constructors.


    **Exception #4—Public attributes**: On rare occasions, a class may declare selected
    attributes as `public` for ease of access; this is only done when there is no
    business logic governing the attributes per se.


    One such example is the predefined Java `Point` class, which is used to define
    an (x, y) coordinate in two-dimensional space; its attributes are declared simply
    as


    ```

    public class Point {

    // Both attributes are public:

    public double x;

    public double y;

    // etc.

    }

    ```


    so that, in client code, we may easily assign values as follows:


    ```

    Point p = new Point();

    p.x = 3.7;

    p.y = -4.8;

    ```


    That being said, when creating your own classes, resist the urge to declare attributes
    with `public` accessibility simply as a lazy way of avoiding having to write “get”/“set”
    methods! We’ve seen the many benefits that “get”/“set” methods provide in terms
    of enforcing business logic when appropriate. As it turns out, the vast majority
    of attributes will need to be governed by such business logic.


    ## Constructors


    When we talked about instantiating objects in the previous chapter, you might
    have been curious about the interesting syntax involved with the `new` keyword:


    ```

    Student x = new Student();

    ```


    In particular, you might have wondered why there were parentheses tacked onto
    the end of the statement.


    It turns out that when we instantiate an object via the `new` keyword, we’re actually
    invoking a special type of function affiliated with a class called a constructor.
    Invoking a constructor serves as a request to the JVM to construct (instantiate)
    a brand-new object at run time by allocating enough program memory to house the
    object’s attributes. Returning to our “object as a helium balloon” analogy, we’re
    asking the JVM to inflate a new helium balloon of a particular type.'
