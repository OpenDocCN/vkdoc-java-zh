    \ improperly capitalized:\n\n  ```\n  // The reserved word 'for' should be lowercase.\n\
    \  For (int i = 0; i < 3; i++) {\n  ```\n\n  This in turn produces the following\
    \ seemingly bizarre compiler error:\n\n  ```\n  '.class' expected\n  For (int\
    \ i = 0; i < 3; i++) {\n  ^\n  ```\n\n- The name of the `main` method is lowercase.\n\
    - As mentioned earlier, the `String` type starts with an uppercase “S.”\n\n###\
    \ Java Expressions\n\nJava is an **expression-oriented language**. A **simple\
    \ expression** in Java is either:\n\n- **A constant**: `7`, `false`\n- **A char(acter)\
    \ literal enclosed in single quotes**: `'A'`, `'3'`\n- **A String literal enclosed\
    \ in double quotes**: `\"foo\"`, `\"Java\"`\n- **The name of any properly declared\
    \ variables**: `myString`, `x`\n- **Any two of the preceding types of expression\
    \ that are combined with one of the Java binary operators (discussed in detail\
    \ later in this chapter)**: `x + 2`\n- **Any one of the preceding types of expression\
    \ that is modified by one of the Java unary operators (discussed in detail later\
    \ in this chapter)**: `i++`\n- **Any of the preceding types of expression enclosed\
    \ in parentheses**: `(x + 2)`\n\nplus a few more types of expression having to\
    \ do with objects that you’ll learn about later in the book.\n\nExpressions of\
    \ arbitrary complexity can be assembled from the various different simple expression\
    \ types by nesting parentheses, for example: `((((4/x) + y) * 7) + z)`."
