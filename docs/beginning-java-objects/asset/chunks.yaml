  trans: "\n### 方法命名规范\n\nJava 方法名采用***驼峰命名法***；回顾第 2 章可知，变量名也采用驼峰命名法。作为复习，驼峰命名法的规则如下：\n\
    \n*   方法名的首字母小写。\n*   方法名中后续每个拼接单词的首字母大写，其余字母小写。\n*   不使用任何“标点”字符（如破折号、下划线等）来分隔这些单词。\n\
    \n例如，`chooseAdvisor` 是一个合适的方法名，而以下名称都不合适：`ChooseAdvisor`（首字母“C”大写）、`chooseadvisor`（字母“a”小写）、`choose_advisor`（使用了分隔下划线）。\n\
    \n### 向方法传递参数\n\n向方法传递参数的目的有两个：\n\n*   为其提供执行任务所需的（可选）“燃料”。\n*   以某种方式引导其行为。\n\
    \n例如，对于前面展示的 `registerForCourse` 方法，有必要告诉执行该方法的特定 `Student` 对象，我们希望它注册哪门课程；为此，我们将传入两个参数：一个课程\
    \ ID（例如“MATH 101”）和一个分节号（例如 `10`，该课程恰好安排在周一晚上 8:00 到 10:00 上课），如下所示：\n\n```\n\
    boolean registerForCourse(String courseID, int secNo)\n```\n\n如果我们改用***空***参数列表来声明\
    \ `registerForCourse` 方法头：\n\n```\nboolean registerForCourse()\n```\n\n那么请求就会变得模糊不清，因为执行此方法的\
    \ `Student` 对象将不知道它应该注册哪门课程/分节。\n\n然而，并非所有方法都需要这样的“燃料”；有些方法仅能基于对象内部以属性值形式存储的信息来产生结果，在这种情况下，不需要以参数形式提供额外的指导。例如，方法：\n\
    \n```\nint getAge()\n```\n\n被设计为无参数，因为一个 `Student` 对象大概无需提供任何限定信息就能告诉我们它的年龄，也许是通过将其\
    \ `birthDate` 属性的值与系统日期进行比较。不过，假设我们希望 `Student` 对象能够以年或月为单位报告其年龄；在这种情况下，我们可能希望如下声明\
    \ `getAge` 方法：\n\n```\nint getAge(int ageType)\n```\n\n这样我们就可以传入一个 `int`（整数）参数作为控制标志，告知\
    \ `Student` 对象我们希望如何返回答案。也就是说，我们可以这样编写 `getAge` 方法的逻辑：\n\n*   如果我们传入值 1，表示我们希望答案以年为单位返回。\n\
    *   如果我们传入值 2，我们希望答案以月为单位返回（例如，一个 21 岁的学生会回答它 252 个月大）。\n\n处理以两种不同形式获取 `Student`\
    \ 对象年龄这一需求的另一种方法是定义两个独立的方法，例如：\n\n```\nint getAgeInYears()\nint getAgeInMonths()\n\
    ```\n\n但在面向对象编程中，通过参数的值（和类型）来控制方法的行为是一种常见做法。\n\n### 方法返回类型\n\n前面声明的 `registerForCourse`\
    \ 方法显示其返回类型为 `boolean`，这意味着该方法将返回以下两个值之一：\n\n*   值 `true`，表示“任务完成”——即 `Student`\
    \ 对象已成功注册到它被指示注册的课程。\n*   值 `false`，表示注册请求因某种原因被拒绝。可能是所需的分节已满，或者学生不满足该课程的先修条件，或者所请求的课程/分节已被取消等。\n\
    \n    在第 13 章中，当你学习**异常处理**时，你将学到用于沟通并精确确定方法任务***为何***失败的技术。\n\n请注意，方法可以被设计为不返回任何内容——也就是说，它可以静默地执行其任务，无需报告其工作的结果。如果是这样，它会被声明为具有\
    \ `void` 返回类型（Java 的另一个关键字）。例如，考虑 `Student` 方法头：\n\n```\nvoid setName(String newName)\n\
    ```\n\n此方法需要一个参数——一个 `String`，表示我们希望此 `Student` 对象采用的新名称——并通过将 `Student` 对象的内部\
    \ `name` 属性设置为传入方法的任何值来“静默”执行，不返回任何答案作为响应。\n\n以下是我们可能为 `Student` 类声明的另一个具有 `void`\
    \ 返回类型的方法头示例：\n\n```\nvoid switchMajor(String newDepartment, Professor newAdvisor)\n\
    ```\n\n此方法表示请求 `Student` 对象更改其主修专业领域，这涉及指定一个新的学术部门（例如“BIOLOGY”）以及一个对 `Professor`\
    \ 对象的引用，该对象将在此新部门中担任学生的导师。\n\n前面的示例表明，我们可以将参数声明为任何类型，包括用户定义的类型，例如 `Professor`。方法的返回类型也是如此；例如，具有以下方法头的方法：\n\
    \n```\nProfessor getAdvisor()\n```\n\n可用于询问 `Student` 对象其导师是谁。`Student` 对象不仅仅是返回导师的***姓名***，而是返回对整个\
    \ `Professor` 对象的引用（由 `Student` 的内部 `facultyAdvisor` 属性记录；你将在本章稍后部分学习如何告知 `Student`\
    \ 对象***哪个*** `Professor` 对象将作为其 `facultyAdvisor`）。\n\n请注意，一个方法最多只能返回一个结果，这似乎有些限制。例如，如果我们想向\
    \ `Student` 对象询问该学生修过的***所有*** `Course` 的列表——我们是否必须通过多次方法调用来逐个询问？幸运的是，不必如此。方法返回的结果实际上可以是对任意复杂对象的引用，包括一种称为**集合**的特殊类型对象，它可以包含对***多个***其他对象的引用。我们将在第\
    \ 6 章深入讨论集合。\n"
- fmt: '### An Analogy


    Let’s use an analogy to help illustrate what we’ve discussed so far about methods.
    With respect to household chores, let’s say that a person is capable of


    - Taking out the trash

    - Mowing the lawn

    - Washing the car


    Expressing this notion in Java code, we’d perhaps declare three methods for the
    `Person` class, one for each chore (service):


    - `takeOutTheTrash`

    - `mowTheLawn`

    - `washTheCar`


    In the case of the `takeOutTheTrash` method, we needn’t provide any qualifying
    details in the form of arguments, nor do we expect the person performing this
    service (method) to report back to us, so we declare the method header with a
    return type of `void` and an empty parameter list:


    ```

    void takeOutTheTrash()

    ```


    In the case of the `mowTheLawn` method, we’d like whoever is mowing the lawn to
    report back to us as to whether or not they see any crabgrass, but again, we needn’t
    provide any qualifying details in the form of arguments, so we declare the method
    header with a return type of `boolean` (where `true` means the person saw crabgrass
    and `false` means the person did not) and an empty parameter list:


    ```

    boolean mowTheLawn()

    ```


    Finally, in the case of the `washTheCar` method, we might own several different
    cars, and so we’d need to specify which car is to be washed by passing in a reference
    to the car of interest. We needn’t get any sort of response from the person doing
    the washing, however, and so we might craft the following method header:


    ```

    void washTheCar(Car c)

    ```


    We’ll revisit this “chores” analogy to expand upon it later in this chapter.


    ### Method Bodies


    When we design and program a class’s methods, declaring method headers alone is
    not enough: we must also program the internal details of how each method should
    behave when invoked. These internal programming details, known as the **method
    body**, are enclosed within braces `{ ... }` immediately following the method
    header, as follows:


    ```

    public class Student {

    // Attributes.

    String name;

    double gpa;

    // Other Student attribute declarations have been omitted from this example ...

    // We declare a method header ...

    boolean isHonorsStudent() {

    // ... and program the details of what this method is to do

    // within enclosing braces ... this is the method body.

    // Here, we''re accessing the value of "gpa", declared as an

    // attribute of the Student class above.

    if (gpa >= 3.5) {

    // Returning the value "true" indicates "yes, this is

    // an honors student".

    return true;

    }

    else {

    // Returning the value "false" indicates "no, this isn''t

    // an honors student".

    return false;

    }

    }

    // Other method declarations for the Student class would follow, e.g.,

    // getName(), setName(), getGpa(), setGpa() ... details omitted.

    }

    ```


    We can thus see that **a method is a function**—a function that is **performed
    by a specific object**, but a function nonetheless.


    ### Features May Be Declared in Any Order


    Note that the relative order in which features are declared within a Java class
    doesn’t matter. That is, we’re permitted to reference a feature A from within
    method B even though the declaration of feature A comes **after** the declaration
    of method B in the overall class declaration.


    For example, in the following simple class, we declare two methods, `foo` and
    `bar`, and one attribute, `x`. The `foo` method is able to invoke the `bar` method,
    despite the fact that the declaration of `bar` comes **after** the declaration
    of `foo` in the class:


    ```

    public class Simple {

    // Attributes.

    int x;

    // Methods.

    void foo() {

    // Invoke bar() from within foo.

    bar();

    }

    // bar() is declared AFTER foo().

    void bar() {

    System.out.println(x);

    }

    }

    ```


    All languages are not created equal in this regard; in C++, for example, you may
    only reference a feature if it has been **previously declared**. Hence, invoking
    `bar` from `foo` would generate a compilation error if the preceding example were
    a C++ vs. Java example.


    Similarly, attribute declarations needn’t precede method declarations for a class;
    it is thus permissible (but not common) to rewrite our `Student` class as follows:


    ```

    public class Student {

    // Here, we BEGIN with method declarations ...

    void foo() {

    bar();

    }

    void bar() {

    // We are able to reference attribute ''x'' despite the fact

    // that its declaration hasn''t

    // been ''seen'' by the compiler yet.

    System.out.println(x);

    }

    // ... and END with attribute declarations.

    int x;

    }

    ```


    However, it is common practice to consolidate all attribute declarations at the
    beginning of a class, prior to declaring any of its methods.'
