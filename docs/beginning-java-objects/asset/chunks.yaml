    // 两个参数的构造函数。

    public Student(String n, String s) {

    // 注意此构造函数与 Person 构造函数之间的逻辑冗余——我们稍后会回来修复。

    // 初始化属性。

    setName(n);

    setSsn(s);

    setMajor(“UNDECLARED”);

    // 伪代码。

    执行与实例化 Person 相关的其他复杂操作 ...

    ... 以及专门与实例化 Student 相关的更复杂操作。

    }

    // 三个参数的构造函数。

    public Student(String n, String s, String m) {

    // 更多冗余！

    // 初始化属性。

    setName(n);

    setSsn(s);

    setMajor(m);

    // 伪代码。

    执行与实例化 Person 相关的其他复杂操作 ...

    ... 以及专门与实例化 Student 相关的更复杂操作。

    }

    }

    ```


    由于声明了显式构造函数，`Student` 类也失去了其默认的无参构造函数。


    我们首先注意到，我们在 `Student` 类的***两个***构造函数中都重复了 `Person` 构造函数提供的代码：


    ```

    // 初始化属性。

    setName(n);

    setSsn(s);

    // 伪代码。

    执行与实例化 Person 相关的其他复杂操作 ...

    ```


    正如我之前多次说过的，在应用程序中应尽可能避免代码冗余；幸运的是，Java 为我们提供了一种机制，可以在子类的构造函数中重用超类的构造函数代码。

    '
- fmt: '#### `super(...)` for Constructor Reuse


    We accomplish code reuse of a superclass constructor via the same `super` keyword
    we discussed earlier in the chapter for the reuse of standard methods of a superclass.
    However, the syntax for reusing constructor code is a bit different. If we wish
    to explicitly reuse a particular parent class’s constructor, we refer to it as
    follows in the subclass constructor body:


    ```

    super(arguments);  // note that there is no "dot" involved

    // when reusing CONSTRUCTOR code

    ```


    Using `super(`*arguments*`);` to invoke a superclass constructor is similar to
    using `this(`*arguments*`);` to invoke one constructor from within another in
    the **same** class, a technique that you learned about in Chapter [4](#78624_3_En_4_Chapter.xhtml).


    We select whichever of a superclass’s constructors we wish to reuse, if more than
    one exists, by virtue of the arguments that we pass into `super(...)`; because
    constructors, if overloaded for a given class, all have unique argument signatures,
    the compiler has no difficulty in sorting out which superclass constructor we’re
    invoking. This is illustrated in the following revised version of the `Student`
    class (note the **bolded** code):


    ```

    public class Student extends Person {

    // name and ssn are inherited from Person ...

    private String major;

    // Constructor with two arguments.

    public Student(String n, String s) {

    // We''re explicitly invoking the Person constructor that accepts two

    // String arguments by passing in two String arguments - namely, the

    // values of n and s.

    super(n, s);

    // Then, go on to do only those things that need to be done uniquely

    // for a Student.

    setMajor("UNDECLARED");

    // Pseudocode.

    do complex things related to instantiating a Student specifically.

    }

    // Constructor with three arguments.

    public Student(String n, String s, String m) {

    // See comments above.

    super(n, s);

    setMajor(m);

    // Pseudocode.

    do complex things related to instantiating a Student specifically.

    }

    }

    ```


    One important thing to note is that if we explicitly call a superclass constructor
    from a subclass constructor using the `super(...)` syntax, the call **must** be
    the **first** statement in the subclass constructor—that is, the following constructor
    would fail to compile:


    ```

    public Student(String n, String s, String m) {

    setMajor(m);

    // This won''t compile, because the call to the superclass''s

    // constructor must come first in the subclass''s constructor.

    super(n, s);

    }

    ```


    The following error message would arise:


    ```

    call to super(n, s) must be first statement in constructor

    ```


    The requirement to put a call to `super(...)` as the first line of code in a constructor
    arises by virtue of the “is a” nature of inheritance. When we create a `Student`
    object, we are in reality simultaneously creating an `Object`, a `Person`, and
    a `Student`, all rolled into one. So, whether we **explicitly** call a superclass
    constructor from a subclass constructor using `super(...)` or not, the fact is
    that Java will **always** attempt to execute constructors for all of the ancestor
    classes for a given class, from most general to most specific in the class hierarchy,
    before launching into that given class’s constructor code. For example, if we
    are instantiating a `Student`:


    ```

    Student s = new Student("Fred", "123-45-6789");

    ```


    then, behind the scenes, an `Object` constructor will automatically be executed
    first, followed by a `Person` constructor, followed by whichever `Student` constructor
    we’ve explicitly invoked—in this example, the one that takes two `String` arguments.
    The question is, **which superclass constructors get called if there’s more than
    one defined for a given superclass**? Unless we explicitly invoke a particular
    constructor as we did in our `Student` constructors, for example:


    ```

    public Student(String n, String s) {

    super(n, s);

    // etc.

    ```


    then the parameterless constructor for the superclass is called automatically.
    That is, if we write a constructor without an **explicit** call to `super(`*args*`)`,
    as follows:


    ```

    public Student(String n, String s) {

    // NO EXPLICIT CALL TO super(...)

    setName(n);

    setSsn(s);

    setMajor("UNDECLARED");

    // etc.

    }

    ```


    it is as if we’ve written:


    ```

    public Student(String n, String s) {

    super(); // implied

    setName(n);

    setSsn(s);

    setMajor("UNDECLARED");

    // etc.

    }

    ```


    instead. **Herein arises a potential problem**, which is described in the next
    section.'
