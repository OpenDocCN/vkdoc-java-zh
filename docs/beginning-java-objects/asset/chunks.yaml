    We’ve previously seen the `this` keyword used in two different ways:


    - In Chapter [4](#78624_3_En_4_Chapter.xhtml), we learned that the syntax `this.featureName`
    can be used within any (non-static) method to emphasize the fact that we’re accessing
    another feature of **this same object**:


    - In that same chapter, we also learned that, from within any **constructor**
    of a class *X*, we can invoke any other constructor of the same class *X* via
    the syntax


    ```

    public class SomeClass {

    // Details omitted.

    public void foo() {

    // Call method bar (declared below) from within foo.

    this.bar();

    // etc.

    }

    public void bar() {

    // ...

    }

    }

    ```


    ```

    this(optional arguments);

    ```


    so as to reuse code from one constructor to another.


    We’ll now explore a third context in which the `this` keyword may be used.


    In client code, such as the `main` method of a program, we declare reference variables
    so as to assign symbolic names to objects:


    ```

    Student s = new Student();  // s is a reference variable of type Student.

    ```


    We can then conveniently manipulate the objects that these reference variables
    refer to by manipulating the reference variables themselves:


    ```

    s.setName("Fred");

    ```


    When we are executing the code that comprises the body of one of an object’s own
    methods, we sometimes need the object to be able to refer to **itself**—that is,
    to **self-reference**, as in this next bit of code (please read inline comments
    carefully):


    ```

    public class Student {

    Professor facultyAdvisor;

    // Other details omitted.

    public void selectAdvisor(Professor p) {

    // We''re down in the "bowels" of the selectAdvisor method,

    // executing this method for a particular Student object/instance.

    // We save the handle on our new advisor as one of our attributes ...

    this.setFacultyAdvisor(p);

    // ... and now we want to turn around and tell this Professor object to

    // reflect us as its student advisee. The Professor class has a

    // method with the header:  public void addAdvisee(Student s)

    // and so all we need to do is invoke this method on our advisor object,

    // passing in a reference to ourself as a Student; but, who the heck

    // are we? That is, how do we refer to ourself?

    facultyAdvisor.addAdvisee(???);

    }

    }

    ```


    Within the body of a method, when we need a way to refer to the object whose method
    we are executing, we use the reserved word `this` to “self-reference.” So, with
    respect to our preceding example, the line of code **highlighted** in the following
    would do the trick nicely:


    ```

    public class Student {

    Professor facultyAdvisor;

    // Other details omitted.

    public void selectAdvisor(Professor p) {

    this.setFacultyAdvisor(p);

    p.addAdvisee(this); // passing a reference to THIS Student

    }

    }

    ```


    Specifically, it would pass a reference to **this** `Student`—the `Student` object
    whose `selectAdvisor` method we are executing—as an argument to the `addAdvisee`
    method as invoked on `Professor facultyAdvisor`.


    # Java Exception Handling


    Unexpected problems can arise as the JVM interprets/executes a Java program; for
    example:


    - A program may be unable to open a data file due to inappropriate permissions.

    - A program may have trouble establishing a connection to a database management
    system because a user has supplied an invalid password.

    - A user may supply inappropriate data via an application’s user interface—for
    example, a non-numeric value where a numeric value is expected.

    - The problem may be something as simple as a logic error that the compiler wasn’t
    able to detect.


    Suppose we were to write the following simple program:


    ```

    public class Problem {

    public static void main(String[] args) {

    // Declare two Student object references and initialize them

    // to the value null, which is the "zero-equivalent" value

    // for object references; that is, null indicates that the variable

    // does not currently reference an object.

    Student s1 = null;

    Student s2 = null;

    // Details omitted ...

    // Later on, we instantiate an object for s1 to refer to, but forget

    // to do so for s2.

    s1 = new Student();

    // More details omitted ...

    // Still later in our program, we attempt to assign names to both Students.

    // This line of code is fine ...

    s1.setName("Fred");

    // ... but this next line of code causes a run-time problem, because we

    // are trying to invoke a method on -- i.e., "talk to" -- a

    // non-existent object.

    s2.setName("Mary");

    }

    }

    ```


    The preceding code would compile without error, but if we were to execute this
    program, the JVM would report the following run-time error:


    ```

    Exception in thread "main" java.lang.NullPointerException

    at Problem.main(Problem.java:22)

    ```


    We refer to (recoverable) Java run-time errors as **exceptions** and refer to
    the process whereby the JVM reports that a run-time error has arisen as **throwing
    an exception**. With respect to this example specifically, the JVM threw a `NullPointerException`
    on line 22 of the `Problem` class:


    ```

    s2.setName("Mary");  // this is line 22

    ```


    A `NullPointerException` arises whenever we try to invoke a method on an object
    reference (`s2`, in this example) whose value is `null` or, in plain English,
    whenever we try to “talk to” a nonexistent object.


    When the JVM throws an exception, it’s as if the JVM is shooting off a signal
    flare to notify an application that something has gone wrong, in order to give
    the application a chance to **recover** from the problem if we’ve equipped it
    to do so. Through a technique known as **exception handling**, we can design our
    applications so that they may anticipate and gracefully recover from such exceptions
    at run time.


    ![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig15_HTML.jpg)


    The diagrammatic illustration shows the bytecode of JVM applications as loaded
    into the JVM’s memory, divided into four square boxes. The last box has a rocket
    diagram firing from the bottom.


    **Figure 13-15** When the JVM throws an exception, it is effectively shooting
    off a signal flare to notify an application of a problem that has arisen


    ## The Mechanics of Exception Handling


    The basics of the exception handling mechanism are as follows.


    ### The `try` Block


    We enclose code that is likely to throw an exception inside of a pair of braces
    to form a code block and precede the opening brace with the keyword `try`. This
    indicates our intention to **catch**—that is, to detect and respond to—any exceptions
    that might be thrown by the JVM while executing the code within that **try block**.


    Going back to our previous example, we might amend our code as **highlighted**
    in the following:


    ```

    public class Problem2 {

    public static void main(String[] args) {

    Student s1 = null;

    Student s2 = null;

    // Details omitted ...

    // Later on, we instantiate an object for s1 to refer to, but

    // forget to do so for s2.

    s1 = new Student();

    // More details omitted ...

    // We''ve added a try statement to enclose the code likely to

    // generate an exception.

    try {

    s1.setName("Fred");

    s2.setName("Mary");

    }

    // There''s more to follow ... stay tuned!

    ```


    In order for the preceding code to compile, the `try` block must be immediately
    followed by at least one `catch` or `finally` block.'
