- fmt: "# Reuse of Abstractions\n\nWhen learning about something new, we automatically\
    \ search our mental archive for other abstractions/models that we’ve previously\
    \ built and mastered, to look for similarities that we can build upon. When learning\
    \ to ride a two-wheeled bicycle for the first time, for example, you may have\
    \ drawn upon lessons that you learned about riding a tricycle as a child (see\
    \ Figure [1-7](#78624_3_En_1_Chapter.xhtml#Fig7)). Both have handlebars that are\
    \ used to steer; both have pedals that are used to propel the bike forward. Although\
    \ the abstractions didn’t match perfectly—a two-wheeled bicycle introduced the\
    \ new challenge of having to balance yourself—there was enough of a similarity\
    \ to allow you to draw upon the steering and pedaling expertise you already had\
    \ mastered and to focus on learning the new skill of how to balance on two wheels.\n\
    \n![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig7_HTML.jpg)\n\nA cloud-shaped\
    \ figure with text inside that reads, Things I know how to do. The things given\
    \ below are, consume, sleep, program, and ride. Under consume, the text given\
    \ is, eat chocolate and pizza, and drink.\n\nFigure 1-7\n\nThe human brain is\
    \ adept at learning by building upon already-established abstractions\n\nThis\
    \ technique of comparing features to find an abstraction that is similar enough\
    \ to be reused successfully is known as **pattern matching and reuse**. As we’ll\
    \ cover later in the book, pattern reuse is an important technique for object-oriented\
    \ software development, as well, because it spares us from having to reinvent\
    \ the wheel with each new project. If we can reuse an abstraction or model from\
    \ a previous project, we can focus on those aspects of the new project that differ\
    \ from the old, gaining a tremendous amount of productivity in the process.\n\n\
    ## Inherent Challenges\n\nDespite the fact that abstraction is such a natural\
    \ process for human beings, developing an appropriate model for a software system\
    \ is perhaps the most difficult aspect of software engineering, because\n\n* There\
    \ are an unlimited number of possibilities. Abstraction is to a certain extent\
    \ in the eye of the beholder: several different observers working independently\
    \ are almost guaranteed to arrive at different models. Whose is the best? **Passionate**\
    \ arguments have ensued!\n\n* To further complicate matters, there is virtually\
    \ never only one “best” or “correct” model, only “better” or “worse” models relative\
    \ to the problem to be solved. The same situation can be modeled in a variety\
    \ of equally valid ways. When we get into actually doing some modeling in Part\
    \ 2 of this book, we’ll look at a number of valid alternative abstractions for\
    \ our `Student Registration System` (`SRS`) case study that was presented at the\
    \ end of the Introduction.\n\n* Note, however, that there **is** such a thing\
    \ as an incorrect model: namely, one that misrepresents the real-world situation\
    \ (e.g., modeling a person as having two different blood types).\n\n* There is\
    \ no acid test to determine if a model has adequately captured all of a user’s\
    \ requirements. The ultimate evidence of whether or not an abstraction was appropriate\
    \ is in how successful the resultant software system turns out to be. Because\
    \ of this, it’s critical that we learn ways of communicating our model concisely\
    \ and unambiguously frequently throughout the Agile development life cycle to\n\
    \n  * The intended future users of our application, so that they may provide a\
    \ sanity check for our understanding of the problem to be solved before we embark\
    \ upon software development\n\n  * Our fellow software engineers, so that team\
    \ members can share a common vision of what we’re to build collaboratively\n\n\
    Despite all of these challenges, it’s critical to get the up-front abstraction\
    \ “right” before beginning to build a system. The later in the software life cycle\
    \ a modeling error is detected, the more costly it is to fix by orders of magnitude.\
    \ This isn’t to imply that an abstraction should be rigid—quite the contrary!\
    \ The art and science of object modeling, when properly applied, yields a model\
    \ that is flexible enough to withstand a wide variety of functional changes. In\
    \ addition, the special properties of software objects further lend themselves\
    \ to flexible software solutions, as you’ll learn throughout the rest of the book.\n\
    \n### What Does It Take to Be a Successful Object Modeler?\n\nComing up with an\
    \ appropriate abstraction as the basis for a software system model requires\n\n\
    * **Insight into the problem domain**: Ideally, we’ll be able to draw upon our\
    \ own real-world experiences, such as former or current experience as a student,\
    \ which will come in handy when determining the requirements for the `Student\
    \ Registration System` (`SRS`), the basis of our modeling and coding efforts in\
    \ Parts 2 and 3 of the book.\n\n* **Creativity**: We must be able to think “outside\
    \ the box,” in case the future users whom we’re interviewing have been immersed\
    \ in the problem area for so long that they fail to see innovations that might\
    \ be made.\n\n* **Good listening skills**: These will come in handy as future\
    \ users of the system describe how they do their jobs currently or how they envision\
    \ doing their jobs in the future, with the aid of the system that we’re about\
    \ to develop.\n\n* **Good observational skills**: Actions often speak louder than\
    \ words. Just by observing users going about their daily business, we may pick\
    \ up an essential detail that they have neglected to mention because they do it\
    \ so routinely that it has become a habit.\n\nBut all this isn’t enough. We also\
    \ need\n\n![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig8_HTML.jpg)\n\nA flow\
    \ diagram of a landscape consists of two scenarios. The landscape is either adjacent\
    \ to the lake, or the tree. The tree is divided into deciduous and conifer.\n\n\
    Figure 1-8\n\nDescribing a landscape in UML notation\n\n* An organized **process**\
    \ for determining what the abstraction should be. If we follow a proven checklist\
    \ of steps for producing a model, then we greatly reduce the probability that\
    \ we’ll omit some important feature or neglect a critical requirement.\n\n* A\
    \ way to **communicate** the resultant model concisely and unambiguously to our\
    \ fellow software developers and to the stakeholders/intended users of our application.\
    \ While it’s certainly possible to describe an abstraction in narrative text,\
    \ a picture is worth a thousand words, and so the language with which we communicate\
    \ a model is often a **graphical notation**. Throughout this book, we’ll focus\
    \ on the `Unified Modeling Language` (`UML`; see Figure [1-8](#78624_3_En_1_Chapter.xhtml#Fig8))\
    \ notation as our model communication language (you’ll learn the basics of `UML`\
    \ in Chapters [10](#78624_3_En_10_Chapter.xhtml) and [11](#78624_3_En_11_Chapter.xhtml)).\
    \ Think of a graphical model as a blueprint of the software application to be\
    \ built.\n\n* Ideally, a **software tool** to help us automate the process of\
    \ producing such a blueprint.\n\nPart 2 of this book covers these three aspects\
    \ of modeling—process, notation, and tool—in detail.\n\nThroughout the remainder\
    \ of this book, we are going to focus on this following case study as the basis\
    \ of object modeling and Java coding lessons:\n\n`Student Registration System\
    \ (SRS) Requirements Specification`\n\nWe have been asked to develop an automated\
    \ `Student Registration System` (`SRS`). This system will enable students to register\
    \ online for courses each semester, as well as tracking a student’s progress toward\
    \ completion of their degree."
  raw: '## Reuse of Abstractions


    When learning about something new, we automatically search our mental archive
    for other abstractions/models that we’ve previously built and mastered, to look
    for similarities that we can build upon. When learning to ride a two-wheeled bicycle
    for the first time, for example, you may have drawn upon lessons that you learned
    about riding a tricycle as a child (see Figure [1-7](#78624_3_En_1_Chapter.xhtml#Fig7)).
    Both have handlebars that are used to steer; both have pedals that are used to
    propel the bike forward. Although the abstractions didn’t match perfectly—a two-wheeled
    bicycle introduced the new challenge of having to balance yourself—there was enough
    of a similarity to allow you to draw upon the steering and pedaling expertise
    you already had mastered and to focus on learning the new skill of how to balance
    on two wheels.


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig7_HTML.jpg)


    A cloud-shaped figure with text inside that reads, Things I know how to do. The
    things given below are, consume, sleep, program, and ride. Under consume, the
    text given is, eat chocolate and pizza, and drink.


    Figure 1-7


    The human brain is adept at learning by building upon already-established abstractions


    This technique of comparing features to find an abstraction that is similar enough
    to be reused successfully is known as **pattern matching and** **reuse**. As we’ll
    cover later in the book, pattern reuse is an important technique for object-oriented
    software development, as well, because it spares us from having to reinvent the
    wheel with each new project. If we can reuse an abstraction or model from a previous
    project, we can focus on those aspects of the new project that differ from the
    old, gaining a tremendous amount of productivity in the process.


    ## Inherent Challenges


    Despite the fact that abstraction is such a natural process for human beings,
    developing an appropriate model for a software system is perhaps the most difficult
    aspect of software engineering, because


    *   There are an unlimited number of possibilities. Abstraction is to a certain
    extent in the eye of the beholder: several different observers working independently
    are almost guaranteed to arrive at different models. Whose is the best? ***Passionate***
    arguments have ensued!


    *   To further complicate matters, there is virtually never only one “best” or
    “correct” model, only “better” or “worse” models relative to the problem to be
    solved. The same situation can be modeled in a variety of equally valid ways.
    When we get into actually doing some modeling in Part 2 of this book, we’ll look
    at a number of valid alternative abstractions for our Student Registration System
    (SRS) case study that was presented at the end of the Introduction.


    *   Note, however, that there ***is*** such a thing as an incorrect model: namely,
    one that misrepresents the real-world situation (e.g., modeling a person as having
    two different blood types).


    *   There is no acid test to determine if a model has adequately captured all
    of a user’s requirements. The ultimate evidence of whether or not an abstraction
    was appropriate is in how successful the resultant software system turns out to
    be. Because of this, it’s critical that we learn ways of communicating our model
    concisely and unambiguously frequently throughout the Agile development life cycle
    to


    *   The intended future users of our application, so that they may provide a sanity
    check for our understanding of the problem to be solved before we embark upon
    software development


    *   Our fellow software engineers, so that team members can share a common vision
    of what we’re to build collaboratively


    Despite all of these challenges, it’s critical to get the up-front abstraction
    “right” before beginning to build a system. The later in the software life cycle
    a modeling error is detected, the more costly it is to fix by orders of magnitude.
    This isn’t to imply that an abstraction should be rigid—quite the contrary! The
    art and science of object modeling, when properly applied, yields a model that
    is flexible enough to withstand a wide variety of functional changes. In addition,
    the special properties of software objects further lend themselves to flexible
    software solutions, as you’ll learn throughout the rest of the book.


    ### What Does It Take to Be a Successful Object Modeler?


    Coming up with an appropriate abstraction as the basis for a software system model
    requires


    *   ***Insight into the problem domain***: Ideally, we’ll be able to draw upon
    our own real-world experiences, such as former or current experience as a student,
    which will come in handy when determining the requirements for the Student Registration
    System (SRS), the basis of our modeling and coding efforts in Parts 2 and 3 of
    the book.


    *   ***Creativity***: We must be able to think “outside the box,” in case the
    future users whom we’re interviewing have been immersed in the problem area for
    so long that they fail to see innovations that might be made.


    *   ***Good listening skills***: These will come in handy as future users of the
    system describe how they do their jobs currently or how they envision doing their
    jobs in the future, with the aid of the system that we’re about to develop.


    *   ***Good observational skills***: Actions often speak louder than words. Just
    by observing users going about their daily business, we may pick up an essential
    detail that they have neglected to mention because they do it so routinely that
    it has become a habit.


    But all this isn’t enough. We also need


    ![](images/78624_3_En_1_Chapter/78624_3_En_1_Fig8_HTML.jpg)


    A flow diagram of a landscape consists of two scenarios. The landscape is either
    adjacent to the lake, or the tree. The tree is divided into deciduous and conifer.


    Figure 1-8


    Describing a landscape in UML notation


    *   An organized ***process*** for determining what the abstraction should be.
    If we follow a proven checklist of steps for producing a model, then we greatly
    reduce the probability that we’ll omit some important feature or neglect a critical
    requirement.


    *   A way to ***communicate*** the resultant model concisely and unambiguously
    to our fellow software developers and to the stakeholders/intended users of our
    application. While it’s certainly possible to describe an abstraction in narrative
    text, a picture is worth a thousand words, and so the language with which we communicate
    a model is often a **graphical notation**. Throughout this book, we’ll focus on
    the Unified Modeling Language (UML; see Figure [1-8](#78624_3_En_1_Chapter.xhtml#Fig8))
    notation as our model communication language (you’ll learn the basics of UML in
    Chapters [10](#78624_3_En_10_Chapter.xhtml) and [11](#78624_3_En_11_Chapter.xhtml)).
    Think of a graphical model as a blueprint of the software application to be built.


    *   Ideally, a ***software tool*** to help us automate the process of producing
    such a blueprint.


    Part 2 of this book covers these three aspects of modeling—process, notation,
    and tool—in detail.


    Throughout the remainder of this book, we are going to focus on this following
    case study as the basis of object modeling and Java coding lessons:


    Student Registration System (SRS) Requirements Specification


    We have been asked to develop an automated Student Registration System (SRS).
    This system will enable students to register online for courses each semester,
    as well as tracking a student’s progress toward completion of their degree.'
  trans: "\n## 抽象的重用\n\n在学习新事物时，我们会自动搜索大脑中已构建并掌握的其他抽象/模型，寻找可以借鉴的相似之处。例如，当你第一次学习骑两轮自行车时，可能会借鉴小时候骑三轮车的经验（见图\
    \ 1-7）。两者都有用于转向的车把，都有用于推动自行车前进的踏板。尽管抽象并不完全匹配——两轮自行车带来了需要保持平衡的新挑战——但相似之处足以让你运用已掌握的转向和踩踏板技能，并专注于学习如何在两个轮子上保持平衡这一新技能。\n\
    \n![](img/78624_3_En_1_Fig7_HTML.jpg)\n\n一个云状图形，内含文字：我会做的事情。下方列出：消费、睡觉、编程、骑车。在“消费”下方，文字为：吃巧克力和披萨，以及喝饮料。\n\
    \n图 1-7\n\n人类大脑擅长通过建立在已有抽象的基础上进行学习\n\n这种通过比较特征来寻找足够相似、可成功重用的抽象的技术，被称为**模式匹配与重用**。正如我们将在本书后面讨论的，模式重用也是面向对象软件开发的一项重要技术，因为它使我们不必在每个新项目中重新发明轮子。如果我们能重用之前项目中的抽象或模型，就可以专注于新项目与旧项目不同的方面，从而大幅提高生产力。\n\
    \n## 固有的挑战\n\n尽管抽象对人类来说是一个如此自然的过程，但为软件系统开发合适的模型可能是软件工程中最困难的方面，因为：\n\n*   存在无限的可能性。抽象在一定程度上取决于观察者：几个不同的观察者独立工作，几乎必然会得出不同的模型。谁的模型最好？***激烈的***争论随之而来！\n\
    \n*   更复杂的是，几乎从来不存在唯一“最佳”或“正确”的模型，只有相对于待解决问题而言“更好”或“更差”的模型。同一情况可以用多种同样有效的方式建模。在本书第二部分实际进行建模时，我们将看到为学生注册系统（SRS）案例研究（在引言末尾介绍）提供的多种有效替代抽象。\n\
    \n*   但请注意，确实存在不正确的模型：即歪曲现实世界情况的模型（例如，将一个人建模为拥有两种不同的血型）。\n\n*   没有一种试金石测试可以确定模型是否充分捕捉了用户的所有需求。判断抽象是否合适的最终证据，在于由此产生的软件系统最终是否成功。因此，在整个敏捷开发生命周期中，学会频繁、简洁且无歧义地沟通我们的模型至关重要，沟通对象包括：\n\
    \    *   我们应用程序的未来用户，以便在我们开始软件开发之前，他们能对我们对问题的理解进行合理性检查；\n    *   我们的软件工程师同事，以便团队成员能共享关于我们将要协作构建内容的共同愿景。\n\
    \n尽管存在这些挑战，但在开始构建系统之前，将前期的抽象“做对”至关重要。在软件生命周期中越晚发现建模错误，修复成本就会成倍增加。这并不意味着抽象应该是僵化的——恰恰相反！对象建模的艺术与科学，如果应用得当，会产生一个足够灵活、能够承受各种功能变更的模型。此外，软件对象的特殊属性进一步有助于实现灵活的软件解决方案，你将在本书后续部分了解到这一点。\n\
    \n### 成为一名成功的对象建模者需要什么？\n\n提出一个合适的抽象作为软件系统模型的基础，需要：\n\n*   ***对问题领域的洞察***：理想情况下，我们能够借鉴自己的现实世界经验，例如作为学生（无论是过去还是现在）的经历，这在确定学生注册系统（SRS）的需求时会派上用场，该系统是本书第二和第三部分建模与编码工作的基础。\n\
    \n*   ***创造力***：我们必须能够“跳出框框”思考，以防我们采访的未来用户长期沉浸在该问题领域中，以至于未能看到可能实现的创新。\n\n*   ***良好的倾听技巧***：当系统的未来用户描述他们目前如何完成工作，或设想在我们将要开发的系统帮助下未来如何工作时，这些技巧会非常有用。\n\
    \n*   ***良好的观察技巧***：行动往往胜于言语。仅仅通过观察用户的日常工作，我们可能就能捕捉到一个他们因习以为常而忽略提及的关键细节。\n\n但这还不够。我们还需要：\n\
    \n![](img/78624_3_En_1_Fig8_HTML.jpg)\n\n一个景观流程图包含两个场景。景观要么毗邻湖泊，要么毗邻树木。树木分为落叶树和针叶树。\n\
    \n图 1-8\n\n用 UML 符号描述景观\n\n*   一个有条理的***过程***，用于确定抽象应该是什么。如果我们遵循一个经过验证的建模步骤清单，就能大大降低遗漏某些重要特征或忽略关键需求的可能性。\n\
    \n*   一种向软件开发者同事以及应用程序的利益相关者/预期用户***沟通***最终模型的方式，要求简洁且无歧义。虽然用叙述性文字描述抽象是可行的，但一图胜千言，因此我们用来沟通模型的语言通常是**图形化符号**。在本书中，我们将重点使用统一建模语言（UML；见图\
    \ 1-8）符号作为我们的模型沟通语言（你将在第 10 章和第 11 章学习 UML 的基础知识）。将图形化模型视为待构建软件应用程序的蓝图。\n\n* \
    \  理想情况下，还需要一个***软件工具***来帮助我们自动化生成此类蓝图的过程。\n\n本书第二部分将详细涵盖建模的这三个方面：过程、符号和工具。\n\n\
    在本书的剩余部分，我们将重点研究以下案例研究，作为对象建模和 Java 编码课程的基础：\n\n学生注册系统（SRS）需求规格说明\n\n我们被要求开发一个自动化的学生注册系统（SRS）。该系统将使学生能够每学期在线注册课程，并跟踪学生完成学位的进度。\n"
- fmt: "When a student first enrolls at the university, they use the `SRS` to set\
    \ forth a plan of study as to which courses they plan on taking to satisfy a particular\
    \ degree program and choose a faculty advisor. The `SRS` will verify whether or\
    \ not the proposed plan of study satisfies the requirements of the degree that\
    \ the student is seeking. Once a plan of study has been established, then, during\
    \ the registration period preceding each semester, students are able to view the\
    \ schedule of classes online and choose whichever classes they wish to attend,\
    \ indicating the preferred section (day of the week and time of day) if the class\
    \ is offered by more than one professor. The `SRS` will verify whether or not\
    \ the student has satisfied the necessary prerequisites for each requested course\
    \ by referring to the student’s online transcript of courses completed and grades\
    \ received (the student may review their transcript online at any time).\n\nAssuming\
    \ that (a) the prerequisites for the requested course(s) are satisfied, (b) the\
    \ course(s) meets one of the student’s plan of study requirements, and (c) there\
    \ is room available in each of the class(es), the student is enrolled in the class(es).\n\
    \nIf (a) and (b) are satisfied, but (c) is not, the student is placed on a first-come,\
    \ first-served waiting list. If a class/section that they were previously waitlisted\
    \ for becomes available (either because some other student has dropped the class\
    \ or because the seating capacity for the class has been increased), the student\
    \ is automatically enrolled in the waitlisted class, and an email message to that\
    \ effect is sent to the student. It is their responsibility to drop the class\
    \ if it is no longer desired; otherwise, they will be billed for the course.\n\
    \n## Summary\n\nIn this chapter, you’ve learned that\n\n*   Abstraction is a fundamental\
    \ technique that people use to perceive the world.\n*   Developing an abstraction\
    \ of the problem to be automated is a necessary first step of all software development.\n\
    *   We naturally organize information into classification hierarchies based upon\
    \ rules that we carefully structure, so that they are neither too general nor\
    \ too restrictive.\n*   We often reuse abstractions when attempting to model a\
    \ new concept.\n*   Producing an abstraction of a system to be built, known as\
    \ a model, is in some senses second nature to us and yet paradoxically is one\
    \ of the hardest things that software developers have to do in the life cycle\
    \ of an information systems project. It’s also one of the most important.\n\n\
    ## Exercises\n\n1.  Select a problem area that you would like to model from an\
    \ object-oriented perspective. Ideally, this will be a problem that you’re actually\
    \ going to be working on at your place of employment or that you otherwise have\
    \ a keen interest in. Assume that you’re going to write a program to automate\
    \ some aspect of this problem area, and write a one-page overview of the requirements\
    \ for this program, patterned after the `SRS` case study.\n\n    Make certain\
    \ that your first paragraph summarizes the intent of the system, as the first\
    \ paragraph in the `SRS` case study does. Also, emphasize the **functional requirements**—that\
    \ is, those that a nontechnical end user might state as to how the system should\
    \ behave—and avoid stating **technical requirements**, for example, “This system\
    \ must run on a Unix platform and must use the TCP/IP protocol to…”\n\n2.  Read\
    \ the case study for a Prescription Tracking System (`PTS`) in the Appendix. In\
    \ your opinion, how effective is this case study as an abstraction? Are there\
    \ details that you think could have been omitted or missing details that you think\
    \ would have been important to include? If you had an opportunity to interview\
    \ the intended users of the `PTS`, what additional questions might you ask them\
    \ to better refine this abstraction?\n\n3.  Sketch a class hierarchy that relates\
    \ to all of the following classes in a reasonable manner:\n\n    `Apple`\n\n \
    \   `Banana`\n\n    `Beef`\n\n    `Beverage`\n\n    `Cheese`\n\n    `Consumable`\n\
    \n    `Dairy Product`\n\n    `Food`\n\n    `Fruit`\n\n    `Green Bean`\n\n   \
    \ `Meat`\n\n    `Milk`\n\n    `Pork`\n\n    `Spinach`\n\n    `Vegetable`\n\n \
    \   Justify your answer, noting in particular any challenges that you faced in\
    \ doing so.\n\n4.  What aspects of a television set would be important to abstract\
    \ from the perspective of\n    *   A consumer wishing to buy one?\n    *   An\
    \ engineer responsible for designing one?\n    *   A retailer who sells them?\n\
    \    *   The manufacturer?\n\n# 2. Some Java Basics\n\n[Java Is Architecture Neutral](#78624_3_En_2_Chapter.xhtml#Sec1)\
    \ [Anatomy of a Simple Java Program](#78624_3_En_2_Chapter.xhtml#Sec2) [Comments](#78624_3_En_2_Chapter.xhtml#Sec3)\
    \ [The Class Declaration](#78624_3_En_2_Chapter.xhtml#Sec7) [The main Method](#78624_3_En_2_Chapter.xhtml#Sec8)\
    \ [Setting Up a Simple Java Development Environment](#78624_3_En_2_Chapter.xhtml#Sec9)\
    \ [The Mechanics of Java](#78624_3_En_2_Chapter.xhtml#Sec10) [Compiling Java Source\
    \ Code into Bytecode](#78624_3_En_2_Chapter.xhtml#Sec11) [Executing Bytecode](#78624_3_En_2_Chapter.xhtml#Sec12)\
    \ [Primitive Types](#78624_3_En_2_Chapter.xhtml#Sec13) [Variables](#78624_3_En_2_Chapter.xhtml#Sec14)\
    \ [Variable Naming Conventions](#78624_3_En_2_Chapter.xhtml#Sec15) [Variable Initialization](#78624_3_En_2_Chapter.xhtml#Sec16)\
    \ [The String Type](#78624_3_En_2_Chapter.xhtml#Sec17) [Case Sensitivity](#78624_3_En_2_Chapter.xhtml#Sec18)\
    \ [Java Expressions](#78624_3_En_2_Chapter.xhtml#Sec19) [Arithmetic Operators](#78624_3_En_2_Chapter.xhtml#Sec20)\
    \ [Relational and Logical Operators](#78624_3_En_2_Chapter.xhtml#Sec21) [Evaluating\
    \ Expressions and Operator Precedence](#78624_3_En_2_Chapter.xhtml#Sec22) [The\
    \ Type of an Expression](#78624_3_En_2_Chapter.xhtml#Sec23) [Automatic Type Conversions\
    \ and Explicit Casting](#78624_3_En_2_Chapter.xhtml#Sec24) [Loops and Other Flow\
    \ Control Structures](#78624_3_En_2_Chapter.xhtml#Sec25) [if Statements](#78624_3_En_2_Chapter.xhtml#Sec26)\
    \ [switch Statements](#78624_3_En_2_Chapter.xhtml#Sec27) [for Statements](#78624_3_En_2_Chapter.xhtml#Sec28)\
    \ [while Statements](#78624_3_En_2_Chapter.xhtml#Sec29) [Jump Statements](#78624_3_En_2_Chapter.xhtml#Sec30)\
    \ [Block-Structured Languages and the Scope of a Variable](#78624_3_En_2_Chapter.xhtml#Sec31)\
    \ [Printing to the Console Window](#78624_3_En_2_Chapter.xhtml#Sec32) [print vs.\
    \ println](#78624_3_En_2_Chapter.xhtml#Sec33) [Escape Sequences](#78624_3_En_2_Chapter.xhtml#Sec34)\
    \ [Elements of Java Style](#78624_3_En_2_Chapter.xhtml#Sec35) [Proper Use of Indentation](#78624_3_En_2_Chapter.xhtml#Sec36)\
    \ [Use Comments Wisely](#78624_3_En_2_Chapter.xhtml#Sec37) [Placement of Braces](#78624_3_En_2_Chapter.xhtml#Sec38)\
    \ [Descriptive Variable Names](#78624_3_En_2_Chapter.xhtml#Sec39) [Summary](#78624_3_En_2_Chapter.xhtml#Sec40)\n\
    \nWhat you’ll learn conceptually about objects in Part 1 of this book, and about\
    \ object modeling in Part 2, is language neutral and thus could apply equally\
    \ well to Java, Python, Ruby, or an as-yet-to-be-invented object-oriented (OO)\
    \ language. Before diving into the basics of objects in Chapter [3](#78624_3_En_3_Chapter.xhtml),\
    \ however, I’d like to spend some time getting you comfortable with the basics\
    \ of Java, as this is the programming language that I’ll use to illustrate object\
    \ concepts as they are introduced throughout the rest of this book.\n\nIn this\
    \ chapter, you’ll learn about\n\n*   The architecture-neutral nature of Java\n\
    *   The anatomy of a simple Java program\n*   The mechanics of compiling and running\
    \ such programs\n*   Primitive Java types, operators on those types, and expressions\
    \ formed with those types\n*   Java’s **block-structured** nature\n*   Various\
    \ types of Java **expressions**\n*   Loops and other flow control structures\n\
    *   Printing messages to the command window from which a program was launched,\
    \ which is especially useful for testing code as it evolves\n*   Elements of Java\
    \ programming style"
