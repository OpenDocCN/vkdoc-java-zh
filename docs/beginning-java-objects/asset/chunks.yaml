    contains the word foobar and has a thread tied to it with the label x at the tip.
    The second balloon is labeled "foo" and is located above the foobar balloon, with
    the thread crossing at the bottom.


    Figure 13-9


    When we assign a new value to `String` reference `x`, we’re actually instantiating
    a new `String` object


    While the net result is the same from the programmer’s perspective`—`namely, that
    the value of `x` will now be “`Foobar!`” as far as we’re concerned


    ```

    System.out.println(x);

    ```


    Output:


    ```

    Foobar!

    ```


