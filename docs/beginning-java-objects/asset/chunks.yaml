    ### if 语句


    `if` 语句是一种基本的条件分支语句，当以逻辑表达式表示的条件满足时，会执行一行或多行代码。或者，可以通过将代码放在关键字 `else` 之后，在条件***不***满足时执行一行或多行代码。在
    `if` 语句中使用 `else` 子句是可选的。


    `if` 语句的基本语法如下：


    ```

    // 伪代码。

    if (逻辑表达式) {

    如果逻辑表达式求值为真，则执行这些花括号内的任何代码

    }

    ```


    或者添加一个可选的 `else` 子句：


    ```

    // 伪代码。

    if (逻辑表达式) {

    如果逻辑表达式求值为真，则执行这些花括号内的任何代码

    }

    else {

    如果逻辑表达式求值为假，则执行这些花括号内的任何代码

    }

    ```


    如果 `if` 或（可选的）`else` 关键字后面只跟一条可执行语句，则可以省略花括号，如下所示：


    ```

    // 伪代码。

    if (逻辑表达式) 如果逻辑表达式为真则执行的单条语句;

    else 如果逻辑表达式为假则执行的单条语句;

    ```


    例如：


    ```

    if (x > 3) y = x;

    else z = x;

    ```


    或者，可以插入可选的换行符：


    ```

    if (x > 3)

    y = x;

    else

    z = x;

    ```


    但通常认为始终使用花括号是一种良好的实践，如下所示：


    ```

    if (x > 3) {

    y = x;

    }

    else {

    z = x;

    }

    ```


    一个简单的 `boolean` 变量，作为布尔表达式的一种简单形式，可以作为 `if` 语句的逻辑表达式/条件。例如，编写以下代码是完全可接受的：


    ```

    // 使用布尔变量 "finished" 作为标志，当某个特定操作完成时，该标志将被设置为 true。

    boolean finished;

    // 将其初始化为 false。

    finished = false;

    // 中间代码的细节（其中该标志可能被设置为 true，也可能不被设置）已被省略...

    // 测试该标志。

    if (finished) { // 等价于：if (finished == true) {

    System.out.println("我们完成了！  :o)");

    }

    ```


    `!`（“非”）运算符可用于对逻辑表达式取反，这样当表达式求值为 `false` 时，与 `if` 语句关联的代码块反而会被执行：


    ```

    if (!finished) { // 等价于：if (finished == false)

    System.out.println("我们还没有完成 ... :op");

    }

    ```


    当测试两个表达式是否相等时，请记住我们必须使用***两个***连续的等号，而不是一个：


    ```

    if (x == 3) { // 注意使用双等号 (==) 来测试相等性。

    y = x;

    }

    ```


    Java 初学者（尤其是那些之前用 C 或 C++ 编程过的人）常犯的一个错误是尝试使用***单个***等号来测试相等性，如下例所示：


    `// 注意下面错误地使用了单等号。`


    `if (x = 3) {`


    `y = x;`


    `}`


    在 Java 中，`if` 测试必须基于有效的***逻辑***表达式；`x = 3` 不是一个逻辑表达式，而是一个***赋值***表达式。事实上，上述 `if`
    语句在 Java 中甚至无法编译，而它在 C 和 C++ 编程语言中***却***可以编译，因为在那些语言中，`if` 测试是基于将表达式求值为***整数***值
    0（解释为 `false`）或非零值（解释为 `true`）。


    可以嵌套 `if-else` 结构来测试多个条件。如果嵌套，内部的 `if`（加上可选的 `else`）语句会被放置在外层 `if` 的 `if` 部分或
    `else` 部分中。以下是两层嵌套 `if-else` 结构的一种常见语法：


    ```

    if (逻辑表达式-1) {

    执行此代码

    }

    else {

    if (逻辑表达式-2) {

    执行此替代代码

    }

    else {

    如果以上两个表达式都不为真，则执行此代码

    }

    }

    ```


    可以使用的嵌套 `if-else` 结构的数量没有限制，但如果嵌套过深，代码可能会变得难以让人类读者理解和维护。


    前面示例中展示的嵌套 `if` 语句也可以不使用嵌套来编写，如下所示：


    ```

    if (逻辑表达式-1) {

    执行此代码

    }

    else if (逻辑表达式-2) {

    执行此替代代码

    }

    else {

    如果以上两个表达式都不为真，则执行此代码

    }

    ```


    请注意，这两种形式在逻辑上是等价的。


    ### switch 语句


    `switch` 语句类似于 `if-else` 结构，因为它允许有条件地执行一行或多行代码。然而，与 `if-else` 结构评估逻辑表达式不同，`switch`
    语句将一个表达式的值与一个或多个 `case` 标签定义的值进行比较。如果找到匹配项，则执行匹配的 `case` 标签后面的代码。可以包含一个可选的 `default`
    标签，用于定义当表达式与***任何*** `case` 标签都不匹配时要执行的代码。


    `switch` 语句的一般语法如下：


    ```

    switch (int 或 char 表达式) {

    case 值 1:

    如果表达式的值与值 1 匹配，则执行一行或多行代码

    break;

    case 值 2:

    如果表达式的值与值 2 匹配，则执行一行或多行代码

    break;

    // 根据需要添加更多 case 标签 ...

    case 值 N:

    如果表达式的值与值 N 匹配，则执行一行或多行代码

    break;

    default:

    如果没有 case 匹配，则执行默认代码

    }

    ```


    例如：


    ```

    // 假设 x 之前已被声明为 int 类型。

    switch (x) {

    case 1:  // 如果 x 等于 1 则执行

    System.out.println("一 ...");

    break;

    case 2:  // 如果 x 等于 2 则执行

    System.out.println("二 ...");

    break;

    default:  // 如果 x 的值不是 1 或 2 则执行

    System.out.println("既不是一也不是二 ...");

    }

    ```


    请注意以下几点：


    *   `switch` 关键字后面括号中的表达式必须是一个求值为 `char` 或 `int` 值的表达式（或者，正如我们将在本书后面学到的，也可以是其他几种特殊的表达式类型）。


    *   `case` 标签后面的值必须是常量 `char` 或 `int` 值（或者，正如我们将在本书后面学到的，也可以是其他几种特殊的表达式类型）。


    *   `break;` 语句使得 `switch` 在给定的 `case` 执行完毕后停止执行；执行将从 `switch` 语句的结束花括号 `}` 之后继续。


    *   使用冒号（`:`）而不是分号（`;`）来终止 `case` 和 `default` 标签。


    *   给定 `case` 标签后面的语句不必用花括号括起来。它们构成一个**语句列表**，而不是一个代码块。


    与 `if` 语句不同，`switch` 语句在找到匹配项并执行匹配的 `case` 标签后面的代码时不会自动终止。要退出 `switch` 语句，必须使用
    `break` 语句。如果在给定的 `case` 标签后面没有包含 `break` 语句，执行将会“穿透”到下一个 `case` 或 `default` 标签。这种行为可以被我们利用：当多个
    `case` 标签需要执行相同的逻辑时，可以将两个或多个 `case` 标签背靠背堆叠起来，如下所示：


    ```

    // 假设 x 之前已被声明为 int 类型

    switch (x) {

    case 1:

    如果 x 等于 1 则执行的代码

    case 2:

    如果 x 等于 1 或 2 则执行的代码

    case 3:

    如果 x 等于 1、2 或 3 则执行的代码

    break;

    case 4:

    如果 x 等于 4 则执行的代码

    }

    ```

