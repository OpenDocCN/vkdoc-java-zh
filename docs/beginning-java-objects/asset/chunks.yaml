  trans: "\n当学生首次在大学注册时，他们会使用 SRS 制定学习计划，说明计划修读哪些课程以满足特定学位项目的要求，并选择一位指导老师。SRS 将验证所提议的学习计划是否满足学生所寻求学位的要求。学习计划确定后，在每个学期前的注册期间，学生可以在线查看课程安排，并选择他们希望参加的课程。如果某门课程由多位教授授课，学生还需指明首选的分班（星期几和具体时间）。SRS\
    \ 将通过查阅学生在线成绩单（学生可随时在线查看成绩单）中已完成的课程和所获成绩，来验证学生是否已满足每门申请课程的必要先修条件。\n\n假设满足以下条件：(a)\
    \ 所申请课程的先修条件已满足，(b) 课程符合学生的学习计划要求，且 (c) 每门课程均有空余名额，则学生将被注册到该课程。\n\n如果 (a) 和 (b)\
    \ 满足，但 (c) 不满足，学生将被列入先到先得的等候名单。如果之前被列入等候名单的课程/分班出现空位（无论是由于其他学生退课，还是课程容量增加），学生将自动注册到该等候课程，并会收到一封相关通知邮件。如果学生不再需要该课程，则有责任自行退课；否则，他们将需要支付该课程的费用。\n\
    \n## 本章小结\n\n在本章中，你已了解到：\n\n*   **抽象**是人们感知世界所使用的一项基本技术。\n\n*   对需要自动化的**问题**进行抽象是所有软件开发必要的第一步。\n\
    \n*   我们根据精心构建的规则，自然地**将信息组织成分类层次结构**，这些规则既不过于笼统，也不过于严格。\n\n*   在尝试建模新概念时，我们经常**重用已有的抽象**。\n\
    \n*   对将要构建的系统进行抽象（即创建**模型**），在某种意义上是我们与生俱来的能力，但矛盾的是，这也是软件开发人员在信息系统项目生命周期中必须完成的最困难的任务之一。同时，这也是最重要的任务之一。\n\
    \n练习\n\n1.  选择一个你希望从面向对象角度进行建模的问题领域。理想情况下，这将是你实际工作中将要处理的问题，或者是你非常感兴趣的问题。假设你将编写一个程序来自动化该问题领域的某些方面，并仿照\
    \ SRS 案例研究，撰写一页纸的程序需求概述。\n\n    确保你的第一段总结了系统的意图，就像 SRS 案例研究的第一段那样。同时，要强调***功能需求***——即非技术最终用户可能陈述的系统行为方式——并避免陈述***技术需求***，例如“该系统必须运行在\
    \ Unix 平台上，并且必须使用 TCP/IP 协议来……”\n\n2.  阅读附录中的处方跟踪系统（PTS）案例研究。你认为这个案例研究作为一项抽象的效果如何？是否有你认为可以省略的细节，或者你认为重要但缺失的细节？如果你有机会采访\
    \ PTS 的预期用户，你可能会问他们哪些额外的问题，以更好地完善这一抽象？\n\n1.  绘制一个类层次结构草图，以合理的方式关联以下所有类：\n\n \
    \   苹果\n\n    香蕉\n\n    牛肉\n\n    饮料\n\n    奶酪\n\n    可食用品\n\n    乳制品\n\n    食物\n\
    \n    水果\n\n    青豆\n\n    肉类\n\n    牛奶\n\n    猪肉\n\n    菠菜\n\n    蔬菜\n\n    证明你的答案，并特别说明在此过程中遇到的任何挑战。\n\
    \n2.  从以下不同视角来看，电视机的哪些方面是需要重点抽象的？\n    *   想要购买电视机的消费者？\n    *   负责设计电视机的工程师？\n\
    \    *   销售电视机的零售商？\n    *   电视机制造商？\n\n# 2. Java 基础入门\n\nJava 的体系结构中立性 简单 Java\
    \ 程序的结构 注释 类声明 main 方法 搭建简单的 Java 开发环境 Java 的运行机制 将 Java 源代码编译为字节码 执行字节码 基本数据类型\
    \ 变量 变量命名规范 变量初始化 String 类型 大小写敏感性 Java 表达式 算术运算符 关系运算符和逻辑运算符 表达式求值与运算符优先级 表达式的类型\
    \ 自动类型转换与显式强制转换 循环及其他流程控制结构 if 语句 switch 语句 for 语句 while 语句 跳转语句 块结构语言与变量的作用域\
    \ 向控制台窗口输出信息 print 与 println 的区别 转义序列 Java 编程风格要素 正确使用缩进 明智地使用注释 花括号的放置 描述性变量名\
    \ 本章小结\n\n你在本书第一部分中关于对象的概念性学习，以及在第二部分中关于对象建模的学习，都是与语言无关的，因此同样适用于 Java、Python、Ruby\
    \ 或任何尚未发明的面向对象（OO）语言。然而，在深入第三章的对象基础知识之前，我想花些时间让你熟悉 Java 的基础知识，因为本书后续章节将使用 Java\
    \ 编程语言来阐述对象概念。\n\n在本章中，你将学习：\n\n*   Java 的体系结构中立特性\n*   简单 Java 程序的结构\n*   编译和运行此类程序的机制\n\
    *   Java 的基本数据类型、针对这些类型的运算符，以及使用这些类型构成的表达式\n*   Java 的**块结构**特性\n*   各种类型的 Java**表达式**\n\
    *   循环及其他流程控制结构\n*   向启动程序的命令窗口输出消息（这对于在代码演进过程中进行测试尤其有用）\n*   Java 编程风格要素\n"
- fmt: '# Java Is Architecture Neutral


    To execute a program written in a conventionally compiled language like C or C++,
    the source code must first be compiled into an executable form known as **binary
    code** or **machine code**. Binary code, in essence, is a pattern of 1s and 0s
    understandable by the underlying **hardware architecture** of the computer on
    which the program is intended to run.


    Even if original C or C++ source code is written to be **platform independent**—that
    is, the program does not take advantage of any platform-specific language extensions
    such as a specific type of file access or graphical user interface (GUI) manipulation—the
    resultant executable version will nonetheless still be tied to a particular platform’s
    architecture and can therefore be run on only that architecture. That is, a version
    of the program compiled for a Linux workstation will not run on a Windows PC,
    a version compiled for a Windows PC will not run on a macOS machine, and so forth.
    This concept is depicted in Figure [2-1](#78624_3_En_2_Chapter.xhtml#Fig1).


    ![](images/78624_3_En_2_Chapter/78624_3_En_2_Fig1_HTML.jpg)


    A flow diagram of the platform-independent C source code. It is divided into C
    compilers for Windows, Linux, and Sun Solaris. Each of them yields platform-dependent
    binary code.


    Figure 2-1


    Conventionally compiled languages yield platform-dependent executable programs


    In contrast, Java source code is not compiled for a particular platform, but rather
    into a special intermediate format known as **bytecode**, which is said to be
    both platform independent and **architecture neutral**. That is, no matter whether
    a Java program is compiled under Windows, Linux, macOS, or any other operating
    system for which a Java compiler is available, the resultant bytecode turns out
    to be the same and hence can be run on any computer for which a (platform-***specific***)
    Java Virtual Machine (JVM) is available. This is illustrated in Figure [2-2](#78624_3_En_2_Chapter.xhtml#Fig2).


    ![](images/78624_3_En_2_Chapter/78624_3_En_2_Fig2_HTML.jpg)


    A flow diagram of the platform-independent Java source code. It is divided into
    Java compilers for Windows, Linux, and Sun Solaris. Each of them yields platform-independent
    bytecodes.


    Figure 2-2


    The Java compiler yields platform-independent bytecode


    The JVM is a special piece of software that knows how to **interpret** and execute
    Java bytecode. That is, instead of a Java program running directly under the control
    of the operating system the way traditionally compiled programs do, the JVM itself
    runs under direct control of the operating system, and our Java program in turn
    runs under control of the JVM, as illustrated in Figure [2-3](#78624_3_En_2_Chapter.xhtml#Fig3).
    The JVM in essence serves as a translator, translating the universal Java bytecode
    “language” into the machine code (binary code) “language” that a particular computer
    can understand, in the same way that a human interpreter facilitates a discussion
    between someone speaking German and someone speaking Japanese by translating their
    statements as they converse.


    ![](images/78624_3_En_2_Chapter/78624_3_En_2_Fig3_HTML.jpg)


    An illustration of a computer with two sections on either side. On the left is
    compiled binary code produced for C or C plus plus. On the right is a platform-dependent
    J V M which runs directly under the hardware architecture. It leads to the interpreted
    java bytecode.


    Figure 2-3


    A platform-dependent JVM is used to execute platform-independent bytecode


    The interpreted nature of the Java language tends to make it execute a tiny bit
    slower, in general, than compiled languages because there is an extra processing
    layer involved when an application executes, as illustrated in Figure [2-3](#78624_3_En_2_Chapter.xhtml#Fig3).
    For traditional information systems applications that involve a human user in
    the loop, however, the difference in speed is imperceptible; other factors, such
    as the speed of the network (in the case of distributed applications), the speed
    of a DBMS server (if a database is used), and especially human “think time” while
    responding to an application’s user interface, can cause any JVM response time
    delays to pale by comparison.


    As long as you have the appropriate JVM installed on a given target platform,
    you can transfer Java bytecode from one platform to another without recompiling
    the original Java source code, and it will still be able to run. That is, bytecode
    is transferable across platforms, as illustrated in Figure [2-4](#78624_3_En_2_Chapter.xhtml#Fig4).


    ![](images/78624_3_En_2_Chapter/78624_3_En_2_Fig4_HTML.jpg)


    Two illustrations of a computer and a laptop A and B on either side. On the left
    is platform-dependent J V M for platform A, and on the right is platform-dependent
    J V M for platform B with their identical bytecodes below.


    Figure 2-4


    The exact same bytecode is understood by JVMs on two different platforms


    ## Pseudocode VS. Real Java Code


    I occasionally use little bits of pseudocode in the code examples throughout Parts
    1 and 2 of this book to hide irrelevant logic details. To make it clear as to
    when I’m using pseudocode rather than real code, I use *italic* rather than `regular
    SansMono condensed font`.


    This is real Java syntax:


    ```

    for (int i = 0; i <= 10; i++) {

    ```


    This is pseudocode:


    ```

    compute the grade for the ith Student

    }

    ```


    I’ll remind you of this fact a few more times, so that you don’t forget and accidentally
    try to type in and compile pseudocode somewhere along the way.


    ## Anatomy of a Simple Java Program


    Figure [2-5](#78624_3_En_2_Chapter.xhtml#Fig5) shows one of the simplest of all
    Java programs.


    ![](images/78624_3_En_2_Chapter/78624_3_En_2_Fig5_HTML.jpg)


    A java program structure with 3 sections introductory comment, class declaration,
    and the main method. The main method lies inside the class declaration box.


    Figure 2-5


    Anatomy of a simple Java program


    Let’s go over the key elements of our simple program.


    ### Comments


    The first thing we see in our simple Java program is an introductory comment:


    ```

    // This simple program illustrates some basic Java syntax.

    ```


    Java supports three different comment styles: traditional, end-of-line, and Java
    documentation comments.'
