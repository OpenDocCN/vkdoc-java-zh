  trans: '

    #### 传统注释


    Java **传统注释**源自 C 语言，以斜杠后跟星号（`/*`）开头，以星号后跟斜杠（`*/`）结尾。这两个分隔符之间的所有内容都被视为注释，因此会被
    Java 编译器忽略，无论注释跨越多行：


    ```

    /* 这是一个传统（C 风格）注释。 */

    /* 这是一个多行传统注释。这是一种临时注释掉整段代码的便捷方法，

    无需删除它们。从编译器遇到上面的第一个“斜杠星号”开始，

    它就不在乎我们在这里输入什么；即使是合法的代码行，

    如下所示，也会被视为注释行，因此被编译器忽略，直到遇到第一个“星号斜杠”组合。

    x = y + z;

    a = b / c;

    j = s + c + f;

    */

    /* 我们经常在传统注释的第二行到最后一行使用前导星号，

    * 纯粹是为了美观，使注释在视觉上更醒目；

    * 但这些额外的星号严格来说是装饰性的——只有

    * 开头的“斜杠星号”和结尾的“星号斜杠”才会被编译器视为有意义。

    */

    ```


    请注意，我们不能***嵌套***块注释——也就是说，以下代码将***无法***编译：


    ```

    /* 这里开始一个注释 ...

    x = 3;

    /* 哎呀！我们错误地试图在终止第一个注释之前

    嵌套第二个注释！

    这会导致编译问题，因为

    编译器会忽略这个第二个/内部注释的开始——毕竟我们已经在

    一个注释中了！——所以一旦我们试图终止

    这个第二个/内部注释，编译器会认为我们已经终止了

    第一个/外部注释…… */

    z = 2;

    // 编译器会在下一行“报错”。

    */

    ```


    当编译器到达我们本意是“外部”注释最后一行的终止符`*/`时，会报告以下两个编译错误：


    ```

    非法的表达式开始

    */

    ^

    ```


    以及


    ```

    需要 '';''

    */

    ^

    ```


    #### 行尾注释


    第二种 Java 注释源自 C++，被称为**行尾注释**。我们使用双斜杠（`//`）来表示注释的开始，该注释在到达行尾时自动结束，如下所示：


    ```

    x = y + z;   // 注释文本一直延续到行尾 ==>

    a = b / c;

    // 这里是一块连续的行尾注释。

    // 这是使用传统注释（/* ... */）的一种替代方案，

    // 并且受到许多 Java 程序员的青睐。

    m = n * p;

    ```


    #### Java 文档注释


    第三种也是最后一种 Java 注释，**Java 文档注释**（也称为 **“javadoc 注释”** ），可以被一个特殊的 `javadoc` 命令行实用程序（随
    Java 开发工具包[JDK]标准提供）从源代码文件中解析，并用于自动生成应用程序的 HTML 文档。


    我们将把对 javadoc 注释的深入探讨推迟到第 13 章。


    ### 类声明


    接下来是一个**类包装器**——更准确地说是**类声明**——其形式为


    ```

    public class ClassName {

    ...

    }

    ```


    例如：


    ```

    public class SimpleProgram {

    ...

    }

    ```


    其中花括号 `{ ... }` 包围着**类体**，类体包含程序的主要逻辑以及类的其他可选构建块。


    在后续章节中，你将了解类在面向对象编程语言中的所有重要意义。现在，只需注意符号 `public` 和 `class` 是 Java 的两个**关键字**——即
    Java 语言中保留用于特定用途的符号——而 `SimpleProgram` 是我发明的一个名称/符号。


    ### main 方法


    在 `SimpleProgram` 类声明中，我们找到了程序的起点，在 Java 中称为**main 方法**。（在面向对象语言中，函数被称为**方法**。）`main`
    方法充当 Java 应用程序的入口点。当我们通过 JVM 实例解释其字节码来执行 Java 程序时，JVM 会调用 `main` 方法来启动我们的应用程序。


    对于像 `SimpleProgram` 示例这样简单的应用程序，所有程序逻辑都可以包含在这个单一的 `main` 方法中。另一方面，对于更复杂的应用程序，`main`
    方法不可能包含整个系统的所有逻辑。你将在本书稍后部分学习如何构建一个超越 `main` 方法界限的应用程序，涉及多个 Java 源代码文件/类。


    该方法的第一行如下所示


    ```

    public static void main(String[] args) {

    ```


    定义了所谓的 `main` 方法的**方法头**，并且应该完全按照所示形式出现（目前如此——我们将在第 13 章再次讨论此主题）。


    我们的 `main` 方法的**方法体**，由花括号 `{ ... }` 包围，包含一条语句：


    ```

    System.out.println("Hello!");

    ```


    该语句将消息


    ```

    Hello!

    ```


    打印到启动我们程序的命令窗口。我们稍后将进一步检查此语句的语法，但现在请注意语句末尾使用的分号（`;`）。所有独立的 Java 语句末尾都放置分号。而花括号
    `{ ... }` 则界定代码**块**，我将在本章稍后部分更详细地讨论其重要性。


    在更复杂的程序中，我们通常在 `main` 方法内部执行的其他操作包括声明变量、初始化数据、显示用户界面、创建对象以及调用其他方法。


    现在我们已经了解了简单 Java 程序的结构，接下来为你设置一个非常简单的 Java 开发环境。


    ## 设置简单的 Java 开发环境


    对于刚开始学习 Java 编程的人来说，我建议首先使用简单的文本编辑器，这样你就不会被特定 IDE 的花哨功能分散注意力，并且 IDE 也不会为你做太多工作，以至于你无法真正了解最底层发生了什么。话虽如此，一个能理解
    Java 语法的编辑器肯定是有帮助的，因此我个人推荐一个非常便宜的工具叫 TextPad，可在 [`www.textpad.com/home`](http://www.textpad.com/home)
    获取。


    安装好 TextPad 或选择其他你喜欢的简单文本编辑器后，就该安装 Java 开发环境了。由于供应商的说明经常变化，我们提供分步说明并不实际；在本书撰写时，最新的说明可以在
    Oracle 的网站上找到，网址为 [`https://docs.oracle.com/en/java/javase/18/install`](https://docs.oracle.com/en/java/javase/18/install)。如果此链接已过时，请在
    doc.oracle.com 网站上搜索最新版本的 Java 平台标准版 JDK 安装指南。


    一旦你的 Java 开发环境启动并运行，让我们来看看 Java 代码是如何编译和执行的。


    ## Java 的机制


    无论平台如何，编译和执行 Java 程序最简单的方法是通过命令行命令。

