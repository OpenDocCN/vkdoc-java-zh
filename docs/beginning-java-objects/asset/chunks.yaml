- fmt: '### Import Directives and Packages


    Our example program starts out with an **import directive**, which precedes the
    `ArrayListExample` class declaration:


    ```

    import java.util.*;

    public class ArrayListExample { ... }

    ```


    When we originally discussed Java program anatomy in Chapter [2](#78624_3_En_2_Chapter.xhtml),
    we skipped this optional yet key element. I’ve revised the anatomy figure from
    Chapter [2](#78624_3_En_2_Chapter.xhtml) to include `import` directives, as shown
    in Figure [6-9](#78624_3_En_6_Chapter.xhtml#Fig9).


    ![](images/78624_3_En_6_Chapter/78624_3_En_6_Fig9_HTML.jpg)


    3 blocks of java codes labeled introductory comment, optional import statements,
    and class wrapper with the main method. The codes include import java, public
    class simple, and public static void main, among others.


    **Figure 6-9** Anatomy of a Java program including import directives


    To appreciate `import` directives, you first must understand the notion of Java
    **packages**. Because the Java language is so extensive, its various predefined
    classes are organized into logical groupings called packages. For example, we
    have:


    - `java.io`: This package contains classes related to file input/output.

    - `java.util`: This package contains a number of utility classes, such as the
    Java collection classes that you’re learning about in this chapter.

    - `java.sql`: This package contains classes related to communicating with relational
    databases.

    - And so forth.


    Most built-in Java package names start with `java`, but there are some that start
    with other prefixes, like `javax`. And, if we acquire Java classes from a third
    party, they typically come in a package that starts with the organization’s (unique)
    domain name, reversed. For example, an organization with a domain name of `xyz.com`
    would typically name their packages `com.xyz.packagename`, where `packagename`
    describes the logical purpose of the classes included in the package (e.g., `com.xyz.accounting`).
    By using unique domain names as the basis for package names, we ensure that no
    two organizations’ package names will ever duplicate one another; this is important
    whenever we incorporate packages from more than one organization in the **same**
    application.


    The built-in package named `java.lang` contains the absolute **core** of the Java
    language, and the classes contained within that package—for example, `Math`, `System`,
    and `String`—are always available to both the Java compiler and the JVM whenever
    we compile/run Java programs, so we needn’t worry about importing `java.lang`.
    However, if we wish to reference the name of any other predefined class that isn’t
    contained within the `java.lang` package—`ArrayList`, for example—then we must
    **import** the package to which the class belongs, as we did with the `java.util`
    package in our example program:


    ```

    // Our code needs to refer to the predefined ArrayList class as a type, and since

    // the ArrayList class isn''t included in the "core" java.lang package, we must

    // import the package that defines what an ArrayList is.

    import java.util.*;

    public class ArrayListExample { ... }

    ```


    The asterisk (`*`) at the end of the `import` directive informs the Java compiler
    that we wish to import **all** of the classes contained within the `java.util`
    package. As an alternative, we can import individual classes from within a package,
    as follows:


    ```

    // We can import individual classes by name, to better document where each class

    // that we are using originates.

    import java.util.ArrayList;

    import java.util.Date;

    import java.io.PrintWriter;

    // etc.

    public class SomeClass { ... }

    ```


    This approach, of course, requires more typing, but provides better traceability
    of where each class that we are using in our program originates. Either approach—listing
    individual classes to be imported one by one or using wildcards to import all
    classes in a package as a whole—is equally acceptable.


    As you’ll learn when we discuss the mechanics of the JVM in more detail in Chapter
    [13](#78624_3_En_13_Chapter.xhtml), neither approach is less efficient than the
    other at run time.


    If we were to accidentally omit the `import` directive of our `ArrayListExample`
    program, we’d get the following compilation error once for every occurrence of
    the symbol `ArrayList` in our code:


    ```

    cannot find symbol

    symbol: class ArrayList

    ```


    That is, our output from compiling the following code:


    ```

    // WHOOPS!  We''ve forgotten our import directive.

    public class ArrayListExample {

    public static void main(String[] args) {

    // Instantiate a collection.

    ArrayList students = new ArrayList();

    // Create a few Student objects.

    Student a = new Student("Herbie");

    Student b = new Student("Klem");

    Student c = new Student("James");

    // etc.

    }

    }

    ```


    would be as follows:


    ```

    ArrayListExample.java:6: cannot find symbol

    symbol  : class ArrayList

    location: class ArrayListExample

    ArrayList students = new ArrayList();

    ^

    ArrayListExample.java:6: cannot find symbol

    symbol  : class ArrayList

    location: class ArrayListExample

    ArrayList students = new ArrayList();

    ^

    2 errors

    ```


    This is because the symbol `ArrayList` is not automatically in the **namespace**
    of the class that we’re compiling—that is, it’s not one of the names/symbols that
    the Java compiler recognizes in the context of that class.'
