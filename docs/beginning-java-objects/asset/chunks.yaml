    表示 `Manager` 与 `Employee` 类之间的继承关系和关联关系


    ## 对象/实例图


    在描述对象如何交互时，我们有时会发现勾勒出特定对象及其链接的场景会很有帮助，为此我们会创建**对象图**，也称为**实例图**。实例（或对象）在 UML 表示法中与类非常相似，主要区别在于：


    ![](img/78624_3_En_10_Fig36_HTML.png)


    一个矩形框内写着：joe blow : student


    图 10-36


    表示一个对象


    *   我们通常同时提供对象的名称和类型，两者之间用冒号分隔。我们为文本添加下划线，以强调这是一个对象，而不是一个类（见图 10-36）。


    ![](img/78624_3_En_10_Fig37_HTML.png)


    一个文本框代表一个矩形框，内部标注为 student x。框内文字为：类名被省略，因为对象名暗示了其类型。


    图 10-37


    如果类名显而易见，我们可以省略它


    *   如果对象的类型从其名称中显而易见，则可以省略；例如，名称“student x”暗示该对象属于 `Student` 类（见图 10-37）。


    ![](img/78624_3_En_10_Fig38_HTML.png)


    一个文本框代表一个矩形框，内部标注为 : student。框内文字为：匿名学生对象，未提供名称。


    图 10-38


    表示一个匿名对象


    *   或者，如果我们想引用某个给定类型的“通用”对象，则可以省略对象名称；这种对象被称为**匿名对象**。请注意，在这种情况下，我们必须在类名前加上冒号（:）（见图
    10-38）。


    因此，如果我们想表示一位 `Professor` 类型的布朗博士是三位 `Student` 的导师，我们可以创建如图 10-39 所示的对象图。


    ![](img/78624_3_En_10_Fig39_HTML.jpg)


    一个框图表示左侧有一个标注为 doctor brown : professor 的框。它连接到右侧三个表示 student 的框。连接教授和学生的线上写着
    advice。


    图 10-39


    布朗博士指导三名学生


    为了反映一名叫乔·布洛的 `Student` 本学期参加了两个 `Section`，其中一个 `Section` 也有一名叫玛丽·格林的 `Student`
    参加，我们可以创建图 10-40 中的图。


    ![](img/78624_3_En_10_Fig40_HTML.jpg)


    一个框图解释了名为乔·布洛的学生参加了两个部分：初级数学和中级艺术。另一名名为玛丽·格林的学生也参加了初级数学部分。


    图 10-40


    一个涉及多个对象的实例图


    ## 作为属性的关联


    给定图 10-41，它展示了关联“一个 `Course` *被提供为*一个 `Section`”，我们看到一个 `Course` 对象可以与多个不同的 `Section`
    对象相关联，但任何一个 `Section` 对象只能与***一个*** `Course` 对象相关联。


    ![](img/78624_3_En_10_Fig41_HTML.jpg)


    两个矩形框从左到右分别标注为 course 和 section，通过一条线连接。线上文字为 offered as，指向 section。


    图 10-41


    `Course` 和 `Section` 类之间的一对多关联


    回顾一下，两个对象相关联意味着什么？这意味着它们彼此持有“句柄”，以便能够轻松找到对方进行通信和协作，这是我们在第 4 章中详细讨论过的概念。如果我们仅根据图
    10-41 中的图来勾勒 `Course` 和 `Section` 类的属性，我们需要将这些句柄作为引用变量来考虑，如下所示：


    ```

    public class Section {

    // 属性。

    private Course represents;   // 指向单个相关 Course 对象的“句柄”

    // 等等。

    }

    public class Course {

    // 属性。

    private Collection<Section> offeredAs;   // 相关 Section 对象“句柄”的集合

    // 等等。

    }

    ```


    因此我们看到，在类图中，两个类 `A` 和 `B` 之间存在关联，意味着类 `A` ***可能*** 有一个属性声明为以下之一：


    *   对类型 `B` 的***单个***实例/对象的引用


    *   对类型 `B` 的***多个***对象引用的***集合***


    具体取决于所涉及的多重性，反之亦然。我说“可能”是因为，当我们实际开始编程这个应用程序时，我们可能希望也可能不希望双向编码这种关系，尽管在分析阶段所有关联都被假定为双向的。我们将在第
    14 章中讨论编码双向关系的利弊。


    由于关联线的存在意味着两个相关类中都有作为对象引用的属性，因此在各自类的属性区域中额外列出此类属性是不合适的（见图 10-42）。


    ![](img/78624_3_En_10_Fig42_HTML.jpg)


    一个图示表示两个矩形框。左侧框写着 course offered as collection。右侧框写着 section represents the course。中间的文字写着：不要冗余列出由关联隐含的属性。


    图 10-42


    冗余地将引用反映为属性是不合适的；关联的存在已经隐含了这些属性


    这是初学者常犯的错误。这样做带来的最大问题是使用 CASE 工具的代码生成功能时：如果属性在类的属性区域中显式列出，同时又由关联隐含，它可能会在生成的代码中出现***两次***，如下面的代码片段所示，该代码可能从图
    10-42 中错误的 UML 图生成：


    `public class Course {`


    `// 冗余属性在代码中生成。`


    ***Collection<Section>*** `offeredAs;   // 由于显式属性`


    ***Collection<Section>*** `offered_as;  // 由于关联`


    `// 等等。`


    `}`

