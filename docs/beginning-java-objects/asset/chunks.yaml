- fmt: "### Operations on Strings\n\nAs we learned in Chapter [2](#78624_3_En_2_Chapter.xhtml),\
    \ the plus sign (`+`) operator is used to concatenate `String` values:\n\n```\n\
    String x = \"foo\";\nString y = \"bar\";\nString z = x + y + \"!\";  // z assumes\
    \ the value \"foobar!\"\n```\n\nBut now that we appreciate the object nature of\
    \ `String`s, we can also take advantage of the numerous methods that are declared\
    \ by the `String` class for manipulating `String`s:\n\n- `int length()`: This\
    \ method, when applied to a `String` reference, returns the length of the `String`\
    \ as an integer:\n\n```\n// Continuing the previous example, where z equals \"\
    foobar!\":\nint len = z.length();  // len now equals 7\n```\n\n- `boolean startsWith(String\
    \ s)`: Returns `true` if the `String` to which this method is applied starts with\
    \ the `String` provided as an argument to the method and `false` otherwise:\n\n\
    ```\nString s = \"foobar\";\n// This will evaluate to true.\nif (s.startsWith(\"\
    foo\")) ...\n```\n\n- `boolean endsWith(String s)`: Returns `true` if the `String`\
    \ to which this method is applied ends with the `String` provided as an argument\
    \ to the method and `false` otherwise:\n\n```\nString s = \"foobar\";\n// This\
    \ will evaluate to true.\nif (s.endsWith(\"bar\")) ...\n```\n\n- `boolean contains(String\
    \ s)`: Returns `true` if the `String` to which this method is applied contains\
    \ the `String` provided as an argument to the method and `false` otherwise:\n\n\
    ```\nString s = \"foobar\";\n// This will evaluate to true.\nif (s.contains(\"\
    oo\")) ...\n```\n\n- `int indexOf(String s)`: Returns a non-negative integer value\
    \ indicating the starting character position (counting from 0) at which the `String`\
    \ provided as an argument is found within the `String` to which this method is\
    \ applied or a negative value (typically `-1`) if the `String` argument is not\
    \ found:\n\n```\nString s = \"foobar\";\nint i = s.indexOf(\"bar\");  // i will\
    \ equal 3\nint j = s.indexOf(\"cat\");  // j will equal -1\nint k = s.indexOf(\"\
    f\");    // k will equal 0\n```\n\n- `String replace(char old, char new)`: Creates\
    \ a brand-new `String` object in which all instances of the `old` character are\
    \ replaced with the `new` character — the original `String`'s value is unaffected:\n\
    \n```\nString s = \"o1o2o3o4\";\n// Note use of single quotes around characters\n\
    // vs. double quotes around Strings.\nString p = s.replace('o', 'x');   // p assumes\
    \ the value \"x1x2x3x4\", while\n// s retains the value \"o1o2o3o4\"\n```\n\n\
    - `String substring(int i)`: Creates a brand-new `String` object by copying a\
    \ substring of an existing `String` object starting at the `i`th position through\
    \ the end of the existing `String`:\n\n```\nString s = \"foobar\";\nString p =\
    \ s.substring(3); // p assumes the value \"bar\"\n```\n\n- `String substring(int\
    \ i, int j)`: Creates a brand-new `String` object by copying a substring of an\
    \ existing `String` object starting at the `i`th and stopping just ***before***\
    \ the `j`th position:\n\n```\nString s = \"foobar\";\nString p = s.substring(1,\
    \ 5);  // p assumes the value \"ooba\";\n```\n\n- `char charAt(int index)`: Returns\
    \ the `char`(acter) value located at the `i`th position within the `String`:\n\
    \n```\nString s = \"foobar\";\n// Iterate through a String character by character.\n\
    for (int i = 0; i < s.length(); i++) {\n    System.out.println(s.charAt(i));\n\
    }\n```\n\nOutput:\n\n```\nf\no\no\nb\na\nr\n```\n\n- `boolean equals(String)`:\
    \ Compares the value of the `String` object to which this method is applied with\
    \ the value of the `String` object whose reference is passed in as an argument;\
    \ returns `true` if the values are the same and `false` if they are not:\n\n```\n\
    String s = \"dog\";\nString t = \"cat\";\nString u = \"dog\";\n// This will evaluate\
    \ to true ...\nif (s.equals(u)) { ...\n// ... and this, to false.\nif (s.equals(t))\
    \ { ...\n```\n\nNote that we generally should ***avoid*** using the double equal\
    \ sign (`==`) operator to test the equality of two `String` objects' values; that\
    \ is, the following can yield seemingly inconsistent results, depending on how\
    \ we've instantiated `String` objects `s1` and `s2`:\n\n```\n// We generally want\
    \ to AVOID doing this ...\nif (s1 == s2) { ...\n```\n\nThis is because the `==`\
    \ operator, when used to compare reference types such as `String`s or `Person`s\
    \ or generic `Object`s, is actually comparing their ***addresses in memory***\
    \ to see if the two variables are referring to the ***same exact object***, as\
    \ illustrated in Figure [13-7](#78624_3_En_13_Chapter.xhtml#Fig7).\n\n![](images/78624_3_En_13_Chapter/78624_3_En_13_Fig7_HTML.jpg)\n\
    \nThe result depicts that the comparison `x == y` is true, as illustrated by the\
    \ balloon, and below it, the comparison `x == y` is false illustrated by two balloons.\n\
    \n**Figure 13-7** The result of evaluating `x == y` can vary depending on how\
    \ many `String` instances are involved\n\nWe'll revisit this notion for objects\
    \ in general, and for `String`s specifically, a bit later in the chapter."
