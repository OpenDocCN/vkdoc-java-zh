    The `ScheduleOfClasses` class is a fairly simple class that serves as an example
    of how we might wish to encapsulate a collection object within some other class.
    It consists of only two attributes: a simple `String` representing the semester
    for which the schedule is valid (e.g., “SP2005” for the Spring 2005 semester)
    and a `HashMap` used to maintain handles on all of the `Section`s that are being
    offered that semester:


    ```

    private String semester;

    // This HashMap stores Section object references, using

    // a String concatenation of course no. and section no. as the

    // key, for example, "MATH101 - 1".

    private HashMap sectionsOffered;

    ```


    Aside from a simple constructor, a `display` method, and `accessor` methods for
    the attributes, the `ScheduleOfClasses` class declares three relatively simple
    methods, as follows.


    #### addSection( )


    This method is used to add a `Section` object to the `HashMap` and then to bidirectionally
    link this `ScheduleOfClasses` object back to the `Section`:


    ```

    public void addSection(Section s) {

    // We formulate a key by concatenating the course no.

    // and section no., separated by a hyphen.

    String key = s.getRepresentedCourse().getCourseNo() +

    " - " + s.getSectionNo();

    sectionsOffered.put(key, s);

    // Bidirectionally link the ScheduleOfClasses back to the Section.

    s.setOfferedIn(this);

    }

    ```


    #### findSection( )


    This is a convenience method that is used to look up a `Section` in the encapsulated
    collection using the full section number that is passed in as the lookup key:


    ```

    // The full section number is a concatenation of the

    // course no. and section no., separated by a hyphen;

    // e.g., "ART101 - 1".

    public Section findSection(String fullSectionNo) {

    return sectionsOffered.get(fullSectionNo);

    }

    ```


    #### isEmpty( )


    This is another convenience method that is used to determine whether the encapsulated
    collection is empty. Internally, it delegates the work of making such a determination
    to the `sectionsOffered` collection:


    ```

