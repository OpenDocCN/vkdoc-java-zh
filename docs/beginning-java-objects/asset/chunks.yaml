  trans: '

    ##### 项目管理辅助工具


    许多 CASE 工具都提供某种形式的版本控制功能，使您能够维护同一模型的不同版本。如果您对模型进行了修改，但在与用户评审后决定恢复到之前的版本，只要启用了版本控制，操作起来就非常简单。


    CASE 工具通常还提供配置管理/团队协作功能，使一组建模人员能够轻松共享并共同创建单个模型。


    #### 使用 CASE 工具的一些缺点


    然而，CASE 工具并非没有缺点：


    *   ***CASE 工具可能价格昂贵***。高端 CASE 工具每个“席位”花费数百甚至数千美元的情况并不少见。***好消息是***，近年来，正如本章前面提到的，许多共享/免费的
    UML 建模工具已经出现。


    *   ***CASE 工具有时可能不够灵活***。我在本书第二部分讨论了如何根据自身需求调整流程、符号和工具，但工具并不总是配合。在接下来的章节中，我会指出一些具体例子，说明在
    CASE 工具允许的情况下，你可能希望稍微调整符号。


    *   ***你可能会面临被“锁定”在特定供应商产品中的风险***，如果所讨论的 CASE 工具无法以供应商中立的方式（例如，作为 XML）导出你的模型。


    *   ***很容易陷入重形式轻实质的误区***！这对于任何自动化工具都是如此——即使是文字处理器也往往诱使人们在文档的外观上花费过多时间，而在实质性内容早已稳固之后仍如此。


    但总的来说，使用面向对象 CASE 工具的利远大于弊——请将这些弊端视为“明智之言”，指导你如何成功地将此类工具应用于建模工作。


    ### 提醒


    尽管我在本书中已经多次提到，但仍有必要提醒您：对象建模的过程是***语言无关的***。我在本书第一部分介绍了 Java 语法，因为最终目标是让你熟悉对象建模和
    Java 编程。然而，在本书第二部分，我们将逐渐脱离 Java，因为我们现在所处的阶段，你将要学习的概念同样适用于 Java、Python、C#或任何其他面向对象编程语言。但别担心——我们将在第三部分“重磅”回归
    Java。


    ## 总结


    到目前为止，从本章中需要汲取的最重要教训如下：


    ***不要陷入重形式轻实质的误区！***


    你生成的模型只是达到目的的一种手段……而你用来生成模型的流程、符号和工具只是达到这一目的的***手段***的手段。如果你过于纠结使用哪种符号、流程或工具，你可能会陷入“分析瘫痪”而原地打转。不要忘记你的最终目标：构建***可用、灵活、可维护、可靠、功能正确的软件系统。***


    练习题


    1.  简要描述你在最近一个软件开发项目中使用的**方法论**——包括流程、符号和工具。这种方法论的哪些方面对你和你的队友效果良好？事后看来，你认为哪些方面本可以更有效地处理？


    2.  研究本章前面“建模方法论 = 流程 + 符号 + 工具”部分提到的其中一种对象建模技术/方法，并简要报告所涉及的流程、符号和工具。


    # 9. 通过用例形式化需求


    什么是用例？ 功能性需求与技术性需求 让用户参与 参与者 识别参与者并确定其角色 绘制系统及其参与者图 详细说明用例 将用例与参与者匹配 画图还是不画图？
    总结


    当你准备出发去度假时，你可能会在脑海中或纸上列一个清单，以确保为出发做好了充分准备。你带齐了所有需要带的东西吗？你带得***太多***了吗？你安排好了暂停相关服务（报纸、邮件投递等）吗？你安排好人给植物浇水、喂宠物鼠了吗？一旦踏上旅途，你希望享受旅程，并知道当你回到家时，不会有任何灾难在等着你。


    这与软件开发项目并无不同：在着手开发之前，我们需要整理一份系统必须提供的功能清单，以便项目顺利进行，并确保在系统交付时不会造成灾难（以未满足的需求和不满意的客户/用户的形式出现）。


    需求分析的艺术与科学——因为它确实两者皆是！——是一个如此广泛的课题，以至于可以专门用一整本书来讨论。有一种特别的技术用于发现和完善需求，称为**用例建模**，它是
    Rational 统一过程（RUP）的基石，值得你考虑。用例并非严格意义上的面向对象方法论的产物；它们可以为任何软件系统准备，无论将使用何种开发方法论。然而，它们是在对象系统的背景下首次出现在软件开发社区中，并在此背景下获得了广泛普及。


    在本章中，你将学习


    *   我们必须如何预见用户在与我们未来系统交互时将扮演的所有不同角色


    *   我们必须站在每个用户的角度来描述软件应用程序作为一个整体需要提供的服务


    *   如何准备用例，以此记录所有用户的集体需求


    我还会为你提供关于需求分析的足够背景知识，以便为用例建模提供合适的上下文。


    ## 什么是用例？


    在确定系统所需的功能时，我们必须寻求以下问题的答案：


    *   ***谁***（按用户类别划分）会想要使用我们的系统？


    *   系统需要提供哪些***服务***才能对每类用户有价值？


    *   当用户出于特定目的与系统交互时，他们对***期望结果***的预期是什么？


    **用例**是表达这些问题答案的自然方式。每个用例都是一个简单的陈述，可以是叙述性或图形化的形式，描述系统的特定目标或结果以及谁期望该结果。例如，SRS 的一个目标是“使学生用户能够注册课程”，这样我们就表达了第一个用例！（是的，用例确实就是这么直接。事实上，我们***需要***它们如此直接，以便系统的用户/赞助商能够理解，我们稍后会进一步讨论这一点。）

    '
- fmt: '### Functional vs. Technical Requirements


    The purpose of thinking through all of the use cases for a system is to explore
    the system’s functional requirements thoroughly, so as to make sure that a particular
    category of user, or potential purpose for the system, isn’t overlooked. We differentiate
    between functional requirements and technical requirements as follows.


    **Functional requirements** are those aspects of a system that have to do with
    how it is to operate or function from the perspective of someone using the system.
    Functional requirements may in turn be subdivided into:


    - **“Goal-oriented” functional requirements**: These provide a statement of a
    system’s purpose without regard to how the requirement will “play out” from the
    user’s vantage point—for example, “The system must be able to produce tailorable
    reports.” Avoid discussing implementation details when specifying goal-oriented
    requirements.

    - **“Look and feel” requirements**: These requirements get a bit more specific
    in terms of what the user expects the system to look like externally (e.g., how
    the GUI will be presented) and how the user expects it to behave, again from the
    user’s perspective. For example, we might have as a requirement “The user will
    click a button on the main GUI, and a confirmation message will appear…” A good
    practice is to write a **concept of operations** document to serve as a “paper
    prototype” describing how you envision the future system will look and behave,
    to stimulate discussion with intended users of the as-yet-to-be-built system before
    you even begin modeling.


    We emphasize goal-oriented functional requirements when preparing use cases.


    **Technical requirements**, on the other hand, have more to do with *how* a system
    is to be built internally in order to *meet* the functional requirements; for
    instance, “The system will use the TCP/IP protocol…” or “We will use a dictionary
    collection as the means for tracking students…” We can think of these as requirements
    for how programmers should tackle the *solution*, in contrast to functional requirements,
    which are a statement of what the *problem to be tackled* actually is.


    Technical requirements such as these don’t play a role in use case analysis.


    Although it’s certainly conceivable that the users of our system may be technically
    sophisticated, it’s best to express functional requirements in such a way that
    even a user who knows nothing about the inner workings of a computer will understand
    them. This helps ensure that technical requirements don’t creep into the functional
    requirements statement, a common mistake made by many inexperienced software developers.
    When we allow technical requirements to color the functional requirements, they
    artificially constrain the solution to a problem too early in the development
    life cycle.


    ### Involving the Users


    Because the intended users of a system are the ultimate experts in what they need
    the system to do, it’s essential that they be involved in the use case definition
    process. If the intended users haven’t (as individuals) been specifically defined
    or recruited (as with a software product that is to be sold commercially), their
    anticipated needs nonetheless need to be taken into account by identifying people
    with comparable experience to serve as “user surrogates.” Ideally, the users or
    user surrogates will write some or all of the use cases themselves; at a minimum,
    you’ll interview such people, write the use cases on their behalf, and then get
    their confirmation that what you’ve written is indeed accurate.


    Use cases are one of the first deliverables/artifacts to emerge in a software
    development project’s life cycle, but also one of the last things to be put to
    good use in making sure that the system is a success.


    They turn out to be quite useful as a basis for writing testing scripts, to ensure
    that all functional threads are exercised during system and user acceptance testing.


    They also lend themselves to the preparation of a **requirements traceability
    matrix**—that is, a final checklist against which the users can verify that all
    of their initial requirements have indeed been met when the system is delivered.


    Returning to the questions posed at the outset of this section, let’s answer the
    first question—namely, “Who (what categories of user) will want to use our system?”—which
    in use case nomenclature is known as identifying **actors**.


    ## Actors


    **Actors** represent anybody or anything that will interact with the system after
    it’s built; actors drive use cases. Actors generally fall into two broad categories:


    - Human users

    - Other computer systems


    “Interaction” is generally defined to mean using the system to achieve some result,
    but can also be thought of as simply (a) providing/contributing information to
    the system and/or (b) receiving/consuming information from the system.


    By *providing* information, I mean whether or not the actor inputs substantive
    information that adds to the collective data stored by the system—for example,
    a department chairperson defining a new course offering or a student registering
    their plan of study. This doesn’t include the relatively trivial information that
    users have to provide to look things up—for example, typing in a student ID to
    request their transcript.


    By *consuming* information, I mean whether or not the actor uses the system to
    obtain information—for example, a faculty user printing out a student roster for
    a course that they will be teaching or a student viewing their course schedule
    online.'
  raw: '### Functional vs. Technical Requirements


    The purpose of thinking through all of the use cases for a system is to explore
    the system’s functional requirements thoroughly, so as to make sure that a particular
    category of user, or potential purpose for the system, isn’t overlooked. We differentiate
    between functional requirements and technical requirements as follows.


    **Functional requirements** are those aspects of a system that have to do with
    how it is to operate or function from the perspective of someone using the system.
    Functional requirements may in turn be subdivided into


    *   ***“Goal-oriented” functional requirements***: These provide a statement of
    a system’s purpose without regard to how the requirement will “play out” from
    the user’s vantage point—for example, “The system must be able to produce tailorable
    reports.” Avoid discussing implementation details when specifying goal-oriented
    requirements**.**


    *   ***“Look and feel” requirements***: These requirements get a bit more specific
    in terms of what the user expects the system to look like externally (e.g., how
    the GUI will be presented) and how the user expects it to behave, again from the
    user’s perspective. For example, we might have as a requirement “The user will
    click a button on the main GUI, and a confirmation message will appear… ” A good
    practice is to write a **concept of operations** document to serve as a “paper
    prototype” describing how you envision the future system will look and behave,
    to stimulate discussion with intended users of the as-yet-to-be-built system before
    you even begin modeling.


    We emphasize goal-oriented functional requirements when preparing use cases**.**


    **Technical requirements**, on the other hand, have more to do with ***how***
    a system is to be built internally in order to ***meet*** the functional requirements;
    for instance, “The system will use the TCP/IP protocol… ” or “We will use a dictionary
    collection as the means for tracking students… ” We can think of these as requirements
    for how programmers should tackle the ***solution***, in contrast to functional
    requirements, which are a statement of what the ***problem to be tackled*** actually
    is.


    Technical requirements such as these don’t play a role in use case analysis.


    Although it’s certainly conceivable that the users of our system may be technically
    sophisticated, it’s best to express functional requirements in such a way that
    even a user who knows nothing about the inner workings of a computer will understand
    them. This helps ensure that technical requirements don’t creep into the functional
    requirements statement, a common mistake made by many inexperienced software developers.
    When we allow technical requirements to color the functional requirements, they
    artificially constrain the solution to a problem too early in the development
    life cycle.


    ### Involving the Users


    Because the intended users of a system are the ultimate experts in what they need
    the system to do, it’s essential that they be involved in the use case definition
    process. If the intended users haven’t (as individuals) been specifically defined
    or recruited (as with a software product that is to be sold commercially), their
    anticipated needs nonetheless need to be taken into account by identifying people
    with comparable experience to serve as “user surrogates.” Ideally, the users or
    user surrogates will write some or all of the use cases themselves; at a minimum,
    you’ll interview such people, write the use cases on their behalf, and then get
    their confirmation that what you’ve written is indeed accurate.


    Use cases are one of the first deliverables/artifacts to emerge in a software
    development project’s life cycle, but also one of the last things to be put to
    good use in making sure that the system is a success.


    They turn out to be quite useful as a basis for writing testing scripts, to ensure
    that all functional threads are exercised during system and user acceptance testing.


    They also lend themselves to the preparation of a **requirements traceability
    matrix**—that is, a final checklist against which the users can verify that all
    of their initial requirements have indeed been met when the system is delivered.


    Returning to the questions posed at the outset of this section, let’s answer the
    first question—namely, “Who (what categories of user) will want to use our system?”—which
    in use case nomenclature is known as identifying **actors**.


    ## Actors


    **Actors** represent anybody or anything that will interact with the system after
    it’s built; actors drive use cases. Actors generally fall into two broad categories:


    *   Human users


    *   Other computer systems


    “Interaction” is generally defined to mean using the system to achieve some result,
    but can also be thought of as simply (a) providing/contributing information to
    the system and/or (b) receiving/consuming information from the system.


    By ***providing*** information, I mean whether or not the actor inputs substantive
    information that adds to the collective data stored by the system—for example,
    a department chairperson defining a new course offering or a student registering
    their plan of study. This doesn’t include the relatively trivial information that
    users have to provide to look things up—for example, typing in a student ID to
    request their transcript.


    By ***consuming*** information, I mean whether or not the actor uses the system
    to obtain information—for example, a faculty user printing out a student roster
    for a course that they will be teaching or a student viewing their course schedule
    online.'
