  trans: '

    ### 捕获异常


    如果抛出异常的方法本身没有捕获该异常，那么调用该方法的客户端代码将有机会捕获它。


    请考虑以下包含三个类的示例：


    *   在我们的 `main` 方法中，我们在一个 `Student` 对象上调用 `methodX`：


    *   在 `Student` 的 `methodX` 代码中，我们接着在一个 `Professor` 对象上调用 `methodY`：


    ```

    public class MainProgram {

    public static void main(String[] args) {

    Student s = new Student();

    s.methodX();

    }

    }

    ```


    *   最后，这是 `Professor` 类：


    ```

    public class Student {

    // 细节已省略。

    public void methodX() {

    Professor p = new Professor();

    p.methodY();

    }

    }

    ```


    ```

    public class Professor {

    // 细节已省略。

    public void methodY() {

    // 细节已省略 ...

    }

    }

    ```


    当 JVM 执行我们的 `MainProgram` 时，会调用其 `main` 方法，该方法接着调用 `s.methodX()`，而 `s.methodX()`
    又接着调用 `p.methodY()`；这在运行时产生了一个所谓的**调用栈**，如图 13-18 所示。


    ![](img/78624_3_En_13_Fig18_HTML.png)


    一个框图展示了 p 方法、s 方法和主程序。


    图 13-18


    JVM 通过创建调用栈来跟踪方法之间相互调用的顺序


    **栈**是一种后进先出（LIFO）的数据结构；最近的方法调用被**压入**调用栈的顶部，当该方法退出时，它会被从调用栈中移除（**弹出**）。因此，举例来说，当
    `methodY` 执行完毕并将执行控制权返回给 `methodX` 时，`methodY` 就会被弹出，如图 13-19 所示。


    ![](img/78624_3_En_13_Fig19_HTML.jpg)


    一个 s 方法的示意图。主程序箭头指向 p 方法。


    图 13-19


    当方法退出时，它会从调用栈中被移除


    现在，我们假设在执行 `methodY` 时抛出了一个 `NullPointerException`。如果 `methodY` 的***方法体内***包含了适当的
    `try`/`catch` 逻辑来处理/解决这个 `NullPointerException`，如下所示：


    ```

    public class Professor {

    // 细节已省略。

    public void methodY() {

    try { ... }

    catch (NullPointerException e) { ... }

    }

    }

    ```


    那么 `Student` 类和 `MainProgram` 类都不会知道曾经抛出过这样一个异常。从调用栈的角度来看，对异常的感知被限制在当前栈层级内，如图
    13-20 所示。


    ![](img/78624_3_En_13_Fig20_HTML.png)


    一个框图展示了 p 方法、s 方法和主程序。在 p 方法中，爆炸符号位于椭圆内部。


    图 13-20


    `methodY` 中的 `try`/`catch` 逻辑将异常的感知限制在调用栈的当前层级


    现在，我们假设 `methodY` ***没有*** 捕获/处理 `NullPointerException`：


    ```

    public class Professor {

    // 细节已省略。

    public void methodY() {

    // 这里抛出了一个 NullPointerException，但

    // 没有被捕获/处理。

    // (细节已省略。)

    }

    }

    ```


    如果在执行***这个***版本的 `methodY` 时抛出了 `NullPointerException`，它将沿着调用栈向下传递一层，到达 `Student`
    类的 `methodX`，也就是调用 `p.methodY()` 的起源地。如果 `Student` 类的 `methodX` 代码恰好包含了必要的异常处理代码，如下所示：


    ```

    public class Student {

    // 细节已省略。

    public void methodX() {

    Professor p = new Professor();

    // 在此处执行异常处理。

    try {

    p.methodY();

    }

    catch (NullPointerException e) { ... }

    }

    }

    ```


    那么该异常就被 `Student` 类中的 `methodX` 所包含，因此 `MainProgram` 将不会知道曾经抛出过这样一个异常。这在调用栈的语境中如图
    13-21 所示。


    ![](img/78624_3_En_13_Fig21_HTML.jpg)


    框图展示了 p 方法、s 方法和主程序。在 p 方法中，椭圆内的爆炸符号被转发到 s 方法。


    图 13-21


    异常“逃逸”了调用栈的 `methodY` 层级，但被 `methodX` 包含/处理


    现在，让我们假设 `Professor` 的 `methodY` ***和*** `Student` 的 `methodX` ***都*** 没有处理 `NullPointerException`，但我们的
    `main` 方法被编写为处理该异常，如下所示：


    ```

    public class Professor {

    // 细节已省略。

    public void methodY() {

    // 这里抛出了一个 NullPointerException，但

    // 没有被捕获/处理。

    // (细节已省略。)

    }

    }

    //-----------------------------

    public class Student {

    // 细节已省略。

    public void methodX() {

    Professor p = new Professor();

    // 我们在这里也不做任何异常处理。

    p.methodY();

    }

    }

    //-----------------------------

    public class MainProgram {

    public static void main(String[] args) {

    Student s = new Student();

    // 在此处引入异常处理。

    try {

    s.methodX();

    }

    catch (NullPointerException e) { ... }

    }

    }

    ```


    在这种情况下，在 `methodY` 中抛出的 `NullPointerException` 将沿着调用栈一路传递到 `main` 方法，并在那里被包含，如图
    13-22 所示。在这种情况下，该应用程序的***用户***不会意识到发生了异常。


    ![](img/78624_3_En_13_Fig22_HTML.jpg)


    框图展示了 p 方法、s 方法和主程序。在 p 方法中，椭圆内的爆炸符号被转发到 s 方法和主程序。


    图 13-22


    `NullPointerException` 一路传递到 `main` 方法


    作为最后一种变体，让我们假设即使是 `main` 方法也省略了显式的异常处理。如果在 `methodY` 中发生了 `NullPointerException`，我们将在命令窗口中看到以下**堆栈跟踪**：


    ```

    java PSExample

    Exception in thread "main" java.lang.NullPointerException

    at Professor.methodY(Professor.java: ...)

    at Student.methodX(Student.java: ...)

    at MainProgram.main(MainProgram.java: ...)

    ```


    从调用栈的角度来看，情况如图 13-23 所示。


    ![](img/78624_3_En_13_Fig23_HTML.jpg)


    框图展示了 p 方法、s 方法和主程序。在 p 方法中，椭圆内的爆炸符号被转发到 s 方法和主程序。其下方有 java P S example exception
    in thread main java lang null pointer exception, professor, student, and main
    program。


    图 13-23


    如果我们的整个应用程序都省略了异常处理，JVM 将终止应用程序并将异常报告到命令窗口，供用户查看


    我们将在本章稍后部分了解到，Java 编译器会强制我们捕获某些类型的异常，但 `NullPointerException` 并不在此列。

