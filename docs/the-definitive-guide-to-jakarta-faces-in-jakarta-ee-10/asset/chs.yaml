  属性都注册到“`faces`”命名空间上。\n只需一个属性就足以触发透传元素特性，\n最好是第一个属性。这可以使代码保持简洁。\n\n脚注\n\n7. Facelets\
  \ 模板化\n\n当 Jakarta Faces 于 2004 年首次推出时，只有 Jakarta Pages\n（以前称为 Jakarta Pages）可作为视图技术使用。\n\
  很明显，对于使用 Jakarta Faces 进行 Web 开发来说，这是一种不合适的视图技术。\nJakarta Pages 的问题在于，它一遇到模板文本就会写入\
  \ HTTP 响应，而\nJakarta Faces 希望首先根据视图声明创建组件树，以便\n能够在其上执行生命周期处理。例如，以下使用 Jakarta Pages\n\
  视图技术的 Jakarta Faces 1.0/1.1 页面：\n\n```\nstrong link text\n\n```\n\n将产生以下 HTML 输出，其中\
  \ Jakarta Pages 在 Jakarta Faces 组件\n生成的 HTML 输出*之前*发出了模板文本：\n\n```\nstrong link\
  \ text\n\n```\n\n“正确的方法”是将模板文本包装在 `<f:verbatim>`\n标签中：\n\n```\nstrong link text\n\
  \n```\n\n这将正确地产生以下 HTML 输出：\n\n```\nstrong link text\n\n```\n\n\n\n这显然招致了大量批评，普遍的建议是人们不应将\
  \ Jakarta Faces 与 HTML 混用。Jakarta Faces 1.0/1.1 的另一个问题是，没有组件可以表示 HTML 的 `<div>`\
  \ 元素。当时正值“Web 2.0”刚刚兴起，人们也开始反对使用 HTML 表格来布局网页。主流观点认为只应使用 div，这使得人们对 Jakarta Faces\
  \ 1.0/1.1 更加反感。\nJakarta Pages 导致 HTML 输出混乱的奇特行为，在仅两年后（2006 年）发布的 Jakarta Faces\
  \ 1.2 中通过内部变通方式得到了解决。而缺少表示 HTML `<div>` 的组件这一问题，则通过为现有的 `<h:panelGroup>` 组件新增一个\
  \ `layout=\"block\"` 属性来解决，使其渲染出 `<div>` 而非 `<span>`。因此，从 Jakarta Faces 1.2 开始，人们就可以安全地在\
  \ Jakarta Pages 页面中混合使用纯 HTML 和 Jakarta Faces 组件，并继续以纯 HTML 和 Jakarta Faces 两种方式使用\
  \ div。然而，在编写 Jakarta Faces 1.0/1.1 页面时应避免使用纯 HTML 的旧建议，却演变成了一个至今仍在某些人中流传的顽固迷思。\n\
  Jakarta Pages 的另一个问题是，现有的 Jakarta Pages 专用标签（例如 Jakarta Tags，原名 Jakarta Tags）以及\
  \ `${...}` 形式的现有 Jakarta Pages 专用表达式语言，完全无法集成到 Jakarta Faces 的生命周期中。因此，在 Jakarta\
  \ Pages 页面中将现有的 Jakarta Pages 专用标签库和表达式与 Jakarta Faces 组件混合使用，会导致令人困惑且不直观的行为。人们无法使用\
  \ Jakarta Tags 的 `<c:forEach>` 来渲染一组 Jakarta Faces 组件，因为这些组件无法识别 `<c:forEach var>`\
  \ 声明的变量。除了 `<h:dataTable>` 之外，没有专门的 Jakarta Faces 组件来遍历列表，最终人们在 Jakarta Faces 页面中创建列表时只能局限于使用\
  \ HTML 表格。\n最后，Jakarta Pages 提供的模板功能也非常有限，实际上只有一个“模板”标签，即 `<jsp:include>`；因此，使用\
  \ Jakarta Pages 进行模板化需要采用相当复杂的方法，即为每个可重用模板部分的定义创建一堆自定义标签。^(⁶³) 这与 Jakarta Faces\
  \ 追求可重用组件以最小化代码重复的理念相悖。使用 Jakarta Pages，你最终会重复 Jakarta Faces 组件本身。现有的模板框架，如 Tiles\
  \ 和 Thymeleaf，要么以 Jakarta Pages 为中心，要么根本不支持 Jakarta Faces，因此无法使用。\n显然，迫切需要一种面向 Jakarta\
  \ Faces 的新视图技术来取代 Jakarta Pages，并解决其与 Jakarta Faces 生命周期相关的所有问题。于是，Facelets 在 2006\
  \ 年被引入。它可以为 Jakarta Faces 1.1 和 1.2 单独安装，并内置于 Jakarta Faces 2.0 中。它成为了 Jakarta Faces\
  \ 的默认视图技术，而 Jakarta Pages 作为 Jakarta Faces 的视图技术立即被弃用。Jakarta Faces 2.0 中引入的新标签，例如\
  \ `<f:ajax>`、`<h:head>`、`<h:body>`、`<h:outputScript>` 和 `<h:outputStylesheet>`，仅适用于\
  \ Facelets，不适用于 Jakarta Pages。Jakarta Faces 2.0 还引入了一个新接口 `ViewDeclarationLanguage`\
  \ API，以便更轻松地插入自定义视图声明语言 (VDL) 作为 Jakarta Pages 甚至 Facelets 的替代方案。通过这种方式，人们可以为 Jakarta\
  \ Faces 创建纯基于 Java 的 VDL。^(⁶⁴)\n\nXHTML\nFacelets VDL 规定视图定义在基于 XML 的文件中，这些文件使用\
  \ SAX 解析器编译并保存在内存中。自 Jakarta Faces 2.1 起，此内存缓存可通过自定义的 `FaceletCacheFactory` 进行配置。当\
  \ Jakarta Faces 项目阶段设置为 `Development` 时，Facelets 文件的 SAX 编译表示默认不会被缓存。这使得在已运行的服务器上进行开发更加容易，只需在支持将本地更改热发布到目标运行时的\
  \ IDE（集成开发环境）中编辑 Facelets 文件即可。\nFacelets 文件本身通常使用 `.xhtml` 扩展名，因此初学者常称其为“XHTML”而非“Facelets”。在\
  \ Jakarta Faces 的上下文中讨论时，这没问题，但“XHTML”一词在 Web 开发领域还有另一层含义。其核心是，XHTML 是一种用于 HTML\
  \ 页面的标记语言，这些页面需要使用基于 XML 的工具进行编译。换句话说，开发者基本上是创建包含 HTML 标记和 Web 框架特定 XML 标签的 XML\
  \ 文件，然后 Web 框架会将其解析为 XML 树，生成该 XML 树的某种 Web 框架特定表示（在 Jakarta Faces 中是 `UIViewRoot`），并最终根据框架对\
  \ XML 树的内部表示生成所需的 HTML 输出。\n但在 2006 年 Facelets 被引入前后，XHTML 被另一群 Web 开发者过度炒作，他们基本上是因为看到\
  \ W3 验证器使其 HTML4 文档无效而感到失望——这通常是因为他们希望显式关闭所有标签以保持一致性，包括那些根据 HTML4 规范实际上不应关闭的标签，例如\
  \ `<link>`、`<meta>`、`<br>` 和 `<hr>`；有时还因为他们希望指定自定义标签属性，以便某些 JavaScript 插件能与 HTML\
  \ 文档更清晰地交互，而这也是 HTML4 规范所不允许的。尽管世界上几乎所有 Web 浏览器（包括古老的 IE6）都宽容地接受了这一点，但这些开发者不希望看到他们精心制作的\
  \ HTML4 文档被 W3 验证器判定为无效，于是他们将 HTML 文档类型声明更改为使用 XHTML DTD——这是 HTML 的一个扩展，要求每个标签都必须闭合，并允许在现有标签上指定自定义属性。然而，这本质上是对\
  \ XHTML 的滥用，因为他们实际上根本没有使用任何 XML 工具来编译文档并生成所需的 HTML 输出。这仅仅是为了让 W3 验证器满意。\n巧合的是，也大约在同一时间，HTML5\
  \ 刚刚开始起草。本质上，开发者只需从 HTML 文档类型声明中移除任何 DTD，就能得到一个允许基于 XML 语法的 HTML 文档，其中所有标签始终闭合，并允许自定义元素和属性，更重要的是，能在\
  \ W3 验证器中正确验证。换句话说，`<!DOCTYPE html>` 对这些开发者来说已经足够了，即使在 IE6 中也是如此。不幸的是，HTML5 正式完成花费了很长时间，因此在开发者能够切换回\
  \ HTML 文档类型之前，他们一直在滥用 XHTML 文档类型。当与这些开发者讨论 Facelets 时，不要称其为“XHTML”，而应直接称为“Facelets”；否则会引起混淆。\n\
  \n模板组合\n\nFacelets 提供了标签，用于基于单个主模板文件轻松创建模板组合。这应该能减少所有网页中重复出现的站点级部分（如页眉、导航菜单和页脚）的代码重复。主模板文件应代表一个包含所有站点级部分的完整网页布局，并应使用\
  \ `<ui:insert>` 标签来表示可以插入页面特定部分的位置。以下是这样一个主模板文件 `/WEB-INF/templates/layout.xhtml`\
  \ 的基本示例：\n\n```\n\n#{title}\n\n```\n\n\n\n请注意，主模板文件和包含文件被明确放置在 `/WEB-INF` 文件夹中。这样做是为了防止用户通过猜测\
  \ URL 路径直接访问。另外请注意，页面标题被声明为一个简单的 EL（表达式语言）表达式 `#{title}`，而不是使用 `<ui:insert>`。也就是说，`<title>`\
  \ 元素中不允许包含任何标记。\n\n`xmlns` 属性基本上通过 URI（统一资源标识符）定义了在声明的 XML 命名空间中可以使用哪些标签。默认的根 XML\
  \ 命名空间 URI 是 W3 XHTML 标准 [`http://www.w3.org/1999/xhtml`](http://www.w3.org/1999/xhtml)，它定义了“任何\
  \ XHTML 和 HTML5+ 标签”，例如前面示例中的 `<html>`、`<title>`、`<header>`、`<main>` 和 `<footer>`。Facelets\
  \ 编译器能够识别这个标准 XML 命名空间，并将所有元素作为“通用 UI 指令”传递。在 Facelets 文件中，不需要显式声明根 XML 命名空间。只有像\
  \ IDE 这样的工具可能需要它们来实现正确的代码补全，但 Jakarta Faces 本身并不要求在 Facelet 中存在根 XML 命名空间。\n\n“`h`”\
  \ XML 命名空间指定了 HTML 标签库 URI，而“`ui`” XML 命名空间指定了 Facelets 标签库 URI，这两个 URI 都存在于 Jakarta\
  \ Faces 实现的 JAR 文件中，并在 Web 应用程序启动时注册到 Facelets。这样，Facelets 编译器就能找到相关的标签处理器、组件和复合组件，这些组件负责完成构建视图、解码\
  \ HTTP 请求和编码 HTTP 响应的繁重工作。因此，这些 URI 并不一定是实际存在的互联网地址。你甚至可以通过一个 `*.taglib.xml` 文件来指定你自己的\
  \ URI。这将在后面的“标签文件”部分进一步展开。\n\n以下是包含文件 `/WEB-INF/includes/layout/header.xhtml` 的内容：\n\
  \n请注意徽标周围的链接。它指向 `#{request.contextPath}/`。这基本上会打印出相对于应用程序根目录的域相对 URL。`#{request}`\
  \ 是一个隐式 EL 对象，引用当前的 `HttpServletRequest` 实例。`contextPath` 指的是它的一个属性，由 `getContextPath()`\
  \ 方法提供。\n\n以下是包含文件 `/WEB-INF/includes/layout/footer.xhtml` 的内容：\n\n```\n\n© Example\
  \ Company\n\n```\n\n最后，模板客户端的样子，例如 `/home.xhtml`：\n\n```\n\nWelcome to Example Company!\n\
  Lorem ipsum dolor sit amet.\n\n```\n\n请注意 `<ui:composition>` 的 `template` 属性。这必须代表主模板的服务器端路径，最好是绝对路径，即以“`/`”开头。在模板客户端中，`<ui:param>`\
  \ 允许你定义一个特定于主模板的简单参数。基本上，你可以使用任何参数名称，只要主模板支持它，并且不与现有的受管 Bean 名称冲突。在这个特定案例中，EL 变量\
  \ `#{title}` 的值被指定为“Welcome!”。这最终会出现在主模板的 `<title>` 元素中。\n\n而 `<ui:define>` 允许你定义一个特定于主模板的标记块。它最终会出现在主模板中声明了同名\
  \ `<ui:insert>` 的位置。图 7-1 清晰地概述了所有这些部分是如何组合在一起的。\n\n![](img/454457_2_En_7_Fig1_HTML.png)\n\
  \n图 7-1\n主模板 `layout.xhtml`、包含文件 `header.xhtml` 和 `footer.xhtml`，以及模板客户端 `home.xhtml`\
  \ 之间的关系。请注意，为简洁起见，省略了模板文件路径和一些标签属性。实际编码请参考前面显示的代码片段。\n\n最后，打开 `/home.xhtml` 应该会生成最终的\
  \ HTML 输出，你可以通过在普通 Web 浏览器中右键单击*查看页面源代码*来检查。\n\n单页应用程序\n最近的一个趋势是所谓的单页应用程序（SPA）。这个概念本身并不新鲜；事实上，它比\
  \ Jakarta Faces 本身还要古老，但在“Web 2.0”时代，随着基于 JavaScript 的框架（如 Angular）而广泛流行。基本上，SPA\
  \ 通过在使用 Ajax 请求导航到不同页面时动态更改主要内容，而不是通过 GET 请求加载整个页面，从而使 Web 应用程序表现得像桌面应用程序。Gmail\
  \ 就是这样一个知名的 SPA 例子。\n\n这种 SPA 也可以通过 Jakarta Faces 实现，只需使用 `<ui:include>`，其 `src`\
  \ 属性由 Ajax 动态更新。以下是一个示例，使用了上一节中展示的相同主模板 `/spa.xhtml`：\n\n请注意，`<article>` 元素通过显式指定\
  \ Jakarta Faces 标识符 `faces:id=\"...\"` 被声明为所谓的直通元素。在底层，当声明一个没有对应 Jakarta Faces 组件的\
  \ HTML 元素（例如 `<header>`、`<footer>`、`<main>`、`<article>` 和 `<section>`）作为直通元素时，它会被转换为一个\
  \ `UIPanel` 组件，并在 Jakarta Faces 组件树中像 `<h:panelGroup>` 一样被处理。这样，你就可以干净地继续使用语义化的\
  \ HTML5 标记，同时仍然能够像引用 Jakarta Faces 组件一样引用它，从而能够通过 Ajax 更新它。另请参阅第 6 章中的“直通元素”部分。\n\
  \n正如你可能从之前的 `/spa.xhtml` 示例中解读出的那样，有一个侧边导航菜单，它通过 `#{spa}` 标识的受管 Bean 设置当前页面，并通过\
  \ Ajax 更新 `id=\"content\"` 标识的组件，该组件又包含一个动态包含。前面的示例期望在 `/WEB-INF/includes/spa` 文件夹中存在以下包含文件：`page1.xhtml`、`page2.xhtml`\
  \ 和 `page3.xhtml`。它们每个都是一个简单的包含文件，内容如下：\n\n```\nFirst page\nLorem ipsum dolor sit\
  \ amet.\n\n```\n\n与 `#{spa}` 受管 Bean 关联的后台 Bean 相当简单；它看起来如下：\n\n```\n@Named @ViewScoped\n\
  public class Spa implements Serializable {\nprivate String page;\n@PostConstruct\n\
  public void init() {\npage = \"page1\";\n}\npublic void set(String page) {\nthis.page\
  \ = page;\n}\npublic String getPage() {\nreturn page;\n}\n}\n```\n\n\n\n默认页面在 `@PostConstruct`\
  \ 中定义。否则，用户可能会看到一个包含“`Invalid path : /WEB-INF/includes/spa/.xhtml`”消息的错误页面。请注意，支持\
  \ bean 被声明为 `@ViewScoped`。这对于在回传过程中记住当前正在打开的页面非常重要。如果它是 `@RequestScoped`，并且用户导航到例如\
  \ `page2` 并在其中提交一个表单（这会创建一个新的 HTTP 请求），那么 `@RequestScoped` 管理的 bean 将被重新创建，`page`\
  \ 属性的默认值为 `page1`，因此不再是初始选择的 `page2` 值。这会导致当 Jakarta Faces 准备解码任何输入组件以处理回传请求中的表单提交时，`<ui:include>`\
  \ 将不再引用 `page2.xhtml`，因此 Jakarta Faces 将无法找到在 `page2.xhtml` 中声明的输入组件。`@ViewScoped`\
  \ bean 的生命周期与用户回传到同一个视图（在本例中为 `/spa.xhtml`）的时间相同，因此它能正确记住当前选中的页面。\n\n在尝试这个 SPA 示例时，您可能已经注意到一个缺点：这些页面无法添加书签。这是因为这些页面不是通过幂等的\
  \ GET 请求打开的。您可以通过利用 HTML5 `history.pushState` API 来解决这个问题。^(⁶⁵) 基本上，在 Ajax 请求完成后，您应该将预期的\
  \ URL 推送到浏览器历史记录中，这将反映在浏览器的地址栏中。并且您应该修改 `Spa` 支持 bean，以检查是否打开了任何特定页面，然后相应地准备 `page`\
  \ 变量。\n\n以下是一个入门示例，它只是附加了 `?page=xxx` 查询字符串参数。首先，调整 `spa.xhtml` 中的 `<f:ajax>`，按如下方式指定\
  \ `onevent` 属性：\n\n```\n\n并创建以下 JavaScript 函数：\n\n```\nfunction pageChangeListener(event)\
  \ {\nif (event.status == \"success\") {\nvar page = document.getElementById(\"content\"\
  ).dataset.page;\nvar url = location.pathname + \"?page=\" + page;\nhistory.pushState(null,\
  \ document.title, url);\n}\n}\n```\n\n最后，按如下方式调整 `Spa` 支持 bean：\n\n```\n@Inject\
  \ @ManagedProperty(\"#{param.page}\")\nPrivate String page;\npublic void init()\
  \ {\nif (page == null) {\npage = \"page1\";\n}\n}\n```\n\n另外，请注意您可能想要验证提供的页面参数。顺便说一句，黑客的路径探测是无害的，因为\
  \ Jakarta Faces 已经不允许遍历到父路径，例如 `/spa.xhtml?page=../../templates/layout`。\n\n模板装饰\n\
  \n如果您希望拥有一个可重用的包含文件，该文件能够插入模板定义，就像使用 `<ui:include>` 来引用一个包含一个或多个 `<ui:insert>` 部分的包含文件一样，那么您可以使用\
  \ `<ui:decorate>`。以下是一个这样的示例，`/WEB-INF/decorations/contact.xhtml`：\n\n```\n\n✆ +31\
  \ (0)6 1234 5678\n✉ info@example.com\n\n```\n\n以下是它的使用方式；您可以将 `<ui:decorate>` 放在模板客户端的任何位置，就像\
  \ `<ui:include>` 一样：\n\n```\nQuestions? Contact us!\n\n```\n\n请注意，`contact.xhtml`\
  \ 只有一个 `<ui:insert>`，并且它没有名称。这会将整个 `<ui:decorate>` 标签体插入到 `<ui:insert>` 声明的位置。当然，您可以指定一个名称，但那样您就需要显式地为其指定一个带有名称的\
  \ `<ui:define>`。这仅在您有多个插入部分时才有用。\n\n如有必要，您可以使用 `<ui:param>` 来传递参数。其工作方式与 `<ui:composition\
  \ template>` 相同。以下示例将电子邮件用户名 `/WEB-INF/decorations/contact.xhtml` 参数化，默认值为“`info`”。\n\
  \n```\n...\n✉ #{empty mailto ? 'info' : mailto}@example.com\n...\n```\n\n然后可以按如下方式使用：\n\
  \n```\n\nContact us\n\nFor press inquiries you can contact us by the below\nphone\
  \ number and email address.\n\n```\n\n标签文件\n\n与 `<ui:composition template>` 和 `<ui:decorate>`\
  \ 一样，您也可以在 `<ui:include>` 中使用 `<ui:param>`。\n\n其中 `/WEB-INF/includes/field.xhtml`\
  \ 看起来像这样：\n\n但是，请注意不要在 `<ui:include>` 中使用过多的 `<ui:param>` 标签。在这种情况下，您更希望使用更简洁的方式，如下所示：\n\
  \n当 `<ui:include>` 带有三个或更多 `<ui:param>` 标签时，这强烈表明该包含文件最好注册为标签文件，以便在 Facelet 中使用更少的样板代码。\n\
  首先，将包含文件移动到不同的子文件夹 `/WEB-INF/tags/field.xhtml`。这不是技术上的要求。无论您将其放在哪里，它都能正常工作，但我们只是想清晰地组织文件。主模板文件放在\
  \ `/WEB-INF/templates`，包含文件放在 `/WEB-INF/includes`，装饰文件放在 `/WEB-INF/decorations`，标签文件放在\
  \ `/WEB-INF/tags`。\n\n然后，创建以下 `/WEB-INF/example.taglib.xml`：\n\n```\n\nexample.tags\n\
  t\n\nRenders label + input + message field.\nfield\ntags/field.xhtml\n\nThe type\
  \ of the input component.\ntype\nfalse\njava.lang.String\n\nThe ID of the input\
  \ component.\nid\ntrue\njava.lang.String\n\nThe label of the input component.\n\
  label\ntrue\njava.lang.String\n\nThe value of the input component.\nvalue\nfalse\n\
  java.lang.Object\n\nWhether the field is rendered.\nrendered\nfalse\nboolean\n\n\
  ```\n\n不可否认，这需要相当多的样板代码。但要知道，`<attribute>` 元素对于标签文件的技术功能并非强制性的。您甚至可以完全省略它们。但那样 IDE\
  \ 将无法在尝试自动完成自定义标签时将它们加载到自动建议框中。这不太友好。所以最好保留它们。顺便说一句，标签属性的 `<required>` 属性仅在 Jakarta\
  \ Faces 项目阶段设置为 `Development` 时才会导致运行时错误。在其他 Jakarta Faces 项目阶段，它会被忽略。而一般的 IDE 在自动完成标签时会立即提示这些必需的属性。\n\
  \n文件名 `example.taglib.xml` 可以自由选择。为了让 Jakarta Faces 在应用程序启动时自动拾取标签库文件，只有两个要求：它必须具有\
  \ `.taglib.xml` 扩展名，并且必须放置在 `/WEB-INF` 文件夹中（或者，如果是一个最终位于 `/WEB-INF/lib` 中的 JAR 文件，则必须放置在该\
  \ JAR 文件的 `/META-INF` 文件夹中）。不幸的是，在某些服务器（如 GlassFish/Payara）中，将文件放在 `/WEB-INF` 中并不总是能很好地工作。在这种情况下，您必须通过\
  \ `web.xml` 中的以下上下文参数显式注册它，其值表示从 Web 根目录到 `*.taglib.xml` 文件的完整路径。\n\n```\njakarta.faces.FACELETS_LIBRARIES\n\
  /WEB-INF/example.taglib.xml\n\n```\n\n为了使用 `*.taglib.xml` 中定义的任何标签，您首先必须在 Facelet\
  \ 的 XML 命名空间中声明标签库的 `<namespace>` URI，以及一个任意的 XML 命名空间前缀。为了更好地维护代码，建议一致地选择标签库的首选\
  \ XML 命名空间前缀，如 `*.taglib.xml` 的 `<short-name>` 中所指定的，在我们的 `example.taglib.xml` 中就是“`t`”。\n\
  \n```\n\nLog In\n\n```\n\n请注意，电子邮件字段的 `type=\"email\"` 最终会进入标签文件实现的 `<c:otherwise>`\
  \ 中，并通过 `<h:inputText>` 的 `type=\"#{type}\"` 属性传递。这使您可以轻松使用 HTML5 输入字段，例如 `type=\"\
  email\"`、`type=\"number\"` 和 `type=\"tel\"`。\n\n您可能还注意到了另一个自定义标签 `<t:button>`。以下是它在\
  \ `/WEB-INF/tags/button.xhtml` 中的实现方式。\n\n它在 `example.taglib.xml` 中的注册方式与 `<t:field>`\
  \ 几乎相同，但 `action` 属性有一个例外。从技术上讲，您需要指定一个 `<method-signature>` 而不是（属性）`<type>`：\n\n\
  ```\n\n\n\n按钮的操作方法。\n注意：必须包含方法括号。\n\naction\ntrue\nvoid action()\n\n```\n\n你可能已经注意到，实际的标签实现使用的是\
  \ `<f:actionListener binding=\"#{action}\">` 而不是 `action=\"#{action}\"`。\n这实际上是一个必要的技巧，目的是为了让它能够正确地调用该方法。\n\
  也就是说，`<method-signature>` 最初是为 UI 组件设计的，而不是为标签文件设计的。它在标签文件中会被忽略。这个问题可能会在 Faces.next\
  \ 中得到解决。目前，你可以通过 `<f:actionListener binding>` 这个技巧来绕过它。这只有一个额外的要求：你需要在标签文件客户端显式地包含方法括号，例如\
  \ `<t:button action=\"#{login.submit()}\">`。当你省略方法括号，写成 `<t:button action=\"#{login.submit}\"\
  >` 时，提交将会失败，并抛出 *jakarta.el.PropertyNotFoundException: The class ‘com.example.project.view.Login’\
  \ does not have the property ‘submit’* 异常。\n\n如果你想从标签文件客户端自定义标签文件，例如，通过添加更具体的输入属性、嵌套核心标签，或者在标签或消息前/后追加内容，那么你可以使用\
  \ `<ui:define>` 和 `<ui:insert>`，就像你习惯在主模板文件和装饰文件中使用它们一样。下面的示例演示了如何通过添加一系列新的 `<ui:insert>`\
  \ 标签来增强 `/WEB-INF/tags/field.xhtml`：\n\n现在，这提供了极大的灵活性！在标签文件客户端，你可以使用 `<ui:define\
  \ name=\"beforeLabel\">` 来定义一些应出现在字段标签之前的内容。你可以使用 `<ui:define name=\"label\">` 来完全覆盖标签。你还可以使用\
  \ `<ui:define name=\"insideLabel\">` 在标签内部追加一些（HTML）内容，等等。下面的示例演示了如何使用 `insideLabel`\
  \ 在密码字段的标签后追加一个“忘记密码？”链接：\n\n请注意，`<ui:insert name=\"insideLabel\">` 被包裹在一个 HTML\
  \ `<span>` 标签中。这允许你更轻松地通过 CSS 选择最终出现在该位置上的“任何内容”，例如，你可以仅使用以下 CSS 让它向右浮动：\n\n```\n\
  .field label > span {\nfloat: right;\n}\n```\n\n标签文件客户端中任何未嵌套在 `<ui:define>` 中的内容，最终都会进入嵌套在所选输入组件中的无名\
  \ `<ui:insert>` 标签内。这允许你轻松地为该输入组件嵌套任何 `<f:xxx>` 核心标签：\n\n这个特定示例通过当 `KeyBoardEvent.key`\
  \ 等于“`Enter`”时返回 `false` 来阻止表单在按下*回车*键时提交，并注册一个正则表达式验证器，通过匹配正则表达式模式“`[0-9]{4}`”来仅接受四位数字的值，并指示\
  \ Jakarta Faces 在值更改事件发生时通过 Ajax 更新由“`otherField`”标识的组件。\n回到 `/WEB-INF/tags/field.xhtml`\
  \ 中的标签文件实现，你可能已经注意到这里使用了 Jakarta Tags `<c:when>` 而不是 Jakarta Faces 组件的 `rendered`\
  \ 属性。这样做有优势，因为 Jakarta Tags 的生命周期与 Jakarta Faces 组件不同。Jakarta Tags 在 Jakarta Faces\
  \ 组件树即将构建时（视图构建期间）执行。Jakarta Faces 组件在即将生成 HTML 输出时（视图渲染期间）执行。此外，如果你使用 Jakarta Faces\
  \ 自己的 `rendered` 属性，那么你会遇到“重复组件 ID”错误，因为具有相同 ID 的多个组件会物理上存在于 Jakarta Faces 组件树中。\n\
  如果你正在考虑使用纯 Java 代码基于至少一个视图作用域的模型动态创建组件树，那么你绝对应该重新考虑使用 Jakarta Tags。由于 Jakarta Tags\
  \ 本身也是基于 XML 的，因此你可以将所有内容组合在一个 XHTML 文件中，最终你会为“动态”组件获得可读性和可维护性更好的代码。\n\n复合组件\n有时，你可能希望将一组相关的输入组件组合起来表示一个单一的模型值。一个经典的例子是使用三个\
  \ `<h:selectOneMenu>` 下拉框分别表示日、月、年，并最终绑定到后台 bean 中的一个 `java.time.LocalDate` 属性。仅使用包含文件或标签文件来实现这一点并不简单。你需要一些额外的基于\
  \ Java 的逻辑来确保，例如，日下拉框不会根据当前选中的月份显示 29、30 或 31 这些值，并且能够将提交的值转换为一个完整的 `LocalDate`\
  \ 实例，反之亦然。但是，你不能也不应该在任何 Facelet 中放置任何 Java 代码。\n你可能会想，只需为此创建一个专用的后台 bean。但这也不够。它不允许你通过\
  \ Jakarta Faces 阶段干净地挂接到组件的生命周期：从多个组件收集单个提交的值，将它们转换为一个单一的 `LocalDate` 实例，必要时在验证阶段抛出转换器异常，并让\
  \ Jakarta Faces 生命周期自动跳过剩余阶段。后台 bean 的 setter 方法或 action 方法远非放置该逻辑的正确位置。无论如何，它被调用时都太晚了。而且，能够通过\
  \ Facelet 中任意位置的 EL 表达式引用并可能操作同一个后台 bean，这感觉很奇怪。\n这正是复合组件发挥作用的地方：将一堆现有的 Jakarta\
  \ Faces 组件组合成一个虚拟的单一组件，该组件绑定到一个单一的模型值，并最终以与使用普通 `<h:inputText>` 完全相同的方式使用它。想象一个\
  \ `<t:inputLocalTime>` 复合组件，它由两个绑定到单一 `java.time.LocalTime` 模型值的 `<h:selectOneMenu>`\
  \ 组件组成。你可以使用一个完整的 `UIComponent` 实例作为所谓的后台组件，而不是使用后台 bean。\n\n\n\n首先，在 `main/webapp/resources`\
  \ 文件夹中创建一个专用子文件夹（注意不是 `main/java/resources`！），例如 `main/webapp/resources/components`。你可以将代表复合组件的\
  \ Facelets 文件放在此处。表示该子文件夹的路径（如 `/components`）随后将在 XML 命名空间 URI 中，位于 `jakarta.faces.composite`\
  \ 之后使用，如下所示。\n\n```\n\n请注意，XML 命名空间前缀“`t`”与我们之前为标签文件定义的前缀冲突。这当然不是本意。你可以为复合组件选择不同的\
  \ XML 命名空间。然而，也可以让它们共享相同的自定义 XML 命名空间 URI `example.tags`。这可以通过在 `*.taglib.xml` 中添加一个\
  \ `<composite-library-name>` 来实现，而该元素的值必须代表专用子文件夹的名称。\n\n```\ncomponents\n```\n\n\
  这样，所有复合组件也可以通过与标签文件相同的 XML 命名空间来使用。\n\n```\n...\n\n```\n\n代表复合组件的 Facelets 文件的文件名将成为标签名称。因此，为了拥有一个\
  \ `<t:inputLocalTime>`，我们需要在 `main/webapp/resources/components` 文件夹中有一个 `inputLocalTime.xhtml`\
  \ 文件。以下是一个入门示例，展示了它可能的样子：\n\n```\n\n:\n\n```\n\n这里有几件事需要注意，这些使得复合组件与标签文件有所不同。首先，复合组件的主体始终分为两个部分：接口（interface）和实现（implementation）。\n\
  接口声明了一个 `componentType` 属性，该属性应引用 `UIComponent` 子类上的 `@FacesComponent` 注解的值，或者引用\
  \ `faces-config.xml` 或 `*.taglib.xml` 中声明的 `<component>` 的 `<component-type>` 条目。当\
  \ `componentType` 属性不存在时，它默认为 `UINamingContainer`。接口还将支持的组件属性声明为 `<cc:attribute>`\
  \ 条目。为简单起见，我们在示例接口中只限制了两个属性：`value` 和 `required`。还有一些从 `UIComponent` 超类隐式继承的属性，我们无需显式定义为\
  \ `<cc:attribute>` 条目：`id`、`binding` 和 `rendered`。这使得你可以在实现中使用的属性总数达到五个。\n实现定义了复合组件的实际标记。在示例实现中，你可以找到两个包裹在\
  \ `<span>` 元素中的 `<h:selectOneMenu>` 下拉菜单。你还可以在其中找到特殊 EL 变量 `#{cc}` 的多次出现，它引用复合组件背后的当前\
  \ `UIComponent` 实例，因此它是 `componentType` 属性中声明的类型的实例，如果该属性不存在，则是 `UINamingContainer`\
  \ 的实例。`#{cc.attrs}` 是组件属性映射的快捷方式，可通过 `UIComponent#getAttributes()` 获取。在 `required`\
  \ 属性中使用的 `#{cc.attrs.required}` 因此引用了 `<cc:attribute name=\"required\">`，你可以在客户端将其定义为\
  \ `<t:inputLocalTime required=\"true\">`。\n\n`<span>` 元素中的 `#{cc.clientId}` 只是将复合组件的客户端\
  \ ID 作为 `<span>` 元素的 `id` 属性打印出来。这实际上是一种技巧，以便能够使用来自模板客户端的客户端 ID 搜索表达式来引用“整个”复合组件。想象以下情况：\n\
  \n如果没有将 `#{cc.clientId}` 渲染为包裹 `<cc:implementation>` 整个主体的任何纯 HTML 元素（通常是 `<span>`\
  \ 或 `<div>`）的 ID，这种情况将无法工作。技术问题在于，虽然复合组件本身可以通过组件 ID 搜索表达式在 Jakarta Faces 组件树中找到，但复合组件的\
  \ HTML 表示默认情况下无法通过 JavaScript 中的 `document.getElementById(clientId)` 获取。换句话说，Jakarta\
  \ Faces Ajax 将无法更新它。因此，显式添加一个带有复合组件客户端 ID 的纯 HTML 元素可以解决这个问题。\n\n最后，有一堆 `#{cc}`\
  \ 表达式并不直接引用 `#{cc.attrs}`。两个 `<h:selectOneMenu>` 组件都通过 `binding` 属性直接绑定为所谓的后备组件（backing\
  \ component）的属性，即复合组件背后的具体 `UIComponent` 实例。并且两个 `<f:selectItems>` 选项列表也直接从后备组件获取其值。以下是后备组件类的实现方式，`com.example.project.composite.InputLocalTime`：\n\
  \n```\n@FacesComponent(\"inputLocalTime\")\npublic class InputLocalTime extends\
  \ UIInput implements NamingContainer {\nprivate static final List HOURS =\nIntStream.rangeClosed(0,\
  \ 23).boxed()\n.map(InputLocalTime::pad).collect(Collectors.toList());\nprivate\
  \ static final List MINUTES =\nIntStream.rangeClosed(0, 59).boxed()\n.map(InputLocalTime::pad).collect(Collectors.toList());\n\
  private UIInput hour;\nprivate UIInput minute;\n@Override\npublic String getFamily()\
  \ {\nreturn UINamingContainer.COMPONENT_FAMILY;\n}\n@Override\npublic void encodeBegin(FacesContext\
  \ context) throws IOException {\nLocalTime localTime = (LocalTime) getValue();\n\
  if (localTime != null) {\nhour.setValue(pad(localTime.getHour()));\nminute.setValue(pad(localTime.getMinute()));\n\
  }\nsuper.encodeBegin(context);\n}\n@Override\npublic Object getSubmittedValue()\
  \ {\nString submittedHour = (String) hour.getSubmittedValue();\nString submittedMinute\
  \ = (String) minute.getSubmittedValue();\nif (submittedHour == null || submittedMinute\
  \ == null) {\nreturn null;\n}\nelse if (submittedHour.isEmpty() || submittedMinute.isEmpty())\
  \ {\nreturn \"\";\n}\nelse {\nreturn submittedHour + \":\" + submittedMinute;\n\
  }\n}\n@Override\nprotected Object getConvertedValue\n(FacesContext context, Object\
  \ submittedValue)\n{\nString submittedTime = (String) submittedValue;\nif (submittedTime\
  \ == null || submittedTime.isEmpty()) {\nreturn null;\n}\ntry {\nreturn LocalTime.parse(submittedTime,\n\
  DateTimeFormatter.ISO_LOCAL_TIME);\n}\ncatch (DateTimeParseException e) {\nthrow\
  \ new ConverterException(e);\n}\n}\nprivate static String pad(Integer value) {\n\
  return String.format(\"%02d\", value);\n}\npublic UIInput getHour() { return hour;\
  \ }\npublic void setHour(UIInput hour) { this.hour = hour; }\npublic UIInput getMinute()\
  \ { return minute; }\npublic void setMinute(UIInput minute) { this.minute = minute;\
  \ }\npublic List getHours() { return HOURS; }\npublic List getMinutes() { return\
  \ MINUTES; }\n}\n```\n\n\n\n刚才那段代码有点复杂。你不仅会看到 getter 和 setter 为了简洁而被折叠，还会看到我们的复合组件继承了\
  \ `UIInput` 并实现了 `NamingContainer`。继承自 `UIInput` 的好处是，我们无需在后台组件中重复 `UIInput` 的大部分默认编码和解码行为，因此只需要重写少数几个方法即可。实现\
  \ `NamingContainer` 是 `<cc:interface>` 的技术要求。这使您能够在同一上下文中使用复合组件的多个实例，而不会遇到“重复组件\
  \ ID”错误。重写的 `getFamily()` 方法也反映了这一要求。\n\n构成复合组件的实际 `UIInput` 组件被声明为后台组件的属性。在本例中，它们都是\
  \ `<h:selectOneMenu>` 下拉菜单，通过 `binding` 属性与这些属性绑定。这使我们能够在编码（即处理 HTTP 响应）期间轻松设置它们的值，并在解码（即处理\
  \ HTTP 请求）期间获取提交的值。您可以在重写的 `encodeBegin()` 和 `getSubmittedValue()` 方法中分别找到相应的逻辑。\n\
  \n因此，在 `encodeBegin()` 方法中，您有机会根据模型值（如果有）准备显示的值。`getValue()` 方法继承自 `UIInput` 超类，并与复合组件的\
  \ `value` 属性绑定。您可以分解模型值，并在复合组件的各个 `UIInput` 组件中设置所需的值。`pad()` 辅助方法只是用前导零填充数字，例如，将“`1`”显示为“`01`”。在专门为\
  \ `<f:selectItems>` 静态初始化可用小时和分钟列表时，也会使用此辅助方法。\n\n在 `getSubmittedValue()` 方法中，您应该将各个\
  \ `UIInput` 组件的提交值组合成一个单独的 `String`。在 `<t:inputLocalTime>` 的具体情况下，我们按照 ISO 本地时间模式\
  \ `HH:mm` 组合成一个 `String`。反过来，`UIInput` 超类将此值传递给 `getConvertedValue()`，我们在此有机会将组合后的\
  \ `String` 转换为具体的模型值，在本例中即为 `LocalTime`。最终，`UIInput` 超类将确保在更新模型值阶段将其设置到后台 bean 中。现在您可以按如下方式使用它：\n\
  \n其中，由 `#{bean}` 表示的后台 bean 如下所示：\n\n```\n@Named @RequestScoped\npublic class Bean\
  \ {\nprivate LocalTime time;\npublic void submit() {\nSystem.out.println(\"Submitted\
  \ local time: \" + time);\n}\npublic LocalTime getTime() {\nreturn time;\n}\npublic\
  \ void setTime(LocalTime time) {\nthis.time = time;\n}\n}\n```\n\n如果您需要在复合组件内嵌套\
  \ `<f:ajax>`，以便在任何一个单独下拉菜单的更改事件期间运行某些 Ajax，那么您可以通过添加 `<cc:clientBehavior>` 来针对两个下拉菜单实现，如下所示：\n\
  \n```\n...\n\n```\n\n`<cc:clientBehavior>` 的 `name` 属性表示您应在模板客户端中声明以触发它的事件名称。\n\n\
  `<cc:clientBehavior>` 的 `default` 属性设置为 `\"true\"` 表示这是默认事件，这意味着您可以省略它，就像您可以为现有输入文本和下拉组件使用\
  \ `event=\"change\"`，为现有复选框和单选按钮组件使用 `event=\"click\"`，以及为现有命令组件使用 `event=\"action\"\
  ` 一样。\n\n`<cc:clientBehavior>` 的 `targets` 属性必须定义一个以空格分隔的 ID 集合，这些 ID 指向复合组件实现中包含的、您希望在其上触发\
  \ Ajax 事件的 `UIInput` 组件，而 `<cc:clientBehavior>` 的 `event` 属性必须定义要在目标 `UIInput` 组件上实际触发的所需事件名称。换句话说，这在底层实际上与在复合组件中实现以下内容的效果相同：\n\
  \n在这个具体示例中，`event` 属性的值恰好与 `name` 属性的值相同。起初这可能令人困惑，但它允许您轻松定义自定义事件名称。例如，以下是在您只想在\
  \ `hour` 下拉菜单更改时触发事件时使用的代码：\n\n```\n...\n\n```\n\n这样，以下 Ajax 监听器将仅在 `hour` 下拉菜单更改时触发，而不会在\
  \ `minute` 下拉菜单更改时触发。\n\n总而言之，必须指出的是，复合组件在 Jakarta Faces 2.0 中首次引入后曾被过度炒作。人们开始使用它们来“组合”整个模板、包含文件、装饰文件，甚至多个标签，而无需使用任何后台组件。也就是说，与标签文件相比，其零配置的特性非常有吸引力。所有内容都在复合组件文件本身中通过\
  \ `<cc:interface>` 声明。并且它们可以直接在模板客户端中使用，只需遵循约定，无需在某些 XML 文件中进行配置。需要注意的是，由于其内部设计，与普通的包含文件、装饰文件和标签文件相比，复合组件在构建和恢复视图时相对昂贵，尤其是在深度嵌套的情况下。因此，最佳实践是仅在您确实需要通过\
  \ `<cc:interface componentType>` 使用后台组件时才使用它们。对于任何其他情况，请改用包含文件、装饰文件或标签文件。在前面的章节中，您可能已经了解到，借助\
  \ Jakarta Tags，标签文件可以非常强大。\n\n**递归复合组件**\n您可以安全地将复合组件相互嵌套。但是，当您递归地将同一个复合组件嵌套在自身内部时，当\
  \ EL 尝试解析 `#{cc}` 背后的具体复合组件实例时，将会因堆栈溢出错误而失败。^((66))\n\n假设您有一个递归树模型，它表示某种讨论线程，例如电子邮件及其所有回复，或博客评论及其所有回复，其中每个回复又可以有另一组回复。这可以表示为单个\
  \ Jakarta Persistence 实体，如下所示：\n\n```\n@Entity\npublic class Message {\n@Id @GeneratedValue(strategy=IDENTITY)\n\
  private Long id;\n@Lob @Column(nullable = false)\nprivate @NotNull String text;\n\
  @ManyToOne\nprivate Message replyTo;\n@OneToMany(mappedBy = \"replyTo\")\nprivate\
  \ List replies = Collections.emptyList();\n// 添加/生成其余的 getter 和 setter。\n}\n```\n\
  \n请注意，`replyTo` 属性表示当前消息所回复的父消息，而 `replies` 属性表示对当前消息的所有回复。然后，可以在 `MessageService`\
  \ 中按如下方式查询树结构：\n\n```\npublic List tree() {\nreturn entityManager.createQuery(\n\
  \"SELECT DISTINCT m FROM Message m\"\n+ \" LEFT JOIN FETCH m.replies r\"\n+ \" ORDER\
  \ BY m.id ASC\", Message.class)\n.getResultList().stream()\n.filter(m -> m.getReplyTo()\
  \ == null)\n.collect(toList());\n}\n```\n\n请注意，随后对结果列表进行过滤乍一看效率低下，但实际上，每条消息只被检索一次，并简单地在\
  \ `replies` 属性中被引用。\n\n现在，您会直观地将 `<t:message>` 复合组件实现为如下形式：\n\n```\n\n#{cc.attrs.value.text}\n\
  \n```\n\n然后按如下方式使用它：\n\n\n\n你可能会疑惑，为什么在复合组件的实现中使用了 `<c:forEach>` 而不是 `<ui:repeat>`。原因相对简单：`<ui:repeat>`\
  \ 在视图构建阶段会被忽略。换句话说，如果在那里使用 `<ui:repeat>`，那么 `<t:message>` 会将自己包含在一个无限循环中。如果你需要记住原因和解决方法，请回到第\
  \ 3 章的“Jakarta 标签”部分。但即使采用之前的实现，你仍然会遇到无限循环。你知道 `#{cc}` 引用的是当前复合组件的实例。在底层，当 `#{reply}`\
  \ 被传递给嵌套的复合组件时，实际上传递的是对 `#{cc.attrs.value.replies[index]}` 的引用。这本身没有问题。但是，当嵌套的复合组件反过来从这个别名中求值\
  \ `#{cc}` 部分时，它会引用自身而不是父复合组件。因此，就产生了无限循环。\n\n理论上，你可以通过将 `#{cc}` 替换为 `#{cc.parent}`\
  \ 来解决这个问题，后者会返回 `UIComponent#getParent()`。\n\n```\n...\n\n...\n\n```\n\n然而，这仍然不起作用。在底层，在嵌套的复合组件内部，当\
  \ EL 求值器遇到 `#{cc.parent}` 并尝试对其求值“`attrs.value`”时，父复合组件会返回另一个形式为 `#{cc.attrs.value}`\
  \ 的 EL 表达式，该表达式最终会被求值。但是，`#{cc}` 部分仍然被解释为“当前复合组件”，而它位于嵌套的复合组件内部，因此就是嵌套的复合组件本身。\n\
  \n我们只能通过让父复合组件不返回另一个 EL 表达式，而是返回已经求值后的值来解决这个问题。这可以通过在后台组件中重写 `UIComponent#setValueExpression()`\
  \ 来实现，在该方法中检查代表 `#{cc.attrs.value}` 的 `ValueExpression` 是否即将被设置到组件上，然后立即对其求值，并将结果存储为复合组件的局部变量。这应该不会造成损害，因为它本应是一个只读属性。\n\
  \n```\n@FacesComponent(\"messageComposite\")\npublic class MessageComposite extends\
  \ UINamingContainer {\nprivate Message message;\n@Override\npublic void setValueExpression\n\
  (String attributeName, ValueExpression expression)\n{\nif (\"value\".equals(attributeName))\
  \ {\nELContext elContext = getFacesContext().getELContext();\nmessage = (Message)\
  \ expression.getValue(elContext);\n}\nelse {\nsuper.setValueExpression(attributeName,\
  \ expression);\n}\n}\npublic Message getMessage() {\nreturn message;\n}\n}\n```\n\
  \n有了这个后台组件，并在实现中将“`attrs.value`”替换为“`message`”，它最终就能正常工作了。\n\n```\n\n#{cc.message.text}\n\
  \n```\n\n隐式 EL 对象\n\n在 Facelets 文件中，有许多可用的隐式 EL 对象。它们主要是当前 faces 上下文中重要工件、作用域、映射和组件的快捷方式。表\
  \ 7-1 提供了它们的概览。\n\n表 7-1\nJakarta Faces 的 EL 上下文中可用的隐式 EL 对象\n\n隐式 EL 对象 |\n 解析为\
  \ |\n 返回 |\n 自版本起 |\n\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\
