  “组件超类”一列指明了该组件所继承的最重要的 `UIComponent` 超类。你必须将指定的类理解为来自 `jakarta.faces.component`\
  \ 包。\n“值类型”一列指明了组件 `value` 属性背后模型值所支持的类型（如果存在的话）。如果值类型是 `String`，则意味着只有模型值的 `toString()`\
  \ 结果会被用作组件的值，通常用于那些将其渲染为某种标签的组件。如果是 `Object`，则意味着它支持任何类型的值，通常用于那些将其渲染为文本或将其解析为输入值的组件，必要时可借助隐式或显式的\
  \ `Converter`。如果值类型是 `Object[]`，则意味着它需要一个对象数组或集合作为模型值，通常用于数据和多选输入组件，必要时可借助隐式或显式的\
  \ `Converter`。\n有两个专门的输入组件：`<h:inputFile>`，它将上传的文件绑定到 `jakarta.servlet.http.Part`\
  \ 属性，并且不支持输出它——出于安全原因——以及 `<h:selectBooleanCheckbox>`，它将选中的值绑定到 `boolean` 属性。这两个输入组件不支持\
  \ `Converter`，因此也不支持任何其他模型值类型。\n“HTML 输出”一列指明了生成的最简 HTML 输出。如果 HTML 输出显示“必要时”，则意味着仅当组件指定了任何需要作为\
  \ HTML 元素属性输出的属性（例如 `id`、`styleClass` 和 `onclick`）时，才会生成指定的 HTML 元素。也就是说，组件可能具有一些根本不会出现在生成的\
  \ HTML 输出中的属性，例如 `binding`、`rendered` 和 `converter`。如果一个组件可以有多种 HTML 元素表示形式，那么这通常由\
  \ `layout` 属性控制，正如你在 `<h:messages>` 和 `<h:panelGroup>` 中所见。如果 HTML 输出包含“*”（星号），则意味着该组件可能会生成零个或多个指定的嵌套\
  \ HTML 元素。\n“自版本”一列指明了该 HTML 组件首次可用的 Jakarta Faces 版本。在本书撰写时，可用的 Jakarta Faces 版本如下：1.0（2004\
  \ 年 3 月）、1.1（2004 年 5 月）、1.2（2006 年 5 月）、2.0（2009 年 7 月）、2.1（2010 年 11 月）、2.2（2013\
  \ 年 3 月）、2.3（2017 年 3 月）、2.0（2020 年 10 月）和 4.0（2022 年 5 月）。\n各个 HTML 组件的详细信息将在第\
  \ 4 章和第 6 章中介绍。\n\n标准核心标签\n\n除了标准 HTML 组件之外，Jakarta Faces 还提供了一组“核心”标签。这些本质上是“辅助”标签，允许你通过将它们嵌套在目标\
  \ HTML 组件中或包裹在它们周围，以声明方式配置一个或多个目标 HTML 组件。这些核心标签可在 XML 命名空间 URI `jakarta.faces.core`\
  \ 下使用，该 URI 应分配给“`f`”XML 命名空间前缀。\n\n从技术上讲，这些标签旨在可重用于非 HTML 组件。Jakarta Faces 还提供了将不同的渲染套件附加到组件树的可能性，该渲染套件不生成\
  \ HTML 输出，而是生成不同的标记，因此使用了不同的 XML 命名空间。表 3-2 提供了一个概览。\n\n表 3-2\nJakarta Faces 提供的标准核心标签\n\
