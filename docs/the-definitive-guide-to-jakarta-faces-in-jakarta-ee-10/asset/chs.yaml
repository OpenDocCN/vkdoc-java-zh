  \ |\n UIViewRoot (body resource) |\n 2.3 |\n\n\n\n“创建/处理”列指定了核心标签在指定目标组件上创建或处理的内容。\n\
  “目标组件”列指定了核心标签所支持的目标组件超类或接口。你必须将指定的超类或接口理解为来自 `jakarta.faces.component` 包。如果目标组件以可选复数形式出现，如\
  \ `UIComponent(s)`，则表示核心标签可以嵌套在目标组件内部，也可以包装在一个或多个目标组件中。如果目标组件以显式复数形式出现，如 `UIComponents`，则表示核心标签只能包装一个或多个目标组件，因此不能嵌套。\n\
  \n至于目标组件接口，`ActionSource` 接口由 `UICommand` 组件实现。`ClientBehaviorHolder` 接口由 `UIForm`、`UIInput`、`UICommand`、`UIData`、`UIOutput`、`UIPanel`\
  \ 和 `UIOutcomeTarget` 组件实现。`ValueHolder` 接口由 `UIOutput` 和 `UIInput` 组件实现。`EditableValueHolder`\
  \ 接口由 `UIInput` 组件实现。根据表 3-1，你应该能够从中推导出实际的 HTML 组件。\n\n“自”列指明了核心标签首次可用的 Jakarta\
  \ Faces 版本。在撰写本书时，可用的 Jakarta Faces 版本如下：1.0（2004 年 3 月）、1.1（2004 年 5 月）、1.2（2006\
  \ 年 5 月）、2.0（2009 年 7 月）、2.1（2010 年 11 月）、2.2（2013 年 3 月）、2.3（2017 年 3 月）、2.0（2020\
  \ 年 10 月）和 4.0（2022 年 5 月）。\n大多数单独的核心标签会在不同的章节中详细说明。\n\n生命周期\nJakarta Faces 拥有一个定义非常清晰的生命周期。它被分解为六个阶段。每个阶段都会让\
  \ HTTP 请求穿过组件树，对其执行操作，并触发组件系统事件。本章引言部分已结合图表（图 3-1）给出了简要描述。以下各节将描述 Jakarta Faces\
  \ 生命周期的每个单独阶段。\n\n恢复视图阶段（第一阶段）\n首先，创建 `UIViewRoot` 实例，并根据任何 `<f:view>` 标签设置其属性，例如\
  \ `locale`。此时组件树通常是空的。仅当当前请求是回传请求，或者视图包含带有子元素的 `<f:metadata>` 时，才会根据视图定义构建完整的组件树。基本上，会根据视图中定义的组件标签实例化一个特定的\
  \ `UIComponent` 子类，并用视图中定义的所有属性填充它，然后调用 `UIComponent#setParent()`，并传入实际的父组件。\n`UIComponent#setParent()`\
  \ 方法会首先检查是否已存在一个父组件，如果存在，则会在旧父组件上触发 `PreRemoveFromViewEvent`。然后，当新父组件设置完毕，当前组件成为组件树的一部分时，会使用当前组件触发\
  \ `PostAddToViewEvent`。\n如果当前请求是回传请求，则会将由 `jakarta.faces.ViewState` 请求参数标识的“视图状态”恢复到新构建的组件树中。之后，会为树中的每个组件显式触发\
  \ `PostRestoreStateEvent`，即使组件树实际上并未被恢复。换句话说，即使不是回传请求，也会触发该事件。你最好将该事件重新理解为“`PostRestoreViewPhase`”。如果你在\
  \ `PostRestoreStateEvent` 期间确实关心它是否是回传请求，那么你还应该查阅 `FacesContext#isPostback()`。\n\
  到恢复视图阶段结束时，如果组件树仍然为空，则生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过中间的任何阶段。\n\n应用请求值阶段（第二阶段）\n`UIComponent#processDecodes()`\
  \ 方法将在 `UIViewRoot` 上被调用。`processDecodes()` 方法会首先在每个子组件和 facet 上调用 `processDecodes()`\
  \ 方法，然后在其自身上调用 `UIComponent#decode()`。最后，将调用 `UIViewRoot#broadCastEvents()` 来触发为当前阶段排队的任何\
  \ `FacesEvent`。默认的 Jakarta Faces API（应用程序编程接口）不为应用请求值阶段提供此类事件，但开发者可以创建并排队自己的事件。\n\
  `decode()` 方法的默认实现将委托给 `Renderer#decode()` 方法。在组件或渲染器的 `decode()` 方法中，实现有机会从 HTTP\
  \ 请求参数中提取提交的值，并将其设置为内部属性。在标准 HTML 组件集中，唯一执行此操作的组件是派生自 `UIForm`、`UIInput` 和 `UICommand`\
  \ 的基于 HTML 表单的组件。`UIForm` 组件将使用 `true` 调用 `UIForm#setSubmitted()`。`UIInput` 组件将使用\
  \ HTTP 请求参数值调用 `UIInput#setSubmittedValue()`。`UICommand` 组件将为调用应用程序阶段（第五阶段）排队 `ActionEvent`。\n\
  \n处理验证阶段（第三阶段）\n`UIComponent#processValidators()` 将在 `UIViewRoot` 上被调用。`processValidators()`\
  \ 方法基本上会首先为当前组件触发 `PreValidateEvent`，然后在每个子组件和 facet 上调用 `processValidators()`，最后为当前组件触发\
  \ `PostValidateEvent`。之后，将调用 `UIViewRoot#broadCastEvents()` 来触发为当前阶段排队的任何 `FacesEvent`，这通常是\
  \ `ValueChangeEvent` 的一个实例。\n在标准 HTML 组件集中，只有 `UIInput` 组件在此处行为不同。在调用每个子组件和 facet\
  \ 的 `processValidators()` 之前，它们会首先在其自身上调用 `UIInput#validate()`。如果在应用请求值阶段（第二阶段）设置了提交的值，那么它们会首先在任何附加的\
  \ `Converter` 上调用 `Converter#getAsObject()`。如果它没有抛出 `ConverterException`，那么它们会在每一个附加的\
  \ `Validator` 实例上调用 `Validator#validate()`，无论其中是否有任何一个抛出了 `ValidatorException`。如果没有抛出\
  \ `ConverterException` 或 `ValidatorException`，则将使用转换并验证后的值调用 `UIInput#setValue()`，并且\
  \ `UIInput#isLocalValueSet()` 标志将返回 `true`，同时将使用 `null` 调用 `UIInput#setSubmittedValue()`。如果抛出了任何\
  \ `ConverterException` 或 `ValidatorException`，则将使用 `false` 调用 `UIInput#setValid()`，并且异常消息将通过\
  \ `FacesContext#addMessage()` 添加到 faces 上下文中。最后，当 `UIInput#isValid()` 返回 `false`\
  \ 时，将使用 `true` 调用 `FacesContext#setValidationFailed()`。\n到该阶段结束时，如果 `FacesContext#isValidationFailed()`\
  \ 返回 `true`，则生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过中间的任何阶段。\n\n\n\n更新模型值阶段（第四阶段）\n`UIViewRoot`\
  \ 上会调用 `UIComponent#processUpdates()` 方法。`processUpdates()` 方法随后会依次在每个子组件和方面（facet）上调用\
  \ `processUpdates()` 方法。最后，将调用 `UIViewRoot#broadCastEvents()` 来触发为当前阶段排队的任何 `FacesEvent`。默认的\
  \ Jakarta Faces API 并未为更新模型值阶段提供此类事件，但开发者可以创建并排队自己的事件。\n同样在此阶段，来自标准 HTML 组件集的组件中，只有\
  \ `UIInput` 组件具有额外的功能。在每个子组件和方面上调用 `processUpdates()` 之后，它们会在自身调用 `UIInput#updateModel()`。当\
  \ `UIInput#isValid()` 和 `UIInput#isLocalValueSet()` 都返回 `true` 时，它们将以 `getLocalValue()`\
  \ 作为参数调用 `value` 属性背后的 setter 方法，并立即以 `null` 为参数调用 `UIInput#setValue()`，并通过让 `UIInput#isLocalValueSet()`\
  \ 返回 `false` 来清除其标志。\n如果此处抛出 `RuntimeException`（通常由 setter 方法本身的错误引起），则会以 `false`\
  \ 为参数调用 `UIInput#setValid()` 并排队 `UpdateModelException`，生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过其间的任何阶段。\n\
  \n调用应用程序阶段（第五阶段）\n将调用 `UIViewRoot#processApplication()` 方法。此方法随后会调用 `UIViewRoot#broadCastEvents()`\
  \ 来触发为当前阶段排队的任何 `FacesEvent`，这通常是 `AjaxBehaviorEvent` 或 `ActionEvent` 的实例。请注意，`processApplication()`\
  \ 方法仅在 `UIViewRoot` 类上定义，并且不会遍历组件树。\n\n渲染响应阶段（第六阶段）\n当组件树仍为空时（即，当 HTTP 请求不是回发请求，或者视图没有带子元素的\
  \ `<f:metadata>`，或者开发者在此期间使用自己的实例显式调用了 `FacesContext#setViewRoot()`），则基于视图定义构建完整的组件树。当组件树存在时，首先为\
  \ `UIViewRoot` 触发 `PreRenderViewEvent`，然后在 `UIViewRoot` 上调用 `UIComponent#encodeAll()`，最后为\
  \ `UIViewRoot` 触发 `PostRenderViewEvent`。\n每个组件的 `UIComponent#encodeAll()` 方法基本上会首先调用其自身的\
  \ `encodeBegin()` 方法。然后，如果 `getRendersChildren()` 方法返回 `true`，则组件将调用其自身的 `encodeChildren()`\
  \ 方法，否则它将在每个子组件上调用 `encodeAll()`。最后，组件将调用其自身的 `encodeEnd()` 方法。这一切仅在 `UIComponent#isRendered()`\
  \ 返回 `true` 时发生——即，当组件标签的 `rendered` 属性计算结果不为 `false` 时。\n`encodeBegin()` 方法的默认实现将首先为当前组件触发\
  \ `PreRenderComponentEvent`，然后委托给 `Renderer#encodeBegin()`。`encodeChildren()` 方法的默认实现将委托给\
  \ `Renderer#encodeChildren()`。`encodeEnd()` 方法的默认实现将委托给 `Renderer#encodeEnd()`。如果组件没有附加渲染器，即当\
  \ `UIComponent#getRendererType()` 返回 `null` 时，则不会向响应中渲染任何 HTML 输出。\n在 `encodeBegin()`\
  \ 方法中，组件或渲染器实现有机会将开头的 HTML 元素及其所有属性写入响应。在 `encodeChildren()` 方法中，组件或渲染器实现有机会在必要时装饰或覆盖子元素的渲染。在\
  \ `encodeEnd()` 方法中，组件或渲染器实现有机会写入结束的 HTML 标签。写入响应是通过 `FacesContext#getResponseWriter()`\
  \ 提供的响应写入器完成的。\n对于在任何阶段触发的任何提到的 `XxxEvent` 类，如果任何监听器方法抛出 `jakarta.faces.event.AbortProcessingException`，^(⁴)\
  \ 则当前正在运行的阶段将立即中止，并且生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过其间的任何阶段。\n\nAjax 生命周期\n在 Ajax 请求期间，生命周期几乎相同。只有第二、第三、第四和第六阶段略有不同。`processDecodes()`、`processValidators()`\
  \ 和 `processUpdates()` 方法将仅在 `UIViewRoot` 本身以及 `<f:ajax execute>` 中指定的组件搜索表达式所涵盖的任何组件上调用。而\
  \ `encodeAll()` 方法将仅在 `UIViewRoot` 本身以及 `<f:ajax render>` 中指定的组件搜索表达式所涵盖的任何组件上调用。有关搜索表达式的更多信息，请参阅第\
  \ 12 章。\n因此请注意，当组件搜索表达式包含“`@all`”关键字时，Ajax 生命周期没有区别。它会不必要地处理和编码整个组件树。换句话说，请谨慎使用“`@all`”。对于\
  \ `<f:ajax execute=\"@all\">`，没有合理的实际用例。在 HTML 方面，不可能一次提交多个表单。只有包含的表单会被提交。因此，最大的价值在于\
  \ `<f:ajax execute=\"@form\">`。然而，对于 `<f:ajax render=\"@all\">` 有一个合理的实际用例，即在 Ajax\
  \ 请求期间抛出异常时渲染完整的错误页面。即便如此，这也可以通过 `PartialViewContext#setRenderAll()` 以编程方式更好地触发。有关更多详细信息，请参阅第\
  \ 9 章。\n\n\n\n视图构建时间\n“视图构建时间”并不与 Jakarta Faces 生命周期的特定阶段绑定。视图构建时间是指根据视图定义，用其所有子节点填充物理\
  \ `UIViewRoot` 实例的时刻。\n\n当 Jakarta Faces 即将根据视图定义创建 `UIComponent` 实例时，它会首先检查 `binding`\
  \ 属性（如果有）背后的 getter 方法是否返回一个具体的 `UIComponent` 实例。\n如果是，则继续使用该实例；否则，根据与之关联的“组件类型”创建\
  \ `UIComponent` 实例，然后调用 `binding` 属性（如果有）背后的 setter 方法。如果指定了 `id` 属性，则会调用 `UIComponent#setId()`。最后，会调用\
  \ `UIComponent#setParent()` 传入父组件，然后该组件实例在物理上成为组件树的一部分。此树将一直存在，直到渲染响应阶段（第六阶段）结束。之后，它连同已释放的\
  \ faces 上下文实例一起，有资格被垃圾回收器回收。\n\n因此，`UIComponent` 实例本质上是请求作用域的。`binding` 属性可以引用一个受管\
  \ bean 属性，但由于 `UIComponent` 实例本质上是请求作用域的，目标受管 bean 也必须是请求作用域的，而不能是更宽的作用域。Jakarta\
  \ Faces API 不会检查这一点，因此作为 Jakarta Faces 开发者，你务必确保不会在任何组件的 `binding` 属性中引用更宽作用域的受管\
  \ bean。\n\n当任何组件的 `binding` 属性错误地引用了一个作用域宽于请求作用域的受管 bean 时，你不仅会在 bean 是视图或会话作用域的情况下，将整个组件树基本保存到\
  \ HTTP 会话中，而且还会在并发访问同一个受管 bean 实例的多个 HTTP 请求之间共享整个组件树。这非常低效且危险。\n\n从技术上讲，视图构建时间可以发生在\
  \ Jakarta Faces 生命周期的任何阶段。通常，它发生在恢复视图阶段（第一阶段），特别是在回传请求期间，或者当视图包含带有子节点的 `<f:metadata>`\
  \ 时。它也可能发生在渲染响应阶段（第六阶段），特别是在 GET 请求期间，当视图没有带有子节点的 `<f:metadata>` 时，或者当回传期间发生了非重定向导航时。当开发者以编程方式调用\
  \ `ViewDeclarationLanguage#buildView()` 时也会发生，这可以通过 `ViewHandler#createView()` 等方式隐式完成，如下面的操作方法示例所示，该方法强制\
  \ Jakarta Faces 从头开始完全重建当前视图：\n\n```\npublic void rebuildCurrentView() {\nFacesContext\
  \ context = FacesContext.getCurrentInstance();\nUIViewRoot currentView = context.getViewRoot();\n\
  String viewId = currentView.getViewId();\nViewHandler viewHandler = context.getApplication.getViewHandler();\n\
  UIViewRoot newView = viewHandler.createView(context, viewId);\ncontext.setViewRoot(newView);\n\
  }\n```\n\n请注意，视图状态并不一定在视图构建期间被恢复到组件树中。视图状态仅在恢复视图阶段（第一阶段）被恢复到组件树中，并且这发生在 `FacesServlet`\
  \ 自行执行视图构建时间之后。换句话说，前面展示的 `rebuildCurrentView()` 方法不会将当前视图状态恢复到新创建的组件树中。当像上面那样以编程方式重建视图时，通常不建议以编程方式恢复视图状态，因为在真实的\
  \ Jakarta Faces 应用程序中，重建当前视图的唯一原因通常是摆脱由持久化视图状态引起的任何更改，和/或基于受管 bean 中新更改的值强制重新执行任何\
  \ Jakarta 标签。\n\n视图渲染时间\n“视图渲染时间”也不与 Jakarta Faces 生命周期的特定阶段绑定。视图渲染时间是指调用特定组件的 `UIComponent#encodeAll()`\
  \ 的时刻。\n诚然，默认情况下，它总是在渲染响应阶段（第六阶段）由 `FacesServlet` 在 `UIViewRoot` 上执行，但这并不妨碍你在不同阶段以编程方式调用它，例如在调用应用程序阶段（第五阶段），以便将任意组件生成的\
  \ HTML 输出作为 `String` 变量获取。\n\n视图状态\n正如“视图构建时间”部分所述，构成组件树的 `UIComponent` 实例本质上是请求作用域的。它们在视图构建期间创建，并在渲染响应阶段（第六阶段）之后立即销毁。对\
  \ `UIComponent` 实例属性的任何更改（这些属性未被 EL（表达式语言）表达式引用，且与其默认值不同）都将作为“视图状态”保存。换句话说，“视图状态”绝对不等同于“组件树”。此外，如果整个组件树本身被保存在视图状态中，这不仅会导致不必要的臃肿视图状态，还会导致应用程序行为损坏，因为\
  \ `UIComponent` 实例本质上不是线程安全的，因此绝对不能跨多个 HTTP 请求共享。\n\n保存视图状态通常发生在视图渲染期间。在此过程中，Jakarta\
  \ Faces 会将视图状态写入生成的每个 Jakarta Faces 表单的 HTML 表示中的一个 `jakarta.faces.ViewState` 隐藏输入字段。当\
  \ Jakarta Faces “状态保存方法”设置为默认值“server”时，隐藏输入值代表一个唯一标识符，引用存储在 HTTP 会话中的序列化视图状态对象。当使用以下\
  \ `web.xml` 上下文参数将 Jakarta Faces “状态保存方法”显式设置为“client”时，隐藏输入值本身代表序列化视图状态对象的加密形式。\n\
  \n```\njakarta.faces.STATE_SAVING_METHOD\nclient\n\nfaces/ClientSideSecretKey\n\
  java.lang.String\n[AES key in Base64 format]\n\n```\n\n请注意，如果你在服务器集群（“云”）上运行 Jakarta\
  \ Faces 应用程序，或者希望视图状态在服务器重启后仍然有效，则必须显式指定带有固定 AES（高级加密标准）密钥的 `faces/ClientSideSecretKey`\
  \ 环境条目。你可以使用以下简单的 Java 代码片段自己生成 Base64 编码的 AES 密钥：\n\n```\nKeyGenerator keyGen =\
  \ KeyGenerator.getInstance(\"AES\");\nkeyGen.init(256); // 如果没有 JCE，则使用 128。\nbyte[]\
  \ rawKey = keyGen.generateKey().getEncoded();\nString key = Base64.getEncoder().encodeToString(rawKey);\n\
  System.out.println(key); // 打印 Base64 格式的 AES 密钥。\n```\n\n\n\n标准 Jakarta Faces 表单（以\
  \ `<h:form>` 为代表）默认使用 `POST` 方法提交到与包含该表单的 Jakarta Faces 页面所请求的完全相同的 HTTP 请求 URI。换句话说，当你通过\
  \ `http://example.com/project/page.xhtml` 请求一个 Jakarta Faces 页面时，表单将提交到完全相同的 `http://example.com/project/page.xhtml`\
  \ URI。这在 Web 开发术语中被称为“回发”。当 Jakarta Faces 需要处理一个传入的回发请求时，恢复视图阶段（第一阶段）将在视图构建时间之后，从\
  \ `jakarta.faces.ViewState` HTTP 请求参数中提取视图状态，并将所有已更改的属性恢复到当前请求中新创建的 `UIComponent`\
  \ 实例中，以便组件树最终能够精确反映与先前请求的视图渲染期间完全相同的状态。\n\n在一般的 Jakarta Faces Web 应用程序中，保存的视图状态的主要部分由实现\
  \ `jakarta.faces.component.EditableValueHolder` 接口的 `UIComponent` 实例的内部属性表示，^(⁵)\
  \ 这涵盖了所有 `UIInput` 组件，例如 `<h:inputText>`。当提交 Jakarta Faces 表单因转换或验证错误而失败时，所有已更改的“是否有效？”状态和“本地值”状态（可以是提交的字符串值，也可以是已转换并验证的值）都将为所有涉及的\
  \ `UIInput` 组件保存在视图状态中。这样做的一个主要优点是，开发人员无需担心手动跟踪这些状态，以便在向网站用户重新呈现提交的表单时保留所有有效和无效的值，同时使模型（受管\
  \ bean 属性）完全不受这些值的影响。这对于 Jakarta Faces 开发人员和网站用户来说都是一个主要的可用性优势。\n\n保存的视图状态中的一小部分由对组件树层次结构或组件属性的程序化更改表示。其中，对\
  \ `readonly`、`disabled` 和 `rendered` 属性的任何程序化更改都会被跟踪在视图状态中，这样黑客就没有机会以某种方式伪造请求，使这些属性翻转到错误的一侧，从而让黑客可能执行潜在的危险操作。这是一个主要的安全优势。\n\
  \n视图作用域\nJakarta Faces 所基于的 Servlet API（以及其他技术）提供了三个定义明确的作用域：请求作用域、会话作用域和应用作用域。基本上，请求作用域是通过将目标对象存储为\
  \ `HttpServletRequest` 的一个属性来建立的。类似地，会话作用域是通过将目标对象存储为 `HttpSession` 的一个属性来建立的，而应用作用域是通过将目标对象存储为\
  \ `ServletContext` 的一个属性来建立的。\nJakarta Faces 在此基础上增加了一个作用域，即视图作用域。这不能与组件树本身混淆。组件树（物理上的\
  \ `UIViewRoot` 实例）在同一个 HTTP 请求期间被创建和销毁，因此显然是请求作用域的。视图作用域也不能与视图状态混淆，尽管它们密切相关。\n当最终用户在\
  \ Jakarta Faces 表单上触发回发请求，并且应用程序不执行任何类型的导航（即，操作方法返回 `null` 或 `void`）时，视图状态标识符将保持不变，并且视图作用域的生命周期将延长到下一个回发请求，直到应用程序执行显式导航，或者\
  \ HTTP 会话过期。你可以通过将目标对象存储为 `UIViewRoot#getViewMap()` 的一个条目来建立视图作用域。这正是 Jakarta Faces\
  \ 存储其 `@ViewScoped` 受管 bean 的地方。不，这个映射不会反过来存储在视图状态中，即使 Jakarta Faces 状态保存方法被显式设置为“客户端”也是如此。整个视图作用域存储在\
  \ HTTP 会话中，与视图状态分开。只有视图作用域标识符存储在视图状态中。只有 `UIViewRoot` 实例的已更改属性存储在视图状态中。\n\n阶段事件\n\
  `jakarta.faces.event.PhaseListener` 接口^(⁶) 可用于监听 Jakarta Faces 生命周期的任何阶段。该接口定义了三个方法：`getPhaseId()`，它应返回你感兴趣的阶段；`beforePhase()`，它将在指定阶段执行之前被调用；以及\
  \ `afterPhase()`，它将在指定阶段执行之后被调用。在 `beforePhase()` 和 `afterPhase()` 方法中，你因此有机会在 `getPhaseId()`\
  \ 指定的阶段之前或之后运行一些代码。\n\n`jakarta.faces.event.PhaseId` 类^(⁷) 定义了一组公共常量。它仍然可以追溯到 Jakarta\
  \ Faces 1.0，该版本仅在 Java 1.5 发布前几个月发布，因此为时已晚，无法成为真正的 `enum`。以下是这些常量及其序数值：\n\n*   `PhaseId.ANY_PHASE`\
  \ (0)\n*   `PhaseId.RESTORE_VIEW` (1)\n*   `PhaseId.APPLY_REQUEST_VALUES` (2)\n\
  *   `PhaseId.PROCESS_VALIDATIONS` (3)\n*   `PhaseId.UPDATE_MODEL_VALUES` (4)\n*\
  \   `PhaseId.INVOKE_APPLICATION` (5)\n*   `PhaseId.RENDER_RESPONSE` (6)\n\n阶段监听器实例可以通过多种方式注册。声明式地，它们可以通过\
  \ `faces-config.xml` 在整个应用程序范围内注册：\n\n```\ncom.example.project.YourListener\n\n\
  ```\n\n或者通过 `<f:view>` 内的 `<f:phaseListener>` 标签在整个视图范围内注册：\n\n```\n\n...\n\n```\n\
  \n编程式地，它们可以通过当前使用的 `jakarta.faces.lifecycle.Lifecycle` 实例的 `addPhaseListener()`\
  \ 和 `removePhaseListener()` 方法在整个应用程序范围内添加和移除。^(⁸)\n\n```\nFacesContext context\
  \ = FacesContext.getCurrentInstance();\nLifecycle lifecycle = context.getLifecycle();\n\
  lifecycle.addPhaseListener(new YourListener());\n```\n\n并且它们可以通过 `UIViewRoot` 的\
  \ `addPhaseListener()` 和 `removePhaseListener()` 方法在整个视图范围内添加和移除。\n\n```\nFacesContext\
  \ context = FacesContext.getCurrentInstance();\nUIViewRoot viewRoot = context.getViewRoot();\n\
  viewRoot.addPhaseListener(new YourListener());\n```\n\n\n\n`PhaseListener` 的具体示例见“自定义组件系统事件”一节。\n\
  \n## 组件系统事件\n\n如“生命周期”一节所述，在 Jakarta Faces 生命周期中会触发一系列组件系统事件。这些事件继承自抽象类 `jakarta.faces.event.ComponentSystemEvent`。^(⁹)\
  \ 概括来说，包括以下事件：\n\n*   `PreRemoveFromViewEvent`：\n    当组件即将从组件树中移除时触发。\n\n*   `PostAddToViewEvent`：\n\
  \    当组件已添加到组件树时触发。\n\n*   `PostRestoreStateEvent`\n    （读作“`PostRestoreViewEvent`”）：\n\
  \    在恢复视图阶段结束时为每个组件触发。请注意，如果在此阶段视图尚未构建完成，则该事件仅针对 `UIViewRoot` 触发；如果视图已在此阶段构建完成，则针对树中所有组件触发。\n\
  \n*   `PreValidateEvent`：\n    当组件即将处理其转换器和验证器时触发，即使实际没有转换器或验证器也会触发。\n\n*   `PostValidateEvent`：\n\
  \    当组件完成其转换器和验证器的处理时触发，即使实际没有转换器或验证器也会触发。\n\n*   `PreRenderViewEvent`：\n    当\
  \ `UIViewRoot` 即将向 HTTP 响应写入 HTML 输出时触发。请注意，这是更改 HTTP 响应目标或以编程方式操作组件树的最晚安全时机。在此之后进行操作，无法保证对响应或组件树的程序性更改能按预期生效，因为此时响应可能已提交，或视图状态可能已保存。\n\
  \n*   `PreRenderComponentEvent`：\n    当组件即将向 HTTP 响应写入其 HTML 输出时触发。\n\n*   `PostRenderViewEvent`：\n\
  \    当 `UIViewRoot` 完成向 HTTP 响应写入 HTML 输出时触发。请注意，此事件自 Jakarta Faces 2.3 起新增，其余事件均来自\
  \ Jakarta Faces 2.0。\n\n“生命周期”一节中还有两个组件系统事件未提及：\n\n*   `PostConstructViewMapEvent`：\n\
  \    当 `UIViewRoot` 刚刚启动视图作用域时触发。\n\n*   `PreDestroyViewMapEvent`：\n    当 `UIViewRoot`\
  \ 即将销毁视图作用域时触发。\n\n这两个事件并不严格绑定于基于六个阶段的组件生命周期，它们基本上可以在生命周期的任何时刻发生。`PostConstructViewMapEvent`\
  \ 在应用程序首次调用 `UIViewRoot#getViewMap()` 时触发。默认情况下，这仅发生在当前视图状态的第一个 `@ViewScoped` 托管\
  \ Bean 被创建时。`PreDestroyViewMapEvent` 在应用程序对 `UIViewRoot#getViewMap()` 调用 `Map#clear()`\
  \ 时触发，这通常发生在已存在已设置的实例时调用 `FacesContext#setViewRoot()` 的情况下。这将结束视图作用域并销毁所有活跃的 `@ViewScoped`\
  \ 托管 Bean。通常，这仅发生在操作方法返回非 `null` 的导航结果时。\n\n你可以通过 `jakarta.faces.event.ComponentSystemEventListener`\
  \ 接口监听上述任何组件系统事件。^(¹⁰) 在 Jakarta Faces API 中，`UIComponent` 类本身已实现了 `ComponentSystemEventListener`。该接口提供了一个\
  \ `processEvent()` 方法，其参数为 `ComponentSystemEvent`，而该参数又包含一个 `getComponent()` 方法，用于返回触发事件的具体\
  \ `UIComponent` 实例。`UIComponent#processEvent()` 的默认实现会检查给定的 `ComponentSystemEvent`\
  \ 参数是否为 `PostRestoreStateEvent` 的实例，以及是否指定了 `binding` 属性；如果是，则调用 `binding` 属性对应的\
  \ setter 方法，并将组件实例本身作为参数传入。\n\n有三种方式可以为这些组件系统事件订阅监听器。第一种是在视图中声明式地使用 `<f:event>`\
  \ 标签。该标签可以附加到任何组件标签上。在相对较多的 Jakarta Faces 2.0/2.1 相关资源中，你会看到如下示例：\n\n其中 `onload()`\
  \ 方法通常实现如下：\n\n```\npublic void onload() {\nFacesContext context = FacesContext.getCurrentInstance();\n\
  if (!context.isPostback() && !context.isValidationFailed()) {\n// ...\n}\n}\n```\n\
  \n请注意，`<f:event listener=\"#{bean.onload}\">` 默认期望一个带有 `ComponentSystemEvent` 参数的方法，但如果你不需要该参数，为简洁起见可以省略，此时方法表达式应加括号，如\
  \ `<f:event listener=\"#{bean.onload()}\">`，尽管所使用的 EL 实现可能对此宽容处理。\n\n如前所示，使用 `<f:event\
  \ type=\"preRenderView\">` 本质上是一种变通方法，以便在 GET 请求期间，基于 `<f:viewParam>` 设置的模型值来模拟调用应用程序阶段。之所以需要这样做，是因为\
  \ `@PostConstruct` 不适合，它在 Bean 构造后立即被调用，远早于 `<f:viewParam>` 设置模型值。自 Jakarta Faces\
  \ 2.2 引入新的 `<f:viewAction>` 后，就不再需要 `<f:event>` 这种技巧了：\n\n其中 `onload()` 方法只需实现如下：\n\
  \n```\npublic void onload() {\n// ...\n}\n```\n\n`<f:event>` 的另一个实际应用场景是在复合组件的支持组件中实现类似\
  \ `@PostConstruct` 的行为，你可以安全地基于其属性执行任何必要的初始化。\n\n```\n...\n\n...\n#{cc.someInitializedValue}\n\
  \n```\n\n其中 `SomeComposite` 类的 `init()` 方法如下所示：\n\n```\nprivate Object someInitializedValue;\
  \ // +getter\npublic void init() {\nMap attributes = getAttributes();\nsomeInitializedValue\
  \ = initializeItBasedOn(attributes);\n}\n```\n\n第二种订阅组件系统事件监听器的方式是在 Java 代码中以编程方式使用\
  \ `UIComponent#subscribeToEvent()`。这允许你根据条件为现有组件订阅组件系统事件监听器。务必牢记，组件系统事件监听器会保存在视图状态中。换句话说，在后续回发请求的恢复视图阶段，它会被恢复到组件实例中。使用\
  \ `UIComponent#subscribeToEvent()` 时请记住这一点；否则，你可能会多次订阅同一个监听器。可以通过至少正确实现 `equals()`\
  \ 方法和 `Serializable` 接口来避免这种情况。\n\n这使得为特定组件以编程方式正确注册组件系统事件监听器变得有些复杂。如果是现有组件，最好改用\
  \ `<f:event>`；如果是自定义组件，最好改用 `@ListenerFor` 注解，这实际上是第三种方式。下面是一个以编程方式正确注册组件系统事件监听器的入门示例，前提是\
  \ `YourListener` 类正确实现了 `equals()` 和 `hashCode()` 方法，并且实现了 `Serializable`、`Externalizable`\
  \ 或 `jakarta.faces.component.StateHolder` 接口，以便能正确保存在视图状态中。\n\n```\nClass event\
  \ = PreRenderViewEvent.class;\nComponentSystemEventListener listener = new YourListener();\n\
  component.subscribeToEvent(event, listener);\n```\n\n\n\n如前所述，将监听器订阅到组件系统事件的第三种方式是声明式地使用\
  \ `@ListenerFor` 注解。你只能将此注解放在 `UIComponent` 或 `Renderer` 类上，不能将其放在支持 bean 类上。对于支持\
  \ bean 类，应改用 `<f:event>`。`@ListenerFor` 注解将目标事件作为值。具体的 `ComponentSystemEventListener`\
  \ 实例就是 `UIComponent` 实例本身。如果该注解声明在 `Renderer` 类上，那么目标组件是 `UIComponent` 实例，其 `UIComponent#getRendererType()`\
  \ 引用了特定的 `Renderer` 类。以下示例展示了自定义组件 `YourComponent` 的用法：\n\n```\n@FacesComponent(\"\
  project.YourComponent\")\n@ListenerFor(systemEventClass=PostAddToViewEvent.class)\n\
  public class YourComponent extends UIComponentBase {\n@Override\npublic void processEvent(ComponentSystemEvent\
  \ event) {\nif (event instanceof PostAddToViewEvent) {\n// ...\n}\nelse {\nsuper.processEvent(event);\n\
  }\n}\n// ...\n}\n```\n\n是的，这个 `instanceof` 检查是必要的。如“生命周期”一节所述，默认情况下，`PostRestoreStateEvent`\
  \ 会为树中的任何组件显式触发。调用 `super.processEvent(event)` 是必要的，以防此组件指定了 `binding` 属性，因为默认的\
  \ `UIComponent#processEvent()` 实现在 `PostRestoreStateEvent` 期间会调用 binding 属性背后的 setter\
  \ 方法。\n\n**自定义组件系统事件**\n\n你可以创建自己的 `ComponentSystemEvent` 类型。基本上，你需要做的就是继承 `ComponentSystemEvent`\
  \ 抽象类，在其上声明 `@NamedEvent` 注解，最后在期望的时刻调用 `Application#publishEvent()`。\n\n假设你想创建一个在调用应用阶段（第五阶段）之前触发的自定义组件系统事件，即\
  \ `PreInvokeApplicationEvent`。那么你可以按如下方式创建自定义事件：\n\n```\n@NamedEvent(shortName=\"\
  preInvokeApplication\")\npublic class PreInvokeApplicationEvent extends ComponentSystemEvent\
  \ {\npublic PreInvokeApplicationEvent(UIComponent component) {\nsuper(component);\n\
  }\n}\n```\n\n以下是你如何使用自定义的 `PhaseListener` 来发布它：\n\n```\npublic class PreInvokeApplicationListener\
  \ implements PhaseListener {\n@Override\npublic PhaseId getPhaseId() {\nreturn PhaseId.INVOKE_APPLICATION;\n\
  }\n@Override\npublic void beforePhase(PhaseEvent event) {\nFacesContext context\
  \ = FacesContext.getCurrentInstance();\ncontext.getApplication().publishEvent(context,\n\
  PreInvokeApplicationEvent.class, context.getViewRoot());\n}\n@Override\npublic void\
  \ afterPhase(PhaseEvent event) {\n// NOOP.\n}\n}\n```\n\n在 `faces-config.xml` 中注册此阶段监听器后，你可以使用\
  \ `<f:event>` 或 `@ListenerFor` 来监听此事件。一个实际应用的例子是将其嵌套在 `<f:view>` 或主模板中，或者嵌套在特定的\
  \ `<h:form>` 中，这样你就不需要在模板客户端或表单中的多个 `UICommand` 组件上复制/粘贴完全相同的 `<f:actionListener>`，甚至不需要在多个模板客户端上复制/粘贴完全相同的\
  \ `<f:viewAction>`。\n\n---\n\n**Jakarta Tags**\n\n如果你曾经使用 Jakarta Pages 进行过开发，那么你很可能会遇到过\
  \ Jakarta Tags。然而，在 Facelets 中，只有 Jakarta Tags 的一个有限子集得以重生。它们是 `<c:if>`、`<c:choose><c:when><c:otherwise>`、`<c:forEach>`、`<c:set>`\
  \ 和 `<c:catch>`。本质上，这些标签名称与 Jakarta Pages 中的相同，但其实现是为 Facelets 完全重写的。这些 Jakarta\
  \ Tags 在 `jakarta.tags.core` XML 命名空间 URI 下可用，该 URI 应分配给“`c`”XML 命名空间前缀。\n\nJakarta\
  \ Tags 的生命周期与 Jakarta Faces 标准 HTML 组件的生命周期不同。Jakarta Tags 在视图构建期间直接运行，而 Jakarta\
  \ Faces 正忙于根据视图定义构建组件树。Jakarta Tags 实际上并不会作为组件存在于 Jakarta Faces 组件树中。换句话说，你可以使用\
  \ Jakarta Tags 来控制 Jakarta Faces 组件树的构建流程。\n\n在使用 Jakarta Tags 开发 Jakarta Faces\
  \ 页面时，需要牢记的最重要的一点是，它们不参与 Jakarta Faces 的生命周期。下面，我演示了 Jakarta Tags 的标签与其在 Jakarta\
  \ Faces 或 Facelets 中的对应物之间最重要的行为差异。\n\n```\nversus \n```\n\n以下是一个 `<c:forEach>`\
  \ 示例，它遍历一个包含三个示例 `Item` 实体实例的 `List<Item>`，该实体具有 `id` 和 `value` 属性：\n\n在视图构建期间，上述使用\
  \ `<c:forEach>` 的标记会在 Jakarta Faces 组件树中创建三个物理上独立的 `HtmlOutputText` 实例，大致表示如下：\n\
  \n反过来，它们在视图渲染期间各自生成自己的 HTML 输出，如下所示：\n\n```\none\ntwo\nthree\n```\n\n请注意，Jakarta\
  \ Faces 组件的 `id` 属性也是在视图构建期间评估的，因此你需要以上述演示的方式手动确保生成的组件 ID 的唯一性。否则，Jakarta Faces\
  \ 将抛出一个 `IllegalStateException`，其消息类似于：“在视图中发现重复的组件 ID。”另一个也在视图构建期间评估的 Jakarta Faces\
  \ 组件属性是 `binding` 属性。如果你绝对需要将由 Jakarta Tags 生成的组件绑定到支持 bean 属性（这在实际应用中很少见），那么你应该指定一个唯一的数组索引、集合索引或映射键。以下是一个示例，前提是\
  \ `#{bean.components}` 引用了一个已准备好的 `UIComponent[]`、`List<UIComponent>` 或 `Map<Long,\
  \ UIComponent>` 属性：\n\nFacelets 中与 `<c:forEach>` 对应的标签是 `<ui:repeat>`。这本质上是一个 `UIComponent`。换句话说，`<ui:repeat>`\
  \ 本身在视图构建期间也会进入 Jakarta Faces 组件树。它也在视图渲染期间运行，但它本身不生成任何 HTML 输出。它基本上在每次迭代轮次中，针对当前迭代的项（作为\
  \ `var` 属性）重新执行其子项的 HTML 输出生成。\n\n在视图构建期间，上述内容在 Jakarta Faces 组件树中完全保持原样：一个 `UIRepeat`\
  \ 实例，其中嵌套了一个 `HtmlOutputText` 实例，而 `<c:forEach>` 示例则在此处创建了三个 `HtmlOutputText` 实例。然后，在视图渲染期间，同一个\
  \ `<h:outputText>` 组件被*重用*，以根据当前迭代轮次生成其 HTML 输出。\n\n```\none\ntwo\nthree\n```\n\n\
  请注意，`<ui:repeat>` 作为 `NamingContainer` 接口的一个实例，已经确保了基于迭代索引的客户端 ID 的唯一性。从技术上讲，也不可能在其任何子组件的\
  \ `id` 属性中引用其 `var` 属性，因为 `var` 属性仅在视图渲染期间设置，而 `id` 属性已在视图构建期间设置。\n\n```\n/ 对比 rendered\n\
  ```\n\n假设我们有一个自定义标签文件 `input.xhtml`，其中包含以下 Facelets 标记，使用 `<c:choose>` 有条件地添加不同的标签（更详细的示例可以在第\
  \ 7 章的“标签文件”一节中找到）：\n\n当它在视图定义中声明如下时：\n\n```\n\n那么这只会创建 `<h:inputText>` 组件在组件树中，大致表示如下：\n\
  \n如果使用 `rendered` 属性而不是 `<c:choose>`，如下所示：\n\n\n\n那么它们最终都会大致出现在组件树中，如下所示：\n\n你看，当你有许多\
  \ `<t:input>` 自定义标签时，这最终会导致组件树不必要地臃肿，并包含大量未使用的组件。因此，这里最好使用 `<c:choose>` 来代替 `rendered`\
  \ 属性，特别是当 `type` 属性实际上是静态的（即，至少在视图作用域内，它永远不会改变）。\n\n```\nversus \n```\n\n它们不可互换。`<c:set>`\
  \ 可以在 Facelets 文件中的任何位置使用，它在 EL 作用域中设置一个变量，该变量在视图构建期间仅在标签位置之后可访问，但在视图渲染期间可在视图中的任何其他位置访问。`<ui:param>`\
  \ 应仅嵌套在 `<ui:include>`、`<ui:decorate template>` 或 `<ui:composition template>` 中，它在\
  \ Facelets 模板的 EL 作用域中设置一个变量，该变量仅在模板本身中可访问。较旧的 Jakarta Faces 版本存在错误，导致 `<ui:param>`\
  \ 变量在相关的 Facelets 模板之外也可用。永远不应依赖于此。\n\n没有 `scope` 属性的 `<c:set>` 将表现得像一个别名。它不会在任何作用域中缓存\
  \ EL 表达式的结果。其主要目的是能够为在同一 Facelets 文件中重复多次的相对较长的 EL 表达式提供一个快捷方式。因此，它可以在迭代的 Jakarta\
  \ Faces 组件中完美使用：\n\n```\n\n#{price}\n\n```\n\n它仅不适用于在循环中计算总和。以下构造将永远无法工作：\n\n```\n\
  \n#{product.price}\n\nTotal price: #{total}\n```\n\n为此，请改用 EL 3.0 流 API。\n\n```\n\
  #{product.price}\n\nTotal price: #{bean.products.stream().map(product->product.price).sum()}\n\
  ```\n\n然而，当你将 `scope` 属性设置为允许的值之一（`request`、`view`、`session` 或 `application`）时，它将在视图构建期间立即被求值并存储在指定的作用域中。\n\
  \n```\n这仅在首次构建此视图时被求值一次，并且在此示例中，该值将作为 EL 变量 `#{DEV}` 在整个应用程序中可用。你最好在 master 模板文件的顶部声明这样的\
  \ `<c:set>`，该模板文件被整个应用程序中的每个 Facelets 文件使用。请注意，EL 变量是大写的，以符合 Java 常量的命名约定。\n\n注意事项\n\
  \n当 Jakarta Tags 属性引用的 EL 变量在 Jakarta Faces 视图构建期间不可用时，使用 Jakarta Tags 只会导致意外结果。此类\
  \ EL 变量的示例包括由迭代组件（如 `<h:dataTable>` 和 `<ui:repeat>`）的 `var` 属性定义的变量，以及由 `<f:viewParam>`、`<f:viewAction>`\
  \ 和 `<f:event type=\"preRenderView\">` 在模型中设置的变量。简而言之，仅使用 Jakarta Tags 来控制 Jakarta\
  \ Faces 组件树的构建流程，并仅使用 Jakarta Faces UI 组件来控制 HTML 输出生成的流程。在 Jakarta Tags 中，不要依赖在视图构建期间不可用的\
  \ EL 变量。\n\n操作组件树\n这可以通过 Jakarta Tags 声明式地完成，也可以通过 Java 代码编程式地完成。Jakarta Tags 方法已在上一节中详细阐述。也可以改用\
  \ Java 代码。作为预防措施，这通常会导致代码非常冗长且难以维护。当使用像 XML 这样的分层标记语言时，代码中的基于树的层次结构最易于阅读和维护。Facelets\
  \ 本身已经是基于 XML 的。Jakarta Tags 也是基于 XML 的，因此可以无缝集成到 Facelets 文件中。因此，Jakarta Tags 是动态操作组件树的推荐方法，而不是\
  \ Java 代码。\n\n`jakarta.faces.component.UIComponent` 的 Javadoc^(¹¹) 指定了何时可以安全地操作组件树：\n\
  \n*动态修改组件树可以在任何时间发生，在恢复视图期间和之后，但不能在状态保存期间，并且需要相对于渲染和状态保存正常运作。*\n\n换句话说，你可以保证安全地修改组件树的最早时刻是在\
  \ `PostAddToViewEvent` 期间，而最晚时刻是在 `PreRenderViewEvent` 期间。两者之间的任何时刻也是可能的。在 `PostAddToViewEvent`\
  \ 之前，不一定存在具体的 `UIViewRoot` 实例。在 `PreRenderViewEvent` 之后，存在视图状态已被保存的风险，你最好不要在此处陷入困境，因为视图状态包含了关于组件树任何动态更改的所有信息。换句话说，在渲染响应阶段（第六阶段）操作组件树是一个坏主意。\n\
  当你打算通过基于至少是视图作用域的 Java 模型添加新组件来操作组件树的构建时，请监听相关父组件的 `PostAddToViewEvent`。当你打算通过添加、移动或删除组件来操作已构建的组件树时，请监听\
  \ `UIViewRoot` 的 `PreRenderViewEvent`。\n\n以下示例在 `PostAddToViewEvent` 期间，基于 Java\
  \ 模型以编程方式填充一个动态表单：\n\n其中 `#{dynamicForm}` 看起来类似于以下内容：\n\n```\n@Named @RequestScoped\n\
  public class DynamicForm {\nprivate transient UIForm form;\nprivate Map values =\
  \ new HashMap();\n@Inject\nprivate FieldService fieldService;\npublic void populate(ComponentSystemEvent\
  \ event) {\nform = (UIForm) event.getComponent();\nList fields = fieldService.list(form.getId());\n\
  fields.forEach(field -> field.populate(this));\n}\npublic void createOutputLabel(Field\
  \ field) {\nHtmlOutputLabel label = new HtmlOutputLabel();\nlabel.setId(field.getName()\
  \ + \"_l\");\nlabel.setFor(field.getName());\nlabel.setValue(field.getLabel());\n\
  form.getChildren().add(label);\n}\npublic void createInputText(Field field) {\n\
  HtmlInputText text = new HtmlInputText();\ntext.setId(field.getName()); // 需要显式\
  \ ID！\ntext.setLabel(field.getLabel());\ntext.setValueExpression(\"value\", createValueExpression(field));\n\
  form.getChildren().add(text);\n}\npublic void createMessage(Field field) {\nHtmlMessage\
  \ message = new HtmlMessage();\nmessage.setId(field.getName() + \"_m\");\nmessage.setFor(field.getName());\n\
  form.getChildren().add(message);\n}\npublic static ValueExpression createValueExpression(Field\
  \ field) {\nString el = \"#{dynamicForm.values['\" + field.getName() + \"']}\"\n\
  FacesContext context = FacesContext.getCurrentInstance();\nELContext elContext =\
  \ context.getELContext();\nreturn context.getApplication().getExpressionFactory()\n\
  .createValueExpression(elContext, el, Object.class);\n}\npublic Map getValues()\
  \ {\nreturn values;\n}\n}\n```\n\n并且其中抽象类 `Field` 代表你的表单字段的自定义模型，至少具有 `type`、`name`\
  \ 和 `label` 属性，而 `TextField#populate()` 的具体实现看起来类似于以下内容：\n\n```\npublic void populate(DynamicFormBean\
  \ form) {\nform.createOutputLabel(this);\nform.createInputText(this);\nform.createMessage(this);\n\
  }\n```\n\n请注意具体 `UIComponent` 类的命名模式。对于 HTML 组件，它们完全遵循约定“`Html[TagName]`”。对于 `<h:inputText>`，因此就是\
  \ `HtmlInputText`，依此类推。前面的 Java 示例基本上会创建以下 XML 表示：\n\n它只是非常冗长地做到了这一点。本质上，你在这里重新发明了\
  \ Facelets 的工作。没有什么事情是使用 XML 不可能做到而只能在 Java 中做到的。只要你理解如何为此使用 Jakarta Tags：\n\n其中\
  \ `#{dynamicForm}` 反而看起来类似于以下内容：\n\n\n\n```\n@Named @RequestScoped\npublic class\
  \ DynamicForm {\nprivate List fields;\nprivate Map values = new HashMap();\n@Inject\n\
  public FieldService fieldService;\npublic List getFields() {\nif (fields = null)\
  \ {\nFacesContext context = FacesContext.getCurrentInstance();\nUIComponent form\
  \ = UIComponent.getCurrentComponent(context);\nfields = fieldService.list(form.getId());\n\
  }\nreturn fields;\n}\npublic Map getValues() {\nreturn values;\n}\n}\n```\n\n你看，无需手动创建和填充`UIComponent`实例，Facelets\
  \ 就能基于简单的 XML 为你完成所有工作。`<t:field>`自定义标签可在第 7 章的“标签文件”部分找到。\n\n脚注\n\n4. 表单组件\n\n\
  这些是标准 Jakarta Faces 组件集中最重要的组件。没有它们，Jakarta Faces 一开始就不会有太大用处。如果使用纯 HTML 元素代替 Jakarta\
  \ Faces 表单组件，你最终会在控制器类中塞满手动应用、转换和验证提交值的代码；用这些值更新模型；以及确定要调用的操作方法。这正是 Jakarta Faces\
  \ 作为一个基于组件的 MVC（模型-视图-控制器）框架，用于 HTML 表单式 Web 应用程序时，应该为你分担的繁重工作。\n\n输入、选择和命令组件\n\
  所有输入组件都继承自`UIInput`超类。所有选择组件都继承自其子类，可以是`UISelectBoolean`、`UISelectOne`或`UISelectMany`（有关标准\
  \ Jakarta Faces 组件的完整列表，请参见第 3 章的表 3-1）。所有输入和选择组件都实现了`EditableValueHolder`接口，该接口允许附加`Converter`、`Validator`和`ValueChangeListener`。所有命令组件都继承自`UICommand`超类，并实现`ActionSource`接口，该接口允许定义一个或多个应在调用应用程序阶段（第五阶段）调用的受管\
  \ bean 方法。它们只能有一个“action”方法和多个“action listener”方法。\nHTML 要求所有输入、选择和命令元素都嵌套在表单元素中。标准\
  \ Jakarta Faces 组件集只提供一个这样的组件，即`<h:form>`，它来自`UIForm`超类。你也可以使用纯 HTML `<form>`元素，但这不会自动在表单中包含表示\
  \ Jakarta Faces 视图状态的必填`jakarta.faces.ViewState`隐藏输入字段。`<h:form>`的渲染器负责自动将其包含在生成的每个\
  \ Jakarta Faces 表单的 HTML 表示中。如果没有`jakarta.faces.ViewState`HTTP 请求参数，Jakarta Faces\
  \ 将不会将该请求识别为有效的回发请求。换句话说，`FacesContext.getCurrentInstance().isPostback()`将返回`false`，然后\
  \ Jakarta Faces 甚至不会处理提交的值，更不用说调用操作方法了。在 Jakarta Faces 页面中，纯 HTML `<form>`元素仅在与`<f:viewParam>`标签结合用于\
  \ GET 请求时有用，这些标签应负责将 GET 请求参数作为提交值进行处理。这将在后面的“GET 表单”部分详细说明。\n所有命令组件都有一个`action`属性，可以绑定到受管\
  \ bean 方法。只要没有转换或验证错误，该方法将在调用应用程序阶段（第五阶段）被调用。转换和验证将在第 5 章中详细介绍，因此本章将跳过此步骤的详细说明。\n\
  \n基于文本的输入组件\n所有基于文本的输入组件都有一个`value`属性，可以绑定到受管 bean 属性。在视图渲染期间，将查询此属性的 getter 以检索并显示任何预设值。在回发请求的更新模型值阶段（第四阶段），如果适用，将使用已提交并经过转换和验证的值调用此属性的\
  \ setter。以下是一个基本用法示例，演示了所有基于文本的输入组件。\n\nFacelets 文件 `/test.xhtml`：\n\n支持 bean 类\
  \ `com.example.project.view.Bean`：\n\n```\n@Named @RequestScoped\npublic class Bean\
  \ {\nprivate String text;\nprivate String password;\nprivate String message;\nprivate\
  \ String hidden;\npublic void submit() {\nSystem.out.println(\"表单已提交！\");\nSystem.out.println(\"\
  text: \" + text);\nSystem.out.println(\"password: \" + password);\nSystem.out.println(\"\
  message: \" + message);\nSystem.out.println(\"hidden: \" + hidden);\n}\n// 在此处为每个属性添加/生成\
  \ getter 和 setter。\n}\n```\n\n生成的 HTML 输出：\n\n在 Chrome 浏览器中渲染（已添加换行符）：\n![](img/454457_2_En_4_Figa_HTML.jpg)\n\
  你会在生成的 HTML 输出中注意到几件事。毫无疑问，首先注意到的是 Jakarta Faces 也自动生成了表单和输入 HTML 元素的`id`和`name`属性，所有这些都带有由公共\
  \ API（应用程序编程接口）常量`UIViewRoot.UNIQUE_ID_PREFIX`定义的前缀`j_id`。其后的“`t`”基本上代表“树”，其后的数字基本上代表组件在组件树中的位置。因此，当你在\
  \ Facelets 文件中添加、删除或移动组件时，这很容易发生变化。因此，当 QA（质量保证）需要为 Web 应用程序编写集成测试时（通常需要使用 HTML\
  \ 元素 ID），这也会带来麻烦。\n当功能必须具有`id`和/或`name`属性时，Jakarta Faces 将使用自动生成的 ID。`id`属性是必需的，以便能够通过任何\
  \ JavaScript 代码（也可以由 Jakarta Faces 自动生成，例如负责 Ajax 工作的函数）找到 HTML 元素。由于这会使生成的 HTML\
  \ 代码难以阅读，坦率地说，很丑陋，我们更希望显式指定任何 Jakarta Faces 表单、输入、选择和命令组件的`id`属性值。这样，Jakarta Faces\
  \ 将直接使用它来生成 HTML 元素的`id`和`name`属性，而不是使用自动生成的属性。\n\n现在，让我们为此重写 Facelets 文件 `/test.xhtml`。\n\
  一个好的做法是让输入组件的 ID 属性与 bean 属性名称完全匹配，命令组件的 ID 属性与 bean 方法名称完全匹配。这将产生更具自文档性的代码和生成的\
  \ HTML 输出。\n\n现在，生成的 HTML 输出如下所示：\n\n\n\n这样已经更清晰了。请注意，当你显式设置一个组件 ID 时，它最终一定会出现在生成的\
  \ HTML 输出中。生成的 HTML 元素 ID 代表“客户端 ID”，该 ID 可能因父组件不同而与组件 ID 有所差异。如果该组件有任何父组件是`NamingContainer`接口的实例，那么`NamingContainer`父组件的\
  \ ID 将会被前置到该组件的客户端 ID 中。在标准 Jakarta Faces HTML 组件集中，只有`<h:form>`和`<h:dataTable>`是`NamingContainer`的实例。其他如\
  \ Facelets 标签中的`<ui:repeat>`和 Jakarta Faces 核心标签中的`<f:subview>`也属于此类。\n\n如果你更仔细地查看生成的\
  \ HTML 输出，会发现只剩下一个生成的 ID。它是视图状态隐藏输入字段的 ID，始终是`j_id1`。它代表`UIViewRoot`实例的 ID，默认情况下无法从\
  \ Facelets 文件设置。当在基于 Portlet 的 Web 应用程序（而非基于 Servlet 的 Web 应用程序）中使用 Jakarta Faces\
  \ 时，这个 ID 是可覆盖的，并且它将代表 Portlet 的唯一名称。在基于 Portlet 的 Web 应用程序中，单个 Jakarta Faces 页面中可以包含多个\
  \ Portlet 视图。换句话说，基于 Portlet 的 Web 应用程序中的单个 Jakarta Faces 页面可以拥有多个`UIViewRoot`实例。\n\
  \n回到生成的 HTML 输出，HTML 输入元素的`name`属性对于 HTML 来说是必需的，这样才能通过 HTTP 将提交的值作为请求参数发送。它将作为请求参数名称。在任何主流的\
  \ Web 浏览器中，你都可以在 Web 开发者工具集的“网络”部分检查请求参数，该工具集可通过在浏览器中按 F12 键访问。图 4-1 展示了 Chrome\
  \ 浏览器在提交填写了某些值的表单后呈现的回发请求，如图中“负载”部分所示。\n\n![](img/454457_2_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\nChrome 开发者工具——网络——负载\n\n正如你在生成的 HTML 输出和表单数据中所见，还有两个额外的隐藏输入字段。名称代表`<h:form>`ID\
  \ 的隐藏输入字段将向 Jakarta Faces 指示在回发请求期间具体提交了哪个表单。因为单个 HTML 文档可以包含多个表单元素，通过这种方式，Jakarta\
  \ Faces 可以在应用请求值阶段（第二阶段）确定当前表单组件是否确实被提交了。这将导致表单组件的`UIForm#isSubmitted()`返回 true。名称为`jakarta.faces.ViewState`的隐藏输入字段代表引用存储在会话中的序列化视图状态对象的唯一标识符。顺便提一下，视图状态隐藏输入字段上的`autocomplete=\"\
  off\"`并非技术上的要求，而只是一种变通方法，用于防止某些浏览器在按下后退按钮时用最后已知的值覆盖它，而这个值本身可能不正确。这两个隐藏输入字段由与`UIForm`组件关联的渲染器自动包含。我们的示例中由`<h:inputHidden>`标签生成的隐藏输入字段有一个空值。在这个表单中它实际上毫无用处。这种隐藏输入字段通常只有在它的值由你希望在托管\
  \ Bean 中捕获的某些 JavaScript 代码设置时才有用。通常，使用隐藏输入字段在请求之间“传递”托管 Bean 属性是没有意义的。相反，这些属性应分配给声明为具有比请求作用域更广作用域（如视图、流程或会话作用域）的托管\
  \ Bean。这样可以省去处理隐藏输入字段的麻烦。Bean 作用域将在第 8 章中详细说明。\n\n如果你熟悉基本 HTML，表单数据中可见的其他请求参数应该不言自明。它们代表所涉及输入元素的名称/值对。你应该能够确定在提交之前表单中实际输入了哪些值。Jakarta\
  \ Faces 也能做到同样的事情。它将遍历组件树，并使用组件的“客户端 ID”作为请求参数名称，从请求参数映射中获取值。基本上，在应用请求值阶段（第二阶段），以下代码会为每个输入组件在底层执行。这发生在`UIInput#decode()`方法中。\n\
  \n```\nFacesContext context = FacesContext.getCurrentInstance();\nExternalContext\
  \ externalContext = context.getExternalContext();\nMap formData = externalContext.getRequestParameterMap();\n\
  String clientId = component.getClientId(context);\nString submittedValue = formData.get(clientId);\n\
  component.setSubmittedValue(submittedValue);\n```\n\n在同一阶段，对于每个命令组件，在与该命令组件关联的渲染器的`decode`方法中，基本上会执行以下代码：\n\
  \n```\nif (formData.get(clientId) != null) {\ncomponent.queueEvent(new ActionEvent(context,\
  \ component));\n}\n```\n\n在处理验证阶段（第三阶段），Jakarta Faces 将首先使用组件上注册的任何显式转换器或与“本地值”类型关联的任何隐式转换器，将提交的值转换为“本地值”。然后，它将使用组件上注册的所有验证器（如果有）验证“本地值”。如果转换和验证执行无误，那么“本地值”将被设置为组件的实际值，并且提交的值将被清除。这一切都发生在`UIInput#validate()`方法中，其核心逻辑在以下代码片段中以（非常！）简化的形式展示：\n\
  \n```\nString submittedValue = component.getSubmittedValue();\ntry {\nObject localValue\
  \ = component.getConvertedValue(submittedValue);\nfor (Validator validator : component.getValidators())\
  \ {\nvalidator.validate(context, component, localValue);\n}\ncomponent.setValue(localValue);\n\
  component.setSubmittedValue(null);\n}\ncatch (ConverterException | ValidatorException\
  \ e) {\ncontext.addMessage(clientId, e.getFacesMessage());\ncontext.validationFailed();\
  \ // 跳过阶段 4 和 5。\ncomponent.setValid(false);\n}\n```\n\n当没有转换或验证错误，并且`FacesContext#isValidationFailed()`因此返回`false`时，Jakarta\
  \ Faces 将进入更新模型值阶段（第四阶段）。在此阶段，输入组件的“本地值”最终将被设置为与输入组件的`value`属性关联的托管 Bean 属性。这将发生在`UIInput#updateModel()`方法中，该方法简化如下：\n\
  \n```\nValueExpression el = component.getValueExpression(\"value\");\nif (el !=\
  \ null) {\nObject localValue = component.getValue();\nel.setValue(context.getELContext(),\
  \ localValue);\ncomponent.setValue(null);\n}\n```\n\n\n\n`el` 变量基本上代表了在 `value`\
  \ 属性中定义的表达式语言（EL）语句，以我们的 `<h:inputText>` 示例来说，就是 `#{bean.text}`。`ValueExpression#setValue()`\
  \ 方法将根据该表达式触发相应的 setter 方法，并传入组件的值。因此，它实际上会执行 `bean.setText(component.getValue())`。一旦所有模型值都已更新，Jakarta\
  \ Faces 将进入调用应用程序阶段（第五阶段）。在应用请求值阶段（第二阶段）排队在命令组件中的任何 `ActionEvent` 都将被广播。它最终会调用与该命令组件关联的所有方法。在我们的\
  \ `<h:commandButton>` 示例中，其 `action` 属性定义为 `#{bean.submit}`，它将调用 `Bean#submit()`\
  \ 方法。最后，Jakarta Faces 将进入最后一个阶段，即渲染响应阶段（第六阶段），生成 HTML 输出，并在此过程中调用 getter 方法以获取要嵌入到\
  \ HTML 输出中的模型值。\n\n基于文件的输入组件\n只有一个基于文件的输入组件，即 `<h:inputFile>`。它对其所在的 `<h:form>`\
  \ 只有一个额外要求：必须将其 `enctype` 属性显式设置为 `multipart/form-data` 以符合 HTML 规范。这不会影响其他输入组件；它们将继续正常工作。只是默认的表单编码\
  \ `application/x-www-form-urlencoded` 不支持嵌入二进制数据。`multipart/form-data` 编码支持这一点，但它只是稍微冗长一些。每个请求参数值前面都有一个边界行、一个包含请求参数名称的\
  \ `Content-Disposition` 头、一个包含值内容类型的 `Content-Type` 头以及两个换行符。与默认编码（其中 URL 编码的请求参数名称/值对仅由\
  \ `&` 字符连接）相比，这非常低效，但这实际上是能够将文件嵌入 HTTP POST 请求而不会引起歧义的唯一可靠方法，尤其是在上传文本文件时，这些文件的内容恰好类似于\
  \ URL 编码的请求参数名称/值对。\n`<h:inputFile>` 的 `value` 属性必须绑定到 `jakarta.servlet.http.Part`\
  \ 接口的 bean 属性。\n\nFacelets 文件 `/test.xhtml`：\n\n支持 bean 类 `com.example.project.view.Bean`：\n\
  \n```\n@Named @RequestScoped\npublic class Bean {\nprivate Part file;\npublic void\
  \ submit() throws IOException {\nSystem.out.println(\"表单已提交！\");\nSystem.out.println(\"\
  文件: \" + file);\nif (file != null) {\nSystem.out.println(\"名称: \" + file.getSubmittedFileName());\n\
  System.out.println(\"类型: \" + file.getContentType());\nSystem.out.println(\"大小:\
  \ \" + file.getSize());\nInputStream content = file.getInputStream();\n// 将内容写入磁盘或数据库。\n\
  }\n}\n// 在此处为每个属性添加/生成 getter 和 setter。\n}\n```\n\n生成的 HTML 输出：\n\n在 Chrome 浏览器中的渲染效果（已添加换行符）：\n\
  ![](img/454457_2_En_4_Figb_HTML.jpg)\n\n请求处理生命周期与基于文本的输入组件相同，但应用请求值阶段（第二阶段）除外。在\
  \ `UIInput#decode()` 方法中，不是将提交的文件作为请求参数提取，而是在与文件输入组件关联的渲染器中，将提交的文件作为请求部分提取。默认实现基本如下所示：\n\
  \n```\nFacesContext context = FacesContext.getCurrentInstance();\nExternalContext\
  \ ec = context.getExternalContext();\nHttpServletRequest request = (HttpServletRequest)\
  \ ec.getRequest();\nString clientId = component.getClientId(context);\nPart submittedValue\
  \ = request.getPart(clientId);\ncomponent.setSubmittedValue(submittedValue);\n```\n\
  \n选择组件\nJakarta Faces 提供了一系列选择组件，属于 `UISelectBoolean`、`UISelectOne` 和 `UISelectMany`\
  \ 组件系列，它们都继承自 `UIInput`。除了 `UISelectBoolean` 之外，它们都期望通过嵌套在选择组件中的 `<f:selectItem>`\
  \ 或 `<f:selectItems>` 标签来提供可供选择的项目。`UISelectBoolean` 组件的 `value` 属性只能绑定到 `boolean`\
  \ 或 `Boolean` 类型的 bean 属性，并且不支持转换器，而其他组件支持转换器。`UISelectOne` 组件的 `value` 属性必须绑定到单值属性（例如\
  \ `String`），而 `UISelectMany` 组件的 `value` 属性只能绑定到多值属性（例如 `Collection<String>` 或 `String[]`）。\n\
  在现实世界的基于 HTML 的 Web 应用程序中，`<h:selectOneListbox>`（单选列表框）和 `<h:selectManyMenu>`（多选下拉框）并不是非常有用。通常，`<h:selectOneMenu>`（单选下拉框）和\
  \ `<h:selectManyListBox>`（多选列表框）更受欢迎，因为它们更加用户友好。以下是一个基本用法示例，演示了除上述最不常用的选择组件之外的所有选择组件。如果您仍然想使用它们，只需按照演示的方法使用不同的标签名称即可。\n\
  \nFacelets 文件 `/test.xhtml`：\n\n支持 bean 类 `com.example.project.view.Bean`：\n\n```\n\
  @Named @RequestScoped\npublic class Bean {\nprivate boolean checked;\nprivate String\
  \ oneMenu;\nprivate String oneRadio;\nprivate List manyListbox;\nprivate List manyCheckbox;\n\
  private List availableItems;\n@PostConstruct\npublic void init() {\navailableItems\
  \ = Arrays.asList(\"one\", \"two\", \"three\");\n}\npublic void submit() {\nSystem.out.println(\"\
  表单已提交！\");\nSystem.out.println(\"checked: \" + checked);\nSystem.out.println(\"\
  oneMenu: \" + oneMenu);\nSystem.out.println(\"oneRadio: \" + oneRadio);\nSystem.out.println(\"\
  manyListbox: \" + manyListbox);\nSystem.out.println(\"manyCheckbox: \" + manyCheckbox);\n\
  }\n// 在此处为每个属性添加/生成 getter 和 setter。\n// 注意 availableItems 属性不需要 setter。\n}\n```\n\
  \n生成的 HTML 输出：\n\n```\n\none\ntwo\nthree\n\none\n\ntwo\n\nthree\n\none\ntwo\nthree\n\
  \none\n\ntwo\n\nthree\n\n```\n\n在 Chrome 浏览器中的渲染效果（已添加换行符）：\n![](img/454457_2_En_4_Figc_HTML.jpg)\n\
  \n在生成的 HTML 输出中，您会立即注意到 `<h:selectOneRadio>` 和 `<h:selectManyCheckbox>` 在输入周围生成了一个\
  \ HTML 表格。自 Web 2.0 以来，这种标记确实不受欢迎。从 Jakarta Faces 4.0 开始，您可以通过显式地将 `layout` 属性设置为\
  \ `list` 来让它们生成 HTML 列表，如下所示：\n\n```\n...\n\n...\n\n```\n\n如果您想完全控制生成的 HTML 标记，那么您可以使用一组\
  \ `<h:selectBooleanCheckbox>` 组件来代替 `<h:selectManyCheckbox>`，这些组件位于所需的 HTML 标记中，并绑定到稍作调整的模型。\n\
  \nFacelets 文件 `/test.xhtml`：\n\n支持 bean 类 `com.example.project.view.Bean`：\n\n```\n\
  @Named @RequestScoped\npublic class Bean {\nprivate List manyCheckbox;\nprivate\
  \ List availableItems;\nprivate Map manyCheckboxMap = new LinkedHashMap();\n@PostConstruct\n\
  public void init() {\navailableItems = Arrays.asList(\"one\", \"two\", \"three\"\
  );\n}\npublic void collectCheckedValues() {\nmanyCheckbox = manyCheckboxMap.entrySet().stream()\n\
  .filter(e -> e.getValue())\n.map(Map.Entry::getKey)\n.collect(Collectors.toList());\n\
  }\npublic void submit() {\nSystem.out.println(\"表单已提交！\");\nSystem.out.println(\"\
  manyCheckbox: \" + manyCheckbox);\n}\n// 在此处为 availableItems 和 manyCheckboxMap 添加/生成\
  \ getter。\n// 注意它们不需要 setter。\n}\n```\n\n生成的 HTML 输出：\n\n```\n\none\n\ntwo\n\nthree\n\
  \n```\n\n在 Chrome 浏览器中的渲染效果：\n\n![](img/454457_2_En_4_Figd_HTML.jpg)\n\n\n\n`<ul>`\
  \ 的列表项符号当然可以通过将 CSS（层叠样式表）`list-style-type` 属性设置为 `none` 来隐藏。请注意，`<h:commandButton>`\
  \ 的 `actionListener` 属性总是在 `action` 属性之前运行。长期以来，`<h:selectOneRadio>` 无法采用相同的方法。没有像\
  \ `<h:radioButton>` 这样的组件。解决方案曾在第三方组件库（如 PrimeFaces）中寻找。自 Jakarta Faces 2.2 起，可以通过在纯\
  \ HTML `<input type=\"radio\">` 元素上使用新的“透传元素”和“透传属性”功能来实现这一点。^(¹²) 直到 Jakarta Faces\
  \ 2.3，才借助新的 `group` 属性原生地实现了这一点，该属性基本上等同于纯 HTML `<input type=\"radio\">` 元素的 `name`\
  \ 属性。\n\nFacelets 文件 `/test.xhtml`：\n\n后台 Bean 类 `com.example.project.view.Bean`：\n\
  \n```\n@Named @RequestScoped\npublic class Bean {\nprivate String oneRadio;\nprivate\
  \ List availableItems;\n@PostConstruct\npublic void init() {\navailableItems = Arrays.asList(\"\
  one\", \"two\", \"three\");\n}\npublic void submit() {\nSystem.out.println(\"Form\
  \ has been submitted!\");\nSystem.out.println(\"oneRadio: \" + oneRadio);\n}\n//\
  \ 在此处为每个属性添加/生成 getter 和 setter。\n// 注意，availableItems 属性不需要 setter。\n}\n```\n\n\
  生成的 HTML 输出：\n\n```\n\none\n\ntwo\n\nthree\n\n```\n\n在 Chrome 浏览器中的渲染效果：\n![](img/454457_2_En_4_Fige_HTML.jpg)\n\
  从技术上讲，`<h:selectManyCheckbox>` 也可以支持 `group` 属性，但尚未实现。\n\nSelectItem 标签\n\n为 `UISelectOne`\
  \ 和 `UISelectMany` 组件提供可用项有几种方式。如前一节所示，你可以使用嵌套在选择组件中的 `<f:selectItem>` 和 `<f:selectItems>`\
  \ 标签来实现。你可以使用 `<f:selectItem>` 标签在视图端完全定义可用项。以下是一个使用 `<h:selectOneMenu>` 的示例，但你可以在任何其他\
  \ `UISelectOne` 和 `UISelectMany` 组件中以相同方式使用它：\n\n请注意，当选择组件的 `value` 属性关联的 Bean 属性为\
  \ `null` 时，可以使用值为 `#{null}` 的选择项来表示默认选择。如果你查阅过 `<f:selectItem>` 的标签文档，你可能会注意到 `noSelectionOption`\
  \ 属性，并认为它旨在表示“无选择选项”。实际上，并非如此。尽管属性名如此，但它并不表示“无选择选项”。更好的属性名应该是 `hideWhenOtherOptionIsSelected`，即便如此，它也只有当父选择组件显式设置了\
  \ `hideNoSelectionOption=\"true\"` 属性时才有效，如下所示：\n\n因此，`hideWhenOtherOptionIsSelectedAndHideNoSelectionOptionIsTrue`\
  \ 最终会成为最不言自明的属性名。不幸的是，在 Jakarta Faces 1.2 中实现 `noSelectionOption` 时，这一点考虑得并不周全。不应该需要两个属性才能使此属性生效。这对属性的主要目的是，当组件已经有一个非\
  \ `null` 值时，防止网站用户能够重新选择“无选择选项”。例如，通过在 `@PostConstruct` 方法中准备它，或者在表单提交后使用非 `null`\
  \ 值重新渲染组件来实现。\n\n也就是说，`<f:selectItem>` 的 `itemValue` 属性表示提交表单时将设置为 Bean 属性的值，以及在生成\
  \ HTML 输出时将从任何非 `null` 的 Bean 属性中预选的值。`itemLabel` 属性表示将显示给网站用户的标签。当 `itemLabel`\
  \ 属性不存在时，Jakarta Faces 将默认使用 `itemValue`。请注意，标签绝不会提交回服务器。也就是说，在生成的 HTML 输出中，`<option>`\
  \ 标签不是 `<option>` 值的一部分。\n\n你可以使用 `<f:selectItems>` 标签来引用后台 Bean 中的 `Collection`、`Map`\
  \ 或可用项数组。你甚至可以将其与 `<f:selectItem>` 标签混合使用。\n\n它们将按照在视图中声明的顺序进行渲染。仅当你使用无序的 `Collection`\
  \ 或 `Map` 实现（例如 `HashSet` 或 `HashMap`）作为值时，`<f:selectItems>` 提供的项顺序将是未定义的。因此，最好使用有序的\
  \ `Collection` 或 `Map` 实现，例如 `TreeSet`、`ArrayList`、`TreeMap` 或 `LinkedHashMap`。当将可用项填充为\
  \ `Map` 时，请记住，Map 的键代表项标签，Map 的值代表项值。你可能凭直觉认为情况正好相反，但这是一个技术限制。也就是说，在 Java 端，Map\
  \ 的键强制唯一性，而 Map 的值则不强制。而在 HTML 端，选项标签应该是唯一的，而选项值则不需要唯一。\n\n以下是填充此类 Map 的方法：\n\n\
  ```\nprivate Map availableItems;\n@PostConstruct\npublic void init() {\navailableItems\
  \ = new LinkedHashMap();\navailableItems.put(\"First item\", \"one\");\navailableItems.put(\"\
  Second item\", \"two\");\navailableItems.put(\"Third item\", \"three\");\n}\n//\
  \ 添加/生成 getter。注意，不需要 setter。\n```\n\n如前所述，你也可以使用 `TreeMap` 或 `HashMap` 代替 `LinkedHashMap`，但这样项标签将分别自动排序或无序，而与插入顺序无关。\n\
  \n如果你真的想在视图端交换 Map 的键和值，你总是可以通过手动将 Map 条目的值指定为项标签，并将 Map 条目的键指定为项值来实现。你可以借助 `<f:selectItems>`\
  \ 的 `var` 属性来做到这一点，通过该属性你可以声明当前迭代项的 EL 变量名。然后，可以在同一标签的 `itemValue` 和 `itemLabel`\
  \ 属性中访问该变量。当你将 `Map#entrySet()` 传递给 `<f:selectItems>` 的 `value` 属性时，每个迭代项将代表一个 `Map.Entry`\
  \ 实例。该实例又具有 `getKey()` 和 `getValue()` 方法，这些方法完全可以作为 EL 属性使用。\n\n当使用 `Collection`\
  \ 或数组作为可用项时，这也适用。你不需要像前面演示的那样先显式地将其转换为 `Set`（更具体地说，是 `Iterable`）。当你拥有一个包含复杂对象（例如模型实体）的\
  \ `Collection` 或数组作为可用项时，这尤其有用。\n\n代表“国家”的模型实体：\n\n\n```java\npublic class Country\
  \ {\nprivate Long id;\nprivate String code;\nprivate String name;\n// 添加/生成 getter\
  \ 和 setter 方法\n}\n```\n\n后台 Bean：\n\n```java\n@Named @RequestScoped\npublic class\
  \ Bean {\nprivate String countryCode;\nprivate List availableCountries;\n@Inject\n\
  private CountryService countryService;\n@PostConstruct\npublic void init() {\navailableCountries\
  \ = countryService.list();\n}\n// 添加/生成 getter 和 setter 方法\n// 注意：availableCountries\
  \ 不需要 setter 方法\n}\n```\n\n视图：\n\n```xml\n<h:selectOneMenu value=\"#{bean.countryCode}\"\
  >\n    <f:selectItems value=\"#{bean.availableCountries}\"\n                   var=\"\
  country\"\n                   itemValue=\"#{country.code}\" itemLabel=\"#{country.name}\"\
  >\n</h:selectOneMenu>\n```\n\n请注意，为了清晰起见，上述示例中省略了任何持久化框架特定的注解（例如 Jakarta Persistence\
  \ 的 `@Entity` 和 `@Id`）以及 `CountryService` 的实际实现。这些与任何前端框架（如 Jakarta Faces）都无关。\n\
  \n通过上述构造，从 `Country#getCode()` 获取的值最终会成为生成的 HTML `<option>` 元素的值。现在，当表单提交时，该值将成为选择组件的提交值，进而以该值调用\
  \ `#{bean.countryCode}` 属性背后的 setter 方法。当然，您也可以将整个 `Country` 对象用作选择组件的属性值，但这需要一个转换器，能够在复杂对象与适合嵌入\
  \ HTML 输出并作为 HTTP 请求参数发送的唯一字符串之间进行转换。您可以在第 5 章中了解更多信息。\n\n## SelectItem 分组\n\n如果您希望将一组选项归入一个公共标签下，则可以在选择组件中嵌套使用\
  \ `<f:selectItemGroup>` 和 `<f:selectItemGroups>` 标签来实现。以下是一个入门示例：\n\n```xml\n<h:selectOneMenu\
  \ value=\"#{bean.selectedCategory}\">\n    <f:selectItemGroups value=\"#{bean.categories}\"\
  \ var=\"category\">\n        <f:selectItems value=\"#{category.products}\" var=\"\
  product\"\n                       itemValue=\"#{product.id}\" itemLabel=\"#{product.name}\"\
  >\n    </f:selectItemGroups>\n</h:selectOneMenu>\n```\n\n`<h:selectOneMenu>` 会将每个分组渲染为\
  \ HTML `<optgroup>`：\n![](img/454457_2_En_4_Figf_HTML.jpg)\n`<h:selectOneRadio layout=\"\
  pageDirection\">` 会将其渲染为嵌套表格：\n![](img/454457_2_En_4_Figg_HTML.jpg)\n`<h:selectManyListbox>`\
  \ 会将每个分组渲染为 HTML `<optgroup>`：\n![](img/454457_2_En_4_Figh_HTML.jpg)\n`<h:selectManyCheckbox\
  \ layout=\"pageDirection\">` 会将其渲染为嵌套表格：\n![](img/454457_2_En_4_Figi_HTML.jpg)\n\
  请注意 `<h:selectOneRadio>` 和 `<h:selectManyCheckbox>` 中 `layout=\"pageDirection\"\
  ` 属性的重要性。这比默认的 `layout=\"lineDirection\"`（会将所有内容渲染在一个大的单行表格中）看起来要好得多。\n\n您可以使用 `<f:selectItemGroups>`\
  \ 标签来引用后台 Bean 中的 `Collection`、`Map` 或可用项目分组的数组。您甚至可以将其与 `<f:selectItems>` 标签混合使用。以下是一个示例，它遍历一个\
  \ `List<Category>` 属性，而 `Category` 实体又包含一个 `List<Product>` 属性：\n\n```xml\n<h:selectOneMenu\
  \ value=\"#{bean.selectedCategory}\">\n    <f:selectItemGroups value=\"#{bean.categories}\"\
  \ var=\"category\">\n        <f:selectItems value=\"#{category.products}\" var=\"\
  product\"\n                       itemValue=\"#{product.id}\" itemLabel=\"#{product.name}\"\
  >\n    </f:selectItemGroups>\n</h:selectOneMenu>\n```\n\n## 标签和消息组件\n\n在通常设计良好的表单中，输入元素通常伴随有标签元素和针对输入字段的消息元素。在\
  \ HTML 中，标签由 `<label>` 元素表示。在 Jakarta Faces 中，您可以使用 `<h:outputLabel>` 组件来生成 HTML\
  \ `<label>` 元素。HTML 没有专门用于表示消息的元素。在 Jakarta Faces 中，`<h:message>` 组件生成一个 HTML `<span>`\
  \ 元素，而 `<h:messages>` 组件则根据 `layout` 属性的值生成 `<ul>` 元素或 `<table>` 元素。\n\n标签元素具有多种\
  \ SEO（搜索引擎优化）和可用性优势。它以文本形式告知关联的输入元素。屏幕阅读器（例如视力障碍人士使用的）会找到标签并通过声音读出其内容。搜索引擎机器人会找到标签，并将关联的输入元素以标签作为关键词进行索引。并且，当点击标签时，它会聚焦并激活关联的输入元素。基于文本的输入元素会显示文本光标。复选框和单选按钮输入元素会被切换。列表框和下拉输入元素会获得焦点。文件输入元素会打开浏览对话框。提交按钮会被触发。\n\
  \n消息元素通常用于显示来自服务器端的任何转换和验证错误消息。这样，最终用户就能了解表单的状态，并采取相应操作，通常是修正输入值。您也可以用它来显示警告或提示信息。\n\
  \n在 Jakarta Faces 中，`<h:outputLabel>`、`<h:message>` 和 `<h:messages>` 组件都有一个 `for`\
  \ 属性，您通常在其中定义关联输入组件的 ID。以下是一个登录表单风格的示例：\n\n```xml\n<h:outputLabel for=\"email\"\
  \ value=\"电子邮件\" />\n<h:inputText id=\"email\" value=\"#{bean.email}\" />\n<h:message\
  \ for=\"email\" />\n\n<h:outputLabel for=\"password\" value=\"密码\" />\n<h:inputSecret\
  \ id=\"password\" value=\"#{bean.password}\" />\n<h:message for=\"password\" />\n\
  \n<h:commandButton id=\"submit\" value=\"登录\" action=\"#{bean.submit}\" />\n```\n\
  \n实际上，您可以在 `for` 属性中使用任意组件搜索表达式。对于 `<h:outputLabel>` 组件，这没有太大意义。对于 `<h:message>`\
  \ 和 `<h:messages>` 组件，引用非输入组件的 ID 仅在您希望从受管 Bean 以编程方式添加 faces 消息时才有意义。但您需要知道目标组件的客户端\
  \ ID。\n\n```xml\n<h:form id=\"login\">\n    ...\n    <h:commandButton id=\"submit\"\
  \ value=\"登录\" action=\"#{bean.submit}\" />\n</h:form>\n```\n\n上述 `<h:commandButton>`\
  \ 将在 HTML 输出中生成一个客户端 ID \"`login:submit`\"。然后，您可以按如下方式以编程方式添加 faces 消息：\n\n```java\n\
  public String submit() {\n    try {\n        yourAuthenticator.authenticate(email,\
  \ password);\n        return \"/user/home.xhtml?faces-redirect=true\";\n    }\n\
  \    catch (YourAuthenticationException e) {\n        FacesContext context = FacesContext.getCurrentInstance();\n\
  \        FacesMessage message = new FacesMessage(\"认证失败\");\n        context.addMessage(\"\
  login:submit\", message);\n        return null;\n    }\n}\n```\n\n然而，更好的做法是通过传递\
  \ `null` 作为客户端 ID，将 faces 消息添加为全局消息。\n\n```java\ncontext.addMessage(null, message);\n\
  ```\n\n这样的消息只会出现在 `<h:messages globalOnly=\"true\">` 中。\n\n\n请注意 `messages` 组件中\
  \ `rendered` 属性的逻辑。因此，只有当其父组件 `NamingContainer` 的 `submitted` 属性求值为 `true` 时，它才会被渲染。在这个特定案例中，它检查的是\
  \ `UIForm#isSubmitted()`。这在以下场景中非常有用：你有多个非 Ajax 表单，每个表单都有自己的全局消息组件，和/或你在 Jakarta\
  \ Faces 页面底部附近有一个“兜底”的 `<h:messages redisplay=\"false\">` 组件，该组件随后使用 CSS 固定定位在顶部。否则，相同的全局消息会意外地在那里也显示出来。\n\
  \n在 Ajax 表单中，这种消息渲染逻辑并非必需，因为你只需在 `<f:ajax>` 的 `render` 属性中明确指定消息组件，就能精细地控制消息渲染。\n\
  \n此外，当 `<f:ajax>` 的 `execute` 属性没有像 `execute=\"@form\"` 那样显式地指定表单时，`UIForm#isSubmitted()`\
  \ 会意外地返回 `false`。\n\n**命令组件**\n\n你可能已经在之前关于输入和选择组件的章节中注意到了 `<h:commandButton>` 的示例。它会生成一个\
  \ HTML `<input type=\"submit\">` 元素，这是 HTML 中将所在 `<form>` 元素的所有输入值发送到服务器的方式。在服务器端，此组件还能够调用一个或多个\
  \ Java 方法，这些方法通常在 `action` 或 `actionListener` 属性中定义，或者通过嵌套在命令组件中的 `<f:actionListener>`\
  \ 标签定义。你还会了解到，动作监听器方法总是在与 `action` 属性关联的方法之前运行。\n\n你可以使用 `<f:actionListener>` 标签在同一个命令组件上注册一个或多个额外的动作监听器。所有这些动作监听器会按照它们在视图中声明并附加到组件的相同顺序被调用。目标方法可以通过三种方式在\
  \ `<f:actionListener>` 标签上声明。一种方式是通过 `type` 属性，另外两种方式是通过 `binding` 属性。\n\n第一种方式中的\
  \ `type` 属性必须基本上表示实现 `ActionListener` 接口的类的完全限定名。\n\n```\npackage com.example.project;\n\
  import jakarta.faces.event.ActionListener;\nimport jakarta.faces.event.ActionEvent;\n\
  public class SomeActionListener implements ActionListener {\n@Override\npublic void\
  \ processAction(ActionEvent event) {\n// ...\n}\n}\n```\n\n第二种方式中的 `binding` 属性必须基本上引用一个实现了\
  \ `ActionListener` 接口的受管 bean 实例。\n\n```\n@Named @RequestScoped\npublic class BeanImplementingActionListener\
  \ implements ActionListener {\n@Override\npublic void processAction(ActionEvent\
  \ event) {\n// ...\n}\n}\n```\n\n第三种方式中的 `binding` 属性可以基本上引用任何声明为 `void` 的任意受管 bean\
  \ 方法。\n\n```\n@Named @RequestScoped\npublic class Bean {\npublic void someActionListenerMethod()\
  \ {\n// ...\n}\n}\n```\n\n请注意，第三种方式或多或少是未记录的。它自 EL 2.2（2009 年）引入以来才成为可能，开发者可以通过简单地添加括号（必要时带参数）来开始显式声明方法表达式。巧合的是，`<f:actionListener>`\
  \ 的 `binding` 属性能够处理它们。在底层，`binding` 属性被视为一个 `ValueExpression`。当对其调用 `ValueExpression#getValue()`\
  \ 时，逻辑期望获得一个实现了 `ActionListener` 接口的受管 bean 实例。然而，调用的不是一个 getter 方法，而是一个 void 方法，并且没有返回任何内容，这反过来被解释为\
  \ `null`。因此，逻辑会静默地继续执行，就好像根本没有可用的 bean 实例一样。\n\n动作监听器在 `action` 属性之上还有一个额外的特性。当从动作监听器中显式抛出\
  \ `jakarta.faces.event.AbortProcessingException` 时，Jakarta Faces 将吞没该异常并中止处理调用应用程序阶段（第五阶段），并立即前进到渲染响应阶段（第六阶段）。所有剩余的动作监听器和动作方法（如果有的话）都将被跳过。被吞没的异常不会导致任何错误响应。鉴于这一事实，以及动作监听器总是在动作方法之前被调用的事实，你可以（滥）用它来在动作方法被调用之前，基于已更新的模型值执行一些转换和验证。\n\
  \n```\npublic void someActionListenerMethod() {\ntry {\nconvertOrValidate(this);\n\
  }\ncatch (SomeConversionOrValidationException e) {\nFacesContext context = FacesContext.getCurrentInstance()\n\
  context.addMessage(null, new FacesMessage(e.getMessage()));\nthrow new AbortProcessingException(e);\n\
  }\n}\npublic void someActionMethod() {\n// 当抛出 AbortProcessingException 时，此方法不会被调用。\n\
  }\n```\n\n我说“（滥）用”是因为，本质上，执行此类任务是普通 `Converter` 或 `Validator` 实现的责任，这样模型值就不会被无效值污染。然而，在\
  \ Jakarta Faces 中，很长一段时间内，都无法基于多个字段执行转换或验证。因此，开发者开始使用动作（监听器）方法来执行此任务，这本质上违反了 Jakarta\
  \ Faces 的生命周期。\n\n直到 Jakarta Faces 2.3，才引入了一个新的 `<f:validateWholeBean>` 标签来对多个字段执行验证。你可以在第\
  \ 5 章中阅读更多相关信息。因此，这为动作监听器方法只留下了一个合理的实际用例：基于一个或多个模型值执行转换。一个例子已经在“选择组件”部分演示过（在 `<ui:repeat>`\
  \ 中使用多个 `<h:selectBooleanCheckbox>` 来规避 `<h:selectManyCheckbox>` 生成 HTML 表格的问题）。另一个例子是使用提供的模型值调用外部\
  \ Web 服务，并将其结果作为“转换后的”值获取。然后，动作方法仍应用于执行业务服务逻辑。当动作方法本身抛出异常时，它不会被吞没，但请求将以 HTTP 500\
  \ 错误响应结束。你可以在第 9 章中找到更多相关信息。\n\n除了 `<h:commandButton>` 之外，Jakarta Faces 还提供了另外两个命令组件：`<h:commandLink>`\
  \ 和 `<h:commandScript>`。`<h:commandLink>` 的生命周期与 `<h:commandButton>` 基本相同，不同之处在于它生成一个\
  \ HTML `<a>` 元素，该元素借助 JavaScript 提交其包含的表单。在任何使用 `<h:commandButton>` 的地方，都可以用 `<h:commandLink>`\
  \ 替代：\n\n```\n...\n\n```\n\n生成的 HTML 输出如下所示：\n\n```\n\n...\n提交\n\n```\n\n在 Chrome\
  \ 浏览器中的渲染效果：\n\n![](img/454457_2_En_4_Figj_HTML.jpg)\n\n\n\n在生成的 HTML 输出中，你会注意到它自动包含了\
  \ `faces.js` JavaScript 文件。该文件包含了 `window.faces` 对象以及 Jakarta Faces 实现特有的辅助函数，在\
  \ Mojarra 实现中，这些函数被放置在 `window.mojarra` 对象中。在纯 HTML 中，无法使用 `<a>` 元素提交 `<form>`。因此，必须引入一些\
  \ JavaScript 代码。在 Mojarra 的具体实现中，`mojarra.cljs()` 函数会被调用，其第一个参数是父表单，第二个参数是命令组件的客户端\
  \ ID（作为请求参数名和值），第三个参数是 `<h:commandLink>` 的 `target` 属性（如果有的话）。`mojarra.cljs()` 函数会为第二个参数提供的每一对名称/值创建\
  \ `<input type=\"hidden\">` 元素，并将它们添加到第一个参数提供的表单中，确保这些参数最终成为回发请求的一部分。然后，它会创建一个不可见的\
  \ `<input type=\"submit\">` 按钮，将其添加到表单中，并调用其 `click()` 函数，就像你使用普通的提交按钮一样。最后，它会从表单中移除所有动态创建的元素。\n\
  \n实际上，`<h:commandButton>` 也会使用此函数，但仅当你需要通过嵌套在命令组件中的一个或多个 `<f:param>` 标签传递额外的 HTTP\
  \ 请求参数时才会用到。\n\n```\n...\n\n```\n\n生成的 HTML 输出：\n\n在 Chrome 浏览器中渲染：\n\n![](img/454457_2_En_4_Figk_HTML.jpg)\n\
  \n你可以通过 `@Inject @ManagedProperty` 在受管 bean 中获取额外的 HTTP 请求参数。\n\n```\n@Inject @ManagedProperty(\"\
  #{param.id}\")\nprivate Integer id;\npublic void submit() {\nSystem.out.println(\"\
  Submitted ID: \" + id);\n}\n```\n\n还有一种通过命令组件传递参数的方法，即简单地将它们作为操作方法参数传递：\n\n```\n\
  ...\n\n```\n\n修改后的操作方法如下所示：\n\n```\npublic void submit(Integer id) {\nSystem.out.println(\"\
  Submitted ID: \" + id);\n}\n```\n\n对于 `<h:commandButton>`，这不会生成任何 JavaScript，因此看起来与不使用任何操作方法参数时完全相同。这也意味着\
  \ `#{otherBean.id}` 的值不会通过 HTML 源代码作为 HTTP 请求参数传回服务器。这反过来意味着，它仅在 Jakarta Faces 即将调用操作方法时的回发请求期间被评估。这又意味着\
  \ `#{otherBean.id}` 至少必须是 `@ViewScoped` 才能在回发请求中仍然可用。换句话说，这种方法参数传递方式绝对不能与 `<f:param>`\
  \ 标签方法互换，后者只需两个 bean 都是 `@RequestScoped` 即可正常工作。\n\n标准 Jakarta Faces 组件集提供的最后一个命令组件是\
  \ `<h:commandScript>`。它自 Jakarta Faces 2.3 起可用。它允许你通过从自己的脚本中调用一个命名的 JavaScript 函数来调用受管\
  \ bean 操作方法。回发请求将始终通过 Ajax 执行。\n\n生成的 HTML 输出：\n\n```\n\nvar invokeBeanSubmit =\
  \ function(o) {\nvar o = (typeof o==='object') && o ? o : {};\nmojarra.ab('form:submit',null,'action',0,0,{'params':o});\n\
  }\n\n```\n\n它在 Web 浏览器中没有可见的 HTML 渲染。在生成的脚本中，你会看到它生成了一个函数变量，其名称与 `name` 属性中指定的名称相同。在此示例中，它确实位于全局作用域中。由于这在\
  \ JavaScript 上下文中被认为是不良实践（“全局命名空间污染”），你最好提供一个带命名空间的函数名称。这仅要求你之前在 HTML 文档中的某处声明了自己的命名空间，通常是通过\
  \ `<head>` 元素中的 JavaScript 文件。以下示例使用内联脚本简化了此操作：\n\n```\n...\nvar mynamespace = mynamespace\
  \ || {};\n\n```\n\n回到生成的函数变量，你还会看到它接受一个对象参数，并将其作为“`params`”属性传递给 Mojarra 特有的 `mojarra.ab()`\
  \ 函数的最后一个对象参数。该辅助函数将依次准备并调用标准 Jakarta Faces JavaScript API 的 `faces.ajax.request()`\
  \ 函数。换句话说，你可以通过这种方式将 JavaScript 变量传递给受管 bean 操作方法。它们可以通过 `@ManagedProperty` 注入，方式与使用\
  \ `<f:param>` 相同。以下示例演示了使用 JavaScript 对象中的硬编码变量进行 JavaScript 调用，但你当然可以从 JavaScript\
  \ 上下文中的任何其他地方获取这些变量：\n\n```\nvar params = {\nid: 42,\nname: \"John Doe\",\nemail:\
  \ \"john.doe@example.com\"\n};\ninvokeBeanSubmit(params);\n```\n\n支持 bean 类：\n\n\
  ```\n@Inject @ManagedProperty(\"#{param.id}\")\nprivate Integer id;\n@Inject @ManagedProperty(\"\
  #{param.name}\")\nprivate String name;\n@Inject @ManagedProperty(\"#{param.email}\"\
  )\nprivate String email;\npublic void submit() {\nSystem.out.println(\"Submitted\
  \ ID: \" + id);\nSystem.out.println(\"Submitted name: \" + name);\nSystem.out.println(\"\
  Submitted email: \" + email);\n}\n```\n\n`<h:commandScript>` 也可用于将 HTML 文档的部分渲染推迟到窗口的\
  \ `load` 事件。为此，只需将 `autorun` 属性设置为 `true`，并在 `render` 属性中指定目标组件的客户端 ID。以下示例仅在页面在客户端加载完成后才加载并渲染一个数据表：\n\
  \n```\n\n#{person.id}\n#{person.name}\n#{person.email}\n\n```\n\n其中支持 bean 如下所示：\n\
  \n```\n@Named @RequestScoped\npublic class Bean {\nprivate List lazyPersons;\n@Inject\n\
  private PersonService personService;\npublic void loadLazyPersons() {\nlazyPersons\
  \ = personService.list();\n}\npublic List getLazyPersons() {\nreturn lazyPersons;\n\
  }\n}\n```\n\n而 `Person` 实体如下所示：\n\n```\npublic class Person {\nprivate Long id;\n\
  private String name;\nprivate String email;\n// 添加/生成 getter 和 setter 方法。\n}\n```\n\
  \n请注意，为清晰起见，前面的示例中省略了任何持久化框架特有的注解，例如 Jakarta Persistence 的 `@Entity` 和 `@Id`，以及\
  \ `PersonService` 的实际实现。这些与 Jakarta Faces 等任何前端框架都无关。\n\n不言而喻，`<h:commandScript>`\
  \ 仅用于能够使用原生 JavaScript 调用 Jakarta Faces 受管 bean 操作方法，通常是在特定的 HTML DOM（文档对象模型）事件期间，而\
  \ `<h:commandLink>` 和 `<h:commandButton>` 似乎执行完全相同的操作；只是视觉呈现不同：一个渲染为链接，另一个渲染为按钮。用户体验（UX）的共识是，按钮应用于提交表单，而链接应用于导航到另一个页面或跳转到同一页面的另一个部分。因此，使用链接提交表单并不总被认为是最佳实践。仅当你希望使用图标或图像提交\
  \ HTML 表单时，它才有用。以下示例展示了如何在 Font Awesome 图标上使用命令链接：\n\n对于所有其他情况，请使用普通按钮。\n\n\n\n\
  导航\n有时，当某个表单成功提交后，你可能希望导航到另一个 Jakarta Faces 页面，例如从登录页面导航到用户主页（如“标签和消息组件”一节所示），或者从详情页面返回主页面。\n\
  \n传统上，导航目标必须在 `faces-config.xml` 的 `<navigation-rule>` 条目中单独定义，然后根据命令组件动作方法的 `String`\
  \ 返回值进行导航。这种方法长期来看相当繁琐，并且对于基于 HTML 的 Web 应用程序来说并不十分有用。这个想法或多或少源自桌面应用程序。因此，Jakarta\
  \ Faces 2.0 引入了“隐式导航”功能，允许你直接在 `String` 返回值本身中定义导航目标。\n\n换句话说，不再使用以下动作方法：\n\n```\n\
  public String someActionMethod() {\n// ...\nreturn \"someOutcome\";\n}\n```\n\n\
  以及以下 `faces-config.xml` 条目：\n\n```\n\nsomeOutcome\n/otherview.xhtml\n\n```\n\n你可以在动作方法中直接这样做：\n\
  \n```\npublic String someActionMethod() {\n// ...\nreturn \"/otherview.xhtml\";\n\
  }\n```\n\n你甚至可以省略所用视图技术的默认后缀。\n\n```\npublic String someActionMethod() {\n// ...\n\
  return \"/otherview\";\n}\n```\n\n你可以通过附加 `faces-redirect=true` 查询参数来强制重定向。\n\n\
  ```\npublic String someActionMethod() {\n// ...\nreturn \"/otherview?faces-redirect=true\"\
  ;\n}\n```\n\n返回 `null` 将返回到提交表单的同一视图。换句话说，最终用户将停留在同一页面。然而，将动作方法声明为 `void` 更为简洁。\n\
  \n```\npublic void someActionMethod() {\n// ...\n}\n```\n\n回到重定向方法，这也被称为“Post-Redirect-Get”模式^(¹³)，它在可添加书签和避免重复提交方面有着显著区别。如果在\
  \ Jakarta Faces 表单的 POST 请求之后没有重定向，Web 浏览器地址栏中的 URL（统一资源定位符）不会更改为目标页面的 URL，而是保持不变。这是由“回传”的本质造成的：将表单提交回提供该表单页面的同一\
  \ URL。换句话说，浏览器地址栏中显示的实际是 HTML `<form>` 的 `action` 属性中指定的 URL。当指示 Jakarta Faces 在没有重定向的情况下导航到不同视图时，它基本上会直接构建目标页面并将其渲染到当前回传请求的响应中，而不会将浏览器地址栏中的\
  \ URL 更改为目标页面的 URL。\n\n这种方法有缺点。一是刷新 Web 浏览器中的页面会导致 POST 请求重新执行，从而执行所谓的双重提交。这可能会用重复条目污染后端的数据库，特别是当相关的关系表没有定义适当的唯一约束时。另一个缺点是目标页面无法添加书签。浏览器地址栏中当前可见的\
  \ URL 基本上代表的是前一个页面。你无法通过添加书签、复制/粘贴和/或共享 URL，然后在新浏览器窗口中打开它来重新获得当前显示的目标页面。\n\n相反，当指示\
  \ Jakarta Faces 通过重定向导航到不同视图时，它基本上会返回一个非常小的 HTTP 响应，状态码为 `302`，并带有一个 `Location`\
  \ 标头，其值代表目标页面的 URL。当 Web 浏览器检索到这样的 HTTP 响应时，它会立即对 `Location` 标头中指定的 URL 发起一个全新的\
  \ GET 请求。此 URL 最终会反映在 Web 浏览器的地址栏中，从而变得可添加书签。此外，刷新页面只会刷新 GET 请求，因此不会导致双重提交。\n\n\
  Ajax 化组件\n正如你在“命令组件”一节的 `<h:commandScript>` 示例中所注意到的，Jakarta Faces 也能够发起 Ajax 请求并执行部分渲染。此功能首次在\
  \ Jakarta Faces 2.0 中通过 `<f:ajax>` 标签引入。\n此标签可以嵌套在任何实现 `ClientBehaviorHolder` 接口的组件中，也可以包裹在一组实现此接口的组件周围。在标准的\
  \ Jakarta Faces 组件集中，几乎所有 HTML 组件也都实现了 `ClientBehaviorHolder`。如果你查阅 `ClientBehaviorHolder`\
  \ 的 Javadoc，^(¹⁴) 你会发现以下列表：\n\n**所有已知的实现类：**\n\n```\nHtmlBody, HtmlCommandButton,\
  \ HtmlCommandLink, HtmlDataTable, HtmlForm,\nHtmlGraphicImage, HtmlInputFile, HtmlInputSecret,\
  \ HtmlInputText, HtmlInputTextarea, HtmlOutcomeTargetButton, HtmlOutcomeTargetLink,\
  \ HtmlOutputLabel, HtmlOutputLink, HtmlPanelGrid, HtmlPanelGroup, HtmlSelectBooleanCheckbox,\
  \ HtmlSelectManyCheckbox, HtmlSelectManyListbox, HtmlSelectManyMenu, HtmlSelectOneListbox,\
  \ HtmlSelectOneMenu, HtmlSelectOneRadio, UIWebsocket\n```\n\n\n\n因此，这些就是 `<h:body>`、`<h:commandButton>`、\n\
  `<h:commandLink>`、\n`<h:dataTable>`、\n`<h:form>`、\n`<h:graphicImage>`、\n`<h:inputFile>`、\n\
  `<h:inputSecret>`、\n`<h:inputText>`、\n`<h:inputTextarea>`、\n`<h:button>`、\n`<h:link>`、\n\
  `<h:outputLabel>`、\n`<h:outputLink>`、\n`<h:panelGrid>`、\n`<h:panelGroup>`、\n`<h:selectBooleanCheckbox>`、\n\
  `<h:selectManyCheckbox>`、\n`<h:selectManyListbox>`、\n`<h:selectManyMenu>`、\n`<h:selectOneListbox>`、\n\
  `<h:selectOneMenu>`、\n`<h:selectOneRadio>`、\n以及 `<f:websocket>`。\n你会看到所有可见的输入、选择和命令组件也都涵盖在内。\n\
  `<f:ajax>` 的一个要求是\n`ClientBehaviorHolder`\n组件必须嵌套在 `<h:form>` 中，并且\n模板中使用了 `<h:head>`。`<h:form>`\n\
  基本上使 JavaScript 能够执行带有正确 Jakarta Faces 视图状态关联的回发请求。`<h:head>`\n基本上使 `<f:ajax>` 能够\n\
  自动包含必要的 `faces.js` JavaScript\n文件，该文件包含（除其他外）必需的 `faces.ajax.request()`\n函数。\n\n\
  示例如下：\n\n```\nf:ajax 演示\n\n```\n\n生成的 HTML 输出：\n\n```\nf:ajax 演示\n\n```\n\n在 Chrome\
  \ 浏览器中的渲染效果（添加了换行符）与不使用 Ajax 时相同：\n\n![](img/454457_2_En_4_Figl_HTML.jpg)\n\n在生成的\
  \ HTML 输出中，你会看到包含必要 Jakarta Faces Ajax API 的 `faces.js` JavaScript\n文件被自动包含在 HTML\
  \ 头部。\n你还会注意到 `<f:ajax>` 在\n`<h:inputText>` 中生成了一个\n额外的 `onchange` 属性，\n并在 `<h:commandButton>`\
  \ 中生成了一个\n额外的 `onclick` 属性，\n两者都定义了一些 Jakarta Faces 实现特定的 JavaScript\n代码，负责执行 Ajax\
  \ 请求。\nJakarta Faces 指定了两种内部 Ajax 事件类型：`valueChange` 和 `action`。当 `<f:ajax>`\n没有指定\
  \ `event` 属性时，这些是\n默认的事件类型。当 `<f:ajax>` 被\n附加到一个实现了 `EditableValueHolder`\n接口的组件上时，默认事件类型变为\
  \ `valueChange`。对于\n实现了 `ActionSource`\n接口的组件，默认事件类型是 `action`。对于所有其他\n`ClientBehaviorHolder`\n\
  组件，默认事件是 `click`。这些内部事件类型实际生成的 HTML DOM 事件类型\n取决于组件和相关的渲染器。\n\n对于文本输入组件以及下拉和列表框选择组件，\n\
  `<f:ajax>` 的默认 HTML DOM 事件类型是\n`\"change\"`。对于\n复选框和单选按钮选择组件以及命令组件，\n默认事件类型是 `\"\
  click\"`。你可以在\n生成的 HTML 输出中看到这一点，这可以通过在\n`<f:ajax>` 标签上显式指定\n`event` 属性来覆盖。\n\n\
  前面的示例将在 `onblur` 属性中生成 JavaScript 代码，\n而不是在 `onclick` 属性中。\n`event` 属性支持的值\n取决于目标\
  \ `ClientBehaviorHolder`\n组件。这些值可以在相关组件的 VDL 文档中找到。所有 `on[event]` 属性\n都在那里定义。当你移除它们前面的\
  \ “`on`” 前缀时，\n你就得到了一个支持的事件类型列表。例如，`<h:inputText>`^(¹⁵) 的 VDL\n文档指出支持以下事件类型：\n\n\
  *   `blur`、\n    `change`、`click`、`dblclick`、`focus`、`keydown`、`keypress`、`keyup`、`mousedown`、`mousemove`、`mouseout`、`mouseover`、`mouseup`、`select`\n\
  \n当所需的 DOM 事件类型在客户端发生并\n触发 `on[event]`\n属性中定义的关联 Jakarta Faces 实现特定的 JavaScript\n\
  代码时，最终会调用\n标准 Jakarta Faces JavaScript API 的\n`faces.ajax.request()`\n函数。它将准备一组预定义的回发参数，其中\
  \ `jakarta.faces.source`\n和 `jakarta.faces.behavior.event`\n是最重要的。前者指定源组件的客户端 ID，本质上是在\
  \ JavaScript 上下文中\n`this.id` 的值。后者指定事件类型，本质上是在 JavaScript 上下文中\n`event.type` 的值。你可能已经猜到，它们是从传递给特定于\
  \ Mojarra 的 `mojarra.ab()`\n函数的前两个参数派生出来的，如生成的 HTML 输出所示。\n一旦触发，Ajax 请求将几乎以与非 Ajax\
  \ 请求相同的方式\n运行 Jakarta Faces 生命周期。恢复视图阶段（第一阶段）、处理验证阶段（第三阶段）、\n更新模型值阶段（第四阶段）和调用应用程序阶段（第五阶段）\n\
  是相同的。应用请求值阶段（第二阶段）略有不同。\n它只会解码 `<f:ajax>` 标签的\n`execute`\n属性所涵盖的组件，\n该属性默认为 `@this`（“当前\n\
  组件”）。渲染响应阶段（第六阶段）则完全不同。\n它不会生成整个 HTML 文档，而是生成一个\n特殊的 XML 文档，该文档仅包含 `<f:ajax>` 标签的\
  \ render 属性所涵盖的组件的\n生成 HTML 输出，\n该属性默认为 `@none`（“没有\n组件”）。\n`<f:ajax>` 标签的\n`execute`\n\
  和 `render`\n属性接受一个以空格分隔的组件搜索表达式集合。\n这可以表示相对于最近的 `NamingContainer`\n父级的客户端 ID，或者始终相对于\
  \ `UIViewRoot` 的绝对客户端 ID，或者\n标准或自定义搜索关键字，或者它们的链式组合。有关它们的深入解释，请参阅\n第 12 章。\n目前，我们只需要了解三个标准搜索\n\
  关键字：`@this`、`@form` 和 `@none`。顾名思义，\n`@form` 关键字指的是\n`UIForm` 类型（例如\n`<h:form>`）的最近父级组件。\n\
  \n在 Ajax 请求的应用请求值阶段（第二阶段）期间，\n对于 `<f:ajax>` 标签的\n`execute`\n属性所涵盖的每个组件，除了默认的解码过程之外，Jakarta\
  \ Faces 还会检查\n`jakarta.faces.source`\n请求参数是否等于当前组件的客户端 ID。如果是，\n则 Jakarta Faces\
  \ 将为调用应用程序阶段（第五阶段）排队 `AjaxBehaviorEvent`。\n在排队 `AjaxBehaviorEvent` 的底层，\n其逻辑归结如下：\n\
  \n```\nFacesContext context = FacesContext.getCurrentInstance();\nExternalContext\
  \ externalContext = context.getExternalContext();\nMap formData = externalContext.getRequestParameterMap();\n\
  String clientId = component.getClientId(context);\nString source = formData.get(\"\
  jakarta.faces.source\");\nString event = formData.get(\"jakarta.faces.behavior.event\"\
  );\nif (clientId.equals(source)) {\ncomponent.getClientBehaviors().get(event)\n\
  .forEach(clientBehavior -> component.queueEvent(\nnew AjaxBehaviorEvent(context,\
  \ component, clientBehavior)));\n}\n```\n\n这里，`ClientBehavior`\n基本上代表了 `<f:ajax>`\
  \ 标签的定义。\n基于此逻辑，你可以得出结论：可以在同一个组件上附加多个 `<f:ajax>` 标签，\n甚至针对相同的事件类型。其优点是，如有必要，你可以在\n\
  完全相同的事件类型上注册多个 Ajax 行为监听器。\n\n\n\n这些 Ajax 行为监听器方法将在调用应用阶段（第五阶段）被调用；当然，前提是在处理验证阶段（第三阶段）没有出现转换或验证错误。对于命令组件，这些\
  \ Ajax 行为监听器方法将始终在动作监听器方法和动作方法*之前*被调用。无论目标组件是什么，Ajax 行为监听器方法必须是一个 `public void`\
  \ 方法，并且可以选择性地接受 `AjaxBehaviorEvent` 参数。\n\n```\npublic void onchangeFoo(AjaxBehaviorEvent\
  \ event) {\n// ...\n}\n```\n\n这为你在输入和选择组件中提供了机会，可以在特定的 Ajax 事件上执行一些业务任务。最常见的实际案例包括准备一个\
  \ bean 属性，该属性随后会在另一个组件中渲染。可以想象一下级联下拉菜单，其中子下拉菜单的可用项取决于父下拉菜单的选中项。\n在命令组件中，`<f:ajax\
  \ listener>` 并不是特别有用。你已经可以在动作监听器和/或动作方法中执行业务任务。即使附加了 `<f:ajax>`，你也可以继续使用它们。\n在 Ajax\
  \ 请求的渲染响应阶段（第六阶段），Jakarta Faces 会为 `<f:ajax>` 标签的 `render` 属性所覆盖的每个组件，在 Ajax 响应中生成一个\
  \ XML `<update>` 元素，该元素包含该特定组件及其所有子组件（如果有的话）所生成的 HTML 输出。标准 Jakarta Faces JavaScript\
  \ API 的 `faces.ajax.response()` 函数（由 `faces.ajax.request()` 注册为 Ajax 回调函数）将提取 `<update>`\
  \ 元素的 `id` 属性（该属性代表目标组件的客户端 ID），并通过 JavaScript 的 `document.getElementById()` 获取具体的\
  \ HTML 元素，并在 HTML DOM 树中用 `<update>` 元素的内容替换它。\n\n以下是一个表单示例，其中包含一个必填输入字段（附带一条消息）和一个明确指向该消息组件的命令按钮：\n\
  \n图 4-2 展示了在输入字段未填写的情况下提交表单后，Chrome 如何呈现 Ajax 响应。这是一个很长的一行代码，因此稍微滚动了一下，以便从感兴趣的 `<update>`\
  \ 元素开始。它包含了 `<h:message id=\"m_text\">` 组件生成的 HTML 输出。\n\n![](img/454457_2_En_4_Fig2_HTML.png)\n\
  \n图 4-2\nChrome 开发者工具——网络——响应\n\n如果你在 XML 响应中继续向下滚动，你还会注意到一个 `<update id=\"j_id1:jakarta.faces.ViewState:0\"\
  >` 元素，其中包含 `jakarta.faces.ViewState` 隐藏输入元素的值。这对于 Jakarta Faces 在 Ajax 请求之间维护视图状态非常重要。当\
  \ `render` 属性恰好覆盖了一个 `UIForm` 组件时，当前 HTML 文档中的 `jakarta.faces.ViewState` 隐藏输入元素基本上会在用\
  \ Ajax 响应的 `<update>` 元素内容替换 HTML DOM 树中的元素时被完全清除。\n任何缺失的 `jakarta.faces.ViewState`\
  \ 隐藏输入元素最终都会被追加到当前 `UIViewRoot` 的每个 `<form method=\"post\">` 中，并且任何现有 `jakarta.faces.ViewState`\
  \ 隐藏输入元素的值都将被更新为新值。这种方法实际上是设计使然，原因有二：（1）视图状态值可能会在 Ajax 请求之间发生变化，因此必须更新当前 HTML 文档中的现有表单以跟上这一变化，以防这些表单未被\
  \ `render` 属性覆盖；（2）当 Jakarta Faces 状态保存方法明确设置为“`client`”时，`jakarta.faces.ViewState`\
  \ 隐藏输入字段的值可能会变得非常大，因此如果 `render` 属性恰好覆盖了多个表单，则会产生低效的 Ajax 响应。\n\nAjax 中的导航\n\n在具有正确定义的动作方法的命令组件中，使用\
  \ Ajax 执行导航与不使用 Ajax 执行导航并无区别。然而，有时你可能希望在附加到输入组件的 Ajax 监听器中执行导航，而不是在动作方法中执行。确实存在合理的实际用例。只是\
  \ `UIInput` 类不支持定义动作方法，并且 `<f:ajax listener>` 不支持返回导航结果。因此，你唯一的选择是以编程方式执行导航。这可以通过两种方式实现。第一种方式是使用\
  \ `jakarta.faces.application.NavigationHandler`。^(¹⁶)\n\n```\npublic void ajaxListener(AjaxBehaviorEvent\
  \ event) {\n// ...\nString outcome = \"/otherview?faces-redirect=true\";\nFacesContext\
  \ context = FacesContext.getCurrentInstance();\nApplication application = context.getApplication();\n\
  NavigationHandler handler = application.getNavigationHandler();\nhandler.handleNavigation(context,\
  \ null, outcome);\n}\n```\n\n第二种方式是使用 `jakarta.faces.context.ExternalContext#redirect()`。^(¹⁷)\n\
  \n```\npublic void ajaxListener(AjaxBehaviorEvent event) throws IOException {\n\
  // ...\nString path = \"/otherview.xhtml\";\nFacesContext context = FacesContext.getCurrentInstance();\n\
  ExternalContext externalContext = context.getExternalContext();\nString uri = externalContext.getRequestContextPath()\
  \ + path;\nexternalContext.redirect(uri);\n}\n```\n\n两者之间存在一些差异。最重要的是，`NavigationHandler`\
  \ 可以处理隐式导航结果值，但 `ExternalContext#redirect()` 只能处理实际路径，并且在涉及 Web 应用程序资源时需要手动添加请求上下文路径前缀。然而，它基本上可以接受任何\
  \ URI，例如外部 URL，如 `externalContext.redirect(\"``https://example.com\")`，而 `NavigationHandler`\
  \ 则无法处理它们。\n\nGET 表单\nJakarta Faces 没有“GET 表单”的概念，但你可以为此直接使用纯 HTML。Jakarta Faces\
  \ 支持处理 GET 请求参数并在 GET 请求上调用受管 bean 动作。为此，可以使用 `<f:viewParam>` 和 `<f:viewAction>`\
  \ 标签。它们必须放置在 `<f:metadata>` 标签中，而该标签又只能在顶层页面中声明。因此，当使用模板时，它必须在模板客户端中声明，而不能在主模板中声明。换句话说，`<f:metadata>`\
  \ 标签不能在模板客户端之间共享。\n\n\n\n从技术上讲，`<f:metadata>` 标签在视图中的位置并不重要，只要它位于顶层页面即可。最符合自文档化规范的做法是将其放在视图的最顶部，紧跟在根标签之后。\n\
  \n```\n\n...\n\n...\n\n...\n\n```\n\n使用模板时，应为其提供独立的模板定义。\n\n```\n\n...\n\n...\n\n\
  ```\n\n不，你不能在主模板中放置 `<f:metadata>` 标签，而在模板客户端中保留 `<f:viewParam>` 和 `<f:viewAction>`\
  \ 标签。这是一个技术限制。你所能做的最好的办法是创建一个自定义的 `<f:event>` 类型，该类型在调用应用程序阶段（第五阶段）之后运行，然后在主模板中声明它。第\
  \ 3 章的“自定义组件系统事件”一节中给出了一个示例。\n`<f:viewParam>` 标签由 `UIViewParameter` 组件支持，而该组件又继承自\
  \ `UIInput` 超类。这意味着它的行为几乎与 `<h:inputText>` 完全相同，但它是针对 GET 参数的。细微的差别体现在处理验证阶段（第三阶段）。默认情况下，空参数会跳过任何自定义验证器和\
  \ Jakarta Bean Validation。例如，`@NotNull` Jakarta Bean Validation 注解仅在 `web.xml` 中明确将上下文参数\
  \ `jakarta.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL` 设置为 `true` 时才有效。另一个区别在于渲染响应阶段（第六阶段）。基本上，它什么都不会渲染。\n\
  `<f:viewAction>` 标签由 `UIViewAction` 组件支持，而该组件又实现了 `ActionSource` 接口。这意味着它的行为几乎与\
  \ `<h:commandButton>` 完全相同，但它是针对 GET 请求的。当然，你也可以在 `@ViewScoped` 托管 Bean 上使用带有 `@PostConstruct`\
  \ 注解的方法来执行 GET 请求的逻辑，但问题在于，它会在托管 Bean 实例创建后立即运行，而此时任何 `<f:viewParam>` 都还没有机会运行。`<f:viewAction>`\
  \ 将在调用应用程序阶段（第五阶段）被调用，此时模型值已经更新。它甚至支持返回一个代表导航结果的 `String`，该结果将表现为重定向。以下是一个搜索表单的示例：\n\
  \nFacelets 文件 `/search.xhtml`：\n\n```\n\n查询\n\n#{result.name}\n#{result.description}\n\
  \n```\n\n支持 Bean 类 `com.example.project.view.Search`：\n\n```\n@Named @RequestScoped\n\
  public class Search {\nprivate String query;\nprivate List results;\n@Inject\nprivate\
  \ SearchService searchService;\npublic void onload() {\nresults = searchService.listResults(query);\n\
  }\n// 在此处添加/生成 getter 和 setter 方法。\n// 注意，results 不需要 setter 方法。\n}\n```\n\n在 Facelets\
  \ 文件中，除了普通的 HTML 表单方法之外，还有几点需要注意。文本输入的 `value` 属性在 `#{search.query}` 为空时显示 `#{param.query}`，因为当\
  \ `<f:viewParam>` 上出现转换或验证错误时，提交的值将完全不会显示。`#{param}` 实际上是一个隐式 EL 对象，引用请求参数映射。`#{param.query}`\
  \ 基本上会打印出名为“`query`”的请求参数的值。请注意，这种利用三元运算符 `#{x ? y : z}` 的 `value` 属性构造对于 Jakarta\
  \ Faces 输入组件是无效的。它会在更新模型值阶段（第四阶段）抛出 `jakarta.el.PropertyNotWritableException` 异常。此外，`UIInput`\
  \ 类在底层基本上已经执行了完全相同的逻辑。\n`<h:message>` 也可以附加到 `<f:viewParam>` 上。然而，在这种特定的构造中，它实际上并未被使用。只有当你向\
  \ `<f:viewParam>` 添加转换器或验证器时，例如通过 `<f:viewParam ... required=\"true\">`，你才会在 `<h:message>`\
  \ 中看到错误消息，并且 `<f:viewAction>` 将不会被调用。\n现在，当你打开页面并提交表单时，提交的值将作为查询字符串出现在 URL 中，例如\
  \ `/search.xhtml?query=submitted%20value`。这是可添加书签的，并且每次打开该 URL 时都可以重新执行。\n\n无状态表单\n\
  状态保存在动态操作的表单中特别有用，这些表单使用 Ajax 有条件地渲染表单的某些部分，例如级联下拉菜单和辅助输入字段。Jakarta Faces 会在同一视图上的\
  \ Ajax 回发过程中记住表单的状态。通常，正是这些表单绝对需要视图范围的托管 Bean，而不是请求范围的托管 Bean。\n当你的网站有“公共”和“私有”部分时，你希望尽可能推迟\
  \ HTTP 会话的创建，直到最终用户实际登录。这样，机器人就不会触发不必要的 HTTP 会话创建。但是，如果你在公共部分有一个标准的 Jakarta Faces\
  \ 登录表单，那么仅仅通过访问该页面就会创建 HTTP 会话。如果该表单基本上没有自己的动态状态，并且已经绑定到请求范围的托管 Bean，那么这在服务器内存方面是一种不必要的开销。你可以考虑改用客户端状态保存，但这会影响整个网站，并且会带来网络带宽和\
  \ CPU（中央处理器）性能方面的开销。诚然，如果你拥有最先进的硬件，这种开销可以忽略不计，但如果你有大量访问者和/或硬件相对较差，这种开销则不可忽视。\n\n\
  对于绑定到请求范围 Bean 的静态表单，例如一个简单的双字段登录表单，理论上可以安全地在每次回发时完全清除其内容，那么视图状态就不一定需要保存。这可以通过将\
  \ `<f:view>` 的 `transient` 属性设置为 `true` 来实现。\n\n```\n\n...\n\n```\n\n这样，Jakarta\
  \ Faces 将不会创建任何视图状态，并且 `jakarta.faces.ViewState` 隐藏输入字段将接收到一个固定值“`stateless`”。请注意，这会影响整个视图，并且无法仅为特定表单切换此设置。Jakarta\
  \ Faces 目前不支持按表单配置状态保存方法。此外，无状态还有一个额外的缺点，即如果存在开放的 XSS 漏洞，理论上更容易执行 CSRF（跨站请求伪造）攻击。另请参阅第\
  \ 13 章的“*跨站请求伪造保护*”一节。幸运的是，使用 Jakarta Faces，首先意外引入 XSS 漏洞已经非常困难。获得 XSS 漏洞的唯一方法是显式使用\
  \ `<h:outputText escape=\"false\">` 来重新显示用户控制的数据。\n\n脚注\n\n5. 转换与验证\n\n\n\nJakarta\
  \ Faces 作为一个基于 HTML 表单的 MVC（模型-视图-控制器）框架，其核心在于需要持续在 Java 对象（实体、Bean、值对象、数据传输对象等）与字符序列（字符串）之间进行转换。HTTP\
  \ 请求本质上被分解为表示标头和参数的纯字符串，而非 Java 对象。HTTP 响应本质上被写成一个表示 HTML 或 XML 的大字符序列，而非某种 Java\
  \ 对象的序列化形式。然而，Jakarta Faces 页面背后的普通 Java 模型并不一定处处包含 String 属性，否则将违背 Java 强类型化的本质。这正是转换器发挥作用的地方：在模型对象与视图字符串之间进行转换。\n\
  \n在将新提交且（如有必要）已转换的值更新到模型之前，你当然还希望验证它们是否符合 Web 应用程序的业务规则，并在必要时向最终用户呈现信息性错误消息，以便他们自行修正错误。通常，业务规则已在数据存储（例如关系数据库管理系统）中得到了很好的定义。一个设计良好的数据库表已经对数据类型、最大长度、可空性和唯一性设置了严格的约束。作为前端开发人员，你应绝对确保提交并转换后的值能够无错误地插入数据库。\n\
  \n例如，如果电子邮件地址列被约束为唯一且不可为空的列，最大长度为 254 个字符，那么你应该确保在将其插入数据库之前，提交的值已通过此类验证。否则，数据库插入操作将抛出某种\
  \ SQL 异常，而通常很难将这种异常分解为详细信息来告知最终用户具体错误所在。这正是验证器发挥作用的地方：在更新模型之前验证已提交（和已转换）的值。\n\n\
  标准转换器\n\nJakarta Faces 从一开始就提供了一系列开箱即用的标准转换器。其中大多数甚至基于模型属性的 Java 类型完全透明地完成其工作。它们都位于\
  \ `jakarta.faces.convert` 包中，^(¹⁸) 并且都实现了 `Converter<T>` 接口。表 5-1 提供了它们的概览。\n\n\
  表 5-1 Jakarta Faces 提供的标准转换器\n\n| 转换器类 | 转换器 ID | 转换器标签 | 值类型 | 自版本 |\n| --- | ---\
  \ | --- | --- | --- |\n| BigDecimalConverter | jakarta.faces.BigDecimal | n/a |\
  \ java.math.BigDecimal | 1.0 |\n| BigIntegerConverter | jakarta.faces.BigInteger\
  \ | n/a | java.math.BigInteger | 1.0 |\n| BooleanConverter | jakarta.faces.Boolean\
  \ | n/a | boolean/java.lang.Boolean | 1.0 |\n| ByteConverter | jakarta.faces.Byte\
  \ | n/a | byte/java.lang.Byte | 1.0 |\n| CharacterConverter | jakarta.faces.Character\
  \ | n/a | char/java.lang.Character | 1.0 |\n| DateTimeConverter | jakarta.faces.DateTime\
  \ | `<f:convertDateTime>` | java.util.Date java.time.LocalDate java.time.LocalTime\
  \ java.time.OffsetTime java.time.LocalDateTime java.time.OffsetDateTime java.time.ZonedDateTime\
  \ | 1.0 2.3 2.3 2.3 2.3 2.3 2.3 |\n| DoubleConverter | jakarta.faces.Double | n/a\
  \ | double/java.lang.Double | 1.0 |\n| EnumConverter | jakarta.faces.Enum | n/a\
  \ | enum/java.lang.Enum | 1.0 |\n| FloatConverter | jakarta.faces.Float | n/a |\
  \ float/java.lang.Float | 1.0 |\n| IntegerConverter | jakarta.faces.Integer | n/a\
  \ | int/java.lang.Integer | 1.0 |\n| LongConverter | jakarta.faces.Long | n/a |\
  \ long/java.lang.Long | 1.0 |\n| NumberConverter | jakarta.faces.Number | `<f:convertNumber>`\
  \ | java.lang.Number | 1.0 |\n| ShortConverter | jakarta.faces.Short | n/a | short/java.lang.Short\
  \ | 1.0 |\n\n“转换器 ID”列基本上指定了转换器标识符，你可以在任何 `ValueHolder` 组件的 `converter` 属性中，或任何嵌套的\
  \ `<f:converter>` 标签的 `converterId` 属性中指定该标识符，以激活特定的转换器。所有 `UIOutput` 和 `UIInput`\
  \ 组件都实现了 `ValueHolder` 接口。“转换器标签”列中标注为“n/a”的转换器是隐式转换器。换句话说，你可以将任何 `ValueHolder`\
  \ 组件的 `value` 属性绑定到类型为 `BigDecimal`、`BigInteger`、`boolean`/`Boolean`、`byte`/`Byte`、`char`/`Character`、`double`/`Double`、`enum`/`Enum`、`float`/`Float`、`int`/`Integer`、`long`/`Long`\
  \ 和 `short`/`Short` 的任何 Bean 属性，并让 Jakarta Faces 自动进行转换，无需任何额外配置。只有 `<f:convertDateTime>`\
  \ 和 `<f:convertNumber>` 需要显式注册，因为仅凭模型值本身并不一定能明确所需的转换算法。\n\n在所有 `ValueHolder` 组件中，转换器将在渲染响应阶段（第六阶段）被调用，将非\
  \ `String` 类型的模型值转换为适合嵌入 HTML 的 `String`。而在 `EditableValueHolder` 组件中，转换器还将在处理验证阶段（第三阶段）被调用，将提交的\
  \ `String` 请求参数转换为非 `String` 类型的模型值。`EditableValueHolder` 接口扩展了 `ValueHolder` 接口，并由所有\
  \ `UIInput` 组件实现。\n\n然而，隐式转换不适用于那些值类型实际上被参数化的 Bean 属性。想象一下，你在模型中有一个 `List<Integer>`，并且希望能够像下面这样编辑它：\n\
  \n那么，在提交后，你最终会在列表中得到未转换的 `String` 值，并在尝试迭代列表时被类转换异常搞得一头雾水。原因是负责处理那些 `#{...}` 内容的\
  \ EL（表达式语言）API（应用程序编程接口），在幕后由 `jakarta.el.ValueExpression` 实例表示，其当前版本无法检测泛型集合的参数化类型，并在\
  \ `ValueExpression#getType()` 上仅返回 `Object.class`。对于 EL 的这个限制，Jakarta Faces 也无能为力。你所能做的就是在输入组件上通过其“转换器\
  \ ID”显式指定所需的转换器。\n\n另一种替代方案是将 `List<Integer>` 替换为 `Integer[]` 甚至 `int[]`。这样 EL 就能将值表达式识别为整数类型，因此\
  \ Jakarta Faces 就能为其找到所需的转换器。然而，在模型中使用普通数组代替集合如今已是“禁忌”。\n\n回到显式标准转换器 `<f:convertNumber>`\
  \ 和 `<f:convertDateTime>`，它们也可以嵌套在任何 `ValueHolder` 组件中。`<f:convertNumber>` 标签与基于数字的隐式转换器之间的区别在于，这些标签允许更精细地设置转换选项，例如数字类型或模式、整数和/或小数位数、是否使用分组以及区域设置。\n\
  \n`<f:convertNumber>`\n\n`<f:convertNumber>`^(¹⁹) 在底层使用 `java.text.NumberFormat`。^(²⁰)\
  \ `type` 属性指定将获取哪个 `java.text.NumberFormat` 实例，默认为 `number`。其他允许的值是 `currency` 和\
  \ `percent`。换句话说，以下标签：\n\n将在底层按如下方式获取 `NumberFormat` 实例：\n\n```\nNumberFormat numberFormat\
  \ = NumberFormat.getNumberInstance(locale);\nNumberFormat currencyFormat = NumberFormat.getCurrencyInstance(locale);\n\
  NumberFormat percentFormat = NumberFormat.getPercentInstance(locale);\n```\n\n\n\
  \n其中，`locale` 参数可由 `<f:convertNumber>` 标签的 `locale` 属性指定，默认值为 `UIViewRoot#getLocale()`，而该值又可由\
  \ `<f:view>` 的 `locale` 属性指定。换句话说，这些实例将根据数字类型和指定的区域设置自动应用标准数字格式模式。以下示例：\n\n```\n\
  ...\n\n```\n\n不会将价格（一个 `BigDecimal` 属性）格式化为 `R$ 12,34`（巴西雷亚尔），而是格式化为 `$12.34`（美元）。请注意，`<f:convertNumber>`\
  \ 标签的 `locale` 属性不一定需要指定为 `faces-config.xml` 中支持的区域设置。同样需要注意的是，`value` 属性不一定需要引用\
  \ `BigDecimal`；任何其他 `java.lang.Number` 类型也都支持，但对于价格，我们当然希望将值存储在 `BigDecimal` 中，而不是例如\
  \ `Double` 或 `Float` 中，以避免因浮点数的浮点特性而导致的算术错误。^(²¹)\n\n如果你出于某种原因需要更改标准数字格式模式——例如，因为你正在开发一个存储五位小数的金融数据的银行应用程序——并且你希望在后端管理屏幕中显示完整值，以便在必要时由人工进行验证，那么你可以使用\
  \ `<f:convertNumber>` 标签的 `pattern` 属性来覆盖标准数字格式模式，使其符合 `java.text.DecimalFormat`\
  \ 的规则。^(²²)\n\n请注意，当指定了 `pattern` 属性时，`type` 属性将被忽略。“货币符号”模式字符“¤”指定了实际货币符号的插入位置。实际货币符号取决于指定的区域设置。“逗号”模式字符“`,`”指定了分组分隔符的插入位置，该位置相对于小数分隔符或值的末尾。实际插入的分组分隔符符号在美元格式中恰好也是逗号，但在巴西雷亚尔格式中则是句点。“句点”模式字符“`.`”指定了小数分隔符的位置。实际插入的小数分隔符符号在美元格式中恰好也是句点，但在巴西雷亚尔格式中则是逗号。“可选数字”模式字符“`#`”在此模式中仅用于指示何时应插入分组分隔符符号，当实际数字不存在时不会显示任何内容。“必需数字”模式字符“`0`”指定了最小格式，当实际数字不存在时将显示零。以下是练习代码，应能让你深入了解\
  \ `<f:convertNumber>` 在底层是如何工作的：\n\n```\nLocale locale = new Locale(\"pt\", \"BR\"\
  );\nDecimalFormatSymbols symbols = new DecimalFormatSymbols(locale);\nSystem.out.println(\"\
  Currency symbol: \" + symbols.getCurrencySymbol());\nSystem.out.println(\"Grouping\
  \ symbol: \" + symbols.getGroupingSeparator());\nSystem.out.println(\"Decimal symbol:\
  \ \" + symbols.getDecimalSeparator());\nDecimalFormat formatter = new DecimalFormat(\"\
  ¤ #,##0.00000\", symbols);\nSystem.out.println(formatter.format(new BigDecimal(\"\
  12.34\")));\nSystem.out.println(formatter.format(new BigDecimal(\".1234\")));\n\
  System.out.println(formatter.format(new BigDecimal(\"1234\")));\nSystem.out.println(formatter.format(new\
  \ BigDecimal(\"1234567.1234567\")));\n```\n\n输出应如下所示：\n\n```\nCurrency symbol: R$\n\
  Grouping symbol: .\nDecimal symbol: ,\nR$ 12,34000\nR$ 0,12340\nR$ 1.234,00000\n\
  R$ 1.234.567,12346\n```\n\n`<f:convertNumber>` 也将精确渲染这些值。除了 `pattern` 属性之外，你还可以使用其他属性（例如\
  \ `currencySymbol`、`integerOnly`、`groupingUsed`、`minIntegerDigits`、`maxIntegerDigits`、`minFractionDigits`\
  \ 和 `maxFractionDigits`）来微调 `type` 属性。你基本上可以通过以下方式实现相同的格式模式“¤ `#,##0.00000`”：\n\n\
  ```\n如果你很难从键盘上输入货币符号占位符，这实际上更具可读性且更方便。`pattern` 属性很少比使用其他属性微调 `type` 属性更有用。\n\n\
  如果你在 `UIInput` 组件中使用 `<f:convertNumber>`，从而要求最终用户输入值，那么你应该记住，货币和百分比类型明确要求最终用户也在输入字段中输入货币或百分比符号。对于货币输入，你可以通过将货币符号指定为空字符串来轻松禁用此功能，以便将其放置在输入组件外部。\n\
  \n```\n\n$\n\n```\n\n对于百分比类型，不幸的是，这是不可能的。最终用户确实也必须明确地在输入字段中输入百分比符号。\n\n<f:convertDateTime>\n\
  \n`<f:convertDateTime>`^(²³) 在底层使用 `java.text.DateFormat`^(²⁴)，并且自 Jakarta Faces\
  \ 2.3 起，也使用 `java.time.formatter.DateTimeFormatter`。^(²⁵) 换句话说，你基本上可以使用任何类型的日期。此外，此标签有一个\
  \ `type` 属性，该属性必须与模型值的实际类型相对应。从历史上看，无法基于 `java.util.Date` 实例以编程方式检测所需的类型。自从新的 `java.time`\
  \ API 为每种日期时间类型提供不同的类以来，这种情况已经改变。然而，为了能够将现有的 `<f:convertDateTime>` API 重用于新的 `java.time`\
  \ API，必须添加新的类型。表 5-2 提供了一个概览。\n\n表 5-2\n*<f:convertDateTime type>* 支持的值\n\n标签属性\
  \ |\n 值类型 |\n 实际格式化器 |\n 自版本 |\n\n| --- | --- | --- | --- | --- | --- | --- | ---\
  \ | --- |\n\ndate（默认） |\n java.util.Date（零时间） |\n DateFormat#getDateInstance() |\n\
  \ 1.0 |\n\ntime |\n java.util.Date（零日期） |\n DateFormat#getTimeInstance() |\n 1.0\
  \ |\n\nboth |\n java.util.Date |\n DateFormat#getDateTimeInstance() |\n 1.0 |\n\n\
  localDate |\n java.time.LocalDate |\n DateTimeFormatter#ofLocalizedDate() |\n 2.3\
  \ |\n\nlocalTime |\n java.time.LocalTime |\n DateTimeFormatter#ofLocalizedTime()\
  \ |\n 2.3 |\n\nlocalDateTime |\n java.time.LocalDateTime |\n DateTimeFormatter#ofLocalizedDateTime()\
  \ |\n 2.3 |\n\noffsetTime |\n java.time.OffsetTime |\n DateTimeFormatter#ISO_OFFSET_TIME\
  \ |\n 2.3 |\n\noffsetDateTime |\n java.time.OffsetDateTime |\n DateTimeFormatter#ISO_OFFSET_DATE_TIME\
  \ |\n 2.3 |\n\nzonedDateTime |\n java.time.ZonedDateTime |\n DateTimeFormatter#ISO_ZONED_DATE_TIME\
  \ |\n 2.3 |\n\n除了 `type` 属性之外，你最好还指定 `pattern` 属性，特别是在要求最终用户通过 `UIInput` 组件输入 `java.util.Date`\
  \ 或 `java.time.LocalXxx` 类型的值时，因为实际模式在不同区域设置之间可能以不太自文档化的方式变化。`java.time.OffSetXxx`\
  \ 和 `ZonedDateTime` 类型没有这个问题，因为它们默认使用通用的 ISO 8601 格式。^(²⁶)\n\n\n\n`<f:convertDateTime>`\
  \ 的 `pattern` 属性，对于 `java.util.Date`，遵循 `java.text.SimpleDateFormat` Javadoc 中指定的相同规则，^(²⁷)\
  \ 而对于 `java.time` API，则遵循 `java.time.format.DateTimeFormatter` Javadoc 中指定的相同规则。^(²⁸)\
  \ 它们大部分相同，但 `java.time` 格式支持更多模式。对于这两个 API，“月份中的日”模式字符是“`d`”，“年份中的月”模式字符是“`M`”，“年份”模式字符是“`y`”，“24\
  \ 小时制”模式字符是“`H`”，“分钟”模式是“`m`”，“秒”模式是“`s`”。ISO 8601 日期格式是“`yyyy-MM-dd`”，ISO 8601\
  \ 时间格式是“`HH:mm:ss`”。偏移时间和带时区的时间需要在时间部分之后增加一个偏移量，该偏移量由 ISO 8601 时区模式字符“`X`”表示。有效值的示例包括：CET（欧洲中部时间）的“`+01:00`”，BRT（巴西利亚时间）的“`-03:00`”，以及\
  \ IST（印度标准时间）的“`+5:30`”。与之前一样，偏移时间和带时区的日期时间需要用“`T`”字符分隔，而不是空格。以下是所有可能的 `<f:convertDateTime>`\
  \ 类型的概览，其中本地化类型具有显式指定的模式：\n\n请注意，此处重新配置了 `<h:messages>` 以显示详细信息而非仅显示摘要，因为在标准 Jakarta\
  \ Faces 中，日期时间转换错误的详细信息消息包含一个示例值，该值对于最终用户理解所需格式更为有用。以下是关联的后台 Bean 的外观：\n\n```\n\
  @Named @RequestScoped\npublic class Bean {\nprivate Date date;\nprivate Date time;\n\
  private Date both;\nprivate LocalDate localDate;\nprivate LocalTime localTime;\n\
  private LocalDateTime localDateTime;\nprivate OffsetTime offsetTime;\nprivate OffsetDateTime\
  \ offsetDateTime;\nprivate ZonedDateTime zonedDateTime;\npublic void submit() {\n\
  System.out.println(\"date: \" + date);\nSystem.out.println(\"time: \" + time);\n\
  System.out.println(\"both: \" + both);\nSystem.out.println(\"localDate: \" + localDate);\n\
  System.out.println(\"localTime: \" + localTime);\nSystem.out.println(\"localDateTime:\
  \ \" + localDateTime);\nSystem.out.println(\"offsetTime: \" + offsetTime);\nSystem.out.println(\"\
  offsetDateTime: \" + offsetDateTime);\nSystem.out.println(\"zonedDateTime: \" +\
  \ zonedDateTime);\n}\n// 添加/生成 getter 和 setter 方法。\n}\n```\n\n既然 HTML5 已经发布了一段时间，并且越来越多的浏览器支持新的\
  \ HTML5 日期和时间输入，你最好默认启用它，因为它附带了一个非常有用的内置日期选择器。Web 浏览器可能会以本地化格式在日期选择器中显示日期模式，但它始终会以\
  \ ISO 8601 格式提交值。因此，这非常有用。HTML5 日期和时间输入可以通过将输入文本字段的 `type` 属性设置为“`date`”，^(²⁹) “`time`”，^(³⁰)\
  \ 或 “`datetime-local`”^(³¹) 来激活。以下是一些示例：\n\n以下是在 Chrome 浏览器中它们的渲染方式（添加了换行符）：\n![](img/454457_2_En_5_Figa_HTML.jpg)\n\
  \n标准验证器\n\n当提交的值在流程验证阶段（第三阶段）成功转换后，Jakarta Faces 将立即对转换后的值进行验证。Jakarta Faces 已经提供了一些开箱即用的标准验证器。它们都在\
  \ `jakarta.faces.validator` 包中，^(³²) 并且都实现了 `Validator<T>` 接口。表 5-3 提供了它们的概览。\n\n\
  表 5-3 Jakarta Faces 提供的标准验证器\n\n验证器类 |\n 验证器 ID |\n 验证器标签 |\n 值类型 |\n 自版本 |\n\n\
  | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\nLongRangeValidator\
  \ |\n jakarta.faces.LongRange |\n <f:validateLongRange> |\n java.lang.Number |\n\
  \ 1.0 |\n\nDoubleRangeValidator |\n jakarta.faces.DoubleRange |\n <f:validateDoubleRange>\
  \ |\n java.lang.Number |\n 1.0 |\n\nLengthValidator |\n jakarta.faces.Length |\n\
  \ <f:validateLength> |\n java.lang.Object |\n 1.0 |\n\nRegexValidator |\n jakarta.faces.RegularExpression\
  \ |\n <f:validateRegex> |\n java.lang.String |\n 2.0 |\n\nRequiredValidator |\n\
  \ jakarta.faces.Required |\n <f:validateRequired> |\n java.lang.Object |\n 2.0 |\n\
  \nBeanValidator |\n jakarta.faces.Bean |\n <f:validateBean> |\n java.lang.Object\
  \ |\n 2.0 |\n\nn/a |\n n/a |\n <f:validateWholeBean> |\n java.lang.Object |\n 2.3\
  \ |\n\n“验证器 ID”列基本上指定了验证器标识符，你可以在任何 `EditableValueHolder` 组件的 `validator` 属性中，或任何嵌套的\
  \ `<f:validator>` 标签的 `validatorId` 属性中指定该标识符，以激活特定的验证器。与转换器相反，单个 `EditableValueHolder`\
  \ 组件可以附加多个验证器。无论彼此的结果如何，它们都将被执行。\n\n<f:validateLongRange>/<f:validateDoubleRange>\n\
  \n这两个验证器允许你为绑定到基于 `java.lang.Number` 的属性的输入组件指定允许的最小和/或最大数值。这些可以通过 `minimum` 和 `maximum`\
  \ 属性来指定。\n\n通过传递属性，这也可以与 HTML5 输入类型“`number`”（微调器）和“`range`”（滑块）结合使用，后者又需要 `min`、`max`\
  \ 以及可选的 `step` 作为传递属性。在此示例中，`#{bean.quantity}` 只是一个 `Integer`，而 `#{bean.volume}`\
  \ 是一个 `BigDecimal`。\n\n请注意，你可以直接在 `BigDecimal` 属性上使用 `<f:validateLongRange>`。它不关心属性的实际\
  \ `java.lang.Number` 类型是否为 `Long`，而只关心指定的 `minimum` 和 `maximum` 属性是否为 `Long`。如果你想指定一个基于小数的数字作为最小值和/或最大值，请改用\
  \ `<f:validateDoubleRange>`。\n\n<f:validateLength>/<f:validateRegex>\n\n这两个验证器主要设计用于基于\
  \ `java.lang.String` 的属性。`<f:validateLength>` 将首先通过调用 `Object#toString()` 将提交的值转换为字符串，然后根据指定的\
  \ `minimum` 和/或 `maximum` 属性验证 `String#length()` 的结果。`<f:validateRegex>` 将首先将提交的值强制转换为\
  \ `String`，然后检查 `String#matches()` 对于指定的 `pattern` 属性是否返回 `true`。换句话说，它不接受除 `java.lang.String`\
  \ 之外的任何其他属性类型。假设你想验证一个值始终为三位数字；那么有三种可能的方式：\n\n`maxlength=\"3\"` 属性只是为了让最终用户在客户端无法输入超过三个字符。将数字存储为字符串是毫无意义的，因此第二种方式被排除。这给我们留下了第一种或第三种方式。从技术上讲，你选择哪一种并不重要。第一种方式可以说更具自文档性，因为你实际上想要验证的是长度，而不是范围。\n\
  \n回到 `<f:validateRegex>`，`pattern` 属性完全遵循 `java.util.regex.Pattern` 中指定的正则表达式规则。^(³³)\
  \ 然而，有一个潜在的陷阱：所需的转义反斜杠数量取决于当前使用的 EL 实现。在 Oracle 的 EL 实现（`com.sun.el.*`）中，你需要两个反斜杠，就像在常规的\
  \ Java `String` 中一样；但在 Apache 的 EL 实现（`org.apache.el.*`）中，你必须使用一个反斜杠；否则，它会出错，或者无法按预期匹配。截至目前，Payara、WildFly、Liberty\
  \ 和 WebLogic 使用 Oracle 的 EL 实现，而 TomEE 和 Tomcat 使用 Apache 的 EL 实现。换句话说，以下示例在使用 Oracle\
  \ EL 的服务器上可以工作，但在使用 Apache EL 的服务器上无法工作。\n\n\n\n使用 Apache EL 时，你需要改用 `pattern=\"\
  \\d{3}\"`。另一方面，正则表达式模式 `\\d` 实际上表示“任意数字”，因此它不仅匹配拉丁数字，还匹配希伯来语、西里尔语、阿拉伯语、中文等数字。如果这不是你的本意，那么最好使用\
  \ `[0-9]` 模式。\n\n<f:validateRequired>\n\n这是一个略显奇怪的组件。也就是说，所有 `UIInput` 组件都已经有一个\
  \ `required` 属性，提供了完全相同的功能。为什么还要使用整个 `<f:validateRequired>` 标签呢？它是在 Jakarta Faces\
  \ 2.0 中专门为“复合组件”添加的（更多内容将在第 7 章中介绍）。更确切地说，在某些复合组件组合中，模板客户端有机会将转换器和验证器附加到复合组件暴露的特定\
  \ `EditableValueHolder` 接口上，而该接口又引用了复合组件实现中包含的一个或多个 `UIInput` 组件。以下是此类复合组件的一个示例：\n\
  \n```\n...\n...\n...\n```\n\n以下是使用此复合组件的模板客户端示例：\n\n你可能已经猜到，`for` 属性必须与暴露的 `<cc:editableValueHolder>`\
  \ 的 `name` 属性完全匹配，并且此验证器将主要针对由 `input1` 和 `input3`（而不是 `input2`）标识的内部输入组件，从而有效地使它们成为\
  \ `required=\"true\"`。顺便提一下，这个 `for` 属性也存在于所有其他转换器和验证器标签上。\n\n<f:validateBean>/<f:validateWholeBean>\n\
  \n使用时，这两个标签依赖于 Jakarta Bean Validation API（应用程序编程接口），以前更常被称为“JSR 303”和“Jakarta Bean\
  \ Validation”。与 Jakarta Faces 一样，Jakarta Bean Validation 是 Jakarta EE API 的一部分，已包含在任何\
  \ Jakarta EE 应用服务器中。在 Tomcat 和其他 Servlet 容器中，你需要单独安装它。在 Java 代码中，Jakarta Bean Validation\
  \ 由 `jakarta.validation.*` 包的注解和接口表示，例如 `@NotNull`、`@Size`、`@Pattern` 和 `ConstraintValidator`。目前，最流行的实现是\
  \ Hibernate Validator。^(³⁴)\n\nJakarta Faces 会自动检测 Jakarta Bean Validation 的存在，在这种情况下，它会在验证阶段（第三阶段）结束时透明地处理所有\
  \ Jakarta Bean Validation 约束，无论 Jakarta Faces 自身验证器的结果如何。如果需要，可以通过 `web.xml` 中的以下上下文参数在整个应用程序范围内禁用它：\n\
  \n```\njakarta.faces.validator.DISABLE_DEFAULT_BEAN_VALIDATOR\ntrue\n```\n\n或者，如果这有点过于粗暴，你可以借助\
  \ `<f:validateBean>` 标签进行精细控制，该标签可以包裹一组 `UIInput` 组件，或者嵌套在其中。当 `<f:validateBean>`\
  \ 标签的 `disabled` 属性设置为 `true` 时，目标 `UIInput` 组件上的任何 Jakarta Bean Validation 都将被禁用。以下代码将仅禁用父级\
  \ `UIInput` 组件上的任何 Jakarta Bean Validation。\n\n以下代码将仅禁用由 `input3`、`input4` 和 `input5`\
  \ 标识的 `UIInput` 组件上的任何 Jakarta Bean Validation：\n\n需要记住的是，这只会禁用由 Jakarta Faces 管理的\
  \ Jakarta Bean Validation，而不会禁用例如由 Jakarta Persistence 管理的 Jakarta Bean Validation。因此，如果你碰巧使用\
  \ Jakarta Persistence 来持久化由 Jakarta Faces 组件填充的实体，并且 Jakarta Bean Validation 被禁用，那么\
  \ Jakarta Persistence 仍会代表自身执行 Jakarta Bean Validation，完全独立于 Jakarta Faces。如果你还想在\
  \ Jakarta Persistence 端禁用 Jakarta Bean Validation，那么你需要在 `persistence.xml` 中将属性\
  \ `jakarta.persistence.validation.mode` 设置为 `NONE`（另请参阅 `jakarta.persistence.ValidationMode`\
  \ Javadoc）。^(³⁵)\n\n```\nNONE\n```\n\n通过 `<f:validateBean>` 标签的 `validationGroups`\
  \ 属性，你可以根据需要声明一个或多个验证组。在这种情况下，只有注册在同一组上的 Jakarta Bean Validation 约束才会被处理。想象一下以下模型：\n\
  \n```\n@NotNull\nprivate String value1;\n@NotNull(groups=NotNull.class)\nprivate\
  \ String value2;\n@NotNull(groups={NotNull.class, Default.class})\nprivate String\
  \ value3;\n```\n\n请注意，任何 Jakarta Bean Validation 约束的 `groups` 属性必须引用一个接口，但它可以是任何你想要的接口。为简单起见，在前面的示例中，我们只是将\
  \ `jakarta.validation.constraints.NotNull` 接口重用为组标识符。然而，常见的做法是为所需的组创建你自己的标记接口。\n\
  \n同样重要的是，`@NotNull` 仅在你已将 Jakarta Faces 配置为将提交的空字符串值解释为 `null` 时才有效；否则，它会用空字符串而不是\
  \ null 污染模型，并导致 `@NotNull` 无法完成其工作，因为空字符串不是 `null`。提醒一下，相关的 `web.xml` 上下文参数如下：\n\
  \n```\njakarta.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL\ntrue\n```\n\
  \n现在，当提交一个空表单，并且这三个模型属性被以下输入组件引用，且它们上面没有任何 `<f:validateBean>` 时：\n\n那么你将收到属于 `jakarta.validation.groups.Default`\
  \ 组的 Jakarta Bean Validation 约束的验证错误，这些约束包括无组的 `value1` 和显式分组的 `value3`。`value2`\
  \ 不会被 Jakarta Bean Validation 验证，因为它没有显式声明默认组。\n\n当提交一个空表单，并且有一个 `<f:validateBean>`\
  \ 标签的 `validationGroups` 属性设置为 `NotNull.class` 时：\n\n那么你将收到属于 `jakarta.validation.constraints.NotNull`\
  \ 组的 Jakarta Bean Validation 约束的验证错误，这些约束包括显式声明了此组的 `value2` 和 `value3`。无组的 `value1`\
  \ 不会被 Jakarta Bean Validation 验证，因为它仅隐含了默认组。\n\n最后，当提交一个空表单，并且有一个 `<f:validateBean>`\
  \ 标签的 `validationGroups` 属性指定了两个组（以逗号分隔的字符串形式）时：\n\n那么你将收到所有输入上的验证错误，因为它们都至少匹配指定的组之一。然而，在实际应用中，这种分组功能很少使用。它仅在分组字段可以由同一个验证器同时验证时才有用。使用\
  \ Jakarta Bean Validation，实现这一点的唯一方法是在 bean 类本身上放置一个自定义的 `Constraint` 注解，获取一个填充了值的该\
  \ bean 实例，然后将其传递给与自定义 `Constraint` 注解关联的自定义 `ConstraintValidator`。想象一个“时间段”实体，它有一个“开始日期”属性，该属性应始终在“结束日期”属性之前。它看起来类似于以下内容：\n\
  \n\n\n```\n@PeriodConstraint\npublic class Period implements Serializable {\n@NotNull\n\
  private LocalDate startDate;\n@NotNull\nprivate LocalDate endDate;\n// 添加/生成 getter\
  \ 和 setter 方法。\n}\n```\n\n配合以下自定义约束注解：\n\n```\n@Constraint(validatedBy=PeriodValidator.class)\n\
  @Target(TYPE)\n@Retention(RUNTIME)\npublic @interface PeriodConstraint {\nString\
  \ message() default \"开始日期必须在结束日期之前\";\nClass[] groups() default {};\nClass[] payload()\
  \ default {};\n}\n```\n\n以及以下自定义约束验证器：\n\n```\npublic class PeriodValidator\nimplements\
  \ ConstraintValidator\n{\n@Override\npublic boolean isValid\n(Period period, ConstraintValidatorContext\
  \ context)\n{\nreturn period.getStartDate().isBefore(period.getEndDate());\n}\n\
  }\n```\n\n可以看到，Jakarta Bean Validation 期望在执行实际验证时，模型值已经存在于给定的 Bean 实例中。从 Jakarta\
  \ Faces 的角度来看，这意味着模型值必须在处理验证之前更新。然而，这与 Jakarta Faces 的生命周期不符，因为在 Jakarta Faces 生命周期中，模型值只有在验证成功处理后才会更新。本质上，Jakarta\
  \ Faces 需要克隆 Bean 实例，用所需的模型值填充它，在克隆的 Bean 实例上调用 Jakarta Bean Validation，收集所有验证错误，然后丢弃克隆的\
  \ Bean 实例。\n\n这正是 `<f:validateWholeBean>` 标签在底层所做的事情，该标签随 Jakarta Faces 2.3 引入。以下是一个使用此代码的表单示例：\n\
  \n配合以下支持 Bean：\n\n```\n@Named @ViewScoped\npublic class Booking implements Serializable\
  \ {\nprivate Period period = new Period();\n// 添加/生成 getter 方法。\n}\n```\n\n请注意，`<f:validateWholeBean>`\
  \ 标签被显式地放置为父级 `<h:form>` 的最后一个子元素，这确保了验证是在同一表单中所有单个输入组件之后最后执行的。这是符合规范的；如果标签位置错误，Jakarta\
  \ Faces 实现可能会抛出运行时异常。\n\n**Immediate 属性**\n\n`EditableValueHolder`、`ActionSource`\
  \ 和 `AjaxBehavior` 接口也指定了一个 `immediate` 属性，它基本上映射到所有 `UIInput` 和 `UICommand` 组件以及\
  \ `<f:ajax>` 标签的 `immediate` 属性。当在 `EditableValueHolder` 组件上设置为 `true` 时，通常在处理验证阶段（第三阶段）以及更新模型值阶段（第四阶段）发生的所有操作，都将在应用请求值阶段（第二阶段）执行。如果这些组件上的转换或验证失败，生命周期也将跳过处理验证阶段（第三阶段）。当在\
  \ `ActionSource` 组件或 `AjaxBehavior` 标签上设置为 `true` 时，通常发生在调用应用程序阶段（第五阶段）的所有操作，都将在应用请求值阶段（第二阶段）执行，并且仅在转换和验证没有失败的情况下执行。\n\
  \n从历史上看，此属性主要用于在表单上执行“内部”操作，通常是根据父输入组件提交的值加载子输入组件，而不会被同一表单中其他输入组件的转换或验证错误阻塞。一个常见的用例是在父下拉列表更改时填充子下拉列表，而不会冒子下拉列表的\
  \ `required` 属性阻止提交的风险。\n\n这种方法显然早于 Web 2.0 时代，在那个时代你只需为此使用 Ajax。需要理解的是，自从 Jakarta\
  \ Faces 2.0 引入 `<f:ajax>` 以来，`immediate` 属性基本上已经失去了这个用途。完全相同的用例可以通过以下更简洁的方式实现：\n\
  \n正如你在第 4 章中学到的，`<f:ajax>` 的 `execute` 属性默认值为 `@this`，因此这里省略了它。这也意味着同一表单中所有其他 `EditableValueHolder`\
  \ 组件将不会被处理，因此不会导致 `#{bean.loadCities}` 被来自其他输入的转换或验证错误阻塞。\n\n如今，有了 Ajax 魔法等特性，`immediate`\
  \ 属性已经失去了其主要用例。即使没有它，Jakarta Faces 也能正常运行。由于其历史用例，许多初学者可能会误以为其主要目的是“跳过所有验证”。然而，事实并非如此。为此，你需要精细调整\
  \ `<f:ajax>` 的 `execute` 属性，使其仅覆盖真正需要验证的输入组件。如果你希望在提交整个表单时实际“跳过所有验证”，那么最好使用 Jakarta\
  \ Bean Validation 约束（如 `@NotNull` 等），并简单地使用 `<f:validateBean disabled=\"true\">`\
  \ 包裹整个表单。\n\n**自定义转换器**\n\n从一开始，Jakarta Faces 就支持自定义转换器。主要用例是能够转换非标准模型值，例如特定于 Web\
  \ 应用程序的持久化实体。不太常见的用例是扩展现有的标准转换器，并在其构造函数中设置一些常用的默认值，这样你就可以在视图定义中用更少的代码来声明组件上所需的标准转换器配置。\n\
  \n假设你希望在持久化实体上创建主从页面，并且希望将实体的 ID 作为请求参数从主页面传递到从页面。以下是一个基于虚构 `Product` 实体的主页面 `/products/list.xhtml`\
  \ 中的数据表示例：\n\n```\n#{product.id}\n#{product.name}\n#{product.description}\n\n```\n\
  \n注意表格的最后一列。它生成了一个指向详情页面 `/products/edit.xhtml` 的链接，其中实体的 ID 作为 GET 请求参数传递，例如 `/product.xhtml?id=42`。在详情页面中，你可以使用\
  \ `<f:viewParam>` 将 GET 请求参数设置到支持 Bean 中。\n\n```\n\n...\n\n编辑产品 #{editProduct.product.id}\n\
  \n...\n\n```\n\n然而，有一个小问题：从 Java 角度来看，GET 请求参数本质上是一个表示产品 ID 的 `String`，而 `EditProduct`\
  \ 支持 Bean 的 `product` 属性实际上期望的是一个由传入 ID 标识的完整 `Product` 实体。\n\n```\n@Named @ViewScoped\n\
  public class EditProduct implements Serializable {\nprivate Product product;\n//\
  \ Getter+setter 方法。\n}\n```\n\n正是为了这个转换步骤，需要创建一个自定义转换器，它能够将表示产品 ID 的 `String` 与表示\
  \ `Product` 实体的 `Object` 之间进行转换。Jakarta Faces 提供了 `jakarta.faces.convert.Converter`\
  \ 接口^(³⁶) 来帮助入门。以下是这样一个 `ProductConverter` 的具体示例：\n\n```\n@FacesConverter(forClass=Product.class,\
  \ managed=true)\npublic class ProductConverter implements Converter {\n@Inject\n\
  private ProductService productService;\n@Override\npublic String getAsString\n(FacesContext\
  \ context, UIComponent component, Product product)\n{\nif (product == null) {\n\
  return \"\";\n}\nif (product.getId() != null) {\nreturn product.getId().toString();\n\
  }\nelse {\nthrow new ConverterException(\nnew FacesMessage(\"无效的产品 ID\"), e);\n\
  }\n}\n@Override\npublic Product getAsObject\n(FacesContext context, UIComponent\
  \ component, String id)\n{\nif (id == null || id.isEmpty()) {\nreturn null;\n}\n\
  try {\nreturn productService.getById(Long.valueOf(id));\n}\ncatch (NumberFormatException\
  \ e) {\nthrow new ConverterException(\nnew FacesMessage(\"无效的产品 ID\"), e);\n}\n\
  }\n}\n```\n\n\n\n在 `@FacesConverter` 注解中，有几个重要事项需要注意。首先，`forClass` 属性主要用于指定该转换器应在**处理验证阶段**（第三阶段）和**渲染响应阶段**（第六阶段）自动为其运行的目标实体类型。这样，您就无需在视图中显式注册转换器。如果您想显式注册，则可以将\
  \ `forClass` 属性替换为 `value` 属性，并指定转换器的唯一标识符，例如：\n\n```\n@FacesConverter(value=\"\
  project.ProductConverter\", managed=true)\n```\n\n然后，您可以在任何 `ValueHolder` 组件的 `converter`\
  \ 属性中，或任何嵌套的 `<f:converter>` 标签的 `converterId` 属性中，精确指定该转换器 ID。\n\n但是，如果您继续使用 `forClass`\
  \ 属性，则无需这样做。请注意，您不能同时指定两者。两者只能选其一，其中 `value` 属性的优先级高于 `forClass` 属性。因此，如果您同时指定了两者，`forClass`\
  \ 属性实际上会被忽略。我们不希望出现这种情况，因为对于透明转换整个实体这一特定目的而言，`forClass` 属性要强大得多。\n\n注解中需要注意的第二点是\
  \ `managed` 属性。这是 Jakarta Faces 2.3 中新增的。本质上，它用于在 CDI 上下文中管理转换器实例。为了在转换器中实现依赖注入，必须将\
  \ `managed` 属性设置为 `true`。以前，这是通过将转换器本身设为受管 bean 来解决的。^(³⁷)\n\n如果您以前使用过 Jakarta Faces\
  \ 转换器，您还会注意到该接口现在终于被参数化了。该接口早于 Java 1.5，因此从一开始就没有参数化。使用 `Converter<T>` 后，`getAsObject()`\
  \ 现在返回 `T` 而不是 `Object`，而 `getAsString()` 现在接受 `T` 作为值参数，而不是 `Object`。这省去了不必要的 `instanceof`\
  \ 检查和/或类型转换。\n\n请注意，Jakarta Faces 自身早于 Jakarta Faces 2.3 的标准转换器（目前基本上所有标准转换器都是如此）是冻结的，无法利用这一特性，否则它们将不再向后兼容。换句话说，它们仍然是原始类型。也就是说，有人可能在纯\
  \ Java 代码中以编程方式使用 Jakarta Faces 转换器，而不是让 Jakarta Faces 来处理它们，这种可能性虽小但并非不可避免。如果标准转换器被参数化，那么那些纯\
  \ Java 代码将无法再编译。这与 `Map#get()` 显式接受 `Object` 而不是 `K` 作为参数的原因基本相同。此外，还有一种更小但并非不可避免的可能性，即有人创建了一个自定义转换器，它扩展了标准转换器，但也显式地重新声明了该接口。类似于以下情况：\n\
  \n```\npublic class ExtendedNumberConverter\nextends NumberConverter implements\
  \ Converter\n{\n// ...\n}\n```\n\n如果 `NumberConverter` 以某种方式被参数化，那么这样一个晦涩的转换器将无法再编译。即使我们将\
  \ `NumberConverter` 参数化为 `Converter<Object>`，编译器也会对 `ExtendedNumberConverter` 报错，从而破坏向后兼容性，错误信息如下：\n\
  \n*接口 Converter 不能使用不同的参数实现多次：Converter<Object> 和 Converter*\n\n回到我们的 `ProductConverter`\
  \ 实现，在 `getAsString()` 中，您会注意到当模型值为 `null` 时，转换器显式地返回一个空字符串。这是根据 Javadoc 的要求。^(³⁸)\
  \ 技术原因是，当评估值为 `null` 时，Jakarta Faces 不会渲染关联的 HTML 属性。通常，这不是一个大问题。生成的 HTML 输出中未使用的属性越少越好。只是，这对于\
  \ `<select>` 元素的 `<option>` 来说，无法按预期工作。如果自定义转换器返回 `null` 而不是空字符串，那么 `<option>` 元素将在没有\
  \ `value` 属性的情况下被渲染，从而回退到提交其文本内容。这确实很尴尬，但 HTML 规范中确实是这样规定的。^(³⁹) 换句话说，如果您有一个转换器错误地返回\
  \ `null` 而不是空字符串，并且您有一个包含关联实体和默认选项的下拉列表，如下所示：\n\n那么，在提交默认选项时，Web 浏览器将把字面字符串“请选择……”发送到服务器，而不是空字符串。这会导致\
  \ `ProductConverter#getAsObject()` 中抛出 `NumberFormatException`，而我们本意是返回 `null`。因此，正确的解决方案是让\
  \ `getAsString()` 在模型值为 `null` 时返回一个空字符串。\n\n如果您有更多需要 Jakarta Faces 转换器的持久化实体，并且希望避免为所有其他持久化实体重复本质上相同的\
  \ `ProductConverter` 逻辑，那么您可以为其创建一个通用的 Jakarta Faces 转换器。如果您的所有持久化实体都继承自同一个定义了 `getId()`\
  \ 的基类，那么这种方法效果最好。\n\n```\n@MappedSuperClass\npublic abstract class BaseEntity implements\
  \ Serializable {\n@Id @GeneratedValue(strategy=IDENTITY)\nprivate Long id;\npublic\
  \ Long getId() {\nreturn id;\n}\n}\n```\n\n并且如果您为所有这些实体提供了一个基础实体服务：\n\n```\n@Stateless\n\
  public class BaseEntityService {\n@PersistenceContext\nprivate EntityManager entityManager;\n\
  @TransactionAttribute(SUPPORTS)\npublic  E getById(Class type, Long id) {\nreturn\
  \ entityManager.find(type, id);\n}\n}\n```\n\n那么通用转换器可以如下所示：\n\n```\n@FacesConverter(forClass=BaseEntity.class,\
  \ managed=true)\npublic class BaseEntityConverter implements Converter {\n@Inject\n\
  private BaseEntityService baseEntityService;\n@Override\npublic String getAsString\n\
  (FacesContext context, UIComponent component, BaseEntity entity)\n{\nif (entity\
  \ == null) {\nreturn \"\";\n}\nif (entity.getId() != null) {\nreturn entity.getId().toString();\n\
  }\nelse {\nthrow new ConverterException(\nnew FacesMessage(\"Invalid entity ID\"\
  ), e);\n}\n}\n@Override\npublic BaseEntity getAsObject\n(FacesContext context, UIComponent\
  \ component, String id)\n{\nif (id == null || id.isEmpty()) {\nreturn null;\n}\n\
  ValueExpression value = component.getValueExpression(\"value\");\nClass type = (Class)\n\
  value.getType(context.getELContext());\ntry {\nreturn baseEntityService.getById(type,\
  \ Long.valueOf(id));\n}\ncatch (NumberFormatException e) {\nthrow new ConverterException(\n\
  new FacesMessage(\"Invalid entity ID\"), e);\n}\n}\n}\n```\n\n这里的关键是 `ValueExpression#getType()`\
  \ 调用。它返回与组件 `value` 属性关联的 EL 表达式背后属性的实际类型。对于 `<f:viewParam value=\"#{editProduct.product}\"\
  >`，这将返回 `Product.class`，它符合 `Class<? extends BaseEntity>`。\n\n回到不太常见的自定义转换器用例，即扩展标准转换器，假设您有一个在\
  \ Web 应用程序中随处可见的 `<f:convertDateTime>` 配置：\n\n```\n\n并且您希望将其替换为类似以下内容：\n\n```\n\n\
  \n\n一种方法就是直接扩展它，在构造函数中设置默认值，\n并在 `*.taglib.xml` 文件中注册它，\n这样就完成了。下面是一个 `LocalDateConverter`\
  \ 可能的样子：\n\n```\n@FacesConverter(\"project.ConvertLocalDate\")\npublic class LocalDateConverter\
  \ extends DateTimeConverter {\npublic LocalDateConverter() {\nsetType(\"localDate\"\
  );\nsetPattern(\"yyyy-MM-dd\");\n}\n}\n```\n\n这是 `/WEB-INF/example.taglib.xml` 中的条目。\n\
  \n```\n<tag>\n    <tag-name>convertLocalDate</tag-name>\n    <converter-id>project.ConvertLocalDate</converter-id>\n\
  </tag>\n```\n\n或者，你也可以通过去掉转换器 ID 并将其设为 `forClass` 转换器，使其成为一个隐式转换器。\n\n```\n@FacesConverter(forClass=LocalDate.class)\n\
  ```\n\n这样，你甚至不需要任何 `<t:convertLocalDate>` 标签。别忘了删除 `example.taglib.xml` 中的 `<tag>`\
  \ 条目。它们不能同时使用。如果你需要这种情况，例如，因为你希望能够更改 `LocalDate` 的模式，请创建另一个子类。\n\n你甚至可以有一个针对 `java.lang.String`\
  \ 类型属性的 `forClass` 转换器。当你想要一个自动的、应用范围的字符串修剪策略，以防止模型被用户提交值中的前导或尾随空格污染时，这非常有用。下面是一个这样的转换器可能的样子：\n\
  \n```\n@FacesConverter(forClass=String.class)\npublic class TrimConverter implements\
  \ Converter {\n@Override\npublic String getAsString\n(FacesContext context, UIComponent\
  \ component, String modelValue)\n{\nreturn modelValue == null ? \"\" : modelValue;\n\
  }\n@Override\npublic String getAsObject(FacesContext context,\nUIComponent component,\
  \ String submittedValue)\n{\nif (submittedValue == null || submittedValue.isEmpty())\
  \ {\nreturn null;\n}\nString trimmed = submittedValue.trim();\nreturn trimmed.isEmpty()\
  \ ? null : trimmed;\n}\n}\n```\n\n最后但同样重要的是，当你需要将整个实体作为选择组件的 `SelectItem` 值提供时（如下所示，另请参见第\
  \ 4 章），并附带一个针对 `Country.class` 的自定义转换器：\n\n```\n<h:selectOneMenu value=\"#{bean.country}\"\
  \ converter=\"project.CountryConverter\">\n    <f:selectItems value=\"#{bean.availableCountries}\"\
  \ var=\"country\"\n        itemValue=\"#{country}\" itemLabel=\"#{country.name}\"\
  \ />\n</h:selectOneMenu>\n```\n\n其中相关的支持 bean 属性声明如下：\n\n```\nprivate Country country;\n\
  private List<Country> availableCountries;\n```\n\n那么你需要记住，该实体已正确实现了其 `equals()`\
  \ 和 `hashCode()` 方法。否则，Jakarta Faces 在提交表单时可能会抛出一个令人困惑的验证错误。\n\n*验证错误：值无效*\n\n当\
  \ bean 是请求作用域而不是视图作用域时，可能会发生这种情况，因此每次回发时都会重新创建可用国家列表。作为防止篡改请求的安全措施的一部分，Jakarta Faces\
  \ 将重新遍历可用选项，以验证所选选项是否确实在其中。Jakarta Faces 将使用 `Object#equals()` 方法将所选选项与每个可用选项进行测试。如果对于任何可用选项，此方法都没有返回\
  \ `true`，则会抛出上述验证错误。\n\n继续以 `BaseEntity` 示例为例，以下是你最好如何实现其 `equals()` 和 `hashCode()`\
  \ 方法。\n\n```\n@Override\npublic boolean equals(Object other) {\nif (getId() != null\n\
  && getClass().isInstance(other)\n&& other.getClass().isInstance(this))\n{\nreturn\
  \ getId().equals(((BaseEntity) other).getId());\n}\nelse {\nreturn (other == this);\n\
  }\n}\n@Override\npublic int hashCode() {\nif (getId() != null) {\nreturn Objects.hash(getId());\n\
  }\nelse {\nreturn super.hashCode();\n}\n}\n```\n\n请注意 `equals()` 方法中的双向 `Class#isInstance()`\
  \ 测试。这样做是为了代替 `getClass() == other.getClass()`，因为当你的持久化框架使用代理（例如 Hibernate）时，后者会返回\
  \ `false`。\n\n自定义验证器\n此外，验证器从一开始就可以在 Jakarta Faces 中进行自定义。由于几乎每个基本用例都已由标准 Jakarta\
  \ Faces 验证器甚至 Jakarta Bean Validation 约束（例如长度、范围和模式验证）涵盖，因此留给自定义 Jakarta Faces 验证器的最常见用例是通过根据数据库约束测试提交的值来验证数据完整性。通常，这些涉及唯一约束。\n\
  \n一个很好的实际示例是在基于电子邮件的注册过程中或在用户帐户管理页面中更改电子邮件地址时进行验证，以确认指定的电子邮件地址尚未被使用。特别是，值更改事件无法通过\
  \ Jakarta Bean Validation 约束以简单的方式进行测试，因为 Jakarta Bean Validation 不提供任何机会来比较旧值和新值，而无需从数据库中重新获取实体。在\
  \ Jakarta Faces 验证器中，你可以通过 `UIComponent` 参数轻松获取旧值。首先，相应地实现 `jakarta.faces.validator.Validator`\
  \ 接口^(⁴⁰)。\n\n```\n@FacesValidator(value=\"project.UniqueEmailValidator\", managed=true)\n\
  public class UniqueEmailValidator implements Validator {\n@Inject\nprivate UserService\
  \ userService;\n@Override\npublic void validate\n(FacesContext context, UIComponent\
  \ component, String email)\nthrows ValidatorException\n{\nif (email == null || email.isEmpty())\
  \ {\nreturn; // 让 @NotNull 或 required=true 处理此情况。\n}\nString oldEmail = (String)\
  \ ((UIInput) component).getValue();\nif (!email.equals(oldEmail) && userService.exist(email))\
  \ {\nthrow new ValidatorException(\nnew FacesMessage(\"Email already in use\"));\n\
  }\n}\n}\n```\n\n旧值可以简单地从 `UIInput#getValue()` 获取，它基本上返回 `UIInput` 组件的当前 `value`\
  \ 属性。为了使其运行，在任何 `EditableValueHolder` 组件的 `validator` 属性中，或任何嵌套的 `<f:validator>`\
  \ 标签的 `validatorId` 属性中，精确指定声明的验证器 ID。\n\n查看 `UniqueEmailValidator` 类时，你会注意到注解和接口也获得了与转换器相同的\
  \ Jakarta Faces 2.3 更改。与 `@FacesConverter` 一样，自 Jakarta Faces 2.3 起，`@FacesValidator`\
  \ 注解也获得了一个新的 `managed` 属性，该属性应启用验证器实现中的依赖注入。并且与 `Converter<T>` 一样，`Validator<T>`\
  \ 也被参数化，因此 `validate()` 方法现在接受一个 `T` 而不是 `Object` 作为值参数。\n\n你还需要确保你的验证器实现方式能够在其值参数为\
  \ `null` 或空时跳过验证。历史上，在 Jakarta Faces 1.x 中，当值参数为 `null` 时，`validate()` 方法总是会被跳过。然而，自从\
  \ Jakarta Bean Validation 集成到 Jakarta Faces 2.0 以来，这种情况发生了变化，从而破坏了基于 Jakarta Faces\
  \ 1.x 的现有自定义验证器的向后兼容性。可以通过显式设置以下 `web.xml` 上下文参数来关闭此破坏性更改：\n\n```\n<context-param>\n\
  \    <param-name>jakarta.faces.VALIDATE_EMPTY_FIELDS</param-name>\n    <param-value>false</param-value>\n\
  </context-param>\n```\n\n\n\n这样做的缺点是，Jakarta Faces 不会触发 Jakarta Bean Validation\
  \ 的 `@NotNull` 注解，你基本上需要为所有 Jakarta Faces 输入组件重复此约束，通过显式地将它们的 `required` 属性设置为 `true`。你最好不要这样做，而是继续在你的自定义验证器中执行\
  \ `null` 和空值检查。借助 Jakarta Bean Validation 在模型中的单一位置设置验证约束，比使用完全相同的模型在不同层之间重复验证约束更符合\
  \ DRY（不要重复自己）原则。\n\n回到验证提交值唯一性的用例，当然，你也可以跳过这一步，直接插入数据，并捕获来自持久化层的任何约束违反异常，然后相应地显示一条\
  \ Faces 消息。然而，这与当前在用户界面中更改输入字段后立即提供即时反馈的趋势并不相符。\n\n然而，在注册期间验证唯一电子邮件地址这个特定用例中，可能还有另一个原因不透露指定电子邮件地址唯一性的过多细节：安全性。在这种情况下，你最好让注册过程以与成功时完全相同的方式完成，即告诉用户检查邮箱，但在幕后，实际上向目标收件人发送一封不同的电子邮件，而不是激活邮件，最好每天不超过一次。该电子邮件的内容类似于以下内容：\n\
  \n*亲爱的用户，*\n\n*看起来您或其他人试图使用您的电子邮件地址* foo@example.com *在我们的网站上注册*，*但该地址已与一个现有账户关联。也许您实际上是想登录*\
  \ *或重置密码？如果确实不是您本人操作，请回复此邮件告知我们，我们将对此进行调查。*\n\n*此致，示例公司*\n\n最后，你可能还需要考虑使包含“`+`”字符（后跟一串字符，表示电子邮件别名）的用户名部分的电子邮件失效或去重。对于许多电子邮件提供商，尤其是\
  \ Gmail，电子邮件地址 `foo@gmail.com` 和 `foo+``bar@gmail.com` 指向的是完全相同的电子邮件账户，这基本上允许最终用户创建几乎无限数量的账户。\n\
  \n自定义约束\n虽然这不属于 Jakarta Faces 的范畴，但为了完整性，我们想展示另一个自定义 Jakarta Bean Validation 约束的示例。在关于\
  \ `<f:validateWholeBean>` 的章节中已经给出了一个早期示例。Jakarta Bean Validation API 已经提供了许多现成的约束，你可以在\
  \ `jakarta.validation.constraints` 包中找到它们。^(⁴¹)\n自定义 Jakarta Bean Validation 约束最常见的用例与本地化模式有关。想想电话号码、邮政编码、银行账号和密码。当然，大多数这些都可以仅通过\
  \ `@Pattern` 来完成，但这可能会导致代码的自文档性较差，尤其是在所需模式相对复杂的情况下。\n\n以下是一个自定义 `@Phone` 约束的示例，它应尽可能匹配国际公认的电话号码：\n\
  \n```\n@Constraint(validatedBy=PhoneValidator.class)\n@Target(FIELD)\n@Retention(RUNTIME)\n\
  public @interface Phone {\nString message() default \"Invalid phone number\";\n\
  Class[] groups() default {};\nClass[] payload() default {};\n}\n```\n\n这是关联的 `PhoneValidator`：\n\
  \n```\npublic class PhoneValidator\nimplements ConstraintValidator\n{\nprivate static\
  \ final Pattern SPECIAL_CHARS =\nPattern.compile(\"[\\\\s().+-]|ext\", Pattern.CASE_INSENSITIVE);\n\
  private static final Pattern DIGITS =\nPattern.compile(\"[0-9]{7,15}\");\n@Override\n\
  public boolean isValid\n(String phone, ConstraintValidatorContext context)\n{\n\
  if (phone == null || phone.isEmpty()) {\nreturn true; // 让 @NotNull/@NotEmpty 处理此情况。\n\
  }\nreturn isValid(phone);\n}\npublic static boolean isValid(String phone) {\nString\
  \ digits = SPECIAL_CHARS.matcher(phone).replaceAll(\"\");\nreturn DIGITS.matcher(digits).matches();\n\
  }\n}\n```\n\n要激活它，只需注解关联的实体属性即可。\n\n```\n@Phone\nprivate String phone;\n```\n\n\
  这将在 Jakarta Faces 和 Jakarta Persistence 两侧被触发：在 Jakarta Faces 中，在流程验证阶段（第三阶段）；在\
  \ Jakarta Persistence 中，在持久化和合并期间。如 `<f:validateBean>`/`<f:validateWholeBean>` 章节所述，可以在两侧禁用它。\n\
  \n自定义消息\n来自 Jakarta Faces 和 Jakarta Bean Validation 的转换和验证错误消息是完全可定制的。在应用程序范围内，可以通过提供一个属性文件来自定义它们，该文件将所需消息指定为预定义键的值。你可以在\
  \ Jakarta Faces 4.0 规范的第 2.5.2.4 节“本地化应用程序消息”中找到 Jakarta Faces 转换和验证消息的预定义键。^(⁴²)\
  \ 你可以在 Jakarta Bean Validation 3.0 规范的附录 B“标准 ResourceBundle 消息”中找到 Jakarta Bean\
  \ Validation 消息的预定义键。^(⁴³) 对于 Jakarta Faces，属性文件的完全限定名称必须在 `faces-config.xml` 中注册为\
  \ `<message-bundle>`。对于 Jakarta Bean Validation，属性文件的确切完全限定名称是 `ValidationMessages`。\n\
  \n作为示例，我们将修改 Jakarta Faces `required=\"true\"` 验证和 Jakarta Bean Validation `@NotNull`\
  \ 约束的默认消息。\n\n```\nmain/java/resources/com/example/project/i18n/messages.properties\n\
  jakarta.faces.component.UIInput.REQUIRED = {0} 是必需的。\njakarta.faces.validator.BeanValidator.MESSAGE\
  \ = {1} {0}\nmain/java/resources/ValidationMessages.properties\njakarta.validation.constraints.NotNull.message\
  \ = 是必需的。\n```\n\n请注意 Jakarta Bean Validation 消息中缺少标签占位符。相反，`jakarta.faces.validator.BeanValidator.MESSAGE`\
  \ 中的 `{1}` 表示与 Jakarta Faces 组件关联的 `label`，而 `{0}` 表示 Jakarta Bean Validation 消息。自定义的\
  \ Jakarta Bean Validation 消息包文件会自动被拾取。自定义的 Jakarta Faces 消息包文件需要先在 `faces-config.xml`\
  \ 中显式注册。\n\n```\ncom.example.project.i18n.messages\n\n```\n\n有了这些属性文件，以下输入组件将显示完全相同的验证错误消息：\n\
  \n如果你想在单个组件的基础上精细控制消息，可以使用 `UIInput` 组件的 `converterMessage`、`validatorMessage` 和/或\
  \ `requiredMessage` 属性。`converterMessage` 将在任何转换错误时显示。\n\n`validatorMessage` 将在任何验证错误以及由\
  \ Jakarta Bean Validation 触发的错误时显示。\n\n请注意，当 `required=\"true\"` 未满足时，不会显示此消息。为此，你需要改用\
  \ `requiredMessage`。\n\n请注意，对于任何 Jakarta Bean Validation 的 `@NotNull`，不会显示此消息。你应该改用\
  \ `validatorMessage`。\n\n脚注\n\n6. 输出组件\n\n\n\n从技术上讲，第 4 章中描述的输入组件也是输出组件。它们不仅能够处理任何提交的输入值，还能够在渲染响应阶段（第六阶段）输出模型值。这一点在\
  \ Jakarta Faces API（应用程序编程接口）中也很明显：`UIInput` 超类继承自 `UIOutput` 超类。\n\n还有一组组件仅输出其模型值，甚至仅输出一个\
  \ HTML 元素。这些是纯输出组件。它们不参与 Jakarta Faces 生命周期的所有阶段。有时，它们会在恢复视图阶段（第一阶段）参与，如果它们是动态创建或操作的话，但它们的大部分工作是在渲染响应阶段（第六阶段）生成\
  \ HTML 输出时执行的。在其他阶段，它们不会执行太多额外的任务。\n\n**基于文档的输出组件**\n\n这些组件是 `<h:doctype>`、`<h:head>`\
  \ 和 `<h:body>`。请注意，没有像 `<h:html>` 这样的组件。`<h:doctype>` 可以说是整个标准 Jakarta Faces HTML\
  \ 组件集中使用最少的 HTML 组件。你可以只使用一个普通的 `<!DOCTYPE html>` 元素。`<h:doctype>` 仅在你需要 `<!DOCTYPE>`\
  \ 元素的纯 XML 表示形式时才有用，这通常只发生在你需要将整个 Jakarta Faces 视图存储为 Jakarta Faces 周围某个更高级抽象层的另一个\
  \ XML 结构的一部分时。\n\n`<h:head>` 和 `<h:body>` 标签是 Jakarta Faces 中最重要的标签。虽然生成 HTML 文档的\
  \ `<head>` 和 `<body>` 元素不需要任何特殊逻辑，但这些标签对于正确自动处理 JavaScript 和 CSS（层叠样式表）资源依赖关系是必需的，这也是\
  \ Jakarta Faces 2.0 中引入的功能。\n\n`<h:head>` 和 `<h:body>` 允许 Jakarta Faces 自动将 JavaScript\
  \ 和 CSS 资源依赖关系重新定位到组件树中的正确位置，以便它们最终出现在生成的 HTML 输出中的正确位置。在标准 Jakarta Faces 组件集中，只有\
  \ `<h:commandLink>`、`<h:commandScript>`、`<f:ajax>` 和 `<f:websocket>` 使用此功能。它们都需要在最终的\
  \ HTML 文档中包含 `faces.js` JavaScript 文件。在视图构建期间，它们基本上会使用 `UIViewRoot#addComponentResource()`^(⁴⁴)\
  \ 在指定的目标组件（可以是 `<h:head>` 或 `<h:body>`）处注册组件资源依赖关系。在视图渲染期间，与 `<h:head>` 和 `<h:body>`\
  \ 组件关联的渲染器将通过 `UIViewRoot#getComponentResources()`^(⁴⁵) 获取所有已注册的组件资源依赖关系，并生成带有引用相关资源依赖关系的\
  \ URL（统一资源定位符）的适当 `<link rel=\"stylesheet\">` 和 `<script>` 元素。\n\n如第 3 章“标准 HTML\
  \ 组件”部分所示，以下代码是最小且符合 HTML5 规范的 Jakarta Faces 页面的样子：\n\n```\n\n标题\n\n...\n\n```\n\
  \n**基于文本的输出组件**\n\n这些组件是 `<h:outputText>`、`<h:outputFormat>`、`<h:outputLabel>` 和\
  \ `<h:outputLink>`。它们都继承自 `UIOutput` 超类，并具有一个可以绑定到受管 bean 属性的 `value` 属性。在视图渲染期间，将调用\
  \ getter 方法来检索和显示任何预设值。这些组件永远不会调用 setter 方法，因此，可以安全地将其从受管 bean 类中省略，以减少未使用的代码。\n\
  \n历史上，在 Jakarta Pages 上的 Jakarta Faces 1.x 中，必须使用 `<h:outputText>` 才能将 bean 属性作为文本输出。Jakarta\
  \ Pages 不支持模板文本中的 Jakarta Faces 风格的 EL（表达式语言）`#{...}`。Facelets 支持模板文本中的 Jakarta\
  \ Faces 风格的 EL `#{...}`，因此，可以直接在 Facelets 中输出 bean 属性，而无需整个组件。换句话说，以下代码在 Facelets\
  \ 中是等效的。\n\n使用 `<h:outputText>`：\n\n```\n欢迎，！\n```\n\n以及在模板文本中使用 EL：\n\n```\n欢迎，#{user.name}！\n\
  ```\n\n无需解释，后者的代码片段更简洁且可读性更强。然而，`<h:outputText>` 在 Facelets 中并未变得无用。它仍然适用于以下目的：\n\
  \n*   禁用隐式 HTML 转义\n*   附加显式转换器\n*   在 `<f:ajax render>` 中引用\n\nJakarta Faces 在任何地方都有隐式\
  \ HTML 转义。任何输出到 HTML 响应的内容都会检查 HTML 特殊字符“`<`”、“`>`”、“`&`”，并且当在 HTML 元素的属性内输出时，还会检查“`\"\
  `”。这些 HTML 特殊字符将分别被替换为“`& lt;`”、“`& gt;`”、“`& amp;`”和“`& quot;`”。然后，Web 浏览器不会将这些字符解释为生成的\
  \ HTML 输出的一部分，而是将其视为纯文本，并最终将它们作为字面字符呈现给最终用户。\n\n想象一下，用户选择 `<script>alert('xss')</script>`\
  \ 作为用户名，并通过前面显示的任一代码片段通过 `#{``user.name``}` 发出；那么 Jakarta Faces 将在生成的 HTML 输出中将其渲染如下：\n\
  \n```\n欢迎，&lt;script&gt;alert('xss')&lt;/script&gt;！\n```\n\n而 Web 浏览器将按字面意思显示为“欢迎，<script>alert('xss')</script>!”，而不是仅显示“欢迎，!”并附带一个显示文本“xss”的\
  \ JavaScript 警告框，从而无意中实际执行了用户控制的 JavaScript。最终用户能够执行任意 JavaScript 代码是危险的。这将允许恶意用户在其他人登录并查看以这种方式渲染恶意用户用户名的页面时，执行特定代码，将会话\
  \ cookie 的信息传输到外部主机。（另请参阅第 13 章中的“跨站脚本保护”部分。）\n\n另一方面，也可能存在您希望将安全的 HTML 代码嵌入到生成的\
  \ HTML 输出中的情况。最常见的用例与在网站上为其他用户发布消息有关，其中允许使用有限的格式子集，例如粗体、斜体、链接、列表和标题。通常，这些内容需要使用预定义的人类友好标记格式（例如\
  \ Markdown，或不太为人所知的 Wikicode，或古老的 BBCode）在文本区域元素中输入。\n\n```\n上述标记格式都能够解析带有标记的原始文本，并将其转换为安全的\
  \ HTML 代码，其中任何恶意的 HTML 代码都已被转义或剥离。原始文本至少始终保存在数据库中作为记录，并且生成的安全 HTML 代码以及所使用的解析器版本也可以保存在数据库中以提高性能，这样就不必为同一段原始文本不必要地重新执行解析器。\n\
  \n假设我们将使用带有 CommonMark^(⁴⁶) 的 Markdown，并具有以下 `Markdown` 接口：\n\n\n\n```\nprivate\
  \ interface Markdown {\npublic String getText();\npublic void setHtml(String html);\n\
  public String getVersion();\npublic void setVersion(String version);\n}\n```\n\n\
  以及以下 `MarkdownListener` 实体监听器：\n\n```\npublic class MarkdownListener {\nprivate\
  \ static final Parser PARSER = Parser.builder().build();\nprivate static final HtmlRenderer\
  \ RENDERER =\nHtmlRenderer.builder().escapeHtml(true).build();\nprivate static final\
  \ String VERSION = getCommonMarkVersion();\n@PrePersist\npublic void parseMarkdown(Markdown\
  \ markdown) {\nString html = RENDERER.render(PARSER.parse(markdown.getText()));\n\
  markdown.setHtml(html);\nmarkdown.setVersion(VERSION);\n}\n@PreUpdate\npublic void\
  \ parseMarkdownIfNecessary(Markdown markdown) {\nif (markdown.getVersion() == null)\
  \ {\nparseMarkdown(markdown);\n}\n}\n@PostLoad\npublic void updateMarkdownIfNecessary(Markdown\
  \ markdown) {\nif (!VERSION.equals(markdown.getVersion())) {\nparseMarkdown(markdown);\n\
  }\n}\nprivate static String getCommonMarkVersion() {\ntry {\nProperties properties\
  \ = new Properties();\nproperties.load(Parser.class.getResourceAsStream(\n\"/META-INF/maven/com.atlassian.commonmark\"\
  \n+ \"/commonmark/pom.properties\"));\nreturn properties.getProperty(\"version\"\
  );\n}\ncatch (IOException e) {\nthrow new UncheckedIOException(e);\n}\n}\n}\n```\n\
  \n然后，实现 `Markdown` 接口并注册了 `MarkdownListener` 实体监听器的 `Message` 实体可以如下所示：\n\n```\n\
  @Entity @EntityListeners(MarkdownListener.class)\npublic class Message implements\
  \ Markdown, Serializable {\n@Id @GeneratedValue(strategy=IDENTITY)\nprivate Long\
  \ id;\n@Column(nullable = false) @Lob\nprivate @NotNull String text;\n@Column(nullable\
  \ = false) @Lob\nprivate String html;\n@Column(nullable = false, length = 8)\nprivate\
  \ String version;\n@Override\npublic void setText(String text) {\nif (!text.equals(this.text))\
  \ {\nthis.text = text;\nsetVersion(null); // 触发 MarkdownListener 的 @PreUpdate。\n\
  }\n}\n// 添加/生成其余的 getter 和 setter 方法。\n}\n```\n\n最后，为了向最终用户呈现安全的 HTML 代码，你可以使用 `<h:outputText>`，并将其\
  \ `escape` 属性设置为 `false`，从而指示 Jakarta Faces 无需隐式地对值进行 HTML 转义。\n\n```\n\n除了隐式 HTML\
  \ 转义之外，Jakarta Faces 还支持隐式转换。对于通过 `<h:outputText>` 或模板文本中的 EL 发出的任何属性类型，Jakarta\
  \ Faces 将按类查找转换器，调用其 `Converter#getAsString()` 方法，并渲染结果。如果你想显式地使用特定或不同的转换器，则必须将模板文本中的任何\
  \ EL 替换为 `<h:outputText>`，并显式地在其上注册转换器。通常，那些需要以特定于区域设置的格式进行格式化的数字或日期时间相关属性才需要这样做。\n\
  \n`<h:``outputText>` 的最后一个用途是能够在 `<f:ajax render>` 中引用一段内联文本。默认情况下，`<h:outputText>`\
  \ 不会生成任何 HTML 代码。但如果它至少指定了一个必须出现在生成的 HTML 输出中的属性，例如 `id` 或 `styleClass`，那么它将生成一个\
  \ HTML `<span>` 元素。该元素可通过 JavaScript 引用，因此对于通过 Ajax 更新文本的特定部分非常有用。当然，你也可以选择通过 Ajax\
  \ 更新某个公共容器组件，但这远不如仅通过 Ajax 更新真正需要更新的特定部分高效。\n`<h:``outputFormat>` 是 `<h:outputText>`\
  \ 的扩展，它预先使用 `java.text.MessageFormat` API^(⁴⁷) 解析值。这在与本地化资源包结合使用时特别有用。可以在第 14 章的“参数化资源包值”一节中找到示例。\n\
  `<h:``outputLabel>` 基本上会生成 HTML `<label>` 元素，这是 HTML 表单的重要组成部分。这已在第 4 章的“标签和消息组件”一节中描述过。需要注意的是，从\
  \ HTML 的角度来看，`<h:outputLabel>` 和 `<h:outputText>` 绝对不可互换。在互联网上最近涌现的一批低质量编程教程网站中（这些网站基本上只展示代码片段，没有任何技术解释，以获取广告收入），`<h:outputLabel>`\
  \ 经常被错误地用于在 Hello World Jakarta Faces 页面中输出一段文本。这类教程网站最好完全忽略。\n\n`<h:``outputLink>`\
  \ 会生成一个 HTML `<a>` 元素。它有点像是 Jakarta Faces 1.x 的遗留物，自从 Jakarta Faces 2.0 中引入了更有用的\
  \ `<h:link>` 之后，它的作用就不太大了。当你不需要使用链接来引用 Jakarta Faces 视图时（此时应使用 `<h:link>`），你也可以直接使用纯\
  \ HTML `<a>` 元素来代替 `<h:outputLink>`。以下标签会生成完全相同的 HTML：\n\n```\nGoogle\nGoogle\n\
  ```\n\n纯 HTML 的等价写法更简洁。\n\n基于导航的输出组件\n这些组件是 `<h:link>` 和 `<h:button>`，它们都继承自 `UIOutcomeTarget`\
  \ 超类。它们有一个 `outcome` 属性，该属性接受指向 Jakarta Faces 视图的逻辑路径。如果路径是有效的 Jakarta Faces 视图，则该路径实际上会被验证；否则，链接或按钮将呈现为禁用状态。换句话说，它们不接受指向非\
  \ Jakarta Faces 资源的路径，更不用说外部 URL 了。对于这种情况，你需要使用 `<h:outputLink>` 或纯 HTML `<a>` 元素。\n\
  `<h:link>` 将生成一个 HTML `<a>` 元素，其 `href` 属性指定了目标 Jakarta Faces 视图的 URL。`<h:button>`\
  \ 将生成一个 HTML `<input type=\"button\">` 元素，其 `onclick` 属性借助 JavaScript 将目标 Jakarta\
  \ Faces 视图的 URL 赋值给 `window.location.href` 属性。这确实有点笨拙，但这只是 HTML 的一个限制。`<input type=\"\
  button\">` 和 `<button>` 都不支持类似 `href` 的属性。\n假设 Eclipse 中 Maven WAR 项目的文件夹结构如下：\n\
  ![](img/454457_2_En_6_Figa_HTML.jpg)\n\n以下位于 `/folder1/page1.xhtml` 中的 `<h:link>`\
  \ 和 `<a>` 对将在 HTML 输出中生成完全相同的链接。\n\n```\nlink1\n\nlink2\n\nlink3\n\nlink4\n\nlink5\n\
  ```\n\n因此请注意，`<h:link>` 已经会自动在 Web 应用程序项目的任何上下文路径前添加前缀，并附加当前活动的 `FacesServlet` 映射的\
  \ URL 模式。还要注意，如果没有前导斜杠，则 outcome 相对于当前文件夹进行解释；如果有前导斜杠，则 outcome 相对于上下文路径进行解释。\n\n\
  \n\n基于面板的输出组件\n这些组件是 `<h:panelGroup>` 和 `<h:panelGrid>`，它们都继承自 `UIPanel` 超类。`<h:panelGroup>`\
  \ 具有多种职责。它可以生成 HTML 的 `<span>`、`<div>` 甚至 `<td>` 元素，具体取决于 `layout` 属性以及它是否被包含在 `<h:panelGrid>`\
  \ 中。\n\n默认情况下，`<h:panelGroup>` 仅生成一个 HTML `<span>` 元素，这与 `<h:outputText>` 完全相同。主要区别在于\
  \ `<h:panelGroup>` 没有 `value` 属性。相反，其内容由其子元素表示。它也不支持禁用 HTML 转义或附加转换器。这些功能由任何 `<h:outputText>`\
  \ 子元素负责。在这种上下文中，它并不是特别有用。只有当您需要使用 `<f:ajax render>` 引用一个内联元素，而该元素又用于组合一组紧密相关的内联元素时，`<h:panelGroup>`\
  \ 才比 `<h:outputText>` 更有用。类似下面表示“用户资料”的代码，该资料应该可以通过页面下方某种用户资料编辑表单中的 Ajax 进行更新。\n\
  \n```\n欢迎，\n\n#{user.name}\n\n...\n\n...\n\n...\n\n```\n\n当将 `<h:panelGroup>` 的\
  \ `layout` 属性设置为 `block` 时，它将生成一个 HTML `<div>` 元素。在标准 HTML 中，“内联元素”^(⁴⁸) 默认不会在新行开始，也不允许包含块级子元素。而“块级元素”^(⁴⁹)\
  \ 默认总是在新行开始，并且允许包含内联和块级子元素。因此，`<h:panelGroup>` 的 `layout` 属性支持的值是“`inline`”和“`block`”。从历史上看，`layout`\
  \ 属性是在 Jakarta Faces 1.2 中才添加的，原因是 Jakarta Faces 开发者抱怨缺少一个用于表示 HTML `<div>` 元素的\
  \ Jakarta Faces 组件。然后，这个组件可以用来包装需要 Ajax 更新的较大块级区域；否则，一个普通的 HTML `<div>` 也足够了。\n\n\
  ```\n\n欢迎，\n\n#{user.name}\n\n```\n\n请注意，在 HTML 中，将块级元素嵌套在内联元素中是非法的。`<p>` 是一个块级元素，因此，在前面的结构中，`layout=\"\
  block\"` 是绝对必需的。如果您不指定此属性，从而让 Jakarta Faces 渲染一个 HTML `<span>` 元素，那么 Web 浏览器的行为将是未指定的。普通的\
  \ Web 浏览器会将块级子元素渲染到内联元素之外，甚至可能在 JavaScript 遍历此结构时出错，因为它不一定能在内联元素中找到预期的块级子元素。\n还要记住，在前面的结构中，`<p>`\
  \ 标签和“欢迎”文本也会在对 `<h:panelGroup>` 执行任何 Jakarta Faces Ajax 更新操作时被更新。这本质上是对服务器端和客户端硬件资源的浪费，因为它们是静态的，永远不会发生变化。在进行\
  \ Ajax 更新时，您最好确保 `<f:ajax render>` 只引用那些绝对需要 Ajax 更新的组件，而不是一个也包含静态部分的不必要的大区域。\n\
  当 `<h:panelGroup>` 被嵌套在生成 HTML `<table>` 元素的 `<h:panelGrid>` 组件中时，`<h:panelGroup>`\
  \ 的 `layout` 属性将被忽略，该组件将基本上充当一个容器，用于容纳最终应位于表格同一单元格中的组件。也就是说，`<h:panelGrid>` 的渲染器会将每个直接子组件视为一个单独的表格单元格。\n\
  \n给定以下两列的 `<h:panelGrid>`，它应该生成一个两列的 HTML 表格，您猜猜实际生成的 HTML 输出会是什么样子？\n\n```\n一\n\
  \n三\n四\n五\n六\n七\n\n八\n九\n\n```\n\n两个 Jakarta Faces 组件之间的每一段模板文本在内部都被视为一个单独的 Jakarta\
  \ Faces 组件。在 Mojarra 中，它由内部的 `UIInstructions` 组件表示。在视图构建时间之后，实际的组件树层次结构大致如下所示：\n\
  \n```\n一\n\n三\n四\n\n五\n\n六\n七\n\n八\n九\n\n```\n\n再次注意，Facelets 中没有像 `<ui:instructions>`\
  \ 这样的组件。前面的标记纯粹是为了可视化实际的组件树层次结构，以便您的大脑更好地处理它。这个 `<h:panelGrid>` 实际上有六个直接子组件，每个子组件都将位于自己的表格单元格中。对于两列，这将有效地生成三行。以下是实际生成的\
  \ HTML 输出（为便于阅读而重新格式化）。\n\n```\n\n一\n二\n\n三 四\n五\n\n六 七\n八 九\n\n```\n\n在 Chrome\
  \ 浏览器中的渲染效果：\n![](img/454457_2_En_6_Figb_HTML.jpg)\n\n您看，`<h:panelGroup>` 确保了“五”和“八\
  \ 九”不会与“六 七”位于同一个表格单元格中。还要注意，如果某个 Jakarta Faces 组件已经代表一个单独的单元格，则无需将其包装在 `<h:panelGroup>`\
  \ 中。这就是为什么“二”后面的 `<h:outputText>` 不需要包装在 `<h:panelGroup>` 中。当然，您也可以这样做以提高源代码的可读性，但这在技术上是不必要的。以下带有显式\
  \ `<h:panelGroup>` 声明的代码会生成完全相同的 HTML 输出，但毫无疑问，人类更容易解析它。\n\n```\n\n一\n\n二\n\n三\n\
  四\n\n五\n\n六\n七\n\n八\n九\n\n```\n\n如果您碰巧需要基于视图作用域的可迭代模型来生成动态数量的单元格，那么您可以在 `<h:panelGrid>`\
  \ 中嵌套 Jakarta 标签 `<c:forEach>`，以便将其生成为具有固定列数的数据网格。\n\n```\n\n#{product.name}\n#{product.description}\n\
  \n```\n\n因此请注意，与 `<c:forEach>` 相比，`<ui:repeat>` 在此处不适用，如第 3 章的“Jakarta 标签”部分所述。它在技术上可以正常工作，但\
  \ `<h:panelGrid>` 的渲染器会将其解释为单个表格单元格。\n还要注意，这个可迭代模型是视图作用域非常重要，特别是当您在 `<h:panelGrid>`\
  \ 内部有 Jakarta Faces 表单组件时。技术原因是，在处理回发请求期间，Jakarta Faces 期望提交的迭代索引背后的迭代项与页面呈现给最终用户时的项完全相同。换句话说，当\
  \ Jakarta Faces 即将处理表单提交时，如果在此期间某个项被添加、删除甚至重新排序，导致其迭代索引可能发生变化，那么提交的值和/或调用的操作可能会针对当前位于最初已知索引处的错误项执行。这对模型的完整性是危险的。如果您在\
  \ `<h:panelGrid>` 内部没有任何 Jakarta Faces 表单组件，或者该模型在视图作用域内不会发生变化（例如，因为它仅在应用程序启动时创建或更新），那么\
  \ `#{viewProducts}` 背后的支持 bean 可以安全地设置为请求作用域。\n\n数据迭代组件\n只有一个，即 `<h:dataTable>`，它继承自\
  \ `UIData` 超类，并基于可迭代的数据模型生成一个 HTML `<table>`，其中每个项目表示为单独的一行。Jakarta Faces 中可用的另一个数据迭代组件，即\
  \ Facelets 的 `<ui:repeat>`，并不继承自 `UIData` 超类，也不生成任何 HTML 输出，因此在技术上不算作“输出组件”。此外，在标准的\
  \ Jakarta Faces 组件集中，没有组件生成 HTML 的 `<ul>`、`<ol>` 或 `<dl>`，但这可以通过创建一个继承自 `UIData`\
  \ 的自定义组件相对容易地实现（另请参阅第 11 章的“创建新组件和渲染器”部分）。\n\n\n\n`UIData` 的 `value` 属性支持 `java.lang.Iterable`。换句话说，你可以将任何\
  \ Java 集合作为模型值提供。由于 `UIData` 中最常使用基于索引的访问，因此最高效的是 `java.util.ArrayList`，因为它提供了 `O(1)`\
  \ 的索引访问。\n\n`<h:dataTable>` 组件的渲染器仅支持 `<h:column>` 作为直接子组件，其他内容将被忽略。顾名思义，`<h:column>`\
  \ 代表单个列。每次遍历 `<h:dataTable>` 的 `value` 时，基本上都会根据当前遍历的项重新渲染所有列。与 `<c:forEach>` 和\
  \ `<ui:repeat>` 一样，当前遍历的项通过 `var` 属性暴露在 EL 作用域中。以下是一个遍历 `List<String>` 的基本示例。\n\n\
  ```\n#{string}\n\n```\n\n后台 Bean 类 `com.example.project.view.Bean`：\n\n```\n@Named\
  \ @RequestScoped\npublic class Bean {\nprivate List strings;\n@PostConstruct\npublic\
  \ void init() {\nstrings = Arrays.asList(\"one\", \"two\", \"three\");\n}\npublic\
  \ List getStrings() {\nreturn strings;\n}\n}\n```\n\n生成的 HTML 输出：\n\n```\n\none\n\
  two\nthree\n\n```\n\n在 Chrome 浏览器中的渲染效果：\n\n![](img/454457_2_En_6_Figc_HTML.jpg)\n\
  \n需要注意的是，由 `var` 属性指定的变量名不应与现有的受管 Bean 名称甚至隐式 EL 对象冲突。隐式 EL 对象在 EL 解析中具有更高的优先级。隐式\
  \ EL 对象的一个例子是 `#{header}`，它引用 `ExternalContext#getRequestHeaderMap()`。^(⁵⁰) 因此，如果你碰巧有\
  \ `#{bean.headers}` 并且希望在迭代组件中呈现它，那么你不能使用 `var=\"header\"`，最好想一个不同的名称，例如 `var=\"\
  head\"`。\n\n以下是一个更详细的示例，展示了产品列表。类似的表格在第五章的“自定义转换器”部分已经展示过。\n\n```\n\nID\n#{product.id}\n\
  \nName\n#{product.name}\n\nDescription\n#{product.description}\n\n```\n\n后台 Bean\
  \ 类 `com.example.project.view.Products`：\n\n```\n@Named @RequestScoped\npublic class\
  \ Products {\nprivate List list;\n@Inject\nprivate ProductService productService;\n\
  @PostConstruct\npublic void init() {\nlist = productService.list();\n}\npublic List\
  \ getList() {\nreturn list;\n}\n}\n```\n\n产品实体：`com.example.project.model.Product`：\n\
  \n```\n@Entity\npublic class Product {\n@Id @GeneratedValue(strategy=IDENTITY)\n\
  private Long id;\n@Column(nullable = false)\nprivate @NotNull String name;\n@Column(nullable\
  \ = false)\nprivate @NotNull String description;\n// 添加/生成 getter+setter 方法。\n}\n\
  ```\n\n产品服务：`com.example.project.service.ProductService`：\n\n```\n@Stateless\npublic\
  \ class ProductService {\n@PersistenceContext\nprivate EntityManager entityManager;\n\
  @TransactionAttribute(SUPPORTS)\npublic List list() {\nreturn entityManager\n.createQuery(\"\
  FROM Product ORDER BY id DESC\", Product.class)\n.getResultList();\n}\n}\n```\n\n\
  生成的 HTML 输出：\n\n```\n\nID\nName\nDescription\n\nThree\nThe third product\n\nTwo\n\
  The second product\n\nOne\nThe first product\n\n```\n\n在 Chrome 浏览器中的渲染效果：\n![](img/454457_2_En_6_Figd_HTML.jpg)\n\
  需要注意的是，`<h:dataTable>` 的 `value` 属性背后的可迭代模型必须引用一个已在一次性生命周期事件（如 `@PostConstruct`\
  \ 或 `<f:viewAction>`）中预先准备好的 Bean 属性。这并非特指 `UIData` 组件，而是基本上适用于每个 Jakarta Faces\
  \ 组件。也就是说，在 Jakarta Faces 生命周期中，getter 方法可能会被多次调用，尤其是在迭代组件的 `value` 属性或任何 Jakarta\
  \ Faces 组件的 `rendered` 属性中被引用时。\n\n技术原因是，任何 EL 值表达式在幕后都会被创建为一个 `jakarta.el.ValueExpression`\
  \ 实例，该实例内部基本上只保存字面量 EL 字符串，如 `\"#{products.list}\"`，并且每次对其调用 `ValueExpression#getValue()`\
  \ 都会简单地根据提供的 EL 上下文重新计算表达式。这通常是一个非常廉价的操作，耗时在纳秒级别，但当 getter 方法反过来执行一个相对昂贵的数据库查询（可能需要数十、数百甚至数千毫秒）时，它可能会急剧变慢。\n\
  \n当迭代组件恰好嵌套了 Jakarta Faces 表单组件时，迭代组件可能会在 Jakarta Faces 生命周期的每个阶段调用 getter 方法。如果你通过在\
  \ getter 方法中从数据库获取列表来准备可迭代模型，那么这将导致每次调用 getter 方法时都查询数据库，这显然是低效的。此外，关于根据提交的迭代索引解析感兴趣的迭代项的问题，也可能出现，正如上一节关于\
  \ `<h:panelGrid>` 与 `<c:forEach>` 的最后一段所述。\n\n另一件需要注意的事情是 `<f:facet name=\"header\"\
  >`。这基本上会生成一个 `<thead>` 元素，其内容位于 `<th>` 元素中。`<h:dataTable>` 也支持 `<f:facet name=\"\
  footer\">`，它会生成一个 `<tfoot>` 元素，其内容位于 `<td>` 元素中。你通常可以在标签文档以及 `<h:dataTable>` 标签文档中找到所有支持的\
  \ `<f:facet>` 名称。^(⁵¹)\n\n基本上，你可以在 `<h:column>` 内部放置任何内容来表示单元格内容，甚至可以是表单组件或嵌套的 `<h:dataTable>`\
  \ 或 `<ui:repeat>`。以下是一个小示例，展示了在嵌套的 `<ui:repeat>` 中显示 `Product` 实体的一个虚构的 `Set<Tag>\
  \ tags` 属性。\n\n```\n...\n\n#{tag.name}\n\n```\n\n可编辑的 `<h:dataTable>`\n\n至于嵌套在 `<h:column>`\
  \ 内部的表单组件，你可以用输入组件替换模板文本中的 EL，如下所示：\n\n```\n\nID\n#{product.id}\n\nName\n\nDescription\n\
  \n```\n\n其中，后台 Bean 类的 `save()` 方法在将后台 Bean 类从 `@RequestScoped` 更改为 `@ViewScoped`\
  \ 后，基本如下所示：\n\n```\npublic void save() {\nproductService.update(products);\n}\n\
  ```\n\n而服务类的 `update()` 方法则如下所示：\n\n```\n@TransactionAttribute(REQUIRED)\npublic\
  \ void update(Iterable products) {\nproducts.forEach(entityManager::merge);\n}\n\
  ```\n\n请注意，你完全无需担心收集提交的值。Jakarta Faces 已经为你完成了这项任务。另外，也无需担心 `<h:dataTable>` 内组件\
  \ ID 的唯一性，因为该组件已经实现了 `NamingContainer` 接口，并会将其自身的客户端 ID 和迭代索引前置到子组件的客户端 ID 之前，正如你在以下生成的\
  \ HTML 输出中所见：\n\n```\n\nID\nName\nDescription\n\nThe third product\n\nThe second\
  \ product\n\nThe first product\n\n```\n\n\n\n必须承认，像这样拥有一个可编辑的表格效率并不高，尤其是在表格包含大量列和行的情况下。Jakarta\
  \ Faces 可以很好地处理它；但普通的网络浏览器在处理时可能会遇到困难，特别是当行数超过几千行时。我还没提到最终用户可能因为要一直滚动浏览整个页面而抓狂，并且基本上无法获得清晰的概览。对此有几种解决方案：首先是分页；其次是过滤；第三是基于行的内联编辑和更新；第四是在对话框或详情页中进行外部编辑。\n\
  所有上述提到的表格特定性能和可用性解决方案，标准 `<h:dataTable>` 均未提供，因此需要大量的自定义代码。强烈建议您寻找一个支持这些功能的现有 Jakarta\
  \ Faces 组件库，以便让您的 Jakarta Faces 开发更轻松，无需重新发明轮子。目前，最广泛使用的是 PrimeFaces 及其 `<p:dataTable>`。^(⁵²)\
  \ 这甚至可以通过 OptimusFaces 的 `<op:dataTable>` 进一步简化，^(⁵³) 而后者又是基于 `<p:dataTable>` 构建的。\n\
  在详情页中编辑选中的项目是标准 Jakarta Faces 可以做到的，这在第 5 章的“自定义转换器”部分有演示。\n\n需要说明的是，在模型值为 `List<String>`\
  \ 的特定情况下，在列中使用输入组件并不像 `List<Product>` 示例中演示的那样容易实现。换句话说，下面的示例根本行不通：\n\n技术问题在于 `java.lang.String`\
  \ 是不可变的，并且没有为其内部值提供公共 setter 方法。确实，它实际上也没有 getter 方法，但 EL 已经默认使用 `Object#toString()`，对于\
  \ `String` 来说，它只是返回字符串本身。这可以通过使用索引显式引用模型值的特定项来解决，如下所示：\n\n注意 `binding` 属性。\n基本上，在视图构建期间，这会将当前的\
  \ `UIComponent` 实例设置为一个由给定名称标识的 EL 变量。在这个特定的代码片段中，它将使 `#{table}` 变量引用 `<h:dataTable>`\
  \ 标签背后的具体 `HtmlDataTable` 实例。`#{table}` 变量在视图构建期间只能在视图中的标签位置之后被引用，而在视图渲染期间则可以在视图中的任何位置被引用。通过这种方式，您可以像访问\
  \ bean 一样访问 `UIComponent` 属性。因此，`#{table.rowIndex}` 基本上引用了 `UIData#getRowIndex()`\
  \ 方法，^(⁵⁴) 该方法返回当前的迭代索引。最后，这被用来引用列表中的目标项。在更新模型值阶段（第四阶段），Jakarta Faces 将简单地替换指定索引处的项。\n\
  \n同样对于 `binding` 属性，非常重要的一点是变量名不应与现有的受管 bean 名称或隐式 EL 对象冲突，当然也不应与同一视图中的其他组件冲突。您也可以让\
  \ `binding` 属性引用一个支持 bean 的属性，如下所示：\n\n```\n\n以及\n\n```\nprivate UIData table; //\
  \ +getter +setter\n```\n\n但如果它在支持 bean 的其他地方没有被使用，这就相当无用了。\n此外，当受管 bean 的作用域宽于请求时（另请参阅第\
  \ 3 章的“视图构建时间”部分），这很危险。最好不要将组件实例绑定到支持 bean；这可能表明一种不良实践。唯一合理的实际用例是将复合组件子项绑定到支持组件（另请参阅第\
  \ 7 章的“复合组件”部分）。\n\n如果您在类似 `List<String>` 的东西上使用 `<ui:repeat>` 或 `<c:forEach>` 而不是\
  \ `<h:dataTable>`，那么您可以通过 `varStatus` 属性以更简单的方式获取迭代索引。\n\n在 <h:dataTable> 中添加/删除行\n\
  \n回到使用 `List<Product>` 的 `<h:dataTable>`，在某些情况下，您可能希望能够在同一视图中添加或删除项目，通常是在某种管理页面中。为了添加一个新的\
  \ `Product`，我们需要在受管 bean 中准备一个新实例，在单独的表单中填写它，持久化它，然后刷新表格。\n\n```\n\n...\n\n```\n\
  \n其中相关的支持 bean 代码如下所示：\n\n```\nprivate List list; // +getter\nprivate Product product\
  \ = new Product(); // +getter\n@PostConstruct\npublic void init() {\nlist = productService.list();\n\
  }\npublic void add() {\nproductService.create(product);\nlist.add(0, product);\n\
  product = new Product();\n}\n```\n\n以及服务类中的这个 `create()` 方法：\n\n```\n@TransactionAttribute(REQUIRED);\n\
  public Long create(Product product) {\nentityManager.persist(product);\nreturn product.getId();\n\
  }\n```\n\n删除可以通过多种方式完成。无论如何，您可能需要一个额外的列来容纳提交按钮、单选按钮或复选框。最简单的方法是使用一个包含命令按钮的列，该按钮删除当前迭代的项目，然后刷新表格。\n\
  \n```\n\n...\n\n```\n\n以及 `@ViewScoped` 支持 bean 类中的这个 `delete(Product)` 方法：\n\n\
  ```\npublic void delete(Product product) {\nproductService.delete(product);\nlist.remove(product);\n\
  }\n```\n\n以及服务类中的这个 `delete()` 方法：\n\n```\n@TransactionAttribute(REQUIRED)\npublic\
  \ void delete(Product product) {\nif (entityManager.contains(product)) {\nentityManager.remove(product);\n\
  }\nelse {\nProduct managedProduct = getById(product.getId());\nif (managedProduct\
  \ != null) {\nentityManager.remove(managedProduct);\n}\n}\n}\n```\n\n注意 `<f:ajax>`\
  \ 的 `render` 属性。它指定了 `@namingcontainer`，这基本上引用了最近的父级 `NamingContainer` 组件。在标准 Jakarta\
  \ Faces HTML 组件集中，只有 `<h:form>` 和 `<h:dataTable>` 是 `NamingContainer` 的实例。在这个特定的结构中，`@namingcontainer`\
  \ 因此引用了 `<h:dataTable>`。您也可以使用 `<f:ajax render=\":list:products\">` 代替；只是稍微冗长一些。`<f:ajax\
  \ render=\"products\">` 将不起作用，因为它会尝试在当前迭代行的上下文中找到它，而这基本上是在所有 `<h:column>` 组件内部。\n\
  \n在 <h:dataTable> 中选择行\n\n自 Jakarta Faces 2.3 起，在 `<h:dataTable>` 中拥有单选按钮列是原生支持的，这要归功于\
  \ `<h:selectOneRadio>` 的新 `group` 属性（另请参阅第 4 章的“选择组件”部分）。\n\n```\n\n...\n\n```\n\
  \n以及 `@ViewScoped` 支持 bean 类中的这个 `deleteSelected()` 方法：\n\n```\nprivate Product\
  \ selected; // +getter +setter\npublic void deleteSelected() {\nproductService.delete(selected);\n\
  list.remove(selected);\n}\n```\n\n请注意，您在这里也需要一个 `ProductConverter` 或 `BaseEntityConverter`。这些在第\
  \ 5 章的“自定义转换器”部分有详细说明。\n\n复选框选择稍微复杂一些。您直观上会使用 `<h:selectManyCheckbox>`，但它不像 `<h:selectOneRadio>`\
  \ 那样支持 `group` 属性。您需要退而使用 `<h:selectBooleanCheckbox>` 配合一个 `Map<Product, Boolean>`，其中映射键代表当前迭代的产品，映射值代表复选框的值。\n\
  \n```\n\n...\n\n```\n\n`@ViewScoped` 支持 bean 中修改后的 `deleteSelected()` 方法如下所示：\n\n\
  ```\nprivate Map selection = new HashMap(); // +getter\npublic void deleteSelected()\
  \ {\nList selected = selection.entrySet().stream()\n.filter(Entry::getValue)\n.map(Entry::getKey)\n\
  .collect(Collectors.toList());\nproductService.delete(selected);\nselected.forEach(list::remove);\n\
  selection.clear();\n}\n```\n\n\n\n重载的 `ProductService#delete(Iterable)` 方法如下所示：\n\
  \n```\n@TransactionAttribute(REQUIRED)\npublic void delete(Iterable products) {\n\
  products.forEach(this::delete);\n}\n```\n\n<h:dataTable> 中的动态列\n在 `<h:dataTable>`\
  \ 中，\n借助 Jakarta 标签 `<c:forEach>`，也可以\n基于至少是视图作用域的 Java 模型动态创建多个 `<h:column>`\n\
  实例。请求作用域的模型也可以，但这\n不能保证在回发请求期间它与前一次请求完全相同，因此存在动态\n`<h:column>`\n组合出现偏差的风险。\n`<c:forEach>`\n\
  的值应引用实体属性名称或映射键的集合。然后，你可以在 EL 中使用花括号表示法，如 `#{entity[propertyName]}`\n或 `#{map[key]}`\n\
  来引用实际值。这适用于 `UIOutput` 和 `UIInput` 组件。\n以下示例说明了如何为 `List<Product>` 实现这一点。\n\n后台\
  \ Bean：\n\n```\n@Named @RequestScoped\npublic class Products {\nprivate List list;\n\
  private List properties;\n@Inject\nprivate ProductService productService;\n@PostConstruct\n\
  public void init() {\nlist = productService.list();\nproperties = Arrays.asList(\"\
  id\", \"name\", \"description\");\n}\n// 添加/生成 getter 方法（此处不需要 setter）。\n}\n```\n\
  \nFacelets 文件：\n\n```\n\n#{product[property]}\n\n```\n\n你甚至可以将其进一步推广到公共超类的其他实体，例如\
  \ `BaseEntity`，通过实体服务获取相关的属性名称。\n\n资源组件\nJakarta Faces 提供了三个资源组件：`<h:graphicImage>`、\n\
  `<h:outputScript>` 和 `<h:outputStylesheet>`，\n分别用于图像资源、JavaScript 资源和 CSS 资源。它们可以引用物理资源文件\n\
  以及动态资源文件。物理资源文件\n本身必须放置在 Web 主文件夹的 `/resources` 子文件夹中。动态资源文件\n可以通过自定义的 `ResourceHandler`\
  \ 来处理，该处理器会拦截特定的库名称和/或资源名称。给定 Eclipse 中 Maven WAR 项目的以下文件夹\n结构：\n![](img/454457_2_En_6_Fige_HTML.jpg)\n\
  \n资源的引用方式如下：\n\n生成的 HTML 输出如下所示，假设 `/project` 是\nWeb 应用程序的上下文路径：\n\n你会看到它以前缀 `/jakarta.faces.resource`\n\
  路径开头，并以当前活动的 `FacesServlet`\nURL 模式结尾。`/jakarta.faces.resource`\n由常量 `ResourceHandler#RESOURCE_IDENTIFIER`\
  \ 表示。^(⁵⁵) 资源 URL 匹配\n`FacesServlet` 的 URL 模式，这确保了它实际上会调用 `FacesServlet`，\n而 `FacesServlet`\
  \ 又知道如何处理该资源。它首先会调用\n`ResourceHandler#isResourceRequest()`，\n该方法默认判断 URL 前缀是否以已知的\n\
  `RESOURCE_IDENTIFIER`\n常量开头，如果是，则立即委托给 `ResourceHandler#handleResourceRequest()`\n\
  ，而不是经历整个 Jakarta Faces 生命周期。\n另请注意，这些 Web 资源不放置在 `src/main/resources`\n文件夹中，而是放置在\
  \ `src/main/webapp/resources`\n文件夹中。`src/main/resources`\n文件夹仅用于必须最终位于类路径中的非类资源，例如资源包文件和配置属性\n\
  文件。这些类路径资源可通过 `ClassLoader#getResource()` 获取。^(⁵⁶) `src/main/webapp/resources`\n\
  不会最终位于类路径中；相反，它会最终位于 Web 内容中。\n这些 Web 资源可通过 `ExternalContext#getResource()` 获取，^(⁵⁷)\
  \ 该方法在底层委托给\n`ServletContext#getResource()`。^(⁵⁸)\n因此，`name`\n属性基本上表示相对于 `src/main/webapp/resources`\n\
  文件夹的资源路径。这些组件还支持 `library` 属性。\n`library`\n属性必须表示 Jakarta Faces 库的唯一资源库名称。对于标准 Jakarta\
  \ Faces，资源库名称是“`jakarta.faces`”；对于\nPrimeFaces，^(⁵⁹) 资源库名称是\n“`primefaces`”；\n对于\
  \ OmniFaces，^(⁶⁰) 资源库名称是\n“`omnifaces`”；\n对于 BootsFaces，^(⁶¹) 资源库名称是“`bsf`”；等等。\n\
  通常，这些特定于库的资源已经由相关的 Jakarta Faces 库自动包含，通常是通过\n`UIComponent` 或 `Renderer` 类上的 `@ResourceDependency`\n\
  注解声明性地包含，有时也通过 `UIViewRoot#addComponentResource()` 以编程方式包含。\n这将在第 11 章的“资源依赖关系”一节中详细说明。如有必要，这些资源可以\n\
  使用资源组件进行引用，从而显式指定\n`library` 属性。\n\n以下示例显式包含了标准的 Jakarta Faces\n`faces.js`\n文件：\n\
  \n```\n...\n\n```\n\n这通常是不必要的，因为依赖于此脚本的 Jakarta Faces 组件，例如 `<h:commandLink>`、\n\
  `<f:ajax>` 和 `<f:websocket>`，\n已经自动包含了它。这是另一个示例，显式包含了 PrimeFaces\n库中的 `jquery.js`\
  \ 文件——当然，这仅在你实际安装了 PrimeFaces 时才有效。\n\n```\n...\n\n```\n\n当你希望在不包含任何 PrimeFaces\
  \ 组件的页面上重用 PrimeFaces 提供的 jQuery 库时，这种方法可能很有用，例如，当你有一些依赖于 jQuery 的 Web 项目特定脚本时。默认情况下，所有\
  \ PrimeFaces 组件都会自动包含此 jQuery 库，但如果页面不包含任何 PrimeFaces 组件，则不会发生这种情况。Jakarta Faces\
  \ 资源管理将确保自动包含和显式包含的 JavaScript 和 CSS 资源不会在生成的 HTML 输出中重复。换句话说，上述显式包含 jQuery 的行可以安全地用于实际包含\
  \ PrimeFaces 组件的页面。\n\n\n\n请注意，目前互联网上存在大量质量低劣的 Jakarta Faces 教程，它们未能正确使用 `library`\
  \ 属性。相反，这些教程错误地将 `library` 属性演示为 `src/main/webapp/resources` 文件夹内的子文件夹，示例如下：\n\n\
  这种做法是完全错误的。它无法让自定义资源处理器区分不同库的资源。在前面的示例中，你基本上需要检查三个不同的资源库，尽管所有这些资源都属于同一个库——即 Web\
  \ 项目本身。\n\n谈到自定义资源处理器，假设你想强制 Web 浏览器在服务器端的图片、JavaScript 和/或 CSS 资源发生更改时重新加载它们。这可以通过向资源\
  \ URL 添加一个查询字符串参数来实现，该参数的值代表资源的版本。这也被称为“缓存破坏”。在 Jakarta Faces 中，可以通过以下自定义 `ResourceHandler`\
  \ 示例来实现，该处理器装饰 `Resource` 以返回其最后修改时间戳作为查询字符串参数。\n\n```\npublic class VersionResourceHandler\
  \ extends ResourceHandlerWrapper {\n    public VersionResourceHandler(ResourceHandler\
  \ wrapped) {\n        super(wrapped);\n    }\n\n    @Override\n    public Resource\
  \ createResource(String name, String library) {\n        Resource resource = super.createResource(name,\
  \ library);\n        if (resource == null || library != null) {\n            return\
  \ resource;\n        }\n        return new ResourceWrapper(resource) {\n       \
  \     @Override\n            public String getRequestPath() {\n                String\
  \ url = super.getRequestPath();\n                return url\n                  \
  \  + (url.contains(\"?\") ? \"&\" : \"?\")\n                    + \"v=\" + getLastModified();\n\
  \            }\n\n            private long getLastModified() {\n               \
  \ try {\n                    return getWrapped().getURL()\n                    \
  \    .openConnection().getLastModified();\n                }\n                catch\
  \ (IOException ignore) {\n                    return 0;\n                }\n   \
  \         }\n        };\n    }\n}\n```\n\n为了激活它，需要在 `faces-config.xml` 中注册如下：\n\n\
  ```\n<resource-handler>\n    com.example.project.resourcehandler.VersionResourceHandler\n\
  </resource-handler>\n```\n\n请注意，`createResource()` 方法在资源为 `null` 或 `library` 不为\
  \ `null` 时，会原样返回创建的资源。当 `name` 未知时，资源本身为 `null`。当 `library` 未指定时，它为 `null`，因此特定于\
  \ Web 项目。当然，你也可以将此逻辑应用于其他库的所有资源，但它们通常已经拥有自己内部实现的此类资源处理器。\n\n回到资源组件，你只能将 `<h:graphicImage>`\
  \ 放置在 body 内，body 可以是纯 HTML 的 `<body>` 或 Jakarta Faces 的 `<h:body>`。显然，在纯 HTML 文档中，`<img>`\
  \ 元素只能位于文档 body 内。你可以将 `<h:outputScript>` 和 `<h:outputStylesheet>` 放置在 Jakarta Faces\
  \ 页面的任何位置。默认情况下，`<h:outputScript>` 会在声明的位置精确生成 HTML `<script>` 元素，无论该位置是在文档的 head\
  \ 还是 body 中。然而，`<h:outputStylesheet>` 在 `<h:body>` 内声明时，默认会被移动到 `<h:head>` 的末尾。这是因为在\
  \ HTML 中，将 `<link rel=\"stylesheet\">` 放在 `<head>` 之外是不合法的。当 `<h:outputScript>`\
  \ 在 `<h:body>` 内声明且 `target` 属性设置为 `head` 时，它也可以被自动移动到文档 head 的末尾。当 `<h:outputScript>`\
  \ 的 `target` 属性设置为 `body` 时，它会被自动移动到文档 body 的末尾。`<h:outputStylesheet>` 不支持此功能。换句话说，以下测试\
  \ Facelet：\n\n```\n<ui:composition xmlns=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
  jakarta.faces.html\">\n    <h:head>\n        <h:outputScript name=\"script1.js\"\
  \ />\n        <h:outputStylesheet name=\"style1.css\" />\n        <h:outputScript\
  \ name=\"script2.js\" target=\"head\" />\n    </h:head>\n    <h:body>\n        <h:outputStylesheet\
  \ name=\"style2.css\" />\n        <h:outputScript name=\"script3.js\" target=\"\
  head\" />\n        <h:outputScript name=\"script4.js\" target=\"body\" />\n    \
  \    <h:outputScript name=\"script5.js\" />\n        <h:graphicImage name=\"image1.png\"\
  \ />\n        <p>Paragraph 1</p>\n        <p>Paragraph 2</p>\n    </h:body>\n</ui:composition>\n\
  ```\n\n基本上会生成以下 HTML 输出（为简洁起见，URL 已简化）：\n\n```\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
  >\n<head>\n<script type=\"text/javascript\" src=\"script1.js\"></script>\n<link\
  \ type=\"text/css\" rel=\"stylesheet\" href=\"style1.css\" />\n<script type=\"text/javascript\"\
  \ src=\"script2.js\"></script>\n<link type=\"text/css\" rel=\"stylesheet\" href=\"\
  style2.css\" />\n<script type=\"text/javascript\" src=\"script3.js\"></script>\n\
  </head>\n<body>\n<script type=\"text/javascript\" src=\"script4.js\"></script>\n\
  <script type=\"text/javascript\" src=\"script5.js\"></script>\n<img src=\"image1.png\"\
  \ alt=\"\" />\n<p>Paragraph 1</p>\n<p>Paragraph 2</p>\n</body>\n</html>\n```\n\n\
  换句话说，文档 head 中的资源渲染顺序是：\n\n1.  来自 `<h:head>` 且没有 `target` 的 `<h:outputScript>`\n\
  2.  来自 `<h:head>` 的 `<h:outputStylesheet>`\n3.  来自 `<h:head>` 且 `target=\"head\"\
  ` 的 `<h:outputScript>`\n4.  来自 `<h:body>` 的 `<h:outputStylesheet>`\n5.  来自 `<h:body>`\
  \ 且 `target=\"head\"` 的 `<h:outputScript>`\n\n请注意，`<h:outputStylesheet>` 隐式推断 `target=\"\
  head\"`，因此会在没有任何 target 的 `<h:outputScript>` *之后*渲染。所有通过组件的 `@ResourceDependency`\
  \ 注解自动包含的 JavaScript 和 CSS 资源，最终会位于 `<h:head>` 中声明的资源和 `<h:body>` 中声明的资源之间。因此，如果你碰巧使用了一个自动包含一堆\
  \ CSS 资源的 Jakarta Faces 库，并且想要覆盖其中一些资源，那么最好将这样的 `<h:outputStylesheet>` 放在 `<h:body>`\
  \ 中，而不是 `<h:head>` 中，这样可以保证它在库的 CSS 资源*之后*加载。\n\n但要注意，某些 Jakarta Faces 库会自动覆盖 `<h:head>`\
  \ 的默认渲染器，这可能会打乱默认的资源排序。在这种情况下，你最好查阅相关 Jakarta Faces 库的文档以了解新的排序规则，或者通过 Web 项目的 `faces-config.xml`\
  \ 恢复 `<h:head>` 的默认渲染器。\n\n```\n<render-kit>\n    <renderer>\n        <component-family>jakarta.faces.Output</component-family>\n\
  \        <renderer-type>jakarta.faces.Head</renderer-type>\n        <renderer-class>com.sun.faces.renderkit.html_basic.HeadRenderer</renderer-class>\n\
  \    </renderer>\n</render-kit>\n```\n\n如果你使用的是 MyFaces 而不是 Mojarra 作为 Jakarta Faces\
  \ 实现，那么请使用 `org.apache.myfaces.renderkit.html.HtmlHeadRenderer` 作为渲染器类。\n\n如果你打算开发一个自动包含特定资源的\
  \ Jakarta Faces 库，那么请记住使用 `@ResourceDependency` 或 `UIViewRoot#addComponentResource()`，而不是为此目的替换\
  \ `<h:head>` 的默认渲染器。由于注解不允许指定动态值，任何动态资源最好在 `<h:head>` 的 `PostAddToView` 事件期间添加。这可以通过一个\
  \ `SystemEventListener` 在应用程序范围内实现，如下所示，假设你的库的资源库名称是“`foo`”：\n\n```\npublic class\
  \ DynamicResourceListener implements SystemEventListener {\n    private static final\
  \ String LIBRARY = \"foo\";\n\n    @Override\n    public boolean isListenerForSource(Object\
  \ source) {\n        UIOutput output = (UIOutput) source;\n        return \"jakarta.faces.Head\"\
  .equals(output.getRendererType());\n    }\n\n    @Override\n    public void processEvent(SystemEvent\
  \ event) {\n        FacesContext context = event.getFacesContext();\n        String\
  \ scriptName = \"foo.js\"; // 可以是动态的。\n        addResource(context, scriptName);\n\
  \        String stylesheetName = \"foo.css\"; // 可以是动态的。\n        addResource(context,\
  \ stylesheetName);\n    }\n\n    private void addResource(FacesContext context,\
  \ String name) {\n        UIComponent resource = new UIOutput();\n        resource.getAttributes().put(\"\
  library\", LIBRARY);\n        resource.getAttributes().put(\"name\", name);\n  \
  \      resource.setRendererType(context.getApplication()\n            .getResourceHandler().getRendererTypeForResourceName(name));\n\
  \        context.getViewRoot()\n            .addComponentResource(context, resource,\
  \ \"head\");\n    }\n}\n```\n\n它在 `faces-config.xml` 中注册如下：\n\n```\n<application>\n\
  \    <system-event-listener>\n        <system-event-listener-class>\n          \
  \  com.example.project.listener.DynamicResourceListener\n        </system-event-listener-class>\n\
  \        <system-event-class>\n            jakarta.faces.event.PostAddToViewEvent\n\
  \        </system-event-class>\n        <source-class>\n            jakarta.faces.component.UIOutput\n\
  \        </source-class>\n    </system-event-listener>\n</application>\n```\n\n\
  请注意，`<source-class>` 最好可以是 `jakarta.faces.component.html.HtmlHead`，但这并不一定在所有 Jakarta\
  \ Faces 实现中都有效。例如，在 Mojarra 中，`<h:head>` 隐式创建的是 `UIOutput` 的实例，而不是 `HtmlHead`。\n\
  \n安装后，这个 `DynamicResourceListener` 将为上面最后一个包含 `style1.css`、`script1.js`、`script2.js`\
  \ 等的测试 Facelet 生成以下 HTML 输出（同样，为简洁起见，URL 已简化）。\n\n```\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
  >\n<head>\n<script type=\"text/javascript\" src=\"script1.js\"></script>\n<link\
  \ type=\"text/css\" rel=\"stylesheet\" href=\"style1.css\" />\n<script type=\"text/javascript\"\
  \ src=\"script2.js\"></script>\n<link type=\"text/css\" rel=\"stylesheet\" href=\"\
  foo.css\" />\n<script type=\"text/javascript\" src=\"foo.js\"></script>\n<link type=\"\
  text/css\" rel=\"stylesheet\" href=\"style2.css\" />\n<script type=\"text/javascript\"\
  \ src=\"script3.js\"></script>\n</head>\n<body>\n<script type=\"text/javascript\"\
  \ src=\"script4.js\"></script>\n<script type=\"text/javascript\" src=\"script5.js\"\
  ></script>\n<img src=\"image1.png\" alt=\"\" />\n<p>Paragraph 1</p>\n<p>Paragraph\
  \ 2</p>\n</body>\n</html>\n```\n\n因此，文档 head 中的资源渲染顺序是：\n\n1.  来自 `<h:head>` 且没有\
  \ `target` 的 `<h:outputScript>`\n\n\n\n2.  在 `PostAddToView` 期间动态添加到 `head` 的脚本\n\
  \n3.  在 `PostAddToView` 期间动态添加到 `head` 的样式表\n\n4.  `<h:outputStylesheet>`\n    来自\
  \ `<h:head>`\n\n5.  `<h:outputScript>`\n    来自 `<h:head>`，并带有\n    `target=\"head\"\
  `\n\n6.  `<h:outputStylesheet>`\n    来自 `<h:body>`\n\n7.  `<h:outputScript>`\n \
  \   来自 `<h:body>`，并带有\n    `target=\"head\"`\n\n你看，这个顺序是相当可预测的。本来没有必要\n重写 `<h:head>`\
  \ 的渲染器。\n此外，从\nJakarta Faces 库中重写 `<h:head>` 的渲染器\n存在风险，即它可能与任何其他恰好也重写了\n`<h:head>`\
  \ 渲染器的 Jakarta Faces 库不兼容。你\n真的应该避免这种情况。\n使用资源组件的另一个优点是，Jakarta Faces 可以这样自动\n将与页面关联的所有资源推送到客户端，以便\n\
  客户端能够比解析 HTML 文档并定位所有 `<link>`、`<script>` 和\n`<img>` 元素所需的时间更早地检索到它们。这是 Jakarta\
  \ Faces 2.3 的新特性。这仅要求\nJakarta Faces 2.3 Web 应用程序部署到与 Servlet 4.0 兼容的容器\n（Payara\
  \ 5、GlassFish 5、Tomcat 9、WildFly 12 等），并且使用 HTTPS\n而不是 HTTP，并且客户端支持 HTTP/2\n协议。^(⁶²)\
  \ 这不需要\nJakarta Faces 端进行额外的配置。\n\n透传元素\n\nJakarta Faces 还支持将任意 HTML 元素隐式解释为\n一个功能完备的\
  \ Jakarta Faces 组件。此功能\n在 Jakarta Faces 2.2 中引入，正式名称为“透传\n元素”。当你想要\n使用 HTML5 元素（如\
  \ `<main>`、`<article>`、\n`<section>`、\n`<aside>`、\n`<nav>`、\n`<header>`、\n和 `<footer>`）并且\n\
  希望能够通过 `<f:ajax render>` 引用它们时，这尤其有用。以前，在 Jakarta Faces 2.2 之前，这些元素\n没有对应的 Jakarta\
  \ Faces 组件，因此你\n被迫将它们包装在 `<h:panelGroup layout=\"block\">` 中，这只会使生成的 HTML 输出\n语义性降低。透传元素触发器可通过\
  \ `jakarta.faces` 命名空间使用。你只需要\n在此命名空间上指定至少一个属性。默认的命名空间前缀就是“`faces`”。\n\n```\n\n\
  标题\n\n...\n\n...\n\n...\n\n...\n\n```\n\n在底层，在 Jakarta Faces 组件树中，这些 HTML5\n元素被转换为\
  \ `UIPanel` 组件，并且\n在 Jakarta Faces 组件树中的处理方式与 `<h:panelGroup>` 完全相同。\n这样，你可以干净地继续使用语义化的\
  \ HTML5 标记，同时仍然\n能够通过 `<f:``ajax render>` 引用它们。\n换句话说，以下构造将不起作用：\n\n```\n...\n\n\
  ...\n\n```\n\n它失败是因为当传递“`main`”作为搜索\n关键字时，`UIViewRoot#findComponent()`\n没有返回任何内容。Jakarta\
  \ Faces 找不到具有给定 ID 的任何组件。这里的\n`<main>` 元素\n基本上被解释为模板文本。但以下构造将\n起作用：\n\n```\n...\n\
  \n...\n\n```\n\n对“`main`”调用 `UIViewRoot#findComponent()`\n将返回一个代表 `<main>` 元素的 `UIPanel`\
  \ 实例。\n然后 Jakarta Faces 将能够将其渲染到 Ajax 响应中。\n透传元素特性也适用于其他 HTML 元素；只是\n它们不一定都转换为 `UIPanel`\
  \ 实例。\n相反，它们将被转换为一个 Jakarta Faces 组件，\n其生成的 HTML 输出与原始 HTML 元素匹配（参见表\n6-1）。以下\n\
  构造在底层与上一个构造相同：\n\n表 6-1\nJakarta Faces 识别的透传元素\n\n透传 HTML 元素 |\n 隐含的 Jakarta Faces\
