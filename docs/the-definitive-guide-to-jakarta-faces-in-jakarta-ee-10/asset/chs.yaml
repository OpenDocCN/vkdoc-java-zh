  \n#{component} |\n UIComponent#getCurrentComponent( ) |\n UIComponent |\n 2.0 |\n\
  \n#{cc} |\n UIComponent#getCurrentCompositeComponent( ) |\n UIComponent |\n 2.0\
  \ |\n\n#{request} |\n ExternalContext#getRequest( ) |\n HttpServletRequest |\n 1.0\
  \ |\n\n#{session}  |\n ExternalContext#getSession( ) |\n HttpSession |\n 1.0 |\n\
  \n#{application} |\n ExternalContext#getContext( ) |\n ServletContext |\n 1.0 |\n\
