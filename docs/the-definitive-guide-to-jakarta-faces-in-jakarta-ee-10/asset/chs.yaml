  \ |\n Map<String, Cookie> |\n 1.0 |\n\n#{resource}  |\n ResourceHandler#createResource( )\
  \ |\n Resource |\n 2.0 |\n\n对于所有隐式 EL 对象，如果该类在某个位置指定了 getter 方法，例如`HttpServletRequest#getContextPath()`，那么你当然可以像往常一样在\
  \ EL 中通过`#{request.contextPath}`来访问它。对于作用域映射，任何属性都将被解释为映射键。如果该属性恰好包含句点字符，则可以使用花括号表示法，例如`#{map['key.with.periods']}`来访问映射值。请注意，`#{flash}`本质上继承自`Map<String,\
  \ Object>`，因此可以将其视为此类。还应该说明的是，`#{flowScope}`确实与其他作用域映射不同，它接受`Object`而不是`String`作为映射键。这很可能是一个历史性的错误。访问作用域映射的规范方法是使用基于`String`的键。`#{cookie}`通过\
  \ cookie 名称进行映射，其值实际上返回一个`jakarta.servlet.http.Cookie`实例，该实例又具有一个`getValue()`属性。因此，要访问`JSESSIONID`\
  \ cookie，你基本上需要`#{cookie.JSESSIONID.value}`。当然，在这个会话 ID 的特定示例中，你也可以直接使用`#{session.id}`。\n\
  \n`#{resource}`实际上有自己的 EL 解析器，它将任何属性解释为“`library:name`”格式的资源标识符，然后将其传递给`ResourceHandler#createResource()`，并最终通过`Resource#getRequestPath()`返回资源的\
  \ URL。这在 CSS 资源中非常有用，可以将 Jakarta Faces 图像资源引用为 CSS 背景图像。以下示例将实际渲染`src/main/webapp/resources/images/background.svg`的\
  \ URL。\n\n```\nbody {\nbackground-image: url(\"#{resource['images/background.svg']}\"\
  );\nbackground-size: cover;\n}\n```\n\n请注意，在 CSS 资源中解析 EL 表达式仅在 CSS 资源本身通过`<h:outputStylesheet>`（而非`<link>`）包含时才有效。还应注意，Jakarta\
  \ Faces 默认仅在 CSS 资源的第一次请求时记住它是否包含 EL 表达式。如果没有，那么 Jakarta Faces 在后续请求中不会重新检查，即使在开发阶段也是如此。因此，如果你注意到现有\
  \ CSS 资源中的第一个 EL 表达式似乎不起作用，那么最好重新启动 Web 应用程序。CSS 资源中 EL 解析的这个特性实际上非常有用。\n\nCSS 资源中\
  \ EL 解析的这个特性在 JS 资源中不可用。对于 JS 资源，你需要改为在全局作用域中打印一个 JS 对象，并在必要时让你的 JS 资源拦截它。例如：\n\n\
  ```\nvar config = #{configuration.script};\n\n```\n\n其中`#{configuration.script}`仅从你的托管\
  \ Bean 返回一个 JSON 对象字符串。或者，你可以让 EL 将其打印为 HTML 元素的数据属性，例如以下示例中的上下文路径：\n\n```\n...\n\
  \n```\n\n然后在 JS 中可以这样访问：\n\n```\nvar baseuri = document.documentElement.dataset.baseuri;\n\
  ```\n\n或者如果你是 jQuery 爱好者：\n\n```\nvar baseuri = $(\"html\").data(\"baseuri\");\n\
  ```\n\n\n\n也就是说，在 Java 端创建受管 bean，或在 Facelets 端声明自定义 EL 变量时（例如 `<h:dataTable var=\"\
  foo\">`、`<ui:repeat var=\"foo\">` 或 `<c:set var=\"foo\">`），你必须绝对确保不会显式或隐式地选择与前面列出的隐式\
  \ EL 对象冲突的受管 bean 名称或 EL 变量名。这是因为隐式 EL 对象在 EL 解析中的优先级高于用户定义的名称。因此，例如，以下构造不会按你预期的方式工作：\n\
  \n```\n#{param}\n\n```\n\n它默认会在每次迭代时直接打印“`{}`”，这基本上就是空 `Map` 的默认 `Map#toString()`\
  \ 格式。当你使用类似 `?foo=bar` 的查询字符串重新打开同一页面时，它会在每次迭代时直接打印“`{foo=bar}`”。你最好将 `var=\"param\"\
  ` 重命名为其他名称，例如 `var=\"parameter\"`。\n\n脚注\n\n8.  Backing Beans\n\n“Backing bean”是\
  \ Jakarta Faces 特有的概念。它代表最终用作“受管 bean”的单一 JavaBean 类，负责在 Jakarta Faces 页面中提供数据、操作和/或组件。\n\
  \n模型、视图还是控制器？\nJakarta Faces 是一个 MVC（模型-视图-控制器）框架。MVC 是一种广泛应用于软件应用程序的架构设计模式，其根源在于桌面应用程序开发。^(⁶⁷)\n\
  从 Jakarta Faces 框架的角度来看，模型由 backing bean 表示；视图由组件树表示，而组件树通常又在 Facelets 文件中定义；控制器由\
  \ Jakarta Faces 已提供的 `FacesServlet` 表示。然而，从 Jakarta EE 应用服务器的角度来看，模型由服务层表示（该服务层通常又使用\
  \ Jakarta Persistence 实体），视图由你所有基于 Jakarta Faces 的代码表示，而控制器是 `FacesServlet`。从 Jakarta\
  \ Faces 开发者的角度来看，模型由服务层表示，视图由 Facelets 文件表示，而控制器由 backing bean 表示。\n因此，backing bean\
  \ 类可以是模型、视图或控制器，具体取决于你的视角，而服务层始终是模型，Facelets 文件始终是视图，`FacesServlet` 始终是控制器。请注意，在此上下文中，“Jakarta\
  \ Faces 开发者”就是你，你正在为 Jakarta EE 应用服务器使用 Jakarta Faces 框架开发 Web 应用程序。\n\n图 8-1 说明了\
  \ backing bean 在 Jakarta Faces 的 MVC 范式中的位置。这是一个维恩图，其中控制器和视图的交集由 Jakarta Faces 组件树表示，该组件树可以通过组件的\
  \ `binding` 属性绑定到 backing bean。视图和模型的交集由 EL 值表达式的属性 getter 和 setter 表示，这些 getter\
  \ 和 setter 可以通过组件的 `value` 属性绑定到 backing bean。控制器和模型的交集由 EL 方法表达式的操作方法调用表示，这些调用可以通过组件的\
  \ `action` 属性绑定到 backing bean。最后，所有交集的交集由 backing bean 本身表示。\n\n![](img/454457_2_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\nBacking bean 在 Jakarta Faces MVC 范式中的位置\n\n因此，在这个 MVC 范式中，backing bean\
  \ 占据了一个相当独特的位置。请注意，backing bean 不一定需要由单个类表示。它甚至可以由多个类表示，每个类都有自己的受管 bean 作用域，就像视图可以由多个\
  \ Facelets 文件表示，模型可以由多个 Jakarta Enterprise Beans 和 Jakarta Persistence 类表示一样。\n\n\
  回到 Jakarta Faces 开发者的视角，我们甚至可以更进一步，根据你如何编写 backing bean 类来考虑它是模型还是控制器。以下是一种方式：\n\
  \n```\n@Named @RequestScoped @Stateful\npublic class ProductBacking {\nprivate String\
  \ productName;\nprivate String productDescription;\n@Inject\nprivate ActiveUser\
  \ activeUser;\n@PersistenceContext\nprivate EntityManager entityManager;\npublic\
  \ void save() {\nProduct product = new Product();\nproduct.setName(productName);\n\
  product.setDescription(productDescription);\nproduct.setCreatedBy(activeUser.get());\n\
  entityManager.persist(product);\nFacesContext.getCurrentInstance().addMessage(null,\n\
  new FacesMessage(\"Product created!\"));\n}\n// 为产品名称和描述添加/生成 getter 和 setter\n\
  }\n```\n\n在这种相当原始的方式中，实体的属性基本上在 backing bean 类中重复了，并且业务逻辑紧密耦合在 backing bean 类中。换句话说，backing\
  \ bean 类错误地接管了真实模型的职责。有人会误将这样的 backing bean 类视为唯一的模型。当我们消除这种重复和不可重用性时，我们找到了另一种方式：\n\
  \n```\n@Named @RequestScoped\npublic class ProductBacking {\nprivate Product product\
  \ = new Product();\n@Inject\nprivate ProductService productService;\npublic void\
  \ save() {\nproductService.create(product);\nFacesContext.getCurrentInstance().addMessage(null,\n\
  new FacesMessage(\"Product created!\"));\n}\npublic Product getProduct() {\nreturn\
  \ product;\n}\n}\n```\n\n其中 `ProductService` 如下所示：\n\n```\n@Stateless\npublic class\
  \ ProductService {\n@PersistenceContext\nprivate EntityManager entityManager;\n\
  @Inject\nprivate ActiveUser activeUser;\npublic Long create(Product product) {\n\
  product.setCreatedBy(activeUser.get());\nentityManager.persist(product);\nreturn\
  \ product.getId();\n}\n}\n```\n\n这实际上是编写 backing bean 的正确方式。与第一种方式相比，你可以认为，从 Jakarta\
  \ Faces 开发者的角度来看，backing bean 已成为真实模型的控制器。从 Jakarta Faces 开发者的角度来看，backing bean\
  \ 作为控制器并没有错，但从 Jakarta Faces 框架的角度来看，这实际上并不正确，因为 `FacesServlet` 才是真正的控制器。`FacesServlet`\
  \ 将 backing bean 视为模型，因为 `FacesServlet` 无法直接访问真实模型（即服务层）。作为 Jakarta Faces 开发者，你当然可以在自己的上下文中将\
  \ backing bean 视为控制器，因为你可以轻松忽略 `FacesServlet` 的所有职责，在编写 Jakarta Faces 代码时无需担心它的工作。在编写\
  \ Jakarta Faces 代码时，你只需要关心视图、模型和 backing bean。其余工作由 Jakarta Faces 透明地完成。\n\n受管 Bean\n\
  \n“Backing bean”和“受管 bean”之间的概念差异可以通过以下在 bean 管理设施底层执行的代码行来表示：\n\n```\nBackingBeanClass\
  \ managedBeanInstance = new BackingBeanClass();\nsomeContext.put(\"managedBeanName\"\
  , managedBeanInstance, someScope);\n```\n\n\n\n换句话说，后台 bean 是由您（Jakarta Faces 开发者）创建的具体类，并注册到某个\
  \ bean 管理设施（如 CDI）中。Bean 管理设施将自动管理 bean 的生命周期，在必要时执行构造、依赖注入和销毁，而无需您手动操作。如果您曾使用过普通的\
  \ Servlet 和 Jakarta Pages 进行开发，那么这基本上消除了手动实例化 bean 并将其作为 `ServletContext`、`HttpSession`\
  \ 或 `ServletRequest` 属性的需要。^(⁶⁸) 要将后台 bean 类注册为 Jakarta Faces 视图的 CDI 托管 bean，只需在类签名上添加\
  \ `@jakarta.inject.Named` 注解^(⁶⁹)。\n\n```\n@Named\npublic class BackingBeanClass\
  \ {\n// ...\n}\n```\n\n然后，它将立即通过 `#{backingBeanClass}` 在 EL 上下文中可用，并通过 `@Inject`\
  \ 在所有其他托管 bean 中可用。EL 上下文在 Facelets 文件中直接可用。默认情况下，托管 bean 名称是通过将后台 bean 类名的首字母小写来派生的。这可以通过指定\
  \ `@Named` 注解的值来覆盖。\n\n```\n@Named(\"managedBeanName\")\npublic class BackingBeanClass\
  \ {\n// ...\n}\n```\n\n现在，它通过 `#{managedBeanName}` 在 EL 上下文中可用。`@Inject` 方法没有任何变化。一旦后台\
  \ bean 成为托管 bean，当它在与 bean 作用域关联的上下文中首次被访问时，它将被自动实例化和初始化。当与 bean 作用域关联的生命周期结束时，它将被自动销毁。更多关于托管\
  \ bean 作用域的内容将在下一节介绍。\n从历史上看，Jakarta Faces 提供了一种原生方式来将后台 bean 类注册为托管 bean：首先，在 1.x\
  \ 版本中通过 `faces-config.xml` 中的 `<managed-bean>` 条目；自 2.0 版本起通过 `@jakarta.faces.bean.ManagedBean`\
  \ 注解，该注解自 2.3 版本起已正式弃用，转而推荐使用 CDI 的 `@Named`，并自 4.0 版本起完全移除。\nCDI 在 Jakarta EE 应用服务器中原生可用，并且相对容易安装在裸机\
  \ Servlet 容器中。例如，CDI 的实现之一 JBoss Weld，只需将单个依赖 `org.jboss.weld.servlet:weld-servlet-shaded`\
  \ 添加到项目中^(⁷⁰)，即可在 Tomcat 中安装，无需任何额外工作。\n\n作用域\n托管 bean 的作用域基本上代表了托管 bean 的生命周期。如前一节所述，从普通的\
  \ Jakarta Servlet 角度来看，作用域由作为 `ServletContext`、`HttpSession` 或 `ServletRequest`\
  \ 属性放入的对象表示。这些对象将分别成为“应用作用域”、“会话作用域”和“请求作用域”。CDI 等的工作方式仍然如此；它只是在其上添加了一个额外的抽象层，这样您就不再需要手动创建对象并将其放入特定作用域。\n\
  \n在标准 Jakarta Faces 中，以下基于 CDI 的托管 bean 作用域可用于后台 bean，按生命周期从长到短排序：\n\n1.  `@jakarta.enterprise.context.ApplicationScoped`\n\
  \n2.  `@jakarta.enterprise.context.SessionScoped`\n\n3.  `@jakarta.faces.lifecycle.ClientWindowScoped`\n\
  \n4.  `@jakarta.enterprise.context.ConversationScoped`\n\n5.  `@jakarta.faces.flow.FlowScoped`\n\
  \n6.  `@jakarta.faces.view.ViewScoped`\n\n7.  `@jakarta.enterprise.context.RequestScoped`\n\
  \n8.  `@jakarta.enterprise.context.Dependent`\n\n@ApplicationScoped\n应用作用域的托管 bean\
  \ 实例与 Web 应用程序本身的生命周期绑定。它在底层表示为 `ServletContext` 的一个属性，该属性在 Web 应用程序部署时创建，在 Web\
  \ 应用程序取消部署时销毁。请注意，这并不等同于服务器的启动和关闭。Web 应用程序可以在正在运行的服务器上部署和取消部署。\n换句话说，在整个 Web 应用程序的生命周期中，只有一个应用作用域的托管\
  \ bean 实例，它在所有请求和会话之间共享。您可以认为它的行为类似于单例。然而，它实际上并不遵循单例设计模式。它遵循的是“只创建一个”设计模式。^(⁷¹)\
  \ 真正的单例没有任何公共构造函数，只有一个返回静态初始化懒加载实例的静态方法。另一方面，真正的 JavaBean 需要存在一个默认构造函数。\n默认情况下，应用作用域的\
  \ bean 托管实例是在 Web 应用程序的代码在其生命周期内首次访问它时创建的。因此，根据定义，它并非在 `ServletContext` 实例创建时立即创建。但是，可以保证它在\
  \ `ServletContext` 实例销毁时被销毁。\n\n应用作用域的托管 bean 对于需要在应用程序生命周期内仅初始化一次的应用程序范围数据非常有用，或者需要提供委托给静态变量的非静态\
  \ getter，或者需要提供用于 EL 的函数。以下示例确保存储在数据库中的应用程序设置仅加载一次，并在应用程序的其余生命周期内通过 `#{settings}`\
  \ 作为 `Map` 提供。\n\n```\n@ApplicationScoped\npublic class ApplicationSettingsProducer\
  \ {\nprivate Map settings;\n@Inject\nprivate ApplicationSettingsService applicationSettingsService;\n\
  @PostConstruct\npublic void init() {\nsettings = applicationSettingsService.getAll();\n\
  }\n@Produces @Named\npublic Map getSettings() {\nreturn settings;\n}\n}\n```\n\n\
  请注意，`@Named` 注解放在 getter 上，这意味着托管 bean 名称与属性名称匹配：`#{settings}`。还要注意，getter 又需要 `@Produces`\
  \ 注解才能被识别为托管 bean 生产者。以下是另一个提供文本格式化函数的示例：\n\n```\n@Named @ApplicationScoped\npublic\
  \ class Format {\npublic String date(LocalDate localDate) {\nif (localDate != null)\
  \ {\nreturn localDate.format(DateTimeFormatter.ISO_LOCAL_DATE);\n}\nelse {\nreturn\
  \ \"n/a\";\n}\n}\npublic String currency(BigDecimal amount) {\nif (amount != null)\
  \ {\nreturn NumberFormat.getCurrencyInstance(Locale.US)\n.format(amount);\n}\nelse\
  \ {\nreturn \"n/a\";\n}\n}\n}\n```\n\n这在例如数据表中保持 Facelets 代码简洁时可能很有用。\n\n```\n#{format.date(product.lastModified)}\n\
  #{format.currency(product.discount)}\n\n```\n\n当您需要在不允许嵌套 `<h:outputText><f:convertXxx>`\
  \ 的属性中使用格式化值时，它也很有用。\n\n```\n\n\n\n@SessionScoped\n会话作用域的托管 Bean 实例与已建立的 HTTP 会话的生命周期绑定。它在底层表示为\
  \ `HttpSession` 的一个属性，该属性是为每个唯一客户端根据 Web 应用代码的需求而创建的。当 Web 应用代码通过 `HttpServletRequest#getSession()`\
  \ 首次直接或间接访问 `HttpSession` 时，Servlet 容器将创建一个新的 `HttpSession` 实例，生成一个长且唯一的字符串作为会话\
  \ ID，并将其存储在服务器内存中，通常作为某个内部 `Map` 的一个条目。Servlet 容器还会在 HTTP 响应上设置一个会话 Cookie，其 Cookie\
  \ 名称为“`JSESSIONID`”，Cookie 值为会话 ID。“会话 Cookie”通过缺少“最大存活时间”属性来识别。根据 HTTP Cookie 规范，只要\
  \ Cookie 有效，客户端（Web 浏览器）就需要在后续请求的标头中发回此 Cookie。在任何像样的 Web 浏览器中，你都可以在 Web 开发者工具集的“网络”部分检查请求和响应标头，该工具集可通过在\
  \ Web 浏览器中按 F12 键访问。Servlet 容器将检查每个传入的 HTTP 请求，查找名称为“`JSESSIONID`”的 Cookie，并使用其值（会话\
  \ ID）从服务器内存中获取关联的 `HttpSession` 实例。\n\n在服务器端，`HttpSession` 实例会一直保持活动状态，直到超过 `web.xml`\
  \ 中 `<session-timeout>` 设置指定的超时值（大多数（如果不是全部）Servlet 容器默认值为 30 分钟）未被访问。因此，当客户端访问\
  \ Web 应用的时间超过指定时间时，Servlet 容器将销毁 `HttpSession` 实例。每个后续的 HTTP 请求，即使指定了 Cookie，也无法再访问关联的\
  \ `HttpSession` 实例；Servlet 容器将创建一个新的 `HttpSession` 实例，并用新的会话 ID 覆盖 Cookie 值。\n\n\
  在客户端，默认情况下，所有会话 Cookie 在浏览器实例运行期间都保持有效。因此，当客户端关闭浏览器实例时，所有会话 Cookie 都会在客户端被销毁。在新的浏览器实例中，来自先前浏览器会话的会话\
  \ Cookie 不再可用，因此浏览器不会发送任何 `JSESSIONID` Cookie。然后，服务器会将其解释为一个全新的会话。与先前浏览器会话关联的 `HttpSession`\
  \ 实例将在服务器端静默过期。\n\n默认情况下，会话作用域的托管 Bean 实例是在 HTTP 会话生命周期内，当 Web 应用代码首次访问它时创建的。因此，根据定义，它并非在创建\
  \ `HttpSession` 实例时立即创建。但是，可以保证在销毁 `HttpSession` 实例时销毁它。会话作用域的托管 Bean 在同一浏览器会话的所有浏览器标签页和窗口之间有效共享。\n\
  \n会话作用域的托管 Bean 对于跟踪客户端特定数据非常有用，例如表示当前登录用户的实体、所选语言以及其他与用户相关的偏好设置。以下示例计算当前区域设置，并为其提供\
  \ getter/setter，以便可以在视图中获取它，并通过 `UIInput` 组件进行修改。\n\n```\n@Named @SessionScoped\n\
  public class ActiveLocale implements Serializable {\nprivate Locale current;\n@PostConstruct\n\
  public void init() {\nFacesContext context = FacesContext.getCurrentInstance();\n\
  current = context.getApplication()\n.getViewHandler().calculateLocale(context);\n\
  }\n// Getter+setter.\n}\n```\n\n更详细的示例可以在第 14 章的“更改活动区域设置”部分找到。请注意，会话作用域的托管 Bean\
  \ 必须实现 `Serializable`，因为存储这些 Bean 的 `HttpSession` 实例本身可能会在服务器重启时被写入磁盘，甚至在具有可分发会话的服务器集群配置中通过网络传输到不同的服务器。\n\
  \n另一个经典示例是“购物车”。\n\n```\n@Named @SessionScoped\npublic class Cart implements Serializable\
  \ {\nprivate List products = new ArrayList();\npublic void addProduct(Product product)\
  \ {\nproducts.add(product);\n}\n// ...\n}\n```\n\n@ClientWindowScoped\n客户端窗口作用域的托管\
  \ Bean 基本上与已建立的 `jakarta.faces.lifecycle.ClientWindow` 实例的生命周期绑定，该实例已在 Jakarta Faces\
  \ 2.2 中随 `@FlowScoped` 一起引入。只有 `@ClientWindowScoped` 注解是 Jakarta Faces 4.0 中新增的。\n\
  \n`ClientWindow` 实例又由一个预定义的 HTTP 请求参数标识，该参数的名称为“`jfwid`”（“Jakarta Faces Window ID”），其值表示客户端窗口\
  \ ID。客户端窗口 ID 又引用了当前 HTTP 会话中的一个隔离映射，该映射存储了客户端窗口作用域的托管 Bean。首先需要通过向 `web.xml` 添加以下上下文参数来激活它。\n\
  \n```\njakarta.faces.CLIENT_WINDOW_MODE\nurl\n\n```\n\n唯一其他支持的值是“`none`”，这也是默认值。缺少此上下文参数将导致任何使用\
  \ `@ClientWindowScoped` Bean 的操作抛出 `jakarta.enterprise.context.ContextNotActiveException`。当在\
  \ Jakarta Faces 页面中引用了 `@ClientWindowScoped` Bean，并且首次打开该页面（因此首次构造该 Bean）时，将生成一个新的“`jfwid`”请求参数值。当使用\
  \ `UIOutcomeTarget` 组件导航到其他页面时，此参数将在 URL 中可见。Jakarta Faces 将在 `ViewHandler` 的帮助下，自动将“`jfwid`”请求参数附加到结果\
  \ URL。\n\n只要在后续的回发和导航中重复使用相同的“`jfwid`”请求参数值，关联的 `@ClientWindowScoped` Bean 实例将在会话的剩余时间内保持活动状态，无论它发生在哪个浏览器标签页或窗口中。只有在没有“`jfwid`”请求参数的情况下，在同一\
  \ URL 上打开一个全新的浏览器标签页/窗口时，才会启动一个新的 `ClientWindow`，因此也会创建一个全新的 `@ClientWindowScoped`\
  \ Bean。\n\n当最终用户将“`jfwid`”请求参数的值修改为自定义值时，这也会启动一个新的 `ClientWindow`，并带有其自己的新 `@ClientWindowScoped`\
  \ Bean 实例。但是，每个 HTTP 会话允许的 `ClientWindow` 实例数量有上限，对于 Mojarra，默认情况下每个会话最多十个。这可以通过\
  \ `web.xml` 中的以下上下文参数进行配置。\n\n```\njakarta.faces.NUMBER_OF_CLIENT_WINDOWS\n\n```\n\
  \n只有当达到此限制时，`ClientWindow` 才会结束并销毁所有关联的 Bean，因此最近最少使用的那个将被逐出。\n\n\n\n@ConversationScoped\n\
  一个对话作用域（conversation-scoped）托管 Bean 的生命周期与注入的 `jakarta.enterprise.context.Conversation`\
  \ 实例绑定，该实例提供了 `begin()` 和 `end()` 方法，必须由 Web 应用程序的代码显式调用，以指示对话作用域的开始和结束。对话作用域由一个预定义的\
  \ HTTP 请求参数表示，其默认名称为“`cid`”（“对话 ID”），该参数的值代表对话 ID。对话 ID 进而引用当前 HTTP 会话中的一个隔离映射，用于存储对话作用域的托管\
  \ Bean 实例。\n\n只要对话作用域尚未开始，对话作用域的托管 Bean 的行为就类似于请求作用域的托管 Bean。当应用程序代码显式调用 `Conversation#begin()`\
  \ 时，对话作用域将开始，并且由 CDI 实现提供的自定义 `jakarta.faces.application.ViewHandler` 将确保其所有 `getXxxURL()`\
  \ 方法（例如 `getActionURL()` 和 `getBookmarkableURL()`）返回包含对话 ID 参数的 URL（统一资源定位符）。以 Weld\
  \ 为例，该 ViewHandler 是 `ConversationAwareViewHandler`。^(⁷²) 所有 Jakarta Faces 的 `UIForm`\
  \ 和 `UIOutcomeTarget` 组件都从 `ViewHandler` 的这些方法派生其操作和目标 URL。因此，这些组件生成的 HTML 输出最终会在目标\
  \ URL 中包含对话 ID。\n\n在传入的 HTTP 请求中，当请求中存在对话 ID 参数且该参数仍然有效时，CDI 实现将从 HTTP 会话中获取关联的对话作用域，并确保所有对话作用域的托管\
  \ Bean 都从该对话 ID 标识的特定对话作用域中获取。这适用于 GET 和 POST 请求。任何表单提交或任何指向包含对话 ID 的 URL 的链接/导航，只要该对话作用域仍然有效，都将提供对同一对话作用域的访问。当应用程序代码显式调用\
  \ `Conversation#end()` 时，对话作用域结束。\n\n当最终用户稍后重用“`cid`”请求参数，或将其值修改为其自身浏览器会话中未启动的值，或当底层\
  \ `HttpSession` 实例被销毁时，CDI 将抛出 `jakarta.enterprise.context.NonexistentConversationException`。\n\
  \n对话作用域的托管 Bean 特别有用，可以在同一浏览器会话中被重定向到其他地方后，能够返回到特定的有状态页面。一个经典的例子是第三方 Web 服务，它被包含在\
  \ HTML `<iframe>` 中，或在新浏览器标签页中打开，甚至作为纯 HTML `<form>` 的 `action` 属性的目标，并且可以通过特定的请求参数进行配置，以便在完成服务后重定向回您的\
  \ Web 应用程序。当您在重定向 URL 中包含对话 ID 时，您将能够在重定向后的页面中，恢复使用与重定向之前完全相同的对话作用域托管 Bean 实例。这使您有机会完成并解锁任何待处理的事务，当然，也可以结束对话。\n\
  \n假设有一个如下所示的结账按钮：\n\n```\n...\n\n...\n\n```\n\n以下是 `#{payment}` 背后关联的对话作用域 Bean\
  \ 的样子：\n\n```\n@Named @ConversationScoped\npublic class Payment implements Serializable\
  \ {\nprivate Order order;\nprivate String url;\n@Inject\nprivate Cart cart;\n@Inject\n\
  private OrderService orderService;\n@Inject\nprivate Conversation conversation;\n\
  public void checkout() {\norder = orderService.lockProductsAndPrepareOrder(cart);\n\
  conversation.begin();\nurl = \"https://third.party.com/pay?returnurl=\"\n+ URLEncoder.encode(\"\
  https://my.site.com/paid?cid=\"\n+ conversation.getId(), \"UTF-8\");\n}\npublic\
  \ void confirm() {\norderService.saveOrderAndCreateInvoice(order);\nconversation.end();\n\
  }\n@PreDestroy\npublic void destroy() {\norderService.unlockProductsIfNecessary(order);\n\
  }\npublic String getUrl() {\nreturn url;\n}\n}\n```\n\n基本上，结账按钮仅在未设置支付 URL 时才会渲染。一旦按下该按钮，购物车中的所有产品都会被锁定，并且订单会被准备好。同时，根据第三方支付服务的不同，必须准备好引用该服务的\
  \ URL，您需要将返回 URL 作为某个查询参数包含在支付服务的 URL 中。返回 URL 又应包含代表对话 ID 的“`cid`”请求参数。在重定向后的页面（实际上将在\
  \ `<iframe>` 中加载）中，您可以使用 `<f:viewAction>` 来标记对话完成。\n\n当然，一般的第三方支付服务应该提供更完善的 Java\
  \ 甚至 JavaScript API，而不是 `<iframe>`；此外，应该能够为每种支付结果（例如支付失败和支付中止）提供不同的返回页面。前面的示例只是为了提供总体思路。\n\
  \n\n\n@FlowScoped\n流作用域托管 Bean 的生命周期与 Jakarta Faces 流（Flow）绑定。它本质上通过预定义的 HTTP 请求参数“`jfwid`”扩展了客户端窗口作用域；只是其作用域被进一步限定在隔离子文件夹中的一组特定\
  \ Jakarta Faces 视图内。当最终用户点击导航到 Jakarta Faces 流特定入口页面的 Jakarta Faces 链接或按钮组件时，流作用域将自动启动。如果直接打开入口页面而未通过\
  \ Jakarta Faces 链接或按钮组件导航，则无法启动流作用域。\n此外，特别是在使用 `UIOutcomeTarget` 组件而非 `UICommand`\
  \ 组件进行导航时，查询字符串可能附带另外两个预定义的 HTTP 请求参数：“`jffi`”（“Jakarta Faces 流标识符”）和“`jftfdi`”（“Jakarta\
  \ Faces 目标流文档标识符”）。实际上，这些参数仅在使用 GET 请求启动 Jakarta Faces 流时是必需的。从技术上讲，在流的其余部分，仅“`jfwid`”参数就足够了。只要“`jfwid`”参数存在且仍然有效，Jakarta\
  \ Faces 流就是幂等的，并且可以通过 GET 请求恢复。当您打开新的浏览器标签页并导航到 Jakarta Faces 流时，实际上会启动一个新的流作用域，该作用域独立于另一个标签页中的流作用域。一旦\
  \ Jakarta Faces 流内的回发请求导航到流外部的页面，流作用域将自动结束。当最终用户稍后重用“`jfwid`”请求参数，或将其值篡改为其自身浏览器会话中未启动的值，或直接进入流，或底层\
  \ `HttpSession` 实例被销毁时，CDI 将抛出 `jakarta.enterprise.context.ContextNotActiveException`。\n\
  因此，流作用域与客户端窗口作用域及会话作用域的主要区别在于，Jakarta Faces 流内的页面无法直接进入。当最终用户导航到流的入口页面时，它们会自动启动；当回发导航到流外部时，它们会自动结束。\n\
  流作用域托管 Bean 有助于将对话隔离到一组特定的 Jakarta Faces 页面。一个经典的现实世界示例是预订应用程序，它分布在物理上不同页面的多个表单中。\n\
  有多种方式可以定义 Jakarta Faces 流。一种方式是通过约定，另一种方式是通过在 `/[flowId]/[flowId]-flow.xml` 文件中进行声明式配置，还有一种方式是通过使用\
  \ `jakarta.faces.flow.FlowBuilder` API 进行编程式配置。^(⁷³) 在本书中，我们将仅限于约定优于配置。首先，创建以下文件夹结构：\n\
  \n![](img/454457_2_En_8_Figa_HTML.jpg)\n\n第一个约定是，流入口页面的名称必须与其所在的子文件夹名称完全相同。在本例中，即“`booking`”。这被视为流\
  \ ID。第二个约定是，子文件夹中必须有一个 `*-flow.xml` 文件，其文件名以流 ID 为前缀，即 `booking-flow.xml`。此 XML\
  \ 配置文件目前可以保持为空。仅当您想要精细调整 Jakarta Faces 流配置时（例如，通过指定不同的入口页面），它才派上用场。没有此文件，流作用域将不会被激活。然而，在\
  \ Web 应用程序中至少激活一个流的一个缺点是，Jakarta Faces 客户端窗口 ID 参数“`jfwid`”将附加到每个导航 URL 上，即使它不针对\
  \ Jakarta Faces 流。这种 URL 污染可能是一些开发者完全不使用流作用域的主要原因。\n\n用于进入 Jakarta Faces 流的导航组件必须放置在流子文件夹外部的\
  \ Jakarta Faces 页面中。导航结果必须引用流子文件夹的名称，即流 ID。以下是 `/home.xhtml` 中的一个示例。\n\n```\n当然，这可以用\
  \ `<h:link>` 替代。建议为此使用 GET 而非 POST，以便预订页面的 URL 能正确反映在浏览器的地址栏中。然后，在子文件夹内的所有页面中，您可以引用一个流作用域托管\
  \ Bean，该 Bean 将在所有这些页面之间共享。您还可以在这些页面之间来回导航，同时保留流作用域托管 Bean 的实例。建议为此使用带有重定向的 Ajax。Ajax\
  \ 提交将改善用户体验。重定向将确保各个页面仍然可以添加书签。\n\n以下是这些页面外观的示例。`/booking/booking.xhtml` 页面有一个输入字段，要求输入开始日期作为第一步：\n\
  \n```\n\n...\n\n```\n\n`/booking/persons.xhtml` 页面有几个输入字段，要求输入人员详细信息：\n\n```\n\n\
  ...\n\n...\n\n```\n\n`/booking/confirm.xhtml` 页面显示到目前为止输入信息的摘要：\n\n```\n\n...\n\n\
  ```\n\n`/booking/payment.xhtml` 页面显示一个支付方式下拉菜单并执行支付：\n\n```\n\n...\n\n...\n\n```\n\
  \n最后，`#{booking}` 背后的流作用域 Bean 可以如下所示：\n\n```\n@Named @FlowScoped(\"booking\")\n\
  public class Booking implements Serializable {\nprivate LocalDate startDate;\nprivate\
  \ List persons;\nprivate PaymentMethod paymentMethod;\n// ...\npublic void submit()\
  \ {\n// ...\n}\n}\n```\n\n您可以看到，大部分导航任务由命令组件的 `action` 属性完成。`faces-redirect=true`\
  \ 是一个特殊的请求参数，Jakarta Faces 内部将其识别为在回发后执行重定向的指令。当然，在执行实际重定向之前，此请求参数会从目标 URL 中剥离。一旦回发离开流，流作用域托管\
  \ Bean 就会被销毁，并且之前呈现的页面 URL 将不再可重用。\n\n@ViewScoped\n视图作用域托管 Bean 的生命周期与 Jakarta Faces\
  \ 视图状态绑定。Jakarta Faces 视图状态在第 3 章的“视图状态”部分有详细说明。简而言之，只要最终用户在同一个 Jakarta Faces 视图上执行回发请求，并且调用的操作方法持续返回\
  \ `null` 或 `void`，视图作用域托管 Bean 就保持存活。一旦操作方法返回非 `null` 值，即使是一个空字符串或代表同一个视图，视图作用域也将结束。视图作用域托管\
  \ Bean 在同一浏览器会话的不同标签页之间不共享。每个标签页都获得自己唯一的实例。实际上，它们通过生成的 Jakarta Faces 表单的 HTML 表示中的\
  \ `jakarta.faces.ViewState` 隐藏输入字段间接标识。\n然而，视图作用域托管 Bean 实际上并不存储在 Jakarta Faces\
  \ 视图状态中，即使启用了客户端状态保存也是如此。无论 Jakarta Faces 状态保存方法如何，它们实际上都存储在 HTTP 会话中。当最终用户通过链接或书签执行\
  \ GET 请求、在浏览器地址栏中编辑 URL 或关闭浏览器标签页来卸载网页时，它们不会立即被销毁。它们会一直存在于 HTTP 会话中，并且仅在 HTTP 会话过期时才会被销毁。\n\
  \n\n\n由于最终用户理论上可以在同一会话中打开无限数量的浏览器标签页，从而产生同样多的视图状态和视图作用域托管 Bean，因此 HTTP 会话中存储的视图状态和视图作用域托管\
  \ Bean 数量有一个可配置的最大限制。一旦达到此限制，最近最少使用的视图状态和视图作用域托管 Bean 将被过期并销毁。当最终用户实际返回到最初引用现已过期的视图状态的标签页，并对其执行回发请求时，Jakarta\
  \ Faces 将抛出一个 `ViewExpiredException`。\n\n视图状态数量的限制取决于所使用的 Jakarta Faces 实现。在 Mojarra\
  \ 中，此限制可通过 `web.xml` 中的 `com.sun.faces.numberOfLogicalViews` 上下文参数进行配置，其默认值为 `15`。^(⁷⁴)\n\
  \n```\ncom.sun.faces.numberOfLogicalViews\n\n```\n\n然而，如果你的 Web 应用程序（例如讨论论坛或问答网站）允许在更多浏览器标签页中打开，那么你最好切换到客户端状态保存。这样，Jakarta\
  \ Faces 视图状态将不再存储在 HTTP 会话中，因此也永远不会过期。但是，关联的视图作用域托管 Bean 仍然存储在 HTTP 会话中，并且可能过期。当最终用户实际返回到最初引用现已过期的视图作用域托管\
  \ Bean 的标签页，并对其执行回发请求时，Jakarta Faces 不会抛出 `ViewExpiredException`，而是会从头开始创建一个新的托管\
  \ Bean，从而丢失对原始托管 Bean 实例的所有状态更改。视图作用域托管 Bean 数量的限制也取决于所使用的 Jakarta Faces 实现。在 Mojarra\
  \ 中，此限制可通过 `web.xml` 中的 `com.sun.faces.numberOfActiveViewMaps` 上下文参数进行配置，其默认值为 25。\n\
  \n```\ncom.sun.faces.numberOfActiveViewMaps\n\n```\n\n此配置实际上将默认值降低到与会话中 Jakarta\
  \ Faces 视图状态的最大默认数量相等。当你使用服务器端状态保存，并且所有 Jakarta Faces 视图都只引用一个视图作用域托管 Bean 实例时，这没问题。然而，在一个经过良好开发和重构的\
  \ Jakarta Faces Web 应用程序中，平均每个 Jakarta Faces 页面通常会引用多个视图作用域托管 Bean。例如，如果每个 Jakarta\
  \ Faces 视图最多有三个不同的视图作用域托管 Bean，那么你最好将限制设置为 `com.sun.faces.numberOfLogicalViews`\
  \ 值的三倍。你只需要考虑可能的内存消耗。当视图作用域托管 Bean 本身持有相对大量的数据时，内存消耗会迅速失控。\n\n视图作用域托管 Bean 对于在同一个\
  \ Jakarta Faces 视图上基于 Ajax 的回发之间保持状态非常有用，特别是当这些回发导致任何 `UIComponent` 的 `rendered`\
  \ 属性、任何 `UIInput` 组件的 `disabled` 或 `readonly` 属性，或同一 Jakarta Faces 视图内任何 `UICommand`\
  \ 组件的 `disabled` 属性值发生变化时。也就是说，在后续回发中，作为防止篡改请求的安全措施的一部分，Jakarta Faces 会在实际处理组件之前重新检查它们。如果持有状态的托管\
  \ Bean 是请求作用域而不是视图作用域，那么这些条件的变化将在后续回发中丢失，并且回发将无法按预期直观地处理。换句话说，视图作用域托管 Bean 在动态表单中特别有用。\n\
  \n一个例子是当下拉列表选择“其他”选项时，有条件地渲染一个自由文本字段。\n\n```\n\n...\n\n...\n\n```\n\n当托管 Bean 是请求作用域并且因此在每个请求上重新创建时，此构造将不起作用。当下拉列表更改时，它会创建一个新的请求作用域\
  \ Bean 实例，在其中设置标题，并渲染自由文本字段，最后请求作用域 Bean 实例被销毁。当表单提交时，它会创建一个新的请求作用域 Bean 实例，因此没有客户标题，当\
  \ Jakarta Faces 在应用请求值阶段（第二阶段）检查自由文本字段的 `rendered` 属性并发现它为 `false` 时，它最终根本不会处理该自由文本字段。此构造仅在托管\
  \ Bean 是视图作用域时才有效，因为在下拉列表更改期间设置的客户标题在表单提交的应用请求值阶段（第二阶段）仍然可用。\n\n但是，有一种变通方法。你可以让\
  \ `rendered` 属性检查 HTTP 请求参数而不是模型值。如第 4 章所述，HTTP 请求参数名称由组件的客户端 ID 指定。你可以将下拉列表组件绑定到视图，并使用其客户端\
  \ ID 来获取 HTTP 请求参数值。\n\n这样，当 Jakarta Faces 在表单提交的应用请求值阶段（第二阶段）检查 `rendered` 属性时，它会注意到它为\
  \ `true` 并继续处理自由文本字段，即使托管 Bean 是请求作用域，因此此时 `#{bean.customer.title}` 仍然为 `null`。请注意，`binding`\
  \ 属性不引用托管 Bean 属性。这是不必要的，因为在那里不会用到它。\n\n这个关于 Jakarta Faces 在 `rendered` 属性上行为的示例也完全适用于任何\
  \ `UIInput` 组件的 `readonly` 属性以及任何 `UIInput` 和 `UICommand` 组件的 `disabled` 属性。\n\n\
  也可能存在这样的情况：请求作用域托管 Bean 可以正常工作，但与视图作用域托管 Bean 相比，存在状态损坏的风险，尤其是在依赖来自可能被其他用户更改的共享数据库的数据时。这主要影响\
  \ `UIInput` 或 `UICommand` 组件嵌套在迭代组件（例如 `<h:dataTable>`、`<ui:repeat>` 和 `<c:forEach>`）中的用例，这些组件迭代来自数据库的模型。这在前面的第\
  \ 6 章中已经解释过，但为了复习，我们将再次解释。想象一个产品表，其中一列有一个删除按钮。\n\n```\n\n...\n\n```\n\n使用这个后台 Bean：\n\
  \n```\n@Named @ViewScoped\npublic class Products implements Serializable {\nprivate\
  \ List list;\n@Inject\nprivate ProductService productService;\n@PostConstruct\n\
  public void init() {\nlist = productService.list();\n}\npublic void delete(Product\
  \ product) {\nproductService.delete(product);\nlist.remove(product);\n}\npublic\
  \ List getList() {\nreturn list;\n}\n}\n```\n\n提交的按钮在底层由迭代索引标识。当 Jakarta Faces 即将处理表单提交，并且在此期间添加、删除或重新排序了产品，导致迭代索引发生变化时，则调用的操作可能会针对当前位于最初已知索引处的错误项目执行。这对模型的完整性是危险的。在这种情况下，迭代组件的值必须引用一个视图作用域的模型。\n\
  \n同样，这里也有一个变通方法。你可以不依赖迭代索引，而是依赖迭代对象的唯一标识符，该标识符必须作为 HTTP 请求参数传递，而不是作为 EL 方法参数。\n\n\
  ```\n\n...\n\n```\n\n其中后台 Bean 调整如下：\n\n\n``` \n@Named @RequestScoped\npublic class\
  \ Products {\nprivate List list;\n@Inject @ManagedProperty(\"#{param.id}\")\nprivate\
  \ Long id;\n@Inject\nprivate ProductService productService;\n@PostConstruct\npublic\
  \ void init() {\nlist = productService.list();\n}\npublic void delete() {\nproductService.delete(id);\n\
  list.removeIf(product -> product.getId().equals(id));\n}\npublic List getList()\
  \ {\nreturn list;\n}\n}\n```\n\n不，使用 `action=\"#{products.delete(product.id)}\"\
  ` 代替 `<f:param>` 是行不通的。技术原因在于，`<f:param>` 在表单的渲染响应阶段会立即执行，远在最终用户按下删除按钮之前。因此，当最终用户按下删除按钮时，它能保证持有正确的值。相反，EL\
  \ 方法参数仅在最终用户按下删除按钮后的回传请求中才被求值。如果在此期间模型发生了变化，那么当特定产品的迭代索引改变时，它就会求值为错误的 ID。\n\n如本节开头所述，标准的\
  \ Jakarta Faces 视图作用域 Bean 管理机制存在两个主要缺点：第一，当最终用户卸载网页时，这些实例不会立即过期，而是会滞留在 HTTP 会话中；第二，即使启用了客户端状态保存，它们仍存储在\
  \ HTTP 会话中。这些问题目前尚未在标准的 Jakarta Faces API 中得到解决。\n\n目前，Jakarta Faces 实用工具库 OmniFaces\
  \ 提供了一个增强版的 `@ViewScoped` 注解，解决了这两个缺点。^(⁷⁵) 使用 `@org.omnifaces.cdi.ViewScoped` 注解的视图作用域托管\
  \ Bean 在最终用户卸载页面时会被实际销毁。这底层是通过 JavaScript 中的 `Navigator.sendBeacon` API^(⁷⁶) 以及\
  \ OmniFaces 提供的专门监听这些卸载请求的 `ViewHandler` 实现来完成的。已有生产级应用大量使用视图作用域托管 Bean，在从标准的 Jakarta\
  \ Faces `@ViewScoped` 切换到 OmniFaces `@ViewScoped` 后，内存使用量减少了高达 80%。这使得“卸载时销毁”功能成为未来版本标准\
  \ Jakarta Faces API 中一个重要的候选特性。\n\n为了在启用客户端状态保存时，将物理上的视图作用域托管 Bean 保存到 Jakarta Faces\
  \ 视图状态中，必须将 OmniFaces `@ViewScoped` 注解的 `saveInViewState` 属性设置为 `true`。你只需要记住，这些\
  \ Bean 永远不会过期，即使页面被卸载或 HTTP 会话过期也不会。实际上，整个 Bean 在物理上已成为生成的 HTML 输出的一部分，位于 `jakarta.faces.ViewState`\
  \ 隐藏输入字段中。社区已有请求，希望让 Jakarta Faces 状态管理更加灵活，例如在逐个视图（每个 `UIViewRoot`）甚至逐个表单（每个 `UIForm`）的基础上切换客户端和服务器端状态保存，并能够将视图作用域托管\
  \ Bean 存储在实际的视图状态中，而不是 HTTP 会话中。这也可能在未来的标准 Jakarta Faces API 版本中重新考虑。\n\n@RequestScoped\n\
  \n请求作用域托管 Bean 的生命周期与 HTTP 请求绑定，这对 Jakarta Faces 来说是最重要的情况。其他情况包括：会话 Bean 上异步方法调用（使用\
  \ `@Asynchronous` 注解的方法）的生命周期、定时器超时方法的生命周期，或消息驱动 Bean（MDB）处理消息时的生命周期，所有这些都发生在 Jakarta\
  \ Enterprise Beans（以前称为 Jakarta Enterprise Beans）中。请注意，Ajax 请求也计为单个 HTTP 请求。\n\n\
  当客户端向服务器发送 HTTP 请求时，Servlet 容器会创建代表 HTTP 请求和响应的 `HttpServletRequest` 和 `HttpServletResponse`\
  \ 实例，并将它们传递给认证模块、Servlet 过滤器和 Servlet。在所有认证模块、Servlet 过滤器和 Servlet 完成请求和响应的处理后，这些实例会立即被销毁。换句话说，每个\
  \ HTTP 请求都会创建一个新的请求作用域托管 Bean 实例，该实例仅在该请求期间可用，在其他请求中不可用。\n\n请求作用域托管 Bean 适用于简单且静态的表单，这些表单没有任何基于\
  \ Ajax 的动态更新，对于这类表单，你更倾向于使用视图作用域托管 Bean。可以想象一个登录表单或联系表单。\n\n```\n@Named @RequestScoped\n\
  public class Login {\nprivate String username;\nprivate String password;\n// ...\n\
  }\n```\n\n当然，这些表单也可以毫无问题地绑定到视图作用域托管 Bean，但那样会浪费内存空间。请注意，你绝对不应该将 Jakarta Persistence\
  \ 实体本身作为托管 Bean。换句话说，以下方法实际上是错误的：\n\n```\n@Named @RequestScoped // 或 @Model\n@Entity\n\
  public class Product {\n// ...\n}\n```\n\n这不仅违反了迪米特法则^(⁷⁷)，而且还有可能导致 Jakarta Persistence\
  \ 无法持久化它，因为 CDI 实际上会将托管 Bean 包装在一个代理类中，而当你试图将注入的实例传递给实体管理器时，Jakarta Persistence\
  \ 将无法从中获取实体信息。在这种情况下，Hibernate 会抛出 “`Unknown entity: com.example.Entity$Proxy$_$$_WeldClientProxy`”\
  \ 异常，这实际上代表的是 CDI 代理类。\n\n此时你可能想知道 CDI 究竟是如何工作的。首先，在 Web 应用程序启动期间，它会收集所有使用 CDI 兼容作用域注解标注的类。然后，它会为所有这些类生成代理类。最终，这些代理类的实例会被注入。给定一个示例\
  \ Bean 类 `com.example.Bean`，生成的 CDI 代理类可能如下所示：\n\n```\npublic class Bean$Proxy$_$$_CDI\
  \ extends Bean implements Serializable {\npublic String getSomeProperty() {\nBean\
  \ actualInstance = CDI.resolveItSomehow();\nreturn actualInstance.getSomeProperty();\n\
  }\npublic void setSomeProperty(String someProperty) {\nBean actualInstance = CDI.resolveItSomehow();\n\
  actualInstance.setSomeProperty(someProperty);\n}\n}\n```\n\n\n你看，它继承了 bean 类，使其可序列化，并使用了一个“不可能冲突”的类名，并让所有方法委托给从\
  \ CDI 上下文获取的实际实例。你可能也会立刻明白为什么 CDI bean 管理设施要求 bean 类必须是公开的，并且有一个公开的无参构造器。你还会看到，当创建并注入这样一个代理类时，底层的实际实例并不一定会被创建。它只会在虚构的\
  \ `CDI.resolveItSomehow()` 方法被调用时自动创建。在底层，它会从一个线程局部变量中获取上下文，这与 `FacesContext#getCurrentInstance()`\
  \ 的工作方式完全相同。\n顺便提一下，Jakarta Enterprise Beans 也以这种方式使用可序列化的代理。这就是为什么它看似神奇地完成了启动或加入事务以及使用池化实例的所有繁重工作。实际上，这一切都是在代理方法中完成的，即在调用实际实例方法之前和之后。\n\
  请注意，CDI 还有一个 `@jakarta.enterprise.inject.Model` 原型注解，它基本上将 `@Named` 和 `@RequestScoped`\
  \ 捆绑到一个注解中。这与请求作用域的受管 bean 没有任何区别。不幸的是，它并不代表一个非代理实例；否则，将其放在 `@Entity` 上会很好。`@Model`\
  \ 注解的存在只是为了方便。\n\n@Dependent\n一个依赖作用域的受管 bean 的生命周期与首次创建它的作用域的生命周期绑定在一起。因此，如果你将其注入到\
  \ `@ApplicationScoped` 中，那么它也会变成应用作用域。如果你将其注入到 `@ViewScoped` 中，那么它也会变成视图作用域。以此类推。这是\
  \ CDI 的默认作用域。\n然而，这有一个陷阱。当你忘记在你的 `@Named` 支持 bean 上声明任何 CDI 作用域注解，并且你在 EL 中直接引用它（如\
  \ `#{dependentScopedBean}`），而不是通过另一个受管 bean 引用它（如 `#{requestScopedBean.dependentScopedBean}`），那么每次\
  \ EL 求值都会创建一个全新的实例，该实例仅存在于该 EL 上下文中。换句话说，想象一个 Jakarta Faces 表单，包含两个输入字段和一个提交按钮，每个都绑定到一个依赖作用域的受管\
  \ bean，那么你最终会得到三个独立的实例。一个设置了第一个输入字段，一个设置了第二个输入字段，一个调用了动作方法。因此，如果你在动作方法中观察到已提交值为\
  \ `null` 的奇怪行为，即使必需验证已通过，那么首先要检查的是 CDI 受管 bean 的作用域是否存在且正确。\n\n与其他作用域的主要技术区别在于，依赖作用域的受管\
  \ bean 不会被代理。换句话说，被注入的是实际实例。以下是一个示例，说明如何通过 `@Inject` 使用它来准备一个新的（且未被代理的！）Jakarta\
  \ Persistence 实体：\n\n```\n@Dependent\npublic class Entities {\n@Produces\npublic\
  \ Product getProduct() {\nreturn new Product();\n}\n}\n@Named @RequestScoped\npublic\
  \ class Products {\n@Inject\nprivate Product product;\n@Inject\nPrivate ProductService\
  \ productService;\npublic void add() {\nproductService.create(product);\n}\npublic\
  \ Product getProduct() {\nreturn product;\n}\n}\n```\n\n请注意，你仍然不能使用 `<h:inputText\
  \ value=\"#{product.name}\">`，因为它会获取自己的实例。你仍然需要使用 `#{products.product.name}`。正是由于这个原因，生产者方法没有使用\
  \ `@Named`。还要注意，如果是视图作用域的受管 bean，你需要通过从动作方法返回一个非空结果来强制 Jakarta Faces 重启视图作用域；否则，注入的\
  \ `Product` 实例将在下一个视图中被重用。\n最后，这个示例并不是非常有用，因为其行为不一定直观。你最好使用 `private Product product\
  \ = new Product();` 来代替 `@Inject`。\n\n选择哪个作用域？\n选择哪个作用域完全取决于 bean 持有和表示的数据（实例变量，即状态）。你应该努力将状态放在尽可能短的可接受作用域中。从\
  \ `@RequestScoped` bean 开始。一旦你注意到某些状态需要在同一视图的回发后保留，就将该状态精确地拆分到一个新的 `@ViewScoped`\
  \ bean 中，然后将其 `@Inject` 到 `@RequestScoped` bean 中。一旦你注意到某些状态需要在同一会话的另一个请求中保留，就将该状态精确地拆分到一个新的\
  \ `@SessionScoped` bean 中，然后将其 `@Inject` 到 `@RequestScoped` bean 中。以此类推。\n滥用 `@ApplicationScoped`\
  \ bean 来存储会话、对话、流程、视图或请求作用域的数据，会导致数据在所有用户之间共享，因此任何人都可以看到彼此的数据，这显然是错误的。滥用 `@SessionScoped`\
  \ bean 来存储对话、流程、视图或请求作用域的数据，会导致数据在同一会话的所有浏览器标签页之间共享，因此最终用户在切换标签页后与每个视图交互时可能会遇到不一致的情况，这对用户体验不利。滥用\
  \ `@RequestScoped` bean 来存储视图、流程或对话作用域的数据，会导致视图、流程或对话作用域的数据在每次（Ajax）回发时被重新初始化为默认值，可能导致表单无法正常工作。滥用\
  \ `@ViewScoped`、`@FlowScoped` 或 `@ConversationScoped` bean 来存储请求、会话或应用作用域的数据，以及滥用\
  \ `@SessionScoped` bean 来存储应用作用域的数据，虽然不会影响最终用户，但会不必要地占用服务器内存，并且效率低下。\n请注意，不应基于性能影响来选择作用域，除非你真的内存占用很低并且希望完全无状态。那么你需要专门使用带有\
  \ `@RequestScoped` bean 的无状态表单，并通过请求参数来维护任何客户端的状态。换句话说，你可能需要重新发明 `jakarta.faces.ViewState`\
  \ 隐藏输入字段已经完成的工作。\n\n@FlashScoped 在哪里？\n最后，Jakarta Faces 也支持闪存作用域。它由一个短生命周期的 cookie\
  \ 支持，该 cookie 与会话作用域中的一个数据条目相关联。在重定向前，会在 HTTP 响应上设置一个 cookie，其值代表会话作用域中数据条目的唯一键。重定向后，会检查闪存作用域\
  \ cookie 的存在，并将与该 cookie 值（作为键）关联的数据条目从会话作用域中移除，并放入重定向请求的请求作用域中。最后，该 cookie 会从 HTTP\
  \ 响应中移除。这样，重定向的请求就可以访问在初始请求中准备好的请求作用域数据。\n实际上，标准的 Jakarta Faces API 并没有将其作为受管 bean\
  \ 作用域提供。换句话说，不存在 `@FlashScoped` 这样的东西。闪存作用域只能通过受管 bean 中的 `ExternalContext#getFlash()`\
  \ 和 EL 中的 `#{flash}` 作为映射使用。\n历史上，引入闪存作用域主要是为了能够在重定向页面中显示在动作方法中设置的面部消息。想象一下在详情页面中保存编辑过的产品并重定向回主页面用例。\n\
  \n```\npublic String save() {\nFacesContext context = FacesContext.getCurrentInstance();\n\
  try {\nproductService.update(product);\ncontext.addMessage(null, new FacesMessage(\"\
  Product saved!\"));\nreturn \"/products?faces-redrect=true\";\n}\ncatch (Exception\
  \ e) {\ncontext.addMessage(null, new FacesMessage(\n\"Cannot save product. Error:\
  \ \" + e.getMessage()));\nreturn null;\n}\n}\n```\n\n\n\n“产品已保存！”的 faces 消息不会显示在重定向页面的\
  \ `<h:messages globalOnly>` 中，因为 faces 消息本质上是请求作用域的（实际上是“faces 上下文作用域”）。历史上，在 Jakarta\
  \ Faces 1.x 时代，这个问题是通过一个阶段监听器解决的，该监听器在渲染响应阶段之后将所有未显示的 faces 消息复制到 HTTP 会话中，并在恢复视图阶段之后将它们重新添加回\
  \ faces 上下文。自从 Jakarta Faces 2.0 引入了 flash 作用域，这个问题可以通过简单地调用 `Flash#setKeepMessages()`^(⁷⁸)\
  \ 以更简单的方式解决。\n\n```\nproductService.update(product);\ncontext.addMessage(null, new\
  \ FacesMessage(\"Product saved!\"));\ncontext.getExternalContext().getFlash().setKeepMessages(true);\n\
  return \"/products?faces-redrect=true\";\n```\n\n这样，faces 消息会在重定向前自动存储在 flash 作用域中，并在重定向后恢复。\n\
  \nflash 作用域不仅对 faces 消息有用。它对于在从一个视图重定向到另一个视图时传递整个对象也很有用，而无需将某个对象标识符作为请求参数传递。以下是一个示例，它为下一步准备了一个实体，而无需先将其保存到数据库中：\n\
  \n```\n@Named @RequestScoped // or @ViewScoped\npublic class Home {\nprivate Product\
  \ product = new Product();\npublic String prepareProduct() {\nFacesContext context\
  \ = FacesContext.getCurrentInstance();\ncontext.getExternalContext().getFlash().put(\"\
  product\", product);\nreturn \"/next?faces-redirect=true\";\n}\npublic Product getProduct()\
  \ {\nreturn product;\n}\n}\n```\n\n其中，下一步的 bean 如下所示：\n\n```\n@Named @ViewScoped\n\
  public class Next implements Serializable {\n@Inject @ManagedProperty(\"#{flash.product}\"\
  )\nprivate Product product;\npublic void save() {\n// ...\n}\npublic Product getProduct()\
  \ {\nreturn product;\n}\n}\n```\n\n并且，当 flash 作用域中不存在该实体时，`/next.xhtml` 会重定向回 `/home.xhtml`。\n\
  \n请注意，当你直接打开 `/next.xhtml` 或在 Web 浏览器中刷新页面时，就会发生这种重定向。如果你希望避免这种情况，可以通过在 `#{flash}`\
  \ 映射中将条目键前缀设置为预定义的键“`keep`”，来指示 flash 作用域保留该条目值。\n\n```\n@Named @RequestScoped\n\
  public class Next {\n@Inject @ManagedProperty(\"#{flash.keep.product}\")\nprivate\
  \ Product product;\n// ...\n}\n```\n\n这样，flash 作用域的生命周期将延长，直到最终用户关闭浏览器窗口、应用程序导航到不同的视图或底层\
  \ HTTP 会话过期。通过这种方式，你甚至可以将受管 bean 设置为请求作用域而不是视图作用域，并且在 `/next.xhtml` 页面提交表单甚至刷新页面时也不会丢失实体。这是\
  \ flash 作用域一个相对强大的特性。\n\n受管 Bean 的初始化和销毁\n\n受管 bean 实例可以在带有 `@PostConstruct` 注解的方法中基于注入的依赖项进行初始化。受管\
  \ bean 实例可以在带有 `@PreDestroy` 注解的方法中挂接到销毁事件。\n\n```\n@Named\npublic class Bean {\n\
  @PostConstruct\npublic void init() {\n// ...\n}\n@PreDestroy\npublic void destroy()\
  \ {\n// ...\n}\n}\n```\n\n方法名称不是预定义的。确切的方法名称 `init()` 和 `destroy()` 基本上是从现有的 `HttpServlet`\
  \ API 继承而来的。你当然可以选择自己的方法名称，例如 `onload()` 和 `cleanup()`。了解这些注解是可继承的很有用。换句话说，你可以将这些初始化和销毁方法放在一个抽象基类中。\n\
  \n在 postconstruct 方法中，你有机会基于注入的依赖项执行初始化。这些注入的依赖项在构造函数中尚不可用。bean 管理设施只能在构造受管 bean\
  \ 实例之后注入依赖项。然后它会立即调用带有 `@PostConstruct` 注解的方法。在 pre-destroy 方法中，你有机会执行任何必要的清理工作，例如关闭资源、删除文件和保存状态。\n\
  \n注入 Jakarta Faces 提供的类型\n\n显然，受管 bean 可以通过 CDI 的 `@Inject` 相互注入，正如本书中多次演示的那样。除了注入你自己的类型之外，各种\
  \ Jakarta Faces 提供的类型也可以通过 CDI 注入。这些类型在很大程度上对应于我们在第 7 章“隐式 EL 对象”部分的表 7-1 中看到的隐式\
  \ EL 对象。这并非巧合。在内部，Jakarta Faces 中的隐式对象是由 CDI 中所谓的 `Bean<T>` 实例实现的。这些 CDI `Bean<T>`\
  \ 实例实际上是工厂对象，它们知道如何生成 bean，以及使用什么类型、可选的限定符和/或什么名称。当在表达式语言中使用隐式对象的名称时，CDI EL 解析器会按名称查找该对象，这会导致调用某个\
  \ `Bean<T>` 实例。当我们进行注入时，我们注入的类型以及任何显式或隐式的限定符，构成了用于此查找的替代键。两种类型的键都将导致使用完全相同的 CDI\
  \ `Bean<T>` 实例。\n\n表 8-1 显示了可通过 CDI 注入的 Jakarta Faces 提供的类型。\n\n表 8-1\n可注入的 Jakarta\
  \ Faces 提供的类型，自 2.3 版本起\n\n可注入的 Jakarta Faces 类型 | 解析为\n\n| --- | --- | --- | ---\
  \ | --- |\n\njakarta.faces.context.FacesContext | FacesContext#getCurrentInstance(  )\n\
  \njakarta.faces.context.ExternalContext | FacesContext#getExternalContext(  )\n\n\
  jakarta.faces.component.UIViewRoot | FacesContext#getViewRoot(  )\n\njakarta.faces.context.Flash\
  \ | ExternalContext#getFlash(  )\n\n@RequestMap Map<String, Object> | ExternalContext#getRequestMap(  )\n\
  \n@ViewMap Map<String, Object> | UIViewRoot#getViewMap(  )\n\n@FlowMap Map<Object,\
  \ Object> | FlowHandler#getCurrentFlowScope(  )\n\n@SessionMap Map<String, Object>\
  \ | ExternalContext#getSessionMap(  )\n\n@ApplicationMap Map<String, Object> | ExternalContext#getApplicationMap(  )\n\
  \n@InitParameterMap Map<String, String> | ExternalContext#getInitParameterMap(  )\n\
  \n@RequestParameterMap Map<String, String> | ExternalContext#getRequestParameterMap(  )\n\
  \n@RequestParameterValuesMap Map<String, String[ ]> | ExternalContext#getRequestParameterValuesMap(  )\n\
  \n@HeaderMap Map<String, String> | ExternalContext#getRequestHeaderMap(  )\n\n@HeaderValuesMap\
  \ Map<String, String[ ]> | ExternalContext#getRequestHeaderValuesMap(  )\n\n@RequestCookieMap\
  \ Map<String, Cookie> | ExternalContext#getRequestCookieMap(  )\n\njakarta.faces.application.ResourceHandler\
  \ | Application#getResourceHandler(  )\n\n应该注意的是，与表 7-1 中提到的隐式 EL 对象相比，表 8-1 中提到的可\
  \ CDI 注入的 Jakarta Faces 提供的类型缺少了几个，即：\n\n*   `#{component}`\n\n*   `#{cc}`\n\n*\
  \   `#{request}`\n\n*   `#{session}`\n\n*   `#{application}`\n\n\n\n`#{component}`\
  \ 和 `#{cc}` 都解析为 `UIComponent`，但该组件不可注入，因为这需要一个特殊的代理或自定义作用域，其范围必须足够窄，以便在访问注入类型时解析出这些组件的“当前”实例。由于\
  \ Jakarta Faces 中尚不存在此类作用域，因此它们已被排除在 CDI 注入之外。\n`#{request}`、`#{session}` 和 `#{application}`\
  \ 分别代表 Servlet 容器中的 `HttpServletRequest`、`HttpSession` 和 `ServletContext`，它们已被省略，因为这些类型并非由\
  \ Jakarta Faces 拥有，因此 Jakarta Faces 不应为它们提供 CDI 注入能力。Jakarta Faces 确实为这些类型提供了隐式\
  \ EL 对象，这主要是历史原因。唯一应为这些类型提供注入的规范是直接拥有这些类型的 Servlet API。\n\n从表 8-1 可以看出，对于只有一个实例且该实例由\
  \ Jakarta Faces 提供（拥有）的对象，不需要限定符。当涉及更通用的类型（例如各种映射）时，则需要限定符。所有这些限定符注解都可以从 `jakarta.faces.annotation`\
  \ 包中获得。^(⁷⁹)\n\n需要注意的是，上述所有类型都是请求作用域的，但它们实际有效的时间范围更小，即从 `FacesServlet` 的 `service()`\
  \ 方法被调用后不久开始，直到该方法即将退出前为止。应注意不要在此时间范围之外注入和访问这些类型。预计 Jakarta Faces 规范的未来修订版将解决此问题。\n\
  \n以下示例展示了如何注入两种由 Jakarta Faces 提供的类型：\n\n```\n@Named @RequestScoped\npublic class\
  \ Bean {\n@Inject\nprivate Flash flash;\n@Inject @RequestParameterMap\nprivate Map\
  \ requestParameterMap;\npublic void someMethod() {\nif (requestParameterMap.containsKey(\"\
  something\")) {\nflash.put(\"aKey\", \"aValue\");\n}\n}\n}\n```\n\n**急切初始化**\n\n\
  托管 Bean 默认是延迟初始化的，即当它们首次在 EL 表达式中被引用或作为注入依赖项时才会被初始化。托管 Bean 可以通过一个观察者方法在任意作用域启动时进行急切初始化，该方法会观察目标作用域的初始化事件。之前在“`@ViewScoped`”部分已经给出过一个例子。急切初始化方法的一般模式如下：\n\
  \n```\npublic void startup(@Observes @Initialized(XxxScoped.class) S scope) {\n\
  // ...\n}\n```\n\n其中 `XxxScoped.class` 可以是任何与 CDI 兼容的作用域，`S` 代表该作用域的拥有者。对于以下作用域，对应关系如下：\n\
  \n*   `ApplicationScoped.class` – `jakarta.servlet.ServletContext`\n*   `SessionScoped.class`\
  \ – `jakarta.servlet.http.HttpSession`\n*   `ConversationScoped.class` – `jakarta.servlet.ServletRequest`\n\
  *   `FlowScoped.class` – `jakarta.faces.flow.Flow`\n*   `ViewScoped.class` – `jakarta.faces.component.UIViewRoot`\n\
  *   `RequestScoped.class` - `jakarta.servlet.ServletRequest`\n\n请注意，包含此观察者方法的 Bean\
  \ 必须至少具有相同的作用域，才能使 `@Observes @Initialized` 生效。对于应用作用域的托管 Bean，急切初始化的优势在于，您可以将其配置为“启动”Bean，而无需在其他\
  \ Bean 中引用它来触发其初始化。\n\n```\n@ApplicationScoped\npublic class Startup {\npublic void\
  \ contextInitialized\n(@Observes @Initialized(ApplicationScoped.class)\nServletContext\
  \ context)\n{\n// ...\n}\n}\n```\n\n对于请求作用域的 Bean，急切初始化的优势在于，如有必要，您可以在 `FacesServlet`\
  \ 被调用之前很久就发起异步数据库查询。\n\n```\n@Named @RequestScoped\npublic class EagerProducts {\n\
  private Future> list;\n@Inject\nprivate ProductService productService;\npublic void\
  \ requestInitialized\n(@Observes @Initialized(RequestScoped.class)\nHttpServletRequest\
  \ request)\n{\nif (\"/products.xhtml\".equals(request.getServletPath())) {\nlist\
  \ = productService.asyncList();\n}\n}\npublic List getList() {\ntry {\nreturn list.get();\n\
  }\ncatch (InterruptedException e) {\nThread.currentThread().interrupt();\nthrow\
  \ new FacesException(e);\n}\ncatch (ExecutionException e) {\nthrow new FacesException(e);\n\
  }\n}\n}\n```\n\n其中 `ProductService` 如下所示：\n\n```\n@Stateless\npublic class ProductService\
  \ {\n@TransactionAttribute(SUPPORTS)\npublic List list() {\nreturn entityManager\n\
  .createQuery(\"FROM Product ORDER BY id DESC\", Product.class)\n.getResultList();\n\
  }\n@Asynchronous\npublic Future> asyncList() {\nreturn new AsyncResult(list());\n\
  }\n}\n```\n\n特别要注意，`requestInitialized()` 方法需要在调用业务服务方法之前确定实际的路径。这是因为 `@Observes\
  \ @Initialized(RequestScoped.class)` 基本上会在每个请求上被调用。在这个特定示例中，只有当请求访问 `/products.xhtml`\
  \ 页面时，业务服务方法才会被触发。而该页面可以像往常一样引用产品列表。\n\n```\n...\n\n```\n\n当打开此页面时，请求作用域的 Bean 将在请求开始时立即被初始化，远在\
  \ `FacesServlet` 被调用之前，并异步地从数据库获取 `List<Products>`。根据所使用的服务器硬件、可用的服务器资源以及在 Bean\
  \ 创建和进入 Jakarta Faces 渲染响应阶段之间运行的所有同步代码，这种方法可能会为您提供 10`–`500 毫秒（如果管道中存在一些低效代码，甚至可能更多）的时间窗口，用于在与\
  \ HTTP 请求并行的不同线程中从数据库获取数据，从而实现与数据库获取数据所需时间相当的速度提升。\n\n**分层**\n\n在实现支持 Bean 时，理解将\
  \ Jakarta Faces 支持 Bean 与 Jakarta Persistence 实体和 Jakarta Enterprise Beans 服务分离的重要性至关重要。换句话说，在开发支持\
  \ Bean 时，您应确保您的支持 Bean 尽可能精简，并尽可能多地将模型属性委托给实体，将业务逻辑委托给服务。您应该认识到，实体和服务应该能够在与 Jakarta\
  \ Faces 完全不同的前端（例如 Jakarta RESTful Web Services 甚至普通的 Jakarta Pages/Servlets）中完全可重用。\n\
  \n因此，这也意味着您应确保不要直接或间接地在实体或服务中包含 Jakarta Faces 特定的依赖项。例如，以下方法实际上是错误的：\n\n```\n@Entity\n\
  public class Product {\nprivate String name;\nprivate String description;\npublic\
  \ static Product of(ProductBacking backingBean) {\nProduct product = new Product();\n\
  product.setName(backingBean.getName());\nproduct.setDescription(backingBean.getDescription());\n\
  return product;\n}\n// ...\n}\n```\n\n在这里，Jakarta Persistence 实体与 Jakarta Faces\
  \ 支持 Bean 紧密耦合。不仅实体的属性在支持 Bean 中被重用，而且实体还依赖于支持 Bean。这将无法将实体提取到可跨不同 Web 应用程序重用的独立\
  \ JAR 模块中。\n\n以下方法实际上也是错误的：\n\n```\n@Stateless\npublic class ProductService {\n\
  @Inject\nprivate EntityManager entityManager;\npublic void create(Product product)\
  \ {\nentityManager.persist(product);\nFacesContext.getCurrentInstance().addMessage(null,\n\
  new FacesMessage(\"Product created!\"));\n}\n}\n```\n\n\n\n在这里，Jakarta Enterprise\
  \ Beans 方法会调用 faces 上下文并在其中设置一条消息。当该方法从例如 Web 服务或 Servlet 被调用时，会因 `NullPointerException`\
  \ 而失败，因为那里没有任何可用的 faces 上下文实例。这个 UI 消息传递任务显然不是后端代码的职责，而是前端代码的职责。换句话说，添加 faces 消息只应且仅应在\
  \ Jakarta Faces 构件（例如 backing bean）中发生。\n\n正确的方法如下，正如之前在“模型、视图还是控制器？”一节中演示的那样：\n\
  \n```\n@Named @RequestScoped\npublic class ProductBacking {\nprivate Product product\
  \ = new Product();\n@Inject\nprivate ProductService productService;\npublic void\
  \ save() {\nproductService.create(product);\nFacesContext.getCurrentInstance().addMessage(null,\n\
  new FacesMessage(\"Product created!\"));\n}\npublic Product getProduct() {\nreturn\
  \ product;\n}\n}\n```\n\n命名约定\n\nJakarta Faces 本身并没有规定严格的约定。我在各个项目中见过以下约定：\n\n*\
  \   `Foo`\n\n*   `FooBean`\n\n*   `FooBacking`\n\n*   `FooBackingBean`\n\n*   `FooManager`\n\
  \n*   `FooManagedBean`\n\n*   `FooController`\n\n其中 `Foo` 又可以代表以下之一：\n\n*   Jakarta\
  \ Faces 视图 ID，\n\n例如，`/edit/product.xhtml` 对应的 `EditProduct`\n\n*   Jakarta Faces\
  \ 视图名称，\n\n例如，`/view/products.xhtml` 对应的 `Products`\n\n*   Jakarta Persistence 实体名称，\n\
  \n例如，`@Entity class Product` 对应的 `Product`\n\n*   Jakarta Faces 表单 ID，\n\n例如，`<h:form\
  \ id=\"editProduct\">` 对应的 `EditProduct`\n首先，必须尽一切可能避免使用以 `Bean` 结尾的名称，如 `FooBean`、`FooBackingBean`\
  \ 和 `FooManagedBean`。“bean”后缀是多余的，而且过于模糊，因为实际上 Java 中任何有状态的类都可以被标记为 JavaBean。你不会立即为你的实体使用“`ProductBean`”，或者为你的服务使用“`ProductServiceBean`”甚至“`ProductServiceEnterpriseBean`”，对吧？诚然，`#{bean}`\
  \ 或 `#{myBean}` 甚至 `#{yourBean}` 来指示一个受管 bean，在博客、论坛、问答网站甚至本书的通用代码示例中非常常见。但这仅仅是为了代码片段的清晰和简单而做的。\n\
  这样我们就剩下 `Foo`、`FooBacking`、`FooManager` 和 `FooController`。所有这些都是可以接受的。就个人而言，我倾向于对请求、视图、流程和会话作用域的\
  \ bean 使用 `FooBacking`，对会话和应用作用域的 bean 使用 `FooManager`。至于 `Foo` 部分的命名约定，通常取决于 backing\
  \ bean 是与特定的 Jakarta Faces 视图或 Jakarta Faces 表单紧密绑定，还是通常可在引用特定实体的多个 Jakarta Faces\
  \ 视图或表单中重用。\n无论如何，这是一个相当主观的问题，很难用“唯一且正确的”答案来客观回答。你如何命名，对我来说或对其他人来说真的没那么重要，只要你在整个项目中保持一致即可。\n\
  \n脚注\n\n9. 异常处理\n\n有时，事情可能会意外出错。在 Java 中，这通常表现为抛出一个 `Exception`。在 Jakarta EE 中，基本上也没什么不同。问题在于如何以及何时妥善处理它们。默认情况下，HTTP\
  \ 请求期间任何未捕获的异常最终都会显示为应用服务器提供的默认错误页面。图 9-1 展示了 WildFly 的默认 HTTP 500 错误页面外观。\n\n![](img/454457_2_En_9_Fig1_HTML.png)\n\
  \n图 9-1\nWildFly 的默认 HTTP 500 错误页面\n\n所使用的 Jakarta Faces 实现甚至可能提供自己的默认错误页面。Mojarra\
  \ 和 MyFaces 都基于 `jakarta.faces.context.ExceptionHandler` API^(⁸⁰) 提供了一个内部默认实现，该实现仅在\
  \ Jakarta Faces 项目阶段设置为 `Development` 时才会显示。图 9-2 展示了 Mojarra 的该页面外观。\n\n![](img/454457_2_En_9_Fig2_HTML.png)\n\
  \n图 9-2\n开发阶段 Mojarra 的默认 HTTP 500 错误页面\n\n它不仅包含堆栈跟踪，还包含 Jakarta Faces 组件树和任何作用域变量的文本表示，这可能有助于查明根本原因，尽管实际上，仅凭堆栈跟踪并使用调试器重新执行用例比这更有帮助。\n\
  \n自定义错误页面\n\n虽然对普通 Web 开发人员有用，但坦率地说，那些默认错误页面对于普通最终用户来说是可怕的。其外观和感觉与网站的其他部分完全不同，文本对普通最终用户来说就像天书。这样的错误页面甚至没有为最终用户提供退出点。不满的最终用户无法快速找到主页或联系页面。幸运的是，对于最终用户来说，你可以通过在\
  \ Web 应用程序中包含一个错误页面，并在 `web.xml` 的 `<error-page>` 条目中注册其位置来覆盖这些默认错误页面。\n\n```\n\n\
  /WEB-INF/errorpages/500.xhtml\n\n```\n\n自定义错误页面特意被放置在 `/WEB-INF` 文件夹中，这样最终用户就无法直接访问或为其添加书签。默认情况下，Servlet\
  \ 容器会在请求作用域中设置与错误页面相关的属性，其键被定义为 `jakarta.servlet.RequestDispatcher.ERROR_XXX` 常量。^(⁸¹)\
  \ 这样，如有必要，你可以将它们包含在自定义错误页面中。以下是一个示例：\n\n```\nRequest URI\n#{requestScope['jakarta.servlet.error.request_uri']}\n\
  Exception type\n#{requestScope['jakarta.servlet.error.exception']['class']}\nException\
  \ message\n#{requestScope['jakarta.servlet.error.exception'].message}\nStack trace\n\
  #{\nfacesContext.externalContext.response.writer.flush()\n}#{\nrequestScope['jakarta.servlet.error.exception'].printStackTrace\n\
  (facesContext.externalContext.response.writer)\n}\n\n```\n\n请注意打印堆栈跟踪的技巧。在打印堆栈跟踪之前刷新响应写入器非常重要，并且\
  \ `<pre>` 元素内 EL（表达式语言）表达式之外的模板文本中不能有空白；否则，它会被附加到堆栈跟踪中。\n\n回到此类错误页面的可怕性，你最好将所有错误细节隐藏在仅在\
  \ Jakarta Faces 项目阶段等于 `Development` 时才评估为 `true` 的条件之后。首先，在某个主模板中设置一个应用作用域的快捷变量：\n\
  \n现在，当 Jakarta Faces 项目阶段等于 `Development` 时，你可以有条件地在错误页面中显示任何技术信息。\n\n```\nError\
  \ detail for developer\n\n...\n\n```\n\n无论如何，错误页面完全无状态是非常重要的。换句话说，一个像样的错误页面可能不包含任何\
  \ Jakarta Faces 表单，甚至不包含注销表单。你不仅会避免表单提交失败的风险（因为最初的异常实际上是由损坏的 Jakarta Faces 状态引起的），而且这些表单实际上会提交到错误的\
  \ URL（统一资源定位符），即错误页面本身的 URL。由于错误页面隐藏在 `/WEB-INF` 文件夹中，表单提交只会导致 404 错误。与其将错误页面移出\
  \ `/WEB-INF` 文件夹，不如使用一个提交到普通 Servlet 的纯 HTML 表单来解决注销的情况。`SecurityContext` 在那里也是可注入的，会话作用域的受管\
  \ bean（如果有的话）也是如此。\n\nAjax 异常处理\n\n\n\n默认情况下，当 Jakarta Faces Ajax 请求期间发生异常时，最终用户不会收到任何关于操作是否成功执行的反馈。在\
  \ Mojarra 中，仅当 Jakarta Faces 项目阶段设置为 `Development` 时，最终用户才会看到一个仅包含异常类型和消息的纯 JavaScript\
  \ 警告框（参见图 9-3）。\n\n![](img/454457_2_En_9_Fig3_HTML.jpg)\n\n**图 9-3** 在 Mojarra 的\
  \ Development 阶段，Ajax 请求抛出异常时显示的 JavaScript 警告框\n\n这并不十分有用。而在 `Production` 阶段，最终用户甚至不会收到任何反馈。Web\
  \ 应用会静默失败，让最终用户感觉好像什么都没发生，这只会令人困惑，并且对用户体验不利。更合理的做法是，将 Jakarta Faces Ajax 请求期间的异常处理方式与同步请求期间的异常处理方式保持一致，即复用与\
  \ `web.xml` 中声明的 `<error-page>` 完全相同的错误页面。换句话说，最终用户应该能够完整地看到错误页面。这可以通过创建一个自定义的 `ExceptionHandler`\
  \ 实现来实现，该实现基本上指示 Jakarta Faces 基于错误页面创建一个新的 `UIViewRoot`，然后构建并渲染它。只是代码量相当大。最简单的形式如下所示：\n\
  \n```\npublic class AjaxExceptionHandler extends ExceptionHandlerWrapper {\npublic\
  \ AjaxExceptionHandler(ExceptionHandler wrapped) {\nsuper(wrapped);\n}\n@Override\n\
  public void handle() {\nhandleAjaxException(FacesContext.getCurrentInstance());\n\
  getWrapped().handle();\n}\nprotected void handleAjaxException(FacesContext context)\
  \ {\nIterator unhandledExceptionQueuedEvents =\ngetUnhandledExceptionQueuedEvents().iterator();\n\
  if (context == null\n|| context.getExternalContext().isResponseCommitted()\n|| !context.getPartialViewContext().isAjaxRequest()\n\
  || !unhandledExceptionQueuedEvents.hasNext()\n) {\nreturn;\n}\nThrowable exception\
  \ = unhandledExceptionQueuedEvents\n.next().getContext().getException();\nwhile\
  \ (exception.getCause() != null\n&& (exception instanceof FacesException\n|| exception\
  \ instanceof ELException)\n) {\nexception = exception.getCause();\n}\nExternalContext\
  \ external = context.getExternalContext();\nString uri = external.getRequestContextPath()\n\
  + external.getRequestServletPath();\nMap requestScope = external.getRequestMap();\n\
  requestScope.put(RequestDispatcher.ERROR_REQUEST_URI, uri);\nrequestScope.put(RequestDispatcher.ERROR_EXCEPTION,\
  \ exception);\nString viewId = \"/WEB-INF/errorpages/500.xhtml\";\nApplication application\
  \ = context.getApplication();\nViewHandler viewHandler = application.getViewHandler();\n\
  UIViewRoot viewRoot = viewHandler.createView(context, viewId);\ncontext.setViewRoot(viewRoot);\n\
  try {\nexternal.responseReset();\nViewDeclarationLanguage viewDeclarationLanguage\
  \ =\nviewHandler.getViewDeclarationLanguage(context, viewId);\nviewDeclarationLanguage.buildView(context,\
  \ viewRoot);\ncontext.getPartialViewContext().setRenderAll(true);\nviewDeclarationLanguage.renderView(context,\
  \ viewRoot);\ncontext.responseComplete();\n}\ncatch (IOException e) {\nthrow new\
  \ FacesException(e);\n}\nfinally {\nrequestScope.remove(RequestDispatcher.ERROR_EXCEPTION);\n\
  }\nunhandledExceptionQueuedEvents.remove();\nwhile (unhandledExceptionQueuedEvents.hasNext())\
  \ {\nunhandledExceptionQueuedEvents.next();\nunhandledExceptionQueuedEvents.remove();\n\
  }\n}\npublic static class Factory extends ExceptionHandlerFactory {\npublic Factory(ExceptionHandlerFactory\
  \ wrapped) {\nsuper(wrapped);\n}\n@Override\npublic ExceptionHandler getExceptionHandler()\
  \ {\nreturn new AjaxExceptionHandler\n(getWrapped().getExceptionHandler());\n}\n\
  }\n}\n```\n\n`handleAjaxException()` 方法首先会检查是否存在 faces 上下文、响应是否尚未提交、请求是否为 Ajax 请求，以及队列中是否有任何未处理的异常事件。如果这些条件都不满足，它将返回并让\
  \ Jakarta Faces 像往常一样继续处理。\n\n当响应或其一部分已经物理地发送到客户端时，HTTP 响应被视为已提交。这是一个无法回头的点。你无法收回已经发送的字节。当异常在渲染响应阶段中途发生时，可能会发生这种情况。HTTP\
  \ 响应的前半部分可能已经发送给了客户端。此外，Jakarta Faces 和服务器的默认异常处理器也无法处理这种情况。实际上，客户端会得到一个半生不熟的 HTML\
  \ 页面。为避免这种情况，你能做的最好的事情是确保不在支持 bean 的 getter 方法中执行业务逻辑（这本身总是一个坏主意），并确保支持 bean 尽快被初始化。这可以通过在\
  \ `<f:viewAction>` 中执行对异常敏感的业务逻辑来实现，而不是在 `@PostConstruct` 中。另一种选择是增加 HTTP 响应缓冲区大小，以匹配对异常最敏感的页面所生成的\
  \ HTML 响应的大小。假设它是 100KB，可以使用以下 `web.xml` 上下文参数。\n\n```\njakarta.faces.FACELETS_BUFFER_SIZE\n\
  \n```\n\n`handleAjaxException()` 中的下一步是从未处理异常事件队列中提取感兴趣的根原因。在 Jakarta Faces 生命周期处理期间发生的任何异常都将被包装在\
  \ `jakarta.faces.FacesException` 中。在评估 EL 表达式期间发生的任何异常都将被包装在 `jakarta.el.ELException`\
  \ 中。这些不是我们感兴趣的，因此，我们需要解开它们以找到底层的根原因。\n\n接下来，将设置 `#{requestScope['jakarta.servlet.error.request_uri']}`\
  \ 和 `#{requestScope['jakarta.servlet.error.exception']}` 变量，以便错误页面可以访问它们。同时，代表错误页面的\
  \ `UIViewRoot` 实例将在 `ViewHandler` 的帮助下创建，并设置在 faces 上下文中。如有必要，你可以根据异常的实际根原因有条件地准备错误页面的视图\
  \ ID。例如：\n\n```\nString viewId;\nif (exception instanceof ViewExpiredException)\
  \ {\nviewId = \"/WEB-INF/errorpages/expired.xhtml\";\n}\nelse {\nviewId = \"/WEB-INF/errorpages/500.xhtml\"\
  ;\n}\n```\n\n回到 `handleAjaxException()`，在 `try` 块中，HTTP 响应缓冲区将被清除，`UIViewRoot` 将被填充组件，Ajax\
  \ 上下文将被指示渲染整个视图，`UIViewRoot` 将被渲染，faces 上下文将被指示响应已手动处理完毕，因此它不会执行任何导航，最后，异常将从请求作用域中移除。在\
  \ `finally` 块中将异常从请求作用域中移除并非强制要求，但存在一些 Servlet 容器（如 Tomcat）会将其视为触发向响应追加内部错误页面的信号。我们希望避免这种行为，以保持自定义错误页面的整洁。\n\
  最后，未处理异常事件的队列将被清空。\n这也不是强制性的，但这样做是有目的的，以便与 `web.xml` 配置的错误页面的默认行为相匹配，并防止链中的任何下一个\
  \ `ExceptionHandler` 处理任何剩余的异常事件。\n\n\n\n为了使其运行，你实际上还需要创建一个工厂。与 Jakarta Faces 中许多其他应用程序范围的定制一样，自定义异常处理器只能通过工厂注册。这看起来可能有些冗长，但这正是设计的一部分。在这种特定情况下，它允许你根据某些全局配置设置返回不同的异常处理器实现。你可以在前面展示的\
  \ `AjaxExceptionHandler` 类的底部找到一个嵌套的 `Factory` 类。它继承自 `jakarta.faces.context.ExceptionHandlerFactory`^(⁸²)，并且可以按如下方式在\
  \ `faces-config.xml` 中注册：\n\n```\n\ncom.example.project.exceptionhandler.AjaxExceptionHandler$Factory\n\
  \n```\n\n顺便提一下，必须说明的是，这种异常处理器也适用于非 Ajax 请求。你只需移除 `PartialViewContext#isAjaxRequest()`\
  \ 检查。你只需要记住，根据是否为 Ajax 请求，手动将 HTTP 响应状态码设置为 `500`。在 `ExternalContext#responseReset()`\
  \ 这行代码之后执行此操作。\n\n```\nif (!context.getPartialViewContext().isAjaxRequest()) {\n\
  external.setResponseStatus\n(HttpServletResponse.SC_INTERNAL_SERVER_ERROR);\n}\n\
  ```\n\n如果你在 Ajax 请求上执行此操作，那么 Jakarta Faces Ajax 脚本将不会按预期处理 Ajax 响应。它不会显示错误页面，而是会触发\
  \ `onerror` 处理器。\n\nViewExpiredException 处理\n如果你之前使用过 Jakarta Faces，那么你很可能见过或听说过\
  \ `ViewExpiredException`。当与回发关联的 Jakarta Faces 视图状态在 HTTP 会话中再也找不到时，就会抛出此异常。换句话说，当\
  \ `jakarta.faces.STATE_SAVING_METHOD` 上下文参数设置为其默认值“`server`”，并且最终用户提交了一个 Jakarta\
  \ Faces 表单，但其视图状态在服务器端已无法找到时。请注意，当上下文参数设置为“`client`”时，你仍然需要一个“`faces/ClientSideSecretKey`”环境条目，以避免在服务器重启时出现视图过期。所有这些都在第\
  \ 3 章的“视图状态”部分进行了详细阐述。此外，在第 8 章的“`@ViewScoped`”部分，你可以找到如何配置 Jakarta Faces 将在 HTTP\
  \ 会话中保存的视图和托管 Bean 的数量。\n\n有几种情况可能会意外发生 `ViewExpiredException`。所有这些情况都与页面导航和浏览器缓存有关，同时最终用户最近已从\
  \ Web 应用程序注销。通常，作为安全措施，HTTP 会话会在注销时失效，并且最终用户会被重定向到某个登录页面。当之前访问过的网页是可缓存的，并且最终用户在注销后按下浏览器的后退按钮时，那么最终用户可能会成功地从浏览器缓存中看到之前访问过的网页。如果该页面包含任何\
  \ Jakarta Faces 表单，那么其 `jakarta.faces.ViewState` 隐藏输入字段实际上将引用一个在当前会话中已不存在的视图状态。当最终用户提交此类表单时，Jakarta\
  \ Faces 将不可避免地抛出 `ViewExpiredException`。\n\n尽管这是一项出色的安全措施，但最终用户可能会感到困惑，因为之前访问过的网页实际上在最终用户的体验中已成功加载。这种困惑对用户体验不利。因此，你最好确保有状态的\
  \ Jakarta Faces 页面不可缓存，这样当最终用户按下后退按钮时，Web 浏览器将被迫实际访问 Web 服务器，从而加载一个全新的页面，其视图状态在当前\
  \ HTTP 会话中实际上是有效的。这可以通过一个 servlet 过滤器来实现，该过滤器设置特定的响应头，以指示客户端不要缓存 HTTP 响应。以下是此类 servlet\
  \ 过滤器的一个示例：\n\n```\n@WebFilter(servletNames=\"facesServlet\")\npublic class NoCacheFilter\
  \ implements Filter {\n@Override\npublic void doFilter\n(ServletRequest req, ServletResponse\
  \ res, FilterChain chain)\nthrows IOException, ServletException\n{\nHttpServletRequest\
  \ request = (HttpServletRequest) req;\nHttpServletResponse response = (HttpServletResponse)\
  \ res;\nString resourcePath = request.getContextPath()\n+ ResourceHandler.RESOURCE_IDENTIFIER;\n\
  if (!request.getRequestURI().startsWith(resourcePath)) {\nresponse.setHeader\n(\"\
  Cache-Control\", \"no-store, must-revalidate\");\n}\nchain.doFilter(request, response);\n\
  }\n}\n```\n\n基本上，它挂接到所有将访问 `FacesServlet` 的请求上，前提是它在 `web.xml` 中配置了 servlet 名称为“`facesServlet`”，如下所示：\n\
  \n```\nfacesServlet\njakarta.faces.webapp.FacesServlet\n\n```\n\n或者，如果你已将 Web 应用程序划分为仅包含无状态\
  \ Jakarta Faces 页面的公共区域和仅包含有状态 Jakarta Faces 页面的受限区域，那么你也可以将此过滤器映射到仅匹配有状态部分的更具体的\
  \ URL 模式，例如 `/admin/*`。\n\n```\n@WebFilter(\"/admin/*\")\n```\n\n此过滤器在设置缓存控制头之前，首先检查\
  \ HTTP 请求是否不代表 Jakarta Faces 资源请求。这些请求通过上下文路径之后的 `/jakarta.faces.resource` 路径来标识，该路径可通过\
  \ `ResourceHandler#RESOURCE_IDENTIFIER` 常量获得。当你使用 Jakarta Faces 资源组件（例如 `<h:graphicImage>`、`<h:outputScript>`\
  \ 或 `<h:outputstyleSheet>`）时，会自动使用此路径。另请参阅第 6 章的“资源组件”部分。你不想禁用它们上的浏览器缓存，因为那样会影响页面加载性能。\n\
  \n所设置的 `Cache-Control` 头实际上仅被支持 HTTP 1.1 的客户端识别。HTTP 1.1 于 1997 年引入。如果你还想覆盖 HTTP\
  \ 1.0 客户端（如今通常只是古老的代理服务器或无法获得比 Internet Explorer 6.0 更好的浏览器的可怜用户），那么你最好在 `Cache-Control`\
  \ 之外再添加两个响应头。\n\n```\nresponse.setHeader(\"Pragma\", \"no-cache\"); // HTTP 1.0.\n\
  response.setDateHeader(\"Expires\", 0); // Proxies.\n```\n\n现在，有了这个过滤器，最终用户将无法再从浏览器缓存中看到任何\
  \ Jakarta Faces 页面，因此也就无法再遇到 `ViewExpiredException`。然而，仍然存在一些情况，`ViewExpiredException`\
  \ 是不可避免的。一种情况是，最终用户在不同的浏览器标签页中打开了多个 Jakarta Faces 页面，并在其中一个标签页中注销，然后在另一个标签页中执行操作，而事先没有刷新页面。对于这种情况，你确实需要一个“抱歉，您的会话已过期”的错误页面。这可以很容易地在\
  \ `web.xml` 中配置为另一个错误页面，如下所示：\n\n```\n\njakarta.faces.application.ViewExpiredException\n\
  \n/WEB-INF/errorpages/expired.xhtml\n\n```\n\n不要让 `<location>` 指向一个公共页面，例如登录页面。错误页面必须保留在\
  \ `/WEB-INF` 文件夹中，以避免被直接访问、添加书签甚至被爬取。如果你确实需要最终用户最终进入一个现有的公共页面，那么最好在错误页面中使用一个元刷新头，该头进而将最终用户重定向到所需的公共页面。这样，你可以确保浏览器地址栏中的\
  \ URL 被更新为正确的 URL，而不是发生错误的上一页面的 URL。\n\n```\n\n会话已过期\n\n抱歉，您的会话已过期\n您将被重定向到登录页面\n\
  \n如果重定向未生效，或者您等不及了，请点击此处。\n\n```\n\n请注意，元刷新内容中的“`0`”表示重定向前等待的秒数。因此，“`0`”意味着“立即重定向”。你可以使用，例如，“`3`”来让浏览器在重定向前等待\
  \ 3 秒。\n\n\n\n请务必记得，在任何自定义异常处理器（例如上一节演示的 `AjaxExceptionHandler`）中，也要配置这个确切的错误页面\
  \ `<location>`。你还需要确保你的“通用”错误页面映射的是 `500` 错误代码，而不是像 `java.lang.Exception` 或 `java.lang.Throwable`\
  \ 这样的异常类型。本章的第一节已经对此进行了演示。\n\n```\n/WEB-INF/errorpages/500.xhtml\n```\n\n否则，所有被包装在\
  \ `ServletException` 中的异常最终仍会进入通用错误页面。当异常在同步（非 Ajax）回发期间（而非异步（Ajax）回发期间）被抛出时，Jakarta\
  \ Faces 会将任何异常包装在 `ServletException` 中。`web.xml` 错误页面机制仅在未找到按异常类型匹配的错误页面时，才会从 `ServletException`\
  \ 中提取根本原因，以便按异常类型进行第二次错误页面匹配。\n\n避免 `ViewExpiredException` 的一个完全不同的替代方案是使用无状态的 Jakarta\
  \ Faces 视图。这样，Jakarta Faces 视图状态将不会被保存，Jakarta Faces 视图也永远不会过期，而只是会在每次请求时从头开始重建。你可以通过将\
  \ `<f:view>` 的 `transient` 属性设置为 `true` 来启用无状态视图。这在第 4 章的“无状态表单”一节中有详细阐述。\n\nIOException\
  \ 处理\n\n底层 `HttpServletRequest` 和 `HttpServletResponse` 对象的某些方法可能会抛出 `IOException`。通常，这仅发生在网络连接意外中断时：例如，最终用户通过按下\
  \ Web 浏览器中的 Esc 按钮突然停止 HTTP 请求，或者最终用户在当前页面仍在加载时突然导航到另一个网页，甚至当最终用户的计算机着火或网线被老鼠咬断时。这些情况确实是无法避免的。对于作为\
  \ Web 应用程序开发人员的你来说，最好让任何 `IOException` 一直向上冒泡到 Servlet 容器。换句话说，绝对没有必要像下面这样捕获它：\n\
  \n```\npublic void someAjaxListener() {\ntry {\nFacesContext.getCurrentInstance()\n\
  .getExternalContext().redirect(url);\n}\ncatch (IOException e) {\nthrow new UncheckedIOException(e);\n\
  }\n}\n```\n\n相反，直接让它抛出即可。\n\n```\npublic void someAjaxListener() throws IOException\
  \ {\nFacesContext.getCurrentInstance()\n.getExternalContext().redirect(url);\n}\n\
  ```\n\nEJBException 处理\n\n有时，调用服务方法也可能导致异常。通常，这些异常是有意为之的，例如“实体未找到”、“违反唯一约束”、“用户凭据无效”以及“实体已被其他用户修改”。默认情况下，任何从\
  \ Jakarta Enterprise Beans 服务方法抛出的非特定于应用程序的 `RuntimeException`（例如 `NullPointerException`，甚至\
  \ Jakarta Persistence 的 `PersistenceException`）都会被包装在 `EJBException` 中。这使得在 Jakarta\
  \ Faces 操作方法中确定实际的根本原因变得笨拙。\n\n```\npublic void addProduct() {\nFacesMessage message;\n\
  try {\nLong id = productService.create(product);\nmessage = new FacesMessage(FacesMessage.SEVERITY_INFO,\n\
  \"产品保存成功\", \"ID 是 \" + id);\n}\ncatch (EJBException e) {\nif (e.getCause() instanceof\
  \ ConstraintViolationException) {\nmessage = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\
  \"重复的产品！\", e.getMessage());\ncontext.validationFailed();\n}\nelse {\nthrow e;\n\
  }\n}\ncontext.addMessage(null, message);\n}\n```\n\n这不是最佳实践。你不仅需要通过检查 `Exception#getCause()`\
  \ 来确定 `EJBException` 的根本原因，而且 `web.xml` 错误页面机制也无法为例如 `ConstraintViolationException`\
  \ 显示特定的错误页面，因为它被包装在 `EJBException` 中。为了让服务方法抛出未包装的异常，你需要首先创建一个自定义异常超类，然后使用 `@jakarta.ejb.ApplicationException`\
  \ 对其进行注解。^(⁸³)\n\n```\n@ApplicationException(rollback=true)\npublic abstract class\
  \ BusinessException extends RuntimeException {\npublic BusinessException() {\nsuper();\n\
  }\npublic BusinessException(Exception cause) {\nsuper(cause);\n}\n}\n```\n\n请注意注解上的\
  \ `rollback=true` 属性。如果你希望 Jakarta Enterprise Beans 容器在抛出此异常时回滚任何活动事务，这一点非常重要。以下是此自定义业务异常的一些子类示例：\n\
  \n```\npublic abstract class QueryException extends BusinessException {}\npublic\
  \ class EntityNotFoundException extends QueryException {}\npublic class DuplicateEntityException\
  \ extends QueryException {}\npublic abstract class CredentialsException extends\
  \ BusinessException {}\npublic class InvalidUsernameException extends CredentialsException\
  \ {}\npublic class InvalidPasswordException extends CredentialsException {}\n```\n\
  \n请注意，你不一定需要在所有子类上重复 `@ApplicationException`，因为它已经是 `@Inherited` 的。以下是一些可能抛出这些异常的具体用例：\n\
  \n```\npublic User getById(Long id) {\ntry {\nreturn entityManager\n.createQuery(\"\
  FROM User u WHERE u.id = :id\", User.class)\n.setParameter(\"id\", id)\n.getSingleResult();\n\
  }\ncatch (NoResultException e) {\nthrow new EntityNotFoundException(e);\n}\n}\n\
  public Optional findByEmail(String email) {\ntry {\nreturn Optional.of(entityManager\n\
  .createQuery(\"FROM User u\"\n+ \" WHERE u.email = :email\", User.class)\n.setParameter(\"\
  email\", email)\n.getSingleResult());\n}\ncatch (NoResultException e) {\nreturn\
  \ Optional.empty();\n}\n}\npublic User getByEmailAndPassword(String email, String\
  \ password) {\nUser user = findByEmail(email)\n.orElseThrow(InvalidUsernameException::new);\n\
  Credentials credentials = user.getCredentials();\nbyte[] passwordHash = digest(password,\
  \ credentials.getSalt());\nif (!Arrays.equals(passwordHash, credentials.getPasswordHash()))\
  \ {\nthrow new InvalidPasswordException();\n}\nreturn user;\n}\npublic Long create(User\
  \ user) {\nif (findByEmail(user.getEmail()).isPresent()) {\nthrow new DuplicateEntityException();\n\
  }\nentityManager.persist(user);\nreturn user.getId();\n}\n```\n\n在后台 Bean 操作方法中，你可以相应地处理它们。\n\
  \n```\npublic void signup() {\nFacesMessage message;\ntry {\nuserService.create(user);\n\
  message = new FacesMessage(\"您已成功注册！\");\n}\ncatch (DuplicateEntityException e)\
  \ {\nmessage = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\"抱歉，用户名已被占用！\", e.getMessage());\n\
  context.validationFailed();\n}\ncontext.addMessage(null, message);\n}\n```\n\n为了进一步减少样板代码，你甚至可以放过所有业务异常，并让自定义异常处理器来处理它们。\n\
  \n\n\n```\npublic class BusinessExceptionHandler extends ExceptionHandlerWrapper\
  \ {\npublic BusinessExceptionHandler(ExceptionHandler wrapped) {\nsuper(wrapped);\n\
  }\n@Override\npublic void handle() {\nhandleBusinessException(FacesContext.getCurrentInstance());\n\
  getWrapped().handle();\n}\nprotected void handleBusinessException(FacesContext context)\
  \ {\nIterator unhandledExceptionQueuedEvents =\ngetUnhandledExceptionQueuedEvents().iterator();\n\
  if (context == null\n|| !unhandledExceptionQueuedEvents.hasNext()\n) {\nreturn;\n\
  }\nThrowable exception = unhandledExceptionQueuedEvents\n.next().getContext().getException();\n\
  while (exception.getCause() != null\n&& (exception instanceof FacesException\n||\
  \ exception instanceof ELException)\n) {\nexception = exception.getCause();\n}\n\
  if (!(exception instanceof BusinessException)) {\nreturn;\n}\ncontext.addMessage(null,\
  \ new FacesMessage(\nFacesMessage.SEVERITY_FATAL,\nexception.toString(),\nexception.getMessage()));\n\
  context.validationFailed();\ncontext.getPartialViewContext()\n.getRenderIds().add(\"\
  globalMessages\");\nunhandledExceptionQueuedEvents.remove();\nwhile (unhandledExceptionQueuedEvents.hasNext())\
  \ {\nunhandledExceptionQueuedEvents.next();\nunhandledExceptionQueuedEvents.remove();\n\
  }\n}\npublic static class Factory extends ExceptionHandlerFactory {\npublic Factory(ExceptionHandlerFactory\
  \ wrapped) {\nsuper(wrapped);\n}\n@Override\npublic ExceptionHandler getExceptionHandler()\
  \ {\nreturn new BusinessExceptionHandler\n(getWrapped().getExceptionHandler());\n\
  }\n}\n}\n```\n\n是的，它确实与前面“Ajax 异常处理器”一节中展示的 `AjaxExceptionHandler` 类似。然而，第一个区别在于，当响应已提交或不是\
  \ Ajax 请求时，它不会跳过异常处理。第二个区别在于提取异常根本原因与排空剩余未处理异常事件之间的逻辑。这个 `BusinessExceptionHandler`\
  \ 将改为检查根本原因是否为 `BusinessException` 的实例，如果是，它将添加一个 faces 消息，并指示 Jakarta Faces 显式地\
  \ Ajax 更新由“`globalMessages`”标识的组件，该组件应指向主模板中的全局消息组件，类似于以下内容：\n\n```\n\n```\n\n最终，所有与业务异常相关的\
  \ faces 消息都将汇集于此。您可能已经注意到，通过调用 `FacesContext#validationFailed()`，faces 上下文被显式标记为“验证失败”。这通常对于\
  \ Facelet 模板中依赖于此状态的任何代码都很有用。如果您希望将其与 `AjaxExceptionHandler` 一起用于非业务异常，则需要在 `faces-config.xml`\
  \ 中将其注册在 `AjaxExceptionHandler` *之后*。在 `faces-config.xml` 中后声明的任何内容都将有效地包装先前声明的处理器。这也适用于自定义异常处理器工厂。当\
  \ `BusinessExceptionHandler` 确认异常不是 `BusinessException` 的实例时，它将把未处理的异常留在队列中，从该方法返回，并最终委托给被包装的\
  \ `ExceptionHandler`（即 `AjaxExceptionHandler`）的 `handle()` 方法。\n\n```\n\ncom.example.project.AjaxExceptionHandler$Factory\n\
  \ncom.example.project.BusinessExceptionHandler$Factory\n\n```\n\n有了 `BusinessExceptionHandler`，您可以进一步简化支持\
  \ bean 的动作方法，如下所示：\n\n```\npublic void signup() {\nuserService.create(user);\ncontext.addMessage(null,\n\
  new FacesMessage(\"You are successfully signed up!\");\n}\n```\n\n脚注\n\n10. WebSocket\
  \ 推送\n\nWebSocket 支持由 `<f:websocket>` 标签、`PushContext` 接口和 `@Push` 注解表示，这些是在 Jakarta\
  \ Faces 2.3 中引入的。它构建在 Jakarta EE 7 中引入的 JSR-356 WebSocket 规范之上。自 7.0.27 版本起，Tomcat\
  \ 原生支持 JSR-356，自 9.1.0 版本起，Jetty 也原生支持。在 Mojarra 中，`<f:websocket>` 有一个额外的 Jakarta\
  \ EE 依赖：JSON-P (JSR-353)。如果您的目标是 Tomcat 或 Jetty 而非 Jakarta EE 应用服务器，则可能需要单独安装它。JSON-P\
  \ 在内部用于将 Java 对象转换为 JSON 字符串，以便可以轻松地传输到客户端，并作为附加到 `<f:websocket>` 的 JavaScript 监听器函数的参数提供。\n\
  \n配置\n\nJSR-356 WebSocket 规范并未正式支持在运行时以编程方式初始化套接字端点。因此，我们不能仅仅通过在视图中声明 `<f:websocket>`\
  \ 并等待引用它的 Jakarta Faces 页面首次打开来初始化它。我们确实需要在部署期间显式地初始化它。Jakarta Faces 默认可以做到这一点，但如果\
  \ Web 应用程序永远不会使用未使用的 WebSocket 端点，那么让它永远保持打开状态在资源效率上并不高。因此，我们无法避免使用上下文参数来指示 Jakarta\
  \ Faces 在部署期间显式地初始化它。\n\n```\njakarta.faces.ENABLE_WEBSOCKET_ENDPOINT\ntrue\n\n\
  ```\n\n如果您更喜欢编程式初始化而非声明式初始化，则始终可以在 Web 片段库的 `ServletContainerInitializer` 中使用 `ServletContext#setInitParameter()`，如下所示：\n\
  \n```\npublic class YourInitializer implements ServletContainerInitializer {\n@Override\n\
  public void onStartup(Set> types, ServletContext context) {\ncontext.setInitParameter(\n\
  PushContext.ENABLE_WEBSOCKET_ENDPOINT_PARAM_NAME, \"true\");\n}\n}\n```\n\n请注意，无法在\
  \ `ServletContextListener` 中执行此任务，因为 Jakarta Faces 实际上会在其自己的 `ServletContainerInitializer`\
  \ 实现中检查上下文参数，而该实现总是在任何 `ServletContextListener` 之前运行。一旦 WebSocket 端点启用并在部署期间成功初始化，它将在\
  \ URL 模式 `/jakarta.faces.push/*` 上监听 WebSocket 握手请求。第一个路径元素将代表 WebSocket 通道名称。回到“官方”说法，某些\
  \ WebSocket 实现确实支持编程式初始化，例如 Undertow 提供的实现，而 Undertow 又被 WildFly 使用。不幸的是，规范并未如此规定，并且可能存在根本不支持编程式初始化的\
  \ WebSocket 实现，例如 Payara 中使用的 Tyrus。^(⁸⁴)\n\n默认情况下，WebSocket 容器会在应用服务器监听 HTTP 请求的同一端口上监听握手请求。您可以选择使用另一个\
  \ `web.xml` 上下文参数更改端口：\n\n```\njakarta.faces.WEBSOCKET_ENDPOINT_PORT\n\n```\n\n\
  或者在 `ServletContainerInitializer` 中以编程方式更改：\n\n```\ncontext.setInitParameter(\n\
  PushContext.WEBSOCKET_ENDPOINT_PORT_PARAM_NAME, \"8000\");\n```\n\n用法\n\n在您的 Jakarta\
  \ Faces 页面中，只需声明 `<f:websocket>` 标签，并附上必需的 `channel` 属性（代表通道名称）和可选的 `onmessage`\
  \ 属性（代表对 JavaScript 函数的引用）。\n\n```\n\nfunction logMessage(message, channel, event)\
  \ {\nconsole.log(message);\n}\n\n```\n\nJavaScript 函数将被调用，并传入三个参数：\n\n1.  `message`：作为\
  \ JSON 对象的推送消息。\n2.  `channel`：WebSocket 通道名称。如果您打算使用全局监听器或希望手动控制 WebSocket 的关闭，这可能会很有用。\n\
  \n\n\n3.  `event`：原始的 `MessageEvent` 对象。如果你打算在 JavaScript 函数中检查它，这可能会很有用。\n\n在 WAR\
  \ 端，你可以通过 `@Push` 注解在任何支持 CDI 注入的 Web 工件中注入 `PushContext`。这可以是一个简单的 CDI 托管 Bean，也可以是\
  \ `@WebServlet`、`@WebFilter` 或 `@WebListener`。\n\n```\nimport jakarta.inject.Named;\n\
  import jakarta.enterprise.context.RequestScoped;\nimport jakarta.inject.Inject;\n\
  import jakarta.faces.push.Push;\nimport jakarta.faces.push.PushContext;\n@Named\
  \ @RequestScoped\npublic class Bean {\n@Inject @Push\nprivate PushContext test;\n\
  public void submit() {\ntest.send(\"Hello World!\");\n}\n}\n```\n\n`PushContext`\
  \ 变量名 *test* 必须与 Jakarta Faces 页面中声明的通道名称匹配。如果无法将变量名与通道名称匹配，则始终可以在 `@Push` 注解的可选\
  \ `channel` 属性中指定通道名称。\n\n```\n@Inject @Push(channel=\"test\")\nprivate PushContext\
  \ foo;\n```\n\n一旦前面展示的 Bean 的 `submit()` 方法被某个 Jakarta Faces 命令组件（即使在不同的 Jakarta\
  \ Faces 页面中）调用，推送消息“Hello World!”就会被发送到**所有**在相同通道名称上打开的套接字，作用域为整个应用。\n\n**作用域与用户**\n\
  \n你可能已经意识到，`<f:websocket>` 默认是应用作用域的。你可以通过可选的 `scope` 属性来控制作用域。允许的值为 `application`、`session`\
  \ 和 `view`。\n\n当设置为 `session` 时，消息将仅发送给当前会话中相同通道上所有打开的套接字。\n\n```\n这对于来自用户自身发起的长时间运行的、会话作用域的后台任务的进度消息特别有用。这样，用户可以继续浏览网站，而无需等待结果出现在同一个页面上。\n\
  \n或者，你也可以将可选的 `user` 属性设置为一个可序列化的值，该值代表唯一的用户标识符，例如，可以是代表用户登录名的 `String` 或代表用户 ID\
  \ 的 `Long`。当设置此属性时，套接字的作用域将自动默认为 `session`，并且不能设置为 `application`。\n```\n\n这提供了向特定用户发送消息的机会，如下所示：\n\
  \n```\nprivate String message;\nprivate User recipient;\n@Inject @Push\nprivate\
  \ PushContext chat;\npublic void sendMessage() {\nLong recipientId = recipient.getId();\n\
  chat.send(message, recipientId);\n}\n```\n\n你甚至可以通过提供一个 `Set` 参数将其发送给多个用户。\n\n```\n\
  private String message;\nprivate Set recipients;\n@Inject @Push\nprivate PushContext\
  \ chat;\npublic void sendMessage() {\nSet recipientIds = recipients.stream()\n.map(User::getId)\n\
  .collect(Collectors.toSet());\nchat.send(message, recipientIds);\n}\n```\n\n换句话说，你可以通过这种方式轻松实现一个聊天框。顺便提一下，像\
  \ Stack Overflow 这样的网站上的实时用户定向通知就是这样工作的。\n\n当 `scope` 设置为 `view` 时，消息将仅发送给当前视图中指定通道上打开的套接字。这不会影响整个应用中所有其他视图上相同通道的任何套接字。\n\
  \n```\n\n这也支持与 `user` 属性结合使用。\n\n```\n这种针对特定用户的视图作用域套接字的结构虽然有些不寻常，但仅当由 `user` 属性代表的登录用户的生存期可能比\
  \ HTTP 会话短时才应使用。然而，这反过来被认为是一种糟糕的安全实践。最佳安全实践是，在登录和注销期间都使 HTTP 会话失效。在登录期间使 HTTP 会话失效可以防止会话固定攻击，而在注销期间使会话失效可以防止特定于用户的脏数据在\
  \ HTTP 会话中残留。\n```\n\n**通道设计提示**\n\n你可以在整个应用中声明多个不同作用域、带或不带用户目标的推送通道。但是，请注意，相同的通道名称可以轻松地在多个视图中重用，即使它是视图作用域的。如果你使用尽可能少的不同的通道名称，并将通道名称绑定到特定的推送套接字作用域/用户组合，而不是绑定到特定的\
  \ Jakarta Faces 视图，这样效率更高。如果你打算为不同目的使用多个视图作用域的通道，那么最好只使用一个视图作用域的通道，并拥有一个全局 JavaScript\
  \ 监听器，该监听器可以根据传递的消息来区分其任务，例如，在服务器端按如下方式发送消息：\n\n```\nMap message = new HashMap();\n\
  message.put(\"functionName\", \"someFunction\");\nmessage.put(\"functionData\",\
  \ functionData); // 可以是 Map 或 Bean。\nsomeChannel.send(message);\n```\n\n然后在 `onmessage`\
  \ JavaScript 监听器函数中按如下方式处理：\n\n```\nfunction someSocketListener(message) {\nwindowmessage.functionName;\n\
  }\nfunction someFunction(data) {\n// ...\n}\nfunction otherFunction(data) {\n//\
  \ ...\n}\n// ...\n```\n\n**一次性推送**\n\n你可以使用 `connected` 属性来防止套接字在页面加载时自动连接。\n\n\
  ```\n当你想在调用可能需要更长时间才能完成的视图作用域 Ajax 操作方法后，对结果执行一次性推送，并且希望用户能立即继续使用同一个页面，而不会因为“网站速度慢”的体验而感到烦恼时，这特别有用。这种方法只需要使用\
  \ `faces.push` JavaScript API（应用程序编程接口）进行一些额外的工作。它有三个函数，但只有两个是我们感兴趣的：`faces.push.open(...)`\
  \ 和 `faces.push.close(...)`。第三个函数 `faces.push.init(...)` 基本上是初始化套接字，你不应该关心调用它；那是\
  \ `<f:websocket>` 标签的渲染器的工作。\n\n为了在调用 Ajax 操作方法之前显式打开未打开的套接字，你需要调用 `faces.push.open(...)`\
  \ 函数，并将套接字客户端 ID 作为参数。为了在推送消息到达后立即显式关闭已打开的套接字，你需要调用 `faces.push.close(...)` 函数，并将套接字客户端\
  \ ID 作为参数。以下示例完整地演示了一次性推送方法：\n```\n\n```\nfunction startLongRunningProcess() {\n\
  faces.push.open(\"push\");\ndocument.getElementById(\"status\").innerHTML =\n\"\
  长时间运行的过程已开始 ...\";\n}\nfunction endLongRunningProcess(result) {\nfaces.push.close(\"\
  push\");\ndocument.getElementById(\"status\").innerHTML = result;\n}\n\n```\n\n\
  必须说明的是，像前面那样将 JavaScript 代码直接放在 HTML 源代码中是一种糟糕的做法。当然，这仅用于演示目的。为了更好的维护性、性能和工具支持，在实际代码中，你应该将\
  \ JavaScript 代码放在一个 JS 文件中，并通过 `<h:outputScript>` 包含它。这里我还没有提及为了演示目的而缺少 jQuery 魔法的问题。\n\
  \n在示例中，打开套接字是在命令按钮的 `onclick` 期间执行的。而 `onmessage` 监听器函数则关闭套接字。当然，你也可以让套接字始终保持打开状态，而无需摆弄\
  \ JavaScript，但如果套接字除了呈现视图作用域 Ajax 操作方法的结果之外没有其他用途，这可能会浪费资源。以下是关联的后台 Bean 可能的样子。\n\
  \n```\n@Named @RequestScoped\npublic class LongRunningProcess {\n@Inject\nprivate\
  \ LongRunningProcessService service;\n@Inject @Push\nprivate PushContext push;\n\
  public void submit() {\nservice.asyncSubmit(result -> push.send(result));\n}\n}\n\
  ```\n\n以下是服务类的样子。\n\n\n```markdown\n\n```\n@Stateless\npublic class LongRunningProcessService\
  \ {\n@Asynchronous\npublic void asyncSubmit(Consumer callback) {\nString result\
  \ = someLongRunningProcess();\ncallback.accept(result);\n}\n}\n```\n\n请注意 Jakarta\
  \ Enterprise Beans 的 `@Asynchronous`\n注解。这在当前结构中非常重要。它将确保企业 Bean 方法在单独的线程中执行。这使得支持\
  \ Bean 方法能够立即返回，而无需等待企业 Bean 方法完成。\n\n有状态 UI 更新\n\n正如你可能注意到的，`onmessage` JavaScript\
  \ 监听器函数通常仅适用于小型无状态任务，例如显示反馈消息或使用 JavaScript 向某个无状态列表添加新项。当你想要更新由另一个 Jakarta Faces\
  \ 组件表示的有状态 UI（用户界面）时，它的作用就不太大了。想象一下，用一个完整的 Jakarta Faces 表格替换一个简单的加载图片。\n\n为此，你最好嵌套一个监听特定推送消息的\
  \ `<f:ajax>`。通过其 `render` 属性，你有机会在收到推送消息时自动更新任意 Jakarta Faces 组件。以下是一个示例，它最初显示一个加载图片，然后在表格准备好加载时显示表格：\n\
  \n```\n\n#{result.id}\n#{result.name}\n#{result.value}\n\n```\n\n请注意，`<f:websocket>`\
  \ 放置在 `<h:form>` 中。当它嵌套了 `<f:ajax>` 时，这是强制性的。通常情况下，这不是必需的。以下是支持 Bean 可能的样子。\n\n\
  ```\n@Named @ViewScoped\npublic class LongRunningSearch implements Serializable\
  \ {\nprivate List results;\n@Inject\nprivate LongRunningSearchService service;\n\
  @Inject @Push\nprivate PushContext push;\n@PostConstruct\npublic void init() {\n\
  service.asyncLoadResults(results -> {\nthis.results = results;\npush.send(\"loaded\"\
  );\n});\n}\npublic List getResults() {\nreturn results;\n}\n}\n```\n\n请注意，推送消息 `\"\
  loaded\"` 与 `<f:ajax event>` 的值完全匹配。你可以使用任何你想要的值，并且可以根据需要嵌套任意数量的 `<f:ajax>` 标签。托管\
  \ Bean 必须是 `@ViewScoped` 的，这一点很重要，因为 Ajax 调用基本上是在同一视图内的不同请求中执行的。最后，服务类如下所示：\n\n\
  ```\n@Stateless\npublic class LongRunningSearchService {\n@Asynchronous\npublic\
  \ void asyncLoadResults(Consumer> callback) {\nList results = someLongRunningProcess();\n\
  callback.accept(results);\n}\n}\n```\n\n`someLongRunningProcess()` 方法代表你对某个长时间运行进程的实现（例如，调用第三方\
  \ Web 服务 API）。\n\n全站推送通知\n\n为此，你可以使用一个应用程序作用域的套接字。这种套接字对于由 Web 应用程序本身在特定事件（可能对所有应用程序用户都感兴趣）上触发的全站反馈消息特别有用。可以想象一下全站统计信息、实时列表、股票更新等。以下示例展示了一个实时前十名列表的情况：\n\
  \n```\n#{item.ranking}\n#{item.name}\n#{item.score}\n\n```\n\n以下是服务类的样子，借助了 CDI\
  \ 事件的一点帮助。\n\n```\n@Stateless\npublic class ItemService {\n@Inject\nprivate EntityManager\
  \ entityManager;\n@Inject\nprivate BeanManager beanManager;\npublic void update(Item\
  \ item) {\nList previousTop10 = getTop10();\nentityManager.merge(item);\nList currentTop10\
  \ = getTop10();\nif (!currentTop10.equals(previousTop10)) {\nbeanManager.fireEvent(new\
  \ Top10UpdatedEvent());\n}\n}\n@TransactionAttribute(NOT_SUPPORTED)\npulic List\
  \ getTop10() {\nreturn entityManager\n.createNamedQuery(\"Item.top10\", Item.class)\n\
  .getResultList();\n}\n}\n```\n\n请注意，在这个特定示例中，`Top10UpdatedEvent` 基本上只是一个空类，例如 `public\
  \ class Top10UpdatedEvent {}`。还要注意，我们没有在服务类中注入 `PushContext`。否则这会被认为是各层之间的紧耦合。所有\
  \ Jakarta Faces 相关的代码都属于前端，而不是后端。这样，后端服务类可以更好地在所有类型的前端框架（除了 Jakarta Faces 之外，例如\
  \ Jakarta RESTful Web 服务，甚至普通的 Jakarta Pages/Servlet）中重用。换句话说，你应该确保你的后端类不会直接或间接地使用任何前端特定的类，例如来自\
  \ `jakarta.faces.*`、`jakarta.ws.*` 和 `jakarta.servlet.*` 包的类。\n\n任何使用 `BeanManager#fireEvent()`\
  \ 方法触发的事件都可以使用 CDI `@Observes` 注解进行观察。这适用于所有层。换句话说，即使它在后端被触发，你也可以在前端观察到它。唯一的条件是托管\
  \ Bean 必须是 `@ApplicationScoped` 的。也就是说，此时不一定存在任何 HTTP 请求、HTTP 会话或 Jakarta Faces\
  \ 视图。\n\n```\n@Named @ApplicationScoped\npublic class Bean {\nprivate List top10;\n\
  @Inject\nprivate ItemService service;\n@Inject @Push\nprivate PushContext top10Observer;\n\
  @PostConstruct\npublic void load() {\ntop10 = service.getTop10();\n}\npublic void\
  \ onTop10Updated(@Observes Top10UpdatedEvent event) {\nload();\ntop10Observer.send(\"\
  updated\");\n}\npublic List getTop10() {\nreturn top10;\n}\n}\n```\n\n跟踪活动套接字\n\n\
  为了跟踪活动套接字，你可以在一个应用程序作用域的 Bean 中观察 `@WebsocketEvent.Opened` 和 `@WebsocketEvent.Closed`\
  \ 事件。以下示例假设你有 `<f:websocket channel=\"chat\" user=\"...\">`，并且你打算收集“活跃聊天用户”：\n\n\
  ```\n@ApplicationScoped\npublic class WebsocketEventObserver {\nprivate Map users;\n\
  @PostConstruct\npublic void init() {\nusers = new ConcurrentHashMap();\n}\npublic\
  \ void onopen(@Observes @Opened WebsocketEvent event) {\nif (\"chat\".equals(event.getChannel()))\
  \ {\ngetCounter(event.getUser()).incrementAndGet();\n}\n}\npublic void onclose(@Observes\
  \ @Closed WebsocketEvent event) {\nif (\"chat\".equals(event.getChannel())) {\n\
  getCounter(event.getUser()).decrementAndGet();\n}\n}\nprivate AtomicInteger getCounter(Serializable\
  \ user) {\nreturn users.computeIfAbsent(user, k -> new AtomicInteger());\n}\npublic\
  \ Set getActiveUsers() {\nreturn users.entrySet().stream()\n.filter(entry -> entry.getValue().intValue()\
  \ > 0)\n.map(entry -> entry.getKey())\n.collect(Collectors.toSet());\n}\n}\n```\n\
  \n你可以使用前面的 `getActiveUsers()` 方法来获取一组“活跃聊天用户”。请注意，单个用户可以在同一会话中多次打开同一个网页（例如，多个浏览器标签页），这正是使用计数器而不是简单地从\
  \ `Set` 中添加和删除用户的原因。\n\n客户端事件处理\n\n默认情况下，`<f:websocket>` 标签会保持连接永久打开，只要文档是打开的，只要没有设置\
  \ `connected=\"false\"`，并且只要没有调用 `faces.push.close(clientId)`。当第一次连接尝试失败时，它会立即关闭套接字。你可以选择使用\
  \ `onclose` 属性来引用一个充当关闭监听器的 JavaScript 函数。\n\n```\n\nfunction closeListener(code,\
  \ channel, event) {\nif (code == -1) {\n// 客户端不支持 WebSocket API。例如 IE9。\n}\nelse\
  \ if (code == 1000) {\n// 由于视图或会话过期导致的正常关闭。\n}\nelse if (code == 1008) {\n// 由于未知的通道\
  \ ID 导致的正常关闭。\n}\nelse {\n// 由于客户端或服务器错误导致的异常关闭。\n// 你可能想要显示一条消息和/或刷新页面。\n}\n}\n\
  \n```\n\n该 JavaScript 函数将被调用，并传入三个参数：\n\n```\n\n\n1.  `code`：关闭原因代码，以整数形式表示。如果值为\
  \ `-1`，则表示客户端不支持 WebSocket JavaScript API^(⁸⁵)。如果值为 `1000`，则表示由于服务器端的视图或会话过期而发生了正常关闭。如果值为\
  \ `1008`，则表示由于提供的通道 ID 未知而发生了正常关闭。这通常只会在客户端伪造通道 ID，或者服务器在客户端尚未刷新页面时，因新部署导致通道 ID\
  \ 变更而重启时发生。\n\n2.  `channel`：WebSocket 通道名称。如果你打算设置全局监听器，这个信息可能会很有用。\n\n3.  `event`：原始的\
  \ `CloseEvent` 对象。如果你打算在 JavaScript 函数中检查它，这个信息可能会很有用。\n\n正如你在上述 `onclose` 监听器函数示例中可能注意到的，你可以通过检查\
  \ `<f:websocket>` 的关闭代码是否等于 `1000`，来通过 JavaScript 执行一些客户端操作（例如，显示警告消息和/或重定向到某个“会话已过期”页面）。\n\
  \n```javascript\nfunction closeListener(code) {\n    if (code == 1000) {\n     \
  \   window.location = faces.contextPath + \"/expired.xhtml\";\n    }\n}\n```\n\n\
  这对于视图作用域和会话作用域的套接字都有效。然而，只要文档在客户端仍然处于打开状态，应用程序作用域的套接字就会永久保持打开，即使底层的视图或会话已经过期。\n\n\
  当首次连接尝试成功，但套接字后来因某种原因（例如，服务器正在重启）断开连接时，默认情况下会触发一个错误事件，并以递增的时间间隔持续尝试重新连接。在 Mojarra\
  \ 的情况下，它会最多重试 25 次，每次间隔增加 500 毫秒。如果所有重连尝试都失败，它最终会完全关闭套接字并调用 `onclose` 监听器。你可以选择使用\
  \ `onerror` 属性来引用一个监听这些错误事件的 JavaScript 函数。\n\n```javascript\nfunction errorListener(code,\
  \ channel, event) {\n    if (code == 1001) {\n        // 服务器可达，但返回了意外的响应代码。例如，服务器关闭时返回\
  \ 503。\n    }\n    else if (code == 1006) {\n        // 服务器不再可达，这可能发生在服务器完全宕机或客户端网络断开时。\n\
  \    }\n    else {\n        // 任何其他原因，通常不会是 -1、1000 或 1008，\n        // 因为此时会调用\
  \ onclose 代替。\n    }\n    // 无论如何，websocket 都会尝试重新连接。这个\n    // onerror 函数会被再次调用。一旦\
  \ websocket\n    // 放弃重新连接，最终会调用 onclose。\n}\n```\n\n深入解析 Mojarra 的 f:websocket\
  \ 实现\n\n`<f:websocket>` API 指定了以下类和方法：\n\n*   `jakarta.faces.push.Push`：一个用于 `@Inject`\
  \ 的 CDI 限定符。借助此限定符，可以指定套接字通道名称。\n\n*   `jakarta.faces.push.PushContext`：一个包含三个 `send()`\
  \ 方法的接口：`send(Object message)`、`send(Object message, S user)` 和 `send(Object message,\
  \ Collection<S> users)`。所有这些方法都将推送消息作为 `Object` 接收，并在 JavaScript 中将其转换为 JSON 字符串。所有这些方法都返回一个\
  \ `Set<Future<Void>>`。如果返回空集合，则表示没有与给定通道和用户关联的开放套接字。对于每个 `Future<Void>`，如果在调用 `Future#get()`\
  \ 方法时没有抛出 `ExecutionException`，则表示消息已成功投递。\n\n*   `jakarta.faces.component.UIWebsocket`：一个实现了\
  \ `ClientBehaviorHolder` 的组件，以支持嵌套的 `<f:ajax>`。历史上，原型套接字标签是从 `TagHandler` 而非 `UIComponent`\
  \ 扩展而来的。后来决定让该标签支持 `<f:ajax>`，因为这将使复杂且有状态的 UI 更新变得更加容易。然而，让 `TagHandler` 实现 `ClientBehaviorHolder`\
  \ 并受益于所有内置的 Ajax 魔法是不可能的，因此最终转换为了 `UIComponent`。\n\n*   `ViewHandler#getWebsocketURL()`\
  \ 方法：该方法接收一个通道名称，并借助 `ExternalContext#encodeWebsocketURL()` 返回形式为 `ws://host:port/context/jakarta.faces.push/channel`\
  \ 的绝对 WebSocket URL。\n\n*   `ExternalContext#encodeWebsocketURL()` 方法：该方法基本上接收一个形式为\
  \ `/context/jakarta.faces.push/channel` 的相对 WebSocket URI，并返回绝对 WebSocket URL。\n\
  \n实际的实现相当广泛。它直接基于 OmniFaces 的 `<o:socket>`^(⁸⁶)，并在此处和彼处进行了一些调整，例如在 JavaScript API\
  \ 函数中使用组件的客户端 ID 而不是通道名称。\n\n*   `com.sun.faces.renderkit.html_basic.WebsocketRenderer`：一个\
  \ Faces 渲染器类，在编码期间将套接字通道、作用域和用户注册到 `WebsocketChannelManager` 中，并从中检索 WebSocket URL。然后它会自动包含包含必要\
  \ `faces.push.*` 函数的 `faces.js` 脚本，并渲染 `faces.push.init(...)` 内联脚本函数调用，其中将 WebSocket\
  \ URL 作为参数之一。此函数应在 JavaScript 中创建一个 `new WebSocket(url)`。`WebsocketRenderer` 还会将\
  \ `WebsocketFacesListener` 订阅到当前视图。\n\n*   `com.sun.faces.push.WebsocketChannelManager`：一个会话作用域的\
  \ CDI 托管 Bean，用于跟踪所有迄今为止注册的 `<f:websocket>` 通道、作用域和用户，并确保每个套接字获得其唯一的通道标识符。它会将每个通道标识符注册到\
  \ `WebsocketSessionManager` 中，并将用户目标套接字的通道标识符注册到 `WebsocketUserManager` 中。\n\n*\
  \   `com.sun.faces.push.WebsocketFacesListener`：一个系统事件监听器，监听 `PreRenderViewEvent`，并根据\
  \ `connected` 属性是否表示一个在 Ajax 请求期间发生更改的动态 EL 表达式，在必要时渲染 `faces.push.open(...)` 或\
  \ `faces.push.close(...)` 内联脚本函数调用。\n\n*   `com.sun.faces.push.WebsocketEndpoint`：一个实现了\
  \ JSR-356 `jakarta.websocket.Endpoint` 的类，并监听 URI 模板 `/jakarta.faces.push/{channel}`。当在客户端\
  \ JavaScript 中创建并打开一个 `new WebSocket(url)` 时，会在服务器端 Java 中创建一个新的 `jakarta.websocket.Session`，并且\
  \ `WebsocketEndpoint` 会将该 `Session` 添加到 `WebsocketSessionManager`。相应地，当套接字关闭时，`WebsocketEndpoint`\
  \ 会将其从 `WebsocketSessionManager` 中移除。\n\n*   `com.sun.faces.push.WebsocketSessionManager`：一个应用程序作用域的\
  \ CDI 托管 Bean，用于收集所有迄今为止打开的套接字会话，并验证其唯一的 WebSocket URL 是否已由 `WebsocketChannelManager`\
  \ 注册。\n\n*   `com.sun.faces.push.WebsocketUserManager`：一个应用程序作用域的 CDI 托管 Bean，用于收集所有迄今为止打开的用户目标套接字的通道标识符。\n\
  \n*   `com.sun.faces.push.WebsocketPushContext`：`PushContext` 接口的具体实现。它将通过 `WebsocketSessionManager`\
  \ 发送推送消息，并在必要时通过 `WebsocketUserManager` 获取用户目标通道。\n\n\n\n*   `com.sun.faces.push.WebsocketPushContextProducer`：\n\
  \    一个 CDI 生产者，用于根据从 `@Push` 限定符、`WebsocketSessionManager` 和 `WebsocketUserManager`\
  \ 获取的通道名称来创建 `WebsocketPushContext` 实例。\n\n脚注\n\n11. 自定义组件\n\n在第 7 章中，您应该已经了解到，当您希望将主页面布局片段拆分为可重用的模板（例如页眉、菜单、主要内容区域和页脚）时，Facelets\
  \ 的 `<ui:composition>`、`<ui:include>` 和 `<ui:decorate>` 非常有用。并且，当您希望拥有一个可重用的组件组以最大限度地减少代码重复时，Facelet\
  \ 标签文件（例如 `<t:field>`）非常有用。此外，当您希望基于现有组件（以及必要时的 HTML 代码）创建一个具有单一职责的自定义组件时，复合组件（例如\
  \ `<t:inputLocalTime>`）非常有用。\n\n然而，在某些情况下，可能不存在完全符合您需求的单一组件，即使通过组合现有组件和/或 HTML 代码也无法实现。或者，组件确实存在，但其渲染器无法满足您的需求。此时，您就需要创建一个自定义组件或自定义渲染器。\n\
  \nJakarta Faces 从一开始就围绕 `UIComponent` API（应用程序编程接口）提供了高度的抽象。您可以通过创建一个全新的自定义 `UIComponent`，或扩展标准\
  \ HTML 组件集中的现有组件，或为现有组件插入一个自定义的 `Renderer` 来自定义组件。\n\n组件类型、组件族和渲染器类型\n\n每个 `UIComponent`\
  \ 实例都关联着“组件类型”、“组件族”和“渲染器类型”。组件类型基本上代表了与组件标签关联的唯一组件标识符。它可以通过 `@FacesComponent` 注解或\
  \ `faces-config.xml` 中的 `<component>` 条目注册到 Jakarta Faces。以下示例演示了在一个最小组件类上使用 `@FacesComponent`\
  \ 注解：\n\n```\n@FacesComponent(SomeComponent.COMPONENT_TYPE)\npublic class SomeComponent\
  \ extends UIComponentBase {\npublic static final String COMPONENT_TYPE = \"project.SomeComponent\"\
  ;\npublic static final String COMPONENT_FAMILY = \"project.SomeFamily\";\npublic\
  \ SomeComponent() {\nsetRendererType(SomeRenderer.RENDERER_TYPE);\n}\n@Override\n\
  public String getFamily() {\nreturn COMPONENT_FAMILY;\n}\n}\n```\n\n以下示例演示了在 `faces-config.xml`\
  \ 中使用 `<component>` 条目：\n\n```\n<component>\n<component-type>project.SomeComponent</component-type>\n\
  <component-class>com.example.project.component.SomeComponent</component-class>\n\
  </component>\n```\n\n请注意，当您通过*注解*和 XML 两种方式使用相同的标识符注册 Jakarta EE 工件时，XML 声明将始终优先于注解声明。这对于所有\
  \ Jakarta Faces 注解同样适用。\n\n组件类中的公共常量 `COMPONENT_TYPE` 和 `COMPONENT_FAMILY` 并非强制要求，但它们遵循与标准\
  \ Jakarta Faces 组件集相同的约定，因此在使用 Jakarta Faces 进行开发时能提供更高的一致性。具体来说，公共常量 `COMPONENT_TYPE`\
  \ 允许开发者像下面这样以编程方式创建组件，而无需硬编码组件类型。\n\n```\nUIComponent component = FacesContext.getCurrentInstance()\n\
  .getApplication().createComponent(SomeComponent.COMPONENT_TYPE);\n```\n\n请注意，以这种方式以编程方式创建\
  \ `UIComponent` 实例在一般的 Jakarta Faces Web 应用程序中并非标准做法。相反，您通常会在视图中定义组件，并将创建 `UIComponent`\
  \ 实例的工作留给 Jakarta Faces 或任何可插拔的组件库。\n\n对于 Facelets 视图技术，像 `<x:someComponent>` 这样的组件标签可以通过\
  \ `@FacesComponent(createTag=true)` 或 `*.taglib.xml` 文件中的 `<tag>` 条目（同时指定组件类型）注册到\
  \ Jakarta Faces，如下所示：\n\n```\n<tag>\n<tag-name>someComponent</tag-name>\n<component-type>project.SomeComponent</component-type>\n\
  </tag>\n```\n\n如前所述，标准 Jakarta Faces 组件集在组件标签背后的具体 `UIComponent` 类中也定义了 `COMPONENT_TYPE`\
  \ 常量。这些 `UIComponent` 类都位于 `jakarta.faces.component.html` 包中。`UIComponent` 类的名称可以通过在组件标签名称前加上“`Html`”前缀来推导得出。因此，例如，标准\
  \ Jakarta Faces 组件标签 `<h:outputText>` 实际上由 `HtmlOutputText` 组件类支持。Jakarta Faces\
  \ 可以通过 `@FacesComponent` 注解或 `faces-config.xml` 中的 `<component>` 条目来确定哪个组件类与组件类型关联，因此\
  \ Jakarta Faces 知道，对于 `<h:outputText>` 标签，它应该创建一个具体的 `HtmlOutputText` 实例。\n\n一旦\
  \ Jakarta Faces 获得了具体的 `UIComponent` 实例，它就可以通过分别调用 `UIComponent#getFamily()` 和 `UIComponent#getRendererType()`\
  \ 方法来获取组件族和渲染器类型。这些信息对于为给定的 `UIComponent` 实例创建一个具体的 `Renderer` 实例是必需的，如下面的代码片段所示：\n\
  \n```\nRenderer renderer = FacesContext.getCurrentInstance().getRenderKit()\n.getRenderer(component.getFamily(),\
  \ component.getRendererType());\n```\n\n组件族基本上是一个“硬编码”的常量，可以在多个组件类型之间共享。它之所以是“硬编码”的，是因为没有为其提供\
  \ setter 方法。这是为了能够获取具体的 `Renderer` 实例，因为渲染器不是按组件类型注册的，而是按组件族注册的。这允许可插拔渲染工具包的开发者只需按组件族注册一次渲染器类型，而无需为每个已知的标准组件类型和未知的自定义组件类型多次注册。通常，组件族和渲染器类型通过\
  \ `@FacesRenderer` 注解或 `faces-config.xml` 中的 `<renderer>` 条目注册到 Jakarta Faces 应用程序。以下示例演示了在一个最小渲染器类上使用注解：\n\
  \n```\n@FacesRenderer(\ncomponentFamily=SomeComponent.COMPONENT_FAMILY,\nrendererType=SomeRenderer.RENDERER_TYPE)\n\
  public class SomeRenderer extends Renderer {\npublic static final String RENDERER_TYPE\
  \ = \"project.SomeRenderer\";\n}\n```\n\n以下示例演示了在 `faces-config.xml` 中使用条目：\n\n\
  ```\n<renderer>\n<component-family>project.SomeFamily</component-family>\n<renderer-type>project.SomeRenderer</renderer-type>\n\
  <renderer-class>com.example.project.renderer.SomeRenderer</renderer-class>\n</renderer>\n\
  ```\n\n渲染器类型默认在具体组件类的构造函数中定义，如前面展示的 `SomeComponent` 类的代码片段所示。如果需要，组件子类开发者，甚至作为组件最终用户的您，都可以随时用所需的渲染器实例覆盖组件的默认渲染器实例。这可以通过多种方式实现，全部通过\
  \ XML。第一种方式是通过 `*.taglib.xml` 文件中与组件标签关联的 `<tag>` 条目。\n\n```\n<tag>\n<tag-name>someComponent</tag-name>\n\
  <component-type>project.SomeComponent</component-type>\n<renderer-type>custom.OtherRenderer</renderer-type>\n\
  </tag>\n```\n\n这会影响整个应用程序，并且仅针对特定的组件标签。第二种方式是通过在 `faces-config.xml` 中添加一个新的 `<renderer>`\
  \ 条目，该条目精确地针对所需的组件族及其默认渲染器类型。\n\n```\n<renderer>\n<component-family>project.SomeFamily</component-family>\n\
  <renderer-type>project.SomeRenderer</renderer-type>\n<renderer-class>com.example.custom.renderers.OtherRenderer</renderer-class>\n\
  </renderer>\n```\n\n这会影响整个应用程序，并针对与给定渲染器类型关联的给定组件族所关联的*每个*组件标签。第三种方式是通过组件标签的 `rendererType`\
  \ 属性。\n\n\n\n这仅影响声明的组件标签，而不影响其他标签。表 11-1 提供了标准 Jakarta Faces 组件集中所有组件类型、组件族和渲染器类型的概览。\n\
