  \ |\n jakarta.faces.Panel |\n jakarta.faces.Group |\n\n<h:selectBooleanCheckbox>\
  \ |\n HtmlSelectBooleanCheckbox |\n jakarta.faces.HtmlSelectBooleanCheckbox |\n\
  \ jakarta.faces.SelectBoolean |\n jakarta.faces.Checkbox |\n\n<h:selectManyCheckbox>\
  \ |\n HtmlSelectManyCheckbox |\n jakarta.faces.HtmlSelectManyCheckbox |\n jakarta.faces.SelectMany\
  \ |\n jakarta.faces.Checkbox |\n\n<h:selectManyListbox> |\n HtmlSelectManyListbox\
  \ |\n jakarta.faces.HtmlSelectManyListbox |\n jakarta.faces.SelectMany |\n jakarta.faces.Listbox\
  \ |\n\n<h:selectManyMenu> |\n HtmlSelectManyMenu |\n jakarta.faces.HtmlSelectManyMenu\
  \ |\n jakarta.faces.SelectMany |\n jakarta.faces.Menu |\n\n<h:selectOneListbox>\
  \ |\n HtmlSelectOneListbox |\n jakarta.faces.HtmlSelectOneListbox |\n jakarta.faces.SelectOne\
  \ |\n jakarta.faces.Listbox |\n\n<h:selectOneMenu> |\n HtmlSelectOneMenu |\n jakarta.faces.HtmlSelectOneMenu\
  \ |\n jakarta.faces.SelectOne |\n jakarta.faces.Menu |\n\n<h:selectOneRadio> |\n\
  \ HtmlSelectOneRadio |\n jakarta.faces.HtmlSelectOneRadio |\n jakarta.faces.SelectOne\
  \ |\n jakarta.faces.Radio |\n\n如果你仔细检查该表，你会发现在组件族和渲染器类型中存在某种模式，尤其是在输入、选择和命令组件中。你会注意到，一个渲染器类型可以被多个组件共享，即使它们属于不同的组件族。你还会注意到，有一个\
  \ HTML 组件没有渲染器类型，即 `<h:column>`。\n这是一个特殊的组件，不能单独使用，只能嵌套在特定的父组件中使用。在标准 Jakarta Faces\
  \ 组件集中，目前只有 `<h:dataTable>` 可以充当其父组件。\n它的渲染器基本上会遍历所有子组件，并对 `UIColumn` 执行 `instanceof`\
  \ 检查，然后相应地处理它们。\n\n创建新组件和渲染器\n如果你仔细留意了第 3 章中的表 3-1，你可能已经注意到 Jakarta Faces 没有提供任何组件来根据提供的数组或集合值渲染动态的\
  \ `<ul>` 或 `<ol>` 甚至 `<dl>` 元素。它只支持对 `<table>` 元素进行此类操作。诚然，使用 Facelets 的 `<ui:repeat>`\
  \ 加上一些自定义 HTML 代码也能实现同样的效果，但我们将以此为契机，创建一个新的自定义组件来渲染 `<ul>` 或 `<ol>`。\n\n第一步是检查哪个\
  \ `UIComponent` 子类适合我们设想的任务，以便将自定义代码逻辑减少到最低限度。在 `jakarta.faces.component` 包中，你可以找到许多\
  \ `UIXxx` 组件子类。如果你想创建一个新的表单组件，则继承 `UIForm`。如果你想创建一个新的输入组件，则继承 `UIInput`。如果你想创建一个新的输出组件，则继承\
  \ `UIOutput`。如果你想创建一个新的数据迭代器组件，则继承 `UIData`。很少需要直接继承 `UIComponent`。\n我们希望能够在集合上进行迭代，以便在\
  \ `<ul>` 内部生成 `<li>` 元素，因此我们将选择 `UIData`。它已经实现了大量的迭代和状态保存逻辑。以下是自定义组件类 `com.example.project.component.DataList`：\n\
  \n```\n@FacesComponent(createTag=true)\npublic class DataList extends UIData {\n\
  public DataList() {\nsetRendererType(DataListRenderer.RENDERER_TYPE);\n}\n}\n```\n\
  \n就这些吗？是的，`UIData` 超类已经拥有我们所需的一切，所有生成 HTML 的代码都放在 `DataListRenderer` 中，稍后将展示。你会注意到\
  \ `@FacesComponent` 注解声明了一个 `createTag=true` 属性。这基本上指示 Jakarta Faces 自动创建一个组件标签，其预定义的\
  \ XML 命名空间为 `jakarta.faces.component`。换句话说，上述标签在 Facelets 文件中可以这样使用：\n\n```\n...\n\
  \n...\n\n```\n\nXML 命名空间前缀 “`my`” 当然由你选择。通常，你会在这里选择公司名称的某种缩写。你也可以使用 `namespace`\
  \ 属性覆盖预定义的 XML 命名空间。\n\n```\n@FacesComponent(createTag=true, namespace=\"example.components\"\
  )\n```\n\n然后它将可以这样使用：\n\n```\n...\n\n...\n\n```\n\n\n\n这个命名空间不幸地无法与自定义 `*.taglib.xml`\
  \ 文件的 `<namespace>` 统一。如果你对两者使用相同的命名空间，那么 Jakarta Faces 将优先采用 `*.taglib.xml` 中的定义，而非\
  \ `@FacesComponent` 中的定义，从而导致无法找到自定义组件标签。实际上，在任何与 Jakarta EE 相关的内容中，任何基于 XML 的事物注册优先级都高于基于\
  \ Java 注解的同一事物注册。\n\n你基本上需要在该 `*.taglib.xml` 文件中显式注册自定义组件。以下展示了如何扩展第 7 章“标签文件”一节中创建的\
  \ `/WEB-INF/example.taglib.xml`，以注册自定义组件，这本质上与 `@FacesComponent` 为你所做的工作相同。\n\n\
  ```\n\nexample.tags\nt\n\n渲染一个 HTML 列表。\ndataList\n\ndataList\n\n```\n\n这样，自定义组件就可以与其他标签在同一个命名空间下使用。\n\
  \n```\n...\n\n...\n\n```\n\n现在，你可以移除 `@FacesComponent` 的所有属性，使其仅保留 `@FacesComponent`。是的，正如你在\
  \ `example.taglib.xml` 中所见，组件类型默认为类名，并将首字母小写。你始终可以通过显式指定 `@FacesComponent` 注解的值来覆盖它。通常，你会希望在其前面加上公司名称。将其定义为公共常量是一个好习惯，这样其他人可以在必要时通过\
  \ Javadoc 查找它，或将其用于 `Application#createComponent()`。\n\n```\n@FacesComponent(DataList.COMPONENT_TYPE)\n\
  public class DataList extends UIData {\npublic static final String COMPONENT_TYPE\
  \ = \"example.DataList\";\npublic DataList() {\nsetRendererType(DataListRenderer.RENDERER_TYPE);\n\
  }\n}\n```\n\n现在相应地调整 `example.taglib.xml` 中的组件类型。\n\n```\nexample.DataList\n\n```\n\
  \n`*.taglib.xml` 还为你提供了通过 `<attribute>` 条目注册属性的空间，尽管这可能会导致代码冗长。你应该已经在第 7 章的“标签文件”一节中看到过这一点。不幸的是，当前版本的\
  \ Faces 没有提供注解来声明式地声明一个“官方”组件属性。目前还没有类似 `@FacesAttribute private Iterable value`\
  \ 这样的东西。这可能会在未来的 Faces.next 中出现。不使用任何 `<attribute>` 的非官方方式也能正常工作。你可以在视图中的组件标签上声明任何你想要的属性。\n\
  \n```\n\n这就是 XML 的自由度。至于实际的组件或渲染器实现是否对其进行了处理，则是另一回事。你甚至可以在现有组件上声明一个自定义属性，并插入一个扩展的\
  \ `Renderer` 来处理该属性。更多内容将在后面的“扩展现有渲染器”一节中介绍。说到渲染器，我们的 `<t:dataList>` 仍然需要它的渲染器。以下是\
  \ `com.example.project.renderer.DataListRenderer` 的样子。\n\n```\n@FacesRenderer(\n\
  componentFamily=UIData.COMPONENT_FAMILY,\nrendererType=DataListRenderer.RENDERER_TYPE)\n\
  public class DataListRenderer extends Renderer {\npublic static final String RENDERER_TYPE\
  \ = \"example.List\";\n@Override\npublic void encodeBegin\n(FacesContext context,\
  \ UIComponent component)\nthrows IOException\n{\nResponseWriter writer = context.getResponseWriter();\n\
  UIData data = (UIData) component;\nif (data.getRowCount() > 0) {\nwriter.startElement(\"\
  ul\", component);\n}\n}\n@Override\npublic boolean getRendersChildren() {\nreturn\
  \ true;\n}\n@Override\npublic void encodeChildren\n(FacesContext context, UIComponent\
  \ component)\nthrows IOException\n{\nResponseWriter writer = context.getResponseWriter();\n\
  UIData data = (UIData) component;\nfor (int i = 0; i  0) {\nfor (UIComponent child\
  \ : component.getChildren()) {\nchild.encodeAll(context);\n}\n}\nwriter.endElement(\"\
  li\");\n}\ndata.setRowIndex(-1);\n}\n@Override\npublic void encodeEnd\n(FacesContext\
  \ context, UIComponent component)\nthrows IOException\n{\nResponseWriter writer\
  \ = context.getResponseWriter();\nUIData data = (UIData) component;\nif (data.getRowCount()\
  \ > 0) {\nwriter.endElement(\"ul\");\n}\n}\n}\n```\n\n事后看来，这相对简单。我们尽可能多地将繁重的工作委托给\
  \ Jakarta Faces 提供的 `UIData` 超类。在 `encodeBegin()` 中，当数据模型不为空时，你开始 `<ul>` 元素。这需要通过检查\
  \ `UIData#getRowCount()` 的结果来判断。其 Javadoc^(⁸⁷) 基本说明如下：\n\n*返回底层数据模型中的行数。如果可用行数未知，则返回\
  \ -1。*\n\n“行”这个术语确实与表格密切相关。这也是这个超类最初设计的目的：`<h:dataTable>`。使用“项”这个术语会比“行”更通用，但事实就是如此。\n\
  \n然后，在 `encodeChildren()` 方法中，我们通过 `UIData#setRowIndex()` 方法设置当前行索引，开始 `<li>` 元素，通过在每个子组件上调用\
  \ `UIComponent#encodeAll()` 原样编码所有子组件，最后结束 `<li>` 元素。循环完成后，我们通过调用值为 `-1` 的 `UIData#setRowIndex()`\
  \ 显式地向 `UIData` 超类表明这一点。其 Javadoc^(⁸⁸) 说明如下：\n\n*如果新的 rowIndex 值为 -1：如果 var 属性不为\
  \ null，则移除相应的请求作用域属性（如果有）。重置所有后代组件的状态信息。*\n\n因此，它会清除与迭代相关的任何状态。这非常重要；否则，可能会在组件树中进一步引起副作用，甚至当它自身需要遍历数据模型时导致视图状态损坏。最后，在\
  \ `encodeEnd()` 方法中，它将基于与 `encodeBegin()` 中相同的条件结束 `<ul>` 元素。\n\n`encodeChildren()`\
  \ 方法中的 `UIData#setRowIndex()` 调用会在底层从 `value` 属性中提取数据模型，并将其包装在 `jakarta.faces.model.DataModel`\
  \ 抽象类的合适实现中。^(⁸⁹) 到目前为止，根据 `UIData#getValue()` 的 Javadoc，^(⁹⁰) 支持 `value` 属性背后对象的以下类型，按此扫描顺序：\n\
  \n1.  `java.util.List`（自 1.0 起）。\n\n2.  数组（自 1.0 起）。\n\n3.  `java.sql.ResultSet`（自\
  \ 1.0 起）。\n\n4.  `java.util.Collection`（自 2.2 起）。\n\n5.  `java.lang.Iterable`（自\
  \ 2.3 起）。\n\n6.  `java.util.Map`（自 2.3 起）。\n\n7.  已通过 `@FacesDataModel` 注册了合适 `DataModel`\
  \ 的类型（自 2.3 起）。\n\n8.  所有其他类型将使用 `ScalarDataModel` 类进行适配，该类会将对象视为单行数据（自 1.0 起）。\n\
  \n\n\n在现代 Jakarta EE 应用中，你确实不会期望看到有人直接传递一个普通的 `java.sql.ResultSet`，但这都是为了向后兼容。请记住，Jakarta\
  \ Faces 是在 2004 年引入的。向后兼容性是它能够存活至今的最强支柱之一。它当然是一个可以被移除的候选对象，但不是现在。\n\n某些类型之间确实存在重叠；`List`\
  \ 和 `Collection` 很容易被 `Iterable` 覆盖，因为它们都实现了这个接口。但这有性能方面的原因。对于 `List`，`ListDataModel`\
  \ 通过索引直接访问元素；对于 `Collection`，元素首先通过 `Collection#toArray()` 提取，然后由 `CollectionDataModel`\
  \ 通过索引访问；而对于 `Iterable`，元素会被简单地迭代，并首先由 `IterableDataModel` 收集到一个新的 `List` 中。这可能会带来差异。\n\
  \n你还会看到，Faces 2.3 不仅新增了两个数据模型，还引入了一个新的注解来注册自定义数据模型。以前，每次将自定义集合传递给 `UIData` 组件之前，你都需要手动将其包装在自定义数据模型中。`DataModel`\
  \ 抽象类本身有一个缺点，即它本身不是 `Serializable` 的，这或多或少迫使你让持有此类数据模型的 `@ViewScoped` bean 在 transient\
  \ 数据模型属性上使用延迟加载的 getter，如下所示：\n\n```\nprivate YourCollection yourCollection;\nprivate\
  \ transient YourDataModel dataModel;\npublic DataModel getDataModel() {\nif (dataModel\
  \ == null) {\ndataModel = new YourDataModel(yourCollection);\n}\nreturn dataModel;\n\
  }\n```\n\n理想情况下，`UIData` 应该能自己识别 `YourCollection` 类型，并自动将其包装在 `YourDataModel` 中。`@FacesDataModel`\
  \ 注解正是用来实现这一点的。\n\n```\n@FacesDataModel(forClass=YourCollection.class)\npublic class\
  \ YourDataModel extends DataModel {}\n```\n\n回到自定义渲染器，还有一个方法没有解释：`getRendersChildren()`。它被重写以显式返回\
  \ `true`。你可能会问自己，为什么它最初是 `false`？为什么不直接让它成为 `encodeChildren()` 的默认行为，并依赖任何重写的 `encodeChildren()`\
  \ 方法来决定是否要对子组件调用 `encodeAll()`？这实际上是规范中的一个历史性疏忽。最初，`encodeAll()` 方法并不存在。它是在 Faces\
  \ 1.2 中才添加的，并且它基本上使 `getRendersChildren()` 变得过时了。但为了向后兼容，引入了这种复杂性。\n简而言之，如果你重写了\
  \ `encodeChildren()` 方法，请始终让 `getRendersChildren()` 返回 `true`。否则，子组件将根本不会被编码。\n\
  最后但同样重要的是，你可能还会想知道，为什么我们不“简单地”重写 `DataList` 组件的 `encodeBegin()`、`encodeChildren()`（以及\
  \ `getRendersChildren()`）和 `encodeEnd()` 方法，而是创建一个“完整的”渲染器实现。主要原因是：简单性和可扩展性。`UIComponent`\
  \ 上指定的这些方法不仅仅执行渲染。它们还会检查 `UIComponent#isRendered()` 是否返回 `true`。`encodeBegin()`\
  \ 还会触发 `PreRenderComponentEvent`，并将当前组件作为 `#{component}` 推入 EL（表达式语言）作用域。`encodeEnd()`\
  \ 将 `#{component}` 从 EL 作用域中弹出。它们还会检查是否有附加的渲染器，如果有，则委托给它。这些都在它们的 Javadoc 中有说明。当你重写这些方法时，你需要手动处理这些事情。这是不必要的重复工作。并且，如果将来有人想要调整组件的渲染，如果你的组件不检查自定义渲染器，他们将无法简单地插入一个。\n\
  \n扩展现有组件\n\n假设有一个现有的组件，你想调整其行为，通常是通过添加一个或多个新的自定义属性。如果这些属性纯粹是输出性质的，那么你可以直接使用 Faces\
  \ 2.2 中引入的直通属性（pass-through attributes）功能。以前，任何组件官方不支持的属性在视图渲染期间都会被简单地忽略。例如，当你想要为现有的\
  \ `<h:inputFile>` 组件添加 `directory` 属性时，^(⁹¹) 简单地像下面这样添加属性是行不通的。\n\n```\n\n```\n\n\
  使用直通属性功能，你可以显式地指示 Jakarta Faces 无论如何都渲染自定义属性。这可以通过两种方式实现。第一种方式是通过 `jakarta.faces.passthrough`\
  \ XML 命名空间注册它。\n\n```\n...\n\n```\n\n另一种方式是通过 `<f:passThroughAttribute>` 标签声明它。\n\
  \n```\n...\n\n```\n\n请注意，你还需要显式设置 `multiple=\"true\"`；否则，你将无法发送包含多个文件的目录。在支持 `directory`\
  \ 属性的浏览器上，文件浏览对话框将允许选择文件夹。但是，这在不支持此非标准属性的浏览器上不起作用；^(⁹²) 在基于 WebKit 的浏览器上，你需要设置 `webkitdirectory`\
  \ 属性。因此，当你仅仅想要在尽可能广泛的浏览器支持下支持目录选择时，最终会变成这样。\n\n```\n...\n\n```\n\n减少这种样板代码的一种方法是扩展\
  \ `<h:inputFile>` 组件，添加一个新的 `directory` 属性，该属性会自动相应地设置所有这三个属性。第一步是查看 `<h:inputFile>`\
  \ 具体对应哪个 `UIComponent` 类。正如你在表 11-1 中看到的，它是 `jakarta.faces.component.html.HtmlInputFile`。让我们从扩展它并添加新的\
  \ `directory` 属性开始。\n\n```\n@FacesComponent(createTag=true)\npublic class InputFile\
  \ extends HtmlInputFile {\n@Override\npublic void encodeBegin(FacesContext context)\
  \ throws IOException {\nboolean directory = isDirectory();\nif (directory) {\nsetMultiple(true);\n\
  getPassThroughAttributes().put(\"directory\", true);\ngetPassThroughAttributes().put(\"\
  webkitdirectory\", true);\n}\nsuper.encodeBegin(context);\n}\npublic boolean isDirectory()\
  \ {\nreturn (boolean) getStateHelper().eval(\"directory\", true);\n}\npublic void\
  \ setDirectory(boolean directory) {\ngetStateHelper().put(\"directory\", directory);\n\
  }\n}\n```\n\n请注意，`directory` 属性没有对应的属性。任何公共组件属性都必须由一个 getter/setter 对表示，该对进一步委托给\
  \ `UIComponent#getStateHelper()`。基本上，你必须将所有视图范围的组件属性委托给 `StateHelper`。这将反过来确保正确的增量最终进入\
  \ Jakarta Faces 视图状态。这当然是可选的，但不这样做将使组件实例无法以编程方式操作。在之前的 HTTP 请求期间执行的任何更改都将在后续的 HTTP\
  \ 回传请求中丢失，原因很简单：`UIComponent` 实例是从头开始重新创建的。\n\n还要注意，`directory` 和 `webkitdirectory`\
  \ 属性只是在 `encodeBegin()` 方法中作为直通属性添加，然后才委托给实际执行渲染工作的父类方法。这消除了为渲染新属性这一特定目的而创建整个自定义渲染器的需要。现在让我们测试一下。\n\
  \n```\n...\n\n```\n\n为了完整起见，以下是支持 bean 的样子。\n\n\n\n```\n@Named @RequestScoped\n\
  public class Bean {\nprivate List files;\npublic void upload() {\nfor (Part file\
  \ : files) {\nString fileName = file.getSubmittedFileName();\nString fileType =\
  \ file.getContentType();\nlong fileSize = file.getSize();\nSystem.out.println(\"\
  File name: \" + fileName);\nSystem.out.println(\"File type: \" + fileType);\nSystem.out.println(\"\
  File size: \" + fileSize);\n}\n}\n// 添加/生成 getter 和 setter 方法。\n}\n```\n\n现在，我们基本上已经创建了与\
  \ `<h:inputFile>` 等效的 `UIComponent`，并带有一个透传的 `directory` 属性。\n\n在 Jakarta Faces\
  \ 4.0 中，`<h:inputFile>` 新增了一个 `accept` 属性。其用法如下：\n\n```\n...\n\n```\n\n在支持此属性的浏览器上，文件浏览对话框将仅显示与\
  \ `accept` 属性中指定的、以逗号分隔的 IANA（互联网号码分配机构）媒体类型^(⁹³) 相匹配的文件。然而，这在**不支持**此属性的浏览器中^(⁹⁴)\
  \ 将不起作用，并且它也不会在服务器端进行任何验证。即使浏览器支持该属性，任何恶意的最终用户都可以轻易地操纵检索到的 HTML 文档并移除 `accept` 属性，从而能够上传不同类型的文件。\n\
  \n为了能够在服务器端验证上传文件的媒体类型是否确实与指定的 `accept` 属性匹配，你可以像下面这样重写 `InputFile` 类的 `UIInput#validateValue()`\
  \ 方法。该方法在处理验证阶段（第三阶段）期间运行。\n\n```\n@Override\nprotected void validateValue(FacesContext\
  \ context, Object newValue) {\nString accept = getAccept();\nif (accept != null\
  \ && newValue instanceof Part) {\nPart part = (Part) newValue;\nString contentType\
  \ = context.getExternalContext()\n.getMimeType(part.getSubmittedFileName());\nString\
  \ acceptPattern = accept.trim()\n.replace(\"*\", \".*\").replaceAll(\"\\\\s*,\\\\\
  s*\", \"|\");\nif (contentType == null || !contentType.matches(acceptPattern)) {\n\
  String message = \"不可接受的文件类型\";\ncontext.addMessage(getClientId(context), new FacesMessage(\n\
  FacesMessage.SEVERITY_ERROR, message, null));\nsetValid(false);\n}\n}\nif (isValid())\
  \ {\nsuper.validateValue(context, newValue);\n}\n}\n```\n\n如你所见，它基本上会检查是否指定了 `accept`\
  \ 属性以及是否有提交的文件，如果有，则将 `accept` 属性转换为正则表达式模式，并将提交文件的内容类型与之匹配。`accept` 属性表示一个以逗号分隔的\
  \ IANA 媒体类型字符串，其中星号用作通配符，逗号用作析取运算符。例如，`accept` 值为 `\"image/*,application/pdf\"`\
  \ 会被转换为正则表达式 `\"image/.*|application/pdf\"`。如果不匹配，它将向 faces 上下文添加一个与该组件关联的 faces\
  \ 消息，并通过调用 `UIInput#setValid(false)` 将该组件标记为无效。最后，如果组件有效，它将把验证调用继续传递给超类。\n\n此外，还有一点需要提及：内容类型不是从\
  \ `Part#getContentType()` 获取的，而是根据提交的文件名从 `ExternalContext#getMimeType()` 获取的。这只是为了覆盖客户端未发送内容类型或发送了服务器无法理解的内容类型这种边界情况。`ExternalContext#getMimeType()`\
  \ 基本上是从 `web.xml` 中的 `<mime-mapping>` 条目获取已知内容类型的列表。服务器本身有一些默认值，你可以在 Web 应用程序自己的\
  \ `web.xml` 中覆盖或扩展它们。\n\n现在，文件的内容类型属性在客户端被过滤，并在服务器端被验证。一切看起来不错，但这当然只是基于文件名验证文件的内容类型，而不是文件的实际内容。想象一下，有人创建了一个\
  \ ZIP 文件，然后简单地将文件扩展名重命名为图像文件，甚至是带有恶意软件的可执行文件。它仍然可以通过客户端和服务器端的文件类型验证。坦率地说，这个责任不在于组件本身，而在于你，即\
  \ Jakarta Faces 开发者。正确的解决方案是创建一个自定义验证器并将其附加到组件上。下面是一个图像文件验证器的示例，借助能够解析图像文件的 Java\
  \ 2D API。如果它抛出异常或返回 `null`，那么它肯定不是图像文件。\n\n```\n@FacesValidator(\"project.ImageFileValidator\"\
  )\npublic class ImageFileValidator implements Validator {\n@Override\npublic void\
  \ validate\n(FacesContext context, UIComponent component, Part value)\nthrows ValidatorException\n\
  {\nif (value == null) {\nreturn; // 让 @NotNull 或 required=\"true\" 处理。\n}\ntry {\n\
  ImageIO.read(value.getInputStream()).toString();\n}\ncatch (Exception e) {\nString\
  \ message = \"不是图像文件\";\nthrow new ValidatorException(new FacesMessage(message),\
  \ e);\n}\n}\n}\n```\n\n为了使其运行，将其声明为组件标签的 `validator` 属性。\n\n```\n\n它运行得非常完美。现在，当验证也通过时，将调用后端\
  \ bean 的动作方法，你可以在其中将上传的文件保存到所需位置。实现方式如下：\n\n```\npublic void upload() {\nPath folder\
  \ = Paths.get(\"/path/to/uploads\");\nString fileName = Paths.get(photo.getSubmittedFileName())\n\
  .getFileName().toString();\nint indexOfLastDot = fileName.lastIndexOf('.');\nString\
  \ name = fileName.substring(0, indexOfLastDot);\nString extension = fileName.substring(indexOfLastDot);\n\
  FacesMessage message = new FacesMessage();\ntry (InputStream contents = photo.getInputStream())\
  \ {\nPath file = Files.createTempFile(folder, name + \"-\", extension);\nFiles.copy(contents,\
  \ file, StandardCopyOption.REPLACE_EXISTING);\nmessage.setSummary(\"上传文件已成功保存。\"\
  );\n}\ncatch (IOException e) {\nmessage.setSummary(\"无法保存上传的文件，请重试。\");\nmessage.setSeverity(FacesMessage.SEVERITY_ERROR);\n\
  e.printStackTrace();\n}\nFacesContext.getCurrentInstance().addMessage(null, message);\n\
  }\n```\n\n你可能会疑惑为什么它似乎将上传的文件保存为临时文件。实际上并非如此。我们只是利用 `Files#createTempFile()` 工具来保证保存文件名的唯一性。它会在文件名和文件扩展名之间自动包含一个唯一的随机字符串。否则，当多人上传恰好同名的不同文件时，他们可能会相互覆盖，导致数据丢失。\n\
  \n\n\n扩展现有渲染器\n假设有一个现有渲染器存在逻辑缺陷或不足，你希望通过扩展它来快速修补，而不是从头重写。不幸的是，这听起来比实际做起来要容易得多。也就是说，标准的渲染器实现并非标准\
  \ Jakarta Faces API 的一部分，这与 `jakarta.faces.component.html` 包中可用的标准 HTML 组件实现不同。实际的标准\
  \ HTML 渲染器实现由 Jakarta Faces 实现本身提供。Mojarra 将它们放在 `com.sun.faces.renderkit.html_basic`\
  \ 包中，而 MyFaces 将它们放在 `org.apache.myfaces.renderkit.html` 包中。\n\n这些标准 HTML 渲染器的另一个问题是代码抽象程度相对较差。基本上，所有这些标准\
  \ HTML 渲染器都没有抽象出专门用于发出 HTML 标记的代码片段，使其与逻辑完全分离。换句话说，当你需要修复某些逻辑时，几乎总是必须重写或复制/粘贴所有负责发出\
  \ HTML 的代码。\n\n一个常见的现实世界示例是希望让 `<h:message>` 或 `<h:messages>` 渲染未转义的面部消息，以便你可以在面部消息中嵌入一些\
  \ HTML 代码，通常是提供指向所需目标页面的链接（例如，“`Unknown user, perhaps you want to <a href=\"login\"\
  >Log in</a>?`”）。标准的 `<h:message>` 组件不支持这种功能，而 HTML 转义由其渲染器控制，该渲染器因此依赖于 Jakarta Faces\
  \ 实现。这种 Jakarta Faces 内置的 HTML 转义随处可见，并且当你即将在网页中嵌入用户控制的数据时，它是防止潜在 XSS 攻击漏洞的非常重要的防护措施。有少数组件具有显式属性来关闭此\
  \ HTML 转义，例如带有 `escape` 属性的 `<h:outputText>`、带有 `itemEscaped` 属性的 `<f:selectItem>`\
  \ 以及带有 `itemLabelEscaped` 属性的 `<f:selectItems>`。然而，`<h:message>` 和 `<h:messages>`\
  \ 中缺少这样的属性。另请参阅 Jakarta Faces API 规范问题 634。^((95)) 也许它会在 Faces.next 中添加，但就目前而言，你无法绕过使用第三方组件库或扩展现有的标准\
  \ HTML 渲染器。\n\n我们将以此为例来扩展现有的 `<h:message>` 标准 HTML 渲染器。第一步是查看 `<h:message>` 组件当前具体使用哪个渲染器。在表\
  \ 11-1 中，你将看到此组件由 `HtmlMessage` 类支持。当前使用的渲染器实现可以通过编程方式确定，如下所示：\n\n```\nString componentFamily\
  \ = HtmlMessage.COMPONENT_FAMILY;\nString rendererType = new HtmlMessage().getRendererType();\n\
  Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()\n.getRenderer(componentFamily,\
  \ rendererType);\nSystem.out.println(renderer.getClass());\n```\n\n如果你使用 Mojarra\
  \ 作为 Jakarta Faces 实现，它将打印如下内容：\n\n```\nclass com.sun.faces.renderkit.html_basic.MessageRenderer\n\
  ```\n\n这正好是我们想要扩展的渲染器类。Mojarra 是开源的，其源代码目前可在 [`https://github.com/eclipse-ee4j/mojarra`](https://github.com/eclipse-ee4j/mojarra)\
  \ 获取。一旦你手头有了 `MessageRenderer` 源代码，下一步就是找出 `FacesMessage` 的摘要和详细信息具体在哪里渲染，以及我们如何用最少的代码覆盖它。我们可以在源代码中看到，它发生在\
  \ `encodeEnd()` 方法中，在当前 Mojarra 4.0 版本中，该方法已有 160 行代码。它使用 `ResponseWriter#writeText()`^((96))\
  \ 来渲染摘要和详细信息。我们希望将其替换为 `ResponseWriter#write()`，这样它就不会执行任何转义。\n\n当然，我们可以扩展该类，复制/粘贴\
  \ `encodeEnd()` 方法的所有 160 行代码，并调整 `summary` 和 `detail` 变量的 `writeText()` 调用，如下所示：\n\
  \n```\nObject escape = component.getAttributes().get(\"escape\");\nif (escape ==\
  \ null || Boolean.parseBoolean(escape.toString())) {\nwriter.writeText(summary,\
  \ component, null);\n}\nelse {\nwriter.write(summary);\n}\n```\n\n然而，这并不十分优雅。如果我们能在\
  \ `encodeEnd()` 方法期间捕获所有 `writeText()` 调用，并透明地委托给 `write()` 呢？那看起来会好得多。你可以通过包装 `ResponseWriter`，将其设置在\
  \ faces 上下文中，并将其传递给超类来实现这一点。几乎任何公共的 Jakarta Faces API 工件在 API 中也有一个等效的 `XxxWrapper`\
  \ 类。你可以在 `jakarta.faces.FacesWrapper` Javadoc^((97)) 的“所有已知实现类”部分找到它们。所有这些包装类使得\
  \ Jakarta Faces 非常易于定制和扩展。它们都有一个接受待包装类的构造函数，你基本上只需要选择你想要装饰的一个或多个方法。\n\n总而言之，以下是我们如何扩展\
  \ `MessageRenderer`，以在 `encodeEnd()` 方法期间将所有 `writeText()` 调用委托给 `write()`。\n\n\
  ```\npublic class EscapableMessageRenderer extends MessageRenderer {\n@Override\n\
  public void encodeEnd\n(FacesContext context, UIComponent component)\nthrows IOException\n\
  {\nResponseWriter writer = context.getResponseWriter();\ntry {\ncontext.setResponseWriter(new\
  \ ResponseWriterWrapper(writer) {\n@Override\npublic void writeText\n(Object text,\
  \ UIComponent component, String property)\nthrows IOException\n{\nString string\
  \ = text.toString();\nObject escape = component.getAttributes()\n.get(\"escape\"\
  );\nif (escape == null\n|| Boolean.parseBoolean(escape.toString()))\n{\nsuper.writeText(string,\
  \ component, property);\n}\nelse {\nsuper.write(string);\n}\n}\n});\nsuper.encodeEnd(context,\
  \ component);\n}\nfinally {\ncontext.setResponseWriter(writer);\n}\n}\n}\n```\n\n\
  请注意，在使用了包装后的响应写入器的 `try` 块的 `finally` 中恢复原始响应写入器非常重要。为了使其运行，请在 `faces-config.xml`\
  \ 中将其注册到与 `<h:message>` 组件关联的组件系列和渲染器类型上：\n\n```\n\njakarta.faces.Message\njakarta.faces.Message\n\
  \ncom.example.project.renderer.EscapableMessageRenderer\n\n```\n\n不，你不能为此使用 `@FacesRenderer`\
  \ 注解。这在扩展现有渲染器时不起作用。原始渲染器本身已经在某个 XML 文件中注册到了完全相同的组件系列和渲染器类型上。而且你知道，当同时发现基于 XML 的配置和基于注解的配置时，基于\
  \ XML 的配置总是具有更高的优先级。\n\n现在，你可以将现有 `<h:message>` 组件的 `escape` 属性设置为 `false`，以使扩展后的渲染器执行其工作。\n\
  \n```\n请注意，不要在任何显示在此处的面部消息中嵌入用户控制的输入，否则你将打开一个潜在的 XSS 攻击漏洞。\n\n自定义标签处理器\n在第 3 章中，你了解了视图构建时间和视图渲染时间之间的区别，以及诸如\
  \ Jakarta Tags 之类的标签处理器在构建 Jakarta Faces 组件树时运行，而 Jakarta Faces 组件在通过 Jakarta Faces\
  \ 生命周期处理 HTTP 请求和响应时运行。不仅 Jakarta Faces 组件可以自定义，标签处理器也可以自定义。当你想控制 Jakarta Faces\
  \ 组件树的构建而不是处理 HTTP 请求和响应时，这尤其有用。\n\n\n\n`<f:viewParam>` 在主从页面中非常有用。从主页面，你可以通过实体\
  \ ID 作为参数链接到详情页面。在详情页面，你可以通过 `<f:viewParam>` 根据 ID 加载实体。具体用法如下：\n\n当转换或验证失败时，当前页面的\
  \ faces 上下文中会添加一条 faces 消息。然而，更多时候你希望直接将用户重定向回主页面。通过 `<f:event>` 结合 `PostValidateEvent`\
  \ 来实现这一点相对简单。不，`<f:viewAction>` 是行不通的，因为当存在转换或验证错误时，它根本不会被调用。\n\n```\n...\n\n```\n\
  \n其中 `onload()` 方法如下所示：\n\n```\npublic void onload() throws IOException {\nFacesContext\
  \ context = FacesContext.getCurrentInstance();\nif (context.isValidationFailed())\
  \ {\nExternalContext ec = context.getExternalContext();\nec.redirect(ec.getRequestContextPath()\
  \ + \"/items.xhtml\");\n}\n}\n```\n\n好吧，这样是可行的，但当你拥有更多类似页面时，这会导致大量样板代码。理想情况下，你希望能够以声明方式在\
  \ `<f:viewParam>` 本身上注册一个事件监听器，采用如下这种自文档化的方式，这样就能使后端 bean 代码免于手动处理请求-响应的杂乱逻辑。\n\n\
  这可以通过一个标签处理器来实现，该处理器基本上在由 `<f:viewParam>` 标签表示的 `UIViewParameter` 组件上注册一个新的系统事件监听器。标签处理器类必须继承自\
  \ `jakarta.faces.view.facelets.TagHandler`。\n\n```\npublic class ViewParamValidationFailed\
  \ extends TagHandler\nimplements ComponentSystemEventListener\n{\nprivate String\
  \ redirect;\npublic ViewParamValidationFailed(TagConfig config) {\nsuper(config);\n\
  redirect = getRequiredAttribute(\"redirect\").getValue();\n}\n@Override\npublic\
  \ void apply(FaceletContext context, UIComponent parent)\nthrows IOException\n{\n\
  if (parent instanceof UIViewParameter\n&& !context.getFacesContext().isPostback())\n\
  {\nparent.subscribeToEvent(PostValidateEvent.class, this);\n}\n}\n@Override\npublic\
  \ void processEvent(ComponentSystemEvent event)\nthrows AbortProcessingException\n\
  {\nUIComponent parent = event.getComponent();\nparent.unsubscribeFromEvent(PostValidateEvent.class,\
  \ this);\nFacesContext context = event.getFacesContext();\nif (context.isValidationFailed())\
  \ {\ntry {\nExternalContext ec = context.getExternalContext();\nec.redirect(ec.getRequestContextPath()\
  \ + redirect);\n}\ncatch (IOException e) {\nthrow new AbortProcessingException(e);\n\
  }\n}\n}\n}\n```\n\n确实，这个类也实现了 `jakarta.faces.event.ComponentSystemEventListener`。对于标签处理器来说，这并不是严格必需的；在这个特定示例中这样做只是为了代码的便利性。重写的\
  \ `apply()` 方法用于 `TagHandler`，而重写的 `processEvent()` 方法用于 `ComponentSystemEventListener`。在\
  \ `apply()` 方法中，我们有机会在父组件被添加到组件树之前以编程方式操作它。我们可以通过调用 `UIComponent#subscribeToEvent()`\
  \ 并传入相关的组件系统事件类型和监听器实例，以编程方式实现与 `<f:event>` 相同的行为。相关的监听器实例恰好就是当前的标签处理器实例。当应用程序发布了相关的组件系统事件时，监听器实例的\
  \ `processEvent()` 方法将被调用。我们在 `processEvent()` 中做的第一件事就是取消订阅该监听器实例。这是有意为之，因为组件系统事件监听器被视为有状态的，因此本质上会保存在\
  \ Jakarta Faces 视图状态中。观察这一点的一个简单方法是，重新配置 Jakarta Faces，通过在 `web.xml` 中将 `jakarta.faces.STATE_SAVING_METHOD`\
  \ 上下文参数显式设置为 `client`，将视图状态保存在客户端，然后检查任何 Jakarta Faces 表单生成的 HTML 输出中 `jakarta.faces.ViewState`\
  \ 隐藏输入字段的大小。每次当你添加一个 `<f:event>`，或者在 `ComponentSystemEventListener` 完成其工作后没有取消订阅它时，Jakarta\
  \ Faces 视图状态的大小就会随着监听器实例的序列化形式而增长。在这个特定的用例中，监听器只应在非回发请求期间运行，这完全没有必要，因此需要显式取消订阅。\n\
  \n现在，为了使其运行，在 `/WEB-INF/example.taglib.xml` 中按如下方式注册它：\n\n```\n<tag>\n    <tag-name>viewParamValidationFailed</tag-name>\n\
  \    <handler-class>com.example.project.taghandler.ViewParamValidationFailed</handler-class>\n\
  </tag>\n```\n\n**打包成可分发的 JAR**\n\n如果你开发了一系列可复用的组件、渲染器、标签处理器、标签文件、复合组件等等，并且希望将它们打包成一个\
  \ JAR 文件，以便包含在 Web 应用程序的 `/WEB-INF/lib` 中，那么你需要创建一个所谓的 Web 片段项目。基本上，所有面向 Jakarta\
  \ Faces 的组件和实用库，如 OmniFaces、PrimeFaces、OptimusFaces、BootsFaces、ButterFaces 和 DeltaSpike，都是这样构建的。从\
  \ Maven 的角度来看，这只是一个 JAR 项目。关键在于，将通常放在 Maven WAR 项目的 `src/main/webapp` 文件夹中的文件，放到\
  \ Maven JAR 项目的 `src/main/resources/META-INF/resources/[libraryName]` 文件夹中。有一个主要的例外：所有通常放在\
  \ `src/main/webapp/WEB-INF` 中的部署描述符文件，如 `web.xml`、`faces-config.xml`、`*.taglib.xml`\
  \ 和 `beans.xml`，直接放在 `src/main/resources/META-INF` 文件夹中。另一个例外是，`web.xml` 文件需要替换为\
  \ `web-fragment.xml`。resources 文件夹中的 `[libraryName]` 子文件夹代表“库名称”，通常是项目名称的 URL 友好形式，例如“`omnifaces`”、“`primefaces`”、“`optimusfaces`”、“`bsf`”、“`butterfaces`”等。这个库名称随后可用于资源组件的\
  \ `library` 属性，例如 `<h:outputScript>`、`<h:outputStylesheet>` 和 `<h:graphicImage>`。以下是在\
  \ Eclipse 中，当按照“Web 片段”规则组织时，这样一个 Maven JAR 项目的样子。请特别注意 `src/main/resources` 文件夹的结构。当然，任何\
  \ Java 类都可以像往常一样放在 `src/main/java` 文件夹中。\n![](img/454457_2_En_11_Figa_HTML.jpg)\n\
  \n\n\n其中，`common.taglib.xml` 的内容如下所示，复合库名称设置为相对于 `src/main/resources/META-INF/resources`\
  \ 的路径，而标签文件源则设置为相对于 `*.taglib.xml` 文件自身位置的路径。\n\n```\ncom.example/common\ncommon\n\
  common/components\n\nsomeTag\nresources/common/tags/someTag.xhtml\n\n```\n\n而 `web-fragment.xml`\
  \ 的内容如下所示，它与 `web.xml` 几乎相同，只是根元素不同，使用的是 `<web-fragment>` 而非 `<web-app>`。\n\n```\n\
  common\n\n```\n\n一旦这样的 Web 片段项目被构建为 JAR 文件并包含在主 Web 应用项目的 `/WEB-INF/lib` 中，那么该 JAR\
  \ 中的资源就可以通过库名 “common” 在主 Web 应用项目的 Facelets 文件中使用，如下所示：\n\n资源依赖\n\n在某些情况下，你的自定义组件或渲染器可能依赖于特定的\
  \ JavaScript 或样式表资源，而你希望避免最终用户必须通过 `<h:outputScript>` 或 `<h:outputStylesheet>` 手动引入这些资源。在这种情况下，你会发现\
  \ `@jakarta.faces.application.ResourceDependency` 注解^(⁹⁸) 非常有用。假设你想在某个特定自定义组件中自动包含\
  \ `common:scripts/some.js` 和 `common:styles/some.css`，那么你可以按如下方式操作：\n\n```\n@ResourceDependency(library=\"\
  common\", name=\"some.css\", target=\"head\")\n@ResourceDependency(library=\"common\"\
  , name=\"some.js\", target=\"head\")\npublic class SomeCustomComponent extends UIComponent\
  \ {\n// ...\n}\n```\n\n当然，你也可以在必要时包含 Jakarta Faces 自带的 `jakarta.faces:faces.js`，例如，当你的自定义组件恰好依赖于\
  \ `faces.ajax.request()` 或标准 Jakarta Faces JavaScript API 提供的其他函数时。`jakarta.faces:faces.js`\
  \ 可以按如下方式包含，其脚本库名称和资源名称可作为 `ResourceHandler` 的常量使用。\n\n```\n@ResourceDependency(\n\
  library=ResourceHandler.FACES_SCRIPT_LIBRARY_NAME,\nname=ResourceHandler.FACES_SCRIPT_RESOURCE_NAME,\n\
  target=\"head\")\npublic class SomeCustomComponent extends UIComponent {\n// ...\n\
  }\n```\n\n脚注\n\n12. 搜索表达式\n\n正如第 3 章 “Ajax 生命周期” 部分和第 4 章 “Ajax 化组件” 部分所述，`<f:ajax>`\
  \ 标签的 `execute` 和 `render` 属性接受一组以空格分隔的所谓组件搜索表达式。搜索表达式自 Jakarta Faces 诞生之初就一直存在，因为它被用于\
  \ `<h:outputLabel>`、`<h:message>` 和 `<h:messages>` 组件的 `for` 属性中，但直到 Jakarta Faces\
  \ 2.0 引入 `<f:ajax>` 后，它们才成为 Jakarta Faces 开发者必须掌握的知识。也就是说，标签和消息在几乎所有情况下都已经与目标输入组件位于同一个命名容器父组件中，因此只需在\
  \ `for` 属性中指定目标输入组件的 ID 就足够了，但对于 `<f:ajax>` 的 `execute` 和 `render` 属性来说，情况未必如此，因为目标组件可能位于不同的命名容器上下文中，甚至位于物理上不同的\
  \ Facelets 文件中。为了克服这些困难，Jakarta Faces 2.0 引入了一些更抽象的搜索表达式：“`@this`”、“`@form`”、“`@all`”\
  \ 和 “`@none`”。像 “`@form`” 这样的表达式特别容易使用，因为它只是指代当前表单。如果该当前表单是在引用它的页面之上两个父模板中定义的，那么这确实使得引用它变得容易得多。尽管这些关键字让事情变得简单了许多，但它们相当有限。不仅只有四个关键字，而且它们不可扩展，默认的\
  \ Jakarta Faces 组件集仅在 `<f:ajax>` 标签内部使用它们。在其他组件中使用它们，甚至在 Jakarta Faces 自己的 `<h:outputLabel>`、`<h:message>`\
  \ 和 `<h:messages>` 组件中使用，以及以编程方式使用它们，都被忽略了。因此，在 Jakarta Faces 2.3 中，引入了一个 “组件搜索表达式框架”，极大地扩展了这四个关键字。它主要基于\
  \ PrimeFaces 中一个经过验证的 API（应用程序编程接口）^(⁹⁹)。\n\n相对本地 ID\n\n这是组件搜索表达式的最简单形式。最常见的用例出现在\
  \ `<h:outputLabel>`、`<h:message>` 和 `<h:messages>` 组件的 `for` 属性中。它简单地引用目标 `UIInput`\
  \ 组件的唯一 ID。\n\n这仅要求目标组件也位于同一个命名容器父组件内。命名容器父组件是实现了 `NamingContainer` 接口^(¹⁰⁰) 的组件。在标准\
  \ Jakarta Faces 中，只有 `<h:form>`、`<h:dataTable>`、`<ui:repeat>` 和 `<f:subview>` 是\
  \ `NamingContainer` 的实例。所有复合组件也是 `NamingContainer` 的实例，但标签文件不是。\n\n如果你需要从 `<h:outputLabel>`\
  \ 引用命名容器内的特定 `UIInput` 组件，那么你需要在命名容器组件的 ID 后附加所谓的命名容器分隔符字符，然后是目标 `UIInput` 组件的 ID。默认的命名容器分隔符字符是冒号\
  \ “`:`”。当前配置的分隔符字符可以通过 `UINamingContainer#getSeparatorCharacter()`^(¹⁰¹) 以编程方式获取。\n\
  \n```\nchar separatorCharacter = UINamingContainer\n.getSeparatorCharacter(FacesContext.getCurrentInstance);\n\
  ```\n\n这可以通过 `web.xml` 中的 `jakarta.faces.SEPARATOR_CHAR` 上下文参数进行配置。\n\n```\njakarta.faces.SEPARATOR_CHAR\n\
  -\n\n```\n\n警告\n\n**不**建议将其更改为其他字符，例如连字符 “`-`” 甚至下划线 “`_`”^(¹⁰²)。\n\n\n\n从长远来看，这种变更既令人困惑又脆弱，因为\
  \ ID 属性本身也允许使用这些字符。Jakarta Faces 不会根据当前配置的命名容器分隔符来验证组件 ID，因此它很容易被遗漏，并在搜索表达式中引用此类组件时引发问题。因此，最好依赖默认的“`:`”。\n\
  \n回到在命名容器中从 `<h:outputLabel>` 引用特定 `UIInput` 组件的问题，例如在示例复合组件 `<t:inputLocalTime>`\
  \ 中（如第 7 章“复合组件”一节所示），小时下拉组件的 ID 为“`hour`”。因此，对于 `<h:outputLabel>`，当使用默认的命名容器分隔符时，复合组件内小时下拉组件的相对本地\
  \ ID 是“`time:hour`”。\n\n请注意，这对于 `<h:message>` 并非必需，因为 Faces 消息在底层已经使用复合组件本身的客户端\
  \ ID 添加到 Faces 上下文中。\n\n使用相对本地 ID 在 `<h:dataTable>` 的 `<h:column>` 上下文中也同样有效。它会在当前迭代行的上下文中进行解析，即使目标组件位于另一列中。以下示例演示了这一点：\n\
  \n```\n...\n\nCountry\n\nCity\n\n...\n\n```\n\n在底层，相对本地 ID 是使用 `UIComponent#findComponent()`\
  \ API 中描述的算法进行解析的。^((103)) 这意味着你也可以通过编程方式解析它们。你只需确保在正确的基础组件上调用 `findComponent()`\
  \ 方法，而不是在例如 `UIViewRoot` 上调用。\n\n**绝对层级 ID**\n\n如果目标组件与当前组件不在同一个命名容器父级中，那么你需要使用绝对层级\
  \ ID，而不是本地相对 ID。关键区别在于，绝对层级 ID 以命名容器分隔符开头。然后它会从 `UIViewRoot` 开始搜索目标组件。这种结构通常用于 `<f:ajax>`\
  \ 的 `render` 属性中，当它需要引用一个不在同一表单内的组件时。\n\n```\n...\n\n...\n\n```\n\n一个不太常见但需要绝对层级\
  \ ID 的用例是，当你需要引用一个嵌套在另一个命名容器中的组件时。例如，当你想在复合组件内部的 `<cc:clientBehavior>` 事件期间更新与该复合组件关联的\
  \ `<h:message>` 时。\n\n你可以认为这是 Jakarta Faces 规范中的一个错误或疏忽。这确实如此，应该在 Jakarta Faces\
  \ 的下一个版本中加以解决。另一个不太常见的用例是，当你需要更新迭代组件（如 `<h:dataTable>` 和 `<ui:repeat>`）的特定迭代轮次时。\n\
  \n```\n\n...\n\n...\n\n```\n\n请注意，与普通的 Java 集合和数组一样，迭代索引是从零开始的。另请注意，你基本上需要将单元格的内容包装在另一个组件中，以便正确引用单元格的内容，并且你需要显式指定每一列才能更新整行，如前所示。更新整列也是可能的，但不太方便，因为你基本上需要为每一行指定搜索表达式。幸运的是，`render`\
  \ 属性可以接受 EL（表达式语言）表达式，并且 EL 流 API 可用于根据表中的项目数量，以 `:form:table:[i]:column` 格式连接一组字符串。\n\
  \n```\n' :form:list:' += bean.items.indexOf(i) += ':column2')\n.reduce((l, r) ->\
  \ (l += r)).get()}\">\n\n```\n\n诚然，这不是最优雅的方法。你最好委托给应用程序作用域 bean 中的自定义函数。它可能看起来像下面这样：\n\
  \n其中 `#{ajax}` 应用程序作用域 bean 看起来像下面这样：\n\n```\n@Named @ApplicationScoped\npublic\
  \ class Ajax {\npublic String columnIds(List list, String idTemplate) {\nreturn\
  \ IntStream.range(0, list.size()).boxed()\n.map(i -> idTemplate.replace(\"::\",\
  \ \":\" + i + \":\"))\n.collect(Collectors.joining(\" \"));\n}\n}\n```\n\n这已经好一些了，但仍然有些模板化。如有必要，你也可以从后台\
  \ bean 以编程方式添加 Ajax 渲染 ID。你可以使用 `PartialViewContext#getRenderIds()`^((104)) 来实现。也就是说，返回的集合是可变的，并且仅在渲染响应阶段（第六阶段）被查询。你还需要在此处指定一个绝对层级\
  \ ID，但有一个重要的区别：它不能以命名容器分隔符开头。换句话说，“`:form:table:0:column2`” 是行不通的；你需要指定“`form:table:0:column2`”。它总是相对于\
  \ `UIViewRoot` 进行解析。\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
  PartialViewContext ajaxContext = context.getPartialViewContext();\najaxContext.getRenderIds().add(\"\
  form:table:0:column2\");\n```\n\n作为提示，如果你难以确定绝对层级 ID 和/或记住哪些组件是命名容器，那么你始终可以查看生成的\
  \ HTML 输出。在你最喜欢的网络浏览器中打开 Jakarta Faces 页面，执行*查看页面源代码*，找到感兴趣的 Jakarta Faces 组件的 HTML\
  \ 元素表示，获取其 ID 属性的值，最后在其前面加上命名容器分隔符。另外，如果你遇到以 `j_id` 为前缀的自动生成 ID，那么你绝对需要为相关的 Jakarta\
  \ Faces 组件提供一个固定的 ID；否则，当组件在组件树中的位置因例如在感兴趣组件位置之前有条件地包含的组件而可能发生变化时，其值将会出错。（另请参见第\
  \ 4 章中的“基于文本的输入组件”一节。）\n\n与相对本地 ID 类似，绝对层级 ID 可以使用 `UIComponent#findComponent()`\
  \ API 中描述的算法以编程方式解析。^((105)) 以下示例演示了如何获取代表 `<h:form id=\"form\"><h:dataTable id=\"\
  table\">` 的 `UIData` 组件。\n\n```\nUIViewRoot root = FacesContext.getCurrentInstance().getViewRoot();\n\
  UIData table = (UIData) root.findComponent(\"form:table\");\n```\n\n**标准搜索关键字**\n\
  \nJakarta Faces 提供了一组更抽象的搜索表达式，称为“搜索关键字”。它们都以“`@`”字符开头。它们可用于替换搜索表达式中的固定组件 ID。表 12-1\
  \ 提供了它们的概述。\n\n**表 12-1 Jakarta Faces 提供的标准搜索关键字**\n\n| 关键字 | 解析为 | 自版本起 |\n| :---\
  \ | :--- | :--- |\n| @this | `UIComponent#getCurrentComponent()` | 2.0 |\n| @form\
  \ | `UIComponent#getNamingContainer()` 直到遇到 `UIForm` | 2.0 |\n| @all | 所有内容 | 2.0\
  \ |\n| @none | 无 | 2.0 |\n| @parent | `UIComponent#getParent()` | 2.3 |\n| @child(index)\
  \ | 给定索引处的 `UIComponent#getChildren()` | 2.3 |\n| @next | `UIComponent#getParent()`\
  \ 然后下一个索引处的 `UIComponent#getChildren()` | 2.3 |\n| @previous | `UIComponent#getParent()`\
  \ 然后上一个索引处的 `UIComponent#getChildren()` | 2.3 |\n| @namingcontainer | `UIComponent#getNamingContainer()`\
  \ | 2.3 |\n| @composite | `UIComponent#getCompositeComponentParent()` | 2.3 |\n\
  | @id(id) | 使用给定 ID 的 `UIComponent#findComponent()` | 2.3 |\n| @root | `FacesContext#getViewRoot()`\
  \ | 2.3 |\n\n在标准的 Jakarta Faces 组件集中，所有搜索关键字（包括自定义关键字）都可以在以下组件属性中使用：\n\n\n\n*  \
  \ `<f:ajax execute>`: 指定在 Ajax 回发请求的“应用请求值”、“验证处理”、“更新模型值”和“调用应用程序”阶段（第二、三、四、五阶段）必须处理的组件。默认为\
  \ `@this`\n\n*   `<f:ajax render>`: 指定在 Ajax 回发请求的“渲染响应”阶段（第六阶段）必须处理的组件。默认为 `@none`\n\
  \n*   `<h:outputLabel for>`: 指定生成的 HTML `<label>` 元素的目标组件。默认为 `@none`\n\n*   `<h:message\
  \ for>`: 指定必须为其渲染第一条 Faces 消息的目标组件。默认为 `@none`\n\n*   `<h:messages for>`: 指定必须为其渲染所有\
  \ Faces 消息的目标组件。默认为 `@none`\n\n请注意，在 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>`\
  \ 的 `for` 属性中使用搜索关键字仅在 Jakarta Faces 2.3 之后才成为可能。在旧版本中，仅支持相对 ID 和绝对 ID。\n\n最常用的搜索关键字无疑是\
  \ `@form`。当你在一个旨在处理整个表单的 `UICommand` 组件中使用 `<f:ajax>` 时，基本上别无选择。\n\n```\n...\n\n\
  ```\n\nJakarta Faces 2.3 的另一项新功能是，搜索关键字可以与常规组件 ID 链接。以下示例是对前面“绝对层级 ID”一节中给出的示例的扩展：\n\
  \n以下示例在删除一行时更新整个表格：\n\n```\n\n...\n\n```\n\n特别要注意，它引用的是最近的实现了 `NamingContainer`\
  \ 接口的组件，在此上下文中，该组件是 `<h:dataTable>`，而不是 `<h:form>`。\n\n关于程序化解析，包含关键字的搜索表达式无法使用 `UIComponent#findComponent()`\
  \ 进行程序化解析。为此，你需要改用 `SearchExpressionHandler#resolveComponent()` 或 `resolveComponents()`^(¹⁰⁶)。`SearchExpressionHandler`\
  \ 又可以通过 `Application#getSearchExpressionHandler()` 获取。你还需要预先创建 `SearchExpressionContext`^(¹⁰⁷)，它包装了开始搜索的起始组件。\n\
  \n```\nFacesContext context = FacesContext.getCurrentInstance();\nUIComponent base\
  \ = context.getViewRoot(); // 可以是任何组件。\nString expression = \"@namingcontainer\"\
  ;\nSearchExpressionContext searchContext = SearchExpressionContext\n.createSearchExpressionContext(context,\
  \ base);\nSearchExpressionHandler searchHandler = context.getApplication()\n.getSearchExpressionHandler();\n\
  handler.resolveComponent(searchContext, expression, (ctx, found) -> {\nSystem.out.println(found);\n\
  });\n```\n\n坦白说，这相当冗长，但它是 Jakarta Faces API 自带的。幸运的是，存在像 OmniFaces 这样的实用库。\n\n自定义搜索关键字\n\
  \nJakarta Faces 2.3 引入的组件搜索表达式框架也附带了一个 API，允许我们创建自定义搜索关键字。想象一下，你有一个包含多个 `<h:message>`\
  \ 组件的表单，并且希望在提交表单时重新渲染它们全部。那么你可能会倾向于在 `<f:ajax>` 的 `render` 属性中也使用 `@form`。\n\n\
  但这效率并不高。实际上，它还会不必要地重新渲染同一表单中所有在 Ajax 回发请求期间根本不会改变的标签、输入组件以及任何其他静态内容。这是一种资源浪费。理想情况下，我们应该有一个像\
  \ `@messages` 这样的搜索关键字，它基本上引用同一表单中的所有消息组件。\n\n请注意，每个 `<h:message>` 组件都设置了显式 ID，因为如果没有显式\
  \ ID，它们默认不会向 HTML 输出渲染任何内容，那么 Jakarta Faces Ajax API JavaScript 将无法找到它们以根据 Ajax\
  \ 响应更新其内容。\n\n为了让 Jakarta Faces 识别新的搜索关键字 `@messages`，首先按如下方式扩展 `jakarta.faces.component.search.SearchKeywordResolver`^(¹⁰⁸)：\n\
  \n```\npublic class MessagesKeywordResolver extends SearchKeywordResolver {\n@Override\n\
  public boolean isResolverForKeyword\n(SearchExpressionContext context, String keyword)\n\
  {\nreturn \"messages\".equals(keyword);\n}\n@Override\npublic void resolve\n(SearchKeywordContext\
  \ context, UIComponent base, String keyword)\n{\nUIComponent form = base.getNamingContainer();\n\
  while (!(form instanceof UIForm) && form != null) {\nform = form.getNamingContainer();\n\
  }\nif (form != null) {\nSet messageClientIds = new HashSet();\nVisitContext visitContext\
  \ = VisitContext.createVisitContext\n(context.getSearchExpressionContext().getFacesContext());\n\
  form.visitTree(visitContext, (visit, child) -> {\nif (child instanceof UIMessage)\
  \ {\nmessageClientIds.add(child.getClientId());\n}\nreturn VisitResult.ACCEPT;\n\
  });\nif (!messageClientIds.isEmpty()) {\ncontext.invokeContextCallback(new UIMessage()\
  \ {\n@Override\npublic String getClientId(FacesContext context) {\nreturn String.join(\"\
  \ \", messageClientIds);\n}\n});\n}\n}\ncontext.setKeywordResolved(true);\n}\n}\n\
  ```\n\n应该指出，这种方法已经有点取巧了。也就是说，`SearchKeywordResolver` 的意图是将一个关键字解析为恰好一个组件，该组件的客户端\
  \ ID 将用于替换该关键字。然后，这个组件将被传递给 `SearchKeywordContext#invokeContextCallback()`。在上述方法中，我们改为收集父级\
  \ `UIForm` 中找到的所有 `UIMessage` 组件的客户端 ID，然后向 `invokeContextCallback()` 提供一个假的 `UIMessage`\
  \ 组件，该组件又会调用这个假 `UIMessage` 组件的 `getClientId()` 方法，该方法实际上返回所需的客户端 ID 集合。\n还应注意，这里使用的是\
  \ `UIComponent#visitTree()`^(¹⁰⁹)，而不是递归遍历 `UIComponent#getChildren()` 来收集任何 `UIMessage`\
  \ 组件的客户端 ID。也就是说，当简单地遍历子组件时，你迟早会遇到一个迭代器组件，例如 `<h:dataTable>` 或 `<ui:repeat>`，如果它恰好只嵌套了一个\
  \ `UIMessage` 组件，那么你最终只会得到一个客户端 ID，即没有迭代索引的那个。`UIComponent#visitTree()` 不会这样做；路径中的任何迭代器组件实际上都会遍历其模型值，并有效地返回多个\
  \ `UIMessage` 组件，每个组件都带有包含迭代索引的正确客户端 ID。\n最后，必须使用 `true` 调用 `SearchKeywordContext#setKeywordResolved()`，以告知搜索上下文该关键字已成功解析，即使它实际上解析为空。如果你忘记这样做，实际上不会造成任何损害，但如果你不这样标记搜索关键字已解析，那么搜索上下文将继续咨询所有其他搜索关键字解析器，这最终可能会降低效率。\n\
  \n最后，为了让新的 `MessagesKeywordResolver` 运行，按如下方式在 `faces-config.xml` 中注册它：\n\n```\n\
  \ncom.example.project.MessagesKeywordResolver\n\n```\n\n或者，在 `@WebListener` 中以编程方式注册，如下所示：\n\
  \n```\n@WebListener\npublic class ApplicationConfig implements ServletContextListener\
  \ {\n@Override\npublic void contextInitialized(ServletContextEvent event) {\nFacesContext.getCurrentInstance().getApplication()\n\
  .addSearchKeywordResolver(new MessagesKeywordResolver());\n}\n}\n```\n\n请注意，此时 `FacesContext`\
  \ 必须可用，因此 `ServletContainerInitializer` 不一定能工作；并且 `FacesServlet` 可能尚未处理过请求，因此在某个受管\
  \ bean 中注册也不一定能工作。\n\n脚注\n\n13. 安全性\n\n\n\nWeb 应用程序的安全性是一个广泛的领域，涵盖了许多主题，例如保护对资源的访问、防范各种类型的注入攻击，以及防止用户被诱骗代表攻击者执行恶意操作。\n\
  \nJakarta Faces 通过多种方式支持这些主题，要么提供原生解决方案，要么与 Jakarta EE 平台的设施集成。对于资源访问（包括身份验证（调用者证明其身份）和授权（系统确定调用者有权访问哪些资源）），Jakarta\
  \ Faces（JavaServer Faces）与 Jakarta EE 安全机制集成，而该机制又由 Servlet 规范和 Jakarta EE 安全规范等定义。\n\
  \nJakarta EE 安全（JSR 375）在 Jakarta EE 8 中同时被 Web 和完整配置文件支持。此外，参考实现 Soteria 可在 Jakarta\
  \ EE 7 服务器上运行，并且由于它构建在 JASPIC（Jakarta EE 身份验证 SPI）（JSR 196）之上，因此它也可以在支持 JASPIC 的\
  \ Servlet 容器（例如 8.5 版本以上的 Tomcat 和 7.0 版本以上的 Jetty）上运行。\n\n**Jakarta EE 安全概述与历史**\n\
  \n在 Jakarta EE 中，安全性并非在单个规范中定义，而是实际上分布在多个规范中，这些规范以各种方式相互集成。虽然这允许安全性的不同方面以各自的速度演进，并且实际上甚至允许某些方面被非规范实现所取代，但这确实模糊了哪个规范负责什么的问题。\n\
  \n在本介绍性部分中，我们将首先提供一些组件的概览以及它们如何组合在一起。我们将重点关注安全的 Web 方面。安全性也存在于 Jakarta 企业 Beans（Enterprise\
  \ JavaBeans）和 JCA（Java 连接器架构）连接器等中，但这些超出了本书的范围。\n\n从历史上看，Jakarta EE 的安全性主要基于 Jakarta\
  \ Servlet 规范引入的安全模型，即核心元素是“身份验证机制”（`FORM`、`BASIC` 等）、`web.xml` 中的一组安全约束（其中特定模式（URL\
  \ 模式）与一组角色（包括空集合）相结合），以及一些以编程方式测试调用者详细信息的方法，例如 `HttpServletRequest.isUserInRole`。\n\
  \n虽然有效，但在早期许多细节被遗漏了。Servlet 规范确实要求实现（Servlet 容器）在身份验证机制方面是可扩展的，但没有具体说明应该如何实现。同样，Servlet\
  \ 规范隐含地要求一个“身份存储”（文件、数据库、LDAP 等），用于保存调用者的详细信息，如凭据、名称和角色，但将所有关于如何配置这些的细节留给了 Servlet\
  \ 容器。\n\nServlet 规范没有定义任何以编程方式访问 `web.xml` 中定义的安全约束的方法，也没有定义以编程方式影响其执行的方法（例如，使某些约束基于时间）。此外，Servlet\
  \ 规范的早期版本没有以最严格的方式指定约束解析，这允许各种 Servlet 容器在解释上存在一些细微差异。\n\n第一个解决这些问题的附加规范是 JACC（JSR\
  \ 115），简单来说，它处理授权问题。JACC 规定了 `web.xml` 安全约束应如何在代码中表示，即作为一组 *Permission* 实例。JACC\
  \ 还规定了如何通过代码访问（查询）这些实例，并最终允许自定义授权模块替换或增强容器为确定其访问决策而执行的逻辑。关于 JACC，可能有点难以理解的是，它本身并不是一个可以独立实现然后添加到\
  \ Servlet 容器中的东西（就像我们可以对 Jakarta Faces 所做的那样），而是标准化并更简洁地规定了所有 Servlet 容器内部已经在做的事情。\n\
  \n第二个解决上述问题的附加规范是 JASPIC（JSR 196），它处理身份验证问题。JASPIC 规定了 Servlet 容器应在何时调用身份验证机制，并为这些身份验证机制定义了一个明确的接口类型，因此自定义身份验证机制可以使用此接口而不是\
  \ Servlet 容器的专有接口，从而具有可移植性。JASPIC 对身份存储有一些规定，但太少以至于在实践中无法真正使用。与 JACC 一样，JASPIC 也不是可以独立实现的东西，但它标准化了所有\
  \ Servlet 容器已经在做的事情。\n\nJACC 和 JASPIC 都定义了低级别的 SPI（服务提供者接口），这些接口主要旨在由供应商实现和使用，以提供扩展产品。它们相当简陋且相当抽象。因此，它们不是面向应用程序开发人员的（丰富的）API（应用程序编程接口）。这就是\
  \ Jakarta EE 安全 API（JSR 375）的用武之地。Jakarta EE 安全提供了 JASPIC 身份验证模块的更高级别、更易于注册（只需实现接口）且更易于使用（基于\
  \ CDI）的版本。Jakarta EE 安全 API 还完整定义了身份存储构件，但也许最重要的是，它提供了所有这些构件的多个具体实现，其中包括一个针对 Jakarta\
  \ Faces 使用而优化的基于 FORM 的身份验证机制，以及多个身份存储，例如 JDBC（Java 数据库连接）存储和 LDAP（轻量级目录访问协议）存储。\n\
  \nJakarta EE 安全 API 的 RI（参考实现）称为 Soteria。此实现当然由 Jakarta EE RI GlassFish 提供。Soteria\
  \ 与 Mojarra 和 MyFaces 一样，被设计为基本上可以在每个 Servlet 容器上独立运行，前提是该容器符合 JASPIC 规范（正如本章引言中提到的，Tomcat\
  \ 和 Jetty 都符合）。它的依赖项（在撰写本文时，针对 Soteria 2.0）是 CDI 3.0 和表达式语言 4.0。这两个依赖项由所有 Jakarta\
  \ EE 实现提供。Servlet 容器通常提供 EL（表达式语言）支持，而 CDI 可以单独添加，例如使用 RI Weld。对于少数 *可选* 功能，Soteria\
  \ 利用了符合 JACC 规范的 Servlet 容器。\n\n\n\n保护对资源的访问\n在 Jakarta Faces 中，需要保护的主要资源是通过 URL\
  \ 模式访问的视图。因此，我们需要为这些 URL 模式定义安全约束。这些约束主要在 `web.xml` 中定义。事实上，从 Jakarta EE 10 开始，`web.xml`\
  \ 几乎是唯一可以为 Jakarta Faces 视图定义安全约束的有效位置。\n\nJakarta EE 有三种安全约束：\n\n*   排除\n*   未检查\n\
  *   按角色\n\n排除\n“**排除**”，也称为“拒绝所有”，意味着任何外部调用者都将被拒绝访问此约束所涵盖的资源。有人可能会问这种约束的目的是什么。如果资源永远无法被访问，那么这些资源一开始为什么存在？答案有两点。其一，单个应用程序可能为不同目的而配置。排除安全约束是一种快速禁用某些不适用于应用程序特定配置的资源的简单方法。一个更重要的用例是能够区分资源的外部使用和内部使用。这里的关键见解是，安全约束仅应用于对该资源的外部请求，即调用者请求\
  \ `https://example.com/resources/template.xhtml`，但**不**应用于内部请求，例如包含、转发以及从类路径或文件系统加载资源的任何方法。这对于\
  \ Jakarta Faces 尤其重要，因为复合组件存在一个不太理想的设计选择。复合组件是通过 Facelet 而非 Java 类实现的组件。按照惯例，它们必须放置在位于\
  \ Web 根目录下的名为 `/resources` 的目录内的子目录中，例如 `/resources/bar/foo.xhtml`。这将使复合组件“`foo`”在命名空间\
  \ `jakarta.faces.composite/bar` 中可用。\n\n组件当然不是视图，调用者不应能够直接请求它们。不幸的是，`/resources`\
  \ 对于 Jakarta EE 来说并不是一个特殊的目录。Jakarta Faces 按照惯例赋予了它特殊含义，但对于 Servlet 容器来说，它和其他目录一样。这特别意味着它没有应用任何保护，任何调用者都可以直接从中请求资源。换句话说，这个目录是“未检查”的，也称为“全局可读”。即使使用\
  \ `*.xhtml` 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行这些组件。显然，这不是我们想要的。对此有两种解决方案：\n\n*   配置另一个目录作为\
  \ Jakarta Faces 资源目录。\n*   在 `web.xml` 中添加上述安全约束。\n\n通过 `jakarta.faces.WEBAPP_RESOURCES_DIRECTORY`\
  \ 上下文参数，可以将另一个目录配置为 Jakarta Faces 资源目录，而不是 `/resources`。例如：\n\n```\njakarta.faces.WEBAPP_RESOURCES_DIRECTORY\n\
  WEB-INF/resources\n\n```\n\n请注意，该路径是相对于 Web 根目录的，并且不能以“`/`”开头。\n\n虽然这对我们自己的应用程序来说是一个好的默认设置，但它仍然不能完全保护我们。也就是说，第三方\
  \ JAR 仍然可以通过 `/resources` 提供其资源，并且不受该上下文参数的影响。因此，需要前面提到的“排除”约束。它看起来如下：\n\n```\n\n\
  /resources 文件夹\n/resources/*\n\n```\n\n可以看出，定义*排除*约束归结为定义我们希望约束的 URL 模式，而不定义任何特定的约束。\n\
  \n未检查\n“**未检查**”，也称为“允许所有”、“公开”和“全局可读”，意味着所有调用者，无论是否经过身份验证，都可以访问此“约束”所涵盖的资源。在内部，可能存在一个显式约束，但在\
  \ `web.xml` 中，这个“约束”只是通过不为某个 URL 模式定义任何约束来定义的。换句话说，没有被任何其他模式显式覆盖的每个 URL 都是“未检查”的。\n\
  \n按角色\n“**按角色**”意味着一个所谓的角色与一个 URL 模式相关联，并且经过身份验证的调用者必须拥有该角色才能访问该资源。角色本身通常被视为具有严格语义的概念，但它本质上不过是一个不透明的字符串，需要与经过身份验证的调用者关联的字符串集合以及\
  \ URL 模式关联的字符串集合相匹配。该字符串的内容完全由应用程序决定，这意味着它可以是“调用者类型”，例如“`admin`”、“`user`”等，也可以是细粒度的内容，例如“`may_add_item`”，甚至是像“`AYUDE-OPWR-BM1OP`”这样的令牌。\n\
  \n以下是一个示例：\n\n```\n\n用户页面\n/user/*\n\nVIEW_USER_PAGES\n\n管理员页面\n/admin/*\n\nVIEW_ADMIN_PAGES\n\
  \nVIEW_USER_PAGES\n\nVIEW_ADMIN_PAGES\n\n```\n\n在前面的片段中，我们定义了两个安全约束——一个用于 `/user/*`\
  \ 模式，调用者需要拥有角色“`VIEW_USER_PAGES`”；另一个用于 `/admin/*` 模式，调用者需要拥有角色“`VIEW_ADMIN_PAGES`”。有了上述约束，访问例如\
  \ `/user/account.xhtml` 的调用者必须经过身份验证并且拥有提到的角色。\n\n一个 auth-constraint 可以包含多个角色，这些角色之间应用“或”语义。这意味着经过身份验证的调用者只需要拥有该约束中的其中一个角色即可被授予访问权限。约束还可以限制为特定的\
  \ HTTP 方法（例如 GET 或 POST）。但这有一个注意事项，因为默认情况下，所有未指定的方法都将是未检查的（公开的）。这可以通过使用顶级的 `<deny-uncovered-http-methods/>`\
  \ 标签来应对。以下是一个示例：\n\n```\n\n用户页面\n/user/*\nGET\nPOST\n\nVIEW_USER_PAGES\n\n```\n\n\
  \n\n设置认证机制\n在定义安全约束之后，我们需要设置调用者如何进行身份验证。负责与调用者交互（即以特定方式向调用者索取凭证）的构件被称为“认证机制”。Jakarta\
  \ EE 提供了多种现成的认证机制。Servlet 规范提供了四种，即 `FORM`、`BASIC`、`DIGEST` 和 `CERT`，而 Jakarta EE\
  \ Security 也提供了 `FORM` 和 `BASIC`（区别在于它们对应的是 CDI bean），同时还提供了一种名为“自定义 `FORM`”的 `FORM`\
  \ 变体。\n`FORM` 和自定义 `FORM` 都适用于交互式 Web 应用程序，例如我们主要使用 Jakarta Faces 构建的那些应用。与 `BASIC`\
  \ 不同，`FORM` 认证机制会回调应用程序，让其渲染向调用者索取凭证的表单，这也是这些机制名称的由来。\n两者之间的主要区别在于，机制在渲染表单后，要求应用程序如何继续所谓的认证对话。在\
  \ `FORM` 中，这是通过让调用者将填写好的表单提交到虚拟 URL `j_security_check` 来实现的；而在自定义 `FORM` 中，这是通过编程方式调用注入的\
  \ `SecurityContext` 来完成的。不过，这个微小的差异对 Jakarta Faces 来说却至关重要。在 Jakarta Faces 中，表单视图默认会提交到其请求来源的同一\
  \ URL，因此回发到单个机制强制要求的 URL 完全不自然。除此之外，在 Jakarta Faces 中，我们经常需要在回发后运行服务器端代码；想想转换器、验证器以及发出\
  \ faces 消息的能力。如果必须回发到虚拟的非 faces 的 `j_security_check` URL，我们实际上无法做到这些，但当我们能够从后台 bean\
  \ 的动作方法中以编程方式继续认证对话时，这就相当可行了。\n我们将首先向您展示如何配置 Web 应用程序以使用自定义 `FORM` 认证机制。稍后，我们将解释如何实际使用\
  \ Jakarta Faces 来满足该机制对应用程序施加的要求。\n\nJakarta EE Security 提供的所有认证机制都通过其自身的 `AuthenticationMechanismDefinition`\
  \ 注解进行安装和配置。该注解告诉容器要安装哪种类型的认证机制以及使用何种配置。该注解可以放置在类路径上的几乎所有类上。从逻辑上讲，它与 `@FacesConfig`\
  \ 注解配合得很好。以下是一个示例：\n\n```\n@CustomFormAuthenticationMechanismDefinition(\nloginToContinue\
  \ = @LoginToContinue(\nloginPage = \"/login.xhtml\",\nerrorPage = \"\"\n)\n)\n@FacesConfig\
  \ @ApplicationScoped\npublic class ApplicationConfig {\n// ...\n}\n```\n\n这里一个可能有点不幸的要求是，必须指定\
  \ `errorPage` 属性并将其设置为空字符串。这是必要的，因为 `@LoginToContinue` 元素对于实际的错误页面有一个默认值。在 Jakarta\
  \ Faces 中，我们很少使用显式的错误页面来显示错误，而是通过 faces 消息在原始页面上重新显示错误信息。\n请注意，当前版本的 Jakarta EE\
  \ Security 只允许同时激活一个认证机制。从技术上讲，当容器遇到 `@CustomFormAuthenticationMechanismDefinition`\
  \ 注解时，它会在系统中添加一个类型为 `HttpAuthenticationMechanism` 的已启用 CDI bean。了解这一点很重要，因为它是一个常规的\
  \ CDI bean，意味着我们可以注入它、装饰它、拦截它，并且基本上可以对它执行我们通常对 CDI bean 能做的所有操作。\n`loginToContinue`\
  \ 属性用于配置当调用者试图访问受保护视图时容器转发到的视图。这被称为“容器发起的认证”；容器启动认证对话，而不是应用程序。\n\n请注意，默认是*转发*到登录页面，这意味着如果调用者试图访问\
  \ `https://example.com/foo.xhtml`，并且 `/foo.xhtml` 是受保护的，调用者仍然会在地址栏中看到 `/foo.xhtml`，而不是\
  \ `/login.xhtml`。然而，回发目标是 `/login.xhtml`，因此在输入凭证后，调用者会在地址栏中看到这个地址。或者，我们可以配置 `loginToContinue`\
  \ 属性使用重定向。\n\n```\n@CustomFormAuthenticationMechanismDefinition(\nloginToContinue\
  \ = @LoginToContinue(\nloginPage = \"/login.xhtml\",\nuseForwardToLogin = false,\n\
  errorPage = \"\"\n)\n)\n@FacesConfig @ApplicationScoped\npublic class ApplicationConfig\
  \ {\n// ...\n}\n```\n\n设置身份存储\n在声明了安全约束并设置了想要用于身份验证的机制之后，还剩下最后一块拼图：设置包含调用者数据（如凭证、姓名和角色）的构件。在\
  \ Jakarta EE Security 中，这个构件被称为身份存储。\nJakarta EE 提供了两种现成的身份存储：一种用于连接数据库，另一种用于连接\
  \ LDAP（轻量级目录访问协议）。Jakarta EE Security 参考实现（Soteria）还附带了一个嵌入式身份存储。大多数应用服务器会提供它们自己的额外身份存储，这些通常是在应用程序外部配置的（例如，通过管理控制台、CLI\
  \ 或存储在服务器内部的 XML 配置文件）。\n设置和配置 Jakarta EE Security 提供的身份存储以及参考实现提供的身份存储，其方式与认证机制类似：通过\
  \ `IdentityStoreAnnotation`。就像认证机制版本一样，这会导致容器在系统中添加一个已启用的 CDI bean，这次是实现 `IdentityStore`\
  \ 接口的 bean。\n\n以下示例与我们之前对认证机制的定义一起展示：\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
  loginToContinue = @LoginToContinue(\nloginPage = \"/login.xhtml\",\nuseForwardToLogin\
  \ = false,\nerrorPage = \"\"\n)\n)\n@EmbeddedIdentityStoreDefinition({\n@Credentials(\n\
  callerName = \"admin@example.com\",\npassword = \"secret1\",\ngroups = { \"VIEW_USER_PAGES\"\
  , \"VIEW_ADMIN_PAGES\" }\n),\n@Credentials(\ncallerName = \"user@example.com\",\n\
  password = \"secret2\",\ngroups = { \"VIEW_USER_PAGES\" })\n)\n})\n@FacesConfig\
  \ @ApplicationScoped\npublic class ApplicationConfig {\n// ...\n}\n```\n\n\n\n上述操作会创建一个嵌入式（内存中）的身份存储，其中包含两个调用者（用户）：第一个用户属于“`VIEW_USER_PAGES`”和“`VIEW_ADMIN_PAGES`”组，第二个用户仅属于“`VIEW_USER_PAGES`”组。身份验证机制将使用此身份存储来验证凭证（调用者名称和密码）是否匹配，如果匹配，则从身份存储中获取正确的组。\n\
  \n细心的读者可能会注意到术语发生了变化。之前我们讨论的是“角色”，而突然之间变成了“组”。这是错误吗？其实不然。组和角色之间存在细微差别。对于容器而言，两者都只是不透明的字符串，但组可以*选择性地*映射到角色。我们在此不进一步详述此过程，但只需说明，默认情况下，Jakarta\
  \ EE 强制要求所谓的 1:1 组到角色映射，这基本上意味着组和角色是相同的。\n\n为了更好地理解身份存储，我们在此再举两个例子。第一个例子，我们将介绍 Jakarta\
  \ EE Security API 提供的身份存储之一——数据库身份存储。此存储通过 `@DatabaseIdentityStoreDefinition` 注解激活和配置*。*需要配置的三个最重要的属性是：数据源（代表\
  \ SQL 数据库）、根据调用者名称获取（哈希后的！）密码的 SQL 查询，以及根据调用者名称识别调用者所属组的 SQL 查询。示例如下：\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
  loginToContinue = @LoginToContinue(\nloginPage = \"/login.xhtml\",\nerrorPage =\
  \ \"\"\n)\n)\n@DatabaseIdentityStoreDefinition(\ndataSourceLookup = \"java:app/MyDataSource\"\
  ,\ncallerQuery = \"SELECT password FROM caller WHERE name = ?\",\ngroupsQuery =\
  \ \"SELECT name FROM groups WHERE caller_name = ?\"\n)\n@DataSourceDefinition(\n\
  name = \"java:app/MyDataSource\",\nclassName = \"org.h2.jdbcx.JdbcDataSource\",\n\
  url=\"jdbc:h2:~/test;MODE=LEGACY;DB_CLOSE_ON_EXIT=FALSE\"\n)\n@FacesConfig @ApplicationScoped\n\
  public class ApplicationConfig {\n// ...\n}\n```\n\n在此示例中，使用 `org.h2.jdbcx.JdbcDataSource`\
  \ 驱动程序为 H2 数据库定义了数据源。当然，对于任何其他拥有 JDBC 驱动程序的数据库，都可以类似地完成此操作。或者，也可以在应用程序外部定义数据源。我们使用的调用者查询是“`select\
  \ password from caller where name = ?`”，这意味着我们假设一个表至少包含两列——一列保存调用者名称，另一列保存哈希后的密码。例如，可以通过以下\
  \ SQL 语句创建这样的表：\n\n```\nCREATE TABLE caller(\nname VARCHAR(32) PRIMARY KEY,\npassword\
  \ VARCHAR(255)\n)\n```\n\n我们用于组的查询是“`select name from groups where caller_name =\
  \ ?`”，这假设一个表至少包含两列——调用者名称和组名称，调用者所属的每个组对应一行。例如，可以通过以下 SQL 语句创建这样的表：\n\n```\nCREATE\
  \ TABLE caller_groups(\ncaller_name VARCHAR(32),\nname VARCHAR(32)\n)\n```\n\n在填充调用者表时，必须注意密码列默认使用哈希算法，即\
  \ `PBKDF2WithHmacSHA256`。可以通过设置迭代次数、密钥大小和盐值大小来（应该）自定义此算法。\n除了使用 Jakarta EE Security\
  \ API 提供的身份存储，我们还可以选择提供自己的自定义身份存储。一个常见的用例是使用应用程序自身的服务来加载特定于应用程序的用户数据。\n\n以下展示了此类身份存储的示例：\n\
  \n```\n@ApplicationScoped\npublic class UserServiceIdentityStore implements IdentityStore\
  \ {\n@Inject\nprivate UserService userService;\n@Override\npublic CredentialValidationResult\
  \ validate(Credential credential) {\nUsernamePasswordCredential login =\n(UsernamePasswordCredential)\
  \ credential;\nString email = login.getCaller();\nString password = login.getPasswordAsString();\n\
  Optional optionalUser =\nuserService.findByEmailAndPassword(email, password);\n\
  if (optionalUser.isPresent()) {\nUser user = optionalUser.get();\nreturn new CredentialValidationResult(\n\
  user.getEmail(),\nuser.getRolesAsStrings()\n);\n}\nelse {\nreturn CredentialValidationResult.INVALID_RESULT;\n\
  }\n}\n}\n```\n\n无需特定注册；只需将前面给出的类存在于应用程序中（在其类路径上）。有了这样的自定义身份存储，`ApplicationConfig`\
  \ 类因此就不需要任何身份存储的配置了。\n\n```\n@CustomFormAuthenticationMechanismDefinition(\nloginToContinue\
  \ = @LoginToContinue(\nloginPage = \"/login.xhtml\",\nerrorPage = \"\"\n)\n)\n@FacesConfig\
  \ @ApplicationScoped\npublic class ApplicationConfig {\n// ...\n}\n```\n\n前面给出的\
  \ `UserServiceIdentityStore` 将大部分工作委托给 `UserService`，后者负责处理应用程序中的 `User` 实体。全面讨论此类服务超出了本书的范围，但我们可以想象它可以使用，例如，Jakarta\
  \ Persistence 来持久化和加载 `User` 实体。我们的自定义身份存储使用该服务，尝试根据通过凭证传入的用户名和密码查找 `User`。如果返回了\
  \ `User` 实例，则表示该名称对应一个现有用户，并且密码正确。在这种情况下，身份存储会返回 `CredentialValidationResult`，它执行两项操作：指示身份验证成功，并向容器提供最终将用于为当前请求设置已验证身份的数据。如果服务找不到该用户，则说明用户名或密码错误。在这种情况下，存储返回\
  \ `INVALID_RESULT` 以指示身份验证未成功。\n\n提供我们自定义的 Jakarta Faces 代码\n在前面的章节中，我们首先定义了安全约束（哪些视图受到保护），然后设置了身份验证机制（调用者如何与我们的应用程序交互以进行身份验证），最后设置了身份存储（调用者数据所在的位置）。\n\
  现在是时候将我们自己的自定义代码插入到身份验证过程中了。这主要通过提供身份验证机制在需要收集调用者凭证（本例中为电子邮件和密码）时重定向到的视图来实现。\n\n\
  登录页面可以保持相对简单——一个标准表单页面，包含两个绑定到我们后台 bean 的输入字段，以及一个用于提交的按钮。\n\n```\n\n登录\n\n登录\n\n\
  ```\n\n前面的页面是一个完全正常的 Jakarta Faces 视图。这特别意味着，与 `FORM` 身份验证中经典的 HTML `<form method=\"\
  post\" action=\"j_security_check\">` 不同，身份验证机制不会以任何方式监视回发 URL，因此对收集凭证的输入元素没有任何限制。\n\
  相反，Jakarta Faces 后台 bean 必须收集这些凭证，然后以编程方式传递它们，并通知身份验证机制继续对话。在传递凭证之前，Jakarta Faces\
  \ 可以自由地进行自己的验证，并与调用者进行自己的对话，而无需身份验证机制参与其中。请注意，命令按钮明确不使用 Ajax 提交。您也可以使用 Ajax，但那样普通的\
  \ Web 浏览器就不会提示最终用户记住登录凭据了。\n\n\n\n以下展示了处理登录调用的支持 bean 的完整示例。我们将在下文逐一讨论各个部分。\n\n\
  ```\n@Named @RequestScoped\npublic class Login {\n@NotNull\n@Email\nprivate String\
  \ email;\n@NotNull\n@Size(min = 8, message = \"Password must be at least 8 characters\"\
  )\nprivate String password;\n@Inject\nprivate SecurityContext securityContext;\n\
  @Inject\nprivate ExternalContext externalContext;\n@Inject\nprivate FacesContext\
  \ facesContext;\npublic void submit() {\nswitch (continueAuthentication()) {\ncase\
  \ SEND_CONTINUE:\nfacesContext.responseComplete();\nbreak;\ncase SEND_FAILURE:\n\
  facesContext.addMessage(null, new FacesMessage(\nFacesMessage.SEVERITY_ERROR, \"\
  Login failed\", null));\nbreak;\ncase SUCCESS:\nfacesContext.addMessage(null, new\
  \ FacesMessage(\nFacesMessage.SEVERITY_INFO, \"Login succeed\", null));\nbreak;\n\
  case NOT_DONE:\n// 此处不会发生\n}\n}\nprivate AuthenticationStatus continueAuthentication()\
  \ {\nreturn securityContext.authenticate(\n(HttpServletRequest) externalContext.getRequest(),\n\
  (HttpServletResponse) externalContext.getResponse(),\nAuthenticationParameters.withParams().credential(\n\
  new UsernamePasswordCredential(email, password))\n);\n}\npublic String getEmail()\
  \ {\nreturn email;\n}\npublic void setEmail(String email) {\nthis.email = email;\n\
  }\npublic String getPassword() {\nreturn password;\n}\npublic void setPassword(String\
  \ password) {\nthis.password = password;\n}\n}\n```\n\n我们以两个与所收集凭证对应的实例变量开始支持 bean。\n\
  \n```\n@NotNull\n@Email\nprivate String email;\n@NotNull\n@Size(min = 8, message\
  \ = \"Password must be at least 8 characters\")\nprivate String password;\n```\n\
  \n这清楚地展示了相对于 `FORM` 认证机制的优势，即我们可以使用 Jakarta Bean Validation 轻松预验证用户的输入。由于 Jakarta\
  \ Faces 与 Jakarta Bean Validation 内置集成，如果输入未通过验证，将提供标准 faces 消息以供渲染。\n\n接下来，我们定义了需要注入的上下文对象。这些对象是：\n\
  \n```\n@Inject\nprivate SecurityContext securityContext;\n@Inject\nprivate ExternalContext\
  \ externalContext;\n@Inject\nprivate FacesContext facesContext;\n```\n\n细心的读者会认出\
  \ `ExternalContext` 和 `FacesContext` 是两个众所周知的 Jakarta Faces 原生类，而 `SecurityContext`\
  \ 则显得与众不同。这个类来自 Jakarta EE Security，我们将在此处使用它与认证机制进行通信。\n\n对话的继续发生在 `continueAuthentication()`\
  \ 方法中，如下所示：\n\n```\nprivate AuthenticationStatus continueAuthentication() {\nreturn\
  \ securityContext.authenticate(\n(HttpServletRequest) externalContext.getRequest(),\n\
  (HttpServletResponse) externalContext.getResponse(),\nAuthenticationParameters.withParams().credential(\n\
  new UsernamePasswordCredential(email, password))\n);\n}\n```\n\n对 `SecurityContext#authenticate()`\
  \ 的调用将再次触发认证机制。由于该机制将处于等待传递凭证的状态，因此它确实会查找我们传入的凭证并使用它们继续执行。稍后我们将看到，我们也可以请求丢弃任何可能存在的状态并启动新的对话。请注意，我们必须将请求和响应对象转换为\
  \ `HttpServletRequest` 和 `HttpServletResponse`。不幸的是，这是必要的，因为 `ExternalContext` 抽象了\
  \ Servlet 和 Portlet 请求，并且对于这两个对象仅返回 `Object`。\n\n`SecurityContext#authenticate()`\
  \ 方法返回一个状态，该状态大致指示了认证机制所执行的操作。我们的 Jakarta Faces 支持 bean 的动作方法必须处理以下情况：\n\n```\n\
  switch (continueAuthentication()) {\ncase SEND_CONTINUE:\nfacesContext.responseComplete();\n\
  break;\ncase SEND_FAILURE:\nfacesContext.addMessage(null, new FacesMessage(\nFacesMessage.SEVERITY_ERROR,\
  \ \"Login failed\", null));\nbreak;\ncase SUCCESS:\nfacesContext.addMessage(null,\
  \ new FacesMessage(\nFacesMessage.SEVERITY_INFO, \"Login succeed\", null));\nbreak;\n\
  case NOT_DONE:\n// 此处不会发生\n}\n```\n\n可以看出，有四种可能的结果。\n第一种是 `SEND_CONTINUE`，基本上意味着“认证进行中”。当认证机制再次接管对话时（例如，通过渲染其自身的响应，或者更可能的是，将调用者重定向到新位置），它会返回此状态。Jakarta\
  \ Faces 支持 bean 应确保通过调用 `FacesContext#responseComplete()` 来结束 Jakarta Faces 生命周期，并且不再以任何方式与响应本身交互。\n\
  第二种是 `SEND_FAILURE`，基本上意味着“认证失败”。当认证机制无法验证所提供的凭证时，会返回此状态。在大多数情况下，这是因为调用者提供了错误的凭证。Jakarta\
  \ Faces 支持 bean 可以通过设置 faces 消息并重新显示登录表单来对此做出响应。\n第三种状态是 `SUCCESS`，意味着“认证成功”。当认证机制成功验证所提供的凭证时，会返回此状态。只有在返回此状态之后，`HttpServletRequest#getUserPrincipal()`、`SecurityContext#getCallerPrincipal()`\
  \ 等才会返回非 `null` 值，以指示当前调用者已通过认证。Jakarta Faces 支持 bean 可以通过多种方式对此做出响应（例如，设置 faces\
  \ 消息并继续渲染视图，或者自行发出重定向）。\n第四种也是最后一种状态是 `NOT_DONE`，当认证机制选择根本不进行认证时返回此状态。例如，当提前调用认证机制但认证似乎并非必要时，就会发生这种情况。通常，Jakarta\
  \ Faces 支持 bean 在此处无需采取任何特殊操作。\n\n调用者发起的认证\n前面的代码讨论了未认证的调用者尝试访问受保护资源（URL/页面）并且认证对话自动启动的情况。由于此认证对话由容器启动，我们称之为“容器发起的认证”。\n\
  另一种情况是调用者显式启动认证对话（例如，通过单击“登录”按钮）。由于调用者启动此对话，我们称之为“调用者发起的认证”。\n在调用者发起的认证情况下，核心认证机制实际上是直接调用的，并且平台提供的“登录以继续”功能被跳过。这意味着，如果认证机制依赖“登录以继续”来重定向到登录页面，并在认证后重定向回受保护资源，那么当应用程序以编程方式触发认证时，这两个操作都不会发生。\n\
  \n我们之前通过注解定义的 `CustomFormAuthenticationMechanism` 确实是一种使用平台“登录以继续”服务的机制，因此我们将通过定向到之前使用的同一个登录视图来启动认证对话。为了表明这是一个新的登录，提供了一个额外的请求参数。我们启动的视图如下所示：\n\
  \n```\n\n欢迎\n\n已登录为 #{request.userPrincipal}\n\n```\n\n在支持 bean 中，我们将注入两个额外的对象：一个用于获取和存储上述请求参数的实例，以及一个对\
  \ `Flash` 的引用，我们稍后将使用它。\n\n```\n@Inject\nprivate Flash flash;\n@Inject @ManagedProperty(\"\
  #{param.new}\")\nprivate boolean isNew;\n```\n\n\n\n托管 Bean 的作用域需要改为 `@ViewScoped`，这样我们才能在登录表单回传后保留\
  \ `isNew` 实例变量的值。\n一个重要的补充是在 `SecurityContext#authenticate()` 方法中，我们现在将提供一个额外的参数：`newAuthentication`*。*\n\
  不过，身份验证机制并非严格需要此参数，它只是足够智能，能够区分初始的新身份验证和继续正在进行的身份验证对话。然而，当调用者处于身份验证对话过程中，然后导航离开，稍后又明确点击登录按钮时，事情就变得复杂了。如果与该对话关联的状态在那时尚未过期，身份验证机制就不知道需要新的身份验证，并且很可能会继续那个已中止但仍然有效的对话。\n\
  \n为了防止这种情况，我们可以通过将 `newAuthentication` 设置为 `true` 来强制进行新的身份验证。这将丢弃所有现有状态。修改后的 `continueAuthentication()`\
  \ 方法如下所示：\n\n```\nprivate AuthenticationStatus continueAuthentication() {\nreturn\
  \ securityContext.authenticate(\n(HttpServletRequest) externalContext.getRequest(),\n\
  (HttpServletResponse) externalContext.getResponse(),\nAuthenticationParameters.withParams()\n\
  .newAuthentication(isNew).credential(\nnew UsernamePasswordCredential(email, password))\n\
  );\n}\n```\n\n请注意，此版本既可用于继续对话的情况，也可用于启动新对话的情况。当我们继续对话时，`isNew` 将简单地设置为 `false`，这恰好也是未指定该参数时的默认值。\n\
  \n当使用 `CustomFormAuthenticationMechanism` 时，我们知道在调用者发起的身份验证中提供凭证后，不会发生任何重定向或向响应写入其他内容，这为我们提供了一个方便的位置来处理调用者通过身份验证后重定向到登录页面的逻辑：即\
  \ `SUCCESS` 情况。\n\n```\ncase SUCCESS:\nflash.setKeepMessages(true);\nfacesContext.addMessage(null,\
  \ new FacesMessage(\nFacesMessage.SEVERITY_INFO, \"Login succeed\", null));\nexternalContext.redirect(\n\
  externalContext.getRequestContextPath() + \"/index.xhtml\");\nbreak;\n```\n\n我们在此处将调用者重定向到\
  \ `index.xhtml` 登录页面。请注意，这也是调用者发起身份验证对话的视图，但这在本示例中只是巧合。通常，应用程序开发者可以完全自由地选择将调用者重定向到的视图甚至\
  \ URL。通常会选择某种登录页面，它可以是应用程序的首页，也可以是调用者主要角色对应的仪表板。正如我们之前提到的，当返回 `SUCCESS` 时，调用者已完全通过身份验证。这意味着我们可以查询调用者的角色，并在决定重定向到何处时使用这些角色。\n\
  展望：未来版本的 Jakarta EE Security 可能会引入一种混合选项，其中调用者发起的身份验证仍然可以像容器发起的身份验证一样以相同的重定向开始，并允许应用程序提供重定向回的\
  \ URL。\n\n记住我\n一旦调用者通过了 Jakarta Faces（Web）应用程序的身份验证，我们自然不希望要求调用者每次请求都重新进行身份验证。为了防止这种情况，成功身份验证的结果通常以某种方式与调用者的\
  \ HTTP 会话关联起来。实际上，`CustomFormAuthenticationMechanism` 内部正是使用 Jakarta EE Security\
  \ 提供的“自动应用会话”服务来实现这一点的。该服务存储与成功身份验证相关的数据（至少是调用者名称以及调用者所属的任何组）。虽然实现最终取决于这些数据具体存储在哪里以及生命周期如何，但在实践中，它通常位于服务器内存中与\
  \ HTTP 会话关联的一个特殊部分。这个部分的特殊之处在于它通常是会话作用域的，但数据不能通过 `HttpSession#getAttribute()` 访问。\n\
  为了不耗尽服务器内存，HTTP 会话会在一定时间后过期。典型的过期时间在 10 分钟到 1 小时之间。如果调用者在此时间之后访问应用程序，则需要重新进行身份验证。\n\
  然而，即使是在长达一小时的闲置后重新进行身份验证，通常也是不可取的。但出于上述服务器资源耗尽的原因，延长 HTTP 会话的时长是不可行的。\n这就是“记住我”（remember-me）发挥作用的地方。记住我是一个有点俏皮的术语，指的是将调用者的凭证交换为一个令牌，并且该令牌通常存储在一个与\
  \ HTTP 会话 cookie 不同且具有更长生存时间的 cookie 中。\n记住我令牌有效地充当了调用者的新凭证，而不会暴露调用者的原始密码。记住我令牌基本上可以多次分发，例如，根据调用者用于连接应用程序的设备或\
  \ IP（互联网协议）来分发。必须注意，虽然令牌不会暴露调用者的原始凭证，但它仍然充当访问调用者账户的钥匙，因此应该像对待任何其他类型的凭证一样采取相同的预防措施。具体来说，包含记住我令牌的\
  \ cookie 应仅通过 HTTPS/SSL 发送，并且应用程序不应逐字存储实际令牌，而应存储其强哈希值。\n由于使用记住我的主要原因是避免耗尽服务器内存并实现长生命周期，因此记住我令牌几乎总是存储在稳定的存储中（例如，数据库）。因此，从这种存储中查找比从服务器内存中查找成本更高，如果每次请求都需要执行此操作，尤其是在一直有大量\
  \ Ajax 请求的情况下，这可能会严重影响性能。\n出于这个原因，记住我几乎总是与某种缓存结合使用。`CustomFormAuthenticationMechanism`\
  \ 所使用的服务的模块化特性使得记住我可以插入到前面提到的自动应用会话服务和实际的身份验证机制之间。这样，我们实际上得到了一种内存层次结构；首先尝试在 HTTP\
  \ 会话存储中查找身份验证数据；如果找不到，则尝试记住我服务；如果该服务也不包含数据，则最后尝试身份验证机制。\n\n要使用记住我，需要做两件事：\n\n1.\
  \  为已安装的身份验证机制激活记住我服务\n\n2.  提供一个能够分发和验证记住我令牌的特殊身份存储\n\n\n\n激活“记住我”服务\nJakarta EE\
  \ Security 中的“记住我”服务由一个拦截器表示。通过拦截器绑定注解 `@RememberMe`（即“记住我”服务），可以轻松地将其应用于我们拥有源代码的自定义认证机制。不幸的是，当需要将这些服务应用于一个我们没有源代码、甚至不知道确切实现类型的\
  \ bean 时，就没那么容易了。\n\n由于我们之前示例中一直使用的 `CustomFormAuthenticationMechanism` 确实属于后一种类型，因此需要做更多的工作。本质上，我们需要获取容器提供的实际\
  \ `CustomFormAuthenticationMechanism` 实现的引用，然后使用 CDI 2.0 的 `InterceptionFactory`\
  \ 以编程方式添加 `@RememberMe` 注解。最终结果需要从一个替代生产者方法中返回。\n\n以下代码通过我们之前展示的 `ApplicationConfig`\
  \ bean 中的新方法 `produceAuthenticationMechanism()` 演示了这一点：\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
  loginToContinue = @LoginToContinue(\nloginPage = \"/login.xhtml\",\nuseForwardToLogin\
  \ = false,\nerrorPage = \"\"\n)\n)\n@FacesConfig @ApplicationScoped\n@Alternative\
  \ @Priority(500)\npublic class ApplicationConfig {\n@Produces\npublic HttpAuthenticationMechanism\
  \ produceAuthenticationMechanism(\nInterceptionFactory\ninterceptionFactory, BeanManager\
  \ beanManager\n) {\n@RememberMe\nclass RememberMeClass {};\ninterceptionFactory.configure().add(\n\
  RememberMeClass.class.getAnnotation(RememberMe.class));\nreturn interceptionFactory.createInterceptedInstance(\n\
  new HttpAuthenticationMechanismWrapper(\n(HttpAuthenticationMechanism) beanManager\n\
  .getReference(beanManager\n.resolve(beanManager\n.getBeans((HttpAuthenticationMechanism.class).stream()\n\
  .filter(b -> b.getBeanClass() != ApplicationConfig.class)\n.collect(Collectors.toSet())),\n\
  HttpAuthenticationMechanism.class,\nbeanManager.createCreationalContext(null))));\n\
  }\n}\n```\n\n`ApplicationConfig` bean 使用了 `@Alternative` 和 `@Priority` 注解进行标注。这里使用\
  \ `@Alternative` 是为了表明该生产者不仅仅是一个普通的生产者，而是一个应该被调用来替代任何现有生产者或 bean 的生产者。也就是说，我们在此处生成的\
  \ bean 是 CDI 通常会为注入而选择的同类型 bean 的一个替代品。`@Priority` 用于启用（激活）我们的替代生产者。如果没有这个注解，生产者虽然存在但未被启用，这意味着\
  \ CDI 不会调用它。启用替代品的另一种方法是使用 `beans.xml`。这里的数字 500 用于在启用了多个替代品时进行选择。在这种情况下，将选择数字最大的那个。\n\
  \n前面展示的代码使用了较为知名的 CDI 模式 `BeanManager#getBeans()/resolve()/getReference()` 来获取容器提供的\
  \ `CustomFormAuthenticationMechanism`。这种模式比更简单的 `CDI.current().select(...)` 变体更冗长，但它允许我们过滤掉代表生产者方法的\
  \ `Bean<T>`。在生产者方法内部从该 `Bean<T>` 获取引用会再次调用同一个生产者方法，从而导致递归调用，最终引发堆栈溢出。不用说，这是不希望的，因此我们才需要过滤掉那个特定的\
  \ `Bean<T>`。\n\n从 `BeanManager#getReference()` 返回的 bean 实例几乎肯定是一个代理；`CustomFormAuthenticationMechanism`\
  \ 被指定为应用作用域，并且它隐式地使用了拦截器。由于对现有代理进行代理存在技术难度（考虑到生成的代理通常是 final 类型，并且会使用代理缓存），CDI 2.0\
  \ 对它可以从中创建被拦截实例的对象类型施加了限制。为了绕过这个限制，我们别无选择，只能像前面代码所示那样插入一个额外手动创建的“直通包装器” `HttpAuthenticationMechanismWrapper`\
  \ 实例。这个包装器的代码如下：\n\n```\npublic class HttpAuthenticationMechanismWrapper\nimplements\
  \ HttpAuthenticationMechanism\n{\nprivate HttpAuthenticationMechanism wrapped;\n\
  public HttpAuthenticationMechanismWrapper() {\n//\n}\npublic HttpAuthenticationMechanismWrapper\n\
  (HttpAuthenticationMechanism httpAuthenticationMechanism)\n{\nthis.wrapped = httpAuthenticationMechanism;\n\
  }\npublic HttpAuthenticationMechanism getWrapped() {\nreturn wrapped;\n}\n@Override\n\
  public AuthenticationStatus validateRequest(\nHttpServletRequest request,\nHttpServletResponse\
  \ response,\nHttpMessageContext context) throws AuthenticationException\n{\nreturn\
  \ getWrapped().validateRequest(request, response, context);\n}\n@Override\npublic\
  \ AuthenticationStatus secureResponse(\nHttpServletRequest request,\nHttpServletResponse\
  \ response,\nHttpMessageContext context) throws AuthenticationException\n{\nreturn\
  \ getWrapped().secureResponse(request, response, context);\n}\n@Override\npublic\
  \ void cleanSubject(\nHttpServletRequest request,\nHttpServletResponse response,\n\
  HttpMessageContext context)\n{\ngetWrapped().cleanSubject(request, response, context);\n\
  }\n}\n```\n\n展望：预计未来版本的 Jakarta EE Security 会为上述任务添加一个便捷方法，从而大大简化此工作。\n\n注销\n无论使用哪种登录方法，在某些时候，调用者可能希望显式地注销。在\
  \ Jakarta EE 中，正常的登录（认证）通常主要在每个请求的基础上有效，但各种认证机制或它们所使用的服务（例如 `@AutoApplySession`\
  \ 和 `@RememberMe`）可能会在单个请求之外保持状态，并在每个后续请求中自动重新认证调用者。\n这种状态可能保存在多个地方：cookie 中、HTTP\
  \ 会话中、客户端存储中等。为了注销，我们必须确保清除所有这些状态。在 Jakarta Faces 中，我们可以通过简单地调用 `HttpServletRequest#logout()`\
  \ 方法来实现这一点。这将立即从当前请求中移除已认证的身份，并调用认证机制的 `cleanSubject()` 方法，该方法进而会移除其使用的任何会话数据、cookie\
  \ 等。\n\n以下是一个示例：\n\n```\n@Named @RequestScoped\npublic class Logout {\n@Inject\n\
  private HttpServletRequest request;\npublic void submit() throws ServletException\
  \ {\nrequest.logout();\nrequest.getSession().invalidate();\n}\n}\n```\n\n请注意，为了完全注销，通常最佳实践是同时使会话失效。调用\
  \ `HttpServletRequest#logout()` 应该只移除认证机制使用的会话状态（如果有的话），而在完全注销后，我们通常也不希望任何其他会话状态残留。根据应用程序的设计，注销后通常还会将调用者重定向到应用程序的主页。\n\
  \n\n\n自定义主体\n我们从安全上下文中获取的默认主体，除了名称（更准确地说，是调用者主体名称，也称为用户主体名称）之外，几乎不包含其他信息。这通常是一个唯一名称，并且通常（但不一定）是调用者用于进行身份验证的名称。\n\
  \n在实践中，Web 应用程序几乎总是需要比这个名称更多的信息，并且通常需要一个更丰富的、特定于应用程序的模型对象来表示用户。此模型对象的生命周期需要与主体的生命周期紧密耦合。\n\
  \n例如，如果调用者在请求中途注销，则关联的模型对象必须立即消失；如果调用者紧接着（可能仍在同一请求中）再次登录，则必须提供一个新的模型对象。\n\n有多种模式可以实现这一点，其中一些包括\
  \ Servlet 过滤器，另一些则包含 CDI 生产者。不过，我们这里要展示的模式涉及自定义主体。\n\n自定义主体意味着身份存储返回一个特定的 `Principal`\
  \ 类型，而不是仅仅提供一个 `String` 并让容器决定类型。然后，这个特定的 `Principal` 类型可以*包含*我们的模型对象（聚合），或者*成为*模型对象（继承）。这里我们将给出一个聚合方法的示例。\n\
  \n首先，考虑以下自定义 `Principal`：\n\n```\npublic class UserPrincipal extends CallerPrincipal\
  \ {\nprivate final User user;\npublic UserPrincipal(User user) {\nsuper(user.getEmail());\n\
  this.user = user;\n}\npublic User getUser() {\nreturn user;\n}\n}\n```\n\n这个主体继承自\
  \ `jakarta.security.enterprise.CallerPrincipal`，它是 Jakarta EE Security API 特定的调用者主体表示。\n\
  \n有了这个 `Principal` 实现，我们现在可以调整之前展示的身份存储，使其返回我们的自定义主体。\n\n```\n@ApplicationScoped\n\
  public class UserServiceIdentityStore implements IdentityStore {\n@Inject\nprivate\
  \ UserService userService;\n@Override\npublic CredentialValidationResult validate(Credential\
  \ credential) {\nUsernamePasswordCredential login =\n(UsernamePasswordCredential)\
  \ credential;\nString email = login.getCaller();\nString password = login.getPasswordAsString();\n\
  Optional optionalUser =\nuserService.findByEmailAndPassword(email, password);\n\
  if (optionalUser.isPresent()) {\nUser user = optionalUser.get();\nreturn new CredentialValidationResult(\n\
  new UserPrincipal(user), // 使用 Principal 而非 String。\nuser.getRolesAsStrings()\n\
  );\n}\nelse {\nreturn CredentialValidationResult.INVALID_RESULT;\n}\n}\n}\n```\n\
  \n随后，我们可以从注入的安全上下文中再次访问我们的模型对象。\n\n```\n@Inject\nprivate SecurityContext securityContext;\n\
  [...]\nOptional OptionalUser =\nsecurityContext.getPrincipalsByType(UserPrincipal.class)\n\
  .stream()\n.map(e -> e.getUser())\n.findAny();\n```\n\n基于访问权限的条件渲染\n在 Web 应用程序中，通常希望根据调用者是否经过身份验证，以及如果经过身份验证，则根据该调用者拥有的角色，以不同方式渲染视图的某些部分。\n\
  Jakarta Faces 组件标签实际上不需要为此设置特殊属性，因为现有的隐式对象结合表达式语言已经足够强大，可以执行所需的大部分检查。\n\n最常见的检查之一是确定用户是否已通过身份验证。这在之前的\
  \ `index.xhtml` 视图中简要展示过：\n\n```\n已登录为 #{request.userPrincipal}\n\n```\n\n当然，你也可以在这里使用任何\
  \ Jakarta Faces 组件的 `rendered` 属性。\n\n```\n已登录为 #{request.userPrincipal}\n\n```\n\
  \n但是，正如你在第 3 章的“Jakarta 标签”部分所学到的，这只会导致组件树稍微冗长一些。此外，`rendered` 属性检查会在 Jakarta Faces\
  \ 生命周期中反复执行，而 Jakarta 标签仅在视图构建期间执行一次。\n请注意，我们在这里使用的是隐式对象 `#{request}`，而不是更通用的 `SecurityContext`。这是因为在\
  \ Jakarta EE 8 中，没有与这个 `SecurityContext` 对应的隐式 EL 对象可用。在 Jakarta EE Security 以及\
  \ Jakarta Servlet API（`HttpServletRequest` 类型的请求来源于此）中，定义 `getUserPrincipal()` 返回\
  \ `null` 意味着用户未通过身份验证。Jakarta EE Security 与表达式语言之间更好的对齐计划在 Jakarta EE 的未来版本中实现。\n\
  \n另一个常见的检查是测试调用者是否属于特定角色。这里我们也可以使用隐式对象 `#{request}`，如下所示：\n\n需要记住的是，正如本章开头所解释的，角色“`foo`”不一定是我们通常使用该词时所称的角色。也就是说，它不一定是像“`admin`”或“`manager`”这样的东西。实际上，对于像视图片段中这种非常局部的用法，通常更倾向于使用更细粒度的名称（例如，“`CAN_UPDATE_SALARY`”）。一种常见的技术是将细粒度角色映射到更粗粒度的角色，例如，确实映射到“`ADMIN`”。通过这种技术，用户被赋予这些更粗粒度的角色，而存储身份验证数据的数据存储也只包含这些粗粒度的角色。当像我们之前看到的身份存储为某个调用者检索此身份验证数据并看到“`ADMIN`”时，它会返回一个“`ADMIN`”所映射到的角色集合（例如，`{\"\
  CAN_UPDATE_SALARY\", \"CAN_ADJUST_MARGINS\", ...}`）。\n\n我们可以测试的一个特殊角色是“`**`”角色，它是\
  \ `#{not empty request.userPrincipal}` 检查的替代方案。此角色隐式分配给任何经过身份验证的调用者，但需要注意的是，应用程序并未以任何方式声明此角色。如果应用程序声明了，“`**`”就会失去其特殊含义，而只是安全系统显式测试的另一个不透明字符串。使用“`**`”检查，我们在本节中显示的第一个片段如下所示：\n\
  \n```\n已登录为 #{request.userPrincipal}\n\n```\n\n在标准的 Jakarta EE 编程式 API 中，没有可用的方法来测试调用者是否属于两个或多个角色中的任何一个，或者是否属于所有两个或多个角色。如果需要，可以使用如下代码所示的工具方法：\n\
  \n```\npublic static boolean isInAnyRole\n(HttpServletRequest request, String...\
  \ roles)\n{\nfor (String role : roles) {\nif (request.isUserInRole(role)) {\nreturn\
  \ true;\n}\n}\nreturn false;\n}\npublic static boolean isInAllRoles\n(HttpServletRequest\
  \ request, String... roles)\n{\nfor (String role : roles) {\nif (!request.isUserInRole(role))\
  \ {\nreturn false;\n}\n}\nreturn true;\n}\n```\n\n\n\n有时，我们不仅需要根据调用者所拥有的角色来以不同方式渲染视图内容，还需要考虑调用者被允许访问哪些其他视图（网络资源）。例如，在渲染导航菜单时（省略调用者无权访问的视图条目），或者以特殊方式（例如，用红色显示或旁边加锁图标）渲染指向调用者无权访问的视图的链接或按钮时，就会用到这一点。\n\
  \n实现此功能的一种传统方法是测试程序员已知能授予对给定视图访问权限的角色。虽然这看起来可能有效，但在实践中通常很脆弱，因为它让代码在特定角色/视图关系的假设下运行，却没有强有力的保证来确保这种关系确实成立。\n\
  \n一种更稳定的测试调用者是否有权访问给定视图的方法非常简单，就是直接测试这一点：“调用者是否有权访问此视图（网络资源）？” `SecurityContext`\
  \ 有一个方法几乎可以完全用于此目的：`SecurityContext#hasAccessToWebResource()`。\n\n由于 `SecurityContext`\
  \ 不是一个命名的 bean 或隐式对象，我们必须创建一个小的辅助 bean 才能在 EL 中使用它。如下所示：\n\n```\n@Named @ApplicationScoped\n\
  public class Security {\n@Inject\nprivate SecurityContext securityContext;\npublic\
  \ boolean hasAccessToWebResource(String resource) {\nreturn securityContext.hasAccessToWebResource(resource,\
  \ \"GET\");\n}\n}\n```\n\n这里需要注意两点。\n首先，`hasAccessToWebResource()` 方法接受一个网络资源模式，该模式与我们之前看到的\
  \ `web.xml` 片段中用于 `url-pattern` 的模式相同。这接近于 Jakarta Faces 视图，但并不完全相同。Jakarta Faces\
  \ 视图通常以独立于映射的方式指定（例如，`/foo` 而不是 `/faces/foo` 或 `/foo.xhtml`）。然而，网络资源模式必须是 URL 本身，并包含映射。\n\
  其次，`hasAccessToWebResource()` 要求我们指定要测试访问权限的 HTTP 方法。这是必需的，因为在 Jakarta EE Security\
  \ 中，约束实际上适用于每个 URL 和每个 HTTP 方法。例如，调用者可能有权 POST 到 `/foo.xhtml`，但无权 GET `/foo.xhtml`。\n\
  由于我们将使用我们的实用方法进行导航测试，GET 通常是正确的 HTTP 方法，但我们应该意识到，有时我们可能需要测试其他 HTTP 方法。\n\n有了辅助 bean，我们现在可以轻松地检查对视图上目标资源的访问权限，并据此更改渲染。为了演示这一点，我们首先在\
  \ `web.xml` 中定义三个新的网络资源约束。\n\n```\n\nBar\n/bar.xhtml\n\nbar\n\nFoo\n/foo.xhtml\n\
  \nfoo\n\nBaz\n/baz.xhtml\n\nbaz\n\n```\n\n定义这些约束后，我们可以在 `enabled` 属性上通过访问检查来渲染指向它们的链接。\n\
  \n使用拥有例如“`bar`”和“`foo`”角色但没有“`baz`”角色的调用者进行身份验证，将导致指向 `/baz` 的链接被渲染为禁用状态。\n\n跨站请求伪造保护\n\
  跨站请求伪造（CSRF）是一种攻击，它使用户在未经其同意甚至不知情的情况下，向某个他们可能已登录的站点发送请求。此类请求随后会产生某种副作用，这种副作用可能以某种特定方式对攻击者有利。\n\
  例如，假设你的银行有一个形式为 `https:/example.com/transferAmount=4000&targetAccount=7836` 的 URL，意思是“从我的账户向\
  \ ID 为 7836 的账户转账 4000 欧元。”在此语句中，“我的账户”是通过你与银行之间的已登录会话（通常是一个 cookie）来确定的。现在，攻击者可能无法获取你的会话\
  \ cookie，但在这个例子中，如果能够诱使你的浏览器在你登录银行账户的同时，从你访问的任何其他网站发送 `https:/example.com/transferAmount=4000&targetAccount=7836`\
  \ 请求，并且 `targetAccount` 参数设置为攻击者控制的账户 ID，那么就不需要获取 cookie。请注意，在实践中，不太可能使用 GET 请求和请求参数，而是会使用\
  \ POST 和 POST 参数。然而，对于两者而言，都存在相同的基本漏洞。\n\n如果我们想保护我们的应用程序免受此类恶意请求的攻击，其中一种方法是在请求中包含“某物”（即一个令牌），该令牌需要满足：\n\
  \n1.  特定于某个调用者\n\n2.  在一段时间后过期\n\n3.  难以被猜测\n\n恰好，Jakarta Faces 已经拥有满足所有这些三个要求的东西，那就是在\
  \ Jakarta Faces 表单中可以找到的 `jakarta.faces.ViewState` 隐藏参数。\n\n注意\n\n不过有一个警告，那就是只有在使用回发、服务器端状态保存以及相关视图不是无状态的情况下，此参数才能完全满足这些要求。只有在这种情况下，`jakarta.faces.ViewState`\
  \ 的值才真正是一个令牌。由于这是默认设置，Jakarta Faces 在这方面开箱即用相对安全，但一旦我们偏离这些默认设置，例如通过使用无状态视图，这种保护就会受到损害。另请参阅第\
  \ 4 章中的“无状态表单”一节。\n\n除了这种隐式的 CSRF 保护之外，Jakarta Faces 还具有显式的 CSRF 保护。这种显式的 CSRF 保护为所有情况添加了一个令牌，并额外增加了对“`referer`”和“`origin`”HTTP\
  \ 头的检查。请注意，对于传入请求，通常不应信任 HTTP 头，因为它们很容易被伪造。然而，对于这种特定的攻击，我们并不是要防御任何随机的 HTTP 请求，而是专门防御来自受信任浏览器的请求。头部检查是对令牌检查的补充，并且令牌检查必须始终首先通过。\n\
  \n定义哪些视图应该受到 CSRF 令牌和额外头部检查的保护，其方式与我们为视图定义角色的方式有些相似：在部署描述符中定义一组 URL 模式。不过，这次部署描述符是\
  \ `faces-config.xml` 而不是 `web.xml`。以下是在 `faces-config.xml` 中这些条目的示例：\n\n```\n/bar.xhtml\n\
  /foo.xhtml\n/baz.xhtml\n\n```\n\n请注意，这里的 `url-pattern` 与 `web.xml` 中使用的模式完全相同。这里需要注意的一点是，尽管\
  \ `faces-config.xml` 是 Jakarta Faces 特定的部署描述符，但这里的 `url-pattern` 再次是相对于应用程序根目录的完整\
  \ URL，这意味着它必须包含所有使用的映射，例如 `/faces/` 和 `.xhtml`。\n\n将前面显示的包含 `protected-views` 片段的\
  \ `faces-config.xml` 添加到我们本章一直在处理的示例应用程序代码中，将导致 `index.xhtml` 上指向例如 `/bar.xhtml`\
  \ 的链接以以下方式渲染：\n\n```\n/bar.xhtml?jakarta.faces.Token=gdMoNbfOycv2v80gr\n```\n\n\n\
  \n可以看出，`jakarta.faces.Token` 请求参数已由 Jakarta Faces 添加。该令牌与用户的 HTTP 会话绑定，因此如果 HTTP\
  \ 会话过期，令牌也会过期。该令牌在密码学上是强壮的，这意味着它满足了之前所述的 CSRF 保护令牌的所有三个要求。\n\n如果令牌被篡改（例如，我们使用 `xxMoNbfOycv2v80gr`\
  \ 而不是 `gdMoNbfOycv2v80gr`）或完全缺失（即，我们请求 `/bar.xhtml`），那么 Jakarta Faces 将抛出一个 `jakarta.faces.application.ProtectedViewException`。\n\
  \n如果链接来自无状态页面，Jakarta Faces 应用程序可以通过通知用户并允许重新渲染原始页面来处理此异常。在前面的示例中，这意味着重新渲染 `index.xhtml`。真正的用户将获得一个新的\
  \ CSRF 保护令牌，而攻击者将无法从原始请求中获得预期的副作用。\n\n如前所述，还有一个 `referer` 和 `origin` 头部检查。对于此检查，Jakarta\
  \ Faces 会检查 `referer` 头部（如果可用）是否设置为源自同一应用程序的 URL。为了演示这一点，考虑第二个 Jakarta Faces 应用程序，它只有一个空的\
  \ `faces-config.xml` 和以下视图：\n\n```\n\ntest\n\n```\n\n假设我们第一个带有 CSRF 保护的 `bar.xhtml`\
  \ 的应用程序部署在 `http://localhost:8080/project`，点击来自第二个应用程序的输出链接将导致第一个应用程序再次抛出 `jakarta.faces.application.ProtectedViewException`。请注意，`referer`\
  \ 是一个可选检查，仅在 `referer` 头部实际存在时才执行，就像第二个应用程序中的链接一样。\n\n如果我们直接在浏览器的地址栏中输入 `http://localhost:8080/project/bar.xhtml?jakarta.faces.Token=gdMhNbfOycv2v80gr`，或者通过命令行工具（如\
  \ `wget` 或 `curl`）直接请求它，则不会有 `referer`，并且请求将被接受。\n\n在实践中，GET 请求受到 CSRF 攻击保护的价值较低，因为这些请求实际上*应该*是幂等的（不应有副作用，只应显示数据）。与其使用\
  \ CSRF 保护令牌来保护 GET 请求，更好的做法是重构应用程序，使其不包含非幂等的 GET 请求。\n\n对于回发，CSRF 保护令牌的工作方式大致相同。为了演示，考虑将\
  \ `/bar.xhtml` 视图更改为以下内容：\n\n渲染此页面将导致表单目标 URL 以与 GET 请求相同的方式应用 CSRF 保护令牌，例如：\n\n\
  ```\n因此，这是与隐式的 `jakarta.faces.ViewState` 令牌的另一个区别，后者始终是一个 POST 参数。\n\nWeb 参数篡改保护\n\
  Web 参数篡改是一种针对应用程序的攻击，攻击者会修改发送（回）到托管应用程序的服务器的参数值。如果应用程序没有正确验证这些值，攻击者可能会获得超出其权限的利益，或者可能有机会执行额外的攻击。\n\
  \n例如，假设一个 Web 应用程序渲染了一个可以分配给其他用户的角色列表，例如“用户”、“经理”和“销售”。攻击者可以尝试修改回发的数据，并将“用户”的选择更改为“管理员”。如果服务器盲目地接受输入，并且“管理员”是一个存在的值，这将允许攻击者将“管理员”角色授予另一个用户，即使攻击者没有权限这样做。\n\
  \nJakarta Faces 对此类攻击的一个子集提供了隐式保护，即针对从选择组件（具体来说，基于 `UISelectOne`* 和 `UISelectMany`*\
  \ 的组件）回发的值。这是通过 Jakarta Faces 在回发后从 `jakarta.faces.ViewState` 恢复视图（当使用完整状态保存时）或重新创建视图（当使用部分状态保存时）来实现的。只有那些也被渲染过的值才会被接受。不过，通常的注意事项仍然适用，那就是在使用部分状态保存时，绑定到组件的数据在回发前后必须相同。然而，这可以通过使用视图作用域轻松实现。\n\
  \n为了演示，考虑以下视图：\n\n```\n\n选中的值：#{bean.selected}\n\n```\n\n以及以下支持 bean：\n\n```\n@Named\
  \ @RequestScoped\npublic class Bean {\nprivate List available = Arrays.asList(\"\
  foo\", \"bar\", \"kaz\");\nprivate String selected;\npublic List getAvailable()\
  \ {\nreturn available;\n}\npublic String getSelected() {\nreturn selected;\n}\n\
  public void setSelected (String selected) {\nthis.selected = selected;\n}\n}\n```\n\
  \n例如，选择“bar”并点击“select”将按预期渲染“选中的值：bar”。可以通过多种方式更改发送的值，例如，通过像 Burp Proxy 这样的拦截代理，或者通过\
  \ Chrome 等浏览器的开发者工具编辑实时源代码。\n\n如图 13-1 所示，更改后选择“`foo`”条目并再次点击选择按钮，将导致“`foox`”值被发送到应用程序。此值将被\
  \ Jakarta Faces 拒绝，因此将渲染“选中的值：”，表明我们篡改的值确实未被接受。\n\n![](img/454457_2_En_13_Fig1_HTML.png)\n\
  \n图 13-1\n通过 Chrome 的 DOM 检查器在 HTML 源代码中将选中的值从“foo”篡改为“foox”\n\n跨站脚本保护\n跨站脚本或 XSS\
  \ 是一种攻击，它有多种变体，但实际上归结为 Web 应用程序将从（其他）用户那里获得的数据直接作为发送给客户端的标记的一部分进行渲染。如果这些数据本身包含脚本代码（通常是\
  \ JavaScript），浏览器可能会盲目地执行它，从而允许攻击者读取例如 cookie 数据，并将其发送到攻击者控制的服务器。\n\nJakarta Faces\
  \ 通过为许多常见上下文启用上下文输出转义来提供针对此类攻击的保护。最常见的上下文是输出 HTML，所有 Jakarta Faces 输出编写器默认情况下都会对其输出进行\
  \ XML 转义。\n\n为了演示，考虑以下支持 bean：\n\n```\n@Named @RequestScoped\npublic class Bean\
  \ {\nprivate String value = \"alert('hi')\";\npublic String getValue() {\nreturn\
  \ value;\n}\n}\n```\n\n`value` 实例变量包含一个我们不希望浏览器执行的脚本。在此示例中，它是硬编码的，但在实践中，它可能来自例如数据库中存储的数据。\n\
  \n\n\n现在我们将使用 Jakarta Faces 的两个简单默认构造来渲染这个值：Facelet 上的直接表达式语言表达式和 `<h:outputText>`\
  \ 组件。\n\n```\n\n#{bean.value}\n\n```\n\n当请求此视图并查看 HTML 源代码时，我们会看到该值两次都被渲染为“`&lt;script&gt;alert('hi')&lt;/script&gt;`”（即，以浏览器不会执行的转义形式呈现）。\n\
  \n如果我们明确不希望进行此转义，可以将 `<h:outputText>` 的 `escape` 属性设置为 `false`。例如：\n\n```\n<h:outputText\
  \ value=\"#{bean.value}\" escape=\"false\" />\n```\n\n再次请求包含上述组件的视图将导致出现一个 JavaScript\
  \ 警告框，显示“hi”。如果这是攻击者输入的恶意代码，客户端系统的安全性就会受到损害。因此，`escape` 属性应极其谨慎地使用。\n\n用于 URL 的输出也会被转义，但由于上下文不同，转义方式也不同。为了演示，请考虑在视图中添加以下组件：\n\
  \n```\n<h:outputLink value=\"http://foo.com/bar?x=#{bean.value}\">\n    Go to foo\n\
  </h:outputLink>\n```\n\n请求此视图后，我们会看到链接被渲染为\n\n```\n<a href=\"http://foo.com/bar?x=%3Cscript%3Ealert('hi')%3C/script%3E\"\
  >\n    Go to foo\n</a>\n```\n\n这里发生的情况是，我们的原始值已使用 URL 编码进行了转义，以便用作 URL 参数。可以看出，这与\
  \ XML 转义不同，因此称为“上下文相关输出转义”。\n\n与 XSS 防护相关，应用程序使用的敏感 cookie 应设置为 `HttpOnly`，这意味着它们会随每个请求发送到服务器，但无法被客户端的脚本读取。对于会话\
  \ ID cookie，可以在 `web.xml` 中按如下方式进行设置：\n\n```\n<session-config>\n    <cookie-config>\n\
  \        <http-only>true</http-only>\n        <secure>true</secure>\n    </cookie-config>\n\
  </session-config>\n```\n\n请注意，此处 cookie 也被设置为“secure”。这与 XSS 无关，而是设置 cookie 仅在使用\
  \ HTTPS/SSL 时发送。这可以保护 cookie 不被窃听（例如，在共享 Wi-Fi 网络上）。由于开发通常通过 HTTP 在 localhost 上进行，因此此类设置可能会给开发带来问题。如果是这种情况，则可以在\
  \ `ServletContextListener` 中使用 `ServletContext#getSessionCookieConfig()` 来设置 cookie\
  \ 是否安全：\n\n```\n@WebListener\npublic class ApplicationConfig implements ServletContextListener\
  \ {\n    @Override\n    public void contextInitialized(ServletContextEvent event)\
  \ {\n        if (...) {\n            event.getServletContext()\n               \
  \ .getSessionCookieConfig()\n                .setSecure(false);\n        }\n   \
  \ }\n}\n```\n\n其中“...”是一个特定于应用程序的检查，用于判断是否在“开发模式”下运行。您甚至可以使用 Jakarta Faces 自身的 `Application#getProjectStage()`\
  \ 来实现此目的。\n\n源文件暴露防护\n在服务器端 Web 应用程序的上下文中，源文件暴露是指 Web 应用程序部分源代码的非预期泄露。这是一种安全风险，不仅因为源代码本身的暴露（可能构成商业秘密），还因为它可能让攻击者洞察到后续攻击的基础（源代码可能包含对其他系统、Bean\
  \ 甚至带有密码的注释的引用，尽管这些注释一开始就不应该存在）。\n\n由于过去一些可能不太理想的设计选择，Jakarta Faces 在这方面存在一些特定的漏洞，主要涉及\
  \ URL 映射的方式以及资源文件的位置。要理解此漏洞，我们首先解释 Jakarta Faces 映射和 `FacesServlet` 的工作原理。\n\n每个\
  \ Jakarta Faces 应用程序的主要入口点是 `FacesServlet`。这是 Jakarta Faces 框架提供的一个 Servlet，充当所谓的前端控制器，所有\
  \ Jakarta Faces 请求都通过它进行路由。\n\n因此，对 Jakarta Faces 视图（例如 `foo.jsf`）的请求首先需要通过此 Servlet，然后\
  \ Servlet 会以某种方式定位代表视图 `foo.jsf` 的组件树定义。我们将这个实际定义称为“物理资源”。开箱即用，Jakarta Faces 支持一种类型的物理资源：扩展名为\
  \ `.xhtml` 的 Facelets 文件。\n\n为了使 `FacesServlet` 能够处理所有这些请求，必须将其映射到一个或多个能够捕获这些请求的\
  \ URL 模式。为此，Jakarta Faces 支持前缀映射、后缀映射和精确映射。\n\n如果在 `web.xml` 中没有指定显式映射，并且在应用程序中找到了可识别的\
  \ Jakarta Faces 工件（例如空的 `faces-config.xml` 或 `@FacesConfig` 注解），则 `FacesServlet`\
  \ 会被自动映射。自 Jakarta Faces 2.1 和 Servlet 3.0 起，此自动映射针对以下模式：\n\n*   `/faces/*`（前缀映射）\n\
  *   `*.jsf`（后缀映射）\n*   `*.faces`（后缀映射）\n\n自 Jakarta Faces 2.3 起，还包括以下模式：\n\n*  \
  \ `*.xhtml`（后缀映射）\n\n尤其是较旧的（现有的）Jakarta Faces 应用程序仍然会在 `web.xml` 中显式映射 `FacesServlet`，例如，如下所示：\n\
  \n```\n<servlet>\n    <servlet-name>facesServlet</servlet-name>\n    <servlet-class>jakarta.faces.webapp.FacesServlet</servlet-class>\n\
  </servlet>\n<servlet-mapping>\n    <servlet-name>facesServlet</servlet-name>\n \
  \   <url-pattern>/faces/*</url-pattern>\n    <url-pattern>*.jsf</url-pattern>\n\
  </servlet-mapping>\n```\n\n在后缀映射并使用 Facelets 时，`FacesServlet` 将首先尝试定位与请求资源具有相同路径和名称但后缀替换为\
  \ `.xhtml` 的物理资源。例如，对 `/path/foo.jsf` 的请求将导致查找文件 `/path/foo.xhtml`。使用前缀映射时，`FacesServlet`\
  \ 将尝试定位与请求资源具有相同名称和路径但减去前缀路径的物理资源。例如，对 `/faces/path/foo.xhtml` 的请求将导致查找文件 `/path/foo.xhtml`。然而，这可能会引入一个导致\
  \ Facelet 源代码暴露的安全问题。也就是说，对 `/path/foo.xhtml` 的查找是在 `FacesServlet` 所在的 WAR 的 Web\
  \ 根目录中进行的。除非另有（隐式）映射，否则 Web 根目录中的每个文件都可以直接下载。在这种情况下，如果直接请求 `/path/foo.xhtml` 而不是\
  \ `/path/foo.jsf` 或 `/faces/path/foo.xhtml`，则该请求不会经过 `FacesServlet`，并且会返回该页面的纯 Facelets\
  \ 源代码，而不是渲染后的标记。\n\n有两种方法可以防止这种源代码暴露：\n\n1.  将 `FacesServlet` 直接映射到 `*.xhtml`。\n\
  2.  向 `web.xml` 添加安全约束。\n\n\n\n将 `FacesServlet` 直接映射到 `*.xhtml` 可能是最自然的解决方案。通过这种映射，请求的资源与物理资源完全相同。如果请求\
  \ `/path/foo.xhtml`，那么 `FacesServlet` 将尝试定位 `/path/foo.xhtml`。通过这种映射，不存在第二条路径可以访问\
  \ Facelets 源文件，因此也就没有暴露它的风险。\n附注：能够使用 `*.xhtml` 映射是 Jakarta Faces 2.0 中的一个新特性。在\
  \ Jakarta Faces 1.x 中这样做会导致 `RequestDispatcher#forward()` 出现无限循环。\n\n要将 `FacesServlet`\
  \ 映射到 `*.xhtml`，最简单的方法是依赖 Jakarta Faces 2.3 的默认映射，如前所述。如果由于某种原因无法做到这一点，请将映射添加到 `web.xml`\
  \ 中的 `FacesServlet` 映射中，如下代码所示：\n\n```\nfacesServlet\n/faces/**.jsf\n*.xhtml\n\n\
  ```\n\n作为替代方案，可以定义一个安全约束来阻止对 `*.xhtml` 资源的访问。很少有充分的理由选择此方法而非更简单的 `*.xhtml` 到 `*.xhtml`\
  \ 映射，但为了完整性，可以按如下方式操作：\n\n```\n禁止访问 Facelets 源文件\n\nXHTML\n*.xhtml\n\n```\n\n暴露\
  \ Facelets 源代码的一个特殊情况发生在复合组件中。复合组件是通过 Facelet 而非 Java 类实现的组件。按照惯例，它们必须放置在位于 Web\
  \ 根目录下的 `/resources` 目录的子目录中，例如 `/resources/bar/foo.xhtml`。这将使组件 “`foo`” 在命名空间 “`jakarta.faces.composite/bar`”\
  \ 中可用。\n组件当然不是视图，用户不应该能够直接请求它们。不幸的是，`/resources` 对于 Jakarta EE 来说并不是一个特殊的目录。Jakarta\
  \ Faces 通过约定赋予了它特殊含义，但对于 Servlet 容器来说，它和其他目录一样。这特别意味着对此没有应用任何保护，任何用户都可以直接从中请求资源。换句话说，这个目录是“世界可读的”。即使使用\
  \ `*.xhtml` 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行它们。显然，这不是我们想要的。\n\n对此同样有两种解决方案：\n\n1. \
  \ 配置另一个目录作为 Jakarta Faces 资源目录。\n\n2.  向 `web.xml` 添加安全约束。\n\n在 Jakarta Faces 2.2\
  \ 中，引入了一种方法来解决此安全漏洞。即，通过 `jakarta.faces.WEBAPP_RESOURCES_DIRECTORY` 上下文参数，可以将另一个目录配置为\
  \ Jakarta Faces 资源目录，而不是 `/resources`。例如：\n\n```\njakarta.faces.WEBAPP_RESOURCES_DIRECTORY\n\
  WEB-INF/resources\n\n```\n\n请注意，该路径是相对于 Web 根目录的，并且不能以 “/” 开头。\n\n或者，对于 Jakarta\
  \ Faces 2.0/2.1，可以在 `web.xml` 中再次配置一个安全约束，以禁止调用者访问 `/resources`。这可以通过类似于保护 `*.xhtml`\
  \ 访问的方式来完成。\n\n```\n\nresources\n资源目录\n/resources/*\n\n```\n\n14. 本地化\n\nJakarta\
  \ Faces 一直拥有不错的国际化支持。自 Jakarta Faces 1.0 起，您可以提供基于 `java.util.ResourceBundle` 的不同语言环境的捆绑文件，这些文件随后会在声明的位置动态地作为文本包含在网页中。此外，所有\
  \ Jakarta Faces 转换器和验证器都有自己的一套本地化默认消息，您可以通过消息包轻松自定义这些消息，或者自 Jakarta Faces 1.2 起，通过新的\
  \ `requiredMessage`、`converterMessage` 和 `validatorMessage` 属性进行自定义。Jakarta Faces\
  \ 2.0 通过新的 `jakarta.faces.application.ResourceHandler` API（应用程序编程接口）增加了对可本地化资源（如样式表、脚本和图像）的支持。\n\
  国际化（“I18N”）行为与本地化（“L10N”）行为是不同的。国际化部分基本上已由 Jakarta Faces 自身作为 MVC（模型-视图-控制器）框架完成。您需要做的只是处理本地化部分。基本上，您需要在视图中指定“活动语言环境”，提供所需的资源包文件（如有必要，可借助第三方翻译服务进行翻译），并在您的\
  \ Jakarta Faces 页面中声明对捆绑文件的引用。\n在本章中，您将学习如何为不同语言准备 Jakarta Faces Web 应用程序，以及如何开发它以方便您自己进行维护性的本地化。\n\
  \n你好世界，Olá mundo，नमस्ते दुनिया\n首先，在项目的 `main/java/resources` 文件夹中创建一组新的捆绑文件。Maven\
  \ WAR 项目的 `main/java/resources` 文件夹用于存放最终构建中应位于 `/WEB-INF/classes` 文件夹中的非类文件。捆绑文件可以采用\
  \ `java.util.Properties` 格式，扩展名为 `.properties`。\n\n这些文件的文件名必须有一个公共前缀（例如 “`text`”），后跟一个下划线和两个字母的\
  \ ISO 639-1-Alpha-2^(¹¹⁰) 语言代码（例如，英语用 “`en`”，葡萄牙语用 “`pt`”，印地语用 “`hi`”）。可选地，后面可以再跟一个下划线和两个字母的\
  \ ISO 3166-1-Alpha-2^(¹¹¹) 国家代码（例如，英国用 “`GB`”，美国用 “`US`”，巴西用 “`BR`”，葡萄牙用 “`PT`”）。\n\
  \n```\nmain/java/resources/com/example/project/i18n/text.properties\ntitle = 本地化示例\n\
  heading = 你好世界\nparagraph = 欢迎来到我的网站！\nmain/java/resources/com/example/project/i18n/text_pt_BR.properties\n\
  title = Exemplo de localização\nheading = Olá mundo\nparagraph = Bem-vindo ao meu\
  \ site!\nmain/java/resources/com/example/project/i18n/text_hi.properties\ntitle\
  \ = स्थानीयकरण उदाहरण\nheading = नमस्ते दुनिया\nparagraph = मेरी वेबसाइट पर स्वागत\
  \ है!\n```\n\n请注意，所有这些捆绑文件都有共同的键 “`title`”、“`heading`” 和 “`paragraph`”，这些键通常是英文的。这基本上是互联网和\
  \ Web 开发人员的通用语言。将源代码完全保留为英文被认为是最佳实践，特别是如果它是开源的。\n还要注意，英文捆绑文件的文件名中没有像 `text_en.properties`\
  \ 那样的 “`en`” 语言代码，而只是 `text.properties`。基本上，它已成为后备捆绑文件，应包含整个 Web 应用程序中使用的每一个捆绑键。这样，当具有特定语言代码的捆绑文件不包含所需的捆绑条目时，将从后备捆绑文件中查找该值。这对于您希望逐步升级捆绑文件，或者当\
  \ Web 应用程序中有某些部分不一定需要本地化（例如后端管理页面）的情况非常有用。\n\n配置\n\n为了让 Jakarta Faces 应用程序识别这些捆绑文件和所需的语言环境，我们需要编辑其\
  \ `faces-config.xml` 文件，向 `<application>` 元素添加以下条目：\n\n```\n\nen\npt_BR\nhi\n\n\n\
  \ncom.example.project.i18n.text\ntext\n\n```\n\n`<base-name>`\n必须遵循与 Java 类相同的约定来指定完全限定名（FQN），并且不包含文件扩展名。`<var>`\
  \ 基本上声明了资源包文件的 EL（表达式语言）变量名。这将使当前加载的资源包在 EL 中通过 `#{text}` 以类似 `Map` 的对象形式可用。为避免冲突，你只需确保此名称未被任何受管\
  \ Bean 或任何隐式 EL 对象占用。\n\n在 Jakarta Faces 页面中引用资源包\n\n这相对简单，只需将 `#{text}` 视为一个 `Map`，并将资源包键作为映射键即可。\n\
  \n```\n\n#{text['title']}\n\n#{text['heading']}\n#{text['paragraph']}\n\n```\n\n\
  Jakarta Faces 将根据 HTTP `Accept-Language` 标头^(¹¹²)自动确定最匹配的活动区域设置，并将其设置为 `UIViewRoot`\
  \ 的 `locale` 属性。`Accept-Language` 标头可在浏览器设置中配置。例如，在 Chrome 中，你可以通过 `chrome://settings/languages`\
  \ 进行配置。如果你尝试调整它，例如，在浏览器中将英语、葡萄牙语和印地语切换为排名最高的语言设置，然后刷新 Jakarta Faces 页面，你会注意到文本会随之改变，以符合浏览器指定的语言设置。如果你检查浏览器的开发者工具（通常按\
  \ F12 可访问），并在网络监视器中检查 HTTP 请求标头，你还会注意到 `Accept-Language` 标头会相应更改。\n\n你可能已经注意到，在前面显示的代码示例中，`<html>`\
  \ 标签的 `lang` 属性引用了 `#{view.locale.toLanguageTag()}`。基本上，这会打印当前 `UIViewRoot` 的 `locale`\
  \ 属性的 IETF BCP 47 语言标签^(¹¹³)，而 `UIViewRoot` 又作为隐式 EL 对象 `#{view}` 可用。`locale` 属性是\
  \ `java.util.Locale` 的一个实例，它实际上没有像 `getLanguageTag()` 这样的语言标签 getter 方法，只有一个 `toLanguageTag()`\
  \ 方法，因此在 EL 中直接引用了该方法，而不是预期的属性引用。\n\n`<html>` 标签的 `lang` 属性对于 Jakarta Faces 本地化功能的运行并非必需。此外，Jakarta\
  \ Faces 将其视为模板文本，不会对其进行任何特殊处理。你可以安全地省略它。然而，它对搜索引擎很重要。这样，像 Google 这样的搜索引擎就会知道页面内容使用的是哪种语言。这不仅对于正确出现在本地化搜索结果中很重要，而且对于你以不同语言提供同一页面也很重要。否则，一般的搜索引擎算法会将其视为“重复内容”而进行惩罚，这对\
  \ SEO（搜索引擎优化）排名不利。\n\n你还会注意到，资源包键是以所谓的大括号表示法 `#{text['...']}` 指定的。单引号之间的字符串基本上代表了资源包键。在这种特定情况下，你也可以使用\
  \ `#{text.title}`、`#{text.heading}` 和 `#{text.paragraph}` 来代替。然而，这并非普遍做法。使用大括号表示法不仅能让\
  \ EL 变量所代表的内容（资源包）具有普遍清晰的含义，而且还允许你在资源包键名中使用点号，例如 `#{text['meta.description']}`。EL\
  \ 表达式 `#{text.meta.description}` 具有完全不同的含义，即“获取 `text` 对象的嵌套 `meta` 属性的 `description`\
  \ 属性”，其行为类似于 `text.getMeta().getDescription()`，这是不正确的。\n\n更改活动区域设置\n\n你也可以在服务器端更改活动区域设置。最好在包含\
  \ `<f:view>` 标签的站点级主模板中的单个位置进行此操作。活动区域设置可以在 `<f:view>` 的 `locale` 属性中设置，该属性可以接受表示语言标签的静态字符串，也可以接受具体的\
  \ `java.util.Locale` 实例。`locale` 属性接受 EL 表达式，并且可以通过受管 Bean 以编程方式更改。这为你提供了让用户通过网页更改区域设置的机会，而无需在浏览器的语言设置中手动调整。你可以在\
  \ Jakarta Faces 页面中向用户展示可用的语言选项，并让每次选择都更改活动区域设置。这可以通过以下 Jakarta Faces 页面实现：\n\n\
  ```\n\n#{text['title']}\n\n#{text['heading']}\n#{text['paragraph']}\n\n```\n\n它与前面的示例略有调整；现在\
  \ `<f:view>` 包裹了 `<h:head>` 和 `<h:body>`。`<f:view>` 的 `locale` 属性通过 `#{activeLocale}`\
  \ 受管 Bean 引用当前活动的区域设置，该 Bean 如下所示：\n\n```\n@Named @SessionScoped\npublic class ActiveLocale\
  \ implements Serializable {\nprivate Locale current;\nprivate List available;\n\
  @Inject\nprivate FacesContext context;\n@PostConstruct\npublic void init() {\nApplication\
  \ app = context.getApplication();\ncurrent = app.getViewHandler().calculateLocale(context);\n\
  available = new ArrayList();\navailable.add(app.getDefaultLocale());\napp.getSupportedLocales().forEachRemaining(available::add);\n\
  }\npublic void reload() {\ncontext.getPartialViewContext().getEvalScripts()\n.add(\"\
  location.replace(location)\");\n}\npublic Locale getCurrent() {\nreturn current;\n\
  }\npublic String getLanguageTag() {\nreturn current.toLanguageTag();\n}\npublic\
  \ void setLanguageTag(String languageTag) {\ncurrent = Locale.forLanguageTag(languageTag);\n\
  }\npublic List getAvailable() {\nreturn available;\n}\n}\n```\n\n在 `@PostConstruct`\
  \ 中，使用 `ViewHandler#calculateLocale()` 根据 `Accept-Language` 标头以及 `faces-config.xml`\
  \ 中配置的默认和支持的区域设置来计算当前区域设置。这完全遵循 Jakarta Faces 内部行为，就像没有定义 `<f:view locale>` 时一样。最后，根据配置的默认和支持的区域设置收集可用的区域设置。\n\
  \n可用的区域设置通过 `<h:selectOneMenu>` 的 `<f:selectItems>` 以下拉选项的形式呈现给用户（参见图 14-1）。嵌套的\
  \ `<f:ajax>` 确保一旦用户更改选项，所选选项就会在受管 Bean 中设置。\n\n![](img/454457_2_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1\n更改活动区域设置\n\n\n\n`#{activeLocale.languageTag}`\n属性内部委托给当前的 `java.util.Locale`\n\
  实例。这样做主要是为了方便，这样我们就不必在想要于 `<h:selectOneMenu>` 中使用 `#{activeLocale.current}` 时，为其添加一个转换器。\n\
  `<f:ajax listener>` 基本上会借助一段在 Ajax 请求完成时执行的 JavaScript 来执行完整的页面重新加载。这是通过向 `PartialViewContext#getEvalScripts()`\
  \ 方法添加一个脚本来实现的，该方法是 Jakarta Faces 2.3 中新增的。任何添加的脚本最终都会按顺序出现在 Jakarta Faces Ajax\
  \ 响应的 `<eval>` 部分中，而该部分又会在 Jakarta Faces Ajax 引擎更新了 HTML DOM（文档对象模型）树之后执行。\n该脚本本身\
  \ `location.replace(location)`，基本上指示 JavaScript 重新加载当前文档，而不在历史记录中保留之前的文档。这意味着后退按钮不会重新显示同一页面。你也可以改用\
  \ `location.reload(true)`，但如果之前在同一文档上触发了同步（非 Ajax）POST 请求，则此方法无法正常工作。它会被重新执行并导致重复提交。而且它还会不必要地在历史记录中记住上一页。这可能会导致令人困惑的行为，因为后退按钮似乎没有效果，因为它会重新显示完全相同的页面（因为活动区域存储在会话中，而不是请求中）。\n\
  或者，在这种特定用例中，你也可以不使用 `<f:ajax listener>`，而仅使用 `<f:ajax render=\"@all\">` 且不带任何监听器。它至少有一个缺点：文档的标题不会被更新。无论如何，使用\
  \ `@all` 通常被认为是一种不好的做法。它只有一个合法的实际用例：在 Ajax 请求上显示完整的错误页面。\n作为一个完全不同的替代方案，你可以将活动区域设置为请求作用域而不是会话作用域，方法是将语言标签包含在\
  \ URL 中，例如 `http://example.com/en/page.xhtml`、`http://example.com/pt/page.xhtml`\
  \ 和 `http://example.com/hi/page.xhtml`。这样，你就可以通过简单地点击链接来更改活动区域。这只需要一个 Servlet 过滤器，从\
  \ URL 中提取 `java.util.Locale` 实例并将其转发到所需的 Jakarta Faces 页面，以及一个自定义视图处理程序，该处理程序将语言标签包含在任何\
  \ `<h:form>`、`<h:link>` 和 `<h:button>` 组件生成的 URL 中。\n\n**组织资源包键**\n\n当 Web 应用程序增长时，你可能会注意到资源包文件开始变得难以维护。关键在于遵循非常严格的约定来组织资源包键。可重用的站点范围条目，通常是那些用作输入标签、按钮标签、链接标签、表格标题标签等的条目，应使用通用前缀作为键（例如，“`label.save=Save`”）。特定于页面的条目应使用特定于页面的前缀作为键（例如，“`foldername_pagename.title=Some\
  \ Page Title`”）。以下是一个本地化 Facelets 模板的详细示例，`/WEB-INF/templates/page.xhtml`：\n\n```\n\
  \n#{text[page += '.title']}\n\n#{text[page += '.title']}\n\n© #{text['page_home.title']}\n\
  \n```\n\nJakarta 标签 `<c:set>` 基本上将 `UIViewRoot#getViewId()` 转换为适合作为页面特定前缀的字符串。Jakarta\
  \ Faces 视图 ID 基本上表示代表 Jakarta Faces 页面的物理文件的绝对服务器端路径（例如，“`/user/account.xhtml`”）。这需要被处理成适合作为资源包键的格式。`fn:split()`\
  \ 调用从中提取出 “`/user/account`” 部分，而 `fn:replace()` 调用将正斜杠转换为下划线，使其变成 “`_user_account`”。最后，`<c:set>`\
  \ 将其以 “`page_user_account`” 的名称存储在视图作用域中，名称为 “`page`”，以便在同一视图的其他地方可以作为 `#{page}`\
  \ 使用。\n\n你会注意到 `#{page}` 又被用作 `<h:body>` 的 ID 等。这使得在需要时，可以更容易地从通用的 CSS（层叠样式表）文件中选择特定页面。`#{page}`\
  \ 还被用于多个资源包引用中，例如 `#{text[page += '.title']}`，在 “`/home.xhtml`” 的情况下，它最终引用键 “`page_home.title`”。使用这样的模板，你可以拥有以下特定于页面的资源包条目：\n\
  \n```\npage_home.title = My Website\npage_home.meta.description = A Hello World\
  \ Faces application.\npage_login.title = Log In\npage_login.meta.description = Log\
  \ in to My Website.\npage_signup.title = Sign Up\npage_signup.meta.description =\
  \ Sign up to My Website.\n```\n\n以下是一个使用前面展示的模板 `/WEB-INF/templates/page.xhtml`\
  \ 的模板客户端示例，即 `/login.xhtml`：\n\n以下是关联的资源包条目的样子：\n\n```\nlabel.email = Email\nlabel.password\
  \ = Password\nlabel.login = Log In\n```\n\n注意：如果你发现页面显示不正常，只需添加一个包含以下规则的 CSS 文件即可：\n\
  \n```\nnav a, fieldset label, fieldset input {\ndisplay: block;\n}\n```\n\n**本地化转换/验证消息**\n\
  \n如果你已经准备了一个简单的支持 bean 类 `Login`，它有两个字符串属性 `email` 和 `password`，以及一个方法 `submit()`，并且提交了前面显示的登录页面而没有填写电子邮件输入字段，那么你将遇到以下格式的验证错误：\n\
  \n```\nlogin:email: Validation Error: Value is required.\n```\n\n当你将语言切换到葡萄牙语并重新提交空表单时，你会看到它也被本地化了。但是，当你进一步将语言切换到印地语时，你会注意到标准的\
  \ Jakarta Faces 实现中没有标准的印地语消息包。你需要提供你自己的。有几种方法可以实现这一点。\n\n首先，Jakarta Faces 输入和选择组件支持三个属性来覆盖默认消息：`requiredMessage`、`validatorMessage`\
  \ 和 `converterMessage`。以下示例展示了如何覆盖默认的必填消息：\n\n```\n这可以说是最简单的方法。主要的缺点是，如果你没有将其包装在像\
  \ `<my:inputText>` 这样的可重用标签文件中，你必须在任何地方复制/粘贴它。这不符合 DRY 原则。^(¹¹⁴)\n\n另一种方法是提供一个自定义消息包，覆盖所有特定于\
  \ Jakarta Faces 转换/验证消息的预定义包键，并将其注册为 `faces-config.xml` 中的 `<message-bundle>`。你可以在\
  \ Jakarta Faces 规范的 2.5.2.4 节“本地化应用程序消息”中找到所有预定义的包键。默认必填消息 “Validation Error: Value\
  \ is Required” 的包键是 `jakarta.faces.component.UIInput.REQUIRED`。我们可以在新的消息包文件中对其进行调整，如下所示：\n\
  \n```\nmain/java/resources/com/example/project/i18n/messages.properties\njakarta.faces.component.UIInput.REQUIRED\
  \ = {0} is required.\nmain/java/resources/com/example/project/i18n/messages_pt_BR.properties\n\
  jakarta.faces.component.UIInput.REQUIRED = {0} é obrigatório.\nmain/java/resources/com/example/project/i18n/messages_hi.properties\n\
  jakarta.faces.component.UIInput.REQUIRED = {0} आवश्यक है.\n```\n\n最后，在 `faces-config.xml`\
  \ 文件的 `<application>` 元素中对其进行配置：\n\n```\n...\ncom.example.project.i18n.messages\n\
  \n```\n\n你可能已经注意到消息中的 `{0}` 占位符。它们代表关联的输入和选择组件的标签。标签默认为组件的客户端 ID，这基本上是你可以在浏览器页面源代码中找到的\
  \ Jakarta Faces 生成的 HTML 元素的 ID。你可以通过显式设置组件的 `label` 属性来覆盖它。\n\n\n\n请注意，将消息包放在与资源包不同的文件中并非严格必要。你也可以直接将消息包条目放入\
  \ `text.properties` 文件中，并调整 `faces-config.xml` 中的 `<message-bundle>` 条目，使其指向与 `<resource-bundle>`\
  \ 相同的完全限定名（FQN）。\n\n在自定义转换器/验证器中获取本地化消息\n\n`<message-bundle>` 条目的值可以通过 `Application#getMessageBundle()`\
  \ 以编程方式获取。然后，你可以利用该值，结合 `java.util.ResourceBundle` API 和 `UIViewRoot#getLocale()`\
  \ 来获取实际的包。这使得你能够在自定义转换器和验证器中获取本地化消息。以下是这样一个验证器的示例，它检查指定的电子邮件地址是否已被使用：\n\n```\n@FacesValidator(value\
  \ = \"duplicateEmailValidator\", managed = true)\npublic class DuplicateEmailValidator\
  \ implements Validator {\n@Inject\nprivate UserService userService;\n@Override\n\
  public void validate\n(FacesContext context, UIComponent component, String value)\n\
  throws ValidatorException\n{\nif (value == null) {\nreturn;\n}\nOptional user =\
  \ userService.findByEmail(value);\nif (user.isPresent()) {\nthrow new ValidatorException(new\
  \ FacesMessage(getMessage(\ncontext, \"message.duplicateEmailValidator\")));\n}\n\
  }\npublic static String getMessage(FacesContext context, String key) {\nreturn ResourceBundle.getBundle(\n\
  context.getApplication().getMessageBundle(),\ncontext.getViewRoot().getLocale()).getString(key);\n\
  }\n}\n```\n\n请注意 `@FacesValidator` 注解中的 `managed` 属性。这基本上会开启验证器实例上的 CDI 支持，从而允许你向验证器中注入业务服务。`@FacesConverter`\
  \ 也提供了相同的属性。\n\n上面展示的验证器示例假设由 `<message-bundle>` 标识的资源包文件中存在以下条目：\n\n```\nmessage.duplicateEmailValidator\
  \ = Email is already in use.\n```\n\n本地化枚举\n\n本地化枚举最简洁的方法是直接使用枚举自身的标识作为包键。这可以使枚举类免受潜在的\
  \ UI 特定杂乱信息（如硬编码的包键）的干扰。通常，枚举的简单名称与枚举值的组合足以表示一个站点范围内的唯一标识符。给定以下代表用户组的 `com.example.project.model.Group`\
  \ 枚举：\n\n```\npublic enum Group {\nUSER,\nMANAGER,\nADMINISTRATOR,\nDEVELOPER;\n\
  }\n```\n\n以及 `text.properties` 中的以下资源包条目：\n\n```\nGroup.USER = User\nGroup.MANAGER\
  \ = Manager\nGroup.ADMINISTRATOR = Administrator\nGroup.DEVELOPER = Developer\n\
  ```\n\n你可以像下面这样轻松地本地化它们：\n\n```\n\n...\n\n```\n\n请注意，`<f:importConstants>` 需要放置在\
  \ `<f:metadata>` 内部。其 `type` 属性必须代表枚举的完全限定名，或者任何包含 `public static final` 形式公共常量的类或接口。`<f:importConstants>`\
  \ 会自动将它们作为 `Map<String, Object>` 导入到 EL 作用域中，其中 map 的键代表常量的名称（字符串形式），map 的值代表常量的实际值。\n\
  通过 `#{Group.values()}`，你可以获取所有常量值的集合，然后每个值在 `itemLabel` 中被本地化。另请注意，`itemValue` 被省略了，因为它默认使用\
  \ `var` 属性的值，而这已经足够了。\n\n参数化的资源包值\n\n你还可以使用 `java.text.MessageFormat` API 的 `{0}`\
  \ 占位符来参数化你的资源包条目。^(¹¹⁵) 在 Jakarta Faces 端，它们只能通过 `<h:outputFormat>` 进行替换，其中参数作为\
  \ `<f:param>` 子元素提供，顺序与占位符相同。给定以下条目：\n\n```\npage_products.table.header = There\
  \ {0, choice, 0#are no products\n| 1#is one product\n| 1<are {0} products}.\n```\n\
  \n可以使用 `<h:outputFormat>` 如下进行替换：\n\n基于数据库的 ResourceBundle\n\nJakarta Faces 还支持指定一个自定义的\
  \ `ResourceBundle` 实现作为 `<base-name>`。这允许你以编程方式填充和提供所需的包，例如，从多个包文件，甚至从数据库中。在这个例子中，我们将用从数据库加载条目的资源包来替换默认的基于属性文件的资源包。这使我们更进一步地组织资源包键。通过这种方式，你甚至可以通过基于\
  \ Web 的界面来编辑它们。\n以下是 Jakarta Persistence 实体的样子：\n\n```\n@Entity\n@Table(uniqueConstraints\
  \ = {\n@UniqueConstraint(columnNames = { \"locale\", \"key\" })\n})\npublic class\
  \ Translation {\n@Id @GeneratedValue(strategy = GenerationType.IDENTITY)\nprivate\
  \ Long id;\n@Column(length = 5, nullable = false)\nprivate @NotNull Locale locale;\n\
  @Column(length = 255, nullable = false)\nprivate @NotNull String key;\n@Lob @Column(nullable\
  \ = false)\nprivate @NotNull String value;\n// 在此处添加/生成 getter 和 setter 方法。\n}\n\
  ```\n\n请注意，Jakarta Persistence 注解提供了足够的提示，说明表的 DDL（数据定义语言）应该是什么样子。当在 `persistence.xml`\
  \ 中将属性 `jakarta.persistence.schema-generation.database.action` 设置为 `create` 或 `drop-and-create`\
  \ 时，它将自动生成适当的 DDL。为完整起见，这里是 HSQL/pgSQL 风格的 DDL。\n\n```\nCREATE TABLE Translation\
  \ (\nid BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,\nlocale VARCHAR(5)\
  \ NOT NULL,\nkey VARCHAR(255) NOT NULL,\nvalue CLOB NOT NULL\n);\nALTER TABLE Translation\n\
  ADD CONSTRAINT UK_Translation_locale_key\nUNIQUE (locale, key);\n```\n\n以下是 Jakarta\
  \ Enterprise Beans 服务的样子。\n\n```\n@Stateless\npublic class TranslationService {\n\
  @PersistenceContext\nprivate EntityManager entityManager;\n@TransactionAttribute(value\
  \ = REQUIRES_NEW)\n@SuppressWarnings(\"unchecked\")\npublic Object[][] getContent\n\
  (Locale locale, Locale fallback)\n{\nList resultList = entityManager.createQuery(\n\
  \"SELECT t1.key, COALESCE(t2.value, t1.value)\"\n+ \" FROM Translation t1\"\n+ \"\
  \ LEFT OUTER JOIN Translation t2\"\n+ \" ON t2.key = t1.key\"\n+ \" AND t2.locale\
  \ = :locale\"\n+ \" WHERE t1.locale = :fallback\")\n.setParameter(\"locale\", locale)\n\
  .setParameter(\"fallback\", fallback)\n.getResultList();\nreturn resultList.toArray(new\
  \ Object[resultList.size()][]);\n}\n}\n```\n\n对于 Jakarta Persistence，我们只需要一个额外的转换器，用于在模型中的\
  \ `java.util.Locale` 和数据库中的 `VARCHAR`（由 `java.lang.String` 表示）之间进行转换。你可以为此使用 `AttributeConverter`。它很像\
  \ Jakarta Faces 转换器，但用于 Jakarta Persistence 实体。它相对简单；不需要额外的配置。请参见以下内容：\n\n```\n\
  public class LocaleConverter\nimplements AttributeConverter\n{\n@Override\npublic\
  \ String convertToDatabaseColumn(Locale locale) {\nreturn locale.toLanguageTag();\n\
  }\n@Override\npublic Locale convertToEntityAttribute(String languageTag) {\nreturn\
  \ Locale.forLanguageTag(languageTag);\n}\n}\n```\n\n现在我们有了自定义的 `ResourceBundle`；它被称为\
  \ `DatabaseResourceBundle`。将其放在包 `com.example.project.i18n` 中。\n\n\n\n```\npublic\
  \ class DatabaseResourceBundle extends ResourceBundle {\nprivate static final Control\
  \ CONTROL = new DatabaseControl();\n@Override\npublic Object handleGetObject(String\
  \ key) {\nreturn getCurrentInstance().getObject(key);\n}\n@Override\npublic Enumeration\
  \ getKeys() {\nreturn getCurrentInstance().getKeys();\n}\nprivate ResourceBundle\
  \ getCurrentInstance() {\nFacesContext context = FacesContext.getCurrentInstance();\n\
  String key = CONTROL.getClass().getName();\nreturn (ResourceBundle) context.getAttributes()\n\
  .computeIfAbsent(key, k -> ResourceBundle.getBundle(key,\ncontext.getViewRoot().getLocale(),\n\
  Thread.currentThread().getContextClassLoader(),\nCONTROL));\n}\nprivate static class\
  \ DatabaseControl extends Control {\n@Override\npublic ResourceBundle newBundle\n\
  (String baseName, Locale locale, String format,\nClassLoader loader, boolean reload)\n\
  throws IllegalAccessException, InstantiationException,\nIOException\n{\nFacesContext\
  \ context = FacesContext.getCurrentInstance();\nfinal Object[][] contents = CDI.current()\n\
  .select(TranslationService.class).get()\n.getContent(\nlocale,\ncontext.getApplication().getDefaultLocale());\n\
  return new ListResourceBundle() {\n@Override\nprotected Object[][] getContents()\
  \ {\nreturn contents;\n}\n};\n}\n}\n}\n```\n\n最后，调整 `faces-config.xml` 中的 `<resource-bundle><base-name>`\n\
  条目，将自定义 `ResourceBundle` 的完全限定名称指定为：\n\n```\ncom.example.project.i18n.DatabaseResourceBundle\n\
  ```\n\n坦率地说，这个 `ResourceBundle` 的实际实现有些取巧，仅仅是因为存在以下限制：\n\n1.  Jakarta Faces 不允许通过\
  \ `faces-config.xml` 定义自定义的 `ResourceBundle.Control`。\n2.  通过 SPI（串行外设接口）以 `java.util.spi.ResourceBundleControlProvider`\
  \ 的形式提供自定义的 `ResourceBundle.Control` 在 WAR 环境中无法生效。\n3.  为 `faces-config.xml` 中注册的每个语言环境创建多个独立的\
  \ `DatabaseResourceBundle` 子类，例如 `DatabaseResourceBundle_en`、`DatabaseResourceBundle_pt_BR`\
  \ 和 `DataBaseResourceBundle_hi`，以满足默认的 `ResourceBundle.Control` 行为，从长远来看不利于维护。\n\
  \n这种方法的另一个优点是，它允许你通过简单地调用 `ResourceBundle#clearCache()` 以编程方式清除缓存中的任何数据库资源包。也就是说，Jakarta\
  \ Faces 实现可能会在其 `Application` 实现中进一步缓存它，导致 `ResourceBundle#clearCache()` 看起来完全没有效果。已知\
  \ Mojarra 会这样做。^(¹¹⁶)\n\nResourceBundle 中的 HTML\n\n这是一种不良实践。它会增加维护负担。对于大段内容，你最好选择比\
  \ HTML 更轻量级的标记语言，例如 Markdown。^(¹¹⁷) 这不仅在 XSS（跨站脚本）风险方面更安全，而且用户通过某些内容管理系统（CMS）界面中的文本区域进行编辑也更容易。最好与基于数据库的资源包结合实现。你可以向\
  \ `Translation` 模型添加一个额外的布尔标志，指示该值是否应解析为 Markdown。\n\n```\n@Column(nullable = false)\n\
  private boolean markdown;\n```\n\n然后，在 `TranslationService#getContents()` 内部，将其作为第三列进行选择。\n\
  \n```\n\"SELECT t1.key, COALESCE(t2.value, t1.value), t1.markdown\"\n```\n\n最后，在\
  \ `DatabaseControl#newBundle()` 方法中，检索内容后，你可以根据该布尔值对它们进行后处理。你可以为此使用任何基于 Java 的 Markdown\
  \ 库，例如 CommonMark。^(¹¹⁸)\n\n```\nstatic final Parser PARSER = Parser.builder().build();\n\
  static final HtmlRenderer RENDERER = HtmlRenderer.builder().build();\n...\nfor (Object[]\
  \ translation : contents) {\nif ((boolean) translation[2]) {\ntranslation[1] = RENDERER.render(PARSER.parse(translation[1]));\n\
  }\n}\n```\n\n脚注\n\n15. 扩展\n\n如果说 Jakarta Faces 有一个单一的元素或优点可以归因于其长久存在，那可能就是它能够以多种方式进行扩展。从一开始，Jakarta\
  \ Faces 就使得替换、装饰或增强其大部分核心元素成为可能。这催生了大量的扩展库和项目。在早期，这些包括 A4J (Ajax4JSF)、Tomahawk、RichFaces、独立的\
  \ Facelets 项目、PrettyFaces 等等。A4J 被合并到 RichFaces 中，而 RichFaces 本身最终在 2016 年停止服务。Facelets\
  \ 被纳入 Jakarta Faces 本身，而 PrettyFaces 则成为 Rewrite 框架的一部分。如今，知名且活跃的扩展库包括 PrimeFaces、OmniFaces\
  \ 和 BootsFaces 等。虽然个别库来了又去，但从早期至今，Jakarta Faces 的可扩展性始终如一。有时人们会说所有这些库都是为了解决 Jakarta\
  \ Faces 的缺陷或遗漏，但这并不完全准确。事实上，Jakarta Faces 被明确设计为允许此类扩展，从而允许甚至刺激此类扩展库的出现。例如，Jakarta\
  \ Faces 的同期技术 Jakarta Enterprise Beans（以前称为 Jakarta Enterprise Beans, Enterprise\
  \ JavaBeans）几乎没有扩展点，因此，尽管它有许多缺点，我们从未看到围绕它形成繁荣的生态系统。\n\n扩展类型\n有几种不同的方式可以使用 Jakarta\
  \ Faces 中的各种扩展点。一个主要的区别在于“经典”方法和“以 CDI 为中心的方法”。在后一种方法中，Jakarta Faces 几乎不需要显式支持可扩展性，因为\
  \ CDI 内置了许多机制来支持扩展或替换 CDI 工件。第 8 章的表 8-1 展示了这些工件。\n\n扩展 CDI 工件\nCDI 增强或完全替换类型的一种方式是提供替代生产者。我们已经在第\
  \ 13 章中看到了这种技术的使用，尽管用例略有不同。最简单的方法是当你需要完全替换该类型时。如果需要增强，则需要一些代码来获取先前的类型，这在当前版本的 CDI\
  \ (4.0) 中略显冗长。\n\n以下展示了一个示例，我们将请求参数映射替换为一个新的映射，该映射包含原始映射的所有值，以及我们自己添加的一个额外值：\n\n\
  ```\n@Dependent @Alternative @Priority(APPLICATION)\npublic class RequestParameterMapProducer\
  \ {\n@Produces @RequestScoped @RequestParameterMap\npublic Map producer(BeanManager\
  \ beanManager) {\nMap previousMap = getPreviousMap(beanManager);\nMap newMap = new\
  \ HashMap(previousMap);\nnewMap.put(\"test\", \"myTestValue\");\nreturn newMap;\n\
  }\n}\n```\n\n如前所述，`getPreviousMap()` 方法有些冗长。其定义如下：\n\n```\nprivate Map getPreviousMap(BeanManager\
  \ beanManager) {\nclass RequestParameterMapAnnotationLiteral\nextends AnnotationLiteral\n\
  implements RequestParameterMap\n{\nprivate static final long serialVersionUID =\
  \ 1L;\n}\nType MAP_TYPE = new ParameterizedType() {\n@Override\npublic Type getRawType()\
  \ {\nreturn Map.class;\n}\n@Override\npublic Type[] getActualTypeArguments() {\n\
  return new Type[] {String.class, String.class};\n}\n@Override\npublic Type getOwnerType()\
  \ {\nreturn null;\n}\n};\nreturn (Map) beanManager\n.getReference(beanManager\n\
  .resolve(beanManager\n.getBeans(MAP_TYPE, new RequestParameterMapAnnotationLiteral())\n\
  .stream()\n.filter(bean -> bean\n.getBeanClass() != RequestParameterMapProducer.class)\n\
  .collect(Collectors.toSet())),\nMAP_TYPE,\nbeanManager.createCreationalContext(null));\n\
  }\n}\n```\n\n\n\n预计在将来修订任何相关规范时，获取此“先前”或“原始”类型的任务将变得更加容易。例如，未来版本的 Jakarta Faces\
  \ 可能会为其（CDI）注解引入现成的注解字面量，例如此处展示的 `RequestParameterMapAnnotationLiteral`。\n\n为了测试这个替代生产者是否有效，请考虑以下后台\
  \ bean：\n\n```\n@Named @RequestScoped\npublic class TestBean {\n@Inject @RequestParameterMap\n\
  private Map requestParameterMap;\npublic String getTest() {\nreturn requestParameterMap.get(\"\
  test\");\n}\npublic String getFoo() {\nreturn requestParameterMap.get(\"foo\");\n\
  }\n}\n```\n\n以及以下 Facelet：\n\n```\n\nTest: #{testBean.test}\nFoo: #{testBean.foo}\n\
  \n```\n\n部署一个包含这些工件且带有请求参数（例如“`foo=bar`”）的应用程序，将会发现新的映射确实包含了原始请求参数以及我们自己添加的值。\n\n\
  扩展经典工件\n在 Jakarta Faces 中，增强或完全替换某个类型的经典方法是为该类型安装一个工厂。这种工厂的基本工作方式与之前演示的 CDI 方法大致相同；工厂返回所请求类型的实现，并获取对“先前”或“原始”类型的引用。\n\
  \n在 Jakarta EE 中，“经典”通常意味着 XML，确实，经典工厂涉及 XML。具体来说，注册工厂需要在 `faces-config.xml` 中使用\
  \ `<factory>` 元素，并为每个需要提供工厂的类型使用特定的元素。截至 Jakarta Faces 4.0，支持以下工厂：\n\n*   `<application-factory>`\n\
  *   `<exception-handler-factory>`\n*   `<external-context-factory>`\n*   `<faces-context-factory>`\n\
  *   `<facelet-cache-factory>`\n*   `<partial-view-context-factory>`\n*   `<lifecycle-factory>`\n\
  *   `<view-declaration-language-factory>`\n*   `<tag-handler-delegate-factory>`\n\
  *   `<render-kit-factory>`\n*   `<visit-context-factory>`\n*   `<flash-factory>`\n\
  *   `<flow-handler-factory>`\n*   `<client-window-factory>`\n*   `<search-expression-context-factory>`\n\
  \n除此之外，还有另外一些工件可以通过类似但略有不同的方式进行替换/增强；这里，没有返回该类型的工厂，而是直接指定了该类型的实现。这种变体是通过 `faces-config.xml`\
  \ 中的 `<application>` 元素来指定的。截至 Jakarta Faces 4.0，以下类型可以直接替换/增强：\n\n*   `<navigation-handler>`\n\
  *   `<view-handler>`\n*   `<resource-handler>`\n*   `<search-expression-handler>`\n\
  *   `<flow-handler>`\n*   `<state-manager>`\n*   `<action-listener>`\n\n请注意，所有这些类型都是单例。从\
  \ Jakarta Faces 运行时的角度来看，每种类型只有一个实例，但通过包装的方式支持多个实现各自添加功能，从而形成一个链（实现 A 包装实现 B，实现\
  \ B 包装实现 C，依此类推）。\n上述为每种类型使用的特定元素立即凸显了经典方法的一个问题；Jakarta Faces *必须*为每个要以这种方式替换/增强的特定类型提供显式支持。相比之下，CDI\
  \ 方法允许我们替换/增强几乎任何类型，而无需 Jakarta Faces 提供特殊支持，只要 Jakarta Faces 对该工件使用 CDI 即可。\n好的一面是，与\
  \ Jakarta Faces 版本相比，当前工厂实现稍微简单一些，因为“先前”或“原始”类型只需在其构造函数中传递给它，而无需使用冗长的代码进行查找。\n\n\
  作为示例，我们将展示如何增强外部上下文工厂。为此，我们从在 `faces-config.xml` 中提到的注册开始。\n\n```\n\ncom.example.project.ExternalContextProducer\n\
  \n```\n\n然后实现如下所示：\n\n```\npublic class ExternalContextProducer extends ExternalContextFactory\
  \ {\npublic ExternalContextProducer(ExternalContextFactory wrapped) {\nsuper(wrapped);\n\
  }\n@Override\npublic ExternalContext getExternalContext\n(Object context, Object\
  \ request, Object response)\n{\nExternalContext previousExternalContext =\ngetWrapped().getExternalContext(context,\
  \ request, response);\nExternalContext newExternalContext =\nnew ExternalContextWrapper(previousExternalContext)\
  \ {\n@Override\npublic String getAuthType() {\nreturn \"OurOwnAuthType\";\n}\n};\n\
  return newExternalContext;\n}\n}\n```\n\n这里有几件事需要注意。首先，每种此类工厂都必须继承自一个预先定义好的父工厂，在本例中是\
  \ `ExternalContextFactory`。其次，存在一个必须遵循的隐式契约，即完全按照示例所示实现构造函数。也就是说，添加一个公共构造函数，其单个参数的类型与超类完全相同，并将此参数传递给超类构造函数。然后，该实例可在其他方法中通过\
  \ `getWrapped()` 方法使用。\n\n测试它是否确实有效相对容易。我们使用与 CDI 版本类似的后台 bean：\n\n```\n@Named @RequestScoped\n\
  public class TestBean {\n@Inject\nprivate ExternalContext externalContext;\npublic\
  \ String getAuth() {\nreturn externalContext.getAuthType();\n}\n}\n```\n\n以及以下 Facelet：\n\
  \n```\n\nTest: #{testBean.auth}\n\n```\n\n由于外部上下文也是可通过 CDI 注入的类型，细心的读者可能会想知道，如果同时为该类型提供了\
  \ CDI 替代生产者和经典工厂会发生什么。答案是，严格来说，这并未被规范明确说明（因此行为未定义），但在实践中，强烈暗示使用经典工厂作为最终获取外部上下文的来源。这意味着，`ExternalContext`\
  \ 的替代生产者只会影响 `ExternalContext` 的直接注入，而不会影响通过任何其他方式获取此类型的情况，例如，通过调用 `FacesContext#getExternalContext()`*。*\
  \ 这是用户应该清楚意识到的一点。不过，预计规范的未来修订版将使 CDI 生产者成为初始来源。\n\n插件\n除了替代生产者和工厂之外，Jakarta Faces\
  \ 提供的另一种扩展类型本质上是插件。这里，没有替换或增强核心的 Jakarta Faces 类型，而是向运行时的某些部分添加了额外的功能。因此，这些添加中的大多数必须以某种方式声明它们确切添加的内容，这与仅提供类型\
  \ `X` 或 `Y` 实现的工厂不同。\n\n插件作为 `<application>` 元素的子元素添加到 `faces-config.xml` 中，就像前面提到的一些类似工厂的类型一样。支持以下插件：\n\
  \n*   `<el-resolver>`\n*   `<search-keyword-resolver>`\n\n\n\n我们在第 12 章的“自定义搜索关键字”一节中已经看到了搜索关键字解析器的一个示例。该插件的特点是方法\
  \ `isResolverForKeyWord()`，通过此方法，插件可以指明它将为哪个关键字或关键字模式运行。\n\n这里我们将看另一个示例，即 EL 解析器。EL\
  \ 解析器本身并非 Jakarta Faces 特有的类型，而是源自表达式语言（EL）规范。不过，该规范的重要部分确实起源于 Jakarta Faces。\n\n\
  EL 解析器允许我们以自定义方式解释表达式的所谓基对象（base）和属性（property）。考虑表达式 `#{foo.bar.kaz}`，在解析“`bar`”时，“`foo`”是基对象，“`bar`”是属性；而在解析“`kaz`”时，“`bar`”是基对象，“`kaz`”是属性。起初可能有点令人惊讶的是，当解析“`foo`”时，基对象是\
  \ `null`，而“`foo`”是属性。\n\n在实践中，通常不需要添加自定义 EL 解析器，我们通常只需定义一个满足需求的命名 CDI bean 即可。然而，当\
  \ Jakarta Faces 集成在一个完全不同的环境中时，自定义 EL 解析器就可能派上用场了，比如我们希望表达式解析到一个完全不同的（受管理的）bean\
  \ 系统。即便如此，CDI 到其他 bean 的桥接器可能仍是更好的选择，但了解自定义 EL 解析器是我们武器库中的另一件工具也是件好事。\n\n无论如何，为了演示\
  \ EL 解析器的功能，我们将展示一个示例，其中 EL 表达式的基对象被解释为一个模式，这是我们无法直接用命名 CDI bean 做到的。\n\n以下是一个 EL\
  \ 解析器的示例：\n\n```\npublic class CustomELResolver extends ELResolver {\nprotected\
  \ boolean isResolverFor(Object base, Object property) {\nreturn base == null\n&&\
  \ property instanceof String\n&& ((String) property).startsWith(\"dev\");\n}\n@Override\n\
  public Object getValue\n(ELContext context, Object base, Object property)\n{\nif\
  \ (isResolverFor(base, property)) {\ncontext.setPropertyResolved(true);\nreturn\
  \ property.toString().substring(3);\n}\nreturn null;\n}\n@Override\npublic Class\
  \ getType\n(ELContext context, Object base, Object property)\n{\nif (isResolverFor(base,\
  \ property)) {\ncontext.setPropertyResolved(true);\nreturn String.class;\n}\nreturn\
  \ null;\n}\n@Override\npublic Class getCommonPropertyType\n(ELContext context, Object\
  \ base)\n{\nreturn base == null ? getType(context, base, null) : null;\n}\n@Override\n\
  public boolean isReadOnly\n(ELContext context, Object base, Object property)\n{\n\
  return true;\n}\n@Override\npublic void setValue\n(ELContext context, Object base,\
  \ Object property, Object value)\n{\n// NOOP\n}\n@Override\npublic Iterator getFeatureDescriptors\n\
  (ELContext context, Object base)\n{\nreturn null;\n}\n}\n```\n\n如果我们现在使用以下 Facelet：\n\
  \n```\n\nTest: #{devThisIsDev}\n\n```\n\n在请求该页面时，我们会看到输出“Test: ThisIsDev”。这里发生的情况是，自定义\
  \ EL 解析器处理所有以“dev”开头的名称。\n\n动态扩展\n前面的示例主要是关于静态注册我们需要的扩展，例如，通过直接在 `faces-config.xml`\
  \ 中注册工厂或类型。工厂为我们提供了一些实现动态行为的机会。也就是说，在调用工厂时，我们可以决定返回什么新类型（如果有的话）。\n\n为了实现更动态的行为，通常需要能够动态添加工厂，或者在\
  \ CDI 中动态添加生产者。CDI 为此提供了一个复杂的 SPI（服务提供者接口）（简称为“CDI 扩展”），但这在一定程度上超出了本书的范围。\n\n对于经典工厂以及实际上\
  \ `faces-config.xml` 中的所有内容，有一种较低级别的方法可以动态添加它们：应用程序配置填充器（Application Configuration\
  \ Populator），我们接下来将讨论它。\n\n应用程序配置填充器\n应用程序配置填充器是一种通过编程方式提供额外 `faces-config.xml`\
  \ 文件的机制，尽管它使用的是 XML DOM（文档对象模型）API（应用程序编程接口）。这个 DOM API 使用起来可能有些晦涩，并且应用程序配置填充器的功能受限于它只能进行配置。在\
  \ Jakarta Faces 中，没有 SPI 可以直接在此级别修改其他 `faces-config.xml`。\n\n该机制的工作原理是实现抽象类 `jakarta.faces.application.ApplicationConfigurationPopulator`，并将其完全限定类名放入\
  \ JAR 库的 `META-INF/services/jakarta.faces.application.ApplicationConfigurationPopulator`\
  \ 文件中。\n\n为了演示这一点，我们将创建之前演示的 `ExternalContextProducer` 的另一个版本，这次使用提到的 `ApplicationConfigurationPopulator`。为此，我们采用相同的代码，移除\
  \ `faces-config.xml` 文件，并添加 `META-INF/services` 条目以及以下 Java 类：\n\n```\npublic class\
  \ ConfigurationProvider\nextends ApplicationConfigurationPopulator\n{\n@Override\n\
  public void populateApplicationConfiguration(Document document) {\nString ns = document.getDocumentElement().getNamespaceURI();\n\
  Element factory = document.createElementNS(ns, \"factory\");\nElement externalContextFactory\
  \ =\ndocument.createElementNS(ns, \"external-context-factory\");\nexternalContextFactory.appendChild(\n\
  document.createTextNode(\nExternalContextProducer.class.getName()));\nfactory.appendChild(externalContextFactory);\n\
  document.getDocumentElement().appendChild(factory);\n}\n}\n```\n\n需要注意的是，由于这底层使用了\
  \ `java.util.ServiceLoader`，它仅在 `ConfigurationProvider` 和 `ExternalContextProducer`\
  \ 一起打包在 WAR 的 `/WEB-INF/lib` 目录下的实际 JAR 库中时才有效，而不是直接放在 WAR 中。\n\n应用程序主类\n之前我们讨论了应用程序配置填充器，正如我们所看到的，它实际上是一种\
  \ `faces-config.xml` 提供者。这意味着它处理的是完全限定类名和本质上仍是文本的元素。\n\nJakarta Faces 也提供了多种更传统的编程式\
  \ API，其中最著名的可能是 `jakarta.faces.application.Application` 主类，它除了其他功能外，还持有我们在“扩展经典工件”一节中提到的相同单例对象。为完整起见，我们在此重复这个列表。\n\
  \n*   `jakarta.faces.application.NavigationHandler`\n\n*   `jakarta.faces.application.ViewHandler`\n\
  \n*   `jakarta.faces.application.ResourceHandler`\n\n*   `jakarta.faces.component.search.SearchExpressionHandler`\n\
  \n*   `jakarta.faces.flow.FlowHandler`\n\n*   `jakarta.faces.application.StateManager`\n\
  \n*   `jakarta.faces.event.ActionListener`\n\n所有这些在 `Application` 类上都有相应的 setter\
  \ 方法。例如，以下展示了 `ActionListener` 的 Javadoc 和方法声明：\n\n```\n/**\n* \n* 设置要注册为所有 {@link\
  \ jakarta.faces.component.ActionSource} 组件默认的 {@link ActionListener}。\n* \n*\n*\
  \ @param listener 新的默认 {@link ActionListener}\n*\n* @throws NullPointerException\n\
  *             如果 listener 为 null\n*/\npublic abstract void setActionListener(ActionListener\
  \ listener);\n```\n\n同样，`Application` 类对于我们在“插件”一节中提到的插件类型也有“`add`”方法。\n\n*   `jakarta.el.ELResolver`\n\
  \n*   `jakarta.faces.el.PropertyResolver`\n    （已弃用）\n\n*   `jakarta.faces.el.VariableResolver`\n\
  \    （已弃用）\n\n*   `jakarta.faces.component.search.SearchKeywordResolver`\n\n\n\n\
  使用 `Application` 类来设置这些单例的一个难点在于，它首先对时机非常敏感。这意味着我们只能从某个特定时间点开始设置此类，显然不能早于 `Application`\
  \ 本身可用的时间点，而对于某些单例，则要等到第一个请求被处理之后才能设置。这个“第一个请求”是一个有点难以追踪的时间点。具体来说，资源处理器、视图处理器、流程处理器和状态处理器，呃，状态*管理器*，在第一个请求之后就不能再设置了，而\
  \ EL 解析器和搜索关键字解析器在第一个请求之后也不能再添加。\n\n为了演示这一点，我们将再次添加之前演示过的自定义 EL 解析器，但这次采用更动态的方式。为此，我们从\
  \ `faces-config.xml` 文件中移除 EL 解析器，并添加一个系统监听器。修改后的 `faces-config.xml` 文件如下所示：\n\n\
  ```\n\ncom.example.project.ELResolverInstaller\n\njakarta.faces.event.PostConstructApplicationEvent\n\
  \n```\n\n确实，这并没有摆脱 XML，实际上 XML 甚至更多了，但减少或摆脱 XML 并非此处的主要目的，主要目的是能够以更动态的方式注册 EL 解析器。\n\
  \n我们刚刚注册的系统事件监听器如下所示：\n\n```\npublic class ELResolverInstaller implements SystemEventListener\
  \ {\n@Override\npublic boolean isListenerForSource(Object source) {\nreturn source\
  \ instanceof Application;\n}\n@Override\npublic void processEvent(SystemEvent event)\
  \ {\nApplication application = (Application) event.getSource();\napplication.addELResolver(new\
  \ CustomELResolver());\n}\n}\n```\n\n这里我们有一个系统事件监听器，它监听 `PostConstructApplicationEvent`*。*\
  \ 这通常是添加像 EL 解析器这样的插件的好时机。此时 `Application` 实例保证可用，并且请求处理尚未开始，因此我们肯定能在第一个请求被处理之前及时完成。\n\
  \n局部扩展与包装\n在某些情况下，我们不想全局覆盖（例如）视图处理器，而只想在局部调用中覆盖，通常是在组件的方法中。Jakarta Faces 通过传递 `FacesContext`\
  \ 来支持这一点，组件将其作为获取几乎所有其他内容的主要入口点。对于 Jakarta Faces 来说，组件不是 CDI 制品，也不能通过其他方式注入，因此 CDI\
  \ 方法目前不适用于它们。\n\n然后可以通过使用 `FacesContextWrapper` 包装 `FacesContext` 并将其传递给下一层来实现局部扩展。请注意，Servlet\
  \ 规范使用了相同的模式，其中 `HttpServletRequest` 和 `HttpServletResponse` 可以由过滤器使用 `HttpServletRequestWrapper`\
  \ 和 `HttpServletResponseWrapper` 进行包装，并传递给下一个过滤器，该过滤器可以再次包装它并传递给它的下一个过滤器，依此类推。\n\
  \n为了说明这一点，假设对于某个特定组件，我们希望增强操作 URL 的生成（表单组件等会用到），使得该 URL 被附加“`?foo=bar`”。如果我们通过全局覆盖视图处理器来实现，那么所有使用视图处理器的组件和其他代码都会看到这个\
  \ URL，而这里我们只希望这个非常特定的组件看到它。\n\n为了实现这一点，我们使用包装，如下面的组件所示：\n\n```\n@FacesComponent(createTag\
  \ = true)\npublic class CustomForm extends HtmlForm {\n@Override\npublic void encodeBegin(FacesContext\
  \ context) throws IOException {\nsuper.encodeBegin(new ActionURLDecorator(context));\n\
  }\n}\n```\n\n如果没有 Jakarta Faces 的支持，实现这个包装器至少可以说是一项相当繁琐的任务，因为从 `FacesContext` 到\
  \ `ViewHandler` 的路径需要深入几次调用，并且涉及的类有大量方法。幸运的是，Jakarta Faces 通过为其大部分重要制品提供包装器（带有易于使用的构造函数）极大地简化了这项任务。\n\
  \n这里使用的模式是，顶层类（前面例子中的 `ActionURLDecorator`）继承自 `FacesContextWrapper`，并将原始的 `FacesContext`\
  \ 传递给其超类。然后，通过覆盖链中的初始方法（这里是 `getApplication()`）并返回该方法返回类型的包装器（同时将超类版本传递给其构造函数），来实现中间对象的路径。这个包装器然后对链中的下一个方法执行相同的操作，直到到达需要自定义行为的最终方法。\n\
  \n下面是一个示例：\n\n```\npublic class ActionURLDecorator extends FacesContextWrapper {\n\
  public ActionURLDecorator(FacesContext context) {\nsuper(context);\n}\n@Override\n\
  public Application getApplication() {\nreturn new ApplicationWrapper(super.getApplication())\
  \ {\n@Override\npublic ViewHandler getViewHandler() {\nreturn new ViewHandlerWrapper(super.getViewHandler())\
  \ {\n@Override\npublic String getActionURL\n(FacesContext context, String viewId)\n\
  {\nString url = super.getActionURL(context, viewId);\nreturn url + \"?foo=bar\"\
  ;\n}\n};\n}\n};\n}\n}\n```\n\n在 Jakarta Faces 应用程序中有了这两个类之后，现在考虑以下使用我们自定义表单组件的 Facelet：\n\
  \n请记住，当自定义组件使用 `@FacesComponent(createTag=true)` 注解时，不需要 XML 注册，其 XML 命名空间默认为 `jakarta.faces.component`，其组件标签名称默认为简单的类名；另请参见第\
  \ 11 章。\n如果我们请求与此 Facelet 对应的视图并按下按钮，那么我们会看到“`?foo=bar`”出现在 URL 之后，这意味着我们通过包装器链对视图处理器进行的局部扩展已正确生效。\n\
  \n\n\n内省（Introspection）\n\n能够正确扩展框架的一个重要方面，不仅在于能够利用扩展点，还在于能够内省框架，并查询它有哪些可用的工件或资源。\n\
  \nJakarta Faces 为内省提供支持的一个方面是，它能够揭示系统中存在哪些视图资源。请记住，在 Jakarta Faces 中，像 Facelets\
  \ 这样的视图被抽象在视图处理器（view handler）之后，而视图处理器又管理着一个或多个视图声明语言（VDL）实例。VDL，也称为模板引擎，能够通过资源处理器（resource\
  \ handler）读取其视图。正如我们在本章中所见，所有这些组件都可以被增强，甚至被完全替换。\n\n这具体意味着视图可以来自任何地方（例如，来自文件系统（最常见的情况）），但也可以在内存中生成、从数据库加载、通过网络获取等等。此外，像\
  \ Facelets 使用的简单物理文件到逻辑视图名称的映射，对于其他视图声明语言来说，也完全不必如此。\n\n综上所述，这意味着如果没有一个明确的内省机制，使得我们可以询问视图处理器、VDL\
  \ 和资源处理器它们有哪些可用的视图/资源，我们就无法可靠地获取完整的视图列表。\n\n例如，当我们想要使用所谓的无扩展名 URL（extensionless\
  \ URLs）时，就需要这样的视图列表。无扩展名 URL 是指没有任何扩展名（如 `.xhtml` 或 `.jsf`），也没有任何额外路径映射（如 `/faces/*`）的\
  \ URL。\n\n由于 URL 本身缺乏任何提示，Jakarta Faces 运行其上的 Servlet 容器必须通过其他方式知道某个请求必须被路由到 faces\
  \ servlet。\n\n实现这一点的一个特别优雅的方式是利用 Servlet 的“精确映射”功能。这是 URL 映射的一种变体，它将一个确切的名称（而非模式）映射到给定的\
  \ servlet，在本例中就是 faces servlet。由于 Servlet 规范提供了动态添加 Servlet 映射的 API，而 Jakarta Faces\
  \ 也提供了动态内省可用视图的 API，我们基本上只需要将这两者结合起来，就能实现无扩展名 URL。\n\n以下展示了如何实现这一点的示例：\n\n```java\n\
  @WebListener\npublic class ExtensionLessURLs implements ServletContextListener {\n\
  \    @Override\n    public void contextInitialized(ServletContextEvent event) {\n\
  \        FacesContext facesContext = FacesContext.getCurrentInstance();\n      \
  \  event.getServletContext()\n                .getServletRegistrations()\n     \
  \           .values()\n                .stream()\n                .filter(servlet\
  \ -> servlet\n                        .getClassName().equals(FacesServlet.class.getName()))\n\
  \                .findAny()\n                .ifPresent(facesServlet -> facesContext\n\
  \                        .getApplication()\n                        .getViewHandler()\n\
  \                        .getViews(facesContext, \"/\",\n                      \
  \          ViewVisitOption.RETURN_AS_MINIMAL_IMPLICIT_OUTCOME)\n               \
  \         .forEach(view -> facesServlet.addMapping(view)));\n    }\n}\n```\n\n这里发生的是，我们首先尝试找到\
  \ faces servlet，这恰好是内省的另一个例子，这次是在 Servlet 规范中。如果找到了，我们就向视图处理器请求所有视图。如前所述，这将在内部内省所有可用的视图声明实例，而这些实例又可能内省资源处理器。使用“`RETURN_AS_MINIMAL_IMPLICIT_OUTCOME`”参数是为了确保所有视图都以最简形式返回，不附加任何文件扩展名或其他标记。这与例如动作方法（action\
  \ methods）返回的形式相同，或者与命令组件（command components）的 action 属性一起使用的形式相同。\n\n获得正确格式的视图流后，我们直接将每个视图作为精确映射添加到我们之前找到的\
  \ faces servlet 中。\n\n例如，假设我们在 Web 根目录下的 `/foo` 文件夹中有一个名为 `bar.xhtml` 的 Facelet\
  \ 视图。那么 `getViews()` 将返回一个包含字符串“`/foo/bar`”的流。当 faces servlet 被映射到这个“`/foo/bar`”时，并假设\
  \ Jakarta Faces 应用程序部署在域 `localhost` 端口 `8080` 的上下文路径 `/test` 下，我们就可以请求 `http://localhost:8080/test/foo/bar`\
  \ 来查看该 Facelet 的渲染响应。\n\n请注意，尽管通过这种方式在 Jakarta Faces 中实现无扩展名 URL 相对简单，但为每个应用程序都这样做仍然有些繁琐。预计\
  \ Jakarta Faces 的下一个版本将通过单一设置来支持此功能。\n\n索引\n\nA\n\naccept 属性\n\nAccept-Language\
  \ 标头\n\nactionListener 属性\n\nActionSource 接口\n\n活动区域设置（Active locale）\n\naddPhaseListener()\
  \ 和 removePhaseListener() 方法\n\nAlexander Smirnov 的 Telamon 框架\n\n@Alternative 和\
  \ @Priority 注解\n\n应用程序编程接口（API）\n\n应用程序作用域数据（Application-scoped data）\n\n应用程序作用域托管\
