  trans: "\n因此，这些就是 `<h:body>`、`<h:commandButton>`、\n`<h:commandLink>`、\n`<h:dataTable>`、\n\
    `<h:form>`、\n`<h:graphicImage>`、\n`<h:inputFile>`、\n`<h:inputSecret>`、\n`<h:inputText>`、\n\
    `<h:inputTextarea>`、\n`<h:button>`、\n`<h:link>`、\n`<h:outputLabel>`、\n`<h:outputLink>`、\n\
    `<h:panelGrid>`、\n`<h:panelGroup>`、\n`<h:selectBooleanCheckbox>`、\n`<h:selectManyCheckbox>`、\n\
    `<h:selectManyListbox>`、\n`<h:selectManyMenu>`、\n`<h:selectOneListbox>`、\n`<h:selectOneMenu>`、\n\
    `<h:selectOneRadio>`、\n以及 `<f:websocket>`。\n你会看到所有可见的输入、选择和命令组件也都涵盖在内。\n`<f:ajax>`\
    \ 的一个要求是\n`ClientBehaviorHolder`\n组件必须嵌套在 `<h:form>` 中，并且\n模板中使用了 `<h:head>`。`<h:form>`\n\
    基本上使 JavaScript 能够执行带有正确 Jakarta Faces 视图状态关联的回发请求。`<h:head>`\n基本上使 `<f:ajax>`\
    \ 能够\n自动包含必要的 `faces.js` JavaScript\n文件，该文件包含（除其他外）必需的 `faces.ajax.request()`\n\
    函数。\n\n示例如下：\n\n```\nf:ajax 演示\n\n```\n\n生成的 HTML 输出：\n\n```\nf:ajax 演示\n\n```\n\
    \n在 Chrome 浏览器中的渲染效果（添加了换行符）与不使用 Ajax 时相同：\n\n![](img/454457_2_En_4_Figl_HTML.jpg)\n\
    \n在生成的 HTML 输出中，你会看到包含必要 Jakarta Faces Ajax API 的 `faces.js` JavaScript\n文件被自动包含在\
    \ HTML 头部。\n你还会注意到 `<f:ajax>` 在\n`<h:inputText>` 中生成了一个\n额外的 `onchange` 属性，\n\
    并在 `<h:commandButton>` 中生成了一个\n额外的 `onclick` 属性，\n两者都定义了一些 Jakarta Faces 实现特定的\
    \ JavaScript\n代码，负责执行 Ajax 请求。\nJakarta Faces 指定了两种内部 Ajax 事件类型：`valueChange`\
    \ 和 `action`。当 `<f:ajax>`\n没有指定 `event` 属性时，这些是\n默认的事件类型。当 `<f:ajax>` 被\n附加到一个实现了\
    \ `EditableValueHolder`\n接口的组件上时，默认事件类型变为 `valueChange`。对于\n实现了 `ActionSource`\n\
    接口的组件，默认事件类型是 `action`。对于所有其他\n`ClientBehaviorHolder`\n组件，默认事件是 `click`。这些内部事件类型实际生成的\
    \ HTML DOM 事件类型\n取决于组件和相关的渲染器。\n\n对于文本输入组件以及下拉和列表框选择组件，\n`<f:ajax>` 的默认 HTML DOM\
    \ 事件类型是\n`\"change\"`。对于\n复选框和单选按钮选择组件以及命令组件，\n默认事件类型是 `\"click\"`。你可以在\n生成的 HTML\
    \ 输出中看到这一点，这可以通过在\n`<f:ajax>` 标签上显式指定\n`event` 属性来覆盖。\n\n前面的示例将在 `onblur` 属性中生成\
    \ JavaScript 代码，\n而不是在 `onclick` 属性中。\n`event` 属性支持的值\n取决于目标 `ClientBehaviorHolder`\n\
    组件。这些值可以在相关组件的 VDL 文档中找到。所有 `on[event]` 属性\n都在那里定义。当你移除它们前面的 “`on`” 前缀时，\n你就得到了一个支持的事件类型列表。例如，`<h:inputText>`^(¹⁵)\
    \ 的 VDL\n文档指出支持以下事件类型：\n\n*   `blur`、\n    `change`、`click`、`dblclick`、`focus`、`keydown`、`keypress`、`keyup`、`mousedown`、`mousemove`、`mouseout`、`mouseover`、`mouseup`、`select`\n\
    \n当所需的 DOM 事件类型在客户端发生并\n触发 `on[event]`\n属性中定义的关联 Jakarta Faces 实现特定的 JavaScript\n\
    代码时，最终会调用\n标准 Jakarta Faces JavaScript API 的\n`faces.ajax.request()`\n函数。它将准备一组预定义的回发参数，其中\
    \ `jakarta.faces.source`\n和 `jakarta.faces.behavior.event`\n是最重要的。前者指定源组件的客户端\
    \ ID，本质上是在 JavaScript 上下文中\n`this.id` 的值。后者指定事件类型，本质上是在 JavaScript 上下文中\n`event.type`\
    \ 的值。你可能已经猜到，它们是从传递给特定于 Mojarra 的 `mojarra.ab()`\n函数的前两个参数派生出来的，如生成的 HTML 输出所示。\n\
    一旦触发，Ajax 请求将几乎以与非 Ajax 请求相同的方式\n运行 Jakarta Faces 生命周期。恢复视图阶段（第一阶段）、处理验证阶段（第三阶段）、\n\
    更新模型值阶段（第四阶段）和调用应用程序阶段（第五阶段）\n是相同的。应用请求值阶段（第二阶段）略有不同。\n它只会解码 `<f:ajax>` 标签的\n\
    `execute`\n属性所涵盖的组件，\n该属性默认为 `@this`（“当前\n组件”）。渲染响应阶段（第六阶段）则完全不同。\n它不会生成整个 HTML\
    \ 文档，而是生成一个\n特殊的 XML 文档，该文档仅包含 `<f:ajax>` 标签的 render 属性所涵盖的组件的\n生成 HTML 输出，\n\
    该属性默认为 `@none`（“没有\n组件”）。\n`<f:ajax>` 标签的\n`execute`\n和 `render`\n属性接受一个以空格分隔的组件搜索表达式集合。\n\
    这可以表示相对于最近的 `NamingContainer`\n父级的客户端 ID，或者始终相对于 `UIViewRoot` 的绝对客户端 ID，或者\n标准或自定义搜索关键字，或者它们的链式组合。有关它们的深入解释，请参阅\n\
    第 12 章。\n目前，我们只需要了解三个标准搜索\n关键字：`@this`、`@form` 和 `@none`。顾名思义，\n`@form` 关键字指的是\n\
    `UIForm` 类型（例如\n`<h:form>`）的最近父级组件。\n\n在 Ajax 请求的应用请求值阶段（第二阶段）期间，\n对于 `<f:ajax>`\
    \ 标签的\n`execute`\n属性所涵盖的每个组件，除了默认的解码过程之外，Jakarta Faces 还会检查\n`jakarta.faces.source`\n\
    请求参数是否等于当前组件的客户端 ID。如果是，\n则 Jakarta Faces 将为调用应用程序阶段（第五阶段）排队 `AjaxBehaviorEvent`。\n\
    在排队 `AjaxBehaviorEvent` 的底层，\n其逻辑归结如下：\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
    ExternalContext externalContext = context.getExternalContext();\nMap formData\
    \ = externalContext.getRequestParameterMap();\nString clientId = component.getClientId(context);\n\
    String source = formData.get(\"jakarta.faces.source\");\nString event = formData.get(\"\
    jakarta.faces.behavior.event\");\nif (clientId.equals(source)) {\ncomponent.getClientBehaviors().get(event)\n\
    .forEach(clientBehavior -> component.queueEvent(\nnew AjaxBehaviorEvent(context,\
    \ component, clientBehavior)));\n}\n```\n\n这里，`ClientBehavior`\n基本上代表了 `<f:ajax>`\
    \ 标签的定义。\n基于此逻辑，你可以得出结论：可以在同一个组件上附加多个 `<f:ajax>` 标签，\n甚至针对相同的事件类型。其优点是，如有必要，你可以在\n\
    完全相同的事件类型上注册多个 Ajax 行为监听器。\n"
- fmt: '那些 Ajax 行为监听器方法将在调用应用阶段（第五阶段）被调用；当然，仅当在处理验证阶段（第三阶段）期间没有转换或验证错误时才会如此。对于命令组件，这些
    Ajax 行为监听器方法将始终在动作监听器方法和动作方法*之前*被调用。无论目标组件是什么，Ajax 行为监听器方法必须是一个`public void`方法，该方法可以选择性地接受`AjaxBehaviorEvent`参数。


    ```

    public void onchangeFoo(AjaxBehaviorEvent event) {

    // ...

    }

    ```


    这为你在输入和选择组件中提供了机会，可以在特定的 Ajax 事件上执行一些业务任务。最常见的现实世界示例包括准备一个 bean 属性，该属性随后会在另一个组件中渲染。可以想象一下级联下拉菜单，其中子下拉菜单的可用项取决于父下拉菜单的选中项。


    在命令组件中，`<f:ajax listener>`并不是特别有用。你已经可以在动作监听器和/或动作方法中执行业务任务。即使附加了`<f:ajax>`，你也可以继续使用它们。


    在 Ajax 请求的渲染响应阶段（第六阶段），Jakarta Faces 将为`<f:ajax>`标签的`render`属性所覆盖的每个组件，在 Ajax
    响应中生成一个 XML `<update>`元素，该元素包含仅该特定组件及其所有子组件（如果有）的生成 HTML 输出。标准 Jakarta Faces JavaScript
    API 的`faces.ajax.response()`函数（由`faces.ajax.request()`注册为 Ajax 回调函数）将提取`<update>`元素的`id`属性，该属性代表目标组件的客户端
    ID，并通过 JavaScript 的`document.getElementById()`获取具体的 HTML 元素，并在 HTML DOM 树中将其替换为`<update>`元素的内容。


    以下是一个表单示例，其中包含一个必填输入字段（附带一条消息）和一个明确指向该消息组件的命令按钮：


    图 [4-2](#454457_2_En_4_Chapter.xhtml#Fig2) 展示了在提交未填写输入字段的表单后，Chrome 如何呈现 Ajax
    响应。这是一个很长的一行代码，因此稍微滚动了一下，以便从感兴趣的`<update>`元素开始。它包含了`<h:message id="m_text">`组件生成的
    HTML 输出。


    ![](images/454457_2_En_4_Chapter/454457_2_En_4_Fig2_HTML.png)


    图 4-2

    Chrome 开发者工具——网络——响应


    如果你在 XML 响应中进一步滚动，你还会注意到一个`<update id="j_id1:jakarta.faces.ViewState:0">`元素，其中包含`jakarta.faces.ViewState`隐藏输入元素的值。这对于
    Jakarta Faces 在跨 Ajax 请求时维护视图状态非常重要。当`render`属性恰好覆盖了一个`UIForm`组件时，当前 HTML 文档中的`jakarta.faces.ViewState`隐藏输入元素基本上会在用
    Ajax 响应的`<update>`元素替换 HTML DOM 树中的元素时被完全清除。


    任何缺失的`jakarta.faces.ViewState`隐藏输入元素最终都会被附加到当前`UIViewRoot`的每个`<form method="post">`中，并且任何现有`jakarta.faces.ViewState`隐藏输入元素的值都将被更新为新值。这种方法实际上是设计使然，原因有二：（1）视图状态值可能在跨
    Ajax 请求时发生变化，因此必须更新当前 HTML 文档中的现有表单以跟上这一变化，以防这些表单未被`render`属性覆盖；（2）当 Jakarta Faces
    状态保存方法明确设置为“`client`”时，`jakarta.faces.ViewState`隐藏输入字段的值可能会变得非常大，否则当`render`属性恰好覆盖多个表单时，会产生低效的
    Ajax 响应。


    ### Ajax 中的导航


    在具有正确定义的动作方法的命令组件中，使用 Ajax 执行导航与不使用 Ajax 执行导航并无不同。然而，有时你可能希望在附加到输入组件的 Ajax 监听器中执行导航，而不是在动作方法中。确实存在合理的现实世界用例。只有`UIInput`类不支持定义动作方法，并且`<f:ajax
    listener>`不支持返回导航结果。因此，你唯一的选择是以编程方式执行导航。这可以通过两种方式实现。第一种方式是使用`jakarta.faces.application.NavigationHandler`。^([^(16)](#fn16))


    ```

    public void ajaxListener(AjaxBehaviorEvent event) {

    // ...

    String outcome = "/otherview?faces-redirect=true";

    FacesContext context = FacesContext.getCurrentInstance();

    Application application = context.getApplication();

    NavigationHandler handler = application.getNavigationHandler();

    handler.handleNavigation(context, null, outcome);

    }

    ```


    第二种方式是使用`jakarta.faces.context.ExternalContext#redirect()`。^([^(17)](#fn17))


    ```

    public void ajaxListener(AjaxBehaviorEvent event) throws IOException {

    // ...

    String path = "/otherview.xhtml";

    FacesContext context = FacesContext.getCurrentInstance();

    ExternalContext externalContext = context.getExternalContext();

    String uri = externalContext.getRequestContextPath() + path;

    externalContext.redirect(uri);

    }

    ```


    两者之间存在几个差异。最重要的是，`NavigationHandler`可以处理隐式导航结果值，但`ExternalContext#redirect()`只能处理实际路径，并且在涉及
    Web 应用程序资源时需要手动添加请求上下文路径前缀。然而，它基本上可以接受任何 URI，例如外部 URL，如`externalContext.redirect("https://example.com")`，而`NavigationHandler`无法处理这些。


    ### GET 表单


    Jakarta Faces 没有“GET 表单”的概念，但你可以为此使用纯 HTML。Jakarta Faces 支持处理 GET 请求参数并在 GET 请求上调用受管
    bean 动作。为此，可以使用`<f:viewParam>`和`<f:viewAction>`标签。它们必须放置在`<f:metadata>`标签中，而该标签只能声明在顶层页面中。因此，当使用模板时，它必须声明在模板客户端中，而不能声明在主模板中。换句话说，`<f:metadata>`标签不能在模板客户端之间共享。'
  raw: 'Those Ajax behavior listener methods will thus be invoked during the

    invoke application phase (fifth phase); of course, only when there’s no

    conversion or validation error during the process validations phase

    (third phase). In case of command components, those Ajax behavior

    listener methods will always be invoked *before* the action

    listener methods and the action method. Regardless of the target

    component, the Ajax behavior listener method must be a `public void`

    method   that can optionally

    take the `AjaxBehaviorEvent`

    argument.


    ```

    public void onchangeFoo(AjaxBehaviorEvent event) {

    // ...

    }

    ```


    This gives you, in input and select components, the opportunity to

    perform some business task on a specific Ajax event. Most occurring

    real-world examples involve preparing a bean property that in turn gets

    rendered in another component. Think of cascading drop-down menus

    wherein the available items of the child drop-down menu depend on the

    selected item of the parent drop-down.

    In command components, the `<f:ajax listener>` isn’t terribly useful. You already
    have the

    possibility to perform the business task in action listener and/or

    action method. You can just continue using them even when having `<f:ajax>`

    attached.

    During the render response phase (sixth phase) of the Ajax request,

    Jakarta Faces will, for each component covered by the `render` attribute of

    the `<f:ajax>` tag,

    generate an XML `<update>`

    element in the Ajax response that contains the generated HTML output of

    only the particular component and all of its children, if any. The `faces.ajax.response()`

    function   of the standard

    Jakarta Faces JavaScript API, which is by the `faces.ajax.request()`

    registered as Ajax callback function, will extract the `id` attribute of the

    `<update>`

    element, which represents the client ID of the target component, and

    obtain via JavaScript’s `document.getElementById()`

    the concrete HTML element and replace it in the HTML DOM tree with the

    contents of the `<update>`

    element.


    The following is an example of a form with one required input field

    having a message attached and a command button that explicitly targets

    the message component:


    Figure [4-2](#454457_2_En_4_Chapter.xhtml#Fig2) shows how Chrome

    presents the Ajax response after submitting the form with the input

    field not filled out. It’s a big one-liner, so it’s scrolled a bit so it

    starts at the `<update>`

    element of interest. It contains the generated HTML output of the `<h:message
    id="m_text">` component.


    ![](images/454457_2_En_4_Chapter/454457_2_En_4_Fig2_HTML.png)


    Figure 4-2

    Chrome Developer Tools—Network—Response


    If you scroll further in the XML response, then you’ll also notice an

    `<update id="j_id1:jakarta.faces.ViewState:0">` element containing the

    value of the `jakarta.faces.ViewState`

    hidden input element. This is important for Jakarta Faces in order to

    maintain the view state across Ajax requests. When the `render` attribute

    happens to cover a `UIForm` component,

    then the `jakarta.faces.ViewState`

    hidden input element currently in the HTML document will basically be

    completely wiped out during the replacement of the element in the HTML

    DOM tree with contents of the `<update>`

    element of the Ajax response.

    Any missing `jakarta.faces.ViewState`

    hidden input element will ultimately be appended to every `<form method="post">`
    of the current `UIViewRoot`, and the

    value of any existing `jakarta.faces.ViewState`

    hidden input element will be updated with the new value. This approach

    is actually by design for two reasons: (1) because the view state value

    could change across Ajax requests and therefore the existing forms

    currently in the HTML document have to be updated to catch up this

    change, just in case those forms are not covered by the `render` attribute, and

    (2) because the value of the `jakarta.faces.ViewState`

    hidden input field can get quite large when the Jakarta Faces state

    saving method is explicitly set to “`client`” and thus

    otherwise produce an inefficient Ajax response when the `render` attribute

    happens to cover multiple forms.


    Navigation in Ajax


    In command components with a properly defined action method, performing

    navigation with

    Ajax is not different from performing navigation without Ajax. However,

    sometimes, you’d like to perform navigation in an Ajax listener attached

    to an input component instead of in an action method. There are indeed

    reasonable real-world use cases for this. Only the `UIInput` class doesn’t

    support defining an action method and the `<f:ajax listener>` doesn’t support
    returning a navigation outcome.

    Therefore, your only option is to perform the navigation

    programmatically. This can be done in two ways. First way is to use the

    `jakarta.faces.application.NavigationHandler`.^([^(16)](#fn16))


    ```

    public void ajaxListener(AjaxBehaviorEvent event) {

    // ...

    String outcome = "/otherview?faces-redirect=true";

    FacesContext context = FacesContext.getCurrentInstance();

    Application application = context.getApplication();

    NavigationHandler handler = application.getNavigationHandler();

    handler.handleNavigation(context, null, outcome);

    }

    ```


    Second way is to use the `jakarta.faces.context.ExternalContext#redirect()`.^([^(17)](#fn17))


    ```

    public void ajaxListener(AjaxBehaviorEvent event) throws IOException {

    // ...

    String path = "/otherview.xhtml";

    FacesContext context = FacesContext.getCurrentInstance();

    ExternalContext externalContext = context.getExternalContext();

    String uri = externalContext.getRequestContextPath() + path;

    externalContext.redirect(uri);

    }

    ```


    There are several differences. Most

    importantly, the `NavigationHandler` can

    deal with implicit navigation outcome values, but `ExternalContext#redirect()`

    can only deal with actual paths and requires manual prefixing of the

    request context path when it concerns a web application resource.

    However, it can take basically any URI, such as an external URL as in

    `externalContext.redirect("``https://example.com")`,

    whereas the `NavigationHandler`

    can’t deal with them.


    GET Forms

    Jakarta Faces has no concept of “GET forms,” but you can

    just use plain HTML for this. Jakarta Faces supports processing GET

    request parameters and invoking managed bean actions on GET requests.

    For this, the `<f:viewParam>`

    and `<f:viewAction>`

    tags can be used. They must be placed in a `<f:metadata>`

    tag that in turn can only be declared in the top-level page. So when

    using templating, it must be declared in the template client, and you

    can’t declare it in the master template. In other words, the `<f:metadata>`

    tag cannot be shared across template clients.'
