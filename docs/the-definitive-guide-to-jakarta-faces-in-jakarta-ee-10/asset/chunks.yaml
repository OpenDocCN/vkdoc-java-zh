    从技术上讲，第 4 章中描述的输入组件也是输出组件。它们不仅能够处理任何提交的输入值，还能够在渲染响应阶段（第六阶段）输出模型值。这一点在 Jakarta
    Faces API（应用程序编程接口）中也很明显：`UIInput` 超类继承自 `UIOutput` 超类。


    还有一组组件仅输出其模型值，甚至仅输出一个 HTML 元素。这些是纯输出组件。它们不参与 Jakarta Faces 生命周期的所有阶段。有时，它们会在恢复视图阶段（第一阶段）参与，如果它们是动态创建或操作的话，但它们的大部分工作是在渲染响应阶段（第六阶段）生成
    HTML 输出时执行的。在其他阶段，它们不会执行太多额外的任务。


    **基于文档的输出组件**


    这些组件是 `<h:doctype>`、`<h:head>` 和 `<h:body>`。请注意，没有像 `<h:html>` 这样的组件。`<h:doctype>`
    可以说是整个标准 Jakarta Faces HTML 组件集中使用最少的 HTML 组件。你可以只使用一个普通的 `<!DOCTYPE html>` 元素。`<h:doctype>`
    仅在你需要 `<!DOCTYPE>` 元素的纯 XML 表示形式时才有用，这通常只发生在你需要将整个 Jakarta Faces 视图存储为 Jakarta
    Faces 周围某个更高级抽象层的另一个 XML 结构的一部分时。


    `<h:head>` 和 `<h:body>` 标签是 Jakarta Faces 中最重要的标签。虽然生成 HTML 文档的 `<head>` 和 `<body>`
    元素不需要任何特殊逻辑，但这些标签对于正确自动处理 JavaScript 和 CSS（层叠样式表）资源依赖关系是必需的，这也是 Jakarta Faces
    2.0 中引入的功能。


    `<h:head>` 和 `<h:body>` 允许 Jakarta Faces 自动将 JavaScript 和 CSS 资源依赖关系重新定位到组件树中的正确位置，以便它们最终出现在生成的
    HTML 输出中的正确位置。在标准 Jakarta Faces 组件集中，只有 `<h:commandLink>`、`<h:commandScript>`、`<f:ajax>`
    和 `<f:websocket>` 使用此功能。它们都需要在最终的 HTML 文档中包含 `faces.js` JavaScript 文件。在视图构建期间，它们基本上会使用
    `UIViewRoot#addComponentResource()`^(⁴⁴) 在指定的目标组件（可以是 `<h:head>` 或 `<h:body>`）处注册组件资源依赖关系。在视图渲染期间，与
    `<h:head>` 和 `<h:body>` 组件关联的渲染器将通过 `UIViewRoot#getComponentResources()`^(⁴⁵)
    获取所有已注册的组件资源依赖关系，并生成带有引用相关资源依赖关系的 URL（统一资源定位符）的适当 `<link rel="stylesheet">` 和
    `<script>` 元素。


    如第 3 章“标准 HTML 组件”部分所示，以下代码是最小且符合 HTML5 规范的 Jakarta Faces 页面的样子：


    ```


    标题


    ...


    ```


    **基于文本的输出组件**


    这些组件是 `<h:outputText>`、`<h:outputFormat>`、`<h:outputLabel>` 和 `<h:outputLink>`。它们都继承自
    `UIOutput` 超类，并具有一个可以绑定到受管 bean 属性的 `value` 属性。在视图渲染期间，将调用 getter 方法来检索和显示任何预设值。这些组件永远不会调用
    setter 方法，因此，可以安全地将其从受管 bean 类中省略，以减少未使用的代码。


    历史上，在 Jakarta Pages 上的 Jakarta Faces 1.x 中，必须使用 `<h:outputText>` 才能将 bean 属性作为文本输出。Jakarta
    Pages 不支持模板文本中的 Jakarta Faces 风格的 EL（表达式语言）`#{...}`。Facelets 支持模板文本中的 Jakarta
    Faces 风格的 EL `#{...}`，因此，可以直接在 Facelets 中输出 bean 属性，而无需整个组件。换句话说，以下代码在 Facelets
    中是等效的。


    使用 `<h:outputText>`：


    ```

    欢迎，！

    ```


    以及在模板文本中使用 EL：


    ```

    欢迎，#{user.name}！

    ```


    无需解释，后者的代码片段更简洁且可读性更强。然而，`<h:outputText>` 在 Facelets 中并未变得无用。它仍然适用于以下目的：


    *   禁用隐式 HTML 转义

    *   附加显式转换器

    *   在 `<f:ajax render>` 中引用


    Jakarta Faces 在任何地方都有隐式 HTML 转义。任何输出到 HTML 响应的内容都会检查 HTML 特殊字符“`<`”、“`>`”、“`&`”，并且当在
    HTML 元素的属性内输出时，还会检查“`"`”。这些 HTML 特殊字符将分别被替换为“`& lt;`”、“`& gt;`”、“`& amp;`”和“`&
    quot;`”。然后，Web 浏览器不会将这些字符解释为生成的 HTML 输出的一部分，而是将其视为纯文本，并最终将它们作为字面字符呈现给最终用户。


    想象一下，用户选择 `<script>alert(''xss'')</script>` 作为用户名，并通过前面显示的任一代码片段通过 `#{``user.name``}`
    发出；那么 Jakarta Faces 将在生成的 HTML 输出中将其渲染如下：


    ```

    欢迎，&lt;script&gt;alert(''xss'')&lt;/script&gt;！

    ```


    而 Web 浏览器将按字面意思显示为“欢迎，<script>alert(''xss'')</script>!”，而不是仅显示“欢迎，!”并附带一个显示文本“xss”的
    JavaScript 警告框，从而无意中实际执行了用户控制的 JavaScript。最终用户能够执行任意 JavaScript 代码是危险的。这将允许恶意用户在其他人登录并查看以这种方式渲染恶意用户用户名的页面时，执行特定代码，将会话
    cookie 的信息传输到外部主机。（另请参阅第 13 章中的“跨站脚本保护”部分。）


    另一方面，也可能存在您希望将安全的 HTML 代码嵌入到生成的 HTML 输出中的情况。最常见的用例与在网站上为其他用户发布消息有关，其中允许使用有限的格式子集，例如粗体、斜体、链接、列表和标题。通常，这些内容需要使用预定义的人类友好标记格式（例如
    Markdown，或不太为人所知的 Wikicode，或古老的 BBCode）在文本区域元素中输入。


    ```

    上述标记格式都能够解析带有标记的原始文本，并将其转换为安全的 HTML 代码，其中任何恶意的 HTML 代码都已被转义或剥离。原始文本至少始终保存在数据库中作为记录，并且生成的安全
    HTML 代码以及所使用的解析器版本也可以保存在数据库中以提高性能，这样就不必为同一段原始文本不必要地重新执行解析器。


