- fmt: "### Deploying the Project\n\nIn the `Servers` view, right-click the WildFly\
    \ server entry and choose `Add and Remove`. It will show the `Add and Remove`\
    \ wizard (see Figure [2-18](#454457_2_En_2_Chapter.xhtml#Fig18)) that gives you\
    \ the opportunity to add and remove WAR projects to the server. Do so for our\
    \ newly created project and finish the wizard.\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig18_HTML.png)\n\
    \nFigure 2-18\n\nThe `Add and Remove` wizard wherein the project has been deployed\
    \ to the server by moving it to the right\n\nNow start the WildFly server. You\
    \ can do so by selecting it and then clicking the green arrow icon whose tool\
    \ tip says \"Start the server.\" You can, of course, also use the bug icon whose\
    \ tool tip says \"Start the server in debug mode.\" The `Console` view will briefly\
    \ show the server startup log. Wait until the server starts up and has, in the\
    \ `Servers` view, gained the status `Started` (see Figure [2-19](#454457_2_En_2_Chapter.xhtml#Fig19)).\n\
    \n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig19_HTML.png)\n\nFigure 2-19\n\
    \nThe WildFly server in `Servers` view with the status `Started` (note that the\
    \ `Console` view is highlighted as it has unread server logs)\n\nNow, open a tab\
    \ in your favorite web browser (see Figure [2-20](#454457_2_En_2_Chapter.xhtml#Fig20))\
    \ and enter the address `http://localhost:8080/project-0.0.1-SNAPSHOT/hello.xhtml`\
    \ in order to open the newly created Jakarta Faces page.\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig20_HTML.png)\n\
    \nFigure 2-20\n\nThe Hello World page in Chrome browser wherein the input field\
    \ is filled with the text \"some message\" and the submit button has been pressed\n\
    \nComing back to the URL, the `localhost:8080` part is by convention the default\
    \ domain of any Jakarta EE server that is running in development mode. The same\
    \ address is also used by, among others, GlassFish and TomEE. The `/project-0.0.1-SNAPSHOT`\
    \ part in URL is in case of WildFly by default inferred from the file name of\
    \ the Maven-generated WAR file, which you can find in the `/standalone/deployments`\
    \ folder of the WildFly installation. This part in URL is in Jakarta Servlet terms\
    \ called the \"context path\" and obtainable by `HttpServletRequest#getContextPath()`\
    \ and in Jakarta Faces delegated by `ExternalContext#getRequestContextPath()`.\n\
    \nIf you have a hard time in figuring out the actually used context path, then\
    \ you can usually find it in the server logs. The exact logger line is, however,\
    \ dependent on the server being used. In case of WildFly, it'll be the line identified\
    \ by `WFLYUT0021`. Open the `Console` view in Eclipse, press `Ctrl+F` and search\
    \ for `WFLYUT0021`. It'll show the following line:\n\n```\nWFLYUT0021: Registered\
    \ web context: '/project-0.0.1-SNAPSHOT' for server 'default-server'\n```\n\n\
    In case you want to adjust the file name of the Maven-generated WAR file, and\
    \ thus indirectly also the context path in WildFly, then you can do so by explicitly\
    \ specifying the so-called final name of the build in `pom.xml` via a new `<finalName>`\
    \ entry in `<build>` section as follows:\n\n```\n<finalName>project</finalName>\n\
    ```\n\nNow right-click on the project and choose `Maven` ➤ `Update Project…` ➤\
    \ `OK`. It will basically force a rebuild of the Maven project. Once it's finished,\
    \ right-click on the server and choose `Clean`. It will basically force a clean\
    \ redeployment. If you have paid close attention to the server logs, then the\
    \ `WFLYUT0021` line should now say:\n\n```\nWFLYUT0021: Registered web context:\
    \ '/project' for server 'default-server'\n```\n\nNow you can use the URL `http://localhost:8080/project/hello.xhtml`\
    \ to access the same page (Figure [2-21](#454457_2_En_2_Chapter.xhtml#Fig21)).\n\
    \n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig21_HTML.jpg)\n\nFigure 2-21\n\
    \nThe web application is now using a custom context path\n\nThe context path part\
    \ can also be set to simply `/`. The deployed web application will then end up\
    \ in the domain root. How to do that depends on the server being used. In case\
    \ of WildFly, you'll need to create the JBoss-specific `jboss-web.xml` as follows:\n\
    \n```\nsrc/main/webapp/WEB-INF/jboss-web.xml:\n\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<jboss-web xmlns=\"http://www.jboss.com/xml/ns/javaee\"\n         \
    \  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n           xsi:schemaLocation=\"\
    http://www.jboss.com/xml/ns/javaee\n           http://www.jboss.org/j2ee/schema/jboss-web_10_0.xsd\"\
    \n           version=\"10.0\">\n    <context-root>/</context-root>\n</jboss-web>\n\
    ```\n\nRight-click on the server and choose `Clean`. The `WFLYUT0021` line in\
    \ the server logs should now say:\n\n```\nWFLYUT0021: Registered web context:\
    \ '/' for server 'default-server'\n```\n\nNow you can use the URL `http://localhost:8080/hello.xhtml`\
    \ to access the same page (Figure [2-22](#454457_2_En_2_Chapter.xhtml#Fig22)).\n\
    \n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig22_HTML.jpg)\n\nFigure 2-22\n\
    \nThe web application is now deployed without context path\n\nWe can get a step\
    \ further by making use of the new Faces 4.0–introduced \"automatic extensionless\
    \ mapping\" feature so that we do not anymore need to specify the `.xhtml` extension\
    \ in the URL. This can be achieved by adding the following entry to the `web.xml`:\n\
    \n```\n<context-param>\n    <param-name>jakarta.faces.AUTOMATIC_EXTENSIONLESS_MAPPING</param-name>\n\
    \    <param-value>true</param-value>\n</context-param>\n```\n\nThis will basically\
    \ instruct Jakarta Faces to automatically map the `FacesServlet` to the extensionless\
    \ variant of the URL as well, allowing you to open the page via `http://localhost:8080/hello`\
    \ (Figure [2-23](#454457_2_En_2_Chapter.xhtml#Fig23)).\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig23_HTML.jpg)\n\
    \nFigure 2-23\n\nThe web application is now extensionless\n\nWe can get yet another\
    \ step further by making `hello.xhtml` the default landing file so that this also\
    \ doesn't need to be specified in the URL. This can be achieved by adding the\
    \ following entry to the `web.xml`:\n\n```\n<welcome-file-list>\n    <welcome-file>hello.xhtml</welcome-file>\n\
    </welcome-file-list>\n```\n\nThis will basically instruct the server to use the\
    \ specified file within the folder as default resource when any folder is requested.\
    \ So if, for example, the `/` folder is requested, then it'll search for a `/hello.xhtml`\
    \ file and transparently serve it back. The same applies when the `/foo` folder\
    \ is requested, the server will then search for a `/foo/hello.xhtml` file and\
    \ serve it (or else return a 404 \"Not found\" when absent).\n\nNow, save the\
    \ `web.xml` and clean the server. Coming back to the web browser, you'll notice\
    \ that the web page is now also accessible by just `http://localhost:8080` (see\
    \ Figure [2-24](#454457_2_En_2_Chapter.xhtml#Fig24)).\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig24_HTML.jpg)\n\
    \nFigure 2-24\n\nThe Hello World page is now at the root\n\n### Installing H2\n\
    \nH2^([³](#fn3)) is an in-memory SQL database. It's an embedded database useful\
    \ for quickly modeling and testing Jakarta Persistence entities, certainly in\
    \ combination with autogenerated SQL tables based on Jakarta Persistence entities.\
    \ Adding H2 to your web application project is a matter of adding the following\
    \ dependency to the `<dependencies>` section of the `pom.xml`:\n\n```\n<dependency>\n\
    \    <groupId>com.h2database</groupId>\n    <artifactId>h2</artifactId>\n    <version>2.1.210</version>\n\
    </dependency>\n```\n\nThat's basically it. The JDBC (Java Database Connectivity)\
    \ driver is also provided by this dependency."
  raw: '### Deploying the Project


    In the *Servers* view, right-click the WildFly server entry and choose *Add and
    Remove* . It will show the *Add and Remove* wizard (see Figure [2-18](#454457_2_En_2_Chapter.xhtml#Fig18))
    that gives you the opportunity to add and remove WAR projects to the server. Do
    so for our newly created project and finish the wizard.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig18_HTML.png)


    Figure 2-18


    The Add and Remove wizard wherein the project has been deployed to the server
    by moving it to the right


    Now start the WildFly server. You can do so by selecting it and then clicking
    the green arrow icon whose tool tip says “Start the server.” You can, of course,
    also use the bug icon whose tool tip says “Start the server in debug mode.” The
    *Console* view will briefly show the server startup log. Wait until the server
    starts up and has, in the *Servers* view, gained the status *Started* (see Figure
    [2-19](#454457_2_En_2_Chapter.xhtml#Fig19)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig19_HTML.png)


    Figure 2-19


    The WildFly server in Servers view with the status Started (note that the Console
    view is highlighted as it has unread server logs)


    Now, open a tab in your favorite web browser (see Figure [2-20](#454457_2_En_2_Chapter.xhtml#Fig20))
    and enter the address `http://localhost:8080/project-0.0.1-SNAPSHOT/hello.xhtml`
    in order to open the newly created Jakarta Faces page.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig20_HTML.png)


    Figure 2-20


    The Hello World page in Chrome browser wherein the input field is filled with
    the text “some message” and the submit button has been pressed


    Coming back to the URL, the “`localhost:8080`” part is by convention the default
    domain of any Jakarta EE server that is running in development mode. The same
    address is also used by, among others, GlassFish and TomEE. The “`/project-0.0.1-SNAPSHOT`”
    part in URL is in case of WildFly by default inferred from the file name of the
    Maven-generated WAR file, which you can find in the `/standalone/deployments`
    folder of the WildFly installation. This part in URL is in Jakarta Servlet terms
    called the “context path” and obtainable by `HttpServletRequest#getContextPath()`
    and in Jakarta Faces delegated by `ExternalContext#getRequestContextPath()`.


    If you have a hard time in figuring out the actually used context path, then you
    can usually find it in the server logs. The exact logger line is, however, dependent
    on the server being used. In case of WildFly, it’ll be the line identified by
    `WFLYUT0021`. Open the *Console* view in Eclipse, press `Ctrl+F` and search for
    `WFLYUT0021`. It’ll show the following line:


    ```

    WFLYUT0021: Registered web context: ''/project-0.0.1-SNAPSHOT'' for server ''default-server''

    ```


    In case you want to adjust the file name of the Maven-generated WAR file, and
    thus indirectly also the context path in WildFly, then you can do so by explicitly
    specifying the so-called final name of the build in `pom.xml` via a new `<finalName>`
    entry in `<build>` section as follows:


    ```

    project


    maven-war-plugin

    3.3.2


    ```


    Now right-click on the project and choose *Maven* ➤ *Update Project…* ➤ *OK*.
    It will basically force a rebuild of the Maven project. Once it’s finished, right-click
    on the server and choose *Clean*. It will basically force a clean redeployment.
    If you have paid close attention to the server logs, then the `WFLYUT0021` line
    should now say


    ```

    WFLYUT0021: Registered web context: ''/project'' for server ''default-server''

    ```


    Now you can use the URL `http://localhost:8080/project/hello.xhtml` to access
    the same page (Figure [2-21](#454457_2_En_2_Chapter.xhtml#Fig21)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig21_HTML.jpg)


    Figure 2-21


    The web application is now using a custom context path


    The context path part can also be set to simply “`/`”. The deployed web application
    will then end up in the domain root. How to do that depends on the server being
    used. In case of WildFly, you’ll need to create the JBoss-specific `jboss-web.xml`
    as follows:


    ```

    src/main/webapp/WEB-INF/jboss-web.xml:


    /


    ```


    Right-click on the server and choose *Clean*. The `WFLYUT0021` line in the server
    logs should now say


    ```

    WFLYUT0021: Registered web context: ''/'' for server ''default-server''

    ```


    Now you can use the URL `http://localhost:8080/hello.xhtml` to access the same
    page (Figure [2-22](#454457_2_En_2_Chapter.xhtml#Fig22)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig22_HTML.jpg)


    Figure 2-22


    The web application is now deployed without context path


    We can get a step further by making use of the new Faces 4.0`–`introduced “automatic
    extensionless mapping” feature so that we do not anymore need to specify the `.xhtml`
    extension in the URL. This can be achieved by adding the following entry to the
    `web.xml`:


    ```


    jakarta.faces.AUTOMATIC_EXTENSIONLESS_MAPPING


    true


    ```


    This will basically instruct Jakarta Faces to automatically map the FacesServlet
    to the extensionless variant of the URL as well, allowing you to open the page
    via `http://localhost:8080/hello` (Figure [2-23](#454457_2_En_2_Chapter.xhtml#Fig23)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig23_HTML.jpg)


    Figure 2-23


    The web application is now extensionless


    We can get yet another step further by making `hello.xhtml` the default landing
    file so that this also doesn’t need to be specified in the URL. This can be achieved
    by adding the following entry to the `web.xml`:


    ```

    hello.xhtml


    ```


    This will basically instruct the server to use the specified file within the folder
    as default resource when any folder is requested. So if, for example, the “`/`”
    folder is requested, then it’ll search for a “`/hello.xhtml`” file and transparently
    serve it back. The same applies when the “`/foo`” folder is requested, the server
    will then search for a “`/foo/hello.xhtml`” file and serve it (or else return
    a 404 “Not found” when absent).


    Now, save the `web.xml` and clean the server. Coming back to the web browser,
    you’ll notice that the web page is now also accessible by just `http://localhost:8080`
    (see Figure [2-24](#454457_2_En_2_Chapter.xhtml#Fig24)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig24_HTML.jpg)


    Figure 2-24


    The Hello World page is now at the root


    ## Installing H2


    H2^([³](#fn3)) is an in-memory SQL database. It’s an embedded database useful
    for quickly modeling and testing Jakarta Persistence entities, certainly in combination
    with autogenerated SQL tables based on Jakarta Persistence entities. Adding H2
    to your web application project is a matter of adding the following dependency
    to the `<dependencies>` section of the `pom.xml`:


    ```

    com.h2database

    h2

    2.1.210


    ```


    That’s basically it. The JDBC (Java Database Connectivity) driver is also provided
    by this dependency.'
