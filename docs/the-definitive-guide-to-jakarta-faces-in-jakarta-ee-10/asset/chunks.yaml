    Ajax）POST 请求，这将无法正常工作。它会被重新执行并导致重复提交。而且它不必要地在历史记录中记住了前一页。这可能会导致令人困惑的行为，因为后退按钮似乎没有效果，因为它会重新显示完全相同的页面，因为活动区域设置存储在会话中，而不是请求中。


