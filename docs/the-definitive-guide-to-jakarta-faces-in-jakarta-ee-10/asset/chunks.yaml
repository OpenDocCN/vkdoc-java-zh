    \ `Renderer` 实例是必需的，如下面的代码片段所示：\n\n```\nRenderer renderer = FacesContext.getCurrentInstance().getRenderKit()\n\
    .getRenderer(component.getFamily(), component.getRendererType());\n```\n\n组件族基本上是一个“硬编码”的常量，可以在多个组件类型之间共享。它之所以是“硬编码”的，是因为没有为其提供\
    \ setter 方法。这是为了能够获取具体的 `Renderer` 实例，因为渲染器不是按组件类型注册的，而是按组件族注册的。这允许可插拔渲染工具包的开发者只需按组件族注册一次渲染器类型，而无需为每个已知的标准组件类型和未知的自定义组件类型多次注册。通常，组件族和渲染器类型通过\
    \ `@FacesRenderer` 注解或 `faces-config.xml` 中的 `<renderer>` 条目注册到 Jakarta Faces\
    \ 应用程序。以下示例演示了在一个最小渲染器类上使用注解：\n\n```\n@FacesRenderer(\ncomponentFamily=SomeComponent.COMPONENT_FAMILY,\n\
    rendererType=SomeRenderer.RENDERER_TYPE)\npublic class SomeRenderer extends Renderer\
    \ {\npublic static final String RENDERER_TYPE = \"project.SomeRenderer\";\n}\n\
    ```\n\n以下示例演示了在 `faces-config.xml` 中使用条目：\n\n```\n<renderer>\n<component-family>project.SomeFamily</component-family>\n\
    <renderer-type>project.SomeRenderer</renderer-type>\n<renderer-class>com.example.project.renderer.SomeRenderer</renderer-class>\n\
    </renderer>\n```\n\n渲染器类型默认在具体组件类的构造函数中定义，如前面展示的 `SomeComponent` 类的代码片段所示。如果需要，组件子类开发者，甚至作为组件最终用户的您，都可以随时用所需的渲染器实例覆盖组件的默认渲染器实例。这可以通过多种方式实现，全部通过\
    \ XML。第一种方式是通过 `*.taglib.xml` 文件中与组件标签关联的 `<tag>` 条目。\n\n```\n<tag>\n<tag-name>someComponent</tag-name>\n\
    <component-type>project.SomeComponent</component-type>\n<renderer-type>custom.OtherRenderer</renderer-type>\n\
    </tag>\n```\n\n这会影响整个应用程序，并且仅针对特定的组件标签。第二种方式是通过在 `faces-config.xml` 中添加一个新的 `<renderer>`\
    \ 条目，该条目精确地针对所需的组件族及其默认渲染器类型。\n\n```\n<renderer>\n<component-family>project.SomeFamily</component-family>\n\
    <renderer-type>project.SomeRenderer</renderer-type>\n<renderer-class>com.example.custom.renderers.OtherRenderer</renderer-class>\n\
    </renderer>\n```\n\n这会影响整个应用程序，并针对与给定渲染器类型关联的给定组件族所关联的*每个*组件标签。第三种方式是通过组件标签的 `rendererType`\
    \ 属性。\n"
- fmt: "This affects only the declared component tag and not others. Table [11-1](#454457_2_En_11_Chapter.xhtml#Tab1)\
    \ provides an overview of all component types, families, and renderer types of\
    \ the standard Jakarta Faces component set.\n\n**Table 11-1** Component Class,\
    \ Component Type, Component Family, and Renderer Type of Standard Jakarta Faces\
    \ HTML Component Set\n\n| Component tag | Component class | Component type | Component\
    \ family | Renderer type |\n| :--- | :--- | :--- | :--- | :--- |\n| `<h:body>`\
    \ | `HtmlBody` | `jakarta.faces.OutputBody` | `jakarta.faces.Output` | `jakarta.faces.Body`\
    \ |\n| `<h:button>` | `HtmlOutcomeTargetButton` | `jakarta.faces.HtmlOutcomeTargetButton`\
    \ | `jakarta.faces.OutcomeTarget` | `jakarta.faces.Button` |\n| `<h:column>` |\
    \ `HtmlColumn` | `jakarta.faces.HtmlColumn` | `jakarta.faces.Column` | `null`\
    \ |\n| `<h:commandButton>` | `HtmlCommandButton` | `jakarta.faces.HtmlCommandButton`\
    \ | `jakarta.faces.Command` | `jakarta.faces.Button` |\n| `<h:commandLink>` |\
    \ `HtmlCommandLink` | `jakarta.faces.HtmlCommandLink` | `jakarta.faces.Command`\
    \ | `jakarta.faces.Link` |\n| `<h:commandScript>` | `HtmlCommandScript` | `jakarta.faces.HtmlCommandScript`\
    \ | `jakarta.faces.Command` | `jakarta.faces.Script` |\n| `<h:dataTable>` | `HtmlDataTable`\
    \ | `jakarta.faces.HtmlDataTable` | `jakarta.faces.Data` | `jakarta.faces.Table`\
    \ |\n| `<h:doctype>` | `HtmlDoctype` | `jakarta.faces.OutputDoctype` | `jakarta.faces.Output`\
    \ | `jakarta.faces.Doctype` |\n| `<h:form>` | `HtmlForm` | `jakarta.faces.HtmlForm`\
    \ | `jakarta.faces.Form` | `jakarta.faces.Form` |\n| `<h:graphicImage>` | `HtmlGraphicImage`\
    \ | `jakarta.faces.HtmlGraphicImage` | `jakarta.faces.Graphic` | `jakarta.faces.Image`\
    \ |\n| `<h:head>` | `HtmlHead` | `jakarta.faces.OutputHead` | `jakarta.faces.Output`\
    \ | `jakarta.faces.Head` |\n| `<h:inputFile>` | `HtmlInputFile` | `jakarta.faces.HtmlInputFile`\
    \ | `jakarta.faces.Input` | `jakarta.faces.File` |\n| `<h:inputHidden>` | `HtmlInputHidden`\
    \ | `jakarta.faces.HtmlInputHidden` | `jakarta.faces.Input` | `jakarta.faces.Hidden`\
    \ |\n| `<h:inputSecret>` | `HtmlInputSecret` | `jakarta.faces.HtmlInputSecret`\
    \ | `jakarta.faces.Input` | `jakarta.faces.Secret` |\n| `<h:inputText>` | `HtmlInputText`\
    \ | `jakarta.faces.HtmlInputText` | `jakarta.faces.Input` | `jakarta.faces.Text`\
    \ |\n| `<h:inputTextarea>` | `HtmlInputTextarea` | `jakarta.faces.HtmlInputTextarea`\
    \ | `jakarta.faces.Input` | `jakarta.faces.Textarea` |\n| `<h:link>` | `HtmlOutcomeTargetLink`\
    \ | `jakarta.faces.HtmlOutcomeTargetLink` | `jakarta.faces.OutcomeTarget` | `jakarta.faces.Link`\
    \ |\n| `<h:message>` | `HtmlMessage` | `jakarta.faces.HtmlMessage` | `jakarta.faces.Message`\
    \ | `jakarta.faces.Message` |\n| `<h:messages>` | `HtmlMessages` | `jakarta.faces.HtmlMessages`\
    \ | `jakarta.faces.Messages` | `jakarta.faces.Messages` |\n| `<h:outputFormat>`\
    \ | `HtmlOutputFormat` | `jakarta.faces.HtmlOutputFormat` | `jakarta.faces.Output`\
    \ | `jakarta.faces.Format` |\n| `<h:outputLabel>` | `HtmlOutputLabel` | `jakarta.faces.HtmlOutputLabel`\
    \ | `jakarta.faces.Output` | `jakarta.faces.Label` |\n| `<h:outputText>` | `HtmlOutputText`\
    \ | `jakarta.faces.HtmlOutputText` | `jakarta.faces.Output` | `jakarta.faces.Text`\
    \ |\n| `<h:outputScript>` | `UIOutput` | `jakarta.faces.Output` | `jakarta.faces.Output`\
    \ | `jakarta.faces.Script` |\n| `<h:outputStylesheet>` | `UIOutput` | `jakarta.faces.Output`\
    \ | `jakarta.faces.Output` | `jakarta.faces.resource.Stylesheet` |\n| `<h:panelGrid>`\
    \ | `HtmlPanelGrid` | `jakarta.faces.HtmlPanelGrid` | `jakarta.faces.Panel` |\
    \ `jakarta.faces.Grid` |\n| `<h:panelGroup>` | `HtmlPanelGroup` | `jakarta.faces.HtmlPanelGroup`\
    \ | `jakarta.faces.Panel` | `jakarta.faces.Group` |\n| `<h:selectBooleanCheckbox>`\
    \ | `HtmlSelectBooleanCheckbox` | `jakarta.faces.HtmlSelectBooleanCheckbox` |\
    \ `jakarta.faces.SelectBoolean` | `jakarta.faces.Checkbox` |\n| `<h:selectManyCheckbox>`\
    \ | `HtmlSelectManyCheckbox` | `jakarta.faces.HtmlSelectManyCheckbox` | `jakarta.faces.SelectMany`\
    \ | `jakarta.faces.Checkbox` |\n| `<h:selectManyListbox>` | `HtmlSelectManyListbox`\
    \ | `jakarta.faces.HtmlSelectManyListbox` | `jakarta.faces.SelectMany` | `jakarta.faces.Listbox`\
    \ |\n| `<h:selectManyMenu>` | `HtmlSelectManyMenu` | `jakarta.faces.HtmlSelectManyMenu`\
    \ | `jakarta.faces.SelectMany` | `jakarta.faces.Menu` |\n| `<h:selectOneListbox>`\
    \ | `HtmlSelectOneListbox` | `jakarta.faces.HtmlSelectOneListbox` | `jakarta.faces.SelectOne`\
    \ | `jakarta.faces.Listbox` |\n| `<h:selectOneMenu>` | `HtmlSelectOneMenu` | `jakarta.faces.HtmlSelectOneMenu`\
    \ | `jakarta.faces.SelectOne` | `jakarta.faces.Menu` |\n| `<h:selectOneRadio>`\
    \ | `HtmlSelectOneRadio` | `jakarta.faces.HtmlSelectOneRadio` | `jakarta.faces.SelectOne`\
    \ | `jakarta.faces.Radio` |\n\nIf you carefully inspect the table, then you’ll\
    \ see a certain pattern in the component family and renderer type, particularly\
    \ with input, select, and command components. You’ll notice that a renderer type\
    \ can be shared across multiple components, even of a different family. You’ll\
    \ also notice that there’s one HTML component without a renderer type, the `<h:column>`.\
    \ This is a special component which cannot be used stand-alone but can only be\
    \ used when nested in a specific parent component. From the standard Jakarta Faces\
    \ component set, that’s so far only the `<h:dataTable>`. Its renderer basically\
    \ iterates over all children and performs an `instanceof` check for `UIColumn`\
    \ and then acts on them accordingly.\n\n## Creating New Component and Renderer\n\
    \nIf you have paid close attention to Table 3-1 in Chapter [3](#454457_2_En_3_Chapter.xhtml),\
    \ then you might have noticed that Jakarta Faces doesn’t provide any component\
    \ to render a dynamic `<ul>` or `<ol>` or even `<dl>` element based on a provided\
    \ array or collection value. It only supports that for the `<table>` element.\
    \ True, the same could be achieved with Facelets `<ui:repeat>` and a bit of custom\
    \ HTML code, but we’ll take this as an opportunity to create a new custom component\
    \ that renders a `<ul>` or `<ol>`.\n\nThe first step is to check which `UIComponent`\
    \ subclass is suitable for the task we have in mind so that we can reduce the\
    \ custom code logic to a minimum. In the `jakarta.faces.component` package, you\
    \ can find a bunch of `UIXxx` component subclasses. If you want to create a new\
    \ form component, then extend from `UIForm`. If you want to create a new input\
    \ component, then extend from `UIInput`. If you want to create a new output component,\
    \ then extend from `UIOutput`. If you want to create a new data iterator component,\
    \ then extend from `UIData`. There is rarely any need to extend from `UIComponent`\
    \ directly. We’d like to be able to iterate over a collection in order to generate\
    \ `<li>` elements inside the `<ul>`, so we’ll pick `UIData`. It has a lot of iteration\
    \ and state saving logic already implemented. The following is the custom component\
    \ class `com.example.project.component.DataList`:\n\n```java\n@FacesComponent(createTag=true)\n\
    public class DataList extends UIData {\n    public DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
    \    }\n}\n```\n\nIs that really all? Yes, the `UIData` superclass already has\
    \ everything we need, and all the HTML producing code just goes into the `DataListRenderer`,\
    \ which will be shown shortly. You’ll notice that the `@FacesComponent` annotation\
    \ declares a `createTag=true` attribute. This basically instructs Jakarta Faces\
    \ that it should automatically create a component tag, the predefined XML namespace\
    \ `jakarta.faces.component`. In other words, the preceding tag is available in\
    \ the Facelets file as follows:\n\n```xml\n<my:dataList value=\"#{bean.items}\"\
    \ var=\"item\">\n    ...\n</my:dataList>\n```\n\nThe XML namespace prefix “`my`”\
    \ is of course your choice. Generally, you’d like to pick some sort of abbreviation\
    \ of your company name here. You can also override the predefined XML namespace\
    \ with the `namespace` attribute.\n\n```java\n@FacesComponent(createTag=true,\
    \ namespace=\"example.components\")\n```\n\nThis will then be available as follows:\n\
    \n```xml\n<ex:dataList value=\"#{bean.items}\" var=\"item\">\n    ...\n</ex:dataList>\n\
    ```"
