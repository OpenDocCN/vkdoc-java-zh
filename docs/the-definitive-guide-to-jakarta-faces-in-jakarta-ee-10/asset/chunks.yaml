- fmt: "# 组件系统事件\n\n在“自定义组件系统事件”部分给出了一个`PhaseListener`的具体示例。\n\n## 组件系统事件\n\n如“生命周期”部分所述，在\
    \ Jakarta Faces 生命周期期间会触发一系列组件系统事件。它们继承自抽象类`jakarta.faces.event.ComponentSystemEvent`。^([⁹](#fn9))\
    \ 总结如下：\n\n*   `PreRemoveFromViewEvent`：当组件即将从组件树中移除时触发。\n*   `PostAddToViewEvent`：当组件已添加到组件树时触发。\n\
    *   `PostRestoreStateEvent`（读作“`PostRestoreViewEvent`”）：当恢复视图阶段结束时为每个组件触发。请注意，如果在此阶段视图构建尚未发生，则此事件仅针对`UIViewRoot`触发。如果在此阶段视图构建已发生，则此事件会为树中的任何组件触发。\n\
    *   `PreValidateEvent`：当组件即将处理其转换器和验证器时触发，即使实际上没有转换器或验证器也会触发。\n*   `PostValidateEvent`：当组件完成处理其转换器和验证器时触发，即使实际上没有转换器或验证器也会触发。\n\
    *   `PreRenderViewEvent`：当`UIViewRoot`即将向 HTTP 响应写入 HTML 输出时触发。请注意，这是更改 HTTP 响应目标或以编程方式操作组件树的最晚安全时机。在此之后进行操作，无法保证对响应或组件树的任何程序性更改能按预期生效，因为此时响应可能已提交，或视图状态可能已保存。\n\
    *   `PreRenderComponentEvent`：当组件即将向 HTTP 响应写入其 HTML 输出时触发。\n*   `PostRenderViewEvent`：当`UIViewRoot`完成向\
    \ HTTP 响应写入 HTML 输出时触发。请注意，此事件自 Jakarta Faces 2.3 起新增。其他事件均来自 Jakarta Faces 2.0。\n\
    \n在“生命周期”部分还有两个未提及的组件系统事件：\n\n*   `PostConstructViewMapEvent`：当`UIViewRoot`刚刚启动视图作用域时触发。\n\
    *   `PreDestroyViewMapEvent`：当`UIViewRoot`即将销毁视图作用域时触发。\n\n这两个事件并非严格绑定到基于六个阶段的生命周期，它们基本上可以在生命周期中的任何时间发生。`PostConstructViewMapEvent`在应用程序首次调用`UIViewRoot#getViewMap()`时触发。默认情况下，这仅发生在当前视图状态的第一个`@ViewScoped`托管\
    \ Bean 被创建时。`PreDestroyViewMapEvent`在应用程序对`UIViewRoot#getViewMap()`调用`Map#clear()`时触发，这通常发生在已存在现有实例的情况下调用`FacesContext#setViewRoot()`时。这将结束视图作用域并销毁任何活动的`@ViewScoped`托管\
    \ Bean。通常，这仅发生在操作方法返回非`null`导航结果时。\n\n您可以使用`jakarta.faces.event.ComponentSystemEventListener`接口监听任何这些组件系统事件。^([^(10)](#fn10))\
    \ 在 Jakarta Faces API 中，`UIComponent`类本身已经实现了`ComponentSystemEventListener`。该接口提供了一个`processEvent()`方法，该方法接受一个`ComponentSystemEvent`参数，而该参数又有一个`getComponent()`方法，返回触发事件的`UIComponent`具体实例。`UIComponent#processEvent()`的默认实现基本上会检查给定的`ComponentSystemEvent`参数是否是`PostRestoreStateEvent`的实例，以及是否指定了`binding`属性，如果是，则调用`binding`属性背后的\
    \ setter 方法，并将组件实例本身作为参数传入。\n\n有三种方法可以为这些组件系统事件订阅监听器。第一种是在视图中声明式地使用`<f:event>`标签。它可以附加到任何组件标签上。一个在\
    \ Jakarta Faces 2.0/2.1 相关资源中相对常见的示例如下：\n\n其中`onload()`方法通常实现如下：\n\n```\npublic\
    \ void onload() {\n    FacesContext context = FacesContext.getCurrentInstance();\n\
    \    if (!context.isPostback() && !context.isValidationFailed()) {\n        //\
    \ ...\n    }\n}\n```\n\n请注意，`<f:event listener=\"#{bean.onload}\">`默认期望一个带有`ComponentSystemEvent`参数的方法，但如果您不需要该参数，为了简洁可以省略它，并且方法表达式应加上括号，如`<f:event\
    \ listener=\"#{bean.onload()}\">`，尽管所使用的 EL 实现可能对此要求不严格。\n\n如前所示，使用`<f:event type=\"\
    preRenderView\">`本质上是一种变通方法，以便能够在基于`<f:viewParam>`设置的模型值的 GET 请求期间模拟调用应用程序阶段。这是必要的，因为`@PostConstruct`不适合，因为它是在\
    \ Bean 构造后立即调用，远在`<f:viewParam>`设置模型值之前。自 Jakarta Faces 2.2 引入新的`<f:viewAction>`后，就不再需要`<f:event>`这种技巧了：\n\
    \n其中`onload()`方法只需实现如下：\n\n```\npublic void onload() {\n    // ...\n}\n```\n\n\
    `<f:event>`的另一个实际应用示例是在复合组件的支持组件中实现类似`@PostConstruct`的行为，您可以在其中安全地基于其属性执行任何必要的初始化。\n\
    \n```\n...\n<cc:implementation>\n    ...\n    #{cc.someInitializedValue}\n   \
    \ ...\n</cc:implementation>\n```\n\n其中`SomeComposite`类的`init()`方法如下所示：\n\n```\n\
    private Object someInitializedValue; // +getter\npublic void init() {\n    Map\
    \ attributes = getAttributes();\n    someInitializedValue = initializeItBasedOn(attributes);\n\
    }\n```\n\n第二种订阅组件系统事件监听器的方法是在 Java 代码中以编程方式使用`UIComponent#subscribeToEvent()`。这允许您有条件地为现有组件订阅一个组件系统事件监听器。需要牢记的是，组件系统事件监听器会保存在视图状态中。换句话说，它会在后续回发请求的恢复视图阶段被恢复到组件实例中。在使用`UIComponent#subscribeToEvent()`时请记住这一点；否则，您可能会多次订阅同一个监听器。这可以通过至少正确实现`equals()`方法和`Serializable`接口来避免。\n\
    \n所有这些使得为特定组件以编程方式正确注册组件系统事件监听器变得有些复杂。如果是现有组件，最好使用`<f:event>`，或者如果是自定义组件，最好使用`@ListenerFor`注解，这实际上是第三种方法。下面是一个正确以编程方式注册组件系统事件监听器的入门示例，前提是`YourListener`类正确实现了`equals()`和`hashCode()`方法，并且实现了`Serializable`、`Externalizable`或`jakarta.faces.component.StateHolder`，以便能正确保存在视图状态中。\n\
    \n```\nClass event = PreRenderViewEvent.class;\nComponentSystemEventListener listener\
    \ = new YourListener();\ncomponent.subscribeToEvent(event, listener);\n```"
  raw: "A concrete example of a `PhaseListener`  is given in the\nsection “Custom\
    \ Component System Events.”\n\nComponent System Events\n\nAs noted in the section\
    \ “Life Cycle,” a bunch of component system events are fired\nduring the Jakarta\
    \ Faces life cycle. They extend from the abstract class\n`jakarta.faces.event.ComponentSystemEvent`.^([⁹](#fn9))\
    \ In summary, those are\n\n*   `PreRemoveFromViewEvent`:\n    Fired when a component\
    \ is about to be removed from the component\n    tree.\n\n*   `PostAddToViewEvent`:\n\
    \    Fired when a component has been added to the component tree.\n\n*   `PostRestoreStateEvent`\n\
    \    (read: “`PostRestoreViewEvent`”):\n    Fired for each component when the\
    \ restore view phase ends. Note that\n    this event is only fired for `UIViewRoot`\
    \ when the\n    view build time hasn’t yet taken place during this phase. If the\
    \ view\n    build time has taken place during this phase, then this event is fired\n\
    \    for any component in the tree.\n\n*   `PreValidateEvent`:\n    Fired when\
    \ a component is about to process its converter and validators,\n    also when\
    \ there are actually none.\n\n*   `PostValidateEvent`:\n    Fired when a component\
    \ is finished processing its converter and\n    validators, also when there are\
    \ actually none.\n\n*   `PreRenderViewEvent`:\n    Fired when the `UIViewRoot`\
    \ is about\n    to write HTML\n    output to the HTTP response. Note that this\
    \ is the latest possible safe\n    moment to change the destination of the HTTP\
    \ response, or to\n    programmatically manipulate the component tree. When doing\
    \ so after this\n    moment, there’s no guarantee that any programmatic changes\
    \ to the\n    response or the component tree will take place as intended because\
    \ by\n    then the response may already be committed, or the view state may\n\
    \    already be saved.\n\n*   `PreRenderComponentEvent`:\n    Fired when a component\
    \ is about to write its HTML output to the HTTP\n    response.\n\n*   `PostRenderViewEvent`:\n\
    \    Fired when the `UIViewRoot` is\n    finished writing the HTML output to the\
    \ HTTP response. Note that this\n    event is new since Jakarta Faces 2.3\\. All\
    \ others are from Jakarta Faces\n    2.0.\n\nThere are two more component system\
    \ events that were left unmentioned in\nthe section “Life Cycle.”\n\n*   `PostConstructViewMapEvent`:\n\
    \    Fired when the `UIViewRoot` has just\n    started the view scope\n\n*   `PreDestroyViewMapEvent`:\n\
    \    Fired when the `UIViewRoot` is about\n    to destroy the view scope\n\nThese\
    \ two are not strictly tied to the six-phase component-based life\ncycle and can\
    \ happen basically any time during the life cycle. The `PostConstructViewMapEvent`\n\
    is fired when the application invokes `UIViewRoot#getViewMap()`\nfor the first\
    \ time. By default, this happens only when the first `@ViewScoped` managed\nbean\
    \ of the current view state has been created. The `PreDestroyViewMapEvent`\nis\
    \ fired when the application invokes `Map#clear()` on the\n`UIViewRoot#getViewMap()`,\n\
    which usually only happens when `FacesContext#setViewRoot()`\nis invoked while\
    \ there is already an existing instance set. This will end the\nview scope and\
    \ destroy any active `@ViewScoped` managed\nbean. Normally, this happens only\
    \ when the action method has returned a\nnon-`null`\nnavigation outcome.\nYou\
    \ can listen on any of those component system events using the\n`jakarta.faces.event.ComponentSystemEventListener`\n\
    interface.^([^(10)](#fn10)) In the Jakarta Faces API, the\n`UIComponent`\nclass\
    \ itself already implements `ComponentSystemEventListener`.\nThis interface provides\
    \ a `processEvent()` method\nwith a `ComponentSystemEvent`\nargument that in turn\
    \ has a `getComponent()` method\nreturning the concrete `UIComponent` instance\n\
    the event was fired on. The default implementation of `UIComponent#processEvent()`\n\
    basically checks if the given `ComponentSystemEvent`\nargument is an instance\
    \ of `PostRestoreStateEvent`\nand if the `binding` attribute is\nspecified, and\
    \ if so, then invoke the setter method behind the `binding` attribute\nwith the\
    \ component instance itself as argument.\n\nThere are three ways to subscribe\
    \ listeners to those component system\nevents. The first is to declaratively use\
    \ the `<f:event>` tag\nin the view. This can be attached to any component tag.\
    \ One example that\nyou’ll see in relatively a lot of Jakarta Faces 2.0/2.1 targeted\n\
    resources is the following:\n\nwherein the `onload()` method is\noften implemented\
    \ as follows:\n\n```\npublic void onload() {\nFacesContext context = FacesContext.getCurrentInstance();\n\
    if (!context.isPostback() && !context.isValidationFailed()) {\n// ...\n}\n}\n\
    ```\n\nNote that the `<f:event listener=\"#{bean.onload}\">` by default expects\
    \ a method with\n`ComponentSystemEvent`\nargument , but if\nyou don’t need it,\
    \ then it can be omitted for brevity, and the method\nexpression should be parenthesized\
    \ as in `<f:event listener=\"#{bean.onload()}\">`, although the EL implementation\n\
    being used may be forgiving in this.\n\nThe usage of `<f:event type=\"preRenderView\"\
    >` as shown before is in essence a\nwork-around in order to be able to simulate\
    \ the invoke application phase\nduring a GET request based on model values set\
    \ by the `<f:viewParam>`.\nThis was needed because the `@PostConstruct` was\n\
    unsuitable as it was invoked directly after bean’s construction but far\nbefore\
    \ the model values were set by the `<f:viewParam>`.\nSince Jakarta Faces 2.2 with\
    \ its new `<f:viewAction>`,\nthis `<f:event>` trick\nis not needed anymore:\n\n\
    wherein the `onload()` method is\njust implemented as follows:\n\n```\npublic\
    \ void onload() {\n// ...\n}\n```\n\nAnother real-world example of `<f:event>`\
    \ is to\nhave a `@PostConstruct`-like\nbehavior in the backing component of a\
    \ composite component wherein you\ncan safely perform any necessary initialization\
    \ based on its attributes.\n\n```\n...\n\n...\n#{cc.someInitializedValue}\n\n\
    ```\n\nand wherein the `init()` method of the\n`SomeComposite`\nclass looks as\
    \ follows:\n\n```\nprivate Object someInitializedValue; // +getter\npublic void\
    \ init() {\nMap attributes = getAttributes();\nsomeInitializedValue = initializeItBasedOn(attributes);\n\
    }\n```\n\nThe second way to subscribe listeners to component system events is\n\
    to programmatically use `UIComponent#subscribeToEvent()`\nin Java code. This\n\
    allows you to conditionally subscribe a component system event listener\non an\
    \ existing component. It is important to keep in mind that a\ncomponent system\
    \ event listener is saved in the view state. In other\nwords, it’s restored in\
    \ the component instance during the restore view\nphase of the subsequent postback\
    \ request. Keep this in mind when using\n`UIComponent#subscribeToEvent()`;\notherwise,\
    \ you may end up subscribing the very same listener multiple\ntimes. This can\
    \ be avoided by at least correctly implementing `equals()` method and\nthe `Serializable`\n\
    interface.\n\nThis all makes it a little complicated to correctly register a component\n\
    system event listener programmatically for a specific component. If it’s\nan existing\
    \ component, you’d better use `<f:event>`\ninstead, or if it’s a custom component,\
    \ you’d better use `@ListenerFor`\nannotation instead, which is actually the third\
    \ way. Below is a kickoff\nexample of correctly registering a component system\
    \ event listener\nprogrammatically, provided that `YourListener` class\nhas its\
    \ `equals()` and `hashCode()` methods\ncorrectly implemented and that it implements\
    \ `Serializable` or `Externalizable` or\n`jakarta.faces.component.StateHolder`\n\
    so that it can be saved correctly in view state.\n\n```\nClass event = PreRenderViewEvent.class;\n\
    ComponentSystemEventListener listener = new YourListener();\ncomponent.subscribeToEvent(event,\
    \ listener);\n```"
  trans: "\n`PhaseListener` 的具体示例见“自定义组件系统事件”一节。\n\n## 组件系统事件\n\n如“生命周期”一节所述，在 Jakarta\
    \ Faces 生命周期中会触发一系列组件系统事件。这些事件继承自抽象类 `jakarta.faces.event.ComponentSystemEvent`。^(⁹)\
    \ 概括来说，包括以下事件：\n\n*   `PreRemoveFromViewEvent`：\n    当组件即将从组件树中移除时触发。\n\n*   `PostAddToViewEvent`：\n\
    \    当组件已添加到组件树时触发。\n\n*   `PostRestoreStateEvent`\n    （读作“`PostRestoreViewEvent`”）：\n\
    \    在恢复视图阶段结束时为每个组件触发。请注意，如果在此阶段视图尚未构建完成，则该事件仅针对 `UIViewRoot` 触发；如果视图已在此阶段构建完成，则针对树中所有组件触发。\n\
    \n*   `PreValidateEvent`：\n    当组件即将处理其转换器和验证器时触发，即使实际没有转换器或验证器也会触发。\n\n*   `PostValidateEvent`：\n\
    \    当组件完成其转换器和验证器的处理时触发，即使实际没有转换器或验证器也会触发。\n\n*   `PreRenderViewEvent`：\n   \
    \ 当 `UIViewRoot` 即将向 HTTP 响应写入 HTML 输出时触发。请注意，这是更改 HTTP 响应目标或以编程方式操作组件树的最晚安全时机。在此之后进行操作，无法保证对响应或组件树的程序性更改能按预期生效，因为此时响应可能已提交，或视图状态可能已保存。\n\
    \n*   `PreRenderComponentEvent`：\n    当组件即将向 HTTP 响应写入其 HTML 输出时触发。\n\n*   `PostRenderViewEvent`：\n\
    \    当 `UIViewRoot` 完成向 HTTP 响应写入 HTML 输出时触发。请注意，此事件自 Jakarta Faces 2.3 起新增，其余事件均来自\
    \ Jakarta Faces 2.0。\n\n“生命周期”一节中还有两个组件系统事件未提及：\n\n*   `PostConstructViewMapEvent`：\n\
    \    当 `UIViewRoot` 刚刚启动视图作用域时触发。\n\n*   `PreDestroyViewMapEvent`：\n    当 `UIViewRoot`\
    \ 即将销毁视图作用域时触发。\n\n这两个事件并不严格绑定于基于六个阶段的组件生命周期，它们基本上可以在生命周期的任何时刻发生。`PostConstructViewMapEvent`\
    \ 在应用程序首次调用 `UIViewRoot#getViewMap()` 时触发。默认情况下，这仅发生在当前视图状态的第一个 `@ViewScoped`\
    \ 托管 Bean 被创建时。`PreDestroyViewMapEvent` 在应用程序对 `UIViewRoot#getViewMap()` 调用 `Map#clear()`\
    \ 时触发，这通常发生在已存在已设置的实例时调用 `FacesContext#setViewRoot()` 的情况下。这将结束视图作用域并销毁所有活跃的 `@ViewScoped`\
    \ 托管 Bean。通常，这仅发生在操作方法返回非 `null` 的导航结果时。\n\n你可以通过 `jakarta.faces.event.ComponentSystemEventListener`\
    \ 接口监听上述任何组件系统事件。^(¹⁰) 在 Jakarta Faces API 中，`UIComponent` 类本身已实现了 `ComponentSystemEventListener`。该接口提供了一个\
    \ `processEvent()` 方法，其参数为 `ComponentSystemEvent`，而该参数又包含一个 `getComponent()` 方法，用于返回触发事件的具体\
    \ `UIComponent` 实例。`UIComponent#processEvent()` 的默认实现会检查给定的 `ComponentSystemEvent`\
    \ 参数是否为 `PostRestoreStateEvent` 的实例，以及是否指定了 `binding` 属性；如果是，则调用 `binding` 属性对应的\
    \ setter 方法，并将组件实例本身作为参数传入。\n\n有三种方式可以为这些组件系统事件订阅监听器。第一种是在视图中声明式地使用 `<f:event>`\
    \ 标签。该标签可以附加到任何组件标签上。在相对较多的 Jakarta Faces 2.0/2.1 相关资源中，你会看到如下示例：\n\n其中 `onload()`\
    \ 方法通常实现如下：\n\n```\npublic void onload() {\nFacesContext context = FacesContext.getCurrentInstance();\n\
    if (!context.isPostback() && !context.isValidationFailed()) {\n// ...\n}\n}\n\
    ```\n\n请注意，`<f:event listener=\"#{bean.onload}\">` 默认期望一个带有 `ComponentSystemEvent`\
    \ 参数的方法，但如果你不需要该参数，为简洁起见可以省略，此时方法表达式应加括号，如 `<f:event listener=\"#{bean.onload()}\"\
    >`，尽管所使用的 EL 实现可能对此宽容处理。\n\n如前所示，使用 `<f:event type=\"preRenderView\">` 本质上是一种变通方法，以便在\
    \ GET 请求期间，基于 `<f:viewParam>` 设置的模型值来模拟调用应用程序阶段。之所以需要这样做，是因为 `@PostConstruct`\
    \ 不适合，它在 Bean 构造后立即被调用，远早于 `<f:viewParam>` 设置模型值。自 Jakarta Faces 2.2 引入新的 `<f:viewAction>`\
    \ 后，就不再需要 `<f:event>` 这种技巧了：\n\n其中 `onload()` 方法只需实现如下：\n\n```\npublic void onload()\
    \ {\n// ...\n}\n```\n\n`<f:event>` 的另一个实际应用场景是在复合组件的支持组件中实现类似 `@PostConstruct`\
    \ 的行为，你可以安全地基于其属性执行任何必要的初始化。\n\n```\n...\n\n...\n#{cc.someInitializedValue}\n\n\
    ```\n\n其中 `SomeComposite` 类的 `init()` 方法如下所示：\n\n```\nprivate Object someInitializedValue;\
    \ // +getter\npublic void init() {\nMap attributes = getAttributes();\nsomeInitializedValue\
    \ = initializeItBasedOn(attributes);\n}\n```\n\n第二种订阅组件系统事件监听器的方式是在 Java 代码中以编程方式使用\
    \ `UIComponent#subscribeToEvent()`。这允许你根据条件为现有组件订阅组件系统事件监听器。务必牢记，组件系统事件监听器会保存在视图状态中。换句话说，在后续回发请求的恢复视图阶段，它会被恢复到组件实例中。使用\
    \ `UIComponent#subscribeToEvent()` 时请记住这一点；否则，你可能会多次订阅同一个监听器。可以通过至少正确实现 `equals()`\
    \ 方法和 `Serializable` 接口来避免这种情况。\n\n这使得为特定组件以编程方式正确注册组件系统事件监听器变得有些复杂。如果是现有组件，最好改用\
    \ `<f:event>`；如果是自定义组件，最好改用 `@ListenerFor` 注解，这实际上是第三种方式。下面是一个以编程方式正确注册组件系统事件监听器的入门示例，前提是\
    \ `YourListener` 类正确实现了 `equals()` 和 `hashCode()` 方法，并且实现了 `Serializable`、`Externalizable`\
    \ 或 `jakarta.faces.component.StateHolder` 接口，以便能正确保存在视图状态中。\n\n```\nClass event\
    \ = PreRenderViewEvent.class;\nComponentSystemEventListener listener = new YourListener();\n\
    component.subscribeToEvent(event, listener);\n```\n"
- fmt: 'As previously stated, the third way to subscribe listeners to component system
    events is declaratively to use the `@ListenerFor` annotation. You can put this
    annotation only on a `UIComponent` or `Renderer` class. You can’t put this annotation
    on a backing bean class. For that, you should use `<f:event>` instead. The `@ListenerFor`
    annotation takes the target event(s) as value. The concrete `ComponentSystemEventListener`
    instance is the `UIComponent` instance itself. If the annotation is declared on
    a `Renderer` class, then the target component is the `UIComponent` instance whose
    `UIComponent#getRendererType()` refers the particular `Renderer` class. The following
    example shows it for a custom component `YourComponent`:


    ```

    @FacesComponent("project.YourComponent")

    @ListenerFor(systemEventClass=PostAddToViewEvent.class)

    public class YourComponent extends UIComponentBase {

    @Override

    public void processEvent(ComponentSystemEvent event) {

    if (event instanceof PostAddToViewEvent) {

    // ...

    }

    else {

    super.processEvent(event);

    }

    }

    // ...

    }

    ```


    Yes, that `instanceof` check is necessary. As noted in the section “Life Cycle,”
    the `PostRestoreStateEvent` is by default explicitly fired for any component in
    the tree. The `super.processEvent(event)` call is necessary in case this component
    has the `binding` attribute specified because the default `UIComponent#processEvent()`
    implementation calls during `PostRestoreStateEvent` the setter method behind the
    binding attribute.


    ## Custom Component System Events


    You can create your own `ComponentSystemEvent` types. Basically all you need to
    do is to extend from the `ComponentSystemEvent` abstract class and declare the
    `@NamedEvent` annotation on it and finally invoke `Application#publishEvent()`
    at the desired moment.


    Imagine that you want to create a custom component system event that is fired
    before the invoke application phase (fifth phase), a `PreInvokeApplicationEvent`.
    You can then create the custom event as follows:


    ```

    @NamedEvent(shortName="preInvokeApplication")

    public class PreInvokeApplicationEvent extends ComponentSystemEvent {

    public PreInvokeApplicationEvent(UIComponent component) {

    super(component);

    }

    }

    ```


    And here’s how you can use a custom `PhaseListener` to publish it.


    ```

    public class PreInvokeApplicationListener implements PhaseListener {

    @Override

    public PhaseId getPhaseId() {

    return PhaseId.INVOKE_APPLICATION;

    }

    @Override

    public void beforePhase(PhaseEvent event) {

    FacesContext context = FacesContext.getCurrentInstance();

    context.getApplication().publishEvent(context,

    PreInvokeApplicationEvent.class, context.getViewRoot());

    }

    @Override

    public void afterPhase(PhaseEvent event) {

    // NOOP.

    }

    }

    ```


    After registering this phase listener in `faces-config.xml`, you can use `<f:event>`
    or `@ListenerFor` to listen on this event. One real-world example would be nested
    in the `<f:view>` or a master template, or in a particular `<h:form>`, so that
    you don’t need to copy/paste the very same `<f:actionListener>` over multiple
    `UICommand` components in template clients or forms, or even the very same `<f:viewAction>`
    over multiple template clients.


    ## Jakarta Tags


    If you have ever developed with Jakarta Pages, then you’ll most likely have stumbled
    upon Jakarta Tags. In Facelets, however, only a limited subset of Jakarta Tags
    is reincarnated. They are `<c:if>`, `<c:choose><c:when><c:otherwise>`, `<c:forEach>`,
    `<c:set>`, and `<c:catch>`. Essentially, the tag names are identical to those
    from Jakarta Pages, but the implementations are completely rewritten for Facelets.
    Those Jakarta Tags are available under the `jakarta.tags.core` XML namespace URI
    which should be assigned to the “`c`” XML namespace prefix.


    Jakarta Tags have a different life cycle than Jakarta Faces standard HTML components.
    Jakarta Tags already run directly during the view build time while Jakarta Faces
    is busy building the component tree based on the view definition. Jakarta Tags
    don’t physically end up as components in the Jakarta Faces component tree. In
    other words, you can use Jakarta Tags to control the flow of building of the Jakarta
    Faces component tree.


    When developing Jakarta Faces pages with Jakarta Tags, the most important thing
    to keep in mind is thus that they don’t participate in the Jakarta Faces life
    cycle. In the following, I have demonstrated the most important behavioral differences
    between a tag of Jakarta Tags and its counterpart in either Jakarta Faces or Facelets.


    ### `<c:forEach>` versus `<ui:repeat>`


    The following is a `<c:forEach>` example iterating over a `List<Item>` with three
    instances of an example `Item` entity having `id` and `value` properties:


    During the view build time, the preceding markup using `<c:forEach>` creates three
    physically separate `HtmlOutputText` instances in the Jakarta Faces component
    tree, roughly represented as follows:


    In turn, they individually generate their HTML output during view render time,
    as follows:


    ```

    one

    two

    three

    ```


    Do note that the `id` attribute of a Jakarta Faces component is also evaluated
    during the view build time and thus you need to manually ensure the uniqueness
    of the resulting component ID the above demonstrated way. Otherwise, Jakarta Faces
    will throw an `IllegalStateException` with a message that goes like this: “Duplicate
    component ID found in view.” The only other Jakarta Faces component attribute
    that is also evaluated during the view build time is the `binding` attribute.
    If you absolutely need to bind a component generated by Jakarta Tags to a backing
    bean property, which would be a rare real-world use case, then you should be specifying
    a unique array index, collection index, or map key. The following is an example
    provided that `#{bean.components}` refers an already-prepared `UIComponent[]`,
    `List<UIComponent>`, or `Map<Long, UIComponent>` property:


    The Facelets counterpart of the `<c:forEach>` is the `<ui:repeat>`. This is in
    essence a `UIComponent`. In other words, the `<ui:repeat>` itself also ends up
    in the Jakarta Faces component tree during the view build time. It also runs during
    the view render time, but it doesn’t generate any HTML output by itself. It basically
    reexecutes the HTML output generation of its children during every iteration round
    against the currently iterated item as `var` attribute.


    During the view build time, the aforementioned ends up exactly as is in the Jakarta
    Faces component tree: a single `UIRepeat` instance with one nested `HtmlOutputText`
    instance, whereas the `<c:forEach>` example creates here three `HtmlOutputText`
    instances. Then, during the view render time, the very same `<h:outputText>` component
    is being *reused* to generate its HTML output based on current iteration round.


    ```

    one

    two

    three

    ```


    Do note that the `<ui:repeat>` as being an instance of the `NamingContainer` interface
    already ensured the uniqueness of the client ID based on the iteration index.
    It’s technically also not possible to reference its `var` attribute in the `id`
    attribute of any child component as the `var` attribute is only set during the
    view render time while the `id` attribute is already set during the view build
    time.


