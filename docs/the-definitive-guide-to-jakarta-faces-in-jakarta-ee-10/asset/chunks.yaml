    Ajax 请求上显示完整的错误页面。


    作为一个完全不同的替代方案，你可以将活动区域设置设为请求作用域而不是会话作用域，方法是将语言标签包含在 URL 中，例如`http://example.com/en/page.xhtml`、`http://example.com/pt/page.xhtml`和`http://example.com/hi/page.xhtml`。这样，你就可以通过简单地点击链接来更改活动区域设置。这只需要一个
    Servlet 过滤器，它从 URL 中提取`java.util.Locale`实例并将其转发到所需的 Jakarta Faces 页面，以及一个自定义视图处理程序，该处理程序将语言标签包含在任何`<h:form>`、`<h:link>`和`<h:button>`组件生成的
    URL 中。


    ## 组织 Bundle 键


    当 Web 应用程序增长时，你可能会注意到 bundle 文件开始变得难以维护。关键在于遵循非常严格的约定来组织 bundle 键。可重用的站点范围条目，通常是那些用作输入标签、按钮标签、链接标签、表格标题标签等的条目，应使用通用前缀作为键（例如，`label.save=Save`）。页面特定的条目应使用页面特定的前缀作为键（例如，`foldername_pagename.title=Some
    Page Title`）。以下是本地化 Facelets 模板`/WEB-INF/templates/page.xhtml`的详细示例：


    ```

    #{text[page += ''.title'']}

    #{text[page += ''.title'']}

    © #{text[''page_home.title'']}

    ```


    Jakarta 标签`<c:set>`基本上将`UIViewRoot#getViewId()`转换为适合作为页面特定前缀的字符串。Jakarta Faces
    视图 ID 基本上表示代表 Jakarta Faces 页面的物理文件的绝对服务器端路径（例如，`/user/account.xhtml`）。这需要被处理成适合作为资源包键的格式。`fn:split()`调用从中提取出`/user/account`部分，而`fn:replace()`调用将正斜杠转换为下划线，使其变为`_user_account`。最后，`<c:set>`将其以`page_user_account`的名称存储在视图作用域中，名称为`page`，以便在同一视图的其他地方可以作为`#{page}`使用。


    你会注意到`#{page}`又被用作`<h:body>`的 ID 等。这使得在需要时，可以更容易地从通用 CSS（层叠样式表）文件中选择特定页面。`#{page}`还被用于多个资源包引用中，例如`#{text[page
    += ''.title'']}`，在`/home.xhtml`的情况下，它最终引用了键`page_home.title`。


    使用这样的模板，你可以拥有以下页面特定的资源包条目：


    ```

    page_home.title = My Website

    page_home.meta.description = A Hello World Faces application.

    page_login.title = Log In

    page_login.meta.description = Log in to My Website.

    page_signup.title = Sign Up

    page_signup.meta.description = Sign up to My Website.

    ```


    以下是利用前面展示的模板`/WEB-INF/templates/page.xhtml`的模板客户端示例，即`/login.xhtml`：


    以下是关联的资源包条目的样子：


    ```

    label.email = Email

    label.password = Password

    label.login = Log In

    ```


