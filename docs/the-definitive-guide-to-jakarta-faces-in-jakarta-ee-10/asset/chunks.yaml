    \ source* in the average web browser, should look as\nfollows:\n\n```\n\nTitle\n\
    \n...\n\n```\n\nYou see, Jakarta Faces basically replaces all components in the\
    \ view\ndefinition by their generated HTML output. As discussed previously,\n\
    Jakarta Faces provides an extensive set of standard HTML components.\nTable [3-1](#454457_2_En_3_Chapter.xhtml#Tab1)\
