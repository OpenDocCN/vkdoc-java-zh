- fmt: "# 自定义转换器与验证器\n\n一种方法是直接扩展它，在构造函数中设置默认值，并在`*.taglib.xml`文件中注册它，这样就完成了。以下是`LocalDateConverter`可能的样子：\n\
    \n```java\n@FacesConverter(\"project.ConvertLocalDate\")\npublic class LocalDateConverter\
    \ extends DateTimeConverter {\n    public LocalDateConverter() {\n        setType(\"\
    localDate\");\n        setPattern(\"yyyy-MM-dd\");\n    }\n}\n```\n\n以及`/WEB-INF/example.taglib.xml`中的条目：\n\
    \n```xml\n<tag>\n    <tag-name>convertLocalDate</tag-name>\n    <converter-id>project.ConvertLocalDate</converter-id>\n\
    </tag>\n```\n\n或者，你也可以通过去掉转换器ID并将其设为`forClass`转换器来使其成为隐式转换器：\n\n```java\n@FacesConverter(forClass=LocalDate.class)\n\
    ```\n\n这样，你甚至不需要任何`<t:convertLocalDate>`标签。别忘了删除`example.taglib.xml`中的`<tag>`条目。它们不能同时使用。如果你需要这种情况，例如，因为你希望能够更改`LocalDate`模式，请创建另一个子类。\n\
    \n你甚至可以有一个针对`java.lang.String`类型属性的`forClass`转换器。当你想要一个自动的应用程序范围的字符串修剪策略，以防止模型被用户提交值中的前导或尾随空格污染时，这非常有用。以下是这样一个转换器的样子：\n\
    \n```java\n@FacesConverter(forClass=String.class)\npublic class TrimConverter\
    \ implements Converter {\n    @Override\n    public String getAsString(FacesContext\
    \ context, UIComponent component, String modelValue) {\n        return modelValue\
    \ == null ? \"\" : modelValue;\n    }\n\n    @Override\n    public String getAsObject(FacesContext\
    \ context, UIComponent component, String submittedValue) {\n        if (submittedValue\
    \ == null || submittedValue.isEmpty()) {\n            return null;\n        }\n\
    \        String trimmed = submittedValue.trim();\n        return trimmed.isEmpty()\
    \ ? null : trimmed;\n    }\n}\n```\n\n最后但同样重要的是，当你需要将整个实体作为选择组件的`SelectItem`值提供时（另请参见第[4](#454457_2_En_4_Chapter.xhtml)章），以及为`Country.class`提供自定义转换器：\n\
    \n```xml\n<f:selectItems value=\"#{bean.availableCountries}\" var=\"country\"\n\
    \    itemValue=\"#{country}\" itemLabel=\"#{country.name}\" />\n```\n\n其中相关的支持bean属性声明如下：\n\
    \n```java\nprivate Country country;\nprivate List<Country> availableCountries;\n\
    ```\n\n那么你需要记住，实体必须正确实现`equals()`和`hashCode()`方法。否则，Jakarta Faces在提交表单时可能会抛出令人困惑的验证错误。\n\
    \n*验证错误：值无效*\n\n当bean是请求作用域而不是视图作用域，因此在每次回发时重新创建可用国家列表时，可能会发生这种情况。作为防止篡改请求的安全措施的一部分，Jakarta\
    \ Faces将重新遍历可用选项，以验证所选选项是否确实在其中。Jakarta Faces将使用`Object#equals()`方法将所选选项与每个可用选项进行测试。如果对于任何可用选项都没有返回`true`，则会抛出上述验证错误。\n\
    \n继续以`BaseEntity`为例，以下是你最好如何实现其`equals()`和`hashCode()`方法：\n\n```java\n@Override\n\
    public boolean equals(Object other) {\n    if (getId() != null\n        && getClass().isInstance(other)\n\
    \        && other.getClass().isInstance(this))\n    {\n        return getId().equals(((BaseEntity)\
    \ other).getId());\n    }\n    else {\n        return (other == this);\n    }\n\
    }\n\n@Override\npublic int hashCode() {\n    if (getId() != null) {\n        return\
    \ Objects.hash(getId());\n    }\n    else {\n        return super.hashCode();\n\
    \    }\n}\n```\n\n注意`equals()`方法中的双向`Class#isInstance()`测试。这样做而不是使用`getClass()\
    \ == other.getClass()`，因为当你的持久化框架使用代理（如Hibernate）时，后者会返回`false`。\n\n## 自定义验证器\n\
    \n同样，验证器从一开始就可以在Jakarta Faces中自定义。由于几乎每个基本用例都已由标准Jakarta Faces验证器甚至Jakarta Bean\
    \ Validation约束（如长度、范围和模式验证）覆盖，因此自定义Jakarta Faces验证器最常见的用例是通过测试提交值是否符合数据库约束来验证数据完整性。通常，这些涉及唯一约束。\n\
    \n一个很好的实际示例是在基于电子邮件的注册过程中或用户账户管理页面中更改电子邮件地址时，验证指定的电子邮件地址是否尚未被使用。特别是，值更改事件无法通过Jakarta\
    \ Bean Validation约束以简单方式测试，因为Jakarta Bean Validation不提供任何机会在不从数据库重新获取实体的情况下比较旧值和新值。在Jakarta\
    \ Faces验证器中，你可以通过`UIComponent`参数轻松获取旧值。首先，相应地实现`jakarta.faces.validator.Validator`接口。\n\
    \n```java\n@FacesValidator(value=\"project.UniqueEmailValidator\", managed=true)\n\
    public class UniqueEmailValidator implements Validator {\n    @Inject\n    private\
    \ UserService userService;\n\n    @Override\n    public void validate(FacesContext\
    \ context, UIComponent component, String email)\n        throws ValidatorException\n\
    \    {\n        if (email == null || email.isEmpty()) {\n            return; //\
    \ 让@NotNull或required=true处理此情况\n        }\n        String oldEmail = (String)\
    \ ((UIInput) component).getValue();\n        if (!email.equals(oldEmail) && userService.exist(email))\
    \ {\n            throw new ValidatorException(\n                new FacesMessage(\"\
    Email already in use\"));\n        }\n    }\n}\n```\n\n旧值可以简单地从`UIInput#getValue()`获取，它基本上返回`UIInput`组件的当前`value`属性。为了使其运行，在任何`EditableValueHolder`组件的`validator`属性中，或任何嵌套的`<f:validator>`标签的`validatorId`属性中，指定声明的验证器ID。\n\
    \n查看`UniqueEmailValidator`类时，你会注意到注解和接口也经历了与转换器相同的Jakarta Faces 2.3更改。与`@FacesConverter`一样，自Jakarta\
    \ Faces 2.3起，`@FacesValidator`注解也新增了一个`managed`属性，该属性应启用验证器实现中的依赖注入。并且与`Converter<T>`一样，`Validator<T>`也进行了参数化，因此`validate()`方法现在接受`T`而不是`Object`作为值参数。\n\
    \n你还需要确保验证器的实现方式是在值参数为`null`或空时跳过验证。历史上，在Jakarta Faces 1.x中，当值参数为`null`时，`validate()`方法总是会被跳过。然而，自Jakarta\
    \ Bean Validation集成到Jakarta Faces 2.0以来，这一情况发生了变化，从而破坏了现有基于Jakarta Faces 1.x的自定义验证器的向后兼容性。可以通过显式设置以下`web.xml`上下文参数来关闭此破坏性更改：\n\
    \n```xml\n<context-param>\n    <param-name>jakarta.faces.VALIDATE_EMPTY_FIELDS</param-name>\n\
    \    <param-value>false</param-value>\n</context-param>\n```"
