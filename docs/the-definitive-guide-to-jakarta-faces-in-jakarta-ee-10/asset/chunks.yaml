- fmt: "# 默认页面与视图作用域\n\n默认页面在`@PostConstruct`中定义。否则，用户可能会看到一个错误页面，其中包含消息“`Invalid\
    \ path : /WEB-INF/includes/spa/.xhtml`”。请注意，支持 bean 被声明为`@ViewScoped`。这对于在回发之间记住当前正在打开的页面非常重要。如果它是`@RequestScoped`，并且用户导航到例如`page2`并在其中提交表单（这会创建一个新的\
    \ HTTP 请求），那么`@RequestScoped`管理的 bean 将被重新创建，`page`属性的默认值为`page1`，因此不再是初始选择的`page2`值。这会导致当\
    \ Jakarta Faces 准备解码任何输入组件以处理回发请求期间的表单提交时，`<ui:include>`将不再引用`page2.xhtml`，因此\
    \ Jakarta Faces 将无法找到在`page2.xhtml`中声明的输入组件。`@ViewScoped` bean 的生命周期与用户回发到同一个视图的时间相同，在本例中为`/spa.xhtml`，因此它能够正确记住当前选中的页面。\n\
    \n在尝试这个 SPA 示例时，您可能已经注意到一个缺点：页面不可添加书签。这是因为页面不是通过幂等的 GET 请求打开的。您可以通过利用 HTML5 `history.pushState`\
    \ API 来解决这个问题。^([^(65)](#fn65)) 基本上，在 Ajax 请求完成后，您应该将预期的 URL 推送到浏览器历史记录中，这将反映在浏览器的地址栏中。并且您应该修改`Spa`支持\
    \ bean，以检查是否已打开任何特定页面，并相应地准备`page`变量。\n\n以下是一个入门示例，它仅附加了`?page=xxx`查询字符串参数。首先，调整`spa.xhtml`中的`<f:ajax>`，按如下方式指定`onevent`属性：\n\
    \n```\n<f:ajax ... onevent=\"pageChangeListener\" />\n```\n\n并创建以下 JavaScript\
    \ 函数：\n\n```javascript\nfunction pageChangeListener(event) {\n    if (event.status\
    \ == \"success\") {\n        var page = document.getElementById(\"content\").dataset.page;\n\
    \        var url = location.pathname + \"?page=\" + page;\n        history.pushState(null,\
    \ document.title, url);\n    }\n}\n```\n\n最后，按如下方式调整`Spa`支持 bean：\n\n```java\n\
    @Inject @ManagedProperty(\"#{param.page}\")\nprivate String page;\n\npublic void\
    \ init() {\n    if (page == null) {\n        page = \"page1\";\n    }\n}\n```\n\
    \n另外，请注意您可能想要验证提供的`page`参数。顺便说一句，黑客进行路径探测是无害的，因为 Jakarta Faces 已经不允许遍历到父路径，例如`/spa.xhtml?page=../../templates/layout`。\n\
    \n# 模板装饰\n\n如果您希望拥有一个可重用的包含文件，该文件能够插入模板定义，就像使用`<ui:include>`引用包含一个或多个`<ui:insert>`部分的包含文件一样，那么您可以使用`<ui:decorate>`。以下是一个示例，即`/WEB-INF/decorations/contact.xhtml`：\n\
    \n```xml\n<ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\">\n  \
    \  <div class=\"contact\">\n        <ui:insert />\n    </div>\n</ui:composition>\n\
    ```\n\n以下是它的使用方法；您可以将`<ui:decorate>`放在模板客户端的任何位置，就像`<ui:include>`一样：\n\n```xml\n\
    <ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\">\n    <p>Questions?\
    \ Contact us!</p>\n    <p>✆ +31 (0)6 1234 5678</p>\n    <p>✉ info@example.com</p>\n\
    </ui:decorate>\n```\n\n请注意，`contact.xhtml`只有一个`<ui:insert>`，并且它没有名称。这会将整个`<ui:decorate>`标签体插入到`<ui:insert>`声明的位置。当然，您可以指定一个名称，但那样您就需要显式地使用该名称指定`<ui:define>`。这仅在您有多个插入部分时才有用。\n\
    \n如有必要，您可以使用`<ui:param>`传递参数。其工作方式与`<ui:composition template>`相同。以下示例将`/WEB-INF/decorations/contact.xhtml`中的电子邮件用户名参数化，默认值为“`info`”。\n\
    \n```xml\n<ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\">\n  \
    \  ...\n    <p>✉ #{empty mailto ? 'info' : mailto}@example.com</p>\n    ...\n\
    </ui:composition>\n```\n\n然后可以按如下方式使用：\n\n```xml\n<ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\"\
    >\n    <ui:param name=\"mailto\" value=\"press\" />\n    <h2>Contact us</h2>\n\
    \    <p>For press inquiries you can contact us by the below\n    phone number\
    \ and email address.</p>\n</ui:decorate>\n```\n\n# 标签文件\n\n与`<ui:composition template>`和`<ui:decorate>`一样，您也可以在`<ui:include>`中使用`<ui:param>`。\n\
    \n```xml\n<ui:include src=\"/WEB-INF/includes/field.xhtml\">\n    <ui:param name=\"\
    type\" value=\"email\" />\n    <ui:param name=\"id\" value=\"email\" />\n    <ui:param\
    \ name=\"label\" value=\"E-mail\" />\n    <ui:param name=\"value\" value=\"#{bean.email}\"\
    \ />\n</ui:include>\n```\n\n其中`/WEB-INF/includes/field.xhtml`看起来像这样：\n\n```xml\n\
    <ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n             \
    \   xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n    <div class=\"field\">\n  \
    \      <h:outputLabel for=\"#{id}\" value=\"#{label}\" />\n        <h:inputText\
    \ id=\"#{id}\" value=\"#{value}\" type=\"#{type}\" />\n        <h:message for=\"\
    #{id}\" />\n    </div>\n</ui:composition>\n```\n\n但是，请注意不要在`<ui:include>`中使用过多的`<ui:param>`标签。在这种情况下，您更希望使用更简洁的方式，如下所示：\n\
    \n```xml\n<t:field type=\"email\" id=\"email\" label=\"E-mail\" value=\"#{bean.email}\"\
    \ />\n```\n\n当`<ui:include>`带有三个或更多`<ui:param>`标签时，这强烈表明该包含文件最好注册为标签文件，以便在 Facelet\
    \ 中使用更少的样板代码。首先，将包含文件移动到不同的子文件夹`/WEB-INF/tags/field.xhtml`。这不是技术上的要求。无论您将其放在哪里，它都能正常工作，但我们只是希望清晰地组织文件。主模板文件放在`/WEB-INF/templates`，包含文件放在`/WEB-INF/includes`，装饰文件放在`/WEB-INF/decorations`，标签文件放在`/WEB-INF/tags`。\n\
    \n然后，创建以下`/WEB-INF/example.taglib.xml`：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<facelet-taglib xmlns=\"http://xmlns.jcp.org/xml/ns/javaee\"\n    \
    \            xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n       \
    \         xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_2.xsd\"\
    \n                version=\"2.2\">\n    <namespace>http://example.com/tags</namespace>\n\
    \    <short-name>t</short-name>\n\n    <tag>\n        <tag-name>field</tag-name>\n\
    \        <description>Renders label + input + message field.</description>\n \
    \       <source>tags/field.xhtml</source>\n        <attribute>\n            <name>type</name>\n\
    \            <description>The type of the input component.</description>\n   \
    \         <required>false</required>\n            <type>java.lang.String</type>\n\
    \        </attribute>\n        <attribute>\n            <name>id</name>\n    \
    \        <description>The ID of the input component.</description>\n         \
    \   <required>true</required>\n            <type>java.lang.String</type>\n   \
    \     </attribute>\n        <attribute>\n            <name>label</name>\n    \
    \        <description>The label of the input component.</description>\n      \
    \      <required>true</required>\n            <type>java.lang.String</type>\n\
    \        </attribute>\n        <attribute>\n            <name>value</name>\n \
    \           <description>The value of the input component.</description>\n   \
    \         <required>false</required>\n            <type>java.lang.Object</type>\n\
    \        </attribute>\n        <attribute>\n            <name>rendered</name>\n\
    \            <description>Whether the field is rendered.</description>\n     \
    \       <required>false</required>\n            <type>boolean</type>\n       \
    \ </attribute>\n    </tag>\n</facelet-taglib>\n```\n\n不可否认，这需要相当多的样板代码。但要知道，`<attribute>`元素对于标签文件的技术功能并非强制性的。您甚至可以完全省略它们。但这样一来，IDE\
    \ 在尝试自动完成自定义标签时将无法将它们加载到自动建议框中。这不太友好。所以最好保留它们。顺便说一句，标签属性的`<required>`属性仅在 Jakarta\
    \ Faces 项目阶段设置为`Development`时才会导致运行时错误。在其他 Jakarta Faces 项目阶段，它会被忽略。而一般的 IDE 在自动完成标签时会立即提示这些必需的属性。\n\
    \n文件名`example.taglib.xml`是自由选择的。为了让 Jakarta Faces 在应用程序启动时自动拾取标签库文件，只有两个要求：它必须具有`.taglib.xml`扩展名，并且必须放在`/WEB-INF`文件夹中（或者，如果放在最终位于`/WEB-INF/lib`的\
    \ JAR 文件中，则必须放在该 JAR 文件的`/META-INF`文件夹中）。不幸的是，在某些服务器（如 GlassFish/Payara）中，将文件放在`/WEB-INF`中并不总是能很好地工作。在这种情况下，您必须通过`web.xml`中的以下上下文参数显式注册它，其值表示从\
    \ Web 根目录到`*.taglib.xml`文件的完整路径。\n\n```xml\n<context-param>\n    <param-name>jakarta.faces.FACELETS_LIBRARIES</param-name>\n\
    \    <param-value>/WEB-INF/example.taglib.xml</param-value>\n</context-param>\n\
    ```\n\n为了使用`*.taglib.xml`中定义的任何标签，您首先必须在 Facelet 的 XML 命名空间中声明标签库的`<namespace>`\
    \ URI，以及一个任意的 XML 命名空间前缀。为了更好地维护代码，建议一致地选择标签库的首选 XML 命名空间前缀，如`*.taglib.xml`的`<short-name>`中所指定的，在我们的`example.taglib.xml`中为“`t`”。\n\
    \n```xml\n<html xmlns:t=\"http://example.com/tags\">\n    ...\n    <t:field type=\"\
    email\" id=\"email\" label=\"E-mail\" value=\"#{bean.email}\" />\n    <t:button\
    \ value=\"Log In\" action=\"#{bean.login}\" />\n    ...\n</html>\n```\n\n请注意，电子邮件字段的`type=\"\
    email\"`最终会进入标签文件实现的`<c:otherwise>`中，并通过`<h:inputText>`的`type=\"#{type}\"`属性传递。这使您可以轻松使用\
    \ HTML5 输入字段，例如`type=\"email\"`、`type=\"number\"`和`type=\"tel\"`。\n\n您可能还注意到了另一个自定义标签`<t:button>`。以下是它在`/WEB-INF/tags/button.xhtml`中的实现方式。\n\
    \n```xml\n<ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n   \
    \             xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n    <h:commandButton\
    \ value=\"#{value}\" action=\"#{action}\" />\n</ui:composition>\n```\n\n它在`example.taglib.xml`中的注册方式与`<t:field>`几乎相同，但`action`属性有一个例外。从技术上讲，您需要指定一个`<method-signature>`而不是（属性）`<type>`：\n\
    \n```xml\n<tag>\n    <tag-name>button</tag-name>\n    <source>tags/button.xhtml</source>\n\
    \    <attribute>\n        <name>value</name>\n        <required>true</required>\n\
    \        <type>java.lang.String</type>\n    </attribute>\n    <attribute>\n  \
    \      <name>action</name>\n        <required>true</required>\n        <method-signature>java.lang.Object\
    \ action()</method-signature>\n    </attribute>\n</tag>\n```"
  raw: "The default page is defined in `@PostConstruct`\n. Otherwise, the user might\
    \ face an error page with the message\n“`Invalid path : /WEB-INF/includes/spa/.xhtml`”.\n\
    Note that the backing bean is declared `@ViewScoped` .\nThis is important in order\
    \ to remember across postbacks which page is\ncurrently being opened. If it were\
    \ `@RequestScoped`, and\nthe user navigates to, for example, `page2` and submits\
    \ a\nform therein, which creates a new HTTP request, then the `@RequestScoped`\n\
    \ managed bean would be recreated again, with `page1` as default\nvalue of the\
    \ `page` property and\nthus not anymore the initially selected value of `page2`.\
    \ This has the\nconsequence that the `<ui:include>`\nwon’t anymore reference `page2.xhtml`\
    \ when\nJakarta Faces is about to decode any input components in order to\nprocess\
    \ the form submit during the postback request, and therefore\nJakarta Faces would\
    \ fail to find the input components declared in `page2.xhtml`. A `@ViewScoped`\
    \ \nbean lives as long as the user postbacks to the very same view, in this\n\
    case, `/spa.xhtml`, and\ntherefore correctly remembers the currently selected\
    \ page.\nWhen playing around with this SPA example, you might have noticed one\n\
    disadvantage: the\npages are not bookmarkable. This is caused by the fact that\
    \ the pages\nare not opened by an idempotent GET request. You can solve that by\n\
    utilizing the HTML5 `history.pushState`\nAPI.^([^(65)](#fn65)) Basically, on completion\
    \ of\nthe Ajax request, you should push the intended URL to the browser\nhistory,\
    \ which will be reflected in the browser’s address bar. And you\nshould modify\
    \ the `Spa` backing bean to\ncheck if any specific page has been opened and then\
    \ prepare the `page` variable\naccordingly.\n\nThe following is a kickoff example\
    \ that\njust appends the `?page=xxx` query\nstring parameter. First, adjust the\
    \ `<f:ajax>` of the\n`spa.xhtml` to\nspecify the `onevent` attribute as\nfollows:\n\
    \n```\n\nAnd create the following JavaScript function:\n\n```\nfunction pageChangeListener(event)\
    \ {\nif (event.status == \"success\") {\nvar page = document.getElementById(\"\
    content\").dataset.page;\nvar url = location.pathname + \"?page=\" + page;\nhistory.pushState(null,\
    \ document.title, url);\n}\n}\n```\n\nAnd, finally, adjust the `Spa` backing bean\
    \ as follows:\n\n```\n@Inject @ManagedProperty(\"#{param.page}\")\nPrivate String\
    \ page;\npublic void init() {\nif (page == null) {\npage = \"page1\";\n}\n}\n\
    ```\n\nAlso, note that you might want to validate the provided page\nparameter.\
    \ Path probing by hackers is innocent, by the way, as Jakarta\nFaces already doesn’t\
    \ allow traversing into the parent path as in `/spa.xhtml?page=../../templates/layout`.\n\
    \nTemplate Decorations\n\nIn case you would like to have a reusable include file\
    \ that is capable\nof inserting template\ndefinitions as if you would be using\
    \ `<ui:include>` to\nreference an include file with one or more `<ui:insert>`\n\
    sections, then you can use `<ui:decorate>`.\nThe following is one such example,\
    \ the `/WEB-INF/decorations/contact.xhtml`:\n\n```\n\n✆ +31 (0)6 1234 5678\n✉\
    \ info@example.com\n\n```\n\nHere is how it can be used; you can put the `<ui:decorate>`\n\
    anywhere in your template client, as a `<ui:include>`:\n\n```\nQuestions? Contact\
    \ us!\n\n```\n\nNote that the `contact.xhtml` has\nonly one `<ui:insert>` and\n\
    that it has no name. This will insert the entire `<ui:decorate>`\ntag body at\
    \ the declared place of `<ui:insert>`.\nYou can, of course, specify a name, but\
    \ then you would need to\nexplicitly specify `<ui:define>`\nwith a name for that.\
    \ That would be only useful if you have more than\none insert section.\n\nYou\
    \ can, if necessary, use `<ui:param>` to\npass parameters. This works the same\
    \ way as\nwith `<ui:composition template>`. The following example parameterizes\
