    这样做的缺点是，Jakarta Faces 不会触发 Jakarta Bean Validation 的 `@NotNull` 注解，你基本上需要为所有 Jakarta
    Faces 输入组件重复此约束，通过显式地将它们的 `required` 属性设置为 `true`。你最好不要这样做，而是继续在你的自定义验证器中执行 `null`
    和空值检查。借助 Jakarta Bean Validation 在模型中的单一位置设置验证约束，比使用完全相同的模型在不同层之间重复验证约束更符合 DRY（不要重复自己）原则。


    回到验证提交值唯一性的用例，当然，你也可以跳过这一步，直接插入数据，并捕获来自持久化层的任何约束违反异常，然后相应地显示一条 Faces 消息。然而，这与当前在用户界面中更改输入字段后立即提供即时反馈的趋势并不相符。


    然而，在注册期间验证唯一电子邮件地址这个特定用例中，可能还有另一个原因不透露指定电子邮件地址唯一性的过多细节：安全性。在这种情况下，你最好让注册过程以与成功时完全相同的方式完成，即告诉用户检查邮箱，但在幕后，实际上向目标收件人发送一封不同的电子邮件，而不是激活邮件，最好每天不超过一次。该电子邮件的内容类似于以下内容：


    *亲爱的用户，*


    *看起来您或其他人试图使用您的电子邮件地址* foo@example.com *在我们的网站上注册*，*但该地址已与一个现有账户关联。也许您实际上是想登录*
    *或重置密码？如果确实不是您本人操作，请回复此邮件告知我们，我们将对此进行调查。*


    *此致，示例公司*


    最后，你可能还需要考虑使包含“`+`”字符（后跟一串字符，表示电子邮件别名）的用户名部分的电子邮件失效或去重。对于许多电子邮件提供商，尤其是 Gmail，电子邮件地址
    `foo@gmail.com` 和 `foo+``bar@gmail.com` 指向的是完全相同的电子邮件账户，这基本上允许最终用户创建几乎无限数量的账户。


    自定义约束

    虽然这不属于 Jakarta Faces 的范畴，但为了完整性，我们想展示另一个自定义 Jakarta Bean Validation 约束的示例。在关于
    `<f:validateWholeBean>` 的章节中已经给出了一个早期示例。Jakarta Bean Validation API 已经提供了许多现成的约束，你可以在
    `jakarta.validation.constraints` 包中找到它们。^(⁴¹)

    自定义 Jakarta Bean Validation 约束最常见的用例与本地化模式有关。想想电话号码、邮政编码、银行账号和密码。当然，大多数这些都可以仅通过
    `@Pattern` 来完成，但这可能会导致代码的自文档性较差，尤其是在所需模式相对复杂的情况下。


    以下是一个自定义 `@Phone` 约束的示例，它应尽可能匹配国际公认的电话号码：


    ```

    @Constraint(validatedBy=PhoneValidator.class)

    @Target(FIELD)

    @Retention(RUNTIME)

    public @interface Phone {

    String message() default "Invalid phone number";

    Class[] groups() default {};

    Class[] payload() default {};

    }

    ```


    这是关联的 `PhoneValidator`：


    ```

    public class PhoneValidator

    implements ConstraintValidator

    {

    private static final Pattern SPECIAL_CHARS =

    Pattern.compile("[\\s().+-]|ext", Pattern.CASE_INSENSITIVE);

    private static final Pattern DIGITS =

    Pattern.compile("[0-9]{7,15}");

    @Override

    public boolean isValid

    (String phone, ConstraintValidatorContext context)

    {

    if (phone == null || phone.isEmpty()) {

    return true; // 让 @NotNull/@NotEmpty 处理此情况。

    }

    return isValid(phone);

    }

    public static boolean isValid(String phone) {

    String digits = SPECIAL_CHARS.matcher(phone).replaceAll("");

    return DIGITS.matcher(digits).matches();

    }

    }

    ```


    要激活它，只需注解关联的实体属性即可。


    ```

    @Phone

    private String phone;

    ```


    这将在 Jakarta Faces 和 Jakarta Persistence 两侧被触发：在 Jakarta Faces 中，在流程验证阶段（第三阶段）；在
    Jakarta Persistence 中，在持久化和合并期间。如 `<f:validateBean>`/`<f:validateWholeBean>` 章节所述，可以在两侧禁用它。


    自定义消息

    来自 Jakarta Faces 和 Jakarta Bean Validation 的转换和验证错误消息是完全可定制的。在应用程序范围内，可以通过提供一个属性文件来自定义它们，该文件将所需消息指定为预定义键的值。你可以在
    Jakarta Faces 4.0 规范的第 2.5.2.4 节“本地化应用程序消息”中找到 Jakarta Faces 转换和验证消息的预定义键。^(⁴²)
    你可以在 Jakarta Bean Validation 3.0 规范的附录 B“标准 ResourceBundle 消息”中找到 Jakarta Bean
    Validation 消息的预定义键。^(⁴³) 对于 Jakarta Faces，属性文件的完全限定名称必须在 `faces-config.xml` 中注册为
    `<message-bundle>`。对于 Jakarta Bean Validation，属性文件的确切完全限定名称是 `ValidationMessages`。


    作为示例，我们将修改 Jakarta Faces `required="true"` 验证和 Jakarta Bean Validation `@NotNull`
    约束的默认消息。


    ```

    main/java/resources/com/example/project/i18n/messages.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} 是必需的。

    jakarta.faces.validator.BeanValidator.MESSAGE = {1} {0}

    main/java/resources/ValidationMessages.properties

    jakarta.validation.constraints.NotNull.message = 是必需的。

    ```


    请注意 Jakarta Bean Validation 消息中缺少标签占位符。相反，`jakarta.faces.validator.BeanValidator.MESSAGE`
    中的 `{1}` 表示与 Jakarta Faces 组件关联的 `label`，而 `{0}` 表示 Jakarta Bean Validation 消息。自定义的
    Jakarta Bean Validation 消息包文件会自动被拾取。自定义的 Jakarta Faces 消息包文件需要先在 `faces-config.xml`
    中显式注册。


    ```

    com.example.project.i18n.messages


    ```


    有了这些属性文件，以下输入组件将显示完全相同的验证错误消息：


    如果你想在单个组件的基础上精细控制消息，可以使用 `UIInput` 组件的 `converterMessage`、`validatorMessage` 和/或
    `requiredMessage` 属性。`converterMessage` 将在任何转换错误时显示。


    `validatorMessage` 将在任何验证错误以及由 Jakarta Bean Validation 触发的错误时显示。


    请注意，当 `required="true"` 未满足时，不会显示此消息。为此，你需要改用 `requiredMessage`。


    请注意，对于任何 Jakarta Bean Validation 的 `@NotNull`，不会显示此消息。你应该改用 `validatorMessage`。


