- fmt: "必须承认，拥有一个像这样的可编辑表格效率并不高，尤其是当表格包含大量列和行时。Jakarta Faces 可以很好地处理它；但普通的网络浏览器在处理它时会遇到困难，特别是当行数超过几千行时。这里我还没有提及最终用户可能因为需要不断滚动整个页面而抓狂，并且基本上无法获得清晰的概览。对此有几种解决方案：首先是分页；其次是过滤；第三是基于行的内联编辑和更新；第四是在对话框或详情页面中进行外部编辑。\n\
    \n所有上述提到的表格特定性能和可用性解决方案，标准`<h:dataTable>`均未提供，因此需要大量的自定义代码。强烈建议您寻找一个支持这些功能的现有\
    \ Jakarta Faces 组件库，以便让您的 Jakarta Faces 开发更轻松，无需重新发明轮子。目前，最广泛使用的是 PrimeFaces 及其`<p:dataTable>`。^([^(52)](#fn52))\
    \ 这甚至可以通过 OptimusFaces 的`<op:dataTable>`进一步简化，^([^(53)](#fn53)) 而后者又基于`<p:dataTable>`。在详情页面中编辑所选项目是标准\
    \ Jakarta Faces 可以做到的，这在第 [5](#454457_2_En_5_Chapter.xhtml) 章的“自定义转换器”部分有演示。\n\
    \n需要说明的是，在`List<String>`作为模型值的特定情况下，在列中使用输入组件并不像`List<Product>`示例中演示的那样容易实现。换句话说，以下示例根本不起作用：\n\
    \n技术问题在于`java.lang.String`是不可变的，并且没有用于其内部值的公共 setter 方法。确实，它实际上也没有 getter 方法，但\
    \ EL 已经默认使用`Object#toString()`，对于`String`来说，它只是返回字符串本身。这可以通过使用索引显式引用模型值的特定项来解决，如下所示：\n\
    \n注意`binding`属性。基本上，在视图构建期间，这将当前的`UIComponent`实例设置为由给定名称标识的 EL 变量。在这个特定的代码片段中，它将使`#{table}`变量引用`<h:dataTable>`标签背后的具体`HtmlDataTable`实例。`#{table}`变量在视图构建期间仅在视图中的标签位置之后可引用，而在视图渲染期间则在视图中的任何位置都可引用。通过这种方式，您可以像访问\
    \ bean 一样访问`UIComponent`属性。`#{table.rowIndex}`基本上引用了`UIData#getRowIndex()`方法，^([^(54)](#fn54))\
    \ 该方法返回当前的迭代索引。最后，这用于引用列表中的目标项。在更新模型值阶段（第四阶段），Jakarta Faces 将简单地替换指定索引处的项。\n\n\
    同样，对于`binding`属性，变量名不应与现有的受管 bean 名称或隐式 EL 对象冲突，尤其不应与同一视图中的其他组件冲突，这一点非常重要。您也可以让`binding`属性引用一个支持\
    \ bean 的属性，如下所示：\n\n```\n...\n```\n\n与\n\n```\nprivate UIData table; // +getter\
    \ +setter\n```\n\n但如果它在支持 bean 中的其他地方没有被使用，这就相当无用了。此外，当受管 bean 的作用域宽于请求时（另请参见第\
    \ [3](#454457_2_En_3_Chapter.xhtml) 章的“视图构建时间”部分），这是危险的。最好不要将组件实例绑定到支持 bean；这可能表明一种不良实践。唯一合理的实际用例是将复合组件子项绑定到支持组件（另请参见第\
    \ [7](#454457_2_En_7_Chapter.xhtml) 章的“复合组件”部分）。\n\n如果您在`List<String>`之类的东西上使用`<ui:repeat>`或`<c:forEach>`而不是`<h:dataTable>`，那么您可以通过`varStatus`属性以更简单的方式获取迭代索引。\n\
    \n在`<h:dataTable>`中添加/删除行\n\n回到带有`List<Product>`的`<h:dataTable>`，在某些情况下，您可能希望能够在同一视图中添加或删除项目，通常是在某种管理页面中。为了添加一个新的`Product`，我们需要在受管\
    \ bean 中准备一个新实例，在单独的表单中填写它，持久化它，然后刷新表格。\n\n```\n...\n```\n\n其中相关的支持 bean 代码如下所示：\n\
    \n```\nprivate List list; // +getter\nprivate Product product = new Product();\
    \ // +getter\n@PostConstruct\npublic void init() {\n    list = productService.list();\n\
    }\npublic void add() {\n    productService.create(product);\n    list.add(0, product);\n\
    \    product = new Product();\n}\n```\n\n以及服务类中的这个`create()`方法：\n\n```\n@TransactionAttribute(REQUIRED);\n\
    public Long create(Product product) {\n    entityManager.persist(product);\n \
    \   return product.getId();\n}\n```\n\n删除可以通过多种方式完成。无论如何，您可能需要一个额外的列来容纳提交按钮、单选按钮或复选框。最简单的方法是使用一个包含命令按钮的列，该按钮删除当前迭代的项目，然后刷新表格。\n\
    \n```\n...\n```\n\n以及`@ViewScoped`支持 bean 类中的这个`delete(Product)`方法：\n\n```\npublic\
    \ void delete(Product product) {\n    productService.delete(product);\n    list.remove(product);\n\
    }\n```\n\n以及服务类中的这个`delete()`方法：\n\n```\n@TransactionAttribute(REQUIRED)\npublic\
    \ void delete(Product product) {\n    if (entityManager.contains(product)) {\n\
    \        entityManager.remove(product);\n    }\n    else {\n        Product managedProduct\
    \ = getById(product.getId());\n        if (managedProduct != null) {\n       \
    \     entityManager.remove(managedProduct);\n        }\n    }\n}\n```\n\n注意`<f:ajax>`的`render`属性。它指定了`@namingcontainer`，这基本上引用了最近的父级`NamingContainer`组件。在标准\
    \ Jakarta Faces HTML 组件集中，只有`<h:form>`和`<h:dataTable>`是`NamingContainer`的实例。在这个特定的结构中，`@namingcontainer`因此引用了`<h:dataTable>`。您也可以使用`<f:ajax\
    \ render=\":list:products\">`代替；只是稍微冗长一些。`<f:ajax render=\"products\">`将不起作用，因为它会尝试在当前迭代行的上下文中找到它，而该上下文基本上位于所有`<h:column>`组件内部。\n\
    \n在`<h:dataTable>`中选择行\n\n自 Jakarta Faces 2.3 起，在`<h:dataTable>`中拥有单选按钮列是原生支持的，这要归功于`<h:selectOneRadio>`的新`group`属性（另请参见第\
    \ [4](#454457_2_En_4_Chapter.xhtml) 章的“选择组件”部分）。\n\n```\n...\n```\n\n以及`@ViewScoped`支持\
    \ bean 类中的这个`deleteSelected()`方法：\n\n```\nprivate Product selected; // +getter\
    \ +setter\npublic void deleteSelected() {\n    productService.delete(selected);\n\
    \    list.remove(selected);\n}\n```\n\n请注意，您在这里也需要一个`ProductConverter`或`BaseEntityConverter`。这些在第\
    \ [5](#454457_2_En_5_Chapter.xhtml) 章的“自定义转换器”部分有详细说明。\n\n复选框选择稍微复杂一些。您可能会直观地使用`<h:selectManyCheckbox>`，但它不像`<h:selectOneRadio>`那样支持`group`属性。您需要退而使用`<h:selectBooleanCheckbox>`，并配合一个`Map<Product,\
    \ Boolean>`，其中 map 键代表当前迭代的产品，map 值代表复选框的值。\n\n```\n...\n```\n\n`@ViewScoped`支持\
    \ bean 中修改后的`deleteSelected()`方法如下所示：\n\n```\nprivate Map selection = new HashMap();\
    \ // +getter\npublic void deleteSelected() {\n    List selected = selection.entrySet().stream()\n\
    \        .filter(Entry::getValue)\n        .map(Entry::getKey)\n        .collect(Collectors.toList());\n\
    \    productService.delete(selected);\n    selected.forEach(list::remove);\n \
    \   selection.clear();\n}\n```"
  raw: "It must be said that having an editable table like this\nis not terribly efficient,\
    \ certainly not when the table contains a lot\nof columns and rows. Jakarta Faces\
    \ can handle it pretty well; only the\naverage web browser will have a hard time\
    \ handling it, certainly when\nthe number of rows exceeds a few thousand. And\
    \ then I’m not speaking\nabout the end user potentially going crazy from scrolling\
    \ through the\nwhole page all the time and basically having no clear overview.\
    \ There\nare several solutions to this: first and foremost is pagination; second\n\
    is filtering; third is row-based inline editing and updating; and fourth\nis external\
    \ editing in a dialog or detail page.\nAll the mentioned table-specific performance\
    \ and usability solutions\nare not offered by the standard `<h:dataTable>`\nand\
    \ therefore require quite an amount of custom code. It’s strongly\nrecommended\
    \ that you look for an existing Jakarta Faces component\nlibrary supporting these\
    \ features in order to make your Jakarta Faces\nlife easier without the need to\
    \ reinvent the wheel. Currently, the most\nwidely used one is PrimeFaces with\
    \ its `<p:``dataTable>`\n.^([^(52)](#fn52)) This can even be further\nsimplified\
    \ with `<op:dataTable>`\nof OptimusFaces,^([^(53)](#fn53)) which is in turn based\
    \ on\n`<p:dataTable>`.\nEditing the selected item in a detail page is doable with\
    \ standard\nJakarta Faces, and it’s demonstrated in the “Custom Converters” section\n\
    in Chapter [5](#454457_2_En_5_Chapter.xhtml).\n\nIt should be said that in the\
    \ specific case of a `List<String>`\n as model value, using input components in\
    \ columns isn’t as\neasily done as demonstrated with the `List<Product>`\nexample.\
    \ In other words, the following example won’t work at all:\n\nThe technical problem\
    \ is that `java.lang.String`\n is immutable and doesn’t have a public setter method\
    \ for its\ninternal value. True, it indeed actually also doesn’t have a getter\n\
    method, but EL already defaults to `Object#toString()`\nwhich in case of `String`\
    \ just returns\nthe very string itself. This can be solved by explicitly referencing\
    \ the\nspecific item of the model value using an index as follows:\n\nNote the\
    \ `binding`\nattribute .\nBasically, during the view build time, this sets the\
    \ current `UIComponent` instance\nas an EL variable identified by the given name.\
    \ In this particular\nsnippet, it will thus make the `#{table}` variable to\n\
    reference the concrete `HtmlDataTable`\ninstance behind the `<h:dataTable>`\n\
    tag. The `#{table}`\nvariable  is\nduring the view build time referenceable only\
    \ after the tag location in\nthe view and during the view render time referenceable\
    \ anywhere in the\nview. In this way, you can access the `UIComponent`\nproperties\
    \ as if it were a bean. The `#{table.rowIndex}`\nbasically thus refers to the\
    \ `UIData#getRowIndex()`\nmethod,^([^(54)](#fn54)) which returns the current\n\
    iteration index. And, finally, this is used to reference the item of\ninterest\
    \ in the list. During the update model values phase (fourth\nphase), Jakarta Faces\
    \ will simply replace the item at the specified\nindex.\n\nAlso for the `binding`\n\
    attribute , it’s\nvery important that the variable name shouldn’t clash with existing\n\
    managed bean names or implicit EL objects and for sure not with other\ncomponents\
    \ in the same view. You can alternatively let the `binding` attribute\nreference\
    \ a backing bean property as follows:\n\n```\n\nwith\n\n```\nprivate UIData table;\
    \ // +getter +setter\n```\n\nBut this is fairly useless if it isn’t used anywhere\
    \ else in the\nbacking bean.\nMoreover, this is dangerous when the managed bean\
    \ scope is wider than\nrequest (see also the section “View Build Time” in Chapter\
    \ [3](#454457_2_En_3_Chapter.xhtml)). It is better not to bind\ncomponent instances\
    \ to a backing bean at all; it might indicate a poor\npractice. The only reasonable\
    \ real-world use case for this is binding\ncomposite component children to a backing\
    \ component (see also the\nsection “Composite Components” in Chapter [7](#454457_2_En_7_Chapter.xhtml)).\n\
    \nIn case you’re using `<ui:repeat>` or\n`<c:forEach>`\ninstead of `<h:dataTable>`\n\
    on something like a `List<String>`,\nthen you can obtain the iteration index in\
    \ a much simpler way, via the\n`varStatus`\nattribute .\n\nAdd/Remove Rows in\
    \ <h:dataTable>\n\nComing back to the `<h:dataTable>`\nwith `List<Product>`,\n\
    there may be cases\nin which you’d like to be able to add or remove items while\
    \ staying in\nthe same view, usually in some sort of an admin page. In order to\
    \ add a\nnew `Product`, we\nneed to prepare a new instance in the managed bean,\
    \ fill it in a\nseparate form, persist it, and then refresh the table.\n\n```\n\
    \n...\n\n```\n\nwhereby the relevant backing bean code looks as follows:\n\n```\n\
    private List list; // +getter\nprivate Product product = new Product(); // +getter\n\
    @PostConstruct\npublic void init() {\nlist = productService.list();\n}\npublic\
    \ void add() {\nproductService.create(product);\nlist.add(0, product);\nproduct\
    \ = new Product();\n}\n```\n\nwith this `create()` method in\nservice class:\n\
    \n```\n@TransactionAttribute(REQUIRED);\npublic Long create(Product product) {\n\
    entityManager.persist(product);\nreturn product.getId();\n}\n```\n\nRemoving could\
    \ be done in several ways. In any case, you may need an\nadditional column to\
    \ hold the submit buttons or radio buttons or check\nboxes. The easiest way is\
    \ a column with a command button that deletes\nthe currently iterated item and\
    \ then refreshes the table.\n\n```\n\n...\n\n```\n\nwith this `delete(Product)`\n\
    method in a `@ViewScoped` backing\nbean class:\n\n```\npublic void delete(Product\
    \ product) {\nproductService.delete(product);\nlist.remove(product);\n}\n```\n\
    \nand this `delete()` method in\nservice class:\n\n```\n@TransactionAttribute(REQUIRED)\n\
    public void delete(Product product) {\nif (entityManager.contains(product)) {\n\
    entityManager.remove(product);\n}\nelse {\nProduct managedProduct = getById(product.getId());\n\
    if (managedProduct != null) {\nentityManager.remove(managedProduct);\n}\n}\n}\n\
    ```\n\nNote the `render` attribute of\n`<f:ajax>`.\nIt specifies `@namingcontainer`,\n\
    which basically references the closest parent `NamingContainer`\ncomponent. From\
    \ the standard Jakarta Faces HTML component set, only\n`<h:form>`\nand `<h:dataTable>`\n\
    are instances of `NamingContainer`. In\nthis specific construct, `@namingcontainer`\
    \ thus\nreferences the `<h:dataTable>`.\nYou could also have used `<f:ajax render=\"\
    :list:products\">` instead; it’s only slightly verbose.\nThe `<f:ajax render=\"\
    products\">` wouldn’t work because it will try to find\nit within the context\
    \ of the currently iterated row, which is basically\nwithin all `<h:column>`\n\
    components.\n\nSelect Rows in <h:dataTable>\n\nHaving a radio\nbutton column in\
    \ a `<h:dataTable>`\nis natively possible since Jakarta Faces 2.3, thanks to the\
    \ new `group` attribute of\nthe `<h:selectOneRadio>`\n(see also the section “Selection\
    \ Components” in Chapter [4](#454457_2_En_4_Chapter.xhtml)).\n\n```\n\n...\n\n\
    ```\n\nWith this `deleteSelected()`\nmethod in a `@ViewScoped` backing\nbean class:\n\
