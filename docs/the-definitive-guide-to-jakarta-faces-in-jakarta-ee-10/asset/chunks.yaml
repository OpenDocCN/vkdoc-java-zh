    此配置实际上将默认值降低到与会话中 Jakarta Faces 视图状态的最大默认数量相等。当你使用服务器端状态保存，并且所有 Jakarta Faces
    视图都只引用一个视图作用域托管 Bean 实例时，这没问题。然而，在一个经过良好开发和重构的 Jakarta Faces Web 应用程序中，平均每个 Jakarta
    Faces 页面通常会引用多个视图作用域托管 Bean。例如，如果每个 Jakarta Faces 视图最多有三个不同的视图作用域托管 Bean，那么你最好将限制设置为
    `com.sun.faces.numberOfLogicalViews` 值的三倍。你只需要考虑可能的内存消耗。当视图作用域托管 Bean 本身持有相对大量的数据时，内存消耗会迅速失控。


    视图作用域托管 Bean 对于在同一个 Jakarta Faces 视图上基于 Ajax 的回发之间保持状态非常有用，特别是当这些回发导致任何 `UIComponent`
    的 `rendered` 属性、任何 `UIInput` 组件的 `disabled` 或 `readonly` 属性，或同一 Jakarta Faces
    视图内任何 `UICommand` 组件的 `disabled` 属性值发生变化时。也就是说，在后续回发中，作为防止篡改请求的安全措施的一部分，Jakarta
    Faces 会在实际处理组件之前重新检查它们。如果持有状态的托管 Bean 是请求作用域而不是视图作用域，那么这些条件的变化将在后续回发中丢失，并且回发将无法按预期直观地处理。换句话说，视图作用域托管
    Bean 在动态表单中特别有用。


    一个例子是当下拉列表选择“其他”选项时，有条件地渲染一个自由文本字段。


    ```


