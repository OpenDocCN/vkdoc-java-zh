  trans: '

    ## 青少年时期


    回到 2004 年，Jakarta Faces 迎来了另一个第一；6 月 28 日，Ed Burns 宣布 RI 的源代码由 Sun 公司发布。这标志着一个重要的里程碑，因为在此之前，Sun
    公司积极使用的大多数技术都是闭源的。最初，源代码采用的是有些特殊的 JRL 许可证，但后来改为双许可证：GPL（附带类路径例外）和 CDDL。在宣布这一消息的同时，也确立了一项传统：每个新功能或错误修复都应附带一个测试，并且在提交更改之前必须执行所有现有测试。大约
    14 年后，从事 RI 源代码工作的人员已经大不相同，项目结构和代码规范也发生了变化，但测试驱动的传统仍然以其原始形式得以保留。


    那时，Ed Burns 决定将更多精力放在 Jakarta Faces 的规范方面，因为 Jakarta Faces 1.2 的规范工作已经立即启动，而早期团队成员之一
    Jayashri Visvanathan 则承担了实现方面的领导角色，Ryan Lubke 担任 TCK（测试兼容性工具包）工程师。


    尽管才问世几个月，各种 Jakarta Faces 组件库已经开始涌现，尽管它们都是商业化的。其中包括来自 Oracle 的 ADF Faces。早在 Jakarta
    Faces 1.0 最终版发布之前，ADF Faces 就已经被列入 Oracle 的路线图，其首个早期访问版本于 2004 年 8 月 17 日发布。它的负责人是
    Adam Winer，他在创建 Jakarta Faces 1.0 的团队中代表 Oracle。ADF Faces 主要包含一组丰富的组件，还有一个对话框框架，并且值得注意的是，它已经具备了部分页面渲染（PPR）功能，这比后来出现的
    AJAX 解决方案要领先不少。ADF Faces 还包含一个实际可用的“for each”标签（`af:forEach`）。Adam Winer 在早期就解释说，构建这样的标签并非易事，但承诺
    Oracle 会将相关知识回馈给 Jakarta Faces 本身。


    ADF Faces 组件主要源自早期的用户界面 XML（UIX）框架，Adam Winer 也是该框架的首席架构师。UIX 的早期版本曾使用过“Cabo”、“Baja”和“Marlin”等名称。UIX
    是一个用于浏览器的富客户端框架。由于 Jakarta Faces 与 UIX 有不少相似之处，并且其负责人 Adam Winer 是原始 Jakarta Faces
    团队的成员，因此推测 UIX 影响了 Jakarta Faces 或许并非不合理。这些相似之处包括：具有独立渲染器的组件概念、Jakarta Pages 标签处理器、用于组合页面的声明式选项，以及在
    Java 中以编程方式实例化相同组件的能力。甚至还有一个概念上相似的数据绑定，尽管语法不那么优雅。例如，UIX 不会使用`value="#{user.age}"`，而是使用`data:value="age@user"`，但还需要在每个页面上定义一种生产者来声明“`user`”的来源，然后将页面内容嵌套在该声明中。相比之下，Jakarta
    Faces 和 EL 一直使用全局定义，并将避免名称冲突的责任留给用户。


    2004 年最早（如果不是最早的话）的开源组件库之一是 Matthias Unverzagt 的 OurFaces。由于当时 Jakarta Faces 没有自己的资源
    API（应用程序编程接口）来提供图像等内容，OurFaces 需要在`web.xml`中添加一个 Servlet，即所谓的`SkinServlet`（`ourfaces.common.webapp.SkinServlet`）。其重要性在于，这在当时的
    Jakarta Faces 库中变得相当普遍：要求用户在使用组件库之前，手动向`web.xml`添加一些内容。


    2004 年最后几个月和 2005 年初的大部分时间，Jakarta Faces 1.2 专家组（EG）都在处理各种 Jakarta Pages 和 EL
    问题，例如 Jakarta 标签`<c:forEach>`的支持、Jakarta Pages 中 ID 的生成，以及令人头疼的“内容交织”问题——这指的是前面提到的在渲染时内容出现在响应中错误位置的情况。


    虽然 OurFaces 可能是最早的组件库之一，但它并未持久，如今很少有人记得它，甚至听说过它。而另一个起源于 2005 年初的框架则情况不同，那就是 Alexander
    Smirnov 的 Telamon 框架，后来更名为 Ajax4jsf。这个框架是首批将 Jakarta Faces 与当时新兴的 AJAX 技术相结合的框架之一。Ajax4Jsf
    的妙处在于，它可以通过将现有组件包裹在`<a4j:region>`标签中，为那些最初并未考虑 AJAX 支持的现有组件添加 AJAX 支持。这项技术被整合到了
    Exadel Visual Component Platform 中，该平台于 2006 年 3 月发布，后来更名为 RichFaces，并成为最令人难忘的
    Jakarta Faces 组件库之一。


    大约在同一时间，Alexander Smirnov 开始着手开发后来成为 RichFaces 的项目，而一家名为 ICEsoft 的公司则开始开发 Jakarta
    Faces 组件库。ICEsoft 已经运营了几年，一直致力于开发一款名为 ICEbrowser 的基于 Java 的浏览器，以及一款名为 ICEbrowser
    beans 的产品，后者是“轻量级、可配置的 JavaBean 组件，可以快速集成到 Java 客户端应用程序中”。在同年（2005 年）6 月 27 日的
    JavaOne 大会上，ICEsoft 宣布了其 Jakarta Faces 组件库——ICEfaces。它同样基于 AJAX，但将 AJAX 直接集成到了组件中。ICEsoft
    将其特定技术称为“专利申请中的 Direct-to-DOM”，这基本上意味着来自服务器的更改会直接注入到网页的 DOM 树结构中。不过，最终版本并未立即提供，但发布了早期访问版本。该版本是闭源的，但免费使用。


    与此同时，Jakarta Faces EG 成员 Jacob Hookom 受到 Hans Bergsten 对 Jakarta Pages 不适用性担忧的启发，勇敢地抓住了机会，开始亲自开发
    Bergsten 所设想的替代模板语言。到 2005 年 8 月，这项工作已经进展到一个可用的初始版本。这种模板语言的名字是什么？Facelets！它立即席卷了整个
    Jakarta Faces 世界。Kito Mann 在第一个月就在 JSFCentral 上发表了关于它的系列文章的第一部分，几个月后，Richard Hightower
    发表了著名的文章“Facelets fits Jakarta Faces like a glove”。


    Oracle 在 2005 年也没有停滞不前，在大约 16（！）个早期访问版本之后，它于 2005 年底在安特卫普（现称 Devoxx）的 JavaPolis
    会议上宣布，将把 ADF Faces 捐赠给 MyFaces，从而使其成为开源项目。

    '
- fmt: '2006年1月，Jacob Hookom和Adam Winer反思了Jakarta Faces状态保存机制的糟糕实现。该机制首先从模板创建组件树，然后在请求接近结束时，盲目地序列化整个树及其在请求期间可能放入的所有数据。在回传期间，树从这种序列化形式中恢复（因此得名“恢复视图”阶段）。这是一种巨大的浪费，因为大部分信息已经在模板中可用。尤其是在使用客户端状态保存进行AJAX请求时，这带来了非常大的负担，但在服务器端存储此状态时也是一个问题，因为它会大幅增加Jakarta
    Faces的内存使用量。以这种糟糕方式进行状态保存的主要原因之一，再次与那个决定有关：支持Jakarta Pages。由于Jakarta Faces 1.2即将定稿，不幸的是没有时间在1.2版本中修复这个问题。


    尽管此时已经清楚Facelets是Jakarta Faces的未来，但当Jakarta Faces 1.2最终于2006年5月发布时，它仍然只包含Jakarta
    Pages。不过，情况并非全然糟糕。得益于Jakarta Faces和Jakarta Pages专家组之间的合作，Jakarta Pages的修订版——Jakarta
    Pages 2.1发布了，它与Jakarta Faces的需求更加契合。除此之外，Jakarta Pages的表达式语言和Jakarta Faces的表达式语言被合并了。结果是UEL（统一表达式语言）。UEL的一个非常实用的优势是，Jakarta
    Faces组件不再需要手动将字符串转换为表达式，而是直接从模板语言接收`ValueExpression`。Jakarta Pages 2.1和Jakarta
    Faces 1.2都成为了同时发布的Jakarta EE 5的一部分。


    2006年6月13日，MyFaces社区宣布捐赠的项目将更名为Trinidad。ADF Faces在Oracle中仍然存在，但它基于Trinidad并增加了一些额外功能（例如支持Portals、JSR
    227等）。就在此之前两周，即2006年5月31日，ICEsoft宣布了其免费但仍是闭源的社区版。几个月后，即2006年11月14日，ICEsoft在MPL许可下完全开源了ICEfaces。当时仍处于闭源状态并由Exadel销售的RichFaces也不会落后太久，大约4个月后，即2007年3月29日，Exadel宣布与Red
    Hat合作，使RichFaces在开源许可下可用，并通过其JBoss集团提供和支持。


    ## 走向成熟


    2007年5月22日，Jakarta Faces 2.0的规范工作开始了。其范围雄心勃勃，不仅承诺修复人们一直抱怨的许多问题，还引入了相当多的新功能。在JSR中提到的众多目标中，有一个从宏观角度来看特别有趣——从Jakarta
    Faces中提取托管Bean设施，并使其对整个平台可用。


    2007年秋季，社区就Jakarta Faces RI的名称进行了投票。四个名字脱颖而出，但正如通常情况那样，这些名字都无法通过Sun法律部门的批准。最终，Mojarra被提出，也许让一些人惊讶的是，这个名字确实通过了法律审查。当时的主要Jakarta
    Faces提交者之一Ryan Lubke于2007年12月5日发布了官方公告。


    不到一年后，即2008年10月29日，Çağatay Çivici启动了一个新库PrimeFaces，作为他之前的YUI4JSF Jakarta Faces组件库的新起点。这个名字来源于Çağatay的昵称Optimus
    Prime，即虚构的变形金刚宇宙中英勇的汽车人领袖。Çivici参与Jakarta Faces开发已有很长时间；大学本科毕业后，他立即开始了一个使用Jakarta
    Faces的军事项目。当时，这是闭源的Sun版本，但Çivici对MyFaces更感兴趣，因为它已经是开源的。在他向该项目提供了几个补丁后，他被邀请成为提交者。Çivici在居住在英国期间曾为Spring
    Source工作，负责Web Flow和Jakarta Faces的集成。最终，Spring Source没有继续推进这项工作，之后Çivici在位于英国雷丁的Visa工作。PrimeFaces的许多代码都是Çivici在从伦敦到雷丁的通勤路上编写的。


    PrimeFaces最初基于Jakarta Faces 1.x，但随着Jakarta Faces 2.x的临近以及该项目还很年轻，它很快转向了Jakarta
    Faces 2.x。


    2009年7月1日，期待已久的Jakarta Faces 2.0终于到来。Jakarta Faces 2.0确实修复了业界对Jakarta Faces几乎所有的抱怨；最终，Facelets被作为默认的视图模板语言包含在内。Jakarta
    Pages被有效弃用。Hookom和Winer在3年多前提出的状态保存问题也得到了解决；从那时起，Jakarta Faces只保存增量状态（状态变更），并且在恢复视图时，组件树从模板重新加载，而不是实际恢复。


    Jakarta Faces社区多年来提出的另一个大问题——Jakarta Faces过度强调回传——也得到了解决；GET请求在Jakarta Faces 2.0中成为了一等公民。Jakarta
    Faces一个众所周知的可用性问题，有时被称为“陷阱”，即对于许多操作，所涉及的数据在原始请求和回传期间必须相同。这在Jakarta Faces 1.x中并不容易保证。Jakarta
    Faces 2.0为此引入了所谓的视图作用域，优雅地解决了这个问题。自定义组件的创建，Jakarta Faces 1.x的另一个问题领域，也变得更加简单。Jakarta
    Faces 2.0还引入了对AJAX的核心支持（其模型借鉴了Ajax4Jsf的工作方式）、资源API、系统事件以及其他一些功能。


    Jakarta Faces 2.0的目标之一——使其托管Bean设施在Jakarta Faces之外可用——通过CDI规范间接实现，该规范与Jakarta
    Faces 2.0一起在Jakarta EE 6中引入。CDI规范本身也有很长的历史，但其定义性特征之一是CDI Bean强烈基于Jakarta Faces托管Bean，并且本质上是这些Bean的超集。'
  raw: 'In the first month of 2006, Jacob Hookom and Adam Winer contemplated the terrible
    implementation of Jakarta Faces’s state save mechanism. This worked by first creating
    a component tree from a template and then, near the end of the request, blindly
    serializing the entire tree with all data that may have been put there during
    the request. During a postback, the tree is restored from this serialized form
    (hence the name of the phase “restore view”). This is a tremendous waste, as the
    majority of this information is already available in the template. Especially
    when doing AJAX requests with client-side state saving, this poses a very big
    burden, but it is also a problem when storing this state on the server as it massively
    increases Jakarta Faces’s memory usage. One of the main reasons for doing state
    saving in such terrible way again has to do with that one decision: to support
    Jakarta Pages. With Jakarta Faces 1.2 about to go final, there was unfortunately
    no time left to fix this for version 1.2.


    Even though it was clear at this point that Facelets was the future of Jakarta
    Faces, when Jakarta Faces 1.2 was eventually released in May 2006, it still contained
    only Jakarta Pages. Not all was bad though. Thanks to a cooperation between the
    Jakarta Faces and Jakarta Pages EGs, a revision of Jakarta Pages was released,
    Jakarta Pages 2.1, which was much better aligned with the demands of Jakarta Faces. On
    top of that, Jakarta Pages’s expression language and Jakarta Faces’s expression
    language were merged. The result was UEL (Unified Expression Language). A very
    practical advantage of UEL is that Jakarta Faces components no longer have to
    convert Strings manually into expressions but directly receive a `ValueExpression`
    from the templating language. Both Jakarta Pages 2.1 and Jakarta Faces 1.2 became
    part of Jakarta EE 5, which was released at the same time.


    On June 13, 2006, the MyFaces community announced that the donated project would
    have its name changed to Trinidad. ADF Faces kept existing at Oracle, though,
    but was based on Trinidad with some extra features (such as support for Portals,
    JSR 227, etc.). Just 2 weeks prior to that, on May 31, 2006, ICEsoft announced
    its free, although still closed source, community edition. A few months later,
    on November 14, 2006, ICEsoft would fully open source ICEfaces under the MPL license.
    RichFaces, still closed source at that point and being sold by Exadel, would not
    stay behind for long though, and some 4 months later, on March 29, 2007, Exadel
    announced a partnership with Red Hat that made RichFaces available under an open
    source license and available and supported via its JBoss group.


    ## On to Maturity


    On May 22, 2007, the specification work for Jakarta Faces 2.0 began. The scope
    was hugely ambitious and promised not only to fix many of the issues that people
    had been complaining about but also to introduce quite a bunch of new features.
    Mentioned among the many goals in the JSR was a particularly interesting one when
    looking at the bigger picture—extracting the managed bean facility from Jakarta
    Faces and making it available for the entire platform.


    During the fall of 2007, the community was polled for a name for the Jakarta Faces
    RI. Four names rose to the top, but as is often the case, none of these names
    could be approved by Sun’s legal department. Eventually, Mojarra was proposed,
    and perhaps to the surprise of some, this one did pass legal’s scrutiny. Ryan
    Lubke, one of the main Jakarta Faces committers then, made the official announcement
    on December 5, 2007.


    A little under a year later, on October 29, 2008, Çağatay Çivici started a new
    library, PrimeFaces as a new start after his older YUI4JSF Jakarta Faces component
    library. The name derives from Çağatay’s nickname, which is Optimus Prime, the
    courageous leader of the heroic autobots in the fictional Transformers universe.
    Çivici had been involved with Jakarta Faces development for a long time; right
    after graduation for his bachelor’s degree at the university, he started working
    on a military project that used Jakarta Faces. At the time, this was the closed
    source Sun version, but Çivici was more interested in MyFaces, since it was already
    open source. After he provided several patches to this project, he was invited
    as a committer. Çivici worked for Spring Source for a time while he lived in the
    UK, working on the Web Flow and Jakarta Faces integration. Ultimately, Spring
    Source didn’t go through with that, after which Çivici worked for Visa, located
    in Reading, United Kingdom. Many pieces of PrimeFaces were coded by Çivici on
    his commute from London to Reading.


    PrimeFaces was initially based on Jakarta Faces 1.x, but with Jakarta Faces 2.x
    looming and the project still young, it would soon after switch to Jakarta Faces
    2.x.


    On July 1, 2009, the long-awaited Jakarta Faces 2.0 finally arrived. Jakarta Faces
    2.0 indeed fixed nearly every problem that the industry had with Jakarta Faces;
    finally, Facelets was included as the default view templating language. Jakarta
    Pages was effectively deprecated. The state saving concerns that Hookom and Winer
    brought forward more than 3 years earlier were addressed as well; from then on,
    Jakarta Faces only saved delta state (state changes), and in restore view, the
    component tree was reloaded from the template, instead of actually restored.


    Another big concern brought forward by the Jakarta Faces community over the years,
    Jakarta Faces’s over-the-top emphasis on postbacks, was addressed too; GET requests
    became a first-class citizen in Jakarta Faces 2.0\. A well-known usability problem
    with Jakarta Faces, sometimes called “The Trap,” was that for a number of operations,
    the data involved needed to be the same during both the original request and the
    postback. This is not entirely trivial to guarantee in Jakarta Faces 1.x. Jakarta
    Faces 2.0 introduced the so-called view scope for this, which elegantly solved
    the problem. The creation of custom components, yet another problem area of Jakarta
    Faces 1.x, was made much simpler as well. Jakarta Faces 2.0 also introduced core
    support for AJAX, modeled after the way Ajax4Jsf worked, a resource API, system
    events, and quite a few other things.


    One of Jakarta Faces 2.0’s goals, making its managed bean facility usable outside
    Jakarta Faces, was implicitly reached by the CDI spec, which was introduced together
    with Jakarta Faces 2.0 in Jakarta EE 6. The CDI spec itself has a long history
    too, but one of its defining characteristics is that CDI Beans are strongly based
    on Jakarta Faces Managed Beans and are essentially a super set of those.'
