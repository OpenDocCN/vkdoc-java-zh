    资源依赖


    在某些情况下，你的自定义组件或渲染器可能依赖于特定的 JavaScript 或样式表资源，而你希望避免最终用户必须通过 `<h:outputScript>`
    或 `<h:outputStylesheet>` 手动引入这些资源。在这种情况下，你会发现 `@jakarta.faces.application.ResourceDependency`
    注解^(⁹⁸) 非常有用。假设你想在某个特定自定义组件中自动包含 `common:scripts/some.js` 和 `common:styles/some.css`，那么你可以按如下方式操作：


