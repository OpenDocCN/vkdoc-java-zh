    \ automatically”选项。否则，当通过实体代码生成向导进行操作时，Eclipse 会自动将实体添加到`persistence.xml`中，或者当我们手动创建一个实体但未将其添加到`persistence.xml`时显示警告。\n\
    \n请注意，目前无需配置数据库连接（用于 Eclipse 内置的数据浏览器），因为我们将使用嵌入式数据库。"
  raw: 'You can already see that by the `pom.xml` file that is marked with an alarming
    red cross and two error messages in the *Markers* view. Any project that has at
    least one such red cross cannot be built and won’t be deployable. One of the error
    messages literally says “web.xml is missing and <failOnMissingWebXml> is set to
    true.” In other words, Maven somehow thinks that it’s still a pre-Jakarta EE 6
    project, when this was indeed disallowed. Another error message says “Could not
    initialize class org.apache.maven.plugin.war.util.WebappStructureSerializer”.
    This is basically caused by incompatibility of the default Maven WAR plug-in version
    with Java 17\. This can be solved by downgrading Java to a lower version, but
    this can also be solved by explicitly setting the default Maven WAR plug-in version
    to a higher version.


    In order to solve this problem and to catch up the Eclipse-generated `pom.xml`
    with the current standards, we need to open `pom.xml` for editing and adjust it
    as shown in the following code:


    ```

    4.0.0

    com.example

    project

    0.0.1-SNAPSHOT

    war


    UTF-8


    UTF-8


    false


    jakarta.platform

    jakarta.jakartaee-api

    10.0.0

    provided


    maven-war-plugin

    3.3.2


    ```


    Once you save this file and right-click on the project and choose *Maven* ➤ *Update
    Project…* ➤ *OK*, then Eclipse will automatically sort it out by itself and clear
    out the alarming red cross on the project. This *Update Project* action will also
    sort out the two pending warnings: “The compiler compliance specified is 1.5 but
    a JRE 17 is used” and “Build path specifies execution environment J2SE-1.5\. There
    are no JREs installed in the workspace that are strictly compatible with this
    environment” based on the updated `pom.xml`. Now that looks much better. We’ll
    briefly go through the most important settings here.


    *   Packaging **war**: This indicates the project is a “web” project and that
    the project’s contents will be assembled into a web archive.


    *   Encoding **UTF-8**: This sets the encoding that the source files are in and
    with which the (reporting) output files should be generated. This makes the build
    repeatable, as it otherwise would default to the system default encoding (again,
    a rather bad default).


    *   Compiler **17**: This sets both the version of Java used in the `.java` source
    files and the byte code output in the `.class` files. Without setting this, Maven
    defaults to the oldest version possible and sometimes even a lower version than
    that.


    *   `failOnMissingWebXml` **false**: Older versions of Jakarta EE required the
    `/WEB-INF/web.xml` to be present. Even though this has not been required anymore
    since Jakarta EE 6, which was released in 2009, Maven still checks for this file
    to be present. Setting this to `false` prevents this unnecessary check.


    *   Dependency **jakarta.platform:jakarta.jakartaee-api:10.0.0 provided**: This
    declares a dependency on the Jakarta EE 10 API and makes sure all the Jakarta
    EE types like `FacesServlet`, `@Named`, and `@Entity` are known to the compiler.
    This dependency is set to `provided`” because those types are already provided
    by the target runtime, which is in our case WildFly. This dependency will then
    only be used to compile the source code against, and the associated JAR files
    won’t be included in the generated WAR file. You need to make absolutely sure
    that any compile time dependency that is already provided by the target runtime
    is set to `provided`; otherwise, it will eventually end up in the generated WAR
    file, and you may run into class loading trouble wherein duplicate different versioned
    libraries are conflicting with one another. In case you’re actually not targeting
    a full-fledged Jakarta EE server but a bare-bones servlet container such as Tomcat,
    then you would need to adjust the dependencies as instructed in the README of
    Mojarra,^([²](#fn2)) one of the available Faces implementations and actually the
    one used under the cover of WildFly.


    *   Plug-in **maven-war-plugin:3.3.2**: This basically overrides the Eclipse built-in
    default version of the Maven WAR plug-in. This entry is *not* necessary if you’re
    not facing the error message “Could not initialize class WebappStructureSerializer”
    in your Eclipse version.


    The next step is basically to instruct Eclipse to generate the deployment descriptor
    files. Right-click the project in *Project Explorer* view and choose *Properties*
    and then open the *Project Facets* section. Update the Servlet API version and
    add the Jakarta Faces and Jakarta Persistence facets. The Servlet API is represented
    by the “Dynamic Web Module” entry. This needs to be set to version `6.0`, which
    matches the Jakarta EE 10 specification. Further, the “Jakarta Faces” and “Jakarta
    Persistence” entries need to be selected and set to versions `4.0` and `3.1`,
    respectively, matching the Jakarta EE 10 specification (see Figure [2-12](#454457_2_En_2_Chapter.xhtml#Fig12)).
    While at it, you also need to double-check if the version of the Java facet is
    indeed `17` or whatever version is set in pom.xml. This value is supposed to be
    automatically updated via the *Update Project* action.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig12_HTML.png)


    Figure 2-12


    The Project Facets section of the project properties with “JavaServer Faces” (Jakarta
    Faces) and “Jakarta Persistence” (Jakarta Persistence) facets enabled (note that
    the Jakarta Servlet API version is represented by “Dynamic Web Module” and that
    the versions in the screenshot are at the time of writing unfortunately outdated)


    Unfortunately, in the latest available Eclipse version at the time of writing
    this chapter, the version 2021-12 (December 2021), these versions weren’t available
    yet in the drop-downs. The highest available versions are Servlet 5.0, Faces 2.3,
    and Persistence 2.2\. This is not a big problem. Its only influence is on the
    available code generators and wizards. We can always manually adjust the Eclipse-generated
    `web.xml`, `faces-config.xml`, and `persistence.xml` files afterward to match
    the Jakarta EE 10`–`compatible versions.


    As you can see in the yellow warning bar near the bottom, Eclipse only requires
    further configuration. This concerns the newly selected Jakarta Faces and Jakarta
    Persistence facets. When clicking the link, we get to see the *Modify Faceted
    Project* wizard (see Figure [2-13](#454457_2_En_2_Chapter.xhtml#Fig13)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig13_HTML.png)


    Figure 2-13


    The Jakarta Persistence Facet configuration


    The first step of the *Modify Faceted Project* wizard allows us to configure the
    Jakarta Persistence facet. We need to make sure that Eclipse is being instructed
    that the Jakarta Persistence implementation is already provided by the target
    runtime and thus Eclipse doesn’t need to include any libraries. This can be achieved
    by choosing the “Disable Library Configuration” option in the *Jakarta Persistence
    implementation* field. As we’re going to use the WildFly-provided Hibernate as
    the actual Jakarta Persistence implementation, which supports automatically discovering
    of `@Entity` annotated classes, we’d like to instruct Eclipse to do the same.
    So choose the “Discover annotated classes automatically” option in *Persistent
    class management* field. Otherwise, Eclipse would automatically add entities to
    the `persistence.xml` when going through the entity code generation wizard or
    show warnings when we create one manually and don’t add it to the `persistence.xml`.


    Note that configuring a database connection (for Eclipse’s built-in data explorer)
    is not necessary for now as we’re going to use an embedded database.'
  trans: '

    您已经可以看到，在 *Markers* 视图中，`pom.xml` 文件被标记了一个醒目的红色叉号和两条错误信息。任何包含至少一个此类红色叉号的项目都无法构建，也无法部署。其中一条错误信息明确写道：“web.xml
    is missing and <failOnMissingWebXml> is set to true.” 换句话说，Maven 不知何故认为这仍然是一个
    Jakarta EE 6 之前的项目，而实际上这已经不被允许了。另一条错误信息是：“Could not initialize class org.apache.maven.plugin.war.util.WebappStructureSerializer”。这基本上是由于默认的
    Maven WAR 插件版本与 Java 17 不兼容造成的。可以通过将 Java 降级到较低版本来解决，但也可以通过显式地将默认的 Maven WAR 插件版本设置为更高版本来解决。


    为了解决这个问题，并使 Eclipse 生成的 `pom.xml` 符合当前标准，我们需要打开 `pom.xml` 进行编辑，并按照以下代码所示进行调整：


    ```

    4.0.0

    com.example

    project

    0.0.1-SNAPSHOT

    war


    UTF-8


    UTF-8


    false


    jakarta.platform

    jakarta.jakartaee-api

    10.0.0

    provided


    maven-war-plugin

    3.3.2


    ```


    保存此文件后，右键单击项目并选择 *Maven* ➤ *Update Project…* ➤ *OK*，Eclipse 就会自动处理，并清除项目上那个醒目的红色叉号。此
    *Update Project* 操作还会根据更新后的 `pom.xml` 解决两个待处理的警告：“The compiler compliance specified
    is 1.5 but a JRE 17 is used” 和 “Build path specifies execution environment J2SE-1.5.
    There are no JREs installed in the workspace that are strictly compatible with
    this environment”。现在看起来好多了。我们将简要介绍这里最重要的设置。


    *   **war** 打包方式：这表明该项目是一个“Web”项目，项目内容将被组装成一个 Web 归档文件。


    *   **UTF-8** 编码：这设置了源文件的编码，以及生成（报告）输出文件时应使用的编码。这使得构建过程可重复，否则它将默认为系统默认编码（同样，这是一个相当糟糕的默认设置）。


    *   **17** 编译器：这同时设置了 `.java` 源文件中使用的 Java 版本和 `.class` 文件中的字节码输出版本。如果不设置此项，Maven
    会默认使用尽可能旧的版本，有时甚至比那个版本还低。


    *   `failOnMissingWebXml` **false**：旧版本的 Jakarta EE 要求必须存在 `/WEB-INF/web.xml`
    文件。尽管自 2009 年发布的 Jakarta EE 6 以来已不再需要此文件，但 Maven 仍然会检查该文件是否存在。将此值设置为 `false` 可以避免这种不必要的检查。


    *   依赖项 **jakarta.platform:jakarta.jakartaee-api:10.0.0 provided**：这声明了对 Jakarta
    EE 10 API 的依赖，并确保编译器能够识别所有 Jakarta EE 类型，例如 `FacesServlet`、`@Named` 和 `@Entity`。此依赖项被设置为
    `provided`，因为这些类型已由目标运行时（在我们的例子中是 WildFly）提供。因此，此依赖项将仅用于编译源代码，相关的 JAR 文件不会包含在生成的
    WAR 文件中。您必须绝对确保任何由目标运行时提供的编译时依赖项都被设置为 `provided`；否则，它最终会出现在生成的 WAR 文件中，您可能会遇到类加载问题，导致不同版本的重复库相互冲突。如果您实际的目标不是完整的
    Jakarta EE 服务器，而是像 Tomcat 这样的精简 Servlet 容器，那么您需要按照 Mojarra（一种可用的 Faces 实现，实际上也是
    WildFly 底层使用的实现）的 README 中的说明调整依赖项。^(²)


    *   插件 **maven-war-plugin:3.3.2**：这基本上覆盖了 Eclipse 内置的默认 Maven WAR 插件版本。如果您在 Eclipse
    版本中没有遇到“Could not initialize class WebappStructureSerializer”错误信息，则*不*需要此条目。


    下一步基本上是指导 Eclipse 生成部署描述符文件。在 *Project Explorer* 视图中右键单击项目，选择 *Properties*，然后打开
    *Project Facets* 部分。更新 Servlet API 版本，并添加 Jakarta Faces 和 Jakarta Persistence
    模块。Servlet API 由“Dynamic Web Module”条目表示。需要将其设置为版本 `6.0`，这与 Jakarta EE 10 规范相匹配。此外，需要选择“Jakarta
    Faces”和“Jakarta Persistence”条目，并分别设置为版本 `4.0` 和 `3.1`，以匹配 Jakarta EE 10 规范（参见图
    2-12）。同时，您还需要仔细检查 Java 模块的版本是否确实是 `17` 或 pom.xml 中设置的任何版本。该值应该通过 *Update Project*
    操作自动更新。


    ![](img/454457_2_En_2_Fig12_HTML.png)


    图 2-12


    项目属性的 Project Facets 部分，启用了“JavaServer Faces”（Jakarta Faces）和“Jakarta Persistence”（Jakarta
    Persistence）模块（请注意，Jakarta Servlet API 版本由“Dynamic Web Module”表示，并且截图中的版本在撰写本文时已过时）


    不幸的是，在撰写本章时可用的最新 Eclipse 版本（2021-12 版，即 2021 年 12 月）中，这些版本在下拉菜单中尚不可用。可用的最高版本是
    Servlet 5.0、Faces 2.3 和 Persistence 2.2。这不是一个大问题。它唯一影响的是可用的代码生成器和向导。我们之后可以手动调整
    Eclipse 生成的 `web.xml`、`faces-config.xml` 和 `persistence.xml` 文件，使其符合 Jakarta EE
    10 兼容版本。


    正如您在底部附近的黄色警告栏中看到的，Eclipse 只需要进一步配置。这涉及到新选择的 Jakarta Faces 和 Jakarta Persistence
    模块。单击该链接后，我们将看到 *Modify Faceted Project* 向导（参见图 2-13）。


    ![](img/454457_2_En_2_Fig13_HTML.png)


    图 2-13


    Jakarta Persistence 模块配置


    *Modify Faceted Project* 向导的第一步允许我们配置 Jakarta Persistence 模块。我们需要确保指示 Eclipse，Jakarta
    Persistence 实现已由目标运行时提供，因此 Eclipse 不需要包含任何库。这可以通过在 *Jakarta Persistence implementation*
    字段中选择“Disable Library Configuration”选项来实现。由于我们将使用 WildFly 提供的 Hibernate 作为实际的
    Jakarta Persistence 实现，它支持自动发现带有 `@Entity` 注解的类，我们希望指示 Eclipse 也这样做。因此，请在 *Persistent
    class management* 字段中选择“Discover annotated classes automatically”选项。否则，当通过实体代码生成向导进行操作时，Eclipse
    会自动将实体添加到 `persistence.xml` 中，或者当我们手动创建一个实体但未将其添加到 `persistence.xml` 时显示警告。


    请注意，目前无需配置数据库连接（用于 Eclipse 内置的数据浏览器），因为我们将使用嵌入式数据库。

    '
- fmt: "在 *Modify Faceted Project* 向导的下一步中，我们可以配置 Jakarta Faces 功能（见图 [2-14](#454457_2_En_2_Chapter.xhtml#Fig14)）。同样，我们需要确保\
    \ Eclipse 被指示 Jakarta Faces 实现已由目标运行时提供，因此 Eclipse 不需要包含任何库。这可以通过在 *Jakarta Faces\
    \ Implementation Library* 字段中选择“Disable Library Configuration”选项来实现。\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig14_HTML.png)\n\
    \n图 2-14 Jakarta Faces Capabilities 配置\n\n此外，我们需要重命名 `FacesServlet` 的 Servlet\
    \ 名称，以匹配虚构的实例变量名：`facesServlet`。最后但同样重要的是，我们需要将 URL 映射模式从古老的 `/faces/*` 更改为现代的\
    \ `*.xhtml`。\n\n实际上，自 Jakarta Faces 2.2 版本起，在 `web.xml` 中注册 `FacesServlet` 已不再是严格必需的；你甚至可以取消选中\
    \ *Configure Jakarta Faces servlet in deployment descriptor* 选项，并依赖默认的自动注册映射 `/faces/*`、`*.faces`、`*.jsf`\
    \ 和 `*.xhtml`。然而，由于这允许最终用户甚至搜索引擎爬虫通过不同的 URL 打开同一个 Jakarta Faces 页面，从而在用户中造成混淆，并在搜索引擎爬虫中导致潜在的重复内容惩罚，我们最好限制为仅使用一个显式配置的\
    \ URL 模式 `*.xhtml`。\n\n现在，完成并应用所有向导和对话框。不幸的是，当前 Eclipse 版本的 Jakarta Persistence\
    \ 插件仅将生成的 `persistence.xml` 放置在错误的位置。它似乎没有意识到该项目是一个 Maven 项目，并且该插件盲目地将生成的 `persistence.xml`\
    \ 文件放入 `src/main/java/META-INF` 文件夹，就好像它是一个普通的 vanilla 项目一样。这是错误的。你需要手动将其移动到 `src/main/resources/META-INF`，以符合\
    \ Maven 项目的规则。图 [2-15](#454457_2_En_2_Chapter.xhtml#Fig15) 展示了工作台现在的样子。\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig15_HTML.png)\n\
    \n图 2-15 在 Eclipse 中正确配置的 Jakarta EE 10 Maven 项目\n\n## 调整部署描述符\n\n我们只需要调整所有部署描述符，以匹配实际使用的\
    \ Servlet、Faces、Persistence 和 CDI 版本。这通常通过调整部署描述符 XML 文件的根元素来设置所需的 XML 模式和版本。\n\
    \n你可以在 [`https://jakarta.ee/xml/ns/jakartaee/`](https://jakarta.ee/xml/ns/jakartaee/)\
    \ 找到所有 Jakarta EE 10 XML 模式，这是一个实际的网页。你可以通过在 Eclipse 项目资源管理器中双击部署描述符 XML 文件，然后在编辑器中选择\
    \ *Source* 选项卡来打开它进行编辑。Jakarta EE 10 兼容部署描述符的正确根元素声明如下。\n\n1.  **`src/main/webapp/WEB-INF/web.xml`**\
    \ **用于 Servlet 6.0：**\n\n    确保我们在 *Modify Faceted Project* 向导中创建的 `jakarta.faces.webapp.FacesServlet`\
    \ 确实存在，并且确实映射到 `*.xhtml` 的 URL 模式。\n\n2.  **`src/main/webapp/WEB-INF/faces-config.xml`**\
    \ **用于 Faces 4.0：**\n\n    目前，它确实是空的。\n\n3.  **`src/main/resources/META-INF/persistence.xml`**\
    \ **用于 Persistence 3.1：**\n\n    目前，它确实只包含默认的持久化单元。我们稍后会重新配置它。只有当前可用的 Eclipse\
    \ Jakarta Persistence 插件可能会对此显示错误，例如“The persistence.xml file does not have recognized\
    \ content.”。你可以通过在项目属性中禁用 Jakarta Persistence 验证器来忽略此错误，或者你也可以暂时回退到最初生成的 `persistence.xml`\
    \ 文件。\n\n4.  **`src/main/webapp/WEB-INF/beans.xml`** **用于 CDI 4.0**\n\n最后，为了完整性，我们需要再创建一个部署描述符文件，即用于\
    \ CDI 4.0 的文件。这不是自动生成的，因为它不是必需的。CDI 在任何 Jakarta EE 兼容的 Web 应用程序中默认始终启用。它甚至是 Jakarta\
    \ Faces 正常运行所必需的。\n\n右键单击项目的 `/WEB-INF` 文件夹，然后选择 *New* ➤ *File*。将其命名为 `beans.xml`。按如下方式填充新文件：\n\
    \n请注意，`bean-discovery-mode` 设置为 `annotated`。这是默认值。另一个值是 `all`。这稍微更具侵入性且开销更大，因为它会将**任何**\
    \ Java 类视为潜在的 CDI bean。\n\n### 配置 Jakarta Faces\n\nJakarta Faces 有许多可通过 `web.xml`\
    \ 中的 `<context-param>` 条目进行配置的设置。默认配置足以开始使用，但有一个特殊的设置我们确实希望从一开始就设置好。该设置指示 Jakarta\
    \ Faces 是否将提交的空字符串值解释为模型中的 `null`。由于 HTML 和 Jakarta Servlets 的特性，空输入字段默认情况下会在模型中设置为空字符串。这通常是不希望的，我们更希望将它们保留为\
    \ `null`。这对于诸如 Jakarta Bean Validation 中的 `@NotNull` 和关系数据库中的 `NOT NULL` 等验证约束非常重要。\n\
    \n可以通过向 `web.xml` 添加以下部分来实现此设置：\n\n```\n<context-param>\n    <param-name>jakarta.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL</param-name>\n\
    \    <param-value>true</param-value>\n</context-param>\n```"
  raw: "In the next step of the *Modify Faceted Project* wizard, we can configure\
    \ the Jakarta Faces capabilities (see Figure [2-14](#454457_2_En_2_Chapter.xhtml#Fig14)).\
    \ Also here, we need to make sure that Eclipse is being instructed that the Jakarta\
    \ Faces implementation is already provided by the target runtime and thus Eclipse\
    \ doesn’t need to include any libraries. This can be achieved by choosing the\
    \ “Disable Library Configuration” option in the *Jakarta Faces Implementation\
    \ Library* field.\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig14_HTML.png)\n\
    \nFigure 2-14\n\nThe Jakarta Faces Capabilities configuration\n\nFurther, we need\
    \ to rename the servlet name of the `FacesServlet` to match the fictive instance\
    \ variable name: `facesServlet`. Last but not least, we need to change the URL\
    \ mapping pattern from the Jurassic `/faces/*` to the modern `*.xhtml`.\n\nActually,\
    \ the entire registration of the `FacesServlet` in `web.xml` is, since Jakarta\
    \ Faces version 2.2, not strictly necessary anymore; you could even uncheck the\
    \ *Configure Jakarta Faces servlet in deployment descriptor* option and rely on\
    \ the default auto-registered mappings of `/faces/*`, `*.faces`, `*.jsf`, and\
    \ `*.xhtml`. However, as this allows end users and even search bots to open the\
    \ very same Jakarta Faces page by different URLs and thus causes confusion among\
    \ end users and potential duplicate content penalties among search bots, we’d\
    \ better restrict to only one explicitly configured URL pattern of `*.xhtml`.\n\
    \nNow, finish and apply all the wizards and dialogs. Unfortunately, the Jakarta\
    \ Persistence plug-in of the current Eclipse version only puts the generated `persistence.xml`\
    \ in the wrong place. It’s seemingly not being aware of the project being a Maven\
    \ project, and the plug-in blindly puts the generated `persistence.xml` file in\
    \ the `src/main/java/META-INF` folder as if it were a plain vanilla project. This\
    \ is wrong. You need to manually move it into `src/main/resources/META-INF` to\
    \ conform to the rules of a Maven project. Figure [2-15](#454457_2_En_2_Chapter.xhtml#Fig15)\
    \ shows us how the workbench looks now.\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig15_HTML.png)\n\
    \nFigure 2-15\n\nCorrectly configured Jakarta EE 10 Maven project in Eclipse\n\
    \n## Adjusting Deployment Descriptors\n\nWe only need to adjust all the deployment\
    \ descriptors to catch up to the actually used Servlet, Faces, Persistence, and\
    \ CDI versions. This is normally done by adjusting the root element of the deployment\
    \ descriptor XML file to set the desired XML schemas and the version.\n\nYou can\
    \ find all Jakarta EE 10 XML schemas at [`https://jakarta.ee/xml/ns/jakartaee/`](https://jakarta.ee/xml/ns/jakartaee/),\
    \ which is an actual web page. You can open the deployment descriptor XML file\
    \ for editing by double-clicking it in the Eclipse project explorer and then selecting\
    \ the *Source* tab in the editor. The correct root element declarations for Jakarta\
    \ EE 10`–`compatible deployment descriptors are thus as follows.\n\n1.  **src/main/webapp/WEB-INF/web.xml**\
    \ **for Servlet 6.0:**\n\n    Make sure that the `jakarta.faces.webapp.FacesServlet`\
    \ as we created in the *Modify Faceted Project* wizard is indeed there and that\
    \ it’s indeed mapped on a URL pattern of `*.xhtml`.\n\n2.  **src/main/webapp/WEB-INF/faces-config.xml**\
    \ **for Faces 4.0:**\n\n    As of now, it’s indeed empty.\n\n3.  **src/main/resources/META-INF/persistence.xml**\
    \ **for Persistence 3.1:**\n\n    As of now, it indeed only contains the default\
    \ persistence unit. We’ll reconfigure it later on. Only the currently available\
    \ Jakarta Persistence plug-in of Eclipse might show an error on this like “The\
    \ persistence.xml file does not have recognized content.” You could ignore this\
    \ by disabling the Jakarta Persistence validator in the project’s properties,\
    \ but you can also just step back to the originally generated `persistence.xml`\
    \ file for the time being.\n\n4.  **src/main/webapp/WEB-INF/beans.xml** **for\
    \ CDI 4.0**\n\nFinally, for the sake of completeness, we need to create one more\
    \ deployment descriptor file, the one for CDI 4.0\\. This isn’t automatically\
    \ generated as it’s not required. CDI is by default always enabled in any Jakarta\
    \ EE`–`compatible web application. It’s even mandatory for the functioning of\
    \ Jakarta Faces.\n\nRight-click the `/WEB-INF` folder of the project and choose\
    \ *New* ➤ *File*. Give it the name *beans.xml*. Populate the new file as follows:\n\
    \nNote that the `bean-discovery-mode` is set to `annotated`. This is the default\
    \ value. The other value is `all`. This is slightly more intrusive and expensive\
    \ as it will consider **any** Java class as a potential CDI bean.\n\n### Configuring\
    \ Jakarta Faces\n\nJakarta Faces has a lot of settings available that can be configured\
    \ via `<context-param>` entries in `web.xml`. The default configuration is okay\
    \ to start with, but there’s one peculiar setting that we really want to set right\
    \ from the beginning on. It’s the setting that instructs Jakarta Faces whether\
    \ to interpret empty string submitted values as `null` in the model. Due to the\
    \ nature of HTML and Jakarta Servlets, empty input fields will by default be set\
    \ as empty strings in the model. This is more than often undesirable, and we’d\
    \ rather like to keep them `null`. This is very significant as to validation constraints\
    \ such as `@NotNull` in Jakarta Bean Validation and `NOT NULL` in relational databases.\n\
    \nThis setting can be achieved by adding the following section to the `web.xml`:\n\
    \n```\n\njakarta.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL\n\ntrue\n\
    \n```"
  trans: "\n在*修改分面项目*向导的下一步中，我们可以配置 Jakarta Faces 功能（见图 2-14）。同样，这里需要确保 Eclipse 被告知\
    \ Jakarta Faces 实现已由目标运行时提供，因此 Eclipse 无需包含任何库。这可以通过在 *Jakarta Faces 实现库*字段中选择“禁用库配置”选项来实现。\n\
    \n![](img/454457_2_En_2_Fig14_HTML.png)\n\n图 2-14\n\nJakarta Faces 功能配置\n\n此外，我们需要重命名\
    \ `FacesServlet` 的 Servlet 名称，以匹配虚构的实例变量名：`facesServlet`。最后但同样重要的是，我们需要将 URL 映射模式从老式的\
    \ `/faces/*` 改为现代的 `*.xhtml`。\n\n实际上，自 Jakarta Faces 2.2 版本起，在 `web.xml` 中注册 `FacesServlet`\
    \ 已不再是严格必需的；你甚至可以取消勾选*在部署描述符中配置 Jakarta Faces servlet* 选项，并依赖默认的自动注册映射 `/faces/*`、`*.faces`、`*.jsf`\
    \ 和 `*.xhtml`。然而，由于这允许最终用户甚至搜索引擎爬虫通过不同的 URL 打开同一个 Jakarta Faces 页面，从而在用户中造成混淆，并可能因重复内容而受到搜索引擎的惩罚，我们最好只限制使用一个明确配置的\
    \ URL 模式 `*.xhtml`。\n\n现在，完成并应用所有向导和对话框。不幸的是，当前 Eclipse 版本的 Jakarta Persistence\
    \ 插件只会将生成的 `persistence.xml` 放在错误的位置。它似乎没有意识到该项目是一个 Maven 项目，而是盲目地将生成的 `persistence.xml`\
    \ 文件放入 `src/main/java/META-INF` 文件夹，仿佛它是一个普通的纯 Java 项目。这是错误的。你需要手动将其移动到 `src/main/resources/META-INF`，以符合\
    \ Maven 项目的规则。图 2-15 展示了工作台现在的样子。\n\n![](img/454457_2_En_2_Fig15_HTML.png)\n\n\
    图 2-15\n\n在 Eclipse 中正确配置的 Jakarta EE 10 Maven 项目\n\n## 调整部署描述符\n\n我们只需要调整所有部署描述符，使其与实际使用的\
    \ Servlet、Faces、Persistence 和 CDI 版本保持一致。这通常通过调整部署描述符 XML 文件的根元素来设置所需的 XML 模式和版本。\n\
    \n你可以在 [`https://jakarta.ee/xml/ns/jakartaee/`](https://jakarta.ee/xml/ns/jakartaee/)\
    \ 找到所有 Jakarta EE 10 XML 模式，这是一个实际的网页。你可以通过在 Eclipse 项目资源管理器中双击部署描述符 XML 文件，然后在编辑器中选择*源*选项卡来打开它进行编辑。Jakarta\
    \ EE 10 兼容部署描述符的正确根元素声明如下。\n\n1.  **src/main/webapp/WEB-INF/web.xml** **用于 Servlet\
    \ 6.0：**\n\n    确保我们在*修改分面项目*向导中创建的 `jakarta.faces.webapp.FacesServlet` 确实存在，并且确实映射到了\
    \ `*.xhtml` 的 URL 模式。\n\n2.  **src/main/webapp/WEB-INF/faces-config.xml** **用于\
    \ Faces 4.0：**\n\n    目前，它确实是空的。\n\n3.  **src/main/resources/META-INF/persistence.xml**\
    \ **用于 Persistence 3.1：**\n\n    目前，它确实只包含默认的持久化单元。我们稍后会重新配置它。只有当前可用的 Eclipse\
    \ Jakarta Persistence 插件可能会对此显示错误，例如“persistence.xml 文件没有可识别的内容”。你可以通过在项目属性中禁用\
    \ Jakarta Persistence 验证器来忽略此错误，或者你也可以暂时回退到最初生成的 `persistence.xml` 文件。\n\n4. \
    \ **src/main/webapp/WEB-INF/beans.xml** **用于 CDI 4.0**\n\n最后，为了完整性，我们需要再创建一个部署描述符文件，即用于\
    \ CDI 4.0 的文件。这个文件不会自动生成，因为它不是必需的。CDI 在任何 Jakarta EE 兼容的 Web 应用程序中默认始终启用。它甚至是\
    \ Jakarta Faces 正常运行所必需的。\n\n右键单击项目的 `/WEB-INF` 文件夹，然后选择*新建* ➤ *文件*。将其命名为 *beans.xml*。按如下方式填充新文件：\n\
    \n请注意，`bean-discovery-mode` 设置为 `annotated`。这是默认值。另一个值是 `all`。这稍微更具侵入性且开销更大，因为它会将**任何**\
    \ Java 类都视为潜在的 CDI bean。\n\n### 配置 Jakarta Faces\n\nJakarta Faces 有许多可通过 `web.xml`\
    \ 中的 `<context-param>` 条目进行配置的设置。默认配置足以入门，但有一个特殊设置我们确实希望从一开始就设置好。该设置指示 Jakarta\
    \ Faces 是否将提交的空字符串值解释为模型中的 `null`。由于 HTML 和 Jakarta Servlets 的特性，空输入字段默认会在模型中设置为空字符串。这通常是不希望的，我们更希望将它们保留为\
    \ `null`。这对于验证约束（例如 Jakarta Bean Validation 中的 `@NotNull` 和关系数据库中的 `NOT NULL`）非常重要。\n\
    \n可以通过将以下部分添加到 `web.xml` 来实现此设置：\n\n```\n\njakarta.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL\n\
    \ntrue\n\n```\n"
- fmt: "### Creating the Backing Bean Class\n\nWith the project now correctly configured,\
    \ we can start with developing the actual MVC application. The *Controller* part\
    \ of MVC is already configured as `FacesServlet` in `web.xml`. The *Model* part\
    \ of MVC is what we’re going to create now. It’s basically just a simple Java\
    \ class that is by Jakarta Faces convention called a *Backing Bean* since it “backs”\
    \ a *View*.\n\nRight-click the `src/main/java` folder of the project and choose\
    \ *New* ➤ *Class*. The *New Java Class* wizard will now appear (see Figure [2-16](#454457_2_En_2_Chapter.xhtml#Fig16)).\
    \ In this wizard, set the *Package* to `com.example.project.view`, and set the\
    \ *Name* to `HelloWorld`. The rest of the fields can be kept default or empty.\n\
    \n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig16_HTML.jpg)\n\nFigure 2-16\n\
    \nNew Java Class wizard in Eclipse\n\nThe class editor will now open with the\
    \ newly created backing bean class. We’ll modify it to add CDI `@Named` and `@RequestScoped`\
    \ annotations on the class so that it becomes a CDI managed bean. And we need\
    \ to add two properties, `input` and `output`, and accompany the `input` property\
    \ with a getter and setter pair, the `output` property with only a getter, so\
    \ that these can be referenced from the view. Finally, we’ll add a `submit()`\
    \ action method that prepares the `output` property based on the `input` property\
    \ so that this can be invoked from the view.\n\nAs a hint, in Eclipse after entering\
    \ the properties, you can right-click anywhere in the class editor and choose\
    \ *Source* ➤ *Generate Getters and Setters* to have the IDE to generate them.\
    \ In its entirety, the edited backing bean class should look as follows:\n\n```\n\
    package com.example.project.view;\nimport jakarta.enterprise.context.RequestScoped;\n\
    import jakarta.inject.Named;\n@Named @RequestScoped\npublic class HelloWorld {\n\
    private String input;\nprivate String output;\npublic void submit() {\noutput\
    \ = \"Hello World! You have typed: \" + input;\n}\npublic String getInput() {\n\
    return input;\n}\npublic void setInput(String input) {\nthis.input = input;\n\
    }\npublic String getOutput() {\nreturn output;\n}\n}\n```\n\nWe’ll briefly go\
    \ through the annotations that are used here.\n\n- **@Named**: This gives the\
    \ bean a name, which is primarily used to reference it via EL in the view. Without\
    \ any attributes, this name defaults to the simple class name with the first letter\
    \ in lowercase, thus “`helloWorld`” here. It will be available by `#{helloWorld}`\
    \ in EL. This can be used in Jakarta Faces pages.\n\n- **@RequestScoped**: This\
    \ gives the bean a scope, which means the same instance of the bean is used throughout\
    \ the given life span. In the case of `@RequestScoped`, that life span is the\
    \ duration of an HTTP request. When the scope ends, then the bean is automatically\
    \ destroyed. You can read more about scopes in Chapter [8](#454457_2_En_8_Chapter.xhtml).\n\
    \n### Creating the Facelets File\n\nNext, we’ll create the *View* part of MVC.\
    \ It’s basically just an XHTML file that is by Jakarta Faces interpreted as a\
    \ *Facelets file* or just “Facelet.” When the `FacesServlet` is invoked with a\
    \ URL matching the path of this Facelets file, then Jakarta Faces will ultimately\
    \ parse it and generate the HTML markup that is sent to the browser as a response\
    \ to the request. With help of EL, it can reference a bean property and invoke\
    \ a bean action.\n\nRight-click the `webapp` folder of the project and choose\
    \ *New* ➤ *File* (see Figure [2-17](#454457_2_En_2_Chapter.xhtml#Fig17)). Give\
    \ it the name `hello.xhtml`.\n\n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig17_HTML.jpg)\n\
    \nFigure 2-17\n\nCreate New File wizard in Eclipse\n\nThe HTML editor will now\
    \ open with the newly created Facelets file. It’s initially empty. Fill it with\
    \ the following content:\n\n```\n<!DOCTYPE html>\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n      xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    >\n<h:head>\n    <title>Hello World</title>\n</h:head>\n<h:body>\n    <h:form>\n\
    \        <h:outputLabel for=\"input\" value=\"Input:\" />\n        <h:inputText\
    \ id=\"input\" value=\"#{helloWorld.input}\" />\n        <h:commandButton value=\"\
    Submit\" action=\"#{helloWorld.submit}\">\n            <f:ajax execute=\"@form\"\
    \ render=\":output\" />\n        </h:commandButton>\n        <h:outputText id=\"\
    output\" value=\"#{helloWorld.output}\" />\n    </h:form>\n</h:body>\n</html>\n\
    ```\n\nWe’ll briefly go through the Jakarta Faces–specific XHTML tags that are\
    \ used here.\n\n- **<h:head>**: This generates the HTML `<head>` element. It gives\
    \ Jakarta Faces the opportunity to automatically include any necessary JavaScript\
    \ files, such as the one containing the necessary logic for `<f:ajax>`.\n\n- **<h:body>**:\
    \ This generates the HTML `<body>` element. You can also use a plain HTML `<body>`\
    \ in this specific Facelet, but then it doesn’t give any other Jakarta Faces tag\
    \ the opportunity to automatically include any necessary JavaScript in the end\
    \ of the HTML `<body>`.\n\n- **<h:form>**: This generates the HTML `<form>` element.\
    \ Jakarta Faces will automatically include the so-called view state in a hidden\
    \ input field within the form.\n\n- **<h:outputLabel>**: This generates the HTML\
    \ `<label>` element. You can also use a plain HTML `<label>` in this specific\
    \ Facelet, but then you’d have to manually take care of figuring out the actual\
    \ ID of the target input element.\n\n- **<h:inputText>**: This generates the HTML\
    \ `<input type=\"text\">` element. Jakarta Faces will automatically get and set\
    \ the value in the bean property specified in the `value` attribute.\n\n- **<h:commandButton>**:\
    \ This generates the HTML `<input type=\"submit\">`. Jakarta Faces will automatically\
    \ invoke the bean method specified in the `action` attribute.\n\n- **<f:ajax>**:\
    \ This generates the necessary JavaScript code to enable Ajax behavior of the\
    \ tag it is being nested in, in this case, the `<h:commandButton>`. You can also\
    \ do as good without it, but then the form submit won’t be performed asynchronously.\
    \ The `execute` attribute of `@form` indicates that the entire `<h:form>` where\
    \ it is sitting in must be processed on submit, and the `render` attribute of\
    \ `:output` indicates that the tag identified by `id=\"output\"` must be automatically\
    \ updated on completion of the Ajax submit.\n\n- **<h:outputText>**: This generates\
    \ the HTML `<span>` element. This is the one being updated on completion of the\
    \ Ajax submit. It will merely print the bean property specified in the `value`\
    \ attribute.\n\nThose Jakarta Faces–specific XHTML tags are also called *Jakarta\
    \ Faces Components*. There will be more on Facelets files and Jakarta Faces components\
    \ in the upcoming chapters. Note that you can also perfectly embed plain vanilla\
    \ HTML in a Facelets file. Jakarta Faces components should only be used when the\
    \ functionality requires so or is more easily achievable with them."
  raw: '### Creating the Backing Bean Class


    With the project now correctly configured, we can start with developing the actual
    MVC application. The *Controller* part of MVC is already configured as `FacesServlet`
    in `web.xml`. The *Model* part of MVC is what we’re going to create now. It’s
    basically just a simple Java class that is by Jakarta Faces convention called
    a *Backing Bean* since it “backs” a *View*.


    Right-click the `src/main/java` folder of the project and choose *New* ➤ *Class*.
    The *New Java Class* wizard will now appear (see Figure [2-16](#454457_2_En_2_Chapter.xhtml#Fig16)).
    In this wizard, set the *Package* to `com.example.project.view`, and set the *Name*
    to `HelloWorld`. The rest of the fields can be kept default or empty.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig16_HTML.jpg)


    Figure 2-16


    New Java Class wizard in Eclipse


    The class editor will now open with the newly created backing bean class. We’ll
    modify it to add CDI `@Named` and `@RequestScoped` annotations on the class so
    that it becomes a CDI managed bean. And we need to add two properties, `input`
    and `output`, and accompany the `input` property with a getter and setter pair,
    the `output` property with only a getter, so that these can be referenced from
    the view. Finally, we’ll add a `submit()` action method that prepares the `output`
    property based on the `input` property so that this can be invoked from the view.


    As a hint, in Eclipse after entering the properties, you can right-click anywhere
    in the class editor and choose *Source* ➤ *Generate Getters and Setters* to have
    the IDE to generate them. In its entirety, the edited backing bean class should
    look as follows:


    ```

    package com.example.project.view;

    import jakarta.enterprise.context.RequestScoped;

    import jakarta.inject.Named;

    @Named @RequestScoped

    public class HelloWorld {

    private String input;

    private String output;

    public void submit() {

    output = "Hello World! You have typed: " + input;

    }

    public String getInput() {

    return input;

    }

    public void setInput(String input) {

    this.input = input;

    }

    public String getOutput() {

    return output;

    }

    }

    ```


    We’ll briefly go through the annotations that are used here.


    *   **@Named**: This gives the bean a name, which is primarily used to reference
    it via EL in the view. Without any attributes, this name defaults to the simple
    class name with the first letter in lowercase, thus “`helloWorld`” here. It will
    be available by `#{helloWorld}` in EL. This can be used in Jakarta Faces pages.


    *   **@RequestScoped**: This gives the bean a scope, which means the same instance
    of the bean is used throughout the given life span. In the case of `@RequestScoped`,
    that life span is the duration of an HTTP request. When the scope ends, then the
    bean is automatically destroyed. You can read more about scopes in Chapter [8](#454457_2_En_8_Chapter.xhtml).


    ### Creating the Facelets File


    Next, we’ll create the *View* part of MVC. It’s basically just an XHTML file that
    is by Jakarta Faces interpreted as a *Facelets file* or just “Facelet.” When the
    FacesServlet is invoked with a URL matching the path of this Facelets file, then
    Jakarta Faces will ultimately parse it and generate the HTML markup that is sent
    to the browser as a response to the request. With help of EL, it can reference
    a bean property and invoke a bean action.


    Right-click the `webapp` folder of the project and choose *New* ➤ *File* (see
    Figure [2-17](#454457_2_En_2_Chapter.xhtml#Fig17)). Give it the name `hello.xhtml`.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig17_HTML.jpg)


    Figure 2-17


    Create New File wizard in Eclipse


    The HTML editor will now open with the newly created Facelets file. It’s initially
    empty. Fill it with the following content:


    ```


    Hello World


    Hello World


    ```


    We’ll briefly go through the Jakarta Faces`–`specific XHTML tags that are used
    here.


    *   **<h:head>**: This generates the HTML `<head>` element. It gives Jakarta Faces
    the opportunity to automatically include any necessary JavaScript files, such
    as the one containing the necessary logic for `<f:ajax>`.


    *   **<h:body>**: This generates the HTML `<body>` element. You can also use a
    plain HTML `<body>` in this specific Facelet, but then it doesn’t give any other
    Jakarta Faces tag the opportunity to automatically include any necessary JavaScript
    in the end of the HTML `<body>`.


    *   **<h:form>**: This generates the HTML `<form>` element. Jakarta Faces will
    automatically include the so-called view state in a hidden input field within
    the form.


    *   **<h:outputLabel>**: This generates the HTML `<label>` element. You can also
    use a plain HTML `<label>` in this specific Facelet, but then you’d have to manually
    take care of figuring out the actual ID of the target input element.


    *   **<h:inputText>**: This generates the HTML `<input type="text">` element.
    Jakarta Faces will automatically get and set the value in the bean property specified
    in the `value` attribute.


    *   **<h:commandButton>**: This generates the HTML `<input type="submit">`. Jakarta
    Faces will automatically invoke the bean method specified in the `action` attribute.


    *   **<f:ajax>**: This generates the necessary JavaScript code to enable Ajax
    behavior of the tag it is being nested in, in this case, the `<h:commandButton>`.
    You can also do as good without it, but then the form submit won’t be performed
    asynchronously. The `execute` attribute of `@form` indicates that the entire `<h:form>`
    where it is sitting in must be processed on submit, and the `render` attribute
    of `:output` indicates that the tag identified by `id="output"` must be automatically
    updated on completion of the Ajax submit.


    *   **<h:outputText>**: This generates the HTML `<span>` element. This is the
    one being updated on completion of the Ajax submit. It will merely print the bean
    property specified in the `value` attribute.


    Those Jakarta Faces`–`specific XHTML tags are also called *Jakarta Faces Components*.
    There will be more on Facelets files and Jakarta Faces components in the upcoming
    chapters. Note that you can also perfectly embed plain vanilla HTML in a Facelets
    file. Jakarta Faces components should only be used when the functionality requires
    so or is more easily achievable with them.'
  trans: '

    ### 创建支持 Bean 类


    项目配置正确后，我们就可以开始开发实际的 MVC 应用程序了。MVC 的*控制器*部分已在 `web.xml` 中配置为 `FacesServlet`。我们现在要创建的是
    MVC 的*模型*部分。它本质上只是一个简单的 Java 类，按照 Jakarta Faces 的惯例，它被称为*支持 Bean*，因为它“支持”*视图*。


    右键点击项目的 `src/main/java` 文件夹，选择 *新建* ➤ *类*。此时将出现*新建 Java 类向导*（见图 2-16）。在此向导中，将*包*设置为
    `com.example.project.view`，并将*名称*设置为 `HelloWorld`。其余字段可以保持默认或留空。


    ![](img/454457_2_En_2_Fig16_HTML.jpg)


    图 2-16


    Eclipse 中的新建 Java 类向导


    类编辑器将打开，其中包含新创建的支持 Bean 类。我们将对其进行修改，在类上添加 CDI `@Named` 和 `@RequestScoped` 注解，使其成为
    CDI 托管 Bean。并且我们需要添加两个属性 `input` 和 `output`，为 `input` 属性配备 getter 和 setter 方法对，为
    `output` 属性仅配备 getter 方法，以便可以从视图中引用它们。最后，我们将添加一个 `submit()` 操作方法，该方法根据 `input`
    属性准备 `output` 属性，以便可以从视图中调用它。


    提示：在 Eclipse 中输入属性后，你可以右键点击类编辑器中的任意位置，选择*源代码* ➤ *生成 Getter 和 Setter*，让 IDE 生成它们。完整的编辑后的支持
    Bean 类应如下所示：


    ```

    package com.example.project.view;

    import jakarta.enterprise.context.RequestScoped;

    import jakarta.inject.Named;

    @Named @RequestScoped

    public class HelloWorld {

    private String input;

    private String output;

    public void submit() {

    output = "Hello World! You have typed: " + input;

    }

    public String getInput() {

    return input;

    }

    public void setInput(String input) {

    this.input = input;

    }

    public String getOutput() {

    return output;

    }

    }

    ```


    我们将简要介绍这里使用的注解。


    *   **@Named**：这为 Bean 提供了一个名称，主要用于在视图中通过 EL 引用它。没有任何属性时，此名称默认为简单类名，首字母小写，因此这里是“`helloWorld`”。它将通过
    `#{helloWorld}` 在 EL 中可用。这可以在 Jakarta Faces 页面中使用。


    *   **@RequestScoped**：这为 Bean 提供了一个作用域，这意味着在给定的生命周期内使用同一个 Bean 实例。对于 `@RequestScoped`，该生命周期是
    HTTP 请求的持续时间。当作用域结束时，Bean 会自动销毁。你可以在第 8 章中阅读更多关于作用域的信息。


    ### 创建 Facelets 文件


    接下来，我们将创建 MVC 的*视图*部分。它本质上只是一个 XHTML 文件，被 Jakarta Faces 解释为 *Facelets 文件*或简称为“Facelet”。当使用与
    Facelets 文件路径匹配的 URL 调用 FacesServlet 时，Jakarta Faces 最终将解析它并生成 HTML 标记，作为对请求的响应发送到浏览器。借助
    EL，它可以引用 Bean 属性并调用 Bean 操作。


    右键点击项目的 `webapp` 文件夹，选择 *新建* ➤ *文件*（见图 2-17）。将其命名为 `hello.xhtml`。


    ![](img/454457_2_En_2_Fig17_HTML.jpg)


    图 2-17


    Eclipse 中的新建文件向导


    HTML 编辑器将打开，其中包含新创建的 Facelets 文件。它最初是空的。用以下内容填充它：


    ```


    Hello World


    Hello World


    ```


    我们将简要介绍这里使用的 Jakarta Faces 特定的 XHTML 标签。


    *   **<h:head>**：这会生成 HTML `<head>` 元素。它让 Jakarta Faces 有机会自动包含任何必要的 JavaScript
    文件，例如包含 `<f:ajax>` 所需逻辑的文件。


    *   **<h:body>**：这会生成 HTML `<body>` 元素。你也可以在此特定 Facelet 中使用纯 HTML `<body>`，但这样它就不会给任何其他
    Jakarta Faces 标签在 HTML `<body>` 末尾自动包含任何必要 JavaScript 的机会。


    *   **<h:form>**：这会生成 HTML `<form>` 元素。Jakarta Faces 会自动在表单内的隐藏输入字段中包含所谓的视图状态。


    *   **<h:outputLabel>**：这会生成 HTML `<label>` 元素。你也可以在此特定 Facelet 中使用纯 HTML `<label>`，但这样你就必须手动处理找出目标输入元素的实际
    ID。


    *   **<h:inputText>**：这会生成 HTML `<input type="text">` 元素。Jakarta Faces 会自动获取和设置
    `value` 属性中指定的 Bean 属性的值。


    *   **<h:commandButton>**：这会生成 HTML `<input type="submit">`。Jakarta Faces 会自动调用
    `action` 属性中指定的 Bean 方法。


    *   **<f:ajax>**：这会生成必要的 JavaScript 代码，以启用其所嵌套标签（在本例中为 `<h:commandButton>`）的 Ajax
    行为。你也可以不使用它，但这样表单提交就不会异步执行。`@form` 的 `execute` 属性表示提交时必须处理其所在的整个 `<h:form>`，而
    `:output` 的 `render` 属性表示 Ajax 提交完成后必须自动更新由 `id="output"` 标识的标签。


    *   **<h:outputText>**：这会生成 HTML `<span>` 元素。这是在 Ajax 提交完成后被更新的元素。它只会打印 `value`
    属性中指定的 Bean 属性。


    这些 Jakarta Faces 特定的 XHTML 标签也称为 *Jakarta Faces 组件*。在接下来的章节中，将会有更多关于 Facelets
    文件和 Jakarta Faces 组件的内容。请注意，你也可以在 Facelets 文件中完美地嵌入纯 HTML。只有在功能需要或使用 Jakarta Faces
    组件更容易实现时，才应使用它们。

