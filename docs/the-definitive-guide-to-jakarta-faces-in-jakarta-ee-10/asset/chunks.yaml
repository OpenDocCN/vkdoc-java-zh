- fmt: '# Jakarta Faces 中的转换器与验证器


    ## 核心概念


    在其核心，`Jakarta Faces` 作为一个基于 HTML 表单的 MVC（模型-视图-控制器）框架，基本上需要一直在 Java 对象（实体、Bean、值对象、数据传输对象等）和字符序列（字符串）之间进行转换。HTTP
    请求基本上被分解为表示标头和参数的纯字符串，而不是 Java 对象。HTTP 响应基本上被写成一个表示 HTML 或 XML 的大字符序列，而不是某种 Java
    对象的序列化形式。然而，`Jakarta Faces` 页面背后的普通 Java 模型不一定到处都包含 `String` 属性。那将违背 Java 的强类型特性。这就是转换器发挥作用的地方：在模型中的对象和视图中的字符串之间进行转换。


    在用新提交的、并在必要时转换后的值更新模型值之前，您当然还希望验证它们是否符合 Web 应用程序的业务规则，并在必要时向最终用户呈现信息性错误消息，以便他们可以自行修复任何错误。通常，业务规则已经在数据存储（例如关系数据库管理系统）中得到了很好的定义。一个设计良好的数据库表已经在数据类型、最大大小、可空性和唯一性方面有严格的约束。您作为前端开发人员，应该绝对确保提交和转换后的值可以无错误地插入到数据库中。


    例如，如果电子邮件地址列被约束为唯一且不可为空的列，最大大小为 254 个字符，那么您应该确保在将其插入数据库之前，提交的值已按此验证。否则，数据库插入会抛出一些
    `SQL` 异常，通常很难将其分解为详细信息以告知最终用户确切的错误。这就是验证器发挥作用的地方：在更新模型值之前验证提交（和转换）的值。


    ## 标准转换器


    `Jakarta Faces` 从一开始就提供了一堆开箱即用的标准转换器。它们中的大多数甚至基于模型属性的 Java 类型完全透明地完成其工作。它们都在 `jakarta.faces.convert`
    包中，并且都实现了 `Converter<T>` 接口。表 [5-1](#454457_2_En_5_Chapter.xhtml#Tab1) 提供了它们的概述。


    **表 5-1** `Jakarta Faces` 提供的标准转换器


    | 转换器类 | 转换器 ID | 转换器标签 | 值类型 | 自版本 |

    | :--- | :--- | :--- | :--- | :--- |

    | `BigDecimalConverter` | `jakarta.faces.BigDecimal` | n/a | `java.math.BigDecimal`
    | 1.0 |

    | `BigIntegerConverter` | `jakarta.faces.BigInteger` | n/a | `java.math.BigInteger`
    | 1.0 |

    | `BooleanConverter` | `jakarta.faces.Boolean` | n/a | `boolean`/`java.lang.Boolean`
    | 1.0 |

    | `ByteConverter` | `jakarta.faces.Byte` | n/a | `byte`/`java.lang.Byte` | 1.0
    |

    | `CharacterConverter` | `jakarta.faces.Character` | n/a | `char`/`java.lang.Character`
    | 1.0 |

    | `DateTimeConverter` | `jakarta.faces.DateTime` | `<f:convertDateTime>` | `java.util.Date`
    `java.time.LocalDate` `java.time.LocalTime` `java.time.OffsetTime` `java.time.LocalDateTime`
    `java.time.OffsetDateTime` `java.time.ZonedDateTime` | 1.0 2.3 2.3 2.3 2.3 2.3
    2.3 |

    | `DoubleConverter` | `jakarta.faces.Double` | n/a | `double`/`java.lang.Double`
    | 1.0 |

    | `EnumConverter` | `jakarta.faces.Enum` | n/a | `enum`/`java.lang.Enum` | 1.0
    |

    | `FloatConverter` | `jakarta.faces.Float` | n/a | `float`/`java.lang.Float` |
    1.0 |

    | `IntegerConverter` | `jakarta.faces.Integer` | n/a | `int`/`java.lang.Integer`
    | 1.0 |

    | `LongConverter` | `jakarta.faces.Long` | n/a | `long`/`java.lang.Long` | 1.0
    |

    | `NumberConverter` | `jakarta.faces.Number` | `<f:convertNumber>` | `java.lang.Number`
    | 1.0 |

    | `ShortConverter` | `jakarta.faces.Short` | n/a | `short`/`java.lang.Short` |
    1.0 |


    “转换器 ID”列基本上指定了转换器标识符，您可以在任何 `ValueHolder` 组件的 `converter` 属性中，或在任何嵌套的 `<f:converter>`
    标签的 `converterId` 属性中指定它，以激活特定的转换器。所有 `UIOutput` 和 `UIInput` 组件都实现了 `ValueHolder`
    接口。在“转换器标签”列中显示“n/a”的转换器是隐式转换器。换句话说，您只需将任何 `ValueHolder` 组件的 `value` 属性绑定到类型为
    `BigDecimal`、`BigInteger`、`boolean`/`Boolean`、`byte`/`Byte`、`char`/`Character`、`double`/`Double`、`enum`/`Enum`、`float`/`Float`、`int`/`Integer`、`long`/`Long`
    和 `short`/`Short` 的任何 Bean 属性，即可让 `Jakarta Faces` 自动转换它，而无需任何额外配置。只有 `<f:convertDateTime>`
    和 `<f:convertNumber>` 需要显式注册，因为仅从模型值本身不一定能明显看出所需的转换算法。


    在所有 `ValueHolder` 组件中，转换器将在渲染响应阶段（第六阶段）被调用，将非 `String` 类型的模型值转换为适合嵌入 HTML 的 `String`。而在
    `EditableValueHolder` 组件中，转换器也将在处理验证阶段（第三阶段）被调用，将提交的 `String` 请求参数转换为非 `String`
    类型的模型值。`EditableValueHolder` 接口扩展了 `ValueHolder` 接口，并由所有 `UIInput` 组件实现。


    ## 隐式转换的限制


    然而，隐式转换不适用于那些值类型实际上是参数化的 Bean 属性。想象一下，您在模型中有一个 `List<Integer>`，并且希望能够像下面这样编辑它：


    ```html

    <h:inputText value="#{bean.integerList[0]}" />

    <h:inputText value="#{bean.integerList[1]}" />

    ```


    然后，提交后，您最终会在列表中得到未转换的 `String` 值，并且在尝试迭代列表时会因类转换异常而感到困惑。原因是 EL（表达式语言）API（应用程序编程接口），它负责处理那些在幕后由
    `jakarta.el.ValueExpression` 实例表示的 `#{...}` 内容，在其当前版本中无法检测泛型集合的参数化类型，并在 `ValueExpression#getType()`
    上仅返回 `Object.class`。`Jakarta Faces` 对此 EL 的限制无能为力。您所能做的就是在输入组件上通过其“转换器 ID”显式指定所需的转换器。


    另一种方法是将 `List<Integer>` 替换为 `Integer[]` 甚至 `int[]`。然后 EL 将能够将值表达式识别为整数类型，因此 `Jakarta
    Faces` 将能够为其定位所需的转换器。然而，在模型中使用普通数组而不是集合在当今是“不可取的”。


    ## 显式标准转换器


    回到显式标准转换器 `<f:convertNumber>` 和 `<f:convertDateTime>`，它们也可以嵌套在任何 `ValueHolder`
    组件中。`<f:convertNumber>` 标签与基于数字的隐式转换器之间的区别在于，标签允许更精细地设置转换选项，例如数字类型或模式、整数和/或小数位数、是否使用分组以及区域设置。


    ### `<f:convertNumber>`


    `<f:convertNumber>` 在底层使用 `java.text.NumberFormat`。`type` 属性指定将获取哪个 `java.text.NumberFormat`
    实例，默认为 `number`。其他允许的值是 `currency` 和 `percent`。换句话说，以下标签：


    ```html

    <f:convertNumber type="number" />

    <f:convertNumber type="currency" />

    <f:convertNumber type="percent" />

    ```


    将在底层按如下方式获取 `NumberFormat` 实例：


    ```java

    NumberFormat numberFormat = NumberFormat.getNumberInstance(locale);

    NumberFormat currencyFormat = NumberFormat.getCurrencyInstance(locale);

    NumberFormat percentFormat = NumberFormat.getPercentInstance(locale);

    ```'
  raw: "At its core, Jakarta Faces as an HTML form`–`based MVC\n(model-view-controller\n\
    ) framework basically needs to convert between Java objects\n(entities, beans,\
    \ value objects, data transfer objects, and whatnot) and\ncharacter sequences\
    \ (strings) all the time. The HTTP request is\nbasically broken down into plain\
    \ vanilla strings representing headers\nand parameters, not into Java objects.\
    \ The HTTP response is basically\nwritten as one big sequence of characters representing\
    \ HTML or XML, not\nas some sort of serialized form of a Java object. However,\
    \ the average\nJava model behind a Jakarta Faces page doesn’t necessarily contain\n\
    String properties everywhere. That would defeat the strong typed nature\nof Java.\
    \ This is where converters come into the picture: converting\nbetween objects\
    \ in model and strings in view.\nBefore updating the model values with freshly\
    \ submitted and, if\nnecessary, converted values, you would of course also like\
    \ to validate\nwhether they conform to the business rules of the web application\
    \ and,\nif necessary, present end users an informative error message so that\n\
    they can fix any errors themselves. Usually, the business rules are\nalready very\
    \ well defined in the data store, such as a relational\ndatabase management system.\
    \ A decently designed database table already\nhas strict constraints on the data\
    \ type, maximum size, nullability, and\nuniqueness. You as a front-end developer\
    \ should make absolutely sure\nthat the submitted and converted values can be\
    \ inserted in the database\nwithout errors.\nIf, for example, the email address\
    \ column is constrained as a unique\nand nonnullable column with a maximum size\
    \ of 254 characters, then you\nshould make sure that the submitted value is validated\
    \ as such before\ninserting it in the database. Otherwise, the database insert\
    \ would throw\nsome SQL exception that is generally cumbersome to break down into\n\
    detailed information in order to tell the end user about the exact\nmistake. This\
    \ is where validators come into the picture: validating\nsubmitted (and converted)\
    \ values before updating the model.\n\nStandard Converters\n\nJakarta Faces has,\
    \ from the beginning, provided a bunch of standard\nconverters out the box. Most\
    \ of them even do their job fully\ntransparently based on the Java type of the\
    \ model property. They are all\navailable in the `jakarta.faces.convert`\npackage,^([^(18)](#fn18))\
    \ and they all implement the\n`Converter<T>`\ninterface. Table [5-1](#454457_2_En_5_Chapter.xhtml#Tab1)\
    \ provides an\noverview of them.\n\nTable 5-1\nStandard Converters Provided by\
    \ Jakarta Faces\n\nConverter class |\n Converter ID |\n Converter tag |\n Value\
    \ type |\n Since |\n\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\
    \ --- | --- |\n\nBigDecimalConverter |\n jakarta.faces.BigDecimal |\n n/a |\n\
    \ java.math.BigDecimal |\n 1.0 |\n\nBigIntegerConverter |\n jakarta.faces.BigInteger\
    \ |\n n/a |\n java.math.BigInteger |\n 1.0 |\n\nBooleanConverter |\n jakarta.faces.Boolean\
    \ |\n n/a |\n boolean/java.lang.Boolean |\n 1.0 |\n\nByteConverter |\n jakarta.faces.Byte\
    \ |\n n/a |\n byte/java.lang.Byte |\n 1.0 |\n\nCharacterConverter |\n jakarta.faces.Character\
    \ |\n n/a |\n char/java.lang.Character |\n 1.0 |\n\nDateTimeConverter |\n jakarta.faces.DateTime\
    \ |\n <f:convertDateTime> |\n java.util.Date java.time.LocalDate\njava.time.LocalTime\n\
    java.time.OffsetTime\njava.time.LocalDateTime\njava.time.OffsetDateTime\njava.time.ZonedDateTime\
    \ |\n 1.0 2.3\n2.3\n2.3\n2.3\n2.3\n2.3 |\n\nDoubleConverter |\n jakarta.faces.Double\
    \ |\n n/a |\n double/java.lang.Double |\n 1.0 |\n\nEnumConverter |\n jakarta.faces.Enum\
    \ |\n n/a |\n enum/java.lang.Enum |\n 1.0 |\n\nFloatConverter |\n jakarta.faces.Float\
    \ |\n n/a |\n float/java.lang.Float |\n 1.0 |\n\nIntegerConverter |\n jakarta.faces.Integer\
    \ |\n n/a |\n int/java.lang.Integer |\n 1.0 |\n\nLongConverter |\n jakarta.faces.Long\
    \ |\n n/a |\n long/java.lang.Long |\n 1.0 |\n\nNumberConverter |\n jakarta.faces.Number\
    \ |\n <f:convertNumber> |\n java.lang.Number |\n 1.0 |\n\nShortConverter |\n jakarta.faces.Short\
    \ |\n n/a |\n short/java.lang.Short |\n 1.0 |\n\nThe “Converter ID” column basically\
    \ specifies the converter\nidentifier as you could specify in the `converter`\n\
    attribute   of any `ValueHolder`\ncomponent, or in the `converterId` attribute\n\
    of any nested `<f:converter>`\ntag in order to activate the specific converter.\
    \ All `UIOutput` and `UIInput` components\nimplement the `ValueHolder`\ninterface.\
    \ The converters that say “n/a” in the “Converter tag” column\nare implicit converters.\
    \ In other words, you can just bind the `value` attribute of\nany `ValueHolder`\n\
    component to any bean property of type `BigDecimal`, `BigInteger`, `boolean`/`Boolean`,\
    \ `byte`/`Byte`, `char`/`Character`, `double`/`Double`, `enum`/`Enum`, `float`/`Float`,\
    \ `int`/`Integer`, `long`/`Long`, and `short`/`Short` and have\nJakarta Faces\
    \ to automatically convert it without any additional\nconfiguration. Only `<f:convertDateTime>`\n\
    and `<f:convertNumber>`\nrequire explicit registration because the desired conversion\
    \ algorithm\nisn’t necessarily obvious from the model value alone.\nIn all `ValueHolder`\n\
    components, the converter will be invoked during the render response\nphase (sixth\
    \ phase), converting the non-`String`-based model\nvalue to a `String` suitable\
    \ for\nembedding in HTML. And in `EditableValueHolder`\ncomponents, the converter\
    \ will also be invoked during the process\nvalidations phase (third phase), converting\
    \ the submitted `String` request\nparameter to the non-`String`-based model\n\
    value. The `EditableValueHolder`\ninterface extends the `ValueHolder` interface\n\
    and is implemented by all `UIInput`\ncomponents.\n\nHowever, implicit conversion\
    \ doesn’t work on bean properties where those\nvalue types are actually parameterized.\
    \ Imagine that you have a `List<Integer>`\nin the model and you’d like to be able\
    \ to edit it as follows:\n\nThen, after submitting, you would end up with unconverted\
    \ `String` values  in the list and get\nbaffled by class cast exceptions when\
    \ attempting to iterate over the\nlist. The reason is that the EL (Expression\
    \ Language) API (application\nprogramming interface), which is responsible for\
    \ processing those `#{...}` things that\nare, behind the scenes, represented by\
    \ `jakarta.el.ValueExpression`\ninstances, is in its current version not capable\
    \ of detecting the\nparameterized type of a generic collection and just returns\
    \ `Object.class` on `ValueExpression#getType()`.\nJakarta Faces can’t do much\
    \ about that limitation of EL. All you can do\nis explicitly specify the desired\
    \ converter by its “Converter ID” on the\ninput component.\n\nAn alternative is\
    \ to replace the `List<Integer>`\nby `Integer[]` or\neven `int[]`. EL\nwill then\
    \ be able to recognize the value expression as an integer type,\nand hence, Jakarta\
    \ Faces will be able to locate the desired converter\nfor it. However, using plain\
    \ arrays instead of collections in the model\nare a “no-no” these days.\nComing\
    \ back to the explicit standard converters `<f:convertNumber>`\nand `<f:convertDateTime>`,\n\
    those can also be nested in any `ValueHolder`\ncomponent. The difference between\
    \ the `<f:convertNumber>`\ntag and the implicit number-based converters is that\
    \ the tags allow more\nfine-grained setting of conversion options, such as the\
    \ number type or\npattern, the amount of integer and/or fraction digits, whether\
    \ grouping\nis used, and the locale.\n\n<f:convertNumber>\n\nThe `<f:convertNumber>`^([^(19)](#fn19))\
    \ uses  under the hood `java.text.NumberFormat`.^([^(20)](#fn20)) The `type` attribute\n\
    specifies which `java.text.NumberFormat`\ninstance will be obtained and defaults\
    \ to `number`. Other\nallowable values are `currency` and `percent`. In other\n\
    words, the following tags:\n\nwill under the hood obtain the `NumberFormat` instance\n\
    as follows:\n\n```\nNumberFormat numberFormat = NumberFormat.getNumberInstance(locale);\n\
    NumberFormat currencyFormat = NumberFormat.getCurrencyInstance(locale);\nNumberFormat\
    \ percentFormat = NumberFormat.getPercentInstance(locale);\n```"
  trans: '

    Jakarta Faces 作为一个基于 HTML 表单的 MVC（模型-视图-控制器）框架，其核心在于需要持续在 Java 对象（实体、Bean、值对象、数据传输对象等）与字符序列（字符串）之间进行转换。HTTP
    请求本质上被分解为表示标头和参数的纯字符串，而非 Java 对象。HTTP 响应本质上被写成一个表示 HTML 或 XML 的大字符序列，而非某种 Java
    对象的序列化形式。然而，Jakarta Faces 页面背后的普通 Java 模型并不一定处处包含 String 属性，否则将违背 Java 强类型化的本质。这正是转换器发挥作用的地方：在模型对象与视图字符串之间进行转换。


    在将新提交且（如有必要）已转换的值更新到模型之前，你当然还希望验证它们是否符合 Web 应用程序的业务规则，并在必要时向最终用户呈现信息性错误消息，以便他们自行修正错误。通常，业务规则已在数据存储（例如关系数据库管理系统）中得到了很好的定义。一个设计良好的数据库表已经对数据类型、最大长度、可空性和唯一性设置了严格的约束。作为前端开发人员，你应绝对确保提交并转换后的值能够无错误地插入数据库。


    例如，如果电子邮件地址列被约束为唯一且不可为空的列，最大长度为 254 个字符，那么你应该确保在将其插入数据库之前，提交的值已通过此类验证。否则，数据库插入操作将抛出某种
    SQL 异常，而通常很难将这种异常分解为详细信息来告知最终用户具体错误所在。这正是验证器发挥作用的地方：在更新模型之前验证已提交（和已转换）的值。


    标准转换器


    Jakarta Faces 从一开始就提供了一系列开箱即用的标准转换器。其中大多数甚至基于模型属性的 Java 类型完全透明地完成其工作。它们都位于 `jakarta.faces.convert`
    包中，^(¹⁸) 并且都实现了 `Converter<T>` 接口。表 5-1 提供了它们的概览。


    表 5-1 Jakarta Faces 提供的标准转换器


    | 转换器类 | 转换器 ID | 转换器标签 | 值类型 | 自版本 |

    | --- | --- | --- | --- | --- |

    | BigDecimalConverter | jakarta.faces.BigDecimal | n/a | java.math.BigDecimal
    | 1.0 |

    | BigIntegerConverter | jakarta.faces.BigInteger | n/a | java.math.BigInteger
    | 1.0 |

    | BooleanConverter | jakarta.faces.Boolean | n/a | boolean/java.lang.Boolean |
    1.0 |

    | ByteConverter | jakarta.faces.Byte | n/a | byte/java.lang.Byte | 1.0 |

    | CharacterConverter | jakarta.faces.Character | n/a | char/java.lang.Character
    | 1.0 |

    | DateTimeConverter | jakarta.faces.DateTime | `<f:convertDateTime>` | java.util.Date
    java.time.LocalDate java.time.LocalTime java.time.OffsetTime java.time.LocalDateTime
    java.time.OffsetDateTime java.time.ZonedDateTime | 1.0 2.3 2.3 2.3 2.3 2.3 2.3
    |

    | DoubleConverter | jakarta.faces.Double | n/a | double/java.lang.Double | 1.0
    |

    | EnumConverter | jakarta.faces.Enum | n/a | enum/java.lang.Enum | 1.0 |

    | FloatConverter | jakarta.faces.Float | n/a | float/java.lang.Float | 1.0 |

    | IntegerConverter | jakarta.faces.Integer | n/a | int/java.lang.Integer | 1.0
    |

    | LongConverter | jakarta.faces.Long | n/a | long/java.lang.Long | 1.0 |

    | NumberConverter | jakarta.faces.Number | `<f:convertNumber>` | java.lang.Number
    | 1.0 |

    | ShortConverter | jakarta.faces.Short | n/a | short/java.lang.Short | 1.0 |


    “转换器 ID”列基本上指定了转换器标识符，你可以在任何 `ValueHolder` 组件的 `converter` 属性中，或任何嵌套的 `<f:converter>`
    标签的 `converterId` 属性中指定该标识符，以激活特定的转换器。所有 `UIOutput` 和 `UIInput` 组件都实现了 `ValueHolder`
    接口。“转换器标签”列中标注为“n/a”的转换器是隐式转换器。换句话说，你可以将任何 `ValueHolder` 组件的 `value` 属性绑定到类型为
    `BigDecimal`、`BigInteger`、`boolean`/`Boolean`、`byte`/`Byte`、`char`/`Character`、`double`/`Double`、`enum`/`Enum`、`float`/`Float`、`int`/`Integer`、`long`/`Long`
    和 `short`/`Short` 的任何 Bean 属性，并让 Jakarta Faces 自动进行转换，无需任何额外配置。只有 `<f:convertDateTime>`
    和 `<f:convertNumber>` 需要显式注册，因为仅凭模型值本身并不一定能明确所需的转换算法。


    在所有 `ValueHolder` 组件中，转换器将在渲染响应阶段（第六阶段）被调用，将非 `String` 类型的模型值转换为适合嵌入 HTML 的 `String`。而在
    `EditableValueHolder` 组件中，转换器还将在处理验证阶段（第三阶段）被调用，将提交的 `String` 请求参数转换为非 `String`
    类型的模型值。`EditableValueHolder` 接口扩展了 `ValueHolder` 接口，并由所有 `UIInput` 组件实现。


    然而，隐式转换不适用于那些值类型实际上被参数化的 Bean 属性。想象一下，你在模型中有一个 `List<Integer>`，并且希望能够像下面这样编辑它：


    那么，在提交后，你最终会在列表中得到未转换的 `String` 值，并在尝试迭代列表时被类转换异常搞得一头雾水。原因是负责处理那些 `#{...}` 内容的
    EL（表达式语言）API（应用程序编程接口），在幕后由 `jakarta.el.ValueExpression` 实例表示，其当前版本无法检测泛型集合的参数化类型，并在
    `ValueExpression#getType()` 上仅返回 `Object.class`。对于 EL 的这个限制，Jakarta Faces 也无能为力。你所能做的就是在输入组件上通过其“转换器
    ID”显式指定所需的转换器。


    另一种替代方案是将 `List<Integer>` 替换为 `Integer[]` 甚至 `int[]`。这样 EL 就能将值表达式识别为整数类型，因此 Jakarta
    Faces 就能为其找到所需的转换器。然而，在模型中使用普通数组代替集合如今已是“禁忌”。


    回到显式标准转换器 `<f:convertNumber>` 和 `<f:convertDateTime>`，它们也可以嵌套在任何 `ValueHolder`
    组件中。`<f:convertNumber>` 标签与基于数字的隐式转换器之间的区别在于，这些标签允许更精细地设置转换选项，例如数字类型或模式、整数和/或小数位数、是否使用分组以及区域设置。


    `<f:convertNumber>`


    `<f:convertNumber>`^(¹⁹) 在底层使用 `java.text.NumberFormat`。^(²⁰) `type` 属性指定将获取哪个
    `java.text.NumberFormat` 实例，默认为 `number`。其他允许的值是 `currency` 和 `percent`。换句话说，以下标签：


    将在底层按如下方式获取 `NumberFormat` 实例：


    ```

    NumberFormat numberFormat = NumberFormat.getNumberInstance(locale);

    NumberFormat currencyFormat = NumberFormat.getCurrencyInstance(locale);

    NumberFormat percentFormat = NumberFormat.getPercentInstance(locale);

    ```

    '
- fmt: '`locale`参数可以通过`<f:convertNumber>`标签的`locale`属性指定，默认值为`UIViewRoot#getLocale()`，而后者又可以通过`<f:view>`的`locale`属性指定。换句话说，这些实例将根据数字类型和指定的区域设置自动应用标准数字格式模式。


    以下示例：


    ```

    ...

    ```


    不会将价格（一个`BigDecimal`属性）格式化为`R$ 12,34`（巴西雷亚尔），而是格式化为`$12.34`（美元）。请注意，`<f:convertNumber>`标签的`locale`属性不一定需要指定为`faces-config.xml`中支持的区域设置。还应注意，`value`属性不一定需要引用`BigDecimal`；任何其他`java.lang.Number`类型也受支持，但对于价格，我们当然希望将值存储在`BigDecimal`中，而不是例如`Double`或`Float`中，以避免由于浮点数的浮点性质导致的算术错误。^([^(21)](#fn21))


    如果您出于某种原因需要更改标准数字格式模式——例如，您正在开发一个存储五位小数金融数据的银行应用程序，并且希望在某个后端管理屏幕上显示完整值，以便人类在必要时进行验证——那么您可以使用`<f:convertNumber>`标签的`pattern`属性来覆盖标准数字格式模式，使其符合`java.text.DecimalFormat`的规则。^([^(22)](#fn22))


    请注意，当指定`pattern`属性时，`type`属性将被忽略。“货币符号”模式字符“¤”指定了实际货币符号必须插入的位置。实际货币符号取决于指定的区域设置。“逗号”模式字符“`,`”指定了分组分隔符必须插入的位置，该位置相对于小数分隔符或值的末尾。实际插入的分组分隔符符号在美国美元格式中恰好也是逗号，但在巴西雷亚尔格式中则是句点。“句点”模式字符“`.`”指定了小数分隔符的位置。实际插入的小数分隔符符号在美国美元格式中恰好也是句点，但在巴西雷亚尔格式中则是逗号。“可选数字”模式字符“`#`”在此模式中仅用于指示何时应插入分组分隔符符号，并且当实际数字不存在时不会显示任何内容。“必需数字”模式字符“`0`”指定了最小格式，当实际数字不存在时将显示零。以下是一个练习代码，应能深入了解`<f:convertNumber>`在底层的工作原理：


    ```

    Locale locale = new Locale("pt", "BR");

    DecimalFormatSymbols symbols = new DecimalFormatSymbols(locale);

    System.out.println("Currency symbol: " + symbols.getCurrencySymbol());

    System.out.println("Grouping symbol: " + symbols.getGroupingSeparator());

    System.out.println("Decimal symbol: " + symbols.getDecimalSeparator());

    DecimalFormat formatter = new DecimalFormat("¤ #,##0.00000", symbols);

    System.out.println(formatter.format(new BigDecimal("12.34")));

    System.out.println(formatter.format(new BigDecimal(".1234")));

    System.out.println(formatter.format(new BigDecimal("1234")));

    System.out.println(formatter.format(new BigDecimal("1234567.1234567")));

    ```


    输出应如下所示：


    ```

    Currency symbol: R$

    Grouping symbol: .

    Decimal symbol: ,

    R$ 12,34000

    R$ 0,12340

    R$ 1.234,00000

    R$ 1.234.567,12346

    ```


    `<f:convertNumber>`也将精确渲染这些值。除了`pattern`属性之外，您还可以使用其他属性（例如`currencySymbol`、`integerOnly`、`groupingUsed`、`minIntegerDigits`、`maxIntegerDigits`、`minFractionDigits`和`maxFractionDigits`）对`type`属性进行微调。您基本上可以通过以下方式实现相同的格式模式“¤
    `#,##0.00000`”：


    ```

    如果您难以从键盘输入货币符号占位符，这实际上更易读且更方便。`pattern`属性很少比使用其他属性对`type`属性进行微调更有用。


    如果您在`UIInput`组件中使用`<f:convertNumber>`，并要求最终用户输入值，那么您应该记住，货币和百分比类型明确要求最终用户也在输入字段中输入货币或百分比符号。对于货币输入，您可以通过指定空字符串作为货币符号来轻松禁用此功能，以便将其放在输入组件外部。

    ```


    ```

    $


    ```


    对于百分比类型，不幸的是，这是不可能的。最终用户确实必须在输入字段中明确输入百分比符号。


    ### `<f:convertDateTime>`


    `<f:convertDateTime>`^([^(23)](#fn23))在底层使用`java.text.DateFormat`^([^(24)](#fn24))，并且自
    Jakarta Faces 2.3 起，也使用`java.time.formatter.DateTimeFormatter`。^([^(25)](#fn25))
    换句话说，您基本上可以使用任何类型的日期。此外，此标签有一个`type`属性，该属性必须与模型值的实际类型相对应。从历史上看，无法基于`java.util.Date`实例以编程方式检测所需的类型。自从新的`java.time`
    API 为每种日期时间类型提供不同的类以来，这种情况已经改变。然而，为了能够将现有的`<f:convertDateTime>` API 重用于新的`java.time`
    API，必须添加新的类型。表 [5-2](#454457_2_En_5_Chapter.xhtml#Tab2) 提供了一个概述。


    **表 5-2** `<f:convertDateTime type>` 支持的值


    | 标签属性 | 值类型 | 实际格式化器 | 自版本 |

    | --- | --- | --- | --- |

    | `date`（默认） | `java.util.Date`（零时间） | `DateFormat#getDateInstance()` | 1.0 |

    | `time` | `java.util.Date`（零日期） | `DateFormat#getTimeInstance()` | 1.0 |

    | `both` | `java.util.Date` | `DateFormat#getDateTimeInstance()` | 1.0 |

    | `localDate` | `java.time.LocalDate` | `DateTimeFormatter#ofLocalizedDate()`
    | 2.3 |

    | `localTime` | `java.time.LocalTime` | `DateTimeFormatter#ofLocalizedTime()`
    | 2.3 |

    | `localDateTime` | `java.time.LocalDateTime` | `DateTimeFormatter#ofLocalizedDateTime()`
    | 2.3 |

    | `offsetTime` | `java.time.OffsetTime` | `DateTimeFormatter#ISO_OFFSET_TIME`
    | 2.3 |

    | `offsetDateTime` | `java.time.OffsetDateTime` | `DateTimeFormatter#ISO_OFFSET_DATE_TIME`
    | 2.3 |

    | `zonedDateTime` | `java.time.ZonedDateTime` | `DateTimeFormatter#ISO_ZONED_DATE_TIME`
    | 2.3 |


    除了`type`属性之外，您最好还指定`pattern`属性，特别是在要求最终用户通过`UIInput`组件输入`java.util.Date`或`java.time.LocalXxx`类型的值时，因为实际模式可能在不同区域设置之间以不太自文档化的方式变化。`java.time.OffSetXxx`和`ZonedDateTime`类型没有这个问题，因为它们默认使用通用的
    ISO 8601 格式。^([^(26)](#fn26))'
  raw: "where the `locale` argument can\nbe specified by the `locale` attribute of\n\
    the `<f:convertNumber>`\ntag and defaults to `UIViewRoot#getLocale()`,\nwhich\
    \ in turn can be specified by the `locale` attribute of\n`<f:view>`.\nIn other\
    \ words, those instances will automatically apply the standard\nnumber format\
    \ pattern based on the number type and the specified locale.\nThe following example:\n\
    \n```\n...\n\n```\n\nwill not format the price (a `BigDecimal` property)\nas `R$\
    \ 12,34`\n(Brazilian real), but instead as `$12.34` (US dollar).\nNote that the\
    \ `locale` attribute of\nthe `<f:convertNumber>`\ntag does not necessarily need\
    \ to be specified as a supported locale in\n`faces-config.xml`.\nAlso noted should\
    \ be that the `value` attribute\ndoesn’t necessarily\nneed to refer a `BigDecimal`;\
    \ any other\n`java.lang.Number` type\nis also supported, but for prices, we’d\
    \ of course like to store the\nvalue in a `BigDecimal` instead\nof, for example,\
    \ a `Double` or `Float` to avoid\narithmetic errors due to the floating nature\
    \ of floating-point\nnumbers.^([^(21)](#fn21))\n\nIn case you need to change the\
    \ standard number format pattern for some\nreason`—`for\nexample, because you’re\
    \ working on a banking application that stores\nfinancial data with five fractions`—`and\
    \ you’d like to\npresent the full value in some back-end admin screen so that\
    \ humans can,\nif necessary, verify them, then you can use the `pattern` attribute\
    \ of\nthe `<f:convertNumber>`\ntag to override the standard number format pattern\
    \ to conform to the\nrules of `java.text.DecimalFormat`.^([^(22)](#fn22))\n\n\
    ```\n\nNote that when the `pattern`\nattribute  is\nspecified, the `type` attribute\
    \   is ignored. The\n“currency sign” pattern character “¤” specifies where the\
    \ actual\ncurrency symbol must be inserted. The actual currency symbol depends\
    \ on\nthe specified locale. The “comma” pattern character “`,`” specifies when\
    \ the\ngrouping separator must be inserted, which is relative to the decimal\n\
    separator or the end of the value. The actual inserted grouping\nseparator symbol\
    \ is coincidentally also a comma in US dollar format but\nis a period in Brazilian\
    \ real format. The “period” pattern character\n“`.`” specifies\nthe location of\
    \ the decimal separator. The actual inserted decimal\nseparator symbol is coincidentally\
    \ also a period in US dollar format but\nis a comma in Brazilian real format.\
    \ The “optional digit” pattern\ncharacter “`#`”\nis in this pattern merely used\
    \ to indicate when the grouping separator\nsymbol should be\ninserted and won’t\
    \ show anything when the actual digit is absent. The\n“required digit” pattern\
    \ character “`0`” specifies the\nminimum format that will show zero when the actual\
    \ digit is absent. The\nfollowing is an exercise code that should give insight\
    \ into how `<f:convertNumber>`\nworks under the hood:\n\n```\nLocale locale =\
    \ new Locale(\"pt\", \"BR\");\nDecimalFormatSymbols symbols = new DecimalFormatSymbols(locale);\n\
    System.out.println(\"Currency symbol: \" + symbols.getCurrencySymbol());\nSystem.out.println(\"\
    Grouping symbol: \" + symbols.getGroupingSeparator());\nSystem.out.println(\"\
    Decimal symbol: \" + symbols.getDecimalSeparator());\nDecimalFormat formatter\
    \ = new DecimalFormat(\"¤ #,##0.00000\", symbols);\nSystem.out.println(formatter.format(new\
    \ BigDecimal(\"12.34\")));\nSystem.out.println(formatter.format(new BigDecimal(\"\
    .1234\")));\nSystem.out.println(formatter.format(new BigDecimal(\"1234\")));\n\
    System.out.println(formatter.format(new BigDecimal(\"1234567.1234567\")));\n```\n\
    \nThe output should look as follows:\n\n```\nCurrency symbol: R$\nGrouping symbol:\
    \ .\nDecimal symbol: ,\nR$ 12,34000\nR$ 0,12340\nR$ 1.234,00000\nR$ 1.234.567,12346\n\
    ```\n\nThe `<f:convertNumber>`\nwill also render exactly those values. Apart from\
    \ the `pattern` attribute,\nyou can also fine-grain the `type` attribute with\n\
    additional attributes such as `currencySymbol`, `integerOnly`, `groupingUsed`,\
    \ `minIntegerDigits`,\n`maxIntegerDigits`,\n`minFractionDigits`,\nand `maxFractionDigits`.\n\
    You can basically achieve the same formatting pattern “¤ `#,##0.00000`” as\nfollows:\n\
    \n```\nThis is actually more readable and more convenient in case you have a\n\
    hard time getting out the currency sign placeholder from your keyboard.\nThe `pattern`\n\
    attribute is rarely more useful than fine-graining the `type` attribute   with\
    \ additional\nattributes.\n\nIn case you’re using `<f:convertNumber>`\nin a `UIInput`\n\
    component and thus require the end user to enter the value, then you\nshould keep\
    \ in mind that currency and percent types explicitly require\nthe end user to\
    \ enter the currency or percent symbol in the input field\nas well. For the currency\
    \ input, you can easily disable this by\nspecifying an empty string as a currency\
    \ symbol so that you can put it\noutside the input component.\n\n```\n$\n\n```\n\
    \nFor the percent type, this is, unfortunately, not possible. The end\nuser really\
    \ has to explicitly enter the percent symbol in the input\nfield as well.\n\n\
    <f:convertDateTime>\n\nThe `<f:convertDateTime>`^([^(23)](#fn23)) uses under the\
    \ hood `java.text.DateFormat`^([^(24)](#fn24)) and, since Jakarta Faces 2.3, also\
    \ `java.time.formatter.DateTimeFormatter`.^([^(25)](#fn25)) In other words, you\
    \ can use\nbasically any kind of date for this. Also, this tag has a `type` attribute\
    \ that\nmust actually correspond to the actual type of the model value.\nHistorically,\
    \ it was not possible to programmatically detect the desired\ntype based on a\
    \ `java.util.Date`\ninstance. This has changed since the new `java.time` API that\n\
    offers distinct classes for each date time type. However, in order to be\nable\
    \ to reuse the existing `<f:convertDateTime>`\nAPI for the new `java.time` API\
    \ , new types had to be\nadded. Table [5-2](#454457_2_En_5_Chapter.xhtml#Tab2)\
    \ provides an\noverview.\n\nTable 5-2\n*<f:convertDateTime type>* Supported Values\n\
    \nTag attribute |\n Value type |\n Actual formatter |\n Since |\n\n| --- | ---\
    \ | --- | --- | --- | --- | --- | --- | --- |\n\ndate (default) |\n java.util.Date\
    \ (with zero time) |\n DateFormat#getDateInstance() |\n 1.0 |\n\ntime |\n java.util.Date\
    \ (with zero date) |\n DateFormat#getTimeInstance() |\n 1.0 |\n\nboth |\n java.util.Date\
    \ |\n DateFormat#getDateTimeInstance() |\n 1.0 |\n\nlocalDate |\n java.time.LocalDate\
    \ |\n DateTimeFormatter#ofLocalizedDate() |\n 2.3 |\n\nlocalTime |\n java.time.LocalTime\
    \ |\n DateTimeFormatter#ofLocalizedTime() |\n 2.3 |\n\nlocalDateTime |\n java.time.LocalDateTime\
    \ |\n DateTimeFormatter#ofLocalizedDateTime() |\n 2.3 |\n\noffsetTime |\n java.time.OffsetTime\
    \ |\n DateTimeFormatter#ISO_OFFSET_TIME |\n 2.3 |\n\noffsetDateTime |\n java.time.OffsetDateTime\
    \ |\n DateTimeFormatter#ISO_OFFSET_DATE_TIME |\n 2.3 |\n\nzonedDateTime |\n java.time.ZonedDateTime\
    \ |\n DateTimeFormatter#ISO_ZONED_DATE_TIME |\n 2.3 |\n\nAlong with the `type`\
    \ attribute , you should preferably\nalso specify the `pattern`\nattribute ,\n\
    particularly when requesting the end user to enter a value of the `java.util.Date`\
    \ or\n`java.time.LocalXxx`\ntype via a `UIInput` component,\nbecause the actual\
    \ pattern may vary in a not so self-documenting way\nacross various locales. The\
    \ `java.time.OffSetXxx`\nand `ZonedDateTime` types\ndon’t have that problem because\
    \ they default to the universal ISO 8601\nformat.^([^(26)](#fn26))"
  trans: "\n其中，`locale` 参数可由 `<f:convertNumber>` 标签的 `locale` 属性指定，默认值为 `UIViewRoot#getLocale()`，而该值又可由\
    \ `<f:view>` 的 `locale` 属性指定。换句话说，这些实例将根据数字类型和指定的区域设置自动应用标准数字格式模式。以下示例：\n\n```\n\
    ...\n\n```\n\n不会将价格（一个 `BigDecimal` 属性）格式化为 `R$ 12,34`（巴西雷亚尔），而是格式化为 `$12.34`（美元）。请注意，`<f:convertNumber>`\
    \ 标签的 `locale` 属性不一定需要指定为 `faces-config.xml` 中支持的区域设置。同样需要注意的是，`value` 属性不一定需要引用\
    \ `BigDecimal`；任何其他 `java.lang.Number` 类型也都支持，但对于价格，我们当然希望将值存储在 `BigDecimal` 中，而不是例如\
    \ `Double` 或 `Float` 中，以避免因浮点数的浮点特性而导致的算术错误。^(²¹)\n\n如果你出于某种原因需要更改标准数字格式模式——例如，因为你正在开发一个存储五位小数的金融数据的银行应用程序——并且你希望在后端管理屏幕中显示完整值，以便在必要时由人工进行验证，那么你可以使用\
    \ `<f:convertNumber>` 标签的 `pattern` 属性来覆盖标准数字格式模式，使其符合 `java.text.DecimalFormat`\
    \ 的规则。^(²²)\n\n请注意，当指定了 `pattern` 属性时，`type` 属性将被忽略。“货币符号”模式字符“¤”指定了实际货币符号的插入位置。实际货币符号取决于指定的区域设置。“逗号”模式字符“`,`”指定了分组分隔符的插入位置，该位置相对于小数分隔符或值的末尾。实际插入的分组分隔符符号在美元格式中恰好也是逗号，但在巴西雷亚尔格式中则是句点。“句点”模式字符“`.`”指定了小数分隔符的位置。实际插入的小数分隔符符号在美元格式中恰好也是句点，但在巴西雷亚尔格式中则是逗号。“可选数字”模式字符“`#`”在此模式中仅用于指示何时应插入分组分隔符符号，当实际数字不存在时不会显示任何内容。“必需数字”模式字符“`0`”指定了最小格式，当实际数字不存在时将显示零。以下是练习代码，应能让你深入了解\
    \ `<f:convertNumber>` 在底层是如何工作的：\n\n```\nLocale locale = new Locale(\"pt\", \"\
    BR\");\nDecimalFormatSymbols symbols = new DecimalFormatSymbols(locale);\nSystem.out.println(\"\
    Currency symbol: \" + symbols.getCurrencySymbol());\nSystem.out.println(\"Grouping\
    \ symbol: \" + symbols.getGroupingSeparator());\nSystem.out.println(\"Decimal\
    \ symbol: \" + symbols.getDecimalSeparator());\nDecimalFormat formatter = new\
    \ DecimalFormat(\"¤ #,##0.00000\", symbols);\nSystem.out.println(formatter.format(new\
    \ BigDecimal(\"12.34\")));\nSystem.out.println(formatter.format(new BigDecimal(\"\
    .1234\")));\nSystem.out.println(formatter.format(new BigDecimal(\"1234\")));\n\
    System.out.println(formatter.format(new BigDecimal(\"1234567.1234567\")));\n```\n\
    \n输出应如下所示：\n\n```\nCurrency symbol: R$\nGrouping symbol: .\nDecimal symbol: ,\n\
    R$ 12,34000\nR$ 0,12340\nR$ 1.234,00000\nR$ 1.234.567,12346\n```\n\n`<f:convertNumber>`\
    \ 也将精确渲染这些值。除了 `pattern` 属性之外，你还可以使用其他属性（例如 `currencySymbol`、`integerOnly`、`groupingUsed`、`minIntegerDigits`、`maxIntegerDigits`、`minFractionDigits`\
    \ 和 `maxFractionDigits`）来微调 `type` 属性。你基本上可以通过以下方式实现相同的格式模式“¤ `#,##0.00000`”：\n\
    \n```\n如果你很难从键盘上输入货币符号占位符，这实际上更具可读性且更方便。`pattern` 属性很少比使用其他属性微调 `type` 属性更有用。\n\
    \n如果你在 `UIInput` 组件中使用 `<f:convertNumber>`，从而要求最终用户输入值，那么你应该记住，货币和百分比类型明确要求最终用户也在输入字段中输入货币或百分比符号。对于货币输入，你可以通过将货币符号指定为空字符串来轻松禁用此功能，以便将其放置在输入组件外部。\n\
    \n```\n\n$\n\n```\n\n对于百分比类型，不幸的是，这是不可能的。最终用户确实也必须明确地在输入字段中输入百分比符号。\n\n<f:convertDateTime>\n\
    \n`<f:convertDateTime>`^(²³) 在底层使用 `java.text.DateFormat`^(²⁴)，并且自 Jakarta Faces\
    \ 2.3 起，也使用 `java.time.formatter.DateTimeFormatter`。^(²⁵) 换句话说，你基本上可以使用任何类型的日期。此外，此标签有一个\
    \ `type` 属性，该属性必须与模型值的实际类型相对应。从历史上看，无法基于 `java.util.Date` 实例以编程方式检测所需的类型。自从新的\
    \ `java.time` API 为每种日期时间类型提供不同的类以来，这种情况已经改变。然而，为了能够将现有的 `<f:convertDateTime>`\
    \ API 重用于新的 `java.time` API，必须添加新的类型。表 5-2 提供了一个概览。\n\n表 5-2\n*<f:convertDateTime\
    \ type>* 支持的值\n\n标签属性 |\n 值类型 |\n 实际格式化器 |\n 自版本 |\n\n| --- | --- | --- | ---\
    \ | --- | --- | --- | --- | --- |\n\ndate（默认） |\n java.util.Date（零时间） |\n DateFormat#getDateInstance()\
    \ |\n 1.0 |\n\ntime |\n java.util.Date（零日期） |\n DateFormat#getTimeInstance() |\n\
    \ 1.0 |\n\nboth |\n java.util.Date |\n DateFormat#getDateTimeInstance() |\n 1.0\
    \ |\n\nlocalDate |\n java.time.LocalDate |\n DateTimeFormatter#ofLocalizedDate()\
    \ |\n 2.3 |\n\nlocalTime |\n java.time.LocalTime |\n DateTimeFormatter#ofLocalizedTime()\
    \ |\n 2.3 |\n\nlocalDateTime |\n java.time.LocalDateTime |\n DateTimeFormatter#ofLocalizedDateTime()\
    \ |\n 2.3 |\n\noffsetTime |\n java.time.OffsetTime |\n DateTimeFormatter#ISO_OFFSET_TIME\
    \ |\n 2.3 |\n\noffsetDateTime |\n java.time.OffsetDateTime |\n DateTimeFormatter#ISO_OFFSET_DATE_TIME\
    \ |\n 2.3 |\n\nzonedDateTime |\n java.time.ZonedDateTime |\n DateTimeFormatter#ISO_ZONED_DATE_TIME\
    \ |\n 2.3 |\n\n除了 `type` 属性之外，你最好还指定 `pattern` 属性，特别是在要求最终用户通过 `UIInput` 组件输入\
    \ `java.util.Date` 或 `java.time.LocalXxx` 类型的值时，因为实际模式在不同区域设置之间可能以不太自文档化的方式变化。`java.time.OffSetXxx`\
    \ 和 `ZonedDateTime` 类型没有这个问题，因为它们默认使用通用的 ISO 8601 格式。^(²⁶)\n"
- fmt: "`pattern`属性遵循`<f:convertDateTime>`的规则，对于`java.util.Date`，其规则与`java.text.SimpleDateFormat`的Javadoc相同^([^(27)](#fn27))；对于`java.time`\
    \ API，其规则与`java.time.format.DateTimeFormatter`的Javadoc相同^([^(28)](#fn28))。这些规则大部分一致，但`java.time`格式支持更多模式。对于两种API，“月份中的日期”模式字符是“`d`”，“年份中的月份”模式字符是“`M`”，“年份”模式字符是“`y`”，“24小时制”模式字符是“`H`”，“分钟”模式字符是“`m`”，“秒”模式字符是“`s`”。ISO\
    \ 8601日期格式为“`yyyy-MM-dd`”，ISO 8601时间格式为“`HH:mm:ss`”。偏移时间和带时区的时间需要在时间部分后附加偏移量，该偏移量由ISO\
    \ 8601时区模式字符“`X`”表示。有效值的示例包括：CET（欧洲中部时间）的“`+01:00`”，BRT（巴西利亚时间）的“`-03:00`”，以及IST（印度标准时间）的“`+5:30`”。与之前一样，偏移时间和带时区的日期时间需要使用“`T`”字符（而非空格）分隔。以下是所有可能的`<f:convertDateTime>`类型的概览，其中本地化类型已明确指定模式：\n\
    \n请注意，此处重新配置了`<h:messages>`以显示详细信息而非仅显示摘要，因为标准Jakarta Faces中日期时间转换错误的详细信息包含一个示例值，该值对最终用户理解所需格式更有帮助。以下是关联的后台Bean的代码：\n\
    \n```\n@Named @RequestScoped\npublic class Bean {\n    private Date date;\n  \
    \  private Date time;\n    private Date both;\n    private LocalDate localDate;\n\
    \    private LocalTime localTime;\n    private LocalDateTime localDateTime;\n\
    \    private OffsetTime offsetTime;\n    private OffsetDateTime offsetDateTime;\n\
    \    private ZonedDateTime zonedDateTime;\n\n    public void submit() {\n    \
    \    System.out.println(\"date: \" + date);\n        System.out.println(\"time:\
    \ \" + time);\n        System.out.println(\"both: \" + both);\n        System.out.println(\"\
    localDate: \" + localDate);\n        System.out.println(\"localTime: \" + localTime);\n\
    \        System.out.println(\"localDateTime: \" + localDateTime);\n        System.out.println(\"\
    offsetTime: \" + offsetTime);\n        System.out.println(\"offsetDateTime: \"\
    \ + offsetDateTime);\n        System.out.println(\"zonedDateTime: \" + zonedDateTime);\n\
    \    }\n    // 添加/生成 getter 和 setter 方法\n}\n```\n\n如今HTML5已推出多时，越来越多的浏览器支持新的HTML5日期和时间输入控件，因此最好默认启用它们，因为它们带有非常实用的内置日期选择器。Web浏览器可能会以本地化格式在日期选择器中显示日期模式，但始终会以ISO\
    \ 8601格式提交值。这非常有用。HTML5日期和时间输入控件可以通过将输入文本字段的`type`属性设置为“`date`”^([^(29)](#fn29))、“`time`”^([^(30)](#fn30))或“`datetime-local`”^([^(31)](#fn31))来激活。以下是一些示例：\n\
    \n它们在Chrome浏览器中的渲染效果如下（已添加换行符）：\n![](images/454457_2_En_5_Chapter/454457_2_En_5_Figa_HTML.jpg)\n\
    \n## 标准验证器\n\n当提交的值在流程验证阶段（第三阶段）成功转换后，Jakarta Faces将立即对转换后的值进行验证。Jakarta Faces已提供了一些现成的标准验证器。它们都位于`jakarta.faces.validator`包中^([^(32)](#fn32))，并且都实现了`Validator<T>`接口。表5-3提供了它们的概览。\n\
    \n**表5-3 Jakarta Faces提供的标准验证器**\n\n| 验证器类 | 验证器ID | 验证器标签 | 值类型 | 自版本 |\n| ---\
    \ | --- | --- | --- | --- |\n| `LongRangeValidator` | `jakarta.faces.LongRange`\
    \ | `<f:validateLongRange>` | `java.lang.Number` | 1.0 |\n| `DoubleRangeValidator`\
    \ | `jakarta.faces.DoubleRange` | `<f:validateDoubleRange>` | `java.lang.Number`\
    \ | 1.0 |\n| `LengthValidator` | `jakarta.faces.Length` | `<f:validateLength>`\
    \ | `java.lang.Object` | 1.0 |\n| `RegexValidator` | `jakarta.faces.RegularExpression`\
    \ | `<f:validateRegex>` | `java.lang.String` | 2.0 |\n| `RequiredValidator` |\
    \ `jakarta.faces.Required` | `<f:validateRequired>` | `java.lang.Object` | 2.0\
    \ |\n| `BeanValidator` | `jakarta.faces.Bean` | `<f:validateBean>` | `java.lang.Object`\
    \ | 2.0 |\n| n/a | n/a | `<f:validateWholeBean>` | `java.lang.Object` | 2.3 |\n\
    \n“验证器ID”列指定了验证器标识符，您可以在任何`EditableValueHolder`组件的`validator`属性中，或任何嵌套的`<f:validator>`标签的`validatorId`属性中指定该标识符，以激活特定的验证器。与转换器不同，单个`EditableValueHolder`组件可以附加多个验证器。无论彼此的结果如何，它们都将被执行。\n\
    \n### `<f:validateLongRange>` / `<f:validateDoubleRange>`\n\n这两个验证器允许您为绑定到`java.lang.Number`类型属性的输入组件指定允许的最小和/或最大数值。这些值可以通过`minimum`和`maximum`属性来指定。\n\
    \n通过传递属性，它们还可以与HTML5输入类型“`number`”（微调器）和“`range`”（滑块）结合使用，后者需要`min`、`max`以及可选的`step`作为传递属性。在此示例中，`#{bean.quantity}`是一个`Integer`，而`#{bean.volume}`是一个`BigDecimal`。\n\
    \n请注意，您可以直接在`BigDecimal`属性上使用`<f:validateLongRange>`。它不关心属性的实际`java.lang.Number`类型是否为`Long`，只关心指定的`minimum`和`maximum`属性是否为`Long`。如果您想指定基于小数的数值作为最小值和/或最大值，请改用`<f:validateDoubleRange>`。\n\
    \n### `<f:validateLength>` / `<f:validateRegex>`\n\n这两个验证器主要针对`java.lang.String`类型的属性设计。`<f:validateLength>`会先通过调用`Object#toString()`将提交的值转换为字符串，然后根据指定的`minimum`和/或`maximum`属性验证`String#length()`的结果。`<f:validateRegex>`会先将提交的值强制转换为`String`，然后检查`String#matches()`是否对指定的`pattern`属性返回`true`。换句话说，它不接受除`java.lang.String`以外的任何属性类型。假设您想验证一个值始终为三位数字，那么有三种可能的方式：\n\
    \n`maxlength=\"3\"`属性仅用于确保最终用户在客户端无法输入超过三个字符。将数字存储为字符串毫无意义，因此第二种方式被排除。剩下第一种或第三种方式。从技术上讲，选择哪一种并不重要。第一种方式可能更具自文档性，因为您实际上是想验证长度，而不是范围。\n\
    \n回到`<f:validateRegex>`，`pattern`属性遵循与`java.util.regex.Pattern`中指定的完全相同的正则表达式规则^([^(33)](#fn33))。但有一个潜在的陷阱：所需的转义反斜杠数量取决于当前使用的EL实现。在Oracle的EL实现（`com.sun.el.*`）中，您需要两个反斜杠，与常规Java\
    \ `String`中一样；但在Apache的EL实现（`org.apache.el.*`）中，您必须使用一个反斜杠；否则，它会报错或无法按预期匹配。截至目前，Payara、WildFly、Liberty和WebLogic使用Oracle的EL实现，而TomEE和Tomcat使用Apache的EL实现。换句话说，以下示例在使用Oracle\
    \ EL的服务器上可以工作，但在使用Apache EL的服务器上无法工作。"
  raw: "The `pattern`\nattribute   of `<f:convertDateTime>`\nfollows, for `java.util.Date`,\
    \ the\nsame rules as specified in the `java.text.SimpleDateFormat`\nJavadoc,^([^(27)](#fn27))\
    \ and for the `java.time` API, the\nsame rules as specified in `java.time.format.DateTimeFormatter`\n\
    Javadoc.^([^(28)](#fn28)) They are for the most part\nthe same, but the `java.time`\
    \ format\nsupports more patterns. For both APIs, the “day of month” pattern\n\
    character is “`d`”, the “month of\nyear” pattern character is “`M`”, the “year”\n\
    pattern character is “`y`”, the “24h hour”\npattern character is “`H`”, the “minute”\n\
    pattern is “`m`”,\nand the “second” pattern is “`s`”. The ISO 8601 date\nformat\
    \ is “`yyyy-MM-dd`”, and the\nISO 8601 time format is “`HH:mm:ss`”. The offset\n\
    and zoned times require an additional offset after the time part, which\nis represented\
    \ by the ISO 8601 time zone pattern character “`X`”. Examples of valid\nvalues\
    \ are “`+01:00`” for CET\n(Central European Time), “`-03:00`” for BRT\n(Brasilia\
    \ Time), and “`+5:30`” for IST\n(Indian Standard Time). As before, the offset\
    \ and zoned date and time\nneed to be separated by the “`T`” character instead\n\
    of a space. The following is an overview of all possible `<f:convertDateTime>`\n\
    types whereby the localized ones have an explicitly specified pattern:\n\nNote\
    \ that `<h:messages>` is\nhere reconfigured to show the detail instead of just\
    \ the summary,\nbecause the detail message of a date time conversion error includes\
    \ in\nstandard Jakarta Faces an example value that is more useful for the end\n\
    user in order to understand the required format. The following is what\nthe associated\
    \ backing bean looks like:\n\n```\n@Named @RequestScoped\npublic class Bean {\n\
    private Date date;\nprivate Date time;\nprivate Date both;\nprivate LocalDate\
    \ localDate;\nprivate LocalTime localTime;\nprivate LocalDateTime localDateTime;\n\
    private OffsetTime offsetTime;\nprivate OffsetDateTime offsetDateTime;\nprivate\
    \ ZonedDateTime zonedDateTime;\npublic void submit() {\nSystem.out.println(\"\
    date: \" + date);\nSystem.out.println(\"time: \" + time);\nSystem.out.println(\"\
    both: \" + both);\nSystem.out.println(\"localDate: \" + localDate);\nSystem.out.println(\"\
    localTime: \" + localTime);\nSystem.out.println(\"localDateTime: \" + localDateTime);\n\
    System.out.println(\"offsetTime: \" + offsetTime);\nSystem.out.println(\"offsetDateTime:\
    \ \" + offsetDateTime);\nSystem.out.println(\"zonedDateTime: \" + zonedDateTime);\n\
    }\n// Add/generate getters and setters.\n}\n```\n\nNow that HTML5 has been out\
    \ for some time and more and more browsers\nsupport the new HTML5 date and time\
    \ inputs, you’d better activate it by\ndefault because it comes with a very useful\
    \ built-in date picker. The\nweb browser may show the date pattern in the date\
    \ picker in a localized\nformat, but it will always submit the value in ISO 8601\
    \ format. This is\nthus very useful. The HTML5 date and time inputs can be activated\
    \ by\nsetting the `type` attribute of the\ninput text field to “`date`”,^([^(29)](#fn29))\
    \ “`time`”,^([^(30)](#fn30)) or “`datetime-local`”^([^(31)](#fn31)). The following\
    \ are some\nexamples:\n\nThe following\nis how they’re rendered in Chrome browser\
    \ (with newlines added):\n![](images/454457_2_En_5_Chapter/454457_2_En_5_Figa_HTML.jpg)\n\
    \nStandard Validators\n\nWhen the submitted value is successfully converted during\
    \ the process\nvalidations phase (third phase), then Jakarta Faces will immediately\n\
    advance to perform validation on the converted value. Jakarta Faces\nalready provides\
    \ a handful of standard validators out of the box. They\nare all available in\
    \ the `jakarta.faces.validator`\npackage,^([^(32)](#fn32)) and they all implement\
    \ the\n`Validator<T>`\ninterface. Table [5-3](#454457_2_En_5_Chapter.xhtml#Tab3)\
    \ provides an\noverview of them.\n\nTable 5-3\nStandard Validators Provided by\
    \ Jakarta Faces\n\nValidator class |\n Validator ID |\n Validator tag |\n Value\
    \ type |\n Since |\n\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\
    \ --- | --- |\n\nLongRangeValidator |\n jakarta.faces.LongRange |\n <f:validateLongRange>\
    \ |\n java.lang.Number |\n 1.0 |\n\nDoubleRangeValidator |\n jakarta.faces.DoubleRange\
    \ |\n <f:validateDoubleRange> |\n java.lang.Number |\n 1.0 |\n\nLengthValidator\
    \ |\n jakarta.faces.Length |\n <f:validateLength> |\n java.lang.Object |\n 1.0\
    \ |\n\nRegexValidator |\n jakarta.faces.RegularExpression |\n <f:validateRegex>\
    \ |\n java.lang.String |\n 2.0 |\n\nRequiredValidator |\n jakarta.faces.Required\
    \ |\n <f:validateRequired> |\n java.lang.Object |\n 2.0 |\n\nBeanValidator |\n\
    \ jakarta.faces.Bean |\n <f:validateBean> |\n java.lang.Object |\n 2.0 |\n\nn/a\
    \ |\n n/a |\n <f:validateWholeBean> |\n java.lang.Object |\n 2.3 |\n\nThe “Validator\
    \ ID” column basically specifies the validator\nidentifier as you could specify\
    \ in the `validator` attribute\nof any `EditableValueHolder`\ncomponent, or in\
    \ the `validatorId` attribute\nof any nested `<f:validator>`\ntag in order to\
    \ activate the specific validator. In contrary to the\nconverter, a single `EditableValueHolder`\n\
    component can have multiple validators attached. They will all be\nexecuted regardless\
    \ of each other’s outcome.\n\n<f:validateLongRange>/<f:validateDoubleRange>\n\n\
    These two validators allow you to specify a minimum and/or a maximum\nallowed\
    \ number value for an input\ncomponent tied to a `java.lang.Number`-based\nproperty.\
    \ Those can be specified with the `minimum` and `maximum` attributes.\n\nThis\
    \ is, via pass-through attributes, also combinable with the HTML5\ninput types\
    \ “`number`” (spinner) and\n“`range`”\n(slider), which in turn require `min`,\
    \ `max`, and optionally\n`step` as\npass-through attributes. In this example,\
    \ `#{bean.quantity}` is\njust an `Integer`, and `#{bean.volume}` is a\n`BigDecimal`.\n\
    \nDo note that you can just use `<f:validateLongRange>`\non a `BigDecimal`\nproperty.\
    \ It doesn’t care about the actual `java.lang.Number` type\nof the property being\
    \ a `Long` or not, but only the\nspecified `minimum` and `maximum` attributes\n\
    being a `Long`.\nIn case you want to specify a fractional-based number as minimum\
    \ and/or\nmaximum, then use `<f:validateDoubleRange>`\ninstead.\n\n<f:validateLength>/<f:validateRegex>\n\
    \nThese two validators are primarily designed for `java.lang.String`-based\nproperties.\
    \ The\n`<f:validateLength>`\nwill first convert the submitted value to string\
    \ by calling `Object#toString()` on\nit and then validate the result of `String#length()`\
    \ based\non the specified `minimum` and/or `maximum` attributes.\nThe `<f:validateRegex>`\n\
    will first cast the submitted value to `String` and then check\nif `String#matches()`\n\
    returns `true`\nfor the specified `pattern` attribute. In\nother words, it doesn’t\
    \ accept any other property type than `java.lang.String`.\nImagine that you want\
    \ to validate a value to be always three digits;\nthen there are thus three possible\
    \ ways:\n\nThe `maxlength=\"3\"`\nattribute  is just\nthere so that the end user\
    \ can’t enter more than three characters on the\nclient side anyway. Storing numbers\
    \ as strings is plain nonsense, so the\nsecond way is scratched. That leaves us\
    \ with the first or third way.\nTechnically, it does not really matter which one\
    \ you pick. The first way\nis arguably more self-documenting because you actually\
    \ want to validate\nthe length, not the range.\n\nComing back to the `<f:validateRegex>`,\n\
    the `pattern`\nattribute follows exactly the same regular expression rules as\
    \ specified\nin `java.util.regex.Pattern`.^([^(33)](#fn33)) However, there’s one\n\
    potential caveat: the necessary amount of escape backslashes depends on\nthe currently\
    \ used EL implementation. In Oracle’s EL implementation\n(`com.sun.el.*`),\nyou\
    \ need two backslashes, exactly as in a regular Java `String`, but in\nApache’s\
    \ EL implementation (`org.apache.el.*`), you\nmust use one backslash; otherwise,\
    \ it will error out, or it won’t match\nas you’d expect. As of now, Payara, WildFly,\
    \ Liberty, and WebLogic use\nOracle’s EL implementation, and TomEE and Tomcat\
    \ use Apache’s EL\nimplementation. In other words, the following example will\
    \ work on\nservers using Oracle EL, but won’t work on servers using Apache EL."
  trans: "\n`<f:convertDateTime>` 的 `pattern` 属性，对于 `java.util.Date`，遵循 `java.text.SimpleDateFormat`\
    \ Javadoc 中指定的相同规则，^(²⁷) 而对于 `java.time` API，则遵循 `java.time.format.DateTimeFormatter`\
    \ Javadoc 中指定的相同规则。^(²⁸) 它们大部分相同，但 `java.time` 格式支持更多模式。对于这两个 API，“月份中的日”模式字符是“`d`”，“年份中的月”模式字符是“`M`”，“年份”模式字符是“`y`”，“24\
    \ 小时制”模式字符是“`H`”，“分钟”模式是“`m`”，“秒”模式是“`s`”。ISO 8601 日期格式是“`yyyy-MM-dd`”，ISO 8601\
    \ 时间格式是“`HH:mm:ss`”。偏移时间和带时区的时间需要在时间部分之后增加一个偏移量，该偏移量由 ISO 8601 时区模式字符“`X`”表示。有效值的示例包括：CET（欧洲中部时间）的“`+01:00`”，BRT（巴西利亚时间）的“`-03:00`”，以及\
    \ IST（印度标准时间）的“`+5:30`”。与之前一样，偏移时间和带时区的日期时间需要用“`T`”字符分隔，而不是空格。以下是所有可能的 `<f:convertDateTime>`\
    \ 类型的概览，其中本地化类型具有显式指定的模式：\n\n请注意，此处重新配置了 `<h:messages>` 以显示详细信息而非仅显示摘要，因为在标准 Jakarta\
    \ Faces 中，日期时间转换错误的详细信息消息包含一个示例值，该值对于最终用户理解所需格式更为有用。以下是关联的后台 Bean 的外观：\n\n```\n\
    @Named @RequestScoped\npublic class Bean {\nprivate Date date;\nprivate Date time;\n\
    private Date both;\nprivate LocalDate localDate;\nprivate LocalTime localTime;\n\
    private LocalDateTime localDateTime;\nprivate OffsetTime offsetTime;\nprivate\
    \ OffsetDateTime offsetDateTime;\nprivate ZonedDateTime zonedDateTime;\npublic\
    \ void submit() {\nSystem.out.println(\"date: \" + date);\nSystem.out.println(\"\
    time: \" + time);\nSystem.out.println(\"both: \" + both);\nSystem.out.println(\"\
    localDate: \" + localDate);\nSystem.out.println(\"localTime: \" + localTime);\n\
    System.out.println(\"localDateTime: \" + localDateTime);\nSystem.out.println(\"\
    offsetTime: \" + offsetTime);\nSystem.out.println(\"offsetDateTime: \" + offsetDateTime);\n\
    System.out.println(\"zonedDateTime: \" + zonedDateTime);\n}\n// 添加/生成 getter 和\
    \ setter 方法。\n}\n```\n\n既然 HTML5 已经发布了一段时间，并且越来越多的浏览器支持新的 HTML5 日期和时间输入，你最好默认启用它，因为它附带了一个非常有用的内置日期选择器。Web\
    \ 浏览器可能会以本地化格式在日期选择器中显示日期模式，但它始终会以 ISO 8601 格式提交值。因此，这非常有用。HTML5 日期和时间输入可以通过将输入文本字段的\
    \ `type` 属性设置为“`date`”，^(²⁹) “`time`”，^(³⁰) 或 “`datetime-local`”^(³¹) 来激活。以下是一些示例：\n\
    \n以下是在 Chrome 浏览器中它们的渲染方式（添加了换行符）：\n![](img/454457_2_En_5_Figa_HTML.jpg)\n\n标准验证器\n\
    \n当提交的值在流程验证阶段（第三阶段）成功转换后，Jakarta Faces 将立即对转换后的值进行验证。Jakarta Faces 已经提供了一些开箱即用的标准验证器。它们都在\
    \ `jakarta.faces.validator` 包中，^(³²) 并且都实现了 `Validator<T>` 接口。表 5-3 提供了它们的概览。\n\
    \n表 5-3 Jakarta Faces 提供的标准验证器\n\n验证器类 |\n 验证器 ID |\n 验证器标签 |\n 值类型 |\n 自版本 |\n\
    \n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\nLongRangeValidator\
    \ |\n jakarta.faces.LongRange |\n <f:validateLongRange> |\n java.lang.Number |\n\
    \ 1.0 |\n\nDoubleRangeValidator |\n jakarta.faces.DoubleRange |\n <f:validateDoubleRange>\
    \ |\n java.lang.Number |\n 1.0 |\n\nLengthValidator |\n jakarta.faces.Length |\n\
    \ <f:validateLength> |\n java.lang.Object |\n 1.0 |\n\nRegexValidator |\n jakarta.faces.RegularExpression\
    \ |\n <f:validateRegex> |\n java.lang.String |\n 2.0 |\n\nRequiredValidator |\n\
    \ jakarta.faces.Required |\n <f:validateRequired> |\n java.lang.Object |\n 2.0\
    \ |\n\nBeanValidator |\n jakarta.faces.Bean |\n <f:validateBean> |\n java.lang.Object\
    \ |\n 2.0 |\n\nn/a |\n n/a |\n <f:validateWholeBean> |\n java.lang.Object |\n\
    \ 2.3 |\n\n“验证器 ID”列基本上指定了验证器标识符，你可以在任何 `EditableValueHolder` 组件的 `validator`\
    \ 属性中，或任何嵌套的 `<f:validator>` 标签的 `validatorId` 属性中指定该标识符，以激活特定的验证器。与转换器相反，单个 `EditableValueHolder`\
    \ 组件可以附加多个验证器。无论彼此的结果如何，它们都将被执行。\n\n<f:validateLongRange>/<f:validateDoubleRange>\n\
    \n这两个验证器允许你为绑定到基于 `java.lang.Number` 的属性的输入组件指定允许的最小和/或最大数值。这些可以通过 `minimum` 和\
    \ `maximum` 属性来指定。\n\n通过传递属性，这也可以与 HTML5 输入类型“`number`”（微调器）和“`range`”（滑块）结合使用，后者又需要\
    \ `min`、`max` 以及可选的 `step` 作为传递属性。在此示例中，`#{bean.quantity}` 只是一个 `Integer`，而 `#{bean.volume}`\
    \ 是一个 `BigDecimal`。\n\n请注意，你可以直接在 `BigDecimal` 属性上使用 `<f:validateLongRange>`。它不关心属性的实际\
    \ `java.lang.Number` 类型是否为 `Long`，而只关心指定的 `minimum` 和 `maximum` 属性是否为 `Long`。如果你想指定一个基于小数的数字作为最小值和/或最大值，请改用\
    \ `<f:validateDoubleRange>`。\n\n<f:validateLength>/<f:validateRegex>\n\n这两个验证器主要设计用于基于\
    \ `java.lang.String` 的属性。`<f:validateLength>` 将首先通过调用 `Object#toString()` 将提交的值转换为字符串，然后根据指定的\
    \ `minimum` 和/或 `maximum` 属性验证 `String#length()` 的结果。`<f:validateRegex>` 将首先将提交的值强制转换为\
    \ `String`，然后检查 `String#matches()` 对于指定的 `pattern` 属性是否返回 `true`。换句话说，它不接受除 `java.lang.String`\
    \ 之外的任何其他属性类型。假设你想验证一个值始终为三位数字；那么有三种可能的方式：\n\n`maxlength=\"3\"` 属性只是为了让最终用户在客户端无法输入超过三个字符。将数字存储为字符串是毫无意义的，因此第二种方式被排除。这给我们留下了第一种或第三种方式。从技术上讲，你选择哪一种并不重要。第一种方式可以说更具自文档性，因为你实际上想要验证的是长度，而不是范围。\n\
    \n回到 `<f:validateRegex>`，`pattern` 属性完全遵循 `java.util.regex.Pattern` 中指定的正则表达式规则。^(³³)\
    \ 然而，有一个潜在的陷阱：所需的转义反斜杠数量取决于当前使用的 EL 实现。在 Oracle 的 EL 实现（`com.sun.el.*`）中，你需要两个反斜杠，就像在常规的\
    \ Java `String` 中一样；但在 Apache 的 EL 实现（`org.apache.el.*`）中，你必须使用一个反斜杠；否则，它会出错，或者无法按预期匹配。截至目前，Payara、WildFly、Liberty\
    \ 和 WebLogic 使用 Oracle 的 EL 实现，而 TomEE 和 Tomcat 使用 Apache 的 EL 实现。换句话说，以下示例在使用\
    \ Oracle EL 的服务器上可以工作，但在使用 Apache EL 的服务器上无法工作。\n"
- fmt: 'When using Apache EL, you need `pattern="\d{3}"` instead. On the other hand,
    the regular expression pattern `\d` actually means “any digit” and thus matches
    not only the Latin digits but also the Hebrew, Cyrillic, Arabic, Chinese, etc.
    If that was not your intent, then you’d better use the `[0-9]` pattern.


    ## `<f:validateRequired>`


    This is a slightly odd beast. That is, all `UIInput` components already have a
    `required` attribute offering exactly the desired functionality. Why would you
    then use a whole `<f:validateRequired>` tag instead? It was added in Jakarta Faces
    2.0 specifically for “Composite Components” (more on this later, in Chapter [7](#454457_2_En_7_Chapter.xhtml)).
    More to the point, in some composite component compositions, the template client
    is given the opportunity to attach converters and validators to a specific `EditableValueHolder`
    interface exposed by the composite component, which in turn references one or
    more `UIInput` components enclosed in the composite component implementation.
    The following is an example of such a composite component:


    ```

    ...

    ...

    ...

    ```


    And the following is an example of the template client using this composite component:


    As you might have guessed, the `for` attribute must exactly match the `name` attribute
    of exposed `<cc:editableValueHolder>`, and this validator will basically target
    the enclosed input components identified by `input1` and `input3` (and thus not
    `input2`) and thus effectively make them `required="true"`. This `for` attribute
    is, by the way, also present on all other converter and validator tags.


    ## `<f:validateBean>` / `<f:validateWholeBean>`


    When used, these two tags have a required dependency on the Jakarta Bean Validation
    API (application programming interface), previously more commonly known as “JSR
    303” and “Jakarta Bean Validation.” Like Jakarta Faces, Jakarta Bean Validation
    is part of the Jakarta EE API, already included in any Jakarta EE application
    server. In Tomcat and other servlet containers, you’d need to install it separately.
    In Java code, Jakarta Bean Validation is represented by annotations and interfaces
    of the `jakarta.validation.*` package, such as `@NotNull`, `@Size`, `@Pattern`,
    and `ConstraintValidator`. Currently, the most popular implementation is Hibernate
    Validator.^([^(34)](#fn34))


    Jakarta Faces automatically detects the presence of Jakarta Bean Validation and
    will in such a case transparently process all Jakarta Bean Validation constraints
    during the end of the process validations phase (third phase), regardless of the
    outcome of Jakarta Faces’ own validators. If desired, this can be disabled application-wide
    with the following context parameter in `web.xml`:


    ```

    jakarta.faces.validator.DISABLE_DEFAULT_BEAN_VALIDATOR

    true

    ```


    Or if this is a little too rough, then you can fine-grain it with the help of
    the `<f:validateBean>` tag wrapping a group of `UIInput` components, or nested
    in them. When the `disabled` attribute of the `<f:validateBean>` tag is set to
    `true`, then any Jakarta Bean Validation will be disabled on the target `UIInput`
    components. The following code will disable any Jakarta Bean Validation only on
    the parent `UIInput` component.


    And the following code will disable any Jakarta Bean Validation only on `UIInput`
    components identified by `input3`, `input4`, and `input5`:


