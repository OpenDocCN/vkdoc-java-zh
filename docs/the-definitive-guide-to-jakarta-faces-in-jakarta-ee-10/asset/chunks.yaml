- fmt: "then they would all end up in the component tree roughly as follows:\n\nYou\
    \ see, this will thus end up in an unnecessarily bloated component tree with a\
    \ lot of unused components when you have many of `<t:input>` custom tags. It’s\
    \ therefore much better to use `<c:choose>` instead of `rendered` attribute here,\
    \ particularly when the `type` attribute is actually static (i.e., it does not\
    \ ever change, at least during the view scope).\n\n```\nversus \n```\n\nThey are\
    \ not interchangeable. The `<c:set>` can be used anywhere in a Facelets file,\
    \ and it sets a variable in the EL scope, which is accessible only after the tag\
    \ location during the view build time, but anywhere else in the view during the\
    \ view render time. The `<ui:param>` should only be nested in `<ui:include>`,\
    \ `<ui:decorate template>`, or `<ui:composition template>`, and it sets a variable\
    \ in the EL scope of the Facelets template, which is accessible only in the template\
    \ itself. Older Jakarta Faces versions had bugs whereby the `<ui:param>` variable\
    \ was also available outside the Facelets template in question. This should never\
    \ be relied upon.\n\nThe `<c:set>` without a `scope` attribute will behave like\
    \ an alias. It does not cache the result of the EL expression in any scope. Its\
    \ primary purpose is to be able to have a shortcut to a relatively long EL expression\
    \ that is repeated several times in the same Facelets file. It can thus be used\
    \ perfectly well inside iterating Jakarta Faces components:\n\n```\n#{price}\n\
    ```\n\nIt’s only not suitable for calculating the sum in a loop. The following\
    \ construct will never work:\n\n```\n#{product.price}\n\nTotal price: #{total}\n\
    ```\n\nFor that, use EL 3.0 stream API instead.\n\n```\n#{product.price}\n\nTotal\
    \ price: #{bean.products.stream().map(product->product.price).sum()}\n```\n\n\
    However, when you set the `scope` attribute with one of allowable values, `request`,\
    \ `view`, `session`, or `application`, then it will be evaluated immediately during\
    \ the view build time and stored in the specified scope.\n\n```\nThis will be\
    \ evaluated only once during the first time this view is being built, and the\
    \ value will in this example be available as an EL variable `#{DEV}` throughout\
    \ the entire application. You’d best declare such `<c:set>` somewhere on top of\
    \ the master template file that is used by every single Facelets file in the entire\
    \ application. Note that the EL variable is capitalized to conform to Java naming\
    \ conventions for constants.\n\nCAVEATS\n\nUsing Jakarta Tags will only lead to\
    \ unexpected results when a Jakarta Tags attribute references an EL variable that\
    \ is not available during Jakarta Faces view build time. Examples of such EL variables\
    \ are those defined by `var` attribute of iterating components such as `<h:dataTable>`\
    \ and `<ui:repeat>` and those set in model by `<f:viewParam>`, `<f:viewAction>`,\
    \ and `<f:event type=\"preRenderView\">`. In a nutshell, use Jakarta Tags only\
    \ to control the flow of Jakarta Faces component tree building and use Jakarta\
    \ Faces UI components only to control the flow of HTML output generation. In Jakarta\
    \ Tags, do not rely on EL variables that are not available during view build time.\n\
    \nManipulating the Component Tree\n\nThis can be done declaratively using Jakarta\
    \ Tags as well as programmatically using Java code. The Jakarta Tags approach\
    \ has already been elaborated in the previous section. It’s also possible to use\
    \ Java code instead. As a precaution, this generally ends up in very verbose and\
    \ hard-to-maintain code. Tree-based hierarchies in code are best readable and\
    \ maintainable when using a hierarchical markup language such as XML. Facelets\
    \ itself is already XML based. Jakarta Tags is also XML based and therefore seamlessly\
    \ integrates in a Facelets file. Jakarta Tags is therefore the recommended approach\
    \ to dynamically manipulate the component tree, rather than Java code.\n\nThe\
    \ Javadoc of `jakarta.faces.component.UIComponent`^([^(11)](#fn11)) specifies\
    \ when you could safely manipulate the component tree:\n\n*Dynamically modifying\
    \ the component tree can happen at any time, during and after restoring the view,\
    \ but not during state saving and needs to function properly with respect to rendering\
    \ and state saving.*\n\nIn other words, the earliest moment when you can guaranteedly\
    \ safely modify the component tree is during the `PostAddToViewEvent`, and the\
    \ latest moment when you can guaranteedly safely modify the component tree is\
    \ during the `PreRenderViewEvent`. Any moment in between is thus also possible.\
    \ Before the `PostAddToViewEvent`, there’s not necessarily a means of a concrete\
    \ `UIViewRoot` instance. After the `PreRenderViewEvent`, there’s a risk that the\
    \ view state is already saved, and you’d rather not get trapped here because the\
    \ view state is the one that contains all the information about any dynamic changes\
    \ to the component tree. In other words, manipulating the component tree during\
    \ the render response phase (sixth phase) is a bad idea. When you intend to manipulate\
    \ the building of the component tree by means of adding new components based on\
    \ a Java model that is at least view scoped, then listen on the `PostAddToViewEvent`\
    \ of the parent component of interest. When you intend to manipulate an already-built\
    \ component tree by means of adding, moving, or removing components, then listen\
    \ on the `PreRenderViewEvent` of the `UIViewRoot`.\n\nThe following example programmatically\
    \ populates a dynamic form based on a Java model during the `PostAddToViewEvent`:\n\
    \nwherein the `#{dynamicForm}` looks something like the following:\n\n```\n@Named\
    \ @RequestScoped\npublic class DynamicForm {\nprivate transient UIForm form;\n\
    private Map values = new HashMap();\n@Inject\nprivate FieldService fieldService;\n\
    public void populate(ComponentSystemEvent event) {\nform = (UIForm) event.getComponent();\n\
    List fields = fieldService.list(form.getId());\nfields.forEach(field -> field.populate(this));\n\
    }\npublic void createOutputLabel(Field field) {\nHtmlOutputLabel label = new HtmlOutputLabel();\n\
    label.setId(field.getName() + \"_l\");\nlabel.setFor(field.getName());\nlabel.setValue(field.getLabel());\n\
    form.getChildren().add(label);\n}\npublic void createInputText(Field field) {\n\
    HtmlInputText text = new HtmlInputText();\ntext.setId(field.getName()); // Explicit\
    \ ID is required!\ntext.setLabel(field.getLabel());\ntext.setValueExpression(\"\
    value\", createValueExpression(field));\nform.getChildren().add(text);\n}\npublic\
    \ void createMessage(Field field) {\nHtmlMessage message = new HtmlMessage();\n\
    message.setId(field.getName() + \"_m\");\nmessage.setFor(field.getName());\nform.getChildren().add(message);\n\
    }\npublic static ValueExpression createValueExpression(Field field) {\nString\
    \ el = \"#{dynamicForm.values['\" + field.getName() + \"']}\"\nFacesContext context\
    \ = FacesContext.getCurrentInstance();\nELContext elContext = context.getELContext();\n\
    return context.getApplication().getExpressionFactory()\n.createValueExpression(elContext,\
    \ el, Object.class);\n}\npublic Map getValues() {\nreturn values;\n}\n}\n```\n\
    \nand wherein the abstract class `Field` represents your custom model of a form\
    \ field with at least `type`, `name`, and `label` properties and the concrete\
    \ implementation of a `TextField#populate()` looks something like the following:\n\
    \n```\npublic void populate(DynamicFormBean form) {\nform.createOutputLabel(this);\n\
    form.createInputText(this);\nform.createMessage(this);\n}\n```\n\nNote the naming\
    \ pattern of concrete `UIComponent` classes. For HTML components, they follow\
    \ exactly the convention “`Html[TagName]`”. For the `<h:inputText>`, that’s thus\
    \ `HtmlInputText` and so on. The preceding Java example will basically create\
    \ the following XML representation:\n\nIt only does that quite verbosely. Essentially,\
    \ you’re here reinventing the job of Facelets. There’s really nothing which is\
    \ impossible using XML and only possible in Java. As long as you understand how\
    \ you can use Jakarta Tags for this:\n\nwherein the `#{dynamicForm}` instead looks\
    \ something like the following:"
