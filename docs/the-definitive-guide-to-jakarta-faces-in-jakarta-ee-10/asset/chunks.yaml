    `代替`<f:param>`是行不通的。技术原因是`<f:param>`在表单的渲染响应阶段立即执行，远在最终用户按下删除按钮之前。因此，在最终用户按下删除按钮时，它能保证持有正确的值。相反，EL方法参数仅在最终用户按下删除按钮后的回传请求中才被评估。如果在此期间模型发生了变化，那么当特定产品的迭代索引改变时，它就会评估为错误的ID。\n\
    \n如本节开头所述，标准 Jakarta Faces 视图作用域 Bean 管理机制有两个主要缺点：第一，当最终用户卸载网页时，实例不会立即过期，而是滞留在\
    \ HTTP 会话中；第二，即使启用了客户端状态保存，它们仍存储在 HTTP 会话中。这些问题目前尚未在标准 Jakarta Faces API 中得到解决。\n\
    \n目前，Jakarta Faces 实用库 OmniFaces 提供了一个增强的`@ViewScoped`注解，解决了这两个缺点。^([^(75)](#fn75))\
    \ 使用`@org.omnifaces.cdi.ViewScoped`注解的视图作用域托管 Bean 在用户卸载页面时会被实际销毁。这底层是通过 JavaScript\
    \ 中的`Navigator.sendBeacon`API^([^(76)](#fn76)) 以及 OmniFaces 提供的专门监听这些卸载请求的`ViewHandler`实现来完成的。已有大量使用视图作用域托管\
    \ Bean 的生产应用程序，在从标准 Jakarta Faces `@ViewScoped`切换到 OmniFaces `@ViewScoped`后，内存使用量减少了高达\
    \ 80%。这使得“卸载时销毁”功能成为未来版本标准 Jakarta Faces API 的主要候选特性。\n\n为了在启用客户端状态保存时将物理的视图作用域托管\
    \ Bean 保存在 Jakarta Faces 视图状态中，必须将 OmniFaces `@ViewScoped`注解的`saveInViewState`属性设置为`true`。你只需要记住，这些\
    \ Bean 永远不会过期，即使页面被卸载或 HTTP 会话过期也不会。实际上，整个 Bean 在物理上已成为生成的 HTML 输出的一部分，位于`jakarta.faces.ViewState`隐藏输入字段中。社区已有请求，希望使\
    \ Jakarta Faces 状态管理更加灵活，例如在逐视图（每个`UIViewRoot`）甚至逐表单（每个`UIForm`）的基础上切换客户端和服务器端状态保存，并能够将视图作用域托管\
    \ Bean 存储在实际的视图状态中，而不是 HTTP 会话中。这也可能在标准 Jakarta Faces API 的未来版本中重新考虑。\n\n## `@RequestScoped`\n\
    \n请求作用域托管 Bean 主要与 HTTP 请求的生命周期绑定，这对 Jakarta Faces 来说是最重要的情况。其他情况包括会话 Bean 上异步方法调用（由`@Asynchronous`注解的方法）的生命周期、定时器超时方法，或消息驱动\
    \ Bean（MDB）处理消息时的生命周期，所有这些都在 Jakarta Enterprise Beans（以前称为 Jakarta Enterprise\
    \ Beans）中。请注意，Ajax 请求也计为单个 HTTP 请求。\n\n当客户端向服务器发送 HTTP 请求时，Servlet 容器会创建代表 HTTP\
    \ 请求和响应的`HttpServletRequest`和`HttpServletResponse`实例，并将它们传递给认证模块、Servlet 过滤器和\
    \ Servlet。在所有认证模块、Servlet 过滤器和 Servlet 完成请求和响应的处理后，它们会立即被销毁。换句话说，每个 HTTP 请求都会创建一个新的请求作用域托管\
    \ Bean 实例，该实例仅在该请求期间可用，而在其他请求中不可用。\n\n请求作用域托管 Bean 适用于简单且静态的表单，这些表单没有任何动态的基于 Ajax\
    \ 的更新，对于这种情况你更可能使用视图作用域托管 Bean。可以想象一个登录表单或联系表单。\n\n```java\n@Named @RequestScoped\n\
    public class Login {\n    private String username;\n    private String password;\n\
    \    // ...\n}\n```\n\n当然，这些表单也可以绑定到视图作用域托管 Bean 而不会出现问题，但这会浪费内存空间。请注意，你绝对不应该将\
    \ Jakarta Persistence 实体本身作为托管 Bean。换句话说，以下方法实际上是错误的：\n\n```java\n@Named @RequestScoped\
    \ // or @Model\n@Entity\npublic class Product {\n    // ...\n}\n```\n\n这不仅违反了迪米特法则^([^(77)](#fn77))，而且还存在\
    \ Jakarta Persistence 无法持久化它的风险，因为 CDI 实际上将托管 Bean 包装在代理类中，而当你试图将注入的实例传递给实体管理器时，Jakarta\
    \ Persistence 将无法从中获取实体信息。在这种情况下，Hibernate 会抛出“`Unknown entity: com.example.Entity$Proxy$_$$_WeldClientProxy`”，这实际上代表\
    \ CDI 代理类。\n\n此时你可能想知道 CDI 究竟是如何工作的。首先，在 Web 应用程序启动期间，它会收集所有使用 CDI 兼容作用域注解标注的类。然后，它会为所有这些类生成代理类。最终，这些代理类的实例被注入。给定一个示例\
    \ Bean 类`com.example.Bean`，生成的 CDI 代理类可能如下所示：\n\n```java\npublic class Bean$Proxy$_$$_CDI\
    \ extends Bean implements Serializable {\n    public String getSomeProperty()\
    \ {\n        Bean actualInstance = CDI.resolveItSomehow();\n        return actualInstance.getSomeProperty();\n\
    \    }\n    public void setSomeProperty(String someProperty) {\n        Bean actualInstance\
    \ = CDI.resolveItSomehow();\n        actualInstance.setSomeProperty(someProperty);\n\
    \    }\n}\n```"
