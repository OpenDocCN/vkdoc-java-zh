    Jakarta Faces 1.x 中并不容易保证。Jakarta Faces 2.0 为此引入了所谓的视图作用域，优雅地解决了这个问题。自定义组件的创建，这是
    Jakarta Faces 1.x 的另一个问题领域，也变得更加简单。Jakarta Faces 2.0 还引入了对 AJAX 的核心支持（其模型借鉴了 Ajax4Jsf
    的工作方式）、一个资源 API、系统事件以及其他一些功能。


    Jakarta Faces 2.0 的目标之一——使其托管 Bean 设施可在 Jakarta Faces 之外使用——通过 CDI 规范间接实现了，该规范与
