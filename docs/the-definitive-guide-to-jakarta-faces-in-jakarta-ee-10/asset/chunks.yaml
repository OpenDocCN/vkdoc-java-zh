- fmt: "注意，主模板文件和包含文件明确放置在`/WEB-INF`文件夹中。这样做是为了防止用户通过猜测URL路径直接访问。另外请注意，页面标题被声明为一个简单的EL（表达式语言）表达式`#{title}`，而不是`<ui:insert>`。也就是说，`<title>`元素中不允许有任何标记。\n\
    \n`xmlns`属性通过URI（统一资源标识符）基本定义了在声明的XML命名空间中可以使用哪些标签。默认的根XML命名空间URI是W3 XHTML标准[`http://www.w3.org/1999/xhtml`](http://www.w3.org/1999/xhtml)，它定义了“任何XHTML和HTML5+标签”，例如前面示例中的`<html>`、`<title>`、`<header>`、`<main>`和`<footer>`。Facelets编译器知道这个标准XML命名空间，并将所有元素作为“通用UI指令”传递。在Facelets文件中不必显式声明根XML命名空间。只有像IDE这样的工具可能需要它们来实现正确的代码补全，但Jakarta\
    \ Faces本身不要求在Facelet中存在根XML命名空间。\n\n“`h`”XML命名空间指定了HTML标签库URI，“`ui`”XML命名空间指定了Facelets标签库URI，它们都存在于Jakarta\
    \ Faces实现的JAR文件中，并在Web应用程序启动时注册到Facelets。Facelets编译器可以通过这种方式找到关联的标签处理器、组件和复合组件，这些组件进而负责构建视图、解码HTTP请求和编码HTTP响应。这些URI并非严格意义上的实时互联网地址。您甚至可以通过`*.taglib.xml`文件指定自己的URI。这将在后面的“标签文件”部分展开说明。\n\
    \n以下是包含文件`/WEB-INF/includes/layout/header.xhtml`的内容：\n\n注意徽标周围的链接。它指向`#{request.contextPath}/`。这基本上会打印出应用程序根目录的域相对URL。`#{request}`是一个隐式EL对象，引用当前的`HttpServletRequest`实例。`contextPath`引用其属性之一，由`getContextPath()`方法隐含。\n\
    \n以下是包含文件`/WEB-INF/includes/layout/footer.xhtml`的内容：\n\n```\n© Example Company\n\
    ```\n\n最后，模板客户端可以如下所示，例如`/home.xhtml`：\n\n```\nWelcome to Example Company!\nLorem\
    \ ipsum dolor sit amet.\n```\n\n注意`<ui:composition>`的`template`属性。这必须表示主模板的服务器端路径，最好是绝对路径，因此以“`/`”开头。在模板客户端中，`<ui:param>`允许您定义特定于主模板的简单参数。基本上，您可以使用任何参数名称，只要它被主模板支持并且不与现有的受管Bean名称冲突。在此特定情况下，EL变量`#{title}`的值被指定为“Welcome!”。这最终会出现在主模板的`<title>`元素内。\n\
    \n而`<ui:define>`允许您定义特定于主模板的标记块。它最终会出现在主模板中声明了同名`<ui:insert>`的位置。图[7-1](#454457_2_En_7_Chapter.xhtml#Fig1)清晰地概述了这一切是如何组合在一起的。\n\
    \n![](images/454457_2_En_7_Chapter/454457_2_En_7_Fig1_HTML.png)\n\n图7-1 主模板`layout.xhtml`、包含文件`header.xhtml`和`footer.xhtml`以及模板客户端`home.xhtml`之间的关系。请注意，为简洁起见，省略了模板文件路径和一些标签属性。实际编码请参考前面显示的代码片段。\n\
    \n最后，打开`/home.xhtml`应该会生成最终的HTML输出，您可以通过在普通Web浏览器中右键单击“查看页面源代码”来检查。\n\n## 单页应用程序\n\
    \n一个最近的趋势是所谓的单页应用程序（SPA）。这个概念本身并不新鲜；事实上，它比Jakarta Faces本身还要古老，但在“Web 2.0”时代，随着基于JavaScript的框架（如Angular）而广泛流行。基本上，SPA通过在不同页面导航时使用Ajax请求动态更改主要内容，而不是通过GET请求加载整个页面，从而使Web应用程序表现得像桌面应用程序。Gmail就是SPA的一个知名例子。\n\
    \n这种SPA也可以通过Jakarta Faces实现，只需使用`<ui:include>`，其`src`属性由Ajax动态更新。以下是一个示例，使用了与上一节相同的主模板`/spa.xhtml`：\n\
    \n请注意，`<article>`元素被声明为所谓的直通元素，通过显式指定Jakarta Faces标识符`faces:id=\"...\"`。在底层，当声明一个没有Jakarta\
    \ Faces组件等效项的HTML元素（例如`<header>`、`<footer>`、`<main>`、`<article>`和`<section>`）作为直通元素时，它会被转换为`UIPanel`组件，并在Jakarta\
    \ Faces组件树中像`<h:panelGroup>`一样被处理。这样，您可以干净地继续使用语义化HTML5标记，同时仍然能够像引用Jakarta Faces组件一样引用它，从而能够通过Ajax更新它。另请参阅第[6](#454457_2_En_6_Chapter.xhtml)章中的“直通元素”部分。\n\
    \n正如您可能从之前的`/spa.xhtml`示例中解读出的那样，有一个侧边导航菜单，用于设置由`#{spa}`标识的受管Bean中的当前页面，并通过Ajax更新由`id=\"\
    content\"`标识的组件，该组件又包含一个动态包含。前面的示例期望在`/WEB-INF/includes/spa`文件夹中存在以下包含文件：`page1.xhtml`、`page2.xhtml`和`page3.xhtml`。它们每个都是一个简单的包含文件，如下所示：\n\
    \n```\nFirst page\nLorem ipsum dolor sit amet.\n```\n\n与`#{spa}`受管Bean关联的后备Bean相当简单；如下所示：\n\
    \n```\n@Named @ViewScoped\npublic class Spa implements Serializable {\n    private\
    \ String page;\n    @PostConstruct\n    public void init() {\n        page = \"\
    page1\";\n    }\n    public void set(String page) {\n        this.page = page;\n\
    \    }\n    public String getPage() {\n        return page;\n    }\n}\n```"
