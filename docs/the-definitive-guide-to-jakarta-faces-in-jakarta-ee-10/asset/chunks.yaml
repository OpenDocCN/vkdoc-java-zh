    一旦这样的Web片段项目构建为JAR文件并包含在主Web应用程序项目的`/WEB-INF/lib`中，JAR中的资源就可以通过库名称“common”在主Web应用程序项目的Facelets文件中使用，如下所示：


    ## 资源依赖


    在某些情况下，您的自定义组件或渲染器可能依赖于特定的JavaScript或样式表资源，您希望避免最终用户必须通过`<h:outputScript>`或`<h:outputStylesheet>`手动包含它。在这种情况下，您可能会发现`@jakarta.faces.application.ResourceDependency`注解非常有用。假设您希望自动将`common:scripts/some.js`和`common:styles/some.css`与特定的自定义组件一起包含，那么您可以按如下方式操作：


    ```

    @ResourceDependency(library="common", name="some.css", target="head")

    @ResourceDependency(library="common", name="some.js", target="head")

    public class SomeCustomComponent extends UIComponent {

    // ...

    }

    ```


    当然，您也可以在必要时包含Jakarta Faces自身的`jakarta.faces:faces.js`，即当您的自定义组件恰好依赖于例如`faces.ajax.request()`或标准Jakarta
    Faces JavaScript API提供的其他函数时。`jakarta.faces:faces.js`可以按如下方式包含，脚本库和名称作为`ResourceHandler`的常量提供。


    ```

    @ResourceDependency(

    library=ResourceHandler.FACES_SCRIPT_LIBRARY_NAME,

    name=ResourceHandler.FACES_SCRIPT_RESOURCE_NAME,

    target="head")

    public class SomeCustomComponent extends UIComponent {

    // ...

    }

    ```


    ## 脚注


    ### 12. 搜索表达式


    如第[3](#454457_2_En_3_Chapter.xhtml)章的“Ajax生命周期”部分和第[4](#454457_2_En_4_Chapter.xhtml)章的“Ajax化组件”部分所述，`<f:ajax>`标签的`execute`和`render`属性接受一个以空格分隔的所谓组件搜索表达式集合。搜索表达式自Jakarta
    Faces诞生之初就一直存在，因为它被用于`<h:outputLabel>`、`<h:message>`和`<h:messages>`组件的`for`属性中，但直到Jakarta
    Faces 2.0引入`<f:ajax>`后，它们才成为Jakarta Faces开发者的必备知识。也就是说，标签和消息几乎总是与目标输入组件位于同一个命名容器父级中，因此在`for`属性中简单地指定目标输入组件的ID就足够了，但对于`<f:ajax>`的`execute`和`render`属性来说，情况并非必然如此，因为目标组件可能位于不同的命名容器上下文中，甚至位于物理上不同的Facelets文件中。为了克服这些困难，Jakarta
    Faces 2.0引入了一些更抽象的搜索表达式：“`@this`”、“`@form`”、“`@all`”和“`@none`”。像“`@form`”这样的表达式特别易于使用，因为它仅表示定位当前表单。如果该当前表单是在引用它的页面之上两个父模板中定义的，那么这确实使引用它变得容易得多。尽管它们使事情变得容易得多，但这些关键字非常有限。不仅只有四个，而且它们不可扩展，默认的Jakarta
    Faces组件集仅在`<f:ajax>`标签内部使用它们。在其他组件（甚至是Jakarta Faces自身的`<h:outputLabel>`、`<h:message>`和`<h:messages>`组件）中使用它们，以及以编程方式使用它们，都被忽略了。因此，在Jakarta
    Faces 2.3中，引入了一个“组件搜索表达式框架”，极大地扩展了这四个关键字。它主要基于PrimeFaces的一个经过验证的API（应用程序编程接口）。


    ### 相对本地ID


    这是组件搜索表达式的最简单形式。最常见的用例出现在`<h:outputLabel>`、`<h:message>`和`<h:messages>`组件的`for`属性中。它简单地引用目标`UIInput`组件的唯一ID。


    这仅要求目标组件也位于同一个命名容器父级中。命名容器父级是实现`NamingContainer`接口的组件。在标准Jakarta Faces中，只有`<h:form>`、`<h:dataTable>`、`<ui:repeat>`和`<f:subview>`是`NamingContainer`的实例。所有复合组件也是`NamingContainer`的实例，但标签文件不是。


    如果您需要从`<h:outputLabel>`引用命名容器中的特定`UIInput`组件，那么您需要将所谓的命名容器分隔符字符附加到命名容器组件的ID之后，然后是目标`UIInput`组件的ID。默认的命名容器分隔符字符是冒号“`:`”。当前配置的分隔符字符可以通过`UINamingContainer#getSeparatorCharacter()`以编程方式获取。


    ```

    char separatorCharacter = UINamingContainer

    .getSeparatorCharacter(FacesContext.getCurrentInstance);

    ```


    这可以通过`web.xml`中的`jakarta.faces.SEPARATOR_CHAR`上下文参数进行配置。


    ```

    jakarta.faces.SEPARATOR_CHAR

    -

    ```


    **注意**


    **不**建议将其更改为其他字符，例如连字符“`-`”甚至下划线“`_`”。'
