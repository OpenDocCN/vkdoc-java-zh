    \ component, String email)\nthrows ValidatorException\n{\nif (email == null ||\
    \ email.isEmpty()) {\nreturn; // 让 @NotNull 或 required=true 处理此情况。\n}\nString\
    \ oldEmail = (String) ((UIInput) component).getValue();\nif (!email.equals(oldEmail)\
    \ && userService.exist(email)) {\nthrow new ValidatorException(\nnew FacesMessage(\"\
    Email already in use\"));\n}\n}\n}\n```\n\n旧值可以简单地从 `UIInput#getValue()` 获取，它基本上返回\
    \ `UIInput` 组件的当前 `value` 属性。为了使其运行，在任何 `EditableValueHolder` 组件的 `validator`\
    \ 属性中，或任何嵌套的 `<f:validator>` 标签的 `validatorId` 属性中，精确指定声明的验证器 ID。\n\n查看 `UniqueEmailValidator`\
    \ 类时，你会注意到注解和接口也获得了与转换器相同的 Jakarta Faces 2.3 更改。与 `@FacesConverter` 一样，自 Jakarta\
    \ Faces 2.3 起，`@FacesValidator` 注解也获得了一个新的 `managed` 属性，该属性应启用验证器实现中的依赖注入。并且与\
    \ `Converter<T>` 一样，`Validator<T>` 也被参数化，因此 `validate()` 方法现在接受一个 `T` 而不是 `Object`\
    \ 作为值参数。\n\n你还需要确保你的验证器实现方式能够在其值参数为 `null` 或空时跳过验证。历史上，在 Jakarta Faces 1.x 中，当值参数为\
    \ `null` 时，`validate()` 方法总是会被跳过。然而，自从 Jakarta Bean Validation 集成到 Jakarta Faces\
    \ 2.0 以来，这种情况发生了变化，从而破坏了基于 Jakarta Faces 1.x 的现有自定义验证器的向后兼容性。可以通过显式设置以下 `web.xml`\
    \ 上下文参数来关闭此破坏性更改：\n\n```\n<context-param>\n    <param-name>jakarta.faces.VALIDATE_EMPTY_FIELDS</param-name>\n\
    \    <param-value>false</param-value>\n</context-param>\n```\n"
- fmt: 'The disadvantage of this is that the `@NotNull` of Jakarta Bean Validation
    won’t be triggered by Jakarta Faces and you’d basically need to repeat this constraint
    for all Jakarta Faces input components by explicitly setting their `required`
    attribute to `true`. You’d better not do this and just keep performing the `null`
    and empty check in your custom validator. Having validation constraints at a single
    place in the model with the help of Jakarta Bean Validation is more DRY (Don’t
    Repeat Yourself) than repeating the validation constraints across different layers
    using the very same model.


    Coming back to the use case of validating the uniqueness of the submitted value,
    of course, you could also skip this and insert the data anyway and catch any constraint
    violation exception coming from the persistence layer and display a faces message
    accordingly. However, this doesn’t go well with the current trend of immediate
    feedback directly after changing the input field in the user interface.


    In this specific use case of validating a unique email address during sign-up,
    however, there may be another reason not to give away too much detail about the
    uniqueness of the specified email address: security. In such a case, you’d best
    let the sign-up complete exactly the same way as if it was successful whereby
    you tell the user to check the mailbox but behind the scenes actually send a different
    email to the target recipient, rather than an activation email, preferably not
    more than once daily. The email would be similar to the following:


    *Dear user,*


    *It looks like you or someone else tried to sign up on our website* *using your
    email address* `foo@example.com` *while it is already associated with an existing
    account. Perhaps you actually wanted to log in* *or to reset your password? If
    it actually wasn’t you, please let us know by replying to this email and we’ll
    investigate this.*


    *Sincerely, Example Company*


    Finally, you might also want to consider invalidating or deduplicating emails
    that contain the “`+`” character in the username part, followed by a sequence
    of characters, representing an email alias. For a lot of email providers, notably
    Gmail, email addresses `foo@gmail.com` and `foo+bar@gmail.com` refer to exactly
    the same email account, thereby basically allowing the end user to create a nearly
    unlimited amount of accounts.


    ## Custom Constraints


    While not part of the Jakarta Faces, for the sake of completeness, we’d like to
    show another example of a custom Jakarta Bean Validation constraint. An earlier
    example was already given in the section about `<f:validateWholeBean>`. The Jakarta
    Bean Validation API already offers a lot of existing constraints out of the box
    which you can find in the `jakarta.validation.constraints` package.^([^(41)](#fn41))
    Most common use cases for a custom Jakarta Bean Validation constraint are related
    to localized patterns. Think of phone numbers, zip codes, bank account numbers,
    and passwords. Of course, most of those could be done with just a `@Pattern`,
    but this may end up in less self-documenting code, particularly if the desired
    pattern is relatively complex.


    The following is an example of a custom `@Phone` constraint which should match
    as many as possible internationally known phone numbers:


    ```

    @Constraint(validatedBy=PhoneValidator.class)

    @Target(FIELD)

    @Retention(RUNTIME)

    public @interface Phone {

    String message() default "Invalid phone number";

    Class[] groups() default {};

    Class[] payload() default {};

    }

    ```


    And here’s the associated `PhoneValidator`:


    ```

    public class PhoneValidator

    implements ConstraintValidator

    {

    private static final Pattern SPECIAL_CHARS =

    Pattern.compile("[\\s().+-]|ext", Pattern.CASE_INSENSITIVE);

    private static final Pattern DIGITS =

    Pattern.compile("[0-9]{7,15}");

    @Override

    public boolean isValid

    (String phone, ConstraintValidatorContext context)

    {

    if (phone == null || phone.isEmpty()) {

    return true; // Let @NotNull/@NotEmpty handle this.

    }

    return isValid(phone);

    }

    public static boolean isValid(String phone) {

    String digits = SPECIAL_CHARS.matcher(phone).replaceAll("");

    return DIGITS.matcher(digits).matches();

    }

    }

    ```


    In order to activate it, simply annotate the associated entity property.


    ```

    @Phone

    private String phone;

    ```


    This will be triggered on both the Jakarta Faces and Jakarta Persistence sides:
    in Jakarta Faces, during the process validations phase (third phase); in Jakarta
    Persistence, during the persist and merge. As noted in the `<f:validateBean>`/`<f:validateWholeBean>`
    section, it can be disabled on both sides.


    ## Custom Messages


    Conversion and validation error messages coming from Jakarta Faces as well as
    Jakarta Bean Validation are fully customizable. Application-wide, they can be
    customized by supplying a properties file that specifies the desired message as
    the value of a predefined key. You can find predefined keys for Jakarta Faces
    conversion and validation messages in Chapter 2.5.2.4, “Localized Application
    Messages,” of the Jakarta Faces 4.0 specification.^([^(42)](#fn42)) You can find
    predefined keys for Jakarta Bean Validation messages in Appendix B, “Standard
    ResourceBundle Messages,” of the Jakarta Bean Validation 3.0 specification.^([^(43)](#fn43))
    For Jakarta Faces, the fully qualified name of the properties file must be registered
    as `<message-bundle>` in `faces-config.xml`. For Jakarta Bean Validation, the
    exact fully qualified name of the properties file is `ValidationMessages`.


    As an example, we’re going to modify the default message of the Jakarta Faces
    `required="true"` validation and the Jakarta Bean Validation `@NotNull` constraint.


    ```

    main/java/resources/com/example/project/i18n/messages.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} is required.

    jakarta.faces.validator.BeanValidator.MESSAGE = {1} {0}

    main/java/resources/ValidationMessages.properties

    jakarta.validation.constraints.NotNull.message = is required.

    ```


    Note the absence of the label placeholder in the Jakarta Bean Validation message.
    Instead, the `{1}` of the `jakarta.faces.validator.BeanValidator.MESSAGE` represents
    the `label` associated with the Jakarta Faces component, and `{0}` represents
    the Jakarta Bean Validation message. The custom Jakarta Bean Validation message
    bundle file is already automatically picked up. The custom Jakarta Faces message
    bundle file needs to be explicitly registered in the `faces-config.xml` first.


    ```

    com.example.project.i18n.messages

    ```


    With those properties files in place, the following input components will thus
    show exactly the same validation error message:


    In case you want to fine-grain the message on a per-component basis, you can use
    the `converterMessage`, `validatorMessage`, and/or `requiredMessage` attribute
    of the `UIInput` component. The `converterMessage` will be displayed on any conversion
    error.


    The `validatorMessage` will be displayed on any validation error, as well as those
    triggered by Jakarta Bean Validation.


    Note that this won’t be shown when `required="true"` isn’t satisfied. For that,
    you need to use `requiredMessage` instead.


    Note that this won’t be shown for any Jakarta Bean Validation `@NotNull`. You
    should then use `validatorMessage` instead.


    ## Footnotes


    6. Output Components'
