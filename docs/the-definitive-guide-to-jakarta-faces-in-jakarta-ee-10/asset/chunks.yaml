    \n标签元素具有多种 SEO（搜索引擎优化）和可用性优势。它以文本形式告知关联的输入元素。屏幕阅读器（例如视力障碍人士使用的）会找到标签并通过声音读出其内容。搜索引擎机器人会找到标签，并将关联的输入元素以标签作为关键词进行索引。并且，当点击标签时，它会聚焦并激活关联的输入元素。基于文本的输入元素会显示文本光标。复选框和单选按钮输入元素会被切换。列表框和下拉输入元素会获得焦点。文件输入元素会打开浏览对话框。提交按钮会被触发。\n\
