    \ event) {\n        if (...) {\n            event.getServletContext()\n      \
    \          .getSessionCookieConfig()\n                .setSecure(false);\n   \
    \     }\n    }\n}\n```\n\n其中“...”是一个特定于应用程序的检查，用于判断是否在“开发模式”下运行。您甚至可以使用 Jakarta\
    \ Faces 自身的 `Application#getProjectStage()` 来实现此目的。\n\n源文件暴露防护\n在服务器端 Web 应用程序的上下文中，源文件暴露是指\
