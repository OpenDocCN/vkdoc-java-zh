  trans: '

    这个命名空间不幸地无法与自定义 `*.taglib.xml` 文件的 `<namespace>` 统一。如果你对两者使用相同的命名空间，那么 Jakarta
    Faces 将优先采用 `*.taglib.xml` 中的定义，而非 `@FacesComponent` 中的定义，从而导致无法找到自定义组件标签。实际上，在任何与
    Jakarta EE 相关的内容中，任何基于 XML 的事物注册优先级都高于基于 Java 注解的同一事物注册。


    你基本上需要在该 `*.taglib.xml` 文件中显式注册自定义组件。以下展示了如何扩展第 7 章“标签文件”一节中创建的 `/WEB-INF/example.taglib.xml`，以注册自定义组件，这本质上与
    `@FacesComponent` 为你所做的工作相同。


    ```


    example.tags

    t


    渲染一个 HTML 列表。

    dataList


    dataList


    ```


    这样，自定义组件就可以与其他标签在同一个命名空间下使用。


    ```

    ...


    ...


    ```


    现在，你可以移除 `@FacesComponent` 的所有属性，使其仅保留 `@FacesComponent`。是的，正如你在 `example.taglib.xml`
    中所见，组件类型默认为类名，并将首字母小写。你始终可以通过显式指定 `@FacesComponent` 注解的值来覆盖它。通常，你会希望在其前面加上公司名称。将其定义为公共常量是一个好习惯，这样其他人可以在必要时通过
    Javadoc 查找它，或将其用于 `Application#createComponent()`。


    ```

    @FacesComponent(DataList.COMPONENT_TYPE)

    public class DataList extends UIData {

    public static final String COMPONENT_TYPE = "example.DataList";

    public DataList() {

    setRendererType(DataListRenderer.RENDERER_TYPE);

    }

    }

    ```


    现在相应地调整 `example.taglib.xml` 中的组件类型。


    ```

    example.DataList


    ```


    `*.taglib.xml` 还为你提供了通过 `<attribute>` 条目注册属性的空间，尽管这可能会导致代码冗长。你应该已经在第 7 章的“标签文件”一节中看到过这一点。不幸的是，当前版本的
    Faces 没有提供注解来声明式地声明一个“官方”组件属性。目前还没有类似 `@FacesAttribute private Iterable value`
    这样的东西。这可能会在未来的 Faces.next 中出现。不使用任何 `<attribute>` 的非官方方式也能正常工作。你可以在视图中的组件标签上声明任何你想要的属性。


    ```


    这就是 XML 的自由度。至于实际的组件或渲染器实现是否对其进行了处理，则是另一回事。你甚至可以在现有组件上声明一个自定义属性，并插入一个扩展的 `Renderer`
    来处理该属性。更多内容将在后面的“扩展现有渲染器”一节中介绍。说到渲染器，我们的 `<t:dataList>` 仍然需要它的渲染器。以下是 `com.example.project.renderer.DataListRenderer`
    的样子。


    ```

    @FacesRenderer(

    componentFamily=UIData.COMPONENT_FAMILY,

    rendererType=DataListRenderer.RENDERER_TYPE)

    public class DataListRenderer extends Renderer {

    public static final String RENDERER_TYPE = "example.List";

    @Override

    public void encodeBegin

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    UIData data = (UIData) component;

    if (data.getRowCount() > 0) {

    writer.startElement("ul", component);

    }

    }

    @Override

    public boolean getRendersChildren() {

    return true;

    }

    @Override

    public void encodeChildren

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    UIData data = (UIData) component;

    for (int i = 0; i  0) {

    for (UIComponent child : component.getChildren()) {

    child.encodeAll(context);

    }

    }

    writer.endElement("li");

    }

    data.setRowIndex(-1);

    }

    @Override

    public void encodeEnd

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    UIData data = (UIData) component;

    if (data.getRowCount() > 0) {

    writer.endElement("ul");

    }

    }

    }

    ```


    事后看来，这相对简单。我们尽可能多地将繁重的工作委托给 Jakarta Faces 提供的 `UIData` 超类。在 `encodeBegin()` 中，当数据模型不为空时，你开始
    `<ul>` 元素。这需要通过检查 `UIData#getRowCount()` 的结果来判断。其 Javadoc^(⁸⁷) 基本说明如下：


    *返回底层数据模型中的行数。如果可用行数未知，则返回 -1。*


    “行”这个术语确实与表格密切相关。这也是这个超类最初设计的目的：`<h:dataTable>`。使用“项”这个术语会比“行”更通用，但事实就是如此。


    然后，在 `encodeChildren()` 方法中，我们通过 `UIData#setRowIndex()` 方法设置当前行索引，开始 `<li>` 元素，通过在每个子组件上调用
    `UIComponent#encodeAll()` 原样编码所有子组件，最后结束 `<li>` 元素。循环完成后，我们通过调用值为 `-1` 的 `UIData#setRowIndex()`
    显式地向 `UIData` 超类表明这一点。其 Javadoc^(⁸⁸) 说明如下：


    *如果新的 rowIndex 值为 -1：如果 var 属性不为 null，则移除相应的请求作用域属性（如果有）。重置所有后代组件的状态信息。*


    因此，它会清除与迭代相关的任何状态。这非常重要；否则，可能会在组件树中进一步引起副作用，甚至当它自身需要遍历数据模型时导致视图状态损坏。最后，在 `encodeEnd()`
    方法中，它将基于与 `encodeBegin()` 中相同的条件结束 `<ul>` 元素。


    `encodeChildren()` 方法中的 `UIData#setRowIndex()` 调用会在底层从 `value` 属性中提取数据模型，并将其包装在
    `jakarta.faces.model.DataModel` 抽象类的合适实现中。^(⁸⁹) 到目前为止，根据 `UIData#getValue()` 的
    Javadoc，^(⁹⁰) 支持 `value` 属性背后对象的以下类型，按此扫描顺序：


    1.  `java.util.List`（自 1.0 起）。


    2.  数组（自 1.0 起）。


    3.  `java.sql.ResultSet`（自 1.0 起）。


    4.  `java.util.Collection`（自 2.2 起）。


    5.  `java.lang.Iterable`（自 2.3 起）。


    6.  `java.util.Map`（自 2.3 起）。


    7.  已通过 `@FacesDataModel` 注册了合适 `DataModel` 的类型（自 2.3 起）。


    8.  所有其他类型将使用 `ScalarDataModel` 类进行适配，该类会将对象视为单行数据（自 1.0 起）。

