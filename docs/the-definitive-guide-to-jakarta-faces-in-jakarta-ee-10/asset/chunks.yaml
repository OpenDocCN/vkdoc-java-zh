    回到使用 `List<Product>` 的 `<h:dataTable>`，在某些情况下，您可能希望能够在同一视图中添加或删除项目，通常是在某种管理页面中。为了添加一个新的
    `Product`，我们需要在受管 bean 中准备一个新实例，在单独的表单中填写它，持久化它，然后刷新表格。


