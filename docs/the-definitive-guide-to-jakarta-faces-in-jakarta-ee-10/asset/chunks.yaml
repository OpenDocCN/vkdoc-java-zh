- fmt: "# 排版后的文本\n\nYou would indeed not expect to see anyone passing around a plain\
    \ `java.sql.ResultSet` in a modern Jakarta EE application, but this all is for\
    \ backward compatibility. Remember, Jakarta Faces was introduced in 2004. Backward\
    \ compatibility was one of its strongest keys in surviving up to today. It’s certainly\
    \ a candidate to be removed, but not now.\n\nAnd there’s indeed an overlap between\
    \ some types; `List` and `Collection` could easily be covered by `Iterable` as\
    \ they both implement this interface. But this has a performance reason. For a\
    \ `List`, the items are accessed directly by index by the `ListDataModel`; for\
    \ a `Collection`, the items are extracted first via `Collection#toArray()` and\
    \ then accessed by index by the `CollectionDataModel`; and for an `Iterable`,\
    \ the items are simply iterated and collected into a new `List` first by the `IterableDataModel`.\
    \ It may make a difference.\n\nYou’ll also see that Faces 2.3 has not only added\
    \ two new data models but even introduced a new annotation to register a custom\
    \ one. Previously, you’d need to manually wrap the custom collection in the custom\
    \ data model every time before passing to a `UIData` component. The `DataModel`\
    \ abstract class has the disadvantage of not being `Serializable` itself which\
    \ more or less forces you to make a `@ViewScoped` bean holding such a data model\
    \ to have a lazy loading getter on a transient data model property as follows:\n\
    \n```\nprivate YourCollection yourCollection;\nprivate transient YourDataModel\
    \ dataModel;\npublic DataModel getDataModel() {\n    if (dataModel == null) {\n\
    \        dataModel = new YourDataModel(yourCollection);\n    }\n    return dataModel;\n\
    }\n```\n\nIdeally, the `UIData` should by itself recognize `YourCollection` type\
    \ and automatically wrap it in a `YourDataModel`. The `@FacesDataModel` annotation\
    \ does exactly that.\n\n```\n@FacesDataModel(forClass=YourCollection.class)\n\
    public class YourDataModel extends DataModel {}\n```\n\nComing back to the custom\
    \ renderer, there’s one method left unexplained: the `getRendersChildren()`. It’s\
    \ been overridden to explicitly return `true`. You’ll probably ask yourself, why\
    \ was it initially `false`? Why not just let it be the default behavior of `encodeChildren()`\
    \ and rely on any overridden `encodeChildren()` method whether it wants to invoke\
    \ `encodeAll()` on the children? This was actually a historic oversight in the\
    \ specification. Originally, the `encodeAll()` method didn’t exist. It was only\
    \ added in Faces 1.2, and it basically made the `getRendersChildren()` obsolete.\
    \ But for backward compatibility, this complexity was introduced.\n\nIn a nutshell,\
    \ always let `getRendersChildren()` return `true` if you have overridden the `encodeChildren()`\
    \ method. Otherwise, the children won’t be encoded at all.\n\nLast but not least,\
    \ you’ll probably also wonder why we don’t “simply” override the `encodeBegin()`,\
    \ `encodeChildren()`, (and `getRendersChildren()`), and `encodeEnd()` of the `DataList`\
    \ component but instead create a “whole” renderer implementation. The main reason\
    \ is: simplicity and extensibility. Those methods are on `UIComponent` specified\
    \ to do more than only rendering. They also check if the `UIComponent#isRendered()`\
    \ returns `true`. The `encodeBegin()` also fires `PreRenderComponentEvent` and\
    \ pushes the current component into the EL (Expression Language) scope as `#{component}`.\
    \ The `encodeEnd()` pops `#{component}` out of the EL scope. And they also check\
    \ if there’s a renderer attached and, if so, delegate to it. That’s all specified\
    \ in their Javadoc. You’d need to manually take care of them yourself when you\
    \ override those methods. That’s unnecessarily repeated work. And when someone\
    \ in the future wants to adjust the rendering of the component, then they won’t\
    \ be able to simply plug a custom renderer if your component doesn’t check for\
    \ it.\n\n## Extending Existing Component\n\nImagine that there’s an existing component\
    \ whose behavior you’d like to adjust, usually by adding one or more new custom\
    \ attributes. If those attributes are purely output only, then you could just\
    \ make use of the pass-through attributes feature that was introduced in Faces\
    \ 2.2. Previously, any custom attribute that wasn’t officially supported by the\
    \ component was simply ignored during view render time. For example, when you’d\
    \ like to add the `directory` attribute to the existing `<h:inputFile>` component,\
    \ then simply adding the attribute as follows won’t work.\n\n```\n<h:inputFile\
    \ directory=\"true\" />\n```\n\nWith the pass-through attributes feature, you\
    \ could explicitly instruct Jakarta Faces to render the custom attribute anyway.\
    \ This can be done in two ways. The first way is registering it via the `jakarta.faces.passthrough`\
    \ XML namespace.\n\n```\n<html xmlns:pt=\"jakarta.faces.passthrough\">\n...\n\
    <h:inputFile pt:directory=\"true\" />\n```\n\nAnother way is declaring it via\
    \ the `<f:passThroughAttribute>` tag.\n\n```\n<h:inputFile>\n    <f:passThroughAttribute\
    \ name=\"directory\" value=\"true\" />\n</h:inputFile>\n```\n\nDo note that you\
    \ need to explicitly set `multiple=\"true\"` as well; otherwise, you wouldn’t\
    \ be able to send a directory containing more than one file. On the browsers supporting\
    \ the `directory` attribute, the file browse dialog will allow folder selection.\
    \ However, this won’t work in browsers not supporting this nonstandard attribute;\
    \ on the WebKit-based ones, you need to set `webkitdirectory` attribute instead.\
    \ So you ultimately end up like this when you merely want to support directory\
    \ selection with a broad as possible browser support.\n\n```\n<h:inputFile multiple=\"\
    true\" directory=\"true\" webkitdirectory=\"true\" />\n```\n\nOne way to reduce\
    \ this boilerplate is to extend the `<h:inputFile>` component to add a new `directory`\
    \ attribute that automatically sets all these three attributes accordingly. The\
    \ first step is looking at which `UIComponent` class exactly is represented by\
    \ `<h:inputFile>`. As you can see in Table 11-1, that’s `jakarta.faces.component.html.HtmlInputFile`.\
    \ Let’s start by extending it and adding the new `directory` attribute.\n\n```\n\
    @FacesComponent(createTag=true)\npublic class InputFile extends HtmlInputFile\
    \ {\n    @Override\n    public void encodeBegin(FacesContext context) throws IOException\
    \ {\n        boolean directory = isDirectory();\n        if (directory) {\n  \
    \          setMultiple(true);\n            getPassThroughAttributes().put(\"directory\"\
    , true);\n            getPassThroughAttributes().put(\"webkitdirectory\", true);\n\
    \        }\n        super.encodeBegin(context);\n    }\n\n    public boolean isDirectory()\
    \ {\n        return (boolean) getStateHelper().eval(\"directory\", true);\n  \
    \  }\n\n    public void setDirectory(boolean directory) {\n        getStateHelper().put(\"\
    directory\", directory);\n    }\n}\n```\n\nNote that there’s no property for the\
    \ `directory` attribute. Any public component attribute must be represented by\
    \ a getter/setter pair that delegates further to `UIComponent#getStateHelper()`.\
    \ Basically, you must delegate all view-scoped component attributes to the `StateHelper`.\
    \ This will in turn take care that the right deltas end up in the Jakarta Faces\
    \ view state. This is of course optional, but not doing so will make the component\
    \ instance not programmatically manipulatable. Any changes performed during a\
    \ previous HTTP request would get lost during the subsequent HTTP postback request\
    \ for the very simple reason that the `UIComponent` instance is recreated from\
    \ scratch.\n\nAlso note that the `directory` and `webkitdirectory` attributes\
    \ are simply added as pass-through attributes in the `encodeBegin()` method before\
    \ delegating to the superclass method where the actual rendering job takes place.\
    \ This removes the need to create a whole custom renderer for the particular purpose\
    \ of rendering new attributes. Let’s test it now.\n\n```\n<h:inputFile value=\"\
    #{bean.file}\" directory=\"true\" />\n```\n\nFor the sake of completeness, here’s\
    \ what the backing bean looks like."
