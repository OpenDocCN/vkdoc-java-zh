  raw: "14.  The `FacesServlet` will invoke the listener methods of any queued `ActionEvent`\
    \ on the backing bean.\n\n15.  The final action method of the backing bean will,\
    \ if necessary, return a non-`null String` outcome referring the target view.\n\
    \n16.  The `FacesServlet` will let the component tree render the HTTP response.\n\
    \n17.  The component tree will, if necessary, get the current model values from\
    \ the backing bean during generating the HTML output. Practically any attribute\
    \ of a Facelets component and a Jakarta Faces component that is involved in generating\
    \ the HTML output will get executed.\n\n18.  The component tree will write the\
    \ HTML output to the HTTP response.\n\n19.  The `FacesServlet` will return the\
    \ HTTP response to the end user.\n\nThis is different from a request-based MVC\
    \ framework wherein the developer needs to write more boilerplate code in the\
    \ “controller” class associated with the view in order to define which request\
    \ parameters need to be applied and/or how they should be converted and validated\
    \ before populating the entity. The developer also often needs to manually populate\
    \ the entity by manually invoking a bunch of getters and setters before passing\
    \ the entity to the service layer while invoking the action. This all is unnecessary\
    \ in a component-based MVC framework like Jakarta Faces.\n\nIt should be noted\
    \ that the backing bean has a rather unique position in the MVC paradigm. It can\
    \ act as a Model, a View, and a Controller, depending on the point of view. This\
    \ is detailed in Chapter [8](#454457_2_En_8_Chapter.xhtml).\n\n## Standard HTML\
    \ Components\n\nThe default Jakarta Faces implementation already provides an extensive\
    \ set of components for authoring HTML pages with the help of the Facelets view\
    \ technology. Those HTML components are available under the `jakarta.faces.html`\
    \ XML namespace URI (Uniform Resource Identifier) that should be assigned to the\
    \ “`h`” XML namespace prefix.\n\n```\nThe most important HTML components that\
    \ should always be present in\nyour Jakarta Faces page are the `<h:head>` and\n\
    `<h:body>`.\nWithout them, Jakarta Faces won’t be able to auto-include any script\
    \ or\nstylesheet resources associated with a particular component.\nFor example,\
    \ the `<h:commandButton>`,\nwhich generates an HTML submit button, can optionally\
    \ contain Ajax\nfunctionality via a `<f:ajax>` tag.\nThis Ajax functionality requires\
    \ the `faces.js` script file\nto be included in the HTML document. The renderer\
    \ of that component will\nautomatically take care of that, but that would only\
    \ work properly if\nthe `<h:head>` is\npresent.\n\nThe `<h:body>` is not\nnecessary\
    \ for the Ajax functionality, but there may exist components\nthat need to add\
    \ a script to the end of the HTML body in order to perform\ninitialization during\
    \ page load, such as the `<f:websocket>`\nthat needs to create a new `window.WebSocket`\n\
    instance in JavaScript. In other words, the most minimal and HTML5-valid\nJakarta\
    \ Faces view definition would look as follows:\n\n```\n\nTitle\n\n...\n\n```\n\
