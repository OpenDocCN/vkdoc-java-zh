    \ which in turn do the hard work of building the view,\ndecoding the HTTP request,\
    \ and encoding the HTTP response. Those URIs\nare thus not per definition live\
    \ Internet addresses. You can even\nspecify your own via a `*.taglib.xml` file.\n\
    This will be expanded later in the section “Tag Files.”\n\nThe following is what\
