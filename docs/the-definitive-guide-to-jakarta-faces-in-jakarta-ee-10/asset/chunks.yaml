    Faces 页面，执行*查看页面源代码*，找到感兴趣的 Jakarta Faces 组件的 HTML 元素表示，获取其 ID 属性的值，最后在其前面加上命名容器分隔符。另外，如果你遇到以
    `j_id` 为前缀的自动生成 ID，那么你绝对需要为相关的 Jakarta Faces 组件提供一个固定的 ID；否则，当组件在组件树中的位置因例如在感兴趣组件位置之前有条件地包含的组件而可能发生变化时，其值将会出错。（另请参见第
    4 章中的“基于文本的输入组件”一节。）


    与相对本地 ID 类似，绝对层级 ID 可以使用 `UIComponent#findComponent()` API 中描述的算法以编程方式解析。^((105))
    以下示例演示了如何获取代表 `<h:form id="form"><h:dataTable id="table">` 的 `UIData` 组件。


    ```

    UIViewRoot root = FacesContext.getCurrentInstance().getViewRoot();

    UIData table = (UIData) root.findComponent("form:table");

    ```


    **标准搜索关键字**


    Jakarta Faces 提供了一组更抽象的搜索表达式，称为“搜索关键字”。它们都以“`@`”字符开头。它们可用于替换搜索表达式中的固定组件 ID。表 12-1
    提供了它们的概述。


    **表 12-1 Jakarta Faces 提供的标准搜索关键字**


    | 关键字 | 解析为 | 自版本起 |

    | :--- | :--- | :--- |

    | @this | `UIComponent#getCurrentComponent()` | 2.0 |

    | @form | `UIComponent#getNamingContainer()` 直到遇到 `UIForm` | 2.0 |

    | @all | 所有内容 | 2.0 |

    | @none | 无 | 2.0 |

    | @parent | `UIComponent#getParent()` | 2.3 |

    | @child(index) | 给定索引处的 `UIComponent#getChildren()` | 2.3 |

    | @next | `UIComponent#getParent()` 然后下一个索引处的 `UIComponent#getChildren()` | 2.3
    |

    | @previous | `UIComponent#getParent()` 然后上一个索引处的 `UIComponent#getChildren()`
    | 2.3 |

    | @namingcontainer | `UIComponent#getNamingContainer()` | 2.3 |

    | @composite | `UIComponent#getCompositeComponentParent()` | 2.3 |

    | @id(id) | 使用给定 ID 的 `UIComponent#findComponent()` | 2.3 |

    | @root | `FacesContext#getViewRoot()` | 2.3 |


    在标准的 Jakarta Faces 组件集中，所有搜索关键字（包括自定义关键字）都可以在以下组件属性中使用：

    '
- fmt: '- `<f:ajax execute>`: 指定在 Ajax 回发请求的“应用请求值”、“处理验证”、“更新模型值”和“调用应用程序”阶段（第二、三、四、五阶段）必须处理的组件。默认为`@this`。


    - `<f:ajax render>`: 指定在 Ajax 回发请求的“渲染响应”阶段（第六阶段）必须处理的组件。默认为`@none`。


    - `<h:outputLabel for>`: 指定生成的 HTML `<label>` 元素的目标组件。默认为`@none`。


    - `<h:message for>`: 指定必须渲染第一条 Faces 消息的目标组件。默认为`@none`。


    - `<h:messages for>`: 指定必须渲染所有 Faces 消息的目标组件。默认为`@none`。


    请注意，在`<h:outputLabel>`、`<h:message>`和`<h:messages>`的`for`属性中使用搜索关键字仅在 Jakarta
    Faces 2.3 之后才成为可能。在旧版本中，仅支持相对 ID 和绝对 ID。


