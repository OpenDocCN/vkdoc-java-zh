    \ property)) {\ncontext.setPropertyResolved(true);\nreturn property.toString().substring(3);\n\
    }\nreturn null;\n}\n@Override\npublic Class getType\n(ELContext context, Object\
    \ base, Object property)\n{\nif (isResolverFor(base, property)) {\ncontext.setPropertyResolved(true);\n\
    return String.class;\n}\nreturn null;\n}\n@Override\npublic Class getCommonPropertyType\n\
    (ELContext context, Object base)\n{\nreturn base == null ? getType(context, base,\
    \ null) : null;\n}\n@Override\npublic boolean isReadOnly\n(ELContext context,\
    \ Object base, Object property)\n{\nreturn true;\n}\n@Override\npublic void setValue\n\
    (ELContext context, Object base, Object property, Object value)\n{\n// NOOP\n\
    }\n@Override\npublic Iterator getFeatureDescriptors\n(ELContext context, Object\
    \ base)\n{\nreturn null;\n}\n}\n```\n\nIf we now use the following Facelet:\n\n\
    ```\n\nTest: #{devThisIsDev}\n\n```\n\nwe’ll see “Test: ThisIsDev” being printed\
    \ when requesting it. What’s\nhappening here is that the custom EL resolver handles\
    \ every name that\nstarts with “dev.”\n\nDynamic Extensions\nThe previous examples\
    \ were mostly about registering the extensions\nthat we needed statically, for\
    \ example, by registering a factory or the\ntype directly in `faces-config.xml`.\n\
    Factories give us an opportunity for some dynamic behavior. That is, at\nthe point\
    \ the factory is called, we can decide what new type (if any) to\nreturn.\nFor\
    \ even more dynamic behavior, it’s frequently required to be able\nto dynamically\
    \ add the factories, or in CDI to dynamically add the\nproducers. CDI has an elaborate\
    \ SPI (service provider interface) for\nthis (simply called “CDI Extensions”),\
    \ which is, however, somewhat\noutside the scope of this book.\nFor classic\n\
    factories and actually everything that’s in `faces-config.xml`,\nthere’s a somewhat\
    \ low-level method to add these dynamically: the\nApplication Configuration Populator,\
    \ which we’ll discuss next.\n\nApplication Configuration Populator\nThe Application\
    \ Configuration Populator is a mechanism to\nprogrammatically provide an additional\
    \ `faces-config.xml`\nfile, albeit by using the XML DOM (Document Object Model\
    \ ) API (application\nprogramming interface). This DOM API can be slightly obscure\
    \ to use, and\nthe power of the Application Configuration Populator is limited\
    \ by its\nability to only configure. There’s no SPI in Jakarta Faces to directly\n\
    modify other `faces-config.xml` at\nthis level.\nThe mechanism works by implementing\
    \ the abstract class `jakarta.faces.application.ApplicationConfigurationPopulator`\n\
    and putting the fully qualified class name of this in a `META-INF/services/jakarta.faces.application.ApplicationConfigurationPopulator`\n\
    file of a JAR library.\n\nTo demonstrate this, we’ll create\nanother version of\
    \ the `ExternalContextProducer`\nthat we demonstrated earlier, this time using\
    \ the mentioned `ApplicationConfigurationPopulator`.\nFor this, we take the same\
    \ code, remove the `faces-config.xml`\nfile, and add the `META-INF/services`\n\
    entry as well as the following Java class:\n\n```\npublic class ConfigurationProvider\n\
    extends ApplicationConfigurationPopulator\n{\n@Override\npublic void populateApplicationConfiguration(Document\
    \ document) {\nString ns = document.getDocumentElement().getNamespaceURI();\n\
    Element factory = document.createElementNS(ns, \"factory\");\nElement externalContextFactory\
    \ =\ndocument.createElementNS(ns, \"external-context-factory\");\nexternalContextFactory.appendChild(\n\
    document.createTextNode(\nExternalContextProducer.class.getName()));\nfactory.appendChild(externalContextFactory);\n\
    document.getDocumentElement().appendChild(factory);\n}\n}\n```\n\nA caveat is\
    \ that since this uses the `java.util.ServiceLoader`\nunder the hood, it really\
    \ only works when `ConfigurationProvider`\nand `ExternalContextProducer`\nare\
    \ packaged together in an actual JAR library placed in the `/WEB-INF/lib` of the\n\
    WAR, instead of just being put directly in the WAR.\n\nThe Application Main Class\n\
    Earlier we discussed the Application Configuration Populator, which, as we\nsaw,\
    \ is actually a `faces-config.xml`\nprovider of sorts. This means it works with\
    \ fully qualified class names\nand elements that are still text in nature.\n\n\
    Jakarta Faces features a variety of somewhat more traditional\nprogrammatic APIs\n\
    as well, with perhaps the most well-known of them being the `jakarta.faces.application.Application`\n\
    main class, which is among others a holder for the same singletons that\nwe mentioned\
    \ previously in the section “Extending Classical Artifacts.”\nFor completeness,\
    \ we’ll repeat this list here.\n\n*   `jakarta.faces.application.NavigationHandler`\n\
    \n*   `jakarta.faces.application.ViewHandler`\n\n*   `jakarta.faces.application.ResourceHandler`\n\
    \n*   `jakarta.faces.component.search.SearchExpressionHandler`\n\n*   `jakarta.faces.flow.FlowHandler`\n\
    \n*   `jakarta.faces.application.StateManager`\n\n*   `jakarta.faces.event.ActionListener`\n\
    \nAll of these have corresponding setters on the `Application` class.\nFor instance,\
    \ the following shows the Javadoc and method declaration for\n`ActionListener`:\n\
    \n```\n/**\n* \n* Set the default {@link ActionListener} to be registered for\
    \ all\n* {@link jakarta.faces.component.ActionSource} components.\n* \n*\n* @param\
    \ listener The new default {@link ActionListener}\n*\n* @throws NullPointerException\n\
    *             if listener is null\n*/\npublic abstract void setActionListener(ActionListener\
    \ listener);\n```\n\nLikewise, the `Application` class\nalso has “`add`”\nmethods\
    \ for the plug-in types we mentioned in the section “Plug-ins.”\n\n*   `jakarta.el.ELResolver`\n\
    \n*   `jakarta.faces.el.PropertyResolver`\n    (deprecated)\n\n*   `jakarta.faces.el.VariableResolver`\n\
    \    (deprecated)\n\n*   `jakarta.faces.component.serarch.SearchKeywordResolver`"
  trans: "\n我们在第 12 章的“自定义搜索关键字”一节中已经看到了搜索关键字解析器的一个示例。该插件的特点是方法 `isResolverForKeyWord()`，通过此方法，插件可以指明它将为哪个关键字或关键字模式运行。\n\
    \n这里我们将看另一个示例，即 EL 解析器。EL 解析器本身并非 Jakarta Faces 特有的类型，而是源自表达式语言（EL）规范。不过，该规范的重要部分确实起源于\
    \ Jakarta Faces。\n\nEL 解析器允许我们以自定义方式解释表达式的所谓基对象（base）和属性（property）。考虑表达式 `#{foo.bar.kaz}`，在解析“`bar`”时，“`foo`”是基对象，“`bar`”是属性；而在解析“`kaz`”时，“`bar`”是基对象，“`kaz`”是属性。起初可能有点令人惊讶的是，当解析“`foo`”时，基对象是\
    \ `null`，而“`foo`”是属性。\n\n在实践中，通常不需要添加自定义 EL 解析器，我们通常只需定义一个满足需求的命名 CDI bean 即可。然而，当\
    \ Jakarta Faces 集成在一个完全不同的环境中时，自定义 EL 解析器就可能派上用场了，比如我们希望表达式解析到一个完全不同的（受管理的）bean\
    \ 系统。即便如此，CDI 到其他 bean 的桥接器可能仍是更好的选择，但了解自定义 EL 解析器是我们武器库中的另一件工具也是件好事。\n\n无论如何，为了演示\
    \ EL 解析器的功能，我们将展示一个示例，其中 EL 表达式的基对象被解释为一个模式，这是我们无法直接用命名 CDI bean 做到的。\n\n以下是一个\
    \ EL 解析器的示例：\n\n```\npublic class CustomELResolver extends ELResolver {\nprotected\
    \ boolean isResolverFor(Object base, Object property) {\nreturn base == null\n\
    && property instanceof String\n&& ((String) property).startsWith(\"dev\");\n}\n\
    @Override\npublic Object getValue\n(ELContext context, Object base, Object property)\n\
    {\nif (isResolverFor(base, property)) {\ncontext.setPropertyResolved(true);\n\
    return property.toString().substring(3);\n}\nreturn null;\n}\n@Override\npublic\
    \ Class getType\n(ELContext context, Object base, Object property)\n{\nif (isResolverFor(base,\
    \ property)) {\ncontext.setPropertyResolved(true);\nreturn String.class;\n}\n\
    return null;\n}\n@Override\npublic Class getCommonPropertyType\n(ELContext context,\
    \ Object base)\n{\nreturn base == null ? getType(context, base, null) : null;\n\
    }\n@Override\npublic boolean isReadOnly\n(ELContext context, Object base, Object\
    \ property)\n{\nreturn true;\n}\n@Override\npublic void setValue\n(ELContext context,\
    \ Object base, Object property, Object value)\n{\n// NOOP\n}\n@Override\npublic\
    \ Iterator getFeatureDescriptors\n(ELContext context, Object base)\n{\nreturn\
    \ null;\n}\n}\n```\n\n如果我们现在使用以下 Facelet：\n\n```\n\nTest: #{devThisIsDev}\n\n\
    ```\n\n在请求该页面时，我们会看到输出“Test: ThisIsDev”。这里发生的情况是，自定义 EL 解析器处理所有以“dev”开头的名称。\n\n\
    动态扩展\n前面的示例主要是关于静态注册我们需要的扩展，例如，通过直接在 `faces-config.xml` 中注册工厂或类型。工厂为我们提供了一些实现动态行为的机会。也就是说，在调用工厂时，我们可以决定返回什么新类型（如果有的话）。\n\
    \n为了实现更动态的行为，通常需要能够动态添加工厂，或者在 CDI 中动态添加生产者。CDI 为此提供了一个复杂的 SPI（服务提供者接口）（简称为“CDI\
    \ 扩展”），但这在一定程度上超出了本书的范围。\n\n对于经典工厂以及实际上 `faces-config.xml` 中的所有内容，有一种较低级别的方法可以动态添加它们：应用程序配置填充器（Application\
    \ Configuration Populator），我们接下来将讨论它。\n\n应用程序配置填充器\n应用程序配置填充器是一种通过编程方式提供额外 `faces-config.xml`\
    \ 文件的机制，尽管它使用的是 XML DOM（文档对象模型）API（应用程序编程接口）。这个 DOM API 使用起来可能有些晦涩，并且应用程序配置填充器的功能受限于它只能进行配置。在\
    \ Jakarta Faces 中，没有 SPI 可以直接在此级别修改其他 `faces-config.xml`。\n\n该机制的工作原理是实现抽象类 `jakarta.faces.application.ApplicationConfigurationPopulator`，并将其完全限定类名放入\
    \ JAR 库的 `META-INF/services/jakarta.faces.application.ApplicationConfigurationPopulator`\
    \ 文件中。\n\n为了演示这一点，我们将创建之前演示的 `ExternalContextProducer` 的另一个版本，这次使用提到的 `ApplicationConfigurationPopulator`。为此，我们采用相同的代码，移除\
    \ `faces-config.xml` 文件，并添加 `META-INF/services` 条目以及以下 Java 类：\n\n```\npublic\
    \ class ConfigurationProvider\nextends ApplicationConfigurationPopulator\n{\n\
    @Override\npublic void populateApplicationConfiguration(Document document) {\n\
    String ns = document.getDocumentElement().getNamespaceURI();\nElement factory\
    \ = document.createElementNS(ns, \"factory\");\nElement externalContextFactory\
    \ =\ndocument.createElementNS(ns, \"external-context-factory\");\nexternalContextFactory.appendChild(\n\
    document.createTextNode(\nExternalContextProducer.class.getName()));\nfactory.appendChild(externalContextFactory);\n\
    document.getDocumentElement().appendChild(factory);\n}\n}\n```\n\n需要注意的是，由于这底层使用了\
    \ `java.util.ServiceLoader`，它仅在 `ConfigurationProvider` 和 `ExternalContextProducer`\
    \ 一起打包在 WAR 的 `/WEB-INF/lib` 目录下的实际 JAR 库中时才有效，而不是直接放在 WAR 中。\n\n应用程序主类\n之前我们讨论了应用程序配置填充器，正如我们所看到的，它实际上是一种\
    \ `faces-config.xml` 提供者。这意味着它处理的是完全限定类名和本质上仍是文本的元素。\n\nJakarta Faces 也提供了多种更传统的编程式\
    \ API，其中最著名的可能是 `jakarta.faces.application.Application` 主类，它除了其他功能外，还持有我们在“扩展经典工件”一节中提到的相同单例对象。为完整起见，我们在此重复这个列表。\n\
    \n*   `jakarta.faces.application.NavigationHandler`\n\n*   `jakarta.faces.application.ViewHandler`\n\
    \n*   `jakarta.faces.application.ResourceHandler`\n\n*   `jakarta.faces.component.search.SearchExpressionHandler`\n\
    \n*   `jakarta.faces.flow.FlowHandler`\n\n*   `jakarta.faces.application.StateManager`\n\
    \n*   `jakarta.faces.event.ActionListener`\n\n所有这些在 `Application` 类上都有相应的 setter\
    \ 方法。例如，以下展示了 `ActionListener` 的 Javadoc 和方法声明：\n\n```\n/**\n* \n* 设置要注册为所有 {@link\
    \ jakarta.faces.component.ActionSource} 组件默认的 {@link ActionListener}。\n* \n*\n\
    * @param listener 新的默认 {@link ActionListener}\n*\n* @throws NullPointerException\n\
    *             如果 listener 为 null\n*/\npublic abstract void setActionListener(ActionListener\
    \ listener);\n```\n\n同样，`Application` 类对于我们在“插件”一节中提到的插件类型也有“`add`”方法。\n\n*  \
    \ `jakarta.el.ELResolver`\n\n*   `jakarta.faces.el.PropertyResolver`\n    （已弃用）\n\
    \n*   `jakarta.faces.el.VariableResolver`\n    （已弃用）\n\n*   `jakarta.faces.component.search.SearchKeywordResolver`\n"
- fmt: '使用`Application`类来设置这些单例的一个难点是，首先，它对时机很敏感。这意味着我们只能从某个特定时间点开始设置此类，显然不能早于`Application`本身可用的时间点，并且对于某些单例，直到第一个请求被服务后才能设置。第一个请求是一个有点难以追踪的时间点。具体来说，资源处理器、视图处理器、流程处理器和状态处理器（呃，状态*管理器*）在第一个请求之后就不能再设置了，而EL解析器和搜索关键字解析器在第一个请求之后也不能再添加。


    为了演示这一点，我们将再次添加之前演示过的自定义EL解析器，但这次采用更动态的方式。为此，我们从`faces-config.xml`文件中移除EL解析器，并添加一个系统监听器。我们的`faces-config.xml`文件如下所示：


    ```

    com.example.project.ELResolverInstaller

    jakarta.faces.event.PostConstructApplicationEvent

    ```


    确实，这并没有摆脱XML，实际上XML甚至更多了，但减少或摆脱XML并不是这里的重点，重点是以更动态的方式注册EL解析器的能力。


    我们刚刚在这里注册的系统事件监听器如下所示：


    ```

    public class ELResolverInstaller implements SystemEventListener {

    @Override

    public boolean isListenerForSource(Object source) {

    return source instanceof Application;

    }

    @Override

    public void processEvent(SystemEvent event) {

    Application application = (Application) event.getSource();

    application.addELResolver(new CustomELResolver());

    }

    }

    ```


    这里我们有一个系统事件监听器，它监听`PostConstructApplicationEvent`。这通常是添加像EL解析器这样的插件的好时机。此时`Application`实例保证可用，并且请求处理尚未开始，因此我们肯定能在第一个请求被处理之前及时完成。


    ## 本地扩展与包装


    在某些情况下，我们不想全局覆盖（例如）视图处理器，而只想在本地调用（通常是组件中的方法）时进行覆盖。Jakarta Faces通过传递`FacesContext`来实现这一点，组件将其作为获取几乎所有其他东西的主要入口点。对于Jakarta
    Faces来说，组件不是CDI工件，也不能通过其他方式注入，因此CDI方法目前不适用于它们。


    然后可以通过使用`FacesContextWrapper`包装`FacesContext`并将其传递给下一层来实现本地扩展。请注意，Servlet规范使用了相同的模式，其中`HttpServletRequest`和`HttpServletResponse`可以由过滤器使用`HttpServletRequestWrapper`和`HttpServletResponseWrapper`进行包装，并传递给下一个过滤器，该过滤器可以再次包装它并传递给它的下一个过滤器，依此类推。


    为了说明这一点，假设对于某个组件，我们希望增强表单组件等使用的操作URL生成，使得“`?foo=bar`”被添加到该URL中。如果我们通过全局覆盖视图处理器来做到这一点，所有使用视图处理器的组件和其他代码都会看到这个URL，而这里我们只希望这个特定的组件看到它。


    为了实现这一点，我们使用如下组件中所示的包装：


    ```

    @FacesComponent(createTag = true)

    public class CustomForm extends HtmlForm {

    @Override

    public void encodeBegin(FacesContext context) throws IOException {

    super.encodeBegin(new ActionURLDecorator(context));

    }

    }

    ```


    如果没有Jakarta Faces的支持来实现包装器，至少可以说是一项相当繁琐的任务，因为从`FacesContext`到`ViewHandler`的路径需要多次调用，并且涉及的类有大量方法。幸运的是，Jakarta
    Faces通过为其大多数重要工件提供包装器（带有易于使用的构造函数）极大地简化了这项任务。


    这里使用的模式是，顶层类（来自前面示例的`ActionURLDecorator`）继承自`FacesContextWrapper`，并将原始的`FacesContext`传递给其超类。然后，通过覆盖链中的初始方法（这里是`getApplication()`）并返回该方法返回类型的包装器（将其超类版本传递到其构造函数中）来实现中间对象的路径。然后，这个包装器对链中的下一个方法执行相同的操作，直到到达需要自定义行为的最终方法。


    下面给出了一个示例：


    ```

    public class ActionURLDecorator extends FacesContextWrapper {

    public ActionURLDecorator(FacesContext context) {

    super(context);

    }

    @Override

    public Application getApplication() {

    return new ApplicationWrapper(super.getApplication()) {

    @Override

    public ViewHandler getViewHandler() {

    return new ViewHandlerWrapper(super.getViewHandler()) {

    @Override

    public String getActionURL

    (FacesContext context, String viewId)

    {

    String url = super.getActionURL(context, viewId);

    return url + "?foo=bar";

    }

    };

    }

    };

    }

    }

    ```


    现在，在Jakarta Faces应用程序中有了这两个类，请考虑以下使用我们自定义表单组件的Facelet：


    请记住，当自定义组件使用`@FacesComponent(createTag=true)`注解时，不需要XML注册，其XML命名空间默认为`jakarta.faces.component`，其组件标签名称默认为简单的类名；另请参阅第[11](#454457_2_En_11_Chapter.xhtml)章。

    如果我们请求与此Facelet对应的视图并按下按钮，那么我们会看到“`?foo=bar`”出现在URL之后，这意味着我们通过包装器链对视图处理器的本地扩展已正确工作。'
  raw: 'A difficulty with using the `Application`  class to set these

    singletons is, first of all, that it’s timing sensitive. This means we

    can only set such classes from a certain point, which is obviously not

    before the point that the `Application` itself is

    available, and for some singletons not until the first request is

    serviced. This first request is a somewhat difficult point to track.

    Specifically, the resource handler, view handler, flow handler, and

    state handler, uhhh, state *manager*, can’t be set anymore after

    the first request, while the EL resolver and search keyword resolver

    can’t be added either after said first request.


    To demonstrate this, we’ll add the custom EL resolver again that we

    demonstrated earlier, but in a more dynamic way now. To do this, we

    remove the EL resolver from our `faces-config.xml` file

    and add a system listener instead. Our `faces-config.xml` file

    then looks as follows:


    ```


    com.example.project.ELResolverInstaller


    jakarta.faces.event.PostConstructApplicationEvent


    ```


    Indeed, this doesn’t get rid of the XML and, in fact, it’s even more

    XML, but reducing or getting rid of XML is not the main point here,

    which is the ability to register the EL resolver in a more dynamic

    way.


    The system event listener that we just

    registered here looks as follows:


    ```

    public class ELResolverInstaller implements SystemEventListener {

    @Override

    public boolean isListenerForSource(Object source) {

    return source instanceof Application;

    }

    @Override

    public void processEvent(SystemEvent event) {

    Application application = (Application) event.getSource();

    application.addELResolver(new CustomELResolver());

    }

    }

    ```


    What we have here is a system event listener that listens to the

    `PostConstructApplicationEvent`*.*

    This is generally a good moment to add plug-ins like the EL resolver.

    The `Application`

    instance is guaranteed to be available at this point, and request

    processing hasn’t started yet, so we’re surely in time before the first

    request has been handled.


    Local Extension and Wrapping

    In some cases, we don’t want to override, say, a view handler globally, but only
    for

    a local invocation of, typically, a method in a component. Jakarta Faces

    gathers for this by passing on the `FacesContext`, which

    components to use as the main entry point from which to get pretty much

    all other things. Components are for Jakarta Faces not CDI artifacts or

    otherwise injectable, so the CDI approach for the moment doesn’t hold

    for them.

    Local extension can then be done by wrapping the `FacesContext` using

    `FacesContextWrapper`

    and passing that to the next layer. Note that the Servlet spec uses the

    same pattern where the `HttpServletRequest`

    and `HttpServletResponse`

    can be wrapped by a filter using `HttpServletRequestWrapper`

    and `HttpServletResponseWrapper`

    and passed on to the next filter, which can wrap it again and pass it to

    its next filter, etc.

    To illustrate this, suppose that for a certain component we’d like to

    augment the action URL generation used by, among others, form components

    in such a way that “`?foo=bar`” is added to

    this URL. If we

    do this by globally overriding the view handler, all components and

    other code using the view handler would get to see this URL, while here

    we’d only want this for this very specific component.


    To achieve just this, we use wrapping here as illustrated in the

    following component:


    ```

    @FacesComponent(createTag = true)

    public class CustomForm extends HtmlForm {

    @Override

    public void encodeBegin(FacesContext context) throws IOException {

    super.encodeBegin(new ActionURLDecorator(context));

    }

    }

    ```


    Implementing the wrapper without support from Jakarta Faces would be

    a somewhat tedious task, to say the least, as the path from `FacesContext` to
    `ViewHandler` is a few

    calls deep and the classes involved have a large amount of methods.

    Luckily, Jakarta Faces greatly eases this task by providing wrappers for

    most of its important artifacts, with an easy-to-use constructor.

    The pattern used here is that the top-level class (`ActionURLDecorator`

    from the example earlier) extends from `FacesContextWrapper`

    and pushes the original `FacesContext` to its

    superclass. Then the path of intermediate objects is implemented by

    overriding the initial method in the chain (`getApplication()`

    here) and returning a wrapper for the return type of that method, with

    the super version of it passed into its constructor. This wrapper then

    does the same thing for the next method in the chain, until the final

    method is reached for which custom behavior is required.


    The following gives an example of this:


    ```

    public class ActionURLDecorator extends FacesContextWrapper {

    public ActionURLDecorator(FacesContext context) {

    super(context);

    }

    @Override

    public Application getApplication() {

    return new ApplicationWrapper(super.getApplication()) {

    @Override

    public ViewHandler getViewHandler() {

    return new ViewHandlerWrapper(super.getViewHandler()) {

    @Override

    public String getActionURL

    (FacesContext context, String viewId)

    {

    String url = super.getActionURL(context, viewId);

    return url + "?foo=bar";

    }

    };

    }

    };

    }

    }

    ```


    With these two classes present in the Jakarta Faces application, now

    consider the following Facelet that makes use of our custom form

    component:


    Remember that no XML registration is needed for the custom component

    when it’s annotated with `@FacesComponent(createTag=true)`

    and that its XML namespace defaults to `jakarta.faces.component`

    and its component tag name to the simple class name; see also Chapter

    [11](#454457_2_En_11_Chapter.xhtml).

    If we request the view corresponding to this Facelet and press the

    button, then we’d indeed see “`?foo=bar`” appearing

    after the URL, meaning that our local extension of the view handler via

    a chain of wrappers has worked correctly.'
  trans: '

    使用 `Application` 类来设置这些单例的一个难点在于，它首先对时机非常敏感。这意味着我们只能从某个特定时间点开始设置此类，显然不能早于 `Application`
    本身可用的时间点，而对于某些单例，则要等到第一个请求被处理之后才能设置。这个“第一个请求”是一个有点难以追踪的时间点。具体来说，资源处理器、视图处理器、流程处理器和状态处理器，呃，状态*管理器*，在第一个请求之后就不能再设置了，而
    EL 解析器和搜索关键字解析器在第一个请求之后也不能再添加。


    为了演示这一点，我们将再次添加之前演示过的自定义 EL 解析器，但这次采用更动态的方式。为此，我们从 `faces-config.xml` 文件中移除 EL
    解析器，并添加一个系统监听器。修改后的 `faces-config.xml` 文件如下所示：


    ```


    com.example.project.ELResolverInstaller


    jakarta.faces.event.PostConstructApplicationEvent


    ```


    确实，这并没有摆脱 XML，实际上 XML 甚至更多了，但减少或摆脱 XML 并非此处的主要目的，主要目的是能够以更动态的方式注册 EL 解析器。


    我们刚刚注册的系统事件监听器如下所示：


    ```

    public class ELResolverInstaller implements SystemEventListener {

    @Override

    public boolean isListenerForSource(Object source) {

    return source instanceof Application;

    }

    @Override

    public void processEvent(SystemEvent event) {

    Application application = (Application) event.getSource();

    application.addELResolver(new CustomELResolver());

    }

    }

    ```


    这里我们有一个系统事件监听器，它监听 `PostConstructApplicationEvent`*。* 这通常是添加像 EL 解析器这样的插件的好时机。此时
    `Application` 实例保证可用，并且请求处理尚未开始，因此我们肯定能在第一个请求被处理之前及时完成。


    局部扩展与包装

    在某些情况下，我们不想全局覆盖（例如）视图处理器，而只想在局部调用中覆盖，通常是在组件的方法中。Jakarta Faces 通过传递 `FacesContext`
    来支持这一点，组件将其作为获取几乎所有其他内容的主要入口点。对于 Jakarta Faces 来说，组件不是 CDI 制品，也不能通过其他方式注入，因此 CDI
    方法目前不适用于它们。


    然后可以通过使用 `FacesContextWrapper` 包装 `FacesContext` 并将其传递给下一层来实现局部扩展。请注意，Servlet
    规范使用了相同的模式，其中 `HttpServletRequest` 和 `HttpServletResponse` 可以由过滤器使用 `HttpServletRequestWrapper`
    和 `HttpServletResponseWrapper` 进行包装，并传递给下一个过滤器，该过滤器可以再次包装它并传递给它的下一个过滤器，依此类推。


    为了说明这一点，假设对于某个特定组件，我们希望增强操作 URL 的生成（表单组件等会用到），使得该 URL 被附加“`?foo=bar`”。如果我们通过全局覆盖视图处理器来实现，那么所有使用视图处理器的组件和其他代码都会看到这个
    URL，而这里我们只希望这个非常特定的组件看到它。


    为了实现这一点，我们使用包装，如下面的组件所示：


    ```

    @FacesComponent(createTag = true)

    public class CustomForm extends HtmlForm {

    @Override

    public void encodeBegin(FacesContext context) throws IOException {

    super.encodeBegin(new ActionURLDecorator(context));

    }

    }

    ```


    如果没有 Jakarta Faces 的支持，实现这个包装器至少可以说是一项相当繁琐的任务，因为从 `FacesContext` 到 `ViewHandler`
    的路径需要深入几次调用，并且涉及的类有大量方法。幸运的是，Jakarta Faces 通过为其大部分重要制品提供包装器（带有易于使用的构造函数）极大地简化了这项任务。


    这里使用的模式是，顶层类（前面例子中的 `ActionURLDecorator`）继承自 `FacesContextWrapper`，并将原始的 `FacesContext`
    传递给其超类。然后，通过覆盖链中的初始方法（这里是 `getApplication()`）并返回该方法返回类型的包装器（同时将超类版本传递给其构造函数），来实现中间对象的路径。这个包装器然后对链中的下一个方法执行相同的操作，直到到达需要自定义行为的最终方法。


    下面是一个示例：


    ```

    public class ActionURLDecorator extends FacesContextWrapper {

    public ActionURLDecorator(FacesContext context) {

    super(context);

    }

    @Override

    public Application getApplication() {

    return new ApplicationWrapper(super.getApplication()) {

    @Override

    public ViewHandler getViewHandler() {

    return new ViewHandlerWrapper(super.getViewHandler()) {

    @Override

    public String getActionURL

    (FacesContext context, String viewId)

    {

    String url = super.getActionURL(context, viewId);

    return url + "?foo=bar";

    }

    };

    }

    };

    }

    }

    ```


    在 Jakarta Faces 应用程序中有了这两个类之后，现在考虑以下使用我们自定义表单组件的 Facelet：


    请记住，当自定义组件使用 `@FacesComponent(createTag=true)` 注解时，不需要 XML 注册，其 XML 命名空间默认为 `jakarta.faces.component`，其组件标签名称默认为简单的类名；另请参见第
    11 章。

    如果我们请求与此 Facelet 对应的视图并按下按钮，那么我们会看到“`?foo=bar`”出现在 URL 之后，这意味着我们通过包装器链对视图处理器进行的局部扩展已正确生效。

