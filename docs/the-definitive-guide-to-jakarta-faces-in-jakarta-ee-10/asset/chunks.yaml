  trans: '

    保护对资源的访问

    在 Jakarta Faces 中，需要保护的主要资源是通过 URL 模式访问的视图。因此，我们需要为这些 URL 模式定义安全约束。这些约束主要在 `web.xml`
    中定义。事实上，从 Jakarta EE 10 开始，`web.xml` 几乎是唯一可以为 Jakarta Faces 视图定义安全约束的有效位置。


    Jakarta EE 有三种安全约束：


    *   排除

    *   未检查

    *   按角色


    排除

    “**排除**”，也称为“拒绝所有”，意味着任何外部调用者都将被拒绝访问此约束所涵盖的资源。有人可能会问这种约束的目的是什么。如果资源永远无法被访问，那么这些资源一开始为什么存在？答案有两点。其一，单个应用程序可能为不同目的而配置。排除安全约束是一种快速禁用某些不适用于应用程序特定配置的资源的简单方法。一个更重要的用例是能够区分资源的外部使用和内部使用。这里的关键见解是，安全约束仅应用于对该资源的外部请求，即调用者请求
    `https://example.com/resources/template.xhtml`，但**不**应用于内部请求，例如包含、转发以及从类路径或文件系统加载资源的任何方法。这对于
    Jakarta Faces 尤其重要，因为复合组件存在一个不太理想的设计选择。复合组件是通过 Facelet 而非 Java 类实现的组件。按照惯例，它们必须放置在位于
    Web 根目录下的名为 `/resources` 的目录内的子目录中，例如 `/resources/bar/foo.xhtml`。这将使复合组件“`foo`”在命名空间
    `jakarta.faces.composite/bar` 中可用。


    组件当然不是视图，调用者不应能够直接请求它们。不幸的是，`/resources` 对于 Jakarta EE 来说并不是一个特殊的目录。Jakarta Faces
    按照惯例赋予了它特殊含义，但对于 Servlet 容器来说，它和其他目录一样。这特别意味着它没有应用任何保护，任何调用者都可以直接从中请求资源。换句话说，这个目录是“未检查”的，也称为“全局可读”。即使使用
    `*.xhtml` 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行这些组件。显然，这不是我们想要的。对此有两种解决方案：


    *   配置另一个目录作为 Jakarta Faces 资源目录。

    *   在 `web.xml` 中添加上述安全约束。


    通过 `jakarta.faces.WEBAPP_RESOURCES_DIRECTORY` 上下文参数，可以将另一个目录配置为 Jakarta Faces
    资源目录，而不是 `/resources`。例如：


    ```

    jakarta.faces.WEBAPP_RESOURCES_DIRECTORY

    WEB-INF/resources


    ```


    请注意，该路径是相对于 Web 根目录的，并且不能以“`/`”开头。


    虽然这对我们自己的应用程序来说是一个好的默认设置，但它仍然不能完全保护我们。也就是说，第三方 JAR 仍然可以通过 `/resources` 提供其资源，并且不受该上下文参数的影响。因此，需要前面提到的“排除”约束。它看起来如下：


    ```


    /resources 文件夹

    /resources/*


    ```


    可以看出，定义*排除*约束归结为定义我们希望约束的 URL 模式，而不定义任何特定的约束。


    未检查

    “**未检查**”，也称为“允许所有”、“公开”和“全局可读”，意味着所有调用者，无论是否经过身份验证，都可以访问此“约束”所涵盖的资源。在内部，可能存在一个显式约束，但在
    `web.xml` 中，这个“约束”只是通过不为某个 URL 模式定义任何约束来定义的。换句话说，没有被任何其他模式显式覆盖的每个 URL 都是“未检查”的。


    按角色

    “**按角色**”意味着一个所谓的角色与一个 URL 模式相关联，并且经过身份验证的调用者必须拥有该角色才能访问该资源。角色本身通常被视为具有严格语义的概念，但它本质上不过是一个不透明的字符串，需要与经过身份验证的调用者关联的字符串集合以及
    URL 模式关联的字符串集合相匹配。该字符串的内容完全由应用程序决定，这意味着它可以是“调用者类型”，例如“`admin`”、“`user`”等，也可以是细粒度的内容，例如“`may_add_item`”，甚至是像“`AYUDE-OPWR-BM1OP`”这样的令牌。


    以下是一个示例：


    ```


    用户页面

    /user/*


    VIEW_USER_PAGES


    管理员页面

    /admin/*


    VIEW_ADMIN_PAGES


    VIEW_USER_PAGES


    VIEW_ADMIN_PAGES


    ```


    在前面的片段中，我们定义了两个安全约束——一个用于 `/user/*` 模式，调用者需要拥有角色“`VIEW_USER_PAGES`”；另一个用于 `/admin/*`
    模式，调用者需要拥有角色“`VIEW_ADMIN_PAGES`”。有了上述约束，访问例如 `/user/account.xhtml` 的调用者必须经过身份验证并且拥有提到的角色。


    一个 auth-constraint 可以包含多个角色，这些角色之间应用“或”语义。这意味着经过身份验证的调用者只需要拥有该约束中的其中一个角色即可被授予访问权限。约束还可以限制为特定的
    HTTP 方法（例如 GET 或 POST）。但这有一个注意事项，因为默认情况下，所有未指定的方法都将是未检查的（公开的）。这可以通过使用顶级的 `<deny-uncovered-http-methods/>`
    标签来应对。以下是一个示例：


    ```


    用户页面

    /user/*

    GET

    POST


    VIEW_USER_PAGES


    ```

