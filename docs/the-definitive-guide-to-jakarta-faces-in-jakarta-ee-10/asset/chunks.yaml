- fmt: '### What About Jakarta EE?


    `Jakarta Faces` itself is part of `Jakarta EE`. `Jakarta EE` is basically an abstract
    specification of which the so-called application servers represent the concrete
    implementations. Examples of those application servers are `Eclipse GlassFish`,
    `Red Hat WildFly`, `Apache TomEE`, and `IBM WebSphere Liberty`. You can find them
    all at the Jakarta EE Compatible Products page: [`https://jakarta.ee/compatibility/`](https://jakarta.ee/compatibility/).
    It is exactly those application servers that actually provide among others `Jakarta
    Faces`, `Jakarta Expression Language (EL)`, `Jakarta Tags` (formerly known as
    `Jakarta Tags`), `Jakarta Contexts and Dependency Injection (CDI)`, `Jakarta Enterprise
    Beans` (formerly known as `Jakarta Enterprise Beans`, `Enterprise Java Beans`),
    `Jakarta Persistence`, `Jakarta Servlet`, `Jakarta WebSocket`, `Jakarta JSON Processing`,
    and many more APIs (application programming interfaces) of the box.


    There also exist so-called servlet containers that provide basically *only* the
    `Jakarta Servlet`, `Jakarta Pages`, `Jakarta Expression Language`, `Jakarta WebSocket`,
    and `Jakarta Security` out of the box, such as `Apache Tomcat` and `Eclipse Jetty`.
    Therefore, it would require some additional work to manually install and configure,
    among others, `Jakarta Faces`, `Jakarta Tags`, `Jakarta Contexts and Dependency
    Injection`, `Jakarta Enterprise Beans`, `Jakarta Persistence`, `Jakarta JSON Processing`,
    and/or many other missing APIs from the `Jakarta EE` platform on such a servlet
    container. It is not even trivial in the case of `Jakarta Enterprise Beans` as
    it requires modifying the servlet container’s internals. That is, by the way,
    exactly why `Apache TomEE` exists. It’s a `Jakarta EE` application server built
    on top of the bare-bones `Tomcat` servlet container engine.


    So you do not need to download and install “`Jakarta EE`” as a whole. Basically
    downloading any `Jakarta EE` application server to your choice is sufficient.
    We’re going to pick `Red Hat WildFly` for this book.


    ## Installing WildFly


    `WildFly` is an open source `Jakarta EE` application server from `Red Hat`. You
    can download it from [`https://wildfly.org/downloads`](https://wildfly.org/downloads).
    Make sure you choose the “`Jakarta EE 10 Full & Web Distribution`” and not, for
    example, the “`Servlet-Only Distribution`” or “`Preview Distribution`,” as they
    have other purposes. Installing is basically a matter of unzipping the downloaded
    file and putting it somewhere in your home folder. We’ll leave it there until
    we have `Eclipse` up and running so that we can then integrate `WildFly` in `Eclipse`
    and let `Eclipse` manage the `WildFly` application server.


    ## Installing Eclipse


    `Eclipse` is an open source IDE written in `Java`. You can download it from [`https://eclipse.org`](https://eclipse.org).
    It is basically like notepad but then with thousands if not millions of extra
    features, such as automatically compiling class files, building a `WAR (Web Application
    Archive)` file with them, and deploying it to an application server without the
    need to manually fiddle around with `javac` and others in a command console.


    `Eclipse` is available in a lot of flavors, even for `C/C++` and `PHP`. As we’re
    going to develop with `Jakarta EE (Enterprise Edition)`, we need the one saying
    “`Eclipse IDE for Enterprise Java and Web developers`,” importantly the one with
    “`Enterprise`” in its name. The one without it doesn’t contain the mandatory plug-ins
    for developing `Jakarta EE` web applications. Here is the main download page:
    [`https://www.eclipse.org/downloads/packages/`](https://www.eclipse.org/downloads/packages/).
    Also here, installing is basically a matter of unzipping the downloaded file and
    putting it somewhere in your home folder.


    In `Windows` and `Linux`, you’ll find the `eclipse.ini` configuration file in
    the unzipped folder. In `MacOS`, this configuration file is located in `Eclipse.app/Contents/Eclipse`.
    Open this file for editing. We want to increase the allocated memory for `Eclipse`.
    At the bottom of `eclipse.ini`, you’ll find the following lines:


    ```

    -Xms256m

    -Xmx2048m

    ```


    This sets, respectively, the initial and maximum memory size pool which `Eclipse`
    may use. This is a bit too low when you want to develop a bit of a decent `Jakarta
    EE` application. Let’s at least double both the values.


    ```

    -Xms512m

    -Xmx4g

    ```


    Watch out that you don’t declare more than the available physical memory in the
    `Xmx` setting . When the actual memory usage exceeds the available physical memory,
    then it will continue into virtual memory, usually in flavor of a swap file on
    disk. This will greatly decrease performance and result in major hiccups and slowdowns.


    Now you can start `Eclipse` by executing the `eclipse` executable in the unzipped
    folder. You will be asked to select a directory as workspace. This is the directory
    where `Eclipse` will save all workspace projects and metadata.


    After that, `Eclipse` will show a welcome screen. This is not interesting for
    now. You can click the *Hide* button on the right top to close the welcome screen.
    Untick if necessary “Always show Welcome at start up” on the bottom right. After
    that, you will enter the workbench. By default, it looks like the screenshot in
    Figure [2-1](#454457_2_En_2_Chapter.xhtml#Fig1).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig1_HTML.png)


    Figure 2-1


    Eclipse workbench


    ### Configuring Eclipse


    Before we can start writing code, we would like to fine-tune `Eclipse` a bit so
    that we don’t eventually end up in trouble or with annoyances. `Eclipse` has an
    enormous amount of settings, and some of its default values should not have been
    the default values. You can verify and configure the settings via *Window* ➤ *Preferences*.


    *   *General* ➤ *Workspace* ➤ *Text file encoding* must be set to **UTF-8**. Particularly
    in `Windows`, this might otherwise default to the proprietary encoding `CP-1252`
    that supports only 255 different characters and does not support any characters
    beyond the Latin range. When reading and saving `Unicode` files with `CP-1252`,
    you risk seeing unintelligible sequences of characters. This is also called “mojibake.”^([¹](#fn1))


    *   *General* ➤ *Workspace* ➤ *New text file line delimiter* must be set to **Unix**.
    It will work just fine on `Windows` as well. This will particularly keep version
    control systems happy. Otherwise, developers pulling code on different operating
    systems might face confusing conflicts or diffs caused by different line endings.


    *   *General* ➤ *Editors* ➤ *Text editors* ➤ *Spelling* should preferably be **disabled**.
    This will save you from a potentially big annoyance because it unnecessarily also
    spellchecks technical entries in `XML` configuration files such as `faces-config.xml`
    and `web.xml`, causing confusing warnings in those files such as “`*.xhtml` is
    not correctly spelled.”


    *   *Java* ➤ *Installed JREs* must be set to the **JDK** (actually the same as
    you’ve configured in `JAVA_HOME` environment variable) and thus not the `JRE`.
    This setting will normally also be used to execute the integrated application
    server that usually requires the `JDK`.


    *   *Java* ➤ *Compiler* ➤ *Compiler compliance level* must be set to at least
    **11**. This is the minimum required `Java` version for `Jakarta EE 10`. You can
    of course also pick a higher version. For example, **17** will work just fine.'
