    \ 4 章），并附带一个针对 `Country.class` 的自定义转换器：\n\n```\n<h:selectOneMenu value=\"#{bean.country}\"\
    \ converter=\"project.CountryConverter\">\n    <f:selectItems value=\"#{bean.availableCountries}\"\
    \ var=\"country\"\n        itemValue=\"#{country}\" itemLabel=\"#{country.name}\"\
    \ />\n</h:selectOneMenu>\n```\n\n其中相关的支持 bean 属性声明如下：\n\n```\nprivate Country\
    \ country;\nprivate List<Country> availableCountries;\n```\n\n那么你需要记住，该实体已正确实现了其\
    \ `equals()` 和 `hashCode()` 方法。否则，Jakarta Faces 在提交表单时可能会抛出一个令人困惑的验证错误。\n\n*验证错误：值无效*\n\
    \n当 bean 是请求作用域而不是视图作用域时，可能会发生这种情况，因此每次回发时都会重新创建可用国家列表。作为防止篡改请求的安全措施的一部分，Jakarta\
