- fmt: "# Protect Access to Resources\n\nIn Jakarta Faces, the main resources to protect\
    \ are views, which are accessed via URL patterns. It’s therefore these URL patterns\
    \ we need to define security constraints. These constraints are primarily defined\
    \ in `web.xml`. In fact, as of Jakarta EE 10, `web.xml` is pretty much the only\
    \ viable place to define security constraints for Jakarta Faces views.\n\nJakarta\
    \ EE has three kinds of security constraints:\n\n- Excluded\n- Unchecked\n- By\
    \ role\n\n## Excluded\n\n“**Excluded**,” a.k.a. “deny all,” means that no external\
    \ caller will be granted access to the resources covered by this constraint. One\
    \ might ask what the purpose of such a constraint is. If the resources can never\
    \ be accessed, why are those resources there in the first place? The answer is\
    \ twofold. For one, a single application may be configured for different purposes.\
    \ An excluded security constraint is an easy way then to quickly disable a number\
    \ of resources that are not applicable to a certain configuration of the application.\
    \ A more important use case is to be able to make a distinction between external\
    \ use and internal use of a resource. The key insight here is that security constraints\
    \ are only applied to external requests for that resource, that is, to a caller\
    \ requesting `https://example.com/resources/template.xhtml`, but **not** to internal\
    \ requests such as includes, forwards, and any of the methods to load a resource\
    \ from the classpath or file system.\n\nThis is specifically important for Jakarta\
    \ Faces because of a somewhat unfortunate design choice regarding composite components.\
    \ Composite components are components that are implemented via a Facelet instead\
    \ of a Java class. By convention, they have to be placed in a directory inside\
    \ a directory named `/resources` that resides in the web root, for instance, `/resources/bar/foo.xhtml`.\
    \ This will make a composite component “`foo`” available in the namespace `jakarta.faces.composite/bar`.\n\
    \nComponents are of course not views, and the caller should not be able to request\
    \ those directly. Unfortunately, `/resources` is not in any way a special directory\
    \ to Jakarta EE. Jakarta Faces assigns a special meaning to it by convention,\
    \ but to the Servlet container, it’s a directory like any other. This specifically\
    \ means there’s no protection applied to it and any caller can directly request\
    \ resources from it. In other words, this directory is “unchecked,” a.k.a. “world\
    \ readable.” Even with an `*.xhtml` mapping, this not only allows the user to\
    \ guess which components we have but lets the user attempt to execute those as\
    \ well. Clearly, this is not what we want. There are two solutions for this:\n\
    \n- Configure another directory to be the Jakarta Faces resources directory.\n\
    - Add the mentioned security constraint to `web.xml`.\n\nVia the `jakarta.faces.WEBAPP_RESOURCES_DIRECTORY`\
    \ context parameter, another directory can be configured to be the Jakarta Faces\
    \ resources directory instead of `/resources`. For example:\n\n```\njakarta.faces.WEBAPP_RESOURCES_DIRECTORY\n\
    WEB-INF/resources\n```\n\nNote that the path is relative to the web root and must\
    \ not begin with a “`/`”.\n\nWhile this is a good default for our own applications,\
    \ it still doesn’t totally protect us. Namely, third-party JARs can still provide\
    \ their resources via `/resources` and aren’t affected by that context parameter.\
    \ For that reason, the aforementioned “Excluded” constraint is needed. It looks\
    \ as follows:\n\n```\n<security-constraint>\n    <web-resource-collection>\n \
    \       <web-resource-name>The /resources folder</web-resource-name>\n       \
    \ <url-pattern>/resources/*</url-pattern>\n    </web-resource-collection>\n  \
    \  <!-- No auth-constraint means excluded -->\n</security-constraint>\n```\n\n\
    As can be seen, defining an *excluded* constraint boils down to defining the URL\
    \ pattern that we wish to constrain, without defining any specific constraints.\n\
    \n## Unchecked\n\n“**Unchecked**,” a.k.a. “permit all,” “public,” and “world readable,”\
    \ means that all callers, independent of whether or not they are authenticated,\
    \ have access to the resources covered by the “constraint.” Internally, an explicit\
    \ constraint may exist for this, but in `web.xml`, this “constraint” is defined\
    \ simply by not defining any constraint at all for a URL pattern. In other words,\
    \ every URL that’s not covered explicitly by any other pattern is “unchecked.”\n\
    \n## By Role\n\n“**By role**” means a so-called role is associated with a URL\
    \ pattern, and the authenticated caller must have that role in order to access\
    \ the resource. A role itself is frequently seen as a concept with strict semantics,\
    \ but it’s essentially little more than just an opaque string that needs to match\
    \ from the set of such strings associated with an authenticated caller and the\
    \ set of strings associated with a URL pattern. The content of that string is\
    \ completely up to the application, meaning it could be a “type of caller,” like\
    \ “`admin`”, “`user`”, etc., but also something fine-grained as “`may_add_item`”,\
    \ or even tokens such as “`AYUDE-OPWR-BM1OP`”.\n\nThe following gives an example:\n\
    \n```\n<security-constraint>\n    <web-resource-collection>\n        <web-resource-name>User\
    \ pages</web-resource-name>\n        <url-pattern>/user/*</url-pattern>\n    </web-resource-collection>\n\
    \    <auth-constraint>\n        <role-name>VIEW_USER_PAGES</role-name>\n    </auth-constraint>\n\
    </security-constraint>\n\n<security-constraint>\n    <web-resource-collection>\n\
    \        <web-resource-name>Admin pages</web-resource-name>\n        <url-pattern>/admin/*</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>VIEW_ADMIN_PAGES</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n\n<security-role>\n    <role-name>VIEW_USER_PAGES</role-name>\n\
    </security-role>\n<security-role>\n    <role-name>VIEW_ADMIN_PAGES</role-name>\n\
    </security-role>\n```\n\nIn the preceding fragment, we define two security constraints—one\
    \ for the `/user/*` pattern, for which the caller needs to have the role “`VIEW_USER_PAGES`”,\
    \ and one for the `/admin/*` pattern, for which the caller needs the role “`VIEW_ADMIN_PAGES`”.\
    \ With the aforementioned constraints in place, a caller accessing, say, `/user/account.xhtml`\
    \ has to be authenticated and has to have the mentioned role.\n\nAn `auth-constraint`\
    \ can contain multiple roles, for which OR semantics are applied. This means the\
    \ authenticated caller only needs to have one of the roles in that constraint\
    \ in order to be granted access. Constraints can additionally be restricted to\
    \ a specific HTTP method (such as GET or POST). This does come with a caveat,\
    \ since by default all methods that are not specified will be unchecked (public).\
    \ This can be countered by using the top-level `<deny-uncovered-http-methods/>`\
    \ tag. The following gives an example of this:\n\n```\n<security-constraint>\n\
    \    <web-resource-collection>\n        <web-resource-name>User pages</web-resource-name>\n\
    \        <url-pattern>/user/*</url-pattern>\n        <http-method>GET</http-method>\n\
    \        <http-method>POST</http-method>\n    </web-resource-collection>\n   \
    \ <auth-constraint>\n        <role-name>VIEW_USER_PAGES</role-name>\n    </auth-constraint>\n\
    </security-constraint>\n```"
