    10. WebSocket 推送


    WebSocket 支持由 `<f:websocket>` 标签、`PushContext` 接口和 `@Push` 注解表示，这些是在 Jakarta Faces
    2.3 中引入的。它构建在 Jakarta EE 7 中引入的 JSR-356 WebSocket 规范之上。自 7.0.27 版本起，Tomcat 原生支持
    JSR-356，自 9.1.0 版本起，Jetty 也原生支持。在 Mojarra 中，`<f:websocket>` 有一个额外的 Jakarta EE
    依赖：JSON-P (JSR-353)。如果您的目标是 Tomcat 或 Jetty 而非 Jakarta EE 应用服务器，则可能需要单独安装它。JSON-P
    在内部用于将 Java 对象转换为 JSON 字符串，以便可以轻松地传输到客户端，并作为附加到 `<f:websocket>` 的 JavaScript 监听器函数的参数提供。


    配置


    JSR-356 WebSocket 规范并未正式支持在运行时以编程方式初始化套接字端点。因此，我们不能仅仅通过在视图中声明 `<f:websocket>`
    并等待引用它的 Jakarta Faces 页面首次打开来初始化它。我们确实需要在部署期间显式地初始化它。Jakarta Faces 默认可以做到这一点，但如果
    Web 应用程序永远不会使用未使用的 WebSocket 端点，那么让它永远保持打开状态在资源效率上并不高。因此，我们无法避免使用上下文参数来指示 Jakarta
    Faces 在部署期间显式地初始化它。


    ```

    jakarta.faces.ENABLE_WEBSOCKET_ENDPOINT

    true


    ```


    如果您更喜欢编程式初始化而非声明式初始化，则始终可以在 Web 片段库的 `ServletContainerInitializer` 中使用 `ServletContext#setInitParameter()`，如下所示：


    ```

    public class YourInitializer implements ServletContainerInitializer {

    @Override

    public void onStartup(Set> types, ServletContext context) {

    context.setInitParameter(

    PushContext.ENABLE_WEBSOCKET_ENDPOINT_PARAM_NAME, "true");

    }

    }

    ```


    请注意，无法在 `ServletContextListener` 中执行此任务，因为 Jakarta Faces 实际上会在其自己的 `ServletContainerInitializer`
    实现中检查上下文参数，而该实现总是在任何 `ServletContextListener` 之前运行。一旦 WebSocket 端点启用并在部署期间成功初始化，它将在
    URL 模式 `/jakarta.faces.push/*` 上监听 WebSocket 握手请求。第一个路径元素将代表 WebSocket 通道名称。回到“官方”说法，某些
    WebSocket 实现确实支持编程式初始化，例如 Undertow 提供的实现，而 Undertow 又被 WildFly 使用。不幸的是，规范并未如此规定，并且可能存在根本不支持编程式初始化的
    WebSocket 实现，例如 Payara 中使用的 Tyrus。^(⁸⁴)


    默认情况下，WebSocket 容器会在应用服务器监听 HTTP 请求的同一端口上监听握手请求。您可以选择使用另一个 `web.xml` 上下文参数更改端口：


    ```

    jakarta.faces.WEBSOCKET_ENDPOINT_PORT


    ```


    或者在 `ServletContainerInitializer` 中以编程方式更改：


    ```

    context.setInitParameter(

    PushContext.WEBSOCKET_ENDPOINT_PORT_PARAM_NAME, "8000");

    ```


    用法


    在您的 Jakarta Faces 页面中，只需声明 `<f:websocket>` 标签，并附上必需的 `channel` 属性（代表通道名称）和可选的
    `onmessage` 属性（代表对 JavaScript 函数的引用）。


    ```


    function logMessage(message, channel, event) {

    console.log(message);

    }


    ```


    JavaScript 函数将被调用，并传入三个参数：


    1.  `message`：作为 JSON 对象的推送消息。

    2.  `channel`：WebSocket 通道名称。如果您打算使用全局监听器或希望手动控制 WebSocket 的关闭，这可能会很有用。

