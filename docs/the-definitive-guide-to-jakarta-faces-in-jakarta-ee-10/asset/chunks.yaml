    脚注


    4. 表单组件


    这些是标准 Jakarta Faces 组件集中最重要的组件。没有它们，Jakarta Faces 一开始就不会有太大用处。如果使用纯 HTML 元素代替
    Jakarta Faces 表单组件，你最终会在控制器类中塞满手动应用、转换和验证提交值的代码；用这些值更新模型；以及确定要调用的操作方法。这正是 Jakarta
    Faces 作为一个基于组件的 MVC（模型-视图-控制器）框架，用于 HTML 表单式 Web 应用程序时，应该为你分担的繁重工作。


    输入、选择和命令组件

    所有输入组件都继承自`UIInput`超类。所有选择组件都继承自其子类，可以是`UISelectBoolean`、`UISelectOne`或`UISelectMany`（有关标准
    Jakarta Faces 组件的完整列表，请参见第 3 章的表 3-1）。所有输入和选择组件都实现了`EditableValueHolder`接口，该接口允许附加`Converter`、`Validator`和`ValueChangeListener`。所有命令组件都继承自`UICommand`超类，并实现`ActionSource`接口，该接口允许定义一个或多个应在调用应用程序阶段（第五阶段）调用的受管
    bean 方法。它们只能有一个“action”方法和多个“action listener”方法。

    HTML 要求所有输入、选择和命令元素都嵌套在表单元素中。标准 Jakarta Faces 组件集只提供一个这样的组件，即`<h:form>`，它来自`UIForm`超类。你也可以使用纯
    HTML `<form>`元素，但这不会自动在表单中包含表示 Jakarta Faces 视图状态的必填`jakarta.faces.ViewState`隐藏输入字段。`<h:form>`的渲染器负责自动将其包含在生成的每个
    Jakarta Faces 表单的 HTML 表示中。如果没有`jakarta.faces.ViewState`HTTP 请求参数，Jakarta Faces
    将不会将该请求识别为有效的回发请求。换句话说，`FacesContext.getCurrentInstance().isPostback()`将返回`false`，然后
    Jakarta Faces 甚至不会处理提交的值，更不用说调用操作方法了。在 Jakarta Faces 页面中，纯 HTML `<form>`元素仅在与`<f:viewParam>`标签结合用于
    GET 请求时有用，这些标签应负责将 GET 请求参数作为提交值进行处理。这将在后面的“GET 表单”部分详细说明。

    所有命令组件都有一个`action`属性，可以绑定到受管 bean 方法。只要没有转换或验证错误，该方法将在调用应用程序阶段（第五阶段）被调用。转换和验证将在第
    5 章中详细介绍，因此本章将跳过此步骤的详细说明。


    基于文本的输入组件

    所有基于文本的输入组件都有一个`value`属性，可以绑定到受管 bean 属性。在视图渲染期间，将查询此属性的 getter 以检索并显示任何预设值。在回发请求的更新模型值阶段（第四阶段），如果适用，将使用已提交并经过转换和验证的值调用此属性的
    setter。以下是一个基本用法示例，演示了所有基于文本的输入组件。


    Facelets 文件 `/test.xhtml`：


    支持 bean 类 `com.example.project.view.Bean`：


    ```

    @Named @RequestScoped

    public class Bean {

    private String text;

    private String password;

    private String message;

    private String hidden;

    public void submit() {

    System.out.println("表单已提交！");

    System.out.println("text: " + text);

    System.out.println("password: " + password);

    System.out.println("message: " + message);

    System.out.println("hidden: " + hidden);

    }

    // 在此处为每个属性添加/生成 getter 和 setter。

    }

    ```


    生成的 HTML 输出：


    在 Chrome 浏览器中渲染（已添加换行符）：

    ![](img/454457_2_En_4_Figa_HTML.jpg)

    你会在生成的 HTML 输出中注意到几件事。毫无疑问，首先注意到的是 Jakarta Faces 也自动生成了表单和输入 HTML 元素的`id`和`name`属性，所有这些都带有由公共
    API（应用程序编程接口）常量`UIViewRoot.UNIQUE_ID_PREFIX`定义的前缀`j_id`。其后的“`t`”基本上代表“树”，其后的数字基本上代表组件在组件树中的位置。因此，当你在
    Facelets 文件中添加、删除或移动组件时，这很容易发生变化。因此，当 QA（质量保证）需要为 Web 应用程序编写集成测试时（通常需要使用 HTML
    元素 ID），这也会带来麻烦。

    当功能必须具有`id`和/或`name`属性时，Jakarta Faces 将使用自动生成的 ID。`id`属性是必需的，以便能够通过任何 JavaScript
    代码（也可以由 Jakarta Faces 自动生成，例如负责 Ajax 工作的函数）找到 HTML 元素。由于这会使生成的 HTML 代码难以阅读，坦率地说，很丑陋，我们更希望显式指定任何
    Jakarta Faces 表单、输入、选择和命令组件的`id`属性值。这样，Jakarta Faces 将直接使用它来生成 HTML 元素的`id`和`name`属性，而不是使用自动生成的属性。


    现在，让我们为此重写 Facelets 文件 `/test.xhtml`。

