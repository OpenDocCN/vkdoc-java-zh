- fmt: '# Setting the Authentication Mechanism


    After the security constraints have been defined, we need to set how the caller
    will authenticate. The artifact that handles the interaction with the caller (i.e.,
    asks the caller for credentials in a certain way) is called an “authentication
    mechanism.” Jakarta EE provides a number of these out of the box. The Servlet
    spec provides four, namely, `FORM`, `BASIC`, `DIGEST`, and `CERT`, while Jakarta
    EE Security provides `FORM` and `BASIC` as well (with the difference that these
    correspond to CDI beans), but also a variant of `FORM` called “Custom `FORM`.”


    `FORM` and Custom `FORM` are both suitable for interactive web applications, such
    as the ones we would build primarily with Jakarta Faces. Contrary to, say, `BASIC`,
    the `FORM` authentication mechanisms call back into the application and let it
    render the form that asks the caller for credentials, hence the name of these
    mechanisms.


    The difference between the two is mainly in how the mechanism requires the application
    to continue the so-called authentication dialog after it has rendered the form.
    In `FORM`, this is done by letting the caller post the filled-out form to the
    virtual URL `j_security_check`, while in Custom `FORM`, this is done programmatically
    via a call to the injected `SecurityContext`. This small difference makes all
    the difference for Jakarta Faces though. In Jakarta Faces, a form view by default
    submits to the same URL it was requested from, so posting back to a single mechanism
    mandated URL is not at all natural. In addition to that, in Jakarta Faces, we
    often need to have server-side code running after a postback; just think about
    converters and validators and the ability to emit a faces message. We can’t really
    do any of this if we have to post back to the virtual nonfaces `j_security_check`
    URL, but it’s quite doable when we can continue the authentication dialog programmatically
    from the backing bean’s action method.


    We’ll first show you how to configure a web application to use the Custom `FORM`
    authentication mechanism. Later on, we’ll explain how to actually use Jakarta
    Faces to fulfill the requirements this mechanism imposes on the application.


    All of the authentication mechanisms provided by Jakarta EE Security are installed
    and configured via its own `AuthenticationMechanismDefinition` annotation. This
    annotation tells the container which type of authentication mechanism to install
    and with which configuration. The annotation can be placed on pretty much every
    class on the classpath. Logically, it fits in quite well with the `@FacesConfig`
    annotation. The following shows an example:


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    A perhaps somewhat unfortunate requirement here is that the `errorPage` attribute
    has to be specified and set to the empty string. This is needed since the `@LoginToContinue`
    element has a default value for an actual error page. In Jakarta Faces, we rarely
    use an explicit error page to display errors but instead redisplay the original
    page with the error messages rendered on it via faces messages.


    Do note that the current version of Jakarta EE Security only allows one authentication
    mechanism to be active at the same time. Technically what happens when the container
    encounters the `@CustomFormAuthenticationMechanismDefinition` annotation is that
    it adds an enabled CDI bean to the system of type `HttpAuthenticationMechanism`.
    This is important to know, since its being a regular CDI bean means we can inject
    it, decorate it, intercept it, and basically do everything with it that we can
    normally do with CDI beans.


    The `loginToContinue` attribute is used to configure the view that the container
    forwards to whenever the caller tries to access a protected view. This is called
    “container initiated authentication”; the container starts the authentication
    dialog as opposed to the application.


    Note that the default is to *forward* to the login page, meaning that if the caller
    tries to access `https://example.com/foo.xhtml`, and `/foo.xhtml` is protected,
    the caller will still see `/foo.xhtml` in the address bar and not `/login.xhtml`.
    However, the postback is to `/login.xhtml`, so after entering credentials, the
    caller would get to see this in the address bar. Alternatively, we can configure
    the `loginToContinue` attribute to use a redirect instead.


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    useForwardToLogin = false,

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    # Setting the Identity Store


    After having declared the security constraints and setting the mechanism that
    we’d like to use to authenticate, there’s one final piece of the puzzle remaining:
    setting the artifact that contains the caller’s data, such as credentials, name,
    and roles. In Jakarta EE Security, this artifact is called an identity store.


    Jakarta EE provides two of these out of the box: one to connect to a database
    and one to connect to LDAP (Lightweight Directory Access Protocol). The Jakarta
    EE Security RI (Soteria) additionally ships with an embedded identity store. Most
    application servers provide additional ones of their own, which are often configured
    outside the application (e.g., via an admin console, CLI, or XML configuration
    file that’s stored inside the server).


    Setting and configuring the Jakarta EE Security–provided identity stores and the
    one provided by the RI happens in a similar fashion as the authentication mechanisms:
    via an `IdentityStoreAnnotation`. Just like the authentication mechanism version,
    this will cause the container to add an enabled CDI bean to the system, this time
    one implementing the `IdentityStore` interface.


    The following shows an example together with our earlier definition of the authentication
    mechanism:


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    useForwardToLogin = false,

    errorPage = ""

    )

    )

    @EmbeddedIdentityStoreDefinition({

    @Credentials(

    callerName = "admin@example.com",

    password = "secret1",

    groups = { "VIEW_USER_PAGES", "VIEW_ADMIN_PAGES" }

    ),

    @Credentials(

    callerName = "user@example.com",

    password = "secret2",

    groups = { "VIEW_USER_PAGES" })

    )

    })

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```'
