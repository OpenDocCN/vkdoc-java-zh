- fmt: "```java\n@PeriodConstraint\npublic class Period implements Serializable {\n\
    \    @NotNull\n    private LocalDate startDate;\n    @NotNull\n    private LocalDate\
    \ endDate;\n    // Add/generate getters and setters.\n}\n```\n\nwith the following\
    \ custom constraint annotation:\n\n```java\n@Constraint(validatedBy = PeriodValidator.class)\n\
    @Target(TYPE)\n@Retention(RUNTIME)\npublic @interface PeriodConstraint {\n   \
    \ String message() default \"Start date must be before end date\";\n    Class<?>[]\
    \ groups() default {};\n    Class<? extends Payload>[] payload() default {};\n\
    }\n```\n\nand the following custom constraint validator:\n\n```java\npublic class\
    \ PeriodValidator implements ConstraintValidator<PeriodConstraint, Period> {\n\
    \    @Override\n    public boolean isValid(Period period, ConstraintValidatorContext\
    \ context) {\n        return period.getStartDate().isBefore(period.getEndDate());\n\
    \    }\n}\n```\n\nYou see, Jakarta Bean Validation expects that the model values\
    \ are already present in the given bean instance while performing the actual validation.\
    \ In the Jakarta Faces perspective, this means that the model values must be updated\
    \ before processing the validations. However, this doesn’t fit into the Jakarta\
    \ Faces life cycle wherein the model values are only updated after the validations\
    \ are successfully processed. Essentially, Jakarta Faces would need to clone the\
    \ bean instance, populate it with the desired model values, invoke Jakarta Bean\
    \ Validation on the cloned bean instance, collect any validation errors, and then\
    \ discard the cloned bean instance.\n\nThis is exactly what the `<f:validateWholeBean>`\
    \ tag, introduced with Jakarta Faces 2.3, is doing under the hood. The following\
    \ is an example form wherein this code is being used:\n\n```xhtml\n<h:form>\n\
    \    <h:inputText value=\"#{booking.period.startDate}\" />\n    <h:inputText value=\"\
    #{booking.period.endDate}\" />\n    <h:commandButton value=\"Submit\" />\n   \
    \ <f:validateWholeBean value=\"#{booking.period}\" />\n</h:form>\n```\n\nwith\
    \ this backing bean:\n\n```java\n@Named\n@ViewScoped\npublic class Booking implements\
    \ Serializable {\n    private Period period = new Period();\n    // Add/generate\
    \ getter.\n}\n```\n\nDo note that the `<f:validateWholeBean>` tag is explicitly\
    \ placed as the last child of the parent `<h:form>`, which ensures that the validation\
    \ is performed as the last thing after all individual input components in the\
    \ same form. This is as per the specification; the Jakarta Faces implementation\
    \ may throw a runtime exception when the tag is misplaced.\n\n## Immediate Attribute\n\
    \nThe `EditableValueHolder`, `ActionSource`, and `AjaxBehavior` interfaces also\
    \ specify an `immediate` property that basically maps to the `immediate` attribute\
    \ of all `UIInput` and `UICommand` components and the `<f:ajax>` tag. When set\
    \ to `true` on an `EditableValueHolder` component, then anything that normally\
    \ takes place during the process validations phase (third phase) as well as the\
    \ update model values phase (fourth phase) will instead be performed during the\
    \ apply request values phase (second phase). When conversion or validation fails\
    \ on them, then the life cycle will also skip the process validations phase (third\
    \ phase). When set to `true` on an `ActionSource` component or `AjaxBehavior`\
    \ tag, then anything that normally takes place during the invoke application phase\
    \ (fifth phase) will instead be performed during the apply request values phase\
    \ (second phase) and then only if conversion and validation haven’t failed.\n\n\
    Historically, this attribute was mainly used to be able to perform an “inner”\
    \ action on the form, usually to load a child input component depending on the\
    \ submitted value of the parent input component, without being blocked by conversion\
    \ or validation errors coming from other input components in the same form. A\
    \ common use case was populating a child drop-down on the change of a parent drop-down\
    \ without risking that the `required` attribute of the child drop-down blocks\
    \ the submit.\n\nThis approach obviously predates the Web 2.0 era wherein you’d\
    \ just use Ajax for this. Understand that the `immediate` attribute has essentially\
    \ become useless for this purpose since the introduction of `<f:ajax>` in Jakarta\
    \ Faces 2.0. Exactly the same use case can be achieved in a much cleaner way as\
    \ follows:\n\n```xhtml\n<h:selectOneMenu value=\"#{bean.country}\">\n    <f:selectItems\
    \ value=\"#{bean.countries}\" />\n    <f:ajax listener=\"#{bean.loadCities}\"\
    \ render=\"cities\" />\n</h:selectOneMenu>\n<h:selectOneMenu id=\"cities\" value=\"\
    #{bean.city}\">\n    <f:selectItems value=\"#{bean.cities}\" />\n</h:selectOneMenu>\n\
    ```\n\nAs you learned in Chapter 4, the `execute` attribute of `<f:ajax>` already\
    \ defaults to `@this`, so it’s just omitted. This also means that all other `EditableValueHolder`\
    \ components in the same form won’t be processed and thus won’t cause `#{bean.loadCities}`\
    \ ever to be blocked by conversion or validation errors coming from other inputs.\n\
    \nThese days, with the Ajax magic and all, the `immediate` attribute has thus\
    \ lost its main use case. Jakarta Faces could do as well without it. Due to its\
    \ historic use case, many starters may mistake its primary purpose to be “skip\
    \ all validation.” This is, however, not true. For that, you’d need to fine-tune\
    \ the `execute` attribute of `<f:ajax>` in such a way that it only covers the\
    \ input components that really need to be validated. In case you want to actually\
    \ “skip all validation” while submitting the entire form, then you’d best use\
    \ Jakarta Bean Validation constraints instead (the `@NotNull` and friends) and\
    \ simply have `<f:validateBean disabled=\"true\">` wrapping the entire form.\n\
    \n## Custom Converters\n\nFrom the beginning, Jakarta Faces has supported custom\
    \ converters. The main use case is to be able to convert a nonstandard model value,\
    \ such as a persistence entity specific to the web application. The less common\
    \ use case is to extend an existing standard converter and set some commonly used\
    \ defaults in its constructor so that you can get away with less code in the view\
    \ definition in order to declare the desired standard converter configuration\
    \ on the component.\n\nImagine that you want to be able to create master-detail\
    \ pages on your persistence entities wherein you’d like to pass the ID of the\
    \ entity around as a request parameter from the master page to the detail page.\
    \ The following is an example data table in the master page `/products/list.xhtml`\
    \ based on a fictive `Product` entity:\n\n```xhtml\n<h:dataTable value=\"#{productBean.products}\"\
    \ var=\"product\">\n    <h:column>#{product.id}</h:column>\n    <h:column>#{product.name}</h:column>\n\
    \    <h:column>#{product.description}</h:column>\n    <h:column>\n        <h:link\
    \ outcome=\"/products/edit\" value=\"Edit\">\n            <f:param name=\"id\"\
    \ value=\"#{product.id}\" />\n        </h:link>\n    </h:column>\n</h:dataTable>\n\
    ```\n\nNote the last column of the table. It generates a link to the detail page\
    \ `/products/edit.xhtml` whereby the ID of the entity is passed as a GET request\
    \ parameter as in `/product.xhtml?id=42`. In the detail page, you can use `<f:viewParam>`\
    \ to set the GET request parameter in the backing bean.\n\n```xhtml\n<f:metadata>\n\
