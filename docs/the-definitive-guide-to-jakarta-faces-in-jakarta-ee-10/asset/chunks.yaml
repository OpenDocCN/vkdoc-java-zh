  trans: "\n1.  `code`：关闭原因代码，以整数形式表示。如果值为 `-1`，则表示客户端不支持 WebSocket JavaScript API^(⁸⁵)。如果值为\
    \ `1000`，则表示由于服务器端的视图或会话过期而发生了正常关闭。如果值为 `1008`，则表示由于提供的通道 ID 未知而发生了正常关闭。这通常只会在客户端伪造通道\
    \ ID，或者服务器在客户端尚未刷新页面时，因新部署导致通道 ID 变更而重启时发生。\n\n2.  `channel`：WebSocket 通道名称。如果你打算设置全局监听器，这个信息可能会很有用。\n\
    \n3.  `event`：原始的 `CloseEvent` 对象。如果你打算在 JavaScript 函数中检查它，这个信息可能会很有用。\n\n正如你在上述\
    \ `onclose` 监听器函数示例中可能注意到的，你可以通过检查 `<f:websocket>` 的关闭代码是否等于 `1000`，来通过 JavaScript\
    \ 执行一些客户端操作（例如，显示警告消息和/或重定向到某个“会话已过期”页面）。\n\n```javascript\nfunction closeListener(code)\
    \ {\n    if (code == 1000) {\n        window.location = faces.contextPath + \"\
    /expired.xhtml\";\n    }\n}\n```\n\n这对于视图作用域和会话作用域的套接字都有效。然而，只要文档在客户端仍然处于打开状态，应用程序作用域的套接字就会永久保持打开，即使底层的视图或会话已经过期。\n\
    \n当首次连接尝试成功，但套接字后来因某种原因（例如，服务器正在重启）断开连接时，默认情况下会触发一个错误事件，并以递增的时间间隔持续尝试重新连接。在 Mojarra\
    \ 的情况下，它会最多重试 25 次，每次间隔增加 500 毫秒。如果所有重连尝试都失败，它最终会完全关闭套接字并调用 `onclose` 监听器。你可以选择使用\
    \ `onerror` 属性来引用一个监听这些错误事件的 JavaScript 函数。\n\n```javascript\nfunction errorListener(code,\
    \ channel, event) {\n    if (code == 1001) {\n        // 服务器可达，但返回了意外的响应代码。例如，服务器关闭时返回\
    \ 503。\n    }\n    else if (code == 1006) {\n        // 服务器不再可达，这可能发生在服务器完全宕机或客户端网络断开时。\n\
    \    }\n    else {\n        // 任何其他原因，通常不会是 -1、1000 或 1008，\n        // 因为此时会调用\
    \ onclose 代替。\n    }\n    // 无论如何，websocket 都会尝试重新连接。这个\n    // onerror 函数会被再次调用。一旦\
    \ websocket\n    // 放弃重新连接，最终会调用 onclose。\n}\n```\n\n深入解析 Mojarra 的 f:websocket\
    \ 实现\n\n`<f:websocket>` API 指定了以下类和方法：\n\n*   `jakarta.faces.push.Push`：一个用于 `@Inject`\
    \ 的 CDI 限定符。借助此限定符，可以指定套接字通道名称。\n\n*   `jakarta.faces.push.PushContext`：一个包含三个\
    \ `send()` 方法的接口：`send(Object message)`、`send(Object message, S user)` 和 `send(Object\
    \ message, Collection<S> users)`。所有这些方法都将推送消息作为 `Object` 接收，并在 JavaScript 中将其转换为\
    \ JSON 字符串。所有这些方法都返回一个 `Set<Future<Void>>`。如果返回空集合，则表示没有与给定通道和用户关联的开放套接字。对于每个\
    \ `Future<Void>`，如果在调用 `Future#get()` 方法时没有抛出 `ExecutionException`，则表示消息已成功投递。\n\
    \n*   `jakarta.faces.component.UIWebsocket`：一个实现了 `ClientBehaviorHolder` 的组件，以支持嵌套的\
    \ `<f:ajax>`。历史上，原型套接字标签是从 `TagHandler` 而非 `UIComponent` 扩展而来的。后来决定让该标签支持 `<f:ajax>`，因为这将使复杂且有状态的\
    \ UI 更新变得更加容易。然而，让 `TagHandler` 实现 `ClientBehaviorHolder` 并受益于所有内置的 Ajax 魔法是不可能的，因此最终转换为了\
    \ `UIComponent`。\n\n*   `ViewHandler#getWebsocketURL()` 方法：该方法接收一个通道名称，并借助 `ExternalContext#encodeWebsocketURL()`\
    \ 返回形式为 `ws://host:port/context/jakarta.faces.push/channel` 的绝对 WebSocket URL。\n\
    \n*   `ExternalContext#encodeWebsocketURL()` 方法：该方法基本上接收一个形式为 `/context/jakarta.faces.push/channel`\
    \ 的相对 WebSocket URI，并返回绝对 WebSocket URL。\n\n实际的实现相当广泛。它直接基于 OmniFaces 的 `<o:socket>`^(⁸⁶)，并在此处和彼处进行了一些调整，例如在\
    \ JavaScript API 函数中使用组件的客户端 ID 而不是通道名称。\n\n*   `com.sun.faces.renderkit.html_basic.WebsocketRenderer`：一个\
    \ Faces 渲染器类，在编码期间将套接字通道、作用域和用户注册到 `WebsocketChannelManager` 中，并从中检索 WebSocket\
    \ URL。然后它会自动包含包含必要 `faces.push.*` 函数的 `faces.js` 脚本，并渲染 `faces.push.init(...)`\
    \ 内联脚本函数调用，其中将 WebSocket URL 作为参数之一。此函数应在 JavaScript 中创建一个 `new WebSocket(url)`。`WebsocketRenderer`\
    \ 还会将 `WebsocketFacesListener` 订阅到当前视图。\n\n*   `com.sun.faces.push.WebsocketChannelManager`：一个会话作用域的\
    \ CDI 托管 Bean，用于跟踪所有迄今为止注册的 `<f:websocket>` 通道、作用域和用户，并确保每个套接字获得其唯一的通道标识符。它会将每个通道标识符注册到\
    \ `WebsocketSessionManager` 中，并将用户目标套接字的通道标识符注册到 `WebsocketUserManager` 中。\n\n\
    *   `com.sun.faces.push.WebsocketFacesListener`：一个系统事件监听器，监听 `PreRenderViewEvent`，并根据\
    \ `connected` 属性是否表示一个在 Ajax 请求期间发生更改的动态 EL 表达式，在必要时渲染 `faces.push.open(...)`\
    \ 或 `faces.push.close(...)` 内联脚本函数调用。\n\n*   `com.sun.faces.push.WebsocketEndpoint`：一个实现了\
    \ JSR-356 `jakarta.websocket.Endpoint` 的类，并监听 URI 模板 `/jakarta.faces.push/{channel}`。当在客户端\
    \ JavaScript 中创建并打开一个 `new WebSocket(url)` 时，会在服务器端 Java 中创建一个新的 `jakarta.websocket.Session`，并且\
    \ `WebsocketEndpoint` 会将该 `Session` 添加到 `WebsocketSessionManager`。相应地，当套接字关闭时，`WebsocketEndpoint`\
    \ 会将其从 `WebsocketSessionManager` 中移除。\n\n*   `com.sun.faces.push.WebsocketSessionManager`：一个应用程序作用域的\
    \ CDI 托管 Bean，用于收集所有迄今为止打开的套接字会话，并验证其唯一的 WebSocket URL 是否已由 `WebsocketChannelManager`\
    \ 注册。\n\n*   `com.sun.faces.push.WebsocketUserManager`：一个应用程序作用域的 CDI 托管 Bean，用于收集所有迄今为止打开的用户目标套接字的通道标识符。\n\
    \n*   `com.sun.faces.push.WebsocketPushContext`：`PushContext` 接口的具体实现。它将通过 `WebsocketSessionManager`\
    \ 发送推送消息，并在必要时通过 `WebsocketUserManager` 获取用户目标通道。\n"
- fmt: "# 排版后的内容\n\n`com.sun.faces.push.WebsocketPushContextProducer`：CDI生产者，它根据从`@Push`限定符获取的通道名称、`WebsocketSessionManager`和`WebsocketUserManager`创建`WebsocketPushContext`实例。\n\
    \n## 脚注\n\n### 11. 自定义组件\n\n在第[7](#454457_2_En_7_Chapter.xhtml)章中，您应该已经了解到，当您希望将主页面布局片段拆分为可重用的模板（如页眉、菜单、主要内容区域和页脚）时，Facelets的`<ui:composition>`、`<ui:include>`和`<ui:decorate>`非常有用。并且，当您希望拥有可重用的组件组以最小化代码重复时，Facelet标签文件（如`<t:field>`）非常有用。此外，当您希望基于现有组件以及（如有必要）一堆HTML创建一个具有单一职责的自定义组件时，复合组件（如`<t:inputLocalTime>`）非常有用。\n\
    \n然而，可能存在这样的情况：即使组合了现有组件和/或一堆HTML，也没有现成的组件能满足您的需求。或者，组件确实存在，但其渲染器并未按您期望的方式工作。此时，您需要创建一个自定义组件或自定义渲染器。\n\
    \n自诞生以来，Jakarta Faces就围绕`UIComponent` API（应用程序编程接口）提供了高度的抽象。您可以通过创建一个全新的自定义`UIComponent`、扩展标准HTML组件集中的现有组件，或为现有组件插入自定义`Renderer`来自定义组件。\n\
    \n### 组件类型、组件族和渲染器类型\n\n每个`UIComponent`实例都关联着“组件类型”、“组件族”和“渲染器类型”。组件类型基本上代表了与组件标签关联的唯一组件标识符。它可以通过`@FacesComponent`注解或`faces-config.xml`中的`<component>`条目注册到Jakarta\
    \ Faces。以下示例演示了在最小组件类上使用`@FacesComponent`注解：\n\n```java\n@FacesComponent(SomeComponent.COMPONENT_TYPE)\n\
    public class SomeComponent extends UIComponentBase {\n    public static final\
    \ String COMPONENT_TYPE = \"project.SomeComponent\";\n    public static final\
    \ String COMPONENT_FAMILY = \"project.SomeFamily\";\n    public SomeComponent()\
    \ {\n        setRendererType(SomeRenderer.RENDERER_TYPE);\n    }\n    @Override\n\
    \    public String getFamily() {\n        return COMPONENT_FAMILY;\n    }\n}\n\
    ```\n\n以下示例演示了在`faces-config.xml`中使用`<component>`条目：\n\n```xml\n<component>\n\
    \    <component-type>project.SomeComponent</component-type>\n    <component-class>com.example.project.component.SomeComponent</component-class>\n\
    </component>\n```\n\n请注意，当您通过*注解*和*XML*两种方式使用相同的标识符注册Jakarta EE工件时，XML声明将始终优先于注解声明。这对于所有Jakarta\
    \ Faces注解同样适用。\n\n组件类中的公共常量`COMPONENT_TYPE`和`COMPONENT_FAMILY`并非强制要求，但它们遵循与标准Jakarta\
    \ Faces组件集相同的约定，因此在用Jakarta Faces进行开发时能提供更好的一致性。具体来说，公共常量`COMPONENT_TYPE`允许开发者以如下方式编程式地创建组件，而无需硬编码组件类型：\n\
    \n```java\nUIComponent component = FacesContext.getCurrentInstance()\n    .getApplication().createComponent(SomeComponent.COMPONENT_TYPE);\n\
    ```\n\n请注意，以这种方式编程式地创建`UIComponent`实例在一般的Jakarta Faces Web应用程序中并非标准做法。相反，您通常会在视图中定义组件，并将创建`UIComponent`实例的工作留给Jakarta\
    \ Faces或任何可插拔的组件库。\n\n对于Facelets视图技术，组件标签（如`<x:someComponent>`）可以通过`@FacesComponent(createTag=true)`或`*.taglib.xml`文件中的`<tag>`条目（连同组件类型）注册到Jakarta\
    \ Faces，如下所示：\n\n```xml\n<tag>\n    <tag-name>someComponent</tag-name>\n    <component-type>project.SomeComponent</component-type>\n\
    </tag>\n```\n\n如前所述，标准Jakarta Faces组件集在组件标签背后的具体`UIComponent`类中也定义了`COMPONENT_TYPE`常量。这些`UIComponent`类都位于`jakarta.faces.component.html`包中。`UIComponent`类名可以通过在组件标签名前加上“`Html`”前缀来推导。例如，标准Jakarta\
    \ Faces组件标签`<h:outputText>`实际上由`HtmlOutputText`组件类支持。Jakarta Faces可以通过`@FacesComponent`注解或`faces-config.xml`中的`<component>`条目，找出与组件类型关联的具体组件类，因此Jakarta\
    \ Faces知道，对于`<h:outputText>`标签，它应该创建一个具体的`HtmlOutputText`实例。\n\n一旦Jakarta Faces拥有了具体的`UIComponent`实例，它就可以通过分别调用`UIComponent#getFamily()`和`UIComponent#getRendererType()`方法来找出组件族和渲染器类型。这些信息对于为给定的`UIComponent`实例创建具体的`Renderer`实例是必需的，如下面的代码片段所示：\n\
    \n```java\nRenderer renderer = FacesContext.getCurrentInstance().getRenderKit()\n\
    \    .getRenderer(component.getFamily(), component.getRendererType());\n```\n\n\
    组件族基本上是一个“硬编码”的常量，可以在多个组件类型之间共享。它之所以是“硬编码”的，是因为没有为其设置setter方法。这是为了获取具体的`Renderer`实例所必需的，因为这些实例不是按组件类型注册的，而是按组件族注册的。这允许可插拔渲染工具包的开发者只需按组件族注册一次渲染器类型，而无需为每个已知的标准组件类型和未知的自定义组件类型多次注册。通常，组件族和渲染器类型通过`@FacesRenderer`注解或`faces-config.xml`中的`<renderer>`条目注册到Jakarta\
    \ Faces应用程序。以下示例演示了在最小渲染器类上使用注解：\n\n```java\n@FacesRenderer(\n    componentFamily=SomeComponent.COMPONENT_FAMILY,\n\
    \    rendererType=SomeRenderer.RENDERER_TYPE)\npublic class SomeRenderer extends\
    \ Renderer {\n    public static final String RENDERER_TYPE = \"project.SomeRenderer\"\
    ;\n}\n```\n\n以下示例演示了在`faces-config.xml`中使用条目：\n\n```xml\n<renderer>\n    <component-family>project.SomeFamily</component-family>\n\
    \    <renderer-type>project.SomeRenderer</renderer-type>\n    <renderer-class>com.example.project.renderer.SomeRenderer</renderer-class>\n\
    </renderer>\n```\n\n渲染器类型默认在具体组件类的构造函数中定义，如前面`SomeComponent`类的代码片段所示。如果需要，组件子类开发者，甚至作为组件最终用户的您，都可以用所需的渲染器实例覆盖组件的默认渲染器实例。这可以通过多种方式实现，全部通过XML。第一种方式是通过`*.taglib.xml`文件中与组件标签关联的`<tag>`条目：\n\
    \n```xml\n<tag>\n    <tag-name>someComponent</tag-name>\n    <component-type>project.SomeComponent</component-type>\n\
    \    <renderer-type>custom.OtherRenderer</renderer-type>\n</tag>\n```\n\n这会影响整个应用程序，并且仅针对特定的组件标签。第二种方式是通过在`faces-config.xml`中添加一个新的`<renderer>`条目，该条目精确地针对所需的组件族及其默认渲染器类型：\n\
    \n```xml\n<renderer>\n    <component-family>project.SomeFamily</component-family>\n\
    \    <renderer-type>project.SomeRenderer</renderer-type>\n    <renderer-class>com.example.custom.renderers.OtherRenderer</renderer-class>\n\
    </renderer>\n```\n\n这会影响整个应用程序，并且针对*每一个*与给定组件族关联且当前与给定渲染器类型关联的组件标签。第三种方式是通过组件标签的`rendererType`属性。"
  raw: "*   `com.sun.faces.push.WebsocketPushContextProducer`:\n    The CDI producer\
    \ that creates the `WebsocketPushContext`\n    instance based on channel name\
    \ as obtained from `@Push` qualifier, the\n    `WebsocketSessionManager`,\n  \
    \  and `WebsocketUserManager`.\n\nFootnotes\n\n11. Custom Components\n\nIn Chapter\
    \ [7](#454457_2_En_7_Chapter.xhtml), you should have learned that\nFacelets `<ui:composition>`,\n\
    `<ui:include>`,\nand `<ui:decorate>`\nare useful when you want to split main page\
    \ layout fragments into\nreusable templates, such as header, menu, main content,\
    \ and footer. And\nthat Facelet tag files such as `<t:field>` are\nuseful when\
    \ you want to have a reusable group of components in order to\nminimize code duplication.\
    \ And that composite components such as `<t:inputLocalTime>`\nare useful when\
    \ you want to create a custom component with a single\nresponsibility based on\
    \ existing components and, if necessary, a bunch\nof HTML.\nHowever, there may\
    \ be cases in which no single component exists for\nthe purpose you had in mind,\
    \ even not when composed of existing\ncomponents and/or a bunch of HTML. Or perhaps\
    \ the component does exist,\nbut its renderer is not doing things you had in mind.\
    \ At this point, you\nwould need to create a custom component or a custom renderer.\n\
    Jakarta Faces has since the beginning offered a high degree of\nabstraction around\
    \ the `UIComponent` API\n(application programming interface). You can customize\
    \ components by\ncreating a brand-new custom `UIComponent`, or by\nextending an\
    \ existing component from the standard HTML component set, or\nby plugging a custom\
    \ `Renderer`  for\nan existing component.\n\nComponent Type, Family, and Renderer\
    \ Type\n\nEach `UIComponent`\ninstance  has\n“component type,” “component family,”\
    \ and “renderer type” associated with it. The\ncomponent type basically represents\
    \ the unique component identifier\nassociated with the component tag. It can be\
    \ registered into Jakarta\nFaces via either the `@FacesComponent`\nannotation\
    \  or the\n`<component>`\nentry in `faces-config.xml`. The\nfollowing example\
    \ demonstrates the usage of the `@FacesComponent`\nannotation on a minimal component\
    \ class:\n\n```\n@FacesComponent(SomeComponent.COMPONENT_TYPE)\npublic class SomeComponent\
    \ extends UIComponentBase {\npublic static final String COMPONENT_TYPE = \"project.SomeComponent\"\
    ;\npublic static final String COMPONENT_FAMILY = \"project.SomeFamily\";\npublic\
    \ SomeComponent() {\nsetRendererType(SomeRenderer.RENDERER_TYPE);\n}\n@Override\n\
    public String getFamily() {\nreturn COMPONENT_FAMILY;\n}\n}\n```\n\nAnd the following\
    \ example demonstrates the usage with the `<component>`\nentry in `faces-config.xml`:\n\
    \n```\nproject.SomeComponent\n\ncom.example.project.component.SomeComponent\n\n\
    ```\n\nNote that when you register a Jakarta EE artifact via *both*\nthe annotation\
    \ and the XML ways using the same identifier, then the XML\ndeclaration will always\
    \ get precedence over the annotation declaration.\nThe same holds true for all\
    \ Jakarta Faces annotations.\n\nThe public constants `COMPONENT_TYPE` and\n`COMPONENT_FAMILY`\
    \ in\nthe component class are not mandatory, but they follow the same convention\
    \ as the\nstandard Jakarta Faces component set and therefore give more consistency\n\
    while developing with Jakarta Faces. The public constant `COMPONENT_TYPE` namely\n\
    allows the developer to programmatically create the component as below\nwithout\
    \ the need to hard-code the component type.\n\n```\nUIComponent component = FacesContext.getCurrentInstance()\n\
    .getApplication().createComponent(SomeComponent.COMPONENT_TYPE);\n```\n\nNote\
    \ that programmatically creating `UIComponent` instances\nthis way is generally\
    \ not the normal practice in an average Jakarta\nFaces web application. Instead,\
    \ you normally define the components in\nthe view and leave the job of creating\
    \ `UIComponent` instances\nup to Jakarta Faces or any pluggable component library.\n\
    \nIn the case of Facelets view technology, the component tag as in `<x:someComponent>`\n\
    can be registered into Jakarta Faces via either `@FacesComponent(createTag=true)`\n\
    or a `<tag>` entry in\na `*.taglib.xml`\nfile along with the component type as\
    \ follows:\n\n```\nsomeComponent\n\nproject.SomeComponent\n\n```\n\nAs said, the\
    \ standard Jakarta Faces component set has the `COMPONENT_TYPE`\nconstant also\
    \ defined in the concrete `UIComponent` classes\nbehind the component tags. Those\
    \ `UIComponent` classes\nare all located in the `jakarta.faces.component.html`\n\
    package. The `UIComponent` class\nname can be derived from the component tag name\
    \ by prefixing it with\n“`Html`”. So, for\nexample, the standard Jakarta Faces\
    \ component tag `<h:outputText>`\nis actually backed by the `HtmlOutputText`\n\
    component class. Jakarta Faces can, via either the `@FacesComponent`\nannotation\
    \ or the `<component>`\nentry in `faces-config.xml`,\nfigure out which component\
    \ class exactly is associated with the\ncomponent type, so Jakarta Faces knows\
    \ that, for the `<h:outputText>`\ntag, it should create a concrete `HtmlOutputText`\n\
    instance.\n\nOnce Jakarta Faces has the concrete `UIComponent`\ninstance  at hand,\n\
    it can figure out the component family as well as the renderer type by\ninvoking\
    \ the methods `UIComponent#getFamily()`\nand `UIComponent#getRendererType()`,\n\
    respectively. This information is mandatory in order to create a\nconcrete `Renderer`\
    \ instance for\nthe given `UIComponent` instance,\nas you can see in the following\
    \ snippet:\n\n```\nRenderer renderer = FacesContext.getCurrentInstance().getRenderKit()\n\
    .getRenderer(component.getFamily(), component.getRendererType());\n```\n\nThe\
    \ component family is basically a “hard-coded” constant which can be\nshared across\
    \ multiple component types. It’s “hard-coded” in such a way\nthat there’s no setter\
    \ for it. This is needed in order to get the\nconcrete `Renderer` instances as\n\
    they are not registered by component type but rather by component\nfamily. This\
    \ allows the developer of the pluggable render kit to\nregister the renderer type\
    \ just once by the component family instead of\nmultiple times for each known\
    \ standard component type and unknown custom\ncomponent type. Normally, the component\
    \ family and renderer type are\nregistered into the Jakarta Faces application\
    \ via either the `@FacesRenderer`\nannotation or the `<renderer>`\nentry in `faces-config.xml`.\
    \ The\nfollowing example demonstrates the usage with the annotation on a\nminimal\
    \ renderer class.\n\n```\n@FacesRenderer(\ncomponentFamily=SomeComponent.COMPONENT_FAMILY,\n\
    rendererType=SomeRenderer.RENDERER_TYPE)\npublic class SomeRenderer extends Renderer\
    \ {\npublic static final String RENDERER_TYPE = \"project.SomeRenderer\";\n}\n\
    ```\n\nAnd the following example demonstrates the usage with the entry in `faces-config.xml`:\n\
    \n```\n\nproject.SomeFamily\nproject.SomeRenderer\n\ncom.example.project.renderer.SomeRenderer\n\
    \n```\n\nThe renderer type is by default defined in the constructor of the\nconcrete\
    \ component class, as can be seen in the code snippet of the\n`SomeComponent`\n\
    class  as shown\npreviously. In case it’s needed, the component subclass developer\
    \ or\neven yourself as component end user can always override the default\nrenderer\
    \ instance of a component with the desired renderer instance.\nThis can be done\
    \ in various ways, all via XML. The first way is via the\n`<tag>`\nentry associated\
    \ with the component tag in the `*.taglib.xml` file.\n\n```\nsomeComponent\n\n\
    project.SomeComponent\ncustom.OtherRenderer\n\n```\n\nThis affects application-wide\
    \ and targets only the specific component\ntag. The second way is via a new `<renderer>`\n\
    entry in `faces-config.xml` that\ntargets exactly the desired component family\
    \ and its default renderer\ntype.\n\n```\n\nproject.SomeFamily\nproject.SomeRenderer\n\
    \ncom.example.custom.renderers.OtherRenderer\n\n```\n\nThis affects application-wide\
    \ and targets *every* component tag\nassociated with the given component family\
    \ currently associated with the\ngiven renderer type. The third way is via the\
    \ `rendererType`\nattribute of the component tag.\n\n```"
