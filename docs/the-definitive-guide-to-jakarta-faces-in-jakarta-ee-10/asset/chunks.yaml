    ## SelectItem Tags


    Providing available items for `UISelectOne` and `UISelectMany` components can
    be done in several ways. As demonstrated in the previous section, you can use
    the `<f:selectItem>` and `<f:selectItems>` tags nested in the selection component
    for this. You can use the `<f:selectItem>` tag to define the available items entirely
    on the view side. The following is an example using `<h:selectOneMenu>`, but you
    can use it the same way in any other `UISelectOne` and `UISelectMany` component:


    Note that a select item with value of `#{null}` can be used to represent the default
    selection in case the bean property associated with selection component’s `value`
    attribute is `null`. If you have consulted the tag documentation of `<f:selectItem>`,
    then you’ll perhaps have noticed the `noSelectionOption` attribute and have thought
    that it was intended to represent a “no selection option.” Actually, this isn’t
    true. In spite of the attribute name, it does not represent a “no selection option.”
    A better attribute name would have been `hideWhenOtherOptionIsSelected`, and even
    then it works only when the parent selection component has explicitly a `hideNoSelectionOption="true"`
    attribute set like the one that follows:


    So `hideWhenOtherOptionIsSelectedAndHideNoSelectionOptionIsTrue` would ultimately
    have been the most self-explanatory attribute name. Unfortunately, this wasn’t
    very well thought out when the `noSelectionOption` was implemented in Jakarta
    Faces 1.2. Requiring two attributes for this attribute to function shouldn’t have
    been necessary. The primary purpose of this attribute pair is to prevent the website
    user from being able to reselect the “no selection option” when the component
    has already a non-`null` value. For example, by having it prepared in a `@PostConstruct`
    method, or by re-rendering the component after a form submit with a non-`null`
    value. That said, the `itemValue` attribute of the `<f:selectItem>` represents
    the value that will be set as bean property when the form is submitted, as well
    as the value that will be preselected from any non-`null` bean property when the
    HTML output is to be generated. The `itemLabel` attribute represents the label
    that will be displayed to the website user. When the `itemLabel` attribute is
    absent, then Jakarta Faces will default to `itemValue`. Note that the label is
    in no way submitted back to the server. That is, in the generated HTML output,
    the `<option>` label is not part of the `<option>` value.


    You can use the `<f:selectItems>` tag to reference a `Collection`, `Map`, or array
    of available items in the backing bean. You can even mix this with `<f:selectItem>`
    tags.


    They will be rendered in the same order as they are declared in the view. Only
    when you use an unordered `Collection` or `Map` implementation as value, such
    as `HashSet` or `HashMap`, then the order of items provided by `<f:selectItems>`
    will be undefined. It’s therefore better to use an ordered `Collection` or `Map`
    implementation, such as `TreeSet`, `ArrayList`, `TreeMap`, or `LinkedHashMap`.
    When populating the available items as a `Map`, then keep in mind that the map
    key represents the item label and that the map value represents the item value.
    You’d perhaps intuitively expect it to be the other way around, but this was a
    technical limitation. That is, on the Java side, the map key enforces uniqueness,
    while the map value doesn’t. And on the HTML side, the option label is supposed
    to be unique, while the option value doesn’t need to be unique.


    The following is how you can populate such a map:


    ```

    private Map availableItems;

    @PostConstruct

    public void init() {

    availableItems = new LinkedHashMap();

    availableItems.put("First item", "one");

    availableItems.put("Second item", "two");

    availableItems.put("Third item", "three");

    }

    // Add/generate getter. Note that a setter is unnecessary.

    ```


    As said, you can also use a `TreeMap` or `HashMap` instead of `LinkedHashMap`,
    but then the item labels will become, respectively, automatically sorted or unsorted,
    regardless of the insertion order.


    In case you’d really like to swap the map keys and values around on the view side,
    then you can always do so by manually assigning the map entry value as an item
    label and the map entry key as an item value. You can do that with the help of
    the `var` attribute of the `<f:selectItems>` by which you can declare the EL variable
    name of the currently iterated item. This can, in turn, be accessed in the `itemValue`
    and `itemLabel` attributes of the same tag. When you pass `Map#entrySet()` to
    the `value` attribute of the `<f:selectItems>`, then each iterated item will represent
    a `Map.Entry` instance. This has, in turn, `getKey()` and `getValue()` methods
    that are thus perfectly usable as EL properties.


    This also works when using a `Collection` or array as available items. You don’t
    explicitly need to first convert it to a `Set` (more specifically, `Iterable`),
    as demonstrated previously. This is particularly useful when you have a `Collection`
    or an array of complex objects as available items, such as model entities.


