    图 9-2

    开发阶段 Mojarra 的默认 HTTP 500 错误页面


    它不仅包含堆栈跟踪，还包含 Jakarta Faces 组件树和任何作用域变量的文本表示，这可能有助于查明根本原因，尽管实际上，仅凭堆栈跟踪并使用调试器重新执行用例比这更有帮助。


    自定义错误页面


    虽然对普通 Web 开发人员有用，但坦率地说，那些默认错误页面对于普通最终用户来说是可怕的。其外观和感觉与网站的其他部分完全不同，文本对普通最终用户来说就像天书。这样的错误页面甚至没有为最终用户提供退出点。不满的最终用户无法快速找到主页或联系页面。幸运的是，对于最终用户来说，你可以通过在
    Web 应用程序中包含一个错误页面，并在 `web.xml` 的 `<error-page>` 条目中注册其位置来覆盖这些默认错误页面。


    ```


    /WEB-INF/errorpages/500.xhtml


    ```


    自定义错误页面特意被放置在 `/WEB-INF` 文件夹中，这样最终用户就无法直接访问或为其添加书签。默认情况下，Servlet 容器会在请求作用域中设置与错误页面相关的属性，其键被定义为
    `jakarta.servlet.RequestDispatcher.ERROR_XXX` 常量。^(⁸¹) 这样，如有必要，你可以将它们包含在自定义错误页面中。以下是一个示例：


    ```

    Request URI

    #{requestScope[''jakarta.servlet.error.request_uri'']}

    Exception type

    #{requestScope[''jakarta.servlet.error.exception''][''class'']}

    Exception message

    #{requestScope[''jakarta.servlet.error.exception''].message}

    Stack trace

    #{

    facesContext.externalContext.response.writer.flush()

    }#{

    requestScope[''jakarta.servlet.error.exception''].printStackTrace

    (facesContext.externalContext.response.writer)

    }


    ```


    请注意打印堆栈跟踪的技巧。在打印堆栈跟踪之前刷新响应写入器非常重要，并且 `<pre>` 元素内 EL（表达式语言）表达式之外的模板文本中不能有空白；否则，它会被附加到堆栈跟踪中。


    回到此类错误页面的可怕性，你最好将所有错误细节隐藏在仅在 Jakarta Faces 项目阶段等于 `Development` 时才评估为 `true` 的条件之后。首先，在某个主模板中设置一个应用作用域的快捷变量：


    现在，当 Jakarta Faces 项目阶段等于 `Development` 时，你可以有条件地在错误页面中显示任何技术信息。


    ```

    Error detail for developer


    ...


    ```


    无论如何，错误页面完全无状态是非常重要的。换句话说，一个像样的错误页面可能不包含任何 Jakarta Faces 表单，甚至不包含注销表单。你不仅会避免表单提交失败的风险（因为最初的异常实际上是由损坏的
    Jakarta Faces 状态引起的），而且这些表单实际上会提交到错误的 URL（统一资源定位符），即错误页面本身的 URL。由于错误页面隐藏在 `/WEB-INF`
    文件夹中，表单提交只会导致 404 错误。与其将错误页面移出 `/WEB-INF` 文件夹，不如使用一个提交到普通 Servlet 的纯 HTML 表单来解决注销的情况。`SecurityContext`
    在那里也是可注入的，会话作用域的受管 bean（如果有的话）也是如此。


    Ajax 异常处理

