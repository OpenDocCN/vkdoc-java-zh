    命名约定


    Jakarta Faces 本身并没有规定严格的约定。我在各个项目中见过以下约定：


    *   `Foo`


    *   `FooBean`


    *   `FooBacking`


    *   `FooBackingBean`


    *   `FooManager`


    *   `FooManagedBean`


    *   `FooController`


