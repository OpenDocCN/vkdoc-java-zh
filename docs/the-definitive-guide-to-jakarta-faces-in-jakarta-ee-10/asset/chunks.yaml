    SelectItem 标签


    为 `UISelectOne` 和 `UISelectMany` 组件提供可用项有几种方式。如前一节所示，你可以使用嵌套在选择组件中的 `<f:selectItem>`
    和 `<f:selectItems>` 标签来实现。你可以使用 `<f:selectItem>` 标签在视图端完全定义可用项。以下是一个使用 `<h:selectOneMenu>`
    的示例，但你可以在任何其他 `UISelectOne` 和 `UISelectMany` 组件中以相同方式使用它：


    请注意，当选择组件的 `value` 属性关联的 Bean 属性为 `null` 时，可以使用值为 `#{null}` 的选择项来表示默认选择。如果你查阅过
    `<f:selectItem>` 的标签文档，你可能会注意到 `noSelectionOption` 属性，并认为它旨在表示“无选择选项”。实际上，并非如此。尽管属性名如此，但它并不表示“无选择选项”。更好的属性名应该是
    `hideWhenOtherOptionIsSelected`，即便如此，它也只有当父选择组件显式设置了 `hideNoSelectionOption="true"`
    属性时才有效，如下所示：


    因此，`hideWhenOtherOptionIsSelectedAndHideNoSelectionOptionIsTrue` 最终会成为最不言自明的属性名。不幸的是，在
    Jakarta Faces 1.2 中实现 `noSelectionOption` 时，这一点考虑得并不周全。不应该需要两个属性才能使此属性生效。这对属性的主要目的是，当组件已经有一个非
    `null` 值时，防止网站用户能够重新选择“无选择选项”。例如，通过在 `@PostConstruct` 方法中准备它，或者在表单提交后使用非 `null`
    值重新渲染组件来实现。


    也就是说，`<f:selectItem>` 的 `itemValue` 属性表示提交表单时将设置为 Bean 属性的值，以及在生成 HTML 输出时将从任何非
    `null` 的 Bean 属性中预选的值。`itemLabel` 属性表示将显示给网站用户的标签。当 `itemLabel` 属性不存在时，Jakarta
    Faces 将默认使用 `itemValue`。请注意，标签绝不会提交回服务器。也就是说，在生成的 HTML 输出中，`<option>` 标签不是 `<option>`
    值的一部分。


    你可以使用 `<f:selectItems>` 标签来引用后台 Bean 中的 `Collection`、`Map` 或可用项数组。你甚至可以将其与 `<f:selectItem>`
    标签混合使用。


    它们将按照在视图中声明的顺序进行渲染。仅当你使用无序的 `Collection` 或 `Map` 实现（例如 `HashSet` 或 `HashMap`）作为值时，`<f:selectItems>`
    提供的项顺序将是未定义的。因此，最好使用有序的 `Collection` 或 `Map` 实现，例如 `TreeSet`、`ArrayList`、`TreeMap`
    或 `LinkedHashMap`。当将可用项填充为 `Map` 时，请记住，Map 的键代表项标签，Map 的值代表项值。你可能凭直觉认为情况正好相反，但这是一个技术限制。也就是说，在
    Java 端，Map 的键强制唯一性，而 Map 的值则不强制。而在 HTML 端，选项标签应该是唯一的，而选项值则不需要唯一。


    以下是填充此类 Map 的方法：


    ```

    private Map availableItems;

    @PostConstruct

    public void init() {

    availableItems = new LinkedHashMap();

    availableItems.put("First item", "one");

    availableItems.put("Second item", "two");

    availableItems.put("Third item", "three");

    }

    // 添加/生成 getter。注意，不需要 setter。

    ```


    如前所述，你也可以使用 `TreeMap` 或 `HashMap` 代替 `LinkedHashMap`，但这样项标签将分别自动排序或无序，而与插入顺序无关。


    如果你真的想在视图端交换 Map 的键和值，你总是可以通过手动将 Map 条目的值指定为项标签，并将 Map 条目的键指定为项值来实现。你可以借助 `<f:selectItems>`
    的 `var` 属性来做到这一点，通过该属性你可以声明当前迭代项的 EL 变量名。然后，可以在同一标签的 `itemValue` 和 `itemLabel`
    属性中访问该变量。当你将 `Map#entrySet()` 传递给 `<f:selectItems>` 的 `value` 属性时，每个迭代项将代表一个 `Map.Entry`
    实例。该实例又具有 `getKey()` 和 `getValue()` 方法，这些方法完全可以作为 EL 属性使用。


    当使用 `Collection` 或数组作为可用项时，这也适用。你不需要像前面演示的那样先显式地将其转换为 `Set`（更具体地说，是 `Iterable`）。当你拥有一个包含复杂对象（例如模型实体）的
    `Collection` 或数组作为可用项时，这尤其有用。


