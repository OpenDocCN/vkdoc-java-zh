    \ EL objects have higher precedence in EL resolving. One example\nof an implicit\
    \ EL object is `#{header}`, which\nrefers to `ExternalContext#getRequestHeaderMap()`.^([^(50)](#fn50))\
    \ So when you happen to have\n`#{bean.headers}`\nand you’d like to present it\
    \ in an iterating component, then you can’t\nuse `var=\"header\"` and\nyou’d better\
