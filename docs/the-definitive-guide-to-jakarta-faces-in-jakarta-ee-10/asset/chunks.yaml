    Namely, the intent of the `SearchKeywordResolver`  is to resolve a\nkeyword to\
    \ exactly one component whose client ID will then be used to\nsubstitute the keyword.\
    \ This component will then be passed to `SearchKeywordContext#invokeContextCallback()`.\n\
    In the aforementioned approach, we instead collect the client IDs of all\n`UIMessage`\n\
    components found within the parent `UIForm` and then\nsupply a fake `UIMessage`\
    \ component\nto `invokeContextCallback()`\nwho will in turn call the `getClientId()`\
    \ of the\nfake `UIMessage`\ncomponent that actually returns the desired collection\
    \ of client\nIDs.\nIt should also be noted that `UIComponent#visitTree()`^([^(109)](#fn109))\
    \ is being used instead of\nrecursing over `UIComponent#getChildren()`\nin order\
    \ to collect the client IDs of any `UIMessage` component.\nNamely, when plain\
    \ iterating over children, you may sooner or later come\nacross an iterator component\
    \ such as `<h:dataTable>`\nor `<ui:repeat>`,\nand if it happens to have only one\
    \ `UIMessage` component\nnested, then you’ll effectively end up with only one\
    \ client ID, namely,\nthe one without the iteration index. `UIComponent#visitTree()`\n\
    doesn’t do that; any iterator component in the path will actually\niterate over\
    \ its model value and effectively give back multiple `UIMessage` components,\n\
    each with the correct client ID with the iteration index included.\nIn the end,\
    \ `SearchKeywordContext#setKeywordResolved()`\nmust be called with `true` in order\
    \ to inform the\nsearch context that the keyword has successfully been resolved,\
    \ even if\nit actually resolved to nothing. It doesn’t actually do any harm if\
    \ you\nforgot this, but if you don’t mark the search keyword resolved this way,\n\
    then the search context will continue consulting all other search\nkeyword resolvers,\
    \ which might end up being less efficient.\n\nFinally, in order to get the new\
    \ `MessagesKeywordResolver`\nto run, register it in `faces-config.xml` as\nfollows:\n\
    \n```\n\ncom.example.project.MessagesKeywordResolver\n\n```\n\nor programmatically\
    \ in a @WebListener as follows:\n\n```\n@WebListener\npublic class ApplicationConfig\
    \ implements ServletContextListener {\n@Override\npublic void contextInitialized(ServletContextEvent\
    \ event) {\nFacesContext.getCurrentInstance().getApplication()\n.addSearchKeywordResolver(new\
    \ MessagesKeywordResolver());\n}\n}\n```\n\nNote that the `FacesContext` must\
    \ be\navailable at this point and hence a `ServletContainerInitializer`\nwon't\
    \ necessarily work, and that the `FacesServlet` may not\nhave serviced a request\
    \ yet and hence registration in some managed bean\nwon't necessarily work.\n\n\
    Footnotes\n\n13. Security"
