    \ jakarta.faces.Link |\n\n<h:message> |\n HtmlMessage |\n jakarta.faces.HtmlMessage\
    \ |\n jakarta.faces.Message |\n jakarta.faces.Message |\n\n<h:messages> |\n HtmlMessages\
    \ |\n jakarta.faces.HtmlMessages |\n jakarta.faces.Messages |\n jakarta.faces.Messages\
    \ |\n\n<h:outputFormat> |\n HtmlOutputFormat |\n jakarta.faces.HtmlOutputFormat\
    \ |\n jakarta.faces.Output |\n jakarta.faces.Format |\n\n<h:outputLabel> |\n HtmlOutputLabel\
    \ |\n jakarta.faces.HtmlOutputLabel |\n jakarta.faces.Output |\n jakarta.faces.Label\
    \ |\n\n<h:outputText> |\n HtmlOutputText |\n jakarta.faces.HtmlOutputText |\n\
    \ jakarta.faces.Output |\n jakarta.faces.Text |\n\n<h:outputScript> |\n UIOutput\
    \ |\n jakarta.faces.Output |\n jakarta.faces.Output |\n jakarta.faces.Script |\n\
    \n<h:outputStylesheet> |\n UIOutput |\n jakarta.faces.Output |\n jakarta.faces.Output\
    \ |\n jakarta.faces.resource.Stylesheet |\n\n<h:panelGrid> |\n HtmlPanelGrid |\n\
    \ jakarta.faces.HtmlPanelGrid |\n jakarta.faces.Panel |\n jakarta.faces.Grid |\n\
    \n<h:panelGroup> |\n HtmlPanelGroup |\n jakarta.faces.HtmlPanelGroup |\n jakarta.faces.Panel\
    \ |\n jakarta.faces.Group |\n\n<h:selectBooleanCheckbox> |\n HtmlSelectBooleanCheckbox\
    \ |\n jakarta.faces.HtmlSelectBooleanCheckbox |\n jakarta.faces.SelectBoolean\
    \ |\n jakarta.faces.Checkbox |\n\n<h:selectManyCheckbox> |\n HtmlSelectManyCheckbox\
    \ |\n jakarta.faces.HtmlSelectManyCheckbox |\n jakarta.faces.SelectMany |\n jakarta.faces.Checkbox\
    \ |\n\n<h:selectManyListbox> |\n HtmlSelectManyListbox |\n jakarta.faces.HtmlSelectManyListbox\
    \ |\n jakarta.faces.SelectMany |\n jakarta.faces.Listbox |\n\n<h:selectManyMenu>\
    \ |\n HtmlSelectManyMenu |\n jakarta.faces.HtmlSelectManyMenu |\n jakarta.faces.SelectMany\
    \ |\n jakarta.faces.Menu |\n\n<h:selectOneListbox> |\n HtmlSelectOneListbox |\n\
    \ jakarta.faces.HtmlSelectOneListbox |\n jakarta.faces.SelectOne |\n jakarta.faces.Listbox\
    \ |\n\n<h:selectOneMenu> |\n HtmlSelectOneMenu |\n jakarta.faces.HtmlSelectOneMenu\
    \ |\n jakarta.faces.SelectOne |\n jakarta.faces.Menu |\n\n<h:selectOneRadio> |\n\
    \ HtmlSelectOneRadio |\n jakarta.faces.HtmlSelectOneRadio |\n jakarta.faces.SelectOne\
    \ |\n jakarta.faces.Radio |\n\n如果你仔细检查该表，你会发现在组件族和渲染器类型中存在某种模式，尤其是在输入、选择和命令组件中。你会注意到，一个渲染器类型可以被多个组件共享，即使它们属于不同的组件族。你还会注意到，有一个\
    \ HTML 组件没有渲染器类型，即 `<h:column>`。\n这是一个特殊的组件，不能单独使用，只能嵌套在特定的父组件中使用。在标准 Jakarta\
    \ Faces 组件集中，目前只有 `<h:dataTable>` 可以充当其父组件。\n它的渲染器基本上会遍历所有子组件，并对 `UIColumn` 执行\
    \ `instanceof` 检查，然后相应地处理它们。\n\n创建新组件和渲染器\n如果你仔细留意了第 3 章中的表 3-1，你可能已经注意到 Jakarta\
    \ Faces 没有提供任何组件来根据提供的数组或集合值渲染动态的 `<ul>` 或 `<ol>` 甚至 `<dl>` 元素。它只支持对 `<table>`\
    \ 元素进行此类操作。诚然，使用 Facelets 的 `<ui:repeat>` 加上一些自定义 HTML 代码也能实现同样的效果，但我们将以此为契机，创建一个新的自定义组件来渲染\
    \ `<ul>` 或 `<ol>`。\n\n第一步是检查哪个 `UIComponent` 子类适合我们设想的任务，以便将自定义代码逻辑减少到最低限度。在 `jakarta.faces.component`\
    \ 包中，你可以找到许多 `UIXxx` 组件子类。如果你想创建一个新的表单组件，则继承 `UIForm`。如果你想创建一个新的输入组件，则继承 `UIInput`。如果你想创建一个新的输出组件，则继承\
    \ `UIOutput`。如果你想创建一个新的数据迭代器组件，则继承 `UIData`。很少需要直接继承 `UIComponent`。\n我们希望能够在集合上进行迭代，以便在\
    \ `<ul>` 内部生成 `<li>` 元素，因此我们将选择 `UIData`。它已经实现了大量的迭代和状态保存逻辑。以下是自定义组件类 `com.example.project.component.DataList`：\n\
    \n```\n@FacesComponent(createTag=true)\npublic class DataList extends UIData {\n\
    public DataList() {\nsetRendererType(DataListRenderer.RENDERER_TYPE);\n}\n}\n\
    ```\n\n就这些吗？是的，`UIData` 超类已经拥有我们所需的一切，所有生成 HTML 的代码都放在 `DataListRenderer` 中，稍后将展示。你会注意到\
    \ `@FacesComponent` 注解声明了一个 `createTag=true` 属性。这基本上指示 Jakarta Faces 自动创建一个组件标签，其预定义的\
    \ XML 命名空间为 `jakarta.faces.component`。换句话说，上述标签在 Facelets 文件中可以这样使用：\n\n```\n\
    ...\n\n...\n\n```\n\nXML 命名空间前缀 “`my`” 当然由你选择。通常，你会在这里选择公司名称的某种缩写。你也可以使用 `namespace`\
    \ 属性覆盖预定义的 XML 命名空间。\n\n```\n@FacesComponent(createTag=true, namespace=\"example.components\"\
    )\n```\n\n然后它将可以这样使用：\n\n```\n...\n\n...\n\n```\n"
- fmt: 'This namespace is unfortunately not unifiable with the `<namespace>` of a
    custom `*.taglib.xml` file. If you use the same namespace for both, then Jakarta
    Faces will prefer the `*.taglib.xml` one over the `@FacesComponent` one and hence
    be unable to find the custom component tag. In practically anything Jakarta EE
    related, any XML-based registration of a thing has higher precedence than a Java
    annotation-based registration of the very same thing.


    You’d basically need to explicitly register the custom component over there in
    the `*.taglib.xml` file as well. Here’s how the `/WEB-INF/example.taglib.xml`
    as created in the section “Tag Files” in Chapter [7](#454457_2_En_7_Chapter.xhtml)
    could be extended with the registration of the custom component, which is essentially
    the same as what the `@FacesComponent` is doing for you.


    ```

    example.tags

    t


    Renders a HTML list.

    dataList


    dataList


    ```


    This way, the custom component is available in the same namespace as the other
    tags.


    ```

    ...


    ...


    ```


    Now, you can essentially remove all attributes of the `@FacesComponent` so that
    it becomes just `@FacesComponent`. Yes, as you have seen in the `example.taglib.xml`,
    the component type defaults to the class name with the first character lowercased.
    You can always override it by explicitly specifying it as the value of the `@FacesComponent`
    annotation. Generally, you’d like to prefix it with the name of the company. It’s
    a good practice to define it as a public constant so that others could, if necessary,
    look it up in the Javadoc and/or use it for `Application#createComponent()`.


    ```

    @FacesComponent(DataList.COMPONENT_TYPE)

    public class DataList extends UIData {

    public static final String COMPONENT_TYPE = "example.DataList";

    public DataList() {

    setRendererType(DataListRenderer.RENDERER_TYPE);

    }

    }

    ```


    Now adjust the component type in the `example.taglib.xml` accordingly.


    ```

    example.DataList


    ```


    The `*.taglib.xml` also gives you room to register the attributes via `<attribute>`
    entries, although that may end up in some verbose code. You should already have
    seen that in the section “Tag Files” in Chapter [7](#454457_2_En_7_Chapter.xhtml).
    Unfortunately, the current Faces version doesn’t offer an annotation to declaratively
    declare an “official” component attribute. There’s no such thing as `@FacesAttribute
    private Iterable value`. Yet. This might come in a Faces.next. The non-official
    way, without any `<attribute>`, also works just fine. You can declare any attribute
    you want on the component tag in the view.


    ```

    <... anyAttribute="anyValue" ...>

    ```


    That’s just the freedom of XML. Whether the actual component or renderer implementation
    actually does something with it is another story. You could even declare a custom
    attribute on an existing component and just plug an extended `Renderer` in order
    to process that attribute. More later in the section “Extending Existing Renderer.”
    Talking about renderers, our `<t:dataList>` still needs its renderer. Here’s what
    the `com.example.project.renderer.DataListRenderer` looks like.


    ```

    @FacesRenderer(

    componentFamily=UIData.COMPONENT_FAMILY,

    rendererType=DataListRenderer.RENDERER_TYPE)

    public class DataListRenderer extends Renderer {

    public static final String RENDERER_TYPE = "example.List";

    @Override

    public void encodeBegin

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    UIData data = (UIData) component;

    if (data.getRowCount() > 0) {

    writer.startElement("ul", component);

    }

    }

    @Override

    public boolean getRendersChildren() {

    return true;

    }

    @Override

    public void encodeChildren

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    UIData data = (UIData) component;

    for (int i = 0; i  0) {

    for (UIComponent child : component.getChildren()) {

    child.encodeAll(context);

    }

    }

    writer.endElement("li");

    }

    data.setRowIndex(-1);

    }

    @Override

    public void encodeEnd

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    UIData data = (UIData) component;

    if (data.getRowCount() > 0) {

    writer.endElement("ul");

    }

    }

    }

    ```


    In hindsight, it’s relatively simple. We’re delegating as much as possible of
    the hard work to the Jakarta Faces–provided `UIData` superclass. In the `encodeBegin()`,
    you start the `<ul>` element when the data model is not empty. This is to be checked
    by examining the result of `UIData#getRowCount()`. Its Javadoc^([^(87)](#fn87))
    basically says:


    *Return the number of rows in the underlying data model. If the number of available
    rows is unknown, return -1.*


    The term “rows” is indeed strongly related to tables. This is also what this superclass
    is originally designed for: `<h:dataTable>`. The term “items” would have been
    more general than “rows,” but it is what it is.


    Then, in the `encodeChildren()` method, we set the current row index via the `UIData#setRowIndex()`
    method, start the `<li>` element, encode all children as-is via `UIComponent#encodeAll()`
    on each of them, and finally end the `<li>` element. Once the loop is done, we
    explicitly make it clear to the `UIData` superclass by invoking `UIData#setRowIndex()`
    with a value of `-1`. Its Javadoc^([^(88)](#fn88)) says:


    *If the new* *rowIndex* *value is* *-1: If the* *var* *property is not* *null,
    remove the corresponding request scope attribute (if any). Reset the state information
    for all descendant components.*


    It thus clears out any state related to the iteration. This is very important;
    otherwise, it might cause side effects further down in the component tree or even
    cause a corrupted view state when it by itself needs to traverse the data model.
    Finally, in the `encodeEnd()` method, it will end the `<ul>` element based on
    same conditions as in `encodeBegin()`.


    The `UIData#setRowIndex()` call in the `encodeChildren()` method will under the
    hood extract the data model from the `value` attribute and wrap it in a suitable
    implementation of the `jakarta.faces.model.DataModel` abstract class.^([^(89)](#fn89))
    So far, as per the Javadoc of `UIData#getValue()`,^([^(90)](#fn90)) the following
    types of the object behind the `value` attribute are supported, in this scanning
    order:


    1.  `java.util.List` (since 1.0).

    2.  Arrays (since 1.0).

    3.  `java.sql.ResultSet` (since 1.0).

    4.  `java.util.Collection` (since 2.2).

    5.  `java.lang.Iterable` (since 2.3).

    6.  `java.util.Map` (since 2.3).

    7.  Types for which a suitable `DataModel` has been registered via `@FacesDataModel`
    (since 2.3).

    8.  All other types will be adapted using the `ScalarDataModel` class, which will
    treat the object as a single row of data (since 1.0).'
