    \ iteration round over the `value` of `<h:dataTable>`\nwill basically re-render\
    \ all columns against the currently iterated\nitem. As with `<c:forEach>` and\n\
    `<ui:repeat>`,\nthe currently iterated item is exposed in EL scope by the `var`\
    \ attribute. The\nfollowing is a basic example that iterates over a `List<String>`\n\
    .\n\n```\n#{string}\n\n```\n\nBacking bean class `com.example.project.view.Bean`\
    \ :\n\n```\n@Named @RequestScoped\npublic class Bean {\nprivate List strings;\n\
    @PostConstruct\npublic void init() {\nstrings = Arrays.asList(\"one\", \"two\"\
    , \"three\");\n}\npublic List getStrings() {\nreturn strings;\n}\n}\n```\n\nGenerated\
    \ HTML output:\n\n```\n\none\ntwo\nthree\n\n```\n\nRendering in Chrome\nbrowser:\n\
    \n![](images/454457_2_En_6_Chapter/454457_2_En_6_Figc_HTML.jpg)\n\nIt is important\
