- fmt: "`el`变量基本上代表在`value`属性中定义的表达式语言（EL）语句，在我们的`<h:inputText>`示例中，即`#{bean.text}`。`ValueExpression#setValue()`将根据组件的值触发此表达式背后的\
    \ setter 方法。因此，它实际上会执行`bean.setText(component.getValue())`。一旦所有模型值都已更新，Jakarta\
    \ Faces 将进入调用应用程序阶段（第五阶段）。在应用请求值阶段（第二阶段）期间，在命令组件中排队的任何`ActionEvent`都将被广播。它最终将调用与命令组件关联的所有方法。在我们的`<h:commandButton>`示例中，其`action`属性定义为`#{bean.submit}`，它将调用`Bean#submit()`方法。最后，Jakarta\
    \ Faces 将进入最后一个阶段，即渲染响应阶段（第六阶段），生成 HTML 输出，并调用 getter 方法以获取要嵌入到 HTML 输出中的模型值。\n\
    \n## 基于文件的输入组件\n\n只有一个基于文件的输入组件，即`<h:inputFile>`。它对其所在的`<h:form>`只有一个额外要求：其`enctype`属性必须显式设置为`multipart/form-data`以符合\
    \ HTML 规范。这对其他输入组件没有影响；它们将继续正常工作。只是默认的表单编码`application/x-www-form-urlencoded`不支持嵌入二进制数据。`multipart/form-data`编码支持这一点，但它只是稍微冗长一些。每个请求参数值前面都有一个边界行、一个包含请求参数名称的`Content-Disposition`头、一个包含值内容类型的`Content-Type`头以及两个换行符。与默认编码相比，它非常低效，在默认编码中，URL\
    \ 编码的请求参数名称/值对仅由`&`字符连接，但实际上是能够在 HTTP POST 请求中嵌入文件而不会引起歧义的唯一可靠方法，尤其是在上传文本文件时，其内容恰好类似于\
    \ URL 编码的请求参数名称/值对。`<h:inputFile>`的`value`属性必须绑定到`jakarta.servlet.http.Part`接口的\
    \ bean 属性。\n\nFacelets 文件`/test.xhtml`：\n\n支持 bean 类`com.example.project.view.Bean`：\n\
    \n```\n@Named @RequestScoped\npublic class Bean {\n    private Part file;\n  \
    \  public void submit() throws IOException {\n        System.out.println(\"Form\
    \ has been submitted!\");\n        System.out.println(\"file: \" + file);\n  \
    \      if (file != null) {\n            System.out.println(\"name: \" + file.getSubmittedFileName());\n\
    \            System.out.println(\"type: \" + file.getContentType());\n       \
    \     System.out.println(\"size: \" + file.getSize());\n            InputStream\
    \ content = file.getInputStream();\n            // Write content to disk or DB.\n\
    \        }\n    }\n    // Add/generate getters and setters for every property\
    \ here.\n}\n```\n\n生成的 HTML 输出：\n\n在 Chrome 浏览器中渲染（添加了换行符）：\n![](images/454457_2_En_4_Chapter/454457_2_En_4_Figb_HTML.jpg)\n\
    \n请求处理生命周期与基于文本的输入组件相同，但应用请求值阶段（第二阶段）除外。在`UIInput#decode()`方法中，提交的文件不是作为请求参数提取的，而是在与文件输入组件关联的渲染器中作为请求部分提取的。默认实现基本上如下所示：\n\
