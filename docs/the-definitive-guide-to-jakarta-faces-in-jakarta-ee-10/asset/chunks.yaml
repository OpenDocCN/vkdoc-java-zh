    ### 自定义搜索关键字


    Jakarta Faces 2.3 引入的组件搜索表达式框架也附带了一个 API，允许我们创建自定义搜索关键字。假设你有一个包含多个`<h:message>`组件的表单，并且希望在提交表单时重新渲染它们全部。那么你可能会倾向于在`<f:ajax>`的`render`属性中也使用`@form`。


    但这效率并不高。实际上，它还会不必要地重新渲染同一表单内所有在 Ajax 回发请求期间根本不会改变的标签、输入组件以及任何其他静态内容。这是一种资源浪费。理想情况下，我们应该有一个像“`@messages`”这样的搜索关键字，它可以引用同一表单内的所有消息组件。


    请注意，每个`<h:message>`组件都设置了显式 ID，因为如果没有显式 ID，它们默认不会向 HTML 输出渲染任何内容，这样 Jakarta Faces
    Ajax API JavaScript 就无法找到它们，从而无法根据 Ajax 响应更新其内容。


    为了让 Jakarta Faces 识别新的搜索关键字`@messages`，首先按如下方式扩展`jakarta.faces.component.search.SearchKeywordResolver`^([^(108)](#fn108))：


    ```

    public class MessagesKeywordResolver extends SearchKeywordResolver {

    @Override

    public boolean isResolverForKeyword

    (SearchExpressionContext context, String keyword)

    {

    return "messages".equals(keyword);

    }

    @Override

    public void resolve

    (SearchKeywordContext context, UIComponent base, String keyword)

    {

    UIComponent form = base.getNamingContainer();

    while (!(form instanceof UIForm) && form != null) {

    form = form.getNamingContainer();

    }

    if (form != null) {

    Set messageClientIds = new HashSet();

    VisitContext visitContext = VisitContext.createVisitContext

    (context.getSearchExpressionContext().getFacesContext());

    form.visitTree(visitContext, (visit, child) -> {

    if (child instanceof UIMessage) {

    messageClientIds.add(child.getClientId());

    }

    return VisitResult.ACCEPT;

    });

    if (!messageClientIds.isEmpty()) {

    context.invokeContextCallback(new UIMessage() {

    @Override

    public String getClientId(FacesContext context) {

    return String.join(" ", messageClientIds);

    }

    });

    }

    }

    context.setKeywordResolved(true);

    }

    }

    ```


    需要指出的是，这种方法已经有些取巧。具体来说，`SearchKeywordResolver`的意图是将一个关键字解析为恰好一个组件，该组件的客户端 ID 将用于替换关键字。然后，这个组件会被传递给`SearchKeywordContext#invokeContextCallback()`。在上述方法中，我们改为收集父级`UIForm`内找到的所有`UIMessage`组件的客户端
    ID，然后向`invokeContextCallback()`提供一个伪造的`UIMessage`组件，该组件会调用这个伪造的`UIMessage`组件的`getClientId()`方法，而该方法实际上返回的是所需的客户端
    ID 集合。


    还应注意，这里使用的是`UIComponent#visitTree()`^([^(109)](#fn109))，而不是递归遍历`UIComponent#getChildren()`来收集任何`UIMessage`组件的客户端
    ID。因为，如果简单地遍历子组件，你迟早会遇到像`<h:dataTable>`或`<ui:repeat>`这样的迭代器组件，如果它恰好只嵌套了一个`UIMessage`组件，那么你最终只会得到一个客户端
    ID，即不带迭代索引的那个。`UIComponent#visitTree()`不会这样做；路径中的任何迭代器组件都会实际遍历其模型值，并有效地返回多个`UIMessage`组件，每个组件都带有包含迭代索引的正确客户端
    ID。


    最后，必须调用`SearchKeywordContext#setKeywordResolved()`并传入`true`，以告知搜索上下文关键字已成功解析，即使它实际上解析为空。如果忘记这一步，实际上不会造成任何损害，但如果不以这种方式标记搜索关键字已解析，搜索上下文将继续咨询所有其他搜索关键字解析器，这最终可能导致效率降低。


    最后，为了让新的`MessagesKeywordResolver`运行，按如下方式在`faces-config.xml`中注册它：


    ```

    com.example.project.MessagesKeywordResolver

    ```


    或者，在`@WebListener`中以编程方式注册，如下所示：


    ```

    @WebListener

    public class ApplicationConfig implements ServletContextListener {

    @Override

    public void contextInitialized(ServletContextEvent event) {

    FacesContext.getCurrentInstance().getApplication()

    .addSearchKeywordResolver(new MessagesKeywordResolver());

    }

    }

    ```


    请注意，此时`FacesContext`必须可用，因此`ServletContainerInitializer`不一定能工作；并且`FacesServlet`可能尚未处理过请求，因此在某个受管
    bean 中进行注册也不一定能工作。


