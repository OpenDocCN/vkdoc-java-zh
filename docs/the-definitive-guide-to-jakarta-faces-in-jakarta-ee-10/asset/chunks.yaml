- fmt: '# Extending Existing Renderer


    Imagine that there’s an existing renderer that has logic bugs or shortcomings
    and you’d like to quickly patch it by extending it instead of rewriting from scratch.
    Unfortunately, it sounds far easier than it actually is. That is, standard renderer
    implementations are not part of the standard Jakarta Faces API, contrary to standard
    HTML component implementations that are available in the `jakarta.faces.component.html`
    package. The actual standard HTML renderer implementations are provided by the
    Jakarta Faces implementation itself. Mojarra has them in the `com.sun.faces.renderkit.html_basic`
    package, and MyFaces has them in the `org.apache.myfaces.renderkit.html` package.


    Another problem with those standard HTML renderers is relatively poor abstraction
    of the code. Basically, all those standard HTML renderers don’t have abstracted-out
    pieces of code that solely emit HTML markup in such a way that it’s fully separated
    from the logic. In other words, when you need to fix some logic, you’d almost
    always also have to rewrite or copy/paste all of the code responsible for emitting
    HTML.


    A common real-world example is the desire to let `<h:message>` or `<h:messages>`
    render the faces message unescaped so that you can embed some HTML code in a faces
    message, more than often to provide a link to the desired target page (e.g., "`Unknown
    user, perhaps you want to <a href="login">Log in</a>?`"). The standard `<h:message>`
    component doesn’t support such facility, and the HTML escaping is controlled by
    its renderer that in turn is thus Jakarta Faces implementation dependent. This
    Jakarta Faces built-in HTML escaping is found over all place and is a very important
    guard against possible XSS attack holes when you’re about to embed user-controlled
    data in the web page. There are a handful of components that have an explicit
    attribute to turn off this HTML escaping, such as `<h:outputText>` with its `escape`
    attribute, `<f:selectItem>` with its `itemEscaped` attribute, and `<f:selectItems>`
    with its `itemLabelEscaped` attribute. Such an attribute is, however, absent in
    `<h:message>` and `<h:messages>`.


    See also Jakarta Faces API spec issue 634.^([(95)](#fn95)) Perhaps it will be
    added in Faces.next, but for now, you can’t go around using a third-party component
    library or extending the existing standard HTML renderer.


    We’ll take that as an example to extend an existing standard HTML renderer for
    `<h:message>`. The first step is looking at which renderer exactly is currently
    used by the `<h:message>` component. In Table [11-1](#454457_2_En_11_Chapter.xhtml#Tab1),
    you will see that this component is backed by the `HtmlMessage` class. The currently
    used renderer implementation can be figured out programmatically as follows:


    ```

    String componentFamily = HtmlMessage.COMPONENT_FAMILY;

    String rendererType = new HtmlMessage().getRendererType();

    Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()

    .getRenderer(componentFamily, rendererType);

    System.out.println(renderer.getClass());

    ```


    In case you’re using Mojarra as Jakarta Faces implementation, it’ll print as follows:


    ```

    class com.sun.faces.renderkit.html_basic.MessageRenderer

    ```


    That’s thus exactly the renderer class we’d like to extend. Mojarra is open source,
    and its source code is currently available at [`https://github.com/eclipse-ee4j/mojarra`](https://github.com/eclipse-ee4j/mojarra).
    Once you’ve gotten the `MessageRenderer` source code at hand, the next step is
    to figure out where exactly the summary and detail of the `FacesMessage` is being
    rendered and how exactly we can override it with a minimum of code. We can see
    in the source code that it takes place in the `encodeEnd()` method which, in the
    current Mojarra 4.0 version, is already 160 lines of code. It’s using `ResponseWriter#writeText()`^([(96)](#fn96))
    to render the summary and detail. We’d like to replace this by `ResponseWriter#write()`
    so that it doesn’t perform any escaping.


    We can of course extend the class, copy/paste all the 160 lines of the `encodeEnd()`
    method, and adjust the `writeText()` calls for the `summary` as well as `detail`
    variables as follows:


    ```

    Object escape = component.getAttributes().get("escape");

    if (escape == null || Boolean.parseBoolean(escape.toString())) {

    writer.writeText(summary, component, null);

    }

    else {

    writer.write(summary);

    }

    ```


    However, this is not terribly elegant. What if we were to capture all `writeText()`
    calls during the `encodeEnd()` method and transparently delegate to `write()`?
    That would look much better. You can achieve this by wrapping the `ResponseWriter`,
    setting it on the faces context, and passing it through the superclass. Almost
    any public Jakarta Faces API artifact has an equivalent `XxxWrapper` class as
    well in the API. You can find them all in the "All known implementing classes"
    section of the `jakarta.faces.FacesWrapper` Javadoc.^([(97)](#fn97)) All those
    wrapper classes make Jakarta Faces very easily customizable and extensible. All
    of them have a constructor taking the to-be-wrapped class, and you basically just
    need to pick one or more of the methods you’d like to decorate.


    All in all, here’s how we could extend the `MessageRenderer` to delegate all `writeText()`
    calls during the `encodeEnd()` method to `write()`.


    ```

    public class EscapableMessageRenderer extends MessageRenderer {

    @Override

    public void encodeEnd

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    try {

    context.setResponseWriter(new ResponseWriterWrapper(writer) {

    @Override

    public void writeText

    (Object text, UIComponent component, String property)

    throws IOException

    {

    String string = text.toString();

    Object escape = component.getAttributes()

    .get("escape");

    if (escape == null

    || Boolean.parseBoolean(escape.toString()))

    {

    super.writeText(string, component, property);

    }

    else {

    super.write(string);

    }

    }

    });

    super.encodeEnd(context, component);

    }

    finally {

    context.setResponseWriter(writer);

    }

    }

    }

    ```


    Do note that it’s very important to restore the original response writer in the
    `finally` of the `try` block wherein the wrapped response writer is being used.
    In order to get it to run, register it as follows in `faces-config.xml` on the
    component family and renderer type as associated with the `<h:message>` component:


    ```

    <jakarta.faces.Message>

    <jakarta.faces.Message>

    <com.example.project.renderer.EscapableMessageRenderer>

    ```


    No, you cannot use the `@FacesRenderer` annotation for this. This won’t work when
    extending an existing renderer. The original renderers are by themselves already
    registered on the very same component family and renderer type, somewhere in an
    XML file. And you know, an XML-based configuration always gets higher precedence
    over an annotation-based configuration when both are discovered.


    Now you can just set the `escape` attribute of the existing `<h:message>` component
    to `false` in order to get the extended renderer to do its job.


    > **Beware** that you don’t embed user-controlled input in any faces message that
    gets displayed in there, or you’ll open up a potential XSS attack hole.


    # Custom Tag Handlers


    In Chapter [3](#454457_2_En_3_Chapter.xhtml), you learned about the difference
    between the view build time and the view render time, and that tag handlers such
    as Jakarta Tags run while building the Jakarta Faces component tree while Jakarta
    Faces components run while processing the HTTP request and response through the
    Jakarta Faces life cycle. Not only Jakarta Faces components can be customized,
    but tag handlers can also be customized. This is particularly useful when you
    want to control the building of the Jakarta Faces component tree instead of processing
    the HTTP request and response.'
  raw: 'Extending Existing Renderer

    Imagine that there’s an existing renderer that has logic bugs or

    shortcomings and

    you’d like to quickly patch it by extending it instead of rewriting from

    scratch. Unfortunately, it sounds far easier than it actually is. That

    is, standard renderer implementations are not part of the standard

    Jakarta Faces API, contrary to standard HTML component implementations

    that are available in the `jakarta.faces.component.html`

    package . The

    actual standard HTML renderer implementations are provided by the

    Jakarta Faces implementation itself. Mojarra has them in the `com.sun.faces.renderkit.html_basic`

    package, and MyFaces has them in the `org.apache.myfaces.renderkit.html`

    package.

    Another problem with those standard HTML renderers is relatively poor

    abstraction of the code. Basically, all those standard HTML renderers

    don’t have abstracted-out pieces of code that solely emit HTML markup in

    such a way that it’s fully separated from the logic. In other words,

    when you need to fix some logic, you’d almost always also have to

    rewrite or copy/paste all of the code responsible for emitting HTML.

    A common real-world example is the desire to let `<h:message>` or

    `<h:messages>`

    render  the faces

    message unescaped so that you can embed some HTML code in a faces

    message, more than often to provide a link to the desired target page

    (e.g., “`Unknown user, perhaps you want to <a href="login">Log in</a>?`”).

    The standard `<h:message>`

    component doesn’t support such facility, and the HTML escaping is

    controlled by its renderer that in turn is thus Jakarta Faces

    implementation dependent. This Jakarta Faces built-in HTML escaping is

    found over all place and is a very important guard against possible XSS

    attack holes when you’re about to embed user-controlled data in the web

    page. There are a handful of components that have an explicit attribute

    to turn off this HTML escaping, such as `<h:outputText>`

    with its `escape`

    attribute, `<f:selectItem>`

    with its `itemEscaped`

    attribute, and `<f:selectItems>`

    with its `itemLabelEscaped`

    attribute. Such an attribute is, however, absent in `<h:message>` and

    `<h:messages>`.

    See also Jakarta Faces API spec issue 634.^([^(95)](#fn95)) Perhaps it will be
    added in

    Faces.next, but for now, you can’t go around using a third-party

    component library or extending the existing standard HTML renderer.


    We’ll take that as an example to extend an existing standard HTML

    renderer for `<h:message>`.

    The first step is looking at which renderer exactly is currently used by

    the `<h:message>`

    component. In Table [11-1](#454457_2_En_11_Chapter.xhtml#Tab1), you will see

    that this component is backed by the `HtmlMessage`

    class . The

    currently used renderer implementation can be figured out

    programmatically as follows:


    ```

    String componentFamily = HtmlMessage.COMPONENT_FAMILY;

    String rendererType = new HtmlMessage().getRendererType();

    Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()

    .getRenderer(componentFamily, rendererType);

    System.out.println(renderer.getClass());

    ```


    In case you’re using Mojarra as Jakarta Faces implementation, it’ll

    print as follows:


    ```

    class com.sun.faces.renderkit.html_basic.MessageRenderer

    ```


    That’s thus exactly the renderer class we’d like to extend. Mojarra

    is open source, and its source code is currently available at [`https://github.com/eclipse-ee4j/mojarra`](https://github.com/eclipse-ee4j/mojarra).

    Once you’ve gotten the `MessageRenderer`

    source code at hand, the next step is to figure out where exactly the

    summary and detail of the `FacesMessage` is being

    rendered and how exactly we can override it with a minimum of code. We

    can see in the source code that it takes place in the `encodeEnd()` method

    which, in the current Mojarra 4.0 version, is already 160 lines of code.

    It’s using `ResponseWriter#writeText()`^([^(96)](#fn96)) to render the summary
    and

    detail. We’d like to replace this by `ResponseWriter#write()`

    so that it doesn’t perform any escaping.


    We can of course extend the class, copy/paste all the 160 lines of the

    `encodeEnd()`

    method, and adjust the `writeText()` calls for

    the `summary` as

    well as `detail`

    variables as follows:


    ```

    Object escape = component.getAttributes().get("escape");

    if (escape == null || Boolean.parseBoolean(escape.toString())) {

    writer.writeText(summary, component, null);

    }

    else {

    writer.write(summary);

    }

    ```


    However, this is not terribly elegant. What if we were to capture all

    `writeText()`

    calls during the `encodeEnd()`

    method   and transparently

    delegate to `write()`? That would

    look much better. You can achieve this by wrapping the `ResponseWriter`,

    setting it on the faces context, and passing it through the superclass.

    Almost any public Jakarta Faces API artifact has an equivalent `XxxWrapper` class
    as

    well in the API. You can find them all in the “All known implementing

    classes” section of the `jakarta.faces.FacesWrapper`

    Javadoc.^([^(97)](#fn97)) All those wrapper classes

    make Jakarta Faces very easily customizable and extensible. All of them

    have a constructor taking the to-be-wrapped class, and you basically

    just need to pick one or more of the methods you’d like to decorate.


    All in all, here’s how we could extend the `MessageRenderer` to

    delegate all `writeText()` calls

    during the `encodeEnd()`

    method  to `write()`.


    ```

    public class EscapableMessageRenderer extends MessageRenderer {

    @Override

    public void encodeEnd

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    try {

    context.setResponseWriter(new ResponseWriterWrapper(writer) {

    @Override

    public void writeText

    (Object text, UIComponent component, String property)

    throws IOException

    {

    String string = text.toString();

    Object escape = component.getAttributes()

    .get("escape");

    if (escape == null

    || Boolean.parseBoolean(escape.toString()))

    {

    super.writeText(string, component, property);

    }

    else {

    super.write(string);

    }

    }

    });

    super.encodeEnd(context, component);

    }

    finally {

    context.setResponseWriter(writer);

    }

    }

    }

    ```


    Do note that it’s very important to restore the original response writer

    in the `finally`  of the `try` block wherein the

    wrapped response writer is being used. In order to get it to run,

    register it as follows in `faces-config.xml` on

    the component family and renderer type as associated with the `<h:message>`

    component:


    ```


    jakarta.faces.Message

    jakarta.faces.Message


    com.example.project.renderer.EscapableMessageRenderer


    ```


    No, you cannot use the `@FacesRenderer`

    annotation for this. This won’t work when extending an existing

    renderer. The original renderers are by themselves already registered on

    the very same component family and renderer type, somewhere in an XML

    file. And you know, an XML-based configuration always gets higher

    precedence over an annotation-based configuration when both are

    discovered.


    Now you can just set the `escape` attribute of

    the existing `<h:message>`

    component to `false` in order to get

    the extended renderer to do its job.


    ```

    Beware that you don’t embed user-controlled input in any faces message that gets

    displayed in there, or you’ll open up a potential XSS attack hole.


    Custom Tag Handlers

    In Chapter [3](#454457_2_En_3_Chapter.xhtml), you learned about the difference

    between the view build time and the view render time, and that tag handlers such
    as

    Jakarta Tags run while building the Jakarta Faces component tree while

    Jakarta Faces components run while processing the HTTP request and

    response through the Jakarta Faces life cycle. Not only Jakarta Faces

    components can be customized, but tag handlers can also be customized.

    This is particularly useful when you want to control the building of the

    Jakarta Faces component tree instead of processing the HTTP request and

    response.'
  trans: '

    扩展现有渲染器

    假设有一个现有渲染器存在逻辑缺陷或不足，你希望通过扩展它来快速修补，而不是从头重写。不幸的是，这听起来比实际做起来要容易得多。也就是说，标准的渲染器实现并非标准
    Jakarta Faces API 的一部分，这与 `jakarta.faces.component.html` 包中可用的标准 HTML 组件实现不同。实际的标准
    HTML 渲染器实现由 Jakarta Faces 实现本身提供。Mojarra 将它们放在 `com.sun.faces.renderkit.html_basic`
    包中，而 MyFaces 将它们放在 `org.apache.myfaces.renderkit.html` 包中。


    这些标准 HTML 渲染器的另一个问题是代码抽象程度相对较差。基本上，所有这些标准 HTML 渲染器都没有抽象出专门用于发出 HTML 标记的代码片段，使其与逻辑完全分离。换句话说，当你需要修复某些逻辑时，几乎总是必须重写或复制/粘贴所有负责发出
    HTML 的代码。


    一个常见的现实世界示例是希望让 `<h:message>` 或 `<h:messages>` 渲染未转义的面部消息，以便你可以在面部消息中嵌入一些 HTML
    代码，通常是提供指向所需目标页面的链接（例如，“`Unknown user, perhaps you want to <a href="login">Log
    in</a>?`”）。标准的 `<h:message>` 组件不支持这种功能，而 HTML 转义由其渲染器控制，该渲染器因此依赖于 Jakarta Faces
    实现。这种 Jakarta Faces 内置的 HTML 转义随处可见，并且当你即将在网页中嵌入用户控制的数据时，它是防止潜在 XSS 攻击漏洞的非常重要的防护措施。有少数组件具有显式属性来关闭此
    HTML 转义，例如带有 `escape` 属性的 `<h:outputText>`、带有 `itemEscaped` 属性的 `<f:selectItem>`
    以及带有 `itemLabelEscaped` 属性的 `<f:selectItems>`。然而，`<h:message>` 和 `<h:messages>`
    中缺少这样的属性。另请参阅 Jakarta Faces API 规范问题 634。^((95)) 也许它会在 Faces.next 中添加，但就目前而言，你无法绕过使用第三方组件库或扩展现有的标准
    HTML 渲染器。


    我们将以此为例来扩展现有的 `<h:message>` 标准 HTML 渲染器。第一步是查看 `<h:message>` 组件当前具体使用哪个渲染器。在表
    11-1 中，你将看到此组件由 `HtmlMessage` 类支持。当前使用的渲染器实现可以通过编程方式确定，如下所示：


    ```

    String componentFamily = HtmlMessage.COMPONENT_FAMILY;

    String rendererType = new HtmlMessage().getRendererType();

    Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()

    .getRenderer(componentFamily, rendererType);

    System.out.println(renderer.getClass());

    ```


    如果你使用 Mojarra 作为 Jakarta Faces 实现，它将打印如下内容：


    ```

    class com.sun.faces.renderkit.html_basic.MessageRenderer

    ```


    这正好是我们想要扩展的渲染器类。Mojarra 是开源的，其源代码目前可在 [`https://github.com/eclipse-ee4j/mojarra`](https://github.com/eclipse-ee4j/mojarra)
    获取。一旦你手头有了 `MessageRenderer` 源代码，下一步就是找出 `FacesMessage` 的摘要和详细信息具体在哪里渲染，以及我们如何用最少的代码覆盖它。我们可以在源代码中看到，它发生在
    `encodeEnd()` 方法中，在当前 Mojarra 4.0 版本中，该方法已有 160 行代码。它使用 `ResponseWriter#writeText()`^((96))
    来渲染摘要和详细信息。我们希望将其替换为 `ResponseWriter#write()`，这样它就不会执行任何转义。


    当然，我们可以扩展该类，复制/粘贴 `encodeEnd()` 方法的所有 160 行代码，并调整 `summary` 和 `detail` 变量的 `writeText()`
    调用，如下所示：


    ```

    Object escape = component.getAttributes().get("escape");

    if (escape == null || Boolean.parseBoolean(escape.toString())) {

    writer.writeText(summary, component, null);

    }

    else {

    writer.write(summary);

    }

    ```


    然而，这并不十分优雅。如果我们能在 `encodeEnd()` 方法期间捕获所有 `writeText()` 调用，并透明地委托给 `write()` 呢？那看起来会好得多。你可以通过包装
    `ResponseWriter`，将其设置在 faces 上下文中，并将其传递给超类来实现这一点。几乎任何公共的 Jakarta Faces API 工件在
    API 中也有一个等效的 `XxxWrapper` 类。你可以在 `jakarta.faces.FacesWrapper` Javadoc^((97)) 的“所有已知实现类”部分找到它们。所有这些包装类使得
    Jakarta Faces 非常易于定制和扩展。它们都有一个接受待包装类的构造函数，你基本上只需要选择你想要装饰的一个或多个方法。


    总而言之，以下是我们如何扩展 `MessageRenderer`，以在 `encodeEnd()` 方法期间将所有 `writeText()` 调用委托给
    `write()`。


    ```

    public class EscapableMessageRenderer extends MessageRenderer {

    @Override

    public void encodeEnd

    (FacesContext context, UIComponent component)

    throws IOException

    {

    ResponseWriter writer = context.getResponseWriter();

    try {

    context.setResponseWriter(new ResponseWriterWrapper(writer) {

    @Override

    public void writeText

    (Object text, UIComponent component, String property)

    throws IOException

    {

    String string = text.toString();

    Object escape = component.getAttributes()

    .get("escape");

    if (escape == null

    || Boolean.parseBoolean(escape.toString()))

    {

    super.writeText(string, component, property);

    }

    else {

    super.write(string);

    }

    }

    });

    super.encodeEnd(context, component);

    }

    finally {

    context.setResponseWriter(writer);

    }

    }

    }

    ```


    请注意，在使用了包装后的响应写入器的 `try` 块的 `finally` 中恢复原始响应写入器非常重要。为了使其运行，请在 `faces-config.xml`
    中将其注册到与 `<h:message>` 组件关联的组件系列和渲染器类型上：


    ```


    jakarta.faces.Message

    jakarta.faces.Message


    com.example.project.renderer.EscapableMessageRenderer


    ```


    不，你不能为此使用 `@FacesRenderer` 注解。这在扩展现有渲染器时不起作用。原始渲染器本身已经在某个 XML 文件中注册到了完全相同的组件系列和渲染器类型上。而且你知道，当同时发现基于
    XML 的配置和基于注解的配置时，基于 XML 的配置总是具有更高的优先级。


    现在，你可以将现有 `<h:message>` 组件的 `escape` 属性设置为 `false`，以使扩展后的渲染器执行其工作。


    ```

    请注意，不要在任何显示在此处的面部消息中嵌入用户控制的输入，否则你将打开一个潜在的 XSS 攻击漏洞。


    自定义标签处理器

    在第 3 章中，你了解了视图构建时间和视图渲染时间之间的区别，以及诸如 Jakarta Tags 之类的标签处理器在构建 Jakarta Faces 组件树时运行，而
    Jakarta Faces 组件在通过 Jakarta Faces 生命周期处理 HTTP 请求和响应时运行。不仅 Jakarta Faces 组件可以自定义，标签处理器也可以自定义。当你想控制
    Jakarta Faces 组件树的构建而不是处理 HTTP 请求和响应时，这尤其有用。

    '
- fmt: "`<f:viewParam>` 在主子页面中非常有用。在主页面中，你可以链接到带有实体 ID 作为参数的详情页面。在详情页面中，你可以通过`<f:viewParam>`根据\
    \ ID 加载实体。其工作方式如下：\n\n当转换或验证失败时，当前页面的 faces 上下文中会添加一条 faces 消息。然而，更常见的需求是直接将用户重定向回主页面。通过`<f:event>`和`PostValidateEvent`来实现这一点相对简单。`<f:viewAction>`在这里不起作用，因为当存在转换或验证错误时，它根本不会被调用。\n\
    \n```\n...\n\n```\n\n其中，`onload()`方法如下所示：\n\n```\npublic void onload() throws\
    \ IOException {\n    FacesContext context = FacesContext.getCurrentInstance();\n\
    \    if (context.isValidationFailed()) {\n        ExternalContext ec = context.getExternalContext();\n\
    \        ec.redirect(ec.getRequestContextPath() + \"/items.xhtml\");\n    }\n\
    }\n```\n\n这种方法可行，但当你拥有更多类似页面时，会导致大量样板代码。理想情况下，你希望能够以声明方式在`<f:viewParam>`本身上注册一个事件监听器，就像下面这样，以一种自文档化的方式，从而保持后端\
    \ bean 代码的简洁，避免手动处理请求-响应。\n\n这可以通过一个标签处理器来实现，该处理器本质上在`<f:viewParam>`标签所代表的`UIViewParameter`组件上注册一个新的系统事件监听器。标签处理器类必须继承自`jakarta.faces.view.facelets.TagHandler`。\n\
    \n```\npublic class ViewParamValidationFailed extends TagHandler\n        implements\
    \ ComponentSystemEventListener {\n    private String redirect;\n\n    public ViewParamValidationFailed(TagConfig\
    \ config) {\n        super(config);\n        redirect = getRequiredAttribute(\"\
    redirect\").getValue();\n    }\n\n    @Override\n    public void apply(FaceletContext\
    \ context, UIComponent parent)\n            throws IOException {\n        if (parent\
    \ instanceof UIViewParameter\n                && !context.getFacesContext().isPostback())\
    \ {\n            parent.subscribeToEvent(PostValidateEvent.class, this);\n   \
    \     }\n    }\n\n    @Override\n    public void processEvent(ComponentSystemEvent\
    \ event)\n            throws AbortProcessingException {\n        UIComponent parent\
    \ = event.getComponent();\n        parent.unsubscribeFromEvent(PostValidateEvent.class,\
    \ this);\n        FacesContext context = event.getFacesContext();\n        if\
    \ (context.isValidationFailed()) {\n            try {\n                ExternalContext\
    \ ec = context.getExternalContext();\n                ec.redirect(ec.getRequestContextPath()\
    \ + redirect);\n            } catch (IOException e) {\n                throw new\
    \ AbortProcessingException(e);\n            }\n        }\n    }\n}\n```\n\n确实，这个类也实现了`jakarta.faces.event.ComponentSystemEventListener`。对于标签处理器来说，这并不是严格必需的；在这个特定示例中，这样做只是为了代码的便利性。重写的`apply()`方法属于`TagHandler`，而重写的`processEvent()`方法属于`ComponentSystemEventListener`。在`apply()`方法中，我们有机会在父组件被添加到组件树之前，以编程方式操作它。我们可以通过调用`UIComponent#subscribeToEvent()`，并传入感兴趣的组件系统事件类型和监听器实例，以编程方式实现与`<f:event>`相同的行为。这里感兴趣的监听器实例恰好就是当前的标签处理器实例。当应用程序发布了感兴趣的组件系统事件时，监听器实例的`processEvent()`方法将被调用。\n\
    \n我们在`processEvent()`中做的第一件事是取消订阅该监听器实例。这是有意为之，因为组件系统事件监听器被认为是有状态的，因此本质上会被保存在\
    \ Jakarta Faces 视图状态中。观察这一点的一个简单方法是，重新配置 Jakarta Faces，通过在`web.xml`中显式地将`jakarta.faces.STATE_SAVING_METHOD`上下文参数设置为`client`，将视图状态保存在客户端，然后检查任何\
    \ Jakarta Faces 表单生成的 HTML 输出中`jakarta.faces.ViewState`隐藏输入字段的大小。每次当你添加一个`<f:event>`，或者在`ComponentSystemEventListener`完成其工作后没有取消订阅它时，Jakarta\
    \ Faces 视图状态的大小就会随着监听器实例的序列化形式而增长。在这个特定的用例中，监听器只应在非回发请求期间运行，因此这种增长是不必要的，所以需要显式取消订阅。\n\
    \n现在，为了使其运行，需要在`/WEB-INF/example.taglib.xml`中注册它，如下所示：\n\n```\n<tag>\n    <tag-name>viewParamValidationFailed</tag-name>\n\
    \    <handler-class>\n        com.example.project.taghandler.ViewParamValidationFailed\n\
    \    </handler-class>\n</tag>\n```\n\n**打包成可分发的 JAR**\n\n如果你开发了一系列可复用的组件、渲染器、标签处理器、标签文件、复合组件等，并希望将它们打包成一个\
    \ JAR 文件，以便包含在 Web 应用程序的`/WEB-INF/lib`目录中，那么你需要创建一个所谓的 Web 片段项目。基本上，所有 Jakarta\
    \ Faces 导向的组件和实用库，如 OmniFaces、PrimeFaces、OptimusFaces、BootsFaces、ButterFaces 和\
    \ DeltaSpike，都是这样构建的。从 Maven 的角度来看，它只是一个 JAR 项目。关键是将通常放在 Maven WAR 项目的`src/main/webapp`文件夹中的文件，放到\
    \ Maven JAR 项目的`src/main/resources/META-INF/resources/[libraryName]`文件夹中。有一个主要的例外：所有通常放在`src/main/webapp/WEB-INF`中的部署描述符文件，如`web.xml`、`faces-config.xml`、`*.taglib.xml`和`beans.xml`，直接放在`src/main/resources/META-INF`文件夹中。另一个例外是，`web.xml`文件需要被`web-fragment.xml`替代。resources\
    \ 文件夹中的`[libraryName]`子文件夹代表“库名称”，通常是项目名称的 URL 友好形式，例如“`omnifaces`”、“`primefaces`”、“`optimusfaces`”、“`bsf`”、“`butterfaces`”等。这个库名称随后可用于资源组件的`library`属性，例如`<h:outputScript>`、`<h:outputStylesheet>`和`<h:graphicImage>`。以下是这样一个\
    \ Maven JAR 项目在 Eclipse 中按照“Web 片段”规则组织时的样子。请特别注意`src/main/resources`文件夹的结构。当然，任何\
    \ Java 类都可以像往常一样放在`src/main/java`文件夹中。\n\n![](images/454457_2_En_11_Chapter/454457_2_En_11_Figa_HTML.jpg)"
  raw: 'The `<f:viewParam>`

    is useful on master-detail pages. From the master page, you can link to

    the detail page with the entity ID as the parameter. In the detail page,

    you can load the entity by ID via `<f:viewParam>`.

    It goes as follows:


    When conversion or validation fails, a faces message will be added to

    the faces context of the current page. However, more often you’d just

    like to directly redirect the user back to the master page. This is

    relatively trivial to implement with `<f:event>` on

    `PostValidateEvent`.

    No, `<f:viewAction>`

    won’t work as that wouldn’t be invoked in first place

    when there’s a conversion or validation error.


    ```

    ...


    ```


    wherein the `onload()` method looks

    as follows:


    ```

    public void onload() throws IOException {

    FacesContext context = FacesContext.getCurrentInstance();

    if (context.isValidationFailed()) {

    ExternalContext ec = context.getExternalContext();

    ec.redirect(ec.getRequestContextPath() + "/items.xhtml");

    }

    }

    ```


    Okay, that works, but this will end up in boilerplate code when you have

    more of such pages. Ideally, you’d like to be able to declaratively

    register an event listener on `<f:viewParam>`

    itself in a self-documenting way like the following so that you can keep

    the backing bean code free of manual request-response processing

    clutter.


    This can be achieved with a tag handler that basically registers a new

    system event listener on the `UIViewParameter`

    component represented by the `<f:viewParam>`

    tag. The tag handler class must extend from `jakarta.faces.view.facelets.TagHandler`.


    ```

    public class ViewParamValidationFailed extends TagHandler

    implements ComponentSystemEventListener

    {

    private String redirect;

    public ViewParamValidationFailed(TagConfig config) {

    super(config);

    redirect = getRequiredAttribute("redirect").getValue();

    }

    @Override

    public void apply(FaceletContext context, UIComponent parent)

    throws IOException

    {

    if (parent instanceof UIViewParameter

    && !context.getFacesContext().isPostback())

    {

    parent.subscribeToEvent(PostValidateEvent.class, this);

    }

    }

    @Override

    public void processEvent(ComponentSystemEvent event)

    throws AbortProcessingException

    {

    UIComponent parent = event.getComponent();

    parent.unsubscribeFromEvent(PostValidateEvent.class, this);

    FacesContext context = event.getFacesContext();

    if (context.isValidationFailed()) {

    try {

    ExternalContext ec = context.getExternalContext();

    ec.redirect(ec.getRequestContextPath() + redirect);

    }

    catch (IOException e) {

    throw new AbortProcessingException(e);

    }

    }

    }

    }

    ```


    Indeed, this also implements `jakarta.faces.event.ComponentSystemEventListener`.

    This is not strictly required for a tag handler; it’s just done for code

    convenience in this specific example. The overridden `apply()` method is for

    `TagHandler`, and

    the overridden `processEvent()` method

    is for `ComponentSystemEventListener`.

    In the `apply()`

    method, we have the opportunity to programmatically manipulate the

    parent component before it’s being added to the component tree.

    We can programmatically achieve the same behavior as `<f:event>` by

    calling `UIComponent#subscribeToEvent()`,

    passing the component system event type and listener

    instance of interest. The listener instance of interest happens to be

    just the current tag handler instance. When the component system event

    of interest has been published by the application, then the `processEvent()`

    method   of the listener

    instance will be invoked.

    The first thing we do in `processEvent()` is to

    unsubscribe the listener instance. This is done on purpose because

    component system event listeners are considered stateful and therefore

    are inherently saved in the Jakarta Faces view state. An easy way to

    observe this is to reconfigure Jakarta Faces to save the view state on

    the client side by explicitly setting the `jakarta.faces.STATE_SAVING_METHOD`

    context parameter to `client` in `web.xml` and

    inspecting the size of the `jakarta.faces.ViewState`

    hidden input field in the generated HTML output of any Jakarta Faces

    form. Every time when you add a `<f:event>`, or

    don’t unsubscribe `ComponentSystemEventListener`

    after it has done its job, then the size of the Jakarta Faces view state

    grows with the serialized form of the listener instance. In this

    specific use case of a listener that should only run during a

    nonpostback request, that’s just unnecessary, hence the explicit

    unsubscribe.


    Now, in order to get it to run, register it in `/WEB-INF/example.taglib.xml`

    as follows:


    ```

    viewParamValidationFailed


    com.example.project.taghandler.ViewParamValidationFailed


    ```


    Packaging in a Distributable JAR

    In case you have developed a bunch of reusable components, renderers, tag

    handlers, tag files, composite components, and whatnot, and you’d like

    to package it in a JAR file for inclusion in `/WEB-INF/lib` of a web

    application, then you need to create a so-called web fragment project.

    Basically, all Jakarta Faces`–`oriented components

    and utility libraries such as OmniFaces, PrimeFaces, OptimusFaces,

    BootsFaces, ButterFaces, and DeltaSpike are built like this. In Maven

    perspective, it’s merely a JAR project. The key is to put files that you

    normally put in the `src/main/webapp`

    folder of a Maven WAR project in the `src/main/resources/META-INF/resources/[libraryName]`

    folder of the Maven JAR project. There is one main exception, all

    deployment descriptor files that you normally put in `src/main/webapp/WEB-INF`

    such as `web.xml`, `faces-config.xml`,

    `*.taglib.xml`,

    and `beans.xml`

    go directly in the `src/main/resources/META-INF`

    folder. Another exception is that the `web.xml` file is to be

    replaced by `web-fragment.xml`.

    The `[libraryName]`

    subfolder in the resources folder represents the “library name” that is

    generally the URL-friendly form of the project name, for example, “`omnifaces`”,
    “`primefaces`”, “`optimusfaces`”, “`bsf`”, “`butterfaces`”, etc.

    Exactly this library name is then usable in the `library` attribute of

    resource components such as `<h:outputScript>`,

    `<h:outputStylesheet>`,

    and `<h:graphicImage>`.

    The following is what such a Maven JAR project looks like in Eclipse

    when organized to conform to the “web fragment” rules. Note particularly

    the structure of the `src/main/resources`

    folder. Of course, any Java classes can go inside the `src/main/java` folder

    in the usual way.

    ![](images/454457_2_En_11_Chapter/454457_2_En_11_Figa_HTML.jpg)'
  trans: "\n`<f:viewParam>` 在主从页面中非常有用。从主页面，你可以通过实体 ID 作为参数链接到详情页面。在详情页面，你可以通过 `<f:viewParam>`\
    \ 根据 ID 加载实体。具体用法如下：\n\n当转换或验证失败时，当前页面的 faces 上下文中会添加一条 faces 消息。然而，更多时候你希望直接将用户重定向回主页面。通过\
    \ `<f:event>` 结合 `PostValidateEvent` 来实现这一点相对简单。不，`<f:viewAction>` 是行不通的，因为当存在转换或验证错误时，它根本不会被调用。\n\
    \n```\n...\n\n```\n\n其中 `onload()` 方法如下所示：\n\n```\npublic void onload() throws\
    \ IOException {\nFacesContext context = FacesContext.getCurrentInstance();\nif\
    \ (context.isValidationFailed()) {\nExternalContext ec = context.getExternalContext();\n\
    ec.redirect(ec.getRequestContextPath() + \"/items.xhtml\");\n}\n}\n```\n\n好吧，这样是可行的，但当你拥有更多类似页面时，这会导致大量样板代码。理想情况下，你希望能够以声明方式在\
    \ `<f:viewParam>` 本身上注册一个事件监听器，采用如下这种自文档化的方式，这样就能使后端 bean 代码免于手动处理请求-响应的杂乱逻辑。\n\
    \n这可以通过一个标签处理器来实现，该处理器基本上在由 `<f:viewParam>` 标签表示的 `UIViewParameter` 组件上注册一个新的系统事件监听器。标签处理器类必须继承自\
    \ `jakarta.faces.view.facelets.TagHandler`。\n\n```\npublic class ViewParamValidationFailed\
    \ extends TagHandler\nimplements ComponentSystemEventListener\n{\nprivate String\
    \ redirect;\npublic ViewParamValidationFailed(TagConfig config) {\nsuper(config);\n\
    redirect = getRequiredAttribute(\"redirect\").getValue();\n}\n@Override\npublic\
    \ void apply(FaceletContext context, UIComponent parent)\nthrows IOException\n\
    {\nif (parent instanceof UIViewParameter\n&& !context.getFacesContext().isPostback())\n\
    {\nparent.subscribeToEvent(PostValidateEvent.class, this);\n}\n}\n@Override\n\
    public void processEvent(ComponentSystemEvent event)\nthrows AbortProcessingException\n\
    {\nUIComponent parent = event.getComponent();\nparent.unsubscribeFromEvent(PostValidateEvent.class,\
    \ this);\nFacesContext context = event.getFacesContext();\nif (context.isValidationFailed())\
    \ {\ntry {\nExternalContext ec = context.getExternalContext();\nec.redirect(ec.getRequestContextPath()\
    \ + redirect);\n}\ncatch (IOException e) {\nthrow new AbortProcessingException(e);\n\
    }\n}\n}\n}\n```\n\n确实，这个类也实现了 `jakarta.faces.event.ComponentSystemEventListener`。对于标签处理器来说，这并不是严格必需的；在这个特定示例中这样做只是为了代码的便利性。重写的\
    \ `apply()` 方法用于 `TagHandler`，而重写的 `processEvent()` 方法用于 `ComponentSystemEventListener`。在\
    \ `apply()` 方法中，我们有机会在父组件被添加到组件树之前以编程方式操作它。我们可以通过调用 `UIComponent#subscribeToEvent()`\
    \ 并传入相关的组件系统事件类型和监听器实例，以编程方式实现与 `<f:event>` 相同的行为。相关的监听器实例恰好就是当前的标签处理器实例。当应用程序发布了相关的组件系统事件时，监听器实例的\
    \ `processEvent()` 方法将被调用。我们在 `processEvent()` 中做的第一件事就是取消订阅该监听器实例。这是有意为之，因为组件系统事件监听器被视为有状态的，因此本质上会保存在\
    \ Jakarta Faces 视图状态中。观察这一点的一个简单方法是，重新配置 Jakarta Faces，通过在 `web.xml` 中将 `jakarta.faces.STATE_SAVING_METHOD`\
    \ 上下文参数显式设置为 `client`，将视图状态保存在客户端，然后检查任何 Jakarta Faces 表单生成的 HTML 输出中 `jakarta.faces.ViewState`\
    \ 隐藏输入字段的大小。每次当你添加一个 `<f:event>`，或者在 `ComponentSystemEventListener` 完成其工作后没有取消订阅它时，Jakarta\
    \ Faces 视图状态的大小就会随着监听器实例的序列化形式而增长。在这个特定的用例中，监听器只应在非回发请求期间运行，这完全没有必要，因此需要显式取消订阅。\n\
    \n现在，为了使其运行，在 `/WEB-INF/example.taglib.xml` 中按如下方式注册它：\n\n```\n<tag>\n    <tag-name>viewParamValidationFailed</tag-name>\n\
    \    <handler-class>com.example.project.taghandler.ViewParamValidationFailed</handler-class>\n\
    </tag>\n```\n\n**打包成可分发的 JAR**\n\n如果你开发了一系列可复用的组件、渲染器、标签处理器、标签文件、复合组件等等，并且希望将它们打包成一个\
    \ JAR 文件，以便包含在 Web 应用程序的 `/WEB-INF/lib` 中，那么你需要创建一个所谓的 Web 片段项目。基本上，所有面向 Jakarta\
    \ Faces 的组件和实用库，如 OmniFaces、PrimeFaces、OptimusFaces、BootsFaces、ButterFaces 和 DeltaSpike，都是这样构建的。从\
    \ Maven 的角度来看，这只是一个 JAR 项目。关键在于，将通常放在 Maven WAR 项目的 `src/main/webapp` 文件夹中的文件，放到\
    \ Maven JAR 项目的 `src/main/resources/META-INF/resources/[libraryName]` 文件夹中。有一个主要的例外：所有通常放在\
    \ `src/main/webapp/WEB-INF` 中的部署描述符文件，如 `web.xml`、`faces-config.xml`、`*.taglib.xml`\
    \ 和 `beans.xml`，直接放在 `src/main/resources/META-INF` 文件夹中。另一个例外是，`web.xml` 文件需要替换为\
    \ `web-fragment.xml`。resources 文件夹中的 `[libraryName]` 子文件夹代表“库名称”，通常是项目名称的 URL\
    \ 友好形式，例如“`omnifaces`”、“`primefaces`”、“`optimusfaces`”、“`bsf`”、“`butterfaces`”等。这个库名称随后可用于资源组件的\
    \ `library` 属性，例如 `<h:outputScript>`、`<h:outputStylesheet>` 和 `<h:graphicImage>`。以下是在\
    \ Eclipse 中，当按照“Web 片段”规则组织时，这样一个 Maven JAR 项目的样子。请特别注意 `src/main/resources` 文件夹的结构。当然，任何\
    \ Java 类都可以像往常一样放在 `src/main/java` 文件夹中。\n![](img/454457_2_En_11_Figa_HTML.jpg)\n"
