    1.0 客户端（如今通常只是古老的代理服务器或无法获得比 Internet Explorer 6.0 更好的浏览器的可怜用户），那么你最好在 `Cache-Control`
    之外再添加两个响应头。


    ```

    response.setHeader("Pragma", "no-cache"); // HTTP 1.0.

    response.setDateHeader("Expires", 0); // Proxies.

    ```


    现在，有了这个过滤器，最终用户将无法再从浏览器缓存中看到任何 Jakarta Faces 页面，因此也就无法再遇到 `ViewExpiredException`。然而，仍然存在一些情况，`ViewExpiredException`
    是不可避免的。一种情况是，最终用户在不同的浏览器标签页中打开了多个 Jakarta Faces 页面，并在其中一个标签页中注销，然后在另一个标签页中执行操作，而事先没有刷新页面。对于这种情况，你确实需要一个“抱歉，您的会话已过期”的错误页面。这可以很容易地在
    `web.xml` 中配置为另一个错误页面，如下所示：


    ```


    jakarta.faces.application.ViewExpiredException


    /WEB-INF/errorpages/expired.xhtml


    ```


    不要让 `<location>` 指向一个公共页面，例如登录页面。错误页面必须保留在 `/WEB-INF` 文件夹中，以避免被直接访问、添加书签甚至被爬取。如果你确实需要最终用户最终进入一个现有的公共页面，那么最好在错误页面中使用一个元刷新头，该头进而将最终用户重定向到所需的公共页面。这样，你可以确保浏览器地址栏中的
    URL 被更新为正确的 URL，而不是发生错误的上一页面的 URL。


    ```


    会话已过期


    抱歉，您的会话已过期

    您将被重定向到登录页面


    如果重定向未生效，或者您等不及了，请点击此处。


    ```


    请注意，元刷新内容中的“`0`”表示重定向前等待的秒数。因此，“`0`”意味着“立即重定向”。你可以使用，例如，“`3`”来让浏览器在重定向前等待 3 秒。

