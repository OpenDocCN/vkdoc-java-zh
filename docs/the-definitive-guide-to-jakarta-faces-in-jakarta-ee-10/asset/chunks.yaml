    ## Label and Message Components


    In an average well-designed form, input elements are usually accompanied with
    a label element and a message element targeting the input field. In HTML, labels
    are represented by the `<label>` element. In Jakarta Faces, you can use the `<h:outputLabel>`
    component to generate an HTML `<label>` element. HTML does not have a dedicated
    element to represent a message. In Jakarta Faces, the `<h:message>` component
    generates an HTML `<span>` element, and the `<h:messages>` component generates
    either a `<ul>` element or a `<table>` element, depending on the value of the
    `layout` attribute.


    The label element has various SEO (search engine optimization) and usability advantages.
    It tells in text about the associated input element. Screen readers, like those
    used by people with visual disabilities, will find the label and tell its contents
    by sound. Search bots will find the label and index the associated input element
    with the label as keyword. And the label will focus and activate the associated
    input element when being clicked itself. Text-based input elements will then show
    the text cursor. Check box and radio button input elements will then be toggled.
    List box and drop-down input elements will then be focused. File input elements
    will then open the browse dialog. Submit buttons will then be invoked.


    The message element is usually used to display any conversion and validation error
    messages coming from the server side. This way, the end user is informed about
    the state of the form and can act accordingly, usually by correcting the input
    values. You can also use it to display warning or informal messages.


    In Jakarta Faces, the `<h:outputLabel>`, `<h:message>`, and `<h:messages>` components
    have a `for` attribute wherein you normally define the ID of the associated input
    component. The following is an example in the flavor of a login form:


    ```xml

    <h:outputLabel for="email" value="Email" />

    <h:inputText id="email" value="#{loginBean.email}" />

    <h:message for="email" />


    <h:outputLabel for="password" value="Password" />

    <h:inputSecret id="password" value="#{loginBean.password}" />

    <h:message for="password" />


    <h:commandButton value="Login" action="#{loginBean.submit}" />

    ```


    You can actually use any arbitrary component search expression in the `for` attribute.
    For the `<h:outputLabel>` component, this doesn’t make much sense. For the `<h:message>`
    and `<h:messages>` components, referring the ID of a non-input component would
    only make sense when you want to programmatically add a faces message from the
    managed bean on. But you would then need to know the client ID of the target component.


    ```xml

    <h:form id="login">

    ...

    <h:commandButton id="submit" value="Login" action="#{loginBean.submit}" />

    </h:form>

    ```


    The preceding `<h:commandButton>` will generate a client ID of `"login:submit"`
    in the HTML output. You can then programmatically add a faces message as follows:


    ```java

    public String submit() {

    try {

    yourAuthenticator.authenticate(email, password);

    return "/user/home.xhtml?faces-redirect=true";

    }

    catch (YourAuthenticationException e) {

    FacesContext context = FacesContext.getCurrentInstance();

    FacesMessage message = new FacesMessage("Authentication failed");

    context.addMessage("login:submit", message);

    return null;

    }

    }

    ```


    A better practice, however, is to add the faces message as a global message by
    passing `null` as the client ID.


    ```java

    context.addMessage(null, message);

    ```


    Such a message will then only end up in a `<h:messages globalOnly="true">`.'
