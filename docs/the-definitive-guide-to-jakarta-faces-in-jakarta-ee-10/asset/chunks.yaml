    `\ninstead of using `<f:param>` won’t\nwork. The technical reason is that `<f:param>`\
    \ is\nexecuted immediately during the render response phase of the form, long\n\
    before the end user presses the delete button. Thus, at the moment the\nend user\
    \ presses the delete button, it’s guaranteed to have the correct\nvalue. The EL\
    \ method argument, on the contrary, is only evaluated during\nthe postback request\
    \ after the end user has pressed the delete button.\nWhen the model has changed\
    \ in the meanwhile, then it would thus evaluate\nto the wrong ID when the iteration\
    \ index of the particular product has\nchanged.\nAs explained in the beginning\
    \ of this section, the standard Jakarta\nFaces view-scoped bean management facility\
    \ has thus two major\ndisadvantages: first, the instances don’t immediately expire\
    \ when the\nend user unloads the web page and stick around in the HTTP session;\
    \ second,\neven with client-side state saving enabled, they are stored in the\
    \ HTTP\nsession. Those problems are currently not yet solved in the standard\n\
    Jakarta Faces API.\nFor now, the Jakarta Faces utility library OmniFaces offers\
    \ an\nenhanced `@ViewScoped`\nannotation that solves those two disadvantages.^([^(75)](#fn75))\
    \ View-scoped managed\nbeans \nannotated with `@org.omnifaces.cdi.ViewScoped`\n\
    will actually get destroyed when the end user unloads the page. This is\nunder\
    \ the hood done with the help of `Navigator.sendBeacon`\nAPI^([^(76)](#fn76))\
    \ in JavaScript and a\nspecialized `ViewHandler`\nimplementation provided by OmniFaces\
    \ that listens on those unload\nrequests. There have been production applications\
    \ making heavy use of\nview-scoped managed beans whereby the memory usage has\
    \ reduced for up to\n80% after switching from standard Jakarta Faces `@ViewScoped`\
    \ to\nOmniFaces `@ViewScoped`. This\nmakes the destroy-on-unload feature a major\
    \ candidate to be added to the\nfuture version of the standard Jakarta Faces API.\n\
    In order to save the physical view-scoped managed bean in the Jakarta\nFaces view\
    \ state when client-side state saving is enabled, the `saveInViewState`\nattribute\
    \  of the\nOmniFaces `@ViewScoped`\nannotation must be set to `true`. You only\
    \ need\nto keep in mind that those beans will never expire, not even when the\n\
    page gets unloaded, or when the HTTP session expires. In fact, the\nentire bean\
    \ has physically become part of the generated HTML output, in\nthe `jakarta.faces.ViewState`\n\
    hidden input field. There have been community requests to make Jakarta\nFaces\
    \ state management more flexible, such as toggling between client-\nand server-side\
    \ state saving on a per-view (per `UIViewRoot`) or even\nper-form (per `UIForm`)\
    \ basis and\nbeing able to store view-scoped managed\nbeans  in\nthe actual view\
    \ state instead of in the HTTP session. This may also be\nreconsidered in a future\
    \ version of the standard Jakarta Faces API.\n\n@RequestScoped\nA request-scoped\n\
    managed bean\n is among others tied to the lifetime of the HTTP request, which\n\
    is for Jakarta Faces the most important case. Other cases include the\nlifetimes\
    \ of a call to an asynchronous method invocation on a session\nbean (a method\
    \ annotated by `@Asynchronous`), a\ntimer timeout method, or when a message-driven\
    \ bean\n(MDB) processes a message, all in Jakarta Enterprise Beans\n(previously\
    \ known as Jakarta Enterprise Beans). Note that an Ajax\nrequest also counts as\
    \ a single HTTP request.\nWhen the client sends an HTTP request to the server,\
    \ then the servlet\ncontainer will create `HttpServletRequest`\nand `HttpServletResponse`\n\
    instances representing the HTTP request and response and pass them\nthrough the\
    \ authentication modules, servlet filters, and servlets. They\nwill be destroyed\
    \ immediately after all authentication modules, servlet\nfilters, and servlets\
    \ are finished processing the request and response.\nIn other words, every HTTP\
    \ request creates a new instance of a\nrequest-scoped managed bean that is available\
    \ only during that request\nand not in other requests.\n\nRequest-scoped managed\n\
    beans  are\nuseful for simple and static forms which don’t have any dynamic\n\
    Ajax-based updates, for which you would rather use a view-scoped managed\nbean.\
    \ Think of a login form or a contact form.\n\n```\n@Named @RequestScoped\npublic\
    \ class Login {\nprivate String username;\nprivate String password;\n// ...\n\
    }\n```\n\nSure, those forms can be tied to a view-scoped managed bean as well\n\
    without problems, but that’s a waste of memory space. Note that you\nshould absolutely\
    \ not make the Jakarta Persistence entity itself a\nmanaged bean. In other words,\
    \ the following approach is factually wrong:\n\n```\n@Named @RequestScoped //\
    \ or @Model\n@Entity\npublic class Product {\n// ...\n}\n```\n\nNot only does\
    \ this violate the Law of Demeter,^([^(77)](#fn77)) but it also risks that\nJakarta\
    \ Persistence won’t be able to persist it, because CDI actually\nwraps the managed\
    \ bean in a proxy class and Jakarta Persistence would\nthen not be able to obtain\
    \ the entity information from it when you’re\nabout to pass an injected instance\
    \ to the entity manager. Hibernate\nwould in such case throw “`Unknown entity:\
    \ com.example.Entity$Proxy$_$$_WeldClientProxy`”, which thus\nactually represents\
    \ the CDI proxy class.\n\nYou might at this point wonder how exactly CDI actually\
    \ works. First, it\nwill, during the web application’s startup, collect all classes\
    \ that are\nannotated with a CDI-compatible scope annotation. Then, it will generate\n\
    proxy classes for all of them. Ultimately, instances of those proxy\nclasses are\
    \ being injected. Given an example bean class `com.example.Bean`, the\ngenerated\
    \ CDI proxy class may look as\nfollows:\n\n```\npublic class Bean$Proxy$_$$_CDI\
    \ extends Bean implements Serializable {\npublic String getSomeProperty() {\n\
    Bean actualInstance = CDI.resolveItSomehow();\nreturn actualInstance.getSomeProperty();\n\
    }\npublic void setSomeProperty(String someProperty) {\nBean actualInstance = CDI.resolveItSomehow();\n\
    actualInstance.setSomeProperty(someProperty);\n}\n}\n```"
