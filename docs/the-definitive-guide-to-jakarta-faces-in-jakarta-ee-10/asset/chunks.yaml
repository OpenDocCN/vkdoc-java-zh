- fmt: "# Search Keyword Resolver\n\nWe already saw an example of the `SearchKeywordResolver`\
    \ in the section “Custom Search Keywords” in Chapter [12](#454457_2_En_12_Chapter.xhtml).\
    \ Characteristic for that one being a plug-in was the method `isResolverForKeyWord()`,\
    \ by which the plug-in could indicate for which keyword, or keyword pattern, it\
    \ would operate.\n\nWe’ll take a look at one other example here, namely, the EL\
    \ resolver. The EL resolver itself is not a Jakarta Faces–specific type but originates\
    \ from the Expression Language (EL) spec. This spec does, however, have important\
    \ parts of its origins in Jakarta Faces.\n\nThe EL resolver allows us to interpret\
    \ the so-called base and property of an expression in a custom way. Considering\
    \ the expression `#{foo.bar.kaz}`, then “`foo`” is the base and “`bar`” is the\
    \ property when resolving “`bar`”, while “`bar`” is the base and “`kaz`” is the\
    \ property when resolving “`kaz`”. Perhaps somewhat surprising at first is that\
    \ when “`foo`” is being resolved, the base is `null` and “`foo`” is the property.\n\
    \nIn practice, adding a custom EL resolver is not often needed, and we can often\
    \ get by with simply defining a named CDI bean that does what we require. Custom\
    \ EL resolvers could come into play when Jakarta Faces is integrated in a completely\
    \ different environment though, one where we’d like expressions to resolve to\
    \ a completely different (managed) bean system. Even so, a CDI-to-other-beans-bridge\
    \ might be a better option even there, but it’s perhaps good to know a custom\
    \ EL resolver is one other tool we have in our arsenal.\n\nAnyway, to demonstrate\
    \ what an EL resolver can do, we’ll show an example where the base of an EL expression\
    \ is interpreted as a pattern, something we can’t do directly with a named CDI\
    \ bean.\n\nThe following shows an example EL resolver:\n\n```java\npublic class\
    \ CustomELResolver extends ELResolver {\n    protected boolean isResolverFor(Object\
    \ base, Object property) {\n        return base == null\n            && property\
    \ instanceof String\n            && ((String) property).startsWith(\"dev\");\n\
    \    }\n\n    @Override\n    public Object getValue\n        (ELContext context,\
    \ Object base, Object property)\n    {\n        if (isResolverFor(base, property))\
    \ {\n            context.setPropertyResolved(true);\n            return property.toString().substring(3);\n\
    \        }\n        return null;\n    }\n\n    @Override\n    public Class getType\n\
    \        (ELContext context, Object base, Object property)\n    {\n        if\
    \ (isResolverFor(base, property)) {\n            context.setPropertyResolved(true);\n\
    \            return String.class;\n        }\n        return null;\n    }\n\n\
    \    @Override\n    public Class getCommonPropertyType\n        (ELContext context,\
    \ Object base)\n    {\n        return base == null ? getType(context, base, null)\
    \ : null;\n    }\n\n    @Override\n    public boolean isReadOnly\n        (ELContext\
    \ context, Object base, Object property)\n    {\n        return true;\n    }\n\
    \n    @Override\n    public void setValue\n        (ELContext context, Object\
    \ base, Object property, Object value)\n    {\n        // NOOP\n    }\n\n    @Override\n\
    \    public Iterator getFeatureDescriptors\n        (ELContext context, Object\
    \ base)\n    {\n        return null;\n    }\n}\n```\n\nIf we now use the following\
    \ Facelet:\n\n```xml\nTest: #{devThisIsDev}\n```\n\nwe’ll see “Test: ThisIsDev”\
    \ being printed when requesting it. What’s happening here is that the custom EL\
    \ resolver handles every name that starts with “dev.”\n\n# Dynamic Extensions\n\
    \nThe previous examples were mostly about registering the extensions that we needed\
    \ statically, for example, by registering a factory or the type directly in `faces-config.xml`.\n\
    \nFactories give us an opportunity for some dynamic behavior. That is, at the\
    \ point the factory is called, we can decide what new type (if any) to return.\n\
    \nFor even more dynamic behavior, it’s frequently required to be able to dynamically\
    \ add the factories, or in CDI to dynamically add the producers. CDI has an elaborate\
    \ SPI (service provider interface) for this (simply called “CDI Extensions”),\
    \ which is, however, somewhat outside the scope of this book.\n\nFor classic factories\
    \ and actually everything that’s in `faces-config.xml`, there’s a somewhat low-level\
    \ method to add these dynamically: the Application Configuration Populator, which\
    \ we’ll discuss next.\n\n# Application Configuration Populator\n\nThe Application\
    \ Configuration Populator is a mechanism to programmatically provide an additional\
    \ `faces-config.xml` file, albeit by using the XML DOM (Document Object Model)\
    \ API (application programming interface). This DOM API can be slightly obscure\
    \ to use, and the power of the Application Configuration Populator is limited\
    \ by its ability to only configure. There’s no SPI in Jakarta Faces to directly\
    \ modify other `faces-config.xml` at this level.\n\nThe mechanism works by implementing\
    \ the abstract class `jakarta.faces.application.ApplicationConfigurationPopulator`\
    \ and putting the fully qualified class name of this in a `META-INF/services/jakarta.faces.application.ApplicationConfigurationPopulator`\
    \ file of a JAR library.\n\nTo demonstrate this, we’ll create another version\
    \ of the `ExternalContextProducer` that we demonstrated earlier, this time using\
    \ the mentioned `ApplicationConfigurationPopulator`. For this, we take the same\
    \ code, remove the `faces-config.xml` file, and add the `META-INF/services` entry\
    \ as well as the following Java class:\n\n```java\npublic class ConfigurationProvider\n\
    \    extends ApplicationConfigurationPopulator\n{\n    @Override\n    public void\
    \ populateApplicationConfiguration(Document document) {\n        String ns = document.getDocumentElement().getNamespaceURI();\n\
    \        Element factory = document.createElementNS(ns, \"factory\");\n      \
    \  Element externalContextFactory =\n            document.createElementNS(ns,\
    \ \"external-context-factory\");\n        externalContextFactory.appendChild(\n\
    \            document.createTextNode(\n                ExternalContextProducer.class.getName()));\n\
    \        factory.appendChild(externalContextFactory);\n        document.getDocumentElement().appendChild(factory);\n\
    \    }\n}\n```\n\nA caveat is that since this uses the `java.util.ServiceLoader`\
    \ under the hood, it really only works when `ConfigurationProvider` and `ExternalContextProducer`\
    \ are packaged together in an actual JAR library placed in the `/WEB-INF/lib`\
    \ of the WAR, instead of just being put directly in the WAR.\n\n# The Application\
    \ Main Class\n\nEarlier we discussed the Application Configuration Populator,\
    \ which, as we saw, is actually a `faces-config.xml` provider of sorts. This means\
    \ it works with fully qualified class names and elements that are still text in\
    \ nature.\n\nJakarta Faces features a variety of somewhat more traditional programmatic\
    \ APIs as well, with perhaps the most well-known of them being the `jakarta.faces.application.Application`\
    \ main class, which is among others a holder for the same singletons that we mentioned\
    \ previously in the section “Extending Classical Artifacts.”\n\nFor completeness,\
    \ we’ll repeat this list here.\n\n*   `jakarta.faces.application.NavigationHandler`\n\
    *   `jakarta.faces.application.ViewHandler`\n*   `jakarta.faces.application.ResourceHandler`\n\
    *   `jakarta.faces.component.search.SearchExpressionHandler`\n*   `jakarta.faces.flow.FlowHandler`\n\
    *   `jakarta.faces.application.StateManager`\n*   `jakarta.faces.event.ActionListener`\n\
    \nAll of these have corresponding setters on the `Application` class. For instance,\
    \ the following shows the Javadoc and method declaration for `ActionListener`:\n\
    \n```java\n/**\n * \n * Set the default {@link ActionListener} to be registered\
    \ for all\n * {@link jakarta.faces.component.ActionSource} components.\n * \n\
    \ *\n * @param listener The new default {@link ActionListener}\n *\n * @throws\
    \ NullPointerException\n *             if listener is null\n */\npublic abstract\
    \ void setActionListener(ActionListener listener);\n```\n\nLikewise, the `Application`\
    \ class also has “`add`” methods for the plug-in types we mentioned in the section\
    \ “Plug-ins.”\n\n*   `jakarta.el.ELResolver`\n*   `jakarta.faces.el.PropertyResolver`\
    \ (deprecated)\n*   `jakarta.faces.el.VariableResolver` (deprecated)\n*   `jakarta.faces.component.search.SearchKeywordResolver`"
