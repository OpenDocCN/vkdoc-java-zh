    可以看到，Jakarta Bean Validation 期望在执行实际验证时，模型值已经存在于给定的 Bean 实例中。从 Jakarta Faces 的角度来看，这意味着模型值必须在处理验证之前更新。然而，这与
    Jakarta Faces 的生命周期不符，因为在 Jakarta Faces 生命周期中，模型值只有在验证成功处理后才会更新。本质上，Jakarta Faces
    需要克隆 Bean 实例，用所需的模型值填充它，在克隆的 Bean 实例上调用 Jakarta Bean Validation，收集所有验证错误，然后丢弃克隆的
    Bean 实例。


