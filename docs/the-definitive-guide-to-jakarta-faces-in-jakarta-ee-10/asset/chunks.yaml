- fmt: "# The overloaded `ProductService#delete(Iterable)` Method\n\nThe overloaded\
    \ `ProductService#delete(Iterable)` method looks as follows:\n\n```java\n@TransactionAttribute(REQUIRED)\n\
    public void delete(Iterable products) {\n    products.forEach(this::delete);\n\
    }\n```\n\n# Dynamic Columns in `<h:dataTable>`\n\nIn a `<h:dataTable>`, with the\
    \ help of Jakarta Tags `<c:forEach>`, it is also possible to dynamically create\
    \ multiple `<h:column>` instances based on a Java model that is at least view\
    \ scoped. A request-scoped model can also, but this doesn’t guarantee that it\
    \ is during a postback request exactly the same as it was during the preceding\
    \ request, and therefore there is a risk of the dynamic `<h:column>` composition\
    \ being off.\n\nThe value of the `<c:forEach>` should reference a collection of\
    \ entity property names or map keys. You can then use the brace notation in EL\
    \ as in `#{entity[propertyName]}` or `#{map[key]}` to reference the actual value.\
    \ This works for both `UIOutput` and `UIInput` components.\n\nThe following example\
    \ illustrates how you could achieve this for a `List<Product>`.\n\n## Backing\
    \ bean\n\n```java\n@Named @RequestScoped\npublic class Products {\n    private\
    \ List list;\n    private List properties;\n    @Inject\n    private ProductService\
    \ productService;\n\n    @PostConstruct\n    public void init() {\n        list\
    \ = productService.list();\n        properties = Arrays.asList(\"id\", \"name\"\
    , \"description\");\n    }\n    // Add/generate getters (setters not needed here).\n\
    }\n```\n\n## Facelets file\n\n```xml\n<ui:repeat value=\"#{products.list}\" var=\"\
    product\">\n    <h:dataTable value=\"#{product}\" var=\"property\">\n        <h:column>\n\
    \            <f:facet name=\"header\">#{property}</f:facet>\n            #{product[property]}\n\
    \        </h:column>\n    </h:dataTable>\n</ui:repeat>\n```\n\nYou could even\
    \ generalize this further for other entities of a common superclass, such as `BaseEntity`,\
    \ whereby you obtain the relevant property names from the entity service.\n\n\
    # Resource Components\n\nJakarta Faces offers three resource components, the `<h:graphicImage>`,\
    \ `<h:outputScript>`, and `<h:outputStylesheet>`, for image resources, JavaScript\
    \ resources, and CSS resources, respectively. They can reference physical resource\
    \ files as well as dynamic resource files. The physical resource files themselves\
    \ must be placed in the `/resources` subfolder of the main web folder. The dynamic\
    \ resource files can be handled with a custom `ResourceHandler` that intercepts\
    \ on a specific library name and/or resource name.\n\nGiven the following folder\
    \ structure in a Maven WAR project in Eclipse:\n\n![](images/454457_2_En_6_Chapter/454457_2_En_6_Fige_HTML.jpg)\n\
    \nthe resources are referenceable as follows:\n\nThe generated HTML output looks\
    \ as follows, provided that `/project` is the context path of the web application:\n\
    \nYou’ll see that it’s prefixed with `/jakarta.faces.resource` path and suffixed\
    \ with the currently active URL pattern of the `FacesServlet`. The `/jakarta.faces.resource`\
    \ is represented by the constant `ResourceHandler#RESOURCE_IDENTIFIER`.^([(55)](#fn55))\
    \ That the resource URL matches the URL pattern of the `FacesServlet` ensures\
    \ that it will actually invoke the `FacesServlet` which in turn knows how to handle\
    \ the resource. It will first invoke `ResourceHandler#isResourceRequest()`, which\
    \ by default determines if the URL prefix starts with the known `RESOURCE_IDENTIFIER`\
    \ constant and if so then immediately delegates to `ResourceHandler#handleResourceRequest()`\
    \ instead of going through the entire Jakarta Faces life cycle.\n\nAlso note that\
    \ these web resources are not placed in the `src/main/resources` folder but in\
    \ the `src/main/webapp/resources` folder. The `src/main/resources` folder is only\
    \ for non-class resources that must end up in the classpath, such as resource\
    \ bundle files and configuration properties files. These classpath resources are\
    \ obtainable by `ClassLoader#getResource()`.^([(56)](#fn56)) The `src/main/webapp/resources`\
    \ doesn’t end up in the classpath; instead, it ends up in the web content. These\
    \ web resources are obtainable by `ExternalContext#getResource()`,^([(57)](#fn57))\
    \ which delegates under the hood to `ServletContext#getResource()`.^([(58)](#fn58))\n\
    \nThe `name` attribute thus basically represents the path to the resource relative\
    \ to the `src/main/webapp/resources` folder. These components also support a `library`\
    \ attribute. The `library` attribute must represent the unique resource library\
    \ name of a Jakarta Faces library. For standard Jakarta Faces, the resource library\
    \ name is “`jakarta.faces`”; for PrimeFaces,^([(59)](#fn59)) the resource library\
    \ name is “`primefaces`”; for OmniFaces,^([(60)](#fn60)) the resource library\
    \ name is “`omnifaces`”; for BootsFaces,^([(61)](#fn61)) the resource library\
    \ name is “`bsf`”; and so on.\n\nNormally, these library-specific resources are\
    \ already automatically included by the Jakarta Faces library in question, usually\
    \ declaratively via the `@ResourceDependency` annotation on the `UIComponent`\
    \ or `Renderer` class and sometimes programmatically via `UIViewRoot#addComponentResource()`.\
    \ This is elaborated in the section “Resource Dependencies” in Chapter [11](#454457_2_En_11_Chapter.xhtml).\
    \ Those resources can, if necessary, be referenced using a resource component\
    \ whereby you thus explicitly specify the `library` attribute.\n\nThe following\
    \ example explicitly includes the standard Jakarta Faces `faces.js` file:\n\n\
    ```xml\n<h:outputScript library=\"jakarta.faces\" name=\"faces.js\" />\n```\n\n\
    This is usually unnecessary as the Jakarta Faces components depending on this\
    \ script, such as `<h:commandLink>`, `<f:ajax>`, and `<f:websocket>`, already\
    \ automatically include it.\n\nHere’s another example that explicitly includes\
    \ the `jquery.js` file from the PrimeFaces library—this works of course only if\
    \ you actually have PrimeFaces installed.\n\n```xml\n<h:outputScript library=\"\
    primefaces\" name=\"jquery.js\" />\n```\n\nThis approach can be useful when you’d\
    \ like to reuse the PrimeFaces-provided jQuery library on a page that doesn’t\
    \ necessarily contain any PrimeFaces component, for example, when you have some\
    \ web project–specific scripts that in turn depend on jQuery. By default, all\
    \ PrimeFaces components automatically include this jQuery library, but that thus\
    \ won’t happen if the page doesn’t contain any PrimeFaces component. The Jakarta\
    \ Faces resource management will already make sure that both automatically included\
    \ and explicitly included JavaScript and CSS resources don’t get duplicated in\
    \ the generated HTML output. In other words, the preceding line that explicitly\
    \ includes jQuery can safely be used on a page that does actually contain a PrimeFaces\
    \ component."
