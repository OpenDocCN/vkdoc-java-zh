    ```


    请注意，您在这里也需要一个 `ProductConverter` 或 `BaseEntityConverter`。这些在第 5 章的“自定义转换器”部分有详细说明。


    复选框选择稍微复杂一些。您直观上会使用 `<h:selectManyCheckbox>`，但它不像 `<h:selectOneRadio>` 那样支持 `group`
    属性。您需要退而使用 `<h:selectBooleanCheckbox>` 配合一个 `Map<Product, Boolean>`，其中映射键代表当前迭代的产品，映射值代表复选框的值。


