- fmt: '# Managed Bean Scope and Authentication


    The managed bean’s scope needs to be changed to `@ViewScoped`, so we can retain
    the value of the `isNew` instance variable after the login form’s postback.


    An important addition is to the `SecurityContext#authenticate()` method where
    we’ll now provide an extra parameter: `newAuthentication`. The authentication
    mechanism does not strictly need this though, and it’s just smart enough to distinguish
    between an initial new authentication and continuing an authentication dialog
    that’s in progress. However, things get more difficult when a caller is in the
    midst of an authentication dialog and then navigates away, only to explicitly
    click a login button later. If the state associated with said dialog hasn’t expired
    at that point, the authentication mechanism doesn’t know a new authentication
    is required and will likely continue the aborted but still valid dialog.


    To prevent this, we can force a new authentication by setting `newAuthentication`
    to `true`. This will discard all existing states. The modified `continueAuthentication()`
    method looks as follows:


    ```

    private AuthenticationStatus continueAuthentication() {

    return securityContext.authenticate(

    (HttpServletRequest) externalContext.getRequest(),

    (HttpServletResponse) externalContext.getResponse(),

    AuthenticationParameters.withParams()

    .newAuthentication(isNew).credential(

    new UsernamePasswordCredential(email, password))

    );

    }

    ```


    Note that this version can be used for the case where we continue the dialog as
    well as to start a new one. When we continue the dialog, `isNew` will simply be
    `false`, which also happens to be the default when the parameter is not specified
    at all.


    When using the `CustomFormAuthenticationMechanism`, we know there will not be
    any redirects or other writes to the response after we provide the credentials
    in caller-initiated authentication, so that gives us a convenient location to
    handle the redirect to a landing page after the caller authenticates: the `SUCCESS`
    case.


    ```

    case SUCCESS:

    flash.setKeepMessages(true);

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_INFO, "Login succeed", null));

    externalContext.redirect(

    externalContext.getRequestContextPath() + "/index.xhtml");

    break;

    ```


    We’re redirecting the caller here to the `index.xhtml` landing page. Note that
    this is also the view where the caller initiated the authentication dialog, but
    that’s just a coincidence in this example. In general, the view or even URL where
    we redirect the caller to is completely free for the application developer to
    choose. Typically, a landing page of some sort is chosen, which could be the index
    of the application or a dashboard corresponding to the main role the caller is
    in. As we mentioned before, when `SUCCESS` is returned, the caller is fully authenticated.
    This means we can query the caller’s roles and use these in our decision where
    to redirect to.


    **Outlook:** A future version of Jakarta EE Security may introduce a hybrid option
    where caller-initiated authentication can still start with the same redirect as
    container-initiated authentication and allows for the redirect-back URL to be
    provided by the application.


    ## Remember Me


    Once a caller has been authenticated for a Jakarta Faces (web) application, we
    naturally don’t want to ask the caller to reauthenticate with every request. To
    prevent this, the result of a successful authentication is typically coupled in
    some way to the caller’s HTTP session. In fact, the `CustomFormAuthenticationMechanism`
    internally uses the Jakarta EE Security’s provided “auto-apply-session” service
    to do just this. This service stores the data associated with said successful
    authentication (at least the caller name plus any groups the caller is in). Although
    implementation ultimately depends on where this data exactly lives and with what
    lifetime, in practice, it’s typically in a special section of the server’s memory
    associated with the HTTP session. This section is special in the way that it’s
    typically session scoped, but the data is not accessible via `HttpSession#getAttribute()`.


    In order to not exhaust the server’s memory, an HTTP session expires after a certain
    amount of time. Typical expiration times are between 10 minutes and an hour. If
    the caller accesses the application after this time, authentication is required
    to be performed again. Often though, even reauthenticating after a period of inactivity
    as long as an hour is undesirable. But extending the HTTP session to a longer
    period is undoable for the aforementioned reasons of server resource exhaustion.


    Here’s where “Remember Me” (`remember-me`) comes in. Remember-me is a somewhat
    playful term for a process where the caller’s credentials are exchanged for a
    token and where this token is typically stored in a cookie that’s distinct from
    the HTTP session cookie and has a longer time to live.


    A remember-me token effectively functions as a new credential for the caller,
    without exposing the caller’s original password. A remember-me token can basically
    be vended multiple times, for instance, once per device or IP (Internet protocol)
    that the caller uses to connect to the application. Care must be taken that while
    the token does not expose the caller’s original credentials, it still functions
    as the key to a caller’s account and therefore should be treated with the same
    precautions as one would apply to any other type of credential. Specifically,
    cookies containing the remember-me token should be sent over HTTPS/SSL only, and
    applications should not store the actual token verbatim but a strong hash of it.


    As the primary reason for having remember-me is to not exhaust server memory and
    to be long-lived, the remember-me token is almost always stored in stable storage
    (e.g., a database). As such, a lookup from such storage is costlier than a lookup
    from the server’s memory, and this could seriously affect performance when required
    to be done for every request, especially when many Ajax requests are being done
    all the time.


    For this reason, remember-me is almost always used in combination with some kind
    of cache. The modular nature of the services that the `CustomFormAuthenticationMechanism`
    uses makes it possible for remember-me to be inserted between the auto-apply-session
    service mentioned before and the actual authentication mechanism. That way, we
    effectively get a kind of memory hierarchy; the authentication data is first attempted
    to be found in the HTTP session storage; if it’s not there, the remember-me service
    is attempted; and if that one doesn’t contain the data, then finally the authentication
    mechanism is tried.


    To make use of remember-me, two things have to be done:


    1. Activating the remember-me service for the installed authentication mechanism

    2. Providing a special identity store that’s capable of vending and validating
    the remember-me token'
