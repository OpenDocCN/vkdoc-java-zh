    EL 表达式，并且可以通过受管 Bean 以编程方式更改。这为你提供了让用户通过网页更改区域设置的机会，而无需在浏览器的语言设置中手动调整。你可以在 Jakarta
    Faces 页面中向用户展示可用的语言选项，并让每次选择都更改活动区域设置。这可以通过以下 Jakarta Faces 页面实现：


