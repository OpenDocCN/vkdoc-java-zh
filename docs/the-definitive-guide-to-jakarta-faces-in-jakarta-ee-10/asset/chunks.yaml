    必须承认，像这样拥有一个可编辑的表格效率并不高，尤其是在表格包含大量列和行的情况下。Jakarta Faces 可以很好地处理它；但普通的网络浏览器在处理时可能会遇到困难，特别是当行数超过几千行时。我还没提到最终用户可能因为要一直滚动浏览整个页面而抓狂，并且基本上无法获得清晰的概览。对此有几种解决方案：首先是分页；其次是过滤；第三是基于行的内联编辑和更新；第四是在对话框或详情页中进行外部编辑。

    所有上述提到的表格特定性能和可用性解决方案，标准 `<h:dataTable>` 均未提供，因此需要大量的自定义代码。强烈建议您寻找一个支持这些功能的现有
    Jakarta Faces 组件库，以便让您的 Jakarta Faces 开发更轻松，无需重新发明轮子。目前，最广泛使用的是 PrimeFaces 及其
    `<p:dataTable>`。^(⁵²) 这甚至可以通过 OptimusFaces 的 `<op:dataTable>` 进一步简化，^(⁵³) 而后者又是基于
    `<p:dataTable>` 构建的。

    在详情页中编辑选中的项目是标准 Jakarta Faces 可以做到的，这在第 5 章的“自定义转换器”部分有演示。


    需要说明的是，在模型值为 `List<String>` 的特定情况下，在列中使用输入组件并不像 `List<Product>` 示例中演示的那样容易实现。换句话说，下面的示例根本行不通：


    技术问题在于 `java.lang.String` 是不可变的，并且没有为其内部值提供公共 setter 方法。确实，它实际上也没有 getter 方法，但
    EL 已经默认使用 `Object#toString()`，对于 `String` 来说，它只是返回字符串本身。这可以通过使用索引显式引用模型值的特定项来解决，如下所示：


    注意 `binding` 属性。

    基本上，在视图构建期间，这会将当前的 `UIComponent` 实例设置为一个由给定名称标识的 EL 变量。在这个特定的代码片段中，它将使 `#{table}`
    变量引用 `<h:dataTable>` 标签背后的具体 `HtmlDataTable` 实例。`#{table}` 变量在视图构建期间只能在视图中的标签位置之后被引用，而在视图渲染期间则可以在视图中的任何位置被引用。通过这种方式，您可以像访问
    bean 一样访问 `UIComponent` 属性。因此，`#{table.rowIndex}` 基本上引用了 `UIData#getRowIndex()`
    方法，^(⁵⁴) 该方法返回当前的迭代索引。最后，这被用来引用列表中的目标项。在更新模型值阶段（第四阶段），Jakarta Faces 将简单地替换指定索引处的项。


    同样对于 `binding` 属性，非常重要的一点是变量名不应与现有的受管 bean 名称或隐式 EL 对象冲突，当然也不应与同一视图中的其他组件冲突。您也可以让
    `binding` 属性引用一个支持 bean 的属性，如下所示：


    ```


    以及


    ```

    private UIData table; // +getter +setter

    ```


    但如果它在支持 bean 的其他地方没有被使用，这就相当无用了。

    此外，当受管 bean 的作用域宽于请求时（另请参阅第 3 章的“视图构建时间”部分），这很危险。最好不要将组件实例绑定到支持 bean；这可能表明一种不良实践。唯一合理的实际用例是将复合组件子项绑定到支持组件（另请参阅第
    7 章的“复合组件”部分）。


    如果您在类似 `List<String>` 的东西上使用 `<ui:repeat>` 或 `<c:forEach>` 而不是 `<h:dataTable>`，那么您可以通过
    `varStatus` 属性以更简单的方式获取迭代索引。


