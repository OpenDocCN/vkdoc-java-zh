    `<f:event>` 类型，该类型在调用应用程序阶段（第五阶段）之后运行，然后在主模板中声明它。第 3 章的“自定义组件系统事件”一节中给出了一个示例。

    `<f:viewParam>` 标签由 `UIViewParameter` 组件支持，而该组件又继承自 `UIInput` 超类。这意味着它的行为几乎与 `<h:inputText>`
    完全相同，但它是针对 GET 参数的。细微的差别体现在处理验证阶段（第三阶段）。默认情况下，空参数会跳过任何自定义验证器和 Jakarta Bean Validation。例如，`@NotNull`
    Jakarta Bean Validation 注解仅在 `web.xml` 中明确将上下文参数 `jakarta.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL`
    设置为 `true` 时才有效。另一个区别在于渲染响应阶段（第六阶段）。基本上，它什么都不会渲染。

    `<f:viewAction>` 标签由 `UIViewAction` 组件支持，而该组件又实现了 `ActionSource` 接口。这意味着它的行为几乎与
    `<h:commandButton>` 完全相同，但它是针对 GET 请求的。当然，你也可以在 `@ViewScoped` 托管 Bean 上使用带有 `@PostConstruct`
    注解的方法来执行 GET 请求的逻辑，但问题在于，它会在托管 Bean 实例创建后立即运行，而此时任何 `<f:viewParam>` 都还没有机会运行。`<f:viewAction>`
    将在调用应用程序阶段（第五阶段）被调用，此时模型值已经更新。它甚至支持返回一个代表导航结果的 `String`，该结果将表现为重定向。以下是一个搜索表单的示例：


    Facelets 文件 `/search.xhtml`：


    ```


    查询


    #{result.name}

    #{result.description}


    ```


    支持 Bean 类 `com.example.project.view.Search`：


    ```

    @Named @RequestScoped

    public class Search {

    private String query;

    private List results;

    @Inject

    private SearchService searchService;

    public void onload() {

    results = searchService.listResults(query);

    }

    // 在此处添加/生成 getter 和 setter 方法。

    // 注意，results 不需要 setter 方法。

    }

    ```


    在 Facelets 文件中，除了普通的 HTML 表单方法之外，还有几点需要注意。文本输入的 `value` 属性在 `#{search.query}`
    为空时显示 `#{param.query}`，因为当 `<f:viewParam>` 上出现转换或验证错误时，提交的值将完全不会显示。`#{param}`
    实际上是一个隐式 EL 对象，引用请求参数映射。`#{param.query}` 基本上会打印出名为“`query`”的请求参数的值。请注意，这种利用三元运算符
    `#{x ? y : z}` 的 `value` 属性构造对于 Jakarta Faces 输入组件是无效的。它会在更新模型值阶段（第四阶段）抛出 `jakarta.el.PropertyNotWritableException`
    异常。此外，`UIInput` 类在底层基本上已经执行了完全相同的逻辑。

    `<h:message>` 也可以附加到 `<f:viewParam>` 上。然而，在这种特定的构造中，它实际上并未被使用。只有当你向 `<f:viewParam>`
    添加转换器或验证器时，例如通过 `<f:viewParam ... required="true">`，你才会在 `<h:message>` 中看到错误消息，并且
    `<f:viewAction>` 将不会被调用。

    现在，当你打开页面并提交表单时，提交的值将作为查询字符串出现在 URL 中，例如 `/search.xhtml?query=submitted%20value`。这是可添加书签的，并且每次打开该
    URL 时都可以重新执行。


