    \ Hibernate）时，后者会返回 `false`。\n\n自定义验证器\n此外，验证器从一开始就可以在 Jakarta Faces 中进行自定义。由于几乎每个基本用例都已由标准\
    \ Jakarta Faces 验证器甚至 Jakarta Bean Validation 约束（例如长度、范围和模式验证）涵盖，因此留给自定义 Jakarta\
    \ Faces 验证器的最常见用例是通过根据数据库约束测试提交的值来验证数据完整性。通常，这些涉及唯一约束。\n\n一个很好的实际示例是在基于电子邮件的注册过程中或在用户帐户管理页面中更改电子邮件地址时进行验证，以确认指定的电子邮件地址尚未被使用。特别是，值更改事件无法通过\
