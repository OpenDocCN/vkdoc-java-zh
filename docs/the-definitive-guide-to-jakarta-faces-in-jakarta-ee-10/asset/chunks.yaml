  trans: '

    Web 应用程序的安全性是一个广泛的领域，涵盖了许多主题，例如保护对资源的访问、防范各种类型的注入攻击，以及防止用户被诱骗代表攻击者执行恶意操作。


    Jakarta Faces 通过多种方式支持这些主题，要么提供原生解决方案，要么与 Jakarta EE 平台的设施集成。对于资源访问（包括身份验证（调用者证明其身份）和授权（系统确定调用者有权访问哪些资源）），Jakarta
    Faces（JavaServer Faces）与 Jakarta EE 安全机制集成，而该机制又由 Servlet 规范和 Jakarta EE 安全规范等定义。


    Jakarta EE 安全（JSR 375）在 Jakarta EE 8 中同时被 Web 和完整配置文件支持。此外，参考实现 Soteria 可在 Jakarta
    EE 7 服务器上运行，并且由于它构建在 JASPIC（Jakarta EE 身份验证 SPI）（JSR 196）之上，因此它也可以在支持 JASPIC 的
    Servlet 容器（例如 8.5 版本以上的 Tomcat 和 7.0 版本以上的 Jetty）上运行。


    **Jakarta EE 安全概述与历史**


    在 Jakarta EE 中，安全性并非在单个规范中定义，而是实际上分布在多个规范中，这些规范以各种方式相互集成。虽然这允许安全性的不同方面以各自的速度演进，并且实际上甚至允许某些方面被非规范实现所取代，但这确实模糊了哪个规范负责什么的问题。


    在本介绍性部分中，我们将首先提供一些组件的概览以及它们如何组合在一起。我们将重点关注安全的 Web 方面。安全性也存在于 Jakarta 企业 Beans（Enterprise
    JavaBeans）和 JCA（Java 连接器架构）连接器等中，但这些超出了本书的范围。


    从历史上看，Jakarta EE 的安全性主要基于 Jakarta Servlet 规范引入的安全模型，即核心元素是“身份验证机制”（`FORM`、`BASIC`
    等）、`web.xml` 中的一组安全约束（其中特定模式（URL 模式）与一组角色（包括空集合）相结合），以及一些以编程方式测试调用者详细信息的方法，例如
    `HttpServletRequest.isUserInRole`。


    虽然有效，但在早期许多细节被遗漏了。Servlet 规范确实要求实现（Servlet 容器）在身份验证机制方面是可扩展的，但没有具体说明应该如何实现。同样，Servlet
    规范隐含地要求一个“身份存储”（文件、数据库、LDAP 等），用于保存调用者的详细信息，如凭据、名称和角色，但将所有关于如何配置这些的细节留给了 Servlet
    容器。


    Servlet 规范没有定义任何以编程方式访问 `web.xml` 中定义的安全约束的方法，也没有定义以编程方式影响其执行的方法（例如，使某些约束基于时间）。此外，Servlet
    规范的早期版本没有以最严格的方式指定约束解析，这允许各种 Servlet 容器在解释上存在一些细微差异。


    第一个解决这些问题的附加规范是 JACC（JSR 115），简单来说，它处理授权问题。JACC 规定了 `web.xml` 安全约束应如何在代码中表示，即作为一组
    *Permission* 实例。JACC 还规定了如何通过代码访问（查询）这些实例，并最终允许自定义授权模块替换或增强容器为确定其访问决策而执行的逻辑。关于
    JACC，可能有点难以理解的是，它本身并不是一个可以独立实现然后添加到 Servlet 容器中的东西（就像我们可以对 Jakarta Faces 所做的那样），而是标准化并更简洁地规定了所有
    Servlet 容器内部已经在做的事情。


    第二个解决上述问题的附加规范是 JASPIC（JSR 196），它处理身份验证问题。JASPIC 规定了 Servlet 容器应在何时调用身份验证机制，并为这些身份验证机制定义了一个明确的接口类型，因此自定义身份验证机制可以使用此接口而不是
    Servlet 容器的专有接口，从而具有可移植性。JASPIC 对身份存储有一些规定，但太少以至于在实践中无法真正使用。与 JACC 一样，JASPIC 也不是可以独立实现的东西，但它标准化了所有
    Servlet 容器已经在做的事情。


    JACC 和 JASPIC 都定义了低级别的 SPI（服务提供者接口），这些接口主要旨在由供应商实现和使用，以提供扩展产品。它们相当简陋且相当抽象。因此，它们不是面向应用程序开发人员的（丰富的）API（应用程序编程接口）。这就是
    Jakarta EE 安全 API（JSR 375）的用武之地。Jakarta EE 安全提供了 JASPIC 身份验证模块的更高级别、更易于注册（只需实现接口）且更易于使用（基于
    CDI）的版本。Jakarta EE 安全 API 还完整定义了身份存储构件，但也许最重要的是，它提供了所有这些构件的多个具体实现，其中包括一个针对 Jakarta
    Faces 使用而优化的基于 FORM 的身份验证机制，以及多个身份存储，例如 JDBC（Java 数据库连接）存储和 LDAP（轻量级目录访问协议）存储。


    Jakarta EE 安全 API 的 RI（参考实现）称为 Soteria。此实现当然由 Jakarta EE RI GlassFish 提供。Soteria
    与 Mojarra 和 MyFaces 一样，被设计为基本上可以在每个 Servlet 容器上独立运行，前提是该容器符合 JASPIC 规范（正如本章引言中提到的，Tomcat
    和 Jetty 都符合）。它的依赖项（在撰写本文时，针对 Soteria 2.0）是 CDI 3.0 和表达式语言 4.0。这两个依赖项由所有 Jakarta
    EE 实现提供。Servlet 容器通常提供 EL（表达式语言）支持，而 CDI 可以单独添加，例如使用 RI Weld。对于少数 *可选* 功能，Soteria
    利用了符合 JACC 规范的 Servlet 容器。

