- fmt: 'Now, that was a bit of code. Not only will you see that the getters and setters
    are collapsed for brevity, but you’ll also see that our composite extends `UIInput`
    and implements `NamingContainer`. Extending from `UIInput` gives us the benefit
    that we don’t need to repeat most of the default encoding and decoding behavior
    of `UIInput` in our backing component, so we only need to override a few methods.
    Implementing `NamingContainer` is a technical requirement of `<cc:interface>`.
    This enables you to use multiple instances of the composite component in the same
    context without facing “duplicate component ID” errors. This requirement is also
    reflected by the overridden `getFamily()` method.


    The actual `UIInput` components composing the composite component are declared
    as properties of the backing component. In this case, they are both `<h:selectOneMenu>`
    drop-downs that are, via the `binding` attribute, tied to those properties. This
    enables us to easily set their values during encoding (read: processing the HTTP
    response) and to obtain the submitted values during decoding (read: processing
    the HTTP request). You can find the logic for that in the overridden `encodeBegin()`
    and `getSubmittedValue()` methods, respectively.


    In the `encodeBegin()` method, you thus have the opportunity to prepare the displayed
    values based on the model value, if any. The `getValue()` method is inherited
    from the `UIInput` superclass and is tied to the `value` attribute of the composite
    component. You can break down the model value and set the desired values in the
    individual `UIInput` components of the composite component. The `pad()` helper
    method just pads the digit with a leading zero so that, for example, the “`1`”
    gets displayed as “`01`”. This helper method is also used during static initialization
    of the lists of available hours and minutes specifically for `<f:selectItems>`.


    In the `getSubmittedValue()` method, you should compose the submitted values of
    the individual `UIInput` components together to a single `String`. In the specific
    case of `<t:inputLocalTime>`, we compose a `String` following the ISO local time
    pattern `HH:mm`. In turn, the `UIInput` superclass passes this value through the
    `getConvertedValue()` wherein we thus have the opportunity to convert the composed
    `String` to the concrete model value, which is in our case the `LocalTime`. Ultimately,
    the `UIInput` superclass will make sure that this gets set in the backing bean
    during the update model values phase. Now you can use it as follows:


    where the backing bean represented by `#{bean}` looks as follows:


    ```

    @Named @RequestScoped

    public class Bean {

    private LocalTime time;

