- fmt: '# 排版后的内容


    This has obviously received a lot of criticism, and the general recommendation
    became that people should not be mixing Jakarta Faces with HTML. Another problem
    with Jakarta Faces 1.0/1.1 was that there was no component to represent an HTML
    `<div>`. That was around the time “Web 2.0” had just started, when people also
    started to discommend the use of HTML tables to lay out a web page. The prevailing
    view was that only divs should be used, which made people dislike Jakarta Faces
    1.0/1.1 even more.


    The peculiar Jakarta Pages behavior of causing a disorganized HTML output was
    internally worked around in Jakarta Faces 1.2, which was released only 2 years
    later in 2006, and the missing component to represent an HTML `<div>` was solved
    by giving the existing `<h:panelGroup>` component a new `layout="block"` attribute
    so that it renders a `<div>` instead of a `<span>`. So people can already, since
    Jakarta Faces 1.2, safely mix plain HTML with Jakarta Faces components in a Jakarta
    Pages page and continue using divs in both plain HTML and Jakarta Faces ways.
    However, the old recommendation to avoid plain HTML while authoring Jakarta Faces
    1.0/1.1 pages turned into a persistent myth that is even today still alive among
    some people.


    Another problem with Jakarta Pages is that existing Jakarta Pages–specific tags,
    such as Jakarta Tags (formerly known as Jakarta Tags), and existing Jakarta Pages–specific
    expression language in the form of `${...}` didn’t integrate at all into the Jakarta
    Faces life cycle and therefore mixing existing Jakarta Pages–specific taglibs
    and expressions with Jakarta Faces components in a Jakarta Pages page would result
    in confusing and unintuitive behavior. People couldn’t use the Jakarta Tags `<c:forEach>`
    to render a list of Jakarta Faces components as those components wouldn’t see
    the variable declared by `<c:forEach var>`. There was no dedicated Jakarta Faces
    component to loop over a list other than `<h:dataTable>`, and ultimately people
    are stuck with HTML tables while creating lists in the Jakarta Faces page.


    Finally, Jakarta Pages also offers very limited templating capabilities with actually
    only one “templating” tag, the `<jsp:include>`; therefore, templating with Jakarta
    Pages would require a fairly complicated approach of creating a bunch of custom
    tags for every definition of a reusable template section.^([^(63)](#fn63)) This
    contradicts the philosophy of Jakarta Faces, to have reusable components to minimize
    code duplication. With Jakarta Pages, you would end up duplicating Jakarta Faces
    components themselves. Existing templating frameworks such as Tiles and Thymeleaf
    are either Jakarta Pages centric or don’t support Jakarta Faces at all and thus
    cannot be used.


    There was clearly a strong need for a new Jakarta Faces–oriented view technology
    that should supplant Jakarta Pages and solve all of its problems with the Jakarta
    Faces life cycle. And then Facelets was introduced in 2006. It could be installed
    separately for Jakarta Faces 1.1 and 1.2, and it shipped built-in with Jakarta
    Faces 2.0. It became the default view technology for Jakarta Faces, and Jakarta
    Pages was immediately deprecated as view technology for Jakarta Faces. New tags
    introduced in Jakarta Faces 2.0, such as `<f:ajax>`, `<h:head>`, `<h:body>`, `<h:outputScript>`,
    and `<h:outputStylesheet>`, are only available for Facelets and not for Jakarta
    Pages. Jakarta Faces 2.0 also introduced a new interface to more easily plug a
    custom view declaration language (VDL) as alternative to Jakarta Pages and even
    Facelets, the `ViewDeclarationLanguage` API. This way, one could create, for example,
    a pure Java-based VDL for Jakarta Faces.^([^(64)](#fn64))


    ## XHTML


    The Facelets VDL specifies that the views are defined in XML-based files that
    are compiled using a SAX parser and kept around in memory. This memory cache is,
    since Jakarta Faces 2.1, configurable using a custom `FaceletCacheFactory`. When
    the Jakarta Faces project stage is set to `Development`, the SAX-compiled representations
    of Facelets files are by default not cached. This allows easier development against
    an already running server by just editing the Facelets files from inside an IDE
    (integrated development environment) that supports hot-publishing the local changes
    to the target runtime.


    The Facelets files themselves usually use the `.xhtml` extension, and therefore,
    starters often call them “XHTML” instead of “Facelets.” This is okay when talking
    in the context of Jakarta Faces, but the term “XHTML” has another side in the
    web development world. At its core, XHTML is a markup language for HTML pages
    that need to be compiled using an XML-based tool. In other words, developers basically
    create XML files with HTML markup mixed with web framework–specific XML tags,
    after which the web framework will parse them into an XML tree, generate some
    web framework–specific representation of the XML tree (which is in Jakarta Faces
    the `UIViewRoot`), and ultimately generate the desired HTML output based on the
    framework’s internal representation of the XML tree.


    But around the time of Facelets’ introduction in 2006, XHTML was being overhyped
    by another group of web developers who were basically disappointed by seeing the
    W3 validator to invalidate their HTML4 documents—generally because of the desire
    to explicitly close all tags for consistency, including those which should actually
    not be closed as per HTML4 specification, such as `<link>`, `<meta>`, `<br>`,
    and `<hr>`, and sometimes because of the desire to specify custom tag attributes
    in order to have some JavaScript plug-ins to interact more cleanly with the HTML
    document, which is also disallowed by the HTML4 specification. Even though basically
    every single web browser in the world leniently accepted that, including the jurassic
    IE6, those developers didn’t want to see their carefully crafted HTML4 documents
    being invalidated by the W3 validator and changed their HTML doctype declaration
    to use the XHTML DTD, an extension to HTML that requires every tag to be closed
    and allows custom attributes to be specified on existing tags. However, this is
    essentially abuse of XHTML as they didn’t at all actually use any XML tool to
    compile the document and generate the desired HTML output. It was merely to keep
    the W3 validator happy.


    Coincidentally, also around that time, HTML5 was just started in draft. Essentially,
    developers could just strip out any DTD from the HTML doctype declaration in order
    to get an HTML document that allows XML-based syntax wherein all tags are always
    closed and custom elements and attributes are allowed and, importantly, validated
    correctly in the W3 validator. In other words, `<!DOCTYPE html>` has been sufficient
    for those developers, even in IE6. Unfortunately, it took ages before HTML5 was
    officially finished, so developers kept abusing the XHTML doctype before they
    could switch back to the HTML doctype. When talking about Facelets to those group
    of developers, don’t call it “XHTML” but just “Facelets”; otherwise, it will cause
    confusion.


    ## Template Compositions


    Facelets provides tags for easily creating template compositions based on a single
    master template file. This should reduce code duplication for site-wide sections
    that are repeated across all web pages, such as header, navigation menu, and footer.
    The master template file should represent a full-blown web page layout with all
    site-wide sections, and it should use `<ui:insert>` tags to represent places where
    the page-specific sections can be inserted. The following is a basic example of
    such a master template file, `/WEB-INF/templates/layout.xhtml`:


    ```

    #{title}

    ```'
