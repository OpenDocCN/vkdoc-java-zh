    这显然招致了大量批评，普遍的建议是人们不应将 Jakarta Faces 与 HTML 混用。Jakarta Faces 1.0/1.1 的另一个问题是，没有组件可以表示
    HTML 的 `<div>` 元素。当时正值“Web 2.0”刚刚兴起，人们也开始反对使用 HTML 表格来布局网页。主流观点认为只应使用 div，这使得人们对
    Jakarta Faces 1.0/1.1 更加反感。

    Jakarta Pages 导致 HTML 输出混乱的奇特行为，在仅两年后（2006 年）发布的 Jakarta Faces 1.2 中通过内部变通方式得到了解决。而缺少表示
    HTML `<div>` 的组件这一问题，则通过为现有的 `<h:panelGroup>` 组件新增一个 `layout="block"` 属性来解决，使其渲染出
    `<div>` 而非 `<span>`。因此，从 Jakarta Faces 1.2 开始，人们就可以安全地在 Jakarta Pages 页面中混合使用纯
    HTML 和 Jakarta Faces 组件，并继续以纯 HTML 和 Jakarta Faces 两种方式使用 div。然而，在编写 Jakarta Faces
    1.0/1.1 页面时应避免使用纯 HTML 的旧建议，却演变成了一个至今仍在某些人中流传的顽固迷思。

    Jakarta Pages 的另一个问题是，现有的 Jakarta Pages 专用标签（例如 Jakarta Tags，原名 Jakarta Tags）以及
    `${...}` 形式的现有 Jakarta Pages 专用表达式语言，完全无法集成到 Jakarta Faces 的生命周期中。因此，在 Jakarta
    Pages 页面中将现有的 Jakarta Pages 专用标签库和表达式与 Jakarta Faces 组件混合使用，会导致令人困惑且不直观的行为。人们无法使用
    Jakarta Tags 的 `<c:forEach>` 来渲染一组 Jakarta Faces 组件，因为这些组件无法识别 `<c:forEach var>`
    声明的变量。除了 `<h:dataTable>` 之外，没有专门的 Jakarta Faces 组件来遍历列表，最终人们在 Jakarta Faces 页面中创建列表时只能局限于使用
    HTML 表格。

    最后，Jakarta Pages 提供的模板功能也非常有限，实际上只有一个“模板”标签，即 `<jsp:include>`；因此，使用 Jakarta Pages
    进行模板化需要采用相当复杂的方法，即为每个可重用模板部分的定义创建一堆自定义标签。^(⁶³) 这与 Jakarta Faces 追求可重用组件以最小化代码重复的理念相悖。使用
    Jakarta Pages，你最终会重复 Jakarta Faces 组件本身。现有的模板框架，如 Tiles 和 Thymeleaf，要么以 Jakarta
    Pages 为中心，要么根本不支持 Jakarta Faces，因此无法使用。

    显然，迫切需要一种面向 Jakarta Faces 的新视图技术来取代 Jakarta Pages，并解决其与 Jakarta Faces 生命周期相关的所有问题。于是，Facelets
    在 2006 年被引入。它可以为 Jakarta Faces 1.1 和 1.2 单独安装，并内置于 Jakarta Faces 2.0 中。它成为了 Jakarta
    Faces 的默认视图技术，而 Jakarta Pages 作为 Jakarta Faces 的视图技术立即被弃用。Jakarta Faces 2.0 中引入的新标签，例如
    `<f:ajax>`、`<h:head>`、`<h:body>`、`<h:outputScript>` 和 `<h:outputStylesheet>`，仅适用于
    Facelets，不适用于 Jakarta Pages。Jakarta Faces 2.0 还引入了一个新接口 `ViewDeclarationLanguage`
    API，以便更轻松地插入自定义视图声明语言 (VDL) 作为 Jakarta Pages 甚至 Facelets 的替代方案。通过这种方式，人们可以为 Jakarta
    Faces 创建纯基于 Java 的 VDL。^(⁶⁴)


    XHTML

    Facelets VDL 规定视图定义在基于 XML 的文件中，这些文件使用 SAX 解析器编译并保存在内存中。自 Jakarta Faces 2.1 起，此内存缓存可通过自定义的
    `FaceletCacheFactory` 进行配置。当 Jakarta Faces 项目阶段设置为 `Development` 时，Facelets 文件的
    SAX 编译表示默认不会被缓存。这使得在已运行的服务器上进行开发更加容易，只需在支持将本地更改热发布到目标运行时的 IDE（集成开发环境）中编辑 Facelets
    文件即可。

    Facelets 文件本身通常使用 `.xhtml` 扩展名，因此初学者常称其为“XHTML”而非“Facelets”。在 Jakarta Faces 的上下文中讨论时，这没问题，但“XHTML”一词在
    Web 开发领域还有另一层含义。其核心是，XHTML 是一种用于 HTML 页面的标记语言，这些页面需要使用基于 XML 的工具进行编译。换句话说，开发者基本上是创建包含
    HTML 标记和 Web 框架特定 XML 标签的 XML 文件，然后 Web 框架会将其解析为 XML 树，生成该 XML 树的某种 Web 框架特定表示（在
    Jakarta Faces 中是 `UIViewRoot`），并最终根据框架对 XML 树的内部表示生成所需的 HTML 输出。

    但在 2006 年 Facelets 被引入前后，XHTML 被另一群 Web 开发者过度炒作，他们基本上是因为看到 W3 验证器使其 HTML4 文档无效而感到失望——这通常是因为他们希望显式关闭所有标签以保持一致性，包括那些根据
    HTML4 规范实际上不应关闭的标签，例如 `<link>`、`<meta>`、`<br>` 和 `<hr>`；有时还因为他们希望指定自定义标签属性，以便某些
    JavaScript 插件能与 HTML 文档更清晰地交互，而这也是 HTML4 规范所不允许的。尽管世界上几乎所有 Web 浏览器（包括古老的 IE6）都宽容地接受了这一点，但这些开发者不希望看到他们精心制作的
    HTML4 文档被 W3 验证器判定为无效，于是他们将 HTML 文档类型声明更改为使用 XHTML DTD——这是 HTML 的一个扩展，要求每个标签都必须闭合，并允许在现有标签上指定自定义属性。然而，这本质上是对
    XHTML 的滥用，因为他们实际上根本没有使用任何 XML 工具来编译文档并生成所需的 HTML 输出。这仅仅是为了让 W3 验证器满意。

    巧合的是，也大约在同一时间，HTML5 刚刚开始起草。本质上，开发者只需从 HTML 文档类型声明中移除任何 DTD，就能得到一个允许基于 XML 语法的
    HTML 文档，其中所有标签始终闭合，并允许自定义元素和属性，更重要的是，能在 W3 验证器中正确验证。换句话说，`<!DOCTYPE html>` 对这些开发者来说已经足够了，即使在
    IE6 中也是如此。不幸的是，HTML5 正式完成花费了很长时间，因此在开发者能够切换回 HTML 文档类型之前，他们一直在滥用 XHTML 文档类型。当与这些开发者讨论
    Facelets 时，不要称其为“XHTML”，而应直接称为“Facelets”；否则会引起混淆。


    模板组合


    Facelets 提供了标签，用于基于单个主模板文件轻松创建模板组合。这应该能减少所有网页中重复出现的站点级部分（如页眉、导航菜单和页脚）的代码重复。主模板文件应代表一个包含所有站点级部分的完整网页布局，并应使用
    `<ui:insert>` 标签来表示可以插入页面特定部分的位置。以下是这样一个主模板文件 `/WEB-INF/templates/layout.xhtml`
    的基本示例：


    ```


    #{title}


    ```

