    对 MyFaces 更感兴趣，因为它已经是开源的。在他为这个项目提供了几个补丁后，他被邀请成为提交者。Çivici 在居住在英国期间曾为 Spring Source
    工作，从事 Web Flow 和 Jakarta Faces 的集成工作。最终，Spring Source 没有继续推进这项工作，之后 Çivici 为位于英国雷丁的
    Visa 工作。PrimeFaces 的许多代码都是 Çivici 在从伦敦到雷丁的通勤路上编写的。


    PrimeFaces 最初基于 Jakarta Faces 1.x，但随着 Jakarta Faces 2.x 的临近以及项目尚处于早期阶段，它很快转向了
    Jakarta Faces 2.x。


    2009 年 7 月 1 日，期待已久的 Jakarta Faces 2.0 终于到来。Jakarta Faces 2.0 确实修复了业界对 Jakarta
    Faces 几乎所有的抱怨；最终，Facelets 被作为默认的视图模板语言包含在内。Jakarta Pages 实际上已被弃用。Hookom 和 Winer
