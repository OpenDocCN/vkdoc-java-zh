    \ best put such `<h:outputStylesheet>` in the `<h:body>` instead of in the `<h:head>`\
    \ so that you can guarantee that it’s loaded *after* the library’s CSS resources.\n\
    \nBeware though, some Jakarta Faces libraries will automatically override the\
    \ default renderer of `<h:head>` that may mess up the default resource ordering.\
    \ In such a case, you’d best consult the documentation of the Jakarta Faces library\
    \ in question for new ordering rules, or to restore the default renderer of `<h:head>`\
    \ via the web project’s `faces-config.xml`.\n\n```xml\n<render-kit>\n    <renderer>\n\
    \        <component-family>jakarta.faces.Output</component-family>\n        <renderer-type>jakarta.faces.Head</renderer-type>\n\
    \        <renderer-class>com.sun.faces.renderkit.html_basic.HeadRenderer</renderer-class>\n\
    \    </renderer>\n</render-kit>\n```\n\nIn case you’re using MyFaces instead of\
    \ Mojarra as Jakarta Faces implementation, then use `org.apache.myfaces.renderkit.html.HtmlHeadRenderer`\
    \ instead as the renderer class.\n\nIn case you intend to develop such a Jakarta\
    \ Faces library that automatically includes specific resources, then keep in mind\
    \ to use `@ResourceDependency` or `UIViewRoot#addComponentResource()` instead\
    \ of replacing the default renderer of `<h:head>` for the purpose. As annotations\
    \ don’t allow specifying dynamic values, any dynamic resources can best be added\
    \ during the `PostAddToView` event of `<h:head>`. This can be achieved application-wide\
    \ with a `SystemEventListener` as follows assuming that your library’s resource\
    \ library name is “`foo`”:\n\n```java\npublic class DynamicResourceListener implements\
    \ SystemEventListener {\n    private static final String LIBRARY = \"foo\";\n\n\
    \    @Override\n    public boolean isListenerForSource(Object source) {\n    \
    \    UIOutput output = (UIOutput) source;\n        return \"jakarta.faces.Head\"\
    .equals(output.getRendererType());\n    }\n\n    @Override\n    public void processEvent(SystemEvent\
    \ event) {\n        FacesContext context = event.getFacesContext();\n        String\
    \ scriptName = \"foo.js\"; // Can be dynamic.\n        addResource(context, scriptName);\n\
    \        String stylesheetName = \"foo.css\"; // Can be dynamic.\n        addResource(context,\
    \ stylesheetName);\n    }\n\n    private void addResource(FacesContext context,\
    \ String name) {\n        UIComponent resource = new UIOutput();\n        resource.getAttributes().put(\"\
    library\", LIBRARY);\n        resource.getAttributes().put(\"name\", name);\n\
    \        resource.setRendererType(context.getApplication()\n            .getResourceHandler().getRendererTypeForResourceName(name));\n\
    \        context.getViewRoot()\n            .addComponentResource(context, resource,\
    \ \"head\");\n    }\n}\n```\n\nwhich is registered in `faces-config.xml` as follows:\n\
    \n```xml\n<system-event-listener>\n    <system-event-listener-class>com.example.project.listener.DynamicResourceListener</system-event-listener-class>\n\
    \    <system-event-class>jakarta.faces.event.PostAddToViewEvent</system-event-class>\n\
    \    <source-class>jakarta.faces.component.UIOutput</source-class>\n</system-event-listener>\n\
    ```\n\nNote that `<source-class>` could better have been a `jakarta.faces.component.html.HtmlHead`,\
