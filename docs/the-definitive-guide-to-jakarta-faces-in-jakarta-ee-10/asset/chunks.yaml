- fmt: "Note that there are currently a relatively large number of poor-quality Jakarta\
    \ Faces tutorials on the Internet that don’t correctly use the `library` attribute.\
    \ Instead, those tutorials incorrectly demonstrate the `library` attribute to\
    \ represent the subfolder within the `src/main/webapp/resources` folder, something\
    \ like the following:\n\nThis is outright wrong. It doesn’t offer the custom resource\
    \ handler any possibility to distinguish library-specific resources from each\
    \ other. In the previous example, you’d basically need to check three different\
    \ resource libraries even though all those resources belong to the very same library—the\
    \ web project itself.\n\nTalking about custom resource handlers, imagine that\
    \ you want to compel the web browser to forcibly reload the image, JavaScript,\
    \ and/or CSS resource when it has changed in the server side. This can be achieved\
    \ by adding a query string parameter to the resource URL whose value represents\
    \ the version of the resource. This is also called “cache busting.” In Jakarta\
    \ Faces, this can be achieved with the following example of a custom `ResourceHandler`\
    \ that decorates the `Resource` to return its last modified timestamp as a query\
    \ string parameter.\n\n```java\npublic class VersionResourceHandler extends ResourceHandlerWrapper\
    \ {\n    public VersionResourceHandler(ResourceHandler wrapped) {\n        super(wrapped);\n\
    \    }\n\n    @Override\n    public Resource createResource(String name, String\
    \ library) {\n        Resource resource = super.createResource(name, library);\n\
    \        if (resource == null || library != null) {\n            return resource;\n\
    \        }\n        return new ResourceWrapper(resource) {\n            @Override\n\
    \            public String getRequestPath() {\n                String url = super.getRequestPath();\n\
    \                return url\n                    + (url.contains(\"?\") ? \"&\"\
    \ : \"?\")\n                    + \"v=\" + getLastModified();\n            }\n\
    \n            private long getLastModified() {\n                try {\n      \
    \              return getWrapped().getURL()\n                        .openConnection().getLastModified();\n\
    \                }\n                catch (IOException ignore) {\n           \
    \         return 0;\n                }\n            }\n        };\n    }\n}\n\
    ```\n\nIn order to activate it, register it in the `faces-config.xml` as follows:\n\
    \n```xml\n<resource-handler>\n    com.example.project.resourcehandler.VersionResourceHandler\n\
    </resource-handler>\n```\n\nNote that the `createResource()` method returns the\
    \ created resource unmodified when it’s `null`, or when the `library` is not `null`.\
    \ The resource itself is `null` when the `name` is unknown. The `library` is `null`\
    \ when it’s unspecified and thus specific to the web project. You could of course\
    \ also apply this logic to all resources of other libraries, but they usually\
    \ already have their own internal implementation of this kind of a resource handler.\n\
    \nComing back to the resource components, you can place the `<h:graphicImage>`\
    \ only inside the body, which can be both the plain HTML `<body>` or the Jakarta\
    \ Faces `<h:body>`. Obviously, in a plain HTML document, you can have an `<img>`\
    \ element only inside the document body. You can place the `<h:outputScript>`\
    \ and `<h:outputStylesheet>` basically anywhere in the Jakarta Faces page. The\
    \ `<h:outputScript>` will by default generate the HTML `<script>` element at exactly\
    \ the declared location, regardless of being in the head or the body of the document.\
    \ The `<h:outputStylesheet>`, however, will by default be moved to the end of\
    \ `<h:head>` when declared inside `<h:body>`. That is because in HTML, it’s illegal\
    \ to have a `<link rel=\"stylesheet\">` outside the `<head>`. The `<h:outputScript>`\
    \ can also be automatically moved to the end of the document head when declared\
    \ inside the `<h:body>` with the `target` attribute set to `head`. When the `target`\
    \ attribute of the `<h:outputScript>` is set to `body`, then it will be automatically\
    \ moved to the end of the document body. The `<h:outputStylesheet>` doesn’t support\
    \ it. In other words, the following test Facelet:\n\n```xml\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:h=\"jakarta.faces.html\">\n    <h:head>\n        <h:outputScript\
    \ name=\"script1.js\" library=\"foo\" />\n        <h:outputStylesheet name=\"\
    style1.css\" library=\"foo\" />\n        <h:outputScript name=\"script2.js\" library=\"\
    foo\" target=\"head\" />\n    </h:head>\n    <h:body>\n        <h:outputStylesheet\
    \ name=\"style2.css\" library=\"foo\" />\n        <h:outputScript name=\"script3.js\"\
    \ library=\"foo\" target=\"head\" />\n        <h:outputScript name=\"script4.js\"\
    \ library=\"foo\" target=\"body\" />\n        <h:graphicImage name=\"image1.png\"\
    \ library=\"foo\" />\n        <h:outputText value=\"Resource component relocation\
    \ demo.\" />\n        <h:panelGrid>\n            <h:outputText value=\"Paragraph\
    \ 1\" />\n            <h:outputText value=\"Paragraph 2\" />\n        </h:panelGrid>\n\
    \    </h:body>\n</html>\n```\n\nwill basically generate the following HTML output\
    \ (URLs simplified for brevity):\n\n```html\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    >\n    <head>\n        <script type=\"text/javascript\" src=\"foo/script1.js\"\
    ></script>\n        <link rel=\"stylesheet\" type=\"text/css\" href=\"foo/style1.css\"\
    \ />\n        <script type=\"text/javascript\" src=\"foo/script2.js\"></script>\n\
    \        <link rel=\"stylesheet\" type=\"text/css\" href=\"foo/style2.css\" />\n\
    \        <script type=\"text/javascript\" src=\"foo/script3.js\"></script>\n \
    \   </head>\n    <body>\n        <img src=\"foo/image1.png\" />\n        Resource\
    \ component relocation demo.\n        <table>\n            <tr>\n            \
    \    <td>Paragraph 1</td>\n                <td>Paragraph 2</td>\n            </tr>\n\
    \        </table>\n        <script type=\"text/javascript\" src=\"foo/script4.js\"\
    ></script>\n    </body>\n</html>\n```\n\nIn other words, the resource rendering\
    \ order in the document head is\n\n1. `<h:outputScript>` from `<h:head>` without\
    \ `target`\n2. `<h:outputStylesheet>` from `<h:head>`\n3. `<h:outputScript>` from\
    \ `<h:head>` with `target=\"head\"`\n4. `<h:outputStylesheet>` from `<h:body>`\n\
    5. `<h:outputScript>` from `<h:body>` with `target=\"head\"`\n\nNote that `<h:outputStylesheet>`\
    \ implicitly infers `target=\"head\"` and is therefore rendered *after* `<h:outputScript>`\
    \ without any target. All JavaScript and CSS resources that are automatically\
    \ included via the `@ResourceDependency` annotation of components will end up\
    \ between the resources declared in `<h:head>` and those declared in `<h:body>`.\
