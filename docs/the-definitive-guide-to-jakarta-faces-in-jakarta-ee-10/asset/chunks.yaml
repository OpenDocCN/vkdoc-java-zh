    | `<h:inputTextarea>` | `UIInput` | `Object` | `<textarea>` | 1.0 |\n| `<h:link>`\
    \ | `UIOutcomeTarget` | `String` | `<a href>` | 2.0 |\n| `<h:message>` | `UIMessage`\
    \ | - | `<span>` (如果需要) | 1.0 |\n| `<h:messages>` | `UIMessages` | - | `<ul>`\
    \ | 1.0 |\n| `<h:messages layout=table>` | `UIMessages` | - | `<table>` | 1.0\
    \ |\n| `<h:outputFormat>` | `UIOutput` | `Object` | `<span>` (如果需要) | 1.0 |\n\
    | `<h:outputLabel>` | `UIOutput` | `String` | `<label>` | 1.0 |\n| `<h:outputText>`\
