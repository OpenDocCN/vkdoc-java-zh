- fmt: "可见，`jakarta.faces.Token`请求参数已由 Jakarta Faces 添加。该令牌与用户的 HTTP 会话绑定，因此如果 HTTP\
    \ 会话过期，令牌也会过期。该令牌在密码学上是强壮的，意味着它满足前面所述的 CSRF 保护令牌的所有三个要求。\n\n如果令牌被篡改（例如，我们使用`xxMoNbfOycv2v80gr`而不是`gdMoNbfOycv2v80gr`）或完全缺失（即，我们请求`/bar.xhtml`），那么\
    \ Jakarta Faces 将抛出`jakarta.faces.application.ProtectedViewException`。如果链接来自无状态页面，Jakarta\
    \ Faces 应用程序可以通过通知用户并允许重新渲染原始页面来处理此异常。在前面的示例中，这意味着重新渲染`index.xhtml`。合法用户将获得一个新的\
    \ CSRF 保护令牌，而攻击者将无法从原始请求中获得预期的副作用。\n\n如前所述，还有`referer`和`origin`头部检查。对于此检查，Jakarta\
    \ Faces 会检查`referer`头部（如果可用）是否设置为源自同一应用程序的 URL。为了演示这一点，考虑第二个 Jakarta Faces 应用程序，它只有一个空的`faces-config.xml`和以下视图：\n\
    \n```\ntest\n```\n\n假设我们的第一个应用程序（包含受 CSRF 保护的`bar.xhtml`）部署在`http://localhost:8080/project`，点击第二个应用程序中的输出链接将导致第一个应用程序再次抛出`jakarta.faces.application.ProtectedViewException`。请注意，`referer`是一个可选检查，仅在`referer`头部实际存在时执行，就像第二个应用程序中的链接一样。\n\
    \n如果我们直接在浏览器的地址栏中输入`http://localhost:8080/project/bar.xhtml?jakarta.faces.Token=gdMhNbfOycv2v80gr`，或通过命令行工具（如`wget`或`curl`）直接请求它，则不会有`referer`，请求将被接受。在实践中，GET\
    \ 请求受 CSRF 攻击保护的价值较低，因为它们实际上应该是幂等的（不应有副作用，只应显示数据）。与其用 CSRF 保护令牌来保护 GET 请求，更好的做法是重构应用程序，使其不包含非幂等的\
    \ GET 请求。\n\n对于回发，CSRF 保护令牌的工作方式大致相同。为了演示，考虑将`/bar.xhtml`视图更改为以下内容：\n\n渲染此页面将导致表单目标\
    \ URL 以与 GET 请求相同的方式应用 CSRF 保护令牌，例如：\n\n```\n```\n\n这是与隐式`jakarta.faces.ViewState`令牌的另一个区别，后者始终是一个\
    \ POST 参数。\n\n## Web 参数篡改保护\n\nWeb 参数篡改是一种针对应用程序的攻击，攻击者修改发送（回）到托管应用程序的服务器的参数值。如果应用程序没有正确验证这些值，攻击者可能获得比其应得更多的利益，或有机会执行额外的攻击。\n\
    \n例如，假设一个 Web 应用程序渲染了一个可以分配给其他用户的角色列表，例如“user”、“manager”和“sales”。攻击者可以尝试修改回发的数据，将“user”的选择改为“admin”。如果服务器盲目接受输入，并且“admin”是一个现有值，这将允许攻击者将“admin”角色授予另一个用户，即使攻击者没有权限这样做。\n\
    \nJakarta Faces 对此类攻击的一个子集提供了隐式保护，即针对从选择组件（具体来说，基于`UISelectOne`和`UISelectMany`的组件）回发的值。这是通过\
    \ Jakarta Faces 在回发后从`jakarta.faces.ViewState`恢复视图（使用完整状态保存时）或重新创建视图（使用部分状态保存时）来实现的。只有那些也被渲染的值才会被接受。不过，通常的警告仍然适用，即在使用部分状态保存时，组件绑定的数据在回发前后必须相同。然而，这可以通过使用视图作用域轻松实现。\n\
    \n为了演示，考虑以下视图：\n\n```\nChosen value: #{bean.selected}\n```\n\n以及以下支持 bean：\n\n\
    ```\n@Named @RequestScoped\npublic class Bean {\n    private List available =\
    \ Arrays.asList(\"foo\", \"bar\", \"kaz\");\n    private String selected;\n  \
    \  public List getAvailable() {\n        return available;\n    }\n    public\
    \ String getSelected() {\n        return selected;\n    }\n    public void setSelected(String\
    \ selected) {\n        this.selected = selected;\n    }\n}\n```\n\n例如，选择“bar”并点击“select”将按预期渲染“Chosen\
    \ value: bar”。可以通过多种方式更改发送的值，例如，通过像 Burp Proxy 这样的拦截代理，或通过 Chrome 等浏览器的开发者工具编辑实时源代码。\n\
    \n如图 [13-1](#454457_2_En_13_Chapter.xhtml#Fig1) 所示，更改后选择“`foo`”条目并再次点击 select\
    \ 按钮，将导致“`foox`”值被发送到应用程序。此值将被 Jakarta Faces 拒绝，因此将渲染“Chosen value:”，表明我们篡改的值确实未被接受。\n\
    \n![](images/454457_2_En_13_Chapter/454457_2_En_13_Fig1_HTML.png)\n\n图 13-1 通过\
    \ Chrome 的 DOM 检查器在 HTML 源代码中将选中的值从“foo”篡改为“foox”\n\n## 跨站脚本保护\n\n跨站脚本（XSS）是一种攻击，它有多种变体，但实际上归结为\
    \ Web 应用程序将从（其他）用户那里获得的数据直接作为发送给客户端的标记的一部分进行渲染。如果这些数据本身包含脚本代码（通常是 JavaScript），浏览器可能会盲目执行它，从而允许攻击者读取\
    \ cookie 数据并将其发送到攻击者控制的服务器。\n\nJakarta Faces 通过为许多常见上下文启用上下文输出转义来提供对此类攻击的保护。最常见的上下文是输出\
    \ HTML，其中所有 Jakarta Faces 输出编写器默认对其输出进行 XML 转义。\n\n为了演示，考虑以下支持 bean：\n\n```\n\
    @Named @RequestScoped\npublic class Bean {\n    private String value = \"alert('hi')\"\
    ;\n    public String getValue() {\n        return value;\n    }\n}\n```\n\n`value`实例变量包含一个我们不希望浏览器执行的脚本。在此示例中，它是硬编码的，但在实践中，它可能来自存储的数据，例如数据库。"
  raw: "As can be seen, the `jakarta.faces.Token`\nrequest parameter has been added\
    \ by Jakarta Faces. The token is tied to\nthe user’s HTTP session, so if the HTTP\
    \ session expires, the token also\nexpires. The token is cryptographically strong,\
    \ meaning that it fulfills\nall three requirements for a CSRF protection token\
    \ as stated\nearlier.\nIf the token is tampered (e.g., we use `xxMoNbfOycv2v80gr`\n\
    instead of `gdMoNbfOycv2v80gr`) or\nis missing altogether (i.e., we request `/bar.xhtml`),\
    \ then\nJakarta Faces will throw a `jakarta.faces.application.ProtectedViewException`.\n\
    In case the link originated from a stateless page, Jakarta Faces\napplications\
    \ can handle this exception by notifying the user and\nallowing to re-render the\
    \ original page again. In the preceding example,\nthat would mean re-rendering\
    \ `index.xhtml`. The\ngenuine user would get a new CSRF protection token then,\
    \ while an\nattacker will not get the expected side effect from the original\n\
    request.\n\nAs mentioned, there’s a `referer` and `origin` header check\nas well.\
    \ For this check, Jakarta Faces checks whether the `referer` header, if\navailable,\
    \ is set to a URL that originates from the same application. To\ndemonstrate this,\
    \ consider a second Jakarta Faces application with only\nan empty `faces-config.xml`\
    \ and\nthe following view:\n\n```\n\ntest\n\n```\n\nAssuming our first application\
    \ with the CSRF-protected `bar.xhtml` is deployed to `http://localhost:8080/project`,\n\
    clicking the output link from this second application will cause the\n`jakarta.faces.application.ProtectedViewException`\n\
    to be thrown again in the first application. Note that the `referer` is an\noptional\
    \ check that’s only done when the `referer` header is\nactually present, as is\
    \ the case with the link in the second\napplication.\nIf we enter `http://localhost:8080/project/bar.xhtml?jakarta.faces.Token=gdMhNbfOycv2v80gr`\n\
    directly into the address bar of a browser or request it directly via a\ncommand-line\
    \ utility such as `wget` or `curl`, there won’t be\na `referer`, and\nthe request\
    \ will be accepted.\nIn practice, a GET request has less value of being protected\
    \ against\nCSRF attacks since these actually *should* be idempotent (should\n\
    not have side effects and should only display data). Instead of\nshielding GET\
    \ requests with CSRF protection tokens, it’s probably a far\nbetter idea to refactor\
    \ an application to not have non-idempotent GET\nrequests.\n\nFor postbacks, the\
    \ CSRF protection token works in much the same way\nthough. To demonstrate, consider\
    \ changing the `/bar.xhtml` view into\nthe following:\n\nRendering this page will\
    \ result in the form target URL having the CSRF\nprotection token\napplied to\
    \ it in the same way as we saw for the GET requests, for\nexample:\n\n```\nThis\
    \ is thus another difference with the implicit `jakarta.faces.ViewState`\ntoken,\
    \ which is always a POST parameter.\n\nWeb Parameter Tampering Protection\nWeb\
    \ parameter\ntampering \nis an attack against an application where an attacker\
    \ modifies parameter\nvalues that are sent (back) to the server hosting the application.\
    \ If\nthe application doesn’t validate those values correctly, an attacker\ncould\
    \ gain more benefits than entitled to or may get the opportunity to\ncarry out\
    \ additional attacks.\nFor example, suppose a web application renders a list of\
    \ roles that\ncan be assigned to another user, say, “user,” “manager,” and “sales.”\
    \ An\nattacker could attempt to modify the data posted back and change the\nselection\
    \ of “user” into “admin.” If the server blindly accepts the\ninput and “admin”\
    \ is an existing value, this allows the attacker to give\nanother user the “admin”\
    \ role, even when the attacker is not privileged\nto do that.\nJakarta Faces has\
    \ an implicit protection against a subset of this\nattack, namely, against values\
    \ being posted back from a selection\n(specifically, from `UISelectOne`*-*\nand\
    \ `UISelectMany`*-*based\ncomponents). This works by Jakarta Faces either restoring\
    \ the view from\n`jakarta.faces.ViewState`\nafter a postback (when full state\
    \ saving is used) or re-creating it\n(when partial state saving is used). Only\
    \ values that were also rendered\nare accepted. The usual caveat applies\nthough,\
    \ and that’s that with partial state saving, the data bound to the\ncomponent\
    \ needs to be identical before and after the postback. This,\nhowever, can easily\
    \ be accomplished by using the view scope.\n\nTo demonstrate, consider the following\
    \ view:\n\n```\n\nChosen value: #{bean.selected}\n\n```\n\nand the following backing\
    \ bean:\n\n```\n@Named @RequestScoped\npublic class Bean {\nprivate List available\
    \ = Arrays.asList(\"foo\", \"bar\", \"kaz\");\nprivate String selected;\npublic\
    \ List getAvailable() {\nreturn available;\n}\npublic String getSelected() {\n\
    return selected;\n}\npublic void setSelected (String selected) {\nthis.selected\
    \ = selected;\n}\n}\n```\n\nChoosing, for example, “bar” and clicking “select”\
    \ will render\n“Chosen value: bar,” as expected. Changing the value being sent\
    \ can be\ndone in various ways, for instance, via an intercepting proxy like Burp\n\
    Proxy or by editing the live source via the developer tools from a\nbrowser such\
    \ as Chrome.\n\nSelecting the “`foo`” entry after the\nchange as shown in Figure\
    \ [13-1](#454457_2_En_13_Chapter.xhtml#Fig1) and clicking\nthe select button again\
    \ will cause the “`foox`” value to be\nsent to the application. This value will\
    \ be rejected by Jakarta Faces,\nand as a result, “Chosen value:” will be rendered,\
    \ indicating that our\ntampered value indeed has not been accepted.\n\n![](images/454457_2_En_13_Chapter/454457_2_En_13_Fig1_HTML.png)\n\
    \nFigure 13-1\nTampering  the\nselected value from “foo” to “foox” in HTML source\
    \ code via Chrome’s DOM\ninspector\n\nCross-Site Scripting Protection\nCross-site\
    \ scripting  or XSS is an attack\nthat has a couple of variations, but practically\
    \ it boils down to a web\napplication rendering data that it got from (other)\
    \ users directly as\npart of the markup sent to the client. If this data itself\
    \ contains\nscripting code (typically JavaScript), the browser may execute it\n\
    blindly, allowing the attacker to read, for example, cookie data and to\nsend\
    \ that over to a server controlled by the attacker.\nJakarta Faces provides protection\
    \ against this type of attack by\nhaving contextual output escaping enabled for\
    \ many common contexts. The\nmost common context is writing out HTML, where all\
    \ Jakarta Faces output\nwriters by default XML escape their output.\n\nTo demonstrate,\
    \ consider the following backing bean:\n\n```\n@Named @RequestScoped\npublic class\
    \ Bean {\nprivate String value = \"alert('hi')\";\npublic String getValue() {\n\
    return value;\n}\n}\n```\n\nThe `value`\ninstance variable contains a script that\
    \ we don’t want the browser to\nexecute. In this example, it’s hard-coded, but\
    \ in practice, it could\ncome from stored data in, for example, a database."
