    在生成的 HTML 输出中，你会注意到它自动包含了 `faces.js` JavaScript 文件。该文件包含了 `window.faces` 对象以及
    Jakarta Faces 实现特有的辅助函数，在 Mojarra 实现中，这些函数被放置在 `window.mojarra` 对象中。在纯 HTML 中，无法使用
    `<a>` 元素提交 `<form>`。因此，必须引入一些 JavaScript 代码。在 Mojarra 的具体实现中，`mojarra.cljs()`
    函数会被调用，其第一个参数是父表单，第二个参数是命令组件的客户端 ID（作为请求参数名和值），第三个参数是 `<h:commandLink>` 的 `target`
    属性（如果有的话）。`mojarra.cljs()` 函数会为第二个参数提供的每一对名称/值创建 `<input type="hidden">` 元素，并将它们添加到第一个参数提供的表单中，确保这些参数最终成为回发请求的一部分。然后，它会创建一个不可见的
    `<input type="submit">` 按钮，将其添加到表单中，并调用其 `click()` 函数，就像你使用普通的提交按钮一样。最后，它会从表单中移除所有动态创建的元素。


    实际上，`<h:commandButton>` 也会使用此函数，但仅当你需要通过嵌套在命令组件中的一个或多个 `<f:param>` 标签传递额外的 HTTP
    请求参数时才会用到。


    ```

    ...


    ```


    生成的 HTML 输出：


    在 Chrome 浏览器中渲染：


    ![](img/454457_2_En_4_Figk_HTML.jpg)


    你可以通过 `@Inject @ManagedProperty` 在受管 bean 中获取额外的 HTTP 请求参数。


    ```

    @Inject @ManagedProperty("#{param.id}")

    private Integer id;

    public void submit() {

    System.out.println("Submitted ID: " + id);

    }

    ```


    还有一种通过命令组件传递参数的方法，即简单地将它们作为操作方法参数传递：


    ```

    ...


    ```


    修改后的操作方法如下所示：


    ```

    public void submit(Integer id) {

    System.out.println("Submitted ID: " + id);

    }

    ```


    对于 `<h:commandButton>`，这不会生成任何 JavaScript，因此看起来与不使用任何操作方法参数时完全相同。这也意味着 `#{otherBean.id}`
    的值不会通过 HTML 源代码作为 HTTP 请求参数传回服务器。这反过来意味着，它仅在 Jakarta Faces 即将调用操作方法时的回发请求期间被评估。这又意味着
    `#{otherBean.id}` 至少必须是 `@ViewScoped` 才能在回发请求中仍然可用。换句话说，这种方法参数传递方式绝对不能与 `<f:param>`
    标签方法互换，后者只需两个 bean 都是 `@RequestScoped` 即可正常工作。


    标准 Jakarta Faces 组件集提供的最后一个命令组件是 `<h:commandScript>`。它自 Jakarta Faces 2.3 起可用。它允许你通过从自己的脚本中调用一个命名的
    JavaScript 函数来调用受管 bean 操作方法。回发请求将始终通过 Ajax 执行。


    生成的 HTML 输出：


    ```


    var invokeBeanSubmit = function(o) {

    var o = (typeof o===''object'') && o ? o : {};

    mojarra.ab(''form:submit'',null,''action'',0,0,{''params'':o});

    }


    ```


    它在 Web 浏览器中没有可见的 HTML 渲染。在生成的脚本中，你会看到它生成了一个函数变量，其名称与 `name` 属性中指定的名称相同。在此示例中，它确实位于全局作用域中。由于这在
    JavaScript 上下文中被认为是不良实践（“全局命名空间污染”），你最好提供一个带命名空间的函数名称。这仅要求你之前在 HTML 文档中的某处声明了自己的命名空间，通常是通过
    `<head>` 元素中的 JavaScript 文件。以下示例使用内联脚本简化了此操作：


    ```

    ...

    var mynamespace = mynamespace || {};


    ```


    回到生成的函数变量，你还会看到它接受一个对象参数，并将其作为“`params`”属性传递给 Mojarra 特有的 `mojarra.ab()` 函数的最后一个对象参数。该辅助函数将依次准备并调用标准
    Jakarta Faces JavaScript API 的 `faces.ajax.request()` 函数。换句话说，你可以通过这种方式将 JavaScript
    变量传递给受管 bean 操作方法。它们可以通过 `@ManagedProperty` 注入，方式与使用 `<f:param>` 相同。以下示例演示了使用
    JavaScript 对象中的硬编码变量进行 JavaScript 调用，但你当然可以从 JavaScript 上下文中的任何其他地方获取这些变量：


    ```

    var params = {

    id: 42,

    name: "John Doe",

    email: "john.doe@example.com"

    };

    invokeBeanSubmit(params);

    ```


    支持 bean 类：


    ```

    @Inject @ManagedProperty("#{param.id}")

    private Integer id;

    @Inject @ManagedProperty("#{param.name}")

    private String name;

    @Inject @ManagedProperty("#{param.email}")

    private String email;

    public void submit() {

    System.out.println("Submitted ID: " + id);

    System.out.println("Submitted name: " + name);

    System.out.println("Submitted email: " + email);

    }

    ```


    `<h:commandScript>` 也可用于将 HTML 文档的部分渲染推迟到窗口的 `load` 事件。为此，只需将 `autorun` 属性设置为
    `true`，并在 `render` 属性中指定目标组件的客户端 ID。以下示例仅在页面在客户端加载完成后才加载并渲染一个数据表：


    ```


    #{person.id}

    #{person.name}

    #{person.email}


    ```


    其中支持 bean 如下所示：


    ```

    @Named @RequestScoped

    public class Bean {

    private List lazyPersons;

    @Inject

    private PersonService personService;

    public void loadLazyPersons() {

    lazyPersons = personService.list();

    }

    public List getLazyPersons() {

    return lazyPersons;

    }

    }

    ```


    而 `Person` 实体如下所示：


    ```

    public class Person {

    private Long id;

    private String name;

    private String email;

    // 添加/生成 getter 和 setter 方法。

    }

    ```


    请注意，为清晰起见，前面的示例中省略了任何持久化框架特有的注解，例如 Jakarta Persistence 的 `@Entity` 和 `@Id`，以及
    `PersonService` 的实际实现。这些与 Jakarta Faces 等任何前端框架都无关。


    不言而喻，`<h:commandScript>` 仅用于能够使用原生 JavaScript 调用 Jakarta Faces 受管 bean 操作方法，通常是在特定的
    HTML DOM（文档对象模型）事件期间，而 `<h:commandLink>` 和 `<h:commandButton>` 似乎执行完全相同的操作；只是视觉呈现不同：一个渲染为链接，另一个渲染为按钮。用户体验（UX）的共识是，按钮应用于提交表单，而链接应用于导航到另一个页面或跳转到同一页面的另一个部分。因此，使用链接提交表单并不总被认为是最佳实践。仅当你希望使用图标或图像提交
    HTML 表单时，它才有用。以下示例展示了如何在 Font Awesome 图标上使用命令链接：


    对于所有其他情况，请使用普通按钮。

