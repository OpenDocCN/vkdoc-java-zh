    .filter(entry -> entry.getValue().intValue() > 0)

    .map(entry -> entry.getKey())

    .collect(Collectors.toSet());

    }

    }

    ```


    你可以使用前面的 `getActiveUsers()` 方法来获取一组“活跃聊天用户”。请注意，单个用户可以在同一会话中多次打开同一个网页（例如，多个浏览器标签页），这正是使用计数器而不是简单地从
    `Set` 中添加和删除用户的原因。


    客户端事件处理


    默认情况下，`<f:websocket>` 标签会保持连接永久打开，只要文档是打开的，只要没有设置 `connected="false"`，并且只要没有调用
    `faces.push.close(clientId)`。当第一次连接尝试失败时，它会立即关闭套接字。你可以选择使用 `onclose` 属性来引用一个充当关闭监听器的
    JavaScript 函数。


    ```


    function closeListener(code, channel, event) {

    if (code == -1) {

    // 客户端不支持 WebSocket API。例如 IE9。

    }

    else if (code == 1000) {

    // 由于视图或会话过期导致的正常关闭。

    }

    else if (code == 1008) {

    // 由于未知的通道 ID 导致的正常关闭。

    }

    else {

    // 由于客户端或服务器错误导致的异常关闭。

    // 你可能想要显示一条消息和/或刷新页面。

    }

    }


    ```


    该 JavaScript 函数将被调用，并传入三个参数：


    ```'
- fmt: '1.  `code`: The close reason code as integer. If this is `-1`, then the WebSocket
    JavaScript API is simply not supported^([^(85)](#fn85)) by the client. If this
    is `1000`, then a normal closure has occurred as consequence of an expired view
    or session in the server side. If this is `1008`, then a normal closure has occurred
    because the provided channel ID is unknown. This will usually only happen when
    it is spoofed by the client, or when the server has restarted with a new deployment
    with a changed channel ID while the client hasn’t yet refreshed the page.


    2.  `channel`: The WebSocket channel name. This may be useful in case you intend
    to have a global listener.


    3.  `event`: The original `CloseEvent` object. This may be useful in case you
    intend to inspect it in the JavaScript function.


    As you might have noticed in the aforementioned `onclose` listener function example,
    you could thus just check if the close code of a `<f:websocket>` equals `1000`
    in order to perform some client-side action via JavaScript (e.g., displaying a
    warning message and/or redirecting to some “Session expired” page).


    ```

    function closeListener(code) {

    if (code == 1000) {

    window.location = faces.contextPath + "/expired.xhtml";

    }

    }

    ```


    This works for both view- and session-scoped sockets. Application-scoped sockets,
    however, remain open forever as long as the document is still open on client side,
    even when the underlying view or session has expired.


    When the first connection attempt succeeds, but the socket later gets disconnected
    for some reason (e.g., because the server is restarting), then it will by default
    trigger an error event and keep trying to reconnect at incremental intervals.
    In the case of Mojarra, it will keep retrying up to 25 times, with an interval
    that is incremented 500ms each time, and in case all reconnect attempts have failed,
    it will eventually completely close the socket and invoke the `onclose` listener.
    You can optionally use the `onerror` attribute to reference a JavaScript function
    that listens for those error events.


    ```

    function errorListener(code, channel, event) {

    if (code == 1001) {

    // Server is reachable, but has returned an unexpected

    // response code. E.g. 503 when it’s shutting down.

    }

    else if (code == 1006) {

    // Server is not anymore reachable, this can happen if it

    // is completely down, or if client’s network is down.

    }

    else {

    // Any other reason which is usually not -1, 1000 or 1008,

    // as the onclose will be invoked instead.

    }

    // In any case, the websocket will attempt to reconnect. This

    // onerror function will be invoked again. Once the websocket

    // gives up reconnecting, the onclose will finally be invoked.

    }

    ```


    ## Breaking Down Mojarra’s `<f:websocket>` Implementation


    The `<f:websocket>` API specifies the following classes and methods:


    *   `jakarta.faces.push.Push`: A CDI qualifier to for `@Inject`. With the help
    of this qualifier, the socket channel name can be specified.


    *   `jakarta.faces.push.PushContext`: An interface with three `send()` methods:
    `send(Object message)`, `send(Object message, S user)`, and `send(Object message,
    Collection<S> users)`. All those methods accept the push message as `Object` and
    will for JavaScript convert it to a JSON string. All those methods return a `Set<Future<Void>>`.
    If it returns an empty set, then there was no open socket associated with given
    channel and user. For each `Future<Void>`, if it doesn’t throw `ExecutionException`
    on `Future#get()` method call, then the message was successfully delivered.


    *   `jakarta.faces.component.UIWebsocket`: A component that implements `ClientBehaviorHolder`
    in order to support nested `<f:ajax>`. Historically, the prototype socket tag
    extended from `TagHandler` instead of `UIComponent`. It was later decided to let
    the tag support `<f:ajax>` as that would make complex and stateful UI updates
    much easier. However, it isn’t possible to let a `TagHandler` implement `ClientBehaviorHolder`
    and benefit all of built-in Ajax magic, hence the final conversion to `UIComponent`.


    *   `ViewHandler#getWebsocketURL()` method that takes a channel name and returns
    the absolute WebSocket URL in the form of `ws://host:port/context/jakarta.faces.push/channel`
    with help of `ExternalContext#encodeWebsocketURL()`.


    *   `ExternalContext#encodeWebsocketURL()` method that basically takes a relative
    WebSocket URI in the form of `/context/jakarta.faces.push/channel` and returns
    the absolute WebSocket URL.


    The actual implementation is fairly extensive. It’s directly based on OmniFaces
    `<o:socket>`^([^(86)](#fn86)) with, here and there, a few adjustments such as
    using a component’s client ID instead of a channel name in JavaScript API functions.


    *   `com.sun.faces.renderkit.html_basic.WebsocketRenderer`: A faces renderer class
    that registers during encoding the socket channel, scope, and user in `WebsocketChannelManager`
    and retrieves the WebSocket URL from it. Then it auto-includes the `faces.js`
    script containing the necessary `faces.push.*` functions and renders the `faces.push.init(...)`
    inline script function call with among others the WebSocket URL as an argument.
    This function should in turn in JavaScript create a `new WebSocket(url)`. The
    `WebsocketRenderer` will also subscribe the `WebsocketFacesListener` to the current
    view.


    *   `com.sun.faces.push.WebsocketChannelManager`: A session-scoped CDI managed
    bean that keeps track of all so far registered `<f:websocket>` channels, scopes,
    and users and ensures that each socket gets its own unique channel identifier.
    It will register every channel identifier in `WebsocketSessionManager` and those
    of user-targeted sockets in `WebsocketUserManager`.


    *   `com.sun.faces.push.WebsocketFacesListener`: A system event listener that
    listens on `PreRenderViewEvent` and renders, if necessary, the `faces.push.open(...)`
    or `faces.push.close(...)` inline script function calls depending on whether the
    `connected` attribute represents a dynamic EL expression which got changed during
    an Ajax request.


    *   `com.sun.faces.push.WebsocketEndpoint`: A class that implements JSR-356 `jakarta.websocket.Endpoint`
    and listens on the URI template `/jakarta.faces.push/{channel}`. When a `new WebSocket(url)`
    is created and opened on client-side JavaScript, then a new `jakarta.websocket.Session`
    is created on server-side Java, and the `WebsocketEndpoint` will add this `Session`
    to `WebsocketSessionManager`. Equivalently, when a socket is closed, then the
    `WebsocketEndpoint` will remove it from `WebsocketSessionManager`.


    *   `com.sun.faces.push.WebsocketSessionManager`: An application-scoped CDI managed
    bean that collects all so far opened socket sessions and validates that their
    unique WebSocket URL has been registered by `WebsocketChannelManager`.


    *   `com.sun.faces.push.WebsocketUserManager`: An application-scoped CDI managed
    bean that collects the channel identifiers of all so far opened user-targeted
    sockets.


    *   `com.sun.faces.push.WebsocketPushContext`: The concrete implementation of
    the `PushContext` interface. It will send the push message via `WebsocketSessionManager`
    and, if necessary, obtain the user-targeted channels via `WebsocketUserManager`.'
