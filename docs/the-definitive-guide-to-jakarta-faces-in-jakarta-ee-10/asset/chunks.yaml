- fmt: '在`@FacesConverter`注解中有几个重要事项需要注意。首先，`forClass`属性基本上指定了该转换器应在验证阶段（第三阶段）和渲染响应阶段（第六阶段）自动运行的目标实体类型。这样，您无需在视图中显式注册转换器。如果您想这样做，那么可以用`value`属性替换`forClass`属性，指定转换器的唯一标识符，例如：


    ```

    @FacesConverter(value="project.ProductConverter", managed=true)

    ```


    然后，您可以在任何`ValueHolder`组件的`converter`属性中，或任何嵌套的`<f:converter>`标签的`converterId`属性中，精确指定该转换器ID。


    但是，当您继续使用`forClass`属性时，这并非必要。请注意，您不能同时指定两者。只能二选一，其中`value`属性优先于`forClass`属性。因此，如果您同时指定两者，则`forClass`属性实际上会被忽略。我们不希望出现这种情况，因为对于透明转换整个实体这一特定目的而言，`forClass`属性要强大得多。


    注解中需要注意的第二点是`managed`属性。这是自 Jakarta Faces 2.3 以来的新特性。本质上，它管理 CDI 上下文中的转换器实例。为了在转换器中实现依赖注入，必须将`managed`属性设置为`true`。以前，这是通过将转换器本身设为受管
    bean 来解决的。^([^(37)](#fn37))


    如果您以前使用过 Jakarta Faces 转换器，您还会注意到该接口现在终于参数化了。该接口早于 Java 1.5，因此从一开始就没有参数化。使用`Converter<T>`后，`getAsObject()`现在返回`T`而不是`Object`，而`getAsString()`现在接受`T`作为值参数而不是`Object`。这省去了不必要的`instanceof`检查和类型转换。


    请注意，Jakarta Faces 自身早于 Jakarta Faces 2.3 的标准转换器（目前基本上所有标准转换器都是如此）是冻结的，无法利用这一特性，否则它们将不再向后兼容。换句话说，它们仍然是原始类型。也就是说，存在一个微小但并非不可避免的可能性，即有人在纯
    Java 代码中以编程方式使用 Jakarta Faces 转换器，而不是让 Jakarta Faces 处理它们。如果标准转换器被参数化，那么这些纯 Java
    代码将无法再编译。这与`Map#get()`显式接受`Object`而不是`K`作为参数的原因基本相同。此外，还有一个更小但仍然并非不可避免的可能性，即有人创建了一个自定义转换器，它扩展了标准转换器，但也显式地重新声明了该接口。类似如下代码：


    ```

    public class ExtendedNumberConverter

    extends NumberConverter implements Converter

    {

    // ...

    }

    ```


    如果`NumberConverter`以某种方式被参数化，那么这样一个晦涩的转换器将无法再编译。即使我们将`NumberConverter`参数化为`Converter<Object>`，编译器也会在`ExtendedNumberConverter`上报错，从而破坏向后兼容性，错误信息如下：


    *接口 Converter 不能以不同的参数实现多次：Converter<Object> 和 Converter*


    回到我们的`ProductConverter`实现，在`getAsString()`中，您会注意到当模型值为`null`时，转换器显式返回一个空字符串。这是根据
    Javadoc 的要求。^([^(38)](#fn38)) 技术原因是，当评估值为`null`时，Jakarta Faces 不会渲染关联的 HTML 属性。通常，这不是一个大问题。生成的
    HTML 输出中未使用的属性越少越好。但是，对于`<select>`元素的`<option>`，这不会按预期工作。如果自定义转换器返回`null`而不是空字符串，那么`<option>`元素将在没有`value`属性的情况下被渲染，从而退而提交其文本内容。这确实很尴尬，但这是
    HTML 规范中明确规定的。^([^(39)](#fn39)) 换句话说，如果您有一个转换器错误地返回`null`而不是空字符串，并且您有一个包含关联实体和默认选项的下拉列表，如下所示：


    那么，在提交默认选项时，Web 浏览器会将字面字符串“请选择……”发送到服务器，而不是空字符串。这会导致`ProductConverter#getAsObject()`中出现`NumberFormatException`，而我们本意是返回`null`。因此，正确的解决方案是让`getAsString()`在模型值为`null`时返回一个空字符串。


    如果您有更多需要 Jakarta Faces 转换器的持久化实体，并且希望避免为所有其他持久化实体重复本质上相同的`ProductConverter`逻辑，那么您可以为其创建一个通用的
    Jakarta Faces 转换器。如果您的所有持久化实体都继承自同一个基类，并且该基类中定义了`getId()`，那么这种方法效果最好。


    ```

    @MappedSuperClass

    public abstract class BaseEntity implements Serializable {

    @Id @GeneratedValue(strategy=IDENTITY)

    private Long id;

    public Long getId() {

    return id;

    }

    }

    ```


    如果您有一个适用于所有实体的基础实体服务：


    ```

    @Stateless

    public class BaseEntityService {

    @PersistenceContext

    private EntityManager entityManager;

    @TransactionAttribute(SUPPORTS)

    public  E getById(Class type, Long id) {

    return entityManager.find(type, id);

    }

    }

    ```


    那么通用转换器可以如下所示：


    ```

    @FacesConverter(forClass=BaseEntity.class, managed=true)

    public class BaseEntityConverter implements Converter {

    @Inject

    private BaseEntityService baseEntityService;

    @Override

    public String getAsString

    (FacesContext context, UIComponent component, BaseEntity entity)

    {

    if (entity == null) {

    return "";

    }

    if (entity.getId() != null) {

    return entity.getId().toString();

    }

    else {

    throw new ConverterException(

    new FacesMessage("Invalid entity ID"), e);

    }

    }

    @Override

    public BaseEntity getAsObject

    (FacesContext context, UIComponent component, String id)

    {

    if (id == null || id.isEmpty()) {

    return null;

    }

    ValueExpression value = component.getValueExpression("value");

    Class type = (Class)

