    # 1. 历史


    本章介绍 Jakarta Faces 的历史，从其早期构思开始，一直讲到我们撰写本书时的现状。我们将讨论 Jakarta Faces API（应用程序编程接口）本身是如何演变的，在这一演变过程中发生了哪些重要事件，以及参与其中的一些关键人物。


    这绝非完整的历史描述，读者应注意，实际发生的事件和参与的人员远多于我们在此所能提及的。


    ## 开端……


    Jakarta Faces 的历史悠久。其最初的 JSR（JSR 127）始于 2001 年。当时，Struts Web 框架非常流行，尽管它本身发布的时间并不算太久（大约在
    2000 年）。尽管 Struts 很受欢迎，但在 Java 领域仍有大量其他 Web 框架在使用，并且新的框架不断涌现。Jakarta Faces 的构想是试图将标准化的
    MVC（模型-视图-控制器）Web 框架基础引入整个 Jakarta EE 平台。


    在 Web 框架领域，争议相当常见，Jakarta Faces 也不例外。在其诞生之初，就曾引发一场重大争议：Apache 反对创建 Jakarta Faces，理由是
    Apache Struts 已经存在，而闭源的替代方案价值不大。因此，Apache 投票反对创建 Jakarta Faces，并发表了以下评论：


    > *此 JSR 与 Apache 开源项目 Struts 存在冲突。考虑到 Sun 目前认为 JSR 不能在开源许可下独立实现的立场，我们认为在封闭环境中重新创建一项已在开放环境中可用的技术价值不大。*


    > *就本 JSR 目前超越 Struts 的范围而言，我们鼓励提出此 JSR 的 Sun 开发者加入已在领导 Struts 的 Sun 开发者行列，在 Apache
    创建一个开放的解决方案，这样完成后就能确保以开源方式实现。*


    最终，这场冲突得以解决：大约一年后，规范负责人 Amy Fowler（以 Swing 闻名）被 Craig McClanahan 取代，而 Craig McClanahan
    正是据称与 Jakarta Faces 竞争的 Struts 项目的创始人。同时，开源限制也被解除，名为 MyFaces 的开源 Jakarta Faces
    实现与（当时尚未命名的）参考实现及规范本身并行开发。MyFaces 最初于 2002 年 12 月在[`http://sourceforge.net`](http://sourceforge.net)上作为一个
    LGPL 许可的项目启动，并于 2003 年 1 月发布了符合当时所谓“早期访问规范”的 0.1 版本。


    开源实现是 Jakarta EE 8 中最常见的实现方式，而在撰写本书时（2018 年），几乎没有任何 EE 规范仍以闭源方式实现。然而在 2001 年，这不仅是罕见的，而且对于新的
    JSR 来说实际上是不被允许的。因此，允许开源实现是一个相当大的变革，而 Jakarta Faces 有幸成为首个获此许可的规范。


    尽管允许开源实现，但规范的实际开发仍然秘密进行，不对外公开。没有公开的邮件列表，也没有供公众提交问题或表达愿望的跟踪系统（例如 JIRA 实例）。偶尔会有一些采访，例如在
    2002 年秋季，时任前规范负责人 Amy Fowler 确实透露了关于 Jakarta Faces 的不少细节，但总体而言，该项目对公众来说仍笼罩在神秘之中。'
- fmt: 'The team behind Jakarta Faces was, however, hard at work. The first email
    to the internal JSR 127 list was sent on August 17, 2001. As with most projects,
    the team spent the initial months on gathering requirements and looking at the
    existing competing products. A package name was chosen as well. The initial placeholder
    package, which was `javax.servlet.ui`, now `javax.faces`, was chosen as the package
    to use. The very first technical architecture to be considered was the component
    model. For a component-based MVC framework, this is obviously one of the most
    important aspects. During the last month of 2001 and the first two months of 2002,
    the team looked at what is now known as the Managed Bean (called `Object Manager`
    then). Managed beans with their scopes, names, and dependency injection are clearly
    another cornerstone of the Jakarta Faces framework. Events and the model behind
    it were being looked at as well during that time frame.


    In the second quarter of 2002, two other cornerstones of Jakarta Faces were discussed:
    the Expression Language (inspired by Jakarta Tags), which is instrumental for
    the so-called bindings of beans from a template to backing code, and the factory
    finder, which allowed key parts of Jakarta Faces to be replaced and, although
    perhaps not fully realized at the time, may have contributed greatly to Jakarta
    Faces still being relevant some 16 years later.


    It was in this same quarter that Craig McClanahan took over as spec lead, father
    of Struts and architect of Tomcat’s Servlet container. Not long after the discussion
    about using Jakarta Pages started, a discussion, perhaps unbeknownst to the team
    at the time, that would, unfortunately, have a rather negative impact on Jakarta
    Faces later on. Around the end of the year 2002, Ed Burns, who like McClanahan
    had also worked on Tomcat before, joined the team as co-spec lead. Burns is the
    person who would eventually become the main spec lead of Jakarta Faces for well
    over a decade.


    While the team continued to work on things like the aforementioned managed beans
    and the so-called value binding, which is the Java representation of the also
    aforementioned expression language binding, the first dark cloud appeared when
    in the spring of 2003, team member Hans Bergsten realized that there were very
    real and major issues with using Jakarta Pages as the templating language for
    Jakarta Faces. He brought these concerns to the team, but ultimately they weren’t
    addressed and instead the following months were spent, among other things, on
    a variant of the value binding; it later on became clear that the method binding
    and the state saving mechanism were another of Jakarta Faces’s less-than-ideal
    implementations.


    Jakarta Faces 1.0 and its still nameless RI were eventually released on March
    11, 2004—coincidentally, a mere two weeks before the release of another framework
    that’s still strong today, Spring 1.0. MyFaces released its 1.0.0 alpha version
    only days later, on March 19. It’s perhaps an interesting observation that Jakarta
    Faces went final with a full-fledged XML-based dependency injection (DI) framework
    just before Spring, which is largely known for its DI, went final.


    Jakarta Faces 1.0 was generally well received; despite a rather crowded market
    with competitors such as Tapestry, WebObjects, Velocity, and Cocoon operating,
    not less than three books from writers such as Horst Caymann and Hans Bergsten
    appeared in the months after, and the eXo platform (a Digital Collaboration Platform)
    started using Jakarta Faces right away.


    Hans Bergsten’s earlier concerns, however, became painfully clear almost just
    as quickly; the Jakarta Pages technology is based on processing a template from
    start to end, immediately writing to the response as tags are encountered. Jakarta
    Faces, however, requires a phased approach where components need to be able to
    inspect and act on the component tree, which is built from the tags on the page,
    before starting to write anything to the response. This mismatch led to many strange
    issues, such as content disappearing or being rendered out of order.


    Only three months after the introduction of Jakarta Faces, Hans Bergsten made
    a strong case of dropping Jakarta Pages in his legendary article “Improving Jakarta
    Faces by Dumping Jakarta Pages.” There, Bergsten explains how ill-suited Jakarta
    Pages is for use as a template language in Jakarta Faces, but he also presents
    a glimmer of hope; because of Jakarta Faces’s great support for extendibility,
    it’s relatively easy to introduce alternative templating simply by replacing the
    so-called view handler, something which Jakarta Faces explicitly allows. It would,
    however, take five long years until Jakarta Faces would indeed ship with a more
    suitable view templating language, and even though Jakarta Pages had been essentially
    deprecated at that point, it’s still present in Jakarta Faces at the time of writing.'
