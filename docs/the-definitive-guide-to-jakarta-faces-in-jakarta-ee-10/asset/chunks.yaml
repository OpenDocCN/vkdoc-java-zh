    HTTP 请求 URI。换句话说，当你通过 `http://example.com/project/page.xhtml` 请求一个 Jakarta Faces
    页面时，表单将提交到完全相同的 `http://example.com/project/page.xhtml` URI。这在 Web 开发术语中被称为“回发”。当
    Jakarta Faces 需要处理一个传入的回发请求时，恢复视图阶段（第一阶段）将在视图构建时间之后，从 `jakarta.faces.ViewState`
    HTTP 请求参数中提取视图状态，并将所有已更改的属性恢复到当前请求中新创建的 `UIComponent` 实例中，以便组件树最终能够精确反映与先前请求的视图渲染期间完全相同的状态。


    在一般的 Jakarta Faces Web 应用程序中，保存的视图状态的主要部分由实现 `jakarta.faces.component.EditableValueHolder`
    接口的 `UIComponent` 实例的内部属性表示，^(⁵) 这涵盖了所有 `UIInput` 组件，例如 `<h:inputText>`。当提交 Jakarta
    Faces 表单因转换或验证错误而失败时，所有已更改的“是否有效？”状态和“本地值”状态（可以是提交的字符串值，也可以是已转换并验证的值）都将为所有涉及的
    `UIInput` 组件保存在视图状态中。这样做的一个主要优点是，开发人员无需担心手动跟踪这些状态，以便在向网站用户重新呈现提交的表单时保留所有有效和无效的值，同时使模型（受管
    bean 属性）完全不受这些值的影响。这对于 Jakarta Faces 开发人员和网站用户来说都是一个主要的可用性优势。


    保存的视图状态中的一小部分由对组件树层次结构或组件属性的程序化更改表示。其中，对 `readonly`、`disabled` 和 `rendered` 属性的任何程序化更改都会被跟踪在视图状态中，这样黑客就没有机会以某种方式伪造请求，使这些属性翻转到错误的一侧，从而让黑客可能执行潜在的危险操作。这是一个主要的安全优势。


    视图作用域

    Jakarta Faces 所基于的 Servlet API（以及其他技术）提供了三个定义明确的作用域：请求作用域、会话作用域和应用作用域。基本上，请求作用域是通过将目标对象存储为
    `HttpServletRequest` 的一个属性来建立的。类似地，会话作用域是通过将目标对象存储为 `HttpSession` 的一个属性来建立的，而应用作用域是通过将目标对象存储为
    `ServletContext` 的一个属性来建立的。

    Jakarta Faces 在此基础上增加了一个作用域，即视图作用域。这不能与组件树本身混淆。组件树（物理上的 `UIViewRoot` 实例）在同一个 HTTP
    请求期间被创建和销毁，因此显然是请求作用域的。视图作用域也不能与视图状态混淆，尽管它们密切相关。

    当最终用户在 Jakarta Faces 表单上触发回发请求，并且应用程序不执行任何类型的导航（即，操作方法返回 `null` 或 `void`）时，视图状态标识符将保持不变，并且视图作用域的生命周期将延长到下一个回发请求，直到应用程序执行显式导航，或者
    HTTP 会话过期。你可以通过将目标对象存储为 `UIViewRoot#getViewMap()` 的一个条目来建立视图作用域。这正是 Jakarta Faces
    存储其 `@ViewScoped` 受管 bean 的地方。不，这个映射不会反过来存储在视图状态中，即使 Jakarta Faces 状态保存方法被显式设置为“客户端”也是如此。整个视图作用域存储在
    HTTP 会话中，与视图状态分开。只有视图作用域标识符存储在视图状态中。只有 `UIViewRoot` 实例的已更改属性存储在视图状态中。


    阶段事件

    `jakarta.faces.event.PhaseListener` 接口^(⁶) 可用于监听 Jakarta Faces 生命周期的任何阶段。该接口定义了三个方法：`getPhaseId()`，它应返回你感兴趣的阶段；`beforePhase()`，它将在指定阶段执行之前被调用；以及
    `afterPhase()`，它将在指定阶段执行之后被调用。在 `beforePhase()` 和 `afterPhase()` 方法中，你因此有机会在 `getPhaseId()`
    指定的阶段之前或之后运行一些代码。


    `jakarta.faces.event.PhaseId` 类^(⁷) 定义了一组公共常量。它仍然可以追溯到 Jakarta Faces 1.0，该版本仅在
    Java 1.5 发布前几个月发布，因此为时已晚，无法成为真正的 `enum`。以下是这些常量及其序数值：


    *   `PhaseId.ANY_PHASE` (0)

    *   `PhaseId.RESTORE_VIEW` (1)

    *   `PhaseId.APPLY_REQUEST_VALUES` (2)

    *   `PhaseId.PROCESS_VALIDATIONS` (3)

    *   `PhaseId.UPDATE_MODEL_VALUES` (4)

    *   `PhaseId.INVOKE_APPLICATION` (5)

    *   `PhaseId.RENDER_RESPONSE` (6)


    阶段监听器实例可以通过多种方式注册。声明式地，它们可以通过 `faces-config.xml` 在整个应用程序范围内注册：


    ```

    com.example.project.YourListener


    ```


    或者通过 `<f:view>` 内的 `<f:phaseListener>` 标签在整个视图范围内注册：


    ```


    ...


    ```


    编程式地，它们可以通过当前使用的 `jakarta.faces.lifecycle.Lifecycle` 实例的 `addPhaseListener()`
    和 `removePhaseListener()` 方法在整个应用程序范围内添加和移除。^(⁸)


    ```

    FacesContext context = FacesContext.getCurrentInstance();

    Lifecycle lifecycle = context.getLifecycle();

    lifecycle.addPhaseListener(new YourListener());

    ```


    并且它们可以通过 `UIViewRoot` 的 `addPhaseListener()` 和 `removePhaseListener()` 方法在整个视图范围内添加和移除。


    ```

    FacesContext context = FacesContext.getCurrentInstance();

    UIViewRoot viewRoot = context.getViewRoot();

    viewRoot.addPhaseListener(new YourListener());

    ```

