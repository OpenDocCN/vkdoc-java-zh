- fmt: '# 排版后的内容


    Altogether the impact of all those fixes and new features was such that it split
    the community essentially in two; those who had used Jakarta Faces 1.x and never
    looked at it again and those who switched to Jakarta Faces 2.x or, specifically,
    the ones who started using Jakarta Faces with 2.0 and never saw 1.x. This often
    led to heated debates, with the 1.x side arguing that Jakarta Faces is horrible
    and the 2.x side not understanding at all why that would be the case. Even at
    the time of this writing, which is almost 9 years after Jakarta Faces 2.0 was
    released, and a longer period than Jakarta Faces 1.x ever existed, these sentiments
    still remain to some degree.


    Despite the many things that Jakarta Faces 2.0 did right, there was one missed
    opportunity; even though CDI was now available and superseded Jakarta Faces’s
    Managed Beans, Jakarta Faces chose not to deprecate its managed bean facility
    right away. Even worse, it introduced an annotation-based alternative to the XML-based
    system Jakarta Faces 1.x used to define managed beans. With CDI already out there
    having annotations like `javax.enterprise.context.RequestScoped`, simultaneously
    introducing a `javax.faces.bean.RequestScoped` annotation that did exactly the
    same thing seems debatable as best. The EG seemed to be aware of this conflict,
    as a warning was put in place that these new annotations would possibly be superseded
    by platform functionality before long.


    On December 23, Cay Horstmann raised his concerns about this very unwanted situation
    in an article titled “Is `@javax.faces.bean.ManagedBean` Dead on Arrival?” The
    response was quite clear; people, including Jakarta EE book writer Antonio Goncalves,
    asked for this huge mistake that Jakarta Faces 2.0 had made to be corrected as
    soon as possible and to deprecate `javax.faces.bean.ManagedBean` right away in
    the upcoming Jakarta Faces 2.1 maintenance release which was called for, among
    other things, to rectify another mistake (namely, the problem Jakarta Faces 2.0
    introduced that in addition to a custom `ResourceResolver`, it was also necessary
    to provide a custom `ExternalContext`, which was very unclear). Why `javax.faces.bean.ManagedBean`
    indeed wasn’t deprecated in the Jakarta Faces 2.1 MR remains a mystery to this
    day.


    While applications written against the Jakarta Faces 1.x APIs would mostly run
    unchanged on Jakarta Faces 2.0, or only needed a few small changes, the component
    libraries had a much harder time. Specifically, the platform-provided AJAX support
    meant that the existing component libraries would have to forego their own AJAX
    implementations and rebase on the standard APIs. Clearly, that was no small feat,
    and it took a long time for component libraries to migrate, with some never really
    making the switch at all.


    Here, PrimeFaces was clearly at an advantage. Being a relatively new library without
    much legacy, it could switch with much ease, while RichFaces and ICEfaces struggled
    a lot. For a year, PrimeFaces was really the only component library available
    for Jakarta Faces 2. PrimeFaces’ ascension in popularity started right after Jakarta
    Faces 2.0 was released, which was also the exact same time that both ICEfaces
    and RichFaces seemed to become less popular. Although it must be noted that hard
    statistics are difficult to obtain and contain many facets (downloads, deployments,
    books, questions asked, available jobs, taking different industries into account,
    etc.), somewhere around 2012, PrimeFaces had seemingly become the more popular
    Jakarta Faces component library.


    A year earlier, in March 2011, a German software developer working for Samhammer
    AG named Thomas Andraschko started a project that provided several add-ons for
    PrimeFaces, called PrimeFaces Extensions. Andraschko would later play a very important
    role in Jakarta Faces.


    In the beginning of that same year, February 19, 2012, Arjan Tijms and Bauke Scholtz
    (by coincidence also the authors of this book) started the OmniFaces library for
    Jakarta Faces. The goal of OmniFaces was to be a utility library for Jakarta Faces,
    essentially what Apache Commons and Google Guava are to Java SE. Tijms and Scholtz
    had worked on a Jakarta Faces-based website together and found that they both
    had a collection of private Jakarta Faces utilities that they reused for different
    projects and also that a great number of similar utilities were essentially rewritten
    again and again for many Jakarta Faces projects and were partially floating around
    in places like forum messages and blog posts. OmniFaces was set up in particular
    not to compete component libraries like PrimeFaces but to work together with those.
    Hence, visual-oriented components were largely out of scope for OmniFaces.


    In 2012, the specification process for Jakarta Faces 2.2 was also in full swing.
    Jakarta Faces 2.2 was eventually released on May 21, the next year. Jakarta Faces
    2.2 specifically came up with a formal version of the alternative mode in which
    Facelets could operate; instead of putting component tags on a view, plain HTML
    was put on it, with a special ID linking the tag to a component. Such a mode is
    generally speaking somewhat less interesting to Jakarta Faces developers but appeals
    specifically to web designers who can more easily use plain HTML tools for such
    views. Jakarta Faces 2.2 also introduced a CDI-compatible `@ViewScoped` annotation,
    which removed one of the last reasons to still use the Jakarta Faces managed bean
    facility in Jakarta Faces 2.1, namely, that in that version, `@ViewScoped` only
    worked on those beans. Jakarta Faces 2.2 also introduced two new big features,
    Faces Flow and Resource Contracts, but these seem to have seen little uptake in
    practice.


    On January 2013, Çağatay Çivici announced that Thomas Andraschko had joined the
    PrimeFaces team as a committer. Not long after, Andraschko would become the community
    lead for PrimeFaces and one of the top committers for that project.


    Just prior to the start of Jakarta Faces 2.3, on July 20, 2014, RichFaces lead
    Brian Leathem announced on his blog that RichFaces 5, the next-generation version
    of RichFaces, would be canceled. Instead, RichFaces would “pursue a path of stability
    over innovation,” which means that JBoss will make RichFaces 4.x compatible with
    Jakarta Faces 2.2 and port back a few things that were in development for RichFaces
    5. While the post was somewhat optimistic, it strongly looked like the writing
    was on the wall for RichFaces.


    On August 26, 2014, the specification work for Jakarta Faces 2.3 started. A new
    co-spec lead was introduced—Manfred Riem, who up to then had been working mostly
    on the implementation side of Mojarra, doing such things as migrating hundreds
    of the tests for which Jakarta Faces is famous away from the ancient and retired
    Cactus framework to a more modern Maven-based one and making sure the gazillions
    of open Mojarra issues were reduced to a manageable number. Jakarta Faces 2.3
    started off with a perhaps somewhat remarkable message that Oracle had only a
    few resources available. During the specification process, those few resources
    dropped to a number that few would have expected—absolutely zero. Basically, after
    JavaOne 2015, nearly all of the spec leads just vanished, and most specs as a
    result abruptly ground to a halt. Josh Juneau reported about this in his famous
    study, “Jakarta EE 8, What Is the Current Status: Case Study for Completed Work
    Since Late 2015,” which undeniably makes it clear by showing graphs of emails,
    commits, and issues resolved that Oracle had just walked away.


    The openness of the Jakarta Faces and its RI Mojarra were fortunately such that
    the specification work and implementation thereof in Mojarra can largely be carried
    on by the other EG members, which indeed happens.'
  raw: 'Altogether the impact of all those fixes and new features was such that it
    split the community essentially in two; those who had used Jakarta Faces 1.x and
    never looked at it again and those who switched to Jakarta Faces 2.x or, specifically,
    the ones who started using Jakarta Faces with 2.0 and never saw 1.x. This often
    led to heated debates, with the 1.x side arguing that Jakarta Faces is horrible
    and the 2.x side not understanding at all why that would be the case. Even at
    the time of this writing, which is almost 9 years after Jakarta Faces 2.0 was
    released, and a longer period than Jakarta Faces 1.x ever existed, these sentiments
    still remain to some degree.


    Despite the many things that Jakarta Faces 2.0 did right, there was one missed
    opportunity; even though CDI was now available and superseded Jakarta Faces’s
    Managed Beans, Jakarta Faces chose not to deprecate its managed bean facility
    right away. Even worse, it introduced an annotation-based alternative to the XML-based
    system Jakarta Faces 1.x used to define managed beans. With CDI already out there
    having annotations like `javax.enterprise.context.RequestScoped`, simultaneously
    introducing a `javax.faces.bean.RequestScoped` annotation that did exactly the
    same thing seems debatable as best. The EG seemed to be aware of this conflict,
    as a warning was put in place that these new annotations would possibly be superseded
    by platform functionality before long.


    On December 23, Cay Horstmann raised his concerns about this very unwanted situation
    in an article titled “Is `@javax.faces.bean.ManagedBean` Dead on Arrival?” The
    response was quite clear; people, including Jakarta EE book writer Antonio Goncalves,
    asked for this huge mistake that Jakarta Faces 2.0 had made to be corrected as
    soon as possible and to deprecate `javax.faces.bean.ManagedBean` right away in
    the upcoming Jakarta Faces 2.1 maintenance release which was called for, among
    other things, to rectify another mistake (namely, the problem Jakarta Faces 2.0
    introduced that in addition to a custom `ResourceResolver`, it was also necessary
    to provide a custom `ExternalContext`, which was very unclear). Why `javax.faces.bean.ManagedBean`
    indeed wasn’t deprecated in the Jakarta Faces 2.1 MR remains a mystery to this
    day.


    While applications written against the Jakarta Faces 1.x APIs would mostly run
    unchanged on Jakarta Faces 2.0, or only needed a few small changes, the component
    libraries had a much harder time. Specifically, the platform-provided AJAX support
    meant that the existing component libraries would have to forego their own AJAX
    implementations and rebase on the standard APIs. Clearly, that was no small feat,
    and it took a long time for component libraries to migrate, with some never really
    making the switch at all.


    Here, PrimeFaces was clearly at an advantage. Being a relatively new library without
    much legacy, it could switch with much ease, while RichFaces and ICEfaces struggled
    a lot. For a year, PrimeFaces was really the only component library available
    for Jakarta Faces 2\. PrimeFaces’ ascension in popularity started right after
    Jakarta Faces 2.0 was released, which was also the exact same time that both ICEfaces
    and RichFaces seemed to become less popular. Although it must be noted that hard
    statistics are difficult to obtain and contain many facets (downloads, deployments,
    books, questions asked, available jobs, taking different industries into account,
    etc.), somewhere around 2012, PrimeFaces had seemingly become the more popular
    Jakarta Faces component library.


    A year earlier, in March 2011, a German software developer working for Samhammer
    AG named Thomas Andraschko started a project that provided several add-ons for
    PrimeFaces, called PrimeFaces Extensions. Andraschko would later play a very important
    role in Jakarta Faces.


    In the beginning of that same year, February 19, 2012, Arjan Tijms and Bauke Scholtz
    (by coincidence also the authors of this book) started the OmniFaces library for
    Jakarta Faces. The goal of OmniFaces was to be a utility library for Jakarta Faces,
    essentially what Apache Commons and Google Guava are to Java SE. Tijms and Scholtz
    had worked on a Jakarta Faces-based website together and found that they both
    had a collection of private Jakarta Faces utilities that they reused for different
    projects and also that a great number of similar utilities were essentially rewritten
    again and again for many Jakarta Faces projects and were partially floating around
    in places like forum messages and blog posts. OmniFaces was set up in particular
    not to compete component libraries like PrimeFaces but to work together with those.
    Hence, visual-oriented components were largely out of scope for OmniFaces.


    In 2012, the specification process for Jakarta Faces 2.2 was also in full swing.
    Jakarta Faces 2.2 was eventually released on May 21, the next year. Jakarta Faces
    2.2 specifically came up with a formal version of the alternative mode in which
    Facelets could operate; instead of putting component tags on a view, plain HTML
    was put on it, with a special ID linking the tag to a component. Such a mode is
    generally speaking somewhat less interesting to Jakarta Faces developers but appeals
    specifically to web designers who can more easily use plain HTML tools for such
    views. Jakarta Faces 2.2 also introduced a CDI-compatible `@ViewScoped` annotation
    , which removed one of the last reasons to still use the Jakarta Faces managed
    bean facility in Jakarta Faces 2.1, namely, that in that version, `@ViewScoped`
    only worked on those beans. Jakarta Faces 2.2 also introduced two new big features,
    Faces Flow and Resource Contracts, but these seem to have seen little uptake in
    practice.


    On January 2013, Çağatay Çivici announced that Thomas Andraschko had joined the
    PrimeFaces team as a committer. Not long after, Andraschko would become the community
    lead for PrimeFaces and one of the top committers for that project.


    Just prior to the start of Jakarta Faces 2.3, on July 20, 2014, RichFaces lead
    Brian Leathem announced on his blog that RichFaces 5, the next-generation version
    of RichFaces, would be canceled. Instead, RichFaces would “pursue a path of stability
    over innovation,” which means that JBoss will make RichFaces 4.x compatible with
    Jakarta Faces 2.2 and port back a few things that were in development for RichFaces
    5. While the post was somewhat optimistic, it strongly looked like the writing
    was on the wall for RichFaces.


    On August 26, 2014, the specification work for Jakarta Faces 2.3 started. A new
    co-spec lead was introduced—Manfred Riem, who up to then had been working mostly
    on the implementation side of Mojarra, doing such things as migrating hundreds
    of the tests for which Jakarta Faces is famous away from the ancient and retired
    Cactus framework to a more modern Maven-based one and making sure the gazillions
    of open Mojarra issues were reduced to a manageable number. Jakarta Faces 2.3
    started off with a perhaps somewhat remarkable message that Oracle had only a
    few resources available. During the specification process, those few resources
    dropped to a number that few would have expected—absolutely zero. Basically, after
    JavaOne 2015, nearly all of the spec leads just vanished, and most specs as a
    result abruptly ground to a halt. Josh Juneau reported about this in his famous
    study, “Jakarta EE 8, What Is the Current Status: Case Study for Completed Work
    Since Late 2015,” which undeniably makes it clear by showing graphs of emails,
    commits, and issues resolved that Oracle had just walked away.


    The openness of the Jakarta Faces and its RI Mojarra were fortunately such that
    the specification work and implementation thereof in Mojarra can largely be carried
    on by the other EG members, which indeed happens.'
  trans: '

    所有这些修复和新功能的综合影响，实际上将社区分成了两派：一派是那些使用过 Jakarta Faces 1.x 后就再未关注过它的人，另一派则是转向 Jakarta
    Faces 2.x 的人，或者更具体地说，是从 2.0 开始使用 Jakarta Faces 而从未接触过 1.x 的人。这常常引发激烈的争论，1.x 一方认为
    Jakarta Faces 很糟糕，而 2.x 一方则完全无法理解为何会如此。即使在撰写本文时（距离 Jakarta Faces 2.0 发布已近 9 年，比
    Jakarta Faces 1.x 存在的整个时期还要长），这些情绪在某种程度上依然存在。


    尽管 Jakarta Faces 2.0 做了很多正确的事情，但有一个错失的良机：即使 CDI 已经可用并取代了 Jakarta Faces 的托管 Bean，Jakarta
    Faces 却选择不立即弃用其托管 Bean 功能。更糟糕的是，它引入了一种基于注解的替代方案，取代了 Jakarta Faces 1.x 用于定义托管 Bean
    的基于 XML 的系统。既然 CDI 已经提供了像 `javax.enterprise.context.RequestScoped` 这样的注解，同时又引入一个功能完全相同的
    `javax.faces.bean.RequestScoped` 注解，这充其量只能说是值得商榷的。专家组似乎意识到了这种冲突，因此设置了一个警告，称这些新注解可能很快就会被平台功能所取代。


    2012 年 12 月 23 日，Cay Horstmann 在一篇题为“`@javax.faces.bean.ManagedBean` 是否一出生就已死亡？”的文章中表达了他对这种非常不受欢迎情况的担忧。回应非常明确：包括
    Jakarta EE 书籍作者 Antonio Goncalves 在内的人们，要求尽快纠正 Jakarta Faces 2.0 犯下的这个巨大错误，并在即将到来的
    Jakarta Faces 2.1 维护版本中立即弃用 `javax.faces.bean.ManagedBean`。该维护版本被呼吁，除其他事项外，也是为了纠正另一个错误（即
    Jakarta Faces 2.0 引入的问题：除了自定义 `ResourceResolver` 之外，还必须提供一个自定义的 `ExternalContext`，这一点非常不明确）。为什么
    `javax.faces.bean.ManagedBean` 最终没有在 Jakarta Faces 2.1 MR 中被弃用，至今仍是一个谜。


    虽然针对 Jakarta Faces 1.x API 编写的应用程序大多可以在 Jakarta Faces 2.0 上不加修改地运行，或者只需要进行少量更改，但组件库却经历了更艰难的时期。具体来说，平台提供的
    AJAX 支持意味着现有的组件库必须放弃自己的 AJAX 实现，转而基于标准 API。显然，这绝非易事，组件库的迁移花费了很长时间，有些甚至从未真正完成切换。


    在这方面，PrimeFaces 显然具有优势。作为一个相对较新、没有太多历史包袱的库，它可以轻松切换，而 RichFaces 和 ICEfaces 则举步维艰。有一段时间，PrimeFaces
    实际上是 Jakarta Faces 2 唯一可用的组件库。PrimeFaces 的流行度飙升始于 Jakarta Faces 2.0 发布之后，而这恰好也是
    ICEfaces 和 RichFaces 似乎开始变得不那么流行的时候。尽管必须指出，很难获得确切的统计数据，并且这些数据包含许多方面（下载量、部署量、书籍、提问数量、可用职位、考虑不同行业等），但在
    2012 年左右，PrimeFaces 似乎已经成为更受欢迎的 Jakarta Faces 组件库。


    一年前，即 2011 年 3 月，一位在 Samhammer AG 工作的德国软件开发人员 Thomas Andraschko 启动了一个为 PrimeFaces
    提供多个附加组件的项目，名为 PrimeFaces Extensions。Andraschko 后来在 Jakarta Faces 中扮演了非常重要的角色。


    同年年初，即 2012 年 2 月 19 日，Arjan Tijms 和 Bauke Scholtz（巧合的是，他们也是本书的作者）启动了 Jakarta
    Faces 的 OmniFaces 库。OmniFaces 的目标是成为 Jakarta Faces 的一个实用工具库，本质上就像 Apache Commons
    和 Google Guava 之于 Java SE 一样。Tijms 和 Scholtz 曾共同开发过一个基于 Jakarta Faces 的网站，他们发现两人都有一套私有的
    Jakarta Faces 实用程序，并在不同项目中重复使用，而且大量类似的实用程序在许多 Jakarta Faces 项目中基本上被一遍又一遍地重写，部分散落在论坛消息和博客文章等地方。OmniFaces
    的建立尤其不是为了与 PrimeFaces 等组件库竞争，而是为了与它们协同工作。因此，面向视觉的组件在很大程度上不在 OmniFaces 的范围内。


    2012 年，Jakarta Faces 2.2 的规范制定工作也如火如荼地进行着。Jakarta Faces 2.2 最终于次年 5 月 21 日发布。Jakarta
    Faces 2.2 特别提出了 Facelets 可以运行的替代模式的正式版本；不是在视图上放置组件标签，而是放置纯 HTML，并通过一个特殊的 ID 将标签链接到组件。这种模式一般来说对
    Jakarta Faces 开发者的吸引力稍小，但特别吸引那些可以为此类视图更轻松地使用纯 HTML 工具的网页设计师。Jakarta Faces 2.2
    还引入了一个兼容 CDI 的 `@ViewScoped` 注解，这消除了在 Jakarta Faces 2.1 中仍然使用 Jakarta Faces 托管
    Bean 功能的最后一个理由之一，即在该版本中，`@ViewScoped` 仅适用于那些 Bean。Jakarta Faces 2.2 还引入了两个重要的新特性：Faces
    Flow 和 Resource Contracts，但这些特性在实践中似乎很少被采用。


    2013 年 1 月，Çağatay Çivici 宣布 Thomas Andraschko 已作为提交者加入 PrimeFaces 团队。不久之后，Andraschko
    成为 PrimeFaces 的社区负责人和该项目的顶级提交者之一。


    就在 Jakarta Faces 2.3 启动之前，2014 年 7 月 20 日，RichFaces 负责人 Brian Leathem 在他的博客上宣布，RichFaces
    的下一代版本 RichFaces 5 将被取消。取而代之的是，RichFaces 将“走一条稳定而非创新的道路”，这意味着 JBoss 将使 RichFaces
    4.x 与 Jakarta Faces 2.2 兼容，并移植回一些为 RichFaces 5 开发的功能。虽然这篇博文有些乐观，但看起来 RichFaces
    的结局已定。


    2014 年 8 月 26 日，Jakarta Faces 2.3 的规范制定工作启动。引入了一位新的联合规范负责人——Manfred Riem，他此前主要致力于
    Mojarra 的实现方面，例如将 Jakarta Faces 闻名的数百个测试从古老且已退役的 Cactus 框架迁移到更现代的基于 Maven 的框架，并确保将大量的
    Mojarra 未解决问题减少到可控数量。Jakarta Faces 2.3 的启动伴随着一个或许有些引人注目的消息：Oracle 只有很少的资源可用。在规范制定过程中，这些少量的资源减少到了几乎无人预料到的数字——绝对为零。基本上，在
    2015 年 JavaOne 大会之后，几乎所有规范的负责人都不见了，导致大多数规范工作突然停滞。Josh Juneau 在他著名的研究报告“Jakarta
    EE 8，当前状态如何：自 2015 年底以来已完成工作的案例研究”中报道了这一点，该报告通过展示电子邮件、提交和已解决问题的图表，无可辩驳地表明 Oracle
    已经撒手不管了。


    幸运的是，Jakarta Faces 及其参考实现 Mojarra 的开放性使得规范制定工作及其在 Mojarra 中的实现很大程度上可以由其他 EG 成员继续进行，事实也确实如此。

    '
- fmt: '# 排版后的内容


    Also helping the Jakarta Faces 2.3 efforts and Mojarra was Andraschko, who, in
    addition to a PrimeFaces committer, had also become a MyFaces committer in July
    2015. Andraschko donated a standardized version of the PrimeFaces search expression
    feature to Jakarta Faces 2.3 and Mojarra.


    Meanwhile on February 12, 2016, Red Hat announced that RichFaces would be end
    of lived (EOL) later that year, namely, in June 2016. One of the most popular
    Jakarta Faces component libraries at some point, often named something like "One
    of the big three," effectively was no more. On June 20, 2016, the last real commit
    to the project was done, "RF-14279: update JSDoc." Two days later, Red Hat released
    RichFaces 4.5.17, and the GitHub repos were put into archived (read only) mode.
    Brian Leathem, who is still a Jakarta Faces 2.3 EG member, announced a few days
    later on February 18 that he would no longer be doing any Jakarta Faces-related
    work.


    ## Rejuvenation


    In late 2016, the Jakarta Faces spec leads briefly returned, but with the message
    that the spec must be completed in only a few weeks, so the (somewhat) lengthy
    finalization process could start. On March 28, 2017, Jakarta Faces 2.3 was then
    eventually released, bringing with it the start of replacing Jakarta Faces native
    artifacts with CDI versions and finally something which should have happened years
    ago: the deprecation of the Jakarta Faces managed bean facility in favor of using
    CDI beans. Other features are support for WebSocket using the Jakarta EE WebSocket
    APIs donated by OmniFaces, the introspection of available view resources in the
    system, and the abovementioned search expression framework donated by PrimeFaces.


    Following the somewhat turbulent development of the Jakarta Faces 2.3 spec is
    the even more turbulent announcement by Oracle in 2017 that Jakarta EE, thus including
    Jakarta Faces, would be transferred to the Eclipse Foundation. Oracle would stop
    leading the specs it owned before, which again includes Jakarta Faces. This would
    mean that Mojarra would be re-licensed, and Jakarta Faces would be evolved by
    a new process with different leads.


    The transition from Oracle to Eclipse was done in several steps. A new top-level
    project called Eclipse Enterprise for Java (EE4J) was created, and a snapshot
    of the Jakarta Faces 2.3 branch was scrubbed (legally speaking) and moved to a
    new GitHub repository at `http://github.com/eclipse-ee4j`. Only Jakarta Faces
    2.3 (and associated Mojarra 2.3) was moved, meaning Jakarta Faces 2.2 and earlier
    remained at their Oracle locations. This specifically meant the commit history
    wasn''t transferred. After this first step of the transfer, a new release of the
    API was done in January 2019 as `jakarta.faces:jakarta.faces-api:2.3.1`, which
    was mostly identical to the existing `javax.faces:javax.faces-api:2.3`. The license
    of both the API and the Mojarra implementation was changed to the Eclipse Public
    License 2.0. Arjan Tijms became the next project lead. Previous spec leads Ed
    Burns and Manfred Riem shortly after left Oracle to work at Microsoft. Riem, however,
    would stay involved with Jakarta Faces.


    The next step in the transfer process involved creating a new certification process
    and a new specification license. The JCP process was replaced by the Jakarta EE
    Specification Process (JESP), and the new specification license became the Eclipse
    Foundation Technology Compatibility Kit License (EFTL).


    Early in 2019, Tijms went to the Javaland conference in Germany, where he met
    up with Ivar Grimstad, the Jakarta EE Developer Advocate at the Eclipse Foundation.
    In the warm sun of the German afternoon, the two discussed a new naming scheme
    for the Jakarta EE specifications. New names were required, as the deal between
    Oracle and the Eclipse Foundation included an agreement to not use a number of
    names previously used by Oracle, such as Jakarta EE, Jakarta Faces, JavaServer
    Faces, and Jakarta Pages. Tijms proposed a simpler naming scheme, essentially
    abolishing as much of the various "filler words" (such as "service," "api," and
    "architecture") in the names, making cryptic abbreviations (like, indeed, Jakarta
    Faces) necessary. Ivar agreed with this, and in the following months, this naming
    scheme was introduced; code, documentations, and specifications were painstakingly
    combed through to find and replace occurrences of the old names with the new names.
    For Jakarta Faces, the name became "Faces," a logical choice, since from day one
    the package name had actually been `javax.faces.*`, not `javax.jsf.*`. The artifact
    id also had been "faces" for a long time.


    Later that year, in September 2019, the Faces 2.3.2 API was released as part of
    Jakarta EE 8. This API was again largely the same as the Jakarta Faces 2.3.1 API
    but now had all terms replaced by the new ones, and it was certified using the
    new JESP process.'
