    # 1. History


    This chapter describes the history of Jakarta Faces, starting from its early conception
    and ending where we are today at the moment of writing. We’ll discuss how the
    Jakarta Faces API (application programming interface) itself evolved, which important
    events took place during that evolution, and who some of the people were that
    were involved in all of this.


    This is in no way a complete description of the history, and the reader should
    take notice of the fact that many more events took place and many more people
    were involved than we were able to mention here.


    ## In the Beginning…


    Jakarta Faces goes back a long time. Its initial JSR, JSR 127, started in 2001.
    At that time, the Struts web framework was wildly popular, although it wasn’t
    that long ago that it was released itself (around 2000). Despite Struts’ popularity,
    a large number of other web frameworks were in use in the Java space, and new
    ones were popping up all the time. Jakarta Faces was conceived as an attempt to
    bring a standardized MVC (model-view-controller) web framework base into the overall
    Jakarta EE platform.


    Controversies are quite common in the web framework space, and Jakarta Faces is
    no exception here. Right at the start of its inception, there was a big controversy
    where Apache opposed the creation of Jakarta Faces on the bases that Apache Struts
    already existed and a closed source alternative would have little value. Apache
    therefore voted against the creation of Jakarta Faces with the following comment:


    > *This JSR conflicts with the Apache open source project Struts. Considering
    Sun’s current position that JSRs may not be independently implemented under an
    open source license, we see little value in recreating a technology in a closed
    environment that is already available in an open environment.*


    > *To the extent that this JSR extends beyond Struts today, we would encourage
    the Sun developers proposing this JSR to join the Sun developers already leading
    Struts to create an open solution at Apache, something which when finished would
    be assured of being able to be implemented as open source.*


    Eventually the conflict was resolved when after about a year into the process,
    spec lead Amy Fowler (from Swing fame) was replaced by Craig McClanahan, the very
    father of the Struts project that Jakarta Faces was said to be competing with.
    The open source restriction was lifted as well, and the open source Jakarta Faces
    implementation, called MyFaces, was developed in parallel with the (then nameless)
    RI and hence the specification itself. MyFaces initially started as an LGPL licensed
    project at [`http://sourceforge.net`](http://sourceforge.net) in December 2002
    and had an initial 0.1 release conforming to what was then called an “Early Access
    Specification” in January 2003.


    Open source implementations are the most common implementations in Jakarta EE
    8, and there’s barely any EE specification at the time of this writing (2018)
    that’s still implemented as closed source. In 2001, however, this was not just
    uncommon; it was actually not allowed for new JSRs. Allowing for an open source
    implementation was therefore quite a change, and the honor fell to Jakarta Faces
    to be the first of its kind for which this was allowed.


    Despite the open source implementation being allowed, the actual development of
    the spec was still done in secret and behind closed doors. There was no public
    mailing list and no tracker (e.g., a JIRA instance) for the public to create issues
    or express wishes. Occasionally, interviews were being done, and in the fall of
    2002, by then, former spec lead Amy Fowler did reveal quite a few details about
    Jakarta Faces, but largely the project was shrouded in mystery for the general
    public.'
