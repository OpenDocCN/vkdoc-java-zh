- fmt: '以下是排版后的 Markdown 文档：


    Those are thus the `<h:body>`, `<h:commandButton>`, `<h:commandLink>`, `<h:dataTable>`,
    `<h:form>`, `<h:graphicImage>`, `<h:inputFile>`, `<h:inputSecret>`, `<h:inputText>`,
    `<h:inputTextarea>`, `<h:button>`, `<h:link>`, `<h:outputLabel>`, `<h:outputLink>`,
    `<h:panelGrid>`, `<h:panelGroup>`, `<h:selectBooleanCheckbox>`, `<h:selectManyCheckbox>`,
    `<h:selectManyListbox>`, `<h:selectManyMenu>`, `<h:selectOneListbox>`, `<h:selectOneMenu>`,
    `<h:selectOneRadio>`, and `<f:websocket>`. You’ll see that all visible input,
    select, and command components are covered as well.


    A requirement of the `<f:ajax>` is that the `ClientBehaviorHolder` component is
    nested in `<h:form>` and that `<h:head>` is being used in the template. The `<h:form>`
    basically enables JavaScript to perform a postback request with the right Jakarta
    Faces view state associated. The `<h:head>` basically enables `<f:ajax>` to automatically
    include the necessary `faces.js` JavaScript file that contains, among others,
    the mandatory `faces.ajax.request()` function.


    Here’s an example:


    ```

    f:ajax demo

    ```


    Generated HTML output:


    ```

    f:ajax demo

    ```


    Rendering in Chrome browser (with newlines added) is identical as without Ajax:


    ![](images/454457_2_En_4_Chapter/454457_2_En_4_Figl_HTML.jpg)


    In the generated HTML output, you’ll see that the `faces.js` JavaScript file containing
    the necessary Jakarta Faces Ajax API is auto-included in the HTML head. You’ll
    also notice that `<f:ajax>` has generated in `<h:inputText>` an additional `onchange`
    attribute and in `<h:commandButton>` an additional `onclick` attribute, both defining
    some Jakarta Faces implementation–specific JavaScript code responsible for performing
    the Ajax request.


    Jakarta Faces specifies two internal Ajax event types: `valueChange` and `action`.
    Those are the default event types in case `<f:ajax>` doesn’t have the `event`
    attribute specified. When `<f:ajax>` is attached to a component implementing the
    `EditableValueHolder` interface, then the default event type becomes `valueChange`.
    For components implementing the `ActionSource` interface, this is `action`. For
    all other `ClientBehaviorHolder` components, the default event is `click`. The
    actual generated HTML DOM event type for those internal event types depends on
    the component and the associated renderer.


    In case of text input components and drop-down and list box selection components,
    the default HTML DOM event type for `<f:ajax>` is `"change"`. In case of check
    box and radio button selection components and command components, this is `"click"`.
    You can see this in the generated HTML output, which can be overridden by explicitly
    specifying the `event` attribute on the `<f:ajax>` tag.


    The preceding example will generate the JavaScript code in the `onblur` attribute
    instead of the `onclick` attribute. The supported values for the `event` attribute
    depend on the target `ClientBehaviorHolder` component. They can be found in the
    VDL documentation of the component of interest. All `on[event]` attributes are
    defined over there. When you remove the “`on`” prefix on them, then you have a
    list of supported event types. For example, the VDL documentation of `<h:inputText>`^([^(15)](#fn15))
    indicates that the following event types are supported:


    *   `blur`, `change`, `click`, `dblclick`, `focus`, `keydown`, `keypress`, `keyup`,
    `mousedown`, `mousemove`, `mouseout`, `mouseover`, `mouseup`, `select`


    When the desired DOM event type occurs on the client side and triggers the associated
    Jakarta Faces implementation–specific JavaScript code defined in the `on[event]`
    attribute, then ultimately the `faces.ajax.request()` function of the standard
    Jakarta Faces JavaScript API will be invoked. It will prepare a bunch of predefined
    postback parameters of which `jakarta.faces.source` and `jakarta.faces.behavior.event`
    are the most important ones. The former specifies the client ID of the source
    component, essentially the value of `this.id` in JavaScript context. The latter
    specifies the event type, essentially the value of `event.type` in JavaScript
    context. You’ll have guessed that they are derived from the first two arguments
    passed to the Mojarra-specific `mojarra.ab()` function as visible in the generated
    HTML output.


    Once fired, the Ajax request will run through the Jakarta Faces life cycle almost
    the same way as a non-Ajax request. The restore view phase (first phase), process
    validations phase (third phase), update model values phase (fourth phase), and
    invoke application phase (fifth phase) are identical. The apply request values
    phase (second phase) is slightly different. It will only decode the components
    that are covered by the `execute` attribute of the `<f:ajax>` tag, which defaults
    to `@this` (“the current component”). The render response phase (sixth phase)
    is completely different. Instead of generating a whole HTML document, it generates
    a special XML document that contains only the generated HTML output of components
    that are covered by the `render` attribute of the `<f:ajax>` tag, which defaults
    to `@none` (“no one component”).


    The `execute` and `render` attributes of the `<f:ajax>` tag accept a space-separated
    collection of component search expressions. This can represent a client ID relative
    to the closest `NamingContainer` parent, or an absolute client ID that is always
    relative to the `UIViewRoot`, or standard or custom search keywords, or chained
    combinations thereof. See Chapter [12](#454457_2_En_12_Chapter.xhtml) for an in-depth
    explanation of them. For now, we only need to know about three standard search
    keywords: `@this`, `@form`, and `@none`. As its name suggests, the `@form` keyword
    refers to the closest parent component of the `UIForm` type, such as `<h:form>`.


    During the apply request values phase (second phase) of the Ajax request, Jakarta
    Faces will, for each component covered by the `execute` attribute of the `<f:ajax>`
    tag in addition to the default decode process, also check if the `jakarta.faces.source`
    request parameter equals the client ID of the current component. If so, then Jakarta
    Faces will queue the `AjaxBehaviorEvent` for the invoke application phase (fifth
    phase). Under the hood of queueing the `AjaxBehaviorEvent`, it boils down to the
    following logic:


    ```

    FacesContext context = FacesContext.getCurrentInstance();

    ExternalContext externalContext = context.getExternalContext();

    Map formData = externalContext.getRequestParameterMap();

    String clientId = component.getClientId(context);

    String source = formData.get("jakarta.faces.source");

    String event = formData.get("jakarta.faces.behavior.event");

    if (clientId.equals(source)) {

    component.getClientBehaviors().get(event)

    .forEach(clientBehavior -> component.queueEvent(

    new AjaxBehaviorEvent(context, component, clientBehavior)));

    }

    ```


    Here, the `ClientBehavior` basically represents the definition of the `<f:ajax>`
    tag. Based on this logic, you will conclude that you can have multiple `<f:ajax>`
    tags attached in the very same component, even on same event types. The advantage
    is that you can, if necessary, register multiple Ajax behavior listeners on the
    very same event type.'
