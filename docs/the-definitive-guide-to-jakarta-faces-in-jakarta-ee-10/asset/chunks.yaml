    基于面板的输出组件

    这些组件是 `<h:panelGroup>` 和 `<h:panelGrid>`，它们都继承自 `UIPanel` 超类。`<h:panelGroup>`
    具有多种职责。它可以生成 HTML 的 `<span>`、`<div>` 甚至 `<td>` 元素，具体取决于 `layout` 属性以及它是否被包含在 `<h:panelGrid>`
    中。


    默认情况下，`<h:panelGroup>` 仅生成一个 HTML `<span>` 元素，这与 `<h:outputText>` 完全相同。主要区别在于
    `<h:panelGroup>` 没有 `value` 属性。相反，其内容由其子元素表示。它也不支持禁用 HTML 转义或附加转换器。这些功能由任何 `<h:outputText>`
    子元素负责。在这种上下文中，它并不是特别有用。只有当您需要使用 `<f:ajax render>` 引用一个内联元素，而该元素又用于组合一组紧密相关的内联元素时，`<h:panelGroup>`
    才比 `<h:outputText>` 更有用。类似下面表示“用户资料”的代码，该资料应该可以通过页面下方某种用户资料编辑表单中的 Ajax 进行更新。


    ```

    欢迎，


    #{user.name}


    ...


    ...


    ...


    ```


    当将 `<h:panelGroup>` 的 `layout` 属性设置为 `block` 时，它将生成一个 HTML `<div>` 元素。在标准 HTML
    中，“内联元素”^(⁴⁸) 默认不会在新行开始，也不允许包含块级子元素。而“块级元素”^(⁴⁹) 默认总是在新行开始，并且允许包含内联和块级子元素。因此，`<h:panelGroup>`
    的 `layout` 属性支持的值是“`inline`”和“`block`”。从历史上看，`layout` 属性是在 Jakarta Faces 1.2 中才添加的，原因是
    Jakarta Faces 开发者抱怨缺少一个用于表示 HTML `<div>` 元素的 Jakarta Faces 组件。然后，这个组件可以用来包装需要
    Ajax 更新的较大块级区域；否则，一个普通的 HTML `<div>` 也足够了。


    ```


    欢迎，


    #{user.name}


    ```


    请注意，在 HTML 中，将块级元素嵌套在内联元素中是非法的。`<p>` 是一个块级元素，因此，在前面的结构中，`layout="block"` 是绝对必需的。如果您不指定此属性，从而让
    Jakarta Faces 渲染一个 HTML `<span>` 元素，那么 Web 浏览器的行为将是未指定的。普通的 Web 浏览器会将块级子元素渲染到内联元素之外，甚至可能在
    JavaScript 遍历此结构时出错，因为它不一定能在内联元素中找到预期的块级子元素。

    还要记住，在前面的结构中，`<p>` 标签和“欢迎”文本也会在对 `<h:panelGroup>` 执行任何 Jakarta Faces Ajax 更新操作时被更新。这本质上是对服务器端和客户端硬件资源的浪费，因为它们是静态的，永远不会发生变化。在进行
    Ajax 更新时，您最好确保 `<f:ajax render>` 只引用那些绝对需要 Ajax 更新的组件，而不是一个也包含静态部分的不必要的大区域。

    当 `<h:panelGroup>` 被嵌套在生成 HTML `<table>` 元素的 `<h:panelGrid>` 组件中时，`<h:panelGroup>`
    的 `layout` 属性将被忽略，该组件将基本上充当一个容器，用于容纳最终应位于表格同一单元格中的组件。也就是说，`<h:panelGrid>` 的渲染器会将每个直接子组件视为一个单独的表格单元格。


    给定以下两列的 `<h:panelGrid>`，它应该生成一个两列的 HTML 表格，您猜猜实际生成的 HTML 输出会是什么样子？


    ```

    一


    三

    四

    五

    六

    七


    八

    九


    ```


    两个 Jakarta Faces 组件之间的每一段模板文本在内部都被视为一个单独的 Jakarta Faces 组件。在 Mojarra 中，它由内部的 `UIInstructions`
    组件表示。在视图构建时间之后，实际的组件树层次结构大致如下所示：


    ```

    一


    三

    四


    五


    六

    七


    八

    九


    ```


    再次注意，Facelets 中没有像 `<ui:instructions>` 这样的组件。前面的标记纯粹是为了可视化实际的组件树层次结构，以便您的大脑更好地处理它。这个
    `<h:panelGrid>` 实际上有六个直接子组件，每个子组件都将位于自己的表格单元格中。对于两列，这将有效地生成三行。以下是实际生成的 HTML 输出（为便于阅读而重新格式化）。


    ```


    一

    二


    三 四

    五


    六 七

    八 九


    ```


    在 Chrome 浏览器中的渲染效果：

    ![](img/454457_2_En_6_Figb_HTML.jpg)


    您看，`<h:panelGroup>` 确保了“五”和“八 九”不会与“六 七”位于同一个表格单元格中。还要注意，如果某个 Jakarta Faces 组件已经代表一个单独的单元格，则无需将其包装在
    `<h:panelGroup>` 中。这就是为什么“二”后面的 `<h:outputText>` 不需要包装在 `<h:panelGroup>` 中。当然，您也可以这样做以提高源代码的可读性，但这在技术上是不必要的。以下带有显式
    `<h:panelGroup>` 声明的代码会生成完全相同的 HTML 输出，但毫无疑问，人类更容易解析它。


    ```


    一


    二


    三

    四


    五


    六

    七


    八

    九


    ```


    如果您碰巧需要基于视图作用域的可迭代模型来生成动态数量的单元格，那么您可以在 `<h:panelGrid>` 中嵌套 Jakarta 标签 `<c:forEach>`，以便将其生成为具有固定列数的数据网格。


    ```


    #{product.name}

    #{product.description}


    ```


    因此请注意，与 `<c:forEach>` 相比，`<ui:repeat>` 在此处不适用，如第 3 章的“Jakarta 标签”部分所述。它在技术上可以正常工作，但
    `<h:panelGrid>` 的渲染器会将其解释为单个表格单元格。

    还要注意，这个可迭代模型是视图作用域非常重要，特别是当您在 `<h:panelGrid>` 内部有 Jakarta Faces 表单组件时。技术原因是，在处理回发请求期间，Jakarta
    Faces 期望提交的迭代索引背后的迭代项与页面呈现给最终用户时的项完全相同。换句话说，当 Jakarta Faces 即将处理表单提交时，如果在此期间某个项被添加、删除甚至重新排序，导致其迭代索引可能发生变化，那么提交的值和/或调用的操作可能会针对当前位于最初已知索引处的错误项执行。这对模型的完整性是危险的。如果您在
    `<h:panelGrid>` 内部没有任何 Jakarta Faces 表单组件，或者该模型在视图作用域内不会发生变化（例如，因为它仅在应用程序启动时创建或更新），那么
    `#{viewProducts}` 背后的支持 bean 可以安全地设置为请求作用域。


    数据迭代组件

    只有一个，即 `<h:dataTable>`，它继承自 `UIData` 超类，并基于可迭代的数据模型生成一个 HTML `<table>`，其中每个项目表示为单独的一行。Jakarta
    Faces 中可用的另一个数据迭代组件，即 Facelets 的 `<ui:repeat>`，并不继承自 `UIData` 超类，也不生成任何 HTML 输出，因此在技术上不算作“输出组件”。此外，在标准的
    Jakarta Faces 组件集中，没有组件生成 HTML 的 `<ul>`、`<ol>` 或 `<dl>`，但这可以通过创建一个继承自 `UIData`
    的自定义组件相对容易地实现（另请参阅第 11 章的“创建新组件和渲染器”部分）。

    '
- fmt: '`UIData`的`value`属性支持`java.lang.Iterable`。换句话说，你可以提供任何Java集合作为模型值。由于`UIData`中最常使用基于索引的访问，最有效的是`java.util.ArrayList`，因为它提供了`O(1)`的索引访问。


    `<h:dataTable>`组件的渲染器仅支持`<h:column>`作为直接子组件，其他内容将被忽略。顾名思义，`<h:column>`代表单个列。每次遍历`<h:dataTable>`的`value`时，都会根据当前迭代项重新渲染所有列。与`<c:forEach>`和`<ui:repeat>`一样，当前迭代项通过`var`属性暴露在EL作用域中。以下是一个遍历`List<String>`的基本示例。


    ```

    #{string}

    ```


    后台Bean类`com.example.project.view.Bean`：


    ```

    @Named @RequestScoped

    public class Bean {

    private List strings;

    @PostConstruct

    public void init() {

    strings = Arrays.asList("one", "two", "three");

    }

    public List getStrings() {

    return strings;

    }

    }

    ```


    生成的HTML输出：


    ```


    one

    two

    three


    ```


    在Chrome浏览器中的渲染效果：


    ![](images/454457_2_En_6_Chapter/454457_2_En_6_Figc_HTML.jpg)


    需要注意的是，`var`属性指定的变量名不应与现有的托管Bean名称或隐式EL对象冲突。隐式EL对象在EL解析中具有更高的优先级。隐式EL对象的一个例子是`#{header}`，它引用`ExternalContext#getRequestHeaderMap()`。^([^(50)](#fn50))
    因此，如果你恰好有`#{bean.headers}`并希望在迭代组件中呈现它，则不能使用`var="header"`，最好考虑其他名称，例如`var="head"`。


    以下是一个更详细的示例，展示了产品列表。在第[5](#454457_2_En_5_Chapter.xhtml)章的“自定义转换器”部分曾展示过类似的表格。


    ```


    ID

    #{product.id}


    Name

    #{product.name}


    Description

    #{product.description}


    ```


    后台Bean类`com.example.project.view.Products`：


    ```

    @Named @RequestScoped

    public class Products {

    private List list;

    @Inject

    private ProductService productService;

    @PostConstruct

    public void init() {

    list = productService.list();

    }

    public List getList() {

    return list;

    }

    }

    ```


    产品实体：`com.example.project.model.Product`：


    ```

    @Entity

    public class Product {

    @Id @GeneratedValue(strategy=IDENTITY)

    private Long id;

    @Column(nullable = false)

    private @NotNull String name;

    @Column(nullable = false)

    private @NotNull String description;

    // Add/generate getters+setters.

    }

    ```


    产品服务：`com.example.project.service.ProductService`：


    ```

    @Stateless

    public class ProductService {

    @PersistenceContext

    private EntityManager entityManager;

    @TransactionAttribute(SUPPORTS)

    public List list() {

    return entityManager

    .createQuery("FROM Product ORDER BY id DESC", Product.class)

    .getResultList();

    }

    }

    ```


    生成的HTML输出：


    ```


    ID

    Name

    Description


    Three

    The third product


    Two

    The second product


    One

    The first product


    ```


    在Chrome浏览器中的渲染效果：

    ![](images/454457_2_En_6_Chapter/454457_2_En_6_Figd_HTML.jpg)


    需要注意的是，`<h:dataTable>`的`value`属性背后的可迭代模型必须引用一个已在一次性生命周期事件（如`@PostConstruct`或`<f:viewAction>`）中预先准备好的Bean属性。这并非专门适用于`UIData`组件，而是基本上适用于每个Jakarta
    Faces组件。也就是说，getter方法在Jakarta Faces生命周期中可能会被多次调用，尤其是在迭代组件的`value`属性或任何Jakarta
    Faces组件的`rendered`属性中被引用时。


    技术原因是，任何EL值表达式在幕后都被创建为一个`jakarta.el.ValueExpression`实例，该实例内部基本上只保存字面EL字符串，如`"#{products.list}"`，并且每次调用`ValueExpression#getValue()`都会根据提供的EL上下文重新计算表达式。这通常是一个非常廉价的操作，耗时在纳秒级别，但当getter方法反过来执行相对昂贵的数据库查询（可能需要数十、数百甚至数千毫秒）时，性能可能会急剧下降。


    当迭代组件恰好嵌套了Jakarta Faces表单组件时，迭代组件可能会在Jakarta Faces生命周期的每个阶段调用getter方法。如果你通过在getter方法中从数据库获取列表来准备可迭代模型，那么每次调用getter方法都会查询数据库，这显然是低效的。此外，关于根据提交的迭代索引解析感兴趣的迭代项的问题，也可能出现，如上一节关于`<h:panelGrid>`与`<c:forEach>`的最后一段所述。


    另一件需要注意的事情是`<f:facet name="header">`。这基本上会生成一个`<thead>`元素，其内容位于`<th>`元素中。`<h:dataTable>`也支持`<f:facet
    name="footer">`，它会生成一个`<tfoot>`元素，其内容位于`<td>`元素中。你通常可以在标签文档以及`<h:dataTable>`标签文档中找到所有支持的`<f:facet>`名称。^([^(51)](#fn51))


    基本上，你可以在`<h:column>`内放置任何内容来表示单元格内容，甚至可以是表单组件、嵌套的`<h:dataTable>`或`<ui:repeat>`。以下是一个小示例，展示了`Product`实体的虚构`Set<Tag>
    tags`属性在嵌套的`<ui:repeat>`中的使用。


    ```

    ...


    #{tag.name}


    ```


    ### 可编辑的`<h:dataTable>`


    关于嵌套在`<h:column>`内的表单组件，你可以用输入组件替换模板文本中的EL，如下所示：


    ```


    ID

    #{product.id}


    Name


    Description


    ```


    其中，后台Bean类的`save()`方法在将后台Bean类从`@RequestScoped`更改为`@ViewScoped`后，基本如下所示：


    ```

    public void save() {

    productService.update(products);

    }

    ```


    而服务类的`update()`方法则如下所示：


    ```

    @TransactionAttribute(REQUIRED)

    public void update(Iterable products) {

    products.forEach(entityManager::merge);

    }

    ```


    请注意，你完全无需担心收集提交的值，Jakarta Faces已经为你完成了这项任务。同时，也无需担心`<h:dataTable>`内组件ID的唯一性，因为该组件已经实现了`NamingContainer`接口，并将自己的客户端ID和迭代索引前置到子组件的客户端ID中，如下面的HTML输出所示：


    ```


    ID

    Name

    Description


    The third product


    The second product


    The first product


    ```'
