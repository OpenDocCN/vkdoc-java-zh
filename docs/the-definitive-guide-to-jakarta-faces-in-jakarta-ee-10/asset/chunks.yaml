- fmt: '# That same month, during the JakartaOne Livestream 2019


    That same month, during the JakartaOne Livestream 2019, Tijms, from his hotel
    in Jakarta, Indonesia, presented some of the ideas for the next version of Faces,
    in a presentation called “What’s Coming to Jakarta Faces?” In it, Tijms mentioned
    that central for that release would be the removal of deprecated items, such as
    the Faces native expression language that was deprecated in 2005, Jakarta Server
    Pages support that was deprecated in 2009, the Faces native Managed Beans (deprecated
    in 2016), and more. With regard to features, Tijms mentioned extensionless views
    by default and a new life cycle phase to make things for which the view action
    is now used on an empty page easier to use.


    After this second step was completed, the third step started. This involved changing
    the namespace of all Jakarta EE APIs, which of course included Faces, from `javax.*`
    to `jakarta.*`. This was needed since per the JCP rules, packages are only allowed
    to be modified per the JCP process. As Jakarta EE was no longer following that
    process, the package had to be changed. Tijms and other committers worked hard
    the following months to change the package names in the source code and documentation,
    which eventually resulted in the release of Faces 3.0 in October 2020 as part
    of Jakarta EE 9. Due to time constraints, the original plan of certifying Jakarta
    EE 9 (and therefore Faces 3.0) for JDK 11 compatibility had to be dropped.


    Shortly after the release of Faces 3.0, Tijms kicks off the work for Faces 4.0
    with a mail to the `faces-dev` list titled “Starting Jakarta Faces 4.0.” The mail
    reiterates some of the plans from the earlier presentation but adds several API
    enhancements proposed earlier by Thomas Andraschko.


    On October 23, 2020, Arjan Tijms sets the version of the Mojarra branch to `4.0.0-SNAPSHOT`,
    marking the start of Faces 4.0. A few days later, on October 27, 2020, a historical
    commit is done by Tijms: “Remove Jakarta Pages support.” That one technical decision,
    which in 2003 was strongly criticized by Hans Bergsten and that indeed as Bergsten
    predicted would bring so much pain to Faces, is finally undone. Again a few days
    later, on November 1, 2020, the native managed bean system of Faces also bites
    the dust. CDI beans from that moment on are the only designated bean type for
    Faces.


    Early 2021, Tijms, Andraschko, and Scholtz discuss how to go forward with the
    proposed changes, and the next months see a flurry of new issues being created
    and commits done in both the Mojarra and MyFaces projects to implement several
    of those proposed new features.


    Simultaneously, the Jakarta EE TCK is updated to support JDK 11, which eventually
    results in a Jakarta EE 9.1 release in May 2021. As both the Faces API and the
    Mojarra 3.0 implementation are already JDK 11 compatible, no new releases were
    required for those.


    The following table shows the timeline and the differences between the various
    versions released:


    | Date | Maven coordinates | Build from | Certified | Javadoc | Java package |
    TCK level | API level |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 2017, Mar | `javax.faces:javax.faces-api:2.3` | `github/javaee` | Jakarta EE
    8 | Jakarta EE terms | `javax.faces` | JDK8 | JDK8 |

    | 2019, Jan | `jakarta.faces:jakarta.faces-api:2.3.1` | `github/eclipse-ee4j`
    | Jakarta EE 8 | Jakarta EE terms | `javax.faces` | JDK8 | JDK8 |

    | 2019, Sep | `jakarta.faces:jakarta.faces-api:2.3.2` | `github/eclipse-ee4j`
    | Jakarta EE 8 | Jakarta EE terms | `javax.faces` | JDK8 | JDK8 |

    | 2020, Oct | `jakarta.faces:jakarta.faces-api:3.0` | `github/eclipse-ee4j` |
    Jakarta EE 9 | Jakarta EE terms | `jakarta.faces` | JDK8 | JDK8 |

    | 2021, May | `jakarta.faces:jakarta.faces-api:3.0` | `github/eclipse-ee4j` |
    Jakarta EE 9.1 | Jakarta EE terms | `jakarta.faces` | JDK11 | JDK8 |


    On August 21, 2021, Çağatay Çivici presents the latest state of Faces in a presentation
    for the Turkish edition of the JakartaOne Livestream. His presentation is aptly
    titled “Jakarta Faces 4.0.” At the moment of writing, the release review for Faces
    4.0 is planned to start at around May 15, 2022.


    # 2. From Zero to Hello World


    In this chapter, you will learn how to set up a Jakarta Faces development environment
    with the Eclipse IDE (integrated development environment), the Maven dependency
    management system, the WildFly application server and the H2 database from scratch.


    ## Installing Java SE JDK


    You probably already know that Java SE is available as JRE for end users and as
    JDK for software developers. Eclipse itself does not strictly require a JDK as
    Eclipse has its own compiler. Jakarta Faces being a software library does not
    require a JDK to run either. WildFly, however, does require a JDK to run, primarily
    in order to be able to compile Jakarta Pages files, even though Jakarta Pages
    (formerly known as Jakarta Pages, Java Server Pages) has, since Jakarta Faces
    2.0, been deprecated as view technology for Jakarta Faces.


    Therefore, you need to make sure that you already have a JDK installed as per
    Oracle’s instructions. At the time of writing, the latest available Java SE version
    is 17, but as Jakarta EE 10 was designed for Java SE 11, you could get away with
    a minimum version of Java SE 11. Installation instructions depend on the platform
    being used (Windows, Linux, or MacOS). You can find detailed Java SE 17 JDK installation
    instructions here: [`https://docs.oracle.com/en/java/javase/17/install/overview-jdk-installation.html`](https://docs.oracle.com/en/java/javase/17/install/overview-jdk-installation.html)


    The most important parts are that the `PATH` environment variable must cover the
    `/bin` folder containing the Java executables (e.g., “`/path/to/jdk/bin`”) and
    that the `JAVA_HOME` environment variable is set to the JDK root folder (e.g.,
    “`/path/to/jdk`”). This is not strictly required by Jakarta Faces itself, but
    Eclipse and WildFly need this. Eclipse as being an integrated development environment
    will need the `PATH` in order to find the Java executables. WildFly as being a
    Jakarta EE application server will need the `JAVA_HOME` in order to find the JDK
    tools.'
