    请注意 `messages` 组件中 `rendered` 属性的逻辑。因此，只有当其父组件 `NamingContainer` 的 `submitted`
    属性求值为 `true` 时，它才会被渲染。在这个特定案例中，它检查的是 `UIForm#isSubmitted()`。这在以下场景中非常有用：你有多个非
    Ajax 表单，每个表单都有自己的全局消息组件，和/或你在 Jakarta Faces 页面底部附近有一个“兜底”的 `<h:messages redisplay="false">`
    组件，该组件随后使用 CSS 固定定位在顶部。否则，相同的全局消息会意外地在那里也显示出来。


    在 Ajax 表单中，这种消息渲染逻辑并非必需，因为你只需在 `<f:ajax>` 的 `render` 属性中明确指定消息组件，就能精细地控制消息渲染。


    此外，当 `<f:ajax>` 的 `execute` 属性没有像 `execute="@form"` 那样显式地指定表单时，`UIForm#isSubmitted()`
    会意外地返回 `false`。


    **命令组件**


    你可能已经在之前关于输入和选择组件的章节中注意到了 `<h:commandButton>` 的示例。它会生成一个 HTML `<input type="submit">`
    元素，这是 HTML 中将所在 `<form>` 元素的所有输入值发送到服务器的方式。在服务器端，此组件还能够调用一个或多个 Java 方法，这些方法通常在
    `action` 或 `actionListener` 属性中定义，或者通过嵌套在命令组件中的 `<f:actionListener>` 标签定义。你还会了解到，动作监听器方法总是在与
    `action` 属性关联的方法之前运行。


    你可以使用 `<f:actionListener>` 标签在同一个命令组件上注册一个或多个额外的动作监听器。所有这些动作监听器会按照它们在视图中声明并附加到组件的相同顺序被调用。目标方法可以通过三种方式在
    `<f:actionListener>` 标签上声明。一种方式是通过 `type` 属性，另外两种方式是通过 `binding` 属性。


    第一种方式中的 `type` 属性必须基本上表示实现 `ActionListener` 接口的类的完全限定名。


    ```

    package com.example.project;

    import jakarta.faces.event.ActionListener;

    import jakarta.faces.event.ActionEvent;

    public class SomeActionListener implements ActionListener {

    @Override

    public void processAction(ActionEvent event) {

    // ...

    }

    }

    ```


    第二种方式中的 `binding` 属性必须基本上引用一个实现了 `ActionListener` 接口的受管 bean 实例。


    ```

    @Named @RequestScoped

    public class BeanImplementingActionListener implements ActionListener {

    @Override

    public void processAction(ActionEvent event) {

    // ...

    }

    }

    ```


    第三种方式中的 `binding` 属性可以基本上引用任何声明为 `void` 的任意受管 bean 方法。


    ```

    @Named @RequestScoped

    public class Bean {

    public void someActionListenerMethod() {

    // ...

    }

    }

    ```


    请注意，第三种方式或多或少是未记录的。它自 EL 2.2（2009 年）引入以来才成为可能，开发者可以通过简单地添加括号（必要时带参数）来开始显式声明方法表达式。巧合的是，`<f:actionListener>`
    的 `binding` 属性能够处理它们。在底层，`binding` 属性被视为一个 `ValueExpression`。当对其调用 `ValueExpression#getValue()`
    时，逻辑期望获得一个实现了 `ActionListener` 接口的受管 bean 实例。然而，调用的不是一个 getter 方法，而是一个 void 方法，并且没有返回任何内容，这反过来被解释为
    `null`。因此，逻辑会静默地继续执行，就好像根本没有可用的 bean 实例一样。


    动作监听器在 `action` 属性之上还有一个额外的特性。当从动作监听器中显式抛出 `jakarta.faces.event.AbortProcessingException`
    时，Jakarta Faces 将吞没该异常并中止处理调用应用程序阶段（第五阶段），并立即前进到渲染响应阶段（第六阶段）。所有剩余的动作监听器和动作方法（如果有的话）都将被跳过。被吞没的异常不会导致任何错误响应。鉴于这一事实，以及动作监听器总是在动作方法之前被调用的事实，你可以（滥）用它来在动作方法被调用之前，基于已更新的模型值执行一些转换和验证。


    ```

    public void someActionListenerMethod() {

    try {

    convertOrValidate(this);

    }

    catch (SomeConversionOrValidationException e) {

    FacesContext context = FacesContext.getCurrentInstance()

    context.addMessage(null, new FacesMessage(e.getMessage()));

    throw new AbortProcessingException(e);

    }

    }

    public void someActionMethod() {

    // 当抛出 AbortProcessingException 时，此方法不会被调用。

    }

    ```


    我说“（滥）用”是因为，本质上，执行此类任务是普通 `Converter` 或 `Validator` 实现的责任，这样模型值就不会被无效值污染。然而，在
    Jakarta Faces 中，很长一段时间内，都无法基于多个字段执行转换或验证。因此，开发者开始使用动作（监听器）方法来执行此任务，这本质上违反了 Jakarta
    Faces 的生命周期。


    直到 Jakarta Faces 2.3，才引入了一个新的 `<f:validateWholeBean>` 标签来对多个字段执行验证。你可以在第 5 章中阅读更多相关信息。因此，这为动作监听器方法只留下了一个合理的实际用例：基于一个或多个模型值执行转换。一个例子已经在“选择组件”部分演示过（在
    `<ui:repeat>` 中使用多个 `<h:selectBooleanCheckbox>` 来规避 `<h:selectManyCheckbox>` 生成
    HTML 表格的问题）。另一个例子是使用提供的模型值调用外部 Web 服务，并将其结果作为“转换后的”值获取。然后，动作方法仍应用于执行业务服务逻辑。当动作方法本身抛出异常时，它不会被吞没，但请求将以
    HTTP 500 错误响应结束。你可以在第 9 章中找到更多相关信息。


    除了 `<h:commandButton>` 之外，Jakarta Faces 还提供了另外两个命令组件：`<h:commandLink>` 和 `<h:commandScript>`。`<h:commandLink>`
    的生命周期与 `<h:commandButton>` 基本相同，不同之处在于它生成一个 HTML `<a>` 元素，该元素借助 JavaScript 提交其包含的表单。在任何使用
    `<h:commandButton>` 的地方，都可以用 `<h:commandLink>` 替代：


    ```

    ...


    ```


    生成的 HTML 输出如下所示：


    ```


    ...

    提交


    ```


    在 Chrome 浏览器中的渲染效果：


    ![](img/454457_2_En_4_Figj_HTML.jpg)

