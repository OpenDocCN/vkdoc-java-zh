    You might have noticed that the actual tag implementation uses `<f:actionListener
    binding="#{action}">` instead of `action="#{action}"`. This is actually a necessary
    trick in order to get it to properly invoke the method. That is, the `<method-signature>`
    was initially intended for UI components, not for tag files. It’s ignored in tag
    files. This may be worked on for `Faces.next`. For now, you can get away with
    the `<f:actionListener binding>` trick. This has only one additional requirement:
    you need to explicitly include the method parenthesis in the tag file client as
    in `<t:button action="#{login.submit()}">`. When you omit the method parenthesis
    as in `<t:button action="#{login.submit}">`, then the submit will fail with *`jakarta.el.PropertyNotFoundException:
    The class ''com.example.project.view.Login'' does not have the property ''submit''`*.


    In case you would like to customize tag files from the tag file client side on,
    for example, by adding more specific input attributes, or nesting core tags, or
    by prepending or appending content to the label or message, then you can use `<ui:define>`
    and `<ui:insert>` the same way you’re used to doing with master template files
    and decorate files. The following example demonstrates how you can enhance the
    `/WEB-INF/tags/field.xhtml` on this with a bunch of new `<ui:insert>` tags:


    Now, that’s a lot of flexibility! In the tag file client, you can use `<ui:define
    name="beforeLabel">` to define some content that should appear before the label
    of the field. And you can use `<ui:define name="label">` to override the label
    altogether. And you can use `<ui:define name="insideLabel">` to append some (HTML)
    content inside the label and so forth. The following example demonstrates how
    `insideLabel` can be used to append a “Forgot password?” link to the label of
    the password field:


    Note that `<ui:insert name="insideLabel">` is wrapped in an HTML `<span>`. This
    allows you to more easily select “anything” that ends up in there via CSS so that
    you can, for example, let it float to the right using just the following CSS:


    ```css

    .field label > span {

    float: right;

    }

    ```


    Anything else in the tag file client that is not nested in a `<ui:define>` will
    end up inside the nameless `<ui:insert>` tag nested in the chosen input component.
    This allows you to easily nest any `<f:xxx>` core tag specifically for the input
    component:


    This specific example prevents the form from submitting when the *Enter* key is
    pressed by returning `false` when the `KeyBoardEvent.key` equals “`Enter`”, and
    registers a regex validator to accept only a value of four digits by matching
    against a regular expression pattern of “`[0-9]{4}`”, and instructs Jakarta Faces
    to update the component identified by “`otherField`” by Ajax when the value change
    event has occurred.


    Coming back to the tag file implementation in `/WEB-INF/tags/field.xhtml`, you
    might have noticed that Jakarta Tags `<c:when>` is being used there instead of
    the `rendered` attribute of the Jakarta Faces components. This has advantages
    as Jakarta Tags has a different life cycle than Jakarta Faces components. Jakarta
    Tags is executed when the Jakarta Faces component tree is about to be built, during
    the view build time. Jakarta Faces components are executed when HTML output is
    about to be generated, during the view render time. Moreover, if you were using
    Jakarta Faces’ own `rendered` attribute, then you would face “duplicate component
    ID” errors because of multiple components with the same ID physically ending up
    in the Jakarta Faces component tree.


    Might it happen that you are considering the use of plain Java code to dynamically
    create the component tree based on at least a view-scoped model, then you should
    absolutely reconsider using Jakarta Tags instead. As Jakarta Tags itself is also
    XML based and you can thus just put together everything in an XHTML file, you
    will end up with much better readable and maintainable code for a “dynamic” component.


    ## Composite Components


    Sometimes, you would like to have a group of related input components to represent
    a single model value. A classic example is having three `<h:selectOneMenu>` dropdowns
    representing day, month, and year that are ultimately bound to a single `java.time.LocalDate`
    property in the backing bean. This is not trivial to implement with just an include
    file or a tag file. You would need some additional Java-based logic that makes
    sure that, for example, the day drop-down doesn’t show the value 29, 30, or 31
    depending on the currently selected month and that it converts the submitted values
    to a fullfledged `LocalDate` instance, and vice versa. But you can’t and shouldn’t
    put any Java code in any Facelet.


    You’ll perhaps think of just creating a dedicated backing bean for this case.
    But this is not sufficient either. It doesn’t allow you to cleanly hook on the
    component’s life cycle through the Jakarta Faces phases: collecting the individual
    submitted values from multiple components, converting them into a single `LocalDate`
    instance, if necessary throwing a converter exception during the validations phase,
    and letting the Jakarta Faces life cycle automatically skip the remaining phases.
    A backing bean’s setter method or action method is far from the right place for
    that logic. It would be invoked too late anyway. And it would feel strange to
    be able to reference and potentially manipulate the very same backing bean via
    an EL expression on an arbitrary place in the Facelet.


    This is exactly where composite components come into the picture: composing a
    bunch of existing Jakarta Faces components into virtually a single component tied
    to a single model value and ultimately using it exactly the same way as you would
    be using a plain `<h:inputText>`. Imagine a `<t:inputLocalTime>` composite component
    composed of two `<h:selectOneMenu>` components tied to a single `java.time.LocalTime`
    model value. Instead of a backing bean, you can use a full-fledged `UIComponent`
    instance as a so-called backing component.'
