  raw: '@ConversationScoped

    A conversation-scoped managed bean  is tied to the

    lifetime of the injected `jakarta.enterprise.context.Conversation`

    instance that offers `begin()` and `end()` methods which

    must be explicitly invoked by the web application’s code in order to

    indicate the start and end of the conversation scope. The conversation

    scope is represented by a predefined HTTP request parameter with a

    default name of “`cid`” (“Conversation

    ID”) whose value represents the conversation ID. The conversation ID in

    turn references an isolated mapping in the current HTTP session where

    the conversation-scoped managed bean instances will be stored.

    As long as the  conversation scope has

    not started, the conversation-scoped managed bean will behave like a

    request-scoped managed bean. When the application code explicitly

    invokes `Conversation#begin()`,

    then the conversation scope will start, and a custom `jakarta.faces.application.ViewHandler`

    provided by the CDI implementation will make sure that all its `getXxxURL()` methods

    such as `getActionURL()` and

    `getBookmarkableURL()`

    return a URL (uniform resource locator) with the conversation ID

    parameter included. In case of Weld, that’s the `ConversationAwareViewHandler`.^([^(72)](#fn72))
    All Jakarta Faces `UIForm` and `UIOutcomeTarget`

    components derive their action and target URLs from those methods of the

    `ViewHandler`.

    The generated HTML output of those components will thus ultimately

    include the conversation ID in the target URL.

    On an incoming HTTP request, when the conversation ID parameter is

    present in the request, and it is still valid, the CDI implementation

    will obtain the associated conversation scope from the HTTP session and

    make sure that all conversation-scoped managed beans are obtained from

    exactly this conversation scope identified by the conversation ID. This

    works on both GET and POST requests. Any form submit or any

    link/navigation to a URL with the conversation ID included will provide

    access to the very same conversation scope, as long as it’s still valid.

    The conversation scope ends when the application code explicitly invokes

    `Conversation#end()`.

    When the end user reuses the “`cid`” request

    parameter later or manipulates its value to one which isn’t started in

    its own browser session, or when the underlying `HttpSession` instance

    is destroyed, then CDI will throw a `jakarta.enterprise.context.NonexistentConversationException`.

    Conversation-scoped managed beans  are particularly

    useful in order to be able to return to a particular stateful page

    within the same browser session after being redirected elsewhere. A

    classic example is a third-party web service that is included in an HTML

    `<iframe>`

    or opened in a new browser tab or even targeted in the `action` attribute of a

    plain HTML `<form>` and can,

    via a specific request parameter, be configured to redirect back to your

    web application after completing the service. When you include the

    conversation ID in the redirect URL, then you will in the redirected

    page be able to resume with exactly the same conversation-scoped managed

    bean instance as it was before the redirect. This allows you the

    opportunity to finalize and unlock any pending transactions and, of

    course, end the conversation.


    Given a checkout button that looks as follows :


    ```

    ...


    ...


    ```


    here’s what the associated conversation-scoped bean behind `#{payment}` looks

    like:


    ```

    @Named @ConversationScoped

    public class Payment implements Serializable {

    private Order order;

    private String url;

    @Inject

    private Cart cart;

    @Inject

    private OrderService orderService;

    @Inject

    private Conversation conversation;

    public void checkout() {

    order = orderService.lockProductsAndPrepareOrder(cart);

    conversation.begin();

    url = "https://third.party.com/pay?returnurl="

    + URLEncoder.encode("https://my.site.com/paid?cid="

    + conversation.getId(), "UTF-8");

    }

    public void confirm() {

    orderService.saveOrderAndCreateInvoice(order);

    conversation.end();

    }

    @PreDestroy

    public void destroy() {

    orderService.unlockProductsIfNecessary(order);

    }

    public String getUrl() {

    return url;

    }

    }

    ```


    Basically, the  checkout button is

    only rendered when there’s no payment URL set. Once the button is

    pressed, all products of the shopping cart are locked, and the order is

    prepared. Also, depending on the third-party payment service, the URL

    referring it must be prepared whereby you include the return URL as some

    query parameter in the URL of the payment service. The return URL should

    in turn include the “`cid`” request

    parameter representing the conversation ID. In the redirected page which

    will actually be loaded in the `<iframe>`, you

    can just mark the conversation complete with `<f:viewAction>`.


    Of course, the average third-party payment service should have a more

    elaborate Java or even JavaScript API instead of `<iframe>`; also,

    it should be possible to provide different return pages for each payment

    outcome such as payment failed and payment aborted. The preceding

    example is just to give the general idea .'
  trans: '

    @ConversationScoped

    一个对话作用域（conversation-scoped）托管 Bean 的生命周期与注入的 `jakarta.enterprise.context.Conversation`
    实例绑定，该实例提供了 `begin()` 和 `end()` 方法，必须由 Web 应用程序的代码显式调用，以指示对话作用域的开始和结束。对话作用域由一个预定义的
    HTTP 请求参数表示，其默认名称为“`cid`”（“对话 ID”），该参数的值代表对话 ID。对话 ID 进而引用当前 HTTP 会话中的一个隔离映射，用于存储对话作用域的托管
    Bean 实例。


    只要对话作用域尚未开始，对话作用域的托管 Bean 的行为就类似于请求作用域的托管 Bean。当应用程序代码显式调用 `Conversation#begin()`
    时，对话作用域将开始，并且由 CDI 实现提供的自定义 `jakarta.faces.application.ViewHandler` 将确保其所有 `getXxxURL()`
    方法（例如 `getActionURL()` 和 `getBookmarkableURL()`）返回包含对话 ID 参数的 URL（统一资源定位符）。以 Weld
    为例，该 ViewHandler 是 `ConversationAwareViewHandler`。^(⁷²) 所有 Jakarta Faces 的 `UIForm`
    和 `UIOutcomeTarget` 组件都从 `ViewHandler` 的这些方法派生其操作和目标 URL。因此，这些组件生成的 HTML 输出最终会在目标
    URL 中包含对话 ID。


    在传入的 HTTP 请求中，当请求中存在对话 ID 参数且该参数仍然有效时，CDI 实现将从 HTTP 会话中获取关联的对话作用域，并确保所有对话作用域的托管
    Bean 都从该对话 ID 标识的特定对话作用域中获取。这适用于 GET 和 POST 请求。任何表单提交或任何指向包含对话 ID 的 URL 的链接/导航，只要该对话作用域仍然有效，都将提供对同一对话作用域的访问。当应用程序代码显式调用
    `Conversation#end()` 时，对话作用域结束。


    当最终用户稍后重用“`cid`”请求参数，或将其值修改为其自身浏览器会话中未启动的值，或当底层 `HttpSession` 实例被销毁时，CDI 将抛出 `jakarta.enterprise.context.NonexistentConversationException`。


    对话作用域的托管 Bean 特别有用，可以在同一浏览器会话中被重定向到其他地方后，能够返回到特定的有状态页面。一个经典的例子是第三方 Web 服务，它被包含在
    HTML `<iframe>` 中，或在新浏览器标签页中打开，甚至作为纯 HTML `<form>` 的 `action` 属性的目标，并且可以通过特定的请求参数进行配置，以便在完成服务后重定向回您的
    Web 应用程序。当您在重定向 URL 中包含对话 ID 时，您将能够在重定向后的页面中，恢复使用与重定向之前完全相同的对话作用域托管 Bean 实例。这使您有机会完成并解锁任何待处理的事务，当然，也可以结束对话。


    假设有一个如下所示的结账按钮：


    ```

    ...


    ...


    ```


    以下是 `#{payment}` 背后关联的对话作用域 Bean 的样子：


    ```

    @Named @ConversationScoped

    public class Payment implements Serializable {

    private Order order;

    private String url;

    @Inject

    private Cart cart;

    @Inject

    private OrderService orderService;

    @Inject

    private Conversation conversation;

    public void checkout() {

    order = orderService.lockProductsAndPrepareOrder(cart);

    conversation.begin();

    url = "https://third.party.com/pay?returnurl="

    + URLEncoder.encode("https://my.site.com/paid?cid="

    + conversation.getId(), "UTF-8");

    }

    public void confirm() {

    orderService.saveOrderAndCreateInvoice(order);

    conversation.end();

    }

    @PreDestroy

    public void destroy() {

    orderService.unlockProductsIfNecessary(order);

    }

    public String getUrl() {

    return url;

    }

    }

    ```


    基本上，结账按钮仅在未设置支付 URL 时才会渲染。一旦按下该按钮，购物车中的所有产品都会被锁定，并且订单会被准备好。同时，根据第三方支付服务的不同，必须准备好引用该服务的
    URL，您需要将返回 URL 作为某个查询参数包含在支付服务的 URL 中。返回 URL 又应包含代表对话 ID 的“`cid`”请求参数。在重定向后的页面（实际上将在
    `<iframe>` 中加载）中，您可以使用 `<f:viewAction>` 来标记对话完成。


    当然，一般的第三方支付服务应该提供更完善的 Java 甚至 JavaScript API，而不是 `<iframe>`；此外，应该能够为每种支付结果（例如支付失败和支付中止）提供不同的返回页面。前面的示例只是为了提供总体思路。

    '
- fmt: '# `@FlowScoped`


    A flow-scoped managed bean is tied to the lifetime of a Jakarta Faces flow. It
    basically extends the client-window-scope with its predefined HTTP request parameter
    “`jfwid`”; only the scope is further narrowed down to a specific set of Jakarta
    Faces views in an isolated subfolder. Once the end user clicks a Jakarta Faces
    link or button component that navigates to a specific entry page of a Jakarta
    Faces flow, then the flow scope will automatically start. The flow scope cannot
    be started when you open the entry page without navigating to it via a Jakarta
    Faces link or button component.


    Additionally, particularly when using a `UIOutcomeTarget` component instead of
    a `UICommand` component to navigate, then the query string may be accompanied
    with another predefined HTTP request parameters “`jffi`” (“Jakarta Faces Flow
    Identifier”) and “`jftfdi`” (“Jakarta Faces To Flow Document Identifier”). Those
    are actually only mandatory for starting a Jakarta Faces flow using a GET request.
    Technically, for the rest of the flow, the “`jfwid`” parameter alone is sufficient.
    As long as the “`jfwid`” parameter is present and is still valid, then the Jakarta
    Faces flow is idempotent and can be resumed using a GET request. When you open
    a new browser tab and navigate into the Jakarta Faces flow, then actually a new
    flow scope will be started, independent of the flow scope in another tab. Once
    a postback request within the Jakarta Faces flow navigates to a page outside the
    flow, then the flow scope will automatically end. When the end user reuses the
    “`jfwid`” request parameter later, or manipulates its value to one which isn’t
    started in its own browser session, or enters the flow directly, or when the underlying
    `HttpSession` instance is destroyed, then CDI will throw a `jakarta.enterprise.context.ContextNotActiveException`.


    The major difference between the flow scope and the client window and conversation
    scopes is thus that the pages within a Jakarta Faces flow cannot be entered directly.
    They will automatically start when the end user navigates to the entry page of
    the flow, and they will automatically end when a postback navigates outside the
    flow. Flow-scoped managed beans are useful in order to isolate a conversation
    to a specific set of Jakarta Faces pages. A classic real-world example is a booking
    application that is spread over multiple forms in physically different pages.


    There are various ways to define a Jakarta Faces flow. One way is by convention,
    another way is by declarative configuration in the `/[flowId]/[flowId]-flow.xml`
    file, and yet another way is by programmatic configuration using `jakarta.faces.flow.FlowBuilder`
    API.^([^(73)](#fn73)) In this book, we’ll restrict ourselves to convention over
    configuration. First, create the following folder structure:


    ![](images/454457_2_En_8_Chapter/454457_2_En_8_Figa_HTML.jpg)


    The first convention is that the flow entry page must have exactly the same name
    as the subfolder it is sitting in. In this case, that’s “`booking`”. This is considered
    the Flow ID. The second convention is that there must be a `*-flow.xml` file in
    the subfolder whose name is prefixed with the Flow ID, that is, `booking-flow.xml`.
    This XML configuration file can be kept empty for now. It’s only useful when you
    want to fine-grain the Jakarta Faces flow configuration, for example, by specifying
    a different entry page. Without this file, the flow scope won’t be activated.
    One disadvantage of having at least one activated flow somewhere in the web application,
    however, is that the Jakarta Faces client Window ID parameter “`jfwid`” will be
    appended to every single navigation URL, even when it doesn’t target a Jakarta
    Faces flow. This URL pollution may for some developers be the main reason to not
    use the flow scope at all.


    The navigation component in order to enter a Jakarta Faces flow must be placed
    in a Jakarta Faces page outside the flow subfolder. The navigation outcome must
    reference the name of the flow subfolder, which is the Flow ID. Here’s an example
    in `/home.xhtml`.


    ```

    Of course, this can be substituted with `<h:link>`. It’s recommended to use GET
    instead of POST for this so that the booking page’s URL properly reflects in the
    browser’s address bar. Then, in all pages within the subfolder, you can reference
    a flow-scoped managed bean which will be shared across all these pages. You can
    navigate back and forth between these pages as well while retaining the flow-scoped
    managed bean instance. It’s recommended that you use Ajax with redirect for this.
    The Ajax submits will improve the user experience. The redirects will make sure
    that the individual pages are still bookmarkable.

    ```


    Here’s an example of how these pages look like. The `/booking/booking.xhtml` page
    has an input field requesting the start date as first step:


    ```

    ...

    ```


    The `/booking/persons.xhtml` page has several input fields requesting the person’s
    details:


    ```

    ...

    ...

    ```


    The `/booking/confirm.xhtml` page shows a summary of the so far entered details:


    ```

    ...

    ```


    The `/booking/payment.xhtml` page shows a payment method drop-down and performs
    the payment:


    ```

    ...

    ...

    ```


    And, finally, the flow-scoped bean behind `#{booking}` can look like this:


    ```

    @Named @FlowScoped("booking")

    public class Booking implements Serializable {

    private LocalDate startDate;

    private List persons;

    private PaymentMethod paymentMethod;

    // ...

    public void submit() {

    // ...

    }

    }

    ```


    You see, the majority of navigation task is done by the `action` attribute of
    the command components. The `faces-redirect=true` is a special request parameter
    that is internally recognized by Jakarta Faces as an instruction to perform a
    redirect after postback. Of course, this request parameter is stripped of the
    target URL before performing the actual redirect. Once the postback leaves the
    flow, then the flow-scoped managed bean is destroyed, and the previously presented
    page URLs are not reusable anymore.


    # `@ViewScoped`


    A view-scoped managed bean is tied to the lifetime of the Jakarta Faces view state.
    The Jakarta Faces view state is elaborated in the section “View State” in Chapter
    [3](#454457_2_En_3_Chapter.xhtml). In a nutshell, a view-scoped managed bean lives
    as long as the end user is performing postback requests on the very same Jakarta
    Faces view and the invoked action methods keep returning `null` or `void`. Once
    the action method returns non-`null`, even if it’s an empty string or represents
    the same view, then the view scope will end. View-scoped managed beans are not
    shared across browser tabs within the same browser session. Each one gets its
    own unique instance. Effectively, they are indirectly identified by the `jakarta.faces.ViewState`
    hidden input field in the generated HTML representation of a Jakarta Faces form.


    However, view-scoped managed beans are actually not stored in the Jakarta Faces
    view state, not even when client-side state saving is enabled. They are actually
    stored in the HTTP session, regardless of the Jakarta Faces state saving method.
    They are not immediately destroyed when the end user unloads the web page either
    by performing a GET request via a link or bookmark or editing the URL in browser’s
    address bar, or by closing the browser tab. They will stick around in the HTTP
    session and only get destroyed when the HTTP session expires.'
