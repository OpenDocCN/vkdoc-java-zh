- fmt: "现在我们将使用 Jakarta Faces 的两个简单默认结构来渲染这个值：一个是在 Facelet 上的直接表达式语言表达式，另一个是`<h:outputText>`组件。\n\
    \n```\n#{bean.value}\n```\n\n当请求此视图并查看 HTML 源代码时，我们会看到该值两次都被渲染为“`&lt;script&gt;alert('hi')&lt;/script&gt;`”（即，以浏览器不会执行的转义形式呈现）。\n\
    \n如果我们明确不希望进行此转义，可以将`<h:outputText>`的`escape`属性设置为`false`。例如：\n\n```\n<h:outputText\
    \ value=\"#{bean.value}\" escape=\"false\" />\n```\n\n再次请求包含上述组件的视图将导致出现一个 JavaScript\
    \ 警告框，显示“hi”。如果这是攻击者输入的恶意代码，客户端系统的安全性将受到损害。因此，`escape`属性应极其谨慎地使用。\n\n用于 URL 的输出也会被转义，但由于上下文不同，转义方式也不同。为了演示，请考虑在视图中添加以下组件：\n\
    \n```\n<h:outputLink value=\"http://foo.com/bar\">\n    <f:param name=\"q\" value=\"\
    #{bean.value}\" />\n    Go to foo\n</h:outputLink>\n```\n\n请求此视图后，我们会看到链接被渲染为：\n\
    \n```\n<a href=\"http://foo.com/bar?q=%3Cscript%3Ealert%28%27hi%27%29%3C%2Fscript%3E\"\
    >\n    Go to foo\n</a>\n```\n\n这里发生的是，我们的原始值已使用 URL 编码被转义以用作 URL 参数，正如所见，这与 XML\
    \ 转义不同，因此称为“上下文相关输出转义”。\n\n与 XSS 防护相关，应用程序使用的敏感 cookie 应设置为`HttpOnly`，这意味着它们将随每个请求发送到服务器，但无法被客户端上的脚本读取。对于会话\
    \ ID cookie，可以在`web.xml`中按如下方式进行设置：\n\n```\n<session-config>\n    <cookie-config>\n\
    \        <http-only>true</http-only>\n        <secure>true</secure>\n    </cookie-config>\n\
    </session-config>\n```\n\n请注意，此处 cookie 也被设置为“secure”。这与 XSS 无关，而是设置 cookie 仅在使用\
    \ HTTPS/SSL 时发送。这可以保护 cookie 免遭窃听（例如，在共享 Wi-Fi 网络上）。由于开发通常通过 HTTP 在 localhost\
    \ 上进行，因此此类设置可能会给开发带来问题。如果是这种情况，则可以在`ServletContextListener`中使用`ServletContext#getSessionCookieConfig()`将\
    \ cookie 设置为安全或不安全：\n\n```\n@WebListener\npublic class ApplicationConfig implements\
    \ ServletContextListener {\n    @Override\n    public void contextInitialized(ServletContextEvent\
    \ event) {\n        if (...) {\n            event.getServletContext()\n      \
    \          .getSessionCookieConfig()\n                .setSecure(false);\n   \
    \     }\n    }\n}\n```\n\n其中“...”是一个特定于应用程序的检查，用于查看是否在“开发模式”下运行。您甚至可以使用 Jakarta\
    \ Faces 自身的`Application#getProjectStage()`来实现此目的。\n\n## 源代码暴露防护\n\n在服务器端 Web 应用程序的上下文中，源代码暴露是指\
    \ Web 应用程序部分源代码的非预期泄露。这是一种安全风险，不仅因为源代码本身的暴露（可能构成商业机密），还因为它可能为攻击者提供后续攻击的洞察依据（源代码可能包含对其他系统、Bean\
    \ 甚至带有密码的注释的引用，尽管这些注释一开始就不应该存在）。\n\n由于过去一些可能不太幸运的设计选择，Jakarta Faces 在此存在一些特定的漏洞，主要涉及\
    \ URL 映射的方式以及资源文件的位置。为了理解此漏洞，我们首先解释 Jakarta Faces 映射和`FacesServlet`的工作原理。\n\n\
    每个 Jakarta Faces 应用程序的主要入口点是`FacesServlet`。这是由 Jakarta Faces 框架提供的一个 Servlet，充当所谓的前端控制器，所有\
    \ Jakarta Faces 请求都通过它进行路由。\n\n对 Jakarta Faces 视图（例如`foo.jsf`）的请求首先需要通过此 Servlet，然后\
    \ Servlet 将以某种方式定位代表视图`foo.jsf`的组件树的定义。我们将此实际定义称为“物理资源”。开箱即用，Jakarta Faces 支持一种类型的物理资源：扩展名为`.xhtml`的\
    \ Facelets 文件。\n\n为了使`FacesServlet`能够处理所有这些请求，必须将其映射到一个或多个捕获这些请求的 URL 模式。为此，Jakarta\
    \ Faces 支持前缀映射、后缀映射和精确映射。\n\n如果在`web.xml`中没有指定显式映射，并且在应用程序中找到了可识别的 Jakarta Faces\
    \ 工件（例如空的`faces-config.xml`或`@FacesConfig`注解），则`FacesServlet`会自动映射。自 Jakarta Faces\
    \ 2.1 和 Servlet 3.0 起，此自动映射针对以下模式：\n\n*   `/faces/*`（前缀映射）\n*   `*.jsf`（后缀映射）\n\
    *   `*.faces`（后缀映射）\n\n自 Jakarta Faces 2.3 起，还包括以下模式：\n\n*   `*.xhtml`（后缀映射）\n\
    \n尤其是较旧的（现有的）Jakarta Faces 应用程序仍然在`web.xml`中显式映射`FacesServlet`，例如，如下所示：\n\n```\n\
    <servlet>\n    <servlet-name>facesServlet</servlet-name>\n    <servlet-class>jakarta.faces.webapp.FacesServlet</servlet-class>\n\
    </servlet>\n<servlet-mapping>\n    <servlet-name>facesServlet</servlet-name>\n\
    \    <url-pattern>/faces/*</url-pattern>\n    <url-pattern>*.jsf</url-pattern>\n\
    </servlet-mapping>\n```\n\n在后缀映射并使用 Facelets 时，`FacesServlet`将首先尝试定位与请求资源具有相同路径和名称但后缀替换为`.xhtml`的物理资源。例如，对`/path/foo.jsf`的请求将导致查找文件`/path/foo.xhtml`。使用前缀映射时，`FacesServlet`将尝试定位与请求资源具有相同名称和路径但减去前缀路径的物理资源。例如，对`/faces/path/foo.xhtml`的请求将导致查找文件`/path/foo.xhtml`。\n\
    \n然而，这可能会引入一个导致 Facelet 源代码暴露的安全问题。也就是说，对`/path/foo.xhtml`的查找是在`FacesServlet`所在的\
    \ WAR 的 Web 根目录中进行的。除非另有（隐式）映射，否则 Web 根目录中的每个文件都可以直接下载。在这种情况下，如果直接请求`/path/foo.xhtml`而不是`/path/foo.jsf`或`/faces/path/foo.xhtml`，则此请求不会经过`FacesServlet`，并且会返回该页面的纯\
    \ Facelets 源代码，而不是渲染后的标记。\n\n有两种方法可以防止这种源代码暴露：\n\n1.  将`FacesServlet`直接映射到`*.xhtml`。\n\
    2.  向`web.xml`添加安全约束。"
  raw: "Now we’ll render this value using two simple default constructs of\nJakarta\
    \ Faces: a direct expression language expression on a Facelet and\nthe `<h:outputText>`\n\
    component.\n\n```\n\n#{bean.value}\n\n```\n\nWhen requesting this view and looking\
    \ at the HTML source, we’ll see\nthat both times the value has been rendered as\
    \ “`&lt;script&gt;alert('hi')&lt;/script&gt;`”\n(i.e., in an escaped form that\
    \ the browser won’t execute).\n\nIn case we explicitly don’t want this escaping\
    \ to be done, the `escape` attribute of\n`<h:outputText>`\ncan be set to `false`.\
    \ For example:\n\n```\nRequesting the view again with the preceding component\
    \ on it will\ncause a JavaScript alert to\nappear to be saying “hi.” Had this\
    \ been malicious code being input by an\nattacker, the security of the client’s\
    \ system would have been\ncompromised. The `escape` attribute\nshould therefore\
    \ only be used with the utmost care.\n\nOutput for usage in URLs is escaped as\
    \ well, but there it’s escaped\ndifferently, since it’s a different context. To\
    \ demonstrate, consider\nadding the following component to the view:\n\n```\n\
    Go to foo\n\n```\n\nAfter requesting this view, we’ll see the link has been rendered\
    \ as\n\n```\nGo to foo\n\n```\n\nWhat has happened here is that our original value\
    \ has been escaped\nfor usage as a URL parameter using URL encoding, which, as\
    \ can be seen,\nis different from XML escaping, hence the term “contextual output\n\
    escaping.”\n\nRelated to XSS protection, sensitive cookies that the application\
    \ uses should\nbe set to `HttpOnly`, meaning\nthey’ll be sent to the server with\
    \ each request but can’t be read by\nscripts on the client. For the session ID\
    \ cookie, this can be done in\n`web.xml` as\nfollows:\n\n```\n\ntrue\ntrue\n\n\
    ```\n\nNote that the cookie is set to “secure” as well here. This is not\nrelated\
    \ to XSS but sets that the cookie is to be sent only when\nHTTPS/SSL is used.\
    \ This protects the cookie from being eavesdropped\n(e.g., on a shared Wi-Fi network).\
    \ Since development often happens over\nHTTP using localhost, such a setting may\
    \ be problematic for development\npurposes. If this is the case, then alternatively\
    \ the cookie can be set\nto secure or not using `ServletContext#getSessionCookieConfig()`\n\
    in a `ServletContextListener`:\n\n```\n@WebListener\npublic class ApplicationConfig\
    \ implements ServletContextListener {\n@Override\npublic void contextInitialized(ServletContextEvent\
    \ event) {\nif (...) {\nevent.getServletContext()\n.getSessionCookieConfig()\n\
    .setSecure(false);\n}\n}\n}\n```\n\nwhere “...” is an application-specific check\
    \ to see if it’s running\nin “dev mode.” You could even use Jakarta Faces own\
    \ `Application#getProjectStage()`\nfor this.\n\nSource Exposure Protection\nSource\
    \ exposure in the context\nof server-side web applications refers to the unwanted\
    \ disclosure of\nparts of the web application’s source. This is a security risk,\
    \ not only\nbecause of the exposure of the source itself (which may be a trade\n\
    secret) but also because it may give an attacker insight on which to\nbase follow-up\
    \ attacks (the source may contain references to other\nsystems, beans, or even\
    \ comments with passwords, although those kinds of\ncomments should of course\
    \ not be there to begin with).\nDue to a number of somewhat perhaps unfortunate\
    \ design choices in the\npast, Jakarta Faces has some specific vulnerabilities\
    \ here, which mostly\nconcern how URL mapping is done but also concern the location\
    \ of\nresource files. To understand this vulnerability, we first explain how\n\
    Jakarta Faces mapping and the `FacesServlet`\nwork.\nThe main entry into every\
    \ Jakarta Faces application is the `FacesServlet`. This is\na Servlet provided\
    \ by the Jakarta Faces framework that acts as a\nso-called front controller through\
    \ which all Jakarta Faces requests are\nrouted.\nA request to a Jakarta Faces\
    \ view such as `foo.jsf` will thus\nfirst need to go through this Servlet, which\
    \ will then in some way\nlocate the definition of the tree of components that\
    \ represent the view\n`foo.jsf`. We’ll\ncall this actual definition the “physical\
    \ resource.” Out of the box,\nJakarta Faces supports one type of physical resources:\
    \ Facelets files\nwith the extension `.xhtml`.\nIn order for the `FacesServlet`\
    \ to be\nable to handle all these requests, it has to be mapped to one or more\n\
    URL patterns that capture them. To be able to do this, Jakarta Faces\nsupports\
    \ prefix, suffix, and exact mapping.\n\nIf no explicit mapping in `web.xml` is\
    \ specified\nand a recognized Jakarta Faces artifact is found in the application\n\
    (such as an empty `faces-config,xml` or\nthe `@FacesConfig`\nannotation), then\
    \ the `FacesServlet` is\nautomatically mapped. Since Jakarta\nFaces 2.1 and Servlet\
    \ 3.0, this automatic mapping is to the following\npatterns:\n\n*   `/faces/*`\n\
    \    (prefix mapping)\n\n*   `*.jsf`\n    (suffix mapping)\n\n*   `*.faces`\n\
    \    (suffix mapping)\n\nSince Jakarta Faces 2.3, this also includes the following:\n\
    \n*   `*.xhtml`\n    (suffix mapping)\n\nEspecially older (existing) Jakarta Faces\
    \ applications still explicitly\nmap the `FacesServlet` in `web.xml`, which then\n\
    looks, for example, as follows:\n\n```\nfacesServlet\njakarta.faces.webapp.FacesServlet\n\
    \nfacesServlet\n/faces/*\n*.jsf\n\n```\n\nIn suffix mapping and when using Facelets,\
    \ the `FacesServlet` will\nfirst try to locate the physical resource with the\
    \ same path and name as\nthe requested resource, but with the suffix replaced\
    \ by `.xhtml`. For example,\na request for `/path/foo.jsf` will\nresult in a lookup\
    \ for the file `/path/foo.xhtml`.\nWith prefix mapping, the `FacesServlet` will\
    \ try\nto locate the physical resource with the same name and path as the\nrequested\
    \ resource, but minus the prefix path. For example, a request\nfor `/faces/path/foo.xhtml`\n\
    will result in a lookup for the file `/path/foo.xhtml`.\nThis, however, may introduce\
    \ a security issue that will result in\nexposure of the Facelet source code. Namely,\
    \ the lookup for `/path/foo.xhtml` is\ndone in the web root of the WAR in which\
    \ the `FacesServlet`\nresides . Unless\notherwise (implicitly) mapped, every file\
    \ in the web root is directly\naccessible for download. In this case, if `/path/foo.xhtml`\
    \ is\ndirectly requested instead of `/path/foo.jsf` or\n`/faces/path/foo.xhtml`,\n\
    this request will not go through the `FacesServlet` and\nreturns the bare Facelets\
    \ source code of that page instead of the\nrendered markup.\n\nThere are two ways\
    \ to prevent this exposure of source code:\n\n1.  Map the `FacesServlet` directly\n\
    \    to `*.xhtml`.\n\n2.  Add a security constraint to `web.xml`."
  trans: "\n现在我们将使用 Jakarta Faces 的两个简单默认构造来渲染这个值：Facelet 上的直接表达式语言表达式和 `<h:outputText>`\
    \ 组件。\n\n```\n\n#{bean.value}\n\n```\n\n当请求此视图并查看 HTML 源代码时，我们会看到该值两次都被渲染为“`&lt;script&gt;alert('hi')&lt;/script&gt;`”（即，以浏览器不会执行的转义形式呈现）。\n\
    \n如果我们明确不希望进行此转义，可以将 `<h:outputText>` 的 `escape` 属性设置为 `false`。例如：\n\n```\n<h:outputText\
    \ value=\"#{bean.value}\" escape=\"false\" />\n```\n\n再次请求包含上述组件的视图将导致出现一个 JavaScript\
    \ 警告框，显示“hi”。如果这是攻击者输入的恶意代码，客户端系统的安全性就会受到损害。因此，`escape` 属性应极其谨慎地使用。\n\n用于 URL\
    \ 的输出也会被转义，但由于上下文不同，转义方式也不同。为了演示，请考虑在视图中添加以下组件：\n\n```\n<h:outputLink value=\"\
