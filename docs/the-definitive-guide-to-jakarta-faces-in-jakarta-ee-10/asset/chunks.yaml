    \ `/path/foo.jsf` 或 `/faces/path/foo.xhtml`，则该请求不会经过 `FacesServlet`，并且会返回该页面的纯\
    \ Facelets 源代码，而不是渲染后的标记。\n\n有两种方法可以防止这种源代码暴露：\n\n1.  将 `FacesServlet` 直接映射到 `*.xhtml`。\n\
    2.  向 `web.xml` 添加安全约束。\n"
- fmt: '# Mapping the `FacesServlet` Directly to `*.xhtml`


    Mapping the `FacesServlet` directly to `*.xhtml` may be the most natural solution.
    With this mapping, the requested resource is identical to the physical resource.
    If `/path/foo.xhtml` is requested, then the `FacesServlet` will try to locate
    `/path/foo.xhtml`. Via this mapping, there is no second path to reach the Facelets
    source and hence no risk of exposing it.


    **Side note:** Being able to use `*.xhtml` mapping was a new feature in Jakarta
    Faces 2.0. Doing this in Jakarta Faces 1.x resulted in an infinite loop on `RequestDispatcher#forward()`.


    To map the `FacesServlet` to `*.xhtml`, the easiest way is to rely on the default
    mapping of Jakarta Faces 2.3 as explained earlier. If this is not possible for
    some reason, add the mapping to the `FacesServlet` mapping in `web.xml` as shown
    in the following code:


    ```

    facesServlet

    /faces/**.jsf

    *.xhtml

    ```


    As an alternative, a security constraint can be defined that prevents access to
    `*.xhtml` resources. There is rarely a good reason to prefer this over the simpler
    `*.xhtml` to `*.xhtml` mapping, but for completeness, this can be done as follows:


    ```

    No access to Facelets source


    XHTML

    *.xhtml

    ```


    A special case of exposing Facelets source code happens with composite components.
    Composite components are components that are implemented via a Facelet instead
    of a Java class. By convention, they have to be placed in a subdirectory of the
    directory named `/resources` that resides in the web root, for instance, `/resources/bar/foo.xhtml`.
    This will make a component “`foo`” available in the namespace “`jakarta.faces.composite/bar`”.


    Components are of course not views, and the user should not be able to request
    those directly. Unfortunately, `/resources` is not in any way a special directory
    to Jakarta EE. Jakarta Faces assigns a special meaning to it by convention, but
    to the Servlet container, it’s a directory like any other. This specifically means
    there’s no protection applied to this and any user can directly request resources
    from it. In other words, this directory is “world readable.” Even with an `*.xhtml`
    mapping, this not only allows the user to guess which components we have but lets
    the user attempt to execute those as well. Clearly, this is not what we want.


    There are again two solutions for this:


    1.  Configure another directory to be the Jakarta Faces resources directory.

    2.  Add a security constraint to `web.xml`.


    In Jakarta Faces 2.2, a method was introduced to address this security vulnerability.
    Namely, via the `jakarta.faces.WEBAPP_RESOURCES_DIRECTORY` context parameter,
    another directory can be configured to be the Jakarta Faces resources directory
    instead of `/resources`. For example:


    ```

    jakarta.faces.WEBAPP_RESOURCES_DIRECTORY

    WEB-INF/resources

    ```


    Note that the path is relative to the web root and may not begin with a “/”.


    Alternatively, or for Jakarta Faces 2.0/2.1, a security constraint can be configured
    in `web.xml` again that prohibits caller access to `/resources`. This can be done
    in a similar way as protecting for `*.xhtml` access.


    ```

    resources

    The resources directory

    /resources/*

    ```


    # 14. Localization


    Jakarta Faces has always had decent internationalization support. Since Jakarta
    Faces 1.0, you can supply `java.util.ResourceBundle`-based bundle files in different
    locales, which in turn get dynamically included as text in the web page at the
    declared places. Also, all Jakarta Faces converters and validators have their
    own set of localized default messages which you can easily customize via a message
    bundle or, since Jakarta Faces 1.2, via new `requiredMessage`, `converterMessage`,
    and `validatorMessage` attributes. Jakarta Faces 2.0 adds, via the new `jakarta.faces.application.ResourceHandler`
    API (application programming interface) support for localizable assets such as
    stylesheets, scripts, and images.


    The act of internationalization, “I18N,” is distinct from the act of localization,
    “L10N.” The internationalization part is basically already done by Jakarta Faces
    itself as being an MVC (model-view-controller) framework. All you need to do is
    to take care of the localization part. Basically, you need to specify the “active
    locale” in the view, supply the desired resource bundle files, if necessary translated
    with the help of a third-party translation service, and declare references to
    the bundle file in your Jakarta Faces page.


    In this chapter, you will learn how to prepare a Jakarta Faces web application
    for different languages and how to develop it in order to make localization easier
    for yourself as to maintenance.


    ## Hello World, Olá mundo, नमस्ते दुनिया


    To start off, create a bunch of new bundle files in `main/java/resources` folder
    of the project. The `main/java/resources` folder of a Maven WAR project is intended
    for nonclass files that are supposed to end up in the `/WEB-INF/classes` folder
    of the final build. The bundle files can be in `java.util.Properties` format,
    with the `.properties` extension.


    The file name of those files must have a common prefix (e.g., “`text`”), followed
    by an underscore and the two-letter ISO 639-1-Alpha-2 language code (e.g., “`en`”
    for English, “`pt`” for Portuguese, and “`hi`” for Hindi). It can optionally be
    followed by another underscore and the two-letter ISO 3166-1-Alpha-2 country code
    (e.g., “`GB`” for Great Britain, “`US`” for United States, “`BR`” for Brazil,
    “`PT`” for Portugal).


    ```

    main/java/resources/com/example/project/i18n/text.properties

    title = Localization example

    heading = Hello World

    paragraph = Welcome to my website!


    main/java/resources/com/example/project/i18n/text_pt_BR.properties

    title = Exemplo de localização

    heading = Olá mundo

    paragraph = Bem-vindo ao meu site!


    main/java/resources/com/example/project/i18n/text_hi.properties

    title = स्थानीयकरण उदाहरण

    heading = नमस्ते दुनिया

    paragraph = मेरी वेबसाइट पर स्वागत है!

    ```


    Do note that all those bundle files have common keys “`title`”, “`heading`”, and
    “`paragraph`”, which are usually in English. It’s basically the lingua franca
    of the Internet and web developers. It’s considered the best practice to keep
    the source code entirely in English, particularly if it is open source.


    Also note that the English bundle file doesn’t have the “`en`” language code in
    the file name as in `text_en.properties` but is just `text.properties`. Basically,
    it has become the fallback bundle file that is supposed to contain every single
    bundle key used in the entire web application. This way, when a bundle file with
    a specific language code doesn’t contain the desired bundle entry, then the value
    will be looked up from the fallback bundle file. This is useful for situations
    wherein you’d like to gradually upgrade the bundle files, or when you have certain
    sections in the web application which don’t necessarily need to be localized,
    such as back-end admin pages.


    ## Configuration


    In order to familiarize the Jakarta Faces application with those bundle files
    and the desired locales, we need to edit its `faces-config.xml` file to add the
    following entries to the `<application>` element:


    ```

    en

    pt_BR

    hi

    ```'
