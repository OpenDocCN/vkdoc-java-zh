- fmt: '# Security for Web Applications


    Security for web applications is a broad field and includes a number of topics
    such as protecting access to resources, shielding against injection attacks of
    various kinds, and preventing users from being tricked into doing malicious actions
    on behalf of an attacker. Jakarta Faces supports these topics in various ways,
    either by providing native solutions or by integrating with the Jakarta EE platform’s
    facilities. For access to resources, which includes both authentication (the caller
    proving its identity) and authorization (the system determining to which resources
    the caller has access), Jakarta Faces (JavaServer Faces) integrates with the Jakarta
    EE Security machinery, which in turn is defined by, among others, the Servlet
    spec and the Jakarta EE Security spec.


    Jakarta EE Security (JSR 375) is supported by both the Web and Full profile in
    Jakarta EE 8. Additionally, the reference implementation Soteria works on Jakarta
    EE 7 servers, and because it’s built on JASPIC (Jakarta EE authentication SPI)
    (JSR 196), it also works on Servlet containers that support JASPIC (such as Tomcat
    since 8.5 and Jetty since 7.0).


    ## Jakarta EE Security Overview and History


    In Jakarta EE, security is not specified in a single specification but is in fact
    spread over multiple specifications that integrate with each other in various
    ways. While this allows for different aspects of security to be evolved at their
    own pace, and practically speaking even allows some to be replaced by non-spec
    implementations, it does muddy the waters of what spec is responsible for what.


    In this introductory section, we’ll start off with providing a somewhat broad
    overview of what some of the pieces are and how they fit together. We’ll focus
    on the web aspects of security. Security is also present in things like Jakarta
    Enterprise Beans (Enterprise JavaBeans) and JCA (Java Connector Architecture)
    connectors, but these are outside the scope of this book.


    Historically, security in Jakarta EE is mostly based on the security model introduced
    by the Jakarta Servlet specification, that is, a model where the core elements
    are an “authentication mechanism” (`FORM`, `BASIC`, etc.), a set of security constraints
    in `web.xml` where a specific pattern (the URL pattern) is combined with a collection
    of roles (including the empty collection), and a few ways to programmatically
    test the caller’s details, such as `HttpServletRequest.isUserInRole()`. While
    effective, many details were left out in the early days. The Servlet spec did
    ask for implementations (Servlet containers) to be extendable with respect to
    the authentication mechanisms but did not specify how exactly this should be done.
    Likewise, the Servlet spec implicitly requires an “identity store” (File, Database,
    LDAP, etc.) that holds the caller details such as credentials, name, and roles
    but left all details about how to configure these to the Servlet container.


    The Servlet spec did not define any way to access the security constraints defined
    in `web.xml` in a programmatic way, or to programmatically influence their execution
    (e.g., to make certain constraints time based). Furthermore, the very early versions
    of the Servlet spec did not specify the constraint resolution in the strictest
    way, which allowed for some small differences in interpretation between various
    Servlet containers.


    The first additional spec to address these concerns was JACC (JSR 115), which,
    simply stated, deals with authorization concerns. JACC specifies how the `web.xml`
    security constraints should be represented in code, namely, as a collection of
    `Permission` instances. JACC also specifies how these can be accessed (queried)
    by code and finally allows for custom authorization modules that can replace or
    augment the logic that the container executes to determine its access decision.
    A perhaps somewhat difficult thing to understand about JACC is that it’s not so
    much something that can be implemented on its own and then added to a Servlet
    container (as we can do with Jakarta Faces), but it standardizes and more concisely
    specifies what all Servlet containers internally are already doing.


    The second additional spec to address the abovementioned concerns was JASPIC (JSR
    196), which deals with authentication concerns. JASPIC specifies at what moments
    the Servlet container should call the authentication mechanism and defines an
    explicit interface type for these authentication mechanisms, so custom authentication
    mechanisms can use this interface instead of the Servlet container’s proprietary
    one and thus be portable. JASPIC says a few things about the identity store, but
    too little to be really usable in practice. Like JACC, JASPIC isn’t something
    that can be implemented independently, but it standardizes something that all
    Servlet containers are already doing.


    Both JACC and JASPIC define low-level SPIs (server provider interfaces) that are
    mainly intended to be implemented and used by vendors to provide extension products.
    They are quite bare and fairly abstract. As such, they are not (rich) APIs (application
    programming interfaces) that are targeted at application developers. Here is where
    the Jakarta EE Security API (JSR 375) comes in. Jakarta EE Security offers a higher-level
    and easier-to-register (just implement the interface) and easier-to-use (CDI based)
    version of the JASPIC authentication module. The Jakarta EE Security API also
    fully defines the identity store artifact, but perhaps most importantly, it provides
    a number of concrete implementations of all of these, among which is a FORM-based
    authentication mechanism optimized for use with Jakarta Faces and several identity
    stores such as a JDBC (Java Database Connectivity) store and an LDAP (Lightweight
    Directory Access Protocol) store.


    The RI (reference implementation) of the Jakarta EE Security API is called Soteria.
    This implementation is of course provided by the Jakarta EE RI GlassFish. Soteria,
    like Mojarra and MyFaces, has been designed to run independently on basically
    every Servlet container provided that it adheres to the JASPIC specs (which both
    Tomcat and Jetty do as mentioned in the chapter’s introduction). Its dependencies
    (at the time of writing, for Soteria 2.0) are CDI 3.0 and Expression Language
    4.0. These two dependencies are provided by all Jakarta EE implementations. Servlet
    containers typically provide EL (Expression Language) support, while CDI can be
    added separately, for instance, using the RI Weld. For a few *optional* features,
    Soteria takes advantage of Servlet containers that adhere to the JACC spec.'
