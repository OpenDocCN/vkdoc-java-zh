- fmt: '# Update Model Values Phase (Fourth Phase)


    The `UIComponent#processUpdates()` method will be invoked on the `UIViewRoot`.
    The `processUpdates()` method will in turn invoke the `processUpdates()` method
    on each child and facet. Finally, the `UIViewRoot#broadCastEvents()` will be invoked
    to fire any `FacesEvent` queued for the current phase. The default Jakarta Faces
    API doesn’t offer such events for the update model values phase, but developers
    can create and queue their own.


    Also during this phase, from the standard HTML component set, only `UIInput` components
    have additional functionality here. After calling `processUpdates()` on each child
    and facet, they will invoke `UIInput#updateModel()` on itself. When both the `UIInput#isValid()`
    and `UIInput#isLocalValueSet()` return `true`, then they will invoke the setter
    method behind the `value` attribute with `getLocalValue()` as argument and immediately
    invoke `UIInput#setValue()` with `null` and clear out the `UIInput#isLocalValueSet()`
    flag by letting it return `false`. When a `RuntimeException` is thrown here, usually
    caused by a bug in the setter method itself, then it will invoke `UIInput#setValid()`
    with `false` and queue the `UpdateModelException`, and the life cycle will immediately
    advance to the render response phase (sixth phase), hereby skipping any phase
    in between.


    # Invoke Application Phase (Fifth Phase)


    The `UIViewRoot#processApplication()` method will be invoked. This method will
    in turn invoke the `UIViewRoot#broadCastEvents()` to fire any `FacesEvent` queued
    for the current phase, which is usually an instance of `AjaxBehaviorEvent` or
    `ActionEvent`. Note that the `processApplication()` method is only defined on
    the `UIViewRoot` class and does not traverse the component tree.


    # Render Response Phase (Sixth Phase)


    When the component tree is still empty, i.e., when the HTTP request is not a postback
    request, or when the view has no `<f:metadata>` with children, or when the developer
    has in the meanwhile explicitly invoked `FacesContext#setViewRoot()` with its
    own instance, then build the full component tree based on the view definition.
    When the component tree is present, first, fire the `PreRenderViewEvent` for the
    `UIViewRoot`, then invoke `UIComponent#encodeAll()` on the `UIViewRoot`, and finally
    fire the `PostRenderViewEvent` for the `UIViewRoot`.


    The `UIComponent#encodeAll()` method of each component will basically first invoke
    its own `encodeBegin()` method. Then, if the `getRendersChildren()` method returns
    `true`, the component will invoke its own `encodeChildren()` method, else it will
    invoke `encodeAll()` on each child. Finally, the component will invoke its own
    `encodeEnd()` method. This all happens only if `UIComponent#isRendered()` returns
    `true`—that is, when the `rendered` attribute of the component tag doesn’t evaluate
    to `false`.


    The default implementation of the `encodeBegin()` method will first fire the `PreRenderComponentEvent`
    for the current component and then delegate to `Renderer#encodeBegin()`. The default
    implementation of the `encodeChildren()` method will delegate to `Renderer#encodeChildren()`.
    The default implementation of the `encodeEnd()` method will delegate to `Renderer#encodeEnd()`.
    If the component has no renderer attached, that is, when `UIComponent#getRendererType()`
    returns `null`, then no HTML output will be rendered to the response.


    In the `encodeBegin()` method, the component or the renderer implementation has
    the opportunity to write the opening HTML element and all of its attributes to
    the response. In the `encodeChildren()` method, the component or the renderer
    implementation has the opportunity to decorate or override the rendering of the
    children if necessary. In the `encodeEnd()` method, the component or the renderer
    implementation has the opportunity to write the closing HTML tag. Writing to the
    response happens with the response writer as available by `FacesContext#getResponseWriter()`.


    For any mentioned `XxxEvent` class that has been fired in any phase, if any listener
    method throws `jakarta.faces.event.AbortProcessingException`,^([⁴](#fn4)) then
    the currently running phase will be immediately aborted, and the life cycle will
    immediately advance to the render response phase (sixth phase), hereby skipping
    any phase in between.


    # Ajax Life Cycle


    The life cycle is almost identical during Ajax requests. Only the second, third,
    fourth, and sixth phases are slightly different. The `processDecodes()`, `processValidators()`,
    and `processUpdates()` methods will only be invoked on the `UIViewRoot` itself
    and any component covered by the component search expression specified in `<f:ajax
    execute>`. And the `encodeAll()` method will only be invoked on the `UIViewRoot`
    itself and any component covered by the component search expression specified
    in `<f:ajax render>`. Read more on search expressions in Chapter [12](#454457_2_En_12_Chapter.xhtml).


    Note thus that there would be no difference in the Ajax life cycle when the component
    search expression contains the “`@all`” keyword. It would unnecessarily process
    and encode the entire component tree. In other words, use “`@all`” with care.


    There are no sensible real-world use cases for `<f:ajax execute="@all">`. On the
    HTML side, it’s not possible to submit multiple forms at once. Only the enclosing
    form is submitted. The biggest value is thus `<f:ajax execute="@form">`. However,
    there is one sensible real-world use case for a `<f:ajax render="@all">`, namely,
    rendering a full error page in case an exception is thrown during an Ajax request.
    Even then, this can better be programmatically triggered via `PartialViewContext#setRenderAll()`.
    For more details, see Chapter [9](#454457_2_En_9_Chapter.xhtml).'
  raw: 'Update Model Values Phase (Fourth Phase)

    The `UIComponent#processUpdates()`

    method  will be

    invoked on the `UIViewRoot`. The `processUpdates()`

    method   will in turn invoke

    the `processUpdates()`

    method on each child and facet. Finally, the `UIViewRoot#broadCastEvents()`

    will be invoked to fire any `FacesEvent` queued for

    the current phase. The default Jakarta Faces API doesn’t offer such

    events for the update model values phase, but developers can create and

    queue their own.

    Also during this phase, from the standard HTML component set, only

    `UIInput`

    components have additional functionality here. After calling `processUpdates()`
    on

    each child and facet, they will invoke `UIInput#updateModel()`

    on itself. When both the `UIInput#isValid()` and

    `UIInput#isLocalValueSet()`

    return `true`,

    then they will invoke the setter method behind the `value` attribute with

    `getLocalValue()`

    as argument and immediately invoke `UIInput#setValue()`

    with `null` and

    clear out the `UIInput#isLocalValueSet()`

    flag by letting it return `false`.

    When a `RuntimeException` is

    thrown here, usually caused by a bug in the setter method itself, then

    it will invoke `UIInput#setValid()`

    with `false` and

    queue the `UpdateModelException`,

    and the life cycle will immediately advance to the render response phase

    (sixth phase), hereby skipping any phase in between.


    Invoke Application Phase (Fifth Phase)

    The `UIViewRoot#processApplication()`

    method  will be

    invoked. This method will in turn invoke the `UIViewRoot#broadCastEvents()`

    to fire any `FacesEvent` queued for

    the current phase, which is usually an instance of `AjaxBehaviorEvent` or

    `ActionEvent`.

    Note that the `processApplication()`

    method is only defined on the `UIViewRoot` class and

    does not traverse the component tree.


    Render Response Phase (Sixth Phase)

    When the component tree is still empty, i.e., when the HTTP request is not a

    postback request, or when the view has no `<f:metadata>`

    with children, or when the developer has in the meanwhile explicitly

    invoked `FacesContext#setViewRoot()`

    with its own instance, then build the full component tree based on the

    view definition. When the component tree is present, first, fire the

    `PreRenderViewEvent`

    for the `UIViewRoot`, then

    invoke `UIComponent#encodeAll()`

    on the `UIViewRoot`, and

    finally fire the `PostRenderViewEvent`

    for the `UIViewRoot`.

    The `UIComponent#encodeAll()`

    method  of each

    component will basically first invoke its own `encodeBegin()`

    method . Then, if

    the `getRendersChildren()`

    method  returns

    `true`, the

    component will invoke its own `encodeChildren()`

    method , else it

    will invoke `encodeAll()` on each

    child. Finally, the component will invoke its own `encodeEnd()`

    method . This all

    happens only if `UIComponent#isRendered()`

    returns `true—`that is, when

    the `rendered`

    attribute of the component tag doesn’t evaluate to `false`.

    The default implementation of the `encodeBegin()`

    method  will first

    fire the `PreRenderComponentEvent`

    for the current component and then delegate to `Renderer#encodeBegin()`.

    The default implementation of the `encodeChildren()`

    method will delegate to `Renderer#encodeChildren()`.

    The default implementation of the `encodeEnd()`

    method  will

    delegate to `Renderer#encodeEnd()`.

    If the component has no renderer attached, that is, when `UIComponent#getRendererType()`

    returns `null`,

    then no HTML output will be rendered to the response.

    In the `encodeBegin()`

    method  , the component or the

    renderer implementation has the opportunity to write the opening HTML

    element and all of its attributes to the response. In the `encodeChildren()`

    method , the

    component or the renderer implementation has the opportunity to decorate

    or override the rendering of the children if necessary. In the `encodeEnd()` method,

    the component or the renderer implementation has the opportunity to

    write the closing HTML tag. Writing to the response happens with the

    response writer as available by `FacesContext#getResponseWriter()`.

    For any mentioned `XxxEvent` class that

    has been fired in any phase, if any listener method throws `jakarta.faces.event.AbortProcessingException`,^([⁴](#fn4))
    then the currently running

    phase will be immediately aborted, and the life cycle will immediately

    advance to the render response phase (sixth phase), hereby skipping any

    phase in between.


    Ajax Life Cycle

    The life cycle

    is almost identical during Ajax requests. Only the second, third,

    fourth, and sixth phases are slightly different. The `processDecodes()`,

    `processValidators()`,

    and `processUpdates()`

    methods will only be invoked on the `UIViewRoot` itself and

    any component covered by the component search expression specified in

    `<f:ajax execute>`. And the `encodeAll()`

    method  will only

    be invoked on the `UIViewRoot` itself and

    any component covered by the component search expression specified in

    `<f:ajax render>`. Read more on search expressions in Chapter [12](#454457_2_En_12_Chapter.xhtml).

    Note thus that there would be no difference in the Ajax life cycle

    when the component search expression contains the “`@all`” keyword. It

    would unnecessarily process and encode the entire component tree. In

    other words, use “`@all`” with care.

    There are no sensible real-world use cases for `<f:ajax execute="@all">`. On the
    HTML side, it’s not possible to submit

    multiple forms at once. Only the enclosing form is submitted. The

    biggest value is thus `<f:ajax execute="@form">`. However, there is one sensible
    real-world

    use case for a `<f:ajax render="@all">`, namely, rendering a full error page in
    case an

    exception is thrown during an Ajax request. Even then, this can better

    be programmatically triggered via `PartialViewContext#setRenderAll()`.

    For more details, see Chapter [9](#454457_2_En_9_Chapter.xhtml).'
  trans: '

    更新模型值阶段（第四阶段）

    `UIViewRoot` 上会调用 `UIComponent#processUpdates()` 方法。`processUpdates()` 方法随后会依次在每个子组件和方面（facet）上调用
    `processUpdates()` 方法。最后，将调用 `UIViewRoot#broadCastEvents()` 来触发为当前阶段排队的任何 `FacesEvent`。默认的
    Jakarta Faces API 并未为更新模型值阶段提供此类事件，但开发者可以创建并排队自己的事件。

    同样在此阶段，来自标准 HTML 组件集的组件中，只有 `UIInput` 组件具有额外的功能。在每个子组件和方面上调用 `processUpdates()`
    之后，它们会在自身调用 `UIInput#updateModel()`。当 `UIInput#isValid()` 和 `UIInput#isLocalValueSet()`
    都返回 `true` 时，它们将以 `getLocalValue()` 作为参数调用 `value` 属性背后的 setter 方法，并立即以 `null`
    为参数调用 `UIInput#setValue()`，并通过让 `UIInput#isLocalValueSet()` 返回 `false` 来清除其标志。

    如果此处抛出 `RuntimeException`（通常由 setter 方法本身的错误引起），则会以 `false` 为参数调用 `UIInput#setValid()`
    并排队 `UpdateModelException`，生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过其间的任何阶段。


    调用应用程序阶段（第五阶段）

    将调用 `UIViewRoot#processApplication()` 方法。此方法随后会调用 `UIViewRoot#broadCastEvents()`
    来触发为当前阶段排队的任何 `FacesEvent`，这通常是 `AjaxBehaviorEvent` 或 `ActionEvent` 的实例。请注意，`processApplication()`
    方法仅在 `UIViewRoot` 类上定义，并且不会遍历组件树。


    渲染响应阶段（第六阶段）

    当组件树仍为空时（即，当 HTTP 请求不是回发请求，或者视图没有带子元素的 `<f:metadata>`，或者开发者在此期间使用自己的实例显式调用了 `FacesContext#setViewRoot()`），则基于视图定义构建完整的组件树。当组件树存在时，首先为
    `UIViewRoot` 触发 `PreRenderViewEvent`，然后在 `UIViewRoot` 上调用 `UIComponent#encodeAll()`，最后为
    `UIViewRoot` 触发 `PostRenderViewEvent`。

    每个组件的 `UIComponent#encodeAll()` 方法基本上会首先调用其自身的 `encodeBegin()` 方法。然后，如果 `getRendersChildren()`
    方法返回 `true`，则组件将调用其自身的 `encodeChildren()` 方法，否则它将在每个子组件上调用 `encodeAll()`。最后，组件将调用其自身的
    `encodeEnd()` 方法。这一切仅在 `UIComponent#isRendered()` 返回 `true` 时发生——即，当组件标签的 `rendered`
    属性计算结果不为 `false` 时。

    `encodeBegin()` 方法的默认实现将首先为当前组件触发 `PreRenderComponentEvent`，然后委托给 `Renderer#encodeBegin()`。`encodeChildren()`
    方法的默认实现将委托给 `Renderer#encodeChildren()`。`encodeEnd()` 方法的默认实现将委托给 `Renderer#encodeEnd()`。如果组件没有附加渲染器，即当
    `UIComponent#getRendererType()` 返回 `null` 时，则不会向响应中渲染任何 HTML 输出。

    在 `encodeBegin()` 方法中，组件或渲染器实现有机会将开头的 HTML 元素及其所有属性写入响应。在 `encodeChildren()` 方法中，组件或渲染器实现有机会在必要时装饰或覆盖子元素的渲染。在
    `encodeEnd()` 方法中，组件或渲染器实现有机会写入结束的 HTML 标签。写入响应是通过 `FacesContext#getResponseWriter()`
    提供的响应写入器完成的。

    对于在任何阶段触发的任何提到的 `XxxEvent` 类，如果任何监听器方法抛出 `jakarta.faces.event.AbortProcessingException`，^(⁴)
    则当前正在运行的阶段将立即中止，并且生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过其间的任何阶段。


    Ajax 生命周期

    在 Ajax 请求期间，生命周期几乎相同。只有第二、第三、第四和第六阶段略有不同。`processDecodes()`、`processValidators()`
    和 `processUpdates()` 方法将仅在 `UIViewRoot` 本身以及 `<f:ajax execute>` 中指定的组件搜索表达式所涵盖的任何组件上调用。而
    `encodeAll()` 方法将仅在 `UIViewRoot` 本身以及 `<f:ajax render>` 中指定的组件搜索表达式所涵盖的任何组件上调用。有关搜索表达式的更多信息，请参阅第
    12 章。

    因此请注意，当组件搜索表达式包含“`@all`”关键字时，Ajax 生命周期没有区别。它会不必要地处理和编码整个组件树。换句话说，请谨慎使用“`@all`”。对于
    `<f:ajax execute="@all">`，没有合理的实际用例。在 HTML 方面，不可能一次提交多个表单。只有包含的表单会被提交。因此，最大的价值在于
    `<f:ajax execute="@form">`。然而，对于 `<f:ajax render="@all">` 有一个合理的实际用例，即在 Ajax 请求期间抛出异常时渲染完整的错误页面。即便如此，这也可以通过
    `PartialViewContext#setRenderAll()` 以编程方式更好地触发。有关更多详细信息，请参阅第 9 章。

