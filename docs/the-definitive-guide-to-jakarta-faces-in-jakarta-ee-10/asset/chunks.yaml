  trans: "\n请注意，目前互联网上存在大量质量低劣的 Jakarta Faces 教程，它们未能正确使用 `library` 属性。相反，这些教程错误地将\
    \ `library` 属性演示为 `src/main/webapp/resources` 文件夹内的子文件夹，示例如下：\n\n这种做法是完全错误的。它无法让自定义资源处理器区分不同库的资源。在前面的示例中，你基本上需要检查三个不同的资源库，尽管所有这些资源都属于同一个库——即\
    \ Web 项目本身。\n\n谈到自定义资源处理器，假设你想强制 Web 浏览器在服务器端的图片、JavaScript 和/或 CSS 资源发生更改时重新加载它们。这可以通过向资源\
    \ URL 添加一个查询字符串参数来实现，该参数的值代表资源的版本。这也被称为“缓存破坏”。在 Jakarta Faces 中，可以通过以下自定义 `ResourceHandler`\
    \ 示例来实现，该处理器装饰 `Resource` 以返回其最后修改时间戳作为查询字符串参数。\n\n```\npublic class VersionResourceHandler\
    \ extends ResourceHandlerWrapper {\n    public VersionResourceHandler(ResourceHandler\
    \ wrapped) {\n        super(wrapped);\n    }\n\n    @Override\n    public Resource\
    \ createResource(String name, String library) {\n        Resource resource = super.createResource(name,\
    \ library);\n        if (resource == null || library != null) {\n            return\
    \ resource;\n        }\n        return new ResourceWrapper(resource) {\n     \
    \       @Override\n            public String getRequestPath() {\n            \
    \    String url = super.getRequestPath();\n                return url\n      \
    \              + (url.contains(\"?\") ? \"&\" : \"?\")\n                    +\
    \ \"v=\" + getLastModified();\n            }\n\n            private long getLastModified()\
    \ {\n                try {\n                    return getWrapped().getURL()\n\
    \                        .openConnection().getLastModified();\n              \
    \  }\n                catch (IOException ignore) {\n                    return\
    \ 0;\n                }\n            }\n        };\n    }\n}\n```\n\n为了激活它，需要在\
    \ `faces-config.xml` 中注册如下：\n\n```\n<resource-handler>\n    com.example.project.resourcehandler.VersionResourceHandler\n\
    </resource-handler>\n```\n\n请注意，`createResource()` 方法在资源为 `null` 或 `library` 不为\
    \ `null` 时，会原样返回创建的资源。当 `name` 未知时，资源本身为 `null`。当 `library` 未指定时，它为 `null`，因此特定于\
    \ Web 项目。当然，你也可以将此逻辑应用于其他库的所有资源，但它们通常已经拥有自己内部实现的此类资源处理器。\n\n回到资源组件，你只能将 `<h:graphicImage>`\
    \ 放置在 body 内，body 可以是纯 HTML 的 `<body>` 或 Jakarta Faces 的 `<h:body>`。显然，在纯 HTML\
    \ 文档中，`<img>` 元素只能位于文档 body 内。你可以将 `<h:outputScript>` 和 `<h:outputStylesheet>`\
    \ 放置在 Jakarta Faces 页面的任何位置。默认情况下，`<h:outputScript>` 会在声明的位置精确生成 HTML `<script>`\
    \ 元素，无论该位置是在文档的 head 还是 body 中。然而，`<h:outputStylesheet>` 在 `<h:body>` 内声明时，默认会被移动到\
    \ `<h:head>` 的末尾。这是因为在 HTML 中，将 `<link rel=\"stylesheet\">` 放在 `<head>` 之外是不合法的。当\
    \ `<h:outputScript>` 在 `<h:body>` 内声明且 `target` 属性设置为 `head` 时，它也可以被自动移动到文档 head\
    \ 的末尾。当 `<h:outputScript>` 的 `target` 属性设置为 `body` 时，它会被自动移动到文档 body 的末尾。`<h:outputStylesheet>`\
    \ 不支持此功能。换句话说，以下测试 Facelet：\n\n```\n<ui:composition xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n    xmlns:h=\"jakarta.faces.html\">\n    <h:head>\n        <h:outputScript name=\"\
    script1.js\" />\n        <h:outputStylesheet name=\"style1.css\" />\n        <h:outputScript\
    \ name=\"script2.js\" target=\"head\" />\n    </h:head>\n    <h:body>\n      \
    \  <h:outputStylesheet name=\"style2.css\" />\n        <h:outputScript name=\"\
    script3.js\" target=\"head\" />\n        <h:outputScript name=\"script4.js\" target=\"\
    body\" />\n        <h:outputScript name=\"script5.js\" />\n        <h:graphicImage\
    \ name=\"image1.png\" />\n        <p>Paragraph 1</p>\n        <p>Paragraph 2</p>\n\
    \    </h:body>\n</ui:composition>\n```\n\n基本上会生成以下 HTML 输出（为简洁起见，URL 已简化）：\n\n\
    ```\n<html xmlns=\"http://www.w3.org/1999/xhtml\">\n<head>\n<script type=\"text/javascript\"\
    \ src=\"script1.js\"></script>\n<link type=\"text/css\" rel=\"stylesheet\" href=\"\
    style1.css\" />\n<script type=\"text/javascript\" src=\"script2.js\"></script>\n\
    <link type=\"text/css\" rel=\"stylesheet\" href=\"style2.css\" />\n<script type=\"\
    text/javascript\" src=\"script3.js\"></script>\n</head>\n<body>\n<script type=\"\
    text/javascript\" src=\"script4.js\"></script>\n<script type=\"text/javascript\"\
    \ src=\"script5.js\"></script>\n<img src=\"image1.png\" alt=\"\" />\n<p>Paragraph\
    \ 1</p>\n<p>Paragraph 2</p>\n</body>\n</html>\n```\n\n换句话说，文档 head 中的资源渲染顺序是：\n\
    \n1.  来自 `<h:head>` 且没有 `target` 的 `<h:outputScript>`\n2.  来自 `<h:head>` 的 `<h:outputStylesheet>`\n\
    3.  来自 `<h:head>` 且 `target=\"head\"` 的 `<h:outputScript>`\n4.  来自 `<h:body>`\
    \ 的 `<h:outputStylesheet>`\n5.  来自 `<h:body>` 且 `target=\"head\"` 的 `<h:outputScript>`\n\
    \n请注意，`<h:outputStylesheet>` 隐式推断 `target=\"head\"`，因此会在没有任何 target 的 `<h:outputScript>`\
    \ *之后*渲染。所有通过组件的 `@ResourceDependency` 注解自动包含的 JavaScript 和 CSS 资源，最终会位于 `<h:head>`\
    \ 中声明的资源和 `<h:body>` 中声明的资源之间。因此，如果你碰巧使用了一个自动包含一堆 CSS 资源的 Jakarta Faces 库，并且想要覆盖其中一些资源，那么最好将这样的\
    \ `<h:outputStylesheet>` 放在 `<h:body>` 中，而不是 `<h:head>` 中，这样可以保证它在库的 CSS 资源*之后*加载。\n\
    \n但要注意，某些 Jakarta Faces 库会自动覆盖 `<h:head>` 的默认渲染器，这可能会打乱默认的资源排序。在这种情况下，你最好查阅相关\
    \ Jakarta Faces 库的文档以了解新的排序规则，或者通过 Web 项目的 `faces-config.xml` 恢复 `<h:head>` 的默认渲染器。\n\
    \n```\n<render-kit>\n    <renderer>\n        <component-family>jakarta.faces.Output</component-family>\n\
    \        <renderer-type>jakarta.faces.Head</renderer-type>\n        <renderer-class>com.sun.faces.renderkit.html_basic.HeadRenderer</renderer-class>\n\
    \    </renderer>\n</render-kit>\n```\n\n如果你使用的是 MyFaces 而不是 Mojarra 作为 Jakarta\
    \ Faces 实现，那么请使用 `org.apache.myfaces.renderkit.html.HtmlHeadRenderer` 作为渲染器类。\n\
    \n如果你打算开发一个自动包含特定资源的 Jakarta Faces 库，那么请记住使用 `@ResourceDependency` 或 `UIViewRoot#addComponentResource()`，而不是为此目的替换\
    \ `<h:head>` 的默认渲染器。由于注解不允许指定动态值，任何动态资源最好在 `<h:head>` 的 `PostAddToView` 事件期间添加。这可以通过一个\
    \ `SystemEventListener` 在应用程序范围内实现，如下所示，假设你的库的资源库名称是“`foo`”：\n\n```\npublic class\
    \ DynamicResourceListener implements SystemEventListener {\n    private static\
    \ final String LIBRARY = \"foo\";\n\n    @Override\n    public boolean isListenerForSource(Object\
    \ source) {\n        UIOutput output = (UIOutput) source;\n        return \"jakarta.faces.Head\"\
    .equals(output.getRendererType());\n    }\n\n    @Override\n    public void processEvent(SystemEvent\
    \ event) {\n        FacesContext context = event.getFacesContext();\n        String\
    \ scriptName = \"foo.js\"; // 可以是动态的。\n        addResource(context, scriptName);\n\
    \        String stylesheetName = \"foo.css\"; // 可以是动态的。\n        addResource(context,\
    \ stylesheetName);\n    }\n\n    private void addResource(FacesContext context,\
    \ String name) {\n        UIComponent resource = new UIOutput();\n        resource.getAttributes().put(\"\
    library\", LIBRARY);\n        resource.getAttributes().put(\"name\", name);\n\
    \        resource.setRendererType(context.getApplication()\n            .getResourceHandler().getRendererTypeForResourceName(name));\n\
    \        context.getViewRoot()\n            .addComponentResource(context, resource,\
    \ \"head\");\n    }\n}\n```\n\n它在 `faces-config.xml` 中注册如下：\n\n```\n<application>\n\
    \    <system-event-listener>\n        <system-event-listener-class>\n        \
    \    com.example.project.listener.DynamicResourceListener\n        </system-event-listener-class>\n\
    \        <system-event-class>\n            jakarta.faces.event.PostAddToViewEvent\n\
    \        </system-event-class>\n        <source-class>\n            jakarta.faces.component.UIOutput\n\
    \        </source-class>\n    </system-event-listener>\n</application>\n```\n\n\
    请注意，`<source-class>` 最好可以是 `jakarta.faces.component.html.HtmlHead`，但这并不一定在所有 Jakarta\
    \ Faces 实现中都有效。例如，在 Mojarra 中，`<h:head>` 隐式创建的是 `UIOutput` 的实例，而不是 `HtmlHead`。\n\
    \n安装后，这个 `DynamicResourceListener` 将为上面最后一个包含 `style1.css`、`script1.js`、`script2.js`\
    \ 等的测试 Facelet 生成以下 HTML 输出（同样，为简洁起见，URL 已简化）。\n\n```\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    >\n<head>\n<script type=\"text/javascript\" src=\"script1.js\"></script>\n<link\
    \ type=\"text/css\" rel=\"stylesheet\" href=\"style1.css\" />\n<script type=\"\
    text/javascript\" src=\"script2.js\"></script>\n<link type=\"text/css\" rel=\"\
    stylesheet\" href=\"foo.css\" />\n<script type=\"text/javascript\" src=\"foo.js\"\
    ></script>\n<link type=\"text/css\" rel=\"stylesheet\" href=\"style2.css\" />\n\
    <script type=\"text/javascript\" src=\"script3.js\"></script>\n</head>\n<body>\n\
    <script type=\"text/javascript\" src=\"script4.js\"></script>\n<script type=\"\
    text/javascript\" src=\"script5.js\"></script>\n<img src=\"image1.png\" alt=\"\
    \" />\n<p>Paragraph 1</p>\n<p>Paragraph 2</p>\n</body>\n</html>\n```\n\n因此，文档\
    \ head 中的资源渲染顺序是：\n\n1.  来自 `<h:head>` 且没有 `target` 的 `<h:outputScript>`\n"
- fmt: '2. Dynamic script added to `head` during `PostAddToView`

    3. Dynamic stylesheet added to `head` during `PostAddToView`

    4. `<h:outputStylesheet>` from `<h:head>`

    5. `<h:outputScript>` from `<h:head>` with `target="head"`

    6. `<h:outputStylesheet>` from `<h:body>`

    7. `<h:outputScript>` from `<h:body>` with `target="head"`


    You see, the ordering is quite predictable. It shouldn’t have been necessary to
    override the renderer of `<h:head>`. Moreover, overriding the renderer of `<h:head>`
    from a Jakarta Faces library risks the possibility that it becomes incompatible
    with any other Jakarta Faces library that coincidentally also overrides the renderer
    of `<h:head>`. You’d really want to avoid that.


    Another advantage of using resource components is that Jakarta Faces can this
    way automatically push all resources associated with the page to the client so
    that the client will be able to retrieve them sooner than the time needed to parse
    the HTML document and locate all `<link>`, `<script>`, and `<img>` elements. This
    is new since Jakarta Faces 2.3. This only requires that the Jakarta Faces 2.3
    web application is deployed to a Servlet 4.0–compatible container (Payara 5, GlassFish
    5, Tomcat 9, WildFly 12, etc.), and that HTTPS is being used instead of HTTP,
    and that the client supports HTTP/2 protocol.^([(62)](#fn62)) This does not require
    additional configuration from the Jakarta Faces side on.


    ## Pass-Through Elements


    Jakarta Faces also supports implicitly interpreting any arbitrary HTML element
    as a full-fledged Jakarta Faces component. This feature was introduced in Jakarta
    Faces 2.2 and is formally known as “pass-through elements.” This is particularly
    useful when you want to use HTML5 elements such as `<main>`, `<article>`, `<section>`,
    `<aside>`, `<nav>`, `<header>`, and `<footer>` and you want to be able to reference
    them in `<f:ajax render>`. Previously, before Jakarta Faces 2.2, those elements
    didn’t have a Jakarta Faces component equivalent and you’re therefore forced to
    wrap them in `<h:panelGroup layout="block">` that only makes the generated HTML
    output less semantic. The pass-through element trigger is available by the `jakarta.faces`
    namespace. All you need to do is to specify at least one attribute on this namespace.
    The default namespace prefix is just “`faces`”.


    ```

    Title

    ...

    ...

    ...

    ...

    ```


    Under the hood, in the Jakarta Faces component tree, those HTML5 elements are
    turned into a `UIPanel` component and are treated in the Jakarta Faces component
    tree exactly like `<h:panelGroup>`. This way you can cleanly keep using semantic
    HTML5 markup while still being able to reference them via `<f:ajax render>`. In
    other words, the following construct won’t work:


    ```

    ...

    ...

    ```


    It fails because `UIViewRoot#findComponent()` doesn’t return anything when passing
    “`main`” as search keyword. Jakarta Faces can’t find any component with the given
    ID. The `<main>` element is here basically interpreted as template text. But the
    following construct will work:


    ```

    ...

    ...

    ```


    `UIViewRoot#findComponent()` on “`main`” will then return a `UIPanel` instance
    representing the `<main>` element. Jakarta Faces will then be able to render it
    into the Ajax response. The pass-through element feature also works on other HTML
    elements; only they don’t necessarily turn into a `UIPanel` instance. Instead,
    they will be turned into a Jakarta Faces component whose generated HTML output
    matches the very HTML element (see Table [6-1](#454457_2_En_6_Chapter.xhtml#Tab1)).
    The following construct is, under the hood, identical to the previous one:


    ### Table 6-1 Passthrough Elements Recognized by Jakarta Faces


    | Passthrough HTML element | Implied Jakarta Faces component |

    | --- | --- |

    | `<a faces:action="…">` | `<h:commandLink>` |

    | `<a faces:actionListener="…">` | `<h:commandLink>` |

    | `<a faces:value="…">` | `<h:outputLink>` |

    | `<a faces:outcome="…">` | `<h:link>` |

    | `<body faces:id="…">` | `<h:body>` |

    | `<button faces:id="…">` | `<h:commandButton type="button">` |

    | `<button faces:outcome="…">` | `<h:button>` |

    | `<form faces:id="…">` | `<h:form>` |

    | `<head faces:id="…">` | `<h:head>` |

    | `<img faces:id="…">` | `<h:graphicImage>` |

    | `<input faces:id="…" type="button">` | `<h:commandButton type="button">` |

    | `<input faces:id="…" type="checkbox">` | `<h:selectBooleanCheckbox>` |

    | `<input faces:id="…" type="file">` | `<h:inputFile>` |

    | `<input faces:id="…" type="hidden">` | `<h:inputHidden>` |

    | `<input faces:id="…" type="password">` | `<h:inputSecret>` |

    | `<input faces:id="…" type="reset">` | `<h:commandButton type="reset">` |

    | `<input faces:id="…" type="submit">` | `<h:commandButton type="submit">` |

    | `<input faces:id="…" type="*">` | `<h:inputText>` |

    | `<label faces:id="…">` | `<h:outputLabel>` |

    | `<link faces:id="…">` | `<h:outputStylesheet>` |

    | `<script faces:id="…">` | `<h:outputScript>` |

    | `<select faces:id="…">` | `<h:selectOneListbox>` |

    | `<select faces:id="…" multiple="*">` | `<h:selectManyListbox>` |

    | `<* faces:id="…">` | `<h:panelGroup>` |


    ```

    ...

    ...

    ```


    Any attribute specified on such a pass-through element is implicitly mapped to
    the corresponding attribute of the Jakarta Faces component. In the following example,
    the Jakarta Faces component and pass-through element pairs are equivalent.


    ```

    Contact

    ```


    Note that you don’t necessarily need to register every single attribute of a pass-through
    element on the “`faces`” namespace. Only one is sufficient to trigger the pass-through
    element feature, preferably the first one. This keeps the code concise.


    ## Footnotes


    ## 7. Facelets Templating


    When Jakarta Faces came out for first time in 2004, only Jakarta Pages (formerly
    known as Jakarta Pages) was available as view technology. It was immediately clear
    that it was an ill-suited view technology for web development with Jakarta Faces.
    The problem with Jakarta Pages is that it writes to the HTTP response as soon
    as it encounters template text, while Jakarta Faces would like to first create
    a component tree based on the view declaration in order to be able to perform
    the life cycle processing on it. For example, the following Jakarta Faces 1.0/1.1
    page using Jakarta Pages view technology:


    ```

    strong link text

    ```


    would produce the following HTML output, with template text emitted by Jakarta
    Pages *before* the generated HTML output of Jakarta Faces components:


    ```

    strong link text

    ```


    The “correct approach” would be to wrap template text in `<f:verbatim>` tags:


    ```

    strong link text

    ```


    which would correctly produce the following HTML output:


    ```

    strong link text

    ```'
