    The “Component superclass” column specifies the most important `UIComponent` superclass
    which the component extends from. You must interpret the specified class to be
    from the `jakarta.faces.component` package. The “Value type” column specifies
    the supported type of the model value behind the component’s `value` attribute,
    if it has any. If the value type is `String`, then it means that only the model
    value’s `toString()` outcome will be used as value of the component, generally
    in components which would render it as some sort of label. If it’s `Object`, it
    means that it supports any kind of value, generally in components which would
    render it as text or parse it as input value, if necessary with help of an implicit
    or explicit `Converter`. If the value type is `Object[]`, it means that it requires
    an array or collection of objects as model value, generally in data and multiselection
    input components, if necessary with an implicit or explicit `Converter`.


    There are two specialized input components: the `<h:inputFile>`, which binds the
    uploaded file to a `jakarta.servlet.http.Part` property and doesn’t support outputting
    it—for security reasons—and the `<h:selectBooleanCheckbox>`, which binds the checked
    value to a `boolean` property. These two input components don’t support a `Converter`
    and therefore don’t support any other model value type.


    The “HTML output” column specifies the minimum generated HTML output. If the HTML
    output says “if necessary,” then it means that the specified HTML element is only
    emitted when the component has any attribute specified that requires being outputted
    as an HTML element attribute, such as `id`, `styleClass`, and `onclick`. That
    is, a component can have attributes that don’t end up in the generated HTML output
    at all, such as `binding`, `rendered`, and `converter`. If a component can have
    multiple HTML element representations, then that’s usually controlled by the `layout`
    attribute as you can see with `<h:messages>` and `<h:panelGroup>`. If the HTML
    output contains “*” (an asterisk), then it means that the component may emit zero
    or more of the specified nested HTML elements.


    The “Since” column indicates the first Jakarta Faces version the HTML component
    was available in. At the time this book was written, the following Jakarta Faces
    versions were available: 1.0 (March 2004), 1.1 (May 2004), 1.2 (May 2006), 2.0
    (July 2009), 2.1 (November 2010), 2.2 (March 2013), 2.3 (March 2017), 2.0 (October
    2020), and 4.0 (May 2022). The individual HTML components are detailed in Chapter
    [4](#454457_2_En_4_Chapter.xhtml) and in Chapter [6](#454457_2_En_6_Chapter.xhtml).


    ## Standard Core Tags


    Next to the standard HTML components, Jakarta Faces also provides a set of “core”
    tags. Those are essentially “helper” tags that allow you to declaratively configure
    one or more target HTML components by either nesting in them or wrapping around
    them. Those core tags are available under the XML namespace URI of `jakarta.faces.core`
    which should be assigned to the “`f`” XML namespace prefix.


    Technically, those tags are intended to be reusable on non-HTML components. Jakarta
    Faces also offers the possibility of attaching a different render kit to the component
    tree that doesn’t generate HTML output but a different markup, hence the different
    XML namespace. Table [3-2](#454457_2_En_3_Chapter.xhtml#Tab2) provides an overview.


