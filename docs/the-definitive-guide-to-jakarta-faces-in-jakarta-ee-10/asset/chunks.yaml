- fmt: "有时候，不仅需要根据调用者所拥有的角色来以不同方式渲染视图内容，还需要考虑调用者被允许访问哪些其他视图（Web 资源）。例如，在渲染导航菜单时（省略调用者无权访问的视图条目），或者以特殊方式（例如，用红色显示或旁边带锁图标）渲染导航到调用者无权访问的视图的链接或按钮时，就会用到这一点。\n\
    \n实现此功能的传统方法是测试程序员已知能授予对给定视图访问权限的角色。虽然这看起来可能有效，但在实践中通常很脆弱，因为它让代码在特定角色/视图关系的假设下运行，却没有强有力的保证来确保这种关系确实成立。\n\
    \n一种更稳定的测试调用者是否有权访问给定视图的方法很简单，就是直接测试这一点：“调用者是否有权访问此视图（Web 资源）？”`SecurityContext`\
    \ 有一个方法几乎可以完全用于此目的：`SecurityContext#hasAccessToWebResource()`。由于 `SecurityContext`\
    \ 不是一个命名的 Bean 或隐式对象，我们必须创建一个小的辅助 Bean 才能在 EL 中使用它。如下所示：\n\n```java\n@Named @ApplicationScoped\n\
    public class Security {\n    @Inject\n    private SecurityContext securityContext;\n\
    \    public boolean hasAccessToWebResource(String resource) {\n        return\
    \ securityContext.hasAccessToWebResource(resource, \"GET\");\n    }\n}\n```\n\n\
    这里需要注意两点。首先，`hasAccessToWebResource()` 方法接受一个 Web 资源模式，该模式与我们之前看到的 `web.xml` 片段中用于\
    \ `url-pattern` 的模式相同。这接近于 Jakarta Faces 视图，但并不完全相同。Jakarta Faces 视图通常以独立于映射的方式指定（例如，`/foo`\
    \ 而不是 `/faces/foo` 或 `/foo.xhtml`）。然而，Web 资源模式必须是 URL 本身，并包含映射。\n\n其次，`hasAccessToWebResource()`\
    \ 要求我们指定要测试访问权限的 HTTP 方法。这是必需的，因为在 Jakarta EE Security 中，约束实际上适用于每个 URL 和每个 HTTP\
    \ 方法。例如，调用者可能有权 POST 到 `/foo.xhtml`，但无权 GET `/foo.xhtml`。由于我们将使用我们的实用方法进行导航测试，`GET`\
    \ 通常是正确的 HTTP 方法，但我们应该意识到有时可能需要测试其他 HTTP 方法。\n\n有了辅助 Bean，我们现在可以轻松检查对视图上目标资源的访问权限，并据此更改渲染。为了演示这一点，我们首先在\
    \ `web.xml` 中定义三个新的 Web 资源约束。\n\n```xml\n<security-constraint>\n    <web-resource-collection>\n\
    \        <web-resource-name>Bar</web-resource-name>\n        <url-pattern>/bar.xhtml</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>bar</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n\n<security-constraint>\n   \
    \ <web-resource-collection>\n        <web-resource-name>Foo</web-resource-name>\n\
    \        <url-pattern>/foo.xhtml</url-pattern>\n    </web-resource-collection>\n\
    \    <auth-constraint>\n        <role-name>foo</role-name>\n    </auth-constraint>\n\
    </security-constraint>\n\n<security-constraint>\n    <web-resource-collection>\n\
    \        <web-resource-name>Baz</web-resource-name>\n        <url-pattern>/baz.xhtml</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>baz</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n```\n\n定义这些约束后，我们可以在 `enabled`\
    \ 属性上通过访问检查来渲染指向它们的链接。例如，使用具有角色 `bar` 和 `foo` 但没有角色 `baz` 的调用者进行身份验证，将导致指向 `/baz`\
    \ 的链接被渲染为禁用状态。\n\n### 跨站请求伪造保护\n\n跨站请求伪造（CSRF）是一种攻击，它使用户在不知情甚至未经同意的情况下，向某个他们可能已登录的站点发送请求。此类请求随后会产生某种副作用，这种副作用可能以某种特定方式对攻击者有利。\n\
    \n例如，假设你的银行有一个 URL 格式为 `https:/example.com/transferAmount=4000&targetAccount=7836`，意思是“从我的账户向\
    \ ID 为 7836 的账户转账 4000 欧元”。在此语句中，“我的账户”是通过你与银行之间的登录会话（通常是一个 cookie）来确定的。现在，攻击者可能无法获取你的会话\
    \ cookie，但在这个例子中，如果只需诱使你的浏览器在你登录银行账户的同时，从你访问的任何其他网站（在另一个标签页或窗口中）发送 `https:/example.com/transferAmount=4000&targetAccount=7836`\
    \ 请求，并且 `targetAccount` 参数设置为攻击者控制的账户 ID，那么攻击者就不需要获取你的 cookie。请注意，在实践中，不太可能使用\
    \ GET 请求和请求参数，而是会使用 POST 和 POST 参数。然而，对于两者而言，都存在相同的基本漏洞。\n\n如果我们想保护我们的应用程序免受此类恶意请求的攻击，那么其中一种方法是在请求中包含“某些东西”（即一个令牌），该令牌需要满足：\n\
    \n1.  特定于某个调用者\n2.  在一段时间后过期\n3.  难以被猜测\n\n恰巧，Jakarta Faces 已经拥有满足所有这些三个要求的东西，那就是在\
    \ Jakarta Faces 表单中找到的 `jakarta.faces.ViewState` 隐藏参数。\n\n**注意**\n\n不过，有一个警告：只有在使用回发、服务器端状态保存以及相关视图不是无状态的情况下，此参数才能完全满足这些要求。只有在这种情况下，`jakarta.faces.ViewState`\
    \ 的值才有效地成为一个令牌。由于这是默认设置，Jakarta Faces 在此处相对安全，但一旦我们偏离这些默认设置（例如，通过使用无状态视图），这种保护就会受到损害。另请参阅第\
    \ [4](#454457_2_En_4_Chapter.xhtml) 章中的“无状态表单”一节。\n\n除了这种隐式的 CSRF 保护之外，Jakarta\
    \ Faces 还具有显式的 CSRF 保护。这种显式的 CSRF 保护为所有情况添加了一个令牌，并额外增加了对 `referer` 和 `origin`\
    \ HTTP 头的检查。请注意，通常不应信任传入请求的 HTTP 头，因为它们很容易被伪造。然而，对于这种特定的攻击，我们并不是要防御任意的 HTTP 请求，而是专门防御从受信任浏览器发送的请求。头部检查是对令牌检查的补充，并且令牌检查必须始终首先通过。\n\
    \n定义哪些视图应受 CSRF 令牌和额外头部检查保护的方式，与我们为视图定义角色的方式有些相似：在部署描述符中定义一组 URL 模式。不过，这次部署描述符是\
    \ `faces-config.xml` 而不是 `web.xml`。以下是在 `faces-config.xml` 中这些条目的示例：\n\n```xml\n\
    <protected-views>\n    <url-pattern>/bar.xhtml</url-pattern>\n    <url-pattern>/foo.xhtml</url-pattern>\n\
    \    <url-pattern>/baz.xhtml</url-pattern>\n</protected-views>\n```\n\n请注意，此处的\
    \ `url-pattern` 与 `web.xml` 中使用的模式完全相同。需要注意的一点是，尽管 `faces-config.xml` 是 Jakarta\
    \ Faces 特定的部署描述符，但此处的 `url-pattern` 仍然是相对于应用程序根目录的完整 URL，这意味着它必须包含所有使用的映射，例如 `/faces/`\
    \ 和 `.xhtml`。\n\n将带有前面展示的 `protected-views` 片段的 `faces-config.xml` 添加到我们在本章中一直在处理的示例应用程序代码中，将导致\
    \ `index.xhtml` 上的链接（例如，指向 `/bar.xhtml`）以以下方式渲染：\n\n```\n/bar.xhtml?jakarta.faces.Token=gdMoNbfOycv2v80gr\n\
    ```"
  raw: "Sometimes, it’s necessary not only to render content on a view\ndifferently,\
    \ depending on what roles a caller is in, but also to take\ninto account what\
    \ other views (web resources) a caller is allowed to\naccess. This comes into\
    \ play, for instance, when rendering navigation\nmenus (omitting the entries for\
    \ views a caller does not have access to),\nor rendering links or buttons that\
    \ navigate to views to which the caller\ndoes not have access in a special way\
    \ (e.g., in red or with a lock icon\nnext to it).\nA traditional way to implement\
    \ this is to test for the roles that the\nprogrammer knows give access to the\
    \ given view. While this may seem to\nwork well, it’s often brittle in practice\
    \ as it lets the code work under\nthe assumption of a specific role/view relationship\
    \ without any strong\nguarantees that this relationship actually holds.\n\nA more\
    \ stable way to test whether a caller has access to a given view is quite simply\
    \ to\ntest directly for exactly that; “does the caller have access to this\nview\
    \ (web resource)?”. The `SecurityContext` has a\nmethod that can be used for almost\
    \ exactly this: `SecurityContext#hasAccessToWebResource()`.\nSince the `SecurityContext`\
    \ is\nnot a named bean or implicit object, we have to create a small helper\n\
    bean in order to use this in EL. This is shown as follows:\n\n```\n@Named @ApplicationScoped\n\
    public class Security {\n@Inject\nprivate SecurityContext securityContext;\npublic\
    \ boolean hasAccessToWebResource(String resource) {\nreturn securityContext.hasAccessToWebResource(resource,\
    \ \"GET\");\n}\n}\n```\n\nThere are two things to be aware of here.\nFirst, the\
    \ `hasAccessToWebResource()`\nmethod takes a web resource pattern, which is the\
    \ same pattern as used\nfor the `url-pattern` in the\n`web.xml`\nfragment we looked\
    \ at earlier. This is close to, but not exactly the\nsame as, the Jakarta Faces\
    \ view. The Jakarta Faces view is often\nspecified in a mapping independent way\
    \ (e.g., `/foo` instead of `/faces/foo` or `/foo.xhtml`). The web\nresource pattern,\
    \ however, has to be the URL itself, with the mapping\nincluded.\nSecond, `hasAccessToWebResource()`\n\
    requires us to specify the HTTP method for which we test the access.\nThis is\
    \ required since in Jakarta EE Security, constraints actually\napply per URL and\
    \ per HTTP method. For instance, a caller can have\naccess to POST to `/foo.xhtml`\
    \ but not to\nGET `/foo.xhtml`.\nAs we’re going to use our utility method for\
    \ navigation tests, GET is\ntypically the right HTTP method to use, but we should\
    \ be aware that\nsometimes we may\nneed to test for another HTTP method.\n\nWith\
    \ the helper bean in place, we can now easily check for access to a\ntarget resource\
    \ on a view and alter the rendering based on that. To\ndemonstrate this, we’ll\
    \ first define three new web resource constraints\nin `web.xml`.\n\n```\n\nBar\n\
    /bar.xhtml\n\nbar\n\nFoo\n/foo.xhtml\n\nfoo\n\nBaz\n/baz.xhtml\n\nbaz\n\n```\n\
    \nAfter these constraints have been defined, we can render links to them\nwith\
    \ access checks on the enabled attribute.\n\nAuthenticating\n with a caller having,\
    \ for instance, the roles “`bar`” and “`foo`”, but not “`baz`”, will result in\n\
    the link to `/baz` being rendered\nas disabled.\n\nCross-Site Request Forgery\
    \ Protection\nCross-site request\nforgery (CSRF)\n is an attack that lets users\
    \ without their consent or even\nknowledge do a request to a site where they may\
    \ possibly be logged in.\nSuch request then has some side effect that in some\
    \ particular way may\nbe beneficial to the attacker.\nFor instance, suppose your\
    \ bank has a URL of the form `https:/example.com/transferAmount=4000&targetAccount=7836`\n\
    that means “transfer 4000 euros from my account to the account with ID\n7836.”\
    \ In this statement, the “my account” is being determined via the\nlogged-in session\
    \ (typically a cookie) that you have with your bank. Now\nan attacker might not\
    \ be able to capture your session cookie, but that’s\nnot necessary in this example\
    \ if only your browser can be tricked into\nsending the `https:/example.com/transferAmount=4000&targetAccount=7836`\n\
    request from any other website that you visit while you’re logged in to\nyour\
    \ bank in another tab or window, with the `targetAccount`\nparameter set to an\
    \ ID of an account that the attacker controls. Note\nthat in practice, a GET request\
    \ and request parameters would not likely\nbe used, but POST and POST parameters\
    \ would be used instead. However,\nfor both, the same basic vulnerability holds.\n\
    \nIf we want to protect our application against receiving such malicious\nrequests,\
    \ then one of the ways to do so is including “something” (i.e.,\na token) in the\
    \ request that is:\n\n1.  Specific to a certain caller\n\n2.  Expires after some\
    \ time\n\n3.  Can’t be easily guessed\n\nAs it happens, Jakarta Faces already\
    \ has something that fulfills all these\nthree requirements, and that’s the `jakarta.faces.ViewState`\n\
    hidden parameter that one finds within Jakarta Faces forms.\n\nCaution\n\nThere’s\
    \ a caveat though, and that’s that this parameter only fully\nfulfills those requirements\
    \ when using postbacks, state saving on server\nis used, and the view in question\
    \ is not stateless. Only in that case is\nthe value of `jakarta.faces.ViewState`\n\
    effectively a token. Since this is the default, Jakarta Faces is\nrelatively safe\
    \ out of the box here, but this protection is compromised\nas soon as we deviate\
    \ from these defaults, for instance, by using\nstateless views. See also the section\
    \ “Stateless Forms” in Chapter [4](#454457_2_En_4_Chapter.xhtml).\n\nNext to this\
    \ implicit CSRF protection, Jakarta Faces also has\nexplicit CSRF protection.\
    \ This explicit CSRF protection adds a token for\nall cases and additionally adds\
    \ checks for the “`referer`” and “`origin`” HTTP headers.\nNote that HTTP headers\
    \ should normally not be trusted for incoming\nrequests, as they can be very easily\
    \ spoofed. However, for this\nparticular attack, we’re not trying to defend against\
    \ just any random\nHTTP request but specifically against requests sent from a\
    \ trusted\nbrowser. The header checks are also in addition to the token check,\
    \ and\nthe token check must always pass first.\n\nDefining which views should\
    \ be protected by a CSRF token and the\nadditional header checks happens in a\
    \ way that’s somewhat similar to how\nwe defined roles for views: a collection\
    \ of URL patterns in a deployment\ndescriptor. This time the deployment descriptor\
    \ is `faces-config.xml`\ninstead of `web.xml` though. The\nfollowing gives an\
    \ example for these entries in `faces-config.xml`:\n\n```\n/bar.xhtml\n/foo.xhtml\n\
    /baz.xhtml\n\n```\n\nNote that the `url-pattern` here is\nthe exact same pattern\
    \ that is used in `web.xml`. One thing to\nbe aware of here is that despite `faces-config.xml`\n\
    being a Jakarta Faces`–`specific deployment\ndescriptor, the `url-pattern` here\
    \ is\nagain for the full URL relative to the application root which means it\n\
    has to include all mappings used such as `/faces/` and `.xhtml`.\n\nAdding a `faces-config.xml`\
    \  with the previously\nshown `protected-views`\nfragment to the example application\
    \ code we’ve been working on in this\nchapter will render the link on `index.xhtml`\
    \ to, for\nexample, `/bar.xhtml` in the\nfollowing way:\n\n```\n/bar.xhtml?jakarta.faces.Token=gdMoNbfOycv2v80gr\n\
    ```"
  trans: '

    有时，我们不仅需要根据调用者所拥有的角色来以不同方式渲染视图内容，还需要考虑调用者被允许访问哪些其他视图（网络资源）。例如，在渲染导航菜单时（省略调用者无权访问的视图条目），或者以特殊方式（例如，用红色显示或旁边加锁图标）渲染指向调用者无权访问的视图的链接或按钮时，就会用到这一点。


    实现此功能的一种传统方法是测试程序员已知能授予对给定视图访问权限的角色。虽然这看起来可能有效，但在实践中通常很脆弱，因为它让代码在特定角色/视图关系的假设下运行，却没有强有力的保证来确保这种关系确实成立。


    一种更稳定的测试调用者是否有权访问给定视图的方法非常简单，就是直接测试这一点：“调用者是否有权访问此视图（网络资源）？” `SecurityContext`
    有一个方法几乎可以完全用于此目的：`SecurityContext#hasAccessToWebResource()`。


    由于 `SecurityContext` 不是一个命名的 bean 或隐式对象，我们必须创建一个小的辅助 bean 才能在 EL 中使用它。如下所示：


    ```

    @Named @ApplicationScoped

    public class Security {

    @Inject

    private SecurityContext securityContext;

    public boolean hasAccessToWebResource(String resource) {

    return securityContext.hasAccessToWebResource(resource, "GET");

    }

    }

    ```


    这里需要注意两点。

    首先，`hasAccessToWebResource()` 方法接受一个网络资源模式，该模式与我们之前看到的 `web.xml` 片段中用于 `url-pattern`
    的模式相同。这接近于 Jakarta Faces 视图，但并不完全相同。Jakarta Faces 视图通常以独立于映射的方式指定（例如，`/foo` 而不是
    `/faces/foo` 或 `/foo.xhtml`）。然而，网络资源模式必须是 URL 本身，并包含映射。

    其次，`hasAccessToWebResource()` 要求我们指定要测试访问权限的 HTTP 方法。这是必需的，因为在 Jakarta EE Security
    中，约束实际上适用于每个 URL 和每个 HTTP 方法。例如，调用者可能有权 POST 到 `/foo.xhtml`，但无权 GET `/foo.xhtml`。

    由于我们将使用我们的实用方法进行导航测试，GET 通常是正确的 HTTP 方法，但我们应该意识到，有时我们可能需要测试其他 HTTP 方法。


    有了辅助 bean，我们现在可以轻松地检查对视图上目标资源的访问权限，并据此更改渲染。为了演示这一点，我们首先在 `web.xml` 中定义三个新的网络资源约束。


    ```


    Bar

    /bar.xhtml


    bar


    Foo

    /foo.xhtml


    foo


    Baz

    /baz.xhtml


    baz


    ```


    定义这些约束后，我们可以在 `enabled` 属性上通过访问检查来渲染指向它们的链接。


    使用拥有例如“`bar`”和“`foo`”角色但没有“`baz`”角色的调用者进行身份验证，将导致指向 `/baz` 的链接被渲染为禁用状态。


    跨站请求伪造保护

    跨站请求伪造（CSRF）是一种攻击，它使用户在未经其同意甚至不知情的情况下，向某个他们可能已登录的站点发送请求。此类请求随后会产生某种副作用，这种副作用可能以某种特定方式对攻击者有利。

    例如，假设你的银行有一个形式为 `https:/example.com/transferAmount=4000&targetAccount=7836` 的
    URL，意思是“从我的账户向 ID 为 7836 的账户转账 4000 欧元。”在此语句中，“我的账户”是通过你与银行之间的已登录会话（通常是一个 cookie）来确定的。现在，攻击者可能无法获取你的会话
    cookie，但在这个例子中，如果能够诱使你的浏览器在你登录银行账户的同时，从你访问的任何其他网站发送 `https:/example.com/transferAmount=4000&targetAccount=7836`
    请求，并且 `targetAccount` 参数设置为攻击者控制的账户 ID，那么就不需要获取 cookie。请注意，在实践中，不太可能使用 GET 请求和请求参数，而是会使用
    POST 和 POST 参数。然而，对于两者而言，都存在相同的基本漏洞。


    如果我们想保护我们的应用程序免受此类恶意请求的攻击，其中一种方法是在请求中包含“某物”（即一个令牌），该令牌需要满足：


    1.  特定于某个调用者


    2.  在一段时间后过期


    3.  难以被猜测


    恰好，Jakarta Faces 已经拥有满足所有这些三个要求的东西，那就是在 Jakarta Faces 表单中可以找到的 `jakarta.faces.ViewState`
    隐藏参数。


    注意


    不过有一个警告，那就是只有在使用回发、服务器端状态保存以及相关视图不是无状态的情况下，此参数才能完全满足这些要求。只有在这种情况下，`jakarta.faces.ViewState`
    的值才真正是一个令牌。由于这是默认设置，Jakarta Faces 在这方面开箱即用相对安全，但一旦我们偏离这些默认设置，例如通过使用无状态视图，这种保护就会受到损害。另请参阅第
    4 章中的“无状态表单”一节。


    除了这种隐式的 CSRF 保护之外，Jakarta Faces 还具有显式的 CSRF 保护。这种显式的 CSRF 保护为所有情况添加了一个令牌，并额外增加了对“`referer`”和“`origin`”HTTP
    头的检查。请注意，对于传入请求，通常不应信任 HTTP 头，因为它们很容易被伪造。然而，对于这种特定的攻击，我们并不是要防御任何随机的 HTTP 请求，而是专门防御来自受信任浏览器的请求。头部检查是对令牌检查的补充，并且令牌检查必须始终首先通过。


    定义哪些视图应该受到 CSRF 令牌和额外头部检查的保护，其方式与我们为视图定义角色的方式有些相似：在部署描述符中定义一组 URL 模式。不过，这次部署描述符是
    `faces-config.xml` 而不是 `web.xml`。以下是在 `faces-config.xml` 中这些条目的示例：


    ```

    /bar.xhtml

    /foo.xhtml

    /baz.xhtml


    ```


    请注意，这里的 `url-pattern` 与 `web.xml` 中使用的模式完全相同。这里需要注意的一点是，尽管 `faces-config.xml`
    是 Jakarta Faces 特定的部署描述符，但这里的 `url-pattern` 再次是相对于应用程序根目录的完整 URL，这意味着它必须包含所有使用的映射，例如
    `/faces/` 和 `.xhtml`。


    将前面显示的包含 `protected-views` 片段的 `faces-config.xml` 添加到我们本章一直在处理的示例应用程序代码中，将导致 `index.xhtml`
    上指向例如 `/bar.xhtml` 的链接以以下方式渲染：


    ```

    /bar.xhtml?jakarta.faces.Token=gdMoNbfOycv2v80gr

    ```

