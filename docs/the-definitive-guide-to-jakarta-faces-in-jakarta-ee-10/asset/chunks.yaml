    15. 扩展


    如果说 Jakarta Faces 有一个单一的元素或优点可以归因于其长久存在，那可能就是它能够以多种方式进行扩展。从一开始，Jakarta Faces 就使得替换、装饰或增强其大部分核心元素成为可能。这催生了大量的扩展库和项目。在早期，这些包括
    A4J (Ajax4JSF)、Tomahawk、RichFaces、独立的 Facelets 项目、PrettyFaces 等等。A4J 被合并到 RichFaces
    中，而 RichFaces 本身最终在 2016 年停止服务。Facelets 被纳入 Jakarta Faces 本身，而 PrettyFaces 则成为
    Rewrite 框架的一部分。如今，知名且活跃的扩展库包括 PrimeFaces、OmniFaces 和 BootsFaces 等。虽然个别库来了又去，但从早期至今，Jakarta
    Faces 的可扩展性始终如一。有时人们会说所有这些库都是为了解决 Jakarta Faces 的缺陷或遗漏，但这并不完全准确。事实上，Jakarta Faces
    被明确设计为允许此类扩展，从而允许甚至刺激此类扩展库的出现。例如，Jakarta Faces 的同期技术 Jakarta Enterprise Beans（以前称为
    Jakarta Enterprise Beans, Enterprise JavaBeans）几乎没有扩展点，因此，尽管它有许多缺点，我们从未看到围绕它形成繁荣的生态系统。


    扩展类型

    有几种不同的方式可以使用 Jakarta Faces 中的各种扩展点。一个主要的区别在于“经典”方法和“以 CDI 为中心的方法”。在后一种方法中，Jakarta
    Faces 几乎不需要显式支持可扩展性，因为 CDI 内置了许多机制来支持扩展或替换 CDI 工件。第 8 章的表 8-1 展示了这些工件。


    扩展 CDI 工件

    CDI 增强或完全替换类型的一种方式是提供替代生产者。我们已经在第 13 章中看到了这种技术的使用，尽管用例略有不同。最简单的方法是当你需要完全替换该类型时。如果需要增强，则需要一些代码来获取先前的类型，这在当前版本的
    CDI (4.0) 中略显冗长。


    以下展示了一个示例，我们将请求参数映射替换为一个新的映射，该映射包含原始映射的所有值，以及我们自己添加的一个额外值：


    ```

    @Dependent @Alternative @Priority(APPLICATION)

    public class RequestParameterMapProducer {

    @Produces @RequestScoped @RequestParameterMap

    public Map producer(BeanManager beanManager) {

    Map previousMap = getPreviousMap(beanManager);

    Map newMap = new HashMap(previousMap);

    newMap.put("test", "myTestValue");

    return newMap;

    }

    }

    ```


    如前所述，`getPreviousMap()` 方法有些冗长。其定义如下：


    ```

    private Map getPreviousMap(BeanManager beanManager) {

    class RequestParameterMapAnnotationLiteral

    extends AnnotationLiteral

    implements RequestParameterMap

    {

    private static final long serialVersionUID = 1L;

    }

    Type MAP_TYPE = new ParameterizedType() {

    @Override

    public Type getRawType() {

    return Map.class;

    }

    @Override

    public Type[] getActualTypeArguments() {

    return new Type[] {String.class, String.class};

    }

    @Override

    public Type getOwnerType() {

    return null;

    }

    };

    return (Map) beanManager

    .getReference(beanManager

    .resolve(beanManager

    .getBeans(MAP_TYPE, new RequestParameterMapAnnotationLiteral())

    .stream()

    .filter(bean -> bean

    .getBeanClass() != RequestParameterMapProducer.class)

    .collect(Collectors.toSet())),

    MAP_TYPE,

    beanManager.createCreationalContext(null));

    }

    }

    ```

