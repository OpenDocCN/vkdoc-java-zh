    \ you’re running the Jakarta Faces application on a\ncluster of servers (“cloud”),\
    \ or when you’d like the view state still to\nbe valid after a server restart.\
    \ You can generate a Base64-encoded AES\nkey yourself using the following plain\
    \ Java snippet:\n\n```\nKeyGenerator keyGen = KeyGenerator.getInstance(\"AES\"\
    );\nkeyGen.init(256); // Or 128 in case you don't have JCE.\nbyte[] rawKey = keyGen.generateKey().getEncoded();\n\
    String key = Base64.getEncoder().encodeToString(rawKey);\nSystem.out.println(key);\
    \ // Prints AES key in Base64 format.\n```"
  trans: '

    视图构建时间

    “视图构建时间”并不与 Jakarta Faces 生命周期的特定阶段绑定。视图构建时间是指根据视图定义，用其所有子节点填充物理 `UIViewRoot`
    实例的时刻。


    当 Jakarta Faces 即将根据视图定义创建 `UIComponent` 实例时，它会首先检查 `binding` 属性（如果有）背后的 getter
    方法是否返回一个具体的 `UIComponent` 实例。

    如果是，则继续使用该实例；否则，根据与之关联的“组件类型”创建 `UIComponent` 实例，然后调用 `binding` 属性（如果有）背后的 setter
    方法。如果指定了 `id` 属性，则会调用 `UIComponent#setId()`。最后，会调用 `UIComponent#setParent()` 传入父组件，然后该组件实例在物理上成为组件树的一部分。此树将一直存在，直到渲染响应阶段（第六阶段）结束。之后，它连同已释放的
    faces 上下文实例一起，有资格被垃圾回收器回收。


    因此，`UIComponent` 实例本质上是请求作用域的。`binding` 属性可以引用一个受管 bean 属性，但由于 `UIComponent` 实例本质上是请求作用域的，目标受管
    bean 也必须是请求作用域的，而不能是更宽的作用域。Jakarta Faces API 不会检查这一点，因此作为 Jakarta Faces 开发者，你务必确保不会在任何组件的
    `binding` 属性中引用更宽作用域的受管 bean。


    当任何组件的 `binding` 属性错误地引用了一个作用域宽于请求作用域的受管 bean 时，你不仅会在 bean 是视图或会话作用域的情况下，将整个组件树基本保存到
    HTTP 会话中，而且还会在并发访问同一个受管 bean 实例的多个 HTTP 请求之间共享整个组件树。这非常低效且危险。


    从技术上讲，视图构建时间可以发生在 Jakarta Faces 生命周期的任何阶段。通常，它发生在恢复视图阶段（第一阶段），特别是在回传请求期间，或者当视图包含带有子节点的
    `<f:metadata>` 时。它也可能发生在渲染响应阶段（第六阶段），特别是在 GET 请求期间，当视图没有带有子节点的 `<f:metadata>`
    时，或者当回传期间发生了非重定向导航时。当开发者以编程方式调用 `ViewDeclarationLanguage#buildView()` 时也会发生，这可以通过
    `ViewHandler#createView()` 等方式隐式完成，如下面的操作方法示例所示，该方法强制 Jakarta Faces 从头开始完全重建当前视图：


    ```

    public void rebuildCurrentView() {

    FacesContext context = FacesContext.getCurrentInstance();

    UIViewRoot currentView = context.getViewRoot();

    String viewId = currentView.getViewId();

    ViewHandler viewHandler = context.getApplication.getViewHandler();

    UIViewRoot newView = viewHandler.createView(context, viewId);

    context.setViewRoot(newView);

    }

    ```


    请注意，视图状态并不一定在视图构建期间被恢复到组件树中。视图状态仅在恢复视图阶段（第一阶段）被恢复到组件树中，并且这发生在 `FacesServlet` 自行执行视图构建时间之后。换句话说，前面展示的
    `rebuildCurrentView()` 方法不会将当前视图状态恢复到新创建的组件树中。当像上面那样以编程方式重建视图时，通常不建议以编程方式恢复视图状态，因为在真实的
    Jakarta Faces 应用程序中，重建当前视图的唯一原因通常是摆脱由持久化视图状态引起的任何更改，和/或基于受管 bean 中新更改的值强制重新执行任何
    Jakarta 标签。


    视图渲染时间

    “视图渲染时间”也不与 Jakarta Faces 生命周期的特定阶段绑定。视图渲染时间是指调用特定组件的 `UIComponent#encodeAll()`
    的时刻。

    诚然，默认情况下，它总是在渲染响应阶段（第六阶段）由 `FacesServlet` 在 `UIViewRoot` 上执行，但这并不妨碍你在不同阶段以编程方式调用它，例如在调用应用程序阶段（第五阶段），以便将任意组件生成的
    HTML 输出作为 `String` 变量获取。


    视图状态

    正如“视图构建时间”部分所述，构成组件树的 `UIComponent` 实例本质上是请求作用域的。它们在视图构建期间创建，并在渲染响应阶段（第六阶段）之后立即销毁。对
    `UIComponent` 实例属性的任何更改（这些属性未被 EL（表达式语言）表达式引用，且与其默认值不同）都将作为“视图状态”保存。换句话说，“视图状态”绝对不等同于“组件树”。此外，如果整个组件树本身被保存在视图状态中，这不仅会导致不必要的臃肿视图状态，还会导致应用程序行为损坏，因为
    `UIComponent` 实例本质上不是线程安全的，因此绝对不能跨多个 HTTP 请求共享。


    保存视图状态通常发生在视图渲染期间。在此过程中，Jakarta Faces 会将视图状态写入生成的每个 Jakarta Faces 表单的 HTML 表示中的一个
    `jakarta.faces.ViewState` 隐藏输入字段。当 Jakarta Faces “状态保存方法”设置为默认值“server”时，隐藏输入值代表一个唯一标识符，引用存储在
    HTTP 会话中的序列化视图状态对象。当使用以下 `web.xml` 上下文参数将 Jakarta Faces “状态保存方法”显式设置为“client”时，隐藏输入值本身代表序列化视图状态对象的加密形式。


    ```

    jakarta.faces.STATE_SAVING_METHOD

    client


    faces/ClientSideSecretKey

    java.lang.String

    [AES key in Base64 format]


    ```


    请注意，如果你在服务器集群（“云”）上运行 Jakarta Faces 应用程序，或者希望视图状态在服务器重启后仍然有效，则必须显式指定带有固定 AES（高级加密标准）密钥的
    `faces/ClientSideSecretKey` 环境条目。你可以使用以下简单的 Java 代码片段自己生成 Base64 编码的 AES 密钥：


    ```

    KeyGenerator keyGen = KeyGenerator.getInstance("AES");

    keyGen.init(256); // 如果没有 JCE，则使用 128。

    byte[] rawKey = keyGen.generateKey().getEncoded();

    String key = Base64.getEncoder().encodeToString(rawKey);

    System.out.println(key); // 打印 Base64 格式的 AES 密钥。

    ```

    '
- fmt: "标准 Jakarta Faces 表单（由`<h:form>`表示）默认使用`POST`方法提交到与包含该表单的 Jakarta Faces 页面所请求的完全相同的\
    \ HTTP 请求 URI。换句话说，当你通过`http://example.com/project/page.xhtml`请求一个 Jakarta Faces\
    \ 页面时，表单将提交到完全相同的`http://example.com/project/page.xhtml` URI。这在 Web 开发术语中被称为“回发”。当\
    \ Jakarta Faces 需要处理一个传入的回发请求时，恢复视图阶段（第一阶段）将在视图构建时间之后，从`jakarta.faces.ViewState`\
    \ HTTP 请求参数中提取视图状态，并将所有已更改的属性恢复到当前请求新创建的`UIComponent`实例中，以便组件树最终反映出与上一次请求的视图渲染期间完全相同的状态。\n\
    \n在一般的 Jakarta Faces Web 应用程序中，保存的视图状态的主要部分由实现`jakarta.faces.component.EditableValueHolder`接口的`UIComponent`实例的内部属性表示，^([⁵](#fn5))\
    \ 这涵盖了所有`UIInput`组件，例如`<h:inputText>`。当提交 Jakarta Faces 表单因转换或验证错误而失败时，所有已更改的“是否有效？”状态和“本地值”状态（可以是提交的字符串值，也可以是已转换和验证的值）都将为所有涉及的`UIInput`组件保存在视图状态中。这有一个主要优点，即开发人员无需担心手动跟踪它们，以便在向网站用户重新呈现提交的表单时保留所有有效和无效的值，同时使模型（托管\
    \ bean 属性）完全不受这些值的影响。这对于 Jakarta Faces 开发人员和网站用户来说都是一个主要的可用性优势。\n\n保存的视图状态中的少数部分由对组件树层次结构或组件属性的程序化更改表示。其中，对`readonly`、`disabled`和`rendered`属性的任何程序化更改都会被跟踪在视图状态中，以便黑客没有任何机会以某种方式伪造请求，使这些属性翻转到错误的一侧，从而让黑客可能执行潜在的危险操作。这是一个主要的安全优势。\n\
    \n## 视图作用域\n\nJakarta Faces 所基于的 Servlet API 提供了三个定义明确的作用域：请求作用域、会话作用域和应用作用域。基本上，请求作用域是通过将感兴趣的对象存储为`HttpServletRequest`的一个属性来建立的。类似地，会话作用域是通过将感兴趣的对象存储为`HttpSession`的一个属性来建立的，而应用作用域是通过将感兴趣的对象存储为`ServletContext`的一个属性来建立的。\n\
    \nJakarta Faces 在此基础上增加了一个作用域，即视图作用域。这不能与组件树本身混淆。组件树（物理上的`UIViewRoot`实例）是在同一个\
    \ HTTP 请求期间创建和销毁的，因此显然是请求作用域的。视图作用域也不能与视图状态混淆，尽管它们密切相关。\n\n当最终用户在 Jakarta Faces\
    \ 表单上触发回发请求，并且应用程序不执行任何类型的导航（即，动作方法返回`null`或`void`）时，视图状态标识符将保持不变，并且视图作用域的生命周期将延长到下一个回发请求，直到应用程序执行显式导航或\
    \ HTTP 会话过期。你可以通过将感兴趣的对象存储为`UIViewRoot#getViewMap()`的一个条目来建立视图作用域。这正是 Jakarta\
    \ Faces 存储其`@ViewScoped`托管 bean 的地方。不，这个映射不会反过来存储在视图状态中，即使 Jakarta Faces 状态保存方法被显式设置为“客户端”。整个视图作用域存储在\
    \ HTTP 会话中，与视图状态分开。只有视图作用域标识符存储在视图状态中。只有`UIViewRoot`实例的已更改属性存储在视图状态中。\n\n## 阶段事件\n\
    \n`jakarta.faces.event.PhaseListener`接口^([⁶](#fn6)) 可用于监听 Jakarta Faces 生命周期的任何阶段。该接口定义了三个方法：`getPhaseId()`，它应返回你感兴趣的阶段；`beforePhase()`，它将在指定阶段执行之前被调用；以及`afterPhase()`，它将在指定阶段执行之后被调用。在`beforePhase()`和`afterPhase()`方法中，你因此有机会在`getPhaseId()`指定的阶段之前或之后运行一些代码。\n\
    \n`jakarta.faces.event.PhaseId`类^([⁷](#fn7)) 定义了一组公共常量。它仍然可以追溯到 Jakarta Faces\
    \ 1.0，该版本在 Java 1.5 发布前几个月才发布，因此为时已晚，无法成为真正的`enum`。以下是这些常量及其序数值：\n\n- `PhaseId.ANY_PHASE`\
    \ (0)\n- `PhaseId.RESTORE_VIEW` (1)\n- `PhaseId.APPLY_REQUEST_VALUES` (2)\n- `PhaseId.PROCESS_VALIDATIONS`\
    \ (3)\n- `PhaseId.UPDATE_MODEL_VALUES` (4)\n- `PhaseId.INVOKE_APPLICATION` (5)\n\
    - `PhaseId.RENDER_RESPONSE` (6)\n\n阶段监听器实例可以通过多种方式注册。声明式地，它们可以通过`faces-config.xml`在应用程序范围内注册：\n\
    \n```xml\n<lifecycle>\n    <phase-listener>com.example.project.YourListener</phase-listener>\n\
    </lifecycle>\n```\n\n或者通过包含在`<f:view>`中的`<f:phaseListener>`标签在视图范围内注册：\n\n```xml\n\
    <f:view>\n    <f:phaseListener type=\"com.example.project.YourListener\" />\n\
    </f:view>\n```\n\n编程式地，它们可以通过当前使用的`jakarta.faces.lifecycle.Lifecycle`实例的`addPhaseListener()`和`removePhaseListener()`方法在应用程序范围内添加和移除。^([⁸](#fn8))\n\
    \n```java\nFacesContext context = FacesContext.getCurrentInstance();\nLifecycle\
    \ lifecycle = context.getLifecycle();\nlifecycle.addPhaseListener(new YourListener());\n\
    ```\n\n并且它们可以通过`UIViewRoot`的`addPhaseListener()`和`removePhaseListener()`方法在视图范围内添加和移除。\n\
    \n```java\nFacesContext context = FacesContext.getCurrentInstance();\nUIViewRoot\
    \ viewRoot = context.getViewRoot();\nviewRoot.addPhaseListener(new YourListener());\n\
    ```"
  raw: "The standard Jakarta Faces form, as represented by `<h:form>`, submits by\
    \ default using\nthe `POST`\nmethod  to the\nvery same HTTP request URI as where\
    \ the Jakarta Faces page containing\nthe form is being requested. In other words,\
    \ when you request a Jakarta\nFaces page by `http://example.com/project/page.xhtml`,\n\
    then it will submit to the very same `http://example.com/project/page.xhtml`\n\
    URI. This is in web development terms known as “postback.” When Jakarta\nFaces\
    \ needs to process an incoming postback request, then the restore\nview phase\
    \ (first phase) will, after the view build time, extract the\nview state from\
    \ the `jakarta.faces.ViewState`\nHTTP request parameter and restore all changed\
    \ properties into the newly\ncreated `UIComponent` instances\nof the current request\
    \ so that the component tree ultimately reflects\nexactly the same state as it\
    \ had during the view render time of the\nprevious request.\nOn an average Jakarta\
    \ Faces web application, the major part of the\nsaved view state is represented\
    \ by internal properties of `UIComponent` instances\nimplementing the `jakarta.faces.component.EditableValueHolder`\n\
    interface,^([⁵](#fn5)) which covers all `UIInput` components\nsuch as `<h:inputText>`.\n\
    When submitting a Jakarta Faces form fails with a conversion or\nvalidation error,\
    \ then all changed “is valid?” states and “local value”\nstates, which can be\
    \ either the submitted string value or the\nalready-converted and validated value,\
    \ will for all involved `UIInput` components be\nsaved in the view state. This\
    \ has the major advantage that the developer\ndoesn’t need to worry about manually\
    \ keeping track of them in order to\nre-present the submitted form with all valid\
    \ and invalid values\npreserved to the website user while keeping the model (the\
    \ managed bean\nproperties) completely free of those values. This is a major usability\n\
    advantage for both the Jakarta Faces developer and the website user.\nThe minority\
    \ of the saved view state is represented by programmatic\nchanges to the component\
    \ tree hierarchy, or to component attributes. Among\nothers, any programmatic\
    \ changes to `readonly`, `disabled`, and `rendered` attributes\nare tracked in\
    \ the view state so that a hacker doesn’t have any chance\nto spoof the request\
    \ in such a way that those attributes flip to the\nwrong side so that the hacker\
    \ could do potentially hazardous things.\nThis is a major security advantage.\n\
    \nView Scope\nThe Servlet API, which Jakarta Faces, among others, is built on\
    \ top\nof, offers three well-defined scopes: the request scope, the session\n\
    scope, and the application scope. Basically, the request scope is\nestablished\
    \ by storing the object of interest as an attribute of the\n`HttpServletRequest`.\n\
    Equivalently, the session scope is established by storing the object of\ninterest\
    \ as an attribute of the `HttpSession`, and the\napplication scope is established\
    \ by storing the object of interest as an\nattribute of the `ServletContext`.\n\
    Jakarta Faces adds one more scope to this, the view scope. This must\nnot be confused\
    \ with the component tree itself. The component tree (the\nphysical `UIViewRoot`\
    \ instance)\nis created and destroyed during the very same HTTP request and is\n\
    therefore clearly request scoped. The view scope must also not be\nconfused with\
    \ the view state, although they are closely related.\nWhen the end user fires\
    \ a postback request on a Jakarta Faces form,\nand the application doesn’t perform\
    \ any kind of navigation (i.e., the\naction method returns `null` or `void`),\
    \ then the view\nstate identifier will stay the same, and the lifetime of the\
    \ view scope\nwill be prolonged to the next postback request, until the application\n\
    performs an explicit navigation, or when the\nHTTP session expires. You can establish\
    \ the view scope by storing the\nobject of interest as an entry of `UIViewRoot#getViewMap()`.\n\
    This is exactly where Jakarta Faces stores its `@ViewScoped` managed\nbeans. No,\
    \ this map is not in turn stored in the view state, not even\nwhen the Jakarta\
    \ Faces state saving method is explicitly set to\n“client.” The entire view scope\
    \ is stored in the HTTP session, separate\nfrom the view state. Only the view\
    \ scope identifier is stored in the\nview state. Only the changed attributes of\
    \ the `UIViewRoot` instance\nare stored in the view state.\n\nPhase Events\nThe\
    \ `jakarta.faces.event.PhaseListener`\ninterface^([⁶](#fn6)) can be used to listen\
    \ on any\nphase of the\nJakarta Faces life cycle. This interface defines three\
    \ methods: `getPhaseId()`, which\nshould return the phase you’re interested in;\
    \ `beforePhase()`, which\nwill be invoked right before the specified phase is\
    \ executed; and `afterPhase()`, which\nwill be invoked right after the specified\
    \ phase is executed. In the\n`beforePhase()`\nand `afterPhase()`\nmethods , you\
    \ thus\nhave the opportunity to run some code before or after the phase\nspecified\
    \ by `getPhaseId()`.\n\nThe `jakarta.faces.event.PhaseId`\nclass^([⁷](#fn7)) defines\
    \ a set of public\nconstants. It still dates from Jakarta Faces 1.0 that was released\
    \ only\na few months before Java 1.5 and hence was too late in the game in order\n\
    to become a real `enum`. The following\nare the constants with their ordinal values:\n\
    \n*   `PhaseId.ANY_PHASE`\n    (0)\n\n*   `PhaseId.RESTORE_VIEW`\n    (1)\n\n\
    *   `PhaseId.APPLY_REQUEST_VALUES`\n    (2)\n\n*   `PhaseId.PROCESS_VALIDATIONS`\n\
    \    (3)\n\n*   `PhaseId.UPDATE_MODEL_VALUES`\n    (4)\n\n*   `PhaseId.INVOKE_APPLICATION`\n\
    \    (5)\n\n*   `PhaseId.RENDER_RESPONSE`\n    (6)\n\nPhase listener instances\
    \ can be registered in various ways. Declaratively, they can\nbe registered application-wide\
    \ via the `faces-config.xml`:\n\n```\ncom.example.project.YourListener\n\n```\n\
    \nor view-wide via a `<f:phaseListener>`\ntag enclosed in the `<f:view>`:\n\n\
    ```\n\n...\n\n```\n\nProgrammatically, they can be added and removed application-wide\
    \ via the\n`addPhaseListener()`\nand `removePhaseListener()`\nmethods  of the\n\
    currently used `jakarta.faces.lifecycle.Lifecycle`\ninstance.^([⁸](#fn8))\n\n\
    ```\nFacesContext context = FacesContext.getCurrentInstance();\nLifecycle lifecycle\
    \ = context.getLifecycle();\nlifecycle.addPhaseListener(new YourListener());\n\
    ```\n\nAnd they can be added and removed view-wide via the `addPhaseListener()`\n\
    and `removePhaseListener()`\nmethods of `UIViewRoot`.\n\n```\nFacesContext context\
    \ = FacesContext.getCurrentInstance();\nUIViewRoot viewRoot = context.getViewRoot();\n\
    viewRoot.addPhaseListener(new YourListener());\n```"
