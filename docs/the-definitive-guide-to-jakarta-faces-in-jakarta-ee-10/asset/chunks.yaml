    \ |\n Map<String, String[ ]> |\n 1.0 |\n\n#{cookie} |\n ExternalContext#getRequestCookieMap( )\
    \ |\n Map<String, Cookie> |\n 1.0 |\n\n#{resource}  |\n ResourceHandler#createResource( )\
    \ |\n Resource |\n 2.0 |\n\n对于所有隐式 EL 对象，如果该类在某个位置指定了 getter 方法，例如`HttpServletRequest#getContextPath()`，那么你当然可以像往常一样在\
    \ EL 中通过`#{request.contextPath}`来访问它。对于作用域映射，任何属性都将被解释为映射键。如果该属性恰好包含句点字符，则可以使用花括号表示法，例如`#{map['key.with.periods']}`来访问映射值。请注意，`#{flash}`本质上继承自`Map<String,\
    \ Object>`，因此可以将其视为此类。还应该说明的是，`#{flowScope}`确实与其他作用域映射不同，它接受`Object`而不是`String`作为映射键。这很可能是一个历史性的错误。访问作用域映射的规范方法是使用基于`String`的键。`#{cookie}`通过\
    \ cookie 名称进行映射，其值实际上返回一个`jakarta.servlet.http.Cookie`实例，该实例又具有一个`getValue()`属性。因此，要访问`JSESSIONID`\
    \ cookie，你基本上需要`#{cookie.JSESSIONID.value}`。当然，在这个会话 ID 的特定示例中，你也可以直接使用`#{session.id}`。\n\
    \n`#{resource}`实际上有自己的 EL 解析器，它将任何属性解释为“`library:name`”格式的资源标识符，然后将其传递给`ResourceHandler#createResource()`，并最终通过`Resource#getRequestPath()`返回资源的\
    \ URL。这在 CSS 资源中非常有用，可以将 Jakarta Faces 图像资源引用为 CSS 背景图像。以下示例将实际渲染`src/main/webapp/resources/images/background.svg`的\
    \ URL。\n\n```\nbody {\nbackground-image: url(\"#{resource['images/background.svg']}\"\
    );\nbackground-size: cover;\n}\n```\n\n请注意，在 CSS 资源中解析 EL 表达式仅在 CSS 资源本身通过`<h:outputStylesheet>`（而非`<link>`）包含时才有效。还应注意，Jakarta\
    \ Faces 默认仅在 CSS 资源的第一次请求时记住它是否包含 EL 表达式。如果没有，那么 Jakarta Faces 在后续请求中不会重新检查，即使在开发阶段也是如此。因此，如果你注意到现有\
    \ CSS 资源中的第一个 EL 表达式似乎不起作用，那么最好重新启动 Web 应用程序。CSS 资源中 EL 解析的这个特性实际上非常有用。\n\nCSS\
    \ 资源中 EL 解析的这个特性在 JS 资源中不可用。对于 JS 资源，你需要改为在全局作用域中打印一个 JS 对象，并在必要时让你的 JS 资源拦截它。例如：\n\
    \n```\nvar config = #{configuration.script};\n\n```\n\n其中`#{configuration.script}`仅从你的托管\
    \ Bean 返回一个 JSON 对象字符串。或者，你可以让 EL 将其打印为 HTML 元素的数据属性，例如以下示例中的上下文路径：\n\n```\n...\n\
    \n```\n\n然后在 JS 中可以这样访问：\n\n```\nvar baseuri = document.documentElement.dataset.baseuri;\n\
    ```\n\n或者如果你是 jQuery 爱好者：\n\n```\nvar baseuri = $(\"html\").data(\"baseuri\");\n\
    ```\n"
- fmt: "That said, when creating managed beans on the Java side, or when declaring\
    \ custom EL variables on the Facelets side, such as `<h:dataTable var=\"foo\"\
    >`, `<ui:repeat var=\"foo\">`, or `<c:set var=\"foo\">`, then you need to make\
    \ absolutely sure that you don’t explicitly or implicitly choose a managed bean\
    \ name or EL variable name that clashes with one of the previously listed implicit\
    \ EL objects. This is because implicit EL objects have higher precedence in EL\
    \ resolving than user-defined names. So, for example, the following construct\
    \ wouldn’t work as you might expect:\n\n```\n#{param}\n```\n\nIt would by default\
    \ print literally “`{}`” for each iteration round, which is basically the default\
    \ `Map#toString()` format of an empty `Map`. When you reopen the same page with\
    \ a query string like `?foo=bar`, then it would print literally “`{foo=bar}`”\
    \ for each iteration round. You’d better rename the `var=\"param\"` to something\
    \ else, such as `var=\"parameter\"`.\n\n## Footnotes\n\n8. Backing Beans\n\nThe\
    \ “backing bean” is a Jakarta Faces–specific concept. It represents the sole JavaBean\
    \ class that is ultimately used as a “managed bean” responsible for providing\
    \ data, actions, and/or components in a Jakarta Faces page.\n\n### Model, View,\
    \ or Controller?\n\nJakarta Faces is an MVC (model-view-controller) framework.\
    \ MVC is a widely used architectural design pattern for software applications\
    \ that has its roots in desktop application development.^([^(67)](#fn67)) In a\
    \ Jakarta Faces framework’s point of view, the model is represented by the backing\
    \ bean; the view is represented by the component tree, which in turn is usually\
    \ defined in a Facelets file; and the controller is represented by the `FacesServlet`\
    \ that is already provided by Jakarta Faces. From a Jakarta EE application server’s\
    \ point of view, however, the model is represented by the service layer that in\
    \ turn is usually using Jakarta Persistence entities, the view is represented\
    \ by all your Jakarta Faces–based code, and the controller is the `FacesServlet`.\
    \ In a Jakarta Faces developer’s point of view, the model is represented by the\
    \ service layer, the view is represented by the Facelets file, and the controller\
    \ is represented by the backing bean.\n\nThe backing bean class can thus be either\
    \ the model, view, or controller, depending on your point of view, while the service\
    \ layer is always the model, and the Facelets file is always the view, and the\
    \ `FacesServlet` is always the controller. Note that in this context, the “Jakarta\
    \ Faces developer” is you, who develops a web application using the Jakarta Faces\
    \ framework for a Jakarta EE application server.\n\nFigure [8-1](#454457_2_En_8_Chapter.xhtml#Fig1)\
    \ illustrates the position of the backing bean in Jakarta Faces’ MVC paradigm.\
    \ It’s a Venn diagram where the intersection of the controller and the view is\
    \ represented by the Jakarta Faces component tree which could be bound to a backing\
    \ bean via the component’s `binding` attribute. The intersection of the view and\
    \ the model is represented by property getters and setters of EL value expressions\
    \ which could be bound to a backing bean, usually via the component’s `value`\
    \ attribute. The intersection of the controller and the model is represented by\
    \ action method invocations of EL method expressions which could be bound to a\
    \ backing bean via the component’s `action` attribute. Finally, the intersection\
    \ of all intersections is represented by the backing bean itself.\n\n![](images/454457_2_En_8_Chapter/454457_2_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1** The position of the backing bean in Jakarta Faces’ MVC paradigm\n\
    \nIn this MVC paradigm, the backing bean has thus a rather unique position. Note\
    \ that the backing bean doesn’t necessarily need to be represented by a single\
    \ class. It can even be represented by multiple classes, each with its own managed\
    \ bean scope, like as that the view can be represented by multiple Facelets files\
    \ and the model can be represented by multiple Jakarta Enterprise Beans and Jakarta\
    \ Persistence classes.\n\nComing back to the Jakarta Faces developer’s point of\
    \ view, we can even get a step further with considering whether the backing bean\
    \ is a model or a controller, depending on how you code the backing bean class.\
    \ The following is one way:\n\n```\n@Named @RequestScoped @Stateful\npublic class\
    \ ProductBacking {\n    private String productName;\n    private String productDescription;\n\
    \    @Inject\n    private ActiveUser activeUser;\n    @PersistenceContext\n  \
    \  private EntityManager entityManager;\n\n    public void save() {\n        Product\
    \ product = new Product();\n        product.setName(productName);\n        product.setDescription(productDescription);\n\
    \        product.setCreatedBy(activeUser.get());\n        entityManager.persist(product);\n\
    \        FacesContext.getCurrentInstance().addMessage(null,\n            new FacesMessage(\"\
    Product created!\"));\n    }\n    // Add/generate getters and setters for product\
    \ name and description.\n}\n```\n\nIn this rather naive way, the entity’s properties\
    \ are essentially duplicated in the backing bean class, and the business logic\
    \ is tightly coupled in the backing bean class. In other words, the backing bean\
    \ class has incorrectly taken over the responsibilities of the real model. One\
    \ would misinterpret such backing bean class as being the sole model. When we\
    \ eliminate this duplication and unreusability, we find another way:\n\n```\n\
    @Named @RequestScoped\npublic class ProductBacking {\n    private Product product\
    \ = new Product();\n    @Inject\n    private ProductService productService;\n\n\
    \    public void save() {\n        productService.create(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
    \            new FacesMessage(\"Product created!\"));\n    }\n\n    public Product\
    \ getProduct() {\n        return product;\n    }\n}\n```\n\nwhereby the `ProductService`\
    \ looks as follows:\n\n```\n@Stateless\npublic class ProductService {\n    @PersistenceContext\n\
    \    private EntityManager entityManager;\n    @Inject\n    private ActiveUser\
    \ activeUser;\n\n    public Long create(Product product) {\n        product.setCreatedBy(activeUser.get());\n\
    \        entityManager.persist(product);\n        return product.getId();\n  \
    \  }\n}\n```\n\nThis is actually the correct way of authoring backing beans. When\
    \ comparing it to the first way, you could argue that the backing bean has, in\
    \ the Jakarta Faces developer’s point of view, become a controller for the real\
    \ model. The backing bean being a controller is not wrong from the Jakarta Faces\
    \ developer’s point of view, but this is not actually correct from the Jakarta\
    \ Faces framework’s point of view where the `FacesServlet` is the real controller.\
    \ The `FacesServlet` treats the backing bean as a model, because the `FacesServlet`\
    \ doesn’t have direct access to the real model, the service layer. You as the\
    \ Jakarta Faces developer can, of course, in your context treat the backing bean\
    \ as a controller, because you can easily ignore all duties of the `FacesServlet`\
    \ as you don’t need to worry about its job while writing Jakarta Faces code. All\
    \ you need to worry about while writing Jakarta Faces code is the view, the model,\
    \ and the backing bean. The rest is done transparently by Jakarta Faces.\n\n###\
    \ Managed Beans\n\nThe conceptual difference between a “backing bean” and a “managed\
    \ bean” can be represented by the following lines of code that is executed under\
    \ the hood of the bean management facility:\n\n```\nBackingBeanClass managedBeanInstance\
    \ = new BackingBeanClass();\nsomeContext.put(\"managedBeanName\", managedBeanInstance,\
    \ someScope);\n```"
