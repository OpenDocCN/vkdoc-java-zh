    For all implicit EL objects, if the class in turn specifies a getter method somewhere,
    such as `HttpServletRequest#getContextPath()`, then you can of course access it
    in EL the usual way as in `#{request.contextPath}`. For scoped maps, any property
    will be interpreted as the map key. If the property happens to contain period
    characters, then you can use the brace notation as in `#{map[''key.with.periods'']}`
    in order to access the map value. Note that `#{flash}` essentially extends from
    `Map<String, Object>`, so it could be treated as such. It should also be said
    that `#{flowScope}` indeed deviates from other scoped maps by accepting `Object`
    instead of `String` as a map key. This is most likely a historical mistake. The
    canonical approach to access scoped maps is to use a `String`-based key.


    `#{cookie}` is mapped by the cookie name, and the value actually returns a `jakarta.servlet.http.Cookie`
    instance that in turn has a `getValue()` property. So in order to access the `JSESSIONID`
    cookie, you basically need `#{cookie.JSESSIONID.value}`. Of course, you can in
    this specific example of the session ID also just use `#{session.id}` instead.


    `#{resource}` actually has its own EL resolver that interprets any property as
    a resource identifier in “`library:name`” format and then passes it to `ResourceHandler#createResource()`
    and finally returns the URL of the resource via `Resource#getRequestPath()`. This
    is very useful in CSS resources in order to reference a Jakarta Faces image resource
    as a CSS background image. The following example will actually render the URL
    of `src/main/webapp/resources/images/background.svg`.


    ```

    body {

    background-image: url("#{resource[''images/background.svg'']}");

    background-size: cover;

    }

    ```


    Note that resolving EL expressions in CSS resources only works when the CSS resource
    itself is included via `<h:outputStylesheet>` instead of `<link>`. Also noted
    should be that Jakarta Faces remembers by default only on the very first request
    of the CSS resource whether it contains EL expressions or not. If it didn’t, then
    Jakarta Faces won’t recheck it on a later request, even not in the development
    stage. So if you notice that your first EL expression in an existing CSS resource
    doesn’t seem to work, then you’d better restart the web application. This feature
    of EL resolving in CSS resources is actually pretty useful.


    This feature of EL resolving in CSS resources isn’t available in JS resources.
    For them, you’d instead need to print a JS object in the global scope and let
    your JS resources intercept it if necessary. For example:


    ```

    var config = #{configuration.script};

    ```


    whereby the `#{configuration.script}` just returns a JSON object as string from
    your managed bean. Or you could let EL print it as a data attribute of an HTML
    element, such as the context path in the following example:


    ```

    ...

    ```


    which is in turn accessible in JS as follows:


    ```

    var baseuri = document.documentElement.dataset.baseuri;

    ```


    or if you’re a jQuery fan:


    ```

    var baseuri = $("html").data("baseuri");

    ```'
