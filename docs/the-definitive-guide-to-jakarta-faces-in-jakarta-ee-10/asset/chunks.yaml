    然而，Jakarta Faces 背后的团队一直在辛勤工作。第一封发送给 JSR 127 内部列表的电子邮件是在 2001 年 8 月 17 日。与大多数项目一样，团队在最初的几个月里致力于收集需求并研究现有的竞争产品。同时，也选定了一个包名。最初占位用的包名是“`javax.servlet.ui`”，现在则选用了“`javax.faces`”。首先被考虑的技术架构是组件模型。对于一个基于组件的
    MVC 框架来说，这显然是其中最重要的方面之一。在 2001 年的最后一个月和 2002 年的头两个月里，团队研究了现在被称为托管 Bean（当时称为“对象管理器”）的概念。托管
    Bean 及其作用域、名称和依赖注入，显然是 Jakarta Faces 框架的另一个基石。在此期间，事件及其背后的模型也受到了关注。


    在 2002 年第二季度，讨论了 Jakarta Faces 的另外两个基石：表达式语言（受 Jakarta Tags 启发），它对于实现从模板到后端代码的所谓
    Bean 绑定至关重要；以及工厂查找器，它允许替换 Jakarta Faces 的关键部分，尽管当时可能并未完全意识到，但这或许对 Jakarta Faces
    在 16 年后依然保持其重要性做出了巨大贡献。


    也正是在同一季度，Craig McClanahan 接任了规范负责人，他是 Struts 之父，也是 Tomcat Servlet 容器的架构师。在关于使用
    Jakarta Pages 的讨论开始后不久，一场讨论开始了——也许当时团队并未意识到——不幸的是，这场讨论后来对 Jakarta Faces 产生了相当负面的影响。大约在
    2002 年底，Ed Burns 加入了团队，担任联合规范负责人，他之前也和 McClanahan 一样在 Tomcat 工作过。Burns 最终成为了 Jakarta
    Faces 的主要规范负责人，并任职超过十年。


    当团队继续致力于诸如前述的托管 Bean 和所谓的值绑定（这也是前述表达式语言绑定的 Java 表示形式）等工作时，第一个乌云出现在 2003 年春天，团队成员
    Hans Bergsten 意识到使用 Jakarta Pages 作为 Jakarta Faces 的模板语言存在非常现实且重大的问题。他向团队提出了这些担忧，但最终这些问题没有得到解决，反而在接下来的几个月里，团队将精力花在了值绑定的一个变体上；后来才清楚，方法绑定和状态保存机制是
    Jakarta Faces 另一个不太理想的实现。


    Jakarta Faces 1.0 及其当时尚未命名的参考实现最终于 2004 年 3 月 11 日发布——巧合的是，这仅仅比另一个至今仍很强大的框架 Spring
    1.0 的发布早了两周。MyFaces 在几天后的 3 月 19 日发布了其 1.0.0 alpha 版本。一个或许有趣的观察是，Jakarta Faces
    在 Spring 之前就带着一个完整的、基于 XML 的依赖注入（DI）框架正式发布了，而 Spring 很大程度上正是以其 DI 功能而闻名。


    Jakarta Faces 1.0 普遍受到好评；尽管市场上竞争对手众多，如 Tapestry、WebObjects、Velocity 和 Cocoon，但在发布后的几个月里，Horst
    Caymann 和 Hans Bergsten 等作者就出版了至少三本相关书籍，并且 eXo 平台（一个数字协作平台）立即开始使用 Jakarta Faces。


    然而，Hans Bergsten 早先的担忧几乎同样迅速地变得令人痛苦地清晰；Jakarta Pages 技术基于从头到尾处理模板，并在遇到标签时立即写入响应。而
    Jakarta Faces 则需要一种分阶段的方法，在开始向响应写入任何内容之前，组件需要能够检查并根据从页面标签构建的组件树采取行动。这种不匹配导致了许多奇怪的问题，例如内容消失或渲染顺序错乱。


    在 Jakarta Faces 推出仅三个月后，Hans Bergsten 在他那篇传奇性的文章《通过抛弃 Jakarta Pages 来改进 Jakarta
    Faces》中，提出了放弃 Jakarta Pages 的有力论据。在那篇文章中，Bergsten 解释了 Jakarta Pages 作为 Jakarta
    Faces 的模板语言是多么不合适，但他也带来了一线希望；由于 Jakarta Faces 对可扩展性的出色支持，只需替换所谓的视图处理器（Jakarta
    Faces 明确允许这样做），就可以相对容易地引入替代模板方案。然而，直到五年后，Jakarta Faces 才真正附带了一种更合适的视图模板语言，尽管那时
    Jakarta Pages 基本上已被弃用，但在撰写本文时，它仍然存在于 Jakarta Faces 中。

    '
- fmt: '# The Adolescent Years


    Back in 2004, another first befell Jakarta Faces; on June 28, `Ed Burns` announced
    that the source of the RI was released by Sun. This represented a major milestone
    as before that date, most technology in active use by Sun was closed source. Initially,
    the source was licensed under the somewhat exotic JRL, but later this would be
    changed to dual licenses, GPL with classpath exception and CDDL. At the same time
    as this announcement, the tradition was established that every new feature or
    bug fix should be accompanied by a test and that all existing tests should be
    executed before committing the change. Some 14 years later, there’s a largely
    different set of people working on the RI source, and the project structure and
    code conventions have changed as well, but the test-driven tradition is still
    being uphold in its original form.


    At that point, `Ed Burns` decided to focus more on the specification aspects of
    Jakarta Faces as the Jakarta Faces 1.2 spec work had started right away, and `Jayashri
    Visvanathan`, one of the early team members, took on the lead role concerning
    the implementation aspects, with `Ryan Lubke`, working as the TCK (testing) engineer.


    Still only a few months old, a variety of component libraries for Jakarta Faces
    had already started to pop up, although all of them were commercial. Among those
    was the one from Oracle, ADF Faces. ADF Faces was put on Oracle’s road map well
    before Jakarta Faces 1.0 went final, and the first early access release was presented
    on August 17, 2004. Its lead was `Adam Winer`, who represented Oracle in the team
    that created Jakarta Faces 1.0. ADF Faces primarily contained a set of rich components,
    but also a dialog framework, and remarkably already featured partial page rendering
    (PPR), quite a bit ahead of the later crop of AJAX solutions. ADF Faces also contained
    a “for each” tag (`af:forEach`) that actually worked. `Adam Winer` explained in
    these early days that such tag is not quite trivial to build but promised that
    Oracle would contribute the knowledge back to Jakarta Faces itself.


    The ADF Faces components originated mostly from the earlier User Interface XML
    (UIX) framework, of which `Adam Winer` was the lead architect as well. Earlier
    versions of UIX used the names “Cabo,” “Baja,” and “Marlin.” UIX was a rich client
    framework for use in the browser. With Jakarta Faces sharing more than a few similarities
    to UIX and with its lead, `Adam Winer`, being part of the original Jakarta Faces
    team, it’s perhaps not unreasonable to surmise that UIX influenced Jakarta Faces.
    Such similarities include the concept of components with separate renderers, Jakarta
    Pages tag handlers, and declarative options to compose a page and the ability
    to instantiate those same components programmatically in Java. There was even
    a conceptually similar data binding, although with a less elegant syntax. Instead
    of, say, `value="#{user.age}"`, UIX would use `data:value="age@user"` but also
    required a kind of producer to be defined on each page to declare where “`user`”
    comes from and then nest the page’s content within that declaration. By contrast,
    Jakarta Faces and EL have always used global definitions and left it up to the
    user to avoid name clashes.


    One of the first, if not the first open source component library in 2004, was
    `Matthias Unverzagt`’s OurFaces. As Jakarta Faces did not have its own resource
    API (application programming interface) at the time to serve up things like images,
    OurFaces required a Servlet to be added to `web.xml`, the so-called `SkinServlet`
    (`ourfaces.common.webapp.SkinServlet`). The significance of this is that it became
    a rather common thing for Jakarta Faces libraries in those days to ask their users:
    add something manually to `web.xml` before the component library can be used.


    Most of the last months of 2004 and early months of 2005 were spent by the Jakarta
    Faces 1.2 expert group (EG) working on various Jakarta Pages and EL issues, such
    as the Jakarta Tags `<c:forEach>` support and the generation of IDs in Jakarta
    Pages, as well as on the dreaded “content interweaving” issue, which refers to
    the aforementioned content that appears at wrong places in the response when rendering.


    While OurFaces may have been one of the first component libraries, it didn’t last,
    and few will remember it or have even heard about it today. This is not quite
    the same for another framework that has its roots in early 2005, namely, `Alexander
    Smirnov`’s Telamon framework, later renamed Ajax4jsf. This framework was one of
    the first of its kind that combined Jakarta Faces and the then new and fresh AJAX
    technology. The beauty of Ajax4Jsf was that it could add AJAX support to existing
    components, which weren’t built with AJAX support in mind at all by enclosing
    them among others in the `<a4j:region>` tag. This technology was incorporated
    in the Exadel Visual Component Platform, which was released in March 2006 and
    would later be renamed RichFaces and would become one of the most memorable Jakarta
    Faces component libraries.


    At around the same time `Alexander Smirnov` started work on what eventually would
    become RichFaces, a company called ICEsoft started working on a Jakarta Faces
    component library. ICEsoft had been in business for a couple of years and had
    been working on a product called ICEbrowser, a Java-based browser, and a product
    called ICEbrowser beans, which were “lightweight, configurable JavaBean components
    that can be rapidly integrated into Java client applications.” During JavaOne
    2005 of that year, on June 27, ICEsoft announced its component library for Jakarta
    Faces—ICEfaces. This was based on AJAX as well but incorporated AJAX directly
    into the components. ICEsoft called its specific technique “patent pending Direct-to-DOM,”
    which basically meant that changes coming from the server were directly injected
    into the DOM tree structure of a web page. A final version wasn’t available right
    away though, but an early access release was provided. This was closed source
    but cost-free.


    Meanwhile, Jakarta Faces EG member `Jacob Hookom`, inspired by `Hans Bergsten`’s
    concerns about the unsuitability of Jakarta Pages, grabbed the bull by the horns
    and started working himself on that alternative templating language envisioned
    by `Bergsten`. In August 2005, this work had progressed into a usable initial
    version. The name of this templating language? Facelets! It immediately took the
    Jakarta Faces world by storm. `Kito Mann` published the first part of a series
    of articles about it on JSFCentral the very first month, and `Richard Hightower`
    published the famous article “Facelets fits Jakarta Faces like a glove” several
    months later.


    Oracle had not been sitting still either in 2005, and after about 16(!) early
    access releases, it announced in late 2005 at the JavaPolis conference in Antwerpen
    (nowadays called Devoxx) that ADF Faces would be donated to MyFaces and thus become
    open source.'
