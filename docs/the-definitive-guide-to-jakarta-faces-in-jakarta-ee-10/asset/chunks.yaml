- fmt: "# 排版后的文本\n\nTechnically, the input components as described in Chapter [4](#454457_2_En_4_Chapter.xhtml)\
    \ are also output components. They are not only capable of processing any submitted\
    \ input values but they are also capable of outputting the model value during\
    \ the render response phase (sixth phase). This is also visible in the Jakarta\
    \ Faces API (application programming interface): the `UIInput` superclass extends\
    \ from the `UIOutput` superclass.\n\nThere are also a bunch of components that\
    \ merely output their model value or even just an HTML element. Those are the\
    \ pure output components. They don’t participate in all phases of the Jakarta\
    \ Faces life cycle. Sometimes, they participate during the restore view phase\
    \ (first phase), in case they are dynamically created or manipulated, but the\
    \ majority of their job is executed during the render response phase (sixth phase),\
    \ while generating the HTML output. During the other phases, they don’t do many\
    \ additional tasks.\n\n## Document-Based Output Components\n\nThese components\
    \ are `<h:doctype>`, `<h:head>`, and `<h:body>`. Note that there’s no such component\
    \ as `<h:html>`. The `<h:doctype>` is arguably the least used HTML component of\
    \ the entire standard Jakarta Faces HTML component set. You could get away with\
    \ just a plain `<!DOCTYPE html>` element. The `<h:doctype>` is only useful when\
    \ you want to have a pure XML representation of the `<!DOCTYPE>` element, which\
    \ is generally only the case when you need to store entire Jakarta Faces views\
    \ as part of another XML structure of some higher-level abstract layer around\
    \ Jakarta Faces.\n\nThe `<h:head>` and `<h:body>` tags are the most important\
    \ tags in Jakarta Faces. While generating the `<head>` and `<body>` elements of\
    \ the HTML document doesn’t require any special logic, those tags are mandatory\
    \ for the proper automatic handling of JavaScript and CSS (Cascading Style Sheets)\
    \ resource dependencies, also introduced in Jakarta Faces 2.0.\n\nThe `<h:head>`\
    \ and `<h:body>` allow Jakarta Faces to automatically relocate JavaScript and\
    \ CSS resource dependencies to the right places in the component tree so that\
    \ they ultimately end up in the right place in the generated HTML output. From\
    \ the standard Jakarta Faces component set, only the `<h:commandLink>`, `<h:commandScript>`,\
    \ `<f:ajax>`, and `<f:websocket>` utilize this facility. They all require the\
    \ `faces.js` JavaScript file being included in the final HTML document. During\
    \ the view build time, they will basically use `UIViewRoot#addComponentResource()`^([(44)](#fn44))\
    \ to register the component resource dependency at the specified target component,\
    \ which can be either `<h:head>` or `<h:body>`. During the view render time, the\
    \ renderer associated with the `<h:head>` and `<h:body>` component will obtain\
    \ all so far registered component resource dependencies by `UIViewRoot#getComponentResources()`^([(45)](#fn45))\
    \ and generate the appropriate `<link rel=\"stylesheet\">` and `<script>` elements\
    \ with a URL (uniform resource locator) referring the associated resource dependency.\n\
    \nAs shown in the section “Standard HTML Components” in Chapter [3](#454457_2_En_3_Chapter.xhtml),\
    \ the following code is what the most minimal and HTML5-valid Jakarta Faces page\
    \ looks like:\n\n```\n<!DOCTYPE html>\n<html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n    <h:head>\n        <title>Title</title>\n\
    \    </h:head>\n    <h:body>\n        ...\n    </h:body>\n</html>\n```\n\n## Text-Based\
    \ Output Components\n\nThese components are `<h:outputText>`, `<h:outputFormat>`,\
    \ `<h:outputLabel>`, and `<h:outputLink>`. They all extend from the `UIOutput`\
    \ superclass and have a `value` attribute that can be bound to a managed bean\
    \ property. During the view render time, the getter will be consulted to retrieve\
    \ and display any preset value. These components will never invoke the setter\
    \ method, and therefore, it could be safely left out of the managed bean class\
    \ in order to reduce unused code.\n\nHistorically, in Jakarta Faces 1.x on Jakarta\
    \ Pages, a `<h:outputText>` was mandatory in order to output a bean property as\
    \ text. Jakarta Pages didn’t support Jakarta Faces–style EL (Expression Language)\
    \ `#{...}` in template text. Facelets supported Jakarta Faces–style EL `#{...}`\
    \ in template text, and hence, bean properties could be outputted directly in\
    \ Facelets without the need for a whole component. In other words, the following\
    \ codes are equivalent in Facelets.\n\nUsing `<h:outputText>`:\n\n```\nWelcome,\
    \ <h:outputText value=\"#{user.name}\"/>!\n```\n\nAnd using EL in template text:\n\
    \n```\nWelcome, #{user.name}!\n```\n\nIt doesn’t need explanation that the latter\
    \ code snippet is terser and readable. The `<h:outputText>` has, however, not\
    \ become useless in Facelets. It’s still useful for the following purposes:\n\n\
    - Disabling implicit HTML escaping\n- Attaching an explicit converter\n- Referencing\
    \ in `<f:ajax render>`\n\nJakarta Faces has implicit HTML escaping everywhere.\
    \ Anything outputted to the HTML response is checked on the HTML special characters\
    \ “`<`”, “`>`”, “`&`”, and optionally also “`\"`” when outputted within an attribute\
    \ of an HTML element. Those HTML special characters will be replaced by “`&lt;`”,\
    \ “`&gt;`”, “`&amp;`”, and “`&quot;`”, respectively. The web browser will then\
    \ not interpret those characters as part of the generated HTML output but as plain\
    \ text and, ultimately, will present them as literal characters to the end user.\n\
    \nImagine that a user chooses `<script>alert('xss')</script>` as a username, and\
    \ it’s emitted via `#{user.name}` through either one of the previously shown code\
    \ snippets; then Jakarta Faces will render it as follows in the generated HTML\
    \ output:\n\n```\nWelcome, &lt;script&gt;alert('xss')&lt;/script&gt;!\n```\n\n\
    And the web browser will display it literally as “Welcome, `<script>alert('xss')</script>`!”\
    \ instead of only “Welcome, !” along with a JavaScript alert with the text “xss”\
    \ whereby the user-controlled JavaScript is unintentionally actually executed.\
    \ The end user being able to execute arbitrary JavaScript code is dangerous. It\
    \ would allow the malicious user to execute specific code that transfers information\
    \ about session cookies to an external host when someone else logs in and views\
    \ a page wherein the username of the malicious user is being rendered this way.\
    \ (See also the section “Cross-Site Scripting Protection” in Chapter [13](#454457_2_En_13_Chapter.xhtml).)\n\
    \nOn the other hand, there may also be cases whereby you’d like to embed safe\
    \ HTML code in the generated HTML output. Most common use cases are related to\
    \ posting messages for other users on a website, whereby a limited subset of formatting\
    \ is allowed, such as bold, italics, links, lists, and headings. Generally, those\
    \ are to be entered in a text area element using a predefined human-friendly markup\
    \ format, such as Markdown, or the lesser known Wikicode, or the ancient BBCode.\n\
    \nThe aforementioned markup formats are all capable of parsing the raw text with\
    \ the markup and converting it to safe HTML code whereby any malicious HTML code\
    \ is already escaped or stripped out. The raw text is at least always saved in\
    \ the database for the record, and the resulting safe HTML code, along with the\
    \ version of the parser used, can also be saved in the database for performance\
    \ so that the parser doesn’t need to be unnecessarily reexecuted for the same\
    \ piece of raw text.\n\nGiven that we’re going to use Markdown with CommonMark^([(46)](#fn46))\
    \ and having the following `Markdown` interface:"
