    `el` 变量基本上代表了在 `value` 属性中定义的表达式语言（EL）语句，以我们的 `<h:inputText>` 示例来说，就是 `#{bean.text}`。`ValueExpression#setValue()`
    方法将根据该表达式触发相应的 setter 方法，并传入组件的值。因此，它实际上会执行 `bean.setText(component.getValue())`。一旦所有模型值都已更新，Jakarta
    Faces 将进入调用应用程序阶段（第五阶段）。在应用请求值阶段（第二阶段）排队在命令组件中的任何 `ActionEvent` 都将被广播。它最终会调用与该命令组件关联的所有方法。在我们的
    `<h:commandButton>` 示例中，其 `action` 属性定义为 `#{bean.submit}`，它将调用 `Bean#submit()`
    方法。最后，Jakarta Faces 将进入最后一个阶段，即渲染响应阶段（第六阶段），生成 HTML 输出，并在此过程中调用 getter 方法以获取要嵌入到
    HTML 输出中的模型值。


    基于文件的输入组件

    只有一个基于文件的输入组件，即 `<h:inputFile>`。它对其所在的 `<h:form>` 只有一个额外要求：必须将其 `enctype` 属性显式设置为
    `multipart/form-data` 以符合 HTML 规范。这不会影响其他输入组件；它们将继续正常工作。只是默认的表单编码 `application/x-www-form-urlencoded`
    不支持嵌入二进制数据。`multipart/form-data` 编码支持这一点，但它只是稍微冗长一些。每个请求参数值前面都有一个边界行、一个包含请求参数名称的
    `Content-Disposition` 头、一个包含值内容类型的 `Content-Type` 头以及两个换行符。与默认编码（其中 URL 编码的请求参数名称/值对仅由
    `&` 字符连接）相比，这非常低效，但这实际上是能够将文件嵌入 HTTP POST 请求而不会引起歧义的唯一可靠方法，尤其是在上传文本文件时，这些文件的内容恰好类似于
    URL 编码的请求参数名称/值对。

    `<h:inputFile>` 的 `value` 属性必须绑定到 `jakarta.servlet.http.Part` 接口的 bean 属性。


    Facelets 文件 `/test.xhtml`：


    支持 bean 类 `com.example.project.view.Bean`：


    ```

