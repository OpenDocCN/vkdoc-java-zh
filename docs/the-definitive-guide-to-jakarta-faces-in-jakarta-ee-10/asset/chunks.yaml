  trans: '

    同样为 Jakarta Faces 2.3 和 Mojarra 提供支持的还有 Andraschko，他除了是 PrimeFaces 的提交者外，还在 2015
    年 7 月成为了 MyFaces 的提交者。Andraschko 将 PrimeFaces 搜索表达式功能的标准化版本捐赠给了 Jakarta Faces
    2.3 和 Mojarra。


    与此同时，2016 年 2 月 12 日，Red Hat 宣布 RichFaces 将于当年晚些时候（即 2016 年 6 月）停止维护（EOL）。这个曾一度是最受欢迎的
    Jakarta Faces 组件库之一、常被称为“三巨头之一”的项目，实际上就此终结。2016 年 6 月 20 日，项目完成了最后一次实质性提交：“RF-14279:
    update JSDoc。”两天后，Red Hat 发布了 RichFaces 4.5.17，并将 GitHub 仓库设置为归档（只读）模式。Brian Leathem（他至今仍是
    Jakarta Faces 2.3 专家组的成员）在几天后的 2 月 18 日宣布，他将不再从事任何与 Jakarta Faces 相关的工作。


    ## 复兴


    2016 年底，Jakarta Faces 规范负责人短暂回归，但带来的消息是规范必须在短短几周内完成，以便启动（有些）冗长的最终定稿流程。2017 年 3
    月 28 日，Jakarta Faces 2.3 最终发布，随之而来的是开始用 CDI 版本替换 Jakarta Faces 原生构件，以及一项本应多年前就完成的工作：弃用
    Jakarta Faces 托管 Bean 机制，转而使用 CDI Bean。其他特性包括：使用由 OmniFaces 捐赠的 Jakarta EE WebSocket
    API 支持 WebSocket、对系统中可用视图资源的自省，以及上述由 PrimeFaces 捐赠的搜索表达式框架。


    紧随 Jakarta Faces 2.3 规范有些动荡的开发过程之后，Oracle 在 2017 年宣布了更为动荡的消息：Jakarta EE（因此也包括
    Jakarta Faces）将移交给 Eclipse 基金会。Oracle 将停止领导其之前拥有的规范，这同样包括 Jakarta Faces。这意味着 Mojarra
    将重新授权，而 Jakarta Faces 将通过一个由不同负责人主导的新流程来演进。


    从 Oracle 到 Eclipse 的过渡分几个步骤完成。创建了一个名为 Eclipse Enterprise for Java (EE4J) 的新顶级项目，并对
    Jakarta Faces 2.3 分支的快照进行了（法律意义上的）清理，然后将其移动到了位于 [`​github.​com/​eclipse-ee4j`](http://github.com/eclipse-ee4j)
    的新 GitHub 仓库。只有 Jakarta Faces 2.3（以及相关的 Mojarra 2.3）被迁移，这意味着 Jakarta Faces 2.2
    及更早版本仍保留在 Oracle 的位置。这特别意味着提交历史没有被转移。在迁移的第一步之后，API 于 2019 年 1 月发布了新版本 *jakarta.faces:jakarta.faces-api:2.3.1*，该版本与现有的
    *javax.faces:javax.faces-api:2.3* 基本相同。API 和 Mojarra 实现的许可证都更改为 Eclipse Public
    License 2.0。Arjan Tijms 成为下一任项目负责人。前任规范负责人 Ed Burns 和 Manfred Riem 不久后离开 Oracle
    前往微软工作。不过，Riem 将继续参与 Jakarta Faces 的工作。


    迁移过程的下一步涉及创建新的认证流程和新的规范许可证。JCP 流程被 Jakarta EE 规范流程 (JESP) 取代，新的规范许可证变为 Eclipse
    Foundation Technology Compatibility Kit License (EFTL)。


    2019 年初，Tijms 前往德国参加 Javaland 大会，在那里他遇到了 Eclipse 基金会的 Jakarta EE 开发者倡导者 Ivar Grimstad。在德国午后的温暖阳光下，两人讨论了
    Jakarta EE 规范的新命名方案。需要新名称，因为 Oracle 与 Eclipse 基金会之间的协议包括一项约定，即不使用 Oracle 之前使用的一些名称，例如
    Jakarta EE、Jakarta Faces、JavaServer Faces 和 Jakarta Pages。Tijms 提出了一个更简单的命名方案，基本上废除了名称中尽可能多的各种“填充词”（例如“service”、“api”和“architecture”），这使得像
    Jakarta Faces 这样晦涩的缩写成为必要。Ivar 同意了这个方案，并在接下来的几个月里引入了该命名方案；代码、文档和规范都被仔细梳理，以查找并用新名称替换旧名称。对于
    Jakarta Faces，名称变成了“Faces”，这是一个合乎逻辑的选择，因为从一开始，包名实际上就是 *javax.faces.**，而不是 *javax.jsf.**。构件
    ID 长期以来也一直是“faces”。


    同年晚些时候，即 2019 年 9 月，Faces 2.3.2 API 作为 Jakarta EE 8 的一部分发布。该 API 再次与 Jakarta Faces
    2.3.1 API 基本相同，但现在所有术语都已替换为新术语，并且它已使用新的 JESP 流程进行了认证。

