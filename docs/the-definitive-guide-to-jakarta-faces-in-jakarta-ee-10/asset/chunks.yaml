    刚才那段代码有点复杂。你不仅会看到 getter 和 setter 为了简洁而被折叠，还会看到我们的复合组件继承了 `UIInput` 并实现了 `NamingContainer`。继承自
    `UIInput` 的好处是，我们无需在后台组件中重复 `UIInput` 的大部分默认编码和解码行为，因此只需要重写少数几个方法即可。实现 `NamingContainer`
    是 `<cc:interface>` 的技术要求。这使您能够在同一上下文中使用复合组件的多个实例，而不会遇到“重复组件 ID”错误。重写的 `getFamily()`
    方法也反映了这一要求。


    构成复合组件的实际 `UIInput` 组件被声明为后台组件的属性。在本例中，它们都是 `<h:selectOneMenu>` 下拉菜单，通过 `binding`
    属性与这些属性绑定。这使我们能够在编码（即处理 HTTP 响应）期间轻松设置它们的值，并在解码（即处理 HTTP 请求）期间获取提交的值。您可以在重写的 `encodeBegin()`
    和 `getSubmittedValue()` 方法中分别找到相应的逻辑。


    因此，在 `encodeBegin()` 方法中，您有机会根据模型值（如果有）准备显示的值。`getValue()` 方法继承自 `UIInput` 超类，并与复合组件的
    `value` 属性绑定。您可以分解模型值，并在复合组件的各个 `UIInput` 组件中设置所需的值。`pad()` 辅助方法只是用前导零填充数字，例如，将“`1`”显示为“`01`”。在专门为
    `<f:selectItems>` 静态初始化可用小时和分钟列表时，也会使用此辅助方法。


    在 `getSubmittedValue()` 方法中，您应该将各个 `UIInput` 组件的提交值组合成一个单独的 `String`。在 `<t:inputLocalTime>`
    的具体情况下，我们按照 ISO 本地时间模式 `HH:mm` 组合成一个 `String`。反过来，`UIInput` 超类将此值传递给 `getConvertedValue()`，我们在此有机会将组合后的
    `String` 转换为具体的模型值，在本例中即为 `LocalTime`。最终，`UIInput` 超类将确保在更新模型值阶段将其设置到后台 bean 中。现在您可以按如下方式使用它：


    其中，由 `#{bean}` 表示的后台 bean 如下所示：


    ```

    @Named @RequestScoped

    public class Bean {

    private LocalTime time;

    public void submit() {

    System.out.println("Submitted local time: " + time);

    }

    public LocalTime getTime() {

    return time;

    }

    public void setTime(LocalTime time) {

    this.time = time;

    }

    }

    ```


    如果您需要在复合组件内嵌套 `<f:ajax>`，以便在任何一个单独下拉菜单的更改事件期间运行某些 Ajax，那么您可以通过添加 `<cc:clientBehavior>`
    来针对两个下拉菜单实现，如下所示：


    ```

    ...


    ```


    `<cc:clientBehavior>` 的 `name` 属性表示您应在模板客户端中声明以触发它的事件名称。


    `<cc:clientBehavior>` 的 `default` 属性设置为 `"true"` 表示这是默认事件，这意味着您可以省略它，就像您可以为现有输入文本和下拉组件使用
    `event="change"`，为现有复选框和单选按钮组件使用 `event="click"`，以及为现有命令组件使用 `event="action"`
    一样。


    `<cc:clientBehavior>` 的 `targets` 属性必须定义一个以空格分隔的 ID 集合，这些 ID 指向复合组件实现中包含的、您希望在其上触发
    Ajax 事件的 `UIInput` 组件，而 `<cc:clientBehavior>` 的 `event` 属性必须定义要在目标 `UIInput` 组件上实际触发的所需事件名称。换句话说，这在底层实际上与在复合组件中实现以下内容的效果相同：


    在这个具体示例中，`event` 属性的值恰好与 `name` 属性的值相同。起初这可能令人困惑，但它允许您轻松定义自定义事件名称。例如，以下是在您只想在
    `hour` 下拉菜单更改时触发事件时使用的代码：


    ```

    ...


    ```


    这样，以下 Ajax 监听器将仅在 `hour` 下拉菜单更改时触发，而不会在 `minute` 下拉菜单更改时触发。


    总而言之，必须指出的是，复合组件在 Jakarta Faces 2.0 中首次引入后曾被过度炒作。人们开始使用它们来“组合”整个模板、包含文件、装饰文件，甚至多个标签，而无需使用任何后台组件。也就是说，与标签文件相比，其零配置的特性非常有吸引力。所有内容都在复合组件文件本身中通过
    `<cc:interface>` 声明。并且它们可以直接在模板客户端中使用，只需遵循约定，无需在某些 XML 文件中进行配置。需要注意的是，由于其内部设计，与普通的包含文件、装饰文件和标签文件相比，复合组件在构建和恢复视图时相对昂贵，尤其是在深度嵌套的情况下。因此，最佳实践是仅在您确实需要通过
    `<cc:interface componentType>` 使用后台组件时才使用它们。对于任何其他情况，请改用包含文件、装饰文件或标签文件。在前面的章节中，您可能已经了解到，借助
    Jakarta Tags，标签文件可以非常强大。


    **递归复合组件**

    您可以安全地将复合组件相互嵌套。但是，当您递归地将同一个复合组件嵌套在自身内部时，当 EL 尝试解析 `#{cc}` 背后的具体复合组件实例时，将会因堆栈溢出错误而失败。^((66))


    假设您有一个递归树模型，它表示某种讨论线程，例如电子邮件及其所有回复，或博客评论及其所有回复，其中每个回复又可以有另一组回复。这可以表示为单个 Jakarta
    Persistence 实体，如下所示：


    ```

    @Entity

    public class Message {

    @Id @GeneratedValue(strategy=IDENTITY)

    private Long id;

    @Lob @Column(nullable = false)

    private @NotNull String text;

    @ManyToOne

    private Message replyTo;

    @OneToMany(mappedBy = "replyTo")

    private List replies = Collections.emptyList();

    // 添加/生成其余的 getter 和 setter。

    }

    ```


    请注意，`replyTo` 属性表示当前消息所回复的父消息，而 `replies` 属性表示对当前消息的所有回复。然后，可以在 `MessageService`
    中按如下方式查询树结构：


    ```

    public List tree() {

    return entityManager.createQuery(

    "SELECT DISTINCT m FROM Message m"

    + " LEFT JOIN FETCH m.replies r"

    + " ORDER BY m.id ASC", Message.class)

    .getResultList().stream()

    .filter(m -> m.getReplyTo() == null)

    .collect(toList());

    }

    ```


    请注意，随后对结果列表进行过滤乍一看效率低下，但实际上，每条消息只被检索一次，并简单地在 `replies` 属性中被引用。


    现在，您会直观地将 `<t:message>` 复合组件实现为如下形式：


    ```


    #{cc.attrs.value.text}


    ```


    然后按如下方式使用它：

    '
- fmt: 'You’ll perhaps only wonder why `<c:forEach>` is being used instead of `<ui:repeat>`
    inside the implementation of the composite component. The explanation is relatively
    simple: `<ui:repeat>` is ignored during view build time. In other words, when
    using `<ui:repeat>` there, then the `<t:message>` would include itself in an infinite
    loop. If you need to remember the why and how, head back to the section “Jakarta
    Tags” in Chapter [3](#454457_2_En_3_Chapter.xhtml). But even with the previous
    implementation, you would still run into an infinite loop. You know that the `#{cc}`
    references the current instance of the composite component. Under the hood, when
    `#{reply}` is passed to the nested composite, then in reality, a reference to
    `#{cc.attrs.value.replies[index]}` is being passed. This is, on its own, no problem.
    But when the nested composite in turn evaluates the `#{cc}` part from this alias,
    then it would reference itself instead of the parent composite. Hence, the infinite
    loop.


    Theoretically, you could solve this by replacing `#{cc}` with `#{cc.parent}` which
    returns `UIComponent#getParent()`.


    ```

    ...


    ...

    ```


    However, it still doesn’t work. Under the hood, inside the nested composite, when
    the EL evaluator comes to `#{cc.parent}` and attempts to evaluate `attrs.value`
    on it, then the parent composite component would return yet another EL expression
    in the form of `#{cc.attrs.value}` which ultimately gets evaluated. However, the
    `#{cc}` part still gets interpreted as “current composite component,” which is
    inside the nested composite component and thus the nested composite itself.


    We could only solve it to let the parent composite component not return yet another
    EL expression but instead the already-evaluated value. This can be achieved by
    overriding `UIComponent#setValueExpression()` in the backing component where you
    check whether the `ValueExpression` representing `#{cc.attrs.value}` is about
    to be set on the component and then immediately evaluate it and store the result
    as a local variable of the composite component. This shouldn’t cause harm as it’s
    supposed to be a read-only attribute.


    ```

    @FacesComponent("messageComposite")

    public class MessageComposite extends UINamingContainer {

    private Message message;

    @Override

    public void setValueExpression

    (String attributeName, ValueExpression expression)

    {

    if ("value".equals(attributeName)) {

    ELContext elContext = getFacesContext().getELContext();

    message = (Message) expression.getValue(elContext);

    }

    else {

    super.setValueExpression(attributeName, expression);

    }

    }

    public Message getMessage() {

    return message;

    }

    }

    ```


    With this backing component in place, and replacing `attrs.value` by `message`
    in the implementation, then it finally works.


    ```

    #{cc.message.text}

    ```


    ## Implicit EL Objects


    In Facelets files, there are a bunch of implicit EL objects available. They are
    mainly shortcuts to important artifacts, scopes, maps, and components available
    in the current faces context. Table [7-1](#454457_2_En_7_Chapter.xhtml#Tab1) provides
    an overview of them.


    **Table 7-1** Implicit EL Objects Available in EL Context of Jakarta Faces


    | Implicit EL object | Resolves to | Returns | Since |

    | --- | --- | --- | --- |

    | `#{facesContext}` | `FacesContext#getCurrentInstance()` | `FacesContext` | 2.0
    |

    | `#{externalContext}` | `FacesContext#getExternalContext()` | `ExternalContext`
    | 2.3 |

    | `#{view}` | `FacesContext#getViewRoot()` | `UIViewRoot` | 2.0 |

    | `#{component}` | `UIComponent#getCurrentComponent()` | `UIComponent` | 2.0 |

    | `#{cc}` | `UIComponent#getCurrentCompositeComponent()` | `UIComponent` | 2.0
    |

    | `#{request}` | `ExternalContext#getRequest()` | `HttpServletRequest` | 1.0 |

    | `#{session}` | `ExternalContext#getSession()` | `HttpSession` | 1.0 |

    | `#{application}` | `ExternalContext#getContext()` | `ServletContext` | 1.0 |

    | `#{flash}` | `ExternalContext#getFlash()` | `Flash` | 2.0 |

    | `#{requestScope}` | `ExternalContext#getRequestMap()` | `Map<String, Object>`
    | 1.0 |'
