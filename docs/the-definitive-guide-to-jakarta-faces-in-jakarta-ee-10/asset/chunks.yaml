    默认页面在 `@PostConstruct` 中定义。否则，用户可能会看到一个包含“`Invalid path : /WEB-INF/includes/spa/.xhtml`”消息的错误页面。请注意，支持
    bean 被声明为 `@ViewScoped`。这对于在回传过程中记住当前正在打开的页面非常重要。如果它是 `@RequestScoped`，并且用户导航到例如
    `page2` 并在其中提交一个表单（这会创建一个新的 HTTP 请求），那么 `@RequestScoped` 管理的 bean 将被重新创建，`page`
    属性的默认值为 `page1`，因此不再是初始选择的 `page2` 值。这会导致当 Jakarta Faces 准备解码任何输入组件以处理回传请求中的表单提交时，`<ui:include>`
    将不再引用 `page2.xhtml`，因此 Jakarta Faces 将无法找到在 `page2.xhtml` 中声明的输入组件。`@ViewScoped`
    bean 的生命周期与用户回传到同一个视图（在本例中为 `/spa.xhtml`）的时间相同，因此它能正确记住当前选中的页面。


    在尝试这个 SPA 示例时，您可能已经注意到一个缺点：这些页面无法添加书签。这是因为这些页面不是通过幂等的 GET 请求打开的。您可以通过利用 HTML5
    `history.pushState` API 来解决这个问题。^(⁶⁵) 基本上，在 Ajax 请求完成后，您应该将预期的 URL 推送到浏览器历史记录中，这将反映在浏览器的地址栏中。并且您应该修改
    `Spa` 支持 bean，以检查是否打开了任何特定页面，然后相应地准备 `page` 变量。


    以下是一个入门示例，它只是附加了 `?page=xxx` 查询字符串参数。首先，调整 `spa.xhtml` 中的 `<f:ajax>`，按如下方式指定 `onevent`
    属性：


    ```


    并创建以下 JavaScript 函数：


    ```

    function pageChangeListener(event) {

    if (event.status == "success") {

    var page = document.getElementById("content").dataset.page;

    var url = location.pathname + "?page=" + page;

    history.pushState(null, document.title, url);

    }

    }

    ```


    最后，按如下方式调整 `Spa` 支持 bean：


    ```

    @Inject @ManagedProperty("#{param.page}")

    Private String page;

    public void init() {

    if (page == null) {

    page = "page1";

    }

    }

    ```


    另外，请注意您可能想要验证提供的页面参数。顺便说一句，黑客的路径探测是无害的，因为 Jakarta Faces 已经不允许遍历到父路径，例如 `/spa.xhtml?page=../../templates/layout`。


    模板装饰


    如果您希望拥有一个可重用的包含文件，该文件能够插入模板定义，就像使用 `<ui:include>` 来引用一个包含一个或多个 `<ui:insert>` 部分的包含文件一样，那么您可以使用
    `<ui:decorate>`。以下是一个这样的示例，`/WEB-INF/decorations/contact.xhtml`：


