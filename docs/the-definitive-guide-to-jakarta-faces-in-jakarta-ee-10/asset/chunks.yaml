    脚注


    12. 搜索表达式


    正如第 3 章 “Ajax 生命周期” 部分和第 4 章 “Ajax 化组件” 部分所述，`<f:ajax>` 标签的 `execute` 和 `render`
    属性接受一组以空格分隔的所谓组件搜索表达式。搜索表达式自 Jakarta Faces 诞生之初就一直存在，因为它被用于 `<h:outputLabel>`、`<h:message>`
    和 `<h:messages>` 组件的 `for` 属性中，但直到 Jakarta Faces 2.0 引入 `<f:ajax>` 后，它们才成为 Jakarta
    Faces 开发者必须掌握的知识。也就是说，标签和消息在几乎所有情况下都已经与目标输入组件位于同一个命名容器父组件中，因此只需在 `for` 属性中指定目标输入组件的
    ID 就足够了，但对于 `<f:ajax>` 的 `execute` 和 `render` 属性来说，情况未必如此，因为目标组件可能位于不同的命名容器上下文中，甚至位于物理上不同的
    Facelets 文件中。为了克服这些困难，Jakarta Faces 2.0 引入了一些更抽象的搜索表达式：“`@this`”、“`@form`”、“`@all`”
    和 “`@none`”。像 “`@form`” 这样的表达式特别容易使用，因为它只是指代当前表单。如果该当前表单是在引用它的页面之上两个父模板中定义的，那么这确实使得引用它变得容易得多。尽管这些关键字让事情变得简单了许多，但它们相当有限。不仅只有四个关键字，而且它们不可扩展，默认的
    Jakarta Faces 组件集仅在 `<f:ajax>` 标签内部使用它们。在其他组件中使用它们，甚至在 Jakarta Faces 自己的 `<h:outputLabel>`、`<h:message>`
    和 `<h:messages>` 组件中使用，以及以编程方式使用它们，都被忽略了。因此，在 Jakarta Faces 2.3 中，引入了一个 “组件搜索表达式框架”，极大地扩展了这四个关键字。它主要基于
    PrimeFaces 中一个经过验证的 API（应用程序编程接口）^(⁹⁹)。


    相对本地 ID


    这是组件搜索表达式的最简单形式。最常见的用例出现在 `<h:outputLabel>`、`<h:message>` 和 `<h:messages>` 组件的
    `for` 属性中。它简单地引用目标 `UIInput` 组件的唯一 ID。


    这仅要求目标组件也位于同一个命名容器父组件内。命名容器父组件是实现了 `NamingContainer` 接口^(¹⁰⁰) 的组件。在标准 Jakarta
    Faces 中，只有 `<h:form>`、`<h:dataTable>`、`<ui:repeat>` 和 `<f:subview>` 是 `NamingContainer`
    的实例。所有复合组件也是 `NamingContainer` 的实例，但标签文件不是。


    如果你需要从 `<h:outputLabel>` 引用命名容器内的特定 `UIInput` 组件，那么你需要在命名容器组件的 ID 后附加所谓的命名容器分隔符字符，然后是目标
    `UIInput` 组件的 ID。默认的命名容器分隔符字符是冒号 “`:`”。当前配置的分隔符字符可以通过 `UINamingContainer#getSeparatorCharacter()`^(¹⁰¹)
    以编程方式获取。


    ```

    char separatorCharacter = UINamingContainer

    .getSeparatorCharacter(FacesContext.getCurrentInstance);

    ```


    这可以通过 `web.xml` 中的 `jakarta.faces.SEPARATOR_CHAR` 上下文参数进行配置。


    ```

    jakarta.faces.SEPARATOR_CHAR

    -


    ```


    警告


    **不**建议将其更改为其他字符，例如连字符 “`-`” 甚至下划线 “`_`”^(¹⁰²)。

