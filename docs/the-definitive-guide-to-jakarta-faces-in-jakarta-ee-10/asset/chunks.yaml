    事件期间更新与该复合组件关联的 `<h:message>` 时。


    你可以认为这是 Jakarta Faces 规范中的一个错误或疏忽。这确实如此，应该在 Jakarta Faces 的下一个版本中加以解决。另一个不太常见的用例是，当你需要更新迭代组件（如
    `<h:dataTable>` 和 `<ui:repeat>`）的特定迭代轮次时。


