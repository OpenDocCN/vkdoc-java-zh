    }

    ```


    以及服务类中的这个 `delete()` 方法：


    ```

    @TransactionAttribute(REQUIRED)

    public void delete(Product product) {

    if (entityManager.contains(product)) {

    entityManager.remove(product);

    }

    else {

    Product managedProduct = getById(product.getId());

    if (managedProduct != null) {

    entityManager.remove(managedProduct);

    }

    }

    }

    ```


    注意 `<f:ajax>` 的 `render` 属性。它指定了 `@namingcontainer`，这基本上引用了最近的父级 `NamingContainer`
    组件。在标准 Jakarta Faces HTML 组件集中，只有 `<h:form>` 和 `<h:dataTable>` 是 `NamingContainer`
    的实例。在这个特定的结构中，`@namingcontainer` 因此引用了 `<h:dataTable>`。您也可以使用 `<f:ajax render=":list:products">`
    代替；只是稍微冗长一些。`<f:ajax render="products">` 将不起作用，因为它会尝试在当前迭代行的上下文中找到它，而这基本上是在所有
    `<h:column>` 组件内部。


    在 <h:dataTable> 中选择行


    自 Jakarta Faces 2.3 起，在 `<h:dataTable>` 中拥有单选按钮列是原生支持的，这要归功于 `<h:selectOneRadio>`
