    诚然，这不是最优雅的方法。你最好委托给应用程序作用域 bean 中的自定义函数。它可能看起来像下面这样：


    其中 `#{ajax}` 应用程序作用域 bean 看起来像下面这样：


    ```

    @Named @ApplicationScoped

    public class Ajax {

    public String columnIds(List list, String idTemplate) {

    return IntStream.range(0, list.size()).boxed()

    .map(i -> idTemplate.replace("::", ":" + i + ":"))

    .collect(Collectors.joining(" "));

    }

    }

    ```


    这已经好一些了，但仍然有些模板化。如有必要，你也可以从后台 bean 以编程方式添加 Ajax 渲染 ID。你可以使用 `PartialViewContext#getRenderIds()`^((104))
    来实现。也就是说，返回的集合是可变的，并且仅在渲染响应阶段（第六阶段）被查询。你还需要在此处指定一个绝对层级 ID，但有一个重要的区别：它不能以命名容器分隔符开头。换句话说，“`:form:table:0:column2`”
    是行不通的；你需要指定“`form:table:0:column2`”。它总是相对于 `UIViewRoot` 进行解析。


    ```

    FacesContext context = FacesContext.getCurrentInstance();

    PartialViewContext ajaxContext = context.getPartialViewContext();

    ajaxContext.getRenderIds().add("form:table:0:column2");

    ```


