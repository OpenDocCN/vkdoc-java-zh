  trans: '

    `UIData` 的 `value` 属性支持 `java.lang.Iterable`。换句话说，你可以将任何 Java 集合作为模型值提供。由于 `UIData`
    中最常使用基于索引的访问，因此最高效的是 `java.util.ArrayList`，因为它提供了 `O(1)` 的索引访问。


    `<h:dataTable>` 组件的渲染器仅支持 `<h:column>` 作为直接子组件，其他内容将被忽略。顾名思义，`<h:column>` 代表单个列。每次遍历
    `<h:dataTable>` 的 `value` 时，基本上都会根据当前遍历的项重新渲染所有列。与 `<c:forEach>` 和 `<ui:repeat>`
    一样，当前遍历的项通过 `var` 属性暴露在 EL 作用域中。以下是一个遍历 `List<String>` 的基本示例。


    ```

    #{string}


    ```


    后台 Bean 类 `com.example.project.view.Bean`：


    ```

    @Named @RequestScoped

    public class Bean {

    private List strings;

    @PostConstruct

    public void init() {

    strings = Arrays.asList("one", "two", "three");

    }

    public List getStrings() {

    return strings;

    }

    }

    ```


    生成的 HTML 输出：


    ```


    one

    two

    three


    ```


    在 Chrome 浏览器中的渲染效果：


    ![](img/454457_2_En_6_Figc_HTML.jpg)


    需要注意的是，由 `var` 属性指定的变量名不应与现有的受管 Bean 名称甚至隐式 EL 对象冲突。隐式 EL 对象在 EL 解析中具有更高的优先级。隐式
    EL 对象的一个例子是 `#{header}`，它引用 `ExternalContext#getRequestHeaderMap()`。^(⁵⁰) 因此，如果你碰巧有
    `#{bean.headers}` 并且希望在迭代组件中呈现它，那么你不能使用 `var="header"`，最好想一个不同的名称，例如 `var="head"`。


    以下是一个更详细的示例，展示了产品列表。类似的表格在第五章的“自定义转换器”部分已经展示过。


    ```


    ID

    #{product.id}


    Name

    #{product.name}


    Description

    #{product.description}


    ```


    后台 Bean 类 `com.example.project.view.Products`：


    ```

    @Named @RequestScoped

    public class Products {

    private List list;

    @Inject

    private ProductService productService;

    @PostConstruct

    public void init() {

    list = productService.list();

    }

    public List getList() {

    return list;

    }

    }

    ```


    产品实体：`com.example.project.model.Product`：


    ```

    @Entity

    public class Product {

    @Id @GeneratedValue(strategy=IDENTITY)

    private Long id;

    @Column(nullable = false)

    private @NotNull String name;

    @Column(nullable = false)

    private @NotNull String description;

    // 添加/生成 getter+setter 方法。

    }

    ```


    产品服务：`com.example.project.service.ProductService`：


    ```

    @Stateless

    public class ProductService {

    @PersistenceContext

    private EntityManager entityManager;

    @TransactionAttribute(SUPPORTS)

    public List list() {

    return entityManager

    .createQuery("FROM Product ORDER BY id DESC", Product.class)

    .getResultList();

    }

    }

    ```


    生成的 HTML 输出：


    ```


    ID

    Name

    Description


    Three

    The third product


    Two

    The second product


    One

    The first product


    ```


    在 Chrome 浏览器中的渲染效果：

    ![](img/454457_2_En_6_Figd_HTML.jpg)

    需要注意的是，`<h:dataTable>` 的 `value` 属性背后的可迭代模型必须引用一个已在一次性生命周期事件（如 `@PostConstruct`
    或 `<f:viewAction>`）中预先准备好的 Bean 属性。这并非特指 `UIData` 组件，而是基本上适用于每个 Jakarta Faces
    组件。也就是说，在 Jakarta Faces 生命周期中，getter 方法可能会被多次调用，尤其是在迭代组件的 `value` 属性或任何 Jakarta
    Faces 组件的 `rendered` 属性中被引用时。


    技术原因是，任何 EL 值表达式在幕后都会被创建为一个 `jakarta.el.ValueExpression` 实例，该实例内部基本上只保存字面量 EL
    字符串，如 `"#{products.list}"`，并且每次对其调用 `ValueExpression#getValue()` 都会简单地根据提供的 EL
    上下文重新计算表达式。这通常是一个非常廉价的操作，耗时在纳秒级别，但当 getter 方法反过来执行一个相对昂贵的数据库查询（可能需要数十、数百甚至数千毫秒）时，它可能会急剧变慢。


    当迭代组件恰好嵌套了 Jakarta Faces 表单组件时，迭代组件可能会在 Jakarta Faces 生命周期的每个阶段调用 getter 方法。如果你通过在
    getter 方法中从数据库获取列表来准备可迭代模型，那么这将导致每次调用 getter 方法时都查询数据库，这显然是低效的。此外，关于根据提交的迭代索引解析感兴趣的迭代项的问题，也可能出现，正如上一节关于
    `<h:panelGrid>` 与 `<c:forEach>` 的最后一段所述。


    另一件需要注意的事情是 `<f:facet name="header">`。这基本上会生成一个 `<thead>` 元素，其内容位于 `<th>` 元素中。`<h:dataTable>`
    也支持 `<f:facet name="footer">`，它会生成一个 `<tfoot>` 元素，其内容位于 `<td>` 元素中。你通常可以在标签文档以及
    `<h:dataTable>` 标签文档中找到所有支持的 `<f:facet>` 名称。^(⁵¹)


    基本上，你可以在 `<h:column>` 内部放置任何内容来表示单元格内容，甚至可以是表单组件或嵌套的 `<h:dataTable>` 或 `<ui:repeat>`。以下是一个小示例，展示了在嵌套的
    `<ui:repeat>` 中显示 `Product` 实体的一个虚构的 `Set<Tag> tags` 属性。


    ```

    ...


    #{tag.name}


    ```


    可编辑的 `<h:dataTable>`


    至于嵌套在 `<h:column>` 内部的表单组件，你可以用输入组件替换模板文本中的 EL，如下所示：


    ```


    ID

    #{product.id}


    Name


    Description


    ```


    其中，后台 Bean 类的 `save()` 方法在将后台 Bean 类从 `@RequestScoped` 更改为 `@ViewScoped` 后，基本如下所示：


    ```

    public void save() {

    productService.update(products);

    }

    ```


    而服务类的 `update()` 方法则如下所示：


    ```

    @TransactionAttribute(REQUIRED)

    public void update(Iterable products) {

    products.forEach(entityManager::merge);

    }

    ```


    请注意，你完全无需担心收集提交的值。Jakarta Faces 已经为你完成了这项任务。另外，也无需担心 `<h:dataTable>` 内组件 ID 的唯一性，因为该组件已经实现了
    `NamingContainer` 接口，并会将其自身的客户端 ID 和迭代索引前置到子组件的客户端 ID 之前，正如你在以下生成的 HTML 输出中所见：


    ```


    ID

    Name

    Description


    The third product


    The second product


    The first product


    ```

