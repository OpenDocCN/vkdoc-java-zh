- fmt: "`@SessionScoped`\n\n一个会话作用域的托管 Bean 实例与已建立的 HTTP 会话的生命周期绑定。它在底层被表示为 `HttpSession`\
    \ 的一个属性，该属性是为每个唯一客户端按需创建的，以满足 Web 应用程序代码的需求。\n\n当 Web 应用程序代码直接或间接地通过 `HttpServletRequest#getSession()`\
    \ 首次访问 `HttpSession` 时，Servlet 容器将创建一个新的 `HttpSession` 实例，生成一个长且唯一的字符串作为会话 ID，并将其存储在服务器内存中，通常作为某个内部\
    \ `Map` 的一个条目。Servlet 容器还会在 HTTP 响应上设置一个会话 Cookie，其 Cookie 名称为 `JSESSIONID`，Cookie\
    \ 值为该会话 ID。“会话 Cookie”通过缺少“最大年龄”属性来识别。根据 HTTP Cookie 规范，只要 Cookie 有效，客户端（Web 浏览器）就需要在后续请求的标头中发回此\
    \ Cookie。在任何像样的 Web 浏览器中，你都可以在 Web 开发者工具集的“网络”部分检查请求和响应标头，该工具集可通过在 Web 浏览器中按 F12\
    \ 键访问。Servlet 容器将检查每个传入的 HTTP 请求，查找名称为 `JSESSIONID` 的 Cookie，并使用其值（会话 ID）从服务器内存中获取关联的\
    \ `HttpSession` 实例。\n\n在服务器端，`HttpSession` 实例会一直保持活动状态，直到超过 `web.xml` 中 `<session-timeout>`\
    \ 设置所指定的超时值未被访问为止。在大多数（如果不是全部）Servlet 容器中，该超时值默认为 30 分钟。因此，如果客户端访问 Web 应用程序的时间间隔超过指定时间，Servlet\
    \ 容器将销毁 `HttpSession` 实例。随后的每个 HTTP 请求，即使带有指定的 Cookie，也无法再访问关联的 `HttpSession`\
    \ 实例；Servlet 容器将创建一个新的 `HttpSession` 实例，并用新的会话 ID 覆盖 Cookie 值。\n\n在客户端，默认情况下，所有会话\
    \ Cookie 在浏览器实例运行期间保持有效。因此，当客户端关闭浏览器实例时，所有会话 Cookie 都会在客户端被销毁。在新的浏览器实例中，来自先前浏览器会话的会话\
    \ Cookie 不再可用，因此浏览器不会发送任何 `JSESSIONID` Cookie。服务器会将其解释为一个全新的会话。与先前浏览器会话关联的 `HttpSession`\
    \ 实例将在服务器端静默过期。\n\n默认情况下，会话作用域的托管 Bean 实例是在 Web 应用程序代码在 HTTP 会话生命周期内首次访问它时创建的。因此，它并非在\
    \ `HttpSession` 实例创建时立即创建。但是，可以保证在 `HttpSession` 实例被销毁时，它也会被销毁。会话作用域的托管 Bean 在同一个浏览器会话内的所有浏览器标签页和窗口之间有效共享。\n\
    \n会话作用域的托管 Bean 对于跟踪客户端特定数据非常有用，例如表示当前登录用户的实体、所选语言以及其他用户相关偏好。以下示例计算当前区域设置，并为其提供\
    \ getter/setter，以便可以在视图中获取它，并通过 `UIInput` 组件修改它。\n\n```java\n@Named @SessionScoped\n\
    public class ActiveLocale implements Serializable {\n    private Locale current;\n\
    \    @PostConstruct\n    public void init() {\n        FacesContext context =\
    \ FacesContext.getCurrentInstance();\n        current = context.getApplication()\n\
    \                .getViewHandler().calculateLocale(context);\n    }\n    // Getter+setter.\n\
    }\n```\n\n更详细的示例可以在第 [14](#454457_2_En_14_Chapter.xhtml) 章的“更改活动区域设置”部分找到。请注意，会话作用域的托管\
    \ Bean 必须实现 `Serializable`，因为存储这些 Bean 的 `HttpSession` 实例本身可能会在服务器重启时被写入磁盘，甚至在具有可分发会话的服务器集群配置中通过网络传输到不同的服务器。\n\
    \n另一个经典示例是“购物车”。\n\n```java\n@Named @SessionScoped\npublic class Cart implements\
    \ Serializable {\n    private List products = new ArrayList();\n    public void\
    \ addProduct(Product product) {\n        products.add(product);\n    }\n    //\
    \ ...\n}\n```\n\n`@ClientWindowScoped`\n\n一个客户端窗口作用域的托管 Bean 基本上与已建立的 `jakarta.faces.lifecycle.ClientWindow`\
    \ 实例的生命周期绑定，该实例已在 Jakarta Faces 2.2 中随 `@FlowScoped` 一起引入。只有 `@ClientWindowScoped`\
    \ 注解是 Jakarta Faces 4.0 中新增的。\n\n`ClientWindow` 实例又由一个预定义的 HTTP 请求参数标识，该参数的名称为\
    \ `jfwid`（“Jakarta Faces Window ID”），其值代表客户端窗口 ID。客户端窗口 ID 又引用了当前 HTTP 会话中的一个隔离映射，其中存储了客户端窗口作用域的托管\
    \ Bean。它需要首先通过将以下上下文参数添加到 `web.xml` 中来激活。\n\n```xml\njakarta.faces.CLIENT_WINDOW_MODE\n\
    url\n```\n\n唯一其他支持的值是 `none`，这也是默认值。缺少此上下文参数将导致任何使用 `@ClientWindowScoped` Bean\
    \ 的操作抛出 `jakarta.enterprise.context.ContextNotActiveException`。当在 Jakarta Faces\
    \ 页面中引用 `@ClientWindowScoped` Bean，并且该页面首次打开（因此 Bean 首次被构造）时，将生成 `jfwid` 请求参数的新值。当使用\
    \ `UIOutcomeTarget` 组件导航到其他页面时，此参数将在 URL 中可见。Jakarta Faces 将借助 `ViewHandler` 自动将\
    \ `jfwid` 请求参数附加到结果 URL。\n\n只要在后续的回发和导航中重复使用相同的 `jfwid` 请求参数值，关联的 `@ClientWindowScoped`\
    \ Bean 实例将在会话的剩余时间内保持活动状态，无论它发生在哪个浏览器标签页或窗口中。只有在没有 `jfwid` 请求参数的情况下，在相同的 URL 上打开一个全新的浏览器标签页/窗口时，才会启动一个新的\
    \ `ClientWindow`，因此也会创建一个全新的 `@ClientWindowScoped` Bean。\n\n当最终用户将 `jfwid` 请求参数的值修改为自定义值时，这也会启动一个新的\
    \ `ClientWindow`，并带有其自己的 `@ClientWindowScoped` Bean 新实例。但是，每个 HTTP 会话允许的 `ClientWindow`\
    \ 实例数量有上限，在 Mojarra 的情况下，默认每个会话为十个。这可以通过 `web.xml` 中的以下上下文参数进行配置。\n\n```xml\n\
    jakarta.faces.NUMBER_OF_CLIENT_WINDOWS\n```\n\n当达到此限制时，`ClientWindow` 将结束并销毁所有关联的\
    \ Bean，因此最近最少使用的一个将被逐出。"
  raw: "@SessionScoped\nA session-scoped\nmanaged bean\n instance is tied to the lifetime\
    \ of the established HTTP\nsession. It’s under the hood represented as an attribute\
    \ of the `HttpSession` that is\ncreated for every unique client on demand of the\
    \ web application’s code.\nWhen the web application’s code directly or indirectly\
    \ pokes the `HttpSession` for the\nfirst time via `HttpServletRequest#getSession()`,\n\
    then the servlet container will create a new `HttpSession` instance,\ngenerate\
    \ a long and unique string as session ID, and store it in\nserver’s memory, usually\
    \ as an entry of some internal `Map`. The servlet\ncontainer will also set a session\
    \ cookie on the HTTP response with\n“`JSESSIONID`” as\nthe cookie name and the\
    \ session ID as the cookie value. A “session\ncookie” is identified by the absence\
    \ of the “maximum age” attribute.\nAs per the HTTP cookie specification, the client\
    \ (the web browser) is\nrequired to send this cookie back in the header of the\
    \ subsequent\nrequests as long as the cookie is valid. In any decent web browser,\
    \ you\ncan inspect the request and response headers in the “Network” section of\n\
    the web developer’s toolset that is accessible by pressing F12 in the\nweb browser.\
    \ The servlet container will check every incoming HTTP\nrequest for the presence\
    \ of the cookie with the name “`JSESSIONID`” and use\nits value (the session ID)\
    \ to get the associated `HttpSession` instance\nfrom server’s memory.\nOn the\
    \ server side , the `HttpSession` instance\nstays alive until it has not been\
    \ accessed for more than the timeout\nvalue as specified in the `<session-timeout>`\n\
    setting of `web.xml`, which\ndefaults to 30 minutes on most, if not all, servlet\
    \ containers. So when\nthe client doesn’t visit the web application for longer\
    \ than the time\nspecified, then the servlet container will destroy the `HttpSession`\
    \ instance.\nEvery subsequent HTTP request, even with the cookie specified, will\
    \ not\nhave access to the associated `HttpSession` instance\nanymore; the servlet\
    \ container will create a new `HttpSession` instance\nand overwrite the cookie\
    \ value with the new session ID.\nOn the client side, by default, all session\
    \ cookies stay alive for as\nlong as the browser instance is running. So when\
    \ the client shuts down\nthe browser instance, then all session cookies are destroyed\
    \ on the\nclient side. In a new browser instance, the session cookies from a\n\
    previous browser session are not available anymore, so the browser won’t\nsend\
    \ any `JSESSIONID` cookie.\nThe server will then interpret it as a brand-new session.\
    \ The `HttpSession` instance\nassociated with the previous browser session will\
    \ silently expire on the\nserver side.\nBy default , a session-scoped\nmanaged\
    \ bean instance is created for the first time when the web\napplication’s code\
    \ accesses it for the first time during the HTTP\nsession’s lifetime. It’s thus\
    \ not, per definition, immediately created\nwhen the `HttpSession` instance\n\
    is created. It is, however, guaranteed to be destroyed when the `HttpSession`\
    \ instance\nis destroyed. Session-scoped managed beans are effectively shared\
    \ across\nall browser tabs and windows within the same browser session.\n\nSession-scoped\
    \ managed  beans are useful for\nkeeping track of client-specific data, such as\
    \ the entity representing\nthe currently logged-in user, the selected language,\
    \ and other\nuser-related preferences. The following example calculates the current\n\
    locale and provides a getter/setter for it so that it can be obtained in\nthe\
    \ view and modified by a `UIInput` component.\n\n```\n@Named @SessionScoped\n\
    public class ActiveLocale implements Serializable {\nprivate Locale current;\n\
    @PostConstruct\npublic void init() {\nFacesContext context = FacesContext.getCurrentInstance();\n\
    current = context.getApplication()\n.getViewHandler().calculateLocale(context);\n\
    }\n// Getter+setter.\n}\n```\n\nA more elaborate example can be found in the section\
    \ “Changing the\nActive Locale” in Chapter [14](#454457_2_En_14_Chapter.xhtml).\
    \ Do note that session-scoped\nmanaged beans must implement `Serializable` because\n\
    the `HttpSession`\ninstance itself, where those beans are being stored, is subject\
    \ to being\nwritten to disk in case of a server restart, or even to being\ntransferred\
    \ over the network to a different server in case  of a server cluster\nconfiguration\
    \ with a distributable session.\n\nAnother classic example is a “shopping cart.”\n\
    \n```\n@Named @SessionScoped\npublic class Cart implements Serializable {\nprivate\
    \ List products = new ArrayList();\npublic void addProduct(Product product) {\n\
    products.add(product);\n}\n// ...\n}\n```\n\n@ClientWindowScoped\nA client-window-scoped\
    \ managed bean  is basically tied to\nthe lifetime of the established `jakarta.faces.lifecycle.ClientWindow`\n\
    instance, already introduced in Jakarta Faces 2.2 along with `@FlowScoped`. Only\
    \ the\n`@ClientWindowScoped`\nannotation is new since Jakarta Faces 4.0.\n\nThe\
    \ `ClientWindow` instance\nis in turn identified by a predefined HTTP request\
    \ parameter with the\nname of “`jfwid`”\n(“Jakarta Faces Window ID”) whose value\
    \ represents the client window ID.\nThe client window ID in turn basically references\
    \ an isolated mapping in\nthe current HTTP session where the client-window-scoped\
    \ managed beans\nare stored. It needs to be activated first by adding the following\n\
    context parameter to the `web.xml`.\n\n```\njakarta.faces.CLIENT_WINDOW_MODE\n\
    url\n\n```\n\nThe only other supported value is “`none`”, which is also\nthe default\
    \ value. The absence of this context parameter will cause any\nusage of a `@ClientWindowScoped`\n\
    bean to throw a `jakarta.enterprise.context.ContextNotActiveException`.\nWhen\
    \ having a `@ClientWindowScoped`\nbean referenced in a Jakarta Faces page, and\
    \ it is opened for the first\ntime and thus the bean is constructed for the first\
    \ time, then a new\nvalue for the “`jfwid`” request\nparameter will be generated.\
    \ This parameter will be visible in the URL when using a `UIOutcomeTarget`\ncomponent\
    \ to navigate through other pages. Jakarta Faces will, with the\nhelp of the `ViewHandler`,\n\
    automatically append the “`jfwid`” request\nparameter to the outcome URLs.\nThe\
    \ associated `@ClientWindowScoped`\nbean instance will remain active for the rest\
    \ of the session as long as\nthe same value of the “`jfwid`” request\nparameter\
    \ is reused during subsequent postbacks and navigations,\nregardless of the browser\
    \ tab or window it took place in. Only opening a\nbrand new browser tab/window\
    \ on the same URL without the “`jfwid`” request\nparameter will start a new `ClientWindow`\
    \ and\ntherefore also create a brand new `@ClientWindowScoped`\nbean.\n\nWhen\
    \ the end user manipulates the value of the “`jfwid`” request\nparameter to a\
    \ custom value, then this will also start a new `ClientWindow` with its\nown new\
    \ instance of the `@ClientWindowScoped`\nbean. There is, however, a maximum limit\
    \ to the amount of allowable `ClientWindow`\ninstances per HTTP session, which\
    \ defaults to ten per session in case of\nMojarra. This is configurable with the\
    \ following context parameter in\n`web.xml`.\n\n```\njakarta.faces.NUMBER_OF_CLIENT_WINDOWS\n\
    \n```\n\nThe `ClientWindow` will\nonly end and destroy all associated beans when\
    \ this limit is hit and\nthus the least recently used one will be evicted."
  trans: '

    @SessionScoped

    会话作用域的托管 Bean 实例与已建立的 HTTP 会话的生命周期绑定。它在底层表示为 `HttpSession` 的一个属性，该属性是为每个唯一客户端根据
    Web 应用代码的需求而创建的。当 Web 应用代码通过 `HttpServletRequest#getSession()` 首次直接或间接访问 `HttpSession`
    时，Servlet 容器将创建一个新的 `HttpSession` 实例，生成一个长且唯一的字符串作为会话 ID，并将其存储在服务器内存中，通常作为某个内部
    `Map` 的一个条目。Servlet 容器还会在 HTTP 响应上设置一个会话 Cookie，其 Cookie 名称为“`JSESSIONID`”，Cookie
    值为会话 ID。“会话 Cookie”通过缺少“最大存活时间”属性来识别。根据 HTTP Cookie 规范，只要 Cookie 有效，客户端（Web 浏览器）就需要在后续请求的标头中发回此
    Cookie。在任何像样的 Web 浏览器中，你都可以在 Web 开发者工具集的“网络”部分检查请求和响应标头，该工具集可通过在 Web 浏览器中按 F12
    键访问。Servlet 容器将检查每个传入的 HTTP 请求，查找名称为“`JSESSIONID`”的 Cookie，并使用其值（会话 ID）从服务器内存中获取关联的
    `HttpSession` 实例。


    在服务器端，`HttpSession` 实例会一直保持活动状态，直到超过 `web.xml` 中 `<session-timeout>` 设置指定的超时值（大多数（如果不是全部）Servlet
    容器默认值为 30 分钟）未被访问。因此，当客户端访问 Web 应用的时间超过指定时间时，Servlet 容器将销毁 `HttpSession` 实例。每个后续的
    HTTP 请求，即使指定了 Cookie，也无法再访问关联的 `HttpSession` 实例；Servlet 容器将创建一个新的 `HttpSession`
    实例，并用新的会话 ID 覆盖 Cookie 值。


    在客户端，默认情况下，所有会话 Cookie 在浏览器实例运行期间都保持有效。因此，当客户端关闭浏览器实例时，所有会话 Cookie 都会在客户端被销毁。在新的浏览器实例中，来自先前浏览器会话的会话
    Cookie 不再可用，因此浏览器不会发送任何 `JSESSIONID` Cookie。然后，服务器会将其解释为一个全新的会话。与先前浏览器会话关联的 `HttpSession`
    实例将在服务器端静默过期。


    默认情况下，会话作用域的托管 Bean 实例是在 HTTP 会话生命周期内，当 Web 应用代码首次访问它时创建的。因此，根据定义，它并非在创建 `HttpSession`
    实例时立即创建。但是，可以保证在销毁 `HttpSession` 实例时销毁它。会话作用域的托管 Bean 在同一浏览器会话的所有浏览器标签页和窗口之间有效共享。


    会话作用域的托管 Bean 对于跟踪客户端特定数据非常有用，例如表示当前登录用户的实体、所选语言以及其他与用户相关的偏好设置。以下示例计算当前区域设置，并为其提供
    getter/setter，以便可以在视图中获取它，并通过 `UIInput` 组件进行修改。


    ```

    @Named @SessionScoped

    public class ActiveLocale implements Serializable {

    private Locale current;

    @PostConstruct

    public void init() {

    FacesContext context = FacesContext.getCurrentInstance();

    current = context.getApplication()

    .getViewHandler().calculateLocale(context);

    }

    // Getter+setter.

    }

    ```


    更详细的示例可以在第 14 章的“更改活动区域设置”部分找到。请注意，会话作用域的托管 Bean 必须实现 `Serializable`，因为存储这些 Bean
    的 `HttpSession` 实例本身可能会在服务器重启时被写入磁盘，甚至在具有可分发会话的服务器集群配置中通过网络传输到不同的服务器。


    另一个经典示例是“购物车”。


    ```

    @Named @SessionScoped

    public class Cart implements Serializable {

    private List products = new ArrayList();

    public void addProduct(Product product) {

    products.add(product);

    }

    // ...

    }

    ```


    @ClientWindowScoped

    客户端窗口作用域的托管 Bean 基本上与已建立的 `jakarta.faces.lifecycle.ClientWindow` 实例的生命周期绑定，该实例已在
    Jakarta Faces 2.2 中随 `@FlowScoped` 一起引入。只有 `@ClientWindowScoped` 注解是 Jakarta Faces
    4.0 中新增的。


    `ClientWindow` 实例又由一个预定义的 HTTP 请求参数标识，该参数的名称为“`jfwid`”（“Jakarta Faces Window ID”），其值表示客户端窗口
    ID。客户端窗口 ID 又引用了当前 HTTP 会话中的一个隔离映射，该映射存储了客户端窗口作用域的托管 Bean。首先需要通过向 `web.xml` 添加以下上下文参数来激活它。


    ```

    jakarta.faces.CLIENT_WINDOW_MODE

    url


    ```


    唯一其他支持的值是“`none`”，这也是默认值。缺少此上下文参数将导致任何使用 `@ClientWindowScoped` Bean 的操作抛出 `jakarta.enterprise.context.ContextNotActiveException`。当在
    Jakarta Faces 页面中引用了 `@ClientWindowScoped` Bean，并且首次打开该页面（因此首次构造该 Bean）时，将生成一个新的“`jfwid`”请求参数值。当使用
    `UIOutcomeTarget` 组件导航到其他页面时，此参数将在 URL 中可见。Jakarta Faces 将在 `ViewHandler` 的帮助下，自动将“`jfwid`”请求参数附加到结果
    URL。


    只要在后续的回发和导航中重复使用相同的“`jfwid`”请求参数值，关联的 `@ClientWindowScoped` Bean 实例将在会话的剩余时间内保持活动状态，无论它发生在哪个浏览器标签页或窗口中。只有在没有“`jfwid`”请求参数的情况下，在同一
    URL 上打开一个全新的浏览器标签页/窗口时，才会启动一个新的 `ClientWindow`，因此也会创建一个全新的 `@ClientWindowScoped`
    Bean。


    当最终用户将“`jfwid`”请求参数的值修改为自定义值时，这也会启动一个新的 `ClientWindow`，并带有其自己的新 `@ClientWindowScoped`
    Bean 实例。但是，每个 HTTP 会话允许的 `ClientWindow` 实例数量有上限，对于 Mojarra，默认情况下每个会话最多十个。这可以通过
    `web.xml` 中的以下上下文参数进行配置。


    ```

    jakarta.faces.NUMBER_OF_CLIENT_WINDOWS


    ```


    只有当达到此限制时，`ClientWindow` 才会结束并销毁所有关联的 Bean，因此最近最少使用的那个将被逐出。

    '
- fmt: "# `@ConversationScoped`\n\n一个会话作用域（conversation-scoped）托管 bean 的生命周期与注入的`jakarta.enterprise.context.Conversation`实例绑定，该实例提供了`begin()`和`end()`方法，必须由\
    \ Web 应用程序的代码显式调用，以指示会话作用域的开始和结束。会话作用域由一个预定义的 HTTP 请求参数表示，其默认名称为“`cid`”（“会话 ID”），该参数的值代表会话\
    \ ID。会话 ID 反过来引用当前 HTTP 会话中的一个隔离映射，会话作用域的托管 bean 实例将存储在该映射中。\n\n只要会话作用域尚未开始，会话作用域的托管\
    \ bean 的行为将类似于请求作用域的托管 bean。当应用程序代码显式调用`Conversation#begin()`时，会话作用域将开始，并且由 CDI\
    \ 实现提供的自定义`jakarta.faces.application.ViewHandler`将确保其所有`getXxxURL()`方法（例如`getActionURL()`和`getBookmarkableURL()`）返回包含会话\
    \ ID 参数的 URL（统一资源定位符）。在 Weld 的情况下，这是`ConversationAwareViewHandler`。^([(72)](#fn72))\
    \ 所有 Jakarta Faces 的`UIForm`和`UIOutcomeTarget`组件都从`ViewHandler`的这些方法派生其操作和目标 URL。这些组件生成的\
    \ HTML 输出最终将在目标 URL 中包含会话 ID。\n\n在传入的 HTTP 请求中，当请求中存在会话 ID 参数且该参数仍然有效时，CDI 实现将从\
    \ HTTP 会话中获取关联的会话作用域，并确保所有会话作用域的托管 bean 都从由该会话 ID 标识的特定会话作用域中获取。这适用于 GET 和 POST\
    \ 请求。任何表单提交或对包含会话 ID 的 URL 的链接/导航都将提供对同一个会话作用域的访问，只要它仍然有效。当应用程序代码显式调用`Conversation#end()`时，会话作用域结束。当最终用户稍后重用“`cid`”请求参数，或将其值修改为其自身浏览器会话中未启动的值，或底层`HttpSession`实例被销毁时，CDI\
