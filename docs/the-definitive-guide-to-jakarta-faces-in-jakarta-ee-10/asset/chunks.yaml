    在 `@FacesConverter` 注解中，有几个重要事项需要注意。首先，`forClass` 属性主要用于指定该转换器应在**处理验证阶段**（第三阶段）和**渲染响应阶段**（第六阶段）自动为其运行的目标实体类型。这样，您就无需在视图中显式注册转换器。如果您想显式注册，则可以将
    `forClass` 属性替换为 `value` 属性，并指定转换器的唯一标识符，例如：


    ```

    @FacesConverter(value="project.ProductConverter", managed=true)

    ```


    然后，您可以在任何 `ValueHolder` 组件的 `converter` 属性中，或任何嵌套的 `<f:converter>` 标签的 `converterId`
    属性中，精确指定该转换器 ID。


    但是，如果您继续使用 `forClass` 属性，则无需这样做。请注意，您不能同时指定两者。两者只能选其一，其中 `value` 属性的优先级高于 `forClass`
    属性。因此，如果您同时指定了两者，`forClass` 属性实际上会被忽略。我们不希望出现这种情况，因为对于透明转换整个实体这一特定目的而言，`forClass`
    属性要强大得多。


    注解中需要注意的第二点是 `managed` 属性。这是 Jakarta Faces 2.3 中新增的。本质上，它用于在 CDI 上下文中管理转换器实例。为了在转换器中实现依赖注入，必须将
    `managed` 属性设置为 `true`。以前，这是通过将转换器本身设为受管 bean 来解决的。^(³⁷)


    如果您以前使用过 Jakarta Faces 转换器，您还会注意到该接口现在终于被参数化了。该接口早于 Java 1.5，因此从一开始就没有参数化。使用 `Converter<T>`
    后，`getAsObject()` 现在返回 `T` 而不是 `Object`，而 `getAsString()` 现在接受 `T` 作为值参数，而不是 `Object`。这省去了不必要的
    `instanceof` 检查和/或类型转换。


    请注意，Jakarta Faces 自身早于 Jakarta Faces 2.3 的标准转换器（目前基本上所有标准转换器都是如此）是冻结的，无法利用这一特性，否则它们将不再向后兼容。换句话说，它们仍然是原始类型。也就是说，有人可能在纯
    Java 代码中以编程方式使用 Jakarta Faces 转换器，而不是让 Jakarta Faces 来处理它们，这种可能性虽小但并非不可避免。如果标准转换器被参数化，那么那些纯
    Java 代码将无法再编译。这与 `Map#get()` 显式接受 `Object` 而不是 `K` 作为参数的原因基本相同。此外，还有一种更小但并非不可避免的可能性，即有人创建了一个自定义转换器，它扩展了标准转换器，但也显式地重新声明了该接口。类似于以下情况：


    ```

    public class ExtendedNumberConverter

    extends NumberConverter implements Converter

    {

    // ...

    }

    ```


    如果 `NumberConverter` 以某种方式被参数化，那么这样一个晦涩的转换器将无法再编译。即使我们将 `NumberConverter` 参数化为
    `Converter<Object>`，编译器也会对 `ExtendedNumberConverter` 报错，从而破坏向后兼容性，错误信息如下：


    *接口 Converter 不能使用不同的参数实现多次：Converter<Object> 和 Converter*


