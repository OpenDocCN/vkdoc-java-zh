    如果你已经准备了一个简单的支持 bean 类`Login`，它有两个字符串属性`email`和`password`，以及一个方法`submit()`，并且提交了之前显示的登录页面而没有填写电子邮件输入字段，那么你将遇到以下格式的验证错误：


    ```

    login:email: Validation Error: Value is required.

    ```


    当你将语言切换到葡萄牙语并重新提交空表单时，你会看到它也被本地化了。然而，当你进一步将语言切换到印地语时，你会注意到标准的 Jakarta Faces 实现中没有标准的印地语消息包。你需要提供你自己的。有几种方法可以实现这一点。


    首先，Jakarta Faces 输入和选择组件支持三个属性来覆盖默认消息：`requiredMessage`、`validatorMessage`和`converterMessage`。以下示例展示了如何覆盖默认的必需消息：


    ```

    ```


    这可以说是最简单的方法。主要的缺点是，如果你没有将其包装在可重用的标签文件中（例如`<my:inputText>`），你必须在任何地方复制/粘贴它。这不符合
    DRY 原则。


    另一种方法是提供一个自定义消息包，覆盖所有特定于 Jakarta Faces 转换/验证消息的预定义包键，并将其注册为`<message-bundle>`在`faces-config.xml`中。你可以在
    Jakarta Faces 规范的 2.5.2.4 节“本地化应用程序消息”中找到所有预定义的包键。默认必需消息“Validation Error: Value
    is Required”的包键是`jakarta.faces.component.UIInput.REQUIRED`。我们可以在新的消息包文件中调整它，如下所示：


    ```

    main/java/resources/com/example/project/i18n/messages.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} is required.

    main/java/resources/com/example/project/i18n/messages_pt_BR.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} é obrigatório.

    main/java/resources/com/example/project/i18n/messages_hi.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} आवश्यक है.

    ```


    最后，在`faces-config.xml`文件的`<application>`元素中配置它：


    ```

    ...

    com.example.project.i18n.messages

    ```


    你可能已经注意到消息中的`{0}`占位符。它们代表关联的输入和选择组件的标签。标签默认为组件的客户端 ID，这基本上是你可以在浏览器页面源代码中找到的 Jakarta
    Faces 生成的 HTML 元素的 ID。你可以通过显式设置组件的`label`属性来覆盖它。'
  raw: 'The `#{activeLocale.languageTag}`

    property delegates internally to the current `java.util.Locale`

    instance. This is basically done for convenience so that we don’t

    necessarily need to add a converter for `#{activeLocale.current}`

    in case we want to use it in `<h:selectOneMenu>`.

    `<f:ajax listener>` basically performs a full page reload with the help

    of a piece of JavaScript that is executed on completion of the Ajax

    request. This is done by adding a script to the `PartialViewContext#getEvalScripts()`

    method, which is new since Jakarta Faces 2.3\. Any added script will end

    up ordered in the `<eval>` section

    of the Jakarta Faces Ajax response, which in turn gets executed after

    Jakarta Faces Ajax

    engine has updated the HTML DOM (Document Object Model) tree.

    The script itself, `location.replace(location)`,

    basically instructs JavaScript to reload the current document without

    keeping the previous document in history. This means that the back

    button won’t redisplay the same page. You can also use `location.reload(true)`

    instead, but this won’t work nicely if a synchronous (non-Ajax) POST

    request has been fired on the same document beforehand. It would be

    reexecuted and cause a double submit. And it unnecessarily remembers the

    previous page in the history. This may end up in confusing behavior

    because the back button would then seem to have no effect as it would

    redisplay exactly the same page as the active locale is stored

    in the session, not in the request.

    Alternatively, instead of invoking `<f:ajax listener>`, you can in this specific
    use case also use just

    `<f:ajax render="@all">` without any listener. It has at least one

    disadvantage: the document’s title won’t be updated. In any case, using

    `@all` is

    generally considered a bad practice. There’s only one legitimate

    real-world use case for it: displaying a full error page on an Ajax

    request.

    As a completely different alternative, you could make the active

    locale request scoped instead of session scoped by including the

    language tag in the URL as in `http://example.com/en/page.xhtml`,

    `http://example.com/pt/page.xhtml`,

    and `http://example.com/hi/page.xhtml`.

    This way, you can change the active locale by simply following a link.

    This only involves a servlet filter that

    extracts the `java.util.Locale`

    instance from the URL and forwards it to the desired Jakarta Faces page

    and a custom view handler that includes the language tag in the

    generated URL of any `<h:form>`, `<h:link>`, and

    `<h:button>`

    component.


    Organizing Bundle Keys


    When the web application grows, you may notice that bundle files start

    to become unmaintainable. The key is to organize the bundle keys following a

    very strict convention. Reusable site-wide entries, usually those used

    as input labels, button labels, link labels, table header labels, etc.,

    should be keyed using a general prefix (e.g., “`label.save=Save`”).

    Page-specific entries should be keyed using a page-specific prefix

    (e.g., “`foldername_pagename.title=Some Page Title`”). The following is an elaborate
    example of a

    localized Facelets template, `/WEB-INF/templates/page.xhtml`:


    ```


    #{text[page += ''.title'']}


    #{text[page += ''.title'']}


    © #{text[''page_home.title'']}


    ```


    The Jakarta Tags `<c:set>`

    basically converts the `UIViewRoot#getViewId()`

    to a string that is suitable as a page-specific prefix. The Jakarta

    Faces view ID basically represents the absolute server-side path to the

    physical file representing the Jakarta Faces page (e.g., “`/user/account.xhtml`”).

    This needs to be manipulated to a format suitable as a resource bundle

    key. The `fn:split()` call

    extracts the part “`/user/account`” from

    it, and the `fn:replace()` call

    converts the forward slash to underscore so that it becomes “`_user_account`”.

    Finally, `<c:set>` stores

    it as “`page_user_account`” in

    the view scope under the name “`page`” so that it’s

    available as `#{page}` elsewhere in

    the same view.


    You’ll notice that `#{page}` is in turn

    being used as, among others, the ID of `<h:body>`. This

    makes it easier to select a specific page from a general CSS (Cascading

    Style Sheets)

    file just in case that’s needed. `#{page}` is also being

    used in several resource bundle references, such as `#{text[page += ''.title'']}`
    that ultimately references, in case of “`/home.xhtml`”, the key

    “`page_home.title`”.

    With such a template, you can have the following page-specific resource

    bundle entries:


    ```

    page_home.title = My Website

    page_home.meta.description = A Hello World Faces application.

    page_login.title = Log In

    page_login.meta.description = Log in to My Website.

    page_signup.title = Sign Up

    page_signup.meta.description = Sign up to My Website.

    ```


    The following is an example of a template client that utilizes the

    previously shown template `/WEB-INF/templates/page.xhtml`,

    the `/login.xhtml`:


    The following is what the associated resource bundle entries look like:


    ```

    label.email = Email

    label.password = Password

    label.login = Log In

    ```


    Note: In case you find that the page looks crippled, simply add a CSS

    file with the following rule to start with:


    ```

    nav a, fieldset label, fieldset input {

    display: block;

    }

    ```


    Localizing Conversion/Validation Messages


    In case you have prepared a simple backing bean class `Login` with two string

    properties, `email` and `password`, and a

    method `submit()`

    and submit the previously shown login page without filling out the email

    input field, then you’ll face a validation error in the

    following format:


    ```

    login:email: Validation Error: Value is required.

    ```


    When you switch the language to Portuguese and resubmit the empty

    form, then you’ll see that it’s also localized. However, when you switch

    the language further to Hindi, then you’ll notice that there’s no

    standard Hindi message bundle in the standard Jakarta Faces

    implementation. You’d need to provide your own. There are several ways

    to achieve this.


    First, Jakarta Faces input and select components support three

    attributes to override the default message: `requiredMessage`,

    `validatorMessage`, and

    `converterMessage`. The

    following example shows how to override the default required message:


    ```

    This is arguably the easiest approach. The major caveat is that you

    have to copy/paste it everywhere in case you haven’t wrapped it in a

    reusable tag file like `<my:inputText>`.

    This is not DRY.^([^(114)](#fn114))


    Another way is to supply a custom message bundle that overrides all

    predefined bundle keys specific for Jakarta Faces

    conversion/validation messages and register it as `<message-bundle>`

    in `faces-config.xml`. You

    can find all predefined bundle keys in Chapter 2.5.2.4, “Localized

    Application Messages,” of the Jakarta Faces specification. The bundle

    key of the default required message “Validation Error: Value is

    Required” is thus `jakarta.faces.component.UIInput.REQUIRED`.

    We can adjust it in new message bundle files as

    follows:


    ```

    main/java/resources/com/example/project/i18n/messages.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} is required.

    main/java/resources/com/example/project/i18n/messages_pt_BR.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} é obrigatório.

    main/java/resources/com/example/project/i18n/messages_hi.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} आवश्यक है.

    ```


    Finally, configure it in the `<application>`

    element of the `faces-config.xml`

    file:


    ```

    ...

    com.example.project.i18n.messages


    ```


    You’ll perhaps have noticed the `{0}` placeholders in

    the messages. They represent the labels of the associated input and

    select components. The labels default to the component’s client ID,

    which is basically the ID of the Jakarta Faces`–`generated HTML

    element as you can find in the browser’s page source. You can override

    it by explicitly setting the `label` attribute  of the component.'
  trans: '

    `#{activeLocale.languageTag}`

    属性内部委托给当前的 `java.util.Locale`

    实例。这样做主要是为了方便，这样我们就不必在想要于 `<h:selectOneMenu>` 中使用 `#{activeLocale.current}` 时，为其添加一个转换器。

    `<f:ajax listener>` 基本上会借助一段在 Ajax 请求完成时执行的 JavaScript 来执行完整的页面重新加载。这是通过向 `PartialViewContext#getEvalScripts()`
    方法添加一个脚本来实现的，该方法是 Jakarta Faces 2.3 中新增的。任何添加的脚本最终都会按顺序出现在 Jakarta Faces Ajax
    响应的 `<eval>` 部分中，而该部分又会在 Jakarta Faces Ajax 引擎更新了 HTML DOM（文档对象模型）树之后执行。

    该脚本本身 `location.replace(location)`，基本上指示 JavaScript 重新加载当前文档，而不在历史记录中保留之前的文档。这意味着后退按钮不会重新显示同一页面。你也可以改用
    `location.reload(true)`，但如果之前在同一文档上触发了同步（非 Ajax）POST 请求，则此方法无法正常工作。它会被重新执行并导致重复提交。而且它还会不必要地在历史记录中记住上一页。这可能会导致令人困惑的行为，因为后退按钮似乎没有效果，因为它会重新显示完全相同的页面（因为活动区域存储在会话中，而不是请求中）。

    或者，在这种特定用例中，你也可以不使用 `<f:ajax listener>`，而仅使用 `<f:ajax render="@all">` 且不带任何监听器。它至少有一个缺点：文档的标题不会被更新。无论如何，使用
    `@all` 通常被认为是一种不好的做法。它只有一个合法的实际用例：在 Ajax 请求上显示完整的错误页面。

    作为一个完全不同的替代方案，你可以将活动区域设置为请求作用域而不是会话作用域，方法是将语言标签包含在 URL 中，例如 `http://example.com/en/page.xhtml`、`http://example.com/pt/page.xhtml`
    和 `http://example.com/hi/page.xhtml`。这样，你就可以通过简单地点击链接来更改活动区域。这只需要一个 Servlet 过滤器，从
    URL 中提取 `java.util.Locale` 实例并将其转发到所需的 Jakarta Faces 页面，以及一个自定义视图处理程序，该处理程序将语言标签包含在任何
    `<h:form>`、`<h:link>` 和 `<h:button>` 组件生成的 URL 中。


    **组织资源包键**


    当 Web 应用程序增长时，你可能会注意到资源包文件开始变得难以维护。关键在于遵循非常严格的约定来组织资源包键。可重用的站点范围条目，通常是那些用作输入标签、按钮标签、链接标签、表格标题标签等的条目，应使用通用前缀作为键（例如，“`label.save=Save`”）。特定于页面的条目应使用特定于页面的前缀作为键（例如，“`foldername_pagename.title=Some
    Page Title`”）。以下是一个本地化 Facelets 模板的详细示例，`/WEB-INF/templates/page.xhtml`：


    ```


    #{text[page += ''.title'']}


    #{text[page += ''.title'']}


    © #{text[''page_home.title'']}


    ```


    Jakarta 标签 `<c:set>` 基本上将 `UIViewRoot#getViewId()` 转换为适合作为页面特定前缀的字符串。Jakarta Faces
    视图 ID 基本上表示代表 Jakarta Faces 页面的物理文件的绝对服务器端路径（例如，“`/user/account.xhtml`”）。这需要被处理成适合作为资源包键的格式。`fn:split()`
    调用从中提取出 “`/user/account`” 部分，而 `fn:replace()` 调用将正斜杠转换为下划线，使其变成 “`_user_account`”。最后，`<c:set>`
    将其以 “`page_user_account`” 的名称存储在视图作用域中，名称为 “`page`”，以便在同一视图的其他地方可以作为 `#{page}`
    使用。


    你会注意到 `#{page}` 又被用作 `<h:body>` 的 ID 等。这使得在需要时，可以更容易地从通用的 CSS（层叠样式表）文件中选择特定页面。`#{page}`
    还被用于多个资源包引用中，例如 `#{text[page += ''.title'']}`，在 “`/home.xhtml`” 的情况下，它最终引用键 “`page_home.title`”。使用这样的模板，你可以拥有以下特定于页面的资源包条目：


    ```

    page_home.title = My Website

    page_home.meta.description = A Hello World Faces application.

    page_login.title = Log In

    page_login.meta.description = Log in to My Website.

    page_signup.title = Sign Up

    page_signup.meta.description = Sign up to My Website.

    ```


    以下是一个使用前面展示的模板 `/WEB-INF/templates/page.xhtml` 的模板客户端示例，即 `/login.xhtml`：


    以下是关联的资源包条目的样子：


    ```

    label.email = Email

    label.password = Password

    label.login = Log In

    ```


    注意：如果你发现页面显示不正常，只需添加一个包含以下规则的 CSS 文件即可：


    ```

    nav a, fieldset label, fieldset input {

    display: block;

    }

    ```


    **本地化转换/验证消息**


    如果你已经准备了一个简单的支持 bean 类 `Login`，它有两个字符串属性 `email` 和 `password`，以及一个方法 `submit()`，并且提交了前面显示的登录页面而没有填写电子邮件输入字段，那么你将遇到以下格式的验证错误：


    ```

    login:email: Validation Error: Value is required.

    ```


    当你将语言切换到葡萄牙语并重新提交空表单时，你会看到它也被本地化了。但是，当你进一步将语言切换到印地语时，你会注意到标准的 Jakarta Faces 实现中没有标准的印地语消息包。你需要提供你自己的。有几种方法可以实现这一点。


    首先，Jakarta Faces 输入和选择组件支持三个属性来覆盖默认消息：`requiredMessage`、`validatorMessage` 和 `converterMessage`。以下示例展示了如何覆盖默认的必填消息：


    ```

    这可以说是最简单的方法。主要的缺点是，如果你没有将其包装在像 `<my:inputText>` 这样的可重用标签文件中，你必须在任何地方复制/粘贴它。这不符合
    DRY 原则。^(¹¹⁴)


    另一种方法是提供一个自定义消息包，覆盖所有特定于 Jakarta Faces 转换/验证消息的预定义包键，并将其注册为 `faces-config.xml`
    中的 `<message-bundle>`。你可以在 Jakarta Faces 规范的 2.5.2.4 节“本地化应用程序消息”中找到所有预定义的包键。默认必填消息
    “Validation Error: Value is Required” 的包键是 `jakarta.faces.component.UIInput.REQUIRED`。我们可以在新的消息包文件中对其进行调整，如下所示：


    ```

    main/java/resources/com/example/project/i18n/messages.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} is required.

    main/java/resources/com/example/project/i18n/messages_pt_BR.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} é obrigatório.

    main/java/resources/com/example/project/i18n/messages_hi.properties

    jakarta.faces.component.UIInput.REQUIRED = {0} आवश्यक है.

    ```


    最后，在 `faces-config.xml` 文件的 `<application>` 元素中对其进行配置：


    ```

    ...

    com.example.project.i18n.messages


    ```


    你可能已经注意到消息中的 `{0}` 占位符。它们代表关联的输入和选择组件的标签。标签默认为组件的客户端 ID，这基本上是你可以在浏览器页面源代码中找到的
    Jakarta Faces 生成的 HTML 元素的 ID。你可以通过显式设置组件的 `label` 属性来覆盖它。

    '
- fmt: "# 本地化消息与资源包\n\n注意，将消息包放在与资源包不同的文件中并不是严格必需的。你也可以将消息包条目直接放在`text.properties`文件中，并调整`faces-config.xml`中的`<message-bundle>`条目，使其指向与`<resource-bundle>`相同的完全限定名（FQN）。\n\
    \n## 在自定义转换器/验证器中获取本地化消息\n\n`<message-bundle>`条目的值可以通过`Application#getMessageBundle()`以编程方式获取。然后你可以使用`java.util.ResourceBundle`API以及`UIViewRoot#getLocale()`来获取实际的资源包。这使得你可以在自定义转换器和验证器中获取本地化消息。以下是这样一个验证器的示例，它检查指定的电子邮件地址是否已被使用：\n\
    \n```java\n@FacesValidator(value = \"duplicateEmailValidator\", managed = true)\n\
    public class DuplicateEmailValidator implements Validator {\n    @Inject\n   \
    \ private UserService userService;\n\n    @Override\n    public void validate(FacesContext\
    \ context, UIComponent component, String value) throws ValidatorException {\n\
    \        if (value == null) {\n            return;\n        }\n        Optional\
    \ user = userService.findByEmail(value);\n        if (user.isPresent()) {\n  \
    \          throw new ValidatorException(new FacesMessage(getMessage(context, \"\
    message.duplicateEmailValidator\")));\n        }\n    }\n\n    public static String\
    \ getMessage(FacesContext context, String key) {\n        return ResourceBundle.getBundle(\n\
    \            context.getApplication().getMessageBundle(),\n            context.getViewRoot().getLocale()).getString(key);\n\
    \    }\n}\n```\n\n注意`@FacesValidator`注解中的`managed`属性。这基本上会开启验证器实例上的CDI支持，从而允许你将业务服务注入到验证器中。`@FacesConverter`也支持相同的属性。\n\
    \n上述验证器示例假设在`<message-bundle>`标识的资源包文件中存在以下条目：\n\n```properties\nmessage.duplicateEmailValidator\
    \ = Email is already in use.\n```\n\n## 本地化枚举\n\n本地化枚举最简洁的方法是直接使用枚举自身的标识作为资源包键。这可以使枚举类免受潜在的UI特定杂乱信息（如硬编码的资源包键）的影响。通常，枚举的简单名称和枚举值的组合足以表示站点范围内的唯一标识符。给定以下`com.example.project.model.Group`枚举（表示用户组）：\n\
    \n```java\npublic enum Group {\n    USER,\n    MANAGER,\n    ADMINISTRATOR,\n\
    \    DEVELOPER;\n}\n```\n\n以及`text.properties`中的以下资源包条目：\n\n```properties\nGroup.USER\
    \ = User\nGroup.MANAGER = Manager\nGroup.ADMINISTRATOR = Administrator\nGroup.DEVELOPER\
    \ = Developer\n```\n\n你可以轻松地按如下方式本地化它们：\n\n```xml\n<f:metadata>\n    <f:importConstants\
    \ type=\"com.example.project.model.Group\" />\n</f:metadata>\n...\n<h:selectOneMenu\
    \ value=\"#{bean.group}\">\n    <f:selectItems value=\"#{Group.values()}\" var=\"\
    group\"\n        itemLabel=\"#{messages['Group.'.concat(group)]}\" />\n</h:selectOneMenu>\n\
    ```\n\n注意，`<f:importConstants>`需要放在`<f:metadata>`内部。其`type`属性必须代表枚举的完全限定名，或任何包含`public\
    \ static final`字段形式的公共常量的类或接口。`<f:importConstants>`会自动将它们作为`Map<String, Object>`导入到EL作用域中，其中map键代表常量的名称（字符串形式），map值代表常量的实际值。通过`#{Group.values()}`，你可以获取所有常量值的集合，每个值随后在`itemLabel`中被本地化。另请注意，`itemValue`被省略了，因为它默认为`var`属性的值，这已经足够了。\n\
    \n## 参数化资源包值\n\n你还可以使用`java.text.MessageFormat`API的`{0}`占位符来参数化资源包条目。在Jakarta\
    \ Faces端，它们只能通过`<h:outputFormat>`进行替换，其中参数作为`<f:param>`子元素提供，顺序与占位符相同。给定以下条目：\n\
    \n```properties\npage_products.table.header = There {0, choice, 0#are no products\
    \ | 1#is one product | 1<are {0} products}.\n```\n\n可以使用`<h:outputFormat>`按如下方式替换：\n\
    \n```xml\n<h:outputFormat value=\"#{text['page_products.table.header']}\">\n \
    \   <f:param value=\"#{bean.productCount}\" />\n</h:outputFormat>\n```\n\n## 基于数据库的ResourceBundle\n\
    \nJakarta Faces还支持指定自定义的`ResourceBundle`实现作为`<base-name>`。这允许你以编程方式填充和提供所需的资源包，例如，来自多个资源包文件，甚至来自数据库。在这个示例中，我们将用从数据库加载条目的资源包替换默认的基于属性文件的资源包。这使我们更进一步地组织资源包键。通过这种方式，你甚至可以通过基于Web的界面来编辑它们。\n\
    \n以下是Jakarta Persistence实体的样子：\n\n```java\n@Entity\n@Table(uniqueConstraints =\
    \ {\n    @UniqueConstraint(columnNames = { \"locale\", \"key\" })\n})\npublic\
    \ class Translation {\n    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)\n\
    \    private Long id;\n\n    @Column(length = 5, nullable = false)\n    private\
    \ @NotNull Locale locale;\n\n    @Column(length = 255, nullable = false)\n   \
    \ private @NotNull String key;\n\n    @Lob @Column(nullable = false)\n    private\
    \ @NotNull String value;\n\n    // Add/generate getters and setters here.\n}\n\
    ```\n\n注意，Jakarta Persistence注解提供了足够的提示，说明表的DDL（数据定义语言）应该是什么样子。当在`persistence.xml`中将`jakarta.persistence.schema-generation.database.action`属性设置为`create`或`drop-and-create`时，它将自动生成适当的DDL。为完整起见，这里是HSQL/pgSQL风格的DDL：\n\
    \n```sql\nCREATE TABLE Translation (\n    id BIGINT GENERATED BY DEFAULT AS IDENTITY\
    \ PRIMARY KEY,\n    locale VARCHAR(5) NOT NULL,\n    key VARCHAR(255) NOT NULL,\n\
    \    value CLOB NOT NULL\n);\nALTER TABLE Translation\nADD CONSTRAINT UK_Translation_locale_key\n\
    UNIQUE (locale, key);\n```\n\n以下是Jakarta Enterprise Beans服务的样子：\n\n```java\n@Stateless\n\
    public class TranslationService {\n    @PersistenceContext\n    private EntityManager\
    \ entityManager;\n\n    @TransactionAttribute(value = REQUIRES_NEW)\n    @SuppressWarnings(\"\
    unchecked\")\n    public Object[][] getContent(Locale locale, Locale fallback)\
    \ {\n        List resultList = entityManager.createQuery(\n            \"SELECT\
