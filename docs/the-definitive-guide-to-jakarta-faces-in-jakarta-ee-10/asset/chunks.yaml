    With this, the following Ajax listener will thus be fired only when the `hour`
    drop-down is changed and not when the `minute` drop-down is changed.


    All in all, it must be said that composite components have been overhyped after
    they were first introduced in Jakarta Faces 2.0. People started using them to
    “composite” whole templates, includes, decorations, and even multiple tags, without
    using any backing component. That is, the zero-configuration nature as compared
    to tag files is very attractive. Everything is declared in the composite component
    file itself via `<cc:interface>`. And they can be directly used in the template
    client just by following a convention without the need to configure it in some
    XML file. The caveat is that composite components are, due to their internal design,
    relatively expensive during building and restoring the view as compared to plain
    include files, decorate files, and tag files, especially when deeply nested. The
    best practice is therefore to use them only and only if you actually need a backing
    component via `<cc:interface componentType>`. For any other case, just use an
    include, a decorate, or a tag file instead. In the previous section, you may already
    have learned that tag files can be quite powerful with the help of Jakarta Tags.


    ## Recursive Composite Component


    You can safely nest composite components in each other. However, when you nest
    the very same composite component recursively in itself, then it would fail with
    a stack overflow error when EL attempts to resolve the concrete composite component
    instance behind `#{cc}`.^([(66)](#fn66))


    Imagine that you’ve got a recursive tree model that represents some sort of a
    discussion thread, such as email messages and all their replies, or blog comments
    and all their replies, whereby each reply can in turn have another set of replies.
    This can be represented as a single Jakarta Persistence entity as follows:


    ```

    @Entity

    public class Message {

    @Id @GeneratedValue(strategy=IDENTITY)

    private Long id;

    @Lob @Column(nullable = false)

    private @NotNull String text;

    @ManyToOne

    private Message replyTo;

    @OneToMany(mappedBy = "replyTo")

    private List replies = Collections.emptyList();

    // Add/generate remaining getters and setters.

    }

    ```


    Note that the `replyTo` property represents the parent message which the current
    message is a reply to and that the `replies` property represents all replies to
    the current message. The tree structure can then be queried as follows in a `MessageService`:


    ```

    public List tree() {

    return entityManager.createQuery(

    "SELECT DISTINCT m FROM Message m"

    + " LEFT JOIN FETCH m.replies r"

    + " ORDER BY m.id ASC", Message.class)

    .getResultList().stream()

    .filter(m -> m.getReplyTo() == null)

    .collect(toList());

    }

    ```


    Note that the filtering of the result list afterward is at first glance inefficient,
    but in reality, every single message is retrieved only once and simply referenced
    in the `replies` property.


    Now, you’d intuitively implement the `<t:message>` composite component as something
    like the following:


    ```


    #{cc.attrs.value.text}


    ```


