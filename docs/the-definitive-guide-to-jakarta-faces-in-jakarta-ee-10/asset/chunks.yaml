    \n```\n...\n...\n...\n```\n\n这样，Jakarta Faces将不会创建任何视图状态，并且`jakarta.faces.ViewState`隐藏输入字段将获得一个固定值“`stateless`”。请注意，这会影响整个视图，并且无法仅为特定表单切换此设置。Jakarta\
