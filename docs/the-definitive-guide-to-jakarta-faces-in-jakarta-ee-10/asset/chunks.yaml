  trans: '

    设置认证机制

    在定义安全约束之后，我们需要设置调用者如何进行身份验证。负责与调用者交互（即以特定方式向调用者索取凭证）的构件被称为“认证机制”。Jakarta EE 提供了多种现成的认证机制。Servlet
    规范提供了四种，即 `FORM`、`BASIC`、`DIGEST` 和 `CERT`，而 Jakarta EE Security 也提供了 `FORM` 和
    `BASIC`（区别在于它们对应的是 CDI bean），同时还提供了一种名为“自定义 `FORM`”的 `FORM` 变体。

    `FORM` 和自定义 `FORM` 都适用于交互式 Web 应用程序，例如我们主要使用 Jakarta Faces 构建的那些应用。与 `BASIC` 不同，`FORM`
    认证机制会回调应用程序，让其渲染向调用者索取凭证的表单，这也是这些机制名称的由来。

    两者之间的主要区别在于，机制在渲染表单后，要求应用程序如何继续所谓的认证对话。在 `FORM` 中，这是通过让调用者将填写好的表单提交到虚拟 URL `j_security_check`
    来实现的；而在自定义 `FORM` 中，这是通过编程方式调用注入的 `SecurityContext` 来完成的。不过，这个微小的差异对 Jakarta Faces
    来说却至关重要。在 Jakarta Faces 中，表单视图默认会提交到其请求来源的同一 URL，因此回发到单个机制强制要求的 URL 完全不自然。除此之外，在
    Jakarta Faces 中，我们经常需要在回发后运行服务器端代码；想想转换器、验证器以及发出 faces 消息的能力。如果必须回发到虚拟的非 faces
    的 `j_security_check` URL，我们实际上无法做到这些，但当我们能够从后台 bean 的动作方法中以编程方式继续认证对话时，这就相当可行了。

    我们将首先向您展示如何配置 Web 应用程序以使用自定义 `FORM` 认证机制。稍后，我们将解释如何实际使用 Jakarta Faces 来满足该机制对应用程序施加的要求。


    Jakarta EE Security 提供的所有认证机制都通过其自身的 `AuthenticationMechanismDefinition` 注解进行安装和配置。该注解告诉容器要安装哪种类型的认证机制以及使用何种配置。该注解可以放置在类路径上的几乎所有类上。从逻辑上讲，它与
    `@FacesConfig` 注解配合得很好。以下是一个示例：


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    这里一个可能有点不幸的要求是，必须指定 `errorPage` 属性并将其设置为空字符串。这是必要的，因为 `@LoginToContinue` 元素对于实际的错误页面有一个默认值。在
    Jakarta Faces 中，我们很少使用显式的错误页面来显示错误，而是通过 faces 消息在原始页面上重新显示错误信息。

    请注意，当前版本的 Jakarta EE Security 只允许同时激活一个认证机制。从技术上讲，当容器遇到 `@CustomFormAuthenticationMechanismDefinition`
    注解时，它会在系统中添加一个类型为 `HttpAuthenticationMechanism` 的已启用 CDI bean。了解这一点很重要，因为它是一个常规的
    CDI bean，意味着我们可以注入它、装饰它、拦截它，并且基本上可以对它执行我们通常对 CDI bean 能做的所有操作。

    `loginToContinue` 属性用于配置当调用者试图访问受保护视图时容器转发到的视图。这被称为“容器发起的认证”；容器启动认证对话，而不是应用程序。


    请注意，默认是*转发*到登录页面，这意味着如果调用者试图访问 `https://example.com/foo.xhtml`，并且 `/foo.xhtml`
    是受保护的，调用者仍然会在地址栏中看到 `/foo.xhtml`，而不是 `/login.xhtml`。然而，回发目标是 `/login.xhtml`，因此在输入凭证后，调用者会在地址栏中看到这个地址。或者，我们可以配置
    `loginToContinue` 属性使用重定向。


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    useForwardToLogin = false,

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    设置身份存储

    在声明了安全约束并设置了想要用于身份验证的机制之后，还剩下最后一块拼图：设置包含调用者数据（如凭证、姓名和角色）的构件。在 Jakarta EE Security
    中，这个构件被称为身份存储。

    Jakarta EE 提供了两种现成的身份存储：一种用于连接数据库，另一种用于连接 LDAP（轻量级目录访问协议）。Jakarta EE Security
    参考实现（Soteria）还附带了一个嵌入式身份存储。大多数应用服务器会提供它们自己的额外身份存储，这些通常是在应用程序外部配置的（例如，通过管理控制台、CLI
    或存储在服务器内部的 XML 配置文件）。

    设置和配置 Jakarta EE Security 提供的身份存储以及参考实现提供的身份存储，其方式与认证机制类似：通过 `IdentityStoreAnnotation`。就像认证机制版本一样，这会导致容器在系统中添加一个已启用的
    CDI bean，这次是实现 `IdentityStore` 接口的 bean。


    以下示例与我们之前对认证机制的定义一起展示：


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    useForwardToLogin = false,

    errorPage = ""

    )

    )

    @EmbeddedIdentityStoreDefinition({

    @Credentials(

    callerName = "admin@example.com",

    password = "secret1",

    groups = { "VIEW_USER_PAGES", "VIEW_ADMIN_PAGES" }

    ),

    @Credentials(

    callerName = "user@example.com",

    password = "secret2",

    groups = { "VIEW_USER_PAGES" })

    )

    })

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```

    '
- fmt: '# Identity Stores


    The aforementioned causes an embedded (in-memory) store to be created, with two
    callers (users), the first one being in the groups “`VIEW_USER_PAGES`” and “`VIEW_ADMIN_PAGES`”
    and the second one only in the group “`VIEW_USER_PAGES`”. The authentication mechanism
    will use this identity store to validate that the credentials (caller name and
    password) match and, if they do, to get the correct groups from the identity store.


    The observant reader may notice that the terminology has changed. Before, we were
    talking about “roles,” while all of a sudden this has changed to “groups.” Is
    this a mistake? Well, not really. Groups and roles are subtly different. Both
    are just opaque strings to the container, but groups can be *optionally* mapped
    to roles. We won’t elaborate on this process further here, but suffice it to say
    that by default, Jakarta EE mandates a so-called 1:1 group-to-role mapping, which
    simply means groups and roles are the same.


    To better understand identity stores, we’ll give two more examples here. For the
    first example, we’ll look at one of the identity stores that’s provided by the
    Jakarta EE Security API—the database identity store. This store is activated and
    configured using the `@DatabaseIdentityStoreDefinition` annotation. The three
    most important attributes to configure are the data source (which represents the
    SQL database), the SQL query to obtain the (hashed!) password given a caller name,
    and the SQL query to identify which groups a caller is in given the caller name.
    The following gives an example:


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @DatabaseIdentityStoreDefinition(

    dataSourceLookup = "java:app/MyDataSource",

    callerQuery = "SELECT password FROM caller WHERE name = ?",

    groupsQuery = "SELECT name FROM groups WHERE caller_name = ?"

    )

    @DataSourceDefinition(

    name = "java:app/MyDataSource",

    className = "org.h2.jdbcx.JdbcDataSource",

    url="jdbc:h2:~/test;MODE=LEGACY;DB_CLOSE_ON_EXIT=FALSE"

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    In this example, a data source is defined for the H2 database using the `org.h2.jdbcx.JdbcDataSource`
    driver. Naturally, this can be done in a similar way for any other database that
    has a JDBC driver. Alternatively, the data source can be defined externally to
    the application. The caller query that we used is “`select password from caller
    where name = ?`”, which means we assume a table with at least two columns—one
    holding the caller name and the other the hashed password. Such table could be
    created by, for example, the following SQL statement:


    ```

    CREATE TABLE caller(

    name VARCHAR(32) PRIMARY KEY,

    password VARCHAR(255)

    )

    ```


    The query that we used for the groups is “`select name from groups where caller_name
    = ?`”, which assumes a table with at least two columns—the caller name and the
    group name, with one row for each group the caller is in. Such a table could be
    created by, for example, the following SQL statement:


    ```

    CREATE TABLE caller_groups(

    caller_name VARCHAR(32),

    name VARCHAR(32)

    )

    ```


    When populating the caller table, it must be noted that a default hash algorithm
    is assumed for the password column, namely, `PBKDF2WithHmacSHA256`. This algorithm
    can (should) be customized by setting the number of iterations, the key size,
    and the salt size.


    Instead of using an identity store that’s provided by the Jakarta EE Security
    API, we also have the option of providing our own custom one. A common use case
    for that is using the application’s own services to load the application-specific
    user data. The following shows an example of such an identity store:


    ```

    @ApplicationScoped

    public class UserServiceIdentityStore implements IdentityStore {

    @Inject

    private UserService userService;

    @Override

    public CredentialValidationResult validate(Credential credential) {

    UsernamePasswordCredential login =

    (UserNamePasswordCredential) credential;

    String email = login.getCaller();

    String password = login.getPasswordAsString();

    Optional optionalUser =

    userService.findByEmailAndPassword(email, password);

    if (optionalUser.isPresent()) {

    User user = optionalUser.get();

    return new CredentialValidationResult(

    user.getEmail(),

    user.getRolesAsStrings()

    );

    }

    else {

    return CredentialValidationResult.INVALID_RESULT;

    }

    }

    }

    ```


    There is no specific registration needed; the previously given class simply needs
    to be present in the application (be on its classpath). With such custom identity
    store present, the `ApplicationConfig` class therefore doesn’t need any config
    for the identity store.


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    The `UserServiceIdentityStore` as given before delegates most of the work to a
    `UserService`, which would be responsible for handling `User` entities in the
    application. Fully discussing such service is outside the scope of this book,
    but we can imagine it could use, for example, Jakarta Persistence to persist and
    load `User` entities. Our custom identity store uses the service to try to find
    a `User` based on the username and the password that’s being passed in via the
    credentials. If a `User` instance is returned, it means the name referred to an
    existing user, and the password was the correct one. In that case, the identity
    store in turn returns `CredentialValidationResult` that does two things: it indicates
    that authentication was successful, and it provides the container with the data
    that will eventually be used to set the authenticated identity for the current
    request. If the service couldn’t find the user, then either the name or the password
    was wrong. In that case, the store returns `INVALID_RESULT` to indicate that authentication
    was not successful.


    # Providing Our Custom Jakarta Faces Code


    In the preceding sections, we first defined our security constraints (which views
    are protected), then we set up the authentication mechanism (how do our callers
    interact with our application in order to authenticate), and finally we set up
    the identity store (where the caller data resides). It’s now time to plug our
    own custom code into the authentication process. This primarily happens by providing
    the view that the authentication mechanism directs to when it needs to collect
    the caller’s credentials (email and password in this case).


    The login page can be kept relatively simple—a standard form page, with two inputs
    bound to our backing bean, and a button to submit.


    ```

    Log In


    Log In

    ```


    The preceding page is a totally normal Jakarta Faces view. This specifically means
    that contrary to classical HTML `<form method="post" action="j_security_check">`
    of `FORM` authentication, the authentication mechanism does not monitor the postback
    URL in any way and therefore there aren’t any constraints being placed on the
    input elements that collect the credentials.


    Instead, the Jakarta Faces backing bean has to collect these credentials and then
    programmatically pass these along and signal the authentication mechanism to continue
    the dialog. Before passing the credentials along, Jakarta Faces is free to do
    its own validation and engage in its own dialog with the caller without the authentication
    mechanism having to be involved with this. Note that the command button explicitly
    doesn’t use Ajax to submit. You can do so, but then the average web browser won’t
    suggest the end user to remember the login credentials on its behalf.'
  raw: 'The aforementioned causes an embedded (in-memory) store to be

    created, with two callers (users), the first one being in the groups

    “`VIEW_USER_PAGES`” and

    “`VIEW_ADMIN_PAGES`” and

    the second one only in the group “`VIEW_USER_PAGES`”. The

    authentication mechanism will use this identity store to validate that

    the credentials (caller name and password) match and, if they do, to get

    the correct groups from the identity store.

    The observant reader may notice that the terminology has changed. Before, we

    were talking about “roles,” while all of a sudden this has changed to

    “groups.” Is this a mistake? Well, not really. Groups and roles are

    subtly different. Both are just opaque strings to the container, but

    groups can be *optionally* mapped to roles. We won’t elaborate on

    this process further here, but suffice it to say that by default,

    Jakarta EE mandates a so-called 1:1 group-to-role mapping, which simply

    means groups and roles are the same.


    To better understand identity stores, we’ll give two more examples here.

    For the first example, we’ll look at one of the identity stores that’s

    provided by the Jakarta EE Security API—the database identity store.

    This store is activated and configured using the `@DatabaseIdentityStoreDefinition`

    annotation

    *.* The three most important attributes to configure are

    the data source (which represents the SQL database), the SQL query to

    obtain the (hashed!) password given a caller name, and the SQL query to

    identify which groups a caller is in given the caller name. The

    following gives an example:


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @DatabaseIdentityStoreDefinition(

    dataSourceLookup = "java:app/MyDataSource",

    callerQuery = "SELECT password FROM caller WHERE name = ?",

    groupsQuery = "SELECT name FROM groups WHERE caller_name = ?"

    )

    @DataSourceDefinition(

    name = "java:app/MyDataSource",

    className = "org.h2.jdbcx.JdbcDataSource",

    url="jdbc:h2:~/test;MODE=LEGACY;DB_CLOSE_ON_EXIT=FALSE"

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    In this example, a data source is defined for the H2 database using the

    `org.h2.jdbcx.JdbcDataSource`

    driver .

    Naturally, this can be done in a similar way for any other database that

    has a JDBC driver. Alternatively, the data source can be defined

    externally to the application. The caller query that we used is “`select password
    from caller where name = ?`”, which means we assume a table with at least two

    columns—one holding the caller name and the other the hashed password.

    Such table could be created by, for example, the following SQL

    statement:


    ```

    CREATE TABLE caller(

    name VARCHAR(32) PRIMARY KEY,

    password VARCHAR(255)

    )

    ```


    The query that we used for the groups is “`select name from groups where caller_name
    = ?`”, which assumes a table with at least two

    columns—the caller name and the group name, with one row for each group

    the caller is in. Such a table could be created by, for example, the

    following SQL statement:


    ```

    CREATE TABLE caller_groups(

    caller_name VARCHAR(32),

    name VARCHAR(32)

    )

    ```


    When populating the caller table, it must be noted that a default

    hash algorithm is assumed for the password column, namely, `PBKDF2WithHmacSHA256`.

    This algorithm can (should) be customized by setting the number of

    iterations, the key size, and the salt size.

    Instead of using an identity store that’s provided by the Jakarta EE

    Security API, we also have the option of providing our own custom one. A common
    use case

    for that is using the application’s own services to load the

    application-specific user data.


    The following shows an example of such an identity store:


    ```

    @ApplicationScoped

    public class UserServiceIdentityStore implements IdentityStore {

    @Inject

    private UserService userService;

    @Override

    public CredentialValidationResult validate(Credential credential) {

    UsernamePasswordCredential login =

    (UserNamePasswordCredential) credential;

    String email = login.getCaller();

    String password = login.getPasswordAsString();

    Optional optionalUser =

    userService.findByEmailAndPassword(email, password);

    if (optionalUser.isPresent()) {

    User user = optionalUser.get();

    return new CredentialValidationResult(

    user.getEmail(),

    user.getRolesAsStrings()

    );

    }

    else {

    return CredentialValidationResult.INVALID_RESULT;

    }

    }

    }

    ```


    There is no specific registration needed; the previously given class

    simply needs to be present in the application (be on its classpath).

    With such custom identity store present, the `ApplicationConfig`

    class  therefore

    doesn’t need any config for the identity store.


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    The `UserServiceIdentityStore`

    as given before delegates most of the work to a `UserService`, which

    would be responsible for handling `User` entities in the

    application. Fully discussing such service is outside the scope of this

    book, but we can imagine it could use, for example, Jakarta Persistence

    to persist and load `User` entities. Our

    custom identity store uses the service to try to find a `User` based on the

    username and the password that’s being passed in via the credentials. If

    a `User` instance

    is returned, it means the name referred to an existing user, and the

    password was the correct one. In that case, the identity store in turn

    returns `CredentialValidationResult`

    that does two things: it indicates that authentication was successful,

    and it provides the container with the data that will eventually be used

    to set the authenticated identity for the current request. If the

    service couldn’t find the user, then either the name or the password was

    wrong. In that case, the store returns `INVALID_RESULT` to

    indicate that authentication was not successful.


    Providing Our Custom Jakarta Faces Code

    In the preceding sections, we first

    defined our security constraints (which views are protected), then we

    set up the authentication mechanism (how do our callers interact with

    our application in order to authenticate), and finally we set up the

    identity store (where the caller data resides).

    It’s now time to plug our own custom code into the authentication

    process. This primarily happens by providing the view that the

    authentication mechanism directs to when it needs to collect the caller’s

    credentials (email and password in this case).


    The login page can be kept relatively simple—a standard form page, with

    two inputs bound to our backing bean, and a button to submit.


    ```


    Log In


    Log In


    ```


    The preceding page is a totally normal Jakarta Faces view. This

    specifically means that contrary to classical HTML `<form method="post" action="j_security_check">`
    of `FORM` authentication,

    the authentication mechanism does not monitor the postback URL in any

    way and therefore there aren’t any constraints being placed on the input

    elements that collect the credentials.

    Instead, the Jakarta Faces backing bean has to collect these

    credentials and then programmatically pass

    these along and signal the authentication mechanism to continue the

    dialog. Before passing the credentials along, Jakarta Faces is free to

    do its own validation and engage in its own dialog with the caller

    without the authentication mechanism having to be involved with this.

    Note that the command button explicitly doesn’t use Ajax to submit. You

    can do so, but then the average web browser won’t suggest the end user

    to remember the login credentials on its behalf.'
  trans: '

    上述操作会创建一个嵌入式（内存中）的身份存储，其中包含两个调用者（用户）：第一个用户属于“`VIEW_USER_PAGES`”和“`VIEW_ADMIN_PAGES`”组，第二个用户仅属于“`VIEW_USER_PAGES`”组。身份验证机制将使用此身份存储来验证凭证（调用者名称和密码）是否匹配，如果匹配，则从身份存储中获取正确的组。


    细心的读者可能会注意到术语发生了变化。之前我们讨论的是“角色”，而突然之间变成了“组”。这是错误吗？其实不然。组和角色之间存在细微差别。对于容器而言，两者都只是不透明的字符串，但组可以*选择性地*映射到角色。我们在此不进一步详述此过程，但只需说明，默认情况下，Jakarta
    EE 强制要求所谓的 1:1 组到角色映射，这基本上意味着组和角色是相同的。


    为了更好地理解身份存储，我们在此再举两个例子。第一个例子，我们将介绍 Jakarta EE Security API 提供的身份存储之一——数据库身份存储。此存储通过
    `@DatabaseIdentityStoreDefinition` 注解激活和配置*。*需要配置的三个最重要的属性是：数据源（代表 SQL 数据库）、根据调用者名称获取（哈希后的！）密码的
    SQL 查询，以及根据调用者名称识别调用者所属组的 SQL 查询。示例如下：


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @DatabaseIdentityStoreDefinition(

    dataSourceLookup = "java:app/MyDataSource",

    callerQuery = "SELECT password FROM caller WHERE name = ?",

    groupsQuery = "SELECT name FROM groups WHERE caller_name = ?"

    )

    @DataSourceDefinition(

    name = "java:app/MyDataSource",

    className = "org.h2.jdbcx.JdbcDataSource",

    url="jdbc:h2:~/test;MODE=LEGACY;DB_CLOSE_ON_EXIT=FALSE"

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    在此示例中，使用 `org.h2.jdbcx.JdbcDataSource` 驱动程序为 H2 数据库定义了数据源。当然，对于任何其他拥有 JDBC 驱动程序的数据库，都可以类似地完成此操作。或者，也可以在应用程序外部定义数据源。我们使用的调用者查询是“`select
    password from caller where name = ?`”，这意味着我们假设一个表至少包含两列——一列保存调用者名称，另一列保存哈希后的密码。例如，可以通过以下
    SQL 语句创建这样的表：


    ```

    CREATE TABLE caller(

    name VARCHAR(32) PRIMARY KEY,

    password VARCHAR(255)

    )

    ```


    我们用于组的查询是“`select name from groups where caller_name = ?`”，这假设一个表至少包含两列——调用者名称和组名称，调用者所属的每个组对应一行。例如，可以通过以下
    SQL 语句创建这样的表：


    ```

    CREATE TABLE caller_groups(

    caller_name VARCHAR(32),

    name VARCHAR(32)

    )

    ```


    在填充调用者表时，必须注意密码列默认使用哈希算法，即 `PBKDF2WithHmacSHA256`。可以通过设置迭代次数、密钥大小和盐值大小来（应该）自定义此算法。

    除了使用 Jakarta EE Security API 提供的身份存储，我们还可以选择提供自己的自定义身份存储。一个常见的用例是使用应用程序自身的服务来加载特定于应用程序的用户数据。


    以下展示了此类身份存储的示例：


    ```

    @ApplicationScoped

    public class UserServiceIdentityStore implements IdentityStore {

    @Inject

    private UserService userService;

    @Override

    public CredentialValidationResult validate(Credential credential) {

    UsernamePasswordCredential login =

    (UsernamePasswordCredential) credential;

    String email = login.getCaller();

    String password = login.getPasswordAsString();

    Optional optionalUser =

    userService.findByEmailAndPassword(email, password);

    if (optionalUser.isPresent()) {

    User user = optionalUser.get();

    return new CredentialValidationResult(

    user.getEmail(),

    user.getRolesAsStrings()

    );

    }

    else {

    return CredentialValidationResult.INVALID_RESULT;

    }

    }

    }

    ```


    无需特定注册；只需将前面给出的类存在于应用程序中（在其类路径上）。有了这样的自定义身份存储，`ApplicationConfig` 类因此就不需要任何身份存储的配置了。


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

    // ...

    }

    ```


    前面给出的 `UserServiceIdentityStore` 将大部分工作委托给 `UserService`，后者负责处理应用程序中的 `User` 实体。全面讨论此类服务超出了本书的范围，但我们可以想象它可以使用，例如，Jakarta
    Persistence 来持久化和加载 `User` 实体。我们的自定义身份存储使用该服务，尝试根据通过凭证传入的用户名和密码查找 `User`。如果返回了
    `User` 实例，则表示该名称对应一个现有用户，并且密码正确。在这种情况下，身份存储会返回 `CredentialValidationResult`，它执行两项操作：指示身份验证成功，并向容器提供最终将用于为当前请求设置已验证身份的数据。如果服务找不到该用户，则说明用户名或密码错误。在这种情况下，存储返回
    `INVALID_RESULT` 以指示身份验证未成功。


    提供我们自定义的 Jakarta Faces 代码

    在前面的章节中，我们首先定义了安全约束（哪些视图受到保护），然后设置了身份验证机制（调用者如何与我们的应用程序交互以进行身份验证），最后设置了身份存储（调用者数据所在的位置）。

    现在是时候将我们自己的自定义代码插入到身份验证过程中了。这主要通过提供身份验证机制在需要收集调用者凭证（本例中为电子邮件和密码）时重定向到的视图来实现。


    登录页面可以保持相对简单——一个标准表单页面，包含两个绑定到我们后台 bean 的输入字段，以及一个用于提交的按钮。


    ```


    登录


    登录


    ```


    前面的页面是一个完全正常的 Jakarta Faces 视图。这特别意味着，与 `FORM` 身份验证中经典的 HTML `<form method="post"
    action="j_security_check">` 不同，身份验证机制不会以任何方式监视回发 URL，因此对收集凭证的输入元素没有任何限制。

    相反，Jakarta Faces 后台 bean 必须收集这些凭证，然后以编程方式传递它们，并通知身份验证机制继续对话。在传递凭证之前，Jakarta Faces
    可以自由地进行自己的验证，并与调用者进行自己的对话，而无需身份验证机制参与其中。请注意，命令按钮明确不使用 Ajax 提交。您也可以使用 Ajax，但那样普通的
    Web 浏览器就不会提示最终用户记住登录凭据了。

