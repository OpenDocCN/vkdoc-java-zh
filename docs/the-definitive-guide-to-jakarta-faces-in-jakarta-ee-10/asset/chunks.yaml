  trans: '

    也就是说，在 Java 端创建受管 bean，或在 Facelets 端声明自定义 EL 变量时（例如 `<h:dataTable var="foo">`、`<ui:repeat
    var="foo">` 或 `<c:set var="foo">`），你必须绝对确保不会显式或隐式地选择与前面列出的隐式 EL 对象冲突的受管 bean 名称或
    EL 变量名。这是因为隐式 EL 对象在 EL 解析中的优先级高于用户定义的名称。因此，例如，以下构造不会按你预期的方式工作：


    ```

    #{param}


    ```


    它默认会在每次迭代时直接打印“`{}`”，这基本上就是空 `Map` 的默认 `Map#toString()` 格式。当你使用类似 `?foo=bar` 的查询字符串重新打开同一页面时，它会在每次迭代时直接打印“`{foo=bar}`”。你最好将
    `var="param"` 重命名为其他名称，例如 `var="parameter"`。


    脚注


    8.  Backing Beans


    “Backing bean”是 Jakarta Faces 特有的概念。它代表最终用作“受管 bean”的单一 JavaBean 类，负责在 Jakarta
    Faces 页面中提供数据、操作和/或组件。


    模型、视图还是控制器？

    Jakarta Faces 是一个 MVC（模型-视图-控制器）框架。MVC 是一种广泛应用于软件应用程序的架构设计模式，其根源在于桌面应用程序开发。^(⁶⁷)

    从 Jakarta Faces 框架的角度来看，模型由 backing bean 表示；视图由组件树表示，而组件树通常又在 Facelets 文件中定义；控制器由
    Jakarta Faces 已提供的 `FacesServlet` 表示。然而，从 Jakarta EE 应用服务器的角度来看，模型由服务层表示（该服务层通常又使用
    Jakarta Persistence 实体），视图由你所有基于 Jakarta Faces 的代码表示，而控制器是 `FacesServlet`。从 Jakarta
    Faces 开发者的角度来看，模型由服务层表示，视图由 Facelets 文件表示，而控制器由 backing bean 表示。

    因此，backing bean 类可以是模型、视图或控制器，具体取决于你的视角，而服务层始终是模型，Facelets 文件始终是视图，`FacesServlet`
    始终是控制器。请注意，在此上下文中，“Jakarta Faces 开发者”就是你，你正在为 Jakarta EE 应用服务器使用 Jakarta Faces
    框架开发 Web 应用程序。


    图 8-1 说明了 backing bean 在 Jakarta Faces 的 MVC 范式中的位置。这是一个维恩图，其中控制器和视图的交集由 Jakarta
    Faces 组件树表示，该组件树可以通过组件的 `binding` 属性绑定到 backing bean。视图和模型的交集由 EL 值表达式的属性 getter
    和 setter 表示，这些 getter 和 setter 可以通过组件的 `value` 属性绑定到 backing bean。控制器和模型的交集由 EL
    方法表达式的操作方法调用表示，这些调用可以通过组件的 `action` 属性绑定到 backing bean。最后，所有交集的交集由 backing bean
    本身表示。


    ![](img/454457_2_En_8_Fig1_HTML.jpg)


    图 8-1

    Backing bean 在 Jakarta Faces MVC 范式中的位置


    因此，在这个 MVC 范式中，backing bean 占据了一个相当独特的位置。请注意，backing bean 不一定需要由单个类表示。它甚至可以由多个类表示，每个类都有自己的受管
    bean 作用域，就像视图可以由多个 Facelets 文件表示，模型可以由多个 Jakarta Enterprise Beans 和 Jakarta Persistence
    类表示一样。


    回到 Jakarta Faces 开发者的视角，我们甚至可以更进一步，根据你如何编写 backing bean 类来考虑它是模型还是控制器。以下是一种方式：


    ```

    @Named @RequestScoped @Stateful

    public class ProductBacking {

    private String productName;

    private String productDescription;

    @Inject

    private ActiveUser activeUser;

    @PersistenceContext

    private EntityManager entityManager;

    public void save() {

    Product product = new Product();

    product.setName(productName);

    product.setDescription(productDescription);

    product.setCreatedBy(activeUser.get());

    entityManager.persist(product);

    FacesContext.getCurrentInstance().addMessage(null,

    new FacesMessage("Product created!"));

    }

    // 为产品名称和描述添加/生成 getter 和 setter

    }

    ```


    在这种相当原始的方式中，实体的属性基本上在 backing bean 类中重复了，并且业务逻辑紧密耦合在 backing bean 类中。换句话说，backing
    bean 类错误地接管了真实模型的职责。有人会误将这样的 backing bean 类视为唯一的模型。当我们消除这种重复和不可重用性时，我们找到了另一种方式：


    ```

    @Named @RequestScoped

    public class ProductBacking {

    private Product product = new Product();

    @Inject

    private ProductService productService;

    public void save() {

    productService.create(product);

    FacesContext.getCurrentInstance().addMessage(null,

    new FacesMessage("Product created!"));

    }

    public Product getProduct() {

    return product;

    }

    }

    ```


    其中 `ProductService` 如下所示：


    ```

    @Stateless

    public class ProductService {

    @PersistenceContext

    private EntityManager entityManager;

    @Inject

    private ActiveUser activeUser;

    public Long create(Product product) {

    product.setCreatedBy(activeUser.get());

    entityManager.persist(product);

    return product.getId();

    }

    }

    ```


    这实际上是编写 backing bean 的正确方式。与第一种方式相比，你可以认为，从 Jakarta Faces 开发者的角度来看，backing bean
    已成为真实模型的控制器。从 Jakarta Faces 开发者的角度来看，backing bean 作为控制器并没有错，但从 Jakarta Faces 框架的角度来看，这实际上并不正确，因为
    `FacesServlet` 才是真正的控制器。`FacesServlet` 将 backing bean 视为模型，因为 `FacesServlet` 无法直接访问真实模型（即服务层）。作为
    Jakarta Faces 开发者，你当然可以在自己的上下文中将 backing bean 视为控制器，因为你可以轻松忽略 `FacesServlet` 的所有职责，在编写
    Jakarta Faces 代码时无需担心它的工作。在编写 Jakarta Faces 代码时，你只需要关心视图、模型和 backing bean。其余工作由
    Jakarta Faces 透明地完成。


    受管 Bean


    “Backing bean”和“受管 bean”之间的概念差异可以通过以下在 bean 管理设施底层执行的代码行来表示：


    ```

    BackingBeanClass managedBeanInstance = new BackingBeanClass();

    someContext.put("managedBeanName", managedBeanInstance, someScope);

    ```

