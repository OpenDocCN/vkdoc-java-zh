    \n### 15. Extensions\n\nIf there is one single element or virtue of Jakarta Faces\
    \ to which we can attribute its lasting for so long, it’s probably its ability\
    \ to be extended in a large variety of ways. From the onset, Jakarta Faces made\
    \ it possible to have most of its core elements replaced, decorated, or augmented.\
    \ This gave rise to a large number of extension libraries and projects. In the\
    \ very early days, these were A4J (Ajax4JSF), Tomahawk, RichFaces, the stand-alone\
    \ Facelets project, PrettyFaces, and many, many more. A4J was merged into RichFaces,\
    \ and RichFaces itself was eventually sunset in 2016. Facelets was incorporated\
    \ into Jakarta Faces itself, while PrettyFaces became part of the Rewrite framework.\
    \ These days well-known and active extension libraries are PrimeFaces, OmniFaces,\
    \ and BootsFaces, among others. While individual libraries have come and gone,\
    \ the main constant is the extensibility of Jakarta Faces from its first days\
    \ until the present.\n\nIt’s sometimes said that all those libraries address defects\
    \ or omissions in Jakarta Faces, but this is not entirely accurate. In fact, Jakarta\
    \ Faces was explicitly designed to make such extensions possible and therefore\
    \ to allow, even stimulate, such extension libraries to appear. For instance,\
    \ a contemporary peer technology of Jakarta Faces, Jakarta Enterprise Beans (formerly\
    \ known as Jakarta Enterprise Beans, Enterprise JavaBeans), had few to no extension\
    \ points, and thus, despite its many shortcomings, we never saw much of an ecosystem\
    \ flourish around it.\n\n### Extension Types\n\nThere are a couple of different\
    \ ways by which to use the various extension points in Jakarta Faces. A major\
    \ distinction is between the “classical” approach and the “CDI-centric approach.”\
    \ In the latter approach, there’s very little to nothing that Jakarta Faces has\
    \ to explicitly support extensibility, as CDI has a number of mechanisms built\
    \ in to support extending or replacing CDI artifacts. Table 8-1 in Chapter [8](#454457_2_En_8_Chapter.xhtml)\
    \ showed these artifacts.\n\n### Extending CDI Artifacts\n\nOne of the ways CDI\
    \ augments or replaces a type fully is to provide an alternative producer. We\
    \ already saw this technique being used in Chapter [13](#454457_2_En_13_Chapter.xhtml),\
    \ albeit for a slightly different use case. The easiest way is if you need to\
    \ fully replace the type. If augmenting is needed, some code is necessary to obtain\
    \ the previous type, which, with the current version of CDI (4.0), is slightly\
    \ verbose.\n\nThe following shows an example where we replace the request parameter\
    \ map with a new map that has all the values of the original map, plus an additional\
    \ value that we add ourselves:\n\n```java\n@Dependent @Alternative @Priority(APPLICATION)\n\
    public class RequestParameterMapProducer {\n    @Produces @RequestScoped @RequestParameterMap\n\
    \    public Map producer(BeanManager beanManager) {\n        Map previousMap =\
    \ getPreviousMap(beanManager);\n        Map newMap = new HashMap(previousMap);\n\
    \        newMap.put(\"test\", \"myTestValue\");\n        return newMap;\n    }\n\
    }\n```\n\nThe `getPreviousMap()` method is, as mentioned, somewhat verbose. It’s\
    \ defined as follows:\n\n```java\nprivate Map getPreviousMap(BeanManager beanManager)\
    \ {\n    class RequestParameterMapAnnotationLiteral\n            extends AnnotationLiteral\n\
    \            implements RequestParameterMap {\n        private static final long\
    \ serialVersionUID = 1L;\n    }\n\n    Type MAP_TYPE = new ParameterizedType()\
    \ {\n        @Override\n        public Type getRawType() {\n            return\
    \ Map.class;\n        }\n\n        @Override\n        public Type[] getActualTypeArguments()\
    \ {\n            return new Type[] {String.class, String.class};\n        }\n\n\
    \        @Override\n        public Type getOwnerType() {\n            return null;\n\
    \        }\n    };\n\n    return (Map) beanManager\n            .getReference(beanManager\n\
    \                    .resolve(beanManager\n                            .getBeans(MAP_TYPE,\
    \ new RequestParameterMapAnnotationLiteral())\n                            .stream()\n\
    \                            .filter(bean -> bean\n                          \
