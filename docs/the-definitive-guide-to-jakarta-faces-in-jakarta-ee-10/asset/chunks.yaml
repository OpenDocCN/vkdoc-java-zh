- fmt: "# 排版后的文本\n\nIn the long term, such a change is confusing and brittle as those\
    \ characters are also allowed in the ID attribute itself. Jakarta Faces does not\
    \ validate the component ID against the currently configured naming container\
    \ separator character, and thus, it may easily slip through and cause trouble\
    \ while referencing such a component in a search expression. It’s therefore the\
    \ best to rely on the default of “`:`”.\n\nComing back to referencing a specific\
    \ `UIInput` component within a naming container from `<h:outputLabel>` on, in\
    \ the example composite component `<t:inputLocalTime>` as demonstrated in the\
    \ section “Composite Components” in Chapter [7](#454457_2_En_7_Chapter.xhtml),\
    \ the hour drop-down component has an ID of “`hour`”. Thus, for `<h:outputLabel>`,\
    \ when using the default naming container separator character, the relative local\
    \ ID of the hour drop-down inside the composite component is “`time:hour`”.\n\n\
    Note that this is not necessary for `<h:message>` as faces messages are under\
    \ the hood already added to the faces context with the client ID of the composite\
    \ component itself.\n\nUsing relative local IDs also works within the context\
    \ of `<h:column>` of `<h:dataTable>`. It’s then interpreted in the context of\
    \ the currently iterated row, even when the target component is sitting in another\
    \ column. The following example demonstrates that:\n\n```\n...\nCountry\nCity\n\
    ...\n```\n\nUnder the hood, relative local IDs are resolved using the algorithm\
    \ as described in the `UIComponent#findComponent()` API.^([(103)](#fn103)) This\
    \ means that you can also resolve them programmatically. You only need to ensure\
    \ that the `findComponent()` method is invoked on the correct base component,\
    \ and thus not on, for example, the `UIViewRoot`.\n\n## Absolute Hierarchical\
    \ IDs\n\nIn case the target component is not within the same naming container\
    \ parent as the current component, then you need an absolute hierarchical ID instead\
    \ of a local relative ID. The key difference is that an absolute hierarchical\
    \ ID starts with the naming container separator character. It will then search\
    \ for the target component from the `UIViewRoot` on. Such construct is often used\
    \ in the `render` attribute of `<f:ajax>` when it needs to reference a component\
    \ that is not located inside the same form.\n\n```\n...\n...\n```\n\nA less common\
    \ use case where an absolute hierarchical ID is needed is when you need to reference\
    \ a component that is in turn nested in another naming container. For example,\
    \ when you want to update a `<h:message>` associated with a composite component\
    \ during a `<cc:clientBehavior>` event inside the composite component.\n\nYou\
    \ could argue that this is a bug or an oversight in the Jakarta Faces specification.\
    \ This is very true and should be worked on for a next version of Jakarta Faces.\
    \ Another yet less common use case is when you need to update a specific iteration\
    \ round of an iteration component, such as `<h:dataTable>` and `<ui:repeat>`.\n\
    \n```\n...\n...\n```\n\nNote that the iteration index is zero based as with normal\
    \ Java collections and arrays. Also note that you basically need to wrap the cell’s\
    \ content in another component in order to properly reference the cell’s content\
    \ and that you need to explicitly specify every column in order to update the\
    \ entire row, as demonstrated before. Updating the entire column is also possible,\
    \ but less convenient because you basically need to specify the search expression\
    \ for every single row. Fortunately, the `render` attribute can take an EL (Expression\
    \ Language) expression, and the EL stream API can be used to concatenate a bunch\
    \ of strings in the `:form:table:[i]:column` format depending on the amount of\
    \ items in the table.\n\n```\n' :form:list:' += bean.items.indexOf(i) += ':column2')\n\
    .reduce((l, r) -> (l += r)).get()}\">\n```\n\nAdmittedly, this is not the most\
    \ elegant approach. You’d better delegate to a custom function in an application-scoped\
    \ bean. It could look something like the following:\n\nwhereby the `#{ajax}` application-scoped\
    \ bean looks something like the following:\n\n```\n@Named @ApplicationScoped\n\
    public class Ajax {\n    public String columnIds(List list, String idTemplate)\
    \ {\n        return IntStream.range(0, list.size()).boxed()\n            .map(i\
    \ -> idTemplate.replace(\"::\", \":\" + i + \":\"))\n            .collect(Collectors.joining(\"\
    \ \"));\n    }\n}\n```\n\nThat’s already something better, but still boilerplate-ish.\
    \ If necessary, you can also programmatically add Ajax render IDs from a backing\
    \ bean on. You can use the `PartialViewContext#getRenderIds()`^([(104)](#fn104))\
    \ for this. Namely, the returned collection is mutable and only consulted during\
