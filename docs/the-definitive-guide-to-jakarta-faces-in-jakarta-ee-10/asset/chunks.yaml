  trans: '

    ### 关于 Jakarta EE


    Jakarta Faces 本身就是 Jakarta EE 的一部分。Jakarta EE 本质上是一个抽象规范，而所谓的应用服务器则是其具体实现。这些应用服务器的例子包括
    Eclipse GlassFish、Red Hat WildFly、Apache TomEE 和 IBM WebSphere Liberty。你可以在 Jakarta
    EE 兼容产品页面找到它们：[`https://jakarta.ee/compatibility/`](https://jakarta.ee/compatibility/)。正是这些应用服务器，开箱即用地提供了
    Jakarta Faces、Jakarta 表达式语言（EL）、Jakarta 标签（原名 Jakarta Tags）、Jakarta 上下文和依赖注入（CDI）、Jakarta
    企业 Bean（原名 Jakarta Enterprise Beans、Enterprise Java Beans）、Jakarta 持久化、Jakarta
    Servlet、Jakarta WebSocket、Jakarta JSON 处理以及许多其他 API（应用程序编程接口）。


    此外，还存在所谓的 Servlet 容器，它们基本上*只*开箱即用地提供 Jakarta Servlet、Jakarta Pages、Jakarta 表达式语言、Jakarta
    WebSocket 和 Jakarta Security，例如 Apache Tomcat 和 Eclipse Jetty。因此，在这样的 Servlet
    容器上手动安装和配置 Jakarta Faces、Jakarta 标签、Jakarta 上下文和依赖注入、Jakarta 企业 Bean、Jakarta 持久化、Jakarta
    JSON 处理和/或 Jakarta EE 平台中许多其他缺失的 API，需要额外的工作。对于 Jakarta 企业 Bean 来说，这甚至不是一件简单的事，因为它需要修改
    Servlet 容器的内部结构。顺便提一下，这正是 Apache TomEE 存在的原因。它是一个构建在精简版 Tomcat Servlet 容器引擎之上的
    Jakarta EE 应用服务器。


    因此，你不需要下载并安装整个“Jakarta EE”。基本上，下载任何一个你选择的 Jakarta EE 应用服务器就足够了。本书我们将选用 Red Hat
    WildFly。


    ## 安装 WildFly


    WildFly 是 Red Hat 的一个开源 Jakarta EE 应用服务器。你可以从 [`https://wildfly.org/downloads`](https://wildfly.org/downloads)
    下载它。请确保你选择的是“Jakarta EE 10 Full & Web Distribution”，而不是例如“Servlet-Only Distribution”或“Preview
    Distribution”，因为它们有其他用途。安装基本上就是将下载的文件解压并放到你的主文件夹中的某个位置。我们先把它放在那里，直到我们安装并运行 Eclipse，然后我们可以将
    WildFly 集成到 Eclipse 中，并让 Eclipse 管理 WildFly 应用服务器。


    ## 安装 Eclipse


    Eclipse 是一个用 Java 编写的开源 IDE。你可以从 [`https://eclipse.org`](https://eclipse.org)
    下载它。它基本上就像一个记事本，但拥有成千上万甚至数百万的额外功能，例如自动编译类文件、用它们构建 WAR（Web 应用程序归档）文件，并将其部署到应用服务器，而无需在命令控制台中手动操作
    `javac` 和其他工具。


    Eclipse 有多种版本，甚至有针对 C/C++ 和 PHP 的版本。由于我们将使用 Jakarta EE（企业版）进行开发，我们需要名为“Eclipse
    IDE for **Enterprise** Java and Web developers”的版本，重要的是名称中带有“Enterprise”的版本。没有它的版本不包含开发
    Jakarta EE Web 应用程序所需的插件。这是主下载页面：[`https://www.eclipse.org/downloads/packages/`](https://www.eclipse.org/downloads/packages/)。同样，安装基本上就是将下载的文件解压并放到你的主文件夹中的某个位置。


    在 Windows 和 Linux 中，你会在解压后的文件夹中找到 `eclipse.ini` 配置文件。在 MacOS 中，此配置文件位于 `Eclipse.app/Contents/Eclipse`。打开此文件进行编辑。我们想要增加分配给
    Eclipse 的内存。在 `eclipse.ini` 的底部，你会找到以下几行：


    ```

    -Xms256m

    -Xmx2048m

    ```


    这分别设置了 Eclipse 可以使用的初始和最大内存池。当你想要开发一个像样的 Jakarta EE 应用程序时，这个值有点低。让我们至少将这两个值都加倍。


    ```

    -Xms512m

    -Xmx4g

    ```


    注意，在 `Xmx` 设置中声明的值不要超过可用的物理内存。当实际内存使用量超过可用物理内存时，它会继续使用虚拟内存，通常以磁盘上的交换文件形式存在。这将大大降低性能，并导致严重的卡顿和速度变慢。


    现在，你可以通过执行解压文件夹中的 `eclipse` 可执行文件来启动 Eclipse。系统会要求你选择一个目录作为工作空间。这是 Eclipse 保存所有工作空间项目和元数据的目录。


    之后，Eclipse 会显示一个欢迎屏幕。目前这并不重要。你可以点击右上角的*隐藏*按钮来关闭欢迎屏幕。如有必要，请取消选中右下角的“启动时始终显示欢迎屏幕”。之后，你将进入工作台。默认情况下，它看起来像图
    2-1 中的截图。


    ![](img/454457_2_En_2_Fig1_HTML.png)


    图 2-1


    Eclipse 工作台


    ### 配置 Eclipse


    在我们开始编写代码之前，我们想对 Eclipse 进行一些微调，以免最终遇到麻烦或烦恼。Eclipse 有大量的设置，其中一些默认值本不该是默认值。你可以通过
    *Window* ➤ *Preferences* 来查看和配置设置。


    *   *General* ➤ *Workspace* ➤ *Text file encoding* 必须设置为 **UTF-8**。特别是在 Windows
    中，否则可能会默认使用专有编码 CP-1252，它只支持 255 个不同的字符，并且不支持拉丁语系之外的任何字符。当使用 CP-1252 读取和保存 Unicode
    文件时，你可能会看到无法理解的字符序列。这也被称为“乱码”。^(¹)


    *   *General* ➤ *Workspace* ➤ *New text file line delimiter* 必须设置为 **Unix**。它在
    Windows 上也能正常工作。这尤其能让版本控制系统保持满意。否则，在不同操作系统上拉取代码的开发者可能会遇到由不同换行符引起的令人困惑的冲突或差异。


    *   *General* ➤ *Editors* ➤ *Text editors* ➤ *Spelling* 最好**禁用**。这将为你避免一个潜在的巨大烦恼，因为它会不必要地检查
    XML 配置文件（如 `faces-config.xml` 和 `web.xml`）中的技术条目，导致这些文件中出现令人困惑的警告，例如“`*.xhtml`
    拼写不正确”。


    *   *Java* ➤ *Installed JREs* 必须设置为 **JDK**（实际上与你已在 `JAVA_HOME` 环境变量中配置的相同），而不是
    JRE。此设置通常也用于执行集成的应用服务器，该服务器通常需要 JDK。


    *   *Java* ➤ *Compiler* ➤ *Compiler compliance level* 必须至少设置为 **11**。这是 Jakarta
    EE 10 所需的最低 Java 版本。当然，你也可以选择更高的版本。例如，**17** 也能正常工作。

    '
- fmt: '### Integrating Application Server in Eclipse


    We need to familiarize Eclipse with any installed application server so that you
    can seamlessly deploy, run, and debug web projects from within Eclipse. In order
    to integrate a new application server in Eclipse, first check the bottom section
    of the workbench with several tabs representing several *Views* (you can add new
    ones via *Window* ➤ *Show View*). Click the *Servers* tab to open the servers
    view (see Figure [2-2](#454457_2_En_2_Chapter.xhtml#Fig2)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig2_HTML.png)


    Figure 2-2


    Servers view of Eclipse workbench


    Click the link that literally says “No servers are available. Click this link
    to create a new server….” It’ll show the *New Server* wizard, displaying a list
    of available server types. From the list, select *Red Hat Boss JBoss Middleware*
    ➤ *JBoss AS, WildFly, & EAP Server Tools* (see Figure [2-3](#454457_2_En_2_Chapter.xhtml#Fig3)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig3_HTML.png)


    Figure 2-3


    Selecting JBoss AS, WildFly, & EAP Server Tools in New Server wizard


    After clicking *Next*, it will download the plug-in in the background and request
    you to accept the license agreement before installing the plug-in. This plug-in
    is mandatory in order to manage any JBoss server from inside the workbench. This
    will allow you to add and remove Eclipse projects to the deployments folder, as
    well as starting and stopping the server, and running the server in debug mode.


    Let it finish downloading and installing the plug-in in the background. Confirm
    any possible warning of “unsigned software” with *Install Anyway*. This is okay
    in this specific case. Finally, it will request you to restart Eclipse. Take action
    accordingly.


    Once returned into the workspace, click the same link in the *Servers* view again.
    You’ll now see *JBoss Community* ➤ *WildFly* options for several WildFly versions.
    Select the version matching the one you downloaded. Or if you have downloaded
    a newer version, then the latest available version of the server plug-in will
    generally also work just fine (see Figure [2-4](#454457_2_En_2_Chapter.xhtml#Fig4)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig4_HTML.png)


    Figure 2-4


    Select the WildFly version matching the downloaded one


    Advance to the next step. Just leave this screen default (see Figure [2-5](#454457_2_En_2_Chapter.xhtml#Fig5)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Create a new Server Adapter, and just leave this screen default


    Advance once more to the next step. Here, you should point the *Home Directory*
    field to the folder of the WildFly installation, where you have unzipped it after
    downloading (see Figure [2-6](#454457_2_En_2_Chapter.xhtml#Fig6)). And you should
    adjust the *Execution Environment* to the desired Java version. Pick a minimum
    of `JavaSE-11`. This is the minimum required Java version for Jakarta EE 10. You
    can of course also pick a higher version. For example, `JavaSE-17` will work just
    fine on current WildFly versions.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig6_HTML.png)


    Figure 2-6


    Specifying WildFly location in New Server wizard


    Complete the remainder of the *New Server* wizard with default settings. You don’t
    need to edit any other fields. The newly added server will now appear in the *Servers*
    view (see Figure [2-7](#454457_2_En_2_Chapter.xhtml#Fig7)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig7_HTML.png)


    Figure 2-7


    The WildFly server in Servers view


    ## Creating New Project in Eclipse


    We’re now ready to create a new project for our Jakarta Faces application in Eclipse.
    This can be done via the left section of the workbench that by default shows only
    one tab representing the *Project Explorer* view (also here, you can add new views
    via *Window* ➤ *Show View*). Right-click anywhere in this view and select *New*
    ➤ *Project*. It’ll show the *New Project* wizard that may have a bit too many
    options.


    Eclipse, being an IDE for many different project tasks, offers a bewildering amount
    of different project types from which to choose. For a Jakarta EE-based application
    that is going to be deployed as a simple WAR file, there are basically two project
    types that we could choose from: *Web* ➤ *Dynamic Web Project* and *Maven* ➤ *Maven
    Project*.


    The difference is that the first is an Eclipse native project that really only
    works on Eclipse, while the latter is a universal type of project that can be
    built by any IDE other than Eclipse, as well as easily on the command line and
    by various CI servers such as GitHub Actions, CircleCI, and Jenkins. For this
    reason, the Maven project type is really the only viable choice (see Figure [2-8](#454457_2_En_2_Chapter.xhtml#Fig8)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig8_HTML.png)


    Figure 2-8


    Selecting Maven Project in New Project wizard (note the Dynamic Web Project as
    another but nonviable option)


    In the next step, make sure that the option *Create a simple project (skip archetype
    selection)* is checked (see Figure [2-9](#454457_2_En_2_Chapter.xhtml#Fig9)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig9_HTML.png)


    Figure 2-9


    Checking “Create a simple project” in New Maven Project wizard


    This will let us start with a really empty Maven project so that we can configure
    and populate it ourselves. Of course, you could also choose from an archetype,
    which is basically a template project with several already-prepared files and
    configurations. But we don’t need any for now.


    In the next step, we can specify our own Maven coordinates of the project. The
    Maven coordinates consist of, among others, *Group Id*, *Artifact Id,* and *Version*,
    also known as GAV in the Maven world. The *Group Id* usually matches the root
    package name you’re going to use, such as `com.example`. The *Artifact Id* usually
    represents the project name you’re going to use. For simplicity and in order to
    be consistent in the rest of the book, we’ll use `project`. The *Version* can
    be kept default at `0.0.1-SNAPSHOT`. Finally, the *Packaging* **must** be set
    to `war` (Web Application Archive). This will, during the build, produce a WAR
    file instead of a JAR file (see Figure [2-10](#454457_2_En_2_Chapter.xhtml#Fig10)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig10_HTML.png)


    Figure 2-10


    Filling out the Maven GAV in New Maven Project wizard


    Complete the remainder of the *New Maven Project* wizard. You don’t need to edit
    any other fields. Once you’ve finished the wizard, you’ll get to see the project
    structure in the *Project Explorer* view (see Figure [2-11](#454457_2_En_2_Chapter.xhtml#Fig11)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig11_HTML.png)


    Figure 2-11


    The newly created Maven project in Eclipse


    Unfortunately, the Eclipse-generated `pom.xml`, which is the main indicator of
    the project being a Maven project and containing its configuration, is less than
    ideal. It’s not current anymore, even when generated by the latest Eclipse version
    at the time of writing, the 2021-12 (December 2021).'
  raw: '### Integrating Application Server in Eclipse


    We need to familiarize Eclipse with any installed application server so that you
    can seamlessly deploy, run, and debug web projects from within Eclipse. In order
    to integrate a new application server in Eclipse, first check the bottom section
    of the workbench with several tabs representing several *Views* (you can add new
    ones via *Window* ➤ *Show View*). Click the *Servers* tab to open the servers
    view (see Figure [2-2](#454457_2_En_2_Chapter.xhtml#Fig2)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig2_HTML.png)


    Figure 2-2


    Servers view of Eclipse workbench


    Click the link that literally says “No servers are available. Click this link
    to create a new server….” It’ll show the *New Server* wizard, displaying a list
    of available server types. From the list, select *Red Hat Boss JBoss Middleware*
    ➤ *JBoss AS, WildFly, & EAP Server Tools* (see Figure [2-3](#454457_2_En_2_Chapter.xhtml#Fig3)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig3_HTML.png)


    Figure 2-3


    Selecting JBoss AS, WildFly, & EAP Server Tools in New Server wizard


    After clicking *Next*, it will download the plug-in in the background and request
    you to accept the license agreement before installing the plug-in. This plug-in
    is mandatory in order to manage any JBoss server from inside the workbench. This
    will allow you to add and remove Eclipse projects to the deployments folder, as
    well as starting and stopping the server, and running the server in debug mode.


    Let it finish downloading and installing the plug-in in the background. Confirm
    any possible warning of “unsigned software” with *Install Anyway*. This is okay
    in this specific case. Finally, it will request you to restart Eclipse. Take action
    accordingly.


    Once returned into the workspace, click the same link in the *Servers* view again.
    You’ll now see *JBoss Community* ➤ *WildFly* options for several WildFly versions.
    Select the version matching the one you downloaded. Or if you have downloaded
    a newer version, then the latest available version of the server plug-in will
    generally also work just fine (see Figure [2-4](#454457_2_En_2_Chapter.xhtml#Fig4)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig4_HTML.png)


    Figure 2-4


    Select the WildFly version matching the downloaded one


    Advance to the next step. Just leave this screen default (see Figure [2-5](#454457_2_En_2_Chapter.xhtml#Fig5)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Create a new Server Adapter, and just leave this screen default


    Advance once more to the next step. Here, you should point the *Home Directory*
    field to the folder of the WildFly installation, where you have unzipped it after
    downloading (see Figure [2-6](#454457_2_En_2_Chapter.xhtml#Fig6)). And you should
    adjust the *Execution Environment* to the desired Java version. Pick a minimum
    of JavaSE-11\. This is the minimum required Java version for Jakarta EE 10\. You
    can of course also pick a higher version. For example, **JavaSE-17** will work
    just fine on current WildFly versions.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig6_HTML.png)


    Figure 2-6


    Specifying WildFly location in New Server wizard


    Complete the remainder of the *New Server* wizard with default settings. You don’t
    need to edit any other fields. The newly added server will now appear in the *Servers*
    view (see Figure [2-7](#454457_2_En_2_Chapter.xhtml#Fig7)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig7_HTML.png)


    Figure 2-7


    The WildFly server in Servers view


    ## Creating New Project in Eclipse


    We’re now ready to create a new project for our Jakarta Faces application in Eclipse.
    This can be done via the left section of the workbench that by default shows only
    one tab representing the *Project Explorer* view (also here, you can add new views
    via *Window* ➤ *Show View*). Right-click anywhere in this view and select *New*
    ➤ *Project*. It’ll show the *New Project* wizard that may have a bit too many
    options.


    Eclipse, being an IDE for many different project tasks, offers a bewildering amount
    of different project types from which to choose. For a Jakarta EE-based application
    that is going to be deployed as a simple WAR file, there are basically two project
    types that we could choose from: *Web* ➤ *Dynamic Web Project* and *Maven* ➤ *Maven
    Project*.


    The difference is that the first is an Eclipse native project that really only
    works on Eclipse, while the latter is a universal type of project that can be
    built by any IDE other than Eclipse, as well as easily on the command line and
    by various CI servers such as GitHub Actions, CircleCI, and Jenkins. For this
    reason, the Maven project type is really the only viable choice (see Figure [2-8](#454457_2_En_2_Chapter.xhtml#Fig8)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig8_HTML.png)


    Figure 2-8


    Selecting Maven Project in New Project wizard (note the Dynamic Web Project as
    another but nonviable option)


    In the next step, make sure that the option *Create a simple project (skip archetype
    selection)* is checked (see Figure [2-9](#454457_2_En_2_Chapter.xhtml#Fig9)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig9_HTML.png)


    Figure 2-9


    Checking “Create a simple project” in New Maven Project wizard


    This will let us start with a really empty Maven project so that we can configure
    and populate it ourselves. Of course, you could also choose from an archetype,
    which is basically a template project with several already-prepared files and
    configurations. But we don’t need any for now.


    In the next step, we can specify our own Maven coordinates of the project. The
    Maven coordinates consist of, among others, *Group Id*, *Artifact Id,* and *Version*,
    also known as GAV in the Maven world. The *Group Id* usually matches the root
    package name you’re going to use, such as `com.example`. The *Artifact Id* usually
    represents the project name you’re going to use. For simplicity and in order to
    be consistent in the rest of the book, we’ll use `project`. The *Version* can
    be kept default at `0.0.1-SNAPSHOT`. Finally, the *Packaging* **must** be set
    to `war` (Web Application Archive). This will, during the build, produce a WAR
    file instead of a JAR file (see Figure [2-10](#454457_2_En_2_Chapter.xhtml#Fig10)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig10_HTML.png)


    Figure 2-10


    Filling out the Maven GAV in New Maven Project wizard


    Complete the remainder of the *New Maven Project* wizard. You don’t need to edit
    any other fields. Once you’ve finished the wizard, you’ll get to see the project
    structure in the *Project Explorer* view (see Figure [2-11](#454457_2_En_2_Chapter.xhtml#Fig11)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig11_HTML.png)


    Figure 2-11


    The newly created Maven project in Eclipse


    Unfortunately, the Eclipse-generated `pom.xml`, which is the main indicator of
    the project being a Maven project and containing its configuration, is less than
    ideal. It’s not current anymore, even when generated by the latest Eclipse version
    at the time of writing, the 2021-12 (December 2021).'
  trans: '

    ### 在 Eclipse 中集成应用服务器


    我们需要让 Eclipse 识别已安装的应用服务器，以便你能在 Eclipse 中无缝地部署、运行和调试 Web 项目。为了在 Eclipse 中集成新的应用服务器，首先查看工作台底部带有多个选项卡的区域，这些选项卡代表不同的*视图*（你可以通过*窗口*
    ➤ *显示视图*来添加新视图）。点击*服务器*选项卡以打开服务器视图（见图 2-2）。


    ![](img/454457_2_En_2_Fig2_HTML.png)


    图 2-2


    Eclipse 工作台的服务器视图


    点击显示为“没有可用的服务器。点击此链接创建新服务器...”的链接。它将显示*新建服务器*向导，展示可用服务器类型的列表。从列表中选择*Red Hat Boss
    JBoss Middleware* ➤ *JBoss AS, WildFly, & EAP Server Tools*（见图 2-3）。


    ![](img/454457_2_En_2_Fig3_HTML.png)


    图 2-3


    在新建服务器向导中选择 JBoss AS, WildFly, & EAP Server Tools


    点击*下一步*后，它将在后台下载插件，并要求你接受许可协议后才能安装该插件。为了能够从工作台内部管理任何 JBoss 服务器，此插件是必需的。这将允许你向部署文件夹添加或移除
    Eclipse 项目，以及启动和停止服务器，并以调试模式运行服务器。


    让它在后台完成插件的下载和安装。对于任何“未签名软件”的警告，请确认并选择*仍然安装*。在这种特定情况下，这是可以的。最后，它会要求你重启 Eclipse。请相应地进行操作。


    返回工作区后，再次点击*服务器*视图中的同一链接。你现在会看到*JBoss Community* ➤ *WildFly* 选项，对应多个 WildFly 版本。选择与你下载的版本匹配的版本。或者，如果你下载了更新的版本，那么服务器插件的最新可用版本通常也能正常工作（见图
    2-4）。


    ![](img/454457_2_En_2_Fig4_HTML.png)


    图 2-4


    选择与下载版本匹配的 WildFly 版本


    进入下一步。保持此屏幕的默认设置（见图 2-5）。


    ![](img/454457_2_En_2_Fig5_HTML.jpg)


    图 2-5


    创建新的服务器适配器，并保持此屏幕的默认设置


    再次进入下一步。在这里，你应该将*主目录*字段指向 WildFly 安装的文件夹，即你下载后解压的位置（见图 2-6）。并且你应该将*执行环境*调整为你想要的
    Java 版本。选择至少 JavaSE-11。这是 Jakarta EE 10 所需的最低 Java 版本。当然，你也可以选择更高的版本。例如，**JavaSE-17**
    在当前 WildFly 版本上也能正常工作。


    ![](img/454457_2_En_2_Fig6_HTML.png)


    图 2-6


    在新建服务器向导中指定 WildFly 位置


    使用默认设置完成*新建服务器*向导的其余部分。你不需要编辑任何其他字段。新添加的服务器现在将出现在*服务器*视图中（见图 2-7）。


    ![](img/454457_2_En_2_Fig7_HTML.png)


    图 2-7


    服务器视图中的 WildFly 服务器


    ## 在 Eclipse 中创建新项目


    我们现在准备在 Eclipse 中为我们的 Jakarta Faces 应用程序创建一个新项目。这可以通过工作台的左侧区域完成，该区域默认只显示一个代表*项目资源管理器*视图的选项卡（同样，你可以通过*窗口*
    ➤ *显示视图*来添加新视图）。在此视图中的任意位置右键单击，然后选择*新建* ➤ *项目*。它将显示*新建项目*向导，其中可能包含过多的选项。


    Eclipse 作为一个适用于多种项目任务的 IDE，提供了令人眼花缭乱的不同项目类型供你选择。对于将要部署为简单 WAR 文件的基于 Jakarta EE
    的应用程序，基本上有两种项目类型可供选择：*Web* ➤ *动态 Web 项目* 和 *Maven* ➤ *Maven 项目*。


    区别在于，前者是 Eclipse 原生项目，实际上只能在 Eclipse 上运行；而后者是一种通用项目类型，可以由 Eclipse 之外的任何 IDE 构建，并且可以轻松地在命令行以及各种
    CI 服务器（如 GitHub Actions、CircleCI 和 Jenkins）上构建。因此，Maven 项目类型实际上是唯一可行的选择（见图 2-8）。


    ![](img/454457_2_En_2_Fig8_HTML.png)


    图 2-8


    在新建项目向导中选择 Maven 项目（注意动态 Web 项目是另一个但不可行的选项）


    在下一步中，确保选中*创建一个简单项目（跳过原型选择）*选项（见图 2-9）。


    ![](img/454457_2_En_2_Fig9_HTML.png)


    图 2-9


    在新建 Maven 项目向导中勾选“创建一个简单项目”


    这将让我们从一个真正空的 Maven 项目开始，以便我们可以自行配置和填充它。当然，你也可以从原型中选择，这基本上是一个包含多个已准备好的文件和配置的模板项目。但目前我们不需要任何原型。


    在下一步中，我们可以指定项目自己的 Maven 坐标。Maven 坐标包括*Group Id*、*Artifact Id* 和 *Version*，在 Maven
    世界中也被称为 GAV。*Group Id* 通常与你将要使用的根包名匹配，例如 `com.example`。*Artifact Id* 通常代表你将要使用的项目名称。为简单起见并为了与本书其余部分保持一致，我们将使用
    `project`。*Version* 可以保持默认值 `0.0.1-SNAPSHOT`。最后，*Packaging* **必须**设置为 `war`（Web
    应用程序归档）。这样在构建过程中将生成一个 WAR 文件而不是 JAR 文件（见图 2-10）。


    ![](img/454457_2_En_2_Fig10_HTML.png)


    图 2-10


    在新建 Maven 项目向导中填写 Maven GAV


    完成*新建 Maven 项目*向导的其余部分。你不需要编辑任何其他字段。完成向导后，你将在*项目资源管理器*视图中看到项目结构（见图 2-11）。


    ![](img/454457_2_En_2_Fig11_HTML.png)


    图 2-11


    Eclipse 中新创建的 Maven 项目


    不幸的是，Eclipse 生成的 `pom.xml`（它是项目为 Maven 项目并包含其配置的主要标志）并不理想。它已经过时了，即使是由撰写本文时的最新
    Eclipse 版本（2021-12，即 2021 年 12 月版本）生成的也是如此。

    '
- fmt: "您已经可以从`pom.xml`文件中看到这一点，该文件被标记了一个令人担忧的红色叉号，并且在*Markers*视图中显示了两条错误消息。任何至少有一个此类红色叉号的项目都无法构建，也无法部署。其中一条错误消息明确写道：“`web.xml\
    \ is missing and <failOnMissingWebXml> is set to true`”。换句话说，Maven 不知何故认为这仍然是一个\
    \ Jakarta EE 6 之前的项目，而实际上这已经不被允许了。另一条错误消息显示：“`Could not initialize class org.apache.maven.plugin.war.util.WebappStructureSerializer`”。这基本上是由默认的\
    \ Maven WAR 插件版本与 Java 17 不兼容引起的。可以通过将 Java 降级到较低版本来解决此问题，但也可以通过将默认的 Maven WAR\
    \ 插件版本显式设置为更高版本来解决。\n\n为了解决这个问题，并使 Eclipse 生成的`pom.xml`符合当前标准，我们需要打开`pom.xml`进行编辑，并按如下代码所示进行调整：\n\
    \n```\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\n         xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0\n\
    \         http://maven.apache.org/xsd/maven-4.0.0.xsd\">\n    <modelVersion>4.0.0</modelVersion>\n\
    \    <groupId>com.example</groupId>\n    <artifactId>project</artifactId>\n  \
    \  <version>0.0.1-SNAPSHOT</version>\n    <packaging>war</packaging>\n\n    <properties>\n\
    \        <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n\
    \        <maven.compiler.source>17</maven.compiler.source>\n        <maven.compiler.target>17</maven.compiler.target>\n\
    \        <failOnMissingWebXml>false</failOnMissingWebXml>\n    </properties>\n\
    \n    <dependencies>\n        <dependency>\n            <groupId>jakarta.platform</groupId>\n\
    \            <artifactId>jakarta.jakartaee-api</artifactId>\n            <version>10.0.0</version>\n\
    \            <scope>provided</scope>\n        </dependency>\n    </dependencies>\n\
    \n    <build>\n        <plugins>\n            <plugin>\n                <groupId>org.apache.maven.plugins</groupId>\n\
    \                <artifactId>maven-war-plugin</artifactId>\n                <version>3.3.2</version>\n\
    \            </plugin>\n        </plugins>\n    </build>\n</project>\n```\n\n\
    保存此文件后，右键单击项目并选择 *Maven* ➤ *Update Project…* ➤ *OK*，Eclipse 将自动处理并清除项目上令人担忧的红色叉号。此\
    \ *Update Project* 操作还将根据更新后的`pom.xml`解决两个待处理的警告：“`The compiler compliance specified\
    \ is 1.5 but a JRE 17 is used`”和“`Build path specifies execution environment J2SE-1.5.\
    \ There are no JREs installed in the workspace that are strictly compatible with\
    \ this environment`”。现在看起来好多了。我们将简要介绍这里最重要的设置。\n\n*   **Packaging `war`**：这表明该项目是一个“web”项目，并且项目的内容将被组装成一个\
    \ Web 归档文件。\n*   **Encoding `UTF-8`**：这设置了源文件所使用的编码，以及（报告）输出文件应以此编码生成。这使得构建是可重复的，否则它将默认为系统默认编码（同样，这是一个相当糟糕的默认设置）。\n\
    *   **Compiler `17`**：这设置了`.java`源文件中使用的 Java 版本以及`.class`文件中的字节码输出版本。如果不设置此项，Maven\
    \ 将默认为尽可能旧的版本，有时甚至比那个版本还低。\n*   **`failOnMissingWebXml` `false`**：旧版本的 Jakarta\
    \ EE 要求存在`/WEB-INF/web.xml`。尽管自 2009 年发布的 Jakarta EE 6 以来已不再需要此文件，但 Maven 仍然会检查该文件是否存在。将其设置为`false`可以防止这种不必要的检查。\n\
    *   **Dependency `jakarta.platform:jakarta.jakartaee-api:10.0.0 provided`**：这声明了对\
    \ Jakarta EE 10 API 的依赖，并确保编译器知道所有 Jakarta EE 类型，例如`FacesServlet`、`@Named`和`@Entity`。此依赖项被设置为`provided`，因为这些类型已由目标运行时（在我们的例子中是\
    \ WildFly）提供。然后，此依赖项将仅用于编译源代码，相关的 JAR 文件不会包含在生成的 WAR 文件中。您必须绝对确保任何由目标运行时提供的编译时依赖项都设置为`provided`；否则，它最终会出现在生成的\
    \ WAR 文件中，并且您可能会遇到类加载问题，其中不同版本的重复库会相互冲突。如果您实际上不是针对一个完整的 Jakarta EE 服务器，而是一个像 Tomcat\
    \ 这样的精简 Servlet 容器，那么您需要按照 Mojarra 的 README 中的说明调整依赖项，^([²](#fn2)) Mojarra 是可用的\
    \ Faces 实现之一，实际上也是 WildFly 底层使用的那个。\n*   **Plug-in `maven-war-plugin:3.3.2`**：这基本上覆盖了\
    \ Eclipse 内置的 Maven WAR 插件默认版本。如果您在 Eclipse 版本中没有遇到“`Could not initialize class\
    \ WebappStructureSerializer`”错误消息，则*不*需要此条目。\n\n下一步基本上是指导 Eclipse 生成部署描述符文件。在\
    \ *Project Explorer* 视图中右键单击项目，选择 *Properties*，然后打开 *Project Facets* 部分。更新 Servlet\
    \ API 版本并添加 Jakarta Faces 和 Jakarta Persistence  facets。Servlet API 由“Dynamic\
    \ Web Module”条目表示。这需要设置为版本`6.0`，这与 Jakarta EE 10 规范相匹配。此外，需要选择“Jakarta Faces”和“Jakarta\
    \ Persistence”条目，并分别设置为版本`4.0`和`3.1`，以匹配 Jakarta EE 10 规范（参见图 [2-12](#454457_2_En_2_Chapter.xhtml#Fig12)）。同时，您还需要仔细检查\
    \ Java facet 的版本是否确实是`17`或`pom.xml`中设置的任何版本。此值应通过 *Update Project* 操作自动更新。\n\n\
    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig12_HTML.png)\n\n图 2-12\n\n项目属性的\
    \ Project Facets 部分，启用了“JavaServer Faces”（Jakarta Faces）和“Jakarta Persistence”（Jakarta\
    \ Persistence）facets（请注意，Jakarta Servlet API 版本由“Dynamic Web Module”表示，并且屏幕截图中的版本在撰写本文时不幸已过时）\n\
    \n不幸的是，在撰写本章时可用的最新 Eclipse 版本（2021-12 版，2021 年 12 月）中，这些版本在下拉菜单中尚不可用。可用的最高版本是\
    \ Servlet 5.0、Faces 2.3 和 Persistence 2.2。这不是一个大问题。它唯一的影响在于可用的代码生成器和向导。我们之后可以手动调整\
    \ Eclipse 生成的`web.xml`、`faces-config.xml`和`persistence.xml`文件，以匹配 Jakarta EE 10\
    \ 兼容版本。\n\n正如您在底部附近的黄色警告栏中看到的，Eclipse 仅需要进一步配置。这涉及到新选择的 Jakarta Faces 和 Jakarta\
    \ Persistence facets。单击链接时，我们会看到 *Modify Faceted Project* 向导（参见图 [2-13](#454457_2_En_2_Chapter.xhtml#Fig13)）。\n\
    \n![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig13_HTML.png)\n\n图 2-13\n\n\
    Jakarta Persistence Facet 配置\n\n*Modify Faceted Project* 向导的第一步允许我们配置 Jakarta\
    \ Persistence facet。我们需要确保指示 Eclipse，Jakarta Persistence 实现已由目标运行时提供，因此 Eclipse\
    \ 不需要包含任何库。这可以通过在 *Jakarta Persistence implementation* 字段中选择“Disable Library Configuration”选项来实现。由于我们将使用\
    \ WildFly 提供的 Hibernate 作为实际的 Jakarta Persistence 实现，它支持自动发现带有`@Entity`注解的类，我们希望指示\
