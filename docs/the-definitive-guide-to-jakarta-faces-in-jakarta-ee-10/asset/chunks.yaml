    这样，当 Jakarta Faces 在表单提交的应用请求值阶段（第二阶段）检查 `rendered` 属性时，它会注意到它为 `true` 并继续处理自由文本字段，即使托管
    Bean 是请求作用域，因此此时 `#{bean.customer.title}` 仍然为 `null`。请注意，`binding` 属性不引用托管 Bean
    属性。这是不必要的，因为在那里不会用到它。


