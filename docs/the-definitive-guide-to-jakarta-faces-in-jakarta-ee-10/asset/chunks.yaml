  trans: "\n那么它们最终都会大致出现在组件树中，如下所示：\n\n你看，当你有许多 `<t:input>` 自定义标签时，这最终会导致组件树不必要地臃肿，并包含大量未使用的组件。因此，这里最好使用\
    \ `<c:choose>` 来代替 `rendered` 属性，特别是当 `type` 属性实际上是静态的（即，至少在视图作用域内，它永远不会改变）。\n\
    \n```\nversus \n```\n\n它们不可互换。`<c:set>` 可以在 Facelets 文件中的任何位置使用，它在 EL 作用域中设置一个变量，该变量在视图构建期间仅在标签位置之后可访问，但在视图渲染期间可在视图中的任何其他位置访问。`<ui:param>`\
    \ 应仅嵌套在 `<ui:include>`、`<ui:decorate template>` 或 `<ui:composition template>`\
    \ 中，它在 Facelets 模板的 EL 作用域中设置一个变量，该变量仅在模板本身中可访问。较旧的 Jakarta Faces 版本存在错误，导致 `<ui:param>`\
    \ 变量在相关的 Facelets 模板之外也可用。永远不应依赖于此。\n\n没有 `scope` 属性的 `<c:set>` 将表现得像一个别名。它不会在任何作用域中缓存\
    \ EL 表达式的结果。其主要目的是能够为在同一 Facelets 文件中重复多次的相对较长的 EL 表达式提供一个快捷方式。因此，它可以在迭代的 Jakarta\
    \ Faces 组件中完美使用：\n\n```\n\n#{price}\n\n```\n\n它仅不适用于在循环中计算总和。以下构造将永远无法工作：\n\n\
    ```\n\n#{product.price}\n\nTotal price: #{total}\n```\n\n为此，请改用 EL 3.0 流 API。\n\
    \n```\n#{product.price}\n\nTotal price: #{bean.products.stream().map(product->product.price).sum()}\n\
    ```\n\n然而，当你将 `scope` 属性设置为允许的值之一（`request`、`view`、`session` 或 `application`）时，它将在视图构建期间立即被求值并存储在指定的作用域中。\n\
    \n```\n这仅在首次构建此视图时被求值一次，并且在此示例中，该值将作为 EL 变量 `#{DEV}` 在整个应用程序中可用。你最好在 master 模板文件的顶部声明这样的\
    \ `<c:set>`，该模板文件被整个应用程序中的每个 Facelets 文件使用。请注意，EL 变量是大写的，以符合 Java 常量的命名约定。\n\n\
    注意事项\n\n当 Jakarta Tags 属性引用的 EL 变量在 Jakarta Faces 视图构建期间不可用时，使用 Jakarta Tags 只会导致意外结果。此类\
    \ EL 变量的示例包括由迭代组件（如 `<h:dataTable>` 和 `<ui:repeat>`）的 `var` 属性定义的变量，以及由 `<f:viewParam>`、`<f:viewAction>`\
    \ 和 `<f:event type=\"preRenderView\">` 在模型中设置的变量。简而言之，仅使用 Jakarta Tags 来控制 Jakarta\
    \ Faces 组件树的构建流程，并仅使用 Jakarta Faces UI 组件来控制 HTML 输出生成的流程。在 Jakarta Tags 中，不要依赖在视图构建期间不可用的\
    \ EL 变量。\n\n操作组件树\n这可以通过 Jakarta Tags 声明式地完成，也可以通过 Java 代码编程式地完成。Jakarta Tags\
    \ 方法已在上一节中详细阐述。也可以改用 Java 代码。作为预防措施，这通常会导致代码非常冗长且难以维护。当使用像 XML 这样的分层标记语言时，代码中的基于树的层次结构最易于阅读和维护。Facelets\
    \ 本身已经是基于 XML 的。Jakarta Tags 也是基于 XML 的，因此可以无缝集成到 Facelets 文件中。因此，Jakarta Tags\
    \ 是动态操作组件树的推荐方法，而不是 Java 代码。\n\n`jakarta.faces.component.UIComponent` 的 Javadoc^(¹¹)\
    \ 指定了何时可以安全地操作组件树：\n\n*动态修改组件树可以在任何时间发生，在恢复视图期间和之后，但不能在状态保存期间，并且需要相对于渲染和状态保存正常运作。*\n\
    \n换句话说，你可以保证安全地修改组件树的最早时刻是在 `PostAddToViewEvent` 期间，而最晚时刻是在 `PreRenderViewEvent`\
    \ 期间。两者之间的任何时刻也是可能的。在 `PostAddToViewEvent` 之前，不一定存在具体的 `UIViewRoot` 实例。在 `PreRenderViewEvent`\
    \ 之后，存在视图状态已被保存的风险，你最好不要在此处陷入困境，因为视图状态包含了关于组件树任何动态更改的所有信息。换句话说，在渲染响应阶段（第六阶段）操作组件树是一个坏主意。\n\
    当你打算通过基于至少是视图作用域的 Java 模型添加新组件来操作组件树的构建时，请监听相关父组件的 `PostAddToViewEvent`。当你打算通过添加、移动或删除组件来操作已构建的组件树时，请监听\
    \ `UIViewRoot` 的 `PreRenderViewEvent`。\n\n以下示例在 `PostAddToViewEvent` 期间，基于 Java\
