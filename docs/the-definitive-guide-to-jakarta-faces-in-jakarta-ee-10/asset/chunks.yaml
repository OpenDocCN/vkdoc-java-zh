    Faces 实现可能会抛出运行时异常。


    **Immediate 属性**


    `EditableValueHolder`、`ActionSource` 和 `AjaxBehavior` 接口也指定了一个 `immediate` 属性，它基本上映射到所有
    `UIInput` 和 `UICommand` 组件以及 `<f:ajax>` 标签的 `immediate` 属性。当在 `EditableValueHolder`
    组件上设置为 `true` 时，通常在处理验证阶段（第三阶段）以及更新模型值阶段（第四阶段）发生的所有操作，都将在应用请求值阶段（第二阶段）执行。如果这些组件上的转换或验证失败，生命周期也将跳过处理验证阶段（第三阶段）。当在
    `ActionSource` 组件或 `AjaxBehavior` 标签上设置为 `true` 时，通常发生在调用应用程序阶段（第五阶段）的所有操作，都将在应用请求值阶段（第二阶段）执行，并且仅在转换和验证没有失败的情况下执行。


    从历史上看，此属性主要用于在表单上执行“内部”操作，通常是根据父输入组件提交的值加载子输入组件，而不会被同一表单中其他输入组件的转换或验证错误阻塞。一个常见的用例是在父下拉列表更改时填充子下拉列表，而不会冒子下拉列表的
    `required` 属性阻止提交的风险。


    这种方法显然早于 Web 2.0 时代，在那个时代你只需为此使用 Ajax。需要理解的是，自从 Jakarta Faces 2.0 引入 `<f:ajax>`
    以来，`immediate` 属性基本上已经失去了这个用途。完全相同的用例可以通过以下更简洁的方式实现：


    正如你在第 4 章中学到的，`<f:ajax>` 的 `execute` 属性默认值为 `@this`，因此这里省略了它。这也意味着同一表单中所有其他 `EditableValueHolder`
    组件将不会被处理，因此不会导致 `#{bean.loadCities}` 被来自其他输入的转换或验证错误阻塞。


    如今，有了 Ajax 魔法等特性，`immediate` 属性已经失去了其主要用例。即使没有它，Jakarta Faces 也能正常运行。由于其历史用例，许多初学者可能会误以为其主要目的是“跳过所有验证”。然而，事实并非如此。为此，你需要精细调整
    `<f:ajax>` 的 `execute` 属性，使其仅覆盖真正需要验证的输入组件。如果你希望在提交整个表单时实际“跳过所有验证”，那么最好使用 Jakarta
    Bean Validation 约束（如 `@NotNull` 等），并简单地使用 `<f:validateBean disabled="true">` 包裹整个表单。


    **自定义转换器**


    从一开始，Jakarta Faces 就支持自定义转换器。主要用例是能够转换非标准模型值，例如特定于 Web 应用程序的持久化实体。不太常见的用例是扩展现有的标准转换器，并在其构造函数中设置一些常用的默认值，这样你就可以在视图定义中用更少的代码来声明组件上所需的标准转换器配置。


    假设你希望在持久化实体上创建主从页面，并且希望将实体的 ID 作为请求参数从主页面传递到从页面。以下是一个基于虚构 `Product` 实体的主页面 `/products/list.xhtml`
    中的数据表示例：


    ```

    #{product.id}

    #{product.name}

    #{product.description}


    ```


    注意表格的最后一列。它生成了一个指向详情页面 `/products/edit.xhtml` 的链接，其中实体的 ID 作为 GET 请求参数传递，例如 `/product.xhtml?id=42`。在详情页面中，你可以使用
    `<f:viewParam>` 将 GET 请求参数设置到支持 Bean 中。


    ```


    ...


    编辑产品 #{editProduct.product.id}


    ...


    ```


    然而，有一个小问题：从 Java 角度来看，GET 请求参数本质上是一个表示产品 ID 的 `String`，而 `EditProduct` 支持 Bean
    的 `product` 属性实际上期望的是一个由传入 ID 标识的完整 `Product` 实体。


    ```

    @Named @ViewScoped

    public class EditProduct implements Serializable {

    private Product product;

    // Getter+setter 方法。

    }

    ```


    正是为了这个转换步骤，需要创建一个自定义转换器，它能够将表示产品 ID 的 `String` 与表示 `Product` 实体的 `Object` 之间进行转换。Jakarta
