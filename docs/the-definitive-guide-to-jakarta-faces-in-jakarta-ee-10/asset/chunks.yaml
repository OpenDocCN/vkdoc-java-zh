- fmt: '以下是根据您的要求排版后的 Markdown 文档：


    The following shows a full example of the backing bean handling the login call.
    We’ll discuss the parts individually below.


    ```

    @Named @RequestScoped

    public class Login {

    @NotNull

    @Email

    private String email;

    @NotNull

    @Size(min = 8, message = "Password must be at least 8 characters")

    private String password;

    @Inject

    private SecurityContext securityContext;

    @Inject

    private ExternalContext externalContext;

    @Inject

    private FacesContext facesContext;

    public void submit() {

    switch (continueAuthentication()) {

    case SEND_CONTINUE:

    facesContext.responseComplete();

    break;

    case SEND_FAILURE:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_ERROR, "Login failed", null));

    break;

    case SUCCESS:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_INFO, "Login succeed", null));

    break;

    case NOT_DONE:

    // Doesn''t happen here

    }

    }

    private AuthenticationStatus continueAuthentication() {

    return securityContext.authenticate(

    (HttpServletRequest) externalContext.getRequest(),

    (HttpServletResponse) externalContext.getResponse(),

    AuthenticationParameters.withParams().credential(

    new UsernamePasswordCredential(email, password))

    );

    }

    public String getEmail() {

    return email;

    }

    public void setEmail(String email) {

    this.email = email;

    }

    public String getPassword() {

    return password;

    }

    public void setPassword(String password) {

    this.password = password;

    }

    }

    ```


    We start the backing bean with two instance variables corresponding with the credentials
    we collect.


    ```

    @NotNull

    @Email

    private String email;

    @NotNull

    @Size(min = 8, message = "Password must be at least 8 characters")

    private String password;

    ```


    This clearly shows the advantage over the `FORM` authentication mechanism in that
    we can easily prevalidate the user’s input using Jakarta Bean Validation. Because
    of Jakarta Faces built-in integration with Jakarta Bean Validation, a standard
    faces message will be made available for rendering should the input not pass validation.


    Next, we defined injecting the contextual objects it needs. These are


    ```

    @Inject

    private SecurityContext securityContext;

    @Inject

    private ExternalContext externalContext;

    @Inject

    private FacesContext facesContext;

    ```


    The observant reader will recognize `ExternalContext` and `FacesContext` as being
    two well-known native Jakarta Faces classes, with the `SecurityContext` being
    the odd one out. This class is from Jakarta EE Security, and we’ll use that here
    to communicate with the authentication mechanism.


    Continuing the dialog happens in the `continueAuthentication()` method as follows:


    ```

    private AuthenticationStatus continueAuthentication() {

    return securityContext.authenticate(

    (HttpServletRequest) externalContext.getRequest(),

    (HttpServletResponse) externalContext.getResponse(),

    AuthenticationParameters.withParams().credential(

    new UsernamePasswordCredential(email, password))

    );

    }

    ```


    The call to `SecurityContext#authenticate()` will trigger the authentication mechanism
    again. Since that mechanism will be a state where it waits for credentials to
    be passed, it will indeed look for the credentials we pass in and use those to
    continue. As we’ll later see, we can also request that any potentially existing
    state is discarded and a new dialog is started. Note that we have to cast the
    request and response objects to `HttpServletRequest` and `HttpServletResponse`.
    Unfortunately, this is needed since `ExternalContext` abstracts over Servlet and
    Portlet requests and only returns `Object` for those two.


    The `SecurityContext#authenticate()` method returns a status that indicates in
    broad lines what the authentication mechanism did. The action method of our Jakarta
    Faces backing bean has to handle the following:


    ```

    switch (continueAuthentication()) {

    case SEND_CONTINUE:

    facesContext.responseComplete();

    break;

    case SEND_FAILURE:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_ERROR, "Login failed", null));

    break;

    case SUCCESS:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_INFO, "Login succeed", null));

    break;

    case NOT_DONE:

    // Doesn''t happen here

    }

    ```


    As can be seen, there are four possible outcomes. The first one is `SEND_CONTINUE`,
    which basically means “authentication in progress.” The authentication mechanism
    returned that status when it took over the dialog again (e.g., by rendering its
    own response or, more likely, by redirecting the caller to a new location). A
    Jakarta Faces backing bean should make sure the Jakarta Faces life cycle is ended
    by calling `FacesContext#responseComplete()` and furthermore refrain from interacting
    with the response itself in any way. The second one is `SEND_FAILURE`, which basically
    means “authentication failed.” This status is returned when the authentication
    mechanism wasn’t able to validate the credentials that were provided. In most
    cases, this is when the caller provided the wrong credentials. A Jakarta Faces
    backing bean can respond to this by setting a faces message and redisplay the
    login form. The third status is `SUCCESS`, which means “authentication succeeded.”
    This is returned when the authentication mechanism successfully validated the
    credentials provided. It’s only after this status is returned that `HttpServletRequest#getUserPrincipal()`,
    `SecurityContext#getCallerPrincipal()`, etc., return non-`null` values to indicate
    the current caller is authenticated. A Jakarta Faces backing bean can respond
    to this in various ways (e.g., by setting a faces message and continuing to render
    the view, or issuing a redirect of itself). The fourth and final status is `NOT_DONE`,
    which is returned when the authentication mechanism chooses to not authenticate
    at all. This happens, for instance, when the authentication mechanism is preemptively
    called but authentication appeared not to be necessary. Typically, a Jakarta Faces
    backing bean would not need to take any special action here.


    ## Caller-Initiated Authentication


    The previous code discussed the situation where an unauthenticated caller tries
    to access a protected resource (URL/page) and the authentication dialog is automatically
    started. Since this authentication dialog is started by the container, we call
    this “container-initiated authentication.” Another case is where a caller explicitly
    starts the authentication dialog (e.g., by clicking on a “login” button). Because
    the caller starts this dialog, we call it “caller-initiated authentication.” In
    case of caller-initiated authentication, the core authentication mechanism is
    effectively directly invoked, and the platform-provided login-to-continue functionality
    is skipped. This means that if an authentication mechanism depends on login-to-continue
    to redirect to a login page and after authentication to redirect back to the protected
    resource, neither of these two actions will happen when the application programmatically
    triggers authentication.


    The `CustomFormAuthenticationMechanism` that we defined earlier via an annotation
    is indeed a mechanism that uses the platform’s login-to-continue service, so we’ll
    start the authentication dialog by directing to the same login view we used before.
    To indicate this is a new login, an extra request parameter is provided. The view
    from which we start looks as follows:


    ```


    Welcome


    Logged-in as #{request.userPrincipal}


    ```


    In the backing bean, we’ll inject two additional objects: an instance to obtain
    and store the mentioned request parameter and a reference to the `Flash`, which
    we’ll use later.


    ```

    @Inject

    private Flash flash;

    @Inject @ManagedProperty("#{param.new}")

    private boolean isNew;

    ```'
