- fmt: '### Creating the Jakarta Enterprise Beans Service


    Next, we need to create a Jakarta Enterprise Beans service class in order to be
    able to save an instance of the aforementioned Jakarta Persistence entity in the
    database and to obtain a list of Jakarta Persistence entities, among others.


    Right-click the `src/main/java` folder of the project and choose *New* ➤ *Class*.
    In the wizard, set the *Package* to `com.example.project.service` and set the
    *Name* to `MessageService` (see Figure [2-26](#454457_2_En_2_Chapter.xhtml#Fig26)).
    The rest of the fields can be kept default or empty.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig26_HTML.jpg)


    Figure 2-26


    The New Java Class wizard in Eclipse


    Modify the new service class as follows:


    ```

    package com.example.project.service;

    import java.util.List;

    import com.example.project.model.Message;

    import jakarta.ejb.Stateless;

    import jakarta.persistence.EntityManager;

    import jakarta.persistence.PersistenceContext;

    @Stateless

    public class MessageService {

    @PersistenceContext

    private EntityManager entityManager;

    public void create(Message message) {

    entityManager.persist(message);

    }

    public List list() {

    return entityManager

    .createQuery("FROM Message m", Message.class)

    .getResultList();

    }

    }

    ```


    That’s basically it. Let’s briefly go through the annotations.


    - **@Stateless**: This marks the bean as a stateless Jakarta Enterprise Beans
    service so that the application server knows whether it should pool them and when
    to start and stop database transactions. The alternative annotations are `@Stateful`
    and `@Singleton`. Note that a `@Stateless` does not mean that the container will
    make sure that the class itself is stateless. You as developer are still responsible
    to ensure that the class doesn’t contain any shared and mutable instance variables.
    Otherwise, you’d better mark it as either `@Stateful` or `@Singleton`, depending
    on its purpose.


    - **@PersistenceContext**: This basically injects the Jakarta Persistence entity
    manager from the persistence unit as configured in the project’s `persistence.xml`.
    The entity manager is, in turn, responsible for mapping all Jakarta Persistence
    entities against an SQL database. It will, under the covers, do all the hard JDBC
    work.


    ### Adjusting the Hello World


    Now we’re going to adjust the earlier created `HelloWorld` backing bean in order
    to save the messages in the database and display all of them in a table.


    ```

    package com.example.project.view;

    import java.util.List;

    import com.example.project.model.Message;

    import com.example.project.service.MessageService;

    import jakarta.annotation.PostConstruct;

    import jakarta.enterprise.context.RequestScoped;

    import jakarta.inject.Inject;

    import jakarta.inject.Named;

    @Named @RequestScoped

    public class HelloWorld {

    private Message message = new Message();

    private List messages;

    @Inject

    private MessageService messageService;

    @PostConstruct

    public void init() {

    messages = messageService.list();

    }

    public void submit() {

    messageService.create(message);

    messages.add(message);

    }

    public Message getMessage() {

    return message;

    }

    public List getMessages() {

    return messages;

    }

    }

    ```


    Note that you don’t need setters for `message` and `messages`. We’re going to
    use the getters and setters of the `Message` entity itself.


    Finally, adjust the `<h:body>` of `hello.xhtml` as follows:


    ```

    Hello World


    #{message.id}

    #{message.text}


    ```


    Now, restart the server, reload the page in your favorite web browser, and create
    some messages (see Figure [2-27](#454457_2_En_2_Chapter.xhtml#Fig27)).


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig27_HTML.jpg)


    Figure 2-27


    The Hello World using Jakarta Faces, Jakarta CDI, Jakarta Enterprise Beans, and
    Jakarta Persistence


