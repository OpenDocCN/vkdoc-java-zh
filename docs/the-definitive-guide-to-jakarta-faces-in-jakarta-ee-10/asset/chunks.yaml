- fmt: "# Introspection\n\nAn important aspect of being able to extend a framework\
    \ correctly is not only to be able to utilize extension points but also to be\
    \ able to introspect the framework and query it for what artifacts or resources\
    \ it has available.\n\nOne of the places where Jakarta Faces provides support\
    \ for introspection is its ability to reveal which view resources are present\
    \ in the system. Remember that in Jakarta Faces, views like, for example, Facelets\
    \ are abstracted behind the view handler, which in turn manages one or more view\
    \ declaration language (VDL) instances. A VDL, also called a templating engine,\
    \ has the ability to read its views via the resource handler. As we’ve seen in\
    \ this chapter, all these things can be augmented or even fully replaced.\n\n\
    This specifically means that views can come from anywhere (e.g., from the filesystem\
    \ (most typical)) but can also be generated in memory, be loaded from a database\
    \ or fetched over the network, and much more. Also, the simple physical file to\
    \ logically view name mapping such as that used by Facelets doesn’t have to hold\
    \ for other view declaration languages at all.\n\nTogether this means that without\
    \ an explicit introspection mechanism where the view handler, VDL, and resource\
    \ handler can be asked which views/resources they have available, we would not\
    \ be able to reliably obtain a full list of views.\n\nSuch list of views is needed,\
    \ for example, when we want to utilize so-called extensionless URLs, which are\
    \ URLs without any extension such as `.xhtml` or `.jsf` and without any extra\
    \ path mapping present such as `/faces/*`.\n\nLacking any hint inside the URL\
    \ itself, the Servlet container on top of which Jakarta Faces works has to have\
    \ some other way of knowing that a certain request has to be routed to the faces\
    \ servlet.\n\nA particularly elegant way to do this is by utilizing Servlet’s\
    \ “exact mapping” feature, which is a variant of URL mapping where an exact name\
    \ instead of a pattern is mapped to a given servlet, which in this case would\
    \ be the faces servlet. Since the Servlet spec has an API for dynamically adding\
    \ Servlet mappings, and Jakarta Faces has an API to dynamical introspect which\
    \ views are available, we pretty much only have to combine these two to implement\
    \ extensionless URLs.\n\nThe following shows an example of how to do this:\n\n\
    ```java\n@WebListener\npublic class ExtensionLessURLs implements ServletContextListener\
    \ {\n    @Override\n    public void contextInitialized(ServletContextEvent event)\
    \ {\n        FacesContext facesContext = FacesContext.getCurrentInstance();\n\
    \        event.getServletContext()\n            .getServletRegistrations()\n \
    \           .values()\n            .stream()\n            .filter(servlet -> servlet\n\
    \                .getClassName().equals(FacesServlet.class.getName()))\n     \
    \       .findAny()\n            .ifPresent(facesServlet -> facesContext\n    \
    \            .getApplication()\n                .getViewHandler()\n          \
    \      .getViews(facesContext, \"/\",\n                    ViewVisitOption.RETURN_AS_MINIMAL_IMPLICIT_OUTCOME)\n\
    \                .forEach(view -> facesServlet.addMapping(view)));\n    }\n}\n\
    ```\n\nWhat happens here is that we first try to find the faces servlet, which\
    \ incidentally is another example of introspection, this time in the Servlet spec.\
    \ If found, we ask the view handler for all views. As mentioned earlier, this\
    \ will internally introspect all the available view declaration instances, which\
    \ in turn may introspect the resource handler. The `RETURN_AS_MINIMAL_IMPLICIT_OUTCOME`\
    \ parameter is used to make sure all views are returned in their minimal form\
    \ without any file extensions or other markers appended. This is the same form\
    \ that can be returned from, for example, action methods or used with the `action`\
    \ attribute of command components.\n\nHaving obtained the stream of views in the\
    \ right format, we directly add each of them as exact mapping to the faces servlet\
    \ that we found earlier.\n\nFor example, suppose we have a Facelet view in the\
    \ web root in a folder `/foo` named `bar.xhtml`. Then `getViews()` will return\
    \ a stream with the string `/foo/bar`. When the faces servlet is mapped to this\
    \ `/foo/bar`, and assuming the Jakarta Faces application is deployed to the context\
    \ path `/test` on domain `localhost` port `8080`, we can request `http://localhost:8080/test/foo/bar`\
    \ to see the rendered response of that Facelet.\n\nNote that even though it’s\
    \ relatively simple to achieve extensionless URLs in Jakarta Faces this way, it’s\
    \ still somewhat tedious to have to do this for every application. It’s expected\
    \ that a next revision of Jakarta Faces will support this via a single setting.\n\
    \n# Index\n\n## A\n\n- `accept` attribute\n- `Accept-Language` header\n- `actionListener`\
    \ attribute\n- `ActionSource` interface\n- Active locale\n- `addPhaseListener()`\
    \ and `removePhaseListener()` methods\n- Alexander Smirnov’s Telamon framework\n\
    - `@Alternative` and `@Priority` annotations\n- Application programming interface\
    \ (API)\n- Application-scoped data\n- Application-scoped managed beans\n- `@Asynchronous`\
    \ annotation\n- `AuthenticationMechanismDefinition` annotation\n- `autorun` attribute\n\
    \n## B\n\n- Backing bean\n  - `binding` attribute\n  - duplication and unreusability\n\
