- fmt: "# 排版后的文档\n\n预计在未来的任何相关规范修订版中，获取这种“先前”或“原始”类型的任务将变得更加容易。例如，未来版本的 Jakarta Faces\
    \ 可能会为其（CDI）注解引入现成的注解字面量，例如这里展示的`RequestParameterMapAnnotationLiteral`。\n\n为了测试这个替代生产者是否有效，请考虑以下后台\
    \ bean：\n\n```java\n@Named @RequestScoped\npublic class TestBean {\n    @Inject\
    \ @RequestParameterMap\n    private Map requestParameterMap;\n    public String\
    \ getTest() {\n        return requestParameterMap.get(\"test\");\n    }\n    public\
    \ String getFoo() {\n        return requestParameterMap.get(\"foo\");\n    }\n\
    }\n```\n\n以及以下 Facelet：\n\n```xml\nTest: #{testBean.test}\nFoo: #{testBean.foo}\n\
    ```\n\n部署一个包含这些工件的应用程序，并带上一个请求参数，例如“`foo=bar`”，将会发现新的 map 确实包含了原始请求参数以及我们自己添加的值。\n\
    \n## 扩展经典工件\n\n在 Jakarta Faces 中，增强或完全替换一个类型的经典方法是为该类型安装一个工厂。这种工厂的基本工作方式与前面演示的\
    \ CDI 方法大致相同；工厂返回所请求类型的实现，并获取对“先前”或“原始”类型的引用。\n\n在 Jakarta EE 中，经典通常意味着 XML，确实，经典工厂涉及\
    \ XML。具体来说，注册一个工厂需要使用`faces-config.xml`中的`<factory>`元素，以及针对每个要提供工厂的类型的特定元素。截至\
    \ Jakarta Faces 4.0，支持以下工厂：\n\n*   `<application-factory>`\n*   `<exception-handler-factory>`\n\
    *   `<external-context-factory>`\n*   `<faces-context-factory>`\n*   `<facelet-cache-factory>`\n\
    *   `<partial-view-context-factory>`\n*   `<lifecycle-factory>`\n*   `<view-declaration-language-factory>`\n\
    *   `<tag-handler-delegate-factory>`\n*   `<render-kit-factory>`\n*   `<visit-context-factory>`\n\
    *   `<flash-factory>`\n*   `<flow-handler-factory>`\n*   `<client-window-factory>`\n\
    *   `<search-expression-context-factory>`\n\n除此之外，还有另外一些工件可以通过类似但不同的方式进行替换/增强；这里，没有工厂返回该类型，而是直接指定了该类型的实现。这种变体是使用`faces-config.xml`中的`<application>`元素来指定的。截至\
    \ Jakarta Faces 4.0，以下类型可以直接替换/增强：\n\n*   `<navigation-handler>`\n*   `<view-handler>`\n\
    *   `<resource-handler>`\n*   `<search-expression-handler>`\n*   `<flow-handler>`\n\
    *   `<state-manager>`\n*   `<action-listener>`\n\n请注意，所有这些都是单例。从 Jakarta Faces\
    \ 运行时的角度来看，每种类型只有一个实例，但通过包装支持多个各自添加功能的实现，从而形成一个链（实现 A 包装实现 B，包装实现 C，等等）。\n\n上述用于每种类型的特定元素立即凸显了经典方法的一个问题；Jakarta\
    \ Faces *必须*为每个要以此方式替换/增强的特定类型提供显式支持。相比之下，CDI 方法允许我们替换/增强几乎任何类型，而无需 Jakarta Faces\
    \ 提供任何特殊支持，除了 Jakarta Faces 对该工件使用 CDI 之外。\n\n好的一面是，与 Jakarta Faces 版本相比，工厂实现目前稍微简单一些，因为“先前”或“原始”类型只是在其构造函数中被传递给它，而不必使用冗长的代码进行查找。\n\
    \n作为示例，我们将展示如何增强外部上下文工厂。为此，我们从在`faces-config.xml`中提到的注册开始。\n\n```xml\n<factory>\n\
    \    <external-context-factory>\n        com.example.project.ExternalContextProducer\n\
    \    </external-context-factory>\n</factory>\n```\n\n然后实现如下所示：\n\n```java\npublic\
    \ class ExternalContextProducer extends ExternalContextFactory {\n    public ExternalContextProducer(ExternalContextFactory\
    \ wrapped) {\n        super(wrapped);\n    }\n\n    @Override\n    public ExternalContext\
    \ getExternalContext\n        (Object context, Object request, Object response)\n\
    \    {\n        ExternalContext previousExternalContext =\n            getWrapped().getExternalContext(context,\
    \ request, response);\n        ExternalContext newExternalContext =\n        \
    \    new ExternalContextWrapper(previousExternalContext) {\n                @Override\n\
    \                public String getAuthType() {\n                    return \"\
    OurOwnAuthType\";\n                }\n            };\n        return newExternalContext;\n\
    \    }\n}\n```\n\n这里有几件事需要注意。首先，这种类型的每个工厂都必须继承自一个预先定义好的父工厂，在本例中是`ExternalContextFactory`。其次，有一个必须遵循的隐式契约，即完全按照示例中所示实现构造函数。也就是说，添加一个公共构造函数，其单个参数的类型与超类完全相同，并将此参数传递给超类构造函数。然后，该实例可以在其他方法中使用`getWrapped()`方法获得。\n\
    \n测试这确实有效相对容易。我们使用与 CDI 版本类似的后台 bean：\n\n```java\n@Named @RequestScoped\npublic\
    \ class TestBean {\n    @Inject\n    private ExternalContext externalContext;\n\
    \n    public String getAuth() {\n        return externalContext.getAuthType();\n\
    \    }\n}\n```\n\n以及以下 Facelet：\n\n```xml\nTest: #{testBean.auth}\n```\n\n由于外部上下文也是可以通过\
    \ CDI 注入的类型，细心的读者可能会想知道，如果同时为该类型提供了 CDI 替代生产者和经典工厂会发生什么。答案是，严格来说，这并未被规范明确说明（因此是未定义行为），但在实践中，强烈暗示经典工厂被用作最终获取外部上下文的来源。这意味着`ExternalContext`的替代生产者只会影响`ExternalContext`的直接注入，而不会影响通过任何其他方式获取此类型的情况，例如，通过调用`FacesContext#getExternalContext()`。这是用户应该清楚意识到的事情。不过，预计未来的规范修订版将使\
    \ CDI 生产者成为初始来源。\n\n## 插件\n\n除了替代生产者和工厂之外，Jakarta Faces 提供的另一种扩展类型本质上是插件。这里，没有替换或增强核心的\
    \ Jakarta Faces 类型，而是向运行时的某些部分添加了额外的功能。因此，这些添加中的大多数必须以某种方式声明它们确切添加的内容，这与仅提供类型`X`或`Y`实现的工厂不同。\n\
    \n插件作为`faces-config.xml`中`<application>`元素的子元素添加，就像前面提到的一些工厂类类型一样。支持以下插件：\n\n\
    *   `<el-resolver>`\n*   `<search-keyword-resolver>`"
  raw: 'It’s expected that the task of obtaining this “previous” or

    “original” type will be made easier in a future revision of any of the

    specs involved. For instance, a future version of Jakarta Faces will

    likely introduce ready-to-use annotation literals for its (CDI) annotations, such
    as the

    `RequestParameterMapAnnotationLiteral`

    shown here.


    In order to test that this alternative producer works, consider the

    following backing bean:


    ```

    @Named @RequestScoped

    public class TestBean {

    @Inject @RequestParameterMap

    private Map requestParameterMap;

    public String getTest() {

    return requestParameterMap.get("test");

    }

    public String getFoo() {

    return requestParameterMap.get("foo");

    }

    }

    ```


    and the following Facelet:


    ```


    Test: #{testBean.test}

    Foo: #{testBean.foo}


    ```


    Deploying an application containing these artifacts with a request

    parameter of, say, “`foo=bar`” will reveal

    that the new map indeed contains the original request parameters as well

    as the value that we added ourselves.


    Extending Classical Artifacts

    The classical

    approach to augment or fully replace a type in Jakarta Faces is

    by installing a factory for that type. The basic way such a factory

    works is in broad lines identical to the CDI approach demonstrated

    earlier; the factory returns an implementation of the requested type and

    obtains a reference to the “previous” or “original” type.


    Being classical in Jakarta EE typically means XML, and indeed the

    classical factory involves XML. Specifically, registering a factory

    entails using the `<factory>`

    element in `faces-config.xml` and

    a specific element per type for which a factory is to be provided. As of

    Jakarta Faces 4.0, the following factories are supported:


    *   `<application-factory>`


    *   `<exception-handler-factory>`


    *   `<external-context-factory>`


    *   `<faces-context-factory>`


    *   `<facelet-cache-factory>`


    *   `<partial-view-context-factory>`


    *   `<lifecycle-factory>`


    *   `<view-declaration-language-factory>`


    *   `<tag-handler-delegate-factory>`


    *   `<render-kit-factory>`


    *   `<visit-context-factory>`


    *   `<flash-factory>`


    *   `<flow-handler-factory>`


    *   `<client-window-factory>`


    *   `<search-expression-context-factory>`


    Next to these, there are another number of artifacts that can be

    replaced/augmented in a somewhat similar but still different way; here,

    there’s no factory returning the type, but an implementation of the type

    is specified directly. This variant

    is specified using the `<application>`

    element in `faces-config.xml`. As

    of Jakarta Faces 4.0, the following types can be replaced/augmented

    directly:


    *   `<navigation-handler>`


    *   `<view-handler>`


    *   `<resource-handler>`


    *   `<search-expression-handler>`


    *   `<flow-handler>`


    *   `<state-manager>`


    *   `<action-listener>`


    Note that all of these are singletons. From the Jakarta Faces runtime

    point of view, there’s only one of each, but multiple implementations

    each adding something are supported by means of wrapping, which

    therefore forms a chain (implementation A wrapping implementation B,

    wrapping implementation C, etc.).

    The aforementioned specific elements used for each type immediately

    highlight an issue with the classical approach; Jakarta Faces

    *has* to provide explicit support for each specific type to be

    replaced/augmented in this way. By contrast, the CDI approach allows us

    to pretty much replace/augment any type without requiring any special

    support from Jakarta Faces other than that Jakarta Faces uses CDI for

    that artifact.

    On the bright side, the factory implementation is currently somewhat

    simpler compared to the Jakarta Faces version, as the “previous” or

    “original” type is simply being passed to it in its constructor instead

    of having to be looked up using verbose code.


    As an example, we’ll show how to augment the external context factory. For this,
    we

    start with the mentioned registration in `faces-config.xml`.


    ```


    com.example.project.ExternalContextProducer


    ```


    The implementation then looks as follows:


    ```

    public class ExternalContextProducer extends ExternalContextFactory {

    public ExternalContextProducer(ExternalContextFactory wrapped) {

    super(wrapped);

    }

    @Override

    public ExternalContext getExternalContext

    (Object context, Object request, Object response)

    {

    ExternalContext previousExternalContext =

    getWrapped().getExternalContext(context, request, response);

    ExternalContext newExternalContext =

    new ExternalContextWrapper(previousExternalContext) {

    @Override

    public String getAuthType() {

    return "OurOwnAuthType";

    }

    };

    return newExternalContext;

    }

    }

    ```


    There are a few things to observe here. First of all, every factory

    of this kind has to inherit from a predescribed parent factory, which in

    this case is `ExternalContextFactory`.

    Second, there’s an implicit contract that must be followed, and that’s

    implementing the constructor exactly as shown in the example. That is,

    add a public constructor with a single parameter the exact same type as

    the superclass, and pass this parameter on to the super constructor.

    This instance is then available in other methods using the `getWrapped()`

    method  .


    Testing that this indeed works is relatively easy. We use a similar

    backing bean as with the CDI version:


    ```

    @Named @RequestScoped

    public class TestBean {

    @Inject

    private ExternalContext externalContext;

    public String getAuth() {

    return externalContext.getAuthType();

    }

    }

    ```


    and the following Facelet:


    ```


    Test: #{testBean.auth}


    ```


    As the external context is also a type that’s injectable via CDI, the

    observant reader may wonder what happens when both a CDI alternative

    producer and a classic factory are provided for that type. The answer is

    that this is strictly speaking not specified (thus undefined behavior),

    yet in practice, it’s strongly implied that the classic factory is used

    as the source to ultimately get the external context from. This means

    that an alternative producer for `ExternalContext` will

    only affect the direct injection of `ExternalContext`, and

    not any situation when this type is obtained in any other way, for

    instance, by calling `FacesContext#getExternalContext()`*.*

    This is something users should clearly be aware of. The expectation is,

    though, that a future revision of the spec will make a CDI producer the

    initial source.


    Plug-ins

    A different type of extending that Jakarta Faces offers next to the

    alternative producers and factories is what’s essentially a plug-in.

    Here, no core Jakarta Faces type is replaced or augmented, but an

    additional functionality is added to some part of the runtime. Most of

    these additions, therefore, have to declare in some way what it is they

    are exactly adding, which is different from the

    factories which just provided an implementation of type `X` or `Y`.


    Plug-ins are added as elements of the `<application>`

    element in `faces-config.xml`,

    just as some of the factory-like types mentioned earlier. The following

    are supported:


    *   `<el-resolver>`


    *   `<search-keyword-resolver>`'
  trans: '

    预计在将来修订任何相关规范时，获取此“先前”或“原始”类型的任务将变得更加容易。例如，未来版本的 Jakarta Faces 可能会为其（CDI）注解引入现成的注解字面量，例如此处展示的
    `RequestParameterMapAnnotationLiteral`。


    为了测试这个替代生产者是否有效，请考虑以下后台 bean：


    ```

    @Named @RequestScoped

    public class TestBean {

    @Inject @RequestParameterMap

    private Map requestParameterMap;

    public String getTest() {

    return requestParameterMap.get("test");

    }

    public String getFoo() {

    return requestParameterMap.get("foo");

    }

    }

    ```


    以及以下 Facelet：


    ```


    Test: #{testBean.test}

    Foo: #{testBean.foo}


    ```


    部署一个包含这些工件且带有请求参数（例如“`foo=bar`”）的应用程序，将会发现新的映射确实包含了原始请求参数以及我们自己添加的值。


    扩展经典工件

    在 Jakarta Faces 中，增强或完全替换某个类型的经典方法是为该类型安装一个工厂。这种工厂的基本工作方式与之前演示的 CDI 方法大致相同；工厂返回所请求类型的实现，并获取对“先前”或“原始”类型的引用。


    在 Jakarta EE 中，“经典”通常意味着 XML，确实，经典工厂涉及 XML。具体来说，注册工厂需要在 `faces-config.xml` 中使用
    `<factory>` 元素，并为每个需要提供工厂的类型使用特定的元素。截至 Jakarta Faces 4.0，支持以下工厂：


    *   `<application-factory>`

    *   `<exception-handler-factory>`

    *   `<external-context-factory>`

    *   `<faces-context-factory>`

    *   `<facelet-cache-factory>`

    *   `<partial-view-context-factory>`

    *   `<lifecycle-factory>`

    *   `<view-declaration-language-factory>`

    *   `<tag-handler-delegate-factory>`

    *   `<render-kit-factory>`

    *   `<visit-context-factory>`

    *   `<flash-factory>`

    *   `<flow-handler-factory>`

    *   `<client-window-factory>`

    *   `<search-expression-context-factory>`


    除此之外，还有另外一些工件可以通过类似但略有不同的方式进行替换/增强；这里，没有返回该类型的工厂，而是直接指定了该类型的实现。这种变体是通过 `faces-config.xml`
    中的 `<application>` 元素来指定的。截至 Jakarta Faces 4.0，以下类型可以直接替换/增强：


    *   `<navigation-handler>`

    *   `<view-handler>`

    *   `<resource-handler>`

    *   `<search-expression-handler>`

    *   `<flow-handler>`

    *   `<state-manager>`

    *   `<action-listener>`


    请注意，所有这些类型都是单例。从 Jakarta Faces 运行时的角度来看，每种类型只有一个实例，但通过包装的方式支持多个实现各自添加功能，从而形成一个链（实现
    A 包装实现 B，实现 B 包装实现 C，依此类推）。

    上述为每种类型使用的特定元素立即凸显了经典方法的一个问题；Jakarta Faces *必须*为每个要以这种方式替换/增强的特定类型提供显式支持。相比之下，CDI
    方法允许我们替换/增强几乎任何类型，而无需 Jakarta Faces 提供特殊支持，只要 Jakarta Faces 对该工件使用 CDI 即可。

    好的一面是，与 Jakarta Faces 版本相比，当前工厂实现稍微简单一些，因为“先前”或“原始”类型只需在其构造函数中传递给它，而无需使用冗长的代码进行查找。


    作为示例，我们将展示如何增强外部上下文工厂。为此，我们从在 `faces-config.xml` 中提到的注册开始。


    ```


    com.example.project.ExternalContextProducer


    ```


    然后实现如下所示：


    ```

    public class ExternalContextProducer extends ExternalContextFactory {

    public ExternalContextProducer(ExternalContextFactory wrapped) {

    super(wrapped);

    }

    @Override

    public ExternalContext getExternalContext

    (Object context, Object request, Object response)

    {

    ExternalContext previousExternalContext =

    getWrapped().getExternalContext(context, request, response);

    ExternalContext newExternalContext =

    new ExternalContextWrapper(previousExternalContext) {

    @Override

    public String getAuthType() {

    return "OurOwnAuthType";

    }

    };

    return newExternalContext;

    }

    }

    ```


    这里有几件事需要注意。首先，每种此类工厂都必须继承自一个预先定义好的父工厂，在本例中是 `ExternalContextFactory`。其次，存在一个必须遵循的隐式契约，即完全按照示例所示实现构造函数。也就是说，添加一个公共构造函数，其单个参数的类型与超类完全相同，并将此参数传递给超类构造函数。然后，该实例可在其他方法中通过
    `getWrapped()` 方法使用。


    测试它是否确实有效相对容易。我们使用与 CDI 版本类似的后台 bean：


    ```

    @Named @RequestScoped

    public class TestBean {

    @Inject

    private ExternalContext externalContext;

    public String getAuth() {

    return externalContext.getAuthType();

    }

    }

    ```


    以及以下 Facelet：


    ```


    Test: #{testBean.auth}


    ```


    由于外部上下文也是可通过 CDI 注入的类型，细心的读者可能会想知道，如果同时为该类型提供了 CDI 替代生产者和经典工厂会发生什么。答案是，严格来说，这并未被规范明确说明（因此行为未定义），但在实践中，强烈暗示使用经典工厂作为最终获取外部上下文的来源。这意味着，`ExternalContext`
    的替代生产者只会影响 `ExternalContext` 的直接注入，而不会影响通过任何其他方式获取此类型的情况，例如，通过调用 `FacesContext#getExternalContext()`*。*
    这是用户应该清楚意识到的一点。不过，预计规范的未来修订版将使 CDI 生产者成为初始来源。


    插件

    除了替代生产者和工厂之外，Jakarta Faces 提供的另一种扩展类型本质上是插件。这里，没有替换或增强核心的 Jakarta Faces 类型，而是向运行时的某些部分添加了额外的功能。因此，这些添加中的大多数必须以某种方式声明它们确切添加的内容，这与仅提供类型
    `X` 或 `Y` 实现的工厂不同。


    插件作为 `<application>` 元素的子元素添加到 `faces-config.xml` 中，就像前面提到的一些类似工厂的类型一样。支持以下插件：


    *   `<el-resolver>`

    *   `<search-keyword-resolver>`

