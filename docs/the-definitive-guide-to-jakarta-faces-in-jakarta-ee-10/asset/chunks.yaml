    ### 部署项目


    在 *Servers* 视图中，右键点击 WildFly 服务器条目，选择 *Add and Remove*。此时会弹出 *Add and Remove*
    向导（见图 2-18），您可以在其中向服务器添加或移除 WAR 项目。请对我们新创建的项目执行此操作，然后完成向导。


    ![](img/454457_2_En_2_Fig18_HTML.png)


    图 2-18


    Add and Remove 向导，其中项目已通过移至右侧部署到服务器


    现在启动 WildFly 服务器。您可以通过选中它，然后点击绿色箭头图标（其工具提示显示“启动服务器”）来启动。当然，您也可以使用工具提示显示“以调试模式启动服务器”的
    bug 图标。*Console* 视图会短暂显示服务器启动日志。请等待服务器启动，并在 *Servers* 视图中获得 *Started* 状态（见图 2-19）。


    ![](img/454457_2_En_2_Fig19_HTML.png)


    图 2-19


    Servers 视图中状态为 Started 的 WildFly 服务器（请注意，Console 视图因有未读服务器日志而高亮显示）


    现在，在您喜欢的网络浏览器中打开一个标签页（见图 2-20），输入地址 `http://localhost:8080/project-0.0.1-SNAPSHOT/hello.xhtml`，以打开新创建的
    Jakarta Faces 页面。


    ![](img/454457_2_En_2_Fig20_HTML.png)


    图 2-20


    Chrome 浏览器中的 Hello World 页面，其中输入字段已填入文本“some message”，并且已按下提交按钮


    回到 URL，“`localhost:8080`”部分约定俗成地是任何以开发模式运行的 Jakarta EE 服务器的默认域名。GlassFish 和 TomEE
    等服务器也使用相同的地址。在 WildFly 中，URL 中的“`/project-0.0.1-SNAPSHOT`”部分默认从 Maven 生成的 WAR
    文件名推断而来，您可以在 WildFly 安装目录的 `/standalone/deployments` 文件夹中找到该文件。URL 中的这一部分在 Jakarta
    Servlet 术语中称为“上下文路径”，可通过 `HttpServletRequest#getContextPath()` 获取，在 Jakarta Faces
    中则由 `ExternalContext#getRequestContextPath()` 委托。


    如果您难以确定实际使用的上下文路径，通常可以在服务器日志中找到它。不过，具体的日志行取决于所使用的服务器。对于 WildFly，它是由 `WFLYUT0021`
    标识的行。打开 Eclipse 中的 *Console* 视图，按 `Ctrl+F` 并搜索 `WFLYUT0021`。它将显示以下行：


    ```

    WFLYUT0021: Registered web context: ''/project-0.0.1-SNAPSHOT'' for server ''default-server''

    ```


    如果您想调整 Maven 生成的 WAR 文件的文件名，从而间接调整 WildFly 中的上下文路径，可以通过在 `pom.xml` 的 `<build>`
    部分中显式指定构建的所谓最终名称来实现，方法如下：


    ```

    project


    maven-war-plugin

    3.3.2


    ```


    现在右键点击项目，选择 *Maven* ➤ *Update Project…* ➤ *OK*。这基本上会强制重建 Maven 项目。完成后，右键点击服务器并选择
    *Clean*。这基本上会强制进行干净的重新部署。如果您密切关注了服务器日志，那么 `WFLYUT0021` 行现在应该显示为


    ```

    WFLYUT0021: Registered web context: ''/project'' for server ''default-server''

    ```


    现在您可以使用 URL `http://localhost:8080/project/hello.xhtml` 访问同一页面（图 2-21）。


    ![](img/454457_2_En_2_Fig21_HTML.jpg)


    图 2-21


    Web 应用程序现在使用自定义上下文路径


    上下文路径部分也可以简单地设置为“`/`”。部署的 Web 应用程序随后将位于域根目录。如何执行此操作取决于所使用的服务器。对于 WildFly，您需要按如下方式创建
    JBoss 特定的 `jboss-web.xml`：


    ```

    src/main/webapp/WEB-INF/jboss-web.xml:


    /


    ```


    右键点击服务器并选择 *Clean*。服务器日志中的 `WFLYUT0021` 行现在应该显示为


    ```

    WFLYUT0021: Registered web context: ''/'' for server ''default-server''

    ```


    现在您可以使用 URL `http://localhost:8080/hello.xhtml` 访问同一页面（图 2-22）。


    ![](img/454457_2_En_2_Fig22_HTML.jpg)


    图 2-22


    Web 应用程序现在已部署，不带上下文路径


    我们可以更进一步，利用 Faces 4.0 引入的新“自动无扩展名映射”功能，这样我们就不再需要在 URL 中指定 `.xhtml` 扩展名。这可以通过向
    `web.xml` 添加以下条目来实现：


    ```


    jakarta.faces.AUTOMATIC_EXTENSIONLESS_MAPPING


    true


    ```


    这将指示 Jakarta Faces 自动将 FacesServlet 也映射到 URL 的无扩展名变体，允许您通过 `http://localhost:8080/hello`
    打开页面（图 2-23）。


    ![](img/454457_2_En_2_Fig23_HTML.jpg)


    图 2-23


    Web 应用程序现在无扩展名


    我们还可以更进一步，将 `hello.xhtml` 设为默认登录页面，这样也无需在 URL 中指定它。这可以通过向 `web.xml` 添加以下条目来实现：


    ```

    hello.xhtml


    ```


    这将指示服务器在请求任何文件夹时，使用该文件夹内指定的文件作为默认资源。因此，例如，如果请求“`/`”文件夹，它将搜索“`/hello.xhtml`”文件并透明地将其返回。同样，当请求“`/foo`”文件夹时，服务器将搜索“`/foo/hello.xhtml`”文件并提供服务（如果不存在，则返回
    404“未找到”）。


    现在，保存 `web.xml` 并清理服务器。回到网络浏览器，您会注意到现在也可以通过 `http://localhost:8080` 访问该网页（见图 2-24）。


    ![](img/454457_2_En_2_Fig24_HTML.jpg)


    图 2-24


    Hello World 页面现在位于根目录


    ## 安装 H2


    H2^(³) 是一个内存型 SQL 数据库。它是一个嵌入式数据库，对于快速建模和测试 Jakarta Persistence 实体非常有用，特别是与基于 Jakarta
    Persistence 实体自动生成的 SQL 表结合使用时。将 H2 添加到您的 Web 应用程序项目只需将以下依赖项添加到 `pom.xml` 的 `<dependencies>`
    部分：


    ```

    com.h2database

    h2

    2.1.210


    ```


    基本上就是这样。JDBC（Java 数据库连接）驱动程序也由此依赖项提供。

