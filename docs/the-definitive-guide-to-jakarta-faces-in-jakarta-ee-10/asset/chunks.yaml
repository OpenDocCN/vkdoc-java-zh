    你可能已经注意到，实际的标签实现使用的是 `<f:actionListener binding="#{action}">` 而不是 `action="#{action}"`。

    这实际上是一个必要的技巧，目的是为了让它能够正确地调用该方法。

    也就是说，`<method-signature>` 最初是为 UI 组件设计的，而不是为标签文件设计的。它在标签文件中会被忽略。这个问题可能会在 Faces.next
    中得到解决。目前，你可以通过 `<f:actionListener binding>` 这个技巧来绕过它。这只有一个额外的要求：你需要在标签文件客户端显式地包含方法括号，例如
    `<t:button action="#{login.submit()}">`。当你省略方法括号，写成 `<t:button action="#{login.submit}">`
    时，提交将会失败，并抛出 *jakarta.el.PropertyNotFoundException: The class ‘com.example.project.view.Login’
    does not have the property ‘submit’* 异常。


    如果你想从标签文件客户端自定义标签文件，例如，通过添加更具体的输入属性、嵌套核心标签，或者在标签或消息前/后追加内容，那么你可以使用 `<ui:define>`
    和 `<ui:insert>`，就像你习惯在主模板文件和装饰文件中使用它们一样。下面的示例演示了如何通过添加一系列新的 `<ui:insert>` 标签来增强
    `/WEB-INF/tags/field.xhtml`：


    现在，这提供了极大的灵活性！在标签文件客户端，你可以使用 `<ui:define name="beforeLabel">` 来定义一些应出现在字段标签之前的内容。你可以使用
    `<ui:define name="label">` 来完全覆盖标签。你还可以使用 `<ui:define name="insideLabel">` 在标签内部追加一些（HTML）内容，等等。下面的示例演示了如何使用
    `insideLabel` 在密码字段的标签后追加一个“忘记密码？”链接：


    请注意，`<ui:insert name="insideLabel">` 被包裹在一个 HTML `<span>` 标签中。这允许你更轻松地通过 CSS 选择最终出现在该位置上的“任何内容”，例如，你可以仅使用以下
    CSS 让它向右浮动：


    ```

    .field label > span {

    float: right;

    }

    ```


    标签文件客户端中任何未嵌套在 `<ui:define>` 中的内容，最终都会进入嵌套在所选输入组件中的无名 `<ui:insert>` 标签内。这允许你轻松地为该输入组件嵌套任何
    `<f:xxx>` 核心标签：


    这个特定示例通过当 `KeyBoardEvent.key` 等于“`Enter`”时返回 `false` 来阻止表单在按下*回车*键时提交，并注册一个正则表达式验证器，通过匹配正则表达式模式“`[0-9]{4}`”来仅接受四位数字的值，并指示
    Jakarta Faces 在值更改事件发生时通过 Ajax 更新由“`otherField`”标识的组件。

    回到 `/WEB-INF/tags/field.xhtml` 中的标签文件实现，你可能已经注意到这里使用了 Jakarta Tags `<c:when>`
    而不是 Jakarta Faces 组件的 `rendered` 属性。这样做有优势，因为 Jakarta Tags 的生命周期与 Jakarta Faces
    组件不同。Jakarta Tags 在 Jakarta Faces 组件树即将构建时（视图构建期间）执行。Jakarta Faces 组件在即将生成 HTML
    输出时（视图渲染期间）执行。此外，如果你使用 Jakarta Faces 自己的 `rendered` 属性，那么你会遇到“重复组件 ID”错误，因为具有相同
    ID 的多个组件会物理上存在于 Jakarta Faces 组件树中。

    如果你正在考虑使用纯 Java 代码基于至少一个视图作用域的模型动态创建组件树，那么你绝对应该重新考虑使用 Jakarta Tags。由于 Jakarta
    Tags 本身也是基于 XML 的，因此你可以将所有内容组合在一个 XHTML 文件中，最终你会为“动态”组件获得可读性和可维护性更好的代码。


    复合组件

    有时，你可能希望将一组相关的输入组件组合起来表示一个单一的模型值。一个经典的例子是使用三个 `<h:selectOneMenu>` 下拉框分别表示日、月、年，并最终绑定到后台
    bean 中的一个 `java.time.LocalDate` 属性。仅使用包含文件或标签文件来实现这一点并不简单。你需要一些额外的基于 Java 的逻辑来确保，例如，日下拉框不会根据当前选中的月份显示
    29、30 或 31 这些值，并且能够将提交的值转换为一个完整的 `LocalDate` 实例，反之亦然。但是，你不能也不应该在任何 Facelet 中放置任何
    Java 代码。

    你可能会想，只需为此创建一个专用的后台 bean。但这也不够。它不允许你通过 Jakarta Faces 阶段干净地挂接到组件的生命周期：从多个组件收集单个提交的值，将它们转换为一个单一的
    `LocalDate` 实例，必要时在验证阶段抛出转换器异常，并让 Jakarta Faces 生命周期自动跳过剩余阶段。后台 bean 的 setter
    方法或 action 方法远非放置该逻辑的正确位置。无论如何，它被调用时都太晚了。而且，能够通过 Facelet 中任意位置的 EL 表达式引用并可能操作同一个后台
    bean，这感觉很奇怪。

    这正是复合组件发挥作用的地方：将一堆现有的 Jakarta Faces 组件组合成一个虚拟的单一组件，该组件绑定到一个单一的模型值，并最终以与使用普通 `<h:inputText>`
    完全相同的方式使用它。想象一个 `<t:inputLocalTime>` 复合组件，它由两个绑定到单一 `java.time.LocalTime` 模型值的
    `<h:selectOneMenu>` 组件组成。你可以使用一个完整的 `UIComponent` 实例作为所谓的后台组件，而不是使用后台 bean。

