    当托管 Bean 是请求作用域并且因此在每个请求上重新创建时，此构造将不起作用。当下拉列表更改时，它会创建一个新的请求作用域 Bean 实例，在其中设置标题，并渲染自由文本字段，最后请求作用域
    Bean 实例被销毁。当表单提交时，它会创建一个新的请求作用域 Bean 实例，因此没有客户标题，当 Jakarta Faces 在应用请求值阶段（第二阶段）检查自由文本字段的
    `rendered` 属性并发现它为 `false` 时，它最终根本不会处理该自由文本字段。此构造仅在托管 Bean 是视图作用域时才有效，因为在下拉列表更改期间设置的客户标题在表单提交的应用请求值阶段（第二阶段）仍然可用。


    但是，有一种变通方法。你可以让 `rendered` 属性检查 HTTP 请求参数而不是模型值。如第 4 章所述，HTTP 请求参数名称由组件的客户端 ID
