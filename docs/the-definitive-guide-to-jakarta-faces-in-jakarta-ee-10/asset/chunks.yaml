- fmt: "# Custom Principals\n\nThe default principal that we can obtain from the security\
    \ context contains very little other than just the name or, more exactly, the\
    \ caller principal name (also known as the user principal name). This is typically\
    \ a unique name and often, but not necessarily, the name the caller used to authenticate\
    \ with.\n\nIn practice, a web application almost always needs more information\
    \ than just this name, and a richer application-specific model object representing\
    \ the user is often desired. The lifetime of this model object does need to be\
    \ very tightly coupled to that of the principal. For example, if the caller is\
    \ logged out mid-request, the associated model object must disappear right away,\
    \ and if the caller is logged in again right after (possibly still in the same\
    \ request), a new model object must become available.\n\nThere are various patterns\
    \ to realize this, some of them including Servlet filters and others containing\
    \ CDI producers. The pattern we’re going to show here, though, involves a custom\
    \ principal.\n\nA custom principal means that a specific `Principal` type is returned\
    \ from the identity store, instead of just providing a `String` and letting the\
    \ container decide the type. This specific `Principal` type can then either *contain*\
    \ our model object (aggregation) or *be* the model object (inheritance). We’ll\
    \ give an example of the aggregation approach here.\n\nFirst, consider the following\
    \ custom `Principal`:\n\n```java\npublic class UserPrincipal extends CallerPrincipal\
    \ {\n    private final User user;\n    public UserPrincipal(User user) {\n   \
    \     super(user.getEmail());\n        this.user = user;\n    }\n    public User\
    \ getUser() {\n        return user;\n    }\n}\n```\n\nThis principal extends from\
    \ `jakarta.security.enterprise.CallerPrincipal` that is the Jakarta EE Security\
    \ API–specific caller principal representation.\n\nWith this `Principal` implementation,\
    \ we can now adjust the identity store that we presented earlier to return our\
    \ custom principal instead.\n\n```java\n@ApplicationScoped\npublic class UserServiceIdentityStore\
    \ implements IdentityStore {\n    @Inject\n    private UserService userService;\n\
    \n    @Override\n    public CredentialValidationResult validate(Credential credential)\
    \ {\n        UsernamePasswordCredential login =\n            (UserNamePasswordCredential)\
    \ credential;\n        String email = login.getCaller();\n        String password\
    \ = login.getPasswordAsString();\n        Optional optionalUser =\n          \
    \  userService.findByEmailAndPassword(email, password);\n        if (optionalUser.isPresent())\
    \ {\n            User user = optionalUser.get();\n            return new CredentialValidationResult(\n\
    \                new UserPrincipal(user), // Principal instead of String.\n  \
    \              user.getRolesAsStrings()\n            );\n        }\n        else\
    \ {\n            return CredentialValidationResult.INVALID_RESULT;\n        }\n\
    \    }\n}\n```\n\nSubsequently, we can access our model object again from an injected\
    \ security context.\n\n```java\n@Inject\nprivate SecurityContext securityContext;\n\
    [...]\nOptional OptionalUser =\n    securityContext.getPrincipalsByType(UserPrincipal.class)\n\
    \        .stream()\n        .map(e -> e.getUser())\n        .findAny();\n```\n\
    \n# Conditionally Rendering Based on Access\n\nIn web applications, one often\
    \ wants to render parts of a view differently based on whether a caller is authenticated\
    \ or not and if so based on what roles this caller is in. Jakarta Faces component\
    \ tags don’t really need special attributes for this, as the existing implicit\
    \ objects combined with expression language are powerful enough to do most of\
    \ the checks needed for this.\n\nOne of the most common checks is determining\
    \ whether the user is authenticated. This was briefly shown in the `index.xhtml`\
    \ view earlier:\n\n```xhtml\n<h:outputText value=\"Logged-in as #{request.userPrincipal}\"\
    \n              rendered=\"#{not empty request.userPrincipal}\"/>\n```\n\nYou\
    \ can, of course, also use the `rendered` attribute of any Jakarta Faces component\
    \ here.\n\n```xhtml\n<h:panelGroup rendered=\"#{not empty request.userPrincipal}\"\
    >\n    Logged-in as #{request.userPrincipal}\n</h:panelGroup>\n```\n\nHowever,\
    \ as you learned in the section “Jakarta Tags” in Chapter [3](#454457_2_En_3_Chapter.xhtml),\
    \ this will only end up in a slightly more verbose component tree. Moreover, the\
    \ `rendered` attribute checks will be done throughout the Jakarta Faces life cycle\
    \ over and over, while Jakarta Tags are executed only once during view build time.\n\
    \nNote that we’re using the implicit object `#{request}` here instead of the more\
    \ general `SecurityContext`. This is because in Jakarta EE 8, there’s no implicit\
    \ EL object available corresponding to this `SecurityContext`. In Jakarta EE Security,\
    \ as well as in the Jakarta Servlet API (from which the request, which is of type\
    \ `HttpServletRequest`, originates), it’s defined that a `null` return from `getUserPrincipal()`\
    \ means the user is not authenticated. A better alignment between Jakarta EE Security\
    \ and Expression Language is planned for a future version of Jakarta EE.\n\nAnother\
    \ common check as mentioned is to test for the caller being in a specific role.\
    \ Here too we can use the implicit object `#{request}`, as shown in the following:\n\
    \n```xhtml\n<h:outputText value=\"You have the foo role!\"\n              rendered=\"\
    #{request.isUserInRole('foo')}\"/>\n```\n\nIt’s good to remember that as explained\
    \ in the beginning of this chapter, the role “`foo`” doesn’t have to be something\
    \ that we would call a role in our normal usage of the word. That is, it doesn’t\
    \ have to be something like “`admin`”, or “`manager`”. In fact, for such very\
    \ local usage as in a fragment on a view, it’s often preferred to use a finer-grained\
    \ name (e.g., “`CAN_UPDATE_SALARY`”). A common technique is to map fine-grained\
    \ roles to more coarse-grained roles, such as, indeed, “`ADMIN`”. Via this technique,\
    \ a user is given these more coarse-grained roles, and the data store that stores\
    \ the authentication data then only contains these coarse-grained roles as well.\
    \ When an identity store such as the one we saw earlier retrieves this authentication\
    \ data for a certain caller and sees “`ADMIN`”, it would return a collection of\
    \ roles to which “`ADMIN`” is mapped (e.g., `{\"CAN_UPDATE_SALARY\", \"CAN_ADJUST_MARGINS\"\
    , ...}`).\n\nA special role that we can test for is the “`**`” role that is an\
    \ alternative for the `#{not empty request.userPrincipal}` check. This role is\
    \ implicitly assigned to any authenticated caller, but with the caveat that the\
    \ application has not declared this in any way. If it has done so, “`**`” loses\
    \ its special meaning and is just another opaque string for which the security\
    \ system explicitly tests. Using the “`**`” check, the first fragment that we\
    \ showed in this section looks as follows:\n\n```xhtml\n<h:outputText value=\"\
    Logged-in as #{request.userPrincipal}\"\n              rendered=\"#{request.isUserInRole('**')}\"\
    />\n```\n\nIn the standard Jakarta EE programmatic APIs, there are no methods\
    \ available to test whether the caller is in any of two or more roles, or in all\
    \ of two or more roles. If this is required, utility methods such as shown in\
    \ the following code can be used:\n\n```java\npublic static boolean isInAnyRole\n\
    \    (HttpServletRequest request, String... roles)\n{\n    for (String roles :\
    \ roles) {\n        if (request.isUserInRole(role)) {\n            return true;\n\
    \        }\n    }\n    return false;\n}\n\npublic static boolean isInAllRoles\n\
    \    (HttpServletRequest request, String... roles)\n{\n    for (String roles :\
    \ roles) {\n        if (!request.isUserInRole(role)) {\n            return false;\n\
    \        }\n    }\n    return true;\n}\n```"
  raw: 'Custom Principals

    The default principal that we can

    obtain from the security context contains very little other than just

    the name or, more exactly, the caller principal name (also known as the

    user principal name). This is typically a unique name and often, but not

    necessarily, the name the caller used to authenticate with.

    In practice, a web application almost always needs more information

    than just this name, and a richer application-specific model object

    representing the user is often desired. The lifetime of this model

    object does need to be very tightly coupled to that of the principal.

    For example, if the caller is logged out mid-request, the associated

    model object must disappear right away, and if the caller is logged in

    again right after (possibly still in the same request), a new model

    object must become available.

    There are various patterns to realize this, some of them including

    Servlet filters

    and others containing CDI producers. The pattern we’re going to show

    here, though, involves a custom principal.

    A custom principal means that a specific `Principal` type is

    returned from the identity store, instead of just providing a `String` and letting

    the container decide the type. This specific `Principal` type can

    then either *contain* our model object (aggregation) or

    *be* the model object (inheritance). We’ll give an example of the

    aggregation approach here.


    First, consider the following custom `Principal`:


    ```

    public class UserPrincipal extends CallerPrincipal {

    private final User user;

    public UserPrincipal(User user) {

    super(user.getEmail());

    this.user = user;

    }

    public User getUser() {

    return user;

    }

    }

    ```


    This principal extends from `jakarta.security.enterprise.CallerPrincipal`

    that is the Jakarta EE Security API`–`specific caller

    principal representation.


    With this `Principal`

    implementation, we can now adjust the identity store that we presented

    earlier to return our custom principal instead.


    ```

    @ApplicationScoped

    public class UserServiceIdentityStore implements IdentityStore {

    @Inject

    private UserService userService;

    @Override

    public CredentialValidationResult validate(Credential credential) {

    UsernamePasswordCredential login =

    (UserNamePasswordCredential) credential;

    String email = login.getCaller();

    String password = login.getPasswordAsString();

    Optional optionalUser =

    userService.findByEmailAndPassword(email, password);

    if (optionalUser.isPresent()) {

    User user = optionalUser.get();

    return new CredentialValidationResult(

    new UserPrincipal(user), // Principal instead of String.

    user.getRolesAsStrings()

    );

    }

    else {

    return CredentialValidationResult.INVALID_RESULT;

    }

    }

    }

    ```


    Subsequently, we can access our model object again from an injected

    security context.


    ```

    @Inject

    private SecurityContext securityContext;

    [...]

    Optional OptionalUser =

    securityContext.getPrincipalsByType(UserPrincipal.class)

    .stream()

    .map(e -> e.getUser())

    .findAny();

    ```


    Conditionally Rendering Based on Access

    In web applications, one often wants to render parts of a view

    differently based on whether a caller is authenticated or not and if so

    based on what roles this caller is in.

    Jakarta Faces

    component tags don’t really need special attributes for this, as the

    existing implicit objects combined with expression language are powerful

    enough to do most of the checks needed for this.


    One of the most common checks is determining whether the user is

    authenticated. This was briefly shown in the `index.xhtml` view

    earlier:


    ```

    Logged-in as #{request.userPrincipal}


    ```


    You can, of course, also use the `rendered` attribute of

    any Jakarta Faces component here.


    ```

    Logged-in as #{request.userPrincipal}


    ```


    However, as you learned in the section “Jakarta Tags” in Chapter

    [3](#454457_2_En_3_Chapter.xhtml), this will only end up in a

    slightly more verbose component tree. Moreover, the `rendered` attribute

    checks will be done throughout the Jakarta Faces life cycle over and

    over, while Jakarta Tags are executed only once during view build

    time.

    Note that we’re using the implicit object `#{request}` here

    instead of the more general `SecurityContext`*.*

    This is because in Jakarta EE 8, there’s no implicit EL object available

    corresponding to this `SecurityContext`. In

    Jakarta EE Security, as well as in the Jakarta Servlet API (from which

    the request, which is of type `HttpServletRequest`,

    originates), it’s defined that a `null` return from

    `getUserPrincipal()`

    means the user is not authenticated. A better alignment between Jakarta

    EE Security and Expression Language is planned for a future version of

    Jakarta EE.


    Another common check as mentioned is

    to test for the caller being in a specific role. Here too we can use the

    implicit object `#{request}`, as shown

    in the following:


    It’s good to remember that as explained in the beginning of this

    chapter, the role “`foo`” doesn’t have to

    be something that we would call a role in our normal usage of the word.

    That is, it doesn’t have to be something like “`admin`”, or “`manager`”. In fact,

    for such very local usage as in a fragment on a view, it’s often

    preferred to use a finer-grained name (e.g., “`CAN_UPDATE_SALARY`”).

    A common technique is to map fine-grained roles to more coarse-grained

    roles, such as, indeed, “`ADMIN`”. Via this

    technique, a user is given these more coarse-grained roles, and the data

    store that stores the authentication data then only contains these

    coarse-grained roles as well. When an identity store such as the one we

    saw earlier retrieves this authentication data for a certain caller and

    sees “`ADMIN`”,

    it would return a collection of roles to which “`ADMIN`” is mapped

    (e.g., `{"CAN_UPDATE_SALARY", "CAN_ADJUST_MARGINS", ...}`).


    A special role that we can test for is the “`**`” role that is an

    alternative for the `#{not empty request.userPrincipal}` check. This role is implicitly
    assigned to

    any authenticated caller, but with the caveat that the application has

    not declared this in any way. If it has done so, “`**`” loses its special

    meaning and is just another opaque string for which the security system

    explicitly tests. Using the “`**`” check, the first

    fragment that we showed in this section looks as follows:


    ```

    Logged-in as #{request.userPrincipal}


    ```


    In the standard Jakarta EE programmatic APIs, there are no methods

    available to test whether the caller is in any of two or more roles, or in all
    of two

    or more roles. If this is required, utility methods such as shown in the

    following code can be used:


    ```

    public static boolean isInAnyRole

    (HttpServletRequest request, String... roles)

    {

    for (String roles : roles) {

    if (request.isUserInRole(role)) {

    return true;

    }

    }

    return false;

    }

    public static boolean isInAllRoles

    (HttpServletRequest request, String... roles)

    {

    for (String roles : roles) {

    if (!request.isUserInRole(role)) {

    return false;

    }

    }

    return true;

    }

    ```'
