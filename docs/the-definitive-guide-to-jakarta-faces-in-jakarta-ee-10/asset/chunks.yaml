    ## SelectItem Groups


    In case you’d like to group a bunch of options under a common label, then you
    can use the `<f:selectItemGroup>` and `<f:selectItemGroups>` tags nested in the
    selection component for this. The following is a kickoff example:


    The `<h:selectOneMenu>` will render each group as HTML `<optgroup>`:

    ![](images/454457_2_En_4_Chapter/454457_2_En_4_Figf_HTML.jpg)


    The `<h:selectOneRadio layout="pageDirection">` will render it as a nested table:

    ![](images/454457_2_En_4_Chapter/454457_2_En_4_Figg_HTML.jpg)


    The `<h:selectManyListbox>` will render each group as HTML `<optgroup>`:

    ![](images/454457_2_En_4_Chapter/454457_2_En_4_Figh_HTML.jpg)


    The `<h:selectManyCheckbox layout="pageDirection">` will render it as a nested
    table:

    ![](images/454457_2_En_4_Chapter/454457_2_En_4_Figi_HTML.jpg)


    Note the importance of the `layout="pageDirection"` attribute in `<h:selectOneRadio>`
    and `<h:selectManyCheckbox>`. This will look much better than the default of `layout="lineDirection"`
    which would render everything in a big single table row.


