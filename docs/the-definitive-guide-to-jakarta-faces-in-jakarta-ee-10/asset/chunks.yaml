- fmt: '### Configuring DataSource


    In order to be able to interact with an SQL database, we need to configure a so-called
    data source in the web application project. This can be done by adding the following
    section to the `web.xml`:


    ```

    java:global/DataSourceName

    org.h2.jdbcx.JdbcDataSource

    jdbc:h2:mem:test;MODE=LEGACY;DB_CLOSE_DELAY=-1

    ```


    The `<name>` of the data source represents the JNDI (Java Naming and Directory
    Interface) name. The `java:global/` part is mandatory. The `DataSourceName` part
    is free to your choice. It’s the one that ultimately needs to be registered in
    the `persistence.xml` later on. The `<class-name>` represents the fully qualified
    name of the `javax.sql.DataSource` implementation of the JDBC driver being used.
    The `<url>` represents the JDBC driver–specific URL format. The syntax is dependent
    on the JDBC driver being used. For an in-memory H2 database with a database name
    of `test`, that’s thus `jdbc:h2:mem:test`. The H2-specific `MODE=LEGACY` path
    parameter is basically a work around for Hibernate incompatibility with SQL `IDENTITY`
    type, you could try removing this part in a newer Hibernate version. The H2-specific
    `DB_CLOSE_DELAY=-1` path parameter basically instructs its JDBC driver not to
    automatically shut down the database when it hasn’t been accessed for some time,
    even though the application server is still running.


    After configuring the data source, a concrete instance of the `javax.sql.DataSource`
    can now be injected in any servlet container managed artifact such as a servlet
    or filter as follows:


    ```

    @Resource

    private DataSource dataSource;

    ```


    You could get an SQL connection from it via `DataSource#getConnection()` for the
    plain old JDBC work. However, as we’re going to use pure Jakarta EE, it’s better
    to use Jakarta EE’s own Jakarta Persistence for this instead.


    ### Configuring Jakarta Persistence


    In order to familiarize Jakarta Persistence with the newly added data source,
    we need to edit the persistence unit entry in the `persistence.xml` as follows:


    ```

    java:global/DataSourceName

    ```


    You see, the data source is identified by its JNDI name which we configured earlier
    in `web.xml`. You’ll also notice a Jakarta Persistence–specific property `jakarta.persistence.schema-generation.database.action`
    with a value of `drop-and-create` which basically means that the web application
    should automatically drop and create all SQL tables based on Jakarta Persistence
    entities. This is, of course, only useful for prototyping purposes, as we’re going
    to do with this project in the rest of the book. For real-world applications,
    you’d better pick either `create` or `none` (which is the default). Or better
    yet, a real data base server such as PostgreSQL instead of an in-memory database.


    The transaction type being set to `JTA` basically means that the application server
    itself should automatically manage database transactions. This way, every method
    invocation on a Jakarta Enterprise Beans service class from its client (usually,
    a Jakarta Faces backing bean class) transparently starts a new transaction, and
    when the service method returns to the client (usually, the calling backing bean),
    then the transaction is automatically committed and flushed. And any runtime exception
    from a service method automatically rolls back the transaction.


    ### Creating the Jakarta Persistence Entity


    Now we’re going to create a Jakarta Persistence entity. Basically, it’s a JavaBean
    class that represents a single record of a database table. Each bean property
    is mapped to a particular column of the database table. Normally, Jakarta Persistence
    entities are modeled against existing database tables. But as you’ve read in the
    previous section, “Configuring Jakarta Persistence,” about the `persistence.xml`,
    it’s also possible to do it the other way round: database tables are generated
    based on Jakarta Persistence entities.


    Right-click the `src/main/java` folder of the project and choose *New* ➤ *Jakarta
    Persistence Entity*. In the wizard, set the *Package* to `com.example.project.model`
    and set the *Class name* to `Message`. The rest of the fields can be kept default
    or empty (see Figure [2-25](#454457_2_En_2_Chapter.xhtml#Fig25)). Click *Finish*.


    ![](images/454457_2_En_2_Chapter/454457_2_En_2_Fig25_HTML.jpg)


    Figure 2-25


    The New Jakarta Persistence Entity wizard in Eclipse


    Modify the new entity class as follows:


    ```

    package com.example.project.model;

    import java.io.Serializable;

    import jakarta.persistence.Column;

    import jakarta.persistence.Entity;

    import jakarta.persistence.GeneratedValue;

    import jakarta.persistence.GenerationType;

    import jakarta.persistence.Id;

    import jakarta.persistence.Lob;

    import jakarta.validation.constraints.NotNull;

    @Entity

    public class Message implements Serializable {

    private static final long serialVersionUID = 1L;

    @Id @GeneratedValue(strategy=GenerationType.IDENTITY)

    private Long id;

    @Column(nullable = false) @Lob

    private @NotNull String text;

    // Add/generate getters and setters.

    }

    ```


    As a reminder, you can let Eclipse generate getters and setters by right-clicking
    anywhere in the class editor and choosing *Source* ➤ *Generate Getters and Setters*.


    We’ll briefly go through the annotations that are used here.


    - **@Entity**: This marks the bean as a Jakarta Persistence entity so that the
    Jakarta Persistence implementation will automatically collect database-related
    metadata based on all its properties.


    - **@Id @GeneratedValue(strategy=IDENTITY)**: This marks a property to be mapped
    to an SQL database column of SQL `IDENTITY` type. In MySQL terms, that’s the equivalent
    of `AUTO_INCREMENT`. In PostgreSQL terms, that’s the equivalent of `BIGSERIAL`.


    - **@Column**: This marks a property to be mapped to a regular SQL database column.
    The actual SQL database column type depends on the Java type being used. In case
    of a Java `String`, without the additional `@Lob` annotation, that’s by default
    a `VARCHAR(255)` whose length can be manipulated by `@Column(length=n)`. With
    the `@Lob` annotation, however, the SQL database column type becomes by default
    `TEXT`.


    - **@Lob**: This marks a `String` property to be mapped to an SQL database column
    of type `TEXT` instead of a limited `VARCHAR`.


    - **@NotNull**: This is actually not part of Jakarta Persistence but of “Jakarta
    Bean Validation.” To the point, it ensures that the bean property is being validated
    never to be `null` when submitting a Jakarta Faces form and when persisting the
    Jakarta Persistence entity (see also Chapter [5](#454457_2_En_5_Chapter.xhtml)).
    Also note that this basically replicates the `@Column(nullable=false)`, but that’s
    only because Jakarta Persistence doesn’t consider any Jakarta Bean Validation
    annotations as valid SQL database metadata in order to generate appropriate SQL
    tables.'
