- fmt: "# Panel-Based Output Components\n\nThese components are the `<h:panelGroup>`\
    \ and `<h:panelGrid>`, both extending from the `UIPanel` superclass. The `<h:panelGroup>`\
    \ has multiple responsibilities. It can generate an HTML `<span>`, or `<div>`,\
    \ or even `<td>`, depending on the `layout` attribute and whether it’s enclosed\
    \ in a `<h:panelGrid>`.\n\nBy default, the `<h:panelGroup>` generates just an\
    \ HTML `<span>` element, exactly like `<h:outputText>`. The main difference is\
    \ that the `<h:panelGroup>` doesn’t have a `value` attribute. Instead, the content\
    \ is represented by its children. It also doesn’t support disabling HTML escaping\
    \ or attaching a converter. That’s up to any `<h:outputText>` child. In this context,\
    \ it’s not terribly useful. The `<h:panelGroup>` is only more useful than `<h:outputText>`\
    \ when you need to be able to reference using `<f:ajax render>` an inline element\
    \ that in turn groups a bunch of closely related inline elements. Something like\
    \ the following that represents the “user profile,” which should be Ajax updatable\
    \ from within some sort of user profile edit form further down the page.\n\n```\n\
    <h:panelGroup id=\"userProfile\">\n    Welcome,\n    <h:outputText value=\"#{user.name}\"\
    \ />\n    ...\n    ...\n    ...\n</h:panelGroup>\n```\n\nWhen setting the `layout`\
    \ attribute of `<h:panelGroup>` to `block`, then it will generate an HTML `<div>`\
    \ element. In standard HTML, “inline elements”^([^(48)](#fn48)) don’t start at\
    \ a new line by default and don’t allow block element children. And “block-level\
    \ elements”^([^(49)](#fn49)) always start at a new line by default and allow inline\
    \ as well as block-level elements as children. Hence, the supported values of\
    \ the `layout` attribute of `<h:panelGroup>` are “`inline`” and “`block`”. Historically,\
    \ the `layout` attribute was only added in Jakarta Faces 1.2 after complaints\
    \ from Jakarta Faces developers about a missing Jakarta Faces component to represent\
    \ an HTML `<div>` element. This could then be used to wrap larger block-level\
    \ sections that need to be Ajax updatable; otherwise, a plain HTML `<div>` is\
    \ also sufficient.\n\n```\n<h:panelGroup id=\"userProfile\" layout=\"block\">\n\
    \    <p>Welcome, <h:outputText value=\"#{user.name}\" /></p>\n</h:panelGroup>\n\
    ```\n\nNote that it’s illegal in HTML to have a block-level element nested in\
    \ an inline element. The `<p>` is a block-level element, and hence, the `layout=\"\
    block\"` is absolutely mandatory in the preceding construct. If you don’t specify\
    \ this attribute and thus effectively let Jakarta Faces render an HTML `<span>`\
    \ element, then the web browser behavior is unspecified. The average web browser\
    \ will render the block-level element children outside the inline element and\
    \ even possibly error out when this construct is traversed by JavaScript, because\
    \ it wouldn’t necessarily find the expected block-level children within an inline\
    \ element.\n\nAlso keep in mind that in the preceding construct, the `<p>` tags\
    \ and the “Welcome” text are also updated during any Jakarta Faces Ajax update\
    \ action on the `<h:panelGroup>`. This is essentially a waste of hardware resources,\
    \ on both the server side and the client side, as those are static and never subject\
    \ to changes. When Ajax-updating things, you should preferably ensure that `<f:ajax\
    \ render>` only references components that absolutely need to be Ajax-updated\
    \ and thus not an unnecessarily large section that also covers static parts.\n\
    \nWhen the `<h:panelGroup>` is being nested in a `<h:panelGrid>` component, which\
    \ generates an HTML `<table>` element, then the `layout` attribute of `<h:panelGroup>`\
    \ is ignored, and the component will basically act as a container of components\
    \ that should ultimately end up in the very same cell of the table. That is, the\
    \ renderer of `<h:panelGrid>` considers every direct child component as an individual\
    \ table cell.\n\nGiven the following two-column `<h:panelGrid>`, which should\
    \ generate a two-column HTML table, what would you guess the actual generated\
    \ HTML output would look like?\n\n```\n<h:panelGrid columns=\"2\">\n    one\n\
    \    <h:panelGroup>two</h:panelGroup>\n    three\n    four\n    <h:panelGroup>five</h:panelGroup>\n\
    \    six\n    seven\n    <h:panelGroup>eight nine</h:panelGroup>\n</h:panelGrid>\n\
    ```\n\nEach section of template text between two Jakarta Faces components is internally\
    \ considered a single Jakarta Faces component. In Mojarra, it’s represented by\
    \ the internal `UIInstructions` component. After the view build time, the actual\
    \ component tree hierarchy is thus roughly represented as follows:\n\n```\n<h:panelGrid\
    \ columns=\"2\">\n    one\n    <h:panelGroup>two</h:panelGroup>\n    three\n \
    \   four\n    <h:panelGroup>five</h:panelGroup>\n    six\n    seven\n    <h:panelGroup>eight\
    \ nine</h:panelGroup>\n</h:panelGrid>\n```\n\nNote again that there’s no such\
    \ component as `<ui:instructions>` in Facelets. The preceding markup is purely\
    \ for visualization of the actual component tree hierarchy so that your brain\
    \ can better process it. This `<h:panelGrid>` has thus effectively six direct\
    \ children that will each end up in their own table cell. With two columns, this\
    \ will thus effectively generate three rows. Here’s the actual generated HTML\
    \ output (reformatted for readability).\n\n```\n<table>\n    <tr>\n        <td>one</td>\n\
    \        <td>two</td>\n    </tr>\n    <tr>\n        <td>three four</td>\n    \
    \    <td>five</td>\n    </tr>\n    <tr>\n        <td>six seven</td>\n        <td>eight\
    \ nine</td>\n    </tr>\n</table>\n```\n\nRendering in Chrome browser:\n![](images/454457_2_En_6_Chapter/454457_2_En_6_Figb_HTML.jpg)\n\
    \nYou see, the `<h:panelGroup>` makes sure that “five” and “eight nine” don’t\
    \ end up in the very same table cell as “six seven.” Also note that it’s unnecessary\
    \ to wrap any Jakarta Faces component in a `<h:panelGroup>` if it should represent\
    \ a single cell already. That’s why the `<h:outputText>` behind “two” didn’t need\
    \ to be wrapped in a `<h:panelGroup>`. You can, of course, do so for better readability\
    \ of the source code, but this is technically unnecessary. The following code\
    \ with explicit `<h:panelGroup>` declarations generates exactly the same HTML\
    \ output, but it is undoubtedly better parsable by a human.\n\n```\n<h:panelGrid\
    \ columns=\"2\">\n    <h:panelGroup>one</h:panelGroup>\n    <h:panelGroup>two</h:panelGroup>\n\
    \    <h:panelGroup>three four</h:panelGroup>\n    <h:panelGroup>five</h:panelGroup>\n\
    \    <h:panelGroup>six seven</h:panelGroup>\n    <h:panelGroup>eight nine</h:panelGroup>\n\
    </h:panelGrid>\n```\n\nIf you happen to have a dynamic amount of cells based on\
    \ a view-scoped iterable model, then you can nest a Jakarta Tags `<c:forEach>`\
    \ in `<h:panelGrid>` to have it generate them as a data grid with a fixed amount\
    \ of columns.\n\n```\n<h:panelGrid columns=\"2\">\n    <c:forEach items=\"#{viewProducts.products}\"\
    \ var=\"product\">\n        <h:outputText value=\"#{product.name}\" />\n     \
    \   <h:outputText value=\"#{product.description}\" />\n    </c:forEach>\n</h:panelGrid>\n\
    ```\n\nNote thus that `<ui:repeat>` is unsuitable here as compared to `<c:forEach>`,\
    \ as explained in the section “Jakarta Tags” in Chapter [3](#454457_2_En_3_Chapter.xhtml).\
    \ It will technically work just fine, but the renderer of `<h:panelGrid>` will\
    \ interpret it as a single table cell.\n\nAlso note that it’s very important for\
    \ this iterable model to be view scoped, particularly if you have Jakarta Faces\
    \ form components inside `<h:panelGrid>`. The technical reason is that during\
    \ processing the postback request, Jakarta Faces expects the iterated item behind\
    \ the submitted iteration index to be exactly the same item as it was when the\
    \ page was presented to the end user. In other words, when Jakarta Faces is about\
    \ to process a form submit, and an item has been added or removed or even reordered\
    \ in the meanwhile, causing its iteration index to be possibly changed, then the\
    \ submitted values and/or the invoked action would possibly be performed against\
    \ the wrong item currently at the initially known index. This is dangerous for\
    \ the integrity of the model. If you don’t have any Jakarta Faces form components\
    \ inside `<h:panelGrid>`, or if the model isn’t subject to changes during the\
    \ view scope, e.g., because it’s only created or updated during application startup,\
    \ then the backing bean behind `#{viewProducts}` can safely be request scoped.\n\
    \n# Data Iteration Component\n\nThere’s only one, `<h:dataTable>`, which extends\
    \ from the `UIData` superclass and generates an HTML `<table>` based on an iterable\
    \ data model whereby each item is represented as a single row. The other data\
    \ iteration component available in Jakarta Faces, the Facelets `<ui:repeat>`,\
    \ doesn’t extend from the `UIData` superclass and doesn’t emit any HTML output\
    \ and therefore doesn’t technically count as an “output component.” Also, in the\
    \ standard Jakarta Faces component set, no such component generates an HTML `<ul>`,\
    \ `<ol>`, or `<dl>`, but this can relatively easily be created as a custom component\
    \ extending from `UIData` (see also the section “Creating New Component and Renderer”\
    \ in Chapter [11](#454457_2_En_11_Chapter.xhtml))."
