    在支持此属性的浏览器上，文件浏览对话框将仅显示与 `accept` 属性中指定的、以逗号分隔的 IANA（互联网号码分配机构）媒体类型^(⁹³) 相匹配的文件。然而，这在**不支持**此属性的浏览器中^(⁹⁴)
    将不起作用，并且它也不会在服务器端进行任何验证。即使浏览器支持该属性，任何恶意的最终用户都可以轻易地操纵检索到的 HTML 文档并移除 `accept` 属性，从而能够上传不同类型的文件。


    为了能够在服务器端验证上传文件的媒体类型是否确实与指定的 `accept` 属性匹配，你可以像下面这样重写 `InputFile` 类的 `UIInput#validateValue()`
    方法。该方法在处理验证阶段（第三阶段）期间运行。


    ```

    @Override

    protected void validateValue(FacesContext context, Object newValue) {

    String accept = getAccept();

    if (accept != null && newValue instanceof Part) {

    Part part = (Part) newValue;

    String contentType = context.getExternalContext()

    .getMimeType(part.getSubmittedFileName());

    String acceptPattern = accept.trim()

    .replace("*", ".*").replaceAll("\\s*,\\s*", "|");

    if (contentType == null || !contentType.matches(acceptPattern)) {

    String message = "不可接受的文件类型";

    context.addMessage(getClientId(context), new FacesMessage(

    FacesMessage.SEVERITY_ERROR, message, null));

    setValid(false);

    }

    }

    if (isValid()) {

    super.validateValue(context, newValue);

    }

    }

    ```


    如你所见，它基本上会检查是否指定了 `accept` 属性以及是否有提交的文件，如果有，则将 `accept` 属性转换为正则表达式模式，并将提交文件的内容类型与之匹配。`accept`
    属性表示一个以逗号分隔的 IANA 媒体类型字符串，其中星号用作通配符，逗号用作析取运算符。例如，`accept` 值为 `"image/*,application/pdf"`
    会被转换为正则表达式 `"image/.*|application/pdf"`。如果不匹配，它将向 faces 上下文添加一个与该组件关联的 faces 消息，并通过调用
    `UIInput#setValid(false)` 将该组件标记为无效。最后，如果组件有效，它将把验证调用继续传递给超类。


    此外，还有一点需要提及：内容类型不是从 `Part#getContentType()` 获取的，而是根据提交的文件名从 `ExternalContext#getMimeType()`
    获取的。这只是为了覆盖客户端未发送内容类型或发送了服务器无法理解的内容类型这种边界情况。`ExternalContext#getMimeType()` 基本上是从
    `web.xml` 中的 `<mime-mapping>` 条目获取已知内容类型的列表。服务器本身有一些默认值，你可以在 Web 应用程序自己的 `web.xml`
    中覆盖或扩展它们。


    现在，文件的内容类型属性在客户端被过滤，并在服务器端被验证。一切看起来不错，但这当然只是基于文件名验证文件的内容类型，而不是文件的实际内容。想象一下，有人创建了一个
    ZIP 文件，然后简单地将文件扩展名重命名为图像文件，甚至是带有恶意软件的可执行文件。它仍然可以通过客户端和服务器端的文件类型验证。坦率地说，这个责任不在于组件本身，而在于你，即
    Jakarta Faces 开发者。正确的解决方案是创建一个自定义验证器并将其附加到组件上。下面是一个图像文件验证器的示例，借助能够解析图像文件的 Java
