    \ `<input type=submit>` | 1.0 |\n| `<h:commandLink>` | `UICommand` | `String`\
    \ | `<a onclick=form.submit()>` | 1.0 |\n| `<h:commandScript>` | `UICommand` |\
    \ - | `<script>` (用于提交表单的函数) | 2.3 |\n| `<h:dataTable>` | `UIData` | `Object[]`\
    \ | `<table>` (动态) | 1.0 |\n| `<h:doctype>` | `UIOutput` | - | `<!DOCTYPE>` |\
    \ 2.0 |\n| `<h:form>` | `UIForm` | - | `<form method=post>` | 1.0 |\n| `<h:graphicImage>`\
    \ | `UIGraphic` | - | `<img src>` | 1.0 |\n| `<h:head>` | `UIOutput` | - | `<head>`\
    \ | 2.0 |\n| `<h:inputFile>` | `UIInput` | `Part` | `<input type=file>` | 2.2\
    \ |\n| `<h:inputHidden>` | `UIInput` | `Object` | `<input type=hidden>` | 1.0\
    \ |\n| `<h:inputSecret>` | `UIInput` | `Object` | `<input type=password>` | 1.0\
