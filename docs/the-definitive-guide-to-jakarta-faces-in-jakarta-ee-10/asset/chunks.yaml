- fmt: "# Navigation\n\nSometimes, you’d like to navigate to a different Jakarta Faces\
    \ page when a certain form has been successfully submitted, for example, from\
    \ the login page to the user home page, as demonstrated in the section “Label\
    \ and Message Components,” or from the detail page back to the master page.\n\n\
    Historically, navigation targets must be defined separately in `<navigation-rule>`\
    \ entries in the `faces-config.xml` which then does the job based on the `String`\
    \ return value from the action method of command components. This approach turns\
    \ out to be quite cumbersome in the long term and not terribly useful for HTML-based\
    \ web applications. This idea was more or less derived from desktop-oriented applications.\
    \ Hence, Jakarta Faces 2.0 introduced the “Implicit navigation” feature, which\
    \ allows you to define the navigation target directly in the `String` return value\
    \ itself.\n\nIn other words, instead of the following action method:\n\n```\n\
    public String someActionMethod() {\n    // ...\n    return \"someOutcome\";\n\
    }\n```\n\nand the following `faces-config.xml` entry:\n\n```\n<navigation-rule>\n\
    \    <from-view-id>*</from-view-id>\n    <navigation-case>\n        <from-outcome>someOutcome</from-outcome>\n\
    \        <to-view-id>/otherview.xhtml</to-view-id>\n    </navigation-case>\n</navigation-rule>\n\
    ```\n\nyou could just do as follows in the action method:\n\n```\npublic String\
    \ someActionMethod() {\n    // ...\n    return \"/otherview.xhtml\";\n}\n```\n\
    \nYou could even leave out the default suffix of the view technology you’re using.\n\
    \n```\npublic String someActionMethod() {\n    // ...\n    return \"/otherview\"\
    ;\n}\n```\n\nYou can force a redirect by appending a `faces-redirect=true` query\
    \ parameter.\n\n```\npublic String someActionMethod() {\n    // ...\n    return\
    \ \"/otherview?faces-redirect=true\";\n}\n```\n\nReturning `null` would return\
    \ to the very same view from where the form was submitted. In other words, the\
    \ end user would stay in the same page. It is cleaner, however, to declare the\
    \ action method as `void`.\n\n```\npublic void someActionMethod() {\n    // ...\n\
    }\n```\n\nComing back to the redirect approach, this is also known as “Post-Redirect-Get”\
    \ pattern^([(13)](#fn13)) and makes a major difference with regard to bookmarkability\
    \ and avoiding double submits. Without a redirect after a POST request on a Jakarta\
    \ Faces form, the URL (uniform resource locator) in the web browser’s address\
    \ bar wouldn’t change to the URL of the target page but would just stay the same.\
    \ That’s caused by the nature of the “postback”: submitting the form back to the\
    \ very same URL from which the page with the form was served. In other words,\
    \ actually the URL as specified in `action` attribute of the HTML `<form>` is\
    \ being displayed in browser’s address bar. When Jakarta Faces is instructed to\
    \ navigate to a different view without a redirect, then it will basically build\
    \ and render the target page directly to the response of the current postback\
    \ request without changing the URL in browser’s address bar to the URL of the\
    \ target page.\n\nThis approach has disadvantages. One is that refreshing the\
    \ page in the web browser would cause the POST request to be reexecuted and thus\
    \ perform a so-called double submit. This would potentially pollute the data store\
    \ in the back end with duplicate entries, particularly if the involved relational\
    \ table doesn’t have proper unique constraints defined. Another disadvantage is\
    \ that the target page isn’t bookmarkable. The URL currently visible in the browser’s\
    \ address bar basically represents the previous page. You won’t get the currently\
    \ shown target page back by bookmarking, copy/pasting, and/or sharing the URL\
    \ and then opening it in a new browser window.\n\nWhen Jakarta Faces is instead\
    \ instructed to navigate to a different view with a redirect, then it will basically\
    \ return a very small HTTP response with a status code of `302` and a `Location`\
    \ header whose value represents the URL of the target page. When the web browser\
    \ retrieves such an HTTP response, then it will immediately fire a brand-new GET\
    \ request on the URL specified in the `Location` header. This URL is ultimately\
    \ reflected in the web browser’s address bar and becomes thus bookmarkable. Also,\
    \ refreshing the page would only refresh the GET request and therefore not cause\
    \ a double submit.\n\n# Ajaxifying Components\n\nAs you have noticed in the `<h:commandScript>`\
    \ example in the section “Command Components,” Jakarta Faces is capable of firing\
    \ Ajax requests and performing partial rendering as well. This capability was\
    \ introduced in Jakarta Faces 2.0 for the first time with the `<f:ajax>` tag.\
    \ This tag can be nested in any component implementing `ClientBehaviorHolder`\
    \ interface, or it can be wrapped around a group of components implementing this\
    \ interface. In the standard Jakarta Faces component set, almost all HTML components\
    \ implement `ClientBehaviorHolder` as well. If you consult the `ClientBehaviorHolder`\
    \ Javadoc ,^([(14)](#fn14)) then you’ll find the following list:\n\n**All Known\
    \ Implementing Classes:**\n\n```\nHtmlBody, HtmlCommandButton, HtmlCommandLink,\
    \ HtmlDataTable, HtmlForm,\nHtmlGraphicImage, HtmlInputFile, HtmlInputSecret,\
    \ HtmlInputText, HtmlInputTextarea, HtmlOutcomeTargetButton, HtmlOutcomeTargetLink,\
    \ HtmlOutputLabel, HtmlOutputLink, HtmlPanelGrid, HtmlPanelGroup, HtmlSelectBooleanCheckbox,\
    \ HtmlSelectManyCheckbox, HtmlSelectManyListbox, HtmlSelectManyMenu, HtmlSelectOneListbox,\
    \ HtmlSelectOneMenu, HtmlSelectOneRadio, UIWebsocket\n```"
  raw: 'Navigation

    Sometimes, you’d like to navigate to a different Jakarta Faces page

    when a certain form has been successfully submitted, for example, from the login

    page to the user home page, as demonstrated in the section “Label and

    Message Components,” or from the detail page back to the master

    page.

    Historically, navigation targets must be defined separately in `<navigation-rule>`

    entries in the `faces-config.xml`

    which then does the job based on the `String` return value

    from the action method of command components. This approach turns out to

    be quite cumbersome in the long term and not terribly useful for

    HTML-based web applications. This idea was more or less derived from

    desktop-oriented applications. Hence, Jakarta Faces 2.0 introduced the

    “Implicit navigation” feature, which allows you to define the navigation

    target directly in the `String` return value

    itself.


    In other words, instead of the following action method:


    ```

    public String someActionMethod() {

    // ...

    return "someOutcome";

    }

    ```


    and the following `faces-config.xml`

    entry:


    ```


    someOutcome

    /otherview.xhtml


    ```


    you could just do as follows in the action method:


    ```

    public String someActionMethod() {

    // ...

    return "/otherview.xhtml";

    }

    ```


    You could even leave out the default suffix of the view technology

    you’re using.


    ```

    public String someActionMethod() {

    // ...

    return "/otherview";

    }

    ```


    You can force a redirect by appending a faces-redirect=true query

    parameter.


    ```

    public String someActionMethod() {

    // ...

    return "/otherview?faces-redirect=true";

    }

    ```


    Returning `null`

    would return to the very same view from where the form was submitted. In

    other words, the end user would stay in the same page. It is cleaner,

    however, to declare the action method as `void`.


    ```

    public void someActionMethod() {

    // ...

    }

    ```


    Coming back to the redirect approach, this is also known as

    “Post-Redirect-Get” pattern^([^(13)](#fn13)) and makes a

    major difference with regard to bookmarkability and avoiding double

    submits. Without a redirect after a POST request on a Jakarta Faces

    form, the URL (uniform resource locator) in the web browser’s address

    bar wouldn’t change to the URL of the target page but would just stay

    the same. That’s caused by the nature of the “postback”: submitting the

    form back to the very same URL from which the page with the form was

    served. In other words, actually the URL as specified in `action` attribute of

    the HTML `<form>` is being

    displayed in browser’s address bar. When Jakarta Faces is instructed to

    navigate to a different view without a redirect, then it will basically

    build and render the target page directly to the response of the current

    postback request without changing the URL in browser’s address bar to

    the URL of the target page.

    This approach has disadvantages. One is that refreshing the page in

    the web browser

    would cause the POST request to be reexecuted and thus perform a

    so-called double submit. This would potentially pollute the data store

    in the back end with duplicate entries, particularly if the involved

    relational table doesn’t have proper unique constraints defined. Another

    disadvantage is that the target page isn’t bookmarkable. The URL

    currently visible in the browser’s address bar basically represents the

    previous page. You won’t get the currently shown target page back by

    bookmarking, copy/pasting, and/or sharing the URL and then opening it in

    a new browser window.

    When Jakarta Faces is instead instructed to navigate to a different

    view with a redirect, then it will basically return a very small HTTP

    response with a status code of `302` and a `Location` header whose

    value represents the URL of the target page. When the web browser

    retrieves such an HTTP response, then it will immediately fire a

    brand-new GET request on the URL specified in the `Location` header. This

    URL is ultimately reflected in the web browser’s address bar and becomes

    thus bookmarkable. Also, refreshing the page would only refresh the GET

    request and therefore not cause a double submit.


    Ajaxifying Components

    As you have noticed in the `<h:commandScript>`

    example in the section “Command Components,” Jakarta Faces is capable of

    firing Ajax requests and performing

    partial rendering as well. This capability was introduced in Jakarta

    Faces 2.0 for the first time with the `<f:ajax>` tag.

    This tag can be nested in any component implementing `ClientBehaviorHolder`

    interface, or it can be wrapped around a group of components

    implementing this interface. In the standard Jakarta Faces component

    set, almost all HTML components implement `ClientBehaviorHolder`

    as well. If you consult the `ClientBehaviorHolder`

    Javadoc ,^([^(14)](#fn14)) then you’ll find the

    following list:


    **All Known Implementing Classes:**


    ```

    HtmlBody, HtmlCommandButton, HtmlCommandLink, HtmlDataTable, HtmlForm,

    HtmlGraphicImage, HtmlInputFile, HtmlInputSecret, HtmlInputText, HtmlInputTextarea,
    HtmlOutcomeTargetButton, HtmlOutcomeTargetLink, HtmlOutputLabel, HtmlOutputLink,
    HtmlPanelGrid, HtmlPanelGroup, HtmlSelectBooleanCheckbox, HtmlSelectManyCheckbox,
    HtmlSelectManyListbox, HtmlSelectManyMenu, HtmlSelectOneListbox, HtmlSelectOneMenu,
    HtmlSelectOneRadio, UIWebsocket

    ```'
  trans: '

    导航

    有时，当某个表单成功提交后，你可能希望导航到另一个 Jakarta Faces 页面，例如从登录页面导航到用户主页（如“标签和消息组件”一节所示），或者从详情页面返回主页面。


    传统上，导航目标必须在 `faces-config.xml` 的 `<navigation-rule>` 条目中单独定义，然后根据命令组件动作方法的 `String`
    返回值进行导航。这种方法长期来看相当繁琐，并且对于基于 HTML 的 Web 应用程序来说并不十分有用。这个想法或多或少源自桌面应用程序。因此，Jakarta
    Faces 2.0 引入了“隐式导航”功能，允许你直接在 `String` 返回值本身中定义导航目标。


    换句话说，不再使用以下动作方法：


    ```

    public String someActionMethod() {

    // ...

    return "someOutcome";

    }

    ```


    以及以下 `faces-config.xml` 条目：


    ```


    someOutcome

    /otherview.xhtml


    ```


    你可以在动作方法中直接这样做：


    ```

    public String someActionMethod() {

    // ...

    return "/otherview.xhtml";

    }

    ```


    你甚至可以省略所用视图技术的默认后缀。


    ```

    public String someActionMethod() {

    // ...

    return "/otherview";

    }

    ```


    你可以通过附加 `faces-redirect=true` 查询参数来强制重定向。


    ```

    public String someActionMethod() {

    // ...

    return "/otherview?faces-redirect=true";

    }

    ```


    返回 `null` 将返回到提交表单的同一视图。换句话说，最终用户将停留在同一页面。然而，将动作方法声明为 `void` 更为简洁。


    ```

    public void someActionMethod() {

    // ...

    }

    ```


    回到重定向方法，这也被称为“Post-Redirect-Get”模式^(¹³)，它在可添加书签和避免重复提交方面有着显著区别。如果在 Jakarta Faces
    表单的 POST 请求之后没有重定向，Web 浏览器地址栏中的 URL（统一资源定位符）不会更改为目标页面的 URL，而是保持不变。这是由“回传”的本质造成的：将表单提交回提供该表单页面的同一
    URL。换句话说，浏览器地址栏中显示的实际是 HTML `<form>` 的 `action` 属性中指定的 URL。当指示 Jakarta Faces 在没有重定向的情况下导航到不同视图时，它基本上会直接构建目标页面并将其渲染到当前回传请求的响应中，而不会将浏览器地址栏中的
    URL 更改为目标页面的 URL。


    这种方法有缺点。一是刷新 Web 浏览器中的页面会导致 POST 请求重新执行，从而执行所谓的双重提交。这可能会用重复条目污染后端的数据库，特别是当相关的关系表没有定义适当的唯一约束时。另一个缺点是目标页面无法添加书签。浏览器地址栏中当前可见的
    URL 基本上代表的是前一个页面。你无法通过添加书签、复制/粘贴和/或共享 URL，然后在新浏览器窗口中打开它来重新获得当前显示的目标页面。


    相反，当指示 Jakarta Faces 通过重定向导航到不同视图时，它基本上会返回一个非常小的 HTTP 响应，状态码为 `302`，并带有一个 `Location`
    标头，其值代表目标页面的 URL。当 Web 浏览器检索到这样的 HTTP 响应时，它会立即对 `Location` 标头中指定的 URL 发起一个全新的
    GET 请求。此 URL 最终会反映在 Web 浏览器的地址栏中，从而变得可添加书签。此外，刷新页面只会刷新 GET 请求，因此不会导致双重提交。


    Ajax 化组件

    正如你在“命令组件”一节的 `<h:commandScript>` 示例中所注意到的，Jakarta Faces 也能够发起 Ajax 请求并执行部分渲染。此功能首次在
    Jakarta Faces 2.0 中通过 `<f:ajax>` 标签引入。

    此标签可以嵌套在任何实现 `ClientBehaviorHolder` 接口的组件中，也可以包裹在一组实现此接口的组件周围。在标准的 Jakarta Faces
    组件集中，几乎所有 HTML 组件也都实现了 `ClientBehaviorHolder`。如果你查阅 `ClientBehaviorHolder` 的 Javadoc，^(¹⁴)
    你会发现以下列表：


    **所有已知的实现类：**


    ```

    HtmlBody, HtmlCommandButton, HtmlCommandLink, HtmlDataTable, HtmlForm,

    HtmlGraphicImage, HtmlInputFile, HtmlInputSecret, HtmlInputText, HtmlInputTextarea,
    HtmlOutcomeTargetButton, HtmlOutcomeTargetLink, HtmlOutputLabel, HtmlOutputLink,
    HtmlPanelGrid, HtmlPanelGroup, HtmlSelectBooleanCheckbox, HtmlSelectManyCheckbox,
    HtmlSelectManyListbox, HtmlSelectManyMenu, HtmlSelectOneListbox, HtmlSelectOneMenu,
    HtmlSelectOneRadio, UIWebsocket

    ```

