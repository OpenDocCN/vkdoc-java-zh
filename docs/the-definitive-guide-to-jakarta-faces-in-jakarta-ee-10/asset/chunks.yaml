  trans: '

    将 `FacesServlet` 直接映射到 `*.xhtml` 可能是最自然的解决方案。通过这种映射，请求的资源与物理资源完全相同。如果请求 `/path/foo.xhtml`，那么
    `FacesServlet` 将尝试定位 `/path/foo.xhtml`。通过这种映射，不存在第二条路径可以访问 Facelets 源文件，因此也就没有暴露它的风险。

    附注：能够使用 `*.xhtml` 映射是 Jakarta Faces 2.0 中的一个新特性。在 Jakarta Faces 1.x 中这样做会导致 `RequestDispatcher#forward()`
    出现无限循环。


    要将 `FacesServlet` 映射到 `*.xhtml`，最简单的方法是依赖 Jakarta Faces 2.3 的默认映射，如前所述。如果由于某种原因无法做到这一点，请将映射添加到
    `web.xml` 中的 `FacesServlet` 映射中，如下代码所示：


    ```

    facesServlet

    /faces/**.jsf

    *.xhtml


    ```


    作为替代方案，可以定义一个安全约束来阻止对 `*.xhtml` 资源的访问。很少有充分的理由选择此方法而非更简单的 `*.xhtml` 到 `*.xhtml`
    映射，但为了完整性，可以按如下方式操作：


    ```

    禁止访问 Facelets 源文件


    XHTML

    *.xhtml


    ```


    暴露 Facelets 源代码的一个特殊情况发生在复合组件中。复合组件是通过 Facelet 而非 Java 类实现的组件。按照惯例，它们必须放置在位于 Web
    根目录下的 `/resources` 目录的子目录中，例如 `/resources/bar/foo.xhtml`。这将使组件 “`foo`” 在命名空间 “`jakarta.faces.composite/bar`”
    中可用。

    组件当然不是视图，用户不应该能够直接请求它们。不幸的是，`/resources` 对于 Jakarta EE 来说并不是一个特殊的目录。Jakarta Faces
    通过约定赋予了它特殊含义，但对于 Servlet 容器来说，它和其他目录一样。这特别意味着对此没有应用任何保护，任何用户都可以直接从中请求资源。换句话说，这个目录是“世界可读的”。即使使用
    `*.xhtml` 映射，这不仅允许用户猜测我们有哪些组件，还允许用户尝试执行它们。显然，这不是我们想要的。


    对此同样有两种解决方案：


    1.  配置另一个目录作为 Jakarta Faces 资源目录。


    2.  向 `web.xml` 添加安全约束。


    在 Jakarta Faces 2.2 中，引入了一种方法来解决此安全漏洞。即，通过 `jakarta.faces.WEBAPP_RESOURCES_DIRECTORY`
    上下文参数，可以将另一个目录配置为 Jakarta Faces 资源目录，而不是 `/resources`。例如：


    ```

    jakarta.faces.WEBAPP_RESOURCES_DIRECTORY

    WEB-INF/resources


    ```


    请注意，该路径是相对于 Web 根目录的，并且不能以 “/” 开头。


    或者，对于 Jakarta Faces 2.0/2.1，可以在 `web.xml` 中再次配置一个安全约束，以禁止调用者访问 `/resources`。这可以通过类似于保护
    `*.xhtml` 访问的方式来完成。


    ```


    resources

    资源目录

    /resources/*


    ```


    14. 本地化


    Jakarta Faces 一直拥有不错的国际化支持。自 Jakarta Faces 1.0 起，您可以提供基于 `java.util.ResourceBundle`
    的不同语言环境的捆绑文件，这些文件随后会在声明的位置动态地作为文本包含在网页中。此外，所有 Jakarta Faces 转换器和验证器都有自己的一套本地化默认消息，您可以通过消息包轻松自定义这些消息，或者自
    Jakarta Faces 1.2 起，通过新的 `requiredMessage`、`converterMessage` 和 `validatorMessage`
    属性进行自定义。Jakarta Faces 2.0 通过新的 `jakarta.faces.application.ResourceHandler` API（应用程序编程接口）增加了对可本地化资源（如样式表、脚本和图像）的支持。

    国际化（“I18N”）行为与本地化（“L10N”）行为是不同的。国际化部分基本上已由 Jakarta Faces 自身作为 MVC（模型-视图-控制器）框架完成。您需要做的只是处理本地化部分。基本上，您需要在视图中指定“活动语言环境”，提供所需的资源包文件（如有必要，可借助第三方翻译服务进行翻译），并在您的
    Jakarta Faces 页面中声明对捆绑文件的引用。

    在本章中，您将学习如何为不同语言准备 Jakarta Faces Web 应用程序，以及如何开发它以方便您自己进行维护性的本地化。


    你好世界，Olá mundo，नमस्ते दुनिया

    首先，在项目的 `main/java/resources` 文件夹中创建一组新的捆绑文件。Maven WAR 项目的 `main/java/resources`
    文件夹用于存放最终构建中应位于 `/WEB-INF/classes` 文件夹中的非类文件。捆绑文件可以采用 `java.util.Properties` 格式，扩展名为
    `.properties`。


    这些文件的文件名必须有一个公共前缀（例如 “`text`”），后跟一个下划线和两个字母的 ISO 639-1-Alpha-2^(¹¹⁰) 语言代码（例如，英语用
    “`en`”，葡萄牙语用 “`pt`”，印地语用 “`hi`”）。可选地，后面可以再跟一个下划线和两个字母的 ISO 3166-1-Alpha-2^(¹¹¹)
    国家代码（例如，英国用 “`GB`”，美国用 “`US`”，巴西用 “`BR`”，葡萄牙用 “`PT`”）。


    ```

    main/java/resources/com/example/project/i18n/text.properties

    title = 本地化示例

    heading = 你好世界

    paragraph = 欢迎来到我的网站！

    main/java/resources/com/example/project/i18n/text_pt_BR.properties

    title = Exemplo de localização

    heading = Olá mundo

    paragraph = Bem-vindo ao meu site!

    main/java/resources/com/example/project/i18n/text_hi.properties

    title = स्थानीयकरण उदाहरण

    heading = नमस्ते दुनिया

    paragraph = मेरी वेबसाइट पर स्वागत है!

    ```


    请注意，所有这些捆绑文件都有共同的键 “`title`”、“`heading`” 和 “`paragraph`”，这些键通常是英文的。这基本上是互联网和 Web
    开发人员的通用语言。将源代码完全保留为英文被认为是最佳实践，特别是如果它是开源的。

    还要注意，英文捆绑文件的文件名中没有像 `text_en.properties` 那样的 “`en`” 语言代码，而只是 `text.properties`。基本上，它已成为后备捆绑文件，应包含整个
    Web 应用程序中使用的每一个捆绑键。这样，当具有特定语言代码的捆绑文件不包含所需的捆绑条目时，将从后备捆绑文件中查找该值。这对于您希望逐步升级捆绑文件，或者当
    Web 应用程序中有某些部分不一定需要本地化（例如后端管理页面）的情况非常有用。


    配置


    为了让 Jakarta Faces 应用程序识别这些捆绑文件和所需的语言环境，我们需要编辑其 `faces-config.xml` 文件，向 `<application>`
    元素添加以下条目：


    ```


    en

    pt_BR

    hi

    '
- fmt: '`com.example.project.i18n.text`

    `text`


    ```

    The `<base-name>`

    must specify the fully

    qualified name (FQN) following the same convention as for Java

    classes and that it doesn’t include the file extension. The `<var>` basically

    declares the EL (Expression Language) variable name

    of the bundle file. This will make the currently loaded resource bundle

    available as a `Map`-like object in EL

    via `#{text}`. To

    avoid conflicts, you only need to make sure that this name isn’t already

    possessed by any managed bean or any implicit EL objects.

    ```


    ## Referencing Bundle in Jakarta Faces Page


    It’s relatively simple, just treat `#{text}` as a `Map` with the bundle keys as
    map keys.


    ```

    #{text[''title'']}


    #{text[''heading'']}

    #{text[''paragraph'']}

    ```


    `Jakarta Faces` will already automatically determine the closest matching active
    locale based on the HTTP `Accept-Language` header^([^(112)](#fn112)) and set it
    as `locale` property of `UIViewRoot`. The `Accept-Language` header is configurable
    in browser’s settings. In, for example, Chrome, you can configure it via `chrome://settings/languages`.
    If you play around with it, for example, by switching between English, Portuguese,
    and Hindi as the top-ranked language setting in browser and refresh the Jakarta
    Faces page, then you’ll notice that it changes the text to conform the browser-specified
    language setting. If you check the browser’s developer tools, usually accessible
    by pressing F12, and inspect the HTTP request headers in the network monitor,
    then you’ll also notice that the `Accept-Language` header changes accordingly.


    You might have noticed in the previously shown code example that the `lang` attribute
    of the `<html>` tag references `#{view.locale.toLanguageTag()}`. Basically, this
    will print the IETF BCP 47 language tag^([^(113)](#fn113)) of the `locale` property
    of the current `UIViewRoot`, which is in turn available as an implicit EL object
    `#{view}`. The `locale` property is an instance of `java.util.Locale` that has
    actually no getter method for the language tag such as `getLanguageTag()`, but
    only a `toLanguageTag()` method, hence the direct method reference in EL instead
    of the expected property reference.


    The `lang` attribute of the `<html>` tag is not mandatory for the functioning
    of Jakarta Faces localization feature. Moreover, Jakarta Faces treats it as template
    text and does nothing special with it. You can safely leave out it. It is, however,
    important for search engines. This way, a search engine like Google will be informed
    which language the page’s copy is in. This is not only important in order to end
    up correctly in localized search results but also important in case you serve
    the very same page in different languages. This would otherwise by the average
    search engine algorithm be penalized as “duplicate content,” which is thus bad
    for SEO (search engine optimization) ranking.


    You’ll also have noticed that the bundle keys are specified in the so-called brace
    notation `#{text[''...'']}`. The string between single quotes basically represents
    the bundle key. In this specific case, you could also have used `#{text.title}`,
    `#{text.heading}`, and `#{text.paragraph}` instead. This is, however, not the
    common practice. Using the brace notation not only gives a generally clear meaning
    to what the EL variable represents (a resource bundle), but it also allows you
    to use dots in the bundle key name such as `#{text[''meta.description'']}`. The
    EL expression `#{text.meta.description}` has, namely, an entirely different meaning,
    “get the `description` property of the nested `meta` property of the `text` object,”
    and acts thus like `text.getMeta().getDescription()`, which is incorrect.


    ## Changing the Active Locale


    You can also change the active locale on the server side. This is best to be done
    in a single place in a site-wide master template that contains the `<f:view>`
    tag. The active locale can be set in the `locale` attribute of the `<f:view>`
    that can accept either a static string representing the language tag or a concrete
    `java.util.Locale` instance. The `locale` attribute accepts an EL expression and
    can be changed programmatically via a managed bean. This offers you the opportunity
    to let the user change it via the web page without fiddling around in the browser’s
    language settings. You could present the available language options to the user
