    托管 Bean 的作用域需要改为 `@ViewScoped`，这样我们才能在登录表单回传后保留 `isNew` 实例变量的值。

    一个重要的补充是在 `SecurityContext#authenticate()` 方法中，我们现在将提供一个额外的参数：`newAuthentication`*。*

    不过，身份验证机制并非严格需要此参数，它只是足够智能，能够区分初始的新身份验证和继续正在进行的身份验证对话。然而，当调用者处于身份验证对话过程中，然后导航离开，稍后又明确点击登录按钮时，事情就变得复杂了。如果与该对话关联的状态在那时尚未过期，身份验证机制就不知道需要新的身份验证，并且很可能会继续那个已中止但仍然有效的对话。


    为了防止这种情况，我们可以通过将 `newAuthentication` 设置为 `true` 来强制进行新的身份验证。这将丢弃所有现有状态。修改后的 `continueAuthentication()`
    方法如下所示：


    ```

    private AuthenticationStatus continueAuthentication() {

    return securityContext.authenticate(

    (HttpServletRequest) externalContext.getRequest(),

    (HttpServletResponse) externalContext.getResponse(),

    AuthenticationParameters.withParams()

    .newAuthentication(isNew).credential(

    new UsernamePasswordCredential(email, password))

    );

    }

    ```


    请注意，此版本既可用于继续对话的情况，也可用于启动新对话的情况。当我们继续对话时，`isNew` 将简单地设置为 `false`，这恰好也是未指定该参数时的默认值。


    当使用 `CustomFormAuthenticationMechanism` 时，我们知道在调用者发起的身份验证中提供凭证后，不会发生任何重定向或向响应写入其他内容，这为我们提供了一个方便的位置来处理调用者通过身份验证后重定向到登录页面的逻辑：即
    `SUCCESS` 情况。


    ```

    case SUCCESS:

    flash.setKeepMessages(true);

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_INFO, "Login succeed", null));

    externalContext.redirect(

    externalContext.getRequestContextPath() + "/index.xhtml");

    break;

    ```


    我们在此处将调用者重定向到 `index.xhtml` 登录页面。请注意，这也是调用者发起身份验证对话的视图，但这在本示例中只是巧合。通常，应用程序开发者可以完全自由地选择将调用者重定向到的视图甚至
    URL。通常会选择某种登录页面，它可以是应用程序的首页，也可以是调用者主要角色对应的仪表板。正如我们之前提到的，当返回 `SUCCESS` 时，调用者已完全通过身份验证。这意味着我们可以查询调用者的角色，并在决定重定向到何处时使用这些角色。

    展望：未来版本的 Jakarta EE Security 可能会引入一种混合选项，其中调用者发起的身份验证仍然可以像容器发起的身份验证一样以相同的重定向开始，并允许应用程序提供重定向回的
    URL。


    记住我

    一旦调用者通过了 Jakarta Faces（Web）应用程序的身份验证，我们自然不希望要求调用者每次请求都重新进行身份验证。为了防止这种情况，成功身份验证的结果通常以某种方式与调用者的
    HTTP 会话关联起来。实际上，`CustomFormAuthenticationMechanism` 内部正是使用 Jakarta EE Security
    提供的“自动应用会话”服务来实现这一点的。该服务存储与成功身份验证相关的数据（至少是调用者名称以及调用者所属的任何组）。虽然实现最终取决于这些数据具体存储在哪里以及生命周期如何，但在实践中，它通常位于服务器内存中与
    HTTP 会话关联的一个特殊部分。这个部分的特殊之处在于它通常是会话作用域的，但数据不能通过 `HttpSession#getAttribute()` 访问。

    为了不耗尽服务器内存，HTTP 会话会在一定时间后过期。典型的过期时间在 10 分钟到 1 小时之间。如果调用者在此时间之后访问应用程序，则需要重新进行身份验证。

    然而，即使是在长达一小时的闲置后重新进行身份验证，通常也是不可取的。但出于上述服务器资源耗尽的原因，延长 HTTP 会话的时长是不可行的。

    这就是“记住我”（remember-me）发挥作用的地方。记住我是一个有点俏皮的术语，指的是将调用者的凭证交换为一个令牌，并且该令牌通常存储在一个与 HTTP
    会话 cookie 不同且具有更长生存时间的 cookie 中。

    记住我令牌有效地充当了调用者的新凭证，而不会暴露调用者的原始密码。记住我令牌基本上可以多次分发，例如，根据调用者用于连接应用程序的设备或 IP（互联网协议）来分发。必须注意，虽然令牌不会暴露调用者的原始凭证，但它仍然充当访问调用者账户的钥匙，因此应该像对待任何其他类型的凭证一样采取相同的预防措施。具体来说，包含记住我令牌的
    cookie 应仅通过 HTTPS/SSL 发送，并且应用程序不应逐字存储实际令牌，而应存储其强哈希值。

    由于使用记住我的主要原因是避免耗尽服务器内存并实现长生命周期，因此记住我令牌几乎总是存储在稳定的存储中（例如，数据库）。因此，从这种存储中查找比从服务器内存中查找成本更高，如果每次请求都需要执行此操作，尤其是在一直有大量
    Ajax 请求的情况下，这可能会严重影响性能。

    出于这个原因，记住我几乎总是与某种缓存结合使用。`CustomFormAuthenticationMechanism` 所使用的服务的模块化特性使得记住我可以插入到前面提到的自动应用会话服务和实际的身份验证机制之间。这样，我们实际上得到了一种内存层次结构；首先尝试在
    HTTP 会话存储中查找身份验证数据；如果找不到，则尝试记住我服务；如果该服务也不包含数据，则最后尝试身份验证机制。


    要使用记住我，需要做两件事：


    1.  为已安装的身份验证机制激活记住我服务


    2.  提供一个能够分发和验证记住我令牌的特殊身份存储

    '
- fmt: '# Activating Remember-Me Service


    The remember-me service in Jakarta EE Security is represented by an interceptor.
    Via the interceptor binding annotation, `@RememberMe` (the remember-me service)
    is easily applied to our own custom authentication mechanism, one for which we
    have the source code. Unfortunately, it isn’t as easy when these have to be applied
    to a bean for which we don’t have the source code and in fact for which we don’t
    even know the exact implementation type.


    As the `CustomFormAuthenticationMechanism` that we’ve been using for the examples
    before is indeed of the latter type, there’s a bit more work to do. Essentially,
    we need to obtain a reference of the actual `CustomFormAuthenticationMechanism`
    implementation that the container makes available and then use the CDI 2.0 `InterceptionFactory`
    to programmatically add the `@RememberMe` annotation. The result is then to be
    returned from an alternative producer method.


    This is demonstrated in the following code via the new method `produceAuthenticationMechanism()`
    in the `ApplicationConfig` bean which we showed before:


    ```

    @CustomFormAuthenticationMechanismDefinition(

    loginToContinue = @LoginToContinue(

    loginPage = "/login.xhtml",

    useForwardToLogin = false,

    errorPage = ""

    )

    )

    @FacesConfig @ApplicationScoped

    @Alternative @Priority(500)

    public class ApplicationConfig {

    @Produces

    public HttpAuthenticationMechanism produceAuthenticationMechanism(

    InterceptionFactory interceptionFactory, BeanManager beanManager

    ) {

    @RememberMe

    class RememberMeClass {};

    interceptionFactory.configure().add(

    RememberMeClass.class.getAnnotation(RememberMe.class));

    return interceptionFactory.createInterceptedInstance(

    new HttpAuthenticationMechanismWrapper(

    (HttpAuthenticationMechanism) beanManager

    .getReference(beanManager

    .resolve(beanManager

    .getBeans((HttpAuthenticationMechanism.class).stream()

    .filter(b -> b.getBeanClass() != ApplicationConfig.class)

    .collect(Collectors.toSet())),

    HttpAuthenticationMechanism.class,

    beanManager.createCreationalContext(null))));

    }

    }

    ```


    The `ApplicationConfig` bean is annotated with the `@Alternative` and `@Priority`
    annotations. `@Alternative` is used here to indicate that the producer is not
    just any regular producer but one that should be called instead of any existing
    producer or bean. That is, the bean we are producing here is an alternative for
    the bean with the same type that would otherwise be selected by CDI for injection.
    `@Priority` is used to enable (activate) our alternative producer. Without this
    annotation, the producer is present but not enabled, meaning that CDI won’t call
    it. Another way of enabling an alternative is using `beans.xml`. The number 500
    here is used to select between various alternatives if multiple alternatives are
    enabled. In that case, the one with the highest number is selected.


    The code shown before uses the somewhat well-known CDI pattern `BeanManager#getBeans()/resolve()/getReference()`
    to obtain the `CustomFormAuthenticationMechanism` that the container makes available.
    This pattern is more verbose than the simpler `CDI.current().select(...)` variant,
    but it allows us to filter out the `Bean<T>` that represents the producer method.
    Getting a reference from that `Bean<T>` from within the producer method would
    invoke that same producer method again and thus would cause a recursive series
    of calls eventually leading to a stack overflow. It goes without saying this is
    unwanted, hence the reason we filter that particular `Bean<T>` out.


    The bean instance that is returned from the `BeanManager#getReference()` is almost
    certainly a proxy; `CustomFormAuthenticationMechanism` is specified to be application
    scoped, and it implicitly makes use of an interceptor. Due to the technical difficulty
    of proxying an existing proxy (think of generated proxies often being final and
    proxy caches being used), CDI 2.0 imposes a limitation on what types of objects
    it can create an intercepted instance from. To work around this limitation, we
    have little choice but to insert an extra manually created “pass-through wrapper”
    `HttpAuthenticationMechanismWrapper` instance as shown in the code before. The
    code of this wrapper is as follows:


    ```

    public class HttpAuthenticationMechanismWrapper

    implements HttpAuthenticationMechanism

    {

    private HttpAuthenticationMechanism wrapped;

    public HttpAuthenticationMechanismWrapper() {

    //

    }

    public HttpAuthenticationMechanismWrapper

    (HttpAuthenticationMechanism httpAuthenticationMechanism)

    {

    this.wrapped = httpAuthenticationMechanism;

    }

    public HttpAuthenticationMechanism getWrapped() {

    return wrapped;

    }

    @Override

    public AuthenticationStatus validateRequest(

    HttpServletRequest request,

    HttpServletResponse response,

    HttpMessageContext context) throws AuthenticationException

    {

    return getWrapped().validateRequest(request, response, context);

    }

    @Override

    public AuthenticationStatus secureResponse(

    HttpServletRequest request,

    HttpServletResponse response,

    HttpMessageContext context) throws AuthenticationException

    {

    return getWrapped().secureResponse(request, response, context);

    }

    @Override

    public void cleanSubject(

    HttpServletRequest request,

    HttpServletResponse response,

    HttpMessageContext context)

    {

    getWrapped().cleanSubject(request, response, context);

    }

    }

    ```


    **Outlook:** It’s expected that a convenience method for the aforementioned task
    will be added to a future version of Jakarta EE Security, thereby greatly simplifying
    this task.


    # Logging Out


    Regardless of which method to log in has been used, at some point, the caller
    may wish to explicitly log out. A normal login (authentication) in Jakarta EE
    is always primarily valid per request only, but various authentication mechanisms
    or the services they’re using (such as `@AutoApplySession` and `@RememberMe`)
    may keep the state beyond a single request and automatically reauthenticate the
    caller at every next request.


    This state may be kept at various places: in cookies, in the HTTP session, in
    client storage, etc. In order to log out, we have to make sure all this state
    is cleared. In Jakarta Faces, we can do this simply by calling the `HttpServletRequest#logout()`
    method. This will immediately remove the authenticated identity from the current
    request and call the `cleanSubject()` method of the authentication mechanism,
    which in turn will remove any session data, cookies, etc., that it used.


    The following gives an example:


    ```

    @Named @RequestScoped

    public class Logout {

    @Inject

    private HttpServletRequest request;

    public void submit() throws ServletException {

    request.logout();

    request.getSession().invalidate();

    }

    }

    ```


    Note that for a full logout, it’s typically good practice to invalidate the session
    as well. The call to `HttpServletRequest#logout()` should only remove the session
    state used by the authentication mechanism (if any), while after a full logout,
    we often don’t want any other session state lingering around either. Depending
    on the application design, it’s typical to redirect the caller to the home page
    of the application after a logout as well.'
