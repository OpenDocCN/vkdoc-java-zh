    “创建/处理”列指定了核心标签在指定目标组件上创建或处理的内容。

    “目标组件”列指定了核心标签所支持的目标组件超类或接口。你必须将指定的超类或接口理解为来自 `jakarta.faces.component` 包。如果目标组件以可选复数形式出现，如
    `UIComponent(s)`，则表示核心标签可以嵌套在目标组件内部，也可以包装在一个或多个目标组件中。如果目标组件以显式复数形式出现，如 `UIComponents`，则表示核心标签只能包装一个或多个目标组件，因此不能嵌套。


    至于目标组件接口，`ActionSource` 接口由 `UICommand` 组件实现。`ClientBehaviorHolder` 接口由 `UIForm`、`UIInput`、`UICommand`、`UIData`、`UIOutput`、`UIPanel`
    和 `UIOutcomeTarget` 组件实现。`ValueHolder` 接口由 `UIOutput` 和 `UIInput` 组件实现。`EditableValueHolder`
    接口由 `UIInput` 组件实现。根据表 3-1，你应该能够从中推导出实际的 HTML 组件。


    “自”列指明了核心标签首次可用的 Jakarta Faces 版本。在撰写本书时，可用的 Jakarta Faces 版本如下：1.0（2004 年 3 月）、1.1（2004
    年 5 月）、1.2（2006 年 5 月）、2.0（2009 年 7 月）、2.1（2010 年 11 月）、2.2（2013 年 3 月）、2.3（2017
    年 3 月）、2.0（2020 年 10 月）和 4.0（2022 年 5 月）。

    大多数单独的核心标签会在不同的章节中详细说明。


    生命周期

    Jakarta Faces 拥有一个定义非常清晰的生命周期。它被分解为六个阶段。每个阶段都会让 HTTP 请求穿过组件树，对其执行操作，并触发组件系统事件。本章引言部分已结合图表（图
    3-1）给出了简要描述。以下各节将描述 Jakarta Faces 生命周期的每个单独阶段。


    恢复视图阶段（第一阶段）

    首先，创建 `UIViewRoot` 实例，并根据任何 `<f:view>` 标签设置其属性，例如 `locale`。此时组件树通常是空的。仅当当前请求是回传请求，或者视图包含带有子元素的
    `<f:metadata>` 时，才会根据视图定义构建完整的组件树。基本上，会根据视图中定义的组件标签实例化一个特定的 `UIComponent` 子类，并用视图中定义的所有属性填充它，然后调用
    `UIComponent#setParent()`，并传入实际的父组件。

    `UIComponent#setParent()` 方法会首先检查是否已存在一个父组件，如果存在，则会在旧父组件上触发 `PreRemoveFromViewEvent`。然后，当新父组件设置完毕，当前组件成为组件树的一部分时，会使用当前组件触发
    `PostAddToViewEvent`。

    如果当前请求是回传请求，则会将由 `jakarta.faces.ViewState` 请求参数标识的“视图状态”恢复到新构建的组件树中。之后，会为树中的每个组件显式触发
    `PostRestoreStateEvent`，即使组件树实际上并未被恢复。换句话说，即使不是回传请求，也会触发该事件。你最好将该事件重新理解为“`PostRestoreViewPhase`”。如果你在
    `PostRestoreStateEvent` 期间确实关心它是否是回传请求，那么你还应该查阅 `FacesContext#isPostback()`。

    到恢复视图阶段结束时，如果组件树仍然为空，则生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过中间的任何阶段。


    应用请求值阶段（第二阶段）

    `UIComponent#processDecodes()` 方法将在 `UIViewRoot` 上被调用。`processDecodes()` 方法会首先在每个子组件和
    facet 上调用 `processDecodes()` 方法，然后在其自身上调用 `UIComponent#decode()`。最后，将调用 `UIViewRoot#broadCastEvents()`
    来触发为当前阶段排队的任何 `FacesEvent`。默认的 Jakarta Faces API（应用程序编程接口）不为应用请求值阶段提供此类事件，但开发者可以创建并排队自己的事件。

    `decode()` 方法的默认实现将委托给 `Renderer#decode()` 方法。在组件或渲染器的 `decode()` 方法中，实现有机会从 HTTP
    请求参数中提取提交的值，并将其设置为内部属性。在标准 HTML 组件集中，唯一执行此操作的组件是派生自 `UIForm`、`UIInput` 和 `UICommand`
    的基于 HTML 表单的组件。`UIForm` 组件将使用 `true` 调用 `UIForm#setSubmitted()`。`UIInput` 组件将使用
    HTTP 请求参数值调用 `UIInput#setSubmittedValue()`。`UICommand` 组件将为调用应用程序阶段（第五阶段）排队 `ActionEvent`。


    处理验证阶段（第三阶段）

    `UIComponent#processValidators()` 将在 `UIViewRoot` 上被调用。`processValidators()` 方法基本上会首先为当前组件触发
    `PreValidateEvent`，然后在每个子组件和 facet 上调用 `processValidators()`，最后为当前组件触发 `PostValidateEvent`。之后，将调用
    `UIViewRoot#broadCastEvents()` 来触发为当前阶段排队的任何 `FacesEvent`，这通常是 `ValueChangeEvent`
    的一个实例。

    在标准 HTML 组件集中，只有 `UIInput` 组件在此处行为不同。在调用每个子组件和 facet 的 `processValidators()` 之前，它们会首先在其自身上调用
    `UIInput#validate()`。如果在应用请求值阶段（第二阶段）设置了提交的值，那么它们会首先在任何附加的 `Converter` 上调用 `Converter#getAsObject()`。如果它没有抛出
    `ConverterException`，那么它们会在每一个附加的 `Validator` 实例上调用 `Validator#validate()`，无论其中是否有任何一个抛出了
    `ValidatorException`。如果没有抛出 `ConverterException` 或 `ValidatorException`，则将使用转换并验证后的值调用
    `UIInput#setValue()`，并且 `UIInput#isLocalValueSet()` 标志将返回 `true`，同时将使用 `null`
    调用 `UIInput#setSubmittedValue()`。如果抛出了任何 `ConverterException` 或 `ValidatorException`，则将使用
    `false` 调用 `UIInput#setValid()`，并且异常消息将通过 `FacesContext#addMessage()` 添加到 faces
    上下文中。最后，当 `UIInput#isValid()` 返回 `false` 时，将使用 `true` 调用 `FacesContext#setValidationFailed()`。

    到该阶段结束时，如果 `FacesContext#isValidationFailed()` 返回 `true`，则生命周期将立即前进到渲染响应阶段（第六阶段），从而跳过中间的任何阶段。

