    \n16. `FacesServlet`将让组件树渲染 HTTP 响应。\n\n17. 组件树将在生成 HTML 输出时，必要时从后台 bean 获取当前模型值。实际上，任何参与生成\
    \ HTML 输出的 Facelets 组件和 Jakarta Faces 组件的属性都将被执行。\n\n18. 组件树将把 HTML 输出写入 HTTP\
    \ 响应。\n\n19. `FacesServlet`将把 HTTP 响应返回给最终用户。\n\n这与基于请求的 MVC 框架不同，在后者中，开发者需要在与视图关联的“控制器”类中编写更多样板代码，以定义需要应用哪些请求参数，以及/或者在填充实体之前应如何转换和验证它们。开发者还经常需要在调用操作之前，通过手动调用一堆\
    \ getter 和 setter 来手动填充实体，然后将实体传递给服务层。在像 Jakarta Faces 这样的基于组件的 MVC 框架中，所有这些都不是必需的。\n\
    \n需要注意的是，后台 bean 在 MVC 范式中具有相当独特的地位。根据视角的不同，它可以充当模型、视图和控制器。这将在第 [8](#454457_2_En_8_Chapter.xhtml)\
    \ 章中详细说明。\n\n## 标准 HTML 组件\n\n默认的 Jakarta Faces 实现已经提供了一组丰富的组件，用于借助 Facelets 视图技术编写\
    \ HTML 页面。这些 HTML 组件位于`jakarta.faces.html` XML 命名空间 URI（统一资源标识符）下，该 URI 应分配给“`h`”XML\
    \ 命名空间前缀。\n\n```\nJakarta Faces 页面中最重要的 HTML 组件是 <h:head> 和 <h:body>。\n没有它们，Jakarta\
    \ Faces 将无法自动包含与特定组件关联的任何脚本或样式表资源。\n例如，<h:commandButton>（它生成一个 HTML 提交按钮）可以通过\
    \ <f:ajax> 标签可选地包含 Ajax 功能。\n此 Ajax 功能需要将 faces.js 脚本文件包含在 HTML 文档中。该组件的渲染器会自动处理这一点，但这只有在存在\
    \ <h:head> 时才能正常工作。\n\n<h:body> 对于 Ajax 功能不是必需的，但可能存在一些组件需要在 HTML 正文末尾添加脚本，以便在页面加载期间执行初始化，例如\
    \ <f:websocket>，它需要在 JavaScript 中创建一个新的 window.WebSocket 实例。\n换句话说，最精简且符合 HTML5\
    \ 规范的 Jakarta Faces 视图定义如下所示：\n```\n\n```html\n<!DOCTYPE html>\n<html lang=\"\
    en\" xmlns:h=\"jakarta.faces.html\">\n<h:head>\n    <title>Title</title>\n</h:head>\n\
    <h:body>\n    ...\n</h:body>\n</html>\n```\n\n生成的 HTML 响应（您可以通过在普通 Web 浏览器中右键单击“查看页面源代码”来检查）应如下所示：\n\
    \n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <title>Title</title>\n\
    </head>\n<body>\n    ...\n</body>\n</html>\n```\n\n如您所见，Jakarta Faces 基本上将视图定义中的所有组件替换为其生成的\
    \ HTML 输出。如前所述，Jakarta Faces 提供了一组广泛的标准 HTML 组件。表 [3-1](#454457_2_En_3_Chapter.xhtml#Tab1)\
    \ 提供了一个概览。\n\n**表 3-1 Jakarta Faces 提供的标准 HTML 组件**\n\n| 组件标签 | 组件超类 | 值类型 | HTML\
    \ 输出 | 自版本 |\n| :--- | :--- | :--- | :--- | :--- |\n| `<h:body>` | `UIOutput`\
    \ | - | `<body>` | 2.0 |\n| `<h:button>` | `UIOutcomeTarget` | `String` | `<button\
    \ onclick=window.location>` | 2.0 |\n| `<h:column>` | `UIColumn` | - | `<td>`\
