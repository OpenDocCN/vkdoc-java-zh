- fmt: "# 技术说明\n\n从技术上讲，`<f:metadata>`标签在视图中的位置并不重要，只要它位于顶层页面中即可。最自文档化的做法是将其放在视图的最顶部，紧跟在根标签之后。\n\
    \n```\n...\n...\n...\n```\n\n当使用模板时，应为其提供独立的模板定义。\n\n```\n...\n...\n...\n```\n\
    \n不，你不能将`<f:metadata>`标签放在主模板中，而将`<f:viewParam>`和`<f:viewAction>`标签保留在模板客户端中。这是一个技术限制。你能做的最好的事情是创建一个自定义的`<f:event>`类型，该类型在调用应用程序阶段（第五阶段）之后运行，然后在主模板中声明它。第[3](#454457_2_En_3_Chapter.xhtml)章的“自定义组件系统事件”部分给出了一个示例。\n\
    \n`<f:viewParam>`标签由`UIViewParameter`组件支持，该组件又继承自`UIInput`超类。这意味着它的行为几乎与`<h:inputText>`完全相同，但用于GET参数。细微的差别在于处理验证阶段（第三阶段）。默认情况下，空参数会跳过任何自定义验证器和Jakarta\
    \ Bean验证。例如，`@NotNull` Jakarta Bean验证注解仅在`web.xml`中将上下文参数`jakarta.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL`显式设置为`true`时才有效。另一个区别在于渲染响应阶段（第六阶段）。基本上，它不渲染任何内容。\n\
    \n`<f:viewAction>`标签由`UIViewAction`组件支持，该组件又实现了`ActionSource`接口。这意味着它的行为几乎与`<h:commandButton>`完全相同，但用于GET请求。当然，你也可以在`@ViewScoped`托管bean上使用带有`@PostConstruct`注解的方法来执行GET请求的逻辑，但问题在于它会在托管bean实例创建后立即运行，而此时任何`<f:viewParam>`甚至还没有机会运行。`<f:viewAction>`将在调用应用程序阶段（第五阶段）被调用，此时模型值已经更新。它甚至支持返回一个表示导航结果的`String`，该结果将表现为重定向。以下是一个搜索表单的示例：\n\
    \nFacelets文件`/search.xhtml`：\n\n```\n...\n...\n...\n```\n\n后台bean类`com.example.project.view.Search`：\n\
    \n```\n@Named @RequestScoped\npublic class Search {\n    private String query;\n\
    \    private List results;\n    @Inject\n    private SearchService searchService;\n\
    \    public void onload() {\n        results = searchService.listResults(query);\n\
    \    }\n    // Add/generate getters and setters here.\n    // Note that results\
    \ doesn't need a setter.\n}\n```\n\n在Facelets文件中，除了普通的HTML表单方法之外，还有几点需要注意。文本输入的`value`属性在`#{search.query}`为空时显示`#{param.query}`，因为否则当`<f:viewParam>`上出现转换或验证错误时，提交的值根本不会显示。`#{param}`实际上是一个隐式EL对象，引用请求参数映射。`#{param.query}`基本上打印了名称为“`query`”的请求参数的值。请注意，这种利用三元运算符`#{x\
    \ ? y : z}`的`value`属性构造对于Jakarta Faces输入组件是无效的。它会在更新模型值阶段（第四阶段）抛出`jakarta.el.PropertyNotWritableException`。此外，`UIInput`类在底层基本上已经执行了完全相同的逻辑。`<h:message>`也可以附加到`<f:viewParam>`上。然而，在这种特定的构造中，它实际上并未被使用。只有当你向`<f:viewParam>`添加转换器或验证器时，例如通过`<f:viewParam\
    \ ... required=\"true\">`，你才会在`<h:message>`中看到错误消息，并且此时`<f:viewAction>`不会被调用。\n\
    \n现在，当你打开页面并提交表单时，提交的值将作为查询字符串出现在URL中，例如`/search.xhtml?query=submitted%20value`。这是可书签化的，并且每次打开URL时都可以重新执行。\n\
    \n## 无状态表单\n\n状态保存在动态操作的表单中特别有用，这些表单使用Ajax有条件地渲染部分表单，例如级联下拉菜单和辅助输入字段。Jakarta Faces会记住同一视图上跨Ajax回发的表单状态。通常，正是这些表单绝对需要视图范围的托管bean，而不是请求范围的托管bean。\n\
    \n当你的网站有“公共”和“私有”部分时，你希望尽可能推迟HTTP会话的创建，直到最终用户实际登录。这样，机器人就不会触发不必要的HTTP会话创建。然而，如果你在公共部分有一个标准的Jakarta\
