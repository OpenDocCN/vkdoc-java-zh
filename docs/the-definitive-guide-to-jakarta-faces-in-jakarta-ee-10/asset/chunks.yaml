    其中 `XxxScoped.class` 可以是任何与 CDI 兼容的作用域，`S` 代表该作用域的拥有者。对于以下作用域，对应关系如下：


    *   `ApplicationScoped.class` – `jakarta.servlet.ServletContext`

    *   `SessionScoped.class` – `jakarta.servlet.http.HttpSession`

    *   `ConversationScoped.class` – `jakarta.servlet.ServletRequest`

    *   `FlowScoped.class` – `jakarta.faces.flow.Flow`

    *   `ViewScoped.class` – `jakarta.faces.component.UIViewRoot`

    *   `RequestScoped.class` - `jakarta.servlet.ServletRequest`


    请注意，包含此观察者方法的 Bean 必须至少具有相同的作用域，才能使 `@Observes @Initialized` 生效。对于应用作用域的托管 Bean，急切初始化的优势在于，您可以将其配置为“启动”Bean，而无需在其他
    Bean 中引用它来触发其初始化。


    ```

    @ApplicationScoped

    public class Startup {

    public void contextInitialized

    (@Observes @Initialized(ApplicationScoped.class)

    ServletContext context)

    {

    // ...

    }

    }

    ```


    对于请求作用域的 Bean，急切初始化的优势在于，如有必要，您可以在 `FacesServlet` 被调用之前很久就发起异步数据库查询。


    ```

    @Named @RequestScoped

    public class EagerProducts {

    private Future> list;

    @Inject

    private ProductService productService;

    public void requestInitialized

    (@Observes @Initialized(RequestScoped.class)

    HttpServletRequest request)

    {

    if ("/products.xhtml".equals(request.getServletPath())) {

    list = productService.asyncList();

    }

    }

    public List getList() {

    try {

    return list.get();

    }

    catch (InterruptedException e) {

    Thread.currentThread().interrupt();

    throw new FacesException(e);

    }

    catch (ExecutionException e) {

    throw new FacesException(e);

    }

    }

    }

    ```


    其中 `ProductService` 如下所示：


    ```

    @Stateless

    public class ProductService {

    @TransactionAttribute(SUPPORTS)

    public List list() {

    return entityManager

    .createQuery("FROM Product ORDER BY id DESC", Product.class)

    .getResultList();

    }

    @Asynchronous

    public Future> asyncList() {

    return new AsyncResult(list());

    }

    }

    ```


    特别要注意，`requestInitialized()` 方法需要在调用业务服务方法之前确定实际的路径。这是因为 `@Observes @Initialized(RequestScoped.class)`
    基本上会在每个请求上被调用。在这个特定示例中，只有当请求访问 `/products.xhtml` 页面时，业务服务方法才会被触发。而该页面可以像往常一样引用产品列表。


    ```

    ...


    ```


    当打开此页面时，请求作用域的 Bean 将在请求开始时立即被初始化，远在 `FacesServlet` 被调用之前，并异步地从数据库获取 `List<Products>`。根据所使用的服务器硬件、可用的服务器资源以及在
    Bean 创建和进入 Jakarta Faces 渲染响应阶段之间运行的所有同步代码，这种方法可能会为您提供 10`–`500 毫秒（如果管道中存在一些低效代码，甚至可能更多）的时间窗口，用于在与
    HTTP 请求并行的不同线程中从数据库获取数据，从而实现与数据库获取数据所需时间相当的速度提升。


    **分层**


    在实现支持 Bean 时，理解将 Jakarta Faces 支持 Bean 与 Jakarta Persistence 实体和 Jakarta Enterprise
    Beans 服务分离的重要性至关重要。换句话说，在开发支持 Bean 时，您应确保您的支持 Bean 尽可能精简，并尽可能多地将模型属性委托给实体，将业务逻辑委托给服务。您应该认识到，实体和服务应该能够在与
    Jakarta Faces 完全不同的前端（例如 Jakarta RESTful Web Services 甚至普通的 Jakarta Pages/Servlets）中完全可重用。


    因此，这也意味着您应确保不要直接或间接地在实体或服务中包含 Jakarta Faces 特定的依赖项。例如，以下方法实际上是错误的：


    ```

    @Entity

    public class Product {

    private String name;

    private String description;

    public static Product of(ProductBacking backingBean) {

    Product product = new Product();

    product.setName(backingBean.getName());

    product.setDescription(backingBean.getDescription());

    return product;

    }

    // ...

    }

    ```


    在这里，Jakarta Persistence 实体与 Jakarta Faces 支持 Bean 紧密耦合。不仅实体的属性在支持 Bean 中被重用，而且实体还依赖于支持
    Bean。这将无法将实体提取到可跨不同 Web 应用程序重用的独立 JAR 模块中。


    以下方法实际上也是错误的：


    ```

    @Stateless

    public class ProductService {

    @Inject

    private EntityManager entityManager;

    public void create(Product product) {

    entityManager.persist(product);

    FacesContext.getCurrentInstance().addMessage(null,

    new FacesMessage("Product created!"));

    }

    }

    ```

    '
- fmt: 'Here, the Jakarta Enterprise Beans method pokes the faces context and sets
    a message there. This would fail with a `NullPointerException` when the method
    is being invoked from, for example, a web service or a servlet because there’s
    no instance of the faces context available anywhere over there. This UI messaging
    task is clearly not the responsibility of the back-end code but of the front-end
    code. In other words, adding a faces message should only and only happen in a
    Jakarta Faces artifact, such as a backing bean.


    The correct approach is as follows, as demonstrated previously in the section
    “Model, View, or Controller?”:


    ```

    @Named @RequestScoped

    public class ProductBacking {

    private Product product = new Product();

    @Inject

    private ProductService productService;

    public void save() {

    productService.create(product);

    FacesContext.getCurrentInstance().addMessage(null,

    new FacesMessage("Product created!"));

    }

    public Product getProduct() {

    return product;

    }

    }

    ```


    ## Naming Conventions


    There is no strict convention specified by Jakarta Faces itself. I’ve seen the
    following conventions across various projects:


    *   `Foo`

    *   `FooBean`

    *   `FooBacking`

    *   `FooBackingBean`

    *   `FooManager`

    *   `FooManagedBean`

    *   `FooController`


    whereby `Foo` can in turn represent one of the following:


    *   Jakarta Faces view ID, for example, `EditProduct` for `/edit/product.xhtml`

    *   Jakarta Faces view name, for example, `Products` for `/view/products.xhtml`

    *   Jakarta Persistence entity name, for example, `Product` for `@Entity class
    Product`

    *   Jakarta Faces form ID, for example, `EditProduct` for `<h:form id="editProduct">`


    First and foremost, names ending with `Bean` like `FooBean`, `FooBackingBean`,
    and `FooManagedBean` must be avoided to all extent. The “bean” suffix is superfluous
    and too ambiguous as practically any stateful class in Java can be marked as a
    JavaBean. You don’t immediately use `ProductBean` for your entity or `ProductServiceBean`
    or even `ProductServiceEnterpriseBean` for your service, right? True, `#{bean}`
    or `#{myBean}` or even `#{yourBean}` to indicate a managed bean is very often
    used across generic code examples in blogs, forums, Q&A sites, and even this book.
    But this is merely done for clarity and simplicity of the code snippets.


    That leaves us with `Foo`, `FooBacking`, `FooManager`, and `FooController`. All
    are equally acceptable. Personally, I tend to use `FooBacking` for request-, view-,
    flow-, and conversation-scoped beans and `FooManager` for session- and application-scoped
    beans. As to the naming convention of `Foo` part, that generally depends on whether
    the backing bean is tightly tied to a particular Jakarta Faces view or a Jakarta
    Faces form, or generally reusable across multiple Jakarta Faces views or forms
    referring a particular entity.


    In any case, this is a pretty subjective item that can hardly be answered objectively
    with “the One and Correct” answer. It really doesn’t matter that much to me or
    anyone else what you make of it, as long as you’re consistent with it throughout
    the entire project.


    ## Footnotes


    ## 9. Exception Handling


    Sometimes, things can unexpectedly go wrong. In Java, that usually manifests as
    an `Exception` being thrown. In Jakarta EE, it’s basically no different. The issue
    is how and when to properly handle them. By default, any uncaught exception during
    an HTTP request will end up in a default error page provided by the application
    server. Figure [9-1](#454457_2_En_9_Chapter.xhtml#Fig1) shows what WildFly’s default
    HTTP 500 error page looks like.


    ![](images/454457_2_En_9_Chapter/454457_2_En_9_Fig1_HTML.png)


    Figure 9-1 The default HTTP 500 error page of WildFly


    The Jakarta Faces implementation being used may even provide its own default error
    page. Both Mojarra and MyFaces provide an internal default implementation based
    on the `jakarta.faces.context.ExceptionHandler` API,^([^(80)](#fn80)) which is
    only shown when the Jakarta Faces project stage is set to `Development`. Figure
    [9-2](#454457_2_En_9_Chapter.xhtml#Fig2) shows how that page looks for Mojarra.


    ![](images/454457_2_En_9_Chapter/454457_2_En_9_Fig2_HTML.png)


    Figure 9-2 The default HTTP 500 error page of Mojarra in development stage


    It not only includes the stack trace but also the textual representation of the
    Jakarta Faces component tree and any scoped variables, which might be helpful
    in nailing down the root cause, although, in reality, the stack trace alone and
    reexecuting the use case with a debugger is much more helpful than that.


    ### Custom Error Pages


    While useful to the average web developer, those default error pages are, quite
    frankly, scary to the average end user. The look and feel is completely off from
    the rest of the site, and the text is like abracadabra to the average end user.
    Such an error page doesn’t even provide escape points for the end user. The disgruntled
    end user cannot quickly find its way to the home or contact page. Fortunately
    for the end user, you can override those default error pages by including an error
    page in the web application and registering its location in an `<error-page>`
    entry in `web.xml`.


    ```

    /WEB-INF/errorpages/500.xhtml

    ```


    The custom error page is purposefully being placed in a `/WEB-INF` folder so that
    end users can’t access or bookmark them directly. By default, the servlet container
    will set error page–related attributes in the request scope whose keys are defined
    as `jakarta.servlet.RequestDispatcher.ERROR_XXX` constants.^([^(81)](#fn81)) This
    way, you can, if necessary, include them in the custom error page. The following
    is an example:


    ```

    Request URI

    #{requestScope[''jakarta.servlet.error.request_uri'']}

    Exception type

    #{requestScope[''jakarta.servlet.error.exception''][''class'']}

    Exception message

    #{requestScope[''jakarta.servlet.error.exception''].message}

    Stack trace

    #{

    facesContext.externalContext.response.writer.flush()

    }#{

    requestScope[''jakarta.servlet.error.exception''].printStackTrace

    (facesContext.externalContext.response.writer)

    }

    ```


    Note the trick to print the stack trace. It’s important that the response writer
    is flushed before printing the stack trace and that there’s no whitespace in template
    text outside the EL (Expression Language) expressions within the `<pre>` element;
    otherwise, it would be appended to the stack trace.


    Coming back to the scariness of such an error page, you’d better hide away all
    the error detail behind a condition that evaluates only `true` when the Jakarta
    Faces project stage equals `Development`. First, set an application-scoped shortcut
    variable in some master template:


    Now you can conditionally display any technical information in the error page
    when the Jakarta Faces project stage equals `Development`.


    ```

    Error detail for developer


    ...


    ```


    In any case, it’s very important that the error page is entirely stateless. In
    other words, a decent error page may not contain any Jakarta Faces forms, not
    even a logout form. Not only will you avoid the risk that the form submit fails
    because the initial exception was actually caused by a corrupted Jakarta Faces
    state, but those forms will actually submit to the wrong URL (uniform resource
    locator), namely, the one of the error page itself. As the error page is hidden
    in the `/WEB-INF` folder, the form submit would only result in a 404 error. Instead
    of moving the error page outside the `/WEB-INF` folder, you could work around
    the logout case by using a plain HTML form which submits to a plain Servlet. The
    `SecurityContext` is also just injectable over there, as are session-scoped managed
    beans, if any.


