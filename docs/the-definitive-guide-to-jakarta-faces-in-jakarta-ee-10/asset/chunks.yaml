- fmt: "# View Build Time\n\nThe “view build time” is not tied to a particular phase\
    \ of the Jakarta Faces life cycle. The view build time is that moment when the\
    \ physical `UIViewRoot` instance will be populated with all of its children based\
    \ on the view definition.\n\nWhen Jakarta Faces is about to create a `UIComponent`\
    \ instance based on the view definition, then it will first check whether the\
    \ getter method behind the `binding` attribute, if any, returns a concrete `UIComponent`\
    \ instance. If so, then continue using it instead, or else create the `UIComponent`\
    \ instance based on the “component type” associated with it and then invoke the\
    \ setter behind the `binding` attribute, if any, with it. If the `id` attribute\
    \ is specified, then `UIComponent#setId()` will be invoked with it. Finally, `UIComponent#setParent()`\
    \ will be invoked with the parent component, and then the component instance becomes\
    \ physically part of the component tree. This tree will exist until the end of\
    \ the render response phase (sixth phase). Then it becomes eligible for the garbage\
    \ collector, along with the released faces context instance.\n\nEffectively, `UIComponent`\
    \ instances are thus request scoped. The `binding` attribute can refer a managed\
    \ bean property, but as `UIComponent` instances are inherently request scoped,\
    \ the target managed bean must be request scoped and may not be in a broader scope.\
    \ This won’t be checked by the Jakarta Faces API, so you as being a Jakarta Faces\
    \ developer should make absolutely sure that you don’t reference a broader scoped\
    \ managed bean in the `binding` attribute of any component.\n\nWhen the `binding`\
    \ attribute of any component incorrectly references a managed bean in a broader\
    \ scope than the request scope, then you’re not only basically saving the entire\
    \ component tree in the HTTP session in case the bean is view or session scoped,\
    \ but you’re also essentially sharing the entire component tree across multiple\
    \ HTTP requests that are concurrently accessing the very same managed bean instance.\
    \ Very inefficient and thus dangerous.\n\nThe view build time can technically\
    \ happen during any phase of the Jakarta Faces life cycle. Generally, that’s the\
    \ restore view phase (first phase), particularly during a postback request, or\
    \ when the view has `<f:metadata>` with children. It can also happen during the\
    \ render response phase (sixth phase), particularly during a GET request when\
    \ the view has no `<f:metadata>` with children, or when a non-redirect navigation\
    \ has taken place during a postback. It will also happen when the developer programmatically\
    \ invokes `ViewDeclarationLanguage#buildView()`, which can be implicitly done\
    \ via, among others, `ViewHandler#createView()` as shown in the following example\
    \ of an action method that forces Jakarta Faces to fully rebuild the current view\
    \ from scratch:\n\n```\npublic void rebuildCurrentView() {\n    FacesContext context\
    \ = FacesContext.getCurrentInstance();\n    UIViewRoot currentView = context.getViewRoot();\n\
    \    String viewId = currentView.getViewId();\n    ViewHandler viewHandler = context.getApplication().getViewHandler();\n\
    \    UIViewRoot newView = viewHandler.createView(context, viewId);\n    context.setViewRoot(newView);\n\
    }\n```\n\nDo note that the view state is not per definition during the view build\
    \ time restored into the component tree. The view state is only restored into\
    \ the component tree during the restore view phase (first phase), and that happens\
    \ after the `FacesServlet` has executed the view build time by itself. In other\
    \ words, the `rebuildCurrentView()` method shown before does not restore the current\
    \ view state into the newly created component tree. Programmatically restoring\
    \ the view state is generally not recommended when programmatically rebuilding\
    \ the view as above, as in a real-world Jakarta Faces application, the sole reason\
    \ to rebuild the current view is usually to get rid of any changes caused by the\
    \ persistent view state and/or to forcibly reexecute any Jakarta Tags based on\
    \ the freshly changed values in the managed bean.\n\n# View Render Time\n\nThe\
    \ “view render time” is also not tied to a particular phase of the Jakarta Faces\
    \ life cycle. The view render time is that moment when `UIComponent#encodeAll()`\
    \ of a particular component is invoked. True, it’s by default always executed\
    \ on the `UIViewRoot` during the render response phase (sixth phase) by the `FacesServlet`\
    \ itself, but this doesn’t stop you from programmatically invoking it during a\
    \ different phase, such as the invoke application phase (fifth phase), for example,\
    \ in order to obtain the generated HTML output of an arbitrary component as a\
    \ `String` variable.\n\n# View State\n\nAs explained in the section “View Build\
    \ Time,” the `UIComponent` instances resembling the component tree are inherently\
    \ request scoped. They are created during the view build time, and they are destroyed\
    \ right after the render response phase (sixth phase). Any changes to properties\
    \ of the `UIComponent` instances, which are not referenced by an EL (Expression\
    \ Language) expression and are different from their default values, will be saved\
    \ as “view state.” In other words, the “view state” is very definitely not the\
    \ same as the “component tree.” Moreover, if the entire component tree itself\
    \ would be saved in the view state, then this would result in not only an unnecessarily\
    \ bloated view state but also corrupted application behavior as `UIComponent`\
    \ instances are inherently not thread safe and may therefore absolutely not be\
    \ shared across multiple HTTP requests.\n\nSaving the view state usually happens\
    \ during the view render time. Therein, Jakarta Faces will write out the view\
    \ state to a `jakarta.faces.ViewState` hidden input field of the generated HTML\
    \ representation of every Jakarta Faces form. When the Jakarta Faces “state saving\
    \ method” setting has the default value “server,” then the hidden input value\
    \ represents a unique identifier referring the serialized view state object that\
    \ is stored in the HTTP session. When the Jakarta Faces “state saving method”\
    \ setting is explicitly set to “client” using the following `web.xml` context\
    \ parameter, then the hidden input value itself represents the encrypted form\
    \ of the serialized view state object.\n\n```\njakarta.faces.STATE_SAVING_METHOD\n\
    client\n\nfaces/ClientSideSecretKey\njava.lang.String\n[AES key in Base64 format]\n\
    ```\n\nNote that explicitly specifying the `faces/ClientSideSecretKey` environment\
    \ entry with a fixed AES (Advanced Encryption Standard) key is mandatory in case\
    \ you’re running the Jakarta Faces application on a cluster of servers (“cloud”),\
    \ or when you’d like the view state still to be valid after a server restart.\
    \ You can generate a Base64-encoded AES key yourself using the following plain\
    \ Java snippet:\n\n```\nKeyGenerator keyGen = KeyGenerator.getInstance(\"AES\"\
    );\nkeyGen.init(256); // Or 128 in case you don't have JCE.\nbyte[] rawKey = keyGen.generateKey().getEncoded();\n\
    String key = Base64.getEncoder().encodeToString(rawKey);\nSystem.out.println(key);\
    \ // Prints AES key in Base64 format.\n```"
