  trans: '

    在现代 Jakarta EE 应用中，你确实不会期望看到有人直接传递一个普通的 `java.sql.ResultSet`，但这都是为了向后兼容。请记住，Jakarta
    Faces 是在 2004 年引入的。向后兼容性是它能够存活至今的最强支柱之一。它当然是一个可以被移除的候选对象，但不是现在。


    某些类型之间确实存在重叠；`List` 和 `Collection` 很容易被 `Iterable` 覆盖，因为它们都实现了这个接口。但这有性能方面的原因。对于
    `List`，`ListDataModel` 通过索引直接访问元素；对于 `Collection`，元素首先通过 `Collection#toArray()`
    提取，然后由 `CollectionDataModel` 通过索引访问；而对于 `Iterable`，元素会被简单地迭代，并首先由 `IterableDataModel`
    收集到一个新的 `List` 中。这可能会带来差异。


    你还会看到，Faces 2.3 不仅新增了两个数据模型，还引入了一个新的注解来注册自定义数据模型。以前，每次将自定义集合传递给 `UIData` 组件之前，你都需要手动将其包装在自定义数据模型中。`DataModel`
    抽象类本身有一个缺点，即它本身不是 `Serializable` 的，这或多或少迫使你让持有此类数据模型的 `@ViewScoped` bean 在 transient
    数据模型属性上使用延迟加载的 getter，如下所示：


    ```

    private YourCollection yourCollection;

    private transient YourDataModel dataModel;

    public DataModel getDataModel() {

    if (dataModel == null) {

    dataModel = new YourDataModel(yourCollection);

    }

    return dataModel;

    }

    ```


    理想情况下，`UIData` 应该能自己识别 `YourCollection` 类型，并自动将其包装在 `YourDataModel` 中。`@FacesDataModel`
    注解正是用来实现这一点的。


    ```

    @FacesDataModel(forClass=YourCollection.class)

    public class YourDataModel extends DataModel {}

    ```


    回到自定义渲染器，还有一个方法没有解释：`getRendersChildren()`。它被重写以显式返回 `true`。你可能会问自己，为什么它最初是 `false`？为什么不直接让它成为
    `encodeChildren()` 的默认行为，并依赖任何重写的 `encodeChildren()` 方法来决定是否要对子组件调用 `encodeAll()`？这实际上是规范中的一个历史性疏忽。最初，`encodeAll()`
    方法并不存在。它是在 Faces 1.2 中才添加的，并且它基本上使 `getRendersChildren()` 变得过时了。但为了向后兼容，引入了这种复杂性。

    简而言之，如果你重写了 `encodeChildren()` 方法，请始终让 `getRendersChildren()` 返回 `true`。否则，子组件将根本不会被编码。

    最后但同样重要的是，你可能还会想知道，为什么我们不“简单地”重写 `DataList` 组件的 `encodeBegin()`、`encodeChildren()`（以及
    `getRendersChildren()`）和 `encodeEnd()` 方法，而是创建一个“完整的”渲染器实现。主要原因是：简单性和可扩展性。`UIComponent`
    上指定的这些方法不仅仅执行渲染。它们还会检查 `UIComponent#isRendered()` 是否返回 `true`。`encodeBegin()`
    还会触发 `PreRenderComponentEvent`，并将当前组件作为 `#{component}` 推入 EL（表达式语言）作用域。`encodeEnd()`
    将 `#{component}` 从 EL 作用域中弹出。它们还会检查是否有附加的渲染器，如果有，则委托给它。这些都在它们的 Javadoc 中有说明。当你重写这些方法时，你需要手动处理这些事情。这是不必要的重复工作。并且，如果将来有人想要调整组件的渲染，如果你的组件不检查自定义渲染器，他们将无法简单地插入一个。


    扩展现有组件


    假设有一个现有的组件，你想调整其行为，通常是通过添加一个或多个新的自定义属性。如果这些属性纯粹是输出性质的，那么你可以直接使用 Faces 2.2 中引入的直通属性（pass-through
    attributes）功能。以前，任何组件官方不支持的属性在视图渲染期间都会被简单地忽略。例如，当你想要为现有的 `<h:inputFile>` 组件添加
    `directory` 属性时，^(⁹¹) 简单地像下面这样添加属性是行不通的。


    ```


    ```


    使用直通属性功能，你可以显式地指示 Jakarta Faces 无论如何都渲染自定义属性。这可以通过两种方式实现。第一种方式是通过 `jakarta.faces.passthrough`
    XML 命名空间注册它。


    ```

    ...


    ```


    另一种方式是通过 `<f:passThroughAttribute>` 标签声明它。


    ```

    ...


    ```


    请注意，你还需要显式设置 `multiple="true"`；否则，你将无法发送包含多个文件的目录。在支持 `directory` 属性的浏览器上，文件浏览对话框将允许选择文件夹。但是，这在不支持此非标准属性的浏览器上不起作用；^(⁹²)
    在基于 WebKit 的浏览器上，你需要设置 `webkitdirectory` 属性。因此，当你仅仅想要在尽可能广泛的浏览器支持下支持目录选择时，最终会变成这样。


    ```

    ...


    ```


    减少这种样板代码的一种方法是扩展 `<h:inputFile>` 组件，添加一个新的 `directory` 属性，该属性会自动相应地设置所有这三个属性。第一步是查看
    `<h:inputFile>` 具体对应哪个 `UIComponent` 类。正如你在表 11-1 中看到的，它是 `jakarta.faces.component.html.HtmlInputFile`。让我们从扩展它并添加新的
    `directory` 属性开始。


    ```

    @FacesComponent(createTag=true)

    public class InputFile extends HtmlInputFile {

    @Override

    public void encodeBegin(FacesContext context) throws IOException {

    boolean directory = isDirectory();

    if (directory) {

    setMultiple(true);

    getPassThroughAttributes().put("directory", true);

    getPassThroughAttributes().put("webkitdirectory", true);

    }

    super.encodeBegin(context);

    }

    public boolean isDirectory() {

    return (boolean) getStateHelper().eval("directory", true);

    }

    public void setDirectory(boolean directory) {

    getStateHelper().put("directory", directory);

    }

    }

    ```


