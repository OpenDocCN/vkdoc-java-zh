    \ HTTP 会话中；第二，即使启用了客户端状态保存，它们仍存储在 HTTP 会话中。这些问题目前尚未在标准的 Jakarta Faces API 中得到解决。\n\
    \n目前，Jakarta Faces 实用工具库 OmniFaces 提供了一个增强版的 `@ViewScoped` 注解，解决了这两个缺点。^(⁷⁵) 使用\
    \ `@org.omnifaces.cdi.ViewScoped` 注解的视图作用域托管 Bean 在最终用户卸载页面时会被实际销毁。这底层是通过 JavaScript\
    \ 中的 `Navigator.sendBeacon` API^(⁷⁶) 以及 OmniFaces 提供的专门监听这些卸载请求的 `ViewHandler`\
    \ 实现来完成的。已有生产级应用大量使用视图作用域托管 Bean，在从标准的 Jakarta Faces `@ViewScoped` 切换到 OmniFaces\
    \ `@ViewScoped` 后，内存使用量减少了高达 80%。这使得“卸载时销毁”功能成为未来版本标准 Jakarta Faces API 中一个重要的候选特性。\n\
    \n为了在启用客户端状态保存时，将物理上的视图作用域托管 Bean 保存到 Jakarta Faces 视图状态中，必须将 OmniFaces `@ViewScoped`\
    \ 注解的 `saveInViewState` 属性设置为 `true`。你只需要记住，这些 Bean 永远不会过期，即使页面被卸载或 HTTP 会话过期也不会。实际上，整个\
    \ Bean 在物理上已成为生成的 HTML 输出的一部分，位于 `jakarta.faces.ViewState` 隐藏输入字段中。社区已有请求，希望让\
    \ Jakarta Faces 状态管理更加灵活，例如在逐个视图（每个 `UIViewRoot`）甚至逐个表单（每个 `UIForm`）的基础上切换客户端和服务器端状态保存，并能够将视图作用域托管\
    \ Bean 存储在实际的视图状态中，而不是 HTTP 会话中。这也可能在未来的标准 Jakarta Faces API 版本中重新考虑。\n\n@RequestScoped\n\
    \n请求作用域托管 Bean 的生命周期与 HTTP 请求绑定，这对 Jakarta Faces 来说是最重要的情况。其他情况包括：会话 Bean 上异步方法调用（使用\
    \ `@Asynchronous` 注解的方法）的生命周期、定时器超时方法的生命周期，或消息驱动 Bean（MDB）处理消息时的生命周期，所有这些都发生在\
    \ Jakarta Enterprise Beans（以前称为 Jakarta Enterprise Beans）中。请注意，Ajax 请求也计为单个 HTTP\
    \ 请求。\n\n当客户端向服务器发送 HTTP 请求时，Servlet 容器会创建代表 HTTP 请求和响应的 `HttpServletRequest`\
    \ 和 `HttpServletResponse` 实例，并将它们传递给认证模块、Servlet 过滤器和 Servlet。在所有认证模块、Servlet\
    \ 过滤器和 Servlet 完成请求和响应的处理后，这些实例会立即被销毁。换句话说，每个 HTTP 请求都会创建一个新的请求作用域托管 Bean 实例，该实例仅在该请求期间可用，在其他请求中不可用。\n\
    \n请求作用域托管 Bean 适用于简单且静态的表单，这些表单没有任何基于 Ajax 的动态更新，对于这类表单，你更倾向于使用视图作用域托管 Bean。可以想象一个登录表单或联系表单。\n\
    \n```\n@Named @RequestScoped\npublic class Login {\nprivate String username;\n\
    private String password;\n// ...\n}\n```\n\n当然，这些表单也可以毫无问题地绑定到视图作用域托管 Bean，但那样会浪费内存空间。请注意，你绝对不应该将\
    \ Jakarta Persistence 实体本身作为托管 Bean。换句话说，以下方法实际上是错误的：\n\n```\n@Named @RequestScoped\
    \ // 或 @Model\n@Entity\npublic class Product {\n// ...\n}\n```\n\n这不仅违反了迪米特法则^(⁷⁷)，而且还有可能导致\
    \ Jakarta Persistence 无法持久化它，因为 CDI 实际上会将托管 Bean 包装在一个代理类中，而当你试图将注入的实例传递给实体管理器时，Jakarta\
    \ Persistence 将无法从中获取实体信息。在这种情况下，Hibernate 会抛出 “`Unknown entity: com.example.Entity$Proxy$_$$_WeldClientProxy`”\
    \ 异常，这实际上代表的是 CDI 代理类。\n\n此时你可能想知道 CDI 究竟是如何工作的。首先，在 Web 应用程序启动期间，它会收集所有使用 CDI\
    \ 兼容作用域注解标注的类。然后，它会为所有这些类生成代理类。最终，这些代理类的实例会被注入。给定一个示例 Bean 类 `com.example.Bean`，生成的\
    \ CDI 代理类可能如下所示：\n\n```\npublic class Bean$Proxy$_$$_CDI extends Bean implements\
    \ Serializable {\npublic String getSomeProperty() {\nBean actualInstance = CDI.resolveItSomehow();\n\
    return actualInstance.getSomeProperty();\n}\npublic void setSomeProperty(String\
    \ someProperty) {\nBean actualInstance = CDI.resolveItSomehow();\nactualInstance.setSomeProperty(someProperty);\n\
    }\n}\n```"
- fmt: "你看到，它继承了`bean`类，使其可序列化，并使用了一个“不可能冲突”的类名，并让所有方法委托给从CDI上下文获取的实际实例。你可能也会立刻理解为什么CDI\
    \ bean管理设施要求bean类必须是公共的，并且有一个公共的无参构造函数。你还会看到，当创建并注入这样一个代理类时，底层的实际实例并不一定会被创建。它只会在虚构的`CDI.resolveItSomehow()`方法被调用时自动创建。在底层，它会从一个线程局部变量中获取上下文，这与`FacesContext#getCurrentInstance()`的工作方式完全相同。\n\
    \n顺便提一下，Jakarta Enterprise Beans也以这种方式使用可序列化的代理。这就是为什么它能够看似神奇地完成启动或加入事务以及使用池化实例等所有繁重工作。所有这些实际上都是在代理方法中完成的，在调用实际实例方法之前和之后。\n\
    \n请注意，CDI还有一个`@jakarta.enterprise.inject.Model`原型注解，它基本上将`@Named`和`@RequestScoped`捆绑到一个注解中。这与请求作用域的托管bean没有任何区别。不幸的是，它并不代表一个非代理实例；否则，将其放在`@Entity`上会很好。`@Model`注解的存在只是为了方便。\n\
    \n### `@Dependent`\n\n一个依赖作用域的托管bean的生命周期与它首次被创建时所处的作用域的生命周期绑定。因此，如果你将它注入到一个`@ApplicationScoped`中，那么它也会变成应用作用域。如果你将它注入到一个`@ViewScoped`中，那么它也会变成视图作用域，依此类推。这是CDI的默认作用域。\n\
    \n然而，这有一个陷阱。当你忘记在你的`@Named`支持bean上声明任何CDI作用域注解，并且直接在EL中引用它，如`#{dependentScopedBean}`，而不是通过另一个托管bean引用它，如`#{requestScopedBean.dependentScopedBean}`，那么每次EL求值都会创建一个全新的实例，该实例仅存在于该EL上下文中。换句话说，想象一个Jakarta\
    \ Faces表单，有两个输入字段和一个提交按钮，每个都绑定到一个依赖作用域的托管bean，那么你最终会得到三个独立的实例。一个设置了第一个输入字段，一个设置了第二个输入字段，一个调用了动作方法。因此，如果你曾经观察到动作方法中提交的值为`null`的奇怪行为，即使必需的验证已经通过，那么首先要检查的是CDI托管bean的作用域是否存在且正确。\n\
    \n与其他作用域的主要技术区别在于，依赖作用域的托管bean不会被代理。换句话说，被注入的是实际实例。以下是一个示例，说明如何通过`@Inject`使用它来准备一个新的（且未被代理的！）Jakarta\
    \ Persistence实体：\n\n```java\n@Dependent\npublic class Entities {\n    @Produces\n\
    \    public Product getProduct() {\n        return new Product();\n    }\n}\n\n\
    @Named @RequestScoped\npublic class Products {\n    @Inject\n    private Product\
    \ product;\n    @Inject\n    private ProductService productService;\n\n    public\
    \ void add() {\n        productService.create(product);\n    }\n\n    public Product\
    \ getProduct() {\n        return product;\n    }\n}\n```\n\n请注意，你仍然不能使用`<h:inputText\
    \ value=\"#{product.name}\">`，因为它会获取自己的实例。你仍然需要使用`#{products.product.name}`。正是由于这个原因，生产者方法没有被`@Named`注解。还要注意，在视图作用域的托管bean的情况下，你需要通过从动作方法返回一个非空的结果来强制Jakarta\
    \ Faces重新启动视图作用域；否则，注入的`Product`实例将被下一个视图重用。\n\n最终，这个示例并不是非常有用，因为其行为不一定直观。你最好使用`private\
    \ Product product = new Product();`，而不使用`@Inject`。\n\n## 选择哪个作用域？\n\n选择哪个作用域完全取决于bean所持有和表示的数据（实例变量，即状态）。你应该努力将状态放在尽可能短的可接受作用域中。从一个`@RequestScoped`\
    \ bean开始。一旦你注意到某些状态需要在同一视图的回发后保留，就将该状态精确地拆分到一个新的`@ViewScoped` bean中，然后你将其`@Inject`到`@RequestScoped`\
    \ bean中。一旦你注意到某些状态需要在同一会话内的另一个请求中保留，就将该状态精确地拆分到一个新的`@SessionScoped` bean中，然后你将其`@Inject`到`@RequestScoped`\
    \ bean中，依此类推。\n\n滥用`@ApplicationScoped` bean来存储会话、对话、流程、视图或请求作用域的数据，会导致它在所有用户之间共享，因此任何人都可以看到彼此的数据，这完全是错误的。滥用`@SessionScoped`\
    \ bean来存储对话、流程、视图或请求作用域的数据，会导致它在同一会话的所有浏览器标签页之间共享，因此最终用户在切换标签页后与每个视图交互时可能会遇到不一致的情况，这对用户体验不利。滥用`@RequestScoped`\
    \ bean来存储视图、流程或对话作用域的数据，会导致视图、流程或对话作用域的数据在每次（Ajax）回发时被重新初始化为默认值，可能导致表单无法正常工作。滥用`@ViewScoped`、`@FlowScoped`或`@ConversationScoped`\
    \ bean来存储请求、会话或应用作用域的数据，以及滥用`@SessionScoped` bean来存储应用作用域的数据，虽然不会影响最终用户，但会不必要地占用服务器内存，并且效率低下。\n\
    \n请注意，选择作用域不应基于性能影响，除非你确实内存占用很低并且希望完全无状态。那么你需要专门使用带有`@RequestScoped` bean的无状态表单，并通过请求参数来维护任何客户端的状态。换句话说，你可能需要重新发明`jakarta.faces.ViewState`隐藏输入字段已经完成的工作。\n\
    \n## `@FlashScoped`在哪里？\n\n最后，Jakarta Faces也支持闪存作用域。它由一个短期存在的cookie支持，该cookie与会话作用域中的一个数据条目相关联。在重定向前，会在HTTP响应上设置一个cookie，其值代表会话作用域中数据条目的唯一键。重定向后，会检查闪存作用域cookie的存在，并且以cookie值作为键关联的数据条目将从会话作用域中移除，并放入重定向请求的请求作用域中。最后，该cookie将从HTTP响应中移除。这样，重定向后的请求就可以访问在初始请求中准备好的请求作用域数据。\n\
    \n实际上，标准的Jakarta Faces API并没有将其作为托管bean作用域提供。换句话说，没有`@FlashScoped`这样的东西。闪存作用域只能通过托管bean中的`ExternalContext#getFlash()`和EL中的`#{flash}`作为映射使用。从历史上看，引入闪存作用域主要是为了能够在重定向后的页面中显示在动作方法中设置的面部消息。想象一下在详细信息页面中保存编辑过的产品并重定向回主页面用例。\n\
    \n```java\npublic String save() {\n    FacesContext context = FacesContext.getCurrentInstance();\n\
    \    try {\n        productService.update(product);\n        context.addMessage(null,\
    \ new FacesMessage(\"Product saved!\"));\n        return \"/products?faces-redirect=true\"\
    ;\n    }\n    catch (Exception e) {\n        context.addMessage(null, new FacesMessage(\n\
    \            \"Cannot save product. Error: \" + e.getMessage()));\n        return\
    \ null;\n    }\n}\n```"
  raw: "You see, it extends the bean class, makes it serializable, and uses\nan “impossible\
    \ to clash” class name and lets all methods delegate to the\nactual instance obtained\
    \ from the CDI context. You’ll probably also\nimmediately understand why the CDI\
    \ bean management facility requires the\nbean classes to be public and have a\
    \ public default constructor. You’ll\nalso see that when such a proxy class is\
    \ created and injected, the\nunderlying actual instance is not necessarily created.\
    \ It’s only\nautomatically created when the fictive `CDI.resolveItSomehow()`\n\
    method  is\ninvoked. Under the hood, it will obtain the context from a thread\
    \ local\nvariable, exactly how `FacesContext#getCurrentInstance()`\nworks.\nBy\
    \ the way, Jakarta Enterprise Beans also works with serializable\nproxies this\
    \ way. That’s why it could seemingly magically perform all\nthe heavy lifting\
    \ of starting or joining a transaction and using pooled\ninstances. This is all\
    \ thus actually done in the proxied methods, before\nand after calling the actual\
    \ instance method.\nNote that CDI has also a `@jakarta.enterprise.inject.Model`\n\
    stereotype annotation that basically bundles both `@Named` and `@RequestScoped`\
    \ into a\nsingle annotation. This is in no way different from a request-scoped\n\
    managed bean. Unfortunately, it does not represent a non-proxy instance;\notherwise,\
    \ it would be nice to put it on an `@Entity`. The `@Model` annotation\nexists\
    \ just for convenience.\n\n@Dependent\nA dependent-scoped\nmanaged bean\n is tied\
    \ to the lifetime of the scope wherein it’s being created\nfor the first time.\
    \ So if you inject it into an `@ApplicationScoped`,\nthen it will become application\
    \ scoped too. And if you inject it into a\n`@ViewScoped`,\nthen it will become\
    \ view scoped too. And so on. This is the default CDI\nscope.\nThis has, however,\
    \ a caveat. When you forget to declare any CDI scope\nannotation on your `@Named`\
    \ backing bean,\nand you reference it directly in EL, as in `#{dependentScopedBean}`,\n\
    instead of referencing it via another managed bean, as in `#{requestScopedBean.dependentScopedBean}`,\n\
    then every EL evaluation will basically create a brand-new instance that\nexists\
    \ only within that EL context. In other words, imagine a Jakarta\nFaces form with\
    \ two input fields and a submit button, each bound to a\ndependent-scoped managed\n\
    bean ,\nthen you will effectively end up with three separate instances. One\n\
    wherein the first input field is set, one wherein the second input field\nis set,\
    \ and one wherein the action method is invoked. So if you ever\nobserve odd behavior\
    \ of `null` submitted values\nin the action method even though the required validation\
    \ has passed,\nthen the first thing to check is whether the CDI managed bean scope\
    \ is\npresent and correct.\n\nThe major technical difference with other scopes\
    \ is that\ndependent-scoped managed beans are not proxied. In other words, what’s\n\
    being injected is the actual instance. Here’s an example of how it could\nbe used\
    \ to prepare a new (and unproxied!) Jakarta Persistence entity via\n`@Inject`:\n\
    \n```\n@Dependent\npublic class Entities {\n@Produces\npublic Product getProduct()\
    \ {\nreturn new Product();\n}\n}\n@Named @RequestScoped\npublic class Products\
    \ {\n@Inject\nprivate Product product;\n@Inject\nPrivate ProductService productService;\n\
    public void add() {\nproductService.create(product);\n}\npublic Product getProduct()\
    \ {\nreturn product;\n}\n}\n```\n\nNote that you still can’t use `<h:inputText\
    \ value=\"#{product.name}\">` because it would get its own\ninstance. You still\
    \ need to use `#{products.product.name}`.\nFor exactly this reason, the producer\
    \ method isn’t `@Named`. Also note\nthat in case of a view-scoped managed bean,\
    \ you’d need to force Jakarta\nFaces to restart the view scope by returning a\
    \ nonnull outcome from\naction method; otherwise, the injected `Product` instance\n\
    would be reused for the next view.\nIn the end, this example  is not terribly\n\
    useful because the behavior is not necessarily intuitive. You’d better\nuse `private\
    \ Product product = new Product();` instead without the `@Inject`.\n\nWhich Scope\
    \ to Choose?\nWhich scope to choose depends solely on the data (instance variables,\n\
    a.k.a. the state) the bean holds and represents. You should strive to\nput the\
    \ state in the shortest possible acceptable scope. Start with a\n`@RequestScoped`\n\
    bean. Once you notice that some state needs to be retained after a\npostback on\
    \ the same view, split that state exactly into a new `@ViewScoped` bean\nwhich\
    \ you, in turn, `@Inject` in the `@RequestScoped` bean.\nOnce you notice that\
    \ some state needs to be retained on another request\nwithin the same session,\
    \ split that state exactly into a new `@SessionScoped` bean\nwhich you in turn\
    \ `@Inject` in the `@RequestScoped` bean.\nAnd so on.\nAbusing an `@ApplicationScoped`\n\
    bean for session-, conversation-, flow-, view-, or request-scoped data\nwould\
    \ make it to be shared among all users, so anyone else can see each\nother’s data,\
    \ which is just plain wrong. Abusing a `@SessionScoped` bean\nfor conversation-,\
    \ flow-, view-, or request-scoped data\nwould make it to be shared among all browser\
    \ tabs in the same session,\nso the end user may experience inconsistencies when\
    \ interacting with\nevery view after switching between tabs, which is bad for\
    \ user\nexperience. Abusing a `@RequestScoped` bean\nfor view-, flow-, or conversation-scoped\n\
    data would make view-, flow-, or conversation-scoped data be\nreinitialized to\
    \ default on every single (Ajax) postback, causing\npossibly nonworking forms.\
    \ Abusing a `@ViewScoped`, `@FlowScoped`, or `@ConversationScoped`\nbean for request-,\
    \ session-, or application-scoped data and abusing a\n`@SessionScoped`\nbean for\
    \ application-scoped data\ndoesn’t affect the end user, but it unnecessarily occupies\
    \ server memory\nand is plain inefficient.\nNote that the scope should rather\
    \ not be chosen based on performance\nimplications, unless you really have a low\
    \ memory footprint and want to\ngo completely stateless. You’d then need to exclusively\
    \ use stateless\nforms with `@RequestScoped` beans\nand fiddle with request parameters\
    \ to maintain any client’s state. In\nother words, you would possibly need to\
    \ reinvent whatever already is\nbeing done by the `jakarta.faces.ViewState`\n\
    hidden input field.\n\nWhere Is @FlashScoped?\nAt last, Jakarta Faces also supports\
    \ the flash scope. It is backed by\na short living cookie that is associated with\
    \ a data entry in the\nsession scope. Before the redirect, a cookie will be set\
    \ on the HTTP\nresponse with a value that represents the unique key of the data\
    \ entry\nin the session scope. After the redirect, the presence of the flash\n\
    scope cookie will be checked, and the data entry associated with the\ncookie value\
    \ as key will be removed from the session scope and will be\nput in the request\
    \ scope of the redirected request. Finally, the cookie\nwill be removed from the\
    \ HTTP response. This way, the redirected request\nhas access to request-scoped\
    \ data that has been prepared in the initial\nrequest.\n\nThis is actually not\
    \ available as a managed bean scope by standard\nJakarta Faces API. In other words,\
    \ there is no such thing as `@FlashScoped`. The\nflash scope is\nonly available\
    \ as a map via `ExternalContext#getFlash()`\nin managed beans and `#{flash}` in\
    \ EL.\nHistorically, the flash\nscope was primarily introduced in order to be\
    \ able to show a\nfaces message set in the action method in the redirected page.\
    \ Imagine\nthe use case of saving an edited product in a detail page and\nredirecting\
    \ back to the master page.\n\n```\npublic String save() {\nFacesContext context\
    \ = FacesContext.getCurrentInstance();\ntry {\nproductService.update(product);\n\
    context.addMessage(null, new FacesMessage(\"Product saved!\"));\nreturn \"/products?faces-redrect=true\"\
    ;\n}\ncatch (Exception e) {\ncontext.addMessage(null, new FacesMessage(\n\"Cannot\
    \ save product. Error: \" + e.getMessage()));\nreturn null;\n}\n}\n```"
  trans: '

    你看，它继承了 bean 类，使其可序列化，并使用了一个“不可能冲突”的类名，并让所有方法委托给从 CDI 上下文获取的实际实例。你可能也会立刻明白为什么
    CDI bean 管理设施要求 bean 类必须是公开的，并且有一个公开的无参构造器。你还会看到，当创建并注入这样一个代理类时，底层的实际实例并不一定会被创建。它只会在虚构的
    `CDI.resolveItSomehow()` 方法被调用时自动创建。在底层，它会从一个线程局部变量中获取上下文，这与 `FacesContext#getCurrentInstance()`
    的工作方式完全相同。

    顺便提一下，Jakarta Enterprise Beans 也以这种方式使用可序列化的代理。这就是为什么它看似神奇地完成了启动或加入事务以及使用池化实例的所有繁重工作。实际上，这一切都是在代理方法中完成的，即在调用实际实例方法之前和之后。

    请注意，CDI 还有一个 `@jakarta.enterprise.inject.Model` 原型注解，它基本上将 `@Named` 和 `@RequestScoped`
    捆绑到一个注解中。这与请求作用域的受管 bean 没有任何区别。不幸的是，它并不代表一个非代理实例；否则，将其放在 `@Entity` 上会很好。`@Model`
    注解的存在只是为了方便。


    @Dependent

    一个依赖作用域的受管 bean 的生命周期与首次创建它的作用域的生命周期绑定在一起。因此，如果你将其注入到 `@ApplicationScoped` 中，那么它也会变成应用作用域。如果你将其注入到
    `@ViewScoped` 中，那么它也会变成视图作用域。以此类推。这是 CDI 的默认作用域。

    然而，这有一个陷阱。当你忘记在你的 `@Named` 支持 bean 上声明任何 CDI 作用域注解，并且你在 EL 中直接引用它（如 `#{dependentScopedBean}`），而不是通过另一个受管
    bean 引用它（如 `#{requestScopedBean.dependentScopedBean}`），那么每次 EL 求值都会创建一个全新的实例，该实例仅存在于该
    EL 上下文中。换句话说，想象一个 Jakarta Faces 表单，包含两个输入字段和一个提交按钮，每个都绑定到一个依赖作用域的受管 bean，那么你最终会得到三个独立的实例。一个设置了第一个输入字段，一个设置了第二个输入字段，一个调用了动作方法。因此，如果你在动作方法中观察到已提交值为
    `null` 的奇怪行为，即使必需验证已通过，那么首先要检查的是 CDI 受管 bean 的作用域是否存在且正确。


    与其他作用域的主要技术区别在于，依赖作用域的受管 bean 不会被代理。换句话说，被注入的是实际实例。以下是一个示例，说明如何通过 `@Inject` 使用它来准备一个新的（且未被代理的！）Jakarta
    Persistence 实体：


    ```

    @Dependent

    public class Entities {

    @Produces

    public Product getProduct() {

    return new Product();

    }

    }

    @Named @RequestScoped

    public class Products {

    @Inject

    private Product product;

    @Inject

    Private ProductService productService;

    public void add() {

    productService.create(product);

    }

    public Product getProduct() {

    return product;

    }

    }

    ```


    请注意，你仍然不能使用 `<h:inputText value="#{product.name}">`，因为它会获取自己的实例。你仍然需要使用 `#{products.product.name}`。正是由于这个原因，生产者方法没有使用
    `@Named`。还要注意，如果是视图作用域的受管 bean，你需要通过从动作方法返回一个非空结果来强制 Jakarta Faces 重启视图作用域；否则，注入的
    `Product` 实例将在下一个视图中被重用。

    最后，这个示例并不是非常有用，因为其行为不一定直观。你最好使用 `private Product product = new Product();` 来代替
    `@Inject`。


    选择哪个作用域？

    选择哪个作用域完全取决于 bean 持有和表示的数据（实例变量，即状态）。你应该努力将状态放在尽可能短的可接受作用域中。从 `@RequestScoped`
    bean 开始。一旦你注意到某些状态需要在同一视图的回发后保留，就将该状态精确地拆分到一个新的 `@ViewScoped` bean 中，然后将其 `@Inject`
    到 `@RequestScoped` bean 中。一旦你注意到某些状态需要在同一会话的另一个请求中保留，就将该状态精确地拆分到一个新的 `@SessionScoped`
    bean 中，然后将其 `@Inject` 到 `@RequestScoped` bean 中。以此类推。

    滥用 `@ApplicationScoped` bean 来存储会话、对话、流程、视图或请求作用域的数据，会导致数据在所有用户之间共享，因此任何人都可以看到彼此的数据，这显然是错误的。滥用
    `@SessionScoped` bean 来存储对话、流程、视图或请求作用域的数据，会导致数据在同一会话的所有浏览器标签页之间共享，因此最终用户在切换标签页后与每个视图交互时可能会遇到不一致的情况，这对用户体验不利。滥用
    `@RequestScoped` bean 来存储视图、流程或对话作用域的数据，会导致视图、流程或对话作用域的数据在每次（Ajax）回发时被重新初始化为默认值，可能导致表单无法正常工作。滥用
    `@ViewScoped`、`@FlowScoped` 或 `@ConversationScoped` bean 来存储请求、会话或应用作用域的数据，以及滥用
    `@SessionScoped` bean 来存储应用作用域的数据，虽然不会影响最终用户，但会不必要地占用服务器内存，并且效率低下。

    请注意，不应基于性能影响来选择作用域，除非你真的内存占用很低并且希望完全无状态。那么你需要专门使用带有 `@RequestScoped` bean 的无状态表单，并通过请求参数来维护任何客户端的状态。换句话说，你可能需要重新发明
    `jakarta.faces.ViewState` 隐藏输入字段已经完成的工作。


    @FlashScoped 在哪里？

    最后，Jakarta Faces 也支持闪存作用域。它由一个短生命周期的 cookie 支持，该 cookie 与会话作用域中的一个数据条目相关联。在重定向前，会在
    HTTP 响应上设置一个 cookie，其值代表会话作用域中数据条目的唯一键。重定向后，会检查闪存作用域 cookie 的存在，并将与该 cookie 值（作为键）关联的数据条目从会话作用域中移除，并放入重定向请求的请求作用域中。最后，该
    cookie 会从 HTTP 响应中移除。这样，重定向的请求就可以访问在初始请求中准备好的请求作用域数据。

    实际上，标准的 Jakarta Faces API 并没有将其作为受管 bean 作用域提供。换句话说，不存在 `@FlashScoped` 这样的东西。闪存作用域只能通过受管
    bean 中的 `ExternalContext#getFlash()` 和 EL 中的 `#{flash}` 作为映射使用。

    历史上，引入闪存作用域主要是为了能够在重定向页面中显示在动作方法中设置的面部消息。想象一下在详情页面中保存编辑过的产品并重定向回主页面用例。


    ```

    public String save() {

    FacesContext context = FacesContext.getCurrentInstance();

    try {

    productService.update(product);

    context.addMessage(null, new FacesMessage("Product saved!"));

    return "/products?faces-redrect=true";

    }

    catch (Exception e) {

    context.addMessage(null, new FacesMessage(

    "Cannot save product. Error: " + e.getMessage()));

    return null;

    }

    }

    ```

    '
- fmt: 'The faces message “Product saved!” wouldn’t show up in the `<h:messages globalOnly>`
    of the redirected page because faces messages are inherently request scoped (actually,
    “faces context scoped”). Historically, during the Jakarta Faces 1.x era, this
    problem was solved with a phase listener that copies after the render response
    phase all undisplayed faces messages into the HTTP session and re-adds after the
    restore view phase any of them back into the faces context. Since the introduction
    of the flash scope in Jakarta Faces 2.0, this problem could be solved in an easier
    way by simply invoking `Flash#setKeepMessages()`^([^(78)](#fn78)).


    ```

    productService.update(product);

    context.addMessage(null, new FacesMessage("Product saved!"));

    context.getExternalContext().getFlash().setKeepMessages(true);

    return "/products?faces-redrect=true";

    ```


    This way, the faces messages are before redirect automatically stored in the flash
    scope and restored after redirect.


    The flash scope is not only useful for faces messages. It’s also useful for passing
    entire objects while redirecting from one view to another view, without needing
    to pass some object identifier as a request parameter. The following is an example
    that prepares an entity for the next step without needing to save it in the database
    first:


    ```

    @Named @RequestScoped // or @ViewScoped

    public class Home {

    private Product product = new Product();

    public String prepareProduct() {

    FacesContext context = FacesContext.getCurrentInstance();

    context.getExternalContext().getFlash().put("product", product);

    return "/next?faces-redirect=true";

    }

    public Product getProduct() {

    return product;

    }

    }

    ```


    whereby the bean of the next step looks as follows:


    ```

    @Named @ViewScoped

    public class Next implements Serializable {

    @Inject @ManagedProperty("#{flash.product}")

    private Product product;

    public void save() {

    // ...

    }

    public Product getProduct() {

    return product;

    }

    }

    ```


    And the `/next.xhtml` redirects back to `/home.xhtml` when the entity is absent
    in the flash scope.


    Note that this redirect will thus take place when you open `/next.xhtml` directly,
    or when you refresh the page in the web browser. In case you’d like to avoid that,
    then you can instruct the flash scope to keep the entry value in the flash scope
    by prefixing the entry key with the predefined key “`keep`” on the `#{flash}`
    map.


    ```

    @Named @RequestScoped

    public class Next {

    @Inject @ManagedProperty("#{flash.keep.product}")

    private Product product;

    // ...

    }

    ```


    This way, the lifetime of the flash scope will expand until the end user closes
    the browser window, or when the application navigates to a different view, or
    when the underlying HTTP session expires. This way, you can even make the managed
    bean request scoped instead of view scoped and not lose the entity while submitting
    a form in the `/next.xhtml` page or even refreshing the page. This is a relatively
    powerful feature of the flash scope.


    ## Managed Bean Initialization and Destruction


    Managed bean instances can be initialized based on injected dependencies in a
    `@PostConstruct` annotated method. Managed bean instances can hook on destroy
    event in a `@PreDestroy` annotated method.


    ```

    @Named

    public class Bean {

    @PostConstruct

    public void init() {

    // ...

    }

    @PreDestroy

    public void destroy() {

    // ...

    }

    }

    ```


    The method names are not predefined. The exact method names `init()` and `destroy()`
    are basically taken over from the existing `HttpServlet` API. You can of course
    choose your own method names, such as `onload()` and `cleanup()`. It’s useful
    to know that those annotations are inheritable. In other words, you could put
    those initialization and destruction methods in an abstract base class. In the
    postconstruct method, you have the opportunity to perform initialization based
    on injected dependencies. Those injected dependencies are not available in the
    constructor yet. The bean management facility can only inject the dependencies
    after having constructed the managed bean instance. It will then immediately invoke
    the `@PostConstruct` annotated method. In the pre-destroy method, you have the
    opportunity to perform any necessary cleanup, such as closing resources, deleting
    files, and saving state.


    ## Injecting Jakarta Faces Vended Types


    Managed beans can obviously be injected in each other via CDI’s `@Inject` as demonstrated
    several times so far in this book. Next to injecting your own types, a variety
    of Jakarta Faces vended types can be injected via CDI as well. These types largely
    correspond to the implicit EL objects we saw in Table 7-1 in the “Implicit EL
    Objects” section in Chapter [7](#454457_2_En_7_Chapter.xhtml). This is no coincidence.
    Internally, implicit objects in Jakarta Faces are implemented by so-called `Bean<T>`
    instances from CDI. These CDI `Bean<T>` instances are effectively the factory
    objects that know how to generate beans, with what type and optional qualifier
    and/or with what name. When the name of an implicit object is used in expression
    language, the CDI EL resolver does a lookup for that object by name, which results
    in a call to a certain `Bean<T>` instance. When we’re injecting, the type into
    which we inject, together with any explicit or implicit qualifiers, forms an alternative
    key that’s being used for this lookup. Both types of keys will result in the exact
    same CDI `Bean<T>` instance being used.


    Table [8-1](#454457_2_En_8_Chapter.xhtml#Tab1) shows the Jakarta Faces vended
    types that are injectable via CDI.


    **Table 8-1** Injectable Jakarta Faces Vended Types, All Since 2.3


    | Injectable Jakarta Faces type | Resolves to |

    | --- | --- |

    | `jakarta.faces.context.FacesContext` | `FacesContext#getCurrentInstance(  )`
    |

    | `jakarta.faces.context.ExternalContext` | `FacesContext#getExternalContext(  )`
    |

    | `jakarta.faces.component.UIViewRoot` | `FacesContext#getViewRoot(  )` |

    | `jakarta.faces.context.Flash` | `ExternalContext#getFlash(  )` |

    | `@RequestMap Map<String, Object>` | `ExternalContext#getRequestMap(  )` |

    | `@ViewMap Map<String, Object>` | `UIViewRoot#getViewMap(  )` |

    | `@FlowMap Map<Object, Object>` | `FlowHandler#getCurrentFlowScope(  )` |

    | `@SessionMap Map<String, Object>` | `ExternalContext#getSessionMap(  )` |

    | `@ApplicationMap Map<String, Object>` | `ExternalContext#getApplicationMap(  )`
    |

    | `@InitParameterMap Map<String, String>` | `ExternalContext#getInitParameterMap(  )`
    |

    | `@RequestParameterMap Map<String, String>` | `ExternalContext#getRequestParameterMap(  )`
    |

    | `@RequestParameterValuesMap Map<String, String[ ]>` | `ExternalContext#getRequestParameterValuesMap(  )`
    |

    | `@HeaderMap Map<String, String>` | `ExternalContext#getRequestHeaderMap(  )`
    |

    | `@HeaderValuesMap Map<String, String[ ]>` | `ExternalContext#getRequestHeaderValuesMap(  )`
    |

    | `@RequestCookieMap Map<String, Cookie>` | `ExternalContext#getRequestCookieMap(  )`
    |

    | `jakarta.faces.application.ResourceHandler` | `Application#getResourceHandler(  )`
    |


    It should be noted that compared to the implicit EL objects mentioned in Table
    7-1, a few are missing for CDI-injectable Jakarta Faces vended types mentioned
    in Table [8-1](#454457_2_En_8_Chapter.xhtml#Tab1), namely:


    *   `#{component}`

    *   `#{cc}`

    *   `#{request}`

    *   `#{session}`

    *   `#{application}`'
