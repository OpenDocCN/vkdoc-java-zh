    The `name` attribute of `<cc:clientBehavior>` represents the event name that you
    should declare in template client in order to trigger it.


    The `default` attribute of `<cc:clientBehavior>` being set to `"true"` indicates
    that this is the default event, which means that you could just omit it, as you
    could do with `event="change"` for existing input text and drop-down components,
    and with `event="click"` for existing check box and radio button components, and
    with `event="action"` for existing command components.


    The `targets` attribute of `<cc:clientBehavior>` must define a space-separated
    collection of IDs of target `UIInput` components enclosed in the implementation
    of the composite component on which you would like to trigger the Ajax event,
    and the `event` attribute of `<cc:clientBehavior>` must define the desired event
    name to be actually triggered on the target `UIInput` components. In other words,
    this does, under the hood, effectively the same as if the following is implemented
