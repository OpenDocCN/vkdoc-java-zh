    可以看出，`jakarta.faces.Token` 请求参数已由 Jakarta Faces 添加。该令牌与用户的 HTTP 会话绑定，因此如果 HTTP
    会话过期，令牌也会过期。该令牌在密码学上是强壮的，这意味着它满足了之前所述的 CSRF 保护令牌的所有三个要求。


    如果令牌被篡改（例如，我们使用 `xxMoNbfOycv2v80gr` 而不是 `gdMoNbfOycv2v80gr`）或完全缺失（即，我们请求 `/bar.xhtml`），那么
    Jakarta Faces 将抛出一个 `jakarta.faces.application.ProtectedViewException`。


    如果链接来自无状态页面，Jakarta Faces 应用程序可以通过通知用户并允许重新渲染原始页面来处理此异常。在前面的示例中，这意味着重新渲染 `index.xhtml`。真正的用户将获得一个新的
    CSRF 保护令牌，而攻击者将无法从原始请求中获得预期的副作用。


    如前所述，还有一个 `referer` 和 `origin` 头部检查。对于此检查，Jakarta Faces 会检查 `referer` 头部（如果可用）是否设置为源自同一应用程序的
    URL。为了演示这一点，考虑第二个 Jakarta Faces 应用程序，它只有一个空的 `faces-config.xml` 和以下视图：


    ```


    test


    ```


    假设我们第一个带有 CSRF 保护的 `bar.xhtml` 的应用程序部署在 `http://localhost:8080/project`，点击来自第二个应用程序的输出链接将导致第一个应用程序再次抛出
    `jakarta.faces.application.ProtectedViewException`。请注意，`referer` 是一个可选检查，仅在 `referer`
    头部实际存在时才执行，就像第二个应用程序中的链接一样。


    如果我们直接在浏览器的地址栏中输入 `http://localhost:8080/project/bar.xhtml?jakarta.faces.Token=gdMhNbfOycv2v80gr`，或者通过命令行工具（如
    `wget` 或 `curl`）直接请求它，则不会有 `referer`，并且请求将被接受。


    在实践中，GET 请求受到 CSRF 攻击保护的价值较低，因为这些请求实际上*应该*是幂等的（不应有副作用，只应显示数据）。与其使用 CSRF 保护令牌来保护
    GET 请求，更好的做法是重构应用程序，使其不包含非幂等的 GET 请求。


    对于回发，CSRF 保护令牌的工作方式大致相同。为了演示，考虑将 `/bar.xhtml` 视图更改为以下内容：


    渲染此页面将导致表单目标 URL 以与 GET 请求相同的方式应用 CSRF 保护令牌，例如：


    ```

    因此，这是与隐式的 `jakarta.faces.ViewState` 令牌的另一个区别，后者始终是一个 POST 参数。


    Web 参数篡改保护

    Web 参数篡改是一种针对应用程序的攻击，攻击者会修改发送（回）到托管应用程序的服务器的参数值。如果应用程序没有正确验证这些值，攻击者可能会获得超出其权限的利益，或者可能有机会执行额外的攻击。


    例如，假设一个 Web 应用程序渲染了一个可以分配给其他用户的角色列表，例如“用户”、“经理”和“销售”。攻击者可以尝试修改回发的数据，并将“用户”的选择更改为“管理员”。如果服务器盲目地接受输入，并且“管理员”是一个存在的值，这将允许攻击者将“管理员”角色授予另一个用户，即使攻击者没有权限这样做。


    Jakarta Faces 对此类攻击的一个子集提供了隐式保护，即针对从选择组件（具体来说，基于 `UISelectOne`* 和 `UISelectMany`*
    的组件）回发的值。这是通过 Jakarta Faces 在回发后从 `jakarta.faces.ViewState` 恢复视图（当使用完整状态保存时）或重新创建视图（当使用部分状态保存时）来实现的。只有那些也被渲染过的值才会被接受。不过，通常的注意事项仍然适用，那就是在使用部分状态保存时，绑定到组件的数据在回发前后必须相同。然而，这可以通过使用视图作用域轻松实现。


    为了演示，考虑以下视图：


    ```


    选中的值：#{bean.selected}


    ```


    以及以下支持 bean：


    ```

    @Named @RequestScoped

    public class Bean {

    private List available = Arrays.asList("foo", "bar", "kaz");

    private String selected;

    public List getAvailable() {

    return available;

    }

    public String getSelected() {

    return selected;

    }

    public void setSelected (String selected) {

    this.selected = selected;

    }

    }

    ```


    例如，选择“bar”并点击“select”将按预期渲染“选中的值：bar”。可以通过多种方式更改发送的值，例如，通过像 Burp Proxy 这样的拦截代理，或者通过
    Chrome 等浏览器的开发者工具编辑实时源代码。


    如图 13-1 所示，更改后选择“`foo`”条目并再次点击选择按钮，将导致“`foox`”值被发送到应用程序。此值将被 Jakarta Faces 拒绝，因此将渲染“选中的值：”，表明我们篡改的值确实未被接受。


    ![](img/454457_2_En_13_Fig1_HTML.png)


    图 13-1

    通过 Chrome 的 DOM 检查器在 HTML 源代码中将选中的值从“foo”篡改为“foox”


    跨站脚本保护

    跨站脚本或 XSS 是一种攻击，它有多种变体，但实际上归结为 Web 应用程序将从（其他）用户那里获得的数据直接作为发送给客户端的标记的一部分进行渲染。如果这些数据本身包含脚本代码（通常是
    JavaScript），浏览器可能会盲目地执行它，从而允许攻击者读取例如 cookie 数据，并将其发送到攻击者控制的服务器。


    Jakarta Faces 通过为许多常见上下文启用上下文输出转义来提供针对此类攻击的保护。最常见的上下文是输出 HTML，所有 Jakarta Faces
    输出编写器默认情况下都会对其输出进行 XML 转义。


    为了演示，考虑以下支持 bean：


    ```

    @Named @RequestScoped

    public class Bean {

    private String value = "alert(''hi'')";

    public String getValue() {

    return value;

    }

    }

    ```


    `value` 实例变量包含一个我们不希望浏览器执行的脚本。在此示例中，它是硬编码的，但在实践中，它可能来自例如数据库中存储的数据。

