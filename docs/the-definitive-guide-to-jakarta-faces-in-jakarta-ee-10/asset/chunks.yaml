    “产品已保存！”的 faces 消息不会显示在重定向页面的 `<h:messages globalOnly>` 中，因为 faces 消息本质上是请求作用域的（实际上是“faces
    上下文作用域”）。历史上，在 Jakarta Faces 1.x 时代，这个问题是通过一个阶段监听器解决的，该监听器在渲染响应阶段之后将所有未显示的 faces
    消息复制到 HTTP 会话中，并在恢复视图阶段之后将它们重新添加回 faces 上下文。自从 Jakarta Faces 2.0 引入了 flash 作用域，这个问题可以通过简单地调用
    `Flash#setKeepMessages()`^(⁷⁸) 以更简单的方式解决。


    ```

    productService.update(product);

    context.addMessage(null, new FacesMessage("Product saved!"));

    context.getExternalContext().getFlash().setKeepMessages(true);

    return "/products?faces-redrect=true";

    ```


    这样，faces 消息会在重定向前自动存储在 flash 作用域中，并在重定向后恢复。


    flash 作用域不仅对 faces 消息有用。它对于在从一个视图重定向到另一个视图时传递整个对象也很有用，而无需将某个对象标识符作为请求参数传递。以下是一个示例，它为下一步准备了一个实体，而无需先将其保存到数据库中：


    ```

    @Named @RequestScoped // or @ViewScoped

    public class Home {

    private Product product = new Product();

    public String prepareProduct() {

    FacesContext context = FacesContext.getCurrentInstance();

    context.getExternalContext().getFlash().put("product", product);

    return "/next?faces-redirect=true";

    }

    public Product getProduct() {

    return product;

    }

    }

    ```


    其中，下一步的 bean 如下所示：


    ```

    @Named @ViewScoped

    public class Next implements Serializable {

    @Inject @ManagedProperty("#{flash.product}")

    private Product product;

    public void save() {

    // ...

    }

    public Product getProduct() {

    return product;

    }

    }

    ```


    并且，当 flash 作用域中不存在该实体时，`/next.xhtml` 会重定向回 `/home.xhtml`。


    请注意，当你直接打开 `/next.xhtml` 或在 Web 浏览器中刷新页面时，就会发生这种重定向。如果你希望避免这种情况，可以通过在 `#{flash}`
    映射中将条目键前缀设置为预定义的键“`keep`”，来指示 flash 作用域保留该条目值。


    ```

    @Named @RequestScoped

    public class Next {

    @Inject @ManagedProperty("#{flash.keep.product}")

    private Product product;

    // ...

    }

    ```


    这样，flash 作用域的生命周期将延长，直到最终用户关闭浏览器窗口、应用程序导航到不同的视图或底层 HTTP 会话过期。通过这种方式，你甚至可以将受管 bean
    设置为请求作用域而不是视图作用域，并且在 `/next.xhtml` 页面提交表单甚至刷新页面时也不会丢失实体。这是 flash 作用域一个相对强大的特性。


    受管 Bean 的初始化和销毁


    受管 bean 实例可以在带有 `@PostConstruct` 注解的方法中基于注入的依赖项进行初始化。受管 bean 实例可以在带有 `@PreDestroy`
    注解的方法中挂接到销毁事件。


    ```

    @Named

    public class Bean {

    @PostConstruct

    public void init() {

    // ...

    }

    @PreDestroy

    public void destroy() {

    // ...

    }

    }

    ```


    方法名称不是预定义的。确切的方法名称 `init()` 和 `destroy()` 基本上是从现有的 `HttpServlet` API 继承而来的。你当然可以选择自己的方法名称，例如
    `onload()` 和 `cleanup()`。了解这些注解是可继承的很有用。换句话说，你可以将这些初始化和销毁方法放在一个抽象基类中。


    在 postconstruct 方法中，你有机会基于注入的依赖项执行初始化。这些注入的依赖项在构造函数中尚不可用。bean 管理设施只能在构造受管 bean
    实例之后注入依赖项。然后它会立即调用带有 `@PostConstruct` 注解的方法。在 pre-destroy 方法中，你有机会执行任何必要的清理工作，例如关闭资源、删除文件和保存状态。


    注入 Jakarta Faces 提供的类型


    显然，受管 bean 可以通过 CDI 的 `@Inject` 相互注入，正如本书中多次演示的那样。除了注入你自己的类型之外，各种 Jakarta Faces
    提供的类型也可以通过 CDI 注入。这些类型在很大程度上对应于我们在第 7 章“隐式 EL 对象”部分的表 7-1 中看到的隐式 EL 对象。这并非巧合。在内部，Jakarta
    Faces 中的隐式对象是由 CDI 中所谓的 `Bean<T>` 实例实现的。这些 CDI `Bean<T>` 实例实际上是工厂对象，它们知道如何生成 bean，以及使用什么类型、可选的限定符和/或什么名称。当在表达式语言中使用隐式对象的名称时，CDI
    EL 解析器会按名称查找该对象，这会导致调用某个 `Bean<T>` 实例。当我们进行注入时，我们注入的类型以及任何显式或隐式的限定符，构成了用于此查找的替代键。两种类型的键都将导致使用完全相同的
