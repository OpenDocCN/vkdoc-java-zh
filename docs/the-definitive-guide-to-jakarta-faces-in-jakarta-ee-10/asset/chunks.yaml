    以及以下 `MarkdownListener` 实体监听器：


    ```

    public class MarkdownListener {

    private static final Parser PARSER = Parser.builder().build();

    private static final HtmlRenderer RENDERER =

    HtmlRenderer.builder().escapeHtml(true).build();

    private static final String VERSION = getCommonMarkVersion();

    @PrePersist

    public void parseMarkdown(Markdown markdown) {

    String html = RENDERER.render(PARSER.parse(markdown.getText()));

    markdown.setHtml(html);

    markdown.setVersion(VERSION);

    }

    @PreUpdate

    public void parseMarkdownIfNecessary(Markdown markdown) {

    if (markdown.getVersion() == null) {

    parseMarkdown(markdown);

    }

    }

    @PostLoad

    public void updateMarkdownIfNecessary(Markdown markdown) {

    if (!VERSION.equals(markdown.getVersion())) {

    parseMarkdown(markdown);

    }

    }

    private static String getCommonMarkVersion() {

    try {

    Properties properties = new Properties();

    properties.load(Parser.class.getResourceAsStream(

    "/META-INF/maven/com.atlassian.commonmark"

    + "/commonmark/pom.properties"));

    return properties.getProperty("version");

    }

    catch (IOException e) {

    throw new UncheckedIOException(e);

    }

    }

    }

    ```


    然后，实现 `Markdown` 接口并注册了 `MarkdownListener` 实体监听器的 `Message` 实体可以如下所示：


    ```

    @Entity @EntityListeners(MarkdownListener.class)

    public class Message implements Markdown, Serializable {

    @Id @GeneratedValue(strategy=IDENTITY)

    private Long id;

    @Column(nullable = false) @Lob

    private @NotNull String text;

    @Column(nullable = false) @Lob

    private String html;

    @Column(nullable = false, length = 8)

    private String version;

    @Override

    public void setText(String text) {

    if (!text.equals(this.text)) {

    this.text = text;

    setVersion(null); // 触发 MarkdownListener 的 @PreUpdate。

    }

    }

    // 添加/生成其余的 getter 和 setter 方法。

    }

    ```


    最后，为了向最终用户呈现安全的 HTML 代码，你可以使用 `<h:outputText>`，并将其 `escape` 属性设置为 `false`，从而指示
    Jakarta Faces 无需隐式地对值进行 HTML 转义。


    ```


    除了隐式 HTML 转义之外，Jakarta Faces 还支持隐式转换。对于通过 `<h:outputText>` 或模板文本中的 EL 发出的任何属性类型，Jakarta
    Faces 将按类查找转换器，调用其 `Converter#getAsString()` 方法，并渲染结果。如果你想显式地使用特定或不同的转换器，则必须将模板文本中的任何
    EL 替换为 `<h:outputText>`，并显式地在其上注册转换器。通常，那些需要以特定于区域设置的格式进行格式化的数字或日期时间相关属性才需要这样做。


    `<h:``outputText>` 的最后一个用途是能够在 `<f:ajax render>` 中引用一段内联文本。默认情况下，`<h:outputText>`
    不会生成任何 HTML 代码。但如果它至少指定了一个必须出现在生成的 HTML 输出中的属性，例如 `id` 或 `styleClass`，那么它将生成一个
    HTML `<span>` 元素。该元素可通过 JavaScript 引用，因此对于通过 Ajax 更新文本的特定部分非常有用。当然，你也可以选择通过 Ajax
    更新某个公共容器组件，但这远不如仅通过 Ajax 更新真正需要更新的特定部分高效。

    `<h:``outputFormat>` 是 `<h:outputText>` 的扩展，它预先使用 `java.text.MessageFormat` API^(⁴⁷)
    解析值。这在与本地化资源包结合使用时特别有用。可以在第 14 章的“参数化资源包值”一节中找到示例。

    `<h:``outputLabel>` 基本上会生成 HTML `<label>` 元素，这是 HTML 表单的重要组成部分。这已在第 4 章的“标签和消息组件”一节中描述过。需要注意的是，从
    HTML 的角度来看，`<h:outputLabel>` 和 `<h:outputText>` 绝对不可互换。在互联网上最近涌现的一批低质量编程教程网站中（这些网站基本上只展示代码片段，没有任何技术解释，以获取广告收入），`<h:outputLabel>`
    经常被错误地用于在 Hello World Jakarta Faces 页面中输出一段文本。这类教程网站最好完全忽略。


    `<h:``outputLink>` 会生成一个 HTML `<a>` 元素。它有点像是 Jakarta Faces 1.x 的遗留物，自从 Jakarta
    Faces 2.0 中引入了更有用的 `<h:link>` 之后，它的作用就不太大了。当你不需要使用链接来引用 Jakarta Faces 视图时（此时应使用
    `<h:link>`），你也可以直接使用纯 HTML `<a>` 元素来代替 `<h:outputLink>`。以下标签会生成完全相同的 HTML：


    ```

    Google

    Google

    ```


    纯 HTML 的等价写法更简洁。


    基于导航的输出组件

    这些组件是 `<h:link>` 和 `<h:button>`，它们都继承自 `UIOutcomeTarget` 超类。它们有一个 `outcome` 属性，该属性接受指向
    Jakarta Faces 视图的逻辑路径。如果路径是有效的 Jakarta Faces 视图，则该路径实际上会被验证；否则，链接或按钮将呈现为禁用状态。换句话说，它们不接受指向非
    Jakarta Faces 资源的路径，更不用说外部 URL 了。对于这种情况，你需要使用 `<h:outputLink>` 或纯 HTML `<a>` 元素。

    `<h:link>` 将生成一个 HTML `<a>` 元素，其 `href` 属性指定了目标 Jakarta Faces 视图的 URL。`<h:button>`
    将生成一个 HTML `<input type="button">` 元素，其 `onclick` 属性借助 JavaScript 将目标 Jakarta
    Faces 视图的 URL 赋值给 `window.location.href` 属性。这确实有点笨拙，但这只是 HTML 的一个限制。`<input type="button">`
    和 `<button>` 都不支持类似 `href` 的属性。

    假设 Eclipse 中 Maven WAR 项目的文件夹结构如下：

    ![](img/454457_2_En_6_Figa_HTML.jpg)


    以下位于 `/folder1/page1.xhtml` 中的 `<h:link>` 和 `<a>` 对将在 HTML 输出中生成完全相同的链接。


    ```

    link1


    link2


    link3


    link4


    link5

    ```


    因此请注意，`<h:link>` 已经会自动在 Web 应用程序项目的任何上下文路径前添加前缀，并附加当前活动的 `FacesServlet` 映射的 URL
    模式。还要注意，如果没有前导斜杠，则 outcome 相对于当前文件夹进行解释；如果有前导斜杠，则 outcome 相对于上下文路径进行解释。

