- fmt: "```java\n@Stateless\npublic class LongRunningProcessService {\n    @Asynchronous\n\
    \    public void asyncSubmit(Consumer callback) {\n        String result = someLongRunningProcess();\n\
    \        callback.accept(result);\n    }\n}\n```\n\n注意 Jakarta Enterprise Beans\
    \ 的 `@Asynchronous` 注解。这在当前结构中非常重要。它将确保企业 Bean 方法在单独的线程中执行。这使得支持 Bean 方法能够立即返回，而无需等待企业\
    \ Bean 方法完成。\n\n## Stateful UI Updates\n\n你可能已经注意到，`onmessage` JavaScript 监听器函数通常仅适用于小型无状态任务，例如显示反馈消息或使用\
