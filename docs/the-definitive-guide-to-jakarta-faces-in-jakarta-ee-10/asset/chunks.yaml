    以下展示了处理登录调用的支持 bean 的完整示例。我们将在下文逐一讨论各个部分。


    ```

    @Named @RequestScoped

    public class Login {

    @NotNull

    @Email

    private String email;

    @NotNull

    @Size(min = 8, message = "Password must be at least 8 characters")

    private String password;

    @Inject

    private SecurityContext securityContext;

    @Inject

    private ExternalContext externalContext;

    @Inject

    private FacesContext facesContext;

    public void submit() {

    switch (continueAuthentication()) {

    case SEND_CONTINUE:

    facesContext.responseComplete();

    break;

    case SEND_FAILURE:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_ERROR, "Login failed", null));

    break;

    case SUCCESS:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_INFO, "Login succeed", null));

    break;

    case NOT_DONE:

    // 此处不会发生

    }

    }

    private AuthenticationStatus continueAuthentication() {

    return securityContext.authenticate(

    (HttpServletRequest) externalContext.getRequest(),

    (HttpServletResponse) externalContext.getResponse(),

    AuthenticationParameters.withParams().credential(

    new UsernamePasswordCredential(email, password))

    );

    }

    public String getEmail() {

    return email;

    }

    public void setEmail(String email) {

    this.email = email;

    }

    public String getPassword() {

    return password;

    }

    public void setPassword(String password) {

    this.password = password;

    }

    }

    ```


    我们以两个与所收集凭证对应的实例变量开始支持 bean。


    ```

    @NotNull

    @Email

    private String email;

    @NotNull

    @Size(min = 8, message = "Password must be at least 8 characters")

    private String password;

    ```


    这清楚地展示了相对于 `FORM` 认证机制的优势，即我们可以使用 Jakarta Bean Validation 轻松预验证用户的输入。由于 Jakarta
    Faces 与 Jakarta Bean Validation 内置集成，如果输入未通过验证，将提供标准 faces 消息以供渲染。


    接下来，我们定义了需要注入的上下文对象。这些对象是：


    ```

    @Inject

    private SecurityContext securityContext;

    @Inject

    private ExternalContext externalContext;

    @Inject

    private FacesContext facesContext;

    ```


    细心的读者会认出 `ExternalContext` 和 `FacesContext` 是两个众所周知的 Jakarta Faces 原生类，而 `SecurityContext`
    则显得与众不同。这个类来自 Jakarta EE Security，我们将在此处使用它与认证机制进行通信。


    对话的继续发生在 `continueAuthentication()` 方法中，如下所示：


    ```

    private AuthenticationStatus continueAuthentication() {

    return securityContext.authenticate(

    (HttpServletRequest) externalContext.getRequest(),

    (HttpServletResponse) externalContext.getResponse(),

    AuthenticationParameters.withParams().credential(

    new UsernamePasswordCredential(email, password))

    );

    }

    ```


    对 `SecurityContext#authenticate()` 的调用将再次触发认证机制。由于该机制将处于等待传递凭证的状态，因此它确实会查找我们传入的凭证并使用它们继续执行。稍后我们将看到，我们也可以请求丢弃任何可能存在的状态并启动新的对话。请注意，我们必须将请求和响应对象转换为
    `HttpServletRequest` 和 `HttpServletResponse`。不幸的是，这是必要的，因为 `ExternalContext` 抽象了
    Servlet 和 Portlet 请求，并且对于这两个对象仅返回 `Object`。


    `SecurityContext#authenticate()` 方法返回一个状态，该状态大致指示了认证机制所执行的操作。我们的 Jakarta Faces
    支持 bean 的动作方法必须处理以下情况：


    ```

    switch (continueAuthentication()) {

    case SEND_CONTINUE:

    facesContext.responseComplete();

    break;

    case SEND_FAILURE:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_ERROR, "Login failed", null));

    break;

    case SUCCESS:

    facesContext.addMessage(null, new FacesMessage(

    FacesMessage.SEVERITY_INFO, "Login succeed", null));

    break;

    case NOT_DONE:

    // 此处不会发生

    }

    ```


    可以看出，有四种可能的结果。

    第一种是 `SEND_CONTINUE`，基本上意味着“认证进行中”。当认证机制再次接管对话时（例如，通过渲染其自身的响应，或者更可能的是，将调用者重定向到新位置），它会返回此状态。Jakarta
    Faces 支持 bean 应确保通过调用 `FacesContext#responseComplete()` 来结束 Jakarta Faces 生命周期，并且不再以任何方式与响应本身交互。

    第二种是 `SEND_FAILURE`，基本上意味着“认证失败”。当认证机制无法验证所提供的凭证时，会返回此状态。在大多数情况下，这是因为调用者提供了错误的凭证。Jakarta
    Faces 支持 bean 可以通过设置 faces 消息并重新显示登录表单来对此做出响应。

    第三种状态是 `SUCCESS`，意味着“认证成功”。当认证机制成功验证所提供的凭证时，会返回此状态。只有在返回此状态之后，`HttpServletRequest#getUserPrincipal()`、`SecurityContext#getCallerPrincipal()`
    等才会返回非 `null` 值，以指示当前调用者已通过认证。Jakarta Faces 支持 bean 可以通过多种方式对此做出响应（例如，设置 faces
    消息并继续渲染视图，或者自行发出重定向）。

    第四种也是最后一种状态是 `NOT_DONE`，当认证机制选择根本不进行认证时返回此状态。例如，当提前调用认证机制但认证似乎并非必要时，就会发生这种情况。通常，Jakarta
    Faces 支持 bean 在此处无需采取任何特殊操作。


    调用者发起的认证

    前面的代码讨论了未认证的调用者尝试访问受保护资源（URL/页面）并且认证对话自动启动的情况。由于此认证对话由容器启动，我们称之为“容器发起的认证”。

    另一种情况是调用者显式启动认证对话（例如，通过单击“登录”按钮）。由于调用者启动此对话，我们称之为“调用者发起的认证”。

    在调用者发起的认证情况下，核心认证机制实际上是直接调用的，并且平台提供的“登录以继续”功能被跳过。这意味着，如果认证机制依赖“登录以继续”来重定向到登录页面，并在认证后重定向回受保护资源，那么当应用程序以编程方式触发认证时，这两个操作都不会发生。


    我们之前通过注解定义的 `CustomFormAuthenticationMechanism` 确实是一种使用平台“登录以继续”服务的机制，因此我们将通过定向到之前使用的同一个登录视图来启动认证对话。为了表明这是一个新的登录，提供了一个额外的请求参数。我们启动的视图如下所示：


    ```


    欢迎


    已登录为 #{request.userPrincipal}


    ```


    在支持 bean 中，我们将注入两个额外的对象：一个用于获取和存储上述请求参数的实例，以及一个对 `Flash` 的引用，我们稍后将使用它。


    ```

    @Inject

    private Flash flash;

    @Inject @ManagedProperty("#{param.new}")

    private boolean isNew;

    ```

