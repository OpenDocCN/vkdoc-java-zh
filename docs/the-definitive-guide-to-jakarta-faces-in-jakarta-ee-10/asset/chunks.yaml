    \ in case you intend to inspect it in the JavaScript function.\n\nOn the WAR side,\
    \ you can inject the `PushContext` via the `@Push` annotation in any web artifact\
    \ that supports CDI injection. This can be a simple CDI managed bean, but it can\
    \ also be a `@WebServlet`, `@WebFilter`, or `@WebListener`.\n\n```java\nimport\
    \ jakarta.inject.Named;\nimport jakarta.enterprise.context.RequestScoped;\nimport\
    \ jakarta.inject.Inject;\nimport jakarta.faces.push.Push;\nimport jakarta.faces.push.PushContext;\n\
    \n@Named\n@RequestScoped\npublic class Bean {\n    @Inject\n    @Push\n    private\
    \ PushContext test;\n\n    public void submit() {\n        test.send(\"Hello World!\"\
    );\n    }\n}\n```\n\nThe `PushContext` variable name `test` must match the channel\
    \ name declared in the Jakarta Faces page. In case you cannot match the variable\
    \ name with the channel name, then you can always specify the channel name in\
    \ the optional `channel` attribute of the `@Push` annotation.\n\n```java\n@Inject\n\
    @Push(channel = \"test\")\nprivate PushContext foo;\n```\n\nOnce the `submit()`\
    \ method of the bean shown before is invoked by some Jakarta Faces command component,\
    \ even in a different Jakarta Faces page, then the push message “Hello World!”\
    \ will be sent to **all** opened sockets on the very same channel name, application-wide.\n\
    \n### Scopes and Users\n\nAs you may have realized, `<f:websocket>` is thus, by\
    \ default, application scoped. You can control the scope by the optional `scope`\
    \ attribute. Allowed values are `application`, `session`, and `view`.\n\nWhen\
    \ set to `session`, then the message will be sent to all opened sockets on the\
    \ very same channel in the current session only.\n\n```\nThis is particularly\
    \ useful for progress messages coming from long-running session-scoped background\
    \ tasks initiated by the user itself. This way, the user can just continue browsing\
    \ the site without the need to wait for the result on the very same page.\n```\n\
    \nAlternatively, you can also set the optional `user` attribute to a serializable\
    \ value representing the unique user identifier, which can be, for example, a\
    \ `String` representing the user login name or a `Long` representing the user\
    \ ID. When this attribute is set, then the scope of the socket will automatically\
    \ default to `session`, and it cannot be set to `application`.\n\nThis offers\
    \ the opportunity to send a message to a specific user as follows:\n\n```java\n\
    private String message;\nprivate User recipient;\n\n@Inject\n@Push\nprivate PushContext\
    \ chat;\n\npublic void sendMessage() {\n    Long recipientId = recipient.getId();\n\
    \    chat.send(message, recipientId);\n}\n```\n\nYou can even send it to multiple\
    \ users by providing a `Set` argument.\n\n```java\nprivate String message;\nprivate\
    \ Set<User> recipients;\n\n@Inject\n@Push\nprivate PushContext chat;\n\npublic\
    \ void sendMessage() {\n    Set<Long> recipientIds = recipients.stream()\n   \
    \     .map(User::getId)\n        .collect(Collectors.toSet());\n    chat.send(message,\
    \ recipientIds);\n}\n```\n\nIn other words, you can easily implement a chat box\
    \ this way. Incidentally, real-time user-targeted notifications at, for example,\
    \ Stack Overflow work this way.\n\nWhen the `scope` is set to `view`, then the\
    \ message will be sent to the opened socket on the specified channel in the current\
    \ view only. This won’t affect any sockets on the same channel in all other views\
    \ throughout the application.\n\n```\nThis is also supported in combination with\
    \ the `user` attribute.\n```\n\nThis construct of having a view-scoped socket\
    \ targeted to a specific user is somewhat unusual though and should only be used\
    \ if the logged-in user represented by `user` attribute can have a shorter lifetime\
    \ than the HTTP session. This is, however, in turn considered a poor security\
    \ practice. The best security practice is, namely, that the HTTP session is invalidated\
    \ during login as well as during logout. Invalidating the HTTP session during\
    \ login prevents session fixation attacks, and invalidating the session during\
    \ logout prevents dirty user-specific data lingering around in HTTP session.\n\
    \n### Channel Design Hints\n\nYou can declare multiple push channels on different\
    \ scopes with or without user target throughout the application. However, be aware\
    \ that the same channel name can easily be reused across multiple views, even\
    \ if it is view scoped. It’s more efficient if you use as few different channel\
    \ names as possible and tie the channel name to a specific push socket scope/user\
    \ combination, not to a specific Jakarta Faces view. In case you intend to have\
    \ multiple view-scoped channels for different purposes, then it is best to use\
    \ only one view-scoped channel and have a global JavaScript listener that can\
    \ distinguish its task based on the delivered message, for example, by sending\
    \ the message in a server as follows:\n\n```java\nMap<String, Object> message\
    \ = new HashMap<>();\nmessage.put(\"functionName\", \"someFunction\");\nmessage.put(\"\
    functionData\", functionData); // Can be Map or Bean.\nsomeChannel.send(message);\n\
    ```\n\nwhich is then processed in the `onmessage` JavaScript listener function\
    \ as follows:\n\n```javascript\nfunction someSocketListener(message) {\n    window[message.functionName](message.functionData);\n\
    }\n\nfunction someFunction(data) {\n    // ...\n}\n\nfunction otherFunction(data)\
    \ {\n    // ...\n}\n// ...\n```\n\n### One-Time Push\n\nYou can use the `connected`\
    \ attribute to prevent the socket from automatically connecting during page load.\n\
    \n```\nThis is particularly useful when you want to perform a one-time push of\
    \ the result after invoking a view-scoped Ajax action method which might take\
    \ a bit more time to complete, and you’d like the user to immediately continue\
    \ using the very same page without being annoyed about a “slow web site” experience.\
    \ This approach only requires a bit of additional work with the `faces.push` JavaScript\
    \ API (application programming interface). It has three functions, but only two\
    \ are of interest to us: `faces.push.open(...)` and `faces.push.close(...)`. The\
    \ third one, `faces.push.init(...)`, basically initializes the socket, and it\
    \ should not be your concern to invoke it; that’s up to the renderer of the `<f:websocket>`\
    \ tag.\n```\n\nIn order to explicitly open the unopened socket right before invoking\
    \ the Ajax action method, you need to invoke the `faces.push.open(...)` function\
    \ with the socket client ID as argument. In order to explicitly close the opened\
    \ socket right after the push message has arrived, you need to invoke the `faces.push.close(...)`\
    \ function with the socket client ID as argument. The following example demonstrates\
    \ the one-time push approach in its entirety:\n\n```javascript\nfunction startLongRunningProcess()\
    \ {\n    faces.push.open(\"push\");\n    document.getElementById(\"status\").innerHTML\
    \ =\n        \"Long running process has started ...\";\n}\n\nfunction endLongRunningProcess(result)\
    \ {\n    faces.push.close(\"push\");\n    document.getElementById(\"status\").innerHTML\
    \ = result;\n}\n```\n\nIt must be said that it’s a poor practice to put JavaScript\
    \ code right in the HTML source as shown before. It’s, of course, for demonstration\
    \ purposes only. For better maintenance, performance, and tooling support, you\
    \ should, in real-world code, put JavaScript code in a JS file and include it\
    \ via `<h:outputScript>`. And then I’m not talking about the lack of jQuery magic\
    \ for demonstration purposes.\n\nIn the example, opening the socket is performed\
    \ during the `onclick` of the command button. The `onmessage` listener function\
    \ in turn closes the socket. Of course, you can also keep the socket open all\
    \ the time without fiddling with JavaScript, but it may be a waste of resources\
    \ if the socket isn’t used for purposes other than presenting the result of a\
    \ view-scoped Ajax action method. Here is how the associated backing bean can\
    \ look like.\n\n```java\n@Named\n@RequestScoped\npublic class LongRunningProcess\
    \ {\n    @Inject\n    private LongRunningProcessService service;\n\n    @Inject\n\
    \    @Push\n    private PushContext push;\n\n    public void submit() {\n    \
    \    service.asyncSubmit(result -> push.send(result));\n    }\n}\n```\n\nAnd here\
    \ is what the service class looks like."
