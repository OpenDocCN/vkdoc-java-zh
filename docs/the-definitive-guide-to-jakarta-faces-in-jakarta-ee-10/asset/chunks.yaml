    \ in a Facelets file. Only tooling like IDEs may\nrequire them for proper code\
    \ completion, but Jakarta Faces itself does\nnot require the root XML namespace\
    \ being present in the Facelet.\nThe “`h`” XML\nnamespace\nspecifies the HTML\
    \ taglib URI and the “`ui`” XML namespace\nspecifies the Facelets taglib URI,\
    \ which are both present in the Jakarta\nFaces implementation JAR file and registered\
    \ to Facelets during the web\napplication’s startup. The Facelets compiler can\n\
