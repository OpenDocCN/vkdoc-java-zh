    “`/path/to/jdk`”). This is not strictly required by Jakarta Faces itself, but
    Eclipse and WildFly need this. Eclipse as being an integrated development environment
    will need the `PATH` in order to find the Java executables. WildFly as being a
    Jakarta EE application server will need the `JAVA_HOME` in order to find the JDK
    tools.'
  trans: '

    同月，在 JakartaOne Livestream 2019 大会上，Tijms 在印度尼西亚雅加达的酒店里，通过一场名为“Jakarta Faces 的未来”的演讲，介绍了
    Faces 下一版本的一些构想。演讲中，Tijms 提到该版本的核心工作是移除已弃用的功能，例如 2005 年弃用的 Faces 原生表达式语言、2009
    年弃用的 Jakarta Server Pages 支持、2016 年弃用的 Faces 原生托管 Bean 等。在功能方面，Tijms 提到默认启用无扩展名视图，并新增一个生命周期阶段，以便在空页面上更轻松地使用当前用于视图操作的功能。


    第二步完成后，第三步随即启动。这一步涉及将所有 Jakarta EE API（当然包括 Faces）的命名空间从 `javax.*` 更改为 `jakarta.*`。之所以需要这样做，是因为根据
    JCP 规则，包只能通过 JCP 流程进行修改。由于 Jakarta EE 不再遵循该流程，因此必须更改包名。在接下来的几个月里，Tijms 和其他提交者努力修改源代码和文档中的包名，最终于
    2020 年 10 月发布了 Faces 3.0，作为 Jakarta EE 9 的一部分。由于时间限制，原定的 Jakarta EE 9（以及 Faces
    3.0）JDK 11 兼容性认证计划被迫取消。


    Faces 3.0 发布后不久，Tijms 通过一封标题为“启动 Jakarta Faces 4.0”的邮件发送至 faces-dev 列表，开启了 Faces
    4.0 的工作。该邮件重申了之前演讲中的一些计划，并增加了 Thomas Andraschko 先前提出的几项 API 增强功能。


    2020 年 10 月 23 日，Arjan Tijms 将 Mojarra 分支的版本设置为 4.0.0-SNAPSHOT，标志着 Faces 4.0 的开始。几天后，即
    2020 年 10 月 27 日，Tijms 完成了一次历史性的提交：“移除 Jakarta Pages 支持。”这个在 2003 年曾受到 Hans Bergsten
    强烈批评的技术决策，正如 Bergsten 所预言的那样给 Faces 带来了巨大痛苦，如今终于被终结。又过了几天，在 2020 年 11 月 1 日，Faces
    的原生托管 Bean 系统也寿终正寝。从那一刻起，CDI Bean 成为 Faces 唯一指定的 Bean 类型。


    2021 年初，Tijms、Andraschko 和 Scholtz 讨论了如何推进拟议的变更，接下来的几个月里，Mojarra 和 MyFaces 项目中涌现了大量新问题，并提交了大量代码来实现这些拟议的新功能。


    与此同时，Jakarta EE TCK 也进行了更新以支持 JDK 11，最终于 2021 年 5 月发布了 Jakarta EE 9.1。由于 Faces
    API 和 Mojarra 3.0 实现已经兼容 JDK 11，因此无需为它们发布新版本。


    下表显示了各个已发布版本的时间线和差异：


    | 日期 | Maven 坐标 | 构建来源 | 认证版本 | Javadoc | Java 包 | TCK 级别 | API 级别 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 2017 年 3 月 | javax.faces:javax.faces-api:2.3 | github/javaee | Jakarta EE 8
    | Jakarta EE 术语 | javax.faces | JDK8 | JDK8 |

    | 2019 年 1 月 | **jakarta**.faces:**jakarta**.faces-api:2.3.1 | github/**eclipse-ee4j**
    | Jakarta EE 8 | Jakarta EE 术语 | javax.faces | JDK8 | JDK8 |

    | 2019 年 9 月 | **jakarta**.faces:**jakarta**.faces-api:2.3.2 | github/**eclipse-ee4j**
    | **Jakarta** EE 8 | **Jakarta EE** 术语 | javax.faces | JDK8 | JDK8 |

    | *2020 年 10 月* | ***jakarta**.faces:**jakarta**.faces-api:3.0* | *github/**eclipse-ee4j***
    | ***Jakarta*** *EE 9* | ***Jakarta EE****术语* | ***Jakarta**.**faces* | *JDK8*
    | *JDK**8* |

    | *2021 年 5 月* | ***jakarta**.faces:**jakarta**.faces-api:3.0* | *github/**eclipse-ee4j***
    | ***Jakarta*** *EE 9.1* | ***Jakarta EE****术语* | ***Jakarta**.**faces* | *JDK**11***
    | *JDK**8* |


    2021 年 8 月 21 日，Çağatay Çivici 在 JakartaOne Livestream 土耳其版演讲中介绍了 Faces 的最新状态。他的演讲标题恰如其分地定为“Jakarta
    Faces 4.0”。在撰写本文时，Faces 4.0 的发布评审计划于 2022 年 5 月 15 日左右开始。


    # 2. 从零开始：Hello World


    在本章中，你将学习如何使用 Eclipse IDE（集成开发环境）、Maven 依赖管理系统、WildFly 应用服务器和 H2 数据库，从零开始搭建一个
    Jakarta Faces 开发环境。


    ## 安装 Java SE JDK


    你可能已经知道，Java SE 以 JRE 形式提供给最终用户，以 JDK 形式提供给软件开发人员。Eclipse 本身并不严格要求 JDK，因为它有自己的编译器。Jakarta
    Faces 作为一个软件库，运行也不需要 JDK。然而，WildFly 确实需要 JDK 才能运行，主要是为了能够编译 Jakarta Pages 文件，尽管
    Jakarta Pages（原名 Jakarta Pages, Java Server Pages）自 Jakarta Faces 2.0 起已作为 Jakarta
    Faces 的视图技术被弃用。


    因此，你需要确保已按照 Oracle 的说明安装了 JDK。在撰写本文时，最新的 Java SE 版本是 17，但由于 Jakarta EE 10 是为 Java
    SE 11 设计的，你至少可以使用 Java SE 11 版本。安装说明取决于所使用的平台（Windows、Linux 或 MacOS）。你可以在此处找到详细的
    Java SE 17 JDK 安装说明：[`https://docs.oracle.com/en/java/javase/17/install/overview-jdk-installation.html`](https://docs.oracle.com/en/java/javase/17/install/overview-jdk-installation.html)


    最重要的部分是，`PATH` 环境变量必须包含包含 Java 可执行文件的 `/bin` 文件夹（例如，“`/path/to/jdk/bin`”），并且 `JAVA_HOME`
    环境变量必须设置为 JDK 根文件夹（例如，“`/path/to/jdk`”）。Jakarta Faces 本身并不严格要求这些，但 Eclipse 和 WildFly
    需要它们。Eclipse 作为一个集成开发环境，需要 `PATH` 来查找 Java 可执行文件。WildFly 作为一个 Jakarta EE 应用服务器，需要
    `JAVA_HOME` 来查找 JDK 工具。

