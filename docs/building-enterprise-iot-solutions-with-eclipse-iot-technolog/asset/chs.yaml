- "# 2. CoAP\n\n> *文明如同建筑的石块，由一代代人相互支撑、相继贡献而建成。*\n\n> *A civilization is built by\
  \ the successive contribution of generations leaning on each other like the stones\
  \ of a building.*\n> \n> ——安德烈·弗罗萨尔，《让-保罗二世的世界》\n\n开源的本质在于利用实现共享功能的构建模块。这使你能够专注于自己的应用场景，而无需重复实现无数人已经完成的工作。由于时间是一种极其有限的资源，你通过使用开源组件节省的每一分钟，都可以投入到为解决方案创造有意义的差异化价值上。\n\
  \n开源项目和标准同样受益于我刚才描述的方法。当一个开源项目将另一个项目作为依赖项时，它会强化各自所属的社区。拥有一个开源采用者，对于被依赖的项目而言，是宝贵的反馈来源和新需求的来源。对于采用者来说，利用开源依赖项提供了专有组件无法提供的灵活性和控制力。Eclipse\
  \ IoT 和 Edge 的多个构建模块都依赖于它们的同类项目。\n\n本章和下一章将介绍两种密切相关的协议：CoAP 和 LwM2M。在本章中，我将教你如何使用\
  \ [Eclipse Californium](https://www.eclipse.org/californium/)，一个成熟的 CoAP 实现；在下一章中，你将了解\
  \ [Eclipse Leshan](https://www.eclipse.org/leshan/)，这是一个使用 Californium 作为其 CoAP\
  \ 实现来构建 LwM2M 解决方案的框架。\n\n## CoAP：更精简的 HTTP\n\n与 HTTP 类似，*受限应用协议*（CoAP）在由*互联网工程任务组*（IETF）发布的*征求意见稿*（RFC）中进行了描述。在撰写本文时，CoAP\
  \ 是一项提议的互联网标准。CoAP 的初始 RFC，即 2014 年 6 月发布的 [RFC 7252](https://www.rfc-editor.org/info/rfc7252)，已由以下\
  \ RFC 更新：\n\n*   **RFC 7641：** [*受限应用协议（CoAP）中的资源观察*](https://www.rfc-editor.org/info/rfc7641)，2015\
  \ 年 9 月\n\n*   **RFC 7959：** [*受限应用协议（CoAP）中的块传输*](https://www.rfc-editor.org/info/rfc7959)，2016\
  \ 年 8 月\n\n*   **RFC 8613：** [*受限 RESTful 环境中的对象安全（OSCORE）*](https://www.rfc-editor.org/info/rfc8613)，2019\
  \ 年 7 月\n\n*   **RFC 8974：** [*受限应用协议（CoAP）中的扩展令牌和无状态客户端*](https://www.rfc-editor.org/info/rfc8974)，2021\
  \ 年 1 月\n\n所有这四个 RFC 都代表了可选功能，在特定实现中可能不存在。\n\n值得一提的是，加密的 CoAP 连接依赖于*数据报传输层安全*（DTLS）协议\
  \ 1.2 版本，该协议最初于 2012 年 1 月作为 [RFC 6347](https://www.rfc-editor.org/info/rfc6347)\
  \ 发布。DTLS 基于通常用于保护 HTTP 连接的*传输层安全*（TLS）协议，但侧重于数据报协议，例如*用户数据报协议*（UDP）。\n\n## 特性\n\
  \nCoAP 的创建者明确将其设计为类似于 HTTP。与 HTTP 一样，它是一种请求/响应协议，依赖于*统一资源定位符*（URL）、内容类型和选项。你可以像处理\
  \ HTTP 流量一样，为 CoAP 流量使用代理和缓存。CoAP 请求依赖于与 HTTP 相同的 GET、PUT、POST 和 DELETE 方法，尽管在涉及的语义上存在细微差别。CoAP\
  \ 和 HTTP 之间的关系在 RFC 7252 中描述如下：\n\n> *CoAP 的目标不是盲目地压缩 HTTP [RFC2616]，而是实现 REST 的一个子集，该子集与\
  \ HTTP 通用，但针对 M2M 应用进行了优化。尽管 CoAP 可用于将简单的 HTTP 接口改造为更紧凑的协议，但更重要的是，它还提供了针对 M2M 的特性，例如内置发现、多播支持和异步消息交换。*\n\
  \n客户端向服务器发送 CoAP 请求，以执行通过方法代码在特定资源上指定的操作。URI 标识该资源。服务器发回由响应代码描述的响应，该响应可能包含资源的表示。CoAP\
  \ 请求和响应是异步的。由于该协议运行在 UDP 或 UDP 等价协议之上，而 UDP 本质上不可靠，因此消息可能乱序到达、重复甚至丢失。CoAP 实现了一种轻量级的可靠性机制来解决这些问题。\n\
  \n注意\n\n与 TCP 相比，UDP 是一种简单得多的协议。它是无连接的，不执行网络握手，这意味着它不提供排序、可靠性和数据完整性功能。这是设计使然，因为\
  \ UDP 将实现此类功能的任务委托给了协议栈的更高层。许多物联网协议利用 UDP 作为其传输层，因为其简单性降低了资源需求。CoAP 实现了简单的可靠性和完整性功能，这些功能即使在导致更高消息丢失的较弱网络上也能正常工作。\n\
  \nCoAP 的可靠性行为取决于所选的消息类型。目前有四种可用的消息类型：\n\n*   **可确认：** 消息可靠传输。可确认消息的接收者必须通过确认消息进行确认，或者拒绝该消息。如果消息被拒绝，接收者将忽略该消息并发送回一个匹配的重置消息。\n\
  \n*   **不可确认：** 消息不可靠传输。接收者不得确认该消息。如果消息被拒绝，接收者可以选择发送回一个匹配的重置消息。\n\n*   **确认：** 该消息作为对可确认消息的响应而发送。它必须回显原始消息\
  \ ID，并且必须包含一个响应或为空。有两种类型的确认：捎带确认和空确认。捎带确认携带对请求的响应。另一方面，空确认消息仅确认接收者收到了可确认消息，而不确认可确认消息中包含的请求的成功或失败。\n\
  \n*   **重置：** 该消息作为对可确认或不可确认消息的响应而发送。重置消息表示接收者收到了原始消息，但缺乏适当处理它的上下文。\n\n在没有确认消息的情况下，可确认消息的发送者将以递增的间隔重新传输该消息，直到收到确认或达到允许的最大尝试次数。CoAP\
  \ 实现还必须检测可确认和不可确认消息的重复消息。\n\n\n\n如果你是一名开发者，何时应选择可确认消息而非不可确认消息？最简单的判断方法是查看所发送命令或数据的价值。如果丢失一次读数或某个命令未被执行也无大碍，那么不可确认消息就足够了。当你希望数据和命令最终能到达目的地时，确认和重传机制无疑会很有帮助。\n\
  \n使用 CoAP `–` 或大多数物联网协议 `–` 时的一个最佳实践是保持消息体量小巧。RFC 7959 于 2016 年为 CoAP 增加了块传输支持，使得\
  \ CoAP 能够传输设备固件更新等较大的有效载荷。然而，该协议更适合小载荷场景，如果你经常需要在有限数量的消息中传输大量数据，则应考虑其他替代方案。\n\n\
  CoAP 与 HTTP 的一个关键区别在于，CoAP 不使用头部（headers），而是使用消息选项（message options）。这些选项同时适用于请求和响应。例如，请求的\
  \ URI 通过多个选项传输，从而使解析更高效。[RFC 7252 第 5.4 节](https://www.rfc-editor.org/rfc/rfc7252.html%2523page-36)列出了可用的选项。另一个需要考虑的方面是，消息选项是二进制的，而非类似\
  \ HTTP 的文本头部，这显著减小了消息体积。\n\n[RFC 7641](https://www.rfc-editor.org/info/rfc7641)\
  \ 中增加了一个有趣的选项，标题为“*受限应用协议（CoAP）中的资源观察*”。*观察*选项是 CoAP 的一个广泛支持的扩展，它允许请求者获取资源表示，并在指定时间段内保持其更新。可以说\
  \ CoAP 的观察功能类似于订阅，尽管 RFC 7641 明确指出该特性的意图并非取代发布/订阅网络。\n\n最后，值得一提的是，CoAP 允许请求者发现特定服务器暴露的资源。这是通过向\
  \ `/.well-known/core` URI 发送请求实现的，该 URI 将响应一个资源列表，并附带各自的媒体类型。要发现所有可达网络上的可用服务器，你可以向相关的\
  \ IP 多播组发送一个不可确认请求。对于 IPv4，地址为 `224.0.1.187`。对于 IPv6，地址为 `FF0X::FD`；服务器应仅在链路本地和站点本地范围内监听。请注意，每个服务器可以选择是否监听这些多播请求。\n\
  \n注意\n\n许多网络会过滤或阻止多播流量，因为它很容易被用来发起*拒绝服务*攻击。在依赖多播请求进行发现之前，请务必与你友好的网络管理员确认他们允许此类流量。\n\
  \n## 协议栈\n\nCoAP 与 IP 网络协议紧密相关。图 2-1 展示了 CoAP 的协议栈，下面我将进行讨论。\n\n![](img/524096_1_En_2_Fig1_HTML.jpg)\n\
  \n该架构图由以下层组成：应用层、CoAP 请求或响应、CoAP 消息、UDP 加 DTLS、IPv4 或 IPv6、6LoWPAN、以太网 Wi-Fi、BLE\
  \ WPAN 以及物理信道。\n\n图 2-1\n\nCoAP 协议栈\n\n在传统有线（以太网）和无线（Wi-Fi）网络上，CoAP 同时支持 IPv4 和\
  \ IPv6。然而，在 IPv6 之上使用 CoAP 更为简便，因为所有设备都是直接可路由的；在*网络地址转换*（NAT）代理后面使用 IPv4 总是更复杂。无论使用哪种\
  \ IP 版本，对于协议栈的其他层来说都无关紧要，并且除了 URI 的格式之外，在你编写的代码中也不会产生差异。\n\nCoAP 也可以运行在 *6LoWPAN*\
  \ 之上，这是 IPv6 在*无线个域网*（WPAN）上的绑定。6LoWPAN 允许基于 IEEE 802.15.4 标准 `–` 这也是 Zigbee、Thread\
  \ 和 Snap 的基础 `–` 或基于具有许多相似特性的*低功耗蓝牙*（BLE）的网络发送和接收 IPv6 数据包。Linux 内核已经支持 6LoWPAN，这意味着你可以在大多数配备蓝牙无线电的单板计算机上，通过\
  \ 6LoWPAN 使用 CoAP。\n\n*互联网号码分配机构*（IANA）为协议分配了以下端口和服务名称：\n\n*   端口号 5683 和服务名称 \"\
  coap\" 用于常规流量\n*   端口号 5684 和服务名称 \"coaps\" 用于 DTLS 加密流量\n\n\n\n## 安全性\n\nCoAP 中的大部分安全措施都依赖于\
  \ DTLS。DTLS 旨在为 UDP 等数据报协议提供安全特性。其设计者特意使其尽可能接近 TLS，以便利用后者丰富的实践经验，并最大限度地复用现有基础设施和代码。RFC\
  \ 7252 [明确指出](https://www.rfc-editor.org/rfc/rfc7252.html%2523page-69)：“*实际上，DTLS\
  \ 就是在 TLS 基础上增加了处理 UDP 传输不可靠特性的功能。*”\n\nCoAP 提供了一种机制，用于向新设备提供配置值，包括设备所需的安全信息，例如加密密钥和访问控制列表。配置完成后，设备将在四种安全模式之一中运行。具体如下：\n\
  \n*   **NoSec（无安全模式）**：禁用安全性（不使用 DTLS）。仍然可以通过利用底层安全性来保护流量；IPsec 是一种可选方案。我强烈建议您不要使用此模式，即使是用于原型开发。从一开始就建立适当的安全性才是更好的方法。\n\
  \n*   **PreSharedKey（预共享密钥模式）**：启用 DTLS，并提供预共享密钥列表。每个密钥指定了其适用的节点列表。此模式最容易实现，但随着设备数量的增加，其扩展性不佳。\n\
  \n*   **RawPublicKey（原始公钥模式）**：启用 DTLS，设备拥有一个原始公钥——一个没有证书的非对称密钥对。设备拥有一个从其持有的公钥派生出的计算身份。它还维护着一个允许与之通信的设备身份列表。此模式与*公钥基础设施*（PKI）配合良好，并避免了与证书相关的复杂性。\n\
  \n*   **Certificate（证书模式）**：启用 DTLS，设备拥有一个非对称密钥对，并附带一个 X.509 数字证书，该证书绑定到其主体并由信任根签名。设备还拥有一个可以联系以验证证书的信任根锚点列表。每个设备应有一个在证书主体中使用的唯一\
  \ ID；依赖 IP 地址将是一个坏主意，因为 IP 地址可能会随时间变化。证书模式带来了更高的复杂性，并要求您的组织管理自己的 PKI。但是，如果您正在构建企业级物联网解决方案，则应尽可能采用此模式。\n\
  \nRFC 7252 规定，只有 NoSec 和 RawPublicKey 模式是强制实现的。在做出任何与安全相关的决策之前，请仔细检查您计划使用的任何实现的文档。\n\
  \n当启用 DTLS 时，在将 CoAP 响应与请求匹配时，DTLS 会话和时期必须相同。将确认消息或重置消息与可确认消息匹配，或将重置消息与不可确认消息匹配时，也是如此。\n\
  \nOSCORE 扩展（RFC 8613）代表了保护 CoAP 消息的另一种方式。OSCORE 保护端点之间的消息。具体来说，它保护请求方法、资源标识符、内容类型和消息的有效载荷。为了实现这一点，OSCORE\
  \ 利用*简洁二进制对象表示*（CBOR）格式进行编码，并使用*CBOR 对象签名与加密*（COSE）进行加密。OSCORE 的开销可能低至标准 CoAP 之上的\
  \ 11 字节。OSCORE 在逐字段的基础上应用保护。受保护字段的值被加密，其完整性得到保证。当消息在传输过程中时，代理仍然可以访问未受保护的字段。\n\n\
  ## Eclipse Californium\n\nEclipse Californium 是一个用 Java 编写、广泛使用且成熟的 CoAP 实现。该项目自\
  \ 2014 年 4 月以来一直活跃，并被其他几个 Eclipse 物联网项目所使用。Californium 在两种许可证下可用：Eclipse 分发许可证 v1.0（类似于\
  \ [3-Clause BSD 许可证](https://opensource.org/licenses/BSD-3-Clause)）和 Eclipse 公共许可证\
  \ v2.0。\n\nCalifornium 的官方网络资源如下：\n\n*   **网站：**[`https://eclipse.org/californium`](https://eclipse.org/californium)\n\
  \n*   **Eclipse 项目页面：**[`https://projects.eclipse.org/projects/iot.californium`](https://projects.eclipse.org/projects/iot.californium)\n\
  \n*   **代码仓库：**[`https://github.com/eclipse/californium`](https://github.com/eclipse/californium)\n\
  \n*   **维基：**[`https://github.com/eclipse/californium/wiki`](https://github.com/eclipse/californium/wiki)\n\
  \n截至撰写本文时，Californium 的最新版本是 v3.0.0，于 2021 年 11 月 3 日发布。Californium 集成了其自己的 DTLS\
  \ v1.2 实现。该实现名为 Scandium，可在主要的 Californium 仓库中找到。\n\nCalifornium v.3.0.0 提供以下稳定特性：\n\
  \n*   CoAP（RFC 7252）\n\n*   观察/通知（RFC 7641）\n\n*   分块传输（RFC 7959）\n\n*   无服务器响应（RFC\
  \ 7967）\n\n*   资源目录草案（draft-ietf-core-resource-directory-20）实现\n\n*   通过 Scandium\
  \ 实现的 DTLS 1.2（RFC 6347）\n\n*   DTLS 1.2 连接 ID（draft-ietf-tls-dtls-connection-id-13）\n\
  \n*   DTLS 记录大小限制扩展（RFC 8449）\n\n*   DTLS 扩展主密钥（RFC 7627）\n\n它还包含一些实验性特性，这些特性可能在未来的版本中变得稳定：\n\
  \n*   DTLS 中的 RSA 支持\n\n*   DTLS 中的 Bouncy Castle（OpenJDK JCE 的替代方案）支持\n\n*   基于\
  \ TCP 的 CoAP（RFC 8323）支持 `–` 不完整\n\n*   OSCORE 支持\n\n现在，让我们看看您是否可以使用 Californium\
  \ 框架构建您的 CoAP 应用程序。为此，我将使用取自 Californium 本身附带的[众多演示应用](https://github.com/eclipse/californium/tree/3.0.0/demo-apps)的代码片段。\n\
  \n### 沙箱服务器\n\n一个公共沙箱服务器可在 `coap://californium.eclipseprojects.io:5683/` 访问。它依赖于\
  \ `cf-plugtest-server` 演示应用程序，并且始终使用提交到主分支的最新代码。\n\n### 入门指南\n\n由于 Californium 是用\
  \ Java 编写的，它使用 *Apache Maven* 作为其构建系统。假设您有一个可用的 Maven 安装并且路径中有 JDK，您可以通过克隆 GitHub\
  \ 仓库并从根文件夹运行 `mvn clean install -DskipTests` 来创建一个可执行的 JAR 文件。这样做还会在 `demo-apps/run`\
  \ 子文件夹中为您提供各种演示应用程序的 JAR 文件。\n\n如果您计划为项目使用 Maven，则需要向相关的 `pom.xml` 文件添加依赖项，如代码清单\
  \ 2-1 所示。\n\n```\n...\n\norg.eclipse.californium\ncalifornium-core\n3.0.0\n\n...\n\
  \n...\n代码清单 2-1\nCalifornium 的 Maven 依赖声明\n```\n\n\n\n### 简单 GET 请求：演示\n\n[`cf-helloworld-client`](https://github.com/eclipse/californium/tree/3.0.0/demo-apps/cf-helloworld-client)\
  \ 演示了如何向 CoAP 服务器发送请求。如果你已克隆仓库并构建了 Californium，可以通过执行以下命令来运行演示客户端：\n\n```\njava\
  \ -jar cf-helloworld-client-3.0.0.jar GETClient coap://californium.eclipseprojects.io:5683/\n\
  ```\n\n在此示例中，我将请求发送到了公共沙箱。\n\n如果没有问题，你将看到类似如下的输出：\n\n```\n10:21:07.463 INFO [Configuration]:\
  \ defaults added COAP.\n10:21:07.466 INFO [Configuration]: defaults added SYS.\n\
  10:21:07.466 INFO [Configuration]: defaults added UDP.\n10:21:07.468 INFO [Configuration]:\
  \ loading properties from file\n...\n10:21:07.699 INFO [CoapEndpoint]: coap Started\
  \ endpoint at coap://[0:0:0:0:0:0:0:0]:39470\n10:21:07.699 INFO [EndpointManager]:\
  \ created implicit endpoint coap://[0:0:0:0:0:0:0:0]:39470 for coap\n2.05\n{\"Content-Format\"\
  :\"text/plain\", \"Size2\":457}\n****************************************************************\n\
  CoAP RFC 7252                                  Cf 3.1.0-SNAPSHOT\n****************************************************************\n\
  This server is using the Eclipse Californium (Cf) CoAP framework\npublished under\
  \ EPL+EDL: http://www.eclipse.org/californium/\n(c) 2014-2021 Institute for Pervasive\
  \ Computing, ETH Zurich and others\n****************************************************************\n\
  ```\n\n你可以在底部看到服务器的响应。\n\n### 简单 GET 请求：代码\n\n现在，让我们看看[简单 GET 请求演示的代码](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-helloworld-client/src/main/java/org/eclipse/californium/examples/GETClient.java)的主要部分。\n\
  \n默认情况下，Californium 将各种配置参数存储在一个 Java `.properties` 文件中。不过，可以覆盖这些默认值。以下代码片段展示了如何实现这一点，它重现了包含简单\
  \ GET 请求演示的类的顶部部分：\n\n```\nprivate static final File CONFIG_FILE = new File(\"Californium3.properties\"\
  );\nprivate static final String CONFIG_HEADER = \"Californium CoAP Properties file\
  \ for client\";\nprivate static final int DEFAULT_MAX_RESOURCE_SIZE = 2 * 1024 *\
  \ 1024; // 2 MB\nprivate static final int DEFAULT_BLOCK_SIZE = 512;\nstatic {\n\
  CoapConfig.register();\nUdpConfig.register();\n}\nprivate static DefinitionsProvider\
  \ DEFAULTS = new DefinitionsProvider() {\n@Override\npublic void applyDefinitions(Configuration\
  \ config) {\nconfig.set(CoapConfig.MAX_RESOURCE_BODY_SIZE, DEFAULT_MAX_RESOURCE_SIZE);\n\
  config.set(CoapConfig.MAX_MESSAGE_SIZE, DEFAULT_BLOCK_SIZE);\nconfig.set(CoapConfig.PREFERRED_BLOCK_SIZE,\
  \ DEFAULT_BLOCK_SIZE);\n}\n};\n```\n\n你可以看到，`DefinitionsProvider` 静态内部类为某些配置参数应用了特定的默认值；对于用户未指定的每个参数，Californium\
  \ 将自行分配默认值。\n\n在执行任何其他操作之前，`main (String args[])` 方法会初始化配置。`createWithFile` 方法会在文件不存在时创建一个\
  \ `.properties` 文件，如果文件已存在则从现有文件读取。\n\n```\nConfiguration config = Configuration.createWithFile(CONFIG_FILE,\
  \ CONFIG_HEADER, DEFAULTS);\nConfiguration.setStandard(config);\n```\n\n一旦我们有了有效的配置，向命令行指定的\
  \ URI 发送 GET 请求就很简单了。类型为 `CoapResponse` 的 `response` 变量使我们能够访问服务器响应的内容。以下代码片段展示了如何发送\
  \ GET 请求并处理响应：\n\n```\nCoapClient client = new CoapClient(uri);\ntry {\nCoapResponse\
  \ response = client.get();\nif (response != null) {\nSystem.out.println(response.getCode());\n\
  System.out.println(response.getOptions());\nif (args.length > 1) {\n...\n} else\
  \ {\nSystem.out.println(response.getResponseText());\n...\n}\n} else {\nSystem.out.println(\"\
  No response received.\");\n}\n} catch (ConnectorException | IOException e) {\nSystem.err.println(\"\
  Got an error: \" + e);\n}\nclient.shutdown();\n```\n\n### 简单服务器：演示\n\n构建 CoAP 服务器涉及更多工作，因为你需要绑定到网络接口并实现资源。幸运的是，Californium\
  \ 演示应用提供了几个服务器示例。首先，让我们看看如何运行 [`cf-helloworld-server`](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-helloworld-server/src/main/java/org/eclipse/californium/examples/HelloWorldServer.java)，这是一个简单的实现。要启动它，只需执行以下命令：\n\
  \n```\njava -jar cf-helloworld-server-3.0.0.jar HelloWorldServer\n```\n\n你应该会看到以下输出。请注意，由于我们之前运行了客户端，Californium\
  \ 会通知我们它正在从 `Californium3.properties` 加载配置。\n\n```\n11:51:01.585 INFO [Configuration]:\
  \ defaults added COAP.\n11:51:01.588 INFO [Configuration]: defaults added SYS.\n\
  11:51:01.588 INFO [Configuration]: defaults added UDP.\n11:51:01.589 INFO [Configuration]:\
  \ defaults added TCP.\n11:51:01.590 INFO [Configuration]: loading properties from\
  \ file /home/fdesbiens/californium/demo-apps/run/Californium3.properties\n11:51:01.626\
  \ INFO [RandomTokenGenerator]: using tokens of 8 bytes in length\n...\n11:51:01.685\
  \ INFO [CoapEndpoint]: coap Started endpoint at coap://127.0.0.1:5683\n11:51:01.686\
  \ DEBUG [UDPConnector]: Starting network stage thread [UDP-Sender-/127.0.0.1:5683[1]]\n\
  ```\n\n默认情况下，此服务器将仅以 UDP 模式启动；如果需要，你也可以启用实验性的 TCP 支持。要验证服务器是否正常运行，你可以使用 `cf-helloworld-client`\
  \ 向其暴露的资源发送 GET 请求。该资源的名称为 `helloWorld`。打开一个新的命令提示符并执行以下命令：\n\n```\njava -jar cf-helloworld-client-3.0.0.jar\
  \ GETClient coap://127.0.0.1/helloWorld\n```\n\n由于你在同一台机器上运行客户端和服务器，因此不应遇到网络问题。用于调用客户端的命令提示符上应该会输出几行信息。我重现了输出的关键部分：\n\
  \n```\n...\n2.05\n{\"Content-Format\":\"text/plain\"}\nHello World!\n...\n```\n\n\
  在此示例中，服务器返回了一个简单的文本响应。你看到的 2.05 是成功 CoAP GET 请求的响应代码之一——类似于 HTTP 中的 200。\n\n\n\n\
  ### 简易服务器：代码解析\n\n现在，我将与您一同探索 cf-helloworld-server 代码中最关键的部分。为简化起见，作者将所有内容都放在一个名为\
  \ `HelloWorldServer` 的类中，该类继承了 Californium 的 `CoapServer` 类。这个类包含了用于初始化和启动服务器的 `main`\
  \ 方法。以下是该方法的核⼼代码：\n\n```\ntry {\n// 创建服务器\nboolean udp = true;\nboolean tcp = false;\n\
  int port = Configuration.getStandard().get(CoapConfig.COAP_PORT);\n...\nHelloWorldServer\
  \ server = new HelloWorldServer();\n// 在所有 IP 地址上添加端点\nserver.addEndpoints(udp,\
  \ tcp, port);\nserver.start();\n} catch (SocketException e) {\nSystem.err.println(\"\
  初始化服务器失败: \" + e.getMessage());\n}\n```\n\n`HelloWorldServer` 类的构造函数仅实例化服务器暴露的 CoAP\
  \ 资源。您可以在以下代码中看到：\n\n```\npublic HelloWorldServer() throws SocketException {\n//\
  \ 提供一个 Hello-World 资源的实例\nadd(new HelloWorldResource());\n...\n}\n```\n\n正如您在下一个代码片段中所见，`HelloWorldResource`\
  \ 仅处理 GET 请求。您需要重写其他方法来处理 POST、PUT 和 DELETE 请求。基类 `CoapResource` 提供了默认实现，返回响应码 `4.05\
  \ (方法不允许)`。\n\n```\nstatic class HelloWorldResource extends CoapResource {\npublic\
  \ HelloWorldResource() {\n// 设置资源标识符\nsuper(\"helloWorld\");\n// 设置显示名称\ngetAttributes().setTitle(\"\
  Hello-World 资源\");\n}\n@Override\npublic void handleGET(CoapExchange exchange) {\n\
  // 响应请求\nexchange.respond(\"Hello World!\");\n}\n}\n```\n\n最后，`addEndpoints` 方法为设备上可用的每个网络接口创建\
  \ `CoapEndpoint` 实例。整个交互依赖于著名的*构建器*模式。在此例中，构建器是定义在 `CoapEndpoint` 中的一个静态嵌套类。该方法也可以在需要时实例化\
  \ TCP 端点。以下是 `addEndpoints` 的代码：\n\n```\nprivate void addEndpoints(boolean udp,\
  \ boolean tcp, int port) {\nConfiguration config = Configuration.getStandard();\n\
  for (InetAddress addr : NetworkInterfacesUtil.getNetworkInterfaces()) {\nInetSocketAddress\
  \ bindToAddress = new InetSocketAddress(addr, port);\nif (udp) {\nCoapEndpoint.Builder\
  \ builder = new CoapEndpoint.Builder();\nbuilder.setInetSocketAddress(bindToAddress);\n\
  builder.setConfiguration(config);\naddEndpoint(builder.build());\n}\nif (tcp) {\n\
  TcpServerConnector connector = new TcpServerConnector(bindToAddress, config);\n\
  CoapEndpoint.Builder builder = new CoapEndpoint.Builder();\nbuilder.setConnector(connector);\n\
  builder.setConfiguration(config);\naddEndpoint(builder.build());\n}\n}\n}\n```\n\
  \n### 关于 DTLS\n\n到目前为止，我展示的示例都使用纯 CoAP。幸运的是，Californium 团队还构建了一个 DTLS 演示[客户端](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-secure/src/main/java/org/eclipse/californium/examples/SecureClient.java)和[服务器](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-secure/src/main/java/org/eclipse/californium/examples/SecureServer.java)。查看客户端代码的核心部分，您会发现发送\
  \ GET 请求的主要区别在于使用了 `DTLSConnector` 而不是 `UDPConnector`。\n\n```\npublic class SecureClient\
  \ {\n...\nprivate final DTLSConnector dtlsConnector;\nprivate final Configuration\
  \ configuration;\npublic SecureClient(DTLSConnector dtlsConnector, Configuration\
  \ configuration) {\nthis.dtlsConnector = dtlsConnector;\nthis.configuration = configuration;\n\
  }\npublic void test() {\nCoapResponse response = null;\ntry {\nURI uri = new URI(SERVER_URI);\n\
  CoapClient client = new CoapClient(uri);\nCoapEndpoint.Builder builder = new CoapEndpoint.Builder().setConfiguration(configuration)\n\
  .setConnector(dtlsConnector);\nclient.setEndpoint(builder.build());\nresponse =\
  \ client.get();\nclient.shutdown();\n} catch (URISyntaxException e) {\nSystem.err.println(\"\
  无效 URI: \" + e.getMessage());\nSystem.exit(-1);\n} catch (ConnectorException | IOException\
  \ e) {\nSystem.err.println(\"发送请求时发生错误: \" + e);\nSystem.exit(-1);\n}\n}\n}\n```\n\
  \n`DTLSConnector` 实例在 `SecureClient` 类的 `main` 方法中初始化。相关代码如下所示：\n\n```\nDtlsConnectorConfig.Builder\
  \ builder = DtlsConnectorConfig.builder(configuration);\nCredentialsUtil.setupCid(args,\
  \ builder);\n...\nCredentialsUtil.setupCredentials(builder, CredentialsUtil.CLIENT_NAME,\
  \ modes);\nDTLSConnector dtlsConnector = new DTLSConnector(builder.build());\nSecureClient\
  \ client = new SecureClient(dtlsConnector, configuration);\nclient.test();\n```\n\
  \n该演示的作者将处理安全凭证（无论是密钥还是证书）的逻辑整合到了 [CredentialsUtil](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-secure/src/main/java/org/eclipse/californium/examples/CredentialsUtil.java)\
  \ 类中。该类又依赖于 Californium 仓库中 [`demo-certs`](https://github.com/eclipse/californium/tree/3.0.0/demo-certs)\
  \ 子文件夹下的资源。该文件夹中的 `README` 讨论了演示密钥和证书的结构，以及如何利用 [create-keystores.​sh](https://github.com/eclipse/californium/blob/3.0.0/demo-certs/src/main/resources/create-keystores.sh)\
  \ 脚本来创建您自己的凭证。该脚本依赖于您已安装的 *Java 开发工具包* (JDK) 提供的密钥和证书管理工具。\n\n\n\n## CoAP 与受限设备\n\
  \n虽然 Californium 是一个成熟且功能完备的 CoAP 实现，但它无法在无法运行 Linux 或 Windows 等高级操作系统的受限设备上使用。这是因为实时操作系统通常缺少所需的\
  \ Java 运行时环境。幸运的是，有一些可用的库，甚至某些实时操作系统本身就内置了对 CoAP 的支持。\n\n在受限设备的上下文中，你需要回答的一个重要设计问题是：该设备是否应该作为\
  \ CoAP 服务器。运行服务器会比偶尔作为客户端发送请求消耗更多资源。如果你只需要报告传感器数值，那么运行服务器可能有些大材小用 `–` 尤其是在需要最大化电池续航的场景下。然而，如果设备需要执行命令，那么通过服务器暴露\
  \ CoAP 资源则是有意义的。例如，LwM2M 就采用了这种方法。\n\nLinux 基金会的 [Zephyr RTOS](https://www.zephyrproject.org/)\
  \ [内置了一个 CoAP 库](https://docs.zephyrproject.org/latest/reference/networking/coap.html)；该实现支持块传输（RFC\
  \ 7959）和观察（RFC 7641）。此外，它还同时支持客户端和服务器角色。Zephyr CoAP 库使用纯缓冲区实现，并要求开发者直接操作套接字。提醒一下，Zephyr\
  \ 是用 C 语言实现的。\n\nGitHub 上的 Zephyr 仓库包含大量示例，包括一个 CoAP [客户端](https://github.com/zephyrproject-rtos/zephyr/blob/zephyr-v2.7.0/samples/net/sockets/coap_client/src/coap-client.c)和[服务器](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/net/sockets/coap_server/src/coap-server.c)。现在让我们快速浏览一下客户端代码，看看向远程服务器发送\
  \ GET 请求涉及哪些步骤。\n\n首先是套接字声明。\n\n```\nstatic int sock;\n```\n\n`start_coap_client`\
  \ 函数由 `main` 函数调用，用于设置套接字。请注意，该示例假设使用 IPv6 网络。\n\n```\nstatic int start_coap_client(void)\n\
  {\nint ret = 0;\nstruct sockaddr_in6 addr6;\naddr6.sin6_family = AF_INET6;\naddr6.sin6_port\
  \ = htons(PEER_PORT);\naddr6.sin6_scope_id = 0U;\ninet_pton(AF_INET6, CONFIG_NET_CONFIG_PEER_IPV6_ADDR,\n\
  &addr6.sin6_addr);\nsock = socket(addr6.sin6_family, SOCK_DGRAM, IPPROTO_UDP);\n\
  if (sock < 0) {\nLOG_ERR(\"Failed to create UDP socket %d\", errno);\nreturn -errno;\n\
  }\nret = connect(sock, (struct sockaddr *)&addr6, sizeof(addr6));\nif (ret < 0)\
  \ {\nLOG_ERR(\"Cannot connect to UDP remote : %d\", errno);\nreturn -errno;\n}\n\
  prepare_fds();\nreturn 0;\n}\n```\n\n实际发送请求的代码位于 `send_simple_coap_request` 函数中，以下是一个简化版本：\n\
  \n```\nstatic int send_simple_coap_request(uint8_t method)\n{\nuint8_t payload[]\
  \ = \"payload\";\nstruct coap_packet request;\nconst char * const *p;\nuint8_t *data;\n\
  int r;\ndata = (uint8_t *)k_malloc(MAX_COAP_MSG_LEN);\nif (!data) {\nreturn -ENOMEM;\n\
  }\nr = coap_packet_init(&request, data, MAX_COAP_MSG_LEN,\nCOAP_VERSION_1, COAP_TYPE_CON,\n\
  COAP_TOKEN_MAX_LEN, coap_next_token(),\nmethod, coap_next_id());\nif (r < 0) {\n\
  LOG_ERR(\"Failed to init CoAP message\");\ngoto end;\n}\nfor (p = test_path; p &&\
  \ *p; p++) {\nr = coap_packet_append_option(&request, COAP_OPTION_URI_PATH,\n*p,\
  \ strlen(*p));\nif (r < 0) {\nLOG_ERR(\"Unable add option to request\");\ngoto end;\n\
  }\n}\n...\nnet_hexdump(\"Request\", request.data, request.offset);\nr = send(sock,\
  \ request.data, request.offset, 0);\nend:\nk_free(data);\nreturn 0;\n}\n```\n\n"
- "# 3. LwM2M\n\n> *Nous avons besoin les uns des autres. L'être humain n'est pas\
  \ fait pour s'isoler, mais pour partager.*\n\n> *我们彼此需要。人类生来不是为了孤立自己，而是为了分享。*\n\
  > \n> ——爱丽丝·帕里佐，《野猪的重负》\n\n现代应用程序通常有众多依赖项。作为开发者，你我都站在巨人的肩膀上。或者更确切地说，我们自己的代码是建立在我们使用的众多库之上的。本书中我介绍的许多技术都建立在先前进步的基础上。本章的重点\
  \ LwM2M 就是一个很好的例子。\n\n历史上，LwM2M 专门使用 CoAP 作为传输层。虽然 LwM2M 1.2 版本在 2020 年底[增加了对 HTTP\
  \ 和 MQTT 传输的支持](https://omaspecworks.org/lwm2m-v1-2-is-now-available/)，但 CoAP 仍然是使用最广泛的一种。因此，我的代码示例将利用\
  \ [Eclipse Leshan](https://www.eclipse.org/leshan/)，这是一个用于构建 LwM2M 解决方案的框架，它使用 Californium\
  \ 作为其 CoAP 实现。\n\n## LwM2M：建立在 CoAP 基础之上\n\nCoAP 为构建物联网解决方案提供了坚实的基础。特别是，描述该协议的各种\
  \ RFC 并未定义消息负载，这一事实意味着 CoAP 非常灵活。同样的灵活性也适用于资源；开发者可以以他们认为合适的任何方式组织资源。其结果是，开箱即用的情况下，支持\
  \ CoAP 的设备和软件栈之间无法互操作。你至少需要处理负载并调整一些参数，以确保消息以正确的格式发送到正确的资源。\n\n*轻量级机器对机器*（LwM2M）协议旨在通过提供可扩展的资源和数据模型来解决这种互操作性缺失的问题。它由\
  \ [OMA SpecWorks](https://omaspecworks.org/)（前身为开放移动联盟 OMA，一个非营利性标准组织）管理。该协议 1.0\
  \ 版本于 2017 年 2 月发布，截至撰写本文时，最新版本是 2020 年 11 月发布的 1.2 版本。\n\n\n\n## 数据模型：对象与资源\n\n\
  LwM2M 数据模型基于*资源*：即设备提供的各类信息元素。资源按逻辑分组为*对象*。每个资源在所属对象内被分配一个唯一标识符。OMA SpecWorks 为所有作为\
  \ LwM2M 规范及对象规范核心组成部分的对象分配并维护唯一的*对象标识符*。对象规范定义了对象资源所支持的操作（读取、写入、执行），并规定了这些资源是强制性的还是可选的。此外，规范还说明了每个资源的数据类型，以及是否支持多实例。\n\
  \n第三方组织，如标准机构、个人或供应商，可以向 OMA SpecWorks 提议对象规范。一旦被采纳，这些对象规范将被收录到官方 LwM2M 注册表中，并分配一个唯一\
  \ ID。例如，LwM2M 规范定义了一个 `Device` 对象（ID: 3），用于向相关方公开设备信息。`Device` 对象包含用于表示设备制造商名称、型号和序列号等信息的资源。此外，注册表中还包含可重用的资源定义，您可以在自己的对象规范中使用它们。这些资源定义也被分配了唯一的\
  \ ID 以供引用。典型的例子包括数字输入、数字输出、模拟输入、模拟输出、调光值和测量单位。`Sensor Value`（ID: 5700）是注册表中定义的可重用资源之一，并被用于许多报告传感器读数的对象中。其中一个对象是\
  \ `Temperature`（ID: 3303）。值得一提的是，对象规范是有版本管理的，而资源定义则没有。\n\n注意\n\n官方 LwM2M 注册表位于\n\
  \n[`https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html`](https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html)\n\
  \n在运行时，客户端和服务器会实例化对象及其资源。一个对象可以包含同一资源的多个实例，并且同一对象的多个实例可以同时存在。对象及其包含的资源通过其分配的数字 ID\
  \ 进行引用，而对象和资源实例则在运行时获得一个实例编号。实例编号从 0 开始——这符合常规。所有 ID 和实例编号均为无符号整数。\n\nLwM2M 资源模型包括用于创建、更新和检索资源的操作，并支持资源变更的异步通知。一个资源可以支持三种操作：读取、写入和执行。支持读取或写入的资源称为*值*资源。支持执行的资源称为*可执行资源*；它们用于触发动作，不包含值。\n\
  \n要访问一个资源，您只需使用一个简单的 URI 来引用它。应遵循以下模式：\n\n```\n/[对象 ID]/[对象实例]/[资源 ID]/[资源实例]\n\
  ```\n\n这一切听起来可能有点抽象。那么，让我们来看一个具体的例子。LwM2M 规范定义了一个名为 `Device`（ID: 3）的对象，该对象定义了一组提供设备信息的资源，以及用于重启设备或执行恢复出厂设置的可执行资源。表\
  \ 3-1 列出了 LwM2M v1.1 版本中 `Device` 对象的部分资源。\n\n表 3-1\n\nDevice LwM2M 对象的资源列表（部分）\n\
  \n| ID | 名称 | 操作 | 实例 | 强制性 | 类型 |\n| --- | --- | --- | --- | --- | --- |\n| 0 |\
  \ 制造商 | 读取 | 单实例 | 可选 | 字符串 |\n| 1 | 型号 | 读取 | 单实例 | 可选 | 字符串 |\n| 2 | 序列号 | 读取\
  \ | 单实例 | 可选 | 字符串 |\n| 3 | 固件版本 | 读取 | 单实例 | 可选 | 字符串 |\n| 4 | 重启 | 执行 | 单实例 |\
  \ 强制 |   |\n| 5 | 恢复出厂设置 | 执行 | 单实例 | 可选 |   |\n\nLwM2M 规范规定，设备必须实现 `Device` 对象，并且只存在一个实例。因此，任何设备都会暴露一个\
  \ `Device` 对象的实例，其路径为\n\n```\n/3/0\n```\n\n如果该设备实现了 `Manufacturer` 资源，则该资源将位于\n\n\
  ```\n/3/0/0\n```\n\n让我们再看另一个例子。LwM2M 注册表中包含一个 `Temperature` 对象，用于报告温度传感器的数值。该对象的\
  \ ID 是 `3303`。该对象声明了多个资源，其中之一是 `Sensor Value`。`Sensor Value` 是注册表中定义的可重用资源之一，其 ID\
  \ 为 `5700`。因此，要检索配备单个温度传感器的设备报告的当前温度，您可以按如下方式查询该资源：\n\n```\n/3303/0/5700\n```\n\n\
  LwM2M 可以利用多种序列化格式来处理数据：纯文本、不透明格式、TLV、LwM2M TS 1.0 JSON、CBOR、LwM2M CBOR、SenML JSON\
  \ 和 SenML CBOR。像 CBOR 这样的二进制格式效率更高，因为它们压缩了有效载荷的大小。规范规定，服务器必须支持所有格式。\n\n## 基于 CoAP\
  \ 的额外能力\n\nLwM2M 的消息模型深受 CoAP 的 RESTful 模型启发。LwM2M 在设备和服务器之间定义的额外接口使其与众不同——并且可以说，更加出色。这些接口包括：\n\
  \n*   引导\n\n*   客户端注册\n\n*   设备管理与服务启用\n\n*   信息报告\n\n下面我将详细介绍每一项。\n\n### 引导\n\n\
  引导接口用于在客户端中配置参数，使其能够向一个或多个 LwM2M 服务器执行客户端注册。\n\n共有四种不同的引导模式：\n\n*   **出厂引导：** 设备在部署前已完成配置。配置的信息可以与\
  \ LwM2M 引导服务器或 LwM2M 服务器相关。\n\n*   **智能卡引导：** 设备从智能卡读取配置信息。这假设设备具备读取此类卡所需的硬件。理想情况下，信息通过安全通道读取，并且设备将验证其与智能卡上存储的信息是否匹配。\n\
  \n*   **客户端发起引导：** 设备将从 LwM2M 引导服务器检索配置信息。这要求客户端上存在 LwM2M 引导服务器账户。客户端还需要安全凭据才能连接到引导服务器，无论是\
  \ TLS/DTLS 还是 OSCORE 类型。\n\n*   **服务器发起引导：** 一个授权的 LwM2M 服务器在设备中触发引导序列。然后，设备将切换模式以执行客户端发起的引导。\n\
  \n客户端必须至少支持其中一种模式。\n\n### 客户端注册\n\n客户端使用此接口向一个或多个服务器进行注册、维护其注册状态，以及从服务器注销。\n\n当设备注册时，它会提供其支持的对象列表及其当前的对象实例。注册后，设备将根据其配置（通常是时间间隔或安全上下文）更新其注册信息。注册具有生命周期；服务器将认为在时限内未发送注册更新的设备已注销。\n\
  \n当设备关闭或断开连接时，它应执行注销操作——尽管这不是强制性的。\n\n\n\n### 设备管理与服务启用\n\n服务器通过设备管理与服务启用接口，访问已注册客户端暴露的对象实例和资源。该接口定义了用于实现此目的的具体操作：`Create`、`Read`、`Read-Composite`、`Write`、`Write-Composite`、`Delete`、`Execute`、`Write-Attributes`\
  \ 和 `Discover`。在客户端完成与相关服务器的注册之前，客户端将忽略服务器在此接口上执行的所有操作。\n\n常规的 `Read` 操作可应用于资源的值、资源实例、资源实例数组、对象实例或特定对象的所有实例。`Write`\
  \ 操作的范围大致相同，但侧重于单个对象实例。另一方面，`Read-Composite` 可以在单个请求中针对任意对象、对象实例、资源或资源实例的组合，无论这些组合来自同一对象还是不同对象。至于\
  \ `Write-Composite`，它可以跨一个或多个对象的不同实例，更新多个不同资源的值。\n\n### 信息报告\n\nLwM2M 服务器使用此接口来观察已注册客户端暴露的特定资源的值变化。观察可以针对单个资源，也可以是复合观察，针对客户端上跨多个对象实例的一组资源或一组资源实例。\n\
  \n## LwM2M 版本\n\n在撰写本文时，OMA SpecWorks 已发布了三个版本的 LwM2M。鉴于其快速的发布节奏，并非所有实现都支持该协议的最新版本。因此，您需要了解您所使用设备和软件支持的版本，以确定哪些功能可用。\n\
  \n### LwM2M v1.0（2017 年 2 月）\n\nLwM2M 的初始版本包含以下功能：\n\n*   基于对象的资源模型\n*   资源操作：创建、检索、更新、删除和配置\n\
  *   资源观察与通知\n*   数据序列化格式：TLV、JSON、纯文本和 Opaque\n*   UDP 和 SMS 传输\n*   基于 DTLS 的安全性\n\
  *   队列模式（适用于休眠设备）\n*   核心 LwM2M 对象：LwM2M 安全、LwM2M 服务器、访问控制、设备、连接监控、固件更新、位置、连接统计\n\
  \n### LwM2M v1.1（2018 年 6 月）\n\nLwM2M 在 v1.0 基础上增加了多项功能：\n\n*   改进的引导程序，支持增量升级\n\
  *   增强对公钥基础设施（PKI）部署的支持\n*   增强的注册序列机制\n*   支持基于 TCP/TLS 的 LwM2M，以更好地支持防火墙和 NAT\n\
  *   支持基于 OSCORE 的应用层安全\n*   改进对低功耗广域网的支持，特别是 3GPP CIoT 和 LoRaWAN\n*   支持使用基于 CBOR\
  \ 序列化的 SenML 格式的 JSON\n*   新增数据类型\n\n### LwM2M v1.2（2020 年 11 月）\n\nLwM2M 在强制性功能层面与\
  \ v1.0 和 v1.1 向后兼容。它引入了以下新功能：\n\n*   支持 MQTT 和 HTTP 作为传输协议。\n*   优化的引导、注册和信息接口。\n\
  *   支持 LwM2M 网关，允许集成和管理非 LwM2M 设备。\n*   基于 CBOR 的新型优化序列化格式：LwM2M CBOR。\n*   增强的固件更新功能。\n\
  *   定义新的通知属性（边缘、可确认通知和最大历史队列）。\n*   现在支持 TLS 和 DTLS v1.3。\n\n## LwM2M 协议栈\n\nLwM2M\
  \ 协议栈因版本而异。这里我将重点介绍 1.2 版本的协议栈，因为它最为全面。\n\n![](img/524096_1_En_3_Fig1_HTML.jpg)\n\
  \n图示包括应用层、对象、LwM2M、HTTP、MQTT、CoAP、OSCORE、TLS、TCP、DTLS、UDP、SMS、CIoT、设备及智能卡上的 SMS、UDP、LoRa\
  \ 和 CIoT。\n\n图 3-1\nLwM2M 1.2 协议栈（来源：OMA SpecWorks）\n\n在 1.2 版本之前，LwM2M 系统性地依赖 CoAP\
  \ 作为其传输协议。然而，LwM2M 始终支持选择底层传输协议来运行 CoAP。最初，可选范围仅限于 UDP 和蜂窝网络上的*短消息服务*（SMS）。在 1.1\
  \ 版本中增加了对 TCP 的支持，以提供与防火墙更好的集成，并支持 NAT 穿越场景。1.1 版本还引入了 CoAP 在非 IP 协议上的选项，即来自*第三代合作伙伴计划*（3GPP）的*蜂窝物联网*（CIoT）和\
  \ *LoRaWAN*。开发者可以在 LwM2M 1.1 及更高版本中利用 OSCORE 安全模型，而无需考虑所选的底层传输协议。\n\n1.2 版本将 LwM2M\
  \ 与 CoAP 解耦，引入了 HTTP 和 MQTT 作为替代传输协议。在所有版本中，安全性均基于 DTLS 或 TLS，具体取决于所使用的传输协议。\n\n\
  ## Eclipse Leshan\n\nEclipse Leshan 项目提供了 Java 库，您可以使用这些库构建自己的 LwM2M 客户端和服务器，或为现有平台添加\
  \ LwM2M 支持。该项目自 2014 年就已存在，并使用 Eclipse Californium 作为其 CoAP 实现。Leshan 在 [Eclipse\
  \ 公共许可证 v2.0](https://www.eclipse.org/legal/epl-2.0/) 和 [Eclipse 分发许可证 v1.0](https://www.eclipse.org/org/documents/edl-v10.php)（BSD）下提供。\n\
  \nLeshan 的官方网络资源如下：\n\n*   **网站：**[`https://eclipse.org/leshan`](https://eclipse.org/leshan)\n\
  *   **Eclipse 项目页面：**[`https://projects.eclipse.org/projects/iot.leshan`](https://projects.eclipse.org/projects/iot.leshan)\n\
  *   **代码仓库：**[`https://github.com/eclipse/leshan`](https://github.com/eclipse/leshan)\n\
  *   **维基：**[`https://github.com/eclipse/leshan/wiki`](https://github.com/eclipse/leshan/wiki)\n\
  \nLeshan 项目团队还维护着一个演示客户端、服务器和引导服务器。这些是使用 Leshan API 的宝贵示例，也可用于故障排除或测试目的。\n\n在撰写本文时，Leshan\
  \ 有两个主要版本正在积极维护中：\n\n*   **版本 1.x。** 该系列实现了 LwM2M 规范 v1.0.2。\n*   **版本 2.x。** 该系列实现了\
  \ LwM2M 规范 v1.1.1。\n\nLeshan 维基描述了每个版本支持哪些 LwM2M 功能。\n\n### 沙盒服务器\n\nLeshan 项目团队维护着一对公开可用的服务器，您可以使用它们进行演示和测试。这些服务器始终运行来自\
  \ `master` 分支的最新成功构建。\n\n*   **LwM2M 服务器：**[`https://leshan.eclipseprojects.io/`](https://leshan.eclipseprojects.io/)。`coap`\
  \ 使用端口 `5683`，`coaps` 使用端口 `5684`。\n*   **引导服务器：**[`https://leshan.eclipseprojects.io/bs/`](https://leshan.eclipseprojects.io/bs/)。`coap`\
  \ 使用端口 `5783`，`coaps` 使用端口 `5784`。\n\n如果您更倾向于使用 C 语言而非 Java 来构建 LwM2M 解决方案，[Eclipse\
  \ Wakaama](https://www.eclipse.org/wakaama/) 是一个 LwM2M 的 C 语言实现，旨在可移植到符合 POSIX 标准的系统上。\n\
  \n\n\n### 快速试用\n\n试用 Leshan 最简单的方法是在本地机器上运行演示客户端和服务器实例。为此，你只需要在路径中配置好 JDK；Leshan\
  \ 要求 Java 8 或更高版本。\n\n要在 Linux 上下载并启动最新版本的 Leshan 演示服务器二进制文件，只需运行以下两条命令：\n\n```\n\
  wget https://ci.eclipse.org/leshan/job/leshan/lastSuccessfulBuild/artifact/leshan-server-demo.jar\n\
  java -jar ./leshan-server-demo.jar\n```\n\n这将以默认模式启动服务器；它将监听所有可用的 IPv4 和 IPv6 接口，分别处理端口\
  \ `5683` 和 `5684` 上的 `coap` 和 `coaps` 流量。\n\n要在 Linux 上下载并启动客户端，请在另一个命令提示符下执行以下命令：\n\
  \n```\nwget https://ci.eclipse.org/leshan/job/leshan/lastSuccessfulBuild/artifact/leshan-client-demo.jar\n\
  java -jar ./leshan-client-demo.jar\n```\n\n完成后，你可以通过浏览器访问 `http://localhost:8080`\
  \ 来打开服务器的图形界面。你应该会看到一个如图 3-2 所示的页面。\n\n![](img/524096_1_En_3_Fig2_HTML.jpg)\n\n\
