    ```

    unzip zephyr-sdk-0.14.2_windows-x86_64.zip

    ```


    There are only two places where you should unpack the SDK:


    *   `%HOMEPATH%`


    *   `%PROGRAMFILES%`


    You are now ready to run the SDK’s setup script:


    ```

    cd zephyr-sdk-0.14.2

    setup.cmd

    ```


