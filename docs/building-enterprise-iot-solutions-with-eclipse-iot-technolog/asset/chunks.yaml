- fmt: '### Simple Server: The Code


    I will now explore the most important portions of the `cf-helloworld-server` code
    with you. For simplicity, the authors kept everything in a single class named
    `HelloWorldServer`, which extends Californium’s `CoapServer` class. This class
    contains the `main` method used to initialize and start the server. Here is the
    core of that method:


    ```

    try {

    // create server

    boolean udp = true;

    boolean tcp = false;

    int port = Configuration.getStandard().get(CoapConfig.COAP_PORT);

    ...

    HelloWorldServer server = new HelloWorldServer();

    // add endpoints on all IP addresses

    server.addEndpoints(udp, tcp, port);

    server.start();

    } catch (SocketException e) {

    System.err.println("Failed to initialize server: " + e.getMessage());

    }

    ```


    The constructor for the `HelloWorldServer` class simply instantiates the CoAP
    resources that the server exposes. You can see it in the following:


    ```

    public HelloWorldServer() throws SocketException {

    // provide an instance of a Hello-World resource

    add(new HelloWorldResource());

    ...

    }

    ```


    `HelloWorldResource` just handles GET requests, as you can see in the next snippet.
    You would need to override additional methods to handle POST, PUT, and DELETE
    requests. The base `CoapResource` class provides default implementations returning
    response code `4.05 (Method Not Allowed)`.


    ```

    static class HelloWorldResource extends CoapResource {

    public HelloWorldResource() {

    // set resource identifier

    super("helloWorld");

    // set display name

    getAttributes().setTitle("Hello-World Resource");

    }

    @Override

    public void handleGET(CoapExchange exchange) {

    // respond to the request

    exchange.respond("Hello World!");

    }

    }

    ```


    Finally, the `addEndpoints` method is where `CoapEndpoint` instances are created
    for each of the network interfaces available on the device. The whole interaction
    relies on the well-known builder pattern. In this case, the builder is a static
    nested class defined in `CoapEndpoint`. The method can also instantiate TCP endpoints
    if needed. Here is the code for `addEndpoints`:


    ```

    private void addEndpoints(boolean udp, boolean tcp, int port) {

    Configuration config = Configuration.getStandard();

    for (InetAddress addr : NetworkInterfacesUtil.getNetworkInterfaces()) {

    InetSocketAddress bindToAddress = new InetSocketAddress(addr, port);

    if (udp) {

    CoapEndpoint.Builder builder = new CoapEndpoint.Builder();

    builder.setInetSocketAddress(bindToAddress);

    builder.setConfiguration(config);

    addEndpoint(builder.build());

    }

    if (tcp) {

    TcpServerConnector connector = new TcpServerConnector(bindToAddress, config);

    CoapEndpoint.Builder builder = new CoapEndpoint.Builder();

    builder.setConnector(connector);

    builder.setConfiguration(config);

    addEndpoint(builder.build());

    }

    }

    }

    ```


    ### About DTLS


    The examples I presented up to now use plain CoAP. Fortunately, the Californium
    team also built a DTLS demo [client](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-secure/src/main/java/org/eclipse/californium/examples/SecureClient.java)
    and [server](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-secure/src/main/java/org/eclipse/californium/examples/SecureServer.java).
    Looking at the core of the code for the client, you will see that the main difference
    for sending a GET is the use of `DTLSConnector` instead of `UDPConnector`.


    ```

    public class SecureClient {

    ...

    private final DTLSConnector dtlsConnector;

    private final Configuration configuration;

    public SecureClient(DTLSConnector dtlsConnector, Configuration configuration)
    {

    this.dtlsConnector = dtlsConnector;

    this.configuration = configuration;

    }

    public void test() {

    CoapResponse response = null;

    try {

    URI uri = new URI(SERVER_URI);

    CoapClient client = new CoapClient(uri);

    CoapEndpoint.Builder builder = new CoapEndpoint.Builder().setConfiguration(configuration)

    .setConnector(dtlsConnector);

    client.setEndpoint(builder.build());

    response = client.get();

    client.shutdown();

    } catch (URISyntaxException e) {

    System.err.println("Invalid URI: " + e.getMessage());

    System.exit(-1);

    } catch (ConnectorException | IOException e) {

    System.err.println("Error occurred while sending request: " + e);

    System.exit(-1);

    }

    }

    }

    ```


    The `DTLSConnector` instance is initialized in the `main` method of the `SecureClient`
    class. You can see the relevant code as follows:


    ```

    DtlsConnectorConfig.Builder builder = DtlsConnectorConfig.builder(configuration);

    CredentialsUtil.setupCid(args, builder);

    ...

    CredentialsUtil.setupCredentials(builder, CredentialsUtil.CLIENT_NAME, modes);

    DTLSConnector dtlsConnector = new DTLSConnector(builder.build());

    SecureClient client = new SecureClient(dtlsConnector, configuration);

    client.test();

    ```


    The authors of this demo regrouped logic to handle the security credentials, whether
    keys or certificates, in the `CredentialsUtil` class. This class, in turn, relies
    on the resources found in the `demo-certs` subfolder of the Californium repository.
    The `README` in that folder discusses how the demo keys and certificates are structured
    and how to leverage the `create-keystores.sh` script to create your credentials.
    This script relies on the key and certificate management tools provided by your
    installed Java Development Kit (JDK).'
