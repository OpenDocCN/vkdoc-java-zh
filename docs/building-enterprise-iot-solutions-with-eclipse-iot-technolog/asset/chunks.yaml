    该架构图由以下层组成：应用层、CoAP 请求或响应、CoAP 消息、UDP 加 DTLS、IPv4 或 IPv6、6LoWPAN、以太网 Wi-Fi、BLE
    WPAN 以及物理信道。


    图 2-1


    CoAP 协议栈


    在传统有线（以太网）和无线（Wi-Fi）网络上，CoAP 同时支持 IPv4 和 IPv6。然而，在 IPv6 之上使用 CoAP 更为简便，因为所有设备都是直接可路由的；在*网络地址转换*（NAT）代理后面使用
    IPv4 总是更复杂。无论使用哪种 IP 版本，对于协议栈的其他层来说都无关紧要，并且除了 URI 的格式之外，在你编写的代码中也不会产生差异。


