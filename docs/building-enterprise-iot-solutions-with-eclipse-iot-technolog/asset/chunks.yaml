- fmt: '### Publishing


    Publishing with the zenoh Python API is as simple as calling the `put` method
    of a session instance. However, it is often preferable to declare the key expression
    and the publication before calling `put`. When you declare the key expression,
    zenoh will assign an integer ID to it and will use that ID in the publication
    messages. This saves bandwidth and improves throughput. Moreover, declaring the
    publication will ensure the node will not send messages if there are no matching
    subscribers currently online. This reduces bandwidth usage. The [publication example
    program](https://github.com/eclipse-zenoh/zenoh-python/blob/master/examples/z_pub.py)
    shows how to leverage key expression and publication declarations. I reproduced
    its core logic:


    ```

    # initiate logging

    zenoh.init_logger()

    print("Openning session...")

    session = zenoh.open(conf)

    print("Declaring key expression ''{}''...".format(key), end='''')

    rid = session.declare_expr(key)

    print(" => RId {}".format(rid))

    print("Declaring publication on ''{}''...".format(rid))

    session.declare_publication(rid)

    for idx in itertools.count() if args.iter is None else range(args.iter):

    time.sleep(1)

    buf = "[{:4d}] {}".format(idx, value)

    print("Putting Data (''{}'': ''{}'')...".format(rid, buf))

    session.put(rid, bytes(buf, encoding=''utf8''))

    session.undeclare_publication(rid)

    session.undeclare_expr(rid)

    session.close()

    ```


    The program publishes a value every second in a loop by calling the `put` primitive
    method of the session object. The value is held in a string variable and written
    as UTF-8 bytes.


    ## zenoh on Constrained Devices


    While zenoh is lightweight as IoT protocols go, supporting its full feature set
    on extremely constrained devices is impossible. Consequently, the zenoh team created
    the [zenoh-pico library](https://github.com/eclipse-zenoh/zenoh-pico), a lightweight
    C implementation of the zenoh client API. Zenoh-pico is well suited for deployment
    on devices running real-time operating systems.


    ### Installation


    You can download zenoh-pico binaries in DEB, RPM, and tgz format from the [Eclipse
    Foundation’s downloads website](https://download.eclipse.org/zenoh/zenoh-pico/)^([^(35)](#fn35))
    if you run Linux. It is also possible to build the library from the source by
    cloning the repository. At the time of writing, zenoh-pico did not support Windows.
    All you need to do on supported platforms is execute `make` and `make install`
    (`sudo make install` on Linux) from the appropriate folder.


    ### Zephyr Development Environment


    To work with zenoh-pico on the Zephyr RTOS, the zenoh team recommends leveraging
    the [PlatformIO platform](https://platformio.org/). If you have it installed,
    you can execute the following commands to create the structure of your project:


    ```

    mkdir -p /path/to/project_dir

    $ cd /path/to/project_dir

    $ platformio init -b reel_board

    $ platformio run

    ```


    You should, of course, substitute the identifier of your board of choice as the
    value passed to the `-b` switch. The zenoh team tested zenoh-pico with [the following
    hardware](https://github.com/eclipse-zenoh/zenoh-pico/tree/master/docs/zephyr):
    nRF52840 (such as the Adafruit Feather nRF52840), STM32 Nucleo-144 (Nucleo-F767ZI
    MCU), and Reel Board. Other boards will likely work, but you will need to tweak
    the configuration files provided by the zenoh team.


    I will now show you how to proceed with the Reel Board. After installing PlatformIO
    and creating the project’s structure, you will need to execute the following commands:


    ```

    cp /path/to/zenoh-pico/docs/zephyr/reel_board/CMakelists.txt /path/to/project_dir/zephyr/

    $ cp /path/to/zenoh-pico/docs/zephyr/reel_board/prj.conf /path/to/project_dir/zephyr/

    $ ln -s /path/to/zenoh-pico /path/to/project_dir/lib/zenoh-pico

    ```


    Once this is done, your PlatformIO project should have the following structure
    on disk:


    ```

    project_dir

    ├── include

    ├── src

    │    └── main.c

    ├── zephyr

    │    ├── prj.conf

    │    └── CMakeLists.txt

    └── platformio.ini

    ```


    You can then add your code directly to the `main.c` file or create additional
    files in the `src` folder as needed. To deploy the application once it is ready,
    just issue these two commands:


    ```

    platformio run

    platformio run -t upload

    ```


    The easiest way to test such a program in your local environment is, of course,
    to have a zenoh router running.


    ### Subscribing


    The zenoh API is remarkably consistent across implementations. The following is
    a simplified [zenoh-pico code to declare a subscription](https://github.com/eclipse-zenoh/zenoh-pico/blob/master/examples/net/zn_sub.c).
    I cut some declarations and removed part of the error handling code to keep the
    snippet short.


    ```

    void data_handler(const zn_sample_t *sample, const void *arg)

    {

    (void)(arg); // Unused argument

    printf(">> [Subscription listener] Received (%.*s, %.*s)\n",

    (int)sample->key.len, sample->key.val,

    (int)sample->value.len, sample->value.val);

    }

    ...

    int main(int argc, char **argv)

    {

    zn_session_t *s = zn_open(config);

    znp_start_read_task(s);

    znp_start_lease_task(s);

    zn_subscriber_t *sub = zn_declare_subscriber(s, zn_rname(uri), zn_subinfo_default(),
    data_handler, NULL);

    ... // Some kind of loop here

    zn_undeclare_subscriber(sub);

    znp_stop_read_task(s);

    znp_stop_lease_task(s);

    zn_close(s);

    return 0;

    }

    ```


    As you can see, the general structure is similar to the Python sample I covered
    earlier. There is a callback declaration at the top of the file, which is referenced
    in the call to the `zn_declare_subscriber` function.


    ### Publishing


    Publishing in zenoh-pico follows the same general logic as with the other implementations
    of the zenoh API. You need to declare the publication with `zn_declare_resource`
    and then publish values by calling `zn_write`. I reproduced the most interesting
    part of the `main` function of the [zenoh-pico publishing example](https://github.com/eclipse-zenoh/zenoh-pico/blob/master/examples/net/zn_pub.c):


    ```

    zn_session_t *s = zn_open(config);

    if (s == 0)

    {

    printf("Unable to open session!\n");

    exit(-1);

    }

    // Start the receive and the session lease loop for zenoh-pico

    znp_start_read_task(s);

    znp_start_lease_task(s);

    printf("Declaring Resource ''%s''", uri);

    unsigned long rid = zn_declare_resource(s, zn_rname(uri));

    printf(" => RId %lu\n", rid);

    zn_reskey_t reskey = zn_rid(rid);

    char buf[256];

    for (int idx = 0; idx < 5; ++idx)

    {

    sleep(1);

    sprintf(buf, "[%4d] %s", idx, value);

    printf("Writing Data (''%lu'': ''%s'')...\n", rid, buf);

    zn_write(s, reskey, (const uint8_t *)buf, strlen(buf));

    }

    znp_stop_read_task(s);

    znp_stop_lease_task(s);

    zn_close(s);

    return 0;

    ```


    As with the Python version, the program is looping and will publish one value
    per second.


