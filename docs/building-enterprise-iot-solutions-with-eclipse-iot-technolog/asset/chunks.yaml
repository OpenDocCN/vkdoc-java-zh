    *   **put:** Publishes a value for a key expression.


    *   **subscribe:** Declares a subscriber. You need to pass a reference to a callback
    triggered upon data reception.


    There are also a few operations not focused on data itself. The most used of those
    operations are as follows:


    *   **close:** Closes a zenoh session.


    *   **open:** Opens a zenoh session.


    *   **queryable:** Declares a distributed computation that will be triggered when
    a query is made. You need to pass a reference to a callback.


    *   **scout:** Searches for zenoh nodes on the local network. The type of nodes
    returned (clients, peers, routers) is specified through a bitmask.


    Please remember that the actual names of the operations may vary, depending on
    the specific zenoh language binding you are using.'
  trans: '

    ### 核心抽象概念


    键/值范式是 zenoh 的核心。现在我将解释其实现方式，并描述一些相关的抽象概念。


    Zenoh 的*键*构建方式类似于类 Unix 操作系统上的文件系统路径，可与 MQTT 主题相类比。它们是层级结构的字符串，层级之间由正斜杠字符（“`/`”）分隔。以下是几个
    zenoh 键的示例：


    ```

    /museums/Louvre/floors/1/rooms/101/sensors/temperature

    /museums/Louvre/floors/2/rooms/202/sensors/humidity

    ```


    上述键指向特定的*资源*；在 zenoh 术语中，它们也被称为*命名数据*项。可以构建涉及一组键的表达式。这种*键表达式*可以包含通配符。单个星号（“`*`”）是单级通配符，而双星号（“`**`”）是多级通配符。例如，以下键表达式可用于订阅
    101 房间的所有传感器：


    ```

    /museums/Louvre/floors/1/rooms/101/sensors/*

    ```


    另一个表达式可以返回所有温度传感器的数据，无论其位置如何：


    ```

    /museums/Louvre/**/temperature

    ```


    您将在以下场景中使用键表达式：


    *   订阅数据

    *   创建存储实例

    *   注册分布式计算（eval）


    zenoh 还拥有*选择器*。这些是标识一组资源的键表达式。zenoh 文档描述了选择器的结构，如下所示：


    ```

    /s1/s2/.../sn?x>1&y<2&...&z=4(p1=v1;p2=v2;...;pn=vn)[#a;b;x;y;...;z]

    |           | |             | |                   |  |            |

    |-- expr ---| |--- filter --| |---- properties ---|  |--fragment -|

    ```


    现在让我们看看选择器结构的每个组成部分。请记住，路径表达式之后的每个部分都是可选的。


    *   **expr（表达式）：** 一个标准的 zenoh 键表达式。

    *   **filter（过滤器）：** 由与号（“`&`”）分隔的谓词列表。过滤器将应用于匹配路径表达式的值。每个谓词的形式为“字段-运算符-字段值”。支持的运算符有
    `<`、`>`、`<=`、`>=`、`=` 和 `!=`。

    *   **properties（属性）：** 一个字符串，表示由分号分隔的键/值对。

    *   **fragment（片段）：** 一个字段名称列表，允许返回每个值的子集。仅当使用诸如 JSON 或 XML 等自描述编码时，此功能才有效。


    在撰写本文时，zenoh 团队已记录但尚未实现过滤器和片段。在实际应用中，选择器可能如下所示：


    ```

    /museums/**/sensors/temperature?celcius>23.5

    ```


    您将使用选择器来运行分布式查询。


    分布式查询的结果可以包含从存储实例获取的值，或由计算（eval）产生的值，前提是创建它们时使用的键路径与所使用的选择器匹配。因此，在 zenoh 文档中，存储和
    eval 有时被描述为*可查询对象*。


    与 MQTT 类似，zenoh 值作为字节流传输。值不像 DDS 中的样本那样具有强类型。然而，zenoh 值包含一个字段，用于指定用作 MIME 类型的编码。可以使用任何编码，但
    zenoh 为某些编码提供了额外支持，这些编码可以由 zenoh 库本身进行序列化和反序列化。受益于此额外支持的编码包括：


    *   **application/octet-stream：** 该值是一个字节流。

    *   **text/plain; charset=utf-8：** 该值是一个 UTF-8 字符串。

    *   **application/json：** 该值是一个 JSON 字符串。

    *   **application/properties：** 该值是一个字符串，表示由分号分隔的键/值对列表（例如，“id=002;squad=13...”）。

    *   **application/integer：** 该值是一个整数。

    *   **application/float：** 该值是一个浮点数。


    所有 zenoh 值都会由接收它的第一个路由器打上时间戳。该时间戳由[混合逻辑时钟](https://zenoh.io/docs/apis/rust)^(²⁷)生成。它是一个
    64 位的值，结构类似于 NTP 时间戳，尽管它基于 UTC 时间 1970 年 1 月 1 日的 UNIX 纪元。它还包含路由器的 UUID。鉴于生成它们所使用的方法，zenoh
    时间戳是唯一的。换句话说，zenoh 系统中存在的每个值都拥有一个唯一的时间戳。这意味着您可以使用时间戳在系统中的任何位置对值进行排序，而无需利用共识算法。


    在无路由器拓扑中，对等节点可以自行生成时间戳。在这种情况下，它们将使用自己的混合逻辑时钟。要激活此行为，您只需在节点的 JSON5 配置文件中添加以下设置：


    ```

    add_timestamp:true

    ```


    ### 基本操作


    zenoh API 很简单。数据操作只涉及少数几个操作。主要操作如下：


    *   **get：** 执行分布式查询。

    *   **pull：** 为订阅拉取数据。此机制对于实现*拉取订阅者*非常有用，即那些仅部分时间处于唤醒或连接状态的订阅者。

    *   **put：** 为键表达式发布一个值。

    *   **subscribe：** 声明一个订阅者。您需要传递一个回调函数的引用，该函数在接收到数据时被触发。


    还有一些操作不专注于数据本身。其中最常用的操作如下：


    *   **close：** 关闭一个 zenoh 会话。

    *   **open：** 打开一个 zenoh 会话。

    *   **queryable：** 声明一个分布式计算，当发起查询时该计算将被触发。您需要传递一个回调函数的引用。

    *   **scout：** 在本地网络上搜索 zenoh 节点。返回的节点类型（客户端、对等节点、路由器）通过一个位掩码指定。


    请记住，操作的实际名称可能因您使用的特定 zenoh 语言绑定而异。

    '
- fmt: '# Deployment Units


    When deploying zenoh infrastructure, you can mix and match different topologies
    according to your requirements. This level of flexibility is made possible by
    the specific features of zenoh node types.


    There are three types of nodes in zenoh. Those types are as follows:


    - **Client:** A node connected to one and only one peer or router. In zenoh, clients
    are often extremely constrained devices running [zenoh-pico](https://github.com/eclipse-zenoh/zenoh-pico),
    a lightweight version of the protocol. `Zenoh-pico` can connect in client or peer-to-peer
    mode but cannot participate in mesh topologies.


    - **Peer:** A node supporting peer-to-peer communication. Zenoh peers can route
    data on behalf of other peers. Moreover, zenoh clients can connect to a peer to
    communicate with the rest of the system.


    - **Router:** A node able to route zenoh traffic between clients and peers, independently
    of the topology. Routers are especially useful in multisite deployments since
    they can connect over the public Internet without the need for complex networking
    setups. Zenoh routers also provide specific features through plugins, such as
    distributed storage instances. I will describe router plugins in the next section.


    Figure [7-2](#524096_1_En_7_Chapter.xhtml#Fig2) illustrates a few of the ways
    zenoh peer and router nodes can be deployed together. Mesh topologies, where peers
    connect directly and nonhierarchically to several other nodes, are supported.
    Cliques are simply a mesh where the nodes form a complete graph, in other words,
    a mesh where every node is connected directly with all others. Finally, peers
    can connect to one or several routers.


    ![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig2_HTML.jpg)


    Three topologies. 1\. Mesh, with a connection of 5 peers. 2\. Clique, with a connection
    of 4 peers. 3\. Routed. 5 peers connected to a router.


    Figure 7-2


    A few zenoh topologies


    Zenoh client nodes can connect to peers or routers. Zenoh peers can connect to
    other peers, routers, or both. This allows you to arrange nodes to meet your nonfunctional
    requirements. For example, deploying a mesh of peers in a specific location can
    remove the threat of a single point of failure in the infrastructure. Similarly,
    deploying redundant routers over distinct network connections can make multisite
    communications more resilient while enabling better system scaling. Figure [7-3](#524096_1_En_7_Chapter.xhtml#Fig3)
    illustrates various potential topologies leveraging each of the three node types.


    ![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig3_HTML.jpg)


    A network consists of 4 routers. The first router connects to 3 clients and a
    peer. Second router, 3 clients. Third router, 2 peers. Fourth router, 1 client,
    and a peer.


    Figure 7-3


    Sample zenoh deployment


    One important detail about zenoh client and peer nodes is that their type does
    not constrain the operations they support. They can publish, subscribe, or both,
    depending on your requirements.


    ## Device Discovery


    Like DDS, zenoh implements powerful auto-discovery mechanisms. However, to keep
    the protocol efficient, its creators deliberately made efforts to minimize discovery
    traffic. Of course, the first step was optimizing the size of the discovery messages.
    They did not stop there, however. Zenoh only advertises resource interests, not
    specific publishers. Furthermore, such resource interests are generalized by the
    protocol itself; this means that if a device publishes data for values such as
    `/T800/sensors/lidar`, `/T800/sensors/camera`, and `/T800/position/latitude`,
    zenoh may decide to advertise the device under `/T800/**`. Finally, the reliability
    features of zenoh operate at the level of the nodes (or runtimes), not at the
    level of individual readers or writers like in DDS.


    Overall, the generalization of resource interests in zenoh streamlines the discovery
    process and makes it possible for the protocol to support Internet-scale applications.
    All routing and matching leverage set-theoretic operations and set-coverage. This
    is useful, for example, to figure out the minimal set of storages that can answer
    a specific query. Zenoh performs resource generalization automatically, but you
    can use an API to provide hints to the infrastructure as needed.


    ## Example: Robots at the Factory


    Let’s now illustrate what a real-world zenoh deployment would look like. Imagine
    your organization manages several factories on both sides of the Atlantic. Some
    are in Canada, and the others are in France. The factories are equipped with a
    video surveillance system and have autonomous robots working inside. A few router
    nodes provide the backbone of this system. Figure [7-4](#524096_1_En_7_Chapter.xhtml#Fig4)
    provides a simplified view of the system.


    ![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig4_HTML.jpg)


    A network depicts the zenoh deployment. It consists of seven publishers, four
    subscribers, two storages, nine peers, five routers, and seven clients.


    Figure 7-4


    A tale of two zenoh robot fleets^([^(28)](#fn28))


    The system designers decided to use `/fleet` as a prefix for all robot-related
    keys and `/camera` for all the video surveillance cameras. The second level of
    the key structure expresses the country of deployment, with the values `CA` for
    Canada and `FR` for France. In this system, robots are defined as peer nodes.
    Robots are not necessarily connected to every other one.


    The robots constantly update their position by publishing to a sub-key named `pointcloud`.
    A level of the key also contains the robot’s numerical ID, which is unique in
    the scope of the fleet. You can see two examples of the full key for that publication:


    ```

    /fleet/CA/robot/1867/pointcloud

    /fleet/FR/robot/1789/pointcloud

    ```


    The robots contain two different computers: one is a generic single-board computer
    hosting applications, and the other a specialized board acting as the robot’s
    control module. The control module is programmable and equipped with numerous
    I/O interfaces, enabling it to receive raw sensor data and control the robots’
    actuators. In this example, the `pointcloud` values are computed and published
    by an application running on the single-board computer. On the other hand, the
    control module is subscribing to commands sent by a central remote-control application
    on keys such as


    ```

    /fleet/CA/robot/1867/halt

    /fleet/FR/robot/1789/halt

    ```


    For example, this remote-control application could prevent *Judgment Day* by publishing
    the appropriate value to the selector to stop all robots on the spot:


    ```

    /fleet/*/robot/*/halt

    ```


    Two clients, one in Canada and the other in France, subscribe to everything the
    robots and cameras publish. Specifically, they subscribe to the following selectors:


    ```

    /fleet//robot/**

    /camera//*/image

    ```


    These analytics clients are connected to local routers; they aggregate position
    information for the robots and publish it under `/fleet/<country code>/position/*`.
    Two storages use the same key paths for their selectors. Consequently, a query
    made against `/fleet/*/position/*` would combine data from these two storages,
    which are attached to different routers than the analytics clients.'
