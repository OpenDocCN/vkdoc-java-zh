    此时，你可以使用客户端证书在代理上发布或订阅。务必使用代理的主机名，而不是其 IP 地址；你可能需要调整内部 DNS 服务器或在 `/etc/hosts`
    中添加条目等。


    例如，你可以像这样订阅：


