  trans: '

    ### Drogue IoT


    如果你是 Rust 编程语言的爱好者（即便不是，至少也该考虑一下），Drogue IoT 提供了为受限设备构建安全高效固件所需的一切。该项目由红帽创建；它并非
    Eclipse 基金会项目，但其多位贡献者在 Eclipse IoT 与 Edge 生态系统中扮演着重要角色。你可以在 [`www.drogue.io/`](http://www.drogue.io/)
    找到 Drogue IoT 网站。


    过去几年中，Rust 在 IoT 和嵌入式领域的应用持续增长。这在一定程度上归功于该语言的诸多安全特性。Rust 的类型系统能在编译时防止数据竞争，并执行静态检查。例如，可以利用这些静态检查来强制正确配置
    I/O 接口，并确保操作仅在正确配置的外设上执行。这些检查还能实现访问控制，确保只有程序的特定部分才能修改外设状态。此外，Rust 开发工具在所有主流操作系统上均可使用，能针对多种硬件平台，且不绑定任何特定项目或框架。开发者可以从
    [crates.​io](https://crates.io/)（相当于 Rust 版的 Maven Central）上发布的大量开源库中进行选择。不出所料，这些库被称为
    *crates*。


    使用 Rust 构建设备固件无需特定于供应商的 SDK 或 RTOS 专用工具。不过，Rust 嵌入式开发者社区已经标准化了一些概念。这些概念如下：


    *   **外设访问 crate (PAC)：** 允许访问芯片特定寄存器的库。静态检查确保开发者正确使用外设。


    *   **硬件抽象层 (HAL)：** 基于特定芯片的 PAC 构建的库，提供对 I²C、SPI 和 UART 等通用特性和总线的抽象。HAL 通常可跨芯片系列成员使用。


    *   **嵌入式 HAL：** 作为构建平台无关驱动基础的库。它们定义了接口，随后由 HAL 实现。


    Drogue IoT 有两个主要组件：Drogue Device 和 Drogue Cloud。Drogue Device 是一套用于构建 IoT 应用的库和驱动分发版。其底层依赖于
    [Embassy 项目](https://embassy.dev/)。Embassy 是一个异步编程框架，包含一个执行器和一个硬件访问层 (HAL)。执行器是一个调度器。它在启动时执行一组定义好的任务，尽管之后也可以添加更多任务。HAL
    提供了一个 API，封装了对 USART、UART、I²C、SPI、CAN 和 USB 等外设的访问。在合理的情况下，Embassy API 会同时提供同步和异步两种形式。Embassy
    是[实时中断驱动并发](https://rtic.rs/1/book/en/) (RTIC) 库的替代方案，后者是一个提供任务调度器和 RTOS 中常见的许多核心功能的运行时。


    异步 Rust 相比传统的同步方法有几个优势。首先，它能生成节能且资源高效的应用程序，因为异步任务可以通过触发中断来完成。其次，它简化了开发者的工作，无需在复杂场景（例如同时使用多个
    DMA 通道）中实现状态机。Rust 编译器会根据实现逻辑的“线性”Rust 异步代码生成状态机。最后，异步 Rust 任务可以通过一种称为 *futures*
    的结构受益于完美大小的栈，它代表“……由异步计算产生的单个最终值。”^(⁵⁹) 可以对 future 状态进行分段，并仅在需要时分配内存。这再次带来了更高效的代码。


    Embassy 是一个基于任务的框架。Drogue Device 编程模型支持这一点，并额外提供了一个 actor 框架。Actor 系统将状态隔离在狭窄的作用域内；actor
    代表了状态使用的边界。在 Drogue Device 中，actor 使得使用消息传递构建并发系统更加容易。每个 actor 拥有一个唯一的地址。Actor
    彼此解耦，并且一次只处理一条消息。具体来说，它们利用 Rust 的 async/await 原语来处理消息。因此，事件总是按顺序处理。


    Drogue Device 附带可选的板级支持包，为最常用的外设提供了样板代码。该项目还包括针对 Wi-Fi、LoRaWAN 和蓝牙 BLE 结合各种传感器的驱动、actor
    和示例。你也可以利用第三方驱动或自行编写。在撰写本文时，Drogue Device 可以在 Embassy 支持的任何硬件上运行。列表包括意法半导体的 STM32
    系列以及 Nordic Semiconductor 的 nRF52、nRF53 和 nRF91 系列。一个支持良好且功能齐全的板卡示例是 micro:bit
    版本 2。


    Drogue Device 是一个强大的框架，用于构建面向嵌入式及 IoT 受限设备的 Rust 应用。该语言提供了低占用运行时、内存安全性和线程安全性，考虑到目标用例，这是一个制胜组合。至于配套的
    Drogue Cloud 平台，它向设备暴露 HTTP、MQTT 和 CoAP 端点，并通过 Cloud Events 和 Knative 事件驱动执行协议标准化。Drogue
    Device 与 Drogue Cloud 之间的集成意味着 Drogue Cloud 可以提供有效的设备管理，包括凭证和配置属性。

    '
- fmt: '### Espressif IDF (ESP-IDF)


    The Espressif IoT Development Framework ([ESP-IDF](https://docs.espressif.com/projects/esp-idf/en/latest/esp32/get-started/index.html))
    is another great example of a bare metal framework for constrained devices. Out
    of the box, it supports several boards equipped with Espressif’s [ESP32 MCU](https://www.espressif.com/en/products/socs/esp32),
    which features Wi-Fi, Bluetooth, and two Xtensa LX6 32-bit processor cores. The
    framework is published under the Apache v2.0 license, and you can find the source
    code in this GitHub repository: [`https://github.com/espressif/esp-idf`](https://github.com/espressif/esp-idf).
    The documentation is available at [`https://docs.espressif.com/projects/esp-idf/en/latest/esp32/index.html`](https://docs.espressif.com/projects/esp-idf/en/latest/esp32/index.html).


    **Note**


    Xtensa processors are based on a 32-bit RISC architecture distinct from Arm and
    RISC-V. Given the ESP32''s popularity, one could surmise that Xtensa cores are
    among the most widely adopted alternatives to those two.


    ESP-IDF possesses a comprehensive feature set. There are built-in clients for
    HTTP and MQTT, and it is possible to instantiate HTTP and HTTPS servers. Legacy
    protocols such as Modbus are also supported. Since the ESP32 is an MCU, you can
    leverage several peripheral interfaces such as GPIO, I²C, SPI, and UART. The Storage
    API supports many device types, including SD cards and flash memory.


    One particularity of ESP-IDF is that it relies on a modified version of FreeRTOS
    as its scheduler. Espressif added support for symmetrical multiprocessing (SMP)
    to it since the ESP32 is a dual-core chip. Consequently, there are a few differences
    between plain FreeRTOS code and ESP-IDF code. Given all this, you could wonder
    if ESP-IDF is really a bare metal framework. I think it qualifies due to the tight
    integration between the components and the rich feature set.


    There are two ways to install the tooling provided by Espressif: through an IDE
    or manually. The team ships a plugin for the [desktop Eclipse IDE](https://docs.espressif.com/projects/esp-idf/en/latest/esp32/get-started/eclipse-setup.html)
    and a [Microsoft Visual Studio Code extension](https://docs.espressif.com/projects/esp-idf/en/latest/esp32/get-started/vscode-setup.html).
    You can use Linux, macOS, or Microsoft Windows as your operating system.


    ESP-IDF is, without a doubt, a powerful and flexible framework. Naturally, the
    fact it is tied to a specific CPU architecture limits its appeal, although the
    ESP32 is worth your consideration if you are in the market for a 32-bit MCU.


    ## Edge Nodes: The Realm of Linux


    Up to now, I have exclusively discussed operating systems in constrained devices.
    Time to have a look at the landscape for edge nodes, then. The 2021 edition of
    the Eclipse IoT and Edge Developer Survey found that Linux is the top choice for
    both gateways and edge servers, with Microsoft Windows in second place. This is
    no surprise. Linux’s modularity and extensive hardware support make it a strong
    choice for various workloads. Even offerings such as Microsoft’s Azure Sphere,
    a tightly integrated platform combining a secure MCU with a custom software stack,
    rely on the Linux kernel.


    In the same survey, we also asked respondents what workloads they are running
    at the edge and how they are packaging the edge services they deploy. The workloads
    are quite diversified; we will revisit them in the chapter focused on edge computing.
    As for service packaging, containers were the clear first choice. Such workloads
    are strongly correlated with the use of Linux.


    One point I did not cover yet is the use of Linux in constrained devices. After
    all, Linux is widespread in embedded systems, and it is possible to boot the kernel
    on any device sporting a suitable 32-bit processor and at least 4 megabytes of
    memory. Specifically, the processor core must be equipped with a hardware memory
    management unit (MMU). Plenty of systems on a chip (SOCs) fulfill those requirements
    and are suitable for embedded use. However, such SOCs consume much more power
    than most MCUs. Ultimately, whether Linux is suitable for use in constrained devices
    is highly dependent on how you define such devices in the first place.


    Of course, the standard Linux kernel is optimized for throughput; it cannot provide
    the kind of predictable latencies developers expect from an RTOS out of the box.
    However, activating specific pre-emption models in the mainline kernel tree allows
    high-priority tasks to pre-empt currently running processes. Moreover, the integration
    of the popular `PREEMPT_RT` patchset into the mainline is in progress. `PREEMPT_RT`
    makes the Linux kernel fully preemptible, and the runtime behavior is very close
    to a pure RTOS. That said, not all Linux device drivers are compatible, which
    can reduce its attractiveness to some.


    ## Getting Started with Zephyr


    The Zephyr team built its SDK to support the three main operating systems used
    by developers: Linux, macOS, and Windows. All the dependencies are cross-platform.
    However, you must pay attention to the minimum version numbers supported. Table
    [10-1](#524096_1_En_10_Chapter.xhtml#Tab1) lists the minimum version numbers for
    the three main dependencies of the SDK.


    **Table 10-1** Minimal supported versions for the main Zephyr SDK dependencies


    | Dependency | Minimal version |

    | --- | --- |

    | `CMake` | `3.20.0` |

    | `Python` | `3.6` |

    | Devicetree compiler | `1.4.6` |


    Getting a recent version of `CMake` is critical. On Ubuntu, you can rely on the
    APT repository made available by [Kitware](https://www.kitware.com/), the main
    contributor to the project. You can also download binary distributions from their
    website for other distributions or operating systems.'
