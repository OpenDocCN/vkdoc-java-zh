    \ const struct bt_mesh_comp comp = {\n.cid = BT_COMP_ID_LF,\n.elem = elements,\n\
    .elem_count = ARRAY_SIZE(elements),\n};\n```\n\n而 `elements` 又整合了另一个名为 `models`\
