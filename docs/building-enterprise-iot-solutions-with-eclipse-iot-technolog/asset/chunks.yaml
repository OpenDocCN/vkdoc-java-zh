- fmt: '# CoAP and Constrained Devices


    While `Californium` is a mature and fully featured CoAP implementation, it cannot
    be used on constrained devices unable to run high-level operating systems such
    as Linux or Windows. This is because RTOSes usually lack the required Java runtime.
    Fortunately, there are libraries available, and some RTOSes even ship with built-in
    support for CoAP.


    In the context of a constrained device, an important design question you will
    need to answer is whether the device should be a CoAP server or not. Running a
    server will consume more resources than occasionally sending requests as a client.
    If all you need to do is report sensor values, then running a server is probably
    overkill – especially for use cases where you need to maximize battery life. However,
    if the device needs to execute commands, exposing CoAP resources through a server
    could make sense. This is the approach chosen by LwM2M, for example.


    The [Zephyr RTOS](https://www.zephyrproject.org/) from the Linux Foundation [ships
    with a built-in CoAP library](https://docs.zephyrproject.org/latest/reference/networking/coap.html);
    the implementation covers block-wise transfers (RFC 7959) and observe (RFC 7641).
    Moreover, it supports both client and server roles. The Zephyr CoAP library is
    implemented using plain buffers and requires developers to manipulate sockets
    directly. As a reminder, Zephyr is implemented in C.


    The Zephyr repository on GitHub contains an extensive collection of samples, including
    a CoAP [client](https://github.com/zephyrproject-rtos/zephyr/blob/zephyr-v2.7.0/samples/net/sockets/coap_client/src/coap-client.c)
    and [server](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/net/sockets/coap_server/src/coap-server.c).
    Let’s now have a quick look at the client code to see what is involved when sending
    a GET to a remote server.


    First comes the socket declaration.


    ```c

    static int sock;

    ```


    The `start_coap_client` function is called by the `main` function to set up the
    socket. Please note that the sample assumes an IPv6 network.


    ```c

    static int start_coap_client(void)

    {

    int ret = 0;

    struct sockaddr_in6 addr6;

    addr6.sin6_family = AF_INET6;

    addr6.sin6_port = htons(PEER_PORT);

    addr6.sin6_scope_id = 0U;

    inet_pton(AF_INET6, CONFIG_NET_CONFIG_PEER_IPV6_ADDR,

    &addr6.sin6_addr);

    sock = socket(addr6.sin6_family, SOCK_DGRAM, IPPROTO_UDP);

    if (sock < 0) {

    LOG_ERR("Failed to create UDP socket %d", errno);

    return -errno;

    }

    ret = connect(sock, (struct sockaddr *)&addr6, sizeof(addr6));

    if (ret < 0) {

    LOG_ERR("Cannot connect to UDP remote : %d", errno);

    return -errno;

    }

    prepare_fds();

    return 0;

    }

    ```


    The actual code to send the request is located in the `send_simple_coap_request`
    function, reproduced in a simplified version:


    ```c

    static int send_simple_coap_request(uint8_t method)

    {

    uint8_t payload[] = "payload";

    struct coap_packet request;

    const char * const *p;

    uint8_t *data;

    int r;

    data = (uint8_t *)k_malloc(MAX_COAP_MSG_LEN);

    if (!data) {

    return -ENOMEM;

    }

    r = coap_packet_init(&request, data, MAX_COAP_MSG_LEN,

    COAP_VERSION_1, COAP_TYPE_CON,

    COAP_TOKEN_MAX_LEN, coap_next_token(),

    method, coap_next_id());

    if (r < 0) {

    LOG_ERR("Failed to init CoAP message");

    goto end;

    }

    for (p = test_path; p && *p; p++) {

    r = coap_packet_append_option(&request, COAP_OPTION_URI_PATH,

    *p, strlen(*p));

    if (r < 0) {

    LOG_ERR("Unable add option to request");

    goto end;

    }

    }

    ...

    net_hexdump("Request", request.data, request.offset);

    r = send(sock, request.data, request.offset, 0);

    end:

    k_free(data);

    return 0;

    }

    ```


    # LwM2M


    > *Nous avons besoin les uns des autres. L''être humain n''est pas fait pour s''isoler,
    mais pour partager.*

    >

    > *We need each other. Human beings are not made to isolate themselves, but to
    share.*

    >

    > —Alice Parizeau, *La charge des sangliers*


    Modern applications usually have numerous dependencies. As developers, you and
    I are standing on the shoulders of giants. Or rather, our own code stands on the
    top of the many libraries we use. Many of the technologies I cover in this book
    are built on previous advances. LwM2M, the focus of this chapter, is a great example
    of that.


    Historically, LwM2M exclusively used CoAP as a transport. While version 1.2 of
    LwM2M [added support for HTTP and MQTT transports](https://omaspecworks.org/lwm2m-v1-2-is-now-available/)
    at the end of 2020, CoAP is still the most prevalent one used. Therefore, my code
    examples will leverage [Eclipse Leshan](https://www.eclipse.org/leshan/), a framework
    to build LwM2M solutions that uses Californium as its CoAP implementation.


    ## LwM2M: Built on CoAP’s Foundation


    CoAP provides a solid foundation to build IoT solutions. In particular, the fact
    that message payloads are not defined by the various RFCs describing the protocol
    means that CoAP is very flexible. The same flexibility applies to resources; developers
    can structure them in any way they see fit. The consequence is that, out of the
    box, devices and software stacks that support CoAP are not interoperable. At a
    minimum, you will need to massage payloads and adjust some parameters to ensure
    that messages are sent to the right resource in the right format.


    The *Lightweight Machine-to-Machine* (LwM2M) protocol aims to solve this lack
    of interoperability by offering an extensible resource and data model. It is under
    the governance of [OMA SpecWorks](https://omaspecworks.org/), previously the Open
    Mobile Alliance (OMA), a nonprofit standards organization. Version 1.0 of the
    protocol was published in February 2017, and the latest version at the time of
    writing was version 1.2, published in November 2020.'
