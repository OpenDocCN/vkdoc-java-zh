- fmt: "# 11. Edge Computing\n\n> *L'extrême limite de la sagesse, voilà ce que le\
    \ public baptise folie.*\n> \n> *The extreme edge of wisdom is what the public\
    \ baptizes madness.*\n> \n> —Jean Cocteau, *L’insolence*\n\nThe “I” in IoT stands\
    \ for *Internet*. And in this context, Internet means *Network*. As I wrote earlier,\
    \ the focus on connectivity makes IoT devices different from embedded ones. IoT\
    \ devices need to transmit the data gathered by their sensors and act on the physical\
    \ world through actuators. They need a network to do that. But where is the data\
    \ going, and where are the commands coming from? The Internet? Certainly not.\
    \ Think about it. When you travel by car, your destination is not the road but\
    \ a location you can reach by the road. When you send data to the Internet, its\
    \ destination is not the Internet but the Cloud.\n\nWhen I write Cloud here, I\
    \ mean all its variations: public, hybrid, and private. All three offer on-demand\
    \ compute, storage, and networking resources in addition to software services.\
    \ What distinguishes them is their scale and location. The public Cloud is hosted\
    \ in data centers owned by third-party providers; their resources and services\
    \ are shared with multiple customers. Most public Cloud instances offer a scale\
    \ only the largest organizations could achieve. At the other end of the scale,\
    \ the private Cloud is hosted in your own facilities. What differentiates it from\
    \ traditional infrastructure is that the resources are made available in a Cloud-like\
    \ (“cloudish”?) way. Naturally, the scale of most private Cloud instances is much\
    \ smaller than for the typical public Cloud instances. As for hybrid Cloud, it\
    \ is simply a mix of the two approaches where workloads can be moved between private\
    \ and public infrastructure.\n\n> **Note**\n> \n> While the public Cloud offers\
    \ bountiful resources, those are not limitless. A partner of a company I worked\
    \ for in the past once exhausted all instances of a virtual machine type offered\
    \ by the market-leading public Cloud provider in a specific region. We are talking\
    \ about tens of thousands of virtual machines here. I am quite sure they will\
    \ recognize themselves if they ever read this.\n\nAt this point, you may be asking\
    \ yourself what this has to do with edge computing. You see, deploying resources\
    \ and services at the Edge means that you are operating outside the confines of\
    \ the Cloud and the corporate data center. In fact, from an operational standpoint,\
    \ the Edge and the Cloud are opposites. But before I elaborate on this, it would\
    \ be wise to define what I mean by edge computing.\n\n## What Is Edge Computing?\n\
    \nIn its simplest form, edge computing is a form of distributed computing that\
    \ brings compute, storage, and networking resources closer to the physical location\
    \ where the data is produced and commands are executed. However, the simple fact\
    \ of following such an architecture is not enough. You also need to build and\
    \ deploy *Edge Native* applications. Such applications have several characteristics\
    \ in common with Cloud Native applications:\n\n* They rely on microservices.\n\
    * They expose APIs, often in a RESTful way.\n* They are made of loosely coupled\
    \ services to avoid creating affinities and to enhance the resiliency of the application.\n\
    * They are built by teams leveraging a DevOps approach, with a focus on continuous\
    \ integration and continuous deployment (CI/CD).\n\nEdge Native applications are,\
    \ however, different from Cloud Native applications in a few ways. Let’s see what\
    \ makes the Edge and Cloud environments distinct to understand how.\n\n### Edge\
    \ vs. Cloud\n\nBy nature, the Cloud is an environment that relies on an on-demand\
    \ model delivered at scale. Public Clouds, in particular, offer staggering volumes\
    \ of compute, storage, and networking resources. Those resources are homogeneous\
    \ and correspond to predefined types. For example, all instances of a specific\
    \ virtual machine type will offer the same basic capabilities, which can sometimes\
    \ be expanded through configuration. While the resources can, in many cases, be\
    \ geographically distributed, they are systematically administered in a centralized\
    \ way.\n\nThe Edge environment is the opposite. Edge nodes are anywhere and everywhere.\
    \ In other words, the Edge is the place (any place, really) where distributed\
    \ computing intersects with the real world. Although edge nodes are often deployed\
    \ in large quantities, the compute, storage, and networking resources available\
    \ in any given location are limited. One could say that edge computing is the\
    \ deployment of locally limited resources at a large scale. Edge nodes are typically\
    \ heterogeneous given the operational constraints they need to face. Some must\
    \ be hardened against specific environmental threats, such as water ingress, temperature,\
    \ electromagnetic interference, or vibrations. Others are equipped with specialized\
    \ hardware supporting specific workloads, such as artificial intelligence (AI)\
    \ accelerators. Of course, most edge nodes need to keep power consumption in check\
    \ because they operate on battery power or need to keep heat dissipation under\
    \ control. The latter is often important since passively cooled designs are generally\
    \ more reliable but require components that consume less."
