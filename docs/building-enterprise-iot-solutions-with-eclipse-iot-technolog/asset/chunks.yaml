  trans: '

    ### Eclipse Streamsheets


    Eclipse Streamsheets 是一个提供基于服务器的电子表格的平台，用于消费、处理并生成实时数据流。该项目于 2020 年由德国初创公司 [Cedalo](https://cedalo.com/)
    贡献给 Eclipse 基金会，该公司同时也支持 Eclipse Mosquitto MQTT 代理的开发。Streamsheets 使用 JavaScript
    编写，运行在 Node.js 运行时上。其代码根据 Eclipse 公共许可证 2.0 版发布。


    Streamsheets 的官方网络资源如下：


    *   **网站：** [`https://docs.cedalo.com/Streamsheets/2.5/installation/`](https://docs.cedalo.com/streamsheets/2.5/installation/)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.Streamsheets`](https://projects.eclipse.org/projects/iot.streamsheets)


    *   **仓库：** [`https://github.com/eclipse/Streamsheets`](https://github.com/eclipse/streamsheets)


    Streamsheets 可以独立于数据源消费数据流。默认情况下，开源版本可以使用以下协议进行连接：MQTT、REST 和 SMTP/IPOP3（电子邮件）。Streamsheets
    还可以连接到 MongoDB 数据库和 Apache Kafka 实例。在 Cedalo 的商业支持版本中提供了更多选项。


    在 Streamsheets 中，数据流的处理、分析和可视化完全通过无代码电子表格（你猜对了，就叫 Streamsheets）完成。自然，你可以依赖一系列常见的电子表格公式来建模和格式化数据。每当有新消息到达时，电子表格会重新计算；你也可以按计划刷新它们。因此，电子表格中的条件和公式会被频繁重新评估，这意味着其中包含的可视化内容会实时更新。如果需要，可以暂停电子表格，使其冻结在特定时刻。


    虽然易于使用，但 Streamsheets 提供了全面的安全性。当底层协议支持时，它可以通过 TLS 连接到数据流，并定义了保护电子表格完整性的用户角色。拥有开发者角色的用户可以创建新的数据流和电子表格；拥有查看者角色的用户只能查看他人构建的内容。当然，还有一个拥有所有访问权限的管理员角色。


    Streamsheets 的用户界面模仿了流行的网络电子表格服务，桌面电子表格软件的用户也能轻松上手。图 13-5 展示了 Streamsheets 显示实时电子表格的用户界面。


    ![](img/524096_1_En_13_Fig5_HTML.jpg)


    一个风力涡轮机仪表盘的电子表格显示了传入的 MQTT 数据；功率；到达时间；一个包含间隔、能量产生和单位的更新表格；以及当前功率输出和总能量产生的图表。


    图 13-5


    Eclipse Streamsheets 用户界面


    #### Streamsheets 入门


    Streamsheets 以一组容器的形式提供，可以在任何支持 Docker 引擎的环境中运行。项目团队建议使用四核处理器和 4 GB 内存以获得可接受的性能。树莓派也有可用的容器镜像。最低要求是配备
    1 GB 内存和 4 GB 存储空间的 3B 型号；推荐配置是配备 2 GB 内存和至少 10 GB 存储空间的 4B 型号。你的树莓派需要运行 32 位操作系统。


    启动并运行这些容器很简单。首先，你需要执行 Cedalo 安装程序。在 Linux 上，执行以下命令：


    ```

    docker run -it -v ~/cedalo_platform:/cedalo cedalo/installer:2-linux

    ```


    在 macOS 上，命令如下：


    ```

    docker run -it -v ~/cedalo_platform:/cedalo cedalo/installer:2-macos

    ```


    最后，在 Windows 上的命令是：


    ```

    docker run -it -v C:\cedalo_platform:/cedalo cedalo/installer:2-win

    ```


    在这三种情况下，你都会看到类似这样的提示：


    ```

    ? Select what to install › - Space to select. Return to submit

    ◉   Management Center for Eclipse Mosquitto

    ◉   Eclipse Streamsheets

    ◉   Eclipse Mosquitto 2.0

    ◯   Eclipse Mosquitto 1.6

    ```


    至少，你应该安装 Mosquitto 2.0 和 Streamsheets。如果你希望为 Mosquitto 代理提供一个强大的图形界面，管理中心会很有用，但在资源受限的环境中，可以移除它。将光标移动到任何你不想安装的组件上，按空格键取消选择。当你准备好开始安装时，按回车键。


    几分钟后，容器镜像应该会出现在你的机器上。在后台，Cedalo 安装程序依赖于 Docker Compose。一旦命令提示符返回，你可以进入 `cedalo_platform`
    文件夹并执行启动脚本。在 Linux 和 macOS 上，你需要执行以下命令：


    ```

    cd ~/cedalo_platform

    sh start.sh

    ```


    在 Windows 上，命令则是：


    ```

    cd C:\cedalo_platform

    start.bat

    ```


    一旦容器运行起来，你就可以通过以下 URL 访问 Streamsheets：`http://localhost:8081`。默认凭据是用户名为 admin，密码为
    1234。你应该尽快更改密码。


    脚注 1   2

    '
- fmt: '# 14. Conclusion


    It is September 2022. A few weeks ago, I wrote the last words of the last chapter
    of this book. So many things have happened in technology since I started to write
    in November 2021. The cadence of innovation is relentless. There was never a better
    time to work in IT. Technology is now deeply embedded in our lives, and this trend
    will only grow over time.


    From a historical perspective, technological progress greatly improved our lives;
    machines made us more productive while reducing the time and effort required by
    various tasks. However, this increase in productivity came at a price: pollution.
    The mad race to extract and transform enough resources to sustain the increasing
    levels of industrial production needed to meet our ever-growing desires took a
    serious toll on our planet. Whatever lies ahead in the future, the days of perpetual
    economic growth are getting closer to an end `–` if they are not already over.


    In this context, natural resources and our own time will be increasingly scarce
    and valuable. IoT has the potential to alleviate this scarcity. Sensors and actuators
    embedded in connected everyday objects have the potential to optimize our use
    of resources and free up our time. Smart agriculture means we can use just the
    right amount of water and fertilizer to optimize the yield of our crops. Smart
    buildings can use machine learning to anticipate occupation patterns in offices
    or classrooms and modulate heating and cooling accordingly, resulting in significant
    energy savings. Industrial automation can make factories more efficient and prolong
    the life of key equipment through preventive maintenance and real-time monitoring.
    All this potential, however, will be for naught if we don’t address three acute
    issues: security, privacy, and short-sightedness.


    Security has been, for a long time, the Achilles heel of IoT. There are many reasons
    for that. One is that it is simply hard to get right, given the complexity of
    IoT solutions. Another is that some device and software makers are simply obsessed
    with cost; consequently, they will ship products without proper support or the
    infrastructure and processes required to update them. Another possible reason
    is a lack of awareness or even plain inertia. Personally, the most problematic
    reason is the lack of investment in open source projects that became critical
    infrastructure. Think about `OpenSSL` and `Log4j`. Both projects were underfunded
    and understaffed; it was only when widespread vulnerabilities hit them that the
    industry deigned to dedicate a sliver of its profits to support them. So my advice
    to you is this: invest in your product’s quality and future. Build value-driven
    rather than cost-driven solutions, and support the open source projects playing
    a central role in your infrastructure with money or development hours.


    Privacy is the second issue. Consumers and organizations expect their data to
    be used for their own benefit, not yours. Yet the IT industry’s obsession with
    the monetization of user data seems to be limitless. In other words, many technology
    suppliers are addicted to the easy money that can be made by showing you an endless
    stream of ads. But are these ads effective? From my point of view, those ads are
    an insidious form of pollution, preventing us from focusing. They are the background
    noise of our times. Don’t believe me? Fire your favorite browser, and look for
    photographs of hockey games from the 1950s and 1960s. Not a cell phone nor an
    ad in sight. But gradually, ads made their way everywhere. They are on the boards;
    they are painted on the ice. They are blasted on the radio and TV at every break
    in the play; sometimes, referees need to wait until the end of commercials before
    restarting the game. More recently, they took over the names of buildings and
    even the uniforms themselves. But look at Figure [14-1](#524096_1_En_14_Chapter.xhtml#Fig1).
    Look at all the ads on this player. Can you focus on anything? Remember any sponsor
    name after closing your eyes for a few seconds?


    ![](images/524096_1_En_14_Chapter/524096_1_En_14_Fig1_HTML.png)


    A photograph of a billboard on the ice. He has a hockey stick and whistle in his
    mouth.


    **Figure 14-1** A billboard on ice^([^(68)](#fn68))


    So my advice to you is this: defend user privacy ferociously. And if you are thinking
    about a new product or business, think about a better business model than selling
    ads. The world doesn’t need yet another AI-enabled money funnel pretending it
    will change our lives. Remember. Contrarily to open source contributors, ads do
    not generate value; they just send the money into a different pocket.


    Finally comes the issue of short-sightedness. A few weeks before I wrote this
    conclusion, Google announced they would discontinue their IoT Core service in
    2023. The platform’s customers now need to scramble to find an alternative. This
    is one in a long string of such decisions stranding end users and developers by
    the search giant. In the past, people have even been left with broken, irreparable
    smart homes. Why? The proprietary hub driving them had been killed without a replacement
    or migration path, so all devices had to be replaced. That said, all of Google’s
    major competitors are guilty of the same, and many smaller organizations are as
    well. Naturally, I am not suggesting that commercial organizations maintain unprofitable
    products forever. But why not open-source the code of those discontinued products?
    Wasting the years of development effort that went into them is waste humanity
    cannot sustain. It is shortsighted to think otherwise. In due time, regulators
    may force organizations to do the right thing. But how nice it would be if they
    could take the initiative for a change! By making your product (or at least its
    core) open source from the very start, you provide a way forward for your users
    if you wish to move on in the future while preserving your capacity to build meaningful
    commercial innovations. Remember that the true innovators of this century will
    be the organizations that not only use open source in their products and solutions
    but will acquire the skills required to contribute and give back to the community.


    My goal in this book was to provide an overview of the Eclipse IoT ecosystem and
    give you the tools and knowledge you need to build enterprise-grade solutions.
    I may be naive, but I still sincerely believe in the potential for technology
    to improve our lives. All you need to do for that to happen is to take security
    seriously, defend user privacy, and take a long-term perspective.


    And now, get your project started!'
