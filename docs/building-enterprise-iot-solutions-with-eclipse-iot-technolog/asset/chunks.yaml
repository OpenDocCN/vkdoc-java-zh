- fmt: '# Open Source Hardware


    This book focuses on open source technologies. It would not be complete without
    a discussion of successful open source hardware initiatives. There is a growing
    ecosystem of open source processor cores, microcontrollers, single-board computers,
    and sensors and actuators. I will provide examples for the first three categories
    in this section.


    Because hardware strongly influences the design of IoT solutions, relying on open
    source components brings distinct advantages to device designers. IoT developers
    optimize their code for size and need to keep power consumption to a minimum –
    at least in the case of field-deployed devices. It is easier to reach the desired
    power profile when you control not only the software but also the hardware. Moreover,
    open source hardware makes it easier to have a stable hardware platform over the
    solution''s life cycle; if one specific supplier discontinues the component, it
    is always possible to find another or contract a third party to provide it. Finally,
    open source hardware enables designers to extend and improve the components. Since
    IoT and edge computing solutions are often deployed in remote locations or harsh
    environments, the capacity to tweak the hardware to fit the use case is invaluable.


    ## Processor Cores: OpenHW CORE-V Family


    The Eclipse Foundation works closely with the [OpenHW Group](https://www.openhwgroup.org)
    to build a comprehensive RISC-V ecosystem on a foundation of open source processor
    cores implementations. OpenHW Group is a Canadian not-for-profit, global organization
    where hardware and software designers collaborate to develop open source processor
    cores, related IP, tools, and software. All OpenHW ecosystem artifacts are developed
    in publicly accessible GitHub repositories. The core designs are defined in SystemVerilog
    and are licensed under the [Solderpad Hardware License version 0.51](http://solderpad.org/licenses/SHL-0.51/).
    This license is based on the Apache License 2.0 and facilitates commercial adoption.


    At the time of writing, all the currently available cores belong to the [CORE-V](https://github.com/openhwgroup/core-v-cores)
    family. The following is a description of the most important CORE-V cores. At
    a high level, the CVA family of CORE-V processors could power gateways and edge
    nodes from a use case perspective, while the CVE4 family targets microcontroller-class
    cores.


    ### CVA6 Family


    Originally known as the PULP Ariane core, the CORE-V CVA6 6-stage, single-issue,
    in-order core implements the `RV32GC` or `RV64GC` extensions with three privilege
    levels (M, S, U) to support a UNIX-like operating system fully.


    ### CVE4 Family


    The CVE4 family contains several cores. I am only describing the three most important
    ones.


    - **CV32E40P:** Originally known as the PULP RI5CY core, the CORE-V CV32E40P is
    a 32-bit, 4-stage core that supports DSP operations and implements SIMD extensions
    among other features.

    - **CV32E40X:** The CORE-V CV32E40X is a small and efficient, 32-bit, in-order
    RISC-V core with a 4-stage pipeline. The CV32E40X core is aimed at compute-intensive
    applications and offers a general-purpose extension interface that you can leverage
    to add external custom extensions to the core.

    - **CV32E40S:** The CORE-V CV32E40S is a small and efficient, 32-bit, in-order
    RISC-V core with a 4-stage pipeline. The CV32E40S core is aimed at security applications
    and offers both machine mode and user mode, enhanced physical memory protection,
    and various antitampering features.


    ## Microcontroller: CORE-V MCU


    The OpenHW Group [CORE-V MCU project](https://docs.openhwgroup.org/projects/core-v-mcu)
    aims to build a microcontroller leveraging the CV32E40P core. The MCU includes
    support for I²C, PWM, SPI, and UART, among other technologies. At the time of
    writing, the most convenient way to test drive it was to deploy the chip as a
    bitstream on Diligent’s [Nexys A7](https://digilent.com/shop/nexys-a7-fpga-trainer-board-recommended-for-ece-curriculum/)
    or [Genesys2](https://digilent.com/reference/programmable-logic/genesys-2/start)
    FPGA boards. However, OpenHW Group had plans to have development boards with an
    actual physical chip ready for distribution in 2023. Please monitor this page
    for more information regarding the CORE-V MCU DevKit project: [`www.openhwgroup.org/core-v-devkits/`](http://www.openhwgroup.org/core-v-devkits/).


    > **Note**

    > Field Programmable Gate Arrays (FPGAs) are programmable semiconductor devices.
    In other words, they are chips that can be reconfigured to perform different logic
    functions. They are invaluable tools for chip designers, as they enable the testing
    of changes to a processor core or MCU design without the need to produce actual
    semiconductors.


    ## Single-Board Computers


    The builders of many popular single-board computers available currently made their
    designs available under open source licenses. I will now explore a few examples
    in detail.


    ### Arduino


    The popular Arduino 8-bit microcontrollers may spot proprietary AVR microcontrollers,
    but their overall design is open source. Detailed pinouts and schematics are available
    on Arduino’s website and published under the [Creative Commons Attribution-ShareAlike
    4.0 International License](https://creativecommons.org/licenses/by-sa/4.0/).


    The availability of such schematics gave birth to a robust ecosystem of compatible
    boards.


    ### micro:bit


    Next is the mighty [BBC micro:bit](https://microbit.org/). The micro:bit is an
    open source single-board computer leveraging Cortex-M MCUs. Launched in 2016,
    it has seen two different revisions up to now. The following is a list of the
    main characteristics for each version:


    - **Version 1:** [Nordic nRF51822](https://www.nordicsemi.com/products/nrf51822)
    MCU, 16 MHz Arm Cortex-M0 core, 256 KB Flash storage, 16 KB RAM

    - **Version 2:** [Nordic nRF52833](https://www.nordicsemi.com/products/nrf52833)
    MCU, 64 MHz Arm Cortex-M4 core, 512 KB Flash storage, 128 KB RAM


    The micro:bit was initially designed by the [British Broadcasting Corporation](https://www.bbc.com/)
    (BBC) and several partners. The program''s goal is to encourage children to get
    actively involved with computers. Given this focus, the boards are equipped with
    LEDs, buttons, sensors (accelerometer, magnetometer, temperature, light), and
    Bluetooth connectivity. Version 2 adds a microphone, a speaker, and a touch sensor.
    The official boards feature a 25-pin edge connector with PWM outputs, GPIO pins,
    analog inputs, serial I/O, SPI, and I²C.


    The [Micro:bit Educational Foundation](https://www.microbit.org/about/) was created
    from the original BBC project in October 2016. The Foundation is a not-for-profit
    organization responsible for maximizing opportunities for students worldwide to
    learn with the micro:bit. Consequently, it shepherds the evolution of the micro:bit
    board and its related software stack. Although only the schematics and bill of
    materials are available for the official boards, the Foundation released an open
    source [compatible reference design](https://github.com/microbit-foundation/microbit-reference-design)
    and [extensive documentation](https://tech.microbit.org/hardware/reference-design/).
    The reference design is licensed under the Solderpad Hardware License version
    0.51. It offers the same components as the official version 1 board and is 100%
    software compatible.'
