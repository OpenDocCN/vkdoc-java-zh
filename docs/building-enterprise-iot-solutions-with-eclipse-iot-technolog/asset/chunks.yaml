  trans: '

    ## 物联网（Web of Things）


    本质上，物联网和边缘计算的部署是异构的。这一点我已经多次强调。当前市场上的设备和软件平台涉及多种协议、数据模型和安全要求。鉴于其复杂性，自 21 世纪初以来，开发者和研究人员一直在探索通过
    Web 技术连接物理对象的想法。随着时间的推移，这些努力不断加强，最终促成了万维网联盟（W3C）于 2016 年成立了物联网（WoT）工作组。


    物联网提供了一套标准化的构建模块，通过利用成熟的 Web 范式来简化物联网应用的开发。具体来说，它建立了一个由属性、动作和事件组成的交互模型。属性反映了“物”的状态；它们可以是传感器数值、配置设置或某些计算的结果。根据所使用的
    TD 提供者，属性可以是可观察的。另一方面，动作通常涉及与物理世界的交互。典型的例子包括启动电机、打开阀门或解锁门。最后，事件用于传达设备检测到的特定用例情况，例如“燃油不足”、“阀门已打开”或“检测到入侵者”。你可以在此处访问
    WoT 架构规范：[`www.w3.org/TR/wot-architecture11/`](http://www.w3.org/TR/wot-architecture11/)。


    WoT 是一个开放标准。它依赖于许多成熟的 Web 标准，如 HTTP、JSON、JSON-LD、JsonSchema、JsonPointer 等。它由一个多元化的社区积极开发。与
    Eclipse 基金会规范流程一样，W3C 的规范流程是透明且开放的。决策公开进行，会议记录对所有人开放，规范也在公开的 GitHub 仓库中开发。


    WoT 模型在*WoT 物描述*（TD）中描述物理对象。TD 是 WoT 的核心支柱。由于它提供了对物元数据的访问，你可以将其视为网站主页的等价物。WoT
    TD 描述了该物提供哪些数据和功能、使用何种协议访问它们、数据的结构和编码方式，以及所涉及的访问控制机制。该物还可以以机器可读或人类可读的格式提供额外的元数据。你可以从设备本身、存储库（TD
    目录）或第三方中介（如 Eclipse Ditto）获取物的 TD。TD 使用 JSON-LD 表示。


    WoT 物描述规范的下一个修订版（[1.1 版](https://www.w3.org/TR/wot-thing-description11/)）将引入物模型（TM）概念。TM
    定义了物的属性、动作和事件，但不提供实例特定的细节，例如可用的协议或绑定模板。在撰写本文时，WoT 物描述规范 1.1 版仍为工作草案。


    WoT 与协议无关。然而，它提供了一种机制来定义 WoT 的属性-动作-事件抽象与特定协议实现（如 CoAP、HTTP 和 MQTT）之间的映射。这种机制的名称是*WoT
    绑定模板*。绑定模板定义了物实例的消费者如何通过协议接口激活 TD 中指定的 WoT 交互。


    除了 TD 和绑定模板，WoT 工作组还维护了一个针对 JavaScript（ECMAScript）的 WoT 脚本 API。该 API 实现了属性-动作-事件抽象，并定义了一个基于脚本的运行时可以利用的接口。当然，也可以在非脚本语言（如
    Java、Python 或 Rust）中实现相同的 API。在撰写本文时，该 API 还不是一个完整的 WoT 规范，而是作为工作组备忘录提供。工作组还为
    WoT 实现提供了安全和隐私指南。


    WoT 提供了有用的抽象，使开发者能够实现互联对象。我将在后面详细介绍的[Eclipse Thingweb](https://www.thingweb.io)项目是
    WoT 脚本 API 的参考实现。


    ### Eclipse EdiTDor


    [Eclipse EdiTDor](https://github.com/eclipse/editdor)使用 JavaScript 编写，可以创建、渲染、编辑和验证
    WoT 物描述。它使用 React 作为其 UI 框架，并且需要 Node.js 来构建 Web 应用程序。EdiTDor 具有用于创建属性、动作和事件的向导。它还附带了一个
    JSON 编辑器，支持通过 JSON 模式进行验证和自动补全。EdiTDor 提供了与表示为 JSON-LD 的 TM/TD 格式的双向绑定，这提供了一种使用
    JSON 编码链接数据的方法。图 12-1 展示了 EdiTDor 的外观。


    ![](img/524096_1_En_12_Fig1_HTML.jpg)


    Web of Things EdiTDor 0.4.0 版本的屏幕截图，左侧显示落地灯的代码，右侧显示上下文、类型、添加顶层表单和链接的选项，以及制造商和序列号的属性。


    图 12-1


    EdiTDor 用户界面


    当你对物模型或物定义满意后，让消费者能够访问它们的一种方法是将文件部署到 HTTP 服务器上。为此，你可以保存你在 EdiTDor 中创建的 TM 或 TD
    的副本。


    #### EdiTDor 入门


    EdiTDor 团队在以下位置提供了一个应用程序实例：[`https://eclipse.github.io/editdor/`](https://eclipse.github.io/editdor/)。假设你的工作站上安装了
    Node.js 10 或更高版本。在这种情况下，你也可以通过克隆项目的 Git 仓库并从根文件夹执行以下命令，轻松地运行一个本地实例：


    ```

    yarn start

    ```


    启动后，你可以通过以下 URL 访问它：`http://localhost:3000/`。


    ### Eclipse Thingweb


    Eclipse Thingweb 是一个提供实现 WoT 规范的软件平台的项目。在撰写本文时，唯一发布的平台是 node-wot，即 WoT 规范的参考实现。


    Thingweb 的官方 Web 资源如下：


    *   **网站：** [`www.thingweb.io/`](http://www.thingweb.io/)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.thingweb`](https://projects.eclipse.org/projects/iot.thingweb)


    *   **代码仓库：** [`https://github.com/eclipse/thingweb.node-wot`](https://github.com/eclipse/thingweb.node-wot)


    node-wot 提供了一个 WoT 物描述解析器和序列化器、多个绑定模板实现（包括 HTTPS、CoAP 和 MQTT 等），以及一个符合 WoT 脚本
    API 的应用程序运行时系统。node-wot 还包含一个 Web 用户界面，用于可视化 TD 并实现与物实例的交互。node-wot 可根据[Eclipse
    公共许可证 2.0 版](https://www.eclipse.org/legal/epl-2.0/)或[W3C 软件声明和文档许可证（2015-05-13）](https://www.w3.org/Consortium/Legal/2015/copyright-software-and-document)使用。在撰写本文时，当前版本为
    v0.8.1，于 2022 年 5 月 19 日发布。


    node-wot 使用 JavaScript 编写，并运行在 Node.js 运行时上。这意味着你可以通过三种方式使用它：作为库、作为独立应用程序，或在浏览器内部使用。后者将可用的绑定模板限制为
    HTTPS 和 WebSocket。node-wot 可以消费（客户端）和暴露（服务器）物实例。


    除了 node-wot，Thingweb 团队还计划在未来开发一个物目录。物目录是 WoT TD 的目录服务，提供用于注册和查找 TD 的服务接口。Thingweb
    目录将符合[RFC 9176](https://www.rfc-editor.org/info/rfc9176)（受限 RESTful 环境（CoRE）资源目录）。

    '
- fmt: '# Getting Started with node-wot


    How to get started with `node-wot` depends on how you will leverage the platform.
    I will focus here on using it as a library or stand-alone application since those
    are the two most common use cases.


    Since `node-wot` relies on Node.js, the team made the platform accessible as a
    dependency through the NPM package manager. Given `node-wot`’s modularity, there
    are several packages available. The core platform is in `node-wot-core`, and there
    are separate packages for each binding template. You can list all the relevant
    packages by executing this command:


    ```

    npm search @node-wot

    ```


    Let’s say all you want to use is the HTTP binding template. Then, you can install
    the relevant dependencies with this command:


    ```

    npm i @node-wot/core @node-wot/binding-http –save

    ```


    Once the libraries are available, you can build your application. The following
    code snippet shows how to instantiate a WoT Server.


    ```

    const Servient = require(''@node-wot/core'').Servient;

    const HttpServer = require(''@node-wot/binding-http'').HttpServer;

    const servient = new Servient();

    servient.addServer(new HttpServer());

    servient.start().then((WoT) => {

    let thing = WoT.produce({

    title: "ThingTThing",

    description: " Beware of the Thing.",

    });

    // Add code to define properties, actions and

    // events here.

    thing.expose();

    });

    ```


    Once the server is up, the preceding code uses `WoT.produce` to create one Thing
    instance that will be available through the configured binding template. The title
    of the thing determines the URL. By default, the HTTP template will rely on port
    8080.


    Suppose you already started a server running the preceding code on your workstation.
    How would you consume the Thing instance you just created through HTTP? The following
    code snippet does just that:


    ```

    const { Servient, Helpers } = require("@node-wot/core");

    const { HttpClientFactory } = require(''@node-wot/binding-http'');

    const servient = new Servient();

    servient.addClientFactory(new HttpClientFactory(null));

    const WoTHelpers = new Helpers(servient);

    WoTHelpers.fetch("http://localhost:8080/ThingTThing").then(async (td) => {

    try {

    servient.start().then(async (WoT) => {

    let thing = await WoT.consume(td);

    // Use the thing’s properties and actions here.

    });

    }

    catch (err) {

    console.error("Script error:", err);

    }

    }).catch((err) => { console.error("Fetch error:", err); });

    ```


    Naturally, what you can achieve with the Thing instance depends on what properties
    and actions it implements. The `node-wot` repository on GitHub contains an overview
    of the APIs involved in exposing and consuming Things. You can find it here: [`https://github.com/eclipse/thingweb.node-wot/blob/master/API.md`](https://github.com/eclipse/thingweb.node-wot/blob/master/API.md).


    ## Digital Twins


    Up to now, I have discussed IoT applications in microservices and the runtime
    platforms supporting them. While this approach is fine, some higher-level abstractions
    have gained popularity in the last few years. The most prominent of these is digital
    twins.


    At its core, a digital twin is a virtual model accurately reflecting a physical
    object''s properties and state. The concept of digital twins was first expressed
    in 1991 by David Gelernter in a book titled *Mirror Worlds*. However, it was only
    applied to manufacturing in 2002 by Dr. Michael Grieves, a then faculty member
    at the University of Michigan. The term “digital twin” was eventually coined in
    2010 by NASA’s John Vickers. That said, NASA missions back to the 1960s already
    relied on the approach. The space agency built replicas of each spacecraft it
    launched, which were used for learning and simulation purposes. It is fascinating
    that space exploration was instrumental in the inception of edge computing (as
    described in Chapter [1](#524096_1_En_1_Chapter.xhtml)) and digital twins.


    Note


    Digital twins apply to many industries. Manufacturing, construction, healthcare,
    and automotive are some of the best examples. Organizations like the [Industrial
    Digital Twin Association](https://industrialdigitaltwin.org/en/) (IDTA) are working
    to define specifications for interoperability and integrate harmonized submodels.
    This led to the creation of the [Digital Twin top-level project](https://projects.eclipse.org/projects/dt)
    at the Eclipse Foundation.


    Many products are proposing an approach for digital twins. In the remainder of
    this section, I will propose an approach leveraging existing standards and open
    source projects for their implementation.'
