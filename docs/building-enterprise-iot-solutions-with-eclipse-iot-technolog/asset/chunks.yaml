- fmt: '*   **Direct Device Integration (DDI) API:** A REST API enabling device interactions.
    It uses JSON payloads and provides a channel for devices to send feedback to the
    platform. Naturally, this is useful for monitoring the progress of deployments,
    for example.

    *   **Device Management Federation (DMF) API:** An AMQP API enabling `hawkBit`
    to manage software updates for devices under the control of another device management
    service or application.


    Documentation for each API is available on the `hawkBit` website at this location:
    [`www.eclipse.org/hawkbit/apis/`](http://www.eclipse.org/hawkbit/apis/).


    There are several client implementations for `hawkBit`’s Direct Device Integration
    (DDI) API. The best known comes from the [Eclipse Hara subproject](https://projects.eclipse.org/projects/iot.hawkbit.hara),
    which focuses on a Kotlin library called [`hara-ddiclient`](https://github.com/eclipse/hara-ddiclient).
    `Hara` can be harnessed from any language running supported by the Java virtual
    machine (JVM). The subproject was contributed to the Eclipse Foundation in 2019
    by Kynetics, a startup from California. `Hara` is available under the Eclipse
    Public License version 2.0. There are also a few non-Eclipse DDI client libraries.
    The main ones of those libraries are as follows:


    *   **SWupdate:** A Linux-based agent focusing on updates for embedded systems.
    See [`https://github.com/sbabic/swupdate`](https://github.com/sbabic/swupdate).

    *   **rauc-hawkbit-updater:** A `hawkBit` client for the [RAUC](https://github.com/rauc/rauc)
    update framework written in C. See [`https://github.com/rauc/rauc-hawkbit-updater`](https://github.com/rauc/rauc-hawkbit-updater).

    *   **rauc-hawkbit:** A `hawkBit` client demo application and library for the
    RAUC update framework written in Python. See [`https://github.com/rauc/rauc-hawkbit`](https://github.com/rauc/rauc-hawkbit).

    *   **hawkbit-rs:** A project providing Rust crates to help implement and test
    `hawkBit` clients. See [`https://github.com/collabora/hawkbit-rs`](https://github.com/collabora/hawkbit-rs).


    From a code point of view, `hawkBit` depends on several third-party software components
    and platforms. Figure [13-3](#524096_1_En_13_Chapter.xhtml#Fig3) shows where they
    fit in the overall architecture.


    ![](images/524096_1_En_13_Chapter/524096_1_En_13_Fig3_HTML.jpg)


    An architecture includes DMF API, DDI API, management API and UI, Spring HATEOAS,
    Spring MVC and security, repository, embedded Tomcat, Spring Boot and Cloud, AMQP,
    MongoDB, MariaDB H2, and Redis.


    **Figure 13-3** Eclipse `hawkBit` architecture (Credit: Eclipse Foundation)


    The project team supports several choices for the SQL database engine. At the
    time, MySQL, MariaDB, and Microsoft SQL Server were the choices deemed suitable
    for production deployments. You could also use H2, IBM DB2, or PostgreSQL in development
    and test environments.


    ### Getting Started with hawkBit


    The easiest way to kick the tires of `hawkBit` is to use the public sandbox maintained
    by the project team. You can access it at [`https://hawkbit.eclipseprojects.io`](https://hawkbit.eclipseprojects.io).
    You can also spin up a local environment by using the container images put together
    by the project team. If you wish to just start the core engine itself under the
    Docker engine, you can use this command:


    ```

    docker run -p 8080:8080 hawkbit/hawkbit-update-server:latest

    ```


    For an environment closer to a production one, you can start MySQL and RabbitMQ
    containers alongside `hawkBit` itself through Docker compose. Use these commands:


    ```

    git clone https://github.com/eclipse/hawkbit.git

    cd hawkbit/hawkbit-runtime/docker

    docker-compose up -d

    ```


    Finally, you can leverage Docker swarm to bring up the `hawkBit` Device Simulator
    and the Update Server, MySQL, and RabbitMQ. Simply run the following commands:


    ```

    git clone https://github.com/eclipse/hawkbit.git

    cd hawkbit/hawkbit-runtime/docker

    docker swarm init

    docker stack deploy -c docker-compose-stack.yml hawkbit

    ```


    The simulator supports the DDI and DMF APIs and can simulate the existence of
    up to 4000 devices.


    ### Eclipse Kapua


    Eclipse Kapua is a modular IoT cloud platform to manage and integrate devices
    and their data. It consolidates device connectivity and management on a single
    platform while providing out-of-the-box integration with gateways based on Eclipse
    Kura. Kapua was contributed to the Eclipse Foundation by Eurotech in 2016, and
    the code is available under the Eclipse Public License version 2.0. At the time
    of writing, the current version was v1.6.1, published on July 1, 2022. What a
    gift for Canada Day!


    The official web resources for Kapua are as follows:


    *   **Website:** [`www.eclipse.org/kapua/`](http://www.eclipse.org/kapua/)

    *   **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.kapua`](https://projects.eclipse.org/projects/iot.kapua)

    *   **Repository:** [`https://github.com/eclipse/kapua`](https://github.com/eclipse/kapua)


    Here is a list of Kapua’s main features:


    *   **Device Connectivity:** Field devices can connect to Kapua using MQTT over
    TCP/IP or WebSockets. The device connectivity service performs authentication
    and authorization while maintaining a device registry.

    *   **Device Management:** Kapua can perform various remote operations on connected
    devices, independently of the software stack they run. This includes managing
    the devices’ configuration, services, and applications. For example, you can start
    or stop services and install, update, or remove applications. You can also execute
    operating system commands remotely and provision an initial configuration for
    a device.

    *   **Data Management:** Telemetry sent by devices is persisted to an Elasticsearch
    database and fully indexed.

    *   **Security:** Kapua’s security model spans tenants, accounts, and users. In
    Kapua, accounts support a hierarchical access control structure. The platform
    also implements Role-Based Access Control (RBAC) for user identities, which means
    permissions are granted according to the “least privilege” principle.

    *   **Application Integration:** Kapua exposes a comprehensive REST API that third-party
    applications can use to interact with the platform and the devices connected to
    it.


    Kapua also offers a web graphical user interface that administrators can use to
    perform device and data management operations. Figure [13-4](#524096_1_En_13_Chapter.xhtml#Fig4)
    shows you what it looks like.


    ![](images/524096_1_En_13_Chapter/524096_1_En_13_Fig4_HTML.jpg)


    A screen of Kapua displays the page of connections with connection filter and
    the descriptions of connection status, modified on and by, protocol, client ID,
    user, client, and server IP, and created on and by.


    **Figure 13-4** Eclipse Kapua web user interface


    As shown in the figure, Kura allows you to schedule batch jobs and define custom
    tags.'
