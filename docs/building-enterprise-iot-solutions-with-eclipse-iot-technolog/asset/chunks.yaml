    ### Simple Server: Demo


    Building a CoAP server is more involved since you need to bind to network interfaces
    and implement the resources. Fortunately, the Californium demo apps offer several
    examples of servers. First, let’s see how you can run the [`cf-helloworld-server`](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-helloworld-server/src/main/java/org/eclipse/californium/examples/HelloWorldServer.java),
    a simple implementation. To start it, simply issue this command:


    ```

    java -jar cf-helloworld-server-3.0.0.jar HelloWorldServer

    ```


    You should see the following output. Note that since we ran the client earlier,
    Californium notifies us it is loading the configuration from `Californium3.properties`.


    ```

    11:51:01.585 INFO [Configuration]: defaults added COAP.

    11:51:01.588 INFO [Configuration]: defaults added SYS.

    11:51:01.588 INFO [Configuration]: defaults added UDP.

    11:51:01.589 INFO [Configuration]: defaults added TCP.

    11:51:01.590 INFO [Configuration]: loading properties from file /home/fdesbiens/californium/demo-apps/run/Californium3.properties

    11:51:01.626 INFO [RandomTokenGenerator]: using tokens of 8 bytes in length

    ...

    11:51:01.685 INFO [CoapEndpoint]: coap Started endpoint at coap://127.0.0.1:5683

    11:51:01.686 DEBUG [UDPConnector]: Starting network stage thread [UDP-Sender-/127.0.0.1:5683[1]]

    ```


    By default, this server will start in UDP mode only; you could also enable the
    experimental TCP support if desired. To verify that the server is running properly,
    you can use the `cf-helloworld-client` to send a GET request to the resource it
    exposes. The name of the resource is `helloWorld`. Open a new command prompt and
    execute this command:


    ```

