- fmt: '### Narrowband


    A low-power wide-area network (`LPWAN`) is a wireless network aimed at battery-operated
    constrained devices and sensors. It is designed to favor range over throughput
    to optimize the battery life of the devices. Most `LPWANs` exhibit data rates
    between 0.3 kbit/s and 170 kbit/s per channel. It is possible to set up your own
    `LPWANs` or use services and infrastructure deployed by third parties. The advantage
    of the second approach is that you will not have to deploy and maintain gateways
    in the field.


    There are several competing standards in this market. I focused on four specific
    options: `DASH7`, `LoRaWAN`, `LTE-M`, and `NB-IoT`. All narrowband options currently
    in the market offer a long range, low power consumption, and cost-effectiveness.
    The operating range of `LPWANs` can reach over 10 km (6 miles) in rural settings;
    in densely populated urban landscapes, it will still reach a few kilometers. As
    for power consumption, battery life of over a decade is not unheard of. Moreover,
    `LPWANs` rely on topologies that keep infrastructure costs in check. They also
    use lightweight protocols that lower hardware complexity, thus reducing the cost
    of the devices. Some popular options rely on proprietary technologies that tend
    to result in more costly transceivers.


    #### DASH7


    The `DASH7 Alliance Protocol` (`D7A`) is an open source wireless narrowband protocol
    that operates in the 433 MHz, 868 MHz, and 915 MHz unlicensed frequency bands.
    It is placed under the stewardship of the [DASH7 Alliance](https://www.dash7-alliance.org/),
    a nonprofit mutual benefit corporation formed to foster the further development
    of the `DASH7` protocol specification. You can download the specification for
    free from the `DASH7` website.^([^(43)](#fn43)) The Eclipse Foundation is proud
    to be a member of the `DASH7 Alliance`.


    `D7A` is derived from `ISO/IEC 18000-7`, a standard defining an interface for
    active radio-frequency identification (`RFID`) in the unlicensed 433 MHz ISM band.
    `D7A` no longer complies with `ISO/IEC 18000-7`. The protocol specification is
    free to use without any patent or licensing requirements. The range for `D7A`
    is short. It topples at around 500 m (1640 feet) for industrial applications,
    although device makers advertise read ranges of over a kilometer (0.62 miles)
    in line-of-sight situations. The protocol offers a typical latency of one second
    while consuming only 30 uA on average. There are three tiers of data rates, depending
    on the radio modulation selected. `DASH7` low rate delivers an equivalent bitrate
    of 9.6 kbit/s, `DASH7` normal rate reaches 56 kbit/s, and `DASH7` high rate achieves
    167 kbit/s.


    The [Sub-IoT project on GitHub](https://github.com/Sub-IoT/Sub-IoT-Stack) houses
    an open source implementation of `D7A`. It is available under the Apache License
    v2.0.


    #### LoRaWAN


    `LoRaWAN` involves two distinct technologies: `LoRa` and `LoRaWAN`.


    `LoRa` (derived from “Long Range”) is a proprietary radio modulation technique.
    It was developed and patented by Cycleo, a company based in Grenoble (France),
    which Semtech later acquired. `LoRa` chipsets are provided exclusively by Semtech.
    `LoRa` uses the following unlicensed sub-gigahertz radio frequency bands:


    *   Asia: `AS923` (915–928 MHz)

    *   Europe: `EU868` (863–870/873 MHz)

    *   India: `IN865` (865–867 MHz)

    *   North America: `US915` (902–928 MHz)

    *   South America: `AU915/AS923-1` (915–928 MHz)

    *   Worldwide: 2.4 GHz


    `LoRa` can deliver data rates between 0.3 kbit/s and 27 kbit/s. The effective
    range can be up to 5 km (3.1 miles) in urban areas and reach over 15 km (9.3 miles)
    in rural areas, where unimpeded line of sight is easier to achieve.


    `LoRaWAN`, on the other hand, defines the software communication protocol and
    system architecture. It is developed and maintained by the LoRa Alliance, a nonprofit
    established in 2015. `LoRaWAN` manages the frequencies, data rate, and power for
    all devices. The devices rely on the reporting by exception pattern: they transmit
    data asynchronously when needed. Those transmissions are forwarded to a centralized
    server by gateways deployed in the field. `LoRaWAN` connections are bidirectional,
    and the protocol supports multicast addressing groups to make the mass distribution
    of messages to devices more efficient. This is especially useful for distributing
    over-the-air software updates.


    There are several open source `LoRaWAN` software stacks available. One of them
    is provided by the [ChirpStack project](https://www.chirpstack.io/), which ships
    a gateway bridge, network server, and application server, among other components.
    All components are available under the MIT license.


    The long range and wide industry support for `LoRaWAN` make it an attractive technology
    for large deployments of wireless sensors with limited data rate requirements.
    Smart cities and smart agriculture are two good potential use cases. However,
    the proprietary nature of the radio modulation is a source of concern.


    #### LTE-M and NB-IoT


    `LTE-M` (or `LTE-MTC`, for “Machine Type Communication”) and `NB-IoT` (Narrowband
    Internet of Things) are two `LPWAN` radio technology standards developed by the
    `3GPP` to address machine-to-machine and IoT use cases.


    `LTE-M` relies on existing `LTE` networks but is not necessarily available everywhere
    `LTE` connectivity is. Compared to an `LTE` modem, an `LTE-M` model will be less
    expensive and offer a battery life of several years. `LTE-M` networks also offer
    greater coverage and better indoor penetration than `LTE` ones. There are two
    categories of `LTE-M`: `Cat-M1` and `Cat-M2`. `Cat-M1` offers data rates of 1
    Mbit/s for both uplink and downlink; `Cat-M2`, on the other hand, offers 4 Mbit/s
    of downlink and 7 Mbit/s of uplink. Latency averages between 50 and 100 milliseconds.
    Since it relies on cellular towers, `LTE-M` supports mobility use cases and supports
    `VoLTE` voice services.


    Like `LTE-M`, `NB-IoT` uses a subset of the `LTE` standard but limits the bandwidth
    to a single narrowband of 200 kHz. The technology focuses on cost-effective coverage
    of indoor spaces where achieving a high density of connections is possible. Battery
    life of more than ten years can be supported for a wide range of use cases. There
    are two categories of `NB-IoT`. `Cat-NB1`, the first version introduced, delivers
    downlink data rates as fast as 26 kbit/s and uplink data rates up to 62 kbit/s.
    Latency ranges from 1.6 to 10 seconds. `Cat-NB2`, the newest version, pushes the
    downlink data rate to 127 kbit/s and the uplink data rate to 150 kbit/s. `NB-IoT`
    also supports Radio Resource Control (`RRC`) connection reestablishment, allowing
    devices to transfer their connection from one cell to another cell. This improves
    the technology''s suitability for mobility use cases, such as pedestrian, cyclist,
    and vehicle monitoring.


    Compared to `NB-IoT`, `LTE-M` provides better data rates and lower latency. Consequently,
    it is a better choice for real-time use cases. Its support for voice communications
    enhances its flexibility. Moreover, since `LTE-M` is an extension of `LTE`, it
    supports roaming, whereas `NB-IoT` does not. `NB-IoT` is the superior technology
    for any use case involving connecting to devices located in warehouses, underground
    locations, and commercial buildings. It is also a great choice if you only need
    to transmit sensor data at a low data rate.


    Both `LTE-M` and `NB-IoT` involve SIM cards. However, the availability of `LTE`
    or 5G connectivity at a specific location does not guarantee that `LTE-M` and
    `NB-IoT` will be available. There are countries where one option is available,
    and the other is not. The [GSM Association](https://www.gsma.com) (`GSMA`) website
    features a useful map illustrating the worldwide commercial availability of `LTE-M`
    and `NB-IoT` services. You can find it here: [`www.gsma.com/iot/deployment-map/`](http://www.gsma.com/iot/deployment-map/)'
