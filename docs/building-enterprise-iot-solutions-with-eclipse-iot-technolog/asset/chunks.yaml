- fmt: '# 2. CoAP


    > *Une civilisation se construit par l''apport successif de générations prenant
    appui l''une sur l''autre comme les pierres d''un édifice.*

    >

    > *A civilization is built by the successive contribution of generations leaning
    on each other like the stones of a building.*

    >

    > —André Frossard, *Le Monde de Jean-Paul II*


    Open source is about leveraging building blocks implementing shared functionalities.
    This enables you to focus on your use case instead of reimplementing what countless
    others have already implemented. Since your time is a severely constrained resource,
    any minute you save by using open source components is a minute you can invest
    in meaningful differentiation for your solutions.


    Open source projects and standards also benefit from the approach I just described.
    When an open source project adopts another as a dependency, it reinforces their
    respective communities. Having an open source adopter is a valuable source of
    feedback and new requirements for the dependency. For the adopter, leveraging
    an open source dependency provides flexibility and control proprietary components
    are unable to provide. Several of the Eclipse IoT and Edge building blocks depend
    on their peers.


    This chapter and the next cover two closely related protocols: CoAP and LwM2M.
    In this one, I will also teach you how to use [Eclipse Californium](https://www.eclipse.org/californium/),
    a mature CoAP implementation; in the next one, you will learn about [Eclipse Leshan](https://www.eclipse.org/leshan/),
    a framework to build LwM2M solutions using Californium as its CoAP implementation.


    ## CoAP: A Slimmer HTTP


    Like HTTP, the *Constrained Application Protocol* (CoAP) is described in a *Request
    for Comments* (RFC) published by the *Internet Engineering Task Force* (IETF).
    At the time of writing, CoAP is a proposed Internet standard. The initial RFC
    for CoAP, [RFC 7252](https://www.rfc-editor.org/info/rfc7252), published in June
    2014, has been updated by the following RFCs:


    * **RFC 7641:** [*Observing Resources in the Constrained Application Protocol
    (CoAP)*](https://www.rfc-editor.org/info/rfc7641), September 2015

    * **RFC 7959:** [*Block-Wise Transfers in the Constrained Application Protocol
    (CoAP)*](https://www.rfc-editor.org/info/rfc7959), August 2016

    * **RFC 8613:** [*Object Security for Constrained RESTful Environments (OSCORE)*](https://www.rfc-editor.org/info/rfc8613),
    July 2019

    * **RFC 8974:** [*Extended Tokens and Stateless Clients in the Constrained Application
    Protocol (CoAP)*](https://www.rfc-editor.org/info/rfc8974), January 2021


    All four represent optional functionality that may not be present in specific
    implementations.


    It is worth mentioning that encrypted CoAP connections rely on the *Datagram Transport
    Layer Security* (DTLS) protocol version 1.2, published originally in January 2012
    as [RFC 6347](https://www.rfc-editor.org/info/rfc6347). DTLS is based on the *Transport
    Layer Security* (TLS) protocol commonly used to secure HTTP connections but focuses
    on datagram protocols such as the *User Datagram Protocol* (UDP).


    ## Characteristics


    The creators of CoAP explicitly designed it to resemble HTTP. Like HTTP, it is
    a request/response protocol relying on *Uniform Resource Locators* (URLs), content
    types, and options. You can use proxies and caching for CoAP traffic like for
    HTTP. CoAP requests rely on the same `GET`, `PUT`, `POST`, and `DELETE` methods
    as HTTP, although there are subtle differences in the semantics involved. The
    relationship between CoAP and HTTP is characterized like this in RFC 7252:


    > *The goal of CoAP is not to blindly compress HTTP [RFC2616], but rather to realize
    a subset of REST common with HTTP but optimized for M2M applications. Although
    CoAP could be used for refashioning simple HTTP interfaces into a more compact
    protocol, more importantly it also offers features for M2M such as built-in discovery,
    multicast support, and asynchronous message exchanges.*


    Clients send CoAP requests to servers to execute an action specified through a
    method code on a specific resource. A URI identifies the resource. Servers send
    back a response described by a response code that may include the representation
    of a resource. CoAP requests and responses are asynchronous. Since the protocol
    runs on UDP or a UDP equivalent, which is inherently unreliable, messages can
    arrive out of order, be duplicated, or even vanish. CoAP implements a lightweight
    reliability mechanism to address those issues.


    > **Note**

    >

    > Compared to TCP, UDP is a much simpler protocol. It is connectionless and does
    not perform network handshakes, which means it does not provide ordering, reliability,
    and data integrity features. This is by design, as UDP delegates the task of implementing
    such features to the higher layers of the stack. Many IoT protocols leverage UDP
    as their transport since its simplicity reduces resource requirements. CoAP implements
    simple reliability and integrity features that can still work on weaker networks
    that will result in higher message loss.


    CoAP''s reliability behavior depends on the message type selected. There are currently
    four message types available:


    * **Confirmable:** The message is transmitted reliably. The recipient of a confirmable
    message must acknowledge it through an acknowledgment message or reject it. If
    the message is rejected, the recipient will ignore the message and send back a
    matching reset message.

    * **Nonconfirmable:** The message is transmitted unreliably. The recipient must
    not acknowledge it. If the message is rejected, the recipient may optionally decide
    to send back a matching reset message.

    * **Acknowledgment:** The message is sent in response to a confirmable message.
    It must echo the original message ID and must contain a response or be empty.
    There are two types of acknowledgments: piggybacked and empty. Piggybacked acknowledgments
    carry the response to the request. On the other hand, an empty acknowledgment
    message only confirms reception of the confirmable message by the recipient, not
    the success or failure of the request contained in the confirmable message.

    * **Reset:** The message is sent in response to a confirmable or nonconfirmable
    message. A reset message indicates that the recipient received the original message
    but lacks the context to process it appropriately.


    In the absence of an acknowledgment message, the sender of a confirmable message
    will retransmit the message at an increasing interval until it receives an acknowledgment,
    or the maximum number of attempts permitted has been reached. CoAP implementations
    must also detect duplicate messages for both confirmable and nonconfirmable messages.'
