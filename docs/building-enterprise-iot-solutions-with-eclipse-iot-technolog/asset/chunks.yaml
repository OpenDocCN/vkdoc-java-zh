    ## 物联网与当前其他趋势


    在进一步深入之前，我们先来定义一下物联网本身。目前存在许多不同的定义。以下是我认为有意义的几个：


    *   **高德纳咨询公司：**^(⁵) *物联网（IoT）是包含嵌入式技术的物理对象网络，这些技术用于通信、感知或与其内部状态或外部环境进行交互。*


    *   **维基百科：**^(⁶) *物联网（IoT）描述了嵌入传感器、处理能力、软件和其他技术的物理对象（或此类对象的集合），这些对象通过互联网或其他通信网络与其他设备和系统连接并交换数据。*


    *   **亚历山大·S·吉利斯：**^(⁷) *物联网（IoT）是一个由相互关联的计算设备、机械和数字机器、物体、动物或人员组成的系统，这些实体被赋予唯一标识符（UID），并具备通过网络传输数据的能力，无需人与人之间或人与计算机之间的交互。*


    虽然这些定义是一个很好的起点，但上述定义并未捕捉到我认为至关重要的一些细微差别。以下是这些定义中缺失的三个主要细微之处：


    *   **物联网中的“I”代表“****网络****”：** 在处理物联网时，连接性是既定前提。然而，并非所有部署都依赖运营商网络或公共互联网。许多窄带技术可以直接集成到本地有线或无线网络中，而无需互联网连接。


    *   **这不仅仅是关于****传感器****：** 大多数物联网设备可以依靠一系列传感器来报告物理世界的状态。然而，它们能做的远不止收集数据。当配备执行器时，物联网设备可以接收命令并与环境进行交互。它们可以打开灯、调整阀门的位置、提高通风机的速度；可能性是无限的。


    *   **存在人为因素：** 物联网设备与人类一样存在于物理世界中。在某些用例中，为设备添加人机界面控制是有意义的。在某些情况下，例如在仓库或工业场所周围使用的自动叉车和卡车，工人甚至可以使用控制装置来接管车辆。人类与设备之间的有序共存将变得越来越重要。


    鉴于我之前提出的观点，我认为以下定义可能是最佳的折中方案：


    > *物联网（IoT）是一个由联网物理对象组成的系统，这些对象包含嵌入式硬件和软件，用于感知物理世界（包括人类）或与之交互。*


    现在我们对物联网有了清晰的理解，让我们将其与一些相关概念区分开来。


    *   **M2M（机器对机器）通信：** 这个术语已经使用了一段时间；事实上，Eclipse M2M 是 Eclipse IoT 工作组的初始名称。随着工业计算的兴起，机器最初通过点对点连接进行连接。如今，工业网络在工厂中已司空见惯。M2M
    是一个植根于工业自动化的概念，与操作技术密切相关。


    *   **Web of Things（万维物联）：** [万维物联](https://www.w3.org/WoT/)（WoT）是来自[万维网联盟](https://www.w3.org/)（W3C）的一套标准，旨在实现“跨物联网平台和应用领域的轻松集成”。WoT
    严格专注于软件，其范围比物联网窄得多。[Eclipse Thingweb 项目](https://www.thingweb.io/)是 W3C WoT 工作组的官方参考实现。


    *   **工业 4.0：** 工业领域正在进行的数字化使一些人认为第四次工业革命正在进行中。“工业 4.0”这个名称指的就是这一点。M2M 和物联网代表了实现传统制造业和工业流程自动化的技术方法。最终，工业
    4.0 将导致能够通过人工智能（AI）自行决策的智能机器得到广泛采用。


    *   **工业物联网（IIoT）：** 这一点相对直接。IIoT 是将物联网技术应用于工业应用，例如制造业、资产跟踪和能源管理。IIoT 解决方案通常取代传统控制系统，旨在提高生产力和效率。


    最终，物联网设备必须将数据发送到某个地方；它们接收的命令必须有来源。云通常是数据的目的地和命令的来源；无论这个云是私有云、混合云还是公有云都无关紧要。然而，将物联网设备直接连接到云并不总是可能或可取的。因此，当代物联网解决方案通常依赖于边缘计算。

    '
- fmt: '# Edge Computing and IoT


    Edge computing is a form of distributed computing that brings compute, storage,
    and networking resources closer to the physical location where the data is produced
    and commands are executed. Its origins go back to the early days of computing.
    For example, the consoles used by the mission controllers during the Apollo era
    were not displaying live data streamed from the spacecraft. Three antennas in
    Australia, Spain, and the United States captured the telemetry and crunched it
    locally on `Univac 1230` mainframes before forwarding it to the `IBM S/360` driving
    the consoles in Houston. Figure [1-1](#524096_1_En_1_Chapter.xhtml#Fig1) illustrates
    the architecture.


    ![](images/524096_1_En_1_Chapter/524096_1_En_1_Fig1_HTML.jpg)


    An architecture comprised of `IBM S/360` meters `75` processes `2` kilobits per
    second, `Univac 1230` in Goldstone (CA), USA; `Univac 1230` in Fresnedillas, Spain;
    `Univac 1230` in Honeysuckle Creek, Australia; and `48` kilobits per second.


    **Figure 1-1** IT architecture of the Apollo Moon Missions (Credit: Eclipse Foundation)


    What makes edge computing different nowadays is that it does not rely directly
    on the Cloud Native and DevOps approaches but rather on adaptations to the Edge
    environment such as Edge Native and EdgeOps.


    For the time being, I would like to explain why edge computing technologies are
    so crucial to successful IoT implementations. Out of the many possible reasons,
    I think the following ones are the most compelling:


    * **Optimize bandwidth usage:** The emergence of 5G and affordable narrowband
    connectivity options – such as `Dash7`, `LoRaWAN`, and `Zigbee` – makes the deployment
    of IoT devices where they are needed simpler and more affordable. Many IoT use
    cases generate gigabytes or even terabytes of data every day. Transmitting the
    integrality of that data does not make sense from a cost perspective.


    * **Reduce latency:** The latency on most corporate and industrial networks is
    highly variable. Reaching to the Cloud over the public Internet adds a level of
    unpredictable latency. Deterministic local area networks provide a way to make
    latency predictable in a specific location, but Internet service providers cannot
    deliver that level of predictability. Low latency is vital to mission-critical
    and real-time uses cases. Suppose you are automating a power plant, a factory,
    or a self-driving vehicle. In that case, you cannot afford to have time-sensitive
    decisions made in the far-away Cloud due to the latency induced by the Internet.


    * **Support data sovereignty:** Data is subject to several layers of laws and
    regulations where it is collected, stored, and even processed. Data sovereignty
    describes the efforts made by several national or regional governments to protect
    the data of their citizens and corporations. In highly regulated industries, such
    as healthcare, this translates into encryption and data residency requirements;
    the data must be encrypted on the move and at rest and stored inside a specific
    geographical area. This area can be a building, a city, or maybe a state or province
    in the case of countries with a federal structure. Edge computing provides infrastructure
    that makes it easier for solutions to implement data sovereignty and data residency
    requirements.


    * **Implement reporting by exception:** The value of the data gathered by devices
    in IoT solutions is not always the same. It is essential to process every reading
    or archive it in a historian database for future reference for some use cases.
    For other use cases, the only readings that matter are those outside the normal
    thresholds of operation. In other words, only exceptions are reported. Developers
    can implement reporting by exception directly on the device driving the sensors.
    However, in scenarios involving complex data models, machine learning, and video
    analytics, it is better to offload such decisions to an edge node in the vicinity.
    Reporting by exception is especially useful when devices operate on battery power
    since it reduces the need to send data over the network, which is always a power-hungry
    operation.


    The takeaway of this section is this: edge computing is highly beneficial to most
    IoT solutions but the simplest one. This explains why the reference architecture
    places edge computing front and center.


    ## IoT Reference Architecture


    A large part of my job at the Eclipse Foundation is introducing newcomers to our
    IoT and edge computing technologies. At the time of writing, this represents over
    50 open source projects of all shapes and sizes. To help developers understand
    what is available, our community put together an IoT reference architecture, reproduced
    in Figure [1-2](#524096_1_En_1_Chapter.xhtml#Fig2).


    ![](images/524096_1_En_1_Chapter/524096_1_En_1_Fig2_HTML.jpg)


    An IoT reference architecture includes constrained devices, edges, IoT platforms,
    protocols, connectivity in the development tools, and concepts of security and
    hardware.


    **Figure 1-2** IoT reference architecture (Credit: Eclipse Foundation)


    One important fact about this diagram is that it does not represent a blueprint.
    The Eclipse community is a code-first community where developers come together
    to build components and platforms. The reference architecture is a map to the
    ecosystem they built, not some grandiose architectural vision that our committers
    and contributors followed. That said, let’s have a closer look at each of the
    significant parts of the architecture and the related Eclipse open source projects.'
