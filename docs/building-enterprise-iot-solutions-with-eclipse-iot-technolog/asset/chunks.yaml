  trans: '

    ### .NET


    传统上，微软的开发工具和运行时是专有的，并且仅支持 Windows 操作系统。这一情况在 2016 年随着 .NET Core（该框架的开源版本）的推出而改变。微软甚至成立了
    .NET 基金会，为其提供供应商中立的治理模式。这无疑激发了开源贡献者对其日益增长的兴趣。2020 年，微软宣布 .NET Core 将更名为 .NET，并且未来的所有工作都将集中在这个更名后的开源版本上。截至
    2022 年，可以在 Linux、macOS 和 Windows 上编写和部署针对 .NET 的代码。该运行时支持 C#、F# 和 Visual Basic
    编程语言。


    **注意**


    你可能仍然对 .NET 的更名感到困惑。这里有一个简单的方法来区分各个版本。在微软的资料中，专有的仅限 Windows 的 .NET 版本被称为 .NET
    Framework。当前版本是 4.8。开源的多平台版本被称为 .NET，即以前的 .NET Core。.NET 的 5.x 及更高版本指的是开源版本。


    从纯技术角度来看，.NET 是一个优秀的框架，C# 和 F# 语言的实现也是一流的。然而，开源物联网协议实现的可用性参差不齐。例如，Eclipse Paho
    MQTT 客户端的 C# 实现缺乏常规贡献者，并且不支持 MQTT v5。自然，完整的 .NET Core 运行时的大小在资源受限的设备上也是一个问题。此外，尽管
    .NET Core 是开源的并且采用供应商中立的治理模式，但微软在整个生态系统中仍然扮演着举足轻重的角色。


    ### Java SE 和 Jakarta EE


    Java 虚拟机（Java 标准版）和 Java 企业版（Java EE）运行时最初是作为 Sun Microsystems 的专有产品进入市场的。2007
    年，Sun 将 Java 标准版运行时和开发工具包开源，从而诞生了 OpenJDK。2018 年，Oracle 决定在 Eclipse 基金会将 Java
    企业版规范开源。由于 Oracle 决定保留原始 Java 企业版商标的所有权，该技术被更名为 Jakarta EE。


    **注意**


    如果你正在寻找预构建的 OpenJDK 二进制文件，可以查看 Adoptium 市场。该市场推广来自不同供应商、支持多种架构的高质量、经过 TCK 认证和
    AQAvit 验证的运行时。你可以在以下网址找到它：[`https://adoptium.net/marketplace`](https://adoptium.net/marketplace)。[Adoptium](https://adoptium.net/marketplace)
    是 Eclipse 基金会的一个工作组，其自身的 OpenJDK 发行版称为 [Eclipse Temurin](https://adoptium.net/temurin/)。


    尽管 Java 不像 1998 年左右那样流行，但其生态系统提供了大量高质量且成熟的物联网协议实现。在 Eclipse 基金会找到的许多开源物联网平台都是用
    Java 构建的。此外，Java 虚拟机支持除 Java 之外的语言，例如 Kotlin、Ruby 和 Scala。可以在利用现有 Java 库生态系统的同时使用这些语言。


    对 Java 的一个持续批评是虚拟机的启动时间，这使得该运行时不太适合实现部署到容器的无状态微服务。Java EE/Jakarta EE 运行时的庞大体积加剧了这个问题。多年来，人们做出了多项努力，以使
    Java SE 更加模块化并精简 Jakarta EE。后者一个很好的例子是 [Microprofile](https://microprofile.io/)，这是一个用于企业
    Java 微服务的开源规范。Microprofile 运行时实现仅包含完整 Jakarta EE 平台的一个严格子集，以支持 JSON REST 微服务。其他开源项目，例如
    Red Hat 的 [Quarkus](https://quarkus.io/)，会在构建时执行尽可能多的操作，以便在构建输出中仅包含运行时实际使用的类。Quarkus
    还强调通过 [GraalVM](https://www.graalvm.org/) 或其下游发行版 [Mandrel](https://github.com/graalvm/mandrel)
    编译为原生可执行文件。


    尽管其语法比更新的编程语言更冗长，但鉴于其广泛的支持和成熟度，Java 仍然值得你关注。Microprofile 和 Quarkus 等创新解决了它的一些弱点。如今，新语言版本的发布节奏更加可预测，并且开发过程是公开进行的。Java
    SE 和 Jakarta EE 有多个实现，其中许多是开源的。


    ### Node.js


    JavaScript 是万维网的核心技术之一。与 HTML 和 CSS 一样，其根源可以追溯到 20 世纪 90 年代。Netscape 的 Brendan
    Eich 最初设计了这种语言。几乎所有现代网站都使用 JavaScript，并且所有主流网络浏览器都拥有专门的 JavaScript 引擎来执行客户端逻辑。JavaScript
    遵循 ECMAScript 标准，该标准定义了脚本语言的核心特性。ECMAScript 不涵盖网络、存储或图形等 I/O 设施。大多数 JavaScript
    引擎自行提供此类功能。


    **注意**


    JavaScript 的语法类似于 Java，但这两种语言从未有过直接关系。Netscape 最初选择的名称是 LiveScript，在 1995 年 12
    月为了利用 Java 的市场势头而更改。更令人困惑的是，Sun Microsystems 将 JavaScript 名称注册为商标，而 Oracle 仍然拥有该商标。


    2009 年，随着 [Node.​js 运行时环境](https://nodejs.org/) 的出现，服务器端的 JavaScript 成为一个严肃的选择。Node.js
    是一个基于事件驱动架构构建的开源运行时，支持异步 I/O。Node.js 应用程序是解释执行的。该运行时可在大多数现代操作系统上使用，包括 Linux、macOS
    和 Windows。Node.js 仅支持 JavaScript，但有多种语言可以转译成它，例如 CoffeeScript、Dart、TypeScript
    等。Node.js 由 [OpenJS 基金会](https://openjsf.org/) 进行供应商中立的治理，该基金会隶属于 Linux 基金会。


    **注意**


    转译器是一种软件，它接收用一种语言编写的源代码，并生成用另一种语言编写的等效源代码。因此，例如，尽管 JavaScript 是弱类型语言，但 TypeScript
    拥有强大的类型系统。


    Node.js 在需要非阻塞 I/O 和异步请求处理的应用程序中表现出色。从这个角度来看，它非常适合物联网应用程序和微服务。旧版本在处理处理器密集型任务时存在问题，但第
    12 版中引入的工作线程缓解了这个问题。代码是解释执行的这一事实并不意味着性能更低或运行时占用空间更大。尽管 Node.js 的模块（包）生态系统非常庞大，但许多模块并未受益于及时的安全更新或定期维护。换句话说，一个模块在
    Node 的包管理器（NPM）索引中可用，并不意味着你应该盲目信任它。此外，涉及代码来源或不兼容许可证的知识产权问题并不少见。如果你使用 Node.js，你需要对你的直接和间接依赖项进行额外的审查。


    有适用于最流行物联网协议的 JavaScript 实现。在选择一个时，请确保它与你要使用的特定 Node.js 版本兼容。你还应尽可能彻底地检查所有直接和间接依赖项，以确保你可以信任它们的来源，并且使用的许可证彼此兼容。由于我们强大的知识产权管理流程，Eclipse
    基金会提供的 JavaScript 模块通常不会遇到此类问题。

    '
- fmt: '### Python


    Python is both a programming language and a runtime. It is the brainchild of Guido
    van Rossum, who started working on Python in the late 1980s and published its
    first release in 1991. Python is under the stewardship of the [Python Software
    Foundation](https://www.python.org/psf/), created in 2001.


    Like Java and .NET, Python is compiled to bytecode. The reference implementation
    of the runtime, [CPython](https://github.com/python/cpython), executes that bytecode
    on its virtual machine. Several alternate production-quality runtimes exist for
    Python: [Jython](https://www.jython.org/), written in Java for the Java virtual
    machine (JVM); [PyPy](https://pypy.org/), written in RPython and translated into
    C; and [IronPython](https://ironpython.net/), which is written in C#. Those alternate
    runtimes support the syntax and features of the Python version they emulate but
    may miss features or exhibit differences in behavior. Moreover, the [MicroPython](https://micropython.org/)
    and [CircuitPython](https://circuitpython.org/) variants possess runtimes optimized
    to run on microcontrollers. Be aware, however, that those alternate runtimes do
    not necessarily implement all the language features found in CPython; this impacts
    the compatibility of the libraries found in the ecosystem with a specific runtime.


    This wide variety of runtimes means that Python is one of the most widely available
    languages in the industry. CPython, for example, supports not only Linux, macOS,
    and Windows but also several less common operating systems such as AIX, FreeBSD,
    Solaris, and z/OS. The runtime variants targeted at resource-constrained environments
    extend the reach of Python further and even provide low-level access to hardware.
    However, Python is generally seen as unsuitable for computationally intensive
    applications. This, of course, depends on the actual runtime selected and how
    it is configured.


    Python offers a comprehensive standard library and an enormous ecosystem of third-party
    packages. It is a *de facto* standard in data science, and there are well-maintained
    implementations of all the IoT protocols mentioned in this book. The Python version
    of Eclipse Paho is even in the top 1% of most downloaded packages. Consequently,
    Python is well worth your attention as a runtime for IoT applications. However,
    the Python Package Index (PyPI) suffers from the same issues as NPM in the Node.js
    ecosystem: packages of dubious origins or lacking maintenance abound, and licensing
    or other IP issues are also frequent. In July 2022, the Python Software Foundation
    announced that the maintainers of packages identified as critical would need to
    use two-factor authentication (2FA) to prevent the hijacking of their code by
    malicious actors.^([^(63)](#fn63))


    ### Rust


    Rust, one of the most recent entries in this section, is a compiled programming
    language. It started in 2006 as a personal project of Graydon Hoare, an employee
    of Mozilla. The first numbered release of the compiler was released in 2012. Rust
    focuses on type safety and concurrency. Rust provides memory safety; all references
    point to valid memory at runtime. This is enforced at compilation time. Rust is
    owned and maintained by the Rust Foundation, created in 2021.


    Contrarily to the other languages mentioned in this section, Rust does not offer
    a runtime in the conventional sense. Parts of the Rust standard library, which
    is comprehensive, provide features usually associated with a runtime, such as
    a heap, backtraces, unwinding, and stack guards. The standard library (or crate,
    in Rust parlance) assumes the application will be deployed on a desktop-class
    or server-class operating system such as Linux. In addition, the Rust standard
    library also links to the C standard library. For applications deployed on bare
    metal microcontrollers, it is also possible to eschew the standard crate and link
    to the core crate instead. The core crate is a platform-agnostic subset of the
    standard crate and makes no assumptions about the system the program will execute
    on. Thus, Rust programs relying only on the core crate can be lower-level components
    such as bootloaders, firmware, or operating system kernels.


    Rust was included in this section due to its growing popularity in IoT and edge
    computing circles. Projects such as [Drogue IoT](https://www.drogue.io/) show
    Rust’s suitability to write applications for constrained devices, the Edge, or
    the Cloud. In Rust, packages of code are referred to as *crates*. Since Python
    and JavaScript have been around for much longer, their respective library ecosystem
    dwarfs Rust. However, there are well-maintained implementations for most IoT protocols.
    As a reminder, the core implementation of the Eclipse Foundation’s own [zenoh
    protocol](https://zenoh.io/) is written in Rust.


    ### WebAssembly


    WebAssembly (Wasm) differs from the other runtimes I discussed since it is not
    tied to any specific programming language. Its website describes it as “*a binary
    instruction format for a stack-based virtual machine*.” Announced in 2015, it
    saw its first release in 2017. WebAssembly became a [World Wide Web Consortium
    recommendation](https://www.w3.org/TR/2019/REC-wasm-core-1-20191205/)^([^(64)](#fn64))
    in 2019. A first public working draft for version 2.0 of the specification was
    published in April 2022.


    Initially, WebAssembly was designed as a memory-safe, sandboxed execution environment
    providing near-native code execution speed inside web browsers. However, the portability
    stemming from its use of a virtual machine made it attractive for other uses.
    There are now many general-purpose runtime implementations in the market that
    enable you to deploy WebAssembly code at the Edge or in the Cloud.


    WebAssembly implementations rely on ahead-of-time (AOT) or just-in-time (JIT)
    compilation. However, some leverage an interpreter. At the time of writing, approximately
    40 programming languages supported WebAssembly as a compilation target. The better-known
    options include C/C++, C#, F#, Go, Kotlin, Rust, and Swift. Independently of the
    original language used, WebAssembly code can be pretty-printed in a [textual format](https://webassembly.github.io/spec/core/text/conventions.html)
    defined by an attribute grammar.^([^(65)](#fn65))


    Since it is purely a runtime, the availability of libraries supporting your preferred
    IoT protocols will be determined by whichever programming language you select.
    Given developers’ growing interest in deploying WebAssembly code outside the browser,
    there is a burgeoning ecosystem of orchestration platforms targeted at Edge and
    Cloud environments. However, at this point, none has the maturity of the leading
    platforms for virtual machine or container orchestration. WebAssembly is nevertheless
    a strong contender if you wish to build portable, high-performance applications.
    I strongly recommend you experiment with a few open source runtime implementations
    to find one that suits your needs.


    ### How to Choose Your Runtime


    All the options I discussed are good choices for building Edge and IoT Cloud applications
    with a robust ecosystem of open source libraries. You cannot go wrong with any
    of them. Ultimately, you should go with programming languages you are comfortable
    with and that make you productive. Naturally, the availability of developers with
    the required skill set is also a consideration. From a forward-looking standpoint,
    you should seriously look at Rust and WebAssembly if possible. The memory safety
    features of the former make it more secure than alternatives, while the latter
    provides application portability. Whatever option you choose, just ensure you
    rely on dependencies that are of reputable origin and at least receive timely
    security updates. Attention to IP and licensing issues will also pay off over
    the long term.'
