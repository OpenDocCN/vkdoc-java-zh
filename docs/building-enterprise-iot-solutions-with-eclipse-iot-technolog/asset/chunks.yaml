  trans: "\n## 主题命名空间\n\nSparkplug 主题命名空间的目标是以逻辑清晰且简洁的方式组织从边缘节点和设备接收到的数据。主题层级结构如下所示：\n\
    \n```\nnamespace/group_id/message_type/edge_node_id/[device_id]\n```\n\n接下来我将解释层级结构中每个元素的含义。\n\
    \n### 命名空间\n\n命名空间元素是一个常量，用于表示所使用的 Sparkplug 版本。它向消息消费者表明主题层级中其他级别的结构以及有效载荷数据的编码方式。在撰写本文时，命名空间元素如下所示：\n\
    \n```\nspBv1.0\n```\n\n其采用的结构是\n\n```\nsp[有效载荷编码方案][有效载荷编码方案版本]\n```\n\n因此，本章的其余部分将描述有效载荷编码方案“`B`”的\
    \ v`1.0` 版本，也称为 *Sparkplug B*。\n\n注意\n\nSparkplug 规范的第一个版本定义了有效载荷编码方案“`A`”。然而，实现者发现了一些问题，它很快就被有效载荷编码方案“`B`”所取代。有效载荷编码方案“`A`”已停止使用，并且不再记录在规范中。请勿使用它。\n\
    \n### 组 ID\n\n主题命名空间的组 ID 元素用于逻辑上对边缘节点进行分组。它必须是一个有效的 UTF-8 MQTT 字符串；因此，它不能包含主题过滤器通配符（“`+`”和“`#`”），也不能包含主题级别分隔符“`/`”。\n\
    \n规范建议使用描述性的组 ID 名称，但应尽可能简短。\n\n### 消息类型\n\nSparkplug 规范定义了多种消息类型。这模仿了 MQTT 数据包的定义方式。由于其结构，主题命名空间根据消息的类型对其进行分类。我将在下一节详细讨论消息类型。\n\
    \n### edge_node_id\n\n此元素是基础设施中边缘节点的 ID。它必须是一个有效的 UTF-8 MQTT 字符串。规范规定，组 ID 和边缘节点\
    \ ID 的组合必须是唯一的。它还建议尽可能保持边缘节点 ID 简短，因为它们会随每条发布的消息一起传输。\n\n### device_id\n\n设备 ID\
    \ 用于标识物理或逻辑上连接到边缘节点的设备。这是命名空间中的一个可选元素，因为某些消息的目标是边缘节点，而不是特定设备。如果使用设备 ID，则它必须在边缘节点的范围内是唯一的。它必须是一个有效的\
    \ UTF-8 MQTT 字符串。\n\n内置 Sparkplug 支持的设备可以决定将自己呈现为边缘节点而不是设备。在这种情况下，它们不会生成或处理与设备相关的消息，也不会使用设备\
    \ ID。\n\n## 消息类型\n\nSparkplug 定义并记录了多种类型的消息。使用这些消息，主机应用程序可以：\n\n*   发现元数据并监控连接到\
    \ MQTT 基础设施的所有边缘节点和设备的状态\n*   发现设备或边缘节点收集的所有指标，包括诊断信息、属性、元数据和当前状态值\n*   如果实施的安全模型允许，可以向任何边缘节点或设备指标发出命令消息\n\
    \n以下是 Sparkplug 消息类型的完整列表，以及对其内容的简要说明：\n\n*   **NBIRTH****：** Sparkplug 边缘节点的出生证书。该消息列出了边缘节点本身将报告的所有内容（节点指标），但不包括设备指标。至少，它将包含每个指标的指标名称、数据类型和当前值。\n\
    \n*   **NDEATH****：** Sparkplug 边缘节点的死亡证书。此消息在客户端连接时被设置为遗嘱消息。有效载荷包含一个关联标识符，使主机应用程序能够匹配出生证书和死亡证书。收到后，主机应用程序将把该节点的指标值标记为过时。\n\
    \n*   **NDATA****：** 边缘节点数据消息。这些消息的有效载荷包含需要报告给订阅客户端的边缘节点指标值，因为这些值已更改。有效载荷中可以包含一个或多个指标。\n\
    \n*   **NCMD****：** 边缘节点命令消息。此类消息用于为边缘节点上的指标写入新值。\n\n*   **DBIRTH****：** 设备的出生证书。主机应用程序仅在收到相关的\
    \ `DBIRTH` 时才会创建或更新设备的指标结构。除了值指标外，DBIRTH 消息还可以包含设备控制指标和设备属性的定义。设备控制指标用于诸如重启或设置扫描速率等任务。设备属性可以记录设备的制造商、型号和固件版本等信息。\n\
    \n*   **DDEATH****：** 设备的死亡证书。边缘节点发送此消息以向主机应用程序指示设备不可用。收到后，主机应用程序将把该设备的指标值标记为过时。\n\
    \n*   **DDATA****：** 设备数据消息。这些消息的有效载荷包含需要报告给订阅客户端的设备指标值，因为这些值已更改。有效载荷中可以包含一个或多个指标。\n\
    \n*   **DCMD****：** 设备命令消息。此类消息用于为设备上的指标写入新值。\n\n*   **STATE****：** Sparkplug\
    \ 主机应用程序状态消息。此消息类型用于主机应用程序的出生证书和死亡证书。出生证书将是主机应用程序上线时发送的第一条消息。它将是一条保留消息，通过 QoS\
    \ 级别 1 传递，有效载荷为 UTF-8 字符串“`ONLINE`”。至于死亡证书，它只是将有效载荷替换为字符串“`OFFLINE`”，并在 MQTT `CONNECT`\
    \ 数据包中注册为主机应用程序的 MQTT 遗嘱消息。\n\n    `STATE` 消息发布在它们自己的主题层级中。使用的结构是：`/STATE/sparkplug_host_application_id`。应用程序\
    \ ID 是任意的，但对于基础设施中的每个 Sparkplug 主机应用程序必须是唯一的。\n\n## 有效载荷定义\n\nSparkplug 的有效载荷定义使应用程序构建者和设备制造商能够以非常灵活的方式传输值及其元数据。\n\
    \n在技术层面，Sparkplug 规范的作者选择 [Google Protocol Buffers](https://developers.google.com/protocol-buffers)\
    \ 作为结构化 Sparkplug 有效载荷以及处理其序列化和反序列化的解决方案。Protocol Buffers 是一种语言中立、平台中立、可扩展的机制，用于序列化结构化数据。协议缓冲区数据使用领域特定语言进行结构化，并存储在\
    \ `.proto` 文件中。Google 提供了一个编译器，用于从这些文件生成数据访问类。\n\nSparkplug 规范包含一份以 `.proto` 格式呈现的\
    \ Sparkplug 有效载荷的完整副本。Eclipse Tahu 项目[在其仓库中也有一份副本](https://github.com/eclipse/tahu/blob/master/sparkplug_b/sparkplug_b.proto)。\n\
    \n注意\n\n你在 Sparkplug 中看到的任何时间戳属性都是一个无符号 64 位整数，表示自 UNIX 纪元（1970 年 1 月 1 日，UTC）以来的毫秒数。\n\
    \n以 JSON 表示的有效载荷的顶层结构如下所示：\n\n```\n{\n\"timestamp\": 1641948773752,\n\"metrics\"\
    : [],\n\"seq\": 1,\n\"uuid\": \"base64png\",\n\"body\": \"an array of bytes\"\n\
    }\n```\n\n可选的 uuid 表示一个模式或任意信息，使消息接收者能够解析 `body` 属性。body 是一个字节数组，可以接受任何二进制编码的数据。\n"
- fmt: '# Metrics


    Sparkplug metrics are simply key/value/data type values. You can add optional
    metadata and key/value properties to them. Here is an example:


    ```

    {

    "name": "exterior_temperature",

    "alias": 130870,

    "timestamp": 1641950175801,

    "datatype": "Int8",

    "is_historical": false,

    "is_transient": false,

    "is_null": false,

    "metadata": {},

    "properties": {},

    "value": 23

    }

    ```


    In this case, I left `metadata` and `properties` empty, so you could visualize
    where they go. The metadata property can describe binary data transferred through
    Sparkplug messages, especially files.


    Sparkplug payloads can also contain DataSets and Templates. DataSets are used
    to encode data matrices. To define one, you need to provide the number of columns,
    their names, and their types in addition to the data itself. As for templates,
    they allow you to define your custom data types. This makes the Sparkplug payload
    encoding flexible and extensible.


    ## Session Management


    Session management is one of the core features of Sparkplug. The specification’s
    authors explain why this feature is so important:


    > *Due to the nature of real time SCADA solutions, it is very important for the
    Primary Host Application and all connected Eclipse Sparkplug Edge Nodes to have
    the MQTT Session STATE information for each other. In order to accomplish this
    the Sparkplug Topic Namespace definitions for Birth/Death Certificates along with
    the defined payloads provide both state and context between the Primary Host Application
    and the associated Edge Nodes.*^([^(17)](#fn17))


    That said, the main difference between a Primary Host Application and any other
    Sparkplug Host Application is that the edge nodes will check that the Primary
    Host Application is online before starting to publish data. Note the Primary Host
    is identified by each edge node. For example, within a given Sparkplug infrastructure,
    one edge node’s Primary Host may be different from another’s.


    ## Example


    Suppose I wish to migrate the *Musée du Louvre* to Sparkplug. How would things
    look? As a reminder, I was reporting temperature and humidity values from rooms
    located on various floors. The topic structure for a sample sensor would be


    ```

    /Louvre/2/201/humidity

    ```


    Here, the two biggest factors are the number and location of our edge nodes. Do
    we have one node per room? One per floor? Given that we have only two sensors
    per room, I assume we have one edge node per floor. Given this, the Edge Node
    ID can represent the floor, and the device ID can convey the room.


    What about the group ID, then? In this case, I am deploying at the *Louvre,* but
    the *Musée des Beaux-Arts du Canada* (MBAC) is next. So I will use Louvre as the
    group ID.


    All right. With that decided, let’s see the topics for our Host Application, Edge
    Nodes, and Devices.


    ### Host Application


    Suppose the Host Application here is called `GLaDOS`. In this case, we could use
    this for the application ID. The topic will be


    ```

    STATE/GLaDOS

    ```


    ### Edge Nodes


    I decided to have one edge node per floor and use the node ID to represent the
    floor number. The topics for my edge nodes will then follow this pattern:


    ```

    spBv1.0/Louvre/message_type/floor

    ```


    Or more concretely for the first floor’s edge node:


    ```

    spBv1.0/Louvre/NBIRTH/1

    spBv1.0/Louvre/NDEATH/1

    spBv1.0/Louvre/NDATA/1

    spBv1.0/Louvre/NCMD/1

    ```


    ### Devices


    For the sake of this example, I will suppose that my temperature and humidity
    sensors are different devices connected to the edge node for their floor. To keep
    things simple, I will assume each of them exposes a single process variable. Real-world
    devices usually expose hundreds or even thousands of variables. I want to convey
    the room number through the device name. The topic pattern would be this:


    ```

    spBv1.0/Louvre/message_type/floor/device

    ```


    So for room 101, I would have this:


    ```

    spBv1.0/Louvre/DBIRTH/1/temp-101

    spBv1.0/Louvre/DDEATH/1/temp-101

    spBv1.0/Louvre/NDATA/1/temp-101

    spBv1.0/Louvre/NCMD/1/temp-101

    spBv1.0/Louvre/DBIRTH/1/hum-101

    spBv1.0/Louvre/DDEATH/1/hum-101

    spBv1.0/Louvre/NDATA/1/hum-101

    spBv1.0/Louvre/NCMD/1/hum-101

    ```


    Now, the only thing we need to do is send some data over the wire. The `DBIRTH`
    payload could look like this:


    ```

    {

    "timestamp": 1641940113424,

    "metrics": [ {

    "name": "temp-value",

    "alias": 1,

    "timestamp": 1641940113424,

    "dataType": "Int8",

    "value": -24,

    "transient": false,

    "null": false,

    "historical": false

    }],

    "seq" : 1,

    "metricCount" : 1

    }

    ```


    Here is a Sparkplug payload for the `DDATA` message of our temperature sensor:


    ```

    {

    "timestamp": 1641940114576,

    "metrics": [{

    "name": "",

    "alias": 1,

    "timestamp": 1641940024394,

    "dataType": "Int8",

    "value": -25

    }],

    "seq": 1

    }

    ```'
