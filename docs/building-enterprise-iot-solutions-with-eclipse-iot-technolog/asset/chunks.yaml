    Naturally, given Arm’s focus on hardware intellectual property licensing, the
    features of Mbed are highly dependent on what Cortex-M cores offer. However, other
    components, such as the wireless radios and the True Random Number Generator (TRNG),
    also play a crucial part. Since MCUs based on Cortex-M can greatly vary in layout
    and capabilities, support for a particular board is usually provided through a
    *board support pack* maintained by the hardware vendor.


    Note


    The TRNG comprises several sub-blocks in the integrated circuit making up the
    MCU that collaborate to generate cryptographically secure random numbers.


    Mbed OS exposes two sets of APIs (named developer interfaces in Figure [10-1](#524096_1_En_10_Chapter.xhtml#Fig1))
    to abstract the hardware details from the OS''s upper layers. The first one is
    the [Common Microcontroller Software Interface Standard (CMSIS)](https://developer.arm.com/tools-and-software/embedded/cmsis):
    a vendor-independent abstraction layer for microcontrollers based on Arm Cortex
    cores. The second is the Mbed driver model that you can leverage when writing
    new drivers. Together, those two APIs make the Mbed OS hardware abstraction layer
    (HAL). This foundation facilitates writing applications since it provides libraries
    and drivers for standard MCU peripherals, such as I²C, Bus, and SPI. Because of
    the HAL, you can write applications in C and C++ that will run on any Mbed OS`–`enabled
    board.


    Mbed OS can be configured to conform to two distinct profiles. The *full* profile
    is an RTOS that includes [Keil RTX](https://www2.keil.com/mdk5/cmsis/rtx) and
    all the relevant RTOS APIs. This profile supports deterministic, multithreaded,
    real-time applications. Drivers and applications can leverage threads, semaphores,
    mutexes, and other RTOS features. The other profile is called *bare metal* and
    focuses on minimizing code size. It only implements a subset of the Mbed OS RTOS
    APIs useful in nonthreaded applications, such as semaphores and tickers. Consequently,
    all activities are polled or driven by interrupts under the bare metal profile.


    Note


    Kiel is a subsidiary of Arm based in Germany. It provides a broad range of development
    tools (compilers, assemblers, debuggers, IDEs) supporting Arm hardware and evaluation
    boards.


    The remainder of the high-level Mbed OS APIs belong to the four following categories:


    *   **Storage**: Mbed OS supports a wide array of filesystems. One is LittleFS,
    a high-integrity embedded filesystem optimized to run on limited amounts of RAM.
    It is resilient to power losses and ensures data integrity. Support for the popular
    FAT filesystem ensures interoperability with most other operating systems. Mbed
    can also manage block storage, enabling the creation of raw storage volumes.


    *   **Security**: Out of the box, Mbed OS supports cryptography and can manage
    X.509 certificates. It also provides TLS and DTLS implementations that enable
    encrypted communications for applications.


    *   **Connectivity**: Mbed OS supports TCP/IP through a port of the [lwIP project](http://www.nongnu.org/lwip/2_1_x/index.html),
    a small independent implementation of the TCP/IP protocol suite. The OS can work
    with two mesh networking technologies: Bluetooth BLE and Wi-SUN. The Wi-SUN Field
    Area Network (FAN) is based on open standards from IEEE 802, IETF, ANSI/TIA, and
    ETSI. The Mbed OS Wi-SUN stack is built on 6LoWPAN, which relies on IEEE 802.15.4\.
    Mbed OS also supports NFC (for contactless payments and access control) and LoRaWAN.


    *   **Management**: Mbed OS ships with management APIs that enable over-the-air
    firmware updates. To leverage this feature, you need to use the Mbed OS`–`provided
    bootloader on your device.


    The tooling ecosystem for Mbed OS is extensive. You can build applications using
    Arm’s commercial C/C++ compiler (Arm Compiler) or the GNU Arm Embedded toolchain.
    In terms of development tools, you have three main options at your disposal:


    *   **Arm Keil Studio****:**^([^(50)](#fn50)) A free-to-use, browser-based IDE.
    It supports Mbed OS projects and other CMSIS-compliant targets such as FreeRTOS.
    Keil Studio is the successor to the Arm Mbed Online Compiler, which was deprecated
    at the end of 2021.


    *   **Mbed CLI 2****:**^([^(51)](#fn51)) A command-line environment using the
    Ninja build system and CMake to create the build environment and manage the build
    process independently of the compiler.


    *   **Mbed Studio****:**^([^(52)](#fn52)) A desktop IDE for Windows, Linux, and
    macOS.


    It is also possible to work on Mbed OS projects using several third-party development
    tools.^([^(53)](#fn53))


    Note


    Both Keil Studio and Mbed Studio integrate technology from the [Eclipse Theia
    project](https://theia-ide.org/). Theia provides an extensible platform to build
    Cloud and desktop IDEs.


    Mbed OS is a strong choice if you want to leverage MCUs based on the Cortex-M
    line. However, Arm remains firmly in control of the project. The lack of vendor-neutral
    governance around the OS is certainly a concern from a community perspective.'
  trans: '

    ### Arm Mbed OS


    鉴于基于 Cortex-M 架构的微控制器非常流行，你看到我在此介绍 Arm 的 RTOS 可能并不意外。Arm Mbed OS 于 2009 年首次发布，是一款面向基于
    Cortex-M MCU 的物联网设备的开源操作系统。该项目在[GitHub 上公开开发](https://github.com/ARMmbed/mbed-os)^(⁴⁸)，由
    Arm 及其硬件合作伙伴共同管理。代码采用 Apache 许可证 2.0 版授权，这使得它非常适合开源和商业项目。在撰写本文时，Mbed OS 的当前版本为
    v6.15.1，于 2021 年 11 月发布。


    Mbed OS 的架构高度模块化，如图 10-1 所示。


    ![](img/524096_1_En_10_Fig1_HTML.jpg)


    该架构包括合作伙伴组件、开放实现、开发者接口、用户应用程序、Mbed OS 各层、Mbed HAL、硬件、OS 核心 API、存储与安全 API 以及连接
    API。


    图 10-1


    Arm Mbed OS 6 架构（图片来源：Arm^(⁴⁹)）


    请注意，此图是对 Arm 提供的示意图的简化。具体来说，我移除了与 Trusted-Firmware Cortex-M 技术相关的细节。这些技术，连同某些
    Cortex-M 内核中的 TrustZone 指令，通常用于创建可信执行环境（TEE）实例，以保护加载其中的代码和数据的机密性与完整性。


    自然，鉴于 Arm 专注于硬件知识产权许可，Mbed 的特性高度依赖于 Cortex-M 内核所提供的功能。然而，其他组件，如无线射频和真随机数生成器（TRNG），也起着至关重要的作用。由于基于
    Cortex-M 的 MCU 在布局和功能上差异很大，对特定开发板的支持通常通过由硬件供应商维护的*板级支持包*来提供。


    注意


    TRNG 由构成 MCU 的集成电路中的多个子模块组成，这些子模块协同工作以生成加密安全的随机数。


    Mbed OS 提供了两组 API（在图 10-1 中称为开发者接口），用于向 OS 上层抽象硬件细节。第一组是[通用微控制器软件接口标准（CMSIS）](https://developer.arm.com/tools-and-software/embedded/cmsis)：一个面向基于
    Arm Cortex 内核的微控制器的、与供应商无关的抽象层。第二组是 Mbed 驱动模型，你可以在编写新驱动程序时加以利用。这两组 API 共同构成了 Mbed
    OS 硬件抽象层（HAL）。这一基础层简化了应用程序的编写，因为它为标准 MCU 外设（如 I²C、总线、SPI）提供了库和驱动程序。借助 HAL，你可以用
    C 和 C++编写应用程序，这些程序将能在任何支持 Mbed OS 的开发板上运行。


    Mbed OS 可以配置为符合两种不同的配置文件。*完整*配置文件是一个包含[Keil RTX](https://www2.keil.com/mdk5/cmsis/rtx)和所有相关
    RTOS API 的 RTOS。此配置文件支持确定性、多线程、实时的应用程序。驱动程序和应用程序可以利用线程、信号量、互斥锁以及其他 RTOS 特性。另一种配置文件称为*裸机*，专注于最小化代码体积。它仅实现了
    Mbed OS RTOS API 的一个子集，这些 API 在非线程应用程序中很有用，例如信号量和定时器。因此，在裸机配置文件下，所有活动都通过轮询或中断驱动。


    注意


    Keil 是 Arm 在德国的子公司。它提供广泛的开发工具（编译器、汇编器、调试器、IDE），支持 Arm 硬件和评估板。


    其余的高级 Mbed OS API 属于以下四个类别：


    *   **存储**：Mbed OS 支持多种文件系统。其中之一是 LittleFS，一个针对在有限 RAM 上运行而优化的高完整性嵌入式文件系统。它能抵抗断电并确保数据完整性。对流行的
    FAT 文件系统的支持确保了与大多数其他操作系统的互操作性。Mbed 还可以管理块存储，从而能够创建原始存储卷。


    *   **安全**：Mbed OS 开箱即用地支持加密技术，并能管理 X.509 证书。它还提供了 TLS 和 DTLS 实现，使应用程序能够进行加密通信。


    *   **连接**：Mbed OS 通过移植的[lwIP 项目](http://www.nongnu.org/lwip/2_1_x/index.html)支持
    TCP/IP，lwIP 是 TCP/IP 协议栈的一个小型独立实现。该操作系统可与两种网状网络技术配合使用：蓝牙 BLE 和 Wi-SUN。Wi-SUN 场域网（FAN）基于
    IEEE 802、IETF、ANSI/TIA 和 ETSI 的开放标准。Mbed OS 的 Wi-SUN 协议栈构建于 6LoWPAN 之上，而 6LoWPAN
    又依赖于 IEEE 802.15.4。Mbed OS 还支持 NFC（用于非接触式支付和访问控制）和 LoRaWAN。


    *   **管理**：Mbed OS 附带管理 API，支持空中固件更新。要利用此功能，你需要在设备上使用 Mbed OS 提供的引导加载程序。


    Mbed OS 的工具生态系统非常丰富。你可以使用 Arm 的商业 C/C++编译器（Arm Compiler）或 GNU Arm 嵌入式工具链来构建应用程序。在开发工具方面，你有三个主要选择：


    *   **Arm Keil Studio**^(⁵⁰)：一个免费使用的、基于浏览器的 IDE。它支持 Mbed OS 项目以及其他符合 CMSIS 标准的目标，如
    FreeRTOS。Keil Studio 是 Arm Mbed 在线编译器的后继产品，后者已于 2021 年底弃用。


    *   **Mbed CLI 2**^(⁵¹)：一个命令行环境，使用 Ninja 构建系统和 CMake 来创建构建环境并独立于编译器管理构建过程。


    *   **Mbed Studio**^(⁵²)：适用于 Windows、Linux 和 macOS 的桌面 IDE。


    也可以使用多种第三方开发工具来处理 Mbed OS 项目。^(⁵³)


    注意


    Keil Studio 和 Mbed Studio 都集成了来自[Eclipse Theia 项目](https://theia-ide.org/)的技术。Theia
    提供了一个可扩展的平台，用于构建云 IDE 和桌面 IDE。


    如果你想利用基于 Cortex-M 系列的 MCU，Mbed OS 是一个强有力的选择。然而，Arm 仍然牢牢控制着该项目。从社区角度来看，缺乏围绕该操作系统的供应商中立治理机制无疑是一个令人担忧的问题。

    '
- fmt: '### FreeRTOS


    `FreeRTOS` has been for a long time the dominant RTOS in the market for constrained
    devices, open source or not. In the [2021 edition of the Eclipse IoT and Edge
    Developer Survey](https://outreach.eclipse.foundation/iot-edge-developer-2021),
    close to 30% of respondents stated they are using it. Part of the reason for its
    popularity is its longevity. The `FreeRTOS` kernel was created by Richard Barry
    around 2003 and was later maintained by Barry''s company, Real Time Engineers.
    In 2017, the stewardship of the project was passed to Amazon Web Services (AWS).
    Barry is still involved as an AWS employee. Most of `FreeRTOS` is written in C,
    although assembly language is used in architecture-specific scheduler routines.
    At the time of writing, the latest version of the kernel was `v10.4.6`, released
    in November 2021. The latest version of the full OS package, including sample
    projects and additional libraries, was `v202112.00`. The kernel and all other
    components maintained by the `FreeRTOS` team are available under the [MIT license](https://opensource.org/licenses/MIT).


    `FreeRTOS` enjoys broad hardware support. At the time of writing, there were 24
    hardware partners listed on the `FreeRTOS` site, and the open source community
    supports several other platforms. The team considers each architecture and compiler
    combination to be a separate port. The ports belong to one of the four following
    categories:


    - Ports created and maintained by the `FreeRTOS` team (officially supported ports)

    - Ports contributed by a partner and maintained by the `FreeRTOS` team

    - Ports contributed by a partner and maintained by the partner

    - Community-supported ports


    Those ports are maintained in separate Git repositories but are exposed as submodules
    in the [main FreeRTOS repository](https://github.com/FreeRTOS/FreeRTOS). Long-Term
    Support (LTS) releases only contain ports the `FreeRTOS` team maintains. Moreover,
    commercial support is available, but only for officially supported ports.


    The `FreeRTOS` team does not provide ship development tools directly. Most of
    the demos in the project’s main Git repository are configured to use the [Eclipse
    IDE](https://eclipseide.org/release/) and specifically the [Eclipse CDT](https://www.eclipse.org/cdt/)
    (C/C++ Development Tooling) edition. Using the specialized [Eclipse Embedded CDT](https://eclipse-embed-cdt.github.io/)
    edition, which comes with plugins to create, build, and manage applications targeting
    Arm and RISC-V platforms, is also possible. Many hardware providers also ship
    their own IDEs based on Eclipse IDE or Eclipse Theia. Naturally, given the simplicity
    of the code base, most IDEs supporting the C language can be used.


    Compared to the other OSes I cover in this section, the structure of `FreeRTOS`
    is very simple. The team maintains three specific sets of libraries besides the
    kernel itself. Let’s have a closer look at those four components.


    #### FreeRTOS Kernel


    The `FreeRTOS` kernel requires minimal resources. A typical binary image will
    typically weigh between 6 and 12 KiB. The core implementation is simple since
    it is contained in only three C files.


    `FreeRTOS` provides primitives to manipulate tasks, mutexes, semaphores, and software
    timers. Developers can specify thread priorities. The kernel supports static memory
    allocations. Dynamic allocation is also possible, and the kernel ships with five
    sample memory management schemes. Those five schemes are as follows:


    - **heap_1**: The kernel will allocate memory, but it cannot be freed.

    - **heap_2**: The kernel will allocate and free memory but will not merge freed
    memory blocks with adjacent free blocks. This scheme is a legacy one, and `heap_4`
    is preferred.

    - **heap_3**: The kernel will rely on the `malloc()` and `free()` implementations
    exposed by the standard C library provided with your compiler. Those calls are
    wrapped for thread safety.

    - **heap_4**: The kernel will allocate and free memory. It will also merge freed
    memory blocks with adjacent free blocks to avoid fragmentation.

    - **heap_5**: The kernel will manage memory like in `heap_4` and can spread the
    heap across noncontiguous areas.


    Of course, you could also provide your own memory management implementation. The
    choice between static and dynamic memory allocation will come down to whether
    you favor simplicity and, potentially, lower memory usage over control of memory
    locations.


    As you can imagine, the functional scope of the `FreeRTOS` kernel is very small,
    given its size. Fortunately, the team also provides several libraries implementing
    useful connectivity and security features.


    #### FreeRTOS+ Libraries


    The libraries in this set have a dependency on the `FreeRTOS` kernel. At the time
    of writing, there were two libraries in the `FreeRTOS+` category:


    - **FreeRTOS+TCP**: A complete TCP/IP stack exposing a re-entrant and thread-safe
    API based on the widespread Berkeley sockets interface. It includes DHCP and DNS,
    among other features. An optional callback interface is also available. The code
    size with all features enabled varies between 20.1 and 34.9 KiB, depending on
    the compiler optimizations selected.

    - **FreeRTOS+CLI**: A small and extensible framework to add a command-line interface
    (CLI) to your `FreeRTOS` applications.


    A third library, `FreeRTOS+IO`, provided a POSIX-like API to peripheral driver
    libraries but has been deprecated.'
