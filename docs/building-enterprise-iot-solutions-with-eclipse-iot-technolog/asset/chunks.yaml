    *   Resource operations: Creation, retrieval, update, deletion, and configuration


    *   Resource observation and notification


    *   Data serialization formats: TLV, JSON, Plain Text, and Opaque


    *   UDP and SMS transports


    *   DTLS-based security


    *   Queue mode (for sleeping devices)


    *   Core LwM2M objects: LwM2M Security, LwM2M Server, Access Control, Device,
    Connectivity Monitoring, Firmware Update, Location, Connectivity Statistics


    ### LwM2M v1.1 (June 2018)


    LwM2M added several features to v1.0:


    *   Improved bootstrapping allowing for incremental upgrades


    *   Improved support for Public Key Infrastructure (PKI) deployments


    *   Enhanced registration sequence mechanisms


    *   Support for LwM2M over TCP/TLS to better support firewalls and NAT


    *   Support for OSCORE-based application layer security


    *   Improved support for low-power WANs, notably 3GPP CIoT and LoRaWAN


    *   Support for JSON using SenML with CBOR serialization


    *   New data types


    ### LwM2M v1.2 (November 2020)


    LwM2M is backward-compatible with v1.0 and v1.1 at the level of mandatory features.
    It introduced the following new features:


    *   Support for MQTT and HTTP as transports.


    *   Optimized bootstrapping, registration, and information interfaces.


    *   Support for LwM2M gateways, allowing the integration and management of non-LwM2M
    devices.


    *   New optimized serialization format based on CBOR: LwM2M CBOR.


    *   Enhanced functionality for firmware updates.


    *   Definition of new notification attributes (edge, confirmable notification,
    and maximum historical queue).


    *   TLS and DTLS v1.3 are now supported.


    ## LwM2M Protocol Stack


    The LwM2M protocol stack varies according to the version considered. I will focus
    on the stack for version 1.2 here since it is the most comprehensive.


    ![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig1_HTML.jpg)


    An illustration includes application, objects, L w M 2 M, H T T P, M Q T T, C
    o A P, OSCORE, T L S, T C P, T C P, D T L S, U D P, S M S, C I o T, S M S on device
    and smartcard, U D P, L o R a, and C I o T.


    Figure 3-1


    LwM2M 1.2 protocol stack (Credit: OMA SpecWorks)


    In versions before 1.2, LwM2M systematically relied on CoAP as its transport.
    However, LwM2M always supported a choice of low-level transports to run CoAP on.
    Initially, the selection was limited to UDP and *Short Message Service* (SMS)
    over cellular networks. Support for TCP was added in version 1.1 to offer better
    integration with firewalls and to support NAT traversal scenarios. Version 1.1
    also introduced options for CoAP over non-IP protocols, namely, *Cellular Internet
    of Things* (CIoT) from the *3rd Generation Partnership Project* (3GPP) and *LoRaWAN*.
    Developers can leverage the OSCORE security model in version 1.1 and up of LwM2M,
    independently of the low-level transport selected.


    Version 1.2 decoupled LwM2M from CoAP, introducing HTTP and MQTT as alternate
    transports. In all versions, security is based on DTLS or TLS, depending on the
    transport used.


    ## Eclipse Leshan


    The Eclipse Leshan project provides Java libraries that you can use to build your
    own LwM2M clients and servers or to add LwM2M support to existing platforms. The
    project has existed since 2014 and uses Eclipse Californium as its CoAP implementation.
    Leshan is made available under the [Eclipse Public License v2.​0](https://www.eclipse.org/legal/epl-2.0/)
    and the [Eclipse Distribution License v1.​0](https://www.eclipse.org/org/documents/edl-v10.php)
    (BSD).


    The official web resources for Leshan are as follows:


    *   **Website:** [`https://eclipse.org/leshan`](https://eclipse.org/leshan)


    *   **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.leshan`](https://projects.eclipse.org/projects/iot.leshan)


    *   **Code repository:** [`https://github.com/eclipse/leshan`](https://github.com/eclipse/leshan)


    *   **Wiki:** [`https://github.com/eclipse/leshan/wiki`](https://github.com/eclipse/leshan/wiki)


    The Leshan project team also maintains a demo client, server, and bootstrap server.
    Those are valuable examples of utilizing the Leshan API and can also be used for
    troubleshooting or testing purposes.


    At the time of writing, Leshan had two main versions under active maintenance:


    *   **Version 1.x.** These series implement v1.0.2 of the LwM2M specification.


    *   **Version 2.x.** These series implement v1.1.1 of the LwM2M specification.


    The Leshan wiki describes for each version which LwM2M features they support.


    ### Sandbox Server


    The team of the Leshan project maintains a pair of publicly available servers
    that you can use for demo and testing purposes. Those servers always run the last
    successful build from the `master` branch.


    *   **LwM2M server:** [`https://leshan.eclipseprojects.io/`](https://leshan.eclipseprojects.io/).
    Use port `5683` for `coap` and `5684` for `coaps`.


    *   **Bootstrap server:** [`https://leshan.eclipseprojects.io/bs/`](https://leshan.eclipseprojects.io/bs/).
    Use port `5783` for `coap` and port `5784` for `coaps`.


    If you would rather use C than Java for building your LwM2M solution, [Eclipse
    Wakaama](https://www.eclipse.org/wakaama/) is a C implementation of LwM2M designed
    to be portable on POSIX-compliant systems.'
  trans: '

    ### 设备管理与服务启用


    服务器通过设备管理与服务启用接口，访问已注册客户端暴露的对象实例和资源。该接口定义了用于实现此目的的具体操作：`Create`、`Read`、`Read-Composite`、`Write`、`Write-Composite`、`Delete`、`Execute`、`Write-Attributes`
    和 `Discover`。在客户端完成与相关服务器的注册之前，客户端将忽略服务器在此接口上执行的所有操作。


    常规的 `Read` 操作可应用于资源的值、资源实例、资源实例数组、对象实例或特定对象的所有实例。`Write` 操作的范围大致相同，但侧重于单个对象实例。另一方面，`Read-Composite`
    可以在单个请求中针对任意对象、对象实例、资源或资源实例的组合，无论这些组合来自同一对象还是不同对象。至于 `Write-Composite`，它可以跨一个或多个对象的不同实例，更新多个不同资源的值。


    ### 信息报告


    LwM2M 服务器使用此接口来观察已注册客户端暴露的特定资源的值变化。观察可以针对单个资源，也可以是复合观察，针对客户端上跨多个对象实例的一组资源或一组资源实例。


    ## LwM2M 版本


    在撰写本文时，OMA SpecWorks 已发布了三个版本的 LwM2M。鉴于其快速的发布节奏，并非所有实现都支持该协议的最新版本。因此，您需要了解您所使用设备和软件支持的版本，以确定哪些功能可用。


    ### LwM2M v1.0（2017 年 2 月）


    LwM2M 的初始版本包含以下功能：


    *   基于对象的资源模型

    *   资源操作：创建、检索、更新、删除和配置

    *   资源观察与通知

    *   数据序列化格式：TLV、JSON、纯文本和 Opaque

    *   UDP 和 SMS 传输

    *   基于 DTLS 的安全性

    *   队列模式（适用于休眠设备）

    *   核心 LwM2M 对象：LwM2M 安全、LwM2M 服务器、访问控制、设备、连接监控、固件更新、位置、连接统计


    ### LwM2M v1.1（2018 年 6 月）


    LwM2M 在 v1.0 基础上增加了多项功能：


    *   改进的引导程序，支持增量升级

    *   增强对公钥基础设施（PKI）部署的支持

    *   增强的注册序列机制

    *   支持基于 TCP/TLS 的 LwM2M，以更好地支持防火墙和 NAT

    *   支持基于 OSCORE 的应用层安全

    *   改进对低功耗广域网的支持，特别是 3GPP CIoT 和 LoRaWAN

    *   支持使用基于 CBOR 序列化的 SenML 格式的 JSON

    *   新增数据类型


    ### LwM2M v1.2（2020 年 11 月）


    LwM2M 在强制性功能层面与 v1.0 和 v1.1 向后兼容。它引入了以下新功能：


    *   支持 MQTT 和 HTTP 作为传输协议。

    *   优化的引导、注册和信息接口。

    *   支持 LwM2M 网关，允许集成和管理非 LwM2M 设备。

    *   基于 CBOR 的新型优化序列化格式：LwM2M CBOR。

    *   增强的固件更新功能。

    *   定义新的通知属性（边缘、可确认通知和最大历史队列）。

    *   现在支持 TLS 和 DTLS v1.3。


    ## LwM2M 协议栈


    LwM2M 协议栈因版本而异。这里我将重点介绍 1.2 版本的协议栈，因为它最为全面。


    ![](img/524096_1_En_3_Fig1_HTML.jpg)


    图示包括应用层、对象、LwM2M、HTTP、MQTT、CoAP、OSCORE、TLS、TCP、DTLS、UDP、SMS、CIoT、设备及智能卡上的 SMS、UDP、LoRa
    和 CIoT。


    图 3-1

    LwM2M 1.2 协议栈（来源：OMA SpecWorks）


    在 1.2 版本之前，LwM2M 系统性地依赖 CoAP 作为其传输协议。然而，LwM2M 始终支持选择底层传输协议来运行 CoAP。最初，可选范围仅限于
    UDP 和蜂窝网络上的*短消息服务*（SMS）。在 1.1 版本中增加了对 TCP 的支持，以提供与防火墙更好的集成，并支持 NAT 穿越场景。1.1 版本还引入了
    CoAP 在非 IP 协议上的选项，即来自*第三代合作伙伴计划*（3GPP）的*蜂窝物联网*（CIoT）和 *LoRaWAN*。开发者可以在 LwM2M 1.1
    及更高版本中利用 OSCORE 安全模型，而无需考虑所选的底层传输协议。


    1.2 版本将 LwM2M 与 CoAP 解耦，引入了 HTTP 和 MQTT 作为替代传输协议。在所有版本中，安全性均基于 DTLS 或 TLS，具体取决于所使用的传输协议。


    ## Eclipse Leshan


    Eclipse Leshan 项目提供了 Java 库，您可以使用这些库构建自己的 LwM2M 客户端和服务器，或为现有平台添加 LwM2M 支持。该项目自
    2014 年就已存在，并使用 Eclipse Californium 作为其 CoAP 实现。Leshan 在 [Eclipse 公共许可证 v2.0](https://www.eclipse.org/legal/epl-2.0/)
    和 [Eclipse 分发许可证 v1.0](https://www.eclipse.org/org/documents/edl-v10.php)（BSD）下提供。


    Leshan 的官方网络资源如下：


    *   **网站：**[`https://eclipse.org/leshan`](https://eclipse.org/leshan)

    *   **Eclipse 项目页面：**[`https://projects.eclipse.org/projects/iot.leshan`](https://projects.eclipse.org/projects/iot.leshan)

    *   **代码仓库：**[`https://github.com/eclipse/leshan`](https://github.com/eclipse/leshan)

    *   **维基：**[`https://github.com/eclipse/leshan/wiki`](https://github.com/eclipse/leshan/wiki)


    Leshan 项目团队还维护着一个演示客户端、服务器和引导服务器。这些是使用 Leshan API 的宝贵示例，也可用于故障排除或测试目的。


    在撰写本文时，Leshan 有两个主要版本正在积极维护中：


    *   **版本 1.x。** 该系列实现了 LwM2M 规范 v1.0.2。

    *   **版本 2.x。** 该系列实现了 LwM2M 规范 v1.1.1。


    Leshan 维基描述了每个版本支持哪些 LwM2M 功能。


    ### 沙盒服务器


    Leshan 项目团队维护着一对公开可用的服务器，您可以使用它们进行演示和测试。这些服务器始终运行来自 `master` 分支的最新成功构建。


    *   **LwM2M 服务器：**[`https://leshan.eclipseprojects.io/`](https://leshan.eclipseprojects.io/)。`coap`
    使用端口 `5683`，`coaps` 使用端口 `5684`。

    *   **引导服务器：**[`https://leshan.eclipseprojects.io/bs/`](https://leshan.eclipseprojects.io/bs/)。`coap`
    使用端口 `5783`，`coaps` 使用端口 `5784`。


    如果您更倾向于使用 C 语言而非 Java 来构建 LwM2M 解决方案，[Eclipse Wakaama](https://www.eclipse.org/wakaama/)
    是一个 LwM2M 的 C 语言实现，旨在可移植到符合 POSIX 标准的系统上。

