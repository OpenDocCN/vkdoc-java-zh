    清单 3-1

    Leshan 客户端的 Maven 依赖声明

    ```


    要创建 Leshan 客户端实例，你需要利用 `LeshanClientBuilder` 类。之后，你只需调用 `client` 对象的 `start` 方法即可。默认情况下，如果未提供其他参数，Leshan
    将连接到位于 leshan.eclipseprojects.io 的公共演示服务器。以下代码示例展示了如何创建并启动客户端：


    ```

    String endpoint = "..." ; // 选择一个端点名称

    LeshanClientBuilder builder = new LeshanClientBuilder(endpoint);

    LeshanClient client = builder.build();

    client.start();

    ```


    `LeshanClientBuilder` 会创建填充了默认值的 `Security`、`Server` 和 `Device` 对象实例。假设我们希望覆盖这三个对象的默认值，并自行实现另一个对象
    `ConnectivityStatistics`。`ConnectivityStatistics` 的代码如下所示：


    ```

    public class ConnectivityStatistics extends BaseInstanceEnabler {

    @Override

    public ReadResponse read(ServerIdentity identity, int resourceid) {

    switch (resourceid) {

    case 0:

    return ReadResponse.success(resourceid, getSmsTxCounter());

    }

    return ReadResponse.notFound();

    }

    @Override

    public WriteResponse write(ServerIdentity identity, int resourceid, LwM2mResource
    value) {

    switch (resourceid) {

    case 15:

    setCollectionPeriod((Long) value.getValue());

    return WriteResponse.success();

    }

    return WriteResponse.notFound();

    }

    @Override

    public ExecuteResponse execute(ServerIdentity identity, int resourceid, String
    params) {

    switch (resourceid) {

    case 12:

    start();

    return ExecuteResponse.success();

    }

    return ExecuteResponse.notFound();

    }

    }

    ```


    请注意，代码中的所有数字标识符均引用自 LwM2M 注册表。


    Leshan 提供了 `ObjectsInitializer` 类来创建 LwM2M 对象的实例以及 Security、Server 和 `Device`
    的实现。在调用 `build` 获取客户端实例之前，我们需要在构建器（`LeshanClientBuilder`）上调用 `setObjects`。以下代码片段说明了如何利用
    `ObjectsInitializer`：


    ```

    ObjectsInitializer initializer = new ObjectsInitializer();

    initializer.setInstancesForObject(LwM2mId.SECURITY, Security.noSec("coap://localhost:5683",
    12345));

    initializer.setInstancesForObject(LwM2mId.SERVER, new Server(12345, 5 * 60, BindingMode.U,
    false));

    initializer.setInstancesForObject(LwM2mId.DEVICE, new Device("Ghibli Savoia",
    "S.21", "12345", "U"));

    initializer.setInstancesForObject(7, new ConnectivityStatistics());

    // 将其添加到客户端

    builder.setObjects(initializer.createAll());

    LeshanClient client = builder.build();

    client.start();

    ```


    你应该研究一下 [Leshan 客户端演示的代码](https://github.com/eclipse/leshan/tree/master/leshan-client-demo)
    以获取完整的参考。

