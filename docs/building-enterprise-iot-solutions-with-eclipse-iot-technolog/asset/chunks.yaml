- fmt: "### Getting Started with Ditto\n\n`Ditto` requires a bit more resources than\
    \ some of the other platforms covered in this book. The microservices are delivered\
    \ through container images and run on various engines, including `Docker`, `Kubernetes`,\
    \ and `OpenShift`. `Podman` could also be an alternative, given that it strives\
    \ for `Docker` compatibility. At a minimum, the `Ditto` team recommends you allocate\
    \ 2 CPU cores and 4 GB of memory to spin up a local instance on your workstation.\
    \ You will probably need more resources if orchestrating the containers with a\
    \ `Kubernetes` distribution. Alternatively, you can use the `Ditto` public sandbox\
    \ in your experiments. It is reachable over `HTTP` and `WebSocket` at `ditto.eclipseprojects.io`.\n\
    \nThe `Ditto` team provides installation instructions here: [`https://github.com/eclipse/ditto/blob/master/deployment/README.md`](https://github.com/eclipse/ditto/blob/master/deployment/README.md).\
    \ Alternatively, you could deploy the [Cloud2Edge package](https://www.eclipse.org/packages/packages/cloud2edge/)\
    \ from the [Eclipse IoT packages](https://www.eclipse.org/packages/) project on\
    \ a `Kubernetes` cluster. `Cloud2Edge` provides pre-configured and integrated\
    \ instances of `Eclipse Ditto` and `Eclipse Hono`. I will cover `Hono` in the\
    \ next chapter. For the time being, I will just explain how to deploy `Ditto`\
    \ on its own using `Docker` on the Linux or macOS platforms.\n\nThe files related\
    \ to `Docker` deployment are in the `GitHub` repository at [`https://github.com/eclipse/ditto/tree/master/deployment/docker`](https://github.com/eclipse/ditto/tree/master/deployment/docker).\
    \ The easiest way to get them on your workstation is to clone the repository.\
    \ Once you have done this, open a command-line prompt and go to the `deployment/docker`\
    \ subfolder.\n\nThe first step is to configure security on the `Nginx` reverse\
    \ proxy. The `nginx.conf` file provided by the `Ditto` team sets up Basic Authentication\
    \ on both the `HTTP` and `WebSocket` endpoints. You need to assign a password\
    \ to the `ditto` user and any account you want to add. To create such passwords,\
    \ run the following command:\n\n```\nopenssl passwd -quiet\nPassword: \nVerifying\
    \ - Password: \n```\n\nOnce you confirm the password, the command will print a\
    \ hash. You should paste that hash into the `nginx.httpasswd` file. The following\
    \ is an example. You can create additional users by adding them and their hash\
    \ to the file.\n\n```\nditto:ZKrYJB4LjwQMQ\n```\n\nYou are now ready to start\
    \ your `Ditto` instance. Simply run this command to do so:\n\n```\ndocker-compose\
    \ up -d\n```\n\nTo make sure everything is running properly, you can use this\
    \ command:\n\n```\ndocker-compose logs -f\n```\n\n### Getting Started with the\
    \ Client SDK\n\nAs I mentioned, the `Ditto` Client SDK is available for Java,\
    \ JavaScript, Go, and Python. I will show you how to use the Java version here.\n\
    \nThe `Ditto` team publishes its Java Client SDK on Maven Central. To add it to\
    \ your project, all you need to do is to add the following dependency to your\
    \ `pom.xml`:\n\n```\n<dependency>\n    <groupId>org.eclipse.ditto</groupId>\n\
    \    <artifactId>ditto-client</artifactId>\n    <version>${ditto-client.version}</version>\n\
    </dependency>\n```\n\nNew versions of the SDK are published in lockstep with `Ditto`\
    \ releases. Keeping the two of them in sync is recommended, although the team\
    \ strives to make the SDK forward compatible with the back end.\n\nBefore doing\
    \ anything, you need to create and configure a `Ditto` client instance. The relevant\
    \ classes are part of the `org.eclipse.ditto.client.configuration` package. The\
    \ first step in the process is to create instances of `AuthenticationProvider`\
    \ and `MessagingProvider`. For `AuthenticationProvider`, things look like this\
    \ when Basic Authentication is used:\n\n```\nAuthenticationProvider authProvider\
    \ =\n    AuthenticationProviders.basic(\n        BasicAuthenticationConfiguration.newBuilder()\n\
    \            .username(\"ditto\")\n            .password(\"ditto\")\n        \
    \    .build());\n```\n\nThe `MessagingProvider` is similarly straightforward.\
    \ I use the `WebSocket` URL for the public `Ditto` sandbox as the target endpoint\
    \ in the following snippet:\n\n```\nMessagingProvider messProvider =\n    MessagingProviders.webSocket(\n\
    \        WebSocketMessagingConfiguration.newBuilder()\n            .endpoint(\"\
    wss://ditto.eclipseprojects.io\")\n            .build(), authProvider);\nDittoClient\
    \ client =\n    DittoClients.newInstance(messProvider);\n```\n\nOnce you have\
    \ a client, you can manipulate `Things` and `Policies`. For example, to create\
    \ a `Thing` instance and persist it on the back end, you would use the following\
    \ code:\n\n```\nfinal Thing thing = Thing.newBuilder()\n    .setId(ThingId.of(\n\
    \        \"com.blueberrycoder:LaserShark-93110798\"))\n    .setFeature(\"Laser\"\
    ,\n        FeatureProperties.newBuilder()\n            .set(\"Power\", 9001)\n\
    \            .build())\n    .build();\n// It's over 9000!\nclient.twin().create(thing).get(1,\
    \ SECONDS);\n```\n\nIn the preceding example, I created a thing containing a single\
    \ feature, itself made of a single property. The thing only persists on the `Ditto`\
    \ back end when the `create()` method is called.\n\nThe `Ditto` team maintains\
    \ an extensive set of examples for all SDKs, available in the `ditto-examples`\
    \ repository. The repository can be found here: [`https://github.com/eclipse/ditto-examples`](https://github.com/eclipse/ditto-examples).\n\
    \n## How It All Fits Together\n\n`EdiTDor`, `Thingweb node-wot`, and `Ditto` can\
    \ be used together in a WoT-centric workflow. I will now explain how. Basically,\
    \ `Ditto` can create and manage digital twins without relying on WoT. However,\
    \ when `Ditto` twin instances reference a WoT Thing Model, `Ditto` can generate\
    \ a TD for them. A WoT consumer can access these TDs and the properties, actions,\
    \ and events through the `HTTP` binding template. Naturally, the whole workflow\
    \ relies on the availability of TMs. Since writing them by hand requires a deep\
    \ understanding of the complete WoT TD and TM specification, members of the Eclipse\
    \ community created the `Eclipse EdiTDor` graphical editor to streamline this\
    \ task.\n\nAs a developer, you can thus use `EdiTDor` to create TMs. You can then\
    \ make them available through an `HTTP` server. This will enable you to create\
    \ `Thing` instances (twins) referencing the TMs through the `Ditto` SDKs or the\
    \ platform’s REST API. `Ditto` can generate TDs for the twin instances, which\
    \ you can consume from `node-wot` or another WoT-compliant platform.\n\nHere is\
    \ an example. The `Ditto` team makes a TM describing a floor lamp available at\
    \ the following URL:\n\n[`https://eclipse.github.io/ditto-examples/wot/models/floor-lamp-1.0.0.tm.jsonld`](https://eclipse.github.io/ditto-examples/wot/models/floor-lamp-1.0.0.tm.jsonld)\n\
    \nWe can create a `Ditto` thing using the REST API with a simple `curl` request.\n\
    \n```\ncurl --location --request PUT -u ditto:ditto 'https://ditto.eclipseprojects.io/api/2/things/com.blueberrycoder:floor-lamp-0813'\
    \ \\\n--header 'Content-Type: application/json' \\\n--data-raw '{\n    \"definition\"\
    : \"https://eclipse.github.io/ditto-examples/wot/models/floor-lamp-1.0.0.tm.jsonld\"\
    \n}'\n```\n\nIf successful, the request will return a 201 response code, and you\
    \ will see the `Ditto` definition for the `Thing` payload in JSON format as the\
    \ response body.\n\nAt this point, it is possible to consume the `Ditto` `Thing`\
    \ as a WoT TD (Thing Description) through the `HTTP` binding template, which is\
    \ the only one `Ditto` supports for the time being. The following `curl` request\
    \ will retrieve the TD definition of the `Thing` I just created:\n\n```\ncurl\
    \ --location --request GET -u ditto:ditto 'https://ditto.eclipseprojects.io/api/2/things/com.blueberrycoder:floor-lamp-0813'\
    \ \\\n--header 'Accept: application/td+json'\n```\n\nThe request will return a\
    \ 200 response code and the `Thing`’s definition in WoT TD format as the response’s\
    \ body. This happens because I specified the appropriate MIME type (`application/td+json`)\
    \ in the request.\n\nAt this point, you can consume the `Thing` instance from\
    \ `node-wot`. The interest in doing this is that `Ditto` can host the `Things`\
    \ that are digital twins in a wider system while `node-wot` brokers access real\
    \ devices and other software components that are not twins."
