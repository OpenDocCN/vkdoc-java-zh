    ```

    brew install mosquitto

    ```


    There are various ways to install Mosquitto on Linux; some of them may not be
    available on your distro of choice. If you run Debian or one of its derivatives,
    such as Ubuntu, Raspbian, or the Raspberry Pi OS, Mosquitto is part of the official
    repositories. You can install it with this command:


    ```

    sudo apt install mosquitto

    ```


    If you wish to get the latest versions more quickly, the Mosquitto team maintains
    a [Debian repository](https://mosquitto.org/2013/01/mosquitto-debian-repository)
    that you can add to your sources.


    Mosquitto is also available in the Fedora repository. If you use the Workstation
    or Server edition, this command will do the trick:


    ```

    sudo dnf install mosquitto

    ```


    Fedora IoT, on the other hand, does not rely on `dnf`. Packages are managed through
    `rpm-ostree`:


    ```

    sudo rpm-ostree install mosquitto

    ```


    If your distribution supports the snap packaging format, you can also install
    it that way:


    ```

    snap install mosquitto

    ```


    ### Configuration


    Mosquitto works out of the box. The broker will start in local-only mode if no
    configuration file is provided. This means clients deployed on machines other
    than yours will not access it. The intent behind this behavior is to force you
    to build a proper configuration before using Mosquitto in production environments.


    To start the broker once installed, access a command prompt, and issue this command:


    ```

    mosquitto

    ```


    If everything is set up properly, you should see output resembling this:


    ```

    1640704397: mosquitto version 2.0.14 starting

    1640704397: Using default config.

    1640704397: Starting in local only mode. Connections will only be possible from
    clients running on this machine.

    1640704397: Create a configuration file which defines a listener to allow remote
    access.

    1640704397: For more details see https://mosquitto.org/documentation/authentication-methods/

    1640704397: Opening ipv4 listen socket on port 1883.

    1640704397: Opening ipv6 listen socket on port 1883.

    1640704397: mosquitto version 2.0.14 running

    ```


    So far, so good. I will now perform a sanity check by subscribing to the system
    metrics topic exposed by Mosquitto. To do so, I will use the [mosquitto_​sub](https://mosquitto.org/man/mosquitto_sub-1.html)
    simple client developed by the Mosquitto team. The team also built [mosquitto_​pub](https://mosquitto.org/man/mosquitto_pub-1.html),
    which you can use to publish to MQTT v3 and v5 brokers. Both utilities support
    TLS communications and leverage most MQTT features such as QoS and retained messages.
    On Debian and its derivatives, `mosquitto_pub` and `mosquitto_sub` are not part
    of the core mosquitto package but are found in the `mosquitto_clients` package
    instead.


    Open a second command prompt on the machine where you installed mosquitto, and
    execute the following command:


    ```

    mosquitto_sub -h localhost -p 1883 -t \$SYS/# -C 20 -v

    ```


    The `-C` switch limits the number of messages received before the command exits,
    and `-v` prints the topic before the message payload. The output should look like
    this:


    ```

    $SYS/broker/version mosquitto version 2.0.14

    $SYS/broker/uptime 22 seconds

    $SYS/broker/clients/total 0

    $SYS/broker/clients/inactive 0

    $SYS/broker/clients/disconnected 0

    ...

    ```


    If you go back to the prompt where you launched Mosquitto, you will find lines
    that reflect the connection you just established in the log:


    ```

    1640704494: New connection from 127.0.0.1:39616 on port 1883.

    1640704494: New client connected from 127.0.0.1:39616 as auto-56DAB577-D439-8D76-09BA-C3094A714D74
    (p2, c1, k60).

    ```


    The utility generates client IDs automatically. I could have specified one by
    using the `-i` switch.


    Up to now, I have just used the default configuration for Mosquitto. To make the
    broker reachable on my local network, I need to create a configuration file and
    pass it to the Mosquitto process. The format for the configuration file is [documented
    at length](https://mosquitto.org/man/mosquitto-conf-5.html) on the Mosquitto website.
    One thing to remember is that lines starting with “`#`” are treated as comments.


    The following is a basic configuration that will make ports 1883 and 8883 reachable
    on all network interfaces. You are probably asking yourself where the files referenced
    by the `cafile`, `keyfile,` and `certfile` come from. I will explain how to create
    those in the next section.


    ```

    # Standard MQTT traffic on port 1883, all interfaces

    listener 1883

    protocol mqtt

    # MQTT over TLS traffic on port 8883, all interfaces

    listener 8883

    protocol mqtt

    require_certificate true

    cafile /etc/mosquitto/ca_certificates/mosquitto_ca.crt

    keyfile /etc/mosquitto/certs/mosquitto_server_nopass.key

    certfile /etc/mosquitto/certs/mosquitto_server.crt

    ```


    To use this config file, copy the contents to a file (I chose `/etc/mosquitto/mosquitto.conf`)
    and launch Mosquitto this way:


    ```

    mosquitto -c ./mosquitto.conf

    ```


    If you wish to allow anonymous access to the broker, you can add this line at
    the top of the configuration file:


    ```

    allow_anonymous true

    ```'
