- fmt: '#### Getting Started with Kapua


    `Kapua` is offered as a set of container images you can deploy on `Docker` or
    `OpenShift`, including the lightweight `MiniShift` flavor. You can deploy them
    on any `x86_64` system. Make sure to allocate at least 6 GB of memory and 2 CPU
    cores to ensure `Kapua` performs adequately.


    To get started on `Docker`, execute the following commands on Linux or macOS:


    ```

    git clone https://github.com/eclipse/kapua.git kapua

    cd kapua/deployment/docker/unix

    ./docker-deploy.sh

    ```


    You can also perform the deployment using a `PowerShell` prompt on Windows. Use
    these commands to do so:


    ```

    git clone https://github.com/eclipse/kapua.git kapua

    cd kapua\deployment\docker\win

    ./docker-deploy.ps1

    ```


    I confirmed the aforementioned also works with `Podman` on Linux if you install
    the additional `podman-docker` package and manually get a copy of the `docker-compose`
    CLI. For example:


    ```

    curl -SL "https://github.com/docker/compose/releases/download/v2.9.0/docker-compose-linux-x86_64"
    -o docker-compose

    ```


    Make the file executable and place it in an appropriate folder on your `PATH`;
    things will work properly.


    Once the containers run, you can access the `Kapua` console at `http://localhost:8081/`
    using `kapua-sys` as the user and `kapua-password` as the password to log in.
    You can find additional information about the containers, the ports they expose,
    and credentials for the various components of the platform at this location: [`https://github.com/eclipse/kapua/tree/develop/deployment/docker`](https://github.com/eclipse/kapua/tree/develop/deployment/docker).


    ## Data


    Data is at the core of any IoT deployment. Ultimately, you are deploying sensors
    to gather data; your devices in the field will interact with the physical world
    because they will receive commands triggered by data. Given this, most IoT devices
    produce a great quantity of data and will produce even more in the future. For
    example, an IDC forecast from 2019 stated, “The Growth in Connected IoT Devices
    Is Expected to Generate 79.4ZB of Data in 2025.”^([^(66)](#fn66)) Whether this
    prediction will come to pass or not is irrelevant. IoT is about Data. One could
    argue that the realm of data is where information technology and operational technology
    have the greatest chance to meet.


    From a technical standpoint, there is nothing different about managing IoT data
    compared to enterprise data. You can use `SQL`, `NoSQL`, or other types of databases,
    and the way to scale them is roughly like what you typically see in enterprise
    IT. The real choice is not about the query language but whether you must process
    data at rest or in motion. Traditional databases handle data at rest. To process
    data in motion, you rather need to leverage stream processing platforms. In the
    open source world, this usually means paying a visit to the [Apache Foundation](https://apache.org/).
    The Apache ecosystem contains several relevant projects such as [Apache Spark
    Streaming](https://spark.apache.org/streaming/), [Apache Flink](https://flink.apache.org/),
    [Apache Kafka](https://kafka.apache.org/), and [Apache Storm](https://storm.apache.org/).
    Organizations mainly use streaming platforms to support real-time decision-making
    and fulfill low-latency requirements.


    Explaining which of the Apache platforms I mention to use would probably require
    a book of its own. That said, you probably noticed that `Eclipse Hono` and `Eclipse
    Ditto` integrate out of the box with `Kafka`. This likely represents a good starting
    point. Other Eclipse projects provide different integration points with Enterprise
    applications. For example, the `Eclipse Amlen` MQTT broker offers a [bridge to
    messaging systems compatible with the Java Message Service (JMS) specification](https://www.eclipse.org/amlen/docs/Developing/devjms_working.html).^([^(67)](#fn67))


    In many cases, IoT deployments rely on multiple databases at a time to address
    different requirements. For example, raw sensor data is often stored in a historical
    database for safekeeping. Many organizations will leverage such databases as a
    data source for machine learning and analytics.


    **Note**


    Historian databases are a type of time-series database developed specifically
    to store operational process data. Compared to other types of databases, they
    provide enhanced data capture, validation, and aggregation capacities. They typically
    sport built-in data compression. Most industrial automation specialists use the
    term "tag" to designate a stream of process data. This refers to the physical
    tags placed on instrumentation to capture data manually before computers were
    used to automate industrial processes. As the name suggests, the records in historian
    databases are not updated after the initial insertion.


    The high level of granularity of the data gathered by most IoT devices is often
    unnecessary outside the factory. Consequently, an important part of the design
    of any IoT solution is to figure out which values are meaningful from a business
    perspective and what is the appropriate refresh rate for them.


    The Eclipse Foundation ecosystem contains a few projects that address data management
    and analytics. The best known is `Eclipse Streamsheets`, which I will now cover
    in detail.'
  raw: '#### Getting Started with Kapua


