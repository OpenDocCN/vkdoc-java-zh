    \ including device connectivity ones.\n\n## Application Runtimes\n\nLet me be\
    \ clear: all the runtimes I mention in this section are good options for writing\
    \ an Edge application or Cloud IoT platform. That said, some of them may not be\
    \ optimal choices for targeting constrained edge nodes. Moreover, the robustness\
    \ of their open source ecosystem for IoT protocol implementations differs in terms\
    \ of variety, quality, and maturity. I will try to cover those aspects for each\
    \ of them."
  trans: "\n#### Eve 入门指南\n\n开始使用 EVE 最简单的方法是借助一个名为 Eden 的配套项目。Eden 可以轻松部署一个 Adam\
    \ 控制器实例和一组 EVE 节点。最低配置需要两台设备，可以是实体硬件或虚拟化设备。其中一台运行 Eden，另一台运行 Eve。在此上下文中，承载 Eden\
    \ 组件的设备被称为*管理器*。管理器上的基本前提条件是 Eden 二进制文件（可从其 GitHub 仓库下载）以及一个可正常运行的 Docker 运行时环境。在\
    \ Linux 上，你需要运行以下命令以确保 Docker 具备执行命令的权限：\n\n```\nsudo usermod -aG docker $USER\n\
    newgrp docker\n```\n\nEden 管理器运行着几个重要组件。这些组件如下：\n\n*   **Adam：** 控制器，以守护进程方式运行\n\
    *   **Redis：** 用于日志记录的数据库实例，以守护进程方式运行\n*   **Eserver：** 一个文件及 EVE 设备镜像仓库，可通过 HTTP\
    \ 和 FTP 协议下载\n*   **Registry：** 一个符合 OCI 标准的容器镜像仓库，用于向边缘节点提供镜像\n\n运行 EVE 的设备则有一组不同的前提条件。以下是针对虚拟设备（即你将在同一台物理硬件上并行运行管理器和\
    \ EVE 节点）的完整列表：\n\n*   qemu，版本 4.x 或更高\n*   telnet\n*   squashfs 工具（根据操作系统不同，可能为\
    \ squashfs 或 squashfs-tools）\n\n在 Linux 上，你还需要确保 KVM 可用并能执行命令。安装（如果需要）后，执行以下命令：\n\
    \n```\nsudo usermod -aG kvm $USER\nnewgrp kvm\n```\n\n在 macOS 上，你需要 [machyve](https://github.com/machyve/xhyve)\
    \ 或 Parallels 来提供虚拟化支持。\n\n接下来，我将提供有关设置基础设施并部署运行 Nginx 网络服务器的 EVE 镜像的说明。第一步是创建默认配置：\n\
    \n```\neden config add default\n```\n\n然后，执行以下命令来设置管理器的组件并启动它们：\n\n```\neden setup\n\
    eden start\n```\n\n既然我们现在有了一个正在运行的控制器和一个 EVE 节点，就可以将两者关联起来：\n\n```\neden eve onboard\n\
    ```\n\n下一步是在 EVE 上部署一个 Nginx 容器。请注意，我们挂载了一个本地文件夹，以便为网络服务器提供内容。这假设你已经克隆了 Eden 仓库，并且正在从克隆的顶层文件夹运行命令。\n\
    \n```\neden pod deploy docker://nginx -p 8028:80 --mount=src=./data/helloeve,dst=/usr/share/nginx/html\n\
    ```\n\n最后，你可以使用以下命令检查一切是否正常运行：\n\n```\neden status\n```\n\n现在可以访问由 EVE 节点提供的网络内容了。以下命令应该可以完成此操作：\n\
    \n```\ncurl http://:8028\n```\n\n你现在拥有一个可正常运行的 Eden 环境，可以用来探索 EVE 的各种可能性。如果你想停止组件并进行清理，请执行以下命令：\n\
    \n```\neden stop && eden clean --current-context=false\n```\n\n脚注 1   2   3\n\n\
    # 12. 应用程序\n\n> *从意愿到意志，从意志到决心，从决心到手段选择，从手段选择到应用，其间路途遥远。*\n\n> *There is a difference\
    \ between feebleness by the impotence of the will, of the will to the resolution,\
    \ of the resolution to the choice of means, of the choice of the means to the\
    \ application.*\n> \n> —让·弗朗索瓦·保罗·德·贡迪，雷茨枢机主教\n\n在 20 世纪 90 年代，当我头上还有（一些）头发时，IT\
    \ 领域要多样化得多。多种 UNIX 变体争夺主导地位。多种处理器架构，如 DEC 的 Alpha、HP 的 PA-RISC 和 Sun 的 SPARC，在数据中心中很常见，而如今它们要么已经消失，要么正走向淘汰。在桌面端，IBM\
    \ 的 OS/2 曾是未来的操作系统，直到 Windows 抢走了它的午餐。在我撰写本文的 2022 年，每个类别中只剩下少数几个可行的选择。为什么会这样？哪个因素最终决定了哪些处理器架构和操作系统能够存活下来？自然，相关组织的商业策略以及所涉及技术的质量和特性都发挥了作用。然而，决定性的因素是别的。最终，用户选择了那些能够运行他们所需应用程序的处理器和操作系统。从这个意义上说，Word\
    \ 和 Excel 在确保微软在桌面端的统治地位方面，比 Windows 本身做得更多。\n\n微控制器、边缘节点、协议和操作系统：这些构建模块本身并非目的，而是运行应用程序的方式。本章将介绍三个托管在\
    \ Eclipse 基金会的特定开源边缘应用程序或应用程序框架。第一个是 Eclipse 4diac，一个用于可编程逻辑控制器的设计环境和运行时。第二个是\
    \ Eclipse Keyple，一种实现非接触式支付的技术。最后，我将介绍 Eclipse VOLTTRON，一个偏向能源管理的分布式传感平台。\n\n\
    如果你是一名开发者，你可能正在或将要自己构建此类应用程序。或者，你可能会开发自己的物联网平台。如果是这样，你必须选择一个运行时，以便在你的边缘和云应用程序中加以利用。我将讨论最广泛使用的那些。\n\
    \n无论你选择何种运行时，你都需要将使用各种协议的设备集成到你的其余基础设施中。实现这一目标主要有两种方法。第一种是使用像 Eclipse Hono 这样的设备连接平台。此类平台提供统一的接口，业务应用程序可以使用这些接口来接收遥测数据和发送命令。然后，平台会抽象化所使用的物联网协议。第二种方法是让设备本身暴露一个与协议无关的接口。万维网联盟（W3C）的\
    \ Web of Things（WoT）规范就是一个很好的例子。这两种方法都支持数字孪生模式，这可能是你也会想要利用的东西。\n\n在本章中，我将重点介绍第一种方法。我将讨论\
    \ WoT、数字孪生以及相关的 Eclipse IoT 项目。在下一章中，我将介绍物联网平台，包括设备连接平台。\n\n## 应用程序运行时\n\n让我明确一点：我在本节中提到的所有运行时都是编写边缘应用程序或云物联网平台的不错选择。话虽如此，其中一些可能不是针对受限边缘节点的最佳选择。此外，它们在物联网协议实现方面的开源生态系统的健壮性，在多样性、质量和成熟度方面也有所不同。我将尝试为每个运行时涵盖这些方面。\n"
- fmt: '### .NET


    Traditionally, Microsoft’s development tools and runtimes were proprietary and
    only supported the Windows operating system. This changed in 2016 with the introduction
    of .NET Core, the open source version of the framework. Microsoft even established
    the .NET Foundation to provide vendor-neutral governance around it. This undoubtedly
    spurred an increased interest in it from open source contributors. In 2020, Microsoft
    announced that .NET Core would be rebranded as simply .NET and that all future
    work would go in that renamed, open source version. As of 2022, it is possible
    to write and deploy code targeting .NET on Linux, macOS, and Windows. The runtime
    supports the C#, F#, and Visual Basic programming languages.


    **Note**


    You probably are still confused about .NET’s rebranding. Here is an easy way to
    distinguish the various versions. In Microsoft’s materials, the proprietary Windows-only
    version of .NET is called .NET Framework. The current version is 4.8. The open
    source multiplatform version is called .NET, formerly .NET Core. Version 5.x and
    up of .NET refer to the open source version.


    From a purely technical perspective, .NET is a fine framework, and the C# and
    F# language implementations are top-notch. However, the availability of open source
    IoT protocol implementations is spotty. For example, the C# implementation of
    the Eclipse Paho MQTT client lacks regular contributors and does not support MQTT
    v5. Naturally, the size of the full .NET Core runtime is also a problem on constrained
    devices. Also, although .NET Core is open source and under vendor-neutral governance,
    Microsoft still plays an outsized role in the overall ecosystem.


    ### Java SE and Jakarta EE


    The Java virtual machine (Java Standard Edition) and the Java Enterprise Edition
    (Java EE) runtime entered the market as proprietary products from Sun Microsystems.
    In 2007, Sun made the Java Standard Edition runtime and development kit open source,
    giving birth to OpenJDK. In 2018, Oracle decided to open-source the Java Enterprise
    Edition specifications at the Eclipse Foundation. The technology was renamed Jakarta
    EE since Oracle decided to keep ownership of the original Java Enterprise Edition
    trademark.


    **Note**


    If you are looking to download prebuilt OpenJDK binaries, you should have a look
    at the Adoptium Marketplace. The Marketplace promotes high-quality TCK-certified
    and AQAvit-verified runtimes from various vendors supporting several architectures.
    You can find it at: [`https://adoptium.net/marketplace`](https://adoptium.net/marketplace).
    [Adoptium](https://adoptium.net/marketplace) is a working group of the Eclipse
    Foundation, and its own OpenJDK distribution is called [Eclipse Temurin](https://adoptium.net/temurin/).


    Although Java is not as trendy as it was around 1998, its ecosystem offers a wealth
    of high-quality and mature IoT protocol implementations. Many of the open source
    IoT platforms found at the Eclipse Foundation are built with it. Moreover, the
    Java virtual machine supports languages other than Java, such as Kotlin, Ruby,
    and Scala. It is possible to use them while leveraging the existing ecosystem
    of Java libraries.


    One persistent criticism against Java has been the startup times of the virtual
    machine, which made the runtime less than ideal for implementing stateless microservices
    deployed to containers. This issue was compounded by the sheer size of the Java
    EE/Jakarta EE runtime. Several efforts were made over the years to make Java SE
    more modular and slim down Jakarta EE. A good example of the latter is [Microprofile](https://microprofile.io/),
    which is an open source specification for Enterprise Java microservices. Microprofile
    runtime implementations only include a strict subset of the full Jakarta EE platform
    in support of JSON REST microservices. Other open source projects, such as Red
    Hat’s [Quarkus](https://quarkus.io/), perform as many operations as possible at
    build time to include only the classes actually used at runtime in the build output.
    Quarkus also emphasizes compilation to a native executable through [GraalVM](https://www.graalvm.org/)
    or its [Mandrel](https://github.com/graalvm/mandrel) downstream distribution.


    Even though its syntax is more verbose than younger programming languages, Java
    is well worth your attention, given its broad support and maturity. Innovations
    such as Microprofile and Quarkus address several of its weaknesses. The release
    cadence for new language versions is much more predictable nowadays, and development
    is performed in the open. There are several implementations of Java SE and Jakarta
    EE, many of which are open source.


    ### Node.js


    JavaScript is one of the core technologies of the World Wide Web. Like HTML and
    CSS, its roots go back to the 1990s. Brendan Eich of Netscape originally designed
    the language. Nearly all modern websites use JavaScript, and all major web browsers
    possess a dedicated JavaScript engine to execute client-side logic. JavaScript
    conforms to the ECMAScript standard, which defines the core features of a scripting
    language. ECMAScript does not cover I/O facilities such as networking, storage,
    or graphics. Most JavaScript engines provide such features on their own.


    **Note**


    JavaScript’s syntax resembles Java’s, but the two languages never had a direct
    relationship. The original name picked by Netscape was LiveScript, which was changed
    in December 1995 to capitalize on Java’s market momentum. To add to the confusion,
    Sun Microsystems trademarked the name JavaScript, and Oracle still owns that trademark.


    In 2009, JavaScript on the server became a serious option with the inception of
    the [Node.js runtime environment](https://nodejs.org/). Node.js is an open source
    runtime built upon an event-driven architecture enabling asynchronous I/O. Node.js
    applications are interpreted. The runtime is available on most modern operating
    systems, including Linux, macOS, and Windows. Node.js only supports JavaScript,
    but several languages transpile to it, such as CoffeeScript, Dart, TypeScript,
    and many others. Node.js is under the vendor-neutral governance of the [OpenJS
    Foundation](https://openjsf.org/), which is affiliated with the Linux Foundation.


    **Note**


    A transpiler is a software that takes source code written in a language and produces
    the equivalent source code in a different language. So, for example, although
    JavaScript is loosely typed, TypeScript has a strong type system.


    Node.js shines for applications that require nonblocking I/O and asynchronous
    request handling. From that perspective, it is a good fit for IoT applications
    and microservices. Older versions had trouble dealing with processor-bound tasks,
    but the introduction of worker threads in version 12 mitigated that issue. The
    fact that the code is interpreted does not mean that performance is lower or the
    runtime footprint is higher. Although the ecosystem of modules (packages) for
    Node.js is very large, many do not benefit from timely security updates or regular
    maintenance. In other words, because a module is available in the index of Node’s
    package manager (NPM) does not mean you should blindly trust it. Moreover, intellectual
    property issues involving code provenance or incompatible licenses are not infrequent.
    If you work with Node.js, you will need to give extra scrutiny to your direct
    and indirect dependencies.


    There are JavaScript implementations for the most popular IoT protocols. When
    selecting one, make sure that it is compatible with the specific version of Node.js
    you intend to use. You should also thoroughly examine all direct and indirect
    dependencies as possible to ensure you can trust their origin and use licenses
    compatible with each other. Due to our strong IP management processes, JavaScript
    modules offered by the Eclipse Foundation do not typically suffer from such issues.'
