  trans: '

    ### Arm Cortex-A


    鉴于授权该技术的处理器供应商数量众多，要梳理 Cortex-A 生态系统并非易事。同样，我将不聚焦于具体产品，而是介绍这些内核的基本特性。


    Cortex-A 系列提供 32 位和 64 位两种内核。一般来说，32 位内核实现的是 Arm v7-A 架构，但 Cortex-A32 内核除外，它实现的是
    Arm v8-A 架构。表 8-4 列出了 32 位 Cortex-A 内核的主要特性。


    表 8-4


    32 位 Arm Cortex-A 处理器特性


    | 内核 | Arm 架构 | 特性 |

    | --- | --- | --- |

    | A5 | Armv7-A | 1 至 4 核 4–64 KiB 指令与数据缓存（L1） |

    | A7 | Armv7-A | 1 至 4 核 8–64 KiB 指令与数据缓存（L1）0–1 MiB L2 缓存 |

    | A8 | Armv7-A | 仅单核 16–32 KiB 指令与数据缓存（L1）0–1 MiB L2 缓存 |

    | A9 | Armv7-A | 1 至 4 核 16–64 KiB 指令/数据缓存（L1）128 KiB–8 MiB L2 缓存 |

    | A12 | Armv7-A | 1 至 4 核 32–64 KiB 指令缓存（L1）32 KiB 数据缓存（L1）256 KiB–8 MiB L2 缓存
    |

    | A15 | Armv7-A | 每簇 1 至 4 核每物理芯片 1 或 2 个簇每核 32 KiB 指令/数据缓存（L1）每簇最高 4 MiB L2 缓存
    |

    | A17 | Armv7-A | 1 至 4 核 32–64 KiB 指令缓存（L1）32 KiB 数据缓存（L1）256 KiB–8 MiB L2 缓存
    |

    | A32 | Armv8-A | 1 至 4 核 8–64 KiB 指令/数据缓存（L1）0–1 MiB L2 缓存 |


    64 位 Cortex-A 内核实现了 v8-A、v8.2-A 或 v9-A 架构。它们不仅常见于 IT 设备，也广泛应用于智能手机。64 位 Cortex-A
    内核的特性总结于表 8-5。


    表 8-5


    64 位 Arm Cortex-A 处理器特性


    | 内核 | Arm 架构 | 特性 |

    | --- | --- | --- |

    | A34 | Armv8-A | 每簇 1 至 4 核每芯片可包含多个簇 8–64 KiB 指令/数据缓存（L1）0 KiB–1 MiB 共享 L2 缓存
    |

    | A35 | Armv8-A | 每簇 1 至 4 核每芯片可包含多个簇 8–64 KiB 指令/数据缓存（L1）128 KiB–1 MiB 共享 L2
    缓存（可选） |

    | A53 | Armv8-A | 每簇 1 至 4 核每芯片可包含多个簇 8–64 KiB 指令/数据缓存（L1）128 KiB–2 MiB 共享 L2
    缓存 |

    | A55 | Armv8.2-A | 每簇 1 至 8 核每芯片可包含多个簇每核 32–128 KiB 指令/数据缓存（L1）64–256 KiB L2
    缓存 512 KiB–4 MiB L3 缓存 |

    | A57 | Armv8-A | 每簇 1 至 4 核每核 48 KiB 指令缓存（L1）每核 32 KiB 数据缓存（L1）512 KiB–2 MiB
    L3 缓存 |

    | A65 | Armv8.2-A | 每簇 1 至 8 核同步多线程（SMT）每核 16–64 KiB 指令/数据缓存（L1）64–256 KiB L2
    缓存 |

    | A72 | Armv8-A | 每簇 1 至 4 核每核 48 KiB 指令缓存（L1）每核 32–64 KiB 数据缓存（L1）512 KiB−4 MiB
    L2 缓存 |

    | A73 | Armv8-A | 每簇 1 至 4 核每核 48 KiB 指令缓存（L1）每核 32–64 KiB 数据缓存（L1）512 KiB–4 MiB
    L2 缓存 |

    | A75 | Armv8.2-A | 每簇 1 至 4 核每核 64 KiB 指令/数据缓存（L1）128–512 KiB L2 缓存 512 KiB–4
    MiB L3 缓存（可选） |

    | A76 | Armv8.2-A | 每簇 1 至 4 核每核 64 KiB 指令/数据缓存（L1）128–512 KiB L2 缓存 512 KiB–4
    MiB L3 缓存（可选） |

    | A77 | Armv8.2-A | 每簇 1 至 4 核每核 64 KiB 指令/数据缓存（L1）256–512 KiB L2 缓存 512 KiB–4
    MiB L3 缓存（可选） |

    | A78 | Armv8.2-A | 每簇 1 至 4 核每核 32–64 KiB 指令/数据缓存（L1）256–512 KiB L2 缓存 512 KiB–4
    MiB L3 缓存（可选） |

    | A510 | Armv9-A | 每簇 1 至 8 核融合核心微架构每核 32 或 64 KiB 指令/数据缓存（L1）128 KB、192 KB、256
    KB、384 KB 或 512 KB L2 缓存（可选）256 KiB–8 MiB L3 缓存（可选） |

    | A710 | Armv9-A | 每簇 1 至 8 核每核 32 或 64 KiB 指令/数据缓存（L1）256 KB 或 512 KB L2 缓存 256
    KiB–16 MiB L3 缓存（可选） |


    根据所选内核，芯片制造商可以在每个簇中包含最多四个或八个内核，并在单个芯片上部署多个簇。此外，部分 Cortex-A 内核可以部署在*big.LITTLE*配置中，即性能更强但功耗更高的内核（大核）与能效更高但速度较慢的内核（小核）配对使用。处理器设计者可以将
    Cortex-A55 和 A78 部署在这种配置中；Cortex-A510 和 A710 则构成另一组可能的配对。


    Cortex-A65、A76 和 A78 具有 AE（汽车增强型）变体，为安全应用增加了双核锁步功能。这种配置允许内核并行处理相同任务，并比较结果以发现差异。这极大地增强了解决方案的功能安全性。


    大多数芯片制造商将以片上系统的形式交付其 Arm 产品，并增加对串行 ATA（SATA）、PCI Express（PCIe）、USB、以太网以及 I²C、SPI
    和 GPIO 等低速接口的支持。Arm 还提供其 Mali 系列图形处理单元（GPU）的授权，这些 GPU 可以与处理器内核一起集成在芯片封装中。市场中的一些参与者从
    Arm 获得处理器内核授权，并在芯片中添加自己的专有 GPU。


    ### x86-64


    尽管 x86-64 生态系统只有两个主要参与者，即 AMD 和 Intel，但他们的产品线非常丰富且定期更新。与其介绍不断变化的产品线，不如介绍通常在物联网网关和边缘节点中使用的处理器概要。


    AMD 和 Intel 都有面向嵌入式市场的产品。这些是真正的片上系统，集成了处理器内核、图形处理单元（GPU），在某些情况下还包括 I²C、SMBus、SPI、UART
    等低速接口。由于它们与桌面和服务器处理器相近，因此也提供了与该类机器相关的接口，例如 PCIe、SATA 和 USB。对纠错码（ECC）内存的支持也并不罕见。高端且最昂贵的选择集成了
    AMD EPYC 和 Intel Xeon 系列的内核。


    为了控制成本，许多设备制造商将依赖来自 AMD 和 Intel 移动产品线的处理器。在这种情况下，他们需要额外增加电路来支持低速 I/O 接口。这类处理器的优势在于功耗和散热更低。


    当然，某些边缘计算工作负载需要服务器级处理器的全部性能。此时，这些设备之所以成为边缘设备，并非因为它们使用了嵌入式技术，而是因为它们部署的物理位置。然而，通常可以找到适合边缘部署的服务器，它们采用加固型机箱或外壳。


    为了让您了解市场上使用的 x86-64 处理器类型，以下是撰写本书时正在出货的四款特定设备中使用的 CPU：


    *   **物联网网关：** AMD Athlon Silver 3050e 移动处理器（1.40 GHz，最高睿频 2.80 GHz，2 核，4 线程，4
    MB 缓存）


    *   **工业计算机：** 第 8 代 Intel Core i3-8145U 移动处理器（2.10 GHz，睿频最高 3.90 GHz，2 核，4 线程，4
    MB 缓存）


    *   **物联网网关：** Intel Atom x5-E3940 嵌入式处理器（1.60 GHz，睿频最高 1.80 GHz，4 核，4 线程，2 MB
    缓存）


    *   **边缘节点（服务器）：** 双路 Xeon E5-2690v4 服务器处理器（2.60 GHz，睿频最高 3.50 GHz，14 核，28 线程，35
    MB 缓存）


    最终，您应该选择适合您工作负载和目标功耗的处理器。请注意，服务器级和嵌入式处理器通常比替代产品具有更长的市场供货期，从而提供长期稳定的硬件平台。

