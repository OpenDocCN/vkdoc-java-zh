    *   **直接设备集成（DDI）API：** 一种支持设备交互的 REST API。它使用 JSON 负载，并为设备向平台发送反馈提供通道。自然，这对于监控部署进度等情况非常有用。


    *   **设备管理联合（DMF）API：** 一种 AMQP API，使 hawkBit 能够管理由其他设备管理服务或应用程序控制的设备的软件更新。


