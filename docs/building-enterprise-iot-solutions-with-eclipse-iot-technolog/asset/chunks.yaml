    ## Device Management


    When deploying solutions in the field, connecting IoT devices and Edge nodes to
    enterprise applications is only the first step. You will need to monitor them,
    update their software, and, over time, adjust their settings and configuration.
    There are, of course, several ways to achieve this. Some IoT protocols, such as
    LwM2M, possess built-in support for firmware updates. However, device management
    building blocks with a much broader scope are available in the open source ecosystem.
    In this section, I will focus on two of them: Eclipse hawkBit and Eclipse Kapua.


    ### Eclipse hawkBit


    Eclipse hawkBit is a domain-independent framework for rolling out software updates
    to IoT devices, edge nodes, and gateways connected to IP-based networks. The project
    was contributed to the Eclipse Foundation by Bosch.IO in 2015. hawkBit is written
    in Java and leverages the Spring framework and Spring Boot. Please note that counter
    to many other Eclipse Foundation projects, the code is published under the [Eclipse
    Public License version 1.​0](https://www.eclipse.org/legal/epl-v10.html) and not
    version 2.0.


    The official web resources for hawkBit are as follows:


    *   **Website:** [`https://eclipse.org/hawkbit`](https://eclipse.org/hawkbit)


    *   **Eclipse project page:** [`https://projects.eclipse.org/project/iot.hawkbit`](https://projects.eclipse.org/project/iot.hawkbit)


    *   **Repository:** [`https://github.com/eclipse/hawkbit`](https://github.com/eclipse/hawkbit)


    The core concept of hawkBit is the *software module*. A module comprises one or
    several *artifacts*, that is, files that will be deployed on the devices. hawkBit
    lets you group software modules in *distribution sets* as needed. You can specify
    the targets explicitly or select them through a target filter when performing
    a deployment.


    Like Eclipse Hono and Eclipse Ditto, hawkBit is made of several microservices.
    The feature set of the platform is focused yet comprehensive. Here is a list of
    hawkBit’s main features:


    *   **Device and Software Repository:** hawkBit maintains separate lists for the
    devices that are provisioning targets and for the software distributions that
    can be deployed. It is possible to pre-commission devices; this is useful to support
    zero-touch deployment scenarios. hawkBit maintains a full history of software
    updates for all devices in the repository.


    *   **Software Updates Management:** hawkBit can deploy software distributions
    to devices. This action can be initiated through the web user interface or a REST
    API. Interestingly, hawkBit supports the download resumption mechanisms initially
    defined in [RFC 7233](https://www.rfc-editor.org/info/rfc7233). Devices can only
    access the distributions they are authorized to. You can deploy delta updates
    to devices, meaning that the artifact contains only the differences between two
    specific software versions. The integrity of artifacts can also be attested to
    through digital signatures.


    *   **Rollout and Campaign Management:** hawkBit provides ways to handle large-scale
    deployments, also called *rollouts*. If you have hundreds or thousands of devices
    to update at once, you need to ensure your hawkBit instance and networking infrastructure
    can handle the load. Moreover, deploying software updates to subsets of your device
    fleet maintains a certain level of service and ensures you will not lose all your
    capacity at once in the case of a failed deployment. To perform a rollout, you
    need to split your device fleet into *deployment groups*; alternatively, hawkBit
    can generate those according to a predefined group size. During a rollout, the
    platform will process one group at a time in a cascade; the rollout will abort
    if the error rate for the group is over the threshold you provided.


    hawkBit provides a fully featured web interface enabling you to use most of the
    preceding features. Figure [13-2](#524096_1_En_13_Chapter.xhtml#Fig2) gives you
    a glimpse of how it looks.


    ![](images/524096_1_En_13_Chapter/524096_1_En_13_Fig2_HTML.jpg)


    A screen of the deployment management page of hawkbit displays the name, status,
    and actions of targets; distributions, filter by tag; action history for simulated13,
    and details and description of target and distribution set.


    Figure 13-2


    The Eclipse hawkBit user interface


    From an architecture standpoint, hawkBit exposes three distinct APIs to consumers.
    Here are the main characteristics of each of those APIs:


    *   **Management API:** A REST API enabling you to create, read, update, or delete
    (CRUD) provisioning targets (devices) and repository content (software).'
