- fmt: "# Security\n\nMost of the security measures in CoAP rely on `DTLS`. `DTLS`\
    \ is designed to provide security features to datagram protocols such as `UDP`.\
    \ Its creators deliberately made it as close to `TLS` as possible to benefit from\
    \ the latter’s extensive track record and maximize the reuse of existing infrastructure\
    \ and code. `RFC 7252` [states it plainly](https://www.rfc-editor.org/rfc/rfc7252.html%2523page-69):\
    \ “*In practice, `DTLS` is `TLS` with added features to deal with the unreliable\
    \ nature of the `UDP` transport.*”\n\n`CoAP` offers a mechanism to provide configuration\
    \ values to a new device, including the security information the device needs,\
    \ such as encryption keys and access control lists. Once provisioning is complete,\
    \ the device operates in one of four security modes. Those are the following:\n\
    \n- **NoSec:** Security is disabled (`DTLS` is not used). It is still possible\
    \ to secure traffic by leveraging lower-layer security; `IPsec` is an option.\
    \ I strongly encourage you not to use this mode, even for prototyping. Setting\
    \ up proper security from the get-go is a better approach.\n\n- **PreSharedKey:**\
    \ `DTLS` is enabled, and a list of pre-shared keys is available. Each key specifies\
    \ a list of nodes it applies to. This mode is the easiest to implement but will\
    \ not scale well as you add devices.\n\n- **RawPublicKey:** `DTLS` is enabled,\
    \ and the device possesses a raw public key – an asymmetric key pair without a\
    \ certificate. The device has a computed identity derived from the public key\
    \ in its possession. It also maintains a list of the identities of the devices\
    \ it is allowed to communicate with. This mode works well with *Public Key Infrastructure*\
    \ (`PKI`) and avoids the complexities related to certificates.\n\n- **Certificate:**\
    \ `DTLS` is enabled, and the device possesses an asymmetric key pair accompanied\
    \ by an `X.509` digital certificate bound to its subjects and signed by a trust\
    \ root. The device also has a list of trust root anchors it can contact to validate\
    \ certificates. Each device should have a unique ID used in the certificate’s\
    \ subject; relying on the `IP` address would be a bad idea since those are susceptible\
    \ to change over time. Certificate mode entails more complexity and will require\
    \ your organization to manage its own `PKI`. However, if you are building enterprise\
    \ `IoT` solutions, you should aim for it if possible.\n\n`RFC 7252` states that\
    \ only the `NoSec` and `RawPublicKey` modes are mandatory to implement. Carefully\
    \ check the documentation of whatever implementation you plan to use before making\
    \ any security-related decisions.\n\nWhen `DTLS` is enabled, the `DTLS` session\
    \ and epoch must be the same when matching `CoAP` responses to a request. The\
    \ same is true when matching an acknowledgment message or reset message to a confirmable\
    \ message or a reset message to a nonconfirmable message.\n\nThe `OSCORE` extension\
    \ (`RFC 8613`) represents an additional way to secure your `CoAP` messages. `OSCORE`\
    \ protects the messages between the endpoints. Specifically, it protects the request\
    \ method, the resource identifier, the content type, and the payload of the messages.\
    \ To achieve this, `OSCORE` leverages the *Concise Binary Object Representation*\
    \ (`CBOR`) format for encoding and *CBOR Object Signing and Encryption* (`COSE`)\
    \ for encryption. `OSCORE`’s overhead can be as low as 11 bytes over standard\
    \ `CoAP`. `OSCORE` applies protection on a field-by-field basis. The values of\
    \ protected fields are encrypted, and their integrity is guaranteed. Proxies can\
    \ still access unprotected fields while the messages are in transit.\n\n# Eclipse\
    \ Californium\n\n`Eclipse Californium` is a widely used and mature `CoAP` implementation\
    \ written in `Java`. The project has been active since April 2014 and is used\
    \ by several other `Eclipse IoT` projects. `Californium` is available under two\
    \ licenses: the `Eclipse Distribution License v1.0` (similar to the [3-Clause\
    \ BSD license](https://opensource.org/licenses/BSD-3-Clause)) and the `Eclipse\
    \ Public License v2.0`.\n\nThe official web resources for `Californium` are as\
    \ follows:\n\n- **Website:** [`https://eclipse.org/californium`](https://eclipse.org/californium)\n\
    \n- **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.californium`](https://projects.eclipse.org/projects/iot.californium)\n\
    \n- **Code repository:** [`https://github.com/eclipse/californium`](https://github.com/eclipse/californium)\n\
    \n- **Wiki:** [`https://github.com/eclipse/californium/wiki`](https://github.com/eclipse/californium/wiki)\n\
    \nAs of writing, the most recent version of `Californium` was `v3.0.0`, released\
    \ on November 3, 2021. `Californium` integrates its own implementation of `DTLS\
    \ v1.2`. Named `Scandium`, it is available in the principal `Californium` repository.\n\
    \n`Californium v.3.0.0` offers the following stable features:\n\n- `CoAP` (`RFC\
    \ 7252`)\n\n- `Observe/notify` (`RFC 7641`)\n\n- `Block-wise transfers` (`RFC\
    \ 7959`)\n\n- `No Server Response` (`RFC 7967`)\n\n- `Resource Directory draft`\
    \ (`draft-ietf-core-resource-directory-20`) implementation\n\n- `DTLS 1.2` (`RFC\
    \ 6347`) through `Scandium`\n\n- `DTLS 1.2 Connection ID` (`draft-ietf-tls-dtls-connection-id-13`)\n\
    \n- `DTLS Record Size Limit Extension` (`RFC 8449`)\n\n- `DTLS Extended Master\
    \ Secret` (`RFC 7627`)\n\nIt also includes a few experimental features that could\
    \ become stable in future versions:\n\n- `RSA` in `DTLS` support\n\n- `Bouncy\
    \ Castle` in `DTLS` (alternative to `OpenJDK JCE`) support\n\n- `CoAP` over `TCP`\
    \ (`RFC 8323`) support – incomplete\n\n- `OSCORE` support\n\nLet’s now see if\
    \ you can build your `CoAP` application using the `Californium` framework. To\
    \ do this, I will rely on snippets taken from the [numerous demo apps](https://github.com/eclipse/californium/tree/3.0.0/demo-apps)\
    \ shipping with `Californium` itself.\n\n## Sandbox Server\n\nA public sandbox\
    \ server is available at `coap://californium.eclipseprojects.io:5683/`. It relies\
    \ on the `cf-plugtest-server` demo application and always uses the most recent\
    \ code committed to the master branch.\n\n## Getting Started\n\nSince `Californium`\
    \ is written in `Java`, it uses *Apache Maven* as its build system. Assuming you\
    \ have a working `Maven` installation available and a `JDK` in your path, you\
    \ can create an executable `JAR` by cloning the `GitHub` repository and running\
    \ `mvn clean install -DskipTests` from the root folder. Doing so will also give\
