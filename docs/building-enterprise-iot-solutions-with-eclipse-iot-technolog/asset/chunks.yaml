- fmt: "### Quick Test Drive\n\nThe easiest way to test drive Leshan is to run the\
    \ demo client and server instances on your local machine. To do so, all you need\
    \ is a JDK available in your path; Leshan requires Java 8 or later.\n\nTo download\
    \ and start the latest binary of the Leshan demo server on Linux, simply run the\
    \ following two commands:\n\n```\nwget https://ci.eclipse.org/leshan/job/leshan/lastSuccessfulBuild/artifact/leshan-server-demo.jar\n\
    java -jar ./leshan-server-demo.jar\n```\n\nThis will start the server in default\
    \ mode; it will listen to all available interfaces over IPv4 and IPv6 for `coap`\
    \ and `coaps` traffic on ports `5683` and `5684`, respectively.\n\nTo download\
    \ and start the client on Linux, issue the following commands on another command\
    \ prompt:\n\n```\nwget https://ci.eclipse.org/leshan/job/leshan/lastSuccessfulBuild/artifact/leshan-client-demo.jar\n\
    java -jar ./leshan-client-demo.jar\n```\n\nOnce this is done, you can access the\
    \ server’s graphical interface by connecting to `http://localhost:8080` in your\
    \ browser. You should see a page like the one shown in Figure [3-2](#524096_1_En_3_Chapter.xhtml#Fig2).\n\
    \n![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig2_HTML.jpg)\n\nA screenshot\
    \ displays the screen of LESHAN. It displays the client endpoint, registration\
    \ ID and date, and the last update of registered clients. It has options for clients,\
    \ servers, security, and about.\n\n**Figure 3-2** Eclipse Leshan test server –\
    \ list of devices\n\nBy default, the client will take the hostname of the machine\
    \ it runs on. In this case, the name of my trusty workstation is `Ashitaka`.\n\
    \n> **Note:** Ashitaka is the protagonist of *Princess Mononoke* by Hayao Miyazaki.\
    \ You should watch it!\n\nIf you click on the device, you will access a page giving\
    \ access to its objects and resources. Figure [3-3](#524096_1_En_3_Chapter.xhtml#Fig3)\
    \ shows the list of attributes for the `Device` object.\n\n![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig3_HTML.jpg)\n\
    \nA screenshot displays the screen of LESHAN with details of the manufacturer,\
    \ model and serial number, firmware version, reboot, factory reset, power source\
    \ voltage and current, and battery level of the device of a registered client.\n\
    \n**Figure 3-3** Eclipse Leshan test server – list of resources, Device object\n\
    \nIf you click on the arrow at the end of a line for a resource, you will see\
    \ detailed information about the resource in question. In Figure [3-4](#524096_1_En_3_Chapter.xhtml#Fig4),\
    \ I accessed the details of the `Manufacturer` resource. It is a read-only singleton\
    \ resource of type `String`. The `OBS` and `“eye”` buttons can start and stop\
    \ an observe on it. The R button reads the value, which is “Leshan Demo Device.”\
    \ There is a circle on the button to indicate I clicked it already.\n\n![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig4_HTML.jpg)\n\
    \nA screenshot displays the screen of LESHAN with a description and model of the\
    \ manufacturer, model and serial number, firmware version, reboot, factory reset,\
    \ and available power sources of the device-v 1.1 of a registered client.\n\n\
    **Figure 3-4** Eclipse Leshan test server – resource value and details\n\nThe\
    \ Leshan demo server’s UI makes it very easy to access various information about\
    \ the server, including the URLs for its endpoints, its public key (for raw public\
    \ key mode), and its X.509 server certificate. Figure [3-5](#524096_1_En_3_Chapter.xhtml#Fig5)\
    \ shows how that page looks.\n\n![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig5_HTML.jpg)\n\
    \nA screenshot displays the page of server information on the screen of LESHAN\
    \ with the server URL, server public key, and server certificate. It has the options\
    \ of clients, servers, security, and about at the top.\n\n**Figure 3-5** Eclipse\
    \ Leshan test server – server information\n\n### Building Your Client\n\nLike\
    \ Californium, Leshan relies on the Maven build system. To start building your\
    \ own client, you will need to add the dependencies shown in Listing [3-1](#524096_1_En_3_Chapter.xhtml#PC7)\
    \ to your `pom.xml`:\n\n```\n<dependency>\n    <groupId>org.eclipse.leshan</groupId>\n\
    \    <artifactId>leshan-client-cf</artifactId>\n</dependency>\n<dependency>\n\
    \    <groupId>org.slf4j</groupId>\n    <artifactId>slf4j-simple</artifactId>\n\
    \    <version>1.7.30</version>\n    <scope>runtime</scope>\n</dependency>\n```\n\
    \n**Listing 3-1** Maven dependency declaration for a Leshan client\n\nTo create\
    \ a Leshan client instance, you need to leverage the `LeshanClientBuilder` class.\
    \ After that, all you need to do is call the `client` object’s `start` method.\
    \ By default, Leshan will connect to the public demo server at `leshan.eclipseprojects.io`\
    \ if no other parameters are provided. The following code sample shows how to\
    \ create and start the client:\n\n```\nString endpoint = \"...\" ; // choose an\
    \ endpoint name\nLeshanClientBuilder builder = new LeshanClientBuilder(endpoint);\n\
    LeshanClient client = builder.build();\nclient.start();\n```\n\n`LeshanClientBuilder`\
    \ creates instances of the `Security`, `Server`, and `Device` objects populated\
    \ with default values. Let’s say we wish to override the default values for those\
    \ three and implement another object, `ConnectivityStatistics`, ourselves. The\
    \ code for `ConnectivityStatistics` looks like this:\n\n```\npublic class ConnectivityStatistics\
    \ extends BaseInstanceEnabler {\n    @Override\n    public ReadResponse read(ServerIdentity\
    \ identity, int resourceid) {\n        switch (resourceid) {\n            case\
    \ 0:\n                return ReadResponse.success(resourceid, getSmsTxCounter());\n\
    \        }\n        return ReadResponse.notFound();\n    }\n\n    @Override\n\
    \    public WriteResponse write(ServerIdentity identity, int resourceid, LwM2mResource\
    \ value) {\n        switch (resourceid) {\n            case 15:\n            \
    \    setCollectionPeriod((Long) value.getValue());\n                return WriteResponse.success();\n\
    \        }\n        return WriteResponse.notFound();\n    }\n\n    @Override\n\
    \    public ExecuteResponse execute(ServerIdentity identity, int resourceid, String\
    \ params) {\n        switch (resourceid) {\n            case 12:\n           \
    \     start();\n                return ExecuteResponse.success();\n        }\n\
    \        return ExecuteResponse.notFound();\n    }\n}\n```\n\nPlease note that\
    \ all the numerical identifiers in the code refer to the LwM2M registry.\n\nLeshan\
    \ provides the `ObjectsInitializer` class to create instances of LwM2M objects\
    \ and implementations of `Security`, `Server`, and `Device`. Before calling `build`\
    \ to obtain our client instance, we need to call `setObjects` on the builder (`LeshanClientBuilder`).\
    \ The following snippet illustrates how to leverage `ObjectsInitializer`:\n\n\
    ```\nObjectsInitializer initializer = new ObjectsInitializer();\ninitializer.setInstancesForObject(LwM2mId.SECURITY,\
    \ Security.noSec(\"coap://localhost:5683\", 12345));\ninitializer.setInstancesForObject(LwM2mId.SERVER,\
    \ new Server(12345, 5 * 60, BindingMode.U, false));\ninitializer.setInstancesForObject(LwM2mId.DEVICE,\
    \ new Device(\"Ghibli Savoia\", \"S.21\", \"12345\", \"U\"));\ninitializer.setInstancesForObject(7,\
    \ new ConnectivityStatistics());\n// add it to the client\nbuilder.setObjects(initializer.createAll());\n\
    LeshanClient client = builder.build();\nclient.start();\n```\n\nYou should study\
    \ the [code of the Leshan client demo](https://github.com/eclipse/leshan/tree/master/leshan-client-demo)\
    \ for a complete reference."
  raw: '### Quick Test Drive


    The easiest way to test drive Leshan is to run the demo client and server instances
    on your local machine. To do so, all you need is a JDK available in your path;
    Leshan requires Java 8 or later.


    To download and start the latest binary of the Leshan demo server on Linux, simply
    run the following two commands:


    ```

    wget https://ci.eclipse.org/leshan/job/leshan/lastSuccessfulBuild/artifact/leshan-server-demo.jar

    java -jar ./leshan-server-demo.jar

    ```


    This will start the server in default mode; it will listen to all available interfaces
    over IPv4 and IPv6 for `coap` and `coaps` traffic on ports `5683` and `5684`,
    respectively.


    To download and start the client on Linux, issue the following commands on another
    command prompt:


    ```

    wget https://ci.eclipse.org/leshan/job/leshan/lastSuccessfulBuild/artifact/leshan-client-demo.jar

    java -jar ./leshan-client-demo.jar

    ```


    Once this is done, you can access the server’s graphical interface by connecting
    to `http://localhost:8080` in your browser. You should see a page like the one
    shown in Figure [3-2](#524096_1_En_3_Chapter.xhtml#Fig2).


    ![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig2_HTML.jpg)


    A screenshot displays the screen of LESHAN. It displays the client endpoint, registration
    I D and date, and the last update of registered clients. It has options for clients,
    servers, security, and about.


    Figure 3-2


    Eclipse Leshan test server `–` list of devices


    By default, the client will take the hostname of the machine it runs on. In this
    case, the name of my trusty workstation is `Ashitaka`.


    Note


    Ashitaka is the protagonist of *Princess Mononoke* by Hayao Miyazaki. You should
    watch it!


    If you click on the device, you will access a page giving access to its objects
    and resources. Figure [3-3](#524096_1_En_3_Chapter.xhtml#Fig3) shows the list
    of attributes for the `Device` object.


    ![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig3_HTML.jpg)


    A screenshot displays the screen of LESHAN with details of the manufacturer, model
    and serial number, firmware version, reboot, factory reset, power source voltage
    and current, and battery level of the device of a registered client.


    Figure 3-3


    Eclipse Leshan test server `–` list of resources, Device object


    If you click on the arrow at the end of a line for a resource, you will see detailed
