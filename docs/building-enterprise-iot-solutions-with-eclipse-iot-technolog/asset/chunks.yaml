    west update

    ```


    A quick command to make the Zephyr boilerplate available to CMake:


    ```

    west zephyr-export

    ```


    You can now fetch the SDK’s reminding Python dependencies.


    ```

    pip install –r ^

    %HOMEPATH%\zephyrproject\zephyr\scripts\requirements.txt

    ```


    At this point, you are ready to download and install the TCK. As in the case of
    Linux, you need to use wget to get the SDK bundle.


    ```

    cd %HOMEPATH%

