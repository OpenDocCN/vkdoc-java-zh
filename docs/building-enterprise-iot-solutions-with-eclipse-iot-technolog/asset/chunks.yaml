    \ used to transform the raw bytes from the payload into something that can be\
    \ converted into JSON by the Jackson `ObjectMapper`:\n\n```\nSparkplugBPayload\
    \ inboundPayload = decoder.buildFromByteArray(message.getPayload())\n```\n\nAs\
    \ you can see, the Tahu library abstracts the complexities of manipulating the\
    \ Sparkplug payloads. The Tahu repository contains several examples of [Sparkplug\
    \ publishers](https://github.com/eclipse/tahu/tree/master/sparkplug_b) that you\
    \ could take inspiration from. Some are stand-alone and simulate devices, while\
    \ others can run on Raspberry Pis.\n\nFootnotes [1](#524096_1_En_5_Chapter.xhtml#Fn1_source)\
    \   [2](#524096_1_En_5_Chapter.xhtml#Fn2_source)   [3](#524096_1_En_5_Chapter.xhtml#Fn3_source)\n\
    \n# 6. DDS\n\n> *Communiquer, c’est mettre en commun; et mettre en commun, c’est\
    \ l’acte qui nous constitue.*\n\n> *To communicate is to share, and sharing is\
    \ the act that constitutes us.*\n> \n> —Albert Jacquard, *Petite philosophie à\
    \ l'usage des non-philosophes*\n\nServers are potential points of failure, whatever\
    \ their workload or physical location is. The Internet and TCP/IP are designed\
    \ to ensure traffic will reach its destination through alternate routes if specific\
    \ nodes or larger parts of the network fail. However, the protocols we have explored\
    \ together up to now all rely on some sort of server. Of course, you can make\
    \ those servers more resilient by leveraging high-availability features and deploying\
    \ redundant network connections. But the farther away you are getting from the\
    \ Cloud or the corporate data center, the harsher the environment will be. For\
    \ many real-time and mission-critical use cases, having a single point of failure\
    \ in the architecture is unacceptable, especially since brokers and servers also\
    \ add latency and jitter to the data flow.\n\nPeer-to-peer networks have for a\
    \ long time represented a more fault-tolerant alternative to centralized approaches.\
    \ In such networks, nodes connect directly to as many other nodes as possible.\
    \ In addition, peer-to-peer networks increase parallelism in the architecture\
    \ since there is no single bottleneck from a performance standpoint.\n\nIn the\
    \ domain of IoT and edge computing, DDS is without a doubt one of the best-established\
    \ examples of a protocol relying on a decentralized approach. In this chapter,\
    \ you will learn about DDS fundamentals and discover [Eclipse Cyclone DDS](https://github.com/eclipse-cyclonedds/cyclonedds),\
    \ a portable implementation of the protocol."
  trans: "\n## 利用 Eclipse Tahu\n\n[Eclipse Tahu](https://github.com/eclipse/tahu/blob/master/sparkplug_b/sparkplug_b.proto)\
    \ 是 Eclipse 基金会开发的一个 Sparkplug 开源实现。它包含五个不同的客户端库，分别用 C、C#、Java、JavaScript 和 Python\
    \ 编写，每个库的成熟度和采用程度各不相同。在撰写本文时，Java 和 C 版本的维护情况最好。\n\n注意\n\nEFSP 要求所有 Eclipse 规范都必须附带一个兼容的开源实现，即通过该规范的*技术兼容性工具包*（TCK）的实现。TCK\
    \ 是一套软件和文档化的需求，用于支持对实现进行测试，以确保它们与规范兼容。TCK 由相关的 Eclipse 规范项目团队构建。\n\n在撰写本文时，开始使用\
    \ Tahu 的最佳方式是克隆仓库并自行编译你感兴趣的版本。Java 版本使用 Apache Maven 作为其依赖管理系统。要编译，请进入你克隆仓库的文件夹并执行\n\
    \n```\nmvn clean install\n```\n\n这将构建 Java 版本以及 Java 示例应用程序。完成后，你可以在自己的 `pom.xml`\
    \ 中添加此依赖项：\n\n```\n\norg.eclipse.tahu\ntahu\n0.5.12\n\n```\n\n当你尝试时，请确保将版本号更新为当前版本。\n\
    \n为了结束本章，让我们看看 Tahu 附带的一个简单的 Sparkplug Java 应用程序。名为 [SparkplugListene​r](https://github.com/eclipse/tahu/blob/master/sparkplug_b/tools/java_sparkplug_b_listener/src/main/java/org/eclipse/tahu/SparkplugListener.java)，它展示了如何订阅代理上的\
    \ Sparkplug 消息并解析它们。\n\n文件中包含的大部分代码都利用 Eclipse Paho 连接到代理并订阅 `spBv1.0/#` 主题。我复制的\
    \ `messageArrived` 方法包含了 Sparkplug 特定的逻辑：\n\n```\n@Override\npublic void messageArrived(String\
    \ topic, MqttMessage message) throws Exception {\nTopic sparkplugTopic = TopicUtil.parseTopic(topic);\n\
    ObjectMapper mapper = new ObjectMapper();\nmapper.setSerializationInclusion(Include.NON_NULL);\n\
    System.out.println(\"Message Arrived on Sparkplug topic \" + sparkplugTopic.toString());\n\
    SparkplugBPayloadDecoder decoder = new SparkplugBPayloadDecoder();\nSparkplugBPayload\
    \ inboundPayload = decoder.buildFromByteArray(message.getPayload());\n// Convert\
    \ the message to JSON and print to system.out\ntry {\nString payloadString = mapper.writeValueAsString(inboundPayload);\n\
    System.out.println(mapper.writerWithDefaultPrettyPrinter().writeValueAsString(inboundPayload));\n\
    } catch (Exception e) {\ne.printStackTrace();\n}\n}\n```\n\n关键的一行代码是这一行，其中使用 `SparkplugBDecoder`\
    \ 类的实例将来自负载的原始字节转换为 Jackson 的 `ObjectMapper` 可以转换为 JSON 的内容：\n\n```\nSparkplugBPayload\
    \ inboundPayload = decoder.buildFromByteArray(message.getPayload())\n```\n\n如你所见，Tahu\
    \ 库抽象了操作 Sparkplug 负载的复杂性。Tahu 仓库包含几个 [Sparkplug 发布者](https://github.com/eclipse/tahu/tree/master/sparkplug_b)的示例，你可以从中获得灵感。有些是独立的并模拟设备，而另一些则可以在树莓派上运行。\n\
    \n脚注 1   2   3\n\n# 6. DDS\n\n> *沟通，就是分享；而分享，是构成我们的行为。*\n\n> *To communicate is\
    \ to share, and sharing is the act that constitutes us.*\n> \n> ——阿尔贝·雅卡尔，《非哲学家的微小哲学》\n\
    \n无论其工作负载或物理位置如何，服务器都是潜在的故障点。互联网和 TCP/IP 的设计目的是，如果特定节点或网络的较大区域发生故障，流量能够通过备用路径到达目的地。然而，我们迄今为止共同探讨的协议都依赖于某种服务器。当然，你可以通过利用高可用性功能和部署冗余网络连接来使这些服务器更具弹性。但是，你离云或企业数据中心越远，环境就越严苛。对于许多实时和关键任务用例来说，架构中存在单点故障是不可接受的，尤其是因为代理和服务器还会给数据流增加延迟和抖动。\n\
    \n长期以来，点对点网络一直是集中式方法的一种更具容错性的替代方案。在这种网络中，节点直接连接到尽可能多的其他节点。此外，点对点网络增加了架构中的并行性，因为从性能角度来看不存在单一瓶颈。\n\
    \n在物联网和边缘计算领域，DDS 无疑是依赖去中心化方法的最成熟的协议示例之一。在本章中，你将了解 DDS 的基础知识，并发现 [Eclipse Cyclone\
    \ DDS](https://github.com/eclipse-cyclonedds/cyclonedds)，这是一个该协议的可移植实现。\n"
- fmt: '# What Is DDS?


    The *OMG Data Distribution Service* (DDS) is a protocol and API standard for data-centric
    connectivity from the [Object Management Group (OMG)](https://www.omg.org/). Development
    of the DDS specification started in 2001. At the time, the main contributors were
    Real-Time Innovations (RTI) and Thales Group. The OMG made version 1.0 of the
    DDS specification available in December 2004. Version 1.1 followed in December
    2005 and version 1.2 in December 2006. The most recent version of the core DDS
    specification is [version 1.4, from March 2015](https://www.omg.org/spec/DDS/1.4/).


    DDS relies on a data-centric, publish/subscribe approach, sometimes described
    by the DCPS acronym. As in MQTT, messages are published to topics clients can
    subscribe to. In DDS, however, entities exist within global data spaces (domains)
    that can be further divided into partitions.


    A significant difference between DDS and other IoT protocols is the importance
    given to payload definitions. DDS topics are not just mere filters used to determine
    which subscribers will get a message. They are defined by a name, a type, and
    a set of QoS policies. Since DDS is language independent, topic types are expressed
    in various syntaxes, with the *Interface Definition Language* (IDL) being the
    most common choice.


    > **Note:** If you are already familiar with IDL, you may wonder how DDS relates
    to CORBA. The only two things that DDS has in common with CORBA are that it uses
    a subset of IDL and both are OMG specifications. Also, if you are familiar with
    CORBA, you are probably as old, if not older than me.


    Over time, the DDS specification has been enhanced through the three following
    companion specifications:


    - **DDSI-RTPS:** Defines the *Real-Time Publish-Subscribe Protocol* (RTPS) DDS
    interoperability wire protocol. [The latest version is v2.5](https://www.omg.org/spec/DDSI-RTPS/).
    Implementations are identified by an RTPS vendor ID assigned by the OMG.

    - **DDS-XTypes:** Defines an extensible type system for DDS Topic Types. [The
    latest version is v1.3](https://www.omg.org/spec/DDS-XTypes/).

    - **DDS-Security:** Defines a security model and Service Plugin Interface (SPI)
    architecture that DDS implementations can use. [The latest version is v1.1](https://www.omg.org/spec/DDS-SECURITY/).


    The DDS specification and the three companions listed previously are commonly
    called the DDS core specifications.


    The OMG also published extensions to the DDS specification. They introduce a distributed
    services framework (DDS-RPC), in addition to XML and JSON syntaxes to represent
    DDS resources. A few gateways are also available, including one supporting the
    OPC UA protocol. Information about these resources can be found at [`www.dds-foundation.org/omg-dds-standard/`](http://www.dds-foundation.org/omg-dds-standard/).


    This chapter will focus exclusively on the latest versions of the core DDS specifications.
    When selecting a DDS implementation, you should always pay attention to the specifications
    and extensions they support.


    The best way to understand how the core specifications fit together is by looking
    at the DDS network stack. Please note that work-in-progress initiatives such as
    adding support for Time-Sensitive Networks (TSN) are not considered.


    ## Protocol Stack


    Figure [6-1](#524096_1_En_6_Chapter.xhtml#Fig1) illustrates the DDS protocol stack.
    Please note that DDS requires IP. The core specification mandates support for
    UDP as a transport, but Cyclone DDS also supports TCP. This makes it a good choice
    for battery-operated constrained devices and more powerful devices alike. It is
    worth mentioning that a few vendor-specific extensions enable support for non-IP
    networks.


    ![](images/524096_1_En_6_Chapter/524096_1_En_6_Fig1_HTML.jpg)


    *An illustration of the protocol stack for DDS includes applications, DCPS, DDSI-RTPS,
    TCP, UDP, IPv4, IPv6, Ethernet, WiFi, and physical channel.*


    **Figure 6-1** The DDS network stack


    DDSI-RTPS is a wire protocol; the DDSI in the acronym stands for *DDS Interoperability*,
    while RTPS signifies *Real-Time Publish-Subscribe*. Initially, DDS was an API
    only, and implementers leveraged several incompatible wire protocols. This led
    to fragmentation. DDSI-RTPS aimed to foster interoperability between implementations.


    Here is a list of the main features of RTPS:


    - **Performance and quality of service properties:** Those features enable best-effort
    and reliable publish/subscribe communications for real-time applications.

    - **Fault tolerance:** By design, DDSI-RTPS allows the creation of networks without
    single points of failure.

    - **Extensibility:** The protocol can be extended and enhanced without compromising
    backward compatibility or interoperability.

    - **Plug-and-play connectivity:** Nodes are discovered automatically and can join
    and leave the network anytime without reconfiguration.

    - **Modularity:** Constrained devices can implement a protocol subset and still
    join the network.

    - **Type safety:** Preventing type errors means that the whole infrastructure
    is more reliable.


    The layer above DDSI-RTPS is the DDS API itself, also called *Data-Centric Publish-Subscribe*
    (DCPS). Its focus is the distribution of data between applications. Its features
    can be divided into the following three categories:


    - **Publishing applications:** DCPS enables you to identify the data objects published
    by the application and provide values for these objects.

    - **Subscribing applications:** DCPS allows you to identify which data objects
    to subscribe to and access their values.

    - **Infrastructure:** DCPS provides everything you need to support publishing
    and subscribing applications. You will use it to define topics, attach type information
    to the topics, create publisher and subscriber entities, and attach QoS policies
    to all these entities.


    When DCPS is used, the underlying DDSI-RTPS protocol is not visible to the programmer.
    Let’s now have a deeper look at the features of DCPS, starting with its conceptual
    model.'
