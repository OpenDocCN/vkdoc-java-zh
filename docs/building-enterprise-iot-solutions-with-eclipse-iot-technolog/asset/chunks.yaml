- fmt: "### Building Your Own Server\n\nBuilding a basic LwM2M server with Leshan\
    \ is even easier than for a client. The Maven dependencies look the same, but\
    \ the `artifactId` is different. The client and server libraries are distinct.\n\
    \n```\n<dependency>\n    <groupId>org.eclipse.leshan</groupId>\n    <artifactId>leshan-server-cf</artifactId>\n\
    </dependency>\n<dependency>\n    <groupId>org.slf4j</groupId>\n    <artifactId>slf4j-simple</artifactId>\n\
    \    <version>1.7.30</version>\n    <scope>runtime</scope>\n</dependency>\n```\n\
    \n*Listing 3-2: Maven dependency declaration for a Leshan server*\n\nCreating\
    \ a basic server with default settings requires only three lines of code:\n\n\
    ```\nLeshanServerBuilder builder = new LeshanServerBuilder();\nLeshanServer server\
    \ = builder.build();\nserver.start();\n```\n\nThis server will accept registrations\
    \ but will not do much else.\n\nKey Java objects in the Leshan API allow you to\
    \ use listeners to handle specific events. This is the case of classes implementing\
    \ the `RegistrationService` interface involved in device registration. Here is\
    \ how you could create listeners that will fire when a device registers, updates\
    \ its registration, and unregisters:\n\n```\nServer.getRegistrationService().addListener(new\
    \ RegistrationListener() {\n    public void registered(Registration registration,\
    \ Registration previousReg,\n            Collection previousObservations) {\n\
    \        System.out.println(\"new device: \" + registration.getEndpoint());\n\
    \    }\n    public void updated(RegistrationUpdate update, Registration updatedReg,\
    \ Registration previousReg) {\n        System.out.println(\"device is still here:\
    \ \" + updatedReg.getEndpoint());\n    }\n    public void unregistered(Registration\
    \ registration, Collection observations, boolean expired,\n            Registration\
    \ newReg) {\n        System.out.println(\"device left: \" + registration.getEndpoint());\n\
    \    }\n});\n```\n\nIt is possible to send a request to the device when the listener\
    \ is executing. Here is code you could append to the `registered` method in the\
    \ preceding snippet to retrieve the value for the current UNIX time of the client\
    \ device (`Current Time` resource) in its `Device` object. The URI for the resource\
    \ is `3/0/13`.\n\n```\ntry {\n    ReadResponse response = server.send(registration,\
    \ new ReadRequest(3, 0, 13));\n    if (response.isSuccess()) {\n        System.out.println(\"\
    Device time:\" + ((LwM2mResource) response.getContent()).getValue());\n    } else\
    \ {\n        System.out.println(\"Failed to read:\" + response.getCode() + \"\
    \ \" + response.getErrorMessage());\n    }\n} catch (InterruptedException e) {\n\
    \    e.printStackTrace();\n}\n```\n\nYou could improve the preceding example by\
    \ providing a response callback and an error callback as additional parameters\
    \ to the `send` method. If you do so, the request would be sent asynchronously,\
    \ which avoids timeouts and other issues.\n\nThe Leshan server demo is a useful\
    \ resource to learn about the Leshan API. In particular, the `LeshanServerDemo`\
    \ class shows how to create a DTLS configuration and load the keys and certificates\
    \ required by the raw public key and X.509 security modes.\n\n## LwM2M and Constrained\
    \ Devices\n\nWhen using LwM2M, constrained devices are considered clients. Given\
    \ the bandwidth and processing power requirements, a LwM2M server only makes sense\
    \ if deployed on a gateway or edge server.\n\nSince the Zephyr RTOS supports CoAP,\
    \ it is not surprising that it also ships with a LwM2M client library. The library\
    \ implements v1.0.2 of LwM2M and possesses the following features:\n\n- Engine\
    \ to process networking events and core functions\n- Resource Directory (RD) client,\
    \ which performs BOOTSTRAP and REGISTER functions\n- Support for the TLV, JSON,\
    \ and Plain Text serialization formats\n- Implementations of core LwM2M objects\
    \ such as Security, Server, Device, and Firmware Update\n- Implementations of\
    \ extended IPSO objects such as Light Control, Temperature Sensor, and Timer\n\
    \nThe Zephyr team wrote a sample application showcasing most of the library’s\
    \ features. I will now discuss its most relevant parts.\n\nThe main function,\
    \ reproduced as follows, calls `lwm2m_setup` before anything else. It will then\
    \ start the LwM2M client by passing some hardware-related information to `lwm2m_rd_client_start`.\n\
    \n```\nstatic struct lwm2m_ctx client;\n\nvoid main(void)\n{\n    ret = lwm2m_setup();\n\
    \    (void)memset(dev_id, 0x0, sizeof(dev_id));\n    length = hwinfo_get_device_id(dev_id,\
    \ sizeof(dev_id));\n    for (i = 0; i < length; i++) {\n        sprintf(&dev_str[i*2],\
    \ \"%02x\", dev_id[i]);\n    }\n    lwm2m_rd_client_start(&client, dev_str, rd_client_event);\n\
    \    k_sem_take(&quit_lock, K_FOREVER);\n}\n```\n\nThe role of the `lwm2m_setup`\
    \ function is to declare the objects exposed by the device and their values. Resource\
    \ values are retrieved from constants declared at the top of the file in the following\
    \ snippet. Executable resources are assigned callback references.\n\n```\nstatic\
    \ int lwm2m_setup(void)\n{\n    ...\n    /* setup DEVICE object */\n    lwm2m_engine_set_res_data(\"\
    3/0/0\", CLIENT_MANUFACTURER, sizeof(CLIENT_MANUFACTURER), LWM2M_RES_DATA_FLAG_RO);\n\
    \    lwm2m_engine_set_res_data(\"3/0/1\", CLIENT_MODEL_NUMBER, sizeof(CLIENT_MODEL_NUMBER),\
    \ LWM2M_RES_DATA_FLAG_RO);\n    lwm2m_engine_set_res_data(\"3/0/2\", CLIENT_SERIAL_NUMBER,\
    \ sizeof(CLIENT_SERIAL_NUMBER), LWM2M_RES_DATA_FLAG_RO);\n    lwm2m_engine_set_res_data(\"\
    3/0/3\", CLIENT_FIRMWARE_VER, sizeof(CLIENT_FIRMWARE_VER), LWM2M_RES_DATA_FLAG_RO);\n\
    \    lwm2m_engine_register_exec_callback(\"3/0/4\", device_reboot_cb);\n    lwm2m_engine_register_exec_callback(\"\
    3/0/5\", device_factory_default_cb);\n    ...\n    return 0;\n}\n```\n\nOne of\
    \ the parameters passed to `lwm2m_rd_client_start` is a reference to `rd_client_event`.\
    \ This function is where you could handle specific events. The current implementation\
    \ simply logs error messages, as you can see in the following listing.\n\n```\n\
    static void rd_client_event(struct lwm2m_ctx *client,\n                      \
    \      enum lwm2m_rd_client_event client_event)\n{\n    switch (client_event)\
    \ {\n        [...]\n        case LWM2M_RD_CLIENT_EVENT_REGISTRATION_FAILURE:\n\
    \            LOG_DBG(\"Registration failure!\");\n            break;\n       \
    \ case LWM2M_RD_CLIENT_EVENT_REGISTRATION_COMPLETE:\n            LOG_DBG(\"Registration\
    \ complete\");\n            break;\n        [...]\n    }\n}\n```\n\n### Working\
    \ with 6LoWPAN\n\nIf you deploy the Zephyr LwM2M sample on a Bluetooth-equipped\
    \ device, you could try to establish a 6LoWPAN connection between the constrained\
    \ device and the LwM2M server. To do so, you need to enable the Bluetooth overlay\
    \ in your configuration when you flash the constrained device. Then, you need\
    \ to log in to the Linux machine hosting the LwM2M server and activate the 6LoWPAN\
    \ kernel module, as shown in the following:\n\n```\nsudo su\nmodprobe bluetooth_6lowpan\n\
    echo 1 > /sys/kernel/debug/bluetooth/6lowpan_enable\nhcitool lescan\n```\n\nThe\
    \ last command will return the list of Bluetooth devices detected by the machine\
    \ hosting the server. In the output, you need to find the MAC address for the\
    \ device named `LWM2M IPSP node`. This name is hard-coded in the sample application.\
    \ For example:\n\n```\nLE Scan ...\nC2:FA:8D:93:21:DD LWM2M IPSP node\nD8:0F:99:79:2C:DA\
    \ (unknown)\n...\n```\n\nThen, all you need to do is establish the connection\
    \ between that MAC address and the kernel module and assign an IPv6 address to\
    \ the server’s Bluetooth adapter. The Zephyr sample LwM2M application uses a hard-coded\
    \ address of `2001:db8::1`. In this example, the machine’s Bluetooth adapter is\
    \ identified as `bt0`.\n\n```\necho \"connect C2:FA:8D:93:21:DD 2\" > /sys/kernel/debug/bluetooth/6lowpan_control\n\
    ip address add 2001:db8::2/64 dev bt0\n```\n\nOnce this is done, the constrained\
    \ device should register on the server.\n\nThis file provides additional information\
    \ and describes how to enable DTLS in the Zephyr sample application. I will let\
    \ you guess which LwM2M server the documentation’s writers use."
  raw: '### Building Your Own Server


    Building a basic LwM2M server with Leshan is even easier than for a client. The
    Maven dependencies look the same, but the `artifactId` is different. The client
    and server libraries are distinct.


    ```


    org.eclipse.leshan

    leshan-server-cf


    org.slf4j

    slf4j-simple

    1.7.30

    runtime


    Listing 3-2

    Maven dependency declaration for a Leshan server

    ```


    Creating a basic server with default settings requires only three lines of code:


    ```

    LeshanServerBuilder builder = new LeshanServerBuilder();

    LeshanServer server = builder.build();

    server.start();

    ```


    This server will accept registrations but will not do much else.


    Key Java objects in the Leshan API allow you to use listeners to handle specific
    events. This is the case of classes implementing the [`RegistrationService`](https://github.com/eclipse/leshan/blob/master/leshan-server-core/src/main/java/org/eclipse/leshan/server/registration/RegistrationService.java)
    interface involved in device registration. Here is how you could create listeners
    that will fire when a device registers, updates its registration, and unregisters:


    ```

    Server.getRegistrationService().addListener(new RegistrationListener() {

    public void registered(Registration registration, Registration previousReg,

    Collection previousObsersations) {

    System.out.println("new device: " + registration.getEndpoint());

    }

    public void updated(RegistrationUpdate update, Registration updatedReg, Registration
    previousReg) {

    System.out.println("device is still here: " + updatedReg.getEndpoint());

    }

    public void unregistered(Registration registration, Collection observations, boolean
    expired,

    Registration newReg) {

    System.out.println("device left: " + registration.getEndpoint());

    }

    });

    ```


    It is possible to send a request to the device when the listener is executing.
    Here is code you could append to the `registered` method in the preceding snippet
    to retrieve the value for the current UNIX time of the client device (`Current
    Time` resource) in its `Device` object. The URI for the resource is `3/0/13`.


    ```

    Try {

    ReadResponse response = server.send(registration, new ReadRequest(3,0,13));

    if (response.isSuccess()) {

    System.out.println("Device time:" + ((LwM2mResource)response.getContent()).getValue());

    }else {

    System.out.println("Failed to read:" + response.getCode() + " " + response.getErrorMessage());

    }

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    ```


    You could improve the preceding example by providing a response callback and an
    error callback as additional parameters to the `send` method. If you do so, the
    request would be sent asynchronously, which avoids timeouts and other issues.


    The Leshan server demo is a useful resource to learn about the Leshan API. In
    particular, the [`LeshanServerDemo`](https://github.com/eclipse/leshan/blob/master/leshan-server-demo/src/main/java/org/eclipse/leshan/server/demo/LeshanServerDemo.java)
    class shows how to create a DTLS configuration and load the keys and certificates
    required by the raw public key and X.509 security modes.


    ## LwM2M and Constrained Devices


    When using LwM2M, constrained devices are considered clients. Given the bandwidth
    and processing power requirements, a LwM2M server only makes sense if deployed
    on a gateway or edge server.


    Since the [Zephyr RTOS](https://www.zephyrproject.org/) supports CoAP, it is not
    surprising that it also ships with a [LwM2M client library](https://docs.zephyrproject.org/latest/reference/networking/lwm2m.html).
    The library implements v1.0.2 of LwM2M and possesses the following features:


    *   Engine to process networking events and core functions


    *   Resource Directory (RD) client, which performs BOOTSTRAP and REGISTER functions


    *   Support for the TLV, JSON, and Plain Text serialization formats


    *   Implementations of core LwM2M objects such as Security, Server, Device, and
    Firmware Update


    *   Implementations of extended IPSO objects such as Light Control, Temperature
    Sensor, and Timer


    The Zephyr team wrote [a sample application](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/net/lwm2m_client/src/lwm2m-client.c)
    showcasing most of the library’s features. I will now discuss its most relevant
    parts.


    The main function, reproduced as follows, calls `lwm2m_setup` before anything
    else. It will then start the LwM2M client by passing some hardware-related information
    to `lwm2m_rd_client_start`.


    ```

    Static struct lwm2m_ctx client;

    void main(void)

    {

    ret = lwm2m_setup();

    (void)memset(dev_id, 0x0, sizeof(dev_id));

    length = hwinfo_get_device_id(dev_id, sizeof(dev_id));

    for (i = 0 ; i < length ; i++) {

    sprintf(&dev_str[i*2], "%02x", dev_id[i]);

    }

    lwm2m_rd_client_start(&client, dev_str, rd_client_event);

    k_sem_take(&quit_lock, K_FOREVER);

    }

    ```


    The role of the `lwm2m_setup` function is to declare the objects exposed by the
    device and their values. Resource values are retrieved from constants declared
    at the top of the file in the following snippet. Executable resources are assigned
    callback references.


    ```

    static int lwm2m_setup(void)

    {

    ...

    /* setup DEVICE object */

    lwm2m_engine_set_res_data("3/0/0", CLIENT_MANUFACTURER, sizeof(CLIENT_MANUFACTURER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_set_res_data("3/0/1", CLIENT_MODEL_NUMBER, sizeof(CLIENT_MODEL_NUMBER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_set_res_data("3/0/2", CLIENT_SERIAL_NUMBER, sizeof(CLIENT_SERIAL_NUMBER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_set_res_data("3/0/3", CLIENT_FIRMWARE_VER, sizeof(CLIENT_FIRMWARE_VER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_register_exec_callback("3/0/4", device_reboot_cb);

    lwm2m_engine_register_exec_callback("3/0/5", device_factory_default_cb);

    ...

    return 0;

    }

    ```


    One of the parameters passed to `lwm2m_rd_client_start` is a reference to `rd_client_event`.
    This function is where you could handle specific events. The current implementation
    simply logs error messages, as you can see in the following listing.


    ```

    static void rd_client_event(struct lwm2m_ctx *client,

    enum lwm2m_rd_client_event client_event)

    {

    switch (client_event) {

    [...]

    case LWM2M_RD_CLIENT_EVENT_REGISTRATION_FAILURE:

    LOG_DBG("Registration failure!");

    break;

    case LWM2M_RD_CLIENT_EVENT_REGISTRATION_COMPLETE:

    LOG_DBG("Registration complete");

    break;

    [...]

    }

    }

    ```


    ### Working with 6LoWPAN


    If you deploy the Zephyr LwM2M sample on a Bluetooth-equipped device, you could
    try to establish a 6LoWPAN connection between the constrained device and the LwM2M
    server. To do so, you need to enable the Bluetooth overlay in your configuration
    when you flash the constrained device. Then, you need to log in to the Linux machine
    hosting the LwM2M server and activate the 6LoWPAN kernel module, as shown in the
    following:


    ```

    sudo su

    modprobe bluetooth_6lowpan

    echo 1 > /sys/kernel/debug/bluetooth/6lowpan_enable

    hcitool lescan

    ```


    The last command will return the list of Bluetooth devices detected by the machine
    hosting the server. In the output, you need to find the MAC address for the device
    named `LWM2M IPSP node`. This name is hard-coded in the sample application. For
    example:


    ```

    LE Scan ...

    C2:FA:8D:93:21:DD LWM2M IPSP node

    D8:0F:99:79:2C:DA (unknown)

    ...

    ```


    Then, all you need to do is establish the connection between that MAC address
    and the kernel module and assign an IPv6 address to the server’s Bluetooth adapter.
    The Zephyr sample LwM2M application uses a hard-coded address of `2001:db8::1`.
    In this example, the machine’s Bluetooth adapter is identified as `bt0`.


    ```

    echo "connect C2:FA:8D:93:21:DD 2" > /sys/kernel/debug/bluetooth/6lowpan_control

    ip address add 2001:db8::2/64 dev bt0

    ```


    Once this is done, the constrained device should register on the server.


    [This file](https://github.com/zephyrproject-rtos/zephyr/tree/main/samples/net/lwm2m_client)
    provides additional information and describes how to enable DTLS in the Zephyr
    sample application. I will let you guess which LwM2M server the documentation’s
    writers use.'
  trans: '

    ### 构建你自己的服务器


    使用 Leshan 构建一个基础的 LwM2M 服务器甚至比构建客户端还要简单。Maven 依赖看起来相同，但 `artifactId` 不同。客户端和服务器库是分开的。


    ```


    org.eclipse.leshan

    leshan-server-cf


    org.slf4j

    slf4j-simple

    1.7.30

    runtime


    清单 3-2

    Leshan 服务器的 Maven 依赖声明

    ```


    使用默认设置创建一个基础服务器仅需三行代码：


    ```

    LeshanServerBuilder builder = new LeshanServerBuilder();

    LeshanServer server = builder.build();

    server.start();

    ```


    这个服务器会接受注册，但除此之外不会做太多事情。


    Leshan API 中的关键 Java 对象允许你使用监听器来处理特定事件。实现 [`RegistrationService`](https://github.com/eclipse/leshan/blob/master/leshan-server-core/src/main/java/org/eclipse/leshan/server/registration/RegistrationService.java)
    接口的类就是这种情况，该接口涉及设备注册。以下是你如何创建监听器，这些监听器将在设备注册、更新其注册以及注销时触发：


    ```

    Server.getRegistrationService().addListener(new RegistrationListener() {

    public void registered(Registration registration, Registration previousReg,

    Collection previousObsersations) {

    System.out.println("新设备: " + registration.getEndpoint());

    }

    public void updated(RegistrationUpdate update, Registration updatedReg, Registration
    previousReg) {

    System.out.println("设备仍在: " + updatedReg.getEndpoint());

    }

    public void unregistered(Registration registration, Collection observations, boolean
    expired,

    Registration newReg) {

    System.out.println("设备离开: " + registration.getEndpoint());

    }

    });

    ```


    可以在监听器执行时向设备发送请求。以下是你可以在前面代码片段中附加到 `registered` 方法的代码，用于检索其 `Device` 对象中客户端设备的当前
    UNIX 时间值（`Current Time` 资源）。该资源的 URI 是 `3/0/13`。


    ```

    Try {

    ReadResponse response = server.send(registration, new ReadRequest(3,0,13));

    if (response.isSuccess()) {

    System.out.println("设备时间:" + ((LwM2mResource)response.getContent()).getValue());

    }else {

    System.out.println("读取失败:" + response.getCode() + " " + response.getErrorMessage());

    }

    } catch (InterruptedException e) {

    e.printStackTrace();

    }

    ```


    你可以通过向 `send` 方法提供响应回调和错误回调作为额外参数来改进前面的示例。如果这样做，请求将被异步发送，从而避免超时和其他问题。


    Leshan 服务器演示是学习 Leshan API 的有用资源。特别是，[`LeshanServerDemo`](https://github.com/eclipse/leshan/blob/master/leshan-server-demo/src/main/java/org/eclipse/leshan/server/demo/LeshanServerDemo.java)
    类展示了如何创建 DTLS 配置并加载原始公钥和 X.509 安全模式所需的密钥和证书。


    ## LwM2M 与受限设备


    使用 LwM2M 时，受限设备被视为客户端。考虑到带宽和处理能力要求，LwM2M 服务器只有在部署在网关或边缘服务器上时才有意义。


    由于 [Zephyr RTOS](https://www.zephyrproject.org/) 支持 CoAP，因此它也附带了一个 [LwM2M 客户端库](https://docs.zephyrproject.org/latest/reference/networking/lwm2m.html)
    也就不足为奇了。该库实现了 LwM2M v1.0.2 并具有以下特性：


    *   用于处理网络事件和核心功能的引擎

    *   资源目录 (RD) 客户端，执行 BOOTSTRAP 和 REGISTER 功能

    *   支持 TLV、JSON 和纯文本序列化格式

    *   核心 LwM2M 对象的实现，例如安全、服务器、设备和固件更新

    *   扩展 IPSO 对象的实现，例如灯光控制、温度传感器和定时器


    Zephyr 团队编写了一个[示例应用程序](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/net/lwm2m_client/src/lwm2m-client.c)，展示了该库的大部分功能。我现在将讨论其最相关的部分。


    如下所示的主函数，首先调用 `lwm2m_setup`。然后，它将通过向 `lwm2m_rd_client_start` 传递一些与硬件相关的信息来启动 LwM2M
    客户端。


    ```

    Static struct lwm2m_ctx client;

    void main(void)

    {

    ret = lwm2m_setup();

    (void)memset(dev_id, 0x0, sizeof(dev_id));

    length = hwinfo_get_device_id(dev_id, sizeof(dev_id));

    for (i = 0 ; i < length ; i++) {

    sprintf(&dev_str[i*2], "%02x", dev_id[i]);

    }

    lwm2m_rd_client_start(&client, dev_str, rd_client_event);

    k_sem_take(&quit_lock, K_FOREVER);

    }

    ```


    `lwm2m_setup` 函数的作用是声明设备公开的对象及其值。在以下代码片段中，资源值从文件顶部声明的常量中检索。可执行资源被分配了回调引用。


    ```

    static int lwm2m_setup(void)

    {

    ...

    /* 设置 DEVICE 对象 */

    lwm2m_engine_set_res_data("3/0/0", CLIENT_MANUFACTURER, sizeof(CLIENT_MANUFACTURER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_set_res_data("3/0/1", CLIENT_MODEL_NUMBER, sizeof(CLIENT_MODEL_NUMBER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_set_res_data("3/0/2", CLIENT_SERIAL_NUMBER, sizeof(CLIENT_SERIAL_NUMBER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_set_res_data("3/0/3", CLIENT_FIRMWARE_VER, sizeof(CLIENT_FIRMWARE_VER),
    LWM2M_RES_DATA_FLAG_RO);

    lwm2m_engine_register_exec_callback("3/0/4", device_reboot_cb);

    lwm2m_engine_register_exec_callback("3/0/5", device_factory_default_cb);

    ...

    return 0;

    }

    ```


    传递给 `lwm2m_rd_client_start` 的参数之一是对 `rd_client_event` 的引用。这个函数是你处理特定事件的地方。如下面的清单所示，当前的实现只是记录错误消息。


    ```

    static void rd_client_event(struct lwm2m_ctx *client,

    enum lwm2m_rd_client_event client_event)

    {

    switch (client_event) {

    [...]

    case LWM2M_RD_CLIENT_EVENT_REGISTRATION_FAILURE:

    LOG_DBG("注册失败!");

    break;

    case LWM2M_RD_CLIENT_EVENT_REGISTRATION_COMPLETE:

    LOG_DBG("注册完成");

    break;

    [...]

    }

    }

    ```


    ### 使用 6LoWPAN


    如果你在配备蓝牙的设备上部署 Zephyr LwM2M 示例，你可以尝试在受限设备和 LwM2M 服务器之间建立 6LoWPAN 连接。为此，你需要在烧录受限设备时在配置中启用蓝牙覆盖。然后，你需要登录到托管
    LwM2M 服务器的 Linux 机器并激活 6LoWPAN 内核模块，如下所示：


    ```

    sudo su

    modprobe bluetooth_6lowpan

    echo 1 > /sys/kernel/debug/bluetooth/6lowpan_enable

    hcitool lescan

    ```


    最后一个命令将返回托管服务器的机器检测到的蓝牙设备列表。在输出中，你需要找到名为 `LWM2M IPSP node` 的设备的 MAC 地址。此名称在示例应用程序中是硬编码的。例如：


    ```

    LE Scan ...

    C2:FA:8D:93:21:DD LWM2M IPSP node

    D8:0F:99:79:2C:DA (unknown)

    ...

    ```


    然后，你需要做的就是建立该 MAC 地址与内核模块之间的连接，并为服务器的蓝牙适配器分配一个 IPv6 地址。Zephyr 示例 LwM2M 应用程序使用硬编码地址
    `2001:db8::1`。在此示例中，机器的蓝牙适配器被标识为 `bt0`。


    ```

    echo "connect C2:FA:8D:93:21:DD 2" > /sys/kernel/debug/bluetooth/6lowpan_control

    ip address add 2001:db8::2/64 dev bt0

    ```


    完成此操作后，受限设备应在服务器上注册。


    [此文件](https://github.com/zephyrproject-rtos/zephyr/tree/main/samples/net/lwm2m_client)
    提供了更多信息，并描述了如何在 Zephyr 示例应用程序中启用 DTLS。我将让你猜猜文档编写者使用的是哪个 LwM2M 服务器。

