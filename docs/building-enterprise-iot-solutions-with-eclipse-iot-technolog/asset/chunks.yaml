- fmt: "### Constrained Devices\n\nConstrained devices take us back, in a way, to\
    \ the earlier stages of computing. 32-bit processors are still typical in them,\
    \ and they typically have little memory and storage. What makes them unique is\
    \ their capacity to operate on battery power for months or even years and their\
    \ rich input and output capabilities. Embedded developers have programmed constrained\
    \ devices for a very long time. What makes IoT constrained devices different is\
    \ that they can connect to the Internet or isolated networks using Internet-class\
    \ technologies.\n\nWhile some developers still deploy their constrained device\
    \ code on the bare hardware, most of them leverage an *operating system* (OS)\
    \ or *real-time operating system* (RTOS). There are several options available\
    \ in the market, both commercial and open source. The most popular open source\
    \ options in the 2021 Eclipse IoT and Edge developer survey were [`FreeRTOS`](https://www.freertos.org/),\
    \ [`Mbed OS`](https://os.mbed.com/), and [`Zephyr`](https://zephyrproject.org/).\
    \ `Linux` is also widely adopted, although it requires more powerful processors\
    \ and more memory. For developers, leveraging an OS or RTOS makes much sense since\
    \ they implement generic low-level features that their applications can leverage.\n\
    \n> **Note**  \n> RTOSes are different from traditional operating systems in two\
    \ ways: they are predictable and deterministic. Predictable means that the system\
    \ will respond to a specific event within a strict time limit. Deterministic means\
    \ that the behavior of the RTOS scheduler can be predicted. In other words, we\
    \ know how much time an OS-level operation will take (predictable) and that the\
    \ result will always be the same (deterministic).\n\nWhile operating systems provide\
    \ developers with a standard application programming interface (API), working\
    \ with sensors and actuators often requires custom code. Moreover, porting an\
    \ application from one microcontroller to another – or even just migrating to\
    \ a different revision – can be cumbersome. This is where hardware abstraction\
    \ layers (HAL) come into play. HAL provide a hardware-independent and OS-independent\
    \ API that makes applications easier to port. Since the life cycle of IoT solutions\
    \ is long, the probability that you will need to port your code to different hardware\
    \ or a new version of the RTOS you use is high. Portability is thus a significant\
    \ concern. In the Eclipse IoT toolkit, the [`Eclipse MRAA`](https://projects.eclipse.org/projects/iot.mraa)\
    \ project provides abstractions for various boards’ I/O pins and buses (such as\
    \ the Raspberry Pi), while [`Eclipse UPM`](https://projects.eclipse.org/projects/iot.upm)\
    \ interfaces with sensors and actuators.\n\n> **Note**  \n> Some operating systems\
    \ are pushing abstraction layers to the next level by enabling developers to pick\
    \ the kernel that best fits their use case and by providing uniform higher-level\
    \ APIs to applications. An excellent example of this approach is the [`Oniro project`](https://oniroproject.org/).\
    \ Oniro can use the `Linux`, `Zephyr`, or `LiteOS` kernels. It possesses a kernel\
    \ abstraction layer that uniformizes process and thread management, memory management,\
    \ file system, network management, and peripheral management. Oniro is a compatible\
    \ implementation for the global market of OpenHarmony, an open source operating\
    \ system specified and hosted by the [`OpenAtom Foundation`](https://OpenAtomFoundation.org/).\n\
    \nA critical issue with IoT constrained devices is to keep them up to date. Over\
    \ time, vulnerabilities will appear in the code you wrote and the OS you use.\
    \ Malicious actors are ready [to take advantage of those vulnerabilities to conduct\
    \ cyberattacks](https://www.zdnet.com/article/your-insecure-internet-of-things-devices-are-putting-everyone-at-risk-of-attack/).^([⁸](#fn8))\
    \ If you are an IoT developer or aim to become one, it is essential to take security\
    \ updates seriously. Some RTOSes and protocols feature built-in update management\
    \ that will integrate with a variety of server-side platforms. [`Eclipse hawkBit`](https://www.eclipse.org/hawkbit/)\
    \ is an example of such a platform. The [`Eclipse Hara`](https://projects.eclipse.org/projects/iot.hawkbit.hara)\
    \ project provides a sample client implementation of the `hawkBit` APIs that you\
    \ could leverage – or at least take inspiration from – on your constrained device.\
    \ Some will say, and rightfully so, that a zero-trust approach will help mitigate\
    \ the dangers posed by compromised devices. However, malicious actors could use\
    \ such devices to attack others, not just your organization. Consequently, [having\
    \ a responsible security posture is vital](https://www.zdnet.com/article/the-iot-is-getting-a-lot-bigger-but-security-is-still-getting-left-behind/).^([⁹](#fn9))\
    \ This includes offering at least one channel for your customers and end users\
    \ to report security vulnerabilities and committing to act once the reports are\
    \ in your hands.\n\nLastly are sensors and actuators. Picking the right components\
    \ can be a complicated task. In the case of sensors, their precision, durability,\
    \ and sampling rates are all critical considerations. As for actuators, they accept\
    \ an electric signal and combine it with a source of energy. There are several\
    \ varieties, including electric, hydraulic, and pneumatic, among others. Most\
    \ of the boards featuring microcontrollers available in the market offer an array\
    \ of built-in sensors, plus I/O and buses to connect sensors and actuators."
  raw: '### Constrained Devices


    Constrained devices take us back, in a way, to the earlier stages of computing.
    32-bit processors are still typical in them, and they typically have little memory
    and storage. What makes them unique is their capacity to operate on battery power
    for months or even years and their rich input and output capabilities. Embedded
    developers have programmed constrained devices for a very long time. What makes
    IoT constrained devices different is that they can connect to the Internet or
    isolated networks using Internet-class technologies.


    While some developers still deploy their constrained device code on the bare hardware,
    most of them leverage an *operating system* (OS) or *real-time operating system*
    (RTOS). There are several options available in the market, both commercial and
    open source. The most popular open source options in the 2021 Eclipse IoT and
    Edge developer survey were [FreeRTOS](https://www.freertos.org/), [Mbed OS](https://os.mbed.com/),
    and [Zephyr](https://zephyrproject.org/). Linux is also widely adopted, although
    it requires more powerful processors and more memory. For developers, leveraging
    an OS or RTOS makes much sense since they implement generic low-level features
    that their applications can leverage.


    Note


    RTOSes are different from traditional operating systems in two ways: they are
    predictable and deterministic. Predictable means that the system will respond
    to a specific event within a strict time limit. Deterministic means that the behavior
    of the RTOS scheduler can be predicted. In other words, we know how much time
    an OS-level operation will take (predictable) and that the result will always
    be the same (deterministic).


    While operating systems provide developers with a standard application programming
    interface (API), working with sensors and actuators often requires custom code.
    Moreover, porting an application from one microcontroller to another `–` or even
    just migrating to a different revision `–` can be cumbersome. This is where hardware
    abstraction layers (HAL) come into play. HAL provide a hardware-independent and
    OS-independent API that makes applications easier to port. Since the life cycle
    of IoT solutions is long, the probability that you will need to port your code
    to different hardware or a new version of the RTOS you use is high. Portability
    is thus a significant concern. In the Eclipse IoT toolkit, the [Eclipse MRAA](https://projects.eclipse.org/projects/iot.mraa)
    project provides abstractions for various boards’ I/O pins and buses (such as
    the Raspberry Pi), while [Eclipse UPM](https://projects.eclipse.org/projects/iot.upm)
    interfaces with sensors and actuators.


    Note


    Some operating systems are pushing abstraction layers to the next level by enabling
    developers to pick the kernel that best fits their use case and by providing uniform
    higher-level APIs to applications. An excellent example of this approach is the
    [Oniro project](https://oniroproject.org/). Oniro can use the Linux, Zephyr, or
    LiteOS kernels. It possesses a kernel abstraction layer that uniformizes process
    and thread management, memory management, file system, network management, and
    peripheral management. Oniro is a compatible implementation for the global market
    of OpenHarmony, an open source operating system specified and hosted by the [OpenAtom
    Foundation](https://OpenAtomFoundation.org/).


    A critical issue with IoT constrained devices is to keep them up to date. Over
    time, vulnerabilities will appear in the code you wrote and the OS you use. Malicious
    actors are ready [to take advantage of those vulnerabilities to conduct cyberattacks](https://www.zdnet.com/article/your-insecure-internet-of-things-devices-are-putting-everyone-at-risk-of-attack/).^([⁸](#fn8))
    If you are an IoT developer or aim to become one, it is essential to take security
    updates seriously. Some RTOSes and protocols feature built-in update management
    that will integrate with a variety of server-side platforms. [Eclipse hawkBit](https://www.eclipse.org/hawkbit/)
    is an example of such a platform. The [Eclipse Hara](https://projects.eclipse.org/projects/iot.hawkbit.hara)
    project provides a sample client implementation of the hawkBit APIs that you could
    leverage `–` or at least take inspiration from `–` on your constrained device.
    Some will say, and rightfully so, that a zero-trust approach will help mitigate
    the dangers posed by compromised devices. However, malicious actors could use
    such devices to attack others, not just your organization. Consequently, [having
    a responsible security posture is vital](https://www.zdnet.com/article/the-iot-is-getting-a-lot-bigger-but-security-is-still-getting-left-behind/).^([⁹](#fn9))
    This includes offering at least one channel for your customers and end users to
    report security vulnerabilities and committing to act once the reports are in
    your hands.


    Lastly are sensors and actuators. Picking the right components can be a complicated
    task. In the case of sensors, their precision, durability, and sampling rates
    are all critical considerations. As for actuators, they accept an electric signal
    and combine it with a source of energy. There are several varieties, including
    electric, hydraulic, and pneumatic, among others. Most of the boards featuring
    microcontrollers available in the market offer an array of built-in sensors, plus
    I/O and buses to connect sensors and actuators.'
  trans: '

    ### 受限设备


    从某种意义上说，受限设备将我们带回了计算的早期阶段。32 位处理器在它们中仍然很常见，并且它们通常只有很少的内存和存储空间。它们的独特之处在于能够依靠电池供电运行数月甚至数年，以及其丰富的输入和输出能力。嵌入式开发者长期以来一直在对受限设备进行编程。物联网受限设备的不同之处在于，它们能够使用互联网类技术连接到互联网或隔离网络。


    虽然一些开发者仍然在裸硬件上部署他们的受限设备代码，但大多数人会利用*操作系统*（OS）或*实时操作系统*（RTOS）。市场上有多种选择，既有商业产品也有开源产品。在
    2021 年 Eclipse 物联网和边缘开发者调查中，最受欢迎的开源选项是 [FreeRTOS](https://www.freertos.org/)、[Mbed
    OS](https://os.mbed.com/) 和 [Zephyr](https://zephyrproject.org/)。Linux 也被广泛采用，尽管它需要更强大的处理器和更多的内存。对于开发者来说，利用操作系统或实时操作系统非常有意义，因为它们实现了应用程序可以利用的通用底层功能。


    注意


    实时操作系统与传统操作系统有两个不同之处：它们是可预测的和确定性的。可预测意味着系统会在严格的时间限制内响应特定事件。确定性意味着实时操作系统调度器的行为是可以预测的。换句话说，我们知道一个操作系统级操作需要多长时间（可预测），并且结果总是相同的（确定性）。


    虽然操作系统为开发者提供了标准的应用程序编程接口（API），但处理传感器和执行器通常需要自定义代码。此外，将应用程序从一个微控制器移植到另一个微控制器`–`甚至只是迁移到不同的修订版本`–`可能很繁琐。这就是硬件抽象层（HAL）发挥作用的地方。HAL
    提供了与硬件无关且与操作系统无关的 API，使应用程序更易于移植。由于物联网解决方案的生命周期很长，您需要将代码移植到不同硬件或您使用的实时操作系统新版本的可能性很高。因此，可移植性是一个重要问题。在
    Eclipse 物联网工具包中，[Eclipse MRAA](https://projects.eclipse.org/projects/iot.mraa)
    项目为各种开发板的 I/O 引脚和总线（例如树莓派）提供了抽象，而 [Eclipse UPM](https://projects.eclipse.org/projects/iot.upm)
    则与传感器和执行器进行交互。


    注意


    一些操作系统正在将抽象层提升到新的水平，它们允许开发者选择最适合其用例的内核，并为应用程序提供统一的高级 API。这种方法的一个极好例子是 [Oniro 项目](https://oniroproject.org/)。Oniro
    可以使用 Linux、Zephyr 或 LiteOS 内核。它拥有一个内核抽象层，统一了进程和线程管理、内存管理、文件系统、网络管理和外设管理。Oniro
    是面向全球市场的 OpenHarmony 的兼容实现，OpenHarmony 是一个由 [OpenAtom 基金会](https://OpenAtomFoundation.org/)
    规范并托管 的开源操作系统。


    物联网受限设备的一个关键问题是保持其更新。随着时间的推移，您编写的代码和使用的操作系统中都会出现漏洞。恶意行为者随时准备[利用这些漏洞进行网络攻击](https://www.zdnet.com/article/your-insecure-internet-of-things-devices-are-putting-everyone-at-risk-of-attack/)。^(⁸)
    如果您是一名物联网开发者或立志成为一名物联网开发者，认真对待安全更新至关重要。一些实时操作系统和协议具有内置的更新管理功能，可以与各种服务器端平台集成。[Eclipse
    hawkBit](https://www.eclipse.org/hawkbit/) 就是此类平台的一个例子。[Eclipse Hara](https://projects.eclipse.org/projects/iot.hawkbit.hara)
    项目提供了一个 hawkBit API 的示例客户端实现，您可以在您的受限设备上利用它`–`或者至少从中获得灵感`–`。有些人会（并且有理由地）说，零信任方法有助于减轻受损设备带来的危险。然而，恶意行为者可能会利用此类设备攻击他人，而不仅仅是您的组织。因此，[拥有负责任的安全态势至关重要](https://www.zdnet.com/article/the-iot-is-getting-a-lot-bigger-but-security-is-still-getting-left-behind/)。^(⁹)
    这包括至少为您的客户和最终用户提供一个报告安全漏洞的渠道，并承诺在收到报告后采取行动。


    最后是传感器和执行器。选择合适的组件可能是一项复杂的任务。对于传感器而言，其精度、耐用性和采样率都是关键的考虑因素。至于执行器，它们接收电信号并将其与能源相结合。有几种类型，包括电动、液压和气动等。市场上大多数带有微控制器的开发板都提供一系列内置传感器，以及用于连接传感器和执行器的
    I/O 和总线。

