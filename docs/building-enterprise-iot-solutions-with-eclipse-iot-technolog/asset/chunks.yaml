    ## 协议：基础构建模块


    从云端领域转向物联网和边缘计算的开发者有时会认为，HTTP 和 REST 这些现代微服务构建者的瑞士军刀，就是他们所需的一切。当然，这是一个错误。物联网和边缘设备运行在这样一个环境中：减少电池消耗和带宽使用至关重要。因此，许多解决方案使用
    UDP 而非 TCP 作为其传输协议（尽管许多物联网专用协议同时支持两者）。此外，在边缘端，拓扑结构和交互模型的种类也更加丰富。设备网状网络在物联网项目中很常见，发布/订阅交互也是如此。其结果是，存在许多物联网专用协议。其中一些，如
    MQTT 和 OPC UA，甚至已经存在了 20 多年。与工业自动化中传统使用的协议（如 Modbus 和 Profinet）相比，现代物联网协议更安全，并且可以通过公共互联网安全地路由。因此，大多数云端物联网中间件都支持它们。


    当前的物联网协议利用两种主要的交互模型之一：请求/响应或发布/订阅。在请求/响应模型中，客户端与特定服务器建立连接，发送请求，并最终得到响应——无论同步与否。HTTP
    是请求/响应模型的典型例子。在发布/订阅模型中，发送者（发布者）与接收者（订阅者）完全解耦。发布者将消息发送到特定位置，如果订阅者注册接收消息，他们将收到发送到该位置的消息。因此，发布者并不知道是否有订阅者存在。MQTT
    是发布/订阅模型最广泛使用的实现。


    在撰写本文时，Eclipse 基金会共有 11 个物联网和边缘协议实现项目。其中八个实现了外部标准机构管辖下的标准。它们列于表 1-1 中。


    表 1-1


    外部管辖协议的实现


    | 协议 | 组织 | 模型 | Eclipse 项目 |

    | --- | --- | --- | --- |

    | 受限应用协议 (CoAP) | 互联网工程任务组 (IETF) | 请求/响应 | [Eclipse Californium](https://www.eclipse.org/californium/)
    |

    | 数据分发服务 (DDS) | DDS 基金会 (对象管理组织) | 发布/订阅 | [Eclipse Cyclone DDS](https://projects.eclipse.org/projects/iot.cyclonedds)
    |

    | 轻量级 M2M (LwM2M) | OMA SpecWorks | 请求/响应 | [Eclipse Leshan](https://www.eclipse.org/leshan/)[Eclipse
    Wakaama](https://www.eclipse.org/wakaama/) |

    | OPC UA | OPC 基金会 | 请求/响应发布/订阅 | [Eclipse Milo](https://projects.eclipse.org/projects/iot.milo)
    |

    | MQTT | OASIS Open | 发布/订阅 | [Eclipse Amlen](https://www.eclipse.org/amlen/)[Eclipse
    Mosquitto](https://mosquitto.org/)[Eclipse Paho](https://www.eclipse.org/paho/)
    |


    此外，还有三个协议实现完全由 Eclipse 基金会管理。这些详见表 1-2。


    表 1-2


    Eclipse 基金会管理的协议


    | **协议** | **模型** | **Eclipse 项目** |

    | --- | --- | --- |

    | 生产性能管理协议 (PPMP) | 仅数据格式 | [Eclipse Unide](https://www.eclipse.org/unide/) |

    | Sparkplug | 发布/订阅 | [Eclipse Sparkplug Specification](https://projects.eclipse.org/projects/iot.sparkplug)[Eclipse
    Tahu](https://projects.eclipse.org/projects/iot.tahu) |

    | zenoh | 发布/订阅 | [Eclipse zenoh](https://zenoh.io/) |


    在这三个协议中，目前只有 Sparkplug 是根据 [Eclipse 基金会规范流程](https://www.eclipse.org/projects/efsp/)
    进行管理的。该流程是对 [Eclipse 开发流程](https://www.eclipse.org/projects/dev_process) 的补充，定义了
    Eclipse 基金会规范项目的开源参与规则、组织框架和工作流程。Eclipse 规范项目以透明、供应商中立的方式公开运作。任何人都可以通过在规范的公共仓库中提出问题或提交拉取请求来提议对规范进行更改。这些提议是否会被考虑，取决于规范项目的提交者。


    面对如此多的选择，为你的解决方案挑选最合适的协议可能看起来是一项艰巨的任务。以下是一些可以引导你做出选择的自问问题：


    *   **我想要实现什么目标？** 如果你只是收集传感器数据，发布/订阅协议可能是最佳选择。请求/响应协议更适合命令——至少在你有时效性要求的情况下是这样。


    *   **我的约束条件是什么？** 某些协议更适合优化吞吐量；其他协议则有助于减少延迟或功耗。不要盲目相信他人的断言，要亲自测试！


    *   **我的生态系统是什么？** 你可以选择传感器、执行器或其他硬件，然后使用它们支持的协议。反之，你也可以选择一个协议，然后寻找合适的产品。无论哪种方式，你都将定义你生态系统的边界。


    ## 广泛的物联网和边缘工具包


    我们对参考架构以及 Eclipse 基金会物联网和边缘生态系统的巡览到此结束。如你所见，你可用的工具包相当广泛。Pierre Aucoin 咨询公司的首席物联网和数字化转型分析师
    Arnold Vogt 在一份报告中写道：*“在我们看来，Eclipse 基金会的物联网工作组无疑是领先的开源物联网社区。我们最好的两家供应商都是该社区的一部分，这并不令我们惊讶。”*^(¹¹)


    但在这件事上，你不必只相信我的话，甚至也不必只相信 Arnold 的话。图 1-3 展示了我们的参考架构，其中包含了前面讨论过的项目的标志。


    ![](img/524096_1_En_1_Fig3_HTML.jpg)


    一个物联网参考架构展示了受限设备、边缘、物联网平台、协议、连接性、开发工具、安全性和硬件的标志。


    图 1-3


    带有项目标志的物联网参考架构（来源：Eclipse 基金会）


    眼见为实。我们的物联网和边缘社区不仅建造了一堆岩石，更建造了一座代码的大教堂。


