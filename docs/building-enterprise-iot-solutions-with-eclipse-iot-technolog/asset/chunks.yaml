    ### 蜂窝网络（LTE、5G）


    无线宽带通信在全球大部分人口稠密地区已广泛普及。因此，蜂窝连接成为许多类型的物联网和边缘计算部署的热门选择。在撰写本文时，LTE 和 5G 是仅有的两个合理选项，因为全球大多数无线运营商已开始逐步关闭其
    3G 网络。3G、LTE 和 5G 是由[第三代合作伙伴计划 (3GPP)](https://www.3gpp.org/) 管理的技术。5G 是 LTE 的后续演进技术。


    长期演进 (LTE) 是一种基于先前 GSM/EDGE 和 UMTS/HSPA 标准的无线宽带标准。LTE 的频率和频段因国家而异；不过，可以采购支持多个频段的设备和无线电模块。这些频段的范围在
    450 MHz 至 5 GHz 之间。LTE 标准仅支持全 IP 网络上的分组交换。因此，运营商必须设计出承载语音通话的解决方案，例如 *长期演进语音承载*
    (VoLTE) 标准。其优势在于 LTE 和 5G 网络开箱即支持 TCP/IP。请注意，不要将 LTE 与 LTE-M 混淆，后者是一种窄带无线技术，我将在后面介绍。


    5G 可以在低频段、中频段或高频段毫米波 (mmWave) 频率范围内实现。低频段 5G 使用 600–900 MHz 的范围，这与 LTE 重叠。这带来了
    30 到 250 Mbit/s 的下载速度，略优于 LTE。低频段 5G 基站的有效范围与 4G 基站相同。另一方面，中频段 5G 依赖于 1.7 至 4.7
    GHz 范围内的微波。这转化为 100 至 900 Mbit/s 之间的速度。中频段 5G 基站的范围半径可达数公里。最后，高频段 5G 目前在 24 至
    47 GHz 的频率范围内运行，尽管未来可能会使用更高的频率。毫米波 5G 理论上可以提供超过每秒千兆比特 (Gbit/s) 的速度，与最佳有线互联网连接相当。然而，如此高频率的波很容易被墙壁或窗户的建筑材料阻挡。因此，基站的有效范围要小得多，从而推高了部署成本。因此，毫米波
    5G 在人口密集的城市区域或大量人群聚集的场所（如体育场馆）之外非常稀缺。


    LTE 和 5G 连接常见于网关和边缘节点中，其内部通常通过 USB 或 PCIe 连接集成适当的无线电模块。与智能手机一样，无线电模块需要一张 SIM（用户身份模块或用户识别模块）卡才能正常工作。此类卡是设计用于安全存储国际移动用户识别码
    (IMSI) 号码及其对应密钥的集成电路。两者都用于在无线宽带网络上识别和验证用户。近年来，eSIM（嵌入式 SIM）越来越受欢迎。eSIM 是永久表面贴装在设备内部且可编程的；甚至可以远程配置它们。这提高了设备的可靠性和安全性。


    许多网关支持两个或更多 SIM 卡，从而能够在主网络出现问题时使用备用网络作为回退。LTE 和 5G 连接也可用作带外连接解决方案来管理设备；在这种情况下，它可能具有成本效益，因为通常根据带宽消耗计费。


    ### 以太网


    自 20 世纪 80 年代以来，以太网一直是有线局域网 (LAN)、城域网 (MAN) 和广域网 (WAN) 中使用的主导标准。到 80 年代末，它已经取代了
    ARCNET 和令牌环等竞争替代方案。[IEEE 标准协会](https://standards.ieee.org/) 维护着以太网标准的各个版本。


    最初的 10BASE5 以太网使用连接到网络上每台机器的同轴电缆（共享介质），而较新的变体则使用双绞线和光纤链路以及交换机。目前最常用的形式是 10BASE-T、100BASE-TX
    和 1000BASE-T。它们提供 10 Mbit/s、100 Mbit/s 和 1 Gbit/s 的速度。该标准还有一个更高性能的版本，即万兆以太网（10GE、10GbE
    或 10 GigE），但由于其每端口成本仍然较高，其采用率比以前的版本更有限。鉴于此，2.5GBASE-T（2.5 Gbit/s）和 5GBASE-T（5
    Gbit/s）标准应运而生，以提供比 1000BASE-T 更高的吞吐量，而无需承担与 10GE 相关的成本。


    以太网电缆允许的最大长度取决于所使用的布线技术。100BASE-TX 和 1000BASE-T 依赖于双绞线电缆。它们都规定了 100 米（330 英尺）的最大电缆长度，并且在推出时需要
    5 类电缆。此后，IEEE 弃用了 5 类电缆；新安装使用超五类线。光纤变体通常使用小型可插拔 (SFP) 热插拔网络接口模块。根据所选电缆类型、连接器和标准版本，最大电缆长度从
    550 米（约 1800 英尺）到 160 公里（约 100 英里）不等。


    以太网不仅限于数据传输。以太网供电 (PoE) 描述了在双绞线以太网布线中传输电力和数据的几种标准或专用系统。有几种广泛使用的技术用于通过以太网传输电力。其中三种自
    2003 年以来已标准化为 IEEE 802.3。最初的 IEEE 802.3af-2003 PoE 标准为每个端口提供高达 15.4 W 的直流电源（最小
    44 V 直流电和 350 mA）。由于功率耗散，设备只能获得 12.9 W。更新的 IEEE 802.3at-2009 PoE 标准（通常称为 PoE+
    或 PoE plus）提供高达 25.5 W 的功率。该标准禁止使用电缆中的所有四对线来传输电力。IEEE 将 802.3af-2003 和 802.3at-2009
    纳入 IEEE 802.3-2012 出版物。最后，IEEE 802.3bt-2018 标准（也称为 PoE++ 或 4PPoE）进一步提升了 802.3at
    的能力。该标准引入了两种额外的功率类型：高达 51 W 的输送功率（类型 3）和高达 71.3 W 的输送功率（类型 4）。每对线需要处理 600 mA（类型
    3）或 960 mA（类型 4）。所有 IEEE PoE 变体都支持千兆以太网 (1000BASE-T)，并且 802.3bt 可以在 2.5GBASE-T、5GBASE-T
    和 10GBASE-T 上工作。


    如今，大多数台式计算机都支持千兆以太网，几乎所有的物联网网关和边缘节点也是如此。许多 MCU 也可以配备以太网连接。例如，[Arduino Ethernet](https://www.arduino.cc/en/Main/arduinoBoardEthernet)
    将 ATmega328 与 WIZnet 的 W5100 嵌入式以太网控制器相结合，提供对 10/100 兆位双绞线以太网连接的支持。可以添加符合 IEEE
    802.3af 标准的 PoE 模块为电路板供电。Raspberry PI 还推出了[一个 802.​3af PoE 模块](https://www.raspberrypi.com/products/poe-hat/)，可用于为
    Raspberry Pi 4 Model B 和 Raspberry Pi 3 Model B+ 电路板供电。当然，您将用于支持 PoE 的设备的任何网络交换机都需要支持正确版本的
    IEEE 802.3。或者，也可以使用标准以太网交换机并部署 PoE 注入器，为来自非 PoE 设备的以太网信号增加电力。


    以太网是为许多物联网和边缘计算设备提供有线连接的成熟解决方案。它特别适用于部署在室内固定位置的设备。PoE 在数字建筑和互联工厂等环境中非常常见。

