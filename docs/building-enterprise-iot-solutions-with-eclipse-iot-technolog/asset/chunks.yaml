- fmt: '### Making the Connection


    Like other computers, MCUs process information in digital form. In other words,
    they can directly interpret binary signals. Such signals can represent if a door
    is open or convey a button press. If the MCU operates at 3.3v, it will understand
    a 0v measurement as a binary 0 and a 3.3v measurement as a binary 1. Microcontrollers
    feature general-purpose input/output (`GPIO`) pins to send or receive digital
    signals. However, the real world is more nuanced than just zeros and ones. Therefore,
    many sensors and actuators work with analog values. In other words, they will
    send or process voltage values on a specific scale. For a 3.3v MCU, an analog
    sensor would return any value between 0v and 3.3v. Most MCUs are equipped with
    one or several analog-to-digital converters (`ADCs`) to make sense of such signals.
    `ADCs` can translate an analog voltage on a pin to a digital value. They can also
    convert voltage levels to a range supported by the MCU.


    There are many different types of `ADCs`. The `ADC` on most Arduinos is a 10-bit
    `ADC`, meaning it can detect 1,024 (2^10) discrete analog levels. Some microcontrollers
    sport 8-bit `ADCs` (2^8 = 256 discrete levels), and some have 16-bit (2^16 = 65,536
    discrete levels) or even 24-bit (2^24 = 16,777,216 discrete levels) `ADCs`. Another
    important characteristic of `ADCs` is their sample rate: the frequency expressed
    in Hertz (Hz) at which the `ADC` samples the input signal. It is critical to remember
    that sensors have their sampling rates as well. Consequently, you need to make
    sure the combination of sensors and `ADCs` you plan to use can deliver the sampling
    rate you need together.


    Integrated circuit (`IC`) `GPIOs` are implemented in a variety of ways. The term
    designates pins dedicated to digital signals, not a uniform pin layout standard.
    Sometimes, expander `ICs` are used to interface `GPIO` pins to serial communication
    buses such as `I²C` and `SMBus`. Microcontrollers usually include `GPIOs`. Depending
    on the application, a microcontroller''s `GPIO` pins may represent its primary
    interface to external circuitry, or they may be one type of I/O used among an
    array of options.


    `I²C`, `SPI`, `UART`, and `W1` are four highly relevant I/O interfaces commonly
    found on microcontrollers and even industrial computers. I will now summarize
    the characteristics of those four interfaces.


    - **I²C (Inter-integrated Circuit):** A serial communications protocol common
    in MCU-based devices, particularly for interfacing with sensors, storage devices,
    and LCDs. It is a synchronous protocol since it uses a clock line. The `I²C` protocol
    is comparable to `SPI` but uses fewer wires. However, it can make working with
    multiple instances of sensors featuring fixed addresses difficult due to addressing
    collisions. `I²C` permits multiple main (master) nodes, which is not possible
    with `SPI`.


    - **SPI (Serial Peripheral Interface):** Another synchronous serial communication
    protocol common in MCU-based devices. It is faster than both `UART` and `I²C`
    but requires more wires. Multiple subnodes can rely on the same `SPI` main pin,
    and devices can even be daisy-chained.


    - **UART (Universal Asynchronous Receiver-Transmitter):** Otherwise known as a
    serial port, it is a commonly included peripheral on MCUs. Asynchronous serial
    ports provide a simple way for two devices to communicate without the need for
    a shared clock signal. `UARTs` require only two wires, although they frequently
    feature two additional ones (`RTS` and `CTS`) to implement hardware flow control,
    which prevents data loss. Whether hardware flow control is necessary depends on
    the wire protocol used.


    - **1-Wire:** A protocol enabling low-speed (16.3 kbit/s) connections over a single
    wire. The wire also transits signaling and power. `1-Wire` is similar in concept
    to `I²C` but delivers a longer range at the cost of reduced data rates. `1-Wire`
    connections are typically one to many from the MCU to several peripherals.


    You probably noticed that the four options I just discussed are serial and bidirectional
    protocols. This is no accident. Serial protocols reduce cabling requirements when
    deploying large numbers of devices, making them cost-effective. Table [8-3](#524096_1_En_8_Chapter.xhtml#Tab3)
    compares the four protocols with each other.


    **Table 8-3** Comparison of MCU I/O protocols


    | | `I²C` | `SPI` | `UART` | `1-Wire` |

    | --- | --- | --- | --- | --- |

    | Duplex | Half | Half – 3 wires Full – 4 wires | Full | Half |

    | Server:Client(s) | *:* | 1:* | 1:1 | 1:* |

    | Wires per device | 2 | 3 or 4 | 1 | 1 |

    | Data rate | 100 Kibit/s 400 Kibit/s 1 Mibit/s 3.4 Mibit/s | Depends on the devices
    (over 10 MiB/s is possible) | Up to 5 MiB/s | 16 Kibit/s |

    | Maximal distance | 1m | 0.2m | 15m | Up to 350m (depends on the topology and
    number of devices) |


    Although I referred only to sensors in my explanations, the protocols I covered
    can also be used to control actuators. Another useful technique to leverage when
    working with them is pulse-width modulation (`PWM`). `PWM` is a technique used
    in robotics for driving motors and servos. Using internal counters, the MCU modulates
    the duty cycle of a square wave to control the quantity of power provided to a
    device. The average value of voltage (and current) provided to the device is controlled
    by turning the switch between supply and load on and off at a fast rate. Many
    MCUs ship with `PWM` controllers exposed to external pins as peripherals under
    firmware control.


    ## Endpoints, Gateways, and Edge Nodes


    Compared to MCUs, IoT endpoints (which often contain a single MCU), IoT gateways,
    and edge computing nodes are closer in capability to traditional servers. In fact,
    in some cases, edge computing nodes will be traditional servers deployed in a
    local data center at the edge of the fiber network of a connectivity provider.
    However, gateways and edge nodes are often found outside the confines of the data
    center. An IoT gateway could be used to integrate legacy programmable logic controllers
    (`PLCs`) over a `CAN bus` connection, for example. Edge nodes deployed in a wind
    firm could be used to aggregate data gathered from nearby turbines. For such deployment
    scenarios, relying on high-performance but low-power hardware makes much sense.
    Low-voltage processors can be cooled passively, and removing mechanical parts
    such as fans from the devices typically improves their mean time between failures
    (`MTBF`). Using low-voltage parts also has the added benefit of reducing heat
    output in the first place.


    The [2021 edition of the Eclipse IoT and Edge Developer Survey](https://outreach.eclipse.foundation/iot-edge-developer-2021)
    discovered that 32% of respondents used processors based on the `Arm v8` architecture
    in their IoT gateways and edge nodes. The `AMD/Intel x86-64` architecture came
    in second place at 29%, and `Arm v7` (32-bit) was the pick of 27% of respondents.
    Participants were allowed to select up to three choices for that question.


    Given the dominance of the `Cortex-A` and `x86-64` architectures, let’s now look
    at the types of processors they have to offer.'
