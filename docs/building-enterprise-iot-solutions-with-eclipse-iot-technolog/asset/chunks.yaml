    ## 设备管理


    在实际部署解决方案时，将物联网设备和边缘节点连接到企业应用只是第一步。您还需要监控它们、更新其软件，并随着时间的推移调整其设置和配置。当然，有多种方法可以实现这一点。一些物联网协议（如LwM2M）内置了对固件更新的支持。然而，在开源生态系统中，还有范围更广的设备管理构建模块可用。在本节中，我将重点介绍其中两个：Eclipse
    hawkBit和Eclipse Kapua。


    ### Eclipse hawkBit


    Eclipse hawkBit是一个领域无关的框架，用于向连接到基于IP网络的物联网设备、边缘节点和网关推出软件更新。该项目由Bosch.IO于2015年贡献给Eclipse基金会。hawkBit使用Java编写，并利用了Spring框架和Spring
    Boot。请注意，与许多其他Eclipse基金会项目不同，其代码是在[Eclipse公共许可证1.0版](https://www.eclipse.org/legal/epl-v10.html)下发布的，而非2.0版。


    hawkBit的官方网络资源如下：


    *   **网站：** [`https://eclipse.org/hawkbit`](https://eclipse.org/hawkbit)

    *   **Eclipse项目页面：** [`https://projects.eclipse.org/project/iot.hawkbit`](https://projects.eclipse.org/project/iot.hawkbit)

    *   **仓库：** [`https://github.com/eclipse/hawkbit`](https://github.com/eclipse/hawkbit)


    hawkBit的核心概念是*软件模块*。一个模块包含一个或多个*工件*，即将要部署到设备上的文件。hawkBit允许您根据需要将软件模块分组到*分发集*中。在执行部署时，您可以明确指定目标，或通过目标过滤器选择它们。


    与Eclipse Hono和Eclipse Ditto类似，hawkBit由多个微服务组成。该平台的功能集虽专注但很全面。以下是hawkBit的主要功能列表：


    *   **设备和软件仓库：** hawkBit为作为配置目标的设备和可部署的软件分发维护单独的列表。可以预先配置设备；这对于支持零接触部署场景非常有用。hawkBit会维护仓库中所有设备的完整软件更新历史记录。

    *   **软件更新管理：** hawkBit可以将软件分发部署到设备。此操作可以通过Web用户界面或REST API发起。有趣的是，hawkBit支持最初在[RFC
    7233](https://www.rfc-editor.org/info/rfc7233)中定义的下载恢复机制。设备只能访问其被授权的分发。您可以向设备部署增量更新，这意味着工件仅包含两个特定软件版本之间的差异。工件的完整性也可以通过数字签名来验证。

    *   **推出和活动管理：** hawkBit提供了处理大规模部署（也称为*推出*）的方法。如果您需要一次性更新成百上千台设备，则需要确保您的hawkBit实例和网络基础设施能够承受负载。此外，向设备子集部署软件更新可以维持一定的服务水平，并确保在部署失败时不会立即丧失全部容量。要执行推出，您需要将设备群划分为*部署组*；或者，hawkBit可以根据预定义的组大小自动生成这些组。在推出过程中，平台将按顺序逐个处理组；如果某个组的错误率超过您提供的阈值，推出将中止。


    hawkBit提供了一个功能齐全的Web界面，使您能够使用上述大部分功能。图[13-2](#524096_1_En_13_Chapter.xhtml#Fig2)展示了其外观。


    ![](images/524096_1_En_13_Chapter/524096_1_En_13_Fig2_HTML.jpg)


    hawkBit的部署管理页面屏幕显示了目标的名称、状态和操作；分发；按标签过滤；simulated13的操作历史；以及目标和分发集的详细信息和描述。


    图13-2 Eclipse hawkBit用户界面


    从架构角度来看，hawkBit向使用者暴露了三个不同的API。以下是每个API的主要特征：


    *   **管理API：** 一个REST API，使您能够创建、读取、更新或删除（CRUD）配置目标（设备）和仓库内容（软件）。'
