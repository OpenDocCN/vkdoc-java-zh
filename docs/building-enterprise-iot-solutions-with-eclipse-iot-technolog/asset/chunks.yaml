    an *ad hoc* network in Bluetooth parlance. BLE allows theoretically millions of
    devices in a piconet, although going over a few hundred follower devices is impractical
    since all followers share the same radio time to communicate with the main. The
    main device in a piconet provides a clock used by the other devices as the base
    for packet exchange. Once a piconet is established, its members hop radio frequencies
    simultaneously to maintain the network and avoid interfering with other piconets
    that may be nearby.


    Bluetooth BR/EDR requires devices to be paired. The pairing process establishes
    a trust relationship between the two devices, which then can exchange data over
    an encrypted connection. Bluetooth LE works differently. Pairing is possible but
    not mandatory. Bluetooth BLE devices can make themselves detectable by others
    by broadcasting advertising packets. This broadcast relies on three separate channels
    (frequencies) to reduce interference. The advertising device transmits an advertising
    packet on at least one of the three channels. It will repeat the transmission
    on a period called the *advertising interval*. A delay of up to ten milliseconds
    is added to each advertising interval to reduce the probability of multiple consecutive
    collisions. The actual duration of the delay is determined randomly.


    Bluetooth is a popular choice for short-range connectivity in IoT solutions. It
    is available even in low-cost MCUs and supported by all serious real-time operating
    systems. Remember, however, that Bluetooth does not use TCP/IP, which reduces
    the range of protocols you can use over it. However, it is possible to establish
    IPv6 connections over Bluetooth by leveraging 6LoWPAN. 6LoWPAN is maintained by
    the IEFT and is documented in [RFC 4944](https://datatracker.ietf.org/doc/html/rfc4944).
    It was updated by [RFC 6282](https://datatracker.ietf.org/doc/html/rfc6282) (header
    compression) and [RFC 6775](https://datatracker.ietf.org/doc/html/rfc6775) (neighbor
    discovery optimizations). 6LoWPAN over Bluetooth BLE is covered in [RFC 7668](https://datatracker.ietf.org/doc/html/rfc7668).


    On the downside, Bluetooth is known for well-documented privacy and security issues.
    Bluetooth security supports authentication and encryption. However, poor implementations
    are common, and the protocol is vulnerable to denial-of-service attacks, spamming,
    and backdooring. Security researchers, in the past, focused their efforts to identify
    Bluetooth vulnerabilities mostly on the pairing process. The increased scrutiny
    of other parts of the protocol led to the discovery of additional weaknesses.
    For example, in 2020, researchers from Purdue University uncovered issues in the
    Bluetooth BLE reconnection process, which unfolds when a device moves out of range
    and comes back online later. Many implementations make authentication optional
    during device reconnection, and the authentication process can be circumvented
    in specific circumstances.^([^(42)](#fn42)) You should thoroughly evaluate and
    test the security features of any Bluetooth devices you will deploy.'
  trans: '

    ### 蓝牙


    在本节列出的所有技术中，只有以太网和 Wi-Fi 像蓝牙一样普及。你的手机、汽车和笔记本电脑可能已经集成了这种无线技术。蓝牙由[蓝牙技术联盟](https://www.bluetooth.com/)管理。在蓝牙中，设备使用低功耗
    UHF 无线电波在 2.402 GHz 至 2.4835 GHz 的频段上进行通信。该频段在全球范围内无需许可，但受限于工业、科学和医疗用途。^(⁴¹) 在其最广泛使用的模式下，发射功率上限为
    2.5 毫瓦，因此有效距离可达 10 米（33 英尺）。


    注意


    *蓝牙*这个名字指的是 10 世纪的丹麦国王哈拉尔·蓝牙。它由英特尔公司的吉姆·卡达奇于 1997 年提出，他是蓝牙 SIG 的创始人之一。蓝牙原本是一个占位名称，计划在商业化之前替换掉，但商标问题阻碍了这一计划。无论如何，在它被更改之前，这个名字已经传遍了整个行业。这里的教训是：务必谨慎选择你项目的代码名称。


    蓝牙技术有两种类型：低功耗蓝牙（LE）和基础速率/增强速率蓝牙（BR/EDR）。两种类型都允许两个设备之间进行点对点连接。两者也都在同一频段上运行，但低功耗蓝牙是更受欢迎的选择。它运行所需的能量少得多，并且能够创建网状网络。低功耗蓝牙的数据速率可达
    1 Mbit/s（蓝牙 4 及以下）或 2 Mbit/s（蓝牙 5），而 BR/EDR 最高可达 3 Mbit/s。


    蓝牙使用一种称为跳频扩频的无线电技术。它基于数据包，并在 79 个预定义信道之一上传输每个数据包。每个信道的带宽为 1 MHz。低功耗蓝牙信道使用 2 MHz
    的间隔，容纳 40 个信道。此外，蓝牙依赖于主/从架构。在 BR/EDR 中，一个主设备最多可与七个从设备通信，形成一个微微网：用蓝牙术语来说就是一个*自组织*网络。BLE
    理论上允许一个微微网中有数百万个设备，但超过几百个从设备是不切实际的，因为所有从设备共享相同的无线电时间与主设备通信。微微网中的主设备提供一个时钟，其他设备将其作为数据包交换的基础。一旦微微网建立，其成员会同时跳变无线电频率以维持网络，并避免干扰附近可能存在的其他微微网。


    蓝牙 BR/EDR 要求设备进行配对。配对过程在两个设备之间建立信任关系，然后它们可以通过加密连接交换数据。低功耗蓝牙的工作方式不同。配对是可选的，并非强制。蓝牙
    BLE 设备可以通过广播通告数据包使自己被其他设备发现。这种广播依赖于三个独立的信道（频率）以减少干扰。通告设备在至少一个信道上发送一个通告数据包。它会以称为*通告间隔*的周期重复发送。每个通告间隔会增加最多十毫秒的延迟，以降低多次连续冲突的概率。延迟的实际持续时间是随机确定的。


    蓝牙是物联网解决方案中短距离连接的流行选择。它甚至在低成本 MCU 中也可用，并得到所有主流实时操作系统的支持。但是，请记住，蓝牙不使用 TCP/IP，这减少了你可以在其上使用的协议范围。然而，可以通过利用
    6LoWPAN 在蓝牙上建立 IPv6 连接。6LoWPAN 由 IETF 维护，并在 [RFC 4944](https://datatracker.ietf.org/doc/html/rfc4944)
    中记录。它由 [RFC 6282](https://datatracker.ietf.org/doc/html/rfc6282)（头部压缩）和 [RFC 6775](https://datatracker.ietf.org/doc/html/rfc6775)（邻居发现优化）更新。蓝牙
    BLE 上的 6LoWPAN 在 [RFC 7668](https://datatracker.ietf.org/doc/html/rfc7668) 中涵盖。


    不利的一面是，蓝牙以其有据可查的隐私和安全问题而闻名。蓝牙安全支持身份验证和加密。然而，糟糕的实现很常见，并且该协议容易受到拒绝服务攻击、垃圾信息和后门攻击。过去，安全研究人员主要将精力集中在识别配对过程中的蓝牙漏洞上。对协议其他部分的加强审查导致了更多弱点的发现。例如，2020
    年，普渡大学的研究人员发现了蓝牙 BLE 重新连接过程中的问题，该过程发生在设备移出范围后又重新上线时。许多实现在设备重新连接期间使身份验证成为可选项，并且在特定情况下可以绕过身份验证过程。^(⁴²)
    你应该彻底评估和测试你将部署的任何蓝牙设备的安全特性。

    '
- fmt: '### Cellular (LTE, 5G)


    Wireless broadband communications are widely available in most populated regions
    of the globe. For this reason, cellular connectivity is a popular choice for many
    types of IoT and edge computing deployments. At the time of writing, `LTE` and
    `5G` were the only two options that made sense since most wireless operators worldwide
    had started to wind down their `3G` networks. `3G`, `LTE`, and `5G` are technologies
    managed by the [3rd Generation Partnership Project (3GPP)](https://www.3gpp.org/).
    `5G` is the successor technology to `LTE`.


    Long-Term Evolution (`LTE`) is a standard for wireless broadband based on the
    previous `GSM/EDGE` and `UMTS/HSPA` standards. `LTE` frequencies and bands vary
    from country to country; however, it is possible to procure devices and radios
    that support multiple bands. The bands will be found in a range from 450 MHz to
    5 GHz. The `LTE` standard supports only packet switching over all-IP networks.
    Consequently, operators had to devise solutions to carry voice calls, such as
    the *Voice over Long-Term Evolution* (`VoLTE`) standard. The upside is that `LTE`
    and `5G` networks support `TCP/IP` out of the box. Please do not confound `LTE`
    with `LTE-M`, a narrowband wireless technology I will cover later.


    `5G` can be implemented in low-band, mid-band, or high-band millimeter-wave (`mmWave`)
    frequency ranges. Low-band `5G` uses a range of 600–900 MHz, which overlaps with
    `LTE`. This results in download speeds of 30 to 250 Mbit/s, marginally better
    than `LTE`. The effective range of low-band `5G` towers is the same as `4G` towers.
    Mid-band `5G`, on the other hand, relies on microwaves in the 1.7 to 4.7 GHz range.
    This translates to speeds between 100 and 900 Mbit/s. The mid-band `5G` cell towers’
    range can reach several kilometers in radius. Finally, high-band `5G` operates
    in frequencies currently ranging from 24 to 47 GHz, although higher frequencies
    could be used in the future. `mmWave` `5G` can theoretically deliver speeds over
    a gigabit per second (`Gbit/s`), comparable to the best wired Internet connections.
    However, waves in such high frequencies are easily blocked by the construction
    materials used in walls or windows. Consequently, the effective range of the towers
    is much smaller, driving up the costs of deployments. `mmWave` `5G` is thus scarce
    outside densely populated urban areas or venues where large quantities of people
    congregate, such as sports stadiums.


    `LTE` and `5G` connectivity is often found in gateways and edge nodes, inside
    which the proper radio modules are often integrated through a `USB` or `PCIe`
    connection. As with smartphones, the radio module requires a `SIM` (Subscriber
    Identity Module or Subscriber Identification Module) card to work properly. Such
    cards are integrated circuits designed to securely store the international mobile
    subscriber identity (`IMSI`) number and its corresponding key. Both are used to
    identify and authenticate subscribers on wireless broadband networks. In recent
    years, `eSIMs` (embedded SIMs) have gained in popularity. `eSIMs` are surface
    mounted permanently inside a device and are programmable; it is even possible
    to provision them remotely. This improves the reliability and security of the
    devices.


    Many gateways offer support for two `SIMs` or more, enabling the use of an alternate
    network as a fallback in the case of issues with the primary network. `LTE` and
    `5G` connectivity can also be used as an out-of-band connectivity solution to
    manage devices; it can be cost-effective in such scenarios since it is usually
    invoiced according to bandwidth consumption.


    ### Ethernet


    Ethernet has been the dominant standard used in wired local area networks (`LAN`),
    metropolitan area networks (`MAN`), and wide area networks (`WAN`) since the 1980s.
    By the end of that decade, it had supplanted competing alternatives such as `ARCNET`
    and `Token Ring`. The [IEEE Standards Association](https://standards.ieee.org/)
    maintains the various versions of the Ethernet standard.


    The original `10BASE5` Ethernet used a coaxial cable attached to every machine
    on the network (shared media), while newer variants use twisted pair and fiber-optic
    links in conjunction with switches. The most common forms used currently are `10BASE-T`,
    `100BASE-TX`, and `1000BASE-T`. They offer speeds of 10 Mbit/s, 100 Mbit/s, and
    1 Gbit/s. A higher-performance version of the standard, 10 Gigabit Ethernet (`10GE`,
    `10GbE`, or `10 GigE`), also exists but has seen more limited adoption than previous
    versions since it is still more expensive on a per-port basis. Given this, the
    `2.5GBASE-T` (2.5 Gbit/s) and `5GBASE-T` (5 Gbit/s) standards emerged to deliver
    higher throughputs than `1000BASE-T` without the cost associated with `10GE`.


    The maximum length allowed for Ethernet cables depends on the cabling technology
    used. `100BASE-TX` and `1000BASE-T` rely on twisted pair cables. They both specify
    a maximum cable length of 100 meters (330 ft) and required Category 5 cable at
    their introduction. Since then, IEEE deprecated Category 5 cable; new installations
    use Category 5e. Fiber-optic variants typically use small form-factor pluggable
    (`SFP`) hot-pluggable network interface modules. Depending on the type of cable,
    connector, and version of the standard selected, the maximum cable length goes
    from 550 m (about 1800 feet) to 160 km (about 100 miles).


    Ethernet is not limited to data transmission. Power over Ethernet (`PoE`) describes
    several standards or ad hoc systems that transmit electric power and data on twisted-pair
    Ethernet cabling. There are several widely used techniques for transmitting power
    over Ethernet. Three of them have been standardized as `IEEE 802.3` since 2003.
    The original `IEEE 802.3af-2003` `PoE` standard delivers up to 15.4 W of DC power
    (minimum 44 V DC and 350 mA) to each port. The device will only have access to
    12.9 W due to power dissipation. The updated `IEEE 802.3at-2009` `PoE` standard
    (often called `PoE+` or `PoE plus`) delivers up to 25.5 W of power. This standard
    prohibits using all four pairs of wires in the cable for power. IEEE incorporated
    `802.3af-2003` and `802.3at-2009` into the `IEEE 802.3-2012` publication. Finally,
    the `IEEE 802.3bt-2018` standard (also known as `PoE++` or `4PPoE`) pushes further
    the capabilities of `802.3at`. This standard introduces two additional power types:
    up to 51 W delivered power (Type 3) and up to 71.3 W delivered power (Type 4).
    Each pair of wires needs to handle 600 mA (Type 3) or 960 mA (Type 4). All IEEE
    `PoE` variants support Gigabit Ethernet (`1000BASE-T`), and `802.3bt` can work
    over `2.5GBASE-T`, `5GBASE-T`, and `10GBASE-T`.


    Nowadays, most desktop computers ship with support for Gigabit Ethernet, as do
    nearly every IoT gateway and edge node. Many `MCUs` can also ship with Ethernet
    connectivity. For example, the [Arduino Ethernet](https://www.arduino.cc/en/Main/arduinoBoardEthernet)
    combines an `ATmega328` with a `W5100` Embedded Ethernet Controller from `WIZnet`,
    which delivers support for 10/100 megabits twisted-pair Ethernet connectivity.
    It is possible to add an `IEEE 802.3af` compliant `PoE` module to power the board.
    Raspberry PI also ships [an 802.3af PoE module](https://www.raspberrypi.com/products/poe-hat/)
    that can be used to source power for the Raspberry Pi 4 Model B and the Raspberry
    Pi 3 Model B+ boards. Of course, any network switch you will use with `PoE`-enabled
    devices will need to support the correct version of `IEEE 802.3`. Alternatively,
    it is possible to use standard Ethernet switches and deploy `PoE` injectors, adding
    power to the Ethernet signal delivered by a non-`PoE` device.


    Ethernet is a proven solution to deliver wired connectivity to many IoT and edge
    computing devices. It is especially well suited to equipment deployed in fixed
    locations indoors. `PoE` is very common in digital buildings and connected factories,
    among other settings.'
