- fmt: "# 4. MQTT\n\n> *Personne ne sait comment sont exactement les choses quand\
    \ on ne les regarde pas.*\n> \n> *No one knows how things exactly are when you\
    \ don’t look at them.*\n> \n> —Hubert Reeves, *Patience dans l’azur*\n\nTo understand\
    \ the significance of MQTT, you need to understand the difference between IoT\
    \ and embedded computing. Microcontrollers and general-purpose microprocessors\
    \ have been used for a long time in large mechanical or electronic systems; the\
    \ Apollo guidance computer used to conquer the moon in the 1960s is an early example\
    \ of the concept. Nowadays, embedded systems power various devices, from small\
    \ personal ones to larger machines such as industrial robots and assembly lines.\
    \ They are also at the core of specific subsystems of complex machines, such as\
    \ the antilock brakes of your car.\n\nEmbedded systems found in factories, water-processing\
    \ facilities, and electrical grids are nearly always part of a network. This has\
    \ been the case since the mid-1970s, which saw the emergence of *Supervisory Control\
    \ and Data Acquisition* (SCADA) solutions. What makes embedded systems different\
    \ from IoT solutions, then? In Chapter [1](#524096_1_En_1_Chapter.xhtml), I wrote\
    \ that IoT devices *“*contain embedded hardware and software.*”* IoT is thus clearly\
    \ a specific application of embedded technologies. However, embedded systems are\
    \ often tailor-made for a particular application, and their software is not frequently\
    \ updated once the manufacturer ships them. On the other hand, IoT devices benefit\
    \ from a permanent network connection and often gain new features through software\
    \ updates. In the end, *Internet* connectivity, and not just network connectivity,\
    \ is what makes IoT different from earlier embedded computing efforts.\n\nIn the\
    \ next two chapters, I will cover two technologies that are at the forefront of\
    \ the transition from traditional embedded systems to IoT. The first one is [MQTT](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dmqtt),\
    \ which was created at the end of the 20th century and has now become the leading\
    \ protocol for IoT applications. The second is [Sparkplug](https://sparkplug.eclipse.org),\
    \ which opens new possibilities for MQTT users. Both have been instrumental in\
    \ making industrial processes easier to observe. In other words, they have accelerated\
    \ the industry’s transition from analog to digital technologies.\n\n## What Is\
    \ MQTT?\n\nMQTT is an [OASIS Open](https://www.oasis-open.org/committees/download.php/49028/OASIS_MQTT_TC_minutes_25042013.pdf)\
    \ standard and an ISO recommendation (ISO/IEC 20922). At the time of writing,\
    \ the newest version is [version 5.0](https://docs.oasis-open.org/mqtt/mqtt/v5.0/mqtt-v5.0.html),\
    \ published in March 2019. This chapter refers to version 3.1.1 of the specification\
    \ unless specifically mentioned.\n\n> **Note**\n> \n> MQTT originally stood for\
    \ *“*MQ Telemetry Transport.” The “MQ” in the name referred to the IBM message\
    \ queuing products that had been the inspiration for MQTT. The MQTT Technical\
    \ Committee at OASIS Open decided in 2013 to make MQTT the name of the technology\
    \ and that [MQTT should not stand for anything](https://www.oasis-open.org/committees/download.php/49028/OASIS_MQTT_TC_minutes_25042013.pdf).^([^(12)](#fn12))\n\
    \nThe MQTT protocol was invented in 1999 by Andy Stanford-Clark and Arlen Nipper.\
    \ They needed to monitor oil pipelines via a satellite connection, and existing\
    \ protocols were not up to the task since they required continuous polling of\
    \ the sensors. Consequently, they decided to create a new protocol to maximize\
    \ the battery life of constrained devices deployed in the field while consuming\
    \ the least bandwidth possible.\n\nMQTT leverages the publish/subscribe interaction\
    \ model in a centralized architecture. Message publishers and subscribers are\
    \ *clients*. Those clients connect to one or several *brokers*, receiving published\
    \ messages and routing them to the appropriate clients. A client thus can be a\
    \ publisher, a subscriber, or both. In MQTT, publishers and subscribers are completely\
    \ decoupled from each other. This means several clients could receive a specific\
    \ message and publish messages to the same destination. Usually, publishers do\
    \ not know if any subscribers will receive their messages.\n\n## Messages\n\n\
    MQTT messages, also called *packets* in the specification, have a simple structure.\n\
    \n1. **Fixed header:** Present in all messages, the fixed header is 1 byte in\
    \ length. The first four bits (bits 7 to 4) represent an unsigned value for the\
    \ *packet type*. These packet types include `PUBLISH`, `SUBSCRIBE`, and `CONNECT`,\
    \ among others. The remaining bits (3 to 0) contain *flags* specific to each packet\
    \ type. As of MQTT 5.0, the specification’s authors reserved most flags for future\
    \ use except in the case of the `PUBLISH` packet type.\n\n2. **Variable header:**\
    \ Present in some messages only. The variable header can contain a *packet identifier*\
    \ and a set of *properties*. This set of properties comprises a length indicator\
    \ (variable byte integer) and an arbitrary number of properties. Each property\
    \ consists of an identifier (variable byte integer) and a value. The value’s type\
    \ depends on the specific property being set, and properties can be set in any\
    \ order.\n\n3. **Payload:** Present in some messages only. Some messages, such\
    \ as pings (`PINGREQ`, `PINGRESP`) and various types of acknowledgments, do not\
    \ have a payload.\n\n[Section 2 of the MQTT specification](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901019)\
    \ describes the packet type flag and the values for the variable headers in detail.\n\
    \n> **Note**\n> \n> A variable byte integer is an encoding of 64-bit unsigned\
    \ integers, which uses between 1 and 9 bytes. They have the advantage of taking\
    \ up less space for small values.\n\nA crucial design decision in MQTT was to\
    \ make the protocol payload agnostic. Specifically, `PUBLISH` packets contain\
    \ a payload in byte format. The publisher can transmit anything as a payload;\
    \ plain text or binary encodings are fine. Consequently, you can use XML, JSON,\
    \ or any format of your choosing to represent the data. Version 5.0 of MQTT added\
    \ properties to named `Payload Format` and `Content Type`. `Payload Format` is\
    \ a byte value. When set to 0, it indicates an “unspecified byte stream”; when\
    \ set to 1, it means a “UTF-8 encoded payload.” If the payload indicator is missing,\
    \ the broker will assume it is set to 0 to guarantee backward compatibility with\
    \ prior protocol versions. As for `Content Type`, it is a UTF-8 (Unicode) encoded\
    \ string. Applications usually expect a MIME content type, but you can also use\
    \ arbitrary values."
