  trans: "\n# 2. CoAP\n\n> *文明如同建筑的石块，由一代代人相互支撑、相继贡献而建成。*\n\n> *A civilization is\
    \ built by the successive contribution of generations leaning on each other like\
    \ the stones of a building.*\n> \n> ——安德烈·弗罗萨尔，《让-保罗二世的世界》\n\n开源的本质在于利用实现共享功能的构建模块。这使你能够专注于自己的应用场景，而无需重复实现无数人已经完成的工作。由于时间是一种极其有限的资源，你通过使用开源组件节省的每一分钟，都可以投入到为解决方案创造有意义的差异化价值上。\n\
    \n开源项目和标准同样受益于我刚才描述的方法。当一个开源项目将另一个项目作为依赖项时，它会强化各自所属的社区。拥有一个开源采用者，对于被依赖的项目而言，是宝贵的反馈来源和新需求的来源。对于采用者来说，利用开源依赖项提供了专有组件无法提供的灵活性和控制力。Eclipse\
    \ IoT 和 Edge 的多个构建模块都依赖于它们的同类项目。\n\n本章和下一章将介绍两种密切相关的协议：CoAP 和 LwM2M。在本章中，我将教你如何使用\
    \ [Eclipse Californium](https://www.eclipse.org/californium/)，一个成熟的 CoAP 实现；在下一章中，你将了解\
    \ [Eclipse Leshan](https://www.eclipse.org/leshan/)，这是一个使用 Californium 作为其 CoAP\
    \ 实现来构建 LwM2M 解决方案的框架。\n\n## CoAP：更精简的 HTTP\n\n与 HTTP 类似，*受限应用协议*（CoAP）在由*互联网工程任务组*（IETF）发布的*征求意见稿*（RFC）中进行了描述。在撰写本文时，CoAP\
    \ 是一项提议的互联网标准。CoAP 的初始 RFC，即 2014 年 6 月发布的 [RFC 7252](https://www.rfc-editor.org/info/rfc7252)，已由以下\
    \ RFC 更新：\n\n*   **RFC 7641：** [*受限应用协议（CoAP）中的资源观察*](https://www.rfc-editor.org/info/rfc7641)，2015\
    \ 年 9 月\n\n*   **RFC 7959：** [*受限应用协议（CoAP）中的块传输*](https://www.rfc-editor.org/info/rfc7959)，2016\
    \ 年 8 月\n\n*   **RFC 8613：** [*受限 RESTful 环境中的对象安全（OSCORE）*](https://www.rfc-editor.org/info/rfc8613)，2019\
    \ 年 7 月\n\n*   **RFC 8974：** [*受限应用协议（CoAP）中的扩展令牌和无状态客户端*](https://www.rfc-editor.org/info/rfc8974)，2021\
    \ 年 1 月\n\n所有这四个 RFC 都代表了可选功能，在特定实现中可能不存在。\n\n值得一提的是，加密的 CoAP 连接依赖于*数据报传输层安全*（DTLS）协议\
    \ 1.2 版本，该协议最初于 2012 年 1 月作为 [RFC 6347](https://www.rfc-editor.org/info/rfc6347)\
    \ 发布。DTLS 基于通常用于保护 HTTP 连接的*传输层安全*（TLS）协议，但侧重于数据报协议，例如*用户数据报协议*（UDP）。\n\n## 特性\n\
    \nCoAP 的创建者明确将其设计为类似于 HTTP。与 HTTP 一样，它是一种请求/响应协议，依赖于*统一资源定位符*（URL）、内容类型和选项。你可以像处理\
    \ HTTP 流量一样，为 CoAP 流量使用代理和缓存。CoAP 请求依赖于与 HTTP 相同的 GET、PUT、POST 和 DELETE 方法，尽管在涉及的语义上存在细微差别。CoAP\
    \ 和 HTTP 之间的关系在 RFC 7252 中描述如下：\n\n> *CoAP 的目标不是盲目地压缩 HTTP [RFC2616]，而是实现 REST\
    \ 的一个子集，该子集与 HTTP 通用，但针对 M2M 应用进行了优化。尽管 CoAP 可用于将简单的 HTTP 接口改造为更紧凑的协议，但更重要的是，它还提供了针对\
    \ M2M 的特性，例如内置发现、多播支持和异步消息交换。*\n\n客户端向服务器发送 CoAP 请求，以执行通过方法代码在特定资源上指定的操作。URI 标识该资源。服务器发回由响应代码描述的响应，该响应可能包含资源的表示。CoAP\
    \ 请求和响应是异步的。由于该协议运行在 UDP 或 UDP 等价协议之上，而 UDP 本质上不可靠，因此消息可能乱序到达、重复甚至丢失。CoAP 实现了一种轻量级的可靠性机制来解决这些问题。\n\
    \n注意\n\n与 TCP 相比，UDP 是一种简单得多的协议。它是无连接的，不执行网络握手，这意味着它不提供排序、可靠性和数据完整性功能。这是设计使然，因为\
    \ UDP 将实现此类功能的任务委托给了协议栈的更高层。许多物联网协议利用 UDP 作为其传输层，因为其简单性降低了资源需求。CoAP 实现了简单的可靠性和完整性功能，这些功能即使在导致更高消息丢失的较弱网络上也能正常工作。\n\
    \nCoAP 的可靠性行为取决于所选的消息类型。目前有四种可用的消息类型：\n\n*   **可确认：** 消息可靠传输。可确认消息的接收者必须通过确认消息进行确认，或者拒绝该消息。如果消息被拒绝，接收者将忽略该消息并发送回一个匹配的重置消息。\n\
    \n*   **不可确认：** 消息不可靠传输。接收者不得确认该消息。如果消息被拒绝，接收者可以选择发送回一个匹配的重置消息。\n\n*   **确认：**\
    \ 该消息作为对可确认消息的响应而发送。它必须回显原始消息 ID，并且必须包含一个响应或为空。有两种类型的确认：捎带确认和空确认。捎带确认携带对请求的响应。另一方面，空确认消息仅确认接收者收到了可确认消息，而不确认可确认消息中包含的请求的成功或失败。\n\
    \n*   **重置：** 该消息作为对可确认或不可确认消息的响应而发送。重置消息表示接收者收到了原始消息，但缺乏适当处理它的上下文。\n\n在没有确认消息的情况下，可确认消息的发送者将以递增的间隔重新传输该消息，直到收到确认或达到允许的最大尝试次数。CoAP\
    \ 实现还必须检测可确认和不可确认消息的重复消息。\n"
- fmt: "如果你是一名开发者，何时应选择可确认消息而非不可确认消息？最简单的判断方法是查看你发送的命令或数据的价值。如果你能承受丢失某个读数或命令未被执行的后果，那么不可确认消息就足够了。当你希望数据和命令最终到达目的地时，确认和重传无疑是有帮助的。\n\
    \n使用`CoAP`（或大多数物联网协议）时的一个最佳实践是保持消息体量小巧。`RFC 7959`于2016年为`CoAP`增加了块传输支持，使得使用`CoAP`传输设备固件更新等较大负载成为可能。然而，该协议更适合小负载，如果你经常需要在有限数量的消息中传输大量数据，则应探索其他替代方案。\n\
    \n`CoAP`与`HTTP`的一个本质区别在于，`CoAP`不使用头部，而是使用消息选项。这些选项同时适用于请求和响应。例如，请求的`URI`通过多个选项传输，使解析更加高效。[RFC\
    \ 7252的第5.4节](https://www.rfc-editor.org/rfc/rfc7252.html%2523page-36)列出了可用的选项。另一个需要考虑的方面是，消息选项是二进制的，而非类似`HTTP`的文本头部，这显著减小了消息大小。\n\
    \n[RFC 7641](https://www.rfc-editor.org/info/rfc7641)（标题为“*受限应用协议（CoAP）中的资源观察*”）中增加了一个有趣的选项。`observe`选项是`CoAP`的一个广泛支持的扩展，它使请求者能够获取资源表示，并在定义的时间段内保持其更新。可以说`CoAP`的观察功能类似于订阅，尽管`RFC\
    \ 7641`明确指出该特性的意图并非取代发布/订阅网络。\n\n最后，值得一提的是，`CoAP`使请求者能够发现特定服务器暴露的资源。这是通过向`/.well-known/core`\
    \ URI发送请求来实现的，该请求将返回一个资源列表及其各自的媒体类型。要发现所有可达网络上的可用服务器，你可以向相关的`IP`多播组发送一个不可确认请求。对于`IPv4`，地址是`224.0.1.187`。对于`IPv6`，地址是`FF0X::FD`；服务器应仅在链路本地和站点本地范围内监听。请注意，每个服务器可以选择是否监听这些多播请求。\n\
    \n**注意**\n\n许多网络会过滤或阻止多播流量，因为它很容易被用于发起*拒绝服务*攻击。在依赖多播请求进行发现之前，请务必与你友好的网络管理员确认他们允许此类流量。\n\
    \n## 协议栈\n\n`CoAP`与`IP`网络协议紧密相关。图[2-1](#524096_1_En_2_Chapter.xhtml#Fig1)展示了`CoAP`的协议栈，下面我将对此进行讨论。\n\
    \n![](images/524096_1_En_2_Chapter/524096_1_En_2_Fig1_HTML.jpg)\n\n该架构图由以下层组成：应用层、`CoAP`请求或响应层、`CoAP`消息层、`UDP`加`DTLS`层、`IPv4`或`IPv6`层、`6LoWPAN`层、以太网`Wi-Fi`层、`BLE\
    \ WPAN`层以及物理信道层。\n\n**图 2-1**  \n`CoAP`协议栈\n\n在传统有线（以太网）和无线（`Wi-Fi`）网络上，`CoAP`同时支持`IPv4`和`IPv6`。然而，在`IPv6`之上使用`CoAP`更为简便，因为所有设备都是直接可路由的；在*网络地址转换*（`NAT`）代理后面使用`IPv4`总是更复杂。无论使用哪个`IP`版本，对于协议栈的其他层来说都无关紧要，并且除了`URI`的格式之外，在你编写的代码中也不会产生差异。\n\
    \n`CoAP`也可以运行在*6LoWPAN*之上，这是`IPv6`在*无线个人区域网络*（`WPAN`）上的绑定。`6LoWPAN`允许`IPv6`数据包在基于`IEEE\
    \ 802.15.4`标准（这也是`Zigbee`、`Thread`和`Snap`的基础）或具有许多相似特性的*低功耗蓝牙*（`BLE`）网络上发送和接收。`Linux`内核已经支持`6LoWPAN`，这意味着你可以在大多数配备蓝牙无线电的单板计算机上利用`CoAP\
    \ over 6LoWPAN`。\n\n*互联网号码分配机构*（`IANA`）为协议分配了以下端口和服务名称：\n\n*   端口号`5683`和服务名称`coap`用于常规流量\n\
    *   端口号`5684`和服务名称`coaps`用于`DTLS`加密流量"
  raw: 'If you are a developer, when should you pick confirmable messages over nonconfirmable
    ones? The easiest way to decide is by looking at the value of the commands or
    data you are sending. If you can afford to miss a reading or have a command not
    being executed, then nonconfirmable messages are sufficient. Acknowledgments and
    retransmission are undoubtedly helpful for cases where you wish data and commands
    eventually reach their destination.


    A best practice when working with CoAP `–` or with most IoT protocols `–` is to
    keep message size small. RFC 7959 added support for block-wise transfers to CoAP
    in 2016, making it possible to use CoAP to transfer larger payloads such as device
    firmware updates. However, the protocol is better suited to small payloads, and
    you should explore alternatives if you frequently need to transfer large quantities
    of data in a limited number of messages.


    An essential difference between CoAP and HTTP is that CoAP does not use headers
    but rather message options. Those options apply to both requests and responses.
    For example, the URI of a request is transmitted in several options, making parsing
    more efficient. [Section 5.​4 of RFC 7252](https://www.rfc-editor.org/rfc/rfc7252.html%2523page-36)
    lists the options available. Another aspect to consider is that message options
    are binary rather than text-like HTTP headers, significantly reducing message
    size.


    One interesting option was added in [RFC 7641](https://www.rfc-editor.org/info/rfc7641),
    titled “*Observing Resources* *in the Constrained Application Protocol (CoAP).*”
    The *observe* option is a widely supported extension to CoAP that enables requesters
    to retrieve a resource representation and keep it updated over a defined period.
    One could say CoAP observes comparable to subscriptions, although RFC 7641 explicitly
    states that the feature’s intent is not to replace publish/subscribe networks.


    Finally, it is worth mentioning that CoAP enables requesters to discover the resources
    exposed by a specific server. This is achieved by sending a request to the `/.well-known/core`
    URI, which will respond with a list of the resources accompanied by their respective
    media types. To discover the servers available on all the reachable networks,
    you could send a nonconfirmable request to the relevant IP multicast group. For
    IPv4, this is the `224.0.1.187` address. For IPv6, this is the `FF0X::FD` address;
    servers should listen in the Link-Local and Site-Local scopes only. Please note
    that each server can choose to listen for those multicast requests or not.


    Caution


    Many networks will filter out or block multicast traffic since it can easily be
    used to mount *denial-of-service* attacks. Before relying on multicast requests
    for discovery, please make sure to check with your friendly neighborhood network
    administrator that they will allow them.


    ## Protocol Stack


    CoAP is tied to the IP networking protocol. Figure [2-1](#524096_1_En_2_Chapter.xhtml#Fig1)
    illustrates the protocol stack for CoAP, which I will now discuss.


    ![](images/524096_1_En_2_Chapter/524096_1_En_2_Fig1_HTML.jpg)


    The architecture diagram consists of the following layers, Applications, Co A
    P requests or responses, Co A P messaging, U D P plus D T L S, I P v 4 or I P
    v 6, 6 low PAN, Ethernet Wi Fi, B L E W PAN, and physical channel.


    Figure 2-1


    The CoAP protocol stack


    On traditional wired (Ethernet) and wireless (Wi-Fi) networks, CoAP supports both
    IPv4 and IPv6\. However, it is easier to use on the top of IPv6 since all devices
    are directly routable; using IPv4 behind a *Network Address Translation* (NAT)
    proxy is always more complex. Whatever IP version is used is irrelevant to the
    other layers of the stack and, apart from the format of the URIs, does not make
    a difference in the code you write.


    CoAP can also run over *6LoWPAN*, a binding for IPv6 over *Wireless Personal Area
    Networks* (WPAN). 6LoWPAN allows IPv6 packets to be sent and received over networks
    based on the IEEE 802.15.4 standard `–` which is also the basis for Zigbee, Thread,
    and Snap `–` or over *Bluetooth Low Energy* (BLE), which has many similar characteristics.
    The Linux kernel already supports 6LoWPAN, which means you can leverage CoAP over
    6LoWPAN on most single-board computers equipped with a Bluetooth radio.


    The *Internet Assigned Numbers Authority* (IANA) assigned the following ports
    and service names to the protocol:


    *   Port number 5683 and service name “coap” to regular traffic


    *   Port number 5684 and service name “coaps” to DTLS-secured traffic'
