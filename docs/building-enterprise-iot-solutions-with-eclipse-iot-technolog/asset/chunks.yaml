  trans: '

    ### 写入


    在 DDS 中写入基本数据很简单：只需在 DataWriter 上调用 `write` 函数或方法即可。在幕后，主题实例的生命周期会影响本地节点和远程节点的资源消耗。


    主题实例的生命周期包含三种状态。以下列表描述了这三种状态：


    *   **ALIVE（活跃）：** 至少有一个 DataWriter 已注册了该主题实例。这意味着该 DataWriter 打算提供数据更新，并已为该实例预留了相关资源。


    *   **NOT_ALIVE_NO_WRITERS（非活跃且无写入者）：** 没有更多的 DataWriter 注册该主题实例。与该实例相关的所有 DataWriter
    资源已被释放。DataReader 不再期望新的样本。当 DataWriter 不再需要主题实例时，需要注销它们，因为这会导致发布者及其所有相关订阅者发生资源泄漏。对于崩溃的应用程序，其主题实例通常会处于
    `NOT_ALIVE_NO_WRITERS` 状态，但一旦应用程序重新上线，可能会恢复到 `ALIVE` 状态。


    *   **NOT_ALIVE_DISPOSED（非活跃且已处置）：** 此状态表示该主题实例需要被丢弃。在正常终止时，或者例如当实例所描述的对象不再存在时，应用程序应将其主题实例设置为该状态。


    **DDS** 为主题实例提供了一种自动生命周期管理形式。默认情况下，当销毁一个 DataWriter 对象时，如果没有其他活跃的 DataWriter 注册了该主题实例，DDS
    会将其设置为 `NOT_ALIVE_DISPOSED` 状态。通常可以通过配置设置来覆盖此行为，使 DDS 将实例置于 `NOT_ALIVE_NO_WRITERS`
    状态。


    作为开发者，你可以通过使用 DataWriter 暴露的 API 来显式管理主题实例的生命周期。这将使你对主题实例的注册和处置拥有完全控制权。通常，这种方法可以实现对系统资源更细粒度的管理。注册会导致资源分配；当
    DataWriter 注销时，这些资源会被释放。


    注意


    对于无键主题，主题实例是单例的。这本质上意味着该主题的生命周期与 DataWriter 的生命周期相同。


    ### 读取


    DataReader 暴露了两种允许你访问数据的操作：*read* 和 *take*。这两种操作都会给你一份数据的副本。但 `read` 会将数据保留在 DataReader
    的缓存中，而 `take` 则会将其从缓存中移除。使用 `read` 类似于在 MQTT 的主题上设置保留消息。使用哪一种取决于你的用例。当你的 DDS 主题代表分布式状态时，`Read`
    很有用；而当它们代表分布式事件时，`take` 则更有用。


    DataReader 接收到的每个样本都有一个伴随的 `SampleInfo`，用于描述该样本的属性。以下是最重要的属性列表：


    *   **sample_state（样本状态）：** 样本状态可以是 `READ`（已读）或 `NOT_READ`（未读）。当然，`READ` 状态只有在数据是通过
    `read` 操作（而非 `take` 操作）获取时才可能出现。


    *   **instance_state（实例状态）：** 这表示主题实例的状态。可能的值有 `ALIVE`、`NOT_ALIVE_NO_WRITERS`
    和 `NOT_ALIVE_DISPOSED`。


    *   **view_state（视图状态）：** 如果该样本是主题实例上接收到的第一个样本，则此属性的值为 `NEW`（新），否则为 `NOT_NEW`（非新）。


    *   **disposed_generation_count（处置代数计数）和 no_writers_generation_count（无写入者代数计数）：**
    `SampleInfo` 包含计数器，用于记录主题实例状态变化的次数。例如，你可以使用它们来了解一个主题实例在处于 `NOT_ALIVE_DISPOSED`
    状态后，进入 `ALIVE` 状态的次数。


    *   **source_timestamp（源时间戳）：** 时间戳很重要，因为数据时效性 QoS 策略依赖于它。应用程序也经常用它来表示观测发生的时间。


    *   **valid_data（有效数据）：** 此标志指示样本是否包含数据。有些样本不包含数据，因为它们是为了传达 `instance_state` 值的变化而发送的。


    DDS 允许你在读取时选择数据的子集，无论你使用的是 `read` 还是 `take`。你可以基于*状态*或*内容*进行数据选择。基于状态的选择涉及 `SampleInfo`
    的 `view_state`、`instance_state` 和 `sample_state` 属性。例如，你可以通过发出一个读取请求，要求 `view_state`
    为 `NEW`、`sample_state` 为 `NOT_READ` 且 `instance_state` 为 `ALIVE` 的样本，来读取刚刚出现在
    GDS 中的实例所提供的数据。另一方面，基于内容的选择则涉及实际的样本数据。DDS 通过查询提供基于内容的选择，查询使用的语法与 DDS 过滤器相同。表 6-4
    列出了支持的运算符。


    从概念上讲，过滤器和查询非常接近。那么，它们有何不同呢？过滤控制着数据读取器接收的数据：不匹配过滤条件的数据不会被插入到 DataReader 缓存中。另一方面，查询则用于选择已存在于
    DataReader 缓存中的传输数据。


    DDS 应用程序可以定期轮询 DataReader，以检查是否有样本被发布。在大多数情况下，这种方法会浪费 CPU 时间，并在资源受限设备上缩短电池寿命。DDS
    提供了两种替代轮询的方法来检查数据可用性：*监听器*和*等待集*。你可以向 DataReader 注册监听器，以便在数据可用或某些 QoS 策略被违反时得到通知。至于等待集，它们提供了一种更通用的机制，用于在满足特定条件时执行逻辑。它们使得将回调函数或方法绑定到各种事件成为可能。

    '
- fmt: '# Security


    The DDS specification itself says little about security, only mentioning that
    the `USER_DATA` QoS policy can be used to transmit security tokens. This is perhaps
    a bit naive, given that such a token would be transmitted in cleartext. The DDS
    Security specification, on the other hand, defines the *Security Model and Service
    Plugin Interface* (SPI) architecture. DDS implementations can enforce the security
    model by calling those SPIs. The specification also defines a set of built-in
    implementations of the SPIs.


    The SPI architecture is generic and does not mandate specific security technologies.
    The exact details of the security functions and the implementation of the different
    plugins are specific to the DDS implementation used and the application.


    The core of the DDS Security architecture consists of five plugins:


    - **Authentication Service plugin:** Provides one-way and mutual authentication
    algorithms.

    - **Access Control Service plugin:** Handles authorization on publish/subscribe
    operations as well as implementation-specific operations.

    - **Cryptographic Service plugin:** Provides key generation and exchange interfaces,
    encryption, hashing, and digital signatures. It also handles message authentication
    codes.

    - **Logging Service plugin:** Implements event logging. It makes it possible to
    audit all DDS Security-related events.

    - **Data Tagging plugin:** Provides a way to add tags to samples. From a security
    perspective, this means you can attach security labels to the data.


    Of those, the Logging Service and Data Tagging plugins are optional.


    Here is a high-level overview of the security flows enabled by the plugins. Every
    entity joining a DDS domain must authenticate; they get a security token in return.
    The infrastructure can generate a shared secret (key) during the authentication
    process, which the Cryptographic Service plugin can use to create and distribute
    derived cryptographic keys to other entities. For example, this can support the
    establishment of TLS secure communication channels. Moreover, the Cryptographic
    Service plugin provides an API that applications can leverage to enforce message
    confidentiality, integrity, authenticity, and nonrepudiation. The Access Control
    plugin, on the other hand, ensures only authorized entities can publish or subscribe
    to specific topics. It relies on the token obtained at authentication time to
    establish the identity of an entity. The automatic discovery process built into
    DDS can also be protected through the Access Control Service plugin.


    Most DDS implementations can integrate with various authentication servers, use
    OAuth tokens or equivalents, and encrypt traffic using TLS (TCP) or DTLS (UDP).


    ## Eclipse Cyclone DDS


    [Eclipse Cyclone DDS](https://projects.eclipse.org/projects/iot.cyclonedds) is
    a mature and fully featured implementation of DDS hosted at the Eclipse Foundation.
    It has been used in several commercial implementations already. The project focuses
    on compliance with all the core DDS specifications, namely:


    - [Data Distribution Service](https://www.omg.org/spec/DDS/About-DDS/) (DDS)

    - [DDS Interoperability Wire Protocol](https://www.omg.org/spec/DDSI-RTPS/About-DDSI-RTPS/)
    (DDSI-RTPS)

    - [DDS Security](https://www.omg.org/spec/DDS-SECURITY/About-DDS-SECURITY/) (DDS-SECURITY)

    - [Extensible and Dynamic Topic Types for DDS](https://www.omg.org/spec/DDS/About-DDS/)
    (DDS-XTypes)


    The core Cyclone DDS library is written in C. The Cyclone DDS project team also
    maintains bindings in [Python](https://github.com/eclipse-cyclonedds/cyclonedds-python)
    and [C++](https://github.com/eclipse-cyclonedds/cyclonedds-cxx) ([ISO/IEC C++
    PSM](https://www.omg.org/spec/DDS-PSM-Cxx/)). Cyclone DDS is made available under
    the Eclipse Distribution License v1.0 and the Eclipse Public License v2.0.


    The official web resources for Cyclone DDS are as follows:


    - **Website:** [`https://cyclonedds.io`](https://cyclonedds.io)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.cyclonedds`](https://projects.eclipse.org/projects/iot.cyclonedds)

    - **Code repository:** [`https://github.com/eclipse-cyclonedds/cyclonedds`](https://github.com/eclipse-cyclonedds/cyclonedds)


    At the time of writing, the current version was 0.8.2, released on January 10,
    2022. One of the 0.8.x series innovations was to support a zero-copy, shared memory
    approach through integration with [Eclipse iceoryx](https://github.com/eclipse-iceoryx/iceoryx).


    ### Installation


    At the time of writing, the Cyclone DDS project did not publish packages for its
    binaries. Consequently, you will need to compile it yourself. Fortunately, the
    process is straightforward.


    #### Prerequisites


    It is possible to build Cyclone DDS on Linux, macOS, and Windows. With some caveats,
    it will also build on *BSD operating systems. You will need to install the following
    software packages:


    - **C compiler:** This is typically GCC on Linux and the Microsoft Visual C++
    (MSVC) compiler on Windows. The LLVM compiler shipping with the XCode Command
    Line Tools is a typical choice on macOS.

    - **GIT:** You will need the GIT version control system to clone the Cyclone DDS
    repository.

    - **CMake:** Cyclone DDS leverages CMake for its build system. You will need CMake
    version 3.10 or later.

    - **OpenSSL:** You need OpenSSL to support TLS communications. Ideally, you should
    install OpenSSL v1.1 or later. On some systems, you will also need to install
    libssl. You can install the latter by executing `apt-get install libssl-dev` on
    Debian and its derivatives, and `yum install openssl-devel` on Fedora and its
    derivatives.

    - **Bison:** GNU Bison is a general-purpose parser generator. It is used to parse
    IDL type definitions in Cyclone DDS.


    #### Cloning the Repository


    Cyclone DDS is available on GitHub. Cloning the repository and getting ready to
    build the source is straightforward. Here are the commands you should execute
    in the directory of your choice:


    ```

    git clone https://github.com/eclipse-cyclonedds/cyclonedds.git

    cd cyclonedds

    mkdir build

    ```


    #### Compiling the Code


    On Linux and macOS, the only parameter you need to pass to the build system is
    the directory where you wish to install the binaries. In my case, I chose `/opt/cyclone`.
    Here are the commands you need to run to configure the build:


    ```

    cd build

    cmake -DCMAKE_INSTALL_PREFIX=/opt/cyclone -DBUILD_EXAMPLES=ON ..

    ```


    If all the prerequisites are installed correctly, you should see output like this:


    ```

    -- The C compiler identification is GNU 11.2.0

    -- Detecting C compiler ABI info

    -- Detecting C compiler ABI info - done

    -- Check for working C compiler: /usr/bin/cc - skipped

    -- Detecting C compile features

    -- Detecting C compile features – done

    ...

    -- Found BISON: /usr/bin/bison (found suitable version "3.7.6", minimum required
    is "3.0.4")

    -- Configuring done

    -- Generating done

    -- Build files have been written to: /home/fdesbiens/cyclonedds/build

    ```


    If all goes well, you can compile the code using this command:


    ```

    cmake --build .

    ```


    You should see output like this:


    ```

    Scanning dependencies of target ddsrt-internal

    [  0%] Building C object src/ddsrt/CMakeFiles/ddsrt-internal.dir/src/atomics.c.o

    [  1%] Building C object src/ddsrt/CMakeFiles/ddsrt-internal.dir/src/avl.c.o

    [  1%] Building C object src/ddsrt/CMakeFiles/ddsrt-internal.dir/src/bswap.c.o

    [  2%] Building C object src/ddsrt/CMakeFiles/ddsrt-internal.dir/src/io.c.o

    ...

    Scanning dependencies of target schema

    [100%] Generating cyclonedds.rnc, cyclonedds.xsd, manual/options.md

    [100%] Built target schema

    ```


    If there are no compilation errors, congratulations! You are now ready to build
    your own DDS applications. The only step left is to copy the binaries in the specified
    folder. To do this, just run the following command:


    ```

    cmake --build . --target install

    ```


    You should prefix the command with `sudo` if the installation folder requires
    administrative privileges.'
  raw: '## Security


    The DDS specification itself says little about security, only mentioning that
    the `USER_DATA` QoS policy can be used to transmit security tokens. This is perhaps
    a bit naive, given that such a token would be transmitted in cleartext. The DDS
    Security specification, on the other hand, defines the *Security Model and Service
    Plugin Interface* (SPI) architecture. DDS implementations can enforce the security
    model by calling those SPIs. The specification also defines a set of built-in
    implementations of the SPIs.


    The SPI architecture is generic and does not mandate specific security technologies.
    The exact details of the security functions and the implementation of the different
    plugins are specific to the DDS implementation used and the application.


    The core of the DDS Security architecture consists of five plugins:


    *   **Authentication Service plugin:** Provides one-way and mutual authentication
    algorithms.


    *   **Access Control Service plugin:** Handles authorization on publish/subscribe
    operations as well as implementation-specific operations.


    *   **Cryptographic Service plugin:** Provides key generation and exchange interfaces,
    encryption, hashing, and digital signatures. It also handles message authentication
    codes.


    *   **Logging Service plugin:** Implements event logging. It makes it possible
    to audit all DDS Security-related events.


    *   **Data Tagging plugin:** Provides a way to add tags to samples. From a security
    perspective, this means you can attach security labels to the data.


    Of those, the Logging Service and Data Tagging plugins are optional.


    Here is a high-level overview of the security flows enabled by the plugins. Every
    entity joining a DDS domain must authenticate; they get a security token in return.
    The infrastructure can generate a shared secret (key) during the authentication
    process, which the Cryptographic Service plugin can use to create and distribute
    derived cryptographic keys to other entities. For example, this can support the
    establishment of TLS secure communication channels. Moreover, the Cryptographic
    Service plugin provides an API that applications can leverage to enforce message
    confidentiality, integrity, authenticity, and nonrepudiation. The Access Control
    plugin, on the other hand, ensures only authorized entities can publish or subscribe
    to specific topics. It relies on the token obtained at authentication time to
    establish the identity of an entity. The automatic discovery process built into
    DDS can also be protected through the Access Control Service plugin.


    Most DDS implementations can integrate with various authentication servers, use
    OAuth tokens or equivalents, and encrypt traffic using TLS (TCP) or DTLS (UDP).


    ## Eclipse Cyclone DDS


    [Eclipse Cyclone DDS](https://projects.eclipse.org/projects/iot.cyclonedds) is
    a mature and fully featured implementation of DDS hosted at the Eclipse Foundation.
    It has been used in several commercial implementations already. The project focuses
