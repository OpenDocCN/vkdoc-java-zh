  trans: '

    #### 发布


    “Hello World!” 发布者的代码包含在 [publisher.​c](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/helloworld/publisher.c)
    文件中。该文件包含一个单一的 main 方法。变量声明位于文件顶部。以下是主要变量：


    ```

    dds_entity_t participant;

    dds_entity_t topic;

    dds_entity_t writer;

    dds_return_t rc;

    HelloWorldData_Msg msg;

    uint32_t status = 0;

    ```


    如您所见，它们与订阅者中使用的变量非常相似。主要区别在于 `status` 变量，它是一个无符号整数，将包含 DataWriter 的当前状态集。


    在创建 DataWriter 之前，您需要先创建一个域参与者和主题，如下所示：


    ```

    participant = dds_create_participant (DDS_DOMAIN_DEFAULT, NULL, NULL);

    topic = dds_create_topic (

    participant, &HelloWorldData_Msg_desc, "HelloWorldData_Msg", NULL, NULL);

    writer = dds_create_writer (participant, topic, NULL, NULL);

    ```


    当没有人在监听时发送数据是浪费资源的。DDS DataWriter 知道是否存在匹配的 DataReader，即在域中同一主题实例上定义的 DataReader。因此，应用程序将循环并休眠，直到
    DataWriter 收到发布匹配的通知。以下是简化版逻辑（已移除错误处理）：


    ```

    rc = dds_set_status_mask(writer, DDS_PUBLICATION_MATCHED_STATUS);

    ...

    while(!(status & DDS_PUBLICATION_MATCHED_STATUS))

    {

    rc = dds_get_status_changes (writer, &status);

    ...

    /* 轮询休眠。 */

    dds_sleepfor (DDS_MSECS (20));

    }

    ```


    构建并发送消息非常简单。只需设置 `msg` 变量上的 `userID` 和 `message`，然后调用 `dds_write`。


    ```

    msg.userID = 1;

    msg.message = "Hello World";

    rc = dds_write (writer, &msg);

    ```


    完成此操作后，剩下的唯一事情就是清理。对域参与者调用 `dds_delete` 将释放 DataReader 和主题实例资源。


    ```

    rc = dds_delete (participant);

    ```


    如您所见，发布者和订阅者的代码非常接近。QoS 设置存在于订阅者中，但不存在于发布者中。这是为什么呢？解释是，Cyclone DDS 应用于 DataWriter
    的默认 QoS 策略足以匹配订阅者中的 DataReader。


    #### 运行示例


    打开命令行，进入您为编译 Cyclone DDS 而创建的 `build` 文件夹中的 `bin` 子目录。然后，像这样执行订阅者：


    ```

    ./HelloworldSubscriber

    ```


    您将看到以下输出：


    ```

    === [Subscriber] Waiting for a sample ...

    ```


    然后，打开另一个命令行并执行此命令以启动发布者：


    ```

    ./HelloworldPublisher

    ```


    您将看到以下输出：


    ```

    === [Publisher]  Waiting for a reader to be discovered ...

    === [Publisher]  Writing : Message (1, Hello World)

    ```


    如果您回到运行订阅者的命令行，您将看到：


    ```

    === [Subscriber] Received : Message (1, Hello World)

    ```


    此演示和 `roundtrip` 示例的一个显著特点是，您无需配置任何东西即可使其工作。没有涉及 IP 地址或主机名。这就是 DDS 自动发现机制的神奇之处。


    #### Python 版本


    我之前提到过，Cyclone DDS 团队维护了该库的 Python 和 C++ 绑定。这些绑定的仓库也包含示例应用程序。为了结束本节，让我们看看 [“Hello
    World!” 示例应用程序的 Python 版本](https://github.com/eclipse-cyclonedds/cyclonedds-python/blob/master/examples/helloworld/helloworld.py)。^(²⁰)


    要使用 Python 绑定（也称为 `cyclonedds-python`），您首先需要按照本章前面所述在您的环境中安装 Cyclone DDS。然后，按照绑定
    [GitHub 仓库](https://github.com/eclipse-cyclonedds/cyclonedds-python/) 中 `README.MD`
    的安装说明进行操作。^(²¹) 强烈建议在使用 `cyclonedds-python` 时使用虚拟环境、poetry、pipenv 或 pyenv。


    在撰写本文时，OMG 尚未提供 IDL 和 Python 之间的官方映射。Cyclone DDS 团队构建了工具来解决这一差距；不幸的是，这些工具特定于 `cyclonedds-python`，不适用于其他
    DDS 实现或绑定。`cyclonedds-python` 的文档[提供了更多详细信息](https://github.com/eclipse-cyclonedds/cyclonedds-python/)。^(²²)


    `Cyclonedds-python` 包含一个命令行 IDL 编译器，它将从 IDL 文件生成一个包含您类型的 Python 模块。或者，该绑定在 `cyclonedds.idl`
    包中提供了 IDL 数据类型。这就是“Hello World!”示例的 Python 版本所采用的方法。您将在 `helloworld.py` 文件的顶部找到
    `Msg` 类型的声明。


    ```

    @dataclass

    class HelloWorld(IdlStruct, typename="HelloWorld.Msg"):

    data: str

    ```


    发布样本的基本步骤与 C 版本示例相同。如下所示，您需要创建一个域参与者、主题和 DataWriter。


    ```

    dp = DomainParticipant()

    tp = Topic(dp, "Hello", HelloWorld)

    dw = DataWriter(dp, tp)

    ```


    发布样本非常简单。您需要做的就是将 HelloWorld 对象的实例传递给 DataWriter 的 `write` 方法。


    ```

    sample = HelloWorld(data=''Hello, World!'')

    dw.write(sample)

    ```


    读取数据也非常简单。您只需要一个 DataReader 实例。在这种情况下，代码仅打印 `read` 方法返回的第一个样本中的 `data` 成员。


    ```

    dr = DataReader(dp, tp)

    sample = dr.read()[0]

    print(sample.data)

    ```


    就是这样！我相信您能体会到与 C 版本相比的简洁性和可读性。目前，您只能从源代码安装 `cyclonedds-python`，但团队的目标是将来将包发布到
    `pip` 仓库。计划中还包括使开发人员能够使用 PyPI 从源代码安装。

    '
- fmt: "### Cyclone DDS and Robotics\n\n`Cyclone DDS` has seen [tremendous adoption](https://iot.eclipse.org/adopters/)\
    \ since the inception of the project. Robotics is one domain where the project\
    \ made a name for itself. At a high level, using DDS with robots makes a lot of\
    \ sense. After all, they often operate close to one another in the same physical\
    \ space; making them part of a mesh makes sense. The emergence of autonomous robots\
    \ and machines increases the need to securely transmit large amounts of data in\
    \ real time. Given this, it is not surprising to see that `Cyclone DDS` significantly\
    \ impacted the `ROS 2` ecosystem.\n\n[ROS](https://www.ros.org/) (Robot Operating\
    \ System) is an open source software development kit for robotics applications.\
    \ The most recent version, `ROS 2`, is supported on Linux, Windows, and macOS.\
    \ Additionally, the [micro-ROS](https://micro.ros.org/) project targets embedded\
    \ platforms running an RTOS. [Open Robotics](https://www.openrobotics.org/) and\
    \ the [ROS 2 Technical Steering Committee](https://docs.ros.org/en/rolling/Governance.html)\
    \ members maintain the core ROS source code.\n\nThe ROS client library defines\
    \ an API exposing communication concepts like publish/subscribe to developers.\
    \ In `ROS 2`, such features have been built on top of DDS. Or rather, the `ROS\
    \ 2` team built an [abstract middleware interface](https://design.ros2.org/articles/ros_middleware_interface.html)^([^(23)](#fn23))\
    \ between the client library and specific DDS implementations. This makes it possible\
    \ for developers to pick the implementation that fits their requirements. The\
    \ official `ROS 2` documentation describes how to [work with middleware implementations](https://docs.ros.org/en/galactic/Concepts/About-Middleware-Implementations.html)^([^(24)](#fn24))\
    \ in greater detail.\n\nIn December 2020, the `ROS 2 TSC` selected `Cyclone DDS`\
    \ as the [default middleware implementation](https://discourse.ros.org/t/ros-2-galactic-default-middleware-announced/18064)^([^(25)](#fn25))\
    \ for the Galactic Geochelone release, made available in May 2021.\n\nFootnotes\
    \ [1](#524096_1_En_6_Chapter.xhtml#Fn1_source) [2](#524096_1_En_6_Chapter.xhtml#Fn2_source)\
    \ [3](#524096_1_En_6_Chapter.xhtml#Fn3_source) [4](#524096_1_En_6_Chapter.xhtml#Fn4_source)\
    \ [5](#524096_1_En_6_Chapter.xhtml#Fn5_source) [6](#524096_1_En_6_Chapter.xhtml#Fn6_source)\
    \ [7](#524096_1_En_6_Chapter.xhtml#Fn7_source) [8](#524096_1_En_6_Chapter.xhtml#Fn8_source)\n\
    \n# 7. zenoh\n\n> *On aimerait tant pouvoir inventer le dragon qui fera de nous\
    \ des princes charmants.*\n> \n> *We would so love to be able to invent the dragon\
    \ that will make us prince charming.*\n> \n> —Bernard Arcand, *De nouveaux lieux\
    \ communs*\n\nIt happens to the best of us. I open an old document; I browse code\
    \ I wrote a few months or a few years ago. At first, there is only a vague feeling\
    \ of uneasiness. Then, some head scratches. And finally, a murmur or even a shout:\
    \ “What was I thinking?” The passage of time is often cruel to our creations.\
    \ This is why I probably did so much refactoring and rewriting throughout my career.\n\
    \nDDS is incontestably flexible and powerful. However, it is also complex and\
    \ has a steep learning curve. Figuring out how to match QoS policies can be a\
    \ challenge. Moreover, routing DDS traffic over the public Internet can be hard.\
    \ And ultimately, the protocol was not designed to address the concerns of constrained\
    \ devices. Automated discovery is wonderful, but in DDS’s case, it generates a\
    \ lot of network traffic, significantly reducing the battery life of devices deployed\
    \ in the field. DDS was first standardized in 2003, and it shows.\n\nThe Eclipse\
    \ `zenoh` protocol provides location-transparent primitives for data in motion\
    \ through a publish/subscribe model and for data at rest by supporting geographically\
    \ distributed storage. It is intentionally designed to scale from microcontrollers\
    \ up to the Cloud. In a way, `zenoh` takes the best ideas of DDS, adds its own,\
    \ and removes the complexity to deliver a protocol built from the ground up for\
    \ IoT and edge computing use cases.\n\nCompared to other protocols covered in\
    \ this book, `zenoh` is not described in a formal specification. The project team\
    \ implemented the core library in Rust, which makes the protocol safer in terms\
    \ of memory management since the language does not allow dangling pointers or\
    \ null pointers. The core `zenoh` implementation is accompanied by a growing number\
    \ of language bindings, of which the C and Python ones are the most mature. The\
    \ project’s website provides [full documentation for the APIs](https://zenoh.io/docs/apis/apis/).^([^(26)](#fn26))\n\
    \n## zenoh Basics\n\nThe most important thing to remember about `zenoh` is that\
    \ its scope is broader than most other IoT protocols. This becomes apparent when\
    \ considering the data life cycle, as shown in Figure [7-1](#524096_1_En_7_Chapter.xhtml#Fig1).\
    \ If you think about MQTT, another popular publish/subscribe protocol, you will\
    \ notice that it focuses strictly on transmission `–` which is step 2 in the figure.\
    \ Even when it stores data for offline subscribers, an MQTT broker always does\
    \ so in a transient way. `Zenoh` is different: it also supports data at rest and\
    \ computations `–` steps 3 and 4 in the figure.\n\n![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig1_HTML.jpg)\n\
    \nAn illustration depicts four stages. 1. Capture. 2. Transmission. 3. Computation\
    \ and storage. 4. Retrieval.\n\n**Figure 7-1** The life cycle of data\n\nIn addition\
    \ to plain subscriptions, there are two ways to retrieve and compute data in `zenoh`.\
    \ One is distributed queries, where various nodes in the `zenoh` infrastructure\
    \ will provide part of the result set. The other is distributed computed values,\
    \ where one or several computation functions are triggered to return a result.\n\
    \nData retrieval implies data storage. `Zenoh` supports this through a specialized\
    \ plugin that I will cover later. For the time being, I will simply say that `zenoh`\
    \ enables you to define storage units anywhere in the infrastructure. Those storage\
    \ units can reside in databases (both relational and nonrelational), memory, or\
    \ the filesystem of a node."
  raw: "### Cyclone DDS and Robotics\n\nCyclone DDS has seen [tremendous adoption](https://iot.eclipse.org/adopters/)\
    \ since the inception of the project. Robotics is one domain where the project\
    \ made a name for itself. At a high level, using DDS with robots makes a lot of\
    \ sense. After all, they often operate close to one another in the same physical\
    \ space; making them part of a mesh makes sense. The emergence of autonomous robots\
    \ and machines increases the need to securely transmit large amounts of data in\
    \ real time. Given this, it is not surprising to see that Cyclone DDS significantly\
    \ impacted the ROS 2 ecosystem.\n\n[ROS](https://www.ros.org/) (Robot Operating\
    \ System) is an open source software development kit for robotics applications.\
    \ The most recent version, ROS 2, is supported on Linux, Windows, and macOS. Additionally,\
    \ the [micro-ROS](https://micro.ros.org/) project targets embedded platforms running\
    \ an RTOS. [Open Robotics](https://www.openrobotics.org/) and the [ROS 2 Technical\
    \ Steering Committee](https://docs.ros.org/en/rolling/Governance.html) members\
    \ maintain the core ROS source code.\n\nThe ROS client library defines an API\
    \ exposing communication concepts like publish/subscribe to developers. In ROS\
    \ 2, such features have been built on top of DDS. Or rather, the ROS 2 team built\
    \ an [abstract middleware interface](https://design.ros2.org/articles/ros_middleware_interface.html)^([^(23)](#fn23))\
    \ between the client library and specific DDS implementations. This makes it possible\
    \ for developers to pick the implementation that fits their requirements. The\
    \ official ROS 2 documentation describes how to [work with middleware implementations](https://docs.ros.org/en/galactic/Concepts/About-Middleware-Implementations.html)^([^(24)](#fn24))\
    \ in greater detail.\n\nIn December 2020, the ROS 2 TSC selected Cyclone DDS as\
    \ the [default middleware implementation](https://discourse.ros.org/t/ros-2-galactic-default-middleware-announced/18064)^([^(25)](#fn25))\
    \ for the Galactic Geochelone release, made available in May 2021.\n\nFootnotes\
    \ [1](#524096_1_En_6_Chapter.xhtml#Fn1_source)   [2](#524096_1_En_6_Chapter.xhtml#Fn2_source)\
    \   [3](#524096_1_En_6_Chapter.xhtml#Fn3_source)   [4](#524096_1_En_6_Chapter.xhtml#Fn4_source)\
    \   [5](#524096_1_En_6_Chapter.xhtml#Fn5_source)   [6](#524096_1_En_6_Chapter.xhtml#Fn6_source)\
    \   [7](#524096_1_En_6_Chapter.xhtml#Fn7_source)   [8](#524096_1_En_6_Chapter.xhtml#Fn8_source)\n\
    \n# 7. zenoh\n\n> *On aimerait tant pouvoir inventer le dragon qui fera de nous\
    \ des princes charmants.*\n\n> *We would so love to be able to invent the dragon\
    \ that will make us prince charming.*\n> \n> —Bernard Arcand, *De nouveaux lieux\
    \ communs*\n\nIt happens to the best of us. I open an old document; I browse code\
    \ I wrote a few months or a few years ago. At first, there is only a vague feeling\
    \ of uneasiness. Then, some head scratches. And finally, a murmur or even a shout:\
    \ “What was I thinking?” The passage of time is often cruel to our creations.\
    \ This is why I probably did so much refactoring and rewriting throughout my career.\n\
    \nDDS is incontestably flexible and powerful. However, it is also complex and\
    \ has a steep learning curve. Figuring out how to match QoS policies can be a\
    \ challenge. Moreover, routing DDS traffic over the public Internet can be hard.\
    \ And ultimately, the protocol was not designed to address the concerns of constrained\
    \ devices. Automated discovery is wonderful, but in DDS’s case, it generates a\
    \ lot of network traffic, significantly reducing the battery life of devices deployed\
    \ in the field. DDS was first standardized in 2003, and it shows.\n\nThe Eclipse\
    \ zenoh protocol provides location-transparent primitives for data in motion through\
    \ a publish/subscribe model and for data at rest by supporting geographically\
    \ distributed storage. It is intentionally designed to scale from microcontrollers\
    \ up to the Cloud. In a way, zenoh takes the best ideas of DDS, adds its own,\
    \ and removes the complexity to deliver a protocol built from the ground up for\
    \ IoT and edge computing use cases.\n\nCompared to other protocols covered in\
    \ this book, zenoh is not described in a formal specification. The project team\
    \ implemented the core library in Rust, which makes the protocol safer in terms\
    \ of memory management since the language does not allow dangling pointers or\
    \ null pointers. The core zenoh implementation is accompanied by a growing number\
    \ of language bindings, of which the C and Python ones are the most mature. The\
    \ project’s website provides [full documentation for the APIs](https://zenoh.io/docs/apis/apis/).^([^(26)](#fn26))\n\
    \n## zenoh Basics\n\nThe most important thing to remember about zenoh is that\
    \ its scope is broader than most other IoT protocols. This becomes apparent when\
    \ considering the data life cycle, as shown in Figure [7-1](#524096_1_En_7_Chapter.xhtml#Fig1).\
    \ If you think about MQTT, another popular publish/subscribe protocol, you will\
    \ notice that it focuses strictly on transmission `–` which is step 2 in the figure.\
    \ Even when it stores data for offline subscribers, an MQTT broker always does\
    \ so in a transient way. Zenoh is different: it also supports data at rest and\
    \ computations `–` steps 3 and 4 in the figure.\n\n![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig1_HTML.jpg)\n\
    \nAn illustration depicts four stages. 1\\. Capture. 2\\. Transmission. 3. Computation\
    \ and storage. 4\\. Retrieval.\n\nFigure 7-1\n\nThe life cycle of data\n\nIn addition\
    \ to plain subscriptions, there are two ways to retrieve and compute data in zenoh.\
    \ One is distributed queries, where various nodes in the zenoh infrastructure\
    \ will provide part of the result set. The other is distributed computed values,\
    \ where one or several computation functions are triggered to return a result.\n\
    \nData retrieval implies data storage. Zenoh supports this through a specialized\
    \ plugin that I will cover later. For the time being, I will simply say that zenoh\
    \ enables you to define storage units anywhere in the infrastructure. Those storage\
    \ units can reside in databases (both relational and nonrelational), memory, or\
    \ the filesystem of a node."
  trans: "\n### Cyclone DDS 与机器人技术\n\n自项目启动以来，Cyclone DDS 已获得[广泛采用](https://iot.eclipse.org/adopters/)。机器人技术是该项目声名鹊起的领域之一。从宏观层面看，将\
    \ DDS 应用于机器人领域意义重大。毕竟，机器人通常在同一物理空间中近距离运行；将它们纳入网状网络是合理的。自主机器人与机器的出现，增加了实时安全传输大量数据的需求。鉴于此，Cyclone\
    \ DDS 对 ROS 2 生态系统产生重大影响也就不足为奇了。\n\n[ROS](https://www.ros.org/)（机器人操作系统）是一个面向机器人应用的开源软件开发工具包。其最新版本\
    \ ROS 2 支持 Linux、Windows 和 macOS。此外，[micro-ROS](https://micro.ros.org/) 项目则针对运行\
    \ RTOS 的嵌入式平台。[Open Robotics](https://www.openrobotics.org/) 与 [ROS 2 技术指导委员会](https://docs.ros.org/en/rolling/Governance.html)成员共同维护着\
    \ ROS 的核心源代码。\n\nROS 客户端库定义了一个 API，向开发者公开诸如发布/订阅等通信概念。在 ROS 2 中，这些功能构建于 DDS 之上。更确切地说，ROS\
    \ 2 团队在客户端库与特定 DDS 实现之间构建了一个[抽象中间件接口](https://design.ros2.org/articles/ros_middleware_interface.html)^(²³)。这使得开发者能够选择符合其需求的实现方案。官方\
    \ ROS 2 文档更详细地描述了如何[使用中间件实现](https://docs.ros.org/en/galactic/Concepts/About-Middleware-Implementations.html)^(²⁴)。\n\
    \n2020 年 12 月，ROS 2 TSC 选定 Cyclone DDS 作为 Galactic Geochelone 版本的[默认中间件实现](https://discourse.ros.org/t/ros-2-galactic-default-middleware-announced/18064)^(²⁵)，该版本于\
    \ 2021 年 5 月发布。\n\n脚注 1   2   3   4   5   6   7   8\n\n# 7. zenoh\n\n> *On aimerait\
    \ tant pouvoir inventer le dragon qui fera de nous des princes charmants.*\n\n\
    > *我们多么希望能发明那条让我们变成迷人王子的龙。*\n> \n> —贝尔纳·阿尔康，《新陈词滥调》\n\n这种事连我们中最优秀的人也难免遇到。我打开一份旧文档；浏览几个月或几年前写的代码。起初，只有一种模糊的不安感。然后，开始挠头。最后，喃喃自语甚至大喊：“我当时在想什么？”时间的流逝常常对我们曾经的创作毫不留情。这大概就是为什么我在整个职业生涯中做了如此多的重构和重写。\n\
    \nDDS 无疑是灵活且强大的。然而，它也很复杂，学习曲线陡峭。弄清楚如何匹配 QoS 策略可能是一项挑战。此外，通过公共互联网路由 DDS 流量可能很困难。归根结底，该协议并非为解决受限设备的问题而设计。自动发现功能很棒，但在\
    \ DDS 的情况下，它会产生大量网络流量，显著缩短现场部署设备的电池寿命。DDS 于 2003 年首次标准化，其时代烙印显而易见。\n\nEclipse\
    \ zenoh 协议通过发布/订阅模型为动态数据提供位置透明的原语，并通过支持地理分布式存储为静态数据提供支持。它被有意设计为从微控制器扩展到云端。从某种程度上说，zenoh\
    \ 吸收了 DDS 的最佳理念，加入了自己的创新，并去除了复杂性，从而交付了一个从头开始为物联网和边缘计算用例构建的协议。\n\n与本书涵盖的其他协议相比，zenoh\
    \ 没有正式规范文档。项目团队用 Rust 实现了核心库，由于该语言不允许悬空指针或空指针，这使得协议在内存管理方面更加安全。核心 zenoh 实现伴随着越来越多的语言绑定，其中\
    \ C 和 Python 绑定最为成熟。项目网站提供了 [API 的完整文档](https://zenoh.io/docs/apis/apis/)。^(²⁶)\n\
    \n## zenoh 基础\n\n关于 zenoh，最重要的一点是它的范围比大多数其他物联网协议更广。这在考虑数据生命周期时变得显而易见，如图 7-1 所示。如果你想到另一种流行的发布/订阅协议\
    \ MQTT，你会注意到它严格专注于传输——即图中的步骤 2。即使它为离线订阅者存储数据，MQTT 代理也总是以临时方式进行。Zenoh 则不同：它还支持静态数据和计算——即图中的步骤\
    \ 3 和 4。\n\n![](img/524096_1_En_7_Fig1_HTML.jpg)\n\n一幅插图展示了四个阶段。1. 采集。2. 传输。3.\
    \ 计算与存储。4. 检索。\n\n图 7-1\n\n数据的生命周期\n\n除了普通的订阅之外，在 zenoh 中还有两种检索和计算数据的方式。一种是分布式查询，其中\
    \ zenoh 基础设施中的各个节点将提供部分结果集。另一种是分布式计算值，其中触发一个或多个计算函数来返回结果。\n\n数据检索意味着数据存储。Zenoh\
    \ 通过一个专门的插件来支持这一点，我将在后面介绍。目前，我只想说 zenoh 使您能够在基础设施中的任何位置定义存储单元。这些存储单元可以驻留在数据库（关系型和非关系型）、内存或节点的文件系统中。\n"
- fmt: '### Key Abstractions


    The key/value paradigm is at the core of `zenoh`. I will now explain how it is
    implemented and describe a few related abstractions.


    `Zenoh` *keys* are built like filesystem paths on UNIX-like operating systems
    and are comparable to MQTT topics. They are hierarchical strings where the levels
    are separated by the forward-slash character (“`/`”). The following are a few
    examples of `zenoh` keys:


    ```

    /museums/Louvre/floors/1/rooms/101/sensors/temperature

    /museums/Louvre/floors/2/rooms/202/sensors/humidity

    ```


    The preceding keys point to specific *resources*; they are also called *named
    data* items in `zenoh` parlance. It is possible to build expressions involving
    a set of keys. Such *key* *expressions* can contain wildcards. The single asterisk
    (“`*`”) is a single-level wildcard, while the double asterisk (“`**`”) is a multilevel
    one. For example, the following key expression could be used to subscribe to all
    the sensors in room 101:


    ```

    /museums/Louvre/floors/1/rooms/101/sensors/*

    ```


    This other expression could return data for all the temperature sensors, independently
    of their location:


    ```

    /museums/Louvre/**/temperature

    ```


    You will use key expressions in the following situations:


    - Subscribing to data

    - Creating a storage instance

    - Registering a distributed computation (`eval`)


    `Zenoh` also possesses *selectors*. Those are key expressions identifying a set
    of resources. The `zenoh` documentation describes the structure of selectors like
    this:


    ```

    /s1/s2/.../sn?x>1&y<2&...&z=4(p1=v1;p2=v2;...;pn=vn)[#a;b;x;y;...;z]

    |           | |             | |                   |  |            |

    |-- expr ---| |--- filter --| |---- properties ---|  |--fragment -|

    ```


    Let’s now look at each of the components of the selector structure. Please remember
    that each of the parts following the path expression itself is optional.


    - **expr:** A standard `zenoh` key expression.

    - **filter:** A list of predicates separated by ampersands (“`&`”). The filter
    will be applied to the values matching the path expression. Each predicate has
    the form “field-operator-fieldvalue.” The supported operators are `<`, `>`, `<=`,
    `>=`, `=`, and `!=`.

    - **properties**: A string representing key/value pairs separated by a semicolon.

    - **fragment:** A list of fields names allowing to return a subset of each value.
    This works only when a self-describing encoding such as JSON or XML is used.


    At the time of writing, the `zenoh` team had documented but not implemented filters
    and fragments. In a real application, a selector could look like this:


    ```

    /museums/**/sensors/temperature?celcius>23.5

    ```


    You will use selectors to run distributed queries.


    The results of distributed queries can contain values fetched from storage instances
    or produced by a computation (`eval`) if the key path used at their creation matches
    the selector used. Therefore, storages and `eval`s are sometimes described as
    *queryables* in the `zenoh` documentation.


    As in MQTT, `zenoh` values are transmitted as a stream of bytes. Values are not
    strongly typed as samples are in DDS. However, `zenoh` values contain a field
    to specify which encoding is used as a MIME type. Any encoding may be used, but
    `zenoh` offers additional support for some encodings, which can be serialized
    and deserialized by the `zenoh` library itself. The encodings benefiting from
    this additional support include the following:


    - **application/octet-stream:** The value is a stream of bytes.

    - **text/plain; charset=utf-8:** The value is a UTF-8 string.

    - **application/json:** The value is a JSON string.

    - **application/properties:** The value is a string representing a list of key/value
    pairs separated by a semicolon (e.g., “id=002;squad=13...”).

    - **application/integer:** The value is an integer.

    - **application/float:** The value is a float.


    All `zenoh` values have a timestamp applied by the first router receiving it.
    A [hybrid logical clock](https://zenoh.io/docs/apis/rust)^([^(27)](#fn27)) generates
    this timestamp. It is a 64-bit value with a structure similar to NTP timestamps,
    although based on the UNIX epoch of January 1, 1970, UTC. It also contains the
    UUID of the router. Given the method used to generate them, `zenoh` timestamps
    are unique. In other words, each value existing in a `zenoh` system possesses
    a unique timestamp. The implication is that you can use the timestamps to order
    values at any location in the system without the need to leverage a consensus
    algorithm.


    In router-less topologies, peer nodes can generate the timestamps themselves.
    In that case, they will use their own hybrid logical clock. To activate this behavior,
    all you need to do is to add the following setting to the JSON5 configuration
    file of the nodes:


    ```

    add_timestamp:true

    ```


    ### Primitives


    The `zenoh` API is simple. There are only a few operations involved in data manipulations.
    The main operations are as follows:


    - **get:** Executes a distributed query.

    - **pull:** Pulls data for a subscription. This mechanism is useful to implement
    *pull subscribers*, that is, subscribers that are only awake or connected part
    of the time.

    - **put:** Publishes a value for a key expression.

    - **subscribe:** Declares a subscriber. You need to pass a reference to a callback
    triggered upon data reception.


    There are also a few operations not focused on data itself. The most used of those
    operations are as follows:


    - **close:** Closes a `zenoh` session.

    - **open:** Opens a `zenoh` session.

    - **queryable:** Declares a distributed computation that will be triggered when
    a query is made. You need to pass a reference to a callback.

    - **scout:** Searches for `zenoh` nodes on the local network. The type of nodes
    returned (clients, peers, routers) is specified through a bitmask.


    Please remember that the actual names of the operations may vary, depending on
    the specific `zenoh` language binding you are using.'
