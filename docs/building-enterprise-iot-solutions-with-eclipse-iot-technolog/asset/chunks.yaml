- fmt: '# 8. The Hardware


    > *Les bons outils font les bons ouvriers.*

    > *Good tools make good workers.*

    > —Proverbe Français


    The life cycle of IoT and edge computing solutions is counted in years, sometimes
    even in decades. Whether they are microcontrollers, gateways, or edge nodes, the
    hardware devices supporting them are held to higher standards than standard IT
    equipment. They will likely face harsh environmental conditions such as low or
    high temperatures, dust, electrical interference, humidity, radiation, and vibrations.
    Some form of ruggedization is a requirement most of the time. Moreover, such devices
    are often installed in hard-to-reach locations. Consequently, they need to be
    resilient and power efficient, especially if they operate over battery power.


    If good tools make good workers, then good hardware makes good software. Given
    all of this, selecting the right hardware for a particular use case is critical.
    This chapter intends to provide you with guidelines to make that decision and
    survey the available choices in the market.


    ## Selection Criteria


    No two IoT deployments are the same. Consequently, attempting to come up with
    a definitive list of selection criteria for hardware would be foolish. In this
    section, I picked the most generic ones to give you a starting point in your evaluation
    process. Of course, you must attribute the proper weight to each criterion according
    to your priorities. I would recommend not to give overwhelming importance to the
    price, however. For your solution to be cost-effective over the long term, you
    will need a modicum of reliability and durability, and settling for bargain-basement
    hardware will counter that.


    With that said, let’s now look at the selection criteria.


    ### Power Consumption


    In most IoT solutions, constrained devices are deployed in the field to transmit
    data acquired by sensors and interact with the physical world through actuators.
    These devices draw power from a battery in many industries and use cases. However,
    a few alternatives emerged in the last few years. The maturation of Power over
    Ethernet (POE) infrastructure and standards make power delivery through network
    cables a possibility for solutions targeted at digital buildings and smart factories.
    At the other end of the scale, energy-harvesting technologies can provide very
    small amounts of power to low-energy electronics. For example, an energy-harvesting
    wall switch can send a short-range radio signal to turn on nearby lighting fixtures
    or devices.


    As you can see, power consumption is an important concern for a wide array of
    IoT deployment scenarios. Of course, hardware is only part of the story when determining
    a specific component''s efficiency. There are many other factors to consider,
    such as the type of sensors used, the sampling rate, networking technology and
    protocols used, and, finally, the software itself. However, hardware plays a prominent
    role in determining the power usage of a component. This includes the microcontroller
    (MCU) or processor used, the type of random-access memory, the type of persistent
    storage, and even the interfaces used to attach peripherals. Moreover, higher-powered
    components may produce a significant amount of heat, requiring cooling solutions
    that increase the overall power requirements. Striking the right balance between
    performance and power efficiency is essential.


    ### Life Cycle


    Given how long the life cycle of IoT and Edge solutions can be, having a stable
    supply chain of hardware components is critical. Rewriting software for a new
    hardware platform or new sensors brings little value to yourself or the end user.
    Fortunately, there are a few possible approaches to tackle this issue.


    The first possible approach is to stick to proven suppliers with a track record
    of long-term product support. However, changes in product lines and strategy are
    common in the corporate world. Today’s dependable suppliers can become unreliable
    over time. If your strategy relies on a specific component or board, securing
    supply in a legally binding agreement is essential.


    An alternative would be to manufacture the components yourself. Traditionally,
    this was an avenue reserved for large organizations with specific manufacturing
    capabilities. Of course, microcontrollers and systems on a chip (SOCs) are complex
    integrated circuits that involve a significant amount of intellectual property.
    Therefore, several players in the market built very profitable businesses focused
    on IP licensing. Arm is, without a doubt, a prime example of this trend. The emergence
    of the [RISC-V instruction set](https://riscv.org/technical/specifications/) and
    open source processor IP based on it, such as the [CORE-V](https://github.com/openhwgroup/core-v-cores)
    family from the [OpenHW Group](https://www.openhwgroup.org/), brings this strategy
    into the reach of organizations of all sizes.


    Various software strategies can also help mitigate the issues related to changes
    in the hardware platform. Leveraging portable programming languages is one way
    to do it, although you should make sure any dependencies you leverage will be
    portable. Another possibility is to use hardware abstraction layers in your stack.
    The [Eclipse MRAA](https://github.com/eclipse/mraa) and [Eclipse UPM](https://github.com/eclipse/upm)
    projects are good examples; `MRAA` provides a uniform API across multiple MCUs
    and boards, while `UPM` does the same for various sensors and actuators.


    Over the long term, you will probably rely on a hybrid approach mixing trusted
    suppliers, open hardware, and hardware abstraction.


    ### Use Case Requirements


    IoT constrained devices and edge computing nodes are deployed outside the confines
    of the corporate data center. They are often positioned in hard-to-reach locations,
    where connectivity will be spotty and physical conditions harsh. A good example
    is the radiation-hardened processors deployed in deep space probes. While their
    specifications pale compared to cutting-edge embedded solutions deployed on Earth,
    they are uniquely well suited for their intended use.^([^(36)](#fn36)) In other
    words, the environment determines most of the nonfunctional requirements that
    the hardware needs to fulfill.


    The availability of specific networking technologies and power sources at deployment
    sites will influence the hardware selection process. However, the functional requirements
    of the use case are equally important. Solutions for mission-critical, real-time
    applications will often require guaranteed latency for memory and network access.
    Memory protection and deterministic interrupt handling are also highly useful
    in applications where the device needs to process a great amount of sensor input
    while making decisions that impact human safety.


    A very important aspect to consider when selecting hardware platforms is the device
    connectivity requirements. You will need to connect the sensors and actuators
    you select to a constrained device or gateway. Consequently, the hardware platforms
    you choose must offer the appropriate type of I/O ports. The presence of external
    ports can prolong the useful life of equipment in some cases. For example, plugging
    a USB-based AI accelerator into a gateway is more cost-effective than completely
    replacing the device.


    Of course, striking the right balance between fulfilling requirements and other
    considerations is often difficult. Mass market solutions such as the popular Raspberry
    Pi single-board computers are cost-effective and versatile but not particularly
    well suited for deployment in harsh environments. On the other hand, ruggedized
    components cost more and are often in more limited supply.'
