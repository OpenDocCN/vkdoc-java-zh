  trans: '

    ## 部署单元


    在部署 zenoh 基础设施时，您可以根据需求混合搭配不同的拓扑结构。这种灵活性得益于 zenoh 节点类型的特定功能。


    zenoh 中有三种类型的节点。具体如下：


    *   **客户端：** 仅连接到一个对等节点或路由器的节点。在 zenoh 中，客户端通常是运行 [zenoh-pico](https://github.com/eclipse-zenoh/zenoh-pico)（一种轻量级协议版本）的、资源极度受限的设备。Zenoh-pico
    可以以客户端或点对点模式连接，但不能参与网状拓扑。


    *   **对等节点：** 支持点对点通信的节点。Zenoh 对等节点可以代表其他对等节点路由数据。此外，zenoh 客户端可以连接到一个对等节点，以便与系统的其余部分进行通信。


    *   **路由器：** 能够独立于拓扑结构，在客户端和对等节点之间路由 zenoh 流量的节点。路由器在多站点部署中尤其有用，因为它们可以通过公共互联网进行连接，而无需复杂的网络设置。Zenoh
    路由器还通过插件提供特定功能，例如分布式存储实例。我将在下一节中描述路由器插件。


    图 7-2 展示了 zenoh 对等节点和路由器节点可以共同部署的几种方式。支持网状拓扑，即对等节点直接且非层次化地连接到多个其他节点。团簇（Clique）是一种特殊的网状结构，其中所有节点形成一个完全图，换句话说，就是每个节点都与其他所有节点直接相连。最后，对等节点可以连接到一个或多个路由器。


    ![](img/524096_1_En_7_Fig2_HTML.jpg)


    三种拓扑结构。1. 网状，连接了 5 个对等节点。2. 团簇，连接了 4 个对等节点。3. 路由式，5 个对等节点连接到一个路由器。


    图 7-2


    几种 zenoh 拓扑结构


    Zenoh 客户端节点可以连接到对等节点或路由器。Zenoh 对等节点可以连接到其他对等节点、路由器，或两者都连接。这使您可以安排节点以满足您的非功能性需求。例如，在特定位置部署一个对等节点网状结构可以消除基础设施中单点故障的威胁。类似地，在不同的网络连接上部署冗余路由器可以使多站点通信更具弹性，同时实现更好的系统扩展。图
    7-3 展示了利用这三种节点类型的各种潜在拓扑结构。


    ![](img/524096_1_En_7_Fig3_HTML.jpg)


    一个网络由 4 个路由器组成。第一个路由器连接了 3 个客户端和 1 个对等节点。第二个路由器连接了 3 个客户端。第三个路由器连接了 2 个对等节点。第四个路由器连接了
    1 个客户端和 1 个对等节点。


    图 7-3


    示例 zenoh 部署


    关于 zenoh 客户端和对等节点，一个重要细节是它们的类型并不限制它们所支持的操作。它们可以根据您的需求进行发布、订阅，或两者兼有。


    ### 设备发现


    与 DDS 类似，zenoh 实现了强大的自动发现机制。然而，为了保持协议的高效性，其创建者特意努力将发现流量降至最低。当然，第一步是优化发现消息的大小。但他们并未止步于此。Zenoh
    仅通告资源兴趣，而非特定的发布者。此外，此类资源兴趣由协议本身进行泛化；这意味着，如果一个设备为诸如 `/T800/sensors/lidar`、`/T800/sensors/camera`
    和 `/T800/position/latitude` 等值发布数据，zenoh 可能会决定将该设备通告为 `/T800/**`。最后，zenoh 的可靠性特性是在节点（或运行时）级别运行的，而不是像
    DDS 那样在单个读取器或写入器级别运行。


    总的来说，zenoh 中资源兴趣的泛化简化了发现过程，并使该协议能够支持互联网规模的应用。所有路由和匹配都利用集合论操作和集合覆盖。例如，这对于找出能够回答特定查询的最小存储集非常有用。Zenoh
    会自动执行资源泛化，但您可以根据需要使用 API 向基础设施提供提示。


    ### 示例：工厂中的机器人


    现在，让我们说明一个真实的 zenoh 部署会是什么样子。假设您的组织管理着大西洋两岸的几家工厂。一些在加拿大，另一些在法国。这些工厂配备了视频监控系统，并有自主机器人在内部工作。几个路由器节点构成了该系统的骨干。图
    7-4 提供了该系统的简化视图。


    ![](img/524096_1_En_7_Fig4_HTML.jpg)


    一个网络描绘了 zenoh 部署。它由七个发布者、四个订阅者、两个存储、九个对等节点、五个路由器和七个客户端组成。


    图 7-4


    两个 zenoh 机器人车队的故事^(²⁸)


    系统设计者决定使用 `/fleet` 作为所有机器人相关键的前缀，使用 `/camera` 作为所有视频监控摄像头的前缀。键结构的第二层表示部署国家，使用
    `CA` 表示加拿大，`FR` 表示法国。在该系统中，机器人被定义为对等节点。机器人之间不一定相互连接。


    机器人通过向名为 `pointcloud` 的子键发布信息来不断更新其位置。键的某一层还包含机器人的数字 ID，该 ID 在整个车队范围内是唯一的。以下是该发布内容的完整键的两个示例：


    ```

    /fleet/CA/robot/1867/pointcloud

    /fleet/FR/robot/1789/pointcloud

    ```


    每个机器人包含两台不同的计算机：一台是承载应用程序的通用单板计算机，另一台是充当机器人控制模块的专用板卡。控制模块是可编程的，并配备了大量的 I/O 接口，使其能够接收原始传感器数据并控制机器人的执行器。在此示例中，`pointcloud`
    值由运行在单板计算机上的应用程序计算并发布。另一方面，控制模块订阅由中央远程控制应用程序发送到诸如以下键的命令：


    ```

    /fleet/CA/robot/1867/halt

    /fleet/FR/robot/1789/halt

    ```


    例如，这个远程控制应用程序可以通过向选择器发布适当的值来阻止*审判日*，从而立即停止所有机器人：


    ```

    /fleet/*/robot/*/halt

    ```


    两个客户端，一个在加拿大，另一个在法国，订阅机器人及摄像头发布的所有内容。具体来说，它们订阅以下选择器：


    ```

    /fleet//robot/**

    /camera//*/image

    ```


    这些分析客户端连接到本地路由器；它们聚合机器人的位置信息，并将其发布到 `/fleet/<国家代码>/position/*` 下。两个存储使用相同的键路径作为其选择器。因此，针对
    `/fleet/*/position/*` 的查询将合并来自这两个存储的数据，这两个存储连接到与分析客户端不同的路由器。

    '
- fmt: '# Plugins


    Zenoh router nodes can provide features to the other nodes through plugins, which
    are libraries loaded by the router at startup or by administrators using the REST
    API at runtime. They share a runtime with the router, allowing them to call the
    zenoh Rust APIs with the same peer ID as the router process itself.


    At the time of writing, the zenoh team maintained two plugins that provide core
    features in the infrastructure. The two plugins are as follows:


    - **REST plugin:** This plugin implements the [REST API for zenoh](https://zenoh.io/docs/apis/rest/),^([^(29)](#fn29))
    which you can use to manipulate the infrastructure or interact with the zenoh
    system to manipulate data. I will demonstrate how to use it later.

    - **Storages plugin:** This plugin manages distributed storage instances. The
    plugin supports various storage *back ends* covering a variety of data management
    approaches.


    Those two plugins ship in the standard zenoh distribution. The zenoh team maintains
    two additional plugins hosted in separate repositories. You can add them to your
    infrastructure as needed. The two plugins are as follows:


    - **DDS plugin:** Scaling DDS traffic over a WAN or across multiple LANs is complex.
    This is due to the core design of DDSI-RTPS and its reliance on UDP/IP multicast
    packets. On the other hand, DDS recently saw tremendous adoption in the ROS 2
    ecosystem. The [zenoh DDS plugin](https://github.com/eclipse-zenoh/zenoh-plugin-dds)^([^(30)](#fn30))
    aims to encapsulate DDS traffic to streamline the integration of remote robot
    swarms. The plugin transparently maps DDS publications and subscriptions to zenoh
    resources. [This blog post](https://zenoh.io/blog/2021-04-28-ros2-integration/)^([^(31)](#fn31))
    explains in detail how to leverage the plugin.

    - **Webserver plugin:** This plugin provides an HTTP server mapping URLs to zenoh
    keys. This makes it possible to serve files retrieved from distributed zenoh storage
    instances. A typical deployment leverages the filesystem storage back end to serve
    static files. However, the plugin will work with storages leveraging any of the
    supported storage back ends.


    ## Storages Plugin Deep Dive


    Given the importance of distributed storage in zenoh, I will now cover in greater
    detail the storages plugin.


    The core concepts implemented by the plugin are *storages* and *back ends*. Storage
    instances simply store key/values on a specific back end, and you need to assign
    them a selector at creation time. A back end is a storage technology supported
    by zenoh. Back ends abstract the details of the actual storage technology used.
    At the time of writing, the zenoh team was actively maintaining the following
    back ends:


    - **filesystem:** The values are stored in a specific folder of the host’s filesystem.
    Each value is a separate file, written in the same encoding used to transmit it.
    The key is reflected in the path for each file. See the [back end’s repository](https://github.com/eclipse-zenoh/zenoh-backend-filesystem)^([^(32)](#fn32))
    for more details.

    - **influxdb:** InfluxDB is a time-series database. Each storage instance corresponds
    to one database. It is possible to connect to an existing database or create a
    new one. The back end will create InfluxDB measurements for each of the keys.
    Values are recorded as InfluxDB points on these measurements. See the [back end’s
    repository](https://github.com/eclipse-zenoh/zenoh-backend-influxdb)^([^(33)](#fn33))
    for more details.

    - **memory:** Keys and values are stored inside an in-memory hashmap. The implementation
    of the back end is part of the storages plugin itself.

    - **rocksdb:** RocksDB is an embeddable key/value store. The store resides in
    a file. Each storage corresponds to a specific database file. Zenoh keys and values
    are used directly, without mapping. See the [back end’s repository](https://github.com/eclipse-zenoh/zenoh-backend-rocksdb)^([^(34)](#fn34))
    for more details.


    Zenoh back ends are packaged as libraries that are loaded by the storages plugin.
    There is no standard way to configure them, as the underlying technologies are
    too different. Back ends and storages can be created through a JSON5 configuration
    file loaded at startup by the router or the zenoh REST API.


    Each of the back ends provided has specific performance and persistence characteristics.
    The memory back end offers no long-term persistence but can be used as a fast
    cache in the infrastructure. The filesystem back end is easy to deploy but will
    not scale as a database would from a performance viewpoint. Using the InfluxDB
    back end makes sense if the system you build requires a historian database to
    support data analysis, as many SCADA use cases do. Finally, the RocksDB back end
    offers a scalable database engine that will deliver the best performance if you
    need to perform many random-access queries on the data.


    The zenoh team also plans to introduce a back end supporting SQL databases in
    the future. Such a back end will provide better integration with typical IT infrastructure.'
