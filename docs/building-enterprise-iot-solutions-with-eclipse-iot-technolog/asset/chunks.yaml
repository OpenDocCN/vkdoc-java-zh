  trans: '

    ## 开源硬件


    本书聚焦于开源技术。如果不讨论成功的开源硬件项目，那将是不完整的。目前，开源处理器核心、微控制器、单板计算机以及传感器和执行器的生态系统正在不断壮大。在本节中，我将为前三类提供示例。


    由于硬件对物联网解决方案的设计影响巨大，依赖开源组件为设备设计者带来了显著优势。物联网开发者会针对代码体积进行优化，并需要将功耗降至最低`–`至少对于现场部署的设备而言是如此。当你不仅控制软件，还控制硬件时，更容易达到理想的功耗特性。此外，开源硬件使得在解决方案的整个生命周期内拥有稳定的硬件平台变得更加容易；如果某个特定供应商停止供应某个组件，总能找到其他供应商或委托第三方来提供。最后，开源硬件使设计者能够扩展和改进组件。由于物联网和边缘计算解决方案通常部署在偏远地区或恶劣环境中，因此能够调整硬件以适应特定用例的能力是无价的。


    ### 处理器核心：OpenHW CORE-V 系列


    Eclipse 基金会与 [OpenHW 组织](https://www.openhwgroup.org) 紧密合作，在开源处理器核心实现的基础上构建一个全面的
    RISC-V 生态系统。OpenHW 组织是一个加拿大的非营利性全球组织，硬件和软件设计师在此协作开发开源处理器核心、相关知识产权、工具和软件。所有 OpenHW
    生态系统的产物都在公开可访问的 GitHub 仓库中开发。核心设计使用 SystemVerilog 定义，并采用 [Solderpad 硬件许可证 0.51
    版](http://solderpad.org/licenses/SHL-0.51/) 进行许可。该许可证基于 Apache 许可证 2.0，并促进了商业应用。


    在撰写本文时，所有当前可用的核心都属于 [CORE-V](https://github.com/openhwgroup/core-v-cores) 系列。以下是对最重要的
    CORE-V 核心的描述。从高层次来看，从用例角度出发，CORE-V 处理器的 CVA 系列可以为网关和边缘节点提供动力，而 CVE4 系列则面向微控制器级别的核心。


    #### CVA6 系列


    CORE-V CVA6 最初被称为 PULP Ariane 核心，是一个 6 级流水线、单发射、顺序执行的核心，实现了 RV32GC 或 RV64GC 扩展，并具有三个特权级别（M、S、U），以完全支持类
    UNIX 操作系统。


    #### CVE4 系列


    CVE4 系列包含多个核心。我仅描述其中最重要的三个。


    *   **CV32E40P：** CORE-V CV32E40P 最初被称为 PULP RI5CY 核心，是一个 32 位、4 级流水线核心，支持 DSP
    操作，并实现了 SIMD 扩展等功能。


    *   **CV32E40X：** CORE-V CV32E40X 是一个小巧高效的 32 位顺序执行 RISC-V 核心，具有 4 级流水线。CV32E40X
    核心面向计算密集型应用，并提供了一个通用扩展接口，你可以利用该接口为核心添加外部自定义扩展。


    *   **CV32E40S：** CORE-V CV32E40S 是一个小巧高效的 32 位顺序执行 RISC-V 核心，具有 4 级流水线。CV32E40S
    核心面向安全应用，提供机器模式（M）和用户模式（U）、增强的物理内存保护以及多种防篡改功能。


    ### 微控制器：CORE-V MCU


    OpenHW 组织的 [CORE-V MCU 项目](https://docs.openhwgroup.org/projects/core-v-mcu) 旨在构建一个基于
    CV32E40P 核心的微控制器。该 MCU 支持 I²C、PWM、SPI 和 UART 等技术。在撰写本文时，最便捷的试用方式是将该芯片作为比特流部署在
    Diligent 的 [Nexys A7](https://digilent.com/shop/nexys-a7-fpga-trainer-board-recommended-for-ece-curriculum/)
    或 [Genesys2](https://digilent.com/reference/programmable-logic/genesys-2/start)
    FPGA 开发板上。然而，OpenHW 组织计划在 2023 年推出配备实际物理芯片的开发板以供分发。请关注此页面以获取有关 CORE-V MCU DevKit
    项目的更多信息：[`www.openhwgroup.org/core-v-devkits/`](http://www.openhwgroup.org/core-v-devkits/)。


    注意


    现场可编程门阵列（FPGA）是可编程的半导体器件。换句话说，它们是可以通过重新配置来执行不同逻辑功能的芯片。对于芯片设计者来说，它们是无价的工具，因为可以在不生产实际半导体器件的情况下测试对处理器核心或
    MCU 设计的更改。


    ### 单板计算机


    目前许多流行的单板计算机的制造者都将其设计以开源许可证的形式提供。我现在将详细探讨几个示例。


    #### Arduino


    流行的 Arduino 8 位微控制器可能使用专有的 AVR 微控制器，但其整体设计是开源的。详细的引脚排列图和原理图可在 Arduino 网站上获取，并根据
    [知识共享署名-相同方式共享 4.0 国际许可证](https://creativecommons.org/licenses/by-sa/4.0/) 发布。


    这些原理图的可用性催生了一个强大的兼容板卡生态系统。


    #### micro:bit


    接下来是强大的 [BBC micro:​bit](https://microbit.org/)。micro:bit 是一款采用 Cortex-M MCU 的开源单板计算机。它于
    2016 年推出，至今已有两个不同的版本。以下是每个版本的主要特性列表：


    *   **版本 1：** [Nordic nRF51822](https://www.nordicsemi.com/products/nrf51822)
    MCU，16 MHz Arm Cortex-M0 核心，256 KB 闪存，16 KB RAM


    *   **版本 2：** [Nordic nRF52833](https://www.nordicsemi.com/products/nrf52833)
    MCU，64 MHz Arm Cortex-M4 核心，512 KB 闪存，128 KB RAM


    micro:bit 最初由 [英国广播公司](https://www.bbc.com/)（BBC）与多家合作伙伴共同设计。该项目的目标是鼓励儿童积极参与计算机相关的活动。基于这一重点，这些板卡配备了
    LED、按钮、传感器（加速度计、磁力计、温度、光线）以及蓝牙连接功能。版本 2 增加了麦克风、扬声器和触摸传感器。官方板卡配备了一个 25 引脚的边缘连接器，提供
    PWM 输出、GPIO 引脚、模拟输入、串行 I/O、SPI 和 I²C。


    [Micro:​bit 教育基金会](https://www.microbit.org/about/) 于 2016 年 10 月由最初的 BBC 项目创立。该基金会是一个非营利组织，负责最大化全球学生使用
    micro:bit 学习的机会。因此，它引导着 micro:bit 板卡及其相关软件栈的演进。尽管官方板卡仅提供原理图和物料清单，但基金会发布了开源的 [兼容参考设计](https://github.com/microbit-foundation/microbit-reference-design)
    和 [详尽的文档](https://tech.microbit.org/hardware/reference-design/)。该参考设计采用 Solderpad
    硬件许可证 0.51 版进行许可。它提供与官方版本 1 板卡相同的组件，并且 100% 软件兼容。

