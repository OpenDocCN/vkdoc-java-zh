  trans: "\n# 8. 硬件\n\n> *Les bons outils font les bons ouvriers.*\n\n> *工欲善其事，必先利其器。*\n\
    > \n> ——法国谚语\n\n物联网和边缘计算解决方案的生命周期以年为单位，有时甚至长达数十年。无论是微控制器、网关还是边缘节点，支撑它们的硬件设备都需遵循比标准\
    \ IT 设备更高的标准。它们很可能面临恶劣的环境条件，例如低温或高温、灰尘、电磁干扰、潮湿、辐射和振动。在大多数情况下，某种形式的加固是必需的。此外，这类设备通常安装在难以触及的位置。因此，它们需要具备弹性且能效高，尤其是在依靠电池供电运行时。\n\
    \n如果工欲善其事，必先利其器，那么好的硬件才能成就好的软件。鉴于以上种种，为特定用例选择合适的硬件至关重要。本章旨在为您提供做出该决策的指导原则，并调研市场上可用的选择。\n\
    \n## 选择标准\n\n没有两个物联网部署是完全相同的。因此，试图制定一份硬性的硬件选择标准清单是愚蠢的。在本节中，我挑选了最通用的标准，作为您评估过程的起点。当然，您必须根据自身的优先级为每个标准赋予适当的权重。不过，我建议不要过分看重价格。要使您的解决方案在长期内具有成本效益，您需要一定的可靠性和耐用性，而选择廉价低质的硬件会适得其反。\n\
    \n话虽如此，现在让我们来看看这些选择标准。\n\n### 功耗\n\n在大多数物联网解决方案中，受限设备被部署在现场，用于传输传感器采集的数据，并通过执行器与物理世界交互。在许多行业和用例中，这些设备由电池供电。然而，在过去几年中出现了一些替代方案。以太网供电（POE）基础设施和标准的成熟，使得通过网络电缆供电成为可能，适用于数字建筑和智能工厂等解决方案。在另一个极端，能量收集技术可以为低功耗电子设备提供非常微小的电量。例如，一个能量收集墙壁开关可以发送短距离无线电信号，以打开附近的照明设备或装置。\n\
    \n如您所见，功耗是众多物联网部署场景中的一个重要考量因素。当然，在确定特定组件的效率时，硬件只是其中的一部分。还有许多其他因素需要考虑，例如所用传感器的类型、采样率、网络技术和协议，以及最终的软件本身。然而，硬件在决定组件的功耗方面起着主导作用。这包括所使用的微控制器（MCU）或处理器、随机存取存储器的类型、持久化存储的类型，甚至用于连接外设的接口。此外，功率更高的组件可能会产生大量热量，需要冷却解决方案，从而增加整体功耗需求。在性能与能效之间取得恰当的平衡至关重要。\n\
    \n### 生命周期\n\n鉴于物联网和边缘解决方案的生命周期可能很长，拥有稳定的硬件组件供应链至关重要。为新的硬件平台或新传感器重写软件，对您或最终用户而言价值甚微。幸运的是，有几种可能的方法可以解决这个问题。\n\
    \n第一种可能的方法是坚持使用那些有长期产品支持记录的可靠供应商。然而，产品线和战略的变化在企业界很常见。今天可靠的供应商，随着时间的推移可能会变得不可靠。如果您的策略依赖于特定的组件或板卡，那么通过具有法律约束力的协议来确保供应至关重要。\n\
    \n另一种选择是自行制造组件。传统上，这是拥有特定制造能力的大型组织才能走的道路。当然，微控制器和片上系统（SOC）是复杂的集成电路，涉及大量的知识产权。因此，市场上有几家参与者建立了非常盈利的业务，专注于知识产权许可。Arm\
    \ 无疑是这一趋势的典型例子。[RISC-V 指令集](https://riscv.org/technical/specifications/)以及基于它的开源处理器\
    \ IP（例如[OpenHW Group](https://www.openhwgroup.org/)的[CORE-V](https://github.com/openhwgroup/core-v-cores)系列）的出现，使得各种规模的组织都有可能采用这一策略。\n\
    \n各种软件策略也有助于缓解与硬件平台变更相关的问题。利用可移植的编程语言是一种方法，尽管您应确保所使用的任何依赖项都是可移植的。另一种可能性是在您的技术栈中使用硬件抽象层。[Eclipse\
    \ MRAA](https://github.com/eclipse/mraa)和[Eclipse UPM](https://github.com/eclipse/upm)项目就是很好的例子；MRAA\
    \ 在多个 MCU 和板卡上提供统一的 API，而 UPM 则为各种传感器和执行器提供相同的功能。\n\n从长远来看，您可能会依赖一种混合方法，结合可信赖的供应商、开放硬件和硬件抽象。\n\
    \n### 用例需求\n\n物联网受限设备和边缘计算节点部署在企业数据中心之外。它们通常位于难以触及的位置，那里连接可能不稳定，物理条件恶劣。一个很好的例子是部署在深空探测器中的抗辐射处理器。虽然它们的规格与地球上部署的尖端嵌入式解决方案相比相形见绌，但它们却非常适合其预期用途^(³⁶)。换句话说，环境决定了硬件需要满足的大部分非功能性需求。\n\
    \n部署地点特定网络技术和电源的可用性将影响硬件选择过程。然而，用例的功能需求同样重要。对于关键任务、实时应用的解决方案，通常需要保证内存和网络访问的延迟。在设备需要处理大量传感器输入并做出影响人身安全的决策的应用中，内存保护和确定性中断处理也非常有用。\n\
    \n选择硬件平台时需要考虑的一个非常重要的方面是设备连接需求。您需要将所选传感器和执行器连接到受限设备或网关。因此，您选择的硬件平台必须提供适当类型的 I/O\
    \ 端口。在某些情况下，外部端口的存在可以延长设备的使用寿命。例如，将基于 USB 的 AI 加速器插入网关比完全更换设备更具成本效益。\n\n当然，在满足需求与其他考量之间取得恰当的平衡通常很困难。像流行的树莓派单板计算机这样的大众市场解决方案成本效益高且用途广泛，但并不特别适合在恶劣环境中部署。另一方面，加固组件成本更高，且供应通常更有限。\n"
- fmt: "### Security\n\nConstrained devices, gateways, and edge nodes deployed in\
    \ the field are vulnerable to a range of attacks that do not impact Cloud or traditional\
    \ IT infrastructure. Their physical location exposes them to the risk of being\
    \ physically compromised or even stolen. This can have serious consequences. A\
    \ stolen device can be used to impersonate a legitimate one and reveal weaknesses\
    \ in the server-side back end to attackers. The data stored on the device can\
    \ also be used to expose trade secrets or even customer identities, with severe\
    \ potential repercussions. You need a comprehensive security strategy for the\
    \ devices you will deploy.\n\nAt the hardware level, such a strategy starts by\
    \ leveraging a Trusted Platform Module (`TPM`) in devices that can host them.\
    \ A `TPM` is a dedicated microcontroller designed to provide security-related\
    \ functions. They can generate cryptographic keys and a nearly unforgeable hash\
    \ key summarizing the hardware and software configuration of the device used in\
    \ remote attestation. In addition, they can store cryptographic keys securely;\
    \ those keys can be used in disk encryption or for authentication purposes, for\
    \ example. `TPM`s, cryptographic keys, and digital certificates are building blocks\
    \ you can use to implement *root of trust* in your devices. Root of trust is a\
    \ chain of trust ensuring your devices boot only legitimate code.\n\nStorage encryption,\
    \ also called data encryption at rest, is a key feature for any device deployed\
    \ in the wild. While software solutions address this need, it is also possible\
    \ to offload this concern to hardware by using self-encrypting drives. Such a\
    \ solution, of course, increases the cost and power consumption of the device.\
    \ `FIPS 140-2`, `Opal 2.0`, and `AES 256-bit` hardware-based encryption are commonly\
    \ available. `FIPS` drives are tamper resistant and are usually required for national\
    \ defense and government applications transmitting controlled, unclassified information.\n\
    \nPhysical security is also an important concern to prevent your devices from\
    \ being stolen or compromised. Concretely, this means you should, at a minimum,\
    \ be able to place a lock on the device enclosure. Securing devices in tamper-resistant\
    \ cases is a good idea in most scenarios. Specialized cases can protect against\
    \ a range of environmental factors. If this applies to your use case, you should\
    \ look for `NEMA` or `IP`-rated cases. The `NEMA` rating system from the National\
    \ Electrical Manufacturers Association rates enclosures on the protection they\
    \ give from solid particulate ingress, liquid ingress, and corrosion. `NEMA` ratings\
    \ are used mostly in the United States. Conversely, the `IP` rating system is\
    \ used worldwide but evaluates only liquid ingress and solid ingress protection.\
    \ `NEMA` and `IP` ratings can somehow be compared to each other, but direct comparisons\
    \ are not possible since the two systems consider a different set of factors.\n\
    \nIn most cases, it is good to remove or obstruct any ports, interfaces, or pins\
    \ that are not actively in use. Attackers could use any of these to compromise\
    \ a device.\n\n### Cost\n\nEvery one of the criteria I discussed will directly\
    \ influence the cost of your devices. In return, the cost will undoubtedly drive\
    \ many of your hardware decisions. Striking the right balance is not easy, hence\
    \ the need for you to properly gather the functional and nonfunctional requirements\
    \ for your projects. Moreover, at the time of writing, the market was still heavily\
    \ impacted by the consequences of the COVID-19 pandemic. The so-called “chip shortage”^([^(37)](#fn37))\
    \ made many components hard to find, driving prices significantly upward. That\
    \ temporary scarcity led many organizations to streamline their supply chain and,\
    \ in some cases, ship products without specific features or use more expensive\
    \ components.\n\nIf you are expecting to deploy devices at scale for yourself\
    \ or your customers, you should explore the cost savings of bulk purchases. The\
    \ implication is that you will reduce costs by standardizing on a smaller array\
    \ of components. However, some could represent less optimal choices for specific\
    \ applications.\n\nIf you are still in the prototyping or proof-of-concept phase,\
    \ one way to alleviate the unavailability of hardware components is to use simulation\
    \ tools. Such tools enable you to emulate specific boards and, in certain cases,\
    \ sensors, actuators, and peripherals. In a blog post published in March 2022,\
    \ Benjamin Cabé, my predecessor at the Eclipse Foundation, identified three interesting\
    \ options in that space: [`Renode`](https://renode.io/), [`Wokwi`](https://wokwi.com/),\
    \ and [`TinkerCAD`](https://www.tinkercad.com/).^([^(38)](#fn38))\n\n## Microcontrollers\n\
    \nMicrocontrollers (`MCU`s) are at the core of most constrained devices. They\
    \ are small computers implemented on a single integrated circuit (`IC`), typically\
    \ containing a processor core, random-access memory, timers, counters, and programmable\
    \ input/output peripherals. `MCU`s are designed to support small control applications\
    \ and deliver low power consumption at an affordable price. Usually, they offer\
    \ flash or `EEPROM` storage sized from a few hundred kilobytes to a few megabytes.\
    \ Random-access memory is small and typically ranges from 16 to 512 kilobytes.\
    \ It is not unusual to see 8-bit, 16-bit, and 32-bit CPU cores in microcontrollers.\n\
    \n> **Note**  \n> You can see microcontrollers as a specialized, low-power system\
    \ on a chip (`SOC`). The `SOC`s found in tablets, smartphones, and even Mac computers\
    \ using Apple Silicon integrate higher-end features such as cellular modems, graphics\
    \ processing units (`GPU`s), and even artificial intelligence accelerators.\n\n\
    Most of the microcontrollers currently available on the market rely on processor\
    \ cores using some form of `RISC` architecture, with `Arm` and `AVR` being the\
    \ most widespread options. However, `RISC-V` is starting to make inroads, and\
    \ there are even open source core and `MCU` designs available such as the [`OpenHW\
    \ CORE-V MCU`](https://www.openhwgroup.org/core-v-devkits/).\n\nMicrocontrollers\
    \ typically implement either the von Neumann architecture or the Harvard architecture.\
    \ The term *von Neumann architecture* refers to a stored-program computer where\
    \ instruction fetches and data operations cannot simultaneously occur since they\
    \ involve a shared bus. The main alternative to von Neumann architecture is the\
    \ *Harvard architecture*. Harvard architecture computers are stored-program systems\
    \ that possess a dedicated set of address and data buses for memory access and\
    \ another set for instructions. The design of a von Neumann architecture machine\
    \ is typically simpler than that of a Harvard one. Most current high-performance\
    \ desktop-class and data center–class processors incorporate aspects of both architectures."
  raw: '### Security


    Constrained devices, gateways, and edge nodes deployed in the field are vulnerable
    to a range of attacks that do not impact Cloud or traditional IT infrastructure.
    Their physical location exposes them to the risk of being physically compromised
    or even stolen. This can have serious consequences. A stolen device can be used
    to impersonate a legitimate one and reveal weaknesses in the server-side back
    end to attackers. The data stored on the device can also be used to expose trade
    secrets or even customer identities, with severe potential repercussions. You
    need a comprehensive security strategy for the devices you will deploy.


    At the hardware level, such a strategy starts by leveraging a Trusted Platform
    Module (TPM) in devices that can host them. A TPM is a dedicated microcontroller
    designed to provide security-related functions. They can generate cryptographic
    keys and a nearly unforgeable hash key summarizing the hardware and software configuration
    of the device used in remote attestation. In addition, they can store cryptographic
    keys securely; those keys can be used in disk encryption or for authentication
    purposes, for example. TPMs, cryptographic keys, and digital certificates are
    building blocks you can use to implement *root of trust* in your devices. Root
    of trust is a chain of trust ensuring your devices boot only legitimate code.


    Storage encryption, also called data encryption at rest, is a key feature for
    any device deployed in the wild. While software solutions address this need, it
    is also possible to offload this concern to hardware by using self-encrypting
    drives. Such a solution, of course, increases the cost and power consumption of
    the device. FIPS 140-2, Opal 2.0, and AES 256-bit hardware-based encryption are
    commonly available. FIPS drives are tamper resistant and are usually required
    for national defense and government applications transmitting controlled, unclassified
    information.


    Physical security is also an important concern to prevent your devices from being
    stolen or compromised. Concretely, this means you should, at a minimum, be able
    to place a lock on the device enclosure. Securing devices in tamper-resistant
    cases is a good idea in most scenarios. Specialized cases can protect against
    a range of environmental factors. If this applies to your use case, you should
    look for NEMA or IP-rated cases. The NEMA rating system from the National Electrical
    Manufacturers Association rates enclosures on the protection they give from solid
    particulate ingress, liquid ingress, and corrosion. NEMA ratings are used mostly
    in the United States. Conversely, the IP rating system is used worldwide but evaluates
    only liquid ingress and solid ingress protection. NEMA and IP ratings can somehow
    be compared to each other, but direct comparisons are not possible since the two
    systems consider a different set of factors.


    In most cases, it is good to remove or obstruct any ports, interfaces, or pins
    that are not actively in use. Attackers could use any of these to compromise a
    device.


    ### Cost


    Every one of the criteria I discussed will directly influence the cost of your
    devices. In return, the cost will undoubtedly drive many of your hardware decisions.
    Striking the right balance is not easy, hence the need for you to properly gather
    the functional and nonfunctional requirements for your projects. Moreover, at
    the time of writing, the market was still heavily impacted by the consequences
    of the COVID-19 pandemic. The so-called “chip shortage”^([^(37)](#fn37)) made
    many components hard to find, driving prices significantly upward. That temporary
    scarcity led many organizations to streamline their supply chain and, in some
    cases, ship products without specific features or use more expensive components.


    If you are expecting to deploy devices at scale for yourself or your customers,
    you should explore the cost savings of bulk purchases. The implication is that
    you will reduce costs by standardizing on a smaller array of components. However,
    some could represent less optimal choices for specific applications.


    If you are still in the prototyping or proof-of-concept phase, one way to alleviate
    the unavailability of hardware components is to use simulation tools. Such tools
    enable you to emulate specific boards and, in certain cases, sensors, actuators,
    and peripherals. In a blog post published in March 2022, Benjamin Cabé, my predecessor
    at the Eclipse Foundation, identified three interesting options in that space:
    [Renode](https://renode.io/), [Wokwi](https://wokwi.com/), and [TinkerCAD](https://www.tinkercad.com/).^([^(38)](#fn38))


    ## Microcontrollers


    Microcontrollers (MCUs) are at the core of most constrained devices. They are
    small computers implemented on a single integrated circuit (IC), typically containing
    a processor core, random-access memory, timers, counters, and programmable input/output
    peripherals. MCUs are designed to support small control applications and deliver
    low power consumption at an affordable price. Usually, they offer flash or EEPROM
    storage sized from a few hundred kilobytes to a few megabytes. Random-access memory
    is small and typically ranges from 16 to 512 kilobytes. It is not unusual to see
    8-bit, 16-bit, and 32-bit CPU cores in microcontrollers.


    Note


    You can see microcontrollers as a specialized, low-power system on a chip (SOC).
    The SOCs found in tablets, smartphones, and even Mac computers using Apple Silicon
    integrate higher-end features such as cellular modems, graphics processing units
    (GPUs), and even artificial intelligence accelerators.


    Most of the microcontrollers currently available on the market rely on processor
    cores using some form of RISC architecture, with Arm and AVR being the most widespread
    options. However, RISC-V is starting to make inroads, and there are even open
    source core and MCU designs available such as the [OpenHW CORE-V MCU](https://www.openhwgroup.org/core-v-devkits/).


    Microcontrollers typically implement either the von Neumann architecture or the
    Harvard architecture. The term *von Neumann architecture* refers to a stored-program
    computer where instruction fetches and data operations cannot simultaneously occur
    since they involve a shared bus. The main alternative to von Neumann architecture
    is the *Harvard architecture*. Harvard architecture computers are stored-program
    systems that possess a dedicated set of address and data buses for memory access
    and another set for instructions. The design of a von Neumann architecture machine
    is typically simpler than that of a Harvard one. Most current high-performance
    desktop-class and data center`–`class processors incorporate aspects of both architectures.'
  trans: '

    ### 安全性


    部署在现场的受限设备、网关和边缘节点容易受到一系列攻击，这些攻击不会影响云或传统 IT 基础设施。它们的物理位置使其面临被物理破坏甚至被盗的风险。这可能会造成严重后果。被盗设备可用于冒充合法设备，并向攻击者暴露服务器端后端的弱点。设备上存储的数据也可能被用来泄露商业机密甚至客户身份，从而带来严重的潜在影响。你需要为将要部署的设备制定全面的安全策略。


    在硬件层面，此类策略首先要在能够承载可信平台模块（TPM）的设备中利用该模块。TPM 是一种专用微控制器，旨在提供安全相关功能。它们可以生成加密密钥以及一个几乎无法伪造的哈希密钥，该密钥可总结用于远程认证的设备的硬件和软件配置。此外，它们可以安全地存储加密密钥；这些密钥可用于磁盘加密或身份验证等目的。TPM、加密密钥和数字证书是可用于在设备中实现*信任根*的构建模块。信任根是一条信任链，确保你的设备仅启动合法代码。


    存储加密，也称为静态数据加密，是任何部署在野外环境中的设备的关键功能。虽然软件解决方案可以满足这一需求，但也可以通过使用自加密驱动器将这一关注点卸载到硬件上。当然，这种解决方案会增加设备的成本和功耗。FIPS
    140-2、Opal 2.0 和基于硬件的 AES 256 位加密是常见的可用方案。FIPS 驱动器具有防篡改特性，通常用于传输受控非机密信息的国防和政府应用。


    物理安全也是防止设备被盗或受损的重要考量。具体来说，这意味着你至少应该能够在设备外壳上加锁。在大多数情况下，将设备固定在防篡改外壳中是个好主意。专用外壳可以抵御一系列环境因素。如果这适用于你的用例，你应该寻找符合
    NEMA 或 IP 等级的外壳。来自美国电气制造商协会的 NEMA 等级系统根据外壳对固体颗粒侵入、液体侵入和腐蚀的防护能力进行评级。NEMA 等级主要在美国使用。相反，IP
    等级系统在全球范围内使用，但仅评估液体侵入和固体颗粒侵入防护。NEMA 和 IP 等级在某种程度上可以相互比较，但由于两个系统考虑的因素集不同，无法直接比较。


    在大多数情况下，最好移除或阻塞任何未实际使用的端口、接口或引脚。攻击者可能利用这些中的任何一个来破坏设备。


    ### 成本


    我讨论的每一个标准都将直接影响你设备的成本。反过来，成本无疑将驱动你的许多硬件决策。找到正确的平衡点并不容易，因此你需要为项目恰当地收集功能性和非功能性需求。此外，在撰写本文时，市场仍受到
    COVID-19 疫情后果的严重影响。所谓的“芯片短缺”^(³⁷) 使得许多组件难以找到，导致价格大幅上涨。这种暂时的稀缺性导致许多组织精简其供应链，并在某些情况下，在没有特定功能的情况下发货产品，或使用更昂贵的组件。


    如果你打算为自己或客户大规模部署设备，你应该探索批量采购的成本节约。这意味着你将通过标准化使用更少的组件来降低成本。然而，对于特定应用，某些组件可能并非最优选择。


    如果你仍处于原型设计或概念验证阶段，缓解硬件组件不可用的一种方法是使用仿真工具。此类工具使你能够模拟特定的开发板，在某些情况下，还能模拟传感器、执行器和外设。在
    2022 年 3 月发布的一篇博文中，我在 Eclipse 基金会的前任 Benjamin Cabé 指出了该领域的三个有趣选项：[Renode](https://renode.io/)、[Wokwi](https://wokwi.com/)
    和 [TinkerCAD](https://www.tinkercad.com/)。^(³⁸)


    ## 微控制器


    微控制器（MCU）是大多数受限设备的核心。它们是实现在单个集成电路（IC）上的小型计算机，通常包含处理器核心、随机存取存储器、定时器、计数器和可编程输入/输出外设。MCU
    旨在支持小型控制应用，并以可承受的价格提供低功耗。通常，它们提供大小从几百千字节到几兆字节的闪存或 EEPROM 存储。随机存取存储器很小，通常在 16 到
    512 千字节之间。在微控制器中看到 8 位、16 位和 32 位 CPU 核心并不罕见。


    注意


    你可以将微控制器视为一种专门的、低功耗的片上系统（SOC）。在平板电脑、智能手机甚至使用 Apple Silicon 的 Mac 电脑中发现的 SOC 集成了更高级的功能，例如蜂窝调制解调器、图形处理单元（GPU），甚至人工智能加速器。


    目前市场上可用的大多数微控制器都依赖于使用某种 RISC 架构的处理器核心，其中 Arm 和 AVR 是最广泛的选择。然而，RISC-V 正在开始取得进展，甚至还有可用的开源核心和
    MCU 设计，例如 [OpenHW CORE-V MCU](https://www.openhwgroup.org/core-v-devkits/)。


    微控制器通常实现冯·诺依曼架构或哈佛架构。术语*冯·诺依曼架构*指的是一种存储程序计算机，其中指令获取和数据操作不能同时发生，因为它们涉及共享总线。冯·诺依曼架构的主要替代方案是*哈佛架构*。哈佛架构计算机是存储程序系统，拥有专用的地址和数据总线用于内存访问，以及另一组用于指令。冯·诺依曼架构机器的设计通常比哈佛架构机器更简单。目前大多数高性能桌面级和数据中心级处理器都融合了这两种架构的特点。

