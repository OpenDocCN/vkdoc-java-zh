    #### node-wot 入门指南


    如何开始使用 node-wot 取决于你将如何利用该平台。我将重点介绍将其作为库或独立应用程序使用的情况，因为这是两种最常见的用例。


    由于 node-wot 依赖于 Node.js，开发团队通过 NPM 包管理器将其作为依赖项提供。鉴于 node-wot 的模块化特性，有多个可用包。核心平台位于
    `node-wot-core` 中，每个绑定模板都有独立的包。你可以通过执行以下命令列出所有相关包：


    ```

    npm search @node-wot

    ```


    假设你只想使用 HTTP 绑定模板。那么，你可以通过以下命令安装相关依赖：


    ```

    npm i @node-wot/core @node-wot/binding-http –save

    ```


    库安装完成后，你就可以构建应用程序了。以下代码片段展示了如何实例化一个 WoT 服务器。


    ```

    const Servient = require(''@node-wot/core'').Servient;

    const HttpServer = require(''@node-wot/binding-http'').HttpServer;

    const servient = new Servient();

    servient.addServer(new HttpServer());

    servient.start().then((WoT) => {

    let thing = WoT.produce({

    title: "ThingTThing",

    description: " Beware of the Thing.",

    });

    // 在此处添加定义属性、操作和事件的代码

    thing.expose();

    });

    ```


    服务器启动后，上述代码使用 `WoT.produce` 创建一个 Thing 实例，该实例将通过配置的绑定模板可用。Thing 的标题决定了其 URL。默认情况下，HTTP
    模板将使用端口 8080。


    假设你已经在工作站上启动了一个运行上述代码的服务器。你将如何通过 HTTP 消费刚刚创建的 Thing 实例？以下代码片段实现了这一功能：


    ```

    const { Servient, Helpers } = require("@node-wot/core");

    const { HttpClientFactory } = require(''@node-wot/binding-http'');

    const servient = new Servient();

    servient.addClientFactory(new HttpClientFactory(null));

    const WoTHelpers = new Helpers(servient);

    WoTHelpers.fetch("http://localhost:8080/ThingTThing").then(async (td) => {

    try {

    servient.start().then(async (WoT) => {

    let thing = await WoT.consume(td);

    // 在此处使用 Thing 的属性和操作

    });

    }

    catch (err) {

    console.error("脚本错误:", err);

    }

    }).catch((err) => { console.error("获取错误:", err); });

    ```


    当然，你能用 Thing 实例实现什么功能取决于它实现了哪些属性和操作。GitHub 上的 node-wot 仓库包含了暴露和消费 Thing 所涉及 API
    的概述。你可以在此处找到：[`https://github.com/eclipse/thingweb.node-wot/blob/master/API.md`](https://github.com/eclipse/thingweb.node-wot/blob/master/API.md)。


    ## 数字孪生


    到目前为止，我已经讨论了微服务中的物联网应用以及支持它们的运行时平台。虽然这种方法可行，但过去几年中一些更高级的抽象概念已经流行起来。其中最突出的是数字孪生。


    数字孪生的核心是一个虚拟模型，它精确反映物理对象的属性和状态。数字孪生的*概念*最早由大卫·格勒恩特尔在 1991 年出版的《镜像世界》一书中提出。然而，直到
    2002 年，时任密歇根大学教员的迈克尔·格里夫斯博士才将其应用于制造业。*术语*“数字孪生”最终由 NASA 的约翰·维克斯在 2010 年创造。话虽如此，NASA
    早在 20 世纪 60 年代的任务就已经采用了这种方法。该航天局为其发射的每个航天器都建造了复制品，用于学习和模拟目的。令人着迷的是，太空探索在边缘计算（如第
    1 章所述）和数字孪生的诞生中发挥了重要作用。


    注意


    数字孪生适用于许多行业。制造业、建筑业、医疗保健和汽车行业是一些最好的例子。像[工业数字孪生协会](https://industrialdigitaltwin.org/en/)（IDTA）这样的组织正在努力定义互操作性规范并集成协调的子模型。这促成了
    Eclipse 基金会[数字孪生顶级项目](https://projects.eclipse.org/projects/dt)的创建。


    许多产品都在提出数字孪生的方法。在本节的剩余部分，我将提出一种利用现有标准和开源项目来实现它们的方法。

    '
- fmt: '# Eclipse Ditto


    `Eclipse Ditto` is a digital twin platform abstracting device interactions via
    their digital twins. It supports both device-to-cloud and cloud-to-device interactions.
    Using `Ditto`, you can build digital twins for new or existing devices; in other
    words, it supports both brownfield and greenfield deployments. As all device interactions
    are orchestrated through their digital twins, `Ditto` enforces authorization on
    all API calls. The platform also provides SDKs for interacting with digital twin
    instances through HTTP, WebSockets, and other widespread protocols such as MQTT
    and Apache Kafka. `Ditto` is explicitly designed as a Cloud back end. It can scale
    horizontally and is capable of providing digital twins for millions of connected
    devices at once.


    Bosch contributed the `Ditto` project to the Eclipse Foundation in 2017. `Ditto`
    is licensed under the Eclipse Public License version 2.0. When I wrote this, the
    current version was v2.4.0, released on April 14, 2022.


    The official web resources for `Ditto` are as follows:


    - **Website:** [`https://eclipse.org/ditto`](https://eclipse.org/ditto)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.ditto`](https://projects.eclipse.org/projects/iot.ditto)

    - **Code repository:** [`https://github.com/eclipse/ditto`](https://github.com/eclipse/ditto)


    `Ditto` is a prime example of a well-thought-out separation of concerns. Its focus
    is only on providing a digital twin back end, leaving device connectivity and
    software updates to other specialized platforms. The functional scope of `Ditto`
    can be synthesized in this way:


    - Providing APIs abstracting the details of the IoT protocols used by physical
    devices

    - Routing requests between applications and devices or the device’s last known
    state persisted in `Ditto`

    - Enforcing authorization

    - Persisting the last known values sent by the devices

    - Notifying interested parties about changes in the persisted state of the digital
    twins

    - Establishing and maintaining connections to message brokers, enabling asynchronous
    interaction with digital twins from third-party applications

    - Applying payload transformations when required to map the payloads of existing
    brownfield devices into a format `Ditto` can understand

    - Maintaining a search index of all persisted twin data

    - Exposing APIs to process queries against sensor data of complete device fleets


    There are a few core entities in `Ditto`. Here is a list of the main of those
    entities:


    - **Thing:** Generic entity representing a device (physical or virtual), a transaction,
    master data, or anything that can be modeled. A `Thing` is the digital twin instance;
    its interaction capabilities can be defined, for example, through a WoT Thing
    Model. A thing possesses attributes and features. Attributes are static metadata,
    such as a serial number. Features reflect a thing’s state; this can be sensor
    values or configuration settings, for example.

    - **Message:** Arbitrary payloads sent to and from the entity represented by a
    `Thing`. Messages sent to a device are operations that should trigger an action.
    Messages received from a device are events propagated by the entity. `Ditto` does
    not perform message retention for offline entities. By default, each message will
    be delivered at most once, meaning there is no delivery guarantee. However, `Ditto`
    provides mechanisms for “at least once” delivery through acknowledgments.

    - **Policy:** Specifies fine-grained access control for `Things`, `Features`,
    `Messages`, and `Policies` themselves.


    Internally, `Ditto` relies on a signal-based system to keep track of the digital
    twins (`Things`) and the entities they represent. Those signals are commands,
    command responses, error responses, events, and announcements. `Ditto` also manages
    acknowledgments that indicate that a signal was received or processed successfully.
    In addition, `Ditto` possesses the concept of connections, a separate entity with
    a different life cycle representing a channel used to exchange messages. Such
    connections can be established with device connectivity platforms like `Eclipse
    Hono`, MQTT brokers, or messaging services like `RabbitMQ` or `Apache Kafka`.


    `Ditto` also defines a protocol of the same name, registered as an official IANA
    media type. This protocol relies on JSON payloads and can run over several network
    transport protocols, namely, AMQP (0.9 and 1.0), HTTP 1.1, MQTT (3.1.1 and 5.0),
    Kafka 2.x, and WebSocket. The payloads represent application data and are wrapped
    into an envelope used to route requests to their destination. To simplify the
    usage of the `Ditto` protocol, the project team maintains Java and JavaScript
    SDKs that you can use in your applications that need to create digital twins or
    interact with them. You can also use the `Ditto` REST and WebSocket APIs for the
    same purpose.


    The `Ditto` platform is implemented in microservices communicating asynchronously
    through predefined signals. You can scale each of them horizontally depending
    on your scalability requirements. Here is the list of those services:


    - **Policies:** Responsible for the persistence of `Policies`.

    - **Things:** Responsible for the persistence of `Things` and their `Features`.

    - **Things-Search:** Tracks changes to `Things`, `Features`, and `Policies`. This
    service also maintains a search index and executes queries against it.

    - **Concierge:** Orchestrates the services that perform persistence and authorizes
    requests against them.

    - **Gateway:** Exposes REST and WebSocket APIs.

    - **Connectivity:** Sends and receives messages through the channel established
    to several external messaging systems.


    Figure [12-2](#524096_1_En_12_Chapter.xhtml#Fig2) shows how those microservices
    interact in the context of `Ditto`’s architecture.


    ![](images/524096_1_En_12_Chapter/524096_1_En_12_Fig2_HTML.jpg)


    An architecture includes Nginx with HTTP and WebSocket; gateway; concierge; connectivity
    of Apache Kafka 2.x, HTTP 1.1, AMQP 1.0 and 0.9.1, and MQTT 3.1.1 and 5.0; things;
    things search; policies, and MongoDB.


    **Figure 12-2** Eclipse Ditto architecture (Credit: Eclipse Foundation)


    You probably noticed there are two third-party components featured in the architecture.
    One is `Nginx`, which is used as a reverse proxy, and the other is `MongoDB`,
    which is used for the persistence of `Policies`, `Things`, `Connections`, and
    the `Things` search index.'
