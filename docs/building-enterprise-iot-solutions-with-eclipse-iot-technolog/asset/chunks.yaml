  raw: '### Linux


    To install the SDK dependencies on Ubuntu, execute this command:


    ```

    sudo apt-get install --no-install-recommends git cmake \

    ninja-build gperf ccache dfu-util device-tree-compiler wget \

    python3-dev python3-pip python3-setuptools python3-tk \

    python3-wheel xz-utils file libpython3.8-dev \

    make gcc gcc-multilib g++-multilib libsdl2-dev

    ```


    For Fedora, the command looks like this:


    ```

    sudo dnf group install "Development Tools" \

    "C Development Tools and Libraries"

    sudo dnf install git cmake ninja-build gperf ccache dfu-util \

    dtc wget python3-pip python3-tkinter xz file glibc-devel.i686 \

    libstdc++-devel.i686 python38 SDL2-devel

    ```


    Once the package manager is done, you must prepare Python since West relies on
    it. It is a best practice to leverage Python virtual environments when working
    on Zephyr projects. You can create and activate one like this:


    ```

    python3 -m venv ~/zephyrproject/.venv

    source ~/zephyrproject/.venv/bin/activate

    ```


    Substitute the name of your choice for `zephyrproject`. Remember to activate the
    virtual environment every time you start a new shell instance to work on the code.


    Once this is done, you must add the West tool to your Python environment. This
    is the relevant command:


    ```

    pip install west

    ```


    The next step is to get the Zephyr source code. You could have cloned the repository,
    but West can also do this.


    ```

    west init ~/zephyrproject

    cd ~/zephyrproject

    west update

    ```


    West can configure the environment to allow CMake to load the Zephyr boilerplate
    code required by the build process. Run this command:


    ```

    west zephyr-export

    ```


    Before continuing, you need to install a few additional Python dependencies. They
    are found in `zephyr/scripts/requirements.txt` in your project’s folder.


    ```

    pip install -r ~/zephyrproject/zephyr/scripts/requirements.txt

    ```


    After that, time to download and install the SDK itself.


    ```

    wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.14.2/zephyr-sdk-0.14.2_linux-x86_64.tar.gz

    wget -O - https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.14.2/sha256.sum
    | shasum --check --ignore-missing

    ```


    You can download a specific SDK version by replacing `0.14.2` in the preceding
    commands with the correct version number. You can access the list of releases
    here: [`https://github.com/zephyrproject-rtos/sdk-ng/releases`](https://github.com/zephyrproject-rtos/sdk-ng/releases).


    From the folder where you downloaded the SDK, you can unpack and run the installer
    by executing these commands:


    ```

    tar xvf zephyr-sdk-0.14.2_linux-x86_64.tar.gz

    cd zephyr-sdk-0.14.2

    ./setup.sh

    ```


    To avoid problems, please unpack the SDK in one of the following locations:


    *   `$HOME`


    *   `$HOME/.local`


    *   `$HOME/.local/opt`


    *   `$HOME/bin`


    *   `/opt`


    *   `/usr/local`


    By the way, you need to download the SDK for the architecture of your development
    machine. Get the x86_64 version for a workstation with an Intel or AMD processor
    and aarch64 for one with a processor using the Arm ISA.


    ### macOS


    The Zephyr team assumes you are using the Brew package manager on macOS. To install
    the dependencies, execute this command:


    ```

    brew install cmake ninja gperf python3 ccache qemu dtc wget

    ```


    The rest of the process uses the same commands as on Linux; please refer to the
    previous section. For the SDK, select the `x86_64` version for an Intel Mac and
    `aarch64` for an Apple Silicon Mac (M1 and successors).


    ### Windows


    The process on Windows follows a similar flow, but the commands are, of course,
    slightly different. The instructions provided by the Zephyr team use the [Chocolatey](https://chocolatey.org/)
    package manager. I assume here you already set it up.


    Open an elevated command prompt (prompt with Administrator rights) and execute
    the following commands:


    ```

    choco install cmake --installargs ''ADD_CMAKE_TO_PATH=System''

    choco install ninja gperf python git dtc-msys2 wget unzip

    ```


    You can close the elevated shell once you are done; you can perform the rest of
    the steps under a standard shell. To create and activate a virtual Python environment,
    execute the following commands:


    ```

