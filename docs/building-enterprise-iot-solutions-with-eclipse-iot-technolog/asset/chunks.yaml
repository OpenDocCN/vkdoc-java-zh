  raw: '### Arm: Cortex-M


    The Arm architecture is unquestionably the dominant player in the microcontroller
    space today. The reason for this lies in Arm’s strong focus on power consumption.
    The very first Arm processor, delivered in 1985, was designed to run at 1 W of
    power. The chip averaged under 100 mW typical power while delivering ten times
    the performance of Intel’s 80286 or Motorola’s 68020, which were popular processors
    at the time.^([^(39)](#fn39))


    Nowadays, Arm offers two specific design series that are a good fit for constrained
    devices: Cortex-M and Cortex-R. However, it would be best if you kept in mind
    that simply referencing the series and model is not enough to determine the full
    capabilities of a microcontroller. This is because Arm usually provides only the
    processor core intellectual property (IP), and the other capabilities will depend
    on the actual maker of the chip.


    Note


    ARM is a chip designer, not a chipmaker. It licenses its processor IP to others.
    Most of the processor core models it offers have several optional features. Therefore,
    knowing the specific Arm core in an MCU, for example, a Cortex-M4, is not enough.
    Please read specification sheets very attentively before selecting the hardware
    for your project.


    Table [8-1](#524096_1_En_8_Chapter.xhtml#Tab1) presents the Cortex-M cores and
    their high-level characteristics.


    Table 8-1


    Arm Cortex-M cores and their characteristics


    | Core | Arm Architecture | Computer Architecture | Pipeline |

    | --- | --- | --- | --- |

    | M0 | Armv6-M | Von Neumann | 3 stages |

    | M0+ | Armv6-M | Von Neumann | 2 stages |

    | M1 | Armv6-M | Von Neumann | 3 stages |

    | M3 | Armv7-M | Harvard | 3 stages |

    | M4 | Armv7E-M | Harvard | 3 stages |

    | M7 | Armv7E-M | Harvard | 6 stages |

    | M23 | Armv8-M Baseline | Von Neumann | 2 stages |

    | M33 | Armv8-M Mainline | Harvard | 3 stages |

    | M35P | Armv8-M Mainline | Harvard | 3 stages |

    | M55 | Armv8.1-M | Harvard | 4–5 stages |


    Covering in detail the myriad of options and variations available in the Cortex-M
    series would make this book thicker than it should be. I will now list the main
    features of each core.


    *   **M0:** This core is optimized for a small die size. Common in the most affordable
    MCUs.


    *   **M0+:** This core is a superset of the M0, enabling the use of the same toolchains.
    The pipeline is one stage shorter, resulting in lower power consumption. Some
    Cortex-M3 and Cortex-M4 features are available as options.


    *   **M1:** This core is optimized for integration into field-programmable gate
    arrays (FPGAs).


    *   **M3:** This core brings branch speculation to its three-stage pipeline, improving
    performance. It is used in microcontrollers and as a secondary core in larger
    chips.


    *   **M4:** This core adds DSP (digital signal processing) instructions to the
    Cortex-M3 and can be equipped with an optional floating-point unit (FPU). Cores
    that include the FPU are also known as Cortex-M4F.


    *   **M7:** This core features a six-stage superscalar pipeline with branch prediction.
    It can be equipped with a floating-point unit capable of single-precision and,
    optionally, double-precision operations. Cores that include the FPU are known
    under the Cortex-M7F designation. The M7 delivers almost twice the power efficiency
    of the M4.


    *   **M23:** This core resembles Cortex-M0+ and is optimized for a small die size.
    It adds integer divide instructions and TrustZone security features. It implements
    the newer Armv8-M architecture announced in 2015.


    *   **M33:** This core is a cross between the M4 and M23\. It also offers the
    TrustZone instructions.


    *   **M35P:** This core improves the M33 by adding configurable parity and error
    correction code (ECC) memory features. It also sports a new instruction cache
    and implements tamper-resistance concepts.


    *   **M55:** This core is based on the newer Armv8.1-M architecture. It offers
    TrustZone instructions, DSP support, Coprocessor support, ECC, and many other
    features as options. It is a more modular and configurable core than any of its
    predecessors.


    It is important to remember that Cortex-M cores do not necessarily implement all
    the instructions from the version of the Arm architecture they target. Moreover,
    the many optional features offered by Arm impact the instructions available. Generally,
    Cortex-M0, M0+, and M1 binaries will run unmodified on Cortex M3, M4, and M7 cores.
    Binaries targeting the Cortex-M3 will run as is on the M4, M7, M33, and M35P.


    The [2021 edition of the Eclipse IoT and Edge Developer Survey](https://outreach.eclipse.foundation/iot-edge-developer-2021)
    found that 35% of respondents picked MCUs based on Cortex-M3 and Cortex-M4 cores.
    Chips featuring Cortex-M7 cores were picked by 30% of respondents, and 25% used
    microcontrollers spotting M0/M0+ cores. Respondents could pick up to three choices
    for that question.'
  trans: '

    ### Arm：Cortex-M


    Arm 架构无疑是当今微控制器领域的主导者。其原因在于 Arm 对功耗的高度重视。首个 Arm 处理器于 1985 年交付，其设计目标是在 1 瓦功率下运行。该芯片平均典型功耗低于
    100 毫瓦，同时性能却是当时流行的 Intel 80286 或 Motorola 68020 处理器的十倍。^(³⁹)


    如今，Arm 提供两个非常适合受限设备的特定设计系列：Cortex-M 和 Cortex-R。然而，您需要牢记，仅提及系列和型号并不足以确定微控制器的全部能力。这是因为
    Arm 通常只提供处理器内核知识产权（IP），而其他能力则取决于实际的芯片制造商。


    注意


    ARM 是一家芯片设计公司，而非芯片制造商。它将其处理器 IP 授权给其他公司。它提供的大多数处理器内核模型都有多个可选功能。因此，仅了解 MCU 中的特定
    Arm 内核（例如 Cortex-M4）是不够的。在为项目选择硬件之前，请务必仔细阅读规格说明书。


    表 8-1 展示了 Cortex-M 内核及其高级特性。


    表 8-1


    Arm Cortex-M 内核及其特性


    | 内核 | Arm 架构 | 计算机架构 | 流水线 |

    | --- | --- | --- | --- |

    | M0 | Armv6-M | 冯·诺依曼 | 3 级 |

    | M0+ | Armv6-M | 冯·诺依曼 | 2 级 |

    | M1 | Armv6-M | 冯·诺依曼 | 3 级 |

    | M3 | Armv7-M | 哈佛 | 3 级 |

    | M4 | Armv7E-M | 哈佛 | 3 级 |

    | M7 | Armv7E-M | 哈佛 | 6 级 |

    | M23 | Armv8-M Baseline | 冯·诺依曼 | 2 级 |

    | M33 | Armv8-M Mainline | 哈佛 | 3 级 |

    | M35P | Armv8-M Mainline | 哈佛 | 3 级 |

    | M55 | Armv8.1-M | 哈佛 | 4–5 级 |


    详细涵盖 Cortex-M 系列中众多的选项和变体将使本书过于厚重。下面我将列出每个内核的主要特性。


    *   **M0：** 此内核针对小芯片尺寸进行了优化。常见于最经济实惠的 MCU 中。

    *   **M0+：** 此内核是 M0 的超集，允许使用相同的工具链。流水线缩短了一级，从而降低了功耗。某些 Cortex-M3 和 Cortex-M4
    功能可作为选项提供。

    *   **M1：** 此内核针对集成到现场可编程门阵列（FPGA）进行了优化。

    *   **M3：** 此内核为其三级流水线引入了分支推测功能，从而提高了性能。它用于微控制器以及作为更大芯片中的辅助内核。

    *   **M4：** 此内核在 Cortex-M3 的基础上增加了 DSP（数字信号处理）指令，并可配备可选的浮点运算单元（FPU）。包含 FPU 的内核也称为
    Cortex-M4F。

    *   **M7：** 此内核具有带分支预测的六级超标量流水线。它可配备能够执行单精度和可选双精度运算的浮点运算单元。包含 FPU 的内核被称为 Cortex-M7F。M7
    的能效几乎是 M4 的两倍。

    *   **M23：** 此内核类似于 Cortex-M0+，并针对小芯片尺寸进行了优化。它增加了整数除法指令和 TrustZone 安全特性。它实现了 2015
    年宣布的较新 Armv8-M 架构。

    *   **M33：** 此内核是 M4 和 M23 的融合体。它也提供 TrustZone 指令。

    *   **M35P：** 此内核通过添加可配置的奇偶校验和纠错码（ECC）内存特性来改进 M33。它还配备了新的指令缓存并实现了防篡改概念。

    *   **M55：** 此内核基于较新的 Armv8.1-M 架构。它可选地提供 TrustZone 指令、DSP 支持、协处理器支持、ECC 以及许多其他特性。它是一个比其任何前代产品都更具模块化和可配置性的内核。


    重要的是要记住，Cortex-M 内核不一定实现其目标 Arm 架构版本的所有指令。此外，Arm 提供的众多可选功能也会影响可用的指令。通常，为 Cortex-M0、M0+
    和 M1 编译的二进制文件可以在 Cortex-M3、M4 和 M7 内核上无需修改地运行。针对 Cortex-M3 的二进制文件可以在 M4、M7、M33
    和 M35P 上直接运行。


    [2021 年版 Eclipse IoT 与边缘开发者调查](https://outreach.eclipse.foundation/iot-edge-developer-2021)发现，35%
    的受访者选择了基于 Cortex-M3 和 Cortex-M4 内核的 MCU。30% 的受访者选择了采用 Cortex-M7 内核的芯片，25% 的受访者使用了配备
    M0/M0+ 内核的微控制器。该问题允许受访者最多选择三个选项。

    '
- fmt: '### AVR: The Heart of Arduino


    `Arm` is in the licensing business. Since many architecture features are optional,
    you need to carefully read the documentation for the specific MCU you are procuring
    from a specific supplier. Things are much more straightforward with Microchip’s
    `AVR` architecture since the company sells actual MCUs.


    **Note:** `AVR` has been known as `Atmel AVR` for a long time. Microchip acquired
    Atmel in 2016 and slowly discontinued the usage of the brand.


    The `AVR` microcontroller architecture was launched in 1997. By 2003, Atmel had
    already shipped 500 million units. The introduction of the popular Arduino platform
    in 2005 significantly accelerated `AVR`’s market adoption. `AVR` microcontrollers
    are modified Harvard architecture machines. Program and data are stored in different
    memory systems presented in different address spaces. However, the architecture
    offers special instructions that make it possible to read data from program memory.


    `AVR` MCUs use 8-bit RISC processor cores. The instruction set has been expanded
    over time by introducing newer models. The `AVR` series can usually be clocked
    at up to 20 MHz, although specific models can reach 32 MHz. Higher clocks result
    in higher power consumption, of course. Recent models in the `AVR` family feature
    an on-chip oscillator, removing the requirement for external clocks or resonator
    circuitry.


    From a storage perspective, `AVR` MCUs can offer up to 256 KB of internal, self-programmable
    instruction flash memory (384 KB on `XMEGA`) and an internal data `EEPROM` up
    to 4 KB. Random-access memory can reach up to 16 KB (32 KB on `XMEGA`). Specific
    models can also offer 64 KB of external little endian data space. Table [8-2](#524096_1_En_8_Chapter.xhtml#Tab2)
    provides an overview of the characteristics of the main series in the `AVR` family.


    **Table 8-2** Characteristics of the main series in the `AVR` family


    | Series | Flash Size | Clock (MHz) | SRAM | EEPROM |

    | :--- | :--- | :--- | :--- | :--- |

    | `tinyAVR` | 0.5–32 KB | 1.6–20 | 64–3072 bytes | 64–256 bytes |

    | `megaAVR` | 4–256 KB | 1.6–20 | 256–16384 bytes | 64–4096 bytes |

    | `AVR Dx` | 16–128 KB | 20–24 | 4–16 KB | 512 bytes |

    | `XMEGA` | 16–256 KB | 32 | 1–32 KB | 512–2048 bytes |


    Each of the series contains several products with different feature sets and characteristics.
    The following list highlights the differentiation factors for each series:


    - **`tinyAVR`:** The `ATtiny` series is optimized for small package sizes and
    offers only limited peripherals.

    - **`megaAVR`:** The `ATmega` series provides a wide range of I/O pins and more
    memory and storage.

    - **`AVR Dx`:** The `AVR Dx` series contains multiple subseries focused on the
    conditioning of analog signals, functional safety, and human-computer interaction.

    - **`XMEGA`:** The `ATxmega` series is the most powerful of the `AVR` family.
    The MCUs feature support for cryptography and offer analog-to-digital converters.


    The most well-known consumer of `AVR` MCUs is the popular line of Arduino boards
    from the namesake company. Most current and past Arduinos feature MCUs from the
    `ATmega` series. For example, the Arduino Uno is equipped with an `ATmega328P`,
    and the Uno WiFi Rev 2 features an `ATmega4809`. The latter can run at up to 20
    MHz and features 48 KB flash storage, 6 KB RAM, and 256 bytes of `EEPROM`.


    ### RISC-V: A Serious Challenger


    Introduced in 2010 by researchers at the University of California, Berkeley, the
    `RISC-V` architecture is an open standard. The documents for the instruction set
    architecture (ISA) are published under open source licenses, as were several core
    designs. The `RISC-V` Foundation was formed in 2015 to steward the evolution of
    the ISA; it relocated to Switzerland in 2019 to address concerns with US trade
    regulations and took the name [RISC-V International](https://riscv.org/exchanges/cores-socs/)
    as of March 2020.


    `RISC-V` International permits unrestricted use of the ISA in hardware and software.
    This posture resulted in significant adoption. As of March 2022, [111 different
    cores](https://riscv.org/exchanges/cores-socs/), 31 SOC platforms, and 12 SOCs
    were listed on the organization’s website. The actual market footprint of `RISC-V`
    is probably much higher since organizations will not necessarily publicize their
    use of the technology. It is worth mentioning that only members of `RISC-V` International
    have voting rights to approve changes and can use the trademarked compatibility
    logo.


    One important characteristic of the `RISC-V` ISA is its modularity. The base integer
    instruction set is available in 32-bit and 64-bit formats (`RV32I` and `RV64I`).
    There are drafts for a 32-bit embedded (16 registers, `RV32E`) and even a 128-bit
    version (`RV128I`). All other types of instructions are documented in ISA standard
    extensions. Those extensions typically have a single letter for their name, although
    most recent ones have a name starting with `Z` followed by an alphabetical name.
    Widely used examples of standard extensions are integer multiplication and division
    (`M`), atomic instructions (`A`), single-precision floating point (`F`), double-precision
    floating point (`D`), and control and status register (`Zicsr`). Standard extensions
    are designed to work with all the standard base instruction sets and do not conflict
    with each other. Designers of `RISC-V` cores can also create their own nonstandard
    extensions to the instruction set. Industry collaboration initiatives regarding
    user-defined extensions have also started to emerge. A good example is the [OpenHW
    CORE-V eXtension I/​F](https://docs.openhwgroup.org/projects/openhw-group-core-v-xif/en/core-v-xif_v0.2.0/intro.html),
    which aims to simplify the implementation of custom instructions and custom accelerators
    attached to or built into `RISC-V` cores. The `RISC-V` specification states that
    such extensions must have a name starting with “`X`” for user-level instructions
    and “`SX`” for supervisor-level ones.


    Given this, surveying the whole `RISC-V` landscape would be difficult. This is
    because implementers can design their chips from scratch, adopt one of the many
    open source cores available, or even license open source or commercial cores and
    add proprietary features. On the one hand, this makes the ecosystem diversified,
    with cores, MCUs, and SOCs available for integration in constrained devices, gateways,
    edge nodes, and, increasingly, desktop-class and server-class hardware. On the
    other hand, this makes it harder to provide a high-level picture of the market,
    given the products'' lack of common reference points. Nevertheless, there is a
    thriving ecosystem of `RISC-V`-based MCUs, and they are undoubtedly worth your
    consideration.


    In 2021, the [Eclipse IoT and Edge Developer Survey](https://outreach.eclipse.foundation/iot-edge-developer-2021)
    found that 9% of respondents used MCUs based on `RISC-V` technology. Even established
    players in the `Arm` market, such as Espressif, are announcing new products based
    on `RISC-V`.^([^(40)](#fn40))'
