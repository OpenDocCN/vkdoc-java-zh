  trans: "\n# 11. 边缘计算\n\n> *L'extrême limite de la sagesse, voilà ce que le public\
    \ baptise folie.*\n\n> *智慧的极致边缘，正是公众所命名的疯狂。*\n> \n> ——让·科克托，《无礼》\n\n物联网中的“I”代表*互联网*。在此语境下，互联网即*网络*。正如我之前所写，对连接性的关注使物联网设备有别于嵌入式设备。物联网设备需要传输传感器收集的数据，并通过执行器作用于物理世界。它们需要网络来实现这一点。但数据去向何处？命令又来自何方？互联网？当然不是。试想一下，当你驾车出行时，你的目的地并非道路本身，而是通过道路可抵达的某个地点。当你将数据发送至互联网时，其目的地并非互联网，而是云端。\n\
    \n此处我提及的云端，涵盖其所有变体：公有云、混合云和私有云。三者均提供按需计算、存储和网络资源，以及软件服务。其区别在于规模和位置。公有云托管于第三方提供商拥有的数据中心；其资源和服务由多个客户共享。大多数公有云实例提供的规模，只有最大的组织才能企及。在规模的另一端，私有云托管于你自己的设施中。它与传统基础设施的区别在于，资源以类似云的方式（“云化”？）提供。自然，大多数私有云实例的规模远小于典型的公有云实例。至于混合云，它只是两种方式的混合，工作负载可在私有与公共基础设施之间迁移。\n\
    \n注意\n\n尽管公有云提供丰富的资源，但这些资源并非无限。我过去曾任职的一家公司，其合作伙伴曾耗尽市场领先的公有云提供商在特定区域内提供的某种虚拟机类型的所有实例。我们谈论的是数万台虚拟机。如果他们读到此处，我确信他们能认出自己。\n\
    \n此时，你可能会问自己，这与边缘计算有何关联。你看，在边缘部署资源和服务意味着你在云端和企业数据中心的边界之外运营。事实上，从运营角度来看，边缘与云端是对立面。但在详细阐述之前，明智的做法是先定义我所说的边缘计算。\n\
    \n## 什么是边缘计算？\n\n从最简形式而言，边缘计算是一种分布式计算形式，它将计算、存储和网络资源更靠近数据产生和命令执行的物理位置。然而，仅仅遵循这样的架构还不够。你还需要构建和部署*边缘原生*应用程序。此类应用程序与云原生应用程序有几个共同特征：\n\
    \n*   它们依赖微服务。\n*   它们暴露 API，通常采用 RESTful 方式。\n*   它们由松散耦合的服务组成，以避免产生亲和性并增强应用程序的弹性。\n\
    *   它们由采用 DevOps 方法的团队构建，重点关注持续集成和持续部署（CI/CD）。\n\n然而，边缘原生应用程序在几个方面与云原生应用程序有所不同。让我们看看边缘和云环境有何不同，以理解其差异。\n\
    \n### 边缘 vs. 云端\n\n从本质上讲，云端是一种依赖大规模交付的按需模型的环境。特别是公有云，提供了数量惊人的计算、存储和网络资源。这些资源是同质的，并对应预定义的类型。例如，特定虚拟机类型的所有实例将提供相同的基本能力，有时可通过配置进行扩展。虽然资源在许多情况下可以地理分布，但它们始终以集中方式进行管理。\n\
    \n边缘环境则相反。边缘节点无处不在。换句话说，边缘是分布式计算与现实世界交汇的地方（实际上是任何地方）。尽管边缘节点通常大量部署，但任何给定位置可用的计算、存储和网络资源都是有限的。可以说，边缘计算是在大规模范围内部署本地有限的资源。鉴于需要面对的操作约束，边缘节点通常是异构的。有些必须针对特定的环境威胁进行加固，例如进水、温度、电磁干扰或振动。另一些则配备支持特定工作负载的专用硬件，例如人工智能（AI）加速器。当然，大多数边缘节点需要控制功耗，因为它们依靠电池供电，或者需要控制散热。后者通常很重要，因为无源冷却设计通常更可靠，但需要功耗更低的组件。\n"
- fmt: '### The Edge-to-Cloud Continuum


    If edge nodes are anywhere and everywhere, where is the edge itself, then? If
    you search for an answer to this question on the Internet, you will find several
    different ones. Table [11-1](#524096_1_En_11_Chapter.xhtml#Tab1) lists a few of
    those answers. For each, I list the typical latency and distance between the source
    of the data and the node that will process it.


    **Table 11-1** Commonly referenced types of edge


    | Edge Type | Latency | Distance |

    | --- | --- | --- |

    | Micro Edge | Below 1 ms | A few cm to 15 m |

    | Deep Edge | Between 2 and 5 ms | Below 1 km |

    | Meta Edge | Below 10 ms | Below 50 km |

    | Fog | 10–20 ms | Beyond 50 km |

    | Multi-access Edge Computing (ETSI) | 10–20 ms | 100 km |

    | Far Edge | 20–50 ms | 500 km |


    Now, you will probably ask yourself which one of those is the *real* edge. To
    paraphrase a famous Jedi, they are *all* real, from a certain point of view. Their
    main shortcoming is that they are all tied to a certain way of implementing edge
    computing. Thus, the Edge Native working group at the Eclipse Foundation adopted
    a different worldview. To them and me, edge devices are deployed along the edge-to-cloud
    continuum. This is also true of the applications they run.


    Edge Native applications are distributed by nature. They usually encompass three
    distinct planes. Those planes are as follows:


    - **Data plane:** Includes network, compute, and storage resources for managing
    data according to the commands received from the control plane.

    - **Control plane:** Decides how the data plane processes and acts on data as
    it is received.

    - **Management plane:** Configures each resource. It also monitors and maintains
    their state.


    Please note that these definitions are not inventions on my part but are taken
    from [RFC 7426](https://tools.ietf.org/html/rfc7426), which is focused on the
    terminology of Software-Defined Networking (SDN).


    The components of Edge Native applications are deployed all over the edge-to-cloud
    continuum independently of the plane they belong to. Figure [11-1](#524096_1_En_11_Chapter.xhtml#Fig1)
    illustrates this reality.


    ![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig1_HTML.jpg)


    *An illustration depicts the computer resources, servers and storage, and physical
    locations from edge to cloud. The physical locations include field deployed, access-transport,
    regional, and global.*


    **Figure 11-1** The Edge-to-Cloud continuum (Credit: Eclipse Foundation)


    The figure highlights the first difference between Edge Native and Cloud Native
    applications: their relationship to physical locations. For Cloud applications,
    the exact physical location of the resources is irrelevant. Of course, concepts
    like availability zones refer to geography in a coarse-grained fashion. However,
    as a Cloud developer, if your goal is to deploy your code in the eastern part
    of Canada, you will not care if the servers are in Montréal, Québec City, or Chicoutimi.
    On the other hand, Edge Native applications are all about location. You deploy
    edge nodes to aggregate the data from *this* building, *this* factory, or *this*
    city. One could say that if you care about the precise location of a compute or
    storage resource, you are doing edge computing.


    ### What Makes the Edge Different?


    In Chapter [1](#524096_1_En_1_Chapter.xhtml), I listed a few reasons to motivate
    you to leverage edge computing in your projects. Those reasons were as follows:


    - Optimizing bandwidth usage

    - Reducing latency

    - Supporting data sovereignty

    - Implementing reporting by exception


    I will not revisit them in detail here. Suffice to say that they apply to most
    enterprise IoT deployments, especially those that have mission-critical and real-time
    requirements to fulfill. Optimizing bandwidth usage is key since it is both expensive
    and scarce.


    There are a few additional factors to consider when comparing edge computing projects
    to IT ones.


    - **Lifespan:** Like constrained devices, edge nodes are often deployed in hard-to-reach
    locations. This applies whether they are under your direct control or belong to
    a service provider. Consequently, durability is an important consideration, as
    is the long-term availability of the underlying hardware components.

    - **Heterogeneity:** Edge nodes are often expected to host specialized workloads
    that benefit from or even require specific hardware. Artificial intelligence,
    for example, greatly benefits from accelerators that reduce processing times and
    power usage. Control logic and sensor fusion involve field buses not found in
    run-of-the-mill IT equipment such as `Modbus` and `Canbus`. This means that the
    hardware configurations of edge nodes can vary a lot according to their role in
    the infrastructure. Consequently, you will need to consider a wide variety of
    processor architectures, peripherals, and networking technologies.

    - **Physical constraints:** Any device you deploy in the field must face temperature,
    humidity, vibrations, dust, and many other threats. Naturally, this will influence
    the performance and durability of the hardware. For example, excessive temperatures
    could induce thermal throttling in the processor or other components. The software
    also needs to adapt to such adverse conditions. Sensor readings, for example,
    could need to be corrected according to current environmental factors.

    - **Connectivity:** Edge computing, as a form of distributed computing, is completely
    at the mercy of the network. You must assume the network will degrade or fail
    at any time and architecture your services accordingly. Tolerance to unreliable
    networks is a key feature of quality edge computing implementations. This is not
    a given and will require careful design and deployment of the infrastructure and
    software components. However, the best edge computing platforms in the market
    will make things a bit easier.


    > **Note:** My younger brother works for a large supplier of networking infrastructure
    whose name rhymes with Crisco. He hates it when I say we should not trust the
    network. However, it is a fact that the only time you notice the network is when
    it fails.'
