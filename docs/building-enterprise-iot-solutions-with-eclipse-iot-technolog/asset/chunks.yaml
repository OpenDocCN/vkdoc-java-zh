    \ protocol payload agnostic. Specifically, `PUBLISH` packets contain a payload\
    \ in byte format. The publisher can transmit anything as a payload; plain text\
    \ or binary encodings are fine. Consequently, you can use XML, JSON, or any format\
    \ of your choosing to represent the data. Version 5.0 of MQTT added properties\
    \ to named `Payload Format` and `Content Type`. `Payload Format` is a byte value.\
    \ When set to 0, it indicates an “unspecified byte stream”; when set to 1, it\
    \ means a “UTF-8 encoded payload*.*” If the payload indicator is missing, the\
    \ broker will assume it is set to 0 to guarantee backward compatibility with prior\
    \ protocol versions. As for `Content Type`, it is a UTF-8 (Unicode) encoded string.\
    \ Applications usually expect a MIME content type, but you can also use arbitrary\
    \ values."
  trans: "\n# 4. MQTT\n\n> *当你不去观察事物时，无人知晓它们的确切状态。*\n\n> *No one knows how things\
    \ exactly are when you don’t look at them.*\n> \n> —休伯特·里夫斯，《苍穹之耐心》\n\n要理解 MQTT\
    \ 的重要性，你需要先了解物联网与嵌入式计算之间的区别。微控制器和通用微处理器在大型机械或电子系统中已应用多年；20 世纪 60 年代用于征服月球的阿波罗导航计算机便是这一概念的早期范例。如今，嵌入式系统为各种设备提供动力，从个人小型设备到工业机器人和装配线等大型机器。它们也是复杂机器特定子系统的核心，例如你汽车上的防抱死制动系统。\n\
    \n工厂、水处理设施和电网中的嵌入式系统几乎总是网络的一部分。自 20 世纪 70 年代中期以来，随着*监控与数据采集*（SCADA）解决方案的出现，情况一直如此。那么，是什么让嵌入式系统与物联网解决方案有所不同呢？在第\
    \ 1 章中，我写道物联网设备*“*包含嵌入式硬件和软件*”*。因此，物联网显然是嵌入式技术的一种特定应用。然而，嵌入式系统通常是为特定应用量身定制的，其软件在制造商发货后不会频繁更新。另一方面，物联网设备受益于永久网络连接，并经常通过软件更新获得新功能。归根结底，*互联网*连接，而不仅仅是网络连接，才是物联网区别于早期嵌入式计算努力的关键。\n\
    \n在接下来的两章中，我将介绍两项处于从传统嵌入式系统向物联网转型前沿的技术。第一个是 [MQTT](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dmqtt)，它诞生于\
    \ 20 世纪末，现已成为物联网应用的主要协议。第二个是 [Sparkplug](https://sparkplug.eclipse.org)，它为 MQTT\
    \ 用户开辟了新的可能性。两者在使工业流程更易于观察方面发挥了重要作用。换句话说，它们加速了工业从模拟技术向数字技术的转型。\n\n## 什么是 MQTT？\n\
    \nMQTT 是一项 [OASIS Open](https://www.oasis-open.org/committees/download.php/49028/OASIS_MQTT_TC_minutes_25042013.pdf)\
    \ 标准和 ISO 建议（ISO/IEC 20922）。在撰写本文时，最新版本是 2019 年 3 月发布的 [5.​0 版](https://docs.oasis-open.org/mqtt/mqtt/v5.0/mqtt-v5.0.html)。除非特别说明，本章均指规范版本\
    \ 3.1.1。\n\n注意\n\nMQTT 最初代表 *“*MQ 遥测传输”。名称中的“MQ”指的是曾启发 MQTT 的 IBM 消息队列产品。OASIS\
    \ Open 的 MQTT 技术委员会于 2013 年决定将 MQTT 作为该技术的名称，并且 [MQTT 不应代表任何含义](https://www.oasis-open.org/committees/download.php/49028/OASIS_MQTT_TC_minutes_25042013.pdf)。^(¹²)\n\
    \nMQTT 协议由 Andy Stanford-Clark 和 Arlen Nipper 于 1999 年发明。他们需要通过卫星连接监控石油管道，而现有协议无法胜任此任务，因为它们需要持续轮询传感器。因此，他们决定创建一种新协议，以最大限度地延长部署在现场的受限设备的电池寿命，同时消耗尽可能少的带宽。\n\
    \nMQTT 在集中式架构中利用发布/订阅交互模型。消息发布者和订阅者是*客户端*。这些客户端连接到一个或多个*代理*，接收发布的消息并将其路由到适当的客户端。因此，一个客户端可以是发布者、订阅者，或两者兼是。在\
    \ MQTT 中，发布者和订阅者完全解耦。这意味着多个客户端可以接收特定消息，并向同一目的地发布消息。通常，发布者不知道是否有任何订阅者会接收他们的消息。\n\
    \n## 消息\n\nMQTT 消息（在规范中也称为*数据包*）具有简单的结构。\n\n1.  **固定报头：** 存在于所有消息中，固定报头长度为 1 字节。前四位（位\
    \ 7 到 4）表示*数据包类型*的无符号值。这些数据包类型包括 `PUBLISH`、`SUBSCRIBE` 和 `CONNECT` 等。其余位（位 3 到\
    \ 0）包含特定于每种数据包类型的*标志*。截至 MQTT 5.0，规范作者保留了大多数标志供将来使用，但 `PUBLISH` 数据包类型除外。\n\n2.\
    \  **可变报头：** 仅存在于某些消息中。可变报头可以包含一个*数据包标识符*和一组*属性*。这组属性包含一个长度指示符（可变字节整数）和任意数量的属性。每个属性由一个标识符（可变字节整数）和一个值组成。值的类型取决于所设置的特定属性，并且属性可以按任意顺序设置。\n\
    \n3.  **有效载荷：** 仅存在于某些消息中。某些消息，例如 ping（`PINGREQ`、`PINGRESP`）和各种类型的确认，没有有效载荷。\n\
    \n[MQTT 规范的第 2 节](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901019)详细描述了数据包类型标志和可变报头的值。\n\
    \n注意\n\n可变字节整数是对 64 位无符号整数的编码，使用 1 到 9 个字节。其优点在于对于小数值占用空间更少。\n\nMQTT 中的一个关键设计决策是使协议有效载荷与格式无关。具体来说，`PUBLISH`\
    \ 数据包包含一个字节格式的有效载荷。发布者可以传输任何内容作为有效载荷；纯文本或二进制编码均可。因此，你可以使用 XML、JSON 或你选择的任何格式来表示数据。MQTT\
    \ 5.0 版添加了名为 `Payload Format` 和 `Content Type` 的属性。`Payload Format` 是一个字节值。当设置为\
    \ 0 时，表示“未指定的字节流”；当设置为 1 时，表示“UTF-8 编码的有效载荷*”*。如果缺少有效载荷指示符，代理将假定其设置为 0，以保证与先前协议版本的向后兼容性。至于\
    \ `Content Type`，它是一个 UTF-8（Unicode）编码的字符串。应用程序通常期望使用 MIME 内容类型，但你也可以使用任意值。\n"
- fmt: '# Topics and Topic Filters


    Since MQTT publishers and subscribers are decoupled from one another, the broker
    needs a way to determine which messages should be made available to each client.
    To that effect, the broker organizes messages in a hierarchy of *topics*. In MQTT,
    a topic is simply a UTF-8 string the broker will use to determine which subscribers
    will get a copy of a specific message. When a client publishes a message, it must
    specify a topic. On the other hand, subscribers indicate their interest in topics
    through *topic filters*.


    MQTT clients do not need to create topics before publishing or subscribing to
    one. The broker will accept any valid topic name without preparation or initialization.
    The maximum length supported for topic names is the maximum size for UTF-8 strings:
    65,535 bytes. However, I strongly recommend restraint and keeping your topic names
    short, as longer names will impact performance and resource utilization.


    To establish a topic hierarchy, all you need to do is to use a forward slash (`/`
    `U+002F`) to separate the levels in the hierarchy. Here are a few examples of
    valid topic names:


    ```

    Louvre/1/101/temperature

    Sites/USA/California/SanFrancisco/SiliconValley/

    e31a57ef-936b-46b8-ac89-3f39c8489f5f/status

    vehicles/trucks/647/speed

    ```


    Topic filters can contain wildcard characters. The specification defines two of
    them. `+` is a single-level wildcard, while `#` is a multilevel wildcard that
    can only be used at the end of a filter. The best way to understand the difference
    is through an example. Suppose clients publish sensor readings to the following
    topics:


    ```

    Louvre/1/101/temperature

    Louvre/1/101/humidity

    Louvre/1/102/temperature

    Louvre/1/102/humidity

    Louvre/2/201/temperature

    Louvre/2/201/humidity

    ```


    The first number in the topic names represents the floor, and the second is the
    room number. Suppose a subscriber uses the following topic filter:


    ```

    Louvre/1/+/temperature

    ```


    Then, it will receive the data for the following topics:


    ```

    Louvre/1/101/temperature

    Louvre/1/102/temperature

    ```


    It will not get the messages for the second-floor rooms or the humidity sensors.
    On the other hand, if the filter was like the following:


    ```

    Louvre/2/#

    ```


    then the subscriber would get the messages sent to these topics:


    ```

    Louvre/2/201/temperature

    Louvre/2/201/humidity

    ```


    The subscriber would not receive any messages sent under `Louvre/1/` in that case.


    The MQTT specification defines rules applying to topic names and topic filters:


    * They must be at least one character long.

    * They are case sensitive.

    * They can include the space character.

    * They must not contain the null character (Unicode `U+0000`).


    Additionally, topic names must not contain the topic filter wildcard characters
    (`#` and `+`).


    Topic names are completely arbitrary. Here are a few recommendations you should
    follow when picking names for your topics or subscribing:


    * **Avoid nonprintable characters:** UTF-8 contains many nonprintable characters,
    including tabs, spaces, and line breaks. Avoid them since you will not be able
    to tell them apart. Just because the specification states you can use spaces does
    not mean it is a good idea.


    * **Do not subscribe to `#`:** Using just `#` as your topic filter means that
    the client subscribes to all messages published to a broker. This could overwhelm
    the client or require significant computing resources in production environments.
    I strongly recommend pursuing alternative strategies. For example, suppose you
    need to log every message sent in a historian database. In that case, you could
    use a broker offering such a feature `–` which is not part of MQTT itself `–`
    or leverage Eclipse Hono and Apache Kafka to deploy a proper stream event processing
    solution.


    * **Build a sensible and extensible topic hierarchy:** The goal of topic hierarchies
    is to provide context relevant to messages. Consequently, your topics should be
    as specific as possible. Subscribers should not have to parse the payload to figure
    out the context of a message. Moreover, your topic hierarchy should accommodate
    future evolutions. If you add sensors to a machine or simply wish to report about
    new events, you should be able to extend your existing topic hierarchy to accommodate
    those new messages.


    * **Identifiers are useful in topic names:** Using a unique identifier for a device
    inside your topic hierarchy makes it easier to implement authorization through
    access control lists. Most brokers implement various authorization mechanisms,
    although those are not defined in the MQTT specification.


    * **Be careful with the topic separator (forward slash):** In a topic name, do
    not use a forward slash as the leading or trailing character. Section 4.7.3 of
    the MQTT specification v5.0 states that "A leading or trailing ''/'' creates a
    distinct Topic Name or Topic Filter" and that "A Topic Name or Topic Filter consisting
    only of the ''/'' character is valid." This means that `sensors/humidity`, `/sensors/humidity`,
    `sensors/humidity/`, and `/sensors/humidity/` are all seen as distinct topics
    by the broker. Avoid the potential confusion and keep things simple. Moreover,
    using a leading slash introduces a useless zero-character level as the first level
    of the topic hierarchy. This is not LwM2M, dear readers!


    **Note**


    Many brokers expose server-specific information or control APIs under the `$SYS/`
    prefix, although the MQTT specification does not mandate this. Topics for which
    the name starts with `$` will not match subscriptions starting with a wildcard
    character (`#` or `+`).'
  raw: '## Topics and Topic Filters


    Since MQTT publishers and subscribers are decoupled from one another, the broker
    needs a way to determine which messages should be made available to each client.
    To that effect, the broker organizes messages in a hierarchy of *topics*. In MQTT,
