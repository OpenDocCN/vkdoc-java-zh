- fmt: '#### Testing Your Setup


    Since I used the `-DBUILD_EXAMPLES=ON` switch when configuring the build, I now
    have access to the binaries of the Cyclone DDS samples in the `bin` subdirectory.
    In other words, if the build directory was `/home/fdesbiens/cyclonedds/build`,
    then the binaries for the samples are in `/home/fdesbiens/cyclonedds/build/bin`
    after the build.


    The `roundtrip` [sample application](https://github.com/eclipse-cyclonedds/cyclonedds/tree/master/examples/roundtrip)
    allows you to measure the performance of your environment by sending and receiving
    a single message. The application is made of two executables: `RoundtripPong`
    and `RoundtripPing`. To run the sample, open a command line and start the `Pong`
    component:


    ```

    ./RoundtripPong

    ```


    You should see this output:


    ```

    Waiting for samples from ping to send back...

    ```


    Open a second command line and start the `Ping` component:


    ```

    ./RoundtripPing 0 0 0

    ```


    This will start the sample in a mode where samples with an empty payload will
    be sent indefinitely. The first number controls the payload size, the second specifies
    the number of samples sent, and the third defines a timeout in seconds. Executing
    `Ping` will result in output resembling this:


    ```

    # payloadSize: 0 | numSamples: 0 | timeOut: 0

    # Waiting for startup jitter to stabilise

    # Warm up complete.

    # Latency measurements (in us)

    ...

    ```


    You should see information about the latency, write access time, and read access
    time displayed after a few seconds.


    **Note:** For a more precise assessment of the performance of your DDS environment,
    you could use the `ddsperf` tool built by the Cyclone DDS team. The project repository
    contains a series of scripts the project team uses to benchmark the library.


    ### The Hello World! Sample


    With the libraries compiled and installed, you are now ready to work on your applications.
    To explain the basics of writing a publisher and subscriber in C using Cyclone
    DDS, I will now explore with you the code of the ["Hello World!" Cyclone DDS sample
    application](https://github.com/eclipse-cyclonedds/cyclonedds/tree/master/examples/helloworld).
    The [Cyclone DDS website](https://cyclonedds.io/docs/cyclonedds/latest/GettingStartedGuide/helloworld.html)^([^(19)](#fn19))
    explains how to build the "Hello World!" example in detail.


    The "Hello World" application comprises a subscriber and a publisher. The publisher
    sends a single sample on a topic, which is then picked by the running subscribers,
    if any.


    #### Data Model


    The topic type used in "Hello World!" is named `Msg`. It is defined in the [HelloWorldData.​idl](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/helloworld/HelloWorldData.idl)
    file, reproduced in Listing [6-2](#524096_1_En_6_Chapter.xhtml#PC18).


    ```

    module HelloWorldData

    {

    @topic struct Msg

    {

    @key long userID;

    string message;

    };

    };

    Listing 6-2

    HelloWorldData.idl

    ```


    The module declaration at the top is akin to a scope or namespace. The numerical
    `userID` defined as one of the two properties is declared as the key for type
    `Msg`.


    During the compilation process, the IDL will be translated into a C `struct` that
    looks like this:


    ```

    typedef struct HelloWorldData_Msg

    {

    int32_t userID;

    char * message;

    } HelloWorldData_Msg;

    ```


    #### Publishing


    The "Hello World!" subscriber code is contained in [subscriber.​c](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/helloworld/subscriber.c).
    The file contains a single main method. Variable declarations can be found at
    the top. Here are the main ones:


    ```

    dds_entity_t participant;

    dds_entity_t topic;

    dds_entity_t reader;

    HelloWorldData_Msg *msg;

    void *samples[MAX_SAMPLES];

    dds_sample_info_t infos[MAX_SAMPLES];

    dds_return_t rc;

    dds_qos_t *qos;

    ```


    The first three variables of type `dds_entity_t` are needed to create a `DataReader`.
    The next three are buffers to hold the message, the message''s sample, and the
    `sample_info`. `MAX_SAMPLES` is a constant, and its value is 1. Finally, `dds_return_t`
    is the return value for the read operation, while `dds_qos_t` specifies the QoS.


    To create a data reader, you need a domain participant, a topic, and defined QoS
    properties. The following is the code used to achieve this, with error handling
    removed:


    ```

    participant = dds_create_participant (DDS_DOMAIN_DEFAULT, NULL, NULL);

    topic = dds_create_topic (

    participant, &HelloWorldData_Msg_desc, "HelloWorldData_Msg", NULL, NULL);

    qos = dds_create_qos ();

    dds_qset_reliability (qos, DDS_RELIABILITY_RELIABLE, DDS_SECS (10));

    reader = dds_create_reader (participant, topic, qos, NULL);

    ```


    The main parameter needed to create the topic is the name of the DDS type (`HelloWorldData_Msg`).
    As for the QoS, it is set for `RELIABLE` delivery and a maximum blocking time
    of ten seconds. If no timeout is desired, it is possible to use `DDS_INFINITY`
    as the value.


    We now have a `DataReader`. Time to read published values, if any, by calling
    `dds_read`.


    ```

    rc = dds_read (reader, samples, infos, MAX_SAMPLES, MAX_SAMPLES);

    ```


    The read is performed in a `while(true)` loop, but the `break` instruction in
    the following code ensures execution will continue when a message is read. The
    program prints the `userID` and message from the first sample received.


    ```

    if ((rc > 0) && (infos[0].valid_data))

    {

    /* Print Message. */

    msg = (HelloWorldData_Msg*) samples[0];

    printf ("=== [Subscriber] Received : ");

    printf ("Message (%"PRId32", %s)\n", msg->userID, msg->message);

    fflush (stdout);

    break;

    }

    else

    {

    /* Polling sleep. */

    dds_sleepfor (DDS_MSECS (20));

    }

    ```


    I highlighted how important it is to release resources that are no longer needed
    when working in DDS. Hoarding `DataReaders` that should be disposed of leaks local
    and remote memory. In this case, the application starts by calling `HelloWorldData_Msg_free`.
    This is a generated function tailored to the DDS type used. Then, the application
    calls `dds_delete` on the domain participant. Doing this deletes recursively everything
    it contains. In this case, this means the topic instance and `DataReader` we just
    created.


    ```

    HelloWorldData_Msg_free (samples[0], DDS_FREE_ALL);

    rc = dds_delete (participant);

    ```


    One important thing to note about the "Hello World!" sample application is that
    it relies on a polling approach. It calls `dds_read` in a loop and will sleep
    for 20 milliseconds if no messages samples are available (`dds_sleepfor`). On
    the other hand, the `roundtrip` sample takes a different approach and leverages
    listeners and waitsets. You can see this in action in the code for [RoundtripPong](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/roundtrip/pong.c).'
