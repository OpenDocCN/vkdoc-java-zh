    messages conveying commands upstream to devices. Optionally, devices can return
    a response. A Command Router component transmits messages to the protocol adapters
    to which the target devices are connected.


    Hono is inherently a multitenant platform. In other words, a single instance of
    the platform can manage devices belonging to multiple organizations simultaneously.
    Because of this, in addition to encrypted communications, Hono provides a cohesive
    security model where devices are authenticated and authorized through a device
    registry.


    Hono’s device registry exposes APIs to manage tenants, device registration, and
    credentials. By default, devices cannot connect to any protocol adapter. You must
    provision tenants and devices into the system before they can connect. In the
    case of devices, provisioning can be automated if authentication is performed
    through X.509 client certificates or if the devices connect to Hono through a
    gateway. There are two distinct implementations of the registry, each using a
    different database engine for persistence. One uses the MongoDB NoSQL database.
    The other can use any database for which a JDBC driver is available, with H2 and
    PostgreSQL being the options officially supported by the project team. Please
    note that for the time being, the JDBC-based registry does not support searching
    for devices.


    Since it is designed to support highly scalable Cloud services, Hono can enforce
    limits for resource consumption per tenant for each protocol adapter you deploy.
    You can define limits for the number of connections, the duration of connections,
    and the volume of data published over a defined time interval. It is also possible
    to define a maximum number of devices registered per tenant and a maximum number
    of credentials per device.


    Figure [13-1](#524096_1_En_13_Chapter.xhtml#Fig1) shows how Hono’s components
    fit in its architecture. For illustration purposes, the instance shown has the
    HTTP and MQTT protocol adapters running.


    ![](images/524096_1_En_13_Chapter/524096_1_En_13_Fig1_HTML.jpg)


    An Eclipse Hono architecture includes an H T T P adapter, M Q T T adapter, device
    registry, authentication server, command router, messaging infrastructure, and
    a business application.


    Figure 13-1


    Eclipse Hono architecture (Credit: Eclipse Foundation)


    One important precision about Hono is that it can work with two different types
    of messaging infrastructure. The first option is AMQP 1.0, using [Apache Qpid
    Dispatch Router](https://qpid.apache.org/components/dispatch-router/index.html)
    and Apache ActiveMQ Artemis. The example deployment currently uses a single Qpid
    Dispatch Router instance connected to a single Apache ActiveMQ Artemis broker.
    The second one is [Apache Kafka](https://kafka.apache.org/). The example deployment
    currently leveraged [Bitnami’s Kafka Helm chart](https://bitnami.com/stack/kafka/helm)
    for installing a single-node Apache Kafka broker instance. Both setups are suitable
    for development purposes only. Scaling one of those options for production workloads
    is not something Hono can do for you.'
  trans: '

    ### Eclipse Hono


    Eclipse Hono 是一个纯设备连接平台，能够同时支持数百万台设备。该项目于 2016 年由博世旗下专注于物联网技术的子公司 Bosch.IO 贡献给
    Eclipse 基金会。Hono 采用 Eclipse 公共许可证 2.0 版发布。该平台使用 Java 编写，需要 Java 17 或更高版本才能编译和运行。


    Hono 的官方网络资源如下：


    *   **网站：** [`https://eclipse.org/hono`](https://eclipse.org/hono)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/project/iot.hono`](https://projects.eclipse.org/project/iot.hono)


    *   **代码仓库：** [`https://github.com/eclipse/hono`](https://github.com/eclipse/hono)


    Hono 的架构基于微服务。该平台定义了一种特殊类型的微服务，称为*协议适配器*，它将特定的物联网协议映射到 Hono 的 API。Hono 内置了针对 AMQP
    1.0、CoAP、HTTP 和 MQTT 的协议适配器。您也可以实现自己的适配器。用 Hono 的术语来说，平台中有两种类型的 API：*北向* API 将
    Hono 暴露给业务应用程序，而协议适配器则使用*南向* API。在 Hono 中，所有交互都通过一个中央消息系统交换的消息进行。大多数消息从设备流向业务应用程序；这些消息被称为*下游*消息。相反，由业务应用程序发送给设备的消息被称为*上游*消息。


    Hono 定义了三种不同的消息传递 API：


    *   **遥测：** 通过遥测 API 发送的消息通常是传感器读数。它们发送频率很高。


    *   **事件：** 事件 API 保留给频率较低、但更重要的消息。如果业务应用程序离线，Hono 可以持久化事件消息，并在稍后将其投递。


    *   **命令与控制：** 此 API 由北向应用程序用于向上游向设备发送包含命令的消息。设备可以选择性地返回响应。命令路由器组件将消息传输到目标设备所连接的协议适配器。


    Hono 本质上是一个多租户平台。换句话说，平台的单个实例可以同时管理属于多个组织的设备。因此，除了加密通信之外，Hono 还提供了一个内聚的安全模型，通过设备注册表对设备进行身份验证和授权。


    Hono 的设备注册表公开了用于管理租户、设备注册和凭据的 API。默认情况下，设备无法连接到任何协议适配器。您必须先向系统中配置租户和设备，然后它们才能连接。对于设备而言，如果通过
    X.509 客户端证书进行身份验证，或者设备通过网关连接到 Hono，则配置可以自动化。注册表有两种不同的实现，每种都使用不同的数据库引擎进行持久化。一种使用
    MongoDB NoSQL 数据库。另一种可以使用任何具有 JDBC 驱动程序的数据库，项目团队官方支持的选项是 H2 和 PostgreSQL。请注意，目前基于
    JDBC 的注册表不支持搜索设备。


    由于 Hono 旨在支持高度可扩展的云服务，因此它可以为您部署的每个协议适配器强制执行每个租户的资源消耗限制。您可以定义连接数量、连接持续时间以及在定义的时间间隔内发布的数据量的限制。还可以定义每个租户注册的最大设备数量和每个设备的最大凭据数量。


    图 13-1 展示了 Hono 的组件如何在其架构中组合。为了便于说明，所示的实例运行了 HTTP 和 MQTT 协议适配器。


    ![](img/524096_1_En_13_Fig1_HTML.jpg)


    一个 Eclipse Hono 架构包括 HTTP 适配器、MQTT 适配器、设备注册表、认证服务器、命令路由器、消息传递基础设施以及一个业务应用程序。


    图 13-1


    Eclipse Hono 架构（图片来源：Eclipse 基金会）


    关于 Hono 的一个重要细节是，它可以与两种不同类型的消息传递基础设施配合使用。第一种选择是 AMQP 1.0，使用 [Apache Qpid Dispatch
    Router](https://qpid.apache.org/components/dispatch-router/index.html) 和 Apache
    ActiveMQ Artemis。示例部署目前使用一个连接到单个 Apache ActiveMQ Artemis 代理的 Qpid Dispatch Router
    实例。第二种是 [Apache Kafka](https://kafka.apache.org/)。示例部署目前利用 [Bitnami 的 Kafka Helm
    chart](https://bitnami.com/stack/kafka/helm) 来安装单节点 Apache Kafka 代理实例。两种设置仅适用于开发目的。Hono
    无法为您完成将这些选项之一扩展到生产工作负载的任务。

    '
- fmt: '### Getting Started with Hono


    To work with `Hono`, you will need at a minimum access to an instance of the platform.
    The project team maintains a publicly available sandbox that you can use. Naturally,
    you can also install a local instance. The platform is made of several containerized
    microservices. The `Hono` team provides a Helm chart to help you install them
    on a Kubernetes cluster. This chart has been developed in the context of the Eclipse
    IoT Packages project and is available at [`https://github.com/eclipse/packages/blob/master/charts/hono/README.md`](https://github.com/eclipse/packages/blob/master/charts/hono/README.md).
    If you do not have access to a Kubernetes instance, you can set up one yourself.
    The `Hono` team provides instructions to deploy a single-node cluster inside a
    local VM using Minikube here: [`www.eclipse.org/hono/docs/deployment/create-kubernetes-cluster/`](http://www.eclipse.org/hono/docs/deployment/create-kubernetes-cluster/).


    The `Hono` CLI utility is another useful tool you should have on your workstation.
    It can interact with messaging infrastructure implementing `Hono`''s northbound
    Telemetry, Event, and Command and Control APIs. Additionally, it can interact
    with the AMQP protocol adapter. You can download it from this page on the `Hono`
    website: [`www.eclipse.org/hono/downloads`](http://www.eclipse.org/hono/downloads).
    As an alternative, you can use `wget` if it is available on your operating system.
    Make sure you adjust the following URL to the latest version of the utility. It
    was `2.0.1` when I wrote this.


    ```

    wget "https://www.eclipse.org/downloads/download.php?file=/hono/hono-cli-2.0.1-exec.jar&r=1"
    -O hono-cli-2.0.1-exec.jar

    ```


    Since it is offered as an executable JAR, the CLI needs a Java runtime to run.
    Once the download is complete, you can test the JAR by running this command:


    ```

    java -jar hono-cli-2.0.1-exec.jar -V

    ```


    You should get output resembling this:


    ```

    hono-cli 2.0.1

    running on Linux 5.10.102.1-microsoft-standard-WSL2 amd64

    ```


    In the rest of this section, I will demonstrate a few basic interactions against
    the `Hono` sandbox. You will find a fully fleshed-out tutorial here: [`www.eclipse.org/hono/docs/getting-started/`](http://www.eclipse.org/hono/docs/getting-started/)


    The `Hono` sandbox uses custom TCP ports; you could be prevented from accessing
    it if working from a corporate network. To validate that your workstation can
    reach the sandbox properly, execute the following request on the command line:


    ```

    curl -sIX GET http://hono.eclipseprojects.io:28080/v1/tenants/DEFAULT_TENANT

    ```


    The command should return output like this if your network administrators did
    not block the ports:


    ```

    HTTP/1.1 200 OK

    etag: aee7809e-ca66-4e5d-b722-f2f2c5661f87

    content-type: application/json; charset=utf-8

    content-length: 445

    ```


    You should set up your own local instance if you get anything else.


    The next step is to create a file used to set the required shell environment variables.
    Usually, it is named `hono.env`. When working with the sandbox, you can use the
    following command to create it:


    ```

    cat  hono.env

    export REGISTRY_IP=hono.eclipseprojects.io

    export HTTP_ADAPTER_IP=hono.eclipseprojects.io

    export MQTT_ADAPTER_IP=hono.eclipseprojects.io

    export KAFKA_IP=hono.eclipseprojects.io

    export APP_OPTIONS="--sandbox"

    EOS

    ```


    Since `Hono` is a multitenant platform, you need to create your own tenant on
    the sandbox before being able to do anything else. Fortunately, the `Hono` Device
    Registry exposes a REST API for that purpose. You can invoke it with the following
    command:


    ```

    source hono.env

    curl -i -X POST -H "content-type: application/json" --data-binary ''{

    "ext": {

    "messaging-type": "kafka"

    }

    }'' http://${REGISTRY_IP}:28080/v1/tenants

    ```


    If all goes well, you will get a `201` response code and output resembling this:


    ```

    HTTP/1.1 201 Created

    etag: c11c7413-e019-4ef1-b984-5d8244aa1b2f

    location: /v1/tenants/6e3eec20-3795-4f35-812a-4b45dabaffdf

    content-type: application/json; charset=utf-8

    content-length: 45

    {"id":"6e3eec20-3795-4f35-812a-4b45dabaffdf"}

    ```


    The JSON payload in the response body contains your unique randomly generated
    tenant ID. You need to add it to your shell environment file. For example:


    ```

    echo "export MY_TENANT=6e3eec20-3795-4f35-812a-4b45dabaffdf" >> hono.env

    ```


    Substitute the value you see here with the one returned by the preceding `curl`
    request.


    The next step is to create a device and assign it a password. Don’t worry; you
    do not need a physical device to complete the steps. The `Hono` CLI utility can
    consume the messages sent by devices and play the role of a virtual device as
    well.


    To add a device to your tenant, execute this `curl` request:


    ```

    source hono.env

    curl -i -X POST http://${REGISTRY_IP}:28080/v1/devices/${MY_TENANT}

    ```


    Once again, the response''s body will contain a JSON structure providing the ID
    of the newly created device. In my case:


    ```

    {"id":"53a3b746-d138-4f3c-8087-b580e241c9d2"}

    ```


    You need to add this ID to your `hono.env` file as shown here:


    ```

    echo "export MY_DEVICE=53a3b746-d138-4f3c-8087-b580e241c9d2" >> hono.env

    ```


    The `Hono` sandbox requires authentication. You must define and assign a password
    to your device. Of course, `Hono` also supports client certificates for production
    deployments; I just use password authentication for the sake of simplicity here.


    Pick a password and add it to your `hono.env` file like this:


    ```

    echo "export MY_PWD=requin!" >> hono.env

    ```


    Then, assign the password to the device through this REST API call:


    ```

    source hono.env

    curl -i -X PUT -H "content-type: application/json" --data-binary ''[{

    "type": "hashed-password",

    "auth-id": "''${MY_DEVICE}''",

    "secrets": [{

    "pwd-plain": "''${MY_PWD}''"

    }]

    }]'' http://${REGISTRY_IP}:28080/v1/credentials/${MY_TENANT}/${MY_DEVICE}

    ```


    The response code should be `204` (Updated), and the response body empty.


    You are now ready to start your virtual device. Open a command-line prompt and
    navigate to the folder where you downloaded the `Hono` CLI. Then, execute the
    following command:


    ```

    java -jar hono-cli-*-exec.jar app ${APP_OPTIONS} consume --tenant ${MY_TENANT}

    ```


    If you did everything correctly, you should see output like this:


    ```

    Connecting to Kafka based messaging infrastructure [hono.eclipseprojects.io:9092,hono.eclipseprojects.io:9094]

    Consuming messages for tenant [6e3eec20-3795-4f35-812a-4b45dabaffdf], ctrl-c to
    exit.

    ```


    Now, let’s make an API call simulating a device sending telemetry. In this case,
    the payload is a simple JSON structure containing a single temperature value.
    Open a second command prompt and execute this command:


    ```

    source hono.env

    curl -i -u ${MY_DEVICE}@${MY_TENANT}:${MY_PWD} -H ''Content-Type: application/json''
    --data-binary ''{"temp": 5}'' http://${HTTP_ADAPTER_IP}:8080/telemetry

    ```


    You should see messages like this in the shell where the `Hono` CLI is running:


    ```

    t 53a3b746-d138-4f3c-8087-b580e241c9d2 application/json {"temp": 5} {orig_adapter=hono-http,
    qos=0, device_id=53a3b746-d138-4f3c-8087-b580e241c9d2, creation-time=1660328357552,
    traceparent=00-fbc396794954547a68db4c1e0a6b8831-cfd5b098412f5788-01, content-type=application/json,
    orig_address=/telemetry}

    ```


    The `Hono` sandbox offers an MQTT protocol adapter as well. I will now show you
    how to simulate an MQTT device receiving a command.


    To receive the command on your workstation, you must subscribe to the relevant
    MQTT topic. The easiest way to do this is to use the `mosquitto_sub` CLI utility
    shipped by the Mosquitto team. Please refer to the chapter on MQTT if you need
    to install it.


    Run the following commands on a brand-new command prompt to start the MQTT subscription:


    ```

    source hono.env

    mosquitto_sub -v -h ${MQTT_ADAPTER_IP} -u ${MY_DEVICE}@${MY_TENANT} -P ${MY_PWD}
    -t command///req/#

    ```'
