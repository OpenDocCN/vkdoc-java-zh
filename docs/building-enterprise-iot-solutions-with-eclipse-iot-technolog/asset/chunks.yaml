  trans: '

    ### 什么是边缘原生应用？


    至此，我们已有足够视角来尝试对边缘原生应用给出一个正式定义。它们本质上是具有特定特征的基于微服务的分布式应用。这些特征包括：


    *   **针对现场使用进行优化：** 由于边缘原生应用通常运行在资源受限的硬件上，因此从一开始就针对体积和功耗进行了优化。


    *   **具有弹性：** 边缘原生应用假设单个节点、完整服务甚至网络都可能随时发生灾难性故障。


    *   **适应移动性：** 边缘原生应用不仅能够连接到移动（蜂窝）网络，还可以部署在各种交通工具的节点上。这意味着它们不仅具有位置感知能力，还能在需要时利用基于位置的路由。


    *   **可编排：** 边缘原生应用的组件通常部署在容器内，但也可能涉及虚拟机、无服务器函数和二进制文件。所有这些部署工件的生命周期都必须精心编排，无论是为了扩展或缩减某些服务，还是为了对部分节点进行增量更新。


    *   **零信任安全模型：** 应用于边缘原生应用时，零信任模型意味着默认情况下不信任任何设备。这意味着需要进行系统的设备身份验证和授权，同时限制所授予访问权限的范围和时限。数据保护在该模型中也扮演着重要角色，这意味着数据在传输和静态存储时都应加密。


    *   **零接触入网：** 边缘原生应用需要用于身份验证、授权甚至设备证明的凭证。后者涉及使用证书或类似手段来证明设备的唯一身份和可信度。手动在设备上部署凭证会带来重大安全风险。零接触入网意味着，一旦设备连接到网络，就可以从中心位置部署此类凭证。这极大地简化了大规模部署基础设施的流程，因为人工干预被减少到最低限度。由于流程是精简和自动化的，部署成本也显著降低。


    我刚才介绍的许多特性都涉及一定程度的复杂性。边缘计算平台可以减轻开发人员的部分负担，因为他们可以依赖平台功能，而不是自己实现逻辑。此外，由于平台提供了通用功能的通用实现，它们可以推动跨行业、不同技能水平的开发人员采用特定的软件开发模式。边缘计算平台允许你以结构化的方式学习边缘软件开发。


    ## 对 EdgeOps 的需求


    DevOps 改变了我们构建、部署和运行应用的方式。与其灵感来源之一的敏捷开发一样，DevOps 是一个松散关联的实践集合的总称，大多数组织会根据自身文化和优先级对其进行调整和塑造。DevOps
    的主要目标是通过持续交付来缩短开发生命周期。为此，它致力于打破开发人员和系统管理员（运维人员）之间传统的劳动分工。在一些组织中，这是通过合并开发人员和运维人员团队来实现的；在另一些组织中，则保留了职能区分，但消除了协作障碍。


    在技术层面，DevOps 倾向于部署在容器中的微服务；这些容器由持续集成流水线构建，并通过持续部署几乎立即提供给最终用户。其目标是避免过去的运维模式，这种模式的特点是很少部署大型单体软件组件的大版本。而
    DevOps 则强调实时、增量地交付小变更。如果你使用任何现代的软件即服务（SaaS）Web 平台，你可能曾被提示重新加载页面以体验新功能。这就是 DevOps
    在幕后运作的一个明显迹象。


    EdgeOps 同样依赖于基于容器的微服务和持续集成。然而，差异体现在部署模型上。对于许多边缘计算用例，例如联网车辆、工业自动化和患者监护，持续部署并不可取，甚至不可能实现。通常，涉及关键任务和实时要求的用例依赖于谨慎的、增量的软件更新部署模型。此外，由于边缘几乎没有弹性，新版本在推送到生产节点之前，会经过严格的性能和功耗测试。直接的空中下载（OTA）更新有时是不可能的，因为节点运行在“物理隔离”环境中，不直接连接到公共互联网或公司网络。在这种情况下，部署新版本的软件组件需要派遣人员到现场；然后节点将逐个更新，或通过本地环境中的
    OTA 服务进行更新。可以说，边缘的更新速度通常要慢得多。在这方面，它更接近运营技术而非信息技术。


    EdgeOps 是 DevOps 的演进，它考虑了边缘计算所解决的 IT 挑战以及边缘计算解决方案的具体特征。换句话说，它是经过调整以支持边缘原生应用的 DevOps。与
    DevOps 一样，它是一套实践；然而，这些实践体现在一流边缘计算平台的功能集中。

    '
- fmt: '## Edge Computing Platforms


    Nowadays, Kubernetes seems to be the answer whatever the question is. This is
    true at the Edge as it is in the Cloud. However, running plain Kubernetes (K8s)
    or its commercial distributions at the Edge only makes sense when sufficient compute
    resources are available. On constrained nodes, it is preferable to deploy lighter-weight
    versions such as [K3s](https://k3s.io), [KubeEdge](https://kubeedge.io/en/), or
    [MicroShift](https://microshift.io). It would be shortsighted to restrict your
    search for an edge computing platform to K8s and its derivatives. Some workloads
    do not lend themselves easily to containers since they require direct interaction
    with the hardware. Also, there are specific benefits to platforms built from the
    ground up for the Edge, such as the capacity to run in environments not connected
    to the Cloud and the automatic selection of container images fitting the hardware
    profile of a particular node. For these reasons and many others, you should evaluate
    a broad set of options when selecting an edge computing platform.


    Table [11-2](#524096_1_En_11_Chapter.xhtml#Tab2) compares the main characteristics
    of several edge computing platforms.


    **Table 11-2** Characteristics of popular edge computing platforms^([^(60)](#fn60))


    | Platform | Cloud Managed | Edge Only | K8s Integration | Focus |

    | --- | --- | --- | --- | --- |

    | AWS Outposts | Yes | No | Offers K8s | Containers, VMs |

    | Eclipse ioFog | Yes | Yes | Yes | Containers |

    | Eclipse Kanto | Yes | Yes | No | Containers, IoT |

    | Eclipse Kura | Yes | Yes | No | Containers, Gateways |

    | EdgeX Foundry | Yes | No | No | IoT |

    | Fledge | Yes | No | No | Industry 4.0 |

    | K3s | No | Yes | Is K8s | Containers |

    | KubeEdge | Yes | Possible | Is K8s | Containers |

    | Open Horizon | Yes | No | Yes | Containers |


    As you can see, a wealth of platforms are available, each with its focus and feature
    set. Three of them call the Eclipse Foundation their home: Eclipse ioFog, Eclipse
    Kanto, and Eclipse Kura. I will now explain in detail their architecture and feature
    set. Of course, I will also provide an overview of the main edge-focused distributions
    of Kubernetes. Finally, I will introduce you to project Eve, an intriguing approach
    to operating systems for edge nodes.


    ### Eclipse ioFog


    Eclipse ioFog is a mature edge computing platform for deploying, running, and
    networking distributed microservices at the Edge. It has been contributed to the
    Eclipse Foundation by Edgeworx, a startup based in California.


    The official web resources for ioFog are as follows:


    *   **Website:** [`https://iofog.org`](https://iofog.org)

    *   **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.iofog`](https://projects.eclipse.org/projects/iot.iofog)

    *   **Code repositories:** [`https://github.com/eclipse-iofog`](https://github.com/eclipse-iofog)


    At the time of writing, the team was about to release ioFog version 3, which had
    been in beta for several months. This section is based on version 3 since it significantly
    improves the platform. ioFog is made available under the [Eclipse Public License
    version 2](https://www.eclipse.org/legal/epl-2.0/).


    #### ioFog Concepts and Architecture


    The core concept of ioFog is the Edge Compute Network (ECN). Each ECN is made
    of one or more nodes. Nodes are devices running Linux on which the ioFog Agent
    is deployed. The Agent is a daemon responsible for the set of microservices running
    on a specific node. Another ioFog component, the Controller, is responsible for
    orchestrating the agents. It represents ioFog’s control plane.


    By default, the Controller is deployed on a stand-alone host. This is what the
    ioFog documentation refers to as a *remote* deployment. It is also possible to
    deploy the controller onto a Kubernetes cluster. In that case, ioFog relies on
    a [custom Kubernetes operator](https://github.com/eclipse-iofog/iofog-operator)^([^(61)](#fn61))
    to integrate with the cluster and deploys resources for routing. Please note that
    the ioFog control plane will work on most Kubernetes distributions, including
    managed ones. However, lightweight implementations such as MicroK8s and K3s are
    not supported – although Minikube is. In ioFog, microservices are always deployed
    inside containers. The life cycle of those containers is under the control of
    the ioFog Agent, which relies on the Docker container runtime.


    Figure [11-2](#524096_1_En_11_Chapter.xhtml#Fig2) illustrates how those concepts
    all fit together in the ioFog platform when the Controller is deployed on a stand-alone
    server (remote deployment).


    ![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** ioFog architecture for remote deployments (Credit: Eclipse Foundation)


    Another important ioFog concept is *Applications*. Applications represent a set
    of microservices deployed together for a particular purpose. Both applications
    and microservices are described using YAML definition files. Applications play
    an important role because, by default, microservices cannot communicate with one
    another. An application specifies its name, microservice instances, and the routes
    between the microservices. Without a route, network traffic will be blocked. ioFog
    version 3 also introduced powerful templating mechanisms for applications.


    The ioFog Controller provides a complete REST API and a graphical web interface
    called ECN Viewer to inspect the state of every agent, application, and microservice.
    You can see a screenshot of ECN Viewer in Figure [11-3](#524096_1_En_11_Chapter.xhtml#Fig3).


    ![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig3_HTML.jpg)


    **Figure 11-3** Screenshot of ioFog’s ECN Viewer


    When working with ioFog, you will spend most of your time working with the `iofogctl`
    command-line tool. You can use it to create, configure, and operate ECNs and their
    resources, such as Controllers, Agents, Applications, and microservices.'
