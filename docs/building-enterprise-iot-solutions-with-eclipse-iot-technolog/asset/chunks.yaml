- fmt: '### Raspberry Pi Pico


    While the Raspberry Pi single-board computers get much attention, the Pi Pico
    is a popular and well-documented microcontroller. It features an [RP2040 chip](https://www.raspberrypi.com/documentation/microcontrollers/rp2040.html%2523welcome-to-rp2040)
    designed by Raspberry Pi itself. The chip is equipped with two Arm Cortex-M0+
    cores running at 133 MHz, 264 KB of SRAM, and supports up to 16 MB of off-chip
    Flash storage connected via a dedicated bus. The MCU offers 2 UARTs, 2 SPI controllers,
    2 I²C controllers, and 16 PWM channels. A low-resolution temperature sensor is
    also included.


    The [Raspberry Pi Pico](https://www.raspberrypi.com/documentation/microcontrollers/raspberry-pi-pico.html)
    board is equipped with 2 MB of Flash and exposes 26 GPIO pins, 3 of them being
    ADC capable. Although the RP2040 MCU is proprietary, the design files for the
    Pi Pico board are open source. There are several boards available from third parties
    that also use the chip.


    Footnotes [1](#524096_1_En_8_Chapter.xhtml#Fn1_source) [2](#524096_1_En_8_Chapter.xhtml#Fn2_source)
    [3](#524096_1_En_8_Chapter.xhtml#Fn3_source) [4](#524096_1_En_8_Chapter.xhtml#Fn4_source)
    [5](#524096_1_En_8_Chapter.xhtml#Fn5_source)


    # 9. Connectivity


    > *Nos vies sont faites de tout un réseau de voies inextricables, parmi lesquelles
    un instinct fragile nous guide, équilibre toujours précaire entre le cœur et la
    raison.*

    >

    > *Our lives are made up of a whole network of inextricable paths, among which
    a fragile instinct guides us, an always precarious balance between heart and reason.*

    >

    > —Georges Dor, *Il neige, Amour*…


    The network is at the core of any IoT or edge computing solution. Connectivity
    is what makes IoT different from core embedded computing, after all. Selecting
    and implementing the right type of network for a specific deployment is more complex
    than it looks. L Peter Deutsch and his colleagues at Sun Microsystems identified
    the potential pitfalls in the 1990s, known today as the [fallacies of distributed
    computing](https://en.wikipedia.org/wiki/Fallacies_of_distributed_computing).
    The list goes like this:


    1. The network is reliable.

    2. Latency is zero.

    3. Bandwidth is infinite.

    4. The network is secure.

    5. Topology doesn''t change.

    6. There is one administrator.

    7. Transport cost is zero.

    8. The network is homogeneous.


    Since IoT and edge computing devices are located outside the confines of the Cloud
    or the corporate data center, you were probably already expecting the network
    to be unreliable and the bandwidth finite `–` unless you are just getting started.
    Moreover, you were probably not expecting latency to be zero since one of the
    aims of edge computing infrastructure is to reduce it. Nevertheless, the rest
    of the fallacies are still relevant. Security is still a huge challenge, network
    topologies change over time, there are several administrators, and the network
    will not be homogeneous.


    In this chapter, I will explore a variety of networking technologies that you
    could use in a real-world deployment. After that, I will share network design
    considerations. Finally, we will look at some code for the Zephyr RTOS.


    ## Connectivity Options


    There are a great variety of options to connect your constrained devices to a
    network. Some of them directly support TCP/IP, which means that the devices can
    theoretically connect directly to the Internet. This is the case with cellular
    connectivity, Wi-Fi, and some narrowband options. Other technologies do not support
    TCP/IP, so you need to deploy a gateway to bridge the local device network with
    the Internet. Of course, some of the higher-level protocols I covered earlier
    can run over non-IP transports and still support Internet connectivity.


    I will cover the most widespread alternatives in the market right now in this
    section. But how will you pick the right one for your project? Here is a list
    of a few factors to consider:


    - **Hardware support:** Are there MCUs or gateways shipping with support for the
    technology you contemplate using? If not, are there radio modules on the market
    that can integrate with the hardware you plan to use?

    - **Software support:** Does the RTOS or OS you plan to use support the networking
    technology and specific radio module you selected? Are the required libraries
    proprietary or open source? How mature is the networking stack?

    - **Ecosystem:** How diverse is the supplier ecosystem for the networking technology
    you evaluate?

    - **Range:** What effective range do you need to support your use case? Is it
    measured in meters, hundreds of meters, or kilometers?

    - **Data rate:** Given the quantity of data you will transmit from and to your
    devices, what data rate do you need? Do you need to support mobility use cases
    involving pedestrians, cyclists, cars, or other vehicles?

    - **Battery life:** Will your devices draw power from a battery? In the affirmative,
    what is your target battery life?

    - **Interference:** Considering the physical location where the devices will be
    deployed, how much interference do you expect in the target frequency bands? Are
    there devices using the same technology or other technologies relying on the same
    frequency bands already deployed onsite?

    - **Cost:** How much can you invest in network connectivity compared to other
    aspects of the solution? Given your constraints and requirements, what are the
    impacts of the network connectivity option you plan to use on the development
    time, maintenance efforts, and life cycle of the hardware and software?


    Ultimately, you will probably need to compromise. The real world can be messy,
    especially when radio technologies are involved.'
