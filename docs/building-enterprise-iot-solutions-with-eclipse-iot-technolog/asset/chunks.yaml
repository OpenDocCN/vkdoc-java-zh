  raw: '### Kubernetes


    This chapter would not be complete without an overview of options to run Kubernetes
    at the Edge. In environments where a certain level of elasticity is available,
    it is certainly possible to run the open source distribution of Kubernetes or
    any of the available commercial distributions, such as Red Hat OpenShift. However,
    this typically requires deploying servers in a variety of data center. My focus
    in this section will be on lighter-weight alternatives that can run on nodes deployed
    *in the wild*, specifically K3s and KubeEdge. There are, of course, several others,
    such as Canonical’s [MicroK8s](https://microk8s.io/) or Red Hat [MicroShift](https://microshift.io/).


    Note


    If you are less familiar with the platform, [Kubernetes](https://kubernetes.io/)
    is a container orchestration system automating software deployment, scaling, and
    management. It was originally built by Google and is now maintained by the [Cloud
    Native Computing Foundation](https://www.cncf.io/) (CNCF), which belongs to the
    Linux Foundation. As of 2022, Kubernetes is a *de facto* industry standard to
    orchestrate Cloud Native applications.


    K3s and KubeEdge represent two distinct ways of slimming down Kubernetes for Edge
    environments. Their governance model is also different. The former is a project
    initiated by [Rancher Labs](https://rancher.com/) (since then purchased by SUSE).
    The latter is under the stewardship of the CNCF. Both code bases are made available
    under the [Apache License version 2](https://www.apache.org/licenses/LICENSE-2.0.txt).


    [K3s](https://k3s.io/) packages every component as a single binary and can leverage
    the SQLite embedded database instead of etcd, which reduces the runtime footprint.
    It also removes a few features from upstream Kubernetes, namely, the cloud provider
    and storage drivers. K3s diverges slightly from the upstream code base, but the
    changes are intentionally minimal. The project explicitly intends not to change
    any core Kubernetes functionality.


    [KubeEdge](https://kubeedge.io/en/) takes a different approach. It provides a
    set of Cloud and Edge components working together to extend Kubernetes at the
    Edge. KubeEdge permits the deployment and orchestration of services on edge nodes
    and metadata synchronization with the Cloud. It also enables the centralized management
    of edge nodes from a Cloud-based Kubernetes control plane. The runtime footprint
    of the Edged agent, which manages containerized applications on the edge nodes,
    can be as low as 10 MiB.


    Figure [11-7](#524096_1_En_11_Chapter.xhtml#Fig7) contrasts the architectures
    of K3s and KubeEdge with the upstream Kubernetes distribution.


    ![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig7_HTML.jpg)


    An illustration depicts the control and data planes of Kubernetes, K 3 s, and
    Kube Edge. The data planes include container engines.


    Figure 11-7


    Comparison of the Kubernetes, K3s, and KubeEdge architectures^([^(62)](#fn62))


    K3s, KubeEdge, and their alternatives represent effective ways to orchestrate
    containers running on edge nodes. However, such platforms induce additional latency,
    making them a poor fit for use cases involving mission-critical and real-time
    requirements. Kubernetes, after all, works best with stateless workloads and microservices.
    Many Edge applications are stateful by design.


    ### Project EVE


    All the platforms I covered up to now run on the top of an operating system, typically
    Linux. Project EVE, from LF Edge, goes further since it integrates application
    orchestration to the base operating system. EVE and its companion projects were
    contributed to LF Edge by Zededa: a California startup focused on edge computing
    solutions. The code base is available on GitHub under the Apache License version
    2.


    The official web resources for EVE are as follows:


    *   **Website:** [`www.lfedge.org/projects/eve/`](http://www.lfedge.org/projects/eve/)


    *   **Code repository:** [`https://github.com/lf-edge/eve`](https://github.com/lf-edge/eve)


    EVE stands for *Edge Virtualization Engine* and supports virtual machines and
    containers through a level 1 hypervisor (currently based on Xen) running on a
    low-footprint and hardened Linux kernel. Since it relies on a hypervisor, EVE
    is more suitable for use cases involving mission-critical and real-time requirements
    than other solutions leveraging KVM, the Linux kernel’s built-in virtualization
    solution. Moreover, EVE features deep integration with hardware root of trust
    solutions, providing a strong foundation for device attestation and other security
    measures when running directly on physical hardware (bare metal). It also can
    disable unused ports on edge nodes to prevent device tampering.


    The EVE runtime does not possess a user interface to keep it lightweight. Edge
    nodes are managed through a RESTful API. On the other hand, management functions
    are bundled into a central controller. The EVE team maintains an open source controller
    implementation known as Adam. It implements essential features and is a good way
    to start with the platform. This separation of concerns between the node runtime
    and controller means that users can pick between open source and commercial controllers,
    such as Zededa’s own, depending on their needs. For security reasons, EVE nodes
    are associated with a specific controller when they are initially provisioned,
    and this association cannot be changed.'
  trans: '

    ### Kubernetes


    如果不概述在边缘运行 Kubernetes 的选项，本章节将是不完整的。在具备一定弹性的环境中，运行 Kubernetes 的开源发行版或任何可用的商业发行版（例如
    Red Hat OpenShift）当然是可行的。然而，这通常需要在各种数据中心部署服务器。我在本节中将重点介绍那些可以在*野外*部署的节点上运行的轻量级替代方案，特别是
    K3s 和 KubeEdge。当然，还有其他几种方案，例如 Canonical 的 [MicroK8s](https://microk8s.io/) 或 Red
    Hat 的 [MicroShift](https://microshift.io/)。


    注意


    如果你对该平台不太熟悉，[Kubernetes](https://kubernetes.io/) 是一个容器编排系统，用于自动化软件部署、扩缩容和管理。它最初由
    Google 构建，现在由隶属于 Linux 基金会的 [云原生计算基金会](https://www.cncf.io/) (CNCF) 维护。截至 2022
    年，Kubernetes 已成为编排云原生应用的*事实上的*行业标准。


    K3s 和 KubeEdge 代表了两种为边缘环境精简 Kubernetes 的不同方式。它们的治理模式也不同。前者是由 [Rancher Labs](https://rancher.com/)（后被
    SUSE 收购）发起的项目。后者则由 CNCF 管理。两个代码库均根据 [Apache 许可证版本 2](https://www.apache.org/licenses/LICENSE-2.0.txt)
    提供。


    [K3s](https://k3s.io/) 将每个组件打包成一个单独的二进制文件，并且可以利用 SQLite 嵌入式数据库替代 etcd，从而减少了运行时占用空间。它还从上游
    Kubernetes 中移除了一些特性，即云提供商和存储驱动程序。K3s 与上游代码库略有不同，但这些更改有意保持最小化。该项目明确表示不打算更改任何核心
    Kubernetes 功能。


    [KubeEdge](https://kubeedge.io/en/) 采用了不同的方法。它提供了一组云端和边缘组件协同工作，以在边缘扩展 Kubernetes。KubeEdge
    允许在边缘节点上部署和编排服务，并与云端同步元数据。它还支持通过基于云的 Kubernetes 控制平面集中管理边缘节点。管理边缘节点上容器化应用程序的 Edged
    代理，其运行时占用空间可低至 10 MiB。


    图 11-7 对比了 K3s 和 KubeEdge 与上游 Kubernetes 发行版的架构。


    ![](img/524096_1_En_11_Fig7_HTML.jpg)


    一幅插图展示了 Kubernetes、K3s 和 KubeEdge 的控制平面和数据平面。数据平面包括容器引擎。


    图 11-7


    Kubernetes、K3s 和 KubeEdge 架构对比^(⁶²)


    K3s、KubeEdge 及其替代方案代表了编排运行在边缘节点上的容器的有效方式。然而，此类平台会引入额外的延迟，使其不适合涉及关键任务和实时性要求的用例。毕竟，Kubernetes
    最适合无状态工作负载和微服务。而许多边缘应用在设计上是有状态的。


    ### Project EVE


    到目前为止我介绍的所有平台都运行在操作系统之上，通常是 Linux。来自 LF Edge 的 Project EVE 更进一步，因为它将应用编排集成到了基础操作系统中。EVE
    及其配套项目由 Zededa 贡献给 LF Edge：这是一家专注于边缘计算解决方案的加州初创公司。该代码库在 GitHub 上根据 Apache 许可证版本
    2 提供。


    EVE 的官方网络资源如下：


    *   **网站：** [`www.lfedge.org/projects/eve/`](http://www.lfedge.org/projects/eve/)


    *   **代码仓库：** [`https://github.com/lf-edge/eve`](https://github.com/lf-edge/eve)


    EVE 代表 *边缘虚拟化引擎*，它通过运行在占用空间小且经过加固的 Linux 内核上的 1 级虚拟机监控程序（目前基于 Xen）来支持虚拟机和容器。由于依赖于虚拟机监控程序，EVE
    比利用 KVM（Linux 内核内置的虚拟化解决方案）的其他解决方案更适合涉及关键任务和实时性要求的用例。此外，EVE 具有与硬件信任根解决方案的深度集成，为直接在物理硬件（裸机）上运行时进行设备认证和其他安全措施提供了坚实基础。它还可以禁用边缘节点上未使用的端口以防止设备篡改。


    EVE 运行时没有用户界面以保持其轻量级。边缘节点通过 RESTful API 进行管理。另一方面，管理功能被捆绑到一个中央控制器中。EVE 团队维护着一个名为
    Adam 的开源控制器实现。它实现了基本功能，是开始使用该平台的好方法。这种节点运行时和控制器之间的关注点分离意味着用户可以根据需要选择开源或商业控制器，例如
    Zededa 自己的控制器。出于安全原因，EVE 节点在初始配置时会与特定控制器关联，并且此关联无法更改。

    '
- fmt: '# Getting Started with Eve


    The easiest way to get started with EVE is to rely on a companion project called
    Eden. Eden makes it easy to deploy an instance of the Adam controller and a set
    of EVE nodes. The minimum configuration requires two devices, which can be actual
    hardware or virtualized. One will run Eden and the other Eve. In this context,
    the device hosting the Eden components is called the *manager*. The basic prerequisites
    you need on the manager are the Eden binary, which you can download from its GitHub
    repository, and a functional install of the Docker runtime. On Linux, you need
    to run the following commands to ensure Docker will have the ability to execute
    commands:


    ```

    sudo usermod -aG docker $USER

    newgrp docker

    ```


    The Eden manager runs several important components. Those components are as follows:


    * **Adam:** The controller, running as a daemon

    * **Redis:** A database instance used for logging, running as a daemon

    * **Eserver:** A repository of files and EVE device images made available for
    download under the HTTP and FTP protocols

    * **Registry:** An OCI-compliant container registry to make images available to
    edge nodes


    The device running EVE has a different set of prerequisites. Here is a comprehensive
    list for a virtual one – meaning that you will run the manager and EVE node in
    parallel on the same physical hardware:


    * `qemu`, version 4.x or higher

    * `telnet`

    * squashfs tools (`squashfs` or `squashfs-tools`, depending on the OS used)


    On Linux, you also need to make sure KVM is available and can execute commands.
    After installing it (if needed), execute these commands:


    ```

    sudo usermod -aG kvm $USER

    newgrp kvm

    ```


    On macOS, you will need either [machyve](https://github.com/machyve/xhyve) or
    Parallels to provide virtualization.


    I will now provide instructions on setting up the infrastructure and deploying
    an EVE image running the Nginx web server. The first step is to create a default
    configuration:


    ```

    eden config add default

    ```


    Then, execute these commands to set up the manager’s components and start them:


    ```

    eden setup

    eden start

    ```


    Since we now have a running controller and one EVE node, it is now possible to
    associate the two:


    ```

    eden eve onboard

    ```


    The next step is to deploy an Nginx container on EVE. Notice that we mount a local
    folder to provide content to serve to the web server. This supposes you cloned
    the Eden repository and are running the command from the top-level folder of the
    clone.


    ```

    eden pod deploy docker://nginx -p 8028:80 --mount=src=./data/helloeve,dst=/usr/share/nginx/html

    ```


    Finally, you can check that everything is running properly with the following
    command:


    ```

    eden status

    ```


    Time to access the web content served from the EVE node. This command should do
    the trick:


    ```

    curl http://:8028

    ```


    You now have a working Eden environment that you can use to explore the possibilities
    of EVE. If you wish to stop the components and clean up, execute this command:


    ```

    eden stop && eden clean --current-context=false

    ```


    Footnotes [1](#524096_1_En_11_Chapter.xhtml#Fn1_source) [2](#524096_1_En_11_Chapter.xhtml#Fn2_source)
    [3](#524096_1_En_11_Chapter.xhtml#Fn3_source)


    # Applications


    > *Il y a très loin de la velléité à la volonté, de la volonté à la résolution,
    de la résolution au choix des moyens, du choix des moyens à l''application.*

    >

    > *There is a difference between feebleness by the impotence of the will, of the
    will to the resolution, of the resolution to the choice of means, of the choice
    of the means to the application.*

    >

    > —Jean François Paul de Gondi, cardinal de Retz


    In the 1990s, when I still had (some) hair on my head, the IT landscape was much
    more diverse. Several flavors of UNIX fought for dominance. Multiple processor
    architectures that are now gone or on their way to obsolescence, such as DEC’s
    Alpha, HP’s PA-RISC, and Sun’s SPARC, were common sights in data centers. On the
    desktop, IBM’s OS/2 was the OS of the future until Windows stole its lunch. As
    I write this in 2022, only a handful of viable options remain in each category.
    Why is that? Which factor ultimately determined the surviving processor architectures
    and operating systems? Naturally, the business strategies of the organizations
    involved played a role, as did the quality and features of the technologies involved.
    However, the decisive element was something else. In the end, users picked the
    processors and operating systems that enabled them to run the applications they
    wanted. In that sense, Word and Excel did more to ensure Microsoft’s dominance
    on the desktop than Windows itself.


    Microcontrollers, edge nodes, protocols, and operating systems: these building
    blocks are not ends of their own but rather ways to run applications. This chapter
    will describe three specific open source Edge applications or application frameworks
    hosted at the Eclipse Foundation. The first one, Eclipse 4diac, is a design environment
    and runtime for programmable logic controllers. The second one is Eclipse Keyple,
    a technology enabling contactless payments. Finally, I will cover Eclipse VOLTTRON,
    a distributed sensing platform with an energy management slant.


    If you are a developer, you probably are or will be building such applications
    yourself. Or maybe you will work on an IoT platform of your own. If that is the
    case, you must pick a runtime to leverage in your Edge and Cloud applications.
    I will discuss the most widely used.


    Whatever your choice of runtime is or will be, you will need to integrate devices
    using a variety of protocols into the rest of your infrastructure. There are two
    main ways to achieve this. The first is using a device connectivity platform such
    as Eclipse Hono. Such platforms provide uniform interfaces that business applications
    can use to receive telemetry and send commands. The platform then abstracts the
    IoT protocols used. The second approach is to have the devices themselves expose
    a protocol-agnostic interface. A good example is the Web of Things (WoT) specification
    from the World Wide Web Consortium (W3C). Both approaches support the digital
    twins pattern, which is probably something you will want to leverage as well.


    In this chapter, I will focus on the first approach. I will discuss WoT, digital
    twins, and the relevant Eclipse IoT projects. In the next chapter, I will cover
    IoT platforms, including device connectivity ones.


    ## Application Runtimes


    Let me be clear: all the runtimes I mention in this section are good options for
    writing an Edge application or Cloud IoT platform. That said, some of them may
    not be optimal choices for targeting constrained edge nodes. Moreover, the robustness
    of their open source ecosystem for IoT protocol implementations differs in terms
    of variety, quality, and maturity. I will try to cover those aspects for each
    of them.'
