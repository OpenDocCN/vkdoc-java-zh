  trans: '

    ## 边缘计算平台


    如今，无论问题是什么，Kubernetes 似乎都是答案。这一点在边缘计算领域与在云端同样适用。然而，在边缘运行普通的 Kubernetes（K8s）或其商业发行版，只有在具备充足计算资源时才有意义。在资源受限的节点上，最好部署更轻量级的版本，例如
    [K3s](https://k3s.io)、[KubeEdge](https://kubeedge.io/en/) 或 [MicroShift](https://microshift.io)。如果将边缘计算平台的搜索范围局限于
    K8s 及其衍生品，那将是目光短浅的。某些工作负载并不适合容器化，因为它们需要直接与硬件交互。此外，从头为边缘构建的平台具有特定优势，例如能够在未连接到云的环境中运行，以及自动选择适合特定节点硬件配置的容器镜像。基于这些以及许多其他原因，在选择边缘计算平台时，您应该评估广泛的选择。


    表 11-2 比较了几个边缘计算平台的主要特性。


    表 11-2


    流行边缘计算平台的特性^(⁶⁰)


    | 平台 | 云管理 | 仅限边缘 | K8s 集成 | 重点领域 |

    | --- | --- | --- | --- | --- |

    | AWS Outposts | 是 | 否 | 提供 K8s | 容器、虚拟机 |

    | Eclipse ioFog | 是 | 是 | 是 | 容器 |

    | Eclipse Kanto | 是 | 是 | 否 | 容器、物联网 |

    | Eclipse Kura | 是 | 是 | 否 | 容器、网关 |

    | EdgeX Foundry | 是 | 否 | 否 | 物联网 |

    | Fledge | 是 | 否 | 否 | 工业 4.0 |

    | K3s | 否 | 是 | 本身就是 K8s | 容器 |

    | KubeEdge | 是 | 可能 | 本身就是 K8s | 容器 |

    | Open Horizon | 是 | 否 | 是 | 容器 |


    如您所见，有丰富的平台可供选择，每个平台都有其重点领域和功能集。其中三个平台以 Eclipse 基金会为家：Eclipse ioFog、Eclipse Kanto
    和 Eclipse Kura。我现在将详细解释它们的架构和功能集。当然，我也会概述主要的专注于边缘的 Kubernetes 发行版。最后，我将向您介绍 Project
    Eve，这是一种针对边缘节点操作系统的有趣方法。


    ### Eclipse ioFog


    Eclipse ioFog 是一个成熟的边缘计算平台，用于在边缘部署、运行和连接分布式微服务。它由位于加利福尼亚州的初创公司 Edgeworx 贡献给 Eclipse
    基金会。


    ioFog 的官方网络资源如下：


    *   **网站：** [`https://iofog.org`](https://iofog.org)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.iofog`](https://projects.eclipse.org/projects/iot.iofog)


    *   **代码仓库：** [`https://github.com/eclipse-iofog`](https://github.com/eclipse-iofog)


    在撰写本文时，该团队即将发布 ioFog 版本 3，该版本已处于测试阶段数月。本节基于版本 3，因为它显著改进了该平台。ioFog 根据 [Eclipse
    公共许可证版本 2](https://www.eclipse.org/legal/epl-2.0/) 提供。


    #### ioFog 概念与架构


    ioFog 的核心概念是边缘计算网络（ECN）。每个 ECN 由一个或多个节点组成。节点是运行 Linux 的设备，其上部署了 ioFog Agent。Agent
    是一个守护进程，负责管理特定节点上运行的一组微服务。另一个 ioFog 组件——Controller，负责编排这些 Agent。它代表了 ioFog 的控制平面。


    默认情况下，Controller 部署在独立主机上。这就是 ioFog 文档所称的*远程*部署。也可以将 Controller 部署到 Kubernetes
    集群上。在这种情况下，ioFog 依赖一个[自定义 Kubernetes Operator](https://github.com/eclipse-iofog/iofog-operator)^(⁶¹)
    来与集群集成，并部署用于路由的资源。请注意，ioFog 控制平面适用于大多数 Kubernetes 发行版，包括托管发行版。但是，不支持轻量级实现，例如 MicroK8s
    和 K3s——尽管支持 Minikube。在 ioFog 中，微服务始终部署在容器内。这些容器的生命周期由 ioFog Agent 控制，该 Agent 依赖于
    Docker 容器运行时。


    图 11-2 说明了当 Controller 部署在独立服务器上（远程部署）时，这些概念如何在 ioFog 平台中协同工作。


    ![](img/524096_1_En_11_Fig2_HTML.jpg)


    架构包括一个带有 Controller、内部路由器和代理的自托管服务器，以及带有 Agent、边缘路由器、代理和微服务 A 的边缘设备 alpha 和 beta。


    图 11-2


    远程部署的 ioFog 架构（来源：Eclipse 基金会）


    另一个重要的 ioFog 概念是*应用程序*。应用程序代表为特定目的而部署在一起的一组微服务。应用程序和微服务都使用 YAML 定义文件进行描述。应用程序扮演着重要角色，因为默认情况下，微服务之间无法相互通信。应用程序指定其名称、微服务实例以及微服务之间的路由。如果没有路由，网络流量将被阻止。ioFog
    版本 3 还为应用程序引入了强大的模板机制。


    ioFog Controller 提供完整的 REST API 和一个名为 ECN Viewer 的图形化 Web 界面，用于检查每个 Agent、应用程序和微服务的状态。您可以在图
    11-3 中看到 ECN Viewer 的截图。


    ![](img/524096_1_En_11_Fig3_HTML.jpg)


    标题为“本地 Agent”的截图，包含状态、最后活动时间、描述、Agent 详情、资源利用率、边缘资源和 healthcare-wearable。


    图 11-3


    ioFog 的 ECN Viewer 截图


    在使用 ioFog 时，您大部分时间都会使用 `iofogctl` 命令行工具。您可以使用它来创建、配置和操作 ECN 及其资源，例如 Controller、Agent、应用程序和微服务。

