  trans: '

    #### Kapua 入门指南


    Kapua 以一组容器镜像的形式提供，你可以将其部署在 Docker 或 OpenShift（包括轻量级的 MiniShift 版本）上。你可以在任何 x86_64
    系统上部署它们。请确保分配至少 6 GB 内存和 2 个 CPU 核心，以保证 Kapua 的性能足够。


    要在 Docker 上开始使用，请在 Linux 或 macOS 上执行以下命令：


    ```

    git clone https://github.com/eclipse/kapua.git kapua

    cd kapua/deployment/docker/unix

    ./docker-deploy.sh

    ```


    你也可以在 Windows 上使用 PowerShell 提示符执行部署。使用以下命令即可：


    ```

    git clone https://github.com/eclipse/kapua.git kapua

    cd kapua\deployment\docker\win

    ./docker-deploy.ps1

    ```


    我确认，如果你安装了额外的 `podman-docker` 包并手动获取一份 docker-compose CLI 的副本，上述操作在 Linux 上使用
    Podman 也能正常工作。例如：


    ```

    curl -SL "https://github.com/docker/compose/releases/download/v2.9.0/docker-compose-linux-x86_64"
    -o docker-compose

    ```


    使该文件可执行，并将其放置在 PATH 环境变量中的适当文件夹内；一切就能正常运行。


    容器运行后，你可以通过 `http://localhost:8081/` 访问 Kapua 控制台，使用 `kapua-sys` 作为用户名，`kapua-password`
    作为密码登录。你可以在以下位置找到关于容器、它们暴露的端口以及平台各组件的凭据的更多信息：[`https://github.com/eclipse/kapua/tree/develop/deployment/docker`](https://github.com/eclipse/kapua/tree/develop/deployment/docker)。


    ## 数据


    数据是任何物联网部署的核心。归根结底，你部署传感器是为了收集数据；你现场的设备将与物理世界交互，因为它们会接收由数据触发的命令。鉴于此，大多数物联网设备会产生大量数据，并且未来还会产生更多。例如，IDC
    在 2019 年的一项预测指出：“*互联物联网设备的增长预计将在 2025 年产生 79.4ZB 的数据*。”^(⁶⁶) 无论这一预测是否会成真，都无关紧要。物联网就是关于数据的。有人可能会说，数据领域是信息技术和运营技术最有可能交汇的地方。


    从技术角度来看，管理物联网数据与企业数据并无不同。你可以使用 SQL、NoSQL 或其他类型的数据库，扩展它们的方式也大致类似于企业 IT 中的常见做法。真正的选择不在于查询语言，而在于你是必须处理静态数据还是动态数据。传统数据库处理静态数据。要处理动态数据，你需要利用流处理平台。在开源世界中，这通常意味着要去拜访一下
    [Apache 基金会](https://apache.org/)。Apache 生态系统包含几个相关的项目，例如 [Apache Spark Streaming](https://spark.apache.org/streaming/)、[Apache
    Flink](https://flink.apache.org/)、[Apache Kafka](https://kafka.apache.org/) 和
    [Apache Storm](https://storm.apache.org/)。组织主要使用流处理平台来支持实时决策并满足低延迟需求。


    解释我提到的这些 Apache 平台中该使用哪一个，可能需要一本专门的书籍。话虽如此，你可能已经注意到 Eclipse Hono 和 Eclipse Ditto
    与 Kafka 有开箱即用的集成。这很可能是一个很好的起点。其他 Eclipse 项目提供了与企业应用程序的不同集成点。例如，Eclipse Amlen MQTT
    代理提供了一个[与 Java 消息服务（JMS）规范兼容的消息系统的桥接](https://www.eclipse.org/amlen/docs/Developing/devjms_working.html)。^(⁶⁷)


    在许多情况下，物联网部署会同时依赖多个数据库来满足不同的需求。例如，原始传感器数据通常存储在历史数据库中以便安全保管。许多组织会利用此类数据库作为机器学习和分析的数据源。


    注意


    历史数据库是一种专门为存储运营过程数据而开发的时间序列数据库。与其他类型的数据库相比，它们提供了更强的数据捕获、验证和聚合能力。它们通常具有内置的数据压缩功能。大多数工业自动化专家使用术语“标签”来指代过程数据流。这指的是在计算机用于自动化工业流程之前，用于手动捕获数据的仪器上的物理标签。顾名思义，历史数据库中的记录在初始插入后不会被更新。


    大多数物联网设备收集的数据具有很高的粒度，这在工厂外部通常是不必要的。因此，任何物联网解决方案设计的一个重要部分是弄清楚哪些值从业务角度来看是有意义的，以及它们合适的刷新率是多少。


    Eclipse 基金会生态系统包含几个涉及数据管理和分析的项目。最著名的是 Eclipse Streamsheets，我现在将详细介绍它。

    '
- fmt: '### Eclipse Streamsheets


    Eclipse Streamsheets is a platform providing server-based spreadsheets that consume,
    process, and produce live data streams. The project was contributed to the Eclipse
    Foundation in 2020 by [Cedalo](https://cedalo.com/), a German startup that also
    supports the development of the Eclipse Mosquitto MQTT broker. Streamsheets is
    written in JavaScript and runs on the Node.js runtime. The code is published under
    the Eclipse Public License version 2.0.


    The official web resources for Streamsheets are as follows:


    - **Website:** [`https://docs.cedalo.com/Streamsheets/2.5/installation/`](https://docs.cedalo.com/streamsheets/2.5/installation/)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.Streamsheets`](https://projects.eclipse.org/projects/iot.streamsheets)

    - **Repository:** [`https://github.com/eclipse/Streamsheets`](https://github.com/eclipse/streamsheets)


    Streamsheets can consume data streams independently of their origin. By default,
    the open source edition can connect using the following protocols: MQTT, REST,
    and SMTP/IPOP3 (email). Streamsheets can also connect to MongoDB databases and
    Apache Kafka instances. Additional options are available in Cedalo’s commercially
    supported edition.


    In Streamsheets, data flows are processed, analyzed, and visualized entirely through
    no-code spreadsheets called, you guessed it, Streamsheets. Naturally, you can
    rely on an array of common spreadsheet formulas to model and format the data.
    The spreadsheets are recalculated whenever a new message arrives; you can also
    refresh them on a schedule. Consequently, the conditions and formulas found in
    the spreadsheets are reevaluated frequently, which means that the visualizations
    they contain are updated in real time. If desired, it is possible to pause the
    spreadsheet to keep it frozen at a specific moment.


    While easy to use, Streamsheets offers comprehensive security. It can connect
    to streams over TLS when the underlying protocol supports it and defines user
    roles that protect the integrity of the spreadsheets. Users with the developer
    role can create new streams and spreadsheets; users with the viewer role can only
    view what others have built. Of course, there is an admin role with access to
    everything.


    Streamsheets’ user interface mimics popular web spreadsheet services and will
    be easy to pick up by users of desktop spreadsheet software as well. Figure [13-5](#524096_1_En_13_Chapter.xhtml#Fig5)
    captures Streamsheets’ user interface displaying a live spreadsheet.


    ![](images/524096_1_En_13_Chapter/524096_1_En_13_Fig5_HTML.jpg)


    A spreadsheet of a wind turbine dashboard displays incoming MQTT data; power;
    arrival time; a table updated with interval, energy production, and unit; and
    graphs of current power output and aggregated energy production.


    **Figure 13-5** Eclipse Streamsheets user interface


    ### Getting Started with Streamsheets


    Streamsheets is offered as a set of containers that can run everywhere the Docker
    engine is supported. The project team recommends a quad-core processor and 4 GB
    of RAM for acceptable performance. Container images are also available for the
    Raspberry Pi. The minimum requirement is a model 3B equipped with 1 GB of RAM
    and 4 GB of storage; the recommended configuration is a model 4B with 2 GB of
    RAM and at least 10 GB of storage. Your Pi needs to run a 32-bit operating system.


    Getting the containers up and running is easy. First, you need to execute the
    Cedalo installer. On Linux, execute this command:


    ```

    docker run -it -v ~/cedalo_platform:/cedalo cedalo/installer:2-linux

    ```


    The command looks like this for macOS:


    ```

    docker run -it -v ~/cedalo_platform:/cedalo cedalo/installer:2-macos

    ```


    Finally, this is the command on Windows:


    ```

    docker run -it -v C:\cedalo_platform:/cedalo cedalo/installer:2-win

    ```


    In all three cases, you will get a prompt like this one:


    ```

    ? Select what to install › - Space to select. Return to submit

    ◉   Management Center for Eclipse Mosquitto

    ◉   Eclipse Streamsheets

    ◉   Eclipse Mosquitto 2.0

    ◯   Eclipse Mosquitto 1.6

    ```


    At a minimum, you should install Mosquitto 2.0 and Streamsheets. The Management
    Center will be useful if you wish for a powerful graphical interface for the Mosquitto
    broker but can be removed for resource-constrained environments. Move the cursor
    to whichever component you do not want to install and press space to remove it.
    Press return (enter) when you are ready to start the installation.


    After a few minutes, the container images should be on your machine. Behind the
    scenes, the Cedalo installer relies on Docker Compose. Once the command prompt
    returns, you can move to the `cedalo_platform` folder and execute the startup
    script. On Linux and macOS, you need to issue the following commands:


    ```

    cd ~/cedalo_platform

    sh start.sh

    ```


    On Windows, the commands are rather:


    ```

    cd C:\cedalo_platform

    start.bat

    ```


    As soon as the containers run, you can access Streamsheets at the following URL:
    `http://localhost:8081`. The default credentials are `admin` for the user and
    `1234` for the password. You should change the latter as soon as possible.


    Footnotes [1](#524096_1_En_13_Chapter.xhtml#Fn1_source) [2](#524096_1_En_13_Chapter.xhtml#Fn2_source)'
