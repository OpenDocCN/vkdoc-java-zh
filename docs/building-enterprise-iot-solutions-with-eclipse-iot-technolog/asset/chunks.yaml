- fmt: '# Quality of Service


    Rather than the basic reliability mechanisms found in CoAP, MQTT offers [three
    levels of delivery guarantees](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901234)
    between a single sender and a single receiver. Those three levels of delivery
    guarantees are as follows:


    - **At most once (QoS 0):** The message is delivered on a best-effort basis. The
    receiver will get the message once or not at all. Message loss can occur; the
    sender will not retry to send the message. The receiver will not send a response.
    This level is appropriate when data loss is acceptable, such as when reporting
    sensor readings in a non-mission-critical context.

    - **At least once (QoS 1):** The message is delivered once at a minimum, but duplicates
    can occur. This level works well when you need guaranteed delivery but do not
    mind receiving multiple copies of the same message.

    - **Exactly once (QoS 2):** The message will be delivered only once. However,
    the latency is not guaranteed; the message could be delayed for minutes or even
    hours due to congestion, networking issues, or outages on the client or broker
    side.


    Publishers and subscribers specify their quality of service independently from
    each other. When the two do not match, the broker will downgrade the quality of
    service for the whole interaction. If a client publishes with QoS level 2 to a
    topic, subscribers who specified QoS level 1 in their subscription will receive
    the message at least once. In other words, it is possible subscribers get duplicates
    of the message even though it was published with the “exactly once” delivery guarantee.


    Under QoS 1 and 2, if subscribing clients are offline for an extended time, queued
    messages will accumulate on the broker. In high-throughput environments, this
    means the memory and storage resources available to the broker could be overwhelmed.
    The MQTT specification does not specify how long queued messages should be kept
    – although MQTT v5 introduces a message expiry property. However, you can configure
    most brokers to enforce limits on the resources dedicated to queued messages.
    [Eclipse Mosquitto](https://mosquitto.org/man/mosquitto-conf-5.html), for example,
    can limit the number of queued messages or the number of bytes allocated to queued
    messages. Messages above those thresholds will be dropped silently. You can also
    impose a hard limit on Mosquitto’s memory use, which will result in dropped messages
    and disconnected clients if exceeded.


    Overall, higher quality of service increases latency and resource consumption,
    limiting the overall scalability of the infrastructure. Only select QoS 1 or 2
    if you need their benefits.


    # Publish and Subscribe


    When MQTT clients wish to publish a message, subscribe to a topic, or unsubscribe,
    they send specific packets.


    To publish, clients need to send a `PUBLISH` packet. The most common properties
    for this packet are as follows:


    - **packetId:** Unique identifier for a message. It is used in the context of
    delivery guarantees and will often be set for you by the MQTT client library or
    broker.

    - **topicName:** Full name of the topic the message is published to.

    - **qos:** A number between 0 and 2. It indicates the quality of service level
    for the message.

    - **retainFlag:** Flag indicating whether the message will be saved as the last
    value for a specific topic. I will discuss retained messages later.

    - **payload:** The actual content of the message. The MQTT specification states
    that the maximum message size is 268,435,456 bytes, which translates to 256 mebibytes
    (MiB) or 268 megabytes (MB). However, such large message sizes are not practical,
    and you should stick to slimmer payloads if you wish your solution to scale.

    - **dupFlag:** Indicator for whether the message is a duplicate or not. This is
    only relevant to specific delivery guarantees. The MQTT client library or broker
    will handle it.


    Under QoS level 1, the sender will store the message until it gets a `PUBACK`
    packet back acknowledging delivery. Correlation between the `PUBLISH` and `PUBACK`
    packets relies on the `packetId` property. However, `PUBLISH` packets will only
    be resent if the current TCP connection breaks and a new one is established. Clients
    can process the messages they receive under QoS level 1 immediately.


    The flow for QoS level 2 is more complex. Once again, the `packetId` property
    of the original `PUBLISH` packet is used for correlation. Packet identifiers are
    unique between a specific client and a broker in the scope of any particular interaction.
    They can be reused once the interaction has concluded. The maximum value for the
    `packetId` property is 65535, and 0 is not allowed.


    Publishing a message under QoS 2 involves the following four steps:


    1. The sender transmits a `PUBLISH` packet with the `qos` property set to 2. It
    will store it until step 2 is completed.

    2. The receiver gets the `PUBLISH` packet and processes it. It stores the `packetId`
    and replies with a `PUBREC` packet to acknowledge reception. The `PUBLISH` packet
    will be resent with the `dupFlag` set to `true`, but only if the current TCP connection
    breaks and a new one is established.

    3. The sender discards its copy of the `PUBLISH` packet upon reception of the
    `PUBREC`. The sender stores the `PUBREC`. The sender transmits a `PUBREL` packet
    to authorize processing (release) of the `packetId`. The `PUBREL` will also be
    resent on session startup if a `PUBCOMP` hadn’t been received before the connection
    was closed.

    4. Upon reception of the `PUBREL`, the receiver discards the `packetId` and replies
    with a `PUBCOMP` (complete) packet. Any duplicate `PUBLISH` packet received until
    the receiver gets the `PUBREL` will not be processed. When the sender receives
    the `PUBCOMP`, it discards all the state information related to the interaction.
    At this point, the `packetId` can be reused for a new interaction.


    To subscribe, clients need to send a `SUBSCRIBE` packet. Such packets enable you
    to specify a list of topic filters to subscribe to and, for each topic filter,
    a distinct level of quality of service. `SUBSCRIBE` packets also contain a `packetId`
    property, like `PUBLISH` packets.


    The broker will process each requested subscription when it receives a `SUBSCRIBE`
    packet. Once done, it will send a `SUBACK` acknowledgment packet to the client.
    This message will contain the same `packetId` as in the `SUBSCRIBE` packet for
    correlation purposes. It will also feature a list of return codes for each of
    the subscriptions requested – in the same order. Table [4-1](#524096_1_En_4_Chapter.xhtml#Tab1)
    lists the codes and their meanings.


    **Table 4-1** MQTT subscription return codes


    | Return Code | Meaning |

    | --- | --- |

    | 0 | Subscription successful; maximum QoS level is 0 |

    | 1 | Subscription successful; maximum QoS level is 1 |

    | 2 | Subscription successful; maximum QoS level is 2 |

    | 128 | Subscription failed |


    Subscription failures usually stem from malformed topic names or the lack of proper
    access rights.


    Clients can unsubscribe from any topic at any time by sending an `UNSUBSCRIBE`
    packet to the broker. `UNSUBSCRIBE` packets contain a `packetId` and a list of
    topics to unsubscribe from. The broker will send back a `UNSUBACK` packet having
    the same `packetId` to acknowledge the unsubscribe request.'
