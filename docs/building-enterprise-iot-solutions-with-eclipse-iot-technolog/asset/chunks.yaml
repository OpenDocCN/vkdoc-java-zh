  trans: '

    ### 边缘到云连续体


    如果边缘节点无处不在，那么边缘本身又在哪里？如果你在互联网上搜索这个问题的答案，你会找到几种不同的说法。表 11-1 列出了其中一些答案。对于每种类型，我列出了数据源与处理节点之间的典型延迟和距离。


    表 11-1


    常见的边缘类型


    | 边缘类型 | 延迟 | 距离 |

    | --- | --- | --- |

    | 微边缘 | 低于 1 毫秒 | 几厘米到 15 米 |

    | 深边缘 | 2 到 5 毫秒 | 低于 1 公里 |

    | 元边缘 | 低于 10 毫秒 | 低于 50 公里 |

    | 雾计算 | 10–20 毫秒 | 超过 50 公里 |

    | 多接入边缘计算 (ETSI) | 10–20 毫秒 | 100 公里 |

    | 远边缘 | 20–50 毫秒 | 500 公里 |


    现在，你可能会问自己，这些中哪一个才是*真正*的边缘。套用一位著名绝地武士的话来说，从某种角度来看，它们*都*是真实的。它们的主要缺点在于都局限于某种特定的边缘计算实现方式。因此，Eclipse
    基金会的边缘原生工作组采用了不同的世界观。对他们和我来说，边缘设备是沿着边缘到云连续体部署的。它们所运行的应用程序也是如此。


    边缘原生应用程序本质上是分布式的。它们通常包含三个不同的平面。这些平面如下：


    *   **数据平面：** 包括网络、计算和存储资源，用于根据从控制平面接收到的命令来管理数据。


    *   **控制平面：** 决定数据平面在接收数据时如何处理和响应数据。


    *   **管理平面：** 配置每个资源。它还监控并维护它们的状态。


    请注意，这些定义并非我的发明，而是取自 [RFC 7426](https://tools.ietf.org/html/rfc7426)，该文档专注于软件定义网络（SDN）的术语。


    边缘原生应用程序的组件独立于它们所属的平面，部署在整个边缘到云连续体中。图 11-1 展示了这一现实情况。


    ![](img/524096_1_En_11_Fig1_HTML.jpg)


    一幅插图展示了从边缘到云的计算机资源、服务器和存储以及物理位置。物理位置包括现场部署、接入传输、区域和全球。


    图 11-1


    边缘到云连续体（来源：Eclipse 基金会）


    该图突出了边缘原生应用与云原生应用的第一个区别：它们与物理位置的关系。对于云应用来说，资源的确切物理位置无关紧要。当然，像可用区这样的概念是以粗粒度方式指代地理位置的。然而，作为一名云开发者，如果你的目标是将代码部署在加拿大东部，你不会关心服务器是在蒙特利尔、魁北克市还是希库蒂米。另一方面，边缘原生应用则完全关乎位置。你部署边缘节点是为了聚合来自*这栋*建筑、*这个*工厂或*这座城市*的数据。可以说，如果你关心计算或存储资源的精确位置，那么你就是在做边缘计算。


    ### 是什么让边缘与众不同？


    在第 1 章中，我列出了一些理由，激励你在项目中利用边缘计算。这些理由如下：


    *   优化带宽使用

    *   降低延迟

    *   支持数据主权

    *   实现异常报告


    我不会在此详细重述。只需说它们适用于大多数企业物联网部署，尤其是那些需要满足关键任务和实时要求的部署。优化带宽使用至关重要，因为它既昂贵又稀缺。


    在比较边缘计算项目与 IT 项目时，还需要考虑一些额外因素。


    *   **生命周期：** 像受限设备一样，边缘节点通常部署在难以到达的位置。无论它们是受你直接控制还是属于服务提供商，这一点都适用。因此，耐用性是一个重要的考虑因素，底层硬件组件的长期可用性也是如此。


    *   **异构性：** 边缘节点通常需要承载受益于甚至需要特定硬件的专业化工作负载。例如，人工智能极大地受益于能够减少处理时间和功耗的加速器。控制逻辑和传感器融合涉及在普通
    IT 设备中不常见的现场总线，例如 Modbus 和 Canbus。这意味着边缘节点的硬件配置可能因其在基础设施中的角色而有很大差异。因此，你需要考虑各种各样的处理器架构、外设和网络技术。


    *   **物理约束：** 你在现场部署的任何设备都必须面对温度、湿度、振动、灰尘和许多其他威胁。这自然会影响硬件的性能和耐用性。例如，过高的温度可能导致处理器或其他组件发生热节流。软件也需要适应这种不利条件。例如，传感器读数可能需要根据当前环境因素进行校正。


    *   **连接性：** 边缘计算作为一种分布式计算形式，完全受制于网络。你必须假设网络随时可能降级或故障，并据此架构你的服务。对不可靠网络的容忍度是高质量边缘计算实现的关键特征。这并非理所当然，需要对基础设施和软件组件进行精心设计和部署。然而，市场上最好的边缘计算平台会让事情变得稍微容易一些。


    注意


    我的弟弟在一家大型网络基础设施供应商工作，其名字与 Crisco 押韵。他讨厌我说我们不应该信任网络。然而，事实是，你唯一注意到网络的时候就是它出故障的时候。

    '
- fmt: '### What Are Edge Native Applications?


    At this point, we have enough perspective to take a stab at a formal definition
    for Edge Native applications. They are essentially microservice-based distributed
    applications with specific characteristics. Those characteristics include the
    following:


    - **Optimized for field use:** Since they often run on constrained hardware, Edge
    Native applications are optimized for size and power consumption from the get-go.

    - **Resilient:** Edge Native applications assume that individual nodes, complete
    services, and even the network may experience a catastrophic failure at any time.

    - **Adapted to mobility:** Edge Native applications not only connect to mobile
    (cellular) networks but can also be deployed on nodes onboard all sorts of vehicles.
    This means they are not only location-aware but can leverage location-based routing
    when needed.

    - **Orchestrated:** The components of Edge Native applications are often deployed
    inside containers, but virtual machines, serverless functions, and binaries can
    also be involved. The life cycle of all these deployment artifacts must be carefully
    orchestrated, whether to scale up or down certain services or to stage incremental
    updates involving a subset of the nodes.

    - **Zero Trust security model:** Applied to Edge Native applications, the Zero
    Trust model implies that, by default, no device is trusted. This implies systematic
    device authentication and authorization while limiting the scope and timeframe
    of the access granted. Data protection also plays an important role in the model,
    meaning it should be encrypted in motion and at rest.

    - **Zero Touch onboarding:** Edge Native applications require credentials for
    authentication, authorization, and even device attestation. The latter involves
    using certificates or similar means to prove a device’s unique identity and trustworthiness.
    Manual interventions to deploy credentials on devices pose a significant security
    risk. Zero Touch onboarding means that such credentials can be deployed from a
    central location as soon as a device connects to the network. This tremendously
    simplifies the process of deploying infrastructure at a large scale since human
    interventions are reduced to a minimum. Deployment costs are also significantly
    lower, given that the process is streamlined and automated.


    Many of the characteristics I just presented involve a certain level of complexity.
    Edge computing platforms can relieve developers from part of the burden since
    they can rely on platform features rather than implementing the logic themselves.
    Moreover, since they offer generic implementations of common features, the platforms
    can drive the adoption of specific software development patterns for developers
    of all skill levels across industries. Edge computing platforms allow you to learn
    software development for the Edge in a structured way.


    ## The Need for EdgeOps


    DevOps transformed the way we build, deploy, and operate applications. Like Agile,
    one of its inspirations, DevOps is an umbrella term for a loosely related set
    of practices that most organizations tweak and shape according to their culture
    and priorities. The main goal of DevOps is to shorten the development life cycle
    through continuous delivery. To achieve this, it strives to break the traditional
    division of labor between developers and system administrators (operators). In
    some organizations, this was implemented by merging teams of developers and administrators;
    in others, distinctions between functions were maintained, but barriers to collaboration
    were eliminated.


    At the technical level, DevOps favors microservices deployed in containers; those
    containers are built by continuous integration pipelines and, through continuous
    deployment, made available to end users almost immediately. The goal is to avoid
    the past operational models, which were characterized by the infrequent deployment
    of large releases of monolithic software components. DevOps, on the other hand,
    emphasizes the incremental delivery of small changes in real time. If you use
    any modern software-as-a-service (SaaS) web platform, you probably were invited
    to reload the page to benefit from new features at some point. This is a visible
    hint of DevOps in action behind the scenes.


    EdgeOps also relies on container-based microservices as well as continuous integration.
    However, differences appear in the deployment model. Continuous deployment is
    not desirable or even possible for many edge computing use cases, such as connected
    vehicles, industrial automation, and patient monitoring. Generally, use cases
    involving mission-critical and real-time requirements rely on cautious, incremental
    deployment models for software updates. In addition, since there is little to
    no elasticity at the Edge, new releases are carefully tested for performance and
    power consumption before being pushed to production nodes. Direct over-the-air
    (OTA) updates are sometimes impossible since the nodes operate in “air-gapped”
    environments that are not connected directly to the public Internet or the corporate
    network. In such cases, deploying a new version of a software component requires
    dispatching personnel on-site; nodes will then be updated one by one or through
    an OTA service present in the local environment. Suffice to say that update velocity
    is typically much lower at the Edge. In that regard, it is much closer to operational
    technology than information technology.


    EdgeOps is an evolution of DevOps that considers the IT challenges edge computing
    addresses and the specific characteristics of edge computing solutions. In other
    words, it is DevOps but tweaked to support Edge Native applications. Like DevOps,
    it is a set of practices; however, such practices are reflected in the feature
    set of best-of-breed edge computing platforms.'
  raw: '### What Are Edge Native Applications?


    At this point, we have enough perspective to take a stab at a formal definition
    for Edge Native applications. They are essentially microservice-based distributed
    applications with specific characteristics. Those characteristics include the
    following:


    *   **Optimized for field use:** Since they often run on constrained hardware,
    Edge Native applications are optimized for size and power consumption from the
    get-go.


    *   **Resilient:** Edge Native applications assume that individual nodes, complete
    services, and even the network may experience a catastrophic failure at any time.


    *   **Adapted to mobility:** Edge Native applications not only connect to mobile
    (cellular) networks but can also be deployed on nodes onboard all sorts of vehicles.
    This means they are not only location-aware but can leverage location-based routing
    when needed.


    *   **Orchestrated:** The components of Edge Native applications are often deployed
    inside containers, but virtual machines, serverless functions, and binaries can
    also be involved. The life cycle of all these deployment artifacts must be carefully
    orchestrated, whether to scale up or down certain services or to stage incremental
    updates involving a subset of the nodes.


    *   **Zero Trust security model:** Applied to Edge Native applications, the Zero
    Trust model implies that, by default, no device is trusted. This implies systematic
    device authentication and authorization while limiting the scope and timeframe
    of the access granted. Data protection also plays an important role in the model,
    meaning it should be encrypted in motion and at rest.


    *   **Zero Touch onboarding:** Edge Native applications require credentials for
    authentication, authorization, and even device attestation. The latter involves
    using certificates or similar means to prove a device’s unique identity and trustworthiness.
    Manual interventions to deploy credentials on devices pose a significant security
    risk. Zero Touch onboarding means that such credentials can be deployed from a
    central location as soon as a device connects to the network. This tremendously
    simplifies the process of deploying infrastructure at a large scale since human
    interventions are reduced to a minimum. Deployment costs are also significantly
    lower, given that the process is streamlined and automated.


    Many of the characteristics I just presented involve a certain level of complexity.
    Edge computing platforms can relieve developers from part of the burden since
    they can rely on platform features rather than implementing the logic themselves.
    Moreover, since they offer generic implementations of common features, the platforms
    can drive the adoption of specific software development patterns for developers
    of all skill levels across industries. Edge computing platforms allow you to learn
    software development for the Edge in a structured way.


