    *Avec tout ce que je sais, on pourrait faire un livre... il est vrai qu''avec
    tout ce que je ne sais pas, on pourrait faire une bibliothèque.*


    *With everything I know, I could create a book... and with everything I know not,
    I could create a library.*


    *—* *Sacha Guitry, Le KWTZ, in Pièces en un acte*


    *This book is dedicated to the contributors, committers, and project leads of
    the Eclipse Foundation. Without your dedication and commitment to open source,
    this book would not exist.*


    # Introduction


    It is 1985. A few weeks ago, my father brought a computer from his office. It
    is an IBM Portable Personal Computer, model 5155. Portable is relative here; the
    machine weighed 13.6 kg (30 pounds). My father set it up in the unfinished basement
    of our home, on an old kitchen table. Even by the standards of the day, the machine
    is underpowered. The simple BASIC programs I wrote barely kept busy its puny 4.77
    MHz 8088 CPU. The built-in 256 KB of RAM was plenty. My IT career was over ten
    years in the future.


    It is 2015. A few weeks ago, I bought my first Arduino and a few sensors. I set
    up the board on my desk. Compared to my desktop computer, with its 3.2 GHz 6-core
    CPU and 128 gigabytes of RAM, the little Arduino is hopelessly outclassed. And
    yet, it is without a doubt the most exciting of the two. The Python programs I
    write for it are simple. Its 16 MHz 8-bit processor is more capable than the 8088
    in the old IBM but can access only 2 KB of RAM. The hardware constraints are severe,
    but the possibilities are endless.


    Between those two moments in my life, the Internet happened. Or rather, it escaped
    the realms of Defense and Academia to transform our lives completely. At first,
    its impact was limited to our computers; then, it spread its influence on our
    phones. Nowadays, it is everywhere. Wherever you go, you will find connected devices
    that gather data and interact with the physical world. We call this the *Internet
    of Things* (IoT). This trend is genuine; it is there to stay. This book aims to
    give you the tools and knowledge your organization needs to capitalize on it.


    ## Why IoT Is Relevant


    No business is purely virtual. The Cloud itself is the aggregation of millions
    of servers spread in data centers located worldwide. Those data centers are under
    constant monitoring. Sensors for temperature, humidity, air quality, and vibrations
    ensure the equipment operates in optimal conditions. Surveillance cameras and
    other security systems keep intruders away. So even if your organization focuses
    strictly on delivering digital services, it will still benefit from the IoT. The
    reason for this is simple: our world now revolves around data.


    Your organization needs data to make better decisions, whether the decider is
    artificial intelligence or a human being. Your organization needs data to support
    the automation of its processes and improve your quality of life at work. Finally,
    your organization needs data to become more efficient and effective. IoT represents
    a tool to reach that data. In the words of Marco Carrer, CTO at Eurotech, *“There
    is a tremendous amount of data that’s actually trapped in the field and why IoT
    matters is because it enables the extraction of data.”* ^([¹](#fn1))


    This data, previously, was hard to reach or not reachable at all. What made it
    accessible is the tremendous affordability and miniaturization of computing devices.
    My little Arduino, which cost about $20 (Canadian!) in 2015, was an order of magnitude
    cheaper than the computer I messed around with back in 1985. Moreover, the Arduino
    is much more power efficient, making it suitable for all sorts of deployment scenarios.


    ## IoT: For All Industries and Use Cases


    The proliferation of low-power, affordable, and connected devices means that you
    can build IoT solutions for a wide variety of industries and horizontal use cases.


    From an industry perspective, the 2021 edition of the *Eclipse IoT and Edge Developer
    Survey* ^([²](#fn2)) found that Industrial Automation, Agriculture, Building Automation,
    Energy Management, and Smart Cities were the respondents'' top five industry focus
    areas. These industries have in common the need for automation at a large scale
    and the potential to benefit from machine learning and artificial intelligence.
    In a factory, sensors placed on machines can gather the data needed to schedule
    preventive maintenance and prevent equipment breakdowns, for example. On a farm,
    video analytics can provide insights into the health of animals, while sensors
    can detect issues affecting crop growth. The examples are endless.


    There are also many IoT horizontal use cases. Edge AI, where developers deploy
    models on servers as close to the source of the data as possible – if not on the
    IoT devices themselves – is the most cited example. But control logic, data exchange,
    and sensor fusion are other important ones. Event stream processing, which can
    serve in algorithmic securities trading, fraud detection, location-based services,
    and many other applications, is another generic use case that significantly benefits
    from the wealth of data available through IoT devices.'
