  trans: "\n#### Raspberry Pi Pico\n\n虽然 Raspberry Pi 单板计算机备受关注，但 Pi Pico 也是一款广受欢迎且文档完善的微控制器。它搭载了\
    \ Raspberry Pi 自主研发的 [RP2040 芯片](https://www.raspberrypi.com/documentation/microcontrollers/rp2040.html%2523welcome-to-rp2040)。该芯片配备了两个运行频率为\
    \ 133 MHz 的 Arm Cortex-M0+ 内核、264 KB 的 SRAM，并支持通过专用总线连接高达 16 MB 的片外 Flash 存储。该微控制器提供\
    \ 2 个 UART、2 个 SPI 控制器、2 个 I²C 控制器和 16 个 PWM 通道。此外，还包含一个低分辨率温度传感器。\n\n[Raspberry\
    \ Pi Pico](https://www.raspberrypi.com/documentation/microcontrollers/raspberry-pi-pico.html)\
    \ 开发板配备 2 MB Flash，并引出 26 个 GPIO 引脚，其中 3 个支持 ADC 功能。尽管 RP2040 微控制器是专有产品，但 Pi Pico\
    \ 开发板的设计文件是开源的。市面上已有多个第三方厂商推出了同样使用该芯片的开发板。\n\n脚注 1   2   3   4   5\n\n# 9. 连接性\n\
    \n> *Nos vies sont faites de tout un réseau de voies inextricables, parmi lesquelles\
    \ un instinct fragile nous guide, équilibre toujours précaire entre le cœur et\
    \ la raison.*\n\n> *我们的生命由一张错综复杂的路径网络构成，其中一种脆弱的直觉引导着我们，那是在心灵与理智之间永远微妙的平衡。*\n>\
    \ \n> —乔治·多尔，《雪，爱》……\n\n网络是任何物联网或边缘计算解决方案的核心。毕竟，连接性正是物联网区别于传统嵌入式计算的关键所在。为特定部署选择并实施正确的网络类型，其复杂性远超表面所见。L\
    \ Peter Deutsch 及其在 Sun Microsystems 的同事早在 20 世纪 90 年代就指出了潜在陷阱，即如今众所周知的[分布式计算的谬误](https://en.wikipedia.org/wiki/Fallacies_of_distributed_computing)。列表如下：\n\
    \n1.  网络是可靠的。\n\n2.  延迟为零。\n\n3.  带宽是无限的。\n\n4.  网络是安全的。\n\n5.  拓扑结构不会改变。\n\n\
    6.  只有一个管理员。\n\n7.  传输成本为零。\n\n8.  网络是同构的。\n\n由于物联网和边缘计算设备位于云或企业数据中心的边界之外，你可能已经预料到网络不可靠且带宽有限`–`除非你才刚刚入门。此外，你可能也没指望延迟为零，因为边缘计算基础设施的目标之一就是降低延迟。尽管如此，其余谬误仍然相关。安全性仍然是一个巨大挑战，网络拓扑会随时间变化，存在多个管理员，并且网络不会是同构的。\n\
    \n在本章中，我将探讨多种可用于实际部署的网络技术。之后，我将分享网络设计方面的考量。最后，我们将查看一些针对 Zephyr RTOS 的代码。\n\n##\
    \ 连接选项\n\n将你的受限设备连接到网络有多种选择。其中一些直接支持 TCP/IP，这意味着设备理论上可以直接连接到互联网。蜂窝连接、Wi-Fi 和一些窄带选项就属于这种情况。其他技术不支持\
    \ TCP/IP，因此你需要部署一个网关来桥接本地设备网络与互联网。当然，我之前介绍的一些更高级别的协议可以在非 IP 传输上运行，并且仍然支持互联网连接。\n\
    \n在本节中，我将介绍目前市场上最主流的几种替代方案。但如何为你的项目选择合适的技术呢？以下是一些需要考虑的因素：\n\n*   **硬件支持：** 是否有微控制器或网关在出厂时支持你考虑使用的技术？如果没有，市场上是否有射频模块可以与你计划使用的硬件集成？\n\
    \n*   **软件支持：** 你计划使用的 RTOS 或操作系统是否支持你选择的网络技术和特定射频模块？所需的库是专有的还是开源的？网络协议栈的成熟度如何？\n\
    \n*   **生态系统：** 你所评估的网络技术的供应商生态系统有多多样化？\n\n*   **覆盖范围：** 你需要多大的有效范围来支持你的用例？是以米、数百米还是公里为单位？\n\
    \n*   **数据速率：** 考虑到你将从设备发送和接收的数据量，你需要多大的数据速率？你是否需要支持涉及行人、骑行者、汽车或其他车辆的移动性用例？\n\n\
    *   **电池寿命：** 你的设备是否由电池供电？如果是，你的目标电池寿命是多少？\n\n*   **干扰：** 考虑到设备将部署的物理位置，你预计目标频段会有多少干扰？现场是否已经部署了使用相同技术或依赖相同频段的其他技术的设备？\n\
    \n*   **成本：** 与解决方案的其他方面相比，你可以在网络连接上投入多少资金？考虑到你的约束和要求，你计划使用的网络连接选项对开发时间、维护工作以及硬件和软件的生命周期有何影响？\n\
    \n最终，你可能需要做出妥协。现实世界可能很复杂，尤其是在涉及无线电技术时。\n"
- fmt: "### Bluetooth\n\nOf all the technologies listed in this section, only Ethernet\
    \ and Wi-Fi are as widespread as Bluetooth. Your phone, car, and laptop probably\
    \ integrate this wireless technology already. Bluetooth is under the stewardship\
    \ of the [Bluetooth Special Interest Group](https://www.bluetooth.com/). In Bluetooth,\
    \ devices communicate using low-power UHF radio waves on a frequency band between\
    \ 2.402 GHz and 2.483.5 GHz. This frequency band is globally unlicensed but regulated\
    \ for industrial, scientific, and medical use.^([^(41)](#fn41)) In its most widely\
    \ used mode, transmission power is capped at 2.5 milliwatts, resulting in a range\
    \ of up to 10 meters (33 feet).\n\n> **Note**  \n> The name *Bluetooth* refers\
    \ to 10th-century Danish King Harald Bluetooth. It was proposed in 1997 by Jim\
    \ Kardach of Intel, one of the founders of the Bluetooth SIG. Bluetooth was a\
    \ placeholder name intended to be replaced before commercialization, but trademark\
    \ issues got in the way. In any case, the name spread throughout the industry\
    \ before it could be changed. The lesson here is always to select the code names\
    \ of your projects carefully.\n\nThere are two types of Bluetooth technology:\
    \ Bluetooth Low Energy (LE) and Bluetooth Basic Rate/Enhanced Data Rate (BR/EDR).\
    \ Both types allow point-to-point connections between two devices. Both also operate\
    \ in the same frequency band, but Bluetooth LE is the more popular option. It\
    \ requires much less energy to operate and enables the creation of mesh networks.\
    \ Bluetooth LE data rates can reach 1 Mbit/s (up to Bluetooth 4) or 2 Mbit/s (in\
    \ Bluetooth 5), while BR/EDR can deliver up to 3 Mbit/s.\n\nBluetooth uses a radio\
    \ technology called frequency-hopping spread spectrum. It is packet based and\
    \ transmits each packet on one of 79 predefined channels. Each channel has a bandwidth\
    \ of 1 MHz. Bluetooth Low Energy channels use 2 MHz spacing, accommodating 40\
    \ channels. Moreover, Bluetooth relies on a main/follower architecture. In BR/EDR,\
    \ one main may communicate with up to seven followers to form a piconet: an *ad\
    \ hoc* network in Bluetooth parlance. BLE allows theoretically millions of devices\
    \ in a piconet, although going over a few hundred follower devices is impractical\
    \ since all followers share the same radio time to communicate with the main.\
    \ The main device in a piconet provides a clock used by the other devices as the\
    \ base for packet exchange. Once a piconet is established, its members hop radio\
    \ frequencies simultaneously to maintain the network and avoid interfering with\
    \ other piconets that may be nearby.\n\nBluetooth BR/EDR requires devices to be\
    \ paired. The pairing process establishes a trust relationship between the two\
    \ devices, which then can exchange data over an encrypted connection. Bluetooth\
    \ LE works differently. Pairing is possible but not mandatory. Bluetooth BLE devices\
    \ can make themselves detectable by others by broadcasting advertising packets.\
    \ This broadcast relies on three separate channels (frequencies) to reduce interference.\
    \ The advertising device transmits an advertising packet on at least one of the\
    \ three channels. It will repeat the transmission on a period called the *advertising\
    \ interval*. A delay of up to ten milliseconds is added to each advertising interval\
    \ to reduce the probability of multiple consecutive collisions. The actual duration\
    \ of the delay is determined randomly.\n\nBluetooth is a popular choice for short-range\
    \ connectivity in IoT solutions. It is available even in low-cost MCUs and supported\
    \ by all serious real-time operating systems. Remember, however, that Bluetooth\
    \ does not use TCP/IP, which reduces the range of protocols you can use over it.\
    \ However, it is possible to establish IPv6 connections over Bluetooth by leveraging\
    \ `6LoWPAN`. `6LoWPAN` is maintained by the IEFT and is documented in [RFC 4944](https://datatracker.ietf.org/doc/html/rfc4944).\
    \ It was updated by [RFC 6282](https://datatracker.ietf.org/doc/html/rfc6282)\
    \ (header compression) and [RFC 6775](https://datatracker.ietf.org/doc/html/rfc6775)\
    \ (neighbor discovery optimizations). `6LoWPAN` over Bluetooth BLE is covered\
    \ in [RFC 7668](https://datatracker.ietf.org/doc/html/rfc7668).\n\nOn the downside,\
    \ Bluetooth is known for well-documented privacy and security issues. Bluetooth\
    \ security supports authentication and encryption. However, poor implementations\
    \ are common, and the protocol is vulnerable to denial-of-service attacks, spamming,\
    \ and backdooring. Security researchers, in the past, focused their efforts to\
    \ identify Bluetooth vulnerabilities mostly on the pairing process. The increased\
    \ scrutiny of other parts of the protocol led to the discovery of additional weaknesses.\
    \ For example, in 2020, researchers from Purdue University uncovered issues in\
    \ the Bluetooth BLE reconnection process, which unfolds when a device moves out\
    \ of range and comes back online later. Many implementations make authentication\
    \ optional during device reconnection, and the authentication process can be circumvented\
    \ in specific circumstances.^([^(42)](#fn42)) You should thoroughly evaluate and\
    \ test the security features of any Bluetooth devices you will deploy."
