    | --- | --- | --- | --- | --- |

    | tinyAVR | 0.5–32 KB | 1.6–20 | 64–3072 bytes | 64–256 bytes |

    | megaAVR | 4–256 KB | 1.6–20 | 256–16384 bytes | 64–4096 bytes |

    | AVR Dx | 16–128 KB | 20–24 | 4–16 KB | 512 bytes |

    | XMEGA | 16–256 KB | 32 | 1–32 KB | 512–2048 bytes |


    Each of the series contains several products with different feature sets and characteristics.
    The following list highlights the differentiation factors for each series:


    *   **tinyAVR:** The ATtiny series is optimized for small package sizes and offers
    only limited peripherals.


    *   **megaAVR:** The ATmega series provides a wide range of I/O pins and more
    memory and storage.


    *   **AVR Dx:** The AVR Dx series contains multiple subseries focused on the conditioning
    of analog signals, functional safety, and human-computer interaction.


    *   **XMEGA:** The ATxmega series is the most powerful of the AVR family. The
    MCUs feature support for cryptography and offer analog-to-digital converters.


    The most well-known consumer of AVR MCUs is the popular line of Arduino boards
    from the namesake company. Most current and past Arduinos feature MCUs from the
    ATmega series. For example, the Arduino Uno is equipped with an ATmega328P, and
    the Uno WiFi Rev 2 features an ATmega4809\. The latter can run at up to 20 MHz
    and features 48 KB flash storage, 6 KB RAM, and 256 bytes of EEPROM.


    ### RISC-V: A Serious Challenger


    Introduced in 2010 by researchers at the University of California, Berkeley, the
    RISC-V architecture is an open standard. The documents for the instruction set
    architecture (ISA) are published under open source licenses, as were several core
    designs. The RISC-V Foundation was formed in 2015 to steward the evolution of
    the ISA; it relocated to Switzerland in 2019 to address concerns with US trade
    regulations and took the name [RISC-V International](https://riscv.org/exchanges/cores-socs/)
    as of March 2020.


    RISC-V International permits unrestricted use of the ISA in hardware and software.
    This posture resulted in significant adoption. As of March 2022, [111 different
    cores](https://riscv.org/exchanges/cores-socs/), 31 SOC platforms, and 12 SOCs
    were listed on the organization’s website. The actual market footprint of RISC-V
    is probably much higher since organizations will not necessarily publicize their
    use of the technology. It is worth mentioning that only members of RISC-V International
    have voting rights to approve changes and can use the trademarked compatibility
    logo.


    One important characteristic of the RISC-V ISA is its modularity. The base integer
    instruction set is available in 32-bit and 64-bit formats (RV32I and RV64I). There
    are drafts for a 32-bit embedded (16 registers, RV32E) and even a 128-bit version
    (RV128I). All other types of instructions are documented in ISA standard extensions.
    Those extensions typically have a single letter for their name, although most
    recent ones have a name starting with Z followed by an alphabetical name. Widely
    used examples of standard extensions are integer multiplication and division (M),
    atomic instructions (A), single-precision floating point (F), double-precision
    floating point (D), and control and status register (Zicsr). Standard extensions
    are designed to work with all the standard base instruction sets and do not conflict
    with each other. Designers of RISC-V cores can also create their own nonstandard
    extensions to the instruction set. Industry collaboration initiatives regarding
    user-defined extensions have also started to emerge. A good example is the [OpenHW
    CORE-V eXtension I/​F](https://docs.openhwgroup.org/projects/openhw-group-core-v-xif/en/core-v-xif_v0.2.0/intro.html),
    which aims to simplify the implementation of custom instructions and custom accelerators
    attached to or built into RISC-V cores. The RISC-V specification states that such
    extensions must have a name starting with “X” for user-level instructions and
    “SX” for supervisor-level ones.


    Given this, surveying the whole RISC-V landscape would be difficult. This is because
    implementers can design their chips from scratch, adopt one of the many open source
    cores available, or even license open source or commercial cores and add proprietary
    features. On the one hand, this makes the ecosystem diversified, with cores, MCUs,
    and SOCs available for integration in constrained devices, gateways, edge nodes,
    and, increasingly, desktop-class and server-class hardware. On the other hand,
    this makes it harder to provide a high-level picture of the market, given the
    products'' lack of common reference points. Nevertheless, there is a thriving
    ecosystem of RISC-V-based MCUs, and they are undoubtedly worth your consideration.


    In 2021, the [Eclipse IoT and Edge Developer Survey](https://outreach.eclipse.foundation/iot-edge-developer-2021)
    found that 9% of respondents used MCUs based on RISC-V technology. Even established
    players in the Arm market, such as Espressif, are announcing new products based
    on RISC-V.^([^(40)](#fn40))'
  trans: '

    ### AVR：Arduino 的核心


    Arm 从事的是授权业务。由于许多架构特性是可选的，你需要仔细阅读从特定供应商处采购的特定 MCU 的文档。而 Microchip 的 AVR 架构则要直接得多，因为该公司直接销售实际的
    MCU。


    注意


    AVR 长期以来一直被称为 Atmel AVR。Microchip 于 2016 年收购了 Atmel，并逐步停止使用该品牌。


    AVR 微控制器架构于 1997 年推出。到 2003 年，Atmel 已出货 5 亿颗芯片。2005 年流行的 Arduino 平台的推出，极大地加速了
    AVR 的市场普及。AVR 微控制器是改进型哈佛架构机器。程序和数据存储在不同的内存系统中，并呈现于不同的地址空间。然而，该架构提供了特殊的指令，使其能够从程序存储器中读取数据。


    AVR MCU 使用 8 位 RISC 处理器内核。通过引入新型号，其指令集随着时间的推移不断扩展。AVR 系列通常最高可运行在 20 MHz 时钟频率下，尽管特定型号可以达到
    32 MHz。当然，更高的时钟频率会导致更高的功耗。AVR 系列中的新型号配备了片上振荡器，从而无需外部时钟或谐振器电路。


    从存储角度来看，AVR MCU 可提供高达 256 KB 的内部可自编程指令闪存（XMEGA 上为 384 KB）和高达 4 KB 的内部数据 EEPROM。随机存取存储器最高可达
    16 KB（XMEGA 上为 32 KB）。特定型号还可提供 64 KB 的外部小端数据空间。表 8-2 概述了 AVR 系列中主要系列的特性。


    表 8-2


    AVR 系列主要系列的特性


    | 系列 | 闪存大小 | 时钟频率 (MHz) | SRAM | EEPROM |

    | --- | --- | --- | --- | --- |

    | tinyAVR | 0.5–32 KB | 1.6–20 | 64–3072 字节 | 64–256 字节 |

    | megaAVR | 4–256 KB | 1.6–20 | 256–16384 字节 | 64–4096 字节 |

    | AVR Dx | 16–128 KB | 20–24 | 4–16 KB | 512 字节 |

    | XMEGA | 16–256 KB | 32 | 1–32 KB | 512–2048 字节 |


    每个系列都包含多个具有不同功能集和特性的产品。以下列表突出了每个系列的差异化因素：


    *   **tinyAVR：** ATtiny 系列针对小封装尺寸进行了优化，仅提供有限的外设。

    *   **megaAVR：** ATmega 系列提供广泛的 I/O 引脚以及更多的内存和存储空间。

    *   **AVR Dx：** AVR Dx 系列包含多个子系列，专注于模拟信号调理、功能安全和人机交互。

    *   **XMEGA：** ATxmega 系列是 AVR 系列中最强大的。这些 MCU 支持加密功能，并提供模数转换器。


    AVR MCU 最著名的用户是同名公司广受欢迎的 Arduino 板系列。目前和过去的大多数 Arduino 都采用 ATmega 系列的 MCU。例如，Arduino
    Uno 配备的是 ATmega328P，而 Uno WiFi Rev 2 则采用 ATmega4809。后者最高可运行在 20 MHz，并配备 48 KB
    闪存、6 KB RAM 和 256 字节 EEPROM。


    ### RISC-V：一个严肃的挑战者


    RISC-V 架构由加州大学伯克利分校的研究人员于 2010 年提出，是一个开放标准。其指令集架构（ISA）的文档以及一些核心设计均在开源许可下发布。RISC-V
    基金会成立于 2015 年，负责管理 ISA 的演进；该基金会于 2019 年迁至瑞士，以解决对美国贸易法规的担忧，并于 2020 年 3 月更名为 [RISC-V
    International](https://riscv.org/exchanges/cores-socs/)。


    RISC-V International 允许在硬件和软件中不受限制地使用该 ISA。这一立场导致了其被广泛采用。截至 2022 年 3 月，该组织网站上列出了
    [111 个不同的内核](https://riscv.org/exchanges/cores-socs/)、31 个 SOC 平台和 12 个 SOC。RISC-V
    的实际市场足迹可能要高得多，因为组织不一定会公开其对该技术的使用情况。值得一提的是，只有 RISC-V International 的成员才拥有批准变更的投票权，并且可以使用商标兼容性标志。


    RISC-V ISA 的一个重要特性是其模块化。基础整数指令集有 32 位和 64 位两种格式（RV32I 和 RV64I）。还有针对 32 位嵌入式（16
    个寄存器，RV32E）甚至 128 位版本（RV128I）的草案。所有其他类型的指令都在 ISA 标准扩展中进行了说明。这些扩展通常使用单个字母作为名称，尽管最近的扩展名称以
    Z 开头，后跟字母名称。标准扩展的广泛使用示例包括整数乘法和除法（M）、原子指令（A）、单精度浮点（F）、双精度浮点（D）以及控制和状态寄存器（Zicsr）。标准扩展被设计为与所有标准基础指令集兼容，并且彼此之间不会冲突。RISC-V
    内核的设计者还可以创建自己的非标准指令集扩展。关于用户定义扩展的行业合作倡议也已开始出现。一个很好的例子是 [OpenHW CORE-V eXtension
    I/​F](https://docs.openhwgroup.org/projects/openhw-group-core-v-xif/en/core-v-xif_v0.2.0/intro.html)，它旨在简化附加到或内置于
    RISC-V 内核中的自定义指令和自定义加速器的实现。RISC-V 规范规定，此类扩展的名称必须以“X”开头（用于用户级指令）和“SX”开头（用于监管级指令）。


    鉴于此，全面审视整个 RISC-V 格局将是困难的。这是因为实现者可以从头开始设计他们的芯片，采用众多可用的开源内核之一，甚至许可开源或商业内核并添加专有功能。一方面，这使得生态系统多样化，拥有可用于集成到受限设备、网关、边缘节点以及日益增多的桌面级和服务器级硬件中的内核、MCU
    和 SOC。另一方面，由于产品缺乏共同的参考点，这使得提供市场的高层概况变得更加困难。尽管如此，基于 RISC-V 的 MCU 生态系统正在蓬勃发展，它们无疑值得你考虑。


    2021 年，[Eclipse IoT 和边缘开发者调查](https://outreach.eclipse.foundation/iot-edge-developer-2021)发现，9%
    的受访者使用了基于 RISC-V 技术的 MCU。即使是 Arm 市场的成熟参与者，如 Espressif，也在宣布基于 RISC-V 的新产品。^(⁴⁰)

