  trans: '

    ## 服务质量


    与 CoAP 中的基本可靠性机制不同，MQTT 在单个发送方和单个接收方之间提供了[三种交付保障级别](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901234)。这三种交付保障级别如下：


    *   **至多一次（QoS 0）：** 消息以尽力而为的方式交付。接收方可能会收到一次消息，也可能根本收不到。可能发生消息丢失；发送方不会重试发送消息。接收方不会发送响应。当数据丢失可以接受时，此级别是合适的，例如在非关键任务场景中报告传感器读数时。


    *   **至少一次（QoS 1）：** 消息至少交付一次，但可能出现重复。当你需要保证交付但不介意收到同一消息的多个副本时，此级别效果很好。


    *   **恰好一次（QoS 2）：** 消息将仅交付一次。但是，延迟无法保证；由于拥塞、网络问题或客户端或代理端的中断，消息可能会延迟几分钟甚至几小时。


    发布者和订阅者彼此独立地指定其服务质量。当两者不匹配时，代理将降低整个交互的服务质量。如果客户端以 QoS 2 级别向某个主题发布消息，那么在订阅中指定了
    QoS 1 级别的订阅者将至少收到一次该消息。换句话说，即使消息是以“恰好一次”的交付保障发布的，订阅者仍有可能收到重复的消息。


    在 QoS 1 和 2 下，如果订阅客户端长时间离线，排队的消息将在代理上累积。在高吞吐量环境中，这意味着代理可用的内存和存储资源可能会不堪重负。MQTT
    规范没有指定排队消息应保留多长时间——尽管 MQTT v5 引入了消息过期属性。但是，你可以配置大多数代理来对分配给排队消息的资源施加限制。例如，[Eclipse
    Mosquitto](https://mosquitto.org/man/mosquitto-conf-5.html) 可以限制排队消息的数量或分配给排队消息的字节数。超过这些阈值的消息将被静默丢弃。你还可以对
    Mosquitto 的内存使用施加硬性限制，如果超过该限制，将导致消息被丢弃和客户端断开连接。


    总的来说，更高的服务质量会增加延迟和资源消耗，从而限制基础设施的整体可扩展性。只有在需要其优势时才选择 QoS 1 或 2。


    ## 发布与订阅


    当 MQTT 客户端希望发布消息、订阅主题或取消订阅时，它们会发送特定的数据包。


    要发布消息，客户端需要发送一个 `PUBLISH` 数据包。此数据包最常见的属性如下：


    *   **packetId：** 消息的唯一标识符。它在交付保障的上下文中使用，通常由 MQTT 客户端库或代理为你设置。


    *   **topicName：** 消息发布到的主题的完整名称。


    *   **qos：** 一个介于 0 和 2 之间的数字。它表示消息的服务质量级别。


    *   **retainFlag：** 指示消息是否将被保存为特定主题的最后一个值的标志。我稍后将讨论保留消息。


    *   **payload：** 消息的实际内容。MQTT 规范规定最大消息大小为 268,435,456 字节，相当于 256 mebibytes (MiB)
    或 268 megabytes (MB)。然而，如此大的消息大小并不实用，如果你希望解决方案具有可扩展性，则应坚持使用更精简的有效载荷。


    *   **dupFlag：** 指示消息是否为重复消息的标志。这仅与特定的交付保障相关。MQTT 客户端库或代理将处理它。


    在 QoS 1 级别下，发送方将存储消息，直到收到确认交付的 `PUBACK` 数据包。`PUBLISH` 和 `PUBACK` 数据包之间的关联依赖于 `packetId`
    属性。但是，仅当当前 TCP 连接断开并建立新连接时，才会重新发送 `PUBLISH` 数据包。客户端可以立即处理它们在 QoS 1 级别下接收到的消息。


    QoS 2 级别的流程更为复杂。同样，原始 `PUBLISH` 数据包的 `packetId` 属性用于关联。在任何特定交互的范围内，数据包标识符在特定客户端和代理之间是唯一的。一旦交互结束，它们可以被重用。`packetId`
    属性的最大值为 65535，并且不允许使用 0。


    在 QoS 2 下发布消息涉及以下四个步骤：


    1.  发送方传输一个 `qos` 属性设置为 2 的 `PUBLISH` 数据包。它将存储该数据包，直到步骤 2 完成。


    2.  接收方获取 `PUBLISH` 数据包并处理它。它存储 `packetId` 并回复一个 `PUBREC` 数据包以确认接收。`PUBLISH` 数据包将以
    `dupFlag` 设置为 `true` 的方式重新发送，但仅当当前 TCP 连接断开并建立新连接时才会如此。


    3.  发送方在收到 `PUBREC` 后丢弃其 `PUBLISH` 数据包的副本。发送方存储 `PUBREC`。发送方传输一个 `PUBREL` 数据包以授权处理（释放）`packetId`。如果在连接关闭前未收到
    `PUBCOMP`，则在会话启动时也会重新发送 `PUBREL`。


    4.  收到 `PUBREL` 后，接收方丢弃 `packetId` 并回复一个 `PUBCOMP`（完成）数据包。在接收方收到 `PUBREL` 之前收到的任何重复的
    `PUBLISH` 数据包都不会被处理。当发送方收到 `PUBCOMP` 时，它会丢弃与该交互相关的所有状态信息。此时，`packetId` 可以用于新的交互。


    要订阅，客户端需要发送一个 `SUBSCRIBE` 数据包。此类数据包使你可以指定要订阅的主题过滤器列表，并为每个主题过滤器指定一个不同的服务质量级别。`SUBSCRIBE`
    数据包也包含一个 `packetId` 属性，就像 `PUBLISH` 数据包一样。


    当代理收到 `SUBSCRIBE` 数据包时，它将处理每个请求的订阅。完成后，它将向客户端发送一个 `SUBACK` 确认数据包。此消息将包含与 `SUBSCRIBE`
    数据包中相同的 `packetId` 以用于关联目的。它还将包含一个返回码列表，对应于每个请求的订阅——顺序相同。表 4-1 列出了这些代码及其含义。


    表 4-1


    MQTT 订阅返回码


    | 返回码 | 含义 |

    | --- | --- |

    | 0 | 订阅成功；最大 QoS 级别为 0 |

    | 1 | 订阅成功；最大 QoS 级别为 1 |

    | 2 | 订阅成功；最大 QoS 级别为 2 |

    | 128 | 订阅失败 |


    订阅失败通常源于主题名称格式错误或缺乏适当的访问权限。


    客户端可以随时通过向代理发送 `UNSUBSCRIBE` 数据包来取消订阅任何主题。`UNSUBSCRIBE` 数据包包含一个 `packetId` 和一个要取消订阅的主题列表。代理将发回一个具有相同
    `packetId` 的 `UNSUBACK` 数据包以确认取消订阅请求。

    '
- fmt: '# Connections and Sessions


    Before sending or receiving messages, MQTT clients need to establish a connection
    with a broker. MQTT connections are kept open until the client sends a disconnection
    message unless network issues break the connection. Because the connection is
    kept open, MQTT clients will connect to brokers even if placed behind NAT infrastructure.


    By default, brokers do not persist session information. This means subscribers
    need to reestablish their subscriptions every time they connect. For constrained
    devices, this is a waste of resources. Fortunately, the MQTT specification defines
    the concept of *persistent sessions*. When a client connects using a persistent
    session, the broker will keep track of all the subscriptions for that client.
    Moreover, it will store relevant messages when specific quality of service levels
    are involved:


    - QoS 1 or 2 messages published while the client was offline

    - QoS 1 or 2 messages published but not yet confirmed by the client

    - QoS 2 messages published but not yet completely acknowledged by the client


    Persistent sessions are useful but consume resources on the machine hosting the
    broker. You should use them only if you need them. Here is a list of valid reasons
    to do so:


    - Your solution involves constrained clients that could extend their battery life
    or consume less bandwidth by relying on persistent sessions.

    - Your use case requires subscribing clients not to miss a single message.

    - Your use case involves “at least once” (QoS 1) or “exactly once” (QoS 2) message
    delivery.


    Conversely, you should avoid persistent sessions for clients that just publish
    (no subscriptions) when the use case tolerates messages to be dropped.


    Once a session is established, the client and broker will work behind the scenes
    to ensure it stays active through a *keep-alive* flow. Clients are supposed to
    send `PINGREQ` packets to the broker within a defined keep-alive interval; the
    broker must reply with a `PINGRESP` packet. Both packet types are devoid of a
    payload. Certain satellite and cellular links are known to break TCP/IP socket
    connections in ways not necessarily noticeable to the network stack. MQTT’s keep-alive
    feature is useful in such environments. However, it is possible to deactivate
    it if desired. If you choose to leverage it, you should tweak the value of the
    keep-alive interval according to your devices and network constraints. Higher
    values will help you overcome fluctuations in signal strength or other causes
    of packet loss.


    MQTT defines a Last Will and Testament (LWT) feature that enables you to notify
    subscribers that a specific publisher client has unexpectedly disconnected. This
    is done through a message. The client needs to provide the payload and topic for
    the message at connection time to do so. The broker will store the message and
    publish it to the topic specified once an unexpected disconnection occurs. The
    broker will discard the message if the client disconnects properly by sending
    a `DISCONNECT` packet. The following is a list of situations that will trigger
    the sending of a client’s LWT:


    - The broker detects an I/O error or network failure.

    - The client fails to send a message within the defined keep-alive interval.

    - The client omits to send a `DISCONNECT` packet before closing the network connection.

    - The broker receives invalid packets from a client and forcefully closes the
    connection.


    An MQTT client will send a packet of type `CONNECT` to a specific broker identified
    by its IP address or DNS hostname to establish a connection. `CONNECT` packets
    typically set the following properties in the variable header:


    - **clientId:** Client identifier, which the broker can use to match a specific
    client to its state. It should be unique. In MQTT v5.0, it can be left empty,
    in which case the broker will assign one to the client and return it in the `CONNACK`
    packet. In MQTT v.3.1.1, it is possible to leave it empty if the connection was
    not persistent.

    - **cleanSession:** Property indicating whether the broker should restore the
    session information for the provided `clientId` or not. If set to `true`, the
    session is nonpersistent, and any information for a previous persistent session
    will be purged. If set to `false`, the session is persistent; previous subscriptions
    will be restored, and queued messages will be delivered, acknowledged, or confirmed.

    - **username/password:** Optional properties used for authentication. MQTT will
    transmit the values in plain text; consequently, you should at a minimum use TLS
    to ensure they are kept safe. MQTT version 5.0 introduced an [enhanced authentication
    workflow](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Enhanced_authentication)
    supporting the implementation of challenge/response authentication.

    - **lastWillTopic/lastWillMessage/lastWillQos:** Properties used to set the topic,
    payload, and QoS level for a publisher client’s Last Will and Testament message.


    # Retained Messages


    MQTT brokers can only distribute messages to subscribers if they are connected.
    By default, if a client subscribes to a topic, it will only get the next message
    to be published. For some use cases, this is undesirable. Retained messages allow
    new subscribers to get a copy of the last message published to a topic.


    To create a retained message for a topic, a publisher needs to send a `PUBLISH`
    packet with the `retainFlag` property set to `true`. The broker will store the
    message and the corresponding QoS for the topic. Clients that subscribe to the
    topic after the retained message was sent will get a copy of the message as soon
    as they subscribe. This eliminates uncertainty about the last known good value
    for the topic. You must remember that if the publisher sends `PUBLISH` packets
    with `retainFlag` set to `false` after sending a retained message, the retained
    message for the topic will not change. The consequence is that newly subscribed
    clients will get a copy of the retained message, but not the others sent before
    establishing the subscription.


    Retained messages, by the way, are not tied to persistent sessions. They will
    be delivered to subscribers independently of the session type chosen. It is possible
    to clear a retained message by sending a message with a zero-length payload with
    the `retainFlag` property set to `true`.


    # Protocol Stack


    In the late 1990s, domain-specific proprietary field buses like CAN and Modbus
    were supplanted by TCP/IP-based alternatives such as Modbus TCP, Profinet, and
    OPC UA. Like those, MQTT supports TCP/IP. However, the specification does not
    mandate its use, rather stating that clients or servers must support “transport
    protocols that provide an ordered, lossless, stream of bytes from the Client to
    Server and Server to Client.”^([(13)](#fn13)) Figure [4-1](#524096_1_En_4_Chapter.xhtml#Fig1)
    illustrates the protocol stack for MQTT.


    ![](images/524096_1_En_4_Chapter/524096_1_En_4_Fig1_HTML.jpg)


    An illustration of the protocol stack for MQTT includes applications, MQTT, MQTT-SN,
    TCP, UDP, IPv4, IPv6, Ethernet, Wi-Fi, and physical channel.


    Figure 4-1


    MQTT and MQTT-SN protocol stack


    The MQTT specification mentions in a non-normative comment that TLS and WebSocket
    are also suitable transports. This is expected, as both protocols leverage TCP/IP.
    Nearly all brokers support TLS, and several implement support for WebSocket. This
    is the case of the two brokers hosted at the Eclipse Foundation: [Eclipse Mosquitto](https://mosquitto.org)
    and [Eclipse Amlen](https://www.eclipse.org/amlen).


    Since it provides ordered and lossless delivery capabilities, TCP/IP is less suitable
    for battery-operated constrained devices operating over a wireless network than
    UDP. This is where MQTT-SN comes into play.'
  raw: '## Connections and Sessions


    Before sending or receiving messages, MQTT clients need to establish a connection
    with a broker. MQTT connections are kept open until the client sends a disconnection
    message unless network issues break the connection. Because the connection is
    kept open, MQTT clients will connect to brokers even if placed behind NAT infrastructure.


    By default, brokers do not persist session information. This means subscribers
    need to reestablish their subscriptions every time they connect. For constrained
    devices, this is a waste of resources. Fortunately, the MQTT specification defines
    the concept of *persistent sessions*. When a client connects using a persistent
    session, the broker will keep track of all the subscriptions for that client.
    Moreover, it will store relevant messages when specific quality of service levels
    are involved:


    *   QoS 1 or 2 messages published while the client was offline


    *   QoS 1 or 2 messages published but not yet confirmed by the client


    *   QoS 2 messages published but not yet completely acknowledged by the client


    Persistent sessions are useful but consume resources on the machine hosting the
    broker. You should use them only if you need them. Here is a list of valid reasons
    to do so:


    *   Your solution involves constrained clients that could extend their battery
    life or consume less bandwidth by relying on persistent sessions.


    *   Your use case requires subscribing clients not to miss a single message.


    *   Your use case involves “at least once” (QoS 1) or “exactly once” (QoS 2) message
    delivery.


    Conversely, you should avoid persistent sessions for clients that just publish
    (no subscriptions) when the use case tolerates messages to be dropped.


    Once a session is established, the client and broker will work behind the scenes
    to ensure it stays active through a *keep-alive* flow. Clients are supposed to
    send `PINGREQ` packets to the broker within a defined keep-alive interval; the
    broker must reply with a `PINGRESP` packet. Both packet types are devoid of a
    payload. Certain satellite and cellular links are known to break TCP/IP socket
    connections in ways not necessarily noticeable to the network stack. MQTT’s keep-alive
    feature is useful in such environments. However, it is possible to deactivate
    it if desired. If you choose to leverage it, you should tweak the value of the
    keep-alive interval according to your devices and network constraints. Higher
    values will help you overcome fluctuations in signal strength or other causes
    of packet loss.


    MQTT defines a Last Will and Testament (LWT) feature that enables you to notify
    subscribers that a specific publisher client has unexpectedly disconnected. This
    is done through a message. The client needs to provide the payload and topic for
    the message at connection time to do so. The broker will store the message and
    publish it to the topic specified once an unexpected disconnection occurs. The
    broker will discard the message if the client disconnects properly by sending
    a `DISCONNECT` packet. The following is a list of situations that will trigger
    the sending of a client’s LWT:


    *   The broker detects an I/O error or network failure.


    *   The client fails to send a message within the defined keep-alive interval.


    *   The client omits to send a `DISCONNECT` packet before closing the network
    connection.


    *   The broker receives invalid packets from a client and forcefully closes the
    connection.


    An MQTT client will send a packet of type `CONNECT` to a specific broker identified
    by its IP address or DNS hostname to establish a connection. `CONNECT` packets
    typically set the following properties in the variable header:


    *   **clientId:** Client identifier, which the broker can use to match a specific
    client to its state. It should be unique. In MQTT v5.0, it can be left empty,
    in which case the broker will assign one to the client and return it in the CONNACK
    packet. In MQTT v.3.1.1, it is possible to leave it empty if the connection was
    not persistent.


    *   **cleanSession****:** Property indicating whether the broker should restore
    the session information for the provided `clientId` or not. If set to `true`,
    the session is nonpersistent, and any information for a previous persistent session
    will be purged. If set to `false`, the session is persistent; previous subscriptions
    will be restored, and queued messages will be delivered, acknowledged, or confirmed.


    *   **username/password:** Optional properties used for authentication. MQTT will
    transmit the values in plain text; consequently, you should at a minimum use TLS
    to ensure they are kept safe. MQTT version 5.0 introduced an [enhanced authentication
    workflow](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Enhanced_authentication)
    supporting the implementation of challenge/response authentication.


    *   **lastWillTopic/lastWillMessage/lastWillQos:** Properties used to set the
    topic, payload, and QoS level for a publisher client’s Last Will and Testament
    message.


    ## Retained Messages


    MQTT brokers can only distribute messages to subscribers if they are connected.
    By default, if a client subscribes to a topic, it will only get the next message
    to be published. For some use cases, this is undesirable. Retained messages allow
    new subscribers to get a copy of the last message published to a topic.


    To create a retained message for a topic, a publisher needs to send a `PUBLISH`
    packet with the `retainFlag` property set to `true`. The broker will store the
    message and the corresponding QoS for the topic. Clients that subscribe to the
    topic after the retained message was sent will get a copy of the message as soon
    as they subscribe. This eliminates uncertainty about the last known good value
    for the topic. You must remember that if the publisher sends `PUBLISH` packets
    with `retainFlag` set to `false` after sending a retained message, the retained
    message for the topic will not change. The consequence is that newly subscribed
    clients will get a copy of the retained message, but not the others sent before
    establishing the subscription.


    Retained messages, by the way, are not tied to persistent sessions. They will
    be delivered to subscribers independently of the session type chosen. It is possible
    to clear a retained message by sending a message with a zero-length payload with
    the `retainFlag` property set to `true`.


    ## Protocol Stack


    In the late 1990s, domain-specific proprietary field buses like CAN and Modbus
    were supplanted by TCP/IP-based alternatives such as Modbus TCP, Profinet, and
    OPC UA. Like those, MQTT supports TCP/IP. However, the specification does not
    mandate its use, rather stating that clients or servers must support *“*transport
    protocols that provide an ordered, lossless, stream of bytes from the Client to
    Server and Server to Client.*”*^([^(13)](#fn13)) Figure [4-1](#524096_1_En_4_Chapter.xhtml#Fig1)
    illustrates the protocol stack for MQTT.


    ![](images/524096_1_En_4_Chapter/524096_1_En_4_Fig1_HTML.jpg)


    An illustration of the protocol stack for M Q T T includes applications, M Q T
    T, M Q T T-S N, T C P, U D P, I P v 4, I P v 6, Ethernet, Wi Fi, and physical
    channel.


    Figure 4-1


    MQTT and MQTT-SN protocol stack


    The MQTT specification mentions in a non-normative comment that TLS and WebSocket
    are also suitable transports. This is expected, as both protocols leverage TCP/IP.
    Nearly all brokers support TLS, and several implement support for WebSocket. This
    is the case of the two brokers hosted at the Eclipse Foundation: [Eclipse Mosquitto](https://mosquitto.org)
    and [Eclipse Amlen](https://www.eclipse.org/amlen).


    Since it provides ordered and lossless delivery capabilities, TCP/IP is less suitable
    for battery-operated constrained devices operating over a wireless network than
    UDP. This is where MQTT-SN comes into play.'
  trans: '

    ## 连接与会话


    在发送或接收消息之前，MQTT 客户端需要与代理建立连接。MQTT 连接会保持开启状态，直到客户端发送断开连接消息，除非网络问题导致连接中断。由于连接保持开启，即使客户端位于
    NAT 基础设施之后，它们也能连接到代理。


    默认情况下，代理不会持久化会话信息。这意味着订阅者每次连接时都需要重新建立订阅。对于资源受限的设备来说，这会造成资源浪费。幸运的是，MQTT 规范定义了*持久会话*的概念。当客户端使用持久会话连接时，代理会跟踪该客户端的所有订阅。此外，当涉及特定的服务质量等级时，代理还会存储相关消息：


    *   客户端离线期间发布的 QoS 1 或 QoS 2 消息

    *   已发布但尚未被客户端确认的 QoS 1 或 QoS 2 消息

    *   已发布但尚未被客户端完全确认的 QoS 2 消息


    持久会话很有用，但会消耗托管代理的机器上的资源。只有在需要时才应使用它们。以下是使用持久会话的合理理由列表：


    *   您的解决方案涉及资源受限的客户端，这些客户端可以通过依赖持久会话延长电池寿命或减少带宽消耗。

    *   您的用例要求订阅客户端不丢失任何一条消息。

    *   您的用例涉及“至少一次”（QoS 1）或“恰好一次”（QoS 2）的消息传递。


    相反，对于仅发布消息（无订阅）且用例允许消息丢失的客户端，应避免使用持久会话。


    一旦会话建立，客户端和代理将在后台协同工作，通过*保活*流程确保会话保持活跃。客户端应在定义的保活间隔内向代理发送 `PINGREQ` 数据包；代理必须回复一个
    `PINGRESP` 数据包。这两种数据包都不包含有效载荷。已知某些卫星和蜂窝链路会以网络堆栈未必能察觉的方式中断 TCP/IP 套接字连接。MQTT 的保活功能在此类环境中非常有用。但是，如果需要，也可以停用它。如果选择利用此功能，应根据设备和网络限制调整保活间隔的值。较高的值有助于克服信号强度波动或其他导致数据包丢失的原因。


    MQTT 定义了遗嘱消息（LWT）功能，使您能够通知订阅者某个发布者客户端已意外断开连接。这是通过一条消息实现的。为此，客户端需要在连接时提供消息的有效载荷和主题。代理将存储该消息，并在发生意外断开连接时将其发布到指定的主题。如果客户端通过发送
    `DISCONNECT` 数据包正常断开连接，代理将丢弃该消息。以下是会触发发送客户端 LWT 的情况列表：


    *   代理检测到 I/O 错误或网络故障。

    *   客户端未能在定义的保活间隔内发送消息。

    *   客户端在关闭网络连接前未发送 `DISCONNECT` 数据包。

    *   代理从客户端收到无效数据包并强制关闭连接。


    MQTT 客户端会向由其 IP 地址或 DNS 主机名标识的特定代理发送类型为 `CONNECT` 的数据包以建立连接。`CONNECT` 数据包通常在可变头部中设置以下属性：


    *   **clientId：** 客户端标识符，代理可用其将特定客户端与其状态匹配。它应该是唯一的。在 MQTT v5.0 中，可以将其留空，此时代理会为客户端分配一个标识符，并在
    CONNACK 数据包中返回。在 MQTT v3.1.1 中，如果连接不是持久的，则可以将其留空。

    *   **cleanSession：** 指示代理是否应为提供的 `clientId` 恢复会话信息的属性。如果设置为 `true`，则会话是非持久的，并且任何先前持久会话的信息都将被清除。如果设置为
    `false`，则会话是持久的；将恢复先前的订阅，并传递、确认或确认已排队的消息。

    *   **username/password：** 用于身份验证的可选属性。MQTT 将以明文形式传输这些值；因此，您至少应使用 TLS 来确保其安全。MQTT
    5.0 版本引入了[增强的身份验证工作流](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Enhanced_authentication)，支持实现质询/响应身份验证。

    *   **lastWillTopic/lastWillMessage/lastWillQos：** 用于设置发布者客户端的遗嘱消息的主题、有效载荷和 QoS
    级别的属性。


    ## 保留消息


    MQTT 代理只能在订阅者连接时向其分发消息。默认情况下，如果客户端订阅了一个主题，它只会收到接下来要发布的消息。对于某些用例，这是不希望的。保留消息允许新订阅者获取发布到某个主题的最后一条消息的副本。


    要为某个主题创建保留消息，发布者需要发送一个 `retainFlag` 属性设置为 `true` 的 `PUBLISH` 数据包。代理将存储该消息以及该主题对应的
    QoS。在保留消息发送后订阅该主题的客户端，一旦订阅就会收到该消息的副本。这消除了关于该主题最后已知良好值的不确定性。您必须记住，如果发布者在发送保留消息后发送了
    `retainFlag` 设置为 `false` 的 `PUBLISH` 数据包，则该主题的保留消息不会改变。结果是，新订阅的客户端将获得保留消息的副本，但不会获得在建立订阅之前发送的其他消息。


    顺便提一下，保留消息与持久会话无关。无论选择何种会话类型，它们都会传递给订阅者。可以通过发送一个有效载荷长度为零且 `retainFlag` 属性设置为 `true`
    的消息来清除保留消息。


    ## 协议栈


    在 20 世纪 90 年代末，像 CAN 和 Modbus 这样的特定领域专有现场总线被基于 TCP/IP 的替代方案（如 Modbus TCP、Profinet
    和 OPC UA）所取代。与这些协议类似，MQTT 支持 TCP/IP。然而，规范并未强制要求使用它，而是指出客户端或服务器必须支持*“提供从客户端到服务器以及从服务器到客户端的有序、无损字节流的传输协议。”*^(¹³)
    图 4-1 展示了 MQTT 的协议栈。


    ![](img/524096_1_En_4_Fig1_HTML.jpg)


    MQTT 协议栈示意图，包括应用层、MQTT、MQTT-SN、TCP、UDP、IPv4、IPv6、以太网、Wi-Fi 和物理信道。


    图 4-1


    MQTT 和 MQTT-SN 协议栈


    MQTT 规范在一条非规范性注释中提到，TLS 和 WebSocket 也是合适的传输层协议。这是意料之中的，因为这两种协议都利用了 TCP/IP。几乎所有代理都支持
    TLS，并且有多个代理实现了对 WebSocket 的支持。Eclipse 基金会托管的两个代理就是如此：[Eclipse Mosquitto](https://mosquitto.org)
    和 [Eclipse Amlen](https://www.eclipse.org/amlen)。


    由于 TCP/IP 提供有序和无损的传递能力，对于通过无线网络运行的电池供电的受限设备而言，它不如 UDP 合适。这正是 MQTT-SN 发挥作用的地方。'
- fmt: "# MQTT-SN\n\n`MQTT-SN` can be considered a version of `MQTT` optimized for\
    \ wireless networks and targeted at battery-operated devices. At the time of writing,\
    \ `MQTT-SN` was [undergoing standardization](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dmqtt-sn)\
    \ at OASIS Open. The starting point for this effort is [version 1.2 of `MQTT-SN`](https://www.oasis-open.org/committees/download.php/66091/MQTT-SN_spec_v1.2.pdf),\
    \ published in 2013 by IBM.\n\n`MQTT-SN` supports `UDP`. It was originally developed\
    \ for running on top of `Zigbee` networks. Such networks rely on `IEEE 802.15.4`\
    \ as the `PHY` and `MAC` layers protocol. A fundamental design objective was to\
    \ reduce the size of messages with an eye on reducing power and bandwidth consumption.\n\
    \nAt the architecture level, `MQTT-SN` defines three types of components: *clients*,\
    \ *gateways*, and *forwarders*. `MQTT-SN` clients connect to an `MQTT` broker\
    \ through an `MQTT-SN` gateway, which can be integrated into the `MQTT` broker\
    \ or run as a stand-alone component. If the gateway is stand-alone, it communicates\
    \ with the broker using `MQTT`. There are two types of gateways: *transparent*\
    \ and *aggregating*. Transparent gateways create an `MQTT` connection to the broker\
    \ for each connected client. Aggregating gateways use a single `MQTT` connection\
    \ to the broker, which helps the broker scale when many `MQTT-SN` devices are\
    \ involved. As for forwarders, they encapsulate the `MQTT-SN` frames received\
    \ from clients on a wireless network and transmit them to a gateway. They are\
    \ useful to bridge traffic between networks when it is impractical to have the\
    \ clients and gateway on the same network.\n\nThis is a list of the main differences\
    \ between `MQTT` and `MQTT-SN`:\n\n* **`CONNECT` packet:** The `CONNECT` packet\
    \ has been split into three. The two new ones enable the `LWT` topic and message\
    \ transmission, respectively.\n* **Topic IDs:** A 2-byte topic ID replaces the\
    \ topic name in most messages. A registration procedure exists to enable clients\
    \ to register their topic names, obtain an ID in return, and query for the ID\
    \ of a topic.\n* **Predefined topic IDs and short topic names:** Clients, gateways,\
    \ and brokers can agree on the mapping between a topic ID and an actual `MQTT`\
    \ topic. Consequently, they can use those topic IDs with a predefined meaning\
    \ without registering them. As for short topic names, they are simply topic names\
    \ that have a fixed length of two octets (16 bits). They can be used in place\
    \ of topic IDs.\n* **Discovery procedure:** Clients can discover the network address\
    \ of a gateway or broker. Gateways periodically broadcast an `ADVERTISE` packet\
    \ to make their existence known, and clients can send a `SEARCHGW` packet to obtain\
    \ the ID of a gateway.\n* **Persistent LWT:** The topic and message defined in\
    \ the context of the Last Will and Testament feature are stored when a persistent\
    \ session is used.\n* **Offline keep-alive:** Sleeping clients are now supported.\
    \ Messages destined to them are buffered on the gateway or broker and delivered\
    \ when the client returns online.\n* **QoS level -1:** This is a feature intended\
    \ for minimal implementations. There are no connection, no registration, and no\
    \ subscriptions. The client simply publishes its messages to a gateway for which\
    \ it knows the address but does not check if the address is accurate or even if\
    \ the gateway is alive. It is also possible to use a multicast address.\n\nFrom\
    \ a developer’s perspective, `MQTT-SN` feels like plain `MQTT`. However, the protocol\
    \ has seen much lower adoption than `MQTT` itself. Consequently, the software\
    \ ecosystem is much more limited. The Eclipse Mosquitto team maintains the [Really\
    \ Small Message Broker](https://github.com/eclipse/mosquitto.rsmb) (`RSMB`), a\
    \ lightweight broker supporting `MQTT` and `MQTT-SN`. The Eclipse Paho project\
    \ provides an [`MQTT-SN` transparent gateway](https://www.eclipse.org/paho/index.php%253Fpage%253Dcomponents/mqtt-sn-transparent-gateway/index.php)\
    \ that can be used with Eclipse Mosquitto. Despite this, you definitively should\
    \ have a look at `MQTT-SN` if you are deploying battery-operated constrained devices.\n\
    \n> **Note**\n> \n> Historically, `RSMB` was the inspiration for Mosquitto. Both\
    \ code bases were contributed to the Eclipse Foundation by IBM and Roger Light,\
    \ respectively.\n\n# New Features in `MQTT v5`\n\nI mentioned earlier that the\
    \ current version of `MQTT`, version 5.0, was introduced in 2019. Although there\
    \ is a big jump in the version number, the new version is an evolution of `MQTT\
    \ 3.1.1` more than anything else. In this section, I will provide an overview\
    \ of most of the new features that have been introduced in `MQTT v5.0`. [Appendix\
    \ C](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901293)\
    \ of the specification provides a comprehensive list. Some brokers had already\
    \ implemented some of those features before OASIS Open formalized them in the\
    \ specification.\n\nI strongly recommend you use `MQTT v5.0` wherever possible.\
    \ Only utilize previous versions if you need to integrate legacy software or devices\
    \ that absolutely cannot be upgraded to support version 5.\n\n> **Note**\n> \n\
    > You probably noticed there is no `MQTT` version 4. Why is that? The variable\
    \ header for `MQTT` `CONNECT` packets contains a [1-byte unsigned value](http://docs.oasis-open.org/mqtt/mqtt/v5.0/csprd02/mqtt-v5.0-csprd02.html%2523_Toc498345322)\
    \ to represent the version of the protocol. `MQTT v3.1` was assigned the value\
    \ “3” and `v.3.1.1` the value “4”. `MQTT v5` uses a value that matches its name.\
    \ This may seem a boring bit of trivia, but it is more entertaining than explaining\
    \ why there was never a Windows 9. The `MQTT` standardization committee decided\
    \ that for future versions, the byte on the wire will always match the version\
    \ of the protocol.\n\n## User-Defined Properties\n\nClients and brokers can now\
    \ add an arbitrary number of custom headers to packets. Those custom headers are\
    \ defined through a new key-value data type, where both key and value are represented\
    \ as `UTF-8` strings.\n\nThe `MQTT` specification does not assign a specific meaning\
    \ to user-defined properties. It is up to the clients and brokers to decide what\
    \ to do with them.\n\n## Reason Codes\n\nIn previous versions of `MQTT`, error\
    \ handling was not very granular. For example, a client would know that its subscription\
    \ request failed but would not be provided an exact cause for it. `MQTT v5.0`\
    \ changes that. In `v5.0`, many `MQTT` packets now include a predefined code that\
    \ allows the client or broker to get context about error conditions. The following\
    \ packets can carry reason codes:\n\n* `CONNACK`\n* `PUBACK`/`PUBREC`\n* `PUBREL`/`PUBCOMP`\n\
    * `SUBACK`/`UNSUBACK`\n* `AUTH`\n* `DISCONNECT`\n\nThere are over 20 reason codes\
    \ defined in the specification, with “Quota Exceeded” and “Protocol Error” as\
    \ typical examples.\n\n## Availability of Optional Features\n\nSome of the features\
    \ defined in the `MQTT` specification are optional. Several brokers and *Software-as-a-Service*\
    \ (`SaaS`) IoT offerings do not implement some of those optional features, including\
    \ `QoS 2`, retained messages, and persistent sessions. For that reason, `MTTQ\
    \ v5.0` defines a way for partial implementations to signal to clients that they\
    \ do not support specific features. The features concerned are Maximum QoS, Retain\
    \ Available, Wildcard Subscription Available, Subscription Identifier Available,\
    \ and Shared Subscription Available.\n\n## Message Expiry\n\nThis feature allows\
    \ publishers to set an interval for message expiration. Brokers need to delete\
    \ expired messages for which they did not start delivery.\n\n## Request/Response\n\
    \nThis feature is a formalization of the [request/response pattern in `MQTT`](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901252).\
    \ `MQTT v5.0` defines properties that clients and brokers can leverage to implement\
    \ request/response interactions: `Response Topic`, `Correlation Data`, `Request\
    \ Response Information`, and `Response Information`. The specification describes\
    \ how the properties can be used in a handful of non-normative sections."
  raw: '## MQTT-SN


    MQTT-SN can be considered a version of MQTT optimized for wireless networks and
    targeted at battery-operated devices. At the time of writing, MQTT-SN was [undergoing
    standardization](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dmqtt-sn)
    at OASIS Open. The starting point for this effort is [version 1.​2 of MQTT-SN](https://www.oasis-open.org/committees/download.php/66091/MQTT-SN_spec_v1.2.pdf),
    published in 2013 by IBM.


    MQTT-SN supports UDP. It was originally developed for running on top of Zigbee
    networks. Such networks rely on IEEE 802.15.4 as the PHY and MAC layers protocol.
    A fundamental design objective was to reduce the size of messages with an eye
    on reducing power and bandwidth consumption.


    At the architecture level, MQTT-SN defines three types of components: *clients*,
    *gateways*, and *forwarders*. MQTT-SN clients connect to an MQTT broker through
    an MQTT-SN gateway, which can be integrated into the MQTT broker or run as a stand-alone
    component. If the gateway is stand-alone, it communicates with the broker using
    MQTT. There are two types of gateways: *transparent* and *aggregating*. Transparent
    gateways create an MQTT connection to the broker for each connected client. Aggregating
    gateways use a single MQTT connection to the broker, which helps the broker scale
    when many MQTT-SN devices are involved. As for forwarders, they encapsulate the
    MQTT-SN frames received from clients on a wireless network and transmit them to
    a gateway. They are useful to bridge traffic between networks when it is impractical
    to have the clients and gateway on the same network.


    This is a list of the main differences between MQTT and MQTT-SN:


    *   **CONNECT packet:** The CONNECT packet has been split into three. The two
    new ones enable the LWT topic and message transmission, respectively.


    *   **Topic IDs:** A 2-byte topic ID replaces the topic name in most messages.
    A registration procedure exists to enable clients to register their topic names,
    obtain an ID in return, and query for the ID of a topic.


    *   **Predefined topic IDs and short topic names:** Clients, gateways, and brokers
    can agree on the mapping between a topic ID and an actual MQTT topic. Consequently,
    they can use those topic IDs with a predefined meaning without registering them.
    As for short topic names, they are simply topic names that have a fixed length
    of two octets (16 bits). They can be used in place of topic IDs.


    *   **Discovery procedure:** Clients can discover the network address of a gateway
    or broker. Gateways periodically broadcast an `ADVERTISE` packet to make their
    existence known, and clients can send a `SEARCHGW` packet to obtain the ID of
    a gateway.


    *   **Persistent LWT:** The topic and message defined in the context of the Last
    Will and Testament feature are stored when a persistent session is used.


    *   **Offline keep-alive:** Sleeping clients are now supported. Messages destined
    to them are buffered on the gateway or broker and delivered when the client returns
    online.


    *   **QoS level -1:** This is a feature intended for minimal implementations.
    There are no connection, no registration, and no subscriptions. The client simply
    publishes its messages to a gateway for which it knows the address but does not
    check if the address is accurate or even if the gateway is alive. It is also possible
    to use a multicast address.


    From a developer’s perspective, MQTT-SN feels like plain MQTT. However, the protocol
    has seen much lower adoption than MQTT itself. Consequently, the software ecosystem
    is much more limited. The Eclipse Mosquitto team maintains the [Really Small Message
    Broker](https://github.com/eclipse/mosquitto.rsmb) (RSMB), a lightweight broker
    supporting MQTT and MQTT-SN. The Eclipse Paho project provides an [MQTT-SN transparent
    gateway](https://www.eclipse.org/paho/index.php%253Fpage%253Dcomponents/mqtt-sn-transparent-gateway/index.php)
    that can be used with Eclipse Mosquitto. Despite this, you definitively should
    have a look at MQTT-SN if you are deploying battery-operated constrained devices.


    Note


    Historically, RSMB was the inspiration for Mosquitto. Both code bases were contributed
    to the Eclipse Foundation by IBM and Roger Light, respectively.


    ## New Features in MQTT v5


    I mentioned earlier that the current version of MQTT, version 5.0, was introduced
    in 2019\. Although there is a big jump in the version number, the new version
    is an evolution of MQTT 3.1.1 more than anything else. In this section, I will
    provide an overview of most of the new features that have been introduced in MQTT
    v5.0\. [Appendix C](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901293)
    of the specification provides a comprehensive list. Some brokers had already implemented
    some of those features before OASIS Open formalized them in the specification.


    I strongly recommend you use MQTT v5.0 wherever possible. Only utilize previous
    versions if you need to integrate legacy software or devices that absolutely cannot
    be upgraded to support version 5.


    Note


    You probably noticed there is no MQTT version 4\. Why is that? The variable header
    for MQTT `CONNECT` packets contains a [1-byte unsigned value](http://docs.oasis-open.org/mqtt/mqtt/v5.0/csprd02/mqtt-v5.0-csprd02.html%2523_Toc498345322)
    to represent the version of the protocol. MQTT v3.1 was assigned the value “3”
    and v.3.1.1 the value “4”. MQTT v5 uses a value that matches its name. This may
    seem a boring bit of trivia, but it is more entertaining than explaining why there
    was never a Windows 9\. The MQTT standardization committee decided that for future
    versions, the byte on the wire will always match the version of the protocol.


    ### User-Defined Properties


    Clients and brokers can now add an arbitrary number of custom headers to packets.
    Those custom headers are defined through a new key-value data type, where both
    key and value are represented as UTF-8 strings.


    The MQTT specification does not assign a specific meaning to user-defined properties.
    It is up to the clients and brokers to decide what to do with them.


    ### Reason Codes


    In previous versions of MQTT, error handling was not very granular. For example,
    a client would know that its subscription request failed but would not be provided
    an exact cause for it. MQTT v5.0 changes that. In v5.0, many MQTT packets now
    include a predefined code that allows the client or broker to get context about
    error conditions. The following packets can carry reason codes:


    *   `CONNACK`


    *   `PUBACK/PUBREC`


    *   `PUBREL/PUBCOMP`


    *   `SUBACK/UNSUBACK`


    *   `AUTH`


    *   `DISCONNECT`


    There are over 20 reason codes defined in the specification, with “Quota Exceeded”
    and “Protocol Error” as typical examples.


    ### Availability of Optional Features


    Some of the features defined in the MQTT specification are optional. Several brokers
    and *Software-as-a-Service* (SaaS) IoT offerings do not implement some of those
    optional features, including QoS 2, retained messages, and persistent sessions.
    For that reason, MTTQ v5.0 defines a way for partial implementations to signal
    to clients that they do not support specific features. The features concerned
    are Maximum QoS, Retain Available, Wildcard Subscription Available, Subscription
    Identifier Available, and Shared Subscription Available.


    ### Message Expiry


    This feature allows publishers to set an interval for message expiration. Brokers
    need to delete expired messages for which they did not start delivery.


    ### Request/Response


    This feature is a formalization of the [request/​response pattern in MQTT](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901252).^([^(14)](#fn14))
    MQTT v5.0 defines properties that clients and brokers can leverage to implement
    request/response interactions: `Response Topic`, `Correlation Data`, `Request
    Response Information`, and `Response Information`. The specification describes
    how the properties can be used in a handful of non-normative sections.'
  trans: '

    ## MQTT-SN


    MQTT-SN 可视为 MQTT 针对无线网络进行优化、面向电池供电设备的版本。在撰写本文时，MQTT-SN 正在 OASIS Open 进行[标准化工作](https://www.oasis-open.org/committees/tc_home.php%253Fwg_abbrev%253Dmqtt-sn)。此项工作的起点是
    IBM 于 2013 年发布的 [MQTT-SN 1.2 版](https://www.oasis-open.org/committees/download.php/66091/MQTT-SN_spec_v1.2.pdf)。


    MQTT-SN 支持 UDP。它最初设计用于在 Zigbee 网络上运行。此类网络依赖 IEEE 802.15.4 作为物理层和 MAC 层协议。其基本设计目标是在降低功耗和带宽消耗的前提下，减小消息大小。


    在架构层面，MQTT-SN 定义了三种组件类型：*客户端*、*网关*和*转发器*。MQTT-SN 客户端通过 MQTT-SN 网关连接到 MQTT 代理，该网关可以集成到
    MQTT 代理中，也可以作为独立组件运行。如果网关是独立的，它会使用 MQTT 与代理通信。网关有两种类型：*透明网关*和*聚合网关*。透明网关为每个连接的客户端创建一个到代理的
    MQTT 连接。聚合网关使用单个 MQTT 连接到代理，这有助于在涉及大量 MQTT-SN 设备时提升代理的扩展性。至于转发器，它们封装从无线网络上的客户端接收到的
    MQTT-SN 帧，并将其传输到网关。当客户端和网关无法处于同一网络时，转发器对于桥接网络间的流量非常有用。


    以下是 MQTT 与 MQTT-SN 的主要区别列表：


    *   **CONNECT 报文：** CONNECT 报文被拆分为三个。新增的两个报文分别用于 LWT 主题和消息传输。


    *   **主题 ID：** 在大多数消息中，一个 2 字节的主题 ID 取代了主题名称。存在一个注册过程，允许客户端注册其主题名称，获取一个 ID 作为回报，并查询某个主题的
    ID。


    *   **预定义主题 ID 和短主题名称：** 客户端、网关和代理可以就主题 ID 与实际 MQTT 主题之间的映射达成一致。因此，它们可以使用这些具有预定义含义的主题
    ID，而无需注册。至于短主题名称，它们只是固定长度为两个八位字节（16 位）的主题名称。它们可以用来代替主题 ID。


    *   **发现过程：** 客户端可以发现网关或代理的网络地址。网关会定期广播 `ADVERTISE` 报文以宣告其存在，客户端可以发送 `SEARCHGW`
    报文来获取网关的 ID。


    *   **持久遗嘱：** 当使用持久会话时，在遗嘱特性上下文中定义的主题和消息会被存储。


    *   **离线保活：** 现在支持休眠客户端。发往这些客户端的消息会在网关或代理上缓冲，并在客户端重新上线时投递。


    *   **QoS 等级 -1：** 这是一个面向最小化实现的功能。没有连接、没有注册、也没有订阅。客户端只需将其消息发布到已知地址的网关，但不会检查地址是否准确，甚至不检查网关是否存活。也可以使用多播地址。


    从开发者的角度来看，MQTT-SN 感觉就像普通的 MQTT。然而，该协议的采用率远低于 MQTT 本身。因此，其软件生态系统要有限得多。Eclipse Mosquitto
    团队维护着 [Really Small Message Broker](https://github.com/eclipse/mosquitto.rsmb)
    (RSMB)，这是一个支持 MQTT 和 MQTT-SN 的轻量级代理。Eclipse Paho 项目提供了一个[可用于 Eclipse Mosquitto
    的 MQTT-SN 透明网关](https://www.eclipse.org/paho/index.php%253Fpage%253Dcomponents/mqtt-sn-transparent-gateway/index.php)。尽管如此，如果你正在部署电池供电的受限设备，绝对应该了解一下
    MQTT-SN。


    注意


    历史上，RSMB 是 Mosquitto 的灵感来源。这两个代码库分别由 IBM 和 Roger Light 贡献给 Eclipse 基金会。


    ## MQTT v5 的新特性


    我之前提到过，当前版本的 MQTT，即 5.0 版，是在 2019 年引入的。尽管版本号跳跃很大，但新版本更像是 MQTT 3.1.1 的演进。在本节中，我将概述
    MQTT v5.0 中引入的大部分新特性。规范的[附录 C](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901293)
    提供了一个全面的列表。在 OASIS Open 将其正式纳入规范之前，一些代理已经实现了其中的部分特性。


    我强烈建议你尽可能使用 MQTT v5.0。仅在你需要集成绝对无法升级以支持 v5 的遗留软件或设备时，才使用之前的版本。


    注意


    你可能注意到没有 MQTT 版本 4。这是为什么呢？MQTT `CONNECT` 报文的可变头部包含一个[1 字节无符号值](http://docs.oasis-open.org/mqtt/mqtt/v5.0/csprd02/mqtt-v5.0-csprd02.html%2523_Toc498345322)来表示协议版本。MQTT
    v3.1 被分配了值“3”，而 v3.1.1 被分配了值“4”。MQTT v5 使用与其名称匹配的值。这看起来可能是一个无聊的琐事，但比解释为什么从来没有
    Windows 9 要有趣得多。MQTT 标准化委员会决定，对于未来的版本，网络上的字节将始终与协议版本匹配。


    ### 用户自定义属性


    客户端和代理现在可以向报文添加任意数量的自定义头部。这些自定义头部通过一种新的键值数据类型定义，其中键和值都表示为 UTF-8 字符串。


    MQTT 规范没有为用户自定义属性分配特定含义。由客户端和代理自行决定如何处理它们。


    ### 原因码


    在 MQTT 的早期版本中，错误处理不够精细。例如，客户端会知道其订阅请求失败，但不会被告知确切原因。MQTT v5.0 改变了这一点。在 v5.0 中，许多
    MQTT 报文现在包含一个预定义的代码，允许客户端或代理获取关于错误情况的上下文信息。以下报文可以携带原因码：


    *   `CONNACK`


    *   `PUBACK/PUBREC`


    *   `PUBREL/PUBCOMP`


    *   `SUBACK/UNSUBACK`


    *   `AUTH`


    *   `DISCONNECT`


    规范中定义了超过 20 个原因码，典型的例子包括“超出配额”和“协议错误”。


    ### 可选功能的可用性


    MQTT 规范中定义的某些功能是可选的。一些代理和*软件即服务* (SaaS) IoT 产品并未实现其中一些可选功能，包括 QoS 2、保留消息和持久会话。因此，MQTT
    v5.0 定义了一种方式，让部分实现可以向客户端发出信号，表明它们不支持特定功能。涉及的功能包括：最大 QoS、保留可用、通配符订阅可用、订阅标识符可用和共享订阅可用。


    ### 消息过期


    此功能允许发布者设置消息过期的时间间隔。代理需要删除尚未开始投递的过期消息。


    ### 请求/响应


    此功能是对 [MQTT 中请求/响应模式](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901252)的形式化。^(¹⁴)
    MQTT v5.0 定义了客户端和代理可以用来实现请求/响应交互的属性：`响应主题`、`关联数据`、`请求响应信息`和`响应信息`。规范在几个非规范性章节中描述了如何使用这些属性。

    '
- fmt: '### Clean Session


    `Clean Session`标志已被拆分为两个：一个`Clean Start`标志，指示会话是否应重用现有会话；以及一个`Session Expiry Interval`，指示断开连接后会话保留多长时间。`Session
    Expiry Interval`可以在发送`DISCONNECT`数据包时更改。在 MQTT v3.1.1 中，将`Clean Start`设置为 1 并将`Session
    Expiry Interval`设置为 0，等同于将`Clean Session`设置为 1。


    此更改的实际效果是，在 MQTT v5.0 中，会话默认是非持久的，因为如果在`CONNECT`数据包中未指定`Session Expiry Interval`，则它将被设置为零，从而导致非持久会话。如果客户端希望获得持久会话，则需要显式地将`Session
    Expiry Interval`设置为非零值。


    ### Server DISCONNECT


    代理现在可以通过向客户端发送`DISCONNECT`数据包来通知它们即将断开连接。此类数据包通常包含断开连接的原因代码，使故障排除更加容易。


    ### AUTH Packet


    新的`AUTH`数据包支持当前的挑战/响应安全流程，例如 Kerberos 或 SCRAM。您也可以在面向令牌的流程（如 OAuth）中利用它。


    `AUTH`数据包可用于重新认证当前已连接的客户端。以前，客户端必须关闭连接才能获得相同的结果。


    ### Passwords Without Usernames


    `AUTH`数据包非常灵活，但即使没有它们，也可以实现面向令牌的安全流程。为了使其更容易一些，现在可以在`CONNECT`数据包中指定密码而无需提供用户名。


    ### Shared Subscriptions


    客户端现在可以共享相同的订阅。实际上，共享订阅代表了一种为 MQTT 订阅者客户端实现负载均衡的方式。


    为了实现这一点，MQTT v5.0 引入了*订阅组*的概念。订阅组就是共享一个或多个订阅的一组客户端。


    要使用共享订阅，客户端需要按以下方式指定主题：


    ```

    $share/GROUPID/TOPIC

    ```


    该结构中的三个元素如下：


    *   `$share`，预定义的共享订阅标识符

    *   组标识符，它是任意的且不能包含通配符

    *   实际主题，可能包含通配符


    让我再次以卢浮宫为例进行具体说明。如果您还记得，我为博物馆的每个房间创建了一个虚构的传感器部署，其主题层次结构如下：


    ```

    /Louvre/floor/room/sensor

    ```


    鉴于此，针对位于二楼的所有内容的通配符订阅将是：


    ```

    Louvre/2/#

    ```


    假设博物馆的大部分房间都位于这一层，并且鉴于发布的消息数量众多，您希望有多个客户端订阅该主题。如果订阅组的名称为`LouvreSecondFloor`，则共享订阅的主题将是：


    ```

    $share/LouvreSecondFloor/Louvre/2/#

    ```


    规范并未强制要求代理以特定方式选择订阅组中的哪个客户端将获得特定消息。轮询方法是典型的，但其他方法也是可能的。


    ### Flow Control


    代理及其客户端可以指定它们允许的正在进行的可靠消息（QoS > 0）的数量。这是一种速率限制机制。发送方将暂停消息传输，以保持在允许的阈值以下。


    ### LWT Delay


    MQTT v5.0 引入了在发生意外断开连接时，在发送 LWT 消息之前指定延迟的能力。如果在延迟到期前重新建立连接，则不会发送 LWT 消息。这在网络短暂中断频繁的环境中，减轻了
    MQTT 基础设施的负载。


    ### Broker Reference


    代理在发送`CONNACK`和`DISCONNECT`数据包时可以指定一个备用代理。例如，这可以用于配置目的或在代理组之间执行负载均衡。您可以将代理引用视为一种重定向形式。


    ## Security


    核心 MQTT 协议包含很少的安全特性。这并不是因为规范的作者不关心安全，而是为了让从事代理和客户端库开发的开发者有机会实现对他们有意义的的安全特性。这还有一个好处是保持
    MQTT 规范的简洁性，因为安全主题通常很复杂。MQTT v5.0 的规范文档包含一个专门讨论安全的[非规范性章节](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901293)。


    默认情况下，MQTT 不加密通信。这意味着在大多数情况下，您应该通过 TLS 使用 MQTT。诚然，TLS 由于其所需的握手以及线路上加密数据包尺寸较大而带来开销。然而，长寿命的
    TCP 连接通过减少握手的频率来减轻握手的开销。此外，*TLS 会话恢复*允许重用先前协商的 TLS 会话，进一步减少了客户端重新连接时所需的时间和资源。即便如此，资源非常受限的设备可能难以应对
    TLS 的 CPU 和带宽消耗。在这些极端情况下，您至少应该加密`PUBLISH`消息的有效载荷和`CONNECT`消息中传输的密码。利用`AUTH`消息和挑战/响应认证也是一种选择。


    如果您决定使用 TLS，请确保始终运行您的代理和客户端支持的最新版本，并验证证书链。由内部或开发 CA 签名的证书适用于开发和实验，但您绝不应在生产环境中部署它们。生产环境中使用的证书应由受信任的证书颁发机构签名。此外，您应密切关注您用于
    TLS 的密码套件中发现的任何漏洞。通常，迁移到更安全的套件是非常值得的。


    大多数代理和客户端与通常用于处理认证和授权的 IT 基础设施（如 LDAP 和 OAuth 授权服务器）集成。MQTT v5.0 新增的`AUTH`数据包简化了这些类型的集成。您应始终研究您选择的代理和客户端库的文档，以了解它们支持哪些认证技术以及它们具备哪些授权特性。此外，您应注意代理提供的节流功能，这可以帮助您减轻恶意客户端发起的、旨在使代理过载的攻击的影响。如果可能，限制消息大小也是一个好主意。'
  raw: '### Clean Session


    The *Clean Session* flag has been split into two: a `Clean Start` flag indicating
    whether the session should reuse an existing session and a `Session Expiry Interval`
    indicating how long to retain the session after a disconnect. The Session Expiry
    Interval can be changed when sending a `DISCONNECT` packet. Setting `Clean Start`
    to 1 and `Session Expiry Interval` to 0 is equivalent in MQTT v3.1.1 of setting
    `Clean Session` to 1.


    The practical effect of this change is that in MQTT v5.0, sessions are nonpersistent
    by default since if the `Session Expiry Interval` is not specified in the `CONNECT`
    packet, then it will be set to zero, resulting in a nonpersistent session. Clients
    need to explicitly set the Session Expiry Interval to a value other than 0 if
    they wish to obtain a persistent session.


    ### Server DISCONNECT


    Brokers can now inform clients of an imminent disconnection by sending a `DISCONNECT`
    packet to them. Such packets will usually contain a reason code for the disconnection,
    making troubleshooting easier.


    ### AUTH Packet


    The new `AUTH` packet supports current challenge/response security flows, such
    as Kerberos or SCRAM. You can also leverage it in the context of token-oriented
    flows such as OAuth.


    `AUTH` packets can be used to reauthenticate clients that are currently connected.
    Previously, the client would have had to close the connection to obtain the same
    result.


    ### Passwords Without Usernames


    `AUTH` packets are quite flexible, but it is still possible to implement token-oriented
    security flows without them. To make this a bit easier, it is now possible to
    specify a password in a `CONNECT` packet without providing a username.


    ### Shared Subscriptions


    Clients can now share the same subscription. Effectively, shared subscriptions
    represent a way to implement load balancing for MQTT subscriber clients.


    To make this possible, MQTT v5.0 introduced the concept of *subscription groups*.
    Subscription groups are simply a group of clients sharing one or several subscriptions.


    To use shared subscriptions, clients need to specify the topic this way:


    ```

    $share/GROUPID/TOPIC

    ```


    The three elements in the structure are as follows:


    *   `$share`, the predefined shared subscription identifier


    *   The group identifier, which is arbitrary and cannot contain wildcards


    *   The actual topic, which may include wildcards


    Let me illustrate with a concrete example based on the Musée du Louvre once again.
    If you remember, I created an imaginary deployment of sensors in every room of
    the museum where the topic hierarchy was structured like this:


    ```

    /Louvre/floor/room/sensor

    ```


    Given this, a wildcard subscription for everything located on the second floor
    would be


    ```

    Louvre/2/#

    ```


    Suppose most of the rooms in the museum are located on this floor and that you
    wish to have several clients subscribing to the topic given the high number of
    messages published. If the name of the subscription group is `LouvreSecondFloor`,
    then the topic for the shared subscription would be


    ```

    $share/LouvreSecondFloor/Louvre/2/#

    ```


    The specification does not mandate a specific way for brokers to select which
    client in the subscription group will get a certain message. A round-robin approach
    is typical, but others are possible.


    ### Flow Control


    Brokers and their clients can specify the number of in-flight reliable messages
    (QoS > 0) they allow. This is a kind of rate-limiting mechanism. Whoever is the
    sender will pause message transmission to stay below the allowed threshold.


    ### LWT Delay


    MQTT v5.0 introduced the ability to specify a delay before the LWT message is
    sent in case of an unplanned disconnection. The LWT message is not sent if the
    connection is reestablished before the delay expires. This reduces the load on
    the MQTT infrastructure in environments where brief network interruptions are
    frequent.


    ### Broker Reference


    Brokers can specify an alternate broker when sending `CONNACK` and `DISCONNECT`
    packets. For example, this can be leveraged for provisioning purposes or to perform
    load balancing among a group of brokers. You can see the broker reference as a
    form of redirect.


    ## Security


    The core MQTT protocol contains few security features. This is not because the
    authors of the specification do not care about security but rather to give developers
    working on brokers and client libraries the opportunity to implement the security
    features that make sense for them. This also has the advantage of keeping the
    MQTT specification simple, since security topics are usually complex. The specification
    document for MQTT v.5.0 contains a [non-normative section](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901293)
    dedicated to security.


    By default, MQTT does not encrypt communications. This means that in most cases,
    you should be using MQTT over TLS. Granted, TLS comes with an overhead due to
    the handshakes it requires and the larger size of encrypted packets on the wire.
    However, long-lived TCP connections mitigate the overhead of handshakes by making
    those less frequent. Moreover, *TLS session resumption* allows the reuse of a
    previously negotiated TLS session, reducing further the time and resources required
    when a client reconnects. Even with this, very constrained devices may have trouble
    coping with the CPU and bandwidth usage of TLS. In those extreme cases, you should,
    at a minimum, encrypt the payloads of `PUBLISH` messages and the passwords transmitted
    in `CONNECT` messages. Leveraging the `AUTH` message and challenge/response authentication
    is also an option.


    If you decide to use TLS, make sure you always run the latest version supported
    by your broker and clients and validate the certificate chain. Certificates signed
    by an internal or development CA are fine for development and experimentation,
    but you should never deploy those in production environments. A trusted certificate
    authority should have signed certificates used in production. In addition, you
    should keep your eye open for any vulnerabilities found in the cipher suites you
    are using for TLS. In general, migrating to a more secure suite is well worth
    the effort.


    Most brokers and clients integrate with IT infrastructure typically deployed to
    handle authentication and authorization, such as LDAP and OAuth authorization
    servers. The new `AUTH` packet added to MQTT v5.0 simplifies those types of integrations.
    You should always study the documentation for your broker and client libraries
    of choice to understand what authentication technologies they support and which
    authorization features they possess. Also, you should pay attention to the throttling
    features offered by your broker, which could help you mitigate the effects of
    attacks conducted by rogue clients to overload the broker. Limiting message size
    is also a good idea, if possible.'
  trans: '

    ### 清理会话


    *清理会话*标志已被拆分为两个：一个`Clean Start`标志，用于指示会话是否应重用现有会话；以及一个`Session Expiry Interval`，用于指示断开连接后会话保留多长时间。会话到期间隔可以在发送`DISCONNECT`报文时更改。在
    MQTT v3.1.1 中，将`Clean Start`设置为 1 并将`Session Expiry Interval`设置为 0，等同于将`Clean
    Session`设置为 1。


    此变更的实际效果是，在 MQTT v5.0 中，会话默认是非持久的，因为如果在`CONNECT`报文中未指定`Session Expiry Interval`，则其将被设置为零，从而导致非持久会话。如果客户端希望获得持久会话，则需要显式地将`Session
    Expiry Interval`设置为非零值。


    ### 服务器断开连接


    代理现在可以通过向客户端发送`DISCONNECT`报文来通知它们即将断开连接。此类报文通常包含断开连接的原因代码，使故障排除更加容易。


    ### AUTH 报文


    新的`AUTH`报文支持当前的质询/响应安全流程，例如 Kerberos 或 SCRAM。您也可以在面向令牌的流程（如 OAuth）中利用它。


    `AUTH`报文可用于对当前已连接的客户端进行重新认证。以前，客户端必须关闭连接才能获得相同的结果。


    ### 无用户名的密码


    `AUTH`报文非常灵活，但即使没有它们，仍然可以实现面向令牌的安全流程。为了使其更简单一些，现在可以在`CONNECT`报文中指定密码而无需提供用户名。


    ### 共享订阅


    客户端现在可以共享相同的订阅。实际上，共享订阅代表了一种为 MQTT 订阅者客户端实现负载均衡的方式。


    为了实现这一点，MQTT v5.0 引入了*订阅组*的概念。订阅组就是一组共享一个或多个订阅的客户端。


    要使用共享订阅，客户端需要按以下方式指定主题：


    ```

    $share/GROUPID/TOPIC

    ```


    结构中的三个元素如下：


    *   `$share`，预定义的共享订阅标识符

    *   组标识符，是任意的且不能包含通配符

    *   实际主题，可以包含通配符


    让我再次以卢浮宫为例进行具体说明。如果您还记得，我曾为博物馆每个房间的传感器创建了一个虚构的部署，其主题层次结构如下：


    ```

    /Louvre/floor/room/sensor

    ```


    鉴于此，针对二楼所有内容的通配符订阅将是：


    ```

    Louvre/2/#

    ```


    假设博物馆的大部分房间都在这一层，并且由于发布的消息数量众多，您希望有多个客户端订阅该主题。如果订阅组的名称为`LouvreSecondFloor`，那么共享订阅的主题将是：


    ```

    $share/LouvreSecondFloor/Louvre/2/#

    ```


    规范并未强制要求代理以特定方式选择订阅组中的哪个客户端将获得某条消息。轮询方法是典型的，但其他方法也是可能的。


    ### 流量控制


    代理及其客户端可以指定它们允许的进行中的可靠消息（QoS > 0）数量。这是一种速率限制机制。发送方将暂停消息传输，以保持在允许的阈值以下。


    ### 遗嘱延迟


    MQTT v5.0 引入了在意外断开连接的情况下，在发送遗嘱消息之前指定延迟的能力。如果在延迟到期前重新建立连接，则不会发送遗嘱消息。这在网络短暂中断频繁的环境中，减轻了
    MQTT 基础设施的负载。


    ### 代理引用


    代理可以在发送`CONNACK`和`DISCONNECT`报文时指定一个备用代理。例如，这可以用于配置目的或在代理组之间执行负载均衡。您可以将代理引用视为一种重定向形式。


    ## 安全性


    核心 MQTT 协议包含的安全特性很少。这并非因为规范作者不关心安全性，而是为了让从事代理和客户端库开发的开发者有机会实现对他们有意义的的安全特性。这也有利于保持
    MQTT 规范的简洁性，因为安全主题通常很复杂。MQTT v5.0 的规范文档包含一个专门讨论安全性的[非规范性章节](https://docs.oasis-open.org/mqtt/mqtt/v5.0/os/mqtt-v5.0-os.html%2523_Toc3901293)。


    默认情况下，MQTT 不加密通信。这意味着在大多数情况下，您应该通过 TLS 使用 MQTT。诚然，TLS 因其所需的握手以及线路上加密数据包尺寸较大而带来开销。然而，长寿命的
    TCP 连接通过减少握手频率来减轻其开销。此外，*TLS 会话恢复*允许重用先前协商的 TLS 会话，进一步减少了客户端重新连接时所需的时间和资源。即便如此，资源非常受限的设备可能难以应对
    TLS 带来的 CPU 和带宽消耗。在这些极端情况下，您至少应该加密`PUBLISH`消息的有效载荷和`CONNECT`消息中传输的密码。利用`AUTH`消息和质询/响应认证也是一个选项。


    如果您决定使用 TLS，请确保始终运行您的代理和客户端支持的最新版本，并验证证书链。由内部或开发 CA 签名的证书适用于开发和实验，但绝不应在生产环境中部署。生产环境中使用的证书应由受信任的证书颁发机构签名。此外，您应密切关注您用于
    TLS 的密码套件中发现的任何漏洞。通常，迁移到更安全的套件是非常值得的。


    大多数代理和客户端与通常用于处理身份验证和授权的 IT 基础设施（如 LDAP 和 OAuth 授权服务器）集成。MQTT v5.0 新增的`AUTH`报文简化了这些类型的集成。您应始终研究您选择的代理和客户端库的文档，以了解它们支持哪些身份验证技术以及具备哪些授权功能。此外，您应注意代理提供的限流功能，这有助于减轻恶意客户端发起的、旨在使代理过载的攻击的影响。如果可能，限制消息大小也是一个好主意。

