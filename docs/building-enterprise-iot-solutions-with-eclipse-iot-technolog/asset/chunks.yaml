  trans: "\n## CoAP 与受限设备\n\n虽然 Californium 是一个成熟且功能完备的 CoAP 实现，但它无法在无法运行 Linux 或\
    \ Windows 等高级操作系统的受限设备上使用。这是因为实时操作系统通常缺少所需的 Java 运行时环境。幸运的是，有一些可用的库，甚至某些实时操作系统本身就内置了对\
    \ CoAP 的支持。\n\n在受限设备的上下文中，你需要回答的一个重要设计问题是：该设备是否应该作为 CoAP 服务器。运行服务器会比偶尔作为客户端发送请求消耗更多资源。如果你只需要报告传感器数值，那么运行服务器可能有些大材小用\
    \ `–` 尤其是在需要最大化电池续航的场景下。然而，如果设备需要执行命令，那么通过服务器暴露 CoAP 资源则是有意义的。例如，LwM2M 就采用了这种方法。\n\
    \nLinux 基金会的 [Zephyr RTOS](https://www.zephyrproject.org/) [内置了一个 CoAP 库](https://docs.zephyrproject.org/latest/reference/networking/coap.html)；该实现支持块传输（RFC\
    \ 7959）和观察（RFC 7641）。此外，它还同时支持客户端和服务器角色。Zephyr CoAP 库使用纯缓冲区实现，并要求开发者直接操作套接字。提醒一下，Zephyr\
    \ 是用 C 语言实现的。\n\nGitHub 上的 Zephyr 仓库包含大量示例，包括一个 CoAP [客户端](https://github.com/zephyrproject-rtos/zephyr/blob/zephyr-v2.7.0/samples/net/sockets/coap_client/src/coap-client.c)和[服务器](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/net/sockets/coap_server/src/coap-server.c)。现在让我们快速浏览一下客户端代码，看看向远程服务器发送\
