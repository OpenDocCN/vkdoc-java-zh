- fmt: "### Edge\n\nI described edge computing earlier as a form of distributed computing.\
    \ However, not all distributed computing is edge computing – even in an industrial\
    \ context. Modern edge computing emphasizes the use of microservices deployed\
    \ in containers or, less frequently, virtual machines. It also relies on approaches\
    \ and techniques inspired by *DevOps*. Simply having software running on a computer\
    \ connected to a *programmable logic controller* (PLC) driving the machinery is\
    \ not edge computing.\n\nThere are two main types of edge computing nodes: gateways\
    \ and servers. Edge servers can run multiple workloads and represent a way to\
    \ perform workload consolidation. They can be used to connect to constrained devices\
    \ or other edge servers. Gateways, on the other hand, are further classified into\
    \ IoT gateways and pure edge gateways. An IoT gateway acts as the focal point\
    \ for a group of sensors and actuators. It provides connectivity to these devices\
    \ to each other and an external network. It can be a physical piece of hardware\
    \ or embedded in a network-connected device. An edge gateway is the connection\
    \ point between an edge server and the Cloud or a more extensive network.\n\n\
    Independently of their type, edge nodes usually run an operating system. The 2021\
    \ Eclipse IoT and Edge developer survey found that Linux largely dominates on\
    \ edge nodes, with Microsoft Windows a strong second. Initiatives such as [EVE-OS](https://www.lfedge.org/projects/eve/),\
    \ hosted at LF Edge (Linux Foundation), aim to bring consistent system and orchestration\
    \ services to this space on the top of the Linux kernel. The [Oniro project](https://oniroproject.org/),\
    \ which I previously mentioned, is also suitable for edge nodes.\n\nSince edge\
    \ computing relies on microservices, it is necessary to configure, manage, and\
    \ coordinate them automatically. This is *edge orchestration*. While automation\
    \ is usually about a single task, orchestration focuses on processes that involve\
    \ multiple steps across several services. In the Cloud space, this need for orchestrating\
    \ workloads has increasingly been fulfilled by [*Kubernetes*](https://kubernetes.io/)\
    \ (also known as K8s). However, the complexity and resource requirements of Kubernetes\
    \ do not make it a good fit for several edge use cases. Some open source projects\
    \ address this issue. [K3s](https://k3s.io/) is a lightweight distribution of\
    \ Kubernetes, packaged as a single binary, that minimizes external dependencies.\
    \ [KubeEdge](https://kubeedge.io/en/), on the other hand, provides a containerized\
    \ edge computing platform completed by a Cloud component that integrates with\
    \ Kubernetes’ API server. That said, a growing part of the edge developer community\
    \ prefers to leverage edge platforms that can integrate with Kubernetes when needed\
    \ but can operate in stand-alone mode. This is the case of the two edge orchestration\
    \ projects calling the Eclipse Edge Native working group home. [Eclipse ioFog](https://iofog.io)\
    \ focuses on container orchestration at the edge and represents a centralized\
    \ take on edge computing since edge nodes communicate with a central controller.\
    \ [Eclipse fog05](https://fog05.io) (pronounced fogOS; the 05 is for 5G) supports\
    \ containers, virtual machines, and even binaries (executables); it manages nodes\
    \ in a decentralized fashion by incorporating resources in a unified fabric.\n\
    \n> **Note**  \n> For a thorough discussion of whether Kubernetes is a good fit\
    \ for your project, you can watch a talk titled “Do We Really Need Kubernetes\
    \ at the Edge?” which I delivered in 2021 ([`https://youtu.be/u8BDtSP7Dfg`](https://youtu.be/u8BDtSP7Dfg)).\n\
    \nEdge orchestration platforms aim to enable the deployment of edge applications.\
    \ Such applications come in all shapes and sizes, cover a wide variety of use\
    \ cases, and apply to nearly all industries. The Eclipse IoT working group hosts\
    \ a few open source edge applications. [Eclipse 4diac](https://www.eclipse.org/4diac)\
    \ provides development tools and a runtime environment compatible with IEC 61499;\
    \ in other words, it is a complete toolkit to build bespoke programable logic\
    \ controllers to drive industrial equipment. [Eclipse Keyple](https://keyple.org)\
    \ is a widely adopted solution to build complex contactless ticketing, transportation,\
    \ and event access systems. If you ever took the subway or the bus in Paris or\
    \ bought an SNCF train ticket from a terminal, you used Keyple without even knowing\
    \ it. Finally, [Eclipse VOLTTRON](https://volttron.org/) is a distributed control\
    \ and sensing software. VOLTTRON analyzes and converts digital building data streams\
    \ into actionable information to improve building operations, manage energy consumption,\
    \ and enable building integration with the electrical grid.\n\nIoT/edge gateways\
    \ and edge servers have distinct feature sets given their respective role in the\
    \ architecture. Gateways are a bridge between constrained devices and other resources\
    \ found on the edge-to-cloud continuum. In addition to modern field connectivity\
    \ options, they often feature serial ports and other types of legacy interfaces,\
    \ enabling organizations to leverage existing assets in the context of the IoT.\
    \ Because gateways are a connection point for constrained devices, they frequently\
    \ offer remote device management features. One of the longest-running Eclipse\
    \ IoT projects, named [Eclipse Kura](https://www.eclipse.org/kura/), is a platform\
    \ for building Linux-based gateways with the Java language and the OSGi framework.\
    \ Kura offers API access to the hardware and supports multiple field protocols,\
    \ including Modbus, MQTT, OPC UA, and S7. Kura can run edge applications and orchestrate\
    \ the workloads, making it a comprehensive solution for gateways.\n\nWhile gateways\
    \ play a specific role in the architecture, edge servers provide the resources\
    \ required to execute workloads. The diagram identifies machine learning and edge\
    \ analytics as the two most critical. The whole story is slightly more nuanced,\
    \ however. The respondents of the 2021 Eclipse IoT and Edge developer survey identified\
    \ artificial intelligence, control logic, data analytics, and sensor fusion as\
    \ their top edge computing workloads – in that order. One way or another, edge\
    \ servers are a powerful tool to reduce latency for artificial intelligence and\
    \ machine learning while improving privacy, especially for solutions deployed\
    \ in the public space."
  raw: '### Edge


    I described edge computing earlier as a form of distributed computing. However,
    not all distributed computing is edge computing `–` even in an industrial context.
    Modern edge computing emphasizes the use of microservices deployed in containers
    or, less frequently, virtual machines. It also relies on approaches and techniques
    inspired by *DevOps*. Simply having software running on a computer connected to
    a *programmable logic controller* (PLC) driving the machinery is not edge computing.


    There are two main types of edge computing nodes: gateways and servers. Edge servers
    can run multiple workloads and represent a way to perform workload consolidation.
    They can be used to connect to constrained devices or other edge servers. Gateways,
    on the other hand, are further classified into IoT gateways and pure edge gateways.
    An IoT gateway acts as the focal point for a group of sensors and actuators. It
    provides connectivity to these devices to each other and an external network.
    It can be a physical piece of hardware or embedded in a network-connected device.
    An edge gateway is the connection point between an edge server and the Cloud or
    a more extensive network.


    Independently of their type, edge nodes usually run an operating system. The 2021
    Eclipse IoT and Edge developer survey found that Linux largely dominates on edge
    nodes, with Microsoft Windows a strong second. Initiatives such as [EVE-OS](https://www.lfedge.org/projects/eve/),
    hosted at LF Edge (Linux Foundation), aim to bring consistent system and orchestration
    services to this space on the top of the Linux kernel. The [Oniro project](https://oniroproject.org/),
    which I previously mentioned, is also suitable for edge nodes.


    Since edge computing relies on microservices, it is necessary to configure, manage,
    and coordinate them automatically. This is *edge orchestration**.* While automation
    is usually about a single task, orchestration focuses on processes that involve
    multiple steps across several services. In the Cloud space, this need for orchestrating
    workloads has increasingly been fulfilled by [*Kubernetes*](https://kubernetes.io/)
    (also known as K8s). However, the complexity and resource requirements of Kubernetes
    do not make it a good fit for several edge use cases. Some open source projects
    address this issue. [K3s](https://k3s.io/) is a lightweight distribution of Kubernetes,
    packaged as a single binary, that minimizes external dependencies. [KubeEdge](https://kubeedge.io/en/),
    on the other hand, provides a containerized edge computing platform completed
    by a Cloud component that integrates with Kubernetes’ API server. That said, a
    growing part of the edge developer community prefers to leverage edge platforms
    that can integrate with Kubernetes when needed but can operate in stand-alone
    mode. This is the case of the two edge orchestration projects calling the Eclipse
    Edge Native working group home. [Eclipse ioFog](https://iofog.io) focuses on container
    orchestration at the edge and represents a centralized take on edge computing
    since edge nodes communicate with a central controller. [Eclipse fog05](https://fog05.io)
    (pronounced fogOS; the 05 is for 5G) supports containers, virtual machines, and
    even binaries (executables); it manages nodes in a decentralized fashion by incorporating
    resources in a unified fabric.


    Note


    For a thorough discussion of whether Kubernetes is a good fit for your project,
    you can watch a talk titled “Do We Really Need Kubernetes at the Edge?” which
    I delivered in 2021 ([`https://youtu.be/u8BDtSP7Dfg`](https://youtu.be/u8BDtSP7Dfg)).


    Edge orchestration platforms aim to enable the deployment of edge applications.
    Such applications come in all shapes and sizes, cover a wide variety of use cases,
    and apply to nearly all industries. The Eclipse IoT working group hosts a few
    open source edge applications. [Eclipse 4diac](https://www.eclipse.org/4diac)
    provides development tools and a runtime environment compatible with IEC 61499;
    in other words, it is a complete toolkit to build bespoke programable logic controllers
    to drive industrial equipment. [Eclipse Keyple](https://keyple.org) is a widely
    adopted solution to build complex contactless ticketing, transportation, and event
    access systems. If you ever took the subway or the bus in Paris or bought an SNCF
    train ticket from a terminal, you used Keyple without even knowing it. Finally,
    [Eclipse VOLTTRON](https://volttron.org/) is a distributed control and sensing
    software. VOLTTRON analyzes and converts digital building data streams into actionable
    information to improve building operations, manage energy consumption, and enable
    building integration with the electrical grid.


    IoT/edge gateways and edge servers have distinct feature sets given their respective
    role in the architecture. Gateways are a bridge between constrained devices and
    other resources found on the edge-to-cloud continuum. In addition to modern field
    connectivity options, they often feature serial ports and other types of legacy
    interfaces, enabling organizations to leverage existing assets in the context
    of the IoT. Because gateways are a connection point for constrained devices, they
    frequently offer remote device management features. One of the longest-running
    Eclipse IoT projects, named [Eclipse Kura](https://www.eclipse.org/kura/), is
    a platform for building Linux-based gateways with the Java language and the OSGi
    framework. Kura offers API access to the hardware and supports multiple field
    protocols, including Modbus, MQTT, OPC UA, and S7\. Kura can run edge applications
    and orchestrate the workloads, making it a comprehensive solution for gateways.


    While gateways play a specific role in the architecture, edge servers provide
    the resources required to execute workloads. The diagram identifies machine learning
    and edge analytics as the two most critical. The whole story is slightly more
    nuanced, however. The respondents of the 2021 Eclipse IoT and Edge developer survey
    identified artificial intelligence, control logic, data analytics, and sensor
    fusion as their top edge computing workloads `–` in that order. One way or another,
    edge servers are a powerful tool to reduce latency for artificial intelligence
    and machine learning while improving privacy, especially for solutions deployed
    in the public space.'
  trans: '

    ### 边缘计算


    我在前文中将边缘计算描述为分布式计算的一种形式。然而，并非所有分布式计算都是边缘计算——即便在工业背景下也是如此。现代边缘计算强调使用部署在容器中的微服务，或较少情况下使用虚拟机。它还依赖于受*DevOps*启发的方法和技术。仅仅让软件运行在连接到驱动机械设备的*可编程逻辑控制器*（PLC）的计算机上，并不算边缘计算。


    边缘计算节点主要有两种类型：网关和服务器。边缘服务器可以运行多个工作负载，是实现工作负载整合的一种方式。它们可用于连接受限设备或其他边缘服务器。而网关则进一步分为物联网网关和纯边缘网关。物联网网关是一组传感器和执行器的中心节点。它为这些设备提供彼此之间以及与外部网络的连接。它可以是一个物理硬件，也可以嵌入在网络连接设备中。边缘网关是边缘服务器与云端或更广泛网络之间的连接点。


    无论类型如何，边缘节点通常都运行一个操作系统。2021 年 Eclipse 物联网与边缘开发者调查发现，Linux 在边缘节点上占据主导地位，微软 Windows
    紧随其后，位居第二。诸如托管在 LF Edge（Linux 基金会）的[EVE-OS](https://www.lfedge.org/projects/eve/)等项目，旨在为
    Linux 内核之上的这一领域提供一致的系统与编排服务。我之前提到的[Oniro 项目](https://oniroproject.org/)同样适用于边缘节点。


    由于边缘计算依赖于微服务，因此需要自动配置、管理和协调它们。这就是**边缘编排**。虽然自动化通常针对单个任务，但编排关注的是涉及多个服务中多个步骤的流程。在云端领域，对工作负载编排的需求越来越多地由[*Kubernetes*](https://kubernetes.io/)（也称为
    K8s）来满足。然而，Kubernetes 的复杂性和资源需求使其并不适合多种边缘用例。一些开源项目正在解决这个问题。[K3s](https://k3s.io/)是
    Kubernetes 的一个轻量级发行版，打包为单个二进制文件，最大限度地减少了外部依赖。另一方面，[KubeEdge](https://kubeedge.io/en/)提供了一个容器化的边缘计算平台，并配有一个与
    Kubernetes API 服务器集成的云端组件。尽管如此，越来越多的边缘开发者社区倾向于使用那些在需要时能与 Kubernetes 集成，但也能独立运行的边缘平台。这正是两个归属于
    Eclipse Edge Native 工作组的边缘编排项目的情况。[Eclipse ioFog](https://iofog.io)专注于边缘的容器编排，代表了边缘计算的集中式方法，因为边缘节点与中央控制器通信。[Eclipse
    fog05](https://fog05.io)（发音为 fogOS；05 代表 5G）支持容器、虚拟机甚至二进制文件（可执行文件）；它通过将资源整合到统一结构中，以去中心化的方式管理节点。


    注意


    关于 Kubernetes 是否适合您的项目的深入讨论，您可以观看我于 2021 年发表的题为“我们真的需要在边缘使用 Kubernetes 吗？”的演讲（[`https://youtu.be/u8BDtSP7Dfg`](https://youtu.be/u8BDtSP7Dfg)）。


    边缘编排平台旨在支持边缘应用的部署。这类应用形态各异、规模不一，涵盖广泛的用例，并适用于几乎所有行业。Eclipse 物联网工作组托管了一些开源边缘应用。[Eclipse
    4diac](https://www.eclipse.org/4diac)提供了与 IEC 61499 兼容的开发工具和运行时环境；换句话说，它是一个完整的工具包，用于构建驱动工业设备的定制可编程逻辑控制器。[Eclipse
    Keyple](https://keyple.org)是一个广泛采用的解决方案，用于构建复杂的非接触式票务、交通和活动门禁系统。如果您曾在巴黎乘坐地铁或公交车，或从终端机购买过
    SNCF 火车票，那么您就在不知不觉中使用了 Keyple。最后，[Eclipse VOLTTRON](https://volttron.org/)是一个分布式控制和传感软件。VOLTTRON
    分析并转换数字建筑数据流，将其转化为可操作信息，以改善建筑运营、管理能耗，并实现建筑与电网的集成。


    鉴于物联网/边缘网关和边缘服务器在架构中各自扮演的角色，它们具有不同的功能集。网关是受限设备与边缘到云端连续体上其他资源之间的桥梁。除了现代现场连接选项外，它们通常还配备串行端口和其他类型的传统接口，使组织能够在物联网背景下利用现有资产。由于网关是受限设备的连接点，它们通常提供远程设备管理功能。Eclipse
    物联网项目中历史最悠久的项目之一，名为[Eclipse Kura](https://www.eclipse.org/kura/)，是一个使用 Java 语言和
    OSGi 框架构建基于 Linux 的网关的平台。Kura 提供对硬件的 API 访问，并支持多种现场协议，包括 Modbus、MQTT、OPC UA 和
    S7。Kura 可以运行边缘应用并编排工作负载，使其成为网关的全面解决方案。


    虽然网关在架构中扮演特定角色，但边缘服务器提供了执行工作负载所需的资源。图表将机器学习和边缘分析确定为最关键的两项。然而，实际情况要更微妙一些。2021 年
    Eclipse 物联网与边缘开发者调查的受访者将人工智能、控制逻辑、数据分析和传感器融合列为他们最重要的边缘计算工作负载——按此顺序。无论如何，边缘服务器是降低人工智能和机器学习延迟、同时提升隐私保护的有力工具，尤其适用于部署在公共空间的解决方案。'
- fmt: '### IoT Platforms


    If constrained devices gather data and edge nodes process it in physical locations
    close to its source, one could say that IoT platforms manage and analyze data.
    However, this statement expresses only a part of the scope of IoT platforms. They
    also provide the infrastructure to run applications that leverage the data and
    integration features that link constrained devices and edge nodes to the rest
    of the infrastructure managed by corporate IT.


    The first group of concepts related to IoT platforms in our architecture pertains
    to data. Data is integral to IoT. Sensors create it, and actuators execute commands
    that are the consequence of data-driven decisions. In that context, machine learning
    (ML) is an essential capability for IoT platforms since it aims to transform raw
    data into knowledge. Developers can leverage many popular open source machine
    learning frameworks, such as [TensorFlow](https://www.tensorflow.org/) and [scikit-learn](https://scikit-learn.org/stable/).
    Some ML frameworks have even been designed from the ground up for deployment at
    the edge; this is the case with [TensorFlow Lite](https://www.tensorflow.org/lite)
    and [Apache MXNet](https://mxnet.apache.org/versions/1.8.0/). There are several
    ML-related projects at the Eclipse Foundation. The most mature and widely adopted
    is [Eclipse Deeplearning4j](https://deeplearning4j.org). `Deeplearning4j` is a
    suite of tools for running deep learning on the JVM. It allows developers to train
    their models using the Java language and provides interoperability with the Python
    ecosystem.


    Analytics is another word to describe the use of data analysis tools and procedures.
    There is a thriving market of solutions in that space, both proprietary and open
    source. Bruce Sinclair distinguishes three classes of analytics:^([^(10)](#fn10))


    * **Real time:** Analytics performed as soon as the data is acquired to bring
    anomalies to light.

    * **Predictive:** Analytics looking at current and historical data to produce
    a prediction and confidence level.

    * **Descriptive:** Analytics that report on past, present, or future data and
    are often the basis of visualizations.


    [Eclipse Streamsheets](https://docs.cedalo.com/streamsheets/2.5/introduction)
    is a platform to access, create, and manage server-based spreadsheets that consume,
    process, and produce real-time data streams. Those spreadsheets can contain several
    types of graphs in addition to numerical data, enabling users to create interactive
    dashboards. `Streamsheets` supports several IoT protocols out of the box.


    Data management considers data a valuable resource and provides governance, tools,
    and methods to access, integrate, cleanse, and store it. Data management is a
    vast functional domain covering database management systems, big data systems,
    data warehouses, and data lakes. Data modeling is also a paramount concern since
    models are helpful abstractions developers leverage when building software. The
    [Eclipse Kapua](https://www.eclipse.org/kapua/) project provides a modular IoT
    platform with solid data management features. `Kapua` users can also perform IoT
    analytics by building dynamic dashboards.


    Let’s now focus on integration, the second group of concepts specific to IoT platforms
    in our reference architecture. The three concepts in this group are data integration,
    device connectivity, and device management. It is worth mentioning that `Eclipse
    Kapua` implements all three concepts and offers streamlined integration with gateways
    running `Eclipse Kura`.


    Data integration is the process of creating unified sources of information from
    multiple data sources. The wide variety of data management technologies and approaches
    makes data integration a critical function in the architecture. Of course, models
    and data sharing frameworks are also an essential part of data integration since
    it is rather challenging to consolidate data if it is not expressed in a standardized
    and consistent way. The [Eclipse Dataspace Connector](https://dataspace-connector.io/)
    project provides an interoperable framework for data sharing built on a common
    identity model. It will implement the [International Data Spaces standard (IDS)](https://internationaldataspaces.org/)
    and the [GAIA-X](https://www.gaia-x.eu/) European project’s protocols. Another
    relevant project is [Eclipse Thingweb](https://www.thingweb.io/), an implementation
    of the [*Web of Things* (WoT)](https://www.w3.org/WoT/wg/) model proposed by the
    World Wide Web Consortium (W3C). WoT aims to provide standard metadata and APIs
    to make possible integration across IoT platforms and application domains. If
    WoT is your thing, you may also want to look at [Eclipse EdiTDor](https://github.com/eclipse/editdor),
    a tool to create and edit WoT artifacts that is [available online](https://eclipse.github.io/editdor/).


    While networks and protocols provide a basic level of device connectivity, deploying
    an IoT solution at scale typically requires connecting to many constrained devices.
    Moreover, those devices will likely come from different providers and will not
    necessarily use the same protocols `–` whether by constraint or because of a design
    decision. [Eclipse Hono](https://www.eclipse.org/hono/) provides remote service
    interfaces to interact with IoT devices in a protocol-agnostic way. Devices can
    send *telemetry* and *event* messages to `Hono` to report sensor readings; applications
    can send *command* messages to the devices. Behind the scenes, `Hono` supports
    the `AMQP`, `CoAP`, `HTTP`, and `MQTT` protocols, and developers can build custom
    protocol adapters as needed.


    At its core, device management covers the operation and maintenance of devices.
    An IoT platform needs to maintain a device registry and record each device’s update
    history to achieve this. Since IoT devices are so varied in their hardware, configurations,
    and capabilities, many of the features of device management platforms used to
    control computers and mobile devices are not needed in the context of IoT. However,
    a robust software update delivery back end is a must. The most advanced solutions
    support partial downloads and enable devices to resume interrupted file transfers.
    [Eclipse hawkBit](https://www.eclipse.org/hawkbit/), a domain-independent back-end
    framework for rolling out software updates to constrained devices, provides that
    and much more. In particular, `hawkBit`’s Device Management Federation (DMF) API
    makes it possible to leverage the device management features in protocols that
    include them, such as Lightweight M2M (LwM2M).


    Ultimately, applications are the reason why IoT platforms need to gather data
    and provide integration capabilities. Deploying constrained devices in the field
    is a means to an end, providing the infrastructure required by applications. The
    Eclipse ecosystem provides application runtimes and API management capabilities.
    Moreover, the `ioFog` and `fog05` edge computing platforms implement the core
    principles of EdgeOps, an evolution of the DevOps approach specifically targeted
    at edge environments.'
