  trans: '

    ### 建立连接


    与其他计算机一样，微控制器（MCU）以数字形式处理信息。换句话说，它们可以直接解读二进制信号。此类信号可以表示门是否打开，或传达按钮按下状态。如果 MCU
    工作在 3.3V 电压下，它会将 0V 测量值理解为二进制 0，将 3.3V 测量值理解为二进制 1。微控制器具有通用输入/输出（GPIO）引脚，用于发送或接收数字信号。然而，现实世界远比单纯的
    0 和 1 复杂。因此，许多传感器和执行器都使用模拟值。也就是说，它们会在特定范围内发送或处理电压值。对于一个 3.3V 的 MCU，模拟传感器会返回 0V
    到 3.3V 之间的任意值。大多数 MCU 都配备了一个或多个模数转换器（ADC）来解读此类信号。ADC 可以将引脚上的模拟电压转换为数字值。它们还能将电压电平转换为
    MCU 支持的数值范围。


    ADC 有多种不同类型。大多数 Arduino 板上的 ADC 是 10 位 ADC，这意味着它可以检测 1,024（2¹⁰）个离散的模拟电平。一些微控制器配备
    8 位 ADC（2⁸ = 256 个离散电平），还有一些配备 16 位（2¹⁶ = 65,536 个离散电平）甚至 24 位（2²⁴ = 16,777,216
    个离散电平）ADC。ADC 的另一个重要特性是其采样率：即 ADC 对输入信号进行采样的频率，以赫兹（Hz）为单位。务必记住，传感器也有其自身的采样率。因此，你需要确保计划使用的传感器和
    ADC 组合能够共同提供你所需的采样率。


    集成电路（IC）的 GPIO 有多种实现方式。该术语指的是专用于数字信号的引脚，而非统一的引脚布局标准。有时，会使用扩展器 IC 将 GPIO 引脚连接到诸如
    I²C 和 SMBus 等串行通信总线。微控制器通常包含 GPIO。根据应用场景，微控制器的 GPIO 引脚可能是其与外部电路的主要接口，也可能是众多 I/O
    选项中的一种。


    I²C、SPI、UART 和 W1 是微控制器甚至工业计算机上常见的四种高度相关的 I/O 接口。下面我将总结这四种接口的特性。


    *   **I**^(**2**)**C（内部集成电路）：** 一种在基于 MCU 的设备中常见的串行通信协议，尤其适用于与传感器、存储设备和 LCD 的接口连接。它是一种同步协议，因为它使用了一条时钟线。I²C
    协议与 SPI 类似，但使用的线缆更少。然而，由于地址冲突，当使用多个具有固定地址的传感器实例时，它可能会带来困难。I²C 允许多个主节点，而 SPI 则不支持这一点。


    *   **SPI（串行外设接口）：** 另一种在基于 MCU 的设备中常见的同步串行通信协议。它比 UART 和 I²C 都快，但需要更多的线缆。多个子节点可以共用同一个
    SPI 主引脚，设备甚至可以菊花链连接。


    *   **UART（通用异步收发传输器）：** 也称为串行端口，是 MCU 上常见的外设。异步串行端口为两个设备提供了一种无需共享时钟信号即可通信的简单方式。UART
    仅需两根线缆，尽管它们通常还带有另外两根线（RTS 和 CTS）来实现硬件流控制，以防止数据丢失。是否需要硬件流控制取决于所使用的线缆协议。


    *   **1-Wire（单总线）：** 一种通过单根线缆实现低速（16.3 kbit/s）连接的协议。该线缆同时传输信号和电力。1-Wire 在概念上与
    I²C 类似，但以降低数据速率为代价提供了更远的传输距离。1-Wire 连接通常是从 MCU 到多个外设的一对多连接。


    你可能已经注意到，我刚才讨论的四种选项都是串行和双向协议。这并非偶然。在部署大量设备时，串行协议减少了布线需求，使其更具成本效益。表 8-3 对这四种协议进行了相互比较。


    **表 8-3 MCU I/O 协议比较**


    |   | I²C | SPI | UART | 1-Wire |

    | --- | --- | --- | --- | --- |

    | 双工模式 | 半双工 | 半双工 – 3 线全双工 – 4 线 | 全双工 | 半双工 |

    | 服务器:客户端 | *:* | 1:* | 1:1 | 1:* |

    | 每设备线数 | 2 | 3 或 4 | 1 | 1 |

    | 数据速率 | 100 Kibit/s 400 Kibit/s1 Mibit/s3.4 Mibit/s | 取决于设备（可超过 10 MiB/s） | 最高
    5 MiB/s | 16 Kibit/s |

    | 最大距离 | 1m | 0.2m | 15m | 最高 350m（取决于拓扑结构和设备数量） |


    尽管我在解释中只提到了传感器，但我所涵盖的协议也可用于控制执行器。另一种在处理它们时有用的技术是脉冲宽度调制（PWM）。PWM 是一种在机器人技术中用于驱动电机和舵机的技术。MCU
    利用内部计数器调制方波的占空比，以控制提供给设备的功率大小。通过快速切换电源与负载之间的开关，可以控制提供给设备的电压（和电流）平均值。许多 MCU 都带有
    PWM 控制器，这些控制器作为固件控制下的外设暴露于外部引脚。


    ## 端点、网关和边缘节点


    与 MCU 相比，物联网端点（通常包含单个 MCU）、物联网网关和边缘计算节点在能力上更接近传统服务器。事实上，在某些情况下，边缘计算节点将是部署在连接提供商光纤网络边缘的本地数据中心中的传统服务器。然而，网关和边缘节点通常位于数据中心之外。例如，物联网网关可用于通过
    CAN 总线连接集成传统的可编程逻辑控制器（PLC）。部署在风电场的边缘节点可用于聚合从附近涡轮机收集的数据。对于此类部署场景，依赖高性能但低功耗的硬件非常有意义。低压处理器可以被动散热，并且从设备中移除风扇等机械部件通常可以提高其平均无故障时间（MTBF）。使用低压部件还有一个额外的好处，即首先减少了热量输出。


    [2021 年版 Eclipse 物联网与边缘开发者调查](https://outreach.eclipse.foundation/iot-edge-developer-2021)发现，32%
    的受访者在其物联网网关和边缘节点中使用了基于 Arm v8 架构的处理器。AMD/Intel x86-64 架构以 29% 的比例位居第二，而 Arm v7（32
    位）是 27% 受访者的选择。该问题允许参与者最多选择三个选项。


    鉴于 Cortex-A 和 x86-64 架构的主导地位，现在让我们来看看它们所提供的处理器类型。

    '
- fmt: '### Arm Cortex-A


    Charting the Cortex-A ecosystem is no easy task, given the number of processor
    suppliers licensing the technology. Once again, rather than focusing on products,
    I will present the fundamental characteristics of the cores.


    The Cortex-A family offers both 32-bit and 64-bit cores. Generally speaking, the
    32-bit cores implement the Arm v7-A architecture except for the Cortex-A32 core,
    which implements Arm v8-A. Table [8-4](#524096_1_En_8_Chapter.xhtml#Tab4) lists
    the main characteristics of 32-bit Cortex-A cores.


    **Table 8-4** 32-bit Arm Cortex-A processor characteristics


    | Core | Arm Architecture | Characteristics |

    | --- | --- | --- |

    | A5 | Armv7-A | 1 to 4 cores, 4–64 KiB instruction and data caches (L1) |

    | A7 | Armv7-A | 1 to 4 cores, 8–64 KiB instruction and data caches (L1), 0–1
    MiB L2 cache |

    | A8 | Armv7-A | Single core only, 16–32 KiB instruction and data caches (L1),
    0–1 MiB L2 cache |

    | A9 | Armv7-A | 1 to 4 cores, 16–64 KiB instruction/data caches (L1), 128 KiB–8
    MiB L2 cache |

    | A12 | Armv7-A | 1 to 4 cores, 32–64 KiB instruction cache (L1), 32 KiB data
    cache (L1), 256 KiB–8 MiB L2 cache |

    | A15 | Armv7-A | 1 to 4 cores per cluster, 1 or 2 clusters per physical chip,
    32 KiB instruction/data caches per core (L1), Up to 4 MiB L2 cache per cluster
    |

    | A17 | Armv7-A | 1 to 4 cores, 32–64 KiB instruction cache (L1), 32 KiB data
    cache (L1), 256 KiB–8 MiB L2 cache |

    | A32 | Armv8-A | 1 to 4 cores, 8–64 KiB instruction/data caches (L1), 0–1 MiB
    L2 cache |


    64-bit Cortex-A cores implement the v8-A, v8.2-A, or v9-A architecture. They are
    commonly found not only in IT equipment but also in smartphones. The features
    of 64-bit Cortex-A cores are summarized in Table [8-5](#524096_1_En_8_Chapter.xhtml#Tab5).


    **Table 8-5** 64-bit Arm Cortex-A processor characteristics


    | Core | Arm Architecture | Characteristics |

    | --- | --- | --- |

    | A34 | Armv8-A | 1 to 4 cores per cluster, Multiple clusters per chip possible,
    8–64 KiB instruction/data caches (L1), 0 KiB–1 MiB L2 shared cache |

    | A35 | Armv8-A | 1 to 4 cores per cluster, Multiple clusters per chip possible,
    8–64 KiB instruction/data caches (L1), 128 KiB–1 MiB L2 shared cache (optional)
    |

    | A53 | Armv8-A | 1 to 4 cores per cluster, Multiple clusters per chip possible,
    8–64 KiB instruction/data caches (L1), 128 KiB–2 MiB L2 shared cache |

    | A55 | Armv8.2-A | 1 to 8 cores per cluster, Multiple clusters per chip possible,
    32–128 KiB instruction/data caches (L1) per core, 64–256 KiB L2 cache, 512 KiB–4
    MiB L3 cache |

    | A57 | Armv8-A | 1 to 4 cores per cluster, 48 KiB instruction cache (L1) per
    core, 32 KiB data cache (L1) per core, 512 KiB–2 MiB L3 cache |

    | A65 | Armv8.2-A | 1 to 8 cores per cluster, Simultaneous multithreading (SMT),
    16–64 KiB instruction/data caches (L1) per core, 64–256 KiB L2 cache |

    | A72 | Armv8-A | 1 to 4 cores per cluster, 48 KiB instruction cache (L1) per
    core, 32–64 KiB data cache (L1) per core, 512 KiB−4 MiB L2 cache |

    | A73 | Armv8-A | 1 to 4 cores per cluster, 48 KiB instruction cache (L1) per
    core, 32–64 KiB data cache (L1) per core, 512 KiB–4 MiB L2 cache |

    | A75 | Armv8.2-A | 1 to 4 cores per cluster, 64 KiB instruction/data caches (L1)
    per core, 128–512 KiB L2 cache, 512 KiB–4 MiB L3 cache (optional) |

    | A76 | Armv8.2-A | 1 to 4 cores per cluster, 64 KiB instruction/data caches (L1)
    per core, 128–512 KiB L2 cache, 512 KiB–4 MiB L3 cache (optional) |

    | A77 | Armv8.2-A | 1 to 4 cores per cluster, 64 KiB instruction/data caches (L1)
    per core, 256–512 KiB L2 cache, 512 KiB–4 MiB L3 cache (optional) |

    | A78 | Armv8.2-A | 1 to 4 cores per cluster, 32–64 KiB instruction/data caches
    (L1) per core, 256–512 KiB L2 cache, 512 KiB–4 MiB L3 cache (optional) |

    | A510 | Armv9-A | 1 to 8 cores per cluster, Merged-core microarchitecture, 32
    or 64 KiB instruction/data caches (L1) per core, 128 KB, 192 KB, 256 KB, 384 KB,
    or 512 KB L2 cache (optional), 256 KiB–8 MiB L3 cache (optional) |

    | A710 | Armv9-A | 1 to 8 cores per cluster, 32 or 64 KiB instruction/data caches
    (L1) per core, 256 KB or 512 KB L2 cache, 256 KiB–16 MiB L3 cache (optional) |


    Depending on the core selected, chipmakers can include up to four or eight cores
    per cluster and deploy several clusters on a single chip. Moreover, some of the
    Cortex-A cores can be deployed in a *big.LITTLE* configuration, where more powerful
    but power-hungry cores (big) are paired with power-efficient but slower cores
    (LITTLE). Processor designers can deploy the Cortex-A55 and A78 in such a configuration;
    the Cortex-A510 and A710 form another possible pair.


    The Cortex-A65, A76, and A78 have AE variants (Automotive Enhanced) that add dual-core
    lockstep for safety applications. Such a configuration allows the cores to process
    the same tasks in parallel and compare results for discrepancies. This greatly
    enhances the functional safety of the solution.


    Most chipmakers will ship their Arm products as systems on a chip, adding support
    for serial ATA (SATA), PCI Express (PCIe), USB, Ethernet, and lower-speed interfaces
    such as I²C, SPI, and GPIO, among others. Arm also offers to license its Mali
    series of graphics processing units (GPUs) that can accompany the processor cores
    on the chip package. Some players in the market license the processor cores from
    Arm and add their proprietary GPUs to the chips.


    ### x86-64


    Although there are only two main players in the x86-64 ecosystem, AMD and Intel,
    their product lines are plethoric and revised regularly. Rather than navigating
    ever-changing product lines, I will present the outlines of processors typically
    found in IoT gateways and edge nodes.


    Both AMD and Intel have offerings targeted at the embedded market. Those are true
    systems on a chip bringing together processor cores, graphics processing units
    (GPU), and, in some cases, low-speed interfaces such as I²C, SMBus, SPI, UART,
    and others. Since they are close to desktop and server processors, they also offer
    interfaces associated with that class of machines, such as PCIe, SATA, and USB.
    Support for error correction code (ECC) memory is not uncommon. The higher-end
    and most expensive options integrate cores from the AMD EPYC and Intel Xeon families.


    To control costs, many device makers will rely on processors hailing from the
    mobile product lines of AMD and Intel. In that case, they add circuitry to support
    the low-speed I/O interfaces needed separately. The advantage of such processors
    is that they offer lower power consumption and heat dissipation.


    Of course, some edge computing workloads require the full power of server-class
    processors. What makes such devices edge devices then is not their use of embedded
    technologies but rather the physical location where they are deployed. However,
    it is typical to find servers suitable for deployment at the edge shipping in
    ruggedized cases or enclosures.


    To provide you an idea of the types of x86-64 processors used in the market, here
    are the CPUs used in four specific devices that were shipping at the time of writing:


    *   **IoT gateway:** AMD Athlon Silver 3050e mobile processor (1.40 GHz, up to
    2.80 GHz Max Boost, 2 Cores, 4 Threads, 4 MB Cache)

    *   **Industrial computer:** 8th Generation Intel Core i3-8145U mobile processor
    (2.10 GHz, up to 3.90 GHz with Turbo Boost, 2 Cores, 4 Threads, 4 MB Cache)

    *   **IoT gateway:** Intel Atom x5-E3940 embedded processor (1.60 GHz, up to 1.80
    GHz boost, 4 Cores, 4 Threads, 2 MB cache)

    *   **Edge node (server):** Dual Xeon E5-2690v4 server processor (2.60 GHz, up
    to 3.50 GHz with Turbo Boost, 14 Cores, 28 Threads, 35 MB Cache)


    Ultimately, you should pick the processor that fits your workload and target power
    consumption. Please note that server-class and embedded processors often benefit
    from longer market availability than alternatives, providing a stable hardware
    platform over the long term.'
