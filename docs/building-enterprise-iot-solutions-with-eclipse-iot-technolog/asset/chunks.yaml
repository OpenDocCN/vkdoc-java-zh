    #### ioFog 入门指南


    ioFog 本身运行在 Linux 上。不过，`iofogctl` 有适用于 Linux、macOS 和 Windows 的版本。在 Windows 上，你只需下载可执行文件并将其放入你的路径中即可。


    要使用 Homebrew 包管理器在 macOS 上安装 ioFog，请执行以下命令：


    ```

    brew tap eclipse-iofog/iofogctl

    brew install iofogctl@3.0

    ```


    在 Linux 上，ioFog 团队为基于 Debian 和 RPM 的发行版维护了软件包仓库。你也可以选择直接安装二进制文件。为此，请执行以下命令：


    ```

    curl -LO \

    https://storage.googleapis.com/iofogctl/linux/3.0/iofogctl

    sudo install -o root -g root -m 0755 iofogctl \

    /usr/local/bin/iofogctl

    rm ./iofogctl

    ```


    你可以通过运行 `iofogctl version` 来测试 CLI 是否安装正确。输出应如下所示：


    ```

    version: 3.0.1

    platform: linux/amd64

    commit: 302077d2d66a0d788e7b6de99e65be8dc633f09e

    date: 2022-05-27T02:06:35+0000

    ```


    为了测试目的，在你的工作站上部署控制器和一个代理实例，请将以下 YAML 粘贴到合适位置的文件中。ioFog 文档建议使用 `/tmp/quickstart.yaml`。


    ```


    apiVersion: iofog.org/v3

    kind: LocalControlPlane

    metadata:

    name: ecn

    spec:

    iofogUser:

    name: Quick

    surname: Start

    email: user@domain.com

    password: q1u45ic9kst563art

    controller:

    container:

    image: iofog/controller:3.0.0


    apiVersion: iofog.org/v3

    kind: LocalAgent

    metadata:

    name: local-agent

    spec:

    container:

    image: iofog/agent:3.0.0

    ```


    然后，你可以通过执行以下命令来部署控制器和代理：


    ```

    iofogctl deploy -f /tmp/quick-start.yaml

    ```


    一旦容器启动，你可以通过以下 URL 访问 ECN Viewer：


    ```

    http://localhost:8008/#/overview

    ```


    用户名和密码已在上述 YAML 描述符中指定。


    ### Eclipse Kanto


    Eclipse Kanto 是贡献给 Eclipse 基金会的最新边缘计算平台。该项目由博世专注于物联网的子公司 Bosch.IO 发起。因此，它与多个其他
    Eclipse IoT 项目（如 Eclipse hawkBit（软件更新）、Eclipse Hono（设备连接）和 Eclipse Ditto（数字孪生））有着出色的集成。Kanto
    在 Eclipse 公共许可证版本 2 下提供。在撰写本文时，Kanto 的初始版本 v. 0.1.0-M1 刚刚可用。


    Kanto 的官方网络资源如下：


    *   **网站：** [`https://eclipse.org/kanto`](https://eclipse.org/kanto)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.kanto`](https://projects.eclipse.org/projects/iot.kanto)


    *   **代码仓库：** [`https://github.com/eclipse-kanto`](https://github.com/eclipse-kanto)


    #### Kanto 概念与架构


    项目团队将 Kanto 描述为一个模块化平台，为物联网设备提供云连接、数字孪生、本地通信、容器管理和软件更新等基本功能。这些设备可以从所选的云物联网平台进行远程配置和管理。图
    11-4 总结了 Kanto 的架构。该平台严重依赖 MQTT 协议，并捆绑了 [Eclipse Mosquitto](https://mosquitto.org)
    代理来处理组件之间的内部消息传递。


    ![](img/524096_1_En_11_Fig4_HTML.jpg)


    架构包括 Eclipse IoT、Bosch IoT Suite、Azure IoT Hub 等，云连接器、本地通信、边缘管理、软件更新、操作系统和物联网设备。


    图 11-4


    Eclipse Kanto 架构（来源：Eclipse 基金会）


    如你所见，该平台有四个主要功能模块。这些模块如下：


    *   **连接器：** 处理云连接。它可以与 Eclipse IoT 开源物联网平台（Ditto、hawkBit、Hono）、它们在 Bosch IoT
    Suite 中的商业等价物或微软的 Azure IoT Hub 进行交互。


    *   **容器管理：** 暴露一个统一的 API，抽象了容器管理的核心操作，包括生命周期、状态、网络、主机资源访问和使用管理。Kanto 支持多种容器运行时，无论是符合
    OCI 标准的（containerd、runc、kata）还是 Linux 原生的（LXC、LXD）。


    *   **文件上传：** 提供文件上传到 AWS s3 存储桶或普通 HTTP 服务器的功能。Kanto 可以按指定间隔上传文件，或等待云端后端发送的显式触发。该功能支持多种用例，例如诊断、监控、节点备份和系统恢复。


    *   **软件更新：** 为边缘节点及其连接的设备下载、验证和安装软件更新。Kanto 可以监控这些操作的进度，并可以恢复中断的下载。


    系统管理员通常通过另一个物联网平台与 Eclipse Kanto 交互。该项目的网站提供了 Eclipse Hono 和商业版 Bosch IoT Suite
    的示例。


    #### Kanto 入门指南


    目前，你只能在 Linux 上部署 Kanto。二进制文件以 Debian 软件包（`.deb`）的形式发布，适用于 x86_64、armv7（32 位）和
    arm64 架构。你可以在项目的主 GitHub 仓库中访问这些发布版本：[`https://github.com/eclipse-kanto/kanto/releases`](https://github.com/eclipse-kanto/kanto/releases)。


    目前 Kanto 的唯一先决条件是 `containerd` 运行时。你可以使用发行版的包管理器或 Kanto 团队提供的脚本来安装它，如下所示：


    ```

    curl -fsSL https://github.com/eclipse-kanto/kanto/raw/main/quickstart/install_ctrd.sh
    | sh

    ```


    要安装 Kanto 本身，请下载与你的节点架构匹配的 `.deb` 文件，然后使用 apt 安装。例如：


    ```

    sudo apt install ./kanto_0.1.0-M1_linux_x86_64.deb

    ```


    每个组件都将作为服务安装。你可以使用以下命令检查它们的状态：


    ```

    systemctl status \

    suite-connector.service \

    container-management.service \

    software-update.service \

    file-upload.service

    ```


    Kanto 现在可以使用了！使用公共的 Eclipse Hono 沙箱是测试它的一个好方法。Kanto 团队在此处提供了相关说明：[`www.eclipse.org/kanto/docs/getting-started/hono/`](http://www.eclipse.org/kanto/docs/getting-started/hono/)。当然，你也可以使用
    Eclipse IoT Packages 项目中的 [Cloud2Edge 包](https://www.eclipse.org/packages/packages/cloud2edge/)
    部署一个本地的 Hono 实例。


    ### Eclipse Kura


    物联网网关是边缘节点吗？从很多方面来说，是的，尽管传统的网关无法运行容器化的边缘原生应用程序。这种情况在 2021 年发生了变化，当时 Eclipse Kura
    获得了容器编排提供程序。


    作为 Eclipse IoT 最早的项目之一，[Eclipse Kura](https://www.eclipse.org/kura/) 自 2013 年以来一直蓬勃发展。该项目最初由
    Eurotech 创建，多年来吸引了多个第三方贡献。它在 Eclipse 公共许可证版本 2 下提供。在我撰写本文时，最新版本是 2022 年 4 月 26
    日发布的 5.1.1 版，并且 5.1.2 版的候选构建版本也已可用。Eclipse Kura 是 Eurotech 商业产品 [Everyware Software
    Framework](https://esf.eurotech.com/) (ESF) 的核心。


    Kura 的官方网络资源如下：


    *   **网站：** [`https://eclipse.org/kura`](https://eclipse.org/kura)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.kura`](https://projects.eclipse.org/projects/iot.kura)


    *   **代码仓库：** [`https://github.com/eclipse-kura`](https://github.com/eclipse-kura)

    '
- fmt: '# Kura Concepts and Architecture


    Eclipse Kura is a platform and application framework for building smart connected
    Edge systems and IoT gateways. It offers a remote management interface and exposes
    many APIs supporting IoT applications. Kura is completed by [Eclipse Kapua](https://www.eclipse.org/kapua/),
    an IoT platform providing a data and device management back end for Kura-powered
    edge devices. I will cover Kapua in the next chapter. Kura is written in Java;
    all it needs to run is a Java Standard edition runtime on a Linux operating system.
    The platform leverages the OSGi component model, which streamlines the process
    of writing reusable software building blocks. Kura sports deep integration with
    hardware, including serial ports, GPS, USB, GPIO, I²C, and others.


    Figure [11-5](#524096_1_En_11_Chapter.xhtml#Fig5) illustrates Kura’s architecture
    and feature set.


    ![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig5_HTML.jpg)


    An architecture includes applications, connectivity and delivery, network configuration,
    basic gateway services, remote management, device abstraction, assets, drivers,
    administration GUI, and Linux.


    Figure 11-5


    Eclipse Kura architecture (Credit: Eclipse Foundation)


    Kura offers developers an extensive set of services, including configuration,
    device life cycle management, remote access features, log management, health monitoring,
    networking, and Edge AI enablement. Here are additional details about a few other
    standout services:


    * **Data:** Kura defines generic data APIs abstracting the underlying database.
    This provides the flexibility to change the SQL database provider without changing
    the applications themselves. Kura offers a built-in SQL database engine (H2) and
    MQTT Broker (ActiveMQ Artemis). You can also deploy Apache Camel locally or integrate
    with a remote instance. Camel provides a rules-based routing and mediation engine.
    Kura also provides transient storage for messages. This allows it to cope with
    network disruptions in distributed edge deployments. Messages persisted locally
    that could not be transmitted are preserved even when the device reboots. They
    are sent to the Cloud once network conditions allow it. This ensures that the
    telemetry data history is preserved.


    * **Cloud:** Kura’s Cloud APIs abstract the actual Cloud provider; applications
    are not aware of the actual provider used. This makes it easier to switch providers
    if needed. Connections to remote Cloud services can be shared among several applications
    deployed on the gateway. Connecting to multiple Clouds at once (multi-cloud) is
    also possible. Out of the box, Kura can connect to the following Cloud services:
    AWS IoT, Azure IoT Hub, and Eurotech Everyware Cloud platform. Additional connectors
    are available through the Eclipse Marketplace, and you can also develop custom
    ones. Kura-based gateways are ready to connect to local or remote instances of
    the Eclipse Kapua IoT platform and the Eclipse Hono device connectivity platform.


    * **Security:** Kura is developed with security in mind. Eurotech’s commercial
    offering based on Kura, combined with one of its latest IoT Gateway hardware platforms,
    has obtained PSA Level 1 and IEC 62443-4-2 certifications.


    * **Wires:** This innovative feature provides a visual data flow programming tool
    to define data collection and processing pipelines.


    From a development standpoint, Kura applications are written in Java and packaged
    in OSGi bundles. However, the recently added support for containers means you
    can also build applications with other languages. Such containerized applications
    can interact with the Kura framework using REST APIs and JDBC or connect directly
    to the AMQ broker and Camel if deployed.


    Kura also ships with a rich web graphical interface. Figure [11-6](#524096_1_En_11_Chapter.xhtml#Fig6)
    showcases the Wire Graph editor.


    ![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig6_HTML.png)


    A screenshot of the Kura system includes a wire graph with a timer, mod bus asset,
    publisher, and logger, and a list of wire components, channels, and options for
    system and services.


    Figure 11-6


    Eclipse Kura graphical interface (Credit: Eurotech)


    # Getting Started with Kura


    The fastest way to deploy a Kura instance is to use the container image maintained
    by the project team and published to [Docker Hub](https://hub.docker.com/r/eclipse/kura/).
    On a workstation where Docker is already installed, all you need to do is to execute
    the following command:


    ```

    docker run -d -p 443:443 -t eclipse/kura

    ```


    Once the container is up, you can access the web user interface at `https://localhost`.
    The default credentials are `admin/admin`.


    If you prefer to test drive on a Raspberry Pi, the team provides `.deb` packages
    for Raspbian and Ubuntu. You can download them from the following location: [`http://download.eclipse.org/kura/releases/`](http://download.eclipse.org/kura/releases/).


    Download the latest Kura release matching your OS on a freshly updated system.
    You would, for example, install the Raspbian version using this command:


    ```

    sudo apt-get install ./kura__raspberry-pi_installer.deb

    ```


    On Raspbian, you need to ensure the SSH daemon is started. You also need to disable
    consistent device naming by adding the `net.ifnames=0` parameter at the end of
    the `/boot/cmdline.txt` file.


    The Kura documentation provides additional guidance and caveats. You will find
    full details here:


    * **Raspbian:** [`http://eclipse.github.io/kura/intro/raspberry-pi-quick-start.html`](http://eclipse.github.io/kura/intro/raspberry-pi-quick-start.html)


    * **Ubuntu:** [`http://eclipse.github.io/kura/intro/raspberry-pi-ubuntu-20-quick-start.html`](http://eclipse.github.io/kura/intro/raspberry-pi-ubuntu-20-quick-start.html)


    The team also produces a build for Nvidia’s Jetson Nano platform.'
