- fmt: '### Testing the Zenoh Router


    Most `zenoh` deployments will require at least a few routers. Consequently, it
    is useful to run router instances even on your development machine.


    If you installed `zenoh` binaries from a repository, the router executable should
    already be on your path. If you compiled the `zenoh` core library from the source,
    the executables are in your repository clone''s `target/release` subfolder. To
    start the router with an in-memory storage instance configured, simply execute
    this command:


    ```

    ./zenohd --cfg=''plugins/storages/backends/memory/storages/demo/key_expr:"/demo/example/**"''

    ```


    By default, the router will produce no console output. To verify it is working
    properly, you can call the REST API. Assuming the `jq` utility is installed, execute
    this command:


    ```

    curl http://localhost:8000/@/router/local |jq

    ```


    You should get output like this:


    ```

    [

    {

    "key": "/@/router/AFF09D2102A34B96A4DF00DEF13A0F5F",

    "value": {

    "locators": [

    "tcp/172.19.19.252:7447"

    ],

    "pid": "AFF09D2102A34B96A4DF00DEF13A0F5F",

    "plugins": [

    {

    "name": "rest",

    "path": "/home/fdesbiens/zenoh/target/release/libzplugin_rest.so"

    },

    {

    "name": "storages",

    "path": "/home/fdesbiens/zenoh/target/release/libzplugin_storages.so"

    }

    ],

    "sessions": [],

    "version": "v0.6.0-dev-160-ga2f190f1 built with rustc 1.59.0 (9d1b2106e 2022-02-23)"

    },

    "encoding": "application/json",

    "time": "None"

    }

    ]

    ```


    You can see in the preceding JSON that the `storages` plugin has been loaded since
    I defined an in-memory storage instance at startup. By default, the router only
    loads the HTTP plugin. However, the `memory` back end is built into the `storages`
    plugin and does not require the loading of an external library to work.


    You can use the following command to list the back ends present on a `zenoh` router:


    ```

    curl ''http://localhost:8000/@/router/local/**/backends/*'' |jq

    ```


    With the configuration I used to start the router, you should get output resembling
    this:


    ```

    [

    {

    "key": "/@/router/AFF09D2102A34B96A4DF00DEF13A0F5F/status/plugins/storages/backends/memory",

    "value": {},

    "encoding": "application/json",

    "time": "None"

    }

    ]

    ```


    You can also use the REST API to list the storages defined on the router. This
    is the appropriate request:


    ```

    curl ''http://localhost:8000/@/router/local/**/storages/*'' |jq

    ```


    The output should resemble this:


    ```

    [

    {

    "key": "/@/router/AFF09D2102A34B96A4DF00DEF13A0F5F/status/plugins/storages/backends/memory/storages/demo",

    "value": {

    "key_expr": "/demo/example/**"

    },

    "encoding": "application/json",

    "time": "None"

    },

    {

    "key": "/@/router/AFF09D2102A34B96A4DF00DEF13A0F5F/status/plugins/storages/__path__",

    "value": "/home/fdesbiens/zenoh/target/release/libzplugin_storages.so",

    "encoding": "application/json",

    "time": "None"

    },

    {

    "key": "/@/router/AFF09D2102A34B96A4DF00DEF13A0F5F/status/plugins/storages/version",

    "value": "v0.6.0-dev-160-ga2f190f1",

    "encoding": "application/json",

    "time": "None"

    }

    ]

    ```


    You will need to configure the router to leverage the other storage back ends.
    The `zenoh` repository contains a [sample configuration file](https://github.com/eclipse-zenoh/zenoh/blob/master/EXAMPLE_CONFIG.json5)
    from which you can take inspiration. The [filesystem](https://github.com/eclipse-zenoh/zenoh-backend-filesystem%2523examples-of-usage),
    [InfluxDB](https://github.com/eclipse-zenoh/zenoh-backend-influxdb%2523examples-of-usage),
    and [RocksDB](https://github.com/eclipse-zenoh/zenoh-backend-rocksdb%2523examples-of-usage)
    back-end repositories also provide configuration information. It is also possible
    to use the REST API to define such storage instances if the router’s runtime can
    load the appropriate libraries.


    **Note**


    The `zenoh` router is also available as a container. Just run this command to
    deploy it: `docker run --init -p 7447:7447/tcp -p 8000:8000/tcp eclipse/zenoh`.
    Please note that since Docker does not support UDP multicast between a container
    and the host, you may have to tweak your configuration. The [zenoh documentation](https://zenoh.io/docs/getting-started/quick-test/)
    provides the relevant details.


    The `zenoh` REST API can be used to publish values and issue queries to the infrastructure.
    It is useful in real-world applications but also for testing and troubleshooting.
    For example, suppose that various nodes publish words of wisdom under the `/demo/wisdom/*`
    key and that a storage instance has been created to hold them. Send a PUT request
    to the appropriate endpoint to publish a value, as shown in the following. In
    this case, the value is a UTF-8 string published to the `/demo/wisdom/rome` key.


    ```

    curl -X PUT -d ''Qui acceperint gladium, gladio peribunt.'' http://localhost:8000/demo/wisdom/rome

    ```


    Conversely, the following HTTP GET request will return all available values:


    ```

    curl http://localhost:8000/demo/wisdom/**

    ```


    The following is a sample result:


    ```

    [

    { "key": "/demo/wisdom/rome", "value": Qui acceperint gladium, gladio peribunt.,
    "encoding": "application/x-www-form-urlencoded", "time": "2022-03-03T15:13:27.872392699Z/940FD467605F4D38934F3419A2C12E6F"
    }

    ]

    ```


    Now that we have a working environment, time for some code! We will explore a
    few examples bundled with the Python language binding.


    ### Scouting


    The `scout` primitive operation in `zenoh` enables a node to determine which other
    nodes are available on the local network. The simplicity of the [example program
    showcasing it](https://github.com/eclipse-zenoh/zenoh-python/blob/master/examples/z_scout.py)
    is a testament to the power of the auto-discovery mechanisms that are part of
    the protocol. I reproduced that program:


    ```

    import sys

    import time

    import argparse

    import zenoh

    from zenoh import WhatAmI

    # initiate logging

    zenoh.init_logger()

    print("Scouting...")

    hellos = zenoh.scout(WhatAmI.Peer | WhatAmI.Router, 1.0)

    for hello in hellos:

    print(hello)

    ```


    In this case, the program is looking only for peers and routers. The third parameter
    specifies the length of the scouting operation in seconds; adjusting this duration
    could help mitigate latency or catch sleeping nodes coming back online.


    The following is the output of the program on my machine. At the time, I had only
    a router and a subscriber running.


    ```

    Scouting...

    Hello { pid: Some(6806944733A149B3B0A65991E9B43EC4), whatami: "peer", locators:
    ["tcp/172.19.19.252:33293"] }

    Hello { pid: Some(9863FA443A6749A89B4927D89EFF8716), whatami: "router", locators:
    ["tcp/172.19.19.252:7447"] }

    ```


    ### Subscribing


    Creating a subscription on `zenoh` is nearly as simple as scouting. The [subscription
    example program](https://github.com/eclipse-zenoh/zenoh-python/blob/master/examples/z_sub.py)
    first defines a callback named `listener` that will be called every time a value
    is received. All it does is to print the key and value, as you can see at the
    top of the following listing:


    ```

    def listener(sample):

    time = ''(not specified)'' if sample.source_info is None or sample.timestamp is
    None else datetime.fromtimestamp(

    sample.timestamp.time)

    print(">> [Subscriber] Received {} (''{}'': ''{}'')"

    .format(sample.kind, sample.key_expr, sample.payload.decode("utf-8"), time))

    # initiate logging

    zenoh.init_logger()

    print("Openning session...")

    session = zenoh.open(conf)

    print("Creating Subscriber on ''{}''...".format(key))

    sub = session.subscribe(key, listener, reliability=Reliability.Reliable, mode=SubMode.Push)

    print("Enter ''q'' to quit...")

    c = ''\0''

    while c != ''q'':

    c = sys.stdin.read(1)

    if c == '''':

    time.sleep(1)

    sub.close()

    session.close()

    ```


    Establishing the subscription is a simple matter. All you need to do is open a
    `zenoh` session and call the `subscribe` method on the resulting object. In this
    case, the program specifies reliable delivery and a push subscription.'
