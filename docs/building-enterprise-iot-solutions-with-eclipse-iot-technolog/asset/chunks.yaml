    shows how that page looks.


    ![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig5_HTML.jpg)


    A screenshot displays the page of server information on the screen of LESHAN with
    the server U R L, server public key, and server certificate. It has the options
    of clients, servers, security, and about at the top.


    Figure 3-5


    Eclipse Leshan test server `–` server information


    ### Building Your Client


    Like Californium, Leshan relies on the Maven build system. To start building your
    own client, you will need to add the dependencies shown in Listing [3-1](#524096_1_En_3_Chapter.xhtml#PC7)
    to your `pom.xml`:


    ```


    org.eclipse.leshan

    leshan-client-cf


    org.slf4j

    slf4j-simple

    1.7.30

    runtime


    Listing 3-1

    Maven dependency declaration for a Leshan client

    ```


    To create a Leshan client instance, you need to leverage the `LeshanClientBuilder`
    class. After that, all you need to do is call the `client` object’s `start` method.
    By default, Leshan will connect to the public demo server at leshan.eclipseprojects.io
    if no other parameters are provided. The following code sample shows how to create
    and start the client:


    ```

    String endpoint = "..." ; // choose an endpoint name

    LeshanClientBuilder builder = new LeshanClientBuilder(endpoint);

    LeshanClient client = builder.build();

    client.start();

    ```


    LeshanClientBuilder creates instances of the `Security`, `Server`, and `Device`
    objects populated with default values. Let’s say we wish to override the default
    values for those three and implement another object, `ConnectivityStatistics`,
    ourselves. The code for ConnectivityStatistics looks like this:


    ```

    public class ConnectivityStatistics extends BaseInstanceEnabler {

    @Override

    public ReadResponse read(ServerIdentity identity, int resourceid) {

    switch (resourceid) {

    case 0:

    return ReadResponse.success(resourceid, getSmsTxCounter());

    }

    return ReadResponse.notFound();

    }

    @Override

    public WriteResponse write(ServerIdentity identity, int resourceid, LwM2mResource
    value) {

    switch (resourceid) {

    case 15:

    setCollectionPeriod((Long) value.getValue());

    return WriteResponse.success();

    }

    return WriteResponse.notFound();

    }

    @Override

    public ExecuteResponse execute(ServerIdentity identity, int resourceid, String
    params) {

    switch (resourceid) {

    case 12:

    start();

    return ExecuteResponse.success();

    }

    return ExecuteResponse.notFound();

    }

    }

    ```


    Please note that all the numerical identifiers in the code refer to the LwM2M
    registry.


    Leshan provides the `ObjectsInitializer` class to create instances of LwM2M objects
    and implementations of Security, Server, and `Device`. Before calling `build`
    to obtain our client instance, we need to call `setObjects` on the builder (`LeshanClientBuilder`).
    The following snippet illustrates how to leverage `ObjectsInitializer`:


    ```

    ObjectsInitializer initializer = new ObjectsInitializer();

    initializer.setInstancesForObject(LwM2mId.SECURITY, Security.noSec("coap://localhost:5683",
    12345));

    initializer.setInstancesForObject(LwM2mId.SERVER, new Server(12345, 5 * 60, BindingMode.U,
    false));

    initializer.setInstancesForObject(LwM2mId.DEVICE, new Device("Ghibli Savoia",
    "S.21", "12345", "U"));

    initializer.setInstancesForObject(7, new ConnectivityStatistics());

    // add it to the client

    builder.setObjects(initializer.createAll());

    LeshanClient client = builder.build();

    client.start();

    ```


    You should study the [code of the Leshan client demo](https://github.com/eclipse/leshan/tree/master/leshan-client-demo)
    for a complete reference.'
