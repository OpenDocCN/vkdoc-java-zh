  trans: '

    ## 主题与主题过滤器


    由于 MQTT 发布者和订阅者相互解耦，代理需要一种方式来确定哪些消息应提供给每个客户端。为此，代理将消息组织在*主题*的层级结构中。在 MQTT 中，主题就是一个
    UTF-8 字符串，代理将用它来确定哪些订阅者会收到特定消息的副本。当客户端发布消息时，它必须指定一个主题。另一方面，订阅者通过*主题过滤器*来表达他们对哪些主题感兴趣。


    MQTT 客户端在发布或订阅主题之前，无需创建主题。代理会接受任何有效的主题名称，无需事先准备或初始化。主题名称支持的最大长度是 UTF-8 字符串的最大大小：65,535
    字节。不过，我强烈建议保持克制，让主题名称简短，因为较长的名称会影响性能和资源利用率。


    要建立主题层级结构，你只需使用正斜杠（“`/`” `U+002F`）来分隔层级中的各个级别。以下是一些有效主题名称的示例：


    ```

    Louvre/1/101/temperature

    Sites/USA/California/SanFrancisco/SiliconValley/

    e31a57ef-936b-46b8-ac89-3f39c8489f5f/status

    vehicles/trucks/647/speed

    ```


    主题过滤器可以包含通配符。规范定义了两种通配符。“`+`”是单级通配符，而“`#`”是多级通配符，只能用在过滤器的末尾。理解它们之间区别的最佳方式是通过一个示例。假设客户端将传感器读数发布到以下主题：


    ```

    Louvre/1/101/temperature

    Louvre/1/101/humidity

    Louvre/1/102/temperature

    Louvre/1/102/humidity

    Louvre/2/201/temperature

    Louvre/2/201/humidity

    ```


    主题名称中的第一个数字代表楼层，第二个数字是房间号。假设一个订阅者使用了以下主题过滤器：


    ```

    Louvre/1/+/temperature

    ```


    那么，它将收到以下主题的数据：


    ```

    Louvre/1/101/temperature

    Louvre/1/102/temperature

    ```


    它不会收到二楼房间或湿度传感器的消息。另一方面，如果过滤器如下所示：


    ```

    Louvre/2/#

    ```


    那么订阅者将收到发送到这些主题的消息：


    ```

    Louvre/2/201/temperature

    Louvre/2/201/humidity

    ```


    在这种情况下，订阅者不会收到任何在 `Louvre/1/` 下发送的消息。


    MQTT 规范定义了适用于主题名称和主题过滤器的规则：


    *   它们必须至少包含一个字符。

    *   它们区分大小写。

    *   它们可以包含空格字符。

    *   它们不得包含空字符（Unicode `U+0000`）。


    此外，主题名称不得包含主题过滤器通配符（“`#`”和“`+`”）。


    主题名称是完全任意的。以下是在为主题选择名称或进行订阅时应遵循的一些建议：


    *   **避免使用不可打印字符：** UTF-8 包含许多不可打印字符，包括制表符、空格和换行符。请避免使用它们，因为你将无法区分它们。仅仅因为规范说明可以使用空格，并不意味着这是个好主意。


    *   **不要订阅“#”：** 仅使用“`#`”作为主题过滤器意味着客户端订阅了发布到代理的所有消息。这可能会压垮客户端，或在生产环境中需要大量的计算资源。我强烈建议采用替代策略。例如，假设你需要将每条消息记录到历史数据库中。在这种情况下，你可以使用提供此类功能的代理`–`这并非
    MQTT 本身的一部分`–`或者利用 Eclipse Hono 和 Apache Kafka 来部署一个合适的流事件处理解决方案。


    *   **构建合理且可扩展的主题层级结构：** 主题层级结构的目标是为消息提供相关上下文。因此，你的主题应尽可能具体。订阅者不应通过解析消息负载来弄清消息的上下文。此外，你的主题层级结构应能适应未来的发展。如果你向机器添加传感器，或者只是希望报告新事件，你应该能够扩展现有的主题层级结构来容纳这些新消息。


    *   **标识符在主题名称中很有用：** 在主题层级结构中使用设备的唯一标识符，可以更容易地通过访问控制列表实现授权。大多数代理实现了各种授权机制，尽管这些机制并未在
    MQTT 规范中定义。


    *   **小心使用主题分隔符（正斜杠）：** 在主题名称中，不要将正斜杠用作开头或结尾字符。MQTT 规范 v5.0 的第 4.7.3 节指出：“开头或结尾的‘/’会创建一个不同的主题名称或主题过滤器”，并且“仅由‘/’字符组成的主题名称或主题过滤器是有效的。”这意味着
    `sensors/humidity`、`/sensors/humidity`、`sensors/humidity/` 和 `/sensors/humidity/`
    都会被代理视为不同的主题。避免潜在的混淆，保持简单。此外，使用开头斜杠会在主题层级结构的第一级引入一个无用的零字符级别。亲爱的读者，这可不是 LwM2M！


    注意


    许多代理会在 `$SYS/` 前缀下暴露特定于服务器的信息或控制 API，尽管 MQTT 规范并未强制要求这样做。名称以 `$` 开头的主题将不会匹配以通配符（`#`
    或 `+`）开头的订阅。

