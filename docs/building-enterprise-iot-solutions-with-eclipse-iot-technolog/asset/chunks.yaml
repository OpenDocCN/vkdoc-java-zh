    #### Getting Started with Kura


    The fastest way to deploy a Kura instance is to use the container image maintained
    by the project team and published to [Docker Hub](https://hub.docker.com/r/eclipse/kura/).
    On a workstation where Docker is already installed, all you need to do is to execute
