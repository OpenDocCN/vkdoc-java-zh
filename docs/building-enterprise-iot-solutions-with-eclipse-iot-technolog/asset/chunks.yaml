    10:21:07.699 INFO [EndpointManager]: created implicit endpoint coap://[0:0:0:0:0:0:0:0]:39470
    for coap

    2.05

    {"Content-Format":"text/plain", "Size2":457}

    ****************************************************************

    CoAP RFC 7252                                  Cf 3.1.0-SNAPSHOT

    ****************************************************************

    This server is using the Eclipse Californium (Cf) CoAP framework

    published under EPL+EDL: http://www.eclipse.org/californium/

    (c) 2014-2021 Institute for Pervasive Computing, ETH Zurich and others

    ****************************************************************

    ```


    You can see the server response at the bottom.


    ### Simple GET Request: The Code


    Let’s now have a look at the main parts of the [code for the simple GET request
    demo](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-helloworld-client/src/main/java/org/eclipse/californium/examples/GETClient.java).


    By default, Californium stores various configuration parameters in a Java `.properties`
    file. It is possible to override those default values, however. The following
    code snippet, which reproduces the top part of the class containing the simple
    GET request demo, shows how to accomplish this:


    ```

    private static final File CONFIG_FILE = new File("Californium3.properties");

    private static final String CONFIG_HEADER = "Californium CoAP Properties file
    for client";

    private static final int DEFAULT_MAX_RESOURCE_SIZE = 2 * 1024 * 1024; // 2 MB

    private static final int DEFAULT_BLOCK_SIZE = 512;

    static {

    CoapConfig.register();

    UdpConfig.register();

    }

    private static DefinitionsProvider DEFAULTS = new DefinitionsProvider() {

    @Override

    public void applyDefinitions(Configuration config) {

    config.set(CoapConfig.MAX_RESOURCE_BODY_SIZE, DEFAULT_MAX_RESOURCE_SIZE);

    config.set(CoapConfig.MAX_MESSAGE_SIZE, DEFAULT_BLOCK_SIZE);

    config.set(CoapConfig.PREFERRED_BLOCK_SIZE, DEFAULT_BLOCK_SIZE);

    }

    };

    ```


    You can see that the `DefinitionsProvider` static inner class applies specific
    default values for some of the configuration parameters; Californium will assign
    default values by itself for every parameter not specified by the user.


    Before doing anything else, the `main(String args[])` method initializes the configuration.
    `createWithFile` will create a `.properties` file if none exists or read from
    an existing file if one is there.


    ```

    Configuration config = Configuration.createWithFile(CONFIG_FILE, CONFIG_HEADER,
    DEFAULTS);

    Configuration.setStandard(config);

    ```


    Once we have a valid configuration, sending the GET request to the URI specified
    on the command line is straightforward. The `response` variable of type `CoapResponse`
    gives us access to the contents of the server response. The following snippet
    shows how to send the GET request and process the response:


    ```

    CoapClient client = new CoapClient(uri);

    try {

    CoapResponse response = client.get();

    if (response != null) {

    System.out.println(response.getCode());

    System.out.println(response.getOptions());

    if (args.length > 1) {

    ...

    } else {

    System.out.println(response.getResponseText());

    ...

    }

    } else {

    System.out.println("No response received.");

    }

    } catch (ConnectorException | IOException e) {

    System.err.println("Got an error: " + e);

    }

    client.shutdown();

    ```


    ### Simple Server: Demo


    Building a CoAP server is more involved since you need to bind to network interfaces
    and implement the resources. Fortunately, the Californium demo apps offer several
    examples of servers. First, let’s see how you can run the [`cf-helloworld-server`](https://github.com/eclipse/californium/blob/3.0.0/demo-apps/cf-helloworld-server/src/main/java/org/eclipse/californium/examples/HelloWorldServer.java),
    a simple implementation. To start it, simply issue this command:


    ```

    java -jar cf-helloworld-server-3.0.0.jar HelloWorldServer

    ```


    You should see the following output. Note that since we ran the client earlier,
    Californium notifies us it is loading the configuration from `Californium3.properties`.


    ```

    11:51:01.585 INFO [Configuration]: defaults added COAP.

    11:51:01.588 INFO [Configuration]: defaults added SYS.

    11:51:01.588 INFO [Configuration]: defaults added UDP.

    11:51:01.589 INFO [Configuration]: defaults added TCP.

    11:51:01.590 INFO [Configuration]: loading properties from file /home/fdesbiens/californium/demo-apps/run/Californium3.properties

    11:51:01.626 INFO [RandomTokenGenerator]: using tokens of 8 bytes in length

    ...

    11:51:01.685 INFO [CoapEndpoint]: coap Started endpoint at coap://127.0.0.1:5683

    11:51:01.686 DEBUG [UDPConnector]: Starting network stage thread [UDP-Sender-/127.0.0.1:5683[1]]

    ```


    By default, this server will start in UDP mode only; you could also enable the
    experimental TCP support if desired. To verify that the server is running properly,
    you can use the `cf-helloworld-client` to send a GET request to the resource it
    exposes. The name of the resource is `helloWorld`. Open a new command prompt and
    execute this command:


    ```

    java -jar cf-helloworld-client-3.0.0.jar GETClient coap://127.0.0.1/helloWorld

    ```


    You should not encounter networking issues since you are running the client and
    server from the same machine. There should be a few output lines on the command
    prompt used to invoke the client. I reproduced the critical part of the output:


    ```

    ...

    2.05

    {"Content-Format":"text/plain"}

    Hello World!

    ...

    ```


    In this case, the server returned me a simple text response. The `2.05` you see
    is one of the response codes for a successful CoAP GET request – like a `200`
    in HTTP.'
