  trans: '

    ## Sparkplug 与互操作性


    MQTT 固有的互操作性缺失正是 Sparkplug 试图解决的问题。它是如何应对这一挑战的呢？让我们看看 Sparkplug 规范的作者是怎么说的：


    > *Sparkplug 规范的意图和目的是定义一个 MQTT 主题命名空间、有效载荷和会话状态管理，这些可以普遍应用于整个工业物联网市场领域，但特别满足实时
    SCADA/控制 HMI 解决方案的需求。满足这些系统的运营要求将使基于 MQTT 的基础设施能够为业务线和 MES 解决方案需求提供更有价值的实时信息。*^(¹⁶)


    其逻辑如下：如果 MQTT 设备和应用程序共享一个主题命名空间、状态管理和有效载荷，它们就能简单高效地集成。以下是这三个概念的高级概述：


    *   **主题命名空间：** Sparkplug 定义了一个可扩展的主题命名空间，针对 SCADA 和工业物联网领域进行了优化。该命名空间允许 MQTT
    客户端之间的自动发现和双向通信。


    *   **状态管理：** Sparkplug 充分利用 MQTT 的“持续会话感知”能力，在涉及带宽有限的不可靠网络场景中减少延迟，使其成为实时 SCADA
    和工业物联网解决方案的理想选择。这一点尤其重要，因为 Sparkplug 依赖于*例外报告*方法，即不向订阅者提供周期性更新。数据更新仅在发生时发送，而之所以能可靠地做到这一点，完全归功于
    Sparkplug 的状态管理功能。


    *   **有效载荷：** Sparkplug 定义了一种二进制消息编码，非常适合传统的基于寄存器的过程变量，例如 Modbus 寄存器值。有效载荷专注于称为*指标*的过程变量变更事件。有效载荷格式支持复杂数据类型、数据集、指标、指标元数据和指标别名。有效载荷格式是版本化的，并在主题结构中引用，以确保客户端能够轻松推断特定消息所使用的编码。


    在我详细解释 Sparkplug 的主题结构、状态管理和有效载荷之前，让我们先了解一下该协议的架构、要求和基本原则。


    ## 架构


    除了设备和传感器，Sparkplug 的参考架构定义了三种类型的组件：MQTT 服务器、MQTT 边缘节点和主机应用程序。图 5-1 说明了这些组件是如何组织的。


    ![](img/524096_1_En_5_Fig1_HTML.jpg)


    架构流程图包括 IT 层，包含 Sparkplug 的 MES、历史数据库和分析系统。SCADA 或工业物联网主机。MQTT 服务器（代理）。OT 层包含四个
    MQTT 边缘节点（Sparkplug）。该架构受安全措施保护。


    图 5-1


    Sparkplug 架构（来源：Eclipse 基金会）


    MQTT 服务器（代理）是架构的核心组件。它需要支持 MQTT 的特定功能子集，我将在下一节讨论这些功能。Sparkplug 支持使用多个代理来满足高可用性和冗余需求，这使得基础设施更具可扩展性。


    MQTT 边缘节点是在架构中扮演网关角色的 MQTT 客户端应用程序。它们实现与可编程逻辑控制器、远程终端单元、流量计算机和传感器等传统设备的本地接口。它们通常与本地离散
    I/O 和逻辑内部过程变量进行交互。边缘节点使非 Sparkplug 组件能够参与 Sparkplug 主题命名空间并使用 Sparkplug 有效载荷格式。


    Sparkplug 主机应用程序是消费实时 Sparkplug 消息的 MQTT 客户端。主机应用程序必须按照协议规定通告其在线或离线状态。在典型的 SCADA
    或工业物联网实现中，单个主主机应用程序负责监控和控制给定的边缘节点。边缘节点指示其主主机应用程序，并使用特定的 Sparkplug `STATE` 消息来通知边缘节点主主机是否已连接并订阅了
    MQTT 服务器。然而，Sparkplug 支持在监控或备用模式下添加额外的主机应用程序——无论其范围是全部边缘节点还是特定子集。边缘节点可以配置为在其主主机应用程序在线或离线时具有不同的行为。


    ## Sparkplug MQTT 要求


    目前，Sparkplug 明确绑定 MQTT 作为其传输协议。理论上它可以移植到其他协议，但它依赖于 MQTT 的特定行为来实现其某些功能。


    Sparkplug 支持 MQTT v3.1.1 和 v5.0。它可以在完全实现以下功能的代理和客户端库的任何组合上运行：


    *   使用 QoS 级别 0 和 1 进行发布和订阅


    *   保留消息


    *   遗嘱和遗言


    此外，在关于安全的非规范性章节中，规范建议依赖访问控制列表来限制客户端可以交互的主题，并在 MQTT 上运行 TLS。这些建议可能会影响您为实现方案选择的
    MQTT 代理或 SaaS 解决方案。


    Eclipse Mosquitto 和 Eclipse Amlen 都满足前面列出的要求，可用于实现基于 Sparkplug 的解决方案。


    ## 基本原则


    Sparkplug 规范强调了一些重要的设计原则。这些原则如下：


    *   发布/订阅方法


    *   例外报告


    *   持续会话感知


    *   出生和死亡证书


    *   支持持久和非持久连接


    继承自 MQTT 的发布/订阅方法的主要优势在于，设备与消费数据的应用程序完全解耦。与之前点对点的集成方法相比，Sparkplug 中的 MQTT 服务器（代理）扮演了集线器的角色。


    对于受限设备而言，一个关键问题是尽可能降低功耗和带宽消耗。例外报告是实现这一目标的优雅方式。在大多数情况下，边缘节点仅在其报告的值发生变化时才需要发送消息。这之所以可能，是因为
    Sparkplug 强制要求有状态的 MQTT 会话。也就是说，当例外报告没有意义时，开发者可以自由使用周期性报告。


    Sparkplug 的一个基本规则是，边缘节点或主机应用程序必须通告它们即将上线或即将离线。这是通过使用出生和死亡证书来实现的。死亡证书总是在 `CONNECT`
    数据包中注册为节点或应用程序的遗嘱消息。至于出生证书，规范规定它们必须是任何节点或应用程序发布的第一条消息。


    最后，Sparkplug 让开发者自行决定边缘节点是应永久连接到 MQTT 基础设施，还是仅在需要时连接。在周期性连接的情况下，节点需要做的就是发布自己的死亡证书，然后发送一个适当的
    `DISCONNECT` 数据包以优雅地关闭连接。这确保了 MQTT 服务器稍后不会发送死亡证书。主机应用程序随后会将从该节点接收到的指标视为“最后已知良好”值，直到该节点重新上线并刷新这些值。无论选择持续连接还是周期性连接，边缘节点都绝不能使用
    MQTT 持久会话。换句话说，边缘节点必须始终将 `cleanSession`（MQTT v3）或 `cleanStart`（MQTT v5）标志设置为 `true`。

    '
- fmt: "# Topic Namespace\n\nThe goal of the Sparkplug topic namespace is to organize\
    \ the data received from edge nodes and devices logically yet concisely. The structure\
    \ of the topic hierarchy looks like this:\n\n```\nnamespace/group_id/message_type/edge_node_id/[device_id]\n\
    ```\n\nI will now explain the meaning of each of the elements in the hierarchy.\n\
    \n## Namespace\n\nThe `namespace` element is a constant expressing the version\
    \ of Sparkplug used. It signals to message consumers both the structure of the\
    \ other levels in the topic hierarchy and the encoding of payload data. The `namespace`\
    \ element at the time of writing looked like this:\n\n```\nspBv1.0\n```\n\nThe\
    \ structure employed is\n\n```\nsp[Payload encoding scheme][Payload encoding scheme\
    \ version]\n```\n\nConsequently, the rest of this chapter describes version `v1.0`\
    \ of payload encoding scheme `B`, also known as *Sparkplug B*.\n\nNote\n\nThe\
    \ very first version of the Sparkplug specification defined payload encoding scheme\
    \ `A`. However, implementers found some issues with it, and it was quickly replaced\
    \ by payload encoding scheme `B`. Payload encoding scheme `A` is discontinued\
    \ and not documented in the specification anymore. Please do not use it.\n\n##\
    \ Group ID\n\nThe `group ID` element of the topic namespace is used to group the\
    \ edge nodes logically. It must be a valid UTF-8 MQTT string; as such, it cannot\
    \ contain the topic filter wildcard characters (`+` and `#`) nor the topic level\
    \ separator `/`.\n\nThe specification recommends using descriptive group ID names\
    \ but keeping them as short as possible.\n\n## Message Type\n\nThe Sparkplug specification\
    \ defines several message types. This mimics the way MQTT packets are defined.\
    \ Due to its structure, the topic namespace segregates messages according to their\
    \ type. I will discuss message types at length in the next section.\n\n## edge_node_id\n\
    \nThis element is an ID for the edge node within the infrastructure. It must be\
    \ a valid UTF-8 MQTT string. The specification states that the combination of\
    \ the `group ID` and the `edge node ID` must be unique. It also recommends keeping\
    \ edge node IDs as short as possible since they travel with every message published.\n\
    \n## device_id\n\nThe `device ID` identifies a device attached to the edge node\
    \ physically or logically. This is an optional element in the namespace since\
    \ some messages target the edge node and not a specific device. The `device ID`\
    \ must be unique in the scope of the edge node if it is used. It must be a valid\
    \ UTF-8 MQTT string.\n\nDevices with built-in support for Sparkplug could decide\
    \ to present themselves as an edge node rather than a device. In that case, they\
    \ would not produce or process device-related messages and would not use device\
    \ IDs.\n\n# Message Types\n\nSparkplug defines and documents several types of\
    \ messages. Using those, Host Applications\n\n* Can discover the metadata and\
    \ monitor the state of all the edge nodes and devices connected to the MQTT infrastructure\n\
    * Can discover all the metrics collected by the devices or edge nodes, including\
    \ diagnostics, properties, metadata, and current state values\n* May issue command\
    \ messages to any edge node or Device metric if the implemented security model\
    \ allows it\n\nThis is the full list of Sparkplug message types, along with a\
    \ brief explanation of their contents:\n\n* **NBIRTH:** Birth certificate for\
    \ Sparkplug Edge Nodes. The message lists everything the edge node itself will\
    \ report (node metrics) but not the device metrics. At a minimum, it will contain\
    \ the metric name, data type, and current value for every metric.\n* **NDEATH:**\
    \ Death certificate for Sparkplug Edge Nodes. This message is set as the will\
    \ message for the client upon connection. The payload contains a correlation identifier\
    \ enabling the Host Application to match the birth and death certificates. Upon\
    \ reception, the Host Application will mark the metric values for the node as\
    \ stale.\n* **NDATA:** Edge node data message. The payload of these messages contains\
    \ the edge node metric values that need to be reported to subscribing clients\
    \ because they have changed. There can be one or several metrics in the payload.\n\
    * **NCMD:** Edge node command message. Such messages are used to write a new value\
    \ for a metric on an edge node.\n* **DBIRTH:** Birth certificate for Devices.\
    \ Host Applications will create or update the metric structure for the device\
    \ only when they receive the relevant `DBIRTH`. In addition to value metrics,\
    \ the `DBIRTH` message can contain definitions for device control metrics and\
    \ device properties. Device control metrics are used for tasks such as rebooting\
    \ or setting a scan rate. Device properties can document the manufacturer, model,\
    \ and firmware version of a device, among other things.\n* **DDEATH:** Death certificate\
    \ for Devices. The edge node sends this message to signal the unavailability of\
    \ a device to the Host Application. Upon reception, the Host Application will\
    \ mark the metric values for the device as stale.\n* **DDATA:** Device data message.\
    \ The payload of these messages contains the device metric values that need to\
    \ be reported to subscribing clients because they have changed. There can be one\
    \ or several metrics in the payload.\n* **DCMD:** Device command message. Such\
    \ messages are used to write a new value for a metric on a device.\n* **STATE:**\
    \ Sparkplug Host Application state message. This message type is used for both\
    \ the birth and death certificates of the Host Application. The birth certificate\
    \ will be the first message sent by the Host Application when it comes online.\
    \ It will be a retained message delivered over QoS level 1 with the UTF-8 string\
    \ `ONLINE` as the payload. As for the death certificate, it simply substitutes\
    \ the string `OFFLINE` as the payload and is registered as the MQTT Will Message\
    \ for the Host Application in the MQTT `CONNECT` packet.\n\n  `STATE` messages\
    \ are published in a topic hierarchy of their own. This is the structure used:\
    \ `/STATE/sparkplug_host_application_id`. The application ID is arbitrary but\
    \ must be unique for every Sparkplug Host Application in the infrastructure.\n\
    \n# Payload Definition\n\nThe payload definition for Sparkplug enables application\
    \ builders and device makers to transmit values and their metadata in a very flexible\
    \ way.\n\nAt a technical level, the authors of the Sparkplug specification decided\
    \ on [Google Protocol Buffers](https://developers.google.com/protocol-buffers)\
    \ as their solution for structuring Sparkplug payloads and handling their serialization\
    \ and deserialization. Protocol Buffers is a language-neutral, platform-neutral,\
    \ extensible mechanism for serializing structured data. Protocol buffer data is\
    \ structured using a domain-specific language and stored in `.proto` files. Google\
    \ provides a compiler to generate data access classes from those files.\n\nThe\
    \ Sparkplug specification contains an integral copy of the Sparkplug payload in\
    \ `.proto` format. The Eclipse Tahu project [also has a copy in its repository](https://github.com/eclipse/tahu/blob/master/sparkplug_b/sparkplug_b.proto).\n\
    \nNote\n\nAny timestamp property you will see used in Sparkplug is an unsigned\
    \ 64-bit integer representing the number of milliseconds since the UNIX epoch\
    \ (January 1, 1970, UTC).\n\nThe top-level structure of a payload expressed in\
    \ JSON looks like this:\n\n```\n{\n\"timestamp\": 1641948773752,\n\"metrics\"\
    : [],\n\"seq\": 1,\n\"uuid\": \"base64png\",\n\"body\": \"an array of bytes\"\n\
    }\n```\n\nThe `uuid`, which is optional, represents a schema or arbitrary information,\
    \ enabling message recipients to parse the `body` property. The `body` is an array\
    \ of bytes that can accept any binary encoded data."
