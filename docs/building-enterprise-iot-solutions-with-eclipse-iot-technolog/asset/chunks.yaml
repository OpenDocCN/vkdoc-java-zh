  trans: "\n## 几个应用示例\n\n数字孪生以及我之前介绍的运行时，为构建企业级物联网应用和平台提供了途径。随后，你可以将这些应用的组件部署在边缘到云端连续体中的各个位置。在本章的剩余部分，我们将探讨三个应用或应用框架，它们展示了你可以构建或运行的内容。\n\
    \n### Eclipse 4diac\n\nEclipse 4diac 为分布式工业过程测量与控制系统提供了开源基础设施。它基于 [IEC 61499](https://webstore.iec.ch/publication/5506)\
    \ 标准，该标准定义了一种基于功能块的领域特定建模语言，用于构建分布式工业控制解决方案。该项目由 Thomas Strasser 和 Alois Zoitl\
    \ 于 2007 年宣布，并于 2015 年贡献给 Eclipse 基金会。其代码采用 Eclipse 公共许可证 2.0 版发布。\n\n4diac 包含两个主要组件：Forte\
    \ 和 IDE。Forte 是符合 IEC 61499 标准的运行时的一个可移植、占用空间小的实现。它使用 C++ 编写，面向 16 位和 32 位受限控制器。它可以在多种操作系统上运行，其中\
    \ Linux、VxWorks 和 Windows 是较为知名的选择。对 FreeRTOS 的支持正在开发中。从协议角度来看，Forte 支持基于 IP 的\
    \ TCP 和 UDP，以及 MQTT 和 OPC UA 等协议。也可以使用串行（RS-232）通信。另一方面，IDE 是一组用 Java 编写的 Eclipse\
    \ 桌面 IDE 插件。它为面向 Forte 运行时的开发者提供了一个设计环境。\n\n图 12-3 展示了运行中的 4diac IDE。\n\n![](img/524096_1_En_12_Fig3_HTML.jpg)\n\
    \n一张屏幕截图显示了 Tutorial-BlinkTestApp-4diac IDE 的界面，中央是 E_CYCLE、E_SWITCH 和 E_SR 的图表，左侧是系统配置、类型库和大纲，底部是属性。\n\
    \n图 12-3\n\n4diac IDE（图片来源：Eclipse 基金会）\n\n4diac 的官方网络资源如下：\n\n*   **网站：** [`https://eclipse.org/4diac`](https://eclipse.org/4diac)\n\
    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.4diac`](https://projects.eclipse.org/projects/iot.4diac)\n\
    *   **代码仓库：** [`https://git.eclipse.org/c/4diac/org.eclipse.4diac.forte.git/`](https://git.eclipse.org/c/4diac/org.eclipse.4diac.forte.git/)（运行时）\n\
    \    [`https://git.eclipse.org/c/4diac/org.eclipse.4diac.ide.git/`](https://git.eclipse.org/c/4diac/org.eclipse.4diac.ide.git/)（IDE）\n\
    \n4diac IDE 通过提供可视化编辑器来构建功能块图，从而支持开发过程。IDE 自带多个预定义的功能块，但你也可以设计自定义功能块。\n\n4diac\
    \ Forte 通常部署在可编程逻辑控制器上。这些是用于控制制造过程的加固型工业计算机。项目文档提供了在各种硬件平台上工作的说明。此外，4diac IDE\
    \ 还配备了一个设备模拟器，使你无需专用硬件即可运行和调试面向 Forte 的应用。\n\n制造和过程控制通常是高度分布式的，PLC 充当边缘节点，本地或远程的监控与数据采集系统协调操作。由于\
    \ 4diac 的运行时是用 C++ 编写的，因此它依赖于目标操作系统或编译器提供的标准 C 库。\n\n### Eclipse Keyple\n\n如果你去过法国，乘坐过法国国家铁路公司的火车，或在巴黎搭乘过地铁或公交车，那么你已经在不知不觉中使用了基于\
    \ Eclipse Keyple 的边缘应用。Keyple 是一个开源框架，用于简化支持基于智能卡流程并实现安全票务交易的终端实现。Keyple 于 2018\
    \ 年由 [Calypso 网络协会](https://calypsonet.org/) 贡献给 Eclipse 基金会。它根据 Eclipse 公共许可证\
    \ 2.0 版发布。\n\nKeyple 的官方网络资源如下：\n\n*   **网站：** [`https://keyple.org`](https://keyple.org)\n\
    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.keyple`](https://projects.eclipse.org/projects/iot.keyple)\n\
    *   **代码仓库索引：** [`https://github.com/eclipse/keyple`](https://github.com/eclipse/keyple)\n\
    \nKeyple 主要有两种实现：一种用 Java，另一种用 C++。两者在功能上大致相当。在撰写本文时，该框架的当前版本是 v2.0，这是对先前版本进行完全模块化重写的版本。你应该使用这个版本。尽管代码库现在分布在多个仓库中，但项目团队提供了工具和说明，以便轻松获取你的应用所需的组件。\n\
    \nKeyple 的核心功能集中在智能卡读卡器上。Keyple 提供了支持多种读卡器接口标准的插件，包括 PC/SC、NFC（在 Android 上）和 OMAPI。读卡器可以是本地的或远程的，从而能够在边缘创建高度分布式的解决方案。Keyple\
    \ 还支持 Calypso 处理 API，用于管理 Calypso 命令和安全功能。这实质上意味着，你的应用可以实时确定车票余额、确认持票人权限，并更新车票数据以扣除行程费用并计算新余额，等等。\n\
    \n你会在边缘的各种场景中找到基于 Keyple 的应用。它们可以处理各种基于智能卡的使用场景，而不仅仅是票务。Java 版本使你可以轻松地将代码移植到新硬件上，而\
    \ C++ 版本则可以支持更广泛的读卡器和设备，包括那些无法支持 Java 运行时占用空间的、资源非常受限的设备。\n"
- fmt: '### Eclipse VOLTTRON


    `Eclipse VOLTTRON` is an open source platform for distributed sensing and control.
    It provides services for gathering and storing data from devices and buildings,
    plus an environment for developing applications that interact with that data.
    `VOLTTRON` was created by a team at the Pacific Northwest National Laboratory
    (PNNL) and contributed to the Eclipse Foundation in 2019. It is licensed under
    the Apache License version 2.0.


    The official web resources for `VOLTTRON` are as follows:


    - **Website:** [`https://volttron.org`](https://volttron.org)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.volttron`](https://projects.eclipse.org/projects/iot.volttron)

    - **Code repository:** [`https://github.com/eclipse-volttron`](https://github.com/eclipse-volttron)


    `VOLTTRON` is written in Python and targets the Linux operating system. The platform
    is made of several distinct components. Here is a list of the main components:


    - **Agents:** Software components performing tasks on behalf of the users. Common
    use cases are data collection, device control, and platform management.

    - **Message bus:** Backbone of the system. It allows agents to publish their results
    and messages and to subscribe to data sources. You can configure `VOLTTRON` to
    use `ZeroMQ` or `RabbitMQ` to provide the message bus.

    - **Driver framework:** Interface between `VOLTTRON` agents and a device. The
    platform ships with a rich set of drivers, and you can develop your own.

    - **Historian framework:** API agents can leverage to automatically collect data
    from a defined subset of topics on the message bus and persist them to a historian
    database. The project team currently maintains historians targeting SQL databases,
    `MongoDB`, and `CrateDB`, among others. You can naturally build your own.

    - **User interface:** Web graphical management interface for managing distributed
    instances from a central one.


    Figure [12-4](#524096_1_En_12_Chapter.xhtml#Fig4) gives you a glimpse of the `VOLTTRON`
    user interface.


    ![](images/524096_1_En_12_Chapter/524096_1_En_12_Fig4_HTML.jpg)


    A screenshot displays the screen of `VOLTTRON Central BETA` with platforms, methods,
    `BACNet` proxy agent, address, description, a device ID, a vendor ID, vendor,
    type, `Volttron` point name, writable, and units of install devices.


    **Figure 12-4** `VOLTTRON` management user interface (Credit: Eclipse Foundation)


    `VOLTTRON` is a great example of a platform and framework supporting the development
    of distributed IoT applications. You can use it to build your own task-specific
    agents to cover many use cases. PNNL and its partners have successfully used it
    to build energy management solutions targeted at digital buildings.


    Footnotes [1](#524096_1_En_12_Chapter.xhtml#Fn1_source) [2](#524096_1_En_12_Chapter.xhtml#Fn2_source)
    [3](#524096_1_En_12_Chapter.xhtml#Fn3_source)


    # 13. Integration and Data


    > *Il ne faut pas uniquement intégrer. Il faut aussi désintégrer. C''est ça la
    vie. C''est ça la philosophie. C''est ça la science. C''est ça le progrès, la
    civilisation.*

    >

    > *It''s not enough to integrate, you must also disintegrate. That''s the way
    life is. That''s philosophy. That''s science. That''s progress, civilization.*

    >

    > —Eugène Ionesco, *La leçon*


    IoT and edge computing infrastructure may be deployed outside the corporate data
    center or the Cloud, but it is a crucial part of the organization. Executives
    and process owners need data from constrained devices to make informed decisions.
    They need those decisions enacted by the field through actuators. Edge nodes play
    a crucial role in all of this since they help deliver the latency, resiliency,
    and data sovereignty that make possible the deployment of real-time, mission-critical
    applications. However, this would not be enough to make your IoT application an
    *enterprise* IoT application.


    The gradual computerization of organizations started in the 1960s in most industrialized
    countries. Although both industrial and business processes were impacted, they
    evolved in distinct ways. Business processes became the realm of information technology
    (IT). IT focuses on data modeling and data objects expressed through standardized
    data formats; it adopted patterns such as publish/subscribe early and leveraged
    integrated networks. On the other hand, industrial processes belonged to operational
    technology (OT). OT focuses on applications that are directly coupled to processes,
    resulting in market-specific protocols and data formats, which are often proprietary.
    OT is often operated on isolated networks distinct from IT ones.


    The distinct evolution of IT and OT led to a persistent gap between them. Enterprise
    IoT must bridge this gap to provide integrated device connectivity, management,
    and data integration. This chapter will explore Eclipse Foundation open source
    projects providing those capabilities.


    ## Device Connectivity


    Typical business applications do not understand IoT protocols. Even enterprise-focused
    runtimes such as Jakarta EE do not support protocols like `MQTT` or `CoAP` out
    of the box. How do you then connect constrained devices and edge nodes to business
    applications? Enter IoT device connectivity platforms.


    The central feature of device connectivity platforms is to provide a simple and
    uniform API that business applications will utilize independently of the actual
    IoT protocol leveraged by the device. Such platforms will thus support most if
    not all the IoT protocols discussed in this book to broaden their appeal. Usually,
    they will enable devices to transmit sensor readings or other data. Business applications
    can also use them to invoke operations on devices.


    In the Eclipse IoT ecosystem, two projects can fill the role of a device connectivity
    platform: `Eclipse Hono` and `Eclipse Kapua`. Since `Kapua`’s feature set extends
    to device management, I will focus on `Hono` for now.'
