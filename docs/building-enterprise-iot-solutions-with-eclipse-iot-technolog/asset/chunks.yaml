    \ {\nLOG_ERR(\"Cannot connect to UDP remote : %d\", errno);\nreturn -errno;\n\
    }\nprepare_fds();\nreturn 0;\n}\n```\n\n实际发送请求的代码位于 `send_simple_coap_request`\
