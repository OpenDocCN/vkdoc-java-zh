    ### 指标


    Sparkplug 指标本质上是键/值/数据类型值。你可以为其添加可选的元数据和键/值属性。以下是一个示例：


    ```

    {

    "name": "exterior_temperature",

    "alias": 130870,

    "timestamp": 1641950175801,

    "datatype": "Int8",

    "is_historical": false,

    "is_transient": false,

    "is_null": false,

    "metadata": {},

    "properties": {},

    "value": 23

    }

    ```


    在这个例子中，我将 `metadata` 和 `properties` 留空，以便你能直观地看到它们的位置。元数据属性可以描述通过 Sparkplug 消息传输的二进制数据，尤其是文件。


    Sparkplug 负载还可以包含数据集和模板。数据集用于编码数据矩阵。要定义一个数据集，除了数据本身之外，你还需要提供列数、列名及其类型。至于模板，它们允许你定义自定义数据类型。这使得
    Sparkplug 负载编码既灵活又可扩展。


    ## 会话管理


    会话管理是 Sparkplug 的核心功能之一。规范作者解释了为什么这个功能如此重要：


    > *由于实时 SCADA 解决方案的特性，主主机应用程序和所有连接的 Eclipse Sparkplug 边缘节点彼此拥有 MQTT 会话状态信息非常重要。为了实现这一点，Sparkplug
    主题命名空间中关于出生/死亡证书的定义以及定义的负载，在主主机应用程序和相关边缘节点之间提供了状态和上下文。*^(¹⁷)


    也就是说，主主机应用程序与任何其他 Sparkplug 主机应用程序之间的主要区别在于，边缘节点在开始发布数据之前会检查主主机应用程序是否在线。请注意，主主机是由每个边缘节点标识的。例如，在给定的
    Sparkplug 基础设施中，一个边缘节点的主主机可能与另一个边缘节点的主主机不同。


    ## 示例


    假设我希望将*卢浮宫*迁移到 Sparkplug。情况会是什么样？提醒一下，我之前是从位于不同楼层的房间报告温度和湿度值的。一个示例传感器的主题结构将是：


    ```

    /Louvre/2/201/humidity

    ```


    这里，两个最大的因素是我们的边缘节点的数量和位置。我们是每个房间一个节点？还是每层一个？考虑到每个房间只有两个传感器，我假设每层有一个边缘节点。基于此，边缘节点
    ID 可以代表楼层，设备 ID 可以传达房间。


    那么组 ID 呢？在这种情况下，我正在*卢浮宫*部署，但接下来是*加拿大国家美术馆*。所以我将使用 Louvre 作为组 ID。


    好了，决定了这些之后，让我们看看我们的主机应用程序、边缘节点和设备的主题。


    ### 主机应用程序


    假设这里的主机应用程序叫做 `GLaDOS`。在这种情况下，我们可以将其用作应用程序 ID。主题将是：


    ```

    STATE/GLaDOS

    ```


    ### 边缘节点


    我决定每层有一个边缘节点，并使用节点 ID 来表示楼层号。我的边缘节点的主题将遵循以下模式：


    ```

    spBv1.0/Louvre/message_type/floor

    ```


    或者更具体地说，对于一楼的边缘节点：


    ```

    spBv1.0/Louvre/NBIRTH/1

    spBv1.0/Louvre/NDEATH/1

    spBv1.0/Louvre/NDATA/1

    spBv1.0/Louvre/NCMD/1

    ```


    ### 设备


    为了这个示例，我假设我的温度传感器和湿度传感器是连接到其所在楼层边缘节点的不同设备。为简单起见，我假设每个设备只暴露一个过程变量。现实世界中的设备通常暴露数百甚至数千个变量。我想通过设备名称传达房间号。主题模式将是：


    ```

    spBv1.0/Louvre/message_type/floor/device

    ```


    所以对于 101 房间，我将有：


    ```

    spBv1.0/Louvre/DBIRTH/1/temp-101

    spBv1.0/Louvre/DDEATH/1/temp-101

    spBv1.0/Louvre/NDATA/1/temp-101

    spBv1.0/Louvre/NCMD/1/temp-101

    spBv1.0/Louvre/DBIRTH/1/hum-101

    spBv1.0/Louvre/DDEATH/1/hum-101

    spBv1.0/Louvre/NDATA/1/hum-101

    spBv1.0/Louvre/NCMD/1/hum-101

    ```


    现在，我们唯一需要做的就是通过网络发送一些数据。`DBIRTH` 负载可能如下所示：


    ```

    {

    "timestamp": 1641940113424,

    "metrics": [ {

    "name": "temp-value",

    "alias": 1,

    "timestamp": 1641940113424,

    "dataType": "Int8",

    "value": -24,

    "transient": false,

    "null": false,

    "historical": false

    }],

    "seq" : 1,

    "metricCount" : 1

    }

    ```


    这是我们温度传感器的 `DDATA` 消息的 Sparkplug 负载：


    ```

    {

    "timestamp": 1641940114576,

    "metrics": [{

    "name": "",

    "alias": 1,

    "timestamp": 1641940024394,

    "dataType": "Int8",

    "value": -25

    }],

    "seq": 1

    }

    ```

    '
- fmt: "# Leveraging Eclipse Tahu\n\n[Eclipse Tahu](https://github.com/eclipse/tahu/blob/master/sparkplug_b/sparkplug_b.proto)\
    \ is an open source implementation of Sparkplug developed at the Eclipse Foundation.\
    \ It comprises five distinct client libraries in C, C#, Java, JavaScript, and\
    \ Python, each with different levels of maturity and adoption. At the time of\
    \ writing, the Java and C versions were the best maintained.\n\n**Note**\n\nThe\
    \ EFSP requires all Eclipse specifications to be accompanied by a compatible open\
    \ source implementation, that is, an implementation that passes the *Technology\
    \ Compatibility Kit* (TCK) for that specification. A TCK is software and documented\
    \ requirements that support the testing of implementations to ensure that they\
    \ are compatible with the specification. TCKs are built by the relevant Eclipse\
    \ specification project team.\n\nAt the time of writing, the best way to get started\
    \ with Tahu is to clone the repository and compile the version you are interested\
    \ in yourself. The Java version uses Apache Maven as its dependency management\
    \ system. To compile, go to the folder where you clone the repository and execute:\n\
    \n```\nmvn clean install\n```\n\nThis will build the Java version as well as the\
    \ Java sample applications. Once this is done, you can add this dependency in\
    \ your own `pom.xml`:\n\n```\n<dependency>\n    <groupId>org.eclipse.tahu</groupId>\n\
    \    <artifactId>tahu</artifactId>\n    <version>0.5.12</version>\n</dependency>\n\
    ```\n\nMake sure you update the version number to the current one when you try\
    \ this.\n\nTo conclude this chapter, let’s have a look at a simple Sparkplug Java\
    \ application bundled with Tahu. Named [SparkplugListener](https://github.com/eclipse/tahu/blob/master/sparkplug_b/tools/java_sparkplug_b_listener/src/main/java/org/eclipse/tahu/SparkplugListener.java),\
    \ it shows how to subscribe to Sparkplug messages on a broker and parse them.\n\
    \nMost of the code contained in the file leverages Eclipse Paho to connect to\
    \ a broker and subscribe to the `spBv1.0/#` topic. The `messageArrived` method\
    \ that I reproduced contains the Sparkplug-specific logic:\n\n```java\n@Override\n\
    public void messageArrived(String topic, MqttMessage message) throws Exception\
    \ {\n    Topic sparkplugTopic = TopicUtil.parseTopic(topic);\n    ObjectMapper\
    \ mapper = new ObjectMapper();\n    mapper.setSerializationInclusion(Include.NON_NULL);\n\
    \    System.out.println(\"Message Arrived on Sparkplug topic \" + sparkplugTopic.toString());\n\
    \    SparkplugBPayloadDecoder decoder = new SparkplugBPayloadDecoder();\n    SparkplugBPayload\
    \ inboundPayload = decoder.buildFromByteArray(message.getPayload());\n    // Convert\
    \ the message to JSON and print to system.out\n    try {\n        String payloadString\
    \ = mapper.writeValueAsString(inboundPayload);\n        System.out.println(mapper.writerWithDefaultPrettyPrinter().writeValueAsString(inboundPayload));\n\
    \    } catch (Exception e) {\n        e.printStackTrace();\n    }\n}\n```\n\n\
    The critical line of code is this one, where the instance of the `SparkplugBDecoder`\
    \ class is used to transform the raw bytes from the payload into something that\
    \ can be converted into JSON by the Jackson `ObjectMapper`:\n\n```java\nSparkplugBPayload\
    \ inboundPayload = decoder.buildFromByteArray(message.getPayload())\n```\n\nAs\
    \ you can see, the Tahu library abstracts the complexities of manipulating the\
    \ Sparkplug payloads. The Tahu repository contains several examples of [Sparkplug\
    \ publishers](https://github.com/eclipse/tahu/tree/master/sparkplug_b) that you\
    \ could take inspiration from. Some are stand-alone and simulate devices, while\
    \ others can run on Raspberry Pis.\n\nFootnotes [1](#524096_1_En_5_Chapter.xhtml#Fn1_source)\
    \ [2](#524096_1_En_5_Chapter.xhtml#Fn2_source) [3](#524096_1_En_5_Chapter.xhtml#Fn3_source)\n\
    \n# DDS\n\n> *Communiquer, c’est mettre en commun; et mettre en commun, c’est\
    \ l’acte qui nous constitue.*\n>\n> *To communicate is to share, and sharing is\
    \ the act that constitutes us.*\n>\n> —Albert Jacquard, *Petite philosophie à\
    \ l'usage des non-philosophes*\n\nServers are potential points of failure, whatever\
    \ their workload or physical location is. The Internet and TCP/IP are designed\
    \ to ensure traffic will reach its destination through alternate routes if specific\
    \ nodes or larger parts of the network fail. However, the protocols we have explored\
    \ together up to now all rely on some sort of server. Of course, you can make\
    \ those servers more resilient by leveraging high-availability features and deploying\
    \ redundant network connections. But the farther away you are getting from the\
    \ Cloud or the corporate data center, the harsher the environment will be. For\
    \ many real-time and mission-critical use cases, having a single point of failure\
    \ in the architecture is unacceptable, especially since brokers and servers also\
    \ add latency and jitter to the data flow.\n\nPeer-to-peer networks have for a\
    \ long time represented a more fault-tolerant alternative to centralized approaches.\
    \ In such networks, nodes connect directly to as many other nodes as possible.\
    \ In addition, peer-to-peer networks increase parallelism in the architecture\
    \ since there is no single bottleneck from a performance standpoint.\n\nIn the\
    \ domain of IoT and edge computing, DDS is without a doubt one of the best-established\
    \ examples of a protocol relying on a decentralized approach. In this chapter,\
    \ you will learn about DDS fundamentals and discover [Eclipse Cyclone DDS](https://github.com/eclipse-cyclonedds/cyclonedds),\
    \ a portable implementation of the protocol."
