  raw: '### Java


    The [Java version of Paho](https://github.com/eclipse/paho.mqtt.java) relies on
    Apache Maven as its build system, and the binaries are published to Maven Central.
    Listing [4-1](#524096_1_En_4_Chapter.xhtml#PC39) shows you the dependency declaration
    you should add to your `pom.xml`.


    ```


    org.eclipse.paho

    org.eclipse.paho.mqttv5.client

    1.2.5


    Listing 4-1

    Maven dependency declaration for Paho Java

    ```


    Please note that the artifactId for the MQTT v3 version of the library is `org.eclipse.paho.client.mqttv3`.


    Listing [4-2](#524096_1_En_4_Chapter.xhtml#PC40) is some sample code that illustrates
    how to publish a message using the blocking API. It is inspired by the sample
    found in the `README.md` for the library’s repository. I used the IP address for
    my broker here, but you could substitute `mqtt.eclipseprojects.io` or `test.mosquitto.org`.


    ```

    String topic        = "wisdom/Rome";

    String content      = "Omnium Rerum Principia Parva Sunt";

    int qos             = 2;

    String broker       = "tcp://192.168.2.16:1883";

    String clientId     = "JavaSample";

    MemoryPersistence persistence = new MemoryPersistence();

    try {

    MqttClient sampleClient = new MqttClient(broker, clientId, persistence);

    MqttConnectionOptions connOpts = new MqttConnectionOptions();

    connOpts.setCleanStart(true);

    System.out.println("Connecting to broker: "+broker);

    sampleClient.connect(connOpts);

    System.out.println("Connected");

    System.out.println("Publishing message: "+content);

    MqttMessage message = new MqttMessage(content.getBytes());

    message.setQos(qos);

    sampleClient.publish(topic, message);

    System.out.println("Message published");

    sampleClient.disconnect();

    System.out.println("Disconnected");

    System.exit(0);

    } catch(MqttException me) {

    System.out.println("reason "+me.getReasonCode());

    System.out.println("msg "+me.getMessage());

    System.out.println("loc "+me.getLocalizedMessage());

    System.out.println("cause "+me.getCause());

    System.out.println("excep "+me);

    }

    Listing 4-2

    Simple Paho Java publishing client

    ```


    The flow of the code is straightforward. Here is a list of the main steps in the
    preceding sample:


    1.  Create an instance of the `MqttClient` class. The constructor requires the
    broker’s URI, a client ID, and an instance of a persistence class. The sample
    uses memory persistence, but file persistence is also available.


    2.  Create an instance of `MqttConnectionOptions` and set the options we need.
    In this case, we opt for a clean session (`setCleanStart(true)`).


    3.  Connect to the broker by calling the `connect` method of MqttClient, passing
    our `MqttConnectionOptions` as a parameter.


    4.  Create a message. The constructor for the `MqttMessage` class accepts the
    payload as a byte array only. This is why I call `getBytes()` on the `String`
    holding the payload.


    5.  Call the `publish` and `disconnect` methods on our instance of MqttClient.


    If you need a more comprehensive sample, you could study the code of the [Paho
    mqtt-client CLI application](https://github.com/eclipse/paho.mqtt.java/tree/master/org.eclipse.paho.sample.mqttclient)
    available in the GitHub repository for Paho’s Java library.


    ### Python


    The Python version of Paho is fairly comprehensive. It offers blocking and nonblocking
    APIs and supports MQTT v3 and v5\. However, it does not implement message persistence
    or high availability at the time of writing. There are also some limitations involving
    [QoS 1 and QoS 2 messages](https://github.com/eclipse/paho.mqtt.python/blob/master/README.rst).
    The library is available in the *Python Package Index* (PyPI), and you can install
    it using the `pip` dependency manager. Python 2.7.9+ or 3.6+ is required.


    To install the library, execute this command:


    ```

    pip install paho-mqtt

    ```


    Let’s now look at Listing [4-3](#524096_1_En_4_Chapter.xhtml#PC42): a little program
    that subscribes to a specific topic and prints payloads as messages come in.


    ```

    import paho.mqtt.client as mqtt

    # The callback for when the client receives a CONNACK response from the server.

    def on_connect(client, userdata, flags, rc, properties):

    print("Connected with result code "+str(rc))

    # Subscribing in on_connect() means that if we lose the connection and

    # reconnect then subscriptions will be renewed.

    client.subscribe("wisdom/#")

    # The callback for when a PUBLISH message is received from the server.

    def on_message(client, userdata, msg):

    print(msg.topic+" "+str(msg.payload))

    client = mqtt.Client("PythonSample", protocol=mqtt.MQTTv5)

    client.on_connect = on_connect

    client.on_message = on_message

    # Use the IP or hostname of your broker.

    # You can also use the sandbox at mqtt.eclipseprojects.io

    client.connect("192.168.2.16", 1883, 60)

    # Blocking call that processes network traffic, dispatches callbacks and

    # handles reconnecting.

    # Other loop*() functions are available that give a threaded interface and a

    # manual interface.

    client.loop_forever()

    Listing 4-3

    Simple Paho Python publishing client

    ```


    Once again, this sample is inspired by code available in the README file of the
    library’s repository. I modified it to use MQTT v5\. Let’s now have a close look
    at the code’s flow. The main steps in the preceding code are as follows:


    1.  Declare a callback named `on_connect` that will be called once the client
    connects to the broker. This callback contains the logic to subscribe to a topic
    (`wisdom/Rome`).


    2.  Declare a callback named `on_message` that will be called once a message is
    received. I just print the message’s topic and payload.


    3.  Create an instance of the `Client` object. The two parameters in the constructor
    are a client ID and the version of MQTT I wish to use, v5 in this case. I also
    assign the two callbacks declared before.


    4.  Call the `connect` method on our `Client` instance. The last line ensures
    the program loops until interrupted (Ctrl+C).


    If you paste the code in a `.py` file and execute it, you will see this if the
    connection is successful:


    ```

    Connected with result code Success

    ```


    Let’s say I publish a message on the `wisdom/Rome` topic with mosquitto_pub:


    ```

    mosquitto_pub -h 192.168.2.16 -p 1883 -t wisdom/Rome -m ''Timendi Causa Est Nescire''

    ```


    Then, the output will be


    ```

    wisdom/Rome b''Timendi Causa Est Nescire''

    ```


    ## MQTT and Constrained Devices


    Constrained devices powerful enough to run a full TCP/IP stack can interact with
    MQTT brokers. Several open source and commercial libraries are available that
    target such devices, and some RTOSes ship with support for MQTT. If maximizing
    battery life is critical, going with MQTT-SN could be a better choice.


    I will now explain how you can leverage the Eclipse Paho embedded clients and
    give you pointers to get started on the Zephyr RTOS.'
  trans: '

    ### Java


    [Paho 的 Java 版本](https://github.com/eclipse/paho.mqtt.java)依赖 Apache Maven 作为其构建系统，二进制文件发布在
    Maven Central 上。清单 4-1 展示了您应添加到 `pom.xml` 中的依赖声明。


    ```


    org.eclipse.paho

    org.eclipse.paho.mqttv5.client

    1.2.5


    清单 4-1

    Paho Java 的 Maven 依赖声明

    ```


    请注意，该库的 MQTT v3 版本的 artifactId 是 `org.eclipse.paho.client.mqttv3`。


    清单 4-2 是一些示例代码，演示了如何使用阻塞 API 发布消息。其灵感来源于该库仓库中 `README.md` 文件里的示例。我在此处使用了我的代理服务器的
    IP 地址，但您可以将其替换为 `mqtt.eclipseprojects.io` 或 `test.mosquitto.org`。


    ```

    String topic        = "wisdom/Rome";

    String content      = "Omnium Rerum Principia Parva Sunt";

    int qos             = 2;

    String broker       = "tcp://192.168.2.16:1883";

    String clientId     = "JavaSample";

    MemoryPersistence persistence = new MemoryPersistence();

    try {

    MqttClient sampleClient = new MqttClient(broker, clientId, persistence);

    MqttConnectionOptions connOpts = new MqttConnectionOptions();

    connOpts.setCleanStart(true);

    System.out.println("Connecting to broker: "+broker);

    sampleClient.connect(connOpts);

    System.out.println("Connected");

    System.out.println("Publishing message: "+content);

    MqttMessage message = new MqttMessage(content.getBytes());

    message.setQos(qos);

    sampleClient.publish(topic, message);

    System.out.println("Message published");

    sampleClient.disconnect();

    System.out.println("Disconnected");

    System.exit(0);

    } catch(MqttException me) {

    System.out.println("reason "+me.getReasonCode());

    System.out.println("msg "+me.getMessage());

    System.out.println("loc "+me.getLocalizedMessage());

    System.out.println("cause "+me.getCause());

    System.out.println("excep "+me);

    }

    清单 4-2

    简单的 Paho Java 发布客户端

    ```


    代码流程非常直接。以下是上述示例中的主要步骤列表：


    1.  创建一个 `MqttClient` 类的实例。构造函数需要代理服务器的 URI、一个客户端 ID 以及一个持久化类的实例。该示例使用了内存持久化，但也支持文件持久化。


    2.  创建一个 `MqttConnectionOptions` 的实例并设置我们需要的选项。在此例中，我们选择了清洁会话（`setCleanStart(true)`）。


    3.  通过调用 MqttClient 的 `connect` 方法连接到代理服务器，并将我们的 `MqttConnectionOptions` 作为参数传入。


    4.  创建一条消息。`MqttMessage` 类的构造函数只接受字节数组形式的有效载荷。这就是为什么我对包含有效载荷的 `String` 调用了 `getBytes()`
    方法。


    5.  在我们的 MqttClient 实例上调用 `publish` 和 `disconnect` 方法。


    如果您需要一个更全面的示例，可以研究 Paho Java 库的 GitHub 仓库中提供的 [Paho mqtt-client CLI 应用程序](https://github.com/eclipse/paho.mqtt.java/tree/master/org.eclipse.paho.sample.mqttclient)的代码。


    ### Python


    Python 版本的 Paho 功能相当全面。它提供了阻塞和非阻塞 API，并支持 MQTT v3 和 v5。然而，在撰写本文时，它尚未实现消息持久化或高可用性。在
    [QoS 1 和 QoS 2 消息](https://github.com/eclipse/paho.mqtt.python/blob/master/README.rst)方面也存在一些限制。该库可在
    *Python 包索引* (PyPI) 中找到，您可以使用 `pip` 依赖管理器进行安装。需要 Python 2.7.9+ 或 3.6+ 版本。


    要安装该库，请执行以下命令：


    ```

    pip install paho-mqtt

    ```


    现在让我们来看一下清单 4-3：这是一个订阅特定主题并在消息到达时打印有效载荷的小程序。


    ```

    import paho.mqtt.client as mqtt

    # 当客户端收到来自服务器的 CONNACK 响应时的回调函数。

    def on_connect(client, userdata, flags, rc, properties):

    print("Connected with result code "+str(rc))

    # 在 on_connect() 中订阅意味着如果我们失去连接并

    # 重新连接，订阅将会被续订。

    client.subscribe("wisdom/#")

    # 当从服务器收到 PUBLISH 消息时的回调函数。

    def on_message(client, userdata, msg):

    print(msg.topic+" "+str(msg.payload))

    client = mqtt.Client("PythonSample", protocol=mqtt.MQTTv5)

    client.on_connect = on_connect

    client.on_message = on_message

    # 使用您代理服务器的 IP 或主机名。

    # 您也可以使用 mqtt.eclipseprojects.io 的沙箱环境。

    client.connect("192.168.2.16", 1883, 60)

    # 阻塞调用，用于处理网络流量、分发回调并

    # 处理重连。

    # 还有其他 loop*() 函数可用，提供线程化接口和

    # 手动接口。

    client.loop_forever()

    清单 4-3

    简单的 Paho Python 发布客户端

    ```


    同样，此示例的灵感来源于该库仓库的 README 文件中的代码。我对其进行了修改以使用 MQTT v5。现在让我们仔细看看代码的流程。上述代码的主要步骤如下：


    1.  声明一个名为 `on_connect` 的回调函数，该函数将在客户端连接到代理服务器后被调用。此回调函数包含订阅一个主题（`wisdom/Rome`）的逻辑。


    2.  声明一个名为 `on_message` 的回调函数，该函数将在收到消息后被调用。我只是打印了消息的主题和有效载荷。


    3.  创建一个 `Client` 对象的实例。构造函数中的两个参数分别是客户端 ID 和我希望使用的 MQTT 版本，此处为 v5。我还分配了之前声明的两个回调函数。


    4.  在我们的 `Client` 实例上调用 `connect` 方法。最后一行确保程序循环运行直到被中断（Ctrl+C）。


    如果您将代码粘贴到一个 `.py` 文件中并执行它，如果连接成功，您将看到以下内容：


    ```

    Connected with result code Success

    ```


    假设我使用 mosquitto_pub 在 `wisdom/Rome` 主题上发布一条消息：


    ```

    mosquitto_pub -h 192.168.2.16 -p 1883 -t wisdom/Rome -m ''Timendi Causa Est Nescire''

    ```


    那么，输出将是：


    ```

    wisdom/Rome b''Timendi Causa Est Nescire''

    ```


    ## MQTT 与受限设备


    功能强大到足以运行完整 TCP/IP 协议栈的受限设备可以与 MQTT 代理服务器进行交互。有多个针对此类设备的开源和商业库可用，并且一些 RTOS 内置了对
    MQTT 的支持。如果最大化电池寿命至关重要，那么选择 MQTT-SN 可能是更好的选择。


    我现在将解释如何利用 Eclipse Paho 嵌入式客户端，并为您提供在 Zephyr RTOS 上入门的指导。

    '
- fmt: '### Eclipse Paho Embedded Clients


    The Eclipse Paho project maintains separate embedded libraries for MQTT and MQTT-SN.
    Both are built using a layered approach; they do not rely on particular dependencies
    for networking, threading, or memory management. Moreover, they are written in
    ANSI standard C to make the code portable.


    The [Paho Embedded MQTT client](https://www.eclipse.org/paho/index.php%253Fpage%253Dclients/c/embedded/index.php)
    is made of three distinct components:


    - `MQTTPacket`: A tiny library focused exclusively on the serialization and deserialization
    of MQTT packets.

    - `MQTTClient`: A C++ library based on `MQTTPacket` that was initially written
    for the Arm mbed RTOS. It has since been ported to other platforms, such as Linux
    and Arduino. It avoids dynamic allocations and eschews the use of the STL.

    - `MQTTClient-c`: A direct translation of `MQTTClient` written in C. It works
    on the FreeRTOS kernel and could be used in similar environments.


    `MQTTPacket` supports all current versions of MQTT, and the other two support
    MQTT v3.1 and v3.1.1 only. To keep code size lower, they also removed some features
    compared to the full C and C++ implementations: message persistence, automatic
    reconnect, offline buffering, and WebSocket support. Moreover, `MQTTClient` and
    `MQTTClient-C` offer a blocking API only. The [GitHub repository](https://github.com/eclipse/paho.mqtt.embedded-c)
    contains samples for the three components on various operating systems.


    The [Paho Embedded MQTT-SN client](https://www.eclipse.org/paho/index.php%253Fpage%253Dclients/c/embedded-sn/index.php)
    uses the same approach as its MQTT brethren. It supports MQTT-SN v1.2. The client
    contains two main components:


    - `MQTTSNPacket`: A library to handle the serialization and deserialization of
    MQTT-SN packets. It also provides many helper functions.

    - `MQTTSNClient`: A C++ library based on `MQTTSNPacket`. It is a work in progress.


    The repository for the client also contains the code for the Paho [MQTT-SN transparent
    gateway](https://github.com/eclipse/paho.mqtt-sn.embedded-c/tree/master/MQTTSNGateway)
    I already mentioned.


    ### Zephyr RTOS


    The [Zephyr RTOS](https://www.zephyrproject.org/) from the Linux Foundation ships
    with a built-in MQTT library; the implementation only supports MQTT v3.1.0 and
    v3.1.1. The library is built on the top of BSD sockets and supports TLS.


    The Zephyr repository on GitHub contains a [sample publishing client](https://github.com/zephyrproject-rtos/zephyr/tree/main/samples/net/mqtt_publisher).


    Footnotes [1](#524096_1_En_4_Chapter.xhtml#Fn1_source) [2](#524096_1_En_4_Chapter.xhtml#Fn2_source)
    [3](#524096_1_En_4_Chapter.xhtml#Fn3_source)


    # 5. Sparkplug


    > *À certains moments de notre vie, notre propre lumière s’éteint et se rallume
    par l’étincelle d’une autre personne.*

    >

    > *At certain times in our life, our own light is extinguished and rekindled by
    the spark of another person.*

    >

    > —Albert Schweitzer


    Since 1999, MQTT has known tremendous growth and adoption. The inception of the
    Mosquitto and Paho projects at the Eclipse Foundation in 2012–2013 created an
    open, vendor-neutral community around the protocol. The most successful ecosystems
    are those that start and stay open.


    As I have explained earlier, there are many things in MQTT that you will need
    to decide arbitrarily. The MQTT specification is silent on how you should structure
    your topic hierarchy and does not say anything about the format and encoding of
    the payloads. Do you want to use plain text? Fine! Base64 encoded images? Sure
    thing! JSON, YAML, or XML? Of course! And at this point in the discussion, you
    probably see the problem. Devices and applications relying on MQTT have no idea
    what topic to publish or subscribe to. As for the payloads, they can be and will
    be anything and everything. Out of the box, MQTT infrastructure is not interoperable.


    Of course, you can design devices and applications to get the names of the topics
    through a configuration mechanism. You can even implement clever ways to massage
    payloads or implement custom logic to translate to and from a shared data model.
    But doing those things requires time. More importantly, the task will grow more
    complex as you add devices and applications. Fortunately, there is a better way:
    [Eclipse Sparkplug](https://sparkplug.eclipse.org/).


    Sparkplug is an open source specification hosted at the Eclipse Foundation “*[…]
    that provides MQTT clients the framework to seamlessly integrate data from their
    applications, sensors, devices, and gateways within the MQTT Infrastructure*.*”*^([^(15)](#fn15))
    It is developed in the open, [on GitHub](https://github.com/eclipse/Sparkplug).
    The evolution of Sparkplug is governed by the [Eclipse Foundation Specification
    Process](https://www.eclipse.org/projects/efsp/) (EFSP). Describing at length
    the EFSP process is outside the scope of this book, but the main thing you should
    remember about it is that the documents produced are open and the software open
    source. Anyone can copy and distribute the specification documents in any medium
    for any purpose and without fee or royalty.


    > **Note**

    >

    > Although you may not have heard about it before, the EFSP has been in use since
    2018. The Jakarta EE specifications, which succeeded Java Enterprise edition,
    are managed under the EFSP.


    Sparkplug is not some fangled newcomer in the market. The first version of the
    specification goes back to 2016 when Arlen Nipper and his team at Cirrus Link
    Solutions made it available. It has been widely adopted since, and many commercial
    and open source implementations are available. [Eclipse Tahu](https://projects.eclipse.org/projects/iot.tahu)
    is the Eclipse Foundation’s open source implementation, but the Linux Foundation’s
    [Fledge project](https://www.lfedge.org/projects/fledge/) also has a [Sparkplug
    connector available](https://fledge-iot.readthedocs.io/en/v1.8.2/plugins/fledge-south-mqtt-sparkplug/index.html).'
