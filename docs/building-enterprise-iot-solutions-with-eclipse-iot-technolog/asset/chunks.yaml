  trans: '

    ## 插件


    Zenoh 路由器节点可以通过插件向其他节点提供功能，这些插件是路由器在启动时加载的库，或者由管理员在运行时通过 REST API 加载。它们与路由器共享运行时，允许它们使用与路由器进程自身相同的对等
    ID 来调用 zenoh Rust API。


    在撰写本文时，zenoh 团队维护了两个提供基础设施核心功能的插件。这两个插件如下：


    *   **REST 插件：** 该插件实现了 [zenoh 的 REST API](https://zenoh.io/docs/apis/rest/)，^(²⁹)
    你可以使用它来操作基础设施或与 zenoh 系统交互以操作数据。稍后我将演示如何使用它。


    *   **存储插件：** 该插件管理分布式存储实例。该插件支持多种存储*后端*，涵盖了多种数据管理方法。


    这两个插件随标准 zenoh 发行版一起提供。zenoh 团队还维护了另外两个托管在独立仓库中的插件。你可以根据需要将它们添加到你的基础设施中。这两个插件如下：


    *   **DDS 插件：** 在广域网或多个局域网之间扩展 DDS 流量非常复杂。这是由于 DDSI-RTPS 的核心设计及其对 UDP/IP 多播数据包的依赖。另一方面，DDS
    最近在 ROS 2 生态系统中得到了广泛采用。[zenoh DDS 插件](https://github.com/eclipse-zenoh/zenoh-plugin-dds)^(³⁰)
    旨在封装 DDS 流量，以简化远程机器人集群的集成。该插件透明地将 DDS 发布和订阅映射到 zenoh 资源。[这篇博客文章](https://zenoh.io/blog/2021-04-28-ros2-integration/)^(³¹)
    详细解释了如何利用该插件。


    *   **Web 服务器插件：** 该插件提供了一个 HTTP 服务器，将 URL 映射到 zenoh 键。这使得可以提供从分布式 zenoh 存储实例中检索到的文件。典型的部署利用文件系统存储后端来提供静态文件。但是，该插件也可以与利用任何受支持存储后端的存储一起工作。


    ### 存储插件深度解析


    鉴于分布式存储在 zenoh 中的重要性，我现在将更详细地介绍存储插件。


    该插件实现的核心概念是*存储*和*后端*。存储实例只是在特定后端上存储键/值对，你需要在创建时为它们分配一个选择器。后端是 zenoh 支持的一种存储技术。后端抽象了实际使用的存储技术的细节。在撰写本文时，zenoh
    团队正在积极维护以下后端：


    *   **文件系统：** 值存储在主机文件系统的特定文件夹中。每个值都是一个单独的文件，使用与传输时相同的编码写入。键反映在每个文件的路径中。有关更多详细信息，请参阅[后端仓库](https://github.com/eclipse-zenoh/zenoh-backend-filesystem)^(³²)。


    *   **InfluxDB：** InfluxDB 是一个时间序列数据库。每个存储实例对应一个数据库。可以连接到现有数据库或创建一个新数据库。后端将为每个键创建
    InfluxDB 测量值。值作为 InfluxDB 数据点记录在这些测量值上。有关更多详细信息，请参阅[后端仓库](https://github.com/eclipse-zenoh/zenoh-backend-influxdb)^(³³)。


    *   **内存：** 键和值存储在内存中的哈希映射中。该后端的实现是存储插件本身的一部分。


    *   **RocksDB：** RocksDB 是一个可嵌入的键/值存储。该存储位于一个文件中。每个存储对应一个特定的数据库文件。Zenoh 键和值直接使用，无需映射。有关更多详细信息，请参阅[后端仓库](https://github.com/eclipse-zenoh/zenoh-backend-rocksdb)^(³⁴)。


    Zenoh 后端被打包为库，由存储插件加载。没有标准的配置方法，因为底层技术差异太大。后端和存储可以通过路由器启动时加载的 JSON5 配置文件或 zenoh
    REST API 创建。


    提供的每个后端都具有特定的性能和持久性特征。内存后端不提供长期持久性，但可以用作基础设施中的快速缓存。文件系统后端易于部署，但从性能角度来看，无法像数据库那样扩展。如果你构建的系统需要历史数据库来支持数据分析（正如许多
    SCADA 用例所做的那样），那么使用 InfluxDB 后端是合理的。最后，RocksDB 后端提供了一个可扩展的数据库引擎，如果你需要对数据执行大量随机访问查询，它将提供最佳性能。


    zenoh 团队还计划在未来引入一个支持 SQL 数据库的后端。这样的后端将提供与典型 IT 基础设施更好的集成。

    '
- fmt: '# Reliability and Congestion Control


    To understand how `zenoh` implements its reliability and congestion control features,
    you first need to know a bit more about `zenoh`’s internals. The `zenoh` protocol
    is made of two distinct layers:


    - **Session protocol:** The session protocol manages the one-to-one bidirectional
    sessions that nodes (runtimes) have with each other. Those sessions are the same
    whether clients, peers, or routers are involved. You can configure these sessions
    for best-effort or reliable delivery.

    - **Routing protocol:** The routing protocol propagates interests and route data
    from producers to consumers. It leverages the session protocol.


    Given how `zenoh` sessions work, the default reliability strategy is named *hop-to-hop*
    since delivery is guaranteed only between two specific nodes. This is sufficient
    in most cases since the infrastructure should be stable after its deployment.
    However, if nodes fail, then data loss is a possibility. Traffic will be rerouted,
    but there is no guarantee that all the in-flight data at the time of the outage
    will be delivered.


    The hop-to-hop strategy is highly scalable but insufficient for some mission-critical
    applications. Consequently, `zenoh` offers two alternative strategies that are
    configured through APIs. The first one, *first router to last router*, relies
    on reliable channels between the first and last routers on each route. The second
    one, named *end-to-end*, is much less scalable and consumes more resources. This
    is because `zenoh` will create *reliable channels between every publisher and
    subscriber pair* in the infrastructure. Figure [7-5](#524096_1_En_7_Chapter.xhtml#Fig5)
    compares the three reliability strategies available in `zenoh`.


    ![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig5_HTML.jpg)


    An illustration depicts the hop-to-hop, first router to last router, and end-to-end
    reliable channels for data producers, Zenoh routers, and data consumers.


    **Figure 7-5** Zenoh reliability strategies


    In addition to the reliability strategies it offers, `zenoh` separates control
    over message resending, memory usage (buffering), and message dropping. Subscribers
    control reliability by selecting a resending strategy. They declare if they need
    publishers to resend missing messages or not. On the other hand, publishers and
    routers individually decide how much memory they allocate to support reliability.
    This allows constrained devices to dedicate fewer resources, while routers will
    allocate more to alleviate congestion issues. Finally, publishers control what
    happens when congestion is detected by selecting a message dropping strategy.
    In `zenoh`, messages slated for reliable delivery are queued. When congestion
    happens, the memory dedicated to that queue is exhausted. Publishers need to specify
    if the infrastructure will drop the messages that cannot be queued or if the publication
    operation will be blocked. The message-dropping strategy is propagated from the
    publisher to all the relevant routers and applied to the entire routing path.


    ## zenoh-flow


    The `zenoh` protocol is a fantastic foundation for building all sorts of distributed
    systems, not just those related to IoT. A good proof of this is the [zenoh-flow
    dataflow programming framework](https://github.com/eclipse-zenoh/zenoh-flow),
    which enables developers to deploy computations spanning from the Cloud to constrained
    devices.


    Dataflow programming represents programs as a graph of connected nodes executing
    concurrently. When using dataflow programming languages, developers focus on the
    nodes and their interconnections, which express the application’s logic. Such
    languages share some features of functional languages. The `SystemVerilog` and
    `VHDL` hardware description languages, commonly used to design processor cores
    and other electronic systems, are examples of dataflow programming languages.


    In `zenoh-flow`, a dataflow is composed of three different types of nodes. Those
    three types of nodes are as follows:


    - **operator:** This node implements a computation. It also defines input rules
    that determine what conditions will trigger the node and output rules that establish
    which output values will be passed to the following operators in the graph.

    - **sinks:** This node consumes the data resulting from the dataflow.

    - **sources:** This node produces the data that will be processed through the
    dataflow.


    These nodes are loaded dynamically at runtime.


    To work with `zenoh-flow`, you must specify the dataflow graph through a YAML
    file. You will use tags to express location affinity and requirements for the
    operators. The graphs can contain *loops*, supporting iterative processing and
    control mechanisms. They can also contain *deadlines* (timeout values), enabling
    you to leverage time-aware computations and implement proper fault tolerance.
    Graphs are also *composable*; in other words, they can include other graphs by
    reference. This makes them reusable and extensible. When you deploy the dataflow
    graph, `zenoh-flow` will automatically deal with the distribution of software
    components by linking remote operators through `zenoh`. At runtime, the sources,
    operators, and sinks leverage the `zenoh` protocol to communicate in a location
    transparent manner. They could be deployed in various ways to support specific
    requirements.


    The `zenoh` team maintains a dedicated repository for [zenoh-flow examples](https://github.com/atolab/zenoh-flow-examples).
    You can browse it to learn how to define operators, sources, and sinks; it also
    contains examples of dataflow graphs in YAML. As of writing, `zenoh-flow` was
    still in alpha, which explains why I do not reproduce specific samples here.


    ## zenoh Protocol Stack


    A current trend among IoT protocols is to support a wider variety of network transports.
    `MQTT` can run on `UDP` with `MQTT-SN`, for example. Given this, it is not surprising
    that `zenoh` supports several transports out of the box since it is a recent piece
    of technology. Figure [7-6](#524096_1_En_7_Chapter.xhtml#Fig6) shows the `zenoh`
    protocol stack.


    ![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig6_HTML.jpg)


    An architecture consists of the following layers; applications, `zenoh`, `UDP`,
    `TCP`, `TLS`, `QUIC`, `SHM`, layer 2 or 3, `IPv4` or `IPv6`, Ethernet Wi-Fi, and
    physical channel.


    **Figure 7-6** The zenoh protocol stack


    What makes `zenoh` different is that it can run directly over an OSI level 2 data
    link without an intermediate transport. Of course, `zenoh` can also support `TCP`
    and `UDP` on top of `IP`. `TLS` is available for encrypted communications if you
    choose `TCP`. Moreover, you can also use `TLS` if you use the `QUIC` protocol,
    which relies on `UDP`. Finally, `zenoh` can also leverage shared memory and UNIX
    sockets transports.


    > **Note:** `QUIC` (pronounced “quick”) is a general-purpose transport layer network
    protocol created by Jim Roskind at Google. `QUIC` leverages multiplexed `UDP`
    connections between two endpoints. `QUIC` is now a proposed standard at the IETF
    and is documented in [RFC 9000](https://www.rfc-editor.org/rfc/rfc9000.txt).


    The `zenoh` documentation contains detailed instructions about [setting up TLS](https://zenoh.io/docs/manual/tls/)
    for use with `TCP`. The same configuration applies if you choose to use `QUIC`
    instead.


    ## Coding with Eclipse zenoh


    The core `zenoh` library is implemented in Rust. Consequently, the team publishes
    binaries for the main platforms supported by the language: Linux, macOS, and Windows.
    At the time of writing, the C and Python language bindings are supported on every
    platform where the target language and Rust are supported. This section will focus
    on Python code examples.


    The official web resources for `zenoh` are as follows:


    - **Website:** [`https://zenoh.io`](https://zenoh.io)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.zenoh`](https://projects.eclipse.org/projects/iot.zenoh)

    - **Code repository:** [`https://github.com/eclipse-zenoh/zenoh`](https://github.com/eclipse-zenoh/zenoh)'
  raw: '## Reliability and Congestion Control


    To understand how zenoh implements its reliability and congestion control features,
    you first need to know a bit more about zenoh’s internals. The zenoh protocol
    is made of two distinct layers:


    *   **Session protocol:** The session protocol manages the one-to-one bidirectional
    sessions that nodes (runtimes) have with each other. Those sessions are the same
    whether clients, peers, or routers are involved. You can configure these sessions
    for best-effort or reliable delivery.


    *   **Routing protocol:** The routing protocol propagates interests and route
    data from producers to consumers. It leverages the session protocol.


    Given how zenoh sessions work, the default reliability strategy is named *hop-to-hop*
    since delivery is guaranteed only between two specific nodes. This is sufficient
    in most cases since the infrastructure should be stable after its deployment.
    However, if nodes fail, then data loss is a possibility. Traffic will be rerouted,
    but there is no guarantee that all the in-flight data at the time of the outage
    will be delivered.


    The hop-to-hop strategy is highly scalable but insufficient for some mission-critical
    applications. Consequently, zenoh offers two alternative strategies that are configured
    through APIs. The first one, *first router to last router*, relies on reliable
    channels between the first and last routers on each route. The second one, named
    *end-to-end*, is much less scalable and consumes more resources. This is because
    zenoh will create *reliable channels between every publisher and subscriber pair*
    in the infrastructure. Figure [7-5](#524096_1_En_7_Chapter.xhtml#Fig5) compares
    the three reliability strategies available in zenoh.


    ![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig5_HTML.jpg)


    An illustration depicts the hop-to-hop, first router to last router, and end-to-end
    reliable channels for data producers, Zenoh routers, and data consumers.


    Figure 7-5


    Zenoh reliability strategies


    In addition to the reliability strategies it offers, zenoh separates control over
    message resending, memory usage (buffering), and message dropping. Subscribers
    control reliability by selecting a resending strategy. They declare if they need
    publishers to resend missing messages or not. On the other hand, publishers and
    routers individually decide how much memory they allocate to support reliability.
    This allows constrained devices to dedicate fewer resources, while routers will
    allocate more to alleviate congestion issues. Finally, publishers control what
    happens when congestion is detected by selecting a message dropping strategy.
    In zenoh, messages slated for reliable delivery are queued. When congestion happens,
    the memory dedicated to that queue is exhausted. Publishers need to specify if
    the infrastructure will drop the messages that cannot be queued or if the publication
    operation will be blocked. The message-dropping strategy is propagated from the
    publisher to all the relevant routers and applied to the entire routing path.


    ## zenoh-flow


    The zenoh protocol is a fantastic foundation for building all sorts of distributed
    systems, not just those related to IoT. A good proof of this is the [zenoh-flow
    dataflow programming framework](https://github.com/eclipse-zenoh/zenoh-flow),
    which enables developers to deploy computations spanning from the Cloud to constrained
    devices.


    Dataflow programming represents programs as a graph of connected nodes executing
    concurrently. When using dataflow programming languages, developers focus on the
    nodes and their interconnections, which express the application’s logic. Such
    languages share some features of functional languages. The SystemVerilog and VHDL
    hardware description languages, commonly used to design processor cores and other
    electronic systems, are examples of dataflow programming languages.


    In zenoh-flow, a dataflow is composed of three different types of nodes. Those
    three types of nodes are as follows:


    *   **operator:** This node implements a computation. It also defines input rules
    that determine what conditions will trigger the node and output rules that establish
    which output values will be passed to the following operators in the graph.


    *   **sinks:** This node consumes the data resulting from the dataflow.


    *   **sources:** This node produces the data that will be processed through the
    dataflow.


    These nodes are loaded dynamically at runtime.


    To work with zenoh-flow, you must specify the dataflow graph through a YAML file.
    You will use tags to express location affinity and requirements for the operators.
    The graphs can contain *loops*, supporting iterative processing and control mechanisms.
    They can also contain *deadlines* (timeout values), enabling you to leverage time-aware
    computations and implement proper fault tolerance. Graphs are also *composable*;
    in other words, they can include other graphs by reference. This makes them reusable
    and extensible. When you deploy the dataflow graph, zenoh-flow will automatically
    deal with the distribution of software components by linking remote operators
    through zenoh. At runtime, the sources, operators, and sinks leverage the zenoh
    protocol to communicate in a location transparent manner. They could be deployed
    in various ways to support specific requirements.


    The zenoh team maintains a dedicated repository for [zenoh-flow examples](https://github.com/atolab/zenoh-flow-examples).
    You can browse it to learn how to define operators, sources, and sinks; it also
    contains examples of dataflow graphs in YAML. As of writing, zenoh-flow was still
    in alpha, which explains why I do not reproduce specific samples here.


    ## zenoh Protocol Stack


    A current trend among IoT protocols is to support a wider variety of network transports.
    MQTT can run on UDP with MQTT-SN, for example. Given this, it is not surprising
    that zenoh supports several transports out of the box since it is a recent piece
    of technology. Figure [7-6](#524096_1_En_7_Chapter.xhtml#Fig6) shows the zenoh
    protocol stack.


    ![](images/524096_1_En_7_Chapter/524096_1_En_7_Fig6_HTML.jpg)


    An architecture consists of the following layers; applications, zenoh, U D P,
    T C P, T L S, Q U I C, S H M, layer 2 or 3, I P v 4 or I P v 6, Ethernet Wi Fi,
    and physical channel.


    Figure 7-6


    The zenoh protocol stack


    What makes zenoh different is that it can run directly over an OSI level 2 data
    link without an intermediate transport. Of course, zenoh can also support TCP
    and UDP on top of IP. TLS is available for encrypted communications if you choose
    TCP. Moreover, you can also use TLS if you use the QUIC protocol, which relies
    on UDP. Finally, zenoh can also leverage shared memory and UNIX sockets transports.


    Note


    QUIC (pronounced “quick”) is a general-purpose transport layer network protocol
    created by Jim Roskind at Google. QUIC leverages multiplexed UDP connections between
    two endpoints. QUIC is now a proposed standard at the IETF and is documented in
    [RFC 9000](https://www.rfc-editor.org/rfc/rfc9000.txt).


    The zenoh documentation contains detailed instructions about [setting up TLS](https://zenoh.io/docs/manual/tls/)
    for use with TCP. The same configuration applies if you choose to use QUIC instead.


    ## Coding with Eclipse zenoh


    The core zenoh library is implemented in Rust. Consequently, the team publishes
    binaries for the main platforms supported by the language: Linux, macOS, and Windows.
    At the time of writing, the C and Python language bindings are supported on every
    platform where the target language and Rust are supported. This section will focus
    on Python code examples.


    The official web resources for zenoh are as follows:


    *   **Website:** [`https://zenoh.io`](https://zenoh.io)


    *   **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.zenoh`](https://projects.eclipse.org/projects/iot.zenoh)


    *   **Code repository:** [`https://github.com/eclipse-zenoh/zenoh`](https://github.com/eclipse-zenoh/zenoh)'
  trans: '

    ## 可靠性与拥塞控制


    要理解 zenoh 如何实现其可靠性与拥塞控制功能，首先需要更深入地了解 zenoh 的内部机制。zenoh 协议由两个不同的层组成：


    *   **会话协议：** 会话协议管理节点（运行时）之间的一对一双向会话。无论涉及的是客户端、对等节点还是路由器，这些会话都是相同的。你可以将这些会话配置为尽力而为或可靠传输。


    *   **路由协议：** 路由协议传播兴趣并将数据从生产者路由到消费者。它利用了会话协议。


    鉴于 zenoh 会话的工作方式，默认的可靠性策略被称为*逐跳*，因为交付保证仅存在于两个特定节点之间。这在大多数情况下已经足够，因为基础设施在部署后应该是稳定的。然而，如果节点发生故障，则可能出现数据丢失。流量将被重新路由，但无法保证故障发生时所有在途数据都能被送达。


    逐跳策略具有高度可扩展性，但对于某些关键任务应用来说还不够。因此，zenoh 提供了两种可通过 API 配置的替代策略。第一种是*首路由器到尾路由器*，它依赖于每条路由上首尾路由器之间的可靠通道。第二种称为*端到端*，其可扩展性差得多，并且消耗更多资源。这是因为
    zenoh 会在基础设施中的*每一对发布者和订阅者之间创建可靠通道*。图 7-5 比较了 zenoh 中可用的三种可靠性策略。


    ![](img/524096_1_En_7_Fig5_HTML.jpg)


    一幅插图展示了数据生产者、Zenoh 路由器和数据消费者的逐跳、首路由器到尾路由器以及端到端可靠通道。


    图 7-5


    Zenoh 可靠性策略


    除了提供的可靠性策略之外，zenoh 还将消息重发、内存使用（缓冲）和消息丢弃的控制分离开来。订阅者通过选择重发策略来控制可靠性。他们声明是否需要发布者重发丢失的消息。另一方面，发布者和路由器各自决定分配多少内存来支持可靠性。这使得资源受限的设备可以分配更少的资源，而路由器则会分配更多资源以缓解拥塞问题。最后，发布者通过选择消息丢弃策略来控制检测到拥塞时的行为。在
    zenoh 中，计划进行可靠传输的消息会被排队。当发生拥塞时，专用于该队列的内存会被耗尽。发布者需要指定基础设施是丢弃无法排队的消息，还是阻塞发布操作。消息丢弃策略从发布者传播到所有相关的路由器，并应用于整个路由路径。


    ## zenoh-flow


    zenoh 协议是构建各种分布式系统（不仅仅是物联网相关系统）的绝佳基础。一个很好的证明是 [zenoh-flow 数据流编程框架](https://github.com/eclipse-zenoh/zenoh-flow)，它使开发者能够部署从云端到资源受限设备的计算任务。


    数据流编程将程序表示为并发执行的连接节点图。使用数据流编程语言时，开发者专注于节点及其互连关系，这表达了应用程序的逻辑。此类语言共享函数式语言的一些特性。常用于设计处理器内核和其他电子系统的
    SystemVerilog 和 VHDL 硬件描述语言，就是数据流编程语言的例子。


    在 zenoh-flow 中，一个数据流由三种不同类型的节点组成。这三种节点类型如下：


    *   **算子：** 此节点实现计算。它还定义了决定触发节点条件的输入规则，以及确定哪些输出值将传递给图中后续算子的输出规则。


    *   **汇点：** 此节点消费数据流产生的数据。


    *   **源点：** 此节点生成将通过数据流处理的数据。


    这些节点在运行时动态加载。


    要使用 zenoh-flow，你必须通过一个 YAML 文件来指定数据流图。你将使用标签来表达算子的位置亲和性和需求。图可以包含*循环*，支持迭代处理和控制机制。它们还可以包含*截止时间*（超时值），使你能够利用时间感知计算并实现适当的容错。图也是*可组合的*；换句话说，它们可以通过引用包含其他图。这使得它们可重用且可扩展。当你部署数据流图时，zenoh-flow
    将通过 zenoh 链接远程算子，自动处理软件组件的分发。在运行时，源点、算子和汇点利用 zenoh 协议以位置透明的方式进行通信。它们可以以多种方式部署以支持特定需求。


    zenoh 团队维护了一个专门的 [zenoh-flow 示例](https://github.com/atolab/zenoh-flow-examples)仓库。你可以浏览它以学习如何定义算子、源点和汇点；它还包含
    YAML 格式的数据流图示例。在撰写本文时，zenoh-flow 仍处于 alpha 阶段，这就是为什么我没有在此处重现具体示例的原因。


    ## zenoh 协议栈


    当前物联网协议的一个趋势是支持更广泛的网络传输。例如，MQTT 可以通过 MQTT-SN 在 UDP 上运行。鉴于此，作为一项较新的技术，zenoh 开箱即用地支持多种传输方式也就不足为奇了。图
    7-6 展示了 zenoh 协议栈。


    ![](img/524096_1_En_7_Fig6_HTML.jpg)


    一个架构由以下层组成：应用程序、zenoh、UDP、TCP、TLS、QUIC、SHM、第 2 层或第 3 层、IPv4 或 IPv6、以太网 Wi-Fi 以及物理通道。


    图 7-6


    zenoh 协议栈


    zenoh 的不同之处在于它可以直接在 OSI 第 2 层数据链路上运行，而无需中间传输层。当然，zenoh 也可以在 IP 之上支持 TCP 和 UDP。如果你选择
    TCP，可以使用 TLS 进行加密通信。此外，如果你使用依赖于 UDP 的 QUIC 协议，也可以使用 TLS。最后，zenoh 还可以利用共享内存和 UNIX
    套接字传输。


    注意


    QUIC（发音为“quick”）是 Google 的 Jim Roskind 创建的一种通用传输层网络协议。QUIC 利用两个端点之间的多路复用 UDP 连接。QUIC
    现已成为 IETF 的拟议标准，并在 [RFC 9000](https://www.rfc-editor.org/rfc/rfc9000.txt) 中进行了记录。


    zenoh 文档包含关于[设置 TLS](https://zenoh.io/docs/manual/tls/) 以用于 TCP 的详细说明。如果你选择使用
    QUIC，则适用相同的配置。


    ## 使用 Eclipse zenoh 进行编码


    zenoh 核心库是用 Rust 实现的。因此，该团队为该语言支持的主要平台（Linux、macOS 和 Windows）发布二进制文件。在撰写本文时，C
    和 Python 语言绑定在目标语言和 Rust 都受支持的所有平台上都受支持。本节将重点介绍 Python 代码示例。


    zenoh 的官方网络资源如下：


    *   **网站：** [`https://zenoh.io`](https://zenoh.io)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.zenoh`](https://projects.eclipse.org/projects/iot.zenoh)


    *   **代码仓库：** [`https://github.com/eclipse-zenoh/zenoh`](https://github.com/eclipse-zenoh/zenoh)

    '
- fmt: '# Installation


    The first step to developing zenoh applications is to install Rust itself. Although
    there are binaries for the core libraries, you will need the Rust compiler to
    set up the language bindings.


    Given that the zenoh team relies on the Cargo package manager, the easiest way
    to set up your Rust environment on Linux and macOS is to use the `rustup` script.
    You can do this by running this command:


    ```

    curl https://sh.rustup.rs -sSf | sh

    ```


    There is also a Windows version of `rustup` available; please look at [Cargo’s
    documentation](https://doc.rust-lang.org/cargo/getting-started/installation.html)
    for the latest instructions.


    ## Core Library


    The zenoh core library is available on macOS through the Homebrew package manager.
    To install the latest version, issue the following commands:


    ```

    brew tap eclipse-zenoh/homebrew-zenoh

    brew install zenoh

    ```


    On Linux, the zenoh team maintains a private repository hosting packages in DEB
    format. You can use it to install zenoh on Debian and its numerous derivatives.
    Use the following commands to add the repository to your list of sources:


    ```

    echo "deb [trusted=yes] https://download.eclipse.org/zenoh/debian-repo/ /" | sudo
    tee -a /etc/apt/sources.list > /dev/null

    sudo apt update

    ```


    Then, you can use `apt` to install zenoh:


    ```

    sudo apt install zenoh

    ```


    You can download Windows binaries of the core library from the Eclipse Foundation’s
    downloads website. The URL is:


    ```

    https://download.eclipse.org/zenoh/zenoh/latest/

    ```


    The file’s name will follow this pattern:


    ```

    x86_64-pc-windows-msvc/zenoh--x86_64-pc-windows-msvc.zip

    ```


    Building from the source is also possible.


    ## C Binding


    At the time of writing, the only way to install the C binding was to build it
    from the source. To get started, you need to clone the repository by executing
    this command:


    ```

    git clone https://github.com/eclipse-zenoh/zenoh-c.git

    ```


    Since Rust is already installed, we can build the code right away. On Linux and
    macOS, execute these commands:


    ```

    cd zenoh-c

    make

    make install # on Linux prefix with sudo

    ```


    You can also issue this command to build the examples:


    ```

    make examples

    ```


    ## Python Binding


    There are two ways to install the Python binding: through `pip` or from the source.
    The binding has been tested with Python 3.6, 3.7, 3.8, and 3.9.


    To install using `pip`, you will need at least version 19.3.1 of the package manager.
    If your environment fulfills this requirement, then all you need to do is to execute
    the following command:


    ```

    pip install eclipse-zenoh

    ```


    I recommend you leverage some sort of virtual environment.


    To install from source, you need to clone the repository:


    ```

    git clone https://github.com/eclipse-zenoh/zenoh-python.git

    ```


    Once this is done, install the required dependencies by running these commands:


    ```

    cd zenoh-python

    pip install -r requirements-dev.txt

    ```


    You can then issue this command to build and install the binding:


    ```

    python setup.py develop

    ```


    ## Testing Your Setup


    The core zenoh library and the language bindings shipped by the zenoh team all
    include a comprehensive set of example programs. Those programs illustrate the
    most used functions in the API and are consistent from one implementation to another.
    I will now show you how to test your environment with the Python examples.


    As DDS, zenoh supports peer-to-peer communication. So the easiest way to perform
    a test is to start a subscriber and publisher.


    To start the subscriber, open a command line and navigate to the folder where
    you cloned the GIT repository of the Python binding. The examples can be found
    in the `examples` subfolder of the repository. Then, start the publisher by executing
    this command:


    ```

    python z_sub.py

    ```


    You should see this output:


    ```

    Openning session...

    Creating Subscriber on ''/demo/example/**''...

    Enter ''q'' to quit...

    ```


    Then, open another command prompt, go to the appropriate folder, and execute this
    command:


    ```

    python z_pub.py

    ```


    If all goes well, you should see output like this:


    ```

    Openning session...

    Declaring key expression ''/demo/example/zenoh-python-pub''... => RId 1

    Declaring publication on ''1''...

    Putting Data (''1'': ''[   0] Pub from Python!'')...

    Putting Data (''1'': ''[   1] Pub from Python!'')...

    Putting Data (''1'': ''[   2] Pub from Python!'')...

    ```


    And there should be new output on the side of the subscriber, showing that it
    received the publications:


    ```

    >> [Subscriber] Received PUT (''/demo/example/zenoh-python-pub'': ''[   0] Pub
    from Python!'')

    >> [Subscriber] Received PUT (''/demo/example/zenoh-python-pub'': ''[   1] Pub
    from Python!'')

    >> [Subscriber] Received PUT (''/demo/example/zenoh-python-pub'': ''[   2] Pub
    from Python!'')

    ```


    Zenoh’s support for automatic discovery made it possible for the publisher and
    subscriber to communicate without the need for any configuration. Of course, this
    supposes the network does not block the traffic; you may need to adjust your firewalls
    if deploying nodes on different machines, depending on which of the supported
    transports you will use.'
