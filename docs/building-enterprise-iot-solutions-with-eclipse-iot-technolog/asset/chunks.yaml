- fmt: "### Common Layers\n\nThe reference architecture defines three types of environments:\
    \ constrained devices, edge, and IoT platforms. Most of the concepts exist in\
    \ the scope of these three environments. However, the architecture contains five\
    \ concepts that apply across the three environments. Those are hardware, security,\
    \ connectivity, protocols, and development tools.\n\n`Hardware` strongly influences\
    \ the design of IoT solutions, especially when considering constrained devices\
    \ and edge nodes. IoT developers optimize their code for size most of the time\
    \ and strive to keep power consumption to a minimum – at least for devices operating\
    \ on battery power. Device designers usually pick microcontrollers based on power-efficient\
    \ processor architectures such as `Arm` for the same reason. The IoT and edge\
    \ computing markets are thus much more diverse than the Cloud one, where servers\
    \ based on `x86-64` still dominate. Additionally, open source hardware has been\
    \ growing in popularity recently. For example, the open source `RISC-V` architecture\
    \ saw significant adoption, with 9% of respondents of the 2021 Eclipse IoT and\
    \ Edge developer survey stating they are using it and an additional 8% mentioning\
    \ `CORE-V`. The `CORE-V` family of cores from the [OpenHW Group](https://www.openhwgroup.org/)\
    \ is open source processor designs based on `RISC-V`. The Eclipse Foundation and\
    \ OpenHW Group work closely to build a comprehensive IoT and Edge open source\
    \ ecosystem encompassing hardware and software.\n\n`Security` is a fundamental\
    \ concern for IoT developers. Constrained devices and edge nodes are much more\
    \ vulnerable than Cloud-based servers since they are deployed in the physical\
    \ world. Encrypted communications, data encryption at rest, and root of trust\
    \ are just a few of the techniques developers can leverage to protect data and\
    \ the integrity of the devices themselves. Many now consider that a zero-trust\
    \ approach is more secure since it implies that software never trusts devices\
    \ by default. There are many aspects to security, and no single platform or open\
    \ source project can cover them all. Sticking to active, well-maintained projects\
    \ that keep their dependencies up to date will help you mitigate some of the risks.\n\
    \n`Connectivity` refers to the wired or wireless networking technologies used\
    \ by a solution. The 2021 Eclipse IoT and Edge developer survey found that most\
    \ developers leverage mature connectivity options such as `Ethernet`, `Wi-Fi`,\
    \ and `Bluetooth`. The growing availability of `5G` coverage will probably change\
    \ things soon. Moreover, many narrowband technologies such as `Dash7`, `LoRa`,\
    \ and `Sigfox` are well suited to IoT projects involving sensor data collection.\
    \ `Zigbee` and `Z-Wave` are also worth mentioning since they use only a fraction\
    \ of the power required by `Wi-Fi`. Support for most specialized connectivity\
    \ options is usually implemented in a gateway that connects to the Internet –\
    \ and thus the Cloud – through a more traditional connection.\n\n`Protocols` play\
    \ a critical role in most IoT architectures. Since there is much to say about\
    \ them, I will cover them in greater detail later. Always keep the dessert for\
    \ last!\n\nFinally, development tools are an essential concern for the Eclipse\
    \ IoT and Edge community. The traditional Eclipse Integrated Development Environment\
    \ (IDE) is still going strong with over six million users. It is widely popular\
    \ for embedded development, which makes it a strong choice for IoT developers.\
    \ The [Eclipse CDT](https://www.eclipse.org/cdt/) and [Eclipse Embedded CDT](https://eclipse-embed-cdt.github.io/)\
    \ projects are proof of that, as is the [CORE-V IDE](https://github.com/openhwgroup/core-v-ide-cdt)\
    \ built by the OpenHW Group team. However, the global trend toward Cloud-based\
    \ development environments is also growing in the IoT and Edge market. [Eclipse\
    \ Che](https://www.eclipse.org/che/), a Kubernetes-Native browser-based IDE for\
    \ developer teams, has seen significant adoption with IoT developers in the last\
    \ few years. [Eclipse Theia](https://theia-ide.org/), an extensible cloud and\
    \ desktop IDE Platform based on web technologies, is leveraged by `Che` and a\
    \ growing set of products such as the Arduino IDE. Developers can also use a generic\
    \ version of `Theia` through [Eclipse Theia Blueprint](https://theia-ide.org/docs/blueprint_download),\
    \ a template for building desktop-based products based on the `Eclipse Theia`\
    \ platform. It is worth mentioning that very few of the technologies hosted by\
    \ the Eclipse IoT and Edge Native working groups have ties to a specific IDE.\n\
    \n> **Note**  \n> Do not confuse the Eclipse IDE and the Eclipse Foundation. IBM\
    \ open-sourced the Eclipse IDE in 2001. The participants to the project created\
    \ the Eclipse Foundation in 2004 to be the vendor-neutral steward of the Eclipse\
    \ IDE. Over time, the Eclipse Foundation diversified and created several working\
    \ groups covering multiple technology areas. The Eclipse IoT working group, for\
    \ example, celebrated its 10th anniversary in 2021.\n\nAs of writing, the Eclipse\
    \ Foundation hosted over 425 open source projects and had four strategic areas:\
    \ automotive, Cloud Native Java, IoT and edge computing, and development tools."
  raw: '### Common Layers


    The reference architecture defines three types of environments: constrained devices,
    edge, and IoT platforms. Most of the concepts exist in the scope of these three
    environments. However, the architecture contains five concepts that apply across
    the three environments. Those are hardware, security, connectivity, protocols,
    and development tools.


    Hardware strongly influences the design of IoT solutions, especially when considering
    constrained devices and edge nodes. IoT developers optimize their code for size
    most of the time and strive to keep power consumption to a minimum `–` at least
    for devices operating on battery power. Device designers usually pick microcontrollers
    based on power-efficient processor architectures such as Arm for the same reason.
    The IoT and edge computing markets are thus much more diverse than the Cloud one,
    where servers based on x86-64 still dominate. Additionally, open source hardware
    has been growing in popularity recently. For example, the open source RISC-V architecture
    saw significant adoption, with 9% of respondents of the 2021 Eclipse IoT and Edge
    developer survey stating they are using it and an additional 8% mentioning CORE-V.
    The CORE-V family of cores from the [OpenHW Group](https://www.openhwgroup.org/)
    is open source processor designs based on RISC-V. The Eclipse Foundation and OpenHW
    Group work closely to build a comprehensive IoT and Edge open source ecosystem
    encompassing hardware and software.


    Security is a fundamental concern for IoT developers. Constrained devices and
    edge nodes are much more vulnerable than Cloud-based servers since they are deployed
    in the physical world. Encrypted communications, data encryption at rest, and
    root of trust are just a few of the techniques developers can leverage to protect
    data and the integrity of the devices themselves. Many now consider that a zero-trust
    approach is more secure since it implies that software never trusts devices by
    default. There are many aspects to security, and no single platform or open source
    project can cover them all. Sticking to active, well-maintained projects that
    keep their dependencies up to date will help you mitigate some of the risks.


    Connectivity refers to the wired or wireless networking technologies used by a
    solution. The 2021 Eclipse IoT and Edge developer survey found that most developers
    leverage mature connectivity options such as Ethernet, Wi-Fi, and Bluetooth. The
    growing availability of 5G coverage will probably change things soon. Moreover,
    many narrowband technologies such as Dash7, LoRa, and Sigfox are well suited to
    IoT projects involving sensor data collection. Zigbee and Z-Wave are also worth
    mentioning since they use only a fraction of the power required by Wi-Fi. Support
    for most specialized connectivity options is usually implemented in a gateway
    that connects to the Internet `–` and thus the Cloud `–` through a more traditional
    connection.


    Protocols play a critical role in most IoT architectures. Since there is much
    to say about them, I will cover them in greater detail later. Always keep the
    dessert for last!


    Finally, development tools are an essential concern for the Eclipse IoT and Edge
    community. The traditional Eclipse Integrated Development Environment (IDE) is
    still going strong with over six million users. It is widely popular for embedded
    development, which makes it a strong choice for IoT developers. The [Eclipse CDT](https://www.eclipse.org/cdt/)
    and [Eclipse Embedded CDT](https://eclipse-embed-cdt.github.io/) projects are
    proof of that, as is the [CORE-V IDE](https://github.com/openhwgroup/core-v-ide-cdt)
    built by the OpenHW Group team. However, the global trend toward Cloud-based development
    environments is also growing in the IoT and Edge market. [Eclipse Che](https://www.eclipse.org/che/),
    a Kubernetes-Native browser-based IDE for developer teams, has seen significant
    adoption with IoT developers in the last few years. [Eclipse Theia](https://theia-ide.org/),
    an extensible cloud and desktop IDE Platform based on web technologies, is leveraged
    by Che and a growing set of products such as the Arduino IDE. Developers can also
    use a generic version of Theia through [Eclipse Theia Blueprint](https://theia-ide.org/docs/blueprint_download),
    a template for building desktop-based products based on the Eclipse Theia platform.
    It is worth mentioning that very few of the technologies hosted by the Eclipse
    IoT and Edge Native working groups have ties to a specific IDE.


    Note


    Do not confuse the Eclipse IDE and the Eclipse Foundation. IBM open-sourced the
    Eclipse IDE in 2001\. The participants to the project created the Eclipse Foundation
    in 2004 to be the vendor-neutral steward of the Eclipse IDE. Over time, the Eclipse
    Foundation diversified and created several working groups covering multiple technology
    areas. The Eclipse IoT working group, for example, celebrated its 10th anniversary
    in 2021.


    As of writing, the Eclipse Foundation hosted over 425 open source projects and
    had four strategic areas: automotive, Cloud Native Java, IoT and edge computing,
    and development tools.'
  trans: '

    ### 通用层


    参考架构定义了三种环境类型：受限设备、边缘节点和物联网平台。大多数概念都存在于这三种环境的范畴内。然而，该架构包含五个适用于所有三种环境的概念，分别是：硬件、安全、连接、协议和开发工具。


    硬件对物联网解决方案的设计影响深远，尤其是在考虑受限设备和边缘节点时。物联网开发者大部分时间都在优化代码体积，并力求将功耗降至最低`–`至少对于使用电池供电的设备而言是如此。出于同样的原因，设备设计者通常选择基于节能处理器架构（如
    Arm）的微控制器。因此，物联网和边缘计算市场的多样性远超云端市场，后者仍由基于 x86-64 架构的服务器主导。此外，开源硬件近年来日益流行。例如，开源
    RISC-V 架构得到了广泛采用，在 2021 年 Eclipse 物联网与边缘开发者调查中，9% 的受访者表示正在使用该架构，另有 8% 提到了 CORE-V。[OpenHW
    Group](https://www.openhwgroup.org/) 的 CORE-V 系列内核是基于 RISC-V 的开源处理器设计。Eclipse
    基金会与 OpenHW Group 紧密合作，旨在构建一个涵盖硬件和软件的综合性物联网与边缘开源生态系统。


    安全是物联网开发者关注的根本问题。受限设备和边缘节点比基于云端的服务器更容易受到攻击，因为它们部署在物理世界中。加密通信、静态数据加密以及信任根，只是开发者可以用来保护数据和设备自身完整性的几种技术。如今，许多人认为零信任方法更安全，因为它意味着软件默认从不信任任何设备。安全涉及众多方面，没有任何单一平台或开源项目能够涵盖所有方面。坚持使用活跃、维护良好且保持依赖项更新的项目，将有助于降低部分风险。


    连接性指的是解决方案所使用的有线或无线网络技术。2021 年 Eclipse 物联网与边缘开发者调查发现，大多数开发者使用成熟的有线连接选项，如以太网、Wi-Fi
    和蓝牙。5G 覆盖范围的不断扩大可能很快会改变这一现状。此外，许多窄带技术，如 Dash7、LoRa 和 Sigfox，非常适合涉及传感器数据收集的物联网项目。Zigbee
    和 Z-Wave 也值得一提，因为它们仅消耗 Wi-Fi 所需功率的一小部分。对大多数专用连接选项的支持，通常是在通过更传统的连接方式接入互联网`–`进而接入云端`–`的网关中实现的。


    协议在大多数物联网架构中扮演着关键角色。由于相关内容繁多，我将在后文进行更详细的介绍。好东西总是要留到最后！


    最后，开发工具是 Eclipse 物联网与边缘社区关注的一个核心问题。传统的 Eclipse 集成开发环境（IDE）依然强劲，拥有超过六百万用户。它在嵌入式开发领域广受欢迎，这使其成为物联网开发者的一个强力选择。[Eclipse
    CDT](https://www.eclipse.org/cdt/) 和 [Eclipse Embedded CDT](https://eclipse-embed-cdt.github.io/)
    项目就是证明，由 OpenHW Group 团队构建的 [CORE-V IDE](https://github.com/openhwgroup/core-v-ide-cdt)
    亦是如此。然而，向基于云的开发环境发展的全球趋势在物联网和边缘计算市场也在增长。[Eclipse Che](https://www.eclipse.org/che/)
    是一个面向开发团队的、基于 Kubernetes 原生技术的浏览器端 IDE，在过去几年中，它在物联网开发者中得到了广泛采用。[Eclipse Theia](https://theia-ide.org/)
    是一个基于 Web 技术的可扩展云和桌面 IDE 平台，被 Che 以及越来越多的产品（如 Arduino IDE）所采用。开发者还可以通过 [Eclipse
    Theia Blueprint](https://theia-ide.org/docs/blueprint_download) 使用 Theia 的通用版本，这是一个基于
    Eclipse Theia 平台构建桌面产品的模板。值得一提的是，由 Eclipse 物联网与边缘原生工作组托管的极少数技术与特定的 IDE 绑定。


    注意


    不要混淆 Eclipse IDE 和 Eclipse 基金会。IBM 于 2001 年将 Eclipse IDE 开源。该项目的参与者于 2004 年创建了
    Eclipse 基金会，作为 Eclipse IDE 的供应商中立管理者。随着时间的推移，Eclipse 基金会实现了多元化发展，并成立了多个覆盖不同技术领域的工作组。例如，Eclipse
    物联网工作组在 2021 年庆祝了其成立十周年。


    截至撰写本文时，Eclipse 基金会托管了超过 425 个开源项目，并拥有四个战略领域：汽车、云原生 Java、物联网与边缘计算，以及开发工具。

