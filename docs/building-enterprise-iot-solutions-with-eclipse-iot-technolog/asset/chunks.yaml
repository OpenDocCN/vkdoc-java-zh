    hawkBit 的核心概念是*软件模块*。一个模块包含一个或多个*工件*，即将要部署到设备上的文件。hawkBit 允许您根据需要将软件模块分组到*分发集*中。在执行部署时，您可以明确指定目标，或通过目标过滤器选择目标。


    与 Eclipse Hono 和 Eclipse Ditto 类似，hawkBit 由多个微服务组成。该平台的功能集既专注又全面。以下是 hawkBit 的主要功能列表：


    *   **设备和软件仓库：** hawkBit 为作为配置目标的设备和可部署的软件分发维护独立的列表。可以预先配置设备；这对于支持零接触部署场景非常有用。hawkBit
    会维护仓库中所有设备的完整软件更新历史记录。


    *   **软件更新管理：** hawkBit 可以将软件分发部署到设备。此操作可以通过 Web 用户界面或 REST API 发起。有趣的是，hawkBit
    支持最初在 [RFC 7233](https://www.rfc-editor.org/info/rfc7233) 中定义的下载续传机制。设备只能访问其被授权的分发。您可以向设备部署增量更新，这意味着工件仅包含两个特定软件版本之间的差异。工件的完整性也可以通过数字签名进行验证。


    *   **推送和活动管理：** hawkBit 提供了处理大规模部署（也称为*推送*）的方法。如果您需要一次性更新成百上千台设备，您需要确保您的 hawkBit
    实例和网络基础设施能够承受负载。此外，向设备子集部署软件更新可以维持一定的服务水平，并确保在部署失败时不会立即丧失全部能力。要执行推送，您需要将设备群划分为*部署组*；或者，hawkBit
    可以根据预定义的组大小自动生成这些组。在推送过程中，平台将按顺序逐个处理组；如果某个组的错误率超过您提供的阈值，推送将中止。


    hawkBit 提供了一个功能齐全的 Web 界面，使您能够使用上述大部分功能。图 13-2 展示了其外观。


    ![](img/524096_1_En_13_Fig2_HTML.jpg)


    hawkbit 的部署管理页面屏幕显示了目标的名称、状态和操作；分发；按标签过滤；simulated13 的操作历史；以及目标和分发集的详细信息和描述。


    图 13-2


    Eclipse hawkBit 用户界面


    从架构角度来看，hawkBit 向使用者暴露了三个不同的 API。以下是每个 API 的主要特征：


    *   **管理 API：** 一个 REST API，使您能够创建、读取、更新或删除（CRUD）配置目标（设备）和仓库内容（软件）。

