- fmt: '# How IoT Projects Are Unique


    Most, if not all, IoT projects interact with Cloud-based components and platforms.
    However, blindly deploying Cloud Native applications using a standard *DevOps*
    approach outside the confines of the Cloud or the corporate data center is doomed
    to fail. Why is that? The Edge environment where IoT devices and Edge infrastructure
    are deployed is widely different from the Cloud at a high level.


    The Cloud is homogeneous, centralized, and operates at a large scale; resources
    are available on demand. On the other hand, the Edge is distributed, heterogeneous,
    and operates at a small scale; resource availability is limited. In other words,
    the Edge is the polar opposite of the Cloud, which makes IoT projects wildly different.


    IoT projects differ from typical IT projects in other ways:


    **The timescale of IoT projects spans years and even decades.** Replacing all
    of the sensors in a digital building would be an expensive and lengthy endeavor.
    Ripping off the machines from a factory floor is even less frequent.


    **IoT projects involve heterogeneous hardware and software components.** There
    is no "one-stop shop" in IoT. Many integrators serve the market, of course, but
    doing business with them encapsulates the heterogeneity rather than suppressing
    it.


    **IoT components deal with unique constraints.** IoT and edge computing nearly
    always involve ruggedized hardware. When deploying compute, storage, and networking
    resources outside the data center, they face temperature swings, humidity, dust,
    and many other dangers. Moreover, many devices need to operate partly or exclusively
    over battery power. This impacts the software side of things in many subtle ways.
    For example, vibrations could influence sensor readings, and the IoT device needs
    to account for that.


    **Connectivity is a given; stability and reliability are not.** The "I" in IoT
    stands for "Internet." Although not all IoT solutions operate over the public
    Internet, they all leverage various connectivity technologies. IoT developers
    need to assume that the network''s performance and reliability will vary without
    warning, which has profound implications on solution design.


    ## What Makes Enterprise IoT Different?


    The gap between enterprise IoT and hobbyist IoT is as significant as the gap between
    IoT projects and other IT projects, if not more.


    The wealth of affordable hardware and sensors means that anyone can experiment
    with IoT at home, especially since many of the software building blocks required
    are open source. Arduinos and Raspberry Pis are ideal experimentation platforms,
    given their cost and their rich connectivity. One could even make the case that
    such devices have replaced yesterday''s Commodore 64s and TRS-80 Color Computers
    as a gateway to an IT career. However, enterprise IoT projects come with specific
    requirements. Several of those requirements stem from the fact that enterprise
    IoT often deals with mission-critical and real-time applications.


    - **Reliability:** The sensors and microcontrollers used need to face adverse
    physical conditions over a prolonged period. The devices themselves may be relatively
    affordable, but the labor costs involved to repair or replace them can be onerous,
    especially in remote locations. Additionally, some applications may tolerate a
    level of data loss, but several do not.

    - **Sustainability:** Hardware component availability and software component supportability
    must be compatible with the timescale of the solution.

    - **Security:** Security is a growing concern for consumers and organizations
    alike. The scale of enterprise IoT projects means that security breaches have
    much more severe repercussions. They can even be life-threatening in applications
    such as industrial automation and autonomous vehicles.


    ## Open Source: The Best Approach


    Enterprise IoT projects must leverage production-grade, commercial-quality hardware
    and software components, given the requirements involved. Some could see this
    as an obstacle to the adoption of an open source approach. However, nothing could
    be further from the truth. At its core, open source is the freedom to access,
    modify, and redistribute source code.^([³](#fn3)) If you need to maintain a solution
    over years and decades, then the possibility to access the source code is valuable.
    Wish to integrate components from various vendors? Much more straightforward with
    the source. Need to tweak a solution''s stack for a particular type of application?
    The source enables you to do so freely. Open source is truly the best approach
    for IoT.


    Above everything else, open source is a business model `–` and a successful one
    at that. Over time, any innovation becomes a commodity; the value line is slowly
    but relentlessly moving up. The consequence is that organizations of all kinds
    can reduce risk and preserve their capacity to innovate by collaborating and pooling
    resources to build standard open source components. Such components provide them
    the proper foundation to bring to market differentiated commercial solutions.
    In other words, leveraging open source building blocks is a powerful way for organizations
    to focus their limited resources on competitive endeavors. Open collaboration
    creates the conditions for successful competition.'
