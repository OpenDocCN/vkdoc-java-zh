    return 0;\n}\n```\n\n# 3. LwM2M\n\n> *Nous avons besoin les uns des autres. L'être\
    \ humain n'est pas fait pour s'isoler, mais pour partager.*\n\n> *我们彼此需要。人类生来不是为了孤立自己，而是为了分享。*\n\
    > \n> ——爱丽丝·帕里佐，《野猪的重负》\n\n现代应用程序通常有众多依赖项。作为开发者，你我都站在巨人的肩膀上。或者更确切地说，我们自己的代码是建立在我们使用的众多库之上的。本书中我介绍的许多技术都建立在先前进步的基础上。本章的重点\
    \ LwM2M 就是一个很好的例子。\n\n历史上，LwM2M 专门使用 CoAP 作为传输层。虽然 LwM2M 1.2 版本在 2020 年底[增加了对\
    \ HTTP 和 MQTT 传输的支持](https://omaspecworks.org/lwm2m-v1-2-is-now-available/)，但\
    \ CoAP 仍然是使用最广泛的一种。因此，我的代码示例将利用 [Eclipse Leshan](https://www.eclipse.org/leshan/)，这是一个用于构建\
    \ LwM2M 解决方案的框架，它使用 Californium 作为其 CoAP 实现。\n\n## LwM2M：建立在 CoAP 基础之上\n\nCoAP\
    \ 为构建物联网解决方案提供了坚实的基础。特别是，描述该协议的各种 RFC 并未定义消息负载，这一事实意味着 CoAP 非常灵活。同样的灵活性也适用于资源；开发者可以以他们认为合适的任何方式组织资源。其结果是，开箱即用的情况下，支持\
    \ CoAP 的设备和软件栈之间无法互操作。你至少需要处理负载并调整一些参数，以确保消息以正确的格式发送到正确的资源。\n\n*轻量级机器对机器*（LwM2M）协议旨在通过提供可扩展的资源和数据模型来解决这种互操作性缺失的问题。它由\
    \ [OMA SpecWorks](https://omaspecworks.org/)（前身为开放移动联盟 OMA，一个非营利性标准组织）管理。该协议 1.0\
    \ 版本于 2017 年 2 月发布，截至撰写本文时，最新版本是 2020 年 11 月发布的 1.2 版本。\n"
- fmt: '# Data Model: Objects and Resources


    The LwM2M data model is based on *resources*: elements of information made available
    by devices. Resources are logically grouped into *objects*. Each resource is assigned
    a unique identifier within the enclosing object. OMA SpecWorks assigns and maintains
    a unique *Object Identifier* for all objects that are a core part of the LwM2M
    specification and object specifications. Object specifications define the operations
    (`Read`, `Write`, `Execute`) supported by the object’s resources and whether the
    resources are mandatory or optional. They also state the data type of each resource
    and whether there can be multiple instances or not.


    Third parties such as standards organizations, individuals, or vendors can propose
    object specifications to OMA SpecWorks. When accepted, such object specifications
    are made available in the official LwM2M registry and allocated a unique ID. For
    example, the LwM2M specification defines a `Device` object (ID: 3) used to expose
    device information to interested parties. `Device` contains resources for the
    name of the device manufacturer, model number, and serial number, among other
    things. Moreover, the registry also contains reusable resource definitions that
    you can use in your Object specifications. Such resource definitions are also
    allocated unique IDs for reference purposes. Typical examples include digital
    input, digital output, analog input, analog output, dimmer value, and unit of
    measurement. `Sensor Value` (ID: 5700) is one of the reusable resources defined
    in the registry and is used in many objects reporting sensor readings. One of
    those objects is `Temperature` (ID: 3303). It is worth mentioning that object
    specifications are versioned, whether resource definitions are not.


    **Note**


    The official LwM2M registry is available at


    [`https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html`](https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html)


    At runtime, clients and servers will instantiate objects and their resources.
    An object can contain multiple instances of the same resource, and multiple instances
    of the same object can exist simultaneously. Objects and the resource they contain
    are referenced by their assigned numerical ID, while object and resource instances
    get an instance number assigned at runtime. Instance numbers start at 0 – as they
    should be. All IDs and instance numbers are unsigned integers.


    The LwM2M resource model includes operations for creating, updating, and retrieving
    resources and enables asynchronous notifications of resources changes. There are
    three operations a resource can support: `Read`, `Write`, and `Execute`. Resources
    that support `Read` or `Write` are called *value* resources. Resources that support
    `Execute` are called *executables*; they are used to trigger actions and do not
    contain a value.


    To access a resource, all you need to do is refer to it using a simple URI. This
    is the pattern you should use:


    ```

    /[object id]/[object instance]/[resource id]/[resource instance]

    ```


    All of this may sound a little abstract. So let’s review a concrete example. The
    LwM2M specification defines an object called `Device` (ID: 3), which defines a
    set of resources providing device information and executables to reboot the device
    or perform a factory reset of the settings. Table 3-1 lists a few of the resources
    for the `Device` object in version v1.1 of LwM2M.


    **Table 3-1** Partial list of resources for the Device LwM2M object


    | ID | Name | Operations | Instances | Mandatory | Type |

    | --- | --- | --- | --- | --- | --- |

    | 0 | Manufacturer | Read | Single | Optional | String |

    | 1 | Model Number | Read | Single | Optional | String |

    | 2 | Serial Number | Read | Single | Optional | String |

    | 3 | Firmware Version | Read | Single | Optional | String |

    | 4 | Reboot | Execute | Single | Mandatory |  |

    | 5 | Factory Reset | Execute | Single | Optional |  |


    The LwM2M specification states that devices must implement the `Device` object
    and that only a single instance will exist. Consequently, any device will have
    an instance of the `Device` object exposed as


    ```

    /3/0

    ```


    If the device in question implements the `Manufacturer` resource, it will be available
    as


    ```

    /3/0/0

    ```


    Let’s look at another example. The LwM2M registry contains a `Temperature` object
    used to report values from a temperature sensor. The ID of this object is `3303`.
    This object declares several resources, of which one is `Sensor Value`. `Sensor
    Value` is one of the reusable resources defined in the registry, and its ID is
    `5700`. So to retrieve the current temperature reported by a device equipped with
    a single temperature sensor, you would query the resource in this way:


    ```

    /3303/0/5700

    ```


    LwM2M can leverage several serialization formats for data: Plain Text, Opaque,
    TLV, LwM2M TS 1.0 JSON, CBOR, LwM2M CBOR, SenML JSON, and SenML CBOR. Binary formats
    such as CBOR are more efficient since they compress the size of the payloads.
    The specification states that supporting all the formats is mandatory for servers.


    ## Additional Capabilities over CoAP


    CoAP’s RESTful model heavily inspires LwM2M’s messaging model. The additional
    interfaces LwM2M defines between devices and servers make it different – and arguably,
    better. Those are the following:


    - Bootstrap

    - Client Registration

    - Device Management and Service Enablement

    - Information Reporting


    I will now cover each of these in detail.


    ### Bootstrap


    The bootstrap interface is used to provision configuration parameters in a client
    to enable it to perform client registration against one or several LwM2M servers.


    There are four distinct bootstrap modes:


    - **Factory Bootstrap:** The device has been configured before deployment. The
    configured information can be related to a LwM2M bootstrap server or LwM2M servers.

    - **Bootstrap from Smartcard:** The device reads configuration information from
    a smart card. This supposes it possesses the hardware required to read such a
    card. Ideally, the information is read through a secure channel, and the device
    will validate that it matches whatever is stored on the smart card.

    - **Client Initiated Bootstrap:** The device will retrieve configuration information
    from a LwM2M bootstrap server. This requires a LwM2M bootstrap server account
    to be present on the client. The client also needs security credentials to connect
    to the bootstrap server, whether of the TLS/DTLS or OSCORE variety.

    - **Server Initiated Bootstrap:** An authorized LwM2M server triggers a bootstrap
    sequence in the device. The device will then switch modes to perform a client-initiated
    bootstrap.


    Clients are required to support at least one of the modes.


    ### Client Registration


    Clients use this interface to register with one or several servers, maintain their
    registration, and deregister from a server.


    When a device registers, it provides a list of the objects it supports and its
    current object instances. Once registered, the device will update its registrations
    based on its configuration – usually, a time interval or the security context.
    Registrations have a lifetime; the server will consider devices that do not send
    a registration update within the time limit to have deregistered.


    When a device shuts down or disconnects, it should perform a deregister operation
    – although this is not mandatory.'
  raw: '## Data Model: Objects and Resources


    The LwM2M data model is based on *resources*: elements of information made available
    by devices. Resources are logically grouped into *objects*. Each resource is assigned
    a unique identifier within the enclosing object. OMA SpecWorks assigns and maintains
    a unique *Object Identifier* for all objects that are a core part of the LwM2M
    specification and object specifications. Object specifications define the operations
    (Read, Write, Execute) supported by the object’s resources and whether the resources
    are mandatory or optional. They also state the data type of each resource and
    whether there can be multiple instances or not.


    Third parties such as standards organizations, individuals, or vendors can propose
    object specifications to OMA SpecWorks. When accepted, such object specifications
    are made available in the official LwM2M registry and allocated a unique ID. For
    example, the LwM2M specification defines a `Device` object (ID: 3) used to expose
    device information to interested parties. `Device` contains resources for the
    name of the device manufacturer, model number, and serial number, among other
    things. Moreover, the registry also contains reusable resource definitions that
    you can use in your Object specifications. Such resource definitions are also
    allocated unique IDs for reference purposes. Typical examples include digital
    input, digital output, analog input, analog output, dimmer value, and unit of
    measurement. `Sensor Value` (ID: 5700) is one of the reusable resources defined
    in the registry and is used in many objects reporting sensor readings. One of
    those objects is `Temperature` (ID: 3303). It is worth mentioning that object
    specifications are versioned, whether resource definitions are not.


    Note


    The official LwM2M registry is available at


    [`https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html`](https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html)


    At runtime, clients and servers will instantiate objects and their resources.
    An object can contain multiple instances of the same resource, and multiple instances
    of the same object can exist simultaneously. Objects and the resource they contain
    are referenced by their assigned numerical ID, while object and resource instances
    get an instance number assigned at runtime. Instance numbers start at 0 `–` as
    they should be. All IDs and instance numbers are unsigned integers.


    The LwM2M resource model includes operations for creating, updating, and retrieving
    resources and enables asynchronous notifications of resources changes. There are
    three operations a resource can support: Read, Write, and Execute. Resources that
    support Read or Write are called *value* resources. Resources that support Execute
    are called *executables*; they are used to trigger actions and do not contain
    a value.


    To access a resource, all you need to do is refer to it using a simple URI. This
    is the pattern you should use:


    ```

    /[object id]/[object instance]/[resource id]/[resource instance]

    ```


    All of this may sound a little abstract. So let’s review a concrete example. The
    LwM2M specification defines an object called `Device` (ID: 3), which defines a
    set of resources providing device information and executables to reboot the device
    or perform a factory reset of the settings. Table [3-1](#524096_1_En_3_Chapter.xhtml#Tab1)
    lists a few of the resources for the `Device` object in version v1.1 of LwM2M.


    Table 3-1


    Partial list of resources for the Device LwM2M object


    | ID | Name | Operations | Instances | Mandatory | Type |

    | --- | --- | --- | --- | --- | --- |

    | 0 | Manufacturer | Read | Single | Optional | String |

    | 1 | Model Number | Read | Single | Optional | String |

    | 2 | Serial Number | Read | Single | Optional | String |

    | 3 | Firmware Version | Read | Single | Optional | String |

    | 4 | Reboot | Execute | Single | Mandatory |   |

    | 5 | Factory Reset | Execute | Single | Optional |   |


    The LwM2M specification states that devices must implement the `Device` object
    and that only a single instance will exist. Consequently, any device will have
    an instance of the `Device` object exposed as


    ```

    /3/0

    ```


    If the device in question implements the `Manufacturer` resource, it will be available
    as


    ```

    /3/0/0

    ```


    Let’s look at another example. The LwM2M registry contains a `Temperature` object
    used to report values from a temperature sensor. The ID of this object is `3303`.
    This object declares several resources, of which one is `Sensor Value`. `Sensor
    Value` is one of the reusable resources defined in the registry, and its ID is
    `5700`. So to retrieve the current temperature reported by a device equipped with
    a single temperature sensor, you would query the resource in this way:


    ```

    /3303/0/5700

    ```


    LwM2M can leverage several serialization formats for data: Plain Text, Opaque,
    TLV, LwM2M TS 1.0 JSON, CBOR, LwM2M CBOR, SenML JSON, and SenML CBOR. Binary formats
    such as CBOR are more efficient since they compress the size of the payloads.
    The specification states that supporting all the formats is mandatory for servers.


    ## Additional Capabilities over CoAP


    CoAP’s RESTful model heavily inspires LwM2M’s messaging model. The additional
    interfaces LwM2M defines between devices and servers make it different `–` and
    arguably, better. Those are the following:


    *   Bootstrap


    *   Client Registration


    *   Device Management and Service Enablement


    *   Information Reporting


    I will now cover each of these in detail.


    ### Bootstrap


    The bootstrap interface is used to provision configuration parameters in a client
    to enable it to perform client registration against one or several LwM2M servers.


    There are four distinct bootstrap modes:


    *   **Factory Bootstrap****:** The device has been configured before deployment.
    The configured information can be related to a LwM2M bootstrap server or LwM2M
    servers.


    *   **Bootstrap from Smartcard****:** The device reads configuration information
    from a smart card. This supposes it possesses the hardware required to read such
    a card. Ideally, the information is read through a secure channel, and the device
    will validate that it matches whatever is stored on the smart card.


    *   **Client Initiated Bootstrap****:** The device will retrieve configuration
    information from a LwM2M bootstrap server. This requires a LwM2M bootstrap server
    account to be present on the client. The client also needs security credentials
    to connect to the bootstrap server, whether of the TLS/DTLS or OSCORE variety.


    *   **Server Initiated Bootstrap****:** An authorized LwM2M server triggers a
    bootstrap sequence in the device. The device will then switch modes to perform
    a client-initiated bootstrap.


    Clients are required to support at least one of the modes.


    ### Client Registration


    Clients use this interface to register with one or several servers, maintain their
    registration, and deregister from a server.


    When a device registers, it provides a list of the objects it supports and its
    current object instances. Once registered, the device will update its registrations
    based on its configuration `–` usually, a time interval or the security context.
    Registrations have a lifetime; the server will consider devices that do not send
    a registration update within the time limit to have deregistered.


    When a device shuts down or disconnects, it should perform a deregister operation
    `–` although this is not mandatory.'
  trans: '

    ## 数据模型：对象与资源


    LwM2M 数据模型基于*资源*：即设备提供的各类信息元素。资源按逻辑分组为*对象*。每个资源在所属对象内被分配一个唯一标识符。OMA SpecWorks
    为所有作为 LwM2M 规范及对象规范核心组成部分的对象分配并维护唯一的*对象标识符*。对象规范定义了对象资源所支持的操作（读取、写入、执行），并规定了这些资源是强制性的还是可选的。此外，规范还说明了每个资源的数据类型，以及是否支持多实例。


    第三方组织，如标准机构、个人或供应商，可以向 OMA SpecWorks 提议对象规范。一旦被采纳，这些对象规范将被收录到官方 LwM2M 注册表中，并分配一个唯一
    ID。例如，LwM2M 规范定义了一个 `Device` 对象（ID: 3），用于向相关方公开设备信息。`Device` 对象包含用于表示设备制造商名称、型号和序列号等信息的资源。此外，注册表中还包含可重用的资源定义，您可以在自己的对象规范中使用它们。这些资源定义也被分配了唯一的
    ID 以供引用。典型的例子包括数字输入、数字输出、模拟输入、模拟输出、调光值和测量单位。`Sensor Value`（ID: 5700）是注册表中定义的可重用资源之一，并被用于许多报告传感器读数的对象中。其中一个对象是
    `Temperature`（ID: 3303）。值得一提的是，对象规范是有版本管理的，而资源定义则没有。


    注意


    官方 LwM2M 注册表位于


    [`https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html`](https://technical.openmobilealliance.org/OMNA/LwM2M/LwM2MRegistry.html)


    在运行时，客户端和服务器会实例化对象及其资源。一个对象可以包含同一资源的多个实例，并且同一对象的多个实例可以同时存在。对象及其包含的资源通过其分配的数字 ID
    进行引用，而对象和资源实例则在运行时获得一个实例编号。实例编号从 0 开始——这符合常规。所有 ID 和实例编号均为无符号整数。


    LwM2M 资源模型包括用于创建、更新和检索资源的操作，并支持资源变更的异步通知。一个资源可以支持三种操作：读取、写入和执行。支持读取或写入的资源称为*值*资源。支持执行的资源称为*可执行资源*；它们用于触发动作，不包含值。


    要访问一个资源，您只需使用一个简单的 URI 来引用它。应遵循以下模式：


    ```

    /[对象 ID]/[对象实例]/[资源 ID]/[资源实例]

    ```


    这一切听起来可能有点抽象。那么，让我们来看一个具体的例子。LwM2M 规范定义了一个名为 `Device`（ID: 3）的对象，该对象定义了一组提供设备信息的资源，以及用于重启设备或执行恢复出厂设置的可执行资源。表
    3-1 列出了 LwM2M v1.1 版本中 `Device` 对象的部分资源。


    表 3-1


    Device LwM2M 对象的资源列表（部分）


    | ID | 名称 | 操作 | 实例 | 强制性 | 类型 |

    | --- | --- | --- | --- | --- | --- |

    | 0 | 制造商 | 读取 | 单实例 | 可选 | 字符串 |

    | 1 | 型号 | 读取 | 单实例 | 可选 | 字符串 |

    | 2 | 序列号 | 读取 | 单实例 | 可选 | 字符串 |

    | 3 | 固件版本 | 读取 | 单实例 | 可选 | 字符串 |

    | 4 | 重启 | 执行 | 单实例 | 强制 |   |

    | 5 | 恢复出厂设置 | 执行 | 单实例 | 可选 |   |


    LwM2M 规范规定，设备必须实现 `Device` 对象，并且只存在一个实例。因此，任何设备都会暴露一个 `Device` 对象的实例，其路径为


    ```

    /3/0

    ```


    如果该设备实现了 `Manufacturer` 资源，则该资源将位于


    ```

    /3/0/0

    ```


    让我们再看另一个例子。LwM2M 注册表中包含一个 `Temperature` 对象，用于报告温度传感器的数值。该对象的 ID 是 `3303`。该对象声明了多个资源，其中之一是
    `Sensor Value`。`Sensor Value` 是注册表中定义的可重用资源之一，其 ID 为 `5700`。因此，要检索配备单个温度传感器的设备报告的当前温度，您可以按如下方式查询该资源：


    ```

    /3303/0/5700

    ```


    LwM2M 可以利用多种序列化格式来处理数据：纯文本、不透明格式、TLV、LwM2M TS 1.0 JSON、CBOR、LwM2M CBOR、SenML JSON
    和 SenML CBOR。像 CBOR 这样的二进制格式效率更高，因为它们压缩了有效载荷的大小。规范规定，服务器必须支持所有格式。


    ## 基于 CoAP 的额外能力


    LwM2M 的消息模型深受 CoAP 的 RESTful 模型启发。LwM2M 在设备和服务器之间定义的额外接口使其与众不同——并且可以说，更加出色。这些接口包括：


    *   引导


    *   客户端注册


    *   设备管理与服务启用


    *   信息报告


    下面我将详细介绍每一项。


    ### 引导


    引导接口用于在客户端中配置参数，使其能够向一个或多个 LwM2M 服务器执行客户端注册。


    共有四种不同的引导模式：


    *   **出厂引导：** 设备在部署前已完成配置。配置的信息可以与 LwM2M 引导服务器或 LwM2M 服务器相关。


    *   **智能卡引导：** 设备从智能卡读取配置信息。这假设设备具备读取此类卡所需的硬件。理想情况下，信息通过安全通道读取，并且设备将验证其与智能卡上存储的信息是否匹配。


    *   **客户端发起引导：** 设备将从 LwM2M 引导服务器检索配置信息。这要求客户端上存在 LwM2M 引导服务器账户。客户端还需要安全凭据才能连接到引导服务器，无论是
    TLS/DTLS 还是 OSCORE 类型。


    *   **服务器发起引导：** 一个授权的 LwM2M 服务器在设备中触发引导序列。然后，设备将切换模式以执行客户端发起的引导。


    客户端必须至少支持其中一种模式。


    ### 客户端注册


    客户端使用此接口向一个或多个服务器进行注册、维护其注册状态，以及从服务器注销。


    当设备注册时，它会提供其支持的对象列表及其当前的对象实例。注册后，设备将根据其配置（通常是时间间隔或安全上下文）更新其注册信息。注册具有生命周期；服务器将认为在时限内未发送注册更新的设备已注销。


    当设备关闭或断开连接时，它应执行注销操作——尽管这不是强制性的。

    '
- fmt: '### Device Management and Service Enablement


    Servers use the Device Management and Service Enablement Interface to access the
    object instances and resources exposed by registered clients. The interface defines
    specific operations to that effect: `Create`, `Read`, `Read-Composite`, `Write`,
    `Write-Composite`, `Delete`, `Execute`, `Write-Attributes`, and `Discover`. Clients
    will ignore all operations made by a server on this interface until they have
    completed registration with the server in question.


    The normal `Read` operation can apply to the value of a resource, a resource instance,
    an array of resource instances, an object instance, or all the instances of a
    specific object. The `Write` operation has roughly the same scope, except it focuses
    on a single object instance. On the other hand, `Read-Composite` can target any
    combination of objects, object instances, resources, or resource instances in
    a single request, whether from the same object or different objects. As for `Write-Composite`,
    it can update values of several different resources across distinct instances
    of one or several objects.


    ### Information Reporting


    LwM2M servers use this interface to observe value changes for specific resources
    exposed by registered clients. The observe can target a single resource or be
    a composite, targeting a group of resources or a group of resource instances across
    multiple object instances on the client.


    ## LwM2M Versions


    At the time of writing, OMA SpecWorks had published three versions of LwM2M. Given
    the rapid release cadence, not all implementations support the latest release
    of the protocol. Consequently, you need to know the version supported by the devices
    and software you are working with to determine which features will be available.


    ### LwM2M v1.0 (February 2017)


    The initial release for LwM2M included the following features:


    - Object-based resource model

    - Resource operations: Creation, retrieval, update, deletion, and configuration

    - Resource observation and notification

    - Data serialization formats: TLV, JSON, Plain Text, and Opaque

    - UDP and SMS transports

    - DTLS-based security

    - Queue mode (for sleeping devices)

    - Core LwM2M objects: LwM2M Security, LwM2M Server, Access Control, Device, Connectivity
    Monitoring, Firmware Update, Location, Connectivity Statistics


    ### LwM2M v1.1 (June 2018)


    LwM2M added several features to v1.0:


    - Improved bootstrapping allowing for incremental upgrades

    - Improved support for Public Key Infrastructure (PKI) deployments

    - Enhanced registration sequence mechanisms

    - Support for LwM2M over TCP/TLS to better support firewalls and NAT

    - Support for OSCORE-based application layer security

    - Improved support for low-power WANs, notably 3GPP CIoT and LoRaWAN

    - Support for JSON using SenML with CBOR serialization

    - New data types


    ### LwM2M v1.2 (November 2020)


    LwM2M is backward-compatible with v1.0 and v1.1 at the level of mandatory features.
    It introduced the following new features:


    - Support for MQTT and HTTP as transports.

    - Optimized bootstrapping, registration, and information interfaces.

    - Support for LwM2M gateways, allowing the integration and management of non-LwM2M
    devices.

    - New optimized serialization format based on CBOR: LwM2M CBOR.

    - Enhanced functionality for firmware updates.

    - Definition of new notification attributes (edge, confirmable notification, and
    maximum historical queue).

    - TLS and DTLS v1.3 are now supported.


    ## LwM2M Protocol Stack


    The LwM2M protocol stack varies according to the version considered. I will focus
    on the stack for version 1.2 here since it is the most comprehensive.


    ![](images/524096_1_En_3_Chapter/524096_1_En_3_Fig1_HTML.jpg)


    An illustration includes application, objects, LwM2M, HTTP, MQTT, CoAP, OSCORE,
    TLS, TCP, DTLS, UDP, SMS, CIoT, SMS on device and smartcard, UDP, LoRa, and CIoT.


    **Figure 3-1** LwM2M 1.2 protocol stack (Credit: OMA SpecWorks)


    In versions before 1.2, LwM2M systematically relied on CoAP as its transport.
    However, LwM2M always supported a choice of low-level transports to run CoAP on.
    Initially, the selection was limited to UDP and *Short Message Service* (SMS)
    over cellular networks. Support for TCP was added in version 1.1 to offer better
    integration with firewalls and to support NAT traversal scenarios. Version 1.1
    also introduced options for CoAP over non-IP protocols, namely, *Cellular Internet
    of Things* (CIoT) from the *3rd Generation Partnership Project* (3GPP) and *LoRaWAN*.
    Developers can leverage the OSCORE security model in version 1.1 and up of LwM2M,
    independently of the low-level transport selected.


    Version 1.2 decoupled LwM2M from CoAP, introducing HTTP and MQTT as alternate
    transports. In all versions, security is based on DTLS or TLS, depending on the
    transport used.


    ## Eclipse Leshan


    The Eclipse Leshan project provides Java libraries that you can use to build your
    own LwM2M clients and servers or to add LwM2M support to existing platforms. The
    project has existed since 2014 and uses Eclipse Californium as its CoAP implementation.
    Leshan is made available under the [Eclipse Public License v2.0](https://www.eclipse.org/legal/epl-2.0/)
    and the [Eclipse Distribution License v1.0](https://www.eclipse.org/org/documents/edl-v10.php)
    (BSD).


    The official web resources for Leshan are as follows:


    - **Website:** [`https://eclipse.org/leshan`](https://eclipse.org/leshan)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.leshan`](https://projects.eclipse.org/projects/iot.leshan)

    - **Code repository:** [`https://github.com/eclipse/leshan`](https://github.com/eclipse/leshan)

    - **Wiki:** [`https://github.com/eclipse/leshan/wiki`](https://github.com/eclipse/leshan/wiki)


    The Leshan project team also maintains a demo client, server, and bootstrap server.
    Those are valuable examples of utilizing the Leshan API and can also be used for
    troubleshooting or testing purposes.


    At the time of writing, Leshan had two main versions under active maintenance:


    - **Version 1.x.** These series implement v1.0.2 of the LwM2M specification.

    - **Version 2.x.** These series implement v1.1.1 of the LwM2M specification.


    The Leshan wiki describes for each version which LwM2M features they support.


    ### Sandbox Server


    The team of the Leshan project maintains a pair of publicly available servers
    that you can use for demo and testing purposes. Those servers always run the last
    successful build from the `master` branch.


    - **LwM2M server:** [`https://leshan.eclipseprojects.io/`](https://leshan.eclipseprojects.io/).
    Use port `5683` for `coap` and `5684` for `coaps`.

    - **Bootstrap server:** [`https://leshan.eclipseprojects.io/bs/`](https://leshan.eclipseprojects.io/bs/).
    Use port `5783` for `coap` and port `5784` for `coaps`.


    If you would rather use C than Java for building your LwM2M solution, [Eclipse
    Wakaama](https://www.eclipse.org/wakaama/) is a C implementation of LwM2M designed
    to be portable on POSIX-compliant systems.'
