    \ = {\nBT_MESH_ELEM(0, models, BT_MESH_MODEL_NONE),\n};\n```\n\n除了应用程序所需的两个自定义模型外，`models`\
    \ 结构体还使用了用于配置和健康状态的标准模型。声明如下：\n\n```\nstatic struct bt_mesh_model models[] = {\n\
    BT_MESH_MODEL_CFG_SRV,\nBT_MESH_MODEL_HEALTH_SRV(&health_srv, &health_pub),\n\
    BT_MESH_MODEL(BT_MESH_MODEL_ID_GEN_ONOFF_SRV, gen_onoff_srv_op, NULL,\nNULL),\n\
    BT_MESH_MODEL(BT_MESH_MODEL_ID_GEN_ONOFF_CLI, gen_onoff_cli_op, NULL,\nNULL),\n\
    };\n```\n\n如你所见，两个自定义模型都附带了一个可能的操作列表。以下是其中之一：\n\n```\nstatic const struct bt_mesh_model_op\
    \ gen_onoff_srv_op[] = {\n{ OP_ONOFF_GET,       BT_MESH_LEN_EXACT(0), gen_onoff_get\
    \ },\n{ OP_ONOFF_SET,       BT_MESH_LEN_MIN(2),   gen_onoff_set },\n{ OP_ONOFF_SET_UNACK,\
    \ BT_MESH_LEN_MIN(2),   gen_onoff_set_unack },\nBT_MESH_MODEL_OP_END,\n};\n```\n\
    \n每个操作都与特定的回调函数相关联。例如，`gen_onoff_get` 会调用 `onoff_status_send`。\n\n```\nstatic\
    \ int onoff_status_send(struct bt_mesh_model *model,\nstruct bt_mesh_msg_ctx *ctx)\n\
    {\nuint32_t remaining;\nBT_MESH_MODEL_BUF_DEFINE(buf, OP_ONOFF_STATUS, 3);\nbt_mesh_model_msg_init(&buf,\
    \ OP_ONOFF_STATUS);\nremaining = k_ticks_to_ms_floor32(\nk_work_delayable_remaining_get(&onoff.work))\
    \ +\nonoff.transition_time;\n...\nif (remaining) {\nnet_buf_simple_add_u8(&buf,\
    \ !onoff.val);\nnet_buf_simple_add_u8(&buf, onoff.val);\nnet_buf_simple_add_u8(&buf,\
    \ model_time_encode(remaining));\n} else {\nnet_buf_simple_add_u8(&buf, onoff.val);\n\
    }\nreturn bt_mesh_model_send(model, ctx, &buf, NULL, NULL);\n}\n```\n\n如你所见，该函数中的大部分代码用于构建有效载荷，然后通过调用\
    \ `bt_mesh_model_send` 进行传输。\n\n与 LwM2M 或 MQTT 等协议相比，直接使用蓝牙网络编程需要编写更多代码。通过利用 6LoWPAN，可以在蓝牙连接上使用此类协议，从而允许\
    \ IPv6 数据包在基于 IEEE 802.15.4 的网络上传输。然而，这可能会比蓝牙原生协议消耗更多电量。\n\n脚注 1   2   3   4  \
    \ 5\n\n# 10. 操作系统\n\n> *Informatique : Alliance d'une science inexacte et d'une\
    \ activité humaine faillible.*\n\n> *计算机科学：一门不精确科学与一种易错的人类活动的结合。*\n> \n> —吕克·法亚尔\n\
    \n操作系统（OS）是管理计算机硬件和软件资源，并为其他程序提供共享服务的软件。换句话说，它是硬件和软件之间的接口。自 20 世纪 90 年代以来，市场上大多数计算机都运行着操作系统。然而，情况并非总是如此。20\
    \ 世纪 50 年代早期的大型机没有操作系统，一次只能运行一个程序。IBM 是第一个引入单一操作系统概念以覆盖整个产品线的硬件制造商，并于 1964 年推出了\
    \ OS/360 `–` 尽管由于存储限制和项目的整体复杂性，该公司发布了三个软件变体。在 20 世纪 70 年代和 80 年代，许多流行的家用微型计算机在没有操作系统的情况下使用。几乎所有机器都附带了一个内置的\
    \ BASIC 解释器，该解释器兼作机器的命令行界面。由于软盘驱动器价格昂贵，盒式磁带是最常见的存储介质。因为这些家用计算机具有固定的配置，并且一次只能运行一个程序，所以操作系统并非严格必要。\n\
    \n本章将介绍各种操作系统及其功能集。我还将花时间向你介绍一些*裸机*选项，即构建无需操作系统支持即可直接在硬件上运行的应用程序的方法。最后，我将向你展示如何作为开发者开始使用\
    \ Drogue IoT 项目和 Zephyr 操作系统。\n"
- fmt: '# Are Operating Systems Necessary?


    Before going any further, let’s ask ourselves if operating systems are necessary
    for enterprise IoT and edge computing deployments. The short version of the answer
    goes like this: for constrained devices performing simple tasks, maybe you can
    do without them. Alternatively, there are development frameworks called *unikernels*
    that ship the services usually provided by an operating system as libraries that
    are composed with the code of your application. If you find one fulfilling your
    requirements that can run on the hardware you plan to use, then going OS-less
    is possible.


    From the previous paragraph and the very existence of this chapter, you probably
    deduced that there are plenty of enterprise IoT use cases where an OS or RTOS
    plays a useful role. Here is a list of features OSes offer that may make them
    relevant to your project:


    - **APIs:** Application Programming Interfaces (APIs) hide the internal details
    of systems and often allow interoperability. When different operating systems
    implement the same APIs, applications or libraries are portable from one OS to
    another. A good example is the [Portable Operating System Interface (POSIX)](http://get.posixcertified.ieee.org/),
    a family of standards maintained by the IEEE. The `Zephyr` RTOS implements a subset
    of the POSIX embedded profiles `PSE51` and `PSE52` and the `BSD Sockets` API.^([^(46)](#fn46))
    `RIOT OS` also ships a POSIX wrapper providing implementations of semaphores,
    sockets, and threads.^([^(47)](#fn47))


    - **Hardware support:** OSes support many hardware components through device drivers.
    A driver is a program that controls a component connected to a computer through
    a bus or communication subsystem. They abstract the hardware details by implementing
    well-defined but operating system–specific interfaces exposed by the OS. Applications
    simply need to interact with these interfaces.


    - **Memory management:** Desktop and server-class operating systems can provide
    a virtual address space to applications and handle page faults. On the other hand,
    RTOSes can allocate memory to applications and their own services statically or
    dynamically. The most advanced of them can create and manage memory domains and
    partitions. Domains ensure each user thread possesses its stack buffer, and partitions
    control access to specific memory zones. While most MCUs lack memory management
    units, a significant share of them sport memory protection hardware (MPU). MPUs
    monitor transactions such as instruction fetches and data accesses, which can
    trigger a fault exception when an access violation is detected.


    - **Multitasking:** The capacity to execute concurrently multiple tasks (processes)
    is one of the big advantages of OSes. Delegating the control over concurrent processes
    and threads to the OS, as happens in preemptive multitasking, generally makes
    the solution more robust. This is especially true when features like memory protection
    are available. On the other hand, cooperative multitasking, where applications
    voluntarily cede computing time to others, is more fragile since a single badly
    written application can lead to system freezes.


    - **Real-time requirements:** Real-time systems are designed to respond to events
    within defined, limited, and predictable timeframes. In other words, they feature
    predictable latency. Moreover, real-time systems explicitly manage resources in
    real time. Getting real-time latency and resource management right is complicated.
    Therefore, it makes sense to delegate those responsibilities to the OS.


    - **Shared services:** Networking, security, storage access, filesystem management,
    and user interfaces are just some of the services operating systems offer. Leveraging
    those services makes applications smaller and simpler, helping you focus on the
    business problems you are trying to solve.


    Overall, operating systems have a lot to offer. Nevertheless, there are viable
    alternatives that we will explore together later in this chapter.


    # Real-Time Operating Systems


    There is a bewildering diversity of RTOSes in the market right now. As of writing,
    the [list compiled by Wikipedia](https://en.wikipedia.org/wiki/Comparison_of_real-time_operating_systems)
    listed over 150 active RTOSes, both open source and proprietary. I decided to
    cover in detail three open source options that are actively maintained, have a
    strong ecosystem, support a wide variety of hardware, and offer robust toolkits
    to developers. They are presented in alphabetical order. Naturally, there are
    alternatives that I do not cover that could be a great fit for your project. Please
    take the time to explore possibilities before making your choice.'
