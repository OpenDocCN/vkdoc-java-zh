- fmt: '# Web of Things


    By nature, IoT and edge computing deployments are heterogeneous. I have made that
    point several times already. The devices and software platforms currently in the
    market involve a variety of protocols, data models, and security requirements.
    Given the complexity involved, developers and researchers have pursued the idea
    of connecting physical objects through web technologies since the early 2000s.
    These efforts intensified over time, leading to the creation of the Web of Things
    (WoT) working group at the World Wide Web Consortium (W3C) in 2016.


    The Web of Things provides a set of standardized building blocks simplifying the
    development of IoT applications by leveraging the mature Web paradigm. Specifically,
    it establishes an interaction model composed of properties, actions, and events.
    Properties reflect the state of the “thing”; they can be sensor values, configuration
    settings, or the result of some computation. Properties can be observable, depending
    on the TD provider used. On the other hand, actions often involve interactions
    with the physical world. Typical examples would be powering a motor, opening a
    valve, or unlocking a door. Finally, events communicate the existence of use case–specific
    situations detected by the device, such as “low fuel,” “valve opened,” or “intruder
    detected.” You can access the WoT architecture specification here: [`www.w3.org/TR/wot-architecture11/`](http://www.w3.org/TR/wot-architecture11/).


    WoT is an open standard. It relies on many established web standards like HTTP,
    JSON, JSON-LD, JsonSchema, JsonPointer, and others. It is under active development
    by a diverse community. Like the Eclipse Foundation Specification Process, the
    W3C’s specification process is transparent and open. Decisions are made publicly,
    meeting minutes are available to all, and the specifications are developed in
    public GitHub repositories.


    The WoT model describes physical objects in a *WoT Thing Description* (TD). The
    TD is the central pillar of WoT. Since it provides access to a thing’s metadata,
    you can consider it the equivalent of a website’s homepage. The WoT TD describes
    which data and functions the thing provides, which protocol is used to access
    them, the structure and encoding of the data, and the access control mechanisms
    involved. The thing can also provide additional metadata in machine-readable or
    human-readable formats. You can retrieve a thing’s TD from the device itself,
    a repository (TD Directory), or a third-party intermediary such as Eclipse Ditto.
    TDs are expressed in JSON-LD.


    The next revision of the WoT Thing Description specification ([version 1.1](https://www.w3.org/TR/wot-thing-description11/))
    will introduce the Thing Models (TM) concept. A TM defines a Thing''s properties,
    actions, and events without providing instance-specific details such as the protocols
    or binding templates available. At the time of writing, the WoT Thing Description
    specification version 1.1 was available as a working draft.


    WoT is protocol-agnostic. However, it provides a mechanism to define a mapping
    between the WoT’s properties-action-event abstraction and specific protocol implementations
    such as CoAP, HTTP, and MQTT. The name of this mechanism is *WoT Binding Templates*.
    Binding templates define how the consumer of a Thing instance can activate the
    WoT interactions specified in a TD through the interface of a protocol.


    In addition to TDs and binding templates, the WoT working group maintains a WoT
    Scripting API targeting JavaScript (ECMAScript). This API implements the properties-action-event
    abstraction and defines an interface scripting-based runtimes can leverage. It
    is, of course, possible to implement the same API in nonscripting languages such
    as Java, Python, or Rust. When I wrote this, the API was not a fully fledged WoT
    specification but was available as a Working Group Note. The working group also
    provides security and privacy guidelines for WoT implementations.


    WoT provides useful abstractions enabling developers to implement connected objects.
    The [Eclipse Thingweb](https://www.thingweb.io) project, which I will cover in
    detail later, is the reference implementation of the WoT Scripting API.


    ## Eclipse EdiTDor


    Written in JavaScript, [Eclipse EdiTDor](https://github.com/eclipse/editdor) can
    create, render, edit, and validate WoT Thing Descriptions. It uses React for its
    UI framework and requires Node.js to build the web application. EdiTDor features
    wizards to create properties, actions, and events. It also ships with a JSON editor
    supporting validation through JSON schemas and auto-completion. EdiTDor provides
    two-way binding to the TM/TD format expressed as JSON-LD, which provides a way
    to encode linked data using JSON. Figure [12-1](#524096_1_En_12_Chapter.xhtml#Fig1)
    shows what EdiTDor looks like.


    ![](images/524096_1_En_12_Chapter/524096_1_En_12_Fig1_HTML.jpg)


    A screen of Web of Things EdiTDor version 0.4.0 displays the code for a floor
    lamp on the left, context, type, options to add top-level form and link, and properties
    of the manufacturer and serial number on the right.


    Figure 12-1


    The EdiTDor user interface


    Once you are happy with your Thing Models or Thing Definitions, one way to make
    them available to consumers is to deploy the files on an HTTP server. To that
    effect, you can save a copy of the TM or TD you created in EdiTDor.


    ### Getting Started with EdiTDor


    The EdiTDor team made an instance of the application available at the following
    location: [`https://eclipse.github.io/editdor/`](https://eclipse.github.io/editdor/).
    Suppose you have Node.js version 10 or later installed on your workstation. In
    that case, you can also run a local instance effortlessly by cloning the Git repository
    of the project and executing the following command from the root folder:


    ```

    yarn start

    ```


    Once started, you can access it at the following URL: `http://localhost:3000/`.


    ## Eclipse Thingweb


    Eclipse Thingweb is a project providing software platforms implementing the WoT
    specification. At the time of writing, the only shipping platform was node-wot,
    the reference implementation of the WoT specification.


    The official web resources for Thingweb are as follows:


    *   **Website:** [`www.thingweb.io/`](http://www.thingweb.io/)

    *   **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.thingweb`](https://projects.eclipse.org/projects/iot.thingweb)

    *   **Code repository:** [`https://github.com/eclipse/thingweb.node-wot`](https://github.com/eclipse/thingweb.node-wot)


    `node-wot` provides a WoT Thing Description parser and serializer, several binding
    template implementations (including HTTPS, CoAP, and MQTT, among others), and
    a runtime system conforming to the WoT Scripting API for applications. `node-wot`
    also includes a web user interface to visualize TDs and to enable interaction
    with Thing instances. `node-wot` is available under either the [Eclipse Public
    License version 2.0](https://www.eclipse.org/legal/epl-2.0/) or the [W3C Software
    Notice and Document License (2015-05-13)](https://www.w3.org/Consortium/Legal/2015/copyright-software-and-document).
    At the time of writing, the current version was v0.8.1, made available on May
    19, 2022.


    `node-wot` is written in JavaScript and uses the Node.js runtime. This means you
    can use it in three ways: as a library, a stand-alone application, or inside the
    browser. The latter restricts the binding templates available to HTTPS and WebSocket.
    `node-wot` can consume (client) and expose (server) Thing instances.


    In addition to `node-wot`, the Thingweb team intends to work on a Thing Directory
    in the future. A Thing Directory is a directory service for WoT TDs that provides
    a service interface to register and look up for TDs. The Thingweb directory will
    conform to [RFC 9176](https://www.rfc-editor.org/info/rfc9176) (Constrained RESTful
    Environments (CoRE) Resource Directory).'
