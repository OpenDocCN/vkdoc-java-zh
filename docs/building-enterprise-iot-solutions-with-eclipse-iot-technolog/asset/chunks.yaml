  trans: "\n### Eclipse Paho 嵌入式客户端\n\nEclipse Paho 项目为 MQTT 和 MQTT-SN 分别维护了独立的嵌入式库。两者均采用分层方法构建；它们不依赖特定的网络、线程或内存管理依赖项。此外，它们使用\
    \ ANSI 标准 C 编写，以确保代码的可移植性。\n\n[Paho 嵌入式 MQTT 客户端](https://www.eclipse.org/paho/index.php%253Fpage%253Dclients/c/embedded/index.php)由三个不同的组件组成：\n\
    \n*   **MQTTPacket：** 一个专注于 MQTT 数据包序列化和反序列化的小型库。\n\n*   **MQTTClient：** 一个基于\
    \ MQTTPacket 的 C++ 库，最初为 Arm mbed RTOS 编写。此后已被移植到其他平台，例如 Linux 和 Arduino。它避免了动态分配，并且不使用\
    \ STL。\n\n*   **MQTTClient-c：** 用 C 语言编写的 MQTTClient 的直接翻译版本。它可在 FreeRTOS 内核上运行，并可用于类似的环境。\n\
    \nMQTTPacket 支持所有当前版本的 MQTT，而另外两个仅支持 MQTT v3.1 和 v3.1.1。为了保持更小的代码体积，与完整的 C 和 C++\
    \ 实现相比，它们还移除了一些功能：消息持久化、自动重连、离线缓冲和 WebSocket 支持。此外，MQTTClient 和 MQTTClient-C 仅提供阻塞\
    \ API。[GitHub 仓库](https://github.com/eclipse/paho.mqtt.embedded-c)包含了这三个组件在各种操作系统上的示例。\n\
    \n[Paho 嵌入式 MQTT-SN 客户端](https://www.eclipse.org/paho/index.php%253Fpage%253Dclients/c/embedded-sn/index.php)采用了与其\
    \ MQTT 同类产品相同的方法。它支持 MQTT-SN v1.2。该客户端包含两个主要组件：\n\n*   **MQTTSNPacket：** 一个用于处理\
    \ MQTT-SN 数据包序列化和反序列化的库。它还提供了许多辅助函数。\n\n*   **MQTTSNClient：** 一个基于 MQTTSNPacket\
    \ 的 C++ 库。它仍在开发中。\n\n该客户端的仓库还包含了之前提到的 Paho [MQTT-SN 透明网关](https://github.com/eclipse/paho.mqtt-sn.embedded-c/tree/master/MQTTSNGateway)的代码。\n\
    \n### Zephyr RTOS\n\n来自 Linux 基金会的 [Zephyr RTOS](https://www.zephyrproject.org/)\
    \ 附带了一个内置的 MQTT 库；该实现仅支持 MQTT v3.1.0 和 v3.1.1。该库构建在 BSD 套接字之上，并支持 TLS。\n\nGitHub\
    \ 上的 Zephyr 仓库包含一个[示例发布客户端](https://github.com/zephyrproject-rtos/zephyr/tree/main/samples/net/mqtt_publisher)。\n\
    \n脚注 1   2   3\n\n# 5. Sparkplug\n\n> *在某些时刻，我们自己的光芒会熄灭，然后被另一个人的火花重新点燃。*\n\n>\
    \ *At certain times in our life, our own light is extinguished and rekindled by\
    \ the spark of another person.*\n> \n> —阿尔伯特·史怀哲\n\n自 1999 年以来，MQTT 经历了巨大的增长和采用。2012`–`2013\
    \ 年，Eclipse 基金会启动了 Mosquitto 和 Paho 项目，围绕该协议创建了一个开放的、供应商中立的社区。最成功的生态系统是那些从一开始就保持开放的生态系统。\n\
    \n正如我之前所解释的，MQTT 中有许多事情需要你自行决定。MQTT 规范没有说明你应该如何构建主题层次结构，也没有说明有效负载的格式和编码。你想使用纯文本吗？没问题！Base64\
    \ 编码的图像？当然可以！JSON、YAML 或 XML？没问题！在讨论的这一点上，你可能已经看到了问题所在。依赖 MQTT 的设备和应用程序不知道要发布或订阅哪个主题。至于有效负载，它们可以是任何东西，也将会是任何东西。开箱即用，MQTT\
    \ 基础设施是不可互操作的。\n\n当然，你可以设计设备和应用程序，通过配置机制来获取主题名称。你甚至可以实施巧妙的方法来处理有效负载，或者实现自定义逻辑来与共享数据模型进行相互转换。但做这些事情需要时间。更重要的是，随着你添加设备和应用程序，任务会变得更加复杂。幸运的是，有一种更好的方法：[Eclipse\
    \ Sparkplug](https://sparkplug.eclipse.org/)。\n\nSparkplug 是托管在 Eclipse 基金会的一个开源规范，“*[…]\
    \ 为 MQTT 客户端提供了一个框架，使其能够无缝集成来自其应用程序、传感器、设备和网关的数据到 MQTT 基础设施中*。”^(¹⁵) 它是公开开发的，[在\
    \ GitHub 上](https://github.com/eclipse/Sparkplug)。Sparkplug 的演进由 [Eclipse 基金会规范流程](https://www.eclipse.org/projects/efsp/)\
    \ (EFSP) 管理。详细描述 EFSP 流程超出了本书的范围，但你应该记住的主要一点是，生成的文档是开放的，软件是开源的。任何人都可以出于任何目的、免费且无需版税，以任何媒介复制和分发规范文档。\n\
    \n注意\n\n虽然你可能以前没有听说过，但 EFSP 自 2018 年以来一直在使用。接替 Java Enterprise 版本的 Jakarta EE\
    \ 规范就是在 EFSP 下管理的。\n\nSparkplug 并非市场上某个花哨的新来者。该规范的第一个版本可以追溯到 2016 年，当时 Arlen Nipper\
    \ 和他的团队在 Cirrus Link Solutions 将其发布。此后它已被广泛采用，并且有许多商业和开源实现可用。[Eclipse Tahu](https://projects.eclipse.org/projects/iot.tahu)\
    \ 是 Eclipse 基金会的开源实现，但 Linux 基金会的 [Fledge 项目](https://www.lfedge.org/projects/fledge/)\
    \ 也有一个可用的 [Sparkplug 连接器](https://fledge-iot.readthedocs.io/en/v1.8.2/plugins/fledge-south-mqtt-sparkplug/index.html)。\n"
- fmt: '# Sparkplug and Interoperability


    The lack of interoperability inherent to MQTT is the problem Sparkplug is trying
    to solve. How does it tackle this issue? Let’s see what the authors of the Sparkplug
    specification have to say:


    > *The intent and purpose of the Sparkplug Specification is to define an MQTT
    Topic Namespace, payload, and session state management that can be applied generically
    to the overall IIoT market sector, but specifically meets the requirements of
    real-time SCADA/Control HMI solutions. Meeting the operational requirements for
    these systems will enable MQTT based infrastructures to provide more valuable
    real-time information to Line of Business and MES solution requirements as well.*^([^(16)](#fn16))


    The logic is this: if MQTT devices and applications share a topic namespace, state
    management, and payload, they will integrate simply and efficiently. Here is a
    high-level overview of those three concepts:


    - **Topic namespace:** Sparkplug defines an extensible topic namespace optimized
    for the SCADA and Industrial IoT (IIoT) sector. This namespace allows automatic
    discovery and bidirectional communications between MQTT clients.

    - **State management:** Sparkplug fully takes advantage of the “Continuous Session
    Awareness” capabilities of MQTT to reduce latency in scenarios where unreliable
    networks offering limited bandwidth are involved, making it a good choice for
    real-time SCADA and IIoT solutions. This is especially important because Sparkplug
    relies on a *report by exception* approach where there are no periodic updates
    provided to subscribers. Data updates are sent whenever they occur only, and this
    can be done reliably only because of Sparkplug’s state management features.

    - **Payload:** Sparkplug defines a binary message encoding that works well for
    legacy register-based process variables, such as Modbus register values. The payload
    is focused on process variable change events called *metrics*. The payload format
    supports complex data types, datasets, metrics, metric metadata, and metric aliases.
    The payload format is versioned and is referenced in the topic structure to ensure
    clients can easily infer the encoding used for a specific message.


    Before I explain in detail Sparkplug’s topic structure, state management, and
    payload, let’s have a look at the architecture, requirements, and basic principles
    of the protocol.


    ## Architecture


    In addition to devices and sensors, the reference architecture for Sparkplug defines
    three types of components: MQTT Server, MQTT Edge Node, and Host Application.
    Figure [5-1](#524096_1_En_5_Chapter.xhtml#Fig1) illustrates how these components
    are organized.


    ![](images/524096_1_En_5_Chapter/524096_1_En_5_Fig1_HTML.jpg)


    The architecture flow diagram includes IT with a sparkplug of MES, historian,
    and analytics. SCADA or IIoT host. MQTT server (broker). OT with four MQTT Edge
    Node (sparkplug). The architecture is covered by security.


    **Figure 5-1** Sparkplug architecture (Credit: Eclipse Foundation)


    The MQTT Server (broker) is the central component of the architecture. It needs
    to support a specific subset of MQTT features, which I will discuss in the following
    section. Sparkplug supports the use of multiple brokers to support high availability
    and redundancy requirements, which makes the infrastructure more scalable.


    MQTT Edge Nodes are MQTT client applications that play a gateway role in the architecture.
    They implement local interfaces to legacy devices such as programmable logic controllers
    (PLCs), remote terminal units (RTUs), flow computers, and sensors. They often
    interface with local discrete I/O and logical internal process variables (PVs).
    Edge nodes enable non-Sparkplug components to participate in the Sparkplug topic
    namespace and use the Sparkplug payload format.


    Sparkplug Host Applications are MQTT clients that consume the real-time Sparkplug
    messages. Host Applications must advertise that they are online or offline, as
    specified by the protocol. In typical SCADA or IIoT implementations, a single
    Primary Host Application is responsible for monitoring and controlling a given
    edge node. The edge node indicates its Primary Host Application, and specific
    Sparkplug `STATE` messages are used to inform edge nodes whether the Primary Host
    is connected and subscribed to the MQTT Server. However, Sparkplug supports the
    notion of additional Host Applications in a monitoring or standby mode – whether
    their scope is the full set of edge nodes or a specific subset. Edge nodes can
    be configured to have distinct behaviors when their Primary Host Application is
    online or offline.


    ## Sparkplug MQTT Requirements


    For the time being, Sparkplug is explicitly tied to MQTT as its transport protocol.
    It could theoretically be ported to other protocols but relies upon specific behaviors
    of MQTT to implement some of its features.


    Sparkplug supports both MQTT v3.1.1 and v5.0. It will work on any combination
    of broker and client library that fully implement the following features:


    - Publish and subscribe with QoS levels 0 and 1

    - Retained messages

    - Last Will and Testament


    Moreover, in a non-normative section on security, the specification recommends
    relying on Access Control Lists (ACLs) to restrict the topics a client can interact
    with and run MQTT over TLS. These recommendations can influence the MQTT broker
    or SaaS solution you select for your implementation.


    Eclipse Mosquitto and Eclipse Amlen both fulfill the requirements listed previously
    and can be used to implement Sparkplug-based solutions.


    ## Basic Principles


    The Sparkplug specification highlights a few important design principles. Those
    principles are as follows:


    - Publish/subscribe approach

    - Report by exception

    - Continuous session awareness

    - Birth and death certificates

    - Support for persistent and nonpersistent connections


    The main interest of a publish/subscribe approach, inherited from MQTT, is the
    complete decoupling of devices from the applications consuming the data. In contrast
    to previous approaches to integration, which were point to point, the MQTT server
    (broker) in Sparkplug plays the role of a hub.


    A key concern for constrained devices is reducing power and bandwidth consumption
    as much as possible. Report by exception is an elegant way to achieve that. In
    most cases, edge nodes only need to send messages when the values they report
    about change. This is possible because Sparkplug mandates stateful MQTT sessions.
    That said, developers are free to use periodic reporting when reporting by exception
    does not make sense.


    A fundamental rule of Sparkplug is that edge nodes or Host Applications must advertise
    that they are now online or about to go offline. This is achieved using birth
    and death certificates. Death certificates are always registered in the `CONNECT`
    packet as the will message (LWT) of the node or application. As for birth certificates,
    the specification states they must be the first message published by any node
    or application.


    Finally, Sparkplug lets developers decide for themselves if the edge nodes should
    be connected permanently to the MQTT infrastructure or if they should just connect
    as needed. In the case of periodic connections, all the nodes need to do is publish
    their own death certificate and then send a proper `DISCONNECT` packet to close
    the connection gracefully. This ensures that a death certificate will not be sent
    later by the MQTT Server. Host Application will then treat the metrics received
    from the node as “Last Known Good” values until it returns online and refreshes
    them. Regardless of their choice to be continuously connected or periodically
    connected, edge nodes must never use MQTT persistent sessions. In other words,
    edge nodes must always set the `cleanSession` (MQTT v3) or `cleanStart` (MQTT
    v5) flag to `true`.'
