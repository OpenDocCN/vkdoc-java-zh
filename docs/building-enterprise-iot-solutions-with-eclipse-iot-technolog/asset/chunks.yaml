    标准 `–` 这也是 Zigbee、Thread 和 Snap 的基础 `–` 或基于具有许多相似特性的*低功耗蓝牙*（BLE）的网络发送和接收 IPv6
    数据包。Linux 内核已经支持 6LoWPAN，这意味着你可以在大多数配备蓝牙无线电的单板计算机上，通过 6LoWPAN 使用 CoAP。


    *互联网号码分配机构*（IANA）为协议分配了以下端口和服务名称：


