  trans: '

    ## 什么是 DDS？


    *OMG 数据分发服务*（DDS）是一种以数据为中心的连接协议和 API 标准，由[对象管理组织 (OMG)](https://www.omg.org/)
    制定。DDS 规范的开发始于 2001 年。当时的主要贡献者是 Real-Time Innovations (RTI) 和泰雷兹集团。OMG 于 2004
    年 12 月发布了 DDS 规范 1.0 版。随后在 2005 年 12 月发布了 1.1 版，2006 年 12 月发布了 1.2 版。DDS 核心规范的最新版本是
    [2015 年 3 月发布的 1.4 版](https://www.omg.org/spec/DDS/1.4/)。


    DDS 依赖于一种以数据为中心的发布/订阅方法，有时用缩写 DCPS 表示。与 MQTT 类似，消息被发布到客户端可以订阅的主题上。然而，在 DDS 中，实体存在于全局数据空间（域）中，这些域可以进一步划分为分区。


    DDS 与其他物联网协议的一个显著区别在于其对负载定义的高度重视。DDS 主题不仅仅是用于确定哪些订阅者将收到消息的简单过滤器。它们由名称、类型和一组 QoS
    策略共同定义。由于 DDS 是语言无关的，主题类型可以用多种语法表示，其中 *接口定义语言* (IDL) 是最常见的选择。


    注意


    如果你已经熟悉 IDL，你可能会想知道 DDS 与 CORBA 的关系。DDS 与 CORBA 仅有的两个共同点是：它使用了 IDL 的一个子集，并且两者都是
    OMG 规范。另外，如果你熟悉 CORBA，那么你的年龄可能和我差不多，甚至比我还大。


    随着时间的推移，DDS 规范通过以下三个配套规范得到了增强：


    *   **DDSI-RTPS：** 定义了 *实时发布-订阅协议* (RTPS) DDS 互操作性线协议。[最新版本是 v2.5](https://www.omg.org/spec/DDSI-RTPS/)。实现由
    OMG 分配的 RTPS 供应商 ID 标识。


    *   **DDS-XTypes：** 为 DDS 主题类型定义了可扩展的类型系统。[最新版本是 v1.3](https://www.omg.org/spec/DDS-XTypes/)。


    *   **DDS-Security：** 定义了 DDS 实现可以使用的安全模型和服务插件接口 (SPI) 架构。[最新版本是 v1.1](https://www.omg.org/spec/DDS-SECURITY/)。


    DDS 规范及其前面列出的三个配套规范通常被称为 DDS 核心规范。


    OMG 还发布了 DDS 规范的扩展。它们引入了一个分布式服务框架 (DDS-RPC)，以及用于表示 DDS 资源的 XML 和 JSON 语法。此外，还提供了一些网关，包括一个支持
    OPC UA 协议的网关。有关这些资源的信息可以在 [`www.dds-foundation.org/omg-dds-standard/`](http://www.dds-foundation.org/omg-dds-standard/)
    找到。


    本章将只关注 DDS 核心规范的最新版本。在选择 DDS 实现时，应始终注意它们所支持的规范和扩展。


    理解核心规范如何协同工作的最佳方式是查看 DDS 网络协议栈。请注意，诸如增加对时间敏感网络 (TSN) 支持等正在进行中的计划不在考虑之列。


    ## 协议栈


    图 6-1 展示了 DDS 协议栈。请注意，DDS 需要 IP。核心规范强制要求支持 UDP 作为传输层协议，但 Cyclone DDS 也支持 TCP。这使得它既适用于电池供电的受限设备，也适用于功能更强大的设备。值得一提的是，一些供应商特定的扩展支持非
    IP 网络。


    ![](img/524096_1_En_6_Fig1_HTML.jpg)


    DDS 协议栈的示意图，包括应用层、DCPS、DDSI-RTPS、TCP、UDP、IPv4、IPv6、以太网、WiFi 和物理信道。


    图 6-1

    DDS 网络协议栈


    DDSI-RTPS 是一种线协议；缩写中的 DDSI 代表 *DDS 互操作性*，而 RTPS 代表 *实时发布-订阅*。最初，DDS 只是一个 API，实现者使用了多种不兼容的线协议。这导致了碎片化。DDSI-RTPS
    旨在促进不同实现之间的互操作性。


    以下是 RTPS 主要特性的列表：


    *   **性能和服务质量属性：** 这些特性为实时应用实现了尽力而为和可靠的发布/订阅通信。


    *   **容错性：** 通过设计，DDSI-RTPS 允许创建没有单点故障的网络。


    *   **可扩展性：** 该协议可以在不牺牲向后兼容性或互操作性的情况下进行扩展和增强。


    *   **即插即用连接：** 节点会被自动发现，并且可以随时加入或离开网络，无需重新配置。


    *   **模块化：** 受限设备可以实现协议子集，并且仍然可以加入网络。


    *   **类型安全：** 防止类型错误意味着整个基础设施更加可靠。


    DDSI-RTPS 之上的层是 DDS API 本身，也称为 *以数据为中心的发布-订阅* (DCPS)。它的重点是应用之间的数据分发。其特性可以分为以下三类：


    *   **发布应用：** DCPS 使您能够识别应用发布的数据对象，并为这些对象提供值。


    *   **订阅应用：** DCPS 允许您识别要订阅的数据对象并访问它们的值。


    *   **基础设施：** DCPS 提供了支持发布和订阅应用所需的一切。您将使用它来定义主题、将类型信息附加到主题、创建发布者和订阅者实体，以及为所有这些实体附加
    QoS 策略。


    当使用 DCPS 时，底层的 DDSI-RTPS 协议对程序员是不可见的。现在，让我们更深入地了解 DCPS 的特性，从其概念模型开始。

    '
- fmt: "# Publish and Subscribe\n\nThe DDS specification defines several concepts\
    \ involved in the transmission of information. Sending information requires a\
    \ `Publisher` and a `DataWriter`; receiving information requires a `Subscriber`\
    \ and a `DataReader`. `Topics` make it possible to match subscriptions to publications.\
    \ You can apply distinct QoS properties on the publishing and subscribing sides\
    \ to control their behavior. Publishers and subscribers can be reused at runtime\
    \ if desired. Figure [6-2](#524096_1_En_6_Chapter.xhtml#Fig2) illustrates how\
    \ the concepts of DCPS fit together.\n\n![](images/524096_1_En_6_Chapter/524096_1_En_6_Fig2_HTML.jpg)\n\
    \nAn illustration indicates the values from data writer to publisher and publisher\
    \ to two subscribers, values from subscribers to data readers, and identified\
    \ by the topic from the data writer and Data Reader to the data object.\n\n**Figure\
    \ 6-2** Overview of DCPS concepts\n\nThere are a few nuances that are not apparent\
    \ in the diagram. The following list provides additional details about `DataReaders`,\
    \ `DataWriters`, `Publishers`, and `Subscribers`:\n\n- A `DataWriter` is always\
    \ associated with a single topic. However, an application can contain several\
    \ `DataWriters` sending data to the same topic.\n- `Publishers` are responsible\
    \ for data transmission. Publishers manage and own `DataWriters`. A single `Publisher`\
    \ can own several `DataWriters`, but `DataWriters` belong to one `Publisher` only.\n\
    - A `DataReader` is always associated with a single topic. An application can\
    \ contain several `DataReaders` reading data from the same topic.\n- `Subscribers`\
    \ are responsible for data reception. Subscribers manage and own `DataReaders`.\
    \ A single `Subscriber` can own several `DataReaders`, but `DataReaders` belong\
    \ to one `Subscriber` only.\n\nI will describe the specifics of reading and writing\
    \ data later in this chapter. For the time being, please note that the various\
    \ DDS specifications do not describe data updates made to a topic as messages\
    \ but rather as *samples*.\n\n> **Note**  \n> The term *sample* comes from the\
    \ world of data acquisition. Data acquisition is the process of sampling signals\
    \ that express real-world physical conditions with sensors and converting the\
    \ resulting samples into digital values.\n\n`DataReaders` and `DataWriters` are\
    \ strongly typed. The types they use are those defined for the topics. When building\
    \ a DDS application, you will define topic types yourself using one of the supported\
    \ syntaxes, with IDL being the most typical choice.\n\nListing [6-1](#524096_1_En_6_Chapter.xhtml#PC1)\
    \ shows an IDL type definition for a temperature sensor. You will notice it looks\
    \ very similar to a C or C++ structure.\n\n```\n// TempSensor.idl\nenum TemperatureScale\
    \ {\n  CELSIUS,\n  FAHRENHEIT,\n  KELVIN\n};\n\n@topic struct TempSensorType {\n\
    \  @key short id;\n  float temp;\n  TemperatureScale scale;\n};\n```\n\n**Listing\
    \ 6-1** IDL definition of a temperature sensor\n\nBefore using the type in your\
    \ application, you will need to use the appropriate pre-processor to generate\
    \ implementation classes. Such pre-processors usually support several programming\
    \ languages.\n\nIn DDS, publication and subscription happen in the context of\
    \ a fully distributed Global Data Space (GDS). I will now explain what that means.\n\
    \n## Global Data Space\n\nDDS applications see all data as local; in other words,\
    \ when a DDS application reads data, it does so from what looks like a local data\
    \ store. DDS takes care of data transmission, ensuring subscribers get the data\
    \ they request. The GDS is also responsible for performing the automatic discovery\
    \ of publishers and subscribers. There is no central registry of connected clients,\
    \ like the broker is in MQTT. The advantage of this approach is that clients do\
    \ not need to be configured before connecting. The auto-discovery mechanisms that\
    \ are part of DDS take care of everything.\n\nAlthough the G in GDS means “Global,”\
    \ DDS establishes two ways to scope information access: *domains* and *partitions*.\
    \ I will now explain what each one entails.\n\n### Domains\n\nYou can see domains\
    \ as a virtual network specific to the applications that joined it. Domains cannot\
    \ communicate with one another. If your application needs to perform operations\
    \ across multiple domains, you must maintain separate connections to both domains\
    \ and mediate the data exchanges yourself.\n\nFigure [6-3](#524096_1_En_6_Chapter.xhtml#Fig3)\
    \ shows data writers’ and readers’ interactions in the context of a single nonpartitioned\
    \ domain inside the GDS. The diagram highlights that distinct QoS properties can\
    \ be used on the various participants.\n\n![](images/524096_1_En_6_Chapter/524096_1_En_6_Fig3_HTML.jpg)\n\
    \nAn illustration depicts the DDS domain, indicating data writer QoS interacts\
    \ with topics 1, 2, 3, and 4 QoS and the interaction of these 4 topics with data\
    \ reader QoS. Topic 4 QoS apply filters to the data writer and reader.\n\n**Figure\
    \ 6-3** The data-centric model of DDS\n\nFigure [6-3](#524096_1_En_6_Chapter.xhtml#Fig3)\
    \ also shows that it is possible to apply filters to subscriptions. I will cover\
    \ this concept later.\n\n### Partitions\n\nPartitions are a logical group of topics\
    \ inside a domain. A name identifies them, and your application needs to join\
    \ them explicitly before publishing or subscribing to the topics inside. One interesting\
    \ twist is that applications can join a partition by using its exact name or specifying\
    \ wildcards. Such wildcards must comply with the POSIX `fnmatch` API ([1003.2-1992\
    \ Section B.6](https://standards.ieee.org/standard/1003_2-1992.html)).^([(18)](#fn18))\
    \ If desired, you can also hierarchically structure partition names by defining\
    \ a naming convention; the column is a good character to use as a separator in\
    \ that context.\n\nTo make this more concrete, let’s go back to our example about\
    \ museums. In previous chapters, we were deploying infrastructure to monitor temperature\
    \ and humidity in every room of the *Musée du Louvre*. A possible DDS partition\
    \ naming convention for this use case could be:\n\n```\nm-[museum name]:fl-[floor]:rm-[room]\n\
    ```\n\nActual partition names could look like this:\n\n```\nm-Louvre:fl-1:rm-101\n\
    m-Louvre:fl-2:rm-205\n```\n\nThen, `temperature` and `humidity` could be topics\
    \ inside each of those partitions.\n\nA subscriber looking to obtain all the readings\
    \ for a specific floor could use the following expression to specify the partition:\n\
    \n```\nm-Louvre:fl-*\n```\n\n## Quality of Service\n\nIn DDS, quality of service\
    \ is specified through several granular properties. Those properties cover nonfunctional\
    \ concerns such as data availability, data delivery, timeliness, resource usage,\
    \ and configuration.\n\nWhen the QoS for a `DataReader` and a `DataWriter` do\
    \ not match, data will only be transmitted if the QoS requested by the `DataReader`\
    \ is not more stringent than the one offered by the `DataWriter`. This ensures\
    \ that the guarantees of higher levels of quality of service are preserved.\n\n\
    Let’s now review the most used QoS policies offered by DDS."
  raw: '## Publish and Subscribe


    The DDS specification defines several concepts involved in the transmission of
    information. Sending information requires a *Publisher* and a *DataWriter*; receiving
    information requires a *Subscriber* and a *DataReader*. *Topics* make it possible
    to match subscriptions to publications. You can apply distinct QoS properties
    on the publishing and subscribing sides to control their behavior. Publishers
    and subscribers can be reused at runtime if desired. Figure [6-2](#524096_1_En_6_Chapter.xhtml#Fig2)
    illustrates how the concepts of DCPS fit together.


    ![](images/524096_1_En_6_Chapter/524096_1_En_6_Fig2_HTML.jpg)


    An illustration indicates the values from data writer to publisher and publisher
    to two subscribers, values from subscribers to data readers, and identified by
    the topic from the data writer and Data Reader to the data object.


    Figure 6-2


    Overview of DCPS concepts


    There are a few nuances that are not apparent in the diagram. The following list
    provides additional details about DataReaders, DataWriters, Publishers, and Subscribers:


    *   **A DataWriter is always associated with a single topic.** However, an application
    can contain several DataWriters sending data to the same topic.


    *   **Publishers are responsible for data transmission.** Publishers manage and
    own DataWriters. A single Publisher can own several DataWriters, but DataWriters
    belong to one Publisher only.


    *   **A DataReader is always associated with a single topic.** An application
    can contain several DataReaders reading data from the same topic.


    *   **Subscribers are responsible for data reception.** Subscribers manage and
    own DataReaders. A single Subscriber can own several DataReaders, but DataReaders
    belong to one Subscriber only.


    I will describe the specifics of reading and writing data later in this chapter.
    For the time being, please note that the various DDS specifications do not describe
    data updates made to a topic as messages but rather as *samples*.


    Note


    The term *sample* comes from the world of data acquisition. Data acquisition is
    the process of sampling signals that express real-world physical conditions with
    sensors and converting the resulting samples into digital values.


    DataReaders and DataWriters are strongly typed. The types they use are those defined
    for the topics. When building a DDS application, you will define topic types yourself
    using one of the supported syntaxes, with IDL being the most typical choice.


    Listing [6-1](#524096_1_En_6_Chapter.xhtml#PC1) shows an IDL type definition for
    a temperature sensor. You will notice it looks very similar to a C or C++ structure.


    ```

    // TempSensor.idl

    enum TemperatureScale {

    CELSIUS,

    FAHRENHEIT,

    KELVIN

    };

    @topic struct TempSensorType {

    @key short id;

    float temp;

    TemperatureScale scale;

    };

    Listing 6-1

    IDL definition of a temperature sensor

    ```


    Before using the type in your application, you will need to use the appropriate
    pre-processor to generate implementation classes. Such pre-processors usually
    support several programming languages.


    In DDS, publication and subscription happen in the context of a fully distributed
    Global Data Space (GDS). I will now explain what that means.


    ## Global Data Space


    DDS applications see all data as local; in other words, when a DDS application
    reads data, it does so from what looks like a local data store. DDS takes care
    of data transmission, ensuring subscribers get the data they request. The GDS
    is also responsible for performing the automatic discovery of publishers and subscribers.
    There is no central registry of connected clients, like the broker is in MQTT.
    The advantage of this approach is that clients do not need to be configured before
    connecting. The auto-discovery mechanisms that are part of DDS take care of everything.


    Although the G in GDS means “Global,” DDS establishes two ways to scope information
    access: *domains* and *partitions*. I will now explain what each one entails.


    ### Domains


    You can see domains as a virtual network specific to the applications that joined
    it. Domains cannot communicate with one another. If your application needs to
    perform operations across multiple domains, you must maintain separate connections
    to both domains and mediate the data exchanges yourself.


    Figure [6-3](#524096_1_En_6_Chapter.xhtml#Fig3) shows data writers’ and readers’
    interactions in the context of a single nonpartitioned domain inside the GDS.
    The diagram highlights that distinct QoS properties can be used on the various
    participants.


    ![](images/524096_1_En_6_Chapter/524096_1_En_6_Fig3_HTML.jpg)


    An illustration depicts the D D S domain, indicating data writer Q o S interacts
    with topics 1, 2, 3, and 4 Q o S and the interaction of these 4 topics with data
    reader Q o S. Topic 4 Q o S apply filters to the data writer and reader.


    Figure 6-3


    The data-centric model of DDS


    Figure [6-3](#524096_1_En_6_Chapter.xhtml#Fig3) also shows that it is possible
    to apply filters to subscriptions. I will cover this concept later.


    ### Partitions


    Partitions are a logical group of topics inside a domain. A name identifies them,
    and your application needs to join them explicitly before publishing or subscribing
    to the topics inside. One interesting twist is that applications can join a partition
    by using its exact name or specifying wildcards. Such wildcards must comply with
    the POSIX `fnmatch` API ([1003.​2-1992 Section B.​6](https://standards.ieee.org/standard/1003_2-1992.html)).^([^(18)](#fn18))
    If desired, you can also hierarchically structure partition names by defining
    a naming convention; the column is a good character to use as a separator in that
    context.


    To make this more concrete, let’s go back to our example about museums. In previous
    chapters, we were deploying infrastructure to monitor temperature and humidity
    in every room of the *Musée du Louvre*. A possible DDS partition naming convention
    for this use case could be


    ```

    m-[museum name]:fl-[floor]:rm-[room]

    ```


    Actual partition names could look like this:


    ```

    m-Louvre:fl-1:rm-101

    m-Louvre:fl-2:rm-205

    ```


    Then, `temperature` and `humidity` could be topics inside each of those partitions.


    A subscriber looking to obtain all the readings for a specific floor could use
    the following expression to specify the partition:


    ```

    m-Louvre:fl-*

    ```


    ## Quality of Service


    In DDS, quality of service is specified through several granular properties. Those
    properties cover nonfunctional concerns such as data availability, data delivery,
    timeliness, resource usage, and configuration.


    When the QoS for a DataReader and a DataWriter do not match, data will only be
    transmitted if the QoS requested by the DataReader is not more stringent than
    the one offered by the DataWriter. This ensures that the guarantees of higher
    levels of quality of service are preserved.


    Let’s now review the most used QoS policies offered by DDS.'
  trans: '

    ## 发布与订阅


    DDS 规范定义了信息传输中涉及的几个概念。发送信息需要*发布者*和*数据写入器*；接收信息需要*订阅者*和*数据读取器*。*主题*使得订阅与发布能够匹配。你可以在发布端和订阅端应用不同的
    QoS 属性来控制其行为。如果需要，发布者和订阅者可以在运行时重复使用。图 6-2 展示了 DCPS 各概念如何协同工作。


    ![](img/524096_1_En_6_Fig2_HTML.jpg)


    图示说明了从数据写入器到发布者、从发布者到两个订阅者的值传递，以及从订阅者到数据读取器的值传递，并通过主题从数据写入器和数据读取器标识到数据对象。


    图 6-2

    DCPS 概念概览


    图中存在一些不易察觉的细微差别。以下列表提供了关于数据读取器、数据写入器、发布者和订阅者的更多细节：


    *   **数据写入器始终与单个主题关联。** 然而，一个应用程序可以包含多个向同一主题发送数据的数据写入器。


    *   **发布者负责数据传输。** 发布者管理并拥有数据写入器。单个发布者可以拥有多个数据写入器，但数据写入器仅属于一个发布者。


    *   **数据读取器始终与单个主题关联。** 一个应用程序可以包含多个从同一主题读取数据的数据读取器。


    *   **订阅者负责数据接收。** 订阅者管理并拥有数据读取器。单个订阅者可以拥有多个数据读取器，但数据读取器仅属于一个订阅者。


    我将在本章后面部分详细描述读写数据的具体细节。目前，请注意，各种 DDS 规范并未将对主题的数据更新描述为消息，而是描述为*样本*。


    注意


    术语*样本*源自数据采集领域。数据采集是使用传感器对表达现实世界物理条件的信号进行采样，并将生成的样本转换为数字值的过程。


    数据读取器和数据写入器是强类型的。它们使用的类型是为主题定义的类型。在构建 DDS 应用程序时，你将使用支持的语法之一自行定义主题类型，其中 IDL 是最典型的选择。


    清单 6-1 展示了一个温度传感器的 IDL 类型定义。你会注意到它看起来与 C 或 C++结构非常相似。


    ```

    // TempSensor.idl

    enum TemperatureScale {

    CELSIUS,

    FAHRENHEIT,

    KELVIN

    };

    @topic struct TempSensorType {

    @key short id;

    float temp;

    TemperatureScale scale;

    };

    清单 6-1

    温度传感器的 IDL 定义

    ```


    在应用程序中使用该类型之前，你需要使用适当的预处理器来生成实现类。此类预处理器通常支持多种编程语言。


    在 DDS 中，发布和订阅发生在完全分布式的全局数据空间（GDS）的上下文中。我现在将解释这意味着什么。


    ## 全局数据空间


    DDS 应用程序将所有数据视为本地数据；换句话说，当 DDS 应用程序读取数据时，它从一个看似本地数据存储的地方读取。DDS 负责数据传输，确保订阅者获得他们请求的数据。GDS
    还负责执行发布者和订阅者的自动发现。没有像 MQTT 中的代理那样的连接客户端中央注册表。这种方法的优点是客户端在连接前无需进行配置。作为 DDS 一部分的自动发现机制会处理一切。


    尽管 GDS 中的“G”代表“全局”，但 DDS 建立了两种限定信息访问范围的方式：*域*和*分区*。我现在将解释每种方式的具体含义。


    ### 域


    你可以将域视为特定于加入它的应用程序的虚拟网络。域之间无法相互通信。如果你的应用程序需要跨多个域执行操作，你必须维护与两个域的单独连接，并自行协调数据交换。


    图 6-3 展示了在 GDS 内单个未分区域的上下文中，数据写入器和数据读取器的交互。该图强调了不同的参与者可以使用不同的 QoS 属性。


    ![](img/524096_1_En_6_Fig3_HTML.jpg)


    图示描绘了 DDS 域，表明数据写入器 QoS 与主题 1、2、3 和 4 的 QoS 交互，以及这四个主题与数据读取器 QoS 的交互。主题 4 的 QoS
    对数据写入器和读取器应用了过滤器。


    图 6-3

    DDS 的数据中心模型


    图 6-3 还显示可以对订阅应用过滤器。我将在后面介绍这个概念。


    ### 分区


    分区是域内主题的逻辑分组。分区由名称标识，你的应用程序需要在发布或订阅分区内的主题之前显式加入它们。一个有趣的特性是，应用程序可以通过使用精确名称或指定通配符来加入分区。此类通配符必须符合
    POSIX `fnmatch` API（[1003.​2-1992 Section B.​6](https://standards.ieee.org/standard/1003_2-1992.html)）。^(¹⁸)
    如果需要，你还可以通过定义命名约定来分层组织分区名称；在这种情况下，冒号是一个很好的分隔符。


    为了更具体地说明，让我们回到关于博物馆的例子。在前面的章节中，我们正在部署基础设施来监控*卢浮宫*每个房间的温度和湿度。针对这个用例，一个可能的 DDS 分区命名约定可以是：


    ```

    m-[博物馆名称]:fl-[楼层]:rm-[房间]

    ```


    实际的分区名称可能如下所示：


    ```

    m-Louvre:fl-1:rm-101

    m-Louvre:fl-2:rm-205

    ```


    那么，`temperature`和`humidity`可以是这些分区内的主题。


    一个希望获取特定楼层所有读数的订阅者可以使用以下表达式来指定分区：


    ```

    m-Louvre:fl-*

    ```


    ## 服务质量


    在 DDS 中，服务质量通过多个细粒度的属性来指定。这些属性涵盖了非功能性关注点，例如数据可用性、数据传递、时效性、资源使用和配置。


    当数据读取器和数据写入器的 QoS 不匹配时，只有当数据读取器请求的 QoS 不比数据写入器提供的 QoS 更严格时，数据才会被传输。这确保了更高质量服务级别的保证得以保留。


    现在让我们回顾一下 DDS 提供的最常用的 QoS 策略。

    '
- fmt: '# Data Availability


    The policies of the data availability group make it possible to decouple applications
    across time and space.


    The `DURABILITY` policy determines the lifetime of the data written to a domain.
    It defines the following four levels of durability:


    - **VOLATILE:** Data is transmitted to the subscribers that are currently connected.
    No copy is kept for offline subscribers.

    - **TRANSIENT_LOCAL:** Publishers store data locally so that offline subscribers
    will get a copy of the latest data published once they reconnect to the domain.
    However, no data will be transmitted if the publisher goes offline.

    - **TRANSIENT:** A copy of the latest data published is kept in the GDS outside
    of the local scope. This ensures offline subscribers will get a copy of the data
    once they reconnect to the domain. The data will not persist if the system is
    shut down.

    - **PERSISTENT:** A copy of the latest data published is kept in the GDS outside
    of the local scope and written to persistent storage – typically the filesystem
    or a database. This ensures offline subscribers will get a copy of the data once
    they reconnect to the domain. The data will be restored once the system comes
    back online after a shutdown.


    The `LIFESPAN` QoS policy controls the validity interval of the published data.
    The default value for this policy is `infinite`, which means data will not expire.
    If a value is specified, data elements older than the `LIFESPAN` threshold will
    be purged.


    The `HISTORY` QoS policy controls the number of samples (subsequent writes made
    to the same topic) that readers or writers must store. Possible values are the
    latest write, the last *n* writes, or all writes.


    # Data Delivery


    The policies of this group influence how published data is made available to subscribers.
    They directly influence the scalability of a DDS system.


    - **PRESENTATION:** This policy affects the ordering and coherency of data updates.
    The `access_scope` property determines the granularity of the settings chosen.
    The supported levels of granularity are `INSTANCE`, `TOPIC`, and `GROUP`. There
    are two settings in the policy: `ordered_access` and `coherent_access`. The former
    controls whether the order of the updates will be preserved; the latter determines
    if the grouping of changes specified through the `begin_coherent_change` and `end_coherent_change`
    operations will be maintained. Ultimately, the policy allows reading or writing
    multiple samples atomically across the scope if `coherent_access` is enabled and
    preserving the exact order they were published if `ordered_access` is enabled.
    If the value of `access_scope` is `INSTANCE`, then this applies to samples with
    the same key value. If the value is `TOPIC`, it applies to all the samples published
    by a specific DataWriter. Finally, if the scope is `GROUP`, the settings apply
    to all the DataWriters belonging to the Publisher.


    - **RELIABILITY:** This policy controls the level of reliability of data transmission.
    The possible values are `BEST_EFFORT` and `RELIABLE`. The `BEST_EFFORT` setting
    provides no delivery guarantees; the Publisher will not attempt to retransmit
    samples that the Subscriber has not received. When the `RELIABLE` setting is selected,
    the Publisher will attempt to retransmit lost samples until received by the Subscriber.
    In both cases, the ordering of the samples is maintained; data values will not
    go back from a newer one to an older one.


    - **PARTITION:** This policy specifies the association between an instance of
    a Publisher or Subscriber and partitions. This relies on the name of the partition,
    which can contain wildcards. When matching Publishers and Subscribers, DDS considers
    both the topic and partitions.


    - **DESTINATION_ORDER:** This policy defines if the samples will be ordered by
    referencing the time of their reception (`BY_RECEPTION_TIMESTAMP`), which is the
    default value, or a timestamp set at the source (`BY_SOURCE_TIMESTAMP`). The `BY_SOURCE_TIMESTAMP`
    setting is needed for maintaining eventual consistency between samples when there
    are multiple publishers for the same data or when subscriptions to non-VOLATILE
    data are taken after publishers have begun publishing data.


    - **OWNERSHIP:** This policy determines if a specific instance of a Data Object,
    determined by a topic and a key, will accept concurrent updates by multiple DataWriters
    or not. If set to `SHARED`, then multiple DataWriters can write. If set to `EXCLUSIVE`,
    then a single DataWriter “owns” the Data Object at any given time. The `OWNERSHIP_STRENGTH`
    policy determines which of the DataWriters will obtain write access. The DDS specification
    does not require implementations to notify DataWriters that they do not own the
    Data Object they are trying to update.


    # Data Timeliness


    The policies in this group influence the temporal aspects of transmission and
    can influence ownership of data objects when the `OWNERSHIP` policy is `EXCLUSIVE`.


    - **DEADLINE:** This policy is useful when a topic is supposed to be updated regularly.
    The policy defines a contract that the application must fulfill on the publishing
    side. On the subscribing side, it defines a minimum requirement for publishers
    that supply data values. DDS applications can be notified of missed deadlines.


    - **LATENCY_BUDGET:** This policy provides a way for applications to inform DDS
    of the urgency of the transmitted data. The DDS specification states that the
    value is a hint left to the interpretation of the implementation. Some implementations
    will treat it as a delivery window for data transmission.


    - **TRANSPORT_PRIORITY:** This policy allows applications to indicate the relative
    priority of the data associated with a topic. The value is a 32-bit signed integer;
    higher values indicate higher priority. The DDS specification states that this
    policy is a hint, and the actual runtime behavior is implementation dependent.


    # Resources


    The policies in this group enable you to define limits to the resources consumed
    by the DDS system. This makes it possible to keep the infrastructure responsive
    even in cases where bandwidth and storage are limited.


    - **TIME_BASED_FILTER:** This policy controls the sampling rate of a DataReader.
    It is useful when subscribers lack the network bandwidth, memory, or processing
    power required to process data over a certain rate. Specifically, the policy enables
    you to define a `minimum_separation` period between two samples on a topic. In
    other words, this policy acts as a rate-limiting mechanism.


    - **RESOURCE_LIMITS:** This policy allows applications to define the maximum number
    of samples and samples per instance. When applicable, this effectively defines
    the storage available to hold topic instances and their related historical samples.


    # Configuration


    This group’s policies focus on the definition and transmission of user-defined
    values. Such values are especially useful in the bootstrapping process.


    - **USER_DATA:** This policy allows applications to associate metadata to domain
    participants, DataReaders, and DataWriters. This metadata is then distributed
    through a system topic. The policy represents a generic extensibility mechanism
    and is often used to provision security credentials.


    - **TOPIC_DATA:** This policy allows applications to associate metadata to a topic.
    This metadata is then distributed through a system topic. The policy represents
    a generic extensibility mechanism.


    - **GROUP_DATA:** This policy allows applications to associate metadata to Publishers
    and Subscribers. This metadata is then distributed through system topics. Applications
    can leverage such metadata to get additional control over subscription matching.'
  raw: '### Data Availability


    The policies of the data availability group make it possible to decouple applications
    across time and space.


    The `DURABILITY` policy determines the lifetime of the data written to a domain.
    It defines the following four levels of durability:


    *   **VOLATILE:** Data is transmitted to the subscribers that are currently connected.
    No copy is kept for offline subscribers.


    *   **TRANSIENT_LOCAL:** Publishers store data locally so that offline subscribers
    will get a copy of the latest data published once they reconnect to the domain.
    However, no data will be transmitted if the publisher goes offline.


    *   **TRANSIENT:** A copy of the latest data published is kept in the GDS outside
    of the local scope. This ensures offline subscribers will get a copy of the data
    once they reconnect to the domain. The data will not persist if the system is
    shut down.


    *   **PERSISTENT:** A copy of the latest data published is kept in the GDS outside
    of the local scope and written to persistent storage `–` typically the filesystem
    or a database. This ensures offline subscribers will get a copy of the data once
    they reconnect to the domain. The data will be restored once the system comes
    back online after a shutdown.


    The `LIFESPAN` QoS policy controls the validity interval of the published data.
    The default value for this policy is `infinite`, which means data will not expire.
    If a value is specified, data elements older than the `LIFESPAN` threshold will
    be purged.


    The `HISTORY` QoS policy controls the number of samples (subsequent writes made
    to the same topic) that readers or writers must store. Possible values are the
    latest write, the last *n* writes, or all writes.


    ### Data Delivery


    The policies of this group influence how published data is made available to subscribers.
    They directly influence the scalability of a DDS system.


    *   **PRESENTATION:** This policy affects the ordering and coherency of data updates.
    The `access_scope` property determines the granularity of the settings chosen.
    The supported levels of granularity are `INSTANCE`, `TOPIC`, and `GROUP`. There
    are two settings in the policy: `ordered_access` and `coherent_access`. The former
    controls whether the order of the updates will be preserved; the latter determines
    if the grouping of changes specified through the `begin_coherent_change` and `end_coherent_change`
    operations will be maintained. Ultimately, the policy allows reading or writing
    multiple samples atomically across the scope if `coherent_access` is enabled and
    preserving the exact order they were published if `ordered_access` is enabled.
    If the value of `access_scope` is `INSTANCE`, then this applies to samples with
    the same key value. If the value is `TOPIC`, it applies to all the samples published
    by a specific DataWriter. Finally, if the scope is `GROUP`, the settings apply
    to all the DataWriters belonging to the Publisher.


    *   **RELIABILITY:** This policy controls the level of reliability of data transmission.
    The possible values are `BEST_EFFORT` and `RELIABLE`. The `BEST_EFFORT` setting
    provides no delivery guarantees; the Publisher will not attempt to retransmit
    samples that the Subscriber has not received. When the `RELIABLE` setting is selected,
    the Publisher will attempt to retransmit lost samples until received by the Subscriber.
    In both cases, the ordering of the samples is maintained; data values will not
    go back from a newer one to an older one.


    *   **PARTITION:** This policy specifies the association between an instance of
    a Publisher or Subscriber and partitions. This relies on the name of the partition,
    which can contain wildcards. When matching Publishers and Subscribers, DDS considers
    both the topic and partitions.


    *   **DESTINATION_ORDER:** This policy defines if the samples will be ordered
    by referencing the time of their reception (`BY_RECEPTION_TIMESTAMP`), which is
    the default value, or a timestamp set at the source (`BY_SOURCE_TIMESTAMP`). The
    BY_SOURCE_TIMESTAMP setting is needed for maintaining eventual consistency between
    samples when there are multiple publishers for the same data or when subscriptions
    to non-VOLATILE data are taken after publishers have begun publishing data.


    *   **OWNERSHIP:** This policy determines if a specific instance of a Data Object,
    determined by a topic and a key, will accept concurrent updates by multiple DataWriters
    or not. If set to `SHARED`, then multiple DataWriters can write. If set to `EXCLUSIVE`,
    then a single DataWriter “owns” the Data Object at any given time. The `OWNERSHIP_STRENGTH`
    policy determines which of the DataWriters will obtain write access. The DDS specification
    does not require implementations to notify DataWriters that they do not own the
    Data Object they are trying to update.


    ### Data Timeliness


    The policies in this group influence the temporal aspects of transmission and
    can influence ownership of data objects when the `OWNERSHIP` policy is `EXCLUSIVE`.


    *   **DEADLINE:** This policy is useful when a topic is supposed to be updated
    regularly. The policy defines a contract that the application must fulfill on
    the publishing side. On the subscribing side, it defines a minimum requirement
    for publishers that supply data values. DDS applications can be notified of missed
    deadlines.


    *   **LATENCY_BUDGET:** This policy provides a way for applications to inform
    DDS of the urgency of the transmitted data. The DDS specification states that
    the value is a hint left to the interpretation of the implementation. Some implementations
    will treat it as a delivery window for data transmission.


    *   **TRANSPORT_PRIORITY:** This policy allows applications to indicate the relative
    priority of the data associated with a topic. The value is a 32-bit signed integer;
    higher values indicate higher priority. The DDS specification states that this
    policy is a hint, and the actual runtime behavior is implementation dependent.


    ### Resources


    The policies in this group enable you to define limits to the resources consumed
    by the DDS system. This makes it possible to keep the infrastructure responsive
    even in cases where bandwidth and storage are limited.


    *   **TIME_BASED_FILTER:** This policy controls the sampling rate of a DataReader.
    It is useful when subscribers lack the network bandwidth, memory, or processing
    power required to process data over a certain rate. Specifically, the policy enables
    you to define a `minimum_separation` period between two samples on a topic. In
    other words, this policy acts as a rate-limiting mechanism.


    *   **RESOURCE_LIMITS:** This policy allows applications to define the maximum
    number of samples and samples per instance. When applicable, this effectively
    defines the storage available to hold topic instances and their related historical
    samples.


    ### Configuration


    This group’s policies focus on the definition and transmission of user-defined
    values. Such values are especially useful in the bootstrapping process.


    *   **USER_DATA:** This policy allows applications to associate metadata to domain
    participants, DataReaders, and DataWriters. This metadata is then distributed
    through a system topic. The policy represents a generic extensibility mechanism
    and is often used to provision security credentials.


    *   **TOPIC_DATA:** This policy allows applications to associate metadata to a
    topic. This metadata is then distributed through a system topic. The policy represents
    a generic extensibility mechanism.


    *   **GROUP_DATA:** This policy allows applications to associate metadata to Publishers
    and Subscribers. This metadata is then distributed through system topics. Applications
    can leverage such metadata to get additional control over subscription matching.'
  trans: '

    ### 数据可用性


    数据可用性组的策略使得应用程序能够跨越时间和空间进行解耦。


    `DURABILITY`（持久性）策略决定了写入域的数据的生命周期。它定义了以下四个持久性级别：


    *   **VOLATILE（易失性）：** 数据仅传输给当前已连接的订阅者。不会为离线订阅者保留副本。


    *   **TRANSIENT_LOCAL（本地临时性）：** 发布者将数据存储在本地，以便离线订阅者在重新连接到域后能获取到最新发布数据的副本。但是，如果发布者离线，则不会传输任何数据。


    *   **TRANSIENT（临时性）：** 最新发布数据的副本保存在本地范围之外的 GDS（全局数据空间）中。这确保了离线订阅者在重新连接到域后能获取到数据的副本。如果系统关闭，数据将不会持久保存。


    *   **PERSISTENT（持久性）：** 最新发布数据的副本保存在本地范围之外的 GDS 中，并写入持久化存储 `–` 通常是文件系统或数据库。这确保了离线订阅者在重新连接到域后能获取到数据的副本。系统在关闭后重新上线时，数据将被恢复。


    `LIFESPAN`（生命周期）QoS 策略控制已发布数据的有效时间间隔。此策略的默认值为 `infinite`（无限），意味着数据永不过期。如果指定了值，则早于
    `LIFESPAN` 阈值的数据元素将被清除。


    `HISTORY`（历史记录）QoS 策略控制读取者或写入者必须存储的样本数量（对同一主题进行的后续写入）。可能的值为：最新写入、最近 *n* 次写入或所有写入。


    ### 数据交付


    此组的策略影响已发布数据如何提供给订阅者。它们直接影响 DDS 系统的可扩展性。


    *   **PRESENTATION（呈现）：** 此策略影响数据更新的顺序和一致性。`access_scope`（访问范围）属性决定了所选设置的粒度。支持的粒度级别为
    `INSTANCE`（实例）、`TOPIC`（主题）和 `GROUP`（组）。该策略有两个设置：`ordered_access`（有序访问）和 `coherent_access`（连贯访问）。前者控制更新的顺序是否得以保留；后者确定通过
    `begin_coherent_change`（开始连贯更改）和 `end_coherent_change`（结束连贯更改）操作指定的更改分组是否得以维持。最终，如果启用了
    `coherent_access`，该策略允许在范围内原子性地读取或写入多个样本；如果启用了 `ordered_access`，则保留它们被发布的确切顺序。如果
    `access_scope` 的值为 `INSTANCE`，则这适用于具有相同键值的样本。如果值为 `TOPIC`，则适用于特定 DataWriter 发布的所有样本。最后，如果范围为
    `GROUP`，则这些设置适用于属于该发布者的所有 DataWriters。


    *   **RELIABILITY（可靠性）：** 此策略控制数据传输的可靠性级别。可能的值为 `BEST_EFFORT`（尽力而为）和 `RELIABLE`（可靠）。`BEST_EFFORT`
    设置不提供交付保证；发布者不会尝试重传订阅者未收到的样本。当选择 `RELIABLE` 设置时，发布者将尝试重传丢失的样本，直到订阅者收到为止。在这两种情况下，样本的顺序都得以保持；数据值不会从新值回退到旧值。


    *   **PARTITION（分区）：** 此策略指定发布者或订阅者的实例与分区之间的关联。这依赖于分区的名称，该名称可以包含通配符。在匹配发布者和订阅者时，DDS
    会同时考虑主题和分区。


    *   **DESTINATION_ORDER（目标顺序）：** 此策略定义样本是按接收时间（`BY_RECEPTION_TIMESTAMP`，默认值）排序，还是按源端设置的时间戳（`BY_SOURCE_TIMESTAMP`）排序。当同一数据有多个发布者，或者在非易失性数据的订阅是在发布者开始发布数据之后进行时，需要使用
    `BY_SOURCE_TIMESTAMP` 设置来维护样本之间的最终一致性。


    *   **OWNERSHIP（所有权）：** 此策略确定由主题和键确定的特定数据对象实例是否接受多个 DataWriter 的并发更新。如果设置为 `SHARED`（共享），则多个
    DataWriter 可以写入。如果设置为 `EXCLUSIVE`（独占），则在任何给定时间只有一个 DataWriter “拥有”该数据对象。`OWNERSHIP_STRENGTH`（所有权强度）策略决定哪个
    DataWriter 将获得写入权限。DDS 规范不要求实现通知 DataWriter 它们不拥有其试图更新的数据对象。


    ### 数据时效性


    此组的策略影响传输的时间方面，并且当 `OWNERSHIP` 策略为 `EXCLUSIVE` 时，可能影响数据对象的所有权。


    *   **DEADLINE（截止时间）：** 当主题需要定期更新时，此策略非常有用。该策略定义了一个契约，应用程序必须在发布端履行该契约。在订阅端，它定义了提供数据值的发布者的最低要求。DDS
    应用程序可以收到错过截止时间的通知。


    *   **LATENCY_BUDGET（延迟预算）：** 此策略为应用程序提供了一种向 DDS 告知传输数据紧急程度的方法。DDS 规范指出，该值是一个提示，留待实现方解释。某些实现会将其视为数据传输的交付窗口。


    *   **TRANSPORT_PRIORITY（传输优先级）：** 此策略允许应用程序指示与主题关联的数据的相对优先级。该值是一个 32 位有符号整数；值越高表示优先级越高。DDS
    规范指出，此策略是一个提示，实际的运行时行为取决于实现。


    ### 资源


    此组的策略使您能够定义 DDS 系统消耗资源的限制。这使得即使在带宽和存储有限的情况下，也能保持基础设施的响应能力。


    *   **TIME_BASED_FILTER（基于时间的过滤器）：** 此策略控制 DataReader 的采样率。当订阅者缺乏处理超过特定速率的数据所需的网络带宽、内存或处理能力时，此策略非常有用。具体来说，该策略使您能够定义主题上两个样本之间的
    `minimum_separation`（最小间隔）时间。换句话说，此策略充当速率限制机制。


    *   **RESOURCE_LIMITS（资源限制）：** 此策略允许应用程序定义最大样本数和每个实例的样本数。在适用的情况下，这有效地定义了用于保存主题实例及其相关历史样本的存储空间。


    ### 配置


    此组的策略侧重于用户定义值的定义和传输。这些值在引导过程中尤其有用。


    *   **USER_DATA（用户数据）：** 此策略允许应用程序将元数据关联到域参与者、DataReader 和 DataWriter。然后，此元数据通过系统主题进行分发。该策略代表了一种通用的可扩展性机制，通常用于配置安全凭证。


    *   **TOPIC_DATA（主题数据）：** 此策略允许应用程序将元数据关联到主题。然后，此元数据通过系统主题进行分发。该策略代表了一种通用的可扩展性机制。


    *   **GROUP_DATA（组数据）：** 此策略允许应用程序将元数据关联到发布者和订阅者。然后，此元数据通过系统主题进行分发。应用程序可以利用此类元数据来获得对订阅匹配的额外控制。

    '
- fmt: '# Topics


    As you realize now, DDS QoS policies are much more granular than QoS levels in
    MQTT. Topics represent another difference between the two protocols. As I mentioned
    earlier, DDS topics are defined by a name, a type, and a set of QoS policies.
    We will now explore what this means together.


    ## Topic Types


    Although alternatives are available, IDL remains the most common choice to define
    DDS topic types. When expressed in IDL, topic types are composed of a key and
    an IDL `struct`. The `struct` can contain an arbitrary number of fields. Those
    fields can be either a primitive type, a template type, or a constructed type.


    Table [6-1](#524096_1_En_6_Chapter.xhtml#Tab1) shows the IDL primitive types available
    when defining DDS topics.


    **Table 6-1** IDL primitive types used to define DDS topics


    | Primitive Type | Size (bits) |

    | --- | --- |

    | `boolean` | 8 |

    | `octet` | 8 |

    | `char` | 8 |

    | `short` | 16 |

    | `unsigned short` | 16 |

    | `long` | 32 |

    | `unsigned long` | 32 |

    | `long long` | 64 |

    | `unsigned long long` | 64 |

    | `float` | 32 |

    | `double` | 64 |


    As you can see, there is no `int` type in IDL. You can use `short`, `long`, or
    `long long` instead; simply pick the appropriate size for the data you wish to
    transmit.


    There are two template types available. One can define strings of defined or undefined
    (unbounded) length. The other is a random-access ordered container called *sequence*,
    conceptually similar to a vector in most high-level programming languages. Table
    [6-2](#524096_1_En_6_Chapter.xhtml#Tab2) provides more details.


    **Table 6-2** IDL template types used to define DDS topics


    | Template Format | Example Declarations |

    | --- | --- |

    | `String<length = UNBOUNDED$>` | `string museumName;` `string<32> museumShortName;`
    |

    | `sequence<T,length = UNBOUNDED>` | `sequence<octet> floorRooms` `sequence<octet,
    5> lastFive` `sequence<TempSensorType> tSens` `sequence<TempSensorType, $5>$ tS`
    |


    Finally, you can use three distinct IDL constructed types in your DDS types: `enum`,
    `struct`, and `union`. IDL enums are simply enumerations of possible predefined
    values. IDL structs are equivalent to the same construct in the C language. As
    for IDL unions, they define a structure that can contain only one of several alternative
    members. Table [6-3](#524096_1_En_6_Chapter.xhtml#Tab3) contains examples of the
    three allowed constructed types.


    **Table 6-3** IDL constructed types used to define DDS topics


    | Constructed Type | Example Declarations |

    | --- | --- |

    | `enum` | `enum TemperatureScale {` `CELSIUS,` `FAHRENHEIT,` `KELVIN` `};` `enum
    SensorType {SIMPLE, TEMP};` |

    | `struct` | `struct Sensor { short id;};` `struct TempSensor {` `short id;` `TemperatureScale
    scale;` `};` |

    | `union` | `union RoomSensors switch(SensorType){` `case SIMPLE: Sensor simpleSensor;`
    `case TEMP: TempSensor tSensor;` `};` |


    In the end, any DDS topic type is simply a struct that contains nested primitive
    types, template types, and constructed types as described previously.


    The DDS-XTypes specification brought additional flexibility in this domain. It
    introduced single inheritance and optional fields, for example. In addition, it
    added tolerance for slight variations between types on the `DataReader` and `DataWriter`
    sides. This makes it possible for you to evolve the various components in a system
    without updating everything simultaneously.


    ## Topic Keys, Instances, and Samples


    When defining a DDS topic type, you will need to decide if you wish the type to
    have a key. Topics that are keyless will only have one instance; in other words,
    they will be singletons. On the other hand, keyed topics will have as many instances
    as key values at runtime.


    In Listing [6-1](#524096_1_En_6_Chapter.xhtml#PC1), I defined a temperature sensor
    that contained a `short` value named `id`. The `@key` annotation is used to denote
    the components of the key:


    ```

    @key long userID;

    ```


    Topic keys can be a primitive type, an enumeration (`enum`), or a string nested
    at any level of the type declaration. For example, if I wished to use both the
    `id` and `scale` (type `TemperatureScale`, which is an `enum`) as the topic key,
    I would annotate both properties with `@key`:


    ```

    @topic struct TempSensorType {

    @key short id;

    float temp;

    @key TemperatureScale scale;

    };

    ```


    To make the DDS type keyless, all you need to do is omit the `@key` annotation.


    DDS Topic types are comparable to tables in a relational database and DDS Topic
    instances to rows. DDS Topic types also map to classes in object-oriented languages
    and DDS Topic instances to object instances.


    ## Filtering


    Frequently, a subscriber will care only about a subset of the samples published
    to a topic. A typical use case would be to take specific actions once the values
    are outside a specific range. DDS offers content filtering features that allow
    subscribers to get only the relevant samples. The DDS specification describes
    this as content-based subscriptions.


    In DDS, filtering involves creating a content-filtered topic by applying a filter
    to an existing topic. The filter is specified through an expression using one
    or several supported filtering operators. Table [6-4](#524096_1_En_6_Chapter.xhtml#Tab4)
    lists the filtering operators supported by DDS.


    **Table 6-4** Supported operators for DDS filters and query conditions


    | Filter Operator | Meaning |

    | --- | --- |

    | = | Equal |

    | != | Not equal |

    | > | Greater than |

    | < | Less than |

    | >= | Greater than or equal |

    | <= | Less than or equal |

    | BETWEEN | Between and inclusive range |

    | LIKE | Matches a string pattern |


    Filter expressions can also contain logical operators such as `AND`, `NOT`, and
    `OR`.


    Suppose I wish to subscribe to a filtered topic to be notified when the temperature
    is outside the acceptable range in a room inside the *Musée du Louvre*. The type
    of the topic is `TempSensorType`, as defined in Listing [6-1](#524096_1_En_6_Chapter.xhtml#PC1).
    The filter expression could look like this:


    ```

    temp NOT BETWEEN 22.5 AND 23

    ```


    Most DDS implementations make it possible to create the filter expression as a
    parameterized string to which actual values are passed later.


    ## Reading and Writing Data


    Filtering is an effective strategy to minimize bandwidth and memory consumption
    by transmitting only the samples it cares about to a subscriber. However, it is
    also possible for application code to select only a subset of the samples present
    in the cache of a `DataReader` to process them. To understand how this works,
    you first need to learn more about how data is written in DDS.'
  raw: '## Topics


    As you realize now, DDS QoS policies are much more granular than QoS levels in
    MQTT. Topics represent another difference between the two protocols. As I mentioned
    earlier, DDS topics are defined by a name, a type, and a set of QoS policies.
    We will now explore what this means together.


    ### Topic Types


    Although alternatives are available, IDL remains the most common choice to define
    DDS topic types. When expressed in IDL, topic types are composed of a key and
    an IDL `struct`. The `struct` can contain an arbitrary number of fields. Those
    fields can be either a primitive type, a template type, or a constructed type.


    Table [6-1](#524096_1_En_6_Chapter.xhtml#Tab1) shows the IDL primitive types available
    when defining DDS topics.


    Table 6-1


    IDL primitive types used to define DDS topics


    | Primitive Type | Size (bits) |

    | --- | --- |

    | `boolean` | 8 |

    | `octet` | 8 |

    | `char` | 8 |

    | `short` | 16 |

    | `unsigned short` | 16 |

    | `long` | 32 |

    | `unsigned long` | 32 |

    | `long long` | 64 |

    | `unsigned long long` | 64 |

    | `float` | 32 |

    | `double` | 64 |


    As you can see, there is no `int` type in IDL. You can use `short`, `long`, or
    `long long` instead; simply pick the appropriate size for the data you wish to
    transmit.


    There are two template types available. One can define strings of defined or undefined
    (unbounded) length. The other is a random-access ordered container called *sequence*,
    conceptually similar to a vector in most high-level programming languages. Table
    [6-2](#524096_1_En_6_Chapter.xhtml#Tab2) provides more details.


    Table 6-2


    IDL template types used to define DDS topics


    | Template Format | Example Declarations |

    | --- | --- |

    | `String<length = UNBOUNDED$>` | `string museumName;``string<32> museumShortName;`
    |

    | `sequence<T,length = UNBOUNDED>` | `sequence<octet> floorRooms``sequence<octet,
    5> lastFive``sequence<TempSensorType> tSens``sequence<TempSensorType, $5>$ tS`
    |


    Finally, you can use three distinct IDL constructed types in your DDS types: `enum`,
    `struct,` and `union`. IDL enums are simply enumerations of possible predefined
    values. IDL structs are equivalent to the same construct in the C language. As
    for IDL unions, they define a structure that can contain only one of several alternative
    members. Table [6-3](#524096_1_En_6_Chapter.xhtml#Tab3) contains examples of the
    three allowed constructed types.


    Table 6-3


    IDL constructed types used to define DDS topics


    | Constructed Type | Example Declarations |

    | --- | --- |

    | `enum` | `enum TemperatureScale {``CELSIUS,``FAHRENHEIT,``KELVIN``};``enum SensorType
    {SIMPLE, TEMP};` |

    | `struct` | `struct Sensor { short id;};``struct TempSensor {``short id;``TemperatureScale
    scale;``};` |

    | `union` | `union RoomSensors switch(SensorType){``case SIMPLE: Sensor simpleSensor;``case
    TEMP: TempSensor tSensor;``};` |


    In the end, any DDS topic type is simply a struct that contains nested primitive
    types, template types, and constructed types as described previously.


    The DDS-XTypes specification brought additional flexibility in this domain. It
    introduced single inheritance and optional fields, for example. In addition, it
    added tolerance for slight variations between types on the DataReader and DataWriter
    sides. This makes it possible for you to evolve the various components in a system
    without updating everything simultaneously.


    ### Topic Keys, Instances, and Samples


    When defining a DDS topic type, you will need to decide if you wish the type to
    have a key. Topics that are keyless will only have one instance; in other words,
    they will be singletons. On the other hand, keyed topics will have as many instances
    as key values at runtime.


    In Listing [6-1](#524096_1_En_6_Chapter.xhtml#PC1), I defined a temperature sensor
    that contained a `short` value named `id`. The `@key` annotation is used to denote
    the components of the key:


    ```

    @key long userID;

    ```


    Topic keys can be a primitive type, an enumeration (`enum`), or a string nested
    at any level of the type declaration. For example, if I wished to use both the
    `id` and `scale` (type `TemperatureScale`, which is an `enum`) as the topic key,
    I would annotate both properties with `@key`:


    ```

    @topic struct TempSensorType {

    @key short id;

    float temp;

    @key TemperatureScale scale;

    };

    ```


    To make the DDS type keyless, all you need to do is omit the `@key` annotation.


    DDS Topic types are comparable to tables in a relational database and DDS Topic
    instances to rows. DDS Topic types also map to classes in object-oriented languages
    and DDS Topic instances to object instances.


    ### Filtering


    Frequently, a subscriber will care only about a subset of the samples published
    to a topic. A typical use case would be to take specific actions once the values
    are outside a specific range. DDS offers content filtering features that allow
    subscribers to get only the relevant samples. The DDS specification describes
    this as content-based subscriptions.


    In DDS, filtering involves creating a content-filtered topic by applying a filter
    to an existing topic. The filter is specified through an expression using one
    or several supported filtering operators. Table [6-4](#524096_1_En_6_Chapter.xhtml#Tab4)
    lists the filtering operators supported by DDS.


    Table 6-4


    Supported operators for DDS filters and query conditions


    | Filter Operator | Meaning |

    | --- | --- |

    | = | Equal |

    |   | Not equal |

    | > | Greater than |

    | < | Less than |

    | >= | Greater than or equal |

    | <= | Less than or equal |

    | BETWEEN | Between and inclusive range |

    | LIKE | Matches a string pattern |


    Filter expressions can also contain logical operators such as `AND`, `NOT`, and
    `OR`.


    Suppose I wish to subscribe to a filtered topic to be notified when the temperature
    is outside the acceptable range in a room inside the *Musée du Louvre*. The type
    of the topic is `TempSensorType`, as defined in Listing [6-1](#524096_1_En_6_Chapter.xhtml#PC1).
    The filter expression could look like this:


    ```

    temp NOT BETWEEN 22.5 AND 23

    ```


    Most DDS implementations make it possible to create the filter expression as a
    parameterized string to which actual values are passed later.


    ## Reading and Writing Data


    Filtering is an effective strategy to minimize bandwidth and memory consumption
    by transmitting only the samples it cares about to a subscriber. However, it is
    also possible for application code to select only a subset of the samples present
    in the cache of a DataReader to process them. To understand how this works, you
    first need to learn more about how data is written in DDS.'
  trans: '

    ## 主题


    正如你现在所意识到的，DDS QoS 策略比 MQTT 中的 QoS 级别要精细得多。主题（Topics）代表了两者之间的另一个区别。正如我之前提到的，DDS
    主题由名称、类型和一组 QoS 策略定义。接下来我们将一起探讨这意味着什么。


    ### 主题类型


    尽管有其他替代方案，IDL 仍然是定义 DDS 主题类型最常用的选择。当用 IDL 表达时，主题类型由一个键（key）和一个 IDL `struct` 组成。该
    `struct` 可以包含任意数量的字段。这些字段可以是原始类型、模板类型或构造类型。


    表 6-1 展示了定义 DDS 主题时可用的 IDL 原始类型。


    表 6-1


    用于定义 DDS 主题的 IDL 原始类型


    | 原始类型 | 大小（位） |

    | --- | --- |

    | `boolean` | 8 |

    | `octet` | 8 |

    | `char` | 8 |

    | `short` | 16 |

    | `unsigned short` | 16 |

    | `long` | 32 |

    | `unsigned long` | 32 |

    | `long long` | 64 |

    | `unsigned long long` | 64 |

    | `float` | 32 |

    | `double` | 64 |


    如你所见，IDL 中没有 `int` 类型。你可以使用 `short`、`long` 或 `long long` 来代替；只需根据你想要传输的数据选择合适的大小即可。


    有两种可用的模板类型。一种可以定义长度确定或未定义（无界）的字符串。另一种是一种随机访问的有序容器，称为 *sequence*，概念上类似于大多数高级编程语言中的
    vector。表 6-2 提供了更多细节。


    表 6-2


    用于定义 DDS 主题的 IDL 模板类型


    | 模板格式 | 示例声明 |

    | --- | --- |

    | `String<length = UNBOUNDED$>` | `string museumName;``string<32> museumShortName;`
    |

    | `sequence<T,length = UNBOUNDED>` | `sequence<octet> floorRooms``sequence<octet,
    5> lastFive``sequence<TempSensorType> tSens``sequence<TempSensorType, $5>$ tS`
    |


    最后，你可以在你的 DDS 类型中使用三种不同的 IDL 构造类型：`enum`、`struct` 和 `union`。IDL 枚举只是可能预定义值的枚举。IDL
    结构体等同于 C 语言中的相同结构。至于 IDL 联合体，它们定义了一种只能包含多个备选成员之一的结构。表 6-3 包含了这三种允许的构造类型的示例。


    表 6-3


    用于定义 DDS 主题的 IDL 构造类型


    | 构造类型 | 示例声明 |

    | --- | --- |

    | `enum` | `enum TemperatureScale {``CELSIUS,``FAHRENHEIT,``KELVIN``};``enum SensorType
    {SIMPLE, TEMP};` |

    | `struct` | `struct Sensor { short id;};``struct TempSensor {``short id;``TemperatureScale
    scale;``};` |

    | `union` | `union RoomSensors switch(SensorType){``case SIMPLE: Sensor simpleSensor;``case
    TEMP: TempSensor tSensor;``};` |


    最终，任何 DDS 主题类型都只是一个包含如前所述的嵌套原始类型、模板类型和构造类型的结构体。


    DDS-XTypes 规范在该领域带来了额外的灵活性。例如，它引入了单继承和可选字段。此外，它还增加了对 DataReader 和 DataWriter 端类型之间细微差异的容忍度。这使得你可以在不同时更新所有组件的情况下，逐步演进系统中的各个组件。


    ### 主题键、实例和样本


    在定义 DDS 主题类型时，你需要决定是否希望该类型拥有一个键。无键的主题将只有一个实例；换句话说，它们将是单例。另一方面，有键的主题在运行时将拥有与键值数量一样多的实例。


    在清单 6-1 中，我定义了一个包含名为 `id` 的 `short` 值的温度传感器。`@key` 注解用于表示键的组成部分：


    ```

    @key long userID;

    ```


    主题键可以是原始类型、枚举（`enum`）或嵌套在类型声明任意层级的字符串。例如，如果我希望同时使用 `id` 和 `scale`（类型为 `TemperatureScale`，这是一个
    `enum`）作为主题键，我会用 `@key` 注解这两个属性：


    ```

    @topic struct TempSensorType {

    @key short id;

    float temp;

    @key TemperatureScale scale;

    };

    ```


    要使 DDS 类型无键，你只需省略 `@key` 注解即可。


    DDS 主题类型可比作关系数据库中的表，而 DDS 主题实例可比作行。DDS 主题类型也映射到面向对象语言中的类，DDS 主题实例则映射到对象实例。


    ### 过滤


    通常，订阅者只关心发布到某个主题的样本的一个子集。一个典型的用例是当数值超出特定范围时采取特定操作。DDS 提供了内容过滤功能，允许订阅者只获取相关的样本。DDS
    规范将其描述为基于内容的订阅。


    在 DDS 中，过滤涉及通过对现有主题应用过滤器来创建一个内容过滤主题。过滤器通过使用一个或多个支持的过滤运算符的表达式来指定。表 6-4 列出了 DDS
    支持的过滤运算符。


    表 6-4


    DDS 过滤器和查询条件支持的运算符


    | 过滤运算符 | 含义 |

    | --- | --- |

    | = | 等于 |

    |   | 不等于 |

    | > | 大于 |

    | < | 小于 |

    | >= | 大于或等于 |

    | <= | 小于或等于 |

    | BETWEEN | 介于（包含边界）范围之间 |

    | LIKE | 匹配字符串模式 |


    过滤表达式还可以包含逻辑运算符，例如 `AND`、`NOT` 和 `OR`。


    假设我希望订阅一个过滤后的主题，以便在卢浮宫博物馆内某个房间的温度超出可接受范围时得到通知。主题的类型是 `TempSensorType`，如清单 6-1
    中所定义。过滤表达式可能如下所示：


    ```

    temp NOT BETWEEN 22.5 AND 23

    ```


    大多数 DDS 实现都允许将过滤表达式创建为参数化字符串，稍后可将实际值传递给该字符串。


    ## 读取和写入数据


    过滤是一种有效的策略，通过只向订阅者传输其关心的样本来最小化带宽和内存消耗。然而，应用程序代码也可以选择只处理 DataReader 缓存中存在的样本子集。要理解这是如何工作的，你首先需要更多地了解数据在
    DDS 中是如何写入的。

    '
- fmt: '### Writing


    Basic data writing in DDS is simple: just call the `write` function or method
    on a `DataWriter`. Behind the scenes, the life cycle of topic instances impacts
    resource consumption on the local node and remote ones.


    There are three states in the life cycle of a topic instance. The following list
    describes each of the three states:


    - **ALIVE:** At least one `DataWriter` has registered this instance of the topic.
    This means the `DataWriter` intends to provide data updates and has reserved resources
    related to the instance.

    - **NOT_ALIVE_NO_WRITERS:** There are no more `DataWriters` who have registered
    the topic instance. All `DataWriter` resources related to the instance have been
    released. `DataReaders` no longer expect new samples. `DataWriters` need to unregister
    topic instances when they don’t need them anymore because this causes resource
    leaks on the publishers and all related subscribers. Topic instances for an application
    that crashed will typically be in the `NOT_ALIVE_NO_WRITERS` state but could go
    back to `ALIVE` once the application comes back online.

    - **NOT_ALIVE_DISPOSED:** This state indicates that the topic instance needs to
    be discarded. This is the state an application should set its topic instances
    to in the case of a graceful termination or, for example, when an object described
    by the instance no longer exists.


    DDS provides a form of automatic life cycle management for topic instances. By
    default, when a `DataWriter` object is destroyed, DDS will set topic instances
    to the `NOT_ALIVE_DISPOSED` state if no other active `DataWriters` have registered
    against the topic instance. The behavior can usually be overridden through a configuration
    setting, causing DDS to place the instances in the `NOT_ALIVE_NO_WRITERS` state
    instead.


    As a developer, you can explicitly manage the life cycle of topic instances by
    using the APIs exposed by `DataWriter`. This will give you full control over topic
    instance registration and disposal. Usually, this approach results in finer-grained
    management of system resources. Registration results in resource allocations;
    those resources are freed when the `DataWriter` unregisters.


    **Note:** In the case of keyless topics, the topic instance is a singleton. This
    essentially means that the life cycle of the topic is the same as the life cycle
    of the `DataWriter`.


    ### Reading


    `DataReaders` expose two operations that enable you to access data: *read* and
    *take*. Both operations will give you a copy of the data. But `read` will leave
    the data in the `DataReader`’s cache, while `take` will remove it from the cache.
    Using `read` is akin to having a retained message set on a topic in MQTT. Which
    one to use depends on your use case. `Read` is useful when your DDS topics represent
    distributed states and `take` when they represent distributed events.


    Each sample received by a `DataReader` has a companion `SampleInfo` describing
    the sample’s properties. Here is a list of the most important properties:


    - **sample_state:** The sample state can be `READ` or `NOT_READ`. `READ` is, of
    course, only possible if data was obtained through a `read`, not a `take`.

    - **instance_state:** This indicates the status of the topic instance. Possible
    values are `ALIVE`, `NOT_ALIVE_NO_WRITERS`, and `NOT_ALIVE_DISPOSED`.

    - **view_state:** The value of this property will be `NEW` if the sample is the
    first one received on the topic instance and `NOT_NEW` otherwise.

    - **disposed_generation_count and no_writers_generation_count:** `SampleInfo`
    features counters that record the number of times the state of a topic instance
    changed. For example, you could use them to know how many times a topic instance
    was in the `ALIVE` state after being in the `NOT_ALIVE_DISPOSED` state.

    - **source_timestamp:** The timestamp is important since data timeliness QoS policies
    rely on it. It is also often used by applications to represent the time an observation
    was made.

    - **valid_data:** This flag indicates whether the sample contains data or not.
    Some samples do not contain data since they are sent to convey a change in the
    value for `instance_state`.


    DDS allows you to select a subset of the data at reading time, regardless of whether
    you use `read` or `take`. You can base data selection on *state* or *content*.
    State-based selection involves the `view_state`, `instance_state`, and `sample_state`
    properties of `SampleInfo`. You could, for example, read data provided by instances
    that just showed up in the GDS by issuing a read for samples where `view_state`
    is `NEW`, `sample_state` is `NOT_READ`, and `instance_state` is `ALIVE`. Content-based
    selection, on the other hand, involves the actual sample data. DDS provides content-based
    selection through queries, which use the same syntax as DDS filters. Table [6-4](#524096_1_En_6_Chapter.xhtml#Tab4)
    lists the supported operators.


    Conceptually, filters and queries are close to each other. How do they differ,
    then? Filtering controls the data received by the data reader: the data that does
    not match the filter is not inserted into the `DataReader` cache. On the other
    hand, queries are about selecting the transmitted data already found in the `DataReader`
    cache.


    DDS applications can poll `DataReaders` periodically to check if samples have
    been published. In most cases, this approach will waste CPU time and reduce battery
    life in the case of constrained devices. DDS offers two alternatives to polling
    for checking data availability: *listeners* and *waitsets*. You can register listeners
    against `DataReaders` to be notified of data availability or violations of some
    QoS policies. As for waitsets, they provide a more generic mechanism to execute
    logic when specific conditions are met. They make it possible to bind callback
    functions or methods to various events.'
