    \ projects were contributed to LF Edge by Zededa: a California startup focused\
    \ on edge computing solutions. The code base is available on GitHub under the\
    \ Apache License version 2.\n\nThe official web resources for EVE are as follows:\n\
    \n*   **Website:** [`www.lfedge.org/projects/eve/`](http://www.lfedge.org/projects/eve/)\n\
