    such as industrial automation and autonomous vehicles.


    ## Open Source: The Best Approach


    Enterprise IoT projects must leverage production-grade, commercial-quality hardware
    and software components, given the requirements involved. Some could see this
    as an obstacle to the adoption of an open source approach. However, nothing could
    be further from the truth. At its core, open source is the freedom to access,
    modify, and redistribute source code.^([³](#fn3)) If you need to maintain a solution
    over years and decades, then the possibility to access the source code is valuable.
    Wish to integrate components from various vendors? Much more straightforward with
    the source. Need to tweak a solution''s stack for a particular type of application?
    The source enables you to do so freely. Open source is truly the best approach
    for IoT.


    Above everything else, open source is a business model `–` and a successful one
    at that. Over time, any innovation becomes a commodity; the value line is slowly
    but relentlessly moving up. The consequence is that organizations of all kinds
    can reduce risk and preserve their capacity to innovate by collaborating and pooling
    resources to build standard open source components . Such components provide them
    the proper foundation to bring to market differentiated commercial solutions.
    In other words, leveraging open source building blocks is a powerful way for organizations
    to focus their limited resources on competitive endeavors. Open collaboration
    creates the conditions for successful competition.'
  trans: '

    ## 物联网项目的独特之处


    大多数（即便不是全部）物联网项目都会与基于云的组件和平台交互。然而，在云或企业数据中心的边界之外，盲目地使用标准的 *DevOps* 方法部署云原生应用注定会失败。这是为什么呢？部署物联网设备和边缘基础设施的边缘环境，在宏观层面上与云环境截然不同。


    云是同质的、集中式的，并且大规模运行；资源可按需获取。另一方面，边缘是分布式的、异构的，并且小规模运行；资源可用性有限。换句话说，边缘与云截然相反，这使得物联网项目大相径庭。


    物联网项目与其他典型 IT 项目的不同之处还体现在其他方面：


    **物联网项目的时间跨度长达数年甚至数十年。** 更换一栋数字建筑中的所有传感器将是一项昂贵且耗时的工作。从工厂车间拆除机器设备的频率则更低。


    **物联网项目涉及异构的硬件和软件组件。** 物联网领域不存在“一站式商店”。当然，许多集成商服务于市场，但与他们合作是封装异构性，而非消除它。


    **物联网组件面临独特的限制。** 物联网和边缘计算几乎总是涉及加固型硬件。当在数据中心之外部署计算、存储和网络资源时，它们会面临温度波动、湿度、灰尘以及许多其他危险。此外，许多设备需要部分或完全依靠电池供电运行。这在许多细微的方面影响着软件层面。例如，振动可能会影响传感器读数，物联网设备需要考虑到这一点。


    **连接性是前提；稳定性和可靠性则不是。** 物联网中的“I”代表“Internet”（互联网）。虽然并非所有物联网解决方案都通过公共互联网运行，但它们都利用了各种连接技术。物联网开发者需要假设网络的性能和可靠性会毫无征兆地变化，这对解决方案设计有着深远的影响。


    ## 企业级物联网有何不同？


    企业级物联网与爱好者级物联网之间的差距，与物联网项目和其他 IT 项目之间的差距一样大，甚至更大。


    大量价格实惠的硬件和传感器意味着任何人都可以在家尝试物联网，尤其是因为所需的许多软件构建模块都是开源的。Arduino 和 Raspberry Pi 因其成本和丰富的连接性而成为理想的实验平台。甚至可以说，这些设备已经取代了昔日的
    Commodore 64 和 TRS-80 彩色电脑，成为通往 IT 职业生涯的门户。然而，企业级物联网项目有其特定要求。其中一些要求源于企业级物联网通常涉及关键任务和实时应用。


    *   **可靠性：** 所使用的传感器和微控制器需要长期面对恶劣的物理环境。设备本身可能相对便宜，但维修或更换它们所涉及的人工成本可能很高，尤其是在偏远地区。此外，某些应用可能容忍一定程度的数据丢失，但许多应用则不能。


    *   **可持续性：** 硬件组件的可用性和软件组件的可支持性必须与解决方案的时间跨度兼容。


    *   **安全性：** 安全性对消费者和组织来说都是一个日益增长的担忧。企业级物联网项目的规模意味着安全漏洞会产生更严重的后果。在工业自动化和自动驾驶汽车等应用中，它们甚至可能危及生命。


    ## 开源：最佳方法


    考虑到所涉及的要求，企业级物联网项目必须利用生产级、商业品质的硬件和软件组件。有些人可能认为这是采用开源方法的障碍。然而，事实远非如此。其核心是，开源意味着自由地访问、修改和重新分发源代码。^(³)
    如果你需要维护一个解决方案长达数年甚至数十年，那么能够访问源代码就非常有价值。希望集成来自不同供应商的组件？有了源代码就简单得多。需要针对特定类型的应用调整解决方案的堆栈？源代码让你可以自由地这样做。开源确实是物联网的最佳方法。


    最重要的是，开源是一种商业模式 `–` 而且是一种成功的模式。随着时间的推移，任何创新都会变成商品；价值线缓慢但坚定地向上移动。其结果是，各类组织可以通过协作和汇集资源来构建标准的开源组件，从而降低风险并保持创新能力。这些组件为他们提供了将差异化商业解决方案推向市场的坚实基础。换句话说，利用开源构建模块是组织将有限资源集中于竞争性工作的有力方式。开放协作创造了成功竞争的条件。

    '
- fmt: '# About This Book


    This book aims to teach you how to build Enterprise IoT solutions using open source
    components. Specifically, it centers on the many libraries and platforms found
    at the [Eclipse Foundation](https://eclipse.org) under the banner of its [Eclipse
    IoT](https://iot.eclipse.org), [Edge Native](https://edgenative.eclipse.org),
    and [Sparkplug](https://sparkplug.eclipse.org) working groups. Eclipse IoT, which
    celebrated its tenth anniversary in 2021, is the industry''s largest and most
    successful IoT open source community. Relevant non-Eclipse open source projects
    are discussed as well.


    Although the book discusses hardware matters, its focus is on software and related
    open standards. If you are an IoT hobbyist, you will learn to apply your skills
    in an enterprise context. If you are new to IoT, you will learn about the pros
    and cons of many established technologies. Both types of readers will understand
    how to work with the Eclipse open source implementations of the most widespread
    IoT technologies.


    Throughout the book, the concepts will be illustrated through examples of real-world
    deployments. The examples provided cover a variety of use cases, such as industrial
    automation, smart agriculture, digital buildings, connected vehicles, and others.


    This book contains three main parts:


    - **Fundamentals and Protocols:** This part presents the reference architecture
    used throughout the book as well as the technologies common to constrained devices,
    edge devices, and IoT platforms.

    - **Constrained Devices:** This part discusses picking the hardware and software
    components you will deploy in the field.

    - **Edge Computing and IoT Platforms:** This part explains edge computing itself
    and why you should rely on it. It also covers edge workload orchestration and
    gateways, before introducing several IoT Cloud platforms based on microservices
    that expose a well-defined, stable API. Those platforms are not tied to a specific
    Cloud provider and are suited to private, hybrid, or public Cloud environments.


    Most chapters contain code samples or step-by-step instructions to get you started
    with the components and platforms discussed. I sincerely hope you will find them
    helpful.


    And now, let''s get started!


    ## Acknowledgments


    A tender thank you to Roxanne, my wife. She knew how much of my time this project
    would require and yet supported me from beginning to end. You truly are the Kaguya
    to my Miyuki.


    Thank you to everyone at the Eclipse Foundation who supported this book. I am
    grateful for the encouragement provided by Mike Milinkovich, our executive director,
    and Paul Buck, our VP of ecosystem development and my manager.


    Special thanks to Hassan Jaber, my partner in the Eclipse Foundation’s marketing
    team. He was crazy enough to ask his wife to read an early draft of the introduction,
    and their enthusiastic feedback gave me a much-needed confidence boost.


    A round of applause for the technical reviewers who provided feedback on one or
    several chapters of this book. Some of them even interrupted their vacations to
    perform their review. Talk about dedication!


    Thank you to Jill Balzano and Jonathan Gennick from Apress. Jonathan pitched me
    the idea of writing this book, and I will forever be grateful for the opportunity.


    Finally, how could I forget to mention my dear Ashitaka here? This project is
    probably the last large one for my trusty Lenovo ThinkStation S30 from 2012.


    ## About the Author


    ## About the Technical Reviewers


    ## Footnotes


    [1](#524096_1_En_BookFrontmatter_OnlinePDF.xhtml#Fn1_source) [2](#524096_1_En_BookFrontmatter_OnlinePDF.xhtml#Fn2_source)
    [3](#524096_1_En_BookFrontmatter_OnlinePDF.xhtml#Fn3_source)


    # Part 1: Fundamentals and Protocols


    # 1. What Is IoT?


    > *Un tas de pierres cesse d''être un tas de pierres dès lors qu''un seul homme
    le contemple avec, en lui, l''image d''une cathédrale.*

    >

    > *A rock pile ceases to be a rock pile the moment a single man contemplates it,
    bearing within him the image of a cathedral.*

    >

    > —Antoine de Saint-Exupéry, *Pilote de Guerre (Flight to Arras)*


    IoT is the culmination of a centuries-long evolution. The origins of innovations
    like the wheel and simple machines are today forgotten, lost in the mists of prehistory.
    Humans have harnessed the power of water and wind early. Historians trace the
    origins of the waterwheel back to ancient Greece, over 3000 years ago; as for
    the windmill, they started appearing as we know them today around the 8th and
    9th centuries in the Middle East and Western Asia. In 1712, Thomas Newcomen developed
    the first commercially successful steam engine. The 18th century was thus the
    century of mechanization. The 19th and 20th centuries saw two fundamental technology
    transitions: electrification and computerization. By the 1980s, computers started
    to take over both factories and offices.


    Although we can trace its roots back to the 1960s, the Internet took flight in
    the early 1990s. It gradually transformed from a document-based platform into
    a dynamic application platform. However, the advent of affordable wireless data
    connectivity at the same time – mobile broadband Internet access appeared with
    the second generation (2G) of mobile connectivity in 1991 – was the decisive advance
    that made the IoT possible. 2G, along with Wi-Fi networks and Bluetooth, was a
    game changer. And while the term "Internet of Things" was coined by Kevin Ashton
    in 1999,^([⁴](#fn4)) many are still unsure about its meaning. My goal is to change
    that.


    To achieve this goal, I will first explain what IoT is and how it is different
    from other current technology trends. Second, I will define edge computing and
    how IoT can leverage it. I will then introduce an IoT reference architecture that
    spans constrained devices, edge nodes, and IoT platforms. Finally, I will discuss
    IoT protocols, which play a horizontal role in the architecture and bring the
    other components together.'
