  trans: "\n### Eclipse VOLTTRON\n\nEclipse VOLTTRON 是一个用于分布式感知和控制的**开源平台**。它提供从设备和建筑中收集和存储数据的服务，以及一个用于开发与这些数据交互的应用程序的环境。VOLTTRON\
    \ 由太平洋西北国家实验室（PNNL）的一个团队创建，并于 2019 年贡献给 Eclipse 基金会。它采用 Apache 许可证 2.0 版本进行授权。\n\
    \nVOLTTRON 的官方网络资源如下：\n\n*   **网站：** [`https://volttron.org`](https://volttron.org)\n\
    \n*   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.volttron`](https://projects.eclipse.org/projects/iot.volttron)\n\
    \n*   **代码仓库：** [`https://github.com/eclipse-volttron`](https://github.com/eclipse-volttron)\n\
    \nVOLTTRON 使用 Python 编写，并面向 Linux 操作系统。该平台由几个不同的组件构成。以下是主要组件的列表：\n\n*   **代理：**\
    \ 代表用户执行任务的软件组件。常见的用例包括数据收集、设备控制和平台管理。\n\n*   **消息总线：** 系统的骨干。它允许代理发布其结果和消息，并订阅数据源。您可以配置\
    \ VOLTTRON 使用 ZeroMQ 或 RabbitMQ 来提供消息总线。\n\n*   **驱动框架：** VOLTTRON 代理与设备之间的接口。该平台自带丰富的驱动程序集，您也可以开发自己的驱动程序。\n\
    \n*   **历史记录框架：** 代理可以利用的 API，用于自动从消息总线上定义的特定主题子集收集数据，并将其持久化到历史记录数据库中。项目团队目前维护着针对\
    \ SQL 数据库、MongoDB 和 CrateDB 等的历史记录器。您当然也可以构建自己的历史记录器。\n\n*   **用户界面：** 用于从一个中心实例管理分布式实例的\
    \ Web 图形化管理界面。\n\n图 12-4 展示了 VOLTTRON 用户界面的概览。\n\n![](img/524096_1_En_12_Fig4_HTML.jpg)\n\
    \n一张屏幕截图显示了 VOLTTRON Central BETA 的界面，包含平台、方法、BACnet 代理、地址、描述、设备 ID、供应商 ID、供应商、类型、Volttron\
    \ 点名称、可写性以及已安装设备的单位。\n\n图 12-4\n\nVOLTTRON 管理用户界面（来源：Eclipse 基金会）\n\nVOLTTRON\
    \ 是一个支持开发分布式物联网应用的平台和框架的绝佳范例。您可以使用它来构建自己特定任务的代理，以覆盖众多用例。PNNL 及其合作伙伴已成功使用它来构建针对数字建筑的能源管理解决方案。\n\
    \n脚注 1   2   3\n\n# 13. 集成与数据\n\n> *Il ne faut pas uniquement intégrer. Il faut\
    \ aussi désintégrer. C'est ça la vie. C'est ça la philosophie. C'est ça la science.\
    \ C'est ça le progrès, la civilisation.*\n\n> *仅仅整合是不够的，还必须解构。这就是生活。这就是哲学。这就是科学。这就是进步，是文明。*\n\
    > \n> ——尤金·尤内斯库，《课程》\n\n物联网和边缘计算基础设施可能部署在企业数据中心或云之外，但它是组织的关键组成部分。高管和流程负责人需要来自受限设备的数据来做出明智的决策。他们需要通过执行器在现场执行这些决策。边缘节点在其中扮演着至关重要的角色，因为它们有助于提供实现实时、关键任务应用部署所需的延迟、弹性和数据主权。然而，这还不足以使您的物联网应用成为*企业级*物联网应用。\n\
    \n在大多数工业化国家，组织的逐步计算机化始于 20 世纪 60 年代。尽管工业和业务流程都受到了影响，但它们以不同的方式演变。业务流程成为信息技术（IT）的领域。IT\
    \ 专注于通过标准化数据格式表达的数据建模和数据对象；它早期采用了发布/订阅等模式，并利用了集成网络。另一方面，工业流程属于运营技术（OT）。OT 专注于与流程直接耦合的应用，导致产生特定于市场的协议和数据格式，这些通常是专有的。OT\
    \ 通常在独立于 IT 网络的隔离网络上运行。\n\nIT 和 OT 的不同演变导致它们之间长期存在差距。企业物联网必须弥合这一差距，以提供集成的设备连接、管理和数据集成。本章将探讨提供这些能力的\
    \ Eclipse 基金会开源项目。\n\n## 设备连接\n\n典型的业务应用不理解物联网协议。即使是像 Jakarta EE 这样面向企业的运行时，也不原生支持\
    \ MQTT 或 CoAP 等协议。那么，您如何将受限设备和边缘节点连接到业务应用呢？这就需要引入物联网设备连接平台。\n\n设备连接平台的核心功能是提供一个简单统一的\
    \ API，业务应用可以独立于设备实际使用的物联网协议来使用它。因此，此类平台将支持本书讨论的大部分（如果不是全部）物联网协议，以扩大其吸引力。通常，它们将使设备能够传输传感器读数或其他数据。业务应用也可以使用它们来调用设备上的操作。\n\
    \n在 Eclipse 物联网生态系统中，有两个项目可以充当设备连接平台的角色：Eclipse Hono 和 Eclipse Kapua。由于 Kapua\
    \ 的功能集扩展到了设备管理，因此我目前将重点介绍 Hono。\n"
- fmt: '### Eclipse Hono


    `Eclipse Hono` is a pure device connectivity platform capable of supporting millions
    of devices simultaneously. The project was contributed to the `Eclipse Foundation`
    in 2016 by `Bosch.IO`, a Bosch subsidiary focused on IoT technologies. `Hono`
    is available under the `Eclipse Public License version 2.0`. The platform is written
    in Java and requires `Java 17` or newer to compile and run.


    The official web resources for `Hono` are as follows:


    - **Website:** [`https://eclipse.org/hono`](https://eclipse.org/hono)

    - **Eclipse project page:** [`https://projects.eclipse.org/project/iot.hono`](https://projects.eclipse.org/project/iot.hono)

    - **Repository:** [`https://github.com/eclipse/hono`](https://github.com/eclipse/hono)


    `Hono`’s architecture is based on microservices. The platform defines a special
    type of microservice, called a *Protocol Adapter*, which maps a specific IoT protocol
    to `Hono`’s APIs. `Hono` ships with protocol adapters for `AMQP 1.0`, `CoAP`,
    `HTTP`, and `MQTT`. You can also implement your own. In `Hono` parlance, there
    are two types of APIs in the platform: *northbound* APIs expose `Hono` to business
    applications, while the protocol adapters use *southbound* APIs. In `Hono`, all
    interactions happen through messages exchanged through a central messaging system.
    Most messages stream from the devices to the business applications; those messages
    are called *downstream* messages. Conversely, messages sent by business applications
    to devices are called *upstream* messages.


    `Hono` defines three distinct messaging APIs:


    - **Telemetry:** Messages sent through the telemetry API are usually sensor readings.
    They are sent frequently.

    - **Event:** The event API is reserved for less frequent, more important messages.
    `Hono` can persist event messages and deliver them later if a business application
    is offline.

    - **Command and Control:** This API is used by northbound applications to send
    messages conveying commands upstream to devices. Optionally, devices can return
    a response. A `Command Router` component transmits messages to the protocol adapters
    to which the target devices are connected.


    `Hono` is inherently a multitenant platform. In other words, a single instance
    of the platform can manage devices belonging to multiple organizations simultaneously.
    Because of this, in addition to encrypted communications, `Hono` provides a cohesive
    security model where devices are authenticated and authorized through a device
    registry.


    `Hono`’s device registry exposes APIs to manage tenants, device registration,
    and credentials. By default, devices cannot connect to any protocol adapter. You
    must provision tenants and devices into the system before they can connect. In
    the case of devices, provisioning can be automated if authentication is performed
    through `X.509` client certificates or if the devices connect to `Hono` through
    a gateway. There are two distinct implementations of the registry, each using
    a different database engine for persistence. One uses the `MongoDB` NoSQL database.
    The other can use any database for which a `JDBC` driver is available, with `H2`
    and `PostgreSQL` being the options officially supported by the project team. Please
    note that for the time being, the `JDBC`-based registry does not support searching
    for devices.


    Since it is designed to support highly scalable Cloud services, `Hono` can enforce
    limits for resource consumption per tenant for each protocol adapter you deploy.
    You can define limits for the number of connections, the duration of connections,
    and the volume of data published over a defined time interval. It is also possible
    to define a maximum number of devices registered per tenant and a maximum number
    of credentials per device.


    Figure [13-1](#524096_1_En_13_Chapter.xhtml#Fig1) shows how `Hono`’s components
    fit in its architecture. For illustration purposes, the instance shown has the
    `HTTP` and `MQTT` protocol adapters running.


    ![](images/524096_1_En_13_Chapter/524096_1_En_13_Fig1_HTML.jpg)


    An `Eclipse Hono` architecture includes an `HTTP` adapter, `MQTT` adapter, device
    registry, authentication server, command router, messaging infrastructure, and
    a business application.


    **Figure 13-1** Eclipse Hono architecture (Credit: Eclipse Foundation)


    One important precision about `Hono` is that it can work with two different types
    of messaging infrastructure. The first option is `AMQP 1.0`, using [Apache Qpid
    Dispatch Router](https://qpid.apache.org/components/dispatch-router/index.html)
    and `Apache ActiveMQ Artemis`. The example deployment currently uses a single
    `Qpid Dispatch Router` instance connected to a single `Apache ActiveMQ Artemis`
    broker. The second one is [Apache Kafka](https://kafka.apache.org/). The example
    deployment currently leveraged [Bitnami’s Kafka Helm chart](https://bitnami.com/stack/kafka/helm)
    for installing a single-node `Apache Kafka` broker instance. Both setups are suitable
    for development purposes only. Scaling one of those options for production workloads
    is not something `Hono` can do for you.'
