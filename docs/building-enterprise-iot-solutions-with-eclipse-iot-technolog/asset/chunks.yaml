- fmt: '# Protocols: Foundational Building Blocks


    Developers coming to IoT and Edge from the Cloud world sometimes assume that `HTTP`
    and `REST`, those Swiss knives of the modern microservice builder, are all they
    need. This is, of course, a mistake. IoT and Edge devices operate in an environment
    where reducing battery drain and bandwidth usage is vital. Because of that, many
    solutions use `UDP` as their transport rather than `TCP` (although many IoT-specific
    protocols support both). There is also a greater variety of topologies and interaction
    models at the edge. Device meshes are frequent in IoT projects, and the same is
    true of publish/subscribe interactions. The consequence of this is that there
    are many IoT-specific protocols available. Some of them, such as `MQTT` and `OPC
    UA`, have even been around for over 20 years. Compared to the protocols traditionally
    used in industrial automation, such as `Modbus` and `Profinet`, modern IoT protocols
    are more secure and can be routed safely over the public Internet. Consequently,
    most Cloud IoT middleware supports them.


    Current IoT protocols leverage one of two main interaction models: request/response
    or publish/subscribe. In the request/response model, a client establishes a connection
    to a specific server, sends a request, and eventually gets a response – synchronous
    or not. `HTTP` is a typical example of the request/response model. In the publish/subscribe
    model, senders (publishers) are entirely decoupled from receivers (subscribers).
    Publishers send messages to a specific location, and subscribers will receive
    messages sent to that location if they register to get them. As a result, publishers
    are not aware if there are subscribers or not. `MQTT` is the most widely used
    implementation of the publish/subscribe model.


    At the time of writing, there were 11 IoT and edge protocol implementation projects
    at the Eclipse Foundation. Eight of them implement standards under the jurisdiction
    of external standards bodies. They are listed in Table [1-1](#524096_1_En_1_Chapter.xhtml#Tab1).


    **Table 1-1** Implementations of protocols under external jurisdiction


    | Protocol | Organization | Model | Eclipse Projects |

    | --- | --- | --- | --- |

    | Constrained Application Protocol (`CoAP`) | Internet Engineering Task Force
    (`IETF`) | Request/Response | [Eclipse Californium](https://www.eclipse.org/californium/)
    |

    | Data Distribution Service (`DDS`) | DDS Foundation (Object Management Group)
    | Publish/Subscribe | [Eclipse Cyclone DDS](https://projects.eclipse.org/projects/iot.cyclonedds)
    |

    | Lightweight M2M (`LwM2M`) | OMA SpecWorks | Request/Response | [Eclipse Leshan](https://www.eclipse.org/leshan/)[Eclipse
    Wakaama](https://www.eclipse.org/wakaama/) |

    | `OPC UA` | OPC Foundation | Request/ResponsePublish/Subscribe | [Eclipse Milo](https://projects.eclipse.org/projects/iot.milo)
    |

    | `MQTT` | OASIS Open | Publish/Subscribe | [Eclipse Amlen](https://www.eclipse.org/amlen/)[Eclipse
    Mosquitto](https://mosquitto.org/)[Eclipse Paho](https://www.eclipse.org/paho/)
    |


    In addition, there are three protocol implementations completely under the governance
    of the Eclipse Foundation. Those are detailed in Table [1-2](#524096_1_En_1_Chapter.xhtml#Tab2).


    **Table 1-2** Protocols under the governance of the Eclipse Foundation


    | Protocol | Model | Eclipse Projects |

    | --- | --- | --- |

    | Production Performance Management Protocol (`PPMP`) | Data format only | [Eclipse
    Unide](https://www.eclipse.org/unide/) |

    | `Sparkplug` | Publish/Subscribe | [Eclipse Sparkplug Specification](https://projects.eclipse.org/projects/iot.sparkplug)[Eclipse
    Tahu](https://projects.eclipse.org/projects/iot.tahu) |

    | `zenoh` | Publish/Subscribe | [Eclipse zenoh](https://zenoh.io/) |


    Of those three, only `Sparkplug` is managed under the [Eclipse Foundation Specification
    Process](https://www.eclipse.org/projects/efsp/) for the time being. This process,
    which complements the [Eclipse Development Process](https://www.eclipse.org/projects/dev_process),
    defines the open source rules of engagement, the organizational framework, and
    the workflow for specification projects at the Eclipse Foundation. Eclipse specification
    projects are working in the open in a transparent, vendor-neutral fashion. Anyone
    can propose changes to the specifications by opening an issue or submitting a
    pull request on the specifications’ public repository. Whether those proposals
    will be considered or not is up to the committers of the specification project.


    With so many options to choose from, picking the most suitable protocol for your
    solution could look like a daunting task. Here are a few questions to ask yourself
    to guide your choice:


    - **What am I trying to achieve?** If you are simply gathering sensor data, a
    publish/subscribe protocol is probably the best option. Request/response protocols
    are a better fit for commands – at least if you have real-time requirements.

    - **What are my constraints?** Some protocols are a better fit to optimize throughput;
    others help in reducing latency or power consumption. Do not blindly trust the
    assertions of others and test yourself!

    - **What is my ecosystem?** You could pick sensors, actuators, or other hardware
    and then use the protocols they support. Conversely, you could pick a protocol
    and then shop for suitable products. Either way, you will define the boundaries
    of your ecosystem.


    ## An Extensive IoT and Edge Toolkit


    Our tour of the reference architecture and the Eclipse Foundation’s IoT and Edge
    ecosystem ends here. As you can see, the toolkit at your disposal is quite extensive.
    Arnold Vogt, Lead IoT and Digital Transformation Analyst at Pierre Aucoin Consultants,
    wrote about it in a report: *“From our point of view, the Eclipse Foundation’s
    IoT Working Group is undoubtedly the leading open source IoT community. It’s no
    surprise to us that our two best-in-class vendors are part of that community.”*^([^(11)](#fn11))


    But you don’t have to take my word for it or even Arnold’s word for that matter.
    Figure [1-3](#524096_1_En_1_Chapter.xhtml#Fig3) shows our reference architecture
    with the logos of the projects discussed earlier.


    ![](images/524096_1_En_1_Chapter/524096_1_En_1_Fig3_HTML.jpg)


    An IoT reference architecture indicates the logos of constrained devices, edge,
    IoT platforms, protocols, connectivity, development tools, security, and hardware.


    **Figure 1-3** IoT reference architecture with project logos (Credit: Eclipse
    Foundation)


    Seeing is believing. Our IoT and Edge community built not just a rock pile but
    a cathedral of code.


    Footnotes [1](#524096_1_En_1_Chapter.xhtml#Fn1_source) [2](#524096_1_En_1_Chapter.xhtml#Fn2_source)
    [3](#524096_1_En_1_Chapter.xhtml#Fn3_source) [4](#524096_1_En_1_Chapter.xhtml#Fn4_source)
    [5](#524096_1_En_1_Chapter.xhtml#Fn5_source) [6](#524096_1_En_1_Chapter.xhtml#Fn6_source)
    [7](#524096_1_En_1_Chapter.xhtml#Fn7_source) [8](#524096_1_En_1_Chapter.xhtml#Fn8_source)'
