    ### 窄带


    低功耗广域网（LPWAN）是一种面向电池供电的受限设备和传感器的无线网络。其设计旨在优先考虑覆盖范围而非吞吐量，以优化设备的电池寿命。大多数 LPWAN 每个信道的数据速率在
    0.3 kbit/s 到 170 kbit/s 之间。你可以自行搭建 LPWAN，也可以使用第三方部署的服务和基础设施。后一种方法的优势在于，你无需在现场部署和维护网关。


    该市场存在多种相互竞争的标准。我重点关注了四种特定方案：DASH7、LoRaWAN、LTE-M 和 NB-IoT。目前市场上所有窄带方案都具备远距离、低功耗和高性价比的特点。LPWAN
    在乡村环境下的工作范围可达 10 公里（6 英里）以上；在人口密集的城市环境中，仍能达到数公里。在功耗方面，电池寿命超过十年也并非罕见。此外，LPWAN 依赖于能够控制基础设施成本的拓扑结构。它们还使用轻量级协议来降低硬件复杂性，从而减少设备成本。一些流行的方案依赖于专有技术，这往往会导致收发器成本更高。


    #### DASH7


    DASH7 联盟协议（D7A）是一种开源的无线窄带协议，工作在 433 MHz、868 MHz 和 915 MHz 的免许可频段。该协议由[DASH7 联盟](https://www.dash7-alliance.org/)管理，这是一个为促进
    DASH7 协议规范进一步发展而成立的非营利性互惠公司。你可以从 DASH7 网站免费下载该规范。^(⁴³) Eclipse 基金会很荣幸成为 DASH7
    联盟的成员。


    D7A 源自 ISO/IEC 18000-7 标准，该标准定义了在免许可的 433 MHz ISM 频段内用于有源射频识别（RFID）的接口。D7A 不再符合
    ISO/IEC 18000-7 标准。该协议规范可免费使用，无需任何专利或许可要求。D7A 的覆盖范围较短。在工业应用中，其最大距离约为 500 米（1640
    英尺），尽管设备制造商宣称在视距条件下读取范围可超过一公里（0.62 英里）。该协议提供典型的 1 秒延迟，同时平均功耗仅为 30 uA。根据所选无线电调制方式，有三种数据速率等级。DASH7
    低速率提供 9.6 kbit/s 的等效比特率，DASH7 正常速率达到 56 kbit/s，而 DASH7 高速率则达到 167 kbit/s。


    [GitHub 上的 Sub-IoT 项目](https://github.com/Sub-IoT/Sub-IoT-Stack)托管了 D7A 的一个开源实现。它采用
    Apache 许可证 2.0 版发布。


    #### LoRaWAN


    LoRaWAN 涉及两种不同的技术：LoRa 和 LoRaWAN。


    LoRa（源自“Long Range”）是一种专有的无线电调制技术。它由位于法国格勒诺布尔的 Cycleo 公司开发并获得专利，后来被 Semtech 收购。LoRa
    芯片组由 Semtech 独家提供。LoRa 使用以下免许可的亚千兆赫兹无线电频段：


    *   亚洲：AS923（915–928 MHz）

    *   欧洲：EU868（863–870/873 MHz）

    *   印度：IN865（865–867 MHz）

    *   北美：US915（902–928 MHz）

    *   南美：AU915/AS923-1（915–928 MHz）

    *   全球：2.4 GHz


    LoRa 可提供 0.3 kbit/s 至 27 kbit/s 的数据速率。在城市地区，有效范围可达 5 公里（3.1 英里），在更容易实现无障碍视距的乡村地区，有效范围可超过
    15 公里（9.3 英里）。


    另一方面，LoRaWAN 定义了软件通信协议和系统架构。它由成立于 2015 年的非营利组织 LoRa 联盟开发和维护。LoRaWAN 管理所有设备的频率、数据速率和功率。设备依赖于异常报告模式：它们在需要时异步传输数据。这些传输由现场部署的网关转发到中央服务器。LoRaWAN
    连接是双向的，并且该协议支持多播寻址组，以便更高效地向设备批量分发消息。这对于分发空中软件更新尤其有用。


    有多个开源的 LoRaWAN 软件栈可用。其中之一由[ChirpStack 项目](https://www.chirpstack.io/)提供，该项目包含网关桥接器、网络服务器和应用服务器等组件。所有组件均采用
    MIT 许可证发布。


    LoRaWAN 的远距离和广泛的行业支持使其成为大规模部署对数据速率要求不高的无线传感器的有吸引力的技术。智慧城市和智慧农业是两个很好的潜在用例。然而，无线电调制的专有性质是一个令人担忧的问题。


    #### LTE-M 和 NB-IoT


    LTE-M（或 LTE-MTC，代表“机器类型通信”）和 NB-IoT（窄带物联网）是 3GPP 为应对机器对机器和物联网用例而开发的两种 LPWAN 无线电技术标准。


    LTE-M 依赖于现有的 LTE 网络，但并非所有有 LTE 连接的地方都必然可用。与 LTE 调制解调器相比，LTE-M 型号成本更低，电池寿命可达数年。与
    LTE 网络相比，LTE-M 网络还提供更大的覆盖范围和更好的室内穿透能力。LTE-M 分为两类：Cat-M1 和 Cat-M2。Cat-M1 的上行和下行数据速率均为
    1 Mbit/s；而 Cat-M2 的下行数据速率为 4 Mbit/s，上行数据速率为 7 Mbit/s。延迟平均在 50 到 100 毫秒之间。由于依赖于蜂窝基站，LTE-M
    支持移动性用例，并支持 VoLTE 语音服务。


    与 LTE-M 类似，NB-IoT 使用 LTE 标准的一个子集，但将带宽限制在单个 200 kHz 的窄带上。该技术专注于实现高密度连接可能性的室内空间的经济高效覆盖。对于广泛的用例，可以支持超过十年的电池寿命。NB-IoT
    分为两类。Cat-NB1 是引入的第一个版本，其下行数据速率高达 26 kbit/s，上行数据速率高达 62 kbit/s。延迟范围为 1.6 到 10 秒。最新版本
    Cat-NB2 将下行数据速率提升至 127 kbit/s，上行数据速率提升至 150 kbit/s。NB-IoT 还支持无线资源控制（RRC）连接重建，允许设备将其连接从一个小区转移到另一个小区。这提高了该技术对移动性用例（如行人、自行车和车辆监控）的适用性。


    与 NB-IoT 相比，LTE-M 提供更好的数据速率和更低的延迟。因此，对于实时用例来说，它是更好的选择。其对语音通信的支持增强了其灵活性。此外，由于 LTE-M
    是 LTE 的扩展，它支持漫游，而 NB-IoT 不支持。对于任何涉及连接位于仓库、地下位置和商业建筑中的设备的用例，NB-IoT 是更优越的技术。如果你只需要以低数据速率传输传感器数据，它也是一个很好的选择。


    LTE-M 和 NB-IoT 都涉及 SIM 卡。然而，在特定位置有 LTE 或 5G 连接可用，并不能保证 LTE-M 和 NB-IoT 也可用。有些国家/地区只有其中一种方案可用，而另一种则没有。[GSM
    协会](https://www.gsma.com)（GSMA）网站提供了一个有用的地图，展示了全球范围内 LTE-M 和 NB-IoT 服务的商业可用性。你可以在此处找到它：[`www.gsma.com/iot/deployment-map/`](http://www.gsma.com/iot/deployment-map/)

    '
- fmt: '### Wi-Fi


    Wi-Fi is a group of wireless network protocols based on the IEEE 802.11 standards.
    It is designed to integrate seamlessly with Ethernet. The evolution of Wi-Fi is
    driven by the [Wi-Fi Alliance](https://www.wi-fi.org/), a nonprofit organization.
    At the time of writing, Wi-Fi had achieved remarkable market adoption, with over
    18 billion devices in use and 4.4 billion devices expected to ship in 2022.^([^(44)](#fn44))


    The first version of the 802.11 protocol was introduced in 1997. Since then, several
    successive versions of the standard have been introduced. Each specific version
    of the standard determines the radio bands used, the maximum ranges, and the maximum
    speeds that could be achieved. Wi-Fi most commonly uses the 2.4 GHz and 5 GHz
    radio bands; these bands are subdivided into several channels. Table [9-1](#524096_1_En_9_Chapter.xhtml#Tab1)
    summarizes the main features of each version of Wi-Fi.


    **Table 9-1** Versions of the Wi-Fi standard


    | Generation | IEEE Standard | Maximum Data Rate (Mbit/s) | Ratification | Frequency
    (GHz) |

    | --- | --- | --- | --- | --- |

    | Wi-Fi 0 | 802.11 | 2 | 1997 | 2.4 |

    | Wi-Fi 1 | 802.11b | 11 | 1999 | 2.4 |

    | Wi-Fi 2 | 802.11a | 54 | 1999 | 5 |

    | Wi-Fi 3 | 802.11g | 54 | 2003 | 2.4 |

    | Wi-Fi 4 | 802.11n | 600 | 2008 | 2.4 and 5 |

    | Wi-Fi 5 | 802.11ac | 6933 | 2014 | 5 |

    | Wi-Fi 6 | 802.11ax | 9608 | 2019 | 2.4 and 5 |

    | Wi-Fi 6E | 2020 | 2.4, 5, and 6 |

    | Wi-Fi 7 | 802.11be | 40000 | 2024 (expected) | 2.4, 5, and 6 |


    Please note that the Wi-Fi Alliance only started to use generational numbering
    in 2018. Older materials refer to the name of the relevant IEEE standard instead.
    Moreover, the Wi-Fi Alliance never referred publicly to generation numbers 0 to
    3; those generation numbers have been inferred from the fact that the Alliance
    refers to `802.11n` as Wi-Fi 4.


    The maximum operational range of a Wi-Fi deployment depends on several factors.
    These include the frequency band, the radio power output, the sensitivity of the
    receivers used, the modulation techniques, and the gain and type of antenna used.
    The data rate is usually lower at longer distances and with greater signal absorption
    from walls and other obstacles. Lower radio frequencies will result in better
    range but lower throughput. Building materials absorb 5 GHz signals to a greater
    degree than 2.4 GHz ones. However, higher frequencies offer a greater number of
    channels, helping to reduce interference in environments where multiple networks
    compete for the spectrum. It is possible to increase the range of a Wi-Fi network
    by deploying multiple access points or by using range extenders and signal amplifiers.
    Recent Wi-Fi generations enable the deployment of mesh networks, improving coverage
    inside buildings, for example.


    Many single-board computers and MCUs offer support for Wi-Fi. However, while it
    offers a greater effective range than Bluetooth, it also features much greater
    power consumption. To address this, the IEEE introduced the `802.11ah` standard,
    also called Wi-Fi HaLow by the Wi-Fi Alliance. `802.11ah` uses the sub-gigahertz
    ISM spectrum. The bands vary by region and are located between 755 and 928 MHz.
    The `802.11ah` standard defines several modulation schemes and coding rates; there
    is a wide array of possible data rates from 150 kbit/s to 86.7 Mbit/s. The typical
    range is over 1 km (0.6 miles), and the protocol integrates multiple features
    to preserve battery life.


    Wi-Fi is certainly a viable option for IoT and edge computing deployments, especially
    if your devices and sensors are not battery-powered. However, its limitations
    in range mean there are better options for outdoor deployment over large surface
    areas.


    ### Z-Wave


    Z-Wave is a wireless communications protocol used primarily in smart home deployments.
    It resembles Bluetooth BLE since it is essentially a mesh network using low-energy
    transmissions. The Z-Wave Alliance was established in 2005 to manage the evolution
    of the standard. However, Z-Wave transceiver chips are available exclusively from
    Silicon Labs, the current owner of the technology, and its licensees.


    Z-Wave is designed to transmit small data packets with low latency at data rates
    up to 100 kbit/s. The maximum distance between two nodes on the network is between
    30 and 40 meters (98 to 131 feet). Packets can hop from one node to another up
    to four times, increasing the potential coverage area. Z-Wave uses frequency-shift
    keying (FSK) modulation with a Manchester encoding. Like DASH7 and `802.11ah`,
    it uses the ISM band. Z-Wave transmits at 868.42 MHz in Europe and 908.42 MHz
    in North America; it uses other frequencies elsewhere as defined by local regulations.


    At a minimum, a Z-Wave network must contain a primary controller and at least
    one device. Controllers typically take the form of wall switches and handheld
    controllers, although software applications can also play that role. Networks
    can contain up to 232 devices, and it is possible to bridge several networks together.
    Devices need to be paired (or added) to the network before they can be controlled
    through the protocol. Given the power-saving features defined in the standard,
    the expected battery life for most devices is several years.


    Z-Wave offers a security layer that delivers message integrity and confidentiality.
    It also implements mechanisms to ensure data freshness, meaning that the infrastructure
    will only process messages sent recently. Z-Wave relies on an AES symmetric block
    cipher algorithm with a 128-bit key length. In the past, manufacturers could produce
    unsecured devices. Even today, Z-Wave networks can include secure and unsecured
    nodes for backward compatibility. However, security is now mandatory, so you can
    alleviate concerns by leveraging recent devices exclusively.


    Z-Wave is an interesting choice for home automation or even smart building projects.
    Given its frequency band, it offers a greater range than Bluetooth and suffers
    from less interference than some alternatives. However, the proprietary control
    over some aspects of the technology is concerning.'
