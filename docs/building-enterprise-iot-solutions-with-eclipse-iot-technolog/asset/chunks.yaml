  trans: '

    ### Python


    Python 既是一种编程语言，也是一个运行时。它是 Guido van Rossum 的智慧结晶，他于 20 世纪 80 年代末开始开发 Python，并于
    1991 年发布了第一个版本。Python 由成立于 2001 年的 [Python 软件基金会](https://www.python.org/psf/)
    管理。


    与 Java 和 .NET 类似，Python 被编译为字节码。运行时的参考实现 [CPython](https://github.com/python/cpython)
    在其虚拟机上执行该字节码。Python 存在多个可投入生产环境的替代运行时：[Jython](https://www.jython.org/)，用 Java
    编写，运行于 Java 虚拟机（JVM）上；[PyPy](https://pypy.org/)，用 RPython 编写并翻译为 C 语言；以及 [IronPython](https://ironpython.net/)，用
    C# 编写。这些替代运行时支持其所模拟的 Python 版本的语法和特性，但可能会缺少某些特性或在行为上存在差异。此外，[MicroPython](https://micropython.org/)
    和 [CircuitPython](https://circuitpython.org/) 变体拥有针对微控制器运行而优化的运行时。但请注意，这些替代运行时不一定实现了
    CPython 中的所有语言特性；这会影响生态系统中库与特定运行时的兼容性。


    这种多样化的运行时意味着 Python 是业界最广泛可用的语言之一。例如，CPython 不仅支持 Linux、macOS 和 Windows，还支持一些不太常见的操作系统，如
    AIX、FreeBSD、Solaris 和 z/OS。针对资源受限环境的运行时变体进一步扩展了 Python 的适用范围，甚至提供了对硬件的底层访问。然而，Python
    通常被认为不适合计算密集型应用。当然，这取决于实际选择的运行时及其配置方式。


    Python 提供了全面的标准库和庞大的第三方包生态系统。它是数据科学领域的*事实*标准，并且本书中提到的所有物联网协议都有维护良好的实现。Eclipse
    Paho 的 Python 版本甚至位列下载量最高的前 1% 的包中。因此，作为物联网应用的运行时，Python 非常值得你关注。然而，Python 包索引（PyPI）与
    Node.js 生态系统中的 NPM 存在相同的问题：来源可疑或缺乏维护的包比比皆是，许可或其他知识产权问题也频繁出现。2022 年 7 月，Python
    软件基金会宣布，被认定为关键包的维护者需要使用双因素认证（2FA）来防止其代码被恶意行为者劫持。^(⁶³)


    ### Rust


    Rust 是本节中最新出现的语言之一，是一种编译型编程语言。它始于 2006 年，是 Mozilla 员工 Graydon Hoare 的个人项目。编译器的第一个编号版本于
    2012 年发布。Rust 专注于类型安全和并发。Rust 提供内存安全；所有引用在运行时都指向有效的内存。这一点在编译时得到强制执行。Rust 由成立于
    2021 年的 Rust 基金会拥有和维护。


    与本节中提到的其他语言相反，Rust 不提供传统意义上的运行时。Rust 全面的标准库的某些部分提供了通常与运行时相关的特性，例如堆、回溯、展开和栈保护。标准库（或用
    Rust 的说法，crate）假设应用程序将部署在桌面级或服务器级的操作系统上，例如 Linux。此外，Rust 标准库还会链接到 C 标准库。对于部署在裸机微控制器上的应用程序，也可以选择不使用标准
    crate，而是链接到核心 crate。核心 crate 是标准 crate 的一个平台无关的子集，它不对程序将要运行的系统做任何假设。因此，仅依赖核心 crate
    的 Rust 程序可以成为引导加载程序、固件或操作系统内核等底层组件。


    Rust 被纳入本节是因为它在物联网和边缘计算领域日益流行。诸如 [Drogue IoT](https://www.drogue.io/) 等项目展示了 Rust
    在编写面向受限设备、边缘或云的应用方面的适用性。在 Rust 中，代码包被称为 *crates*。由于 Python 和 JavaScript 存在的时间长得多，它们各自的库生态系统远超
    Rust。然而，大多数物联网协议都有维护良好的实现。需要提醒的是，Eclipse 基金会自己的 [zenoh 协议](https://zenoh.io/)
    的核心实现就是用 Rust 编写的。


    ### WebAssembly


    WebAssembly（Wasm）与我讨论的其他运行时不同，因为它不绑定于任何特定的编程语言。其网站将其描述为“*一种基于栈的虚拟机的二进制指令格式*”。它于
    2015 年宣布，2017 年首次发布。WebAssembly 于 2019 年成为[万维网联盟推荐标准](https://www.w3.org/TR/2019/REC-wasm-core-1-20191205/)^(⁶⁴)。规范
    2.0 版本的第一个公开工作草案于 2022 年 4 月发布。


    最初，WebAssembly 被设计为一个内存安全、沙盒化的执行环境，能够在 Web 浏览器内提供接近原生的代码执行速度。然而，其使用虚拟机所带来的可移植性使其在其他用途上也颇具吸引力。现在市场上已有许多通用运行时实现，使你能够在边缘或云端部署
    WebAssembly 代码。


    WebAssembly 实现依赖于提前编译（AOT）或即时编译（JIT）。然而，有些实现则利用了解释器。在撰写本文时，大约有 40 种编程语言支持将 WebAssembly
    作为编译目标。较为知名的选项包括 C/C++、C#、F#、Go、Kotlin、Rust 和 Swift。无论使用何种原始语言，WebAssembly 代码都可以通过一种由属性文法定义的[文本格式](https://webassembly.github.io/spec/core/text/conventions.html)进行美化打印。^(⁶⁵)


    由于它纯粹是一个运行时，支持你首选物联网协议的库的可用性将取决于你选择的编程语言。鉴于开发人员对在浏览器之外部署 WebAssembly 代码的兴趣日益增长，针对边缘和云环境的编排平台生态系统正在蓬勃发展。然而，在这一点上，没有一个平台能达到虚拟机或容器编排领域领先平台的成熟度。尽管如此，如果你想构建可移植、高性能的应用程序，WebAssembly
    仍然是一个强有力的竞争者。我强烈建议你尝试几个开源的运行时实现，以找到适合你需求的那一个。


    ### 如何选择你的运行时


    我讨论的所有选项都是构建边缘和物联网云应用的不错选择，它们都拥有强大的开源库生态系统。选择其中任何一个都不会出错。最终，你应该选择你熟悉且能让你高效工作的编程语言。当然，具备所需技能的开发人员的可用性也是一个考虑因素。从长远来看，如果可能的话，你应该认真考虑
    Rust 和 WebAssembly。前者的内存安全特性使其比替代方案更安全，而后者则提供了应用程序的可移植性。无论你选择哪个选项，只需确保你依赖的依赖项来源可靠，并且至少能及时收到安全更新。关注知识产权和许可问题也会带来长期回报。

