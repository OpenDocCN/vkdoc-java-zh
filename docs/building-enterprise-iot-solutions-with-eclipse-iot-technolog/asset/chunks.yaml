    ## Broker: Eclipse Mosquitto


    理论部分已经足够；现在该通过实践来运用我们对 MQTT 的知识了。我们将使用 [Eclipse Mosquitto](https://mosquitto.org/man/mosquitto-conf-5.html)
    进行实验，这是一个轻量级的 Broker，体积小巧，足以在单板计算机上运行。Mosquitto 使用 C 语言编写，因此具有高度的可移植性。Mosquitto
    在 Eclipse 分发许可证 v1.0 和 Eclipse 公共许可证 v2.0 下提供。


    Mosquitto 的官方网络资源如下：


    *   **网站：** [`https://mosquitto.org`](https://mosquitto.org)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.mosquitto`](https://projects.eclipse.org/projects/iot.mosquitto)


    *   **代码仓库：** [`https://github.com/eclipse/mosquitto`](https://github.com/eclipse/mosquitto)


    在撰写本文时，Mosquitto 的最新版本是 2.0.14，于 2021 年 11 月 17 日发布。


    注意


    Eclipse IoT 家族中还有另一个 MQTT Broker：[Eclipse Amlen](https://www.eclipse.org/amlen/)。IBM
    贡献了其 IBM Watson IoT Platform Message Gateway 的源代码来启动该项目。Amlen 除了支持 JMS 和自定义协议外，还支持
    MQTT v3.1.1 和 v5.0。它的体积比 Mosquitto 大，但可以配置为集群和高可用性。


    ### 安装


    Mosquitto 可用于 Microsoft Windows、macOS 以及大多数 Linux 发行版。当然，也可以从源代码编译。


    如果你运行 Windows，可以从 Mosquitto 网站[下载安装程序](https://mosquitto.org/download/)。提供 32
    位和 64 位版本，它们可以在 Windows Vista 及更高版本上运行。


    如果你使用的是 macOS，可以通过 [Homebrew](https://brew.sh/) 安装 Mosquitto。如果已经安装了 Homebrew，你只需打开一个终端窗口并执行以下命令：


    ```

    brew install mosquitto

    ```


    在 Linux 上安装 Mosquitto 有多种方法；其中一些方法可能在你选择的发行版上不可用。如果你运行的是 Debian 或其衍生版，如 Ubuntu、Raspbian
    或 Raspberry Pi OS，Mosquitto 是官方仓库的一部分。你可以使用以下命令安装它：


    ```

    sudo apt install mosquitto

    ```


    如果你想更快地获取最新版本，Mosquitto 团队维护了一个 [Debian 仓库](https://mosquitto.org/2013/01/mosquitto-debian-repository)，你可以将其添加到你的源列表中。


    Mosquitto 也可以在 Fedora 仓库中找到。如果你使用的是 Workstation 或 Server 版本，以下命令可以完成安装：


    ```

    sudo dnf install mosquitto

    ```


    另一方面，Fedora IoT 不依赖 `dnf`。软件包通过 `rpm-ostree` 管理：


    ```

    sudo rpm-ostree install mosquitto

    ```


    如果你的发行版支持 snap 打包格式，你也可以通过这种方式安装：


    ```

    snap install mosquitto

    ```


    ### 配置


    Mosquitto 开箱即用。如果没有提供配置文件，Broker 将以仅本地模式启动。这意味着部署在非你本机上的客户端将无法访问它。此行为背后的意图是强制你在生产环境中使用
    Mosquitto 之前构建一个合适的配置。


    安装后启动 Broker，打开命令提示符，并执行以下命令：


    ```

    mosquitto

    ```


    如果一切设置正确，你应该会看到类似如下的输出：


    ```

    1640704397: mosquitto version 2.0.14 starting

    1640704397: Using default config.

    1640704397: Starting in local only mode. Connections will only be possible from
    clients running on this machine.

    1640704397: Create a configuration file which defines a listener to allow remote
    access.

    1640704397: For more details see https://mosquitto.org/documentation/authentication-methods/

    1640704397: Opening ipv4 listen socket on port 1883.

    1640704397: Opening ipv6 listen socket on port 1883.

    1640704397: mosquitto version 2.0.14 running

    ```


    到目前为止，一切顺利。现在我将通过订阅 Mosquitto 暴露的系统指标主题来执行一次健全性检查。为此，我将使用 Mosquitto 团队开发的 [mosquitto_​sub](https://mosquitto.org/man/mosquitto_sub-1.html)
    简单客户端。该团队还构建了 [mosquitto_​pub](https://mosquitto.org/man/mosquitto_pub-1.html)，你可以用它向
    MQTT v3 和 v5 Broker 发布消息。这两个工具都支持 TLS 通信，并利用了大多数 MQTT 特性，如 QoS 和保留消息。在 Debian
    及其衍生版上，`mosquitto_pub` 和 `mosquitto_sub` 不属于核心 mosquitto 软件包，而是位于 `mosquitto_clients`
    软件包中。


    在你安装了 mosquitto 的机器上打开第二个命令提示符，并执行以下命令：


    ```

    mosquitto_sub -h localhost -p 1883 -t \$SYS/# -C 20 -v

    ```


    `-C` 开关限制了命令退出前接收的消息数量，`-v` 则在消息负载之前打印主题。输出应该如下所示：


    ```

    $SYS/broker/version mosquitto version 2.0.14

    $SYS/broker/uptime 22 seconds

    $SYS/broker/clients/total 0

    $SYS/broker/clients/inactive 0

    $SYS/broker/clients/disconnected 0

    ...

    ```


    如果你回到启动 Mosquitto 的命令提示符，你会发现日志中反映了你刚刚建立的连接的行：


    ```

    1640704494: New connection from 127.0.0.1:39616 on port 1883.

    1640704494: New client connected from 127.0.0.1:39616 as auto-56DAB577-D439-8D76-09BA-C3094A714D74
    (p2, c1, k60).

    ```


    该工具会自动生成客户端 ID。我本可以使用 `-i` 开关指定一个。


    到目前为止，我只是使用了 Mosquitto 的默认配置。为了使 Broker 在我的本地网络上可访问，我需要创建一个配置文件并将其传递给 Mosquitto
    进程。配置文件的格式在 Mosquitto 网站上有[详细文档](https://mosquitto.org/man/mosquitto-conf-5.html)。需要记住的一点是，以“`#`”开头的行被视为注释。


    以下是一个基本配置，它将使端口 1883 和 8883 在所有网络接口上可访问。你可能在想 `cafile`、`keyfile` 和 `certfile`
    引用的文件来自哪里。我将在下一节中解释如何创建这些文件。


    ```

    # Standard MQTT traffic on port 1883, all interfaces

    listener 1883

    protocol mqtt

    # MQTT over TLS traffic on port 8883, all interfaces

    listener 8883

    protocol mqtt

    require_certificate true

    cafile /etc/mosquitto/ca_certificates/mosquitto_ca.crt

    keyfile /etc/mosquitto/certs/mosquitto_server_nopass.key

    certfile /etc/mosquitto/certs/mosquitto_server.crt

    ```


    要使用此配置文件，请将内容复制到一个文件中（我选择了 `/etc/mosquitto/mosquitto.conf`），然后按如下方式启动 Mosquitto：


    ```

    mosquitto -c ./mosquitto.conf

    ```


    如果你希望允许对 Broker 进行匿名访问，可以在配置文件顶部添加以下行：


    ```

    allow_anonymous true

    ```

