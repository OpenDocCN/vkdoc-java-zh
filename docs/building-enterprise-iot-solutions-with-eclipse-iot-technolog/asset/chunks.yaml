  trans: "\n#### Ditto 入门指南\n\nDitto 所需的资源比本书介绍的其他平台略多一些。其微服务通过容器镜像交付，并可在多种引擎上运行，包括\
    \ Docker、Kubernetes 和 OpenShift。Podman 也是一个备选方案，因为它致力于与 Docker 兼容。Ditto 团队建议，至少分配\
    \ 2 个 CPU 核心和 4 GB 内存，以便在工作站上启动本地实例。如果使用 Kubernetes 发行版编排容器，则可能需要更多资源。或者，你也可以在实验中使用\
    \ Ditto 公共沙箱。该沙箱可通过 HTTP 和 WebSocket 在 `ditto.eclipseprojects.io` 访问。\n\nDitto\
    \ 团队在此处提供了安装说明：[`https://github.com/eclipse/ditto/blob/master/deployment/README.md`](https://github.com/eclipse/ditto/blob/master/deployment/README.md)。或者，你也可以在\
    \ Kubernetes 集群上部署 [Eclipse IoT 软件包](https://www.eclipse.org/packages/)项目中的 [Cloud2Edge\
    \ 软件包](https://www.eclipse.org/packages/packages/cloud2edge/)。Cloud2Edge 提供了预配置且集成的\
    \ Eclipse Ditto 和 Eclipse Hono 实例。我将在下一章介绍 Hono。目前，我将仅说明如何在 Linux 或 macOS 平台上使用\
    \ Docker 独立部署 Ditto。\n\n与 Docker 部署相关的文件位于 GitHub 仓库的 [`https://github.com/eclipse/ditto/tree/master/deployment/docker`](https://github.com/eclipse/ditto/tree/master/deployment/docker)\
    \ 路径下。将它们获取到工作站的最简单方法是克隆该仓库。完成后，打开命令行提示符，并进入 `deployment/docker` 子文件夹。\n\n第一步是在\
    \ Nginx 反向代理上配置安全设置。Ditto 团队提供的 `nginx.conf` 文件在 HTTP 和 WebSocket 端点上均设置了基本认证。你需要为\
    \ `ditto` 用户以及任何你想添加的账户分配密码。要创建此类密码，请运行以下命令：\n\n```\nopenssl passwd -quiet\nPassword:\
    \ \nVerifying - Password: \n```\n\n确认密码后，该命令将打印一个哈希值。你应该将该哈希值粘贴到 `nginx.httpasswd`\
    \ 文件中。以下是一个示例。你可以通过将新用户及其哈希值添加到该文件中来创建更多用户。\n\n```\nditto:ZKrYJB4LjwQMQ\n```\n\
    \n现在，你可以启动 Ditto 实例了。只需运行以下命令即可：\n\n```\ndocker-compose up -d\n```\n\n为确保一切正常运行，你可以使用以下命令：\n\
    \n```\ndocker-compose logs -f\n```\n\n#### 客户端 SDK 入门指南\n\n如前所述，Ditto 客户端 SDK\
    \ 适用于 Java、JavaScript、Go 和 Python。我将在此展示如何使用 Java 版本。\n\nDitto 团队在 Maven Central\
    \ 上发布了其 Java 客户端 SDK。要将其添加到你的项目中，你只需将以下依赖项添加到你的 `pom.xml` 文件中：\n\n```\norg.eclipse.ditto\n\
    ditto-client\n${ditto-client.version}\n\n```\n\nSDK 的新版本会与 Ditto 版本同步发布。建议保持两者版本一致，尽管\
    \ Ditto 团队致力于使 SDK 与后端向前兼容。\n\n在开始任何操作之前，你需要创建并配置一个 Ditto 客户端实例。相关类属于 `org.eclipse.ditto.client.configuration`\
    \ 包。此过程的第一步是创建 AuthenticationProvider 和 MessagingProvider 的实例。对于 `AuthenticationProvider`，当使用基本认证时，配置如下所示：\n\
    \n```\nAuthenticationProvider authProvider =\nAuthenticationProviders.basic(\n\
    BasicAuthenticationConfiguration.newBuilder()\n.username(\"ditto\")\n.password(\"\
    ditto\")\n.build());\n```\n\n`MessagingProvider` 同样简单明了。在以下代码片段中，我使用公共 Ditto 沙箱的\
    \ WebSocket URL 作为目标端点：\n\n```\nMessagingProvider messProvider =\nMessagingProviders.webSocket(\n\
    WebSocketMessagingConfiguration.newBuilder()\n.endpoint(\"wss://ditto.eclipseprojects.io\"\
    )\n.build(), authProvider);\nDittoClient client =\nDittoClients.newInstance(messProvider);\n\
    ```\n\n获得客户端后，你就可以操作 Thing 和 Policy 了。例如，要创建一个 Thing 实例并将其持久化到后端，你可以使用以下代码：\n\n\
    ```\nfinal Thing thing = Thing.newBuilder()\n.setId(ThingId.of(\n\"com.blueberrycoder:LaserShark-93110798\"\
    ))\n.setFeature(\"Laser\",\nFeatureProperties.newBuilder()\n.set(\"Power\", 9001)\n\
    .build())\n.build();\n// 战斗力超过 9000！\nclient.twin().create(thing).get(1, SECONDS);\n\
    ```\n\n在上面的示例中，我创建了一个包含单个 Feature 的 Thing，该 Feature 本身又由一个 Property 组成。只有当调用 `create()`\
    \ 方法时，该 Thing 才会持久化到 Ditto 后端。\n\nDitto 团队为所有 SDK 维护了大量示例，这些示例位于 `ditto-examples`\
    \ 仓库中。该仓库的地址是：[`https://github.com/eclipse/ditto-examples`](https://github.com/eclipse/ditto-examples)。\n\
    \n## 整体架构如何协同工作\n\nEdiTDor、Thingweb node-wot 和 Ditto 可以在以 WoT 为中心的工作流中协同使用。我现在将解释如何实现。基本上，Ditto\
    \ 可以不依赖 WoT 来创建和管理数字孪生。然而，当 Ditto 孪生实例引用 WoT Thing Model 时，Ditto 可以为它们生成 TD。WoT\
    \ 消费者可以通过 HTTP 绑定模板访问这些 TD 及其属性、动作和事件。自然，整个工作流依赖于 TM 的可用性。由于手动编写 TM 需要对完整的 WoT\
    \ TD 和 TM 规范有深入理解，Eclipse 社区的成员创建了 Eclipse EdiTDor 图形化编辑器来简化此任务。\n\n因此，作为开发者，你可以使用\
    \ EdiTDor 创建 TM。然后，你可以通过 HTTP 服务器使其可用。这将使你能够通过 Ditto SDK 或平台的 REST API 创建引用这些\
    \ TM 的 Thing 实例（孪生）。Ditto 可以为孪生实例生成 TD，你可以从 node-wot 或其他符合 WoT 规范的平台消费这些 TD。\n\
    \n以下是一个示例。Ditto 团队在以下 URL 提供了一个描述落地灯的 TM：\n\n[`https://eclipse.github.io/ditto-examples/wot/models/floor-lamp-1.0.0.tm.jsonld`](https://eclipse.github.io/ditto-examples/wot/models/floor-lamp-1.0.0.tm.jsonld)\n\
    \n我们可以使用一个简单的 `curl` 请求通过 REST API 创建一个 Ditto Thing。\n\n```\ncurl --location --request\
    \ PUT -u ditto:ditto 'https://ditto.eclipseprojects.io/api/2/things/com.blueberrycoder:floor-lamp-0813'\
    \ \\\n--header 'Content-Type: application/json' \\\n--data-raw '{\n\"definition\"\
    : \"https://eclipse.github.io/ditto-examples/wot/models/floor-lamp-1.0.0.tm.jsonld\"\
    \n}'\n```\n\n如果成功，该请求将返回 201 响应码，并且你将在响应正文中看到 JSON 格式的 Ditto Thing 负载定义。\n\n此时，可以通过\
    \ HTTP 绑定模板将 Ditto Thing 作为 WoT TD（Thing Description）来消费，这是 Ditto 目前唯一支持的绑定模板。以下\
    \ curl 请求将检索我刚刚创建的 Thing 的 TD 定义：\n\n```\ncurl --location --request GET -u ditto:ditto\
    \ 'https://ditto.eclipseprojects.io/api/2/things/com.blueberrycoder:floor-lamp-0813'\
    \ \\\n--header 'Accept: application/td+json'\n```\n\n该请求将返回 200 响应码，并在响应正文中返回\
    \ WoT TD 格式的 Thing 定义。这是因为我在请求中指定了适当的 MIME 类型（`application/td+json`）。\n\n此时，你可以从\
    \ node-wot 消费该 Thing 实例。这样做的意义在于，Ditto 可以在更广泛的系统中托管作为数字孪生的 Thing，而 node-wot 则负责代理访问真实设备和其他非孪生软件组件。\n"
- fmt: '# A Few Examples of Applications


    Digital twins and the runtimes I covered earlier provide ways to build enterprise
    IoT applications and platforms. You can then deploy the components of those applications
    in various locations across the Edge-to-Cloud continuum. In the remainder of this
    chapter, we will explore three applications or application frameworks that illustrate
    what you could build or run.


    ## Eclipse 4diac


    `Eclipse 4diac` provides an open source infrastructure for distributed industrial
    process measurement and control systems. It is based on the [IEC 61499](https://webstore.iec.ch/publication/5506)
    standard, which defines a domain-specific modeling language based on function
    blocks for building distributed industrial control solutions. The project was
    announced in 2007 by Thomas Strasser and Alois Zoitl, and it was contributed to
    the Eclipse Foundation in 2015. The code is available under the Eclipse Public
    License version 2.0.


    There are two major components in `4diac`: `Forte` and `IDE`. `Forte` is a portable
    small-footprint implementation of a runtime compliant with IEC 61499. It is written
    in C++ and targets 16- and 32-bit constrained controllers. It can run on several
    operating systems, with Linux, VxWorks, and Windows among the better-known options.
    FreeRTOS support is in the works. From a protocol standpoint, `Forte` supports
    TCP and UDP over IP, as well as MQTT and OPC UA, among others. Using serial (RS-232)
    communications is also possible. `IDE`, on the other hand, is a set of plugins
    for the Eclipse Desktop IDE written in Java. It provides a design environment
    for developers targeting the `Forte` runtime.


    Figure [12-3](#524096_1_En_12_Chapter.xhtml#Fig3) shows `4diac IDE` in action.


    ![](images/524096_1_En_12_Chapter/524096_1_En_12_Fig3_HTML.jpg)


    A screenshot displays the screen of `Tutorial-BlinkTestApp-4diac IDE` with the
    diagram of `E_CYCLE`, `E_SWITCH`, and `E_SR` in the center, system configuration,
    type library, and outline on the left, and properties at the bottom.


    Figure 12-3


    `4diac IDE` (Credit: Eclipse Foundation)


    The official web resources for `4diac` are as follows:


    - **Website:** [`https://eclipse.org/4diac`](https://eclipse.org/4diac)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.4diac`](https://projects.eclipse.org/projects/iot.4diac)

    - **Code repositories:** [`https://git.eclipse.org/c/4diac/org.eclipse.4diac.forte.git/`](https://git.eclipse.org/c/4diac/org.eclipse.4diac.forte.git/)
    (runtime) [`https://git.eclipse.org/c/4diac/org.eclipse.4diac.ide.git/`](https://git.eclipse.org/c/4diac/org.eclipse.4diac.ide.git/)
    (IDE)


    `4diac IDE` supports the development process by providing a visual editor to build
    function block (FB) diagrams. `IDE` ships with several predefined function blocks,
    but you can also design custom ones.


    `4diac Forte` is usually deployed on programmable logic controllers (PLCs). Those
    are ruggedized industrial computers that control manufacturing processes. The
    project’s documentation provides instructions to work with various hardware platforms.
    Moreover, `4diac IDE` sports a device simulator, enabling you to run and debug
    applications targeting `Forte` without needing specialized hardware.


    Manufacturing and process control are usually highly distributed, with PLCs acting
    as edge nodes and local or remote Supervisory Control and Data Acquisition (SCADA)
    systems coordinating operations. Since it is written in C++, `4diac`’s runtime
    is the standard C library provided by the target operating system or compiler.


    ## Eclipse Keyple


    If you went to France and took an SNCF train or hopped on a subway or bus in Paris,
    you already used edge applications based on `Eclipse Keyple` without knowing it.
    `Keyple` is an open source framework facilitating the implementation of terminals
    supporting smart card–based processes and supporting secure ticketing transactions.
    `Keyple` was contributed to the Eclipse Foundation in 2018 by the [Calypso Networks
    Association](https://calypsonet.org/). It is published under the Eclipse Public
    License version 2.0.


    The official web resources for `Keyple` are as follows:


    - **Website:** [`https://keyple.org`](https://keyple.org)

    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.keyple`](https://projects.eclipse.org/projects/iot.keyple)

    - **Index of code repositories:** [`https://github.com/eclipse/keyple`](https://github.com/eclipse/keyple)


    There are essentially two implementations of `Keyple`: one in Java and the other
    in C++. Both are roughly equivalent from a feature perspective. At the time of
    writing, the current version of the framework was v2.0, which is a completely
    modularized rewrite of the previous version. This is the version you should work
    with. Although the code base is now spread over several repositories, the project
    team put together tools and instructions to easily get the components your application
    requires.


    The core features of `Keyple` are focused on smart card readers. `Keyple` provides
    plugins that support several reader interface standards, including PC/SC, NFC
    (on Android), and OMAPI. The readers can be local or remote, enabling the creation
    of highly distributed solutions at the Edge. `Keyple` also supports the Calypso
    processing API to manage Calypso commands and security features. This essentially
    means that your application can in real time determine a ticket’s balance, confirm
    the ticket holder’s privileges, and update the ticket data to deduce the journey
    cost and calculate a new balance, for example.


    You will find `Keyple`-based applications in all sorts of settings at the Edge.
    They can handle all sorts of smart card–based use cases, not just ticketing. The
    Java version makes it easy to port your code to new hardware, while the C++ can
    support a broader assortment of readers and devices, including very constrained
    ones that could not support the footprint of the Java runtime.'
