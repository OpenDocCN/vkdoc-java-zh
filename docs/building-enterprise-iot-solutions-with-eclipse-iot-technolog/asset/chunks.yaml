    may force organizations to do the right thing. But how nice it would be if they
    could take the initiative for a change! By making your product (or at least its
    core) open source from the very start, you provide a way forward for your users
    if you wish to move on in the future while preserving your capacity to build meaningful
    commercial innovations. Remember that the true innovators of this century will
    be the organizations that not only use open source in their products and solutions
    but will acquire the skills required to contribute and give back to the community.


    My goal in this book was to provide an overview of the Eclipse IoT ecosystem and
    give you the tools and knowledge you need to build enterprise-grade solutions.
    I may be naive, but I still sincerely believe in the potential for technology
