- fmt: "# Getting Started with ioFog\n\n`ioFog` itself runs on Linux. However, there\
    \ are versions of `iofogctl` for Linux, macOS, and Windows. In the latter case,\
    \ all you need to do is to download the executable and place it in your path.\n\
    \nTo install `ioFog` on macOS using the Homebrew package manager, issue the following\
    \ commands:\n\n```\nbrew tap eclipse-iofog/iofogctl\nbrew install iofogctl@3.0\n\
    ```\n\nOn Linux, the `ioFog` team maintains package repositories for Debian and\
    \ RPM-based distributions. You also have the choice to install the binary directly.\
    \ To do that, execute these commands:\n\n```\ncurl -LO \\\nhttps://storage.googleapis.com/iofogctl/linux/3.0/iofogctl\n\
    sudo install -o root -g root -m 0755 iofogctl \\\n/usr/local/bin/iofogctl\nrm\
    \ ./iofogctl\n```\n\nYou can test that the CLI is installed properly by running\
    \ `iofogctl version`. The output should look like this:\n\n```\nversion: 3.0.1\n\
    platform: linux/amd64\ncommit: 302077d2d66a0d788e7b6de99e65be8dc633f09e\ndate:\
    \ 2022-05-27T02:06:35+0000\n```\n\nTo deploy the controller and an agent instance\
    \ on your workstation for testing purposes, paste the following YAML into a file\
    \ in a suitable location. The `ioFog` documentation suggests `/tmp/quickstart.yaml`.\n\
    \n```\napiVersion: iofog.org/v3\nkind: LocalControlPlane\nmetadata:\n  name: ecn\n\
    spec:\n  iofogUser:\n    name: Quick\n    surname: Start\n    email: user@domain.com\n\
    \    password: q1u45ic9kst563art\n  controller:\n    container:\n      image:\
    \ iofog/controller:3.0.0\n---\napiVersion: iofog.org/v3\nkind: LocalAgent\nmetadata:\n\
    \  name: local-agent\nspec:\n  container:\n    image: iofog/agent:3.0.0\n```\n\
    \nThen, you can deploy the controller and agent by executing this command:\n\n\
    ```\niofogctl deploy -f /tmp/quick-start.yaml\n```\n\nOnce the containers are\
    \ up, you can access ECN Viewer at the following URL:\n\n```\nhttp://localhost:8008/#/overview\n\
    ```\n\nThe username and password were specified in the preceding YAML descriptor.\n\
    \n## Eclipse Kanto\n\nEclipse Kanto is the newest edge computing platform contributed\
    \ to the Eclipse Foundation. The project was initiated by Bosch.IO, a subsidiary\
    \ of Bosch focused on the Internet of Things. Because of this, it sports stellar\
    \ integration with several other Eclipse IoT projects, such as Eclipse hawkBit\
    \ (software updates), Eclipse Hono (device connectivity), and Eclipse Ditto (digital\
    \ twins). Kanto is available under the Eclipse Public License version 2. At the\
    \ time of writing, only the initial release for Kanto, v. 0.1.0-M1, was available.\n\
    \nThe official web resources for Kanto are as follows:\n\n- **Website:** [`https://eclipse.org/kanto`](https://eclipse.org/kanto)\n\
    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.kanto`](https://projects.eclipse.org/projects/iot.kanto)\n\
    - **Code repositories:** [`https://github.com/eclipse-kanto`](https://github.com/eclipse-kanto)\n\
    \n### Kanto Concepts and Architecture\n\nThe project team describes Kanto as a\
    \ modular platform delivering essential features to IoT devices like Cloud connectivity,\
    \ digital twins, local communication, container management, and software updates.\
    \ The devices are remotely configurable and manageable from a choice of Cloud\
    \ IoT platforms. Figure [11-4](#524096_1_En_11_Chapter.xhtml#Fig4) summarizes\
    \ Kanto’s architecture. The platform heavily relies on the MQTT protocol and bundles\
    \ the [Eclipse Mosquitto](https://mosquitto.org) broker to handle internal message\
    \ passing between the components.\n\n![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig4_HTML.jpg)\n\
    \nAn architecture includes Eclipse IoT, Bosch IoT Suite, Azure IoT Hub and others,\
    \ cloud connector, local communication, edge management, software updates, operating\
    \ system, and IoT devices.\n\n**Figure 11-4** Eclipse Kanto architecture (Credit:\
    \ Eclipse Foundation)\n\nAs you can see, the platform has four major functional\
    \ blocks. Those blocks are as follows:\n\n- **Connector:** Handles Cloud connectivity.\
    \ It can interact with Eclipse IoT open source IoT platforms (Ditto, hawkBit,\
    \ Hono), their commercial equivalents in the Bosch IoT Suite, or Microsoft’s Azure\
    \ IoT Hub.\n- **Container management:** Exposes a unified API abstracting the\
    \ core operations of container management, including life cycle, state, networking,\
    \ host resources access, and usage management. Kanto supports multiple container\
    \ runtimes, whether OCI compliant (`containerd`, `runc`, `kata`) or Linux native\
    \ (`LXC`, `LXD`).\n- **File uploads:** Provides file uploads to AWS S3 buckets\
    \ or plain HTTP servers. Kanto can upload the files at specified intervals or\
    \ wait for an explicit trigger sent by the Cloud back end. The feature supports\
    \ a variety of use cases such as diagnostics, monitoring, node backup, and system\
    \ restore.\n- **Software updates:** Downloads, validates, and installs software\
    \ updates for edge nodes and devices connected to them. Kanto can monitor the\
    \ progress of those operations and can resume interrupted downloads.\n\nSystem\
    \ administrators often interact with Eclipse Kanto through another IoT platform.\
    \ The project’s website provides examples for Eclipse Hono and the commercial\
    \ Bosch IoT Suite.\n\n### Getting Started with Kanto\n\nFor the time being, you\
    \ can deploy Kanto on Linux only. Binaries are published for the `x86_64`, `armv7`\
    \ (32-bit), and `arm64` architectures as Debian packages (`.deb`). You can access\
    \ the releases on the project’s main GitHub repository: [`https://github.com/eclipse-kanto/kanto/releases`](https://github.com/eclipse-kanto/kanto/releases).\n\
    \nThe only prerequisite for Kanto at this point is the `containerd` runtime. You\
    \ can install it using your distribution’s package manager or the script provided\
    \ by the Kanto team, as shown here:\n\n```\ncurl -fsSL https://github.com/eclipse-kanto/kanto/raw/main/quickstart/install_ctrd.sh\
    \ | sh\n```\n\nTo install Kanto itself, download the `.deb` matching the architecture\
    \ of your node and then install it using `apt`. For example:\n\n```\nsudo apt\
    \ install ./kanto_0.1.0-M1_linux_x86_64.deb\n```\n\nEach of the components will\
    \ be installed as a service. You can check their status with this command:\n\n\
    ```\nsystemctl status \\\n  suite-connector.service \\\n  container-management.service\
    \ \\\n  software-update.service \\\n  file-upload.service\n```\n\nKanto is now\
    \ ready to use! Using the public Eclipse Hono sandbox is a good way to exercise\
    \ it. The Kanto team provides instructions to that effect here: [`www.eclipse.org/kanto/docs/getting-started/hono/`](http://www.eclipse.org/kanto/docs/getting-started/hono/).\
    \ Naturally, you could also deploy a local instance of Hono using the [Cloud2Edge\
    \ package](https://www.eclipse.org/packages/packages/cloud2edge/) from the Eclipse\
    \ IoT Packages project.\n\n## Eclipse Kura\n\nAre IoT gateways edge nodes? In\
    \ many ways, yes, although traditional gateways could not run containerized Edge\
    \ Native applications. This changed in 2021 when Eclipse Kura gained a container\
    \ orchestration provider.\n\nOne of the very first projects of Eclipse IoT, [Eclipse\
    \ Kura](https://www.eclipse.org/kura/), has been going strong since 2013. Created\
    \ initially by Eurotech, the project attracted several third-party contributions\
    \ throughout the years. It is available under the Eclipse Public License version\
    \ 2. When I wrote this, the latest release was version 5.1.1, published on April\
    \ 26, 2022, and candidate builds were available for version 5.1.2. Eclipse Kura\
    \ is at the core of [Everyware Software Framework](https://esf.eurotech.com/)\
    \ (ESF), a commercial product from Eurotech.\n\nThe official web resources for\
    \ Kura are as follows:\n\n- **Website:** [`https://eclipse.org/kura`](https://eclipse.org/kura)\n\
    - **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.kura`](https://projects.eclipse.org/projects/iot.kura)\n\
    - **Code repositories:** [`https://github.com/eclipse-kura`](https://github.com/eclipse-kura)"
  raw: '#### Getting Started with ioFog


    ioFog itself runs on Linux. However, there are versions of `iofogctl` for Linux,
    macOS, and Windows. In the latter case, all you need to do is to download the
    executable and place it in your path.


    To install ioFog on macOS using the Homebrew package manager, issue the following
    commands:


    ```

    brew tap eclipse-iofog/iofogctl

    brew install iofogctl@3.0

    ```


    On Linux, the ioFog team maintains package repositories for Debian and RPM-based
    distributions. You also have the choice to install the binary directly. To do
    that, execute these commands:


    ```

    curl -LO \

    https://storage.googleapis.com/iofogctl/linux/3.0/iofogctl

    sudo install -o root -g root -m 0755 iofogctl \

    /usr/local/bin/iofogctl

    rm ./iofogctl

    ```


    You can test that the CLI is installed properly by running `iofogctl version`.
    The output should look like this:


    ```

    version: 3.0.1

    platform: linux/amd64

    commit: 302077d2d66a0d788e7b6de99e65be8dc633f09e

    date: 2022-05-27T02:06:35+0000

    ```


    To deploy the controller and an agent instance on your workstation for testing
    purposes, paste the following YAML into a file in a suitable location. The ioFog
    documentation suggests `/tmp/quickstart.yaml`.


    ```


    apiVersion: iofog.org/v3

    kind: LocalControlPlane

    metadata:

    name: ecn

    spec:

    iofogUser:

    name: Quick

    surname: Start

    email: user@domain.com

    password: q1u45ic9kst563art

    controller:

    container:

    image: iofog/controller:3.0.0


    apiVersion: iofog.org/v3

    kind: LocalAgent

    metadata:

    name: local-agent

    spec:

    container:

    image: iofog/agent:3.0.0

    ```


    Then, you can deploy the controller and agent by executing this command:


    ```

    iofogctl deploy -f /tmp/quick-start.yaml

    ```


    Once the containers are up, you can access ECN Viewer at the following URL:


    ```

    http://localhost:8008/#/overview

    ```


    The username and password were specified in the preceding YAML descriptor.


    ### Eclipse Kanto


    Eclipse Kanto is the newest edge computing platform contributed to the Eclipse
    Foundation. The project was initiated by Bosch.IO, a subsidiary of Bosch focused
    on the Internet of Things. Because of this, it sports stellar integration with
    several other Eclipse IoT projects, such as Eclipse hawkBit (software updates),
    Eclipse Hono (device connectivity), and Eclipse Ditto (digital twins). Kanto is
    available under the Eclipse Public License version 2\. At the time of writing,
    only the initial release for Kanto, v. 0.1.0-M1, was available.


    The official web resources for Kanto are as follows:


    *   **Website:** [`https://eclipse.org/kanto`](https://eclipse.org/kanto)


    *   **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.kanto`](https://projects.eclipse.org/projects/iot.kanto)


    *   **Code repositories:** [`https://github.com/eclipse-kanto`](https://github.com/eclipse-kanto)


    #### Kanto Concepts and Architecture


    The project team describes Kanto as a modular platform delivering essential features
    to IoT devices like Cloud connectivity, digital twins, local communication, container
    management, and software updates. The devices are remotely configurable and manageable
    from a choice of Cloud IoT platforms. Figure [11-4](#524096_1_En_11_Chapter.xhtml#Fig4)
    summarizes Kanto’s architecture. The platform heavily relies on the MQTT protocol
    and bundles the [Eclipse Mosquitto](https://mosquitto.org) broker to handle internal
    message passing between the components.


    ![](images/524096_1_En_11_Chapter/524096_1_En_11_Fig4_HTML.jpg)


    An architecture includes eclipse I o T, Bosch I o T suite, Azure I o T hub and
    others, cloud connector, local communication, edge management, software updates,
    operating system, and I o T devices.


    Figure 11-4


    Eclipse Kanto architecture (Credit: Eclipse Foundation)


    As you can see, the platform has four major functional blocks. Those blocks are
    as follows:


    *   **Connector:** Handles Cloud connectivity. It can interact with Eclipse IoT
    open source IoT platforms (Ditto, hawkBit, Hono), their commercial equivalents
    in the Bosch IoT Suite, or Microsoft’s Azure IoT Hub.


    *   **Container management:** Exposes a unified API abstracting the core operations
    of container management, including life cycle, state, networking, host resources
    access, and usage management. Kanto supports multiple container runtimes, whether
    OCI compliant (containerd, runc, kata) or Linux native (LXC, LXD).


    *   **File uploads:** Provides file uploads to AWS s3 buckets or plain HTTP servers.
    Kanto can upload the files at specified intervals or wait for an explicit trigger
    sent by the Cloud back end. The feature supports a variety of use cases such as
    diagnostics, monitoring, node backup, and system restore.


    *   **Software updates:** Downloads, validates, and installs software updates
    for edge nodes and devices connected to them. Kanto can monitor the progress of
    those operations and can resume interrupted downloads.


    System administrators often interact with Eclipse Kanto through another IoT platform.
    The project’s website provides examples for Eclipse Hono and the commercial Bosch
    IoT Suite.


    #### Getting Started with Kanto


    For the time being, you can deploy Kanto on Linux only. Binaries are published
    for the x86_64, armv7 (32-bit), and arm64 architectures as Debian packages (`.deb`).
    You can access the releases on the project’s main GitHub repository: [`https://github.com/eclipse-kanto/kanto/releases`](https://github.com/eclipse-kanto/kanto/releases).


    The only prerequisite for Kanto at this point is the `containerd` runtime. You
    can install it using your distribution’s package manager or the script provided
    by the Kanto team, as shown here:


    ```

    curl -fsSL https://github.com/eclipse-kanto/kanto/raw/main/quickstart/install_ctrd.sh
    | sh

    ```


    To install Kanto itself, download the `.deb` matching the architecture of your
    node and then install it using apt. For example:


    ```

    sudo apt install ./kanto_0.1.0-M1_linux_x86_64.deb

    ```


    Each of the components will be installed as a service. You can check their status
    with this command:


    ```

    systemctl status \

    suite-connector.service \

    container-management.service \

    software-update.service \

    file-upload.service

    ```


    Kanto is now ready to use! Using the public Eclipse Hono sandbox is a good way
    to exercise it. The Kanto team provides instructions to that effect here: [`www.eclipse.org/kanto/docs/getting-started/hono/`](http://www.eclipse.org/kanto/docs/getting-started/hono/).
    Naturally, you could also deploy a local instance of Hono using the [Cloud2Edge
    package](https://www.eclipse.org/packages/packages/cloud2edge/) from the Eclipse
    IoT Packages project.


    ### Eclipse Kura


    Are IoT gateways edge nodes? In many ways, yes, although traditional gateways
    could not run containerized Edge Native applications. This changed in 2021 when
    Eclipse Kura gained a container orchestration provider.


    One of the very first projects of Eclipse IoT, [Eclipse Kura](https://www.eclipse.org/kura/),
    has been going strong since 2013\. Created initially by Eurotech, the project
    attracted several third-party contributions throughout the years. It is available
    under the Eclipse Public License version 2\. When I wrote this, the latest release
    was version 5.1.1, published on April 26, 2022, and candidate builds were available
    for version 5.1.2\. Eclipse Kura is at the core of [Everyware Software Framework](https://esf.eurotech.com/)
    (ESF), a commercial product from Eurotech.


    The official web resources for Kura are as follows:


    *   **Website:** [`https://eclipse.org/kura`](https://eclipse.org/kura)


    *   **Eclipse project page:** [`https://projects.eclipse.org/projects/iot.kura`](https://projects.eclipse.org/projects/iot.kura)


    *   **Code repositories:** [`https://github.com/eclipse-kura`](https://github.com/eclipse-kura)'
