  trans: '

    #### 测试你的环境


    由于我在配置构建时使用了 `-DBUILD_EXAMPLES=ON` 开关，现在我可以访问 `bin` 子目录中 Cyclone DDS 示例的二进制文件。换句话说，如果构建目录是
    `/home/fdesbiens/cyclonedds/build`，那么构建完成后，示例的二进制文件就位于 `/home/fdesbiens/cyclonedds/build/bin`
    中。


    `roundtrip` [示例应用程序](https://github.com/eclipse-cyclonedds/cyclonedds/tree/master/examples/roundtrip)
    允许你通过发送和接收单个消息来衡量环境的性能。该应用程序由两个可执行文件组成：`RoundtripPong` 和 `RoundtripPing`。要运行该示例，请打开一个命令行并启动
    `Pong` 组件：


    ```

    ./RoundtripPong

    ```


    你应该会看到以下输出：


    ```

    Waiting for samples from ping to send back...

    ```


    打开第二个命令行并启动 Ping 组件：


    ```

    ./RoundtripPing 0 0 0

    ```


    这将以一种模式启动示例，在该模式下，将无限期地发送带有空负载的样本。第一个数字控制负载大小，第二个数字指定发送的样本数量，第三个数字定义以秒为单位的超时时间。执行
    Ping 将产生类似如下的输出：


    ```

    # payloadSize: 0 | numSamples: 0 | timeOut: 0

    # Waiting for startup jitter to stabilise

    # Warm up complete.

    # Latency measurements (in us)

    ...

    ```


    几秒钟后，你应该会看到有关延迟、写入访问时间和读取访问时间的信息。


    注意


    为了更精确地评估你的 DDS 环境的性能，你可以使用 Cyclone DDS 团队构建的 `ddsperf` 工具。项目仓库包含项目团队用于对库进行基准测试的一系列脚本。


    ### Hello World! 示例


    编译并安装好库之后，你现在可以开始开发你的应用程序了。为了解释使用 Cyclone DDS 在 C 语言中编写发布者和订阅者的基础知识，我将与你一起探索 [“Hello
    World!” Cyclone DDS 示例应用程序](https://github.com/eclipse-cyclonedds/cyclonedds/tree/master/examples/helloworld)
    的代码。[Cyclone DDS 网站](https://cyclonedds.io/docs/cyclonedds/latest/GettingStartedGuide/helloworld.html)^(¹⁹)
    详细解释了如何构建 “Hello World!” 示例。


    “Hello World” 应用程序包含一个订阅者和一个发布者。发布者在一个主题上发送单个样本，然后由正在运行的订阅者（如果有）接收。


    #### 数据模型


    “Hello World!” 中使用的主题类型名为 `Msg`。它定义在 [HelloWorldData.​idl](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/helloworld/HelloWorldData.idl)
    文件中，如代码清单 6-2 所示。


    ```

    module HelloWorldData

    {

    @topic struct Msg

    {

    @key long userID;

    string message;

    };

    };

    Listing 6-2

    HelloWorldData.idl

    ```


    顶部的模块声明类似于作用域或命名空间。被定义为两个属性之一的数字 `userID` 被声明为类型 `Msg` 的键。


    在编译过程中，IDL 将被转换为如下所示的 C 语言 `struct`：


    ```

    typedef struct HelloWorldData_Msg

    {

    int32_t userID;

    char * message;

    } HelloWorldData_Msg;

    ```


    #### 发布


    “Hello World!” 订阅者代码包含在 [subscriber.​c](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/helloworld/subscriber.c)
    中。该文件包含一个单一的 main 方法。变量声明位于顶部。以下是主要的变量：


    ```

    dds_entity_t participant;

    dds_entity_t topic;

    dds_entity_t reader;

    HelloWorldData_Msg *msg;

    void *samples[MAX_SAMPLES];

    dds_sample_info_t infos[MAX_SAMPLES];

    dds_return_t rc;

    dds_qos_t *qos;

    ```


    前三个 `dds_entity_t` 类型的变量是创建 DataReader 所必需的。接下来的三个是用于保存消息、消息样本和 `sample_info`
    的缓冲区。`MAX_SAMPLES` 是一个常量，其值为 1。最后，`dds_return_t` 是读取操作的返回值，而 `dds_qos_t` 指定了 QoS。


    要创建一个数据读取器，你需要一个域参与者、一个主题以及定义的 QoS 属性。以下是实现此目的的代码（已移除错误处理）：


    ```

    participant = dds_create_participant (DDS_DOMAIN_DEFAULT, NULL, NULL);

    topic = dds_create_topic (

    participant, &HelloWorldData_Msg_desc, "HelloWorldData_Msg", NULL, NULL);

    qos = dds_create_qos ();

    dds_qset_reliability (qos, DDS_RELIABILITY_RELIABLE, DDS_SECS (10));

    reader = dds_create_reader (participant, topic, qos, NULL);

    ```


    创建主题所需的主要参数是 DDS 类型的名称（`HelloWorldData_Msg`）。至于 QoS，它被设置为 `RELIABLE` 传递，最大阻塞时间为十秒。如果不需要超时，可以使用
    `DDS_INFINITY` 作为值。


    现在我们有了一个 DataReader。是时候通过调用 `dds_read` 来读取已发布的值（如果有的话）了。


    ```

    rc = dds_read (reader, samples, infos, MAX_SAMPLES, MAX_SAMPLES);

    ```


    读取操作是在一个 `while(true)` 循环中执行的，但以下代码中的 `break` 指令确保在读取到消息时继续执行。程序会打印接收到的第一个样本中的
    userID 和消息。


    ```

    if ((rc > 0) && (infos[0].valid_data))

    {

    /* Print Message. */

    msg = (HelloWorldData_Msg*) samples[0];

    printf ("=== [Subscriber] Received : ");

    printf ("Message (%"PRId32", %s)\n", msg->userID, msg->message);

    fflush (stdout);

    break;

    }

    else

    {

    /* Polling sleep. */

    dds_sleepfor (DDS_MSECS (20));

    }

    ```


    我强调了在使用 DDS 时释放不再需要的资源是多么重要。囤积应该被处理的 DataReader 会导致本地和远程内存泄漏。在这种情况下，应用程序首先调用 `HelloWorldData_Msg_free`。这是一个根据所使用的
    DDS 类型定制的生成函数。然后，应用程序在域参与者上调用 `dds_delete`。这样做会递归地删除它包含的所有内容。在这种情况下，这意味着我们刚刚创建的主题实例和
    DataReader。


    ```

    HelloWorldData_Msg_free (samples[0], DDS_FREE_ALL);

    rc = dds_delete (participant);

    ```


    关于 “Hello World!” 示例应用程序，需要注意的重要一点是它依赖于轮询方法。它在一个循环中调用 `dds_read`，如果没有可用的消息样本，则会休眠
    20 毫秒（`dds_sleepfor`）。另一方面，`roundtrip` 示例采用了不同的方法，并利用了监听器和等待集。你可以在 [RoundtripPong](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/roundtrip/pong.c)
    的代码中看到这一点。

    '
- fmt: '### Publishing


    The code for the “Hello World!” publisher is contained in [publisher.c](https://github.com/eclipse-cyclonedds/cyclonedds/blob/master/examples/helloworld/publisher.c).
    The file contains a single `main` method. Variable declarations can be found at
    the top. Here are the main ones:


    ```

    dds_entity_t participant;

    dds_entity_t topic;

    dds_entity_t writer;

    dds_return_t rc;

    HelloWorldData_Msg msg;

    uint32_t status = 0;

    ```


    As you can see, they are remarkably like the ones used in the subscriber. The
    main difference lies in the `status` variable, which is an unsigned integer that
    will contain the current set of statuses of the `DataWriter`.


    Before creating the `DataWriter`, you need to create a domain participant and
    topic as shown in the following:


    ```

    participant = dds_create_participant (DDS_DOMAIN_DEFAULT, NULL, NULL);

    topic = dds_create_topic (

    participant, &HelloWorldData_Msg_desc, "HelloWorldData_Msg", NULL, NULL);

    writer = dds_create_writer (participant, topic, NULL, NULL);

    ```


    Sending out data when no one is listening is wasteful. DDS `DataWriters` know
    if there are matching `DataReaders`, that is, `DataReaders` defined on the same
    topic instance somewhere in the domain. Consequently, the application will loop
    and sleep until the `DataWriter` has been informed of a publication match. The
    following is a simplified version of the logic with error handling removed:


    ```

    rc = dds_set_status_mask(writer, DDS_PUBLICATION_MATCHED_STATUS);

    ...

    while(!(status & DDS_PUBLICATION_MATCHED_STATUS))

    {

    rc = dds_get_status_changes (writer, &status);

    ...

    /* Polling sleep. */

    dds_sleepfor (DDS_MSECS (20));

    }

    ```


    Building and sending the message is straightforward. Simply set the `userID` and
    `message` on the `msg` variable and call `dds_write`.


    ```

    msg.userID = 1;

    msg.message = "Hello World";

    rc = dds_write (writer, &msg);

    ```


    Once this is done, the only thing left is to clean up. Calling `dds_delete` on
    the domain participant will free up the `DataReader` and topic instance resources.


    ```

    rc = dds_delete (participant);

    ```


    As you can see, the code for the publisher and subscriber is very close. The QoS
    settings are found in the subscriber but not in the publisher. Why is that? The
    explanation is that the default QoS policies applied by Cyclone DDS to `DataWriters`
    were enough to match the `DataReader` in the subscriber.


    ### Running the Sample


    Open a command line and go to the `bin` subdirectory in the `build` folder you
    created to compile Cyclone DDS. Then, execute the subscriber like this:


    ```

    ./HelloworldSubscriber

    ```


    You will see this output:


    ```

    === [Subscriber] Waiting for a sample ...

    ```


    Then, open another command line and execute this command to launch the publisher:


    ```

    ./HelloworldPublisher

    ```


    You will see this output:


    ```

    === [Publisher]  Waiting for a reader to be discovered ...

    === [Publisher]  Writing : Message (1, Hello World)

    ```


    If you go back to the command line where the subscriber is running, you will see
    this:


    ```

    === [Subscriber] Received : Message (1, Hello World)

    ```


    One notable aspect of this demo and the `roundtrip` sample is that you did not
    need to configure anything for things to work. There were no IP addresses or hostnames
    involved. This is the magic of DDS auto-discovery at work.


    ### Python Version


    I mentioned earlier that the Cyclone DDS team maintains Python and C++ bindings
    for the library. The repositories for those bindings also contain example applications.
    To conclude this section, let’s now look at the [Python version of the “Hello
    World!” example application](https://github.com/eclipse-cyclonedds/cyclonedds-python/blob/master/examples/helloworld/helloworld.py).^([(20)](#fn20))


    To use the Python binding, also called `cyclonedds-python`, you first need to
    install Cyclone DDS in your environment, as described earlier in this chapter.
    Then, follow the installation instructions found in the `README.MD` in the binding’s
    [GitHub repository](https://github.com/eclipse-cyclonedds/cyclonedds-python/).^([(21)](#fn21))
    It is highly recommended to use a virtual environment, `poetry`, `pipenv`, or
    `pyenv` when working with `cyclonedds-python`.


    At the time of writing, OMG provided no official mapping between IDL and Python.
    The Cyclone DDS team built tools to address that gap; unfortunately, those are
    specific to `cyclonedds-python` and do not apply to other DDS implementations
    or bindings. The documentation for `cyclonedds-python` [provides more details](https://github.com/eclipse-cyclonedds/cyclonedds-python/).^([(22)](#fn22))


    `Cyclonedds-python` includes a command-line IDL compiler that will generate a
    Python module containing your types from an IDL file. Alternatively, the binding
    provides IDL data types in the `cyclonedds.idl` package. This is the approach
    used in the Python version of the “Hello World!” example. You will find the declaration
    for the `Msg` type at the top of the `helloworld.py` file.


    ```

    @dataclass

    class HelloWorld(IdlStruct, typename="HelloWorld.Msg"):

    data: str

    ```


    The basic steps to publish a sample are the same as in the C version of the example.
    As shown in the following, you need to create a domain participant, topic, and
    `DataWriter`.


    ```

    dp = DomainParticipant()

    tp = Topic(dp, "Hello", HelloWorld)

    dw = DataWriter(dp, tp)

    ```


    Publishing the sample is straightforward. All you need to do is pass an instance
    of the `HelloWorld` object to the `DataWriter`’s `write` method.


    ```

    sample = HelloWorld(data=''Hello, World!'')

    dw.write(sample)

    ```


    Reading data is also very simple. All you need is a `DataReader` instance. In
    this case, the code only prints the `data` member from the first sample returned
    by the `read` method.


    ```

    dr = DataReader(dp, tp)

    sample = dr.read()[0]

    print(sample.data)

    ```


    And that’s it! I am sure you can appreciate the simplicity and readability compared
    to the C version. For the time being, you can only install `cyclonedds-python`
    from the source, but the team aims to publish packages to the `pip` repository
    in the future. Enabling developers to install from source using PyPI is also in
    the plans.'
