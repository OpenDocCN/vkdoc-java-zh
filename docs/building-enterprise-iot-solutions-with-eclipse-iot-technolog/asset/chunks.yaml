  trans: '

    #### Kura 概念与架构


    Eclipse Kura 是一个用于构建智能互联边缘系统和物联网网关的平台与应用程序框架。它提供了远程管理接口，并公开了许多支持物联网应用的 API。Kura
    与 [Eclipse Kapua](https://www.eclipse.org/kapua/) 相辅相成，后者是一个物联网平台，为基于 Kura 的边缘设备提供数据和设备管理后端。我将在下一章介绍
    Kapua。Kura 使用 Java 编写；其运行所需的一切就是一个在 Linux 操作系统上的 Java 标准版运行时。该平台利用了 OSGi 组件模型，这简化了编写可重用软件构建块的过程。Kura
    与硬件深度集成，包括串口、GPS、USB、GPIO、I²C 等。


    图 11-5 展示了 Kura 的架构和功能集。


    ![](img/524096_1_En_11_Fig5_HTML.jpg)


    该架构包括应用程序、连接与交付、网络配置、基本网关服务、远程管理、设备抽象、资产、驱动程序、管理 GUI 和 Linux。


    图 11-5


    Eclipse Kura 架构（图片来源：Eclipse 基金会）


    Kura 为开发者提供了一套广泛的服务，包括配置、设备生命周期管理、远程访问功能、日志管理、健康监控、网络以及边缘 AI 支持。以下是关于其他几个突出服务的更多细节：


    *   **数据：** Kura 定义了通用数据 API，对底层数据库进行了抽象。这提供了灵活性，可以在不更改应用程序本身的情况下更换 SQL 数据库提供商。Kura
    提供了一个内置的 SQL 数据库引擎（H2）和 MQTT 代理（ActiveMQ Artemis）。您还可以在本地部署 Apache Camel 或与远程实例集成。Camel
    提供了一个基于规则的路由和中介引擎。Kura 还为消息提供了临时存储。这使其能够应对分布式边缘部署中的网络中断。即使设备重启，本地持久化但未能传输的消息也会被保留。一旦网络条件允许，它们就会被发送到云端。这确保了遥测数据历史得以保存。


    *   **云：** Kura 的云 API 对实际的云提供商进行了抽象；应用程序并不知道实际使用的是哪个提供商。这使得在需要时更容易切换提供商。与远程云服务的连接可以在部署在网关上的多个应用程序之间共享。同时连接到多个云（多云）也是可能的。开箱即用，Kura
    可以连接到以下云服务：AWS IoT、Azure IoT Hub 和 Eurotech Everyware Cloud 平台。通过 Eclipse Marketplace
    可以获得额外的连接器，您也可以开发自定义连接器。基于 Kura 的网关已准备好连接到 Eclipse Kapua 物联网平台和 Eclipse Hono 设备连接平台的本地或远程实例。


    *   **安全：** Kura 在开发时就考虑到了安全性。Eurotech 基于 Kura 的商业产品，结合其最新的物联网网关硬件平台之一，已获得 PSA
    1 级和 IEC 62443-4-2 认证。


    *   **连线：** 这一创新功能提供了一个可视化数据流编程工具，用于定义数据收集和处理管道。


    从开发角度来看，Kura 应用程序使用 Java 编写，并打包在 OSGi 包中。然而，最近增加的容器支持意味着您也可以使用其他语言构建应用程序。如果部署了，这些容器化应用程序可以使用
    REST API 和 JDBC 与 Kura 框架交互，或直接连接到 AMQ 代理和 Camel。


    Kura 还附带了一个丰富的 Web 图形界面。图 11-6 展示了连线图编辑器。


    ![](img/524096_1_En_11_Fig6_HTML.png)


    Kura 系统的屏幕截图包括一个带有定时器、Modbus 资产、发布器和记录器的连线图，以及一个连线组件、通道和系统与服务选项的列表。


    图 11-6


    Eclipse Kura 图形界面（图片来源：Eurotech）


    #### Kura 入门指南


    部署 Kura 实例最快的方法是使用由项目团队维护并发布到 [Docker Hub](https://hub.docker.com/r/eclipse/kura/)
    的容器镜像。在已安装 Docker 的工作站上，您只需执行以下命令：


    ```

    docker run -d -p 443:443 -t eclipse/kura

    ```


    容器启动后，您可以在 `https://localhost` 访问 Web 用户界面。默认凭据是 `admin/admin`。


    如果您更倾向于在 Raspberry Pi 上进行测试，该团队为 Raspbian 和 Ubuntu 提供了 `.deb` 软件包。您可以从以下位置下载它们：[`http://download.eclipse.org/kura/releases/`](http://download.eclipse.org/kura/releases/)。


    在最新更新的系统上下载与您的操作系统匹配的最新 Kura 版本。例如，您可以使用以下命令安装 Raspbian 版本：


    ```

    sudo apt-get install ./kura__raspberry-pi_installer.deb

    ```


    在 Raspbian 上，您需要确保 SSH 守护进程已启动。您还需要通过在 `/boot/cmdline.txt` 文件末尾添加 `net.ifnames=0`
    参数来禁用一致的设备命名。


    Kura 文档提供了额外的指导和注意事项。您可以在以下位置找到完整详情：


    *   **Raspbian：** [`http://eclipse.github.io/kura/intro/raspberry-pi-quick-start.html`](http://eclipse.github.io/kura/intro/raspberry-pi-quick-start.html)


    *   **Ubuntu：** [`http://eclipse.github.io/kura/intro/raspberry-pi-ubuntu-20-quick-start.html`](http://eclipse.github.io/kura/intro/raspberry-pi-ubuntu-20-quick-start.html)


    该团队还为 Nvidia 的 Jetson Nano 平台制作了一个构建版本。

    '
- fmt: "### Kubernetes\n\nThis chapter would not be complete without an overview of\
    \ options to run Kubernetes at the Edge. In environments where a certain level\
    \ of elasticity is available, it is certainly possible to run the open source\
    \ distribution of Kubernetes or any of the available commercial distributions,\
    \ such as Red Hat OpenShift. However, this typically requires deploying servers\
    \ in a variety of data center. My focus in this section will be on lighter-weight\
    \ alternatives that can run on nodes deployed *in the wild*, specifically `K3s`\
    \ and `KubeEdge`. There are, of course, several others, such as Canonical’s [MicroK8s](https://microk8s.io/)\
    \ or Red Hat [MicroShift](https://microshift.io/).\n\n**Note**\n\nIf you are less\
    \ familiar with the platform, [Kubernetes](https://kubernetes.io/) is a container\
    \ orchestration system automating software deployment, scaling, and management.\
    \ It was originally built by Google and is now maintained by the [Cloud Native\
    \ Computing Foundation](https://www.cncf.io/) (CNCF), which belongs to the Linux\
    \ Foundation. As of 2022, Kubernetes is a *de facto* industry standard to orchestrate\
    \ Cloud Native applications.\n\n`K3s` and `KubeEdge` represent two distinct ways\
    \ of slimming down Kubernetes for Edge environments. Their governance model is\
    \ also different. The former is a project initiated by [Rancher Labs](https://rancher.com/)\
    \ (since then purchased by SUSE). The latter is under the stewardship of the CNCF.\
    \ Both code bases are made available under the [Apache License version 2](https://www.apache.org/licenses/LICENSE-2.0.txt).\n\
    \n[K3s](https://k3s.io/) packages every component as a single binary and can leverage\
    \ the SQLite embedded database instead of `etcd`, which reduces the runtime footprint.\
    \ It also removes a few features from upstream Kubernetes, namely, the cloud provider\
    \ and storage drivers. `K3s` diverges slightly from the upstream code base, but\
    \ the changes are intentionally minimal. The project explicitly intends not to\
    \ change any core Kubernetes functionality.\n\n[KubeEdge](https://kubeedge.io/en/)\
    \ takes a different approach. It provides a set of Cloud and Edge components working\
    \ together to extend Kubernetes at the Edge. `KubeEdge` permits the deployment\
    \ and orchestration of services on edge nodes and metadata synchronization with\
    \ the Cloud. It also enables the centralized management of edge nodes from a Cloud-based\
    \ Kubernetes control plane. The runtime footprint of the `Edged` agent, which\
    \ manages containerized applications on the edge nodes, can be as low as 10 MiB.\n\
    \nFigure [11-7](#524096_1_En_11_Chapter.xhtml#Fig7) contrasts the architectures\
