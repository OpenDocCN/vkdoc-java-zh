    Figure 14-1


    A billboard on ice^([^(68)](#fn68))


    So my advice to you is this: defend user privacy ferociously. And if you are thinking
    about a new product or business, think about a better business model than selling
    ads. The world doesn’t need yet another AI-enabled money funnel pretending it
    will change our lives. Remember. Contrarily to open source contributors, ads do
    not generate value; they just send the money into a different pocket.


    Finally comes the issue of short-sightedness. A few weeks before I wrote this
    conclusion, Google announced they would discontinue their IoT Core service in
    2023\. The platform’s customers now need to scramble to find an alternative. This
    is one in a long string of such decisions stranding end users and developers by
    the search giant. In the past, people have even been left with broken, irreparable
    smart homes. Why? The proprietary hub driving them had been killed without a replacement
    or migration path, so all devices had to be replaced. That said, all of Google’s
    major competitors are guilty of the same, and many smaller organizations are as
    well. Naturally, I am not suggesting that commercial organizations maintain unprofitable
    products forever. But why not open-source the code of those discontinued products?
    Wasting the years of development effort that went into them is waste humanity
