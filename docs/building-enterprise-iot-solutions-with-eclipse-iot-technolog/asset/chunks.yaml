  trans: "\n## 关于本书\n\n本书旨在教你如何使用开源组件构建企业级物联网解决方案。具体而言，它聚焦于在 [Eclipse 基金会](https://eclipse.org)\
    \ 旗下 [Eclipse IoT](https://iot.eclipse.org)、[Edge Native](https://edgenative.eclipse.org)\
    \ 和 [Sparkplug](https://sparkplug.eclipse.org) 工作组中发现的众多库和平台。Eclipse IoT 于 2021\
    \ 年庆祝了其十周年纪念，是业界规模最大、最成功的物联网开源社区。本书也讨论了相关的非 Eclipse 开源项目。\n\n尽管本书涉及硬件问题，但其重点在于软件及相关开放标准。如果你是物联网爱好者，你将学会如何在企业环境中应用你的技能。如果你是物联网新手，你将了解许多成熟技术的优缺点。这两类读者都将理解如何使用最广泛应用的物联网技术的\
    \ Eclipse 开源实现。\n\n在整本书中，概念将通过实际部署的示例加以说明。所提供的示例涵盖了多种用例，例如工业自动化、智慧农业、数字建筑、车联网等。\n\
    \n本书包含三个主要部分：\n\n*   **基础与协议：** 本部分介绍了贯穿全书使用的参考架构，以及适用于受限设备、边缘设备和物联网平台的通用技术。\n\
    \n*   **受限设备：** 本部分讨论了如何选择将在现场部署的硬件和软件组件。\n\n*   **边缘计算与物联网平台：** 本部分解释了边缘计算本身以及为何应依赖它。它还涵盖了边缘工作负载编排和网关，然后介绍了几个基于微服务的物联网云平台，这些平台暴露了定义明确、稳定的\
    \ API。这些平台不绑定到特定的云提供商，适用于私有云、混合云或公有云环境。\n\n大多数章节都包含代码示例或分步说明，以帮助你开始使用所讨论的组件和平台。我真诚地希望你会发现它们有所帮助。\n\
    \n现在，让我们开始吧！\n\n致谢\n\n衷心感谢我的妻子 Roxanne。她知道这个项目需要占用我多少时间，却始终如一地支持我。你真是我的辉夜姬。\n\n\
    感谢 Eclipse 基金会中支持本书的每一位同仁。我感谢我们的执行董事 Mike Milinkovich 以及生态系统发展副总裁兼我的经理 Paul Buck\
    \ 给予的鼓励。\n\n特别感谢我在 Eclipse 基金会市场团队的搭档 Hassan Jaber。他足够疯狂，竟让他的妻子阅读了引言部分的早期草稿，他们热情洋溢的反馈给了我急需的信心提升。\n\
    \n为本书一个或多个章节提供反馈的技术审阅者们鼓掌。他们中的一些人甚至中断假期来进行审阅。这真是敬业精神！\n\n感谢 Apress 的 Jill Balzano\
    \ 和 Jonathan Gennick。Jonathan 向我提出了撰写本书的想法，我将永远感激这次机会。\n\n最后，我怎能不在此提及我亲爱的 Ashitaka\
    \ 呢？这个项目可能是我那台 2012 年值得信赖的联想 ThinkStation S30 的最后一个大项目了。\n\n关于作者 关于技术审阅者 脚注 1\
    \   2   3\n\n# 第一部分 基础与协议\n\n# 1. 什么是物联网？\n\n> *Un tas de pierres cesse d'être\
    \ un tas de pierres dès lors qu'un seul homme le contemple avec, en lui, l'image\
    \ d'une cathédrale.*\n\n> *一堆石头，一旦有一个人心中怀着大教堂的形象去凝视它，就不再是一堆石头了。*\n> \n> ——安托万·德·圣-埃克苏佩里，《战斗飞行员》\n\
    \n物联网是数百年演进的顶峰。像轮子和简单机械这样的创新，其起源如今已被遗忘，消失在史前的迷雾中。人类很早就学会了利用水和风的力量。历史学家将水车的起源追溯到\
    \ 3000 多年前的古希腊；至于风车，它们以我们今天所知的形式开始出现在公元 8 世纪和 9 世纪的中东和西亚。1712 年，托马斯·纽科门发明了第一台商业上成功的蒸汽机。因此，18\
    \ 世纪是机械化的世纪。19 世纪和 20 世纪见证了两次根本性的技术转型：电气化和计算机化。到 20 世纪 80 年代，计算机开始接管工厂和办公室。\n\n\
    尽管我们可以将其根源追溯到 20 世纪 60 年代，但互联网是在 20 世纪 90 年代初腾飞的。它逐渐从一个基于文档的平台转变为一个动态的应用平台。然而，与此同时，经济实惠的无线数据连接的出现——移动宽带互联网接入随着\
    \ 1991 年第二代（2G）移动连接的出现而诞生——是使物联网成为可能的关键性进步。2G，连同 Wi-Fi 网络和蓝牙，改变了游戏规则。尽管“物联网”一词是由凯文·阿什顿在\
    \ 1999 年创造的，^(⁴) 但许多人仍然不确定其含义。我的目标就是改变这一点。\n\n为了实现这一目标，我将首先解释什么是物联网，以及它与其他当前技术趋势有何不同。其次，我将定义边缘计算以及物联网如何利用它。然后，我将介绍一个跨越受限设备、边缘节点和物联网平台的物联网参考架构。最后，我将讨论物联网协议，这些协议在架构中扮演着横向角色，并将其他组件整合在一起。\n"
- fmt: '# IoT and Other Current Trends


    Before going any further, let’s try to define IoT itself. Many different definitions
    are floating around. Here are a few which I find meaningful:


    * **Gartner:**^([⁵](#fn5)) *The Internet of Things (IoT) is the network of physical
    objects that contain embedded technology to communicate and sense or interact
    with their internal states or the external environment.*

    * **Wikipedia:**^([⁶](#fn6)) *The Internet of Things (IoT) describes physical
    objects (or groups of such objects) that are embedded with sensors, processing
    ability, software, and other technologies, and that connect and exchange data
    with other devices and systems over the Internet or other communications networks.*

    * **Alexander S. Gillis:**^([⁷](#fn7)) *The Internet of Things, or IoT, is a system
    of interrelated computing devices, mechanical and digital machines, objects, animals,
    or people that are provided with unique identifiers (UIDs) and the ability to
    transfer data over a network without requiring human-to-human or human-to-computer
    interaction.*


    While they are a good starting point, the definitions reproduced before do not
    catch some nuances I feel are essential. Here are the three main nuances missing
    from those definitions:


    * **The I in IoT means “Network”:** Connectivity is a given when working with
    the IoT. However, not all deployments rely on carrier networks or the public Internet.
    Many narrowband technologies can integrate directly to a local wired or wireless
    network without Internet connectivity.

    * **This is not just about sensors:** Most IoT devices can count on an array of
    sensors to report the state of the physical world. They can do much more than
    just gathering data, however. When equipped with actuators, IoT devices can accept
    commands and interact with their environment. They can turn on lights, adjust
    the position of a valve, and increase the speed of a ventilator; the possibilities
    are endless.

    * **There is a human element:** IoT devices exist in the physical world, as humans
    do. There are several use cases where adding human user interface controls to
    a device makes sense. In some instances, such as autonomous forklifts and trucks
    used in warehouses or around industrial sites, workers can even use the controls
    to take over the vehicle. Orderly coexistence between humans and devices will
    become increasingly important.


    Given the points I make previously, I feel the following definition is probably
    the best compromise:


    > *The Internet of Things (IoT) is a system of networked physical objects that
    contain embedded hardware and software to sense or interact with the physical
    world, including human beings.*


    Now that we have a clear understanding of the IoT, let’s disambiguate it from
    a few related concepts.


    * **M2M (machine to machine) communication:** This term has been in use for a
    while; in fact, Eclipse M2M was the initial name of the Eclipse IoT working group.
    The rise of industrial computing saw machines being connected through point-to-point
    connections initially. Nowadays, industrial networks are commonplace in factories.
    M2M is a concept rooted in industrial automation and closely related to operational
    technology.

    * **Web of Things:** The [Web of Things](https://www.w3.org/WoT/) (WoT) is a set
    of standards from the [World Wide Web Consortium](https://www.w3.org/) (W3C) that
    aim to enable “easy integration across IoT platforms and application domains.”
    WoT is strictly focused on software and much narrower in scope than IoT. The [Eclipse
    Thingweb project](https://www.thingweb.io/) is the official reference implementation
    of the W3C WoT Working Group.

    * **Industry 4.0:** The ongoing digitalization of the industrial sector has led
    some to consider that a fourth industrial revolution is underway. The “Industry
    4.0” moniker refers to that. M2M and IoT represent technological approaches that
    make possible the automation of traditional manufacturing and industrial processes.
    Ultimately, Industry 4.0 will lead to the widespread adoption of intelligent machines
    capable of making their own decisions through artificial intelligence (AI).

    * **Industrial Internet of Things (IIoT):** This one is relatively straightforward.
    IIoT is the application of IoT technologies to industrial applications, such as
    manufacturing, asset tracking, and energy management. IIoT solutions usually replace
    legacy control systems intending to improve productivity and efficiency.


    Ultimately, IoT devices must send their data somewhere; the commands they receive
    must have an origin. The Cloud is typically both the destination of the data and
    the source of the commands; whether this Cloud is private, hybrid, or public is
    irrelevant. However, connecting IoT devices directly to the Cloud is not always
    possible or desirable. For this reason, contemporary IoT solutions often rely
    on edge computing.'
