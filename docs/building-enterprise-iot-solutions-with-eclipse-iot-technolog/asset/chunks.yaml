  trans: '

    ### FreeRTOS


    长期以来，FreeRTOS 一直是面向受限设备的市场中占主导地位的 RTOS，无论其是否开源。在 [2021 年 Eclipse IoT 与边缘开发者调查](https://outreach.eclipse.foundation/iot-edge-developer-2021)中，近
    30% 的受访者表示正在使用它。其受欢迎的部分原因在于其历史悠久。FreeRTOS 内核由 Richard Barry 于 2003 年左右创建，随后由 Barry
    的公司 Real Time Engineers 维护。2017 年，该项目的管理权移交给了亚马逊云服务（AWS）。Barry 仍以 AWS 员工的身份参与其中。FreeRTOS
    大部分是用 C 语言编写的，但在特定架构的调度器例程中使用了汇编语言。在撰写本文时，内核的最新版本是 v10.4.6，于 2021 年 11 月发布。完整操作系统包（包括示例项目和附加库）的最新版本是
    v202112.00。内核以及 FreeRTOS 团队维护的所有其他组件均根据 [MIT 许可证](https://opensource.org/licenses/MIT)提供。


    FreeRTOS 拥有广泛的硬件支持。在撰写本文时，FreeRTOS 网站上列出了 24 个硬件合作伙伴，并且开源社区还支持其他几个平台。^(⁵⁴) 该团队将每种架构和编译器的组合视为一个独立的移植版本。这些移植版本属于以下四个类别之一：


    *   由 FreeRTOS 团队创建和维护的移植版本（官方支持的移植版本）

    *   由合作伙伴贡献并由 FreeRTOS 团队维护的移植版本

    *   由合作伙伴贡献并由该合作伙伴维护的移植版本

    *   社区支持的移植版本


    这些移植版本保存在独立的 Git 仓库中，但在[主 FreeRTOS 仓库](https://github.com/FreeRTOS/FreeRTOS)中作为子模块暴露。长期支持（LTS）版本仅包含
    FreeRTOS 团队维护的移植版本。此外，商业支持也是可用的，但仅针对官方支持的移植版本。


    FreeRTOS 团队不直接提供开发工具。项目主 Git 仓库中的大多数演示都配置为使用 [Eclipse IDE](https://eclipseide.org/release/)，特别是
    [Eclipse CDT](https://www.eclipse.org/cdt/)（C/C++ 开发工具）版本。也可以使用专门的 [Eclipse Embedded
    CDT](https://eclipse-embed-cdt.github.io/) 版本，该版本附带用于创建、构建和管理针对 Arm 和 RISC-V 平台应用程序的插件。许多硬件提供商也提供基于
    Eclipse IDE 或 Eclipse Theia 的自己的 IDE。当然，鉴于代码库的简洁性，大多数支持 C 语言的 IDE 都可以使用。


    与我在此部分介绍的其他操作系统相比，FreeRTOS 的结构非常简单。除了内核本身之外，该团队还维护着三个特定的库集。让我们仔细看看这四个组件。


    #### FreeRTOS 内核


    FreeRTOS 内核所需资源极少。一个典型的二进制映像通常大小在 6 到 12 KiB 之间。核心实现很简单，因为它只包含在三个 C 文件中。


    FreeRTOS 提供了操作任务、互斥量、信号量和软件定时器的原语。开发者可以指定线程优先级。内核支持静态内存分配。动态分配也是可能的，并且内核附带了五种示例内存管理方案。这五种方案如下：


    *   **heap_1**：内核将分配内存，但无法释放。

    *   **heap_2**：内核将分配和释放内存，但不会将已释放的内存块与相邻的空闲块合并。此方案是遗留方案，推荐使用 heap_4。

    *   **heap_3**：内核将依赖于编译器提供的标准 C 库中的 malloc() 和 free() 实现。这些调用被包装以实现线程安全。

    *   **heap_4**：内核将分配和释放内存。它还会将已释放的内存块与相邻的空闲块合并以避免碎片化。

    *   **heap_5**：内核将像 heap_4 一样管理内存，并且可以将堆分布在非连续的区域。


    当然，你也可以提供自己的内存管理实现。在静态和动态内存分配之间的选择，将归结于你是更倾向于简单性以及可能更低的内存使用量，还是更倾向于对内存位置的控制。


    可以想象，鉴于其大小，FreeRTOS 内核的功能范围非常小。幸运的是，该团队还提供了几个实现有用连接和安全功能的库。


    #### FreeRTOS+ 库


    此类别中的库依赖于 FreeRTOS 内核。在撰写本文时，FreeRTOS+ 类别中有两个库：


    *   **FreeRTOS+TCP**：一个完整的 TCP/IP 协议栈，基于广泛使用的 Berkeley 套接字接口，提供可重入且线程安全的 API。它包括
    DHCP 和 DNS 等功能。还提供了一个可选的回调接口。启用所有功能后的代码大小在 20.1 到 34.9 KiB 之间，具体取决于所选的编译器优化。

    *   **FreeRTOS+CLI**：一个小型且可扩展的框架，用于向 FreeRTOS 应用程序添加命令行界面（CLI）。


    第三个库 FreeRTOS+IO 曾提供类似 POSIX 的 API 用于外设驱动库，但现已弃用。

    '
- fmt: '# FreeRTOS Core Libraries


    The libraries in this category implement connectivity and security features based
    on open standards. They depend only on the standard C libraries and, as such,
    can be used with other kernels than the FreeRTOS one. Here is the list of libraries
    in this category:


    - **coreMQTT:** A lightweight MQTT client. The library implements MQTT 3.1, and
    all QoS levels are available. It also supports TLS for encrypted communications.
    The code size varies between 5.7 and 6.9 KiB, depending on the optimizations.


    - **coreMQTT Agent:** A library that expands `coreMQTT` by adding a thread-safe
    API. You can use it to create a dedicated task to handle MQTT traffic in your
    application; other tasks will not be allowed to use the `coreMQTT` API. `CoreMQTT
    Agent` includes the code of `coreMQTT`. Code size is between 7.4 and 8.9 KiB.


    - **coreHTTP:** A partial client implementation of the HTTP protocol. The library
    exposes a synchronous API that you can use to serialize headers, send a request
    to a remote server, and process the response. The library works with TLS and can
    be used for calling REST web services. Code size varies between 15.6 and 18.9
    KiB.


    - **coreSNTP:** A client implementation of the Simple Network Time Protocol (SNTP).
    The library implements v4 of SNTP as defined in [RFC 4330](https://tools.ietf.org/html/rfc4330).
    Synchronizing the clock of your constrained devices ensures that the times reported
    by your applications are accurate and can alleviate the lack of a real-time clock
    in some devices. SNTP is a subset of the Network Time Protocol (NTP) found on
    personal computers and servers; it requires fewer memory and compute resources
    than NTP. Code size falls between 2.0 and 2.5 KiB.


    - **Transport Interface:** A way to decouple protocol implementations from the
    underlying network drivers. Implementations of the interface contain function
    pointers and context data for sending and receiving over a network connection.
    FreeRTOS provides sample implementations, and you can provide your own. Since
    they rely on the Transport Interface, `coreMQTT` and `coreHTTP` do not have a
    dependency on any specific TCP/IP stack, including FreeRTOS+TCP.


    - **coreJSON:** A JSON parser that complies with the JSON data interchange syntax
    standard ([ECMA-404](https://www.ecma-international.org/publications-and-standards/standards/ecma-404/)).
    The library supports key lookups and relies on an internal stack to track nested
    structures. Code size is between 2.4 and 2.9 KiB.


    - **corePKCS #11:** A hardware-independent implementation of the PKCS#11 API that
    specifies an API for devices storing cryptographic information and performing
    cryptographic functions. Usually, the makers of cryptographic hardware such as
    Trusted Platform Modules (TPM) and Hardware Security Modules (HSM) provide a PKCS#11
    implementation with their products. The `corePKCS11` library lets you quickly
    prototype and build applications before switching to a vendor-specific PKCS#11
    library in the production code.


    - **FreeRTOS Cellular Interface Library:** A library that encapsulates the TCP/IP
    stack for three popular cellular modems and exposes a uniform API. The three supported
    modems are the [Quectel BG96](https://www.quectel.com/product/lte-bg96-cat-m1-nb1-egprs/),
    the [Sierra Wireless HL7802](https://www.sierrawireless.com/products-and-solutions/embedded-solutions/products/hl7802/),
    and the [U-Blox Sara-R4](https://www.u-blox.com/en/product/sara-r4-series).


    # FreeRTOS for AWS IoT


    The libraries in this category provide clients for various AWS-specific IoT Cloud
    services. The features cover over-the-air updates (AWS IoT OTA), digital twins
    (AWS IoT Device Shadow), task notifications (AWS IoT Jobs), security metrics reporting
    (AWS IoT Device Defender), device provisioning (AWS IoT Fleet Provisioning), and
    digital signatures (AWS Signature Version 4). The libraries depend only on the
    standard C libraries and can be used with other kernels than the FreeRTOS one.


    # The Lowdown


    Overall, FreeRTOS is a flexible and very small footprint operating system. Its
    broad support in the industry means a wealth of compatible libraries and several
    hardware suppliers to choose from. The lack of vendor-neutral governance around
    the project is a concern, however. Additionally, the tight integration with the
    AWS ecosystem is both a productivity boost and a potential long-term liability.
    Although the officially supported ports and libraries are of known origin and
    are not burdened by intellectual property issues, the same cannot necessarily
    be said for partner or community-maintained ports. The small functional footprint
    also means you will need to source third-party libraries to support specific hardware
    or features, which could lead to maintenance issues.'
