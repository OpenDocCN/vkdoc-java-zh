- fmt: '# Choosing an MCU


    With so many choices, selecting an MCU can be a daunting task. Ultimately, the
    requirements of your use case should guide your decisions. Here is a list of questions
    you should ask yourself:


    - **Do you need to process more than a few events per second?** The primary advantage
    of 16-bit and 32-bit microcontrollers over 8-bit is their speed. If all you need
    to do is record the current temperature and humidity every ten seconds, then even
    an 8-bit microcontroller will do the trick. Of course, running an AI model integrating
    the real-time values of over a hundred sensors to perform predictive maintenance
    on a locomotive would require a higher-end MCU. Your use case will probably be
    between those two extremes.


    - **Do you need to compute large numbers?** It is possible to compute large numbers
    on an 8-bit MCU. However, those calculations will be much faster on 16-bit and
    32-bit hardware. If you need to perform image processing, video analytics, or
    even digital signal processing leveraging fast Fourier transforms, an 8-bit MCU
    running in the low MHz is completely out of the question.


    - **Do you need advanced connectivity?** Driving advanced I/O interfaces, especially
    several of them simultaneously, requires more processing power than what an 8-bit
    MCU can provide. If you need Ethernet, Universal Serial Bus (USB), a Controller
    Area Network (CAN) bus, or multiple universal asynchronous receiver-transmitter
    devices (UARTs), then go for a 32-bit MCU.


    - **What peripherals do you need?** Some MCUs offer the bare minimum, while others
    will add plenty of built-in peripherals and even sensors.


    - **How critical is preserving battery life?** 32-bit microcontrollers consume
    more power than 8-bit ones. Of course, this can be somewhat mitigated by putting
    processor cores and other devices to sleep when not in use. However, 8-bit MCUs
    have a battery life advantage that explains their continued availability in the
    market.


    Another dimension to that decision is whether you will use wireless connectivity
    or not. If you use a radio to connect to the network, it will likely constitute
    the most power-hungry component onboard, whether it involves BLE, LoRaWAN, LTE-M,
    or other technologies. Power usage will influence which connectivity option is
    the best if battery life is core to your use case.


    - **What software does your target MCU support?** Not all MCUs benefit from the
    same level of software support. You need to consider software development kits
    (SDKs), libraries, and even real-time operating systems. Broader software support
    offers you more choice in building your solution.


    Ultimately, it would be best if you always experimented in conditions as close
    to real-life one as possible before committing to a specific hardware platform
    for the long run.


    # Sensors and Actuators


    Once you have selected your MCU, the next step is to find sensors and actuators
    that can interface with it and fulfill your requirements. Covering in detail the
    wide variety of sensors currently on the market would require a stand-alone book.
    I will rather focus on the various ways to interface sensors and actuators with
    your MCUs. But before that, let’s look at the main characteristics you should
    watch when selecting sensors.


    ## Sensor Characteristics


    The quality of the measurements made by sensors is influenced by their design
    characteristics. Most of those influence the price and durability of the sensor.
    Here is a list of the main characteristics you should pay attention to:


    - **Accuracy:** The accuracy reflects how well the value returned by the sensor
    conforms to the actual value. The accuracy is determined by several other factors,
    such as sensitivity, resolution, noise, systematic errors, and aging. In most
    cases, sensitivity and noise are more important than accuracy. You need to consider
    all possible sources of inaccuracy.


    - **Measurement range:** This is the range of values for which the sensor can
    return accurate readings. Trying to measure values outside the measurement range
    will return incorrect signal values.


    - **Reliability and precision:** A sensor should consistently return the same
    value for the same measurement. For example, when measuring the size of a piece
    of wood, the sensor should return the same value for consecutive measurements
    and measurements made after an arbitrary period. In other words, if the actual
    length of the piece of wood stays the same, the sensor should always return the
    same value. That said, environmental factors can insert variations in the readings.
    Specific sensors may also become less reliable and precise as they age. You can
    compensate for this in software, granted that you gathered enough information
    to do so through experimentation or direct experience with the sensor. Regular
    calibrations could also address the issue, although this is not possible for all
    sensors.


    - **Resolution:** The sensor''s resolution is the smallest difference that is
    capable of capturing. Suppose you wish to measure the distance to an object. The
    object is 2 meters away. If your sensor’s resolution is 2 mm, the values it will
    return can be 1.998 m, 2.000 m, and 2.002 m.


    - **Sampling rate:** The sampling rate, or sampling frequency, is how often measurements
    are taken. The sampling rate should be at least twice the frequency of the variations
    in the signal; this is called the Nyquist criterion.


    - **Sensitivity and noise:** Those two factors are closely related. Sensitivity
    is the ratio between the output signal and the value measured. For example, when
    measuring ambient temperature in Celsius with a voltage output sensor, the sensitivity
    is expressed in V/c. On the other hand, noise is unwanted variations in the measured
    signal. It is often expressed as signal-to-noise ratio (SNR) for sensors. The
    noise level is affected by several external factors, such as electrical interference,
    temperature, and vibrations.


    As you can see, you need to elicit and document your requirements properly to
    select the right sensors. Many issues in IoT-enabled industrial processes can
    be solved by using a different type of sensor or moving the existing sensor to
    a different location. Also, you should always deploy redundant sensors for critical
    steps in any process. The overall reliability of the solution will greatly outweigh
    the added costs.'
