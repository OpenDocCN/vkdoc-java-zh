    要发布一些智慧，你可以使用此命令：


    ```

    mosquitto_pub -h fedora -p 8883 -t wisdom/Rome -m ''Carpe Diem'' --cafile mosquitto_ca.crt
    -–cert mqtt_client.crt

    ```


    ### 沙箱服务器


    在 `test.mosquitto.org` 上有一个公开可用的 Mosquitto 实例，端口为 1883 和 8883。它支持纯 MQTT、基于 TLS
    的 MQTT、基于 TLS（带客户端证书）的 MQTT、基于 WebSocket 的 MQTT 以及基于 TLS 的 WebSocket MQTT。


    Eclipse Paho 团队也维护着一个 Mosquitto 沙箱。可以在 `mqtt.eclipseprojects.io` 上找到它，端口为 1883
    和 8883。它支持纯 MQTT 和基于 TLS（带客户端证书）的 MQTT。


    这两个服务器始终运行最新版本。请负责任地使用它们，并且不要在生产应用程序中依赖它们。这些服务器上没有配置访问控制，因此你发布的任何数据都将对所有用户可见。


    ## 使用 Eclipse Paho 构建客户端


    `mosquitto_pub` 和 `mosquitto_sub` 是基于 [libmosquitto](https://mosquitto.org/man/libmosquitto-3.html)
    构建的有用故障排除工具，libmosquitto 是一个 C 语言库，你可以使用它将 MQTT 支持集成到你的程序中。


    libmosquitto 的一个替代方案是 Eclipse Paho [MQTT 客户端库集合](https://www.eclipse.org/paho/index.php%253Fpage%253Ddownloads.php)。Paho
    提供以下语言的 MQTT 客户端库：C、C# (.Net)、C++、GoLang、嵌入式 C/C++（适用于受限设备）、Java、JavaScript、Python
    和 Rust。还有一个可用的 Android 服务。每个库都是独立开发的，并且至少支持 MQTT 3.1.1。Paho 提供许多高级功能，例如自动重连、离线缓冲、高可用性以及阻塞和非阻塞
    API 的选择。并非所有库都支持所有可能的功能，但 Java、C 和 C++ 版本支持。


    与 Mosquitto 一样，Paho 根据 Eclipse 分发许可证 v1.0 和 Eclipse 公共许可证 v2.0 发布。


    现在，我将向你展示如何利用 Paho 的 Java 和 Python 版本来构建简单的 MQTT 程序。

