  trans: '

    ### IoT 平台


    如果说受限设备负责收集数据，边缘节点在靠近数据源的物理位置进行处理，那么可以说 IoT 平台负责管理和分析数据。然而，这种说法仅表达了 IoT 平台功能的一部分。它们还提供运行应用程序所需的基础设施，这些应用程序利用数据以及集成功能，将受限设备和边缘节点与企业
    IT 管理的其他基础设施连接起来。


    在我们的架构中，与 IoT 平台相关的第一组概念涉及数据。数据是 IoT 的核心组成部分。传感器生成数据，执行器则执行由数据驱动决策所产生的命令。在此背景下，机器学习（ML）是
    IoT 平台的一项关键能力，因为它旨在将原始数据转化为知识。开发者可以利用许多流行的开源机器学习框架，例如 [TensorFlow](https://www.tensorflow.org/)
    和 [scikit-learn](https://scikit-learn.org/stable/)。有些 ML 框架甚至从一开始就为边缘部署而设计，例如
    [TensorFlow Lite](https://www.tensorflow.org/lite) 和 [Apache MXNet](https://mxnet.apache.org/versions/1.8.0/)。Eclipse
    基金会旗下有多个与 ML 相关的项目，其中最为成熟且被广泛采用的是 [Eclipse Deeplearning4j](https://deeplearning4j.org)。Deeplearning4j
    是一套用于在 JVM 上运行深度学习的工具集，它允许开发者使用 Java 语言训练模型，并提供与 Python 生态系统的互操作性。


    分析是描述使用数据分析工具和流程的另一个术语。该领域存在一个蓬勃发展的解决方案市场，既有专有软件也有开源软件。Bruce Sinclair 区分了三类分析：^(¹⁰)


    *   **实时分析：** 在数据获取后立即执行分析，以发现异常情况。

    *   **预测分析：** 分析当前和历史数据以生成预测和置信度。

    *   **描述性分析：** 报告过去、现在或未来数据的分析，通常是可视化的基础。


    [Eclipse Streamsheets](https://docs.cedalo.com/streamsheets/2.5/introduction)
    是一个用于访问、创建和管理基于服务器的电子表格的平台，这些电子表格可以消费、处理并生成实时数据流。除了数值数据外，这些电子表格还可以包含多种类型的图表，使用户能够创建交互式仪表板。Streamsheets
    开箱即用地支持多种 IoT 协议。


    数据管理将数据视为宝贵资源，并提供治理、工具和方法来访问、集成、清理和存储数据。数据管理是一个庞大的功能领域，涵盖数据库管理系统、大数据系统、数据仓库和数据湖。数据建模也是一个至关重要的问题，因为模型是开发者在构建软件时使用的有用抽象。[Eclipse
    Kapua](https://www.eclipse.org/kapua/) 项目提供了一个模块化的 IoT 平台，具备强大的数据管理功能。Kapua 用户还可以通过构建动态仪表板来执行
    IoT 分析。


    现在让我们关注集成，这是参考架构中 IoT 平台特有的第二组概念。这组概念包含三个子概念：数据集成、设备连接和设备管理。值得一提的是，Eclipse Kapua
    实现了所有这三个概念，并与运行 Eclipse Kura 的网关提供了简化的集成。


    数据集成是从多个数据源创建统一信息源的过程。数据管理技术和方法的多样性使得数据集成成为架构中的关键功能。当然，模型和数据共享框架也是数据集成的关键组成部分，因为如果数据没有以标准化和一致的方式表达，整合数据将相当困难。[Eclipse
    Dataspace Connector](https://dataspace-connector.io/) 项目提供了一个基于通用身份模型构建的可互操作数据共享框架。它将实现[国际数据空间标准
    (IDS)](https://internationaldataspaces.org/) 和 [GAIA-X](https://www.gaia-x.eu/)
    欧洲项目的协议。另一个相关项目是 [Eclipse Thingweb](https://www.thingweb.io/)，它是万维网联盟 (W3C) 提出的[*物联万维网*
    (WoT)](https://www.w3.org/WoT/wg/) 模型的一个实现。WoT 旨在提供标准元数据和 API，以实现跨 IoT 平台和应用领域的集成。如果你对
    WoT 感兴趣，可能还想了解 [Eclipse EdiTDor](https://github.com/eclipse/editdor)，这是一个用于创建和编辑
    WoT 工件的工具，可[在线使用](https://eclipse.github.io/editdor/)。


    虽然网络和协议提供了基本的设备连接能力，但大规模部署 IoT 解决方案通常需要连接到大量受限设备。此外，这些设备可能来自不同的供应商，并且不一定使用相同的协议——无论是由于限制还是设计决策。[Eclipse
    Hono](https://www.eclipse.org/hono/) 提供了远程服务接口，以协议无关的方式与 IoT 设备交互。设备可以向 Hono 发送*遥测*和*事件*消息以报告传感器读数；应用程序可以向设备发送*命令*消息。在后台，Hono
    支持 AMQP、CoAP、HTTP 和 MQTT 协议，开发者可以根据需要构建自定义协议适配器。


    设备管理的核心涵盖设备的操作和维护。IoT 平台需要维护设备注册表并记录每个设备的更新历史以实现这一目标。由于 IoT 设备在硬件、配置和能力方面差异巨大，用于控制计算机和移动设备的设备管理平台的许多功能在
    IoT 环境中并不需要。然而，一个强大的软件更新交付后端是必不可少的。最先进的解决方案支持部分下载，并允许设备恢复中断的文件传输。[Eclipse hawkBit](https://www.eclipse.org/hawkbit/)
    是一个领域无关的后端框架，用于向受限设备推出软件更新，它提供了上述功能以及更多。特别是，hawkBit 的设备管理联盟 (DMF) API 使得利用包含设备管理功能的协议（例如轻量级
    M2M (LwM2M)）中的设备管理特性成为可能。


    归根结底，应用程序是 IoT 平台需要收集数据并提供集成能力的原因。在现场部署受限设备是达到目的的一种手段，为应用程序提供了所需的基础设施。Eclipse
    生态系统提供了应用程序运行时和 API 管理能力。此外，ioFog 和 fog05 边缘计算平台实现了 EdgeOps 的核心原则，EdgeOps 是专门针对边缘环境演进而来的
    DevOps 方法。

    '
- fmt: '2021年Eclipse IoT与Edge开发者调查发现，在物联网平台中，开发者最青睐的三种语言是`Python`（22%）、`Java`（18%）和`JavaScript`（16%）。但运行时环境呢？对于`Python`，`Python`解释器就是运行时；对于`JavaScript`，`Node.js`是最流行的运行时。那么`Java`呢？过去几年，`Java`生态系统见证了Eclipse基金会成为其核心枢纽。这始于[Microprofile](https://microprofile.io/)项目的创建，该项目是一个为微服务架构优化企业级`Java`的平台定义。这一趋势随着Oracle将`Java
    Enterprise Edition`及其他技术贡献给Eclipse而延续；这些技术现在以新名称[Jakarta EE](https://jakarta.ee)蓬勃发展。2020年底，OSGi联盟宣布将过渡到Eclipse基金会。`OSGi`是一个流行的`Java`动态模块系统，在物联网市场得到了广泛采用，`Eclipse
    Kura`是最突出的采用者之一。随后在2021年初，`AdoptOpenJDK`倡议成为Eclipse的[Adoptium工作组](https://adoptium.net/index.html)。[Eclipse
    Temurin](https://www.Eclipse.org/Temurin/)是`Adoptium`提供的`OpenJDK`发行版名称。Eclipse基金会是云原生`Java`的家园，我之前讨论过的几个物联网平台都使用了这项技术。


    > **注意**：关于Eclipse开源项目的一个常见误解是，基金会强制要求使用`Java`编程语言和[Eclipse公共许可证](https://www.eclipse.org/org/documents/epl-2.0/EPL-2.0.html)（`EPL`）。实际上并没有此类限制。项目可以自由选择其使用的语言。至于许可，虽然可以使用`EPL
    v2.0`，但项目也可以根据需要选择`Apache 2.0`、`MIT`和`BSD`许可证。双重许可也是可行的，`EPL v2.0`甚至支持使用`GNU通用公共许可证`（`GPL`）2.0版或更高版本作为次要许可证。


    从总体角度来看，`API`管理是一种创建、发布和监控服务接口运行时性能的方式。在大多数情况下，`API`管理平台会强制执行使用策略和访问控制。过去几年，数字孪生的概念在物联网市场越来越受欢迎。数字孪生只是物理设备或资产的虚拟表示，通过实时数据进行更新。[Eclipse
    Ditto](https://www.eclipse.org/ditto/)项目提供了同步和异步`API`来与数字孪生交互，并在每次`API`调用时执行基于资源的访问检查。因此，`Ditto`是一个专注于数字孪生的`API`管理平台。此外，它还执行状态管理；`Ditto`会跟踪其监控设备的报告状态、期望状态和当前状态，并负责发布状态变更。


    最后，还有`EdgeOps`。也许你会问自己，既然`DevOps`已经改变了我们构建、部署和监控软件的方式，为什么还需要这样的东西？答案很简单。纯粹的`DevOps`方法在云或企业数据中心之外无法奏效。当然，容器化的微服务在边缘计算中至关重要，基础设施即代码也是如此。开发与运维之间的紧密协作也是一个巨大的优势，无论你的组织是否合并了这两个团队。然而，许多物联网和边缘部署都有严格的实时要求，或者承担着关键任务角色。在这种情况下，持续集成与持续交付（`CI/CD`）必须考虑环境的约束。这解释了我之前为什么说`EdgeOps`是`DevOps`在边缘场景的改编。`ioFog`和`fog05`作为边缘计算平台如此强大的原因在于，它们的贡献者从一开始就为边缘场景构建了它们。它们是`EdgeOps`的具体体现。


    还有一个我尚未提及但你应该了解的Eclipse项目：[Eclipse Arrowhead](https://www.arrowhead.eu/eclipse-arrowhead)。`Arrowhead`是一个框架，使开发者能够构建、设计、实现和部署自动化系统之系统。从物联网的角度来看，你可以用它来编排物联网平台的各个组件。它甚至提供了多种有价值的服务，例如事件处理器、设备注册表和设备管理器。


    现在我们已经完成了对参考架构的巡览，让我们回到协议这个话题。正是协议将受限设备、边缘节点和物联网平台连接在一起。'
  raw: 'The 2021 Eclipse IoT and Edge developer survey found that for IoT platforms,
    the top three languages favored by developers are Python (22%), Java (18%), and
    JavaScript (16%). But what about runtimes? In the case of Python, the Python interpreter
    is the runtime; for JavaScript, Node.js is the most popular one. But what about
    Java? In the last few years, the Java ecosystem saw the Eclipse Foundation become
    its nexus. This started with the creation of the [Microprofile](https://microprofile.io/)
    project, which is a platform definition that optimizes Enterprise Java for a microservices
    architecture. The trend continued with Oracle contributing Java Enterprise Edition
    and other technologies to Eclipse; they are now thriving under a new name: [Jakarta
    EE](https://jakarta.ee). At the end of 2020, the OSGi Alliance announced it would
    transition to the Eclipse Foundation. OSGi is a popular dynamic module system
    for Java that has seen significant adoption in the IoT market, with Eclipse Kura
    as one of the most prominent adopters. Then, in early 2021, the AdoptOpenJDK initiative
    became the [Adoptium working group](https://adoptium.net/index.html) at Eclipse.
    [Eclipse Temurin](https://www.Eclipse.org/Temurin/) is the name of the OpenJDK
    distribution from Adoptium. The Eclipse Foundation is the home of Cloud Native
    Java, and several of the IoT platforms I already discussed use the technology.


    Note


    A common misconception about Eclipse open source projects is that the Foundation
    mandates using the Java programming language and the [Eclipse Public License](https://www.eclipse.org/org/documents/epl-2.0/EPL-2.0.html)
    (EPL). There are no such restrictions. Projects are free to leverage the languages
    of their choice. As for licensing, while using the EPL v2.0 is possible, projects
    can also pick the Apache 2.0, MIT, and BSD licenses if they wish. Dual licensing
    is also possible, and the EPL v2.0 even supports using the General Public License
    (GPL) version 2.0 or later as a secondary license.


    From a general perspective, API management is a way to create, publish, and monitor
    the runtime performance of service interfaces. In most cases, API management platforms
    enforce usage policies and access control. In the last few years, the concept
    of digital twins has grown in popularity in the IoT market. A digital twin is
    simply a virtual representation of a physical device or asset updated from real-time
    data. The [Eclipse Ditto](https://www.eclipse.org/ditto/) project provides synchronous
    and asynchronous APIs to interact with digital twins and performs resource-based
    access checks on each API call. Ditto is thus an API management platform focused
    on digital twins. Moreover, it performs state management; Ditto keeps track of
    the reported, desired, and current state of the devices it monitors and takes
    care of publishing state changes.


    Finally, there is EdgeOps. Maybe you are asking yourself why we needed such a
    thing when DevOps transformed how we build, deploy, and monitor software. The
    answer is simple. A pure DevOps approach will not work outside the Cloud or the
    corporate data center. Of course, containerized microservices are essential at
    the edge, as is infrastructure as code. The close collaboration between development
    and operations is also a huge advantage, whether your organization merged the
    teams or not. However, many IoT and Edge deployments have strict real-time requirements
    or assume a mission-critical role. In that context, continuous integration and
    delivery (CI/CD) must consider the environment’s constraints. This fact explains
    why I wrote that EdgeOps is an adaptation of DevOps to the edge earlier. What
    makes ioFog and fog05 so powerful as edge computing platforms is that their contributors
    built them from the ground up for the edge. They are an embodiment of EdgeOps.


    There is one Eclipse project I didn’t mention yet that you should be aware of:
    [Eclipse Arrowhead](https://www.arrowhead.eu/eclipse-arrowhead). Arrowhead is
    a framework enabling developers to build, design, implement, and deploy automation
    Systems of Systems. From an IoT point of view, you can use it to orchestrate the
    various components of an IoT platform. It even provides several valuable services,
    such as an event handler, a device registry, and a device manager.


    Now that we have completed our tour of the reference architecture, let’s circle
    back to protocols. They are what brings constrained devices, edge nodes, and IoT
    platforms together.'
