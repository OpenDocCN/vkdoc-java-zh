    ### Eclipse Ditto


    Eclipse Ditto 是一个数字孪生平台，通过数字孪生体抽象设备交互。它支持设备到云端和云端到设备两种交互方式。使用 Ditto，你可以为新的或现有的设备构建数字孪生体；换句话说，它同时支持棕地（brownfield）和绿地（greenfield）部署。由于所有设备交互都通过其数字孪生体进行编排，Ditto
    对所有 API 调用强制执行授权。该平台还提供了通过 HTTP、WebSockets 以及 MQTT 和 Apache Kafka 等其他广泛使用的协议与数字孪生实例交互的
    SDK。Ditto 被明确设计为云后端。它可以水平扩展，并能够同时为数百万个连接的设备提供数字孪生体。


    博世（Bosch）于 2017 年将 Ditto 项目贡献给了 Eclipse 基金会。Ditto 采用 Eclipse 公共许可证 2.0 版进行许可。在我撰写本文时，当前版本是
    v2.4.0，于 2022 年 4 月 14 日发布。


    Ditto 的官方网络资源如下：


    *   **网站：** [`https://eclipse.org/ditto`](https://eclipse.org/ditto)


    *   **Eclipse 项目页面：** [`https://projects.eclipse.org/projects/iot.ditto`](https://projects.eclipse.org/projects/iot.ditto)


    *   **代码仓库：** [`https://github.com/eclipse/ditto`](https://github.com/eclipse/ditto)


    Ditto 是一个经过深思熟虑的职责分离的典型例子。它的重点仅在于提供数字孪生后端，将设备连接和软件更新留给其他专门的平台。Ditto 的功能范围可以概括如下：


    *   提供 API，抽象物理设备所使用的物联网协议细节


    *   在应用程序与设备之间路由请求，或路由到 Ditto 中持久化的设备最后已知状态


    *   强制执行授权


    *   持久化设备发送的最后已知值


    *   通知相关方有关数字孪生体持久化状态的变更


    *   建立并维护与消息代理的连接，支持第三方应用程序与数字孪生体进行异步交互


    *   在需要时应用负载转换，将现有棕地设备的负载映射为 Ditto 可以理解的格式


    *   维护所有持久化孪生数据的搜索索引


    *   公开 API，用于处理针对整个设备群的传感器数据的查询


    Ditto 中有几个核心实体。以下是这些主要实体的列表：


    *   **Thing（事物）：** 代表设备（物理或虚拟）、交易、主数据或任何可以建模的事物的通用实体。Thing 是数字孪生实例；其交互能力可以通过例如
    WoT Thing Model 来定义。一个 Thing 拥有属性和特征。属性是静态元数据，例如序列号。特征反映 Thing 的状态；例如，这可以是传感器值或配置设置。


    *   **Message（消息）：** 发送到 Thing 所代表实体或从该实体接收的任意负载。发送到设备的消息是应触发操作的操作。从设备接收的消息是由实体传播的事件。Ditto
    不对离线实体执行消息保留。默认情况下，每条消息最多投递一次，这意味着没有投递保证。然而，Ditto 通过确认（acknowledgments）提供了“至少一次”投递的机制。


    *   **Policy（策略）：** 为 Thing、Feature、Message 以及 Policy 本身指定细粒度的访问控制。


    在内部，Ditto 依赖一个基于信号的系统来跟踪数字孪生体（Thing）及其所代表的实体。这些信号包括命令、命令响应、错误响应、事件和公告。Ditto 还管理着指示信号已成功接收或处理的确认。此外，Ditto
    拥有连接（connection）的概念，这是一个具有不同生命周期的独立实体，代表用于交换消息的通道。此类连接可以与设备连接平台（如 Eclipse Hono）、MQTT
    代理或消息服务（如 RabbitMQ 或 Apache Kafka）建立。


    Ditto 还定义了一个同名的协议，已注册为官方的 IANA 媒体类型。该协议依赖 JSON 负载，并且可以在多种网络传输协议上运行，即 AMQP（0.9
    和 1.0）、HTTP 1.1、MQTT（3.1.1 和 5.0）、Kafka 2.x 和 WebSocket。负载代表应用程序数据，并被封装到一个用于将请求路由到其目的地的信封中。为了简化
    Ditto 协议的使用，项目团队维护了 Java 和 JavaScript SDK，你可以在需要创建数字孪生体或与之交互的应用程序中使用它们。你也可以使用
    Ditto REST 和 WebSocket API 达到相同目的。


    Ditto 平台采用微服务实现，这些微服务通过预定义的信号进行异步通信。你可以根据可扩展性需求对每个服务进行水平扩展。以下是这些服务的列表：


    *   **Policies（策略服务）：** 负责 Policy 的持久化。


    *   **Things（事物服务）：** 负责 Thing 及其 Feature 的持久化。


    *   **Things-Search（事物搜索服务）：** 跟踪 Thing、Feature 和 Policy 的变更。该服务还维护一个搜索索引并对其执行查询。


    *   **Concierge（礼宾服务）：** 编排执行持久化的服务，并授权对它们的请求。


    *   **Gateway（网关服务）：** 公开 REST 和 WebSocket API。


    *   **Connectivity（连接服务）：** 通过建立到多个外部消息系统的通道来发送和接收消息。


    图 12-2 展示了这些微服务在 Ditto 架构上下文中是如何交互的。


    ![](img/524096_1_En_12_Fig2_HTML.jpg)


    一个架构包括带有 HTTP 和 WebSocket 的 Nginx；网关；礼宾服务；Apache Kafka 2.x、HTTP 1.1、AMQP 1.0 和
    0.9.1、MQTT 3.1.1 和 5.0 的连接服务；事物服务；事物搜索服务；策略服务；以及 MongoDB。


    图 12-2


    Eclipse Ditto 架构（图片来源：Eclipse 基金会）


    你可能注意到架构中包含了两个第三方组件。一个是 Nginx，用作反向代理；另一个是 MongoDB，用于持久化 Policy、Thing、Connection
    以及 Thing 搜索索引。

