    The Zephyr kernel supports multiple ways to schedule threads. At a high level,
    both cooperative and preemptive scheduling are available. Time slicing, where
    processing time is equally divided among all preemptible threads of the same priority,
    is also offered along with Earliest Deadline First (EDF) and Meta IRQ scheduling.
    Moreover, the kernel offers powerful architecture-specific memory protection mechanisms.
    On x86, ARC, and Arm processors, Zephyr implements stack overflow protection,
    permission tracking for kernel objects and device drivers, and thread isolation
    with thread-level memory protection.


    Zephyr supports a wide variety of hardware, including most Arm Cortex-M cores.
    All the officially supported boards^([^(57)](#fn57)) have a documentation page
    explaining which of their features are available to developers and how they are
    exposed. In addition, several shields are explicitly supported and documented
    in the same way as the boards.


    Note


    A shield is an expansion board fitted on the top of a microcontroller board. They
    are equivalent to HATs (Hardware Attached on Top) in the Raspberry Pi ecosystem.


    From a development tools perspective, the Zephyr team maintains a software development
    kit providing complete toolchains for each of the supported architectures. The
    main dependencies for the SDK are CMake, Python, and the Devicetree compiler.
    All three support multiple platforms; the SDK can be installed on Linux, macOS,
    and Windows. In the case of Windows, using the [Chocolatey](https://chocolatey.org/)
    package manager is recommended; you could also leverage the Windows Subsystem
    for Linux (WSL) feature available in Windows 10 and higher, but at the time of
    writing, application flashing was not possible in that environment. The Zephyr
    team does not ship an IDE, but several board makers support Zephyr in their IDEs
    derived from [Eclipse CDT](https://www.eclipse.org/cdt/). Using [PlatformIO](https://platformio.org/)
    and its namesake IDE is also a possibility.


    An interesting feature of Zephyr is [West](https://docs.zephyrproject.org/latest/develop/west/index.html),
    its companion meta-tool. West provides developers the ability to work with multiple
    Git repositories. It also supports developer workflows through a user-friendly
    command-line interface. West is compatible with CMake, which means you can perform
    operations such as building, flashing, and debugging with either tool. The use
    of West is optional, although bypassing it will probably not be convenient for
    you.


    Zephyr is a well-documented RTOS with a comprehensive feature set and a mature
    code base. The vendor-neutral stewardship of the project by the Linux Foundation
    ensures that no one organization can wrestle away the project from the open source
    community. Zephyr offers a stable target to application developers since it publishes
    Long-Term Support (LTS) releases on a defined schedule. The project''s governance
    is transparent, and the team takes security very seriously. A long-term goal of
    the project is to maintain a secure branch to create a certifiable system or at
    least a subset of certifiable submodules.


    For all these reasons and given that the Eclipse Foundation is a member of the
    Zephyr project, I based most of the constrained device code samples in this book
    on Zephyr. However, Arm Mbed and FreeRTOS are strong alternatives. There are also
    other open source RTOSes worthy of your attention that I did not have the time
    to cover, like Contiki and RIOT OS. In the end, you should pick the option that
    delivers the best balance of features and hardware support for your project.


    ## Bare Metal Options


    While RTOSes have a lot to offer, they are probably overkill for simple use cases
    where the constrained device performs simple tasks one at a time. In that context,
    the overhead of the RTOS may outweigh the benefits. Moreover, there is a growing
    number of frameworks that deliver most of the features offered by RTOSes and produce
    programs that are run directly on the hardware without the involvement of an operating
    system. In this section, I will review a few options.


    ### Arduino


    Out of the box, Arduino boards execute programs directly, with or without the
    assistance of a bootloader.^([^(58)](#fn58)) Such programs are called *sketches*
    in Arduino parlance. The bootloader''s role is to allow you to upload sketches
    to the board without needing a hardware programmer, a specialized device that
    can burn the software on a board. You can operate the board without a bootloader
    if you have a programmer and need all the Arduino’s resources for your program.


    Arduino sketches are written in a simplified version of C++. At compile time,
    a pre-processor converts the sketch into standard C++ code. The object file is
    linked against the standard Arduino libraries. The result is a single hex file
    that will be executed directly by the board. This approach is powerful and modular
    due to the [extensive collection of optional libraries](https://www.arduino.cc/reference/en/libraries/)
    made available by Arduino and the wider community. The libraries cover various
    domains such as communications, connectivity, data processing, storage, and device
    control. The Arduino CLI command-line tool and Arduino IDE make it easy to install
    the core support files for the board of your choice and the libraries you need.


    The Arduino is a fantastic example of a streamlined open source environment targeted
    at simple use cases. That said, several RTOSes can run on Arduino boards, including
    FreeRTOS.'
  trans: '

    ### Zephyr


    我将详细介绍的最后一个 RTOS 是 Zephyr。Zephyr 的根源可追溯至比利时软件公司 Eonic Systems 的 Virtuoso RTOS，该公司于
    2001 年被 Wind River Systems 收购。Wind River 将 Virtuoso 更名为 Rocket，并于 2015 年将其作为开源软件发布。2016
    年，Wind River 将该贡献给 Linux 基金会，并命名为 Zephyr。Zephyr 采用 Apache v2.0 许可证，并在[GitHub 上开发](https://github.com/zephyrproject-rtos/zephyr)。^(⁵⁵)


    Zephyr 的功能集非常广泛。它包括一个微小的单体内核、一套连接协议实现（包括 MQTT、CoAP 和 LwM2M）、一个支持多种闪存存储的虚拟文件系统接口，以及内置的设备管理和软件更新机制。它还完全支持蓝牙
    BLE，包括网状网络。Zephyr 高度可配置且模块化；你可以只集成所需的功能。因此，运行时内存使用量可低至 8 KiB。图 10-2 总结了 Zephyr
    的架构。


    ![](img/524096_1_En_10_Fig2_HTML.jpg)


    一个由具有高级 API 的应用服务、具有低级 API 和设备管理的操作系统服务，以及具有电源管理的内核服务或调度器组成的架构。


    图 10-2


    Zephyr RTOS 架构（来源：Linux 基金会^(⁵⁶)）


    图 10-2 中未直接体现的一个元素是内核服务套件。以下是完整的服务列表：


    *   **多线程：** 提供协作式、基于优先级、非抢占式和抢占式线程。轮转时间片是可选的。该服务还提供 POSIX 兼容的 API。


    *   **中断：** 在编译时实现中断处理程序的注册。


    *   **内存分配：** 提供动态内存分配。无论内存块大小是固定还是可变，都可以释放。


    *   **线程间同步：** 提供二进制信号量、计数信号量和互斥信号量。


    *   **线程间数据传递：** 实现消息队列和字节流。


    *   **电源管理：** 提供高级空闲特性和无滴答空闲模式。


    Zephyr 内核支持多种线程调度方式。在高级层面，协作式和抢占式调度都可用。时间片（即处理时间在同优先级的所有可抢占线程之间平均分配）与最早截止时间优先（EDF）和元
    IRQ 调度一起提供。此外，内核还提供强大的特定于架构的内存保护机制。在 x86、ARC 和 Arm 处理器上，Zephyr 实现了栈溢出保护、内核对象和设备驱动程序的权限跟踪，以及通过线程级内存保护实现的线程隔离。


    Zephyr 支持多种硬件，包括大多数 Arm Cortex-M 内核。所有官方支持的开发板^(⁵⁷)都有一个文档页面，说明其哪些功能对开发者可用以及如何暴露这些功能。此外，多个扩展板也得到明确支持，并像开发板一样有文档记录。


    注意


    扩展板是安装在微控制器板顶部的扩展板。它们相当于 Raspberry Pi 生态系统中的 HAT（硬件附加在顶部）。


    从开发工具的角度来看，Zephyr 团队维护着一个软件开发工具包，为每个支持的架构提供完整的工具链。SDK 的主要依赖项是 CMake、Python 和设备树编译器。这三个工具都支持多个平台；SDK
    可以安装在 Linux、macOS 和 Windows 上。在 Windows 的情况下，建议使用[Chocolatey](https://chocolatey.org/)包管理器；你也可以利用
    Windows 10 及更高版本中可用的 Windows Subsystem for Linux (WSL)功能，但在撰写本文时，在该环境中无法进行应用程序烧录。Zephyr
    团队不提供 IDE，但一些开发板制造商在其基于[Eclipse CDT](https://www.eclipse.org/cdt/)的 IDE 中支持 Zephyr。使用[PlatformIO](https://platformio.org/)及其同名的
    IDE 也是一种选择。


    Zephyr 的一个有趣特性是其配套元工具[West](https://docs.zephyrproject.org/latest/develop/west/index.html)。West
    使开发者能够处理多个 Git 仓库。它还通过用户友好的命令行界面支持开发者工作流程。West 与 CMake 兼容，这意味着你可以使用任一工具执行构建、烧录和调试等操作。West
    的使用是可选的，尽管绕过它可能对你来说不太方便。


    Zephyr 是一个文档完善的 RTOS，具有全面的功能集和成熟的代码库。Linux 基金会对该项目的中立管理确保了没有任何一个组织能从开源社区手中夺走该项目。Zephyr
    为应用程序开发者提供了一个稳定的目标，因为它按既定计划发布长期支持（LTS）版本。该项目的治理是透明的，团队非常重视安全性。该项目的长期目标是维护一个安全分支，以创建一个可认证的系统，或至少一个可认证子模块的子集。


    基于所有这些原因，并且鉴于 Eclipse 基金会是 Zephyr 项目的成员，本书中大多数受限设备代码示例都基于 Zephyr。然而，Arm Mbed 和
    FreeRTOS 是强大的替代方案。还有其他值得关注的开源 RTOS，如 Contiki 和 RIOT OS，但我没有时间介绍。最终，你应该选择能为你的项目提供最佳功能和硬件支持平衡的方案。


    ## 裸机选项


    虽然 RTOS 提供了很多功能，但对于受限设备一次只执行简单任务的简单用例来说，它们可能过于复杂。在这种情况下，RTOS 的开销可能超过其带来的好处。此外，越来越多的框架提供了
    RTOS 的大部分功能，并生成直接在硬件上运行而无需操作系统参与的程序。在本节中，我将回顾几个选项。


    ### Arduino


    开箱即用，Arduino 开发板可以直接执行程序，无论是否有引导加载程序的协助。^(⁵⁸) 在 Arduino 术语中，此类程序称为*sketch*。引导加载程序的作用是允许你将
    sketch 上传到开发板，而无需硬件编程器（一种可以将软件烧录到开发板上的专用设备）。如果你有编程器并且需要 Arduino 的所有资源用于你的程序，你可以在没有引导加载程序的情况下操作开发板。


    Arduino sketch 使用简化版的 C++编写。在编译时，预处理器将 sketch 转换为标准 C++代码。目标文件与标准 Arduino 库链接。结果是一个单一的
    hex 文件，将由开发板直接执行。由于 Arduino 和更广泛的社区提供了[大量可选库](https://www.arduino.cc/reference/en/libraries/)，这种方法功能强大且模块化。这些库涵盖通信、连接、数据处理、存储和设备控制等多个领域。Arduino
    CLI 命令行工具和 Arduino IDE 使得为你选择的开发板安装核心支持文件以及你需要的库变得容易。


    Arduino 是一个面向简单用例的精简开源环境的绝佳示例。尽管如此，包括 FreeRTOS 在内的多个 RTOS 都可以在 Arduino 开发板上运行。

    '
- fmt: '### Drogue IoT


    If you are a fan of the Rust programming language (and if you are not one, you
    should at least entertain the thought), Drogue IoT provides everything you need
    to build secure and efficient firmware for constrained devices. Red Hat has created
    the project; it is not an Eclipse Foundation project, but several of its contributors
    play a role in the Eclipse IoT and Edge ecosystem. You can find the Drogue IoT
    website at [`www.drogue.io/`](http://www.drogue.io/).


    The usage of Rust has been growing in the IoT and embedded space in the last few
    years. This is partly due to the many safety features in the language. The Rust
    type system prevents data races at compile time and can perform static checks.
    These static checks can be leveraged, for example, to enforce the proper configuration
    of I/O interfaces and ensure that operations are performed only on properly configured
    peripherals. The checks can also implement access control to ensure that only
    certain parts of a program can modify the peripheral state. In addition, Rust
    development tools are available on all major operating systems, can target multiple
    hardware platforms, and are not tied to any specific project or framework. Developers
    can pick from an extensive collection of open source libraries published on [crates.​io](https://crates.io/),
    the Rust equivalent to Maven Central. Those libraries are called *crates*, unsurprisingly.


    Building device firmware in Rust does not require vendor-specific SDKs or RTOS-specific
    tooling. However, the community of Rust embedded developers standardized a few
    concepts. Those concepts are as follows:


    - **Peripheral Access Crate (PAC):** Libraries that allow access to chip-specific
    registers. Static checks ensure developers are using the peripherals appropriately.

    - **Hardware Abstraction Layer (HAL):** Libraries that build upon the PAC of certain
    chips and provide abstractions of common features and buses such as I²C, SPI,
    and UART. HALs often work across members of a chip family.

    - **Embedded HAL:** Libraries that are a foundation for building platform-agnostic
    drivers. They define interfaces that are then implemented in HALs.


    There are two major components in Drogue IoT: Drogue Device and Drogue Cloud.
    Drogue Device is a distribution of libraries and drivers for building IoT applications.
    Behind the covers, it relies on the [Embassy project](https://embassy.dev/). Embassy
    is an asynchronous programming framework comprising an executor and a Hardware
    Access Layer (HAL). The executor is a scheduler. It executes a set of tasks defined
    at startup time, although you can add more later. The HAL provides an API encapsulating
    access to peripherals such as USART, UART, I²C, SPI, CAN, and USB. Where it makes
    sense, Embassy APIs are offered in both synchronous and asynchronous flavors.
    Embassy represents an alternative to the [Real-Time Interrupt-driven Concurrency](https://rtic.rs/1/book/en/)
    (RTIC) library, a runtime providing a task scheduler and many of the core features
    typically found in an RTOS.


    There are several advantages to asynchronous Rust over the traditional synchronous
    approach. First, it produces power and resource-efficient applications since async
    tasks can be completed by raising interrupts. Second, it simplifies developers’
    lives by removing the need to implement state machines in complex scenarios such
    as using multiple DMA channels at once. The Rust compiler will generate the state
    machine from the “linear” Rust async code implementing the logic. Finally, asynchronous
    Rust tasks can benefit from a perfectly sized stack through a construct called
    *futures*, representing “[…] single eventual values produced by asynchronous computations.”^([^(59)](#fn59))
    Segmenting the future state and allocating memory only when needed is possible.
    Once again, this results in more efficient code.


    Embassy is a task-based framework. The Drogue Device programming model supports
    that and also provides an actor framework. An actor system isolates states in
    narrow scopes; actors represent the boundary of state usage. In Drogue Device,
    actors make it easier to build concurrent systems using message passing. Each
    actor possesses a unique address. Actors are decoupled from one another and process
    only one message at once. Specifically, they process messages by leveraging Rust''s
    async/await primitives. Consequently, events are always processed in order.


    Drogue Device ships with optional board support packages that provide boilerplate
    for the most used peripherals. The project also includes drivers, actors, and
    examples for Wi-Fi, LoRaWAN, and Bluetooth BLE combined with various sensors.
    You can also leverage third-party drivers or write your own. At the time of writing,
    Drogue Device could run on any hardware supported by Embassy. The list includes
    the STM32 series from STMicroelectronics and the Nordic Semiconductor nRF52, nRF53,
    and nRF91 series. An example of a well-supported and fully featured board is the
    micro:bit version 2.


    Drogue Device is a powerful framework for building Rust applications targeting
    embedded and IoT constrained devices. The language provides a low-footprint runtime,
    memory safety, and thread safety, a winning combination given the target use cases.
    As for the companion Drogue Cloud platform, it exposes HTTP, MQTT, and CoAP endpoint
    to devices and performs protocol normalization through Cloud Events and Knative
    eventing. The integration between Drogue Device and Drogue Cloud means that Drogue
    Cloud can deliver effective device management, including credentials and configuration
    properties.'
