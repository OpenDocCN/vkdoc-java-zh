  trans: '

    ### Wi-Fi


    Wi-Fi 是一组基于 IEEE 802.11 标准的无线网络协议，旨在与以太网无缝集成。Wi-Fi 的演进由非营利组织 [Wi-Fi 联盟](https://www.wi-fi.org/)
    推动。截至撰写本文时，Wi-Fi 已取得显著的市场普及，全球使用中的设备超过 180 亿台，预计 2022 年出货量将达到 44 亿台。^(⁴⁴)


    802.11 协议的第一个版本于 1997 年推出。此后，该标准陆续推出了多个后续版本。每个特定版本的标准都规定了所使用的无线电频段、最大覆盖范围以及可实现的最大速度。Wi-Fi
    最常使用 2.4 GHz 和 5 GHz 无线电频段；这些频段被细分为多个信道。表 9-1 总结了每个 Wi-Fi 版本的主要特性。


    表 9-1


    Wi-Fi 标准版本


    | 代际 | IEEE 标准 | 最大数据速率 (Mbit/s) | 批准年份 | 频率 (GHz) |

    | --- | --- | --- | --- | --- |

    | Wi-Fi 0 | 802.11 | 2 | 1997 | 2.4 |

    | Wi-Fi 1 | 802.11b | 11 | 1999 | 2.4 |

    | Wi-Fi 2 | 802.11a | 54 | 1999 | 5 |

    | Wi-Fi 3 | 802.11g | 54 | 2003 | 2.4 |

    | Wi-Fi 4 | 802.11n | 600 | 2008 | 2.4 和 5 |

    | Wi-Fi 5 | 802.11ac | 6933 | 2014 | 5 |

    | Wi-Fi 6 | 802.11ax | 9608 | 2019 | 2.4 和 5 |

    | Wi-Fi 6E | 2020 | 2.4、5 和 6 |

    | Wi-Fi 7 | 802.11be | 40000 | 2024 (预计) | 2.4、5 和 6 |


    请注意，Wi-Fi 联盟直到 2018 年才开始使用代际编号。较旧的资料会引用相关 IEEE 标准的名称。此外，Wi-Fi 联盟从未公开提及 0 到 3 代；这些代际编号是根据该联盟将
    802.11n 称为 Wi-Fi 4 这一事实推断出来的。


    Wi-Fi 部署的最大工作范围取决于多个因素，包括频段、无线电输出功率、所用接收器的灵敏度、调制技术以及所用天线的增益和类型。在距离较远以及墙壁等障碍物导致信号吸收更强的情况下，数据速率通常会较低。较低的无线电频率会带来更好的覆盖范围，但吞吐量较低。建筑材料对
    5 GHz 信号的吸收程度高于 2.4 GHz 信号。然而，较高的频率提供了更多的信道，有助于减少多个网络竞争频谱的环境中的干扰。通过部署多个接入点或使用范围扩展器和信号放大器，可以增加
    Wi-Fi 网络的覆盖范围。最近的 Wi-Fi 代际支持部署网状网络，例如，可改善建筑物内的覆盖范围。


    许多单板计算机和 MCU 都支持 Wi-Fi。然而，虽然 Wi-Fi 的有效范围比蓝牙更大，但其功耗也高得多。为了解决这个问题，IEEE 引入了 802.11ah
    标准，Wi-Fi 联盟将其称为 Wi-Fi HaLow。802.11ah 使用亚千兆赫兹 ISM 频谱。频段因地区而异，位于 755 至 928 MHz 之间。802.11ah
    标准定义了多种调制方案和编码速率；可能的数据速率范围很广，从 150 kbit/s 到 86.7 Mbit/s。典型范围超过 1 公里（0.6 英里），并且该协议集成了多种功能以延长电池寿命。


    对于物联网和边缘计算部署来说，Wi-Fi 无疑是一个可行的选择，尤其是当您的设备和传感器不依赖电池供电时。然而，其在覆盖范围上的局限性意味着，对于大面积户外部署，存在更好的选择。


    ### Z-Wave


    Z-Wave 是一种主要用于智能家居部署的无线通信协议。它与蓝牙 BLE 类似，本质上是一个使用低能耗传输的网状网络。Z-Wave 联盟成立于 2005 年，负责管理该标准的演进。然而，Z-Wave
    收发器芯片仅由该技术的当前所有者 Silicon Labs 及其被许可方独家提供。


    Z-Wave 旨在以低延迟传输小型数据包，数据速率最高可达 100 kbit/s。网络上两个节点之间的最大距离为 30 到 40 米（98 到 131 英尺）。数据包可以在节点之间最多跳转四次，从而增加潜在的覆盖区域。Z-Wave
    使用带有曼彻斯特编码的频移键控（FSK）调制。与 DASH7 和 802.11ah 一样，它使用 ISM 频段。Z-Wave 在欧洲以 868.42 MHz
    传输，在北美以 908.42 MHz 传输；在其他地区，则根据当地法规使用其他频率。


    一个 Z-Wave 网络至少需要包含一个主控制器和至少一个设备。控制器通常采用墙壁开关和手持控制器的形式，但软件应用程序也可以扮演这个角色。一个网络最多可包含
    232 个设备，并且可以将多个网络桥接在一起。设备需要先与网络配对（或添加），然后才能通过协议进行控制。鉴于标准中定义的省电特性，大多数设备的预期电池寿命为数年。


    Z-Wave 提供了一个安全层，可确保消息的完整性和机密性。它还实现了确保数据新鲜度的机制，这意味着基础设施将只处理最近发送的消息。Z-Wave 依赖于具有
    128 位密钥长度的 AES 对称分组密码算法。过去，制造商可以生产不安全的设备。即使在今天，为了向后兼容，Z-Wave 网络也可以包含安全和不安全的节点。然而，安全性现在已是强制要求，因此您可以通过仅使用较新的设备来减轻担忧。


    Z-Wave 是家庭自动化甚至智能建筑项目的一个有趣选择。鉴于其频段，它提供了比蓝牙更大的覆盖范围，并且比某些替代方案受到的干扰更少。然而，该技术在部分方面的专有控制令人担忧。

    '
- fmt: "### Zigbee\n\nZigbee is a specification based on the IEEE 802.15.4 standard\
    \ that defines a high-power communication protocol suite. Zigbee is under the\
    \ stewardship of the [Connectivity Standards Alliance](https://csa-iot.org/) (previously\
    \ the Zigbee Alliance). The organization publishes application profiles that vendors\
    \ can leverage to create interoperable products. The relationship between the\
    \ IEEE 802.15.4 standard and Zigbee is comparable to the one between IEEE 802.11\
    \ and Wi-Fi.\n\nZigbee relies on the 2.4 GHz band in most jurisdictions worldwide.\
    \ Specific devices also use 784 MHz in China, 868 MHz in Europe, and 915 MHz in\
    \ the United States and Australia. The bulk of available devices sticks to the\
    \ 2.4 GHz band, however. Data rates vary from 20 kbit/s (868 MHz) to 250 kbit/s\
    \ (2.4 GHz).\n\n> **Note**  \n> The name Zigbee refers to the dance that honeybees\
    \ perform when they return to the beehive to inform their peers about the direction\
    \ and distance of flower patches, water sources, or new nesting site locations.\n\
    \nZigbee’s focus on low power consumption limits the effective range between 10\
    \ and 100 meters in optimal conditions. Like Z-Wave, Zigbee devices can form mesh\
    \ networks that will propagate data to their destination. The Zigbee standard\
    \ defines three classes of devices:\n\n- **Coordinator (ZC)**: The root node of\
    \ the network. There is precisely one coordinator per Zigbee network. Coordinators\
    \ can establish bridges to other networks.\n- **Router (ZR)**: A node running\
    \ application functions. Routers can propagate data to other devices.\n- **End\
    \ device (ZED)**: A leaf node that can only communicate with routers or the coordinator.\
    \ Such devices typically spend extended periods in sleep mode, resulting in long\
    \ battery life.\n\nOnly members of the Connectivity Standards Alliance can market\
    \ products under the Zigbee name.\n\nAs with any wireless connectivity technology,\
    \ there are security vulnerabilities in Zigbee. The protocol assumes that the\
    \ keys used to operate and secure the network are stored securely and will not\
    \ be transmitted unencrypted. Of course, devices with faulty security implementation\
    \ or favoring usability and convenience over security could compromise their keys.\
    \ Moreover, attackers could intercept packets and replay them to unsuspecting\
    \ devices, tricking them into executing undesired operations. A possible mitigation\
    \ measure would be distributing keys through out-of-band channels and rotating\
    \ them regularly.\n\nLike Z-Wave, Zigbee is a good choice for smart building projects\
    \ and home automation. Given its range and flexibility, organizations also use\
    \ it to track assets or monitor consumer energy consumption by integrating smart\
    \ meters into the smart grid.\n\n## Network Design Considerations\n\nEach networking\
    \ technology I covered possesses characteristics that will influence how you design\
    \ and deploy your network. However, a few relevant considerations apply independently\
    \ of the technology. I will now review them.\n\n### Choice of Protocols\n\nI covered\
    \ several protocols in the first part of this book. Some require TCP/IP, some\
    \ will be content with UDP, and others can leverage non-IP transports. Of course,\
    \ the protocols you intend to use will influence the type of network you will\
    \ deploy to support devices in the field. The cost of bandwidth and the expected\
    \ reliability of the network selected will also influence the choice of protocols\
    \ and vice versa.\n\nMany field networks will not connect directly to the Internet,\
    \ whether such a connection would be possible or not. An IoT gateway will bridge\
    \ the local network with the rest of the infrastructure in such scenarios. A topology\
    \ like this makes it possible to use, let’s say, Bluetooth or Z-Wave locally to\
    \ gather sensor data and send it to a Cloud MQTT broker over a cellular LTE or\
    \ 5G link. The gateway, in this case, can pre-process the data to preserve the\
    \ confidentiality or conserve bandwidth.\n\n### Confidentiality\n\nPreserving\
    \ the confidentiality of data, whether at rest (stored on the device) or in motion\
    \ (during transmission), is a critical concern for any IoT solution. Naturally,\
    \ several of the networking technologies I covered offer some level of encryption.\
    \ But others, like Ethernet, do not. Therefore, planning for confidentiality is\
    \ essential.\n\nThe most important advice I can give you is: Do not implement\
    \ your own custom security layer! Even if you are an experienced developer, writing\
    \ security-related code is a daunting task. The value of established security\
    \ standards is that security researchers and large organizations pay attention\
    \ to them, ensuring that new threats are discovered, discussed, and, eventually,\
    \ addressed. If you build your own, the onus of watching and reacting to new threats\
    \ will be on you.\n\nIf you follow my advice, what should you do then? First,\
    \ if you use a protocol that relies on TCP/IP or UDP, then deploying TLS or DTLS\
    \ is strongly recommended. You should stick to the most recent version of those\
    \ standards supported by the protocol and operating system. In more concrete terms,\
    \ this means to use `TLS/DTLS 1.3` if possible and never use anything older than\
    \ `TLS/DTLS 1.2`. An alternative strategy would be to perform payload encryption,\
    \ although this would require you to determine if the specific encryption method\
    \ used is still secure periodically.\n\n> **Note**  \n> The version numbers for\
    \ TLS and DTLS have been adjusted to be the same, starting with version 1.2.\n\
    \nUsing a recent and supported version of TLS/DTLS is only the first step. You\
    \ also need to configure an appropriate cipher suite on every device on the network\
    \ and back-end resources in the Cloud or data center. The cipher suite you will\
    \ select will impact battery life and bandwidth usage. In general, suites that\
    \ offer a higher level of security have higher compute requirements due to more\
    \ complex cryptographic calculations. Table 9-2 provides a view of the main characteristics\
    \ of the three most appropriate authentication methods currently in use.\n\n**Table\
    \ 9-2** Common authentication methods (Credit: Kai Hudalla, Bosch.IO^(45))\n\n\
    | | RSA | ECDSA | PSK |\n| --- | --- | --- | --- |\n| Minimal compute requirements\
    \ | Cortex-M4 | Cortex-M3 | Cortex-M0 |\n| Certificate size | 1–2 KB | <1 KB |\
    \ 0 B |\n| Typical key length (bits) | 2048 | 224–255 | 112 |\n| Full handshake\
    \ size | 4–7 KB | 2–4 KB | <1 KB |\n| Abbreviated handshake size | <500 B | <500\
    \ B | <500 B |\n\nLeveraging additional features in TLS/DTLS is also advisable.\
    \ For example, leveraging the Ephemeral Diffie-Hellman (DHE) key exchange mode\
    \ enables *forward secrecy* when supported by the cipher suite. A temporary key\
    \ is generated for every connection when a key exchange uses the Ephemeral Diffie-Hellman\
    \ algorithm. Those keys are not reused, which means that if the long-term private\
    \ key of the back-end service is compromised, past exchanges are still confidential.\
    \ Another useful feature is session resumption. TLS and DTLS handshakes take a\
    \ lot of time and computing resources. Given this, session resumption provides\
    \ a mechanism to reuse recently negotiated secrets across multiple connections.\
    \ The abbreviated handshake that results is shorter and lighter on resources."
  raw: '### Zigbee


    Zigbee is a specification based on the IEEE 802.15.4 standard that defines a high-power
    communication protocol suite. Zigbee is under the stewardship of the [Connectivity
    Standards Alliance](https://csa-iot.org/) (previously the Zigbee Alliance). The
    organization publishes application profiles that vendors can leverage to create
    interoperable products. The relationship between the IEEE 802.15.4 standard and
    Zigbee is comparable to the one between IEEE 802.11 and Wi-Fi.


    Zigbee relies on the 2.4 GHz band in most jurisdictions worldwide. Specific devices
    also use 784 MHz in China, 868 MHz in Europe, and 915 MHz in the United States
    and Australia. The bulk of available devices sticks to the 2.4 GHz band, however.
    Data rates vary from 20 kbit/s (868 MHz) to 250 kbit/s (2.4 GHz).


    Note


    The name Zigbee refers to the dance that honeybees perform when they return to
    the beehive to inform their peers about the direction and distance of flower patches,
    water sources, or new nesting site locations.


    Zigbee’s focus on low power consumption limits the effective range between 10
    and 100 meters in optimal conditions. Like Z-Wave, Zigbee devices can form mesh
    networks that will propagate data to their destination. The Zigbee standard defines
    three classes of devices:


    *   **Coordinator (ZC)**: The root node of the network. There is precisely one
    coordinator per Zigbee network. Coordinators can establish bridges to other networks.


    *   **Router (ZR)**: A node running application functions. Routers can propagate
    data to other devices.


    *   **End device (ZED)**: A leaf node that can only communicate with routers or
    the coordinator. Such devices typically spend extended periods in sleep mode,
    resulting in long battery life.


    Only members of the Connectivity Standards Alliance can market products under
    the Zigbee name.


    As with any wireless connectivity technology, there are security vulnerabilities
    in Zigbee. The protocol assumes that the keys used to operate and secure the network
    are stored securely and will not be transmitted unencrypted. Of course, devices
    with faulty security implementation or favoring usability and convenience over
    security could compromise their keys. Moreover, attackers could intercept packets
    and replay them to unsuspecting devices, tricking them into executing undesired
    operations. A possible mitigation measure would be distributing keys through out-of-band
    channels and rotating them regularly.


    Like Z-Wave, Zigbee is a good choice for smart building projects and home automation.
    Given its range and flexibility, organizations also use it to track assets or
    monitor consumer energy consumption by integrating smart meters into the smart
    grid.


    ## Network Design Considerations


    Each networking technology I covered possesses characteristics that will influence
    how you design and deploy your network. However, a few relevant considerations
    apply independently of the technology. I will now review them.


    ### Choice of Protocols


    I covered several protocols in the first part of this book. Some require TCP/IP,
    some will be content with UDP, and others can leverage non-IP transports. Of course,
    the protocols you intend to use will influence the type of network you will deploy
    to support devices in the field. The cost of bandwidth and the expected reliability
    of the network selected will also influence the choice of protocols and vice versa.


    Many field networks will not connect directly to the Internet, whether such a
    connection would be possible or not. An IoT gateway will bridge the local network
    with the rest of the infrastructure in such scenarios. A topology like this makes
    it possible to use, let’s say, Bluetooth or Z-Wave locally to gather sensor data
    and send it to a Cloud MQTT broker over a cellular LTE or 5G link. The gateway,
    in this case, can pre-process the data to preserve the confidentiality or conserve
    bandwidth.


    ### Confidentiality


    Preserving the confidentiality of data, whether at rest (stored on the device)
    or in motion (during transmission), is a critical concern for any IoT solution.
    Naturally, several of the networking technologies I covered offer some level of
    encryption. But others, like Ethernet, do not. Therefore, planning for confidentiality
    is essential.


    The most important advice I can give you is: Do not implement your own custom
    security layer! Even if you are an experienced developer, writing security-related
    code is a daunting task. The value of established security standards is that security
    researchers and large organizations pay attention to them, ensuring that new threats
    are discovered, discussed, and, eventually, addressed. If you build your own,
    the onus of watching and reacting to new threats will be on you.


    If you follow my advice, what should you do then? First, if you use a protocol
    that relies on TCP/IP or UDP, then deploying TLS or DTLS is strongly recommended.
    You should stick to the most recent version of those standards supported by the
    protocol and operating system. In more concrete terms, this means to use TLS/DTLS
    1.3 if possible and never use anything older than TLS/DTLS 1.2\. An alternative
    strategy would be to perform payload encryption, although this would require you
    to determine if the specific encryption method used is still secure periodically.


    Note


    The version numbers for TLS and DTLS have been adjusted to be the same, starting
    with version 1.2.


    Using a recent and supported version of TLS/DTLS is only the first step. You also
    need to configure an appropriate cipher suite on every device on the network and
    back-end resources in the Cloud or data center. The cipher suite you will select
    will impact battery life and bandwidth usage. In general, suites that offer a
    higher level of security have higher compute requirements due to more complex
    cryptographic calculations. Table [9-2](#524096_1_En_9_Chapter.xhtml#Tab2) provides
    a view of the main characteristics of the three most appropriate authentication
    methods currently in use.


    Table 9-2


    Common authentication methods (Credit: Kai Hudalla, Bosch.IO^([^(45)](#fn45)))


    |   | RSA | ECDSA | PSK |

    | --- | --- | --- | --- |

    | Minimal compute requirements | Cortex-M4 | Cortex-M3 | Cortex-M0 |

    | Certificate size | 1–2 KB | <1 KB | 0 B |

    | Typical key length (bits) | 2048 | 224–255 | 112 |

    | Full handshake size | 4–7 KB | 2–4 KB | <1 KB |

    | Abbreviated handshake size | <500 B | <500 B | <500 B |


    Leveraging additional features in TLS/DTLS is also advisable. For example, leveraging
    the Ephemeral Diffie-Hellman (DHE) key exchange mode enables *forward secrecy*
    when supported by the cipher suite. A temporary key is generated for every connection
    when a key exchange uses the Ephemeral Diffie-Hellman algorithm. Those keys are
    not reused, which means that if the long-term private key of the back-end service
    is compromised, past exchanges are still confidential. Another useful feature
    is session resumption. TLS and DTLS handshakes take a lot of time and computing
    resources. Given this, session resumption provides a mechanism to reuse recently
    negotiated secrets across multiple connections. The abbreviated handshake that
    results is shorter and lighter on resources.'
  trans: '

    ### Zigbee


    Zigbee 是一种基于 IEEE 802.15.4 标准的规范，定义了一套高功率通信协议栈。Zigbee 由[连接标准联盟](https://csa-iot.org/)（前身为
    Zigbee 联盟）管理。该组织发布应用配置文件，供应商可借此创建可互操作的产品。IEEE 802.15.4 标准与 Zigbee 之间的关系，类似于 IEEE
    802.11 与 Wi-Fi 之间的关系。


    Zigbee 在全球大多数地区使用 2.4 GHz 频段。特定设备在中国使用 784 MHz，在欧洲使用 868 MHz，在美国和澳大利亚使用 915 MHz。不过，大多数可用设备仍坚持使用
    2.4 GHz 频段。数据传输速率从 20 kbit/s（868 MHz）到 250 kbit/s（2.4 GHz）不等。


    注意


    Zigbee 这个名称指的是蜜蜂返回蜂巢时，为告知同伴花丛、水源或新巢穴位置的方向和距离而跳的舞蹈。


    Zigbee 专注于低功耗，因此在理想条件下，有效通信距离被限制在 10 到 100 米之间。与 Z-Wave 类似，Zigbee 设备可以形成网状网络，将数据传播到目的地。Zigbee
    标准定义了三种设备类别：


    *   **协调器 (ZC)**：网络的根节点。每个 Zigbee 网络恰好有一个协调器。协调器可以建立通往其他网络的桥接。


    *   **路由器 (ZR)**：运行应用功能的节点。路由器可以将数据传播到其他设备。


    *   **终端设备 (ZED)**：只能与路由器或协调器通信的叶节点。此类设备通常长时间处于休眠模式，从而实现长电池寿命。


    只有连接标准联盟的成员才能以 Zigbee 名称销售产品。


    与任何无线连接技术一样，Zigbee 也存在安全漏洞。该协议假设用于运行和保护网络的密钥被安全存储，并且不会以未加密方式传输。当然，安全实现存在缺陷或倾向于可用性和便利性而忽视安全性的设备，可能会泄露其密钥。此外，攻击者可能拦截数据包并将其重放给毫无戒心的设备，诱骗它们执行非预期的操作。一种可能的缓解措施是通过带外信道分发密钥并定期轮换。


    与 Z-Wave 一样，Zigbee 是智能建筑项目和家庭自动化的不错选择。鉴于其通信距离和灵活性，组织也使用它来跟踪资产，或通过将智能电表集成到智能电网中来监控消费者能源消耗。


    ## 网络设计考量


    我介绍的每种网络技术都具有影响您设计和部署网络方式的特性。然而，一些相关的考量因素独立于技术本身而普遍适用。我现在将对其进行回顾。


    ### 协议选择


    我在本书第一部分介绍了几种协议。有些需要 TCP/IP，有些满足于 UDP，而另一些可以利用非 IP 传输。当然，您打算使用的协议将影响您为支持现场设备而部署的网络类型。所选网络的带宽成本和预期可靠性也会影响协议的选择，反之亦然。


    许多现场网络不会直接连接到互联网，无论这种连接是否可能。在这种情况下，物联网网关将本地网络与其余基础设施桥接起来。这样的拓扑结构使得可以在本地使用（例如）蓝牙或
    Z-Wave 收集传感器数据，并通过蜂窝 LTE 或 5G 链路将其发送到云 MQTT 代理。在这种情况下，网关可以预处理数据以保护机密性或节省带宽。


    ### 机密性


    保护数据的机密性，无论是静态数据（存储在设备上）还是动态数据（传输过程中），都是任何物联网解决方案的关键关注点。自然，我介绍的几种网络技术都提供了一定程度的加密。但其他技术，如以太网，则没有。因此，规划机密性至关重要。


    我能给出的最重要建议是：不要实现您自己的自定义安全层！即使您是一位经验丰富的开发人员，编写与安全相关的代码也是一项艰巨的任务。既定安全标准的价值在于，安全研究人员和大型组织会关注它们，确保新威胁被发现、讨论并最终得到解决。如果您构建自己的安全层，那么监视和应对新威胁的责任将落在您身上。


    如果您采纳我的建议，那么您应该怎么做？首先，如果您使用依赖 TCP/IP 或 UDP 的协议，则强烈建议部署 TLS 或 DTLS。您应坚持使用协议和操作系统支持的最新版本标准。更具体地说，这意味着尽可能使用
    TLS/DTLS 1.3，并且绝不使用任何早于 TLS/DTLS 1.2 的版本。另一种策略是执行有效载荷加密，尽管这需要您定期确定所使用的特定加密方法是否仍然安全。


    注意


    从版本 1.2 开始，TLS 和 DTLS 的版本号已调整为相同。


    使用最新且受支持的 TLS/DTLS 版本只是第一步。您还需要在网络上的每个设备以及云或数据中心的后端资源上配置适当的密码套件。您选择的密码套件将影响电池寿命和带宽使用。通常，提供更高级别安全性的套件由于更复杂的加密计算而具有更高的计算要求。表
    9-2 提供了当前使用的三种最合适认证方法的主要特性概览。


    表 9-2


    常见认证方法（来源：Kai Hudalla, Bosch.IO^(⁴⁵)）


    |  | RSA | ECDSA | PSK |

    | --- | --- | --- | --- |

    | 最低计算要求 | Cortex-M4 | Cortex-M3 | Cortex-M0 |

    | 证书大小 | 1–2 KB | <1 KB | 0 B |

    | 典型密钥长度（位） | 2048 | 224–255 | 112 |

    | 完整握手大小 | 4–7 KB | 2–4 KB | <1 KB |

    | 简化握手大小 | <500 B | <500 B | <500 B |


    利用 TLS/DTLS 中的附加功能也是明智之举。例如，利用临时 Diffie-Hellman (DHE) 密钥交换模式，可以在密码套件支持时实现*前向保密*。当密钥交换使用临时
    Diffie-Hellman 算法时，每次连接都会生成一个临时密钥。这些密钥不会被重复使用，这意味着如果后端服务的长期私钥被泄露，过去的交换仍然是保密的。另一个有用的功能是会话恢复。TLS
    和 DTLS 握手需要大量时间和计算资源。鉴于此，会话恢复提供了一种机制，可以在多个连接之间重用最近协商的密钥。由此产生的简化握手更短且资源消耗更少。

    '
- fmt: '# The Keys and Certificates Lifespan


    The keys and certificates that power most encryption solutions – not just TLS
    and DTLS – have a defined lifespan. You need to specify their expiration date
    at the time of creation. This means that any system relying on encryption will
    need to deal with the rotation (e.g., the periodic replacement) of credentials,
    such as keys and certificates. You could be tempted to avoid this issue by setting
    expiration dates very far in the future. Please do not do this, as it would create
    a massive security weakness in your infrastructure because keys and certificates
    are more likely to be compromised as time passes. Regularly replacing the credentials
    will reduce the length of the opportunity window for attackers. Of course, performing
    the rotation is unpleasant and potentially time-consuming, even with automation.
    In addition, the rotation can be challenging if you want to keep the keys private
    to the device itself since many constrained devices lack a good source of randomness,
    which is a requirement to create strong pairs of cryptographic keys. However,
    changing the keys and certificates used in your solution at a regular cadence
    will make it more secure.


    ## Resiliency


    IoT and edge computing solutions should assume the network will be unreliable
    and, at times, unavailable. This does not mean there is nothing you can do to
    make it more resilient. Let’s have a look at a few best practices.


    When devices are deployed in the real world, they are much more exposed to changes
    in network topology. Some of the connectivity options we explored are not based
    on TCP/IP and will route traffic through the neighboring nodes they can detect.
    Thus, they will automatically adapt to the addition or removal of nodes in their
    vicinity. In that case, building a resilient network means carefully positioning
    the nodes to ensure that the loss of a few will not compromise the connectivity
    of others. In the case of TCP/IP-based networks, the key thing is to rely on the
    Domain Name System (DNS) rather than IP addresses. This ensures the availability
    of services independently of the actual servers hosting them. Naturally, this
    strategy works better if you cache the results of DNS queries for a short time
    only. It will ensure that devices adapt to network topology or server availability
    changes more quickly.


    Unless you work with constrained devices that need to maximize their battery life,
    leveraging the *keep alive* or *heartbeat* features in protocols will lead to
    more resilient network connections. For example, without them, a device could
    lose its connection to the carrier network without detecting it, making its TCP/IP
    session stale. Moreover, although session TLS/DTLS resumption leads to shorter
    handshakes, they can be avoided by keeping the connection alive. If you need to
    put devices to sleep to reduce power consumption, it could still be possible to
    reduce the burden on the devices by using protocol-specific features. For example,
    MQTT persistent sessions enable a client to reconnect to a broker without reestablishing
    its previous subscriptions; the session expiry mechanism in MQTT 5 ensures that
    the sessions of devices that do not reconnect in a timely fashion are purged.
    Such features do not alleviate the need to reestablish the underlying TCP/IP connection
    but streamline the process, nevertheless.


    I recommend that you apply an exponential backoff strategy for reconnection attempts.
    Instead of retrying at a fixed interval, you will use an algorithm that incrementally
    increases the wait time between connection attempts. This technique will avoid
    overwhelming the back-end services with a flurry of requests, ensuring a smoother
    recovery once the services are back online.


    Finally, another useful strategy is to use aggressive timeouts for connections
    and requests. Unless network latency is highly unpredictable, it does not make
    sense for devices to wait more than a few seconds for an attempt to get through.
    Such a “fail fast” strategy will also contribute to longer battery life, especially
    when used in conjunction with exponential backoff.


    ## Redundant Connectivity


    For mission-critical use cases, where network outages could provoke significant
    material damage or result in loss of human life, relying on a single network connection
    would be a single point of failure. Thus, many gateways and other IoT devices
    offer redundant network connections. For technologies relying on a cellular network
    such as LTE, 5G, LTE-M, or NB-IoT, this is typically achieved by adding a second
    standby SIM from a different network provider to the device. Since such providers
    typically operate on a subscription model where cost is determined by a plan,
    actual data consumption, or both, it is usually cost-effective to proceed that
    way. The redundant connection will likely see little traffic, hence controlling
    costs.


    If your connectivity requirements are stringent, leveraging networks relying on
    completely different technologies and frequency bands is a sound, if more costly,
    strategy. Of course, you will then need to account for differences in effective
    range, data rates, latency, and software support.


    ## Out-of-Band Management


    There is a need to maximize uptime for devices deployed in remote or hard-to-reach
    locations in many enterprise scenarios. Since sending support personnel onsite
    is onerous and time-consuming, it is often cheaper to rely on a separate, out-of-band
    network connection to manage and troubleshoot devices. Such connections should
    use a different technology than the one handling the device’s regular traffic.
    Of course, to keep costs under control, it can make sense to deploy out-of-band
    networks only at the level of IoT gateways or edge nodes.


    In some cases, it makes sense to deploy specialized appliances that will connect
    to locally managed devices through their serial (UART) or Ethernet ports. Appliances
    like that enable connectivity when the network is down and when a device is turned
    off, in sleep mode, hibernating, or otherwise unavailable.


    From a security perspective, segregating management traffic on a dedicated network
    can make the solution more resilient in case of attack. Unexpected or suspect
    activity on the out-of-band network is easier to spot, given its lower usage level
    than the primary connection.


    # Connectivity and Constrained Devices


    Most of the time, support for network connectivity technologies is determined
    by the networking stack provided by the OS or RTOS you are using and the available
    drivers. Things are straightforward in the case of Linux; most radio modules currently
    available have direct support in the kernel tree or ship with the relevant drivers.
    Things are spottier in the case of RTOSes. Let’s now look at using Wi-Fi and Bluetooth
    connections on the Zephyr RTOS.'
  raw: 'The keys and certificates that power most encryption solutions `–` not just
    TLS and DTLS `–` have a defined lifespan. You need to specify their expiration
    date at the time of creation. This means that any system relying on encryption
    will need to deal with the rotation (e.g., the periodic replacement) of credentials,
    such as keys and certificates. You could be tempted to avoid this issue by setting
    expiration dates very far in the future. Please do not do this, as it would create
    a massive security weakness in your infrastructure because keys and certificates
    are more likely to be compromised as time passes. Regularly replacing the credentials
    will reduce the length of the opportunity window for attackers. Of course, performing
    the rotation is unpleasant and potentially time-consuming, even with automation.
    In addition, the rotation can be challenging if you want to keep the keys private
    to the device itself since many constrained devices lack a good source of randomness,
    which is a requirement to create strong pairs of cryptographic keys. However,
    changing the keys and certificates used in your solution at a regular cadence
    will make it more secure.


    ### Resiliency


    IoT and edge computing solutions should assume the network will be unreliable
    and, at times, unavailable. This does not mean there is nothing you can do to
    make it more resilient. Let’s have a look at a few best practices.


    When devices are deployed in the real world, they are much more exposed to changes
    in network topology. Some of the connectivity options we explored are not based
    on TCP/IP and will route traffic through the neighboring nodes they can detect.
    Thus, they will automatically adapt to the addition or removal of nodes in their
    vicinity. In that case, building a resilient network means carefully positioning
    the nodes to ensure that the loss of a few will not compromise the connectivity
    of others. In the case of TCP/IP-based networks, the key thing is to rely on the
    Domain Name System (DNS) rather than IP addresses. This ensures the availability
    of services independently of the actual servers hosting them. Naturally, this
    strategy works better if you cache the results of DNS queries for a short time
    only. It will ensure that devices adapt to network topology or server availability
    changes more quickly.


    Unless you work with constrained devices that need to maximize their battery life,
    leveraging the *keep alive* or *heartbeat* features in protocols will lead to
    more resilient network connections. For example, without them, a device could
    lose its connection to the carrier network without detecting it, making its TCP/IP
    session stale. Moreover, although session TLS/DTLS resumption leads to shorter
    handshakes, they can be avoided by keeping the connection alive. If you need to
    put devices to sleep to reduce power consumption, it could still be possible to
    reduce the burden on the devices by using protocol-specific features. For example,
    MQTT persistent sessions enable a client to reconnect to a broker without reestablishing
    its previous subscriptions; the session expiry mechanism in MQTT 5 ensures that
    the sessions of devices that do not reconnect in a timely fashion are purged.
    Such features do not alleviate the need to reestablish the underlying TCP/IP connection
    but streamline the process, nevertheless.


    I recommend that you apply an exponential backoff strategy for reconnection attempts.
    Instead of retrying at a fixed interval, you will use an algorithm that incrementally
    increases the wait time between connection attempts. This technique will avoid
    overwhelming the back-end services with a flurry of requests, ensuring a smoother
    recovery once the services are back online.


    Finally, another useful strategy is to use aggressive timeouts for connections
    and requests. Unless network latency is highly unpredictable, it does not make
    sense for devices to wait more than a few seconds for an attempt to get through.
    Such a “fail fast” strategy will also contribute to longer battery life, especially
    when used in conjunction with exponential backoff.


    ### Redundant Connectivity


    For mission-critical use cases, where network outages could provoke significant
    material damage or result in loss of human life, relying on a single network connection
    would be a single point of failure. Thus, many gateways and other IoT devices
    offer redundant network connections. For technologies relying on a cellular network
    such as LTE, 5G, LTE-M, or NB-IoT, this is typically achieved by adding a second
    standby SIM from a different network provider to the device. Since such providers
    typically operate on a subscription model where cost is determined by a plan,
    actual data consumption, or both, it is usually cost-effective to proceed that
    way. The redundant connection will likely see little traffic, hence controlling
    costs.


    If your connectivity requirements are stringent, leveraging networks relying on
    completely different technologies and frequency bands is a sound, if more costly,
    strategy. Of course, you will then need to account for differences in effective
    range, data rates, latency, and software support.


    ### Out-of-Band Management


    There is a need to maximize uptime for devices deployed in remote or hard-to-reach
    locations in many enterprise scenarios. Since sending support personnel onsite
    is onerous and time-consuming, it is often cheaper to rely on a separate, out-of-band
    network connection to manage and troubleshoot devices. Such connections should
    use a different technology than the one handling the device’s regular traffic.
    Of course, to keep costs under control, it can make sense to deploy out-of-band
    networks only at the level of IoT gateways or edge nodes.


    In some cases, it makes sense to deploy specialized appliances that will connect
    to locally managed devices through their serial (UART) or Ethernet ports. Appliances
    like that enable connectivity when the network is down and when a device is turned
    off, in sleep mode, hibernating, or otherwise unavailable.


    From a security perspective, segregating management traffic on a dedicated network
    can make the solution more resilient in case of attack. Unexpected or suspect
    activity on the out-of-band network is easier to spot, given its lower usage level
    than the primary connection.


    ## Connectivity and Constrained Devices


    Most of the time, support for network connectivity technologies is determined
    by the networking stack provided by the OS or RTOS you are using and the available
    drivers. Things are straightforward in the case of Linux; most radio modules currently
    available have direct support in the kernel tree or ship with the relevant drivers.
    Things are spottier in the case of RTOSes. Let’s now look at using Wi-Fi and Bluetooth
    connections on the Zephyr RTOS.'
  trans: '

    大多数加密解决方案（不仅仅是 TLS 和 DTLS）所依赖的密钥和证书都有**定义的生命周期**。你需要在创建时指定它们的过期日期。这意味着任何依赖加密的系统都需要处理凭证（如密钥和证书）的轮换（即定期更换）。你可能会试图通过将过期日期设置得非常遥远来避免这个问题。**请不要这样做**，因为这会在你的基础设施中造成巨大的安全漏洞，因为随着时间的推移，密钥和证书更有可能被泄露。定期更换凭证将缩短攻击者的可利用窗口期。当然，执行轮换并不愉快，而且即使有自动化手段，也可能非常耗时。此外，如果你希望将密钥对设备本身保密，轮换可能更具挑战性，因为许多受限设备缺乏良好的随机源，而这是生成强加密密钥对的要求。然而，定期更换解决方案中使用的密钥和证书将使其更加安全。


    ### 弹性


    物联网和边缘计算解决方案应假设网络不可靠，并且有时会不可用。这并不意味着你无法采取任何措施来提高其弹性。让我们来看一些最佳实践。


    当设备部署在现实世界中时，它们更容易受到网络拓扑变化的影响。我们探讨过的一些连接选项并非基于 TCP/IP，而是通过它们能检测到的相邻节点来路由流量。因此，它们会自动适应附近节点的添加或移除。在这种情况下，构建弹性网络意味着要仔细定位节点，以确保少数节点的丢失不会影响其他节点的连接。对于基于
    TCP/IP 的网络，关键在于依赖域名系统（DNS）而非 IP 地址。这确保了服务的可用性，不受实际托管它们的服务器的影响。当然，如果你只将 DNS 查询结果缓存很短的时间，这种策略效果会更好。这将确保设备能更快地适应网络拓扑或服务器可用性的变化。


    除非你使用的是需要最大化电池寿命的受限设备，否则利用协议中的*保活*或*心跳*功能将带来更具弹性的网络连接。例如，如果没有这些功能，设备可能会在未检测到的情况下失去与运营商网络的连接，导致其
    TCP/IP 会话失效。此外，尽管会话 TLS/DTLS 恢复可以缩短握手时间，但通过保持连接活跃可以避免这种恢复。如果你需要让设备休眠以降低功耗，仍然可以通过使用特定于协议的功能来减轻设备负担。例如，MQTT
    持久会话使客户端能够重新连接到代理，而无需重新建立其先前的订阅；MQTT 5 中的会话过期机制确保未及时重新连接的设备的会话被清除。这些功能虽然不能消除重新建立底层
    TCP/IP 连接的需求，但确实简化了流程。


    我建议你对重新连接尝试采用**指数退避**策略。你将使用一种算法，逐步增加连接尝试之间的等待时间，而不是以固定间隔重试。这种技术将避免用大量请求淹没后端服务，确保服务恢复后能更平稳地恢复。


    最后，另一个有用的策略是对连接和请求使用**激进的超时**设置。除非网络延迟高度不可预测，否则设备等待一次连接尝试超过几秒钟是没有意义的。这种“快速失败”策略也有助于延长电池寿命，尤其是在与指数退避结合使用时。


    ### 冗余连接


    对于关键任务用例，网络中断可能导致重大物质损失或人员伤亡，依赖单一网络连接将构成单点故障。因此，许多网关和其他物联网设备提供冗余网络连接。对于依赖蜂窝网络（如
    LTE、5G、LTE-M 或 NB-IoT）的技术，通常通过在设备中添加来自不同网络提供商的第二张备用 SIM 卡来实现。由于这些提供商通常采用订阅模式，费用由套餐、实际数据消耗或两者共同决定，因此这种方式通常具有成本效益。冗余连接可能流量很小，从而有助于控制成本。


    如果你的连接要求非常严格，利用基于完全不同技术和频段的网络是一种可靠但成本更高的策略。当然，你需要考虑有效范围、数据传输速率、延迟和软件支持方面的差异。


    ### 带外管理


    在许多企业场景中，需要最大化部署在偏远或难以到达位置的设备的正常运行时间。由于派遣现场支持人员既昂贵又耗时，通常更便宜的做法是依赖独立的带外网络连接来管理和排除设备故障。此类连接应使用与处理设备常规流量不同的技术。当然，为了控制成本，仅在物联网网关或边缘节点级别部署带外网络是合理的。


    在某些情况下，部署专用设备通过其串行（UART）或以太网端口连接到本地管理的设备是合理的。此类设备可以在网络中断、设备关机、处于睡眠模式、休眠状态或无法访问时提供连接。


    从安全角度来看，将管理流量隔离在专用网络上可以使解决方案在遭受攻击时更具弹性。由于带外网络的使用率低于主连接，因此更容易发现意外或可疑活动。


    ## 连接性与受限设备


    大多数情况下，对网络连接技术的支持取决于你使用的操作系统或实时操作系统提供的网络协议栈以及可用的驱动程序。在 Linux 的情况下，事情很简单；目前大多数可用的无线电模块在内核树中都有直接支持，或者附带相关驱动程序。在实时操作系统的情况下，情况则不太稳定。现在让我们看看如何在
    Zephyr RTOS 上使用 Wi-Fi 和蓝牙连接。

    '
- fmt: '### Wi-Fi


    在 Zephyr 代码仓库中，只有一个通用的 Wi-Fi 示例应用程序。其描述位于：[`https://docs.zephyrproject.org/latest/samples/net/wifi/README.html`](https://docs.zephyrproject.org/latest/samples/net/wifi/README.html)。


    该应用程序可在任何支持 Zephyr Wi-Fi 的开发板上运行。它不包含实际代码，而是展示了如何为 Wi-Fi 配置应用程序，并启用`net_shell`和`net_wifi_shell`模块。这些模块提供了一个命令行界面，可用于运行各种网络相关命令。例如，`net_shell`实现了对`ping`和`route`等命令的支持，而`net_wifi_shell`则提供了扫描可用
    Wi-Fi 网络、连接或断开连接的命令。


    以下是`net_wifi_shell`中扫描命令的输出：


    ```

    shell> wifi scan

    Scan requested

    shell>

    Num  | SSID                       (len) | Chan | RSSI | Sec

    1    | YoRHa no.2, Type B         8     | 1    | -93  | WPA/WPA2

    2    | YoRHa no.9, Type S         8     | 6    | -89  | WPA/WPA2

    3    | Nausicaä                   13    | 11   | -73  | WPA/WPA2

    4    | Forger Family              4     | 1    | -26  | WPA/WPA2


    Scan request done

    ```


    当然，考虑到`net_shell`和`net_wifi_shell`模块所消耗的资源，它们不应在生产应用程序中使用。


    Zephyr 仓库中包含一个针对特定开发板的优秀 Wi-Fi 示例应用程序，名为 [Espressif ESP32 Wi-Fi Station](https://docs.zephyrproject.org/latest/samples/boards/esp32/wifi_station/README.html)。顾名思义，它支持乐鑫的
    ESP32、ESP32-S2 和 ESP32-C3 系统级芯片（SOC）。该代码位于 Zephyr GitHub 代码仓库的以下位置：


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station)


    该应用程序很简单；它将使用配置文件中静态指定的 SSID 和密码连接到网络。以下是 [来自主方法](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station/src/main.c)
    的代码片段，展示了如何连接：


    ```

    wifi_config_t wifi_config = {

    .sta = {

    .ssid = CONFIG_ESP32_WIFI_SSID,

    .password = CONFIG_ESP32_WIFI_PASSWORD,

    },

    };

    esp_err_t ret = esp_wifi_set_mode(WIFI_MODE_STA);

    ret |= esp_wifi_set_config(ESP_IF_WIFI_STA, &wifi_config);

    ret |= esp_wifi_connect();

    ```


    由于受限设备扮演的是 Wi-Fi 客户端（而非接入点）的角色，因此传递给`esp_wifi_set_mode`的参数是`WIFI_MODE_STA`。


    该应用程序依赖于 ESP32 Wi-Fi 驱动程序，该驱动程序位于 Zephyr 仓库中的另一个位置：


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/drivers/wifi/esp32/src/esp_wifi_drv.c`](https://github.com/zephyrproject-rtos/zephyr/blob/main/drivers/wifi/esp32/src/esp_wifi_drv.c)


    该驱动程序又利用了 [Espressif IoT Development Framework](https://github.com/zephyrproject-rtos/hal_espressif)，该框架托管在
    Zephyr 项目 GitHub 组织下的另一个仓库中。该框架支持相关 SOC 中的各种特性和外设。您可以在此处访问稳定版本的文档：[`https://docs.espressif.com/projects/esp-idf/en/stable/esp32/api-reference/index.html`](https://docs.espressif.com/projects/esp-idf/en/stable/esp32/api-reference/index.html)。


    ### Bluetooth


    Zephyr 仓库中有大量各种各样的蓝牙示例。它们的根目录位于：


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth)


    Mesh 网络是蓝牙 BLE 技术的一项重要能力。有三个示例专注于它。这里，我将重点介绍一个简称为`mesh`的示例。大部分代码包含在 [`main.c`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth/mesh/src/main.c)
    文件中，尽管针对 micro:bit 有一个有趣的定制，它会使用该开发板的 LED 显示屏。


    要将蓝牙设备添加到 mesh 网络中，需要对其进行配置（provisioning）。配置是一个配置和安全过程。它由一个*配置者（provisioner）*管理，该配置者可以是另一个设备或一个软件应用程序。配置者发现附近的蓝牙设备并邀请它们加入网络。如果设备接受，则配置者和设备本身交换公钥。然后，每个设备生成一个会话密钥，该密钥将保护配置数据交换的安全。这些数据包括网络密钥、设备密钥、一个称为
    IV 索引（在网络中所有设备间共享）的安全参数，以及设备的单播地址。一旦交换结束，该设备就成为网络中的一个节点。


    蓝牙 mesh 规范整合了*模型（models）*的概念以促进互操作性。[蓝牙 mesh 术语表](https://www.bluetooth.com/bluetooth-technology/topology-options/le-mesh/mesh-glossary/%2523model)指出，一个模型


    > *[…] 定义了一组状态、状态转换、状态绑定、消息和其他相关行为。节点内的一个元素必须支持一个或多个模型，并且正是这个或这些模型定义了元素所具有的功能。蓝牙
    SIG 定义了许多模型，其中许多被有意定位为“通用”模型，在广泛的设备类型中具有潜在效用。*


    注意


    有关蓝牙 mesh 模型的更多信息，您应该阅读 Martin Woolley 撰写的这篇优秀白皮书：[Bluetooth Mesh Models – A Technical
    Overview](https://www.bluetooth.com/wp-content/uploads/2019/04/1903_Mesh-Models-Overview_FINAL.pdf)。


    `mesh` Zephyr 示例应用程序定义了几个简单的模型。在带有 LED 的开发板上，一个通用`OnOff`服务器模型通过 mesh 网络控制开发板第一个
    LED 的状态。在配备按钮的开发板上，一个通用`OnOff`客户端模型在按下按钮时向所有节点发送`OnOff`消息。您可以以标准方式配置运行该应用程序的设备，或者按下一个按钮执行自我配置。标准配置者需要提供一个应用程序密钥并将其绑定到两个模型。另一方面，自我配置会将一个虚拟的应用程序密钥绑定到模型，并为设备使用一个随机的单播地址。


    一旦您配置了设备，按下按钮将在 mesh 网络中传播`OnOff`消息，在接收到消息时打开或关闭 LED。


    现在让我们深入代码。`main`函数注册了按钮按下的处理程序并初始化蓝牙子系统。初始化通过调用`bt_enable`执行。唯一的参数是对名为`bt_ready`的回调函数的引用，如下所示：


    ```

    err = bt_enable(bt_ready);

    if (err) {

    printk("Bluetooth init failed (err %d)\n", err);

    }

    ```


    `bt_ready`函数中的关键行是：


    ```

    err = bt_mesh_init(&prov, &comp);

    ```


    这两个参数分别配置配置过程和模型。配置配置包含在下面复制的结构体中：


    ```

    static const struct bt_mesh_prov prov = {

    .uuid = dev_uuid,

    .output_size = 4,

    .output_actions = BT_MESH_DISPLAY_NUMBER,

    .output_number = output_number,

    .complete = prov_complete,

    .reset = prov_reset,

    };

    ```'
  raw: '### Wi-Fi


    There is only one generic sample application focused on Wi-Fi in the Zephyr code
    repository. It is described here: [`https://docs.zephyrproject.org/latest/samples/net/wifi/README.html`](https://docs.zephyrproject.org/latest/samples/net/wifi/README.html).


    The application will run on any board supporting Wi-Fi under Zephyr. It does not
    contain actual code; it rather shows how to configure an application for Wi-Fi
    and enable the `net_shell` and `net_wifi_shell` modules. Those modules provide
    a command-line interface you can use to run various network-related commands.
    For example, `net_shell` implements support for commands such as `ping` and `route`,
    while `net_wifi_shell` offers commands to scan for available Wi-Fi networks, connect
    to them, or disconnect from them.


    I reproduced the output of the scan command from `net_wifi_shell`:


    ```

    shell> wifi scan

    Scan requested

    shell>

    Num  | SSID                       (len) | Chan | RSSI | Sec

    1    | YoRHa no.2, Type B         8     | 1    | -93  | WPA/WPA2

    2    | YoRHa no.9, Type S         8     | 6    | -89  | WPA/WPA2

    3    | Nausicaä                   13    | 11   | -73  | WPA/WPA2

    4    | Forger Family              4     | 1    | -26  | WPA/WPA2


    Scan request done

    ```


    Naturally, the `net_shell` and `net_wifi_shell` modules should not be used in
    production applications, given the resources they consume.


    The Zephyr repository contains a good board-specific sample application focused
    on Wi-Fi named [Espressif ESP32 Wi-Fi Station](https://docs.zephyrproject.org/latest/samples/boards/esp32/wifi_station/README.html).
    As the name suggests, it supports the ESP32, ESP32-S2, and ESP32-C3 SOCs from
    Espressif. The code can be found at this location in the Zephyr GitHub code repository:


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station)


    The application is simple; it will connect to a network using an SSID and password
    specified statically in a configuration file. The following is a snippet [from
    the main method](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station/src/main.c)
    showing how to connect:


    ```

    wifi_config_t wifi_config = {

    .sta = {

    .ssid = CONFIG_ESP32_WIFI_SSID,

    .password = CONFIG_ESP32_WIFI_PASSWORD,

    },

    };

    esp_err_t ret = esp_wifi_set_mode(WIFI_MODE_STA);

    ret |= esp_wifi_set_config(ESP_IF_WIFI_STA, &wifi_config);

    ret |= esp_wifi_connect();

    ```


    Since the constrained device plays the role of a Wi-Fi client, as opposed to an
    access point, the parameter passed to `esp_wifi_set_mode` is `WIFI_MODE_STA`.


    The application relies on the ESP32 Wi-Fi driver, which is in a different location
    in the Zephyr repo:


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/drivers/wifi/esp32/src/esp_wifi_drv.c`](https://github.com/zephyrproject-rtos/zephyr/blob/main/drivers/wifi/esp32/src/esp_wifi_drv.c)


    The driver, in turn, leverages the [Espressif IoT Development Framework](https://github.com/zephyrproject-rtos/hal_espressif),
    which is hosted in a different repository in the Zephyr project’s GitHub organization.
    The framework supports various features and peripherals found in the relevant
    SOCs. You can access the documentation for the stable version at this location:
    [`https://docs.espressif.com/projects/esp-idf/en/stable/esp32/api-reference/index.html`](https://docs.espressif.com/projects/esp-idf/en/stable/esp32/api-reference/index.html).


    ### Bluetooth


    There is a great variety of Bluetooth samples in the Zephyr repository. The root
    location for them is


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth)


    Mesh networking is an important capability of Bluetooth BLE technology. There
    are three samples focused on it. Here, I will focus on the one simply called `mesh`.
    Most of the code is contained in the [`main.c`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth/mesh/src/main.c)
    file, although there is a fun customization for the micro:bit that will use the
    board’s LED display.


    To add a Bluetooth device to a mesh, you need to provision it. Provisioning is
    a configuration and security process. It is managed by a *provisioner*, which
    can be another device or a software application. The provisioner discovers Bluetooth
    devices in the vicinity and invites them to join the network. If the device accepts,
    then the provisioner and itself exchange public keys. Each device then generates
    a session key that will secure the exchange of the provisioning data. This data
    includes the network key, a device key, a security parameter called the IV index
    shared among all the devices on the network, and the device’s unicast address.
    Once the exchange concludes, the device is a node in the network.


    The Bluetooth mesh specification integrates the notion of *models* to foster interoperability.
    The [Bluetooth mesh glossary](https://www.bluetooth.com/bluetooth-technology/topology-options/le-mesh/mesh-glossary/%2523model)
    states that a model


    > *[…] defines a set of States, State Transitions, State Bindings, Messages, and
    other associated behaviors. An Element within a Node must support one or more
    models, and it is the model or models that define the functionality that an Element
    has. There are a number of models that are defined by the Bluetooth SIG, and many
    of them are deliberately positioned as “generic” models, having potential utility
    within a wide range of device types.*


    Note


    For more information about Bluetooth mesh models, you should read this excellent
    white paper by Martin Woolley: [Bluetooth Mesh Models – A Technical Overview](https://www.bluetooth.com/wp-content/uploads/2019/04/1903_Mesh-Models-Overview_FINAL.pdf).


    The `mesh` Zephyr sample application defines several simple models. On boards
    featuring LEDs, a Generic `OnOff` Server model controls the state of the board’s
    first LED over the mesh. On boards equipped with buttons, a Generic `OnOff` Client
    model sends `OnOff` messages to all nodes when a button is pressed. You can provision
    devices running the application the standard way or press a button to perform
    self-provisioning. A standard provisioner will need to supply an application key
    and bind it to both models. On the other hand, self-provisioning will bind a dummy
    application key to the models and use a random unicast address for the device.


    Once you have provisioned the devices, pressing buttons will propagate OnOff messages
    in the mesh, turning the LED on or off upon reception.


    Let’s now dive into the code. The `main` function registers handlers for button
    presses and initializes the Bluetooth subsystem. Initialization is performed through
    a call to `bt_enable`. The only parameter is a reference to a callback function
    named `bt_ready`, as seen here:


    ```

    err = bt_enable(bt_ready);

    if (err) {

    printk("Bluetooth init failed (err %d)\n", err);

    }

    ```


    The critical line in the bt_ready function is this one:


    ```

    err = bt_mesh_init(&prov, &comp);

    ```


    The two parameters configure the provisioning process and the models, respectively.
    The provisioning configuration is contained in the struct reproduced here:


    ```

    static const struct bt_mesh_prov prov = {

    .uuid = dev_uuid,

    .output_size = 4,

    .output_actions = BT_MESH_DISPLAY_NUMBER,

    .output_number = output_number,

    .complete = prov_complete,

    .reset = prov_reset,

    };

    ```'
  trans: '

    ### Wi-Fi


    在 Zephyr 代码仓库中，只有一个专注于 Wi-Fi 的通用示例应用程序。其描述位于：[`https://docs.zephyrproject.org/latest/samples/net/wifi/README.html`](https://docs.zephyrproject.org/latest/samples/net/wifi/README.html)。


    该应用程序可在任何支持 Zephyr Wi-Fi 的开发板上运行。它不包含实际代码，而是展示了如何为 Wi-Fi 配置应用程序，并启用 `net_shell`
    和 `net_wifi_shell` 模块。这些模块提供了一个命令行界面，可用于运行各种网络相关命令。例如，`net_shell` 实现了对 `ping`
    和 `route` 等命令的支持，而 `net_wifi_shell` 则提供了扫描可用 Wi-Fi 网络、连接或断开连接的命令。


    我复现了 `net_wifi_shell` 中扫描命令的输出：


    ```

    shell> wifi scan

    Scan requested

    shell>

    Num  | SSID                       (len) | Chan | RSSI | Sec

    1    | YoRHa no.2, Type B         8     | 1    | -93  | WPA/WPA2

    2    | YoRHa no.9, Type S         8     | 6    | -89  | WPA/WPA2

    3    | Nausicaä                   13    | 11   | -73  | WPA/WPA2

    4    | Forger Family              4     | 1    | -26  | WPA/WPA2


    Scan request done

    ```


    当然，考虑到 `net_shell` 和 `net_wifi_shell` 模块所消耗的资源，它们不应在生产应用程序中使用。


    Zephyr 仓库中包含一个专注于 Wi-Fi 的优秀板级示例应用程序，名为 [Espressif ESP32 Wi-Fi Station](https://docs.zephyrproject.org/latest/samples/boards/esp32/wifi_station/README.html)。顾名思义，它支持乐鑫的
    ESP32、ESP32-S2 和 ESP32-C3 系统级芯片（SOC）。该代码位于 Zephyr GitHub 代码仓库的以下位置：


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station)


    该应用程序很简单；它将使用配置文件中静态指定的 SSID 和密码连接到网络。以下是 [来自主方法](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/boards/esp32/wifi_station/src/main.c)
    的代码片段，展示了如何连接：


    ```

    wifi_config_t wifi_config = {

    .sta = {

    .ssid = CONFIG_ESP32_WIFI_SSID,

    .password = CONFIG_ESP32_WIFI_PASSWORD,

    },

    };

    esp_err_t ret = esp_wifi_set_mode(WIFI_MODE_STA);

    ret |= esp_wifi_set_config(ESP_IF_WIFI_STA, &wifi_config);

    ret |= esp_wifi_connect();

    ```


    由于受限设备扮演的是 Wi-Fi 客户端（而非接入点）的角色，因此传递给 `esp_wifi_set_mode` 的参数是 `WIFI_MODE_STA`。


    该应用程序依赖于 ESP32 Wi-Fi 驱动程序，该驱动程序位于 Zephyr 仓库中的另一个位置：


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/drivers/wifi/esp32/src/esp_wifi_drv.c`](https://github.com/zephyrproject-rtos/zephyr/blob/main/drivers/wifi/esp32/src/esp_wifi_drv.c)


    该驱动程序又利用了 [Espressif IoT Development Framework](https://github.com/zephyrproject-rtos/hal_espressif)，该框架托管在
    Zephyr 项目 GitHub 组织下的另一个仓库中。该框架支持相关 SOC 中的各种功能和外设。您可以在此处访问稳定版本的文档：[`https://docs.espressif.com/projects/esp-idf/en/stable/esp32/api-reference/index.html`](https://docs.espressif.com/projects/esp-idf/en/stable/esp32/api-reference/index.html)。


    ### 蓝牙


    Zephyr 仓库中有大量蓝牙示例。它们的根目录位于：


    [`https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth)


    Mesh 网络是蓝牙 BLE 技术的一项重要功能。有三个示例专注于它。在此，我将重点介绍那个简称为 `mesh` 的示例。大部分代码包含在 [`main.c`](https://github.com/zephyrproject-rtos/zephyr/blob/main/samples/bluetooth/mesh/src/main.c)
    文件中，尽管针对 micro:bit 有一个有趣的定制，它会使用该开发板的 LED 显示屏。


    要将蓝牙设备添加到 mesh 网络中，需要对其进行配置。配置是一个配置和安全过程。它由*配置器*管理，配置器可以是另一个设备或软件应用程序。配置器发现附近的蓝牙设备，并邀请它们加入网络。如果设备接受，则配置器和设备会交换公钥。然后每个设备生成一个会话密钥，该密钥将保护配置数据交换的安全。这些数据包括网络密钥、设备密钥、一个称为
    IV 索引的安全参数（由网络上的所有设备共享）以及设备的单播地址。一旦交换结束，该设备就成为网络中的一个节点。


    蓝牙 mesh 规范集成了*模型*的概念以促进互操作性。[蓝牙 mesh 术语表](https://www.bluetooth.com/bluetooth-technology/topology-options/le-mesh/mesh-glossary/%2523model)指出，一个模型


    > *[…] 定义了一组状态、状态转换、状态绑定、消息和其他相关行为。节点内的元素必须支持一个或多个模型，并且正是这些模型定义了元素所具有的功能。蓝牙 SIG
    定义了许多模型，其中许多被有意定位为“通用”模型，在广泛的设备类型中具有潜在用途。*


    注意


    有关蓝牙 mesh 模型的更多信息，您应该阅读 Martin Woolley 撰写的这份优秀白皮书：[Bluetooth Mesh Models – A Technical
    Overview](https://www.bluetooth.com/wp-content/uploads/2019/04/1903_Mesh-Models-Overview_FINAL.pdf)。


    `mesh` Zephyr 示例应用程序定义了几个简单的模型。在带有 LED 的开发板上，一个通用的 `OnOff` 服务器模型通过 mesh 网络控制开发板第一个
    LED 的状态。在配备按钮的开发板上，一个通用的 `OnOff` 客户端模型在按下按钮时向所有节点发送 `OnOff` 消息。您可以以标准方式配置运行该应用程序的设备，或者按下一个按钮来执行自我配置。标准配置器需要提供一个应用程序密钥并将其绑定到两个模型。另一方面，自我配置会将一个虚拟的应用程序密钥绑定到模型，并为设备使用一个随机的单播地址。


    一旦您配置了设备，按下按钮将在 mesh 网络中传播 OnOff 消息，在接收到消息时打开或关闭 LED。


    现在让我们深入代码。`main` 函数注册了按钮按下的处理程序并初始化了蓝牙子系统。初始化通过调用 `bt_enable` 执行。唯一的参数是对名为 `bt_ready`
    的回调函数的引用，如下所示：


    ```

    err = bt_enable(bt_ready);

    if (err) {

    printk("Bluetooth init failed (err %d)\n", err);

    }

    ```


    `bt_ready` 函数中的关键行是这一行：


    ```

    err = bt_mesh_init(&prov, &comp);

    ```


    这两个参数分别配置配置过程和模型。配置配置包含在下面复现的结构体中：


    ```

    static const struct bt_mesh_prov prov = {

    .uuid = dev_uuid,

    .output_size = 4,

    .output_actions = BT_MESH_DISPLAY_NUMBER,

    .output_number = output_number,

    .complete = prov_complete,

    .reset = prov_reset,

    };

    ```

    '
- fmt: '# 排版后的内容


    Things are a bit less direct for the models. The `comp` struct, as shown here,
    refers to another struct called `elements`.


    ```

    static const struct bt_mesh_comp comp = {

    .cid = BT_COMP_ID_LF,

    .elem = elements,

    .elem_count = ARRAY_SIZE(elements),

    };

    ```


    And `elements`, in turn, integrates another struct called `models`. This reflects
    that, in this case, the application declares a single element to hold all its
    models.


    ```

    static struct bt_mesh_elem elements[] = {

    BT_MESH_ELEM(0, models, BT_MESH_MODEL_NONE),

    };

    ```


    In addition to the two custom models required by the application, the `models`
    struct uses standard models for configuration and health. The following is the
    declaration:


    ```

    static struct bt_mesh_model models[] = {

    BT_MESH_MODEL_CFG_SRV,

    BT_MESH_MODEL_HEALTH_SRV(&health_srv, &health_pub),

    BT_MESH_MODEL(BT_MESH_MODEL_ID_GEN_ONOFF_SRV, gen_onoff_srv_op, NULL,

    NULL),

    BT_MESH_MODEL(BT_MESH_MODEL_ID_GEN_ONOFF_CLI, gen_onoff_cli_op, NULL,

    NULL),

    };

    ```


    As you can see, a list of possible operations is attached to the two custom models.
    Here is one of them:


    ```

    static const struct bt_mesh_model_op gen_onoff_srv_op[] = {

    { OP_ONOFF_GET,       BT_MESH_LEN_EXACT(0), gen_onoff_get },

    { OP_ONOFF_SET,       BT_MESH_LEN_MIN(2),   gen_onoff_set },

    { OP_ONOFF_SET_UNACK, BT_MESH_LEN_MIN(2),   gen_onoff_set_unack },

    BT_MESH_MODEL_OP_END,

    };

    ```


    Each of those operations is tied to specific callback functions. For example,
    `gen_onoff_get` calls `onoff_status_send`.


    ```

    static int onoff_status_send(struct bt_mesh_model *model,

    struct bt_mesh_msg_ctx *ctx)

    {

    uint32_t remaining;

    BT_MESH_MODEL_BUF_DEFINE(buf, OP_ONOFF_STATUS, 3);

    bt_mesh_model_msg_init(&buf, OP_ONOFF_STATUS);

    remaining = k_ticks_to_ms_floor32(

    k_work_delayable_remaining_get(&onoff.work)) +

    onoff.transition_time;

    ...

    if (remaining) {

    net_buf_simple_add_u8(&buf, !onoff.val);

    net_buf_simple_add_u8(&buf, onoff.val);

    net_buf_simple_add_u8(&buf, model_time_encode(remaining));

    } else {

    net_buf_simple_add_u8(&buf, onoff.val);

    }

    return bt_mesh_model_send(model, ctx, &buf, NULL, NULL);

    }

    ```


    As you can see, most of the code in the function is used to build the payload,
    which is then transmitted by calling `bt_mesh_model_send`.


    Working directly with Bluetooth networking involves writing a bit more code compared
    to protocols like LwM2M or MQTT. Using such protocols over a Bluetooth connection
    is possible by leveraging 6LoWPAN, allowing IPv6 packets to be transmitted over
    IEEE 802.15.4-based networks. However, this will probably consume more power than
    Bluetooth’s native protocol.


    Footnotes [1](#524096_1_En_9_Chapter.xhtml#Fn1_source) [2](#524096_1_En_9_Chapter.xhtml#Fn2_source)
    [3](#524096_1_En_9_Chapter.xhtml#Fn3_source) [4](#524096_1_En_9_Chapter.xhtml#Fn4_source)
    [5](#524096_1_En_9_Chapter.xhtml#Fn5_source)


    # 10. Operating Systems


    > *Informatique : Alliance d''une science inexacte et d''une activité humaine
    faillible.*

    >

    > *Computer science: Alliance of an inexact science and a fallible human activity.*

    >

    > —Luc Fayard


    An operating system (OS) is software that manages a computer''s hardware and software
    resources and provides shared services to other programs. In other words, it is
    an interface between hardware and software. Since the 1990s, most computers on
    the market run an operating system. However, this was not always the case. Early
    mainframes in the 1950s lacked one and could only run one program simultaneously.
    IBM was the first hardware maker to introduce the concept of a single operating
    system spanning an entire line of products with OS/360 in 1964 – although the
    company released three software variants due to storage limitations and the overall
    complexity of the project. In the 1970s and 1980s, many popular home microcomputers
    were used without an operating system. Nearly all of them shipped with a built-in
    BASIC interpreter that doubled as a command-line interface for the machine. Since
    floppy disk drives were expensive, cassette tape was the most common storage medium.
    Because those home computers had fixed configurations and could only run a single
    program at a time, an operating system was not strictly necessary.


    This chapter will describe various operating systems and their feature sets. I
    will also take the time to introduce you to a few *bare metal* options, that is,
    ways to build applications that will run directly on the hardware without the
    support of an OS. Finally, I will show you how to get started as a developer with
    the Drogue IoT project and the Zephyr operating system.'
