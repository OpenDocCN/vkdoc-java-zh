- fmt: '### Setting Up TLS


    To use TLS, you will need a CA certificate plus a key and certificate for the
    broker. Self-signed certificates (not validated by a Certificate Authority) will
    not work. Moreover, you should make sure keys are not encrypted or password protected.
    Different brokers could have different requirements for the certificates. Always
    read the documentation attentively to generate certificates and keys suitable
    for your preferred broker.


    The first step of the process is to generate a certificate and key for a certificate
    authority. This is the command you need to run:


    ```

    openssl req -new -x509 -days 365 -extensions v3_ca -keyout mosquitto_ca.key -out
    mosquitto_ca.crt

    ```


    You will need to answer several questions before the artifacts are generated.
    The following is an example:


    ```

    Generating a RSA private key

    ...+++++

    ...............................................................+++++

    writing new private key to ''mosquitto_ca.key''

    Enter PEM pass phrase:

    Verifying - Enter PEM pass phrase:


    You are about to be asked to enter information that will be incorporated

    into your certificate request.

    What you are about to enter is what is called a Distinguished Name or a DN.

    There are quite a few fields but you can leave some blank

    For some fields there will be a default value,

    If you enter ''.'', the field will be left blank.


    Country Name (2 letter code) [AU]:CA

    State or Province Name (full name) [Some-State]:Ontario

    Locality Name (eg, city) []:Ottawa

    Organization Name (eg, company) [Internet Widgits Pty Ltd]:Phantom Thieves

    Organizational Unit Name (eg, section) []:P5 Royal

    Common Name (e.g. server FQDN or YOUR name) []:blueberrycoder.com

    Email Address []:

    ```


    The second step is to generate a key for our broker. This is the command:


    ```

    openssl genrsa -out mosquitto_server.key 2048

    ```


    This is the output you will get:


    ```

    Generating RSA private key, 2048 bit long modulus (2 primes)

    ....+++++

    ...........+++++

    e is 65537 (0x010001)

    ```


    The third step is to create a certificate signing request using the broker key.
    Issue this command:


    ```

    openssl req -out mosquitto_server.csr -key mosquitto_server.key -new

    ```


    Once again, you will need to answer questions about the country, state, locality,
    and common name (CN). Make sure you specify the hostname or domain name of the
    broker. In this case, I picked `fedora`, the hostname of one of my trusty Raspberry
    Pis.


    Now, I can use the certificate authority’s key and certificate to create and sign
    the broker’s certificate.


    ```

    openssl x509 -req -in mosquitto_server.csr -CA mosquitto_ca.crt -CAkey mosquitto_ca.key
    -CAcreateserial -out mosquitto_server.crt -days 365

    ```


    The output should look like this:


    ```

    Signature ok

    subject=C = CA, ST = Ontario, L = Ottawa, O = Phantom Thieves, OU = P5 Royal,
    CN = fedora

    Getting CA Private Key

    Enter pass phrase for mosquitto_ca.key:

    ```


    Whew! At this point, we have everything the broker needs. You could create the
    files on a development machine and use `scp` to transfer them to the machine hosting
    the broker.


    Each of the clients will also need a certificate. The process to create those
    is similar to the one used for the broker. The instructions I provide create certificates
    suitable for `mosquitto_sub` and `mosquitto_pub`.


    First, let’s create a client key:


    ```

    openssl genrsa -out mqtt_client.key 2048

    ```


    You should see something like this:


    ```

    Generating RSA private key, 2048 bit long modulus (2 primes)

    ..........................................................+++++

    ........................................+++++

    e is 65537 (0x010001)

    ```


    Let’s now create a signing request.


    ```

    openssl req -out mqtt_client.csr -key mqtt_client.key -new

    ```


    Once again, you will need to answer a slew of questions. In this case, I created
    a certificate for my beloved Ashitaka workstation. Here is how things should look:


    ```

    You are about to be asked to enter information that will be incorporated

    into your certificate request.

    What you are about to enter is what is called a Distinguished Name or a DN.

    There are quite a few fields but you can leave some blank

    For some fields there will be a default value,

    If you enter ''.'', the field will be left blank.


    Country Name (2 letter code) [AU]:CA

    State or Province Name (full name) [Some-State]:Ontario

    Locality Name (eg, city) []:Ottawa

    Organization Name (eg, company) [Internet Widgits Pty Ltd]:Phantom Thieves

    Organizational Unit Name (eg, section) []:P5 Royal

    Common Name (e.g. server FQDN or YOUR name) []:Ashitaka

    Email Address []:

    Please enter the following ''extra'' attributes

    to be sent with your certificate request

    A challenge password []:

    An optional company name []:

    ```


    I sign the signing request with the CA’s key and certificate.


    ```

    openssl x509 -req -in mqtt_client.csr -CA mosquitto_ca.crt -CAkey mosquitto_ca.key
    -CAcreateserial -out mqtt_client.crt -days 365

    ```


    The output should resemble this:


    ```

    Signature ok

    subject=C = CA, ST = Ontario, L = Ottawa, O = Phantom Thieves, OU = P5 Royal,
    CN = Ashitaka

    Getting CA Private Key

    Enter pass phrase for mosquitto_ca.key:

    ```


    You can use the client certificate to publish or subscribe on the broker at this
    point. It is essential to use the hostname for the broker and not its IP address;
    you may have to tweak your internal DNS server or add entries to `/etc/hosts`,
    among other things.


    For example, you could subscribe like this:


    ```

    mosquitto_sub -h fedora -p 8883 -t wisdom/# -v --cafile mosquitto_ca.crt -–cert
    mqtt_client.crt -i Ashitaka

    ```


    To publish some wisdom, you could use this command:


    ```

    mosquitto_pub -h fedora -p 8883 -t wisdom/Rome -m ''Carpe Diem'' --cafile mosquitto_ca.crt
    -–cert mqtt_client.crt

    ```


    ### Sandbox Servers


    There is a publicly available instance of Mosquitto at `test.mosquitto.org` on
    ports 1883 and 8883. It supports plain MQTT, MQTT over TLS, MQTT over TLS (with
    client certificate), MQTT over WebSockets, and MQTT over WebSockets with TLS.


    The Eclipse Paho team also maintains a Mosquitto sandbox. It can be found at `mqtt.eclipseprojects.io`
    on ports 1883 and 8883. It supports plain MQTT and MQTT over TLS (with client
    certificate).


    Both servers always run the latest version. Please use them responsibly and do
    not count on them for production applications. There are no access controls configured
    on those servers, so any data you publish will be accessible to all.


    ## Building Clients with Eclipse Paho


    `mosquitto_pub` and `mosquitto_sub` are useful troubleshooting tools built on
    [libmosquitto](https://mosquitto.org/man/libmosquitto-3.html), a C library you
    can use to integrate MQTT support into your programs.


    An alternative to libmosquitto is the Eclipse Paho [collection of MQTT client
    libraries](https://www.eclipse.org/paho/index.php%253Fpage%253Ddownloads.php).
    Paho offers MQTT client libraries in the following languages: C, C# (.Net), C++,
    GoLang, Embedded C/C++ (for constrained devices), Java, JavaScript, Python, and
    Rust. There is also an Android service available. Each library is developed independently
    and supports MQTT 3.1.1 at a minimum. Paho offers many advanced features, such
    as automatic reconnect, offline buffering, high availability, and a choice of
    blocking and nonblocking APIs. Not all libraries support all possible features,
    but the Java, C, and C++ versions do.


    Like Mosquitto, Paho is published under the Eclipse Distribution License v1.0
    and the Eclipse Public License v2.0.


    I will now show you how to leverage the Java and Python versions of Paho to build
    simple MQTT programs.'
