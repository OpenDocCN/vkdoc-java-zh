  | Foursquare | 主要是商店和餐馆 | 367 万 | 19.3% |\n\n### VR/元宇宙\n\nFacebook 更名为 Meta，押注于尚未完全显现的元宇宙。除了\
  \ Meta，苹果（曾多次用 iPod、iPhone 或 Apple Watch 等产品颠覆成熟市场）也将其 Vision Pro 头显投入了竞争。\n\n以下是顶级的社交\
  \ VR 应用：\n\n*   AltspaceVR\n\n*   BeanVR\n\n*   Bigscreen\n\n*   Couch\n\n*   Horizon\
  \ Venues\n\n*   Horizon Worlds\n\n*   Rec Room\n\n*   Sansar\n\n*   Second Life\n\
  \n*   Sensorium Galaxy\n\n*   VRChat\n\n*   VRzone\n\n*   vTime XR\n\n### 垂直社交网络\n\
  \n垂直社交网络是专注于特定社区（如开发者、游戏玩家、投资者、邻居、园艺或书籍爱好者）兴趣的专业化社交媒体平台。\n\n#### 开发\n\n以下是五大社交开发者平台：\n\
  \n*   GitHub\n\n*   GitLab\n\n*   Bitbucket\n\n*   Launchpad\n\n*   SourceForge\n\
  \n#### 金融\n\n有几个专注于金融和投资的社交网络，包括以下平台：\n\n*   eToro – 一个社交交易和投资平台，允许用户交易和投资各种金融工具，如股票、货币和大宗商品。它还允许用户关注和复制平台上其他成功投资者的交易。\n\
  \n*   Stocktwits – 一个供投资者和交易者分享和讨论市场见解、新闻和分析的社交网络。这是一个社区驱动的平台，允许用户实时分享他们对个股和其他金融工具的看法。\n\
  \n*   Seeking Alpha – 一个面向投资者和交易者的社交媒体平台，提供关于股票和其他投资的实时财经新闻、分析和研究。它还允许用户与社区分享他们的见解和观点。\n\
  \n这些社交网络对于投资者和交易者来说是宝贵的资源，可以帮助他们了解金融市场的最新新闻、分析和见解，并与志同道合的专业人士或业余投资者建立联系和互动。\n\n\
  #### 健康与健身\n\n有许多专门针对健康和健身的社交网络和门户网站。虽然许多健身、健康或营养领域的网红只是使用 Facebook、Twitter 或 Instagram\
  \ 来炫耀腹肌，但越来越多的人使用可穿戴设备和类似的智能设备来量化各种健康状况，从睡眠模式到体重再到心率。在这些“量化自我”的人群中，许多人选择通过社交网络公开分享他们的数据。\n\
  \n许多智能手表制造商都有自己专有的应用程序，但平台提供商也提供健身和智能设备门户网站，例如：\n\n*   Apple 健康\n\n*   Google 健身\n\
  \n*   Fitbit（现也属于 Google）\n\n*   Strava\n\n*   阿迪达斯（Runtastic）\n\n*   MyFitnessPal\n\
  \n##### Apple 健康\n\nApple 健康主要是一款 iOS 移动应用，也是 Apple Watch 的配套应用。该应用增加了对 20 种数据类型（从静息心率到睡眠或有氧适能）的趋势分析，使用户能够了解特定指标的变化趋势。\n\
  \n在获得用户许可后（目前主要在美国），用户还可以与他们的医生或保险公司共享选定的健康信息。\n\n![](img/600273_1_En_2_Fig1_HTML.jpg)\n\
  \n一个移动应用 Apple 健康的截图。它包含按日、周、月和年显示的心率。以条形图形式展示了 12 月的心率，包含最小值和最大值记录。“添加到个人收藏”开关已打开。\n\
  \n图 2-1\n\nApple 健康：心率\n\n自 watchOS 5 起，新增了一项 Apple Watch 活动功能，旨在激励用户锻炼并与朋友竞争。他们可以从自己的\
  \ Apple Watch 向任何朋友发起为期七天的竞赛，看谁能更快地填满活动圆环，见图 2-2。\n\n![](img/600273_1_En_2_Fig2_HTML.jpg)\n\
  \n一个标题为“竞赛”的移动截图。包含 Jane（3281 分）和我（2487 分）。下方区域显示了 Brian、Chris、Christian、Jane 和我的记录，包含百分比和卡路里比例。底部的“共享”选项被高亮显示。\n\
  \n图 2-2\n\nApple 健康：竞赛\n\n\n\n##### Google Fit\n\nGoogle Fit 是谷歌为安卓操作系统打造的健康追踪平台。它允许用户监测和追踪多种健康与健身信息，例如活动量、心率、体重、步数或睡眠情况。\n\
  \nGoogle Fit 整合了来自多个传感器设备和第三方应用的数据，让用户能够轻松地在同一位置查看和管理自己的健康与健身数据。\n\n![](img/600273_1_En_2_Fig3_HTML.jpg)\n\
  \n一张网页截图，展示了 Google Fit 仪表盘。包含一个表盘，显示今日步行 42 分钟，距您的平均值还差 17 分钟。右侧的折线图有四条线，分别代表一周内每天的总活动、步行、跑步和骑行时间。\n\
  \n图 2-3\n\nGoogle Fit 仪表盘\n\n用户可以设定并追踪目标，例如每日步数、减重、睡眠时长或每周跑步目标，并根据其活动获得个性化的见解和建议。Google\
  \ Fit 旨在通过帮助用户更轻松地管理健身目标并长期监测进展，来改善用户的健康与福祉。但截至目前，Google Fit 不提供与其他人分享或竞争的功能；与苹果、阿迪达斯或\
  \ Strava 不同，Google Fit 目前没有挑战功能。2019 年，Google Fit 网页应用已停止服务。\n\n##### Fitbit\n\n\
  Fitbit 于 2019 年被谷歌收购。虽然正在推进与谷歌账户的更紧密整合（尤其针对新用户和新注册设备），但该品牌仍保持一定独立性，尽管它可被视为与“Pixel”等其他谷歌品牌同等的存在。\n\
  \n谷歌承诺，到 2025 年之前，旧的遗留账户仍可在没有谷歌账户的情况下运行；此后，谷歌账户将成为强制要求，或者 Fitbit 应用和仪表盘（见图 2-4）甚至可能被合并到\
  \ Google Fit 中。\n\n![](img/600273_1_En_2_Fig4_HTML.jpg)\n\n一张网页截图，展示了 Fitbit 仪表盘。它包括饮食计划、与朋友分享、活动量、一个显示步行步数（分为轻度、中度或剧烈活动柱状图）的条形图，以及饮水量。\n\
  \n图 2-4\n\nFitbit 仪表盘\n\nFitbit 提供营养和运动追踪，以及通过徽章或挑战等形式实现的游戏化功能。但在谷歌旗下，很可能是为了削减成本，这些功能已于\
  \ 2023 年 3 月底被取消 [51]。Fitbit 用户对此举措并不满意。Fitbit 在 2020 年拥有 3100 万活跃用户，同比增长 4%（在谷歌收购之前）。然而，其全球市场份额——Fitbit\
  \ 在 2014 年曾占据 45%——在 2020 年跌至 3% 以下。尽管苹果一段时间以来一直以接近 30% 的市场份额领先智能手表品牌，但截至 2022 年底，谷歌仍以\
  \ 8% 的份额位居第二（涵盖所有品牌），其中 Pixel Watch 的销量可能领先于其 Fitbit 设备。\n\n##### Strava\n\nStrava\
  \ 是一个具有强烈社交属性的健身门户网站。大多数用户可能专注于跑步或骑行，但它也提供数十种不同的运动项目，包括瑜伽或雪鞋行走。\n\n与大多数侧重于休闲或半专业运动员的健身门户不同，也有像职业自行车手这样的专业运动员在使用它。\n\
  \n![](img/600273_1_En_2_Fig5_HTML.jpg)\n\n一张网页截图，展示了 Strava 健身门户。页面包含一位来自加利福尼亚州的用户。该应用追踪距离、运动时间、海拔高度，显示海拔扩展状态，以及平均爬坡速度等参数。下方还包含一张谷歌地图。\n\
  \n图 2-5\n\nStrava 活动\n\n其功能包括可与他人分享的俱乐部和路线，以及供用户相互竞争挑战的功能，并且能与自行车码表、健身追踪器、智能手表等多种设备集成。\n\
  \n![](img/600273_1_En_2_Fig6_HTML.jpg)\n\n一张 Java One 极客自行车骑手 Facebook 页面的截图。包含一张没有辐条的停放自行车的照片，以及一个自行车码表的头像。文字内容是关于\
  \ Java One 前一个周六的年度自行车骑行活动。\n\n图 2-6\n\nStrava 俱乐部\n\n部分功能需要付费订阅，但仍有足够多的功能可以在不付费的情况下使用。\n\
  \n##### Adidas/Runtastic\n\n最初的构想源于 2006 年上奥地利应用科学大学的一个追踪帆船的项目，并最终促成了 Runtastic\
  \ 于 2009 年的创立。\n\n2015 年 8 月，阿迪达斯宣布以 2.2 亿欧元（2.4 亿美元）收购 Runtastic，其中包括报社集团 Axel\
  \ Springer 自 2013 年起持有的 50.1% 的股份。\n\n##### MyFitnessPal\n\nMyFitnessPal 是一款智能手机和网页应用，允许用户追踪其卡路里摄入量、运动情况以及其他健身信息。它是一个数字饮食日记，帮助人们监测每日食物摄入，以实现其健康和健身目标。\n\
  \n![](img/600273_1_En_2_Fig7_HTML.jpg)\n\n一张 MyFitnessPal 网页应用的截图。包含一份晚餐和零食的饮食日记，并标注了卡路里。下方是三个示例食物及其卡路里。顶部有一个等式：目标\
  \ 3650 - 食物 1161 + 0 运动 = 剩余 2489。\n\n图 2-7\n\nMyFitnessPal\n\n该应用拥有超过 700 万种食物的数据库，用户可以记录餐食，或扫描包装上的条形码以便轻松追踪。它还包括追踪液体摄入量、摄入的碳水化合物、蛋白质或脂肪，以及运动情况的功能，这些数据可以与其他健身应用和可穿戴设备（如智能手表或体重秤）同步。\n\
  \n2015 年 2 月，运动服装公司 Under Armour 收购了 MyFitnessPal，但在 2020 年，它又将其出售给了一家私募股权公司。似乎是为了在新管理层下削减成本，2022\
  \ 年，甚至在 Fitbit 之前，MyFitnessPal 就移除了大部分社交功能（如挑战），只保留了营养或运动信息的社交分享功能。\n\n#### 旅行\n\
  \n表 2-2 列出了排名前 20 的社交旅行服务。它们的类别涵盖从预订、住宿到航空或社交乘车等各个方面。\n\n表 2-2\n\n热门旅行网站\n\n| 网站\
