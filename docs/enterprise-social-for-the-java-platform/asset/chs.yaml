  maven-war-plugin\n${maven-war-plugin.version}\n\norg.apache.maven.plugins\nmaven-surefire-plugin\n\
  ${maven-surefire-plugin.version}\n\n${skip.unit.tests}\n\ndefault-test\ntest\n\n\
  test\n\n**/it/**\n\norg.apache.maven.plugins\nmaven-failsafe-plugin            \
  \      ${maven-failsafe-plugin.version}\n                    ${skip.integration.tests}\n\
  \nintegration-test\nintegration-test\n\nintegration-test\nverify\n\n**/it/**\n\n\
