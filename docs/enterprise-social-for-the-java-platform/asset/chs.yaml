  ## 近代历史


  在 20 世纪，我们现在所熟知的信息技术始于康拉德·楚泽、乔治·斯蒂比兹或霍华德·艾肯等先驱，当然还有艾伦·图灵，他创造了图灵测试作为人工智能和社交机器人的基准。




  ### X 世代


  1975 年，在美国军队即将撤出越南前不久，自由主义思想家塞缪尔·爱德华·康金三世提出了一种名为“市场无政府主义”的哲学，这是一种关于反经济学的社会哲学及其相关实践理念[5]。在一个市场无政府主义社会中，法律和安全将由市场参与者而非政治机构提供。市场无政府主义者认识到，这种情况无法通过政治改革来实现。相反，它应作为市场进程的结果而出现。其社会价值观的某些方面如今可以在“占领运动”中找到，该运动的主要目标是使所有社会中的经济和政治关系减少垂直等级制，变得更加扁平化。或者体现在像意大利的贝佩·格里洛、希腊的激进左翼联盟（该党甚至曾执掌政府）、西班牙的“我们能”党，或海盗党等抗议政党中。市场无政府主义还提出了使用不同货币的想法，现代社交媒体和相关在线社区正通过像比特币这样的数字货币来采纳这一理念。


  1966 年，电子邮件被发明；大约一年后，美国军方创建了计算机网络 ARPANET；随后，CompuServe 于 1969 年问世。CompuServe 在
  20 世纪 80 年代末推出了其电子邮件服务，并扩展到 90 年代初，最终在经历多次收购后，于 2009 年解散了最初的 CompuServe。


  Usenet 于 1979 年启动，为其用户提供论坛和新闻组。令人惊讶的是，它们的大部分功能变化甚微，至今仍然存在。


  互联网中继聊天（IRC）始于 1988 年，在学术网络中广泛使用，随后演变为如今的互联网。IRC 至今仍相当活跃，尽管它在很大程度上被 Twitter 等其他短消息服务所掩盖。全球仍有大约
  3200 个 IRC 服务器，提供数十万个频道。


  ### Y 世代（千禧一代）


  基于“六度分隔”理论[6]，第一个现代社交网络 sixdegrees.com 于 1997 年成立。它允许成员将其他成员添加为好友、发送消息或在公告板上发帖。在以
  1.25 亿美元的价格出售给另一家公司后，它于 2001 年关闭，当时拥有大约 100 万用户。后来它曾短暂复兴，至今仍存在。


  当亚马逊、雅虎以及 1998 年的谷歌等服务首次出现时，它们并不被视为社交网络。1995 年，微软通过推出微软网络（MSN）抓住了新兴趋势。MSN 被称为“门户”，这是个性化在线社区的另一种说法。几年后，许多门户产品、服务器和供应商纷纷加入社交网络的热潮，这并不令人惊讶。


  微软和雅虎都落后于社交媒体领域的一些新秀，而除了对 YouTube 相当出色和迅速的收购外，谷歌也多少低估了社交媒体的其他方面，直到它通过 Google+回归，并且即使它可能无法引领社交媒体的所有方面，也肯定会在此立足。雅虎也提供了大量社交功能，并且自其近期复苏以来，已收购了社交网络领域的一些小型供应商，如
  Flickr 或 Tumblr。1999 年，后来也在谷歌工作的布拉德·菲茨帕特里克创立了 LiveJournal。


  ### Z 世代


  在 21 世纪初，许多社交网络相继成立，尽管其中不少未能存活至今。Hot or Not（AmIHotOrNot.com）由詹姆斯·洪和吉姆·杨于 2000 年
  10 月创立，他们是两位朋友，也是加州大学伯克利分校的同学。该网站的初始动机源于创始人对女性吸引力的争论。它是第一个允许上传照片供他人评分的网站，据称影响了 Facebook
  或 YouTube 的创建者。2008 年，Hot or Not 以传闻中的 2000 万美元卖给了在线约会服务 Ashley Madison 的所有者（该公司后来因所有客户数据被黑客窃取而臭名昭著），并于
  2012 年被 Badoo 收购，后者现在是 Bumble 约会应用集团的一部分。


  虽然该网址仍然存在，但该应用已更名为“Chat & Date”，与原始网站几乎毫无共同之处，但 Hot or Not 当然可以被视为 Tinder 等现代约会应用的第一个前身。


  Friendster 成立于 2002 年，最初也计划成为一个类似于 Hot or Not 的约会网站，但它后来变成了一个与志同道合的人及其共同朋友建立联系的网站。它包含个人资料和状态更新，允许你分享心情和交换消息。


  直到 2004 年初，它都是最大、最受欢迎的社交网络，但这最终也导致了它的失败，因为它无法扩展以处理用户需求，让许多用户感到沮丧，转而寻找替代品。2003 年，谷歌出价
  3000 万美元收购 Friendster，但创始人拒绝了这一报价。2009 年，它最终被吉隆坡一家名为 MOL Global 的互联网公司收购。除了以亚洲用户为主外，Friendster
  的专利也是一项重要资产，其中包括一项“用于基于社交网络中的关系在在线计算机系统中连接用户的系统、方法和装置”的专利。这些核心社交基础设施专利中的大部分在 2010
  年被 Facebook 以 4000 万美元买下。


  一年后，Friendster 变成了一个社交游戏网站。2015 年 6 月 14 日，该网站关闭，三年后的 2018 年，该公司终止运营。


  同样成立于 2002 年的领英（LinkedIn），后来有时被认为是“成年人的 Myspace”，是第一个为用户提供付费高级套餐的社交网络。其就业市场和订阅服务帮助它在
  2006 年实现盈利。就业市场和在线简历成为其关键功能，使其成为相比其他社交网络更专业的社交网络。


  2011 年，领英申请首次公开募股（IPO）。五年后的 2016 年，微软以 262 亿美元收购了领英，这是微软仅次于视频游戏生产商动视暴雪的第二大收购案，微软曾试图在
  2022 年以 687 亿美元收购动视暴雪[42]。英国监管机构曾提出担忧，但最终于 2023 年 10 月 13 日（即使是星期五）批准了该交易。


  Myspace（2012 年品牌重塑前为 MySpace），Friendster 最大的竞争对手，始于 2003 年，从用户对 Friendster 技术问题的沮丧中获益最多。它最初受
  Friendster 启发，但也提供了一些改进，例如个性化定制或无需先登录即可查看的公开个人资料。2005 年 2 月，Myspace 拒绝了马克·扎克伯格以
  7500 万美元出售 Facebook 的提议。仅仅几个月后，福克斯新闻的母公司新闻集团以 5.8 亿美元收购了 Myspace 本身。直到 2008 年，Myspace
  都是领先的社交网站，但在 2009 年被 Facebook 超越，此后用户迅速流失。2011 年 6 月，Specific Media Group 和贾斯汀·汀布莱克以大约
  3500 万美元的价格收购了 Myspace，而新闻集团在 6 年前几乎为此支付了 10 亿美元。汀布莱克参与的一个原因是，在新闻集团收购后，Myspace 拥有自己的唱片公司，并且总体上对艺术家更具吸引力。在
  2016 年至 2018 年间，通过一系列收购，Myspace 被现在的 Dotdash Meredith 媒体集团收购。




  它至今仍存在，拥有约六百万用户，而鼎盛时期则有数亿用户。


  此外，2003 年，马克·扎克伯格推出了 Facemash，这相当于哈佛大学版的伯克利“Hot or Not”网站，并于 2004 年将其更名为“The Facebook”。同年，其第一百万名用户加入。


  2005 年，该网站去掉了“the”，简化为“Facebook”，此前以 20 万美元购得“Facebook.com”域名。与几起收购案相比，这似乎很划算，其中最引人注目的是
  Facebook 以近十亿美元收购 Instagram，以及其对移动消息服务 WhatsApp 的巨额收购要约。


  大约在同一时期，大量社交网站涌现。像 Flickr 旗下的 Photobucket 等照片分享网站、社交书签网站 del.icio.us、Reddit，以及博客平台
  WordPress，都始于 2003 年至 2005 年间。


  StudiVZ 及其衍生网站如 SchülerVZ 或 MeinVZ，是一个面向学生的社交网络，由两名学生埃赫桑·达里亚尼（后成为 CEO）和丹尼斯·贝曼于 2005
  年 11 月 11 日（恰逢“光棍节”和狂欢节开始）在柏林创立。StudiVZ 的一个主要功能是所谓的“gruscheln”（由德语单词“grüßen”=问候和“kuscheln”=拥抱混合而成）。它类似于
  Facebook 的“戳一下”功能，允许用户发送简短通知，或者 InterNations 曾称之为“twinkle”的功能。


  截至 2010 年，VZ Networks 声称拥有超过 1600 万用户。然而不久之后，许多用户变得不活跃或离开该网络，其用户量相比前几年下降了 70%`–`80%。2017
  年 9 月 7 日，所有者 Poolworks 宣布 StudiVZ 破产。2022 年 3 月，该网络被关闭。


  YouTube 也于 2005 年上线，比竞争对手在线视频网站 Vimeo 晚一年。第一个视频是“Me at the zoo”[40]，在圣地亚哥动物园拍摄，自那以后（截至
  2023 年第一季度）已获得超过 2.6 亿次观看。仅仅一年后的 2006 年，谷歌以 16.5 亿美元收购了 YouTube。


  2006 年也是 Twitter 诞生的年份。与 Facebook 类似，其名称略有变化，但值得注意的是从“Twttr”变成了一个更容易发音的名字。第一条推文由联合创始人杰克·多尔西（@Jack）于
  2006 年 3 月 21 日发布：“just setting up my twttr.”


  一年后，话题标签被发明出来。该符号的灵感来自 IRC 中的频道名称，现在被许多主流社交网络使用。最初，Twitter 的字符限制为 140 个字符，类似于短信。十多年后，这一限制在
  2017 年才翻倍至 280 个字符。


  2007 年，Twitch 上线，当时由耶鲁毕业生贾斯汀·坎和埃米特·希尔以 Justin.tv 的名义推出。到 2013 年，该公司已实现盈利，月活跃用户超过
  4300 万。一年后的 2014 年，在有关 YouTube 收购的猜测之后，亚马逊以 9.7 亿美元收购了 Twitch Interactive。


  ### 当下与此刻


  近年来，社交媒体领域的大多数发展要么是安全漏洞和其他困难，要么是并购，只有少数值得注意的例外。


  2015 年，即时通讯和 VoIP 社交平台 Discord 成立。它很快被电子竞技和局域网锦标赛玩家广泛使用，并受益于与 Twitch 主播的关系，因为这两个平台都面向相似的用户群体，尤其是游戏玩家。


  2016 年，Mastodon 上线，这是一个基于开放标准和协议（通常被称为“联邦宇宙”）创建社交网络服务的免费、去中心化、开源软件。


  2017 年，字节跳动以 10 亿美元收购了 Musical.ly，同时推出了短视频分享服务 TikTok。极右翼微博网站 Gab 也于 2017 年上线，而
  AIM 和 Beme 则被关闭。


  2018 年，雅虎通被关闭，Musical.ly 并入 TikTok。另一个自称“言论自由”的网络 Parler 于同年上线，也主要被右翼人士及其他极端分子或阴谋论者使用，尤其是在
  2020 年新冠疫情开始之后。尽管坎耶·维斯特最终没有完成收购，但在因发表反犹太言论被几乎所有其他主要网站封禁后，他曾考虑收购 Parler[46]。2023
  年 4 月，新所有者 Starboard 的 CEO 在收购 Parler 后不久就将其关闭，理由是“任何理性的人都不会相信‘保守派版 Twitter’是一种可行的商业模式”[52]。


  2019 年，Google+被关闭，威瑞森以不到 300 万美元的价格将 Tumblr 出售给了 Automattic（WordPress.com 的所有者和
  WordPress 的主要支持者）[43]。


  2020 年，音频聊天应用 Clubhouse 和注重真实性的社交媒体应用 BeReal 上线。尤其是在一个被“假新闻”主导的时代，BeReal 自此开始流行起来。




  2021 年，两个新的社交媒体平台诞生：Gettr，由前总统唐纳德·特朗普的前助手杰森·米勒创立，主要面向另类右翼用户，提供未经审查的内容；以及特朗普本人基于
  Mastodon 创建的 Truth Social，但该平台并未对联邦宇宙开放[45]。同年，作为一项旨在创建去中心化社交网络协议的 Twitter 项目启动后，Twitter
  联合创始人兼前 CEO 杰克·多西，以及曾就职于加密货币公司 Zcash 的杰伊·格雷伯，共同创立了 Bluesky Social。格雷伯此后一直担任 Bluesky
  的 CEO。尽管 Bluesky 在埃隆·马斯克收购 Twitter 之前曾获得其资助，但为了在马斯克领导下实现财务独立，它于 2023 年 7 月在一轮种子融资中筹集了
  800 万美元。几周前，即 2023 年 5 月，Bluesky 已将其社交媒体客户端以 MIT 许可证开源，而在此之前一年，它已经发布了底层协议，如认证传输协议（AT
  Protocol 或 atproto）。Atproto 是一个用于构建开放式社交媒体应用的联邦协议。虽然它不完全被视为联邦宇宙的一部分，但已有努力在两者之间建立桥梁。鉴于其大部分是开源的，并且与联邦宇宙的标准和协议目标一致，与
  Bluesky 的互操作性很可能很快就会实现。Bluesky 的一个有趣特性是其多语言方法。帖子可以声明最多 3 种语言。其语言列表几乎涵盖了所有已知语言，甚至包括世界语、拉丁语或意第绪语。通过账户设置中的“内容语言”，用户可以选择希望在社交信息流中看到的语言。尽管像
  LinkedIn 这样的社交网络也提供个人资料的国际化支持，但 Bluesky 的语言支持水平似乎相当独特。截至 2023 年 9 月下旬，Bluesky 用户数已超过
  115 万。目前仍处于仅限邀请的测试阶段，一旦向公众开放，其增长速度应该会更快。尤其是如果埃隆·马斯克领导下的前 Twitter 网络进一步退化为一个右翼男孩俱乐部，开始向所有人收取基本使用费，或者两者兼而有之。


  2022 年，Yik Yak 在安卓平台回归，此前一年它已在 iOS 平台上线。2022 年夏天，谷歌的 Lambda AI 通过了图灵测试，紧随其后的是同年年底的
  ChatGPT [49]。当然，这一年最主要的事件，尤其是对社交媒体而言，是埃隆·马斯克以 440 亿美元收购 Twitter。


  尽管 Twitter 在埃隆·马斯克接管后不久也曾封禁账户[50]，但大量账户因有时可疑的原因被屏蔽或暂停，而另一些账户，主要是右翼“保守派”、仇恨团体、反疫苗者以及类似的阴谋论者，其中最著名的是唐纳德·特朗普本人，他们的账户却被恢复。为了缓解
  Twitter 的巨额亏损，付费订阅取代了之前的账户验证。减少机器人和虚假账户的承诺也惨遭失败，现在，如果运营者愿意付费，机器人甚至可以通过付费订阅获得某种合法性。虽然马斯克解除了对特朗普账户的禁令，但他公开支持共和党初选竞争对手德桑蒂斯，甚至在
  Twitter 上举办了一场直播活动来宣布他的竞选活动。然而，这场活动对双方来说都成了一场灾难和羞辱，因为几乎没有人能参加直播，视频信号也几乎不存在，只能听到他们的声音[53]。2022
  年底，“占领民主党”活动人士推出了 Tribel Social，这是一个左倾的自由派社交网络，其座右铭是“道德、真理，以及‘我们人民’优先”，为 Twitter
  的替代品增添了新成员。该网站声称拥有约 50 万用户。


  2023 年 6 月初，Reddit 宣布大幅提高其 API 使用费，希望以此增加最终实现其长期宣布的首次公开募股（IPO）的机会。根据新的定价方案，开发者每
  5000 万次请求需支付 12,000 美元，这导致许多使用 Reddit 的小型或社区驱动型应用倒闭。这引发了该网络部分版块（称为“subreddits”）的许多版主试图反抗。他们中的大多数被
  Reddit 封禁，尽管少数人后来被恢复。


  除了试图取悦投资者之外，另一个理由是像 ChatGPT 或谷歌 Lambda AI 这样的人工智能解决方案的兴起，它们从 Reddit、维基百科等来源收集信息用于训练，而这些网站却没有因此获得回报。当
  Twitter 为了筹集更多资金而采取绝望之举，声称将对 5000 万次请求收取 42,000 美元时，引发了巨大愤怒，这导致许多像 Unfollower Stats
  这样的小型或社区驱动型网站也关闭了。尽管 Reddit 承诺避免这种极端定价，但他们的价格“仍然是 12,000 美元”。


  2023 年 7 月 5 日，Facebook、Instagram 和 WhatsApp 的母公司 Meta 推出了一项名为 Threads 的新“微博”服务，这显然是对
  Twitter 的打击[57]。这是一个由 Instagram 开发的去中心化社交网络，目前也要求用户拥有现有的 Instagram 账户。由于欧盟的隐私法，Threads
  在另行通知之前无法在欧盟使用。


  在最初几天，可以通过移动 VPN 安装和使用 Threads，所以我尝试了一下，但 Meta 阻止了这种做法，导致其用户数在最初激增至超过 1 亿后出现下降。看来
  Threads 可能很快就能在没有 VPN 的情况下在欧盟和其他国家使用。


  2023 年 7 月 24 日，埃隆·马斯克将 Twitter 更名为“X”[58]。马斯克似乎希望模仿微信在中国的一些做法，但他似乎忽略了，在中国，由于对隐私的不同处理方式以及单一公司的权力集中（只要它遵守政治体制的规则），可能在其他国家行不通，甚至在美国也不行，更不用说欧盟国家了。“X”的想法（奇怪的是，谷歌/Alphabet
  也有一个名为 X 的、有点秘密的“臭鼬工厂”式实验室）并不新鲜，埃隆·马斯克早在 PayPal 时代就注册了这个域名；在公司成为 PayPal 之前，它就已经被称为“X.com”，但在一次由
  X 的最大竞争对手 Confinity 及其产品“PayPal”发起的近乎敌意的收购（注意其中的讽刺意味）后，他被赶下台，由彼得·蒂尔接任 CEO。一个关键原因是马斯克被“X”的许多不同想法和目标所困扰，而蒂尔领导的其他成员只想专注于支付，该公司至今也在这方面取得了成功。


  当然，马斯克现在比蒂尔富有得多，并且是目前的世界首富，但他这次能实现“X”的众多想法中的哪些，以及用户会接受为这些服务中的哪些（大部分将是付费的，而且很可能每月不止
  8 美元）付费，而不是在其他地方使用它们，包括 PayPal、Stripe、亚马逊以及许多其他在线支付服务，还有待观察。更不用说如果该应用变得过于庞大，或者比如说，未来的特斯拉买家被迫只能使用
  X 支付系统，或者强迫所有人观看在 X 上直播的 SpaceX 发射，尽管用户体验和性能更差，这可能会引发反垄断问题。更名后不久，“Twitter 小鸟”被一个带有
  X Window System 风格的“X”标志所取代，“tweet”等术语也被“post”取代，就像其他任何社交网络一样，从而进一步丧失了它曾经拥有的独特品牌认知度。2023
  年 9 月 18 日，埃隆·马斯克宣布他可能会让 X 对所有用户设置付费墙，随后在菲律宾和新西兰试行收取迄今为止“象征性的”1 美元。尽管他声称是为了打击机器人和虚假账户，但这只是从这件昂贵的玩具中获取一些资金的最新绝望之举。许多专家认为，这可能是
  X/Twitter 的最后一根稻草，其用户群可能很快就会萎缩到 MySpace 或 Truth Social 的水平。




  ## 未来


  自人类开始交流以来，社交网络便一直存在。技术手段随时间推移而演变，并且在不久的将来可能变化得更快。一些服务将被合并；另一些则可能变得无关紧要，迟早会消失。使用不依赖特定供应商的中立标准和框架至关重要，除非你愿意将更多时间花在快速变化的
  API 上，而不是将其用于实际的生产活动，或者更糟的是，当某个特定供应商提供的专有 API 和框架不再可用时，不得不切换到其他供应商。虽然不像 Twitter
  或 Facebook 那样的社交网络，但早在 FTX、BlockFi、Celsius 或 Voyager 之前，Mt. Gox [7] 的首次加密货币交易破产事件就是此类困境的一个典型例子。它曾在一段时间内是该领域的市场领导者。因此，通过其
  API 提供比特币的应用程序和电子商务解决方案被迫重写或放弃这些应用。


  如果在此类 API 之上创建了供应商中立的抽象层，那么应对诸如供应商倒闭、被其他公司收购，或两者兼有（例如自埃隆·马斯克收购并随后更名以来，Twitter/X
  仍面临的潜在风险）等问题和变化就会容易得多。


  这正是 Fediverse、Agorava、Keycloak 或 Jakarta EE 等供应商和社交服务中立方法发挥作用的地方。


  ## 总结


  在本章中，我们了解了社交媒体的历史、其繁荣时期、当前状况以及未来的可能发展方向。我们还了解了并购有时如何对社交媒体策略构成风险，尤其是当一些新东家说得委婉些是“三心二意且古怪”的时候。


