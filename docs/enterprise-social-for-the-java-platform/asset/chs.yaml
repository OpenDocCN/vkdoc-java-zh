  \ 上使用 Facebook 创建一个新应用程序。\n\nSpring Social\nSpring Social 项目 [25] 是 Spring 框架的一个扩展，它使您的应用程序能够与\
  \ Facebook、LinkedIn 或 Twitter 等社交媒体提供商建立连接，以代表其用户调用 API。\n一段时间后，它不再得到积极支持，Pivotal/VMware\
  \ 员工的更新或博客文章在变更发生或功能在会议上宣布后六到九个月或更长时间才出现。\n像 GitHub 这样的开源生态系统展示了各种扩展或插件，但并非所有都成熟；有些仅仅是概念验证，而且其中大多数也有一段时间没有得到积极维护。\n\
  Spring Social 也支持 .NET，但该版本从未真正起步，仅在 2012 年发布了 1.0.0 和 1.0.1 两个版本，此后没有任何进一步的活动。因此，虽然适用于\
  \ .NET 的 Spring 框架仍然存在并得到维护（2023 年 7 月发布了 3.0.2 版本），但适用于 .NET 的 Spring Social 在其\
  \ Java 对应版本之前很多年就已经消亡了。\n由于 OAuth2/OpenID Connect 的标准化程度提高以及其在 Spring Security 5\
  \ 中的支持，Spring Social 自 2019 年起不再受支持或维护。支持期于 2019 年 7 月 3 日结束。这并不意味着应用程序完全放弃了它，即使是在生产环境中，但对于新应用程序，他们通常更倾向于使用\
  \ Spring Security，而对于一些不再更改但仍在使用中的旧应用程序，只要社交网络的 API 变更在一段时间后不阻止其使用，他们可能会继续使用它。\n\
  \n概述\n\nSpring Social 的主要功能如下：\n\n*   可扩展的服务提供商框架，极大地简化了将本地用户账户连接到社交媒体账户的过程\n* \
  \  一个连接控制器，处理您的 Java/Spring Web 应用程序、社交媒体提供商和您的用户之间的授权流程\n*   流行 API 和社交网络（如 Facebook、Twitter、LinkedIn、TripIt\
  \ 或 GitHub）的 Java 绑定\n*   一个登录控制器，使用户能够通过社交网络登录来验证您的应用程序\n\nSpring Social 的 Maven\
  \ `groupID` 是 `org.springframework.social`。\n\n核心\n\nSpring Social 核心项目由表 6-2 所示的模块组成。\n\
  \n表 6-2\nSpring Social 核心模块\n\n名称 |\n 描述 |\n\n| --- | --- | --- | --- | --- |\n\n\
  spring-social-core |\n Spring Social 连接框架和 OAuth 客户端支持 |\n\nspring-social-config\
  \ |\n Spring Social 的 Java 和 XML 配置支持 |\n\nspring-social-security |\n Spring Security\
  \ 集成 |\n\nspring-social-web |\n Spring Social `ConnectController`，使用连接框架在 Web 环境中管理连接\
  \ |\n\n客户端模块\n\n除了 Spring Social 核心模块之外，还有许多特定于提供商的客户端模块，为流行的社交网络提供连接和 API 绑定。\n\
  \n表 6-3\nSpring Social 客户端模块\n\n名称 |\n Maven artifactID |\n\n| --- | --- | --- |\
  \ --- | --- |\n\nSpring Social Facebook |\n spring-social-facebook |\n\nSpring Social\
  \ Twitter |\n spring-social-twitter |\n\nSpring Social LinkedIn |\n spring-social-linkedin\
  \ |\n\nSpring Social GitHub |\n spring-social-github |\n\nSpring Social TripIt |\n\
  \ spring-social-tripit |\n\n连接框架\n\n`Connection<A>` 接口模拟了与 Facebook 等服务提供商的连接：\n\
  \n```\npublic interface Connection extends Serializable {\nConnectionKey getKey();\n\
  String getDisplayName();\nString getProfileUrl();\nString getImageUrl();\nvoid sync();\n\
  boolean test();\nboolean hasExpired();\nvoid refresh();\nUserProfile fetchUserProfile();\n\
  void updateStatus(String message);\nA getApi();\nConnectionData createData();\n\
  }\n```\n\n每个 `Connection` 都由一个由 `providerId`（例如，“facebook”）和 `providerUserId`（例如，用户的\
  \ Facebook ID）组成的复合键唯一标识。\n\n假设我们有一个指向用户“jdoe”的 `Connection<Twitter>` 引用。\n\n1.\
  \  `Connection#getKey()` 返回“twitter”，1234567，其中 1234567 是 `@jdoe` 的 Twitter 用户 ID，该\
  \ ID 永远不会改变。\n2.  `Connection#getDisplayName()` 返回 `@jdoe`。\n3.  `Connection#getProfileUrl()`\
  \ 返回 “[`http://twitter.com/jdoe\"`](http://twitter.com/jdoe)。\n4.  `Connection#getImageUrl()`\
  \ 返回 “[*http://a0.twimg.com/profile_images/105951287/IMG_5863_2_normal.jpg*`\"`](http://a0.twimg.com/profile_images/105951287/IMG_5863_2_normal.jpg)。\n\
  5.  `Connection#sync()` 允许您将连接状态与 @jdoe 的个人资料同步。\n6.  `Connection#test()` 返回 `true`，表明\
  \ Twitter 连接的授权凭据有效。这假设 Twitter 尚未撤销“AcmeApp”客户端应用程序，并且 @jdoe 尚未重置其授权凭据。\n7.  `Connection#hasExpired()`\
  \ 返回 `false`。\n8.  `Connection#refresh()` 不执行任何操作，只要与 Twitter 的连接未过期。\n9.  `Connection#fetchUserProfile()`\
  \ 对 Twitter API 进行远程调用，以获取 @jdoe 的个人资料数据并将其规范化为 `UserProfile` 模型。\n10.  `Connection#updateStatus(String)`\
  \ 在 @jdoe 的时间线上发布状态更新。\n11.  `Connection#getApi()` 返回一个引用，使客户端应用程序能够访问 Twitter 原生\
  \ API 的全部功能。\n12.  `Connection#createData()` 返回一个 `ConnectionData` 引用，该引用可以被序列化并用于稍后恢复连接。\n\
  \nFacebook 示例\n此示例演示如何使用 Spring Social 将 Facebook 登录添加到现有的 Spring Web 应用程序中。\n要获取\
  \ Facebook 应用 ID 和应用密钥凭据，您需要在 [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/)\
  \ 上使用 Facebook 创建一个新应用程序。\n确保添加“Website”作为平台，并将 `http://localhost:8080/` 作为“站点 URL”。\n\
  \nMaven 配置\n\n首先，将 `spring-social-facebook` 依赖项添加到 `pom.xml`：\n\n```\norg.springframework.social\n\
  spring-social-facebook\n2.0.3.RELEASE\n\n```\n\n安全配置\n\n让我们使用一个简单的安全配置，采用基于表单的身份验证：\n\
  \n\n```markdown\n\n```\n@Configuration\n@EnableWebSecurity\n@ComponentScan(basePackages\
  \ = { \"com.example.security\" })\npublic class SecurityConfig {\n@Autowired\nprivate\
  \ UserDetailsService userDetailsService;\n@Bean\npublic AuthenticationManager authManager(HttpSecurity\
  \ http) throws Exception {\nreturn http.getSharedObject(AuthenticationManagerBuilder.class)\n\
  .userDetailsService(userDetailsService)\n.and()\n.build();\n}\n@Bean\npublic SecurityFilterChain\
  \ filterChain(HttpSecurity http) throws Exception {\nhttp.csrf()\n.disable()\n.authorizeRequests()\n\
  .antMatchers(\"/login*\", \"/signin/**\", \"/signup/**\")\n.permitAll()\n.anyRequest()\n\
  .authenticated()\n.and()\n.formLogin()\n.loginPage(\"/login\")\n.permitAll()\n.and()\n\
  .logout();\nreturn http.build();\n}\n}\n```\n\nFacebook4J\nFacebook4J 是一个非官方的 Java\
  \ 库，用于 Facebook Graph API。它模仿了 Twitter4J，因此名称相似。\n\n使用方法\n\n在你的 Maven **pom.xml**\
  \ 中包含以下依赖：\n\n```\norg.facebook4j\nfacebook4j-core\n2.4,)\n\n```\n\n配置\n有多种方式可以配置\
  \ Facebook4J。\n**属性文件**\n\n一个名为 `facebook4j.properties` 的属性文件。\n将其放置在类路径的根目录下：\n\
  \n```\ndebug=true\noauth.appId=****************\noauth.appSecret=********************************\n\
  oauth.accessToken=********************************\noauth.permissions=email,publish_stream,...\n\
  ```\n\n**ConfigurationBuilder**\n\n你可以通过 `ConfigurationBuilder` 和 `FacebookFactory`\
  \ 使用“流式”API：\n\n```\nConfigurationBuilder cb = new ConfigurationBuilder();\ncb.setDebugEnabled(true)\n\
  .setOAuthAppId(\"*********************\")\n.setOAuthAppSecret(\"******************************************\"\
  )\n.setOAuthAccessToken(\"**************************************************\")\n\
  .setOAuthPermissions(\"email,publish_stream,...\");\nFacebookFactory ff = new FacebookFactory(cb.build());\n\
  Facebook facebook = ff.getInstance();\n```\n\n**或者通过系统属性**\n\n```\n$ java -Dfacebook4j.debug=true\n\
  -Dfacebook4j.oauth.appId=*********************\n-Dfacebook4j.oauth.appSecret=******************************************\n\
  -Dfacebook4j.oauth.accessToken=**************************************************\n\
  -Dfacebook4j.oauth.permissions=email,publish_stream,...\n-cp facebook4j-core-2.4.13.jar:yourApp.jar\
  \ yourpackage.Main\n```\n\n**以及环境变量（以 Linux 为例）**\n\n```\n$ export facebook4j.debug=true\n\
  $ export facebook4j.oauth.appId=*********************\n$ export facebook4j.oauth.appSecret=******************************************\n\
  $ export facebook4j.oauth.accessToken=**************************************************\n\
  $ export facebook4j.oauth.permissions=email,publish_stream,...\n$ java -cp facebook4j-core-2.4.13.jar:yourApp.jar\
  \ yourpackage.Main\n```\n\n虽然流式 API 在现代应用中可能看起来很有吸引力，但其他选项（如通过 Kubernetes 或你选择的\
  \ CI/CD 管道）更容易将密钥外部化。\n\n示例\n**发布消息**\n\n你可以通过 `Facebook.postStatusMessage()` 方法发布消息，前提是你已经通过上述方法之一配置了\
