  content\" context=\"current\" field=\"keywords\" separator=\" #\" include=\"exact\"\
  \ start=\"#\"]\n    ```\n\n注意\n\nTwitter 帖子不支持富文本，因此不建议在帖子消息中引用富文本元素。\n\nCoreMedia\n\
  虽然 CoreMedia 未实现 Java Portlet 标准，但它运行在 Java 上，常用于创建“企业门户”。\n\n历史\nCoreMedia 成立于\
  \ 1996 年，是从多学科工程科学与技术中分离出来的，有点像 Sun Microsystems 成立于斯坦福大学。该公司美国总部位于弗吉尼亚州阿灵顿，并在华盛顿特区和伦敦设有办事处。\n\
  2012 年，CoreMedia 推出了 Elastic Social，这是一个扩展模块，具备内容审核、用户管理等社交互动功能，模仿社交网络，但并未集成它们。\n\
  \n社交媒体中心\n与 Elastic Social 不同，CoreMedia 社交媒体中心允许将各种社交网络集成到 CoreMedia Studio 中。它显示一个单独的选项卡，其中包含不同的社交媒体动态和待发布的消息。\n\
  它被视为 CoreMedia Labs 的蓝图或原型，未提供稳定的 API，但话说回来，用于 Java 的 Twitter API 客户端库在这么多年后仍处于持续测试阶段，即使是\
  \ 2.x 版本也是如此。\n\n安装\n\n*   从 CoreMedia 应用程序工作区，将仓库 [`https://github.com/CoreMedia/coremedia-social-hub.git`](https://github.com/CoreMedia/coremedia-social-hub.git)\
  \ 克隆为扩展文件夹的子模块。确保使用与工作区版本匹配的分支名称：\n\n`git submodule add -b 1907.1` [`https://github.com/CoreMedia/coremedia-social-hub`](https://github.com/CoreMedia/coremedia-social-hub)\n\
  \    `modules/extensions/coremedia-social-hub`\n\n*   使用项目根文件夹中的扩展工具将模块链接到工作区：\n\
  \n`mvn -f workspace-configuration/extensions com.coremedia.maven:extensions-maven-plugin:LATEST:sync\
  \ -Denable=coremedia-social-hub`\n\n配置\n\n社交媒体中心的配置由不同的设置组成，这些设置可以应用于全局或特定站点的文件夹。\n\
  \n*   全局：`/Settings/Options/Settings/Social Hub/`\n\n*   特定站点：`<SITE>/Options/Settings/Social\
  \ Hub/`\n\n全局设置\n\n设置文档声明了社交媒体中心的全局设置，并且必须位于全局设置文件夹中。它定义了用于链接缩短的 **bitly** 账户的凭据，以及当需要从内容中提取媒体用于社交媒体帖子时所需的额外\
  \ CAE 和文档类型模型信息。\n\n```\n\ndata\n\nYOUR_LIVE_CAE\n\n```\n\n媒体映射\n`mediaMapping`\
  \ 结构体配置了包含可推送到社交网络的 blob 数据的内容类型和属性字段。默认情况下，CoreMedia Blueprint 文档类型模型为 `CMMedia`\
  \ 配置，其数据属性包含带有资产数据的 blob。\n\n适配器设置\n社交媒体中心适配器配置可以放置在全局或特定站点的配置文件夹中。\n\n通用适配器设置\n\
  \n每个社交媒体中心适配器配置都具有以下结构：\n\n```\n\nADAPTER_ID\nADAPTER_TYPE\nMY ADAPTER NAME\ntrue\n\
  \n...\n\n...\n\n```\n\n每个连接结构体包含表 7-2 中所示的属性。\n\n表 7-2\n连接结构体属性\n\n属性 |\n 描述 |\n\
  \n| --- | --- | --- | --- | --- |\n\nid |\n 适配器的唯一 ID，确保没有其他适配器具有相同的 ID |\n\ntype\
  \ |\n 适配器的类型 |\n\ndisplayName |\n 在适配器列中显示为标题的名称 |\n\nenabled |\n 适配器是启用还是禁用 |\n\
  \n\n\nconnector |\n 用于配置适配器连接器的附加属性 |\n\nadapter |\n 用于配置适配器的附加属性 |\n\n在启动期间读取配置时，社交媒体中心\n\
  会尝试将每个配置映射到相应的社交媒体中心\n适配器。它使用每个社交媒体中心适配器都可用的\n`SocialHubAdapterFactory` 实现。`SocialHubAdapterFactory#getType`\n\
  必须与适配器设置中的类型属性匹配。\n\n连接器设置\n连接器配置通常包含用于访问社交网络或 API 的凭据。\n映射此配置的应用程序必须扩展接口 `ConnectorConfiguration`，\n\
  该接口包含适用于所有连接器配置的附加设置。\n\n`ConnectorConfiguration`\n接口公开了以下方法：\n\n*   `getImageVariant()\
  \ –`\n    当图片被推送到外部系统时使用的图片变体名称。\n    如果未找到或未配置该变体，则将使用原始 blob。\n\nTwitter/X\n以下部分描述了\
  \ Twitter 社交媒体中心适配器的配置属性。\n\n适配器配置\n\n要显示已配置个人资料的 Twitter 时间线，必须通过适配器配置提供时间线链接：\n\
  \n```\n\nhttps://twitter.com/[YOUR_PROFILE]\n\n```\n\n连接器配置\n\n按照上一节中针对 HCL Portal\
  \ 的说明创建您的 Twitter/X 应用程序。\n\n要使用原生 Twitter 连接器，必须在连接器配置中提供相应的 Twitter 凭据：\n\nYouTube\n\
  以下部分描述了 YouTube 的配置属性。\n\n适配器配置\n\n不需要\n\n连接器配置\n\n要使用原生 YouTube 连接器，您需要提供相应的 YouTube\
  \ 凭据作为连接器配置的一部分。请注意，一个 YouTube 配置代表一个播放列表。如果您想发布到不同的播放列表，则需要不同的配置。\n\n请参阅 [`https://developers.google.com/youtube/v3/quickstart/go`](https://developers.google.com/youtube/v3/quickstart/go)\n\
  为您的应用程序创建 YouTube 凭据。\n\nInstagram\n以下部分描述了 Instagram 的配置属性。\n\n适配器配置\n\n不需要\n\n\
  连接器配置\n\n由于社交媒体中心目前未提供 Instagram 的原生连接器，实际的连接器配置取决于与社交媒体工具的集成。\n\nPinterest\n以下部分描述了\
  \ Pinterest 的配置属性。\n\n适配器配置\n\n要显示已配置个人资料的 Pinterest 看板，必须通过适配器配置提供看板链接。该链接可以从您的\
  \ Pinterest 个人资料中复制：\n\n```\n\nhttps://www.pinterest.de/[PINTEREST_PRROFILE]/[PINTEREST_BOARD_NAME]\n\
  \n```\n\n连接器配置\n\n由于社交媒体中心目前未提供此社交网络的原生连接器，实际的连接器配置取决于与社交媒体工具的集成。\n\n总结\n在最后一章中，我们了解了企业门户服务器及其社交媒体支持，无论是通过在门户内部提供社交互动，还是通过集成社交网络，从使用它们进行社交登录到共享内容或嵌入社交时间线。\n\
