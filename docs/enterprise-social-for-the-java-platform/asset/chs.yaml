  \ 专业账户关联的页面的页面访问令牌\n\n以下示例评论您的媒体对象，分析这些评论，根据特定条件进行过滤，并回复符合这些条件的评论。\n\n1.  使用 `/media/comments`\
  \ 端点获取所有评论及其 ID。\n\n2.  选择您要回复的评论，并使用其评论 ID 回复用户。\n\n    ```\n    context = new\
  \ APIContext(page_access_token_for_ig).enableDebug(false);\n    APINodeList igComments\
  \ = new IGMedia(, context).getComments()\n    .execute();\n    String ig_comment_id\
  \ = igComments.get(0).getId();\n    IGComment igComment = new IGComment(ig_comment_id,\
  \ context).get()\n    .execute();\n    APINodeList igCommentRepliess = new IGComment(ig_comment_id,\
