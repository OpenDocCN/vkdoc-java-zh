- "# 2. 社交用例\n\n在本章中，我们将探讨社交媒体的各种用例，从通用网络到技术专业化的网络（如媒体分享），以及面向特定目标群体的垂直社交网络。\n\n##\
  \ 社交网络的类型\n\n有众多的社交媒体网站，它们要么面向通用目的，要么服务于焦点群体和特定社区，包括前酗酒者、音乐爱好者、开发者、外籍人士、母亲、学生、教师、政府雇员，以及热衷于园艺、编织或\
  \ BDSM 的人群。《五十度灰》的书籍和电影可能为这个列表增添了更多“色调”[17]。\n\n### 传统社交网络\n\n大多数人熟悉传统的社交网站，例如：\n\
  \n*   Facebook\n*   Twitter\n*   Mastodon\n*   Myspace\n*   WeChat\n*   新浪微博\n\n\
  这些平台帮助我们与朋友、家人、同学或志同道合的人建立联系。\n\n### 商务与企业\n\n以下是流行的商务社交网络：\n\n*   LinkedIn\n* \
  \  XING\n\n它们主要用于工作或求职，充当数字简历。LinkedIn 被微软收购，是一家全球性企业。XING 起源于德国汉堡，因此主要活跃在欧洲。它收购了其他几个求职门户网站或招聘服务，以及外籍人士最大的社交网络\
  \ InterNations，在从檀香山到奥克兰的全球 420 个社区中增加了用户。\n\n### 消息服务\n\n以下是最流行的社交消息服务：\n\n*  \
  \ WhatsApp\n*   Facebook Messenger\n*   Telegram\n*   Discord\n*   Viber\n*   WeChat\n\
  *   Snapchat\n*   Line\n*   QQ\n*   Signal\n*   KakaoTalk\n*   Zalo\n\n### 媒体分享\n\
  \n媒体分享网站分为三类：\n\n1.  音频分享\n2.  图片分享\n3.  视频分享\n\n#### 音频分享\n\n音频分享可以包括：\n\n*   音乐分享/流媒体\n\
  *   播客\n*   有声读物\n\n##### 音乐分享/流媒体\n\n有几个音乐分享和流媒体门户网站。其中最早的一个成立于 1996 年，至今仍然存在，即现场音乐档案库（LMA）。它提供了超过\
  \ 25 万场现场音乐会录音，主要是独立艺术家，但也包括一些大牌，如感恩而死乐队。\n\n同样，在世纪之交，由肖恩·帕克创立的 Napster 出现了，他后来因\
  \ Facebook 而声名鹊起并积累了财富。它最初主要是去中心化和免费的，但其原始形式因侵犯版权而被迫关闭。然而，它的第三个迭代版本至今仍然存在。\n\n虽然\
  \ Apple Music 始于 2015 年，但其根源可追溯到 2001 年就已存在的 Apple iTunes。\n\n许多音乐分享网站诞生于 2001 年至\
  \ 2010 年社交媒体的高产年份，其中包括：\n\n*   Myspace\n*   DatPiff\n*   Jamendo\n*   Mixcloud\n\
  *   Musopen\n*   Spotify\n*   SoundCloud\n*   Deezer\n*   Noise Trade\n*   Playlist\n\
  *   StarMaker\n*   Smule\n\n除了苹果，互联网和社交媒体巨头亚马逊和谷歌也提供音乐下载和流媒体服务，有时通过多个品牌，如 Google\
  \ Play Music 和 YouTube Music。\n\n##### 播客\n\n播客由 Tristan Louis 和 Dave Winer 于 2000\
  \ 年基于 RSS 格式发明。最初被称为“音频博客”，英国数字记者本·哈默斯利在 2004 年为《卫报》撰写的一篇文章中创造了“播客”一词。其灵感来自苹果的 iPod\
  \ 音乐播放器。\n\n显然，苹果是首批在 iTunes 上提供播客的公司之一。如今，除了广播电台和电视台，所有主要的音乐和流媒体平台也都提供播客。\n\n#####\
  \ 有声读物\n\n播客和有声读物之间界限模糊；两者通常由同一渠道托管。有声读物最初由托马斯·爱迪生通过他的留声机发明，主要针对盲人，让他们能够听故事而不是阅读。\n\
  \n随着录音设备的发展，有声读物从音频圆柱体（持续了近 100 年）发展到醋酸酯和黑胶唱片、紧凑型磁带、迷你光盘、CD 或 DVD，最终发展到固态存储，如 iPod\
  \ 或流媒体服务器的机架。\n\n除了图书出版社和广播电台或电视台，大多数主要的互联网巨头以及播客或音乐流媒体服务提供商都提供有声读物。\n\n#### 图片分享\n\
  \n正如我们所了解的，第一个允许上传图片的社交网络是 2000 年的 Hot or Not。第一台拍照手机是在三年前由前 Borland 创始人菲利普·卡恩创造的，他几乎像\
  \ MacGyver 一样临时搭建了装置，以便与选定的朋友实时分享他女儿的出生 [47]。\n\n以下是一些顶级的图片分享应用：\n\n*   Adobe Creative\
  \ Cloud – 面向 Photoshop 用户\n*   Google Photos – 照片存储和备份\n*   iCloud Drive – 苹果用户的照片存储备份\n\
  *   Instagram – 即时通讯和照片分享\n*   Pinterest – 视觉化分享食谱、家居装饰或其他信息\n*   SmugMug – 保护你的照片\n\
  *   Amazon Photos – 面向 Amazon Prime 客户\n*   Waldo – 面向摄影公司的专业级选项\n*   The Guest\
  \ – 自动照片上传器\n*   Internxt Photos – 极速照片交换\n*   Imgur – 内容托管网站，可查看和分享图片、GIF、表情包或视频\n\
  *   FamilyAlbum – 用于家庭照片\n*   Flickr – 摄影师社区\n*   Snapchat – 多媒体即时通讯\n*   Pixpa\
  \ – 轻松出售照片\n*   500px – 分享与交流\n\n除了这些专门的图片应用，几乎所有主要的社交网站（如 Facebook 或 Twitter）也允许分享和存储图片，尽管便利程度并不总能与专门的图片服务相媲美。\n\
  \n\n\n#### 视频分享\n\nYouTube 彻底改变了我们观看和创作视频的方式。它几乎能让每个拥有移动设备的人成为摄影指导，并催生了一种特殊类型的网红：YouTuber，其中许多人赚取的收入堪比电影明星。\n\
  \n以下是 11 个重要的视频分享网站：\n\n*   YouTube\n\n*   Vimeo\n\n*   TikTok\n\n*   Dailymotion\n\
  \n*   Metacafe\n\n*   Instagram IGTV\n\n*   Facebook Watch\n\n*   快手\n\n*   Periscope\n\
  \n*   Utreon\n\n*   TED\n\n##### 视频流媒体\n\n以下是十个重要的视频流媒体网站：\n\n*   Amazon Prime\n\
  \n*   Apple TV+\n\n*   discovery+\n\n*   Disney+\n\n*   Google Play 视频\n\n*   Netflix\n\
  \n*   Paramount+\n\n*   Twitch\n\n*   YouTube\n\n*   WOW\n\n其中许多是视频流媒体频道，内容由工作室而非用户自己发布。\n\
  \n即使这些平台大多也提供一定程度的社交互动，从简单的点赞（或点踩）按钮，到评论，甚至是像 Amazon Watch Parties 或 Disney+ GroupWatch\
  \ 功能这样的社交聚会。\n\n其他平台，尤其是 YouTube 或 Twitch，是社交流媒体网站，社区成员可以在其中分享直播流，通常是电脑游戏、电子竞技、教育、音乐会或类似的直播活动。“YouTuber”和\
