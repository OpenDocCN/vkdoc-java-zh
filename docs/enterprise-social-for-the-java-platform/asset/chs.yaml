  ```\n\n总结\n继上一章对安全框架的概述之后，我们在本章学习了 Java 平台相关的社交框架，以及如何将它们与流行的社交网络结合使用。\n\n7. 社交门户\n\
  \n正如你在第 [3 章中所记得的，Java Portlet 是早期实现混搭（mashup）的一种方法；因此，流行的门户服务器也支持社交媒体集成，例如社交登录、混搭或社交分享。\n\
  \nLiferay Portal\nLiferay 是一家“专业开源”公司，为其开源门户软件提供付费支持和服务。\n\n历史\nLiferay Portal 最初由联合创始人兼\
  \ CTO Brian Chan 于 2000 年创建，旨在为教堂等非政府组织提供门户解决方案。Liferay 的第一个办公室也设在一座教堂内。Liferay\
  \ Inc. 与 Sun（在被 Oracle 收购前不久）以及 TIBCO 建立了合作伙伴关系，但至今仍保持独立和私有。Liferay 秉承开源基因，还积极帮助塑造了\
  \ Java Portlet 标准，例如 JSR 362（Portlet 3.0）或 378（用于 JavaServer Faces 2.2 的 Portlet\
  \ 3.0 桥接），并在其中担任规范领导者。\n\nLiferay Social\n无论你是想创建自己的社交媒体体验，还是集成其他社交网络，都可以通过 Liferay\
  \ Portal 实现。\n\n开箱即用，Liferay 提供了四个社交 Portlet：\n\n*   活动\n\n*   用户统计\n\n*   群组统计\n\
  \n*   请求\n\n除此之外，还集成了各种 API 和社交网络。\n\n地图 Portlet\n地图 Portlet 允许你查看世界各地团队成员的位置，但仅显示已添加该地图\
