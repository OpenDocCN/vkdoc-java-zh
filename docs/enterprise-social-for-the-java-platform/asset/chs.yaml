  \ URL。该 URL 指向一个 Liferay DXP 服务，该服务将请求令牌交换为访问令牌，这是 Liferay DXP 成功调用 Facebook Graph\
  \ API 所必需的。仅当对 Liferay DXP 的请求通过像 Apache 这样进行 URL 重写的代理服务器时，才需要更改此 URL。\n\n社交书签\n\
  社交书签作为按钮显示在内容下方，用于在社交网络上分享内容。例如，社交书签默认显示在博客小部件的每篇博客文章下方。\n\n默认情况下可用的社交书签有：\n\n*\
  \   Facebook\n*   LinkedIn\n*   Twitter/X\n\n此外，Liferay Marketplace 上的社交书签应用还添加了针对其他社交网络的社交书签，例如：\n\
