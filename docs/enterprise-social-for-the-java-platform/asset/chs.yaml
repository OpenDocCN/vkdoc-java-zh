  \ | 全球 |\n| Travello | 社交旅行 | 全球 |\n| TripIt | 社交旅行 | 全球 |\n| Tripadvisor | 社交旅行与评分\
  \ | 全球 |\n| Travel Buddy | 社交旅行 | 全球 |\n| FlyerTalk | 常旅客网络 | 全球 |\n| Ever Travel\
  \ | 社交旅行 | 东欧 |\n| Backpackr | 背包旅行社区 | 全球 |\n| Trippy | 社交旅行 | 全球 |\n| Uber | 网约车\
  \ | 全球 |\n| Lyft | 网约车 | 全球 |\n| Bolt | 网约车 | 全球 |\n| DiDi | 网约车 | 中国 |\n| Share\
  \ Now | 拼车 | 欧洲 |\n| Turo | 拼车 | 美洲 |\n| Free Now | 网约车 | 欧洲 |\n| Ola | 网约车 | 印度、英联邦\
  \ |\n| Zipcar | 拼车 | 全球 |\n\n\n\n## 移动端使用\n\n移动端使用未必是一种社交媒体类型，而更像是社交媒体应用所处的不同场景或环境，尽管有些应用（例如\
  \ Google Fit）目前仅支持移动端使用。\n\n安德烈亚斯·M·卡普兰 [41] 将移动社交媒体应用分为四大类：\n\n1.  **时空型** – 对位置和时间敏感：分享的信息通常与特定时间点的特定位置相关。例如：\n\
  \    1.  Foursquare Swarm\n    2.  Facebook Places\n    3.  WhatsApp\n    4.  Telegram\n\
  \n2.  **空间定位型** – 仅对位置敏感：分享与特定位置相关的信息，对某个地点进行评分或标记，供他人日后查阅。例如：\n    1.  Foursquare\n\
  \    2.  Yelp\n    3.  Fishbrain\n    4.  Qype\n    5.  Tumblr\n\n3.  **快速时效型**\
  \ – 仅对时间敏感：在移动应用上使用传统社交媒体以提高可用性，或作为电视屏幕之外的第二或第三屏幕，例如一边观看喜爱的节目一边发推文。包括：\n    1. \
  \ Twitter\n    2.  Facebook\n    3.  Mastodon\n\n4.  **慢速时效型** – 对时间和位置均不敏感：在移动应用上使用传统社交媒体，例如在\
  \ YouTube 上观看视频，阅读/撰写维基百科文章或 Tumblr 博客。\n\n## 总结\n\n在前两章中，你已经了解了社交媒体的历史背景，以及从在线关注亲友到影响者及企业社交从业者的专业使用等多种应用场景。\n\
  \n"
- "# 3. 标准化\n\n本章探讨了通过通用 API 实现社交媒体访问标准化的努力，以及社交网络自身使用的一些标准，这些标准不仅有助于在不同网络之间更轻松地切换，还能分析来自不同来源和社交网络的数据。\n\
  \n## 标准类型\n\n除了对 OpenSocial [15] 等“基础标准”的游说之外，图 3-1 提供了 Dachis Group 根据一系列文章 [16]\
  \ 整理的社交标准概览。\n\n![](img/600273_1_En_3_Fig1_HTML.png)\n\n社交业务标准中的缺失概览。它包含两部分：高阶标准（包括社交参与、社交行为和社交指标）和基础标准（包括社交身份、社交活动、社交集成和安全性）。\n\
  \n图 3-1\n\n社交业务标准中缺失了什么？\n\n两大类别如下：\n\n1.  **高阶标准** `–` 行为和领域驱动的业务导向型标准与 API。其中大部分在文献\
  \ [16] 的作者笔下并未得到充分阐述。\n2.  **基础标准** `–` 部分此前已提及，此处分为四个子类别：\n    1.  联系人\n    2.\
  \  活动/消息\n    3.  集成/互操作性\n    4.  安全性\n\n接着，你可以审视社交标准、框架和库的通信方式，它们通过以下方式实现：\n\n\
  *   消费信息\n*   分析信息\n*   转换信息\n*   提供信息\n\n消费信息的一个典型例子是在另一个应用（例如你的博客或公司网站）中显示你在常用社交网络上的状态。\n\
  \n另一个例子是包含一个地图服务，用于显示前往你主办或参与的活动地点的路线。\n\n分析信息涉及某种计算、排名或基准测试。通常需要消费多个信息源，以便获得更全面的图景。此类服务的一个例子是\
  \ Klout，其中跨多个社交网络的活动会影响你的整体排名。\n\n转换信息可以通过合并和组合多个数据流来实现，例如两个数字的简单相加，或者你的旅行预订网站根据汇率预测以本地货币计算的旅行费用。像\
  \ Google 翻译这样的翻译服务是转换信息的另一个更复杂的例子。\n\n最后但同样重要的是，提供信息是指你的应用向他人提供的任何服务（有时仅仅是内容），理想情况下是通过\
  \ API 实现，以便他人可以根据自身需求消费、分析或转换这些信息。\n\n审视企业社交网络、相关标准或产品的另一种方式如下：\n\n*   具有社交属性的独立产品或服务，可独立安装和使用。其中一些（例如采用\
  \ OpenSocial 的产品）旨在与其他产品实现互操作，理想情况下是跨多个供应商。\n*   嵌入在更大产品或套件中的社交功能或特性。一个经典例子是 Oracle\
  \ Fusion Middleware，它包含了继承自 BEA AquaLogic [13] 以及此后 Oracle 在社交领域多次收购 [23] 的社交功能。\n\
  *   专业型，通常是领域特定或垂直领域的社交网络，例如面向医疗保健、时尚、开发者、宠物主人或任何其他对特定社区有重要意义的兴趣领域。你在前一章中会记得一系列这样的网络。\n\
  \n由欧盟资助的社交媒体研究小组 OPENi [31] 试图以某种与上下文相关的方式对社交标准和 API 进行分组：\n\n*   **活动 API** 指社交、健康和行为的活动日志，反映在从社交、照片和视频分享到健康和基于位置服务的多种云服务中。本质上，它包含用户的所有社交和个人活动，并与设备的日志记录活动相关。相关类别：游戏、健康、基于位置的服务、音乐、照片、购物、社交、视频。\n\
  *   **广告与分析 API** 能够根据最终用户/客户与广告/营销内容的互动，收集、聚合和分析他们的需求、兴趣和偏好。\n*   **应用行为数据**。\n\
  \n\n\n*   社交网络交互，旨在实现个性化广告服务，同时提升最终用户附加值。相关类别：分析、广告。\n\n*   位置 API 通过签到、导航、活动、评论和提示实现位置感知。它是一个强大的上下文\
  \ API，包含位置信息，可通过 GPS 传感器提取并在地图上映射。相关类别：地图、基于位置的服务、社交、音乐。\n\n*   媒体 API 整合了照片、音乐和视频分享服务，并具备文件传输和同步功能。它与设备上的图库应用和文件系统相关。相关类别：文件传输与同步、基于位置的服务、音乐、新闻、照片、社交、视频。\n\
  \n*   产品与服务 API 涵盖了支付和购物服务。这种与商业化相关的特殊对象需要一个具备交易能力和增强安全性的强大 API。它与手机上的商店应用相关。相关类别：基于位置的服务、支付、购物。\n\
  \n*   个人资料 API 基于分析、广告、联系人、游戏、健康、基于位置的服务、消息与聊天、音乐、社交等，推断出关于人的信息。通常，人们可以通过多种方式呈现，拥有多个个人资料。此\
  \ API 将所有信息整合在一起：头像、个人资料、联系人和账户，并在不同服务中关联不同的个人资料。它与智能手机的通讯录应用直接相关。部分相关类别：分析、广告、联系人、游戏、健康、基于位置的服务、消息与聊天、音乐、电影等。\n\
  \n*   搜索 API，用于从基于云的服务中查找和检索信息。它整合了现有的搜索引擎与跨平台分布式搜索功能，并与桌面或手机操作系统中的搜索功能相关。\n\n![](img/600273_1_En_3_Fig2_HTML.jpg)\n\
  \n开放 I 标准的概念流程图。它包括基于云的功能和内容，其次是云平台和 API 框架，以及应用程序。基于云的功能包括 PayPal、TechCrunch、谷歌等。\n\
  \n图 3-2\n\nOPENi 概念\n\n尽管 OPENi 尚未在 GitHub 上提供其任何 API（如其网站在 2013 年所承诺的那样），但其工作引起了例如\
  \ W3C 的关注，OpenSocial [15] 目前正在 W3C 进行进一步讨论。因此，即使没有自己的 API，OPENi 及其概念也可能对此有所助益。我们将在介绍\
  \ Apache Shindig 时更详细地介绍 OpenSocial。\n\n除了像之前那样剖析和分类社交媒体标准之外，还有许多其他标准和协议被众多 API\
  \ 和社交网络所使用：\n\n*   几乎所有社交媒体服务都使用**REST**作为传输协议；有些可能使用**SOAP**，但这相当少见。\n\n*   大多数服务以**JSON**格式传输数据，有些使用**XML**或两者兼用。\n\
  \n*   身份识别和认证几乎总是基于**OAuth 2**或**OpenID Connect**。\n\n图 3-1 中未提及的其他基本标准和协议（因为该列表并非旨在穷尽）如下：\n\
  \n*   开放图谱协议（OGP）使任何网页都能成为社交图谱中的一个富对象。\n\n*   oEmbed，一种允许在第三方网站上嵌入 URL 表示形式的格式。\n\
  \n*   PubSubHubbub，一种简单、开放、基于 Web 钩子的服务器到服务器发布-订阅协议。\n\n*   Salmon，一种标准协议，用于使评论和注释能够向上游（因此得名）回溯到原始更新源。\n\
  \n我们将在下一章中更详细地探讨安全方面，如授权、认证或数字身份，以及隐私、数据保护和相关标准。\n\n## 早期方法\n\n我们在引言中遇到的理论，例如六度分隔理论\
  \ [6]，影响了后来的概念，如朋友的朋友（FOAF）[8]。如今社交网络使用的大多数“好友”机制中都可以找到这两者的影子。\n\n丰富站点摘要（RSS）[9]是社交媒体数字形式的早期例子。参与\
  \ RSS 设计和标准化的开发者中包括 Reddit 联合创始人亚伦·斯沃茨，他在 2013 年初不幸去世前，曾致力于撰写一本关于可编程网络 [10] 的书，这本书是该领域中通常枯燥的学术论文的一个相当务实、接地气的对应物。\n\
  \n便携式联系人由 Plaxo 创建，这是一家社交地址簿服务公司，由一群企业家在肖恩·帕克周围于 2002 年创立。帕克在 Napster 音乐交换门户被迫停业后，曾遇到过与亚伦·斯沃茨相比毫不逊色的法律麻烦，但幸运的是，他处理方式不同，其影响力也远不止于当今社交媒体领域的某个家喻户晓的名字。便携式地址簿或“数字名片”的想法初衷良好，尤其从用户角度来看很有意义，但竞争参与者的商业利益——每个人都渴望分享数据，甚至包括与数据所有者分享——给这个原本不错的想法设置了许多障碍。Plaxo\
  \ 在这么多年后仍在运营，但未必是帕克最伟大的成就，投资者将他赶走的方式，与帕克介入时联合创始人爱德华多·萨维林在 Facebook 的遭遇并无二致。从财务上讲，这让他变得富有，并为其他服务（例如\
  \ Spotify）提供了支持。这看起来有点像 Napster，但以一种更被商业接受的方式，这也要归功于他在 Facebook 之后的名声和财富，这并非巧合。便携式联系人可能是社交媒体运动的重要组成部分，但已不再使用。这是因为大公司内部使用的许多\
  \ API 已不再与便携式联系人兼容。唯一仍在使用的遗留物是 vCard，许多公司和应用程序都在使用它。\n\n\n## Mashup\n\n随着 Java 语言首先在桌面端（早期主要通过\
  \ Java applet，或 AWT/Swing 独立应用程序）扮演越来越重要的角色，随后在世纪之交也在服务器端崭露头角，Sun 公司及其他企业开始在 Java\
  \ Community Process（成立于 1998 年）或 JCP [11] 中标准化 Java 平台的各个部分。在最早的成员中，IBM、Intel、Fujitsu、Sun\
  \ 和 Oracle（这两家自 2010 年起合并）至今仍活跃其中。\n\n在两次被否决或撤回之后，一个针对社交网络（当时常被称为“门户”，参见早期的 MSN）的著名标准是\
  \ JSR 168，即 Java Portlet 规范 [48]。在理想情况下，它允许门户应用程序部署到多个门户服务器中，不受供应商限制，并且与其他标准（尤其是\
  \ OASIS 定义的 WSRP，即远程 Portlet 的 Web 服务）一起，为这些应用程序之间（甚至跨不同门户）的互操作性带来了希望。十年后，随着其他技术和语言（尤其是“轻量级容器”）的兴起，Java\
  \ Portlet 标准在 2017 年迎来了 3.0 版本更新（JSR 362），并计划在可能的情况下纳入一些社交标准，但这些标准最终未能再被纳入 Portlet\
  \ 规范。\n\n虽然 Portlet 及相关标准主要仍是大规模企业应用服务器的领域（其灵感来源于音乐或视频混编或混音），但在第一个 Portlet 标准之后不久，一种更语言和平台中立的方法——称为\
  \ Mashup [12]——开始兴起。无论是 Yahoo Pipes、Microsoft Popfly、Google Mashup Editor、IBM Mashup\
  \ Center 还是 BEA AquaLogic [13]，它们都承诺提供互操作性和个性化小部件，并提供类似于 iGoogle 的体验。这项服务（主要由于 Google+\
  \ 将个性化和更“集成社交媒体”的方法提升到了新高度）于 2013 年 11 月 1 日关闭。\n\nRSS 也是如此，仅在 Aaron Swartz 去世几个月后。Google\
  \ Reader 于 2013 年 7 月 1 日停止服务。虽然 Swartz 在其未完成的著作 [10] 中最后倡导一种基于开放 API 的可编程网络，但大多数大型提供商却另有打算，正如围绕\
  \ Google Reader 终结的众多文章（例如这篇 [14]）所表达的那样。\n\n## OStatus\n\nOStatus 是一个用于联合微博客的开放标准，允许用户接收来自其他网站用户的状态更新。该标准结合了一系列开放协议，例如：\n\
  \n*   Atom\n*   Activity Streams\n*   WebSub\n*   Salmon\n*   WebFinger\n\n它始于 2013\
  \ 年的 StatusNet，后者后来成为 GNU social [60]。当时，它被许多微博客网站采用，但由于对底层技术的失望，大多数网站转而使用 ActivityPub，包括\
  \ Mastodon [61]、Pleroma 或 postActiv。唯一仍在使用 OStatus 的开源社交网络是 Friendica [62]，这是一个非常早期的开源项目，始于\
  \ 2010 年，并且像 GNU social 一样使用 PHP 编写；因此，这两个项目之间的协同效应似乎比其他项目更强。\n\n## OpenSocial\n\
  \n另一个社交标准几乎从其诞生之初就由社区开发塑造：OpenSocial [15] 由 Google 与少数初始支持者（当时仍是最受欢迎的社交网络 MySpace、Ning\
  \ 或 Plaxo）共同开发。此时，前面提到的 Portable Contacts 也符合在众多社交网络提供商之间实现易用的小部件和服务的总体理念，这与例如 Java\
  \ Portlet 标准 2.0 版本（大约在同一时间发布了其公开草案）形成对比。\n\n看似更易用，这也适用于漏洞利用和安全问题，通常由一些几乎还在上小学的“脚本小子”使用少量脚本就能破坏或攻破这些服务和小部件。如果系统管理员尽职尽责，完整规模的\
  \ Java EE 服务器和 Portlet 过去和现在都更难被攻破。而所有关于 Java 安全性或被用于传播恶意软件的喧嚣通常只影响客户端。\n\nOpenSocial\
  \ 的绝大部分是 JavaScript 代码，这使得它比主要基于服务器端或精心混合使用服务器端（Jakarta EE 或其他环境）和客户端（JavaScript\
  \ 等）的方式更容易暴露。请参见图 3-3，了解一个典型的基于 Web 的企业应用程序（使用 Java EE）的不同层级，但你可以将其替换为其他语言，如 Python、PHP、Ruby\
  \ 或 Scala，其层级大致相同。\n\n![](img/600273_1_En_3_Fig3_HTML.jpg)\n\n一个概念流程图展示了典型的基于 Web\
  \ 的企业应用程序的不同层级。它包括三个阶段：客户端机器、Java 服务器和数据库服务器。客户端机器包含应用程序客户端和动态 HTML 页面，以及客户端层，其后是其余服务器。\n\
  \n图 3-3\n\nN 层企业应用\n\n虽然 Google 开始在其 Orkut 服务（在拉丁美洲和印度等少数其他国家流行，但在其他地方从未真正流行起来）中使用\
  \ OpenSocial，但其他最初计划支持它的供应商却一个接一个地放弃了这些计划。尤其是 LinkedIn 或 XING 等公司出于安全原因放弃了它。我们将在下一章中更多地讨论安全性和隐私问题。无论是\
  \ Facebook 还是 Twitter（过去十年下半叶的两个主导提供商），都从未关心过 OpenSocial。更重要的是，当情况变得明朗时，Google 扼杀了自己的创造。Google+\
  \ 也从未支持过它。少数主要来自服务器和大型企业领域的供应商，如 IBM、SAP 或 Confluence 的开发者 Atlassian，仍然支持 OpenSocial。\n\
  \nDachis Group（于 2014 年被 Sprinklr 收购，是一个社交媒体和企业数据分析的“智库”）也曾深度参与，尽管其重点最近更多地转向了大数据和\
  \ NoSQL 系统等方向，并且它像大多数剩余的 OpenSocial 支持者（或 Thoughtworks 在其定期调查“雷达”中关于值得关注或逐渐淡出的技术）一样公开承认，它唯一可能的位置终究还是企业和内联网。大数据也可以被视为一种\
  \ Mashup，但它主要发生在 EIS 或 DB 层（见图 3-4），因此我在此不多讨论。这些技术也值得单独成书，并且超出了本书的范围。\n\n![](img/600273_1_En_3_Fig4_HTML.jpg)\n\
  \n一个概念图展示了 ActivityPub 的概览。它包含一个收件箱和发件箱，一个读取传入消息的行动者，以及一个接收消息的行动者。向后和向前的箭头分别标记为获取和发布消息。\n\
  \n图 3-4\n\nActivityPub 概览\n\n\n\n与其说是无缝整合了例如 Google、Facebook、Twitter、LinkedIn、Microsoft\
  \ 或 Yahoo! 等平台，OpenSocial 的唯一价值在于连接 HR、销售或财务部门，并为管理层提供所有部门及大型企业子公司的某种精巧的“社交”整合。这使得它对那些希望看到，比如说，在\
  \ Facebook 时间线旁边显示 Twitter 信息流的人而言几乎毫无用处——而这正是 OpenSocial 最初被创造的目的。\n\nOpenSocial\
  \ 故事中的一个转折点是，人们试图基于 OpenSocial 及类似概念创建一个 W3C 标准。这条在语义网案例中本就艰难曲折的道路，在此处似乎几乎不可能实现，尤其是考虑到我们之前发现[14]，大多数参与者更偏爱他们的“围墙花园”。\n\
  \n尽管 W3C 定义了一个名为语义网的有趣标准，该标准听起来与 OpenSocial 的某些理念具有协同效应，但语义网迄今为止仅在少数孤立领域（如生物学或医疗保健）中使用。\n\
  \nW3C 的工作节奏通常相当缓慢，类似于（甚至慢于）HTML5。例如，HTML5 自 2008 年开始，在候选推荐状态停留了一段时间（尽管许多供应商已经提出了基于它的解决方案和产品）。最终推荐标准于\
  \ 2014 年底发布，不久之后 W3C 社交网络工作组[30]成立，并一直活跃到 2018 年。与大多数其他 W3C 标准和工作组相比，这个持续时间相当短暂。\n\
  \n### W3C 社交网络协议\n\nW3C 社交网络工作组的成果是一套社交网络协议[63]，允许社交网络的用户：\n\n*   创建、更新和删除社交内容\n\
  *   通过订阅他人的内容与他人建立联系\n*   与他人发布的内容进行互动\n*   在他人与自己的内容互动时收到通知\n\n#### 规范\n\n以下是 W3C\
  \ 社交网络工作组制定的规范：\n\n*   ActivityPub `–` 基于 JSON-LD 的 API，用于客户端到服务器的交互（如发布）和服务器到服务器的交互（如联邦）\n\
  *   ActivityStreams `–` 用于表示以下内容的语法和词汇：\n    *   活动 (Activity)\n    *   参与者 (Actor)\n\
  \    *   链接 (Link)\n    *   对象 (Object)\n    *   集合 (Collection)\n*   链接数据通知 (LDN)\
  \ `–` 一种基于 JSON-LD 的投递协议\n*   Micropub `–` 一种基于表单编码和 JSON 的 API，用于客户端到服务器的交互（如发布）\n\
  *   Webmention `–` 一种基于表单编码的投递协议\n*   WebSub `–` 一种用于订阅及投递更新的协议\n\n##### ActivityPub\n\
  \nActivityPub 是一种基于 ActivityStreams 2.0 数据格式和 JSON-LD 的去中心化社交网络协议。\n\n它提供了一个用于创建、更新和删除内容的客户端到服务器\
  \ API，以及一个用于投递通知和订阅内容的联邦式服务器到服务器 API。\n\n在 ActivityPub 中，用户被称为参与者 (actor)。每个参与者都有：\n\
  \n*   一个**收件箱 (inbox)** `–` 用于接收他人消息\n*   一个**发件箱 (outbox)** `–` 用于向他人发送消息\n\n以下是参与者\
  \ Alyssa 的记录示例：\n\n```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\"\
  ,\n\"type\": \"Person\",\n\"id\": \"https://social.example/alyssa/\",\n\"name\"\
  : \"Alyssa P. Hacker\",\n\"preferredUsername\": \"alyssa\",\n\"summary\": \"Lisp\
  \ enthusiast hailing from MIT\",\n\"inbox\": \"https://social.example/alyssa/inbox/\"\
  ,\n\"outbox\": \"https://social.example/alyssa/outbox/\",\n\"followers\": \"https://social.example/alyssa/followers/\"\
  ,\n\"following\": \"https://social.example/alyssa/following/\",\n\"liked\": \"https://social.example/alyssa/liked/\"\
  }\n```\n\n想象一下，Alyssa 想联系她的朋友 Ben。她最近借给他一本书，她想确保他能归还。以下是作为 ActivityStreams 对象的示例消息：\n\
  \n```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\",\n\"type\": \"Note\"\
  ,\n\"to\": [\"https://chatty.example/ben/\"],\n\"attributedTo\": \"https://social.example/alyssa/\"\
  ,\n\"content\": \"Say, did you finish reading that book I lent you?\"}\n```\n\n\
  服务器识别出这是一个新创建的对象，并将其包装成一个 `Create` 活动：\n\n```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\"\
  ,\n\"type\": \"Create\",\n\"id\": \"https://social.example/alyssa/posts/a29a6843-9feb-4c74-a7f7-081b9c9201d3\"\
  ,\n\"to\": [\"https://chatty.example/ben/\"],\n\"actor\": \"https://social.example/alyssa/\"\
  ,\n\"object\": {\"type\": \"Note\",\n\"id\": \"https://social.example/alyssa/posts/49e2d03d-b53a-4c4c-a95c-94a6abf45a19\"\
  ,\n\"attributedTo\": \"https://social.example/alyssa/\",\n\"to\": [\"https://chatty.example/ben/\"\
  ],\n\"content\": \"Say, did you finish reading that book I lent you?\"}}\n```\n\n\
  Alyssa 的服务器查找 Ben 的 ActivityStreams 参与者对象，找到他的收件箱端点，并将她的对象 POST 到他的收件箱。\n\n######\
  \ 采用情况\n\n在 Mastodon 于 ActivityPub 定稿后不久便支持它之后，其他几个平台也纷纷效仿，包括 Reddit、Goodreads、YouTube\
  \ 或 Tumblr；Flickr 也在考虑增加支持。据报道，Twitter/X 的竞争对手 Threads 正在使用它或计划很快增加支持[64]。\n\n##\
  \ Fediverse\n\nFediverse（由“federation”（联邦）和“universe”（宇宙）组成）是一个“全球社交网络”，允许一个服务的用户使用\
  \ ActivityPub 等开放协议与其他服务的用户进行通信。Fediverse 中著名的社交网络有：\n\n*   Mastodon\n*   Diaspora\n\
  *   Friendica\n*   GNU social\n*   Hubzilla\n*   Lemmy\n*   PeerTube\n*   Pleroma\n\
  *   Pixelfed\n\n业内许多人认为，埃隆·马斯克收购 Twitter 并将其转变为他的“X App”是开放社交网络和 Fediverse 的巨大催化剂。由\
  \ Jason Robinson 运营的统计网站 The-Federation.info 列出 Fediverse 的总用户数接近 6.31 亿，其中过去六个月内活跃用户约\
  \ 700 万。他们的统计数据是自愿提交的，据称并不完整；例如，Threads/Meta 以及其他几个使用 Fediverse 标准和协议的大型商业参与者并未贡献这些统计数据；因此，实际数字很可能超过十亿，而当前活跃用户可能达到数千万。\n\
  \n其他网站，如唐纳德·特朗普的 Truth Social [45]，基于开放标准，几乎就是 Mastodon 的翻版，但它们甚至不通过 Fediverse 与其他网站交互，也不以透明的方式贡献用户统计数据。截至\
  \ 2023 年 8 月，Truth Social 上的当前活跃用户据说约为 50 万，而 Mastodon 的活跃用户接近 200 万。\n\n![](img/600273_1_En_3_Fig5_HTML.jpg)\n\
  \n一张网络图展示了 Fediverse 的概览。它包含了十个应用程序：微博客、活动策划、长博客、视频音频流媒体、发布、图片分享、内容聚合以及其他。\n\n图\
  \ 3-5\nFediverse 概览\n\n### 协议\n\nThe-Federation.info 目前列出了 Fediverse 中使用的 15 种协议：\n\
  \n*   ActivityPub\n*   Bluesky\n*   DFRN\n*   Diaspora\n*   Gemini\n*   Inbound\n\
  *   Matrix\n*   MicroPub\n*   NeoDb\n*   Outbound\n*   OStatus\n*   SMTP\n*   WebMention\n\
  *   XMPP\n*   Zot\n\n我们已经介绍了 ActivityPub 和 OStatus；除此之外，节点数量排名前五的协议中还有另外三种：\n\n\
  *   Diaspora\n*   DFRN\n*   Matrix\n\n#### Diaspora\n\nDiaspora 拥有自己的去中心化社交网络协议。它开发于\
  \ 2010 年，基于类似于电子邮件的联邦架构（具有收件箱和发件箱，也与 ActivityPub 类似），允许用户跨多个独立节点（称为“pods”，与 Kubernetes\
  \ pods 没有直接关系，尽管一些 Diaspora pods 可能运行在 Kubernetes 集群中）组成的网络共享数据和相互通信。除了 Diaspora\
  \ 本身，该协议也被 Friendica 或 Hubzilla 使用。\n\n#### DFRN\n\nDFRN 是一种分布式通信协议，提供隐私和安全通信，并为分布式个人资料和连接（如好友请求）提供基础。\n\
  \n\n\n#### Matrix\n\nMatrix 最初是作为 Amdocs（提供 CRM 及 OSS 或 BSS 等电信解决方案的供应商）内部用于安全、去中心化即时通讯的协议而开发的。其用例包括\
  \ IP 语音、视频聊天或安全的物联网。\n\nMatrix 的功能包括以下内容：\n\n*   创建和管理完全分布式的聊天室，无单点控制或故障风险\n*  \
  \ 在联邦服务器的全球开放网络中，实现聊天室状态的最终一致性、加密安全的同步\n*   在聊天室中发送和接收可扩展消息，并支持可选的端到端加密\n*   用户管理\n\
  \    *   邀请\n    *   加入\n    *   离开\n    *   踢出、封禁\n    *   由特权用户调解\n*   聊天室状态管理\n\
  \    *   命名\n    *   别名\n    *   主题\n    *   封禁列表\n*   用户资料管理（头像、显示名称等）\n*   管理用户账户（注册、登录、登出）\n\
  *   使用第三方 ID（如电子邮件地址、电话号码、Facebook 账户或其他社交 ID）在 Matrix 上进行身份验证、识别和发现用户\n*   身份联邦\n\
  \    *   发布用户公钥用于 PKI\n    *   将第三方 ID 映射到 Matrix ID\n\n![](img/600273_1_En_3_Fig6_HTML.jpg)\n\
  \nMatrix 网络架构图。它始于三个应用服务器，由四个家庭服务器和身份服务器相互连接。家庭服务器有客户端与每个服务器矩阵连接。下方提供了图例。\n\n图 3-6\n\
  \nMatrix 网络架构\n\n##### 采用情况\n\nMatrix 被全球许多政府机构广泛使用，尤其是在数据安全和隐私法规更严格的欧洲。\n\nRocket\
  \ Chat 自 4.7.0 版本起基于 Matrix。2021 年和 2022 年，FOSDEM 会议均使用 Matrix 进行托管。\n\nMatrix 官方提供了以下平台的桥接：\n\
  \n*   Gitter\n*   IRC\n*   Slack/Mattermost\n*   XMPP\n\n以及由社区维护的其他几个桥接，用于：\n\n\
  *   Apple iMessage\n*   Discord\n*   电子邮件\n*   Facebook Messenger\n*   LinkedIn\n\
  *   Mastodon\n*   Signal\n*   Skype\n*   SMS\n*   Telegram\n*   微信\n*   WhatsApp\n\
  \n## Java 框架与库\n\n遵循 Portlet API 或企业 Java 的各个部分等 Java 标准，已有多个用于社交媒体的 Java 框架和库。\n\
  \n### Facebook Business SDK for Java\n\nFacebook (Meta) Business SDK 是一个一站式解决方案，旨在帮助合作伙伴和客户实现其企业社交解决方案，允许合作伙伴使用多个\
  \ Facebook API（如 Pages、Business Manager、Instagram 等）来满足其业务需求。常见功能包括以下内容：\n\n*  \
  \ 广告购买 `–` 为点击到 Messenger 广告创建广告系列并推广您的 Facebook 页面的指南\n*   Instagram 管理 `–` 在 Instagram\
  \ 上发布照片和回复评论的指南\n*   大规模客户 onboarding `–` 管理成百上千家小型企业并允许其在其网站或平台内购买广告的指南\n*   页面管理\
  \ `–` 创建页面、更新页面和管理其内容的指南\n\n以下是一个快速入门示例；请参阅 [`https://github.com/facebook/facebook-java-business-sdk`](https://github.com/facebook/facebook-java-business-sdk)。\n\
  \n```\nimport com.facebook.ads.sdk.APIContext;\nimport com.facebook.ads.sdk.AdAccount;\n\
  import com.facebook.ads.sdk.AdAccount.EnumCampaignStatus;\nimport com.facebook.ads.sdk.AdAccount.EnumCampaignObjective;\n\
  import com.facebook.ads.sdk.Campaign;\nimport com.facebook.ads.sdk.APIException;\n\
  public class QuickStartExample {\npublic static final String ACCESS_TOKEN = \"[Your\
  \ access token]\";\npublic static final Long ACCOUNT_ID = [Your account ID];\npublic\
  \ static final String APP_SECRET = \"[Your app secret]\";\npublic static final APIContext\
  \ context = new APIContext(ACCESS_TOKEN, APP_SECRET);\npublic static void main(String[]\
  \ args) {\ntry {\nAdAccount account = new AdAccount(ACCOUNT_ID, context);\nCampaign\
  \ campaign = account.createCampaign()\n.setName(\"Java SDK Test Campaign\")\n.setObjective(Campaign.EnumObjective.VALUE_LINK_CLICKS)\n\
  .setSpendCap(10000L)\n.setStatus(Campaign.EnumStatus.VALUE_PAUSED)\n.execute();\n\
  System.out.println(campaign.fetch());\n} catch (APIException e) {\ne.printStackTrace();\n\
  }\n}\n}\n```\n\n我们将在第 6 章中展示更多关于使用 Facebook/Meta Business SDK for Java 的示例。\n\n\
  自 2016 年 5 月首次预发布以来，Facebook 除了为 JavaScript (Node.js)、PHP、Ruby 或 Python 提供开发者支持外，还持续维护其\
  \ Java SDK。最新版本是 v16.0.1，于 2023 年 3 月发布，其发布周期与 Spring、JBoss/Red Hat 或 JDK 本身相差不大，每年发布两个主要版本。\n\
  \n### Twitter4J\n\nTwitter4J 是一个用于 Twitter API 的非官方 Java 库。使用 Twitter4J，您可以轻松地在\
  \ Java 应用程序中集成 Twitter 调用。\n\n其作者 Yusuke Yamamoto 曾在 2012 年为 Twitter 工作。\n\n在他任职期间，他曾短暂地代表\
  \ Twitter 参与 Social JSR Expert Group，本章稍后将在 JSR 357 部分对此进行更多介绍。\n\n它轻量级，且仍向后兼容 Java\
  \ 8，因此也易于集成到移动或嵌入式应用程序中。毫不意外，从 J2ME 到 Android，几乎到处都有受其启发的或多或少官方的克隆、分支或项目。Twitter4J\
  \ 是一个 API 绑定库，因此主要用于消费信息。虽然扩展或您的应用程序可以分析或转换信息，但框架本身不提供超出 Twitter 本身的支持。根据 Hinchcliffe\
  \ 的分类，Twitter4J 主要可被视为一个基础 API，但也包含一些更高级别的方面。\n\n最后一个版本是 2022 年 10 月的 4.1.2。在 2018\
  \ 年至 2022 年经历了一段较长的停滞后，它现在似乎又得到了相当良好的维护。然而，一个风险是 Twitter4J 目前仅支持 Twitter API v1.1，并且考虑到\
  \ Twitter 的整个 Elon Musk 事件，没有人确切知道两者是否以及会持续多久。另一方面，鉴于 Twitter 的员工队伍已缩减至 Musk 时代前的影子，所有服务不太可能在短短几周内就全部迁移到\
  \ v2。而且，由于 Premium v1.1 API 能带来一些收入，它也不太可能在未给予付费用户迁移到 v2 等效版本的时间的情况下，一夜之间消失。虽然 Gnip\
  \ 在近十年前就被 Twitter 收购，但企业 API 直到最近才从 Gnip 2.0 重新命名，而这一过程也可能因 Musk 解雇或迫使离职的所有有经验的开发者而受阻。\n\
  \n以下是一个如何使用 Twitter4J 登录的示例。\n\n使用 Twitter 登录：\n\n```\nimport twitter4j.*;\nimport\
  \ twitter4j.v1.Status;\nclass Main {\npublic static void main(String[] args) throws\
  \ Exception {\nlong userId = Long.parseLong(args[0]);\nString accessToken = loadAccessToken(userId);\n\
  String accessTokenSecret = loadAccessTokenSecret(userId);\nTwitter twitter = Twitter.newBuilder()\n\
  .oAuthConsumer(\"[consumer key]\", \"[consumer secret]\")\n.oAuthAccessToken(accessToken,\
  \ accessTokenSecret).build();\nStatus status = twitter.v1().tweets().updateStatus(args[1]);\n\
  System.out.println(\"Successfully updated the status to [%s].\".formatted(status.getText()));\n\
  System.exit(0);\n}\nprivate static String loadAccessToken(long userId) {\nreturn\
  \ \"[token]\"; // load from a persistent store\n}\nprivate static String loadAccessTokenSecret(long\
  \ userId) {\nreturn \"[token secret]\"; // load from a persistent store\n}\n}\n\
  ```\n\n我们将在第 6 章中展示更多关于如何使用 Twitter4J 的示例。\n\n\n\n### Java 版 Twitter API 客户端库\n\n\
  2021 年 8 月，Twitter 推出了自己的 Java 版 API 客户端库 [35]。虽然推出时间较晚，且仅支持 Twitter v2 API，但其目的是说服开发者迁移到新的\
  \ API。\n\n直到 2021 年，Twitter 一直是 JCP 执行委员会中非常活跃且受欢迎的成员，在其总部举办的面对面会议数量，除 Sun 和后来的\
  \ Oracle 外，超过了任何其他 JCP 成员。Twitter 也是 OpenJDK 的活跃提交者，并维护着针对性能和可扩展性优化的自有 JDK 版本。因此，Twitter\
  \ 提供 Java 客户端库并不令人意外，尽管它来得有点晚，而且 GitHub 仓库中的 readme 文件仍然写着“此 SDK 处于测试阶段，尚未准备好用于生产环境”。\n\
  \n虽然被超过 100 个其他 GitHub 项目以及可能一些商业用户使用，但该项目只有三位贡献者；他们应该都曾在 Twitter 工作，而只有一位在新西兰的提交者似乎仍与\
  \ Twitter 开发团队有关联，尽管他的贡献在库的非常早期阶段就停止了。另一位同样在新西兰，于 2023 年 2 月刚刚离开 Twitter，似乎是马斯克收购后的离职人员。他还创建了\
  \ Twitter4J 的一个分支，并可能对其进行了相当深入的研究，尽管似乎没有向 Twitter4J 提交过拉取请求。他未来是否会为其做出贡献，时间会给出答案。最后一次贡献来自一家名为\
  \ Recharger Mon Auto 的法国电动汽车初创公司的联合创始人，时间在 2022 年夏季，正值埃隆·马斯克收购 Twitter 前后。尽管该提交者与特斯拉没有直接的工作关系，但时间点表明他可能来自马斯克的圈子，并被要求查看代码，或者至少他的公司对使用\
  \ Twitter API 有如此至关重要的兴趣，以至于他参与其中。\n\n最后一次提交是在 2022 年 10 月，也就是马斯克收购完成之时，此后便再无任何代码提交。\n\
  \n以下是 Twitter API 客户端库的一个“Hello World”示例；请参阅 [`https://github.com/twitterdev/twitter-api-java-sdk`](https://github.com/twitterdev/twitter-api-java-sdk)。\n\
  \n```\npackage com.twitter.clientlib;\nimport java.util.HashSet;\nimport java.util.Set;\n\
  import com.twitter.clientlib.TwitterCredentialsBearer;\nimport com.twitter.clientlib.ApiException;\n\
  import com.twitter.clientlib.api.TwitterApi;\nimport com.twitter.clientlib.model.*;\n\
  public class HelloWorld {\npublic static void main(String[] args) {\n/**\n* Set\
  \ the credentials for the required APIs.\n* The Java SDK supports TwitterCredentialsOAuth2\
  \ & TwitterCredentialsBearer.\n* Check the 'security' tag of the required APIs in\
  \ https://api.twitter.com/2/openapi.json in order\n* to use the right credential\
  \ object.\n*/\nTwitterApi apiInstance = new TwitterApi(new TwitterCredentialsBearer(System.getenv(\"\
  TWITTER_BEARER_TOKEN\")));\nSet tweetFields = new HashSet();\ntweetFields.add(\"\
  author_id\");\ntweetFields.add(\"id\");\ntweetFields.add(\"created_at\");\ntry {\n\
  // findTweetById\nGet2TweetsIdResponse result = apiInstance.tweets().findTweetById(\"\
  20\")\n.tweetFields(tweetFields)\n.execute();\nif(result.getErrors() != null &&\
  \ result.getErrors().size() > 0) {\nSystem.out.println(\"Error:\");\nresult.getErrors().forEach(e\
  \ -> {\nSystem.out.println(e.toString());\nif (e instanceof ResourceUnauthorizedProblem)\
  \ {\nSystem.out.println(((ResourceUnauthorizedProblem) e).getTitle() + \" \" + ((ResourceUnauthorizedProblem)\
  \ e).getDetail());\n}\n});\n} else {\nSystem.out.println(\"findTweetById - Tweet\
  \ Text: \" + result.toString());\n}\n} catch (ApiException e) {\nSystem.err.println(\"\
  Status code: \" + e.getCode());\nSystem.err.println(\"Reason: \" + e.getResponseBody());\n\
  System.err.println(\"Response headers: \" + e.getResponseHeaders());\ne.printStackTrace();\n\
  }\n}\n}\n```\n\n该 API 能否最终脱离测试阶段仍有待观察，但考虑到主要提交者已不再任职，以及马斯克领导下 Twitter 普遍的成本削减努力，这似乎不太可能。\n\
  \n我们将在第 6 章展示更多如何使用 Twitter API 的示例。\n\n### Apache Shindig\n\nApache Shindig [19]\
  \ 在 OpenSocial [15] 工作启动后不久便开始了。起初主要由 Google 及其 Orkut 推动，原因显而易见，其他贡献者，尤其是 IBM，后来也加入了。由于\
  \ OpenSocial 重新聚焦于“社交内联网”，声称使用它的网站或软件是否仍在继续使用已无法确定。事实上，Google Partuza 指向了一个不存在的页面；因此，它像我们之前听说的其他例子一样被关闭了。\n\
  \nGoogle 在 Eclipse IDE 的所见即所得环境中开发 OpenSocial 应用程序的一个有趣方法是 OpenSocial 开发环境（OSDE）；参见\
  \ [20]。可以合理地假设，其中一些被 IBM 接管并集成到基于 Eclipse 的开发工具（如 RAD 等）的社交版本中，而 Google Code 项目最后更新于\
  \ 2010 年 6 月。\n\nApache Shindig 链接到的 OpenSocial API 规范甚至不再由 OpenSocial 支持者 Atlassian\
  \ 托管；该链接似乎指向一个错误页面。这是否意味着 Atlassian 也不再相信 OpenSocial，并且不会在其新版本产品中使用它，或者仅仅是 W3C 重振整个\
  \ OpenSocial 运动过程中的一个环节，仍有待观察。与此同时，所有版本的 OpenSocial，尤其是 1.0 或 2.0 版本，都已失败告终，像 Orkut\
  \ 这样的网站最多使用了 0.7 或 0.8 版本。根据支持 OpenSocial 的 Dachis Group [16] 的说法，Shindig 作为一种体现，代表了一个基本标准\
  \ (2c)。它兼具提供和消费信息的能力。\n\n2014 年 9 月 30 日，Google 关闭了 Orkut，使得 Google+（其本身也于 2019\
  \ 年关闭）成为当时仅存的 Google 相关参考。到 2015 年，仍有超过 20 个社交网络集成了 OpenSocial，其中包括 StudiVZ、MySpace、LinkedIn\
  \ 或 XING，但不久之后，大多数社交媒体提供商逐渐放弃了它。\n\nGoogle 已经停止使用 Shindig，转而使用自己的 Google Code 项目。这些项目大多也已关闭，要么现在指向\
  \ OpenSocial 页面，要么不复存在。因此，2015 年 10 月 23 日，Apache 基金会退役了 Shindig 项目。此后，随着 OpenSocial\
  \ 事实上的参考实现被终止，它也步其后尘。\n\n### Sun/Oracle 的努力\n\n大约在 2008 年，企业社交混搭驱动公司 BEA Systems\
  \ [13] 刚被 Oracle 收购；Java 的创造者 Sun Microsystems 并未预料到类似的命运也即将降临到自己头上。基于 OpenSocial，Sun\
  \ 从 Apache Shindig 创建了一个分支或衍生项目，名为 SocialSite [21]。\n\nSocialSite 在 java.net 上仍有\
  \ 231 名成员，但该项目已不活跃。最后一次提交之一是由 Kohsuke Kawaguchi 完成的，他是 Sun 的 Hudson CI 服务器创建者，后来在被\
  \ CloudBees 聘用后创建了 Jenkins。\n\n在收购 RightNow Technologies（参见 [23]，2011 年底）之后——这家公司是带有社交功能的\
  \ SaaS CRM 软件制造商，此举明显针对 Salesforce.com 或 SAP 等公司——一些前 RightNow 团队和产品被并入 Oracle 的社交企业部门。\n\
  \n2012 年的 JavaOne 大会设立了一个社交日，我也参加了，演讲者包括 Facebook 的开发者关系经理 James Pearce。Oracle 自己展示了一个“单人”项目，由一位仍为\
  \ RightNow 工作的自由承包商编写，代号为“Project Sneaker”，该项目在 2012 年 JavaOne 大会后不久作为 Oracle SocialLink\
  \ [24] 发布。\n\n它从未在 Oracle 之外吸引到追随者，并且不得不被认为比 SocialSite 还要沉寂。\n\n\n\n#### DaliCore\n\
  \n在甲骨文收购太阳微系统公司后，被弃用的 SocialSite 在 DaliCore 中找到了其最佳的等价物和继任者 [22]。\n\n它最初基于一家比利时初创公司开发的\
  \ CMS，主要围绕 BeJUG（Devoxx 会议）的成员，如 Johan Vos。DaliCMS（2006 年）被称为“Web 2.0 就绪的 CMS”。\n\
  \n它主要是一个带有社区功能的开源项目。2008 年，大约在太阳微系统公司对 SocialSite 做同样事情的时候，DaliCMS 增加了对 Shindig\
  \ 的支持，主要是来自 Shindig 的 JavaScript 代码以及 DaliCMS 提供的一些 Java 代码。\n\n最终，它不再仅仅是一个 CMS，其底层模块演变成了\
  \ DaliCore。在 2013 年 JavaOne 大会的演讲中，Johan 揭示了“Dali”这一名称的由来，它代表“荷兰亚马逊爱好者倡议”（Dutch\
  \ Amazon Lovers Initiative）`–`，这是对互联网和云先驱亚马逊的一种致敬。\n\nDaliCore 在 Java EE 6 之上增加了用户管理、内容或权限等通用功能，并重点关注用户和权限。在几乎所有使用\
  \ DaliCore 的项目中，用户都应该能够使用现有的凭据（如 Facebook、Twitter、Google+、LinkedIn 等）登录。所谓的 Dali\
  \ 模块扩展了 DaliCore。虽然存在与 Facebook 等社交提供商的连接，但这些连接主要作为 DaliCore 单点登录（SSO）功能的认证提供者。除此之外，DaliCore\
  \ 旨在提供信息。\n\nDaliCore 的重要方面如下：\n\n*   主要是一个社交容器和 CMS，具有部分开放社交功能。\n*   通过 EJB、JPA\
  \ 或类似标准提供 Java 持久化支持。\n*   模块之间没有清晰的分离，特别是 API/规范与实现，在大多数情况下共享相同的模块甚至包空间，尽管试图通过\
  \ Dali 模块实现复用和扩展，但这反而使其更加困难。\n*   看起来有点笨重，对完整的 Java EE 配置文件有强依赖性，也就是说，仅使用其 Web 配置文件看起来更困难。\n\
  *   GlassFish 的支持和集成是积极的，它是首选的应用程序服务器。得益于 Java EE 标准，与其他容器一起使用并非不可能，但似乎更困难。\n* \
  \  它在一些客户的重度使用下也展示了可扩展性，例如比利时的一个电子投票网站。与 Apache Shindig 或 Sun SocialSite（在大多数情况下，DaliCore\
  \ 似乎是其自然继任者）不同，它至少在比荷卢经济联盟国家有实际客户在使用。\n\n在甲骨文宣布将不再为 GlassFish 提供商业支持或增强功能（如集群，超出\
  \ Java EE 参考实现提供的概念验证质量后，该功能将保留）、性能调优等之后，DaliCore 的一个主要优势消失了。甲骨文推荐其 WebLogic/Fusion\
  \ Middleware 产品，或者当前的 GlassFish 用户如果需要商业支持，将被迫迁移到其他服务器。\n\nDaliCore 的作者 Johan Vos\
  \ 和他的比利时初创公司随后声称他们将为客户提供商业支持，甚至可能尝试扩展该支持，但 DaliCore 显然成为了此事的受害者。自 2013 年初以来，java.net\
  \ 仓库中就没有任何活动了，并且在甲骨文于 2017 年关闭 java.net 后，没有任何内容被迁移到其他地方，至少没有迁移到公开可用的网站。虽然 Johan\
  \ Vos 当时告诉我们他仍在开发它，但他也确认这是在 Bitbucket 的一个私有仓库中进行的。因此，DaliCore 再也没有成为开源项目，现在必须被视为已死亡。\n\
  \n### Spring Social\n\nSpringSource 已被其母公司重新命名为 Pivotal，最终再次成为 VMware 的一部分。该公司有着悠久的历史，热衷于追随潮流，并为其\
  \ Spring 框架提供几乎涵盖所有方面的库或扩展。\n\nSpring Social [25] 是一个用于消费信息的绑定库。虽然将 OAuth 与 Spring\
  \ Security 及其他部分集成是基本 API 的典型特征，但它比这里提到的其他大多数解决方案展示了更多高阶 API 的特性。\n\nSpring Social\
  \ 的重要方面如下：\n\n*   出于显而易见的原因，它主要与 Spring 框架或 Spring 生态系统的其他部分一起使用。\n*   除 Spring\
  \ MVC 之外的 UI 框架相对更难集成。\n*   官方的 Spring Social 连接器主要集中在 Facebook 上；示例仅展示了单一服务方法。\n\
  *   尽管 Spring 社区在其他方面非常活跃，但它已不再得到积极支持。\n*   Spring Social 背后只有一两个活跃的提交者和推动者，且受雇于同一家公司。\n\
  \n我们将在第 6 章中展示更多关于 Spring Social 的内容。\n\n### Microsoft Embedded Social\n\nMicrosoft\
  \ Embedded Social [34] 成立于 2012 年 5 月 15 日，是一个用于应用程序内社交用户参与的多租户云服务。虽然主要是一个研究项目，但其项目页面声称它曾一度被超过\
  \ 2000 万用户使用。\n\n它旨在跨多个社交网络提供抽象层，有点像其他类似的工作，如 OpenSocial、Seam Social、Spring Social\
  \ 或 Agorava。\n\n![](img/600273_1_En_3_Fig7_HTML.jpg)\n\n服务器架构概览。它包括 Blob 存储、表存储、Redis\
  \ 缓存、搜索、滥用报告、推送通知、密钥保管库、电子邮件报告、Geneva 监控、内容验证、CDN、Web 角色、服务总线队列、辅助角色等。\n\n图 3-7\n\
  \nEmbedded Social 服务器架构\n\n其功能包括：\n\n*   用户认证\n*   用户资料\n*   话题\n*   表情\n*   社交图谱\n\
  *   动态信息流\n*   内容审核\n*   搜索\n*   热门和最新\n\n除了用于微软在 2016 年收购的 LinkedIn 之外，Embedded\
  \ Social 似乎主要是学术性的，类似于谷歌的 20% 项目，并且尽管直到 2020 年左右仍有相关出版物，但该项目现在似乎或多或少已不活跃并被弃用。\n\n\
  ### Seam Social\n\nSeam Social 是 JBoss Seam 3 项目的一部分，在 CDI [28] 等 Java EE 标准之上提供社交连接功能。Seam\
  \ Social 是一个用于消费信息的绑定库。虽然基于 CDI 和 Java EE 的 OAuth 可以被视为基本 API，但 Seam Social 是 Agorava\
  \ 之前最丰富的高阶 API，特别是通过为社交行为（如点赞、签到或用户时间线更新）提供 CDI 事件。常见的 API 绑定在大多数情况下由提供商的 API 定义决定，或者有时直接从其中生成，其灵感来源于\
  \ Spring Social，但 Seam Social 从来不是 Spring Social 的克隆或分支，因为它与 Spring Social 的关系，就如同底层的\
  \ CDI 和扩展与 Spring 框架的关系一样。\n\n2012 年初，Seam 被停止开发，转而与 Apache DeltaSpike 合并，这也是 Seam\
  \ Social 继续前进的原因……最终演变为 Agorava [33]。\n\n\n\n### JSR 357\n\n在 2011 年 JavaOne 大会以及随后在安特卫普举办的\
  \ Devoxx 等会议期间，我发起了一系列讨论，与 CDI 规范负责人 Pete Muir、Twitter4J 作者 Yusuke Yamamoto 以及 Seam\
  \ Social 创始人 Antoine Sabot-Durand 共同探讨了在 Java 社区进程中为 Java 平台标准化社交媒体 API 的可能性。\n\n\
  他们认为这是一个值得追求的想法。考虑到 CDI 的广泛应用以及 API 与实现之间相当清晰的结构化分离，其他 API 和项目（如 DaliCore）被认为可能具有相关性（尤其是在\
  \ Java EE 下提供信息），这使得 Seam Social 成为初始代码库的最佳候选。\n\n该 JSR 由我和 Antoine 作为联合规范负责人提出，并得到了\
  \ Red Hat/JBoss、eXo Platform、Twitter（由 Twitter4J 作者 Yusuke Yamamoto 代表）等公司，以及 JUG\
  \ Chennai、来自 BeJUG 的 DaliCore 作者、Java EE 7 EG 成员兼 Oracle ACE 总监 Markus Eisele（现在再次效力于\
  \ Red Hat，Antoine 则直到 2021 年都在那里工作）的加入，可以说是企业个人与 JUG 的健康组合。\n\n然而，在 IBM 首先投票反对该\
  \ JSR 之后，其他 EC 成员如 SAP 也相继反对，一个 JUG（SouJava）投了赞成票，另一个（LJC）投了反对票，最终创建投票以 8 票反对、5\
  \ 票赞成的结果告终，阻止了 JSR 357 的创建。遗憾的是，尽管大型供应商更偏爱“围墙花园”[14]而非开放标准，但这并不完全出人意料，甚至利益相关方和 EG\
  \ 成员候选者 Twitter 也投了弃权票。关于此次投票的文章请参见[26]。\n\nIBM 对 OpenSocial 情有独钟，但正如其部分支持者（如 Adjuvi\
  \ 的 Dion Hinchcliffe [16]）所解释的那样（尽管稍晚一些），OpenSocial 是一个基础标准，而遵循 Seam Social 的 JSR\
  \ 357 的主要目标是提供一个高阶 API 并与 Java 平台绑定。以 WebSocket 为例，JSR 357 提到其具有协同增效的潜力。这个 W3C 标准与\
  \ OpenSocial 的后续版本类似，是在 HTML5 的框架下定义的，而 Oracle 的 JSR 则创建了一个 Java 实现。即使在 Java 平台上，也已经存在多个成熟且被广泛采用的\
  \ WebSocket 开源项目；尽管如此，人们仍然认为创建一个 JSR 是值得的。JSON 的情况类似，甚至可能更引人注目，因为 JSON“之父”Douglas\
  \ Crockford 的事实上的参考实现启发了 JSON JSR，但 Crockford 虽然最初“支持这个 JSR”，却在去年荷兰移动大会上亲自告诉我，他不再打算参与其中，并且从未停止支持和推广他自己围绕\
  \ JSON 的库。\n\n在 JSR 357 被否决的那一周，最初反对的 IBM 向 Facebook 出售了数百项（甚至可能是数千项）社交媒体软件专利，这一事实不仅看起来很不光彩。如果社交媒体专利和专有技术被出售给\
  \ Facebook，从而增强其对抗 Twitter 等竞争对手的武器库，那么 IBM 自身对 OpenSocial 的支持也变得有些可疑。这可能是 Twitter\
  \ 在投票最后时刻“情绪摇摆”背后的一个原因。也许是巧合，但 Twitter4J 作者 Yusuke Yamamoto 在那之后不久就离开了 Twitter。无论\
  \ EC 成员（如 IBM 或 SAP）是否不希望 Red Hat 在 Hibernate、CDI/Seam 或 Arquillian（仅举几例）之后，在更多关键开源项目中扮演有影响力的角色，这也可能是另一个原因。特别是关于这一点，我想说，如果这是意图之一，那么它适得其反了，因为\
  \ Agorava 的创建和积极开发并非仅由一家公司（如 DaliCore 或 Social Link）推动，而是由世界各地的各种贡献者共同完成，他们中的大多数是拟议的\
  \ EG 成员。\n\n扼杀一个 Java 社交“王位”的潜在继承者，尤其是可以说有大量法国参与者参与的项目，引发了一场名为 Agorava 的 Java 社交框架的“法国大革命”。\n\
  \n你将在第 6 章中了解更多关于 Agorava 的信息。\n\n## 总结\n\n在本章中，我们了解了不同类型的社交标准以及为标准化与社交网络交互所做的努力，这些努力允许一定程度的提供商中立性以及跨平台发布。\n\
  \n"
- "# 4. 社交安全\n\n如今，网络安全攻击的激增使得我们有必要在多个安全战线（无论是物理、技术还是政策和流程方面）上保卫我们的组织。上述每一个战线对组织的安全都同等重要。在打造一个面向未来且安全的组织时，任何一方都不应被削弱。也就是说，仅有物理安全是不够的。仅有物理和技术安全确实可能给黑客带来更多挑战，但如果你的员工没有接受良好的教育来保护他们的密码，那么你的组织整体上并不十分安全。\n\
  \n信息安全基于\n\n*   机密性\n\n*   完整性\n\n*   可用性\n\n这三个概念通常被称为 CIA 三元组。它是随着时间的推移而形成的，并非由单一个人提出。机密性最早于\
  \ 1976 年在美国空军的一项研究中被提出；完整性的概念则在 David Clark 和 David Wilson 于 1987 年撰写的一篇题为《商业与军用计算机安全策略比较》[55]的论文中得到了探讨。\n\
  \n该论文认识到商业计算需要会计记录和数据正确性。尽管找到最初的来源并不容易，但可用性的概念在一年后的 1988 年变得更加普及。又过了十年，到 1998 年，人们将这三个概念统称为\
  \ CIA 三元组。\n\n*   机密性 `–` 信息不应被未经授权的用户读取。\n\n*   完整性 `–` 信息不应能够在未被察觉的情况下被篡改。\n\n\
  例如，黑客不应能够在数据发送给预期接收者之前截获并修改任何数据。\n\n*   可用性 `–` 要求信息在授权用户需要时能够被访问。\n\n除了 CIA 三元组之外，社交媒体安全还有一些更关键的概念：\n\
  \n*   机密性\n\n*   完整性\n\n*   可用性\n\n*   隐私\n\n*   身份验证\n\n*   授权\n\n隐私 `–` 用户可以控制其个人信息的访问、使用和披露。隐私是维护秘密、匿名性以及免于监视或干涉个人私事的概念。隐私可以被理解为控制何时、以何种方式以及在多大程度上与他人分享个人信息的权力。\n\
  \n根据 CCPA，个人信息是“能够识别、关联、描述、合理关联或可能直接或间接与特定消费者或家庭相关联的信息。”\n\n根据 GDPR，个人信息被称为“个人数据”，它被认为是“与已识别或可识别的自然人相关的任何信息。”\n\
  \n身份验证 `–` 用户可以证明他们就是他们所声称的那个人，即他们的**身份**；例如，客户端可以向服务器证明它代表一个授权身份行事，反之亦然。或者，就像来电显示的呼叫者\
  \ ID。\n\n授权 `–` 用户拥有足够的权限来访问受限资源或执行特定操作。\n\n如今，身份验证和授权有时会被混淆，因此这里有一个很好的方法来记住这两个术语在身份与访问管理（IAM）领域中的区别。身份验证确认用户就是他们所声称的那个人，而授权则允许这些用户访问资源。\n\
  \n\n\n## 隐私\n\n“隐私”一词源于“私密”，具有拉丁语词源：“prīvātus”，字面意思是远离公共事务。\n\n虽然古罗马人或许能够将部分事务隐藏于公众和当时著名作家的视线之外，而且从事件实际发生到被记录并呈现在读者面前，至少需要数天，更多时候是数月甚至数年，但如今，这有时可能只是眨眼之间或点击一下鼠标的功夫。\n\
  \n举报人爱德华·斯诺登的爆料是最广泛的，但绝非首例将隐私问题公之于众的事件，尤其是在社交网络或类似在线服务方面[37]。将来自不同来源和日常生活方方面面的数据整合成用户的数字画像和数字足迹的能力，在过去几十年里，主要是警察和情报机构工具（如“Dragnet”）的领域（虽然它以一种幽默的方式指代该系统，但并非特指那部电影）。\n\
  \n不仅仅是斯诺登及其如今可供其俄罗斯东道主使用的技能，就清楚地表明西方国家及其机构并非唯一对这类信息感兴趣的一方。许多人试图控制；有些国家则干脆屏蔽或限制整个服务，如果社交网络不能像其本国（通常是美国、中国、俄罗斯或土耳其）的情报机构那样，向这些国家提供同等获取关键信息的权限。临时或永久屏蔽某些服务提供商的国家名单还在不断增加。如果所有权或托管服务因廉价劳动力（而非税收）原因而外包，那么某些服务也可能受到这些国家做法的影响。我们之前听说过的一个最著名的例子是\
  \ LiveJournal，因为 OpenID 1.0 曾在那里诞生。2007 年 12 月，Six Apart 将其出售给了俄罗斯媒体集团 SUP Media。\n\
  \n2009 年之后，其大部分生产工作也转移到了俄罗斯，硅谷的员工被解雇。尽管是私人所有，但 SUP Media 明显受到俄罗斯情报机构的控制和审查。例如，2007\
  \ 年，俄罗斯博主萨瓦·捷连季耶夫因在当地记者博客上发表评论，被指控煽动对内务部工作人员的社会仇恨，并被判处一年缓刑。更不用说最近的谋杀案，比如批评政府的鲍里斯·涅姆佐夫在莫斯科遇害，就在他宣布将披露俄罗斯介入乌克兰及\
  \ 2014 年占领克里米亚的信息仅数小时后。讽刺的是，即使在像俄罗斯这样审查最严格的国家之一，也曾有过一丝微弱的希望，即社交媒体即使不能带来真正的改革，至少可能有助于找到他谋杀案的线索[38]。此外，自\
  \ 2022 年初俄罗斯对乌克兰发动全面战争以来，许多俄罗斯士兵因在社交媒体或约会网站上暴露行踪而遭到乌克兰军队袭击。\n\n虽然“国家安全”以及试图在网上抓捕恐怖分子或重罪犯的论点被用来为全球范围内的大规模监控辩护，但批评政府的博主或记者如果身份暴露给他们所批评的人或机构，往往不仅面临隐私风险，更会危及生命。\n\
  \n尽管欧洲托管服务提供商及其他互联网或移动公司所做的“数据留存”等努力意味着欧洲也并非完全隐私无忧，但与美国和世界许多其他地区相比，大多数欧盟国家，尤其是德国，拥有相当严格的隐私和数据保护法律。少数国家，如冰岛（目前不在欧盟，但在欧洲自由贸易联盟），以及许多斯堪的纳维亚国家，拥有甚至更强的数据保护法律。\n\
  \n总部设在这些国家的社交网络，例如德国的 XING，以及德国电信和来自德国的其他互联网公司如 GMX/1&1，声称其数据可以免受美国国家安全局或其他间谍的直接访问。尽管如果存在针对用户犯下谋杀、恐怖主义、有组织犯罪或儿童色情等严重罪行的合理怀疑，这些公司会执行本地和国际调查，但它们都不太可能像美国国家安全局及其他国家机构在美国和其他地方那样，每天对每个用户进行大规模筛查。在没有搜查令访问记录或预先窃听通信的情况下，如果服务提供商及其服务器都真正位于欧洲，并且数据不通过国外连接发送，大多数欧洲用户应该感到安全。\n\
  \n\n\n### 隐私泄露\n\n以下是用户数据泄露最多的十大社交媒体网站：\n\n1.  Yahoo! `–` 超过 35 亿用户受到雅虎数据和隐私泄露事件的影响，其中包括\
  \ 2013 年涉及 30 亿用户的最大单次泄露事件。\n\n2.  Facebook `–` 自 2004 年 Facebook 成立以来，超过 21 亿用户受到八次以上数据泄露事件的影响，其中包括剑桥分析公司丑闻——这严格来说并非数据丢失，而是出售了至少\
  \ 8700 万用户的信息。仅 2019 年的四次泄露事件，就使 Facebook 数据被盗或处理不当的用户数量突破了 20 亿。\n\n3.  LinkedIn\
  \ `–` 在 LinkedIn 受数据泄露影响的 11 亿账户中，大部分发生在 2021 年，当时有 7 亿用户的详细信息在暗网上被出售。\n\n4.  MySpace\
  \ `–` 三次泄露事件暴露了 7.19 亿 MySpace 用户的数据。\n\n5.  新浪微博 `–` 2020 年，这个中国社交网络约 5.39 亿用户的数据（包括\
  \ 1.72 亿个电话号码）在暗网上被提供。\n\n6.  Twitter `–` Twitter 在 2023 年 6 月证实，一名黑客获取了 540 万个账户的用户详细信息。这使得受影响的账户总数达到\
  \ 3.7 亿，超过了如今“X”平台的活跃用户数。\n\n7.  Quora `–` 2018 年的一次黑客攻击导致 1 亿个密码和安全问题被泄露。\n\n8.\
  \  Dailymotion `–` 2016 年，一名黑客从视频分享平台 Dailymotion 窃取了超过 8500 万个电子邮件地址、用户名和密码。\n\n\
  9.  Tumblr `–` 同样在 2016 年，Tumblr 宣布其安全和用户隐私在三年前（即 2013 年）就已遭到破坏，6500 万用户的账户详细信息被盗。\n\
  \n10. Instagram `–` 2019 年，Meta 旗下的 Instagram 至少有 4900 万用户遭遇隐私泄露，当时一个未受保护的服务器被黑客入侵。\n\
  \n除了总部位于法国的 Dailymotion 和来自中国的新浪微博外，其他所有网站均来自美国，这并不令人意外。在美国，监控无处不在，隐私处理往往松懈。Twitter/X\
  \ 的竞争对手、Meta 旗下的 Threads 尚未在欧盟全面推出，这一事实也与欧洲的数据保护和隐私法律，以及 Meta 过去可能发生的大规模数据泄露事件有关。\n\
  \n除了源自欧盟的服务外，像 XING 这样的服务也提供了由用户控制的、粒度更细的访问权限级别，有时可以限制，例如，谁能看到每个单独的数据项。假设你想向访问你个人资料的每个人显示你的姓名和出生日期，但不显示年份或年龄，或者只允许你的朋友看到你的电话号码；这些以及更多设置都可以通过像\
  \ XING 这样的系统来控制。\n\n这也是 XING 放弃 OpenSocial 的原因之一，因为它无法提供如此细粒度的访问控制，或者在某些情况下甚至根本不提供任何控制，而是向所有人显示所有内容，或者至少向你所有的朋友显示所有数据。\n\
  \n通过 W3C 或其他组织在 Fediverse 上继承 OpenSocial 的大多数标准和协议也并不总是能很好地适应隐私保护，但也有一些例外，尤其是 Matrix，它非常注重安全性和隐私（还记得上一章提到的，Matrix\
  \ 最初是在以色列 Amdocs 公司创建的），因此受到了全球非政府组织和政府机构的信任。\n\nDiaspora 在隐私方面也很强大，这就是为什么一些极端分子，比如伊斯兰组织\
  \ ISIS，在 Twitter 等其他大型社交网络审查或封禁他们的账户后，于 2014 年涌入该平台。作为一个具有高隐私标准的分布式服务，在缺乏中央控制点的情况下，监控或阻止内容并非易事，但到\
  \ 2014 年 8 月，Diaspora 基金会表示，通过社区管理和社区的口口相传，其所有较大的节点都已删除了 ISIS 的内容和账户。\n\n埃隆·马斯克让一个名叫杰克·斯威尼的年轻人——他（出于粉丝热情或好奇心）在\
  \ Twitter 上追踪马斯克的航班——在马斯克接管 Twitter 仅仅几天后就被踢出了该平台，声称这会对马斯克进行“人肉搜索”（分享某人的信息，通常是位置信息）。这名年轻人转而使用\
  \ Mastodon 以及其他社交网络，如 Instagram。当然，埃隆·马斯克本人也经常在公开场合（如 2022 年卡塔尔世界杯决赛等类似场合）发推文。\n\
  \n现在，由埃隆·马斯克领导的 X（前身为 Twitter）计划开始存储用户的生物识别数据，以及他们的就业和教育经历。对于为何要存储生物识别信息，目前尚无解释。通行密钥认证（我们将在本章后面详细介绍，但\
  \ PayPal——埃隆·马斯克发家的公司——是早期采用者）如果实施得当，不会交换生物识别信息。它只保留在设备中。因此，一个更可能的原因是马斯克计划效仿 OpenAI\
  \ 联合创始人山姆·奥特曼的 Worldcoin 项目，该项目涉及生物识别验证。据称，收集就业和教育经历的计划与“X Hire”有关，这是“X”旗下类似于 LinkedIn\
  \ 或 XING 的竞争对手。但马斯克是罗恩·德桑蒂斯及其“反觉醒”运动的亲密盟友，在佛罗里达州和其他地方，教授“错误内容”的教师经常受到歧视或被解雇，这给这一意图蒙上了一层相当可怕的阴影。马斯克在\
  \ PayPal 的老友兼联合创始人彼得·蒂尔也是如此，他在 Facebook 上进一步积累了财富，并凭借其“数据章鱼”Palantir 在 Facebook\
  \ 的剑桥分析数据泄露丑闻中扮演了可疑的角色。\n\n据报道，X 计划移除屏蔽功能，这也让许多用户感到不安，这无疑将对该网络的隐私和安全造成打击。屏蔽一个不受欢迎的账户会对你所说所做的一切对他们隐藏，而静音功能只是将他们的帖子对你隐藏，但他们，或者他们背后的黑客和钓鱼农场，仍然可以看到你个人资料中的任何信息。从网络跟踪到政治和种族骚扰，这将进一步为这个前身为\
  \ Twitter 的网络上的不良行为者打开大门。\n\n## 身份验证\n\n就像“Agora”这个词一样，身份验证（authentication）也源自希腊语。它最初来自希腊语“af̱thentikós”，是名词“authentes”（意为“行为者，主人”）的派生词，而“authentes”又由“autos”（意为“自身”）和词根-hentes（意为“工作者，行为者，存在”）构成。\n\
  \n我们将*身份验证*定义为验证某人身份的过程。换句话说，身份验证就是证明你确实是你所声称的那个人或系统。好了，让我们通过引入我们喜爱的虚构人物——爱丽丝和鲍勃——来让这个相当专业的定义更容易理解。假设爱丽丝想给鲍勃发送一条消息。鲍勃如何能确定他确实是在和爱丽丝发消息，而不是和一个声称是爱丽丝的人呢？鲍勃基本上可以通过三种不同的方式来验证爱丽丝的身份：通过她知道的东西，她拥有的东西，或者她本身是什么。\n\
  \n验证某人的身份可能基于以下三种方法中的一种或多种：\n\n1.  你知道的东西\n2.  你拥有的东西\n3.  你本身是什么\n\n\n\n### 你所知的信息\n\
  \n我们将存储在记忆中、并在需要时能提取出来的信息归类为*你所知的信息*。在日常交互中，我们几乎可以在任何需要验证身份才能使用的系统中找到*你所知的信息*认证方法：银行账户、电子邮箱、社交媒体账户等等。没错，最常见的*你所知的信息*认证方法就是密码、密保、口令以及个人识别码（PIN）。\n\
  \n*你所知的信息*认证因其成本低、易实现而成为最常用的认证方法。然而，易于实现也带来了一些副作用，其中之一便是它可能不被视为强认证。此外，对于需要高安全性的应用或系统而言，仅凭*你所知的信息*认证是不够的。\n\
  \n### 你所拥有的物品\n\n*你所拥有的物品*认证方法指的是用户所拥有的某样东西。你是否注意到*你所知的信息*方法有一个主要缺点？它完全依赖于我们的记忆及其（有限的）容量；也就是说，密码很容易被遗忘。*你所拥有的物品*方法消除了这个问题，因为它依赖于某个在你每次需要验证身份时都必须随身携带的物品。同样，这里的关键在于拥有某种令牌。\n\
  \n*你所拥有的物品*认证的例子包括信用卡、U 盘或动态口令卡。当然，随身携带认证物品也伴随着风险——它们可能被盗、损坏或丢失。\n\n### 你所是的特征\n\
  \n*你所是的特征*认证方法针对的是用户“是什么”，主要指的是生物特征认证方法。简单来说，生物特征是与人体特征相关的任何度量指标，理论上可用于身份识别或身份验证。生物特征数据类型多种多样，例如面部识别、指纹、虹膜和视网膜识别、语音识别、静脉识别、DNA\
  \ 以及数字签名。\n\n生物特征可以区分不同的人。\n\n与其他两种认证方法相比，生物特征如何？它不如*你所知的信息*和*你所拥有的物品*方法那样广为人知，但当与其他两种方法正确结合使用时，它能显著增强认证的强度。\n\
  \n我们认为，强认证是指使用两种或两种以上不同的认证方法，例如智能卡加 PIN 码，或者密码加某种生物特征（如指纹、语音或虹膜识别）。\n\n### 认证技术的最新趋势\n\
  \n就这些了吗？我们只能使用这三种认证方法来保护我们的系统吗？\n\n当然不是。随着黑客变得越来越聪明，我们需要更多（且更复杂）的认证方法，包括*你所在的位置*和*你所做的事*。\n\
  \n*你所在的位置*与你的地理位置相关，并支持两种不同的形式：*地理位置安全检查*，即根据用户账户的配置位置来检查用户的实际位置；以及*MAC 地址检查*，例如，试图从不同设备访问公司网络的员工，会因\
  \ MAC 地址不同而被拒绝访问。\n\n*你所做的事*是最不流行的认证方法。这种认证通过观察用户的行为（触摸或手势）来验证用户身份。一个例子是 Windows\
  \ 8 自带的*图片密码*功能，它允许你在图片上配置触摸和手势作为身份验证方式。一个更常见且技术性更强的*你所做的事*认证例子是智能手机的手势认证，你用手指在手机屏幕上滑动一个手势图案来解锁手机。\n\
  \n#### 通行密钥认证\n\n通行密钥允许你无需输入密码即可安全登录社交网络等服务。\n\n与安全密钥不同，通行密钥的优势在于能够验证用户身份。这意味着通行密钥会使用“你所知的信息”或“你所是的特征”来验证你的身份，例如\
  \ PIN 码或生物特征检查（如指纹、虹膜或面部识别），或者某种模式，例如二维码。\n\n##### 历史\n\n通行密钥的概念最早出现在 2009 年，当时后来被\
  \ Synaptics 收购的 Validity Sensors 与 PayPal 联手，提出了使用生物特征代替密码进行在线身份识别的概念。2012 年 7 月，他们与另外几家\
  \ IT 领导者共同创立了 FIDO 联盟，这是一个网络安全组织。FIDO 代表“快速在线身份识别”（Fast IDentity Online）。\n\n谷歌于\
  \ 2013 年加入。一年后的 2014 年，PayPal 和三星在三星 Galaxy S5 智能手机上启动了 FIDO 认证。该设备的用户可以通过指纹触摸来验证\
  \ PayPal 身份，并在完成交易时无需输入密码即可在线购物。“通行密钥”这个术语直到最近才流行起来，当时苹果在 2022 年 6 月的全球开发者大会上大力推广，并在\
  \ iOS 16 和 macOS Ventura 中公开宣布了其通行密钥功能。\n\n##### 工作原理\n\n通行密钥基于 FIDO 联盟开发的 WebAuthn\
  \ 加密协议。每个通行密钥都是一对相关的非对称加密密钥，并且仅对其创建的网站有效。这对密钥由一个私钥和一个公钥组成：私钥保存在你的设备上，位于支持通行密钥的密码管理器（通行密钥提供者）中；公钥则存储在你想要登录的网站上。\n\
  \n你可以把公钥证书想象成数字版的护照。\n\n\n\n### 身份验证示例\n\n在本节中，我们探讨了身份验证基础的一些理论知识。你是否和我们一样迫不及待地想看看它在代码中如何实现？让我们通过分析一些基本的身份验证代码片段，来一窥\
  \ Jakarta EE 的世界。\n\n在 Jakarta EE 中，组件容器负责提供应用程序安全性。容器提供两种类型的安全性：*声明式*和*编程式*。声明式安全涉及使用部署描述符或注解来配置组件的安全机制，而编程式安全则由具有安全意识的应用程序使用，以补充其安全模型。\n\
  \n**编程式身份验证**\n\n可以通过 *SecurityContext* 和 *HttpServletRequest* 接口以编程方式对用户进行身份验证。\n\
  \n`SecurityContext`\n\nJakarta EE 安全 API 规范（你将在接下来的几章中有机会评估它）指定了一种方法来帮助你以编程方式触发身份验证过程：\n\
  \n*   `authenticate()` 使应用程序能够通知容器，它应该与调用者启动身份验证过程。\n\n`HttpServletRequest` 接口通过指定三个简单的方法，使你能够以编程方式对\
  \ Web 应用程序用户进行身份验证：\n\n*   *authenticate* 触发已配置的特定身份验证机制；例如，如果是表单，则会向用户显示登录表单以收集其用户名和密码；而如果只是像“使用\
  \ Google 登录”这样的社交登录，它将会把用户重定向到 Google。\n\n*   *login* 验证提供的用户名和密码。\n\n*   *logout*\
  \ 重置请求的调用者身份。\n\n以下代码示例展示了如何使用 authenticate 方法：\n\n```\npublic class EnterpriseSocialServlet\
  \ extends HttpServlet {\nprotected void processRequest(HttpServletRequest request,\
  \ HttpServletResponse response) throws ServletException, IOException {\nresponse.setContentType(\"\
  text/html;charset=UTF-8\");\ntry (PrintWriter writer = response.getWriter()) {\n\
  request.authenticate(response);\nwriter.println(\"Successful authentication!\");\n\
  }\n}\n}\n```\n\n此示例展示了如何使用 *login* 和 *logout* 方法：\n\n```\npublic class SampleLoginLogoutServlet\
  \ extends HttpServlet {\nprotected void processRequest(HttpServletRequest request,\
  \ HttpServletResponse response) throws ServletException, IOException {\nresponse.setContentType(\"\
  text/html;charset=UTF-8\");\ntry (PrintWriter out = response.getWriter()) {\nout.println(\"\
  \");\nout.println(\"\");\nrequest.login(\"Chapter4User\", \"Chapter4User\");\nBigDecimal\
  \ result =\nconverterBean.libresToKilos(new BigDecimal(\"55.0\"));\nout.println(\"\
  Servlet SampleLoginLogoutServlet result of libresToKilos= \" + result + \"\");\n\
  out.println(\"\");\nout.println(\"\");\n} catch (Exception e) {\nthrow new ServletException(e);\n\
  } finally {\nrequest.logout();\n}\n}\n}\n```\n\n## 授权\n\n授权，也称为访问控制，是管理对资源访问的过程——换句话说，就是控制谁在应用程序中可以访问什么。\n\
  \n更正式地说，授权就是定义访问策略。授权的示例包括：用户是否被允许查看此网页、读取或编辑此信息、查看此表单或使用此打印机？这些都是决定用户可以访问什么的决策。\n\
  \n### Jakarta 授权\n\nJava 有一个安全架构，可以保护系统免受移动/动态或静态代码的未授权访问。问题在于手动确定执行库或应用程序所需的一组安全访问权限。常用的策略是执行代码，记录授权失败，分配额外的访问权限，然后再次测试。此过程会迭代，直到代码成功运行以满足所需的用例。这些用例可能并不总是覆盖代码的所有路径，因此在已部署的系统中可能会发生故障。另一方面，可能会为代码分配广泛的访问权限，以防止发生授权失败。然而，这通常会导致违反最小权限设计原则\
  \ [27]。\n\n最小权限设计原则要求采用最小化方法来授予用户对特定信息和工具的访问权限。此外，访问权限应基于时间，以限制对完成必要任务所需时间的资源访问。授予超出此范围的访问权限将导致不必要的访问，并可能导致数据在未经批准的上下文中被更新。分配访问权限将限制用户（无论是有意还是无意）对系统造成破坏性攻击。\n\
  \n基本的 Java SE 安全依赖于**权限**，例如，用于访问文件系统的 `FilePermission` 或用于在 AWT/Swing 应用程序中使用剪贴板等资源的\
  \ `AWTPermission`。\n\n如果有人想为特定应用程序允许一种新类型的权限，可以通过在策略文件中添加一个条目来实现。\n\n一个策略文件条目的示例，授予来自“[`http://mysocial.tv/\"\
  `](http://mysocial.tv/%25E2%2580%259D) 的代码观看 ARTE 的权限，如下所示：\n\n```\ngrant codeBase\
  \  \"http://mysocial.tv /\" {\npermission fr.arte.TVPermission \"arte-tv\", \"watch\"\
  ;\n}\n```\n\n## 安全标准\n\n在查看了第 3 章中与社交媒体交互的标准化方式之后，这里列出了一些与安全相关的常见标准。\n\n\n\n###\
  \ Jakarta Security\n\nJakarta EE 中的安全性基于一些基本术语：\n\n*   **用户** 是在身份存储中定义的个体身份。该存储可以是数据库、平面文件或\
  \ LDAP 服务器。\n\n*   **组** 是具有相同需求或访问级别的一组用户。\n\n*   **安全域** 是应用服务器访问用户和组信息的通道。\n\n\
  *   **角色** 是 Jakarta EE 中关于访问级别的概念。Jakarta EE 开发者指定哪些角色可以访问哪些应用功能集合。然后，这些角色通过供应商特定的配置数据映射到用户和组。\n\
  \n*   **主体** 是一个具有已知凭证的身份，可以使用身份验证协议进行验证。\n\n*   **凭证** 包含或引用用于验证 Jakarta EE 应用程序主体的信息，例如，通过输入密码或调用外部服务。更多信息请参见“身份验证”。\n\
  \nJakarta Security 的官方范围是：\n\n> *Jakarta Security 提供一组必需的* *安全功能* *，包括身份验证、授权、数据完整性和传输安全。*\n\
  \n您会记得，在第 3 章中，几乎每个社交服务或类似的 API 都使用 RESTful Web 服务。REST 代表“表述性状态转移”。Jakarta REST（前身为\
  \ JAX-RS）是用于 RESTful Web 服务的 Jakarta EE API。\n\n以下是一些简短的示例，说明如何通过注入 Jakarta EE `SecurityContext`\
  \ 实例来完成授权。注入的安全上下文在底层 HttpServletRequest API 之上工作。注入的安全上下文取决于实际的 RESTful Web 应用程序部署。\n\
  \nSecurityContext 可以与子资源定位器结合使用，通过使用 CDI `@Context` 注解 [28]，根据用户主体所属的特定角色返回不同的资源。例如，如果用户是“优选客户”，子资源定位器可以返回不同的资源。\n\
  \n```\n@Path(\"basket\")\npublic ShoppingBasketResource get(@Context SecurityContext\
  \ sc) {\nif (sc.isUserInRole(\"PreferredCustomer\") {\nreturn new PreferredCustomerShoppingBasketResource();\n\
  } else {\nreturn new ShoppingBasketResource();\n}\n}\n```\n\n在“资源”端点中使用 `SecurityContext`：\n\
  \n```\n@Path(\"resource\")\n@Singleton\npublic static class MyResource {\n@Inject\n\
  SecurityContext securityContext;\n@GET\npublic String getUserPrincipal() {\nreturn\
  \ securityContext.getUserPrincipal().getName();\n}\n}\n```\n\n通过将 `SecurityContext`\
  \ 注入到单例资源中。\n\n当 Jakarta REST 应用程序部署在 Servlet 容器中时，您可以仅依赖 Servlet 容器提供的标准 Jakarta\
  \ EE Web 应用程序安全性，该安全性可通过在 web.xml 中定义 `<security-constraint>` 元素并分配能够访问这些资源的角色，通过\
  \ web.xml 描述符进行配置。您还可以定义允许执行的 HTTP 方法。请参见以下示例：\n\n```\n\n/rest/admin/*\n\nadmin\n\
  \n/rest/orders/*\n\ncustomer\n\nBASIC\nmy-default-realm\n\n```\n\n#### 身份验证机制\n\n\
  Jakarta EE 平台支持以下身份验证机制：\n\n*   基本身份验证\n\n*   基于表单的身份验证\n\n*   自定义表单身份验证\n\n*  \
  \ 摘要身份验证\n\n*   客户端身份验证\n\n*   OpenID Connect 身份验证\n\n一切始于 Servlet 规范，该规范指定了四种身份验证机制：BASIC、FORM、DIGEST\
  \ 和 CLIENT-CERT。后来，在开发 Jakarta Security API 时，明确需要 BASIC 和 FORM 身份验证机制的工作方式与 Servlet\
  \ 规范中的 BASIC 和 FORM 对应机制相同。也就是说，我们总共可以区分五种身份验证机制，其中三种来自 Jakarta Security API（BASIC、FORM、CUSTOM-FORM），两种来自\
  \ Servlet 规范（DIGEST、CLIENT）。\n\n现在让我们仔细看看每一种机制。\n\n##### 基本身份验证\n\n**它是什么**\n\n\
  当您未指定任何身份验证机制时，基本身份验证是默认的身份验证方式。\n\n**工作原理**\n\nWeb 服务器向 Web 客户端请求用户名和密码，并通过将用户名和密码与指定或默认域中的授权用户数据库进行比较，来验证用户名和密码是否有效。\n\
  \n下面，您可以看到使用基本身份验证时发生的操作序列：\n\n1.  Web 客户端请求访问受保护的资源。\n\n2.  Web 服务器返回一个对话框，请求输入用户名和密码。\n\
  \n3.  Web 客户端将用户名和密码提交给服务器。\n\n4.  服务器在指定域中对用户进行身份验证，并在身份验证成功后返回请求的资源。\n\n![](img/600273_1_En_4_Fig1_HTML.jpg)\n\
  \n示意图描述了客户端-服务器身份验证。它包括四个步骤。1，请求受保护资源。2，请求用户名密码。3，发送用户名密码。4，返回请求的资源。\n\n图 4-1\n\n\
  基本身份验证\n\n**如何配置**\n\n注解：\n\n```\npackage enterprise.social.authentication.mechanism.http;\n\
  @Retention(RUNTIME)\n@Target(TYPE)\npublic @interface BasicAuthenticationMechanismDefinition\
  \ {\n/**\n* 将通过 WWW-Authenticate 标头发送的域名称。\n* \n* 请注意，此域名称不会将命名身份存储配置耦合到身份验证机制。\n\
  *\n* @return 域名称\n*/\nString realmName() default \"\";\n}\n```\n\nWeb.xml：\n\n```\n\
  BASIC\nenterprisesocialbasicrealm\n\n```\n\n##### 基于表单的身份验证\n\n**它是什么**\n\n一种身份验证机制，其中向用户呈现一个可编辑的表单，用于填写其登录凭据以登录到某个服务或系统。\n\
  \n**工作原理**\n\n开发者通过自定义 HTTP 浏览器向用户显示的登录屏幕和错误页面来控制登录屏幕的*外观和感觉*。\n\n让我们了解使用基于表单的身份验证时发生的操作序列：\n\
  \n1.  Web 客户端请求访问受保护的资源。\n\n2.  如果客户端尚未通过身份验证，服务器会将其重定向到登录页面。\n\n3.  客户端填写其用户名和密码，并将登录表单提交给服务器。\n\
  \n4.  服务器尝试验证用户身份。\n\n5.  身份验证\n    1.  身份验证成功后，会检查已验证用户的主体，以确保其属于有权访问该资源的角色。如果用户获得授权，服务器会使用存储的\
  \ URL 将客户端重定向到该资源。\n\n    2.  身份验证失败后，客户端会被重定向到错误页面。\n\n![](img/600273_1_En_4_Fig2_HTML.jpg)\n\
  \n基于表单的登录身份验证的框图。它从登录页面开始，然后是请求受保护资源、重定向到登录页面、提交表单以及重定向到请求的资源。服务器执行安全检查，如果成功，则重定向到资源页面或返回错误页面。\n\
  \n图 4-2\n\n基于表单的身份验证\n\n对于基于表单的登录，请确保使用 Cookie 或 TLS 会话信息来维护会话。\n\n**如何配置**\n\n\
  HTML 表单\n\n使用基于表单的身份验证时，请务必将表单的操作标记为 `j_security_check`。因此，无论登录表单用于哪个资源，它都能正常工作。此外，显式声明此操作意味着服务器不必自己指定出站表单的操作字段。以下代码片段显示了\
  \ HTML 表单的外观：\n\n注解：\n\n```\npackage jakarta.enterprise.social.authentication.mechanism.http;\n\
  @Retention(RUNTIME)\n@Target(TYPE)\npublic @interface FormAuthenticationMechanismDefinition\
  \ {\n@Nonbinding\nLoginToContinue loginToContinue();\n}\n```\n\nWeb.xml：\n\n```\n\
  FORM\n\n/login.xhtml\n/error.xhtml\n\n```\n\n\n\n##### 摘要认证\n\n**定义**\n\n一种与基本认证类似的认证机制，但不会以明文形式发送密码。该认证机制旨在避免基本认证中最关键的缺陷。\n\
  \n**工作原理**\n\n与基本认证类似，摘要认证基于用户名和密码对用户进行身份验证，但不提供任何消息加密。它在通过网络发送用户名和密码之前，会对其应用哈希函数。也就是说，密码不会在此处通过网络明文发送，但要求认证容器能够获取明文密码的等价物，以便通过计算预期的摘要来验证接收到的认证信息。\n\
  \n应用流程：\n\n1.  客户端请求访问受保护资源。\n2.  服务器回复一个随机数（nonce）和 401 错误码。\n3.  客户端发回一个响应，其中包含用户名、密码、领域（realm）、给定的随机数值、请求的\
  \ URI 以及 HTTP 方法的校验和（默认为 MD5 校验和）。*generate_md5_key(nonce*, *username*, *realm*,\
  \ *URI*, *password_given_by_user)*。\n4.  服务器获取用户名、领域和请求的 *URI*，并查找给定用户名的密码。找到后，它生成自己的版本，例如\
  \ *generate_md5_key(nonce, username, realm, URI, HTTP method, password-for-this-user-in-my-db)*。\n\
  5.  然后，服务器将自身 *generate_md5()* 的输出与客户端发送的输出进行比较：\n    1.  如果匹配，则客户端发送了正确的密码。\n \
  \   2.  如果不匹配，则发送的密码错误。\n\n**如何配置**\n\nweb.xml:\n\n```\nDIGEST\nenterprisesocialdigestrealm\n\
  \n```\n\n##### 客户端认证\n\n**定义**\n\n一种认证机制，客户端通过交换数字证书来安全地获得对服务器的访问权限。\n\n你可能会遇到术语“公钥证书”而非“数字证书”。这两个术语是等价的，目的相同。\n\
  \n**工作原理**\n\n首先，需要强调的是，客户端认证是一种比基本认证或基于表单的认证更安全的认证方法。其主要优势在于使用基于 SSL 的 HTTP（HTTPS），服务器通过客户端的公钥证书来认证客户端。\n\
  \n虽然客户端认证可能适用于内网应用，但由于在用户注册期间向其提供客户端证书以及在注销期间撤销证书存在挑战，它在互联网上通常难以扩展。\n\nSSL 技术为 TCP/IP\
  \ 连接提供数据加密、服务器认证、消息完整性以及可选的客户端认证。\n\n证书由证书颁发机构（CA）签发，CA 是一个受信任的组织，为持有者提供身份标识。\n\n\
  **如何配置**\n\nWeb.xml:\n\n```\nCLIENT-CERT\n\n```\n\n##### 自定义表单认证\n\n**定义**\n\n与基于表单的认证类似，主要区别在于认证对话框的延续方式。因此，自定义表单认证机制不是将表单回发到预定义的\
  \ `j_security_check` 操作，而是通过使用应用程序收集的凭据调用 `SecurityContext.authenticate()` 来继续认证对话框。\n\
  \n其余概念与基于表单的认证基本相同，因此你可以参考后者的*工作原理*和*简单应用流程*部分。\n\n**如何定义**\n\n```\n@Retention(RUNTIME)\n\
  @Target(TYPE)\npublic @interface CustomFormAuthenticationMechanismDefinition {\n\
  @Nonbinding\nLoginToContinue loginToContinue();\n}\n```\n\n#### 身份存储\n\n在本节中，你将了解身份存储的概念及其对安全性的重要性。同时，你将简要了解\
  \ Jakarta EE 中身份存储的基本设置，这将在下一章中扩展为深入分析。\n\n##### 什么是身份存储？\n\n*身份存储*是一个组件，它存储一组用户的应用特定身份信息，例如用户名、组、角色、组成员身份、权限和凭据。有时，它也可能用于存储其他信息，例如\
  \ GUID（调用者的全局唯一标识符）或其他调用者属性。\n\n为了简化上述定义，你可以将身份存储视为一个安全特定的 DAO（数据访问对象）。\n\n#####\
  \ 身份存储的目的是什么？\n\n*身份存储*的目的是通过访问调用者的身份属性来验证调用者的身份。也就是说，*身份存储*提供对用户信息的访问，并且是认证所必需的。\n\
  \n*身份存储*的四个最重要的特征如下：\n\n1.  提供对用户信息的访问\n2.  认证所必需\n3.  验证凭据\n4.  检索组成员身份\n\n一个*身份存储*可以提供认证、授权或两者兼有的能力。\n\
  \n##### 身份存储与 Jakarta EE\n\n更广泛的 Jakarta EE 生态系统包含多个 API，可帮助你管理 Web 应用的认证（*Jakarta\
  \ Authentication*）、授权（*Jakarta Authorization*）和安全标准。Jakarta EE API 除其他外，还指定了 `IdentityStore`\
  \ 接口，为身份存储提供了抽象。\n\n实现 `IdentityStore` 使开发人员能够与身份存储交互，以认证用户（即验证其凭据）并获取调用者组。\n\n\
  我们认为一个好的 *IdentityStore* 实现是仅在上下文级别运行且与环境无关的（无论移植到何种环境并运行，它都会以相同的方式运行并提供相同的结果）。也就是说，一个好的\
  \ *IdentityStore* 实现提供了一个简洁的*{凭据输入，调用者数据输出}*函数。\n\n让我们看看完整的接口（无默认行为，仅签名）并尝试更好地理解它：\n\
  \n```\npublic interface IdentityStore {\nenum ValidationType { VALIDATE, PROVIDE_GROUPS\
  \ }\nCredentialValidationResult validate(Credential credential);\nSet getCallerGroups(CredentialValidationResult\
  \ validationResult);\nint priority();\nSet validationTypes();\n}\n```\n\n*IdentityStore*\
  \ 接口的两个最重要的方法如下：\n\n*   `validate(Credential)` 验证凭据。\n*   `getCallerGroups(CredentialValidationResult)`\
  \ 获取调用者信息。\n\n`IdentityStore` 实现可以根据其能力和配置选择处理其中一个或两个方法。它们可以通过使用 `validationTypes()`\
  \ 方法返回的值集来提示它们处理这两个方法中的哪一个：\n\n*   **VALIDATE** `–` 表示它处理 `validate()` 方法\n*   **PROVIDE_GROUPS**\
  \ `–` 表示它处理 `getCallerGroups()` 方法\n*   **VALIDATE** 和 **PROVIDE_GROUPS** 组合 `–`\
  \ 表示它处理两个方法\n\n你可能会觉得声明能力相当令人困惑，但这是一个有意的决定，以确保 *IdentityStore* 的配置和实现是自主管理的。这意味着\
  \ *IdentityStore* 可以被配置为在特定部署期间支持其中一个或另一个方法，但它可以被编写为支持两个方法。\n\n\n\n###### 验证凭证\n\
  \n要判断一个*凭证*是否有效，你可以使用 *validate()* 方法，该方法在验证成功后，会返回由该*凭证*所标识用户的相关信息。*IdentityStore*\
  \ 可以选择不实现此方法，因为它是可选的。\n\n```\nCredentialValidationResult validate(Credential credential);\n\
  ```\n\n从方法签名可以明显看出，验证结果的类型是 `CredentialValidationResult`，它允许方法获取验证结果的状态值，并且在验证成功后，还能获取验证该凭证的存储区\
  \ ID、调用者主体、调用者在身份存储区中的唯一 ID，以及调用者的组成员身份（如果有）。\n\n对于成功的验证，仅需要调用者主体即可。\n\n那么 *CredentialValidationResult*\
  \ 的内部机制是怎样的呢？请查看仅包含方法签名的类概览：\n\n```\npublic class CredentialValidationResult {\n\
  public enum Status { NOT_VALIDATED, INVALID, VALID }\npublic Status getStatus();\n\
  public String getIdentityStoreId();\npublic CallerPrincipal getCallerPrincipal();\n\
  public String getCallerDn();\npublic String getCallerUniqueId();\npublic Set getCallerGroups();\n\
  }\n```\n\n首先，有三种不同的状态值：`NOT_VALIDATED`、`INVALID` 和 `VALID`。它们分别代表什么含义？\n\n*   `NOT_VALIDATED\
  \ –` 未尝试进行验证，因为 *IdentityStore* 不处理所提供的 *Credential* 类型。\n*   `INVALID –` 验证失败。所提供的\
  \ *Credential* 无效，或者在用户存储区中未找到对应的用户。\n*   `VALID –` 验证成功，用户已通过身份验证。调用者主体和组（如果有）*仅*在此结果状态下可用。\n\
  \n继续看 `CredentialValidationResult` 的其余方法，身份存储区 ID、调用者 DN 和调用者唯一 ID 旨在通过配合 `validate()`\
  \ 和 `getCallerGroups()` 方法来帮助你实现 *IdentityStore*。即使在仅凭调用者主体名称不足以唯一标识正确用户账户的环境中，它们也可用于确保从\
  \ `getCallerGroups()` 返回正确的调用者组。\n\nCredential 接口是一个通用接口，能够表示任何类型的令牌或用户凭证。*IdentityStore*\
  \ 实现可以支持多种具体的 `Credential` 类型，其中具体的 *Credential* 是 *Credential* 接口的一个实现，代表特定类型的凭证。这是通过实现\
  \ `validate(Credential)` 方法并检查作为参数传递的 `Credential` 类型来实现的。\n\n`IdentityStore` 接口为\
  \ `validate()` 方法提供了一个默认实现，该实现会委托给一个能够处理所提供 *Credential* 类型的方法（假设 IdentityStore\
  \ 实现了该方法）：\n\n```\ndefault CredentialValidationResult validate(Credential credential)\
  \ {\ntry {\nreturn CredentialValidationResult.class.cast(\nMethodHandles.lookup()\n\
  .bind(this, \"validate\",\nmethodType(CredentialValidationResult.class,\ncredential.getClass()))\n\
  .invoke(credential));\n} catch (NoSuchMethodException e) {\nreturn NOT_VALIDATED_RESULT;\n\
  } catch (Throwable e) {\nthrow new IllegalStateException(e);\n}\n}\n```\n\n如果传递了\
  \ `UsernamePasswordCredential`，`validate()` 会委托给 `ExampleIdentityStore` 的以下方法：\n\
  \n```\npublic class ExampleIdentityStore implements IdentityStore {\npublic CredentialValidationResult\
  \ validate(\nUsernamePasswordCredential usernamePasswordCredential) {\n// 实现 ...\n\
  return new CredentialValidationResult(...);\n}\n}\n```\n\n###### 检索调用者信息\n\n`getCallerGroups()`\
  \ 方法检索与已验证调用者关联的组集合。这是一个可选方法，*IdentityStore* 可以选择不实现：\n\n```\nSet getCallerGroups(CredentialValidationResult\
  \ validationResult);\n```\n\n这支持身份存储区的聚合，其中一个身份存储区用于验证用户身份，而一个或多个其他存储区用于检索额外的组。\n\
  \n在这种情况下，无需针对存储区验证调用者凭证即可查询身份存储区，这一点至关重要。\n\n###### 声明能力\n\nIdentityStore 接口中还有几个我们尚未讨论的方法，实现可以使用这些方法来声明其能力和序数优先级：\n\
  \n```\nenum ValidationType { VALIDATE, PROVIDE_GROUPS }\nSet DEFAULT_VALIDATION_TYPES\
  \ = EnumSet.of(VALIDATE, PROVIDE_GROUPS);\ndefault int priority() {\nreturn 100;\n\
  }\ndefault Set validationTypes() {\nreturn DEFAULT_VALIDATION_TYPES;\n}\n```\n\n\
  让我们仔细看看以下几点：\n\n*   `priority()` 允许为 IdentityStore 配置一个序数，用于指示当存在多个*身份存储区*时，应按照什么顺序查询它们。数字越小，优先级越高；也就是说，优先级值较低的\
  \ `IdentityStore` 会在优先级较高的 *IdentityStore* 之前被调用。\n*   `validationTypes()` 返回一组\
  \ `ValidationType` 类型的 `enum` 常量，指示 IdentityStore 应被用于哪些目的：\n    *   `VALIDATE`，表示它处理\
  \ `validate()`\n    *   `PROVIDE_GROUPS`，表示它处理 `getCallerGroups()`\n    *   同时包含\
  \ `VALIDATE` 和 `PROVIDE_GROUPS`，表示它处理这两个方法\n\n*IdentityStore* 的验证类型决定了三件事：\n\n*\
  \   仅身份验证 – 它返回的任何组数据都必须被忽略。\n*   仅提供组 – 不用于身份验证，而是用于获取由不同 `IdentityStore` 验证身份的调用者的组数据。\n\
  *   同时进行身份验证和返回任何组数据。\n\n###### 如何验证用户凭证\n\n正如我们之前所学，我们可以使用 `HttpAuthenticationMechanism`（或其他调用者）来验证用户身份。但是，前者不应直接与\
  \ `IdentityStore` 交互，而应调用 `IdentityStoreHandler` 来验证凭证。然后 `IdentityStoreHandler`\
  \ 再调用 `IdentityStore`。\n\n那么 `IdentityStoreHandler` 接口是做什么的呢？它定义了一种调用 `IdentityStore`\
  \ 来验证用户凭证的机制，并被认为是验证用户身份的一种更安全的方式。\n\n容器提供了一个默认的 `IdentityStoreHandler` 实现，但你可以编写自己的自定义实现。\n\
  \n身份存储区通常与数据源（如关系数据库、LDAP 目录、文件系统或其他类似资源）存在一一对应的关系。因此，`IdentityStore` 的实现会使用特定于数据源的\
  \ API（如 JDBC、文件 IO、Hibernate/JPA、NoSQL 或任何其他数据访问机制）来发现授权数据（角色、权限等）。\n\n\n\n### OAuth\n\
  \nOAuth 是一种授权协议，用于将权限委托给应用程序，使其能够代表已授予权限的用户执行操作，而无需透露用户名或密码等登录凭证。\n\n该协议由 Twitter、Magnolia\
  \ 和 Google 共同开发，并于 2010 年 4 月作为 IETF 标准（RFC 5849）注册。\n\nOAuth 2.0 版本使用起来更简单，但常因实现方式和变体过多而受到批评。OAuth\
  \ 2 于 2012 年 10 月再次由 IETF 标准化为 RFC 6749 和 6750。它不向后兼容 OAuth 1.0a。\n\n一些著名的采用者包括\
  \ Facebook、Amazon、Google、Salesforce.com 和 Microsoft。所有相关的社交媒体 API 都基于 OAuth 1.0a\
  \ 或 2.0。\n\n图 4-3 展示了 OAuth 流程中的参与者，该流程通常也被称为“OAuth 舞蹈”。\n\n![](img/600273_1_En_4_Fig3_HTML.jpg)\n\
  \n示意图描绘了 OAuth 流程中的参与者。分别是资源所有者、客户端和服务器。\n\n图 4-3\n\nOAuth 参与方\n\n*   资源所有者\n\n\
  *   客户端\n\n*   服务器\n\n要使用 OAuth，必须在目标服务上创建一个应用程序，以便为消费者或资源所有者提供一个入口点，从而允许授权服务器在资源所有者（或最终用户）批准的情况下，向第三方客户端颁发访问令牌。然后，客户端使用该访问令牌访问资源服务器上托管的受保护资源。\n\
  \nOAuth“舞蹈”包含三个主要步骤：\n\n*   创建 `–` 在 OAuth 社交媒体服务中创建一个应用程序。\n\n*   初始化 `–` 授权阶段，也称为\
  \ OAuth 舞蹈。舞蹈结束时，我们获得一个访问令牌（由公钥和密钥部分组成），用于下一步。\n\n*   签名 `–` 每个请求都使用访问令牌和标识已获授权\
  \ OAuth 应用程序的令牌进行签名。\n\n图 4-4 详细展示了 OAuth 1.0a 的步骤和认证流程。\n\n![](img/600273_1_En_4_Fig4_HTML.jpg)\n\
  \n示意图描绘了 OAuth 1.0 A 的步骤和认证流程。社交媒体服务与消费服务服务器之间的通信包含七个步骤。1，客户端向消费服务请求资源。2，消费服务向媒体等请求请求令牌。\n\
  \n图 4-4\n\nOAuth 1.0a “舞蹈”\n\n图 4-5 展示了 OAuth 2 的相同流程。可以看到通信已被简化，并且所有交换现在都必须经过 SSL\
  \ 加密。在 OAuth 1.0a 中，这是可选的，因此大多数实现案例都省略了它，这比 OAuth 2 带来了更大的拦截或篡改风险。\n\n![](img/600273_1_En_4_Fig5_HTML.jpg)\n\
  \n示意图描绘了 OAuth 2 的步骤和认证流程。社交媒体服务与消费服务服务器之间的通信包含五个步骤。1，请求资源。2，重定向 URL。3，社交媒体返回访问令牌。4，消费服务请求访问令牌。\n\
  \n图 4-5\n\nOAuth 2 “舞蹈”\n\n尽管 OAuth 是迄今为止社交媒体和 API 最流行的访问控制方式，但它并非真正的身份认证，而是“伪身份认证”，即应用程序专门请求一个有限访问权限的\
  \ OAuth 令牌（“代客钥匙”），而不是实际的凭证（如“护照”）；见图 4-6 和 4-7。\n\n![](img/600273_1_En_4_Fig7_HTML.jpg)\n\
  \nOpen ID 认证的示例通信。通信发生在两位使用公证人 Google 的女性之间。\n\n图 4-7\n\nOpenID 认证\n\n![](img/600273_1_En_4_Fig6_HTML.jpg)\n\
  \n使用 OAuth 进行伪身份认证的示例通信。此处应用程序请求一个有限访问权限的 OAuth 令牌，而非实际凭证。通信发生在两位使用公寓控制器 Twitter\
  \ 的女性之间。\n\n图 4-6\n\n使用 OAuth 的伪身份认证\n\n### OpenID\n\n最初的 OpenID 协议由 Brad Fitzpatrick\
  \ 于 2005 年在 Six Apart 公司创建，当时他已将自己的社交网络 LiveJournal 卖给了这家博客软件公司。公司名称并非像看起来那样指代“六度分隔理论”[6]，而是指其联合创始人夫妇之间六天的年龄差。\n\
  \n该协议的代号是 Yadis（“Yet another distributed identity system”的缩写），但后来在 David Lehn 的建议下正式命名为\
  \ OpenID。Lehn 也曾考虑过一个类似的单点登录项目，但因时间不足，将域名“openid.net”[29] 捐赠给了 Six Apart。\n\n图 4-8\
  \ 展示了 OpenID 流程及其参与者：\n\n![](img/600273_1_En_4_Fig8_HTML.jpg)\n\nOpen ID 的示意流程图。它包括用户与依赖方之间的四个过程。1，输入\
  \ Open ID。2，重定向到 IDP。3，认证同意共享个人资料。4，重定向到 RP。\n\n图 4-8\n\nOpenID 流程\n\n*   浏览器\n\n\
  *   用户\n\n*   依赖方\n\n*   身份提供者\n\n尽管 OpenID 并未被 IETF 等组织标准化，但许多大型互联网、社交媒体和电信公司都采用了它，例如\
  \ AOL、Blogger、Flickr、法国电信、Google、Hyves、LiveJournal、Microsoft、Mixi、Myspace、Novell、Orange、Sears、Sun、意大利电信、Telefonica\
  \ O2、环球音乐集团、Verisign、WordPress 和 Yahoo!。\n\n随着时间的推移，SourceForge、PayPal 和 Facebook\
  \ 等其他公司也加入了 OpenID 基金会的支持者行列。然而，在过去的两三年里，OpenID 的支持者数量持续下降。Facebook 退出了 OpenID，SourceForge\
  \ 也停止提供 OpenID 登录（至少在 Dice.com 从 Geeknet 接管之后），2013 年 9 月，社交登录 SaaS 提供商 Janrain\
  \ 宣布其服务 MyOpenID.com 将于 2014 年 2 月 1 日关闭。\n\n那么这是否意味着 OpenID 已经消亡？其原始形式基本如此，但至少\
  \ Google 仍对其寄予厚望。一个奇怪的巧合是，OpenID 的初始创建者 Brad Fitzpatrick 现在在 Google 工作，这可能是当大多数其他前支持者放弃\
  \ OpenID 时，该公司仍对其保持忠诚的主要原因。然而，Google 的新方案 OpenID Connect 与旧版 OpenID 的共同点并不多。它在原本成功的\
  \ OAuth 2、JSON 和 RESTful Web 服务组合之上，增加了改进的身份认证和身份管理功能。\n\n#### OpenID Connect\n\n\
  OpenID Connect 由 OpenID 基金会于 2014 年 2 月底发布。当时，除了 Google，Microsoft、Salesforce.com\
  \ 和德国电信也采用了它。在 2014 年巴塞罗那世界移动通信大会上，GSMA 宣布了移动版本“Mobile Connect”的计划，这足以表明它将会持续一段时间。\n\
  \nOpenID Connect 是可扩展的，支持可选功能，例如加密身份数据、发现 OpenID 提供者以及会话管理。\n\n### JWT\n\nJSON Web\
  \ Token (JWT) 是根据 RFC 7519 制定的开放标准，用于通过 JSON 字符串在不同应用程序或服务之间安全地传输信息。\n\nJWT 紧凑、可读性强，并使用身份提供者\
  \ (IdP) 的私钥或公钥对进行数字签名。因此，其他相关方可以验证令牌的完整性和真实性。\n\nJWT 的主要目的不是隐藏数据，而是确保其真实性。JWT 主要用于签名和编码，而非加密数据，尽管令牌也可以基于另一套标准（包括\
  \ JSON Web Signature (JWS) 和 JSON Web Encryption (JWE)）进行加密。\n\nJWT 是一种基于令牌的无状态身份认证机制。由于它基于客户端无状态会话，服务器不需要像数据库这样的持久化机制来保存会话信息。JSON\
  \ Web Tokens 遵循一个定义明确且广为人知的标准，该标准正成为保护服务的最常见令牌格式。\n\n\n\n#### 使用场景\n\nJSON Web Token\
  \ 的两个主要使用场景如下：\n\n*   **授权**\n\n*   **信息交换**\n\n**授权**可能是 JWT 最常见的用例。一旦用户登录系统，后续的每个请求都会包含该\
  \ JWT，从而允许用户访问该令牌所授权的页面、服务和资源。**单点登录**是当今广泛使用 JWT 的一项功能，尤其是在公共 API 中，因为它开销小且易于跨不同域使用。\n\
  \n**信息交换**：JSON Web Token 是在各方之间安全传输信息的好方法。由于 JWT 可以被签名（例如，使用公钥/私钥对），您可以确信发送者身份属实。此外，由于签名是使用标头和载荷计算得出的，您还可以验证内容是否被篡改。\n\
  \n#### 为什么需要 JWT？\n\nHTTP 协议是无状态的；因此，像 `GET /order/42` 这样的新请求无法了解之前具有相同 ID 的 `PUT\
  \ /order` 请求的任何信息，用户必须为每个新请求重新进行身份验证。\n\n![](img/600273_1_En_4_Fig9_HTML.jpg)\n\n\
  一组两个重复认证的示例。1，Put order 功能，包含用户名、密码和 ID。通信从客户端开始，验证用户名和密码，身份提供者，如果通过则转到服务器，并返回 201\
  \ Created。2，此处使用了 Get order 功能。\n\n图 4-9\n\n每个新的 HTTP API 请求都重复进行身份验证\n\n这通常通过使用**服务器端会话\
  \ (SSS)** 来处理。首先，检查登录凭据（如用户名和密码），如果正确，服务器将创建一个会话 ID，存储它，并将其返回给客户端。在基于 Servlet 的\
  \ Jakarta EE 应用程序中，发送给客户端的这个 cookie 通常被称为 `JSESSIONID`。\n\n![](img/600273_1_En_4_Fig10_HTML.jpg)\n\
  \n一组三个示例，描述了身份验证次数的减少。Post authenticate 包含用户名和密码。通信从客户端开始，验证用户名和密码，身份提供者，服务器，J session\
  \ ID 等于 A B C，最后是客户端。\n\n图 4-10\n\n使用 SSS，减少针对身份提供者的身份验证次数\n\n这种方法可以解决一个问题，但可能会产生其他问题，例如可扩展性问题。虽然服务器端会话可能适用于大多数网站甚至一些电子商务商店，但在\
  \ API 驱动的时代，某些端点可能面临大量请求，迫使提供者进行扩展。有两种扩展方式：\n\n*   **垂直扩展**\n\n*   **水平扩展**\n\n\
  垂直扩展意味着向服务器添加更多资源，如内存、存储或 CPU 核心。这可能非常昂贵，并且也会达到某些限制，例如每台服务器的 CPU 数量、内存插槽或磁盘存储。\n\
  \n水平扩展通过在**负载均衡器**后面添加更多服务器来扩展您的基础设施，这通常比不断升级每台服务器更高效且更具成本效益。虽然水平扩展通常更高效，但即使只有一个位置和负载均衡器，它也会导致进一步的问题和复杂性。\n\
  \n想象一下负载均衡器后面有一台服务器，客户端使用像 **\"**`abc`**\"** 这样的 `JSESSIONID` 执行请求；该会话 ID 可以在服务器的内存中找到。\n\
  \n![](img/600273_1_En_4_Fig11_HTML.jpg)\n\n客户端和服务器之间的一个示例通信。从客户端开始，然后是 get order\
  \ 42 J session equals A B C，在内存中检查 J session ID，服务器 1.1，负载均衡器，并将 ID 为 42 的订单返回给客户端。\n\
  \n图 4-11\n\n负载均衡器后面的单台服务器\n\n如果基础设施需要扩展，并且在负载均衡器后面添加了一台新服务器，这台新服务器将处理客户端使用 `\"abc\"\
  ` 发出的下一个请求，它将无法识别该 `JSESSIONID`。\n\n![](img/600273_1_En_4_Fig12_HTML.jpg)\n\n服务器和客户端之间的一个示例通信。从客户端开始，然后是\
  \ get order J session equals A B C，服务器 1.1，检查内存未识别，服务器 2.2，负载均衡器，并向客户端返回未认证错误。\n\
  \n图 4-12\n\nLB 后面的新服务器，用户未被识别\n\n身份验证失败，因为新服务器的内存中还没有 **\"**`abc`**\"** 会话。主要有三种解决此问题的变通方法。\n\
  \n在服务器之间同步会话，这可能很棘手且容易出错，尤其是在全球分布式架构中。\n\n使用外部数据库或会话缓存机制。这可能有所帮助，但会为基础架构增加更多组件，尤其是在分布式环境中，此缓存或数据库将需要自己的复制。\n\
  \n或者接受 HTTP 的无状态特性，并尝试找到一种适用于它的解决方案。\n\n这就是 JSON Web Token 发挥作用的地方，因为每个令牌都是紧凑且自包含的，它包含了允许或拒绝\
  \ API 请求所需的所有信息，而无需首先执行任何复制或昂贵的查找。\n\n#### 它是如何工作的？\n\n基于令牌的身份验证机制允许系统根据安全令牌对身份进行认证、授权和验证。通常，涉及以下实体：\n\
  \n*   **颁发者** – 负责在成功断言身份（认证）后颁发安全令牌。颁发者通常与身份提供者相关。\n\n*   **客户端** – 由为其颁发令牌的应用程序表示。客户端通常与服务提供者相关。客户端也可以充当主体和目标服务之间的中介（委托）。\n\
  \n*   **主体** – 令牌中信息所指的实体。\n\n*   **资源服务器** – 由将消费令牌以检查其是否授予对受保护资源的访问权限的应用程序表示。\n\
  \n无论令牌格式或应用的协议如何，从服务的角度来看，基于令牌的身份验证包括以下步骤：\n\n1.  从请求中提取安全令牌。\n\n    对于 RESTful\
  \ 服务，通常通过从 Authorization 标头获取令牌来实现。\n\n2.  对令牌执行验证检查。\n\n    此步骤通常取决于令牌格式和所使用的安全协议。目标是确保令牌有效并且可以被应用程序消费。它可能涉及签名、加密和过期检查。\n\
  \n3.  内省令牌并提取关于主体的信息。\n\n    此步骤通常取决于令牌格式和所使用的安全协议。目标是从令牌中获取关于主体的所有必要信息。\n\n4. \
  \ 为主体创建安全上下文。\n\n基于从令牌中提取的信息，应用程序为主体创建一个安全上下文，以便在服务受保护资源时在必要时使用该信息。\n\n#### JWT\
  \ 结构\n\n一个 JSON Web Token 包含三个部分：\n\n*   **标头**\n\n*   **载荷**\n\n*   **签名**\n\n\
  每个部分由“**.**”字符分隔。\n\n因此，每个 JWT 看起来像\n\n```\nHeader.Payload.Signature\n```\n\n\n\n\
  ##### 标头\n\n![](img/600273_1_En_4_Fig13_HTML.jpg)\n\nJWT 的结构。它由两部分组成：标头和解码器。标头包含令牌类型和生成签名的算法。解码部分包含标头、载荷和签名的脚本。\n\
  \n图 4-13\n\nJWT 结构\n\n标头描述了 JSON Web 令牌本身。它包含令牌类型和用于生成签名的算法的信息。算法参数 **\"alg\"**\
  \ 必须存在于每个 JWT 标头中。最常见的算法是使用 SHA-256 哈希的 HMAC（“HS256”）或使用相同哈希的 RSA（“RS256”），以及最近出现的使用\
  \ SHA-256 的 ECDSA P-256（“ES256”）。允许的值由 JSON Web 加密（JWE）标准 RFC 7516 指定。\n\n在我们的示例中，标头包含算法和类型参数：\n\
  \n```\n{\n\"typ\" : \"JWT\",\n\"alg\" : \"RS256\"\n}\n```\n\n类型参数 **\"typ\"** 用于声明令牌的\
  \ IANA 媒体类型（RFC 6838）。它是可选的，但设置时，其值应始终为“JWT”，代表媒体类型 `\"application/jwt\"`。\n\n另一个参数\
  \ **\"cty\"**（内容类型）用于声明受保护内容（载荷）的媒体类型。它是可选的，并且仅在载荷包含另一个 JSON Web 令牌时才需要，在这种情况下其值应为“JWT”；否则，可以忽略或省略此参数。\n\
  \n参数 **\"enc\"**（加密算法）是为与 JWE 一起使用而定义的。仅当声明或嵌套的 JWT 令牌需要加密时才需要它。它标识用于加密声明或嵌套 JWT\
  \ 令牌的加密算法。\n\n例如，使用 256 位密钥的伽罗瓦/计数器模式（GCM）算法中的 AES 将被指定为“A256GCM”。\n\n还有其他几个预定义的标头参数，例如：\n\
  \n*   crit（关键）\n*   jku（JWK 集 URL）\n*   jwk（JSON Web 密钥）\n*   kid（密钥 ID）\n*   x5u（X.509\
  \ URL）\n*   x5t（X.509 证书 SHA-1 指纹）\n*   x5t#S256（X.509 证书 SHA-256 指纹）\n\n##### 载荷\n\
  \n载荷或主体是 JWT 的核心部分，包含安全声明，例如用户身份和授予的权限。JWT 将其称为声明。\n\nJWT 声明名称有三种类型：\n\n1.  注册声明\n\
  2.  公共声明\n3.  私有声明\n\n注册声明是预定义的声明。公共声明可以是任何用户定义的信息，而私有声明是 JWT 的生产者和消费者同意在特定应用程序中使用的声明。\n\
  \n为了验证 JWT，我们也应该检查一些注册声明。一些重要的注册声明在表 4-1 中定义。\n\n表 4-1\n\n注册的 JWT 声明\n\n| 声明名称 |\
  \ 描述 | 参考 |\n| --- | --- | --- |\n| iss | 令牌颁发者 | RFC 7519，第 4.1.1 节 |\n| sub |\
  \ 作为 JWT 主体的主体 | RFC 7519，第 4.1.2 节 |\n| aud | JWT 的接收者 | RFC 7519，第 4.1.3 节 |\n\
  | exp | 在此时间或之后，JWT 不得被接受处理的过期时间 | RFC 7519，第 4.1.4 节 |\n| nbf | 在此时间之前，JWT 不得被接受处理\
  \ | RFC 7519，第 4.1.5 节 |\n| iat | 颁发者生成 JWT 的时间 | RFC 7519，第 4.1.6 节 |\n| jti |\
  \ JWT 的唯一标识符 | RFC 7519，第 4.1.7 节 |\n\n##### “iss”（颁发者）声明\n\n“iss”（颁发者）声明标识了颁发 JWT\
  \ 的主体。此声明的处理通常特定于应用程序。“iss”值是一个区分大小写的字符串，包含一个 URI 值。此声明的使用是可选的。我们应该验证颁发者是一个有效的 URL，或者\
  \ JWT 是由预期的颁发者发送的。\n\n##### “sub”（主题）声明\n\n“sub”（主题）声明标识了作为令牌主体的主体。JWT 中的声明是关于该主体的陈述。“sub”值是一个区分大小写的字符串，包含一个\
  \ URI 值。此声明的使用是可选的。\n\n##### “aud”（受众）声明\n\n“aud”（受众）声明标识了令牌的接收者。每个打算处理 JWT 的主体必须使用受众声明中的一个值来标识自己。如果处理声明的主体在存在“aud”声明时未使用其中的值标识自己，则必须拒绝该\
  \ JWT。通常，“aud”值是一个区分大小写的字符串数组，每个字符串包含一个 URI 值。此声明的使用是可选的。\n\n##### “exp”（过期时间）声明\n\
  \n“exp”（过期时间）声明标识了在此时间或之后令牌将不被接受处理的过期时间。处理“exp”声明要求当前日期/时间必须早于“exp”声明中列出的过期日期/时间。其值必须是一个数字时间戳。此声明的使用是可选的。\n\
  \n##### “nbf”（不早于）声明\n\n“nbf”（不早于）声明标识了在此时间之前 JWT 不得被接受处理的时间。处理“nbf”声明要求当前日期/时间必须等于或晚于“nbf”声明中列出的不早于日期/时间。其值必须是一个包含数字日期值的数字。此声明是可选的。\n\
  \n##### “iat”（签发时间）声明\n\n“iat”（签发时间）声明标识了令牌被签发的时间。此声明可用于确定 JWT 的时效。其值必须是一个包含数字日期值的数字。此声明是可选的。\n\
  \n##### “jti”（JWT ID）声明\n\n“jti”（JWT ID）声明为 JWT 提供了一个区分大小写的唯一标识符。标识符值的分配方式必须确保同一值被意外分配给不同数据对象的概率可以忽略不计；如果应用程序使用多个颁发者，则还必须防止不同颁发者产生的值之间发生冲突。“jti”声明可用于防止\
  \ JWT 被重用。此声明的使用是可选的。\n\n##### 签名\n\nJSON Web 令牌的第三部分是签名。它是验证 JWT、确保其未被修改或篡改并且可以信任的最重要部分。签名是使用载荷和密钥生成的；因此，拥有此密钥的任何人都可以生成具有有效签名的新令牌。\n\
  \n用于生成签名的最常用的加密算法如下：\n\n*   HS256，是 HMAC-SHA256 的缩写\n*   RS256，是 RSA-SHA256 的缩写\n\
  *   ES256，是 ECDSA P-256 SHA-256 的缩写\n\n**HS256** 是一种对称密钥加密，涉及在双方之间共享一个密钥。此密钥用于加密数据，在接收方，使用相同的密钥解密数据。HS256\
  \ 签名是使用一个密钥生成的，该密钥在接收端（资源服务器）进行验证。在接收方，必须使用载荷和密钥再次生成签名，并与传入 JWT 的签名部分进行比较。由于只有认证服务器和资源服务器拥有该密钥，因此无法篡改\
  \ JWT，我们可以确保其有效性。\n\n\n\n#### MicroProfile JWT\n\n许多标准令人沮丧的一点是，有些标准试图面面俱到，提供海量的选择。JWT\
  \ 就是如此，它允许多种类型的数字签名和大量可能的声明。虽然可能性是无限的，但如此多的选项也意味着互操作性问题的可能性是无限的。\n\nMicroProfile\
  \ JWT 的一个关键目标是，仅采用这些选项中足够的部分，以便能够以一种特别有利于微服务的方式实现跨企业的基本互操作性。\n\nMicroProfile JWT\
  \ 规范的重点是定义可用于可互操作的身份验证和授权的 JWT 所需格式。MP JWT 还将 JWT 声明映射到各种 Jakarta EE 容器 API，并通过\
  \ getter 方法提供这组声明。\n\n该规范、API 和 TCK 的源代码可从 Eclipse [microprofile-jwt-auth](https://github.com/eclipse/microprofile-jwt-auth)\
  \ GitHub 仓库获取。\n\nMP JWT 作为令牌格式的用途取决于身份提供者和服务提供者之间的协议。这意味着身份提供者（负责颁发令牌）应能够使用 MP\
  \ JWT 格式颁发可互操作的令牌，以便服务提供者能够理解，从而验证令牌并收集关于主题的信息。在这方面，MicroProfile JWT 的要求如下：\n\n\
  1.  可用作身份验证令牌\n2.  可用作授权令牌，其中包含通过 `groups` 声明间接授予的 Jakarta EE 应用程序级角色\n3.  能够支持\
  \ IANA JWT 规范中描述的其他标准声明以及非标准声明\n\n为了满足这些要求，MP JWT 引入了两个新的声明：\n\n*   “upn” – 一个人类可读的声明，用于在访问令牌的\
  \ MicroProfile 服务中唯一标识令牌的主题或用户主体。\n*   “groups” – 令牌主体的组成员身份，这些成员身份将映射到 MicroProfile\
  \ 服务容器中的 Java EE 风格应用程序级角色。\n\n该规范（截至 2.1 版本）基于以下 Jakarta EE API 依赖项：\n\n*   Jakarta\
  \ RESTful Web Services 3.0\n*   Jakarta JSON Processing 2.0\n*   Jakarta JSON Binding\
  \ 2.0\n*   CDI 3.0\n*   Jakarta Annotations 2.0\n\nMicroProfile JWT 规范专注于微服务验证 JWT\
  \ 的能力，并未定义以下内容：\n\n*   JWT 创建 – 令牌通常由企业中的专用服务（如 API 网关或身份提供者）创建。\n*   RSA 公钥分发 –\
  \ 分发网关或身份提供者的公钥不在 MP JWT 的范围内。与 TLS/SSL 证书类似，它们可能不会频繁更改，手动分发或安装它们（例如，在 docker 镜像中）是一种常见做法。\n\
  *   自动 JWT 传播 – 使用 MP JWT 的微服务有一种有保证的标准方式来在传入调用中获取 JWT。但是，传播必须由微服务本身在应用程序代码中完成，方法是将\
  \ JWT 放置在传出 HTTP 调用的 Authorization 头中。\n\nMicroProfile JWT 的一个关键目标是，每个微服务都可以验证和传播令牌。出于\
  \ HS256 问题中讨论的原因，MicroProfile JWT 仅选择基于 RSA 的数字签名。\n\n创建 JWT 的授权服务器的 RSA 公钥可以在任何实际\
  \ HTTP 请求之前预先安装到所有微服务上。当调用到达微服务时，它将使用此 RSA 公钥来验证 JWT 并确定调用者的身份是否有效。如果微服务发出任何 HTTP\
  \ 调用，它应该在这些调用中传递 JWT，将调用者的身份传播给其他微服务。\n\n根据 JWT 标准的规定，**\"alg\"** 头参数必须存在。如果声明或嵌套的\
  \ JWT 令牌被加密，**\"enc\"** 也是一个强制性的头参数。\n\n建议使用头参数 **\"typ\"** 和 **\"kid\"**。\n\n虽然\
  \ JWT 规范几乎将所有注册声明都声明为可选的，但 MicroProfile JWT 要求存在以下声明：\n\n*   iss\n*   iat\n*   exp\n\
  \nMP JWT 建议使用这些 JWT 声明：\n\n*   sub\n*   jti\n*   aud\n\n除了表 4-1 中列出的注册 JWT 声明之外，MicroProfile\
  \ JWT 还定义了自己的公共声明（表 4-2）。\n\n表 4-2\n\nMP JWT 公共声明\n\n| **声明名称** | **描述** | **参考**\
  \ |   |\n| --- | --- | --- | --- |\n| upn | 在 `java.security.Principal` 接口中提供用户主体名称。此声明是必需的\
  \ | MP-JWT 2.1 规范 |   |\n| groups | 提供已分配给 MP-JWT 主体的组名列表。这通常需要在应用程序容器级别映射到应用程序部署角色，但除了任何其他映射之外，还需要在组名和应用程序角色名之间进行一对一映射。此声明是可选的\
  \ | MP-JWT 2.1 规范 |   |\n\n如果端点需要授权，建议 JWT 令牌包含一个 **\"groups\"** 声明，但如果令牌是由 OpenID\
  \ Connect 和其他当前不支持 MP JWT 的提供者颁发的，MP JWT 实现可以从其他声明映射组。\n\n如果无法直接从给定令牌的 **\"groups\"\
  ** 声明或通过自定义映射器从其他声明中提取组信息，那么如果端点仅需要身份验证，则可以接受此令牌。\n\n**\"exp\"**、**\"iat\"** 和其他与日期相关的声明使用的数字日期值是一个\
  \ JSON 数值，表示从 `1970-01-01T00:00:00Z UTC` 到指定 UTC 日期/时间的**秒数**，忽略闰秒。\n\nMicroProfile\
  \ JWT 实现可以强制要求 JWT 令牌包含所有推荐的头部和声明。推荐的头部和声明在未来的 MP JWT 规范版本中可能会成为必需的。\n\n一个 JSON\
  \ 格式的最小 MP JWT 示例如下：\n\n```\n{\n\"typ\": \"JWT\",\n\"alg\": \"RS256\",\n\"kid\"\
  : \"abc-1234567890\"\n}\n{\n\"iss\": \"https://server.example.com\",\n\"jti\": \"\
  a-123\",\n\"exp\": 1311281970,\n\"iat\": 1311280970,\n\"sub\": \"24400320\",\n\"\
  upn\": \"jdoe@server.example.com\",\n\"groups\": [\"red-group\", \"green-group\"\
  , \"admin-group\"],\n}\n```\n\nMicroProfile JWT 规范定义了一个 **JsonWebToken** `java.security.Principal`\
  \ 接口扩展，该扩展通过 get 方法提供这组必需的声明。\n\n## 总结\n\n在标准化了社交媒体交互和 API 之后，本章向我们展示了社交网络的安全方面以及旨在实现安全性的标准。在下一章中，我们将探讨使用或实现其中一些标准的安全框架。\n\
  \n"
- "# 5. 安全框架\n\n前一章讨论了社交网络的安全方面以及与安全相关的标准。在本章中，我们将介绍诸如 Soteria、Keycloak、Spring Security、Micronaut\
  \ Security、Apache Shiro 或 Scribe 等安全框架，它们支持授权、身份验证或两者兼有。\n\n## Soteria\n\nEclipse\
  \ Soteria 是 Jakarta Security 的兼容实现。\n\n“Soteria”一词源自希腊语，意为“救援”、“福祉”或“救赎”。\n\n###\
  \ 历史\n\n“Soteria”这个术语是在 Werner Keil 对 EG 成员进行的一项调查中选出的，当时 Soteria 是 JSR 375 的参考实现，最初作为\
  \ Java EE Security 启动。\n\n特别是在欧洲，它也被用于医疗保健领域，通常与心理问题的诊所相关，但这纯属巧合。在 Eclipse 基金会过渡到\
  \ Jakarta EE 之后，法律团队检查了该术语可能存在的所有商标，并未发现任何问题，而其他项目，特别是“Ozark”（MVC 兼容实现），不得不更名为“Krazo”。\n\
  \n\n\n### 认证机制\n\n认证机制实现的基础是 `HttpAuthenticationMechanism`，它使相应的机制可作为 CDI Bean 使用。已实现的方法\
  \ `validateRequest()` 返回一个包含该认证状态的 `AuthenticationStatus` 对象。该规范提供了用于基本认证和基于表单认证的现成机制。\n\
  \nJakarta Servlet 规范定义了一种声明性机制，用于配置应用程序以提供 **BASIC**、**DIGEST**、**FORM** 或 **CERT**\
  \ 认证，认证由容器根据应用程序的配置自动执行。其中，FORM 认证可以包含自定义表单页面。\n\n此外，Jakarta EE *容器必须*支持通过配置提供的以下\
  \ `HttpAuthenticationMechanism` 类型的内置 Bean：\n\n*   **BASIC** `–` 使用 RFC 2617 中描述的标准基本认证方案。除非使用\
  \ SSL，否则不会对凭据进行加密。除非与 SSL 一起使用，否则此类型并非安全方法。此 Bean 通过 `@BasicAuthenticationMechanismDefinition`\
  \ 注解激活和配置。\n\n*   **FORM** `–` 应用程序提供自己的自定义登录页面和错误页面。通信协议为 HTTP，可选 SSL。除非使用 SSL，否则不会对用户凭据进行加密。此\
  \ Bean 通过 `@FormAuthenticationMechanismDefinition` 注解激活和配置。\n\n*   **自定义 FORM**\
  \ – 是 FORM 的一种变体，区别在于，认证对话的继续并非像 Servlet 规范所述那样通过回发到 `j_security_check` 进行，而是通过使用应用程序收集的凭据调用\
  \ `SecurityContext.authenticate()` 进行。此 Bean 通过 `@CustomFormAuthenticationMechanismDefinition`\
  \ 注解激活和配置。\n\n*   **OpenID Connect** – 根据 OpenID Connect 规范 [29] 定义的授权码流程和刷新令牌进行认证。此\
  \ Bean 通过 `@OpenIdAuthenticationMechanismDefinition` 注解激活和配置。\n\nJakarta Security\
  \ 提供了*必须*与 Servlet 规范匹配的 Basic 和 Form 版本，但 GlassFish 在 web.xml 中定义时不会在 Web 应用程序中使用它们，仅当通过注解定义时才会使用。\n\
  \n以下是 Soteria 中 `BasicAuthenticationMechanism` 的示例：\n\n```\npackage org.glassfish.soteria.mechanisms;\n\
  import static java.lang.String.format;\nimport static jakarta.security.enterprise.identitystore.CredentialValidationResult.Status.VALID;\n\
  import static jakarta.xml.bind.DatatypeConverter.parseBase64Binary;\nimport static\
  \ org.glassfish.soteria.Utils.isEmpty;\nimport jakarta.security.enterprise.AuthenticationException;\n\
  import jakarta.security.enterprise.AuthenticationStatus;\nimport jakarta.security.enterprise.authentication.mechanism.http.BasicAuthenticationMechanismDefinition;\n\
  import jakarta.security.enterprise.authentication.mechanism.http.HttpAuthenticationMechanism;\n\
  import jakarta.security.enterprise.authentication.mechanism.http.HttpMessageContext;\n\
  import jakarta.security.enterprise.credential.Password;\nimport jakarta.security.enterprise.credential.UsernamePasswordCredential;\n\
  import jakarta.security.enterprise.identitystore.CredentialValidationResult;\nimport\
  \ jakarta.security.enterprise.identitystore.IdentityStoreHandler;\nimport jakarta.servlet.http.HttpServletRequest;\n\
  import jakarta.servlet.http.HttpServletResponse;\nimport org.glassfish.soteria.cdi.CdiUtils;\n\
  /**\n* 使用基本认证进行认证的认证机制\n*\n* @author Arjan Tijms\n*\n*/\npublic class BasicAuthenticationMechanism\
  \ implements HttpAuthenticationMechanism {\nprivate final BasicAuthenticationMechanismDefinition\
  \ basicAuthenticationMechanismDefinition;\n// CDI 要求无参构造函数以实现可移植性\n// 仅用于创建代理\n\
  protected BasicAuthenticationMechanism() {\nbasicAuthenticationMechanismDefinition\
  \ = null;\n}\npublic BasicAuthenticationMechanism(BasicAuthenticationMechanismDefinition\
  \ basicAuthenticationMechanismDefinition) {\nthis.basicAuthenticationMechanismDefinition\
  \ = basicAuthenticationMechanismDefinition;\n}\n@Override\npublic AuthenticationStatus\
  \ validateRequest(HttpServletRequest request, HttpServletResponse response, HttpMessageContext\
  \ httpMsgContext) throws AuthenticationException {\nString[] credentials = getCredentials(request);\n\
  if (!isEmpty(credentials)) {\nIdentityStoreHandler identityStoreHandler = CdiUtils.getBeanReference(IdentityStoreHandler.class);\n\
  CredentialValidationResult result = identityStoreHandler.validate(\nnew UsernamePasswordCredential(credentials[0],\
  \ new Password(credentials[1])));\nif (result.getStatus() == VALID) {\nreturn httpMsgContext.notifyContainerAboutLogin(\n\
  result.getCallerPrincipal(), result.getCallerGroups());\n}\n}\nif (httpMsgContext.isProtected())\
  \ {\nresponse.setHeader(\"WWW-Authenticate\", format(\"Basic realm=\\\"%s\\\"\"\
  , basicAuthenticationMechanismDefinition.realmName()));\nreturn httpMsgContext.responseUnauthorized();\n\
  }\nreturn httpMsgContext.doNothing();\n}\nprivate String[] getCredentials(HttpServletRequest\
  \ request) {\nString authorizationHeader = request.getHeader(\"Authorization\");\n\
  if (!isEmpty(authorizationHeader) && authorizationHeader.startsWith(\"Basic \")\
  \ ) {\nreturn new String(parseBase64Binary(authorizationHeader.substring(6))).split(\"\
  :\");\n}\nreturn null;\n}\n}\n```\n\n### 支持的运行时\n\nSoteria 可在以下 Jakarta EE CI 运行时上运行：\n\
  \n*   GlassFish\n\n*   Payara\n\n*   WildFly\n\n*   Open Liberty\n\n此外，所有在“实现组件”下使用\
  \ Soteria 的实现都运行或包含它。\n\n经过一些调整，它也可以在 TomEE 上运行，但由于 TomEE 9+ 和 Open Liberty 带有自己的\
  \ Jakarta Security 实现（不基于 Soteria），因此这些情况可能会稍微复杂一些。\n\n\n\n### OpenID Connect 示例\n\
  \n让我们看看如何在 Jakarta EE Web 应用中配置 OpenID Connect 认证，使用本地 Keycloak 实例或 Google 等社交网络作为\
  \ OpenID Connect 认证提供者。\n\n首先，我们创建一个简单的 Web 项目，例如使用 Maven Webapp 原型：\n\n```\nmvn\
