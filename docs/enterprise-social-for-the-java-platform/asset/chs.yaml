  \nunpack\nprocess-classes\n\nunpack\n\norg.wildfly                             \
  \       ${wildfly.artifactId}                                    ${wildfly.version}\n\
  zip\nfalse\n${project.build.directory}\n\norg.wildfly.plugins\nwildfly-maven-plugin\
  \                ${wildfly-maven-plugin.version}\n\n/subsystem=undertow/application-security-domain=other:write-attribute(name=integrated-jaspi,\
  \ value=false)\nreload\n\n```\n\n该示例配置为 WildFly 27 或更高版本，但同样适用于任何支持的运行时环境。\n\n接下来，我们为\
  \ OIDC 认证创建一个 CDI Bean：\n\n```\n@OpenIdAuthenticationMechanismDefinition(\nclientId\
  \ = \"${oidcConfig.clientId}\",\nclientSecret = \"${oidcConfig.clientSecret}\",\n\
  redirectURI = \"${baseURL}/callback\",\nproviderURI = \"${oidcConfig.issuerUri}\"\
  ,\njwksConnectTimeout = 5000,\njwksReadTimeout = 5000\n)\n@ApplicationScoped\n@Named(\"\
  oidcConfig\")\npublic class OidcConfig {\nprivate static final Logger LOGGER = Logger.getLogger(OidcConfig.class.getName());\n\
  private String domain;\nprivate String clientId;\nprivate String clientSecret;\n\
  private String issuerUri;\n@PostConstruct\nvoid init() {\nLOGGER.config(\"OidcConfig.init()\"\
  );\ntry {\nvar properties = new Properties();\nproperties.load(getClass().getResourceAsStream(\"\
  /oidc.properties\"));\ndomain = properties.getProperty(\"domain\");\nclientId =\
  \ properties.getProperty(\"clientId\");\nclientSecret = properties.getProperty(\"\
  clientSecret\");\nissuerUri = properties.getProperty(\"issuerUri\");\nif (issuerUri\
  \ == null && domain != null) {\nissuerUri = (\"localhost\".equals(this.domain) ?\
  \ \"http://\" : \"https://\") + this.domain + \"/\";\n}\nLOGGER.log(\nLevel.INFO,\n\
  \"domain: {0}, clientId: {1}, clientSecret:{2}, issuerUri: {3}\",\nnew Object[]\
  \ {\ndomain,\nclientId,\nclientSecret,\nissuerUri\n});\n} catch (IOException e)\
  \ {\nLOGGER.log(Level.SEVERE, \"加载 oidc.properties 失败\", e);\n}\n}\npublic String\
  \ getDomain() {\nreturn domain;\n}\npublic String getClientId() {\nreturn clientId;\n\
  }\npublic String getClientSecret() {\nreturn clientSecret;\n}\npublic String getIssuerUri()\
  \ {\nreturn issuerUri;\n}\n}\n```\n\n`PublicServlet` 是一个简单的、未受保护的 Servlet：\n\n```\n\
  @WebServlet(\"/public\")\npublic class PublicServlet extends HttpServlet {\n@Override\n\
  protected void doGet(HttpServletRequest request, HttpServletResponse response) throws\
  \ IOException, IOException {\nresponse.setContentType(\"text/html\");\nresponse.getWriter().println(\"\
  公共未受保护的 Servlet\");\n}\n}\n```\n\n`ProtectedServlet` 是受保护的，我们还为此应用声明了角色。`foo` 角色被允许访问此\
  \ Servlet：\n\n```\n@WebServlet(\"/protected\")\n@DeclareRoles({\"foo\", \"bar\"\
  , \"kaz\"})\n@ServletSecurity(\n@HttpConstraint(rolesAllowed = \"foo\")\n)\npublic\
  \ class ProtectedServlet extends HttpServlet {\n@Inject\nprivate OpenIdContext context;\n\
  @Override\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
  \ response) throws IOException {\nresponse.setContentType(\"text/html\");\nresponse.getWriter().println(\"\
  受保护的 Servlet\");\nresponse.getWriter().println(\"访问令牌:\" + context.getAccessToken()\
  \ + \"\");\nresponse.getWriter().println(\"令牌类型:\" + context.getTokenType() + \"\
  \");\nresponse.getWriter().println(\"主体:\" + context.getSubject() + \"\");\nresponse.getWriter().println(\"\
  过期时间:\" + context.getExpiresIn() + \"\");\nresponse.getWriter().println(\"刷新令牌:\"\
  \ + context.getRefreshToken() + \"\");\nresponse.getWriter().println(\"声明 JSON:\"\
  \ + context.getClaimsJson() + \"\");\n}\n}\n```\n\n`CallbackServlet` 用于登录成功后重定向。它会重定向到\
  \ `/protected` Servlet：\n\n```\n@WebServlet(\"/callback\")\npublic class CallbackServlet\
  \ extends HttpServlet {\nprivate static final Logger LOGGER = Logger.getLogger(CallbackServlet.class.getName())\n\
  @Override\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
  \ response)\nthrows ServletException, IOException {\nLOGGER.log(Level.FINEST, \"\
  进入回调 Servlet\");\nString referrer = (String) request.getSession().getAttribute(\"\
  Referrer\");\nString redirectTo = referrer != null ? referrer : request.getContextPath()\
  \ + \"/protected\";\nLOGGER.log(Level.FINEST, \"在 /callback 中，重定向到: {0}\", redirectTo);\n\
  response.sendRedirect(redirectTo);\n}\n}\n```\n\n`UserNameServlet` 显示来自 `SecurityContext`\
  \ 的当前用户信息：\n\n```\n@WebServlet(\"/username\")\n@ServletSecurity(@HttpConstraint(rolesAllowed\
  \ = {\"foo\", \"bar\"}))\npublic class UserNameServlet extends HttpServlet {\nprivate\
  \ static final Logger LOGGER = Logger.getLogger(UserNameServlet.class.getName());\n\
  @Inject\nSecurityContext securityContext;\n@Override\nprotected void doGet(HttpServletRequest\
  \ request, HttpServletResponse response) throws ServletException, IOException {\n\
  String nameInRequest = request.getUserPrincipal() != null ? request.getUserPrincipal().getName()\
  \ : \"\";\nvar principal = securityContext.getCallerPrincipal();\nLOGGER.log(Level.INFO,\
  \ \"主体: {0}\", principal);\nvar name = principal.getName();\nresponse.setContentType(\"\
  text/html\");\nresponse.getWriter().println(\"用户名 Servlet\");\nresponse.getWriter().println(\"\
  请求 userPrincipal 中的主体名称:\" + nameInRequest + \"\");\nresponse.getWriter().println(\"\
  主体名称:\" + name + \"\");\nresponse.getWriter().println(\"isCallerInRole('foo'):\"\
  \ + securityContext.isCallerInRole(\"foo\") + \"\");\nresponse.getWriter().println(\"\
  isCallerInRole('bar'):\" + securityContext.isCallerInRole(\"bar\") + \"\");\n}\n\
  }\n```\n\n为了将认证用户映射到有效的组，我们创建一个简单的 `IdentityStore` 实现：\n\n\n\n```\n@ApplicationScoped\n\
  public class AuthorizationIdentityStore implements IdentityStore {\nprivate static\
  \ final Logger LOGGER = Logger.getLogger(AuthorizationIdentityStore.class.getName());\n\
  private String email;\nprivate Map> authorization;\n@PostConstruct\nvoid init()\
  \ {\nLOGGER.config(\"IdentityStore.init()\");\ntry {\nvar properties = new Properties();\n\
  properties.load(getClass().getResourceAsStream(\"/oidc.properties\"));\nemail =\
  \ properties.getProperty(\"email\", \"\");\nLOGGER.log(\nLevel.INFO,\n\"email: {0}\"\
  ,\nnew Object[] { email });\n} catch (IOException e) {\nLOGGER.log(Level.SEVERE,\
  \ \"Failed to load oidc.properties\", e);\nemail = \"\";\n}\nauthorization = Map.of(\n\
  \"user\", Set.of(\"foo\", \"bar\"),\nemail,  Set.of(\"foo\", \"bar\")); // user\
  \ in Google.\n}\n@Inject\nprivate OpenIdContext context;\n@Override\npublic Set\
  \ validationTypes() {\nreturn EnumSet.of(PROVIDE_GROUPS);\n}\n@Override\npublic\
  \ Set getCallerGroups(CredentialValidationResult validationResult) {\nvar principal\
  \ = validationResult.getCallerPrincipal().getName();\nLOGGER.log(Level.INFO, \"\
  Get principal name in validation result: {0}\", principal);\nLOGGER.log(Level.INFO,\
  \ \"claims json:\" + context.getClaimsJson());\nLOGGER.log(Level.INFO, \"provider\
  \ json:\" + context.getProviderMetadata());\nvar issuer = context.getProviderMetadata().getString(\"\
  issuer\");\nif (issuer.endsWith(\"google.com\")) { // As Google returns a long numeric\
  \ user id, we try to use the email address instead\nvar email = context.getClaimsJson().getString(\"\
  email\");\nreturn authorization.get(email) == null ? Collections.emptySet() : authorization.get(email);\n\
  } else {\nreturn authorization.get(principal) == null ? Collections.emptySet() :\
  \ authorization.get(principal);\n}\n}\n}\n```\n\n由于 Google 会返回一个相当长的数字型 Google ID，我们通过\
  \ Jakarta JSON Processing 提供的 claims JSON 中检索 `\"email\"` 声明，并比较 Gmail 地址，而不是使用一长串晦涩的代理键。对于所有其他提供商（例如\
  \ Keycloak），我们将使用 `CallerPrincipal` 的名称。\n\n要获取 Google 客户端 ID 和客户端密钥凭据，您需要使用 Google\
  \ 创建一个新应用：\n\n1.  访问 [`https://console.developers.google.com`](https://console.developers.google.com)。\n\
  \n2.  创建一个新项目，例如 “ApressBookDemoApp”。\n\n3.  为该项目创建 OAuth 2.0 凭据，因为 Google 不会自动执行此操作。从侧边栏中，单击\
  \ **凭据** 选项卡，然后单击 **创建凭据**，并从下拉菜单中选择 **OAuth 客户端 ID**。\n\n4.  Google 会提示您输入有关应用程序的一些信息，例如产品名称、主页和徽标。其中大部分是可选的。在下一页上，选择\
  \ **Web 应用程序** 类型，并输入重定向 URL，我们接下来将构建的 Jakarta EE 应用程序将在该 URL 处等待回调。输入 `http://localhost:8080/callback`\
  \ 作为重定向 URL。\n\n5.  然后您会在屏幕上看到客户端 ID 和客户端密钥。将它们下载为 JSON 并存储在安全位置。\n\n在您的 Jakarta\
  \ EE 应用程序中编辑/创建 `src/main/resources/oidc.properties`：\n\n```\nissuerUri=https://accounts.google.com\n\
  email=\nclientId=\nclientSecret=\n```\n\n将 `clientId` 和 `clientSecret` 的值替换为 Google\
  \ JSON 文件中的值，并将 `email` 替换为有效测试用户的电子邮件地址，例如您自己的 Gmail 地址。\n\n使用 `mvn wildfly:run`\
  \ 构建/运行应用程序。现在您已准备好进行测试。\n\n在浏览器中访问 `http://localhost:8080/public`。\n\n您将看到页面：\n\
  \n```\nPublic Unsecured Servlet\n```\n\n接下来浏览到 `http://localhost:8080/protected`。\n\
  \n首次访问会将您转发到 Google ID 登录页面。成功确认您的 Google ID 后，它将重定向回受保护的页面并显示类似以下内容：\n\n```\nProtected\
  \ Servlet\naccess token:ya29.a0AfB_…\ntoken type:Bearer\nsubject:1234567890987654321\n\
  expires in:Optional[1234]\nrefresh token:Optional.empty\nclaims json:{\"sub\":\"\
  1234567890987654321\",\"name\":\"John Doel\",\"given_name\":\"John\",\"family_name\"\
  :\"Doe\",\"picture\":\"https://lh3.googleusercontent.com/a/ABcdefghijklmnopqrstuvwxY-z\"\
  ,\"email\":\"john.doel@gmail.com\",\"email_verified\":true,\"locale\":\"xy\"}\n\
  ```\n\n您还可以访问 `http://localhost:8080/username`。\n\n它将显示类似以下内容：\n\n```\nUserName\
  \ Servlet\nprincipal name in request userPrincipal:1234567890987654321\nprincipal\
  \ name:1234567890987654321\nisCallerInRole('foo'):true\nisCallerInRole('bar'):true\n\
  ```\n\n`Principal` 的名称在 Google 中相当晦涩；它本质上是一个代表您 Google ID 的长数字。\n\n## Open Liberty\n\
  \nOpen Liberty 是 IBM 对 Eclipse MicroProfile 和 Jakarta EE 的开源实现。它是 WebSphere Liberty\
  \ 应用服务器的基础。\n\nOpen Liberty 22 及更高版本实现了 Jakarta EE 10 安全规范。\n\n### 社交媒体登录\n\nOpen\
  \ Liberty 社交媒体登录功能提供了一种单点登录（SSO）形式，使用户能够通过其现有的社交媒体帐户登录到受保护的网站。\n\n例如，您可以配置社交登录功能，以便用户可以使用其\
  \ Facebook 或 Twitter 帐户登录您的网站，而无需仅为您的网站创建帐户。您可以为任何使用 OAuth 2.0 或 OpenID Connect\
  \ 1.0 标准进行授权的社交媒体平台启用社交登录功能。\n\n要启用其社交媒体 1.0 功能，请将以下元素添加到您的 `server.xml` 文件中，位于\
  \ `featureManager` 元素内：\n\n```\nsocialLogin-1.0\n```\n\n社交媒体登录功能为流行的社交媒体提供商提供了一组内置配置元素，以及通用配置元素。以下示例展示了如何在\
  \ `server.xml` 文件中配置不同场景。\n\n#### 使用社交媒体 ID 登录\n\n如果配置了多个社交媒体提供商，则会显示一个可定制的选择表单。然后用户可以选择他们喜欢的社交媒体提供商进行登录。以下示例展示了如何配置您的应用程序以要求用户使用其\
  \ Google ID 登录。您可以在 [`https://console.developers.google.com`](https://console.developers.google.com)\
  \ 上生成您的 Google 凭据。\n\n在此示例中，`your_app_id` 和 `your_app_secret` 是 `formlogin` 应用程序的\
  \ Google `客户端 ID` 和 `客户端密钥` 凭据。\n\n#### 多个社交媒体提供商\n\n您可以配置多个社交媒体提供商供用户选择。在身份验证之前，用户会收到一个可定制的选择表单，其中包含可用的提供商。以下示例包括\
  \ Google、GitHub、Facebook、LinkedIn 和 Twitter 的选择：\n\n#### 要求用户属于企业注册表\n\n您可以将社交媒体提供商的展示限制为仅限同时存在于另一个已配置注册表中的用户。例如，使用\
  \ `mapToUserRegistry` 属性来配置您的应用程序。用户必须通过 Google 进行身份验证，并且还要验证为公司 LDAP 注册表中的现有用户：\n\
  \n```\n... \n```\n\n#### 在社交媒体 ID 和企业注册表之间选择\n\n您可以允许用户选择使用社交媒体提供商或使用其在已配置注册表中的帐户进行登录。例如，使用\
  \ `enableLocalAuthentication` 属性来配置您的应用程序，以便用户可以使用 Google ID 或其在公司 LDAP 注册表中的帐户进行登录：\n\
  \n```\n\n... \n```\n\n#### 仅为路径或浏览器的子集登录\n\n要仅保护应用程序、URL 或 IP 地址的子集，请使用身份验证过滤器。仅当满足过滤器中的条件时，安全配置才会生效。例如，您可能希望一个\
  \ Web 应用程序使用社交媒体登录功能进行保护，而一个微服务应用程序使用 MicroProfile JWT 功能进行保护（请记住上一章的内容）。\n\n在以下示例中，仅包含\
  \ `/mywebapp` URL 模式的请求使用 Google 凭据进行保护：\n\n\n\n#### 其他社交媒体登录\n\n若要使用未在 Open Liberty\
