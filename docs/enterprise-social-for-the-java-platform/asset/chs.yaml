  游戏 ID: \" + game.getId() + \" 是 \" + game.getName());\n});\n```\n\n垂直框架\n垂直社交框架允许与特定领域的社交网络集成。\n\
  \nGitHub\n\n虽然 GitHub/Microsoft 本身没有官方的 GitHub Java API，但有两个积极维护的 API 提供了领域模型，此外还有其他几个在\
  \ REST/OpenID Connect 级别支持它的 API：\n\n*   GitHub API for Java\n\n*   GitHub Java\
  \ Client\n\n两者都提供多种认证方法，包括个人访问令牌。\n\n令牌生成\n\n要为 GitHub REST API 生成新令牌：\n\n1.  登录\
  \ GitHub 账户\n\n2.  转到 设置 ➤ 开发者设置 ➤ 个人访问令牌\n\n3.  点击生成新令牌\n\n4.  确认用户密码以继续\n\n5.\
  \  为令牌添加描述\n\n6.  在选择作用域选项下，勾选所有框\n\n7.  点击生成新令牌\n\nGitHub API for Java\nGitHub\
  \ API for Java 围绕 GitHub REST API 提供了一个对象模型。其创建由 Jenkins CI 的“父亲”Kohsuke Kawaguchi\
  \ 领导。\n\n认证\n\nGitHub Java 库提供了多种认证方法：\n\n*   用户名和密码（不推荐，除非用于开发目的）\n\n*   个人访问令牌\n\
  \n*   JWT 令牌\n\n*   GitHub 应用安装令牌\n\n    *   用户\n\n    *   组织\n\n使用示例\n我们使用个人访问令牌，遵循\
  \ 令牌生成 的步骤。\n\n仓库\n\n以下是一个使用 GitHub API for Java 连接到 GitHub 并创建一个新仓库，然后再次清理它的示例：\n\
  \n```\nGitHub github = new GitHubBuilder().withOAuthToken(\"my_personal_token\"\
  ).build();\nGHRepository repo = github.createRepository(\n\"new-repository\",\"\
  这是我的新仓库\",\n\"https://www.kohsuke.org/\",true/*公开*/);\nrepo.addCollaborators(github.getUser(\"\
  abcde\"),github.getUser(\"jdoe\"));\nrepo.delete();\n```\n\n组织\n\n要为组织在 GitHub 中创建资源，您必须创建一个\
  \ `GHOrganization` 类型的对象：\n\n```\nGHOrganization organizationClient(GitHub gitHub,\
  \ String organizationName) throws IOException {\nreturn gitHub.getOrganization(organizationName);\n\
  }\n```\n\n现在我们可以使用 `GHOrganization` 了。创建仓库或任何其他创建资源的方法都将在该组织下进行：\n\n```\nvoid createRepository(GHOrganization\
  \ organization) {\norganization.createRepository(\"repository-name\")\n.private_(true)\n\
  .wiki(false)\n.projects(false)\n.description(\"描述\")\n.allowMergeCommit(true)\n\
  .allowSquashMerge(false)\n.allowRebaseMerge(false)\n.create()\n}\n```\n\nGitHub\
  \ Java Client\nGitHub Java Client 是一个小型 Java 库，用于与 GitHub/GitHub Enterprise 通信并与项目交互。它由瑞典社交音乐流媒体门户\
  \ Spotify 维护。它支持通过访问令牌、JWT 端点和 GitHub Apps（通过私钥）进行认证。\n\n安装\n\n将最新版本的 github-client\
  \ 包含到您的项目 POM 中：\n\n```\ncom.spotify\ngithub-client\nversion\n\n```\n\n使用示例\n\n\
  我们使用个人访问令牌，遵循 令牌生成 的步骤：\n\n```\nfinal GitHubClient githubClient = GitHubClient.create(URI.create(\"\
  https://api.github.com/\"), \"my-access-token\");\n```\n\n此客户端尝试镜像 GitHub API 端点。例如，要获取提交的详细信息，请使用\
  \ repos API 下的 `GET /repos/:owner/:repo/commits` API 调用。因此，`getCommit` 位于 `RepositoryClient`\
  \ 下：\n\n```\nfinal RepositoryClient repositoryClient = githubClient.createRepositoryClient(\"\
  my-org\", \"my-repo\");\nlog.info(repositoryClient.getCommit(\"sha\").get().htmlUrl());\n\
  ```\n\n仓库\n\n与检查运行或问题相关的方法也位于 `RepositoryClient` 下：\n\n```\nfinal ChecksClient checksClient\
  \ = repositoryClient.createChecksApiClient();\nchecksClient.createCheckRun(CHECK_RUN_REQUEST);\n\
  final IssueClient issueClient = repositoryClient.createIssueClient();\nissueClient.createComment(ISSUE_ID,\
  \ \"评论内容\")\n.thenAccept(comment -> log.info(\"已创建评论 \" + comment.htmlUrl()));\n\
  ```\n\n组织\n\n与团队和成员资格相关的方法位于 `OrganisationClient` 下：\n\n```\nfinal TeamClient teamClient\
  \ = organisationClient.createTeamClient();\nfinal Membership membership =  teamClient.getMembership(\"\
  teamname\");\n```\n\nUber\n与 Meta 类似，Uber 维护着自己的多种流行语言 SDK，包括 Java。\n\nJava SDK\n\
  以下示例展示了如何使用 Java Rides SDK。\n首先，您需要在 Uber 开发者仪表板上注册您的应用：[`https://developer.uber.com/dashboard/`](https://developer.uber.com/dashboard/)。\n\
  \n安装\n\n将以下依赖项添加到您的项目（Gradle，因为它同时支持 Java 和 Kotlin/Android）：\n\n```\ndependencies\
  \ {\ncompile 'com.uber.sdk:rides:0.5.2'\n}\n```\n\n使用可用的最新版本。\n\n示例\n**使用服务器令牌获取\
  \ Uber 会话**\n\n当您注册应用时，会获得一个服务器令牌、客户端 ID 和客户端密钥。使用它们来认证您的应用程序：\n\n```\nSessionConfiguration\
  \ config = new SessionConfiguration.Builder()\n.setClientId(\"\")\n.setServerToken(\"\
  \")\n.build();\nServerTokenSession session = new ServerTokenSession(config);\n```\n\
  \n**获取可用产品列表**\n\n```\nResponse> response = service.getProducts(37.79f, -122.39f).execute();\n\
  List products = response.body();\nString productId = products.get(0).getProductId();\n\
  ```\n\n**获取时间和价格估算**\n\n```\nResponse response = service.getPickupTimeEstimate(37.79f,\
  \ -122.39f, productId).execute()\n```\n\n**请求乘车**\n\n```\n\n```\n\n\n# 获取位置的产品\n\
  Response> response = service.getProducts(37.79f, -122.39f).execute();\nList products\
  \ = response.body();\nString productId = products.get(0).getProductId();\n\n# 获取含起止位置产品的预付费用\n\
  RideRequestParameters rideRequestParameters = new RideRequestParameters.Builder().setPickupCoordinates(37.77f,\
  \ -122.41f)\n.setProductId(productId)\n.setDropoffCoordinates(37.49f, -122.41f)\n\
  .build();\nRideEstimate rideEstimate = service.estimateRide(rideRequestParameters).execute().body();\n\
  String fareId = rideEstimate.getFareId();\n\n# 使用起止位置和预付费用请求乘车\nRideRequestParameters\
  \ rideRequestParameters = new RideRequestParameters.Builder().setPickupCoordinates(37.77f,\
  \ -122.41f)\n.setProductId(productId)\n.setFareId(fareId)\n.setDropoffCoordinates(37.49f,\
  \ -122.41f)\n.build();\nRide ride = service.requestRide(rideRequestParameters).execute().body();\n\
  String rideId = ride.getRideId();\n\n# 根据请求 ID 获取乘车详情\nRide ride = service.getRideDetails(rideId).execute().body();\n\
  \n# 取消乘车\nResponse response = service.cancelRide(rideId).execute();\n\n遗留框架\n尽管许多框架仍在使用中，但以下社交框架已不再由贡献者积极维护或支持。\n\
  \nAgorava\n***Agorava***\n[33] 是一个社交框架，提供 CDI 模块、上下文和扩展，用于与主流社交网络或类似服务（暴露 API）进行交互。它为\
  \ Java 和 Java 企业应用程序提供这些服务，并便于以混搭（mashup）的精神混合使用它们。[12]\n\n历史\n您还记得 Agorava 的起源和前身，我们在第\
  \ 3 章中讨论了标准化工作以及被大多数 JCP EC 成员否决的 JSR 357，这导致 Agorava 作为 Seam Social 的继承者被创建。联合创始人\
  \ Antoine Sabot-Durand 为 JBoss 项目（如 CDI）做出了贡献，他于 2013 年加入 JBoss 后成为该项目的规范负责人。Agorava\
  \ 也曾一度被收录在 JBoss 技术栈中 [56]，尽管它并非 WildFly 等项目的官方组成部分。Agorava 在用于社交应用的 JBoss 开发者框架（JDF）中被提及，但当\
  \ JDF 更名为“Quickstarts”后，这些教程大多被废弃或归档。\n因此，类似于 Spring Social 主要被 Spring Security\
  \ 取代，Agorava 也遭遇了同样的情况，被 Jakarta Security（尤其是从 Jakarta EE 10 开始）取代，或者像 Keycloak\
  \ 在 JBoss/Red Hat 技术栈中取代 PicketLink 一样。\n\n概述\n\n![](img/600273_1_En_6_Fig1_HTML.jpg)\n\
  \nAgorava 核心的概览。它包括四个模块：Twitter、LinkedIn、Facebook 和社交媒体，其次是 Agorava 核心、CDI 实现、Guice\
  \ 实现、Spring 实现、@Inject 实现、Java SE 实现和 API。\n\n图 6-1\nAgorava 宏观架构\n\n以下是 Agorava\
  \ 的主要特性：\n\n*   机密性\n\n*   通用的可移植 REST 客户端 API\n\n*   用于处理 OAuth 1.0a 和 2.0 服务的通用\
  \ API\n\n*   用于处理 JSON 序列化和反序列化的通用 API\n\n*   用于从社交服务（作为身份提供者）检索基本用户信息的通用身份识别 API\n\
  \n*   允许多服务管理器 API 在同一应用程序中处理多个 OAuth 应用程序和会话\n\n*   开箱即用，Agorava 可连接到\n\n*   Facebook\n\
  \n*   LinkedIn\n\n*   GitHub\n\n*   Twitter\n\n*   XING\n\n*   并提供了一种简单的方法，通过创建新的连接器来扩展到任何其他服务或\
  \ API\n\nAgorava 独立于 CDI 实现，并且在 Java EE 6（最低版本）和由 CDI 增强的 Servlet 环境之间完全可移植。它也可以在桌面或\
  \ SE 嵌入式/移动应用程序中与 CDI 一起用于 Java SE。它已使用 CDI 参考实现（JBoss Weld）进行了全面测试。自 0.5 版本起，也支持\
  \ OpenWebBeans 和 Caucho Resin。\nAgorava 常被解释为一种“面向社交的 Java 连接器架构”。事实上，Agorava 背后的理念与\
  \ Jakarta 连接器（原 JCA）在 Jakarta EE 框架下所做的工作之间存在惊人的相似之处。\nJakarta 连接器定义了一种标准架构，用于将\
  \ Jakarta EE 平台连接到异构企业信息系统（EIS），包括事务处理系统（如 CICS 事务服务器）和企业资源规划（ERP）系统（如 SAP），特别是所谓的通用客户端接口（CCI），它定义了一个标准的客户端\
  \ API，允许应用程序访问多个资源适配器。\n\n![](img/600273_1_En_6_Fig2_HTML.jpg)\n\nJCA 通用客户端接口应用程序的示意图。它从一个\
  \ Java 应用程序开始，接着是三个资源适配器，以及各自对应的企业信息系统。\n\n图 6-2\nJCA 通用客户端接口\n\n\n\n必须指出，JCA 是\
  \ Jakarta EE 平台中相当古老的一部分，\n在 JCA 成为 Jakarta Connectors 时只经历了少量细微变更，\n但除此之外，它仍然非常陈旧，类似于\
  \ Jakarta Enterprise Beans\n(EJB)。因此，\n与一些新兴的、通常基于云原生和 API 的 ERP\n解决方案（如 Salesforce.com）相比，它显得有些过时，\n\
  并且也是 Jakarta EE 中知名度较低、使用较少的组件之一。\n尽管 JSR 357 提案并未明确表述为“JCA\n方式”，但有可能一些支持者和 JCA\
  \ 专家\n（除了 Oracle 之外，主要是 IBM 或 SAP，而如今在云领域占据主导地位的大多数其他公司在 JCA 最初设计时甚至还不存在）感觉到他们培育的这只小“恐龙”可能会受到像\
  \ Java Social Connector API 这样的新标准的威胁。\n\n核心\n\nAgorava Core\n包含通用的、独立于特定服务提供商的社交网络服务，提供以下功能：\n\
  \n*   OAuth 连接器，用于向 OAuth 提供商进行身份验证\n\n*   支持通用身份验证和用户配置文件管理\n\n*   一个支持以下功能的社交多账户服务：\n\
  \n*   多个社交网络连接\n\n*   同一社交网络提供商的多个会话，例如，同时连接到多个用户账户或查询\n\nAgorava Core 也提供了这些服务的实现。目前，主要实现基于\
  \ CDI 和 DeltaSpike，但大多数服务已使用 JSR 330（现为 Jakarta Dependency Injection）进行了通用化，这允许使用更轻量级的\
  \ Java SE 替代方案，例如 Google Guice、Dagger 或 CDI 实现 Weld 的 SE 版本。\n\n![](img/600273_1_En_6_Fig3_HTML.jpg)\n\
  \n一个框图描绘了 Agorava PicketLink 应用程序。它包括 OAuth 提供商、请求、服务、REST 服务、应用设置、REST 请求、用户配置文件、令牌、会话、社交媒体\
  \ API 中心以及抽象社交媒体 API。它们之间的连接由虚线表示。\n\n图 6-3\nAgorava Core API 架构\n\nAgorava PicketLink\n\
  与 OAuth 功能和用户配置文件管理协同工作，Agorava Core 还包含一个基于 PicketLink 的安全子系统。\n\n正如 2.3.2 节所承诺的，这里是\
  \ PicketLink BaseAuthenticator 的专用 Agorava 版本：\n\n```\n@Generic\npublic class AgoravaAuthenticator\
  \ extends BaseAuthenticator {\n@InjectWithQualifier\nOAuthAppSettings settings;\n\
  @Inject\nDefaultLoginCredentials credentials;\n@Inject\n@DeltaSpike\nInstance response;\n\
  @Inject\nOAuthLifeCycleService lifeCycleService;\n@Override\npublic void authenticate()\
  \ {\nif (lifeCycleService.getCurrentSession().isConnected()) {\nOAuthSession session\
  \ = lifeCycleService.getCurrentSession();\nUserProfile userProfile = session.getUserProfile();\n\
  credentials.setCredential(session.getAccessToken());\nsetStatus(AuthenticationStatus.SUCCESS);\n\
  User user = new User(userProfile.getId());\nuser.setFirstName(userProfile.getFullName());\n\
  setAccount(user);\n} else {\nString authorizationUrl = lifeCycleService.startDanceFor(settings.getQualifier());\n\
  try {\nresponse.get().sendRedirect(authorizationUrl);\n} catch (IOException e) {\n\
  e.printStackTrace();\n}\ncredentials.setStatus(Status.IN_PROGRESS);\nsetStatus(AuthenticationStatus.DEFERRED);\n\
  }\n}\n}\n```\n\n连接器\n\nAgorava 目前附带以下默认连接器：\n\n*   Facebook\n\n*   LinkedIn\n\n\
  *   GitHub\n\n*   Twitter\n\n*   XING\n\n除此之外，还为以下服务创建了第三方 Agorava 连接器：\n\n*   Empire\
  \ Avenue\n\n*   Google+\n\n*   Instagram\n\n*   Meetup\n\n*   Stack Overflow\n\n\
  *   TripIt\n\n*   WordPress\n\n*   Yammer\n\nSocializer\nSocializer 是一个\n用于 Agorava\
  \ 的真实演示 Web 应用程序；可以将其视为它的“Pet Clinic”。\n它允许你连接到各种社交网络并查看你的时间线或发布更新。Agorava Socializer\
  \ 也已从 JavaServer Faces 移植到 Apache Wicket Web 框架或 AngularJS。\n这两个移植版本仍处于实验阶段，因此从未成为\
  \ Agorava 生态系统的官方组成部分。\n\n\n\n集成连接器\n向 Socializer 添加新连接器相当简单。我们将以 **XING** 连接器为例进行说明。\n\
  \n克隆 [`https://github.com/agorava/agorava-socializer`](https://github.com/agorava/agorava-socializer)\
  \ 后，在 Socializer 的 **pom.xml** 中添加以下行：\n\n```\n\norg.agorava                   \
  \     agorava-xing-api\n0.3.0-SNAPSHOT\ncompile\n\norg.agorava\nagorava-xing-cdi\n\
  0.3.0-SNAPSHOT\nruntime\n\n```\n\n定义了 XING API 和 CDI 实现的依赖关系。\n\n接下来，我们将 XING 的应用设置添加到\
  \ CDI 生产者类 `org.agorava.socializer.SettingsProducer.java` **：**\n\n```\n@ApplicationScoped\n\
  @Produces\n@Xing\n@OAuthApplication(params = {@Param(name = OAuthAppSettingsBuilder.PREFIX,\
  \ value = \"xing\")})\npublic OAuthAppSettings xingSettings;\n```\n\n由属性文件支持\n\n\
  ```\nsrc/main/resources/local/agorava.properties\nxing.apiKey=\nxing.apiSecret=\n\
  ```\n\n**API 密钥**和**API 密钥**都必须在您选择的社交媒体账户中为本地 Socializer 应用程序定义；有关 XING，请参阅 [`https://dev.xing.com/applications/dashboard`](https://dev.xing.com/applications/dashboard)。\n\
  \n**xing.xhtml**\n\n```\n\n你在想什么？\n\n```\n\n大多数合适的服务都提供“测试密钥”或开发密钥，就像 XING 一样。\n\
