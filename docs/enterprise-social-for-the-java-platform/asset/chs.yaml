  \ Javacord\n\n认证\n\n首先，您需要从 Discord 应用程序仪表板创建一个应用程序：[`https://discord.com/developers/applications`](https://discord.com/developers/applications)。\n\
  \n1.  如果尚未登录，请登录。\n\n2.  点击 **新应用程序**。\n\n3.  选择一个名称，例如，“ApressBookDemoApp”，接受开发者条款，然后点击\
  \ **创建**。\n\n4.  在 **常规信息** 下，您可以为以下参数输入值：\n\n    *   名称 – 这是您之前输入的应用程序名称。\n\n \
  \   *   应用图标 – 当用户授权您的应用时，会向他们显示该徽标。\n\n    *   描述 – 输入应用程序的简短描述。\n\n    *   标签\
  \ – 最多五个标签，用于描述您应用程序的内容和功能。\n\n    *   应用程序 ID – 要复制到您的应用程序中的应用程序 ID。\n\n    * \
  \  公钥 – 要复制到您的应用程序中的公钥。\n\n    *   服务器计数 – 这是您的应用程序所在的服务器数量的近似值。该值为 **只读**。\n\n\
  \    *   交互端点 URL – 您可以选择配置一个交互端点，以通过 HTTP POST 接收交互，而不是通过网关与机器人用户交互。\n\n    * \
  \  关联角色验证 URL – 您可以配置一个验证 URL，以将您的应用程序作为服务器角色链接设置中的一项要求。\n\n    *   服务条款 URL – 链接到您应用程序的服务条款（可选）。\n\
  \n    *   隐私政策 URL – 链接到您的隐私政策（可选）。\n\n5.  在 **OAuth2** 下，您会找到以下参数：\n\n    *   客户端\
  \ ID – 要复制到您的应用程序中的客户端 ID。\n\n    *   客户端密钥 – 要复制到您的应用程序中的客户端密钥。您必须在首次使用时重新生成它，并确保\
  \ **复制它**，因为它不会再次显示给您。\n\n    *   重定向 – 您必须至少指定一个 URI 才能使认证生效。如果您在 OAuth 请求中传递一个\
  \ URI，它必须与您在此处输入的 URI 之一完全匹配。\n\n6.  在 **机器人** 下，您会找到以下参数：\n\n    *   用户名 – 这是您机器人的名称。\n\
  \n    *   图标 – 向您机器人的用户显示的徽标。\n\n    *   令牌 – 要复制到您的应用程序中的令牌。出于安全目的，令牌只能在创建时查看一次。如果您忘记或丢失了令牌的访问权限，请重新生成一个新令牌。\n\
  \nDiscord4J\nDiscord4J 是一个用于官方 Discord API 的响应式 Java 封装，使用响应式原则和 Reactor 框架进行异步和非阻塞\
  \ API 调用。\n\n安装\n\n将以下依赖项添加到您项目的 Maven POM 中：\n\n```\n\ncom.discord4j\ndiscord4j-core\n\
  3.2.6\n\n```\n\n快速示例\n\n在以下示例中，每当用户发送 !ping 消息时，机器人将立即回复 Pong!：\n\n```\npublic class\
  \ ExampleBot {\npublic static void main(String[] args) {\nString token = args[0];\n\
  DiscordClient client = DiscordClient.create(token);\nGatewayDiscordClient gateway\
  \ = client.login().block();\ngateway.on(MessageCreateEvent.class).subscribe(event\
  \ -> {\nMessage message = event.getMessage();\nif (\"!ping\".equals(message.getContent()))\
  \ {\nMessageChannel channel = message.getChannel().block();\nchannel.createMessage(\"\
  Pong!\").block();\n}\n});\ngateway.onDisconnect().block();\n}\n}\n```\n\n响应式示例\n\
  \n此示例展示了相同的机器人，但以响应式方式使用 Project Reactor：\n\n```\npublic class ExampleBot {\npublic\
  \ static void main(String[] args) {\nString token = args[0];\nDiscordClient client\
  \ = DiscordClient.create(token);\nclient.login().flatMapMany(gateway -> gateway.on(MessageCreateEvent.class))\n\
  .map(MessageCreateEvent::getMessage)\n.filter(message -> \"!ping\".equals(message.getContent()))\n\
  .flatMap(Message::getChannel)\n.flatMap(channel -> channel.createMessage(\"Pong!\"\
  ))\n.blockLast();\n}\n}\n```\n\n分片示例\n\n此示例展示了同一 JVM 下的多个分片组：\n\n```\n// 第一个组将获得偶数分片\
  \ ID\nShardingStrategy first = ShardingStrategy.builder()\n.count(10)\n.filter(s\
  \ -> s.getIndex() % 2 == 0)\n.build();\n// 第二个组将获得奇数分片 ID\nShardingStrategy second\
  \ = ShardingStrategy.builder()\n.count(10)\n.filter(s -> s.getIndex() % 2 != 0)\n\
  .build();\nDiscordClient sharedClient = DiscordClient.create(System.getenv(\"token\"\
  ));\nShardCoordinator coordinator = LocalShardCoordinator.create();\nGatewayDiscordClient\
  \ firstGroup = sharedClient.gateway()\n.setSharding (first)\n.setEnabledIntents(...)\n\
  .setShardCoordinator(coordinator)\n.login()\n.block();\nGatewayDiscordClient secondGroup\
  \ = sharedClient.gateway()\n.setSharding(second)\n.setEnabledIntents(...)\n.setShardCoordinator(coordinator)\n\
  .login()\n.block();\n```\n\nJava Discord API\nJava Discord API (JDA，不要与 JTA 或 Jakarta\
  \ Transactions 混淆) 旨在围绕 Discord REST API 和 Websocket 事件提供一个干净的 Java 对象模型。\n\n安装\n\
  \n将以下依赖项添加到您项目的 Maven POM 中：\n\n```\nnet.dv8tion\nJDA\nVERSION\n\n```\n\n配置\n\n\
  `JDABuilder` 和 `DefaultShardManagerBuilder` 都提供了一组配置：\n\n```\npublic static void\
  \ main(String[] args) {\nJDABuilder builder = JDABuilder.createDefault(\"token\"\
  );\n// 禁用部分缓存\nbuilder.disableCache(CacheFlag.MEMBER_OVERRIDES, CacheFlag.VOICE_STATE);\n\
  // 启用批量删除事件\nbuilder.setBulkDeleteSplittingEnabled(false);\n// 设置活动（如“正在玩 Something”）\n\
  builder.setActivity(Activity.watching(\"TV\"));\nJDA jda = builder.build();\n}\n\
  ```\n\nEventListener 示例\n\n以下示例展示了如何使用 JDA 事件系统：\n\n```\npublic class ReadyListener\
  \ implements EventListener\n{\npublic static void main(String[] args)\nthrows InterruptedException\n\
  {\n// 注意：在构建之前注册您的 ReadyListener 很重要\nJDA jda = JDABuilder.createDefault(\"token\"\
  )\n.addEventListeners(new ReadyListener())\n.build();\n// 可选地阻塞直到 JDA 就绪\njda.awaitReady();\n\
  }\n@Override\npublic void onEvent(GenericEvent event)\n{\nif (event instanceof ReadyEvent)\n\
  System.out.println(\"API 已就绪！\");\n}\n}\n```\n\n分片示例\n\nDiscord 允许机器人账户通过限制它们只处理总连接公会/服务器的一部分来跨会话共享负载。这可以使用分片来完成：\n\
  \n```\npublic static void main(String[] args) throws Exception\n{\nJDABuilder shardBuilder\
  \ = JDABuilder.createDefault(\"token\");\n//在此处使用 shardBuilder.addEventListeners(...)\
  \ 注册您的监听器\nshardBuilder.addEventListeners(new MessageListener());\nfor (int i =\
  \ 0; i < 10; i++)\n{\nshardBuilder.useSharding(i, 10)\n.build();\n}\n}\n```\n\n\
  Javacord\nJavacord 是一个用于 Discord 的现代 Java 库，专注于简单性和速度。通过将其自身限制为标准 Java 类和特性，如 `Optional`\
  \ 或 `CompletableFuture`，每个 Java 开发者都易于学习和使用，并且不会引入太多自己的概念或抽象。\n\n安装\n\n将以下依赖项添加到您项目的\
  \ Maven POM 中：\n\n```\norg.javacord\njavacord\n3.8.0\npom\n\n```\n\n基本示例\n\n以下示例登录机器人并回复每条“!ping”消息为“Pong!”。请注意，消息内容是一个特权意图，需要启用：\n\
  \n```\npublic class MyFirstBot {\npublic static void main(String[] args) {\n// 在此处插入您的机器人令牌\n\
  String token = \"your token\";\nDiscordApi api = new DiscordApiBuilder().setToken(token).addIntent(Intent.MESSAGE_CONTENT).login().join();\n\
  // 添加一个监听器，如果有人写“!ping”，则回复“Pong!”\napi.addMessageCreateListener(event -> {\nif\
  \ (event.getMessageContent().equalsIgnoreCase(\"!ping\")) {\nevent.getChannel().sendMessage(\"\
  Pong!\");\n}\n});\n// 打印您机器人的邀请 URL\nSystem.out.println(\"您可以使用以下 URL 邀请机器人: \"\
  \ + api.createBotInvite());\n}\n}\n```\n\n斜杠命令示例\n\n以下示例展示了如何让机器人回复一个简单的斜杠命令：\n\n\
  ```\npublic class MyFirstBot {\npublic static void main(String[] args) {\nString\
  \ token = \"your token\";\nDiscordApi api = new DiscordApiBuilder().setToken(token).login().join();\n\
  api.addSlashCommandCreateListener(event -> {\nSlashCommandInteraction slashCommandInteraction\
  \ = event.getSlashCommandInteraction();\nif (slashCommandInteraction.getCommandName().equals(\"\
  ping\")) {                slashCommandInteraction.createImmediateResponder()\n.setContent(\"\
  Pong!\")\n.setFlags(MessageFlag.EPHEMERAL) // 仅对调用命令的用户可见\n.respond();\n}\n});\n\
  }\n}\n```\n\nMessageBuilder 示例\n\n以下示例使用内置的 `MessageBuilder`。它对于构建包含图像、代码块、嵌入或附件的复杂消息非常有用：\n\
  \n```\npublic class MyListener implements MessageCreateListener {\n@Override\npublic\
  \ void onMessageCreate(MessageCreateEvent event) {\nMessage message = event.getMessage();\n\
  if (message.getContent().equalsIgnoreCase(\"!ping\")) {\nevent.getChannel().sendMessage(\"\
  Pong!\");\n}\n}\n}\n```\n\nEventListener 示例\n\n为了更好的可读性，也可以将监听器放在它们自己的类中：\n\n```\n\
  public class MyListener implements MessageCreateListener {\n@Override\npublic void\
  \ onMessageCreate(MessageCreateEvent event) {\nMessage message = event.getMessage();\n\
  if (message.getContent().equalsIgnoreCase(\"!ping\")) {\nevent.getChannel().sendMessage(\"\
  Pong!\");\n}\n}\n}\n```\n\n调用监听器：\n\n```\napi.addListener(new MyListener());\n```\n\
  \nTwitch4J\nTwitch4J 是一个基于 Java 和 JVM 的 Twitch REST API 接口客户端。它支持 Java、Kotlin 和\
  \ Groovy。\n\n安装\n\n将以下依赖项添加到您的 Maven 项目 POM 中：\n\n```\ncom.github.twitch4j\ntwitch4j\n\
  1.16.0\n\n```\n\n用法和示例\n\n**获取访问令牌**：\n\n1.  使用您的 Twitch 账户登录开发者控制台 [`https://dev.twitch.tv/console`](https://dev.twitch.tv/console)。如果您没有账户，请选择\
  \ **注册** 选项卡创建一个。\n\n    *   当您注册账户时，Twitch 会向您发送一封电子邮件以验证您的账户。在继续之前，请务必打开电子邮件并验证您的账户。\n\
  \n    *   您还必须为您的账户启用双因素认证 (2FA)。要启用 2FA，请导航到“安全和隐私”，并按照“安全”部分下的步骤启用 2FA。\n\n  \
  \  *   您需要刷新控制台才能使这些更改生效。\n\n2.  在开发者控制台上选择 **应用程序** 选项卡，然后点击 **注册您的应用程序**。\n\n\
  3.  将 **名称** 设置为您的应用程序名称。该名称在所有 Twitch 应用程序中必须是唯一的。如果您的应用需要用户同意才能访问或修改用户的资源，则您的应用名称会列在“连接”页面下的\
  \ **其他连接** 下。\n\n4.  将 **OAuth 重定向 URL** 设置为您的应用用于授权的回调 URL。添加重定向 URL 后，点击 **添加**。\n\
  \n5.  选择您的应用所属的 **类别**（应用程序类型）。\n\n6.  点击 **我不是机器人** 复选框。\n\n7.  点击 **创建**。\n\n\
  8.  返回 **应用程序** 选项卡，在 **开发者应用程序** 下找到您的应用，然后点击 **管理**。\n\n9.  记下您的 **客户端 ID**，您将使用它来获取访问令牌并在所有\
  \ API 请求中设置 Client-Id 标头。客户端 ID 被视为公开信息，可以嵌入到网页源代码中。\n\n10.  根据您用于获取令牌的流程，您可能需要客户端密钥。例如，授权码授权流程需要客户端密钥。点击\
  \ **新密钥** 生成一个密钥，您将使用它来获取访问令牌。您必须复制密钥并将其存储在安全的地方。获取新密钥会使之前的密钥失效，这可能会导致您的 API 请求失败，直到您更新应用程序。\n\
