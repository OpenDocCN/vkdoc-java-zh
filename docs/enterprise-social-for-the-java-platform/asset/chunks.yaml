  trans: '

    它至今仍存在，拥有约六百万用户，而鼎盛时期则有数亿用户。


    此外，2003 年，马克·扎克伯格推出了 Facemash，这相当于哈佛大学版的伯克利“Hot or Not”网站，并于 2004 年将其更名为“The Facebook”。同年，其第一百万名用户加入。


    2005 年，该网站去掉了“the”，简化为“Facebook”，此前以 20 万美元购得“Facebook.com”域名。与几起收购案相比，这似乎很划算，其中最引人注目的是
    Facebook 以近十亿美元收购 Instagram，以及其对移动消息服务 WhatsApp 的巨额收购要约。


    大约在同一时期，大量社交网站涌现。像 Flickr 旗下的 Photobucket 等照片分享网站、社交书签网站 del.icio.us、Reddit，以及博客平台
    WordPress，都始于 2003 年至 2005 年间。


    StudiVZ 及其衍生网站如 SchülerVZ 或 MeinVZ，是一个面向学生的社交网络，由两名学生埃赫桑·达里亚尼（后成为 CEO）和丹尼斯·贝曼于
    2005 年 11 月 11 日（恰逢“光棍节”和狂欢节开始）在柏林创立。StudiVZ 的一个主要功能是所谓的“gruscheln”（由德语单词“grüßen”=问候和“kuscheln”=拥抱混合而成）。它类似于
    Facebook 的“戳一下”功能，允许用户发送简短通知，或者 InterNations 曾称之为“twinkle”的功能。


    截至 2010 年，VZ Networks 声称拥有超过 1600 万用户。然而不久之后，许多用户变得不活跃或离开该网络，其用户量相比前几年下降了 70%`–`80%。2017
    年 9 月 7 日，所有者 Poolworks 宣布 StudiVZ 破产。2022 年 3 月，该网络被关闭。


    YouTube 也于 2005 年上线，比竞争对手在线视频网站 Vimeo 晚一年。第一个视频是“Me at the zoo”[40]，在圣地亚哥动物园拍摄，自那以后（截至
    2023 年第一季度）已获得超过 2.6 亿次观看。仅仅一年后的 2006 年，谷歌以 16.5 亿美元收购了 YouTube。


    2006 年也是 Twitter 诞生的年份。与 Facebook 类似，其名称略有变化，但值得注意的是从“Twttr”变成了一个更容易发音的名字。第一条推文由联合创始人杰克·多尔西（@Jack）于
    2006 年 3 月 21 日发布：“just setting up my twttr.”


    一年后，话题标签被发明出来。该符号的灵感来自 IRC 中的频道名称，现在被许多主流社交网络使用。最初，Twitter 的字符限制为 140 个字符，类似于短信。十多年后，这一限制在
    2017 年才翻倍至 280 个字符。


    2007 年，Twitch 上线，当时由耶鲁毕业生贾斯汀·坎和埃米特·希尔以 Justin.tv 的名义推出。到 2013 年，该公司已实现盈利，月活跃用户超过
    4300 万。一年后的 2014 年，在有关 YouTube 收购的猜测之后，亚马逊以 9.7 亿美元收购了 Twitch Interactive。


    ### 当下与此刻


    近年来，社交媒体领域的大多数发展要么是安全漏洞和其他困难，要么是并购，只有少数值得注意的例外。


    2015 年，即时通讯和 VoIP 社交平台 Discord 成立。它很快被电子竞技和局域网锦标赛玩家广泛使用，并受益于与 Twitch 主播的关系，因为这两个平台都面向相似的用户群体，尤其是游戏玩家。


    2016 年，Mastodon 上线，这是一个基于开放标准和协议（通常被称为“联邦宇宙”）创建社交网络服务的免费、去中心化、开源软件。


    2017 年，字节跳动以 10 亿美元收购了 Musical.ly，同时推出了短视频分享服务 TikTok。极右翼微博网站 Gab 也于 2017 年上线，而
    AIM 和 Beme 则被关闭。


    2018 年，雅虎通被关闭，Musical.ly 并入 TikTok。另一个自称“言论自由”的网络 Parler 于同年上线，也主要被右翼人士及其他极端分子或阴谋论者使用，尤其是在
    2020 年新冠疫情开始之后。尽管坎耶·维斯特最终没有完成收购，但在因发表反犹太言论被几乎所有其他主要网站封禁后，他曾考虑收购 Parler[46]。2023
    年 4 月，新所有者 Starboard 的 CEO 在收购 Parler 后不久就将其关闭，理由是“任何理性的人都不会相信‘保守派版 Twitter’是一种可行的商业模式”[52]。


    2019 年，Google+被关闭，威瑞森以不到 300 万美元的价格将 Tumblr 出售给了 Automattic（WordPress.com 的所有者和
    WordPress 的主要支持者）[43]。


    2020 年，音频聊天应用 Clubhouse 和注重真实性的社交媒体应用 BeReal 上线。尤其是在一个被“假新闻”主导的时代，BeReal 自此开始流行起来。

