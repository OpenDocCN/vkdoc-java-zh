    \ |\n\nWhen the configurations are read during startup, the Social Media Hub\n\
    will try to map each configuration to the corresponding Social Media Hub\nadapter.\
    \ It uses the implementation of `SocialHubAdapterFactory`\navailable for every\
    \ Social Media Hub adapter. The `SocialHubAdapterFactory#getType`\nmust match\
    \ the type property in the adapter setting.\n\nConnector Settings\nA connector\
    \ configuration usually contains the credentials for\naccessing a social network\
    \ or API. Apps mapping this configuration must\nextend the interface `ConnectorConfiguration`,\n\
    which contains additional settings valid for all connector\nconfigurations.\n\n\
    The `ConnectorConfiguration`\ninterface exposes the following method:\n\n*   `getImageVariant()\
    \ –`\n    The name of the image variant used when an image is pushed to the\n\
    \    external system. If the variant is not found or not configured, the\n   \
    \ original blob will be used.\n\nTwitter/X\nThe following section describes configuration\
    \ properties for the\nTwitter Social Media Hub adapter.\n\nAdapter Configuration\n\
    \nTo show the Twitter timeline for the configured profile, the timeline\nlink\
    \ must be provided by the adapter configuration:\n\n```\n\nhttps://twitter.com/[YOUR_PROFILE]\n\
    \n```\n\nConnector Configuration\n\nCreate your Twitter/X application as instructed\
    \ in the previous\nsection for HCL Portal.\n\nTo use the native Twitter connector,\
    \ the corresponding Twitter\ncredentials have to be provided in the connector\
    \ configuration:\n\nYouTube\nThe following section describes configuration properties\
    \ for\nYouTube.\n\nAdapter Configuration\n\nNot required\n\nConnector Configuration\n\
    \nTo use the native YouTube connector, you need to provide the\ncorresponding\
    \ YouTube credentials as part of the connector\nconfiguration. Note that one YouTube\
    \ configuration represents one\nplaylist. If you want to publish into different\
    \ playlists, you need\ndifferent configurations.\n\nSee [`https://developers.google.com/youtube/v3/quickstart/go`](https://developers.google.com/youtube/v3/quickstart/go)\n\
    to create YouTube credentials for your application.\n\nInstagram\nThe following\
    \ section describes configuration properties for\nInstagram.\n\nAdapter Configuration\n\
    \nNot required\n\nConnector Configuration\n\nSince the Social Media Hub currently\
    \ does not ship a native connector\nfor Instagram, the actual connector configuration\
    \ depends on the\nintegration with a social media tool.\n\nPinterest\nThe following\
    \ section describes configuration properties for\nPinterest.\n\nAdapter Configuration\n\
    \nTo show a Pinterest board for the configured profile, the board link\nmust be\
    \ provided in the adapter configuration. The link can be copied\nfrom your Pinterest\
    \ profile:\n\n```\n\nhttps://www.pinterest.de/[PINTEREST_PRROFILE]/[PINTEREST_BOARD_NAME]\n\
    \n```\n\nConnector Configuration\n\nSince the Social Media Hub currently does\
    \ not ship a native connector\nfor this social network, the actual connector configuration\
    \ depends on\nthe integration with a social media tool.\n\nSummary\nIn this final\
    \ chapter, we learned about Enterprise Portal servers and\ntheir social media\
    \ support, either by providing social interactions\nwithin the portal itself or\
    \ by integrating social networks, from using\nthem for social login to sharing\
    \ content or embedding the social\ntimelines.\n\nIndex\n\nA\n\nAccess control\n\
    \nActivity API\n\nActivityPub\n\nActivityStreams\n\nAgorava\n\nconnectors\n\n\
    core\n\ndefinition\n\nhistory\n\nmacro architecture\n\nPicketLink\n\nsocializer\n\
    \nAmazon\n\nApache Shindig\n\nApache Shiro\n\napplication developers\n\ndefinition\n\
    \nfeatures\n\nauthentication\n\nauthorization\n\nsession management\n\nframework\n\
    \nrealm\n\nSecurityManager\n\nsocial login\n\nsubject\n\nApple Health\n\nAttribute-based\
    \ access control (ABAC)\n\nAudiobooks\n\nAudio sharing\n\nAuthentication\n\nAuthorization\n\
    \nB\n\nBatch Mode\n\nBigBone\n\nBig Data\n\nC\n\nChatGPT\n\nCommon Client Interface\
    \ (CCI)\n\nConfidentiality\n\nContext-based access control (CBAC)\n\nCoreMedia\n\
    \nhistory\n\nsocial media hub\n\nconfiguration\n\ninstallation\n\nCoreMedia Labs\
