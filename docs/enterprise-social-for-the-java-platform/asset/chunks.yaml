    \        var issuer = context.getProviderMetadata().getString(\"issuer\");\n \
    \       if (issuer.endsWith(\"google.com\")) { // As Google returns a long numeric\
    \ user id, we try to use the email address instead\n            var email = context.getClaimsJson().getString(\"\
    email\");\n            return authorization.get(email) == null ? Collections.emptySet()\
    \ : authorization.get(email);\n        } else {\n            return authorization.get(principal)\
    \ == null ? Collections.emptySet() : authorization.get(principal);\n        }\n\
    \    }\n}\n```\n\nAs Google will return a rather long numeric Google ID, we retrieve\
    \ the `email` claim from the claims JSON, provided via Jakarta JSON Processing,\
    \ and compare the Gmail address instead of a long, cryptic surrogate key. For\
    \ all other providers, for example, Keycloak, we’ll use the name of the `CallerPrincipal`.\n\
    \nTo get Google Client ID and Client Secret credentials, you need to create a\
    \ new application with Google:\n\n1.  Go to [`https://console.developers.google.com`](https://console.developers.google.com).\n\
    2.  Create a new project, for example, `ApressBookDemoApp`.\n3.  Create OAuth\
    \ 2.0 credentials for the project since Google does not do that automatically.\
    \ From the sidebar, click the **Credentials** tab, then click **Create credentials**,\
    \ and choose **OAuth client ID** from the drop-down.\n4.  Google will prompt for\
    \ some information about your application such as the product name, home page,\
    \ and logo. Most of them are optional. On the next page, select the **Web Application**\
    \ type, and enter the redirect URL where the Jakarta EE application we will build\
    \ next will wait for the callback. Enter `http://localhost:8080/callback` as the\
    \ redirect URL.\n5.  You then see the Client ID and Client Secret on a screen.\
    \ Download them as JSON and store it in a secure location.\n\nEdit/create `src/main/resources/oidc.properties`\
    \ in your Jakarta EE application:\n\n```\nissuerUri=https://accounts.google.com\n\
    email=\nclientId=\nclientSecret=\n```\n\nReplace the values of `clientId` and\
    \ `clientSecret` with those in the JSON file from Google and `email` with the\
    \ email address of a valid test user, for example, your own Gmail address.\n\n\
    Build/run the application with `mvn wildfly:run`. Now you’re ready to test it.\n\
    \nVisit `http://localhost:8080/public` in the browser.\n\nYou see the page:\n\n\
    ```\nPublic Unsecured Servlet\n```\n\nNext browse to `http://localhost:8080/protected`.\n\
    \nThe first visit will forward you to a Google ID login page. After successfully\
    \ confirming your Google ID, it’ll redirect back to the protected page and show\
    \ something like:\n\n```\nProtected Servlet\naccess token:ya29.a0AfB_…\ntoken\
    \ type:Bearer\nsubject:1234567890987654321\nexpires in:Optional[1234]\nrefresh\
    \ token:Optional.empty\nclaims json:{\"sub\":\"1234567890987654321\",\"name\"\
    :\"John Doel\",\"given_name\":\"John\",\"family_name\":\"Doe\",\"picture\":\"\
    https://lh3.googleusercontent.com/a/ABcdefghijklmnopqrstuvwxY-z\",\"email\":\"\
    john.doel@gmail.com\",\"email_verified\":true,\"locale\":\"xy\"}\n```\n\nYou can\
    \ also visit `http://localhost:8080/username`.\n\nIt will show you something like:\n\
    \n```\nUserName Servlet\nprincipal name in request userPrincipal:1234567890987654321\n\
    principal name:1234567890987654321\nisCallerInRole('foo'):true\nisCallerInRole('bar'):true\n\
    ```\n\nThe name of the `Principal` is rather cryptic with Google; it’s essentially\
    \ a long number that represents your Google ID.\n\n## Open Liberty\n\nOpen Liberty\
    \ is an open source implementation of Eclipse MicroProfile and Jakarta EE from\
    \ IBM. It is the foundation of the WebSphere Liberty application server.\n\nOpen\
    \ Liberty 22 and above implement the Jakarta EE 10 security specifications.\n\n\
    ### Social Media Login\n\nThe Open Liberty Social Media Login feature provides\
    \ a form of Single Sign-On (SSO) enabling users to sign into a secured website\
    \ by using their existing social media accounts.\n\nFor example, you can configure\
    \ the Social Login feature so that users can log into your website with their\
    \ Facebook or Twitter accounts instead of having to create accounts for your website\
    \ only. You can enable the Social Login feature for any social media platform\
    \ that uses the OAuth 2.0 or OpenID Connect 1.0 standard for authorization.\n\n\
    To enable its Social Media 1.0 feature, add the following element to your `server.xml`\
    \ file, inside the `featureManager` element:\n\n```\nsocialLogin-1.0\n```\n\n\
    The Social Media Login feature provides a set of built-in configuration elements\
    \ for popular social media providers, in addition to generic configuration elements.\
    \ The following examples show how to configure different scenarios in the `server.xml`\
    \ file.\n\n#### Log In with Social Media ID\n\nIf multiple social media providers\
    \ are configured, a customizable selection form is presented. The user can then\
    \ sign in with a social media provider of their choice. The following example\
    \ shows how to configure your application to request that the user logs in with\
    \ their Google ID. You can generate your Google credentials on [`https://console.developers.google.com`](https://console.developers.google.com).\n\
    \nIn this example, `your_app_id` and `your_app_secret` are the Google `Client\
    \ ID` and `Client Secret` credentials for the `formlogin` application.\n\n####\
    \ Multiple Social Media Providers\n\nYou can configure multiple social media providers\
    \ for users to choose from. The user receives a customizable selection form before\
    \ authentication with the available providers included on the form. The following\
    \ example includes a choice of Google, GitHub, Facebook, LinkedIn, and Twitter:\n\
    \n#### Require Users to Be Corporate Registry\n\nYou can restrict the presentation\
    \ of a social media provider to only users who are also in another configured\
    \ registry. For example, use the `mapToUserRegistry` attribute to configure your\
    \ application. The user must authenticate through Google and also verify as an\
    \ existing user in the company LDAP registry:\n\n```\n...\n```\n\n#### Choose\
    \ Between Social Media ID and Corporate Registry\n\nYou can give users the option\
    \ of logging in with either a social media provider or with their account on the\
    \ configured registry. For example, use the `enableLocalAuthentication` attribute\
    \ to configure your application so that users can log in with a Google ID or with\
    \ their account on their company’s LDAP registry:\n\n```\n...\n```\n\n#### Log\
    \ In for Only a Subset of Paths or Browsers\n\nTo protect only a subset of applications,\
    \ URLs, or IP addresses, use an authentication filter. The security configuration\
    \ takes effect only when the conditions in the filter are met. For example, you\
    \ might want a web application to be secured with the Social Media Login feature\
    \ and a microservice application secured with the MicroProfile JWT feature, remember\
    \ from the previous chapter.\n\nIn the following example, only requests that contain\
    \ the `/mywebapp` URL pattern are secured with Google credentials:"
  raw: "```\n@ApplicationScoped\npublic class AuthorizationIdentityStore implements\
    \ IdentityStore {\nprivate static final Logger LOGGER = Logger.getLogger(AuthorizationIdentityStore.class.getName());\n\
    private String email;\nprivate Map> authorization;\n@PostConstruct\nvoid init()\
    \ {\nLOGGER.config(\"IdentityStore.init()\");\ntry {\nvar properties = new Properties();\n\
    properties.load(getClass().getResourceAsStream(\"/oidc.properties\"));\nemail\
    \ = properties.getProperty(\"email\", \"\");\nLOGGER.log(\nLevel.INFO,\n\"email:\
    \ {0}\",\nnew Object[] { email });\n} catch (IOException e) {\nLOGGER.log(Level.SEVERE,\
    \ \"Failed to load oidc.properties\", e);\nemail = \"\";\n}\nauthorization = Map.of(\n\
    \"user\", Set.of(\"foo\", \"bar\"),\nemail,  Set.of(\"foo\", \"bar\")); // user\
    \ in Google.\n}\n@Inject\nprivate OpenIdContext context;\n@Override\npublic Set\
    \ validationTypes() {\nreturn EnumSet.of(PROVIDE_GROUPS);\n}\n@Override\npublic\
    \ Set getCallerGroups(CredentialValidationResult validationResult) {\nvar principal\
    \ = validationResult.getCallerPrincipal().getName();\nLOGGER.log(Level.INFO, \"\
    Get principal name in validation result: {0}\", principal);\nLOGGER.log(Level.INFO,\
    \ \"claims json:\" + context.getClaimsJson());\nLOGGER.log(Level.INFO, \"provider\
    \ json:\" + context.getProviderMetadata());\nvar issuer = context.getProviderMetadata().getString(\"\
    issuer\");\nif (issuer.endsWith(\"google.com\")) { // As Google returns a long\
    \ numeric user id, we try to use the email address instead\nvar email = context.getClaimsJson().getString(\"\
    email\");\nreturn authorization.get(email) == null ? Collections.emptySet() :\
    \ authorization.get(email);\n} else {\nreturn authorization.get(principal) ==\
    \ null ? Collections.emptySet() : authorization.get(principal);\n}\n}\n}\n```\n\
    \nAs Google will return a rather long numeric Google ID, we retrieve the “email”\
    \ claim from the claims JSON, provided via Jakarta JSON Processing, and compare\
    \ the Gmail address instead of a long, cryptic surrogate key. For all other providers,\
    \ for example, Keycloak, we’ll use the name of the `CallerPrincipal`.\n\nTo get\
    \ Google Client ID and Client Secret credentials, you need to create a new application\
    \ with Google:\n\n1.  Go to [`https://console.developers.google.com`](https://console.developers.google.com).\n\
    \n2.  Create a new project, for example, “ApressBookDemoApp”.\n\n3.  Create OAuth\
    \ 2.0 credentials for the project since Google does not do that automatically.\
    \ From the sidebar, click the Credentials tab, then click **Create credentials**,\
    \ and choose **OAuth client ID** from the drop-down.\n\n4.  Google will prompt\
    \ for some information about your application such as the product name, home page,\
    \ and logo. Most of them are optional. On the next page, select the **Web Application**\
    \ type, and enter the redirect URL where the Jakarta EE application we will build\
    \ next will wait for the callback. Enter `http://localhost:8080/callback` as the\
    \ redirect URL.\n\n5.  You then see the Client ID and Client Secret on a screen.\
    \ Download them as JSON and store it in a secure location.\n\nEdit/create `src/main/resources/oidc.properties`\
    \ in your Jakarta EE application:\n\n```\nissuerUri=https://accounts.google.com\n\
    email=\nclientId=\nclientSecret=\n```\n\nReplace the values of `clientId` and\
    \ `clientSecret` with those in the JSON file from Google and `email` with the\
    \ email address of a valid test user, for example, your own Gmail address.\n\n\
    Build/run the application with `mvn wildfly:run`.Now you’re ready to test it.\n\
    \nVisit `http://localhost:8080/public` in the browser.\n\nYou see the page:\n\n\
    ```\nPublic Unsecured Servlet\n```\n\nNext browse to `http://localhost:8080/protected`.\n\
    \nThe first visit will forward you to a Google ID login page. After successfully\
    \ confirming your Google ID, it’ll redirect back to the protected page and show\
    \ something like\n\n```\nProtected Servlet\naccess token:ya29.a0AfB_…\ntoken type:Bearer\n\
    subject:1234567890987654321\nexpires in:Optional[1234]\nrefresh token:Optional.empty\n\
    claims json:{\"sub\":\"1234567890987654321\",\"name\":\"John Doel\",\"given_name\"\
    :\"John\",\"family_name\":\"Doe\",\"picture\":\"https://lh3.googleusercontent.com/a/ABcdefghijklmnopqrstuvwxY-z\"\
    ,\"email\":\"john.doel@gmail.com\",\"email_verified\":true,\"locale\":\"xy\"}\n\
    ```\n\nYou can also visit `http://localhost:8080/username`.\n\nIt will show you\
    \ something like\n\n```\nUserName Servlet\nprincipal name in request userPrincipal:1234567890987654321\n\
    principal name:1234567890987654321\nisCallerInRole('foo'):true\nisCallerInRole('bar'):true\n\
    ```\n\nThe name of the `Principal` is rather cryptic with Google; it’s essentially\
    \ a long number that represents your Google ID.\n\n## Open Liberty\n\nOpen Liberty\
    \ is an open source implementation of Eclipse MicroProfile and Jakarta EE from\
    \ IBM. It is the foundation of the WebSphere Liberty application server.\n\nOpen\
    \ Liberty 22 and above implement the Jakarta EE 10 security specifications.\n\n\
    ### Social Media Login\n\nThe Open Liberty Social Media Login feature provides\
    \ a form of Single Sign-On (SSO) enabling users to sign into a secured website\
    \ by using their existing social media accounts.\n\nFor example, you can configure\
    \ the Social Login feature so that users can log into your website with their\
    \ Facebook or Twitter accounts instead of having to create accounts for your website\
    \ only. You can enable the Social Login feature for any social media platform\
    \ that uses the OAuth 2.0 or OpenID Connect 1.0 standard for authorization.\n\n\
    To enable its Social Media 1.0 feature, add the following element to your `server.xml`\
    \ file, inside the `featureManager` element:\n\n```\nsocialLogin-1.0\n```\n\n\
    The Social Media Login feature provides a set of built-in configuration elements\
    \ for popular social media providers, in addition to generic configuration elements.\
    \ The following examples show how to configure different scenarios in the `server.xml`\
    \ file.\n\n#### Log In with Social Media ID\n\nIf multiple social media providers\
    \ are configured, a customizable selection form is presented. The user can then\
    \ sign in with a social media provider of their choice. The following example\
    \ shows how to configure your application to request that the user logs in with\
    \ their Google ID. You can generate your Google credentials on [`https://console.developers.google.com`](https://console.developers.google.com).\n\
    \nIn this example, `your_app_id` and `your_app_secret` are the Google `Client\
    \ ID` and `Client Secret` credentials for the `formlogin` application.\n\n####\
    \ Multiple Social Media Providers\n\nYou can configure multiple social media providers\
    \ for users to choose from. The user receives a customizable selection form before\
    \ authentication with the available providers included on the form. The following\
    \ example includes a choice of Google, GitHub, Facebook, LinkedIn, and Twitter:\n\
    \n#### Require Users to Be Corporate Registry\n\nYou can restrict the presentation\
    \ of a social media provider to only users who are also in another configured\
    \ registry. For example, use the `mapToUserRegistry` attribute to configure your\
    \ application. The user must authenticate through Google and also verify as an\
    \ existing user in the company LDAP registry:\n\n```\n... \n```\n\n#### Choose\
    \ Between Social Media ID and Corporate Registry\n\nYou can give users the option\
    \ of logging in with either a social media provider or with their account on the\
    \ configured registry. For example, use the `enableLocalAuthentication` attribute\
    \ to configure your application so that users can log in with a Google ID or with\
    \ their account on their company’s LDAP registry:\n\n```\n\n... \n```\n\n####\
    \ Log In for Only a Subset of Paths or Browsers\n\nTo protect only a subset of\
    \ applications, URLs, or IP addresses, use an authentication filter. The security\
    \ configuration takes effect only when the conditions in the filter are met. For\
    \ example, you might want a web application to be secured with the Social Media\
    \ Login feature and a microservice application secured with the MicroProfile JWT\
    \ feature, remember from the previous chapter.\n\nIn the following example, only\
    \ requests that contain the `/mywebapp` URL pattern are secured with Google credentials:"
