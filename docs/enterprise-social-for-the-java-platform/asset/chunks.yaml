- fmt: '### JSR 357


    Between JavaOne 2011 and further conferences like Devoxx in Antwerp, I initiated
    a series of discussions with CDI Spec Lead Pete Muir, Twitter4J author Yusuke
    Yamamoto, or Seam Social creator Antoine Sabot-Durand to explore a possible standardization
    of social media APIs for the Java platform in the Java Community Process.


    They thought it was an idea worth pursuing. Other APIs and projects like `DaliCore`
    were considered possibly relevant (especially providing information under Java
    EE) due to the strong use of CDI and rather well-structured separation of API
    and implementation made Seam Social the best candidate for initial code base.


    The JSR was proposed by me and Antoine as co-Spec Leads, joined by companies like
    Red Hat/JBoss, eXo Platform, or Twitter (represented by Twitter4J creator Yusuke
    Yamamoto) as well as JUG Chennai, `DaliCore` authors from BeJUG or Java EE 7 EG
    Member, and Oracle ACE director Markus Eisele (now again working at Red Hat, like
    Antoine did till 2021), a healthy mix of corporate individuals and JUGs one might
    say.


    However, after IBM first voted against the JSR, other EC members like SAP followed,
    one JUG (SouJava) voted in favor, the other (LJC) voted against it, and the creation
    ballot ended 8 against 5, stopping the creation of JSR 357. Sadly, although with
    big vendors preferring “walled gardens” [14] over open standards, not entirely
    surprising, even interested party and EG member candidate Twitter abstained. See
    [26] for an article about the ballot.


    IBM felt strong about OpenSocial, but as even some of its other supporters like
    Adjuvi’s Dion Hinchcliffe [16] explained (a bit later though), OpenSocial is a
    Basic Standard while the main goal of JSR 357 following Seam Social was to offer
    a Higher-Order API and binding to the Java platform. Take WebSockets, among the
    JSRs 357 mentioned having potential for synergies. The W3C standard just along
    the lines of OpenSocial successors was defined under the HTML5 umbrella, while
    the Oracle JSR creates a Java implementation. Even on the Java platform, there
    have been several existing, well-adopted open source projects for WebSockets;
    nevertheless, it was found worth creating a JSR, too. Similar for JSON and maybe
    even more striking as the de facto Reference Implementation by JSON “father” Douglas
    Crockford inspired the JSON JSR, but Crockford while initially “supporting this
    JSR” told me personally at Dutch Mobile Conference last year he no longer intended
    to be involved and has never stopped supporting and promoting his own libraries
    around it.


    The fact that first opposing IBM sold hundreds, maybe thousands of Social Media
    Software Patents to Facebook the week JSR 357 was voted down doesn’t just present
    a bad optic. It also makes IBM’s own support of OpenSocial a bit questionable
    if social media patents and proprietary technologies are sold to Facebook, bolstering
    its arsenal against competitors like Twitter and others. It could be a reason
    behind Twitter’s “mood swing” at the last moment of the ballot. Maybe a coincidence,
    but Twitter4J author Yusuke Yamamoto left Twitter soon after that. Whether or
    not EC members like IBM or SAP didn’t want Red Hat in an influential role in more
    key open source projects after Hibernate, CDI/Seam, or Arquillian, just to name
    a few, it could have been another reason, too. Especially on that one I’d say
    if it was among intentions, it backfired with the creation and active development
    of Agorava, not just by one company (like `DaliCore` or Social Link) but a variety
    of contributors around the world, most of them proposed EG members.


    Killing a likely heir to the Java Social “throne,” especially with a significant
    French participation one may say, created a “French Revolution” of Java Social
    Frameworks named Agorava.


    You’ll hear more about Agorava in Chapter [6](#600273_1_En_6_Chapter.xhtml).


    ## Summary


    In this chapter, we learned about different kinds of social standards and the
    efforts to standardize interaction with social networks, allowing some level of
    provider neutrality as well as cross-platform publication.


    # 4. Social Security


    The surge of cybersecurity attacks has nowadays created the need for defending
    our organization on multiple security fronts, be it physical, technological, or
    policies and procedures. Each one of the aforementioned fronts is equally important
    to your organization’s security. None of them should be undermined toward creating
    a future-proof and secure organization. That is, having only physical security
    is not enough. Having only physical and technical security could indeed be somewhat
    more challenging to hackers, yet if your employees are not well educated to protect
    their passwords, your organization isn’t very secure overall.


    Information security is based on


    *   Confidentiality

    *   Integrity

    *   Availability


    These three concepts are often referred to as the CIA Triad. It formed over time
    and does not have a single creator. Confidentiality was first proposed as early
    as 1976 in a study by the US Air Force; the concept of integrity was explored
    in a 1987 paper titled “A Comparison of Commercial and Military Computer Security
    Policies” written by David Clark and David Wilson [55].


    The paper recognized that commercial computing had a need for accounting records
    and data correctness. Even though it is not as easy to find an initial source,
    the concept of availability became more widespread a year later, in 1988. Another
    ten years later, by 1998, people saw the three concepts together as the CIA Triad.


    *   Confidentiality `–` Information should not be read by unauthorized users.

    *   Integrity `–` Information should not be able to be falsified unnoticed.


    For example, a hacker should not be able to seize and modify any data before it’s
    sent to the intended recipient.


    *   Availability `–` Requires that information is accessible whenever authorized
    users need it.


    In addition to the CIA Triad, there are some more key concepts of social media
    security:


    *   Confidentiality

    *   Integrity

    *   Availability

    *   Privacy

    *   Authentication

    *   Authorization


    Privacy `–` Users can control the access, use, and disclosure of their personal
    information. Privacy is the concept of maintaining secrecy, anonymity, and freedom
    from surveillance or intrusion into one’s private matters. Privacy can be understood
    as the power to control when, how, and to what extent personal information is
    shared with others.


    Under the CCPA, personal information is “information that identifies, relates
    to, describes, is reasonably capable of being associated with, or could reasonably
    be linked, directly or indirectly, with a particular consumer or household.”


    Under the GDPR, personal information is termed as “personal data,” which is considered
    “any information related to an identified or identifiable natural person.”


    Authentication `–` Users can prove they are who they say they are, their **identity**;
    for example, a client can prove to a server that they are acting on behalf of
    an authorized identity and vice versa. Or the caller ID of an incoming call.


    Authorization `–` Users have enough permissions to access restricted resources
    or perform specific operations.


    Authentication and authorization are sometimes confused nowadays, so here’s a
    good way to remember how these two terms are different in the world of identity
    and access management (IAM). Authentication confirms that users are who they say
    they are, whereas authorization permits those users to access a resource.'
