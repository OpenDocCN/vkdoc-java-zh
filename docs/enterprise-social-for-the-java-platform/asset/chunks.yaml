    are,” like a PIN or biometric check (such as a fingerprint, iris, or facial recognition),
    or a pattern, for example, a QR code.


    ##### History


    The idea of passkeys first came up in 2009, when Validity Sensors, later acquired
    by Synaptics, and PayPal joined forces on the concept of using biometrics instead
    of passwords for online identification. Together with several other IT leaders,
    they founded the FIDO Alliance, a web security organization, in July 2012. FIDO
    stands for Fast IDentity Online.


    Google joined in 2013\. A year later in 2014, PayPal and Samsung started FIDO
    authentication with the Samsung Galaxy S5 smartphone. Users of the device could
    authenticate PayPal with the touch of a finger and shop online without having
    to enter passwords when completing the transaction. The term “passkeys” was popularized
