    \n示例\n以下是针对选定业务用例的代码示例。\n\n广告购买\n以下示例展示了如何为点击到 Messenger 广告和 Facebook 页面推广创建广告活动。\n\
    点击到 Messenger 广告允许人们在点击您的广告时直接与您的 Facebook 页面开始对话。\n您需要一个广告账户 ID。\n\n此示例向您展示如何创建一个在指定时间段内投放的广告：\n\
    \n```\nAdSet adSet = new AdAccount(act_, context).createAdSet()\n.setName(\"我的广告组\"\
