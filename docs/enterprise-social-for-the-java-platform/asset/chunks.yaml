    \    APINodeList igComments = new IGMedia(, context).getComments()\n    .execute();\n\
    \    String ig_comment_id = igComments.get(0).getId();\n    IGComment igComment\
    \ = new IGComment(ig_comment_id, context).get()\n    .execute();\n    APINodeList\
    \ igCommentRepliess = new IGComment(ig_comment_id, context).getReplies()\n   \
    \ .execute();\n    ```\n\nWhatsApp\nThis example adds functionality to send WhatsApp\
    \ messages via the API from a Java app.\n\nYou need\n\n*   A Java IDE of your\
    \ choice.\n*   Ensure to have Java 11 or higher.\n*   Register at Meta for Developers.\n\
    *   Enable two-factor authentication for your account.\n*   Ensure your developer\
    \ account is linked to a Meta Business account.\n\nCreate an app on Meta for Developers.\
    \ Select **My Apps**, then click **Create App**, and select **Business** as the\
    \ app type.\n\nThe example code will look like this:\n\n```\nimport java.io.IOException;\n\
    import java.net.URI;\nimport java.net.URISyntaxException;\nimport java.net.http.HttpClient;\n\
    import java.net.http.HttpRequest;\nimport java.net.http.HttpResponse;\nimport\
    \ java.net.http.HttpResponse.BodyHandlers;\npublic class App\n{\npublic static\
    \ void main( String[] args )\n{\ntry {\nHttpRequest request = HttpRequest.newBuilder()\n\
    .uri(new URI(\"https://graph.facebook.com/v13.0//messages\"))\n.header(\"Authorization\"\
    , \"Bearer \")\n.header(\"Content-Type\", \"application/json\")\n.POST(HttpRequest.BodyPublishers.ofString(\"\
    { \\\"messaging_product\\\": \\\"whatsapp\\\", \\\"recipient_type\\\": \\\"individual\\\
    \", \\\"to\\\": \\\"\\\", \\\"type\\\": \\\"template\\\", \\\"template\\\": {\
    \ \\\"name\\\": \\\"hello_world\\\", \\\"language\\\": { \\\"code\\\": \\\"en_US\\\
    \" } } }\"))\n.build();\nHttpClient http = HttpClient.newHttpClient();\nHttpResponse\
    \ response = http.send(request,BodyHandlers.ofString());\nSystem.out.println(response.body());\n\
    } catch (URISyntaxException | IOException | InterruptedException e) {\ne.printStackTrace();\n\
    }\n}\n}\n```\n\nWhatsApp Business Java API SDK\n\nWhatsApp Business Java API SDK\
