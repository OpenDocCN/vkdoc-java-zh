    \n```\n//payload = the webhook payload json sent by Whatsapp\n//using WebHook.constructEvent()\
    \ to deserialize event\nWebHookEvent event = WebHook.constructEvent(payload);\n\
    ```\n\n#### Mastodon\n\nThere are three Java clients for Mastodon according to\
    \ the website, but only BigBone seems reasonably active.\n\nBigBone\nBigBone is\
    \ a fork of the Mastodon4J project, a client library for Java and Kotlin.\n\n\
    Overview\n\nThe main features of BigBone are as follows:\n\n*   Act on statuses\
    \ on your timelines\n    *   Home\n    *   Local\n    *   Federated\n*   Post\
    \ new statuses or edit existing ones (including media uploads)\n*   Favorite and\
    \ bookmark statuses\n*   Manage lists\n*   Post polls or vote on them\n*   Schedule\
    \ statuses\n*   Send direct messages to other people\n*   Manage filters\n*  \
    \ Follow/unfollow hashtags\n\nInstallation\nAdd the following to the Maven POM\
    \ of your project.\n\n**Snapshot Repository**\n\n```\nmaven-central-snapshots\n\
    Maven Central Snapshot Repository        https://s01.oss.sonatype.org/content/repositories/snapshots/\n\
    \nfalse\ntrue\n```\n\n**Dependencies**\n\n```\nsocial.bigbone\nbigbone\n2.0.0-SNAPSHOT\n\
    \nsocial.bigbone\nbigbone-rx\n2.0.0-SNAPSHOT\n```\n\nExamples\n**Get an access\
    \ token**\n[`https://docs.joinmastodon.org/methods/apps/`](https://docs.joinmastodon.org/methods/apps/)\n\
    \n**Get a timeline**\n\n```\npublic class GetPublicTimeline {\npublic static void\
    \ main(final String[] args) throws BigBoneRequestException {\nfinal String instance\
    \ = args[0];\n// Instantiate client\nfinal MastodonClient client = new MastodonClient.Builder(instance)\n\
    .build();\n// Get statuses from public timeline\nfinal Pageable statuses = client.timelines().getPublicTimeline(LOCAL_AND_REMOTE).execute();\n\
    statuses.getPart().forEach(status -> System.out.println(status.getContent()));\n\
    }\n}\n```\n\n**Get instance information**\n\n```\npublic class GetInstanceInfo\
    \ {\npublic static void main(final String[] args) throws BigBoneRequestException\
    \ {\nfinal String instance = args[0];\n// Instantiate client\nfinal MastodonClient\
    \ client = new MastodonClient.Builder(instance)\n.build();\n// Get instance info\
    \ and dump it to the console as JSON\nfinal Instance instanceInfo = client.instances().getInstance().execute();\n\
    final Gson gson = new Gson();\nSystem.out.println(gson.toJson(instanceInfo));\n\
    }\n}\n```\n\n**Get bookmarks**\n\n```\npublic class GetBookmarks {\npublic static\
    \ void main(final String[] args) throws BigBoneRequestException {\nfinal String\
    \ instance = args[0];\nfinal String accessToken = args[1];\n// Instantiate client\n\
    final MastodonClient client = new MastodonClient.Builder(instance)\n.accessToken(accessToken)\n\
    .build();\n// Get bookmarks\nfinal Pageable bookmarks = client.bookmarks().getBookmarks().execute();\n\
    bookmarks.getPart().forEach(bookmark -> {\nString statusText = bookmark.getContent()\
    \ + \"\\n\";\nSystem.out.print(statusText);\n});\n}\n}\n```\n\n**Perform a simple\
    \ search**\n\n```\npublic class PerformSimpleSearch {\npublic static void main(final\
    \ String[] args) throws BigBoneRequestException {\nfinal String instance = args[0];\n\
    final String accessToken = args[1];\nfinal String searchTerm = args[2];\n// Instantiate\
    \ client\nfinal MastodonClient client = new MastodonClient.Builder(instance)\n\
    .accessToken(accessToken)\n.build();\n// Perform search and print results\nfinal\
    \ Search searchResult = client.search().searchContent(searchTerm).execute();\n\
    searchResult.getAccounts().forEach(account -> System.out.println(account.getDisplayName()));\n\
    searchResult.getStatuses().forEach(status -> System.out.println(status.getContent()));\n\
    searchResult.getHashtags().forEach(hashtag -> System.out.println(hashtag.getName()));\n\
    }\n}\n```\n\n#### Twitter/X\n\nThe social network formerly known as Twitter has\
    \ at least two Java clients with an object model wrapped around the Twitter/X\
    \ REST APIs.\n\nTwitter API Client\nIn August 2021, Twitter started its own API\
    \ Client Library for Java [35]. Quite late, also given Twitter had been an active\
    \ participant in the JCP [11] and host to several JCP EC F2F meetings in the Bay\
    \ Area, but supporting the Twitter v2 API only, it seemed a measure to convince\
    \ developers into migrating to the new API. The GitHub repo still says \"This\
    \ SDK is in beta and is not ready for production\", and there was only contribution\
    \ by three committers; all seem to have left the company shortly before or after\
    \ the Elon Musk takeover.\n\nInstallation\n\nAdd this dependency to your project's\
    \ POM:\n\n```\ncom.twitter\ntwitter-api-java-sdk\n2.0.3\n```\n\nTWITTER TO X MIGRATION\n\
    \nAs Elon Musk rebrands Twitter to X, at some point, even domains like twitter.com\
    \ or URLs underneath that site could be switched off and no longer work. That\
    \ may affect some of the settings and steps listed here.\n\nExamples\n\nYou must\
    \ first register a Twitter application to obtain a username and password to access\
    \ the Twitter API. To register a new application for use with the API Client:\n\
    \n1.  Go to [`https://dev.twitter.com`](https://dev.twitter.com)\n2.  Log in and\
    \ click **Create an app**\n3.  Click **Add New Application**\n4.  Under **Application\
    \ Info**, enter values for the following parameters:\n    *   Application Name\
    \ – This is the name of your application that is displayed at the end of each\
    \ post, for example, your company name.\n    *   Application Description – Enter\
    \ a short description of the application.\n    *   Website – This is the URL to\
    \ your website, for example, [`http://www.mysite.com`](http://www.mysite.com).\n\
    \    *   Callback URL – Set this to `http://domain/wps/wcmsocial/servlet/oAuthCB/twitter`\
    \ where \"domain\" is your domain name.\n5.  Read the terms and conditions and\
    \ select **I Agree**.\n6.  Enter the security/captcha information if required.\n\
    7.  Your Consumer Key and Consumer Secret are displayed. Write them down in a\
    \ safe place.\n8.  Click the **Settings** tab.\n9.  In the **Application Type**\
    \ section, set the **Access** property to Read and write.\n10.  Click the **Update\
    \ this Twitter application's settings**.\n\n**API example**\n\n```\npublic class\
    \ TwitterApiExample {\npublic static void main(String[] args) {\n/**\n* Set the\
    \ credentials for the required APIs.\n* The Java SDK supports TwitterCredentialsOAuth2\
    \ & TwitterCredentialsBearer.\n* Check the 'security' tag of the required APIs\
    \ in https://api.twitter.com/2/openapi.json in order\n* to use the right credential\
    \ object.\n*/\nTwitterApi apiInstance = new TwitterApi(new TwitterCredentialsOAuth2(\n\
    System.getenv(\"TWITTER_OAUTH2_CLIENT_ID\"),\nSystem.getenv(\"TWITTER_OAUTH2_CLIENT_SECRET\"\
    ),\nSystem.getenv(\"TWITTER_OAUTH2_ACCESS_TOKEN\"),\nSystem.getenv(\"TWITTER_OAUTH2_REFRESH_TOKEN\"\
    )));\nSet tweetFields = new HashSet();\ntweetFields.add(\"author_id\");\ntweetFields.add(\"\
    id\");\ntweetFields.add(\"created_at\");\ntry {\n// findTweetById\nGet2TweetsIdResponse\
    \ result = apiInstance.tweets().findTweetById(\"20\")\n.tweetFields(tweetFields)\n\
    .execute();\nif(result.getErrors() != null && result.getErrors().size() > 0) {\n\
    System.out.println(\"Error:\");\nresult.getErrors().forEach(e -> {\nSystem.out.println(e.toString());\n\
    if (e instanceof ResourceUnauthorizedProblem) {\nSystem.out.println(((ResourceUnauthorizedProblem)\
    \ e).getTitle() + \" \" + ((ResourceUnauthorizedProblem) e).getDetail());\n}\n\
    });\n} else {\nSystem.out.println(\"findTweetById - Tweet Text: \" + result.toString());\n\
    }\n} catch (ApiException e) {\nSystem.err.println(\"Status code: \" + e.getCode());\n\
    System.err.println(\"Reason: \" + e.getResponseBody());\nSystem.err.println(\"\
    Response headers: \" + e.getResponseHeaders());\ne.printStackTrace();\n}\n}\n\
    }\n```\n\n**Get all desired fields**\n\n```\nSet tweetFields = new HashSet();\n\
    tweetFields.add(\"non_public_metrics\");\ntweetFields.add(\"promoted_metrics\"\
    );\ntweetFields.add(\"organic_metrics\");\n// Get all available fields excluding\
    \ Tweet Fields 'non_public_metrics', 'promoted_metrics' & 'organic_metrics'\n\
    Get2TweetsIdResponse result = apiInstance.tweets().findTweetById(\"20\")     \
    \   .tweetFields(tweetFields).excludeInputFields().execute();\n// Get all the\
    \ response fields\nGet2TweetsIdResponse result2 = apiInstance.tweets().findTweetById(\"\
    20\").excludeInputFields().execute();\n```\n\n**HelloWorld example**\n\n```\n\
    public class HelloWorld {\npublic static void main(String[] args) {\n/**\n* Set\
    \ the credentials for the required APIs.\n* The Java SDK supports TwitterCredentialsOAuth2\
    \ & TwitterCredentialsBearer.\n* Check the 'security' tag of the required APIs\
    \ in https://api.twitter.com/2/openapi.json in order\n* to use the right credential\
    \ object.\n*/\nTwitterApi apiInstance = new TwitterApi(new TwitterCredentialsBearer(System.getenv(\"\
    TWITTER_BEARER_TOKEN\")));\nSet tweetFields = new HashSet();\ntweetFields.add(\"\
    author_id\");\ntweetFields.add(\"id\");\ntweetFields.add(\"created_at\");\ntry\
    \ {\n// findTweetById\nGet2TweetsIdResponse result = apiInstance.tweets().findTweetById(\"\
    20\")\n.tweetFields(tweetFields)\n.execute();\nif(result.getErrors() != null &&\
    \ result.getErrors().size() > 0) {\nSystem.out.println(\"Error:\");\nresult.getErrors().forEach(e\
    \ -> {\nSystem.out.println(e.toString());\nif (e instanceof ResourceUnauthorizedProblem)\
    \ {\nSystem.out.println(((ResourceUnauthorizedProblem) e).getTitle() + \" \" +\
    \ ((ResourceUnauthorizedProblem) e).getDetail());\n}\n});\n} else {\nSystem.out.println(\"\
    findTweetById - Tweet Text: \" + result.toString());\n}\n} catch (ApiException\
    \ e) {\nSystem.err.println(\"Status code: \" + e.getCode());\nSystem.err.println(\"\
    Reason: \" + e.getResponseBody());\nSystem.err.println(\"Response headers: \"\
    \ + e.getResponseHeaders());\ne.printStackTrace();\n}\n}\n}\n```\n\n**HelloWorld\
    \ example (Streaming)**\n\n```\npublic class HelloWorldStreaming {\npublic static\
    \ void main(String[] args) {\n/**\n* Set the credentials for the required APIs.\n\
    * The Java SDK supports TwitterCredentialsOAuth2 & TwitterCredentialsBearer.\n\
    * Check the 'security' tag of the required APIs in https://api.twitter.com/2/openapi.json\
    \ in order\n* to use the right credential object.\n*/\nTwitterApi apiInstance\
    \ = new TwitterApi(new TwitterCredentialsBearer(System.getenv(\"TWITTER_BEARER_TOKEN\"\
    )));\ntry {\nTweetsStreamListenersExecutor tsle = new TweetsStreamListenersExecutor();\n\
    tsle.stream()\n.streamingHandler(new StreamingTweetHandlerImpl(apiInstance))\n\
    .executeListeners();\nwhile(tsle.getError() == null) {\ntry {\nSystem.out.println(\"\
    ==> sleeping 5 \");\nThread.sleep(5000);\n} catch (InterruptedException e) {\n\
    e.printStackTrace();\n}\n}\nif(tsle.getError() != null) {\nSystem.err.println(\"\
    ==> Ended with error: \" + tsle.getError());\n}\n} catch (ApiException e) {\n\
    System.err.println(\"Status code: \" + e.getCode());\nSystem.err.println(\"Reason:\
    \ \" + e.getResponseBody());\nSystem.err.println(\"Response headers: \" + e.getResponseHeaders());\n\
    e.printStackTrace();\n}\n}\n}\n```\n\nTwitter4J\n\nTwitter4J is an open source\
    \ Java library for the Twitter API. With Twitter4J, you can easily\n\n*   Post\
    \ a tweet\n*   Get the timeline of a user\n*   Get a list of friends and followers\
    \ of a user\n*   Get the favorites of a user\n*   Send and receive direct messages\n\
    *   Search for tweets\n*   Use the Twitter Streaming API\n\nHistory\nIts author,\
    \ Yusuke Yamamoto, used to work for Twitter in 2012.\nWhile he did, he was briefly\
    \ meant to represent Twitter in the Social JSR Expert Group.\nThe last version\
    \ was 4.1.2 in October 2022. After a longer break between 2018 and 2022, it now\
    \ seems reasonably well maintained again. A risk, however, is that Twitter4J so\
    \ far only supports Twitter API v1.1 and with the whole Elon Musk situation at\
    \ Twitter, nobody knows for sure if and how long both will be available. On the\
    \ other hand, with Twitter's workforce decimated to just a mere shadow of pre-Musk\
    \ times, it is unlikely all services are going to be migrated to v2 only in just\
    \ a few weeks. And with a Premium v1.1 API offering some revenue, it isn't likely\
    \ going away overnight without granting paying users a time to migrate to v2 equivalents.\
    \ While Gnip has been purchased by Twitter nearly ten years ago, the Enterprise\
    \ API was only rebranded from Gnip 2.0 very recently, and that process may also\
    \ be hampered by all the developers with experience Musk either fired or made\
    \ leave Twitter on their own.\n\nExamples\n\n**Get a timeline**\n\n```\nimport\
    \ twitter4j.Twitter;\nimport twitter4j.TwitterException;\nimport twitter4j.v1.Status;\n\
    import java.util.List;\nclass Main {\npublic static void main(String[] args) throws\
    \ TwitterException {\nTwitter twitter = Twitter.getInstance();\nList statuses\
    \ = twitter.v1().timelines().getHomeTimeline();\nSystem.out.println(\"Showing\
    \ home timeline.\");\nfor (Status status : statuses) {\nSystem.out.println(status.getUser().getName()\
    \ + \":\" +\nstatus.getText());\n}\n}\n}\n```\n\n**Post a tweet**\n\n```\nimport\
    \ twitter4j.Twitter;\nTwitter twitter = Twitter.getInstance();\nStatus status\
    \ = twitter.v1().tweets().updateStatus(latestStatus);\nSystem.out.println(\"Successfully\
    \ updated the status to [\" + status.getText() + \"].\");\n```\n\n**Search for\
    \ tweets**\n\n```\nimport twitter4j.Twitter;\nimport twitter4j.TwitterException;\n\
    import twitter4j.v1.Query;\nimport twitter4j.v1.QueryResult;\nimport twitter4j.v1.Status;\n\
    class Main {\npublic static void main(String[] args) throws TwitterException {\n\
    Twitter twitter = Twitter.getInstance();\nQuery query = Query.of(\"source:twitter4j\
    \ yusukey\");\nQueryResult result = twitter.v1().search().search(query);\nfor\
    \ (Status status : result.getTweets()) {\nSystem.out.println(\"@\" + status.getUser().getScreenName()\
    \ + \":\" + status.getText());\n}\n}\n}\n```\n\n**Exchange direct messages**\n\
    \n```\nimport twitter4j.Twitter;\nimport twitter4j.TwitterException;\nimport twitter4j.v1.DirectMessage;\n\
    class Main {\npublic static void main(String[] args) throws TwitterException {\n\
    long recipientId = Long.parseLong(args[0]);\nString message = args[1];\nTwitter\
    \ twitter = Twitter.getInstance();\nDirectMessage directMessage = twitter.v1().directMessages().sendDirectMessage(recipientId,\
    \ message);\nSystem.out.printf(\"Sent: %s to @%d%n\", directMessage.getText(),\
    \ directMessage.getRecipientId());\n}\n}\n```\n\n**Streaming API**\n\n```\nimport\
    \ twitter4j.*;\nimport twitter4j.v1.*;\nimport java.io.IOException;\nclass Main\
    \ {\npublic static void main(String[] args) throws TwitterException, IOException\
    \ {\nStatusListener listener = new StatusListener(){\n@Override\npublic void onStatus(Status\
    \ status) {\nSystem.out.println(\"%s : %s\".formatted(status.getUser().getName(),\
    \ status.getText()));\n}\n@Override\npublic void onDeletionNotice(StatusDeletionNotice\
    \ statusDeletionNotice) {}\n@Override\npublic void onTrackLimitationNotice(int\
    \ numberOfLimitedStatuses) {}\n@Override\npublic void onScrubGeo(long userId,\
    \ long upToStatusId) {}\n@Override\npublic void onStallWarning(StallWarning warning)\
    \ {}\n@Override\npublic void onException(Exception ex) {\nex.printStackTrace();\n\
    }\n};\nTwitterStream twitterStream = Twitter.newBuilder()\n.listener(listener).build().v1().stream();\n\
    // sample() method internally creates a thread which manipulates TwitterStream\
    \ and calls these adequate listener methods continuously.\ntwitterStream.sample();\n\
    }\n}\n```\n\n#### Specialized Frameworks\n\nThe following frameworks allow you\
    \ to interact with popular specialized social networks using Java or other JVM\
    \ languages like Kotlin or Groovy for some of them.\n\nEchobox LinkedIn SDK\n\
    `ebx-linkedin-sdk` is a LinkedIn Java client maintained by Echobox, a company\
    \ offering social media and online marketing solutions particularly for the publishing\
    \ and media industry.\n\nInstallation\n\nAdd the following dependency to the Maven\
    \ POM of your project:\n\n```\ncom.echobox\nebx-linkedin-sdk\nx.x.x\n```\n\nThe\
    \ latest version is currently 4.5.0.\n\nIf you enable snapshot repositories in\
    \ your POM you could also use the latest snapshot version:\n\n```\noss.sonatype.org-snapshot\n\
    http://oss.sonatype.org/content/repositories/snapshots\nfalse\ntrue\n```\n\nUsage\
    \ and Examples\n\n**Get LinkedIn credentials:**\n\n1.  Go to [`www.linkedin.com/developers/apps`](http://www.linkedin.com/developers/apps).\n\
    2.  Sign in if you're not logged in yet.\n3.  Click **Create app**.\n4.  If you\
    \ already have a **Company Page**, either select an existing company or select\
    \ **New Company** and enter the company information.\n5.  Under **Create an app**,\
    \ enter values for the following parameters:\n    *   App name – This is the name\
    \ of your application displayed at the end of each post, for example, \"ApressBookDemoApp\"\
    , or your company name.\n    *   LinkedIn page – This is the **Company Page**\
    \ you created earlier, for example, [`https://linkedin.com/company/123456`](https://linkedin.com/company/123456).\n\
    \    *   Privacy policy URL – Link to your privacy policy (optional), for example,\
    \ [`http://www.mysite.com/privacy`](http://www.mysite.com/privacy).\n    *   App\
    \ logo – The logo is displayed to users when they authorize with your app, ideally\
    \ a square image.\n    *   Legal agreement – Check that you have read and agree\
    \ to these terms.\n6.  Click on **Create app**.\n7.  In the **Auth** tab, you'll\
    \ find the **Application credentials** API Key and Client Secret. Click the \"\
    Eye\" button to reveal the client secret. Record these values.\n8.  Under **OAuth\
    \ 2.0 settings**, add a redirect URL for your app, for example, `http://localhost:8080/callback.`\n\
    \n**Request an authorization code:**\n\n1.  If it is a first-time request, the\
    \ permission request timed out, or was manually revoked by the member: the browser\
    \ is redirected to LinkedIn's authorization consent window.\n2.  If there is an\
    \ existing permission grant from the member: the authorization screen is bypassed\
    \ and the member is immediately redirected to the URL provided in the `redirect_uri`\
    \ query parameter.\n3.  When the member completes the authorization process, the\
    \ browser is redirected to the URL provided in the `redirect_uri` query parameter.\n\
    \nTable 6-1\nParameters for Authorization Call\n\n| Parameter | Type | Description\
    \ | Required |\n| --- | --- | --- | --- |\n| `response_type` | string | The value\
    \ of this field should always be `code` | Yes |\n| `client_id` | string | The\
    \ API Key value generated when you registered your application | Yes |\n| `redirect_uri`\
    \ | url | The URI your users are sent back to after authorization. This value\
    \ must match one of the redirect URLs defined in your application configuration.\
    \ For example, `http://localhost:8080/callback` | Yes |\n| `state` | string |\
    \ A unique string value of your choice that is hard to guess. Used to prevent\
    \ CSRF. For example, `state=DCEeFWf45A53sdfKef424` | No |\n| `scope` | string\
    \ | URL-encoded, space-delimited list of member permissions your application is\
    \ requesting on behalf of the user. These must be explicitly requested. For example,\
    \ `scope=r_liteprofile%20r_emailaddress%20w_member_social` | Yes |\n\n```\nGET\
    \ https://www.linkedin.com/oauth/v2/authorization\n```\n\nSample request:\n\n\
    ```\nGET https://www.linkedin.com/oauth/v2/authorization?response_type=code&client_id={your_client_id}&redirect_uri={your_callback_url}&state=foobar&scope=r_liteprofile%20r_emailaddress%20w_member_social\n\
    ```\n\nUse the authorization code to get the access token:\n\n```\nVersionedLinkedInClient\
    \ client = new DefaultVersionedLinkedInClient(Version.DEFAULT_VERSION);\nLinkedInClient.AccessToken\
    \ accessToken = client.obtainUserAccessToken(clientId, clientSecret, redirectURI,\
    \ code);\n```\n\nCreate a LinkedIn Share:\n\n```\nVersionedPostConnection postConnection\
    \ =\nnew VersionedPostConnection(new DefaultLinkedInClient(authToken));\nDistribution\
    \ distribution = new Distribution(Distribution.FeedDistribution.MAIN_FEED);\n\
    String commentary = \"Message here\"\nPost post = new Post(ownerURN, commentary,\
    \ distribution, Post.LifecycleState.PUBLISHED,\nPost.Visibility.PUBLIC);\nString\
    \ articleLink = \"https://www.example.com/1234\";\nString title = \"title\";\n\
    String description = \"description\";\nPostUtils.fillArticleContent(post, articleLink,\
    \ imageURN, title, description);\nURN postURN = postConnection.createPost(post);\n\
    ```\n\nRetrieve an organization from LinkedIn:\n\n```\nVersionedOrganizationConnection\
    \ connection =\nnew VersionedOrganizationConnection(linkedInClient);\nOrganization\
    \ organization = connection.retrieveOrganization(organizationURN, Parameter\n\
    .with(\"projection\",\n\"(elements*,roleAssignee~(localizedFirstName, localizedLastName),\"\
    \n+ \"organizationalTarget~(localizedName)))\"));\n```\n\n#### Discord\n\nThere\
    \ are at least three major Java frameworks for Discord, all very actively developed\
    \ by the community:\n\n*   Discord4J\n*   Java Discord API (JDA)\n*   Javacord\n\
    \nAuthentication\n\nFirst, you need to create an application from the Discord\
    \ Application Dashboard: [`https://discord.com/developers/applications`](https://discord.com/developers/applications).\n\
    \n1.  Sign in if you're not logged in yet.\n2.  Click **New Application**.\n3.\
    \  Pick a name, for example, \"ApressBookDemoApp\", accept the developer terms,\
    \ and click **Create**.\n4.  Under **General Information**, you may enter values\
    \ for the following parameters:\n    *   Name – This is the name of your application\
    \ you entered before.\n    *   App icon – The logo is displayed to users when\
    \ they authorize with your app.\n    *   Description – Enter a short description\
    \ of the application.\n    *   Tags – Up to five tags to describe the content\
    \ and functionality of your application.\n    *   Application ID – The application\
    \ ID to copy into your application.\n    *   Public key – The public key to copy\
    \ into your application.\n    *   Server count – This is an approximation of the\
    \ number of servers your application is in. The value is **read only**.\n    *\
    \   Interactions endpoint URL – You can optionally configure an interactions endpoint\
    \ to receive interactions via HTTP POSTs rather than over Gateway with a bot user.\n\
    \    *   Linked roles verification URL – You can configure a verification URL\
    \ to enable your application as a requirement in a server role's Links settings.\n\
    \    *   Terms of Service URL – Link to your application's Terms of Service (optional).\n\
    \    *   Privacy policy URL – Link to your privacy policy (optional).\n5.  Under\
    \ **OAuth2**, you find the following parameters:\n    *   Client ID – The client\
    \ ID to copy into your application.\n    *   Client Secret – The client secret\
    \ to copy into your application. You must regenerate it at first use and be sure\
    \ to **copy it** as it will not be shown to you again.\n    *   Redirects – You\
    \ must specify at least one URI for authentication to work. If you pass a URI\
    \ in an OAuth request, it must exactly match one of the URIs you enter here.\n\
    6.  Under **Bot**, you find the following parameters:\n    *   Username – This\
    \ is the name of your bot.\n    *   Icon – The logo is displayed to users of your\
    \ bot.\n    *   Token – The token to copy into your application. For security\
    \ purposes, tokens can only be viewed once, when created. If you forgot or lost\
    \ access to your token, please regenerate a new one.\n\nDiscord4J\nDiscord4J is\
    \ a reactive Java wrapper for the official Discord API, using reactive principles\
    \ and the Reactor framework for asynchronous and nonblocking API calls.\n\nInstallation\n\
    \nAdd the following dependency to the Maven POM of your project:\n\n```\ncom.discord4j\n\
    discord4j-core\n3.2.6\n```\n\nQuick Example\n\nIn the following example, whenever\
    \ a user sends a `!ping` message, the bot will immediately respond with `Pong!`:\n\
    \n```\npublic class ExampleBot {\npublic static void main(String[] args) {\nString\
    \ token = args[0];\nDiscordClient client = DiscordClient.create(token);\nGatewayDiscordClient\
    \ gateway = client.login().block();\ngateway.on(MessageCreateEvent.class).subscribe(event\
    \ -> {\nMessage message = event.getMessage();\nif (\"!ping\".equals(message.getContent()))\
    \ {\nMessageChannel channel = message.getChannel().block();\nchannel.createMessage(\"\
    Pong!\").block();\n}\n});\ngateway.onDisconnect().block();\n}\n}\n```\n\nReactive\
    \ Example\n\nThis example shows the same bot, but in a reactive manner, using\
    \ Project Reactor:\n\n```\npublic class ExampleBot {\npublic static void main(String[]\
    \ args) {\nString token = args[0];\nDiscordClient client = DiscordClient.create(token);\n\
    client.login().flatMapMany(gateway -> gateway.on(MessageCreateEvent.class))\n\
    .map(MessageCreateEvent::getMessage)\n.filter(message -> \"!ping\".equals(message.getContent()))\n\
    .flatMap(Message::getChannel)\n.flatMap(channel -> channel.createMessage(\"Pong!\"\
    ))\n.blockLast();\n}\n}\n```\n\nSharding Example\n\nThis example shows multiple\
    \ shard groups under the same JVM:\n\n```\n// the first group will get even shard\
    \ IDs\nShardingStrategy first = ShardingStrategy.builder()\n.count(10)\n.filter(s\
    \ -> s.getIndex() % 2 == 0)\n.build();\n// the second group will get odd shard\
    \ IDs\nShardingStrategy second = ShardingStrategy.builder()\n.count(10)\n.filter(s\
    \ -> s.getIndex() % 2 != 0)\n.build();\nDiscordClient sharedClient = DiscordClient.create(System.getenv(\"\
    token\"));\nShardCoordinator coordinator = LocalShardCoordinator.create();\nGatewayDiscordClient\
    \ firstGroup = sharedClient.gateway()\n.setSharding (first)\n.setEnabledIntents(...)\n\
    .setShardCoordinator(coordinator)\n.login()\n.block();\nGatewayDiscordClient secondGroup\
    \ = sharedClient.gateway()\n.setSharding(second)\n.setEnabledIntents(...)\n.setShardCoordinator(coordinator)\n\
    .login()\n.block();\n```\n\nJava Discord API\nJava Discord API (JDA, not to be\
    \ confused with JTA or Jakarta Transactions) aims to offer a clean Java object\
    \ model around the Discord REST API and Websocket events.\n\nInstallation\n\n\
    Add the following dependency to the Maven POM of your project:\n\n```\nnet.dv8tion\n\
    JDA\nVERSION\n```\n\nConfiguration\n\nBoth `JDABuilder` and `DefaultShardManagerBuilder`\
    \ offer a set of configurations:\n\n```\npublic static void main(String[] args)\
    \ {\nJDABuilder builder = JDABuilder.createDefault(\"token\");\n// Disable parts\
    \ of the cache\nbuilder.disableCache(CacheFlag.MEMBER_OVERRIDES, CacheFlag.VOICE_STATE);\n\
    // Enable the bulk delete event\nbuilder.setBulkDeleteSplittingEnabled(false);\n\
    // Set activity (like \"playing Something\")\nbuilder.setActivity(Activity.watching(\"\
    TV\"));\nJDA jda = builder.build();\n}\n```\n\nEventListener Example\n\nThe following\
    \ example shows how to use the JDA event system:\n\n```\npublic class ReadyListener\
    \ implements EventListener\n{\npublic static void main(String[] args)\nthrows\
    \ InterruptedException\n{\n// Note: It is important to register your ReadyListener\
    \ before building\nJDA jda = JDABuilder.createDefault(\"token\")\n.addEventListeners(new\
    \ ReadyListener())\n.build();\n// optionally block until JDA is ready\njda.awaitReady();\n\
    }\n@Override\npublic void onEvent(GenericEvent event)\n{\nif (event instanceof\
    \ ReadyEvent)\nSystem.out.println(\"API is ready!\");\n}\n}\n```\n\nSharding Example\n\
    \nDiscord allows Bot accounts to share load across sessions by limiting them to\
    \ a fraction of the total connected Guilds/Servers. This can be done using sharding:\n\
    \n```\npublic static void main(String[] args) throws Exception\n{\nJDABuilder\
    \ shardBuilder = JDABuilder.createDefault(\"token\");\n//register your listeners\
    \ here using shardBuilder.addEventListeners(...)\nshardBuilder.addEventListeners(new\
    \ MessageListener());\nfor (int i = 0; i < 10; i++)\n{\nshardBuilder.useSharding(i,\
    \ 10)\n.build();\n}\n}\n```\n\nJavacord\nJavacord is a modern Java library for\
    \ Discord focusing on simplicity and speed. By reducing itself to standard Java\
    \ classes and features like `Optional` or `CompletableFuture,` it is easy to learn\
    \ and use for every Java developer and does not introduce too many concepts or\
    \ abstractions of its own.\n\nInstallation\n\nAdd the following dependency to\
    \ the Maven POM of your project:\n\n```\norg.javacord\njavacord\n3.8.0\npom\n\
    ```\n\nBasic Example\n\nThe following example logs the bot in and replies to every\
    \ `!ping` message with `Pong!`. Note that message content is a privileged Intent\
    \ and needs to be enabled:\n\n```\npublic class MyFirstBot {\npublic static void\
    \ main(String[] args) {\n// Insert your bot's token here\nString token = \"your\
    \ token\";\nDiscordApi api = new DiscordApiBuilder().setToken(token).addIntent(Intent.MESSAGE_CONTENT).login().join();\n\
    // Add a listener which answers with \"Pong!\" if someone writes \"!ping\"\napi.addMessageCreateListener(event\
    \ -> {\nif (event.getMessageContent().equalsIgnoreCase(\"!ping\")) {\nevent.getChannel().sendMessage(\"\
    Pong!\");\n}\n});\n// Print the invite url of your bot\nSystem.out.println(\"\
    You can invite the bot by using the following url: \" + api.createBotInvite());\n\
    }\n}\n```\n\nSlash Command Example\n\nThe following example shows how we can let\
    \ the bot send answers to a simple slash command:\n\n```\npublic class MyFirstBot\
    \ {\npublic static void main(String[] args) {\nString token = \"your token\";\n\
    DiscordApi api = new DiscordApiBuilder().setToken(token).login().join();\napi.addSlashCommandCreateListener(event\
    \ -> {\nSlashCommandInteraction slashCommandInteraction = event.getSlashCommandInteraction();\n\
    if (slashCommandInteraction.getCommandName().equals(\"ping\")) {             \
    \   slashCommandInteraction.createImmediateResponder()\n.setContent(\"Pong!\"\
    )\n.setFlags(MessageFlag.EPHEMERAL) // Only visible for the user which invoked\
    \ the command\n.respond();\n}\n});\n}\n}\n```\n\nMessageBuilder Example\n\nThe\
    \ following example uses the built-in `MessageBuilder`. It is very useful to construct\
    \ complex messages with images, code blocks, embeds, or attachments:\n\n```\n\
    public class MyListener implements MessageCreateListener {\n@Override\npublic\
    \ void onMessageCreate(MessageCreateEvent event) {\nMessage message = event.getMessage();\n\
    if (message.getContent().equalsIgnoreCase(\"!ping\")) {\nevent.getChannel().sendMessage(\"\
    Pong!\");\n}\n}\n}\n```\n\nEventListener Example\n\nFor better readability, it\
    \ is also possible to have listeners in their own class:\n\n```\npublic class\
    \ MyListener implements MessageCreateListener {\n@Override\npublic void onMessageCreate(MessageCreateEvent\
    \ event) {\nMessage message = event.getMessage();\nif (message.getContent().equalsIgnoreCase(\"\
    !ping\")) {\nevent.getChannel().sendMessage(\"Pong!\");\n}\n}\n}\n```\n\nCalling\
    \ the listener:\n\n```\napi.addListener(new MyListener());\n```\n\n#### Twitch4J\n\
    \nTwitch4J is a Java and JVM-based API client for the Twitch REST API Interfaces.\
    \ It supports Java, Kotlin, and Groovy.\n\nInstallation\n\nAdd the following dependency\
    \ to your Maven project POM:\n\n```\ncom.github.twitch4j\ntwitch4j\n1.16.0\n```\n\
    \nUsage and Examples\n\n**Get an access token**:\n\n1.  Log in to the developer\
    \ console [`https://dev.twitch.tv/console`](https://dev.twitch.tv/console) using\
    \ your Twitch account. If you don't have an account, select the **Sign Up** tab\
    \ to create one.\n    *   When you sign up for an account, Twitch sends you an\
    \ email to verify your account. Be sure to open the email and verify your account\
    \ before proceeding.\n    *   You must also enable two-factor authentication (2FA)\
    \ for your account. To enable 2FA, navigate to Security and Privacy, and follow\
    \ the steps for enabling 2FA under the Security section.\n    *   You'll need\
    \ to refresh your console for these changes to take effect.\n2.  Select the **Applications**\
    \ tab on the developer console and then click **Register Your Application**.\n\
    3.  Set **Name** to your application's name. The name must be unique among all\
    \ Twitch applications. Your app's name is listed on the Connections page under\
    \ **Other Connections** if your app requires user consent to access or modify\
    \ the user's resources.\n4.  Set **OAuth Redirect URLs** to the callback URL that\
    \ your app uses for authorizations. After adding your redirect URL, click **Add**.\n\
    5.  Select a **Category** (type of application) that your app belongs to.\n6.\
    \  Click the **I'm not a robot** check box.\n7.  Click **Create**.\n8.  Back in\
    \ the **Applications** tab, locate your app under **Developer Applications**,\
    \ and click **Manage**.\n9.  Note your **Client ID**, which you'll use to get\
    \ your access token and to set the Client-Id header in all API requests. Client\
    \ IDs are considered public and can be embedded in a web page's source.\n10. \
    \ Depending on the flow you use to get a token, you may need a client secret.\
    \ For example, the Authorization Code Grant Flow requires a client secret. Click\
    \ **New Secret** to generate a secret that you'll use to get your access token.\
    \ You must copy the secret and store it somewhere safe. Getting a new secret invalidates\
    \ the previous secret, which might make your API requests fail until you update\
    \ your app.\n\nInitialize and configure Twitch4J Client:\n\n```\nTwitchClient\
    \ twitchClient = TwitchClientBuilder.builder()\n.withEnableHelix(true)\n.build();\n\
    ```\n\nChannels\n\n**Join a channel**\n\n```\ntwitchClient.getChat().joinChannel(\"\
    PlayOverwatch\");\n```\n\n**Write Channel Chat to the Console**\n\n```\npublic\
    \ class WriteChannelChatToConsole {\n/**\n* Register events of this class with\
    \ the EventManager/EventHandler\n*\n* @param eventHandler SimpleEventHandler\n\
    */\npublic WriteChannelChatToConsole(SimpleEventHandler eventHandler) {\neventHandler.onEvent(ChannelMessageEvent.class,\
    \ event -> onChannelMessage(event));\n}\n/**\n* Subscribe to the ChannelMessage\
    \ Event and write the output to the console\n*/\npublic void onChannelMessage(ChannelMessageEvent\
    \ event) {\nSystem.out.printf(\n\"Channel [%s] - User[%s] - Message [%s]%n\",\n\
    event.getChannel().getName(),\nevent.getUser().getName(),\nevent.getMessage()\n\
    );\n}\n}\n```\n\nClips\n\n**Create a clip**\n\n```\nCreateClipList clipData =\
    \ twitchClient.getHelix().createClip(accessToken, \"149223493\", false).execute();\n\
    clipData.getData().forEach(clip -> {\nSystem.out.println(\"Created Clip with ID:\
    \ \" + clip.getId());\n});\n```\n\n**Write a clip's ID to the Console**\n\n```\n\
    ClipList clipList = twitchClient.getHelix().getClips(null, \"488552\", null, null,\
    \ null, null, null, null).execute();\nclipList.getData().forEach(clip -> {\nSystem.out.println(\"\
    Found Clip: \" + clip.getId());\n});\n```\n\nGames\n\n**Write a game's ID and\
    \ name to the Console**\n\n```\nGameList resultList = twitchClient.getHelix().getGames(Arrays.asList(overwatchGameId),\
    \ null).execute();\nresultList.getGames().forEach(game -> {\nSystem.out.println(\"\
    Game ID: \" + game.getId() + \" is \" + game.getName());\n});\n```\n\n#### Vertical\
    \ Frameworks\n\nVertical Social Frameworks allow the integration with domain-specific\
    \ social networks.\n\nGitHub\n\nWhile GitHub/Microsoft itself has no official\
    \ Java API for GitHub, there are two actively maintained APIs offering a domain\
    \ model, besides several others that support it on an REST/OpenID Connect level:\n\
    \n*   GitHub API for Java\n*   GitHub Java Client\n\nBoth offer a variety of authentication\
    \ methods, including a personal access token.\n\nToken Generation\n\nTo generate\
    \ a new token for GitHub REST APIs:\n\n1.  Log in to the GitHub Account\n2.  Go\
    \ to Settings ➤ Developer settings ➤ Personal access tokens\n3.  Click on generate\
    \ a new token\n4.  Confirm the user password to continue\n5.  Add a description\
    \ to the token\n6.  Under the select scopes option, check all the boxes\n7.  Click\
    \ on generate a new token\n\nGitHub API for Java\nGitHub API for Java provides\
    \ an object model around the GitHub REST API. Its creation is led by Kohsuke Kawaguchi,\
    \ the \"father\" of Jenkins CI.\n\nAuthentication\n\nThe GitHub Java library offers\
    \ multiple authentication methods:\n\n*   Username and password (not recommended,\
    \ except for development purposes)\n*   Personal access token\n*   JWT token\n\
    *   GitHub app installation token\n    *   User\n    *   Organization\n\nUsage\
    \ Examples\nWe use a personal access token, following the steps for [Token Generation](#600273_1_En_6_Chapter.xhtml#Sec57).\n\
    \nRepositories\n\nHere's an example of using the GitHub API for Java to connect\
    \ against GitHub and create a new repository before cleaning it up again:\n\n\
    ```\nGitHub github = new GitHubBuilder().withOAuthToken(\"my_personal_token\"\
    ).build();\nGHRepository repo = github.createRepository(\n\"new-repository\",\"\
    this is my new repository\",\n\"https://www.kohsuke.org/\",true/*public*/);\n\
    repo.addCollaborators(github.getUser(\"abcde\"),github.getUser(\"jdoe\"));\nrepo.delete();\n\
    ```\n\nOrganizations\n\nTo create resources in GitHub for an organization, you\
    \ must create an object of type `GHOrganization`:\n\n```\nGHOrganization organizationClient(GitHub\
    \ gitHub, String organizationName) throws IOException {\nreturn gitHub.getOrganization(organizationName);\n\
    }\n```\n\nNow we can work with the `GHOrganization`. Creating a repository or\
    \ any other methods to create resources will do so under that organization:\n\n\
    ```\nvoid createRepository(GHOrganization organization) {\norganization.createRepository(\"\
    repository-name\")\n.private_(true)\n.wiki(false)\n.projects(false)\n.description(\"\
    Description\")\n.allowMergeCommit(true)\n.allowSquashMerge(false)\n.allowRebaseMerge(false)\n\
    .create()\n}\n```\n\nGitHub Java Client\nGitHub Java Client is a small Java library\
    \ for talking to GitHub/GitHub Enterprise and interacting with projects. It is\
    \ maintained by the Swedish Social Music Streaming portal Spotify. It supports\
    \ authentication via access tokens, JWT endpoints, and GitHub Apps (via private\
    \ key).\n\nInstallation\n\nInclude the latest version of `github-client` into\
    \ your project POM:\n\n```\ncom.spotify\ngithub-client\nversion\n```\n\nUsage\
    \ Examples\n\nWe use a personal access token, following the steps for [Token Generation](#600273_1_En_6_Chapter.xhtml#Sec57):\n\
    \n```\nfinal GitHubClient githubClient = GitHubClient.create(URI.create(\"https://api.github.com/\"\
    ), \"my-access-token\");\n```\n\nThis client attempts to mirror the GitHub API\
    \ endpoints. As an example, to get details of a commit, use the `GET /repos/:owner/:repo/commits`\
    \ API call, under the repos API. Therefore, `getCommit` lives under the `RepositoryClient`:\n\
    \n```\nfinal RepositoryClient repositoryClient = githubClient.createRepositoryClient(\"\
    my-org\", \"my-repo\");\nlog.info(repositoryClient.getCommit(\"sha\").get().htmlUrl());\n\
    ```\n\nRepositories\n\nMethods related to check runs or issues are also located\
    \ under the `RepositoryClient`:\n\n```\nfinal ChecksClient checksClient = repositoryClient.createChecksApiClient();\n\
    checksClient.createCheckRun(CHECK_RUN_REQUEST);\nfinal IssueClient issueClient\
    \ = repositoryClient.createIssueClient();\nissueClient.createComment(ISSUE_ID,\
    \ \"comment body\")\n.thenAccept(comment -> log.info(\"created comment \" + comment.htmlUrl()));\n\
    ```\n\nOrganizations\n\nMethods related to teams and memberships are located under\
    \ the `OrganisationClient`:\n\n```\nfinal TeamClient teamClient = organisationClient.createTeamClient();\n\
    final Membership membership =  teamClient.getMembership(\"teamname\");\n```\n\n\
    #### Uber\n\nSimilar to Meta, Uber maintains its own SDKs for a number of popular\
    \ languages including Java.\n\nJava SDK\nThe following examples show how to use\
    \ the Java Rides SDK.\nFirst, you need to register your app on the Uber Developer\
    \ Dashboard: [`https://developer.uber.com/dashboard/`](https://developer.uber.com/dashboard/).\n\
    \nInstallation\n\nAdd the following dependencies to your project (Gradle because\
    \ it supports both Java and Kotlin/Android):\n\n```\ndependencies {\ncompile 'com.uber.sdk:rides:0.5.2'\n\
    }\n```\n\nUse the latest version where available.\n\nExamples\n**Get an Uber session\
    \ with a server token**\n\nWhen you registered your app, you were given a server\
    \ token, client ID, and client secret. Use them to authenticate your application:\n\
    \n```\nSessionConfiguration config = new SessionConfiguration.Builder()\n.setClientId(\"\
    \")\n.setServerToken(\"\")\n.build();\nServerTokenSession session = new ServerTokenSession(config);\n\
    ```\n\n**Get a list of available products**\n\n```\nResponse> response = service.getProducts(37.79f,\
    \ -122.39f).execute();\nList products = response.body();\nString productId = products.get(0).getProductId();\n\
    ```\n\n**Get estimates for time and price**\n\n```\nResponse response = service.getPickupTimeEstimate(37.79f,\
    \ -122.39f, productId).execute()\n```\n\n**Request a ride**"
  raw: "#### Private Key JWT for Client Authentication\n\nOpenID Connect clients that\
    \ are configured by using the oidcLogin element in the Social Media Login feature\
    \ support the `private_key_jwt` client authentication method with OpenID Connect\
    \ token endpoints. The process for enabling this in the Social Media Login feature\
    \ is identical to the OpenID Connect Client 1.0 feature:\n\n```\n\nUse OpenShift\
    \ Service Accounts to Authenticate and\nAuthorize\n\nThe Social Media Login feature\
    \ can be configured to use OpenShift service\naccounts to authenticate and authorize\
    \ protected resource\nrequests. With this configuration, server administrators\
    \ can secure\nendpoints, for example, monitoring and metrics endpoints, that might\n\
    produce sensitive information. The service accounts can authenticate\nthemselves\
    \ by providing a service account token that was created within\nthe OpenShift\
    \ cluster in the request. The following example shows how to\nconfigure the Social\
    \ Media Login feature to use OpenShift service\naccounts as a Single Sign-On provider:\n\
    \n```\nThe `okdServiceLogin`\nelement authenticates all protected resource requests\
    \ received by Open Liberty. The\nOpenShift project that the service account is\
    \ in, is used as the group\nfor the service account for authorization decisions.\n\
    \nUse Active Directory As Authentication Provider\n\nYou can configure an Open\
    \ Liberty server to use Active Directory as an\nauthentication provider for protected\
    \ resources. The `oidcLogin` element\nconfigures a social login by using the OpenID\
    \ Connect protocol. With OpenID\nConnect, the discovery endpoint URL provides\
    \ the information that the\nclient needs to interact with the authentication provider,\
    \ which in this\ncase is Active Directory. In the following example, the `discoveryEndpoint`\n\
    attribute specifies the endpoint URL for Active Directory:\n\n```\n\nKeycloak\n\
    Keycloak [66]\nis an open source identity, access management, and Single Sign-On\n\
    solution for applications and services. Users can authenticate against\nKeycloak\
    \ rather than each individual application, relieving the\napplication from dealing\
    \ with login forms, authentication, or storing\nuser’s identities. Keycloak also\
    \ offers social logins, support\nfor desktop or mobile apps, and integration into\
    \ other solutions\nincluding LDAP, Active Directory, OAuth, OpenID Connect, or\
    \ SAML.\n\nHistory\nKeycloak was created by Bill Burke and Stian Thorgersen in\
    \ 2014\\. The\nfirst release was published in September 2014 after development\
    \ had started\nabout a year before. In 2016, Red Hat switched the Red Hat SSO\
    \ product\nfrom being based on the PicketLink framework to the Keycloak upstream\n\
    project, after it had already merged the PicketLink code base into\nKeycloak.\n\
    Since then, Keycloak saw almost manic release cycles and version\nnumber changes.\
    \ At the end of June 2016 around the time Red Hat made\nKeycloak the basis for\
    \ its SSO product, version 2.0.0 was released.\nAbout a year later, version 3.0.0\
    \ came out, followed by Keycloak 4.0.0\nin June 2018.\nThere probably was a bit\
    \ of an influence by the Java and OpenJDK\nrelease cadence pushing out a new major\
    \ version of the JDK every six\nmonths and a Long-Term Service version every two\
    \ years as of 2021, but\nnot only Keycloak but also other projects by Red Hat\
    \ like WildFly seemed\nversion-crazy after 2019 because Keycloak 5.0.0 was released\
    \ in March\n2019 with 6.0.0 only a month later. And in November 2019, the version\n\
    number had jumped to 8\\. As of August 2021, the most recent Keycloak\nversion\
    \ is 15.0.2\\. While the pace at least on the first digit sometimes\nlooks like\
    \ it slowed down a bit, versions 13`–`15 were all released\nin 2021 alone, which\
    \ makes it look like Red Hat follows a major release nearly every\nthree to four\
    \ months at the very least, sometimes faster with only minor\nslowdown in the\
    \ second half of 2021\\. The release notes are sometimes\njust one-liners, which\
    \ make one wonder how the giant leap of version\nnumbers was justified, but it\
    \ looks like marketing drives it and the\nunderlying WildFly\nnumbers also increase\
    \ even more than Keycloak at 25, with WildFly\n22`–`25 all\nrealized in 2021 as\
    \ well. Starting with version 17.0.0, the default\nKeycloak distribution switched\
    \ from WildFly to Quarkus.\nOn April 10, 2023, Keycloak was accepted by CNCF as\
    \ an incubating\nproject.\n\nOverview\nKeycloak’s goal is to make security simple\
    \ and easy for application\ndevelopers to secure their enterprise apps and services.\n\
    \nConcepts\n\nKeycloak is based on the following concepts:\n\n*   Authentication\n\
    \n*   Authorization\n\n*   Credentials\n\n*   Realm\n\nAuthentication\n\nThis\
    \ is a provider example checking, if the request meets the authenticator’s\nrequirements:\n\
    \n```\npackage org.keycloak.authentication;\npublic interface Authenticator extends\
    \ Provider {\n/**\n* Initial call for the authenticator.  This method should check\
    \ the current HTTP request to determine if the request\n* satisfies the Authenticator's\
    \ requirements.  If it doesn't, it should send back a challenge response by calling\n\
    * the AuthenticationFlowContext.challenge(Response).  If this challenge is a authentication,\
    \ the action URL\n* of the form must point to\n*\n* /realms/{realm}/login-actions/authenticate?code={session-code}&execution={executionId}\n\
    *\n* or\n*\n* /realms/{realm}/login-actions/registration?code={session-code}&execution={executionId}\n\
    *\n* {session-code} pertains to the code generated from AuthenticationFlowContext.generateAccessCode().\
    \  The {executionId}\n* pertains to the AuthenticationExecutionModel.getId() value\
    \ obtained from AuthenticationFlowContext.getExecution().\n*\n* The action URL\
    \ will invoke the action() method described below.\n*\n* @param context\n*/\n\
    void authenticate(AuthenticationFlowContext context);\n/**\n* Called from a form\
    \ action invocation.\n*\n* @param context\n*/\nvoid action(AuthenticationFlowContext\
    \ context);\n/**\n* Does this authenticator require that the user has already\
    \ been identified?  That AuthenticatorContext.getUser() is not null?\n*\n* @return\n\
    */\nboolean requiresUser();\n/**\n* Is this authenticator configured for this\
    \ user?\n*\n* @param session\n* @param realm\n* @param user\n* @return\n*/\nboolean\
    \ configuredFor(KeycloakSession session, RealmModel realm, UserModel user);\n\
    /**\n* Set actions to configure authenticator\n*\n*/\nvoid setRequiredActions(KeycloakSession\
    \ session, RealmModel realm, UserModel user);\n/**\n* Overwrite this if the authenticator\
    \ is associated with\n* @return\n*/\ndefault List getRequiredActions(KeycloakSession\
    \ session) {\nreturn Collections.emptyList();\n}\n/**\n* Checks if all required\
    \ actions are configured in the realm and are enabled\n* @return\n*/\ndefault\
    \ boolean areRequiredActionsEnabled(KeycloakSession session, RealmModel realm)\
    \ {\nfor (RequiredActionFactory raf : getRequiredActions(session)) {\nRequiredActionProviderModel\
    \ rafpm = realm.getRequiredActionProviderByAlias(raf.getId());\nif (rafpm == null)\
    \ {\nreturn false;\n}\nif (!rafpm.isEnabled()) {\nreturn false;\n}\n}\nreturn\
    \ true;\n}\n}\n```\n\nPassword Policies\nMany organizations have special password\
    \ policies. Keycloak has a\nrich set of password\npolicies to choose via the Admin\
    \ Console. There are several\npassword policy types. Hashing the password uses\
    \ the hash algorithm. The\npassword should match combinations of digits, upper-\
    \ and lowercase\ncharacters, special characters, or a regular expression. As well\
    \ as\ncommon security measures like no to contain the username, not use the\n\
    same password multiple times or the expiry date, after which the\npassword must\
    \ be changed.\n\nAuthentication Flow\n\nThe sequence of actions by a user or service\
    \ to authenticate in Keycloak\nis called authentication\nflow:\n\n```\npackage\
    \ org.keycloak.authentication;\npublic interface AuthenticationFlow {\nString\
    \ BASIC_FLOW = \"basic-flow\";\nString FORM_FLOW = \"form-flow\";\nString CLIENT_FLOW\
    \ = \"client-flow\";\nResponse processAction(String actionExecution);\nResponse\
    \ processFlow();\nboolean isSuccessful();\ndefault List getFlowExceptions(){\n\
    return Collections.emptyList();\n}\n}\n```\n\nKeycloak includes various authentication\
    \ flows out of the box. Those\ncan be configured as required, and where your application\
    \ may need\nsomething different, you can always create your own authentication\
    \ flow\nfrom scratch or start by copying an existing one.\n\nFigure [5-1](#600273_1_En_5_Chapter.xhtml#Fig1)\
    \ shows the\navailable authentication flows in a browser:\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig1_HTML.jpg)\n\
    \nA screenshot of a webpage titled key cloak. It consists of available\nauthentications.\
    \ The tabs are flows, findings, required actions,\npassword policy, O T P policy,\
    \ webAuth N passwordless policy, and C B I\nA policy. Here flows option is highlighted.\n\
    \nFigure 5-1\nBrowser Authentication Flows\n\n*   Cookie\n\n*   Identity Provider\
    \ Redirector\n\n*   Forms\n\n    *   Username/Password\n\n    *   OTP\n\n*   Kerberos\n\
    \nAt least one of them has to be enabled for successful\nauthentication.\n\nFor\
    \ Single Sign-On, Keycloak supports two major protocols:\n\n*   OpenID Connect\n\
    \    (OIDC)\n\n*   SAML\n\nOIDC is the preferred method and more commonly used\
    \ with RESTful\nAPIs, while SAML (which we are going to learn more about in the\
    \ next\nsection on Shibboleth) gained more popularity with SOAP Web Services,\
    \ especially in\nthe academic world.\nSAML relies on XML messages and documents,\
    \ while OIDC with REST being\nformat agnostic most often uses JWT for identity\
    \ and access tokens.\n\nFor OIDC, Keycloak defines four main authentication flows:\n\
    \n*   Authorization Code Flow – For browser-based or server-side\n    applications.\n\
    \n*   Implicit Flow – For browser-based applications, this flow is not\n    as\
    \ secure as Authorization Code Flow and deprecated as of OAuth 2.1 so\n    it\
    \ can be used for backward compatibility, but it’s not recommended\n    anymore.\n\
    \n*   Client Credentials Grant – For consumers of RESTful web services,\n    involves\
    \ storing a secret, so the clients should trust the services they\n    consume.\n\
    \nAuthorization\n\nKeycloak supports multiple authorization policies and allows\
    \ to combine\ndifferent access control mechanisms like\n\n*   Attribute-based\n\
    \    access control (ABAC)\n\n*   Role-based access\n    control (RBAC)\n\n* \
    \  User-based access\n    control (UBAC)\n\n*   Context-based\n    access control\
    \ (CBAC)\n\n*   Rule-based access\n    control\n\n*   Time-based access\n    control\n\
    \n*   Custom access control mechanisms via a Policy Provider\n    SPI\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig2_HTML.jpg)\n\
    \nA flow diagram depicts the key cloak authorization. The communication\nbetween\
    \ the client and the server includes policy enforcer, resource\nserver, authorization\
    \ service, policy evaluation, and storage.\n\nFigure 5-2\nKeycloak Authorization\
    \ Architecture\n\nCredentials\nCredentials are\npieces of data that Keycloak uses\
    \ to verify the identity of a user. Some\nexamples are passwords, one-time passwords,\
    \ digital certificates, iris\nscans, or fingerprints.\n\nRealm\nA realm allows\n\
    to manage a set of users, credentials, roles, and groups. A user belongs\nto and\
    \ logs into a realm. Realms are isolated from one another and can\nonly manage\
    \ and authenticate users they control.\n\nFeatures\n\nThe main features\nof Keycloak\
    \ are as follows:\n\n*   Clients (per application)\n\n*   Events\n\n*   Identity\
    \ Providers\n\n    *   OpenID Connect\n\n    *   SAML\n\n    *   Social Login\
    \ `–` Enable login with\n        Google, GitHub, Facebook, Twitter, and other\
    \ social networks\n\n*   Security Defenses\n\n*   UI (Themes)\n\n*   User Management\n\
    \n    *   Users\n\n    *   Groups\n\n    *   Roles\n\n*   User Federation\n\n\
    \    *   LDAP\n\n    *   Active Directory\n\n    *   Custom Providers\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig3_HTML.jpg)\n\
    \nA schematic depicts the main features of the key cloak. It includes\nrealm master\
    \ with client, roles, and security defenses, user federation,\nidentity provider,\
    \ open I D connect, S A M L, and U I themes.\n\nFigure 5-3\nKeycloak Features\n\
    \nClients\nClients in\nKeycloak are entities (applications or services) that wish\
    \ to\nauthenticate a user within a realm. They can also request identity\ninformation\
    \ or an access token so that they can securely invoke other\nservices across the\
    \ network secured by Keycloak. During the\nauthentication process, the client\
    \ needs to send its ID and secret.\nThese credentials are obtained by registering\
    \ the client in the\nauthentication server.\nWith many applications to secure\
    \ and maintain in an organization, it\ncan become tedious to configure protocol\
    \ mappers and scope for all these\nclients. Keycloak lets you define shared client\
    \ configurations in a\nclient template.\n\nEvents\n\nKeycloak provides extensive\
    \ auditing functionalities. Every interaction can be\nrecorded and reviewed. There\
    \ are two kinds of events:\n\n*   Login events\n\n*   Admin events\n\nLogin events\
    \ occur every time a user-related action around authentication takes\nplace, for\
    \ example, login, logout, login attempts that were\nunsuccessful, or when a user\
    \ account gets updated. Admin events are\ntriggered by every change via the Admin\
    \ API, either via Admin Console,\nREST API, or Command-Line Interface. A Listener\
    \ SPI allows you to create\nplug-ins and listen for these events.\n\nHere is an\
    \ example `EventListenerProvider`\nimplementation writing events to `System.out`:\n\
    \n```\npublic class SysoutEventListenerProvider implements EventListenerProvider\
    \ {\nprivate Set excludedEvents;\nprivate Set excludedAdminOperations;\npublic\
    \ SysoutEventListenerProvider(Set excludedEvents, Set excludedAdminOpearations)\
    \ {\nthis.excludedEvents = excludedEvents;\nthis.excludedAdminOperations = excludedAdminOpearations;\n\
    }\n@Override\npublic void onEvent(Event event) {\n// Ignore excluded events\n\
    if (excludedEvents != null && excludedEvents.contains(event.getType())) {\nreturn;\n\
    } else {\nSystem.out.println(\"EVENT: \" + toString(event));\n}\n}\n@Override\n\
    public void onEvent(AdminEvent event, boolean includeRepresentation) {\n// Ignore\
    \ excluded operations\nif (excludedAdminOperations != null && excludedAdminOperations.contains(event.getOperationType()))\
    \ {\nreturn;\n} else {\nSystem.out.println(\"EVENT: \" + toString(event));\n}\n\
    }\nprivate String toString(Event event) {\nStringBuilder sb = new StringBuilder();\n\
    sb.append(\"type=\");\nsb.append(event.getType());\nsb.append(\", realmId=\");\n\
    sb.append(event.getRealmId());\nsb.append(\", clientId=\");\nsb.append(event.getClientId());\n\
    sb.append(\", userId=\");\nsb.append(event.getUserId());\nsb.append(\", ipAddress=\"\
    );\nsb.append(event.getIpAddress());\nif (event.getError() != null) {\nsb.append(\"\
    , error=\");\nsb.append(event.getError());\n}\nif (event.getDetails() != null)\
    \ {\nfor (Map.Entry e : event.getDetails().entrySet()) {\nsb.append(\", \");\n\
    sb.append(e.getKey());\nif (e.getValue() == null || e.getValue().indexOf(' ')\
    \ == -1) {\nsb.append(\"=\");\nsb.append(e.getValue());\n} else {\nsb.append(\"\
    ='\");\nsb.append(e.getValue());\nsb.append(\"'\");\n}\n}\n}\nreturn sb.toString();\n\
    }\nprivate String toString(AdminEvent adminEvent) {\nStringBuilder sb = new StringBuilder();\n\
    sb.append(\"operationType=\");\nsb.append(adminEvent.getOperationType());\nsb.append(\"\
    , realmId=\");\nsb.append(adminEvent.getAuthDetails().getRealmId());\nsb.append(\"\
    , clientId=\");\nsb.append(adminEvent.getAuthDetails().getClientId());\nsb.append(\"\
    , userId=\");\nsb.append(adminEvent.getAuthDetails().getUserId());\nsb.append(\"\
    , ipAddress=\");\nsb.append(adminEvent.getAuthDetails().getIpAddress());\nsb.append(\"\
    , resourcePath=\");\nsb.append(adminEvent.getResourcePath());\nif (adminEvent.getError()\
    \ != null) {\nsb.append(\", error=\");\nsb.append(adminEvent.getError());\n}\n\
    return sb.toString();\n}\n@Override\npublic void close() {\n}\n}\n```\n\nAnd its\
    \ factory:\n\n```\npublic class SysoutEventListenerProviderFactory implements\
    \ EventListenerProviderFactory {\nprivate Set excludedEvents;\nprivate Set excludedAdminOperations;\n\
    @Override\npublic EventListenerProvider create(KeycloakSession session) {\nreturn\
    \ new SysoutEventListenerProvider(excludedEvents, excludedAdminOperations);\n\
    }\n@Override\npublic void init(Config.Scope config) {\nString[] excludes = config.getArray(\"\
    exclude-events\");\nif (excludes != null) {\nexcludedEvents = new HashSet();\n\
    for (String e : excludes) {\nexcludedEvents.add(EventType.valueOf(e));\n}\n}\n\
    String[] excludesOperations = config.getArray(\"excludesOperations\");\nif (excludesOperations\
    \ != null) {\nexcludedAdminOperations = new HashSet();\nfor (String e : excludesOperations)\
    \ {\nexcludedAdminOperations.add(OperationType.valueOf(e));\n}\n}\n}\n@Override\n\
    public void postInit(KeycloakSessionFactory factory) {\n}\n@Override\npublic void\
    \ close() {\n}\n@Override\npublic String getId() {\nreturn \"sysout\";\n}\n}\n\
    ```\n\nUser Federation\nWhen your organization has a user database, Keycloak allows\
    \ us to\nsynchronize with it. By default, it supports LDAP and Active Directory,\n\
    but you can create custom extensions for any identity store using the\nKeycloak\
    \ User storage API.\nKeycloak can also act as a proxy between your users and external\n\
    identity providers.\n\nSocial Identity Providers\nA social identity provider can\
    \ delegate\nauthentication to a trusted social media account. Keycloak includes\n\
    support for social networks like Google, Facebook, Twitter, GitHub,\nLinkedIn,\
    \ Microsoft, and Stack Overflow.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig4_HTML.jpg)\n\
    \nA screenshot of a webpage displays the identity providers. It\nprovides user-defined\
    \ and social. User defines has key cloak open I D\nconnect, open I D connect V\
    \ 1.0, and S A M L-V 2.0\\. Social includes Bit\nBucket, Instagram, PayPal, Facebook,\
    \ and others.\n\nFigure 5-4\nSocial Identity Providers\n\nFacebook\n\n1.  Click\
    \ ***Identity Providers*** in the menu.\n\n2.  From the *Add provider* list, select\
    \ Facebook.\n    Keycloak displays the configuration page for the Facebook identity\n\
    \    provider.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig5_HTML.jpg)\n\
    \nA screenshot of a webpage displays the options for adding a Facebook\nprovider.\
    \ It includes redirect U R I, client I D, client secret, and\ndisplay order with\
    \ add and cancel options.\n\nFigure 5-5\nAdd Facebook As Identity Provider\n\n\
    1.  Copy the value of `Redirect URI` to your\n    clipboard.\n\n2.  In a separate\
    \ browser tab, follow the Facebook Developer Guide’s\n    instructions to create\
    \ a project and client in Facebook.\n\n    1.  Ensure your app is of type website-type.\n\
    \n    2.  Enter the `Redirect URI`’s value into the Site URL of the Facebook Website\
    \ settings\n        block.\n\n    3.  Ensure the app is public.\n\n3.  Enter the\
    \ `Client ID` and `Client Secret` values from your Facebook app into the `Client\
    \ ID` and `Client Secret` fields\n    in Keycloak.\n\n4.  Click *Add*.\n\n5. \
    \ Enter the required scopes into the *Default Scopes* field. By\n    default,\
    \ Keycloak uses the `email` scope. See\n    Graph API for more information about\
    \ Facebook scopes.\n\nBy default, Keycloak sends profile requests to `graph.facebook.com/me?fields=id,name,email,first_name,last_name.`\n\
    The response only contains the `id, name, email, first_name`, and `last_name`\
    \ fields. To fetch\nadditional fields from the Facebook profile, add a corresponding\
    \ scope\nand add the field name in the Additional user’s profile fields\nconfiguration\
    \ option.\n\nSpring Security\nSpring Security\n[67] is a security framework that\
    \ works especially well with the Spring\nFramework or Spring Web MVC and more\
    \ recently Reactive applications\nusing Spring Flux as well. Spring Security is\
    \ a continuation of Acegi\nSecurity, a powerful security framework. But the problem\
    \ was it required\na lot of cumbersome XML configuration to realize it. Spring\
    \ embraced it\ninto the family from version 2.0 and, since then, refined it to\
    \ its\npresent state. Although the XML configuration is still possible,\nSpring’s\
    \ new spirit of convention over configuration also influenced it\nthe same way\
    \ we also see in Jakarta EE. It is possible to perform all\nsecurity configurations\
    \ with annotation rather than XML, although the\nprovision is still there for\
    \ backward compatibility and to leverage\ncertain flexibility. Its primary goal\
    \ is to handle authentication and\nauthorization for web requests and method invocations.\n\
    \nHistory\nSpring Security began two decades ago, in late 2003, as “The Acegi\n\
    Security System for Spring,” initially\ncreated by Ben Alex, based on questions\
    \ asked on the Spring Developers’\nmailing list whether there had been any Spring-based\
    \ security\nimplementation. Back then, the Spring community was relatively small,\n\
    and Spring itself had only existed as a SourceForge project from early\n2003\\\
    . The answer to the question was that it was worthwhile, although a\nlack of time\
    \ and resources prevented its exploration back then.\nWith that in mind, a simple\
    \ security implementation was built but\nremained unreleased. A few weeks later,\
    \ another member of the Spring\ncommunity asked about security, and this code\
    \ was offered to them.\nOther similar questions followed, and by January 2004,\
    \ around 20\npeople were using the code. These initial users were joined by others\n\
    who suggested a SourceForge project of its own,\nwhich was created in March 2004.\n\
    Back then, the project didn’t have its own authentication modules.\nJ2EE Container\
    \ Managed\nSecurity was used for the authentication process, with the first\n\
    version of Acegi Security instead focusing on authorization. This was\nsuitable\
    \ at first, but as more users requested support for additional\ncontainers, the\
    \ limitation of container-specific authentication realm\ninterfaces became evident.\
    \ Adding new JARs to the container’s Classpath\nalso caused issues, which was\
    \ a common source of admin confusion and\nmisconfiguration. Acegi Security authentication\
    \ services were\nintroduced. And around a year later, Acegi Security became an\
    \ official\nSpring Framework subproject. The 1.0.0 final release was published\
    \ in\nMay 2006 `–`\nafter more than two and a half years of production use by\
    \ numerous\nprojects and hundreds of improvement requests and community\ncontributions.\
    \ Acegi Security became an official Spring project toward\nthe end of 2007 and\
    \ was rebranded to “Spring Security.”\n\nOverview\n\nSpring Security is based\
    \ on three main concepts:\n\n*   Authentication\n\n*   Authorization\n\n*   Servlet\
    \ Filters\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig6_HTML.jpg)\n\n\
    A flow diagram for spring security authentication and spring security\nfilter\
    \ chain. The spring security begins with request, authentication\nfilter, manager,\
    \ provider, info, and finally response. The filter chain\nbegins with access authorization\
    \ filter, decision, manager, query, and\nothers.\n\nFigure 5-6\nSpring Security\
    \ Authentication/Authorization Flow\n\nAuthentication\n\nThe main interface for\
    \ authentication in Spring Security is `AuthenticationManager`,\nwhich has just\
    \ one method, `authenticate()`.\n\n```\npublic interface AuthenticationManager\
    \ {\nAuthentication authenticate(Authentication authentication)\nthrows AuthenticationException;\n\
    }\n```\n\nThe most common implementation of `AuthenticationManager`\nis `ProviderManager`,\n\
    which delegates to a chain of `AuthenticationProvider`\ninstances. An `AuthenticationProvider`\n\
    is similar to an `AuthenticationManager`,\nbut it has an extra method allowing\
    \ a caller to check whether it\nsupports a particular authentication type.\n\n\
    ```\npublic interface AuthenticationProvider {\nAuthentication authenticate(Authentication\
    \ authentication)\nthrows AuthenticationException;\nboolean supports(Class authentication);\n\
    }\n```\n\nAuthorization\nThe main element in Spring Security for authorization\
    \ is `AccessDecisionManager`.\nThere are three default implementations provided\
    \ by the framework, and all of\nthem use a chain of `AccessDecisionVoter`\ninstances,\
    \ a bit like the `ProviderManager` does\nwith instances of `AuthenticationProvider`.\n\
    \nAn `AccessDecisionVoter<S>`\nuses an `Authentication` (a\nprincipal) and a secure\
    \ object, decorated by a `ConfigAttribute`:\n\n```\nboolean supports(ConfigAttribute\
    \ attribute);\nboolean supports(Class clazz);\nint vote(Authentication authentication,\
    \ S object,\nCollection attributes);\n```\n\nThe interface `ConfigAttribute`\n\
    encapsulates access information metadata in a secured resource. Figure\n[5-7](#600273_1_En_5_Chapter.xhtml#Fig7)\
    \ shows the\nhierarchy of configuration attributes.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig7_HTML.jpg)\n\
    \nA hierarchy of the configuration attributes. It includes security\nconfig, pre\
    \ invocation attribute, post invocate attribute, abstract\nexpression based method\
    \ config attribute, and web expression config\nattribute.\n\nFigure 5-7\nConfig\
    \ Attribute Hierarchy\n\nServlet Filters\n\nThe web tier of Spring\nSecurity is\
    \ based on standard Jakarta EE Servlet Filters,\nalthough as of Spring Security\
    \ and Framework 5, that is at most Jakarta\nEE 8\\. The Spring Security filter\
    \ chain builds on several filters to\ncover different security constraints of\
    \ a web application. Figure [5-8](#600273_1_En_5_Chapter.xhtml#Fig8) shows the\n\
    typical chain of these filters for a single HTTP request.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig8_HTML.png)\n\
    \nA typical chain for a single H T T P request. It begins with client,\nfollowed\
    \ by three filter layers, and servlet.\n\nFigure 5-8\nFilter Chain for a Single\
    \ HTTP Request\n\nFor the container, Spring Security is basically a single filter,\n\
    composed of\nmultiple filters for different purposes. Spring Security is installed\
    \ as\na single filter in the chain. This filter, named `FilterChainProxy,`\ncontains\
    \ all the details about the different security filters available\nthrough the\
    \ security filter chain. Using the Proxy Pattern, it\ndetermines which `SecurityFilterChain`\n\
    will be invoked for an incoming request.\n\nHere’s an example:\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig9_HTML.jpg)\n\
    \nA typical filter chain proxy. It begins with client, filter, filter\nchain proxy,\
    \ spring security filters includes three layers of filters,\nand finally servlet.\n\
    \nFigure 5-9\nFilter Chain Proxy\n\nHowever, `FilterChainProxy` is\nnot called\
    \ directly but via the `DelegatingFilterProxy`\nfilter. Using it, you will see\
    \ something like this in the `web.xml` file of your\nweb application:\n\n```\n\
    myFilter\norg.springframework.web.filter.DelegatingFilterProxy\n\nmyFilter\n/*\n\
    \n```\n\nSocial Login\nOAuth 2 support for authentication providers like Facebook,\
    \ Google,\nand GitHub is\nbuilt into Spring Security 5\\. Here are the examples\
    \ of OAuth 2 client\nconfiguration for them.\n\nConfigure Authentication Provider\n\
    First, configure the social authentication provider of your\nchoice.\n\nFacebook\n\
    \nConfigure `Client ID` and `Client Secret` in your `application.properties`:\n\
    \n```\nspring.security.oauth2.client.registration.facebook.client-id = \nspring.security.oauth2.client.registration.facebook.client-secret\
    \ = \n```\n\nTo get Facebook App ID and App secret credentials, you will need\
    \ to\ncreate a new application with Facebook at [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/).\n\
    \nConfigure HTTP Security\nNext use the `@EnableWebSecurity`\nannotation and configure\
    \ the `HTTPSecurity`\nobject.\n\nCreate a new Java class in your project and make\
    \ it extend the `WebSecurityConfigurerAdapter`.\nAnnotate this class with a `@EnableWebSecurity`\n\
    annotation:\n\n```\nimport org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
    @EnableWebSecurity\npublic class WebSecurity extends WebSecurityConfigurerAdapter\
    \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http.authorizeRequests()\n.antMatchers(\"/\").permitAll()\n.anyRequest().authenticated()\n\
    .and()\n.oauth2Login()\n.and()\n.logout().logoutSuccessUrl(\"/\");\n}\n}\n```\n\
    \nThat will make our application redirect users to a social login\nprovider for\
    \ authentication. Once a user successfully authenticates with\nthe social login\
    \ provider, they will be redirected back to the protected\npage of our application\
    \ they have initially requested. Notice we also\nenabled the logout functionality\
    \ and configured the logout successful\nURL.\n\nCreate a Protected Page\n\nThe\
    \ following example will create a Controller class with a single\nresource called\
    \ “users”:\n\n```\nimport org.springframework.security.core.annotation.AuthenticationPrincipal;\n\
    import org.springframework.security.oauth2.core.user.OAuth2User;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    @Controller\npublic class UsersController {\n@GetMapping(\"/users\")\npublic String\
    \ getUser(Model model, @AuthenticationPrincipal OAuth2User principal) {\nif (principal\
    \ != null) {\nmodel.addAttribute(\"name\", principal.getAttribute(\"name\"));\n\
    }\nreturn \"user\";\n}\n}\n```\n\nWhen the `/users` resource is\nrequested, our\
    \ application will redirect users to authenticate with a\nsocial login provider.\
    \ If authentication is successful, the user will be\nredirected back to the `/users`\
    \ resource.\nBecause authentication was successful, we can get information about\
    \ the\ncurrently authenticated user via the `@AuthenticationPrincipal`\nannotation,\
    \ which will help us access the OAuth2User object. The `OAuth2User` is a\nprincipal\
    \ object we can obtain details for.\n\nMicronaut Security\nMicronaut\nSecurity\
    \ is a security framework for Micronaut applications [68].\nMicronaut is generally\
    \ similar to Spring Boot but has a better startup\ntime in most cases. The JAR\
    \ files are smaller, and it consumes less\nmemory at runtime.\nOf course each\
    \ “Microframework” tries to optimize performance with\nevery new version, and\
    \ those differences may vary from release to\nrelease.\n\nFeatures\n\nThe main\
    \ features of Micronaut Security\ninclude\n\n*   Authentication\n\n*   Authorization\n\
    \n*   Security Rules\n\n*   Security Events\n\n*   Token Propagation\n\nSecure\
    \ a Micronaut Application with Google\nAfter you installed Micronaut, follow the\n\
    step-by-step guide: [`https://guides.micronaut.io/latest/micronaut-oauth2-oidc-google-gradle-java.html`](https://guides.micronaut.io/latest/micronaut-oauth2-oidc-google-gradle-java.html)\n\
    \nIf you prefer Maven, under step 4, call\n\n```\nmn create-app example.micronaut.micronautguide\
    \ --build=maven --lang=java\n```\n\nApache Shiro\n\nApache Shiro is\nan open source\
    \ security framework that provides application developers\nintuitive, simple ways\
    \ of supporting\n\n*   Authentication\n\n*   Authorization\n\n*   Cryptography\n\
    \n*   Session Management\n\nThe word “shiro” means castle in Japanese.\n\nHistory\n\
    Shiro was created out of developer’s needs not met by standards\naround that time.\
    \ Les Hazlewood and Jeremy Haile created a security\nframework named\nJSecurity\
    \ at SourceForge between 2004 and 2008 because they could not\nfind an existing\
    \ Java security framework suitable for their needs and\nJAAS (we already learned\
    \ about in Chapter [1](#600273_1_En_1_Chapter.xhtml)) did not work well for them.\
    \ Their\neffort started roughly around the same time as Acegi Security in 2004,\n\
    also at SourceForge, which was then the largest independent open source\nhosting\
    \ community, a lot like GitHub is now. JSecurity attracted more\ncommitters including\
    \ Peter Ledbrook, Alan Ditzel, or Tim Veil.\nIn 2008, JSecurity was submitted\
    \ to the Apache Software Foundation\nand accepted into its Incubator program mentored\
    \ toward becoming a\ntop-level Apache project. Under the ASF Incubator, JSecurity\
    \ was first\nrenamed Ki (pronounced “Key”), only to be soon renamed Shiro due\
    \ to\ntrademark concerns. The project grew in the Apache Incubator, adding\nKalle\
    \ Korhonen as committer. In July 2010, the Shiro team released its\nofficial version\
    \ 1.0\\. Following the release of the first version, the\nShiro project created\
    \ a Project Management Committee (PMC) and elected\nLes Hazlewood as its chair.\
    \ On September 22, 2010, Shiro became a\ntop-level Apache project.\n\nOverview\n\
    \nShiro is based on three core concepts:\n\n*   Subject\n\n*   SecurityManager\n\
    \n*   Realm\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig10_HTML.jpg)\n\
    \nA schematic flow of the shiro concept. It begins with application\ncode, followed\
    \ by subject-the current user, shiro security\nmanager-manages all subjects, and\
    \ realm-access the security data.\n\nFigure 5-10\nShiro Concepts\n\nSubject\n\
    The `Subject` is\nbasically a “view” of the current user. While “User” suggests\
    \ a human\nperson, a “Subject” can also be a service or a corporate entity.\n\n\
    SecurityManager\nThe `SecurityManager`,\nnot to be mistaken for the API type soon\
    \ to be removed from the JDK, is\nthe central element of Shiro’s architecture.\n\
    \nRealm\nA realm\nmanages a set of users, roles, and permissions. A user belongs\
    \ to and\nlogs into a realm. Realms are isolated from one another and can only\n\
    manage and authenticate users they control. Realms usually have a direct\ncorrelation\
    \ with a data source, for example, a database, LDAP directory,\nfile system, or\
    \ a similar resource.\n\nFeatures\n\nFigure [5-11](#600273_1_En_5_Chapter.xhtml#Fig11)\
    \ shows the main\nconcerns of Shiro as well as other supporting features.\n\n\
    ![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig11_HTML.jpg)\n\nAn overall concerns\
    \ of shiro and other supporting features. The\nprimary concerns are authentication,\
    \ authorization, session management,\nand cryptography. The supporting features\
    \ are web support, caching,\nconcurrency, testing, run as, and remember me.\n\n\
    Figure 5-11\nShiro Features\n\n*   Authentication across multiple pluggable data\
    \ sources including\n\n    *   LDAP/Active Directory\n\n    *   JDBC\n\n    *\
    \   JNDI\n\n*   Authorization based on roles or fine-grained permissions\n\n \
    \   *   Know if a user is assigned a certain role or not.\n\n    *   Know if a\
    \ user is allowed to do something or not.\n\n*   Session Management `–` Use in\
    \ both web and\n    “serverless,” or any environment where Single Sign-On, clustered,\
    \ or\n    distributed sessions are required.\n\n*   Cryptography `–` Secure data\
    \ with\n    cryptographic algorithms beyond the standard Java ciphers and hashes,\n\
    \    yet easy to use.\n\nOther supporting Shiro features are as follows:\n\n*\
    \   Web Support `–` Helps secure web\n    applications\n\n*   Caching, to ensure\
    \ applications run fast and efficient\n\n*   Concurrency, supporting multithreaded\
    \ applications\n\n*   Test Support `–` Helping to write\n    unit or integration\
    \ tests to check if your applications are as secure as\n    expected\n\n*   “Run\
    \ As”, allowing users to assume the identity of another user,\n    a bit like\
    \ the “sudo” command on Linux\n\n*   “Remember Me” to remember users across sessions,\
    \ allowing them to\n    only log in when required, for example, if the session\
    \ expired\n\nAuthentication\n\nShiro aims to make authentication\nintuitive and\
    \ easy to use despite a variety of features; these are the\nhighlights:\n\n* \
    \  Subject Based\n\n*   Single Method Call\n\n*   Detailed Exception Hierarchy\n\
    \n*   Built-in “Remember Me”\n\n*   Pluggable Data Sources\n\n*   Using Multiple\
    \ Realms\n\nSteps to Authenticate a Subject\n\nAuthenticating a `Subject` can\
    \ be broken down\ninto three steps:\n\n1.  Collect the Subject’s submitted principals\
    \ and credentials.\n\n2.  Submit the principals and credentials for authentication.\n\
    \n3.  If the submission was successful, grant access; otherwise, retry\n    authentication\
    \ or block access.\n\nHere’s how to use Shiro’s API for these steps:\n\nCollect\
    \ the Subject’s submitted principals and\ncredentials\n\n```\n//Most common scenario\
    \ of username/password pair:\nUsernamePasswordToken token = new UsernamePasswordToken(username,\
    \ password);\n//\"Remember Me\" built-in:\ntoken.setRememberMe(true);\n```\n\n\
    In this case, we used the `UsernamePasswordToken`,\nsupporting the most common\
    \ username/password authentication approach.\nThis is an implementation of Shiro’s\
    \ `org.apache.shiro.authc.AuthenticationToken`\ninterface, which is the base interface\
    \ of Shiro’s authentication system\nto represent submitted principals and credentials.\n\
    Shiro does not care how you acquire this information: perhaps the\ndata was entered\
    \ via HTML form, or maybe retrieved from an HTTP header,\nor maybe through command-line\
    \ arguments. The process\nof an application collecting information from users\
    \ is completely\ndecoupled from Shiro’s `AuthenticationToken`\nconcept.\nYou may\
    \ construct and represent `AuthenticationToken`\ninstances any way you like; it\
    \ is protocol agnostic.\nThis example also shows that we have indicated that we\
    \ wish Shiro to\nperform “Remember Me” services for authentication.\n\nAuthorization\n\
    \nAuthorization has\nthree main elements:\n\n*   Permission\n\n*   Role\n\n* \
    \  User (Subject)\n\nPermissions\nPermissions are an essential aspect of security\
    \ policies. They allow\nwhat can be done in an application. Common permissions\
    \ for data elements\nare Create, Read, Update, and Delete, commonly known as\n\
    *CRUD*.\n\nGranularity\n\nShiro allows very fine-grained permissions where required,\
    \ in any\ngranularity, for example:\n\n*   Resource level – The broadest definition,\
    \ for example, allowing a\n    user to edit customer records or finances\n\n*\
    \   Instance level – Permissions that are specific to a particular\n    instance\
    \ of a resource, not just the general type, such as allowing a\n    user to access\
    \ the customer records of IBM, but not Red Hat\n\n*   Attribute level – Allowing\
    \ to specify permissions for an\n    attribute of an instance or resource, for\
    \ example, the home address or\n    work address of an IBM employee\n\nHere’s\
    \ a permission example. We check if users have permission to print\nusing a “Colour\
    \ Printer” and those who\ndo will see a “print” button, the others don’t. This\
    \ is an example of an\ninstance level permission.\n\n```\nSubject currentUser\
    \ = SecurityUtils.getSubject();\nPermission printPermission = new PrinterPermission(\"\
    ColourPrinter\",\"print\");\nIf (currentUser.isPermitted(printPermission)) {\n\
    // show the print button?)\n} else {\n// don’t show the button?\n}\n```\n\nUsers\n\
    \nA user or “Subject” (because as mentioned, it can also be a service or\ncorporate\
    \ entity) can be any actor in your application. In most cases, you’d obtain the\n\
    current `Subject`\nby using `org.apache.shiro.SecurityUtils`:\n\n```\nSubject\
    \ currentUser = SecurityUtils.getSubject();\n```\n\nRoles\nRemember the RBAC from\
    \ Chapter [2](#600273_1_En_2_Chapter.xhtml); roles are a set of permissions,\n\
    allowing to assign permissions to a role instead of each individual\nuser.\n\n\
    Shiro provides two types of roles:\n\n*   Implicit roles\n\n*   Explicit roles\n\
    \nApplication role checks are usually the assignment of an\n**implicit** role.\
    \ A user with the role “administrator” can\nview customer data. The names of the\
    \ roles are not necessarily related\nto a business requirement or scenario, while\
    \ an\n**explicit** role already comes with permissions it needs.\nFor example,\
    \ a user with the role “editor” has the “publish chapters”\npermission assigned\
    \ to it.\n\n```\nRealm realm = new MyPublishingRealm();\nSecurityManager securityManager\
    \ = new DefaultSecurityManager(realm);\nSecurityUtils.setSecurityManager(securityManager);\n\
    Subject currentUser = SecurityUtils.getSubject();\nif (!currentUser.isAuthenticated())\
    \ {\nUsernamePasswordToken token\n= new UsernamePasswordToken(\"user\", \"password\"\
    );\ntoken.setRememberMe(true);\ntry {\ncurrentUser.login(token);\n} catch (UnknownAccountException\
    \ uae) {\nlog.error(\"Username Not Found!\", uae);\n} catch (IncorrectCredentialsException\
    \ ice) {\nlog.error(\"Invalid Credentials!\", ice);\n} catch (LockedAccountException\
    \ lae) {\nlog.error(\"Your Account is Locked!\", lae);\n} catch (AuthenticationException\
    \ ae) {\nlog.error(\"Unexpected Error!\", ae);\n}\n}\nlog.info(\"User [\" + currentUser.getPrincipal()\
    \ + \"] logged in successfully.\");\nif (currentUser.hasRole(\"admin\")) {\nlog.info(\"\
    Welcome Admin\");\n} else if(currentUser.hasRole(\"editor\")) {\nlog.info(\"Welcome,\
    \ Editor!\");\n} else if(currentUser.hasRole(\"author\")) {\nlog.info(\"Welcome,\
    \ Author\");\n} else {\nlog.info(\"Welcome, Guest\");\n}\nif(currentUser.isPermitted(\"\
    chapters:write\")) {\nlog.info(\"You can write a chapter\");\n} else {\nlog.info(\"\
    You are not permitted to write a chapter!\");\n}\nif(currentUser.isPermitted(\"\
    chapters:save\")) {\nlog.info(\"You can save chapters\");\n} else {\nlog.info(\"\
    You can not save chapters\");\n}\nif(currentUser.isPermitted(\"chapters:publish\"\
    )) {\nlog.info(\"You can publish chapters\");\n} else {\nlog.info(\"You can not\
    \ publish chapters\");\n}\nSession session = currentUser.getSession();\nsession.setAttribute(\"\
    key\", \"value\");\nString value = (String) session.getAttribute(\"key\");\nif\
    \ (value.equals(\"value\")) {\nlog.info(\"Retrieved the correct value! [\" + value\
    \ + \"]\");\n}\ncurrentUser.logout();\n```\n\nSession Management\n\nOnce we got\
    \ the current user, we can retrieve\ntheir session:\n\n```\nSession session =\
    \ currentUser.getSession();\nsession.setAttribute( \"key\", \"value\" );\n```\n\
    \nThe `Session`\nis a Shiro-specific instance containing most of what you’d know\
    \ from the\nJakarta Servlet `HttpSession` with a few extras, and\nit is independent\
    \ of an HTTP environment.\nInside a web application, the `Session` will be `HttpSession`\
    \ based.\nBut in a non-web environment, Shiro will automatically use its own\n\
    Session Management by default. This means you get to use the same API in\nyour\
    \ applications, regardless of the deployment environment. This opens\nnew possibilities\
    \ especially for “serverless” applications, as the\napplication requiring sessions\
    \ does not need to use HttpSession or EJB\nStateful Session Beans.\n\nCryptography\n\
    \nThe main cryptography aspects of Shiro are\nas follows:\n\n*   Simplicity\n\n\
    *   Cipher features\n\n*   Hash features\n\nSocial Login\nThe following example\
    \ shows how to handle Facebook login for a Shiro\napplication.\n\nCreate a Facebook\
    \ App\nTo get Facebook App ID and App secret credentials, you will need to\ncreate\
    \ a new application with Facebook at [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/).\n\
    \nExample Code\n\nFacebook user details:\n\n```\npackage com.example.facebook;\n\
    /**\n* Simple class for holding Facebook user data\n*/\nclass FacebookUserDetails\
    \ {\n// jsonString Expected to be something like this:\n// email\n// {\n// \"\
    education\": [{\n// \"school\": {\n// \"id\": \"123456789012345\",\n// \"name\"\
    : \"Vienna University of Technology \"\n// },\n// \"type\": \"Graduate School\"\
    ,\n// \"with\": [{\n// \"id\": \"123456789\",\n// \"name\": \"BRG\"\n// }]\n//\
    \ }],\n// \"first_name\": \"Werner\",\n// \"id\": \"123456789\",\n// \"last_name\"\
    : \"Keil\",\n// \"link\":\n// \"http://www.facebook.com/profile.php?id=123456789\"\
    ,\n// \"locale\": \"de_DE\",\n// \"name\": \"Werner Keil \",\n// \"updated_time\"\
    : \"2023-05-15T14:51:05+0000\",\n// \"verified\": true\n// }\nprivate String jsonString;\n\
    public FacebookUserDetails(String fbResponse){\njsonString = fbResponse;\nJSONObject\
    \ respJson;\ntry {\nrespJson = new JSONObject(fbResponse);\nthis.id = respJson.getString(\"\
    id\");\nthis.firstName = respjson.has(\"first_name\") ? respJson.getString(\"\
    first_name\") : \" no name\" + id;\nthis.lastName = respJson.has(\"last_name\"\
    ) ? respJson.getString(\"last_name\") : \"\";\nthis.email = respJson.has(\"email\"\
    ) ? respJson.getString(\"email\") : \"-no email-\";\n} catch (JSONException e)\
    \ {\nSystem.out.println( \"fbResponse:\"+fbResponse );\nthrow new RuntimeException(e);\n\
    }\n}\npublic String toString(){\nreturn jsonString;\n}\npublic String getId()\
    \ {\nreturn id;\n}\npublic void setId(String id) {\nthis.id = id;\n}\npublic String\
    \ getFirstName() {\nreturn firstName;\n}\npublic void setFirstName(String firstName)\
    \ {\nthis.firstName = firstName;\n}\npublic String getLastName() {\nreturn lastName;\n\
    }\npublic void setLastName(String lastName) {\nthis.lastName = lastName;\n}\n\
    public String getEmail() {\nreturn email;\n}\npublic void setEmail(String email)\
    \ {\nthis.email = email;\n}\n}\n```\n\nFacebook Realm:\n\n```\npackage com.example.facebook;\n\
    import java.io.ByteArrayOutputStream;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
    import java.net.MalformedURLException;\nimport java.net.URL;\nimport java.util.HashMap;\n\
    import java.util.Map;\nimport java.util.Properties;\nimport org.apache.shiro.authc.AuthenticationException;\n\
    import org.apache.shiro.authc.AuthenticationInfo;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    import org.apache.shiro.authz.AuthorizationInfo;\nimport org.apache.shiro.realm.AuthorizingRealm;\n\
    import org.apache.shiro.subject.PrincipalCollection;\npublic class FacebookRealm\
    \ extends AuthorizingRealm {\nprivate static final Properties props = new FacebookProperties().getProperties();\n\
    private static final String APP_SECRET = props.get(\"fbAppSecret\").toString();\n\
    private static final String APP_ID = props.get(\"fbAppId\").toString();\nprivate\
    \ static final String REDIRECT_URL = props.get(\"fbLoginRedirectURL\").toString();\n\
    @Override\npublic boolean supports(AuthenticationToken token) {\nif (token instanceof\
    \ FacebookToken) {\nreturn true;\n}\nreturn false;\n}\n@Override\nprotected AuthorizationInfo\
    \ doGetAuthorizationInfo(PrincipalCollection principals) {\nreturn new FacebookAuthorizationInfo();\n\
    }\n@Override\nprotected AuthenticationInfo doGetAuthenticationInfo(AuthenticationToken\
    \ token) throws AuthenticationException {\nFacebookToken facebookToken = (FacebookToken)\
    \ token;\nif (facebookToken.getCode() != null && facebookToken.getCode().trim().length()\
    \ > 0) {\nURL authUrl;\ntry {\nauthUrl = new URL(\"https://graph.facebook.com/oauth/access_token?\"\
    \ + \"client_id=\" + APP_ID\n+ \"&redirect_uri=\" + REDIRECT_URL + \"&client_secret=\"\
    \ + APP_SECRET + \"&code=\"\n+ facebookToken.getCode());\nString authResponse\
    \ = readURL(authUrl);\nSystem.out.println(authResponse);\nString accessToken =\
    \ getPropsMap(authResponse).get(\"access_token\");\nURL url = new URL(\"https://graph.facebook.com/me?access_token=\"\
    \ + accessToken);\nString fbResponse = readURL(url);\nFacebookUserDetails userDetails\
    \ = new FacebookUserDetails(fbResponse);\nreturn new FacebookAuthenticationInfo(userDetails,\
    \ this.getName());\n} catch (MalformedURLException e1) {\ne1.printStackTrace();\n\
    throw new AuthenticationException(e1);\n} catch (IOException ioe) {\nioe.printStackTrace();\n\
    throw new AuthenticationException(ioe);\n} catch (Throwable e) {\ne.printStackTrace();\n\
    }\n}\nreturn null;\n}\nprivate String readURL(URL url) throws IOException {\n\
    ByteArrayOutputStream baos = new ByteArrayOutputStream();\nInputStream is = url.openStream();\n\
    int r;\nwhile ((r = is.read()) != -1) {\nbaos.write(r);\n}\nreturn new String(baos.toByteArray());\n\
    }\nprivate Map getPropsMap(String someString) {\nString[] pairs = someString.split(\"\
    &\");\nMap props = new HashMap();\nfor (String propPair : pairs) {\nString[] pair\
    \ = propPair.split(\"=\");\nprops.put(pair[0], pair[1]);\n}\nreturn props;\n}\n\
    }\n```\n\nThe `CredentialsMatcher`\nclass shouldn’t have to do much, as Facebook\
    \ is matching the credentials\nfor us:\n\n```\npackage com.example.facebook;\n\
    import org.apache.shiro.authc.AuthenticationInfo;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    import org.apache.shiro.authc.credential.CredentialsMatcher;\npublic class FacebookCredentialsMatcher\
    \ implements CredentialsMatcher {\n/**\n* Just confirms the right kind of token,\
    \ credentials checking is done by facebook OAuth\n*/\n@Override\npublic boolean\
    \ doCredentialsMatch(AuthenticationToken token, AuthenticationInfo info) {\nif(info\
    \ instanceof FacebookAuthenticationInfo){\nreturn true;\n}\nreturn false;\n}\n\
    }\n```\n\nThen create a Facebook token class, used to hold the “code” provided\
    \ by\nFacebook:\n\n```\npackage com.example.facebook;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    public class FacebookToken implements AuthenticationToken {\nprivate static final\
    \ long serialVersionUID = 1L;\nprivate final String code;\npublic FacebookToken(String\
    \ code){\nthis.code = code;\n}\n@Override\npublic Object getPrincipal() {\nreturn\
    \ null; // Unknown - Facebook does the login\n}\n@Override\npublic Object getCredentials()\
    \ {\nreturn null; // credentials handled by Facebook - we don't need them\n}\n\
    public String getCode() {\nreturn code;\n}\npublic void setCode(String code) {\n\
    this.code = code;\n}\n}\n```\n\nA `FacebookAuthenticationInfo`\nclass:\n\n```\n\
    package com.example.facebook;\nimport java.util.ArrayList;\nimport java.util.Collection;\n\
    import org.apache.shiro.authc.AuthenticationInfo;\nimport org.apache.shiro.subject.PrincipalCollection;\n\
    import org.apache.shiro.subject.SimplePrincipalCollection;\npublic class FacebookAuthenticationInfo\
    \ implements AuthenticationInfo {\nprivate static final long serialVersionUID\
    \ = 1L;\nprivate PrincipalCollection principalCollection;\npublic FacebookAuthenticationInfo(FacebookUserDetails\
    \ facebookUserDetails, String realmName){\nCollection principals = new ArrayList();\n\
    principals.add(facebookUserDetails.getId());\nprincipals.add(facebookUserDetails.getFirstName()+\"\
    \ \"+facebookUserDetails.getLastName());\nthis.principalCollection = new SimplePrincipalCollection(principals,\
    \ realmName);\n}\n@Override\npublic PrincipalCollection getPrincipals() {\nreturn\
    \ principalCollection;\n}\n@Override\npublic Object getCredentials() {\nreturn\
    \ null; // no credentials required\n}\n}\n```\n\nNow create a Facebook login servlet\
    \ to handle the redirection from\nFacebook:\n\n```\npackage com.example.facebook;\n\
    import java.io.IOException;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServlet;\n\
    import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    import org.apache.shiro.SecurityUtils;\nimport org.apache.shiro.authc.AuthenticationException;\n\
    import uk.co.mrdw.shiro.facebook.FacebookToken;\n/**\n* Simple Facebook Login\
    \ Handler, using Apache Shiro\n*/\npublic class FacebookLoginServlet extends HttpServlet\
    \ {\nprivate static final long serialVersionUID = 1L;\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException, IOException\
    \ {\nString code = request.getParameter(\"code\");\nFacebookToken facebookToken\
    \ = new FacebookToken(code);\ntry {\nSecurityUtils.getSubject().login(facebookToken);\n\
    response.sendRedirect(response.encodeRedirectURL(\"index.jsp\"));\n}\ncatch(AuthenticationException\
    \ ae){\nthrow new ServletException(ae);\n}\n}\nprotected void doPost(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException,\nIOException\
    \ {\nSystem.out.println(\"Error during doPost ...\");\n}\n}\n```\n\nshiro.ini:\n\
    \n```\n[main]\nrealmA = com.example.dao.RoleSecurityJdbcRealm\nfbCredentialsMatcher\
    \ = com.example.shiro.facebook.FacebookCredentialsMatcher\nrealmB = com.example.shiro.facebook.FacebookRealm\n\
    realmB.credentialsMatcher = $fbCredentialsMatcher\nsecurityManager.realms = $realmA,\
    \ $realmB.ini:\n```\n\nScribe\nThe Scribe\nproject has built-in support for many\
    \ popular services that use OAuth,\nsuch as Facebook, Twitter, Google, or LinkedIn.\
    \ It has very few external\ndependencies, mainly Apache Commons Codec, allowing\
    \ seamless integration\ninto solutions without risk of dependency clash many larger\
    \ and more\ncomplex solutions bear.\n\nCalling an OAuth provider in Scribe can\
    \ be as easy as the following\none-liner shows:\n\n```\nOAuthService service =\
    \ new ServiceBuilder()\n.provider(LinkedInApi.class)\n.apiKey(YOUR_API_KEY)\n\
    .apiSecret(YOUR_API_SECRET)\n.build();\n```\n\nUntil version 0.6 of Agorava, Scribe\
    \ was at the heart of its OAuth\nfunctionality. From Agorava 0.7 onward, it was\
    \ replaced by JBoss\nPicketLink.\nWhile the latter is no longer actively developed\
    \ by Red Hat and was\nsuperseded by Keycloak, Scribe is still\nmaintained and\
    \ gets updates approximately once a year, the last one in\nJanuary 2023.\n\nLegacy\
    \ Frameworks\nSome of these frameworks are still in use by products and services,\n\
    but they are no longer actively maintained by their contributors.\n\nPicketLink\n\
    PicketLink was an umbrella for\nseveral security-related projects in the Red Hat/JBoss\
    \ Middleware\necosystem. While Agorava was never an official JBoss project, it\
    \ was\ncreated for its ecosystem and standards like CDI. Therefore, supporting\n\
    OAuth and Java EE Security through the means of PicketLink seemed a\nlogical step\
    \ for Agorava.\nPicketLink is an Application Security Framework for Java EE\n\
    applications. It provided features for authenticating users, authorizing\naccess\
    \ to business methods of your application, managing the\napplication’s users,\
    \ groups, roles, and permissions, etc.\n\nThese are the top eight Java Application\
    \ Security problems solved by\nPicketLink:\n\n1.  What’s the best way to add security\
    \ to the application?\n\n2.  How do I authenticate and authorize users?\n\n3.\
    \  How can I control access to classes and methods?\n\n4.  How do I add Identity\
    \ and Access Management (IAM) to my\n    application?\n\n5.  How can I create\
    \ a secure multitenancy architecture for my SaaS\n    (Software as a Service)\
    \ application?\n\n6.  How can I enable Single Sign-On based on SAML (Security\
    \ Assertion\n    Markup Language) in my application?\n\n7.  How do I add authentication\
    \ and authorization to my REST layer and\n    API?\n\n8.  How can my application\
    \ authenticate users using their Facebook,\n    Twitter, or Google accounts?\n\
    \nFigure [5-12](#600273_1_En_5_Chapter.xhtml#Fig12) shows an\noverview of PicketLink,\
    \ its key components, and technologies it\nsupports. Some marked “Coming Soon”\
    \ were still under development and did\nnot come with the GA (Generally Available\
    \ or “Stable”) versions of\nPicketLink.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig12_HTML.jpg)\n\
    \nA schematic of the picket link. It includes base module, federation,\nand I\
    \ D M. The identity stores include database, file based, and L D A\nP.\n\nFigure\
    \ 5-12\nPicketLink Overview\n\nAgorava does, however, use mainly base functionality\
    \ of PicketLink,\nlike Authentication API or CDI Integration, adding specialized\
    \ OAuth and\nsocial connectivity of its own.\n\nThe “dance” through the authentication\
    \ flow is conducted by the\nPicketLink element Authenticator. Here is an example\
    \ of how to extend\n`BaseAuthenticator`:\n\n```\n@PicketLink\npublic class SimpleAuthenticator\
    \ extends BaseAuthenticator {\n@Inject DefaultLoginCredentials credentials;\n\
    @Override\npublic void authenticate() {\nif (\"agentsmith\".equals(credentials.getUserId())\
    \ &&\n\"matrix123\".equals(credentials.getPassword())) {\nsetStatus(AuthenticationStatus.SUCCESS);\n\
    setAccount(new User(\"agentsmith\"));\n} else {\nsetStatus(AuthenticationStatus.FAILURE);\n\
    FacesContext.getCurrentInstance().addMessage(null, new FacesMessage(\"Authentication\
    \ Failure - The username or password you provided were invalid.\"));\n}\n}\n}\n\
    ```\n\n“Agorava PicketLink” in the next chapter will show in more detail how\n\
    PicketLink is applied by Agorava Core and its PicketLink module.\n\nSocialAuth\n\
    SocialAuth was an authentication\nlibrary for Java and Android.\n\nIts features\
    \ include the following:\n\n*   Authentication\n\n    *   Through external OAuth\
    \ providers like Gmail, Hotmail, Yahoo,\n        Twitter, Facebook, LinkedIn,\
    \ Foursquare, Myspace, Salesforce, Yammer,\n        Google Plus, and Instagram\n\
    \n    *   Through OpenID providers\n\n*   Easy user registration\n\n*   Importing\
    \ contacts from networking sites\n\nHere’s an example for a status update using\
    \ SocialAuth via CDI:\n\n```\n@RequestScoped\n@Named(\"socialAuthUpdateStatus\"\
    )\npublic class UpdateStatus implements Serializable {\nprivate static final Logger\
    \ log = Logger.getLogger(UpdateStatus.class);\n@Inject\nSocialAuth socialauth;\n\
    String statusText;\n/**\n* Method which updates the status on profile.\n*\n* @param\
    \ ActionEvent\n* @throws Exception\n*/\npublic void updateStatus() throws Exception\
    \ {\nfinal HttpServletRequest request = (HttpServletRequest) FacesContext    \
    \                    .getCurrentInstance().getExternalContext().getRequest();\n\
    String statusText = request.getParameter(\"statusMessage\");\nif (statusText !=\
    \ null && !statusText.equals(\"\")) {\nsocialauth.setStatus(statusText);\nsocialauth.updateStatus();\n\
    setStatus(\"Status Updated Successfully\");\nSystem.out.println(\"status text:\"\
    \ + statusText);\n}\n}\npublic String getStatus() {\nreturn statusText;\n}\npublic\
    \ void setStatus(String statusText) {\nthis.statusText = statusText;\n}\n}\n```\n\
    \nOACC\nOACC,\npronounced “oak” (like the original code name of Java), was a Java\
    \ API\nto both enforce and manage your application’s authentication and\nauthorization\
    \ needs. OACC provides permission-based authorization\nservices to enforce application\
    \ security.\n\nIts features include\n\n*   Authentication\n\n*   Identity delegation\n\
    \n*   Data store\n\n*   Permission-based security model\n\n*   Authorization\n\
    \n*   RBAC modeling\n\n*   Permission delegation\n\n*   Multitenancy\n\n*   Caching\n\
    \nHere’s an example application:\n\n```\npublic class OACCSampleApplication {\n\
    public static void main(String[] args) throws Exception {\n// get a connection\
    \ to the oacc database\nString url = \"jdbc:postgresql://localhost/oaccdb?user=oaccuser&password=oaccpwd\"\
    ;\ntry (Connection con = DriverManager.getConnection(url)) {\n// get the access\
    \ control context\nAccessControlContext accessControlContext =\nSQLAccessControlContextFactory.getAccessControlContext(con,\"\
    OACC\",                                                                      \
    \  SQLProfile.PostgreSQL_9_3_RECURSIVE,                                BCryptPasswordEncryptor.newInstance(12));\n\
    // create new admin\ncreateAdmin(accessControlContext);\n// create new user\n\
    createUser(accessControlContext);\n// login as admin\nloginAdmin(accessControlContext,\
    \ \"adminJoe\", \"pa55w0rd\");\n// attempt to update user while logged in as admin\n\
    updateUser(accessControlContext, \"jsmith\");\n}\n}\nprivate static void createAdmin(AccessControlContext\
    \ accessControlContext) {\n// authenticate as the system resource (the super user)\
    \ to set up an initial admin\naccessControlContext.authenticate(Resources.getInstance(0),\
    \                                        PasswordCredentials.newInstance(\"yourOaccSystemPassword\"\
    .toCharArray()));\n// persist the admin in your application for example:\nAppAdmin\
    \ admin = new AppAdmin.Builder()\n.login(\"adminJoe\")\n.email(\"joeBloe@company.com\"\
    )\n.build().create();\n// create the corresponding OACC resource\nfinal Resource\
    \ adminResource\n= accessControlContext.createResource(\"ADMIN\",            \
    \                                      \"APP_DOMAIN\", admin.getLogin(),     \
    \                                             PasswordCredentials.newInstance(\"\
    pa55w0rd\".toCharArray()));\nSystem.out.println(\"created new ADMIN resource with\
    \ Id=\" + adminResource.getId());\n// grant permissions to query about, view and\
    \ deactivate any user account, but not to edit it\nSet permissions = new HashSet();\n\
    permissions.add(ResourcePermissions.getInstance(ResourcePermissions.QUERY)); \
    \     permissions.add(ResourcePermissions.getInstance(\"VIEW\"));      permissions.add(ResourcePermissions.getInstance(\"\
    DEACTIVATE\"));\naccessControlContext.setGlobalResourcePermissions(adminResource,\
    \ \"USER\", \"APP_DOMAIN\", permissions);\naccessControlContext.unauthenticate();\n\
    }\nprivate static void createUser(AccessControlContext accessControlContext) {\n\
    // persist the user in your application\n// e.g. UserHOME.create(\"jsmith\", \"\
    Jane\", \"Smith\", \"jsmith@mail.com\", userResource.getId())\n// for example:\n\
    AppUser user = new AppUser.Builder()\n.login(\"jsmith\")\n.firstName(\"Jane\"\
    ).lastName(\"Smith\")\n.email(\"jsmith@mail.com\")\n.build().create();\n// don't\
    \ have to be authenticated to create users because the resource class has the\
    \ unauthenticatedCreateAllowed-flag set\nfinal Resource userResource\n= accessControlContext.createResource(\"\
    USER\",                                                  \"APP_DOMAIN\", user.getLogin(),\
    \                                                  PasswordCredentials.newInstance(\"\
    pa$$word1\".toCharArray()));\nSystem.out.println(\"created new USER resource with\
    \ Id=\" + userResource.getId());\n}\nprivate static void loginAdmin(AccessControlContext\
    \ accessControlContext, String adminLogin,  String password) {\n// authenticate\
    \ as the admin resource      accessControlContext.authenticate(Resources.getInstance(adminLogin),\
    \                                        PasswordCredentials.newInstance(password.toCharArray()));\n\
    }\nprivate static void updateUser(AccessControlContext accessControlContext, String\
    \ userLogin) {\n// assert that the authenticated admin has VIEW permission *before*\
    \ attempting to load the user      accessControlContext.assertResourcePermissions(accessControlContext.getSessionResource(),\
    \ Resources.getInstance(userLogin),                       ResourcePermissions.getInstance(\"\
    VIEW\"));\n// load the user information and modify the local copy\nAppUser user\
    \ = new AppUser.Finder().findByLogin(userLogin);\nuser.setEmail(\"other@mail.com\"\
    );\n// assert that the authenticated admin has EDIT permission *before* attempting\
    \ to save the user      accessControlContext.assertResourcePermissions(accessControlContext.getSessionResource(),\
    \             Resources.getInstance(userLogin),                              \
    \                       ResourcePermissions.getInstance(\"EDIT\"));\n// save the\
    \ user\n// !NOTE! we won't get here because adminResource doesn't have EDIT permission\
    \ on the userResource\nuser.save();\n}\n}\n```\n\nSummary\nFollowing an overview\
    \ of security in social media and relevant\nsecurity standards in the previous\
    \ chapter, we learned about important\nsecurity frameworks for the Java platform\
    \ and how to use them with\nsocial networks in this chapter.\n\n6. Social Frameworks\n\
    \nThe previous chapter dealt with security frameworks like Soteria,\nKeycloak,\
    \ or Spring Security. In this chapter, we’ll take a look at\nsocial frameworks\
    \ like Meta Business SDK, Twitter4J, Twitter API Client,\nLegacy frameworks like\
    \ Agorava, Spring Social, or Facebook4J as well as\nframeworks for special purposes\
    \ or vertical social networks.\n\nMeta\n\nMeta Platforms owns a variety of social\
    \ products:\n\n*   Facebook\n\n*   Instagram\n\n*   (Facebook) Messenger\n\n*\
    \   WhatsApp\n\n*   Threads\n\n*   VR products like Horizon Worlds\n\nThe combined\
    \ user base is the largest of any social net. More than\n200 million businesses\
    \ use Facebook, and more than 7 million advertisers\nactively promote their business\
    \ on Facebook/Meta.\nEnough reason, that unlike some other big social networks,\
    \ Meta\noffers a number of SDKs including dedicated business SDKs and support\n\
    for a large variety of programming languages itself.\n\nThe two most active Java\
    \ Business APIs for Meta are as follows:\n\n*   Meta Business SDK `–` The official\n\
    \    Business SDK suite by Meta\n\n*   WhatsApp Business Java API SDK `–` A community-driven\n\
    \    WhatsApp Business SDK for Java. Currently superior to the official Meta\n\
    \    SDKs for WhatsApp using Java, because they do not offer a strong Java\n \
    \   object model yet\n\nMeta Business SDK\nThe Meta Business SDK [36] provides\
    \ access to various Meta business\nAPIs. It is an evolution of the Facebook Marketing\
    \ API SDK, including\nthe Marketing API and other Meta APIs like Pages, Business\
    \ Manager,\nInstagram, etc., allowing to build customized enterprise solutions\
    \ that\nseamlessly integrate a range of Meta services.\n\nOverview\n\nThe Meta\
    \ Business\nSDK consists of the following parts:\n\n*   Business Manager API `–`\
    \ Allows to manage\n    Meta assets, permissions, and ad campaigns for Facebook\
    \ pages and ad\n    accounts\n\n*   Pages API `–` Allows to manage a\n    business\
    \ presence and community on Facebook\n\n*   Marketing API `–` Allows to manage\
    \ ad\n    products, create, edit, or delete ads, and analyze their\n    performance\n\
    \n*   Instagram Graph API `–` Allows to manage an\n    enterprise presence on\
    \ Instagram\n\n**Where’s WhatsApp?**\nWhile WhatsApp (Meta) Business accounts\
    \ exist for enterprises,\nWhatsApp support is currently not part of the Meta Business\
    \ SDK.\nThe API support for Java and other languages is currently more\nrudimentary\
    \ than that for other Meta services through the Business SDK.\nIt’s mostly down\
    \ to REST/HTTP client calls from the language of your\nchoice. We’ll show a WhatsApp\
    \ example for Java here, but a more\nconvenient Java wrapper by the community\
    \ exists in the form of [WhatsApp Business Java API\nSDK](#600273_1_En_6_Chapter.xhtml#Sec11).\n\
    \nSmoke Test\nThese steps explain how to install the Meta Business SDK for Java\n\
    using Maven and test the installation.\n\nPrerequisites\n\nYou need the following:\n\
    \n*   A Meta Developer Account\n\n*   A Meta app registered on [`https://developers.facebook.com/`](https://developers.facebook.com/)\n\
    \n*   Your app secret\n\n*   An access token\n\n*   An Ad Account\n\nFollow these\
    \ steps to install the SDK and test your application:\n\n1.  After creating a\
    \ Maven project with the IDE of your choice, add the\n    following dependency\
    \ to your `pom.xml` file:\n\n    ```\n\n    com.facebook.business.sdk\n    facebook-java-business-sdk\n\
    \    [8.0.3,)\n\n    ```\n\n2.  Create a Java class called something like `SmokeTestFBJavaSDK`,\n\
    \    and add the following code. Note that {access-token}, {appsecret}, and\n\
    \    {adaccount-id} are placeholders for your actual values. Make sure to\n  \
    \  externalize them appropriately, especially if you share them with\n    others:\n\
    \n    ```\n    import com.facebook.ads.sdk.APIContext;\n    import com.facebook.ads.sdk.APINodeList;\n\
    \    import com.facebook.ads.sdk.AdAccount;\n    import com.facebook.ads.sdk.Campaign;\n\
    \    public class SmokeTestFBJavaSDK\n    {\n    public static final APIContext\
    \ context = new APIContext(\n    \"{access-token}\",\n    \"{appsecret}\"\n  \
    \  );\n    public static void main(String[] args)\n    {\n    AdAccount account\
    \ = new AdAccount(\"act_{{adaccount-id}}\", context);\n    try {\n    APINodeList\
    \ campaigns = account.getCampaigns().requestAllFields().execute();\n    for(Campaign\
    \ campaign : campaigns) {\n    System.out.println(campaign.getFieldName());\n\
    \    }\n    } catch (Exception e) {\n    e.printStackTrace();\n    }\n    }}\n\
    \    ```\n\n3.  Build and run your application. You should see the output in the\n\
    \    console. If there’s an error about an expired token, please request a\n \
    \   new access token, for example, by using the refresh token and try\n    again.\n\
    \nExamples\nHere are code examples for selected business use cases.\n\nAds Buying\n\
    The following examples show how to\ncreate ad campaigns for Click-to-Messenger\
    \ Ads and Facebook page\npromotions.\nClick-to-Messenger Ads allow people to directly\
    \ start a thread with\nyour Facebook page when they click on your ad.\nYou need\
    \ an Ad Account ID.\n\nThis example shows you how to create an ad that will run\
    \ during a\ndesignated time period:\n\n```\nAdSet adSet = new AdAccount(act_,\
    \ context).createAdSet()\n.setName(\"My Ad Set\")\n.setOptimizationGoal(AdSet.EnumOptimizationGoal.VALUE_REACH)\n\
    .setBillingEvent(AdSet.EnumBillingEvent.VALUE_IMPRESSIONS)\n.setBidAmount(2L)\n\
    .setDailyBudget(1000L)\n.setCampaignId()\n.setTargeting(\nnew Targeting()\n.setFieldGeoLocations(\n\
    new TargetingGeoLocation()\n.setFieldCountries(Arrays.asList(\"US\"))\n)\n)\n\
    .setStartTime(start_time)\n.setEndTime(end_time)\n.setStatus(AdSet.EnumStatus.VALUE_PAUSED)\n\
    .execute();\nString ad_set_id = adSet.getId();\n```\n\nCreate an ad to increase\
    \ traffic to your Facebook page by promoting\nit.\n\nYou need\n\n*   An Ad Account\
