    \ provider)\n\n*   A multiservice manager API allowing to deal with multiple OAuth\n\
    \    applications and sessions in the same application\n\n*   Out of the box,\
    \ Agorava connects to\n\n*   Facebook\n\n*   LinkedIn\n\n*   GitHub\n\n*   Twitter\n\
    \n*   XING\n\n*   And offers an easy way to extend it by creating new connectors\
    \ to\n    any other service or API\n\nAgorava is independent of CDI implementation\
    \ and fully portable\nbetween Java EE 6 (minimum) and Servlet environments enhanced\
    \ by CDI. It\ncan be also used with CDI in Java SE in a Desktop or SE Embedded/Mobile\n\
    application. It has been fully tested with the CDI RI implementation\n(JBoss Weld).\
