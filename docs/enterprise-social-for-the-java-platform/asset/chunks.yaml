    \ 时间线旁边显示 Twitter 信息流的人而言几乎毫无用处——而这正是 OpenSocial 最初被创造的目的。\n\nOpenSocial 故事中的一个转折点是，人们试图基于\
    \ OpenSocial 及类似概念创建一个 W3C 标准。这条在语义网案例中本就艰难曲折的道路，在此处似乎几乎不可能实现，尤其是考虑到我们之前发现[14]，大多数参与者更偏爱他们的“围墙花园”。\n\
    \n尽管 W3C 定义了一个名为语义网的有趣标准，该标准听起来与 OpenSocial 的某些理念具有协同效应，但语义网迄今为止仅在少数孤立领域（如生物学或医疗保健）中使用。\n\
    \nW3C 的工作节奏通常相当缓慢，类似于（甚至慢于）HTML5。例如，HTML5 自 2008 年开始，在候选推荐状态停留了一段时间（尽管许多供应商已经提出了基于它的解决方案和产品）。最终推荐标准于\
    \ 2014 年底发布，不久之后 W3C 社交网络工作组[30]成立，并一直活跃到 2018 年。与大多数其他 W3C 标准和工作组相比，这个持续时间相当短暂。\n\
    \n### W3C 社交网络协议\n\nW3C 社交网络工作组的成果是一套社交网络协议[63]，允许社交网络的用户：\n\n*   创建、更新和删除社交内容\n\
    *   通过订阅他人的内容与他人建立联系\n*   与他人发布的内容进行互动\n*   在他人与自己的内容互动时收到通知\n\n#### 规范\n\n以下是\
    \ W3C 社交网络工作组制定的规范：\n\n*   ActivityPub `–` 基于 JSON-LD 的 API，用于客户端到服务器的交互（如发布）和服务器到服务器的交互（如联邦）\n\
    *   ActivityStreams `–` 用于表示以下内容的语法和词汇：\n    *   活动 (Activity)\n    *   参与者 (Actor)\n\
    \    *   链接 (Link)\n    *   对象 (Object)\n    *   集合 (Collection)\n*   链接数据通知 (LDN)\
    \ `–` 一种基于 JSON-LD 的投递协议\n*   Micropub `–` 一种基于表单编码和 JSON 的 API，用于客户端到服务器的交互（如发布）\n\
    *   Webmention `–` 一种基于表单编码的投递协议\n*   WebSub `–` 一种用于订阅及投递更新的协议\n\n##### ActivityPub\n\
    \nActivityPub 是一种基于 ActivityStreams 2.0 数据格式和 JSON-LD 的去中心化社交网络协议。\n\n它提供了一个用于创建、更新和删除内容的客户端到服务器\
    \ API，以及一个用于投递通知和订阅内容的联邦式服务器到服务器 API。\n\n在 ActivityPub 中，用户被称为参与者 (actor)。每个参与者都有：\n\
    \n*   一个**收件箱 (inbox)** `–` 用于接收他人消息\n*   一个**发件箱 (outbox)** `–` 用于向他人发送消息\n\n\
    以下是参与者 Alyssa 的记录示例：\n\n```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\"\
    ,\n\"type\": \"Person\",\n\"id\": \"https://social.example/alyssa/\",\n\"name\"\
    : \"Alyssa P. Hacker\",\n\"preferredUsername\": \"alyssa\",\n\"summary\": \"Lisp\
    \ enthusiast hailing from MIT\",\n\"inbox\": \"https://social.example/alyssa/inbox/\"\
    ,\n\"outbox\": \"https://social.example/alyssa/outbox/\",\n\"followers\": \"https://social.example/alyssa/followers/\"\
    ,\n\"following\": \"https://social.example/alyssa/following/\",\n\"liked\": \"\
    https://social.example/alyssa/liked/\"}\n```\n\n想象一下，Alyssa 想联系她的朋友 Ben。她最近借给他一本书，她想确保他能归还。以下是作为\
    \ ActivityStreams 对象的示例消息：\n\n```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\"\
    ,\n\"type\": \"Note\",\n\"to\": [\"https://chatty.example/ben/\"],\n\"attributedTo\"\
    : \"https://social.example/alyssa/\",\n\"content\": \"Say, did you finish reading\
    \ that book I lent you?\"}\n```\n\n服务器识别出这是一个新创建的对象，并将其包装成一个 `Create` 活动：\n\n\
    ```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\",\n\"type\": \"Create\"\
    ,\n\"id\": \"https://social.example/alyssa/posts/a29a6843-9feb-4c74-a7f7-081b9c9201d3\"\
    ,\n\"to\": [\"https://chatty.example/ben/\"],\n\"actor\": \"https://social.example/alyssa/\"\
    ,\n\"object\": {\"type\": \"Note\",\n\"id\": \"https://social.example/alyssa/posts/49e2d03d-b53a-4c4c-a95c-94a6abf45a19\"\
    ,\n\"attributedTo\": \"https://social.example/alyssa/\",\n\"to\": [\"https://chatty.example/ben/\"\
    ],\n\"content\": \"Say, did you finish reading that book I lent you?\"}}\n```\n\
    \nAlyssa 的服务器查找 Ben 的 ActivityStreams 参与者对象，找到他的收件箱端点，并将她的对象 POST 到他的收件箱。\n\n\
    ###### 采用情况\n\n在 Mastodon 于 ActivityPub 定稿后不久便支持它之后，其他几个平台也纷纷效仿，包括 Reddit、Goodreads、YouTube\
    \ 或 Tumblr；Flickr 也在考虑增加支持。据报道，Twitter/X 的竞争对手 Threads 正在使用它或计划很快增加支持[64]。\n\n\
    ## Fediverse\n\nFediverse（由“federation”（联邦）和“universe”（宇宙）组成）是一个“全球社交网络”，允许一个服务的用户使用\
    \ ActivityPub 等开放协议与其他服务的用户进行通信。Fediverse 中著名的社交网络有：\n\n*   Mastodon\n*   Diaspora\n\
    *   Friendica\n*   GNU social\n*   Hubzilla\n*   Lemmy\n*   PeerTube\n*   Pleroma\n\
    *   Pixelfed\n\n业内许多人认为，埃隆·马斯克收购 Twitter 并将其转变为他的“X App”是开放社交网络和 Fediverse 的巨大催化剂。由\
    \ Jason Robinson 运营的统计网站 The-Federation.info 列出 Fediverse 的总用户数接近 6.31 亿，其中过去六个月内活跃用户约\
    \ 700 万。他们的统计数据是自愿提交的，据称并不完整；例如，Threads/Meta 以及其他几个使用 Fediverse 标准和协议的大型商业参与者并未贡献这些统计数据；因此，实际数字很可能超过十亿，而当前活跃用户可能达到数千万。\n\
    \n其他网站，如唐纳德·特朗普的 Truth Social [45]，基于开放标准，几乎就是 Mastodon 的翻版，但它们甚至不通过 Fediverse\
    \ 与其他网站交互，也不以透明的方式贡献用户统计数据。截至 2023 年 8 月，Truth Social 上的当前活跃用户据说约为 50 万，而 Mastodon\
    \ 的活跃用户接近 200 万。\n\n![](img/600273_1_En_3_Fig5_HTML.jpg)\n\n一张网络图展示了 Fediverse\
    \ 的概览。它包含了十个应用程序：微博客、活动策划、长博客、视频音频流媒体、发布、图片分享、内容聚合以及其他。\n\n图 3-5\nFediverse 概览\n\
    \n### 协议\n\nThe-Federation.info 目前列出了 Fediverse 中使用的 15 种协议：\n\n*   ActivityPub\n\
    *   Bluesky\n*   DFRN\n*   Diaspora\n*   Gemini\n*   Inbound\n*   Matrix\n*  \
    \ MicroPub\n*   NeoDb\n*   Outbound\n*   OStatus\n*   SMTP\n*   WebMention\n*\
    \   XMPP\n*   Zot\n\n我们已经介绍了 ActivityPub 和 OStatus；除此之外，节点数量排名前五的协议中还有另外三种：\n\n\
    *   Diaspora\n*   DFRN\n*   Matrix\n\n#### Diaspora\n\nDiaspora 拥有自己的去中心化社交网络协议。它开发于\
    \ 2010 年，基于类似于电子邮件的联邦架构（具有收件箱和发件箱，也与 ActivityPub 类似），允许用户跨多个独立节点（称为“pods”，与 Kubernetes\
    \ pods 没有直接关系，尽管一些 Diaspora pods 可能运行在 Kubernetes 集群中）组成的网络共享数据和相互通信。除了 Diaspora\
    \ 本身，该协议也被 Friendica 或 Hubzilla 使用。\n\n#### DFRN\n\nDFRN 是一种分布式通信协议，提供隐私和安全通信，并为分布式个人资料和连接（如好友请求）提供基础。\n"
- fmt: "# Matrix\n\n`Matrix` was initially developed as a protocol for secure, decentralized\
    \ instant messaging at Amdocs, provider of CRM and Telecom solutions like OSS\
    \ or BSS. Use cases include voice over IP, video chat, or secure IoT.\n\nThe features\
    \ of `Matrix` include the following:\n\n- Creation and management of fully distributed\
    \ chat rooms with no single points of control or failure\n- Eventually consistent\
    \ cryptographically secure synchronization of room state across a global open\
    \ network of federated servers\n- Sending and receiving extensible messages in\
    \ a room with optional end-to-end encryption\n- User management\n  - Inviting\n\
    \  - Joining\n  - Leaving\n  - Kicking out, banning\n  - Mediated by a power user\n\
    - Room state management\n  - Naming\n  - Aliasing\n  - Topics\n  - Bans\n- User\
    \ profile management (avatars, display names, etc.)\n- Managing user accounts\
    \ (registration, login, logout)\n- Use of third-party IDs like email address,\
    \ phone number, Facebook accounts, or other social IDs to authenticate, identify,\
    \ and discover users on `Matrix`\n- Identity federation\n  - Publishing user public\
    \ keys for PKI\n  - Mapping of third-party IDs to `Matrix` IDs\n\n![](images/600273_1_En_3_Chapter/600273_1_En_3_Fig6_HTML.jpg)\n\
    \nAn architecture of the matrix network. It begins with three application servers,\
    \ interconnected by four home servers, and identity servers. The home servers\
    \ have clients connected with each server matrix. The legends are provided below.\n\
    \n**Figure 3-6** Matrix Network Architecture\n\n## Adoption\n\n`Matrix` is used\
    \ widely by government agencies around the world, particularly in Europe, with\
    \ stricter data security and privacy regulations.\n\n`Rocket Chat` is based on\
    \ `Matrix` since version 4.7.0. In 2021 and 2022, the FOSDEM conference was hosted\
    \ using `Matrix`.\n\nThere are official `Matrix` bridges for:\n\n- Gitter\n- IRC\n\
    - Slack/Mattermost\n- XMPP\n\nAnd several other bridges maintained by the community\
    \ for:\n\n- Apple iMessage\n- Discord\n- Email\n- Facebook Messenger\n- LinkedIn\n\
    - Mastodon\n- Signal\n- Skype\n- SMS\n- Telegram\n- WeChat\n- WhatsApp\n\n# Java\
    \ Frameworks and Libraries\n\nFollowing Java standards like Portlet API or various\
    \ parts of Enterprise Java, there have been several Java frameworks and libraries\
    \ for social media.\n\n## Facebook Business SDK for Java\n\nThe Facebook (Meta)\
    \ Business SDK is a one-stop solution to help partners and customers with their\
    \ enterprise social solutions, allowing partners to use multiple Facebook APIs\
    \ like Pages, Business Manager, Instagram, etc., to serve their business needs.\
    \ Common features include the following:\n\n- Ads buying – Guide for creating\
    \ ad campaigns for Click-to-Messenger Ads and promoting your Facebook page\n-\
    \ Instagram management – Guide for publishing photos and responding to comments\
    \ on Instagram\n- Onboarding clients at scale – Guide for managing hundreds or\
    \ thousands of small businesses and offering them ads buying within their website\
    \ or platform\n- Page management – Guide to creating pages, updating pages, and\
    \ managing their content\n\nHere is a quick start example; see [`https://github.com/facebook/facebook-java-business-sdk`](https://github.com/facebook/facebook-java-business-sdk).\n\
    \n```java\nimport com.facebook.ads.sdk.APIContext;\nimport com.facebook.ads.sdk.AdAccount;\n\
    import com.facebook.ads.sdk.AdAccount.EnumCampaignStatus;\nimport com.facebook.ads.sdk.AdAccount.EnumCampaignObjective;\n\
    import com.facebook.ads.sdk.Campaign;\nimport com.facebook.ads.sdk.APIException;\n\
    \npublic class QuickStartExample {\n    public static final String ACCESS_TOKEN\
    \ = \"[Your access token]\";\n    public static final Long ACCOUNT_ID = [Your\
    \ account ID];\n    public static final String APP_SECRET = \"[Your app secret]\"\
    ;\n    public static final APIContext context = new APIContext(ACCESS_TOKEN, APP_SECRET);\n\
    \n    public static void main(String[] args) {\n        try {\n            AdAccount\
    \ account = new AdAccount(ACCOUNT_ID, context);\n            Campaign campaign\
    \ = account.createCampaign()\n                .setName(\"Java SDK Test Campaign\"\
    )\n                .setObjective(Campaign.EnumObjective.VALUE_LINK_CLICKS)\n \
    \               .setSpendCap(10000L)\n                .setStatus(Campaign.EnumStatus.VALUE_PAUSED)\n\
    \                .execute();\n            System.out.println(campaign.fetch());\n\
    \        } catch (APIException e) {\n            e.printStackTrace();\n      \
    \  }\n    }\n}\n```\n\nWe will show more examples on using the Facebook/Meta Business\
    \ SDK for Java in Chapter [6](#600273_1_En_6_Chapter.xhtml).\n\nAfter the first\
    \ pre-release in May 2016, Facebook has constantly maintained its Java SDK besides\
    \ developer support for JavaScript (Node.js), PHP, Ruby, or Python. The most recent\
    \ version is v16.0.1, released in March 2023 with a release cycle not so different\
    \ from Spring, JBoss/Red Hat, or the JDK itself, getting new major versions twice\
    \ a year.\n\n## Twitter4J\n\n`Twitter4J` is an unofficial Java library for the\
    \ Twitter API. With `Twitter4J`, you can easily integrate Twitter calls in your\
    \ Java application.\n\nIts author, Yusuke Yamamoto, used to work for Twitter in\
    \ 2012. While he did, he was briefly meant to represent Twitter in the Social\
    \ JSR Expert Group, more on that under JSR 357 later in this chapter.\n\nIt's\
    \ lightweight, still backward-compatible with Java 8, making it also easy to integrate\
    \ into mobile or embedded apps for instance. Not very surprising, more or less\
    \ official clones and forks or projects inspired by it are available anywhere\
    \ from J2ME to Android. `Twitter4J` is an API Binding Library, thus primarily\
    \ for consuming information. While extensions or your application could analyze\
    \ or transform it, the framework itself doesn't provide support beyond that of\
    \ Twitter itself. Based on Hinchcliffe's categorization, `Twitter4J` could mostly\
    \ be seen as a Basic API, but with aspects of higher order.\n\nThe last version\
    \ was 4.1.2 in October 2022. After a longer break between 2018 and 2022, it now\
    \ seems reasonably well maintained again. A risk, however, is that `Twitter4J`\
    \ so far only supports Twitter API v1.1, and with the whole Elon Musk situation\
    \ at Twitter, nobody knows for sure if and how long both will be available. On\
    \ the other hand, with Twitter's workforce decimated to just a mere shadow of\
    \ pre-Musk times, it is unlikely all services are going to be migrated to v2 only\
    \ in just a few weeks. And with a Premium v1.1 API offering some revenue, it isn't\
    \ likely going away overnight without granting paying users a time to migrate\
    \ to v2 equivalents. While Gnip has been purchased by Twitter nearly ten years\
    \ ago, the Enterprise API is only being rebranded from Gnip 2.0 very recently,\
    \ and that process may also be hampered by all the developers with experience\
    \ Musk either fired or made leave Twitter on their own.\n\nHere's an example of\
    \ how to sign in with `Twitter4J`.\n\nSign in with Twitter:\n\n```java\nimport\
    \ twitter4j.*;\nimport twitter4j.v1.Status;\n\nclass Main {\n    public static\
    \ void main(String[] args) throws Exception {\n        long userId = Long.parseLong(args[0]);\n\
    \        String accessToken = loadAccessToken(userId);\n        String accessTokenSecret\
    \ = loadAccessTokenSecret(userId);\n        Twitter twitter = Twitter.newBuilder()\n\
    \            .oAuthConsumer(\"[consumer key]\", \"[consumer secret]\")\n     \
    \       .oAuthAccessToken(accessToken, accessTokenSecret).build();\n        Status\
    \ status = twitter.v1().tweets().updateStatus(args[1]);\n        System.out.println(\"\
    Successfully updated the status to [%s].\".formatted(status.getText()));\n   \
    \     System.exit(0);\n    }\n\n    private static String loadAccessToken(long\
    \ userId) {\n        return \"[token]\"; // load from a persistent store\n   \
    \ }\n\n    private static String loadAccessTokenSecret(long userId) {\n      \
    \  return \"[token secret]\"; // load from a persistent store\n    }\n}\n```\n\
    \nWe will show more examples of how to use `Twitter4J` in Chapter [6](#600273_1_En_6_Chapter.xhtml)."
