    \n### Agorava\n\n`Agorava` [33] is a social framework providing CDI modules, contexts,\
    \ and extensions to interact with major social networks or similar services exposing\
    \ APIs. It offers these services to Java and Java Enterprise applications and\
    \ eases mixing them in the spirit of mashups. [12]\n\n#### History\n\nYou’ll remember\
    \ the origin and predecessors to `Agorava` from Chapter [3](#600273_1_En_3_Chapter.xhtml)\
    \ where we discussed standardization efforts and JSR 357 turned down by a majority\
    \ of JCP EC members, resulting in `Agorava` being created as a successor to `Seam\
    \ Social`. With co-founder Antoine Sabot-Durand contributing to JBoss projects\
    \ like CDI, which he became Spec Lead after joining JBoss in 2013, it was also\
    \ featured in the JBoss stack for some time [56], although not an official part\
    \ of projects like `WildFly`, etc. `Agorava` was mentioned in the JBoss developer\
    \ framework (JDF) for social applications, but when JDF was rebranded to \"Quickstarts,\"\
    \ most of these tutorials were abandoned or archived. Therefore, similar to `Spring\
    \ Social` mostly superseded by `Spring Security`, the same happened with `Agorava`\
    \ and `Jakarta Security`, especially from Jakarta EE 10 onward, or `Keycloak`\
    \ replacing `PicketLink` in the JBoss/Red Hat stack.\n\n#### Overview\n\n![](images/600273_1_En_6_Chapter/600273_1_En_6_Fig1_HTML.jpg)\n\
    \nAn overview of the `Agorava` core. It includes four modules, `Twitter`, `Linkedin`,\
    \ `Facebook`, and `social media`, followed by `Agorava core`, `CDI-IMPL`, `Guice-IMPL`,\
    \ `spring-IMPL`, `@Inject-IMPL`, `Java SE-IMPL`, and `API`.\n\n**Figure 6-1**\
    \ Agorava Macro Architecture\n\nThese are the main features of `Agorava`:\n\n\
    *   Confidentiality\n*   A generic portable REST client API\n*   A generic API\
    \ to handle OAuth 1.0a and 2.0 services\n*   A generic API to work with JSON serialization\
    \ and deserialization\n*   A generic identification API to retrieve basic user\
    \ information from a social service (as identity provider)\n*   A multiservice\
    \ manager API allowing to deal with multiple OAuth applications and sessions in\
    \ the same application\n*   Out of the box, `Agorava` connects to:\n    *   Facebook\n\
    \    *   LinkedIn\n    *   GitHub\n    *   Twitter\n    *   XING\n*   And offers\
    \ an easy way to extend it by creating new connectors to any other service or\
    \ API\n\n`Agorava` is independent of CDI implementation and fully portable between\
    \ Java EE 6 (minimum) and Servlet environments enhanced by CDI. It can be also\
    \ used with CDI in Java SE in a Desktop or SE Embedded/Mobile application. It\
    \ has been fully tested with the CDI RI implementation (`JBoss Weld`). `OpenWebBeans`\
    \ and `Caucho Resin` were also supported since the 0.5 release.\n\n`Agorava` is\
    \ often explained as a sort of \"Java Connector Architecture for Social.\" And\
    \ indeed, there are striking similarities between the idea behind `Agorava` and\
    \ what `Jakarta Connectors` (formerly JCA) does under the Jakarta EE umbrella.\
    \ `Jakarta Connectors` defines a standard architecture for connecting the Jakarta\
    \ EE platform to heterogeneous Enterprise Information Systems (EIS) including\
    \ transaction processing systems such as `CICS Transaction Server` and Enterprise\
    \ Resource Planning (ERP) systems like `SAP`, especially the so-called Common\
    \ Client Interface (CCI), which defined a standard client API allowing applications\
    \ to access multiple resource adapters.\n\n![](images/600273_1_En_6_Chapter/600273_1_En_6_Fig2_HTML.jpg)\n\
    \nA schematic of JCA common client interface application. It begins with a Java\
    \ application, followed by three resource adapters, and the respective enterprise\
    \ information system.\n\n**Figure 6-2** JCA Common Client Interface"
