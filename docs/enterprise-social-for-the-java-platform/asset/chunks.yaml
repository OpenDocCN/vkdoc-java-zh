    \ It**\n\nWeb.xml:\n\n```\nCLIENT-CERT\n\n```\n\n##### Custom Form Authentication\n\
    \n**What It Is**\n\nSimilar to the form-based authentication with the main difference\
    \ here being in the continuation of the authentication dialog. So instead of posting\
    \ back to the predefined `j_security_check` action of the form, the Custom Form\
    \ authentication mechanism continues the authentication dialog by invoking `SecurityContext.authenticate()`\
    \ with the credentials the application collected.\n\nThe rest of its concepts\
    \ are pretty much the same as in form-based authentication, so you can refer back\
    \ to the latter for the *How It Works* and *Simple Application Walkthrough* parts.\n\
    \n**How to Define It**\n\n```\n@Retention(RUNTIME)\n@Target(TYPE)\npublic @interface\
    \ CustomFormAuthenticationMechanismDefinition {\n@Nonbinding\nLoginToContinue\
    \ loginToContinue();\n}\n```\n\n#### Identity Stores\n\nIn this section, you will\
    \ get introduced to the concepts of identity stores and their importance to security.\
    \ Also, you will have a brief look at a basic setup of an identity store in Jakarta\
    \ EE, which will be extended to an in-depth analysis in the following chapter.\n\
    \n##### What Is an Identity Store?\n\nAn *identity store* is a component that\
    \ stores application-specific identity information for a set of users, such as\
    \ usernames, groups, roles, group memberships, permissions, and credentials. Occasionally,\
    \ it may also be used for storing other information such as GUIDs (caller’s globally\
    \ unique identifiers) or other caller attributes.\n\nTo simplify the aforementioned\
    \ definition, you can think of an identity store as a security-specific DAO (Data\
    \ Access Object).\n\n##### What Is the Purpose of an Identity Store?\n\nThe purpose\
    \ of an *identity store* is to validate a caller’s identity by accessing a caller’s\
    \ identity attributes. That is, an *identity store* provides access to user information\
    \ and is required for authentication.\n\nThe four most important characteristics\
    \ of an *identity store* are as follows:\n\n1.  Provides access to user information\n\
    \n2.  Required for authentication\n\n3.  Validates credentials\n\n4.  Retrieves\
    \ group membership\n\nAn *identity store* can provide capabilities for authentication,\
    \ authorization, or both.\n\n##### Identity Store and Jakarta EE\n\nThe broader\
    \ Jakarta EE ecosystem comprises several APIs to help you govern your web application’s\
    \ authentication (*Jakarta Authentication*), authorization (*Jakarta Authorization*),\
    \ and security standards. The Jakarta EE API specifies, among others, the `IdentityStore`\
    \ interface, providing an abstraction for an identity store.\n\nImplementing `IdentityStore`\
    \ enables developers to interact with identity stores to authenticate users (i.e.,\
    \ validate their credentials) and to fetch caller groups.\n\nWe consider a good\
    \ *IdentityStore* implementation that one which operates only on context level\
    \ and is environment agnostic (will run the same way and will provide the same\
    \ results regardless of the environment that it’s ported and run into). That is,\
    \ a good *IdentityStore* implementation caters a neat *{credentials in, caller\
    \ data out}* function.\n\nLet’s look at the complete interface (without default\
    \ behavior, signatures only) and try to better understand it:\n\n```\npublic interface\
    \ IdentityStore {\nenum ValidationType { VALIDATE, PROVIDE_GROUPS }\nCredentialValidationResult\
    \ validate(Credential credential);\nSet getCallerGroups(CredentialValidationResult\
    \ validationResult);\nint priority();\nSet validationTypes();\n}\n```\n\nThe two\
    \ most important methods of the *IdentityStore* interface are as follows:\n\n\
    *   `validate(Credential)` validates a Credential.\n\n*   `getCallerGroups(CredentialValidationResult)`\
    \ fetches caller information.\n\n`IdentityStore` implementations can choose to\
    \ handle either or both of these methods, depending on their capabilities and\
    \ configuration. They can hint which of these two methods they handle by utilizing\
    \ the set of values the `validationTypes()` method comes with:\n\n*   **VALIDATE**\
    \ `–` Indicates that it handles the `validate()` method\n\n*   **PROVIDE_GROUPS**\
    \ `–` Indicates that it handles the `getCallerGroups()` method\n\n*   **VALIDATE**\
    \ and **PROVIDE_GROUPS** combined `–` Indicates that it handles both methods\n\
    \nYou might feel that declaring capabilities is rather confusing, yet it was a\
    \ conscious decision to ensure an *IdentityStore*’s configuration and implementation\
    \ are self-governing. That means that an *IdentityStore* could be configured to\
    \ support one or the other methods during a particular deployment yet it could\
    \ be written to support both methods."
  trans: "\n##### 摘要认证\n\n**定义**\n\n一种与基本认证类似的认证机制，但不会以明文形式发送密码。该认证机制旨在避免基本认证中最关键的缺陷。\n\
    \n**工作原理**\n\n与基本认证类似，摘要认证基于用户名和密码对用户进行身份验证，但不提供任何消息加密。它在通过网络发送用户名和密码之前，会对其应用哈希函数。也就是说，密码不会在此处通过网络明文发送，但要求认证容器能够获取明文密码的等价物，以便通过计算预期的摘要来验证接收到的认证信息。\n\
    \n应用流程：\n\n1.  客户端请求访问受保护资源。\n2.  服务器回复一个随机数（nonce）和 401 错误码。\n3.  客户端发回一个响应，其中包含用户名、密码、领域（realm）、给定的随机数值、请求的\
    \ URI 以及 HTTP 方法的校验和（默认为 MD5 校验和）。*generate_md5_key(nonce*, *username*, *realm*,\
    \ *URI*, *password_given_by_user)*。\n4.  服务器获取用户名、领域和请求的 *URI*，并查找给定用户名的密码。找到后，它生成自己的版本，例如\
    \ *generate_md5_key(nonce, username, realm, URI, HTTP method, password-for-this-user-in-my-db)*。\n\
    5.  然后，服务器将自身 *generate_md5()* 的输出与客户端发送的输出进行比较：\n    1.  如果匹配，则客户端发送了正确的密码。\n\
    \    2.  如果不匹配，则发送的密码错误。\n\n**如何配置**\n\nweb.xml:\n\n```\nDIGEST\nenterprisesocialdigestrealm\n\
    \n```\n\n##### 客户端认证\n\n**定义**\n\n一种认证机制，客户端通过交换数字证书来安全地获得对服务器的访问权限。\n\n你可能会遇到术语“公钥证书”而非“数字证书”。这两个术语是等价的，目的相同。\n\
    \n**工作原理**\n\n首先，需要强调的是，客户端认证是一种比基本认证或基于表单的认证更安全的认证方法。其主要优势在于使用基于 SSL 的 HTTP（HTTPS），服务器通过客户端的公钥证书来认证客户端。\n\
    \n虽然客户端认证可能适用于内网应用，但由于在用户注册期间向其提供客户端证书以及在注销期间撤销证书存在挑战，它在互联网上通常难以扩展。\n\nSSL 技术为\
    \ TCP/IP 连接提供数据加密、服务器认证、消息完整性以及可选的客户端认证。\n\n证书由证书颁发机构（CA）签发，CA 是一个受信任的组织，为持有者提供身份标识。\n\
    \n**如何配置**\n\nWeb.xml:\n\n```\nCLIENT-CERT\n\n```\n\n##### 自定义表单认证\n\n**定义**\n\
    \n与基于表单的认证类似，主要区别在于认证对话框的延续方式。因此，自定义表单认证机制不是将表单回发到预定义的 `j_security_check` 操作，而是通过使用应用程序收集的凭据调用\
    \ `SecurityContext.authenticate()` 来继续认证对话框。\n\n其余概念与基于表单的认证基本相同，因此你可以参考后者的*工作原理*和*简单应用流程*部分。\n\
    \n**如何定义**\n\n```\n@Retention(RUNTIME)\n@Target(TYPE)\npublic @interface CustomFormAuthenticationMechanismDefinition\
    \ {\n@Nonbinding\nLoginToContinue loginToContinue();\n}\n```\n\n#### 身份存储\n\n\
    在本节中，你将了解身份存储的概念及其对安全性的重要性。同时，你将简要了解 Jakarta EE 中身份存储的基本设置，这将在下一章中扩展为深入分析。\n\n\
    ##### 什么是身份存储？\n\n*身份存储*是一个组件，它存储一组用户的应用特定身份信息，例如用户名、组、角色、组成员身份、权限和凭据。有时，它也可能用于存储其他信息，例如\
    \ GUID（调用者的全局唯一标识符）或其他调用者属性。\n\n为了简化上述定义，你可以将身份存储视为一个安全特定的 DAO（数据访问对象）。\n\n#####\
    \ 身份存储的目的是什么？\n\n*身份存储*的目的是通过访问调用者的身份属性来验证调用者的身份。也就是说，*身份存储*提供对用户信息的访问，并且是认证所必需的。\n\
    \n*身份存储*的四个最重要的特征如下：\n\n1.  提供对用户信息的访问\n2.  认证所必需\n3.  验证凭据\n4.  检索组成员身份\n\n一个*身份存储*可以提供认证、授权或两者兼有的能力。\n\
    \n##### 身份存储与 Jakarta EE\n\n更广泛的 Jakarta EE 生态系统包含多个 API，可帮助你管理 Web 应用的认证（*Jakarta\
    \ Authentication*）、授权（*Jakarta Authorization*）和安全标准。Jakarta EE API 除其他外，还指定了 `IdentityStore`\
    \ 接口，为身份存储提供了抽象。\n\n实现 `IdentityStore` 使开发人员能够与身份存储交互，以认证用户（即验证其凭据）并获取调用者组。\n\n\
    我们认为一个好的 *IdentityStore* 实现是仅在上下文级别运行且与环境无关的（无论移植到何种环境并运行，它都会以相同的方式运行并提供相同的结果）。也就是说，一个好的\
    \ *IdentityStore* 实现提供了一个简洁的*{凭据输入，调用者数据输出}*函数。\n\n让我们看看完整的接口（无默认行为，仅签名）并尝试更好地理解它：\n\
    \n```\npublic interface IdentityStore {\nenum ValidationType { VALIDATE, PROVIDE_GROUPS\
    \ }\nCredentialValidationResult validate(Credential credential);\nSet getCallerGroups(CredentialValidationResult\
    \ validationResult);\nint priority();\nSet validationTypes();\n}\n```\n\n*IdentityStore*\
    \ 接口的两个最重要的方法如下：\n\n*   `validate(Credential)` 验证凭据。\n*   `getCallerGroups(CredentialValidationResult)`\
    \ 获取调用者信息。\n\n`IdentityStore` 实现可以根据其能力和配置选择处理其中一个或两个方法。它们可以通过使用 `validationTypes()`\
    \ 方法返回的值集来提示它们处理这两个方法中的哪一个：\n\n*   **VALIDATE** `–` 表示它处理 `validate()` 方法\n* \
    \  **PROVIDE_GROUPS** `–` 表示它处理 `getCallerGroups()` 方法\n*   **VALIDATE** 和 **PROVIDE_GROUPS**\
    \ 组合 `–` 表示它处理两个方法\n\n你可能会觉得声明能力相当令人困惑，但这是一个有意的决定，以确保 *IdentityStore* 的配置和实现是自主管理的。这意味着\
    \ *IdentityStore* 可以被配置为在特定部署期间支持其中一个或另一个方法，但它可以被编写为支持两个方法。\n"
- fmt: "### Validating Credentials\n\nTo determine whether a `Credential` is valid\
    \ or not, you can use the `validate()` method, which, upon successful validation,\
    \ returns information about the user identified by the `Credential`. An `IdentityStore`\
    \ may choose not to implement this method as it’s optional.\n\n```\nCredentialValidationResult\
    \ validate(Credential credential);\n```\n\nAs obvious from the method signature,\
    \ a validation result is of type `CredentialValidationResult`, which allows methods\
    \ to retrieve a validation result’s status value and, upon successful validation,\
    \ the ID of the store that validated the credential, the caller principal, the\
    \ caller’s unique ID in the identity store, and the caller’s group memberships\
    \ (if any).\n\nFor successful validation, only the caller principal is required.\n\
    \nSo what’s under the hood of `CredentialValidationResult`? See the class’ overview\
    \ containing only method signatures:\n\n```\npublic class CredentialValidationResult\
    \ {\npublic enum Status { NOT_VALIDATED, INVALID, VALID }\npublic Status getStatus();\n\
    public String getIdentityStoreId();\npublic CallerPrincipal getCallerPrincipal();\n\
    public String getCallerDn();\npublic String getCallerUniqueId();\npublic Set getCallerGroups();\n\
    }\n```\n\nTo begin with, there are three different status values: `NOT_VALIDATED`,\
    \ `INVALID`, and `VALID`. What do they mean?\n\n- `NOT_VALIDATED` – Validation\
    \ was not attempted, because the `IdentityStore` does not handle the supplied\
    \ `Credential` type.\n- `INVALID` – Validation failed. The supplied `Credential`\
    \ was invalid or the corresponding user was not found in the user store.\n- `VALID`\
    \ – Validation succeeded, and the user is authenticated. The caller principal\
    \ and group (if any) are available *only* with this result status.\n\nMoving forward\
    \ to the rest of `CredentialValidationResult`’s methods, the identity store ID,\
    \ caller DN, and caller unique ID aim to help you implement an `IdentityStore`\
    \ by cooperating with the `validate()` and `getCallerGroups()`. They can be used\
    \ to ensure that the correct caller groups are returned from `getCallerGroups()`\
    \ even in environments where the caller’s principal name alone is insufficient\
    \ to uniquely identify the correct user account.\n\nThe `Credential` interface\
    \ is a generic interface, capable of representing any kind of token or user credential.\
    \ An `IdentityStore` implementation can support multiple concrete `Credential`\
    \ types, where concrete `Credential` is an implementation of the `Credential`\
    \ interface that represents a particular type of credential. That is achieved\
    \ implementing the `validate(Credential)` method and checking the type of `Credential`\
    \ passed as an argument.\n\nThe `IdentityStore` interface provides a default implementation\
    \ of the `validate()` method that delegates to a method that can handle the provided\
    \ `Credential` type, assuming such a method is implemented by the `IdentityStore`:\n\
    \n```\ndefault CredentialValidationResult validate(Credential credential) {\n\
    try {\nreturn CredentialValidationResult.class.cast(\nMethodHandles.lookup()\n\
    .bind(this, \"validate\",\nmethodType(CredentialValidationResult.class,\ncredential.getClass()))\n\
    .invoke(credential));\n} catch (NoSuchMethodException e) {\nreturn NOT_VALIDATED_RESULT;\n\
    } catch (Throwable e) {\nthrow new IllegalStateException(e);\n}\n}\n```\n\n`validate()`\
    \ delegates to the following method of `ExampleIdentityStore` if passed a `UsernamePasswordCredential`:\n\
    \n```\npublic class ExampleIdentityStore implements IdentityStore {\npublic CredentialValidationResult\
    \ validate(\nUsernamePasswordCredential usernamePasswordCredential) {\n// Implementation\
    \ ...\nreturn new CredentialValidationResult(...);\n}\n}\n```\n\n### Retrieving\
    \ Caller Information\n\nThe `getCallerGroups()` method retrieves the set of groups\
    \ associated with a validated caller. It’s an optional method that an `IdentityStore`\
    \ may choose not to implement:\n\n```\nSet getCallerGroups(CredentialValidationResult\
    \ validationResult);\n```\n\nThis supports aggregation of identity stores, where\
    \ one identity store is used to authenticate users and one or more other stores\
    \ are used to retrieve additional groups.\n\nIn such cases, querying identity\
    \ stores without validating the caller’s credentials against the stores is vital.\n\
    \n### Declaring Capabilities\n\nThere are still a few methods of the `IdentityStore`\
    \ interface that we didn’t discuss, methods that an implementation can use to\
    \ declare its capabilities and ordinal priority:\n\n```\nenum ValidationType {\
    \ VALIDATE, PROVIDE_GROUPS }\nSet DEFAULT_VALIDATION_TYPES = EnumSet.of(VALIDATE,\
    \ PROVIDE_GROUPS);\ndefault int priority() {\nreturn 100;\n}\ndefault Set validationTypes()\
    \ {\nreturn DEFAULT_VALIDATION_TYPES;\n}\n```\n\nLet’s have a closer look at the\
    \ following:\n\n- `priority()` allows an `IdentityStore` to be configured with\
    \ an ordinal number indicating the order in which it should be consulted when\
    \ multiple identity stores are present. Lower numbers represent higher priority;\
    \ that is, an `IdentityStore` with a lower priority value is called before an\
    \ `IdentityStore` with a higher priority.\n- `validationTypes()` returns a set\
    \ of `enum` constants of type `ValidationType`, indicating the purposes for which\
    \ an `IdentityStore` should be used:\n    - `VALIDATE`, to indicate it handles\
    \ `validate()`\n    - `PROVIDE_GROUPS`, to indicate it handles `getCallerGroups()`\n\
    \    - Both `VALIDATE` and `PROVIDE_GROUPS`, indicating it handles both methods\n\
    \nAn `IdentityStore`’s validation types determine three things:\n\n- Authentication\
    \ only – Any group data it returns must be ignored.\n- Providing groups only –\
    \ Not used for authentication, but to obtain group data for a caller that was\
    \ authenticated by a different `IdentityStore`.\n- Both authentication and any\
    \ group data it may return.\n\n### How to Validate a User Credential\n\nAs we\
    \ learned earlier, we can use an `HttpAuthenticationMechanism` (or another caller)\
    \ to authenticate a user. However, the former should not interact directly with\
    \ an `IdentityStore` but instead invokes the `IdentityStoreHandler` to validate\
    \ credentials. `IdentityStoreHandler` then invokes `IdentityStore`.\n\nSo what\
    \ is the `IdentityStoreHandler` interface about? It defines a mechanism for invoking\
    \ on `IdentityStore` to validate a user credential and is considered to be a safer\
    \ way to authenticate a user.\n\nA default `IdentityStoreHandler` implementation\
    \ is supplied by the container, but you can write your own custom implementation.\n\
    \nIdentity stores usually have a one-to-one relation with a data source such as\
    \ a relational database, LDAP directory, file system, or another similar resource.\
    \ Hence, implementations of `IdentityStore` use data source–specific APIs to discover\
    \ authorization data (roles, permissions, etc.), such as JDBC, File IO, Hibernate/JPA,\
    \ NoSQL, or any other Data Access mechanism."
