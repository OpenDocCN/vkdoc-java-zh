    WhatsApp messages via the API from a Java app.\n\nYou need\n\n*   A Java IDE of\
    \ your choice.\n\n*   Ensure to have Java 11 or higher.\n\n*   Register at Meta\
    \ for Developers.\n\n*   Enable two-factor authentication for your account.\n\n\
    *   Ensure your developer account is linked to a Meta Business\n    account.\n\
    \nCreate an app on Meta for Developers. Select ***My\nApps***, then click ***Create\
    \ App***, and\nselect ***Business*** as the app type.\n\nThe example code will\
    \ look like this:\n\n```\nimport java.io.IOException;\nimport java.net.URI;\n\
    import java.net.URISyntaxException;\nimport java.net.http.HttpClient;\nimport\
    \ java.net.http.HttpRequest;\nimport java.net.http.HttpResponse;\nimport java.net.http.HttpResponse.BodyHandlers;\n\
    public class App\n{\npublic static void main( String[] args )\n{\ntry {\nHttpRequest\
    \ request = HttpRequest.newBuilder()\n.uri(new URI(\"https://graph.facebook.com/v13.0//messages\"\
    ))\n.header(\"Authorization\", \"Bearer \")\n.header(\"Content-Type\", \"application/json\"\
    )\n.POST(HttpRequest.BodyPublishers.ofString(\"{ \\\"messaging_product\\\": \\\
    \"whatsapp\\\", \\\"recipient_type\\\": \\\"individual\\\", \\\"to\\\": \\\"\\\
    \", \\\"type\\\": \\\"template\\\", \\\"template\\\": { \\\"name\\\": \\\"hello_world\\\
    \", \\\"language\\\": { \\\"code\\\": \\\"en_US\\\" } } }\"))\n.build();\nHttpClient\
    \ http = HttpClient.newHttpClient();\nHttpResponse response = http.send(request,BodyHandlers.ofString());\n\
    System.out.println(response.body());\n} catch (URISyntaxException | IOException\
    \ | InterruptedException e) {\ne.printStackTrace();\n}\n}\n}\n```\n\nWhatsApp\
