    Twitter 的打击[57]。这是一个由 Instagram 开发的去中心化社交网络，目前也要求用户拥有现有的 Instagram 账户。由于欧盟的隐私法，Threads
    在另行通知之前无法在欧盟使用。


    在最初几天，可以通过移动 VPN 安装和使用 Threads，所以我尝试了一下，但 Meta 阻止了这种做法，导致其用户数在最初激增至超过 1 亿后出现下降。看来
    Threads 可能很快就能在没有 VPN 的情况下在欧盟和其他国家使用。


    2023 年 7 月 24 日，埃隆·马斯克将 Twitter 更名为“X”[58]。马斯克似乎希望模仿微信在中国的一些做法，但他似乎忽略了，在中国，由于对隐私的不同处理方式以及单一公司的权力集中（只要它遵守政治体制的规则），可能在其他国家行不通，甚至在美国也不行，更不用说欧盟国家了。“X”的想法（奇怪的是，谷歌/Alphabet
    也有一个名为 X 的、有点秘密的“臭鼬工厂”式实验室）并不新鲜，埃隆·马斯克早在 PayPal 时代就注册了这个域名；在公司成为 PayPal 之前，它就已经被称为“X.com”，但在一次由
    X 的最大竞争对手 Confinity 及其产品“PayPal”发起的近乎敌意的收购（注意其中的讽刺意味）后，他被赶下台，由彼得·蒂尔接任 CEO。一个关键原因是马斯克被“X”的许多不同想法和目标所困扰，而蒂尔领导的其他成员只想专注于支付，该公司至今也在这方面取得了成功。


    当然，马斯克现在比蒂尔富有得多，并且是目前的世界首富，但他这次能实现“X”的众多想法中的哪些，以及用户会接受为这些服务中的哪些（大部分将是付费的，而且很可能每月不止
    8 美元）付费，而不是在其他地方使用它们，包括 PayPal、Stripe、亚马逊以及许多其他在线支付服务，还有待观察。更不用说如果该应用变得过于庞大，或者比如说，未来的特斯拉买家被迫只能使用
    X 支付系统，或者强迫所有人观看在 X 上直播的 SpaceX 发射，尽管用户体验和性能更差，这可能会引发反垄断问题。更名后不久，“Twitter 小鸟”被一个带有
    X Window System 风格的“X”标志所取代，“tweet”等术语也被“post”取代，就像其他任何社交网络一样，从而进一步丧失了它曾经拥有的独特品牌认知度。2023
    年 9 月 18 日，埃隆·马斯克宣布他可能会让 X 对所有用户设置付费墙，随后在菲律宾和新西兰试行收取迄今为止“象征性的”1 美元。尽管他声称是为了打击机器人和虚假账户，但这只是从这件昂贵的玩具中获取一些资金的最新绝望之举。许多专家认为，这可能是
    X/Twitter 的最后一根稻草，其用户群可能很快就会萎缩到 MySpace 或 Truth Social 的水平。

