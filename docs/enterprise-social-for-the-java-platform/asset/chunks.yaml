    \ \"Failed to load oidc.properties\", e);\n            email = \"\";\n       \
    \ }\n        authorization = Map.of(\n            \"user\", Set.of(\"foo\", \"\
    bar\"),\n            email,  Set.of(\"foo\", \"bar\")); // user in Google.\n \
