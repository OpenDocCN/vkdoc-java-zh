    ```\n\nMastodon\nThere are three Java clients for Mastodon according to the website,\n\
    but only BigBone seems reasonably active.\n\nBigBone\nBigBone is a\nfork of the\
    \ Mastodon4J project, a client library for Java and\nKotlin.\n\nOverview\n\nThe\
    \ main features of BigBone are as follows:\n\n*   Act on statuses on your timelines\n\
    \n    *   Home\n\n    *   Local\n\n    *   Federated\n\n*   Post new statuses\
    \ or edit existing ones (including media\n    uploads)\n\n*   Favorite and bookmark\
    \ statuses\n\n*   Manage lists\n\n*   Post polls or vote on them\n\n*   Schedule\
    \ statuses\n\n*   Send direct messages to other people\n\n*   Manage filters\n\
    \n*   Follow/unfollow hashtags\n\nInstallation\nAdd the following to the Maven\
    \ POM of your project.\n\n**Snapshot Repository**\n\n```\n\nmaven-central-snapshots\n\
    Maven Central Snapshot Repository        https://s01.oss.sonatype.org/content/repositories/snapshots/\n\
    \nfalse\n\ntrue\n\n```\n\n**Dependencies**\n\n```\nsocial.bigbone\nbigbone\n2.0.0-SNAPSHOT\n\
    \nsocial.bigbone\nbigbone-rx\n2.0.0-SNAPSHOT\n\n```\n\nExamples\n**Get an access\
    \ token**\n[`https://docs.joinmastodon.org/methods/apps/`](https://docs.joinmastodon.org/methods/apps/)\n\
    \n**Get a timeline**\n\n```\npublic class GetPublicTimeline {\npublic static void\
    \ main(final String[] args) throws BigBoneRequestException {\nfinal String instance\
    \ = args[0];\n// Instantiate client\nfinal MastodonClient client = new MastodonClient.Builder(instance)\n\
    .build();\n// Get statuses from public timeline\nfinal Pageable statuses = client.timelines().getPublicTimeline(LOCAL_AND_REMOTE).execute();\n\
    statuses.getPart().forEach(status -> System.out.println(status.getContent()));\n\
    }\n}\n```\n\n**Get instance information**\n\n```\npublic class GetInstanceInfo\
    \ {\npublic static void main(final String[] args) throws BigBoneRequestException\
    \ {\nfinal String instance = args[0];\n// Instantiate client\nfinal MastodonClient\
    \ client = new MastodonClient.Builder(instance)\n.build();\n// Get instance info\
    \ and dump it to the console as JSON\nfinal Instance instanceInfo = client.instances().getInstance().execute();\n\
    final Gson gson = new Gson();\nSystem.out.println(gson.toJson(instanceInfo));\n\
    }\n}\n```\n\n**Get bookmarks**\n\n```\npublic class GetBookmarks {\npublic static\
    \ void main(final String[] args) throws BigBoneRequestException {\nfinal String\
    \ instance = args[0];\nfinal String accessToken = args[1];\n// Instantiate client\n\
    final MastodonClient client = new MastodonClient.Builder(instance)\n.accessToken(accessToken)\n\
    .build();\n// Get bookmarks\nfinal Pageable bookmarks = client.bookmarks().getBookmarks().execute();\n\
    bookmarks.getPart().forEach(bookmark -> {\nString statusText = bookmark.getContent()\
    \ + \"\\n\";\nSystem.out.print(statusText);\n});\n}\n}\n```\n\n**Perform a simple\
    \ search**\n\n```\npublic class PerformSimpleSearch {\npublic static void main(final\
    \ String[] args) throws BigBoneRequestException {\nfinal String instance = args[0];\n\
    final String accessToken = args[1];\nfinal String searchTerm = args[2];\n// Instantiate\
    \ client\nfinal MastodonClient client = new MastodonClient.Builder(instance)\n\
    .accessToken(accessToken)\n.build();\n// Perform search and print results\nfinal\
    \ Search searchResult = client.search().searchContent(searchTerm).execute();\n\
    searchResult.getAccounts().forEach(account -> System.out.println(account.getDisplayName()));\n\
    searchResult.getStatuses().forEach(status -> System.out.println(status.getContent()));\n\
    searchResult.getHashtags().forEach(hashtag -> System.out.println(hashtag.getName()));\n\
    }\n}\n```\n\nTwitter/X\nThe social network formerly known as Twitter has at least\
    \ two Java\nclients with an object model wrapped around the Twitter/X REST APIs.\n\
    \nTwitter API Client\nIn August 2021, Twitter started its own API Client Library\
    \ for\nJava [35]. Quite late, also given Twitter had been an active participant\n\
    in the JCP [11] and host to several JCP EC F2F meetings in the Bay Area,\nbut\
    \ supporting the Twitter v2 API only, it seemed a measure to convince\ndevelopers\
    \ into migrating to the new API. The GitHub repo still says\n“This SDK is in beta\
    \ and is not ready for production”, and there was\nonly contribution by three\
    \ committers; all seem to have left the company\nshortly before or after the Elon\
    \ Musk takeover.\n\nInstallation\n\nAdd this dependency to your project’s POM:\n\
    \n```\ncom.twitter\ntwitter-api-java-sdk\n2.0.3\n\n```\n\nTWITTER TO X MIGRATION\n\
    \nAs Elon Musk rebrands Twitter to X, at some point, even domains like\ntwitter.com\
    \ or URLs underneath that site could be switched off and no\nlonger work. That\
    \ may affect some of the settings and steps listed\nhere.\n\nExamples\n\nYou must\
    \ first register a Twitter application to obtain a username and\npassword to access\
    \ the Twitter API. To register a new application for\nuse with the API Client:\n\
    \n1.  Go to [`https://dev.twitter.com`](https://dev.twitter.com)\n\n2.  Log in\
    \ and click **Create an app**\n\n3.  Click **Add New Application**\n\n4.  Under\
    \ **Application Info**, enter values for the following\n    parameters:\n\n  \
    \  *   Application Name `–` This is the name of\n        your application that\
    \ is displayed at the end of each post, for example,\n        your company name.\n\
    \n    *   Application Description `–` Enter a short\n        description of the\
    \ application.\n\n    *   Website `–` This is the URL to\n        your website,\
    \ for example, [`http://www.mysite.com`](http://www.mysite.com).\n\n    *   Callback\
    \ URL `–` Set this to\n        http://domain/wps/wcmsocial/servlet/oAuthCB/twitter\
    \ where “domain” is\n        your domain name.\n\n5.  Read the terms and conditions\
    \ and select **I\n    Agree**.\n\n6.  Enter the security/captcha information if\
    \ required.\n\n7.  Your Consumer Key and Consumer Secret are displayed. Write\
    \ them down\n    in a safe place.\n\n8.  Click the **Settings** tab.\n\n9.  In\
    \ the **Application Type** section, set the\n    **Access** property to Read and\
    \ write.\n\n10.  Click the **Update this Twitter application's\n    settings**.\n\
    \n**API example**\n\n```\npublic class TwitterApiExample {\npublic static void\
    \ main(String[] args) {\n/**\n* Set the credentials for the required APIs.\n*\
    \ The Java SDK supports TwitterCredentialsOAuth2 & TwitterCredentialsBearer.\n\
    * Check the 'security' tag of the required APIs in https://api.twitter.com/2/openapi.json\
    \ in order\n* to use the right credential object.\n*/\nTwitterApi apiInstance\
    \ = new TwitterApi(new TwitterCredentialsOAuth2(\nSystem.getenv(\"TWITTER_OAUTH2_CLIENT_ID\"\
    ),\nSystem.getenv(\"TWITTER_OAUTH2_CLIENT_SECRET\"),\nSystem.getenv(\"TWITTER_OAUTH2_ACCESS_TOKEN\"\
    ),\nSystem.getenv(\"TWITTER_OAUTH2_REFRESH_TOKEN\")));\nSet tweetFields = new\
    \ HashSet();\ntweetFields.add(\"author_id\");\ntweetFields.add(\"id\");\ntweetFields.add(\"\
    created_at\");\ntry {\n// findTweetById\nGet2TweetsIdResponse result = apiInstance.tweets().findTweetById(\"\
    20\")\n.tweetFields(tweetFields)\n.execute();\nif(result.getErrors() != null &&\
    \ result.getErrors().size() > 0) {\nSystem.out.println(\"Error:\");\nresult.getErrors().forEach(e\
    \ -> {\nSystem.out.println(e.toString());\nif (e instanceof ResourceUnauthorizedProblem)\
    \ {\nSystem.out.println(((ResourceUnauthorizedProblem) e).getTitle() + \" \" +\
    \ ((ResourceUnauthorizedProblem) e).getDetail());\n}\n});\n} else {\nSystem.out.println(\"\
    findTweetById - Tweet Text: \" + result.toString());\n}\n} catch (ApiException\
    \ e) {\nSystem.err.println(\"Status code: \" + e.getCode());\nSystem.err.println(\"\
    Reason: \" + e.getResponseBody());\nSystem.err.println(\"Response headers: \"\
    \ + e.getResponseHeaders());\ne.printStackTrace();\n}\n}\n}\n```\n\n**Get all\
    \ desired fields**\n\n```\nSet tweetFields = new HashSet();\ntweetFields.add(\"\
    non_public_metrics\");\ntweetFields.add(\"promoted_metrics\");\ntweetFields.add(\"\
    organic_metrics\");\n// Get all available fields excluding Tweet Fields 'non_public_metrics',\
    \ 'promoted_metrics' & 'organic_metrics'\nGet2TweetsIdResponse result = apiInstance.tweets().findTweetById(\"\
    20\")        .tweetFields(tweetFields).excludeInputFields().execute();\n// Get\
    \ all the response fields\nGet2TweetsIdResponse result2 = apiInstance.tweets().findTweetById(\"\
    20\").excludeInputFields().execute();\n```\n\n**HelloWorld example**\n\n```\n\
    public class HelloWorld {\npublic static void main(String[] args) {\n/**\n* Set\
    \ the credentials for the required APIs.\n* The Java SDK supports TwitterCredentialsOAuth2\
    \ & TwitterCredentialsBearer.\n* Check the 'security' tag of the required APIs\
    \ in https://api.twitter.com/2/openapi.json in order\n* to use the right credential\
    \ object.\n*/\nTwitterApi apiInstance = new TwitterApi(new TwitterCredentialsBearer(System.getenv(\"\
    TWITTER_BEARER_TOKEN\")));\nSet tweetFields = new HashSet();\ntweetFields.add(\"\
    author_id\");\ntweetFields.add(\"id\");\ntweetFields.add(\"created_at\");\ntry\
    \ {\n// findTweetById\nGet2TweetsIdResponse result = apiInstance.tweets().findTweetById(\"\
    20\")\n.tweetFields(tweetFields)\n.execute();\nif(result.getErrors() != null &&\
    \ result.getErrors().size() > 0) {\nSystem.out.println(\"Error:\");\nresult.getErrors().forEach(e\
    \ -> {\nSystem.out.println(e.toString());\nif (e instanceof ResourceUnauthorizedProblem)\
    \ {\nSystem.out.println(((ResourceUnauthorizedProblem) e).getTitle() + \" \" +\
    \ ((ResourceUnauthorizedProblem) e).getDetail());\n}\n});\n} else {\nSystem.out.println(\"\
    findTweetById - Tweet Text: \" + result.toString());\n}\n} catch (ApiException\
    \ e) {\nSystem.err.println(\"Status code: \" + e.getCode());\nSystem.err.println(\"\
    Reason: \" + e.getResponseBody());\nSystem.err.println(\"Response headers: \"\
    \ + e.getResponseHeaders());\ne.printStackTrace();\n}\n}\n}\n```\n\n**HelloWorld\
    \ example (Streaming)**\n\n```\npublic class HelloWorldStreaming {\npublic static\
    \ void main(String[] args) {\n/**\n* Set the credentials for the required APIs.\n\
    * The Java SDK supports TwitterCredentialsOAuth2 & TwitterCredentialsBearer.\n\
    * Check the 'security' tag of the required APIs in https://api.twitter.com/2/openapi.json\
    \ in order\n* to use the right credential object.\n*/\nTwitterApi apiInstance\
    \ = new TwitterApi(new TwitterCredentialsBearer(System.getenv(\"TWITTER_BEARER_TOKEN\"\
    )));\ntry {\nTweetsStreamListenersExecutor tsle = new TweetsStreamListenersExecutor();\n\
    tsle.stream()\n.streamingHandler(new StreamingTweetHandlerImpl(apiInstance))\n\
    .executeListeners();\nwhile(tsle.getError() == null) {\ntry {\nSystem.out.println(\"\
    ==> sleeping 5 \");\nThread.sleep(5000);\n} catch (InterruptedException e) {\n\
    e.printStackTrace();\n}\n}\nif(tsle.getError() != null) {\nSystem.err.println(\"\
    ==> Ended with error: \" + tsle.getError());\n}\n} catch (ApiException e) {\n\
    System.err.println(\"Status code: \" + e.getCode());\nSystem.err.println(\"Reason:\
    \ \" + e.getResponseBody());\nSystem.err.println(\"Response headers: \" + e.getResponseHeaders());\n\
    e.printStackTrace();\n}\n}\n}\n```\n\nTwitter4J\n\nTwitter4J is an\nopen source\
    \ Java library for the Twitter API. With Twitter4J, you can\neasily\n\n*   Post\
    \ a tweet\n\n*   Get the timeline of a user\n\n*   Get a list of friends and followers\
    \ of a user\n\n*   Get the favorites of a user\n\n*   Send and receive direct\
    \ messages\n\n*   Search for tweets\n\n*   Use the Twitter Streaming API\n\nHistory\n\
    Its author, Yusuke Yamamoto, used to work for Twitter in 2012.\nWhile he did,\
    \ he was briefly meant to represent Twitter in the Social\nJSR Expert Group.\n\
    The last version was 4.1.2 in October 2022\\. After a longer break\nbetween 2018\
    \ and 2022, it now seems reasonably well maintained again. A\nrisk, however, is\
    \ that Twitter4J so far only supports Twitter API v1.1\nand with the whole Elon\
    \ Musk situation at Twitter, nobody knows for sure\nif and how long both will\
    \ be available. On the other hand, with\nTwitter’s workforce decimated to just\
    \ a mere shadow of pre-Musk times,\nit is unlikely all services are going to be\
    \ migrated to v2 only in just\na few weeks. And\nwith a Premium v1.1 API offering\
    \ some revenue, it isn’t likely going\naway overnight without granting paying\
    \ users a time to migrate to v2\nequivalents. While Gnip has been purchased by\
    \ Twitter nearly ten years\nago, the Enterprise API was only rebranded from Gnip\
    \ 2.0 very recently,\nand that process may also be hampered by all the developers\
    \ with\nexperience Musk either fired or made leave Twitter on their own.\n\nExamples\n\
    \n**Get a timeline**\n\n```\nimport twitter4j.Twitter;\nimport twitter4j.TwitterException;\n\
    import twitter4j.v1.Status;\nimport java.util.List;\nclass Main {\npublic static\
    \ void main(String[] args) throws TwitterException {\nTwitter twitter = Twitter.getInstance();\n\
    List statuses = twitter.v1().timelines().getHomeTimeline();\nSystem.out.println(\"\
    Showing home timeline.\");\nfor (Status status : statuses) {\nSystem.out.println(status.getUser().getName()\
    \ + \":\" +\nstatus.getText());\n}\n}\n}\n```\n\n**Post a tweet**\n\n```\nimport\
    \ twitter4j.Twitter;\nTwitter twitter = Twitter.getInstance();\nStatus status\
    \ = twitter.v1().tweets().updateStatus(latestStatus);\nSystem.out.println(\"Successfully\
    \ updated the status to [\" + status.getText() + \"].\");\n```\n\n**Search for\
    \ tweets**\n\n```\nimport twitter4j.Twitter;\nimport twitter4j.TwitterException;\n\
    import twitter4j.v1.Query;\nimport twitter4j.v1.QueryResult;\nimport twitter4j.v1.Status;\n\
    class Main {\npublic static void main(String[] args) throws TwitterException {\n\
    Twitter twitter = Twitter.getInstance();\nQuery query = Query.of(\"source:twitter4j\
    \ yusukey\");\nQueryResult result = twitter.v1().search().search(query);\nfor\
    \ (Status status : result.getTweets()) {\nSystem.out.println(\"@\" + status.getUser().getScreenName()\
    \ + \":\" + status.getText());\n}\n}\n}\n```\n\n**Exchange direct messages**\n\
    \n```\nimport twitter4j.Twitter;\nimport twitter4j.TwitterException;\nimport twitter4j.v1.DirectMessage;\n\
    class Main {\npublic static void main(String[] args) throws TwitterException {\n\
    long recipientId = Long.parseLong(args[0]);\nString message = args[1];\nTwitter\
    \ twitter = Twitter.getInstance();\nDirectMessage directMessage = twitter.v1().directMessages().sendDirectMessage(recipientId,\
    \ message);\nSystem.out.printf(\"Sent: %s to @%d%n\", directMessage.getText(),\
    \ directMessage.getRecipientId());\n}\n}\n```\n\n**Streaming API**\n\n```\nimport\
    \ twitter4j.*;\nimport twitter4j.v1.*;\nimport java.io.IOException;\nclass Main\
    \ {\npublic static void main(String[] args) throws TwitterException, IOException\
    \ {\nStatusListener listener = new StatusListener(){\n@Override\npublic void onStatus(Status\
    \ status) {\nSystem.out.println(\"%s : %s\".formatted(status.getUser().getName(),\
    \ status.getText()));\n}\n@Override\npublic void onDeletionNotice(StatusDeletionNotice\
    \ statusDeletionNotice) {}\n@Override\npublic void onTrackLimitationNotice(int\
    \ numberOfLimitedStatuses) {}\n@Override\npublic void onScrubGeo(long userId,\
    \ long upToStatusId) {}\n@Override\npublic void onStallWarning(StallWarning warning)\
    \ {}\n@Override\npublic void onException(Exception ex) {\nex.printStackTrace();\n\
    }\n};\nTwitterStream twitterStream = Twitter.newBuilder()\n.listener(listener).build().v1().stream();\n\
    // sample() method internally creates a thread which manipulates TwitterStream\
    \ and calls these adequate listener methods continuously.\ntwitterStream.sample();\n\
    }\n}\n```\n\nSpecialized Frameworks\nThe following frameworks allow you to interact\
    \ with popular\nspecialized social networks using Java or other JVM languages\
    \ like\nKotlin or Groovy for some of them.\n\nEchobox LinkedIn SDK\nebx-linkedin-sdk\
    \ is a LinkedIn Java client maintained by Echobox, a\ncompany offering social\
    \ media and online marketing solutions\nparticularly for the publishing and media\
    \ industry.\n\nInstallation\n\nAdd the following dependency to the Maven POM of\
    \ your project:\n\n```\ncom.echobox\nebx-linkedin-sdk\nx.x.x\n\n```\n\nThe latest\
    \ version is currently 4.5.0.\n\nIf you enable snapshot repositories in your POM\
    \ you could also use the\nlatest snapshot version:\n\n```\n\noss.sonatype.org-snapshot\n\
    http://oss.sonatype.org/content/repositories/snapshots\nfalse\ntrue\n\n```\n\n\
    Usage and Examples\n\n**Get LinkedIn credentials:**\n\n1.  Go to [`www.linkedin.com/developers/apps`](http://www.linkedin.com/developers/apps).\n\
    \n2.  Sign in if you’re not logged in yet.\n\n3.  Click **Create app**.\n\n4.\
    \  If you already have a **Company Page**, either select an\n    existing company\
    \ or select **New Company** and enter the\n    company information.\n\n5.  Under\
    \ **Create an app**, enter values for the following\n    parameters:\n\n    *\
    \   App name `–` This is the name of\n        your application displayed at the\
    \ end of each post, for example,\n        “ApressBookDemoApp”, or your company\
    \ name.\n\n    *   LinkedIn page `–` This is the\n        **Company Page** you\
    \ created earlier, for example, [`https://linkedin.com/company/123456`](https://linkedin.com/company/123456).\n\
    \n    *   Privacy policy URL `–` Link to your\n        privacy policy (optional),\
    \ for example, [`http://www.mysite.com/privacy`](http://www.mysite.com/privacy).\n\
    \n    *   App logo `–` The logo is\n        displayed to users when they authorize\
    \ with your app, ideally a square\n        image.\n\n    *   Legal agreement `–`\
    \ Check that you have\n        read and agree to these terms.\n\n6.  Click on\
    \ **Create app**.\n\n7.  In the **Auth** tab, you’ll find the **Application\n\
    \    credentials** API Key and Client Secret. Click the “Eye” button\n    to reveal\
    \ the client secret. Record these values.\n\n8.  Under **OAuth 2.0 settings**,\
    \ add a redirect URL for\n    your app, for example, `http://localhost:8080/callback.`\n\
    \n**Request an authorization code:**\n\n1.  If it is a first-time request, the\
    \ permission request timed out, or\n    was manually revoked by the member: the\
    \ browser is redirected to\n    LinkedIn’s authorization consent window.\n\n2.\
    \  If there is an existing permission grant from the member: the\n    authorization\
    \ screen is bypassed and the member is immediately\n    redirected to the URL\
    \ provided in the `redirect_uri` query\n    parameter.\n\n3.  When the member\
    \ completes the authorization process, the browser is\n    redirected to the URL\
    \ provided in the `redirect_uri` query\n    parameter.\n\nTable 6-1\nParameters\
    \ for Authorization Call\n\n Parameter |\n Type |\n Description |\n Required |\n\
    \n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\n response_type |\n\
    \ string |\n The value of this field should always be `code` |\n Yes |\n\n client_id\
    \ |\n string |\n The API Key value generated when you registered your application\
    \ |\n Yes |\n\n redirect_uri |\n url |\n The URI your users are sent back to after\
    \ authorization. This value must\nmatch one of the redirect URLs defined in your\
    \ application\nconfiguration. For example, `http://localhost:8080/callback` |\n\
    \ Yes |\n\n state |\n string |\n A unique string value of your choice that is\
    \ hard to guess. Used to\nprevent CSRF. For example, `state=DCEeFWf45A53sdfKef424`\
    \ |\n No |\n\n scope |\n string |\n URL-encoded, space-delimited list of member\
    \ permissions your application is\nrequesting on behalf of the user. These must\
    \ be explicitly requested.\nFor example, `scope=r_liteprofile%20r_emailaddress%20w_member_social`\
    \ |\n Yes |\n\n```\nGET https://www.linkedin.com/oauth/v2/authorization\n```\n\
    \nSample request:\n\n```\nGET https://www.linkedin.com/oauth/v2/authorization?response_type=code&client_id={your_client_id}&redirect_uri={your_callback_url}&state=foobar&scope=r_liteprofile%20r_emailaddress%20w_member_social\n\
    ```\n\nUse the authorization code to get the access token:\n\n```\nVersionedLinkedInClient\
    \ client = new DefaultVersionedLinkedInClient(Version.DEFAULT_VERSION);\nLinkedInClient.AccessToken\
    \ accessToken = client.obtainUserAccessToken(clientId, clientSecret, redirectURI,\
    \ code);\n```\n\nCreate a LinkedIn Share:\n\n```\nVersionedPostConnection postConnection\
    \ =\nnew VersionedPostConnection(new DefaultLinkedInClient(authToken));\nDistribution\
    \ distribution = new Distribution(Distribution.FeedDistribution.MAIN_FEED);\n\
    String commentary = \"Message here\"\nPost post = new Post(ownerURN, commentary,\
    \ distribution, Post.LifecycleState.PUBLISHED,\nPost.Visibility.PUBLIC);\nString\
    \ articleLink = \"https://www.example.com/1234\";\nString title = \"title\";\n\
    String description = \"description\";\nPostUtils.fillArticleContent(post, articleLink,\
    \ imageURN, title, description);\nURN postURN = postConnection.createPost(post);\n\
    ```\n\nRetrieve an organization from LinkedIn:\n\n```\nVersionedOrganizationConnection\
    \ connection =\nnew VersionedOrganizationConnection(linkedInClient);\nOrganization\
    \ organization = connection.retrieveOrganization(organizationURN, Parameter\n\
    .with(\"projection\",\n\"(elements*(*,roleAssignee~(localizedFirstName, localizedLastName),\"\
    \n+ \"organizationalTarget~(localizedName)))\"));\n```\n\nDiscord\n\nThere are\
    \ at least three major Java frameworks for Discord, all very\nactively developed\
    \ by the community:\n\n*   Discord4J\n\n*   Java Discord API (JDA)\n\n*   Javacord\n\
    \nAuthentication\n\nFirst, you need to create an application from the\nDiscord\
    \ Application Dashboard: [`https://discord.com/developers/applications`](https://discord.com/developers/applications).\n\
    \n1.  Sign in if you’re not logged in yet.\n\n2.  Click **New Application**.\n\
    \n3.  Pick a name, for example, “ApressBookDemoApp”, accept the developer\n  \
    \  terms, and click **Create**.\n\n4.  Under **General Information**, you may\
    \ enter values for the\n    following parameters:\n\n    *   Name `–`\n      \
    \  This is the name of your application you entered before.\n\n    *   App icon\
    \ `–` The logo is\n        displayed to users when they authorize with your app.\n\
    \n    *   Description `–` Enter a short\n        description of the application.\n\
    \n    *   Tags `–`\n        Up to five tags to describe the content and functionality\
    \ of your\n        application.\n\n    *   Application ID `–` The application\
    \ ID\n        to copy into your application.\n\n    *   Public key `–` The public\
    \ key to\n        copy into your application.\n\n    *   Server count `–` This\
    \ is an\n        approximation of the number of servers your application is in.\
    \ The value\n        is **read only**.\n\n    *   Interactions endpoint URL `–`\
    \ You can optionally\n        configure an interactions endpoint to receive interactions\
    \ via HTTP\n        POSTs rather than over Gateway with a bot user.\n\n    * \
    \  Linked roles verification URL `–` You can configure a\n        verification\
    \ URL to enable your application as a requirement in a server\n        role’s\
    \ Links settings.\n\n    *   Terms of Service URL `–` Link to your\n        application’s\
    \ Terms of Service (optional).\n\n    *   Privacy policy URL `–`Link to your privacy\n\
    \        policy (optional).\n\n5.  Under **OAuth2**, you find the following parameters:\n\
    \n    *   Client ID `–` The client ID to\n        copy into your application.\n\
    \n    *   Client Secret `–` The client secret\n        to copy into your application.\
    \ You must regenerate it at first use and\n        be sure to **copy it** as it\
    \ will not be shown to you\n        again.\n\n    *   Redirects `–` You must specify\
    \ at\n        least one URI for authentication to work. If you pass a URI in an\
    \ OAuth\n        request, it must exactly match one of the URIs you enter here.\n\
    \n6.  Under **Bot**, you find the following parameters:\n\n    *   Username `–`\
    \ This is the name of\n        your bot.\n\n    *   Icon `–`\n        The logo\
    \ is displayed to users of your bot.\n\n    *   Token `–`\n        The token to\
    \ copy into your application. For security purposes, tokens\n        can only\
    \ be viewed once, when created. If you forgot or lost access to\n        your\
    \ token, please regenerate a new one.\n\nDiscord4J\nDiscord4J is a reactive Java\n\
    wrapper for the official Discord API, using reactive principles and the\nReactor\
    \ framework for asynchronous and nonblocking API calls.\n\nInstallation\n\nAdd\
    \ the following dependency to the Maven POM of your project:\n\n```\n\ncom.discord4j\n\
    discord4j-core\n3.2.6\n\n```\n\nQuick Example\n\nIn the following example, whenever\
    \ a user\nsends a !ping message, the bot will immediately respond with Pong!:\n\
    \n```\npublic class ExampleBot {\npublic static void main(String[] args) {\nString\
    \ token = args[0];\nDiscordClient client = DiscordClient.create(token);\nGatewayDiscordClient\
    \ gateway = client.login().block();\ngateway.on(MessageCreateEvent.class).subscribe(event\
    \ -> {\nMessage message = event.getMessage();\nif (\"!ping\".equals(message.getContent()))\
    \ {\nMessageChannel channel = message.getChannel().block();\nchannel.createMessage(\"\
    Pong!\").block();\n}\n});\ngateway.onDisconnect().block();\n}\n}\n```\n\nReactive\
    \ Example\n\nThis example shows the same bot, but in a reactive manner, using\
    \ Project\nReactor:\n\n```\npublic class ExampleBot {\npublic static void main(String[]\
    \ args) {\nString token = args[0];\nDiscordClient client = DiscordClient.create(token);\n\
    client.login().flatMapMany(gateway -> gateway.on(MessageCreateEvent.class))\n\
    .map(MessageCreateEvent::getMessage)\n.filter(message -> \"!ping\".equals(message.getContent()))\n\
    .flatMap(Message::getChannel)\n.flatMap(channel -> channel.createMessage(\"Pong!\"\
    ))\n.blockLast();\n}\n}\n```\n\nSharding Example\n\nThis example shows multiple\
    \ shard groups under the same JVM:\n\n```\n// the first group will get even shard\
    \ IDs\nShardingStrategy first = ShardingStrategy.builder()\n.count(10)\n.filter(s\
    \ -> s.getIndex() % 2 == 0)\n.build();\n// the second group will get odd shard\
    \ IDs\nShardingStrategy second = ShardingStrategy.builder()\n.count(10)\n.filter(s\
    \ -> s.getIndex() % 2 != 0)\n.build();\nDiscordClient sharedClient = DiscordClient.create(System.getenv(\"\
    token\"));\nShardCoordinator coordinator = LocalShardCoordinator.create();\nGatewayDiscordClient\
    \ firstGroup = sharedClient.gateway()\n.setSharding (first)\n.setEnabledIntents(...)\n\
    .setShardCoordinator(coordinator)\n.login()\n.block();\nGatewayDiscordClient secondGroup\
    \ = sharedClient.gateway()\n.setSharding(second)\n.setEnabledIntents(...)\n.setShardCoordinator(coordinator)\n\
    .login()\n.block();\n```\n\nJava Discord API\nJava Discord API (JDA, not to be\
    \ confused\nwith JTA or Jakarta Transactions) aims to offer a clean Java object\n\
    model around the Discord REST API and Websocket events.\n\nInstallation\n\nAdd\
    \ the following dependency to the Maven POM of your project:\n\n```\nnet.dv8tion\n\
    JDA\nVERSION\n\n```\n\nConfiguration\n\nBoth `JDABuilder`\nand `DefaultShardManagerBuilder`\n\
    offer a set of\nconfigurations:\n\n```\npublic static void main(String[] args)\
    \ {\nJDABuilder builder = JDABuilder.createDefault(\"token\");\n// Disable parts\
    \ of the cache\nbuilder.disableCache(CacheFlag.MEMBER_OVERRIDES, CacheFlag.VOICE_STATE);\n\
    // Enable the bulk delete event\nbuilder.setBulkDeleteSplittingEnabled(false);\n\
    // Set activity (like \"playing Something\")\nbuilder.setActivity(Activity.watching(\"\
    TV\"));\nJDA jda = builder.build();\n}\n```\n\nEventListener Example\n\nThe following\
    \ example shows how to use the JDA event system:\n\n```\npublic class ReadyListener\
    \ implements EventListener\n{\npublic static void main(String[] args)\nthrows\
    \ InterruptedException\n{\n// Note: It is important to register your ReadyListener\
    \ before building\nJDA jda = JDABuilder.createDefault(\"token\")\n.addEventListeners(new\
    \ ReadyListener())\n.build();\n// optionally block until JDA is ready\njda.awaitReady();\n\
    }\n@Override\npublic void onEvent(GenericEvent event)\n{\nif (event instanceof\
    \ ReadyEvent)\nSystem.out.println(\"API is ready!\");\n}\n}\n```\n\nSharding Example\n\
    \nDiscord allows Bot accounts to share load across sessions by limiting\nthem\
    \ to a fraction of the total connected Guilds/Servers. This can be\ndone using\
    \ sharding:\n\n```\npublic static void main(String[] args) throws Exception\n\
    {\nJDABuilder shardBuilder = JDABuilder.createDefault(\"token\");\n//register\
    \ your listeners here using shardBuilder.addEventListeners(...)\nshardBuilder.addEventListeners(new\
    \ MessageListener());\nfor (int i = 0; i < 10; i++)\n{\nshardBuilder.useSharding(i,\
    \ 10)\n.build();\n}\n}\n```\n\nJavacord\nJavacord is a modern Java\nlibrary for\
    \ Discord focusing on simplicity and speed. By reducing itself\nto standard Java\
    \ classes and features like `Optional` or `CompletableFuture,` it\nis easy to\
    \ learn and use for every Java developer and does not introduce\ntoo many concepts\
    \ or abstractions of its own.\n\nInstallation\n\nAdd the following dependency\
    \ to the Maven POM of your project:\n\n```\norg.javacord\njavacord\n3.8.0\npom\n\
    \n```\n\nBasic Example\n\nThe following example logs the bot in and replies to\
    \ every “!ping”\nmessage with “Pong!”. Note that message content is a privileged\
    \ Intent\nand needs to be enabled:\n\n```\npublic class MyFirstBot {\npublic static\
    \ void main(String[] args) {\n// Insert your bot's token here\nString token =\
    \ \"your token\";\nDiscordApi api = new DiscordApiBuilder().setToken(token).addIntent(Intent.MESSAGE_CONTENT).login().join();\n\
    // Add a listener which answers with \"Pong!\" if someone writes \"!ping\"\napi.addMessageCreateListener(event\
    \ -> {\nif (event.getMessageContent().equalsIgnoreCase(\"!ping\")) {\nevent.getChannel().sendMessage(\"\
    Pong!\");\n}\n});\n// Print the invite url of your bot\nSystem.out.println(\"\
    You can invite the bot by using the following url: \" + api.createBotInvite());\n\
    }\n}\n```\n\nSlash Command Example\n\nThe following example shows how we can let\
    \ the bot send answers to a\nsimple slash command:\n\n```\npublic class MyFirstBot\
    \ {\npublic static void main(String[] args) {\nString token = \"your token\";\n\
    DiscordApi api = new DiscordApiBuilder().setToken(token).login().join();\napi.addSlashCommandCreateListener(event\
    \ -> {\nSlashCommandInteraction slashCommandInteraction = event.getSlashCommandInteraction();\n\
    if (slashCommandInteraction.getCommandName().equals(\"ping\")) {             \
    \   slashCommandInteraction.createImmediateResponder()\n.setContent(\"Pong!\"\
    )\n.setFlags(MessageFlag.EPHEMERAL) // Only visible for the user which invoked\
    \ the command\n.respond();\n}\n});\n}\n}\n```\n\nMessageBuilder Example\n\nThe\
    \ following example uses the built-in `MessageBuilder`. It is\nvery useful to\
    \ construct complex messages with images,\ncode blocks, embeds, or attachments:\n\
    \n```\npublic class MyListener implements MessageCreateListener {\n@Override\n\
    public void onMessageCreate(MessageCreateEvent event) {\nMessage message = event.getMessage();\n\
    if (message.getContent().equalsIgnoreCase(\"!ping\")) {\nevent.getChannel().sendMessage(\"\
    Pong!\");\n}\n}\n}\n```\n\nEventListener Example\n\nFor better readability, it\
    \ is also possible to have listeners in their\nown class:\n\n```\npublic class\
    \ MyListener implements MessageCreateListener {\n@Override\npublic void onMessageCreate(MessageCreateEvent\
    \ event) {\nMessage message = event.getMessage();\nif (message.getContent().equalsIgnoreCase(\"\
    !ping\")) {\nevent.getChannel().sendMessage(\"Pong!\");\n}\n}\n}\n```\n\nCalling\
    \ the listener:\n\n```\napi.addListener(new MyListener());\n```\n\nTwitch4J\n\
    Twitch4J is a Java and JVM-based\nAPI client for the Twitch REST API Interfaces.\
    \ It supports Java, Kotlin,\nand Groovy.\n\nInstallation\n\nAdd the following\
    \ dependency to your Maven project POM:\n\n```\ncom.github.twitch4j\ntwitch4j\n\
    1.16.0\n\n```\n\nUsage and Examples\n\n**Get an access token**:\n\n1.  Log in\
    \ to the developer console [`https://dev.twitch.tv/console`](https://dev.twitch.tv/console)\n\
    \    using your Twitch account. If you don’t have an account, select the\n   \
    \ **Sign Up** tab to create one.\n\n    *   When you sign up for an account, Twitch\
    \ sends you an email to\n        verify your account. Be sure to open the email\
    \ and verify your account\n        before proceeding.\n\n    *   You must also\
    \ enable two-factor authentication (2FA) for your\n        account. To enable\
    \ 2FA, navigate to Security and Privacy, and follow the\n        steps for enabling\
    \ 2FA under the Security section.\n\n    *   You’ll need to refresh your console\
    \ for these changes to take\n        effect.\n\n2.  Select the **Applications**\
    \ tab on the developer console\n    and then click **Register Your Application**.\n\
    \n3.  Set **Name** to your application’s name. The name must\n    be unique among\
    \ all Twitch applications. Your app’s name is listed on\n    the Connections page\
    \ under **Other Connections** if your\n    app requires user consent to access\
    \ or modify the user’s resources.\n\n4.  Set **OAuth Redirect URLs** to the callback\
    \ URL that\n    your app uses for authorizations. After adding your redirect URL,\
    \ click\n    **Add**.\n\n5.  Select a **Category** (type of application) that\
    \ your\n    app belongs to.\n\n6.  Click the **I’m not a robot** check box.\n\n\
    7.  Click **Create**.\n\n8.  Back in the **Applications** tab, locate your app\
    \ under\n    **Developer Applications**, and click\n    **Manage**.\n\n9.  Note\
    \ your **Client ID**, which you’ll use to get your\n    access token and to set\
    \ the Client-Id header in all API requests. Client\n    IDs are considered public\
    \ and can be embedded in a web page’s\n    source.\n\n10.  Depending on the flow\
    \ you use to get a token, you may need a client\n    secret. For example, the\
    \ Authorization Code Grant Flow requires a client\n    secret. Click **New Secret**\
    \ to generate a secret that\n    you’ll use to get your access token. You must\
    \ copy the secret and store\n    it somewhere safe. Getting a new secret invalidates\
    \ the previous secret,\n    which might make your API requests fail until you\
    \ update your app.\n\nInitialize and configure Twitch4J Client:\n\n```\nTwitchClient\
    \ twitchClient = TwitchClientBuilder.builder()\n.withEnableHelix(true)\n.build();\n\
    ```\n\nChannels\n\n**Join a channel**\n\n```\ntwitchClient.getChat().joinChannel(\"\
    PlayOverwatch\");\n```\n\n**Write Channel Chat to the Console**\n\n```\npublic\
    \ class WriteChannelChatToConsole {\n/**\n* Register events of this class with\
    \ the EventManager/EventHandler\n*\n* @param eventHandler SimpleEventHandler\n\
    */\npublic WriteChannelChatToConsole(SimpleEventHandler eventHandler) {\neventHandler.onEvent(ChannelMessageEvent.class,\
    \ event -> onChannelMessage(event));\n}\n/**\n* Subscribe to the ChannelMessage\
    \ Event and write the output to the console\n*/\npublic void onChannelMessage(ChannelMessageEvent\
    \ event) {\nSystem.out.printf(\n\"Channel [%s] - User[%s] - Message [%s]%n\",\n\
    event.getChannel().getName(),\nevent.getUser().getName(),\nevent.getMessage()\n\
    );\n}\n}\n```\n\nClips\n\n**Create a clip**\n\n```\nCreateClipList clipData =\
    \ twitchClient.getHelix().createClip(accessToken, \"149223493\", false).execute();\n\
    clipData.getData().forEach(clip -> {\nSystem.out.println(\"Created Clip with ID:\
    \ \" + clip.getId());\n});\n```\n\n**Write a clip’s ID to the Console**\n\n```\n\
    ClipList clipList = twitchClient.getHelix().getClips(null, \"488552\", null, null,\
    \ null, null, null, null).execute();\nclipList.getData().forEach(clip -> {\nSystem.out.println(\"\
    Found Clip: \" + clip.getId());\n});\n```\n\nGames\n\n**Write a game’s ID and\
    \ name to the Console**\n\n```\nGameList resultList = twitchClient.getHelix().getGames(Arrays.asList(overwatchGameId),\
    \ null).execute();\nresultList.getGames().forEach(game -> {\nSystem.out.println(\"\
    Game ID: \" + game.getId() + \" is \" + game.getName());\n});\n```\n\nVertical\
    \ Frameworks\nVertical Social Frameworks allow the integration with domain-specific\n\
    social networks.\n\nGitHub\n\nWhile GitHub/Microsoft itself\nhas no official Java\
    \ API for GitHub, there are two actively maintained\nAPIs offering a domain model,\
    \ besides several others that support it on\nan REST/OpenID Connect level:\n\n\
    *   GitHub API for Java\n\n*   GitHub Java Client\n\nBoth offer a variety of authentication\
    \ methods, including a personal\naccess token.\n\nToken Generation\n\nTo generate\
    \ a new token for GitHub REST APIs:\n\n1.  Log in to the GitHub Account\n\n2.\
    \  Go to Settings ➤ Developer settings ➤ Personal access tokens\n\n3.  Click on\
    \ generate a new token\n\n4.  Confirm the user password to continue\n\n5.  Add\
    \ a description to the token\n\n6.  Under the select scopes option, check all\
    \ the boxes\n\n7.  Click on generate a new token\n\nGitHub API for Java\nGitHub\
    \ API for Java provides an object model around the GitHub REST\nAPI. Its creation\
    \ is led by Kohsuke Kawaguchi, the “father” of Jenkins\nCI.\n\nAuthentication\n\
    \nThe GitHub Java library offers multiple authentication methods:\n\n*   Username\
    \ and password (not recommended, except for development\n    purposes)\n\n*  \
    \ Personal access token\n\n*   JWT token\n\n*   GitHub app installation token\n\
    \n    *   User\n\n    *   Organization\n\nUsage Examples\nWe use a personal access\
    \ token, following the steps for [Token\nGeneration](#600273_1_En_6_Chapter.xhtml#Sec57).\n\
    \nRepositories\n\nHere’s an example of using the GitHub API for Java to connect\
    \ against\nGitHub and create a new repository before cleaning it up again:\n\n\
    ```\nGitHub github = new GitHubBuilder().withOAuthToken(\"my_personal_token\"\
    ).build();\nGHRepository repo = github.createRepository(\n\"new-repository\",\"\
    this is my new repository\",\n\"https://www.kohsuke.org/\",true/*public*/);\n\
    repo.addCollaborators(github.getUser(\"abcde\"),github.getUser(\"jdoe\"));\nrepo.delete();\n\
    ```\n\nOrganizations\n\nTo create resources in GitHub for an organization, you\
    \ must create an\nobject of type `GHOrganization`:\n\n```\nGHOrganization organizationClient(GitHub\
    \ gitHub, String organizationName) throws IOException {\nreturn gitHub.getOrganization(organizationName);\n\
    }\n```\n\nNow we can work with the `GHOrganization`.\nCreating a repository or\
    \ any other methods to create resources will do\nso under that organization:\n\
    \n```\nvoid createRepository(GHOrganization organization) {\norganization.createRepository(\"\
    repository-name\")\n.private_(true)\n.wiki(false)\n.projects(false)\n.description(\"\
    Description\")\n.allowMergeCommit(true)\n.allowSquashMerge(false)\n.allowRebaseMerge(false)\n\
    .create()\n}\n```\n\nGitHub Java Client\nGitHub Java Client is a small Java library\
    \ for talking to\nGitHub/GitHub Enterprise and interacting with projects. It is\
    \ maintained\nby the Swedish Social Music Streaming portal Spotify. It supports\n\
    authentication via access tokens, JWT endpoints, and GitHub Apps (via\nprivate\
    \ key).\n\nInstallation\n\nInclude the latest version of github-client\ninto your\
    \ project POM:\n\n```\ncom.spotify\ngithub-client\nversion\n\n```\n\nUsage Examples\n\
    \nWe use a personal access token, following the steps for [Token\nGeneration](#600273_1_En_6_Chapter.xhtml#Sec57):\n\
    \n```\nfinal GitHubClient githubClient = GitHubClient.create(URI.create(\"https://api.github.com/\"\
    ), \"my-access-token\");\n```\n\nThis client attempts to mirror the GitHub API\
    \ endpoints. As an example,\nto get details of a commit, use the `GET /repos/:owner/:repo/commits`\
    \ API call, under the repos API.\nTherefore, `getCommit` lives under\nthe `RepositoryClient`:\n\
    \n```\nfinal RepositoryClient repositoryClient = githubClient.createRepositoryClient(\"\
    my-org\", \"my-repo\");\nlog.info(repositoryClient.getCommit(\"sha\").get().htmlUrl());\n\
    ```\n\nRepositories\n\nMethods related to check runs or issues are also located\
    \ under the `RepositoryClient`:\n\n```\nfinal ChecksClient checksClient = repositoryClient.createChecksApiClient();\n\
    checksClient.createCheckRun(CHECK_RUN_REQUEST);\nfinal IssueClient issueClient\
    \ = repositoryClient.createIssueClient();\nissueClient.createComment(ISSUE_ID,\
    \ \"comment body\")\n.thenAccept(comment -> log.info(\"created comment \" + comment.htmlUrl()));\n\
    ```\n\nOrganizations\n\nMethods related to teams and memberships are located\n\
    under the `OrganisationClient`:\n\n```\nfinal TeamClient teamClient = organisationClient.createTeamClient();\n\
    final Membership membership =  teamClient.getMembership(\"teamname\");\n```\n\n\
    Uber\nSimilar to Meta, Uber maintains its own\nSDKs for a number of popular languages\
    \ including Java.\n\nJava SDK\nThe following examples show how to use the Java\
    \ Rides SDK.\nFirst, you need to register your app on the Uber Developer Dashboard:\n\
    [`https://developer.uber.com/dashboard/`](https://developer.uber.com/dashboard/).\n\
    \nInstallation\n\nAdd the following dependencies to your project (Gradle because\
    \ it\nsupports both Java and Kotlin/Android):\n\n```\ndependencies {\ncompile\
    \ 'com.uber.sdk:rides:0.5.2'\n}\n```\n\nUse the latest version where available.\n\
    \nExamples\n**Get an Uber session with a server token**\n\nWhen you registered\
    \ your app, you were given a server token, client ID,\nand client secret. Use\
    \ them to authenticate your application:\n\n```\nSessionConfiguration config =\
    \ new SessionConfiguration.Builder()\n.setClientId(\"\")\n.setServerToken(\"\"\
    )\n.build();\nServerTokenSession session = new ServerTokenSession(config);\n```\n\
    \n**Get a list of available products**\n\n```\nResponse> response = service.getProducts(37.79f,\
    \ -122.39f).execute();\nList products = response.body();\nString productId = products.get(0).getProductId();\n\
    ```\n\n**Get estimates for time and price**\n\n```\nResponse response = service.getPickupTimeEstimate(37.79f,\
    \ -122.39f, productId).execute()\n```\n\n**Request a ride**\n\n```"
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n#### 用于客户端认证的私钥\
    \ JWT\n\n通过社交媒体登录功能中的 `oidcLogin` 元素配置的 OpenID Connect 客户端，支持使用 `private_key_jwt`\
    \ 客户端认证方法与 OpenID Connect 令牌端点进行交互。在社交媒体登录功能中启用此功能的过程与 OpenID Connect 客户端 1.0\
    \ 功能相同：\n\n```\n\n使用 OpenShift 服务账户进行认证和授权\n\n社交媒体登录功能可以配置为使用 OpenShift 服务账户来认证和授权受保护的资源请求。通过此配置，服务器管理员可以保护可能产生敏感信息的端点，例如监控和指标端点。服务账户可以通过提供在\
    \ OpenShift 集群内创建的、包含在请求中的服务账户令牌来进行自身认证。以下示例展示了如何配置社交媒体登录功能，以使用 OpenShift 服务账户作为单点登录提供者：\n\
    \n```\n`okdServiceLogin` 元素会认证 Open Liberty 接收到的所有受保护资源请求。服务账户所在的 OpenShift 项目将用作该服务账户进行授权决策的组。\n\
    \n使用 Active Directory 作为认证提供者\n\n您可以配置 Open Liberty 服务器，使其使用 Active Directory\
    \ 作为受保护资源的认证提供者。`oidcLogin` 元素通过使用 OpenID Connect 协议来配置社交登录。通过 OpenID Connect，发现端点\
    \ URL 提供了客户端与认证提供者（此处为 Active Directory）交互所需的信息。在以下示例中，`discoveryEndpoint` 属性指定了\
    \ Active Directory 的端点 URL：\n\n```\n\nKeycloak\nKeycloak [66] 是一个用于应用程序和服务的开源身份、访问管理和单点登录解决方案。用户可以针对\
    \ Keycloak 进行认证，而无需针对每个单独的应用程序进行认证，从而使应用程序免于处理登录表单、认证或存储用户身份信息。Keycloak 还提供社交登录、支持桌面或移动应用程序，并能集成到其他解决方案中，包括\
    \ LDAP、Active Directory、OAuth、OpenID Connect 或 SAML。\n\n历史\nKeycloak 由 Bill Burke\
    \ 和 Stian Thorgersen 于 2014 年创建。首个版本于 2014 年 9 月发布，此前开发工作已进行了大约一年。2016 年，Red Hat\
    \ 将其 Red Hat SSO 产品从基于 PicketLink 框架转向 Keycloak 上游项目，此前已将 PicketLink 代码库合并到 Keycloak\
    \ 中。\n自那时起，Keycloak 经历了近乎狂热的发布周期和版本号变更。2016 年 6 月底，大约在 Red Hat 将 Keycloak 作为其\
    \ SSO 产品基础的时候，2.0.0 版本发布。大约一年后，3.0.0 版本问世，随后是 2018 年 6 月的 Keycloak 4.0.0。\nJava\
    \ 和 OpenJDK 的发布节奏（自 2021 年起，每六个月发布一个新的 JDK 主版本，每两年发布一个长期服务版本）可能对其产生了一些影响，但不仅是\
    \ Keycloak，Red Hat 的其他项目（如 WildFly）在 2019 年之后似乎也陷入了版本狂热，因为 Keycloak 5.0.0 于 2019\
    \ 年 3 月发布，而 6.0.0 仅在一个月后发布。到 2019 年 11 月，版本号已跃升至 8。截至 2021 年 8 月，最新的 Keycloak\
    \ 版本是 15.0.2。虽然至少在第一位数上的节奏有时看起来有所放缓，但版本 13 到 15 都是在 2021 年一年内发布的，这使得 Red Hat 看起来至少每三到四个月就会发布一个主版本，有时甚至更快，仅在\
    \ 2021 年下半年略有放缓。发布说明有时只是一行文字，这让人怀疑版本号的巨大飞跃是如何合理的，但看起来是营销驱动了它，并且底层的 WildFly 版本号增长甚至比\
    \ Keycloak 还要快，达到了 25，WildFly 22 到 25 也都是在 2021 年实现的。从 17.0.0 版本开始，默认的 Keycloak\
    \ 发行版从 WildFly 切换到了 Quarkus。\n2023 年 4 月 10 日，Keycloak 被 CNCF 接纳为孵化项目。\n\n概述\n\
    Keycloak 的目标是让应用程序开发者能够简单、轻松地保护其企业应用和服务的安全。\n\n概念\n\nKeycloak 基于以下概念：\n\n*   认证\n\
    \n*   授权\n\n*   凭据\n\n*   领域\n\n认证\n\n这是一个提供者示例，用于检查请求是否满足认证器的要求：\n\n```\npackage\
    \ org.keycloak.authentication;\npublic interface Authenticator extends Provider\
    \ {\n/**\n* 认证器的初始调用。此方法应检查当前 HTTP 请求，以确定请求是否满足认证器的要求。\n* 如果不满足，则应通过调用 AuthenticationFlowContext.challenge(Response)\
    \ 发送回质询响应。\n* 如果此质询是认证，则表单的操作 URL 必须指向\n*\n* /realms/{realm}/login-actions/authenticate?code={session-code}&execution={executionId}\n\
    *\n* 或\n*\n* /realms/{realm}/login-actions/registration?code={session-code}&execution={executionId}\n\
    *\n* {session-code} 涉及从 AuthenticationFlowContext.generateAccessCode() 生成的代码。{executionId}\n\
    * 涉及从 AuthenticationFlowContext.getExecution() 获取的 AuthenticationExecutionModel.getId()\
    \ 值。\n*\n* 操作 URL 将调用下面描述的 action() 方法。\n*\n* @param context\n*/\nvoid authenticate(AuthenticationFlowContext\
    \ context);\n/**\n* 从表单操作调用。\n*\n* @param context\n*/\nvoid action(AuthenticationFlowContext\
    \ context);\n/**\n* 此认证器是否要求用户已被识别？即 AuthenticationContext.getUser() 不为 null？\n\
    *\n* @return\n*/\nboolean requiresUser();\n/**\n* 此认证器是否已为此用户配置？\n*\n* @param\
    \ session\n* @param realm\n* @param user\n* @return\n*/\nboolean configuredFor(KeycloakSession\
    \ session, RealmModel realm, UserModel user);\n/**\n* 设置配置认证器的操作\n*\n*/\nvoid\
    \ setRequiredActions(KeycloakSession session, RealmModel realm, UserModel user);\n\
    /**\n* 如果认证器与某个操作关联，请覆盖此方法\n* @return\n*/\ndefault List getRequiredActions(KeycloakSession\
    \ session) {\nreturn Collections.emptyList();\n}\n/**\n* 检查领域中的所有必需操作是否已配置并启用\n\
    * @return\n*/\ndefault boolean areRequiredActionsEnabled(KeycloakSession session,\
    \ RealmModel realm) {\nfor (RequiredActionFactory raf : getRequiredActions(session))\
    \ {\nRequiredActionProviderModel rafpm = realm.getRequiredActionProviderByAlias(raf.getId());\n\
    if (rafpm == null) {\nreturn false;\n}\nif (!rafpm.isEnabled()) {\nreturn false;\n\
    }\n}\nreturn true;\n}\n}\n```\n\n密码策略\n许多组织都有特殊的密码策略。Keycloak 提供了丰富的密码策略，可通过管理控制台进行选择。有几种密码策略类型。密码哈希使用哈希算法。密码应符合数字、大小写字符、特殊字符或正则表达式的组合。以及常见的安全措施，例如不能包含用户名、不能多次使用相同密码或设置密码过期日期，之后必须更改密码。\n\
    \n认证流程\n用户或服务在 Keycloak 中进行认证的一系列操作称为认证流程：\n\n```\npackage org.keycloak.authentication;\n\
    public interface AuthenticationFlow {\nString BASIC_FLOW = \"basic-flow\";\nString\
    \ FORM_FLOW = \"form-flow\";\nString CLIENT_FLOW = \"client-flow\";\nResponse\
    \ processAction(String actionExecution);\nResponse processFlow();\nboolean isSuccessful();\n\
    default List getFlowExceptions(){\nreturn Collections.emptyList();\n}\n}\n```\n\
    \nKeycloak 内置了多种认证流程。这些流程可以根据需要进行配置，如果您的应用程序需要不同的流程，您可以随时从头开始创建自己的认证流程，或通过复制现有流程进行修改。\n\
    \n图 5-1 显示了浏览器中可用的认证流程：\n\n![](img/600273_1_En_5_Fig1_HTML.jpg)\n\n一个标题为 key cloak\
    \ 的网页截图。它包含可用的认证。选项卡包括流程、发现、必需操作、密码策略、OTP 策略、webAuth N 无密码策略和 C B I A 策略。此处流程选项被高亮显示。\n\
    \n图 5-1\n浏览器认证流程\n\n*   Cookie\n\n*   身份提供者重定向器\n\n*   表单\n\n    *   用户名/密码\n\n\
    \    *   OTP\n\n*   Kerberos\n\n必须至少启用其中一个才能成功认证。\n\n对于单点登录，Keycloak 支持两种主要协议：\n\
    \n*   OpenID Connect (OIDC)\n\n*   SAML\n\nOIDC 是首选方法，更常用于 RESTful API，而 SAML（我们将在下一节关于\
    \ Shibboleth 的内容中了解更多）在 SOAP Web 服务中更受欢迎，尤其是在学术界。\nSAML 依赖于 XML 消息和文档，而 OIDC 与\
    \ REST 一样与格式无关，最常使用 JWT 作为身份和访问令牌。\n\n对于 OIDC，Keycloak 定义了四种主要的认证流程：\n\n*   授权码流程\
    \ – 适用于基于浏览器或服务器端的应用程序。\n\n*   隐式流程 – 适用于基于浏览器的应用程序，此流程不如授权码流程安全，并且自 OAuth 2.1\
    \ 起已弃用，因此可用于向后兼容，但不再推荐使用。\n\n*   客户端凭据授权 – 适用于 RESTful Web 服务的消费者，涉及存储密钥，因此客户端应信任它们所使用的服务。\n\
    \n授权\n\nKeycloak 支持多种授权策略，并允许组合不同的访问控制机制，例如：\n\n*   基于属性的访问控制 (ABAC)\n\n*   基于角色的访问控制\
    \ (RBAC)\n\n*   基于用户的访问控制 (UBAC)\n\n*   基于上下文的访问控制 (CBAC)\n\n*   基于规则的访问控制\n\n\
    *   基于时间的访问控制\n\n*   通过策略提供者 SPI 实现的自定义访问控制机制\n\n![](img/600273_1_En_5_Fig2_HTML.jpg)\n\
    \n一个流程图描绘了 key cloak 的授权。客户端和服务器之间的通信包括策略执行器、资源服务器、授权服务、策略评估和存储。\n\n图 5-2\nKeycloak\
    \ 授权架构\n\n凭据\n凭据是 Keycloak 用于验证用户身份的数据片段。一些例子包括密码、一次性密码、数字证书、虹膜扫描或指纹。\n\n领域\n\
    领域允许管理一组用户、凭据、角色和组。用户属于一个领域并登录到该领域。领域之间相互隔离，只能管理和认证其控制的用户。\n\n特性\n\nKeycloak 的主要特性如下：\n\
    \n*   客户端（每个应用程序）\n\n*   事件\n\n*   身份提供者\n\n    *   OpenID Connect\n\n    *  \
    \ SAML\n\n    *   社交登录 – 允许使用 Google、GitHub、Facebook、Twitter 和其他社交网络登录\n\n*  \
    \ 安全防御\n\n*   用户界面（主题）\n\n*   用户管理\n\n    *   用户\n\n    *   组\n\n    *   角色\n\n\
    *   用户联合\n\n    *   LDAP\n\n    *   Active Directory\n\n    *   自定义提供者\n\n![](img/600273_1_En_5_Fig3_HTML.jpg)\n\
    \n一个示意图描绘了 key cloak 的主要特性。它包括领域主控、客户端、角色和安全防御、用户联合、身份提供者、open I D connect、S A\
    \ M L 和 U I 主题。\n\n图 5-3\nKeycloak 特性\n\n客户端\nKeycloak 中的客户端是希望在一个领域内认证用户的实体（应用程序或服务）。它们还可以请求身份信息或访问令牌，以便安全地调用由\
    \ Keycloak 保护的网络上的其他服务。在认证过程中，客户端需要发送其 ID 和密钥。这些凭据是通过在认证服务器上注册客户端获得的。\n在一个组织中需要保护和管理许多应用程序时，为所有这些客户端配置协议映射器和作用域可能会变得繁琐。Keycloak\
    \ 允许您在客户端模板中定义共享的客户端配置。\n\n事件\n\nKeycloak 提供了广泛的审计功能。每次交互都可以被记录和审查。有两种类型的事件：\n\
    \n*   登录事件\n\n*   管理事件\n\n每当发生与用户相关的认证操作时，就会产生登录事件，例如登录、登出、失败的登录尝试或用户账户更新时。管理事件由通过管理\
    \ API（无论是通过管理控制台、REST API 还是命令行界面）进行的每次更改触发。监听器 SPI 允许您创建插件并监听这些事件。\n\n以下是一个将事件写入\
    \ `System.out` 的 `EventListenerProvider` 实现示例：\n\n```\npublic class SysoutEventListenerProvider\
    \ implements EventListenerProvider {\nprivate Set excludedEvents;\nprivate Set\
    \ excludedAdminOperations;\npublic SysoutEventListenerProvider(Set excludedEvents,\
    \ Set excludedAdminOpearations) {\nthis.excludedEvents = excludedEvents;\nthis.excludedAdminOperations\
    \ = excludedAdminOpearations;\n}\n@Override\npublic void onEvent(Event event)\
    \ {\n// 忽略排除的事件\nif (excludedEvents != null && excludedEvents.contains(event.getType()))\
    \ {\nreturn;\n} else {\nSystem.out.println(\"EVENT: \" + toString(event));\n}\n\
    }\n@Override\npublic void onEvent(AdminEvent event, boolean includeRepresentation)\
    \ {\n// 忽略排除的操作\nif (excludedAdminOperations != null && excludedAdminOperations.contains(event.getOperationType()))\
    \ {\nreturn;\n} else {\nSystem.out.println(\"EVENT: \" + toString(event));\n}\n\
    }\nprivate String toString(Event event) {\nStringBuilder sb = new StringBuilder();\n\
    sb.append(\"type=\");\nsb.append(event.getType());\nsb.append(\", realmId=\");\n\
    sb.append(event.getRealmId());\nsb.append(\", clientId=\");\nsb.append(event.getClientId());\n\
    sb.append(\", userId=\");\nsb.append(event.getUserId());\nsb.append(\", ipAddress=\"\
    );\nsb.append(event.getIpAddress());\nif (event.getError() != null) {\nsb.append(\"\
    , error=\");\nsb.append(event.getError());\n}\nif (event.getDetails() != null)\
    \ {\nfor (Map.Entry e : event.getDetails().entrySet()) {\nsb.append(\", \");\n\
    sb.append(e.getKey());\nif (e.getValue() == null || e.getValue().indexOf(' ')\
    \ == -1) {\nsb.append(\"=\");\nsb.append(e.getValue());\n} else {\nsb.append(\"\
    ='\");\nsb.append(e.getValue());\nsb.append(\"'\");\n}\n}\n}\nreturn sb.toString();\n\
    }\nprivate String toString(AdminEvent adminEvent) {\nStringBuilder sb = new StringBuilder();\n\
    sb.append(\"operationType=\");\nsb.append(adminEvent.getOperationType());\nsb.append(\"\
    , realmId=\");\nsb.append(adminEvent.getAuthDetails().getRealmId());\nsb.append(\"\
    , clientId=\");\nsb.append(adminEvent.getAuthDetails().getClientId());\nsb.append(\"\
    , userId=\");\nsb.append(adminEvent.getAuthDetails().getUserId());\nsb.append(\"\
    , ipAddress=\");\nsb.append(adminEvent.getAuthDetails().getIpAddress());\nsb.append(\"\
    , resourcePath=\");\nsb.append(adminEvent.getResourcePath());\nif (adminEvent.getError()\
    \ != null) {\nsb.append(\", error=\");\nsb.append(adminEvent.getError());\n}\n\
    return sb.toString();\n}\n@Override\npublic void close() {\n}\n}\n```\n\n及其工厂：\n\
    \n```\npublic class SysoutEventListenerProviderFactory implements EventListenerProviderFactory\
    \ {\nprivate Set excludedEvents;\nprivate Set excludedAdminOperations;\n@Override\n\
    public EventListenerProvider create(KeycloakSession session) {\nreturn new SysoutEventListenerProvider(excludedEvents,\
    \ excludedAdminOperations);\n}\n@Override\npublic void init(Config.Scope config)\
    \ {\nString[] excludes = config.getArray(\"exclude-events\");\nif (excludes !=\
    \ null) {\nexcludedEvents = new HashSet();\nfor (String e : excludes) {\nexcludedEvents.add(EventType.valueOf(e));\n\
    }\n}\nString[] excludesOperations = config.getArray(\"excludesOperations\");\n\
    if (excludesOperations != null) {\nexcludedAdminOperations = new HashSet();\n\
    for (String e : excludesOperations) {\nexcludedAdminOperations.add(OperationType.valueOf(e));\n\
    }\n}\n}\n@Override\npublic void postInit(KeycloakSessionFactory factory) {\n}\n\
    @Override\npublic void close() {\n}\n@Override\npublic String getId() {\nreturn\
    \ \"sysout\";\n}\n}\n```\n\n用户联合\n当您的组织拥有用户数据库时，Keycloak 允许我们与其同步。默认情况下，它支持 LDAP\
    \ 和 Active Directory，但您可以使用 Keycloak 用户存储 API 为任何身份存储创建自定义扩展。\nKeycloak 还可以充当用户和外部身份提供者之间的代理。\n\
    \n社交身份提供者\n社交身份提供者可以将认证委托给受信任的社交媒体账户。Keycloak 包含对 Google、Facebook、Twitter、GitHub、LinkedIn、Microsoft\
    \ 和 Stack Overflow 等社交网络的支持。\n\n![](img/600273_1_En_5_Fig4_HTML.jpg)\n\n一个网页截图显示了身份提供者。它提供了用户定义和社交两种。用户定义包括\
    \ key cloak open I D connect、open I D connect V 1.0 和 S A M L-V 2.0。社交包括 Bit Bucket、Instagram、PayPal、Facebook\
    \ 等。\n\n图 5-4\n社交身份提供者\n\nFacebook\n\n1.  在菜单中点击 ***身份提供者***。\n\n2.  从 *添加提供者*\
    \ 列表中，选择 Facebook。\n    Keycloak 会显示 Facebook 身份提供者的配置页面。\n\n![](img/600273_1_En_5_Fig5_HTML.jpg)\n\
    \n一个网页截图显示了添加 Facebook 提供者的选项。它包括重定向 U R I、客户端 I D、客户端密钥和显示顺序，以及添加和取消选项。\n\n图\
    \ 5-5\n添加 Facebook 作为身份提供者\n\n1.  将 `Redirect URI` 的值复制到剪贴板。\n\n2.  在单独的浏览器标签页中，按照\
    \ Facebook 开发者指南的说明在 Facebook 中创建项目和客户端。\n\n    1.  确保您的应用是网站类型。\n\n    2.  将\
    \ `Redirect URI` 的值输入到 Facebook 网站设置块的站点 URL 中。\n\n    3.  确保应用是公开的。\n\n3.  将\
    \ Facebook 应用中的 `Client ID` 和 `Client Secret` 值输入到 Keycloak 中的 `Client ID` 和 `Client\
    \ Secret` 字段。\n\n4.  点击 *添加*。\n\n5.  将所需的作用域输入到 *默认作用域* 字段。默认情况下，Keycloak 使用 `email`\
    \ 作用域。有关 Facebook 作用域的更多信息，请参阅 Graph API。\n\n默认情况下，Keycloak 向 `graph.facebook.com/me?fields=id,name,email,first_name,last_name`\
    \ 发送个人资料请求。响应仅包含 `id, name, email, first_name` 和 `last_name` 字段。要从 Facebook 个人资料中获取其他字段，请添加相应的作用域，并在“其他用户个人资料字段”配置选项中添加字段名称。\n\
    \nSpring Security\nSpring Security [67] 是一个安全框架，特别适用于 Spring Framework 或 Spring\
    \ Web MVC，以及最近使用 Spring Flux 的响应式应用程序。Spring Security 是 Acegi Security（一个强大的安全框架）的延续。但问题在于，实现它需要大量繁琐的\
    \ XML 配置。Spring 从 2.0 版本开始将其纳入家族，并不断完善至当前状态。尽管 XML 配置仍然可行，但 Spring 新的“约定优于配置”精神也对其产生了影响，我们在\
    \ Jakarta EE 中也看到了同样的趋势。可以使用注解而非 XML 来执行所有安全配置，尽管为了向后兼容和利用某些灵活性，仍然保留了 XML 配置。其主要目标是处理\
    \ Web 请求和方法调用的认证和授权。\n\n历史\nSpring Security 始于二十年前，即 2003 年底，最初名为“The Acegi Security\
    \ System for Spring”，由 Ben Alex 创建，源于 Spring 开发者邮件列表中关于是否存在任何基于 Spring 的安全实现的提问。当时，Spring\
    \ 社区相对较小，Spring 本身也仅作为 SourceForge 上的一个项目存在，始于 2003 年初。对这个问题的回答是值得尝试，但当时由于缺乏时间和资源而未能探索。\n\
    基于此，一个简单的安全实现被构建出来，但并未发布。几周后，另一位 Spring 社区成员询问了安全问题，这个代码被提供给了他们。随后出现了其他类似的问题，到\
    \ 2004 年 1 月，大约有 20 人在使用这个代码。这些初始用户后来加入了其他人，他们建议在 SourceForge 上建立一个独立的项目，该项目于\
    \ 2004 年 3 月创建。\n当时，该项目没有自己的认证模块。认证过程使用了 J2EE 容器管理安全，而 Acegi Security 的第一个版本则专注于授权。这在最初是合适的，但随着越来越多的用户请求对其他容器的支持，特定于容器的认证领域接口的局限性变得明显。向容器的\
    \ Classpath 添加新的 JAR 也会导致问题，这通常是管理员困惑和配置错误的常见来源。Acegi Security 认证服务被引入。大约一年后，Acegi\
    \ Security 成为 Spring Framework 的官方子项目。1.0.0 最终版本于 2006 年 5 月发布——在此之前，它已被众多项目投入生产使用超过两年半，并收到了数百个改进请求和社区贡献。Acegi\
    \ Security 在 2007 年底成为 Spring 的官方项目，并更名为“Spring Security”。\n\n概述\n\nSpring Security\
    \ 基于三个主要概念：\n\n*   认证\n\n*   授权\n\n*   Servlet 过滤器\n\n![](img/600273_1_En_5_Fig6_HTML.jpg)\n\
    \n一个 Spring Security 认证和 Spring Security 过滤器链的流程图。Spring Security 从请求开始，经过认证过滤器、管理器、提供者、信息，最后是响应。过滤器链从访问授权过滤器、决策、管理器、查询等开始。\n\
    \n图 5-6\nSpring Security 认证/授权流程\n\n认证\n\nSpring Security 中用于认证的主要接口是 `AuthenticationManager`，它只有一个方法\
    \ `authenticate()`。\n\n```\npublic interface AuthenticationManager {\nAuthentication\
    \ authenticate(Authentication authentication)\nthrows AuthenticationException;\n\
    }\n```\n\n`AuthenticationManager` 最常见的实现是 `ProviderManager`，它将任务委托给一个 `AuthenticationProvider`\
    \ 实例链。`AuthenticationProvider` 类似于 `AuthenticationManager`，但它有一个额外的方法，允许调用者检查它是否支持特定的认证类型。\n\
    \n```\npublic interface AuthenticationProvider {\nAuthentication authenticate(Authentication\
    \ authentication)\nthrows AuthenticationException;\nboolean supports(Class authentication);\n\
    }\n```\n\n授权\nSpring Security 中用于授权的主要元素是 `AccessDecisionManager`。框架提供了三种默认实现，它们都使用一个\
    \ `AccessDecisionVoter` 实例链，有点像 `ProviderManager` 使用 `AuthenticationProvider`\
    \ 实例的方式。\n\n一个 `AccessDecisionVoter<S>` 使用一个 `Authentication`（主体）和一个由 `ConfigAttribute`\
    \ 装饰的安全对象：\n\n```\nboolean supports(ConfigAttribute attribute);\nboolean supports(Class\
    \ clazz);\nint vote(Authentication authentication, S object,\nCollection attributes);\n\
    ```\n\n接口 `ConfigAttribute` 封装了安全资源中的访问信息元数据。图 5-7 显示了配置属性的层次结构。\n\n![](img/600273_1_En_5_Fig7_HTML.jpg)\n\
    \n配置属性的层次结构。它包括安全配置、预调用属性、后调用属性、基于抽象表达式的方法配置属性和 Web 表达式配置属性。\n\n图 5-7\n配置属性层次结构\n\
    \nServlet 过滤器\n\nSpring Security 的 Web 层基于标准的 Jakarta EE Servlet 过滤器，尽管截至 Spring\
    \ Security 和 Framework 5，最多支持 Jakarta EE 8。Spring Security 过滤器链建立在多个过滤器之上，以覆盖\
    \ Web 应用程序的不同安全约束。图 5-8 显示了单个 HTTP 请求的典型过滤器链。\n\n![](img/600273_1_En_5_Fig8_HTML.png)\n\
    \n单个 H T T P 请求的典型链。它从客户端开始，然后是三个过滤器层，最后是 servlet。\n\n图 5-8\n单个 HTTP 请求的过滤器链\n\
    \n对于容器而言，Spring Security 基本上是一个单一的过滤器，由多个用于不同目的的过滤器组成。Spring Security 作为链中的一个单一过滤器安装。这个名为\
    \ `FilterChainProxy` 的过滤器包含了通过安全过滤器链可用的不同安全过滤器的所有详细信息。使用代理模式，它确定将为传入请求调用哪个 `SecurityFilterChain`。\n\
    \n以下是一个示例：\n\n![](img/600273_1_En_5_Fig9_HTML.jpg)\n\n一个典型的过滤器链代理。它从客户端开始，经过过滤器、过滤器链代理、Spring\
    \ Security 过滤器（包括三层过滤器），最后是 servlet。\n\n图 5-9\n过滤器链代理\n\n然而，`FilterChainProxy`\
    \ 不是直接调用的，而是通过 `DelegatingFilterProxy` 过滤器调用的。使用它，您会在 Web 应用程序的 `web.xml` 文件中看到类似这样的内容：\n\
    \n```\nmyFilter\norg.springframework.web.filter.DelegatingFilterProxy\n\nmyFilter\n\
    /*\n\n```\n\n社交登录\nSpring Security 5 内置了对 Facebook、Google 和 GitHub 等认证提供者的 OAuth\
    \ 2 支持。以下是针对它们的 OAuth 2 客户端配置示例。\n\n配置认证提供者\n首先，配置您选择的社交认证提供者。\n\nFacebook\n\n\
    在您的 `application.properties` 中配置 `Client ID` 和 `Client Secret`：\n\n```\nspring.security.oauth2.client.registration.facebook.client-id\
    \ = \nspring.security.oauth2.client.registration.facebook.client-secret = \n```\n\
    \n要获取 Facebook 应用 ID 和应用密钥凭据，您需要在 [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/)\
    \ 使用 Facebook 创建一个新应用程序。\n\n配置 HTTP 安全\n接下来，使用 `@EnableWebSecurity` 注解并配置 `HTTPSecurity`\
    \ 对象。\n\n在您的项目中创建一个新的 Java 类，并使其扩展 `WebSecurityConfigurerAdapter`。使用 `@EnableWebSecurity`\
    \ 注解此类：\n\n```\nimport org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
    @EnableWebSecurity\npublic class WebSecurity extends WebSecurityConfigurerAdapter\
    \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http.authorizeRequests()\n.antMatchers(\"/\").permitAll()\n.anyRequest().authenticated()\n\
    .and()\n.oauth2Login()\n.and()\n.logout().logoutSuccessUrl(\"/\");\n}\n}\n```\n\
    \n这将使我们的应用程序将用户重定向到社交登录提供者进行认证。一旦用户成功通过社交登录提供者认证，他们将被重定向回最初请求的受保护页面。请注意，我们还启用了登出功能并配置了登出成功\
    \ URL。\n\n创建受保护页面\n\n以下示例将创建一个包含名为“users”的单一资源的 Controller 类：\n\n```\nimport org.springframework.security.core.annotation.AuthenticationPrincipal;\n\
    import org.springframework.security.oauth2.core.user.OAuth2User;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    @Controller\npublic class UsersController {\n@GetMapping(\"/users\")\npublic String\
    \ getUser(Model model, @AuthenticationPrincipal OAuth2User principal) {\nif (principal\
    \ != null) {\nmodel.addAttribute(\"name\", principal.getAttribute(\"name\"));\n\
    }\nreturn \"user\";\n}\n}\n```\n\n当请求 `/users` 资源时，我们的应用程序会将用户重定向到社交登录提供者进行认证。如果认证成功，用户将被重定向回\
    \ `/users` 资源。由于认证成功，我们可以通过 `@AuthenticationPrincipal` 注解获取当前已认证用户的信息，这将帮助我们访问\
    \ OAuth2User 对象。`OAuth2User` 是一个我们可以获取详细信息的主体对象。\n\nMicronaut 安全\nMicronaut 安全是\
    \ Micronaut 应用程序的安全框架 [68]。Micronaut 通常类似于 Spring Boot，但在大多数情况下启动时间更短。JAR 文件更小，运行时消耗的内存更少。\n\
    当然，每个“微框架”都试图在每个新版本中优化性能，这些差异可能因版本而异。\n\n特性\n\nMicronaut 安全的主要特性包括：\n\n*   认证\n\
    \n*   授权\n\n*   安全规则\n\n*   安全事件\n\n*   令牌传播\n\n使用 Google 保护 Micronaut 应用程序\n\
    安装 Micronaut 后，请按照分步指南进行操作：[`https://guides.micronaut.io/latest/micronaut-oauth2-oidc-google-gradle-java.html`](https://guides.micronaut.io/latest/micronaut-oauth2-oidc-google-gradle-java.html)\n\
    \n如果您更喜欢 Maven，请在步骤 4 中调用：\n\n```\nmn create-app example.micronaut.micronautguide\
    \ --build=maven --lang=java\n```\n\nApache Shiro\n\nApache Shiro 是一个开源安全框架，为应用程序开发者提供直观、简单的方式来支持：\n\
    \n*   认证\n\n*   授权\n\n*   加密\n\n*   会话管理\n\n“shiro”这个词在日语中意为城堡。\n\n历史\nShiro 的创建源于开发者对当时标准未能满足的需求。Les\
    \ Hazlewood 和 Jeremy Haile 在 2004 年至 2008 年间在 SourceForge 上创建了一个名为 JSecurity 的安全框架，因为他们找不到适合自己需求的现有\
    \ Java 安全框架，并且 JAAS（我们在第 1 章中已经了解过）对他们来说效果不佳。他们的努力大约与 2004 年的 Acegi Security 同时开始，同样在\
    \ SourceForge 上，后者是当时最大的独立开源托管社区，很像现在的 GitHub。JSecurity 吸引了更多的提交者，包括 Peter Ledbrook、Alan\
    \ Ditzel 或 Tim Veil。\n2008 年，JSecurity 被提交给 Apache 软件基金会，并被其孵化器项目接纳，旨在成为 Apache\
    \ 顶级项目。在 ASF 孵化器中，JSecurity 首先更名为 Ki（发音为“Key”），但由于商标问题，很快又更名为 Shiro。该项目在 Apache\
    \ 孵化器中发展壮大，Kalle Korhonen 加入成为提交者。2010 年 7 月，Shiro 团队发布了其官方 1.0 版本。在第一个版本发布后，Shiro\
    \ 项目创建了一个项目管理委员会 (PMC)，并选举 Les Hazlewood 为主席。2010 年 9 月 22 日，Shiro 成为 Apache 顶级项目。\n\
    \n概述\n\nShiro 基于三个核心概念：\n\n*   主体\n\n*   SecurityManager\n\n*   领域\n\n![](img/600273_1_En_5_Fig10_HTML.jpg)\n\
    \nShiro 概念的示意图流程。它从应用程序代码开始，然后是主体-当前用户、Shiro 安全管理器-管理所有主体，以及领域-访问安全数据。\n\n图 5-10\n\
    Shiro 概念\n\n主体\n`Subject` 基本上是当前用户的“视图”。虽然“用户”暗示着人类，但“主体”也可以是服务或企业实体。\n\nSecurityManager\n\
    `SecurityManager`（不要与即将从 JDK 中移除的 API 类型混淆）是 Shiro 架构的核心元素。\n\n领域\n领域管理一组用户、角色和权限。用户属于一个领域并登录到该领域。领域之间相互隔离，只能管理和认证其控制的用户。领域通常与数据源直接相关，例如数据库、LDAP\
    \ 目录、文件系统或类似资源。\n\n特性\n\n图 5-11 显示了 Shiro 的主要关注点以及其他支持特性。\n\n![](img/600273_1_En_5_Fig11_HTML.jpg)\n\
    \nShiro 的整体关注点和其他支持特性。主要关注点是认证、授权、会话管理和加密。支持特性是 Web 支持、缓存、并发、测试、运行即和记住我。\n\n图\
    \ 5-11\nShiro 特性\n\n*   跨多个可插拔数据源的认证，包括：\n\n    *   LDAP/Active Directory\n\n\
    \    *   JDBC\n\n    *   JNDI\n\n*   基于角色或细粒度权限的授权\n\n    *   判断用户是否被分配了某个角色。\n\
    \n    *   判断用户是否被允许执行某项操作。\n\n*   会话管理 – 在 Web 和“无服务器”环境中使用，或任何需要单点登录、集群或分布式会话的环境中。\n\
    \n*   加密 – 使用超越标准 Java 密码和哈希的加密算法保护数据，且易于使用。\n\nShiro 的其他支持特性如下：\n\n*   Web 支持\
    \ – 帮助保护 Web 应用程序\n\n*   缓存，确保应用程序快速高效运行\n\n*   并发，支持多线程应用程序\n\n*   测试支持 – 帮助编写单元或集成测试，以检查您的应用程序是否达到预期的安全级别\n\
    \n*   “运行即”，允许用户承担另一个用户的身份，有点像 Linux 上的“sudo”命令\n\n*   “记住我”，跨会话记住用户，允许他们仅在需要时登录，例如，如果会话过期\n\
    \n认证\n\nShiro 旨在使认证直观且易于使用，尽管功能多样；以下是重点：\n\n*   基于主体\n\n*   单一方法调用\n\n*   详细的异常层次结构\n\
    \n*   内置“记住我”\n\n*   可插拔数据源\n\n*   使用多个领域\n\n认证主体的步骤\n\n认证一个 `Subject` 可以分为三个步骤：\n\
    \n1.  收集主体提交的主体标识和凭据。\n\n2.  提交主体标识和凭据进行认证。\n\n3.  如果提交成功，则授予访问权限；否则，重试认证或阻止访问。\n\
    \n以下是使用 Shiro API 执行这些步骤的方法：\n\n收集主体提交的主体标识和凭据\n\n```\n//最常见的用户名/密码对场景：\nUsernamePasswordToken\
    \ token = new UsernamePasswordToken(username, password);\n//内置“记住我”：\ntoken.setRememberMe(true);\n\
    ```\n\n在这个例子中，我们使用了 `UsernamePasswordToken`，它支持最常见的用户名/密码认证方式。这是 Shiro 的 `org.apache.shiro.authc.AuthenticationToken`\
    \ 接口的一个实现，该接口是 Shiro 认证系统的基础接口，用于表示提交的主体标识和凭据。\nShiro 不关心您如何获取这些信息：数据可能是通过 HTML\
    \ 表单输入的，或者从 HTTP 头中检索的，也可能是通过命令行参数获取的。应用程序从用户收集信息的过程与 Shiro 的 `AuthenticationToken`\
    \ 概念完全解耦。\n您可以以任何方式构造和表示 `AuthenticationToken` 实例；它与协议无关。\n此示例还表明，我们已指示 Shiro\
    \ 为认证执行“记住我”服务。\n\n授权\n\n授权有三个主要元素：\n\n*   权限\n\n*   角色\n\n*   用户（主体）\n\n权限\n\
    权限是安全策略的一个重要方面。它们定义了在应用程序中可以执行的操作。数据元素的常见权限是创建、读取、更新和删除，通常称为 *CRUD*。\n\n粒度\n\n\
    Shiro 允许在需要时定义非常细粒度的权限，可以是任何粒度，例如：\n\n*   资源级别 – 最宽泛的定义，例如，允许用户编辑客户记录或财务信息\n\n\
    *   实例级别 – 特定于资源特定实例的权限，而不仅仅是通用类型，例如，允许用户访问 IBM 的客户记录，但不能访问 Red Hat 的\n\n*   属性级别\
    \ – 允许为实例或资源的属性指定权限，例如，IBM 员工的家庭地址或工作地址\n\n以下是一个权限示例。我们检查用户是否有权限使用“彩色打印机”进行打印，有权限的用户将看到一个“打印”按钮，其他用户则看不到。这是一个实例级别权限的示例。\n\
    \n```\nSubject currentUser = SecurityUtils.getSubject();\nPermission printPermission\
    \ = new PrinterPermission(\"ColourPrinter\",\"print\");\nIf (currentUser.isPermitted(printPermission))\
    \ {\n// 显示打印按钮？\n} else {\n// 不显示按钮？\n}\n```\n\n用户\n\n用户或“主体”（因为如前所述，它也可以是服务或企业实体）可以是您应用程序中的任何参与者。在大多数情况下，您会通过使用\
    \ `org.apache.shiro.SecurityUtils` 来获取当前的 `Subject`：\n\n```\nSubject currentUser\
    \ = SecurityUtils.getSubject();\n```\n\n角色\n还记得第 2 章中的 RBAC 吗；角色是一组权限，允许将权限分配给角色，而不是分配给每个单独的用户。\n\
    \nShiro 提供了两种类型的角色：\n\n*   隐式角色\n\n*   显式角色\n\n应用程序角色检查通常是分配一个**隐式**角色。拥有“管理员”角色的用户可以查看客户数据。角色的名称不一定与业务需求或场景相关，而**显式**角色已经附带了它所需的权限。例如，拥有“编辑者”角色的用户被分配了“发布章节”权限。\n\
    \n```\nRealm realm = new MyPublishingRealm();\nSecurityManager securityManager\
    \ = new DefaultSecurityManager(realm);\nSecurityUtils.setSecurityManager(securityManager);\n\
    Subject currentUser = SecurityUtils.getSubject();\nif (!currentUser.isAuthenticated())\
    \ {\nUsernamePasswordToken token\n= new UsernamePasswordToken(\"user\", \"password\"\
    );\ntoken.setRememberMe(true);\ntry {\ncurrentUser.login(token);\n} catch (UnknownAccountException\
    \ uae) {\nlog.error(\"用户名未找到！\", uae);\n} catch (IncorrectCredentialsException\
    \ ice) {\nlog.error(\"无效凭据！\", ice);\n} catch (LockedAccountException lae) {\n\
    log.error(\"您的账户已被锁定！\", lae);\n} catch (AuthenticationException ae) {\nlog.error(\"\
    意外错误！\", ae);\n}\n}\nlog.info(\"用户 [\" + currentUser.getPrincipal() + \"] 登录成功。\"\
    );\nif (currentUser.hasRole(\"admin\")) {\nlog.info(\"欢迎管理员\");\n} else if(currentUser.hasRole(\"\
    editor\")) {\nlog.info(\"欢迎，编辑者！\");\n} else if(currentUser.hasRole(\"author\"\
    )) {\nlog.info(\"欢迎，作者\");\n} else {\nlog.info(\"欢迎，访客\");\n}\nif(currentUser.isPermitted(\"\
    chapters:write\")) {\nlog.info(\"您可以编写章节\");\n} else {\nlog.info(\"您无权编写章节！\"\
    );\n}\nif(currentUser.isPermitted(\"chapters:save\")) {\nlog.info(\"您可以保存章节\"\
    );\n} else {\nlog.info(\"您无法保存章节\");\n}\nif(currentUser.isPermitted(\"chapters:publish\"\
    )) {\nlog.info(\"您可以发布章节\");\n} else {\nlog.info(\"您无法发布章节\");\n}\nSession session\
    \ = currentUser.getSession();\nsession.setAttribute(\"key\", \"value\");\nString\
    \ value = (String) session.getAttribute(\"key\");\nif (value.equals(\"value\"\
    )) {\nlog.info(\"检索到正确的值！[\" + value + \"]\");\n}\ncurrentUser.logout();\n```\n\
    \n会话管理\n\n一旦我们获取了当前用户，我们就可以检索他们的会话：\n\n```\nSession session = currentUser.getSession();\n\
    session.setAttribute( \"key\", \"value\" );\n```\n\n`Session` 是一个 Shiro 特定的实例，包含您从\
    \ Jakarta Servlet `HttpSession` 中了解的大部分内容，并附带一些额外功能，并且它独立于 HTTP 环境。\n在 Web 应用程序内部，`Session`\
    \ 将基于 `HttpSession`。但在非 Web 环境中，Shiro 将默认使用自己的会话管理。这意味着您可以在应用程序中使用相同的 API，无论部署环境如何。这为“无服务器”应用程序开辟了新的可能性，因为需要会话的应用程序无需使用\
    \ HttpSession 或 EJB 有状态会话 Bean。\n\n加密\n\nShiro 的主要加密方面如下：\n\n*   简单性\n\n*   密码特性\n\
    \n*   哈希特性\n\n社交登录\n以下示例展示了如何处理 Shiro 应用程序的 Facebook 登录。\n\n创建 Facebook 应用\n要获取\
    \ Facebook 应用 ID 和应用密钥凭据，您需要在 [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/)\
    \ 使用 Facebook 创建一个新应用程序。\n\n示例代码\n\nFacebook 用户详情：\n\n```\npackage com.example.facebook;\n\
    /**\n* 用于保存 Facebook 用户数据的简单类\n*/\nclass FacebookUserDetails {\n// jsonString\
    \ 预期类似于：\n// email\n// {\n// \"education\": [{\n// \"school\": {\n// \"id\": \"\
    123456789012345\",\n// \"name\": \"Vienna University of Technology \"\n// },\n\
    // \"type\": \"Graduate School\",\n// \"with\": [{\n// \"id\": \"123456789\",\n\
    // \"name\": \"BRG\"\n// }]\n// }],\n// \"first_name\": \"Werner\",\n// \"id\"\
    : \"123456789\",\n// \"last_name\": \"Keil\",\n// \"link\":\n// \"http://www.facebook.com/profile.php?id=123456789\"\
    ,\n// \"locale\": \"de_DE\",\n// \"name\": \"Werner Keil \",\n// \"updated_time\"\
    : \"2023-05-15T14:51:05+0000\",\n// \"verified\": true\n// }\nprivate String jsonString;\n\
    public FacebookUserDetails(String fbResponse){\njsonString = fbResponse;\nJSONObject\
    \ respJson;\ntry {\nrespJson = new JSONObject(fbResponse);\nthis.id = respJson.getString(\"\
    id\");\nthis.firstName = respjson.has(\"first_name\") ? respJson.getString(\"\
    first_name\") : \" no name\" + id;\nthis.lastName = respJson.has(\"last_name\"\
    ) ? respJson.getString(\"last_name\") : \"\";\nthis.email = respJson.has(\"email\"\
    ) ? respJson.getString(\"email\") : \"-no email-\";\n} catch (JSONException e)\
    \ {\nSystem.out.println( \"fbResponse:\"+fbResponse );\nthrow new RuntimeException(e);\n\
    }\n}\npublic String toString(){\nreturn jsonString;\n}\npublic String getId()\
    \ {\nreturn id;\n}\npublic void setId(String id) {\nthis.id = id;\n}\npublic String\
    \ getFirstName() {\nreturn firstName;\n}\npublic void setFirstName(String firstName)\
    \ {\nthis.firstName = firstName;\n}\npublic String getLastName() {\nreturn lastName;\n\
    }\npublic void setLastName(String lastName) {\nthis.lastName = lastName;\n}\n\
    public String getEmail() {\nreturn email;\n}\npublic void setEmail(String email)\
    \ {\nthis.email = email;\n}\n}\n```\n\nFacebook 领域：\n\n```\npackage com.example.facebook;\n\
    import java.io.ByteArrayOutputStream;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
    import java.net.MalformedURLException;\nimport java.net.URL;\nimport java.util.HashMap;\n\
    import java.util.Map;\nimport java.util.Properties;\nimport org.apache.shiro.authc.AuthenticationException;\n\
    import org.apache.shiro.authc.AuthenticationInfo;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    import org.apache.shiro.authz.AuthorizationInfo;\nimport org.apache.shiro.realm.AuthorizingRealm;\n\
    import org.apache.shiro.subject.PrincipalCollection;\npublic class FacebookRealm\
    \ extends AuthorizingRealm {\nprivate static final Properties props = new FacebookProperties().getProperties();\n\
    private static final String APP_SECRET = props.get(\"fbAppSecret\").toString();\n\
    private static final String APP_ID = props.get(\"fbAppId\").toString();\nprivate\
    \ static final String REDIRECT_URL = props.get(\"fbLoginRedirectURL\").toString();\n\
    @Override\npublic boolean supports(AuthenticationToken token) {\nif (token instanceof\
    \ FacebookToken) {\nreturn true;\n}\nreturn false;\n}\n@Override\nprotected AuthorizationInfo\
    \ doGetAuthorizationInfo(PrincipalCollection principals) {\nreturn new FacebookAuthorizationInfo();\n\
    }\n@Override\nprotected AuthenticationInfo doGetAuthenticationInfo(AuthenticationToken\
    \ token) throws AuthenticationException {\nFacebookToken facebookToken = (FacebookToken)\
    \ token;\nif (facebookToken.getCode() != null && facebookToken.getCode().trim().length()\
    \ > 0) {\nURL authUrl;\ntry {\nauthUrl = new URL(\"https://graph.facebook.com/oauth/access_token?\"\
    \ + \"client_id=\" + APP_ID\n+ \"&redirect_uri=\" + REDIRECT_URL + \"&client_secret=\"\
    \ + APP_SECRET + \"&code=\"\n+ facebookToken.getCode());\nString authResponse\
    \ = readURL(authUrl);\nSystem.out.println(authResponse);\nString accessToken =\
    \ getPropsMap(authResponse).get(\"access_token\");\nURL url = new URL(\"https://graph.facebook.com/me?access_token=\"\
    \ + accessToken);\nString fbResponse = readURL(url);\nFacebookUserDetails userDetails\
    \ = new FacebookUserDetails(fbResponse);\nreturn new FacebookAuthenticationInfo(userDetails,\
    \ this.getName());\n} catch (MalformedURLException e1) {\ne1.printStackTrace();\n\
    throw new AuthenticationException(e1);\n} catch (IOException ioe) {\nioe.printStackTrace();\n\
    throw new AuthenticationException(ioe);\n} catch (Throwable e) {\ne.printStackTrace();\n\
    }\n}\nreturn null;\n}\nprivate String readURL(URL url) throws IOException {\n\
    ByteArrayOutputStream baos = new ByteArrayOutputStream();\nInputStream is = url.openStream();\n\
    int r;\nwhile ((r = is.read()) != -1) {\nbaos.write(r);\n}\nreturn new String(baos.toByteArray());\n\
    }\nprivate Map getPropsMap(String someString) {\nString[] pairs = someString.split(\"\
    &\");\nMap props = new HashMap();\nfor (String propPair : pairs) {\nString[] pair\
    \ = propPair.split(\"=\");\nprops.put(pair[0], pair[1]);\n}\nreturn props;\n}\n\
    }\n```\n\n`CredentialsMatcher` 类不需要做太多工作，因为 Facebook 会为我们匹配凭据：\n\n```\npackage\
    \ com.example.facebook;\nimport org.apache.shiro.authc.AuthenticationInfo;\nimport\
    \ org.apache.shiro.authc.AuthenticationToken;\nimport org.apache.shiro.authc.credential.CredentialsMatcher;\n\
    public class FacebookCredentialsMatcher implements CredentialsMatcher {\n/**\n\
    * 仅确认正确的令牌类型，凭据检查由 Facebook OAuth 完成\n*/\n@Override\npublic boolean doCredentialsMatch(AuthenticationToken\
    \ token, AuthenticationInfo info) {\nif(info instanceof FacebookAuthenticationInfo){\n\
    return true;\n}\nreturn false;\n}\n}\n```\n\n然后创建一个 Facebook 令牌类，用于保存 Facebook\
    \ 提供的“code”：\n\n```\npackage com.example.facebook;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    public class FacebookToken implements AuthenticationToken {\nprivate static final\
    \ long serialVersionUID = 1L;\nprivate final String code;\npublic FacebookToken(String\
    \ code){\nthis.code = code;\n}\n@Override\npublic Object getPrincipal() {\nreturn\
    \ null; // 未知 - Facebook 执行登录\n}\n@Override\npublic Object getCredentials() {\n\
    return null; // 凭据由 Facebook 处理 - 我们不需要它们\n}\npublic String getCode() {\nreturn\
    \ code;\n}\npublic void setCode(String code) {\nthis.code = code;\n}\n}\n```\n\
    \n一个 `FacebookAuthenticationInfo` 类：\n\n```\npackage com.example.facebook;\nimport\
    \ java.util.ArrayList;\nimport java.util.Collection;\nimport org.apache.shiro.authc.AuthenticationInfo;\n\
    import org.apache.shiro.subject.PrincipalCollection;\nimport org.apache.shiro.subject.SimplePrincipalCollection;\n\
    public class FacebookAuthenticationInfo implements AuthenticationInfo {\nprivate\
    \ static final long serialVersionUID = 1L;\nprivate PrincipalCollection principalCollection;\n\
    public FacebookAuthenticationInfo(FacebookUserDetails facebookUserDetails, String\
    \ realmName){\nCollection principals = new ArrayList();\nprincipals.add(facebookUserDetails.getId());\n\
    principals.add(facebookUserDetails.getFirstName()+\" \"+facebookUserDetails.getLastName());\n\
    this.principalCollection = new SimplePrincipalCollection(principals, realmName);\n\
    }\n@Override\npublic PrincipalCollection getPrincipals() {\nreturn principalCollection;\n\
    }\n@Override\npublic Object getCredentials() {\nreturn null; // 不需要凭据\n}\n}\n\
    ```\n\n现在创建一个 Facebook 登录 servlet 来处理来自 Facebook 的重定向：\n\n```\npackage com.example.facebook;\n\
    import java.io.IOException;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServlet;\n\
    import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    import org.apache.shiro.SecurityUtils;\nimport org.apache.shiro.authc.AuthenticationException;\n\
    import uk.co.mrdw.shiro.facebook.FacebookToken;\n/**\n* 简单的 Facebook 登录处理器，使用\
    \ Apache Shiro\n*/\npublic class FacebookLoginServlet extends HttpServlet {\n\
    private static final long serialVersionUID = 1L;\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException, IOException\
    \ {\nString code = request.getParameter(\"code\");\nFacebookToken facebookToken\
    \ = new FacebookToken(code);\ntry {\nSecurityUtils.getSubject().login(facebookToken);\n\
    response.sendRedirect(response.encodeRedirectURL(\"index.jsp\"));\n}\ncatch(AuthenticationException\
    \ ae){\nthrow new ServletException(ae);\n}\n}\nprotected void doPost(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException,\nIOException\
    \ {\nSystem.out.println(\"doPost 期间出错...\");\n}\n}\n```\n\nshiro.ini:\n\n```\n\
    [main]\nrealmA = com.example.dao.RoleSecurityJdbcRealm\nfbCredentialsMatcher =\
    \ com.example.shiro.facebook.FacebookCredentialsMatcher\nrealmB = com.example.shiro.facebook.FacebookRealm\n\
    realmB.credentialsMatcher = $fbCredentialsMatcher\nsecurityManager.realms = $realmA,\
    \ $realmB.ini:\n```\n\nScribe\nScribe 项目内置了对许多使用 OAuth 的流行服务的支持，例如 Facebook、Twitter、Google\
    \ 或 LinkedIn。它的外部依赖非常少，主要是 Apache Commons Codec，允许无缝集成到解决方案中，而无需承担许多更大、更复杂的解决方案所面临的依赖冲突风险。\n\
    \n在 Scribe 中调用 OAuth 提供者可以像下面的一行代码一样简单：\n\n```\nOAuthService service = new ServiceBuilder()\n\
    .provider(LinkedInApi.class)\n.apiKey(YOUR_API_KEY)\n.apiSecret(YOUR_API_SECRET)\n\
    .build();\n```\n\n在 Agorava 0.6 版本之前，Scribe 是其 OAuth 功能的核心。从 Agorava 0.7 开始，它被\
    \ JBoss PicketLink 取代。\n虽然后者已不再由 Red Hat 积极开发，并被 Keycloak 取代，但 Scribe 仍在维护，大约每年更新一次，最近一次更新是在\
    \ 2023 年 1 月。\n\n遗留框架\n其中一些框架仍被产品和服务使用，但它们的贡献者已不再积极维护。\n\nPicketLink\nPicketLink\
    \ 是 Red Hat/JBoss 中间件生态系统中多个安全相关项目的总称。虽然 Agorava 从未是官方的 JBoss 项目，但它是为其生态系统和 CDI\
    \ 等标准而创建的。因此，通过 PicketLink 支持 OAuth 和 Java EE 安全对 Agorava 来说似乎是合乎逻辑的一步。\nPicketLink\
    \ 是一个用于 Java EE 应用程序的应用安全框架。它提供了用于认证用户、授权访问应用程序业务方法、管理应用程序的用户、组、角色和权限等功能。\n\n\
    以下是 PicketLink 解决的八大 Java 应用程序安全问题：\n\n1.  为应用程序添加安全性的最佳方法是什么？\n\n2.  如何认证和授权用户？\n\
    \n3.  如何控制对类和方法的访问？\n\n4.  如何为我的应用程序添加身份和访问管理 (IAM)？\n\n5.  如何为我的 SaaS（软件即服务）应用程序创建安全的多租户架构？\n\
    \n6.  如何在我的应用程序中启用基于 SAML（安全断言标记语言）的单点登录？\n\n7.  如何为我的 REST 层和 API 添加认证和授权？\n\n\
    8.  我的应用程序如何让用户使用他们的 Facebook、Twitter 或 Google 账户进行认证？\n\n图 5-12 显示了 PicketLink\
    \ 的概述、其关键组件以及它支持的技术。一些标记为“即将推出”的功能仍在开发中，并未随 PicketLink 的 GA（通用版或“稳定版”）版本一起发布。\n\
    \n![](img/600273_1_En_5_Fig12_HTML.jpg)\n\nPicketLink 的示意图。它包括基础模块、联合和 I D M。身份存储包括数据库、基于文件和\
    \ L D A P。\n\n图 5-12\nPicketLink 概述\n\n然而，Agorava 主要使用 PicketLink 的基础功能，如认证 API\
    \ 或 CDI 集成，并添加了自己专门的 OAuth 和社交连接功能。\n\n通过认证流程的“舞蹈”由 PicketLink 元素 Authenticator\
    \ 执行。以下是如何扩展 `BaseAuthenticator` 的示例：\n\n```\n@PicketLink\npublic class SimpleAuthenticator\
    \ extends BaseAuthenticator {\n@Inject DefaultLoginCredentials credentials;\n\
    @Override\npublic void authenticate() {\nif (\"agentsmith\".equals(credentials.getUserId())\
    \ &&\n\"matrix123\".equals(credentials.getPassword())) {\nsetStatus(AuthenticationStatus.SUCCESS);\n\
    setAccount(new User(\"agentsmith\"));\n} else {\nsetStatus(AuthenticationStatus.FAILURE);\n\
    FacesContext.getCurrentInstance().addMessage(null, new FacesMessage(\"认证失败 - 您提供的用户名或密码无效。\"\
    ));\n}\n}\n}\n```\n\n下一章中的“Agorava PicketLink”将更详细地展示 PicketLink 如何被 Agorava Core\
    \ 及其 PicketLink 模块应用。\n\nSocialAuth\nSocialAuth 是一个用于 Java 和 Android 的认证库。\n\n\
    其特性包括：\n\n*   认证\n\n    *   通过外部 OAuth 提供者，如 Gmail、Hotmail、Yahoo、Twitter、Facebook、LinkedIn、Foursquare、Myspace、Salesforce、Yammer、Google\
    \ Plus 和 Instagram\n\n    *   通过 OpenID 提供者\n\n*   简单的用户注册\n\n*   从社交网站导入联系人\n\
    \n以下是一个使用 SocialAuth 通过 CDI 更新状态的示例：\n\n```\n@RequestScoped\n@Named(\"socialAuthUpdateStatus\"\
    )\npublic class UpdateStatus implements Serializable {\nprivate static final Logger\
    \ log = Logger.getLogger(UpdateStatus.class);\n@Inject\nSocialAuth socialauth;\n\
    String statusText;\n/**\n* 更新个人资料状态的方法。\n*\n* @param ActionEvent\n* @throws Exception\n\
    */\npublic void updateStatus() throws Exception {\nfinal HttpServletRequest request\
    \ = (HttpServletRequest) FacesContext                        .getCurrentInstance().getExternalContext().getRequest();\n\
    String statusText = request.getParameter(\"statusMessage\");\nif (statusText !=\
    \ null && !statusText.equals(\"\")) {\nsocialauth.setStatus(statusText);\nsocialauth.updateStatus();\n\
    setStatus(\"状态更新成功\");\nSystem.out.println(\"状态文本:\" + statusText);\n}\n}\npublic\
    \ String getStatus() {\nreturn statusText;\n}\npublic void setStatus(String statusText)\
    \ {\nthis.statusText = statusText;\n}\n}\n```\n\nOACC\nOACC，发音为“oak”（像 Java 的原始代码名称），是一个\
    \ Java API，用于实施和管理应用程序的认证和授权需求。OACC 提供基于权限的授权服务来实施应用程序安全。\n\n其特性包括：\n\n*   认证\n\
    \n*   身份委托\n\n*   数据存储\n\n*   基于权限的安全模型\n\n*   授权\n\n*   RBAC 建模\n\n*   权限委托\n\
    \n*   多租户\n\n*   缓存\n\n以下是一个示例应用程序：\n\n```\npublic class OACCSampleApplication\
    \ {\npublic static void main(String[] args) throws Exception {\n// 获取到 oacc 数据库的连接\n\
    String url = \"jdbc:postgresql://localhost/oaccdb?user=oaccuser&password=oaccpwd\"\
    ;\ntry (Connection con = DriverManager.getConnection(url)) {\n// 获取访问控制上下文\nAccessControlContext\
    \ accessControlContext =\nSQLAccessControlContextFactory.getAccessControlContext(con,\"\
    OACC\",                                                                      \
    \  SQLProfile.PostgreSQL_9_3_RECURSIVE,                                BCryptPasswordEncryptor.newInstance(12));\n\
    // 创建新管理员\ncreateAdmin(accessControlContext);\n// 创建新用户\ncreateUser(accessControlContext);\n\
    // 以管理员身份登录\nloginAdmin(accessControlContext, \"adminJoe\", \"pa55w0rd\");\n//\
    \ 尝试在以管理员身份登录时更新用户\nupdateUser(accessControlContext, \"jsmith\");\n}\n}\nprivate\
    \ static void createAdmin(AccessControlContext accessControlContext) {\n// 以系统资源（超级用户）身份进行认证，以设置初始管理员\n\
    accessControlContext.authenticate(Resources.getInstance(0),                  \
    \                      PasswordCredentials.newInstance(\"yourOaccSystemPassword\"\
    .toCharArray()));\n// 在您的应用程序中持久化管理员，例如：\nAppAdmin admin = new AppAdmin.Builder()\n\
    .login(\"adminJoe\")\n.email(\"joeBloe@company.com\")\n.build().create();\n//\
    \ 创建对应的 OACC 资源\nfinal Resource adminResource\n= accessControlContext.createResource(\"\
    ADMIN\",                                                  \"APP_DOMAIN\", admin.getLogin(),\
    \                                                  PasswordCredentials.newInstance(\"\
    pa55w0rd\".toCharArray()));\nSystem.out.println(\"创建了新的 ADMIN 资源，Id=\" + adminResource.getId());\n\
    // 授予查询、查看和停用任何用户账户的权限，但不能编辑\nSet permissions = new HashSet();\npermissions.add(ResourcePermissions.getInstance(ResourcePermissions.QUERY));\
    \      permissions.add(ResourcePermissions.getInstance(\"VIEW\"));      permissions.add(ResourcePermissions.getInstance(\"\
    DEACTIVATE\"));\naccessControlContext.setGlobalResourcePermissions(adminResource,\
    \ \"USER\", \"APP_DOMAIN\", permissions);\naccessControlContext.unauthenticate();\n\
    }\nprivate static void createUser(AccessControlContext accessControlContext) {\n\
    // 在您的应用程序中持久化用户\n// 例如 UserHOME.create(\"jsmith\", \"Jane\", \"Smith\", \"jsmith@mail.com\"\
    , userResource.getId())\n// 例如：\nAppUser user = new AppUser.Builder()\n.login(\"\
    jsmith\")\n.firstName(\"Jane\").lastName(\"Smith\")\n.email(\"jsmith@mail.com\"\
    )\n.build().create();\n// 不必经过认证即可创建用户，因为资源类设置了 unauthenticatedCreateAllowed-flag\n\
    final Resource userResource\n= accessControlContext.createResource(\"USER\", \
    \                                                 \"APP_DOMAIN\", user.getLogin(),\
    \                                                  PasswordCredentials.newInstance(\"\
    pa$$word1\".toCharArray()));\nSystem.out.println(\"创建了新的 USER 资源，Id=\" + userResource.getId());\n\
    }\nprivate static void loginAdmin(AccessControlContext accessControlContext, String\
    \ adminLogin,  String password) {\n// 以管理员资源身份进行认证      accessControlContext.authenticate(Resources.getInstance(adminLogin),\
    \                                        PasswordCredentials.newInstance(password.toCharArray()));\n\
    }\nprivate static void updateUser(AccessControlContext accessControlContext, String\
    \ userLogin) {\n// 在尝试加载用户之前，断言已认证的管理员具有 VIEW 权限      accessControlContext.assertResourcePermissions(accessControlContext.getSessionResource(),\
    \ Resources.getInstance(userLogin),                       ResourcePermissions.getInstance(\"\
    VIEW\"));\n// 加载用户信息并修改本地副本\nAppUser user = new AppUser.Finder().findByLogin(userLogin);\n\
    user.setEmail(\"other@mail.com\");\n// 在尝试保存用户之前，断言已认证的管理员具有 EDIT 权限      accessControlContext.assertResourcePermissions(accessControlContext.getSessionResource(),\
    \             Resources.getInstance(userLogin),                              \
    \                       ResourcePermissions.getInstance(\"EDIT\"));\n// 保存用户\n\
    // !注意！我们不会到达这里，因为 adminResource 对 userResource 没有 EDIT 权限\nuser.save();\n}\n\
    }\n```\n\n总结\n在上一章概述了社交媒体安全及相关安全标准之后，我们在本章学习了 Java 平台的重要安全框架以及如何将它们与社交网络结合使用。\n\
    \n6. 社交框架\n\n上一章讨论了 Soteria、Keycloak 或 Spring Security 等安全框架。在本章中，我们将介绍 Meta Business\
    \ SDK、Twitter4J、Twitter API Client 等社交框架，Agorava、Spring Social 或 Facebook4J 等遗留框架，以及用于特殊目的或垂直社交网络的框架。\n\
    \nMeta\n\nMeta Platforms 拥有多种社交产品：\n\n*   Facebook\n\n*   Instagram\n\n*   (Facebook)\
    \ Messenger\n\n*   WhatsApp\n\n*   Threads\n\n*   Horizon Worlds 等 VR 产品\n\n其合并用户群是所有社交网络中最庞大的。超过\
    \ 2 亿家企业使用 Facebook，超过 700 万广告商积极在 Facebook/Meta 上推广其业务。\n这足以说明，与其他一些大型社交网络不同，Meta\
    \ 提供了大量 SDK，包括专门的业务 SDK，并支持多种编程语言。\n\nMeta 最活跃的两个 Java 业务 API 如下：\n\n*   Meta\
    \ Business SDK – Meta 官方的业务 SDK 套件\n\n*   WhatsApp Business Java API SDK – 一个社区驱动的\
    \ Java WhatsApp 业务 SDK。目前优于 Meta 官方的 Java WhatsApp SDK，因为它们尚未提供强大的 Java 对象模型\n\
    \nMeta Business SDK\nMeta Business SDK [36] 提供了对各种 Meta 业务 API 的访问。它是 Facebook\
    \ Marketing API SDK 的演进版本，包括 Marketing API 和其他 Meta API，如 Pages、Business Manager、Instagram\
    \ 等，允许构建能够无缝集成一系列 Meta 服务的定制化企业解决方案。\n\n概述\n\nMeta Business SDK 由以下部分组成：\n\n*\
    \   Business Manager API – 允许管理 Facebook 页面和广告账户的 Meta 资产、权限和广告活动\n\n*   Pages\
    \ API – 允许管理 Facebook 上的业务存在和社区\n\n*   Marketing API – 允许管理广告产品、创建、编辑或删除广告，并分析其效果\n\
    \n*   Instagram Graph API – 允许管理 Instagram 上的企业存在\n\n**WhatsApp 在哪里？**\n虽然企业存在\
    \ WhatsApp (Meta) 业务账户，但 WhatsApp 支持目前不是 Meta Business SDK 的一部分。\n目前，Java 和其他语言对此\
    \ API 的支持比通过 Business SDK 对其他 Meta 服务的支持更为基础。它主要依赖于从您选择的语言进行的 REST/HTTP 客户端调用。我们将在此处展示一个\
    \ Java 的 WhatsApp 示例，但社区以 WhatsApp Business Java API SDK 的形式提供了一个更方便的 Java 封装。\n\
    \n冒烟测试\n以下步骤说明了如何使用 Maven 安装 Meta Business SDK for Java 并测试安装。\n\n前提条件\n\n您需要以下内容：\n\
