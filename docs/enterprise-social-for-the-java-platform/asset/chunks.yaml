    \ and several other large commercial players using standards and protocols from\
    \ the Fediverse do not contribute to those stats; thus, the numbers may well be\
    \ over a billion and active users probably in the tens of millions right now.\n\
    \nOther sites like Donald Trump’s Truth Social [45] are based on open standards\
    \ and pretty much a Mastodon rip-off, but they don’t even interact with other\
    \ sites through the Fediverse, nor contribute user stats in a transparent manner.\
    \ The currently active users on Truth Social are said to be around half a million,\
    \ compared to nearly two million active Mastodon users as of August 2023.\n\n\
    ![](images/600273_1_En_3_Chapter/600273_1_En_3_Fig5_HTML.jpg)\n\nA network diagram\
    \ presents the overview of the Fediverse. It includes ten applications. Microblogging,\
    \ event planning, macro blogging, video audio streaming, publishing, image sharing,\
    \ content-aggregation, and others.\n\nFigure 3-5\n\nFediverse Overview\n\n###\
    \ Protocols\n\nThe-Federation.info currently lists 15 protocols used in the Fediverse:\n\
    \n*   ActivityPub\n\n*   Bluesky\n\n*   DFRN\n\n*   Diaspora\n\n*   Gemini\n\n\
    *   Inbound\n\n*   Matrix\n\n*   MicroPub\n\n*   NeoDb\n\n*   Outbound\n\n*  \
    \ OStatus\n\n*   SMTP\n\n*   WebMention\n\n*   XMPP\n\n*   Zot\n\nWe already covered\
    \ ActivityPub and OStatus; other than those, three others are used by the top\
    \ five number of nodes:\n\n*   Diaspora\n\n*   DFRN\n\n*   Matrix\n\n#### Diaspora\n\
    \nDiaspora has its own protocol for decentralized, social networking. It was developed\
    \ in 2010, based on a federated architecture similar to email (with inbox and\
    \ outbox, also similar to ActivityPub) allowing users to share data and communicate\
    \ with each other across a network of multiple independent nodes, called “pods”\
    \ (no direct relation to Kubernetes pods, although some Diaspora pods may well\
    \ run in Kubernetes clusters). Besides Diaspora itself, the protocol is also used\
    \ by Friendica or Hubzilla.\n\n#### DFRN\n\nDFRN is a distributed communication\
    \ protocol that provides privacy and secure communications as well as a foundation\
    \ for distributed profiles and connections like friend requests."
