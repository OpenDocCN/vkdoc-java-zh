  trans: '

    ### 你所知的信息


    我们将存储在记忆中、并在需要时能提取出来的信息归类为*你所知的信息*。在日常交互中，我们几乎可以在任何需要验证身份才能使用的系统中找到*你所知的信息*认证方法：银行账户、电子邮箱、社交媒体账户等等。没错，最常见的*你所知的信息*认证方法就是密码、密保、口令以及个人识别码（PIN）。


    *你所知的信息*认证因其成本低、易实现而成为最常用的认证方法。然而，易于实现也带来了一些副作用，其中之一便是它可能不被视为强认证。此外，对于需要高安全性的应用或系统而言，仅凭*你所知的信息*认证是不够的。


    ### 你所拥有的物品


    *你所拥有的物品*认证方法指的是用户所拥有的某样东西。你是否注意到*你所知的信息*方法有一个主要缺点？它完全依赖于我们的记忆及其（有限的）容量；也就是说，密码很容易被遗忘。*你所拥有的物品*方法消除了这个问题，因为它依赖于某个在你每次需要验证身份时都必须随身携带的物品。同样，这里的关键在于拥有某种令牌。


    *你所拥有的物品*认证的例子包括信用卡、U 盘或动态口令卡。当然，随身携带认证物品也伴随着风险——它们可能被盗、损坏或丢失。


    ### 你所是的特征


    *你所是的特征*认证方法针对的是用户“是什么”，主要指的是生物特征认证方法。简单来说，生物特征是与人体特征相关的任何度量指标，理论上可用于身份识别或身份验证。生物特征数据类型多种多样，例如面部识别、指纹、虹膜和视网膜识别、语音识别、静脉识别、DNA
    以及数字签名。


    生物特征可以区分不同的人。


    与其他两种认证方法相比，生物特征如何？它不如*你所知的信息*和*你所拥有的物品*方法那样广为人知，但当与其他两种方法正确结合使用时，它能显著增强认证的强度。


    我们认为，强认证是指使用两种或两种以上不同的认证方法，例如智能卡加 PIN 码，或者密码加某种生物特征（如指纹、语音或虹膜识别）。


    ### 认证技术的最新趋势


    就这些了吗？我们只能使用这三种认证方法来保护我们的系统吗？


    当然不是。随着黑客变得越来越聪明，我们需要更多（且更复杂）的认证方法，包括*你所在的位置*和*你所做的事*。


    *你所在的位置*与你的地理位置相关，并支持两种不同的形式：*地理位置安全检查*，即根据用户账户的配置位置来检查用户的实际位置；以及*MAC 地址检查*，例如，试图从不同设备访问公司网络的员工，会因
    MAC 地址不同而被拒绝访问。


    *你所做的事*是最不流行的认证方法。这种认证通过观察用户的行为（触摸或手势）来验证用户身份。一个例子是 Windows 8 自带的*图片密码*功能，它允许你在图片上配置触摸和手势作为身份验证方式。一个更常见且技术性更强的*你所做的事*认证例子是智能手机的手势认证，你用手指在手机屏幕上滑动一个手势图案来解锁手机。


    #### 通行密钥认证


    通行密钥允许你无需输入密码即可安全登录社交网络等服务。


    与安全密钥不同，通行密钥的优势在于能够验证用户身份。这意味着通行密钥会使用“你所知的信息”或“你所是的特征”来验证你的身份，例如 PIN 码或生物特征检查（如指纹、虹膜或面部识别），或者某种模式，例如二维码。


    ##### 历史


    通行密钥的概念最早出现在 2009 年，当时后来被 Synaptics 收购的 Validity Sensors 与 PayPal 联手，提出了使用生物特征代替密码进行在线身份识别的概念。2012
    年 7 月，他们与另外几家 IT 领导者共同创立了 FIDO 联盟，这是一个网络安全组织。FIDO 代表“快速在线身份识别”（Fast IDentity Online）。


    谷歌于 2013 年加入。一年后的 2014 年，PayPal 和三星在三星 Galaxy S5 智能手机上启动了 FIDO 认证。该设备的用户可以通过指纹触摸来验证
    PayPal 身份，并在完成交易时无需输入密码即可在线购物。“通行密钥”这个术语直到最近才流行起来，当时苹果在 2022 年 6 月的全球开发者大会上大力推广，并在
    iOS 16 和 macOS Ventura 中公开宣布了其通行密钥功能。


    ##### 工作原理


    通行密钥基于 FIDO 联盟开发的 WebAuthn 加密协议。每个通行密钥都是一对相关的非对称加密密钥，并且仅对其创建的网站有效。这对密钥由一个私钥和一个公钥组成：私钥保存在你的设备上，位于支持通行密钥的密码管理器（通行密钥提供者）中；公钥则存储在你想要登录的网站上。


    你可以把公钥证书想象成数字版的护照。

    '
- fmt: '### Authentication Examples


    In this section, we covered some theoretical ground on the basics of authentication.
    Aren’t you yet as excited as we are to see how that plays out in code? Let’s look
    through the Jakarta EE door by examining some basic code snippets for authentication.


    In Jakarta EE, the component containers are responsible for providing application
    security. A container provides two types of security: *declarative* and *programmatic*.
    Declarative security addresses the use of deployment descriptors or annotations
    to configure a component’s security mechanisms, whereas programmatic security
    is used by security-aware applications to complement their security model.


    **Programmatic Authentication**


    Authenticating users programmatically can be done using the `SecurityContext`
    and `HttpServletRequest` interfaces.


    `SecurityContext`


    The Jakarta EE Security API Specification, which you will have the chance to evaluate
    in the next few chapters, specifies one method to help you trigger an authentication
    process programmatically:


    * `authenticate()` enables an application to notify the container that it should
    start the authentication process with the caller.


    The `HttpServletRequest` interface enables you to authenticate web application
    users programmatically by specifying three simple methods:


    * `authenticate` triggers the specific authentication mechanism that has been
    configured; for example, if that’s a form, a login form will be displayed to the
    user to collect their username and password, whereas if that’s simply a social
    login like “Login with Google,” it will redirect the user to Google.


    * `login` validates the provided username and password.


    * `logout` resets a request’s caller identity.


    The following code example shows how to use the `authenticate` method:


    ```

    public class EnterpriseSocialServlet extends HttpServlet {

    protected void processRequest(HttpServletRequest request, HttpServletResponse
    response) throws ServletException, IOException {

    response.setContentType("text/html;charset=UTF-8");

    try (PrintWriter writer = response.getWriter()) {

    request.authenticate(response);

    writer.println("Successful authentication!");

    }

    }

    }

    ```


    This example shows how to use the `login` and `logout` methods:


    ```

    public class SampleLoginLogoutServlet extends HttpServlet {

    protected void processRequest(HttpServletRequest request, HttpServletResponse
    response) throws ServletException, IOException {

    response.setContentType("text/html;charset=UTF-8");

    try (PrintWriter out = response.getWriter()) {

    out.println("");

    out.println("");

    request.login("Chapter4User", "Chapter4User");

    BigDecimal result =

    converterBean.libresToKilos(new BigDecimal("55.0"));

    out.println("Servlet SampleLoginLogoutServlet result of libresToKilos= " + result
    + "");

    out.println("");

    out.println("");

    } catch (Exception e) {

    throw new ServletException(e);

    } finally {

    request.logout();

    }

    }

    }

    ```


    ## Authorization


    Authorization, also known as access control, is the process of managing access
    to resources – in other words, controlling who has access to what in an application.


    More formally, to authorize is to define an access policy. Examples of authorization
    are: Is a user allowed to look at this web page, read or edit this information,
    view this form, or use this printer? Those are all decisions determining what
    a user may access.


    ### Jakarta Authorization


    Java has a security architecture that protects systems from unauthorized access
    by mobile/dynamic or static code. The problem is in manually determining the set
    of security access rights required to execute a library or application. The commonly
    used strategy is to execute the code, note authorization failures, allocate additional
    access rights, and test again. This process iterates until the code successfully
    runs for the required use cases. Those cases may not always cover all paths through
    the code, so failures can occur in deployed systems. On the other hand, a broad
    set of access rights may be allocated to the code to prevent authorization failures
    from occurring. However, this often leads to a violation of the Least Privilege
    design principle [27].


    The Least Privilege design principle requires a minimalistic approach to granting
    user access rights to specific information and tools. Additionally, access rights
    should be time based as to limit resources access bound to the time needed to
    complete necessary tasks. The implications of granting access beyond this scope
    will allow for unnecessary access and the potential for data to be updated out
    of the approved context. The assigning of access rights will limit system damaging
    attacks from users whether they are intentional or not.


    Basic Java SE Security relies on permissions, for example, `FilePermission` to
    access the file system or `AWTPermission` to use resources like the clipboard
    in AWT/Swing applications.


    If someone wants to allow a new type of permission for specific applications,
    this can be done by adding an entry in a policy file.


    An example of a policy file entry granting code from the `http://mysocial.tv/`
    permission to watch ARTE would be


    ```

    grant codeBase  "http://mysocial.tv /" {

    permission fr.arte.TVPermission "arte-tv", "watch";

    }

    ```


    ## Security Standards


    After we looked at standardized ways to interact with social media in Chapter
    [3](#600273_1_En_3_Chapter.xhtml), here are some common standards related to security.'
