  trans: "\n#### 使用场景\n\nJSON Web Token 的两个主要使用场景如下：\n\n*   **授权**\n\n*   **信息交换**\n\
    \n**授权**可能是 JWT 最常见的用例。一旦用户登录系统，后续的每个请求都会包含该 JWT，从而允许用户访问该令牌所授权的页面、服务和资源。**单点登录**是当今广泛使用\
    \ JWT 的一项功能，尤其是在公共 API 中，因为它开销小且易于跨不同域使用。\n\n**信息交换**：JSON Web Token 是在各方之间安全传输信息的好方法。由于\
    \ JWT 可以被签名（例如，使用公钥/私钥对），您可以确信发送者身份属实。此外，由于签名是使用标头和载荷计算得出的，您还可以验证内容是否被篡改。\n\n\
    #### 为什么需要 JWT？\n\nHTTP 协议是无状态的；因此，像 `GET /order/42` 这样的新请求无法了解之前具有相同 ID 的 `PUT\
    \ /order` 请求的任何信息，用户必须为每个新请求重新进行身份验证。\n\n![](img/600273_1_En_4_Fig9_HTML.jpg)\n\
    \n一组两个重复认证的示例。1，Put order 功能，包含用户名、密码和 ID。通信从客户端开始，验证用户名和密码，身份提供者，如果通过则转到服务器，并返回\
    \ 201 Created。2，此处使用了 Get order 功能。\n\n图 4-9\n\n每个新的 HTTP API 请求都重复进行身份验证\n\n\
    这通常通过使用**服务器端会话 (SSS)** 来处理。首先，检查登录凭据（如用户名和密码），如果正确，服务器将创建一个会话 ID，存储它，并将其返回给客户端。在基于\
    \ Servlet 的 Jakarta EE 应用程序中，发送给客户端的这个 cookie 通常被称为 `JSESSIONID`。\n\n![](img/600273_1_En_4_Fig10_HTML.jpg)\n\
    \n一组三个示例，描述了身份验证次数的减少。Post authenticate 包含用户名和密码。通信从客户端开始，验证用户名和密码，身份提供者，服务器，J\
    \ session ID 等于 A B C，最后是客户端。\n\n图 4-10\n\n使用 SSS，减少针对身份提供者的身份验证次数\n\n这种方法可以解决一个问题，但可能会产生其他问题，例如可扩展性问题。虽然服务器端会话可能适用于大多数网站甚至一些电子商务商店，但在\
    \ API 驱动的时代，某些端点可能面临大量请求，迫使提供者进行扩展。有两种扩展方式：\n\n*   **垂直扩展**\n\n*   **水平扩展**\n\n\
    垂直扩展意味着向服务器添加更多资源，如内存、存储或 CPU 核心。这可能非常昂贵，并且也会达到某些限制，例如每台服务器的 CPU 数量、内存插槽或磁盘存储。\n\
    \n水平扩展通过在**负载均衡器**后面添加更多服务器来扩展您的基础设施，这通常比不断升级每台服务器更高效且更具成本效益。虽然水平扩展通常更高效，但即使只有一个位置和负载均衡器，它也会导致进一步的问题和复杂性。\n\
    \n想象一下负载均衡器后面有一台服务器，客户端使用像 **\"**`abc`**\"** 这样的 `JSESSIONID` 执行请求；该会话 ID 可以在服务器的内存中找到。\n\
    \n![](img/600273_1_En_4_Fig11_HTML.jpg)\n\n客户端和服务器之间的一个示例通信。从客户端开始，然后是 get order\
    \ 42 J session equals A B C，在内存中检查 J session ID，服务器 1.1，负载均衡器，并将 ID 为 42 的订单返回给客户端。\n\
    \n图 4-11\n\n负载均衡器后面的单台服务器\n\n如果基础设施需要扩展，并且在负载均衡器后面添加了一台新服务器，这台新服务器将处理客户端使用 `\"\
    abc\"` 发出的下一个请求，它将无法识别该 `JSESSIONID`。\n\n![](img/600273_1_En_4_Fig12_HTML.jpg)\n\
    \n服务器和客户端之间的一个示例通信。从客户端开始，然后是 get order J session equals A B C，服务器 1.1，检查内存未识别，服务器\
    \ 2.2，负载均衡器，并向客户端返回未认证错误。\n\n图 4-12\n\nLB 后面的新服务器，用户未被识别\n\n身份验证失败，因为新服务器的内存中还没有\
    \ **\"**`abc`**\"** 会话。主要有三种解决此问题的变通方法。\n\n在服务器之间同步会话，这可能很棘手且容易出错，尤其是在全球分布式架构中。\n\
    \n使用外部数据库或会话缓存机制。这可能有所帮助，但会为基础架构增加更多组件，尤其是在分布式环境中，此缓存或数据库将需要自己的复制。\n\n或者接受 HTTP\
    \ 的无状态特性，并尝试找到一种适用于它的解决方案。\n\n这就是 JSON Web Token 发挥作用的地方，因为每个令牌都是紧凑且自包含的，它包含了允许或拒绝\
    \ API 请求所需的所有信息，而无需首先执行任何复制或昂贵的查找。\n\n#### 它是如何工作的？\n\n基于令牌的身份验证机制允许系统根据安全令牌对身份进行认证、授权和验证。通常，涉及以下实体：\n\
    \n*   **颁发者** – 负责在成功断言身份（认证）后颁发安全令牌。颁发者通常与身份提供者相关。\n\n*   **客户端** – 由为其颁发令牌的应用程序表示。客户端通常与服务提供者相关。客户端也可以充当主体和目标服务之间的中介（委托）。\n\
    \n*   **主体** – 令牌中信息所指的实体。\n\n*   **资源服务器** – 由将消费令牌以检查其是否授予对受保护资源的访问权限的应用程序表示。\n\
    \n无论令牌格式或应用的协议如何，从服务的角度来看，基于令牌的身份验证包括以下步骤：\n\n1.  从请求中提取安全令牌。\n\n    对于 RESTful\
    \ 服务，通常通过从 Authorization 标头获取令牌来实现。\n\n2.  对令牌执行验证检查。\n\n    此步骤通常取决于令牌格式和所使用的安全协议。目标是确保令牌有效并且可以被应用程序消费。它可能涉及签名、加密和过期检查。\n\
    \n3.  内省令牌并提取关于主体的信息。\n\n    此步骤通常取决于令牌格式和所使用的安全协议。目标是从令牌中获取关于主体的所有必要信息。\n\n4.\
    \  为主体创建安全上下文。\n\n基于从令牌中提取的信息，应用程序为主体创建一个安全上下文，以便在服务受保护资源时在必要时使用该信息。\n\n#### JWT\
    \ 结构\n\n一个 JSON Web Token 包含三个部分：\n\n*   **标头**\n\n*   **载荷**\n\n*   **签名**\n\n\
    每个部分由“**.**”字符分隔。\n\n因此，每个 JWT 看起来像\n\n```\nHeader.Payload.Signature\n```\n"
- fmt: '### Header


    ![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig13_HTML.jpg)


    A structure of JWT. It consists of two divisions: Header and decoder. Header includes
    the type of token and the algorithm to generate the signature. The decoded section
    has scripts for header, payload, and signature.


    **Figure 4-13** JWT Structure


    The header describes the JSON Web Token itself. It contains the information about
    the type of the token and the algorithm used to generate the signature. The algorithm
    parameter `"alg"` must be present in every JWT header. The most common algorithms
    are HMAC with a SHA-256 hash (`"HS256"`) or RSA with the same (`"RS256"`) and
    more recently ECDSA P-256 with SHA-256 (`"ES256"`). The allowed values are specified
    by the JSON Web Encryption (JWE) standard RFC 7516.


    In our example, the header contains the algorithm and type parameters:


    ```

    {

    "typ" : "JWT",

    "alg" : "RS256"

    }

    ```


    The type parameter `"typ"` is used to declare the IANA media type (RFC 6838) of
    the token. It is optional, but when set, it should always be `"JWT"`, representing
    the media type `"application/jwt"`.


    Another parameter `"cty"` (content type) is used to declare the media type of
    the secured content (payload). It is optional and only required if the payload
    contains another JSON Web Token, in which case its value should be `"JWT"`; otherwise,
    this parameter can be ignored or left out.


    The parameter `"enc"` (encryption algorithm) is defined for use with JWE. It is
    only required when the claims or nested JWT tokens have to be encrypted. It identifies
    the cryptographic algorithm used to encrypt the claims or nested JWT tokens.


    For example, AES in the Galois/Counter Mode (GCM) algorithm using a 256-bit key
    would be specified as `"A256GCM"`.


    There are several other predefined header parameters like:


    * `crit` (Critical)

    * `jku` (JWK Set URL)

    * `jwk` (JSON Web Key)

    * `kid` (Key ID)

    * `x5u` (X.509 URL)

    * `x5t` (X.509 Certificate SHA-1 Thumbprint)

    * `x5t#S256` (X.509 Certificate SHA-256 Thumbprint)


    ### Payload


    The payload or body is the essential part of the JWT containing security statements
    like the identity of the user and granted permissions. JWT calls them claims.


    There are three types of JWT claim names:


    1. Registered claim

    2. Public claim

    3. Private claim


    Registered claims are the predefined claims. Public claims can be any user-defined
    information, and private claims are those upon which the producer and consumer
    of JWT agreed to use in a specific application.


    In order to validate a JWT, we should check some registered claims as well. Some
    important registered claims are defined in Table 4-1.


    **Table 4-1** Registered JWT Claims


    | Claim Name | Description | Reference |

    | --- | --- | --- |

    | `iss` | The token issuer | RFC 7519, Section 4.1.1 |

    | `sub` | The principal that is the subject of the JWT | RFC 7519, Section 4.1.2
    |

    | `aud` | The recipients of the JWT | RFC 7519, Section 4.1.3 |

    | `exp` | The expiration time on or after which the JWT must not be accepted for
    processing | RFC 7519, Section 4.1.4 |

    | `nbf` | Time before which the JWT must not be accepted for processing | RFC
    7519, Section 4.1.5 |

    | `iat` | Time at which the issuer generated the JWT | RFC 7519, Section 4.1.6
    |

    | `jti` | Unique identifier for the JWT | RFC 7519, Section 4.1.7 |


    #### `"iss"` (Issuer) Claim


    The `"iss"` (issuer) claim identifies the principal that issued the JWT. The processing
    of this claim is generally application specific. The `"iss"` value is a case-sensitive
    string containing a URI value. The use of this claim is optional. We should validate
    that the issuer is a valid URL or the JWT was sent by an expected issuer.


    #### `"sub"` (Subject) Claim


    The `"sub"` (subject) claim identifies the principal that is the subject of the
    token. Claims in a JWT are statements about the subject. The `"sub"` value is
    a case-sensitive string containing a URI value. The use of this claim is optional.


    #### `"aud"` (Audience) Claim


    The `"aud"` (audience) claim identifies the recipients of the token. Each principal
    intended to process the JWT must identify itself with a value in the audience
    claim. If the principal processing the claim does not identify itself with a value
    in the `"aud"` claim when this claim is present, then the JWT must be rejected.
    In general, the `"aud"` value is an array of case-sensitive strings, each containing
    a URI value. The use of this claim is optional.


    #### `"exp"` (Expiration Time) Claim


    The `"exp"` (expiration time) claim identifies the expiration time on or after
    which the token will not be accepted for processing. The processing of the `"exp"`
    claim requires that the current date/time must be before the expiration date/time
    listed in the `"exp"` claim. Its value must be a numeric timestamp. The use of
    this claim is optional.


    #### `"nbf"` (Not Before) Claim


    The `"nbf"` (not before) claim identifies the time before which the JWT must not
    be accepted for processing. The processing of the `"nbf"` claim requires that
    the current date/time must be after or equal to the not-before date/time listed
    in the `"nbf"` claim. Its value must be a number containing a numeric date value.
    This claim is optional.


    #### `"iat"` (Issued At) Claim


    The `"iat"` (issued at) claim identifies the time at which the token was issued.
    This claim can be used to determine the age of the JWT. Its value must be a number
    containing a numeric date value. This claim is optional.


    #### `"jti"` (JWT ID) Claim


    The `"jti"` (JWT ID) claim provides a case-sensitive unique identifier for the
    JWT. The identifier value must be assigned in a manner that ensures that there
    is a negligible probability that the same value will be accidentally assigned
    to a different data object; if the application uses multiple issuers, collisions
    must be prevented among values produced by different issuers as well. The `"jti"`
    claim can be used to prevent the JWT from being reused. The use of this claim
    is optional.


    ### Signature


    The third part of the JSON Web Token is the signature. It is the most important
    part of a JWT to validate it and ensure it was not modified or tampered with and
    can be trusted. The signature is generated using the payload and a secret key;
    therefore, anyone in possession of this key can generate new tokens with valid
    signatures.


    The most commonly used cryptographic algorithms to generate a signature are as
    follows:


    * `HS256`, which is short for HMAC-SHA256

    * `RS256`, short for RSA-SHA256

    * `ES256`, short for ECDSA P-256 SHA-256


    `HS256` is a symmetric key encryption and involves a secret key being shared between
    two parties. This secret key is used to encrypt the data, and on the receiver
    side, the same key is used to decrypt the data. `HS256` signatures are generated
    using a secret key that is validated at the receiving end (resource server). On
    the receiver side, using the payload and secret key, the signature has to be generated
    again and compared to the signature part of the incoming JWT. Since only the authentication
    server and resource server are in possession of the secret key, it is not possible
    to tamper with the JWT, and we can ensure its validity.'
