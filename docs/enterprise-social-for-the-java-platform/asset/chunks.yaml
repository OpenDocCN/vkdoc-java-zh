    *   社交网络交互，旨在实现个性化广告服务，同时提升最终用户附加值。相关类别：分析、广告。


    *   位置 API 通过签到、导航、活动、评论和提示实现位置感知。它是一个强大的上下文 API，包含位置信息，可通过 GPS 传感器提取并在地图上映射。相关类别：地图、基于位置的服务、社交、音乐。


    *   媒体 API 整合了照片、音乐和视频分享服务，并具备文件传输和同步功能。它与设备上的图库应用和文件系统相关。相关类别：文件传输与同步、基于位置的服务、音乐、新闻、照片、社交、视频。


    *   产品与服务 API 涵盖了支付和购物服务。这种与商业化相关的特殊对象需要一个具备交易能力和增强安全性的强大 API。它与手机上的商店应用相关。相关类别：基于位置的服务、支付、购物。


    *   个人资料 API 基于分析、广告、联系人、游戏、健康、基于位置的服务、消息与聊天、音乐、社交等，推断出关于人的信息。通常，人们可以通过多种方式呈现，拥有多个个人资料。此
    API 将所有信息整合在一起：头像、个人资料、联系人和账户，并在不同服务中关联不同的个人资料。它与智能手机的通讯录应用直接相关。部分相关类别：分析、广告、联系人、游戏、健康、基于位置的服务、消息与聊天、音乐、电影等。


    *   搜索 API，用于从基于云的服务中查找和检索信息。它整合了现有的搜索引擎与跨平台分布式搜索功能，并与桌面或手机操作系统中的搜索功能相关。


    ![](img/600273_1_En_3_Fig2_HTML.jpg)


    开放 I 标准的概念流程图。它包括基于云的功能和内容，其次是云平台和 API 框架，以及应用程序。基于云的功能包括 PayPal、TechCrunch、谷歌等。


    图 3-2


    OPENi 概念


    尽管 OPENi 尚未在 GitHub 上提供其任何 API（如其网站在 2013 年所承诺的那样），但其工作引起了例如 W3C 的关注，OpenSocial
    [15] 目前正在 W3C 进行进一步讨论。因此，即使没有自己的 API，OPENi 及其概念也可能对此有所助益。我们将在介绍 Apache Shindig
    时更详细地介绍 OpenSocial。


    除了像之前那样剖析和分类社交媒体标准之外，还有许多其他标准和协议被众多 API 和社交网络所使用：


    *   几乎所有社交媒体服务都使用**REST**作为传输协议；有些可能使用**SOAP**，但这相当少见。


    *   大多数服务以**JSON**格式传输数据，有些使用**XML**或两者兼用。


    *   身份识别和认证几乎总是基于**OAuth 2**或**OpenID Connect**。


    图 3-1 中未提及的其他基本标准和协议（因为该列表并非旨在穷尽）如下：


    *   开放图谱协议（OGP）使任何网页都能成为社交图谱中的一个富对象。


    *   oEmbed，一种允许在第三方网站上嵌入 URL 表示形式的格式。


    *   PubSubHubbub，一种简单、开放、基于 Web 钩子的服务器到服务器发布-订阅协议。


    *   Salmon，一种标准协议，用于使评论和注释能够向上游（因此得名）回溯到原始更新源。


    我们将在下一章中更详细地探讨安全方面，如授权、认证或数字身份，以及隐私、数据保护和相关标准。


    ## 早期方法


    我们在引言中遇到的理论，例如六度分隔理论 [6]，影响了后来的概念，如朋友的朋友（FOAF）[8]。如今社交网络使用的大多数“好友”机制中都可以找到这两者的影子。


    丰富站点摘要（RSS）[9]是社交媒体数字形式的早期例子。参与 RSS 设计和标准化的开发者中包括 Reddit 联合创始人亚伦·斯沃茨，他在 2013 年初不幸去世前，曾致力于撰写一本关于可编程网络
    [10] 的书，这本书是该领域中通常枯燥的学术论文的一个相当务实、接地气的对应物。


    便携式联系人由 Plaxo 创建，这是一家社交地址簿服务公司，由一群企业家在肖恩·帕克周围于 2002 年创立。帕克在 Napster 音乐交换门户被迫停业后，曾遇到过与亚伦·斯沃茨相比毫不逊色的法律麻烦，但幸运的是，他处理方式不同，其影响力也远不止于当今社交媒体领域的某个家喻户晓的名字。便携式地址簿或“数字名片”的想法初衷良好，尤其从用户角度来看很有意义，但竞争参与者的商业利益——每个人都渴望分享数据，甚至包括与数据所有者分享——给这个原本不错的想法设置了许多障碍。Plaxo
    在这么多年后仍在运营，但未必是帕克最伟大的成就，投资者将他赶走的方式，与帕克介入时联合创始人爱德华多·萨维林在 Facebook 的遭遇并无二致。从财务上讲，这让他变得富有，并为其他服务（例如
    Spotify）提供了支持。这看起来有点像 Napster，但以一种更被商业接受的方式，这也要归功于他在 Facebook 之后的名声和财富，这并非巧合。便携式联系人可能是社交媒体运动的重要组成部分，但已不再使用。这是因为大公司内部使用的许多
    API 已不再与便携式联系人兼容。唯一仍在使用的遗留物是 vCard，许多公司和应用程序都在使用它。'
- fmt: '# Mashup


    As the Java language played a more and more important role first on the desktop
    (mostly via Java applets in the early days, or AWT/Swing stand-alone applications)
    then around the turn of the century also on the server, Sun and other companies
    began to standardize parts of the Java platform in the Java Community Process
    (founded in 1998) or JCP [11]. Of the earliest members, IBM, Intel, Fujitsu, Sun,
    and Oracle (these two combined since 2010) are still active.


    After being turned down or withdrawn twice, a notable standard for social networks,
    then often called “Portal” (see MSN earlier), was JSR 168, the Java Portlet Specification
    [48]. In an ideal world, it allowed portal applications to be deployed into multiple
    portal servers regardless of the vendor and together with other standards, especially
    the OASIS-defined WSRP (Web Services for Remote Portlets), raised hopes for interoperability
    between these applications even across different portals. After ten years, with
    other technologies and languages, especially “lightweight containers” on the rise,
    the Java Portlet standard got a version 3.0 update (JSR 362) in 2017, also planning
    to incorporate some social standards where possible but those did not make it
    into the Portlet spec anymore.


    While Portlets and related standards are still mostly the domain of large-scale
    Enterprise Application servers inspired by music or video compilations or remixes,
    a more language and platform-neutral approach called Mashup [12] started shortly
    after the first Portlet standard. Whether it was Yahoo Pipes, Microsoft Popfly,
    Google Mashup Editor, IBM Mashup Center, or BEA AquaLogic [13], all of them promised
    interoperability and personalized widgets, with an experience similar to iGoogle.
    A service, mostly due to Google+ taking personalization and a more “Integrated
    Social Media” approach to the next level, was shut down on November 1, 2013.


    So was RSS, only a few months after Aaron Swartz’ death. Google Reader was discontinued
    on July 1, 2013. While Swartz as last documented in his unfinished book [10] advocated
    an open API-based programmable web, most of the big providers have different plans,
    as numerous articles around Google Reader’s end like this one [14] express.


    # OStatus


    OStatus is an open standard for federated microblogging, allowing users to receive
    status updates by users of another site. The standard combines a series of open
    protocols like:


    *   Atom

    *   Activity Streams

    *   WebSub

    *   Salmon

    *   WebFinger


    It started in 2013 with StatusNet, which later became GNU social [60]. It was
    at the time adopted by a number of microblogging sites, but frustration with the
    underlying technology turned most of them to use ActivityPub, including Mastodon
    [61], Pleroma, or postActiv. The only open source social network still using OStatus
    is Friendica [62], a very early open source approach that started in 2010 and
    is also written in PHP, like GNU social; hence, there seem to be more synergies
    between the two projects than for others.


    # OpenSocial


    Another social standard has been shaped by community development almost since
    its inception: OpenSocial [15] developed by Google with a handful of initial supporters,
    MySpace still the most popular social network at the time, Ning or Plaxo. At this
    time Portable Contacts mentioned earlier would also fit into the overall idea
    of easy-to-use widgets and services across a variety of social networking providers,
    as opposed to, for example, version 2.0 of the Java Portlet standard, which released
    its Public Draft around the same time.


    Seemingly easier to use, that also applied to exploits and security issues, often
    demonstrated by “script kiddies” more or less out of primary school using a few
    scripts to break or compromise those services and widgets. Full-scale Java EE
    servers and Portlets were and still are much harder to break into, if system administrators
    do their homework. And all the fuss about Java security or it being used to transport
    malware usually affects the client side.


    A vast majority of OpenSocial is JavaScript code, making it more exposed than
    a mostly server-side or carefully mixed use of server (Jakarta EE or other environments)
    and client tier (JavaScript, etc.). See Figure [3-3](#600273_1_En_3_Chapter.xhtml#Fig3)
    for different tiers of a typical web-based enterprise application using Java EE,
    but you may replace it by other languages like Python, PHP, Ruby, or Scala with
    the layers being about the same.


    ![](images/600273_1_En_3_Chapter/600273_1_En_3_Fig3_HTML.jpg)


    A conceptual flow diagram presents the different tiers of a typical web-based
    enterprise application. It includes three stages, client machine, Java server,
    and database server. Client machine has application client and dynamic HTML page,
    and client tier, followed by the rest servers.


    **Figure 3-3** – N-tier Enterprise Application


    While Google began to use OpenSocial in its Orkut service (popular in Latin America
    and a few other countries like India, but never really picked up in other places),
    other vendors initially planning to support it abandoned those plans one after
    the other. The likes of LinkedIn or XING especially did so for security reasons.
    We’ll hear more on security and privacy in the following chapter. Neither Facebook
    nor Twitter, the two dominating providers from the second half of the last decade,
    ever cared about OpenSocial. And more importantly, Google killed its own creation
    when it became obvious. Google+ would never support it either. A few vendors mainly
    from the server and large enterprise fraction like IBM, SAP, or Confluence author
    Atlassian still backed OpenSocial.


    Dachis Group, in 2014 acquired by Sprinklr, sort of a “Think Tank” for social
    media and enterprise data analysis, was also strongly involved, though its focus
    goes more in directions like Big Data and NoSQL systems lately, and it openly
    admits like most remaining OpenSocial backers (or Thoughtworks in its regular
    survey called “Radar” about technologies to watch or regard less over time) the
    only place for it may be the enterprise and intranet after all. Big Data can be
    seen as a Mashup, too, but it takes place primarily on the EIS or DB tier (see
    Figure [3-4](#600273_1_En_3_Chapter.xhtml#Fig4)) so I won’t discuss it much here.
    These technologies would also deserve their own book and exceed the scope of this
    one.


    ![](images/600273_1_En_3_Chapter/600273_1_En_3_Fig4_HTML.jpg)


    A conceptual diagram presents the overview of the activity pub. It features an
    inbox and outbox, an actor reading incoming messages, and an actor receiving messages.
    Backward and forward arrows are labeled get and post messages.


    **Figure 3-4** – ActivityPub Overview'
