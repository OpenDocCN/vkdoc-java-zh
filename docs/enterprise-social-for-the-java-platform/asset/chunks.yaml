    8% 的份额位居第二（涵盖所有品牌），其中 Pixel Watch 的销量可能领先于其 Fitbit 设备。


    ##### Strava


    Strava 是一个具有强烈社交属性的健身门户网站。大多数用户可能专注于跑步或骑行，但它也提供数十种不同的运动项目，包括瑜伽或雪鞋行走。


    与大多数侧重于休闲或半专业运动员的健身门户不同，也有像职业自行车手这样的专业运动员在使用它。


