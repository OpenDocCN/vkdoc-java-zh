- fmt: "### Google Fit\n\n`Google Fit`是谷歌为安卓操作系统打造的健康追踪平台。它允许用户监测和追踪各种健康与健身信息，例如活动量、心率、体重、步数或睡眠情况。\n\
    \n`Google Fit`聚合来自多个传感器设备和第三方应用的数据，使用户能够轻松在一个地方查看和管理他们的健康与健身数据。\n\n![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig3_HTML.jpg)\n\
    \n一张网页截图显示了`Google Fit`仪表盘。包含一个刻度盘，显示今天步行了42分钟，距离您的平均值还差17分钟。右侧的折线图有4条线，分别代表一周中每天的总活动量、步行、跑步和骑行。\n\
    \n**图 2-3**  \n`Google Fit`仪表盘\n\n用户可以设定并追踪目标，例如每日步数、减重、睡眠时长或每周跑步目标，并根据其活动获得个性化的见解和建议。`Google\
    \ Fit`旨在通过帮助用户更轻松地管理健身目标和长期监测进度，来改善用户的健康与福祉。但截至目前，`Google Fit`不提供与其他人分享或竞争的功能；与`Apple`、`Adidas`或`Strava`不同，`Google\
    \ Fit`目前没有挑战功能。2019年，`Google Fit`网页应用被停用。\n\n### Fitbit\n\n`Fitbit`于2019年被谷歌收购。虽然正在推进与谷歌账户的更紧密集成（特别是针对新用户和新注册设备），但该品牌在某种程度上仍然独立，尽管它可被视为与“`Pixel`”等其他谷歌品牌等同的品牌。\n\
    \n谷歌承诺，到2025年，旧的遗留账户仍可在没有谷歌账户的情况下运行；此后，谷歌账户将成为强制要求，或者`Fitbit`应用和仪表盘（见图[2-4](#600273_1_En_2_Chapter.xhtml#Fig4)）甚至可能被合并到`Google\
    \ Fit`中。\n\n![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig4_HTML.jpg)\n\n\
    一张网页截图显示了`Fitbit`仪表盘。它包括饮食计划、与朋友分享、活动量、一个显示步行步数（分为轻度、中度或剧烈活动）的条形图，以及饮水量。\n\n**图\
    \ 2-4**  \n`Fitbit`仪表盘\n\n`Fitbit`提供营养和运动追踪，以及通过徽章或挑战等形式实现的游戏化功能。但在谷歌旗下，很可能是为了削减成本，这些功能已于2023年3月下旬被取消[51]。`Fitbit`用户对此举并不满意。2020年，`Fitbit`拥有3100万活跃用户，同比增长4%（在谷歌收购之前）。然而，其全球市场份额——`Fitbit`在2014年曾占45%——在2020年降至3%以下。虽然`Apple`一段时间以来一直是领先的智能手表品牌，市场份额接近30%，但截至2022年底，谷歌仍以8%的份额位居第二，但这是所有品牌（包括`Pixel`手表，其销量可能领先于`Fitbit`设备）的总和。\n\
    \n### Strava\n\n`Strava`是一个具有强烈社交特性的健身门户网站。大多数用户可能专注于跑步或骑行，但它提供数十种不同的运动，包括瑜伽或雪鞋行走。\n\
    \n与大多数侧重于休闲或半职业运动员的健身门户网站不同，也有像职业自行车手这样的专业运动员在使用它。\n\n![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig5_HTML.jpg)\n\
    \n一张网页截图显示了`Strava`健身门户网站。页面包含一位来自加利福尼亚州的用户。该应用追踪距离、移动时间、海拔、显示扩展状态的海拔数据，以及平均爬升速度等参数。下方还包含一个谷歌地图。\n\
    \n**图 2-5**  \n`Strava`活动\n\n功能包括与他人分享的俱乐部和路线，以及供其他用户相互竞争挑战，并与自行车码表、健身追踪器、智能手表等多种设备集成。\n\
    \n![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig6_HTML.jpg)\n\n一张`Java One`极客自行车骑行者`Facebook`页面的截图。包含一张没有辐条的停放自行车的照片，以及一个自行车码表的头像。文字内容是关于`Java\
    \ One`前一个星期六的年度自行车骑行活动。\n\n**图 2-6**  \n`Strava`俱乐部\n\n某些功能需要付费订阅，但仍有足够多的功能可以在不付费的情况下使用。\n\
    \n### Adidas/Runtastic\n\n最初的想法源于2006年上奥地利应用科学大学的一个追踪帆船的项目，最终促成了`Runtastic`于2009年成立。\n\
    \n2015年8月，`Adidas`宣布以2.2亿欧元（2.4亿美元）收购`Runtastic`，包括报社集团`Axel Springer`自2013年起持有的50.1%的股份。\n\
    \n### MyFitnessPal\n\n`MyFitnessPal`是一款智能手机和网络应用程序，允许用户追踪他们的卡路里摄入量、运动和其他健身信息。它是一个数字饮食日记，帮助人们监测每日食物摄入量，以实现其健康和健身目标。\n\
    \n![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig7_HTML.jpg)\n\n一张`MyFitnessPal`网络应用程序的截图。它包含一份晚餐和零食的饮食日记，并标注了卡路里。下方是三种示例食物及其卡路里。顶部有一个等式：目标3650\
    \ - 食物1161 + 0运动 = 剩余2489。\n\n**图 2-7**  \n`MyFitnessPal`\n\n该应用拥有超过700万种食物的数据库，允许用户记录餐食，或扫描包装上的条形码以便于追踪。它还包括追踪液体摄入量以及摄入的碳水化合物、蛋白质或脂肪的功能，以及运动记录，这些都可以与其他健身应用和可穿戴设备（如智能手表或体重秤）同步。\n\
    \n2015年2月，运动服装公司`Under Armour`收购了`MyFitnessPal`，但在2020年，它又将其出售给了一家私募股权公司。似乎是为了在新管理层下削减成本，2022年，甚至在`Fitbit`之前，`MyFitnessPal`就移除了大多数社交功能（如挑战），只保留了营养或运动的社交分享功能。\n\
    \n### 旅行\n\n表[2-2](#600273_1_En_2_Chapter.xhtml#Tab2)列出了排名前20的社交旅行服务。它们的类别涵盖从预订、住宿到飞行或社交乘车等各个方面。\n\
    \n**表 2-2**  \n热门旅行网站\n\n| 网站 | 类别 | 地区 |\n| :--- | :--- | :--- |\n| `Airbnb`\
    \ | 社交住宿 | 全球 |\n| `Google Travel` | 旅行搜索与内容聚合 | 全球 |\n| `Travello` | 社交旅行 | 全球\
    \ |\n| `TripIt` | 社交旅行 | 全球 |\n| `Tripadvisor` | 社交旅行与评分 | 全球 |\n| `Travel Buddy`\
    \ | 社交旅行 | 全球 |\n| `FlyerTalk` | 常旅客网络 | 全球 |\n| `Ever Travel` | 社交旅行 | 东欧 |\n\
    | `Backpackr` | 背包旅行社区 | 全球 |\n| `Trippy` | 社交旅行 | 全球 |\n| `Uber` | 网约车 | 全球 |\n\
    | `Lyft` | 网约车 | 全球 |\n| `Bolt` | 网约车 | 全球 |\n| `DiDi` | 网约车 | 中国 |\n| `Share\
    \ Now` | 共享汽车 | 欧洲 |\n| `Turo` | 共享汽车 | 美洲 |\n| `Free Now` | 网约车 | 欧洲 |\n| `Ola`\
    \ | 网约车 | 印度、英联邦 |\n| `Zipcar` | 共享汽车 | 全球 |"
  raw: '##### Google Fit


    Google Fit is a health-tracking platform by Google for the Android operating system.
    It allows users to monitor and track various types of health and fitness information,
    such as activity level, heart rate, weight, steps walked, or sleep.


    Google Fit aggregates data from multiple sensor devices and third-party apps,
    making it easy for users to view and manage their health and fitness data in one
    place.


    ![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig3_HTML.jpg)


    A screenshot of a web page displays the google fit dashboard. Includes a dial
    gauge that indicates 42 minutes walking today and 17 minutes to your average.
    A line plot to the right has 4 lines for total, walking, running, and biking for
    the days of the week.


    Figure 2-3


    Google Fit Dashboard


    Users can set and track goals, such as a daily step count, weight loss, hours
    of sleep, or a weekly running goal, and receive personalized insights and recommendations
    based on their activity. Google Fit aims to help users improve their health and
    wellness by making it easier to manage their fitness goals and monitor their progress
    over time, but Google Fit so far offers no sharing or competing with others; unlike
    Apple, Adidas, or Strava, there are no challenges at this point in Google Fit.
    In 2019, the Google Fit web app was discontinued.


    ##### Fitbit


    Fitbit was purchased by Google in 2019\. While a tighter integration with a Google
    account, especially for new users and newly registered devices, is underway, the
    brand is still somewhat independent, although it could be seen as an equivalent
    to other Google brands like “Pixel.”


    Until 2025 Google promised the old legacy accounts would still run without a Google
    Account; after that, it becomes mandatory, or maybe the Fitbit app and dashboard
    (see Figure [2-4](#600273_1_En_2_Chapter.xhtml#Fig4)) may even be merged into
    Google Fit.


    ![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig4_HTML.jpg)


    A screenshot of a webpage displays the fit bit dashboard. It includes food plan,
    sharing with friends, activity level, a bar graph of walking steps with light,
    moderate or intense bars, and drinking water level.


    Figure 2-4


    Fitbit Dashboard


    Fitbit offers tracking of nutrition and exercises, as well as a form of gamification
    via badges or challenges, but under Google, most likely to cut costs, those features
    were scrapped in late March 2023 [51]. Fitbit users are not happy with that move.
    Fitbit had 31 million active users in 2020, an increase of 4% on the previous
    year (before the Google takeover). However, the global market share `–` Fitbit
    once accounted for 45% in 2014 `–` went below 3% in 2020\. And while Apple has
    been the leading smartwatch brand for some time now with close to 30% market share,
    Google was still second with 8% at the end of 2022, but for all brands combined,
    with the Pixel watch likely ahead of its Fitbit devices.


    ##### Strava


    Strava is a fitness portal with strong social characteristics. The majority of
    users may focus on running or cycling, but it offers dozens of different sports
    including yoga or snowshoe walking.


    Unlike most other fitness portals with an emphasis on casual or semiprofessional
    athletes, there are also professional athletes like professional cyclists using
    it.


    ![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig5_HTML.jpg)


    A screenshot of a webpage displays the Strava fitness portal. The page includes
    a user from California. The application tracks the distance level, moving time,
    elevation, display of elevate extended status, and parameters such as average
    climbing speed. Also it includes a google map below.


    Figure 2-5


    Strava Activity


    Features include clubs and routes to share with others, as well as challenges
    for other users to compete with each other and integration with numerous devices
    like cyclometers or fitness trackers and smartwatches.


    ![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig6_HTML.jpg)


    A screenshot of a Facebook page of Java one geek bike riders. Includes a photograph
    of parked bicycles without spokes and a profile picture of a cyclometer. A text
    reads about the annual bike ride the Saturday before Java One.


    Figure 2-6


    Strava Club


    Some features require a paid subscription, but there are still enough that can
    be used without paid membership.


    ##### Adidas/Runtastic


    The initial idea came up during a project at the University of Applied Sciences
    Upper Austria in 2006 to track sailboats, leading to Runtastic, founded in 2009.


    In August 2015, it was announced that Adidas had acquired Runtastic for €220 million
    ($240 million), including a 50.1% stake, newspaper group Axel Springer held since
    2013.


    ##### MyFitnessPal


    MyFitnessPal is a smartphone and web application, allowing users to track their
    calorie intake, exercise, and other fitness information. It is a digital food
    diary that helps people monitor their daily food consumption to achieve their
    health and fitness goals.


    ![](images/600273_1_En_2_Chapter/600273_1_En_2_Fig7_HTML.jpg)


    A screenshot of the My fitness Pal web application. It includes a food diary for
    dinner and snacks with calories. Below are three sample foods with calories. An
    equation on top reads, goal 3650 minus food 1161 + 0 exercise = remaining 2489.


    Figure 2-7


    MyFitnessPal


    The app has a database of over seven million foods, allowing users to log their
    meals, or scan barcodes on the packages for easy tracking. It also includes features
    to track liquid intake and consumed carbohydrates, protein, or fat, as well as
    exercises, which can be synced with other fitness apps and wearable devices like
    smartwatches or scales.


    In February 2015, the sportswear company Under Armour acquired MyFitnessPal, but
    in 2020, it sold it again to a private equity firm. Seemingly to cut costs under
    the new management, in 2022, even before Fitbit, MyFitnessPal removed most social
    features like challenges, leaving only a social share of nutrition or exercise.


    #### Travel


    Table [2-2](#600273_1_En_2_Chapter.xhtml#Tab2) shows the top 20 social travel
    services. Their categories range anywhere from booking or accommodation to flying
    or social rides.


    Table 2-2


    Top Travel Sites


    | Site | Category | Region |

    | --- | --- | --- |

    | Airbnb | Social Accommodation | Global |

    | Google Travel | Travel Search and Content Syndication | Global |

    | Travello | Social Travel | Global |

    | TripIt | Social Travel | Global |

    | Tripadvisor | Social Travel and Rating | Global |

    | Travel Buddy | Social Travel | Global |

    | FlyerTalk | Frequent Flyer Network | Global |

    | Ever Travel | Social Travel | Eastern Europe |

    | Backpackr | Backpacking Travel Community | Global |

    | Trippy | Social Travel | Global |

    | Uber | Ride Hailing | Global |

    | Lyft | Ride Hailing | Global |

    | Bolt | Ride Hailing | Global |

    | DiDi | Ride Hailing | China |

    | Share Now | Ride Sharing | Europe |

    | Turo | Ride Sharing | America |

    | Free Now | Ride Hailing | Europe |

    | Ola | Ride Hailing | India, Commonwealth |

    | Zipcar | Ride Sharing | Global |'
