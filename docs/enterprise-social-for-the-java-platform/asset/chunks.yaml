  trans: "\n## 移动端使用\n\n移动端使用未必是一种社交媒体类型，而更像是社交媒体应用所处的不同场景或环境，尽管有些应用（例如 Google Fit）目前仅支持移动端使用。\n\
    \n安德烈亚斯·M·卡普兰 [41] 将移动社交媒体应用分为四大类：\n\n1.  **时空型** – 对位置和时间敏感：分享的信息通常与特定时间点的特定位置相关。例如：\n\
    \    1.  Foursquare Swarm\n    2.  Facebook Places\n    3.  WhatsApp\n    4. \
    \ Telegram\n\n2.  **空间定位型** – 仅对位置敏感：分享与特定位置相关的信息，对某个地点进行评分或标记，供他人日后查阅。例如：\n \
    \   1.  Foursquare\n    2.  Yelp\n    3.  Fishbrain\n    4.  Qype\n    5.  Tumblr\n\
    \n3.  **快速时效型** – 仅对时间敏感：在移动应用上使用传统社交媒体以提高可用性，或作为电视屏幕之外的第二或第三屏幕，例如一边观看喜爱的节目一边发推文。包括：\n\
    \    1.  Twitter\n    2.  Facebook\n    3.  Mastodon\n\n4.  **慢速时效型** – 对时间和位置均不敏感：在移动应用上使用传统社交媒体，例如在\
    \ YouTube 上观看视频，阅读/撰写维基百科文章或 Tumblr 博客。\n\n## 总结\n\n在前两章中，你已经了解了社交媒体的历史背景，以及从在线关注亲友到影响者及企业社交从业者的专业使用等多种应用场景。\n\
    \n# 3. 标准化\n\n本章探讨了通过通用 API 实现社交媒体访问标准化的努力，以及社交网络自身使用的一些标准，这些标准不仅有助于在不同网络之间更轻松地切换，还能分析来自不同来源和社交网络的数据。\n\
    \n## 标准类型\n\n除了对 OpenSocial [15] 等“基础标准”的游说之外，图 3-1 提供了 Dachis Group 根据一系列文章 [16]\
    \ 整理的社交标准概览。\n\n![](img/600273_1_En_3_Fig1_HTML.png)\n\n社交业务标准中的缺失概览。它包含两部分：高阶标准（包括社交参与、社交行为和社交指标）和基础标准（包括社交身份、社交活动、社交集成和安全性）。\n\
    \n图 3-1\n\n社交业务标准中缺失了什么？\n\n两大类别如下：\n\n1.  **高阶标准** `–` 行为和领域驱动的业务导向型标准与 API。其中大部分在文献\
    \ [16] 的作者笔下并未得到充分阐述。\n2.  **基础标准** `–` 部分此前已提及，此处分为四个子类别：\n    1.  联系人\n    2.\
    \  活动/消息\n    3.  集成/互操作性\n    4.  安全性\n\n接着，你可以审视社交标准、框架和库的通信方式，它们通过以下方式实现：\n\
    \n*   消费信息\n*   分析信息\n*   转换信息\n*   提供信息\n\n消费信息的一个典型例子是在另一个应用（例如你的博客或公司网站）中显示你在常用社交网络上的状态。\n\
    \n另一个例子是包含一个地图服务，用于显示前往你主办或参与的活动地点的路线。\n\n分析信息涉及某种计算、排名或基准测试。通常需要消费多个信息源，以便获得更全面的图景。此类服务的一个例子是\
    \ Klout，其中跨多个社交网络的活动会影响你的整体排名。\n\n转换信息可以通过合并和组合多个数据流来实现，例如两个数字的简单相加，或者你的旅行预订网站根据汇率预测以本地货币计算的旅行费用。像\
    \ Google 翻译这样的翻译服务是转换信息的另一个更复杂的例子。\n\n最后但同样重要的是，提供信息是指你的应用向他人提供的任何服务（有时仅仅是内容），理想情况下是通过\
    \ API 实现，以便他人可以根据自身需求消费、分析或转换这些信息。\n\n审视企业社交网络、相关标准或产品的另一种方式如下：\n\n*   具有社交属性的独立产品或服务，可独立安装和使用。其中一些（例如采用\
    \ OpenSocial 的产品）旨在与其他产品实现互操作，理想情况下是跨多个供应商。\n*   嵌入在更大产品或套件中的社交功能或特性。一个经典例子是 Oracle\
    \ Fusion Middleware，它包含了继承自 BEA AquaLogic [13] 以及此后 Oracle 在社交领域多次收购 [23] 的社交功能。\n\
    *   专业型，通常是领域特定或垂直领域的社交网络，例如面向医疗保健、时尚、开发者、宠物主人或任何其他对特定社区有重要意义的兴趣领域。你在前一章中会记得一系列这样的网络。\n\
    \n由欧盟资助的社交媒体研究小组 OPENi [31] 试图以某种与上下文相关的方式对社交标准和 API 进行分组：\n\n*   **活动 API** 指社交、健康和行为的活动日志，反映在从社交、照片和视频分享到健康和基于位置服务的多种云服务中。本质上，它包含用户的所有社交和个人活动，并与设备的日志记录活动相关。相关类别：游戏、健康、基于位置的服务、音乐、照片、购物、社交、视频。\n\
    *   **广告与分析 API** 能够根据最终用户/客户与广告/营销内容的互动，收集、聚合和分析他们的需求、兴趣和偏好。\n*   **应用行为数据**。\n"
- fmt: '# Social Network Interactions


    Social network interactions toward enabling personalized advertising services
    with enhanced end user added value. Relevant categories: Analytics, advertising.


    # Location API


    `Location API` enabling location awareness through Check-ins, Direction, Events,
    Reviews, and Tips. It is a strong contextual API with location, which can be extracted
    by a GPS sensor and can be mapped on a map. Relevant categories: Mapping, Location-Based
    Services, Social, Music.


    # Media API


    `Media API` bringing together photo, music, and video sharing services with file
    transfer and syncing functionalities. It is related to the Gallery Application
    and the file system of a device. Relevant categories: File Transfer and Syncing,
    Location-Based Services, Music, News, Photo, Social, Video.


    # Products and Services API


    `Products and Services API` embracing payments and shopping services. This special
    case of commercialization-relevant objects requires a strong API with transactional
    capabilities and enhanced security. It is related to the store application of
    a phone. Relevant categories: Location-Based Services, Payments, Shopping.


    # Profiles API


    `Profiles API` extrapolating information about people based on Analytics, Advertising,
    Contacts, Gaming, Health, Location-Based Services, Messaging and Chat, Music,
    Social, etc. Typically, people can be represented in various ways, with multiple
    profiles. This API brings all that information together: avatars, profiles, contacts,
    and accounts, interrelating different profiles, in different services. It is directly
    related to the Agenda application of a smartphone. Some relevant categories: Analytics,
    Advertising, Contacts, Gaming, Health, Location-Based Services, Messaging and
    Chat, Music, Film, etc.


    # Search API


    `Search API`, in order to find and retrieve information from the cloud-based services.
    It brings together existing search engines with distributed search functionalities
    among various platforms and is related to the search functionality found in a
    desktop or phone OS.


    ![](images/600273_1_En_3_Chapter/600273_1_En_3_Fig2_HTML.jpg)


    A conceptual flow diagram of the standards of open I. It includes cloud-based
    functionality and content, followed by a cloud platform and API framework, and
    applications. The cloud-based functionality includes Paypal, Tech Crunch, Google,
    and others.


    **Figure 3-2** OPENi concept


    While OPENi has not made any of their API available on GitHub (as their site promised
    in 2013), its work caught the attention of, for example, W3C where OpenSocial
    [15] is now further discussed. So even without APIs of its own, OPENi and its
    concepts may help there. We’ll highlight OpenSocial in more detail when looking
    at Apache Shindig.


    Apart from dissecting and categorizing social media standards as before, there
    are other standards and protocols many APIs and social networks use:


    - Practically all social media services use `REST` as transmission protocol; some
    may use `SOAP`, but that’s rather uncommon.

    - Most of them transmit data in `JSON` format, some in `XML` or both.

    - Identification and authentication are almost always based on `OAuth 2` or `OpenID
    Connect`.


    Other basic standards and protocols not mentioned in Figure [3-1](#600273_1_En_3_Chapter.xhtml#Fig1)
    as the list does not aim for completion are as follows:


    - Open Graph Protocol (OGP) enables any web page to become a rich object in a
    social graph.

    - oEmbed, a format allowing an embedded representation of a URL on third-party
    sites.

    - PubSubHubbub, a simple, open, web-hook-based server-to-server pub-sub protocol.

    - Salmon, a standard protocol for comments and annotations to swim upstream (hence
    the name) to original update sources.


    We’ll take a closer look at security aspects like authorization, authentication,
    or digital identity, as well as privacy, data protection, and related standards,
    in the next chapter.


    ## Early Approaches


    The theories that we encountered in the introduction, such as Six Degrees of Separation
    [6], influenced later concepts like Friend of a Friend (FOAF) [8]. Aspects of
    both can be found in most “Friend” mechanisms used by social networks today.


    Rich Site Summary (RSS) [9] is an early example of a digital form of social media.
    Among the developers involved in the design and standardization of RSS was Reddit
    co-founder Aaron Swartz, who, before his untimely death in early 2013, had worked
    on a book about a Programmable Web [10], a rather down-to-earth, street-smart
    counterpart to the typically dry academic papers one finds in this field.


    Portable Contacts was created by Plaxo, a social address book service founded
    in 2002 by a group of entrepreneurs around Sean Parker. Parker had legal troubles
    one wouldn’t call so different from Aaron Swartz after his Napster music exchange
    portal was forced out of business, but fortunately talking for more than just
    one social media household name of today, he coped with it differently. The idea
    of a portable address book or set of “Digital Business Cards” was well intended
    and makes sense especially from a user’s point of view, but commercial interests
    of competing players, each of them greedy to share data even with those who own
    it, created many roadblocks to an otherwise good idea. Plaxo while still in business
    after all those years was not necessarily his greatest hit, and investors kicked
    him out in ways not so different from what had happened to co-founder Eduardo
    Saverin at Facebook when Parker got involved. Financially this made him rich and
    put muscle behind other services, for example, Spotify. Little coincidence, it
    seems quite a bit like Napster, but in a more commercially accepted way, also
    thanks to his fame and fortune after Facebook. Portable Contacts may have been
    a significant part of the social media movement but is no longer used. This is
    because many of the APIs used within larger companies are no longer compatible
    with Portable Contacts. The only remainder still in use is vCard, used by many
    companies and applications.'
