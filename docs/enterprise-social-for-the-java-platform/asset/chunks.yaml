  trans: '

    ### OAuth


    OAuth 是一种授权协议，用于将权限委托给应用程序，使其能够代表已授予权限的用户执行操作，而无需透露用户名或密码等登录凭证。


    该协议由 Twitter、Magnolia 和 Google 共同开发，并于 2010 年 4 月作为 IETF 标准（RFC 5849）注册。


    OAuth 2.0 版本使用起来更简单，但常因实现方式和变体过多而受到批评。OAuth 2 于 2012 年 10 月再次由 IETF 标准化为 RFC 6749
    和 6750。它不向后兼容 OAuth 1.0a。


    一些著名的采用者包括 Facebook、Amazon、Google、Salesforce.com 和 Microsoft。所有相关的社交媒体 API 都基于
    OAuth 1.0a 或 2.0。


    图 4-3 展示了 OAuth 流程中的参与者，该流程通常也被称为“OAuth 舞蹈”。


    ![](img/600273_1_En_4_Fig3_HTML.jpg)


    示意图描绘了 OAuth 流程中的参与者。分别是资源所有者、客户端和服务器。


    图 4-3


    OAuth 参与方


    *   资源所有者


    *   客户端


    *   服务器


    要使用 OAuth，必须在目标服务上创建一个应用程序，以便为消费者或资源所有者提供一个入口点，从而允许授权服务器在资源所有者（或最终用户）批准的情况下，向第三方客户端颁发访问令牌。然后，客户端使用该访问令牌访问资源服务器上托管的受保护资源。


    OAuth“舞蹈”包含三个主要步骤：


    *   创建 `–` 在 OAuth 社交媒体服务中创建一个应用程序。


    *   初始化 `–` 授权阶段，也称为 OAuth 舞蹈。舞蹈结束时，我们获得一个访问令牌（由公钥和密钥部分组成），用于下一步。


    *   签名 `–` 每个请求都使用访问令牌和标识已获授权 OAuth 应用程序的令牌进行签名。


    图 4-4 详细展示了 OAuth 1.0a 的步骤和认证流程。


    ![](img/600273_1_En_4_Fig4_HTML.jpg)


    示意图描绘了 OAuth 1.0 A 的步骤和认证流程。社交媒体服务与消费服务服务器之间的通信包含七个步骤。1，客户端向消费服务请求资源。2，消费服务向媒体等请求请求令牌。


    图 4-4


    OAuth 1.0a “舞蹈”


    图 4-5 展示了 OAuth 2 的相同流程。可以看到通信已被简化，并且所有交换现在都必须经过 SSL 加密。在 OAuth 1.0a 中，这是可选的，因此大多数实现案例都省略了它，这比
    OAuth 2 带来了更大的拦截或篡改风险。


    ![](img/600273_1_En_4_Fig5_HTML.jpg)


    示意图描绘了 OAuth 2 的步骤和认证流程。社交媒体服务与消费服务服务器之间的通信包含五个步骤。1，请求资源。2，重定向 URL。3，社交媒体返回访问令牌。4，消费服务请求访问令牌。


    图 4-5


    OAuth 2 “舞蹈”


    尽管 OAuth 是迄今为止社交媒体和 API 最流行的访问控制方式，但它并非真正的身份认证，而是“伪身份认证”，即应用程序专门请求一个有限访问权限的 OAuth
    令牌（“代客钥匙”），而不是实际的凭证（如“护照”）；见图 4-6 和 4-7。


    ![](img/600273_1_En_4_Fig7_HTML.jpg)


    Open ID 认证的示例通信。通信发生在两位使用公证人 Google 的女性之间。


    图 4-7


    OpenID 认证


    ![](img/600273_1_En_4_Fig6_HTML.jpg)


    使用 OAuth 进行伪身份认证的示例通信。此处应用程序请求一个有限访问权限的 OAuth 令牌，而非实际凭证。通信发生在两位使用公寓控制器 Twitter
    的女性之间。


    图 4-6


    使用 OAuth 的伪身份认证


    ### OpenID


    最初的 OpenID 协议由 Brad Fitzpatrick 于 2005 年在 Six Apart 公司创建，当时他已将自己的社交网络 LiveJournal
    卖给了这家博客软件公司。公司名称并非像看起来那样指代“六度分隔理论”[6]，而是指其联合创始人夫妇之间六天的年龄差。


    该协议的代号是 Yadis（“Yet another distributed identity system”的缩写），但后来在 David Lehn 的建议下正式命名为
    OpenID。Lehn 也曾考虑过一个类似的单点登录项目，但因时间不足，将域名“openid.net”[29] 捐赠给了 Six Apart。


    图 4-8 展示了 OpenID 流程及其参与者：


    ![](img/600273_1_En_4_Fig8_HTML.jpg)


    Open ID 的示意流程图。它包括用户与依赖方之间的四个过程。1，输入 Open ID。2，重定向到 IDP。3，认证同意共享个人资料。4，重定向到 RP。


    图 4-8


    OpenID 流程


    *   浏览器


    *   用户


    *   依赖方


    *   身份提供者


    尽管 OpenID 并未被 IETF 等组织标准化，但许多大型互联网、社交媒体和电信公司都采用了它，例如 AOL、Blogger、Flickr、法国电信、Google、Hyves、LiveJournal、Microsoft、Mixi、Myspace、Novell、Orange、Sears、Sun、意大利电信、Telefonica
    O2、环球音乐集团、Verisign、WordPress 和 Yahoo!。


    随着时间的推移，SourceForge、PayPal 和 Facebook 等其他公司也加入了 OpenID 基金会的支持者行列。然而，在过去的两三年里，OpenID
    的支持者数量持续下降。Facebook 退出了 OpenID，SourceForge 也停止提供 OpenID 登录（至少在 Dice.com 从 Geeknet
    接管之后），2013 年 9 月，社交登录 SaaS 提供商 Janrain 宣布其服务 MyOpenID.com 将于 2014 年 2 月 1 日关闭。


    那么这是否意味着 OpenID 已经消亡？其原始形式基本如此，但至少 Google 仍对其寄予厚望。一个奇怪的巧合是，OpenID 的初始创建者 Brad
    Fitzpatrick 现在在 Google 工作，这可能是当大多数其他前支持者放弃 OpenID 时，该公司仍对其保持忠诚的主要原因。然而，Google
    的新方案 OpenID Connect 与旧版 OpenID 的共同点并不多。它在原本成功的 OAuth 2、JSON 和 RESTful Web 服务组合之上，增加了改进的身份认证和身份管理功能。


    #### OpenID Connect


    OpenID Connect 由 OpenID 基金会于 2014 年 2 月底发布。当时，除了 Google，Microsoft、Salesforce.com
    和德国电信也采用了它。在 2014 年巴塞罗那世界移动通信大会上，GSMA 宣布了移动版本“Mobile Connect”的计划，这足以表明它将会持续一段时间。


    OpenID Connect 是可扩展的，支持可选功能，例如加密身份数据、发现 OpenID 提供者以及会话管理。


    ### JWT


    JSON Web Token (JWT) 是根据 RFC 7519 制定的开放标准，用于通过 JSON 字符串在不同应用程序或服务之间安全地传输信息。


    JWT 紧凑、可读性强，并使用身份提供者 (IdP) 的私钥或公钥对进行数字签名。因此，其他相关方可以验证令牌的完整性和真实性。


    JWT 的主要目的不是隐藏数据，而是确保其真实性。JWT 主要用于签名和编码，而非加密数据，尽管令牌也可以基于另一套标准（包括 JSON Web Signature
    (JWS) 和 JSON Web Encryption (JWE)）进行加密。


    JWT 是一种基于令牌的无状态身份认证机制。由于它基于客户端无状态会话，服务器不需要像数据库这样的持久化机制来保存会话信息。JSON Web Tokens
    遵循一个定义明确且广为人知的标准，该标准正成为保护服务的最常见令牌格式。

