    ## CoreMedia


    While CoreMedia does not implement the Java Portlet standard, it runs on Java
    and is commonly used for creating “Enterprise Portals.”


    ### History


    CoreMedia was founded in 1996 as a spin-off from the Multidisciplinary Engineering
    Science and Technology, a bit like Sun Microsystems founded at Stanford University.
    The company has its US HQ in Arlington, Virginia, and additional offices in Washington
    DC and London. In 2012, CoreMedia introduced Elastic Social, an extension module
    with social interaction capabilities like content moderation, user management,
    etc., mimicking social networks, but not integrating them.


    ### Social Media Hub


    Unlike Elastic Social, CoreMedia Social Media Hub allows the integration of various
    social networks into CoreMedia Studio. It shows a separate tab with different
    social media feeds and messages that are to be published. It is considered a CoreMedia
    Labs Blueprint or prototype that does not expose a stable API, but well, the Twitter
    API Client Library for Java is also in constant beta after all these years, even
    in version 2.x.


    ## Installation


    * From the CoreMedia application workspace, clone the repository [`https://github.com/CoreMedia/coremedia-social-hub.git`](https://github.com/CoreMedia/coremedia-social-hub.git)
    as a submodule of the extensions folder. Make sure to use the branch name that
    matches your workspace version:


    `git submodule add -b 1907.1` [`https://github.com/CoreMedia/coremedia-social-hub`](https://github.com/CoreMedia/coremedia-social-hub)
    `modules/extensions/coremedia-social-hub`


    * Use the extension tool in the root folder of the project to link the modules
    to your workspace:


    `mvn -f workspace-configuration/extensions com.coremedia.maven:extensions-maven-plugin:LATEST:sync
    -Denable=coremedia-social-hub`


    ## Configuration


    The configuration of Social Media Hub consists of different settings that can
    be applied to global or site-specific folders.


    * Global: `/Settings/Options/Settings/Social Hub/`

    * Site specific: `<SITE>/Options/Settings/Social Hub/`


    ### Global Settings


    The Settings document declares global settings for the Social Media Hub and must
    be located in the global settings folder. It defines credentials for a `bitly`
    account that is used for link shortening, and it defines additional CAE and document
    type model information that is required when media should be extracted from content
    for social media posts.


    ```

    data

    YOUR_LIVE_CAE

    ```


    ### Media Mapping


    The `mediaMapping` struct configures content types and property fields holding
    blob data that can be pushed to a social network. By default, the CoreMedia Blueprint
    document type model is configured for `CMMedia`, its data property containing
    a blob with asset data.


    ### Adapter Settings


    A Social Media Hub adapter configuration can be placed into the global or site-specific
    configuration folder.


    #### General Adapter Settings


    Every Social Media Hub adapter configuration has this structure:


    ```

    ADAPTER_ID

    ADAPTER_TYPE

    MY ADAPTER NAME

    true

    ...

    ...

    ```


    Every connection struct contains the properties shown in Table 7-2.


    **Table 7-2** Connection Struct Properties


    | Property | Description |

    | --- | --- |

    | `id` | The unique id of the adapter, ensure that no other adapter has the same
    |

    | `type` | The type of the adapter |

    | `displayName` | The name displayed as title in the adapter column |

    | `enabled` | If the adapter is enabled or disabled |'
