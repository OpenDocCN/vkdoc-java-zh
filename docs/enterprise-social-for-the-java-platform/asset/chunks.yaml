  trans: '

    ## 隐私


    “隐私”一词源于“私密”，具有拉丁语词源：“prīvātus”，字面意思是远离公共事务。


    虽然古罗马人或许能够将部分事务隐藏于公众和当时著名作家的视线之外，而且从事件实际发生到被记录并呈现在读者面前，至少需要数天，更多时候是数月甚至数年，但如今，这有时可能只是眨眼之间或点击一下鼠标的功夫。


    举报人爱德华·斯诺登的爆料是最广泛的，但绝非首例将隐私问题公之于众的事件，尤其是在社交网络或类似在线服务方面[37]。将来自不同来源和日常生活方方面面的数据整合成用户的数字画像和数字足迹的能力，在过去几十年里，主要是警察和情报机构工具（如“Dragnet”）的领域（虽然它以一种幽默的方式指代该系统，但并非特指那部电影）。


    不仅仅是斯诺登及其如今可供其俄罗斯东道主使用的技能，就清楚地表明西方国家及其机构并非唯一对这类信息感兴趣的一方。许多人试图控制；有些国家则干脆屏蔽或限制整个服务，如果社交网络不能像其本国（通常是美国、中国、俄罗斯或土耳其）的情报机构那样，向这些国家提供同等获取关键信息的权限。临时或永久屏蔽某些服务提供商的国家名单还在不断增加。如果所有权或托管服务因廉价劳动力（而非税收）原因而外包，那么某些服务也可能受到这些国家做法的影响。我们之前听说过的一个最著名的例子是
    LiveJournal，因为 OpenID 1.0 曾在那里诞生。2007 年 12 月，Six Apart 将其出售给了俄罗斯媒体集团 SUP Media。


    2009 年之后，其大部分生产工作也转移到了俄罗斯，硅谷的员工被解雇。尽管是私人所有，但 SUP Media 明显受到俄罗斯情报机构的控制和审查。例如，2007
    年，俄罗斯博主萨瓦·捷连季耶夫因在当地记者博客上发表评论，被指控煽动对内务部工作人员的社会仇恨，并被判处一年缓刑。更不用说最近的谋杀案，比如批评政府的鲍里斯·涅姆佐夫在莫斯科遇害，就在他宣布将披露俄罗斯介入乌克兰及
    2014 年占领克里米亚的信息仅数小时后。讽刺的是，即使在像俄罗斯这样审查最严格的国家之一，也曾有过一丝微弱的希望，即社交媒体即使不能带来真正的改革，至少可能有助于找到他谋杀案的线索[38]。此外，自
    2022 年初俄罗斯对乌克兰发动全面战争以来，许多俄罗斯士兵因在社交媒体或约会网站上暴露行踪而遭到乌克兰军队袭击。


    虽然“国家安全”以及试图在网上抓捕恐怖分子或重罪犯的论点被用来为全球范围内的大规模监控辩护，但批评政府的博主或记者如果身份暴露给他们所批评的人或机构，往往不仅面临隐私风险，更会危及生命。


    尽管欧洲托管服务提供商及其他互联网或移动公司所做的“数据留存”等努力意味着欧洲也并非完全隐私无忧，但与美国和世界许多其他地区相比，大多数欧盟国家，尤其是德国，拥有相当严格的隐私和数据保护法律。少数国家，如冰岛（目前不在欧盟，但在欧洲自由贸易联盟），以及许多斯堪的纳维亚国家，拥有甚至更强的数据保护法律。


    总部设在这些国家的社交网络，例如德国的 XING，以及德国电信和来自德国的其他互联网公司如 GMX/1&1，声称其数据可以免受美国国家安全局或其他间谍的直接访问。尽管如果存在针对用户犯下谋杀、恐怖主义、有组织犯罪或儿童色情等严重罪行的合理怀疑，这些公司会执行本地和国际调查，但它们都不太可能像美国国家安全局及其他国家机构在美国和其他地方那样，每天对每个用户进行大规模筛查。在没有搜查令访问记录或预先窃听通信的情况下，如果服务提供商及其服务器都真正位于欧洲，并且数据不通过国外连接发送，大多数欧洲用户应该感到安全。

    '
- fmt: '### Privacy Breaches


    These are the top ten social media sites losing most user data in privacy breaches:


    1.  Yahoo! – Over 3.5bn users were affected by data and privacy breaches at Yahoo,
    including the biggest single breach involving 3bn users in 2013.

    2.  Facebook – Over 2.1bn users were affected by more than eight data breaches
    since Facebook was founded in 2004, including the Cambridge Analytica scandal
    that was not exactly losing data but selling information about at least 87m users.
    Four breaches in 2019 alone pushed the number of users Facebook had data stolen
    or mishandled past 2bn.

    3.  LinkedIn – Most of the 1.1bn LinkedIn accounts affected by data breaches occurred
    in 2021 when details about 700m were sold on the dark web.

    4.  MySpace – Three breaches exposed the data of 719m MySpace users.

    5.  Sina Weibo – Data about 539m users of the Chinese social network, including
    172m phone numbers, were offered on the dark web in 2020.

    6.  Twitter – Twitter confirmed in June 2023 that a hacker had gained access to
    user details of 5.4m accounts. Bringing the total number of affected accounts
    to 370m, more than the active users of “X” nowadays.

    7.  Quora – 100m passwords and security questions were exposed by a 2018 hack.

    8.  Dailymotion – In 2016, a hacker stole over 85m email addresses, usernames,
    and passwords from the video sharing platform Dailymotion.

    9.  Tumblr – Also in 2016, Tumblr announced its security and user privacy were
    compromised three years earlier, in 2013, and account details of 65m users had
    been stolen.

    10. Instagram – At least 49m users of Meta-owned Instagram were exposed to a privacy
    breach in 2019, when an unprotected server was hacked.


    Little surprising, except Dailymotion, based in France, and Sina Weibo from China,
    all others are from the United States, where surveillance is omnipresent and privacy
    is often handled laxly. The fact that Twitter/X rival Threads by Meta had no full
    rollout to the EU yet is also related to data protection and privacy laws over
    here in Europe and likely past large-scale data breaches there as well.


    In addition to originating in the EU, services like XING also offer much finer-grained
    levels of access permissions and control by its users, where it is possible to
    sometimes restrict, for example, who can see each individual data item. Let’s
    say you want to show your name and day of birth, but not the year or your age
    to everyone visiting your profile, or allow only your friends to see your phone
    number; this and more can be controlled by systems like XING.


    This was also among the reasons why XING abandoned OpenSocial, because it cannot
    offer such fine-grained access control or in some cases won’t even provide any
    but instead show everything to everyone or at least all data to all of your friends.


    Most standards and protocols that succeeded OpenSocial via W3C or others used
    on the Fediverse are also not always a good fit for privacy, but there are a few,
    especially Matrix which put a great focus on security and privacy (remember from
    the previous chapter, Matrix was originally created at Amdocs in Israel) and is
    therefore trusted by NGOs as well as government agencies around the world.


    Diaspora is also strong about privacy, which is why some extremists like the Islamist
    group ISIS flocked there in 2014, after other larger social networks like Twitter
    had censored or suspended their accounts. Being a distributed service with high
    privacy standards, it was not trivial in the absence of a central point of control,
    monitoring or blocking content, but by August 2014, the Diaspora Foundation stated
    that via community moderation and word of mouth by the community, all of its larger
    pods had removed ISIS content and accounts.


    Elon Musk got a young man, Jack Sweeney, who (based on fandom or curiosity) tracked
    his flights on Twitter kicked off the network, just a few days after his Twitter
    takeover, claiming it would “dox” him (share information about someone, often
    the location). The young man moved to Mastodon among other social networks like
    Instagram. Of course the same Elon Musk regularly tweets from public appearances
    like the Qatar 2022 World Cup Final and similar occasions.


    Now X, formerly Twitter led by Elon Musk, plans to start storing users’ biometric
    data, as well as their employment and education history. There is no explanation
    why they want to store biometrics. `Passkey Authentication` (we’ll hear more about
    that later in this chapter, but PayPal, the company Elon Musk started his fortune
    with, as an early adopter) done properly won’t exchange biometric information.
    It only remains in the device. So a more likely reason could be that Musk plans
    something similar to Worldcoin by OpenAI’s co-founder Sam Altman, which involves
    biometric verification. The planned collection of employment and education history
    is said to be related to plans for “X Hire,” a sort of competitor to LinkedIn
    or XING under the “X” umbrella, but Musk being a close ally of Ron DeSantis and
    his “anti-woke” crusade, where teachers who teach “something wrong” are often
    discriminated or fired in Florida and elsewhere, puts a rather scary note behind
    this intention. So does Musk’s old PayPal buddy and co-founder Peter Thiel, who
    further grew his fortune at Facebook and played a dubious role in its Cambridge
    Analytica data breach scandal with his “data octopus” Palantir.


    The reported plans to remove the blocking feature from X also do not make many
    users comfortable, and it certainly would be a blow to privacy and safety in the
    network. While blocking an unwanted account hides everything you say and do from
    them, the mute feature just hides their posts from you, but they or the hackers
    and troll farms behind them can still see anything about your profile. From cyber-stalking
    to political and racial harassment, this would further open a door for bad actors
    on the network formerly known as Twitter.


    ## Authentication


    Like the word “Agora,” authentication is also derived from Greek terms. Originally
    from Greek “af̱thentikós,” it was a derivative of the noun “authentes,” “doer,
    master,” which was formed from “autos,” “self,” and the base -hentes, “worker,
    doer, being.”


    As *authentication*, we define the process of verifying someone’s identity. In
    other words, authentication is all about proving that you’re indeed the person
    or the system you claim to be. Ok, let’s make this rather professional definition
    a bit easier to understand by pulling our beloved fictitious characters: Alice
    and Bob. Suppose Alice wants to send a message to Bob. How could Bob be sure that
    he is indeed texting with Alice and not with someone who claims to be Alice? There
    are basically three different ways Bob could use to verify Alice’s identity: by
    something she knows, something she has, or something she is.


    Authenticating someone’s identity may be a result of one or more of three types
    of methods:


    1.  Something you know

    2.  Something you have

    3.  Something you are'
