    \nTwitter4J 是一个用于 Twitter API 的开源 Java 库。使用 Twitter4J，您可以轻松地：\n\n*   发布推文\n\n\
    *   获取用户的时间线\n\n*   获取用户的好友和关注者列表\n\n*   获取用户的收藏\n\n*   发送和接收私信\n\n*   搜索推文\n\n\
    *   使用 Twitter 流式 API\n\n历史\n其作者 Yusuke Yamamoto 曾在 2012 年为 Twitter 工作。在此期间，他曾短暂地代表\
    \ Twitter 参加 Social JSR 专家组。\n最后一个版本是 2022 年 10 月的 4.1.2。在 2018 年至 2022 年经历了一段较长的停滞后，它现在似乎再次得到了相当好的维护。然而，一个风险是\
    \ Twitter4J 目前仅支持 Twitter API v1.1，并且考虑到 Twitter 的整个 Elon Musk 局势，没有人能确定两者是否以及会持续多久。另一方面，随着\
    \ Twitter 的员工队伍缩减到仅剩 Musk 时代之前的一个影子，所有服务不太可能在短短几周内就全部迁移到 v2。而且，由于 Premium v1.1\
    \ API 能带来一些收入，它不太可能在一夜之间消失，而不给付费用户留出迁移到 v2 等效版本的时间。虽然 Gnip 在近十年前就被 Twitter 收购，但企业\
    \ API 直到最近才从 Gnip 2.0 重新命名，并且这个过程也可能因 Musk 解雇或迫使离开 Twitter 的所有有经验的开发者而受阻。\n\n\
