    \ Twitter4J.\n\nSign in with Twitter:\n\n```\nimport twitter4j.*;\nimport twitter4j.v1.Status;\n\
    class Main {\npublic static void main(String[] args) throws Exception {\nlong\
    \ userId = Long.parseLong(args[0]);\nString accessToken = loadAccessToken(userId);\n\
    String accessTokenSecret = loadAccessTokenSecret(userId);\nTwitter twitter = Twitter.newBuilder()\n\
    .oAuthConsumer(\"[consumer key]\", \"[consumer secret]\")\n.oAuthAccessToken(accessToken,\
    \ accessTokenSecret).build();\nStatus status = twitter.v1().tweets().updateStatus(args[1]);\n\
    System.out.println(\"Successfully updated the status to [%s].\".formatted(status.getText()));\n\
    System.exit(0);\n}\nprivate static String loadAccessToken(long userId) {\nreturn\
    \ \"[token]\"; // load from a persistent store\n}\nprivate static String loadAccessTokenSecret(long\
    \ userId) {\nreturn \"[token secret]\"; // load from a persistent store\n}\n}\n\
    ```\n\nWe will show more examples of how to use Twitter4J in Chapter [6](#600273_1_En_6_Chapter.xhtml)."
  trans: "\n#### Matrix\n\nMatrix 最初是作为 Amdocs（提供 CRM 及 OSS 或 BSS 等电信解决方案的供应商）内部用于安全、去中心化即时通讯的协议而开发的。其用例包括\
    \ IP 语音、视频聊天或安全的物联网。\n\nMatrix 的功能包括以下内容：\n\n*   创建和管理完全分布式的聊天室，无单点控制或故障风险\n*\
    \   在联邦服务器的全球开放网络中，实现聊天室状态的最终一致性、加密安全的同步\n*   在聊天室中发送和接收可扩展消息，并支持可选的端到端加密\n* \
    \  用户管理\n    *   邀请\n    *   加入\n    *   离开\n    *   踢出、封禁\n    *   由特权用户调解\n\
    *   聊天室状态管理\n    *   命名\n    *   别名\n    *   主题\n    *   封禁列表\n*   用户资料管理（头像、显示名称等）\n\
    *   管理用户账户（注册、登录、登出）\n*   使用第三方 ID（如电子邮件地址、电话号码、Facebook 账户或其他社交 ID）在 Matrix 上进行身份验证、识别和发现用户\n\
    *   身份联邦\n    *   发布用户公钥用于 PKI\n    *   将第三方 ID 映射到 Matrix ID\n\n![](img/600273_1_En_3_Fig6_HTML.jpg)\n\
    \nMatrix 网络架构图。它始于三个应用服务器，由四个家庭服务器和身份服务器相互连接。家庭服务器有客户端与每个服务器矩阵连接。下方提供了图例。\n\n\
    图 3-6\n\nMatrix 网络架构\n\n##### 采用情况\n\nMatrix 被全球许多政府机构广泛使用，尤其是在数据安全和隐私法规更严格的欧洲。\n\
    \nRocket Chat 自 4.7.0 版本起基于 Matrix。2021 年和 2022 年，FOSDEM 会议均使用 Matrix 进行托管。\n\n\
    Matrix 官方提供了以下平台的桥接：\n\n*   Gitter\n*   IRC\n*   Slack/Mattermost\n*   XMPP\n\n\
    以及由社区维护的其他几个桥接，用于：\n\n*   Apple iMessage\n*   Discord\n*   电子邮件\n*   Facebook\
    \ Messenger\n*   LinkedIn\n*   Mastodon\n*   Signal\n*   Skype\n*   SMS\n*   Telegram\n\
    *   微信\n*   WhatsApp\n\n## Java 框架与库\n\n遵循 Portlet API 或企业 Java 的各个部分等 Java 标准，已有多个用于社交媒体的\
    \ Java 框架和库。\n\n### Facebook Business SDK for Java\n\nFacebook (Meta) Business\
    \ SDK 是一个一站式解决方案，旨在帮助合作伙伴和客户实现其企业社交解决方案，允许合作伙伴使用多个 Facebook API（如 Pages、Business\
    \ Manager、Instagram 等）来满足其业务需求。常见功能包括以下内容：\n\n*   广告购买 `–` 为点击到 Messenger 广告创建广告系列并推广您的\
    \ Facebook 页面的指南\n*   Instagram 管理 `–` 在 Instagram 上发布照片和回复评论的指南\n*   大规模客户 onboarding\
    \ `–` 管理成百上千家小型企业并允许其在其网站或平台内购买广告的指南\n*   页面管理 `–` 创建页面、更新页面和管理其内容的指南\n\n以下是一个快速入门示例；请参阅\
    \ [`https://github.com/facebook/facebook-java-business-sdk`](https://github.com/facebook/facebook-java-business-sdk)。\n\
    \n```\nimport com.facebook.ads.sdk.APIContext;\nimport com.facebook.ads.sdk.AdAccount;\n\
    import com.facebook.ads.sdk.AdAccount.EnumCampaignStatus;\nimport com.facebook.ads.sdk.AdAccount.EnumCampaignObjective;\n\
    import com.facebook.ads.sdk.Campaign;\nimport com.facebook.ads.sdk.APIException;\n\
    public class QuickStartExample {\npublic static final String ACCESS_TOKEN = \"\
    [Your access token]\";\npublic static final Long ACCOUNT_ID = [Your account ID];\n\
    public static final String APP_SECRET = \"[Your app secret]\";\npublic static\
    \ final APIContext context = new APIContext(ACCESS_TOKEN, APP_SECRET);\npublic\
    \ static void main(String[] args) {\ntry {\nAdAccount account = new AdAccount(ACCOUNT_ID,\
    \ context);\nCampaign campaign = account.createCampaign()\n.setName(\"Java SDK\
    \ Test Campaign\")\n.setObjective(Campaign.EnumObjective.VALUE_LINK_CLICKS)\n\
    .setSpendCap(10000L)\n.setStatus(Campaign.EnumStatus.VALUE_PAUSED)\n.execute();\n\
    System.out.println(campaign.fetch());\n} catch (APIException e) {\ne.printStackTrace();\n\
    }\n}\n}\n```\n\n我们将在第 6 章中展示更多关于使用 Facebook/Meta Business SDK for Java 的示例。\n\n\
    自 2016 年 5 月首次预发布以来，Facebook 除了为 JavaScript (Node.js)、PHP、Ruby 或 Python 提供开发者支持外，还持续维护其\
    \ Java SDK。最新版本是 v16.0.1，于 2023 年 3 月发布，其发布周期与 Spring、JBoss/Red Hat 或 JDK 本身相差不大，每年发布两个主要版本。\n\
    \n### Twitter4J\n\nTwitter4J 是一个用于 Twitter API 的非官方 Java 库。使用 Twitter4J，您可以轻松地在\
    \ Java 应用程序中集成 Twitter 调用。\n\n其作者 Yusuke Yamamoto 曾在 2012 年为 Twitter 工作。\n\n在他任职期间，他曾短暂地代表\
    \ Twitter 参与 Social JSR Expert Group，本章稍后将在 JSR 357 部分对此进行更多介绍。\n\n它轻量级，且仍向后兼容\
    \ Java 8，因此也易于集成到移动或嵌入式应用程序中。毫不意外，从 J2ME 到 Android，几乎到处都有受其启发的或多或少官方的克隆、分支或项目。Twitter4J\
    \ 是一个 API 绑定库，因此主要用于消费信息。虽然扩展或您的应用程序可以分析或转换信息，但框架本身不提供超出 Twitter 本身的支持。根据 Hinchcliffe\
    \ 的分类，Twitter4J 主要可被视为一个基础 API，但也包含一些更高级别的方面。\n\n最后一个版本是 2022 年 10 月的 4.1.2。在\
    \ 2018 年至 2022 年经历了一段较长的停滞后，它现在似乎又得到了相当良好的维护。然而，一个风险是 Twitter4J 目前仅支持 Twitter\
    \ API v1.1，并且考虑到 Twitter 的整个 Elon Musk 事件，没有人确切知道两者是否以及会持续多久。另一方面，鉴于 Twitter 的员工队伍已缩减至\
    \ Musk 时代前的影子，所有服务不太可能在短短几周内就全部迁移到 v2。而且，由于 Premium v1.1 API 能带来一些收入，它也不太可能在未给予付费用户迁移到\
    \ v2 等效版本的时间的情况下，一夜之间消失。虽然 Gnip 在近十年前就被 Twitter 收购，但企业 API 直到最近才从 Gnip 2.0 重新命名，而这一过程也可能因\
    \ Musk 解雇或迫使离职的所有有经验的开发者而受阻。\n\n以下是一个如何使用 Twitter4J 登录的示例。\n\n使用 Twitter 登录：\n\
    \n```\nimport twitter4j.*;\nimport twitter4j.v1.Status;\nclass Main {\npublic\
    \ static void main(String[] args) throws Exception {\nlong userId = Long.parseLong(args[0]);\n\
    String accessToken = loadAccessToken(userId);\nString accessTokenSecret = loadAccessTokenSecret(userId);\n\
    Twitter twitter = Twitter.newBuilder()\n.oAuthConsumer(\"[consumer key]\", \"\
    [consumer secret]\")\n.oAuthAccessToken(accessToken, accessTokenSecret).build();\n\
    Status status = twitter.v1().tweets().updateStatus(args[1]);\nSystem.out.println(\"\
    Successfully updated the status to [%s].\".formatted(status.getText()));\nSystem.exit(0);\n\
    }\nprivate static String loadAccessToken(long userId) {\nreturn \"[token]\"; //\
    \ load from a persistent store\n}\nprivate static String loadAccessTokenSecret(long\
    \ userId) {\nreturn \"[token secret]\"; // load from a persistent store\n}\n}\n\
    ```\n\n我们将在第 6 章中展示更多关于如何使用 Twitter4J 的示例。\n"
- fmt: '### Twitter API Client Library for Java


    In August 2021, Twitter started its own API client library for Java [35]. Quite
    late, but supporting the Twitter v2 API only, it was meant to convince developers
    to migrate to the new API.


    Until 2021 Twitter had been a very active and welcoming JCP Executive Committee
    member, hosting more face-to-face meetings in its HQ than any other JCP member
    except maybe Sun and later Oracle. Twitter was also an active committer to OpenJDK
    and maintained its own version of the JDK optimized for performance and scalability.
    So it wasn’t so surprising Twitter also offered a Java client library although
    it came a bit late and the readme file in the GitHub repo still says “This SDK
    is in beta and is not ready for production”.


    While used by over 100 other GitHub projects and likely also some commercial users,
    there were only three contributors; all must have worked at Twitter, while only
    one committer in New Zealand still seems affiliated with the Twitter development
    team, although his contribution stopped in the very early stage of the library.
    Another one is also based in New Zealand and just left Twitter in February 2023,
    seemingly a Musk fall-out. He also created a fork of Twitter4J and probably studied
    it quite a bit, although there seem to be no PRs back to Twitter4J. Time will
    tell if he may also contribute to it. The last contribution came by the co-founder
    of a French electromobility startup named Recharger Mon Auto in Summer 2022, around
    the time of the Twitter takeover by Elon Musk. Although the committer has no direct
    work relationship with Tesla, the timing indicates he might be from Elon’s orbit
    and was asked to look at the code, or at least his company has such a vital interest
    in using Twitter APIs that he got involved.


    The last contribution was in October 2022 just when the Musk takeover was finalized,
    and there has not been any code commit since.


    Here’s a “Hello World” example for the Twitter API client library; see [`https://github.com/twitterdev/twitter-api-java-sdk`](https://github.com/twitterdev/twitter-api-java-sdk).


    ```

    package com.twitter.clientlib;

    import java.util.HashSet;

    import java.util.Set;

    import com.twitter.clientlib.TwitterCredentialsBearer;

    import com.twitter.clientlib.ApiException;

    import com.twitter.clientlib.api.TwitterApi;

    import com.twitter.clientlib.model.*;

    public class HelloWorld {

    public static void main(String[] args) {

    /**

    * Set the credentials for the required APIs.

    * The Java SDK supports TwitterCredentialsOAuth2 & TwitterCredentialsBearer.

    * Check the ''security'' tag of the required APIs in https://api.twitter.com/2/openapi.json
    in order

    * to use the right credential object.

    */

    TwitterApi apiInstance = new TwitterApi(new TwitterCredentialsBearer(System.getenv("TWITTER_BEARER_TOKEN")));

    Set tweetFields = new HashSet();

    tweetFields.add("author_id");

    tweetFields.add("id");

    tweetFields.add("created_at");

    try {

    // findTweetById

    Get2TweetsIdResponse result = apiInstance.tweets().findTweetById("20")

    .tweetFields(tweetFields)

    .execute();

    if(result.getErrors() != null && result.getErrors().size() > 0) {

    System.out.println("Error:");

    result.getErrors().forEach(e -> {

    System.out.println(e.toString());

    if (e instanceof ResourceUnauthorizedProblem) {

    System.out.println(((ResourceUnauthorizedProblem) e).getTitle() + " " + ((ResourceUnauthorizedProblem)
    e).getDetail());

    }

    });

    } else {

    System.out.println("findTweetById - Tweet Text: " + result.toString());

    }

    } catch (ApiException e) {

    System.err.println("Status code: " + e.getCode());

    System.err.println("Reason: " + e.getResponseBody());

    System.err.println("Response headers: " + e.getResponseHeaders());

    e.printStackTrace();

    }

    }

    }

    ```


    It remains to be seen if the API ever graduates from Beta, but given the main
    committer no longer works there and the general cost-saving efforts by Twitter
    under Musk, that seems unlikely.


    We will show more examples of how to use the Twitter API in Chapter [6](#600273_1_En_6_Chapter.xhtml).


    ### Apache Shindig


    Apache Shindig [19] was started relatively soon after the OpenSocial [15] efforts
    began. Mainly driven by Google and its Orkut at first for obvious reasons, other
    contributors, especially IBM, joined later. Due to the refocus of OpenSocial toward
    a “Social Intranet,” none of the sites or software claimed to use it are sure
    to still do so. In fact, Google Partuza points to a nonexisting page; hence, it
    was shut down like other examples we heard of earlier.


    An interesting approach by Google to develop OpenSocial applications inside a
    WYSIWYG environment of Eclipse IDE was OpenSocial Development Environment (OSDE);
    see [20]. It is safe to assume some were taken over by IBM and integrated into
    social editions of Eclipse-based development tools like RAD, etc. while the Google
    Code project was last updated in June 2010.


    OpenSocial API specifications linked to by Apache Shindig are no longer hosted
    even by OpenSocial supporter Atlassian; it seems the link points to an error page.
    Whether or not this means Atlassian also doesn’t believe in OpenSocial and won’t
    use it in newer versions of its products or it’s simply a process of reviving
    the whole OpenSocial movement on W3C remains to be seen. In the meantime, all
    versions of OpenSocial, especially 1.0 or 2.0, have been failures, and sites like
    Orkut at most used the 0.7 or 0.8 version. According to OpenSocial supporting
    Dachis Group [16], Shindig as manifestation represents a basic standard (2c).
    It has means of both providing and consuming information.


    On September 30, 2014, Google shut down Orkut, making Google+, which it also discontinued
    in 2019, the only remaining Google reference at the time. By 2015, still over
    20 social networks integrated OpenSocial, among them StudiVZ, MySpace, LinkedIn,
    or XING, but soon after, most social media providers have gradually abandoned
    it.


    Google had already stopped using Shindig in favor of its own Google Code projects.
    Most of them were also closed down and either point to the OpenSocial page now,
    or no longer exist. So on October 23, 2015, Apache Foundation retired the Shindig
    project. After that with the de facto Reference Implementation of OpenSocial discontinued,
    it also followed its fate.


    ### Efforts by Sun/Oracle


    Around 2008, Enterprise Social Mashup driver BEA Systems [13] had just been acquired
    by Oracle; Java creator Sun Microsystems did not quite guess a similar fate was
    also around the corner for it. Based on OpenSocial, Sun created a fork or derived
    project from Apache Shindig named SocialSite [21].


    SocialSite still counts 231 members on java.net, but the project is inactive.
    One of the last commits was by Kohsuke Kawaguchi, Sun’s creator of Hudson CI server
    and later Jenkins after he was hired by CloudBees.


    Following the acquisition of RightNow Technologies (see [23] end of 2011), maker
    of SaaS CRM software with social aspects – a move clearly targeting the likes
    of Salesforce.com or SAP `–` some of the former RightNow teams and products were
    incorporated into Oracle’s social enabled enterprise department.


    JavaOne 2012 featured a Social Day I also attended with speakers like Facebook’s
    Developer Relations Manager James Pearce. Oracle itself presented a “one man”
    project written by a freelance contractor still for RightNow under the code name
    “Project Sneaker,” which just after JavaOne 2012 was published as Oracle SocialLink
    [24].


    It never attracted followers outside Oracle and had to be considered deader than
    even SocialSite.'
