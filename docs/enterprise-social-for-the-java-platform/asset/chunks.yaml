- fmt: '# OpenSocial 的局限性


    与无缝整合 Google、Facebook、Twitter、LinkedIn、Microsoft 或 Yahoo! 等服务不同，`OpenSocial` 的唯一价值在于连接企业内部的
    HR、销售或财务部门，并为管理层提供所有部门及子公司的一些精巧的“社交”整合。这使得它对于那些希望，比如说，在 Facebook 时间线旁边看到 Twitter
    信息流的用户来说，几乎毫无用处。而这正是 `OpenSocial` 最初被创建的目的。


    `OpenSocial` 故事中的一个转折点是，人们试图基于 `OpenSocial` 及类似概念创建一个 W3C 标准。在语义网（Semantic Web）案例中已经艰难曲折的道路，在这里似乎几乎不可能，尤其是考虑到大多数参与者都偏爱他们的“围墙花园”，正如我们之前所发现的
    [14]。


    尽管 W3C 定义了一个名为语义网的有趣标准，听起来与 `OpenSocial` 的某些理念具有协同作用，但语义网迄今为止仅在生物学或医疗保健等少数孤立领域中使用。


    W3C 的工作节奏通常相当缓慢，类似于（甚至慢于）例如 `HTML5`。`HTML5` 从 2008 年开始，在候选状态（尽管许多供应商已经提出基于它的解决方案和产品）持续了一段时间。最终推荐标准于
    2014 年底发布，不久之后 W3C 社交网络工作组 [30] 启动，并一直活跃到 2018 年。与其他大多数 W3C 标准和工作组相比，这是一个相当短的持续时间。


    ## W3C 社交网络协议


    W3C 社交网络工作组的工作成果是一套社交网络协议 [63]，允许社交网络用户：


    *   创建、更新和删除社交内容

    *   通过订阅他人的内容与他们建立联系

    *   与他人发布的内容进行互动

    *   当他人与自己的内容互动时收到通知


    ### 规范


    以下是 W3C 社交网络工作组制定的规范：


    *   `ActivityPub` – 基于 JSON-LD 的 API，用于客户端到服务器的交互（如发布）和服务器到服务器的交互（如联邦）

    *   `ActivityStreams` – 用于表示活动（`Activity`）、参与者（`Actor`）、链接（`Link`）、对象（`Object`）和集合（`Collection`）的语法和词汇

    *   `Linked Data Notifications (LDN)` – 一种基于 JSON-LD 的交付协议

    *   `Micropub` – 一种基于表单编码和 JSON 的 API，用于客户端到服务器的交互（如发布）

    *   `Webmention` – 一种基于表单编码的交付协议

    *   `WebSub` – 一种用于订阅和更新交付的协议


    #### ActivityPub


    `ActivityPub` 是一种基于 `ActivityStreams 2.0` 数据格式和 `JSON-LD` 的去中心化社交网络协议。


    它提供了一个用于创建、更新和删除内容的客户端到服务器 API，以及一个用于发送通知和订阅内容的联邦式服务器到服务器 API。


    在 `ActivityPub` 中，用户被称为参与者（actor）。每个参与者都有：


    *   一个**收件箱（inbox）** – 用于接收他人消息

    *   一个**发件箱（outbox）** – 用于向他人发送消息


    以下是参与者 Alyssa 的记录示例：


    ```

    {"@context": "https://www.w3.org/ns/activitystreams",

    "type": "Person",

    "id": "https://social.example/alyssa/",

    "name": "Alyssa P. Hacker",

    "preferredUsername": "alyssa",

    "summary": "Lisp enthusiast hailing from MIT",

    "inbox": "https://social.example/alyssa/inbox/",

    "outbox": "https://social.example/alyssa/outbox/",

    "followers": "https://social.example/alyssa/followers/",

    "following": "https://social.example/alyssa/following/",

    "liked": "https://social.example/alyssa/liked/"}

    ```


    假设 Alyssa 想联系她的朋友 Ben。她最近借给他一本书，她想确保他能归还。以下是一个作为 `ActivityStreams` 对象的示例消息：


    ```

    {"@context": "https://www.w3.org/ns/activitystreams",

    "type": "Note",

    "to": ["https://chatty.example/ben/"],

    "attributedTo": "https://social.example/alyssa/",

    "content": "Say, did you finish reading that book I lent you?"}

    ```


    服务器识别出这是一个新创建的对象，并将其包装成一个 `Create` 活动：


    ```

    {"@context": "https://www.w3.org/ns/activitystreams",

    "type": "Create",

    "id": "https://social.example/alyssa/posts/a29a6843-9feb-4c74-a7f7-081b9c9201d3",

    "to": ["https://chatty.example/ben/"],

    "actor": "https://social.example/alyssa/",

    "object": {"type": "Note",

    "id": "https://social.example/alyssa/posts/49e2d03d-b53a-4c4c-a95c-94a6abf45a19",

    "attributedTo": "https://social.example/alyssa/",

    "to": ["https://chatty.example/ben/"],

    "content": "Say, did you finish reading that book I lent you?"}}

    ```


    Alyssa 的服务器查找 Ben 的 `ActivityStreams` 参与者对象，找到他的收件箱端点，并将她的对象 `POST` 到他的收件箱。


    ##### 采用情况


    在 `Mastodon` 于 `ActivityPub` 最终确定后不久便支持它之后，其他几个平台也纷纷效仿，包括 `Reddit`、`Goodreads`、`YouTube`
    或 `Tumblr`；`Flickr` 也在考虑增加支持。据报道，Twitter/X 的竞争对手 `Threads` 正在使用它或计划很快增加支持 [64]。


    ## Fediverse


    Fediverse（由“federation（联邦）”和“universe（宇宙）”组成）是一个“全球社交网络”，允许一个服务的用户使用像 `ActivityPub`
    这样的开放协议与其他服务的用户进行通信。Fediverse 中著名的社交网络有：


    *   `Mastodon`

    *   `Diaspora`

    *   `Friendica`

    *   `GNU social`

    *   `Hubzilla`

    *   `Lemmy`

    *   `PeerTube`

    *   `Pleroma`

    *   `Pixelfed`


    业内许多人认为，Elon Musk 对 Twitter 的收购及其向他的“X App”的转变，是开放社交网络和 Fediverse 的巨大催化剂。由 Jason
    Robinson 运营的统计网站 `The-Federation.info` 列出了 Fediverse 的总用户数接近 6.31 亿，其中过去六个月约有
    700 万活跃用户。他们的统计数据是自愿提供的，据称并不完整；例如，`Threads`/`Meta` 以及使用 Fediverse 标准和协议的其他几个大型商业参与者并未贡献这些统计数据；因此，实际数字可能超过
    10 亿，而当前活跃用户可能达到数千万。


    其他网站，如 Donald Trump 的 `Truth Social` [45]，基于开放标准，几乎就是 `Mastodon` 的翻版，但它们甚至不通过
    Fediverse 与其他站点交互，也不以透明的方式贡献用户统计数据。截至 2023 年 8 月，`Truth Social` 上的当前活跃用户据说约为 50
    万，而 `Mastodon` 的活跃用户接近 200 万。


    ![](images/600273_1_En_3_Chapter/600273_1_En_3_Fig5_HTML.jpg)


    一个网络图展示了 Fediverse 的概览。它包含十个应用程序：微博客、活动策划、宏博客、视频音频流媒体、发布、图片分享、内容聚合等。


    **图 3-5** Fediverse 概览


    ### 协议


    `The-Federation.info` 目前列出了 Fediverse 中使用的 15 种协议：


    *   `ActivityPub`

    *   `Bluesky`

    *   `DFRN`

    *   `Diaspora`

    *   `Gemini`

    *   `Inbound`

    *   `Matrix`

    *   `MicroPub`

    *   `NeoDb`

    *   `Outbound`

    *   `OStatus`

    *   `SMTP`

    *   `WebMention`

    *   `XMPP`

    *   `Zot`


    我们已经介绍了 `ActivityPub` 和 `OStatus`；除此之外，节点数量排名前五的协议中还有另外三种：


    *   `Diaspora`

    *   `DFRN`

    *   `Matrix`


    #### Diaspora


    `Diaspora` 拥有自己的去中心化社交网络协议。它开发于 2010 年，基于类似于电子邮件（具有收件箱和发件箱，也类似于 `ActivityPub`）的联邦架构，允许用户通过网络中多个独立节点（称为“pods”，与
    Kubernetes pods 没有直接关系，尽管一些 `Diaspora` pods 可能运行在 Kubernetes 集群中）共享数据并相互通信。除了
    `Diaspora` 本身，该协议也被 `Friendica` 或 `Hubzilla` 使用。


    #### DFRN


    `DFRN` 是一种分布式通信协议，提供隐私和安全通信，并为分布式配置文件和连接（如好友请求）提供基础。'
  raw: "Instead of a seamless Mashup of, for example Google, Facebook, Twitter, LinkedIn,\
    \ Microsoft, or Yahoo!, the only value of OpenSocial was connecting HR, Sales,\
    \ or Accounting with each other and providing the management with some nifty “Social”\
    \ Mashup of all departments and subsidiaries of a large enterprise, making it\
    \ practically useless to those who wish to see, let’s say, information from their\
    \ Twitter feed next to the Facebook timeline. The purpose, OpenSocial was originally\
    \ created for.\n\nA twist in the OpenSocial story was an effort to create a W3C\
    \ standard based on OpenSocial and similar concepts. What has been a hard and\
    \ thorny path in the case of the Semantic Web seems almost impossible here, especially\
    \ given a majority of players prefer their “walled garden” as we found earlier\
    \ [14].\n\nWhile W3C defined an interesting standard called semantic web, which\
    \ sounds synergetic to some of OpenSocial’s ideas, semantic web is so far used\
    \ only in a few isolated sectors like biology or healthcare.\n\nWork at W3C often\
    \ happens at a rather slow pace, similar to (or even slower than) HTML5, for example,\
    \ which, starting in 2008, was in candidate state (despite many vendors already\
    \ proposing solutions and products being based on it) for some time. A final recommendation\
    \ was published in late 2014, shortly after the W3C Social Web Working Group [30]\
    \ started, remaining active till 2018, which, compared to most other W3C standards\
    \ and working groups, was a fairly short duration.\n\n### W3C Social Web Protocols\n\
    \nThe outcome of the W3C Social Web Working Group was a set of Social Web Protocols\
    \ [63], allowing users of social networks to\n\n*   Create, update, and delete\
    \ social content\n\n*   Connect with others by subscribing to their content\n\n\
    *   Interact with other people’s content\n\n*   Be notified when others interact\
    \ with their content\n\n#### Specifications\n\nThese are the specifications produced\
    \ by the W3C Social Web Working Group:\n\n*   ActivityPub `–` JSON-LD-based APIs\
    \ for client-to-server interactions like publishing and server-to-server interactions\
    \ like federation\n\n*   ActivityStreams `–` The syntax and vocabulary to represent\n\
    \    *   Activity\n\n    *   Actor\n\n    *   Link\n\n    *   Object\n\n    *\
    \   Collection\n\n*   Linked Data Notifications (LDN) `–` A JSON-LD-based protocol\
    \ for delivery\n\n*   Micropub `–` A form-encoding and JSON-based API for client-to-server\
    \ interactions like publishing\n\n*   Webmention `–` A form-encoding-based protocol\
    \ for delivery\n\n*   WebSub `–` A protocol for subscriptions and delivery of\
    \ updates to them\n\n##### ActivityPub\n\nActivityPub is a decentralized social\
    \ networking protocol based on the ActivityStreams 2.0 data format and JSON-LD.\n\
    \nIt provides a client-to-server API for creating, updating, and deleting content\
    \ and a federated server-to-server API to deliver notifications and subscribe\
    \ to content.\n\nIn ActivityPub, users are called actors. Every actor has\n\n\
    *   An **inbox** `–` To get messages by others\n\n*   An **outbox** `–` To send\
    \ messages to others\n\nHere’s an example for the record of actor Alyssa:\n\n\
    ```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\",\n\"type\": \"Person\"\
    ,\n\"id\": \"https://social.example/alyssa/\",\n\"name\": \"Alyssa P. Hacker\"\
    ,\n\"preferredUsername\": \"alyssa\",\n\"summary\": \"Lisp enthusiast hailing\
    \ from MIT\",\n\"inbox\": \"https://social.example/alyssa/inbox/\",\n\"outbox\"\
    : \"https://social.example/alyssa/outbox/\",\n\"followers\": \"https://social.example/alyssa/followers/\"\
    ,\n\"following\": \"https://social.example/alyssa/following/\",\n\"liked\": \"\
    https://social.example/alyssa/liked/\"}\n```\n\nImagine Alyssa wants to catch\
    \ up with her friend, Ben. She lent him a book recently, and she wants to make\
    \ sure he returns it. Here’s the example message as an ActivityStreams object:\n\
    \n```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\",\n\"type\": \"\
    Note\",\n\"to\": [\"https://chatty.example/ben/\"],\n\"attributedTo\": \"https://social.example/alyssa/\"\
    ,\n\"content\": \"Say, did you finish reading that book I lent you?\"}\n```\n\n\
    The server recognizes this is an object newly created and wraps it into a `Create`\
    \ activity:\n\n```\n{\"@context\": \"https://www.w3.org/ns/activitystreams\",\n\
    \"type\": \"Create\",\n\"id\": \"https://social.example/alyssa/posts/a29a6843-9feb-4c74-a7f7-081b9c9201d3\"\
    ,\n\"to\": [\"https://chatty.example/ben/\"],\n\"actor\": \"https://social.example/alyssa/\"\
    ,\n\"object\": {\"type\": \"Note\",\n\"id\": \"https://social.example/alyssa/posts/49e2d03d-b53a-4c4c-a95c-94a6abf45a19\"\
    ,\n\"attributedTo\": \"https://social.example/alyssa/\",\n\"to\": [\"https://chatty.example/ben/\"\
    ],\n\"content\": \"Say, did you finish reading that book I lent you?\"}}\n```\n\
    \nAlyssa’s server looks up Ben’s ActivityStreams actor object, finds his inbox\
    \ endpoint, and POSTs her object to his inbox.\n\n###### Adoption\n\nAfter Mastodon\
    \ already supported ActivityPub soon after it was finalized, several others followed,\
    \ including Reddit, Goodreads, YouTube, or Tumblr; Flickr considers adding support\
    \ as well. And Twitter/X rival Threads reportedly uses it or plans to add support\
    \ soon [64].\n\n## Fediverse\n\nThe Fediverse (composed of \"federation\" and\
    \ \"universe\") is a “global social network,” allowing users of one service to\
    \ communicate with users of other services using open protocols like ActivityPub.\
    \ Notable social networks in the Fediverse are\n\n*   Mastodon\n\n*   Diaspora\n\
    \n*   Friendica\n\n*   GNU social\n\n*   Hubzilla\n\n*   Lemmy\n\n*   PeerTube\n\
    \n*   Pleroma\n\n*   Pixelfed\n\nMany in the industry consider Elon Musk’s Twitter\
    \ takeover and transformation into his “X App” a huge catalyst for open social\
    \ networks and the Fediverse. A statistics website called The-Federation.info,\
    \ operated by Jason Robinson, lists the total users of the Fediverse as nearly\
    \ 631 million, with roughly 7 million of them active over the last six months.\
