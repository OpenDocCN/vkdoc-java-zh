  trans: '

    #### 视频分享


    YouTube 彻底改变了我们观看和创作视频的方式。它几乎能让每个拥有移动设备的人成为摄影指导，并催生了一种特殊类型的网红：YouTuber，其中许多人赚取的收入堪比电影明星。


    以下是 11 个重要的视频分享网站：


    *   YouTube


    *   Vimeo


    *   TikTok


    *   Dailymotion


    *   Metacafe


    *   Instagram IGTV


    *   Facebook Watch


    *   快手


    *   Periscope


    *   Utreon


    *   TED


    ##### 视频流媒体


    以下是十个重要的视频流媒体网站：


    *   Amazon Prime


    *   Apple TV+


    *   discovery+


    *   Disney+


    *   Google Play 视频


    *   Netflix


    *   Paramount+


    *   Twitch


    *   YouTube


    *   WOW


    其中许多是视频流媒体频道，内容由工作室而非用户自己发布。


    即使这些平台大多也提供一定程度的社交互动，从简单的点赞（或点踩）按钮，到评论，甚至是像 Amazon Watch Parties 或 Disney+ GroupWatch
    功能这样的社交聚会。


    其他平台，尤其是 YouTube 或 Twitch，是社交流媒体网站，社区成员可以在其中分享直播流，通常是电脑游戏、电子竞技、教育、音乐会或类似的直播活动。“YouTuber”和
    Twitch“主播”有时都能名利双收，前提是他们的内容能吸引数百万粉丝，这也使得一些顶级内容创作者的年收入达到六到七位数。


    ### 博客与写作


    以下是适合博主和作家的最佳社交媒体平台：


    *   Tumblr


    *   Facebook


    *   Pinterest


    *   Medium


    *   Instagram


    *   Goodreads


    ### 讨论论坛


    虽然在 Twitter（尤其是在埃隆·马斯克接管并向右翼阴谋论敞开大门之后）或 Facebook 上可能会有激烈的讨论，但像 Reddit 和 Quora
    这样的讨论网站是专门为引发对话而设计的。


    以下是流行的社交媒体讨论论坛：


    *   Reddit


    *   Facebook


    *   Quora


    *   LinkedIn


    *   Stack Overflow


    *   Digital Point


    *   Webmaster Sun


    ### 评论网站


    十大评论网站如表 2-1 所示。


    表 2-1


    最佳评论网站


    | 网站 | 类别 | 美国月均访问量 | 美国流量占比（总计） |

    | --- | --- | --- | --- |

    | Google 商家资料 | 任何商家 | 1.5803 亿 | 19.6% |

    | Amazon | 电子商务 | 8544 万 | 63.6% |

    | Facebook | 任何商家 | 8557 万 | 23.1% |

    | Yelp | 任何商家 | 4047 万 | 87.5% |

    | Tripadvisor | 餐饮、旅游 | 2827 万 | 50.4% |

    | BBB（商业改进局） | 任何商家 | 615 万 | 72.1% |

    | 黄页 | 任何商家 | 1050 万 | 70.0% |

    | Manta | 任何商家 | 648 万 | 67.0% |

    | Angi | 服务类 | 544 万 | 72.4% |

    | Foursquare | 主要是商店和餐馆 | 367 万 | 19.3% |


    ### VR/元宇宙


    Facebook 更名为 Meta，押注于尚未完全显现的元宇宙。除了 Meta，苹果（曾多次用 iPod、iPhone 或 Apple Watch 等产品颠覆成熟市场）也将其
    Vision Pro 头显投入了竞争。


    以下是顶级的社交 VR 应用：


    *   AltspaceVR


    *   BeanVR


    *   Bigscreen


    *   Couch


    *   Horizon Venues


    *   Horizon Worlds


    *   Rec Room


    *   Sansar


    *   Second Life


    *   Sensorium Galaxy


    *   VRChat


    *   VRzone


    *   vTime XR


    ### 垂直社交网络


    垂直社交网络是专注于特定社区（如开发者、游戏玩家、投资者、邻居、园艺或书籍爱好者）兴趣的专业化社交媒体平台。


    #### 开发


    以下是五大社交开发者平台：


    *   GitHub


    *   GitLab


    *   Bitbucket


    *   Launchpad


    *   SourceForge


    #### 金融


    有几个专注于金融和投资的社交网络，包括以下平台：


    *   eToro – 一个社交交易和投资平台，允许用户交易和投资各种金融工具，如股票、货币和大宗商品。它还允许用户关注和复制平台上其他成功投资者的交易。


    *   Stocktwits – 一个供投资者和交易者分享和讨论市场见解、新闻和分析的社交网络。这是一个社区驱动的平台，允许用户实时分享他们对个股和其他金融工具的看法。


    *   Seeking Alpha – 一个面向投资者和交易者的社交媒体平台，提供关于股票和其他投资的实时财经新闻、分析和研究。它还允许用户与社区分享他们的见解和观点。


    这些社交网络对于投资者和交易者来说是宝贵的资源，可以帮助他们了解金融市场的最新新闻、分析和见解，并与志同道合的专业人士或业余投资者建立联系和互动。


    #### 健康与健身


    有许多专门针对健康和健身的社交网络和门户网站。虽然许多健身、健康或营养领域的网红只是使用 Facebook、Twitter 或 Instagram 来炫耀腹肌，但越来越多的人使用可穿戴设备和类似的智能设备来量化各种健康状况，从睡眠模式到体重再到心率。在这些“量化自我”的人群中，许多人选择通过社交网络公开分享他们的数据。


    许多智能手表制造商都有自己专有的应用程序，但平台提供商也提供健身和智能设备门户网站，例如：


    *   Apple 健康


    *   Google 健身


    *   Fitbit（现也属于 Google）


    *   Strava


    *   阿迪达斯（Runtastic）


    *   MyFitnessPal


    ##### Apple 健康


    Apple 健康主要是一款 iOS 移动应用，也是 Apple Watch 的配套应用。该应用增加了对 20 种数据类型（从静息心率到睡眠或有氧适能）的趋势分析，使用户能够了解特定指标的变化趋势。


    在获得用户许可后（目前主要在美国），用户还可以与他们的医生或保险公司共享选定的健康信息。


    ![](img/600273_1_En_2_Fig1_HTML.jpg)


    一个移动应用 Apple 健康的截图。它包含按日、周、月和年显示的心率。以条形图形式展示了 12 月的心率，包含最小值和最大值记录。“添加到个人收藏”开关已打开。


    图 2-1


    Apple 健康：心率


    自 watchOS 5 起，新增了一项 Apple Watch 活动功能，旨在激励用户锻炼并与朋友竞争。他们可以从自己的 Apple Watch 向任何朋友发起为期七天的竞赛，看谁能更快地填满活动圆环，见图
    2-2。


    ![](img/600273_1_En_2_Fig2_HTML.jpg)


    一个标题为“竞赛”的移动截图。包含 Jane（3281 分）和我（2487 分）。下方区域显示了 Brian、Chris、Christian、Jane 和我的记录，包含百分比和卡路里比例。底部的“共享”选项被高亮显示。


    图 2-2


    Apple 健康：竞赛

