  trans: '

    ### Java 版 Twitter API 客户端库


    2021 年 8 月，Twitter 推出了自己的 Java 版 API 客户端库 [35]。虽然推出时间较晚，且仅支持 Twitter v2 API，但其目的是说服开发者迁移到新的
    API。


    直到 2021 年，Twitter 一直是 JCP 执行委员会中非常活跃且受欢迎的成员，在其总部举办的面对面会议数量，除 Sun 和后来的 Oracle 外，超过了任何其他
    JCP 成员。Twitter 也是 OpenJDK 的活跃提交者，并维护着针对性能和可扩展性优化的自有 JDK 版本。因此，Twitter 提供 Java
    客户端库并不令人意外，尽管它来得有点晚，而且 GitHub 仓库中的 readme 文件仍然写着“此 SDK 处于测试阶段，尚未准备好用于生产环境”。


    虽然被超过 100 个其他 GitHub 项目以及可能一些商业用户使用，但该项目只有三位贡献者；他们应该都曾在 Twitter 工作，而只有一位在新西兰的提交者似乎仍与
    Twitter 开发团队有关联，尽管他的贡献在库的非常早期阶段就停止了。另一位同样在新西兰，于 2023 年 2 月刚刚离开 Twitter，似乎是马斯克收购后的离职人员。他还创建了
    Twitter4J 的一个分支，并可能对其进行了相当深入的研究，尽管似乎没有向 Twitter4J 提交过拉取请求。他未来是否会为其做出贡献，时间会给出答案。最后一次贡献来自一家名为
    Recharger Mon Auto 的法国电动汽车初创公司的联合创始人，时间在 2022 年夏季，正值埃隆·马斯克收购 Twitter 前后。尽管该提交者与特斯拉没有直接的工作关系，但时间点表明他可能来自马斯克的圈子，并被要求查看代码，或者至少他的公司对使用
    Twitter API 有如此至关重要的兴趣，以至于他参与其中。


    最后一次提交是在 2022 年 10 月，也就是马斯克收购完成之时，此后便再无任何代码提交。


    以下是 Twitter API 客户端库的一个“Hello World”示例；请参阅 [`https://github.com/twitterdev/twitter-api-java-sdk`](https://github.com/twitterdev/twitter-api-java-sdk)。


    ```

    package com.twitter.clientlib;

    import java.util.HashSet;

    import java.util.Set;

    import com.twitter.clientlib.TwitterCredentialsBearer;

    import com.twitter.clientlib.ApiException;

    import com.twitter.clientlib.api.TwitterApi;

    import com.twitter.clientlib.model.*;

    public class HelloWorld {

    public static void main(String[] args) {

    /**

    * Set the credentials for the required APIs.

    * The Java SDK supports TwitterCredentialsOAuth2 & TwitterCredentialsBearer.

    * Check the ''security'' tag of the required APIs in https://api.twitter.com/2/openapi.json
    in order

    * to use the right credential object.

    */

    TwitterApi apiInstance = new TwitterApi(new TwitterCredentialsBearer(System.getenv("TWITTER_BEARER_TOKEN")));

    Set tweetFields = new HashSet();

    tweetFields.add("author_id");

    tweetFields.add("id");

    tweetFields.add("created_at");

    try {

    // findTweetById

    Get2TweetsIdResponse result = apiInstance.tweets().findTweetById("20")

    .tweetFields(tweetFields)

    .execute();

    if(result.getErrors() != null && result.getErrors().size() > 0) {

    System.out.println("Error:");

    result.getErrors().forEach(e -> {

    System.out.println(e.toString());

    if (e instanceof ResourceUnauthorizedProblem) {

    System.out.println(((ResourceUnauthorizedProblem) e).getTitle() + " " + ((ResourceUnauthorizedProblem)
    e).getDetail());

    }

    });

    } else {

    System.out.println("findTweetById - Tweet Text: " + result.toString());

    }

    } catch (ApiException e) {

    System.err.println("Status code: " + e.getCode());

    System.err.println("Reason: " + e.getResponseBody());

    System.err.println("Response headers: " + e.getResponseHeaders());

    e.printStackTrace();

    }

    }

    }

    ```


    该 API 能否最终脱离测试阶段仍有待观察，但考虑到主要提交者已不再任职，以及马斯克领导下 Twitter 普遍的成本削减努力，这似乎不太可能。


    我们将在第 6 章展示更多如何使用 Twitter API 的示例。


    ### Apache Shindig


    Apache Shindig [19] 在 OpenSocial [15] 工作启动后不久便开始了。起初主要由 Google 及其 Orkut 推动，原因显而易见，其他贡献者，尤其是
    IBM，后来也加入了。由于 OpenSocial 重新聚焦于“社交内联网”，声称使用它的网站或软件是否仍在继续使用已无法确定。事实上，Google Partuza
    指向了一个不存在的页面；因此，它像我们之前听说的其他例子一样被关闭了。


    Google 在 Eclipse IDE 的所见即所得环境中开发 OpenSocial 应用程序的一个有趣方法是 OpenSocial 开发环境（OSDE）；参见
    [20]。可以合理地假设，其中一些被 IBM 接管并集成到基于 Eclipse 的开发工具（如 RAD 等）的社交版本中，而 Google Code 项目最后更新于
    2010 年 6 月。


    Apache Shindig 链接到的 OpenSocial API 规范甚至不再由 OpenSocial 支持者 Atlassian 托管；该链接似乎指向一个错误页面。这是否意味着
    Atlassian 也不再相信 OpenSocial，并且不会在其新版本产品中使用它，或者仅仅是 W3C 重振整个 OpenSocial 运动过程中的一个环节，仍有待观察。与此同时，所有版本的
    OpenSocial，尤其是 1.0 或 2.0 版本，都已失败告终，像 Orkut 这样的网站最多使用了 0.7 或 0.8 版本。根据支持 OpenSocial
    的 Dachis Group [16] 的说法，Shindig 作为一种体现，代表了一个基本标准 (2c)。它兼具提供和消费信息的能力。


    2014 年 9 月 30 日，Google 关闭了 Orkut，使得 Google+（其本身也于 2019 年关闭）成为当时仅存的 Google 相关参考。到
    2015 年，仍有超过 20 个社交网络集成了 OpenSocial，其中包括 StudiVZ、MySpace、LinkedIn 或 XING，但不久之后，大多数社交媒体提供商逐渐放弃了它。


    Google 已经停止使用 Shindig，转而使用自己的 Google Code 项目。这些项目大多也已关闭，要么现在指向 OpenSocial 页面，要么不复存在。因此，2015
    年 10 月 23 日，Apache 基金会退役了 Shindig 项目。此后，随着 OpenSocial 事实上的参考实现被终止，它也步其后尘。


    ### Sun/Oracle 的努力


    大约在 2008 年，企业社交混搭驱动公司 BEA Systems [13] 刚被 Oracle 收购；Java 的创造者 Sun Microsystems
    并未预料到类似的命运也即将降临到自己头上。基于 OpenSocial，Sun 从 Apache Shindig 创建了一个分支或衍生项目，名为 SocialSite
    [21]。


    SocialSite 在 java.net 上仍有 231 名成员，但该项目已不活跃。最后一次提交之一是由 Kohsuke Kawaguchi 完成的，他是
    Sun 的 Hudson CI 服务器创建者，后来在被 CloudBees 聘用后创建了 Jenkins。


    在收购 RightNow Technologies（参见 [23]，2011 年底）之后——这家公司是带有社交功能的 SaaS CRM 软件制造商，此举明显针对
    Salesforce.com 或 SAP 等公司——一些前 RightNow 团队和产品被并入 Oracle 的社交企业部门。


    2012 年的 JavaOne 大会设立了一个社交日，我也参加了，演讲者包括 Facebook 的开发者关系经理 James Pearce。Oracle 自己展示了一个“单人”项目，由一位仍为
    RightNow 工作的自由承包商编写，代号为“Project Sneaker”，该项目在 2012 年 JavaOne 大会后不久作为 Oracle SocialLink
    [24] 发布。


    它从未在 Oracle 之外吸引到追随者，并且不得不被认为比 SocialSite 还要沉寂。

