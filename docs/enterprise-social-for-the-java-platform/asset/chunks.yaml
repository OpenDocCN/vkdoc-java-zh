- fmt: '# Video Sharing


    YouTube revolutionized the way we watch and create videos. It could turn almost
    everyone with a mobile device into a director of photography and helped create
    a special kind of influencers: YouTubers, many of them earning money comparable
    to movie stars.


    These are 11 important video sharing sites:


    - YouTube

    - Vimeo

    - TikTok

    - Dailymotion

    - Metacafe

    - Instagram IGTV

    - Facebook Watch

    - Kuaishou

    - Periscope

    - Utreon

    - TED


    ## Video Streaming


    These are ten important video streaming sites:


    - Amazon Prime

    - Apple TV+

    - discovery+

    - Disney+

    - Google Play Video

    - Netflix

    - Paramount+

    - Twitch

    - YouTube

    - WOW


    Many are video streaming channels, where studios rather than users themselves
    publish the content.


    Even those mostly offer some degree of social interaction, from simple like (or
    dislike) buttons to reviews or even social gatherings like Amazon Watch Parties
    or the Disney+ GroupWatch feature.


    Others, especially YouTube or Twitch, are social streaming sites where members
    of the community share live streams, often computer gaming, esports, education,
    concerts, or similar live events. Both “YouTubers” and Twitch “Streamers” can
    sometimes reach fame and fortune, if their content attracts millions of followers,
    which also leads to six- or seven-digit annual income for some of the top content
    creators.


    # Blogging and Writing


    These are the best social media platforms for bloggers and writers:


    - Tumblr

    - Facebook

    - Pinterest

    - Medium

    - Instagram

    - Goodreads


    # Discussion Forums


    While there can be heated discussions on Twitter (even more, after Elon Musk took
    it over and opened the floodgates to right-wing conspiracy theories) or Facebook,
    discussion sites like Reddit and Quora are specifically designed to spark a conversation.


    These are popular social media discussion forums:


    - Reddit

    - Facebook

    - Quora

    - LinkedIn

    - Stack Overflow

    - Digital Point

    - Webmaster Sun


    # Review Sites


    The top ten review sites are shown in Table [2-1](#600273_1_En_2_Chapter.xhtml#Tab1).


    **Table 2-1** Best Review Sites


    | Site | Category | Avg. Monthly US Traffic | % US Traffic (Total) |

    | --- | --- | --- | --- |

    | Google Business Profile | Any business | 158.03 million | 19.6% |

    | Amazon | E-commerce | 85.44 million | 63.6% |

    | Facebook | Any business | 85.57 million | 23.1% |

    | Yelp | Any business | 40.47 million | 87.5% |

    | Tripadvisor | Food, restaurant, travel | 28.27 million | 50.4% |

    | BBB (Better Business Bureau) | Any business | 6.15 million | 72.1% |

    | Yellow Pages | Any business | 10.5 million | 70.0% |

    | Manta | Any business | 6.48 million | 67.0% |

    | Angi | Services | 5.44 million | 72.4% |

    | Foursquare | Mostly shops and restaurants | 3.67 million | 19.3% |


    # VR/Metaverse


    Facebook changed its name to Meta in a bet on the Metaverse that has to fully
    manifest. Besides Meta, Apple, which often managed to disrupt established markets
    with products like the iPod, iPhone, or Apple Watch, also threw its Vision Pro
    headset into the ring.


    These are the top social VR apps:


    - AltspaceVR

    - BeanVR

    - Bigscreen

    - Couch

    - Horizon Venues

    - Horizon Worlds

    - Rec Room

    - Sansar

    - Second Life

    - Sensorium Galaxy

    - VRChat

    - VRzone

    - vTime XR


    # Vertical Social Networks


    Vertical social networks are specialized social media platforms dedicated to the
    interests of particular communities, like developers, gamers, investors, neighbors,
    and garden or book lovers.


    ## Development


    These are the top five social developer platforms:


    - GitHub

    - GitLab

    - Bitbucket

    - Launchpad

    - SourceForge


    ## Finance


    There are several social networks for finance and investment, including the following:


    - **eToro** – A social trading and investment platform that allows users to trade
    and invest in various financial instruments, such as stocks, currencies, and commodities.
    It also allows users to follow and copy the trades of other successful investors
    on the platform.

    - **Stocktwits** – A social network for investors and traders to share and discuss
    market insights, news, and analysis. It is a community-driven platform that allows
    users to share their thoughts on individual stocks and other financial instruments
    in real time.

    - **Seeking Alpha** – A social media platform for investors and traders, providing
    real-time financial news, analysis, and research on stocks and other investments.
    It also allows users to share their insights and opinions with the community.


    These social networks can be valuable resources for investors and traders to stay
    up to date with the latest news, analysis, and insights on the financial markets,
    as well as to connect and engage with other like-minded professionals or hobby
    investors.


    ## Health and Fitness


    There are many social networks and portals dedicated to health and fitness. While
    many fitness, health, or nutrition influencers just use Facebook, Twitter, or
    Instagram to flash their abs, an increasing number of people use wearables and
    similar smart devices to quantify various health conditions, ranging from sleep
    patterns, to body weight, to heart rates. Of these "Quantified Selves," many choose
    to openly share their data through social networks.


    Many smartwatch makers have their own proprietary apps, but there are also fitness
    and smart device portals by platform providers like:


    - Apple Health

    - Google Fit

    - Fitbit (now also Google)

    - Strava

    - Adidas (Runtastic)

    - MyFitnessPal


    ### Apple Health


    Apple Health is primarily a mobile app for iOS and a companion for Apple Watch.
    The app adds trend analysis for 20 types of data, from resting heart rate to sleep
    or cardio fitness, allowing users to see how a given metric is progressing.


    With their permission, so far mostly in the United States, users can also share
    selected health information with their doctor or insurance company.


    ![A screenshot of a mobile app, Apple Health. It consists of the heart rate considering
    day, week, month, and year. The heart rate with minimum and maximum records for
    December month as a bar chart is executed. Add to favorites toggle is set to ON.](images/600273_1_En_2_Chapter/600273_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Apple Health: Heart Rate


    Since watchOS 5, there''s a new Apple Watch activity feature to motivate people
    to work out and compete with their friends. They can challenge any friend to a
    seven-day competition from their Apple Watch, who can fill out their activity
    rings faster, see Figure [2-2](#600273_1_En_2_Chapter.xhtml#Fig2).


    ![A mobile screenshot titled competition. Includes Jane with 3281 points and Me
    with 2487 points. A section below indicates records of Brian, Chris, Christian,
    Jane, and Me with percentages and calories ratio. Sharing option at the bottom
    is highlighted.](images/600273_1_En_2_Chapter/600273_1_En_2_Fig2_HTML.jpg)


    **Figure 2-2** Apple Health: Competitions'
