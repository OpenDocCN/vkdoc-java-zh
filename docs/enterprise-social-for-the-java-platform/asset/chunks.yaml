- fmt: '# DaliCore


    After Oracle took over Sun, the abandoned SocialSite found its best equivalent
    and successor in DaliCore [22].


    It was originally based on a CMS made by a Belgian start-up, mainly around BeJUG
    (Devoxx conferences) members like Johan Vos. DaliCMS (2006) was called a “Web
    2.0 ready CMS”. It was mostly an open source project with community features.
    In 2008, around the same time Sun did with SocialSite, support for Shindig was
    added to DaliCMS, mostly JavaScript code from Shindig and some Java code provided
    by DaliCMS.


    Eventually it became more than a CMS, and the underlying modules turned into DaliCore.
    During his talk at JavaOne 2013, Johan unveiled the origin of the “Dali” part,
    which stood for “Dutch Amazon Lovers Initiative” – a tribute to Internet and Cloud
    pioneer Amazon.


    DaliCore added functionality common to user management, content, or permissions
    on top of Java EE 6, with a strong focus on users and permissions. In about every
    project that uses DaliCore, users should be able to log in with existing credentials
    (Facebook, Twitter, Google+, LinkedIn, etc.). So-called Dali modules extended
    DaliCore. While certain connectivity exists to social providers like Facebook,
    these mainly serve as authentication providers to DaliCore SSO (Single Sign-On)
    functionality. Aside from that, DaliCore aims at providing information.


    Important aspects of DaliCore were as follows:


    - Mostly social container and CMS with partial open social features.

    - Java Persistence support via EJB, JPA, or similar standards.

    - No clear separation of modules, especially API/Spec and Implementation, in most
    cases shares the same module and even package space, making reuse and extension
    harder despite the attempt for that via Dali Module.

    - Seemed a bit heavy, strong dependency on the Full Java EE profile, that is,
    using only its Web Profile looked harder.

    - GlassFish support and integration are positive where it is the preferred application
    server. Thanks to the Java EE standard, it is not impossible but seems harder
    to use with other containers.

    - It demonstrated scalability also under heavy usage with some customers, for
    example, an e-voting site in Belgium. Unlike Apache Shindig or Sun SocialSite
    (which DaliCore seems like a natural successor in most cases), it is used by actual
    customers at least in Benelux countries.


    After Oracle announced it will no longer provide commercial support for GlassFish
    or enhanced features like clustering (beyond PoC quality provided by a Java EE
    Reference Implementation, it’ll remain), performance tuning, etc., a major argument
    for DaliCore vanished. Oracle recommends its WebLogic/Fusion Middleware products,
    or current GlassFish users will be forced to migrate to other servers if they
    need commercial support.


    DaliCore author Johan Vos and his Belgian start-up then claim they’d offer commercial
    support for their customers and maybe even try to extend that, but DaliCore has
    become a clear victim of this. Since early 2013, there has been no activity in
    the `java.net` repository, and after Oracle closed `java.net` in 2017, none of
    it was migrated elsewhere, at least not to a publicly available site. While Johan
    Vos told us back then he was still working on it, he also confirmed this was done
    in a private repository at Bitbucket. Thus, DaliCore never became open source
    again and must now be considered dead.


    # Spring Social


    SpringSource, which had been rebranded by its parent companies as Pivotal before
    ultimately becoming part of VMware again, has a long history of jumping on trends
    and providing libraries or extensions to its Spring Framework for just about everything.


    Spring Social [25] is a binding library for consuming information. Although integrating
    OAuth with Spring Security and other parts is symptomatic of a Basic API, it shows
    more aspects of a Higher-Order API than most other solutions mentioned here.


    Important aspects of Spring Social are as follows:


    - It works primarily with Spring Framework or other parts of the Spring landscape
    for obvious reasons.

    - UI frameworks other than Spring MVC are relatively harder to integrate.

    - Official Spring Social connectors focused mostly on Facebook; examples only
    showed Single Service approach.

    - Despite an otherwise lively Spring community, it’s no longer actively supported.

    - There were just one, two at most active committers and drivers behind Spring
    Social, employed by a single company.


    We will show more about Spring Social in Chapter [6](#600273_1_En_6_Chapter.xhtml).


    # Microsoft Embedded Social


    Microsoft Embedded Social [34], established on May 15, 2012, was a multi-tenant
    cloud service for social user engagement inside applications. While mostly a research
    project, its project page claims it was used at times by over 20 million users.


    It aimed at an abstraction across multiple social networks, a bit like other similar
    efforts like OpenSocial, Seam Social, Spring Social, or Agorava.


    ![An overview of the server architecture. It includes blob store, table store,
    Redis cache, search, abuse reporting, push notifications, key vault, email reporting,
    Geneva monitoring, content validation, CDNs, web roles, service bus queues, worker
    roles, and others.](images/600273_1_En_3_Chapter/600273_1_En_3_Fig7_HTML.jpg)


    **Figure 3-7** Embedded Social Server Architecture


    Its features include:


    - User authentication

    - User profiles

    - Topics

    - Expressions

    - Social graph

    - Dynamic feeds

    - Content moderation

    - Search

    - Popular and recent


    Other than usage for LinkedIn, which Microsoft had purchased in 2016, Embedded
    Social seemed mostly academic, similar to Google’s 20% projects, and although
    there were still publications until around 2020, the project seems more or less
    inactive and abandoned now.


    # Seam Social


    Seam Social was part of the JBoss Seam 3 project offering social connectivity
    on top of Java EE standards like CDI [28]. Seam Social is a binding library for
    consuming information. While OAuth on top of CDI and Java EE can be considered
    a Basic API, Seam Social was the richest Higher-Order API before Agorava, especially
    by providing CDI events for social behavior such as likes, check-ins, or updates
    to a user’s Timeline. Common API bindings in most cases dictated by a provider’s
    API definition or sometimes directly generated from it were inspired by Spring
    Social, but Seam Social was never a clone or fork, as it stands to Spring Social
    like underlying CDI and extensions do to Spring Framework.


    In early 2012, Seam was stopped to be merged with Apache DeltaSpike, which was
    a reason for Seam Social to move on as well … becoming Agorava [33].'
