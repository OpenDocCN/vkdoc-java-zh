- fmt: "# Integrating a Connector\n\nAdding a new connector to Socializer is quite\
    \ easy. We’ll take the XING connector as an example of how to do it.\n\nAfter\
    \ cloning [`https://github.com/agorava/agorava-socializer`](https://github.com/agorava/agorava-socializer),\
    \ the following lines in the Socializer `pom.xml`:\n\n```\norg.agorava       \
    \                 agorava-xing-api\n0.3.0-SNAPSHOT\ncompile\n\norg.agorava\nagorava-xing-cdi\n\
    0.3.0-SNAPSHOT\nruntime\n```\n\ndefine dependencies for XING API and CDI Implementation.\n\
    \nNext, we add the app settings for XING to CDI producer class `org.agorava.socializer.SettingsProducer.java`:\n\
    \n```\n@ApplicationScoped\n@Produces\n@Xing\n@OAuthApplication(params = {@Param(name\
    \ = OAuthAppSettingsBuilder.PREFIX, value = \"xing\")})\npublic OAuthAppSettings\
    \ xingSettings;\n```\n\nBacked by the properties file:\n\n```\nsrc/main/resources/local/agorava.properties\n\
    xing.apiKey=\nxing.apiSecret=\n```\n\nBoth `API key` and `API secret` have to\
    \ be defined for a local Socializer application in the social media account of\
    \ your choice; see [`https://dev.xing.com/applications/dashboard`](https://dev.xing.com/applications/dashboard)\
    \ for XING.\n\n## `xing.xhtml`\n\n```\nWhat's on your mind?\n```\n\nMost proper\
    \ services offer a “Test key” or development key like XING does. To get Facebook\
    \ App Id and App secret credentials, you will need to create a new application\
    \ with Facebook at [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/).\n\
    \n# Spring Social\n\nThe Spring Social project [25] is an extension of the Spring\
    \ Framework that enables your applications to establish connections with social\
    \ media providers like Facebook, LinkedIn, or Twitter to invoke APIs on behalf\
    \ of their users. After some time, it was not actively supported, and updates\
    \ or blog posts by Pivotal/VMware staff appeared six to nine months or longer\
    \ after a change was made or a feature announced at a conference. Open source\
    \ ecosystems like GitHub show various extensions or plug-ins, but not all of them\
    \ were mature; some were merely a PoC, and most of them have not been actively\
    \ maintained for some time either.\n\nSpring Social also supported .NET, but that\
    \ never even took off and only two versions, 1.0.0 followed by 1.0.1, were released\
    \ in 2012, without any further activity after that. So while the Spring Framework\
    \ for .NET still exists and is maintained, with version 3.0.2 released in July\
    \ 2023, Spring Social for .NET died many years before its Java counterpart.\n\n\
    Due to increased standardization of OAuth2/OpenID Connect and its support in Spring\
    \ Security 5, Spring Social is no longer supported or maintained since 2019. The\
    \ support period ended on July 3, 2019. Which does not mean applications completely\
    \ abandoned it, even in production, but for new ones, they would usually prefer\
    \ Spring Security, while for some old ones that are no longer changed but still\
    \ used, they may use it, as long as the API changes by social networks do not\
    \ prevent it after some time.\n\n## Overview\n\nThe main features of Spring Social\
    \ are as follows:\n\n- Extensible service provider framework that greatly simplifies\
    \ the process of connecting local user accounts to social media accounts\n- A\
    \ connect controller that handles the authorization flow between your Java/Spring\
    \ web application, a social media provider, and your users\n- Java bindings to\
    \ popular APIs and social networks like Facebook, Twitter, LinkedIn, TripIt, or\
    \ GitHub\n- A sign-in controller that enables users to authenticate with your\
    \ application by signing in through a social network\n\nThe Maven `groupID` of\
    \ Spring Social is `org.springframework.social`.\n\n## Core\n\nThe Spring Social\
    \ core projects consist of modules shown in Table 6-2.\n\n**Table 6-2** Spring\
    \ Social Core Modules\n\n| Name | Description |\n| --- | --- |\n| `spring-social-core`\
    \ | Spring Social connect framework and OAuth client support |\n| `spring-social-config`\
    \ | Java and XML configuration support for Spring Social |\n| `spring-social-security`\
    \ | Spring Security integration |\n| `spring-social-web` | Spring Social `ConnectController`\
    \ using the connect framework to manage connections in a web environment |\n\n\
    ## Client Modules\n\nIn addition to the Spring Social core modules, there are\
    \ a number of provider-specific client modules providing connectivity and API\
    \ bindings to popular social networks.\n\n**Table 6-3** Spring Social Client Modules\n\
    \n| Name | Maven `artifactID` |\n| --- | --- |\n| Spring Social Facebook | `spring-social-facebook`\
    \ |\n| Spring Social Twitter | `spring-social-twitter` |\n| Spring Social LinkedIn\
    \ | `spring-social-linkedin` |\n| Spring Social GitHub | `spring-social-github`\
    \ |\n| Spring Social TripIt | `spring-social-tripit` |\n\n## Connect Framework\n\
    \nThe `Connection<A>` interface models a connection to a service provider like\
    \ Facebook:\n\n```\npublic interface Connection extends Serializable {\n    ConnectionKey\
    \ getKey();\n    String getDisplayName();\n    String getProfileUrl();\n    String\
    \ getImageUrl();\n    void sync();\n    boolean test();\n    boolean hasExpired();\n\
    \    void refresh();\n    UserProfile fetchUserProfile();\n    void updateStatus(String\
    \ message);\n    A getApi();\n    ConnectionData createData();\n}\n```\n\nEach\
    \ `Connection` is uniquely identified by a composite key consisting of `providerId`\
    \ (e.g., “facebook”) and `providerUserId` (e.g., the user’s Facebook ID).\n\n\
    Let’s assume we have a `Connection<Twitter>` reference to a user “jdoe”.\n\n1.\
    \ `Connection#getKey()` returns “twitter”, 1234567, where 1234567 is `@jdoe`’s\
    \ Twitter user id that never changes.\n2. `Connection#getDisplayName()` returns\
    \ `@jdoe`.\n3. `Connection#getProfileUrl()` returns `http://twitter.com/jdoe`.\n\
    4. `Connection#getImageUrl()` returns `http://a0.twimg.com/profile_images/105951287/IMG_5863_2_normal.jpg`.\n\
    5. `Connection#sync()` allows you to synchronize the state of the connection with\
    \ `@jdoe`’s profile.\n6. `Connection#test()` returns `true` indicating the authorization\
    \ credentials of the Twitter connection are valid. This assumes Twitter has not\
    \ revoked the “AcmeApp” client application, and `@jdoe` has not reset his authorization\
    \ credentials.\n7. `Connection#hasExpired()` returns `false`.\n8. `Connection#refresh()`\
    \ does nothing, as long as connections to Twitter don’t expire.\n9. `Connection#fetchUserProfile()`\
    \ makes a remote call to the Twitter API to get `@jdoe`’s profile data and normalize\
    \ it into a `UserProfile` model.\n10. `Connection#updateStatus(String)` posts\
    \ a status update on `@jdoe`’s timeline.\n11. `Connection#getApi()` returns a\
    \ reference giving the client application access to the full capabilities of Twitter’s\
    \ native API.\n12. `Connection#createData()` returns a `ConnectionData` reference\
    \ that could be serialized and used to restore the connection at a later point.\n\
    \n## Facebook Example\n\nThis example shows how to add a Facebook login to an\
