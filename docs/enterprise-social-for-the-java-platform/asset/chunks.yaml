- fmt: "### Jakarta Security\n\nSecurity in Jakarta EE is based on some essential\
    \ terms:\n\n- `User` is an individual identity defined in the identity storage.\
    \ The storage can be a database, flat file, or LDAP server.\n- `Group` is a set\
    \ of users with the same needs or access levels.\n- `Security Realm` is the access\
    \ channel for the application server to user and group information.\n- `Role`\
    \ is a Jakarta EE concept of access levels. A Jakarta EE developer specifies which\
    \ roles can access which set of application functionalities. These roles are then\
    \ mapped to users and groups via vendor-specific configuration data.\n- `Principal`\
    \ is an identity with known credentials that can be authenticated using an authentication\
    \ protocol.\n- `Credential` contains or references information used to authenticate\
    \ a principal for Jakarta EE applications, for example, by entering a password,\
    \ or calling external services. More in “Authentication.”\n\nThe official scope\
    \ of Jakarta Security is:\n\n> Jakarta Security provides a set of required security\
    \ functionalities including authentication, authorization, data integrity, and\
    \ transport security.\n\nYou’ll remember from Chapter 3 that almost every social\
    \ service or similar API uses RESTful Web Services. REST stands for “Representational\
    \ State Transfer.” Jakarta REST (formerly JAX-RS) is the Jakarta EE API for RESTful\
    \ Web Services.\n\nHere are some brief examples how authorization can be done\
    \ by injecting a Jakarta EE `SecurityContext` instance. The injected security\
    \ context works on top of lower-level `HttpServletRequest` API. The injected security\
    \ context depends on the actual RESTful web application deployment.\n\n`SecurityContext`\
    \ can be used in conjunction with subresource locators to return different resources\
    \ based on the specific roles a user principal is included in, using a CDI `@Context`\
    \ annotation. For example, a subresource locator could return a different resource\
    \ if a user is a “preferred customer.”\n\n```java\n@Path(\"basket\")\npublic ShoppingBasketResource\
    \ get(@Context SecurityContext sc) {\n    if (sc.isUserInRole(\"PreferredCustomer\"\
    )) {\n        return new PreferredCustomerShoppingBasketResource();\n    } else\
    \ {\n        return new ShoppingBasketResource();\n    }\n}\n```\n\nUsing `SecurityContext`\
    \ for a “resource” endpoint:\n\n```java\n@Path(\"resource\")\n@Singleton\npublic\
    \ static class MyResource {\n    @Inject\n    SecurityContext securityContext;\n\
    \n    @GET\n    public String getUserPrincipal() {\n        return securityContext.getUserPrincipal().getName();\n\
    \    }\n}\n```\n\nBy injecting `SecurityContext` into a singleton resource.\n\n\
    Where a Jakarta REST application is deployed in a Servlet container, you can rely\
    \ only on the standard Jakarta EE Web application security offered by the Servlet\
    \ container and configurable via the `web.xml` descriptor by defining `<security-constraint>`\
    \ elements in `web.xml` and assigning roles that are able to access these resources.\
    \ You can also define HTTP methods allowed to be executed. See the following example:\n\
    \n```xml\n<security-constraint>\n    <web-resource-collection>\n        <web-resource-name>admin</web-resource-name>\n\
    \        <url-pattern>/rest/admin/*</url-pattern>\n    </web-resource-collection>\n\
    \    <auth-constraint>\n        <role-name>admin</role-name>\n    </auth-constraint>\n\
    </security-constraint>\n\n<security-constraint>\n    <web-resource-collection>\n\
    \        <web-resource-name>orders</web-resource-name>\n        <url-pattern>/rest/orders/*</url-pattern>\n\
    \    </web-resource-collection>\n    <auth-constraint>\n        <role-name>customer</role-name>\n\
    \    </auth-constraint>\n</security-constraint>\n\n<login-config>\n    <auth-method>BASIC</auth-method>\n\
    \    <realm-name>my-default-realm</realm-name>\n</login-config>\n```\n\n#### Authentication\
    \ Mechanisms\n\nThe Jakarta EE platform supports the following authentication\
    \ mechanisms:\n\n- Basic authentication\n- Form-based authentication\n- Custom\
    \ Form authentication\n- Digest authentication\n- Client authentication\n- OpenID\
    \ Connect authentication\n\nEverything started with the Servlet specification,\
    \ which specifies four authentication mechanisms: `BASIC`, `FORM`, `DIGEST`, and\
    \ `CLIENT-CERT`. Later, when Jakarta Security API was developed, there was a clear\
    \ need for `BASIC` and `FORM` authentication mechanisms to work the same as their\
    \ `BASIC` and `FORM` counterparts in Servlet specification. That said, we can\
    \ distinguish five authentication mechanisms overall, of which three come from\
    \ the Jakarta Security API (`BASIC`, `FORM`, `CUSTOM-FORM`) and two from the Servlet\
    \ specification (`DIGEST`, `CLIENT`).\n\nNow let’s have a closer look at each\
    \ of these.\n\n##### Basic Authentication\n\n**What It Is**\n\nBasic authentication\
    \ is the default authentication when you don’t specify any authentication mechanism.\n\
    \n**How It Works**\n\nThe web server requests a username and a password from the\
    \ web client and verifies that both the username and the password are valid by\
    \ comparing them against a database of authorized users in the specified or default\
    \ realm.\n\nIn the following, you can see the sequence of actions that occur when\
    \ basic authentication is used:\n\n1. A web client requests access to a protected\
    \ recourse.\n2. The web server returns a dialog box that requests the username\
    \ and password.\n3. The web client submits the username and password to the server.\n\
    4. The server authenticates the user in the specified realm and returns the requested\
    \ resource upon successful authentication.\n\n![Basic Authentication](images/600273_1_En_4_Chapter/600273_1_En_4_Fig1_HTML.jpg)\n\
    \n*Figure 4-1: Basic Authentication*\n\n**How to Configure It**\n\nAnnotation:\n\
    \n```java\npackage enterprise.social.authentication.mechanism.http;\n\n@Retention(RUNTIME)\n\
    @Target(TYPE)\npublic @interface BasicAuthenticationMechanismDefinition {\n  \
    \  /**\n     * Name of realm that will be sent via the WWW-Authenticate header.\n\
    \     * \n     * Note that this realm name does not couple a named identity store\n\
    \     * configuration to the authentication mechanism.\n     *\n     * @return\
    \ Name of realm\n     */\n    String realmName() default \"\";\n}\n```\n\nWeb.xml:\n\
    \n```xml\n<login-config>\n    <auth-method>BASIC</auth-method>\n    <realm-name>enterprisesocialbasicrealm</realm-name>\n\
    </login-config>\n```\n\n##### Form-Based Authentication\n\n**What It Is**\n\n\
    An authentication mechanism where the user is presented with an editable form\
    \ to fill in her login credentials to log into some service or system.\n\n**How\
    \ It Works**\n\nThe developer controls the *look and feel* of the login screens\
    \ by customizing the login screen and error pages that an HTTP browser presents\
    \ to the user.\n\nLet’s go through the sequence of actions that occur when form-based\
    \ authentication is used:\n\n1. A web client requests access to a protected resource.\n\
    2. If the client is not authenticated yet, the server redirects them to a login\
    \ page.\n3. The client fills in their username and password and submits the login\
    \ form to the server.\n4. The server attempts to authenticate the user.\n5. Authentication:\n\
    \   - Upon successful authentication, the authenticated user’s principal is checked\
    \ to ensure it belongs to a role being authorized to access the resource. If the\
    \ user is authorized, the server redirects the client to the resource, using the\
    \ stored URL.\n   - Upon failed authentication, the client is redirected to an\
    \ error page.\n\n![Form-Based Authentication](images/600273_1_En_4_Chapter/600273_1_En_4_Fig2_HTML.jpg)\n\
    \n*Figure 4-2: Form-Based Authentication*\n\nFor form-based login, make sure to\
    \ maintain sessions using cookies or TLS session information.\n\n**How to Configure\
    \ It**\n\nHTML Form\n\nWhen working with form-based authentication, be sure to\
    \ mark your form’s action as `j_security_check`. Thus, the login form will work\
    \ regardless of which resource it is intended for. Moreover, explicitly declaring\
    \ this action means for the server that it will not have to specify the action\
    \ field of the outbound form himself. Here’s a code snippet that shows how the\
    \ HTML form should look like:\n\n```html\n<form method=\"POST\" action=\"j_security_check\"\
    >\n    <input type=\"text\" name=\"j_username\">\n    <input type=\"password\"\
    \ name=\"j_password\">\n    <input type=\"submit\" value=\"Login\">\n</form>\n\
    ```\n\nAnnotation:\n\n```java\npackage jakarta.enterprise.social.authentication.mechanism.http;\n\
    \n@Retention(RUNTIME)\n@Target(TYPE)\npublic @interface FormAuthenticationMechanismDefinition\
    \ {\n    @Nonbinding\n    LoginToContinue loginToContinue();\n}\n```\n\nWeb.xml:\n\
    \n```xml\n<login-config>\n    <auth-method>FORM</auth-method>\n    <form-login-config>\n\
    \        <form-login-page>/login.xhtml</form-login-page>\n        <form-error-page>/error.xhtml</form-error-page>\n\
    \    </form-login-config>\n</login-config>\n```"
