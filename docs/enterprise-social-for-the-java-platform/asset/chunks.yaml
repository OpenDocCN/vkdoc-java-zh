    \       gadgets.Hub.publish('org.apache.shindig.random-number', message);    \
    \                          document.getElementById('output').innerHTML = message;\n\
    }\n\n]]>\n\n```\n\n以下是一个 PubSub 订阅者小工具的示例：\n\n```\n\n]]>\n\nvar subId;       \
    \                 gadgets.HubSettings.params.HubClient.onSecurityAlert =     \
    \ function(alertSource, alertType) {\nalert('Security error!');\nwindow.location.href\
    \ = 'about:blank';\n};\nfunction callback(topic, data, subscriberData) {     \
    \                           document.getElementById('output').innerHTML = 'Message:\
    \ ' + gadgets.util.escapeString(data + '') + '' + 'Received: ' + (new Date()).toString();\n\
    }\nfunction subscribe() {\nsubId = gadgets.Hub.subscribe('org.apache.shindig.random-number',\
    \ callback);\n}\nfunction unsubscribe() {\ngadgets.Hub.unsubscribe(subId);   \
    \                           document.getElementById('output').innerHTML = '';\n\
    }\n\n]]>\n\n```\n\nHCL\nHCL Technologies Limited（前身为 Hindustan Computers Limited）是一家印度\
    \ IT 服务和咨询公司，总部位于首都德里的卫星城诺伊达。\n\n历史\n1976 年，在微软或苹果成立后不久，印度的一个八人工程师团队创办了一家公司，旨在制造个人电脑。在最初提议的名称\
    \ Microcomp（可能与微软存在命名问题）之后，公司于 1976 年 8 月 11 日更名为 Hindustan Computers Limited\
    \ (HCL)。\n该公司最初专注于硬件，但通过 HCL Technologies，其重心逐渐转向软件和服务。\n2018 年 12 月 7 日，HCL 宣布达成一项协议，HCL\
    \ Technologies 以 18 亿美元收购 IBM 的某些软件产品，包括 AppScan、BigFix、Commerce、Connections、Digital\
    \ Experience（Portal 和 Content Manager）、Notes/Domino 或 Unica。\n2022 年，HCL Technologies\
    \ 更名为 HCLTech。\n"
- fmt: "# HCL DX\n\nHCL Portal, formerly IBM WebSphere Portal, is part of HCL Digital\
    \ Experience (DX).\n\nThrough an extension called Social Media Publisher, users\
    \ of HCL DX can share their content with popular social networks. Out of the box\
    \ the following networks are supported:\n\n- Facebook\n- LinkedIn\n- Twitter/X\n\
    \n## Social Media Publisher\n\nSocial Media Publisher can be used to manage social\
    \ media posts for published, and if configured also draft content.\n\nIt supports\
    \ both manual and automatic social media posts and can manage the life cycle of\
    \ social media threads.\n\n### Table 7-1 HCL Social Media Publisher – Features\n\
    \n| Social Network | Message Type | Statistics | URL Addressable | User Tracking\
    \ | Untrack | Delete |\n|---|---|---|---|---|---|---|\n| Facebook | Page wall\
    \ post | Like, comment count | Yes | Yes | Yes | Yes |\n| Facebook | Profile posts\
    \ | Like, comment count | Yes | Yes | Yes | Yes |\n| LinkedIn | Network update\
    \ | None | No | No | Yes | No |\n| LinkedIn | Share | None | No | No | Yes | No\
    \ |\n| Twitter | Tweet | Reshare count | Yes | Yes | Yes | Yes |\n\n## Settings\
    \ for Facebook\n\nTake the following steps to set up a social network connection\
    \ for Facebook.\n\nTo get Facebook credentials:\n\n1. Go to [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/).\n\
    2. Click **Create new App**.\n3. Enter the values for the following parameters:\n\
    \   1. `Display name` – The name of your application that is displayed at the\
    \ end of each post, for example, your company name.\n   2. `Namespace` – Optional\
    \ value that is used to access Facebook Insights. It is recommended to use a unique\
    \ name for each application you set up.\n   3. `Category` – A category matching\
    \ your business type. If unsure, select **Apps for Pages**.\n4. Click **Create\
    \ App**.\n5. You get to a configuration screen for your application. Select **Settings**\
    \ and enter the following:\n   1. `App domain` – A comma-separated list of domains\
    \ or IP addresses you want to use for this application with individual Facebook\
    \ accounts. You are able to authorize your application from one of the domains/addresses\
    \ in that list.\n6. Click **Add Platform** and select **Website**.\n7. Set **Site\
    \ URL** and (if applicable) **Mobile Site URL** to the desired website, for example,\
    \ [`http://www.mysite.com`](http://www.mysite.com).\n8. Click **Save Changes**.\n\
    9. Now you see the **App ID/API Key** and **App Secret** for your application.\n\
    \nNow create a new **Credential Vault** in the HCL Portal administration view\
    \ where:\n\n- The **App ID/API Key** is specified as a shared **user ID**.\n-\
    \ The **App Secret** is specified as the **shared password**.\n\nThen you create\
    \ a social network configuration for Facebook:\n\n1. Select **Facebook** as the\
    \ social network.\n2. Define authentication settings for that social network:\n\
    \   1. Select the **Credential Vault** containing your Facebook credentials.\n\
    \   2. Click **Authorize** to bind the credentials to a specific Facebook account.\n\
    3. Select a message type:\n   - **Page wall post**\n     - Select a page.\n  \
    \   - Enter a default name, description, image, caption, and message template.\
    \ Predefined values are included as a guide, for example:\n       - `Name` – This\
    \ is posted as text.\n         ```\n         [Property field=\"title\" context=\"\
    current\" type=\"content\" format=\"length:100\"]\n         ```\n       - `Description`\
    \ – This is posted as text.\n         ```\n         [Property field=\"description\"\
    \ context=\"current\" type=\"content\" format=\"length:100\"]\n         ```\n\
    \       - `Image` – This is posted as a URL.\n         ```\n         [Element\
    \ context=\"current\" type=\"content\" key=\"Image\" format=\"URL\"]\n       \
    \  ```\n       - `Caption` – This is posted as text.\n         ```\n         [Property\
    \ field=\"description\" context=\"current\" type=\"content\" format=\"length:100\"\
    ]\n         ```\n       - `Message` – This is posted as text."
