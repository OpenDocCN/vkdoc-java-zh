- fmt: "### OpenID Connect Example\n\nLet’s see how to configure OpenID Connect authentication\
    \ in a Jakarta EE web application with OpenID Connect authentication providers\
    \ like a local [Keycloak](#600273_1_En_5_Chapter.xhtml#Sec17) instance or social\
    \ networks like Google.\n\nFirst, we create a simple web project, for example,\
    \ by using the Maven Webapp Archetype:\n\n```\nmvn archetype:generate\n-DarchetypeGroupId=org.apache.maven.archetypes\n\
    -DarchetypeArtifactId=maven-archetype-webapp\n-DarchetypeVersion=1.4\n```\n\n\
    Then we update the POM:\n\n```\n4.0.0\ncom.demo\njakarta-ee-oidc-example\n1.0-SNAPSHOT\n\
    war\nJakarta EE 10 OIDC Example\nExample Jakarta EE OIDC application\n       \
    \ UTF-8        UTF-8\n\n3.10.1        3.3.2        3.3.0        3.0.0-M7     \
    \   3.0.0-M7\n3.0.0-M7\n\n10.0.0\n\nfalse\ntrue\n\nwildfly-dist\n27.0.1.Final\
    \        4.0.0.Final        ${project.build.directory}/wildfly-${wildfly.version}\n\
    \njakarta.platform\njakarta.jakartaee-api\n${jakartaee-api.version}\nprovided\n\
    \n${project.artifactId}\n\norg.codehaus.cargo\ncargo-maven3-plugin\n${cargo-maven3-plugin.version}\n\
    \norg.apache.maven.plugins\nmaven-compiler-plugin                ${maven-compiler-plugin.version}\n\
    \norg.apache.maven.plugins\nmaven-war-plugin\n${maven-war-plugin.version}\n\n\
    org.apache.maven.plugins\nmaven-surefire-plugin\n${maven-surefire-plugin.version}\n\
    \n${skip.unit.tests}\n\ndefault-test\ntest\n\ntest\n\n**/it/**\n\norg.apache.maven.plugins\n\
    maven-failsafe-plugin                  ${maven-failsafe-plugin.version}\n    \
    \                ${skip.integration.tests}\n\nintegration-test\nintegration-test\n\
    \nintegration-test\nverify\n\n**/it/**\n\norg.apache.maven.plugins           \
    \     maven-dependency-plugin                ${maven-dependency-plugin.version}\n\
    \nunpack\nprocess-classes\n\nunpack\n\norg.wildfly                           \
    \         ${wildfly.artifactId}                                    ${wildfly.version}\n\
    zip\nfalse\n${project.build.directory}\n\norg.wildfly.plugins\nwildfly-maven-plugin\
    \                ${wildfly-maven-plugin.version}\n\n/subsystem=undertow/application-security-domain=other:write-attribute(name=integrated-jaspi,\
    \ value=false)\nreload\n\n```\n\nThe example is configured for WildFly 27 or higher,\
    \ but it would equally work on any of the [Supported Runtimes](#600273_1_En_5_Chapter.xhtml#Sec4).\n\
    \nNext we create a CDI bean for the OIDC authentication:\n\n```\n@OpenIdAuthenticationMechanismDefinition(\n\
    clientId = \"${oidcConfig.clientId}\",\nclientSecret = \"${oidcConfig.clientSecret}\"\
    ,\nredirectURI = \"${baseURL}/callback\",\nproviderURI = \"${oidcConfig.issuerUri}\"\
    ,\njwksConnectTimeout = 5000,\njwksReadTimeout = 5000\n)\n@ApplicationScoped\n\
    @Named(\"oidcConfig\")\npublic class OidcConfig {\nprivate static final Logger\
    \ LOGGER = Logger.getLogger(OidcConfig.class.getName());\nprivate String domain;\n\
    private String clientId;\nprivate String clientSecret;\nprivate String issuerUri;\n\
    @PostConstruct\nvoid init() {\nLOGGER.config(\"OidcConfig.init()\");\ntry {\n\
    var properties = new Properties();\nproperties.load(getClass().getResourceAsStream(\"\
    /oidc.properties\"));\ndomain = properties.getProperty(\"domain\");\nclientId\
    \ = properties.getProperty(\"clientId\");\nclientSecret = properties.getProperty(\"\
    clientSecret\");\nissuerUri = properties.getProperty(\"issuerUri\");\nif (issuerUri\
    \ == null && domain != null) {\nissuerUri = (\"localhost\".equals(this.domain)\
    \ ? \"http://\" : \"https://\") + this.domain + \"/\";\n}\nLOGGER.log(\nLevel.INFO,\n\
    \"domain: {0}, clientId: {1}, clientSecret:{2}, issuerUri: {3}\",\nnew Object[]\
    \ {\ndomain,\nclientId,\nclientSecret,\nissuerUri\n});\n} catch (IOException e)\
    \ {\nLOGGER.log(Level.SEVERE, \"Failed to load oidc.properties\", e);\n}\n}\n\
    public String getDomain() {\nreturn domain;\n}\npublic String getClientId() {\n\
    return clientId;\n}\npublic String getClientSecret() {\nreturn clientSecret;\n\
    }\npublic String getIssuerUri() {\nreturn issuerUri;\n}\n}\n```\n\nThe `PublicServlet`\
    \ is a simple, unsecured servlet:\n\n```\n@WebServlet(\"/public\")\npublic class\
    \ PublicServlet extends HttpServlet {\n@Override\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws IOException, IOException {\nresponse.setContentType(\"\
    text/html\");\nresponse.getWriter().println(\"Public Unsecured Servlet\");\n}\n\
    }\n```\n\nThe `ProtectedServlet` is secured, and we also declare roles for this\
    \ application. `foo` is allowed to access this servlet:\n\n```\n@WebServlet(\"\
    /protected\")\n@DeclareRoles({\"foo\", \"bar\", \"kaz\"})\n@ServletSecurity(\n\
    @HttpConstraint(rolesAllowed = \"foo\")\n)\npublic class ProtectedServlet extends\
    \ HttpServlet {\n@Inject\nprivate OpenIdContext context;\n@Override\nprotected\
    \ void doGet(HttpServletRequest request, HttpServletResponse response) throws\
    \ IOException {\nresponse.setContentType(\"text/html\");\nresponse.getWriter().println(\"\
    Protected Servlet\");\nresponse.getWriter().println(\"access token:\" + context.getAccessToken()\
    \ + \"\");\nresponse.getWriter().println(\"token type:\" + context.getTokenType()\
    \ + \"\");\nresponse.getWriter().println(\"subject:\" + context.getSubject() +\
    \ \"\");\nresponse.getWriter().println(\"expires in:\" + context.getExpiresIn()\
    \ + \"\");\nresponse.getWriter().println(\"refresh token:\" + context.getRefreshToken()\
    \ + \"\");\nresponse.getWriter().println(\"claims json:\" + context.getClaimsJson()\
    \ + \"\");\n}\n}\n```\n\nThe `CallbackServlet` is used to redirect after login\
    \ succeeded. It redirects to the `/protected` servlet:\n\n```\n@WebServlet(\"\
    /callback\")\npublic class CallbackServlet extends HttpServlet {\nprivate static\
    \ final Logger LOGGER = Logger.getLogger(CallbackServlet.class.getName())\n@Override\n\
    protected void doGet(HttpServletRequest request, HttpServletResponse response)\n\
    throws ServletException, IOException {\nLOGGER.log(Level.FINEST, \"Enter callback\
    \ servlet\");\nString referrer = (String) request.getSession().getAttribute(\"\
    Referrer\");\nString redirectTo = referrer != null ? referrer : request.getContextPath()\
    \ + \"/protected\";\nLOGGER.log(Level.FINEST, \"In /callback, redirect to: {0}\"\
    , redirectTo);\nresponse.sendRedirect(redirectTo);\n}\n}\n```\n\nThe `UserNameServlet`\
    \ displays the current user info from the `SecurityContext`:\n\n```\n@WebServlet(\"\
    /username\")\n@ServletSecurity(@HttpConstraint(rolesAllowed = {\"foo\", \"bar\"\
    }))\npublic class UserNameServlet extends HttpServlet {\nprivate static final\
    \ Logger LOGGER = Logger.getLogger(UserNameServlet.class.getName());\n@Inject\n\
    SecurityContext securityContext;\n@Override\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException, IOException\
    \ {\nString nameInRequest = request.getUserPrincipal() != null ? request.getUserPrincipal().getName()\
    \ : \"\";\nvar principal = securityContext.getCallerPrincipal();\nLOGGER.log(Level.INFO,\
    \ \"Principal: {0}\", principal);\nvar name = principal.getName();\nresponse.setContentType(\"\
    text/html\");\nresponse.getWriter().println(\"UserName Servlet\");\nresponse.getWriter().println(\"\
    principal name in request userPrincipal:\" + nameInRequest + \"\");\nresponse.getWriter().println(\"\
    principal name:\" + name + \"\");\nresponse.getWriter().println(\"isCallerInRole('foo'):\"\
    \ + securityContext.isCallerInRole(\"foo\") + \"\");\nresponse.getWriter().println(\"\
    isCallerInRole('bar'):\" + securityContext.isCallerInRole(\"bar\") + \"\");\n\
    }\n}\n```\n\nTo map authenticated users to valid groups, we create a simple `IdentityStore`\
    \ implementation:"
  raw: "### OpenID Connect Example\n\nLet’s see how to configure OpenID Connect authentication\
    \ in a Jakarta EE web application with OpenID Connect authentication providers\
    \ like a local [Keycloak](#600273_1_En_5_Chapter.xhtml#Sec17) instance or social\
    \ networks like Google.\n\nFirst, we create a simple web project, for example,\
    \ by using the Maven Webapp Archetype:\n\n```\nmvn archetype:generate\n-DarchetypeGroupId=org.apache.maven.archetypes\n\
    -DarchetypeArtifactId=maven-archetype-webapp\n-DarchetypeVersion=1.4\n```\n\n\
    Then we update the POM:\n\n```\n4.0.0\ncom.demo\njakarta-ee-oidc-example\n1.0-SNAPSHOT\n\
    war\nJakarta EE 10 OIDC Example\nExample Jakarta EE OIDC application\n       \
    \ UTF-8        UTF-8\n\n3.10.1        3.3.2        3.3.0        3.0.0-M7     \
    \   3.0.0-M7\n3.0.0-M7\n\n10.0.0\n\nfalse\ntrue\n\nwildfly-dist\n27.0.1.Final\
    \        4.0.0.Final        ${project.build.directory}/wildfly-${wildfly.version}\n\
    \njakarta.platform\njakarta.jakartaee-api\n${jakartaee-api.version}\nprovided\n\
    \n${project.artifactId}\n\norg.codehaus.cargo\ncargo-maven3-plugin\n${cargo-maven3-plugin.version}\n\
    \norg.apache.maven.plugins\nmaven-compiler-plugin                ${maven-compiler-plugin.version}\n\
    \norg.apache.maven.plugins\nmaven-war-plugin\n${maven-war-plugin.version}\n\n\
    org.apache.maven.plugins\nmaven-surefire-plugin\n${maven-surefire-plugin.version}\n\
    \n${skip.unit.tests}\n\ndefault-test\ntest\n\ntest\n\n**/it/**\n\norg.apache.maven.plugins\n\
    maven-failsafe-plugin                  ${maven-failsafe-plugin.version}\n    \
    \                ${skip.integration.tests}\n\nintegration-test\nintegration-test\n\
    \nintegration-test\nverify\n\n**/it/**\n\norg.apache.maven.plugins           \
    \     maven-dependency-plugin                ${maven-dependency-plugin.version}\n\
    \nunpack\nprocess-classes\n\nunpack\n\norg.wildfly                           \
    \         ${wildfly.artifactId}                                    ${wildfly.version}\n\
    zip\nfalse\n${project.build.directory}\n\norg.wildfly.plugins\nwildfly-maven-plugin\
    \                ${wildfly-maven-plugin.version}\n\n/subsystem=undertow/application-security-domain=other:write-attribute(name=integrated-jaspi,\
    \ value=false)\nreload\n\n```\n\nThe example is configured for WildFly 27 or higher,\
    \ but it would equally work on any of the [Supported Runtimes](#600273_1_En_5_Chapter.xhtml#Sec4).\n\
    \nNext we create a CDI bean for the OIDC authentication:\n\n```\n@OpenIdAuthenticationMechanismDefinition(\n\
    clientId = \"${oidcConfig.clientId}\",\nclientSecret = \"${oidcConfig.clientSecret}\"\
    ,\nredirectURI = \"${baseURL}/callback\",\nproviderURI = \"${oidcConfig.issuerUri}\"\
    ,\njwksConnectTimeout = 5000,\njwksReadTimeout = 5000\n)\n@ApplicationScoped\n\
    @Named(\"oidcConfig\")\npublic class OidcConfig {\nprivate static final Logger\
    \ LOGGER = Logger.getLogger(OidcConfig.class.getName());\nprivate String domain;\n\
    private String clientId;\nprivate String clientSecret;\nprivate String issuerUri;\n\
    @PostConstruct\nvoid init() {\nLOGGER.config(\"OidcConfig.init()\");\ntry {\n\
    var properties = new Properties();\nproperties.load(getClass().getResourceAsStream(\"\
    /oidc.properties\"));\ndomain = properties.getProperty(\"domain\");\nclientId\
    \ = properties.getProperty(\"clientId\");\nclientSecret = properties.getProperty(\"\
    clientSecret\");\nissuerUri = properties.getProperty(\"issuerUri\");\nif (issuerUri\
    \ == null && domain != null) {\nissuerUri = (\"localhost\".equals(this.domain)\
    \ ? \"http://\" : \"https://\") + this.domain + \"/\";\n}\nLOGGER.log(\nLevel.INFO,\n\
    \"domain: {0}, clientId: {1}, clientSecret:{2}, issuerUri: {3}\",\nnew Object[]\
    \ {\ndomain,\nclientId,\nclientSecret,\nissuerUri\n});\n} catch (IOException e)\
    \ {\nLOGGER.log(Level.SEVERE, \"Failed to load oidc.properties\", e);\n}\n}\n\
    public String getDomain() {\nreturn domain;\n}\npublic String getClientId() {\n\
    return clientId;\n}\npublic String getClientSecret() {\nreturn clientSecret;\n\
    }\npublic String getIssuerUri() {\nreturn issuerUri;\n}\n}\n```\n\nThe `PublicServlet`\
    \ is a simple, unsecured servlet:\n\n```\n@WebServlet(\"/public\")\npublic class\
    \ PublicServlet extends HttpServlet {\n@Override\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws IOException, IOException {\nresponse.setContentType(\"\
    text/html\");\nresponse.getWriter().println(\"Public Unsecured Servlet\");\n}\n\
    }\n```\n\nThe `ProtectedServlet` is secured, and we also declare roles for this\
    \ application. `foo` is allowed to access this servlet:\n\n```\n@WebServlet(\"\
    /protected\")\n@DeclareRoles({\"foo\", \"bar\", \"kaz\"})\n@ServletSecurity(\n\
    @HttpConstraint(rolesAllowed = \"foo\")\n)\npublic class ProtectedServlet extends\
    \ HttpServlet {\n@Inject\nprivate OpenIdContext context;\n@Override\nprotected\
    \ void doGet(HttpServletRequest request, HttpServletResponse response) throws\
    \ IOException {\nresponse.setContentType(\"text/html\");\nresponse.getWriter().println(\"\
    Protected Servlet\");\nresponse.getWriter().println(\"access token:\" + context.getAccessToken()\
    \ + \"\");\nresponse.getWriter().println(\"token type:\" + context.getTokenType()\
    \ + \"\");\nresponse.getWriter().println(\"subject:\" + context.getSubject() +\
    \ \"\");\nresponse.getWriter().println(\"expires in:\" + context.getExpiresIn()\
    \ + \"\");\nresponse.getWriter().println(\"refresh token:\" + context.getRefreshToken()\
    \ + \"\");\nresponse.getWriter().println(\"claims json:\" + context.getClaimsJson()\
    \ + \"\");\n}\n}\n```\n\nThe `CallbackServlet` is used to redirect after login\
    \ succeeded. It redirects to the `/protected` servlet:\n\n```\n@WebServlet(\"\
    /callback\")\npublic class CallbackServlet extends HttpServlet {\nprivate static\
    \ final Logger LOGGER = Logger.getLogger(CallbackServlet.class.getName())\n@Override\n\
    protected void doGet(HttpServletRequest request, HttpServletResponse response)\n\
    throws ServletException, IOException {\nLOGGER.log(Level.FINEST, \"Enter callback\
    \ servlet\");\nString referrer = (String) request.getSession().getAttribute(\"\
    Referrer\");\nString redirectTo = referrer != null ? referrer : request.getContextPath()\
    \ + \"/protected\";\nLOGGER.log(Level.FINEST, \"In /callback, redirect to: {0}\"\
    , redirectTo);\nresponse.sendRedirect(redirectTo);\n}\n}\n```\n\nThe `UserNameServlet`\
    \ displays the current user info from the `SecurityContext`:\n\n```\n@WebServlet(\"\
    /username\")\n@ServletSecurity(@HttpConstraint(rolesAllowed = {\"foo\", \"bar\"\
    }))\npublic class UserNameServlet extends HttpServlet {\nprivate static final\
    \ Logger LOGGER = Logger.getLogger(UserNameServlet.class.getName());\n@Inject\n\
    SecurityContext securityContext;\n@Override\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException, IOException\
    \ {\nString nameInRequest = request.getUserPrincipal() != null ? request.getUserPrincipal().getName()\
    \ : \"\";\nvar principal = securityContext.getCallerPrincipal();\nLOGGER.log(Level.INFO,\
    \ \"Principal: {0}\", principal);\nvar name = principal.getName();\nresponse.setContentType(\"\
    text/html\");\nresponse.getWriter().println(\"UserName Servlet\");\nresponse.getWriter().println(\"\
    principal name in request userPrincipal:\" + nameInRequest + \"\");\nresponse.getWriter().println(\"\
    principal name:\" + name + \"\");\nresponse.getWriter().println(\"isCallerInRole('foo'):\"\
    \ + securityContext.isCallerInRole(\"foo\") + \"\");\nresponse.getWriter().println(\"\
    isCallerInRole('bar'):\" + securityContext.isCallerInRole(\"bar\") + \"\");\n\
    }\n}\n```\n\nTo map authenticated users to valid groups, we create a simple `IdentityStore`\
    \ implementation:"
  trans: "\n### OpenID Connect 示例\n\n让我们看看如何在 Jakarta EE Web 应用中配置 OpenID Connect\
    \ 认证，使用本地 Keycloak 实例或 Google 等社交网络作为 OpenID Connect 认证提供者。\n\n首先，我们创建一个简单的 Web\
    \ 项目，例如使用 Maven Webapp 原型：\n\n```\nmvn archetype:generate\n-DarchetypeGroupId=org.apache.maven.archetypes\n\
    -DarchetypeArtifactId=maven-archetype-webapp\n-DarchetypeVersion=1.4\n```\n\n\
    然后更新 POM 文件：\n\n```\n4.0.0\ncom.demo\njakarta-ee-oidc-example\n1.0-SNAPSHOT\n\
    war\nJakarta EE 10 OIDC 示例\n示例 Jakarta EE OIDC 应用\n        UTF-8        UTF-8\n\
    \n3.10.1        3.3.2        3.3.0        3.0.0-M7        3.0.0-M7\n3.0.0-M7\n\
    \n10.0.0\n\nfalse\ntrue\n\nwildfly-dist\n27.0.1.Final        4.0.0.Final     \
    \   ${project.build.directory}/wildfly-${wildfly.version}\n\njakarta.platform\n\
    jakarta.jakartaee-api\n${jakartaee-api.version}\nprovided\n\n${project.artifactId}\n\
    \norg.codehaus.cargo\ncargo-maven3-plugin\n${cargo-maven3-plugin.version}\n\n\
    org.apache.maven.plugins\nmaven-compiler-plugin                ${maven-compiler-plugin.version}\n\
    \norg.apache.maven.plugins\nmaven-war-plugin\n${maven-war-plugin.version}\n\n\
    org.apache.maven.plugins\nmaven-surefire-plugin\n${maven-surefire-plugin.version}\n\
    \n${skip.unit.tests}\n\ndefault-test\ntest\n\ntest\n\n**/it/**\n\norg.apache.maven.plugins\n\
    maven-failsafe-plugin                  ${maven-failsafe-plugin.version}\n    \
    \                ${skip.integration.tests}\n\nintegration-test\nintegration-test\n\
    \nintegration-test\nverify\n\n**/it/**\n\norg.apache.maven.plugins           \
    \     maven-dependency-plugin                ${maven-dependency-plugin.version}\n\
    \nunpack\nprocess-classes\n\nunpack\n\norg.wildfly                           \
    \         ${wildfly.artifactId}                                    ${wildfly.version}\n\
    zip\nfalse\n${project.build.directory}\n\norg.wildfly.plugins\nwildfly-maven-plugin\
    \                ${wildfly-maven-plugin.version}\n\n/subsystem=undertow/application-security-domain=other:write-attribute(name=integrated-jaspi,\
    \ value=false)\nreload\n\n```\n\n该示例配置为 WildFly 27 或更高版本，但同样适用于任何支持的运行时环境。\n\n\
    接下来，我们为 OIDC 认证创建一个 CDI Bean：\n\n```\n@OpenIdAuthenticationMechanismDefinition(\n\
    clientId = \"${oidcConfig.clientId}\",\nclientSecret = \"${oidcConfig.clientSecret}\"\
    ,\nredirectURI = \"${baseURL}/callback\",\nproviderURI = \"${oidcConfig.issuerUri}\"\
    ,\njwksConnectTimeout = 5000,\njwksReadTimeout = 5000\n)\n@ApplicationScoped\n\
    @Named(\"oidcConfig\")\npublic class OidcConfig {\nprivate static final Logger\
    \ LOGGER = Logger.getLogger(OidcConfig.class.getName());\nprivate String domain;\n\
    private String clientId;\nprivate String clientSecret;\nprivate String issuerUri;\n\
    @PostConstruct\nvoid init() {\nLOGGER.config(\"OidcConfig.init()\");\ntry {\n\
    var properties = new Properties();\nproperties.load(getClass().getResourceAsStream(\"\
    /oidc.properties\"));\ndomain = properties.getProperty(\"domain\");\nclientId\
    \ = properties.getProperty(\"clientId\");\nclientSecret = properties.getProperty(\"\
    clientSecret\");\nissuerUri = properties.getProperty(\"issuerUri\");\nif (issuerUri\
    \ == null && domain != null) {\nissuerUri = (\"localhost\".equals(this.domain)\
    \ ? \"http://\" : \"https://\") + this.domain + \"/\";\n}\nLOGGER.log(\nLevel.INFO,\n\
    \"domain: {0}, clientId: {1}, clientSecret:{2}, issuerUri: {3}\",\nnew Object[]\
    \ {\ndomain,\nclientId,\nclientSecret,\nissuerUri\n});\n} catch (IOException e)\
    \ {\nLOGGER.log(Level.SEVERE, \"加载 oidc.properties 失败\", e);\n}\n}\npublic String\
    \ getDomain() {\nreturn domain;\n}\npublic String getClientId() {\nreturn clientId;\n\
    }\npublic String getClientSecret() {\nreturn clientSecret;\n}\npublic String getIssuerUri()\
    \ {\nreturn issuerUri;\n}\n}\n```\n\n`PublicServlet` 是一个简单的、未受保护的 Servlet：\n\n\
    ```\n@WebServlet(\"/public\")\npublic class PublicServlet extends HttpServlet\
    \ {\n@Override\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
    \ response) throws IOException, IOException {\nresponse.setContentType(\"text/html\"\
    );\nresponse.getWriter().println(\"公共未受保护的 Servlet\");\n}\n}\n```\n\n`ProtectedServlet`\
    \ 是受保护的，我们还为此应用声明了角色。`foo` 角色被允许访问此 Servlet：\n\n```\n@WebServlet(\"/protected\"\
    )\n@DeclareRoles({\"foo\", \"bar\", \"kaz\"})\n@ServletSecurity(\n@HttpConstraint(rolesAllowed\
    \ = \"foo\")\n)\npublic class ProtectedServlet extends HttpServlet {\n@Inject\n\
    private OpenIdContext context;\n@Override\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws IOException {\nresponse.setContentType(\"\
    text/html\");\nresponse.getWriter().println(\"受保护的 Servlet\");\nresponse.getWriter().println(\"\
    访问令牌:\" + context.getAccessToken() + \"\");\nresponse.getWriter().println(\"令牌类型:\"\
    \ + context.getTokenType() + \"\");\nresponse.getWriter().println(\"主体:\" + context.getSubject()\
    \ + \"\");\nresponse.getWriter().println(\"过期时间:\" + context.getExpiresIn() +\
    \ \"\");\nresponse.getWriter().println(\"刷新令牌:\" + context.getRefreshToken() +\
    \ \"\");\nresponse.getWriter().println(\"声明 JSON:\" + context.getClaimsJson()\
    \ + \"\");\n}\n}\n```\n\n`CallbackServlet` 用于登录成功后重定向。它会重定向到 `/protected` Servlet：\n\
    \n```\n@WebServlet(\"/callback\")\npublic class CallbackServlet extends HttpServlet\
    \ {\nprivate static final Logger LOGGER = Logger.getLogger(CallbackServlet.class.getName())\n\
    @Override\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
    \ response)\nthrows ServletException, IOException {\nLOGGER.log(Level.FINEST,\
    \ \"进入回调 Servlet\");\nString referrer = (String) request.getSession().getAttribute(\"\
    Referrer\");\nString redirectTo = referrer != null ? referrer : request.getContextPath()\
    \ + \"/protected\";\nLOGGER.log(Level.FINEST, \"在 /callback 中，重定向到: {0}\", redirectTo);\n\
    response.sendRedirect(redirectTo);\n}\n}\n```\n\n`UserNameServlet` 显示来自 `SecurityContext`\
    \ 的当前用户信息：\n\n```\n@WebServlet(\"/username\")\n@ServletSecurity(@HttpConstraint(rolesAllowed\
    \ = {\"foo\", \"bar\"}))\npublic class UserNameServlet extends HttpServlet {\n\
    private static final Logger LOGGER = Logger.getLogger(UserNameServlet.class.getName());\n\
    @Inject\nSecurityContext securityContext;\n@Override\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException, IOException\
    \ {\nString nameInRequest = request.getUserPrincipal() != null ? request.getUserPrincipal().getName()\
    \ : \"\";\nvar principal = securityContext.getCallerPrincipal();\nLOGGER.log(Level.INFO,\
    \ \"主体: {0}\", principal);\nvar name = principal.getName();\nresponse.setContentType(\"\
    text/html\");\nresponse.getWriter().println(\"用户名 Servlet\");\nresponse.getWriter().println(\"\
    请求 userPrincipal 中的主体名称:\" + nameInRequest + \"\");\nresponse.getWriter().println(\"\
    主体名称:\" + name + \"\");\nresponse.getWriter().println(\"isCallerInRole('foo'):\"\
    \ + securityContext.isCallerInRole(\"foo\") + \"\");\nresponse.getWriter().println(\"\
    isCallerInRole('bar'):\" + securityContext.isCallerInRole(\"bar\") + \"\");\n\
    }\n}\n```\n\n为了将认证用户映射到有效的组，我们创建一个简单的 `IdentityStore` 实现：\n"
- fmt: "```java\n@ApplicationScoped\npublic class AuthorizationIdentityStore implements\
    \ IdentityStore {\n    private static final Logger LOGGER = Logger.getLogger(AuthorizationIdentityStore.class.getName());\n\
    \    private String email;\n    private Map<String, Set<String>> authorization;\n\
