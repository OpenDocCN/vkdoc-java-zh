    \ Java Discord 框架，都由社区非常积极地开发：\n\n*   Discord4J\n\n*   Java Discord API (JDA)\n\
    \n*   Javacord\n\n认证\n\n首先，您需要从 Discord 应用程序仪表板创建一个应用程序：[`https://discord.com/developers/applications`](https://discord.com/developers/applications)。\n\
    \n1.  如果尚未登录，请登录。\n\n2.  点击 **新应用程序**。\n\n3.  选择一个名称，例如，“ApressBookDemoApp”，接受开发者条款，然后点击\
    \ **创建**。\n\n4.  在 **常规信息** 下，您可以为以下参数输入值：\n\n    *   名称 – 这是您之前输入的应用程序名称。\n\n\
    \    *   应用图标 – 当用户授权您的应用时，会向他们显示该徽标。\n\n    *   描述 – 输入应用程序的简短描述。\n\n    *  \
    \ 标签 – 最多五个标签，用于描述您应用程序的内容和功能。\n\n    *   应用程序 ID – 要复制到您的应用程序中的应用程序 ID。\n\n \
    \   *   公钥 – 要复制到您的应用程序中的公钥。\n\n    *   服务器计数 – 这是您的应用程序所在的服务器数量的近似值。该值为 **只读**。\n\
    \n    *   交互端点 URL – 您可以选择配置一个交互端点，以通过 HTTP POST 接收交互，而不是通过网关与机器人用户交互。\n\n   \
    \ *   关联角色验证 URL – 您可以配置一个验证 URL，以将您的应用程序作为服务器角色链接设置中的一项要求。\n\n    *   服务条款 URL\
    \ – 链接到您应用程序的服务条款（可选）。\n\n    *   隐私政策 URL – 链接到您的隐私政策（可选）。\n\n5.  在 **OAuth2**\
    \ 下，您会找到以下参数：\n\n    *   客户端 ID – 要复制到您的应用程序中的客户端 ID。\n\n    *   客户端密钥 – 要复制到您的应用程序中的客户端密钥。您必须在首次使用时重新生成它，并确保\
    \ **复制它**，因为它不会再次显示给您。\n\n    *   重定向 – 您必须至少指定一个 URI 才能使认证生效。如果您在 OAuth 请求中传递一个\
    \ URI，它必须与您在此处输入的 URI 之一完全匹配。\n\n6.  在 **机器人** 下，您会找到以下参数：\n\n    *   用户名 – 这是您机器人的名称。\n\
    \n    *   图标 – 向您机器人的用户显示的徽标。\n\n    *   令牌 – 要复制到您的应用程序中的令牌。出于安全目的，令牌只能在创建时查看一次。如果您忘记或丢失了令牌的访问权限，请重新生成一个新令牌。\n\
    \nDiscord4J\nDiscord4J 是一个用于官方 Discord API 的响应式 Java 封装，使用响应式原则和 Reactor 框架进行异步和非阻塞\
    \ API 调用。\n\n安装\n\n将以下依赖项添加到您项目的 Maven POM 中：\n\n```\n\ncom.discord4j\ndiscord4j-core\n\
    3.2.6\n\n```\n\n快速示例\n\n在以下示例中，每当用户发送 !ping 消息时，机器人将立即回复 Pong!：\n\n```\npublic\
    \ class ExampleBot {\npublic static void main(String[] args) {\nString token =\
    \ args[0];\nDiscordClient client = DiscordClient.create(token);\nGatewayDiscordClient\
    \ gateway = client.login().block();\ngateway.on(MessageCreateEvent.class).subscribe(event\
    \ -> {\nMessage message = event.getMessage();\nif (\"!ping\".equals(message.getContent()))\
    \ {\nMessageChannel channel = message.getChannel().block();\nchannel.createMessage(\"\
    Pong!\").block();\n}\n});\ngateway.onDisconnect().block();\n}\n}\n```\n\n响应式示例\n\
    \n此示例展示了相同的机器人，但以响应式方式使用 Project Reactor：\n\n```\npublic class ExampleBot {\n\
    public static void main(String[] args) {\nString token = args[0];\nDiscordClient\
    \ client = DiscordClient.create(token);\nclient.login().flatMapMany(gateway ->\
    \ gateway.on(MessageCreateEvent.class))\n.map(MessageCreateEvent::getMessage)\n\
    .filter(message -> \"!ping\".equals(message.getContent()))\n.flatMap(Message::getChannel)\n\
    .flatMap(channel -> channel.createMessage(\"Pong!\"))\n.blockLast();\n}\n}\n```\n\
    \n分片示例\n\n此示例展示了同一 JVM 下的多个分片组：\n\n```\n// 第一个组将获得偶数分片 ID\nShardingStrategy first\
    \ = ShardingStrategy.builder()\n.count(10)\n.filter(s -> s.getIndex() % 2 == 0)\n\
    .build();\n// 第二个组将获得奇数分片 ID\nShardingStrategy second = ShardingStrategy.builder()\n\
    .count(10)\n.filter(s -> s.getIndex() % 2 != 0)\n.build();\nDiscordClient sharedClient\
    \ = DiscordClient.create(System.getenv(\"token\"));\nShardCoordinator coordinator\
    \ = LocalShardCoordinator.create();\nGatewayDiscordClient firstGroup = sharedClient.gateway()\n\
    .setSharding (first)\n.setEnabledIntents(...)\n.setShardCoordinator(coordinator)\n\
    .login()\n.block();\nGatewayDiscordClient secondGroup = sharedClient.gateway()\n\
    .setSharding(second)\n.setEnabledIntents(...)\n.setShardCoordinator(coordinator)\n\
    .login()\n.block();\n```\n\nJava Discord API\nJava Discord API (JDA，不要与 JTA 或\
    \ Jakarta Transactions 混淆) 旨在围绕 Discord REST API 和 Websocket 事件提供一个干净的 Java 对象模型。\n\
    \n安装\n\n将以下依赖项添加到您项目的 Maven POM 中：\n\n```\nnet.dv8tion\nJDA\nVERSION\n\n```\n\n\
    配置\n\n`JDABuilder` 和 `DefaultShardManagerBuilder` 都提供了一组配置：\n\n```\npublic static\
    \ void main(String[] args) {\nJDABuilder builder = JDABuilder.createDefault(\"\
    token\");\n// 禁用部分缓存\nbuilder.disableCache(CacheFlag.MEMBER_OVERRIDES, CacheFlag.VOICE_STATE);\n\
    // 启用批量删除事件\nbuilder.setBulkDeleteSplittingEnabled(false);\n// 设置活动（如“正在玩 Something”）\n\
    builder.setActivity(Activity.watching(\"TV\"));\nJDA jda = builder.build();\n\
    }\n```\n\nEventListener 示例\n\n以下示例展示了如何使用 JDA 事件系统：\n\n```\npublic class ReadyListener\
    \ implements EventListener\n{\npublic static void main(String[] args)\nthrows\
    \ InterruptedException\n{\n// 注意：在构建之前注册您的 ReadyListener 很重要\nJDA jda = JDABuilder.createDefault(\"\
    token\")\n.addEventListeners(new ReadyListener())\n.build();\n// 可选地阻塞直到 JDA 就绪\n\
    jda.awaitReady();\n}\n@Override\npublic void onEvent(GenericEvent event)\n{\n\
    if (event instanceof ReadyEvent)\nSystem.out.println(\"API 已就绪！\");\n}\n}\n```\n\
    \n分片示例\n\nDiscord 允许机器人账户通过限制它们只处理总连接公会/服务器的一部分来跨会话共享负载。这可以使用分片来完成：\n\n```\npublic\
    \ static void main(String[] args) throws Exception\n{\nJDABuilder shardBuilder\
    \ = JDABuilder.createDefault(\"token\");\n//在此处使用 shardBuilder.addEventListeners(...)\
    \ 注册您的监听器\nshardBuilder.addEventListeners(new MessageListener());\nfor (int i\
    \ = 0; i < 10; i++)\n{\nshardBuilder.useSharding(i, 10)\n.build();\n}\n}\n```\n\
