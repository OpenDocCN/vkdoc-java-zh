    Liberty, use the `oauth2Login` element for OAuth providers or the `oidcLogin`
    element for OpenID Connect providers.


    These elements supply the configuration details that are needed to work with the
    provider. The details can usually be obtained from the developer instructions
    of the social media provider. The following example configures Instagram as the
    social media provider:'
