    遗留框架

    尽管许多框架仍在使用中，但以下社交框架已不再由贡献者积极维护或支持。


    Agorava

    ***Agorava***

    [33] 是一个社交框架，提供 CDI 模块、上下文和扩展，用于与主流社交网络或类似服务（暴露 API）进行交互。它为 Java 和 Java 企业应用程序提供这些服务，并便于以混搭（mashup）的精神混合使用它们。[12]


    历史

    您还记得 Agorava 的起源和前身，我们在第 3 章中讨论了标准化工作以及被大多数 JCP EC 成员否决的 JSR 357，这导致 Agorava 作为
    Seam Social 的继承者被创建。联合创始人 Antoine Sabot-Durand 为 JBoss 项目（如 CDI）做出了贡献，他于 2013
    年加入 JBoss 后成为该项目的规范负责人。Agorava 也曾一度被收录在 JBoss 技术栈中 [56]，尽管它并非 WildFly 等项目的官方组成部分。Agorava
    在用于社交应用的 JBoss 开发者框架（JDF）中被提及，但当 JDF 更名为“Quickstarts”后，这些教程大多被废弃或归档。

    因此，类似于 Spring Social 主要被 Spring Security 取代，Agorava 也遭遇了同样的情况，被 Jakarta Security（尤其是从
    Jakarta EE 10 开始）取代，或者像 Keycloak 在 JBoss/Red Hat 技术栈中取代 PicketLink 一样。


    概述


    ![](img/600273_1_En_6_Fig1_HTML.jpg)


    Agorava 核心的概览。它包括四个模块：Twitter、LinkedIn、Facebook 和社交媒体，其次是 Agorava 核心、CDI 实现、Guice
    实现、Spring 实现、@Inject 实现、Java SE 实现和 API。


    图 6-1

    Agorava 宏观架构


    以下是 Agorava 的主要特性：


    *   机密性


    *   通用的可移植 REST 客户端 API


    *   用于处理 OAuth 1.0a 和 2.0 服务的通用 API


    *   用于处理 JSON 序列化和反序列化的通用 API


    *   用于从社交服务（作为身份提供者）检索基本用户信息的通用身份识别 API


    *   允许多服务管理器 API 在同一应用程序中处理多个 OAuth 应用程序和会话


    *   开箱即用，Agorava 可连接到


    *   Facebook


    *   LinkedIn


    *   GitHub


    *   Twitter


    *   XING


    *   并提供了一种简单的方法，通过创建新的连接器来扩展到任何其他服务或 API


    Agorava 独立于 CDI 实现，并且在 Java EE 6（最低版本）和由 CDI 增强的 Servlet 环境之间完全可移植。它也可以在桌面或 SE
    嵌入式/移动应用程序中与 CDI 一起用于 Java SE。它已使用 CDI 参考实现（JBoss Weld）进行了全面测试。自 0.5 版本起，也支持 OpenWebBeans
    和 Caucho Resin。

    Agorava 常被解释为一种“面向社交的 Java 连接器架构”。事实上，Agorava 背后的理念与 Jakarta 连接器（原 JCA）在 Jakarta
    EE 框架下所做的工作之间存在惊人的相似之处。

    Jakarta 连接器定义了一种标准架构，用于将 Jakarta EE 平台连接到异构企业信息系统（EIS），包括事务处理系统（如 CICS 事务服务器）和企业资源规划（ERP）系统（如
    SAP），特别是所谓的通用客户端接口（CCI），它定义了一个标准的客户端 API，允许应用程序访问多个资源适配器。


    ![](img/600273_1_En_6_Fig2_HTML.jpg)


    JCA 通用客户端接口应用程序的示意图。它从一个 Java 应用程序开始，接着是三个资源适配器，以及各自对应的企业信息系统。


    图 6-2

    JCA 通用客户端接口

