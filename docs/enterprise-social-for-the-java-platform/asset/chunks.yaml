    \ API。鉴于该主题的易变性、广度、深度和复杂性，撰写本书无疑是一项艰巨的任务。此外，我想不出比 Werner 更合适的人选来撰写本书。自 Agorava\
    \ 项目以及 Java 中社交媒体 API 标准化的初期努力以来，他长期涉足这一领域。他对该领域的掌控力在本书中贯穿始终。\n\n我希望这本书对每一位 Java\
    \ 社交媒体开发者来说都将是无比宝贵的。\n\n> —雷扎·拉赫曼\n> \n> 微软 Azure 上 Java 首席项目经理\n> \n> Jakarta\
    \ EE 大使、作者、演讲者\n\n关于作者 关于技术审校者\n\n# 1. 引言\n\n本章讲述了从古代到近代的社交媒体历史。21 世纪的头几十年，通常被认为是介于“互联网泡沫”和\
    \ 2008 年金融危机之间的社交媒体的“黄金时代”。我们将进一步审视那之后的岁月，直至最近的历史，以及未来社交媒体可能带来的变化。\n\n## 古代历史\n\
    \n大多数人认为社交媒体是 Facebook、Twitter、Google、Myspace 和 Yahoo!等公司的现代发明。事实上，社交媒体的历史可以追溯到数千年以前。\n\
    \n对一些人来说，邮政服务是最早的社交媒体形式之一。从古代波斯邮政服务时代到希腊市集[1]和罗马广场[2]，邮政服务一直是社会和政治讨论的媒介。最早有记载的类似于\
    \ Wiki 或“论坛帖子”的东西，实际上是刻在罗马广场或类似建筑的墙壁上的[3]，记录了诸如维苏威火山摧毁庞贝城或尼禄统治下罗马部分地区的重大事件。\n\n\
    雅典古市集是民主的孵化器，在古希腊经商时，它是社会和政治辩论的热门场所。直到今天，这种方式仍在以类似的方式运作，只是论坛常常变成了数字形式。从突尼斯到乌克兰，反对派运动利用社交媒体将民主带到那些长期以来令人惊讶且不常见的地方[4]。\n\
    \n电报于 1792 年发明，使得远距离传递个人消息的速度比骑马信差或驿马车快得多。尽管电报消息很短（很像短信或推文），但它们是一种传播新闻和交流信息的革命性方式。许多人认为那是社交媒体的诞生。\n\
    \n虽然包括美国在内的几个国家继续提供邮政电报，甚至可以向总统或其他官员发送，但德国邮政服务在 2022 年新年前夜关闭了其电报服务[39]。\n\n![](img/600273_1_En_1_Fig1_HTML.png)\n\
    \n一张莫尔斯-维尔电报键的照片。\n\n图 1-1\n\n莫尔斯-维尔电报键\n\n## 近代历史\n\n在 20 世纪，我们现在所熟知的信息技术始于康拉德·楚泽、乔治·斯蒂比兹或霍华德·艾肯等先驱，当然还有艾伦·图灵，他创造了图灵测试作为人工智能和社交机器人的基准。\n"
- fmt: '### Generation X


    In 1975, shortly before the American military pulled out of Vietnam, the libertarian
    thinker Samuel Edward Konkin III introduced a philosophy called Agorism, a social
    philosophy of counter-economics and the ideas associated with that practice [5].
    In a market anarchist society, law and security would be provided by market actors
    instead of political institutions. Agorists recognize that the situation cannot
    develop through political reform. Instead, it shall arise as a result of market
    processes. Aspects of its social values can be found today in the Occupy Movement,
    its primary goal being to make the economic and political relations in all societies
    less vertically hierarchical and more flatly distributed. Or in protest parties
    like Beppe Grillo in Italy, Syriza in Greece (where it even took over government),
    Podemos in Spain, or the Pirate Parties. Agorism also put forth the idea of using
    different currencies, something modern social media and related online communities
    are adopting with digital currencies like Bitcoin.


    In 1966, the email was invented, `ARPANET`, a network of computers created by
    the US military about a year later, followed by the arrival of `CompuServe` in
    1969. `CompuServe` launched its email service in the late 1980s and expanded into
    early 1990s, before finally dissolving original `CompuServe` in 2009 after several
    takeovers.


    `Usenet` started up in 1979 and provided its users with forums and newsgroups.
    Surprisingly, most of their functions have changed very little and still exist
    today.


    `Internet Relay Chat` (`IRC`) began in 1988 and was widely used across academic
    networks before emerging into what is now the Internet. `IRC` remains quite active
    today, although it is largely overshadowed by other short messaging services like
    Twitter. There are still around 3200 `IRC` servers around the world with hundreds
    of thousands of channels available.


    ### Millennials


    Based on the notion of Six Degrees of Separation [6], the first modern social
    network, `sixdegrees.com`, was founded in 1997. It allowed members to link to
    other members as friends, write messages, or post on bulletin boards. After being
    sold onto another company for $125 million, it was shut down in 2001 with roughly
    around one million users. It later made a minor comeback and still exists today.


    When services like Amazon, Yahoo!, and, in 1998, Google first came into existence,
    they were not considered social networks. In 1995, Microsoft picked up on the
    emerging trends by launching the Microsoft Network (`MSN`). `MSN` became known
    as a “portal,” another word for personalized online community. It wasn’t surprising
    when many portal products, servers, and vendors jumped the social bandwagon a
    few years later.


    Both Microsoft and Yahoo! had fallen behind some of social media’s new kids on
    the block, and besides a rather brilliant and fast move with YouTube, most other
    aspects of social media were also a bit underestimated by Google, until it returned
    via Google+ and is certainly here to stay even if it may not lead every aspect
    of it. Yahoo! also offers plenty of social features and has since its recent recovery
    taken over smaller vendors in the social networking space like Flickr or Tumblr.
    In 1999, Brad Fitzpatrick, who later also worked at Google, founded `LiveJournal`.


    ### Generation Z


    At the start of the 2000s, many social networks were founded, although not so
    many of them survived until today. `Hot or Not` (`AmIHotOrNot.com`) was founded
    in October 2000 by James Hong and Jim Young, two friends and fellow students at
    the University of California in Berkeley. The initial motivation for the site
    was an argument about women’s attractiveness by the founders. It was the first
    site to upload photos for others to rate and allegedly influenced the creators
    of Facebook or YouTube. In 2008, `Hot or Not` was sold for a rumored $20 million
    to the owners of online dating service Ashley Madison (which later became infamous
    for losing all its customer data to hackers) and in 2012 purchased by Badoo, which
    is now part of the Bumble dating app conglomerate.


    While the URL still exists, the app has been rebranded to “Chat & Date” and has
    very little in common with the original site, but `Hot or Not` can of course be
    seen as the first predecessor to modern dating apps like Tinder.


    `Friendster`, founded in 2002, was originally also planned as a dating site similar
    to `Hot or Not`, but it became a site to connect with like-minded people and their
    common friends. It contained a profile and status updates, allowing you to share
    your mood and exchange messages.


    Until early 2004 it was the biggest and most popular social network, something
    that eventually doomed it, because it could not scale to handle user demand and
    left many of them frustrated, looking for alternatives. In 2003, Google offered
    $30 million to purchase `Friendster`, but the founders turned that offer down.
    In 2009, it was acquired after all by an Internet company named MOL Global in
    Kuala Lumpur. Besides a mostly Asian user base, `Friendster`’s patents were also
    a vital asset, including one for a “system, method, and apparatus for connecting
    users in an online computer system based on their relationships within social
    networks.” Most of these core social infrastructure patents were bought by Facebook
    for $40 million in 2010.


    A year later `Friendster` became a social gaming site. On June 14, 2015, the site
    was shut down, and three years later in 2018, the company was terminated.


    Also founded in 2002, `LinkedIn`, later sometimes considered a “Myspace for adults,”
    was the first social network to offer users a paid premium package. Its job market
    and subscriptions helped it to become profitable in 2006. The job market and online
    resume would become a key feature, making it a more professional social network
    compared to others.


    In 2011, `LinkedIn` filed an IPO. Five years later in 2016, Microsoft acquired
    `LinkedIn` for $26.2 billion, the second largest acquisition behind the video
    game producer Activision Blizzard, Microsoft tried to buy for $68.7 billion in
    2022 [42]. UK regulators had raised concerns, but eventually on October 13, 2023
    (even a Friday) they approved it.


    `Myspace` (`MySpace` before its rebranding in 2012), `Friendster`’s biggest rival
    that started in 2003, benefited most from frustration about the technical issues.
    Originally inspired by `Friendster`, it also offered some improvements like customization
    or public profiles that did not require logging into it first. In February 2005,
    `Myspace` rejected an offer by Mark Zuckerberg to sell Facebook for $75 million.
    Just a few months later, Fox News parent company News Corporation purchased `Myspace`
    itself for USD 580 million. Until 2008 `Myspace` was the leading social networking
    site, but it was surpassed by Facebook in 2009 and since then rapidly lost users.
    In June 2011, Specific Media Group and Justin Timberlake purchased `Myspace` for
    approximately $35 million after News Corp had nearly paid a billion 6 years earlier.
    A reason for Timberlake’s involvement was that `Myspace` had its own record label
    after the News Corp. takeover and it generally appealed more to artists. Between
    2016 and 2018 through a series of takeovers, `Myspace` got purchased by what’s
    now the Dotdash Meredith media group.'
