    \n> *From the streets of Cairo and the Arab Spring, to Occupy Wall Street, from\
    \ the busy political calendar to the aftermath of the tsunami in Japan, social\
    \ media was not only sharing the news but driving it.*\n> \n> —Dan Rather (American\
    \ journalist, eight-time Peabody award winner)\n\nFreedom of expression, especially\
    \ when inspired by innocent intention, is the defining force behind open societies.\
    \ This powerful force now has new wings thanks to social media. Social media grants\
    \ voice to the unheard all around this ever turbulent little planet of ours, and\
    \ we are still only beginning to see what it can do `–` be it in Kiev, Moscow,\
    \ Minneapolis, Ferguson, Tunis, Cairo, Riyadh, Tehran, Hong Kong, Beijing, Tel\
    \ Aviv, or Gaza.\n\nDespite the pivotal role social media plays in modern life,\
    \ there are few books that cover the topic of social media and Java. What little\
    \ material there is usually covers the most common use case `–` federated security\
    \ using OIDC and JWT. Perhaps consequently, there are few Java applications that\
    \ fully utilize social media despite the wide open space of what is possible.\
    \ This is precisely why this book is so important. It provides a great background\
    \ of the social media industry, explains the core concepts important for Java\
    \ social media developers, describes the so far relatively feeble efforts toward\
    \ standardization, outlines social security for Java, and of course covers the\
    \ social media frameworks and APIs most relevant to Java. Given the volatility,\
    \ breadth, depth, and complexity of the topic, this book was no doubt a very tough\
    \ one to write. To boot I can’t think of a better person than Werner to write\
    \ the book. He has been involved in the space for a long time ever since the Agorava\
    \ project and the nascent effort to standardize a social media API in Java. His\
    \ command of the space is evident throughout the book.\n\nI hope the book will\
    \ prove invaluable to any Java social media developer.\n\n> —Reza Rahman\n> \n\
