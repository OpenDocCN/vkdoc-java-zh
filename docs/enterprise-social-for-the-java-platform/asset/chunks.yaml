- fmt: "One must add JCA is a fairly old part of the Jakarta EE platform, which received\
    \ a few minor changes when JCA became Jakarta Connectors, but otherwise it is\
    \ still quite old, similar to, for example, Jakarta Enterprise Beans (EJB). So\
    \ compared to some of the new, often cloud native and API-based ERP solutions\
    \ along the lines of Salesforce.com, it seems a bit outdated and is also among\
    \ the lesser known and used parts of Jakarta EE. Though the JSR 357 proposal did\
    \ not explicitly phrase it the “JCA way,” it is also possible some of the supporters\
    \ and JCA experts (besides Oracle that was mostly IBM or SAP, most other companies\
    \ now dominating in the Cloud didn’t even exist when JCA was originally designed)\
    \ felt the little “dinosaur” they fostered could be threatened by a new standard\
    \ like a Java Social Connector API.\n\n## Core\n\n`Agorava Core` includes common,\
    \ social networking services that are independent of a particular service provider,\
    \ offering features such as:\n\n*   OAuth connectors to authenticate against OAuth\
    \ providers\n*   Support for generic authentication and user profile management\n\
    *   A social multi-account service supporting:\n    *   Multiple social network\
    \ connections\n    *   Multiple sessions for the same social network provider,\
    \ for example, connected to multiple user accounts or queries at the same time\n\
    \n`Agorava Core` also provides implementations of these services. The main implementation\
    \ is based on CDI and DeltaSpike right now, but most services have been generalized\
    \ using JSR 330 (now Jakarta Dependency Injection), which allows more lightweight\
    \ Java SE alternatives like Google Guice, Dagger, or the SE version of the CDI\
    \ Implementation Weld.\n\n![](images/600273_1_En_6_Chapter/600273_1_En_6_Fig3_HTML.jpg)\n\
    \nA block diagram depicts the Agorava picket link applications. It includes O\
    \ Auth provider, request, service, rest service, app settings, rest request, user\
    \ profile, token, session, social media A P I hub, and abstract social media A\
    \ P I. The interconnections are by dotted lines.\n\n**Figure 6-3** Agorava Core\
    \ API Architecture\n\n### Agorava PicketLink\n\nWorking together with OAuth functionality\
    \ and user profile management, `Agorava Core` also contains a security subsystem\
    \ based on PicketLink.\n\nAs promised in 2.3.2, here is the specialized Agorava\
    \ version of the PicketLink `BaseAuthenticator`:\n\n```\n@Generic\npublic class\
    \ AgoravaAuthenticator extends BaseAuthenticator {\n@InjectWithQualifier\nOAuthAppSettings\
    \ settings;\n@Inject\nDefaultLoginCredentials credentials;\n@Inject\n@DeltaSpike\n\
    Instance response;\n@Inject\nOAuthLifeCycleService lifeCycleService;\n@Override\n\
    public void authenticate() {\nif (lifeCycleService.getCurrentSession().isConnected())\
    \ {\nOAuthSession session = lifeCycleService.getCurrentSession();\nUserProfile\
    \ userProfile = session.getUserProfile();\ncredentials.setCredential(session.getAccessToken());\n\
    setStatus(AuthenticationStatus.SUCCESS);\nUser user = new User(userProfile.getId());\n\
    user.setFirstName(userProfile.getFullName());\nsetAccount(user);\n} else {\nString\
    \ authorizationUrl = lifeCycleService.startDanceFor(settings.getQualifier());\n\
    try {\nresponse.get().sendRedirect(authorizationUrl);\n} catch (IOException e)\
    \ {\ne.printStackTrace();\n}\ncredentials.setStatus(Status.IN_PROGRESS);\nsetStatus(AuthenticationStatus.DEFERRED);\n\
    }\n}\n}\n```\n\n## Connectors\n\n`Agorava` currently comes with default connectors\
    \ to:\n\n*   Facebook\n*   LinkedIn\n*   GitHub\n*   Twitter\n*   XING\n\nIn addition\
    \ to those, third-party Agorava Connectors were created for services like:\n\n\
    *   Empire Avenue\n*   Google+\n*   Instagram\n*   Meetup\n*   Stack Overflow\n\
    *   TripIt\n*   WordPress\n*   Yammer\n\n## Socializer\n\n`Socializer` is a real-life\
    \ demonstration web app for `Agorava`; think of it as its “Pet Clinic.” It allows\
    \ you to connect to various social networks and see your timeline or post updates.\
    \ `Agorava Socializer` was also ported from JavaServer Faces to the Apache Wicket\
    \ Web Framework or AngularJS. Both ports were still rather experimental and therefore\
    \ never became official parts of the `Agorava` ecosystem."
