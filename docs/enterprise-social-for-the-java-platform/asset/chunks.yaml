    根据网站信息，Mastodon 有三个 Java 客户端，但只有 BigBone 看起来还算活跃。\n\nBigBone\nBigBone 是 Mastodon4J\
    \ 项目的一个分支，是一个用于 Java 和 Kotlin 的客户端库。\n\n概述\n\nBigBone 的主要特性如下：\n\n*   对您时间线上的嘟文进行操作\n\
    \n    *   主页\n\n    *   本地\n\n    *   联合\n\n*   发布新嘟文或编辑现有嘟文（包括媒体上传）\n\n*   收藏和书签嘟文\n\
    \n*   管理列表\n\n*   发布投票或参与投票\n\n*   安排嘟文\n\n*   向其他人发送私信\n\n*   管理过滤器\n\n*   关注/取消关注话题标签\n\
    \n安装\n将以下内容添加到您项目的 Maven POM 中。\n\n**快照仓库**\n\n```\n\nmaven-central-snapshots\n\
    Maven Central Snapshot Repository        https://s01.oss.sonatype.org/content/repositories/snapshots/\n\
    \nfalse\n\ntrue\n\n```\n\n**依赖项**\n\n```\nsocial.bigbone\nbigbone\n2.0.0-SNAPSHOT\n\
    \nsocial.bigbone\nbigbone-rx\n2.0.0-SNAPSHOT\n\n```\n\n示例\n**获取访问令牌**\n[`https://docs.joinmastodon.org/methods/apps/`](https://docs.joinmastodon.org/methods/apps/)\n\
    \n**获取时间线**\n\n```\npublic class GetPublicTimeline {\npublic static void main(final\
    \ String[] args) throws BigBoneRequestException {\nfinal String instance = args[0];\n\
    // 实例化客户端\nfinal MastodonClient client = new MastodonClient.Builder(instance)\n\
    .build();\n// 从公共时间线获取嘟文\nfinal Pageable statuses = client.timelines().getPublicTimeline(LOCAL_AND_REMOTE).execute();\n\
    statuses.getPart().forEach(status -> System.out.println(status.getContent()));\n\
    }\n}\n```\n\n**获取实例信息**\n\n```\npublic class GetInstanceInfo {\npublic static\
    \ void main(final String[] args) throws BigBoneRequestException {\nfinal String\
    \ instance = args[0];\n// 实例化客户端\nfinal MastodonClient client = new MastodonClient.Builder(instance)\n\
    .build();\n// 获取实例信息并以 JSON 格式转储到控制台\nfinal Instance instanceInfo = client.instances().getInstance().execute();\n\
    final Gson gson = new Gson();\nSystem.out.println(gson.toJson(instanceInfo));\n\
    }\n}\n```\n\n**获取书签**\n\n```\npublic class GetBookmarks {\npublic static void\
    \ main(final String[] args) throws BigBoneRequestException {\nfinal String instance\
    \ = args[0];\nfinal String accessToken = args[1];\n// 实例化客户端\nfinal MastodonClient\
    \ client = new MastodonClient.Builder(instance)\n.accessToken(accessToken)\n.build();\n\
    // 获取书签\nfinal Pageable bookmarks = client.bookmarks().getBookmarks().execute();\n\
    bookmarks.getPart().forEach(bookmark -> {\nString statusText = bookmark.getContent()\
    \ + \"\\n\";\nSystem.out.print(statusText);\n});\n}\n}\n```\n\n**执行简单搜索**\n\n\
    ```\npublic class PerformSimpleSearch {\npublic static void main(final String[]\
    \ args) throws BigBoneRequestException {\nfinal String instance = args[0];\nfinal\
    \ String accessToken = args[1];\nfinal String searchTerm = args[2];\n// 实例化客户端\n\
    final MastodonClient client = new MastodonClient.Builder(instance)\n.accessToken(accessToken)\n\
    .build();\n// 执行搜索并打印结果\nfinal Search searchResult = client.search().searchContent(searchTerm).execute();\n\
    searchResult.getAccounts().forEach(account -> System.out.println(account.getDisplayName()));\n\
    searchResult.getStatuses().forEach(status -> System.out.println(status.getContent()));\n\
    searchResult.getHashtags().forEach(hashtag -> System.out.println(hashtag.getName()));\n\
    }\n}\n```\n\nTwitter/X\n这个前身为 Twitter 的社交网络至少有两个 Java 客户端，它们围绕 Twitter/X REST\
    \ API 封装了对象模型。\n\nTwitter API Client\n2021 年 8 月，Twitter 推出了自己的 Java API 客户端库\
    \ [35]。这相当晚，尽管 Twitter 一直是 JCP [11] 的积极参与者，并在湾区主办过多次 JCP EC F2F 会议，但仅支持 Twitter\
    \ v2 API，这似乎是说服开发者迁移到新 API 的一项措施。GitHub 仓库仍然写着“此 SDK 处于测试阶段，尚未准备好用于生产环境”，并且只有三位提交者的贡献；他们似乎都在\
    \ Elon Musk 收购前后离开了公司。\n\n安装\n\n将此依赖项添加到您项目的 POM 中：\n\n```\ncom.twitter\ntwitter-api-java-sdk\n\
    2.0.3\n\n```\n\nTWITTER 到 X 的迁移\n\n随着 Elon Musk 将 Twitter 重塑为 X，在某个时候，即使是 twitter.com\
    \ 等域名或其下的 URL 也可能被关闭并不再工作。这可能会影响此处列出的一些设置和步骤。\n\n示例\n\n您必须首先注册一个 Twitter 应用程序，以获得访问\
    \ Twitter API 的用户名和密码。要注册一个用于 API 客户端的新应用程序：\n\n1.  转到 [`https://dev.twitter.com`](https://dev.twitter.com)\n\
    \n2.  登录并点击 **创建应用**\n\n3.  点击 **添加新应用程序**\n\n4.  在 **应用信息** 下，为以下参数输入值：\n\n \
    \   *   应用名称 – 这是您的应用程序的名称，显示在每个帖子的末尾，例如，您的公司名称。\n\n    *   应用描述 – 输入应用程序的简短描述。\n\
    \n    *   网站 – 这是您网站的 URL，例如，[`http://www.mysite.com`](http://www.mysite.com)。\n\
    \n    *   回调 URL – 将其设置为 http://domain/wps/wcmsocial/servlet/oAuthCB/twitter，其中“domain”是您的域名。\n\
    \n5.  阅读条款和条件，并选择 **我同意**。\n\n6.  如果需要，输入安全/验证码信息。\n\n7.  将显示您的消费者密钥和消费者密钥。将它们写在安全的地方。\n\
    \n8.  点击 **设置** 选项卡。\n\n9.  在 **应用程序类型** 部分，将 **访问** 属性设置为读取和写入。\n\n10.  点击 **更新此\
    \ Twitter 应用程序的设置**。\n\n**API 示例**\n\n```\npublic class TwitterApiExample {\n\
    public static void main(String[] args) {\n/**\n* 为所需的 API 设置凭据。\n* Java SDK 支持\
    \ TwitterCredentialsOAuth2 和 TwitterCredentialsBearer。\n* 检查 https://api.twitter.com/2/openapi.json\
    \ 中所需 API 的 'security' 标签，\n* 以使用正确的凭据对象。\n*/\nTwitterApi apiInstance = new TwitterApi(new\
    \ TwitterCredentialsOAuth2(\nSystem.getenv(\"TWITTER_OAUTH2_CLIENT_ID\"),\nSystem.getenv(\"\
    TWITTER_OAUTH2_CLIENT_SECRET\"),\nSystem.getenv(\"TWITTER_OAUTH2_ACCESS_TOKEN\"\
    ),\nSystem.getenv(\"TWITTER_OAUTH2_REFRESH_TOKEN\")));\nSet tweetFields = new\
    \ HashSet();\ntweetFields.add(\"author_id\");\ntweetFields.add(\"id\");\ntweetFields.add(\"\
    created_at\");\ntry {\n// findTweetById\nGet2TweetsIdResponse result = apiInstance.tweets().findTweetById(\"\
    20\")\n.tweetFields(tweetFields)\n.execute();\nif(result.getErrors() != null &&\
    \ result.getErrors().size() > 0) {\nSystem.out.println(\"错误:\");\nresult.getErrors().forEach(e\
    \ -> {\nSystem.out.println(e.toString());\nif (e instanceof ResourceUnauthorizedProblem)\
    \ {\nSystem.out.println(((ResourceUnauthorizedProblem) e).getTitle() + \" \" +\
    \ ((ResourceUnauthorizedProblem) e).getDetail());\n}\n});\n} else {\nSystem.out.println(\"\
    findTweetById - 推文文本: \" + result.toString());\n}\n} catch (ApiException e) {\n\
    System.err.println(\"状态码: \" + e.getCode());\nSystem.err.println(\"原因: \" + e.getResponseBody());\n\
