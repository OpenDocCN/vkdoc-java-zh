    Agorava is often explained as a sort of “Java Connector Architecture\nfor Social.”\
    \ And indeed, there are striking similarities between the\nidea behind Agorava\
    \ and what Jakarta Connectors (formerly JCA) does\nunder the Jakarta EE umbrella.\n\
    Jakarta Connectors defines a standard architecture for connecting the\nJakarta\
    \ EE platform to heterogeneous Enterprise Information Systems\n(EIS) including\
    \ transaction processing systems such as CICS\nTransaction Server and Enterprise\
    \ Resource Planning\n(ERP) systems like SAP, especially the so-called Common Client\
    \ Interface\n(CCI), which defined a standard client API allowing applications\n\
    to access multiple resource adapters.\n\n![](images/600273_1_En_6_Chapter/600273_1_En_6_Fig2_HTML.jpg)\n\
    \nA schematic of J C A common client interface application. It begins\nwith a\
    \ Java application, followed by three resource adapters, and the\nrespective enterprise\
    \ information system.\n\nFigure 6-2\nJCA Common Client Interface"
