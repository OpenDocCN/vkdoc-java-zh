- fmt: "#### Use Cases\n\nTwo of the main use cases for JSON Web Token are as follows:\n\
    \n- Authorization\n- Information Exchange\n\nAuthorization is probably the most\
    \ common use case for JWT. Once the user has logged into a system, each subsequent\
    \ request will include the JWT, allowing the user to access pages, services, and\
    \ resources that are permitted by that token. Single Sign-On is a feature that\
    \ widely uses JWT nowadays, especially in public APIs, because of its small overhead\
    \ and ability to be easily used across different domains.\n\nInformation Exchange:\
    \ JSON Web Tokens are a good way of securely transmitting information between\
    \ parties. Because JWTs can be signed – for example, using public/private key\
    \ pairs – you can be sure the senders are who they say they are. Additionally,\
    \ as the signature is calculated using the header and the payload, you can also\
    \ verify that the content has not been tampered with.\n\n#### Why Do We Need JWT?\n\
    \nThe HTTP protocol is stateless; therefore, a new request such as `GET /order/42`\
    \ doesn’t know anything about the previous ones like `PUT /order` with the same\
    \ id, and a user would have to authenticate again for every new request.\n\n![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig9_HTML.jpg)\n\
    \nA set of two samples of repeating authentication. 1, Put order function including\
    \ username, password, and I D. The communication begins with client, verify username\
    \ and password, identity provider, if ok then moves to server, and return 201\
    \ created. 2, Here get order function is used.\n\n**Figure 4-9** Repeating Authentication\
    \ for Every New HTTP API Request\n\nThis is often dealt with by using Server-Side\
    \ Sessions (SSS). First, the login credentials are like username and password\
    \ are checked, and if they are correct, the server will create a session id, store\
    \ it, and return it to the client. In Jakarta EE applications based on Servlets,\
    \ this cookie sent to the client is usually called `JSESSIONID`.\n\n![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig10_HTML.jpg)\n\
    \nA set of three samples depict the reductions of the numbers of authentications.\
    \ Post authenticate including username and password. The communication begins\
    \ with client, verify username, and password, identity provider, server, and J\
    \ session I D equals A B C, and finally client.\n\n**Figure 4-10** Using SSS,\
    \ Reducing the Number of Authentications Against the Identity Provider\n\nThis\
    \ approach can fix one problem but may create others like scalability issues.\
    \ While Server-Side Sessions may work well for most websites and even a few e-commerce\
    \ shops, in an API-driven era, some endpoints can face a massive number of requests\
    \ forcing the provider to scale. There are two ways to scale:\n\n- Vertical scaling\n\
    - Horizontal scaling\n\nVertical scaling means adding more resources like memory,\
    \ storage, or CPU cores to a server. This can be quite expensive and also reach\
    \ certain limits, for example, the number of CPUs, memory slots, or disk storage\
    \ per server.\n\nHorizontal scaling scales out your infrastructure by adding more\
    \ servers behind a **load balancer**, which is usually more efficient and cost-effective\
    \ than upgrading each of the servers all the time. While scaling horizontally\
    \ is usually more efficient, it leads to further problems and complexity even\
    \ with just one location and load balancer.\n\nImagine a single server behind\
    \ a load balancer and a client performing a request using a `JSESSIONID` like\
    \ `abc`; that session id can be found in the server’s memory.\n\n![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig11_HTML.jpg)\n\
    \nA sample communication between the client and the server. It begins with client,\
    \ followed by get order 42 J session equals A B C, check in memory for J session\
    \ I D, server 1.1, load balancer, and return order with I D 42 to client.\n\n\
    **Figure 4-11** Single Server Behind a Load Balancer\n\nIf the infrastructure\
    \ needs to scale and a new server is added behind the load balancer this new server\
    \ gets to handle the next request by a client using `abc`, it will not recognize\
    \ that `JSESSIONID`.\n\n![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig12_HTML.jpg)\n\
    \nA sample communication between the server and the client. It begins with client,\
    \ followed by get order J session equals A B C, server 1.1, check in memory is\
    \ not recognized, server 2.2, load balancer, and returns unauthenticated error\
    \ to the client.\n\n**Figure 4-12** New Server Behind LB, User Not Recognized\n\
    \nAuthentication fails because the new server has no `abc` sessions in its memory\
    \ yet. There are three main workarounds to address this.\n\nSynchronize the sessions\
    \ between servers, which can be tricky and error-prone, especially in a globally\
    \ distributed architecture.\n\nUse an external database or session caching mechanism.\
    \ This can be helpful but adds more components to the infrastructure, and especially\
    \ in a distributed environment, this cache or DB will need its own replication.\n\
    \nOr accept the stateless nature of HTTP and try to find a solution that works\
    \ for it.\n\nThat’s where JSON Web Token comes to the rescue, because each token\
    \ is compact and self-contained, so it contains all the necessary information\
    \ to allow or deny an API request without having to perform any replication or\
    \ costly lookups first.\n\n#### How Does It Work?\n\nToken-based authentication\
    \ mechanisms allow systems to authenticate, authorize, and verify identities based\
    \ on a security token. Usually, the following entities are involved:\n\n- **Issuer**\
    \ – Responsible for issuing security tokens as a result of successfully asserting\
    \ an identity (authentication). Issuers are usually related with identity providers.\n\
    - **Client** – Represented by an application to which the token was issued for.\
    \ Clients are usually related to service providers. A client may also act as an\
    \ intermediary between a subject and a target service (delegation).\n- **Subject**\
    \ – The entity to which the information in a token refers to.\n- **Resource server**\
    \ – Represented by an application that is going to consume the token in order\
    \ to check if it grants access or not to a protected resource.\n\nIndependent\
    \ of the token format or applied protocol, from a service perspective, token-based\
    \ authentication is comprised of the following steps:\n\n1. Extract security token\
    \ from the request.  \n   For RESTful services, this is usually achieved by obtaining\
    \ the token from the `Authorization` header.\n\n2. Perform validation checks against\
    \ the token.  \n   This step usually depends on the token format and security\
    \ protocol in use. The objective is to make sure the token is valid and can be\
    \ consumed by the application. It may involve signature, encryption, and expiration\
    \ checks.\n\n3. Introspect the token and extract information about the subject.\
    \  \n   This step usually depends on the token format and security protocol in\
    \ use. The objective is to obtain all the necessary information about the subject\
    \ from the token.\n\n4. Create a security context for the subject.  \n   Based\
    \ on the information extracted from the token, the application creates a security\
    \ context for the subject in order to use the information wherever necessary when\
    \ serving protected resources.\n\n#### JWT Structure\n\nA JSON Web Token has three\
    \ parts:\n\n- Header\n- Payload\n- Signature\n\nEach of these parts is separated\
    \ by a `.` character.\n\nTherefore, every JWT looks like\n\n```\nHeader.Payload.Signature\n\
    ```"
