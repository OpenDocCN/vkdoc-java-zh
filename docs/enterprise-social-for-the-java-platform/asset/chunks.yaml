  trans: '

    #### DaliCore


    在甲骨文收购太阳微系统公司后，被弃用的 SocialSite 在 DaliCore 中找到了其最佳的等价物和继任者 [22]。


    它最初基于一家比利时初创公司开发的 CMS，主要围绕 BeJUG（Devoxx 会议）的成员，如 Johan Vos。DaliCMS（2006 年）被称为“Web
    2.0 就绪的 CMS”。


    它主要是一个带有社区功能的开源项目。2008 年，大约在太阳微系统公司对 SocialSite 做同样事情的时候，DaliCMS 增加了对 Shindig
    的支持，主要是来自 Shindig 的 JavaScript 代码以及 DaliCMS 提供的一些 Java 代码。


    最终，它不再仅仅是一个 CMS，其底层模块演变成了 DaliCore。在 2013 年 JavaOne 大会的演讲中，Johan 揭示了“Dali”这一名称的由来，它代表“荷兰亚马逊爱好者倡议”（Dutch
    Amazon Lovers Initiative）`–`，这是对互联网和云先驱亚马逊的一种致敬。


    DaliCore 在 Java EE 6 之上增加了用户管理、内容或权限等通用功能，并重点关注用户和权限。在几乎所有使用 DaliCore 的项目中，用户都应该能够使用现有的凭据（如
    Facebook、Twitter、Google+、LinkedIn 等）登录。所谓的 Dali 模块扩展了 DaliCore。虽然存在与 Facebook
    等社交提供商的连接，但这些连接主要作为 DaliCore 单点登录（SSO）功能的认证提供者。除此之外，DaliCore 旨在提供信息。


    DaliCore 的重要方面如下：


    *   主要是一个社交容器和 CMS，具有部分开放社交功能。

    *   通过 EJB、JPA 或类似标准提供 Java 持久化支持。

    *   模块之间没有清晰的分离，特别是 API/规范与实现，在大多数情况下共享相同的模块甚至包空间，尽管试图通过 Dali 模块实现复用和扩展，但这反而使其更加困难。

    *   看起来有点笨重，对完整的 Java EE 配置文件有强依赖性，也就是说，仅使用其 Web 配置文件看起来更困难。

    *   GlassFish 的支持和集成是积极的，它是首选的应用程序服务器。得益于 Java EE 标准，与其他容器一起使用并非不可能，但似乎更困难。

    *   它在一些客户的重度使用下也展示了可扩展性，例如比利时的一个电子投票网站。与 Apache Shindig 或 Sun SocialSite（在大多数情况下，DaliCore
    似乎是其自然继任者）不同，它至少在比荷卢经济联盟国家有实际客户在使用。


    在甲骨文宣布将不再为 GlassFish 提供商业支持或增强功能（如集群，超出 Java EE 参考实现提供的概念验证质量后，该功能将保留）、性能调优等之后，DaliCore
    的一个主要优势消失了。甲骨文推荐其 WebLogic/Fusion Middleware 产品，或者当前的 GlassFish 用户如果需要商业支持，将被迫迁移到其他服务器。


    DaliCore 的作者 Johan Vos 和他的比利时初创公司随后声称他们将为客户提供商业支持，甚至可能尝试扩展该支持，但 DaliCore 显然成为了此事的受害者。自
    2013 年初以来，java.net 仓库中就没有任何活动了，并且在甲骨文于 2017 年关闭 java.net 后，没有任何内容被迁移到其他地方，至少没有迁移到公开可用的网站。虽然
    Johan Vos 当时告诉我们他仍在开发它，但他也确认这是在 Bitbucket 的一个私有仓库中进行的。因此，DaliCore 再也没有成为开源项目，现在必须被视为已死亡。


    ### Spring Social


    SpringSource 已被其母公司重新命名为 Pivotal，最终再次成为 VMware 的一部分。该公司有着悠久的历史，热衷于追随潮流，并为其 Spring
    框架提供几乎涵盖所有方面的库或扩展。


    Spring Social [25] 是一个用于消费信息的绑定库。虽然将 OAuth 与 Spring Security 及其他部分集成是基本 API 的典型特征，但它比这里提到的其他大多数解决方案展示了更多高阶
    API 的特性。


    Spring Social 的重要方面如下：


    *   出于显而易见的原因，它主要与 Spring 框架或 Spring 生态系统的其他部分一起使用。

    *   除 Spring MVC 之外的 UI 框架相对更难集成。

    *   官方的 Spring Social 连接器主要集中在 Facebook 上；示例仅展示了单一服务方法。

    *   尽管 Spring 社区在其他方面非常活跃，但它已不再得到积极支持。

    *   Spring Social 背后只有一两个活跃的提交者和推动者，且受雇于同一家公司。


    我们将在第 6 章中展示更多关于 Spring Social 的内容。


    ### Microsoft Embedded Social


    Microsoft Embedded Social [34] 成立于 2012 年 5 月 15 日，是一个用于应用程序内社交用户参与的多租户云服务。虽然主要是一个研究项目，但其项目页面声称它曾一度被超过
    2000 万用户使用。


    它旨在跨多个社交网络提供抽象层，有点像其他类似的工作，如 OpenSocial、Seam Social、Spring Social 或 Agorava。


    ![](img/600273_1_En_3_Fig7_HTML.jpg)


    服务器架构概览。它包括 Blob 存储、表存储、Redis 缓存、搜索、滥用报告、推送通知、密钥保管库、电子邮件报告、Geneva 监控、内容验证、CDN、Web
    角色、服务总线队列、辅助角色等。


    图 3-7


    Embedded Social 服务器架构


    其功能包括：


    *   用户认证

    *   用户资料

    *   话题

    *   表情

    *   社交图谱

    *   动态信息流

    *   内容审核

    *   搜索

    *   热门和最新


    除了用于微软在 2016 年收购的 LinkedIn 之外，Embedded Social 似乎主要是学术性的，类似于谷歌的 20% 项目，并且尽管直到 2020
    年左右仍有相关出版物，但该项目现在似乎或多或少已不活跃并被弃用。


    ### Seam Social


    Seam Social 是 JBoss Seam 3 项目的一部分，在 CDI [28] 等 Java EE 标准之上提供社交连接功能。Seam Social
    是一个用于消费信息的绑定库。虽然基于 CDI 和 Java EE 的 OAuth 可以被视为基本 API，但 Seam Social 是 Agorava 之前最丰富的高阶
    API，特别是通过为社交行为（如点赞、签到或用户时间线更新）提供 CDI 事件。常见的 API 绑定在大多数情况下由提供商的 API 定义决定，或者有时直接从其中生成，其灵感来源于
    Spring Social，但 Seam Social 从来不是 Spring Social 的克隆或分支，因为它与 Spring Social 的关系，就如同底层的
    CDI 和扩展与 Spring 框架的关系一样。


    2012 年初，Seam 被停止开发，转而与 Apache DeltaSpike 合并，这也是 Seam Social 继续前进的原因……最终演变为 Agorava
    [33]。

