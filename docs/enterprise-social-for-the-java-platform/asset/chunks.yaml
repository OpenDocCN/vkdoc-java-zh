  trans: '

    ## Mashup


    随着 Java 语言首先在桌面端（早期主要通过 Java applet，或 AWT/Swing 独立应用程序）扮演越来越重要的角色，随后在世纪之交也在服务器端崭露头角，Sun
    公司及其他企业开始在 Java Community Process（成立于 1998 年）或 JCP [11] 中标准化 Java 平台的各个部分。在最早的成员中，IBM、Intel、Fujitsu、Sun
    和 Oracle（这两家自 2010 年起合并）至今仍活跃其中。


    在两次被否决或撤回之后，一个针对社交网络（当时常被称为“门户”，参见早期的 MSN）的著名标准是 JSR 168，即 Java Portlet 规范 [48]。在理想情况下，它允许门户应用程序部署到多个门户服务器中，不受供应商限制，并且与其他标准（尤其是
    OASIS 定义的 WSRP，即远程 Portlet 的 Web 服务）一起，为这些应用程序之间（甚至跨不同门户）的互操作性带来了希望。十年后，随着其他技术和语言（尤其是“轻量级容器”）的兴起，Java
    Portlet 标准在 2017 年迎来了 3.0 版本更新（JSR 362），并计划在可能的情况下纳入一些社交标准，但这些标准最终未能再被纳入 Portlet
    规范。


    虽然 Portlet 及相关标准主要仍是大规模企业应用服务器的领域（其灵感来源于音乐或视频混编或混音），但在第一个 Portlet 标准之后不久，一种更语言和平台中立的方法——称为
    Mashup [12]——开始兴起。无论是 Yahoo Pipes、Microsoft Popfly、Google Mashup Editor、IBM Mashup
    Center 还是 BEA AquaLogic [13]，它们都承诺提供互操作性和个性化小部件，并提供类似于 iGoogle 的体验。这项服务（主要由于 Google+
    将个性化和更“集成社交媒体”的方法提升到了新高度）于 2013 年 11 月 1 日关闭。


    RSS 也是如此，仅在 Aaron Swartz 去世几个月后。Google Reader 于 2013 年 7 月 1 日停止服务。虽然 Swartz 在其未完成的著作
    [10] 中最后倡导一种基于开放 API 的可编程网络，但大多数大型提供商却另有打算，正如围绕 Google Reader 终结的众多文章（例如这篇 [14]）所表达的那样。


    ## OStatus


    OStatus 是一个用于联合微博客的开放标准，允许用户接收来自其他网站用户的状态更新。该标准结合了一系列开放协议，例如：


    *   Atom

    *   Activity Streams

    *   WebSub

    *   Salmon

    *   WebFinger


    它始于 2013 年的 StatusNet，后者后来成为 GNU social [60]。当时，它被许多微博客网站采用，但由于对底层技术的失望，大多数网站转而使用
    ActivityPub，包括 Mastodon [61]、Pleroma 或 postActiv。唯一仍在使用 OStatus 的开源社交网络是 Friendica
    [62]，这是一个非常早期的开源项目，始于 2010 年，并且像 GNU social 一样使用 PHP 编写；因此，这两个项目之间的协同效应似乎比其他项目更强。


    ## OpenSocial


    另一个社交标准几乎从其诞生之初就由社区开发塑造：OpenSocial [15] 由 Google 与少数初始支持者（当时仍是最受欢迎的社交网络 MySpace、Ning
    或 Plaxo）共同开发。此时，前面提到的 Portable Contacts 也符合在众多社交网络提供商之间实现易用的小部件和服务的总体理念，这与例如 Java
    Portlet 标准 2.0 版本（大约在同一时间发布了其公开草案）形成对比。


    看似更易用，这也适用于漏洞利用和安全问题，通常由一些几乎还在上小学的“脚本小子”使用少量脚本就能破坏或攻破这些服务和小部件。如果系统管理员尽职尽责，完整规模的
    Java EE 服务器和 Portlet 过去和现在都更难被攻破。而所有关于 Java 安全性或被用于传播恶意软件的喧嚣通常只影响客户端。


    OpenSocial 的绝大部分是 JavaScript 代码，这使得它比主要基于服务器端或精心混合使用服务器端（Jakarta EE 或其他环境）和客户端（JavaScript
    等）的方式更容易暴露。请参见图 3-3，了解一个典型的基于 Web 的企业应用程序（使用 Java EE）的不同层级，但你可以将其替换为其他语言，如 Python、PHP、Ruby
    或 Scala，其层级大致相同。


    ![](img/600273_1_En_3_Fig3_HTML.jpg)


    一个概念流程图展示了典型的基于 Web 的企业应用程序的不同层级。它包括三个阶段：客户端机器、Java 服务器和数据库服务器。客户端机器包含应用程序客户端和动态
    HTML 页面，以及客户端层，其后是其余服务器。


    图 3-3


    N 层企业应用


    虽然 Google 开始在其 Orkut 服务（在拉丁美洲和印度等少数其他国家流行，但在其他地方从未真正流行起来）中使用 OpenSocial，但其他最初计划支持它的供应商却一个接一个地放弃了这些计划。尤其是
    LinkedIn 或 XING 等公司出于安全原因放弃了它。我们将在下一章中更多地讨论安全性和隐私问题。无论是 Facebook 还是 Twitter（过去十年下半叶的两个主导提供商），都从未关心过
    OpenSocial。更重要的是，当情况变得明朗时，Google 扼杀了自己的创造。Google+ 也从未支持过它。少数主要来自服务器和大型企业领域的供应商，如
    IBM、SAP 或 Confluence 的开发者 Atlassian，仍然支持 OpenSocial。


    Dachis Group（于 2014 年被 Sprinklr 收购，是一个社交媒体和企业数据分析的“智库”）也曾深度参与，尽管其重点最近更多地转向了大数据和
    NoSQL 系统等方向，并且它像大多数剩余的 OpenSocial 支持者（或 Thoughtworks 在其定期调查“雷达”中关于值得关注或逐渐淡出的技术）一样公开承认，它唯一可能的位置终究还是企业和内联网。大数据也可以被视为一种
    Mashup，但它主要发生在 EIS 或 DB 层（见图 3-4），因此我在此不多讨论。这些技术也值得单独成书，并且超出了本书的范围。


    ![](img/600273_1_En_3_Fig4_HTML.jpg)


    一个概念图展示了 ActivityPub 的概览。它包含一个收件箱和发件箱，一个读取传入消息的行动者，以及一个接收消息的行动者。向后和向前的箭头分别标记为获取和发布消息。


