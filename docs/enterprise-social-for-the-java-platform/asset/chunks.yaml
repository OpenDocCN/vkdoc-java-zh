- fmt: '## Privacy


    The term privacy comes from “private” and has Latin origin: “prīvātus,” which
    literally means taken away from public affairs.


    While ancient Romans may have been able to hide some of their affairs from public
    audience and famous writers of their time, and the time from something actually
    happening to being written down and consumed by readers was at least days, more
    often months or even years, it can sometimes be just the blink of an eye or click
    of a mouse button today.


    The revelations by whistleblower Edward Snowden were the most extensive but certainly
    not the first case of privacy concerns brought into public light especially with
    regard to social networks or similar online services [37]. The ability to combine
    data from various sources and everyday life aspects into a digital picture and
    footprint of users was in prior decades mostly the domain of police and secret
    service tools like “Dragnet” (not so much the movie, though it referred to the
    system in a humorous way).


    Not just Snowden and his skills now available to his hosts in Russia is a clear
    indicator Western countries and agencies aren’t the only ones interested in such
    information. Many try to control; some simply block or restrict entire services,
    if they are not provided the same access to vital information by the social networks
    as intelligence agencies in their home country, usually the United States, China,
    Russia, or Turkey, the list keeps growing of countries temporarily or permanently
    blocking some providers. If ownership or hosting is outsourced, not for tax but
    cheap workforce reasons, then some services can be affected by practices in these
    countries, too. One of the most popular examples we heard about earlier, because
    `OpenID 1.0` was once created there, is `LiveJournal`. In 2007, it was sold by
    `Six Apart` to the Russian Media group `SUP Media` in December 2007.


    After 2009, most of its production was also moved to Russia, and employees were
    fired in Silicon Valley. Although privately owned, `SUP Media` is clearly controlled
    and also censored by Russian secret services. For example, in 2007, Russian blogger
    Savva Terentyev was accused of fomenting social hatred to the staff of the Ministry
    of Internal Affairs and sentenced to one year probation due to his comment in
    the blog of a local journalist. Not to mention recent murders like that of regime-critical
    Boris Nemtsov in Moscow only hours after he had announced to disclose information
    on Russia’s involvement in Ukraine and the 2014 occupation of Crimea. Ironically
    Even in one of the most tightly censored countries like Russia, there was a tiny
    glimpse of hope, that Social media if not bring real reforms may at least help
    finding clues to his murder [38]. Furthermore, since Russia started a full-blown
    war against Ukraine in early 2022, many Russian soldiers could be attacked by
    Ukrainian forces, because they disclosed their whereabouts on social media or
    dating sites.


    While the argument of “National Security” and trying to catch terrorists or severe
    criminals online was used to justify mass surveillance on a global scale, critical
    bloggers or journalists often risk not just their privacy but lives if their identity
    is unveiled to people and agencies they criticize.


    Although efforts like the “Vorratsdatenspeicherung” by European hosting providers
    and other Internet or mobile companies mean there isn’t total privacy in Europe
    either, most EU countries, especially Germany, have rather strong privacy and
    data protection laws compared to the United States and many other parts of the
    world. A few countries like Iceland (not currently in the EU, but EFTA) have even
    stronger data protection laws, as well as many Scandinavian countries.


    Social networks based in these countries, for example, German `XING` but also
    `Deutsche Telekom` and other Internet companies from Germany like `GMX/1&1`, claim
    their data is safe from direct access by NSA or other spies. Although local and
    international inquiries will be executed by these if probable cause exists against
    a user of serious offenses like murder, terror, organized crime, or child pornography,
    neither of these services are likely to conduct mass screenings of every single
    user on a daily basis like NSA and other agencies do in the United States and
    other countries. Without a warrant to access records or pre-emptively snoop into
    communication, most European users should feel safe if the provider and its servers
    are all genuinely based in Europe and data isn’t sent via connections abroad.'
  raw: '## Privacy


    The term privacy comes from “private” and has Latin origin: “prīvātus,” which
    literally means taken away from public affairs.


    While ancient Romans may have been able to hide some of their affairs from public
    audience and famous writers of their time, and the time from something actually
    happening to being written down and consumed by readers was at least days, more
    often months or even years, it can sometimes be just the blink of an eye or click
    of a mouse button today.


    The revelations by whistleblower Edward Snowden were the most extensive but certainly
    not the first case of privacy concerns brought into public light especially with
    regard to social networks or similar online services [37]. The ability to combine
    data from various sources and everyday life aspects into a digital picture and
    footprint of users was in prior decades mostly the domain of police and secret
    service tools like “Dragnet” (not so much the movie, though it referred to the
    system in a humorous way).


