    \ following steps to set up a social network connection for Twitter/X.\n\n###\
    \ Twitter to X Migration\n\nAs Elon Musk rebrands Twitter to X, at some point,\
    \ even domains like `twitter.com` or URLs underneath that site could be switched\
    \ off and no longer work. That may affect some of the settings and steps mentioned\
    \ in the following text.\n\nYou must first register a Twitter application to obtain\
