- fmt: 'It still exists with roughly around six million users, compared to hundreds
    of millions during its heyday.


    Also, in 2003, Mark Zuckerberg launched `Facemash`, a kind of Harvard University’s
    answer to Berkeley’s Hot or Not, rebranding it as “The Facebook” in 2004. The
    one millionth user joined the same year.


    In 2005, the site dropped the “the” and became just “Facebook,” after the `Facebook.com`
    domain was purchased for $200k, which seemed like a bargain compared to several
    takeovers, most notably Facebook buying up Instagram for close to a billion dollars
    or its gigantic takeover bid for the mobile messaging service WhatsApp.


    Around that time a myriad of social networking sites came into existence. Photo
    sharing sites like `Photobucket` of `Flickr`, social bookmarking site `del.icio.us`,
    `Reddit`, or the blogging platform `WordPress` all started between 2003 and 2005.


    `StudiVZ` and derivatives like `SchülerVZ` or `MeinVZ` were a social network for
    students, founded on November 11, 2005 (coincidentally both “Singles Day” and
    the beginning of Carnival) in Berlin by two students named Ehssan Dariani (who
    became CEO) and Dennis Bemmann. A major feature of `StudiVZ` was the so-called
    “gruscheln” (a mix of the German words “grüßen” = greet and “kuscheln,” meaning
    to cuddle). It was similar to Facebook’s poking function, allowing users to write
    short notifications, or the feature `InterNations` used to call “twinkle”.


    As of 2010, the VZ Networks claimed a total user base of over 16 million users.
    However, soon after, many users became inactive or left the network, which faced
    a decline of 70–80% compared to the years before. On September 7, 2017, the owner
    `Poolworks` declared `StudiVZ` bankrupt. In March 2022, the network was shut down.


    `YouTube` also started in 2005, a year after competing the online video site `Vimeo`.
    The first video was “Me at the zoo” [40] filmed in the San Diego Zoo, which so
    far (Q1/2023) had over 260 million views since then. Just a year later in 2006,
    Google acquired `YouTube` for $1.65 billion.


    2006 was also the year `Twitter` hatched. Similar to Facebook, the name changed
    slightly, but notably from “Twttr” to an easier to pronounce name. The first tweet
    was posted by co-founder Jack Dorsey (`@Jack`) on March 21, 2006: “just setting
    up my twttr.”


    A year later the hashtag was invented. The symbol was inspired by the channel
    names in IRC, now used by many leading social networks. Initially `Twitter` had
    a character limit of 140 characters, along the lines of SMS text messages. It
    took over a decade to double that to 280 in 2017.


    In 2007, `Twitch` was launched, then under the name `Justin.tv` by Yale graduates
    Justin Kan and Emmett Shear. By 2013, the company had become profitable and had
    over 43 million monthly users. A year later, in 2014 after speculations about
    a `YouTube` acquisition, Amazon acquired `Twitch Interactive` for USD 970 million.


    ## Here and Now


    In recent years, the majority of developments in social media were either security
    breaches and other difficulties or mergers and acquisitions, with a few notable
    exceptions.


    In 2015, `Discord`, an instant messaging and VoIP social platform, was founded.
    It soon became widely used by esports and LAN tournament gamers and benefited
    from relationships with `Twitch` streamers, as both platforms reach out to similar
    user groups, especially gamers.


    In 2016, `Mastodon`, a free, decentral, and open source software to create social
    networking services based on open standards and protocols (commonly referred to
    as the “Fediverse”), was launched.


    In 2017, `ByteDance` acquired `Musical.ly` for $1 billion while also launching
    short video sharing service `TikTok`. Far-Right microblogging site `Gab` also
    started in 2017, while `AIM` and `Beme` were shut down.


    In 2018, `Yahoo! Messenger` was shut down, and `Musical.ly` got merged into `TikTok`.
    Another self-proclaimed “Free Speech” network, `Parler`, started the same year,
    also primarily used by right-wing and other extremists or conspiracy theorists,
    especially after the COVID-19 pandemic started in 2020. While he did not go through
    with it, Kanye West considered buying `Parler` after he was banned from nearly
    every other major site following antisemitic statements [46]. In April 2023, soon
    after they purchased `Parler`, the CEO of the new owner `Starboard` had it shut
    down, citing that “No Reasonable Person Believes Twitter For Conservatives Is
    A Viable Business Model” [52].


    In 2019, `Google+` was shut down, and Verizon sold `Tumblr` to `Automattic`, the
    owner of `WordPress.com` and key supporter of `WordPress` for less than $3 million
    [43].


    2020 saw the launch of the audio-chat messaging app `Clubhouse` and `BeReal`,
    a social media app with a focus on authenticity. Especially in an era dominated
    by “Fake News,” it gained popularity since then.'
