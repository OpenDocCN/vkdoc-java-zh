- fmt: "```java\n@Configuration\n@EnableWebSecurity\n@ComponentScan(basePackages =\
    \ { \"com.example.security\" })\npublic class SecurityConfig {\n    @Autowired\n\
    \    private UserDetailsService userDetailsService;\n\n    @Bean\n    public AuthenticationManager\
    \ authManager(HttpSecurity http) throws Exception {\n        return http.getSharedObject(AuthenticationManagerBuilder.class)\n\
    \                .userDetailsService(userDetailsService)\n                .and()\n\
    \                .build();\n    }\n\n    @Bean\n    public SecurityFilterChain\
    \ filterChain(HttpSecurity http) throws Exception {\n        http.csrf()\n   \
    \             .disable()\n                .authorizeRequests()\n             \
    \   .antMatchers(\"/login*\", \"/signin/**\", \"/signup/**\")\n              \
    \  .permitAll()\n                .anyRequest()\n                .authenticated()\n\
    \                .and()\n                .formLogin()\n                .loginPage(\"\
    /login\")\n                .permitAll()\n                .and()\n            \
    \    .logout();\n        return http.build();\n    }\n}\n```\n\n## Facebook4J\n\
    \n`Facebook4J` is an unofficial Java library for the Facebook Graph API. It was\
    \ modelled after `Twitter4J`, hence the similar name.\n\n### Using It\n\nInclude\
    \ the following dependency in your Maven `pom.xml`:\n\n```xml\n<dependency>\n\
    \    <groupId>org.facebook4j</groupId>\n    <artifactId>facebook4j-core</artifactId>\n\
    \    <version>[2.4,)</version>\n</dependency>\n```\n\n### Configuration\n\nThere\
    \ are several ways to configure `Facebook4J`.\n\n**Properties file**\n\nA properties\
    \ file named `facebook4j.properties`. Place it to either the root of the Classpath:\n\
    \n```properties\ndebug=true\noauth.appId=****************\noauth.appSecret=********************************\n\
    oauth.accessToken=********************************\noauth.permissions=email,publish_stream,...\n\
    ```\n\n**ConfigurationBuilder**\n\nYou could use a \"Fluent\" API via `ConfigurationBuilder`\
    \ and `FacebookFactory`:\n\n```java\nConfigurationBuilder cb = new ConfigurationBuilder();\n\
    cb.setDebugEnabled(true)\n  .setOAuthAppId(\"*********************\")\n  .setOAuthAppSecret(\"\
    ******************************************\")\n  .setOAuthAccessToken(\"**************************************************\"\
    )\n  .setOAuthPermissions(\"email,publish_stream,...\");\nFacebookFactory ff =\
    \ new FacebookFactory(cb.build());\nFacebook facebook = ff.getInstance();\n```\n\
    \n**Or via System Properties**\n\n```bash\n$ java -Dfacebook4j.debug=true \\\n\
    \       -Dfacebook4j.oauth.appId=********************* \\\n       -Dfacebook4j.oauth.appSecret=******************************************\
    \ \\\n       -Dfacebook4j.oauth.accessToken=**************************************************\
    \ \\\n       -Dfacebook4j.oauth.permissions=email,publish_stream,... \\\n    \
    \   -cp facebook4j-core-2.4.13.jar:yourApp.jar yourpackage.Main\n```\n\n**As well\
    \ as environment variables (example for Linux)**\n\n```bash\n$ export facebook4j.debug=true\n\
    $ export facebook4j.oauth.appId=*********************\n$ export facebook4j.oauth.appSecret=******************************************\n\
