    \ 返回 “[`http://twitter.com/jdoe\"`](http://twitter.com/jdoe)。\n4.  `Connection#getImageUrl()`\
    \ 返回 “[*http://a0.twimg.com/profile_images/105951287/IMG_5863_2_normal.jpg*`\"\
    `](http://a0.twimg.com/profile_images/105951287/IMG_5863_2_normal.jpg)。\n5.  `Connection#sync()`\
    \ 允许您将连接状态与 @jdoe 的个人资料同步。\n6.  `Connection#test()` 返回 `true`，表明 Twitter 连接的授权凭据有效。这假设\
    \ Twitter 尚未撤销“AcmeApp”客户端应用程序，并且 @jdoe 尚未重置其授权凭据。\n7.  `Connection#hasExpired()`\
