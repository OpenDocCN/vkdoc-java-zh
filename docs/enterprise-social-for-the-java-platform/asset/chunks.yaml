- fmt: '# Future


    Social networks have always existed, since people first started to communicate.
    Technical means changed over time and are likely to change even faster in the
    near future. Some services will be merged; others might become irrelevant and
    vanish sooner or later. Using vendor-neutral standards and frameworks that won’t
    tie you into the offerings of just a single provider is crucial, unless you want
    to spend more time on rapidly changing APIs than actually using it for something
    productive, or worse, having to switch over to another provider if proprietary
    API and framework offered by a particular vendor are no longer available. While
    not a social network in the sense of Twitter or Facebook, one of the first crypto
    trading bankruptcies of Mt. Gox [7], long before the likes of FTX, BlockFi, Celsius,
    or Voyager, was a good example for such a dilemma. It used to be a market leader
    in this area for some time. Therefore, applications and e-commerce solutions offering
    Bitcoin through its API were forced to rewrite or throw those apps away.


    If a vendor-neutral abstraction is created on top of such API, then it is much
    easier to cope with problems and changes like those caused by a vendor going out
    of business, being taken over by others, or a combination of both, like it still
    keeps looming for Twitter/X since the Elon Musk takeover and subsequent rebranding.


    This is where vendor- and social service-neutral approaches like the Fediverse,
    Agorava, Keycloak, or Jakarta EE come into play.


    ## Summary


    In this chapter, we learned about the history of social media, its boom years,
    what is happening right now, and where the future direction could lead to. As
    well as how mergers and acquisitions can sometimes pose a risk for your social
    media strategies, especially if some of the new owners are double-minded and eccentric
    to put it mildly.


    # 2. Social Use Cases


    In this chapter, we are going to explore the various use cases for social media,
    from general purpose networks to technically specialized ones like media sharing,
    as well as vertical social networks catering to a certain target group.


    ## Types of Social Networks


    There are numerous social media websites either for general purpose or focus groups
    and specialized communities, including former alcoholics, music fans, developers,
    expats, mothers, students, teachers, government employees, and people who are
    into gardening, knitting, or BDSM. The “Fifty Shades of Grey” books and films
    probably added even more shades to that list [17].


    ### Traditional Social Networks


    Most people are familiar with traditional social networking sites like


    *   Facebook

    *   Twitter

    *   Mastodon

    *   Myspace

    *   WeChat

    *   Sina Weibo


    These platforms help us connect with friends, family, fellow students, or people
    who share common interests.


    ### Business and Enterprise


    These are popular social networks for business:


    *   LinkedIn

    *   XING


    These are mostly used for work or job seeking, as a digital CV. LinkedIn was purchased
    by Microsoft and is a global player. XING originated in Hamburg, Germany, and
    is therefore active mostly in Europe. It acquired several other job portals or
    hiring services, as well as InterNations, the biggest social network for expats,
    adding users in 420 global communities anywhere from Honolulu to Auckland.


    ### Messaging Services


    These are the most popular social messaging services:


    *   WhatsApp

    *   Facebook Messenger

    *   Telegram

    *   Discord

    *   Viber

    *   WeChat

    *   Snapchat

    *   Line

    *   QQ

    *   Signal

    *   KakaoTalk

    *   Zalo


    ### Media Sharing


    Media sharing sites fall into three categories:


    1.  Audio sharing

    2.  Image sharing

    3.  Video sharing


    #### Audio Sharing


    Audio sharing can be


    *   Music sharing/streaming

    *   Podcasts

    *   Audiobooks


    ##### Music Sharing/Streaming


    There are several music sharing and streaming portals. One of the earliest, founded
    in 1996, which still exists, is the Live Music Archive (LMA). It provides over
    250,000 live concert recordings of mostly indie artists but also some big names
    like the Grateful Dead.


    Also, around the turn of the century came Napster, founded by Sean Parker, who
    later came to fame and fortune with Facebook. It was mostly decentral and free
    but in its original form had been forced to shut down due to copyright infringement.
    However, its third iteration still exists today.


    While Apple Music started only in 2015, its roots go back to Apple iTunes, in
    existence since 2001.


    Many music sharing sites were started in the prolific years for social media between
    2001 and 2010, among them:


    *   Myspace

    *   DatPiff

    *   Jamendo

    *   Mixcloud

    *   Musopen

    *   Spotify

    *   SoundCloud

    *   Deezer

    *   Noise Trade

    *   Playlist

    *   StarMaker

    *   Smule


    Besides Apple, Internet and social media giants Amazon and Google also provide
    music downloads and streaming, sometimes through various brands like Google Play
    Music and YouTube Music.


    ##### Podcasts


    The Podcast was invented by Tristan Louis and Dave Winer in 2000, based on the
    RSS format. Initially called “Audioblogging,” British digital journalist Ben Hammersley
    coined the term “podcast” in an article for *The Guardian* from 2004. The inspiration
    was Apple’s iPod music player.


    Obviously, Apple was among the first to offer podcasts on iTunes. Nowadays besides
    radio and TV stations, all major players in music and streaming also provide podcasts.


    ##### Audiobooks


    There is a thin line between podcasts and audiobooks; both are often hosted by
    the same channels. First invented by Thomas Edison through his phonograph, audiobooks
    originally targeted mostly blind people, allowing them to listen to stories instead
    of reading them.


    Audiobooks evolved with recording devices from audio cylinders for almost 100
    years to acetate and vinyl discs, compact cassettes, minidisks, CDs, or DVDs and
    ultimately solid-state storage like the iPod or server racks of a streaming server.


    Besides book publishing houses and radio or TV stations, audiobooks are offered
    by most major Internet giants and providers of podcasts or music streaming services.


    #### Image Sharing


    As we learned, the first social network to upload pictures was Hot or Not in 2000.
    The first camera phone was created three years earlier by former Borland founder
    Philippe Kahn, with almost MacGyver improvised installations, to share the birth
    of his daughter in real time with selected friends [47].


    These are some of the top image sharing apps:


    *   Adobe Creative Cloud – For Photoshop users

    *   Google Photos – Photo storage and backup

    *   iCloud Drive – Photo storage backup for Apple users

    *   Instagram – Instant messaging and photo sharing

    *   Pinterest – Visually share ideas like recipes, home decoration, or other information

    *   SmugMug – Secure your photos

    *   Amazon Photos – For Amazon Prime customers

    *   Waldo – Pro-level options for photography corporations

    *   The Guest – Automatic photo uploader

    *   Internxt Photos – Exceptionally fast photo exchange

    *   Imgur – Content hosting site where you can view and share images, GIFs, memes,
    or videos

    *   FamilyAlbum – For family photos

    *   Flickr – Community of photographers

    *   Snapchat – Multimedia instant messaging

    *   Pixpa – Easily sell photos

    *   500px – Sharing and communication


    Besides those dedicated photo apps, nearly every major social networking site
    like Facebook or Twitter also allows sharing and storing images, although the
    level of convenience is not always a match to specialized photo services.'
