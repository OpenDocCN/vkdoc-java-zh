- fmt: '# 1. Introduction


    This chapter tells the history of social media from ancient days until more recently.
    The first few decades of the 21st century are often considered the “heydays” of
    social media between the “DotCom Bubble” and the financial crisis of 2008. We
    look further into the years that came after that, until the very recent history
    and what the future might bring for social media.


    ## Ancient History


    Most people assume social media to be a modern-day invention of companies like
    Facebook, Twitter, Google, Myspace, and Yahoo! In actual fact, social media has
    a history that reaches back over thousands of years.


    To some, the postal service was one of the earliest forms of social media. From
    the days of the ancient Persian postal service to the Greek Agora [1] and Roman
    Forum [2], the postal service served as a medium for social and political discussion.
    The first recorded equivalents to Wiki or “Forum posts” were literally carved
    into the walls of Roman Forums or similar buildings [3], recording events like
    the destruction of Pompeii by Mount Vesuvius or several parts of Rome under Nero.


    The Ancient Agora of Athens acted as an incubator to democracy being a favorite
    venue for social and political debate while doing business in ancient Greece.
    Until today, this worked in similar ways while the forums often turned digital.
    From Tunisia to Ukraine, opposition movements used social media to bring democracy
    to places where it’s often been surprising and uncommon for a long time [4].


    The telegraph was invented in 1792, allowing to deliver personal messages over
    long distances much faster than a horse rider or stagecoach could carry them.
    Although telegraph messages were short (much like SMS or tweets), they were a
    revolutionary way to spread news and exchange information. Many people think that
    was the birth of social media.


    While several countries like the United States continue to offer postal telegrams,
    even to the President or other officials, the German postal service shut down
    its telegram service on New Year’s Eve 2022 [39].


    ![](images/600273_1_En_1_Chapter/600273_1_En_1_Fig1_HTML.png)


    A photograph of Morse-vail telegraph key.


    **Figure 1-1** Morse-Vail Telegraph Key


    ## Modern History


    During the 20th century, information technology as we know it now started with
    pioneers like Konrad Zuse, George Stibitz, or Howard Aiken, and of course Alan
    Turing, who created the Turing test as a benchmark for AI and social bots.'
