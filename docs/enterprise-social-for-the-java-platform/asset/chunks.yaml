    to Hot or Not, but it became a site to connect with like-minded people and their
    common friends. It contained a profile and status updates, allowing you to share
    your mood and exchange messages.


    Until early 2004 it was the biggest and most popular social network, something
    that eventually doomed it, because it could not scale to handle user demand and
    left many of them frustrated, looking for alternatives. In 2003, Google offered
    $30 million to purchase Friendster, but the founders turned that offer down. In
    2009, it was acquired after all by an Internet company named MOL Global in Kuala
    Lumpur. Besides a mostly Asian user base, Friendster’s patents were also a vital
    asset, including one for a “system, method, and apparatus for connecting users
    in an online computer system based on their relationships within social networks.”
    Most of these core social infrastructure patents were bought by Facebook for $40
    million in 2010.


    A year later Friendster became a social gaming site. On June 14, 2015, the site
    was shut down, and three years later in 2018, the company was terminated.


    Also founded in 2002, LinkedIn, later sometimes considered a “Myspace for adults,”
    was the first social network to offer users a paid premium package. Its job market
    and subscriptions helped it to become profitable in 2006\. The job market and
    online resume would become a key feature, making it a more professional social
    network compared to others.


    In 2011, LinkedIn filed an IPO. Five years later in 2016, Microsoft acquired LinkedIn
    for $26.2 billion, the second largest acquisition behind the video game producer
    Activision Blizzard, Microsoft tried to buy for $68.7 billion in 2022 [42]. UK
    regulators had raised concerns, but eventually on October 13, 2023 (even a Friday)
    they approved it.


    Myspace (MySpace before its rebranding in 2012), Friendster’s biggest rival that
    started in 2003, benefited most from frustration about the technical issues. Originally
    inspired by Friendster, it also offered some improvements like customization or
    public profiles that did not require logging into it first. In February 2005,
    MySpace rejected an offer by Mark Zuckerberg to sell Facebook for $75 million.
    Just a few months later, Fox News parent company News Corporation purchased MySpace
    itself for USD 580 million. Until 2008 MySpace was the leading social networking
    site, but it was surpassed by Facebook in 2009 and since then rapidly lost users.
    In June 2011, Specific Media Group and Justin Timberlake purchased Myspace for
    approximately $35 million after News Corp had nearly paid a billion 6 years earlier.
    A reason for Timberlake’s involvement was that Myspace had its own record label
    after the News Corp. takeover and it generally appealed more to artists. Between
    2016 and 2018 through a series of takeovers, Myspace got purchased by what’s now
    the Dotdash Meredith media group.'
  trans: '

    ### X 世代


    1975 年，在美国军队即将撤出越南前不久，自由主义思想家塞缪尔·爱德华·康金三世提出了一种名为“市场无政府主义”的哲学，这是一种关于反经济学的社会哲学及其相关实践理念[5]。在一个市场无政府主义社会中，法律和安全将由市场参与者而非政治机构提供。市场无政府主义者认识到，这种情况无法通过政治改革来实现。相反，它应作为市场进程的结果而出现。其社会价值观的某些方面如今可以在“占领运动”中找到，该运动的主要目标是使所有社会中的经济和政治关系减少垂直等级制，变得更加扁平化。或者体现在像意大利的贝佩·格里洛、希腊的激进左翼联盟（该党甚至曾执掌政府）、西班牙的“我们能”党，或海盗党等抗议政党中。市场无政府主义还提出了使用不同货币的想法，现代社交媒体和相关在线社区正通过像比特币这样的数字货币来采纳这一理念。


    1966 年，电子邮件被发明；大约一年后，美国军方创建了计算机网络 ARPANET；随后，CompuServe 于 1969 年问世。CompuServe
    在 20 世纪 80 年代末推出了其电子邮件服务，并扩展到 90 年代初，最终在经历多次收购后，于 2009 年解散了最初的 CompuServe。


    Usenet 于 1979 年启动，为其用户提供论坛和新闻组。令人惊讶的是，它们的大部分功能变化甚微，至今仍然存在。


    互联网中继聊天（IRC）始于 1988 年，在学术网络中广泛使用，随后演变为如今的互联网。IRC 至今仍相当活跃，尽管它在很大程度上被 Twitter 等其他短消息服务所掩盖。全球仍有大约
    3200 个 IRC 服务器，提供数十万个频道。


    ### Y 世代（千禧一代）


    基于“六度分隔”理论[6]，第一个现代社交网络 sixdegrees.com 于 1997 年成立。它允许成员将其他成员添加为好友、发送消息或在公告板上发帖。在以
    1.25 亿美元的价格出售给另一家公司后，它于 2001 年关闭，当时拥有大约 100 万用户。后来它曾短暂复兴，至今仍存在。


    当亚马逊、雅虎以及 1998 年的谷歌等服务首次出现时，它们并不被视为社交网络。1995 年，微软通过推出微软网络（MSN）抓住了新兴趋势。MSN 被称为“门户”，这是个性化在线社区的另一种说法。几年后，许多门户产品、服务器和供应商纷纷加入社交网络的热潮，这并不令人惊讶。


    微软和雅虎都落后于社交媒体领域的一些新秀，而除了对 YouTube 相当出色和迅速的收购外，谷歌也多少低估了社交媒体的其他方面，直到它通过 Google+回归，并且即使它可能无法引领社交媒体的所有方面，也肯定会在此立足。雅虎也提供了大量社交功能，并且自其近期复苏以来，已收购了社交网络领域的一些小型供应商，如
    Flickr 或 Tumblr。1999 年，后来也在谷歌工作的布拉德·菲茨帕特里克创立了 LiveJournal。


    ### Z 世代


    在 21 世纪初，许多社交网络相继成立，尽管其中不少未能存活至今。Hot or Not（AmIHotOrNot.com）由詹姆斯·洪和吉姆·杨于 2000
    年 10 月创立，他们是两位朋友，也是加州大学伯克利分校的同学。该网站的初始动机源于创始人对女性吸引力的争论。它是第一个允许上传照片供他人评分的网站，据称影响了
    Facebook 或 YouTube 的创建者。2008 年，Hot or Not 以传闻中的 2000 万美元卖给了在线约会服务 Ashley Madison
    的所有者（该公司后来因所有客户数据被黑客窃取而臭名昭著），并于 2012 年被 Badoo 收购，后者现在是 Bumble 约会应用集团的一部分。


    虽然该网址仍然存在，但该应用已更名为“Chat & Date”，与原始网站几乎毫无共同之处，但 Hot or Not 当然可以被视为 Tinder 等现代约会应用的第一个前身。


    Friendster 成立于 2002 年，最初也计划成为一个类似于 Hot or Not 的约会网站，但它后来变成了一个与志同道合的人及其共同朋友建立联系的网站。它包含个人资料和状态更新，允许你分享心情和交换消息。


    直到 2004 年初，它都是最大、最受欢迎的社交网络，但这最终也导致了它的失败，因为它无法扩展以处理用户需求，让许多用户感到沮丧，转而寻找替代品。2003
    年，谷歌出价 3000 万美元收购 Friendster，但创始人拒绝了这一报价。2009 年，它最终被吉隆坡一家名为 MOL Global 的互联网公司收购。除了以亚洲用户为主外，Friendster
    的专利也是一项重要资产，其中包括一项“用于基于社交网络中的关系在在线计算机系统中连接用户的系统、方法和装置”的专利。这些核心社交基础设施专利中的大部分在 2010
    年被 Facebook 以 4000 万美元买下。


    一年后，Friendster 变成了一个社交游戏网站。2015 年 6 月 14 日，该网站关闭，三年后的 2018 年，该公司终止运营。


    同样成立于 2002 年的领英（LinkedIn），后来有时被认为是“成年人的 Myspace”，是第一个为用户提供付费高级套餐的社交网络。其就业市场和订阅服务帮助它在
    2006 年实现盈利。就业市场和在线简历成为其关键功能，使其成为相比其他社交网络更专业的社交网络。


    2011 年，领英申请首次公开募股（IPO）。五年后的 2016 年，微软以 262 亿美元收购了领英，这是微软仅次于视频游戏生产商动视暴雪的第二大收购案，微软曾试图在
    2022 年以 687 亿美元收购动视暴雪[42]。英国监管机构曾提出担忧，但最终于 2023 年 10 月 13 日（即使是星期五）批准了该交易。


    Myspace（2012 年品牌重塑前为 MySpace），Friendster 最大的竞争对手，始于 2003 年，从用户对 Friendster 技术问题的沮丧中获益最多。它最初受
    Friendster 启发，但也提供了一些改进，例如个性化定制或无需先登录即可查看的公开个人资料。2005 年 2 月，Myspace 拒绝了马克·扎克伯格以
    7500 万美元出售 Facebook 的提议。仅仅几个月后，福克斯新闻的母公司新闻集团以 5.8 亿美元收购了 Myspace 本身。直到 2008 年，Myspace
    都是领先的社交网站，但在 2009 年被 Facebook 超越，此后用户迅速流失。2011 年 6 月，Specific Media Group 和贾斯汀·汀布莱克以大约
    3500 万美元的价格收购了 Myspace，而新闻集团在 6 年前几乎为此支付了 10 亿美元。汀布莱克参与的一个原因是，在新闻集团收购后，Myspace
    拥有自己的唱片公司，并且总体上对艺术家更具吸引力。在 2016 年至 2018 年间，通过一系列收购，Myspace 被现在的 Dotdash Meredith
    媒体集团收购。

