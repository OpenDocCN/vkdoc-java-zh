    \ Facebook 设置为 Liferay DXP 的单点登录机制。\n\nFacebook Connect SSO 认证是 Liferay 与 Facebook\
    \ Graph API 的集成。用于检索用户的 Facebook 个人资料信息，并将其与现有的 Liferay DXP 用户进行匹配。当以此方式添加新的 Liferay\
    \ DXP 用户时，会通过从 Facebook 检索以下四个字段来创建他们：\n\n*   电子邮件地址\n*   名字\n*   姓氏\n*   性别\n\
    \n要获取 Facebook App ID 和 App Secret 凭据：\n\n1.  访问[`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/)。\n\
    2.  点击**创建新应用**。\n3.  为以下参数输入值：\n    1.  `Display name` – 你的应用的名称，会显示在每个帖子的末尾，例如，你的公司名称。\n\
    \    2.  `Namespace` – 用于访问 Facebook Insights 的可选值。建议为你设置的每个应用使用唯一的名称。\n    3.\
    \  `Category` – 与你的业务类型匹配的类别。如果不确定，请选择**Apps for Pages**。\n4.  点击**创建应用**。\n5.\
    \  进入你的应用的配置屏幕。选择**设置**并输入以下内容：\n    1.  `App domain` – 一个逗号分隔的域名或 IP 地址列表，你希望将此应用与个人\
    \ Facebook 账户一起使用。你可以从该列表中的某个域名/地址授权你的应用。\n6.  点击**添加平台**并选择**网站**。\n7.  将**站点\
    \ URL** 和（如果适用）**移动站点 URL** 设置为所需的网站，例如，[`http://www.mysite.com`](http://www.mysite.com)。\n\
    8.  点击**保存更改**。\n9.  现在你可以看到你的应用的**App ID/API Key**和**App Secret**。\n\n要在 Liferay\
    \ 系统级别配置 Facebook Connect SSO 模块，请导航至 Liferay DXP 的控制面板 ➤ 配置 ➤ 系统设置，并在 Foundation\
    \ 标题下找到**Facebook Connect**模块。在此处配置的值为所有门户实例提供默认值。\n\n要为特定门户实例覆盖这些默认值，请导航至 Liferay\
    \ DXP 控制面板，点击**实例设置**，并在 Authentication 部分找到**Facebook**。\n\n*   `Enabled` – 勾选此项以启用\
    \ Facebook Connect SSO 认证。\n*   `Require Verified Account` – 勾选此项以允许已通过 Facebook\
    \ 电子邮件验证过程（证明他们可以访问注册时提供的电子邮件地址）的 Facebook 用户登录。\n*   `Application ID` – 只能在门户实例级别设置。输入你注册的\
    \ Facebook 应用的 ID。\n*   `Application Secret` – 只能在门户实例级别设置。输入你注册的 Facebook 应用的\
    \ Secret。\n*   `Graph URL` – Facebook Graph API 的基础 URL。仅当 Facebook 更改其 Graph\
    \ API 时才更改此项。只要 Facebook 的 API 保持不变，请使用默认的 Graph URL。\n*   `OAuth Authorization\
    \ URL` – Facebook OAuth 授权 URL。仅当 Facebook 更改其 OAuth 授权端点时才需要更改此项。此 URL 将包含动态数据，并链接到\
    \ Liferay 登录 Portlet。\n*   `OAuth Token URL` – Facebook OAuth 访问令牌 URL。Liferay\
    \ DXP 使用此 URL 将请求令牌交换为访问令牌。\n*   `OAuth Redirect URL` – 生成 OAuth 请求令牌后用户将被重定向到的\
    \ URL。该 URL 指向一个 Liferay DXP 服务，该服务将请求令牌交换为访问令牌，这是 Liferay DXP 成功调用 Facebook Graph\
    \ API 所必需的。仅当对 Liferay DXP 的请求通过像 Apache 这样进行 URL 重写的代理服务器时，才需要更改此 URL。\n\n###\
    \ 社交书签\n\n社交书签作为按钮出现在内容下方，用于在社交网络上分享内容。例如，社交书签默认出现在博客小部件的每篇博客文章下方。\n\n默认情况下可用的社交书签有：\n\
    \n*   Facebook\n*   LinkedIn\n*   Twitter/X\n\n此外，Liferay Marketplace 上的社交书签应用为以下社交网络添加了更多社交书签：\n\
    \n*   Digg\n*   Evernote\n*   Reddit\n*   Slashdot\n\n### OpenSocial\n\n与其他开放标准一样，Liferay\
    \ 支持 OpenSocial 框架和规范（尽管是使用 Apache Shindig 的 W3C 前版本，看起来如此）。你可以发布在线找到的小工具，或者使用\
    \ Liferay Portal 的 OpenSocial 小工具编辑器创建和发布你自己的小工具：\n\n以下是一个 PubSub Publisher 小工具的示例：\n\
    \n```\n<Content type=\"html\">\n<![CDATA[\n<script type=\"text/javascript\">\n\
    function publish() {\nvar message = Math.random();                  gadgets.Hub.publish('org.apache.shindig.random-number',\
    \ message);                              document.getElementById('output').innerHTML\
    \ = message;\n}\n</script>\n<input type=\"button\" value=\"Publish\" onclick=\"\
    publish()\" />\n<div id=\"output\"></div>\n]]>\n</Content>\n```\n\n以下是一个 PubSub\
    \ Subscriber 小工具的示例：\n\n```\n<Content type=\"html\">\n<![CDATA[\n<script type=\"\
    text/javascript\">\nvar subId;                        gadgets.HubSettings.params.HubClient.onSecurityAlert\
    \ =      function(alertSource, alertType) {\nalert('Security error!');\nwindow.location.href\
    \ = 'about:blank';\n};\nfunction callback(topic, data, subscriberData) {     \
    \                           document.getElementById('output').innerHTML = 'Message:\
    \ ' + gadgets.util.escapeString(data + '') + '' + 'Received: ' + (new Date()).toString();\n\
    }\nfunction subscribe() {\nsubId = gadgets.Hub.subscribe('org.apache.shindig.random-number',\
    \ callback);\n}\nfunction unsubscribe() {\ngadgets.Hub.unsubscribe(subId);   \
    \                           document.getElementById('output').innerHTML = '';\n\
    }\n</script>\n<input type=\"button\" value=\"Subscribe\" onclick=\"subscribe()\"\
    \ />\n<input type=\"button\" value=\"Unsubscribe\" onclick=\"unsubscribe()\" />\n\
    <div id=\"output\"></div>\n]]>\n</Content>\n```\n\n## HCL\n\nHCL Technologies\
    \ Limited（前身为 Hindustan Computers Limited）是一家印度 IT 服务和咨询公司，总部位于首都德里的卫星城诺伊达。\n\n\
    ### 历史\n\n1976 年，在微软或苹果成立后不久，印度的一个八人工程师团队创办了一家制造个人电脑的公司。在最初提议的名称 Microcomp（可能与微软存在命名问题）之后，公司于\
    \ 1976 年 8 月 11 日更名为 Hindustan Computers Limited (HCL)。该公司最初专注于硬件，但通过 HCL Technologies，其重点越来越多地转向软件和服务。2018\
    \ 年 12 月 7 日，HCL 宣布达成协议，以 18 亿美元收购 IBM 的某些软件产品，包括 AppScan、BigFix、Commerce、Connections、Digital\
    \ Experience（Portal 和 Content Manager）、Notes/Domino 或 Unica。2022 年，HCL Technologies\
    \ 更名为 HCLTech。"
