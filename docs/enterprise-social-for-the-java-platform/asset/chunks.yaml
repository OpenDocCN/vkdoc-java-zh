  trans: '

    ### 认证机制


    认证机制实现的基础是 `HttpAuthenticationMechanism`，它使相应的机制可作为 CDI Bean 使用。已实现的方法 `validateRequest()`
    返回一个包含该认证状态的 `AuthenticationStatus` 对象。该规范提供了用于基本认证和基于表单认证的现成机制。


    Jakarta Servlet 规范定义了一种声明性机制，用于配置应用程序以提供 **BASIC**、**DIGEST**、**FORM** 或 **CERT**
    认证，认证由容器根据应用程序的配置自动执行。其中，FORM 认证可以包含自定义表单页面。


    此外，Jakarta EE *容器必须*支持通过配置提供的以下 `HttpAuthenticationMechanism` 类型的内置 Bean：


    *   **BASIC** `–` 使用 RFC 2617 中描述的标准基本认证方案。除非使用 SSL，否则不会对凭据进行加密。除非与 SSL 一起使用，否则此类型并非安全方法。此
    Bean 通过 `@BasicAuthenticationMechanismDefinition` 注解激活和配置。


    *   **FORM** `–` 应用程序提供自己的自定义登录页面和错误页面。通信协议为 HTTP，可选 SSL。除非使用 SSL，否则不会对用户凭据进行加密。此
    Bean 通过 `@FormAuthenticationMechanismDefinition` 注解激活和配置。


    *   **自定义 FORM** – 是 FORM 的一种变体，区别在于，认证对话的继续并非像 Servlet 规范所述那样通过回发到 `j_security_check`
    进行，而是通过使用应用程序收集的凭据调用 `SecurityContext.authenticate()` 进行。此 Bean 通过 `@CustomFormAuthenticationMechanismDefinition`
    注解激活和配置。


    *   **OpenID Connect** – 根据 OpenID Connect 规范 [29] 定义的授权码流程和刷新令牌进行认证。此 Bean 通过
    `@OpenIdAuthenticationMechanismDefinition` 注解激活和配置。


    Jakarta Security 提供了*必须*与 Servlet 规范匹配的 Basic 和 Form 版本，但 GlassFish 在 web.xml
    中定义时不会在 Web 应用程序中使用它们，仅当通过注解定义时才会使用。


    以下是 Soteria 中 `BasicAuthenticationMechanism` 的示例：


    ```

    package org.glassfish.soteria.mechanisms;

    import static java.lang.String.format;

    import static jakarta.security.enterprise.identitystore.CredentialValidationResult.Status.VALID;

    import static jakarta.xml.bind.DatatypeConverter.parseBase64Binary;

    import static org.glassfish.soteria.Utils.isEmpty;

    import jakarta.security.enterprise.AuthenticationException;

    import jakarta.security.enterprise.AuthenticationStatus;

    import jakarta.security.enterprise.authentication.mechanism.http.BasicAuthenticationMechanismDefinition;

    import jakarta.security.enterprise.authentication.mechanism.http.HttpAuthenticationMechanism;

    import jakarta.security.enterprise.authentication.mechanism.http.HttpMessageContext;

    import jakarta.security.enterprise.credential.Password;

    import jakarta.security.enterprise.credential.UsernamePasswordCredential;

    import jakarta.security.enterprise.identitystore.CredentialValidationResult;

    import jakarta.security.enterprise.identitystore.IdentityStoreHandler;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import org.glassfish.soteria.cdi.CdiUtils;

    /**

    * 使用基本认证进行认证的认证机制

    *

    * @author Arjan Tijms

    *

    */

    public class BasicAuthenticationMechanism implements HttpAuthenticationMechanism
    {

    private final BasicAuthenticationMechanismDefinition basicAuthenticationMechanismDefinition;

    // CDI 要求无参构造函数以实现可移植性

    // 仅用于创建代理

    protected BasicAuthenticationMechanism() {

    basicAuthenticationMechanismDefinition = null;

    }

    public BasicAuthenticationMechanism(BasicAuthenticationMechanismDefinition basicAuthenticationMechanismDefinition)
    {

    this.basicAuthenticationMechanismDefinition = basicAuthenticationMechanismDefinition;

    }

    @Override

    public AuthenticationStatus validateRequest(HttpServletRequest request, HttpServletResponse
    response, HttpMessageContext httpMsgContext) throws AuthenticationException {

    String[] credentials = getCredentials(request);

    if (!isEmpty(credentials)) {

    IdentityStoreHandler identityStoreHandler = CdiUtils.getBeanReference(IdentityStoreHandler.class);

    CredentialValidationResult result = identityStoreHandler.validate(

    new UsernamePasswordCredential(credentials[0], new Password(credentials[1])));

    if (result.getStatus() == VALID) {

    return httpMsgContext.notifyContainerAboutLogin(

    result.getCallerPrincipal(), result.getCallerGroups());

    }

    }

    if (httpMsgContext.isProtected()) {

    response.setHeader("WWW-Authenticate", format("Basic realm=\"%s\"", basicAuthenticationMechanismDefinition.realmName()));

    return httpMsgContext.responseUnauthorized();

    }

    return httpMsgContext.doNothing();

    }

    private String[] getCredentials(HttpServletRequest request) {

    String authorizationHeader = request.getHeader("Authorization");

    if (!isEmpty(authorizationHeader) && authorizationHeader.startsWith("Basic ")
    ) {

    return new String(parseBase64Binary(authorizationHeader.substring(6))).split(":");

    }

    return null;

    }

    }

    ```


    ### 支持的运行时


    Soteria 可在以下 Jakarta EE CI 运行时上运行：


    *   GlassFish


    *   Payara


    *   WildFly


    *   Open Liberty


    此外，所有在“实现组件”下使用 Soteria 的实现都运行或包含它。


    经过一些调整，它也可以在 TomEE 上运行，但由于 TomEE 9+ 和 Open Liberty 带有自己的 Jakarta Security 实现（不基于
    Soteria），因此这些情况可能会稍微复杂一些。

