  trans: '

    ### JSR 357


    在 2011 年 JavaOne 大会以及随后在安特卫普举办的 Devoxx 等会议期间，我发起了一系列讨论，与 CDI 规范负责人 Pete Muir、Twitter4J
    作者 Yusuke Yamamoto 以及 Seam Social 创始人 Antoine Sabot-Durand 共同探讨了在 Java 社区进程中为
    Java 平台标准化社交媒体 API 的可能性。


    他们认为这是一个值得追求的想法。考虑到 CDI 的广泛应用以及 API 与实现之间相当清晰的结构化分离，其他 API 和项目（如 DaliCore）被认为可能具有相关性（尤其是在
    Java EE 下提供信息），这使得 Seam Social 成为初始代码库的最佳候选。


    该 JSR 由我和 Antoine 作为联合规范负责人提出，并得到了 Red Hat/JBoss、eXo Platform、Twitter（由 Twitter4J
    作者 Yusuke Yamamoto 代表）等公司，以及 JUG Chennai、来自 BeJUG 的 DaliCore 作者、Java EE 7 EG 成员兼
    Oracle ACE 总监 Markus Eisele（现在再次效力于 Red Hat，Antoine 则直到 2021 年都在那里工作）的加入，可以说是企业个人与
    JUG 的健康组合。


    然而，在 IBM 首先投票反对该 JSR 之后，其他 EC 成员如 SAP 也相继反对，一个 JUG（SouJava）投了赞成票，另一个（LJC）投了反对票，最终创建投票以
    8 票反对、5 票赞成的结果告终，阻止了 JSR 357 的创建。遗憾的是，尽管大型供应商更偏爱“围墙花园”[14]而非开放标准，但这并不完全出人意料，甚至利益相关方和
    EG 成员候选者 Twitter 也投了弃权票。关于此次投票的文章请参见[26]。


    IBM 对 OpenSocial 情有独钟，但正如其部分支持者（如 Adjuvi 的 Dion Hinchcliffe [16]）所解释的那样（尽管稍晚一些），OpenSocial
    是一个基础标准，而遵循 Seam Social 的 JSR 357 的主要目标是提供一个高阶 API 并与 Java 平台绑定。以 WebSocket 为例，JSR
    357 提到其具有协同增效的潜力。这个 W3C 标准与 OpenSocial 的后续版本类似，是在 HTML5 的框架下定义的，而 Oracle 的 JSR
    则创建了一个 Java 实现。即使在 Java 平台上，也已经存在多个成熟且被广泛采用的 WebSocket 开源项目；尽管如此，人们仍然认为创建一个 JSR
    是值得的。JSON 的情况类似，甚至可能更引人注目，因为 JSON“之父”Douglas Crockford 的事实上的参考实现启发了 JSON JSR，但
    Crockford 虽然最初“支持这个 JSR”，却在去年荷兰移动大会上亲自告诉我，他不再打算参与其中，并且从未停止支持和推广他自己围绕 JSON 的库。


    在 JSR 357 被否决的那一周，最初反对的 IBM 向 Facebook 出售了数百项（甚至可能是数千项）社交媒体软件专利，这一事实不仅看起来很不光彩。如果社交媒体专利和专有技术被出售给
    Facebook，从而增强其对抗 Twitter 等竞争对手的武器库，那么 IBM 自身对 OpenSocial 的支持也变得有些可疑。这可能是 Twitter
    在投票最后时刻“情绪摇摆”背后的一个原因。也许是巧合，但 Twitter4J 作者 Yusuke Yamamoto 在那之后不久就离开了 Twitter。无论
    EC 成员（如 IBM 或 SAP）是否不希望 Red Hat 在 Hibernate、CDI/Seam 或 Arquillian（仅举几例）之后，在更多关键开源项目中扮演有影响力的角色，这也可能是另一个原因。特别是关于这一点，我想说，如果这是意图之一，那么它适得其反了，因为
    Agorava 的创建和积极开发并非仅由一家公司（如 DaliCore 或 Social Link）推动，而是由世界各地的各种贡献者共同完成，他们中的大多数是拟议的
    EG 成员。


    扼杀一个 Java 社交“王位”的潜在继承者，尤其是可以说有大量法国参与者参与的项目，引发了一场名为 Agorava 的 Java 社交框架的“法国大革命”。


    你将在第 6 章中了解更多关于 Agorava 的信息。


    ## 总结


    在本章中，我们了解了不同类型的社交标准以及为标准化与社交网络交互所做的努力，这些努力允许一定程度的提供商中立性以及跨平台发布。


    # 4. 社交安全


    如今，网络安全攻击的激增使得我们有必要在多个安全战线（无论是物理、技术还是政策和流程方面）上保卫我们的组织。上述每一个战线对组织的安全都同等重要。在打造一个面向未来且安全的组织时，任何一方都不应被削弱。也就是说，仅有物理安全是不够的。仅有物理和技术安全确实可能给黑客带来更多挑战，但如果你的员工没有接受良好的教育来保护他们的密码，那么你的组织整体上并不十分安全。


    信息安全基于


    *   机密性


    *   完整性


    *   可用性


    这三个概念通常被称为 CIA 三元组。它是随着时间的推移而形成的，并非由单一个人提出。机密性最早于 1976 年在美国空军的一项研究中被提出；完整性的概念则在
    David Clark 和 David Wilson 于 1987 年撰写的一篇题为《商业与军用计算机安全策略比较》[55]的论文中得到了探讨。


    该论文认识到商业计算需要会计记录和数据正确性。尽管找到最初的来源并不容易，但可用性的概念在一年后的 1988 年变得更加普及。又过了十年，到 1998 年，人们将这三个概念统称为
    CIA 三元组。


    *   机密性 `–` 信息不应被未经授权的用户读取。


    *   完整性 `–` 信息不应能够在未被察觉的情况下被篡改。


    例如，黑客不应能够在数据发送给预期接收者之前截获并修改任何数据。


    *   可用性 `–` 要求信息在授权用户需要时能够被访问。


    除了 CIA 三元组之外，社交媒体安全还有一些更关键的概念：


    *   机密性


    *   完整性


    *   可用性


    *   隐私


    *   身份验证


    *   授权


    隐私 `–` 用户可以控制其个人信息的访问、使用和披露。隐私是维护秘密、匿名性以及免于监视或干涉个人私事的概念。隐私可以被理解为控制何时、以何种方式以及在多大程度上与他人分享个人信息的权力。


    根据 CCPA，个人信息是“能够识别、关联、描述、合理关联或可能直接或间接与特定消费者或家庭相关联的信息。”


    根据 GDPR，个人信息被称为“个人数据”，它被认为是“与已识别或可识别的自然人相关的任何信息。”


    身份验证 `–` 用户可以证明他们就是他们所声称的那个人，即他们的**身份**；例如，客户端可以向服务器证明它代表一个授权身份行事，反之亦然。或者，就像来电显示的呼叫者
    ID。


    授权 `–` 用户拥有足够的权限来访问受限资源或执行特定操作。


    如今，身份验证和授权有时会被混淆，因此这里有一个很好的方法来记住这两个术语在身份与访问管理（IAM）领域中的区别。身份验证确认用户就是他们所声称的那个人，而授权则允许这些用户访问资源。

