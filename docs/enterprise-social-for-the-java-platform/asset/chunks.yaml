- fmt: "# Mobile Usage\n\nMobile usage is not necessarily a type of social media,\
    \ but more a different situation or environment for social media apps, although\
    \ some apps, for example, `Google Fit`, are only available for mobile usage now.\n\
    \nAndreas M. Kaplan [41] grouped mobile social media applications into four main\
    \ types:\n\n1. **Space-timers** – Location and time-sensitive: Sharing information\
    \ is usually relevant to a particular location at a specific point in time. Examples\
    \ are\n    1. `Foursquare Swarm`\n    2. `Facebook Places`\n    3. `WhatsApp`\n\
    \    4. `Telegram`\n2. **Space-locators** – Location-sensitive only: Sharing information\
    \ with relevance for a particular location, rating or tagging a place, which can\
    \ later be read by others. Examples include\n    1. `Foursquare`\n    2. `Yelp`\n\
    \    3. `Fishbrain`\n    4. `Qype`\n    5. `Tumblr`\n3. **Quick-timers** – Time-sensitive\
    \ only: The use of traditional social media on mobile apps to increase availability\
    \ or as a second or third screen besides a TV screen, for example, watching your\
    \ favorite show while tweeting about it. Includes\n    1. `Twitter`\n    2. `Facebook`\n\
    \    3. `Mastodon`\n4. **Slow-timers** – Neither time nor location-sensitive:\
    \ The use of traditional social media on mobile apps, for example, watching a\
    \ video on `YouTube` and reading/writing a `Wikipedia` article or `Tumblr` blog.\n\
    \n# Summary\n\nIn the first two chapters, you’ve been introduced to the historical\
    \ background of social media, followed by various use cases anywhere from following\
    \ your friends and relatives online to professional usage by influencers and others\
    \ using enterprise social for a living.\n\n# 3. Standardization\n\nThis chapter\
    \ explores the efforts to standardize access to social media via common APIs,\
    \ as well as some standards used by social networks themselves, allowing not only\
    \ to switch more easily between different networks but also analyze data across\
    \ different sources and social networks.\n\n## Types of Standards\n\nAside from\
    \ their lobbying of “Basic Standards” like `OpenSocial` [15], Figure [3-1](#600273_1_En_3_Chapter.xhtml#Fig1)\
    \ provides an overview of social standards by Dachis Group from a series of articles\
    \ [16].\n\n![](images/600273_1_En_3_Chapter/600273_1_En_3_Fig1_HTML.png)\n\nAn\
    \ overview of misses in social business standards. It has two parts, higher-order\
    \ standards that include social engagement, social behavior, and social metrics,\
    \ and basic standards that include social identity, social activity, social integration,\
    \ and security.\n\n**Figure 3-1** What’s missing in Social Business Standards?\n\
    \nTwo main categories are as follows:\n\n1. **Higher-order standards** – Behavior\
    \ and domain-driven business-oriented standards and APIs. Most of them not so\
    \ clearly fleshed out by the authors of [16]\n2. **Basic standards** – Some were\
    \ mentioned before, here grouped into four subcategories:\n    1. Contacts\n \
    \   2. Activity/Messaging\n    3. Integration/Interoperability\n    4. Security\n\
    \nThen you may look at the way social standards, frameworks, and libraries communicate,\
    \ by either\n\n- Consuming information\n- Analyzing information\n- Transforming\
    \ information\n- Providing information\n\nA typical example for consuming information\
    \ would be showing your status in your favorite social networks inside another\
    \ application, for example, your blog or corporate website.\n\nAnother one is\
    \ if you include a map service to show directions to an event you host or participate\
    \ in.\n\nAnalyzing information involves some sort of calculation, ranking or benchmarking.\
    \ Often consuming more than one source of information, so you can get a better\
    \ picture. An example of such a service would be `Klout`. Where activities across\
    \ multiple social networks influence your overall ranking.\n\nTransforming information\
    \ can be done either by merging and combining several data streams, a simple sum\
    \ of two numbers, or if, for example, your travel booking site predicts the cost\
    \ of a trip in your local currency based on conversion rates. Translation services\
    \ like `Google Translate` would be another, more sophisticated example of transforming\
    \ information.\n\nLast but not least, providing information is any service or\
    \ sometimes just content your application makes available to others, ideally via\
    \ an API allowing others to consume, analyze, or transform it based on their needs.\n\
    \nAnother way of looking at enterprise social networks, related standards, or\
    \ products can be the following:\n\n- **Stand-alone products or services** with\
    \ social aspects that can be installed and used on their own. While some, for\
    \ example, those embracing `OpenSocial`, aim to be interoperable with others,\
    \ ideally across multiple vendors.\n- **Embedded social facets or features** within\
    \ a larger product or suite. A classic example would be `Oracle Fusion Middleware`,\
    \ containing social functionality in the footsteps of `BEA AquaLogic` [13] or\
    \ several other Oracle acquisitions [23] in the social sector since then.\n- **Speciality,\
    \ often domain-specific or vertical social networks**, for example, for healthcare,\
    \ fashion, developers, pet owners, or any other area of interest to a significant\
    \ community. You’ll remember a range of these from the previous chapter.\n\n`OPENi`\
    \ [31], a social media research group funded by the European Union, tried to group\
    \ social standards and APIs in a somewhat context-related manner:\n\n- **Activity\
    \ API** refers to a social, health, and behavioral activity log as reflected in\
    \ multiple cloud-based services ranging from Social, Photo, and Video Sharing\
    \ to Health and Location-Based Services. In essence, it includes all the social\
    \ and personal activities of a user and is related with the logging activity of\
    \ a device. Relevant categories: Gaming, Health, Location-Based Services, Music,\
    \ Photo, Shopping, Social, Video.\n- **Advertising and analytics API** enabling\
    \ the collection, aggregation, and analysis of end user/customer’s needs, interests,\
    \ and preferences based on their interaction with advertising/marketing content.\n\
    - **Application behavioral data**."
