- fmt: '# 社交媒体平台发展简史（2021-2023）


    2021年，Gettr（另一个主要为极右翼用户提供无过滤内容的社交媒体平台）由前总统唐纳德·特朗普的前助手杰森·米勒创立，同时特朗普本人也推出了基于Mastodon但未对联邦宇宙（Fediverse）开放的Truth
    Social[45]。同年，在Twitter启动去中心化社交网络协议项目后，Twitter联合创始人兼前CEO杰克·多西以及曾为加密货币公司Zcash工作的杰伊·格雷伯共同创立了Bluesky
    Social。格雷伯此后一直担任Bluesky的CEO。尽管Bluesky在埃隆·马斯克收购Twitter前曾获得Twitter的资金支持，但为了在马斯克领导下实现财务独立，它于2023年7月在一轮种子融资中筹集了800万美元。更早的2023年5月，Bluesky将其社交媒体客户端以MIT许可证开源，此前它已于前一年发布了底层协议，如认证传输协议（AT
    Protocol或atproto）。Atproto是一个用于构建开放社交媒体应用的联邦协议。虽然Bluesky并未完全被视为联邦宇宙的一部分，但已有努力在两者之间建立桥梁。鉴于其大部分代码开源且与联邦宇宙的标准和协议目标一致，与Bluesky的互操作性很可能很快实现。Bluesky的一个有趣特性是其多语言方法。帖子可以声明最多3种语言。语言列表几乎包含所有已知语言，甚至包括世界语、拉丁语或意第绪语。通过账户设置中的“内容语言”，用户可以选择希望在社交信息流中看到的语言。尽管像LinkedIn这样的社交网络也提供个人资料的国际化（i18n）支持，但Bluesky的语言支持水平似乎相当独特。截至2023年9月下旬，Bluesky用户数已超过115万。目前仍处于仅限邀请的测试阶段，一旦向公众开放，其增长速度应会更快，尤其是如果埃隆·马斯克领导下的前Twitter网络进一步退化为右翼男孩俱乐部，开始向所有人收取基本使用费，或两者兼而有之。


    2022年，Yik Yak在iOS上线一年后重返Android平台。2022年夏天，谷歌的Lambda AI通过了图灵测试，随后ChatGPT也在同年年底问世[49]。当然，这一年（尤其是对社交媒体而言）的主导事件是埃隆·马斯克以440亿美元收购Twitter。


    尽管Twitter在埃隆·马斯克接管后也曾封禁账户[50]，但大量账户因有时可疑的原因被封锁或暂停，而另一些账户（主要是右翼“保守派”、仇恨团体、反疫苗者及类似阴谋论者，最著名的是唐纳德·特朗普本人）的账户则被恢复。为了缓解Twitter的巨额亏损，付费订阅取代了之前的账户验证。减少机器人和虚假账户的承诺也惨遭失败，现在机器人甚至可以通过付费订阅获得某种合法性（如果运营者愿意付费的话）。虽然马斯克解除了对特朗普账户的禁令，但他公开支持共和党初选竞争对手德桑蒂斯，甚至在Twitter上举办了一场直播活动宣布其竞选活动。然而，这场活动对双方来说都是一场灾难和羞辱，因为几乎没有人能参加直播，视频信号几乎不存在，只能听到他们的声音[53]。2022年底，Occupy
    Democrats背后的活动人士推出了Tribel Social，这是一个左倾、自由的社交网络，其座右铭是“道德、真理和人民优先”，加入了其他Twitter替代品的行列。该网站声称拥有约50万用户。


    2023年6月初，Reddit宣布大幅提高其API使用费，希望借此提升其长期筹备的首次公开募股（IPO）的成功几率。根据新的定价方案，开发者每5000万次请求需支付12,000美元，这导致许多使用Reddit的小型或社区驱动型应用被迫停业。这引发了Reddit网络部分区域（称为“subreddits”）许多版主的反抗尝试。他们中的大多数被Reddit封禁，尽管少数人后来恢复了权限。


    除了试图取悦投资者之外，另一个理由是像ChatGPT或谷歌Lambda AI这样的人工智能解决方案兴起，它们从Reddit、维基百科等来源抓取信息用于训练，而这些网站并未因此获得回报。当Twitter为了筹集更多资金而绝望地表示将对5000万次请求收取42,000美元时，引发了巨大愤怒，这导致像Unfollower
    Stats这样的小型或社区驱动型网站也纷纷关闭。尽管Reddit承诺避免这种极端定价，但其价格“仍然是12,000美元”。


    2023年7月5日，Facebook、Instagram和WhatsApp的母公司Meta推出了一项名为Threads的新“微博”服务，显然是对Twitter的打击[57]。这是一个由Instagram开发的去中心化社交网络，目前仍需要现有的Instagram账户。由于欧盟隐私法，Threads在另行通知之前暂未在欧盟上线。


    在最初几天，可以通过移动VPN安装和使用Threads，所以我尝试了一下，但Meta阻止了这种做法，导致用户数在最初激增至超过1亿后出现下降。看来Threads可能很快会在欧盟及其他国家无需VPN即可使用。


    2023年7月24日，埃隆·马斯克将Twitter更名为“X”[58]。马斯克似乎希望模仿微信在中国的一些做法，但他显然忽视了在中国（由于对隐私的不同处理方式以及单一公司的权力集中，只要它遵守政治体制的规则）可能行得通的做法，在其他国家（甚至美国，更不用说欧盟国家）可能行不通。“X”的想法（奇怪的是，谷歌/Alphabet也有一个名为X的、有点秘密的“臭鼬工厂”式实验室）并不新鲜，埃隆·马斯克早在PayPal时代就注册了这个域名；在公司成为PayPal之前，它就已经被称为“X.com”，但在一次由X的最大竞争对手Confinity（及其产品PayPal）发起的、带有敌意色彩的收购（注意其中的讽刺意味）后，他被赶下台，由彼得·蒂尔接任CEO。一个关键原因是马斯克被“X”的众多不同想法和目标所困扰，而蒂尔领导的其他人只想专注于支付业务，该公司至今也在这方面取得了成功。


    当然，马斯克现在比蒂尔富有得多，并且是当今世界首富，但这次他能为“X”实现多少想法，以及用户会接受为其中哪些服务（大多数将是付费的，而且很可能每月不止8美元）付费，而不是在其他地方使用它们（包括PayPal、Stripe、亚马逊以及许多其他在线支付服务），仍有待观察。更不用说如果该应用变得过于庞大，或者例如未来特斯拉的买家被迫只能使用X支付系统，或者强迫所有人观看X上的SpaceX发射（尽管用户体验和性能更差），可能引发的反垄断违规问题。更名后不久，“Twitter鸟”被一个带有X
    Window System风格的“X”标志所取代，像任何其他社交网络一样，“tweet”等术语被替换为“post”，使其失去了曾经拥有的独特品牌认知度。2023年9月18日，埃隆·马斯克宣布他可能对所有用户将X置于付费墙之后，随后在菲律宾和新西兰试行收取迄今为止“象征性的”1美元。尽管他声称是为了打击机器人和虚假账户，但这只是从这件昂贵的玩具中获取一些资金的最新绝望措施。许多专家认为，这可能是X/Twitter的最后一根稻草，其用户群可能迟早会萎缩到MySpace或Truth
    Social的水平。'
  raw: 'In 2021, both Gettr, another social media platform for unfiltered content
    mostly from Alt-Right users was founded by Jason Miller, a former aide to ex-President
    Donald Trump, and Trump himself started Truth Social, based on Mastodon, but without
    being open to the Fediverse [45]. After it had started as a Twitter project to
    create a decentralized social network protocol, in October 2021, Twitter co-founder
    and former CEO, Jack Dorsey as well as Jay Graber, who used to work for crypto
    company Zcash founded Bluesky Social. Graber has been the Bluesky CEO since then.
    While Bluesky had received funding from Twitter through Elon Musk’s takeover,
    it raised $8 million in a seed funding round in July 2023, in order to be financially
    independent from Twitter under Musk. A few weeks earlier, in May 2023, Bluesky
    also made its social media client open source under the MIT license, after it
    had already published underlying protocols like the Authenticated Transfer Protocol
    (AT Protocol or atproto) the year before. Atproto is a federated protocol for
    building open social media applications. While not fully considered part of the
    Fediverse, there are efforts to create bridges between it and Bluesky. Given most
    of it is open source and shares goals with standards and protocols in the Fediverse,
    interoperability with Bluesky is likely going to happen sooner than later. An
    interesting feature of Bluesky is a multi-lingual approach. Posts can declare
    up to 3 languages. The list contains pretty much every known language, even Esperanto,
    Latin or Yiddish. Via “content languages’’ in account settings, users can select
    which languages they want to see in their social feed. Although some social networks
    like LinkedIn also offer i18n for profiles, the level of language support by Bluesky
    seems pretty unique. As of late September 2023, the number of Bluesky users exceeded
    1.15 million. Still an invite-only beta phase, it should grow even faster, once
    it was opened to the general public. Especially if the former Twitter network
    under Elon Musk degrades further into a right-wing boys club, starts charging
    everyone even for basic use, or a combination of these factors.


    In 2022, Yik Yak returned to Android, after it had already been available on iOS
    the year before. In the summer of 2022, Google’s Lambda AI passed the Turing test,
    followed by ChatGPT toward the end of the same year [49]. And of course, the dominating
    event of the year, particularly for social media, was Elon Musk’s $44 billion
    purchase of Twitter.


    While Twitter had also blocked accounts earlier [50] soon after Elon Musk’s takeover,
    a large number of accounts were blocked or suspended for sometimes dubious reasons,
    while others, mostly right-wing “conservatives,” hate groups, anti-vaxxers, and
    similar conspiracy theorists, most notably Donald Trump himself, got their accounts
    reinstated. In an effort to mitigate the soaring losses of Twitter, a paid subscription
    replaced the prior verification of accounts. The vow to reduce bots and fake accounts
    also failed miserably, and now bots can even gain some sort of legitimacy by paying
    for the subscription, if those running them are willing to pay. While Musk reversed
    the ban on Trump’s account, he openly supports Republican primary competitor DeSantis
    and even hosted a live event on Twitter announcing his campaign. However, that
    event became a disaster and humiliation for both, when almost nobody could attend
    the live stream and the video feed was practically nonexistent, leaving only their
    voice to be heard [53]. In late 2022, activists behind Occupy Democrats launched
    Tribel Social, a left-leaning, liberal social network with a motto of “morality,
    truth, and We the People first”, adding to other Twitter alternatives. The site
    claims to have around half a million users.


    In early June 2023, Reddit announced a steep increase in their API usage fees,
    hoping to boost chances of finally launching its long-announced IPO. According
    to the new pricing scheme, developers have to pay $12,000 per 50 million requests,
    driving many smaller or community-driven apps using Reddit out of business. This
    resulted in an attempted uprising by many moderators for parts of the network
    named “subreddits.” Most of them were suspended by Reddit, although a few later
    got reinstated.


    One argument besides trying to please investors was the rise of AI solutions like
    ChatGPT or Google’s Lambda AI harvesting information sources like Reddit, Wikipedia,
    and others for their training, while these sites don’t get rewarded for it. There
    was a great outrage when Twitter, in a desperate move to gather more money, said
    it would charge $42,000 for 50 million requests, which drove many smaller or community-driven
    sites like Unfollower Stats into shutting down as well. Despite Reddit’s promise
    to avoid that kind of extreme pricing, their price is “still $12,000.”


    On July 5, 2023, Meta, the parent company to Facebook, Instagram, or WhatsApp,
    launched a new “microblogging” service named Threads in an apparent blow to Twitter
    [57]. A decentralized social network, developed by Instagram, it so far also requires
    an existing Instagram account. Due to EU privacy laws, Threads is not available
    in the EU until further notice.


    In the first few days, it was possible to install and use Threads via mobile VPN,
    so I gave it a try, but Meta prevented that, leading to a decline in usage after
    an initial surge to over 100 million users. It seems Threads could soon be used
    in the EU and other countries without VPN.


    On July 24, 2023, Elon Musk had Twitter’s name changed to “X” [58]. Hoping to
    mimic some of what WeChat does in China, Musk seemingly ignores that what’s possible
    in China with a different approach to privacy and the power concentration by a
    single company (as long as it plays by the rules of the political establishment)
    may not work in other countries, even the United States, let alone EU countries.
    The idea for “X” (oddly enough, Google/Alphabet also has a somewhat secret “Skunkworks”
    kind of lab named X) is not new, and Elon Musk already registered the domain back
    in his PayPal days; before the company became PayPal, it was already called “X.com”,
    but he was ousted after a somewhat hostile takeover (note the irony) by X’s biggest
    competitor Confinity with their product “PayPal” and replaced by Peter Thiel as
    CEO. A key reason was Musk being torn apart by many different ideas and goals
    for “X”, while the others led by Thiel just wanted to focus on payments, which
    the company also succeeded until today.


    Of course Musk is now much wealthier than Thiel and currently the richest man
    in the world, but it remains to be seen which of the many ideas for “X” he’ll
    accomplish this time and which of these services (most will be paid and likely
    more than just 8$ per month) users accept to pay for, instead of using them elsewhere,
    including PayPal, Stripe, Amazon, and many others for online payments. Not to
    mention possible antitrust violations, if the app became too big or say, future
    buyers of a Tesla were forced to use the X payment system only, or by forcing
    everyone to watch SpaceX launches on X instead of YouTube despite a worse user
    experience and performance. Shortly after the name change, the “Twitter bird”
    was replaced by an “X” logo that bears the sentiment of the X Window System, and
    terms like “tweet” were replaced by “post”, just like any other social network,
    losing even more of the unique brand recognition it once had. On September 18,
    2023 Elon Musk announced that he might put X behind a paywall for all users, followed
    by a trial run of charging a so-far “symbolic” 1 $ in the Philippines and New
    Zealand. Although he claims to fight bots and fake accounts, it’s the latest desperate
    measure to get some money out of the expensive toy. Many experts agree, it could
    be the final nail in the coffin of X/Twitter and its user base may sooner than
    later shrink to a level of MySpace or Truth Social.'
