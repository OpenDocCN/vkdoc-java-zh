    \ container and configurable via the web.xml descriptor by defining `<security-constraint>`\
    \ elements in web.xml and assigning roles that are able to access these resources.\
    \ You can also define HTTP methods allowed to be executed. See the following example:\n\
    \n```\n\n/rest/admin/*\n\nadmin\n\n/rest/orders/*\n\ncustomer\n\nBASIC\nmy-default-realm\n\
    \n```\n\n#### Authentication Mechanisms\n\nThe Jakarta EE platform supports the\
    \ following authentication mechanisms:\n\n*   Basic authentication\n\n*   Form-based\
    \ authentication\n\n*   Custom Form authentication\n\n*   Digest authentication\n\
    \n*   Client authentication\n\n*   OpenID Connect authentication\n\nEverything\
    \ started with the Servlet specification, which specifies four authentication\
    \ mechanisms: BASIC, FORM, DIGEST, and CLIENT-CERT. Later, when Jakarta Security\
    \ API was developed, there was a clear need for BASIC and FORM authentication\
    \ mechanisms to work the same as their BASIC and FORM counterparts in Servlet\
    \ specification. That said, we can distinguish five authentication mechanisms\
    \ overall, of which three come from the Jakarta Security API (BASIC, FORM, CUSTOM-FORM)\
    \ and two from the Servlet specification (DIGEST, CLIENT).\n\nNow let’s have a\
    \ closer look at each of these.\n\n##### Basic Authentication\n\n**What It Is**\n\
    \nBasic authentication is the default authentication when you don’t specify any\
    \ authentication mechanism.\n\n**How It Works**\n\nThe web server requests a username\
    \ and a password from the web client and verifies that both the username and the\
    \ password are valid by comparing them against a database of authorized users\
    \ in the specified or default realm.\n\nIn the following, you can see the sequence\
    \ of actions that occur when basic authentication is used:\n\n1.  A web client\
    \ requests access to a protected recourse.\n\n2.  The web server returns a dialog\
    \ box that requests the username and password.\n\n3.  The web client submits the\
    \ username and password to the server.\n\n4.  The server authenticates the user\
    \ in the specified realm and returns the requested resource upon successful authentication.\n\
    \n![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig1_HTML.jpg)\n\nA schematic\
    \ depicts the client-server authentication. It includes four standards. 1, request\
    \ protected resources. 2, request username password. 3, send username password.\
    \ 4, return requested resource.\n\nFigure 4-1\n\nBasic Authentication\n\n**How\
    \ to Configure It**\n\nAnnotation:\n\n```\npackage enterprise.social.authentication.mechanism.http;\n\
    @Retention(RUNTIME)\n@Target(TYPE)\npublic @interface BasicAuthenticationMechanismDefinition\
    \ {\n/**\n* Name of realm that will be sent via the WWW-Authenticate header.\n\
    * \n* Note that this realm name does not couple a named identity store\n* configuration\
    \ to the authentication mechanism.\n*\n* @return Name of realm\n*/\nString realmName()\
    \ default \"\";\n}\n```\n\nWeb.xml:\n\n```\nBASIC\nenterprisesocialbasicrealm\n\
    \n```\n\n##### Form-Based Authentication\n\n**What It Is**\n\nAn authentication\
    \ mechanism where the user is presented with an editable form to fill in her login\
    \ credentials to log into some service or system.\n\n**How It Works**\n\nThe developer\
    \ controls the *look and feel* of the login screens by customizing the login screen\
    \ and error pages that an HTTP browser presents to the user.\n\nLet’s go through\
    \ the sequence of actions that occur when form-based authentication is used:\n\
    \n1.  A web client requests access to a protected resource.\n\n2.  If the client\
    \ is not authenticated yet, the server redirects them to a login page.\n\n3. \
    \ The client fills in their username and password and submits the login form to\
    \ the server.\n\n4.  The server attempts to authenticate the user.\n\n5.  Authentication\n\
    \    1.  Upon successful authentication, the authenticated user’s principal is\
    \ checked to ensure it belongs to a role being authorized to access the resource.\
    \ If the user is authorized, the server redirects the client to the resource,\
    \ using the stored URL.\n\n    2.  Upon failed authentication, the client is redirected\
    \ to an error page.\n\n![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig2_HTML.jpg)\n\
    \nA block diagram of the form-based login authentication. It begins with login\
    \ page, followed by request protected resources, redirect to login page, submit\
    \ form, and redirect to requested resource. The server runs a security check,\
    \ and if successful, redirects to a resource page or returns error page.\n\nFigure\
    \ 4-2\n\nForm-Based Authentication\n\nFor form-based login, make sure to maintain\
    \ sessions using cookies or TLS session information.\n\n**How to Configure It**\n\
    \nHTML Form\n\nWhen working with form-based authentication, be sure to mark your\
    \ form’s action as `j_security_check`. Thus, the login form will work regardless\
    \ of which resource it is intended for. Moreover, explicitly declaring this action\
    \ means for the server that it will not have to specify the action field of the\
    \ outbound form himself. Here’s a code snippet that shows how the HTML form should\
    \ look like:\n\nAnnotation:\n\n```\npackage jakarta.enterprise.social.authentication.mechanism.http;\n\
    @Retention(RUNTIME)\n@Target(TYPE)\npublic @interface FormAuthenticationMechanismDefinition\
    \ {\n@Nonbinding\nLoginToContinue loginToContinue();\n}\n```\n\nWeb.xml:\n\n```\n\
    FORM\n\n/login.xhtml\n/error.xhtml\n\n```"
  trans: "\n### Jakarta Security\n\nJakarta EE 中的安全性基于一些基本术语：\n\n*   **用户** 是在身份存储中定义的个体身份。该存储可以是数据库、平面文件或\
    \ LDAP 服务器。\n\n*   **组** 是具有相同需求或访问级别的一组用户。\n\n*   **安全域** 是应用服务器访问用户和组信息的通道。\n\
    \n*   **角色** 是 Jakarta EE 中关于访问级别的概念。Jakarta EE 开发者指定哪些角色可以访问哪些应用功能集合。然后，这些角色通过供应商特定的配置数据映射到用户和组。\n\
    \n*   **主体** 是一个具有已知凭证的身份，可以使用身份验证协议进行验证。\n\n*   **凭证** 包含或引用用于验证 Jakarta EE 应用程序主体的信息，例如，通过输入密码或调用外部服务。更多信息请参见“身份验证”。\n\
    \nJakarta Security 的官方范围是：\n\n> *Jakarta Security 提供一组必需的* *安全功能* *，包括身份验证、授权、数据完整性和传输安全。*\n\
    \n您会记得，在第 3 章中，几乎每个社交服务或类似的 API 都使用 RESTful Web 服务。REST 代表“表述性状态转移”。Jakarta REST（前身为\
    \ JAX-RS）是用于 RESTful Web 服务的 Jakarta EE API。\n\n以下是一些简短的示例，说明如何通过注入 Jakarta EE\
    \ `SecurityContext` 实例来完成授权。注入的安全上下文在底层 HttpServletRequest API 之上工作。注入的安全上下文取决于实际的\
    \ RESTful Web 应用程序部署。\n\nSecurityContext 可以与子资源定位器结合使用，通过使用 CDI `@Context` 注解\
    \ [28]，根据用户主体所属的特定角色返回不同的资源。例如，如果用户是“优选客户”，子资源定位器可以返回不同的资源。\n\n```\n@Path(\"basket\"\
    )\npublic ShoppingBasketResource get(@Context SecurityContext sc) {\nif (sc.isUserInRole(\"\
    PreferredCustomer\") {\nreturn new PreferredCustomerShoppingBasketResource();\n\
    } else {\nreturn new ShoppingBasketResource();\n}\n}\n```\n\n在“资源”端点中使用 `SecurityContext`：\n\
    \n```\n@Path(\"resource\")\n@Singleton\npublic static class MyResource {\n@Inject\n\
    SecurityContext securityContext;\n@GET\npublic String getUserPrincipal() {\nreturn\
    \ securityContext.getUserPrincipal().getName();\n}\n}\n```\n\n通过将 `SecurityContext`\
    \ 注入到单例资源中。\n\n当 Jakarta REST 应用程序部署在 Servlet 容器中时，您可以仅依赖 Servlet 容器提供的标准 Jakarta\
    \ EE Web 应用程序安全性，该安全性可通过在 web.xml 中定义 `<security-constraint>` 元素并分配能够访问这些资源的角色，通过\
    \ web.xml 描述符进行配置。您还可以定义允许执行的 HTTP 方法。请参见以下示例：\n\n```\n\n/rest/admin/*\n\nadmin\n\
    \n/rest/orders/*\n\ncustomer\n\nBASIC\nmy-default-realm\n\n```\n\n#### 身份验证机制\n\
    \nJakarta EE 平台支持以下身份验证机制：\n\n*   基本身份验证\n\n*   基于表单的身份验证\n\n*   自定义表单身份验证\n\n\
    *   摘要身份验证\n\n*   客户端身份验证\n\n*   OpenID Connect 身份验证\n\n一切始于 Servlet 规范，该规范指定了四种身份验证机制：BASIC、FORM、DIGEST\
    \ 和 CLIENT-CERT。后来，在开发 Jakarta Security API 时，明确需要 BASIC 和 FORM 身份验证机制的工作方式与 Servlet\
    \ 规范中的 BASIC 和 FORM 对应机制相同。也就是说，我们总共可以区分五种身份验证机制，其中三种来自 Jakarta Security API（BASIC、FORM、CUSTOM-FORM），两种来自\
    \ Servlet 规范（DIGEST、CLIENT）。\n\n现在让我们仔细看看每一种机制。\n\n##### 基本身份验证\n\n**它是什么**\n\n\
    当您未指定任何身份验证机制时，基本身份验证是默认的身份验证方式。\n\n**工作原理**\n\nWeb 服务器向 Web 客户端请求用户名和密码，并通过将用户名和密码与指定或默认域中的授权用户数据库进行比较，来验证用户名和密码是否有效。\n\
    \n下面，您可以看到使用基本身份验证时发生的操作序列：\n\n1.  Web 客户端请求访问受保护的资源。\n\n2.  Web 服务器返回一个对话框，请求输入用户名和密码。\n\
    \n3.  Web 客户端将用户名和密码提交给服务器。\n\n4.  服务器在指定域中对用户进行身份验证，并在身份验证成功后返回请求的资源。\n\n![](img/600273_1_En_4_Fig1_HTML.jpg)\n\
    \n示意图描述了客户端-服务器身份验证。它包括四个步骤。1，请求受保护资源。2，请求用户名密码。3，发送用户名密码。4，返回请求的资源。\n\n图 4-1\n\
    \n基本身份验证\n\n**如何配置**\n\n注解：\n\n```\npackage enterprise.social.authentication.mechanism.http;\n\
    @Retention(RUNTIME)\n@Target(TYPE)\npublic @interface BasicAuthenticationMechanismDefinition\
    \ {\n/**\n* 将通过 WWW-Authenticate 标头发送的域名称。\n* \n* 请注意，此域名称不会将命名身份存储配置耦合到身份验证机制。\n\
    *\n* @return 域名称\n*/\nString realmName() default \"\";\n}\n```\n\nWeb.xml：\n\n\
    ```\nBASIC\nenterprisesocialbasicrealm\n\n```\n\n##### 基于表单的身份验证\n\n**它是什么**\n\
    \n一种身份验证机制，其中向用户呈现一个可编辑的表单，用于填写其登录凭据以登录到某个服务或系统。\n\n**工作原理**\n\n开发者通过自定义 HTTP\
    \ 浏览器向用户显示的登录屏幕和错误页面来控制登录屏幕的*外观和感觉*。\n\n让我们了解使用基于表单的身份验证时发生的操作序列：\n\n1.  Web 客户端请求访问受保护的资源。\n\
    \n2.  如果客户端尚未通过身份验证，服务器会将其重定向到登录页面。\n\n3.  客户端填写其用户名和密码，并将登录表单提交给服务器。\n\n4.  服务器尝试验证用户身份。\n\
    \n5.  身份验证\n    1.  身份验证成功后，会检查已验证用户的主体，以确保其属于有权访问该资源的角色。如果用户获得授权，服务器会使用存储的 URL\
    \ 将客户端重定向到该资源。\n\n    2.  身份验证失败后，客户端会被重定向到错误页面。\n\n![](img/600273_1_En_4_Fig2_HTML.jpg)\n\
    \n基于表单的登录身份验证的框图。它从登录页面开始，然后是请求受保护资源、重定向到登录页面、提交表单以及重定向到请求的资源。服务器执行安全检查，如果成功，则重定向到资源页面或返回错误页面。\n\
    \n图 4-2\n\n基于表单的身份验证\n\n对于基于表单的登录，请确保使用 Cookie 或 TLS 会话信息来维护会话。\n\n**如何配置**\n\n\
    HTML 表单\n\n使用基于表单的身份验证时，请务必将表单的操作标记为 `j_security_check`。因此，无论登录表单用于哪个资源，它都能正常工作。此外，显式声明此操作意味着服务器不必自己指定出站表单的操作字段。以下代码片段显示了\
    \ HTML 表单的外观：\n\n注解：\n\n```\npackage jakarta.enterprise.social.authentication.mechanism.http;\n\
    @Retention(RUNTIME)\n@Target(TYPE)\npublic @interface FormAuthenticationMechanismDefinition\
    \ {\n@Nonbinding\nLoginToContinue loginToContinue();\n}\n```\n\nWeb.xml：\n\n```\n\
    FORM\n\n/login.xhtml\n/error.xhtml\n\n```\n"
- fmt: "### Digest Authentication\n\n**What It Is**\n\nAn authentication mechanism\
    \ similar to the basic authentication, which, however, does not send the password\
    \ in cleartext. This authentication mechanism intends to avoid the most critical\
    \ flaws of basic authentication.\n\n**How It Works**\n\nJust like basic authentication,\
    \ digest authentication authenticates a user based on a username and a password\
    \ without providing any encryption of the message. It applies a hash function\
    \ to the username and password before sending them over the network. That is,\
    \ passwords are not sent over the wire here, yet it requires cleartext password\
    \ equivalents to be available to the authenticating container so that it can validate\
    \ received authenticators by calculating the expected digest.\n\nApplication Walkthrough:\n\
    \n1.  A client requests access to a protected resource.\n2.  The server replies\
    \ with a nonce and a 401 error code.\n3.  The client sends back a response that\
    \ contains a checksum (by default, the MD5 checksum) of the username, the password,\
    \ the realm, the given nonce value, the requested URI, and the HTTP method. `generate_md5_key(nonce,\
    \ username, realm, URI, password_given_by_user)`.\n4.  The server takes the username,\
    \ realm, and the requested URI, and it looks up the password for the given username.\
    \ When found, it generates its own version of let’s say `generate_md5_key(nonce,\
    \ username, realm, URI, HTTP method, password-for-this-user-in-my-db)`.\n5.  The\
    \ server then compares the output of `generate_md5()` that it got with the one\
    \ the client sent and\n    1.  If they match, the client sent the correct password\n\
    \    2.  If they don’t match, the password sent was wrong\n\n**How to Configure\
    \ It**\n\n`web.xml`:\n\n```\nDIGEST\nenterprisesocialdigestrealm\n```\n\n### Client\
    \ Authentication\n\n**What It Is**\n\nAn authentication mechanism where the client\
    \ is securely granted access to a server by exchanging a digital certificate.\n\
    \nYou may come across the term “public key certificate” instead of “digital certificate.”\
    \ Both terms are equivalent and serve the same purpose.\n\n**How It Works**\n\n\
    First of all, it is important to stress that client authentication is a more secure\
    \ method of authentication than either basic or form-based authentication. Its\
    \ main advantage is that it uses HTTP over SSL (HTTPS), in which the server authenticates\
    \ the client using the client’s public key certificate.\n\nWhile client authentication\
    \ may be fine for intranet applications, it often doesn’t scale on the Internet\
    \ because of the challenge of providing client certificates to thousands of users\
    \ during their registration and revoking them during their de-registration.\n\n\
    SSL technology provides data encryption, server authentication, message integrity,\
    \ and optional client authentication for a TCP/IP connection.\n\nThe certificate\
    \ is issued by a certificate authority (CA), which is a trusted organization and\
    \ provides identification to a bearer.\n\n**How to Configure It**\n\n`Web.xml`:\n\
    \n```\nCLIENT-CERT\n```\n\n### Custom Form Authentication\n\n**What It Is**\n\n\
    Similar to the form-based authentication with the main difference here being in\
    \ the continuation of the authentication dialog. So instead of posting back to\
    \ the predefined `j_security_check` action of the form, the Custom Form authentication\
    \ mechanism continues the authentication dialog by invoking `SecurityContext.authenticate()`\
    \ with the credentials the application collected.\n\nThe rest of its concepts\
    \ are pretty much the same as in form-based authentication, so you can refer back\
    \ to the latter for the *How It Works* and *Simple Application Walkthrough* parts.\n\
    \n**How to Define It**\n\n```\n@Retention(RUNTIME)\n@Target(TYPE)\npublic @interface\
    \ CustomFormAuthenticationMechanismDefinition {\n@Nonbinding\nLoginToContinue\
    \ loginToContinue();\n}\n```\n\n### Identity Stores\n\nIn this section, you will\
    \ get introduced to the concepts of identity stores and their importance to security.\
    \ Also, you will have a brief look at a basic setup of an identity store in Jakarta\
    \ EE, which will be extended to an in-depth analysis in the following chapter.\n\
    \n#### What Is an Identity Store?\n\nAn *identity store* is a component that stores\
    \ application-specific identity information for a set of users, such as usernames,\
    \ groups, roles, group memberships, permissions, and credentials. Occasionally,\
    \ it may also be used for storing other information such as GUIDs (caller’s globally\
    \ unique identifiers) or other caller attributes.\n\nTo simplify the aforementioned\
    \ definition, you can think of an identity store as a security-specific DAO (Data\
    \ Access Object).\n\n#### What Is the Purpose of an Identity Store?\n\nThe purpose\
    \ of an *identity store* is to validate a caller’s identity by accessing a caller’s\
    \ identity attributes. That is, an *identity store* provides access to user information\
    \ and is required for authentication.\n\nThe four most important characteristics\
    \ of an *identity store* are as follows:\n\n1.  Provides access to user information\n\
    2.  Required for authentication\n3.  Validates credentials\n4.  Retrieves group\
    \ membership\n\nAn *identity store* can provide capabilities for authentication,\
    \ authorization, or both.\n\n#### Identity Store and Jakarta EE\n\nThe broader\
    \ Jakarta EE ecosystem comprises several APIs to help you govern your web application’s\
    \ authentication (*Jakarta Authentication*), authorization (*Jakarta Authorization*),\
    \ and security standards. The Jakarta EE API specifies, among others, the `IdentityStore`\
    \ interface, providing an abstraction for an identity store.\n\nImplementing `IdentityStore`\
    \ enables developers to interact with identity stores to authenticate users (i.e.,\
    \ validate their credentials) and to fetch caller groups.\n\nWe consider a good\
    \ `IdentityStore` implementation that one which operates only on context level\
    \ and is environment agnostic (will run the same way and will provide the same\
    \ results regardless of the environment that it’s ported and run into). That is,\
    \ a good `IdentityStore` implementation caters a neat `{credentials in, caller\
    \ data out}` function.\n\nLet’s look at the complete interface (without default\
    \ behavior, signatures only) and try to better understand it:\n\n```\npublic interface\
    \ IdentityStore {\nenum ValidationType { VALIDATE, PROVIDE_GROUPS }\nCredentialValidationResult\
    \ validate(Credential credential);\nSet getCallerGroups(CredentialValidationResult\
    \ validationResult);\nint priority();\nSet validationTypes();\n}\n```\n\nThe two\
    \ most important methods of the `IdentityStore` interface are as follows:\n\n\
    *   `validate(Credential)` validates a `Credential`.\n*   `getCallerGroups(CredentialValidationResult)`\
    \ fetches caller information.\n\n`IdentityStore` implementations can choose to\
    \ handle either or both of these methods, depending on their capabilities and\
    \ configuration. They can hint which of these two methods they handle by utilizing\
    \ the set of values the `validationTypes()` method comes with:\n\n*   **VALIDATE**\
    \ – Indicates that it handles the `validate()` method\n*   **PROVIDE_GROUPS**\
    \ – Indicates that it handles the `getCallerGroups()` method\n*   **VALIDATE**\
    \ and **PROVIDE_GROUPS** combined – Indicates that it handles both methods\n\n\
    You might feel that declaring capabilities is rather confusing, yet it was a conscious\
    \ decision to ensure an `IdentityStore`’s configuration and implementation are\
    \ self-governing. That means that an `IdentityStore` could be configured to support\
    \ one or the other methods during a particular deployment yet it could be written\
    \ to support both methods."
