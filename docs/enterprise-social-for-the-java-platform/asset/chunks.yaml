  trans: '

    #### MicroProfile JWT


    许多标准令人沮丧的一点是，有些标准试图面面俱到，提供海量的选择。JWT 就是如此，它允许多种类型的数字签名和大量可能的声明。虽然可能性是无限的，但如此多的选项也意味着互操作性问题的可能性是无限的。


    MicroProfile JWT 的一个关键目标是，仅采用这些选项中足够的部分，以便能够以一种特别有利于微服务的方式实现跨企业的基本互操作性。


    MicroProfile JWT 规范的重点是定义可用于可互操作的身份验证和授权的 JWT 所需格式。MP JWT 还将 JWT 声明映射到各种 Jakarta
    EE 容器 API，并通过 getter 方法提供这组声明。


    该规范、API 和 TCK 的源代码可从 Eclipse [microprofile-jwt-auth](https://github.com/eclipse/microprofile-jwt-auth)
    GitHub 仓库获取。


    MP JWT 作为令牌格式的用途取决于身份提供者和服务提供者之间的协议。这意味着身份提供者（负责颁发令牌）应能够使用 MP JWT 格式颁发可互操作的令牌，以便服务提供者能够理解，从而验证令牌并收集关于主题的信息。在这方面，MicroProfile
    JWT 的要求如下：


    1.  可用作身份验证令牌

    2.  可用作授权令牌，其中包含通过 `groups` 声明间接授予的 Jakarta EE 应用程序级角色

    3.  能够支持 IANA JWT 规范中描述的其他标准声明以及非标准声明


    为了满足这些要求，MP JWT 引入了两个新的声明：


    *   “upn” – 一个人类可读的声明，用于在访问令牌的 MicroProfile 服务中唯一标识令牌的主题或用户主体。

    *   “groups” – 令牌主体的组成员身份，这些成员身份将映射到 MicroProfile 服务容器中的 Java EE 风格应用程序级角色。


    该规范（截至 2.1 版本）基于以下 Jakarta EE API 依赖项：


    *   Jakarta RESTful Web Services 3.0

    *   Jakarta JSON Processing 2.0

    *   Jakarta JSON Binding 2.0

    *   CDI 3.0

    *   Jakarta Annotations 2.0


    MicroProfile JWT 规范专注于微服务验证 JWT 的能力，并未定义以下内容：


    *   JWT 创建 – 令牌通常由企业中的专用服务（如 API 网关或身份提供者）创建。

    *   RSA 公钥分发 – 分发网关或身份提供者的公钥不在 MP JWT 的范围内。与 TLS/SSL 证书类似，它们可能不会频繁更改，手动分发或安装它们（例如，在
    docker 镜像中）是一种常见做法。

    *   自动 JWT 传播 – 使用 MP JWT 的微服务有一种有保证的标准方式来在传入调用中获取 JWT。但是，传播必须由微服务本身在应用程序代码中完成，方法是将
    JWT 放置在传出 HTTP 调用的 Authorization 头中。


    MicroProfile JWT 的一个关键目标是，每个微服务都可以验证和传播令牌。出于 HS256 问题中讨论的原因，MicroProfile JWT 仅选择基于
    RSA 的数字签名。


    创建 JWT 的授权服务器的 RSA 公钥可以在任何实际 HTTP 请求之前预先安装到所有微服务上。当调用到达微服务时，它将使用此 RSA 公钥来验证 JWT
    并确定调用者的身份是否有效。如果微服务发出任何 HTTP 调用，它应该在这些调用中传递 JWT，将调用者的身份传播给其他微服务。


    根据 JWT 标准的规定，**"alg"** 头参数必须存在。如果声明或嵌套的 JWT 令牌被加密，**"enc"** 也是一个强制性的头参数。


    建议使用头参数 **"typ"** 和 **"kid"**。


    虽然 JWT 规范几乎将所有注册声明都声明为可选的，但 MicroProfile JWT 要求存在以下声明：


    *   iss

    *   iat

    *   exp


    MP JWT 建议使用这些 JWT 声明：


    *   sub

    *   jti

    *   aud


    除了表 4-1 中列出的注册 JWT 声明之外，MicroProfile JWT 还定义了自己的公共声明（表 4-2）。


    表 4-2


    MP JWT 公共声明


    | **声明名称** | **描述** | **参考** |   |

    | --- | --- | --- | --- |

    | upn | 在 `java.security.Principal` 接口中提供用户主体名称。此声明是必需的 | MP-JWT 2.1 规范 |   |

    | groups | 提供已分配给 MP-JWT 主体的组名列表。这通常需要在应用程序容器级别映射到应用程序部署角色，但除了任何其他映射之外，还需要在组名和应用程序角色名之间进行一对一映射。此声明是可选的
    | MP-JWT 2.1 规范 |   |


    如果端点需要授权，建议 JWT 令牌包含一个 **"groups"** 声明，但如果令牌是由 OpenID Connect 和其他当前不支持 MP JWT
    的提供者颁发的，MP JWT 实现可以从其他声明映射组。


    如果无法直接从给定令牌的 **"groups"** 声明或通过自定义映射器从其他声明中提取组信息，那么如果端点仅需要身份验证，则可以接受此令牌。


    **"exp"**、**"iat"** 和其他与日期相关的声明使用的数字日期值是一个 JSON 数值，表示从 `1970-01-01T00:00:00Z UTC`
    到指定 UTC 日期/时间的**秒数**，忽略闰秒。


    MicroProfile JWT 实现可以强制要求 JWT 令牌包含所有推荐的头部和声明。推荐的头部和声明在未来的 MP JWT 规范版本中可能会成为必需的。


    一个 JSON 格式的最小 MP JWT 示例如下：


    ```

    {

    "typ": "JWT",

    "alg": "RS256",

    "kid": "abc-1234567890"

    }

    {

    "iss": "https://server.example.com",

    "jti": "a-123",

    "exp": 1311281970,

    "iat": 1311280970,

    "sub": "24400320",

    "upn": "jdoe@server.example.com",

    "groups": ["red-group", "green-group", "admin-group"],

    }

    ```


    MicroProfile JWT 规范定义了一个 **JsonWebToken** `java.security.Principal` 接口扩展，该扩展通过
    get 方法提供这组必需的声明。


    ## 总结


    在标准化了社交媒体交互和 API 之后，本章向我们展示了社交网络的安全方面以及旨在实现安全性的标准。在下一章中，我们将探讨使用或实现其中一些标准的安全框架。


    # 5. 安全框架


    前一章讨论了社交网络的安全方面以及与安全相关的标准。在本章中，我们将介绍诸如 Soteria、Keycloak、Spring Security、Micronaut
    Security、Apache Shiro 或 Scribe 等安全框架，它们支持授权、身份验证或两者兼有。


    ## Soteria


    Eclipse Soteria 是 Jakarta Security 的兼容实现。


    “Soteria”一词源自希腊语，意为“救援”、“福祉”或“救赎”。


    ### 历史


    “Soteria”这个术语是在 Werner Keil 对 EG 成员进行的一项调查中选出的，当时 Soteria 是 JSR 375 的参考实现，最初作为
    Java EE Security 启动。


    特别是在欧洲，它也被用于医疗保健领域，通常与心理问题的诊所相关，但这纯属巧合。在 Eclipse 基金会过渡到 Jakarta EE 之后，法律团队检查了该术语可能存在的所有商标，并未发现任何问题，而其他项目，特别是“Ozark”（MVC
    兼容实现），不得不更名为“Krazo”。

    '
- fmt: '### Authentication Mechanisms


    The foundation of the authentication mechanism implementation is `HttpAuthenticationMechanism`,
    which makes the respective mechanism available as a CDI bean. The implemented
    method `validateRequest()` returns an `AuthenticationStatus` object containing
    the status of that authentication. The specification provides out-of-the-box mechanisms
    for basic authentication and form-based authentication.


    The Jakarta Servlet specification defines a declarative mechanism for configuring
    an application to provide `BASIC`, `DIGEST`, `FORM`, or `CERT` authentication,
    with authentication performed automatically by the container based on the application’s
    configuration. `FORM` authentication can include custom form pages.


    In addition, a Jakarta EE container *must* support built-in beans for the following
    `HttpAuthenticationMechanism` types, made available via configuration:


    - `BASIC` – Uses the standard Basic Authentication Scheme described in RFC 2617.
    There is no encryption of credentials unless you use SSL. This type is not a secure
    method unless used with SSL. This bean is activated and configured via the `@BasicAuthenticationMechanismDefinition`
    annotation.

    - `FORM` – The application provides its own custom login and error pages. The
    communication protocol is HTTP with optional SSL. There is no encryption of user
    credentials unless SSL is used. This bean is activated and configured via the
    `@FormAuthenticationMechanismDefinition` annotation.

    - Custom `FORM` – A variant on `FORM`, with the difference that continuing the
    authentication dialog as described in the Servlet spec does not happen by posting
    back to `j_security_check`, but by invoking `SecurityContext.authenticate()` with
    the credentials collected by the application. This bean is activated and configured
    via the `@CustomFormAuthenticationMechanismDefinition` annotation.

    - OpenID Connect – Authenticates according to the Authorization Code flow and
    Refresh tokens as defined by the OpenID Connect specification [29]. This bean
    is activated and configured via the `@OpenIdAuthenticationMechanismDefinition`
    annotation.


    Jakarta Security has versions of Basic and Form that *must* match the Servlet
    spec, but GlassFish doesn’t use them in web applications when defined in the `web.xml`,
    only when defined via annotations.


    Here’s an example for the `BasicAuthenticationMechanism` in Soteria:


    ```java

    package org.glassfish.soteria.mechanisms;

    import static java.lang.String.format;

    import static jakarta.security.enterprise.identitystore.CredentialValidationResult.Status.VALID;

    import static jakarta.xml.bind.DatatypeConverter.parseBase64Binary;

    import static org.glassfish.soteria.Utils.isEmpty;

    import jakarta.security.enterprise.AuthenticationException;

    import jakarta.security.enterprise.AuthenticationStatus;

    import jakarta.security.enterprise.authentication.mechanism.http.BasicAuthenticationMechanismDefinition;

    import jakarta.security.enterprise.authentication.mechanism.http.HttpAuthenticationMechanism;

    import jakarta.security.enterprise.authentication.mechanism.http.HttpMessageContext;

    import jakarta.security.enterprise.credential.Password;

    import jakarta.security.enterprise.credential.UsernamePasswordCredential;

    import jakarta.security.enterprise.identitystore.CredentialValidationResult;

    import jakarta.security.enterprise.identitystore.IdentityStoreHandler;

    import jakarta.servlet.http.HttpServletRequest;

    import jakarta.servlet.http.HttpServletResponse;

    import org.glassfish.soteria.cdi.CdiUtils;

    /**

    * Authentication mechanism that authenticates using basic authentication

    *

    * @author Arjan Tijms

    *

    */

    public class BasicAuthenticationMechanism implements HttpAuthenticationMechanism
    {

    private final BasicAuthenticationMechanismDefinition basicAuthenticationMechanismDefinition;

    // CDI requires a no-arg constructor to be portable

    // It''s only used to create the proxy

    protected BasicAuthenticationMechanism() {

    basicAuthenticationMechanismDefinition = null;

    }

    public BasicAuthenticationMechanism(BasicAuthenticationMechanismDefinition basicAuthenticationMechanismDefinition)
    {

    this.basicAuthenticationMechanismDefinition = basicAuthenticationMechanismDefinition;

    }

    @Override

    public AuthenticationStatus validateRequest(HttpServletRequest request, HttpServletResponse
    response, HttpMessageContext httpMsgContext) throws AuthenticationException {

    String[] credentials = getCredentials(request);

    if (!isEmpty(credentials)) {

    IdentityStoreHandler identityStoreHandler = CdiUtils.getBeanReference(IdentityStoreHandler.class);

    CredentialValidationResult result = identityStoreHandler.validate(

    new UsernamePasswordCredential(credentials[0], new Password(credentials[1])));

    if (result.getStatus() == VALID) {

    return httpMsgContext.notifyContainerAboutLogin(

    result.getCallerPrincipal(), result.getCallerGroups());

    }

    }

    if (httpMsgContext.isProtected()) {

    response.setHeader("WWW-Authenticate", format("Basic realm=\"%s\"", basicAuthenticationMechanismDefinition.realmName()));

    return httpMsgContext.responseUnauthorized();

    }

    return httpMsgContext.doNothing();

    }

    private String[] getCredentials(HttpServletRequest request) {

    String authorizationHeader = request.getHeader("Authorization");

    if (!isEmpty(authorizationHeader) && authorizationHeader.startsWith("Basic ")
    ) {

    return new String(parseBase64Binary(authorizationHeader.substring(6))).split(":");

    }

    return null;

    }

    }

    ```


    ### Supported Runtimes


    Soteria runs on the following Jakarta EE CI runtimes:


    - GlassFish

    - Payara

    - WildFly

    - Open Liberty


    In addition, all implementations that use Soteria under “Implementation Components”
    run or contain it.


    With some adjustments, it also runs on TomEE, but since TomEE 9+ and Open Liberty
    come with their own implementations of Jakarta Security (not based on Soteria),
    those can be a little more complicated.'
