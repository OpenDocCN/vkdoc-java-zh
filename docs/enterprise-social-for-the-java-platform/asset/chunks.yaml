  trans: '

    ##### 标头


    ![](img/600273_1_En_4_Fig13_HTML.jpg)


    JWT 的结构。它由两部分组成：标头和解码器。标头包含令牌类型和生成签名的算法。解码部分包含标头、载荷和签名的脚本。


    图 4-13


    JWT 结构


    标头描述了 JSON Web 令牌本身。它包含令牌类型和用于生成签名的算法的信息。算法参数 **"alg"** 必须存在于每个 JWT 标头中。最常见的算法是使用
    SHA-256 哈希的 HMAC（“HS256”）或使用相同哈希的 RSA（“RS256”），以及最近出现的使用 SHA-256 的 ECDSA P-256（“ES256”）。允许的值由
    JSON Web 加密（JWE）标准 RFC 7516 指定。


    在我们的示例中，标头包含算法和类型参数：


    ```

    {

    "typ" : "JWT",

    "alg" : "RS256"

    }

    ```


    类型参数 **"typ"** 用于声明令牌的 IANA 媒体类型（RFC 6838）。它是可选的，但设置时，其值应始终为“JWT”，代表媒体类型 `"application/jwt"`。


    另一个参数 **"cty"**（内容类型）用于声明受保护内容（载荷）的媒体类型。它是可选的，并且仅在载荷包含另一个 JSON Web 令牌时才需要，在这种情况下其值应为“JWT”；否则，可以忽略或省略此参数。


    参数 **"enc"**（加密算法）是为与 JWE 一起使用而定义的。仅当声明或嵌套的 JWT 令牌需要加密时才需要它。它标识用于加密声明或嵌套 JWT 令牌的加密算法。


    例如，使用 256 位密钥的伽罗瓦/计数器模式（GCM）算法中的 AES 将被指定为“A256GCM”。


    还有其他几个预定义的标头参数，例如：


    *   crit（关键）

    *   jku（JWK 集 URL）

    *   jwk（JSON Web 密钥）

    *   kid（密钥 ID）

    *   x5u（X.509 URL）

    *   x5t（X.509 证书 SHA-1 指纹）

    *   x5t#S256（X.509 证书 SHA-256 指纹）


    ##### 载荷


    载荷或主体是 JWT 的核心部分，包含安全声明，例如用户身份和授予的权限。JWT 将其称为声明。


    JWT 声明名称有三种类型：


    1.  注册声明

    2.  公共声明

    3.  私有声明


    注册声明是预定义的声明。公共声明可以是任何用户定义的信息，而私有声明是 JWT 的生产者和消费者同意在特定应用程序中使用的声明。


    为了验证 JWT，我们也应该检查一些注册声明。一些重要的注册声明在表 4-1 中定义。


    表 4-1


    注册的 JWT 声明


    | 声明名称 | 描述 | 参考 |

    | --- | --- | --- |

    | iss | 令牌颁发者 | RFC 7519，第 4.1.1 节 |

    | sub | 作为 JWT 主体的主体 | RFC 7519，第 4.1.2 节 |

    | aud | JWT 的接收者 | RFC 7519，第 4.1.3 节 |

    | exp | 在此时间或之后，JWT 不得被接受处理的过期时间 | RFC 7519，第 4.1.4 节 |

    | nbf | 在此时间之前，JWT 不得被接受处理 | RFC 7519，第 4.1.5 节 |

    | iat | 颁发者生成 JWT 的时间 | RFC 7519，第 4.1.6 节 |

    | jti | JWT 的唯一标识符 | RFC 7519，第 4.1.7 节 |


    ##### “iss”（颁发者）声明


    “iss”（颁发者）声明标识了颁发 JWT 的主体。此声明的处理通常特定于应用程序。“iss”值是一个区分大小写的字符串，包含一个 URI 值。此声明的使用是可选的。我们应该验证颁发者是一个有效的
    URL，或者 JWT 是由预期的颁发者发送的。


    ##### “sub”（主题）声明


    “sub”（主题）声明标识了作为令牌主体的主体。JWT 中的声明是关于该主体的陈述。“sub”值是一个区分大小写的字符串，包含一个 URI 值。此声明的使用是可选的。


    ##### “aud”（受众）声明


    “aud”（受众）声明标识了令牌的接收者。每个打算处理 JWT 的主体必须使用受众声明中的一个值来标识自己。如果处理声明的主体在存在“aud”声明时未使用其中的值标识自己，则必须拒绝该
    JWT。通常，“aud”值是一个区分大小写的字符串数组，每个字符串包含一个 URI 值。此声明的使用是可选的。


    ##### “exp”（过期时间）声明


    “exp”（过期时间）声明标识了在此时间或之后令牌将不被接受处理的过期时间。处理“exp”声明要求当前日期/时间必须早于“exp”声明中列出的过期日期/时间。其值必须是一个数字时间戳。此声明的使用是可选的。


    ##### “nbf”（不早于）声明


    “nbf”（不早于）声明标识了在此时间之前 JWT 不得被接受处理的时间。处理“nbf”声明要求当前日期/时间必须等于或晚于“nbf”声明中列出的不早于日期/时间。其值必须是一个包含数字日期值的数字。此声明是可选的。


    ##### “iat”（签发时间）声明


    “iat”（签发时间）声明标识了令牌被签发的时间。此声明可用于确定 JWT 的时效。其值必须是一个包含数字日期值的数字。此声明是可选的。


    ##### “jti”（JWT ID）声明


    “jti”（JWT ID）声明为 JWT 提供了一个区分大小写的唯一标识符。标识符值的分配方式必须确保同一值被意外分配给不同数据对象的概率可以忽略不计；如果应用程序使用多个颁发者，则还必须防止不同颁发者产生的值之间发生冲突。“jti”声明可用于防止
    JWT 被重用。此声明的使用是可选的。


    ##### 签名


    JSON Web 令牌的第三部分是签名。它是验证 JWT、确保其未被修改或篡改并且可以信任的最重要部分。签名是使用载荷和密钥生成的；因此，拥有此密钥的任何人都可以生成具有有效签名的新令牌。


    用于生成签名的最常用的加密算法如下：


    *   HS256，是 HMAC-SHA256 的缩写

    *   RS256，是 RSA-SHA256 的缩写

    *   ES256，是 ECDSA P-256 SHA-256 的缩写


    **HS256** 是一种对称密钥加密，涉及在双方之间共享一个密钥。此密钥用于加密数据，在接收方，使用相同的密钥解密数据。HS256 签名是使用一个密钥生成的，该密钥在接收端（资源服务器）进行验证。在接收方，必须使用载荷和密钥再次生成签名，并与传入
    JWT 的签名部分进行比较。由于只有认证服务器和资源服务器拥有该密钥，因此无法篡改 JWT，我们可以确保其有效性。

    '
- fmt: '# MicroProfile JWT


    A frustrating aspect of many standards is that some aim to be a jack of all trades
    offering a massive number of choices. This is definitely the case with JWT, which
    allows multiple types of digital signatures and many possible claims. While the
    possibilities are infinite, so many options mean infinite opportunities for interoperability
    issues.


    A critical goal of MicroProfile JWT is to take just enough of these options that
    the basic interoperability across enterprises can be achieved in a way that favors
    microservices in particular.


    The focus of the MicroProfile JWT specification is the definition of the required
    format of JWT usable for interoperable authentication and authorization. MP JWT
    also maps JWT claims to various Jakarta EE container APIs and makes the set of
    claims available through getter methods.


    The sources for the specification, API, and TCK are available from the Eclipse
    [microprofile-jwt-auth](https://github.com/eclipse/microprofile-jwt-auth) GitHub
    repository.


    The purpose of MP JWT as a token format depends on the agreement between identity
    providers and service providers. This means identity providers – responsible for
    issuing tokens – should be able to issue interoperable tokens using the MP JWT
    format in a way that service providers can understand in order to validate the
    token and gather information about a subject. With that respect, requirements
    for the MicroProfile JWT are as follows:


    1. Be usable as an authentication token

    2. Be usable as an authorization token that contains Jakarta EE application–level
    roles indirectly granted via a `groups` claim

    3. Able to support additional standard claims described in IANA JWT specification
    as well as nonstandard claims


    To meet those requirements, MP JWT introduced two new claims:


    - `upn` – A human-readable claim that uniquely identifies the subject or user
    principal of the token, across MicroProfile services accessing the token

    - `groups` – The token subject’s group memberships that will be mapped to Java
    EE style application–level roles in the MicroProfile service container


    The specification (as of 2.1) is based on the following Jakarta EE API dependencies:


    - Jakarta RESTful Web Services 3.0

    - Jakarta JSON Processing 2.0

    - Jakarta JSON Binding 2.0

    - CDI 3.0

    - Jakarta Annotations 2.0


    The MicroProfile JWT specification is focused on the ability of microservices
    to verify JWTs and does not define the following:


    - JWT creation – Tokens will typically be created by a dedicated service in the
    enterprise like an API gateway or an identity provider.

    - RSA public key distribution – Distributing the public key of the gateway or
    identity provider is out of scope for MP JWT. Like TLS/SSL certificates, they
    may not change often, and distributing them manually or installing them, for example,
    docker images, is a common practice.

    - Automatic JWT propagation – Microservices using MP JWT have a guaranteed and
    standard way to obtain the JWT on incoming calls. However, propagation must be
    done by the microservice itself in the application code by placing the JWT in
    the `Authorization` header of outgoing HTTP calls.


    It is a critical goal of MicroProfile JWT that the token can be both verified
    and propagated by each microservice. For reasons discussed in the trouble with
    HS256, MicroProfile JWT chooses RSA-based digital signatures only.


    The RSA public key of the authorization server, which creates the JWTs, can be
    installed on all the microservices in advance of any actual HTTP requests. When
    calls come into a microservice, it will use this RSA public key to verify the
    JWT and determine if the caller’s identity is valid. If any HTTP calls are made
    by the microservice, it should pass the JWT in those calls, propagating the caller’s
    identity forward to other microservices.


    As defined by the JWT standard, the `alg` header parameter must be present. If
    claims or nested JWT tokens are encrypted, `enc` is also a mandatory header parameter.


    The use of the header parameters `typ` and `kid` is recommended.


    While the JWT specification declares pretty much every registered claim as optional,
    MicroProfile JWT requires the following claims to be present:


    - `iss`

    - `iat`

    - `exp`


    The use of these JWT claims is recommended by MP JWT:


    - `sub`

    - `jti`

    - `aud`


    In addition to the registered JWT claims listed in Table [4-1](#600273_1_En_4_Chapter.xhtml#Tab1),
    MicroProfile JWT defines the public claims of its own (Table [4-2](#600273_1_En_4_Chapter.xhtml#Tab2)).


    **Table 4-2** MP JWT Public Claims


    | Claim Name | Description | Reference |

    | --- | --- | --- |

    | `upn` | Provides the user principal name in the `java.security.Principal` interface.
    This claim is required | MP-JWT 2.1 specification |

    | `groups` | Provides the list of group names that have been assigned to the principal
    of the MP-JWT. This typically will require a mapping at the application container
    level to application deployment roles, but a one-to-one between group names and
    application role names is required to be performed in addition to any other mapping.
    This claim is optional | MP-JWT 2.1 specification |


    It is recommended that JWT tokens have a `groups` claim if the endpoint requires
    authorization, but MP JWT implementations can map the groups from other claims
    if the tokens have been issued by OpenID Connect and other providers that currently
    do not support MP JWT.


    If no groups information can be extracted directly from the `groups` claim or
    via custom mappers from other claims in a given token, then this token can be
    accepted if the endpoint requires authentication only.


    Numeric date values used by `exp`, `iat`, and other date-related claims are a
    JSON numeric value representing the number of **seconds** from `1970-01-01T00:00:00Z
    UTC` until the specified UTC date/time, ignoring leap seconds.


    MicroProfile JWT implementations may enforce that JWT tokens contain all the recommended
    headers and claims. The recommended headers and claims may become required in
    the future versions of the MP JWT specification.


    An example minimal MP JWT in JSON would be


    ```

    {

    "typ": "JWT",

    "alg": "RS256",

    "kid": "abc-1234567890"

    }

    {

    "iss": "https://server.example.com",

    "jti": "a-123",

    "exp": 1311281970,

    "iat": 1311280970,

    "sub": "24400320",

    "upn": "jdoe@server.example.com",

    "groups": ["red-group", "green-group", "admin-group"],

    }

    ```


    The MicroProfile JWT specification defines a `JsonWebToken` `java.security.Principal`
    interface extension that makes this set of required claims available via get methods.


    ## Summary


    After standardization of social media interaction and APIs, this chapter showed
    us the security aspects of social networks and standards aiming at security. In
    the following chapter, we’ll discover security frameworks that make use of or
    implement some of these standards.


    # 5. Security Frameworks


    The previous chapter dealt with security aspects of social networks and standards
    related to security. In this chapter, we’ll cover security frameworks like Soteria,
    Keycloak, Spring Security, Micronaut Security, Apache Shiro, or Scribe, supporting
    authorization, authentication, or both.


    ## Soteria


    Eclipse Soteria is the compatible implementation of Jakarta Security.


    The word “Soteria” is Greek and means “rescue,” “wellbeing,” or “salvation”.


    ### History


    The term “Soteria” was picked in a survey conducted by Werner Keil among EG members
    while Soteria was the RI of JSR 375, then started as Java EE Security.


    Especially in Europe it is also used in a healthcare context, often related to
    clinics for psychological problems, but that was a pure coincidence. After the
    transition to Jakarta EE at the Eclipse Foundation, the legal team checked all
    trademarks for the term that might exist and had no concerns, while other projects,
    especially “Ozark” (the MVC compatible implementation), had to be renamed to “Krazo.”'
