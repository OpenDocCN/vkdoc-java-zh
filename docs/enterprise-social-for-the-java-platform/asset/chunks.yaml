- fmt: "#### Private Key JWT for Client Authentication\n\nOpenID Connect clients that\
    \ are configured by using the `oidcLogin` element in the Social Media Login feature\
    \ support the `private_key_jwt` client authentication method with OpenID Connect\
    \ token endpoints. The process for enabling this in the Social Media Login feature\
    \ is identical to the OpenID Connect Client 1.0 feature:\n\n```\nUse OpenShift\
    \ Service Accounts to Authenticate and\nAuthorize\n\nThe Social Media Login feature\
    \ can be configured to use OpenShift service\naccounts to authenticate and authorize\
    \ protected resource\nrequests. With this configuration, server administrators\
    \ can secure\nendpoints, for example, monitoring and metrics endpoints, that might\n\
    produce sensitive information. The service accounts can authenticate\nthemselves\
    \ by providing a service account token that was created within\nthe OpenShift\
    \ cluster in the request. The following example shows how to\nconfigure the Social\
    \ Media Login feature to use OpenShift service\naccounts as a Single Sign-On provider:\n\
    ```\n\nThe `okdServiceLogin` element authenticates all protected resource requests\
    \ received by Open Liberty. The OpenShift project that the service account is\
    \ in, is used as the group for the service account for authorization decisions.\n\
    \n#### Use Active Directory As Authentication Provider\n\nYou can configure an\
    \ Open Liberty server to use Active Directory as an authentication provider for\
    \ protected resources. The `oidcLogin` element configures a social login by using\
    \ the OpenID Connect protocol. With OpenID Connect, the discovery endpoint URL\
    \ provides the information that the client needs to interact with the authentication\
    \ provider, which in this case is Active Directory. In the following example,\
    \ the `discoveryEndpoint` attribute specifies the endpoint URL for Active Directory:\n\
    \n```\nKeycloak\nKeycloak [66]\nis an open source identity, access management,\
    \ and Single Sign-On\nsolution for applications and services. Users can authenticate\
    \ against\nKeycloak rather than each individual application, relieving the\napplication\
    \ from dealing with login forms, authentication, or storing\nuser's identities.\
    \ Keycloak also offers social logins, support\nfor desktop or mobile apps, and\
    \ integration into other solutions\nincluding LDAP, Active Directory, OAuth, OpenID\
    \ Connect, or SAML.\n\nHistory\nKeycloak was created by Bill Burke and Stian Thorgersen\
    \ in 2014. The\nfirst release was published in September 2014 after development\
    \ had started\nabout a year before. In 2016, Red Hat switched the Red Hat SSO\
    \ product\nfrom being based on the PicketLink framework to the Keycloak upstream\n\
    project, after it had already merged the PicketLink code base into\nKeycloak.\n\
    Since then, Keycloak saw almost manic release cycles and version\nnumber changes.\
    \ At the end of June 2016 around the time Red Hat made\nKeycloak the basis for\
    \ its SSO product, version 2.0.0 was released.\nAbout a year later, version 3.0.0\
    \ came out, followed by Keycloak 4.0.0\nin June 2018.\nThere probably was a bit\
    \ of an influence by the Java and OpenJDK\nrelease cadence pushing out a new major\
    \ version of the JDK every six\nmonths and a Long-Term Service version every two\
    \ years as of 2021, but\nnot only Keycloak but also other projects by Red Hat\
    \ like WildFly seemed\nversion-crazy after 2019 because Keycloak 5.0.0 was released\
    \ in March\n2019 with 6.0.0 only a month later. And in November 2019, the version\n\
    number had jumped to 8. As of August 2021, the most recent Keycloak\nversion is\
    \ 15.0.2. While the pace at least on the first digit sometimes\nlooks like it\
    \ slowed down a bit, versions 13-15 were all released\nin 2021 alone, which makes\
    \ it look like Red Hat follows a major release nearly every\nthree to four months\
    \ at the very least, sometimes faster with only minor\nslowdown in the second\
    \ half of 2021. The release notes are sometimes\njust one-liners, which make one\
    \ wonder how the giant leap of version\nnumbers was justified, but it looks like\
    \ marketing drives it and the\nunderlying WildFly\nnumbers also increase even\
    \ more than Keycloak at 25, with WildFly\n22-25 all\nrealized in 2021 as well.\
    \ Starting with version 17.0.0, the default\nKeycloak distribution switched from\
    \ WildFly to Quarkus.\nOn April 10, 2023, Keycloak was accepted by CNCF as an\
    \ incubating\nproject.\n\nOverview\nKeycloak's goal is to make security simple\
    \ and easy for application\ndevelopers to secure their enterprise apps and services.\n\
    \nConcepts\n\nKeycloak is based on the following concepts:\n\n*   Authentication\n\
    *   Authorization\n*   Credentials\n*   Realm\n\nAuthentication\n\nThis is a provider\
    \ example checking, if the request meets the authenticator's\nrequirements:\n\n\
    ```\npackage org.keycloak.authentication;\npublic interface Authenticator extends\
    \ Provider {\n/**\n* Initial call for the authenticator.  This method should check\
    \ the current HTTP request to determine if the request\n* satisfies the Authenticator's\
    \ requirements.  If it doesn't, it should send back a challenge response by calling\n\
    * the AuthenticationFlowContext.challenge(Response).  If this challenge is a authentication,\
    \ the action URL\n* of the form must point to\n*\n* /realms/{realm}/login-actions/authenticate?code={session-code}&execution={executionId}\n\
    *\n* or\n*\n* /realms/{realm}/login-actions/registration?code={session-code}&execution={executionId}\n\
    *\n* {session-code} pertains to the code generated from AuthenticationFlowContext.generateAccessCode().\
    \  The {executionId}\n* pertains to the AuthenticationExecutionModel.getId() value\
    \ obtained from AuthenticationFlowContext.getExecution().\n*\n* The action URL\
    \ will invoke the action() method described below.\n*\n* @param context\n*/\n\
    void authenticate(AuthenticationFlowContext context);\n/**\n* Called from a form\
    \ action invocation.\n*\n* @param context\n*/\nvoid action(AuthenticationFlowContext\
    \ context);\n/**\n* Does this authenticator require that the user has already\
    \ been identified?  That AuthenticatorContext.getUser() is not null?\n*\n* @return\n\
    */\nboolean requiresUser();\n/**\n* Is this authenticator configured for this\
    \ user?\n*\n* @param session\n* @param realm\n* @param user\n* @return\n*/\nboolean\
    \ configuredFor(KeycloakSession session, RealmModel realm, UserModel user);\n\
    /**\n* Set actions to configure authenticator\n*\n*/\nvoid setRequiredActions(KeycloakSession\
    \ session, RealmModel realm, UserModel user);\n/**\n* Overwrite this if the authenticator\
    \ is associated with\n* @return\n*/\ndefault List getRequiredActions(KeycloakSession\
    \ session) {\nreturn Collections.emptyList();\n}\n/**\n* Checks if all required\
    \ actions are configured in the realm and are enabled\n* @return\n*/\ndefault\
    \ boolean areRequiredActionsEnabled(KeycloakSession session, RealmModel realm)\
    \ {\nfor (RequiredActionFactory raf : getRequiredActions(session)) {\nRequiredActionProviderModel\
    \ rafpm = realm.getRequiredActionProviderByAlias(raf.getId());\nif (rafpm == null)\
    \ {\nreturn false;\n}\nif (!rafpm.isEnabled()) {\nreturn false;\n}\n}\nreturn\
    \ true;\n}\n}\n```\n\nPassword Policies\nMany organizations have special password\
    \ policies. Keycloak has a\nrich set of password\npolicies to choose via the Admin\
    \ Console. There are several\npassword policy types. Hashing the password uses\
    \ the hash algorithm. The\npassword should match combinations of digits, upper-\
    \ and lowercase\ncharacters, special characters, or a regular expression. As well\
    \ as\ncommon security measures like no to contain the username, not use the\n\
    same password multiple times or the expiry date, after which the\npassword must\
    \ be changed.\n\nAuthentication Flow\n\nThe sequence of actions by a user or service\
    \ to authenticate in Keycloak\nis called authentication\nflow:\n\n```\npackage\
    \ org.keycloak.authentication;\npublic interface AuthenticationFlow {\nString\
    \ BASIC_FLOW = \"basic-flow\";\nString FORM_FLOW = \"form-flow\";\nString CLIENT_FLOW\
    \ = \"client-flow\";\nResponse processAction(String actionExecution);\nResponse\
    \ processFlow();\nboolean isSuccessful();\ndefault List getFlowExceptions(){\n\
    return Collections.emptyList();\n}\n}\n```\n\nKeycloak includes various authentication\
    \ flows out of the box. Those\ncan be configured as required, and where your application\
    \ may need\nsomething different, you can always create your own authentication\
    \ flow\nfrom scratch or start by copying an existing one.\n\nFigure [5-1](#600273_1_En_5_Chapter.xhtml#Fig1)\
    \ shows the\navailable authentication flows in a browser:\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig1_HTML.jpg)\n\
    \nA screenshot of a webpage titled key cloak. It consists of available\nauthentications.\
    \ The tabs are flows, findings, required actions,\npassword policy, O T P policy,\
    \ webAuth N passwordless policy, and C B I\nA policy. Here flows option is highlighted.\n\
    \nFigure 5-1\nBrowser Authentication Flows\n\n*   Cookie\n*   Identity Provider\
    \ Redirector\n*   Forms\n    *   Username/Password\n    *   OTP\n*   Kerberos\n\
    \nAt least one of them has to be enabled for successful\nauthentication.\n\nFor\
    \ Single Sign-On, Keycloak supports two major protocols:\n\n*   OpenID Connect\
    \ (OIDC)\n*   SAML\n\nOIDC is the preferred method and more commonly used with\
    \ RESTful\nAPIs, while SAML (which we are going to learn more about in the next\n\
    section on Shibboleth) gained more popularity with SOAP Web Services, especially\
    \ in\nthe academic world.\nSAML relies on XML messages and documents, while OIDC\
    \ with REST being\nformat agnostic most often uses JWT for identity and access\
    \ tokens.\n\nFor OIDC, Keycloak defines four main authentication flows:\n\n* \
    \  Authorization Code Flow – For browser-based or server-side applications.\n\
    *   Implicit Flow – For browser-based applications, this flow is not as secure\
    \ as Authorization Code Flow and deprecated as of OAuth 2.1 so it can be used\
    \ for backward compatibility, but it's not recommended anymore.\n*   Client Credentials\
    \ Grant – For consumers of RESTful web services, involves storing a secret, so\
    \ the clients should trust the services they consume.\n\nAuthorization\n\nKeycloak\
    \ supports multiple authorization policies and allows to combine\ndifferent access\
    \ control mechanisms like\n\n*   Attribute-based access control (ABAC)\n*   Role-based\
    \ access control (RBAC)\n*   User-based access control (UBAC)\n*   Context-based\
    \ access control (CBAC)\n*   Rule-based access control\n*   Time-based access\
    \ control\n*   Custom access control mechanisms via a Policy Provider SPI\n\n\
    ![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig2_HTML.jpg)\n\nA flow diagram\
    \ depicts the key cloak authorization. The communication\nbetween the client and\
    \ the server includes policy enforcer, resource\nserver, authorization service,\
    \ policy evaluation, and storage.\n\nFigure 5-2\nKeycloak Authorization Architecture\n\
    \nCredentials\nCredentials are\npieces of data that Keycloak uses to verify the\
    \ identity of a user. Some\nexamples are passwords, one-time passwords, digital\
    \ certificates, iris\nscans, or fingerprints.\n\nRealm\nA realm allows\nto manage\
    \ a set of users, credentials, roles, and groups. A user belongs\nto and logs\
    \ into a realm. Realms are isolated from one another and can\nonly manage and\
    \ authenticate users they control.\n\nFeatures\n\nThe main features\nof Keycloak\
    \ are as follows:\n\n*   Clients (per application)\n*   Events\n*   Identity Providers\n\
    \    *   OpenID Connect\n    *   SAML\n    *   Social Login – Enable login with\
    \ Google, GitHub, Facebook, Twitter, and other social networks\n*   Security Defenses\n\
    *   UI (Themes)\n*   User Management\n    *   Users\n    *   Groups\n    *   Roles\n\
    *   User Federation\n    *   LDAP\n    *   Active Directory\n    *   Custom Providers\n\
    \n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig3_HTML.jpg)\n\nA schematic\
    \ depicts the main features of the key cloak. It includes\nrealm master with client,\
    \ roles, and security defenses, user federation,\nidentity provider, open I D\
    \ connect, S A M L, and U I themes.\n\nFigure 5-3\nKeycloak Features\n\nClients\n\
    Clients in\nKeycloak are entities (applications or services) that wish to\nauthenticate\
    \ a user within a realm. They can also request identity\ninformation or an access\
    \ token so that they can securely invoke other\nservices across the network secured\
    \ by Keycloak. During the\nauthentication process, the client needs to send its\
    \ ID and secret.\nThese credentials are obtained by registering the client in\
    \ the\nauthentication server.\nWith many applications to secure and maintain in\
    \ an organization, it\ncan become tedious to configure protocol mappers and scope\
    \ for all these\nclients. Keycloak lets you define shared client configurations\
    \ in a\nclient template.\n\nEvents\n\nKeycloak provides extensive auditing functionalities.\
    \ Every interaction can be\nrecorded and reviewed. There are two kinds of events:\n\
    \n*   Login events\n*   Admin events\n\nLogin events occur every time a user-related\
    \ action around authentication takes\nplace, for example, login, logout, login\
    \ attempts that were\nunsuccessful, or when a user account gets updated. Admin\
    \ events are\ntriggered by every change via the Admin API, either via Admin Console,\n\
    REST API, or Command-Line Interface. A Listener SPI allows you to create\nplug-ins\
    \ and listen for these events.\n\nHere is an example `EventListenerProvider` implementation\
    \ writing events to `System.out`:\n\n```\npublic class SysoutEventListenerProvider\
    \ implements EventListenerProvider {\nprivate Set excludedEvents;\nprivate Set\
    \ excludedAdminOperations;\npublic SysoutEventListenerProvider(Set excludedEvents,\
    \ Set excludedAdminOpearations) {\nthis.excludedEvents = excludedEvents;\nthis.excludedAdminOperations\
    \ = excludedAdminOpearations;\n}\n@Override\npublic void onEvent(Event event)\
    \ {\n// Ignore excluded events\nif (excludedEvents != null && excludedEvents.contains(event.getType()))\
    \ {\nreturn;\n} else {\nSystem.out.println(\"EVENT: \" + toString(event));\n}\n\
    }\n@Override\npublic void onEvent(AdminEvent event, boolean includeRepresentation)\
    \ {\n// Ignore excluded operations\nif (excludedAdminOperations != null && excludedAdminOperations.contains(event.getOperationType()))\
    \ {\nreturn;\n} else {\nSystem.out.println(\"EVENT: \" + toString(event));\n}\n\
    }\nprivate String toString(Event event) {\nStringBuilder sb = new StringBuilder();\n\
    sb.append(\"type=\");\nsb.append(event.getType());\nsb.append(\", realmId=\");\n\
    sb.append(event.getRealmId());\nsb.append(\", clientId=\");\nsb.append(event.getClientId());\n\
    sb.append(\", userId=\");\nsb.append(event.getUserId());\nsb.append(\", ipAddress=\"\
    );\nsb.append(event.getIpAddress());\nif (event.getError() != null) {\nsb.append(\"\
    , error=\");\nsb.append(event.getError());\n}\nif (event.getDetails() != null)\
    \ {\nfor (Map.Entry e : event.getDetails().entrySet()) {\nsb.append(\", \");\n\
    sb.append(e.getKey());\nif (e.getValue() == null || e.getValue().indexOf(' ')\
    \ == -1) {\nsb.append(\"=\");\nsb.append(e.getValue());\n} else {\nsb.append(\"\
    ='\");\nsb.append(e.getValue());\nsb.append(\"'\");\n}\n}\n}\nreturn sb.toString();\n\
    }\nprivate String toString(AdminEvent adminEvent) {\nStringBuilder sb = new StringBuilder();\n\
    sb.append(\"operationType=\");\nsb.append(adminEvent.getOperationType());\nsb.append(\"\
    , realmId=\");\nsb.append(adminEvent.getAuthDetails().getRealmId());\nsb.append(\"\
    , clientId=\");\nsb.append(adminEvent.getAuthDetails().getClientId());\nsb.append(\"\
    , userId=\");\nsb.append(adminEvent.getAuthDetails().getUserId());\nsb.append(\"\
    , ipAddress=\");\nsb.append(adminEvent.getAuthDetails().getIpAddress());\nsb.append(\"\
    , resourcePath=\");\nsb.append(adminEvent.getResourcePath());\nif (adminEvent.getError()\
    \ != null) {\nsb.append(\", error=\");\nsb.append(adminEvent.getError());\n}\n\
    return sb.toString();\n}\n@Override\npublic void close() {\n}\n}\n```\n\nAnd its\
    \ factory:\n\n```\npublic class SysoutEventListenerProviderFactory implements\
    \ EventListenerProviderFactory {\nprivate Set excludedEvents;\nprivate Set excludedAdminOperations;\n\
    @Override\npublic EventListenerProvider create(KeycloakSession session) {\nreturn\
    \ new SysoutEventListenerProvider(excludedEvents, excludedAdminOperations);\n\
    }\n@Override\npublic void init(Config.Scope config) {\nString[] excludes = config.getArray(\"\
    exclude-events\");\nif (excludes != null) {\nexcludedEvents = new HashSet();\n\
    for (String e : excludes) {\nexcludedEvents.add(EventType.valueOf(e));\n}\n}\n\
    String[] excludesOperations = config.getArray(\"excludesOperations\");\nif (excludesOperations\
    \ != null) {\nexcludedAdminOperations = new HashSet();\nfor (String e : excludesOperations)\
    \ {\nexcludedAdminOperations.add(OperationType.valueOf(e));\n}\n}\n}\n@Override\n\
    public void postInit(KeycloakSessionFactory factory) {\n}\n@Override\npublic void\
    \ close() {\n}\n@Override\npublic String getId() {\nreturn \"sysout\";\n}\n}\n\
    ```\n\nUser Federation\nWhen your organization has a user database, Keycloak allows\
    \ us to\nsynchronize with it. By default, it supports LDAP and Active Directory,\n\
    but you can create custom extensions for any identity store using the\nKeycloak\
    \ User storage API.\nKeycloak can also act as a proxy between your users and external\n\
    identity providers.\n\nSocial Identity Providers\nA social identity provider can\
    \ delegate\nauthentication to a trusted social media account. Keycloak includes\n\
    support for social networks like Google, Facebook, Twitter, GitHub,\nLinkedIn,\
    \ Microsoft, and Stack Overflow.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig4_HTML.jpg)\n\
    \nA screenshot of a webpage displays the identity providers. It\nprovides user-defined\
    \ and social. User defines has key cloak open I D\nconnect, open I D connect V\
    \ 1.0, and S A M L-V 2.0. Social includes Bit\nBucket, Instagram, PayPal, Facebook,\
    \ and others.\n\nFigure 5-4\nSocial Identity Providers\n\nFacebook\n\n1.  Click\
    \ **Identity Providers** in the menu.\n2.  From the *Add provider* list, select\
    \ Facebook. Keycloak displays the configuration page for the Facebook identity\
    \ provider.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig5_HTML.jpg)\n\
    \nA screenshot of a webpage displays the options for adding a Facebook\nprovider.\
    \ It includes redirect U R I, client I D, client secret, and\ndisplay order with\
    \ add and cancel options.\n\nFigure 5-5\nAdd Facebook As Identity Provider\n\n\
    1.  Copy the value of `Redirect URI` to your clipboard.\n2.  In a separate browser\
    \ tab, follow the Facebook Developer Guide's instructions to create a project\
    \ and client in Facebook.\n    1.  Ensure your app is of type website-type.\n\
    \    2.  Enter the `Redirect URI`'s value into the Site URL of the Facebook Website\
    \ settings block.\n    3.  Ensure the app is public.\n3.  Enter the `Client ID`\
    \ and `Client Secret` values from your Facebook app into the `Client ID` and `Client\
    \ Secret` fields in Keycloak.\n4.  Click *Add*.\n5.  Enter the required scopes\
    \ into the *Default Scopes* field. By default, Keycloak uses the `email` scope.\
    \ See Graph API for more information about Facebook scopes.\n\nBy default, Keycloak\
    \ sends profile requests to `graph.facebook.com/me?fields=id,name,email,first_name,last_name.`\
    \ The response only contains the `id, name, email, first_name`, and `last_name`\
    \ fields. To fetch additional fields from the Facebook profile, add a corresponding\
    \ scope and add the field name in the Additional user's profile fields configuration\
    \ option.\n\n#### Spring Security\n\nSpring Security [67] is a security framework\
    \ that works especially well with the Spring Framework or Spring Web MVC and more\
    \ recently Reactive applications using Spring Flux as well. Spring Security is\
    \ a continuation of Acegi Security, a powerful security framework. But the problem\
    \ was it required a lot of cumbersome XML configuration to realize it. Spring\
    \ embraced it into the family from version 2.0 and, since then, refined it to\
    \ its present state. Although the XML configuration is still possible, Spring's\
    \ new spirit of convention over configuration also influenced it the same way\
    \ we also see in Jakarta EE. It is possible to perform all security configurations\
    \ with annotation rather than XML, although the provision is still there for backward\
    \ compatibility and to leverage certain flexibility. Its primary goal is to handle\
    \ authentication and authorization for web requests and method invocations.\n\n\
    History\nSpring Security began two decades ago, in late 2003, as \"The Acegi Security\
    \ System for Spring,\" initially created by Ben Alex, based on questions asked\
    \ on the Spring Developers' mailing list whether there had been any Spring-based\
    \ security implementation. Back then, the Spring community was relatively small,\
    \ and Spring itself had only existed as a SourceForge project from early 2003.\
    \ The answer to the question was that it was worthwhile, although a lack of time\
    \ and resources prevented its exploration back then.\nWith that in mind, a simple\
    \ security implementation was built but remained unreleased. A few weeks later,\
    \ another member of the Spring community asked about security, and this code was\
    \ offered to them.\nOther similar questions followed, and by January 2004, around\
    \ 20 people were using the code. These initial users were joined by others who\
    \ suggested a SourceForge project of its own, which was created in March 2004.\n\
    Back then, the project didn't have its own authentication modules. J2EE Container\
    \ Managed Security was used for the authentication process, with the first version\
    \ of Acegi Security instead focusing on authorization. This was suitable at first,\
    \ but as more users requested support for additional containers, the limitation\
    \ of container-specific authentication realm interfaces became evident. Adding\
    \ new JARs to the container's Classpath also caused issues, which was a common\
    \ source of admin confusion and misconfiguration. Acegi Security authentication\
    \ services were introduced. And around a year later, Acegi Security became an\
    \ official Spring Framework subproject. The 1.0.0 final release was published\
    \ in May 2006 – after more than two and a half years of production use by numerous\
    \ projects and hundreds of improvement requests and community contributions. Acegi\
    \ Security became an official Spring project toward the end of 2007 and was rebranded\
    \ to \"Spring Security.\"\n\nOverview\n\nSpring Security is based on three main\
    \ concepts:\n\n*   Authentication\n*   Authorization\n*   Servlet Filters\n\n\
    ![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig6_HTML.jpg)\n\nA flow diagram\
    \ for spring security authentication and spring security\nfilter chain. The spring\
    \ security begins with request, authentication\nfilter, manager, provider, info,\
    \ and finally response. The filter chain\nbegins with access authorization filter,\
    \ decision, manager, query, and\nothers.\n\nFigure 5-6\nSpring Security Authentication/Authorization\
    \ Flow\n\nAuthentication\n\nThe main interface for authentication in Spring Security\
    \ is `AuthenticationManager`, which has just one method, `authenticate()`.\n\n\
    ```\npublic interface AuthenticationManager {\nAuthentication authenticate(Authentication\
    \ authentication)\nthrows AuthenticationException;\n}\n```\n\nThe most common\
    \ implementation of `AuthenticationManager` is `ProviderManager`, which delegates\
    \ to a chain of `AuthenticationProvider` instances. An `AuthenticationProvider`\
    \ is similar to an `AuthenticationManager`, but it has an extra method allowing\
    \ a caller to check whether it supports a particular authentication type.\n\n\
    ```\npublic interface AuthenticationProvider {\nAuthentication authenticate(Authentication\
    \ authentication)\nthrows AuthenticationException;\nboolean supports(Class authentication);\n\
    }\n```\n\nAuthorization\nThe main element in Spring Security for authorization\
    \ is `AccessDecisionManager`. There are three default implementations provided\
    \ by the framework, and all of them use a chain of `AccessDecisionVoter` instances,\
    \ a bit like the `ProviderManager` does with instances of `AuthenticationProvider`.\n\
    \nAn `AccessDecisionVoter<S>` uses an `Authentication` (a principal) and a secure\
    \ object, decorated by a `ConfigAttribute`:\n\n```\nboolean supports(ConfigAttribute\
    \ attribute);\nboolean supports(Class clazz);\nint vote(Authentication authentication,\
    \ S object,\nCollection attributes);\n```\n\nThe interface `ConfigAttribute` encapsulates\
    \ access information metadata in a secured resource. Figure [5-7](#600273_1_En_5_Chapter.xhtml#Fig7)\
    \ shows the hierarchy of configuration attributes.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig7_HTML.jpg)\n\
    \nA hierarchy of the configuration attributes. It includes security\nconfig, pre\
    \ invocation attribute, post invocate attribute, abstract\nexpression based method\
    \ config attribute, and web expression config\nattribute.\n\nFigure 5-7\nConfig\
    \ Attribute Hierarchy\n\nServlet Filters\n\nThe web tier of Spring Security is\
    \ based on standard Jakarta EE Servlet Filters, although as of Spring Security\
    \ and Framework 5, that is at most Jakarta EE 8. The Spring Security filter chain\
    \ builds on several filters to cover different security constraints of a web application.\
    \ Figure [5-8](#600273_1_En_5_Chapter.xhtml#Fig8) shows the typical chain of these\
    \ filters for a single HTTP request.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig8_HTML.png)\n\
    \nA typical chain for a single H T T P request. It begins with client,\nfollowed\
    \ by three filter layers, and servlet.\n\nFigure 5-8\nFilter Chain for a Single\
    \ HTTP Request\n\nFor the container, Spring Security is basically a single filter,\
    \ composed of multiple filters for different purposes. Spring Security is installed\
    \ as a single filter in the chain. This filter, named `FilterChainProxy,` contains\
    \ all the details about the different security filters available through the security\
    \ filter chain. Using the Proxy Pattern, it determines which `SecurityFilterChain`\
    \ will be invoked for an incoming request.\n\nHere's an example:\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig9_HTML.jpg)\n\
    \nA typical filter chain proxy. It begins with client, filter, filter\nchain proxy,\
    \ spring security filters includes three layers of filters,\nand finally servlet.\n\
    \nFigure 5-9\nFilter Chain Proxy\n\nHowever, `FilterChainProxy` is not called\
    \ directly but via the `DelegatingFilterProxy` filter. Using it, you will see\
    \ something like this in the `web.xml` file of your web application:\n\n```\n\
    myFilter\norg.springframework.web.filter.DelegatingFilterProxy\n\nmyFilter\n/*\n\
    \n```\n\nSocial Login\nOAuth 2 support for authentication providers like Facebook,\
    \ Google, and GitHub is built into Spring Security 5. Here are the examples of\
    \ OAuth 2 client configuration for them.\n\nConfigure Authentication Provider\n\
    First, configure the social authentication provider of your choice.\n\nFacebook\n\
    \nConfigure `Client ID` and `Client Secret` in your `application.properties`:\n\
    \n```\nspring.security.oauth2.client.registration.facebook.client-id = \nspring.security.oauth2.client.registration.facebook.client-secret\
    \ = \n```\n\nTo get Facebook App ID and App secret credentials, you will need\
    \ to create a new application with Facebook at [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/).\n\
    \nConfigure HTTP Security\nNext use the `@EnableWebSecurity` annotation and configure\
    \ the `HTTPSecurity` object.\n\nCreate a new Java class in your project and make\
    \ it extend the `WebSecurityConfigurerAdapter`. Annotate this class with a `@EnableWebSecurity`\
    \ annotation:\n\n```\nimport org.springframework.security.config.annotation.web.builders.HttpSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity;\n\
    import org.springframework.security.config.annotation.web.configuration.WebSecurityConfigurerAdapter;\n\
    @EnableWebSecurity\npublic class WebSecurity extends WebSecurityConfigurerAdapter\
    \ {\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\n\
    http.authorizeRequests()\n.antMatchers(\"/\").permitAll()\n.anyRequest().authenticated()\n\
    .and()\n.oauth2Login()\n.and()\n.logout().logoutSuccessUrl(\"/\");\n}\n}\n```\n\
    \nThat will make our application redirect users to a social login provider for\
    \ authentication. Once a user successfully authenticates with the social login\
    \ provider, they will be redirected back to the protected page of our application\
    \ they have initially requested. Notice we also enabled the logout functionality\
    \ and configured the logout successful URL.\n\nCreate a Protected Page\n\nThe\
    \ following example will create a Controller class with a single resource called\
    \ \"users\":\n\n```\nimport org.springframework.security.core.annotation.AuthenticationPrincipal;\n\
    import org.springframework.security.oauth2.core.user.OAuth2User;\nimport org.springframework.stereotype.Controller;\n\
    import org.springframework.ui.Model;\nimport org.springframework.web.bind.annotation.GetMapping;\n\
    @Controller\npublic class UsersController {\n@GetMapping(\"/users\")\npublic String\
    \ getUser(Model model, @AuthenticationPrincipal OAuth2User principal) {\nif (principal\
    \ != null) {\nmodel.addAttribute(\"name\", principal.getAttribute(\"name\"));\n\
    }\nreturn \"user\";\n}\n}\n```\n\nWhen the `/users` resource is requested, our\
    \ application will redirect users to authenticate with a social login provider.\
    \ If authentication is successful, the user will be redirected back to the `/users`\
    \ resource. Because authentication was successful, we can get information about\
    \ the currently authenticated user via the `@AuthenticationPrincipal` annotation,\
    \ which will help us access the `OAuth2User` object. The `OAuth2User` is a principal\
    \ object we can obtain details for.\n\n#### Micronaut Security\n\nMicronaut Security\
    \ is a security framework for Micronaut applications [68]. Micronaut is generally\
    \ similar to Spring Boot but has a better startup time in most cases. The JAR\
    \ files are smaller, and it consumes less memory at runtime. Of course each \"\
    Microframework\" tries to optimize performance with every new version, and those\
    \ differences may vary from release to release.\n\nFeatures\n\nThe main features\
    \ of Micronaut Security include\n\n*   Authentication\n*   Authorization\n*  \
    \ Security Rules\n*   Security Events\n*   Token Propagation\n\nSecure a Micronaut\
    \ Application with Google\nAfter you installed Micronaut, follow the step-by-step\
    \ guide: [`https://guides.micronaut.io/latest/micronaut-oauth2-oidc-google-gradle-java.html`](https://guides.micronaut.io/latest/micronaut-oauth2-oidc-google-gradle-java.html)\n\
    \nIf you prefer Maven, under step 4, call\n\n```\nmn create-app example.micronaut.micronautguide\
    \ --build=maven --lang=java\n```\n\n#### Apache Shiro\n\nApache Shiro is an open\
    \ source security framework that provides application developers intuitive, simple\
    \ ways of supporting\n\n*   Authentication\n*   Authorization\n*   Cryptography\n\
    *   Session Management\n\nThe word \"shiro\" means castle in Japanese.\n\nHistory\n\
    Shiro was created out of developer's needs not met by standards around that time.\
    \ Les Hazlewood and Jeremy Haile created a security framework named JSecurity\
    \ at SourceForge between 2004 and 2008 because they could not find an existing\
    \ Java security framework suitable for their needs and JAAS (we already learned\
    \ about in Chapter [1](#600273_1_En_1_Chapter.xhtml)) did not work well for them.\
    \ Their effort started roughly around the same time as Acegi Security in 2004,\
    \ also at SourceForge, which was then the largest independent open source hosting\
    \ community, a lot like GitHub is now. JSecurity attracted more committers including\
    \ Peter Ledbrook, Alan Ditzel, or Tim Veil.\nIn 2008, JSecurity was submitted\
    \ to the Apache Software Foundation and accepted into its Incubator program mentored\
    \ toward becoming a top-level Apache project. Under the ASF Incubator, JSecurity\
    \ was first renamed Ki (pronounced \"Key\"), only to be soon renamed Shiro due\
    \ to trademark concerns. The project grew in the Apache Incubator, adding Kalle\
    \ Korhonen as committer. In July 2010, the Shiro team released its official version\
    \ 1.0. Following the release of the first version, the Shiro project created a\
    \ Project Management Committee (PMC) and elected Les Hazlewood as its chair. On\
    \ September 22, 2010, Shiro became a top-level Apache project.\n\nOverview\n\n\
    Shiro is based on three core concepts:\n\n*   Subject\n*   SecurityManager\n*\
    \   Realm\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig10_HTML.jpg)\n\n\
    A schematic flow of the shiro concept. It begins with application\ncode, followed\
    \ by subject-the current user, shiro security\nmanager-manages all subjects, and\
    \ realm-access the security data.\n\nFigure 5-10\nShiro Concepts\n\nSubject\n\
    The `Subject` is basically a \"view\" of the current user. While \"User\" suggests\
    \ a human person, a \"Subject\" can also be a service or a corporate entity.\n\
    \nSecurityManager\nThe `SecurityManager`, not to be mistaken for the API type\
    \ soon to be removed from the JDK, is the central element of Shiro's architecture.\n\
    \nRealm\nA realm manages a set of users, roles, and permissions. A user belongs\
    \ to and logs into a realm. Realms are isolated from one another and can only\
    \ manage and authenticate users they control. Realms usually have a direct correlation\
    \ with a data source, for example, a database, LDAP directory, file system, or\
    \ a similar resource.\n\nFeatures\n\nFigure [5-11](#600273_1_En_5_Chapter.xhtml#Fig11)\
    \ shows the main concerns of Shiro as well as other supporting features.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig11_HTML.jpg)\n\
    \nAn overall concerns of shiro and other supporting features. The\nprimary concerns\
    \ are authentication, authorization, session management,\nand cryptography. The\
    \ supporting features are web support, caching,\nconcurrency, testing, run as,\
    \ and remember me.\n\nFigure 5-11\nShiro Features\n\n*   Authentication across\
    \ multiple pluggable data sources including\n    *   LDAP/Active Directory\n \
    \   *   JDBC\n    *   JNDI\n*   Authorization based on roles or fine-grained permissions\n\
    \    *   Know if a user is assigned a certain role or not.\n    *   Know if a\
    \ user is allowed to do something or not.\n*   Session Management – Use in both\
    \ web and \"serverless,\" or any environment where Single Sign-On, clustered,\
    \ or distributed sessions are required.\n*   Cryptography – Secure data with cryptographic\
    \ algorithms beyond the standard Java ciphers and hashes, yet easy to use.\n\n\
    Other supporting Shiro features are as follows:\n\n*   Web Support – Helps secure\
    \ web applications\n*   Caching, to ensure applications run fast and efficient\n\
    *   Concurrency, supporting multithreaded applications\n*   Test Support – Helping\
    \ to write unit or integration tests to check if your applications are as secure\
    \ as expected\n*   \"Run As\", allowing users to assume the identity of another\
    \ user, a bit like the \"sudo\" command on Linux\n*   \"Remember Me\" to remember\
    \ users across sessions, allowing them to only log in when required, for example,\
    \ if the session expired\n\nAuthentication\n\nShiro aims to make authentication\
    \ intuitive and easy to use despite a variety of features; these are the highlights:\n\
    \n*   Subject Based\n*   Single Method Call\n*   Detailed Exception Hierarchy\n\
    *   Built-in \"Remember Me\"\n*   Pluggable Data Sources\n*   Using Multiple Realms\n\
    \nSteps to Authenticate a Subject\n\nAuthenticating a `Subject` can be broken\
    \ down into three steps:\n\n1.  Collect the Subject's submitted principals and\
    \ credentials.\n2.  Submit the principals and credentials for authentication.\n\
    3.  If the submission was successful, grant access; otherwise, retry authentication\
    \ or block access.\n\nHere's how to use Shiro's API for these steps:\n\nCollect\
    \ the Subject's submitted principals and credentials\n\n```\n//Most common scenario\
    \ of username/password pair:\nUsernamePasswordToken token = new UsernamePasswordToken(username,\
    \ password);\n//\"Remember Me\" built-in:\ntoken.setRememberMe(true);\n```\n\n\
    In this case, we used the `UsernamePasswordToken`, supporting the most common\
    \ username/password authentication approach. This is an implementation of Shiro's\
    \ `org.apache.shiro.authc.AuthenticationToken` interface, which is the base interface\
    \ of Shiro's authentication system to represent submitted principals and credentials.\n\
    Shiro does not care how you acquire this information: perhaps the data was entered\
    \ via HTML form, or maybe retrieved from an HTTP header, or maybe through command-line\
    \ arguments. The process of an application collecting information from users is\
    \ completely decoupled from Shiro's `AuthenticationToken` concept.\nYou may construct\
    \ and represent `AuthenticationToken` instances any way you like; it is protocol\
    \ agnostic.\nThis example also shows that we have indicated that we wish Shiro\
    \ to perform \"Remember Me\" services for authentication.\n\nAuthorization\n\n\
    Authorization has three main elements:\n\n*   Permission\n*   Role\n*   User (Subject)\n\
    \nPermissions\nPermissions are an essential aspect of security policies. They\
    \ allow what can be done in an application. Common permissions for data elements\
    \ are Create, Read, Update, and Delete, commonly known as *CRUD*.\n\nGranularity\n\
    \nShiro allows very fine-grained permissions where required, in any granularity,\
    \ for example:\n\n*   Resource level – The broadest definition, for example, allowing\
    \ a user to edit customer records or finances\n*   Instance level – Permissions\
    \ that are specific to a particular instance of a resource, not just the general\
    \ type, such as allowing a user to access the customer records of IBM, but not\
    \ Red Hat\n*   Attribute level – Allowing to specify permissions for an attribute\
    \ of an instance or resource, for example, the home address or work address of\
    \ an IBM employee\n\nHere's a permission example. We check if users have permission\
    \ to print using a \"Colour Printer\" and those who do will see a \"print\" button,\
    \ the others don't. This is an example of an instance level permission.\n\n```\n\
    Subject currentUser = SecurityUtils.getSubject();\nPermission printPermission\
    \ = new PrinterPermission(\"ColourPrinter\",\"print\");\nIf (currentUser.isPermitted(printPermission))\
    \ {\n// show the print button?)\n} else {\n// don't show the button?\n}\n```\n\
    \nUsers\n\nA user or \"Subject\" (because as mentioned, it can also be a service\
    \ or corporate entity) can be any actor in your application. In most cases, you'd\
    \ obtain the current `Subject` by using `org.apache.shiro.SecurityUtils`:\n\n\
    ```\nSubject currentUser = SecurityUtils.getSubject();\n```\n\nRoles\nRemember\
    \ the RBAC from Chapter [2](#600273_1_En_2_Chapter.xhtml); roles are a set of\
    \ permissions, allowing to assign permissions to a role instead of each individual\
    \ user.\n\nShiro provides two types of roles:\n\n*   Implicit roles\n*   Explicit\
    \ roles\n\nApplication role checks are usually the assignment of an **implicit**\
    \ role. A user with the role \"administrator\" can view customer data. The names\
    \ of the roles are not necessarily related to a business requirement or scenario,\
    \ while an **explicit** role already comes with permissions it needs. For example,\
    \ a user with the role \"editor\" has the \"publish chapters\" permission assigned\
    \ to it.\n\n```\nRealm realm = new MyPublishingRealm();\nSecurityManager securityManager\
    \ = new DefaultSecurityManager(realm);\nSecurityUtils.setSecurityManager(securityManager);\n\
    Subject currentUser = SecurityUtils.getSubject();\nif (!currentUser.isAuthenticated())\
    \ {\nUsernamePasswordToken token\n= new UsernamePasswordToken(\"user\", \"password\"\
    );\ntoken.setRememberMe(true);\ntry {\ncurrentUser.login(token);\n} catch (UnknownAccountException\
    \ uae) {\nlog.error(\"Username Not Found!\", uae);\n} catch (IncorrectCredentialsException\
    \ ice) {\nlog.error(\"Invalid Credentials!\", ice);\n} catch (LockedAccountException\
    \ lae) {\nlog.error(\"Your Account is Locked!\", lae);\n} catch (AuthenticationException\
    \ ae) {\nlog.error(\"Unexpected Error!\", ae);\n}\n}\nlog.info(\"User [\" + currentUser.getPrincipal()\
    \ + \"] logged in successfully.\");\nif (currentUser.hasRole(\"admin\")) {\nlog.info(\"\
    Welcome Admin\");\n} else if(currentUser.hasRole(\"editor\")) {\nlog.info(\"Welcome,\
    \ Editor!\");\n} else if(currentUser.hasRole(\"author\")) {\nlog.info(\"Welcome,\
    \ Author\");\n} else {\nlog.info(\"Welcome, Guest\");\n}\nif(currentUser.isPermitted(\"\
    chapters:write\")) {\nlog.info(\"You can write a chapter\");\n} else {\nlog.info(\"\
    You are not permitted to write a chapter!\");\n}\nif(currentUser.isPermitted(\"\
    chapters:save\")) {\nlog.info(\"You can save chapters\");\n} else {\nlog.info(\"\
    You can not save chapters\");\n}\nif(currentUser.isPermitted(\"chapters:publish\"\
    )) {\nlog.info(\"You can publish chapters\");\n} else {\nlog.info(\"You can not\
    \ publish chapters\");\n}\nSession session = currentUser.getSession();\nsession.setAttribute(\"\
    key\", \"value\");\nString value = (String) session.getAttribute(\"key\");\nif\
    \ (value.equals(\"value\")) {\nlog.info(\"Retrieved the correct value! [\" + value\
    \ + \"]\");\n}\ncurrentUser.logout();\n```\n\nSession Management\n\nOnce we got\
    \ the current user, we can retrieve their session:\n\n```\nSession session = currentUser.getSession();\n\
    session.setAttribute( \"key\", \"value\" );\n```\n\nThe `Session` is a Shiro-specific\
    \ instance containing most of what you'd know from the Jakarta Servlet `HttpSession`\
    \ with a few extras, and it is independent of an HTTP environment.\nInside a web\
    \ application, the `Session` will be `HttpSession` based. But in a non-web environment,\
    \ Shiro will automatically use its own Session Management by default. This means\
    \ you get to use the same API in your applications, regardless of the deployment\
    \ environment. This opens new possibilities especially for \"serverless\" applications,\
    \ as the application requiring sessions does not need to use `HttpSession` or\
    \ EJB Stateful Session Beans.\n\nCryptography\n\nThe main cryptography aspects\
    \ of Shiro are as follows:\n\n*   Simplicity\n*   Cipher features\n*   Hash features\n\
    \nSocial Login\nThe following example shows how to handle Facebook login for a\
    \ Shiro application.\n\nCreate a Facebook App\nTo get Facebook App ID and App\
    \ secret credentials, you will need to create a new application with Facebook\
    \ at [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/).\n\
    \nExample Code\n\nFacebook user details:\n\n```\npackage com.example.facebook;\n\
    /**\n* Simple class for holding Facebook user data\n*/\nclass FacebookUserDetails\
    \ {\n// jsonString Expected to be something like this:\n// email\n// {\n// \"\
    education\": [{\n// \"school\": {\n// \"id\": \"123456789012345\",\n// \"name\"\
    : \"Vienna University of Technology \"\n// },\n// \"type\": \"Graduate School\"\
    ,\n// \"with\": [{\n// \"id\": \"123456789\",\n// \"name\": \"BRG\"\n// }]\n//\
    \ }],\n// \"first_name\": \"Werner\",\n// \"id\": \"123456789\",\n// \"last_name\"\
    : \"Keil\",\n// \"link\":\n// \"http://www.facebook.com/profile.php?id=123456789\"\
    ,\n// \"locale\": \"de_DE\",\n// \"name\": \"Werner Keil \",\n// \"updated_time\"\
    : \"2023-05-15T14:51:05+0000\",\n// \"verified\": true\n// }\nprivate String jsonString;\n\
    public FacebookUserDetails(String fbResponse){\njsonString = fbResponse;\nJSONObject\
    \ respJson;\ntry {\nrespJson = new JSONObject(fbResponse);\nthis.id = respJson.getString(\"\
    id\");\nthis.firstName = respjson.has(\"first_name\") ? respJson.getString(\"\
    first_name\") : \" no name\" + id;\nthis.lastName = respJson.has(\"last_name\"\
    ) ? respJson.getString(\"last_name\") : \"\";\nthis.email = respJson.has(\"email\"\
    ) ? respJson.getString(\"email\") : \"-no email-\";\n} catch (JSONException e)\
    \ {\nSystem.out.println( \"fbResponse:\"+fbResponse );\nthrow new RuntimeException(e);\n\
    }\n}\npublic String toString(){\nreturn jsonString;\n}\npublic String getId()\
    \ {\nreturn id;\n}\npublic void setId(String id) {\nthis.id = id;\n}\npublic String\
    \ getFirstName() {\nreturn firstName;\n}\npublic void setFirstName(String firstName)\
    \ {\nthis.firstName = firstName;\n}\npublic String getLastName() {\nreturn lastName;\n\
    }\npublic void setLastName(String lastName) {\nthis.lastName = lastName;\n}\n\
    public String getEmail() {\nreturn email;\n}\npublic void setEmail(String email)\
    \ {\nthis.email = email;\n}\n}\n```\n\nFacebook Realm:\n\n```\npackage com.example.facebook;\n\
    import java.io.ByteArrayOutputStream;\nimport java.io.IOException;\nimport java.io.InputStream;\n\
    import java.net.MalformedURLException;\nimport java.net.URL;\nimport java.util.HashMap;\n\
    import java.util.Map;\nimport java.util.Properties;\nimport org.apache.shiro.authc.AuthenticationException;\n\
    import org.apache.shiro.authc.AuthenticationInfo;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    import org.apache.shiro.authz.AuthorizationInfo;\nimport org.apache.shiro.realm.AuthorizingRealm;\n\
    import org.apache.shiro.subject.PrincipalCollection;\npublic class FacebookRealm\
    \ extends AuthorizingRealm {\nprivate static final Properties props = new FacebookProperties().getProperties();\n\
    private static final String APP_SECRET = props.get(\"fbAppSecret\").toString();\n\
    private static final String APP_ID = props.get(\"fbAppId\").toString();\nprivate\
    \ static final String REDIRECT_URL = props.get(\"fbLoginRedirectURL\").toString();\n\
    @Override\npublic boolean supports(AuthenticationToken token) {\nif (token instanceof\
    \ FacebookToken) {\nreturn true;\n}\nreturn false;\n}\n@Override\nprotected AuthorizationInfo\
    \ doGetAuthorizationInfo(PrincipalCollection principals) {\nreturn new FacebookAuthorizationInfo();\n\
    }\n@Override\nprotected AuthenticationInfo doGetAuthenticationInfo(AuthenticationToken\
    \ token) throws AuthenticationException {\nFacebookToken facebookToken = (FacebookToken)\
    \ token;\nif (facebookToken.getCode() != null && facebookToken.getCode().trim().length()\
    \ > 0) {\nURL authUrl;\ntry {\nauthUrl = new URL(\"https://graph.facebook.com/oauth/access_token?\"\
    \ + \"client_id=\" + APP_ID\n+ \"&redirect_uri=\" + REDIRECT_URL + \"&client_secret=\"\
    \ + APP_SECRET + \"&code=\"\n+ facebookToken.getCode());\nString authResponse\
    \ = readURL(authUrl);\nSystem.out.println(authResponse);\nString accessToken =\
    \ getPropsMap(authResponse).get(\"access_token\");\nURL url = new URL(\"https://graph.facebook.com/me?access_token=\"\
    \ + accessToken);\nString fbResponse = readURL(url);\nFacebookUserDetails userDetails\
    \ = new FacebookUserDetails(fbResponse);\nreturn new FacebookAuthenticationInfo(userDetails,\
    \ this.getName());\n} catch (MalformedURLException e1) {\ne1.printStackTrace();\n\
    throw new AuthenticationException(e1);\n} catch (IOException ioe) {\nioe.printStackTrace();\n\
    throw new AuthenticationException(ioe);\n} catch (Throwable e) {\ne.printStackTrace();\n\
    }\n}\nreturn null;\n}\nprivate String readURL(URL url) throws IOException {\n\
    ByteArrayOutputStream baos = new ByteArrayOutputStream();\nInputStream is = url.openStream();\n\
    int r;\nwhile ((r = is.read()) != -1) {\nbaos.write(r);\n}\nreturn new String(baos.toByteArray());\n\
    }\nprivate Map getPropsMap(String someString) {\nString[] pairs = someString.split(\"\
    &\");\nMap props = new HashMap();\nfor (String propPair : pairs) {\nString[] pair\
    \ = propPair.split(\"=\");\nprops.put(pair[0], pair[1]);\n}\nreturn props;\n}\n\
    }\n```\n\nThe `CredentialsMatcher` class shouldn't have to do much, as Facebook\
    \ is matching the credentials for us:\n\n```\npackage com.example.facebook;\n\
    import org.apache.shiro.authc.AuthenticationInfo;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    import org.apache.shiro.authc.credential.CredentialsMatcher;\npublic class FacebookCredentialsMatcher\
    \ implements CredentialsMatcher {\n/**\n* Just confirms the right kind of token,\
    \ credentials checking is done by facebook OAuth\n*/\n@Override\npublic boolean\
    \ doCredentialsMatch(AuthenticationToken token, AuthenticationInfo info) {\nif(info\
    \ instanceof FacebookAuthenticationInfo){\nreturn true;\n}\nreturn false;\n}\n\
    }\n```\n\nThen create a Facebook token class, used to hold the \"code\" provided\
    \ by Facebook:\n\n```\npackage com.example.facebook;\nimport org.apache.shiro.authc.AuthenticationToken;\n\
    public class FacebookToken implements AuthenticationToken {\nprivate static final\
    \ long serialVersionUID = 1L;\nprivate final String code;\npublic FacebookToken(String\
    \ code){\nthis.code = code;\n}\n@Override\npublic Object getPrincipal() {\nreturn\
    \ null; // Unknown - Facebook does the login\n}\n@Override\npublic Object getCredentials()\
    \ {\nreturn null; // credentials handled by Facebook - we don't need them\n}\n\
    public String getCode() {\nreturn code;\n}\npublic void setCode(String code) {\n\
    this.code = code;\n}\n}\n```\n\nA `FacebookAuthenticationInfo` class:\n\n```\n\
    package com.example.facebook;\nimport java.util.ArrayList;\nimport java.util.Collection;\n\
    import org.apache.shiro.authc.AuthenticationInfo;\nimport org.apache.shiro.subject.PrincipalCollection;\n\
    import org.apache.shiro.subject.SimplePrincipalCollection;\npublic class FacebookAuthenticationInfo\
    \ implements AuthenticationInfo {\nprivate static final long serialVersionUID\
    \ = 1L;\nprivate PrincipalCollection principalCollection;\npublic FacebookAuthenticationInfo(FacebookUserDetails\
    \ facebookUserDetails, String realmName){\nCollection principals = new ArrayList();\n\
    principals.add(facebookUserDetails.getId());\nprincipals.add(facebookUserDetails.getFirstName()+\"\
    \ \"+facebookUserDetails.getLastName());\nthis.principalCollection = new SimplePrincipalCollection(principals,\
    \ realmName);\n}\n@Override\npublic PrincipalCollection getPrincipals() {\nreturn\
    \ principalCollection;\n}\n@Override\npublic Object getCredentials() {\nreturn\
    \ null; // no credentials required\n}\n}\n```\n\nNow create a Facebook login servlet\
    \ to handle the redirection from Facebook:\n\n```\npackage com.example.facebook;\n\
    import java.io.IOException;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServlet;\n\
    import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
    import org.apache.shiro.SecurityUtils;\nimport org.apache.shiro.authc.AuthenticationException;\n\
    import uk.co.mrdw.shiro.facebook.FacebookToken;\n/**\n* Simple Facebook Login\
    \ Handler, using Apache Shiro\n*/\npublic class FacebookLoginServlet extends HttpServlet\
    \ {\nprivate static final long serialVersionUID = 1L;\nprotected void doGet(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException, IOException\
    \ {\nString code = request.getParameter(\"code\");\nFacebookToken facebookToken\
    \ = new FacebookToken(code);\ntry {\nSecurityUtils.getSubject().login(facebookToken);\n\
    response.sendRedirect(response.encodeRedirectURL(\"index.jsp\"));\n}\ncatch(AuthenticationException\
    \ ae){\nthrow new ServletException(ae);\n}\n}\nprotected void doPost(HttpServletRequest\
    \ request, HttpServletResponse response) throws ServletException,\nIOException\
    \ {\nSystem.out.println(\"Error during doPost ...\");\n}\n}\n```\n\n`shiro.ini`:\n\
    \n```\n[main]\nrealmA = com.example.dao.RoleSecurityJdbcRealm\nfbCredentialsMatcher\
    \ = com.example.shiro.facebook.FacebookCredentialsMatcher\nrealmB = com.example.shiro.facebook.FacebookRealm\n\
    realmB.credentialsMatcher = $fbCredentialsMatcher\nsecurityManager.realms = $realmA,\
    \ $realmB.ini:\n```\n\n#### Scribe\n\nThe Scribe project has built-in support\
    \ for many popular services that use OAuth, such as Facebook, Twitter, Google,\
    \ or LinkedIn. It has very few external dependencies, mainly Apache Commons Codec,\
    \ allowing seamless integration into solutions without risk of dependency clash\
    \ many larger and more complex solutions bear.\n\nCalling an OAuth provider in\
    \ Scribe can be as easy as the following one-liner shows:\n\n```\nOAuthService\
    \ service = new ServiceBuilder()\n.provider(LinkedInApi.class)\n.apiKey(YOUR_API_KEY)\n\
    .apiSecret(YOUR_API_SECRET)\n.build();\n```\n\nUntil version 0.6 of Agorava, Scribe\
    \ was at the heart of its OAuth functionality. From Agorava 0.7 onward, it was\
    \ replaced by JBoss PicketLink.\nWhile the latter is no longer actively developed\
    \ by Red Hat and was superseded by Keycloak, Scribe is still maintained and gets\
    \ updates approximately once a year, the last one in January 2023.\n\n#### Legacy\
    \ Frameworks\n\nSome of these frameworks are still in use by products and services,\
    \ but they are no longer actively maintained by their contributors.\n\nPicketLink\n\
    PicketLink was an umbrella for several security-related projects in the Red Hat/JBoss\
    \ Middleware ecosystem. While Agorava was never an official JBoss project, it\
    \ was created for its ecosystem and standards like CDI. Therefore, supporting\
    \ OAuth and Java EE Security through the means of PicketLink seemed a logical\
    \ step for Agorava.\nPicketLink is an Application Security Framework for Java\
    \ EE applications. It provided features for authenticating users, authorizing\
    \ access to business methods of your application, managing the application's users,\
    \ groups, roles, and permissions, etc.\n\nThese are the top eight Java Application\
    \ Security problems solved by PicketLink:\n\n1.  What's the best way to add security\
    \ to the application?\n2.  How do I authenticate and authorize users?\n3.  How\
    \ can I control access to classes and methods?\n4.  How do I add Identity and\
    \ Access Management (IAM) to my application?\n5.  How can I create a secure multitenancy\
    \ architecture for my SaaS (Software as a Service) application?\n6.  How can I\
    \ enable Single Sign-On based on SAML (Security Assertion Markup Language) in\
    \ my application?\n7.  How do I add authentication and authorization to my REST\
    \ layer and API?\n8.  How can my application authenticate users using their Facebook,\
    \ Twitter, or Google accounts?\n\nFigure [5-12](#600273_1_En_5_Chapter.xhtml#Fig12)\
    \ shows an overview of PicketLink, its key components, and technologies it supports.\
    \ Some marked \"Coming Soon\" were still under development and did not come with\
    \ the GA (Generally Available or \"Stable\") versions of PicketLink.\n\n![](images/600273_1_En_5_Chapter/600273_1_En_5_Fig12_HTML.jpg)\n\
    \nA schematic of the picket link. It includes base module, federation,\nand I\
    \ D M. The identity stores include database, file based, and L D A\nP.\n\nFigure\
    \ 5-12\nPicketLink Overview\n\nAgorava does, however, use mainly base functionality\
    \ of PicketLink, like Authentication API or CDI Integration, adding specialized\
    \ OAuth and social connectivity of its own.\n\nThe \"dance\" through the authentication\
    \ flow is conducted by the PicketLink element Authenticator. Here is an example\
    \ of how to extend `BaseAuthenticator`:\n\n```\n@PicketLink\npublic class SimpleAuthenticator\
    \ extends BaseAuthenticator {\n@Inject DefaultLoginCredentials credentials;\n\
    @Override\npublic void authenticate() {\nif (\"agentsmith\".equals(credentials.getUserId())\
    \ &&\n\"matrix123\".equals(credentials.getPassword())) {\nsetStatus(AuthenticationStatus.SUCCESS);\n\
    setAccount(new User(\"agentsmith\"));\n} else {\nsetStatus(AuthenticationStatus.FAILURE);\n\
    FacesContext.getCurrentInstance().addMessage(null, new FacesMessage(\"Authentication\
    \ Failure - The username or password you provided were invalid.\"));\n}\n}\n}\n\
    ```\n\n\"Agorava PicketLink\" in the next chapter will show in more detail how\
    \ PicketLink is applied by Agorava Core and its PicketLink module.\n\nSocialAuth\n\
    SocialAuth was an authentication library for Java and Android.\n\nIts features\
    \ include the following:\n\n*   Authentication\n    *   Through external OAuth\
    \ providers like Gmail, Hotmail, Yahoo, Twitter, Facebook, LinkedIn, Foursquare,\
    \ Myspace, Salesforce, Yammer, Google Plus, and Instagram\n    *   Through OpenID\
    \ providers\n*   Easy user registration\n*   Importing contacts from networking\
    \ sites\n\nHere's an example for a status update using SocialAuth via CDI:\n\n\
    ```\n@RequestScoped\n@Named(\"socialAuthUpdateStatus\")\npublic class UpdateStatus\
    \ implements Serializable {\nprivate static final Logger log = Logger.getLogger(UpdateStatus.class);\n\
    @Inject\nSocialAuth socialauth;\nString statusText;\n/**\n* Method which updates\
    \ the status on profile.\n*\n* @param ActionEvent\n* @throws Exception\n*/\npublic\
    \ void updateStatus() throws Exception {\nfinal HttpServletRequest request = (HttpServletRequest)\
    \ FacesContext                        .getCurrentInstance().getExternalContext().getRequest();\n\
    String statusText = request.getParameter(\"statusMessage\");\nif (statusText !=\
    \ null && !statusText.equals(\"\")) {\nsocialauth.setStatus(statusText);\nsocialauth.updateStatus();\n\
    setStatus(\"Status Updated Successfully\");\nSystem.out.println(\"status text:\"\
    \ + statusText);\n}\n}\npublic String getStatus() {\nreturn statusText;\n}\npublic\
    \ void setStatus(String statusText) {\nthis.statusText = statusText;\n}\n}\n```\n\
    \nOACC\nOACC, pronounced \"oak\" (like the original code name of Java), was a\
    \ Java API to both enforce and manage your application's authentication and authorization\
    \ needs. OACC provides permission-based authorization services to enforce application\
    \ security.\n\nIts features include\n\n*   Authentication\n*   Identity delegation\n\
    *   Data store\n*   Permission-based security model\n*   Authorization\n*   RBAC\
    \ modeling\n*   Permission delegation\n*   Multitenancy\n*   Caching\n\nHere's\
    \ an example application:\n\n```\npublic class OACCSampleApplication {\npublic\
    \ static void main(String[] args) throws Exception {\n// get a connection to the\
    \ oacc database\nString url = \"jdbc:postgresql://localhost/oaccdb?user=oaccuser&password=oaccpwd\"\
    ;\ntry (Connection con = DriverManager.getConnection(url)) {\n// get the access\
    \ control context\nAccessControlContext accessControlContext =\nSQLAccessControlContextFactory.getAccessControlContext(con,\"\
    OACC\",                                                                      \
    \  SQLProfile.PostgreSQL_9_3_RECURSIVE,                                BCryptPasswordEncryptor.newInstance(12));\n\
    // create new admin\ncreateAdmin(accessControlContext);\n// create new user\n\
    createUser(accessControlContext);\n// login as admin\nloginAdmin(accessControlContext,\
    \ \"adminJoe\", \"pa55w0rd\");\n// attempt to update user while logged in as admin\n\
    updateUser(accessControlContext, \"jsmith\");\n}\n}\nprivate static void createAdmin(AccessControlContext\
    \ accessControlContext) {\n// authenticate as the system resource (the super user)\
    \ to set up an initial admin\naccessControlContext.authenticate(Resources.getInstance(0),\
    \                                        PasswordCredentials.newInstance(\"yourOaccSystemPassword\"\
    .toCharArray()));\n// persist the admin in your application for example:\nAppAdmin\
    \ admin = new AppAdmin.Builder()\n.login(\"adminJoe\")\n.email(\"joeBloe@company.com\"\
    )\n.build().create();\n// create the corresponding OACC resource\nfinal Resource\
    \ adminResource\n= accessControlContext.createResource(\"ADMIN\",            \
    \                                      \"APP_DOMAIN\", admin.getLogin(),     \
    \                                             PasswordCredentials.newInstance(\"\
    pa55w0rd\".toCharArray()));\nSystem.out.println(\"created new ADMIN resource with\
    \ Id=\" + adminResource.getId());\n// grant permissions to query about, view and\
    \ deactivate any user account, but not to edit it\nSet permissions = new HashSet();\n\
    permissions.add(ResourcePermissions.getInstance(ResourcePermissions.QUERY)); \
    \     permissions.add(ResourcePermissions.getInstance(\"VIEW\"));      permissions.add(ResourcePermissions.getInstance(\"\
    DEACTIVATE\"));\naccessControlContext.setGlobalResourcePermissions(adminResource,\
    \ \"USER\", \"APP_DOMAIN\", permissions);\naccessControlContext.unauthenticate();\n\
    }\nprivate static void createUser(AccessControlContext accessControlContext) {\n\
    // persist the user in your application\n// e.g. UserHOME.create(\"jsmith\", \"\
    Jane\", \"Smith\", \"jsmith@mail.com\", userResource.getId())\n// for example:\n\
    AppUser user = new AppUser.Builder()\n.login(\"jsmith\")\n.firstName(\"Jane\"\
    ).lastName(\"Smith\")\n.email(\"jsmith@mail.com\")\n.build().create();\n// don't\
    \ have to be authenticated to create users because the resource class has the\
    \ unauthenticatedCreateAllowed-flag set\nfinal Resource userResource\n= accessControlContext.createResource(\"\
    USER\",                                                  \"APP_DOMAIN\", user.getLogin(),\
    \                                                  PasswordCredentials.newInstance(\"\
    pa$$word1\".toCharArray()));\nSystem.out.println(\"created new USER resource with\
    \ Id=\" + userResource.getId());\n}\nprivate static void loginAdmin(AccessControlContext\
    \ accessControlContext, String adminLogin,  String password) {\n// authenticate\
    \ as the admin resource      accessControlContext.authenticate(Resources.getInstance(adminLogin),\
    \                                        PasswordCredentials.newInstance(password.toCharArray()));\n\
    }\nprivate static void updateUser(AccessControlContext accessControlContext, String\
    \ userLogin) {\n// assert that the authenticated admin has VIEW permission *before*\
    \ attempting to load the user      accessControlContext.assertResourcePermissions(accessControlContext.getSessionResource(),\
    \ Resources.getInstance(userLogin),                       ResourcePermissions.getInstance(\"\
    VIEW\"));\n// load the user information and modify the local copy\nAppUser user\
    \ = new AppUser.Finder().findByLogin(userLogin);\nuser.setEmail(\"other@mail.com\"\
    );\n// assert that the authenticated admin has EDIT permission *before* attempting\
    \ to save the user      accessControlContext.assertResourcePermissions(accessControlContext.getSessionResource(),\
    \             Resources.getInstance(userLogin),                              \
    \                       ResourcePermissions.getInstance(\"EDIT\"));\n// save the\
    \ user\n// !NOTE! we won't get here because adminResource doesn't have EDIT permission\
    \ on the userResource\nuser.save();\n}\n}\n```\n\n#### Summary\n\nFollowing an\
    \ overview of security in social media and relevant security standards in the\
    \ previous chapter, we learned about important security frameworks for the Java\
    \ platform and how to use them with social networks in this chapter.\n\n### 6.\
    \ Social Frameworks\n\nThe previous chapter dealt with security frameworks like\
    \ Soteria, Keycloak, or Spring Security. In this chapter, we'll take a look at\
    \ social frameworks like Meta Business SDK, Twitter4J, Twitter API Client, Legacy\
    \ frameworks like Agorava, Spring Social, or Facebook4J as well as frameworks\
    \ for special purposes or vertical social networks.\n\n#### Meta\n\nMeta Platforms\
    \ owns a variety of social products:\n\n*   Facebook\n*   Instagram\n*   (Facebook)\
    \ Messenger\n*   WhatsApp\n*   Threads\n*   VR products like Horizon Worlds\n\n\
    The combined user base is the largest of any social net. More than 200 million\
    \ businesses use Facebook, and more than 7 million advertisers actively promote\
    \ their business on Facebook/Meta.\nEnough reason, that unlike some other big\
    \ social networks, Meta offers a number of SDKs including dedicated business SDKs\
    \ and support for a large variety of programming languages itself.\n\nThe two\
    \ most active Java Business APIs for Meta are as follows:\n\n*   Meta Business\
    \ SDK – The official Business SDK suite by Meta\n*   WhatsApp Business Java API\
    \ SDK – A community-driven WhatsApp Business SDK for Java. Currently superior\
    \ to the official Meta SDKs for WhatsApp using Java, because they do not offer\
    \ a strong Java object model yet\n\nMeta Business SDK\nThe Meta Business SDK [36]\
    \ provides access to various Meta business APIs. It is an evolution of the Facebook\
    \ Marketing API SDK, including the Marketing API and other Meta APIs like Pages,\
    \ Business Manager, Instagram, etc., allowing to build customized enterprise solutions\
    \ that seamlessly integrate a range of Meta services.\n\nOverview\n\nThe Meta\
    \ Business SDK consists of the following parts:\n\n*   Business Manager API –\
    \ Allows to manage Meta assets, permissions, and ad campaigns for Facebook pages\
    \ and ad accounts\n*   Pages API – Allows to manage a business presence and community\
    \ on Facebook\n*   Marketing API – Allows to manage ad products, create, edit,\
    \ or delete ads, and analyze their performance\n*   Instagram Graph API – Allows\
    \ to manage an enterprise presence on Instagram\n\n**Where's WhatsApp?**\nWhile\
    \ WhatsApp (Meta) Business accounts exist for enterprises, WhatsApp support is\
    \ currently not part of the Meta Business SDK.\nThe API support for Java and other\
    \ languages is currently more rudimentary than that for other Meta services through\
    \ the Business SDK. It's mostly down to REST/HTTP client calls from the language\
    \ of your choice. We'll show a WhatsApp example for Java here, but a more convenient\
    \ Java wrapper by the community exists in the form of [WhatsApp Business Java\
    \ API SDK](#600273_1_En_6_Chapter.xhtml#Sec11).\n\nSmoke Test\nThese steps explain\
    \ how to install the Meta Business SDK for Java using Maven and test the installation.\n\
    \nPrerequisites\n\nYou need the following:\n\n*   A Meta Developer Account\n*\
    \   A Meta app registered on [`https://developers.facebook.com/`](https://developers.facebook.com/)\n\
    *   Your app secret\n*   An access token\n*   An Ad Account\n\nFollow these steps\
    \ to install the SDK and test your application:\n\n1.  After creating a Maven\
    \ project with the IDE of your choice, add the following dependency to your `pom.xml`\
    \ file:\n\n    ```\n    com.facebook.business.sdk\n    facebook-java-business-sdk\n\
    \    [8.0.3,)\n    ```\n\n2.  Create a Java class called something like `SmokeTestFBJavaSDK`,\
    \ and add the following code. Note that `{access-token}`, `{appsecret}`, and `{adaccount-id}`\
    \ are placeholders for your actual values. Make sure to externalize them appropriately,\
    \ especially if you share them with others:\n\n    ```\n    import com.facebook.ads.sdk.APIContext;\n\
    \    import com.facebook.ads.sdk.APINodeList;\n    import com.facebook.ads.sdk.AdAccount;\n\
    \    import com.facebook.ads.sdk.Campaign;\n    public class SmokeTestFBJavaSDK\n\
    \    {\n    public static final APIContext context = new APIContext(\n    \"{access-token}\"\
    ,\n    \"{appsecret}\"\n    );\n    public static void main(String[] args)\n \
    \   {\n    AdAccount account = new AdAccount(\"act_{{adaccount-id}}\", context);\n\
    \    try {\n    APINodeList campaigns = account.getCampaigns().requestAllFields().execute();\n\
    \    for(Campaign campaign : campaigns) {\n    System.out.println(campaign.getFieldName());\n\
    \    }\n    } catch (Exception e) {\n    e.printStackTrace();\n    }\n    }}\n\
    \    ```\n\n3.  Build and run your application. You should see the output in the\
    \ console. If there's an error about an expired token, please request a new access\
    \ token, for example, by using the refresh token and try again.\n\nExamples\n\
    Here are code examples for selected business use cases.\n\nAds Buying\nThe following\
    \ examples show how to create ad campaigns for Click-to-Messenger Ads and Facebook\
    \ page promotions.\nClick-to-Messenger Ads allow people to directly start a thread\
    \ with your Facebook page when they click on your ad.\nYou need an Ad Account\
    \ ID.\n\nThis example shows you how to create an ad that will run during a designated\
    \ time period:\n\n```\nAdSet adSet = new AdAccount(act_, context).createAdSet()\n\
    .setName(\"My Ad Set\")\n.setOptimizationGoal(AdSet.EnumOptimizationGoal.VALUE_REACH)\n\
    .setBillingEvent(AdSet.EnumBillingEvent.VALUE_IMPRESSIONS)\n.setBidAmount(2L)\n\
    .setDailyBudget(1000L)\n.setCampaignId()\n.setTargeting(\nnew Targeting()\n.setFieldGeoLocations(\n\
    new TargetingGeoLocation()\n.setFieldCountries(Arrays.asList(\"US\"))\n)\n)\n\
    .setStartTime(start_time)\n.setEndTime(end_time)\n.setStatus(AdSet.EnumStatus.VALUE_PAUSED)\n\
    .execute();\nString ad_set_id = adSet.getId();\n```\n\nCreate an ad to increase\
    \ traffic to your Facebook page by promoting it.\n\nYou need\n\n*   An Ad Account\
    \ ID\n*   A Facebook Page ID\n\nThe following example shows how to create an ad\
    \ campaign promoting your Page to get more likes. The ad will run in the United\
    \ States with a daily budget of 1000 USD with the goal of ad impressions:\n\n\
    ```\nCampaign campaign = new AdAccount(, context).createCampaign()\n.setObjective(Campaign.EnumObjective.VALUE_PAGE_LIKES)\n\
    .setStatus(Campaign.EnumStatus.VALUE_PAUSED)\n.setBuyingType(\"AUCTION\")\n.setName(\"\
    My Campaign\")\n.execute();\nString campaign_id = campaign.getId();\nAdSet adSet\
    \ = new AdAccount(, context).createAdSet()\n.setStatus(AdSet.EnumStatus.VALUE_PAUSED)\n\
    .setTargeting(\nnew Targeting()\n.setFieldGeoLocations(\nnew TargetingGeoLocation()\n\
    .setFieldCountries(Arrays.asList(\"US\"))\n)\n)\n.setDailyBudget(1000L)\n.setBillingEvent(AdSet.EnumBillingEvent.VALUE_IMPRESSIONS)\n\
    .setBidAmount(20L)\n.setCampaignId(campaign_id)\n.setOptimizationGoal(AdSet.EnumOptimizationGoal.VALUE_PAGE_LIKES)\n\
    .setPromotedObject(\"{\\\"page_id\\\": \\\"\" +  + \"\\\"}\")\n.setName(\"My AdSet\"\
    )\n.execute();\nString ad_set_id = adSet.getId();\nAdCreative creative = new AdAccount(,\
    \ context).createAdCreative()\n.setBody(\"Like My Page\")\n.setImageUrl(\"https://static.xx.fbcdn.net/rsrc.php/v3/yu/r/66zXtGTxCWr.png\"\
    )\n.setName(\"My Creative\")\n.setObjectId()\n.setTitle(\"My Page Like Ad\")\n\
    .execute();\nString creative_id = creative.getId();\nAd ad = new AdAccount(, context).createAd()\n\
    .setStatus (Ad.EnumStatus.VALUE_PAUSED)\n.setAdsetId(ad_set_id)\n.setName(\"My\
    \ Ad\")\n.setCreative(\nnew AdCreative()\n.setFieldId(creative_id)\n)\n.setParam(\"\
    ad_format\", \"DESKTOP_FEED_STANDARD\")\n.execute();\nString ad_id = ad.getId();\n\
    APINodeList adPreviews = new Ad(ad_id, context).getPreviews()\n.setAdFormat(AdPreview.EnumAdFormat.VALUE_DESKTOP_FEED_STANDARD)\n\
    .execute();\n```\n\nBatch Mode\nMeta APIs offer a Batch Mode, somewhat similar\
    \ to Jakarta Batch or Spring Batch, allowing to send a single HTTP request that\
    \ contains multiple Facebook Graph API calls. Independent operations are processed\
    \ in parallel, while dependent operations are processed sequentially. Once all\
    \ operations are complete, a consolidated response is passed back to the caller\
    \ and the connection is closed.\n\nThis is an example for the Batch Mode:\n\n\
    ```\nBatchRequest batch = new BatchRequest(context);\naccount.createCampaign()\n\
    .setName(\"Meta Java SDK Batch Test Campaign\")\n.setObjective(Campaign.EnumObjective.VALUE_LINK_CLICKS)\n\
    .setSpendCap(10000L)\n.setStatus(Campaign.EnumStatus.VALUE_PAUSED)\n.addToBatch(batch,\
    \ \"campaignRequest\");\naccount.createAdSet()\n.setName(\"Meta Java SDK Batch\
    \ Test AdSet\")\n.setCampaignId(\"{result=campaignRequest:$.id}\")\n.setStatus(AdSet.EnumStatus.VALUE_PAUSED)\n\
    .setBillingEvent(AdSet.EnumBillingEvent.VALUE_IMPRESSIONS)\n.setDailyBudget(1000L)\n\
    .setBidAmount(100L)\n.setOptimizationGoal(AdSet.EnumOptimizationGoal.VALUE_IMPRESSIONS)\n\
    .setTargeting(targeting)\n.addToBatch(batch, \"adsetRequest\");\naccount.createAdImage()\n\
    .addUploadFile(\"file\", imageFile)\n.addToBatch(batch, \"imageRequest\");\naccount.createAdCreative()\n\
    .setTitle(\"Java SDK Batch Test Creative\")\n.setBody(\"Java SDK Batch Test Creative\"\
    )\n.setImageHash(\"{result=imageRequest:$.images.*.hash}\")\n.setLinkUrl(\"www.facebook.com\"\
    )\n.setObjectUrl(\"www.facebook.com\")\n.addToBatch(batch, \"creativeRequest\"\
    );\naccount.createAd()\n.setName(\"Meta Java SDK Batch Test ad\")\n.setAdsetId(\"\
    {result=adsetRequest:$.id}\")\n.setCreative(\"{creative_id:{result=creativeRequest:$.id}}\"\
    )\n.setStatus(\"PAUSED\")\n.setBidAmount(100L)\n.addToBatch(batch);\nList responses\
    \ = batch.execute();\n// responses contains the result of each API call in order.\
    \ However, if the API calls have dependency, then some result could be null.\n\
    ```\n\nInstagram\nManage comments on Instagram using the Meta Business SDK.\n\n\
    You need\n\n*   An Instagram Professional Account ID\n*   Facebook Page ID of\
    \ the Page linked to an Instagram Professional Account\n*   Your Meta App ID\n\
    *   A Page access token of the Page linked to your Instagram Professional Account\n\
    \nThe following example comments on your media objects, analyzes these comments,\
    \ filters against specific criteria, and replies to comments matching those criteria.\n\
    \n1.  Use the `/media/comments` endpoint to get all comments and their IDs.\n\
    2.  Select the comment you want to reply to and use its comment ID to reply to\
