    \ is supplied by the container, but you can write your own custom implementation.\n\
    \nIdentity stores usually have a one-to-one relation with a data source such as\
    \ a relational database, LDAP directory, file system, or another similar resource.\
    \ Hence, implementations of `IdentityStore` use data source`–`specific APIs to\
    \ discover authorization data (roles, permissions, etc.), such as JDBC, File IO,\
    \ Hibernate/JPA, NoSQL, or any other Data Access mechanism."
  trans: "\n###### 验证凭证\n\n要判断一个*凭证*是否有效，你可以使用 *validate()* 方法，该方法在验证成功后，会返回由该*凭证*所标识用户的相关信息。*IdentityStore*\
    \ 可以选择不实现此方法，因为它是可选的。\n\n```\nCredentialValidationResult validate(Credential credential);\n\
    ```\n\n从方法签名可以明显看出，验证结果的类型是 `CredentialValidationResult`，它允许方法获取验证结果的状态值，并且在验证成功后，还能获取验证该凭证的存储区\
    \ ID、调用者主体、调用者在身份存储区中的唯一 ID，以及调用者的组成员身份（如果有）。\n\n对于成功的验证，仅需要调用者主体即可。\n\n那么 *CredentialValidationResult*\
    \ 的内部机制是怎样的呢？请查看仅包含方法签名的类概览：\n\n```\npublic class CredentialValidationResult {\n\
    public enum Status { NOT_VALIDATED, INVALID, VALID }\npublic Status getStatus();\n\
    public String getIdentityStoreId();\npublic CallerPrincipal getCallerPrincipal();\n\
    public String getCallerDn();\npublic String getCallerUniqueId();\npublic Set getCallerGroups();\n\
    }\n```\n\n首先，有三种不同的状态值：`NOT_VALIDATED`、`INVALID` 和 `VALID`。它们分别代表什么含义？\n\n*  \
    \ `NOT_VALIDATED –` 未尝试进行验证，因为 *IdentityStore* 不处理所提供的 *Credential* 类型。\n*   `INVALID\
    \ –` 验证失败。所提供的 *Credential* 无效，或者在用户存储区中未找到对应的用户。\n*   `VALID –` 验证成功，用户已通过身份验证。调用者主体和组（如果有）*仅*在此结果状态下可用。\n\
    \n继续看 `CredentialValidationResult` 的其余方法，身份存储区 ID、调用者 DN 和调用者唯一 ID 旨在通过配合 `validate()`\
    \ 和 `getCallerGroups()` 方法来帮助你实现 *IdentityStore*。即使在仅凭调用者主体名称不足以唯一标识正确用户账户的环境中，它们也可用于确保从\
    \ `getCallerGroups()` 返回正确的调用者组。\n\nCredential 接口是一个通用接口，能够表示任何类型的令牌或用户凭证。*IdentityStore*\
    \ 实现可以支持多种具体的 `Credential` 类型，其中具体的 *Credential* 是 *Credential* 接口的一个实现，代表特定类型的凭证。这是通过实现\
    \ `validate(Credential)` 方法并检查作为参数传递的 `Credential` 类型来实现的。\n\n`IdentityStore`\
    \ 接口为 `validate()` 方法提供了一个默认实现，该实现会委托给一个能够处理所提供 *Credential* 类型的方法（假设 IdentityStore\
    \ 实现了该方法）：\n\n```\ndefault CredentialValidationResult validate(Credential credential)\
    \ {\ntry {\nreturn CredentialValidationResult.class.cast(\nMethodHandles.lookup()\n\
    .bind(this, \"validate\",\nmethodType(CredentialValidationResult.class,\ncredential.getClass()))\n\
    .invoke(credential));\n} catch (NoSuchMethodException e) {\nreturn NOT_VALIDATED_RESULT;\n\
    } catch (Throwable e) {\nthrow new IllegalStateException(e);\n}\n}\n```\n\n如果传递了\
    \ `UsernamePasswordCredential`，`validate()` 会委托给 `ExampleIdentityStore` 的以下方法：\n\
    \n```\npublic class ExampleIdentityStore implements IdentityStore {\npublic CredentialValidationResult\
    \ validate(\nUsernamePasswordCredential usernamePasswordCredential) {\n// 实现 ...\n\
    return new CredentialValidationResult(...);\n}\n}\n```\n\n###### 检索调用者信息\n\n`getCallerGroups()`\
    \ 方法检索与已验证调用者关联的组集合。这是一个可选方法，*IdentityStore* 可以选择不实现：\n\n```\nSet getCallerGroups(CredentialValidationResult\
    \ validationResult);\n```\n\n这支持身份存储区的聚合，其中一个身份存储区用于验证用户身份，而一个或多个其他存储区用于检索额外的组。\n\
    \n在这种情况下，无需针对存储区验证调用者凭证即可查询身份存储区，这一点至关重要。\n\n###### 声明能力\n\nIdentityStore 接口中还有几个我们尚未讨论的方法，实现可以使用这些方法来声明其能力和序数优先级：\n\
    \n```\nenum ValidationType { VALIDATE, PROVIDE_GROUPS }\nSet DEFAULT_VALIDATION_TYPES\
    \ = EnumSet.of(VALIDATE, PROVIDE_GROUPS);\ndefault int priority() {\nreturn 100;\n\
    }\ndefault Set validationTypes() {\nreturn DEFAULT_VALIDATION_TYPES;\n}\n```\n\
    \n让我们仔细看看以下几点：\n\n*   `priority()` 允许为 IdentityStore 配置一个序数，用于指示当存在多个*身份存储区*时，应按照什么顺序查询它们。数字越小，优先级越高；也就是说，优先级值较低的\
    \ `IdentityStore` 会在优先级较高的 *IdentityStore* 之前被调用。\n*   `validationTypes()` 返回一组\
    \ `ValidationType` 类型的 `enum` 常量，指示 IdentityStore 应被用于哪些目的：\n    *   `VALIDATE`，表示它处理\
    \ `validate()`\n    *   `PROVIDE_GROUPS`，表示它处理 `getCallerGroups()`\n    *   同时包含\
    \ `VALIDATE` 和 `PROVIDE_GROUPS`，表示它处理这两个方法\n\n*IdentityStore* 的验证类型决定了三件事：\n\n\
    *   仅身份验证 – 它返回的任何组数据都必须被忽略。\n*   仅提供组 – 不用于身份验证，而是用于获取由不同 `IdentityStore` 验证身份的调用者的组数据。\n\
    *   同时进行身份验证和返回任何组数据。\n\n###### 如何验证用户凭证\n\n正如我们之前所学，我们可以使用 `HttpAuthenticationMechanism`（或其他调用者）来验证用户身份。但是，前者不应直接与\
    \ `IdentityStore` 交互，而应调用 `IdentityStoreHandler` 来验证凭证。然后 `IdentityStoreHandler`\
    \ 再调用 `IdentityStore`。\n\n那么 `IdentityStoreHandler` 接口是做什么的呢？它定义了一种调用 `IdentityStore`\
    \ 来验证用户凭证的机制，并被认为是验证用户身份的一种更安全的方式。\n\n容器提供了一个默认的 `IdentityStoreHandler` 实现，但你可以编写自己的自定义实现。\n\
    \n身份存储区通常与数据源（如关系数据库、LDAP 目录、文件系统或其他类似资源）存在一一对应的关系。因此，`IdentityStore` 的实现会使用特定于数据源的\
    \ API（如 JDBC、文件 IO、Hibernate/JPA、NoSQL 或任何其他数据访问机制）来发现授权数据（角色、权限等）。\n"
- fmt: '### OAuth


    `OAuth` is an authorization protocol to delegate rights for an application to
    act on behalf of a user who granted their rights without giving away login credentials
    like username or password.


    It was developed by Twitter, Magnolia, and Google and registered as IETF standard
    in April 2010 under RFC 5849.


    `OAuth` version 2.0 is simpler to use but often criticized for having too many
    flavors and implementations. `OAuth 2` was standardized again by IETF in October
    2012 under RFC 6749 and 6750. It is not backward compatible with `OAuth 1.0a`.


    Some notable adopters are Facebook, Amazon, Google, Salesforce.com, or Microsoft.
    All relevant social media APIs are based on either `OAuth 1.0a` or `2.0`.


    Figure [4-3](#600273_1_En_4_Chapter.xhtml#Fig3) shows the actors of the `OAuth`
    flow, often also called the “OAuth Dance.”


    ![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig3_HTML.jpg)


    A schematic depicts the actors of the `OAuth` flow. They are resource owner, client,
    and server.


    **Figure 4-3** OAuth Parties


    - Resource Owner

    - Client

    - Server


    To use `OAuth`, one has to create an application on the target service to have
    an entry point for the consumer or resource owner, allowing access tokens to be
    issued to third-party clients by an authorization server, with the approval of
    the resource owner, or end user. The client then uses the access token to access
    the protected resources hosted by the resource server.


    The `OAuth` “Dance” has three major steps:


    - **Creation** – Creating an application in the `OAuth` Social Media service.

    - **Initialization** – The right granting phase also called the `OAuth` Dance.
    At the end of the dance, we obtain an access token (formed by a public and secret
    part) used in the next step.

    - **Signature** – Each request is signed with access token and token identifying
    the `OAuth` application that was granted the rights.


    Figure [4-4](#600273_1_En_4_Chapter.xhtml#Fig4) shows the steps and authentication
    flow in detail for `OAuth 1.0a`.


    ![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig4_HTML.jpg)


    A schematic depicts the steps and authentication flow for `OAuth 1.0 A`. The communication
    between the social media service and the consuming service server has seven steps.
    1, client asks for a resource on the consuming service. 2, consuming service asks
    a request token to media and others.


    **Figure 4-4** OAuth 1.0a “Dance”


    Figure [4-5](#600273_1_En_4_Chapter.xhtml#Fig5) shows the same flow for `OAuth
    2`. You can see the communication has been simplified, plus all exchanges must
    now be SSL encrypted. With `OAuth 1.0a`, this was optional, and most implementing
    cases therefore left it out, bearing a greater risk of interception or tampering
    than `OAuth 2`.


    ![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig5_HTML.jpg)


    A schematic depicts the steps and authentication flow for `OAuth 2`. The communication
    between the social media service and consuming service server has five steps.
    1, asks for a resource. 2, redirects the URL. 3, social media returns access token.
    4, consuming service request an access token.


    **Figure 4-5** OAuth 2 “Dance”


    While by far the most popular access control for social media and APIs, `OAuth`
    is not a genuine authentication, but “pseudo-authentication,” where the application
    specifically requests a limited access `OAuth` Token (“valet key”) rather than
    actual credentials (like a “passport”); see Figures [4-6](#600273_1_En_4_Chapter.xhtml#Fig6)
    and [4-7](#600273_1_En_4_Chapter.xhtml#Fig7).


    ![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig7_HTML.jpg)


    A sample communication of OpenID authentication. The communication is between
    two women using notary google.


    **Figure 4-7** OpenID Authentication


    ![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig6_HTML.jpg)


    A sample communication of pseudo authentication using `OAuth`. Here the application
    request a limited access `OAuth` token than the actual credentials. The communication
    is between two women using apartment controller twitter.


    **Figure 4-6** Pseudo-authentication Using OAuth


    ### OpenID


    The initial `OpenID` protocol was created in 2005 by Brad Fitzpatrick at Six Apart,
    after he had sold his social network LiveJournal to this blog software company.
    The name of the company did not refer to Six Degrees of Separation [6] as it may
    seem, but a six-day age difference between its married co-founders.


    It was code-named Yadis (acronym for “Yet another distributed identity system”)
    but was then officially called `OpenID` after David Lehn, who had also considered
    a similar Single Sign-On project but lacked time and donated the domain “openid.net”
    [29] to Six Apart.


    Figure [4-8](#600273_1_En_4_Chapter.xhtml#Fig8) shows the `OpenID` flow and its
    actors:


    ![](images/600273_1_En_4_Chapter/600273_1_En_4_Fig8_HTML.jpg)


    A schematic flow diagram of the OpenID. It includes four processes between the
    user and the relying party. 1, Enter OpenID. 2, Redirect to IDP. 3, Authentication
    consent to profile sharing. 4, Redirect to RP.


    **Figure 4-8** OpenID Flow


    - Browser

    - User

    - Relying party

    - Identity provider


    While `OpenID` had not been standardized by an organization like IETF, many large
    Internet, social media, and Telco players applied it, like AOL, Blogger, Flickr,
    France Telecom, Google, Hyves, LiveJournal, Microsoft, Mixi, Myspace, Novell,
    Orange, Sears, Sun, Telecom Italia, Telefonica O2, Universal Music Group, Verisign,
    WordPress, or Yahoo!


    Over time others like SourceForge, PayPal, or Facebook joined supporters of `OpenID`
    under the OpenID Foundation. However, in the last two to three years, there’s
    been a steady decline in `OpenID` supporters. Facebook left `OpenID`, SourceForge
    also stopped offering an `OpenID` login (at the very least after Dice.com took
    it over from Geeknet), and in September 2013, Social Login SaaS provider Janrain
    announced that its service `MyOpenID.com` would be shut down on February 1, 2014.


    So did that mean `OpenID` was dead? More or less in its original form, but at
    least still Google has high hopes for it. Strange coincidence, the initial creator
    of `OpenID`, Brad Fitzpatrick, now works at Google, probably a main reason why
    the company remained loyal to `OpenID`, when most other former supporters abandoned
    it. `OpenID Connect`, Google’s new approach, has, however, not that much in common
    with the old version of `OpenID`. It adds improved authentication and Identity
    Management on top of the otherwise winning combination of `OAuth 2`, `JSON`, and
    RESTful Web Services.


    #### OpenID Connect


    `OpenID Connect` was released by the OpenID Foundation at the end of February
    2014. Besides Google, Microsoft, Salesforce.com, or Deutsche Telekom adopted it
    at the time. At Mobile World Congress 2014 in Barcelona, GSMA announced plans
    for a mobile version “Mobile Connect,” enough suggesting it would stay for some
    time.


    `OpenID Connect` is extensible, supporting optional features like encrypting identity
    data, discovery of `OpenID` providers, or session management.


    ### JWT


    `JSON Web Token` (`JWT`) is an open standard filed under RFC 7519 to securely
    transmit information between different applications or services via JSON strings.


    `JWT` is compact, human-readable, and digitally signed using a private or public
    key pair identity provider (`IdP`). So the integrity and authenticity of the token
    can be verified by other involved parties.


    The main purpose of `JWT` is not to hide data but to ensure its authenticity.
    `JWT` is mainly used to sign and encode, but not encrypt data, although the tokens
    may also be encrypted based on another set of standards including `JSON Web Signature`
    (`JWS`) and `JSON Web Encryption` (`JWE`).


    `JWT` is a token-based stateless authentication mechanism. Since it is based on
    a client-side stateless session, servers don’t need a persistence mechanism like
    a database to save information about the session. `JSON Web Tokens` follow a well-defined
    and known standard that is becoming the most common token format to protect services.'
