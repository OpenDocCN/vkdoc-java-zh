    concepts may help there. We’ll highlight OpenSocial in more detail when looking
    at Apache Shindig.


    Apart from dissecting and categorizing social media standards as before, there
    are other standards and protocols many APIs and social networks use:


    *   Practically all social media services use **REST** as transmission protocol;
    some may use **SOAP**, but that’s rather uncommon.


    *   Most of them transmit data in **JSON** format, some in **XML** or both.


    *   Identification and authentication are almost always based on **OAuth 2** or
    **OpenID Connect**.


    Other basic standards and protocols not mentioned in Figure [3-1](#600273_1_En_3_Chapter.xhtml#Fig1)
    as the list does not aim for completion are as follows:


    *   Open Graph Protocol (OGP) enables any web page to become a rich object in
    a social graph.


    *   oEmbed, a format allowing an embedded representation of a URL on third-party
    sites.


    *   PubSubHubbub, a simple, open, web-hook-based server-to-server pub-sub protocol.


    *   Salmon, a standard protocol for comments and annotations to swim upstream
    (hence the name) to original update sources.


    We’ll take a closer look at security aspects like authorization, authentication,
    or digital identity, as well as privacy, data protection, and related standards,
    in the next chapter.


    ## Early Approaches


    The theories that we encountered in the introduction, such as Six Degrees of Separation
    [6], influenced later concepts like Friend of a Friend (FOAF) [8]. Aspects of
    both can be found in most “Friend” mechanisms used by social networks today.


    Rich Site Summary (RSS) [9] is an early example of a digital form of social media.
    Among the developers involved in the design and standardization of RSS was Reddit
    co-founder Aaron Swartz, who, before his untimely death in early 2013, had worked
    on a book about a Programmable Web [10], a rather down-to-earth, street-smart
    counterpart to the typically dry academic papers one finds in this field.


    Portable Contacts was created by Plaxo, a social address book service founded
    in 2002 by a group of entrepreneurs around Sean Parker. Parker had legal troubles
    one wouldn’t call so different from Aaron Swartz after his Napster music exchange
    portal was forced out of business, but fortunately talking for more than just
    one social media household name of today, he coped with it differently. The idea
    of a portable address book or set of “Digital Business Cards” was well intended
    and makes sense especially from a user’s point of view, but commercial interests
    of competing players, each of them greedy to share data even with those who own
    it, created many roadblocks to an otherwise good idea. Plaxo while still in business
    after all those years was not necessarily his greatest hit, and investors kicked
    him out in ways not so different from what had happened to co-founder Eduardo
    Saverin at Facebook when Parker got involved. Financially this made him rich and
    put muscle behind other services, for example, Spotify. Little coincidence, it
    seems quite a bit like Napster, but in a more commercially accepted way, also
    thanks to his fame and fortune after Facebook. Portable Contacts may have been
    a significant part of the social media movement but is no longer used. This is
    because many of the APIs used within larger companies are no longer compatible
    with Portable Contacts. The only remainder still in use is vCard, used by many
    companies and applications.'
