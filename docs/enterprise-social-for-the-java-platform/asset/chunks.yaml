  trans: '

    ### 隐私泄露


    以下是用户数据泄露最多的十大社交媒体网站：


    1.  Yahoo! `–` 超过 35 亿用户受到雅虎数据和隐私泄露事件的影响，其中包括 2013 年涉及 30 亿用户的最大单次泄露事件。


    2.  Facebook `–` 自 2004 年 Facebook 成立以来，超过 21 亿用户受到八次以上数据泄露事件的影响，其中包括剑桥分析公司丑闻——这严格来说并非数据丢失，而是出售了至少
    8700 万用户的信息。仅 2019 年的四次泄露事件，就使 Facebook 数据被盗或处理不当的用户数量突破了 20 亿。


    3.  LinkedIn `–` 在 LinkedIn 受数据泄露影响的 11 亿账户中，大部分发生在 2021 年，当时有 7 亿用户的详细信息在暗网上被出售。


    4.  MySpace `–` 三次泄露事件暴露了 7.19 亿 MySpace 用户的数据。


    5.  新浪微博 `–` 2020 年，这个中国社交网络约 5.39 亿用户的数据（包括 1.72 亿个电话号码）在暗网上被提供。


    6.  Twitter `–` Twitter 在 2023 年 6 月证实，一名黑客获取了 540 万个账户的用户详细信息。这使得受影响的账户总数达到 3.7
    亿，超过了如今“X”平台的活跃用户数。


    7.  Quora `–` 2018 年的一次黑客攻击导致 1 亿个密码和安全问题被泄露。


    8.  Dailymotion `–` 2016 年，一名黑客从视频分享平台 Dailymotion 窃取了超过 8500 万个电子邮件地址、用户名和密码。


    9.  Tumblr `–` 同样在 2016 年，Tumblr 宣布其安全和用户隐私在三年前（即 2013 年）就已遭到破坏，6500 万用户的账户详细信息被盗。


    10. Instagram `–` 2019 年，Meta 旗下的 Instagram 至少有 4900 万用户遭遇隐私泄露，当时一个未受保护的服务器被黑客入侵。


    除了总部位于法国的 Dailymotion 和来自中国的新浪微博外，其他所有网站均来自美国，这并不令人意外。在美国，监控无处不在，隐私处理往往松懈。Twitter/X
    的竞争对手、Meta 旗下的 Threads 尚未在欧盟全面推出，这一事实也与欧洲的数据保护和隐私法律，以及 Meta 过去可能发生的大规模数据泄露事件有关。


    除了源自欧盟的服务外，像 XING 这样的服务也提供了由用户控制的、粒度更细的访问权限级别，有时可以限制，例如，谁能看到每个单独的数据项。假设你想向访问你个人资料的每个人显示你的姓名和出生日期，但不显示年份或年龄，或者只允许你的朋友看到你的电话号码；这些以及更多设置都可以通过像
    XING 这样的系统来控制。


    这也是 XING 放弃 OpenSocial 的原因之一，因为它无法提供如此细粒度的访问控制，或者在某些情况下甚至根本不提供任何控制，而是向所有人显示所有内容，或者至少向你所有的朋友显示所有数据。


    通过 W3C 或其他组织在 Fediverse 上继承 OpenSocial 的大多数标准和协议也并不总是能很好地适应隐私保护，但也有一些例外，尤其是 Matrix，它非常注重安全性和隐私（还记得上一章提到的，Matrix
    最初是在以色列 Amdocs 公司创建的），因此受到了全球非政府组织和政府机构的信任。


    Diaspora 在隐私方面也很强大，这就是为什么一些极端分子，比如伊斯兰组织 ISIS，在 Twitter 等其他大型社交网络审查或封禁他们的账户后，于
    2014 年涌入该平台。作为一个具有高隐私标准的分布式服务，在缺乏中央控制点的情况下，监控或阻止内容并非易事，但到 2014 年 8 月，Diaspora
    基金会表示，通过社区管理和社区的口口相传，其所有较大的节点都已删除了 ISIS 的内容和账户。


    埃隆·马斯克让一个名叫杰克·斯威尼的年轻人——他（出于粉丝热情或好奇心）在 Twitter 上追踪马斯克的航班——在马斯克接管 Twitter 仅仅几天后就被踢出了该平台，声称这会对马斯克进行“人肉搜索”（分享某人的信息，通常是位置信息）。这名年轻人转而使用
    Mastodon 以及其他社交网络，如 Instagram。当然，埃隆·马斯克本人也经常在公开场合（如 2022 年卡塔尔世界杯决赛等类似场合）发推文。


    现在，由埃隆·马斯克领导的 X（前身为 Twitter）计划开始存储用户的生物识别数据，以及他们的就业和教育经历。对于为何要存储生物识别信息，目前尚无解释。通行密钥认证（我们将在本章后面详细介绍，但
    PayPal——埃隆·马斯克发家的公司——是早期采用者）如果实施得当，不会交换生物识别信息。它只保留在设备中。因此，一个更可能的原因是马斯克计划效仿 OpenAI
    联合创始人山姆·奥特曼的 Worldcoin 项目，该项目涉及生物识别验证。据称，收集就业和教育经历的计划与“X Hire”有关，这是“X”旗下类似于 LinkedIn
    或 XING 的竞争对手。但马斯克是罗恩·德桑蒂斯及其“反觉醒”运动的亲密盟友，在佛罗里达州和其他地方，教授“错误内容”的教师经常受到歧视或被解雇，这给这一意图蒙上了一层相当可怕的阴影。马斯克在
    PayPal 的老友兼联合创始人彼得·蒂尔也是如此，他在 Facebook 上进一步积累了财富，并凭借其“数据章鱼”Palantir 在 Facebook
    的剑桥分析数据泄露丑闻中扮演了可疑的角色。


    据报道，X 计划移除屏蔽功能，这也让许多用户感到不安，这无疑将对该网络的隐私和安全造成打击。屏蔽一个不受欢迎的账户会对你所说所做的一切对他们隐藏，而静音功能只是将他们的帖子对你隐藏，但他们，或者他们背后的黑客和钓鱼农场，仍然可以看到你个人资料中的任何信息。从网络跟踪到政治和种族骚扰，这将进一步为这个前身为
    Twitter 的网络上的不良行为者打开大门。


    ## 身份验证


    就像“Agora”这个词一样，身份验证（authentication）也源自希腊语。它最初来自希腊语“af̱thentikós”，是名词“authentes”（意为“行为者，主人”）的派生词，而“authentes”又由“autos”（意为“自身”）和词根-hentes（意为“工作者，行为者，存在”）构成。


    我们将*身份验证*定义为验证某人身份的过程。换句话说，身份验证就是证明你确实是你所声称的那个人或系统。好了，让我们通过引入我们喜爱的虚构人物——爱丽丝和鲍勃——来让这个相当专业的定义更容易理解。假设爱丽丝想给鲍勃发送一条消息。鲍勃如何能确定他确实是在和爱丽丝发消息，而不是和一个声称是爱丽丝的人呢？鲍勃基本上可以通过三种不同的方式来验证爱丽丝的身份：通过她知道的东西，她拥有的东西，或者她本身是什么。


    验证某人的身份可能基于以下三种方法中的一种或多种：


    1.  你知道的东西

    2.  你拥有的东西

    3.  你本身是什么

    '
- fmt: '### Something You Know


    We classify information as *something you know* if we store it in our memory and
    retrieve it when needed. We can identify *something you know* authentication methods
    in our daily interaction by taking a look at almost any system where we have to
    authenticate ourselves to interact with: our bank account, our email address,
    our social media accounts, etc. Yes, you got it right, the most common *something
    you know* authentication methods are passwords, secret codes, passphrases, and
    personal identification numbers (PINs).


    The *something you know* authentication is the most commonly used authentication
    method due to its low cost and easy implementation. However, its easy implementation
    has some side effects, one of which is that it may not be considered strong authentication.
    Moreover, the *something you know* authentication alone is not enough for applications
    or systems that require high security.


    ### Something You Have


    The *something you have* authentication method refers to something that the user
    has. Did you notice one major drawback the *something you know* method has? It’s
    all about our memory and its (limited) capacity; that is, passwords can easily
    be forgotten. The *something you have* method removes that problem, as it’s all
    about some object that must be with you whenever you want to authenticate yourself.
    Again, here it’s all about possessing some kind of token.


    Examples of *something you have* authentication could be a credit card, a USB
    stick, or an OTP card. Of course, carrying an authentication object with you entails
    its risks – they may be stolen, damaged, or lost.


    ### Something You Are


    The *something you are* authentication method addresses what the user *is* and
    mainly refers to biometric authentication methods. Simply put, biometrics are
    any metrics related to human features that theoretically can be used for identification
    or verification of identity. There are various biometric data types such as facial
    recognition, fingerprints, iris and retina recognition, voice recognition, vein
    recognition, DNA, and digital signatures.


    Biometrics can distinguish one person from another.


    How does biometrics compare to the other two authentication methods? It’s less
    well understood than the *something you know* and *something you have* methods,
    yet it can significantly contribute to the strength of authentication when used
    correctly in addition to the other two methods.


    We consider strong authentication the use of two or more different authentication
    methods, such as a smart card and a PIN, or a password and a form of biometrics
    such as a fingerprint, voice, or iris recognition.


    ### Latest Trends in Authentication


    Is that all? We can only use three authentication methods to secure our systems?


    Of course not. As hackers are becoming smarter, there is a need for additional
    (and more sophisticated) authentication methods, including *somewhere you are*
    and *something you do.*


    *Somewhere you are* is related to your location and supports two different flavors:
    *geolocation security checks* where the location of the user is checked against
    the configured location of their account and *MAC address checks* where, for example,
    an employee who is trying to access the company network from a different machine
    will not be granted any access due to a different MAC address.


    *Something you do* is the least popular authentication method. This kind of authentication
    is all about verifying a user by observing their actions (touches or gestures).
    An example here could be the *picture password* feature Windows 8 comes with,
    which allows you to configure touches and gestures on a picture as a way to authenticate
    yourself. A more common tech-savvy example of *something you do* to authenticate
    yourself is your smartphone’s gesture authentication, where you use your thumb
    to swipe a gesture pattern on your smartphone’s screen so you can unlock it.


    #### Passkey Authentication


    Passkeys allow you to sign in securely to services like social networks, without
    having to enter a password.


    Unlike security keys, passkeys have the benefit of being user-verifying. This
    means passkeys verify your identity using “something you know” or “something you
    are,” like a PIN or biometric check (such as a fingerprint, iris, or facial recognition),
    or a pattern, for example, a QR code.


    ##### History


    The idea of passkeys first came up in 2009, when Validity Sensors, later acquired
    by Synaptics, and PayPal joined forces on the concept of using biometrics instead
    of passwords for online identification. Together with several other IT leaders,
    they founded the FIDO Alliance, a web security organization, in July 2012. FIDO
    stands for Fast IDentity Online.


    Google joined in 2013. A year later in 2014, PayPal and Samsung started FIDO authentication
    with the Samsung Galaxy S5 smartphone. Users of the device could authenticate
    PayPal with the touch of a finger and shop online without having to enter passwords
    when completing the transaction. The term “passkeys” was popularized just recently,
    when Apple pushed it at its Worldwide Developers Conference in June 2022, where
    Apple publicly announced its passkey features in iOS 16 and macOS Ventura.


    ##### How Does It Work?


    Passkeys are based on the WebAuthn cryptographic protocols developed by the FIDO
    Alliance. Each passkey is a pair of two related asymmetric cryptographic keys
    and only works for the website it was created by. The key pair is made up of a
    private key that’s kept on your device, inside a password manager supporting passkeys
    (the passkey provider), and a public key, stored on the website you want to log
    into.


    You can think of a public key certificate as the digital equivalent of a passport.'
