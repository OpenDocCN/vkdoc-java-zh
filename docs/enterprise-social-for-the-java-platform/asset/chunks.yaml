  trans: '

    ## 未来


    自人类开始交流以来，社交网络便一直存在。技术手段随时间推移而演变，并且在不久的将来可能变化得更快。一些服务将被合并；另一些则可能变得无关紧要，迟早会消失。使用不依赖特定供应商的中立标准和框架至关重要，除非你愿意将更多时间花在快速变化的
    API 上，而不是将其用于实际的生产活动，或者更糟的是，当某个特定供应商提供的专有 API 和框架不再可用时，不得不切换到其他供应商。虽然不像 Twitter
    或 Facebook 那样的社交网络，但早在 FTX、BlockFi、Celsius 或 Voyager 之前，Mt. Gox [7] 的首次加密货币交易破产事件就是此类困境的一个典型例子。它曾在一段时间内是该领域的市场领导者。因此，通过其
    API 提供比特币的应用程序和电子商务解决方案被迫重写或放弃这些应用。


    如果在此类 API 之上创建了供应商中立的抽象层，那么应对诸如供应商倒闭、被其他公司收购，或两者兼有（例如自埃隆·马斯克收购并随后更名以来，Twitter/X
    仍面临的潜在风险）等问题和变化就会容易得多。


    这正是 Fediverse、Agorava、Keycloak 或 Jakarta EE 等供应商和社交服务中立方法发挥作用的地方。


    ## 总结


    在本章中，我们了解了社交媒体的历史、其繁荣时期、当前状况以及未来的可能发展方向。我们还了解了并购有时如何对社交媒体策略构成风险，尤其是当一些新东家说得委婉些是“三心二意且古怪”的时候。


    # 2. 社交用例


    在本章中，我们将探讨社交媒体的各种用例，从通用网络到技术专业化的网络（如媒体分享），以及面向特定目标群体的垂直社交网络。


    ## 社交网络的类型


    有众多的社交媒体网站，它们要么面向通用目的，要么服务于焦点群体和特定社区，包括前酗酒者、音乐爱好者、开发者、外籍人士、母亲、学生、教师、政府雇员，以及热衷于园艺、编织或
    BDSM 的人群。《五十度灰》的书籍和电影可能为这个列表增添了更多“色调”[17]。


    ### 传统社交网络


    大多数人熟悉传统的社交网站，例如：


    *   Facebook

    *   Twitter

    *   Mastodon

    *   Myspace

    *   WeChat

    *   新浪微博


    这些平台帮助我们与朋友、家人、同学或志同道合的人建立联系。


    ### 商务与企业


    以下是流行的商务社交网络：


    *   LinkedIn

    *   XING


    它们主要用于工作或求职，充当数字简历。LinkedIn 被微软收购，是一家全球性企业。XING 起源于德国汉堡，因此主要活跃在欧洲。它收购了其他几个求职门户网站或招聘服务，以及外籍人士最大的社交网络
    InterNations，在从檀香山到奥克兰的全球 420 个社区中增加了用户。


    ### 消息服务


    以下是最流行的社交消息服务：


    *   WhatsApp

    *   Facebook Messenger

    *   Telegram

    *   Discord

    *   Viber

    *   WeChat

    *   Snapchat

    *   Line

    *   QQ

    *   Signal

    *   KakaoTalk

    *   Zalo


    ### 媒体分享


    媒体分享网站分为三类：


    1.  音频分享

    2.  图片分享

    3.  视频分享


    #### 音频分享


    音频分享可以包括：


    *   音乐分享/流媒体

    *   播客

    *   有声读物


    ##### 音乐分享/流媒体


    有几个音乐分享和流媒体门户网站。其中最早的一个成立于 1996 年，至今仍然存在，即现场音乐档案库（LMA）。它提供了超过 25 万场现场音乐会录音，主要是独立艺术家，但也包括一些大牌，如感恩而死乐队。


    同样，在世纪之交，由肖恩·帕克创立的 Napster 出现了，他后来因 Facebook 而声名鹊起并积累了财富。它最初主要是去中心化和免费的，但其原始形式因侵犯版权而被迫关闭。然而，它的第三个迭代版本至今仍然存在。


    虽然 Apple Music 始于 2015 年，但其根源可追溯到 2001 年就已存在的 Apple iTunes。


    许多音乐分享网站诞生于 2001 年至 2010 年社交媒体的高产年份，其中包括：


    *   Myspace

    *   DatPiff

    *   Jamendo

    *   Mixcloud

    *   Musopen

    *   Spotify

    *   SoundCloud

    *   Deezer

    *   Noise Trade

    *   Playlist

    *   StarMaker

    *   Smule


    除了苹果，互联网和社交媒体巨头亚马逊和谷歌也提供音乐下载和流媒体服务，有时通过多个品牌，如 Google Play Music 和 YouTube Music。


    ##### 播客


    播客由 Tristan Louis 和 Dave Winer 于 2000 年基于 RSS 格式发明。最初被称为“音频博客”，英国数字记者本·哈默斯利在 2004
    年为《卫报》撰写的一篇文章中创造了“播客”一词。其灵感来自苹果的 iPod 音乐播放器。


    显然，苹果是首批在 iTunes 上提供播客的公司之一。如今，除了广播电台和电视台，所有主要的音乐和流媒体平台也都提供播客。


    ##### 有声读物


    播客和有声读物之间界限模糊；两者通常由同一渠道托管。有声读物最初由托马斯·爱迪生通过他的留声机发明，主要针对盲人，让他们能够听故事而不是阅读。


    随着录音设备的发展，有声读物从音频圆柱体（持续了近 100 年）发展到醋酸酯和黑胶唱片、紧凑型磁带、迷你光盘、CD 或 DVD，最终发展到固态存储，如 iPod
    或流媒体服务器的机架。


    除了图书出版社和广播电台或电视台，大多数主要的互联网巨头以及播客或音乐流媒体服务提供商都提供有声读物。


    #### 图片分享


    正如我们所了解的，第一个允许上传图片的社交网络是 2000 年的 Hot or Not。第一台拍照手机是在三年前由前 Borland 创始人菲利普·卡恩创造的，他几乎像
    MacGyver 一样临时搭建了装置，以便与选定的朋友实时分享他女儿的出生 [47]。


    以下是一些顶级的图片分享应用：


    *   Adobe Creative Cloud – 面向 Photoshop 用户

    *   Google Photos – 照片存储和备份

    *   iCloud Drive – 苹果用户的照片存储备份

    *   Instagram – 即时通讯和照片分享

    *   Pinterest – 视觉化分享食谱、家居装饰或其他信息

    *   SmugMug – 保护你的照片

    *   Amazon Photos – 面向 Amazon Prime 客户

    *   Waldo – 面向摄影公司的专业级选项

    *   The Guest – 自动照片上传器

    *   Internxt Photos – 极速照片交换

    *   Imgur – 内容托管网站，可查看和分享图片、GIF、表情包或视频

    *   FamilyAlbum – 用于家庭照片

    *   Flickr – 摄影师社区

    *   Snapchat – 多媒体即时通讯

    *   Pixpa – 轻松出售照片

    *   500px – 分享与交流


    除了这些专门的图片应用，几乎所有主要的社交网站（如 Facebook 或 Twitter）也允许分享和存储图片，尽管便利程度并不总能与专门的图片服务相媲美。

