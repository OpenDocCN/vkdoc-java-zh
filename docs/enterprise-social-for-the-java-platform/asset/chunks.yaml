  trans: "\nHCL DX\nHCL Portal（前身为 IBM WebSphere Portal）是 HCL 数字体验（DX）的一部分。\n\n通过名为\
    \ Social Media Publisher 的扩展，HCL DX 用户可以将内容分享到主流社交网络。开箱即支持以下网络：\n\n*   Facebook\n\
    \n*   LinkedIn\n\n*   Twitter/X\n\nSocial Media Publisher\nSocial Media Publisher\
    \ 可用于管理已发布内容的社交媒体帖子，如果配置得当，也可管理草稿内容。\n\n它支持手动和自动发布社交媒体帖子，并能管理社交媒体话题的生命周期。\n\n\
    表 7-1\nHCL Social Media Publisher `–` 功能\n\n社交网络 |\n 消息类型 |\n 统计信息 |\n 可寻址 URL\
    \ |\n 用户追踪 |\n 取消追踪 |\n 删除 |\n\n| --- | --- | --- | --- | --- | --- | --- | ---\
    \ | --- | --- | --- | --- | --- | --- | --- |\n\nFacebook |\n 主页帖子 |\n 点赞、评论数\
    \ |\n 是 |\n 是 |\n 是 |\n 是 |\n\nFacebook |\n 个人资料帖子 |\n 点赞、评论数 |\n 是 |\n 是 |\n\
    \ 是 |\n 是 |\n\nLinkedIn |\n 动态更新 |\n 无 |\n 否 |\n 否 |\n 是 |\n 否 |\n\nLinkedIn |\n\
    \ 分享 |\n 无 |\n 否 |\n 否 |\n 是 |\n 否 |\n\nTwitter |\n 推文 |\n 转发数 |\n 是 |\n 是 |\n\
    \ 是 |\n 是 |\n\nFacebook 设置\n请按照以下步骤为 Facebook 设置社交网络连接。\n\n要获取 Facebook 凭据：\n\n\
    1.  访问 [`https://developers.facebook.com/apps/`](https://developers.facebook.com/apps/)。\n\
    \n2.  点击 ***创建新应用***。\n\n3.  为以下参数输入值：\n\n1.  显示名称 `–` 每条帖子末尾显示的应用程序名称，例如您的公司名称。\n\
    \n2.  命名空间 `–` 用于访问 Facebook 分析的可选值。建议为每个设置的应用程序使用唯一名称。\n\n3.  类别 `–` 与您的业务类型匹配的类别。如果不确定，请选择\
    \ ***页面应用***。\n\n4.  点击 ***创建应用***。\n\n5.  您将进入应用程序的配置界面。选择 ***设置*** 并输入以下内容：\n\
    \n1.  应用域名 `–` 一个以逗号分隔的域名或 IP 地址列表，用于将此应用程序与个人 Facebook 账户关联。您可以从该列表中的某个域名/地址授权您的应用程序。\n\
    \n6.  点击 ***添加平台*** 并选择 ***网站***。\n\n7.  将 ***网站 URL*** 和（如果适用）***移动网站 URL***\
    \ 设置为所需网站，例如 [`http://www.mysite.com`](http://www.mysite.com)。\n\n8.  点击 ***保存更改***。\n\
    \n9.  现在您将看到应用程序的 ***应用 ID/API 密钥*** 和 ***应用密钥***。\n\n现在，在 HCL Portal 管理视图中创建一个新的\
    \ ***凭据保管库***，其中：\n\n*   ***应用 ID/API 密钥*** 被指定为共享的 ***用户 ID***。\n\n*   ***应用密钥***\
    \ 被指定为 ***共享密码***。\n\n然后，为 Facebook 创建社交网络配置：\n\n1.  选择 ***Facebook*** 作为社交网络。\n\
    \n2.  定义该社交网络的身份验证设置：\n\n1.  选择包含您 Facebook 凭据的 ***凭据保管库***。\n\n2.  点击 ***授权***\
    \ 将凭据绑定到特定的 Facebook 账户。\n\n3.  选择消息类型：\n\n*   **主页帖子**\n\n*   选择一个页面。\n\n*  \
    \ 输入默认名称、描述、图片、标题和消息模板。预定义值可作为参考，例如：\n\n*   名称 `–` 以文本形式发布。\n\n`[Property field=\"\
    title\" context=\"current\" type=\"content\" format=\"length:100\"]`\n\n*   描述\
    \ `–` 以文本形式发布。\n\n`[Property field=\"description\" context=\"current\" type=\"\
    content\" format=\"length:100\"]`\n\n*   图片 `–` 以 URL 形式发布。\n\n`[Element context=\"\
    current\" type=\"content\" key=\"Image\" format=\"URL\"]`\n\n*   标题 `–` 以文本形式发布。\n\
    \n`[Property field=\"description\" context=\"current\" type=\"content\" format=\"\
    length:100\"]`\n\n*   消息 `–` 以文本形式发布。\n"
- fmt: "`[Element context=\"current\" type=\"content\" key=\"Message\" format=\"length:100\"\
    ]`\n\n- **Profile wall post**\n- Select the appropriate visibility\n- Enter a\
    \ default name, description, image, caption, and message template. Predefined\
    \ values are included as a guide. For example:\n- `Name` – This is posted as text.\n\
    \n`[Property field=\"title\" context=\"current\" type=\"content\" format=\"length:100\"\
    ]`\n\n- `Description` – This is posted as text.\n\n`[Property field=\"description\"\
    \ context=\"current\" type=\"content\" format=\"length:100\"]`\n\n- `Image` –\
    \ This is posted as a URL.\n\n`[Element context=\"current\" type=\"content\" key=\"\
    Image\" format=\"URL\"]`\n\n- `Caption` – This is posted as text.\n\n`[Property\
    \ field=\"description\" context=\"current\" type=\"content\" format=\"length:100\"\
    ]`\n\n- `Message` – This is posted as text.\n\n`[Element context=\"current\" type=\"\
    content\" key=\"Message\" format=\"length:100\"]`\n\n## Publishing Content Directly\
    \ to a Facebook Page\n\nThe Social Media Publisher is used to post status updates\
    \ of your content to Facebook, but you can also post content directly to a Facebook\
    \ page.\n\n1.  Go to [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps).\n\
    2.  Click **Create new App**.\n3.  A form opens. Enter values for the following\
    \ parameters:\n    - `App name` – This is the name of your application that is\
    \ displayed at the end of each post, for example, your company name.\n    - `App\
    \ namespace` – The name used to access Facebook Insights. It is recommended to\
    \ use a unique name for each application.\n4.  Click **Continue**.\n5.  A configuration\
    \ screen for your application is displayed. Select **Page Tab** under **Select\
    \ how your app integrates with Facebook** and complete the following parameters:\n\
    \    - `Page tab name` – Enter the name for the page tab.\n    - `Page tab URL`\
    \ – This is the URL to the content item you want to add to the Facebook page.\n\
    \    - `Secured Page tab URL` – This is an https version of the `Page tab URL`.\n\
    6.  Click **Save Changes**.\n7.  Click **Authorize** to bind the credentials to\
    \ a specific social network account.\n8.  To post your content to the Facebook\
    \ page, use the following URL where `APP_ID` is the Application ID of a Facebook\
    \ Page Tab application:\n\n    `http://www.facebook.com/dialog/pagetab?app_id=APP_ID&next=https%3A%2F%2Fwww.facebook.com%2Fconnect%2Flogin_success.html`\n\
    \n9.  Publishing content directly to a Facebook page requires a secure page tab\
    \ URL. This means your server must be SSL enabled.\n\n## Settings for LinkedIn\n\
    \nPerform the following steps to set up a social network connection for LinkedIn.\n\
    \nTo get LinkedIn credentials:\n\n1.  Go to [`www.linkedin.com/developers/apps`](http://www.linkedin.com/developers/apps).\n\
    2.  Sign in if you’re not logged in yet.\n3.  Click **Create app**.\n4.  If you\
    \ already have a **Company Page**, either select an existing company or select\
    \ **New Company** and enter the company information.\n5.  Under **Create an app**,\
    \ enter values for the following parameters:\n    - `App name` – This is the name\
    \ of your application that is displayed at the end of each post, for example,\
    \ your company name.\n    - `LinkedIn page` – This is the Company Page you created\
    \ earlier, for example, [`https://linkedin.com/company/123456`](https://linkedin.com/company/123456).\n\
    \    - `Privacy policy URL` – Link to your privacy policy (optional), for example,\
    \ [`http://www.mysite.com/privacy`](http://www.mysite.com/privacy).\n    - `App\
    \ logo` – The logo is displayed to users when they authorize with your app, ideally\
    \ a square image.\n    - `Legal agreement` – Check that you have read and agree\
    \ to these terms.\n6.  Click on **Create app**.\n7.  In the **Auth** tab, you’ll\
    \ find the **Application credentials** API Key and Client Secret. Click the “Eye”\
    \ button to reveal the client secret. Record these values and fill out other settings\
    \ where appropriate."
