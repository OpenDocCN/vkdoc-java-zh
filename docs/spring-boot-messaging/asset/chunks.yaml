    ## JMS


    JMS API 提供了两种消息传递模型——点对点模型和发布-订阅模型。点对点模型是指消息被传递给一个接收者，并且保证只会传递给连接到某个队列的一个消费者（见图
    4-1）。


    ![A337882_1_En_4_Fig1_HTML.gif](img/A337882_1_En_4_Fig1_HTML.gif)


    图 4-1.


    点对点消息传递模型


    发布-订阅模型是指消息被传递给零个或多个消费者（通常称为订阅者）。发布者为所有想要订阅该主题的客户端创建一个消息主题（见图 4-2）。


    ![A337882_1_En_4_Fig2_HTML.gif](img/A337882_1_En_4_Fig2_HTML.gif)


    图 4-2.


    发布-订阅消息传递模型


    JMS 是一个需要被实现的必需 API。为了使用或创建 JMS 应用程序，你需要选择一个提供者（通常称为 JMS 服务器或代理），它将连接并解耦你的发送者/发布者与接收者/订阅者；一个用于生产/发送或接收/订阅消息的客户端；一个包含实际消息（有效载荷）的
    JMS 消息；以及一个用于点对点消息传递的 JMS 队列，或用于发布-订阅场景的主题。我们首先来详细讨论客户端。


    ### 使用 Java 的 JMS


    让我们先看看如何在 Java 中创建一个点对点发送者客户端；见代码清单 4-1。


    ```

    //Step 1\. 创建连接

    InitialContext ctx = new InitialContext();

    QueueConnectionFactory factory = (QueueConnectionFactory)ctx.lookup("connectionFactory");

    QueueConnection connection = factory.createQueueConnection();

    connection.start();

    //Step 2\. 创建队列会话

    QueueSession session = connection.createQueueSession(false, Session.AUTO_ACKNOWLEDGE);

    //Step 3\. 获取队列对象

    Queue queue =( Queue)ctx.lookup("myQueue");

    //Step 4\. 创建发送者

    QueueSender sender = session.createSender(queue);

    //Step 5\. 创建消息

    TextMessage msg = session.createTextMessage();

    msg.setText("Hello World");

    //Step 6\. 发送消息

    sender.send(msg);

    代码清单 4-1.

    点对点发送者客户端代码片段

    ```


    如代码清单 4-1 所示，这个过程非常直接。发送一条文本消息只需要六个步骤。在步骤 1 中，你需要知道使用哪个连接过程。通常，你需要在代码中包含一个 `jndi.properties`
    文件，其中包含关于你的 JMS 提供者的一些信息；例如，如果你使用 Apache ActiveMQ，你需要指定其属性，如代码清单 4-2 (`jndi.properties`)
    所示。


    ```

    # Apache ActiveMQ 的初始上下文

    java.naming.factory.initial=org.apache.activemq.jndi.ActiveMQInitialContextFactory

    # 此属性必须与 ctx.lookup 语句中声明的属性相同。

    # 默认值为：connectionFactory 或 ConnectionFactory

    # connectionFactoryNames = connectionFactory, queueConnectionFactory, queueConnectionFactory

    #   Memory Broker = vm://localhost

    # External Broker = tcp://hostname:61616

    java.naming.provider.url=vm://localhost

    # 队列命名规则：

    # queue.[jndiName] = [physicalName]

    queue.myQueue = apress.MyQueue

    # 主题命名规则：

    # topic.[jndiName] = [physicalName]

    topic.myTopic = apress.MyTopic

    代码清单 4-2.

    用于 Apache ActiveMQ 的 jndi.properties

    ```


    代码清单 4-2 展示了你需要包含在每个 JMS 应用程序中的 `jndi.properties` 文件。在这个例子中，它使用了 Apache ActiveMQ
    的设置以及队列和主题的命名约定。


    现在，让我们看看接收者，如代码清单 4-3 所示。


    ```

    // Step 1\. 创建连接

    InitialContext ctx = new InitialContext();

    QueueConnectionFactory factory = (QueueConnectionFactory)ctx.lookup("connectionFactory");

    QueueConnection connection = factory.createQueueConnection();

    connection.start();

    // Step 2\. 创建会话

    QueueSession session = connection.createQueueSession(false, Session.AUTO_ACKNOWLEDGE);

    // Step 3\. 获取队列

    Queue queue=(Queue)ctx.lookup("myQueue");

    // Step 4\. 创建接收者

    QueueReceiver receiver = session.createReceiver(queue);

    // Step 5\. 创建监听器

    MessageListener listener = new MessageListener() {

    @Override

    public void onMessage(Message message) {

    //在此处处理消息

    }

    };

    // Step 6\. 注册监听器

    receiver.setMessageListener(listener);

    代码清单 4-3.

    点对点接收者客户端代码片段

    ```


    代码清单 4-3 展示了创建点对点消息消费者所需的六个步骤。当然，如果你将此代码放在一个单独的项目中，你还需要包含 `jndi.properties`（见代码清单
    4-2）。


    如果你想使用发布者-订阅者消息传递模型，你可以按照代码清单 4-4 所示创建你的发布者。

