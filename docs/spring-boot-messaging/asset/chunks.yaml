    \    spring-cloud-config-server\n\n    ...\n\n    org.springframework.cloud\n\
    \    spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\
    \n    At the time of this book writing, the version was Camdem.SR6\\. To keep\
    \ updated, take a look at the main web project found at [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
    \ .  \n2.  Add `@EnableConfigServer`:\n\n    ```\n    @SpringBootApplication\n\
    \    @EnableConfigServer\n    public class ConfigServerDemoApplication {\n   \
    \ public static void main(String[] args) {\n    SpringApplication.run(\n    ConfigServerDemoApplication.class,\
    \ args);\n    }\n    }\n    ```\n\n    `@EnableConfigServer` will create the Config\
    \ Server that will get the latest values from GitHub and process the request from\
    \ the clients.  \n3.  Add the `application.properties` (or `application.yml`)\
    \ file where the Git repository is located by providing the URI .\n\n    ```\n\
    \    # Default port\n    server.port=8888\n    # Spring Config Server\n    spring.cloud.config.server.git.uri=https://github.com//your-repo-app-config.git\n\
    \    ```\n\nThat’s it; you don’t need anything else. You can now run the Config\
    \ Server. You can take a look at the `config-server-demo` project.\n\n#### Cloud\
    \ Config Client\n\nTo connect to the Cloud Config Server, you need to do the following:\n\
    \n1.  Add the `<dependency/>` and the `<dependencyManagement/>` tags to your `pom.xml`\
    \ file:  \n\n```\n...\n\norg.springframework.cloud\nspring-cloud-starter-config\n\
    \n...\n\norg.springframework.cloud\nspring-cloud-dependencies\nCamden.SR6\npom\n\
    import\n\n```\n\nThat’s it. You can now use any property like you are used to\
    \ doing, either using a regular `@Value(\"${hello-world-message}\")` or via `@ConfigurationProperties`.\
    \ You can get a complete example in the `config-client-demo` project.\n\nI think\
    \ this is very straightforward solution. If you need more in-depth references,\
    \ visit the [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
    \ web site.\n\n### Service Registry\n\nThe Service Registry provides the implementation\
    \ of the Service Discovery pattern. This pattern is one of the most important\
    \ features of the microservice architecture. See Figure [11-3](#A337882_1_En_11_Chapter.html#Fig3)\
    \ .\n\n![A337882_1_En_11_Fig3_HTML.gif](A337882_1_En_11_Fig3_HTML.gif)\n\nFigure\
    \ 11-3.\n\nService Registry\n\nWhen a client registers to the Service Registry,\
    \ it provides metadata about itself like its host and port number. It also keeps\
    \ sending heartbeats to the Service Registry. The Service Registry has everything\
    \ in memory.\n\n#### Service Registry: Eureka Server\n\nIn order to use the Service\
    \ Registry (the Eureka server), you need to do the following:\n\n1.  Add the `<dependency/>`\
    \ and the `<dependencyManagement/>` tags to your `pom.xml` file:\n\n    ```\n\
    \    org.springframework.cloud\n    spring-cloud-starter-eureka-server\n\n   \
    \ ...\n\n    org.springframework.cloud\n    spring-cloud-dependencies\n    Camden.SR6\n\
    \    pom\n    import\n\n    ```\n\n2.  Add `@EnableEurekaServer` to your application:\n\
    \n    ```\n    @SpringBootApplication\n    @EnableEurekaServer\n    public class\
    \ ServiceRegistryDemoApplication {\n    public static void main(String[] args)\
    \ {\n    SpringApplication.run(\n    ServiceRegistryDemoApplication.class, args);\n\
    \    }\n    }\n    ```\n\n    `@` `EnableEurekaServer` calls up a web page. You\
    \ can look at `http://localhost:8761/` in your browser, as shown in Figure [11-4](#A337882_1_En_11_Chapter.html#Fig4).\n\
    \n    ![A337882_1_En_11_Fig4_HTML.jpg](A337882_1_En_11_Fig4_HTML.jpg)\n\n    Figure\
    \ 11-4.\n\n    The Eureka server at http://localhost:8761  \n3.  Add the following\
    \ properties to `application.properties` (or `application.yml`):\n\n    ```\n\
    \    # Default Server Port\n    server.port=8761\n    # Eureka Configuration\n\
    \    eureka.instance.hostname=localhost\n    eureka.client.register-with-eureka=false\n\
    \    eureka.client.fetch-registry=false\n    eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/\n\
    \    ```\n\nThat’s it; you don’t need anything else. You can take a look at the\
    \ `service-registry-server-demo` project and run it. It will run in the `8761`\
    \ port .\n\n#### Registering a Service Application with the Eureka Server\n\n\
    To register an application, follow these steps:\n\n1.  Add the `<dependency/>`\
    \ and the `<dependencyManagement/>` tags to your `pom.xml` file:\n\n    ```\n\
    \    org.springframework.cloud\n    spring-cloud-starter-eureka\n\n    ...\n\n\
    \    org.springframework.cloud\n    spring-cloud-dependencies\n    Camden.SR6\n\
    \    pom\n    import\n\n    ```\n\n2.  Add `@EnableDiscoveryClient` to your application:\n\
    \n    ```\n    @RestController\n    @SpringBootApplication\n    @EnableDiscoveryClient\n\
    \    public class ServiceRegistryServiceDemoApplication {\n    public static void\
    \ main(String[] args) {\n    SpringApplication.run(\n    ServiceRegistryServiceDemoApplication.class,\
    \ args);\n    }\n    @GetMapping(\"/message\")\n    public String getMessage(){\n\
    \    return \"Hello World from a Service Discovery\";\n    }\n    }\n    ```\n\
    \n    This annotation will talk to the Eureka server automatically (the default\
    \ port is `8761`).  \n3.  Add the following properties to `application.properties`\
    \ (or `application.yml`):\n\n    ```\n    #Server Port\n    server.port=8181\n\
    \    #Application Name\n    spring.application.name=simple-service\n    ```\n\n\
    \    It’s important to include the application name because that’s how it will\
    \ get discovered.  \n\nYou can look at the `service-registry-service-demo` project.\
    \ If you run the application, you should see the name `SIMPLE-` `SERVICE` listed\
    \ in the Eureka server. See Figure [11-5](#A337882_1_En_11_Chapter.html#Fig5)\
    \ .\n\n![A337882_1_En_11_Fig5_HTML.jpg](A337882_1_En_11_Fig5_HTML.jpg)\n\nFigure\
    \ 11-5.\n\nThe Eureka discovery"
  trans: "\n#### 云配置服务器\n\n要使用配置服务器，你需要执行以下操作：\n\n1.  在你的 `pom.xml` 文件中，需要使用以下 `<dependency/>`\
    \ 和 `<dependencyManagement/>` 标签：\n\n    ```\n    ...\n\n    org.springframework.cloud\n\
    \    spring-cloud-config-server\n\n    ...\n\n    org.springframework.cloud\n\
    \    spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\
    \n    在本书撰写时，版本为 Camdem.SR6。如需保持更新，请查看位于 [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
    \ 的主项目网站。  \n2.  添加 `@EnableConfigServer`：\n\n    ```\n    @SpringBootApplication\n\
    \    @EnableConfigServer\n    public class ConfigServerDemoApplication {\n   \
    \ public static void main(String[] args) {\n    SpringApplication.run(\n    ConfigServerDemoApplication.class,\
    \ args);\n    }\n    }\n    ```\n\n    `@EnableConfigServer` 将创建配置服务器，它会从 GitHub\
    \ 获取最新值并处理来自客户端的请求。  \n3.  添加 `application.properties`（或 `application.yml`）文件，通过提供\
    \ URI 来指定 Git 仓库的位置。\n\n    ```\n    # 默认端口\n    server.port=8888\n    # Spring\
    \ 配置服务器\n    spring.cloud.config.server.git.uri=https://github.com//your-repo-app-config.git\n\
    \    ```\n\n仅此而已，你不需要其他任何东西。现在你可以运行配置服务器了。你可以查看 `config-server-demo` 项目。\n\n####\
    \ 云配置客户端\n\n要连接到云配置服务器，你需要执行以下操作：\n\n1.  将 `<dependency/>` 和 `<dependencyManagement/>`\
    \ 标签添加到你的 `pom.xml` 文件中：  \n\n```\n...\n\norg.springframework.cloud\nspring-cloud-starter-config\n\
    \n...\n\norg.springframework.cloud\nspring-cloud-dependencies\nCamden.SR6\npom\n\
    import\n\n```\n\n仅此而已。现在你可以像往常一样使用任何属性，无论是通过常规的 `@Value(\"${hello-world-message}\"\
    )` 还是通过 `@ConfigurationProperties`。你可以在 `config-client-demo` 项目中找到完整的示例。\n\n我认为这是一个非常直接的解决方案。如果你需要更深入的参考资料，请访问\
    \ [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
    \ 网站。\n\n### 服务注册中心\n\n服务注册中心提供了服务发现模式的实现。该模式是微服务架构最重要的特性之一。见图 11-3。\n\n![A337882_1_En_11_Fig3_HTML.gif](img/A337882_1_En_11_Fig3_HTML.gif)\n\
    \n图 11-3.\n\n服务注册中心\n\n当客户端向服务注册中心注册时，它会提供关于自身的元数据，例如其主机和端口号。它还会持续向服务注册中心发送心跳。服务注册中心将所有信息保存在内存中。\n\
    \n#### 服务注册中心：Eureka 服务器\n\n要使用服务注册中心（Eureka 服务器），你需要执行以下操作：\n\n1.  将 `<dependency/>`\
    \ 和 `<dependencyManagement/>` 标签添加到你的 `pom.xml` 文件中：\n\n    ```\n    org.springframework.cloud\n\
    \    spring-cloud-starter-eureka-server\n\n    ...\n\n    org.springframework.cloud\n\
    \    spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\
    \n2.  将 `@EnableEurekaServer` 添加到你的应用程序中：\n\n    ```\n    @SpringBootApplication\n\
    \    @EnableEurekaServer\n    public class ServiceRegistryDemoApplication {\n\
    \    public static void main(String[] args) {\n    SpringApplication.run(\n  \
    \  ServiceRegistryDemoApplication.class, args);\n    }\n    }\n    ```\n\n   \
    \ `@` `EnableEurekaServer` 会启动一个网页。你可以在浏览器中查看 `http://localhost:8761/`，如图 11-4\
    \ 所示。\n\n    ![A337882_1_En_11_Fig4_HTML.jpg](img/A337882_1_En_11_Fig4_HTML.jpg)\n\
    \n    图 11-4.\n\n    位于 http://localhost:8761 的 Eureka 服务器  \n3.  将以下属性添加到 `application.properties`（或\
    \ `application.yml`）中：\n\n    ```\n    # 默认服务器端口\n    server.port=8761\n    #\
    \ Eureka 配置\n    eureka.instance.hostname=localhost\n    eureka.client.register-with-eureka=false\n\
    \    eureka.client.fetch-registry=false\n    eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/\n\
    \    ```\n\n仅此而已，你不需要其他任何东西。你可以查看 `service-registry-server-demo` 项目并运行它。它将在 `8761`\
    \ 端口运行。\n\n#### 向 Eureka 服务器注册服务应用程序\n\n要注册一个应用程序，请遵循以下步骤：\n\n1.  将 `<dependency/>`\
    \ 和 `<dependencyManagement/>` 标签添加到你的 `pom.xml` 文件中：\n\n    ```\n    org.springframework.cloud\n\
    \    spring-cloud-starter-eureka\n\n    ...\n\n    org.springframework.cloud\n\
    \    spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\
    \n2.  将 `@EnableDiscoveryClient` 添加到你的应用程序中：\n\n    ```\n    @RestController\n\
    \    @SpringBootApplication\n    @EnableDiscoveryClient\n    public class ServiceRegistryServiceDemoApplication\
    \ {\n    public static void main(String[] args) {\n    SpringApplication.run(\n\
    \    ServiceRegistryServiceDemoApplication.class, args);\n    }\n    @GetMapping(\"\
    /message\")\n    public String getMessage(){\n    return \"Hello World from a\
    \ Service Discovery\";\n    }\n    }\n    ```\n\n    此注解会自动与 Eureka 服务器通信（默认端口为\
    \ `8761`）。  \n3.  将以下属性添加到 `application.properties`（或 `application.yml`）中：\n\n\
    \    ```\n    # 服务器端口\n    server.port=8181\n    # 应用程序名称\n    spring.application.name=simple-service\n\
    \    ```\n\n    包含应用程序名称非常重要，因为这是它被发现的方式。  \n\n你可以查看 `service-registry-service-demo`\
    \ 项目。如果你运行该应用程序，你应该会在 Eureka 服务器中看到名为 `SIMPLE-` `SERVICE` 的条目。见图 11-5。\n\n![A337882_1_En_11_Fig5_HTML.jpg](img/A337882_1_En_11_Fig5_HTML.jpg)\n\
    \n图 11-5.\n\nEureka 发现\n"
- fmt: "#### Accessing the Service Through a Client Application\n\nIn order to access\
    \ the application, follow these steps:\n\n1. Add the `<dependency/>` and the `<dependencyManagement/>`\
    \ tags to your `pom.xml` file:\n\n    ```\n    org.springframework.cloud\n   \
    \ spring-cloud-starter-eureka\n\n    ...\n\n    org.springframework.cloud\n  \
    \  spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n    ```\n\n\
    2. Use the `EurekaClient` class and the `RestTemplate` (in these examples) to\
    \ get the service.\n\n    ```\n    @RestController\n    @SpringBootApplication\n\
    \    public class ServiceRegistryClientDemoApplication {\n    private static Logger\
    \ log =\n    LoggerFactory.getLogger(\n    ServiceRegistryClientDemoApplication.class);\n\
    \    public static void main(String[] args) {\n    SpringApplication.run(\n  \
    \  ServiceRegistryClientDemoApplication.class, args);\n    }\n    private EurekaClient\
    \ discoveryClient;\n    private RestTemplate restTemplate = new RestTemplate();\n\
    \    ServiceRegistryClientDemoApplication(\n    EurekaClient discoveryClient){\n\
    \    this.discoveryClient = discoveryClient;\n    }\n    @GetMapping(\"/\")\n\
    \    public String getMessageFromRemoteServer(){\n    return\n    restTemplate.getForObject(\n\
    \    fetchServiceUrl() + \"/message\", String.class);\n    }\n    private String\
    \ fetchServiceUrl() {\n    InstanceInfo instance = discoveryClient\n    .getNextServerFromEureka(\"\
    SIMPLE-SERVICE\", false);\n    String serviceUrl = instance.getHomePageUrl();\n\
    \    log.info(\">>> Accessing: \" + serviceUrl);\n    return serviceUrl;\n   \
    \ }\n    }\n    ```\n\nYou can look at the `service-registry-client-demo` project.\
    \ Here, the `EurekaClient` uses the `getNextServerFromEureka` method, passing\
    \ the name of the service, in this case `SIMPLE-SERVICE`. (That’s why it’s important\
    \ to have an application name in the service.) It does this to get an `InstanceInfo`\
    \ instance where you can get the actual URL, port, etc., of the service.\n\nUsing\
    \ the Eureka server and the Eureka discovery clients is pretty straightforward.\
    \ Of course, this is just a simple example, but you can create multiple instances\
    \ and use a ribbon (a client-side load balancer) together with the Eureka server.\
    \ If you need more information about it, visit [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/).\n\
    \n### Circuit Breaker\n\nThis is an implementation of the Circuit Breaker pattern,\
    \ which prevents cascading failures and provides a fallback behavior until the\
    \ failing service returns to a normal state. See Figure [11-6](#A337882_1_En_11_Chapter.html#Fig6).\n\
    \n![A337882_1_En_11_Fig6_HTML.gif](A337882_1_En_11_Fig6_HTML.gif)\n\nFigure 11-6.\
    \ Circuit Breaker pattern\n\nWhen you apply a circuit breaker to a service, it\
    \ watches for failing calls. If these failures reach certain thresholds (which\
    \ can be set programmatically), the circuit breaker opens and redirects the calls\
    \ to the specified fallback operation. This gives the failing service time to\
    \ recover. This pattern implementation is based on Netflix’s Hystrix, and the\
    \ Spring Cloud team enables this feature through annotations. See the following\
    \ code:\n\n```\n@RestController\n@SpringBootApplication\n@EnableCircuitBreaker\n\
    public class CircuitBreakerServiceDemoApplication {\npublic static void main(String[]\
    \ args) {\nSpringApplication.run(\nCircuitBreakerServiceDemoApplication.class,\
    \ args);\n}\n@Autowired\nprivate RestTemplate restTemplate;\n@LoadBalanced\n@Bean\n\
    RestTemplate restTemplate() {\nreturn new RestTemplate();\n}\n@GetMapping(\"/\"\
    )\npublic String getMessageFromRemoteServer(){\nreturn this.getMessage();\n}\n\
    @HystrixCommand(fallbackMethod = \"defaultMessage\")\npublic String getMessage(){\n\
    return restTemplate\n.getForObject(\"http://simple-service\" + \"/message\", String.class);\n\
    }\npublic String defaultMessage(){\nreturn \"Nothing here\";\n}\n}\n```\n\nAs\
    \ you can see from this code, it’s very simple to use the Circuit Breaker pattern.\
    \ You just add `@EnableCircuitBreaker` and `@HystrixCommand`, passing the fallback\
    \ method as a parameter. If the service you try to use is not available, it will\
    \ use the `defaultMessage` method instead until the service is back up and running.\n\
    \nThe Hystrix dashboard can help you monitor your services and get metrics from\
    \ them. You need to add the `spring-boot-actuator` and `spring-cloud-starter-hystrix-dashboard`\
    \ dependencies to use the dashboard. If you need more information about getting\
    \ this dashboard, visit [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/).\n\
    \nI know there are more services than the Spring Cloud project offers, but those\
    \ will be for another book. You have now the tools you need to create microservice\
    \ solutions.\n\n## About Reactive Programming\n\nSo far I’ve showed you some Spring\
    \ services that can be used to meet some of the twelve-factor guidelines and to\
    \ move toward microservice architectures. This section explains where reactive\
    \ programming fits in to all of this.\n\nRemember that one of the most important\
    \ features of microservices is the ability to communicate with other microservices,\
    \ including with legacy systems. Imagine for a moment that your microservice app\
    \ requires access to several systems at once, and you already have a client that\
    \ makes several calls to aggregate everything. At some point, this app becomes\
    \ very chatty (via network latency, concurrency, blocking, etc.) and you don’t\
    \ have only one client making this kind of request. You now have millions of requests.\
    \ How do you deal with this?\n\nThat’s where reactive programming enters. It solves\
    \ this problem using a particular pattern, called an API Gateway.\n\n```\nObservable\
    \ details = Observable.zip(\nlocalService.getExchangeRates(\"usd\"),\nyahooFinancialService.getGlobalRates(\"\
    mxn\",\"jpy\"),\ngoogleFinancialService.getEuropeExchangeRates(),\n(local, yahoo,\
    \ google) -> {\nMarketExchangeRates exchangeRates = new\nMarketExchangeRates();\n\
    exchangeRates.setLocalMarket(local.getRates());\nexchangeRates.setEurope(google.getRates({\"\
    eur\",\"gpb\"}));\nexchangeRates.setGlobal(yahoo.getRate());\nreturn exchangeRates;\n\
    }\n);\n```\n\nYou can see from the previous code that you can do several tasks\
    \ in parallel and can avoid resource issues like network hops and latency, concurrency,\
    \ and blocking. Keep in mind that every service like `yahooFinacialService` can\
    \ have a Service Config, can be registered itself to a Service Registry, and can\
    \ expose default methods in the case of a failure (a circuit breaker).\n\n## Summary\n\
    \nThis chapter covered the microservices architecture and the challenges you need\
    \ to face to design native cloud applications.\n\nYou learned how Spring Cloud\
    \ services can help you create fast and easy native cloud applications with the\
    \ power of Spring Boot, all through messaging. Now you have a better understanding\
    \ why messaging is important for every architecture and integration solution."
