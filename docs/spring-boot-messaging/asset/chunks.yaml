    \ {\n        return new Queue(queue, true);\n    }\n}\n```\n*清单 9-9. `com.apress.messaging.cloud.stream.TicketSink.java`*\n\
    \n清单[9-9](#A337882_1_En_9_Chapter.html#Par131)展示了`Sink`源码。您已经了解所有代码，因为它使用`@EnableBinding(Sink.class)`创建了一个Spring\
    \ Cloud Stream应用，该应用将创建一个输入通道来接收消息。它还使用了`IntegrationFlow`类，该类会将传入的消息发送到指定的队列。\n\
    \n接下来，打开`application.properties`文件。参见清单[9-10](#A337882_1_En_9_Chapter.html#Par134)。\n\
    \n```properties\nserver.port=${port:8083}\nspring.cloud.stream.bindings.input.destination=tickets\n\
    ticket.queue=processed.tickets\n```\n*清单 9-10. `src/main/resources/application.properties`*\n\
    \n清单[9-10](#A337882_1_En_9_Chapter.html#Par134)展示了`application.properties`文件。同样，`input`通道将被重命名为`tickets`，队列被命名为`processed.tickets`，`Sink`流将把JSON消息发送到该队列。在运行每个项目之前，请查看图[9-17](#A337882_1_En_9_Chapter.html#Fig17)。\n\
