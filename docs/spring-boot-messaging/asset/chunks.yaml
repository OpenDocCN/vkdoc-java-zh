- fmt: '### RPC


    The Remote Procedure Call (RPC) model was one of the many use cases back in the
    60s, when distributed computing was a challenge (it still is). The RPC model is
    considered a request-response protocol, where you have a client that starts a
    process by sending a request message to a remote server to execute one or several
    tasks. Then the remote server sends a response to the client so it can continue
    with the process. See Figure [5-7](#A337882_1_En_5_Chapter.html#Fig7).


    ![A337882_1_En_5_Fig7_HTML.gif](A337882_1_En_5_Fig7_HTML.gif)


    **Figure 5-7.** Simple RPC model


    Creating an RPC messaging model in Spring Boot is very easy. Remember that Spring
    Boot relies on the Spring AMQP module so you don''t have to configure the RabbitMQ
    broker. The Spring AMQP will take care of that. Let''s review the code so you
    get a better picture of what''s going on.


    Open the `com.apress.messaging.amqp.RpcClient` class. It should look like Listing
    [5-7](#A337882_1_En_5_Chapter.html#Par92).


    ```

    @Component

    public class RpcClient {

    private RabbitTemplate template;

    @Autowired

    public RpcClient(RabbitTemplate template) {

    this.template = template;

    }

    public Object sendMessage(String exchange,

    String routingKey, String message) {

    Object response =

    this.template

    .convertSendAndReceive(exchange, routingKey, message);

    return response;

    }

    }

    Listing 5-7.

    com.apress.messaging.amqp.RpcClient.java

    ```


    Listing [5-7](#A337882_1_En_5_Chapter.html#Par92) shows you the `RpcClient` class,
    and if you compare it to Listing [5-1](#A337882_1_En_5_Chapter.html#Par46) (the
    `Producer` class), you will notice that there is only one difference—the template
    method being called. In this example, we are using the `convertSendAndReceive`
    method, which accepts three parameters—an exchange name, the routing key, and
    the message. It returns an object (the return will normally be wrapped into it
    as an `org.springframework.amqp.core.Message` instance). Of course, you can find
    more overloaded methods from this signature, but for now, we are going to make
    it as simple as possible.


    Next, let''s take a look at the server. Open the `com.apress.messaging.amqp.RpcServer`
    class. See Listing [5-8](#A337882_1_En_5_Chapter.html#Par95).


    ```

    @Component

    public class RpcServer {

    @RabbitListener(queues="${apress.amqp.queue}")

    public Message process(String message){

    //More Processing here...

    return MessageBuilder

    .withPayload("PROCESSED:OK")

    .setHeader("PROCESSED", new

    SimpleDateFormat("yyyy-MM-dd")

    .format(new Date()))

    .setHeader("CODE", UUID.randomUUID().toString())

    .build();

    }

    }

    Listing 5-8.

    com.apress.messaging.amqp.RpcServer.java

    ```


    Listing [5-8](#A337882_1_En_5_Chapter.html#Par95) shows you the `RpcServer` class.
    Let''s see what is new and different from the other versions:


    *   `@RabbitListener`: You are already familiar with this annotation. It will
    create a message listener container and it will be listening for any incoming
    messages from the `apress.amqp.queue` queue (remember that this is a property
    specified in the `application.properties` file).

    *   `Message<String>`: If you want to enhance your message, this is what you need
    to return, because it gives you a way to use headers. In this example, we are
    using a string type message.

    *   `MessageBuilder`: This is a helper class that allows you to build a new message,
    add/copy headers, and more. As you can see, we are just creating a new message
    with a payload set to `PROCESSED:OK` and adding several headers.


    If you take a closer look at Listing [5-8](#A337882_1_En_5_Chapter.html#Par95),
    you will notice that the `process` method handler returns a `Message` of type
    `String`, and because of that, the Spring AMQP uses the RabbitMQ''s `direct reply-to`
    feature. That feature allows us to connect the server to the client for a response
    without creating a `reply-queue` (this has been a feature since version 3.4.x
    of the RabbitMQ broker).


    You don''t need to worry about any correlation data, because Spring AMQP will
    create it for you. You also have a way to customize it or create your own correlation
    data.


    Now, let''s take a look at the main application. Open your `com.apress.messaging.AmqpDemoApplication`
    class; it should look like Listing [5-9](#A337882_1_En_5_Chapter.html#Par103).


    ```

    @SpringBootApplication

    public class AmqpDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(AmqpDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner

    simple(@Value("${apress.amqp.exchange:}")String exchange,

    @Value("${apress.amqp.queue}")String routingKey,

    RpcClient client){

    return args -> {

    Object result = client

    .sendMessage(exchange,

    routingKey,

    "HELLO AMQP/RPC!");

    assert result!=null;

    };

    }

    }

    Listing 5-9.

    com.apress.messaging.AmqpDemoApplication.java

    ```


    Listing [5-9](#A337882_1_En_5_Chapter.html#Par103) shows the main app where you
    are only using the `RpcClient`.


    Before you run the RPC example, make sure you don''t have another listener using
    the same queue.


    By running the app, you should get something similar to Figure [5-8](#A337882_1_En_5_Chapter.html#Fig8).


    ![A337882_1_En_5_Fig8_HTML.jpg](A337882_1_En_5_Fig8_HTML.jpg)


    **Figure 5-8.** RPC model logs


    Sometimes you will need to have more control over the RPC. Maybe you want to have
    a fixed queue that is used to do the reply, for example. For that, you need to
    add some configuration to the application. See Listing [5-10](#A337882_1_En_5_Chapter.html#Par108).


    ```

    @Configuration

    @EnableConfigurationProperties(AMQPProperties.class)

    public class AMQPConfig {

    @Configuration

    @EnableConfigurationProperties(AMQPProperties.class)

    public class AMQPConfig {

    @Autowired

    ConnectionFactory connectionFactory;

    @Value("${apress.amqp.reply-queue}")

    String replyQueueName;

    @Bean

    public RabbitTemplate fixedReplyQueueRabbitTemplate() {

    RabbitTemplate template = new

    RabbitTemplate(connectionFactory);

    template.setReplyAddress(replyQueueName);

    template.setReplyTimeout(60000L);

    return template;

    }

    @Bean

    public SimpleMessageListenerContainer

    replyListenerContainer() {

    SimpleMessageListenerContainer container = new

    SimpleMessageListenerContainer();

    container.setConnectionFactory(connectionFactory);

    container.setQueues(replyQueue());

    container.setMessageListener(

    fixedReplyQueueRabbitTemplate());

    return container;

    }

    @Bean

    public Queue replyQueue(){

    return new Queue(replyQueueName,false);

    }

    @Bean

    public Queue queue(

    @Value("${apress.amqp.queue}")String queueName){

    return new Queue(queueName,false);

    }

    }

    Listing 5-10.

    com.apress.messaging.config.AMQPConfig.java

    ```


    Listing [5-10](#A337882_1_En_5_Chapter.html#Par108) shows you how to set up a
    fixed queue that will be used by the server to reply to the client request, and
    the client will be listening to. The important part here is the `RabbitTemplate`,
    which will configure the `reply-to` queue by using the `setReplyAddress` method.
    It''s also necessary to use the same template as the listener in order to listen
    for responses from the server (this is accomplished by setting the listener container
    to `setMessageListener`).


    **Note**


    The RabbitMQ Java client ( [`https://www.rabbitmq.com/java-client.html`](https://www.rabbitmq.com/java-client.html)
    ) provides out-of-the-box RPC client/server classes, but you still need to deal
    with reconnections, transactions, etc., which is something that Spring AMQP does
    for you.'
