- fmt: '### Low-Level WebSockets


    Before we jump into the fallback options (`SockJS`) and sub-protocols (`STOMP`),
    let’s see how can we use Spring Boot with a low-level WebSockets.


    In the book’s source code, go to the Chapter [7](#A337882_1_En_7_Chapter.html)
    and open the two projects (you can import them into your favorite IDE or use any
    text editor). In the following section, we are going to work with the `websocket-demo`
    project.


    Let’s start by analyzing the configuration. In order to use low-level WebSockets
    communications, we need to implement the `org.springframework.web.socket.config.annotation.WebSocketConfigurer`
    interface. Open the `com.apress.messaging.config.LlWebSocketConfig` class, as
    shown in Listing [7-1](#A337882_1_En_7_Chapter.html#Par11).


    ```

    @Configuration

    @EnableWebSocket

    public class LlWebSocketConfig implements WebSocketConfigurer{

    LlWebSocketHandler handler;

    public LlWebSocketConfig(LlWebSocketHandler handler){

    this.handler = handler;

    }

    @Override

    public void registerWebSocketHandlers(

    WebSocketHandlerRegistry registry) {

    registry.addHandler(this.handler, "/llws");

    }

    }

    Listing 7-1.

    com.apress.messaging.config.LlWebSocketConfig.java

    ```


    Listing [7-1](#A337882_1_En_7_Chapter.html#Par11) shows you the configuration
    needed to enable WebSockets in Spring. Remember, the way we are configuring this
    class is to have a low-level WebSockets communication. Let’s review the components
    that are used:


    - `@EnableWebSocket`: This is necessary to enable and configure WebSockets requests.

    - `WebSocketConfigurer`: This is an interface that defines callback methods to
    configure the WebSockets request handling. Normally you are required to implement
    the `registerWebSocketHandlers` method.

    - `registerWebSocketHandlers`: This method needs to be implemented by adding the
    handlers that will be used for the WebSockets processing request. In this method,
    we are registering a handler (`LlWebSocketHandler`) instance and passing the endpoint
    used for the handshake and communication.

    - `WebSocketHandlerRegistry`: This an interface used to register a `WebSocketHandler`
    implementation. We are going to use a `TextWebSocketHandler` implementation and
    look at its code in the next section.


    As you can see, it’s very simple to configure a low-level WebSockets using Spring.
    Next, let’s open the `com.apress.messaging.web.socket.LlWebSocketHandler` class.
    See Listing [7-2](#A337882_1_En_7_Chapter.html#Par18).


    ```

    @Component

    public class LlWebSocketHandler extends TextWebSocketHandler{

    @Override

    public void afterConnectionEstablished(

    WebSocketSession session) throws Exception {

    super.afterConnectionEstablished(session);

    }

    @Override

    protected void handleTextMessage(

    WebSocketSession session, TextMessage message)

    throws Exception {

    System.out.println(">>>> " + message);

    }

    }

    Listing 7-2.

    com.apress.messaging.web.socket.LlWebSocketHandler.java

    ```


    Listing [7-2](#A337882_1_En_7_Chapter.html#Par18) shows you the WebSockets handler
    we are going to use to receive messages from the client. Let’s examine this class:


    - `TextWebSocketHandler`: This is a concrete class that implements the `WebSocketHandler`
    interface through the `AbstractWebSocketHandler` class. This implementation is
    for processing text messages only. We are going to override two methods: `afterConnectionEstablished`
    and `handleTextMessage`.

    - `afterConnectionEstablished`: This method is called when the client successfully
    connects using the WebSockets protocol. In this method, you can use the `WebSocketSession`
    instance to send or receive messages. For now, we are going to use its default
    behavior, but we will see more in the logs (through the AOP `WebSocketsAudit`
    class).

    - `handleTextMessage`: This method receives a `WebSocketSession` (that we are
    going to use later) and a `TextMessage` instance. The `TextMessage` instance manages
    the stream of bytes and converts them into a string.


    So far, we have implemented the server side, but what about the client? Normally,
    you will have a web page to do the client’s job.


    Open the `src/main/resources/static/llws.html` file, as shown in Listing [7-3](#A337882_1_En_7_Chapter.html#Par25).


    ```

    $(function(){

    var connection = new

    WebSocket(''ws://localhost:8080/llws'');

    connection.onopen = function () {

    console.log(''Connected...'');

    };

    connection.onmessage = function(event){

    console.log(''>>>>> '' + event.data);

    var json = JSON.parse(event.data);

    $("#output").append(""

    + json.user

    + ": "

    + json.message

    + "");

    };

    connection.onclose = function(event){

    $("#output").append("CONNECTION: CLOSED");

    };

    $("#send").click(function(){

    var message = {}

    message["user"] = $("#user").val();

    message["message"] = $("#message").val();

    connection.send(JSON.stringify(message));

    });

    });


    Listing 7-3.

    Snippet of llws.html

    ```


    Listing [7-3](#A337882_1_En_7_Chapter.html#Par7) shows just the JavaScript snippet
    of the important code, which I explain next:


    - `WebSocket`: This is part of the JavaScript engine and it will connect to the
    specified URI. Note that the schema is `ws` and that we are using the `/llws`
    endpoint, which we specified in the configuration class (see Listing [7-1](#A337882_1_En_7_Chapter.html#Par11)).

    - `onopen`: This is a callback function that is executed when the connection is
    established with the server. Note that we are only logging a string to the console.

    - `onmessage`: This is a callback function that is executed when a message is
    received from the server. In this case, we are parsing an `event.data` into a
    JSON object.

    - `onclose`: This is a callback function that is executed when the connection
    is closed or is lost with the server.

    - `$.click`/`send`: This is a callback function that is attached to the Send button,
    and it’s called when the button is clicked. Here we are using the `send` method,
    which will send a JSON string of the message object.


    Next, let’s run the `websocket-demo` project; after it starts, open a browser
    and go to `http://localhost:8080/llws.html`. You should see something similar
    to Figure [7-3](#A337882_1_En_7_Chapter.html#Fig3).


    ![A337882_1_En_7_Fig3_HTML.jpg](A337882_1_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    `http://localhost:8080/llws.html`


    After you go to `llws.html` in your browser, take a look at the application logs.
    You should see something similar to Figure [7-4](#A337882_1_En_7_Chapter.html#Fig4).


    ![A337882_1_En_7_Fig4_HTML.jpg](A337882_1_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    The `websocket-demo` project logs


    Figure [7-4](#A337882_1_En_7_Chapter.html#Fig4) shows you the logs, whereby the
    `afterConnectionEstablished` is being called from the `LlWebSocketHandler` class.
    This means that the client was successfully connected to the server. You can also
    take a look at the browser’s developer console to see the logs displaying the
    string `Connected...`. See Figure [7-5](#A337882_1_En_7_Chapter.html#Fig5).


    ![A337882_1_En_7_Fig5_HTML.jpg](A337882_1_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    Browser’s console


    Next, you can send a message by modifying the user and message inputs from the
    `llws.html` page and clicking the Send button. After clicking the Send button,
    you should see something similar to Figure [7-6](#A337882_1_En_7_Chapter.html#Fig6).


    ![A337882_1_En_7_Fig6_HTML.jpg](A337882_1_En_7_Fig6_HTML.jpg)


    Figure 7-6.


    `websocket-demo` project logs after clicking Send


    Figure [7-6](#A337882_1_En_7_Chapter.html#Fig6) shows you the logs after sending
    the message as well as the print out from the `handleTextMessage` method.


    This example shows you how to send a message from the client to the server. Now,
    let’s do a response, an echo, from the server. You need to add something to `handleTextMessage`
    to handle the reply.


    Modify `handleTextMessage` to look like the following:


    ```

    @Override

    public void handleTextMessage(

    WebSocketSession session,

    TextMessage message) throws Exception {

    System.out.println(">>>> " + message);

    session.sendMessage(message);

    }

    ```'
