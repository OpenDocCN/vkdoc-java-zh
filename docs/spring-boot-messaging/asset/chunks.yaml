  raw: '#### Annotation-Based Programming Model


    You can use the same well-known annotations from the `spring-webmvc` module; the
    main difference is that the core is now non-blocking and operates on the reactive
    `ServerHttpRequest` and `ServerHttpResponse` responses (instead of the `HttpServletRequest`
    and `HttpServletResponse` responses).


    Open the `spring-web-flux-reactive` project and then open the `com.apress.messaging.controller.ReactiveController`
    class. See Listing [10-6](#A337882_1_En_10_Chapter.html#Par61).


    ```

    @ RestController

    public class ReactiveController {

    SubscribableChannel personChannel;

    PersonRepository repo;

    public ReactiveController(SubscribableChannel

    personChannel, PersonRepository repo){

    this.personChannel = personChannel;

    this.repo = repo;

    }

    @GetMapping("/person")

    Flux list() {

    return Flux.fromStream(this.repo.getAll());

    }

    @GetMapping("/person/{id}")

    Mono findById(@PathVariable String id) {

    return Mono.just(this.repo.findOne(id));

    }

    @GetMapping(value="/person-watcher",

    produces=MediaType.TEXT_EVENT_STREAM_VALUE)

    public Flux log4Person(){

    return Flux.create( sink -> {

    MessageHandler handler = message ->

    sink.next((Person) message.getPayload());

    personChannel.subscribe(handler);

    sink.setCancellation(() ->

    personChannel.unsubscribe(handler));

    });

    }

    @PostMapping(value="/person", consumes =

    {MediaType.APPLICATION_JSON_VALUE})

    public void createPerson(@RequestBody Person person){

    if(person != null && person.getName() != null){

    repo.save(person);

    personChannel

    .send(MessageBuilder.withPayload(person).build());

    }

    }

    }

    Listing 10-6.

    com.apress.messaging.controller.ReactiveController.java

    ```


    Listing [10-6](#A337882_1_En_10_Chapter.html#Par61) shows you the annotation you
    have seen from Spring MVC, but now they are based on Reactive streams. Analyze
    the code and note that we are using the Reactor programming model—the `Flux` and
    `Mono` reactive classes.


    Even though I am not going to talk in detail about the Server Sent Events (SSE)
    technology , `spring-webflux` brings this technology just by producing the `TEXT_EVENT_STREAM_VALUE`
    content-type. The SSE is a way to send messages from the server to a web page
    (via push notifications).


    Note


    The `web-emitter` project contains an example of an SSE. SSE was included in Spring
    4.2, so this is not a new technology. It’s been around a couple of years. The
    browsers are the ones that need to implement the way to receive notifications.


    #### Functional-Based Programming Model


    You can use functional programming to configure all the requests and responses
    from the server. You define `RouterFunctions`, `HandlerFunctions`, and a server.


    ##### RouterFunctions, HandlerFunctions, and Server


    Spring WebFlux includes several reactive classes and concepts that make it even
    easier to model the web requests and responses:


    *   `HandlerFunctions` : All the requests are handled by a `HandlerFunction<T>`,
    which takes the `ServerRequest` and returns a `Mono<ServerResponse>`.

    *   `RouterFunctions` : All the incoming requests are routed to handler functions
    with a `RouterFunction<T>`, which takes a `ServerRequest` and returns a `Mono<HandlerFunction>`
    type.

    *   `Server` : A new server needs to be configured in order to take the new `RouterFunctions`
    and `Handlers`.


    The `spring-web-flux` project contains all the code you are going to need in this
    section.


    Start by opening the configuration that contains all the `RouterFunctions`. Open
    the `com.apress.messaging.config.ServerConfig` class. See Listing [10-7](#A337882_1_En_10_Chapter.html#Par72).


    ```

    @Configuration

    public class ServerConfig {

    PersonHandler handler;

    ServerConfig(PersonHandler handler){

    this.handler = handler;

    }

    @Bean

    RouterFunction router(){

    return RouterFunctions

    .route(GET("/persons/{id}")

    .and(accept(APPLICATION_JSON)), handler::findById)

    .andRoute(GET("/persons")

    .and(accept(APPLICATION_JSON)), handler::findAll)

    .andRoute(GET("/personwatcher")

    .and(accept(APPLICATION_JSON)),

    handler::newPersonLog)

    .andRoute(POST("/persons")

    .and(accept(APPLICATION_JSON)), handler::createPerson);

    }

    @Bean

    HttpServer httpServer(

    RouterFunction router){

    HttpHandler httpHandler =

    RouterFunctions.toHttpHandler(router);

    ReactorHttpHandlerAdapter adapter = new

    ReactorHttpHandlerAdapter(httpHandler);

    HttpServer server =

    HttpServer.create("localhost", 8080);

    server.newHandler(adapter).block();

    return server;

    }

    }

    Listing 10-7.

    com.apress.messaging.config.ServerConfig.java

    ```


    Listing [10-7](#A337882_1_En_10_Chapter.html#Par72) shows you the functional programming
    required to configure the new reactive web stack, by creating the `RouterFunctions`
    . You can think of it as a new way to create web controllers. Note that we are
    defining routes and handlers.


    Listing [10-7](#A337882_1_En_10_Chapter.html#Par72) shows you how to configure
    a server. In this example, the `Netty` server is being configured. Note how `HttpHandler`
    and `ReactorHttpHandler` are being used.


    Next, open the `com.apress.messaging.handler.PersonHandler` class . See Listing
    [10-8](#A337882_1_En_10_Chapter.html#Par76).


    ```

    @Component

    public class PersonHandler {

    PersonRepository repo;

    EmitterProcessor stream =

    EmitterProcessor.create().connect();

    PersonHandler(PersonRepository repo) {

    this.repo = repo;

    }

    public Mono

    findAll(ServerRequest request) {

    Flux people =

    Flux.fromStream(this.repo.getAll());

    return

    ServerResponse

    .ok()

    .contentType(APPLICATION_JSON)

    .body(people, Person.class);

    }

    public Mono

    findById(ServerRequest request) {

    String personId = request.pathVariable("id");

    Mono notFound =

    ServerResponse.notFound().build();

    Mono personMono =

    Mono.just(this.repo.findOne(personId));

    return personMono

    .then(person ->

    ServerResponse

    .ok()

    .contentType(APPLICATION_JSON)

    .body(fromObject(person)))

    .otherwiseIfEmpty(notFound);

    }

    public Mono

    createPerson(ServerRequest request) {

    Mono person =

    request.bodyToMono(Person.class);

    return ServerResponse

    .ok()

    .build(person.doOnNext(p -> {

    this.repo.save(p);

    this.stream.onNext(p);

    }).then());

    }

    public Mono

    newPersonLog(ServerRequest request){

    Mono personMono = stream.doOnNext( person -> {

    System.out.println(">>>> [Person created] " + person);

    })

    .next()

    .subscribe();

    personMono.block();

    return personMono

    .then(person ->

    ServerResponse

    .ok()

    .contentType(APPLICATION_JSON)

    .body(fromObject(person)));

    }

    }

    Listing 10-8.

    com.apress.messaging.handler.PersonHandler.java

    ```


    Listing [10-8](#A337882_1_En_10_Chapter.html#Par76) shows the handler that will
    be used for each router function. Note that every method receives the `ServerRequest`
    as a parameter and returns a `Mono<ServerResponse>`.


    Note


    To run the `spring-web-flux-reactive` and `spring-web-flux` projects, you need
    to have the Mongo server up and running.


    ## Summary


    This chapter introduced reactive programming, including discussing what it’s good
    for and what we can do with it. There is a lot of reactive programming right now
    and a lot to explain, and this chapter is just a start.


    You saw two modules/libraries—RxJava (from Netflix) and Reactor (from the Spring
    Framework team). You also saw a sneak peek of what is coming in a few weeks with
    Spring 5 and the Functional Web: WebFlux.


    In the next chapter, we are going to talk about microservices and you’ll learn
    how you can apply all that you have learned so far in the book to your microservices-based
    projects.


    # 11. Microservices


    This chapter discusses the Microservices architecture and covers the changes that
    you need to make in order to get into a cloud-native application design using
    microservices. It also covers how messaging is an important key for success.'
