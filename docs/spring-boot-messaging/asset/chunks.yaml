    \ or the payload.\n*   `@ServiceActivator`: This annotation marks a method as\
    \ being capable of handling a message. In this example, we just ended the flow.\
    \ You will see some output from this method thanks to the AOP logs included in\
    \ this example.\n\nTo run this example, just comment out the `@ImportResource`\
    \ annotation from the main class and that’s it. You should have logs similar to\
    \ what’s shown in Figure [8-5](#A337882_1_En_8_Chapter.html#Fig5).\n\n![A337882_1_En_8_Fig5_HTML.jpg](A337882_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5.\n\nApplication logs for this example\n\nFigure [8-5](#A337882_1_En_8_Chapter.html#Fig5)\
    \ shows you the logs for each step where the configuration exposes the filter,\
    \ the transformer, and the service activator endpoints. I used separate classes\
    \ here, but of course you can use only one and expose all your methods with their\
    \ own annotations.\n\n#### Using Java Config\n\nUsing Java Config is very similar\
    \ to what you just did, so you can simply change the last part of the flow. Comment\
    \ out the `SimpleServiceActivator` message endpoint and add the following code\
    \ to the end of the `SimpleAnnotationConfiguration` class:\n\n```\n@Bean\n@ServiceActivator(inputChannel\
    \ = \"toLog\")\npublic LoggingHandler logging() {\nLoggingHandler adapter = new\n\
    LoggingHandler(LoggingHandler.Level.INFO);\nadapter.setLoggerName(\"SIMPLE_LOGGER\"\
    );\nadapter.setLogExpressionString\n(\"headers.id + ': ' + payload\");\nreturn\
    \ adapter;\n}\n```\n\nThis code will create a `LoggingHandler` (this is the same\
    \ object that the XML will generate from the `logging-channel-adapter` tag). It\
    \ will log the `SIMPLE_LOGGER` message with the header’s ID and the payload, in\
    \ this case the `\"Hello World\"` message. Now try to send different words and\
    \ see if the filter works, or try to change the transformer.\n\nI know that this\
    \ is a trivial example, but it should give you an idea of how Spring Integration\
    \ works and how it can be configured. Clients often ask whether they can mix configurations.\
    \ Absolutely! You are going to see examples of that very soon.\n\n### File Integration\
    \ Example\n\nNext, let’s see how can you can integrate file reading, which is\
    \ a very common task of integration systems. Remember that this is one of the\
    \ most common use cases. Start by opening the `com.apress.messaging.config.SpiFileConfiguration`\
    \ class. It should look like Listing [8-6](#A337882_1_En_8_Chapter.html#Par71).\n\
    \n```\n@Configuration\n@EnableConfigurationProperties(SpiProperties.class)\npublic\
    \ class SpiFileConfigutation {\nprivate SpiProperties props;\nprivate PersonConverter\
    \ personConverter;\npublic SpiFileConfigutation(SpiProperties props,\nPersonConverter\
    \ personConverter){\nthis.props = props;\nthis.personConverter = personConverter;\n\
    }\n@Bean\npublic IntegrationFlow fileFlow(){\nreturn IntegrationFlows\n.from(Files.inboundAdapter(new\
    \ File\n(this.props.getDirectory())\n.preventDuplicates(true)\n.patternFilter(\n\
    this.props.getFilePattern()),\ne -> e.poller(Pollers.fixedDelay(5000L)))\n.split(Files.splitter().markers())\n\
    .filter(p -> !(p instanceof FileSplitter.FileMarker))\n.transform(Transformers.converter(personConverter))\n\
    .handle(\"simpleMessageHandler\",\"process\")\n.get();\n}\n}\nListing 8-6.\ncom.apress.messaging.config.SpiFileConfiguration.java\n\
    ```\n\nListing [8-6](#A337882_1_En_8_Chapter.html#Par71) shows you the integration\
    \ flow we are going to use in this example. This flow reads a file’s contents\
    \ (from the file system), converts the content into an object (in this case into\
    \ a `Person` object), and handles the message for any extra logic . Let’s analyze\
    \ this process in detail:\n\n*   `from` : This is an overloaded method where you\
    \ normally pass the `MessageSource`. In this case, we are passing two values—the\
    \ `Files.inboundAdapter` and a `Consumer` that receives a `SourcePollingChannelAdapterSpec`.\
    \ In this case, we are using a Lambda expression to poll the file system for new\
    \ files every five seconds, by using the `Pollers` class.\n*   `Files` : This\
    \ is a protocol adapter that works out of the box. You just need to configure\
    \ it. This adapter is used to pick up files from the file system. The `Files`\
    \ class belongs to the Spring Integration Java DSL and provides several useful\
    \ methods:\n    *   `inboundAdapter` : This adapter includes a fluent API that\
    \ returns a `FileInboundChannelAdapterSpec` that has methods like the following:\n\
    \        *   `preventDuplicates` : You can avoid reading the same file more than\
    \ once by setting this to `true`.\n        *   `patternFilter` : This will help\
    \ look for files have a certain name pattern.In this example, we just read from\
    \ the directory (from the `apress.spi.directory` property value) and the name\
    \ based on the pattern (from the `apress.spi.file-pattern` property value), both\
    \ from the `SpiProperties` class.\n*   `split` : This method call indicates that\
    \ the parameter (it could be a bean, service, handler, etc.) can split into a\
    \ single message or message payload and produce multiple messages or payloads.\
    \ In this case, we are using a `FileMarker` that delimits the file data when there\
    \ is a sequential file process.\n*   `filter` : Because we are using markers to\
    \ see each message start and end, we will receive the content of the file as a\
    \ `FileMarker` start, then the actual content, and finally the `FileMarker` end.\
    \ That’s why we are saying, just pass me the payload or content, not the marker.\n\
    *   `transform` : Here we are using a `Transformers` class that transforms a message.\
    \ Here we are using a custom converter, which you can look at the code in the\
    \ `com.apress.messaging.integration.PersonConverter.java` class.\n*   `handle`\
    \ : Here we are using a class that will handle the message by passing as the first\
    \ parameter the name of the bean (`simpleMessageHandler`) and the method that\
    \ will take care of the process (`process`; you can look at the code in the `com.apress.messaging.integration.SimpleMessageHandler.java`\
    \ class). The `SimpleMessageHandler` class is just a POJO marked with the `@Component`\
    \ annotation.\n\nNote"
  trans: "\n#### 使用注解\n\nSpring Integration 包含一些集成注解，可帮助你使用 POJO 类，从而为你的流程添加更多业务逻辑并获得更多控制权。\n\
    \n打开 `com.apress.messaging.config.SimpleAnnotationConfiguration` 类。参见代码清单 8-5。\n\
    \n```\n@Configuration\npublic class SimpleAnnotationConfiguration {\n@Bean\npublic\
    \ MessageChannel input(){\nreturn new DirectChannel();\n}\n@Bean\npublic MessageChannel\
    \ toTransform(){\nreturn new DirectChannel();\n}\n@Bean\npublic MessageChannel\
    \ toLog(){\nreturn new DirectChannel();\n}\n}\n@MessageEndpoint\nclass SimpleFilter\
    \ {\n@Filter(inputChannel=\"input\",outputChannel=\"toTransform\")\npublic boolean\
    \ process(String message){\nreturn \"World\".equals(message);\n}\n}\n@MessageEndpoint\n\
    class SimpleTransformer{\n@Transformer(inputChannel=\"toTransform\",outputChannel=\"\
    toLog\")\npublic String process(String message){\nreturn \"Hello \".concat(message);\n\
    }\n}\n@MessageEndpoint\nclass SimpleServiceActivator{\n@ServiceActivator(inputChannel=\"\
    toLog\")\npublic void process(String message){\n}\n}\n代码清单 8-5.\ncom.apress.messaging.config.SimpleAnnotationConfiguration.java\n\
    ```\n\n代码清单 8-5 向你展示了相同的流程，但现在使用了集成注解。让我们详细看一下：\n\n*   `MessageChannel`：这是一个定义了发送消息方法的接口。\n\
    *   `DirectChannel`：这是一个消息通道，它为每条发送的消息调用单个订阅者。当你不需要消息队列时，通常会使用它。\n*   `@MessageEndpoint`：这是一个有用的注解，用于将类标记为端点。\n\
    *   `@Filter`：此注解将方法标记为执行消息过滤器的功能。通常你需要返回一个布尔值。\n*   `@Transformer`：此注解将方法标记为执行转换消息、其标头或有效负载的功能。\n\
    *   `@ServiceActivator`：此注解将方法标记为能够处理消息。在此示例中，我们只是结束了流程。由于此示例中包含的 AOP 日志，你将看到此方法的一些输出。\n\
    \n要运行此示例，只需注释掉主类中的 `@ImportResource` 注解即可。你应该会看到类似于图 8-5 所示的日志。\n\n![A337882_1_En_8_Fig5_HTML.jpg](img/A337882_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5.\n\n此示例的应用程序日志\n\n图 8-5 向你展示了配置暴露过滤器、转换器和服务激活器端点的每个步骤的日志。我在这里使用了单独的类，但你当然可以只使用一个类，并通过它们自己的注解暴露所有方法。\n\
    \n#### 使用 Java 配置\n\n使用 Java 配置与你刚才所做的非常相似，因此你可以简单地更改流程的最后一部分。注释掉 `SimpleServiceActivator`\
    \ 消息端点，并将以下代码添加到 `SimpleAnnotationConfiguration` 类的末尾：\n\n```\n@Bean\n@ServiceActivator(inputChannel\
    \ = \"toLog\")\npublic LoggingHandler logging() {\nLoggingHandler adapter = new\n\
    LoggingHandler(LoggingHandler.Level.INFO);\nadapter.setLoggerName(\"SIMPLE_LOGGER\"\
    );\nadapter.setLogExpressionString\n(\"headers.id + ': ' + payload\");\nreturn\
    \ adapter;\n}\n```\n\n这段代码将创建一个 `LoggingHandler`（这与 XML 从 `logging-channel-adapter`\
    \ 标签生成的对象相同）。它将记录带有标头 ID 和有效负载的 `SIMPLE_LOGGER` 消息，在本例中为 `\"Hello World\"` 消息。现在尝试发送不同的单词，看看过滤器是否工作，或者尝试更改转换器。\n\
    \n我知道这是一个简单的示例，但它应该能让你了解 Spring Integration 的工作原理以及如何配置它。客户经常询问是否可以混合配置。当然可以！你很快就会看到这样的示例。\n\
    \n### 文件集成示例\n\n接下来，让我们看看如何集成文件读取，这是集成系统的一项非常常见的任务。请记住，这是最常见的用例之一。首先打开 `com.apress.messaging.config.SpiFileConfiguration`\
    \ 类。它应该看起来像代码清单 8-6。\n\n```\n@Configuration\n@EnableConfigurationProperties(SpiProperties.class)\n\
    public class SpiFileConfigutation {\nprivate SpiProperties props;\nprivate PersonConverter\
    \ personConverter;\npublic SpiFileConfigutation(SpiProperties props,\nPersonConverter\
    \ personConverter){\nthis.props = props;\nthis.personConverter = personConverter;\n\
    }\n@Bean\npublic IntegrationFlow fileFlow(){\nreturn IntegrationFlows\n.from(Files.inboundAdapter(new\
    \ File\n(this.props.getDirectory())\n.preventDuplicates(true)\n.patternFilter(\n\
    this.props.getFilePattern()),\ne -> e.poller(Pollers.fixedDelay(5000L)))\n.split(Files.splitter().markers())\n\
    .filter(p -> !(p instanceof FileSplitter.FileMarker))\n.transform(Transformers.converter(personConverter))\n\
    .handle(\"simpleMessageHandler\",\"process\")\n.get();\n}\n}\n代码清单 8-6.\ncom.apress.messaging.config.SpiFileConfiguration.java\n\
    ```\n\n代码清单 8-6 向我们展示了在此示例中将使用的集成流程。此流程读取文件内容（来自文件系统），将内容转换为对象（在本例中转换为 `Person`\
    \ 对象），并处理消息以执行任何额外的逻辑。让我们详细分析这个过程：\n\n*   `from`：这是一个重载方法，通常在其中传递 `MessageSource`。在本例中，我们传递了两个值——`Files.inboundAdapter`\
    \ 和一个接收 `SourcePollingChannelAdapterSpec` 的 `Consumer`。在这里，我们使用 Lambda 表达式，通过\
    \ `Pollers` 类每五秒轮询一次文件系统以查找新文件。\n*   `Files`：这是一个开箱即用的协议适配器。你只需要配置它。此适配器用于从文件系统获取文件。`Files`\
    \ 类属于 Spring Integration Java DSL，并提供了几个有用的方法：\n    *   `inboundAdapter`：此适配器包含一个流畅的\
    \ API，返回一个 `FileInboundChannelAdapterSpec`，它具有如下方法：\n        *   `preventDuplicates`：通过将此设置为\
    \ `true`，可以避免多次读取同一个文件。\n        *   `patternFilter`：这将有助于查找具有特定名称模式的文件。在此示例中，我们仅从目录（来自\
    \ `apress.spi.directory` 属性值）读取，并根据模式（来自 `apress.spi.file-pattern` 属性值）读取名称，两者均来自\
    \ `SpiProperties` 类。\n*   `split`：此方法调用指示参数（可以是 bean、服务、处理器等）可以拆分为单个消息或消息有效负载，并生成多个消息或有效负载。在本例中，我们使用一个\
    \ `FileMarker`，它在顺序文件处理过程中界定文件数据。\n*   `filter`：因为我们使用标记来查看每条消息的开始和结束，所以我们将接收文件内容作为\
    \ `FileMarker` 开始，然后是实际内容，最后是 `FileMarker` 结束。这就是为什么我们说，只传递有效负载或内容给我，而不是标记。\n\
    *   `transform`：这里我们使用一个 `Transformers` 类来转换消息。这里我们使用一个自定义转换器，你可以在 `com.apress.messaging.integration.PersonConverter.java`\
    \ 类中查看其代码。\n*   `handle`：这里我们使用一个类来处理消息，通过将 bean 的名称（`simpleMessageHandler`）和将负责处理的方法（`process`；你可以在\
    \ `com.apress.messaging.integration.SimpleMessageHandler.java` 类中查看代码）作为第一个参数传递。`SimpleMessageHandler`\
    \ 类只是一个标记了 `@Component` 注解的 POJO。\n\n注意\n"
- fmt: "# Spring Integration Java DSL 协议适配器\n\n`Spring Integration Java DSL`目前支持以下协议适配器类：`Amqp`、`Jms`、`Files`、`Sftp`、`Ftp`、`Http`、`Kafka`、`Mail`、`Scripts`和`Feed`。这些类位于`org.springframework.integration.dsl.*`包中。\n\
    \n要运行代码，只需将以下代码添加到主类中。我们将注释掉一些之前的语句。代码应如下所示：\n\n```\n@EnableIntegration\n@SpringBootApplication\n\
    public class SpiDemoApplication {\npublic static void main(String[] args) {\n\
    new SpringApplicationBuilder(SpiDemoApplication.class)\n.web(false)\n.run(args);\n\
    }\n}\n```\n\n在运行此示例之前，请确保您拥有`contacts.txt`文件，该文件包含姓名、出生日期、电话、电子邮件和好友（一个布尔类型，用于标识此人是否为朋友）数据。运行后，您应该会看到类似于图[8-6](#A337882_1_En_8_Chapter.html#Fig6)所示的输出。\n\
    \n![A337882_1_En_8_Fig6_HTML.jpg](A337882_1_En_8_Fig6_HTML.jpg)\n\n**图 8-6.**\
    \ 应用程序日志\n\n如您所见，这是一种非常简单的与文件集成的方式，通过读取文件内容并对数据执行业务逻辑。\n\n还记得我之前告诉过您，您可以混合使用配置`Spring\
    \ Integration`的多种方式吗？如果您想使用注解来处理消息，需要做什么？您可以在配置（`SpiFileConfiguration`类）中使用`@ServiceActivator`注解：\n\
    \n```\n@ServiceActivator(inputChannel=\"input\")\npublic void process(Person message){\n\
    }\n```\n\n要使用此服务激活器方法，您需要更改流程。只需将以下行：\n\n```\nhandle(\"simpleMessageHandler\"\
    ,\"process\")\n```\n\n替换为：\n\n```\n.channel(\"input\")\n```\n\n如果您重新运行示例，将获得相同的结果。请注意，没有定义`input`通道。最棒的是，`Spring\
    \ Integration`会推断出您需要此通道，并在后台为您创建一个。\n\n## 文件和 JDBC 集成示例\n\n延续上一个示例，本示例演示如何将内容直接保存到数据库中，这也是一个常见的集成用例。打开`com.apress.messaging.config.SpiFileToJdbcConfiguration`类，如清单[8-7](#A337882_1_En_8_Chapter.html#Par96)所示。\n\
    \n```\n@Configuration\n@EnableConfigurationProperties(SpiProperties.class)\npublic\
    \ class SpiFileToJdbcConfiguration {\nprivate SpiProperties props;\nprivate PersonConverter\
    \ personConverter;\npublic SpiFileToJdbcConfigutation(\nSpiProperties props,\n\
    PersonConverter personConverter){\nthis.props = props;\nthis.personConverter =\
    \ personConverter;\n}\n@Bean\npublic IntegrationFlow fileToJdbcFlow(){\nreturn\
    \ IntegrationFlows\n.from(Files.inboundAdapter(\nnew File(this.props.getDirectory()))\n\
    .preventDuplicates(true)\n.patternFilter(\nthis.props.getFilePattern()),\ne ->\
    \ e.poller(Pollers.fixedDelay(5000L)))\n.split(Files.splitter().markers())\n.filter(p\
    \ -> !(p instanceof FileSplitter.FileMarker))\n.transform(Transformers.converter(personConverter))\n\
    .filter(\"payload.isFriend()\")\n.channel(\"input\")\n.get();\n}\n}\n**清单 8-7.**\
    \ `com.apress.messaging.config.SpiFileToJdbcConfiguration.java`\n```\n\n清单[8-7](#A337882_1_En_8_Chapter.html#Par96)向您展示了新的集成流程，它将读取相同的`contacts.txt`文件。在转换为`Person`对象后，我们添加了一个额外的过滤器，只有是朋友的`Person`才会持久化到数据库中。如果您在应用过滤器后查看，我们会将其发送到另一个名为`input`的通道。\n\
    \n请记住，您可以混合使用编程集成流程的方式。在编写本书时，我们使用的是`Spring Integration Java DSL`的 v1.2.1.RELEASE\
    \ 版本，到目前为止，`Spring Integration`团队尚未实现`JDBC`协议适配器。但别担心，我们将使用`XML`将此信息保存到数据库。打开`src/main/resources/META-INF/spring/integration/spi-file-to-jdbc.xml`文件。参见清单[8-8](#A337882_1_En_8_Chapter.html#Par99)。\n\
    \n```\n**清单 8-8.** `spi-file-to-jdbc.xml`文件\n```\n\n清单[8-8](#A337882_1_En_8_Chapter.html#Par99)显示了`XML`配置。让我们分析一下：\n\
    \n*   `<int-jdbc:outbound-channel-adapter/>`：这是一个`JDBC`协议适配器，此标签用于所有出站`JDBC`操作。它具有不同的属性：\n\
    \    *   `data-source`：此属性引用一个`DataSource`。`DataSource`包含您要连接的数据库的所有必要信息，包括`URL`、用户名、密码和驱动程序。在这种情况下，我们引用了一个名为`dataSource`的\
    \ bean，但这个 bean 在哪里定义？这就是`Spring Boot`的美妙之处，您无需声明它。如果您查看`pom.xml`文件，您会发现其中一个依赖项是`H2`数据库引擎。这意味着`Spring\
    \ Boot`（因为它是一个固执己见的运行时）会将`H2`（内存数据库）配置为默认数据库。\n    *   `channel`：此属性是消息来源的输入通道。在本例中，它是一个`Person`对象。\n\
    \    *   `query`：此属性是当`Person`对象到达时将执行的`SQL`语句，如果您仔细查看，我们将`Person`对象引用为有效负载。\n\
    \n接下来，让我们看看如何将此配置添加到集成流程中。您已经知道如何操作。打开`com.apress.messaging.SpiDemoApplication`类。参见清单[8-9](#A337882_1_En_8_Chapter.html#Par106)。\n\
    \n```\n@ImportResource(\"META-INF/spring/integration/spi-file-to-jdbc.xml\")\n\
    @EnableIntegration\n@SpringBootApplication\npublic class SpiDemoApplication {\n\
    public static void main(String[] args) {\nnew SpringApplicationBuilder(SpiDemoApplication.class)\n\
    .web(true)\n.run(args);\n}\n}\n**清单 8-9.** `com.apress.messaging.SpiDemoApplication.java`\n\
    ```\n\n清单[8-9](#A337882_1_En_8_Chapter.html#Par106)向您展示了主应用程序的版本，正如您已经知道的，我们需要使用`@ImportResource`注解来包含`XML`配置。这次我们将启用\
    \ web，因为`H2`引擎提供了`/h2-console`映射，以便我们可以查看数据库和表。\n\n如果您运行应用程序，您将看到通常的日志。在浏览器中查看`http://localhost:8080/h2-console`。参见图[8-7](#A337882_1_En_8_Chapter.html#Fig7)和图[8-8](#A337882_1_En_8_Chapter.html#Fig8)。\n\
    \n![A337882_1_En_8_Fig8_HTML.jpg](A337882_1_En_8_Fig8_HTML.jpg)\n\n**图 8-8.**\
    \ `/h2-console`、表和查询视图\n\n![A337882_1_En_8_Fig7_HTML.jpg](A337882_1_En_8_Fig7_HTML.jpg)\n\
    \n**图 8-7.** `/h2-console`端点\n\n图[8-7](#A337882_1_En_8_Chapter.html#Fig7)显示了`/h2-console`端点。`Spring\
    \ Boot`默认创建`testdb`并在内存中运行，这就是为什么您看到的`URL`是`jdbc:h2:mem:testdb`。\n\n图[8-8](#A337882_1_En_8_Chapter.html#Fig8)显示了`Person`表。如果您执行`SELECT\
    \ * FROM PERSON` SQL 语句，您将得到该结果。现在您只有来自`contacts.txt`中是朋友的人（请记住我们添加到流程中的额外过滤器）。\n\
    \n还有一个问题：`Spring Boot`是如何告诉`H2`引擎创建名为`Person`的表的？嗯，在某些时候，我们需要给`Spring Boot`一点帮助。如果`Spring\
    \ Boot`在类路径中找到名为`data.sql`或`schema.sql`的文件，它将尝试处理这些文件。在项目中，您将找到定义表的`schema.sql`文件。"
  raw: "The Spring Integration Java DSL currently supports the following protocol\
    \ adapter classes: `Amqp`, `Jms`, `Files`, `Sftp`, `Ftp`, `Http`, `Kafka`, `Mail`,\
    \ `Scripts`, and `Feed`. These classes are in the `org.springframework.integration.dsl.*`\
    \ package.\n\nTo run the code, just add the following code to your main class.\
    \ We are going to comment out some of the past statements . It should look like\
    \ this code:\n\n```\n@EnableIntegration\n@SpringBootApplication\npublic class\
    \ SpiDemoApplication {\npublic static void main(String[] args) {\nnew SpringApplicationBuilder(SpiDemoApplication.class)\n\
    .web(false)\n.run(args);\n}\n}\n```\n\nBefore you run this example, make sure\
    \ you have the `contacts.txt` file, which contains the name, date of birth, phone,\
    \ e-mail, and friends (a Boolean type to identify if this person is a friend)\
    \ data. Once you run it, you should have something similar to the output shown\
    \ in Figure [8-6](#A337882_1_En_8_Chapter.html#Fig6).\n\n![A337882_1_En_8_Fig6_HTML.jpg](A337882_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6.\n\nApplication logs\n\nAs you can see, this is a very simple way\
    \ to use integration with files, by reading its content and doing business logic\
    \ with the data.\n\nRemember that previously I told you that you can mix some\
    \ of the ways you configure Spring Integration? What do you need to do if you\
    \ want to use an annotation to handle the message? You can use the `@ServiceActivator`\
    \ annotation as part of the configuration (in the `SpiFileConfiguration` class):\n\
    \n```\n@ServiceActivator(inputChannel=\"input\")\npublic void process(Person message){\n\
    }\n```\n\nTo use this service activator method, you need to change the flow. Just\
    \ replace this line:\n\n```\nhandle(\"simpleMessageHandler\",\"process\")\n```\n\
    \nWith this one:\n\n```\n.channel(\"input\")\n```\n\nIf you rerun the example,\
    \ you will get the same results. Note that there is no `input` channel defined.\
    \ The best part is that Spring Integration figures out that you need this channel\
    \ and creates one behind the scenes for you.\n\n### File and JDBC Integration\
    \ Example\n\nFollowing the previous example, this example shows how to save the\
    \ content directly into a database, which is also a common integration use case.\
    \ Open the `com.apress.messaging.config.SpiFileToJdbcConfiguration` class shown\
    \ in Listing [8-7](#A337882_1_En_8_Chapter.html#Par96).\n\n```\n@Configuration\n\
    @EnableConfigurationProperties(SpiProperties.class)\npublic class SpiFileToJdbcConfiguration\
    \ {\nprivate SpiProperties props;\nprivate PersonConverter personConverter;\n\
    public SpiFileToJdbcConfigutation(\nSpiProperties props,\nPersonConverter personConverter){\n\
    this.props = props;\nthis.personConverter = personConverter;\n}\n@Bean\npublic\
    \ IntegrationFlow fileToJdbcFlow(){\nreturn IntegrationFlows\n.from(Files.inboundAdapter(\n\
    new File(this.props.getDirectory()))\n.preventDuplicates(true)\n.patternFilter(\n\
    this.props.getFilePattern()),\ne -> e.poller(Pollers.fixedDelay(5000L)))\n.split(Files.splitter().markers())\n\
    .filter(p -> !(p instanceof FileSplitter.FileMarker))\n.transform(Transformers.converter(personConverter))\n\
    .filter(\"payload.isFriend()\")\n.channel(\"input\")\n.get();\n}\n}\nListing 8-7.\n\
    com.apress.messaging.config.SpiFileToJdbcConfiguration.java\n```\n\nListing [8-7](#A337882_1_En_8_Chapter.html#Par96)\
    \ shows you the new integration flow that will read the same `contacts.txt` file.\
    \ After it is transformed into a `Person` object, we add an extra filter, where\
    \ only the `Person` that is a friend will persist into the database. If you take\
    \ a look after the filter is applied, we are sending it to another channel, called\
    \ `input`.\n\nRemember that you can mix ways of programming your integration flows.\
    \ While writing this book, we had version v1.2.1.RELEASE of the Spring Integration\
    \ Java DSL and, so far, the Spring Integration team hasn’t implemented the JDBC\
    \ protocol adapter. But don’t worry, we are going to use XML to save this information\
    \ to the database. Open the `src/main/resources/META-INF/spring/integration/spi-file-to-jdbc.xml`\
    \ file. See Listing [8-8](#A337882_1_En_8_Chapter.html#Par99).\n\n```\nListing\
    \ 8-8.\nThe spi-file-to-jdbc.xml File\n```\n\nListing [8-8](#A337882_1_En_8_Chapter.html#Par99)\
    \ shows the XML configuration. Let’s analyze it:\n\n*   `<int-jdbc:outbound-channel-adapter/>`:\
    \ This is a JDBC protocol adapter, and this tag is used for all the outgoing JDBC\
    \ operations. It has different attributes:\n    *   `data-source` : This attribute\
    \ references a `DataSource`. The `DataSource` includes all the necessary information\
    \ about the database you want to connect to, including the URL, username, password,\
    \ and driver. In this case, we are referencing a bean named `dataSource`, but\
    \ where is this bean defined? That’s the beauty of Spring Boot, you don’t need\
    \ to declare it. If you look at the `pom.xml` file, you will find that one of\
    \ these dependencies is the H2 database engine. This means that Spring Boot (because\
    \ it’s an opinionated runtime) will configure the H2 (in-memory database) as the\
    \ default database.\n    *   `channel` : This attribute is the input channel where\
    \ the message is coming from. In this case, it’s a `Person` object.\n    *   `query`\
    \ : This attribute is SQL statement that will be executed when the `Person` object\
    \ arrives, and if you take a closer look, we are referencing the `Person` object\
    \ as the payload.\n\nNext, let’s see how we are going to add this configuration\
    \ to the integration flow . You already know how. Open the `com.apress.messaging.SpiDemoApplication`\
    \ class. See Listing [8-9](#A337882_1_En_8_Chapter.html#Par106).\n\n```\n@ImportResource(\"\
    META-INF/spring/integration/spi-file-to-jdbc.xml\")\n@EnableIntegration\n@SpringBootApplication\n\
    public class SpiDemoApplication {\npublic static void main(String[] args) {\n\
    new SpringApplicationBuilder(SpiDemoApplication.class)\n.web(true)\n.run(args);\n\
    }\n}\nListing 8-9.\ncom.apress.messaging.SpiDemoApplication.java\n```\n\nListing\
    \ [8-9](#A337882_1_En_8_Chapter.html#Par106) shows you version of the main application,\
    \ and as you knew already, we need to use the `@ImportResource` annotation to\
    \ include the XML configuration. This time we are going to enable the web, because\
    \ the H2 engine provides the `/h2-console` mapping so that we can take a peek\
    \ at the database and tables.\n\nIf you run the application, you will see the\
    \ usual logs. Take a look at the `http://localhost:8080/h2-console` in your browser.\
    \ See Figures [8-7](#A337882_1_En_8_Chapter.html#Fig7) and [8-8](#A337882_1_En_8_Chapter.html#Fig8).\n\
    \n![A337882_1_En_8_Fig8_HTML.jpg](A337882_1_En_8_Fig8_HTML.jpg)\n\nFigure 8-8.\n\
    \nThe /h2-console, table, and query view\n\n![A337882_1_En_8_Fig7_HTML.jpg](A337882_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7.\n\nThe /h2-console endpoint\n\nFigure [8-7](#A337882_1_En_8_Chapter.html#Fig7)\
    \ shows the `/h2-console` endpoint. Spring Boot creates `testdb` by default and\
    \ in memory, which is why you have the URL as `jdbc:h2:mem:testdb`.\n\nFigure\
    \ [8-8](#A337882_1_En_8_Chapter.html#Fig8) shows the `Person` table. If you run\
    \ the `SELECT * FROM PERSON` SQL statement, you will get that result. You now\
    \ have only the people from the `contacts.txt` that are friends (just remember\
    \ the extra filter we added to the flow).\n\nOne question remains: How did Spring\
    \ Boot tell the H2 engine to create the table called `Person`? Well, at some point\
    \ we need to give Spring Boot a little help. If Spring Boot finds in the classpath\
    \ a file with the name `data.sql` or `schema.sql`, it will try to process these\
    \ files. In the project, you will find the `schema.sql` file, which defines the\
    \ table."
  trans: "\nSpring Integration Java DSL 目前支持以下协议适配器类：`Amqp`、`Jms`、`Files`、`Sftp`、`Ftp`、`Http`、`Kafka`、`Mail`、`Scripts`\
    \ 和 `Feed`。这些类位于 `org.springframework.integration.dsl.*` 包中。\n\n要运行代码，只需将以下代码添加到你的主类中。我们将注释掉之前的一些语句。代码应如下所示：\n\
    \n```\n@EnableIntegration\n@SpringBootApplication\npublic class SpiDemoApplication\
    \ {\npublic static void main(String[] args) {\nnew SpringApplicationBuilder(SpiDemoApplication.class)\n\
    .web(false)\n.run(args);\n}\n}\n```\n\n在运行此示例之前，请确保你拥有 `contacts.txt` 文件，该文件包含姓名、出生日期、电话、电子邮件和好友（一个布尔类型，用于标识此人是否为朋友）数据。运行后，你将看到类似于图\
    \ 8-6 所示的输出。\n\n![A337882_1_En_8_Fig6_HTML.jpg](img/A337882_1_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6.\n\n应用程序日志\n\n如你所见，这是一种非常简单的与文件集成的方式，通过读取文件内容并对数据执行业务逻辑。\n\n还记得我之前告诉过你，你可以混合使用多种配置\
    \ Spring Integration 的方式吗？如果你想使用注解来处理消息，该怎么做？你可以使用 `@ServiceActivator` 注解作为配置的一部分（在\
    \ `SpiFileConfiguration` 类中）：\n\n```\n@ServiceActivator(inputChannel=\"input\"\
    )\npublic void process(Person message){\n}\n```\n\n要使用这个服务激活器方法，你需要修改流程。只需将这一行：\n\
    \n```\nhandle(\"simpleMessageHandler\",\"process\")\n```\n\n替换为：\n\n```\n.channel(\"\
    input\")\n```\n\n如果你重新运行示例，将得到相同的结果。请注意，这里并没有定义 `input` 通道。最棒的是，Spring Integration\
    \ 会自动识别出你需要这个通道，并在后台为你创建一个。\n\n### 文件与 JDBC 集成示例\n\n延续上一个示例，本示例展示了如何将内容直接保存到数据库中，这也是一个常见的集成用例。打开清单\
    \ 8-7 中所示的 `com.apress.messaging.config.SpiFileToJdbcConfiguration` 类。\n\n```\n\
    @Configuration\n@EnableConfigurationProperties(SpiProperties.class)\npublic class\
    \ SpiFileToJdbcConfiguration {\nprivate SpiProperties props;\nprivate PersonConverter\
    \ personConverter;\npublic SpiFileToJdbcConfigutation(\nSpiProperties props,\n\
    PersonConverter personConverter){\nthis.props = props;\nthis.personConverter =\
    \ personConverter;\n}\n@Bean\npublic IntegrationFlow fileToJdbcFlow(){\nreturn\
    \ IntegrationFlows\n.from(Files.inboundAdapter(\nnew File(this.props.getDirectory()))\n\
    .preventDuplicates(true)\n.patternFilter(\nthis.props.getFilePattern()),\ne ->\
    \ e.poller(Pollers.fixedDelay(5000L)))\n.split(Files.splitter().markers())\n.filter(p\
    \ -> !(p instanceof FileSplitter.FileMarker))\n.transform(Transformers.converter(personConverter))\n\
    .filter(\"payload.isFriend()\")\n.channel(\"input\")\n.get();\n}\n}\n清单 8-7.\n\
    com.apress.messaging.config.SpiFileToJdbcConfiguration.java\n```\n\n清单 8-7 向你展示了新的集成流程，它将读取相同的\
    \ `contacts.txt` 文件。在将其转换为 `Person` 对象后，我们添加了一个额外的过滤器，只有是朋友的 `Person` 才会持久化到数据库中。如果你在应用过滤器后查看，我们会将其发送到另一个名为\
    \ `input` 的通道。\n\n请记住，你可以混合使用多种方式来编写集成流程。在编写本书时，我们使用的是 Spring Integration Java\
    \ DSL 的 v1.2.1.RELEASE 版本，到目前为止，Spring Integration 团队尚未实现 JDBC 协议适配器。但别担心，我们将使用\
    \ XML 将这些信息保存到数据库中。打开 `src/main/resources/META-INF/spring/integration/spi-file-to-jdbc.xml`\
    \ 文件。参见清单 8-8。\n\n```\n清单 8-8.\nspi-file-to-jdbc.xml 文件\n```\n\n清单 8-8 展示了 XML\
    \ 配置。我们来分析一下：\n\n*   `<int-jdbc:outbound-channel-adapter/>`：这是一个 JDBC 协议适配器，该标签用于所有出站\
    \ JDBC 操作。它具有不同的属性：\n    *   `data-source`：此属性引用一个 `DataSource`。`DataSource` 包含你要连接的数据库的所有必要信息，包括\
    \ URL、用户名、密码和驱动程序。在此例中，我们引用了一个名为 `dataSource` 的 bean，但这个 bean 在哪里定义的呢？这就是 Spring\
    \ Boot 的美妙之处，你无需声明它。如果你查看 `pom.xml` 文件，会发现其中一个依赖项是 H2 数据库引擎。这意味着 Spring Boot（因为它是一个有主见的运行时）会将\
    \ H2（内存数据库）配置为默认数据库。\n    *   `channel`：此属性是消息来源的输入通道。在此例中，它是一个 `Person` 对象。\n\
    \    *   `query`：此属性是当 `Person` 对象到达时将执行的 SQL 语句，如果你仔细看，我们是将 `Person` 对象作为有效负载引用的。\n\
    \n接下来，让我们看看如何将此配置添加到集成流程中。你已经知道怎么做了。打开 `com.apress.messaging.SpiDemoApplication`\
    \ 类。参见清单 8-9。\n\n```\n@ImportResource(\"META-INF/spring/integration/spi-file-to-jdbc.xml\"\
    )\n@EnableIntegration\n@SpringBootApplication\npublic class SpiDemoApplication\
    \ {\npublic static void main(String[] args) {\nnew SpringApplicationBuilder(SpiDemoApplication.class)\n\
    .web(true)\n.run(args);\n}\n}\n清单 8-9.\ncom.apress.messaging.SpiDemoApplication.java\n\
    ```\n\n清单 8-9 展示了主应用程序的版本，正如你已经知道的，我们需要使用 `@ImportResource` 注解来包含 XML 配置。这次我们将启用\
    \ Web，因为 H2 引擎提供了 `/h2-console` 映射，这样我们就可以查看数据库和表。\n\n如果你运行应用程序，将看到通常的日志。在浏览器中查看\
    \ `http://localhost:8080/h2-console`。参见图 8-7 和图 8-8。\n\n![A337882_1_En_8_Fig8_HTML.jpg](img/A337882_1_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8.\n\n/h2-console、表和查询视图\n\n![A337882_1_En_8_Fig7_HTML.jpg](img/A337882_1_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7.\n\n/h2-console 端点\n\n图 8-7 展示了 `/h2-console` 端点。Spring Boot 默认在内存中创建\
    \ `testdb`，这就是为什么你的 URL 是 `jdbc:h2:mem:testdb`。\n\n图 8-8 展示了 `Person` 表。如果你执行\
    \ `SELECT * FROM PERSON` SQL 语句，将得到该结果。现在你只有来自 `contacts.txt` 中标记为朋友的人（请记住我们在流程中添加的额外过滤器）。\n\
    \n还有一个问题：Spring Boot 是如何告诉 H2 引擎创建名为 `Person` 的表的？嗯，在某些时候，我们需要给 Spring Boot 一点帮助。如果\
    \ Spring Boot 在类路径中找到名为 `data.sql` 或 `schema.sql` 的文件，它将尝试处理这些文件。在项目中，你会找到定义该表的\
    \ `schema.sql` 文件。\n"
- fmt: "### AMQP Integration Example\n\nRemember in a previous chapter, we created\
    \ a producer and consumer using RabbitMQ. In this section, I show you how to use\
    \ the AMQP protocol adapters from Spring Integration. These adapters are already\
    \ acting as a producer and consumer. If you need to create a messaging system\
    \ that involves AMQP, you can use these adapters and they will give you all the\
    \ flexibility to build a production-ready integration solution. The next example\
    \ uses the `Rate` domain object to send rates to the queue.\n\nOpen the `com.apress.messaging.config.RateConfig`\
    \ class. See Listing [8-10](#A337882_1_En_8_Chapter.html#Par114).\n\n```java\n\
    @Configuration\n@EnableConfigurationProperties(SpiProperties.class)\npublic class\
    \ RateConfig {\n    @Bean\n    public RabbitTemplate rabbitTemplate(ConnectionFactory\
    \ connectionFactory) {\n        RabbitTemplate template = new RabbitTemplate(connectionFactory);\n\
    \        template.setMessageConverter(new Jackson2JsonMessageConverter());\n \
    \       return template;\n    }\n\n    @Bean\n    public Queue rateQueue(@Value(\"\
    ${apress.spi.queue}\") String queue) {\n        return new Queue(queue, true);\n\
    \    }\n\n    @Bean\n    public MessageChannel amqpChannel() {\n        return\
    \ MessageChannels.direct().get();\n    }\n\n    @Bean\n    public IntegrationFlow\
    \ rateFlow(RabbitTemplate rabbitTemplate,\n                                  \
    \  @Value(\"${apress.spi.exchange:}\") String exchange,\n                    \
    \                @Value(\"${apress.spi.queue}\") String queue) {\n        return\
    \ IntegrationFlows\n                .from(\"amqpChannel\")\n                .handle(Amqp\n\
    \                        .outboundAdapter(rabbitTemplate)\n                  \
    \      .exchangeName(exchange)\n                        .routingKey(queue))\n\
    \                .get();\n    }\n}\n```\n\n**Listing 8-10.** `com.apress.messaging.config.RateConfig.java`\n\
    \nListing [8-10](#A337882_1_En_8_Chapter.html#Par114) shows you the `RateConfig`\
    \ class, where we define the integration flow. First, note the familiar objects\
    \ (Java Config for RabbitMQ), like the `RabbitTemplate` that sets the `Jackson2JsonMessageConverter`\
    \ and the queue creation.\n\nThe way the `amqpChannel` bean is created is new.\
    \ I’m using the `MessageChannels` (note the `s` at the end of the class), which\
    \ provides a fluent API for channel creation. In this case, it’s creating a `direct`\
    \ channel.\n\nIn the integration flow, I’m using the `Amqp` (class) protocol adapter.\
    \ In this case, because we are going to send messages, the `outboundAdapter` is\
    \ being used. This adapter will receive the `rabbitTemplate`, the exchange name,\
    \ and the routing key. The producer is the `Amqp.outboundAdapter` protocol adapter.\n\
    \n#### AMQP Producer\n\nBefore you run this example, remember that RabbitMQ needs\
    \ to be up and running. In your main application, add the following code:\n\n\
    ```java\n@Bean\nCommandLineRunner processRate(MessageChannel amqpChannel) {\n\
    \    return args -> {\n        amqpChannel.send(\n            MessageBuilder.withPayload(new\
    \ Rate(\"EUR\", 0.88857F, new Date())).build());\n        amqpChannel.send(\n\
    \            MessageBuilder.withPayload(new Rate(\"JPY\", 102.17F, new Date())).build());\n\
    \        amqpChannel.send(\n            MessageBuilder.withPayload(new Rate(\"\
    MXN\", 19.232F, new Date())).build());\n        amqpChannel.send(\n          \
    \  MessageBuilder.withPayload(new Rate(\"GBP\", 0.75705F, new Date())).build());\n\
    \    };\n}\n```\n\nYou can see from this snippet that we are using the `amqpChannel`\
    \ and sending the `Rate` as a message. If you run it, take a look at your RabbitMQ\
    \ Web Console and see the four messages in JSON format sitting in the `spi.rate`\
    \ queue.\n\n#### AMQP Consumer\n\nIf you need a consumer, you will use `inboundAdapter`.\
    \ You can use the following code in the `RateConfig` class:\n\n```java\n@Bean\n\
    IntegrationFlow incomingRateFlow(ConnectionFactory connectionFactory,\n      \
    \                           @Value(\"${apress.spi.queue}\") String queue) {\n\
    \    return IntegrationFlows\n            .from(Amqp.inboundAdapter(connectionFactory,\
    \ queue)\n                    .messageConverter(new Jackson2JsonMessageConverter()))\n\
    \            .handle(\"simpleMessageHandler\", \"process\")\n            .get();\n\
    }\n```\n\nThis code shows you the consumer, where the `Amqp.inboundAdapter` is\
    \ used, by passing the `connectionFactory`, `queue`, the converter, and its handle\
    \ by the `simpleMessageHandler` bean.\n\n**Note**\n\nIf you are wondering about\
    \ the `ConnectionFactory` reference, remember that Spring Boot will configure\
    \ this automatically. If you want to connect to a remote server, just add the\
    \ `spring.rabbitmq.*` properties in the `application.properties` file.\n\n###\
    \ Currency Exchange Project\n\nBased on what you learned in the previous sections,\
    \ imagine that the currency exchange project will start receiving new rates through\
    \ a file and then will send them to a RabbitMQ queue and to a processed file at\
    \ the same time. How can you implement this feature? You need a way to send a\
    \ message to two recipients.\n\nTry to solve this issue without looking at the\
    \ code. The `rest-api-si` project contains the solutions. You can see the code\
    \ in the `RateSpiConfig` and the `RateServiceActivator` classes. A hint: I used\
    \ the recipient list pattern. For writing out to a file, if I used the `Files.inboundAdapter`,\
    \ what would I use for writing files out?\n\n### Summary\n\nThis chapter covered\
    \ Enterprise Integration patterns and discussed how the Spring Integration module\
    \ gives you all the necessary components to create enterprise-ready and integration\
    \ solutions using Spring Boot.\n\nIt showed you the different ways of programming\
    \ Spring Integration with Spring Boot. It also showed you how to combine XML,\
    \ Java Config, and annotations to create an integrated application.\n\nWhy is\
    \ Spring Integration important? The next chapter shows that the Spring Cloud Stream\
    \ technology is based on Spring Integration and it’s an even easier way to use\
    \ all these components.\n\n# 9. Messaging with Spring Cloud Stream\n\nSo far you\
    \ have seen all the messaging techniques that are available. Using the Spring\
    \ Framework and Spring Boot makes it easy for developers and architects to create\
    \ robust messaging solutions. This chapter takes a new step forward and enters\
    \ into the new Cloud Native Application Development.\n\nThis chapter covers Spring\
    \ Cloud Stream and how this new technology can help you write message-driven microservices\
    \ applications.\n\n### Spring Cloud\n\nBefore I start talking about Spring Cloud\
    \ Stream internals and usage, let’s consider its umbrella project: Spring Cloud.\n\
    \nSpring Cloud is a set of tools that allows developers to create applications\
    \ that use the common patterns in distributed systems, from configuration management,\
    \ to service discovery, circuit breakers, smart routing, micro-proxy, control\
    \ bus, global locks, distributed sessions, service-to-service calls, distributed\
    \ messaging and much more. These distributed patterns are also covered in the\
    \ microservices chapter.\n\nBased on Spring Cloud, we have several projects, including\
    \ Spring Cloud Config, Spring Cloud Netflix, Spring Cloud Bus, Spring Cloud for\
    \ Cloud Foundry, Spring Cloud Cluster, Spring Cloud Stream, Spring Cloud Stream\
    \ App Starters, and more.\n\nIf you want to start right away with any of these\
    \ technologies, you need three things in your `pom.xml` file:\n\n- Add the `<parent/>`\
    \ tag with the `spring-boot-starter-parent`. For example:\n\n```xml\n<parent>\n\
    \    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-parent</artifactId>\n\
    \    <version>1.4.4.RELEASE</version>\n</parent>\n```\n\n- Add the `<dependencyManagement/>`\
    \ tag with a `GA` release. For example:\n\n```xml\n<dependencyManagement>\n  \
    \  <dependencies>\n        <dependency>\n            <groupId>org.springframework.cloud</groupId>\n\
    \            <artifactId>spring-cloud-dependencies</artifactId>\n            <version>Camden.SR5</version>\n\
    \            <type>pom</type>\n            <scope>import</scope>\n        </dependency>\n\
    \    </dependencies>\n</dependencyManagement>\n```\n\n- Add the technologies you\
    \ want to use in the `<dependencies/>` tag. For example:\n\n```xml\n<dependency>\n\
    \    <groupId>org.springframework.cloud</groupId>\n    <artifactId>spring-cloud-starter-stream-rabbit</artifactId>\n\
    </dependency>\n```\n\nIf you take a deep look into the `pom.xml` file of a Spring\
    \ Cloud annotation, you will see that the name convention is now `spring-cloud-starter-<technology\
    \ to use>`. Also note that we added a dependency management tag that allows us\
    \ to deal with all transitive dependencies and library version management."
  raw: "### AMQP Integration Example\n\nRemember in a previous chapter, we created\
    \ a producer and consumer using RabbitMQ . In this section, I show you how to\
    \ use the AMQP protocol adapters from Spring Integration. These adapters are already\
    \ acting as a producer and consumer. If you need to create a messaging system\
    \ that involves AMQP, you can use these adapters and they will give you all the\
    \ flexibility to build a production-ready integration solution. The next example\
    \ uses the `Rate` domain object to send rates to the queue.\n\nOpen the `com.apress.messaging.config.RateConfig`\
    \ class. See Listing [8-10](#A337882_1_En_8_Chapter.html#Par114).\n\n```\n@Configuration\n\
    @EnableConfigurationProperties(SpiProperties.class)\npublic class RateConfig {\n\
    @Bean\npublic RabbitTemplate rabbitTemplate(\nConnectionFactory connectionFactory){\n\
    RabbitTemplate template = new\nRabbitTemplate(connectionFactory);\ntemplate.setMessageConverter(\n\
    new Jackson2JsonMessageConverter());\nreturn template;\n}\n@Bean\npublic Queue\
    \ rateQueue(@Value(\"${apress.spi.queue}\")\nString queue){\nreturn new Queue(queue,true);\n\
    }\n@Bean\npublic MessageChannel amqpChannel() {\nreturn MessageChannels.direct().get();\n\
    }\n@Bean\npublic IntegrationFlow rateFlow(\nRabbitTemplate rabbitTemplate, @Value(\"\
    ${apress.spi.exchange:}\") String exchange,\n@Value(\"${apress.spi.queue}\") String\
    \ queue){\nreturn IntegrationFlows\n.from(\"amqpChannel\")\n.handle(Amqp\n.outboundAdapter(rabbitTemplate)\n\
    .exchangeName(exchange)\n.routingKey(queue))\n.get();\n}\n}\nListing 8-10.\ncom.apress.messaging.config.RateConfig.java\n\
    ```\n\nListing [8-10](#A337882_1_En_8_Chapter.html#Par114) shows you the `RateConfig`\
    \ class , where we define the integration flow. First, note the familiar objects\
    \ (Java Config for RabbitMQ ), like the `RabbitTemplate` that sets the `Jackson2JsonMessageConverter`\
    \ and the queue creation.\n\nThe way the `amqpChannel` bean is created is new.\
    \ I’m using the `MessageChannels` (note the `s` at the end of the class), which\
    \ provides a fluent API for channel creation. In this case, it’s creating a `direct`\
    \ channel.\n\nIn the integration flow, I’m using the `Amqp` (class) protocol adapter.\
    \ In this case, because we are going to send messages, the `outboundAdapter` is\
    \ being used. This adapter will receive the `rabbitTemplate`, the exchange name,\
    \ and the routing key. The producer is the `Amqp.outboundAdapter` protocol adapter.\n\
    \n#### AMQP Producer\n\nBefore you run this example, remember that RabbitMQ needs\
    \ to be up and running. In your main application, add the following code:\n\n\
    ```\n@Bean\nCommandLineRunner processRate(MessageChannel amqpChannel){\nreturn\
    \ args -> {\namqpChannel.send(\nMessageBuilder.withPayload(new Rate(\"EUR\",0.88857F,new\
    \ Date())).build());\namqpChannel.send(\nMessageBuilder.withPayload(new Rate(\"\
    JPY\",102.17F,new Date())).build());\namqpChannel.send(\nMessageBuilder.withPayload(new\
    \ Rate(\"MXN\",19.232F,new Date())).build());\namqpChannel.send(\nMessageBuilder.withPayload(new\
    \ Rate(\"GBP\",0.75705F,new Date())).build());\n};\n}\n```\n\nYou can see from\
    \ this snippet that we are using the `amqpChannel` and sending the `Rate` as a\
    \ message. If you run it, take a look at your RabbitMQ Web Console and see the\
    \ four messages in JSON format sitting in the `spi.rate` queue.\n\n#### AMQP Consumer\n\
    \nIf you need a consumer, you will use `inboundAdapter`. You can use the following\
    \ code in the `RateConfig` class:\n\n```\n@Bean IntegrationFlow incomingRateFlow(\n\
    ConnectionFactory connectionFactory,\n@Value(\"${apress.spi.queue}\") String queue){\n\
    return IntegrationFlows\n.from(Amqp.inboundAdapter(connectionFactory,queue)\n\
    .messageConverter(new Jackson2JsonMessageConverter()))\n.handle(\"simpleMessageHandler\"\
    ,\"process\")\n.get();\n}\n```\n\nThis code shows you the consumer, where the\
    \ `Amqp.inboundAdapter` is used, by passing the `connectionFactory`, `queue`,\
    \ the converter, and its handle by the `simpleMessageHandler` bean.\n\nNote\n\n\
    If you wondering about the `ConnectionFactory` reference, remember that Spring\
    \ Boot will configure this automatically. If you want to connect to a remote server,\
    \ just add the `spring.rabbitmq.*` properties in the `application.properties`\
    \ file.\n\n## Currency Exchange Project\n\nBased on what you learned in the previous\
    \ sections, imagine that the currency exchange project will start receiving new\
    \ rates through a file and then will send them to a RabbitMQ queue and to a processed\
    \ file at the same time. How can you implement this feature? You need a way to\
    \ send a message to two recipients.\n\nTry to solve this issue without looking\
    \ at the code. The `rest-api-si` project contains the solutions. You can see the\
    \ code in the `RateSpiConfig` and the `RateServiceActivator` classes. A hint:\
    \ I used the recipient list pattern. For writing out to a file, if I used the\
    \ `Files.inboundAdapter`, what would I use for writing files out?\n\n## Summary\n\
    \nThis chapter covered Enterprise Integration patterns and discussed how the Spring\
    \ Integration module gives you all the necessary components to create enterprise-ready\
    \ and integration solutions using Spring Boot.\n\nIt showed you the different\
    \ ways of programming Spring Integration with Spring Boot. It also showed you\
    \ how to combine XML, Java Config, and annotations to create an integrated application.\n\
    \nWhy is Spring Integration important? The next chapter shows that the Spring\
    \ Cloud Stream technology is based on Spring Integration and it’s an even easier\
    \ way to use all these components.\n\n# 9. Messaging with Spring Cloud Stream\n\
    \nSo far you have seen all the messaging techniques that are available. Using\
    \ the Spring Framework and Spring Boot makes it easy for developers and architects\
    \ to create robust messaging solutions. This chapter takes a new step forward\
    \ and enters into the new Cloud Native Application Development.\n\nThis chapter\
    \ covers Spring Cloud Stream and how this new technology can help you write message-driven\
    \ microservices applications.\n\n## Spring Cloud\n\nBefore I start talking about\
    \ Spring Cloud Stream internals and usage, let’s consider its umbrella project:\
    \ Spring Cloud.\n\nSpring Cloud is a set of tools that allows developers to create\
    \ applications that use the common patterns in distributed systems, from configuration\
    \ management, to service discovery, circuit breakers, smart routing, micro-proxy,\
    \ control bus, global locks, distributed sessions, service-to-service calls, distributed\
    \ messaging and much more. These distributed patterns are also covered in the\
    \ microservices chapter.\n\nBased on Spring Cloud, we have several projects ,\
    \ including Spring Cloud Config, Spring Cloud Netflix, Spring Cloud Bus, Spring\
    \ Cloud for Cloud Foundry, Spring Cloud Cluster, Spring Cloud Stream, Spring Cloud\
    \ Stream App Starters, and more.\n\nIf you want to start right away with any of\
    \ these technologies, you need three things in your `pom.xml` file :\n\n*   Add\
    \ the `<parent/>` tag with the `spring-boot-starter-parent`. For example:\n\n\
    \    ```\n    org.springframework.boot\n    spring-boot-starter-parent\n    1.4.4.RELEASE\n\
    \n    ```\n\n*   Add the `<dependencyManagement/>` tag with a `GA` release. For\
    \ example:\n\n    ```\n\n    org.springframework.cloud\n    spring-cloud-dependencies\n\
    \    Camden.SR5\n    pom\n    import\n\n    ```\n\n*   Add the technologies you\
    \ want to use in the `<dependencies/>` tag. For example:\n\n    ```\n\n    org.springframework.cloud\n\
    \    spring-cloud-starter-stream-rabbit\n\n    ```\n\nIf you take a deep look\
    \ into the `pom.xml` file of a Spring Cloud annotation, you will see that the\
    \ name convention is now `spring-cloud-starter-<technology to use>`. Also note\
    \ that we added a dependency management tag that allows us to deal with all transitive\
    \ dependencies and library version management."
  trans: "\n### AMQP 集成示例\n\n还记得在之前的章节中，我们使用 RabbitMQ 创建了一个生产者和消费者。在本节中，我将向您展示如何使用\
    \ Spring Integration 中的 AMQP 协议适配器。这些适配器本身已经充当了生产者和消费者的角色。如果您需要创建一个涉及 AMQP 的消息系统，可以使用这些适配器，它们将为您提供构建生产级集成解决方案所需的所有灵活性。接下来的示例使用\
    \ `Rate` 领域对象将汇率发送到队列。\n\n打开 `com.apress.messaging.config.RateConfig` 类。参见清单 8-10。\n\
    \n```\n@Configuration\n@EnableConfigurationProperties(SpiProperties.class)\npublic\
    \ class RateConfig {\n@Bean\npublic RabbitTemplate rabbitTemplate(\nConnectionFactory\
    \ connectionFactory){\nRabbitTemplate template = new\nRabbitTemplate(connectionFactory);\n\
    template.setMessageConverter(\nnew Jackson2JsonMessageConverter());\nreturn template;\n\
    }\n@Bean\npublic Queue rateQueue(@Value(\"${apress.spi.queue}\")\nString queue){\n\
    return new Queue(queue,true);\n}\n@Bean\npublic MessageChannel amqpChannel() {\n\
    return MessageChannels.direct().get();\n}\n@Bean\npublic IntegrationFlow rateFlow(\n\
    RabbitTemplate rabbitTemplate, @Value(\"${apress.spi.exchange:}\") String exchange,\n\
    @Value(\"${apress.spi.queue}\") String queue){\nreturn IntegrationFlows\n.from(\"\
    amqpChannel\")\n.handle(Amqp\n.outboundAdapter(rabbitTemplate)\n.exchangeName(exchange)\n\
    .routingKey(queue))\n.get();\n}\n}\n清单 8-10.\ncom.apress.messaging.config.RateConfig.java\n\
    ```\n\n清单 8-10 向您展示了 `RateConfig` 类，我们在其中定义了集成流。首先，注意一些熟悉的对象（RabbitMQ 的 Java 配置），例如设置了\
    \ `Jackson2JsonMessageConverter` 的 `RabbitTemplate` 以及队列的创建。\n\n`amqpChannel`\
    \ bean 的创建方式是新的。我使用了 `MessageChannels`（注意类名末尾的 `s`），它提供了一个用于创建通道的流畅 API。在本例中，它创建了一个\
    \ `direct` 通道。\n\n在集成流中，我使用了 `Amqp`（类）协议适配器。在这种情况下，由于我们要发送消息，因此使用了 `outboundAdapter`。此适配器将接收\
    \ `rabbitTemplate`、交换机名称和路由键。生产者就是 `Amqp.outboundAdapter` 协议适配器。\n\n#### AMQP\
    \ 生产者\n\n在运行此示例之前，请记住 RabbitMQ 需要启动并运行。在您的主应用程序中，添加以下代码：\n\n```\n@Bean\nCommandLineRunner\
    \ processRate(MessageChannel amqpChannel){\nreturn args -> {\namqpChannel.send(\n\
    MessageBuilder.withPayload(new Rate(\"EUR\",0.88857F,new Date())).build());\n\
    amqpChannel.send(\nMessageBuilder.withPayload(new Rate(\"JPY\",102.17F,new Date())).build());\n\
    amqpChannel.send(\nMessageBuilder.withPayload(new Rate(\"MXN\",19.232F,new Date())).build());\n\
    amqpChannel.send(\nMessageBuilder.withPayload(new Rate(\"GBP\",0.75705F,new Date())).build());\n\
    };\n}\n```\n\n从这段代码片段中可以看到，我们正在使用 `amqpChannel` 并将 `Rate` 作为消息发送。如果您运行它，请查看您的\
    \ RabbitMQ Web 控制台，您会看到 `spi.rate` 队列中有四条 JSON 格式的消息。\n\n#### AMQP 消费者\n\n如果您需要一个消费者，您将使用\
    \ `inboundAdapter`。您可以在 `RateConfig` 类中使用以下代码：\n\n```\n@Bean IntegrationFlow incomingRateFlow(\n\
    ConnectionFactory connectionFactory,\n@Value(\"${apress.spi.queue}\") String queue){\n\
    return IntegrationFlows\n.from(Amqp.inboundAdapter(connectionFactory,queue)\n\
    .messageConverter(new Jackson2JsonMessageConverter()))\n.handle(\"simpleMessageHandler\"\
    ,\"process\")\n.get();\n}\n```\n\n这段代码向您展示了消费者，其中使用了 `Amqp.inboundAdapter`，通过传递\
    \ `connectionFactory`、`queue`、转换器，并由 `simpleMessageHandler` bean 处理。\n\n注意\n\n\
    如果您对 `ConnectionFactory` 引用有疑问，请记住 Spring Boot 会自动配置它。如果您想连接到远程服务器，只需在 `application.properties`\
    \ 文件中添加 `spring.rabbitmq.*` 属性。\n\n## 货币兑换项目\n\n基于您在之前章节中学到的知识，假设货币兑换项目将开始通过文件接收新汇率，然后同时将它们发送到\
    \ RabbitMQ 队列和一个已处理的文件。您如何实现此功能？您需要一种将消息发送给两个接收者的方法。\n\n尝试在不查看代码的情况下解决此问题。`rest-api-si`\
    \ 项目包含解决方案。您可以在 `RateSpiConfig` 和 `RateServiceActivator` 类中看到代码。提示：我使用了收件人列表模式。对于写入文件，如果我使用了\
    \ `Files.inboundAdapter`，那么我应该用什么来写入文件？\n\n## 总结\n\n本章涵盖了企业集成模式，并讨论了 Spring Integration\
    \ 模块如何为您提供所有必要的组件，以使用 Spring Boot 创建企业级和集成解决方案。\n\n它向您展示了使用 Spring Boot 进行 Spring\
    \ Integration 编程的不同方式。还向您展示了如何结合 XML、Java 配置和注解来创建集成应用程序。\n\n为什么 Spring Integration\
    \ 很重要？下一章将展示 Spring Cloud Stream 技术基于 Spring Integration，并且是使用所有这些组件的更简单方法。\n\n\
    # 9. 使用 Spring Cloud Stream 进行消息传递\n\n到目前为止，您已经了解了所有可用的消息传递技术。使用 Spring 框架和 Spring\
    \ Boot 使开发人员和架构师能够轻松创建健壮的消息传递解决方案。本章向前迈出了新的一步，进入了新的云原生应用程序开发领域。\n\n本章涵盖 Spring\
    \ Cloud Stream，以及这项新技术如何帮助您编写消息驱动的微服务应用程序。\n\n## Spring Cloud\n\n在我开始讨论 Spring\
    \ Cloud Stream 的内部机制和用法之前，让我们先了解一下它的父项目：Spring Cloud。\n\nSpring Cloud 是一套工具，允许开发人员创建使用分布式系统中常见模式的应用程序，从配置管理、服务发现、断路器、智能路由、微代理、控制总线、全局锁、分布式会话、服务间调用、分布式消息传递等等。这些分布式模式也将在微服务章节中介绍。\n\
    \n基于 Spring Cloud，我们有多个项目，包括 Spring Cloud Config、Spring Cloud Netflix、Spring Cloud\
    \ Bus、Spring Cloud for Cloud Foundry、Spring Cloud Cluster、Spring Cloud Stream、Spring\
    \ Cloud Stream App Starters 等等。\n\n如果您想立即开始使用这些技术中的任何一种，您需要在 `pom.xml` 文件中添加三样东西：\n\
    \n*   添加带有 `spring-boot-starter-parent` 的 `<parent/>` 标签。例如：\n\n    ```\n    org.springframework.boot\n\
    \    spring-boot-starter-parent\n    1.4.4.RELEASE\n\n    ```\n\n*   添加带有 `GA`\
    \ 版本的 `<dependencyManagement/>` 标签。例如：\n\n    ```\n\n    org.springframework.cloud\n\
    \    spring-cloud-dependencies\n    Camden.SR5\n    pom\n    import\n\n    ```\n\
    \n*   在 `<dependencies/>` 标签中添加您想要使用的技术。例如：\n\n    ```\n\n    org.springframework.cloud\n\
    \    spring-cloud-starter-stream-rabbit\n\n    ```\n\n如果您深入研究 Spring Cloud 注解的\
    \ `pom.xml` 文件，您会看到命名约定现在是 `spring-cloud-starter-<要使用的技术>`。还要注意，我们添加了一个依赖管理标签，它允许我们处理所有传递依赖和库版本管理。\n"
- fmt: "# Spring Cloud Stream\n\nIt’s time to talk about Spring Cloud Stream. This\
    \ is the focus here because we are talking about messaging in this book and also\
    \ because Spring Cloud Stream is a lightweight messaging-driven microservices\
    \ framework. It’s based on Spring Integration and Spring Boot (providing the opinionated\
    \ runtime for easy configuration), which means that you can create enterprise-ready\
    \ messaging and integration solution applications with ease. It provides a simple\
    \ declarative model for sending and receiving messages using either RabbitMQ or\
    \ Apache Kafka.\n\nI think one of the most important features of the Spring Cloud\
    \ Stream is the decoupling of messaging between producers and consumers, by creating\
    \ bindings that can be used out of the box. In other words, you don’t need to\
    \ add broker-specific code to your application for producing or consuming messages.\
    \ You just add the required binding (I’ll explain this later) dependencies to\
    \ your application and Spring Cloud Stream will take care of the messaging connectivity\
    \ and communication.\n\nThe next section describes the main components of the\
    \ Spring Cloud Stream.\n\n## Spring Cloud Stream Concepts\n\nLet’s look at the\
    \ main components of the Spring Cloud Stream:\n\n- **Application model**: The\
    \ application model is just a middleware-neutral core, which means that the application\
    \ will communicate using input and output channels to external brokers (as a way\
    \ of transporting messages) through binder implementations.\n- **Binder abstraction**:\
    \ Spring Cloud Stream provides at this moment the Kafka and RabbitMQ binder implementations.\
    \ This abstraction makes it possible for Spring Cloud Stream apps to connect to\
    \ the middleware. But, how does this abstraction know about the destinations?\
    \ It can dynamically choose at runtime the destinations based on channels. Normally\
    \ we need to provide this through the `application.properties` file as `spring.cloud.stream.bindings.[input|ouput].destination`\
    \ properties. I’ll discuss this when we look at the examples.\n- **Persistent\
    \ publish/subscribe**: The application communication will be through the well-known\
    \ publish/subscribe model. If Kafka were used, it would follow its own topic/subscriber\
    \ model, and if RabbitMQ were used, it would create a topic exchange and the necessary\
    \ bindings for each queue. This model reduces any complexity of producer and consumer.\n\
    - **Consumer groups**: You will find out that your consumers will need to be able\
    \ to scale up at some point. Scalability can be done using the concept of a consumer\
    \ group (this is similar to the Kafka consumer groups feature), where you can\
    \ have multiple consumers in a group for a load-balancing scenario. This makes\
    \ the scale needs very easy to set up.\n- **Partitioning support**: Spring Cloud\
    \ Stream support data partition, which allows multiple producers to send data\
    \ to multiple consumers and ensure that common data is processed by the same consumer\
    \ instances. This is a benefit for performance and consistency of data.\n- **Binder\
    \ API**: Spring Cloud Stream provides an API interface. It’s actually a binder\
    \ SPI (Service Provider Interface) where you can extend the core by modifying\
    \ the original code, so it’s easy to implement a specific binder, such as JMS,\
    \ WebSockets, etc.\n\nThis section covers about the programming model and the\
    \ binders. If you want to know more about the other concepts, you can take a look\
    \ at the Spring Cloud Stream reference. The idea is just to show you how to start\
    \ creating event-driven microservices with Spring Cloud Stream. To show you what\
    \ we are going to cover, take a look at Figure [9-1](#A337882_1_En_9_Chapter.html#Fig1).\n\
    \n![A337882_1_En_9_Fig1_HTML.gif](A337882_1_En_9_Fig1_HTML.gif)\n\nFigure 9-1.\
    \ Spring Cloud Stream application\n\n## Spring Cloud Stream Programming\n\nFollowing\
    \ Figure [9-1](#A337882_1_En_9_Chapter.html#Fig1), consider what would you need\
    \ to create a Spring Cloud Stream app:\n\n- `<dependencyManagement/>`: You need\
    \ to add this tag with the latest Spring Cloud library dependencies.\n- **Binder**:\
    \ You need to choose what kind of a binder you will need:\n    - **Kafka**: If\
    \ you choose Kafka as your binder, you need to add the following dependency:\n\
    \n```\norg.springframework.cloud\nspring-cloud-starter-stream-kafka\n```\n\n-\
    \ **RabbitMQ**: If you choose RabbitMQ as your binder, you need to add the following\
    \ dependency:\n\n```\norg.springframework.cloud\nspring-cloud-starter-stream-rabbit\n\
    ```\n\nYou must also have Kafka or RabbitMQ up and running. You can even use both\
    \ at the same time. You can configure them in the `application.properties` or\
    \ `application.yml` files.\n\n- `@EnableBinding`: This is a Spring Boot application,\
    \ so just by adding `@EnableBinding` you can convert the app into a Spring Cloud\
    \ Stream.\n\nThe following sections show you how to send and receive messages\
    \ from one application to another using RabbitMQ as transport layer without knowing\
    \ any specifics about the brokers API or how to configure the producer or consumer\
    \ messages.\n\nSpring Cloud Stream uses channels (input/output) as a mechanism\
    \ to send and receive messages. A Spring Cloud Stream application can have any\
    \ number of channels, and it defines two annotations: `@Input` and `@Output`.\
    \ These annotations help to identify consumers from producers. Normally a `SubscribableChannel`\
    \ class will be marked with `@Input` annotation and a `MessageChannel` class will\
    \ be marked with `@Output`. They listen for incoming messages and send outgoing\
    \ messages, respectively.\n\nThe `SubscribableChannel` and `MessageChannel` interfaces\
    \ should be well known to you from the Spring Integration chapter. Remember that\
    \ I told you that Spring Cloud Stream is based on Spring Integration.\n\nIf you\
    \ don’t want to deal directly with these channels and annotations, Spring Cloud\
    \ Stream simplifies this by adding three interfaces that cover the most common\
    \ messaging use cases: source, processor, and sink. Behind the scenes, these interfaces\
    \ have the right channels (input/output) your application needs:\n\n- **Source**:\
    \ A source is used in an application where you are ingesting data from an external\
    \ system (by listening into a queue, a REST call, file system, database query,\
    \ etc.) and sending it through an output channel. This is the actual interface\
    \ from Spring Cloud Stream:\n\n```\npublic interface Source {\n    String OUTPUT\
    \ = \"output\";\n    @Output(Source.OUTPUT)\n    MessageChannel output();\n}\n\
    ```\n\n- **Processor**: You can use a processor in an application when you want\
    \ to start listening from the input channel for new incoming messages, process\
    \ the message received (enhancements, transformations, etc.), and send a new message\
    \ to the output channel. This is the actual interface from Spring Cloud Stream:\n\
    \n```\npublic interface Processor extends Source, Sink {\n}\n```\n\n- **Sink**:\
    \ You can use a sink application when you want to start listening from the input\
    \ channel for new incoming messages, do some processing, and then end the flow\
    \ (saving data, firing a task, logging into the console, etc.). This is the actual\
    \ interface from Spring Cloud Stream:\n\n```\npublic interface Sink {\n    String\
    \ INPUT = \"input\";\n    @Input(Sink.INPUT)\n    SubscribableChannel input();\n\
    }\n```\n\nFigures [9-2](#A337882_1_En_9_Chapter.html#Fig2) and [9-3](#A337882_1_En_9_Chapter.html#Fig3)\
    \ show the models we are going to start working on.\n\n![A337882_1_En_9_Fig3_HTML.gif](A337882_1_En_9_Fig3_HTML.gif)\n\
    \nFigure 9-3. Source to processor to sink model\n\n![A337882_1_En_9_Fig2_HTML.gif](A337882_1_En_9_Fig2_HTML.gif)\n\
    \nFigure 9-2. Source to sink model\n\nYou can get all the examples from the book’s\
    \ source code. This chapter includes several examples. Let’s get started and see\
    \ some code."
