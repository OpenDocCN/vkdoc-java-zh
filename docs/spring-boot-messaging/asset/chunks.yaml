- fmt: "# Messaging\n\nCommunication is a concept that has been around forever. Everything\
    \ needs to communicate by exchanging some kind of information, and yes, you read\
    \ that right, I mean everything. If you think about it, even the ads that you\
    \ find on the side of a bus or in the grocery store are trying to tell or sell\
    \ you something, right?\n\nIn the computer world, devices (mouse, monitor, keyboard,\
    \ etc.) communicate with each other by exchanging bits of information. If we consider\
    \ applications, then we are talking about components, functions, classes, etc.,\
    \ that need to communicate with each other or expose some functionality that can\
    \ be reached through communication. We typically call this messaging.\n\n## Messaging\n\
    \nThis section introduces some of the main concepts described in detail later,\
    \ starting with messaging and how it fits in the daily development cycle. Take\
    \ a look at Figure [1-1](#A337882_1_En_1_Chapter.html#Fig1).\n\n![A337882_1_En_1_Fig1_HTML.gif](A337882_1_En_1_Fig1_HTML.gif)\n\
    \nFigure 1-1. Messaging\n\nFigure [1-1](#A337882_1_En_1_Chapter.html#Fig1) shows\
    \ a simple messaging process, whereby it communicates from point A to point B\
    \ through whatever media is possible. In this case, Figure [1-1](#A337882_1_En_1_Chapter.html#Fig1)\
    \ uses a channel, which could be a simple function call, a socket connection,\
    \ or an HTTP request. The main idea is to produce/send a message to the consumer/receiver.\n\
    \n### Messaging Use Cases\n\nThis section covers some of the most common messaging\
    \ use cases. These uses cases are key to understanding why messaging is so important:\n\
    \n- **Delivery Guaranteed**\n    - Developers need to make sure that the message\
    \ they are sending reaches its destination. If you are using a broker (a system\
    \ that handles connections, messages, and message delivery, synched or asynched),\
    \ then the producer needs to know if the broker receives the message, by some\
    \ kind of acknowledgement. The consumer must do the same, by acknowledging to\
    \ the broker that the message was received. So this particular use case is commonly\
    \ used when critical messages are being delivered, such as payments, stocks, or\
    \ any other important information.\n- **Decoupled**\n    - When dealing with software\
    \ architecture, developers look for decoupled components for easy integration,\
    \ extensibility, and simple operation and maintenance. But how can you achieve\
    \ decoupling? Messaging is part of the solution, because it allows you to think\
    \ in your own business domain, which is a bounded context. The information you\
    \ produce/send is your main concern, regardless of how the consumer/receiver will\
    \ implement its own business logic.\n- **Scalable and High Available**\n    -\
    \ Every time a system experiences high-request demands, it needs to be scalable\
    \ and not have a single point of failure. For these particular scenarios, messaging\
    \ is the solution, because multiple consumers/receivers can keep up with the load\
    \ and you can replicate the messages across multiple system instances or brokers.\
    \ That way, if one of your instances/brokers is down, you are still in control.\n\
    - **Asynchronous**\n    - Applications must be very quick and be able to respond\
    \ to a request as soon as possible. In this case, time is the key factor. How\
    \ can you achieve this kind of speed when you know that processing the request\
    \ will take a lot of time and you have multiple clients? You can solve this issue\
    \ by using the previous use case solution (scalability and/or high availability),\
    \ but it will reach a point where it’s blocking requests. The solution is asynchronous\
    \ messaging —a fire and forget—where your producer/sender sends messages and gets\
    \ to their own business logic, leaving the consumers/receivers to process the\
    \ message on their own time.\n- **Interoperability**\n    - An important factor\
    \ when creating messaging systems is the ability to produce/send a message and\
    \ be able to understand that message when consuming/receiving (maybe it’s a plain/text\
    \ JSON or in XML format or a serialized object). There have been many attempts\
    \ over the past decades to create interoperable systems. Nowadays, interoperability\
    \ is possible with new brokers like the one that implements the AMQP protocol\
    \ or even with simple RESTful APIs or WebSockets that, regardless of the implementation,\
    \ enable the producer and consumer to interoperate seamlessly.\n\nThese use cases\
    \ have been evolving into very well known messaging models and design patterns,\
    \ which are discussed in the next section.\n\n### Messaging Models and Messaging\
    \ Patterns\n\nSome messaging models were established when messaging became a part\
    \ of all systems. These models, in my opinion, evolved into the creation of messaging\
    \ design patterns.\n\n#### Point-to-Point\n\nA point-to-point model is a way to\
    \ send a message to a queue (First In, First Out), whereby only one receiver gets\
    \ the message. See Figure [1-2](#A337882_1_En_1_Chapter.html#Fig2).\n\n![A337882_1_En_1_Fig2_HTML.gif](A337882_1_En_1_Fig2_HTML.gif)\n\
    \nFigure 1-2. Point-to-point model\n\nThe point-to-point model is also used as\
    \ a message channel pattern, whereby instead of a queue, you have a channel (which\
    \ is a way to transport your message). It still guarantees that only one receiver\
    \ gets the message in the order it was sent.\n\nYou’ll see some examples later\
    \ in the book about these models and patterns.\n\n#### Publish-Subscribe\n\nThe\
    \ publish-subscribe model describes a publisher that sends a message (a topic)\
    \ to multiple subscribers of that topic. Each subscriber will receive only one\
    \ copy of the message. See Figure [1-3](#A337882_1_En_1_Chapter.html#Fig3).\n\n\
    ![A337882_1_En_1_Fig3_HTML.gif](A337882_1_En_1_Fig3_HTML.gif)\n\nFigure 1-3. Publish–subscribe\
    \ model\n\nThe publish-subscribe model is also used as a message channel pattern,\
    \ whereby instead of a topic, you have a channel that delivers a copy of the message\
    \ to its subscribers.\n\nThese models are more related to the JMS (Java Messaging\
    \ System) and are important to understand because they form the basics of all\
    \ enterprise systems."
