    bean 是相同的，只是现在我们还使用了 `rateListenerAdapter` bean。让我们回顾一下这个清单：


    *   `MessageListenerAdapter`：这与之前相同，但这里我们设置了一个新的类适配器，在本例中是 `RateSubscriber`。需要注意的是，我们通过调用
    `setSerializer` 方法设置了一个序列化器，并使用 `Rate` 类作为对象映射器实例化了一个 `Jackson2JsonRedisSerializer`
    对象。

    *   `RedisTemplate` `<String,Rate>`：如你所见，我们定义了这个 bean 以返回一个 `RedisTemplate`，其中键是字符串，值是
    `Rate` 类。还要注意，我们通过调用 `setDefaultSerializer` 方法设置了一个序列化器，并且使用了与之前相同的类 `Jackson2JsonRedisSerializer`。


