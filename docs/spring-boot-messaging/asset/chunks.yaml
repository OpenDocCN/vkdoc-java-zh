  trans: "\n### 交换机、绑定与队列\n\n这些关键词也被称为 AMQP 实体。让我们来定义这些实体（请记住，所有这些仍然是 AMQP 模型的一部分）：\n\
    \n*   **交换机**：生产者发送消息的实体。交换机将使用绑定将消息路由到正确的队列。交换机具有以下属性：名称、持久性（可以是持久或瞬态）、自动删除（当所有队列使用完毕后，交换机被删除）以及参数（哈希映射，依赖于代理）。\n\
    *   **绑定**：连接交换机与另一个交换机或队列的规则。这是一个字符串值。\n*   **队列**：存储消息（在内存或磁盘中），直到它们被应用程序消费。队列具有以下属性：名称、持久性（在代理重启后依然存在）、独占性（仅由一个连接使用，这意味着当连接关闭时队列将被删除）、自动删除（当最后一个消费者取消订阅时队列被删除）以及参数（哈希映射，依赖于代理）。\n\
    \nAMQP 模型提供了四种类型的交换机：\n\n*   **直连交换机**：通过其绑定与队列建立一对一的关系。有一个默认交换机，它是一种直连交换机类型，使用队列名称作为其绑定的路由键。\n\
    *   **扇形交换机**：此交换机会为每个绑定到它的队列复制一条消息。你可以将其视为广播；它与发布/订阅模式（主题）非常相似。\n*   **主题交换机**：此交换机类似于直连交换机，唯一的区别在于它接受路由键的通配符（正则表达式），通过使用\
    \ `*`（可替代恰好一个单词）和 `#`（可替代零个或多个单词）选项。\n*   **头交换机**：此交换机通过比较多个头信息来进行路由。你需要通过向同一消息头添加\
    \ `x-match:all`（头：键）来指示是否要求头信息完全匹配，或通过添加 `x-match:any`（头：键）来指示匹配任意一个头信息。\n\n图\
    \ 5-2 展示了这些交换机类型。\n\n![A337882_1_En_5_Fig2_HTML.jpg](img/A337882_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2.\n\n交换机类型\n\n这个简短的介绍足以让你开始使用 RabbitMQ 并学习如何使用它。\n\n## RabbitMQ\n\nRabbitMQ\
    \ 是一个实现了 AMQP 模型（从 AMQP 模型的 0.8.x 版本到 1.0 版本）的开源代理。RabbitMQ 使用 Erlang 编程语言编写，使其灵活且健壮。\n\
    \n以下是它的一些特性：\n\n*   分布式节点\n*   支持集群\n*   基于插件；最重要的插件包括：\n    *   联邦\n    *   铲子\n\
    \    *   一致性哈希\n    *   社区插件\n*   具有完整 ACID（原子性、一致性、隔离性、持久性）特性的数据/状态复制\n*   开箱即用的可靠性和可扩展性：联邦和铲子\n\
    *   通过镜像队列实现高可用性\n*   多协议：\n    *   AMQP\n    *   MQTT\n    *   STOMP\n    * \
    \  SMTP\n    *   XMPP\n*   Web 控制台和 Rest API（用于监控和管理）\n*   安全性：SSL 和 LDAP\n* \
    \  多种客户端库：Java、.NET、Ruby、Erlang、Python、Clojure、PHP、JavaScript 等。\n\n我们可以写一整本书来定义每一个可用的特性，但我想做的是让你了解\
    \ RabbitMQ 能做什么。（如果你需要更多信息，可以访问 [`http://www.rabbitmq.com/features.html`](http://www.rabbitmq.com/features.html)\
    \ 。）那么，让我们通过创建客户端来开始使用它。\n\n## 使用 Spring Boot 的 RabbitMQ\n\nSpring Boot 依赖 Spring\
    \ 的 `spring-amqp` 项目来完成连接、发布、消费和管理 RabbitMQ 代理的所有繁重工作。`spring-amqp` 项目一直是消息传递应用程序中最常用的模块之一。\n\
    \n那么，为什么我们需要 Spring Boot？请记住，Spring Boot 是一个有主见的运行时，它将通过提供一些我们可以添加到 `application.properties`\
    \ 文件中的属性，或者通过使用 `@Configuration` 类来覆盖其中一些默认配置，从而帮助我们配置 `spring-amqp` 模块所需的内容。\n\
    \n`spring-amqp` 项目使用了众所周知的模板模式，它暴露了一个 `RabbitTemplate` 类，允许我们发布和消费消息，以及执行其他任务。它还提供了易于使用的消息监听器，用于连接到队列并消费消息。如果你担心线程、事务、重连（在故障情况下）、管理等问题，`spring-amqp`\
    \ 都能为你解决。\n"
- fmt: '### Producer


    Let’s start by using a simple producer. The `ampq-demo` project has everything
    you need to get started. Open the project and start with the simple producer shown
    in Listing [5-1](#A337882_1_En_5_Chapter.html#Par46).


    ```

    @Component

    public class Producer {

    private RabbitTemplate template;

    @Autowired

    public Producer(RabbitTemplate template){

    this.template = template;

    }

    public void sendMessage(String exchange,

    String routingKey, String message){

    this.template.convertAndSend(exchange,

    routingKey, message);

    }

    }

    Listing 5-1.

    com.apress.messaging.amqp.Producer

    ```


    Listing [5-1](#A337882_1_En_5_Chapter.html#Par46) shows a simple `amqp` producer.
    Let’s analyze the important parts of the code:


    - `@Component`: This is a marker from the Spring framework that will recognize
    this class as a Spring Bean so you can use it in the application. You will see
    this in action in the main application next.

    - `RabbitTemplate`: This is one of the main classes from the Spring AMQP module
    that brings a lot of functionality to interact with RabbitMQ, like send, receive,
    and do admin tasks in RabbitMQ. In this example, it’s used to convert and send
    a message to the broker. Remember that, in order to interact with RabbitMQ, you
    must open a connection and create a channel (from that connection) and then send
    the message to the exchange. This setup will be handled by the `RabbitTemplate`
    instance.

    - `convertAndSend`: This method will convert the message to the right type (into
    a byte array) and will send it to the `RabbitMQ` broker. This particular method
    has three parameters. The first one is the name of the exchange (where the message
    will be sent through the channel), the second parameter is the routing key (the
    binding rule that will route the message to the right queue), and the message,
    which in this case is just a string.


    As you can see, this is a very simple producer. It’s worth mentioning that the
    `RabbitTemplate` class has a variety of overload methods that help you send, listen,
    use custom converters, and do specialized tasks (you will read more about this
    later).


    Next, let’s see how can we use this producer. Open the `AmqpDemoApplication.java`
    class shown in Listing [5-2](#A337882_1_En_5_Chapter.html#Par53).


    ```

    @SpringBootApplication

    public class AmqpDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(AmqpDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner simple(

    @Value("${apress.amqp.exchange:}")String exchange,

    @Value("${apress.amqp.queue}")String routingKey,

    Producer producer){

    return args -> {

    producer.sendMessage(

    exchange,

    routingKey, "HELLO AMQP!");

    };

    }

    }

    Listing 5-2.

    com.apress.messaging.AmqpDemoApplication.java

    ```


    Listing [5-2](#A337882_1_En_5_Chapter.html#Par53) shows you the main Spring Boot
    application. Let’s review the code:


    - `@Bean CommandLineRunner`: You are already familiar with this annotation and
    interface. It will be executed when the Spring container has initialized all the
    beans and is ready to be used.

    - `@Value("${apress.amqp.exchange:}")`: This annotation evaluates the properties
    (through `application.properties`, command-line arguments, or environment variables)
    that include the `apress.amqp.exchange` key. If it’s not found, it will use just
    an empty string, which is the `:` after the exchange.

    - `@Value("${apress.amqp.queue}")`: This annotation will evaluate the properties
    (through the `application.properties`, command-line arguments, or environment
    variables) that include the `apress.amqp.queue` key. This key is mandatory, so
    you will find it in the `src/resources/application.properties` file with the `spring-boot-queue`
    value.

    - `Producer`: This is the simple producer class (shown in Listing [5-1](#A337882_1_En_5_Chapter.html#Par46)).
    As you can see, we are using the `sendMessage` method to send the exchange’s name,
    the routing key, and the `"HELLO AMQP!"` message.


    Before you test it, you need to make sure that your RabbitMQ broker is up and
    running. You also have to set up your exchange, binding, and the queue, although
    you don’t need to do this here because the `amqp-demo` project already has this
    configuration set up this for you. Take a look at the `AMQPConfig.java` class
    shown in Listing [5-3](#A337882_1_En_5_Chapter.html#Par60).


    ```

    @Configuration

    @EnableConfigurationProperties(AMQPProperties.class)

    public class AMQPConfig {

    @Bean

    public Queue queue(

    @Value("${apress.amqp.queue}")String queueName){

    return new Queue(queueName,false);

    }

    }

    Listing 5-3.

    com.apress.messaging.config.AMQPConfig.java

    ```


    Listing [5-3](#A337882_1_En_5_Chapter.html#Par60) shows you the `AMQPConfig` that
    defines the following:


    - `@EnableConfigurationProperties`: This will declare a custom properties that
    will have the prefix: `apress.amqp.*`. That’s why we can use the `apress.amqp.queue`
    or `apress.amqp.exchange` keys.

    - `@Bean Queue`: This is the important part where programmatically we are declaring
    the queue that (in this case) will be created by returning a new instance of the
    `Queue` class.

    - `@Value("${apress.amqp.queue}")`: This annotation will evaluate the key `apress.amqp.queue`
    that is defined in the `src/main/resources/application.properties` that has the
    `spring-boot-queue` value.


    I think this configuration is very straightforward, but if you think about it,
    it looks like we are missing the `Exchange` declaration and the binding that routes
    to the queue. Well, every time you create a queue in RabbitMQ, it’s bound to a
    default exchange (normally just declared as an empty string) and the routing key
    happens to be the name of the queue. As you can see, we are passing the name of
    the queue as the routing key to the producer instance.


    You can now run the application and see in the RabbitMQ Management Console that
    the `spring-boot-queue` was created and has one message. The output is shown in
    Figure [5-3](#A337882_1_En_5_Chapter.html#Fig3).


    ![A337882_1_En_5_Fig3_HTML.jpg](A337882_1_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    Producer logs


    Figure [5-3](#A337882_1_En_5_Chapter.html#Fig3) shows you the logs. In the `amqp-demo`
    project, you will find the `com.apress.messaging.aop.AMQPAudit.java` class. It’s
    an Around advice that will log the `Producer` method call. See Figure [5-4](#A337882_1_En_5_Chapter.html#Fig4).


    ![A337882_1_En_5_Fig4_HTML.jpg](A337882_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    RabbitMQ Management Console (http://localhost:15672/#/queues): spring-boot-queue


    Figure [5-4](#A337882_1_En_5_Chapter.html#Fig4) shows you the RabbitMQ Management
    Console, where you can see that the queue was created and the message was sent.


    Do you know how are we connecting to the RabbitMQ broker? What happens if I have
    a remote server and I need to specify where to connect, passing an IP or maybe
    a username or password?


    Spring Boot will figure this out, because Spring Boot is an opinionated runtime
    and it will find the `spring-boot-starter-amqp` dependencies in the classpath
    and will ask if you already have a `ConnectionFactory` (that will connect to the
    RabbitMQ) with all the necessary information about the broker. If you do not,
    it will attempt to use the default settings and look for the local broker.


    If you want to specify a remote broker, you do so by providing the `spring.rabbitmq.*`
    properties in the `src/main/resources/application.properties` file. This is enough
    to connect to a remote RabbitMQ.'
