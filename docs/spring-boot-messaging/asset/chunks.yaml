  trans: '

    ### 生产者


    让我们先回顾一下使用 Spring Boot 的生产者。打开 `com.apress.messaging.jms.SimpleSender.java` 类。参见代码清单
    4-6。


    ```

    @Component

    public class SimpleSender {

    private JmsTemplate jmsTemplate;

    @Autowired

    public SimpleSender(JmsTemplate jmsTemplate){

    this.jmsTemplate = jmsTemplate;

    }

    public void sendMessage(String destination,

    String message){

    this.jmsTemplate.convertAndSend(destination, message);

    }

    }

    代码清单 4-6.

    com.apress.messaging.jms.SimpleSender.java

    ```


    代码清单 4-6 展示了创建生产者的最简单直接的方式。我们来分析一下代码的每个部分：


    *   `@Component`：你可能已经知道，这个注解将类标记为 Spring Bean，使其在运行时可用。

    *   `JmsTemplate`：这是客户端最重要的部分，因为该类负责向 JMS 提供者/代理发送消息（以及其他操作）。

    *   @Autowired：该注解用于类构造函数，以注入 `JmsTemplate` Bean（如前所述）。你甚至可以省略此注解，Spring 会自动推断出你需要此依赖。

    *   `convertAndSend`：`JmsTemplate` 实例拥有此方法，用于转换消息。由于这是一个字符串，它会被自动转换为 `javax.jms.TextMessage`
    并发送到目标（通常是一个队列）。


    在运行这部分代码之前，我们先检查一下主应用程序。打开 `com.apress.messaging.JmsSenderApplication.java` 类，如代码清单
    4-7 所示。


    ```

    @SpringBootApplication

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    @Bean

    CommandLineRunner simple(JMSProperties props,

    SimpleSender sender){

    return args -> {

    sender.sendMessage(props.getQueue(), "Hello World");

    };

    }

    }

    代码清单 4-7.

    com.apress.messaging.JmsSenderApplication.java

    ```


    代码清单 4-7 展示了主应用程序。我们来逐一分析每个部分：


    *   `@SpringBootApplication`：你已经熟悉这个注解了。它是 Spring Boot 识别你试图运行何种应用程序的方式。

    *   `simple(JMSProperties,SimpleSender)`：当 Spring 容器准备就绪时，此方法会被执行，并注入 `JMSProperties`
    和 `SimpleSender` Bean 供其使用。

    *   `JMSProperties`：此类用作属性持有者，读取 `application.properties` 文件并查找 `apress.jms.queue`
    属性（本例中设置为 `jms-sender`）。如果你想了解更多，可以阅读 Spring Boot 参考文档中“外部化配置”部分的内容。


    现在你可以运行它了。（你可以使用 Maven 命令行运行：`$ mvn spring-boot:run`，或者如果你已将其导入 STS，则可以在 Boot
    Dashboard 中运行。）运行后，你将看到类似图 4-3 的内容。


    ![A337882_1_En_4_Fig3_HTML.jpg](img/A337882_1_En_4_Fig3_HTML.jpg)


    图 4-3.


    JmsSenderApplication 日志


    图 4-3 展示了应用程序运行时的日志。代码实际上正在将消息 `"Hello World"` 发送到 `jms-demo` 队列。这意味着你将看到 `JMSAudit`
    文本以及一些额外信息。我究竟在哪里打印了这些信息？请查看 `com.apress.messaging.aop.JMSAudit.java` 类。这个类是一个环绕通知，通常用于日志记录。我知道对于这个示例来说可能有些过度，但这给了我更多探索
    AOP 的方式。


    你可以看到这个客户端正在发送消息，但消息发到哪里去了？你知道我们使用了 `spring-boot-starter-activemq` 依赖，但似乎并没有任何代理在运行。这是怎么回事？


    请记住，Spring Boot 会根据你的类路径依赖做出判断，因此当它知道你拥有 `spring-boot-starter-activemq` 依赖时，会检查你是否已经声明了
    `connectionFactory`、`session`、`sender` 等类型的 Bean，以便使用它们。如果 Spring Boot 没有找到任何东西，它会默认创建所有这些
    Bean，并使用内存中的提供者（URL 为 `vm://localhost`）。这就是为什么运行时没有错误，并且你可以看到消息已被发送的原因。

    '
- fmt: '### Consumer


    Next, let’s look at the consumer. First I’ll show you the consumer that uses the
    `javax.jms.MessageListener` interface (it’s the same as before, in the JMS with
    Java section) to see what is needed to configure it. See Listing [4-8](#A337882_1_En_4_Chapter.html#Par51).


    ```

    @Component

    public class QueueListener implements MessageListener {

    public void onMessage(Message message) {

    }

    }

    Listing 4-8.

    com.apress.messaging.jms.QueueListener.java

    ```


    Listing [4-8](#A337882_1_En_4_Chapter.html#Par51) shows you the receiver that
    will listen for any messages in the queue (`jms-demo`). Let’s review the code:


    *   `@Component`: If this is commented out, remove the `//` and add the right
    imports. I suggest you use the STS and press `Cmd+Shift+O` on a Mac or `Ctrl+Shift+O`
    on Windows. This annotation will mark the class as a Spring bean, so it can be
    used in the configuration.

    *   `MessageListener`: This interface is necessary to receive JMS messages, and
    it’s necessary to implement the `onMessage` method.

    *   `onMessage(Message)`: This is necessary to implement the method, and it has
    the actual message that is consumed from the queue.


    As you can see, it’s very simple, but if you try it to run it, you will see the
    same result as before. You’ll see just the log about sending the message. Why
    is this? Well, you must tell Spring Boot how to use this listener, so take a look
    at Listing [4-9](#A337882_1_En_4_Chapter.html#Par57).


    ```

    @Configuration

    @EnableConfigurationProperties(JMSProperties.class)

    public class JMSConfig {

    @Bean

    public DefaultMessageListenerContainer

    customMessageListenerContainer(

    ConnectionFactory connectionFactory,

    MessageListener queueListener,

    @Value("${apress.jms.queue}") final

    String destinationName){

    DefaultMessageListenerContainer listener = new

    DefaultMessageListenerContainer();

    listener.setConnectionFactory(connectionFactory);

    listener.setDestinationName(destinationName);

    listener.setMessageListener(queueListener);

    return listener;

    }

    }

    Listing 4-9.

    com.apress.messaging.config.JMSConfig.java

    ```


    Listing [4-9](#A337882_1_En_4_Chapter.html#Par57) shows you the configuration
    that you need to enable the `QueueListener` class. Let’s review this class:


    *   `@Configuration`: This is a marker for the class to be taken as a Java config
    for the Spring container, so everything here will be used to set up Spring.

    *   `@EnableConfigurationProperties`: Remember that we were using the `application.properties`
    file to set the queue’s name? This particular annotation will use the provided
    class (`JMSProperties.class`) as the property holder, so you can set some properties
    in the `application.properties` file. Later, you can get its value either by using
    `@Value` or by using the `JMSProperties` instance bean and the getters.

    *   `@Bean`: This is a marker to create a bean of type `DefaultMessageListenerContainer`
    in the Spring container.

    *   `DefaultMessageListenerContainer`: In this case, this is a return type that
    will be taken as a Spring bean. It has all the necessary information to determine
    the `QueueListener` class and what queue to consume from (`destinationName`).

    *   `ConnectionFactory`: Spring will inject this instance and it will auto-configure
    it using the defaults (unless you provide a custom `ConnectionFactory`). In this
    case, it will use the in-memory provider/broker.

    *   `MessageListener`: Spring will inject the `QueueListener` class (the receiver
    from Listing [4-8](#A337882_1_En_4_Chapter.html#Par51)) so it can be used to set
    up the `DefaultMessageListenerContainer` instance.

    *   `@Value("${apress.jms.queue}")`: This annotation will inject the value `"jms-demo"`
    from the `apress.jms.queue` property that is in the `application.properties` file
    into the `destinationName` parameter.


    Then, the actual method will create the `DefaultMessageListenerContainer` and
    set all its properties (`connectionFactory`, `queueListener`, and `destinationName`).


    Now, if you run the application, you should get output similar to Figure [4-4](#A337882_1_En_4_Chapter.html#Fig4).


    ![A337882_1_En_4_Fig4_HTML.jpg](A337882_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Logs


    Figure [4-4](#A337882_1_En_4_Chapter.html#Fig4) shows the `onMessage` method being
    called by consuming the message from the queue (remember that these logs are produced
    by the AOP aspect). If you take a closer look at the actual message, you should
    see something similar to this:


    ```

    ActiveMQTextMessage {

    commandId = 5,

    responseRequired = true,

    messageId = ID:pivotal-es.local-64812,

    originalDestination = null,

    originalTransactionId = null,

    producerId = ID:pivotal-es.local-64812,

    destination = queue://jms-demo,

    transactionId = null,

    expiration = 0,

    timestamp = 1479394688357,

    arrival = 0,

    brokerInTime = 1479394688357,

    brokerOutTime = 1479394688362,

    correlationId = null,

    replyTo = null,

    persistent = true,

    type = null,

    priority = 4,

    groupID = null,

    groupSequence = 0,

    targetConsumerId = null,

    compressed = false,

    userID = null,

    content = null,

    marshalledProperties = null,

    dataStructure = null,

    redeliveryCounter = 0,

    size = 1046,

    properties = null,

    readOnlyProperties = true,

    readOnlyBody = true,

    droppable = false, j

    msXGroupFirstForConsumer = false,

    text = Hello World

    }

    ```


    As you can see, we are receiving an `ActiveMQTextMessage` that is an implementation
    around the `javax.jms.TextMessage` interface. It’s important to know the destination
    property that points to the `jms-demo` queue, the payload, and the text property
    with its `Hello World` value.


    You might wonder if there is a simpler way to configure the listener. How can
    you determine what to configure? Well, Spring Boot makes this even easier. You
    learn about this process in the next section.


    ### Consumer with Annotations


    The Spring Framework provides useful annotations for consuming messages, very
    similar to `ApplicationEvents` and `Streams`. Spring Boot helps auto-configure
    these annotations, thereby making it easier for the developer.


    Let’s first review the `com.apress.messagin.jms.AnnotatedReceiver.java` class.
    See Listing [4-10](#A337882_1_En_4_Chapter.html#Par74).


    ```

    @Component

    public class AnnotatedReceiver {

    @JmsListener(destination = "${apress.jms.queue}")

    public void processMessage(String content) {

    }

    }

    Listing 4-10.

    com.apress.messagin.jms.AnnotatedReceiver.java

    ```


    Listing [4-10](#A337882_1_En_4_Chapter.html#Par74) shows you the `AnnotatedReceiver`
    class that includes the `@JmsListener` annotation:


    *   `@Component`: Remember, this is a marker for Spring to enable this bean in
    the Spring container.

    *   `@JmsListener`: This annotation is configured to create a message listener
    using the destination specified by the SpEL (Spring Expression Language) expression.
    In this case, it’s the `apress.jms.queue` property that has the `jms-demo` value.


    That’s it! Spring Boot will configure everything for you, so no more beans to
    declare a message listener container.


    Note


    Before you run this receiver, first comment out the bean definition (`DefaultMessageListenerContainer`)
    in the `JMSConfig` class and the `@Component` in the `QueueListener` class.


    It’s now time to run this receiver (just remember to comment out the bean and
    listener, because you don’t need them anymore). Once you run the application,
    you should have something similar to Figure [4-5](#A337882_1_En_4_Chapter.html#Fig5).


    ![A337882_1_En_4_Fig5_HTML.jpg](A337882_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    @JmsListener logs


    Figure [4-5](#A337882_1_En_4_Chapter.html#Fig5) shows you the logs after running
    the application. You can see that the method that’s called is `processMessage`;
    this is the same message that was annotated by the `@JmsListener` annotation.'
  raw: '### Consumer


    Next, let’s look at the consumer. First I’ll show you the consumer that uses the
    `javax.jms.MessageListener` interface (it’s the same as before, in the JMS with
    Java section) to see what is needed to configure it. See Listing [4-8](#A337882_1_En_4_Chapter.html#Par51).


    ```

    @Component

    public class QueueListener implements MessageListener {

    public void onMessage(Message message) {

    }

    }

    Listing 4-8.

    com.apress.messaging.jms.QueueListener.java

    ```


    Listing [4-8](#A337882_1_En_4_Chapter.html#Par51) shows you the receiver that
    will listen for any messages in the queue (`jms-demo`). Let’s review the code:


    *   `@Component`: If this is commented out, remove the `//` and add the right
    imports. I suggest you use the STS and press Cmd+Shift+O on a Mac or Ctrl+Shift+O
    on Windows. This annotation will mark the class as a Spring bean, so it can be
    used in the configuration.

    *   `MessageListener`: This interface is necessary to receive JMS messages, and
    it’s necessary to implement the `onMessage` method.

    *   `onMessage(Message)`: This is necessary to implement the method, and it has
    the actual message that is consumed from the queue.


    As you can see, it’s very simple, but if you try it to run it, you will see the
    same result as before. You’ll see just the log about sending the message. Why
    is this? Well, you must tell Spring Boot how to use this listener, so take a look
    at Listing [4-9](#A337882_1_En_4_Chapter.html#Par57).


    ```

    @Configuration

    @EnableConfigurationProperties(JMSProperties.class)

    public class JMSConfig {

    @Bean

    public DefaultMessageListenerContainer

    customMessageListenerContainer(

    ConnectionFactory connectionFactory,

    MessageListener queueListener,

    @Value("${apress.jms.queue}") final

    String destinationName){

    DefaultMessageListenerContainer listener = new

    DefaultMessageListenerContainer();

    listener.setConnectionFactory(connectionFactory);

    listener.setDestinationName(destinationName);

    listener.setMessageListener(queueListener);

    return listener;

    }

    }

    Listing 4-9.

    com.apress.messaging.config.JMSConfig.java

    ```


    Listing [4-9](#A337882_1_En_4_Chapter.html#Par57) shows you the configuration
    that you need to enable the `QueueListener` class. Let’s review this class:


    *   `@Configuration`: This is a marker for the class to be taken as a Java config
    for the Spring container, so everything here will be used to set up Spring.

    *   `@EnableConfigurationProperties`: Remember that we were using the `application.properties`
    file to set the queue’s name? This particular annotation will use the provided
    class (`JMSProperties.class`) as the property holder, so you can set some properties
    in the `application.properties` file. Later, you can get its value either by using
    `@Value` or by using the JMSProperties instance bean and the getters.

    *   `@Bean`: This is a marker to create a bean of type `DefaultMessageListenerContainer`
    in the Spring container.

    *   `DefaultMessageListenerContainer`: In this case, this is a return type that
    will be taken as a Spring bean. It has all the necessary information to determine
    the `QueueListener` class and what queue to consume from (`destinationName`).

    *   `ConnectionFactory`: Spring will inject this instance and it will auto-configure
    it using the defaults (unless you provide a custom `ConnectionFactory`). In this
    case, it will use the in-memory provider/broker.

    *   `MessageListener`: Spring will inject the `QueueListener` class (the receiver
    from Listing [4-8](#A337882_1_En_4_Chapter.html#Par51)) so it can be used to set
    up the `DefaultMessageListenerContainer` instance.

    *   `@Value("${apress.jms.queue}")`: This annotation will inject the value `"jms-demo"`
    from the `apress.jms.queue` property that is in the `application.properties` file
    into the `destinationName` parameter.


    Then, the actual method will create the `DefaultMessageListenerContainer` and
    set all its properties (`connectionFactory`, `queueListener`, and `destinationName`)
    .


    Now, if you run the application, you should get output similar to Figure [4-4](#A337882_1_En_4_Chapter.html#Fig4).


    ![A337882_1_En_4_Fig4_HTML.jpg](A337882_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Logs


    Figure [4-4](#A337882_1_En_4_Chapter.html#Fig4) shows the `onMessage` method being
    called by consuming the message from the queue (remember that these logs are produced
    by the AOP aspect). If you take a closer look at the actual message, you should
    see something similar to this:


    ```

    ActiveMQTextMessage {

    commandId = 5,

    responseRequired = true,

    messageId = ID:pivotal-es.local-64812,

    originalDestination = null,

    originalTransactionId = null,

    producerId = ID:pivotal-es.local-64812,

    destination = queue://jms-demo,

    transactionId = null,

    expiration = 0,

    timestamp = 1479394688357,

    arrival = 0,

    brokerInTime = 1479394688357,

    brokerOutTime = 1479394688362,

    correlationId = null,

    replyTo = null,

    persistent = true,

    type = null,

    priority = 4,

    groupID = null,

    groupSequence = 0,

    targetConsumerId = null,

    compressed = false,

    userID = null,

    content = null,

    marshalledProperties = null,

    dataStructure = null,

    redeliveryCounter = 0,

    size = 1046,

    properties = null,

    readOnlyProperties = true,

    readOnlyBody = true,

    droppable = false, j

    msXGroupFirstForConsumer = false,

    text = Hello World

    }

    ```


    As you can see, we are receiving an `ActiveMQTextMessage` that is an implementation
    around the `javax.jms.TextMessage` interface. It’s important to know the destination
    property that points to the `jms-demo` queue, the payload, and the text property
    with its `Hello World` value.


    You might wonder if there is a simpler way to configure the listener. How can
    you determine what to configure? Well, Spring Boot makes this even easier. You
    learn about this process in the next section .


    ### Consumer with Annotations


    The Spring Framework provides useful annotations for consuming messages, very
    similar to `ApplicationEvents` and `Streams`. Spring Boot helps auto-configure
    these annotations, thereby making it easier for the developer.


    Let’s first review the `com.apress.messagin.jms.AnnotatedReceiver.java` class.
    See Listing [4-10](#A337882_1_En_4_Chapter.html#Par74).


    ```

    @Component

    public class AnnotatedReceiver {

    @JmsListener(destination = "${apress.jms.queue}")

    public void processMessage(String content) {

    }

    }

    Listing 4-10.

    com.apress.messagin.jms.AnnotatedReceiver.java

    ```


    Listing [4-10](#A337882_1_En_4_Chapter.html#Par74) shows you the `AnnotatedReceiver`
    class that includes the `@JmsListener` annotation:


    *   `@Component`: Remember, this is a marker for Spring to enable this bean in
    the Spring container.

    *   `@JmsListener`: This annotation is configured to create a message listener
    using the destination specified by the SpEL (Spring Expression Language) expression.
    In this case, it’s the `apress.jms.queue` property that has the `jms-demo` value.


    That’s it! Spring Boot will configure everything for you, so no more beans to
    declare a message listener container.


    Note


    Before you run this receiver, first comment out the bean definition (`DefaultMessageListenerContainer`)
    in the `JMSConfig` class and the `@Component` in the `QueueListener` class.


    It’s now time to run this receiver (just remember to comment out the bean and
    listener, because you don’t need them anymore). Once you run the application,
    you should have something similar to Figure [4-5](#A337882_1_En_4_Chapter.html#Fig5)
    .


    ![A337882_1_En_4_Fig5_HTML.jpg](A337882_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    @JmsListener logs


    Figure [4-5](#A337882_1_En_4_Chapter.html#Fig5) shows you the logs after running
    the application. You can see that the method that’s called is `processMessage`;
    this is the same message that was annotated by the `@JmsListener` annotation.'
