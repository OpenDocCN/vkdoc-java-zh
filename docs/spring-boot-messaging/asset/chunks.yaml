    \ take a look at the payload. You will have a message every second. Note also\
    \ that the message has properties, such as the headers with the `contentType`\
    \ `: text/plain` and the `delivery_mode: 2` (this means the messages are being\
    \ persisted). This is how Spring Cloud Stream and its binder connect to RabbitMQ\
    \ to publish messages."
  trans: "\n### cloud-stream-demo\n\n本项目的目的是展示如何创建一个源（Source），并通过其输出通道发送消息；如何创建一个处理器（Processor），并分别从输入通道接收消息和向输出通道发送消息；以及如何创建一个汇（Sink），并学习如何从输入通道接收消息。实际上，我演示的是图\
    \ 9-3 所展示的内容，但每次只考虑一个 Stream 应用。\n\n目前，这些应用之间的通信是手动的，这意味着我们需要在中间执行一些步骤，这是因为我希望你能了解每个应用的工作原理。在下一节中，你将看到整个流程是如何运作的。\n\
    \n#### 源（Source）\n\n我们将从定义一个源开始。请记住，该组件有一个输出通道。打开 `com.apress.messaging.cloud.stream.SimpleSource`\
    \ 类。它应该如代码清单 9-1 所示。\n\n```\n@EnableBinding(Source.class)\npublic class SimpleSource\
    \ {\nprivate SimpleDateFormat simpleDate =\nnew SimpleDateFormat(\"HH:mm:ss\"\
    );\n@Bean\n@InboundChannelAdapter(channel=Source.OUTPUT)\npublic MessageSource\
    \ simpleText(){\nreturn () -> MessageBuilder\n.withPayload(\"Hello at \" +\nsimpleDate.format(new\
    \ Date()))\n.build();\n}\n}\n代码清单 9-1.\ncom.apress.messaging.cloud.stream.SimpleSource.java\n\
    ```\n\n代码清单 9-1 向你展示了你能拥有的最简单的 `Source` 流应用。让我们来看一下：\n\n*   `@EnableBinding`：此注解会将此类启用为\
    \ Spring Cloud Stream 应用，并启用通过提供的绑定器发送或接收消息的必要配置。\n*   `Source`：此接口将 Spring Cloud\
    \ Stream 应用标记为源流。它将创建必要的通道；在本例中，即用于向提供的绑定器发送消息的输出通道。\n*   `@InboundChannelAdapter`：此注解是\
    \ Spring Integration 框架的一部分。它每秒轮询一次 `simpleText` 方法。这意味着每秒将发送一条新消息。你可以通过添加一个轮询器并修改默认设置来更改频率和消息数量。例如：\n\
    \n```\n    @InboundChannelAdapter(value = Source.OUTPUT, poller = @Poller(fixedDelay\
    \ = \"5000\", maxMessagesPerPoll = \"3\"))\n    ```\n\n此声明中重要的部分是通道，在本例中它指向 `Source.OUTPUT`。这意味着它将使用输出通道（`MessageChannel\
    \ output()`）。\n*   `MessageSource`：这是一个发送 `Message<T>` 的接口，`Message<T>` 是一个包含有效载荷和头部的包装器。\n\
    *   MessageBuilder：你已经熟悉这个类了，它发送一个 `MessageSource` 类型。在本例中，我们发送 `\"Hello at –\
    \ Date\"` 作为字符串消息。\n\n在运行示例之前，请确保 RabbitMQ 已启动并运行。接下来，运行示例。你可能看不到太多东西，但后台正在发生一些事情。请按照以下步骤操作：\n\
    \n1.  在浏览器中打开 RabbitMQ Web 管理界面。访问 `http://localhost:15672`。用户名和密码都是 `guest`。转到“Exchanges”选项卡，如图\
    \ 9-4 所示。\n\n![A337882_1_En_9_Fig4_HTML.jpg](img/A337882_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4.\n\nRabbitMQ 中的“Exchanges”选项卡 请注意，已创建一个输出（一个主题交换机），消息速率为 1.0/s。  \n2.\
    \  接下来，你将创建一个队列，以便将此交换机绑定到该队列。转到“Queues”选项卡，创建一个名为 `my-queue` 的新队列。见图 9-5。\n\n\
    ![A337882_1_En_9_Fig5_HTML.jpg](img/A337882_1_En_9_Fig5_HTML.jpg)\n\n图 9-5.\n\n\
    RabbitMQ 的“Queues”选项卡  \n3.  队列创建完成后，它会出现在列表中。接下来，点击 `my-queue` 队列，转到“Bindings”部分，并添加绑定。正确的值见图\
    \ 9-6。\n\n![A337882_1_En_9_Fig6_HTML.jpg](img/A337882_1_En_9_Fig6_HTML.jpg)\n\n\
    图 9-6.\n\nRabbitMQ 的“Bindings”选项卡 在“From Exchange”字段中填入值 `output`（这是交换机的名称），在“Routing\
    \ Key”字段中填入值 `#`。这将允许任何消息进入 `my-queue` 队列。  \n4.  将输出交换机绑定到 `my-queue` 队列几秒钟后，你将开始看到多条消息。打开如图\
    \ 9-7 所示的“Overview”面板。\n\n![A337882_1_En_9_Fig7_HTML.jpg](img/A337882_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7.\n\nRabbitMQ 的“Overview”选项卡  \n5.  让我们通过打开“Get Messages”面板来查看一条消息。你可以获取任意数量的消息并查看其内容。见图\
    \ 9-8。\n\n![A337882_1_En_9_Fig8_HTML.jpg](img/A337882_1_En_9_Fig8_HTML.jpg)\n\n\
    图 9-8.\n\n从 RabbitMQ 获取消息 选择几条消息后，查看其有效载荷。你将每秒收到一条消息。还要注意，消息具有属性，例如包含 `contentType`\
    \ `: text/plain` 和 `delivery_mode: 2` 的头部（这意味着消息正在被持久化）。这就是 Spring Cloud Stream\
    \ 及其绑定器如何连接到 RabbitMQ 以发布消息的方式。\n"
- fmt: '### Processor


    This example uses a listener for the channel input (where all incoming messages
    arrive). It will get a string message and will convert it to uppercase, then it
    will send the string to the output channel.


    Open the `com.apress.messaging.cloud.stream.SimpleProcessor` class. It should
    look like Listing [9-2](#A337882_1_En_9_Chapter.html#Par69).


    ```

    @EnableBinding(Processor.class)

    public class SimpleProcessor {

    @StreamListener(Processor.INPUT)

    @SendTo(Processor.OUTPUT)

    public String transformToUpperCase(String message) {

    return message.toUpperCase();

    }

    }

    Listing 9-2.

    com.apress.messaging.cloud.stream.SimpleProcessor.java

    ```


    Listing [9-2](#A337882_1_En_9_Chapter.html#Par69) shows you a simple processor
    stream. Let’s review it:


    - `@EnableBinding`: This annotation will enable this class as a Spring Cloud Stream
    application, and it will enable the necessary configuration for sending or receiving
    messages through the provided binder.

    - `Processor`: This interface marks the Spring Cloud Stream app as a processor
    stream. It will create the necessary channels. In this case, it creates the input
    channel (for listening for new incoming messages) and output channel (for sending
    messages to the provided binder).

    - `@StreamListener`: This annotation is part of the Spring Cloud Stream framework
    and it’s very similar to `@RabbitListener` and `@JmsListener`. It will listen
    for new incoming messages in the `Processor.INPUT` channel (`SubscribableChannel
    input()`).

    - `@SendTo`: You already know this annotation; it’s the same one we used in previous
    chapters. Its task is the same and you can see it as a reply or just as a producer.
    It will send a message to the `Processor.OUTPUT` channel (`MessageChannel output()`).


    This is a trivial, but good, example of what you can do with a processor stream.
    Before you run it, make sure to comment out the `@EnableBinding` annotation from
    the `SimpleSource` class and to delete the `output` exchange and the `my-queue`
    queue.


    Run the example. Again, the application is not doing too much, but let’s go to
    the RabbitMQ Web Management.


    1. Go to your browser and visit the `http://localhost:15672` site (username and
    password are `guest`). Click on the Exchanges tab, and you will see the same output
    exchange and a new input exchange being created. Remember that the processor stream
    will use the input and output channels. See Figure [9-9](#A337882_1_En_9_Chapter.html#Fig9).


    ![A337882_1_En_9_Fig9_HTML.jpg](A337882_1_En_9_Fig9_HTML.jpg)


    Figure 9-9. Exchanges tab of RabbitMQ Note that there is no longer any message
    rates in any of the new exchanges.


    2. Next, go to the Queues tab. Notice that a new queue was created, called `input.anonymous`,
    and it includes random text. See Figure [9-10](#A337882_1_En_9_Chapter.html#Fig10).


    ![A337882_1_En_9_Fig10_HTML.jpg](A337882_1_En_9_Fig10_HTML.jpg)


    Figure 9-10. The Queues tab of RabbitMQ


    Practically that’s it; the `SimpleProcessor` stream created the output exchange
    and the `input.anonymous.*` queue, which means that the stream is connected to
    the binder, in this case RabbitMQ. So you might wonder how to send a message.
    There are different ways to do it, and one is to emulate a message using the RabbitMQ.
    You can also send them programmatically. The following sections show both methods.


    We are going to create a queue named `my-queue` and bind it to the output, which
    is very similar to what you did in the source stream example.


    1. Go to the Queues tab and create a queue named `my-queue`. Bind it to the `output`
    exchange with a routing key `#`. This is similar to Steps 2 and 3 from the source
    stream. Note that `input.anonymous.*` queue has a binding to the `input` exchange.


    2. Now we are going to send a message using the `input` exchange. Go to the Exchanges
    tab and click on the `input` exchange. Select the Publish Message panel. Add to
    the Payload field this text: `this is just a test`. See Figure [9-11](#A337882_1_En_9_Chapter.html#Fig11).


    ![A337882_1_En_9_Fig11_HTML.jpg](A337882_1_En_9_Fig11_HTML.jpg)


    Figure 9-11. Publishing a message from RabbitMQ Then click the Publish Message
    button. A message saying `Message Published` should appear.


    3. Next, take a look at the logs. You should see something similar to what’s shown
    in Figure [9-12](#A337882_1_En_9_Chapter.html#Fig12).


    ![A337882_1_En_9_Fig12_HTML.jpg](A337882_1_En_9_Fig12_HTML.jpg)


    Figure 9-12. Application logs If you look at the `my-queue` queue and get the
    message, you should have practically the same result. See Figure [9-13](#A337882_1_En_9_Chapter.html#Fig13).


    ![A337882_1_En_9_Fig13_HTML.jpg](A337882_1_En_9_Fig13_HTML.jpg)


    Figure 9-13. Getting the messages from RabbitMQ Wait a minute! It seems that we
    are getting some array, which is not being converted to uppercase. If you analyze
    the code, those are ASCII codes, yet nothing happens. This is because the input
    channel receives the text that was converted (by RabbitMQ) as an array of bytes.
    We can fix this.


    4. Before we fix this, purge the queue of messages by clicking the Purge button
    at the end of the queue page. You now start with an empty queue.


    5. Go back to the Input exchange. Now we are going to pass the header that has
    `content_type: text/plain`, so that RabbitMQ doesn’t change it to a byte array.
    See Figure [9-14](#A337882_1_En_9_Chapter.html#Fig14).


    ![A337882_1_En_9_Fig14_HTML.jpg](A337882_1_En_9_Fig14_HTML.jpg)


    Figure 9-14. Changing to text/plain in RabbitMQ Publish the message and take a
    look at the logs. The processor now returns `THIS IS JUST A TEST`.


    6. Finally, take a look at the `my-queue` queue and get the message. You should
    see the text converted to uppercase, as shown in Figure [9-15](#A337882_1_En_9_Chapter.html#Fig15).


    ![A337882_1_En_9_Fig15_HTML.jpg](A337882_1_En_9_Fig15_HTML.jpg)


    Figure 9-15. The text is now uppercase


    What would happen if you wanted to set another content type, like a Java object,
    JSON object, or XML object? It would be a hassle to modify this at the RabbitMQ
    level. There should be another way, and there is! This is just an example of trying
    to send a message and see the behavior of the processor stream; in real life you
    would never use RabbitMQ like this. You would use it only to monitor message rates,
    but that’s it.


    So, in order to use a content type, you must add a property to the `application.properties`
    (or `application.yml`) file that allows you to convert any message to the type
    specified. In this case, you use the following property:


    ```

    spring.cloud.stream.bindings.input.content-type=text/plain

    ```


    The key here is the `input` property. Note that we pass the `content-type`. If
    you do the change and restart the app, you can now send a message (in lowercase)
    without any header or property and you should have the text in uppercase (in the
    logs and in the `my-queue` queue).


    I mentioned that you can send messages programmatically. You can do that by adding
    this functionality to your main class. See Listing [9-3](#A337882_1_En_9_Chapter.html#Par97).


    ```

    @SpringBootApplication

    public class CloudStreamDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(

    CloudStreamDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner sourceSender(MessageChannel input){

    return args ->{

    input

    .send(MessageBuilder

    .withPayload("hello world")

    .build());

    };

    }

    }

    Listing 9-3.

    com.apress.messaging.CloudStreamDemoApplication.java

    ```


    If you run the application, `HELLO WORLD` in uppercase appears in the logs and
    in the `my-queue` queue. As you can see, we are using a method that you already
    know from the Spring Integration, the `MessageChannel` interface. What is interesting
    here is that Spring knows what channel to inject. Remember that the `@Processor`
    annotation exposes the `input` channel.'
