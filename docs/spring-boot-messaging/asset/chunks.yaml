    com.apress.messaging.config.AMQPConfig.java

    ```


    Listing [5-10](#A337882_1_En_5_Chapter.html#Par108) shows you how to set up a
    fixed queue that will be used by the server to reply to the client request, and
    the client will be listening to. The important part here is the `RabbitTemplate`,
    which will configure the `reply-to` queue by using the `setReplyAddress` method.
    It’s also necessary to use the same template as the listener in order to listen
    for responses from the server (this is accomplished by setting the listener container
    to `setMessageListener`).


    Note


    The RabbitMQ Java client ( [`https://www.rabbitmq.com/java-client.html`](https://www.rabbitmq.com/java-client.html)
    ) provides out-of-the-box RPC client/server classes, but you still need to deal
    with reconnections, transactions, etc., which is something that Spring AMQP does
