- fmt: '### Topics


    This section discusses the next JMS messaging model, the publisher-subscriber
    or topics. This model has publishers that send messages to a topic, and these
    topics can have from zero to multiple subscribers that will get a copy of the
    message. You need to think of this like a newspaper or a magazine subscription.
    You subscribe (to a particular interest—a topic) to receive a newspaper or magazine
    from the publisher.


    This section continues with the `jms-sender` project, which will be the publisher.
    It also opens a new project within this chapter, the `jms-topic-subscriber` project.
    It’s similar in structure to `jms-sender`.


    In `jms-sender`, we are going to use the same `RateSender.java` and the main entry
    point where we send the rates, but there is one small change. Open the `src/main/resources/application.properties`
    file. It should look like Listing [4-18](#A337882_1_En_4_Chapter.html#Par134).


    ```

    # Spring Web

    spring.main.web-environment=false

    #Default ActiveMQ properties

    spring.activemq.broker-url=tcp://localhost:61616

    spring.activemq.user=admin

    spring.activemq.password=admin

    #Apress Configuration

    apress.jms.queue=jms-demo

    apress.jms.rate-queue=rates

    apress.jms.rate-reply-queue=reply-rate

    #Enable Topic Messaging

    spring.jms.pub-sub-domain=true

    #Apress Topic Configuration

    apress.jms.topic=rate-topic

    Listing 4-18.

    src/main/resources/application.properties

    ```


    Listing [4-18](#A337882_1_En_4_Chapter.html#Par134) shows the `application.properties`
    file, which has one particular property, the `spring.jms.pub-sub-domain`. This
    property by default is `false`, thereby making your producer send messages to
    a queue. When it’s set to `true`, the producer (publisher) will send the message
    to a topic. This also applies to the listeners. If you set this property to `true`,
    the listeners will become subscribers of the topic.


    Look at the last property as well. We are simply defining the name of the topic
    where all the subscribers will be listening.


    You can now open and review the `com.apress.messaging.jms.RateTopicReceiver.java`
    class from the `jms-topic-subscriber` project and see that it’s the same code
    (except for the name of the destination). In this project, you need to have the
    same `application.properties` file with the `spring.jms.pub-sub-domain` set to
    `true` (just make sure it has this property).


    Now it’s time to run the `jms-topic-subscriber` project. Before you run the `jms-demo`
    project, look at the Topics section of the ActiveMQ web console, as shown in Figure
    [4-13](#A337882_1_En_4_Chapter.html#Fig13).


    ![A337882_1_En_4_Fig13_HTML.jpg](A337882_1_En_4_Fig13_HTML.jpg)


    Figure 4-13. The Topics section of the ActiveMQ web console


    Figure [4-13](#A337882_1_En_4_Chapter.html#Fig13) shows that a topic called `rates`
    was created and there is one consumer. Next, run the `jms-sender` project to see
    whether the rates are sent to the topic. Take a look at the `jms-topic-subscriber`
    project logs; you should see that you are consuming from the `rates` topic.


    As an experiment, you can run multiple instances of the `jms-topic-subscriber`
    project (this is easy if you are using the STS and the Boot Dashboard) and verify
    that each one of them gets a copy of the rate. See Figure [4-14](#A337882_1_En_4_Chapter.html#Fig14).


    ![A337882_1_En_4_Fig14_HTML.jpg](A337882_1_En_4_Fig14_HTML.jpg)


    Figure 4-14. STS Boot Dashboard running two instances of the `jms-topic-subscriber`
    project


    ## Currency Project


    What do we need to do in order to use the currency project and start listening
    for new rates from other clients? The solution is already in the `rest-api-jms`
    project. This is what you need to do:


    - Make sure you have the `application.properties`, `spring.activemq.*`, and `rate.jms.*`
    properties enabled.

    - Review the `RateJmsReceiver` class and comment/uncomment out the listener you
    want to use (we have the simple listener and the listener with the `reply-to`).

    - Review the `RateJmsConfiguration` class that has the JSON converter.


    As homework, try to make it run. Remember that you will need to have the ActiveMQ
    broker up and running. Also, as an extra step, try to make this project topic-aware.


    ## Summary


    This chapter showed you how to use Spring Boot to send and receive messages using
    the JMS technology.


    You saw the different JMS messaging models and what developers need to do to send
    or receive messages.


    With Spring Boot, you saw how easy it is to set up a JMS client and how, with
    simple annotations, you can have a functional application that uses JMS as a messaging
    system. Even though you just saw how to use Apache ActiveMQ as the broker, the
    same programming can be applied to HornetQ, IBM MQ, etc., just by providing the
    correct properties (connection factories and message listeners) in the `application.properties`
    file.


    The next chapter discusses a different way to do messaging, using the Advanced
    Messaging Queuing Protocol—AMQP.


    # 5. AMQP with Spring Boot


    This chapter talks about the Advanced Messaging Queuing Protocol (AMQP), which
    is an agnostic message protocol. You’ll learn how to use the Spring AMQP module,
    which will talk to a RabbitMQ broker. RabbitMQ is one of the most commonly used
    brokers around the globe, and this is because it’s easy to install and use. The
    best part is that it’s open source.


    AMQP comes from the financial sector and was created in 2003 by JPMorgan Chase.
    More companies then worked around it to enhance this new way to do messaging.
    Rabbit Technologies implemented AMQP with the Erlang programming language, and
    that’s how RabbitMQ was born. Years later, VMware/Pivotal acquired it.


    We are going to continue with some important definitions that will help you understand
    more about AMQP and RabbitMQ. This chapter uses the `amqp-demo` and `rest-api-amqp`
    projects. This chapter has all the code related to the `amqp-demo` and I’ll let
    you dig into the `rest-api-amqp` project to complete the main requirement, which
    is to receive new rates from RabbitMQ and send them to interested consumers.


    **Note:** It’s important to have the RabbitMQ server up and running for this chapter.
    You can download it from [http://www.rabbitmq.com/download.html](http://www.rabbitmq.com/download.html).
    Make sure you have at least the `rabbitmq_management` plugin installed, as it
    enables a web UI management for RabbitMQ. Once you have this set up, you can open
    your browser and point to `http://localhost:15672` using `guest` as the username
    and password. More info about this web UI plugin can be found at [http://www.rabbitmq.com/management.html](http://www.rabbitmq.com/management.html).


    ## The AMQP Model


    This section covers the AMQP 0.9.1 model. Right now, this particular version is
    the most common.


    The AMQP model is made up of messages that are published to exchanges. These exchanges
    distribute the messages to queues based on bindings (rules). The consumers then
    fetch/pull messages from these queues. See Figure [5-1](#A337882_1_En_5_Chapter.html#Fig1).


    ![A337882_1_En_5_Fig1_HTML.jpg](A337882_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. The AMQP model


    You are going to see that normally as a producer or consumer, you are required
    to create a connection to the broker and then use a channel (main transport) to
    publish a message to an exchange or consume a message from the queue. In other
    words, the AMQP protocol specifies multiplexed connections through channels.


    The AMQP model has different features that allow the developer a lot of flexibility
    at the time of creating messaging applications. These features include message
    attributes (content-type, encoding, routing key, delivery mode, etc.), message
    acknowledgements, message rejection, message re-queue, multiplexed connection
    (channels), virtual hosts (to host isolated environments), multiple clients, and
    routing capabilities, among others.'
