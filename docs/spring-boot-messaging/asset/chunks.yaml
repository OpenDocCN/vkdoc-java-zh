  trans: "\n## 使用 Spring Boot 构建 Restful API\n\nSpring Boot 的一个重要特性是，你可以创建可执行的 JAR\
    \ 文件，并通过执行 `java -jar yourapp.jar` 来运行它们。你还可以创建可独立运行（使用 WAR 中的嵌入式容器）的可执行 WAR 文件，或者将其部署到\
    \ Servlet 容器中，而无需在代码中进行任何修改。\n\n本节将向你展示一个 Restful API，它能够根据国家代码列出货币及其汇率。该项目是一个\
    \ Spring Boot Web 应用程序。\n\n注意\n\n你可以在 [`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)\
    \ 找到所有源代码的下载链接。\n\n我将向你展示该应用程序的一些代码片段，以便你了解 Spring Boot 如何以极少的代码且无需配置文件就能实现的功能。\n\
    \n我假设你已经拥有了代码。我建议你使用 STS（Spring Tool Suite），你可以从 [`https://spring.io/tools/sts/all`](https://spring.io/tools/sts/all)\
    \ 获取。我使用这个 IDE 是因为它在运行 Spring Boot 方面有非常好的特性，并且你看到的所有截图都是基于这个 IDE 的，但你可以选择任何你喜欢的\
    \ IDE。\n\n### rest-api-demo 项目\n\n该项目是一个 Spring Boot Web 应用程序，它将暴露 Restful 端点，用于显示某个国家的货币以及其他国家的汇率。该项目位于名为\
    \ `ch02` 的文件夹中。\n\n该项目还使用了带有内存数据库（使用 H2 引擎）的 JPA（Java Persistence API）以及 AOP（面向切面编程）。暴露的端点列在表\
    \ 2-1 中。\n\n表 2-1.\n\nRestful 端点\n\n| 方法 | 路径 | 描述 |\n| --- | --- | --- |\n| `GET`\
    \ | `/currency/latest[?base=<code>]` | 以 JSON 格式显示最新汇率。默认基准货币为 USD。 |\n| `GET`\
    \ | `/currency/{date}[?base=<code>]` | 根据日期（格式：yyyy-MM-dd）以 JSON 格式显示汇率。 |\n|\
    \ `GET` | `/currency/{amount}/{base}/to/{code}` | 根据金额、基准货币和目标货币代码显示换算结果。 |\n\
    | `POST` | `/currency/new` | 按日期添加新汇率。请求体应为 JSON 格式。 |\n\n清单 2-1 展示了一个 JSON 响应的示例。你也可以为某些端点使用\
    \ `base` 参数。\n\n```\n{\n\"base\": \"USD\",\n\"date\": \"2016-09-22\",\n\"rates\"\
    : [\n{\n\"code\": \"EUR\",\n\"rate\": 0.88857\n},\n{\n\"code\": \"JPY\",\n\"rate\"\
    : 102.17\n},\n{\n\"code\": \"MXN\",\n\"rate\": 19.232\n},\n{\n\"code\": \"GBP\"\
    ,\n\"rate\": 0.75705\n}\n]\n}\n清单 2-1.\nJSON 货币响应 - /currency/latest\n```\n\n\
    清单 2-1 展示了通过访问 `/currency/latest` 端点得到的结果响应。它显示了基准货币（此处为美元）以及用 1 美元可以从其他国家获得的所有汇率（货币）。\n\
    \n对于换算，你可以请求端点 `/currency/{amount}/{base}/to/{code}`。假设你想知道 10 美元等于多少日元。可以这样发起请求：`/currency/10/usd/to/jpy`。你应该会得到如清单\
    \ 2-2 所示的结果。\n\n```\n{\n\"base\": \"USD\",\n\"code\": \"JPY\",\n\"amount\": 10.0,\n\
    \"total\": 1021.69995\n}\n清单 2-2.\n换算响应 - /currency/10/usd/to/jpy\n```\n\n清单 2-2\
    \ 展示了换算端点的结果。让我们来查看其他文件。\n\n#### pom.xml 文件\n\n打开 `pom.xml` 文件并查看其内容。让我们来回顾一下这些标签及其含义：\n\
    \n*   `<packaging/>` 标签的值为 WAR。打包此应用程序时，它将生成一个可执行且可部署到任何 Servlet 容器的 WAR 文件。\n\
    \n    ```\n    war\n    ```\n\n*   `<parent/>` 标签是 Spring Boot 能够运行的关键，因为它包含了应用程序所需的所有依赖项和版本。它基于\
    \ Maven 的 BOM（物料清单）功能。因此，这个特定的标签始终存在于你的 Spring Boot 应用程序中非常重要。\n\n    ```\n  \
    \  org.springframework.boot\n    spring-boot-starter-parent\n    1.4.0.RELEASE\n\
    \n    ```\n\n*   `<dependencies/>` 标签包含了 Spring Boot 应用程序中的所有依赖项。当你选择 Web 依赖项（使用命令行或\
    \ Spring starter）时，`spring-boot-web-starter` 依赖项会被添加到这个 `pom` 中。这类似于当你将项目选择为 WAR\
    \ 类型时，`spring-boot-starter-tomcat` 依赖项会被添加。默认情况下，你总是拥有 `spring-boot-starter-test`\
    \ 依赖项。\n\n    ```\n\n    org.springframework.boot\n    spring-boot-starter-web\n\
    \n    org.springframework.boot\n    spring-boot-starter-tomcat\n    provided\n\
    \n    org.springframework.boot\n    spring-boot-starter-data-jpa\n\n    com.h2database\n\
    \    h2\n    runtime\n\n    org.springframework.boot\n    spring-boot-starter-aop\n\
    \n    org.springframework.boot\n    spring-boot-starter-test\n    test\n\n   \
    \ ```\n\n让我们花点时间看看 `<dependencies/>` 标签。如果你熟悉使用 Maven 创建项目的方式，你现在应该会发现 `<dependency/>`\
    \ 标签中缺少了一个标签。没错，`<version/>` 标签不见了。这个版本不再使用，因为 `<parent/>` 标签的定义包含了你在 Web 应用程序中将使用的所有版本和依赖项。\n\
    \n请注意，`spring-boot-starter-tomcat` 的作用域被设置为 provided，这意味着你可以创建一个可运行的 WAR（可以使用\
    \ `java -jar <war-name>.war` 运行）并将其部署到任何 Servlet 容器中。\n\n请注意你创建 Spring Boot 应用程序时使用的命名约定——每个\
    \ `<groupId/>` 标签都是 `org.springframework.boot`，而 `<artifactId/>` 标签是 `spring-boot-starter-<technology>`。\n\
    \n为什么这很重要？请记住，Spring Boot 是一种有主见的技术，因此基于这个 `pom` 和 `spring-boot-starter`，它将识别出你正在尝试运行哪个应用程序。\n\
    \n#### Rate.java 类\n\n这将是领域类。它包含一个将其定义为实体的注解。这是因为这个类将被持久化到 H2 引擎（内存数据库）中。参见清单\
    \ 2-3。\n\n```\n@Entity\npublic class Rate {\n@Id\nprivate String code;\nprivate\
    \ Float rate;\n@JsonIgnore\n@Temporal(TemporalType.DATE)\nprivate Date date;\n\
    // Setters and Getters omitted.\n}\n清单 2-3.\nsrc/main/java/com/apress/messaging/domain/Rate.java\n\
    ```\n\n清单 2-3 向你展示了领域类——这里使用了 `@Entity` 和 `@Id` 注解——这与 JPA 技术（Spring Data JPA）相关。如你所见，它非常基础，没有什么太复杂的。\n"
- fmt: '### The `RateRepository.java` Class


    Next is the `RateRepository` interface, which is based on the Spring Data JPA
    technology, where you need to extend from the `JpaRepository<E,ID>` and add the
    entity (domain) and the ID class type (`String`, a serializable class) that will
    be used for persistence. See Listing [2-4](#A337882_1_En_2_Chapter.html#Par44).


    ```

    @Repository

    public interface RateRepository  extends JpaRepository{

    List findByDate(Date date);

    Rate findByDateAndCode(Date date,String code);

    }

    Listing 2-4.

    src/main/java/com/apress/messaging/repository/RateRepository.java

    ```


    Listing [2-4](#A337882_1_En_2_Chapter.html#Par44) shows you the `RateRepository`
    interface. You can see the `@Repository` annotation (this is just a marker for
    the Spring container); the important part is that you need to extend from the
    `JpaRepository` interface. This interface will implement all the CRUD (Create,
    Read, Update and Delete) actions for you, so you don’t have to implement them.
    Two query methods are defined—`findByDate` (looks for the rates that have that
    date) and `findByDateAndCode` (looks for a specific date and code). What makes
    this interface special is that you can create a SQL query by using the properties
    of the domain class. If you want to learn more about Spring Data JPA, go to [`http://docs.spring.io/spring-data/jpa/docs/current/reference/html/`](http://docs.spring.io/spring-data/jpa/docs/current/reference/html/).


    ### The `CurrencyController.java` Class


    This class defines the REST endpoints. It uses the `RateRepository` interface
    through a service. See Listing [2-5](#A337882_1_En_2_Chapter.html#Par47).


    ```

    @RestController

    @RequestMapping("/currency")

    public class CurrencyController {

    @Autowired

    CurrencyConversionService service;

    @RequestMapping("/latest")

    public ResponseEntity getLatest(@RequestParam(name="base",defaultValue=CurrencyExchange.BASE_CODE)String
    base) throws Exception{

    //...

    }

    @RequestMapping("/{amount}/{base}/to/{code}")

    public ResponseEntity conversion(@PathVariable("amount")Float amount,@PathVariable("base")String
    base,@PathVariable("code")String code) throws Exception{

    //...

    }

    //More methods here...

    }

    Listing 2-5.

    src/main/java/com/apress/messaging/controller/CurrencyController.java

    ```


    Listing [2-5](#A337882_1_En_2_Chapter.html#Par47) shows you a snippet of the `CurrencyController`
    class, which uses the Spring MVC `@RestController`, `@RequestMapping`, `@RequestParam`,
    and `@PathVariable` annotations. Every response is based on the `ResponseEntity`
    class.


    This is pure Spring MVC (not too much Spring Boot). If you want to know more about
    Spring MVC, visit [`http://docs.spring.io/spring/docs/current/spring-framework-reference/html/mvc.html`](http://docs.spring.io/spring/docs/current/spring-framework-reference/html/mvc.html).


    Review this class and experiment with it.


    ### The `RestApiDemoApplication.java` Class


    This class is the main entry point of the web application. See Listing [2-6](#A337882_1_En_2_Chapter.html#Par52).


    ```

    @SpringBootApplication

    public class RestApiDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(RestApiDemoApplication.class, args);

    }

    @Bean

    public CommandLineRunner data(RateRepository repository) {

    return (args) -> {

    repository.save(new Rate("EUR",0.88857F,new Date()));

    repository.save(new Rate("JPY",102.17F,new Date()));

    repository.save(new Rate("MXN",19.232F,new Date()));

    repository.save(new Rate("GBP",0.75705F,new Date()));

    };

    }

    }

    Listing 2-6.

    src/main/java/com/apress/messaging/RestApiDemoApplication.java

    ```


    Listing [2-6](#A337882_1_En_2_Chapter.html#Par52) shows you the main class, where
    Spring Boot will bootstrap the application. `@SpringBootApplication` is a required
    annotation for every Spring Boot app, because it will trigger all the magic behind
    Spring Boot. This annotation will use the auto-configuration feature to determine
    your app and the best configuration for it. In this case, because you have the
    `spring-boot-starter-web` dependency (in your classpath through your `pom.xml`
    file), it will set up all the necessary beans (like the `DispatcherServlet`) and
    the embedded servlet container (Tomcat by default) to configure your web app.


    Notice the `@Bean`, which returns a `CommandLineRunner` interface. This will be
    executed after the Spring container is ready with all your beans, and it will
    use the `RateRepository` interface to save the rate. You can see this as a way
    to initialize your database.


    ### Other Files…


    Of course, there are more classes, but the idea here is for you to experiment
    with them and see what they do and how they are used in the project. Look at the
    `CurrencyConversionService` class, which is used in the web controller.


    If you want to see how the AOP is being used in this project, look at the `CurrencyCodeAudit`
    class. It’s defining an `around` advice that will be executed only when an `@ToUpper`
    annotation is found in a method. (You can get the code from this annotation in
    the book’s source code.) Why do you need to use this aspect? Well, if you look
    at the conversion endpoint, you are expecting a capital case (for the base and
    the code, `/150/USD/to/JPY`), but with this approach, you can ignore it. Removing
    `@ToUpper` from the `CurrencyConversionService` methods, such as `/150/usd/to/jpy`,
    doesn’t work, because it’s evaluating just the capital letters for the base and
    code. You instead need to add extra code to support it.


    ## Running the Spring Boot Currency Web App


    There are different ways to run a project like this. If you use the STS and import
    the project, you can simply right-click the project’s name and choose Run As -->
    Spring Boot App, and that’s it!


    If you want to run it using the command line, make sure you have Maven installed
    and execute:


    ```

    $ mvn spring-boot:run

    ```


    Then you can go to your browser and type `http://localhost:8080/currency/latest`
    and you should get the same result as shown in Listing [2-1](#A337882_1_En_2_Chapter.html#Par24).
    You can also use the `curl` command:


    ```

    $ curl http://localhost:8080/currency/latest

    ```


    As you can see, you don’t need to create a WAR and deploy it to a container, because
    Spring Boot comes with an embedded Tomcat container. This allows you to have portability.


    ## Deploying the Spring Boot Currency Web App


    If you want to deploy this code to a servlet container, you need to package this
    project. If you are using the STS, you can right-click over the project and select
    Run As --> Maven Build. This will bring up a dialog box. In the Goals field, enter
    Package and then check the Skip Test check box. You can then click Run. This will
    create an executable and deployable way to the target directory.


    If you are using the command line, you can execute:


    ```

    $ mvn package -DskipTests=true

    ```


    This will create the executable and deployable WAR in the target directory. You
    can execute the WAR by running the following command:


    ```

    $ java -jar target/rest-api-demo-0.0.1-SNAPSHOT.war

    ```


    If you already have, for example, a Tomcat container, you can just drop the WAR
    file in the `webapps/` folder and run your container. Try to rename the war when
    you are copying/moving it.


    ```

    $ cp target/rest-api-demo-0.0.1-SNAPSHOT.war /opt/tomcat/webapps/rest-api-demo.war

    $ /opt/tomcat/bin/startup.sh

    ```


    Then you can open your browser and go to `http://localhost:8080/rest-api-demo/currency/latest`
    to get the same results.


    ## More About Spring Boot


    If you want to learn more about Spring Boot and its other useful features, I recommend
    my other book, Pro Spring Boot from Apress. It takes a more in-depth approach
    to this technology, from using the Spring Boot CLI through deploying it into the
    cloud.'
