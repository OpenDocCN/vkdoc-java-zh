    ```


    清单[10-4](#A337882_1_En_10_Chapter.html#Par46)向你展示了`Reactor`的方式，使用`Flux`和`subscribe`方法调用来处理基于推送的数据流。`Flux`表示一个包含0到N个项目的响应式序列（在本例中为汇率）。


    在幕后，`Flux`被描述为`Flux<T>`，并实现了`Publisher<T>`接口。该接口是一个无限数量有序元素的提供者，并根据其订阅者的需求发布这些元素。一个发布者可以以动态方式在不同时间点为多个订阅者（`Subscriber<T>`接口）提供服务。


    让我们看看服务。打开`com.apress.messaging.service.ExchangeService`类。参见清单[10-5](#A337882_1_En_10_Chapter.html#Par50)。


    ```

    @Service

    public class ExchangeService {

    private static final Logger log =

    LoggerFactory.getLogger(ExchangeService.class);

    private Exchange exchange;

    ExchangeService() {

    log.info(">>> Exchange Service created.");

    @SuppressWarnings({ "serial" })

    SortedMap rates =

    new TreeMap() {

    {

    put("EUR", 0.942013F);

    put("JPY", 114.75440909F);

    put("MXN", 19.598225F);

    put("GPB", 0.819626F);

    }

    };

    exchange = new Exchange(rates, new Date());

    }

    public Flux getExchangeRates(){

    return Flux.create( sink -> {

    while(true){

    Float factor =

    (new Random().nextFloat() * 2 - 1) / 10F;

    sink.next(

    new Exchange(

    exchange

    .getRates()

    .entrySet()

    .stream()

    .collect(

    Collectors.toMap(

    entry -> entry.getKey(),

    entry -> entry.getValue() * factor + entry.getValue(),

    (v1, v2) -> {

    throw new RuntimeException(

    String.format("Duplicate key for values %s and %s", v1, v2));

    }, TreeMap::new)), new Date()));

    sleep(1000);

    if(factor > 0.095F)

    sink.complete();

    }

    });

    }

    private void sleep(int ms) {

    try {

    Thread.sleep(ms);

    } catch (Exception ex) { }

    }

    }

