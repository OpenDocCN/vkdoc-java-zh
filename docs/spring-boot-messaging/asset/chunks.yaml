    @Override

    public void onMessage(Message message) {

    //在此处处理消息

    }

    };

    // 步骤 6. 注册监听器

    subscriber.setMessageListener(listener);

    清单 4-5.

    发布者-订阅者模式中的订阅者客户端

    ```


    清单 4-5 展示了发布者-订阅者消息客户端；该客户端订阅了名为 `myTopic` 的主题。你可以使用此代码运行多个客户端，每个客户端都会收到来自发布者的消息；同样，这与点对点模型差别不大。当然，这些客户端仍然需要
    `jndi.properties` 文件。


    如你所见，两种消息模型的实现都非常直接。如果你仔细查看任何一段代码，你会发现每次发送的消息都只是文本消息，但如果你需要发送其他内容呢？JMS 支持不同的消息类型：


    *   `StreamMessage` 是一个序列化的流对象。

    *   `MapMessage` 由名称/值对组成，类似于哈希表。

    *   `TextMessage` 是一个字符串。

    *   `ObjectMessage` 是一个可序列化的对象。

    *   `ByteMessage` 是一个原始的字节流。


    作为练习，尝试使用这些代码片段创建一些客户端（点对点或发布者-订阅者模型）。目的是让你熟悉如何使用这类消息传递。


    我刚刚向你简要介绍了在不使用外部框架的情况下，通常如何使用 JMS。我认为即使只是做一些简单的事情，也需要很多步骤。


    ## 使用 Spring Boot 的 JMS


    第 2 章向你展示了 Spring Boot 如何了解你正在尝试运行的应用程序，因为它是一种有主见的技术。只需添加一个 `spring-boot-starter`
    pom，你就可以告诉 Spring Boot 如何配置一切，对吧？


    我们将在本例中使用 Apache ActiveMQ（欢迎你使用任何其他代理；代码将是相同的），这意味着我们可以包含 `spring-boot-starter-activemq`
    依赖项。通过添加此依赖项，Spring Boot 将引入应用程序所需的所有 JMS 和 ActiveMQ（JAR 文件），并将自动配置 JMS 客户端所需的所有必要属性和额外配置。


    还记得你在 Java 中需要执行的所有步骤吗？使用 Spring Boot 则无需这些步骤。


    注意


    我们将使用更多依赖项，例如 AOP，来处理一些日志记录问题。请查看本章项目中的 `pom.xml` 文件。


    我们将使用 `jms-sender` 项目，你可以在本书的源代码中找到它。该项目包含许多类，其中一些代码被注释掉了，只需取消注释，它就应该能工作。不过别担心，我将在接下来的章节中通过解释每一段代码来指导你。


    注意


    请记住，你可以从 Apress 网站或直接从 GitHub 仓库 [`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)
    获取所有代码。

    '
- fmt: '### Producer


    Let’s start by reviewing the producer using Spring Boot. Open the `com.apress.messaging.jms.SimpleSender.java`
    class. See Listing [4-6](#A337882_1_En_4_Chapter.html#Par34).


    ```

    @Component

    public class SimpleSender {

    private JmsTemplate jmsTemplate;

    @Autowired

    public SimpleSender(JmsTemplate jmsTemplate){

    this.jmsTemplate = jmsTemplate;

    }

    public void sendMessage(String destination,

    String message){

    this.jmsTemplate.convertAndSend(destination, message);

    }

    }

    Listing 4-6.

    com.apress.messaging.jms.SimpleSender.java

    ```


    Listing [4-6](#A337882_1_En_4_Chapter.html#Par34) shows you the simplest and easiest
    way to create a producer. Let’s analyze each part of the code:


    *   `@Component`: This annotation, as you probably already know, marks the class
    as a Spring bean, making it available at runtime.

    *   `JmsTemplate`: This is the most important piece of the client, because this
    class will send a message (among other things) to the JMS provider/broker.

    *   `@Autowired`: This annotation is used in the class constructor to inject the
    `JmsTemplate` bean (described before). You can even omit this annotation and Spring
    will figure out that you need this dependency here.

    *   `convertAndSend`: The `JmsTemplate` instance has this method and it converts
    the message. Because this is a string, it’s converted automatically into a `javax.jms.TextMessage`
    and is sent to the destination, which is normally a queue.


    Before you run this part of the code, let’s examine the main application. Open
    the `com.apress.messaging.JmsSenderApplication.java` class, as shown in Listing
    [4-7](#A337882_1_En_4_Chapter.html#Par41).


    ```

    @SpringBootApplication

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    @Bean

    CommandLineRunner simple(JMSProperties props,

    SimpleSender sender){

    return args -> {

    sender.sendMessage(props.getQueue(), "Hello World");

    };

    }

    }

    Listing 4-7.

    com.apress.messaging.JmsSenderApplication.java

    ```


    Listing [4-7](#A337882_1_En_4_Chapter.html#Par41) shows you the main application.
    Let’s consider each part:


    *   `@SpringBootApplication`: You already know this annotation. It’s the way that
    Spring Boot identifying what type of application you are trying to run.

    *   `simple(JMSProperties,SimpleSender)`: This method is executed when the Spring
    container is ready to be used and will inject a `JMSProperties` and the `SimpleSender`
    beans for its use.

    *   `JMSProperties`: This class is used as a properties holder that reads the
    `application.properties` file and looks for the `apress.jms.queue` property (in
    this case set to `jms-sender`). If you want to know more, you can read more about
    it in the “Externalized Configuration” section in the Spring Boot reference.


    Now you are ready to run this. (You can run it using the command line with Maven:
    `$ mvn spring-boot:run` or if you imported it into the STS, you can run it within
    the Boot Dashboard.) Once you run it, you will see something similar to Figure
    [4-3](#A337882_1_En_4_Chapter.html#Fig3).


    ![A337882_1_En_4_Fig3_HTML.jpg](A337882_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    JmsSenderApplication logs


    Figure [4-3](#A337882_1_En_4_Chapter.html#Fig3) shows you the logs once the application
    is running. The code is actually sending the message `"Hello World"` to the `jms-demo`
    queue. This means that you will see the `JMSAudit` text with some extra information.
    Where did I actually print this? Review the `com.apress.messaging.aop.JMSAudit.java`
    class. This class is an Around advice that is normally used for logging purposes.
    I know that for this example it’s too much, but it gives me more ways to explore
    AOP.


    You can see that this client is sending a message, but where is it? You know that
    we are using the `spring-boot-starter-activemq` dependency, but there doesn’t
    seem to be any broker running. Where is it?


    Remember that Spring Boot makes opinions based on your classpath dependencies,
    so by knowing that you have the `spring-boot-starter-activemq` dependency, it
    will see if you already have declared beans of type `connectionFactory`, `session`,
    `sender`, etc., so it can use them. If Spring Boot doesn’t find anything, it will
    create all these by default and it will use the in-memory provider (the URL is
    `vm://localhost`). That’s why there is no error at runtime and you can see that
    the message is sent.'
