  trans: '

    ## 摘要


    本章介绍了 Spring Boot，探讨了其部分特性，并通过创建一个简单的货币 Restful 应用，解释了它如何与 Spring MVC 协同工作。


    在下一章中，你将开始学习 Spring 应用事件和监听器，这是一种通过观察者模式发射和消费消息来实现消息传递的方式。


    # 3. 应用事件


    本章涵盖如何使用观察者模式（行为型模式）作为向需要者或监听者发送消息的方式。同时展示了 Spring 框架如何通过其应用事件实现该模式，这些事件可以声明为简单的接口实现，或使用专门的注解。


    ## 观察者模式


    该特定模式定义了对象之间的一对多依赖关系，因此当一个对象（主体）改变其状态时，需要将这一变化通知给其他对象（观察者）。随后观察者可以对该变化做出响应，如图
    3-1 所示。


    ![A337882_1_En_3_Fig1_HTML.gif](img/A337882_1_En_3_Fig1_HTML.gif)


    图 3-1.


    观察者模式


    实现这种设计模式有多种方式。Java SDK 包含了 `java.util.Observable` 类，用于设置变更并通知观察者，以及 `java.util.Observer`
    接口，该接口通过其 `update` 方法接收通知。


    Spring 框架提供了一种精妙的方式来使用观察者模式，并且较新版本（4.x）的 Spring 还包含了更多改进。它们不仅实现了该模式，还提供了多种事件，允许你更深入地了解
    Spring 容器的内部机制，并创建自定义事件。


    请记住，尽管我们讨论的是观察者模式和事件，但这本质上是一种通过事件进行消息传递的组件间通信方式。


    ## Spring 应用事件


    你会发现 Spring 框架暴露了抽象的 `org.springframework.context.ApplicationEvent` 类，它继承自 `java.util.EventObject`。`EventObject`
    包含事件最初发生的对象。参见图 3-2。


    ![A337882_1_En_3_Fig2_HTML.jpg](img/A337882_1_En_3_Fig2_HTML.jpg)


    图 3-2.


    Spring 应用事件层次结构


    图 3-2 展示了 `ApplicationEvent` 的层次结构，如你所见，该类被多个事件扩展。至少有两个重要事件值得提及：


    *   `ApplicationContextEvent` `（属于 Spring 框架）`：这是一个抽象类，你可以完全访问主要的中央接口，该接口为你的应用提供完整配置。此类还被
    `ContextClosed`、`ContextStartedEvent`、`ContextRefreshedEvent` 和 `ContextStoppedEvent`
    事件扩展，以提供 Spring 容器生命周期的更多细节。

    *   `SpringApplicationEvent` `（属于 Spring Boot）`：这也是一个抽象类，通过 `SpringApplication`
    类包含 Spring Boot 应用的所有信息。`SpringApplication` 类用于从 Java main 方法引导和启动 Spring Boot
    应用。


    我选择这些事件是因为你正在进行的项目——货币兑换的 Rest API——会用到它们。本章稍后会详细介绍。


    ## Spring 应用监听器


    现在，对于每个事件，你应该有一种接收消息的方式。Spring 框架有一个主要的事件监听器。`org.springframework.context.ApplicationListener<E
    extends ApplicationEvent>` 接口继承自 `java.util.EventListener`（后者仅是一个标记接口）。`ApplicationListener`
    是所有 Spring `ApplicationContext` 事件的主要事件监听器，这些事件你在上一节已经了解过。参见图 3-3。


    ![A337882_1_En_3_Fig3_HTML.jpg](img/A337882_1_En_3_Fig3_HTML.jpg)


    图 3-3.


    ApplicationListener 接口及其层次结构


    图 3-3 展示了 `ApplicationListener` 的层次结构以及你可以使用的所有事件监听器。Spring 框架会在启动时、运行期间，甚至在 Spring
    应用正常关闭时发送相应的事件。当监听器被调用时，这些事件会被过滤以匹配事件对象。


    有许多用例可以让你使用 `ApplicationEvent` 或其某些实现来监听（通过 `ApplicationListener`）传入的消息并对其做出响应。例如，在下一节再次讨论的
    Rest API 货币项目中，你可以确定用户何时访问某些 Rest 端点，从而通过统计方式查看流量并识别哪个端点被更频繁地使用。

    '
- fmt: '# Rest API Currency Project


    Let’s go back to the project and apply this type of design pattern to it. By implementing
    only the `ApplicationListener` of the `ApplicationEvent` type, the application
    will start listening for every event that happens during the Spring container
    initialization and part of the Beans lifecycle.


    Take a look a Listing [3-1](#A337882_1_En_3_Chapter.html#Par16), which shows that
    the `RestApiEventsListener` class is a Spring component.


    ```java

    @Component

    public class RestApiEventsListener implements ApplicationListener{

    public void onApplicationEvent(ApplicationEvent event) {

    }

    }

    ```


    *Listing 3-1. `com.apress.messaging.listener.RestApiEventsListener.java`*


    Listing [3-1](#A337882_1_En_3_Chapter.html#Par16) shows you just part of the code
    where the `RestApiEventsListener` class implements the `ApplicationListener` of
    the `ApplicationEvent` event. You must implement the `onApplicationEvent` method
    that receives the `ApplicationEvent` as a parameter.


    Again, one use case would be to determine how many times a Rest endpoint is being
    accessed. Look at Figure [3-2](#A337882_1_En_3_Chapter.html#Fig2), where the `ApplicationEvent`
    hierarchy is—you will notice that there is a `RequestHandledEvent` and a `ServletRequestHandledEvent`
    that extends it. With the `ServletRequestHandledEvent` class, you can get the
    URL (endpoint) that is being accessed and create a counter for it. See Listing
    [3-2](#A337882_1_En_3_Chapter.html#Par19).


    ```java

    @Component

    public class RestApiEventsListener implements ApplicationListener{

    private static final String LATEST = "/currency/latest";

    @Autowired

    private CounterService counterService;

    @Log(printParamsValues=true)

    public void onApplicationEvent(ApplicationEvent event) {

    if(event instanceof ServletRequestHandledEvent){

    if(((ServletRequestHandledEvent)event)

    .getRequestUrl().equals(LATEST)){

    counterService

    .increment("url.currency.latest.hits");

    }

    }

    }

    }

    ```


    *Listing 3-2. `com.apress.messaging.listener.RestApiEventsListener.java`*


    Listing [3-2](#A337882_1_En_3_Chapter.html#Par19) shows a little more of the code.
    Let’s take a look at it:


    *   `ServletRequestHandledEvent`: This event is being published when there is
    a request to an endpoint. This is part of the web framework. This event contains
    all the web context information, which is why you can get the information about
    the URL being accessed.

    *   `CounterService`: This interface belongs to the `spring-boot-actuator` module,
    which allows you to have a metric by incrementing or decrementing a `tag/`property.
    In this case, the tag is `url.currency.latest.hits`.

    *   `@Log(printParamsValues=true)`: This is a custom annotation that will be used
    as part of the before advice that logs all the information about the method being
    called. You can see the code in the `com.apress.messaging.aop.CodeLogger.java`
    class.


    If you run the application, you will get some output generated from the `@Log`
    annotation (see Figure [3-4](#A337882_1_En_3_Chapter.html#Fig4)), but if you visit
    the `/currency/latest` endpoint a few times (see Figure [3-5](#A337882_1_En_3_Chapter.html#Fig5)),
    the application will start counting this endpoint as being accessed by using the
    `CounterService` instance. Then you can access this metric from the `/metrics`
    endpoint and see that the `url.currency.latest.hits` is being shown with the number
    of hits of that endpoint (see Figure [3-6](#A337882_1_En_3_Chapter.html#Fig6)).


    ![A337882_1_En_3_Fig6_HTML.jpg](A337882_1_En_3_Fig6_HTML.jpg)


    *Figure 3-6. `http://localhost:8080/metrics`*


    ![A337882_1_En_3_Fig5_HTML.jpg](A337882_1_En_3_Fig5_HTML.jpg)


    *Figure 3-5. Console logs after visiting the `/currency/latest` endpoint*


    ![A337882_1_En_3_Fig4_HTML.jpg](A337882_1_En_3_Fig4_HTML.jpg)


    *Figure 3-4. Console logs after running the rest-api-events project*


    Figure [3-4](#A337882_1_En_3_Chapter.html#Fig4) shows you some of the log output
    that you will see when running your application. These logs are the messages that
    the Spring Framework sends as `ApplicationEvent` events. Remember that this output
    is generated by the `@Log` annotation (a before AOP advice).


    Figure [3-5](#A337882_1_En_3_Chapter.html#Fig5) shows you some of the logs after
    accessing the `/currency/latest` endpoint a few times. You can see that the `ApplicationEvent`
    is an instance of the `ServletRequestedEvent`, which contains the requested URL.


    Figure [3-6](#A337882_1_En_3_Chapter.html#Fig6) shows you the `/metrics` endpoint
    (provided by the `spring-boot-actuator` dependency). At the bottom of the figure,
    you can see the `"counter.url.currency.latest.hits":4` metric, which is updated
    by the `CounterService` instance (see Listing [3-2](#A337882_1_En_3_Chapter.html#Par19)).'
