- fmt: "### Using Annotations\n\nSpring Integration includes integration annotations\
    \ that help you use POJO classes, so that you can add more business logic to your\
    \ flow and have a little more control.\n\nOpen the `com.apress.messaging.config.SimpleAnnotationConfiguration`\
    \ class. See Listing [8-5](#A337882_1_En_8_Chapter.html#Par56).\n\n```\n@Configuration\n\
    public class SimpleAnnotationConfiguration {\n@Bean\npublic MessageChannel input(){\n\
    return new DirectChannel();\n}\n@Bean\npublic MessageChannel toTransform(){\n\
    return new DirectChannel();\n}\n@Bean\npublic MessageChannel toLog(){\nreturn\
    \ new DirectChannel();\n}\n}\n@MessageEndpoint\nclass SimpleFilter {\n@Filter(inputChannel=\"\
    input\",outputChannel=\"toTransform\")\npublic boolean process(String message){\n\
    return \"World\".equals(message);\n}\n}\n@MessageEndpoint\nclass SimpleTransformer{\n\
    @Transformer(inputChannel=\"toTransform\",outputChannel=\"toLog\")\npublic String\
    \ process(String message){\nreturn \"Hello \".concat(message);\n}\n}\n@MessageEndpoint\n\
    class SimpleServiceActivator{\n@ServiceActivator(inputChannel=\"toLog\")\npublic\
    \ void process(String message){\n}\n}\nListing 8-5.\ncom.apress.messaging.config.SimpleAnnotationConfiguration.java\n\
    ```\n\nListing [8-5](#A337882_1_En_8_Chapter.html#Par56) shows you the same flow,\
    \ now using the integration annotations. Let’s look at it in detail:\n\n- `MessageChannel`:\
    \ This is an interface that defines methods for sending messages.\n- `DirectChannel`:\
    \ This is a message channel that invokes a single subscriber for each message\
    \ sent. This is normally used when you don’t require a message queue.\n- `@MessageEndpoint`:\
    \ This is a useful annotation that marks a class as an endpoint.\n- `@Filter`:\
    \ This annotation marks a method to perform the functionality of a message filter.\
    \ Normally you need to return a Boolean value.\n- `@Transformer`: This annotation\
    \ marks a method to perform the functionality of transforming a message, its header,\
    \ or the payload.\n- `@ServiceActivator`: This annotation marks a method as being\
    \ capable of handling a message. In this example, we just ended the flow. You\
    \ will see some output from this method thanks to the AOP logs included in this\
    \ example.\n\nTo run this example, just comment out the `@ImportResource` annotation\
    \ from the main class and that’s it. You should have logs similar to what’s shown\
    \ in Figure [8-5](#A337882_1_En_8_Chapter.html#Fig5).\n\n![A337882_1_En_8_Fig5_HTML.jpg](A337882_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5. Application logs for this example\n\nFigure [8-5](#A337882_1_En_8_Chapter.html#Fig5)\
    \ shows you the logs for each step where the configuration exposes the filter,\
    \ the transformer, and the service activator endpoints. I used separate classes\
    \ here, but of course you can use only one and expose all your methods with their\
    \ own annotations.\n\n### Using Java Config\n\nUsing Java Config is very similar\
    \ to what you just did, so you can simply change the last part of the flow. Comment\
    \ out the `SimpleServiceActivator` message endpoint and add the following code\
    \ to the end of the `SimpleAnnotationConfiguration` class:\n\n```\n@Bean\n@ServiceActivator(inputChannel\
    \ = \"toLog\")\npublic LoggingHandler logging() {\nLoggingHandler adapter = new\n\
    LoggingHandler(LoggingHandler.Level.INFO);\nadapter.setLoggerName(\"SIMPLE_LOGGER\"\
    );\nadapter.setLogExpressionString\n(\"headers.id + ': ' + payload\");\nreturn\
    \ adapter;\n}\n```\n\nThis code will create a `LoggingHandler` (this is the same\
    \ object that the XML will generate from the `logging-channel-adapter` tag). It\
    \ will log the `SIMPLE_LOGGER` message with the header’s ID and the payload, in\
    \ this case the `\"Hello World\"` message. Now try to send different words and\
    \ see if the filter works, or try to change the transformer.\n\nI know that this\
    \ is a trivial example, but it should give you an idea of how Spring Integration\
    \ works and how it can be configured. Clients often ask whether they can mix configurations.\
    \ Absolutely! You are going to see examples of that very soon.\n\n## File Integration\
    \ Example\n\nNext, let’s see how can you can integrate file reading, which is\
    \ a very common task of integration systems. Remember that this is one of the\
    \ most common use cases. Start by opening the `com.apress.messaging.config.SpiFileConfiguration`\
    \ class. It should look like Listing [8-6](#A337882_1_En_8_Chapter.html#Par71).\n\
    \n```\n@Configuration\n@EnableConfigurationProperties(SpiProperties.class)\npublic\
    \ class SpiFileConfigutation {\nprivate SpiProperties props;\nprivate PersonConverter\
    \ personConverter;\npublic SpiFileConfigutation(SpiProperties props,\nPersonConverter\
    \ personConverter){\nthis.props = props;\nthis.personConverter = personConverter;\n\
    }\n@Bean\npublic IntegrationFlow fileFlow(){\nreturn IntegrationFlows\n.from(Files.inboundAdapter(new\
    \ File\n(this.props.getDirectory())\n.preventDuplicates(true)\n.patternFilter(\n\
    this.props.getFilePattern()),\ne -> e.poller(Pollers.fixedDelay(5000L)))\n.split(Files.splitter().markers())\n\
    .filter(p -> !(p instanceof FileSplitter.FileMarker))\n.transform(Transformers.converter(personConverter))\n\
    .handle(\"simpleMessageHandler\",\"process\")\n.get();\n}\n}\nListing 8-6.\ncom.apress.messaging.config.SpiFileConfiguration.java\n\
    ```\n\nListing [8-6](#A337882_1_En_8_Chapter.html#Par71) shows you the integration\
    \ flow we are going to use in this example. This flow reads a file’s contents\
    \ (from the file system), converts the content into an object (in this case into\
    \ a `Person` object), and handles the message for any extra logic. Let’s analyze\
    \ this process in detail:\n\n- `from`: This is an overloaded method where you\
    \ normally pass the `MessageSource`. In this case, we are passing two values—the\
    \ `Files.inboundAdapter` and a `Consumer` that receives a `SourcePollingChannelAdapterSpec`.\
    \ In this case, we are using a Lambda expression to poll the file system for new\
    \ files every five seconds, by using the `Pollers` class.\n- `Files`: This is\
    \ a protocol adapter that works out of the box. You just need to configure it.\
    \ This adapter is used to pick up files from the file system. The `Files` class\
    \ belongs to the Spring Integration Java DSL and provides several useful methods:\n\
    \  - `inboundAdapter`: This adapter includes a fluent API that returns a `FileInboundChannelAdapterSpec`\
    \ that has methods like the following:\n    - `preventDuplicates`: You can avoid\
    \ reading the same file more than once by setting this to `true`.\n    - `patternFilter`:\
    \ This will help look for files have a certain name pattern. In this example,\
    \ we just read from the directory (from the `apress.spi.directory` property value)\
    \ and the name based on the pattern (from the `apress.spi.file-pattern` property\
    \ value), both from the `SpiProperties` class.\n- `split`: This method call indicates\
    \ that the parameter (it could be a bean, service, handler, etc.) can split into\
    \ a single message or message payload and produce multiple messages or payloads.\
    \ In this case, we are using a `FileMarker` that delimits the file data when there\
    \ is a sequential file process.\n- `filter`: Because we are using markers to see\
    \ each message start and end, we will receive the content of the file as a `FileMarker`\
    \ start, then the actual content, and finally the `FileMarker` end. That’s why\
    \ we are saying, just pass me the payload or content, not the marker.\n- `transform`:\
    \ Here we are using a `Transformers` class that transforms a message. Here we\
    \ are using a custom converter, which you can look at the code in the `com.apress.messaging.integration.PersonConverter.java`\
    \ class.\n- `handle`: Here we are using a class that will handle the message by\
    \ passing as the first parameter the name of the bean (`simpleMessageHandler`)\
    \ and the method that will take care of the process (`process`; you can look at\
    \ the code in the `com.apress.messaging.integration.SimpleMessageHandler.java`\
    \ class). The `SimpleMessageHandler` class is just a POJO marked with the `@Component`\
    \ annotation."
