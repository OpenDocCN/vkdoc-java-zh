- fmt: '### Custom Events


    So far, you have seen a way to create listeners for any `ApplicationEvent`, but
    what about when using custom events, ones that contain information about your
    domain object? This section shows you how to create a custom event.


    To create a custom event, you must extend from `ApplicationEvent` so it’s easy
    to publish it later.


    Using the current project, imagine that you will send an event when there’s an
    error (unchecked exception) during the call of any currency conversion. Maybe
    this will simply log the cause and show the object that caused the exception.
    Let’s start by reviewing the `CurrencyConversionEvent` class, as shown in Listing
    [3-3](#A337882_1_En_3_Chapter.html#Par31).


    ```

    package com.apress.messaging.event;

    import org.springframework.context.ApplicationEvent;

    import com.apress.messaging.domain.CurrencyConversion;

    public class CurrencyConversionEvent extends ApplicationEvent {

    private static final long serialVersionUID = -4481493963350551884L;

    private CurrencyConversion conversion;

    private String message;

    public CurrencyConversionEvent(Object source, CurrencyConversion conversion) {

    super(source);

    this.conversion = conversion;

    }

    public CurrencyConversionEvent(Object source, String message, CurrencyConversion
    conversion) {

    super(source);

    this.message = message;

    this.conversion = conversion;

    }

    public CurrencyConversion getConversion(){

    return conversion;

    }

    public String getMessage(){

    return message;

    }

    }

    ```


    Listing [3-3](#A337882_1_En_3_Chapter.html#Par31) shows you a basic class that
    extends from `ApplicationEvent` and has two constructors. Each constructor will
    call its parent (`ApplicationEvent`) to set the source, set the current `CurrencyConversion`
    instance, and determine the message. In other words, you have the information
    needed to determine the source of errors in any currency conversion call.


    Next, let’s review the event listener that will receive the `CurrencyConversionEvent`.
    See Listing [3-4](#A337882_1_En_3_Chapter.html#Par34).


    ```

    package com.apress.messaging.listener;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.context.ApplicationListener;

    import org.springframework.stereotype.Component;

    import com.apress.messaging.event.CurrencyConversionEvent;

    @Component

    public class CurrencyConversionEventListener implements ApplicationListener {

    private static final String DASH_LINE = "===================================";

    private static final String NEXT_LINE = "\n";

    private static final Logger log = LoggerFactory.getLogger(CurrencyConversionEventListener.class);

    @Override

    public void onApplicationEvent(CurrencyConversionEvent event) {

    Object obj = event.getSource();

    StringBuilder str = new StringBuilder(NEXT_LINE);

    str.append(DASH_LINE);

    str.append(NEXT_LINE);

    str.append("  Class: " + obj.getClass().getSimpleName());

    str.append(NEXT_LINE);

    str.append("Message: " + event.getMessage());

    str.append(NEXT_LINE);

    str.append("  Value: " + event.getConversion());

    str.append(NEXT_LINE);

    str.append(DASH_LINE);

    log.error(str.toString());

    }

    }

    ```


    Listing [3-4](#A337882_1_En_3_Chapter.html#Par34) shows you the listener that
    will receive all the `CurrencyConversionEvent` events. This class implements the
    `ApplicationListener` of type `CurrencyConversionEvent`, and it needs to implement
    the `onApplicationEvent`. As you can see, it is just logging the class, the message,
    and the `CurrencyConversion` domain object.


    Next, let’s see which class will be publishing the event when an error occurs.
    Let’s review our `CurrencyConversionService` and the `convertFromTo` method, which
    has logic to get the currency codes. See Listing [3-5](#A337882_1_En_3_Chapter.html#Par37).


    ```

    public CurrencyConversion convertFromTo(@ToUpper String base, @ToUpper String
    code,Float amount) {

    Rate baseRate = new Rate(CurrencyExchange.BASE_CODE,1.0F,new Date());

    Rate codeRate = new Rate(CurrencyExchange.BASE_CODE,1.0F,new Date());

    if(!CurrencyExchange.BASE_CODE.equals(base))

    baseRate = repository.findByDateAndCode(new Date(), base);

    if(!CurrencyExchange.BASE_CODE.equals(code))

    codeRate = repository.findByDateAndCode(new Date(), code);

    if(null == codeRate || null == baseRate)

    throw new BadCodeRuntimeException("Bad Code Base, unknown code: " + base, new
    CurrencyConversion(base,code,amount,-1F));

    return new CurrencyConversion(base,code,amount,(codeRate.getRate()/baseRate.getRate())
    * amount);

    }

    ```


    Listing [3-5](#A337882_1_En_3_Chapter.html#Par37) shows you the `convertFromTo`
    method, which is doing the conversion by finding the rates based on the `base`
    and `code` variables. The `if` statement will throw a `BadCodeRuntimeException`,
    which has a constructor that accepts a string and a `CurrencyConversion` object.
    `BadCodeRuntimeException` is the unchecked exception that extends from `RuntimeException`
    (you can review that in the source code).


    When the exception is thrown, we must publish the `CurrencyConversionEvent` and
    the error message, but adding this logic would mess up the code and soon we would
    have tangled, messy code. We can instead create an AOP that uses this exception
    when it’s thrown. Listing [3-6](#A337882_1_En_3_Chapter.html#Par40) uses an AOP
    to publish the `CurrencyConversionEvent` event after throwing the exception.


    ```

    @Aspect

    @Component

    public class CurrencyConversionAudit {

    private ApplicationEventPublisher publisher;

    @Autowired

    public CurrencyConversionAudit(

    ApplicationEventPublisher publisher){

    this.publisher = publisher;

    }

    @Pointcut("execution(* com.apress.messaging.service.*Service.*(..))")

    public void exceptionPointcut() {}

    @AfterThrowing(pointcut="exceptionPointcut()",

    throwing="ex")

    public void badCodeException(JoinPoint jp,

    BadCodeRuntimeException ex){

    if(ex.getConversion()!=null){

    publisher.publishEvent(

    new CurrencyConversionEvent(

    jp.getTarget(),

    ex.getMessage(),

    ex.getConversion()));

    }

    }

    }

    ```


    Listing [3-6](#A337882_1_En_3_Chapter.html#Par40) shows you `@AfterThrowing`,
    which knows about the `BadCodeRuntimeException` when it’s thrown, and then executes
    the code inside the method. As you can see, it uses the `ApplicationEventPublisher`
    instance (which is being injected by the Spring Framework in the class constructor)
    and the `publishEvent` method, which sends the information about the class where
    the exception occurred, the message, and the `CurrencyConversion` object.


    If you run the project and access `/{amount}/{base}/to/{code}` like this `/1.0/usdx/to/mx`,
    you will get something similar to Figure [3-7](#A337882_1_En_3_Chapter.html#Fig7).


    ![A337882_1_En_3_Fig7_HTML.jpg](A337882_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. Log error in the CurrencyConversionService


    As you can see, creating custom events is really easy. Remember these simple rules
    to use a custom event:


    *   Create an event class that extends from `ApplicationEvent`.

    *   Create an event listener class that implements the `ApplicationListener` of
    your custom event and implement the `onApplication` method.

    *   Use the `ApplicationEventPublisher` class to publish your custom event.


    ### Using Event Listeners with Annotations


    So far we have seen how to use and implement the `ApplicationListener` of type
    `ApplicationEvent`. This section shows you how to use some of the Spring-provided
    annotations as an easy way to listen for events.'
