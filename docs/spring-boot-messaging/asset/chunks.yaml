- fmt: '# What Microservices Are


    Microservices are not new; they have been around since the creation of UNIX. UNIX
    has many small programs (called commands) that do various tasks and can communicate
    with each other to create even better solutions. How do they do this?


    If you are an experienced UNIX programmer, you already know the answer. The way
    these commands communicate is through pipes, `|`, which allow UNIX to pass information
    to the next available program or command. For example:


    ```

    ls -al | grep Aug | grep -v ''200[456]'' | more

    ```


    If you now start thinking about your own systems and applications, how can you
    do the same? Can you create small domain-based applications that communicate with
    other applications?


    Microservices have gained a lot of enthusiasm among architects, developers and
    ops teams, but why do we need them? I think time is an essential part of the puzzle,
    because applications need to be fast, resilient, highly available, and scalable,
    all the while with high performance.


    - **Speed**: You need to deliver faster than your competitors. You can use microservices
    that help you deliver faster in time-to-market scenarios.

    - **Safety**: You need to maintain stability, availability, and durability in
    whole development cycle, through monitoring, isolation, tolerance, and auto-recovery
    practices. Start thinking about continuing delivery and integration.

    - **Scalability**: Vertical scaling (that is, buying more hardware) doesn’t scale
    well. Use commodity hardware, reuse what you have and scale horizontally, and
    create multiple instances of the same application. Use containers to help you
    scale.

    - **Mobility**: Prepare to support multiple devices, from any location at any
    time. Mobile devices connect to the Internet, not only for social media, emails,
    and chats, but also for monitoring houses, engines, and more.


    Everything seems to make sense, right? But I haven’t explained how a microservice
    can communicate with multiple other microservices. Messaging is the key! Many
    companies use RESTful APIs to communicate with other systems or programs, even
    legacy systems, by creating decorators, translators or facades, but you have more
    options for communication, including HTTP, TCP (Web Socket, AMQP), Reactive Streams,
    and more.


    The basic guides for creating microservices in a simple way are called the twelve-factor
    app principles.


    ## The Twelve Factor Apps


    To outline what you need to create a cloud-native architecture, the engineers
    at Heroku (see [`https://www.heroku.com/`](https://www.heroku.com/)) have identified
    patterns that have become the twelve-factor application guide (see [`https://12factor.net/`](https://12factor.net/)).
    This guide shows you how an application (a single unit) needs to be architected.
    It focuses on declarative configuration, being stateless, and being deployment
    independent. In other words, your applications need to be fast, safe, and scalable.


    Here’s a summary of the twelve-factor application guide:


    - **Codebase**: One codebase tracked in VCS, many deploys. One app has a single
    codebase and it’s tracked by a version control system like Git, Subversion, Mercurial,
    etc. You can do many deployments (from the same codebase) to the development,
    testing, staging, and production environments.

    - **Dependencies**: Explicitly declare and isolate dependencies. Sometimes your
    environments won’t have Internet connections (if it’s a private system), so you
    need to think about packaging your dependencies (jars, gems, shared libraries,
    etc.). If you have an internal repository of libraries, you can declare manifest-like
    poms, gemfiles, bundles, etc. Never assume that you will have everything in your
    final environment.

    - **Configuration**: Store the config in the environment. You shouldn’t hardcode
    anything that varies. Use the environment variables or a configuration server.

    - **Backing services**: Treat backing services as attached resources. Connect
    to services via URLs or the configuration.

    - **Build, release, run**: Strictly separate build and run stages. Related to
    CI/CD (Continuous Integration, Continuous Delivery).

    - **Processes**: Execute the app as one or more stateless processes. Processes
    should not store internal states. Share nothing. Any necessary state should be
    considered a backing service.

    - **Port binding**: Export services via port binding. Your application is a self-container,
    and these apps are exposed via port binding. An application can become another
    app service.

    - **Concurrency**: Scale out via the process model. Scale by adding more application
    instances. Individual processes are free to multithread.

    - **Disposability**: Maximize robustness with fast startup and graceful shutdown.
    Processes should be disposable (remember they are stateless) and fault tolerant.

    - **Environment parity**: Keep the development, staging, and production environments
    as similar as possible. In other words, take a look at the OS you install, and
    the frameworks, runtimes, or libraries versions you use. They must be the same
    on each environment. This is a result of high quality and ensures continuous delivery.

    - **Logs**: Treat logs as event streams. Your apps should write to `stdout`. Logs
    are streams of aggregated, time-ordered events.

    - **Admin processes**: Run admin and management tasks as one-off processes. Run
    admin processes on the platform: DB migrations, one-time scripts, etc.


    Some programmers think that you need to have a cloud infrastructure in place to
    use microservices, but in my opinion, you don’t need this. If you follow these
    principles, you will be ready to compete with bigger companies. When you are ready
    to move or switch to a better infrastructure, you are already there.


    If you want to start creating microservices and follow these twelve-factor principles,
    it’s not enough for a single or small team to create everything from scratch.
    You’ll face several changes:


    - **Cultural**: We need to move away from people silos and start creating cross-functional
    teams. They work better and are dedicated to solving one-domain business scenarios.
    Start thinking about continuous delivery, decentralize the decision-making, and
    look for team autonomy.

    - **Organizational**: Create business capability teams that are cross-functional.
    These teams have autonomy to make their own decisions. Create the platform team
    operations, which should also be cross-functional.

    - **Technical**: Get away from building monolith apps and get into microservice
    architectures. Think about bounded contexts. Follow some of the principles and
    practices of domain-driven design. Start by using containerization, to gain the
    isolation, scalability, and high performance of your app, then look for service
    integrations that give you control over distribution. See Figure [11-1](#A337882_1_En_11_Chapter.html#Fig1).


    ![A337882_1_En_11_Fig1_HTML.gif](A337882_1_En_11_Fig1_HTML.gif)


    Figure 11-1. Monolith approach versus using microservices


    ## Spring Cloud Services


    Spring Cloud Services are a set of tools/frameworks that develops microservice
    architectures easily, quickly, and safely. This section covers the most common
    Spring Cloud services: Spring Cloud Config, Service Registry, and Circuit Breaker.


    ### Spring Cloud Config Server


    The Config Server is an externalized application configuration service that gives
    you a central place to manage your application’s external properties across environments.
    See Figure [11-2](#A337882_1_En_11_Chapter.html#Fig2).


    ![A337882_1_En_11_Fig2_HTML.gif](A337882_1_En_11_Fig2_HTML.gif)


    Figure 11-2. Config Server


    You can use the Config Server during the development phase or with your pipeline
    (continuous delivery). You can manage every environment in a centralized way to
    access the common external configuration, without repackaging or redeploying.'
  raw: '## What Microservices Are


    Microservices are not new; they have been around since the creation of UNIX. UNIX
    has many small programs (called commands ) that do various tasks and can communicate
    with each other to create even better solutions. How do they do this?


    If you are an experienced UNIX programmer, you already know the answer. The way
    these commands communicate is through pipes, `|`, which allow UNIX to pass information
    to the next available program or command. For example:


    ```

    ls -al | grep Aug | grep -v ''200[456]'' | more

    ```


    If you now start thinking about your own systems and applications, how can you
    do the same? Can you create small domain-based applications that communicate with
    other applications?


    Microservices have gained a lot of enthusiasm among architects, developers and
    ops teams, but why do we need them? I think time is an essential part of the puzzle,
    because applications need to be fast, resilient, highly available, and scalable,
    all the while with high performance.


    *   Speed : You need to deliver faster than your competitors. You can use microservices
    that help you deliver faster in time-to-market scenarios.

    *   Safety : You need to maintain stability, availability, and durability in whole
    development cycle, through monitoring, isolation, tolerance, and auto-recovery
    practices. Start thinking about continuing delivery and integration.

    *   Scalability : Vertical scaling (that is, buying more hardware) doesn’t scale
    well. Use commodity hardware, reuse what you have and scale horizontally, and
    create multiple instances of the same application. Use containers to help you
    scale.

    *   Mobility : Prepare to support multiple devices, from any location at any time.
    Mobile devices connect to the Internet, not only for social media, emails, and
    chats, but also for monitoring houses, engines, and more.


    Everything seems to make sense, right? But I haven’t explained how a microservice
    can communicate with multiple other microservices. Messaging is the key! Many
    companies use RESTful APIs to communicate with other systems or programs, even
    legacy systems, by creating decorators, translators or facades, but you have more
    options for communication, including HTTP, TCP (Web Socket, AMQP), Reactive Streams,
    and more.


    The basic guides for creating microservices in a simple way are called the twelve-factor
    app principles.


    ## The Twelve Factor Apps


    To outline what you need to create a cloud-native architecture, the engineers
    at Heroku (see [`https://www.heroku.com/`](https://www.heroku.com/) ) have identified
    patterns that have become the twelve-factor application guide (see [`https://12factor.net/`](https://12factor.net/)
    ). This guide shows you how an application (a single unit) needs to be architected.
    It focuses on declarative configuration, being stateless, and being deployment
    independent. In other words, your applications need to be fast, safe, and scalable.


    Here’s a summary of the twelve-factor application guide:


    *   Codebase : One codebase tracked in VCS, many deploys. One app has a single
    codebase and it’s tracked by a version control system like Git, Subversion, Mercurial,
    etc. You can do many deployments (from the same codebase) to the development,
    testing, staging, and production environments.

    *   Dependencies : Explicitly declare and isolate dependencies. Sometimes your
    environments won’t have Internet connections (if it’s a private system), so you
    need to think about packaging your dependencies (jars, gems, shared libraries,
    etc.). If you have an internal repository of libraries, you can declare manifest-like
    poms, gemfiles, bundles, etc. Never assume that you will have everything in your
    final environment.

    *   Configuration : Store the config in the environment. You shouldn’t hardcode
    anything that varies. Use the environment variables or a configuration server.

    *   Backing services : Treat backing services as attached resources. Connect to
    services via URLs or the configuration.

    *   Build, release, run : Strictly separate build and run stages. Related to CI/CD
    (Continuous Integration, Continuous Delivery).

    *   Processes : Execute the app as one or more stateless processes. Processes
    should not store internal states. Share nothing. Any necessary state should be
    considered a backing service.

    *   Port binding : Export services via port binding. Your application is a self-container,
    and these apps are exposed via port binding. An application can become another
    app service.

    *   Concurrency : Scale out via the process model. Scale by adding more application
    instances. Individual processes are free to multithread.

    *   Disposability : Maximize robustness with fast startup and graceful shutdown.
    Processes should be disposable (remember they are stateless) and fault tolerant.

    *   Environment parity : Keep the development, staging, and production environments
    as similar as possible. In other words, take a look at the OS you install, and
    the frameworks, runtimes, or libraries versions you use. They must be the same
    on each environment. This is a result of high quality and ensures continuous delivery.

    *   Logs : Treat logs as event streams. Your apps should write to `stdout`. Logs
    are streams of aggregated, time-ordered events.

    *   Admin processes : Run admin and management tasks as one-off processes. Run
    admin processes on the platform: DB migrations, one-time scripts, etc.


    Some programmers think that you need to have a cloud infrastructure in place to
    use microservices, but in my opinion, you don’t need this. If you follow these
    principles, you will be ready to compete with bigger companies. When you are ready
    to move or switch to a better infrastructure, you are already there.


    If you want to start creating microservices and follow these twelve-factor principles,
    it’s not enough for a single or small team to create everything from scratch.
    You’ll face several changes:


    *   Cultural : We need to move away from people silos and start creating cross-functional
    teams. They work better and are dedicated to solving one-domain business scenarios.
    Start thinking about continuous delivery, decentralize the decision-making, and
    look for team autonomy.

    *   Organizational : Create business capability teams that are cross-functional.
    These teams have autonomy to make their own decisions. Create the platform team
    operations, which should also be cross-functional.

    *   Technical : Get away from building monolith apps and get into microservice
    architectures. Think about bounded contexts. Follow some of the principles and
    practices of domain-driven design. Start by using containerization, to gain the
    isolation, scalability, and high performance of your app, then look for service
    integrations that give you control over distribution. See Figure [11-1](#A337882_1_En_11_Chapter.html#Fig1)
    .


    ![A337882_1_En_11_Fig1_HTML.gif](A337882_1_En_11_Fig1_HTML.gif)


    Figure 11-1.


    Monolith approach versus using microservices


    ## Spring Cloud Services


    Spring Cloud Services are a set of tools/frameworks that develops microservice
    architectures easily, quickly, and safely. This section covers the most common
    Spring Cloud services: Spring Cloud Config, Service Registry, and Circuit Breaker.


    ### Spring Cloud Config Server


    The Config Server is an externalized application configuration service that gives
    you a central place to manage your application’s external properties across environments.
    See Figure [11-2](#A337882_1_En_11_Chapter.html#Fig2) .


    ![A337882_1_En_11_Fig2_HTML.gif](A337882_1_En_11_Fig2_HTML.gif)


    Figure 11-2.


    Config Server


    You can use the Config Server during the development phase or with your pipeline
    (continuous delivery). You can manage every environment in a centralized way to
    access the common external configuration, without repackaging or redeploying.'
  trans: '

    ## 什么是微服务


    微服务并非新鲜事物，自 UNIX 诞生以来就已存在。UNIX 拥有许多执行各种任务的小程序（称为命令），它们可以相互通信以创建更出色的解决方案。它们是如何做到的呢？


    如果你是一位经验丰富的 UNIX 程序员，你已经知道答案了。这些命令通过管道 `|` 进行通信，管道允许 UNIX 将信息传递给下一个可用的程序或命令。例如：


    ```

    ls -al | grep Aug | grep -v ''200[456]'' | more

    ```


    如果你现在开始思考自己的系统和应用程序，如何实现同样的效果？你能创建基于特定领域的小型应用程序，并让它们与其他应用程序通信吗？


    微服务在架构师、开发人员和运维团队中引起了极大的热情，但我们为什么需要它们呢？我认为时间是其中的关键因素，因为应用程序需要快速、有弹性、高可用且可扩展，同时还要保持高性能。


    *   **速度**：你需要比竞争对手更快地交付。你可以使用微服务来帮助你在上市时间上更快地交付。

    *   **安全性**：你需要通过监控、隔离、容错和自动恢复实践，在整个开发周期中保持稳定性、可用性和持久性。开始考虑持续交付和持续集成。

    *   **可扩展性**：垂直扩展（即购买更多硬件）的扩展性不佳。使用通用硬件，重用现有资源并进行水平扩展，创建同一应用程序的多个实例。使用容器来帮助你扩展。

    *   **移动性**：准备支持多种设备，随时随地访问。移动设备连接到互联网，不仅用于社交媒体、电子邮件和聊天，还用于监控房屋、引擎等。


    一切似乎都说得通，对吧？但我还没有解释一个微服务如何与多个其他微服务通信。消息传递是关键！许多公司通过创建装饰器、转换器或外观模式，使用 RESTful API
    与其他系统或程序（甚至是遗留系统）通信，但你还有更多通信选项，包括 HTTP、TCP（Web Socket、AMQP）、响应式流等。


    以简单方式创建微服务的基本指南被称为十二要素应用原则。


    ## 十二要素应用


    为了概述创建云原生架构所需的内容，Heroku（参见 [`https://www.heroku.com/`](https://www.heroku.com/)
    ）的工程师们识别出了一些模式，这些模式后来成为了十二要素应用指南（参见 [`https://12factor.net/`](https://12factor.net/)
    ）。该指南展示了如何架构一个应用程序（单个单元）。它侧重于声明式配置、无状态和部署无关性。换句话说，你的应用程序需要快速、安全且可扩展。


    以下是十二要素应用指南的摘要：


    *   **代码库**：一份在版本控制系统（VCS）中跟踪的代码库，多次部署。一个应用只有一个代码库，并由 Git、Subversion、Mercurial
    等版本控制系统跟踪。你可以（从同一代码库）进行多次部署到开发、测试、预发布和生产环境。

    *   **依赖**：显式声明并隔离依赖。有时你的环境没有互联网连接（如果是私有系统），因此你需要考虑打包你的依赖（jar、gem、共享库等）。如果你有一个内部库仓库，你可以声明类似
    pom、gemfile、bundle 的清单。永远不要假设你的最终环境中会拥有一切。

    *   **配置**：将配置存储在环境中。你不应对任何可变的内容进行硬编码。使用环境变量或配置服务器。

    *   **后端服务**：将后端服务视为附加资源。通过 URL 或配置连接到服务。

    *   **构建、发布、运行**：严格分离构建和运行阶段。与 CI/CD（持续集成、持续交付）相关。

    *   **进程**：以一个或多个无状态进程的方式执行应用。进程不应存储内部状态。不共享任何内容。任何必要的状态都应被视为后端服务。

    *   **端口绑定**：通过端口绑定导出服务。你的应用程序是自包含的，这些应用通过端口绑定暴露。一个应用程序可以成为另一个应用的服务。

    *   **并发**：通过进程模型进行水平扩展。通过添加更多应用实例来扩展。单个进程可以自由地进行多线程处理。

    *   **可处置性**：通过快速启动和优雅关闭最大化鲁棒性。进程应该是可处置的（记住它们是无状态的）并且具有容错能力。

    *   **环境等价**：尽可能保持开发、预发布和生产环境相似。换句话说，检查你安装的操作系统，以及你使用的框架、运行时或库版本。它们在每个环境中必须相同。这是高质量的结果，并确保持续交付。

    *   **日志**：将日志视为事件流。你的应用应写入 `stdout`。日志是聚合的、按时间排序的事件流。

    *   **管理进程**：将管理和维护任务作为一次性进程运行。在平台上运行管理进程：数据库迁移、一次性脚本等。


    一些程序员认为你需要拥有云基础设施才能使用微服务，但在我看来，你并不需要。如果你遵循这些原则，你将准备好与更大的公司竞争。当你准备迁移或切换到更好的基础设施时，你已经准备好了。


    如果你想开始创建微服务并遵循这十二要素原则，仅靠单个或小型团队从零开始创建一切是不够的。你将面临几个变化：


    *   **文化层面**：我们需要摆脱人员孤岛，开始创建跨职能团队。他们工作更高效，并致力于解决单一领域的业务场景。开始思考持续交付，分散决策权，并寻求团队自主性。

    *   **组织层面**：创建跨职能的业务能力团队。这些团队拥有自主决策权。创建平台团队运营，该团队也应是跨职能的。

    *   **技术层面**：摆脱构建单体应用，转向微服务架构。思考限界上下文。遵循领域驱动设计的一些原则和实践。开始使用容器化，以获得应用的隔离性、可扩展性和高性能，然后寻找能让你控制分布的服务集成。参见图
    11-1 。


    ![A337882_1_En_11_Fig1_HTML.gif](img/A337882_1_En_11_Fig1_HTML.gif)


    图 11-1.


    单体架构与使用微服务的对比


    ## Spring Cloud 服务


    Spring Cloud 服务是一组工具/框架，可以轻松、快速且安全地开发微服务架构。本节涵盖最常见的 Spring Cloud 服务：Spring Cloud
    Config、服务注册中心和断路器。


    ### Spring Cloud Config 服务器


    Config 服务器是一个外部化的应用配置服务，它为你提供了一个集中管理应用跨环境外部属性的地方。参见图 11-2 。


    ![A337882_1_En_11_Fig2_HTML.gif](img/A337882_1_En_11_Fig2_HTML.gif)


    图 11-2.


    Config 服务器


    你可以在开发阶段或与你的流水线（持续交付）一起使用 Config 服务器。你可以集中管理每个环境以访问通用的外部配置，而无需重新打包或重新部署。

