    Let’s analyze the important parts of the code:


    *   `@Component`: This is a marker from the Spring framework that will recognize
    this class as a Spring Bean so you can use it in the application. You will see
    this in action in the main application next.

    *   `RabbitTemplate`: This is one of the main classes from the Spring AMQP module
    that brings a lot of functionality to interact with RabbitMQ, like send, receive,
    and do admin tasks in RabbitMQ. In this example, it’s used to convert and send
    a message to the broker. Remember that, in order to interact with RabbitMQ, you
    must open a connection and create a channel (from that connection) and then send
    the message to the exchange. This setup will be handled by the `RabbitTemplate`
    instance.

    *   `convertAndSend`: This method will convert the message to the right type (into
    a byte array) and will send it to the `RabbitMQ` broker. This particular method
    has three parameters. The first one is the name of the exchange (where the message
    will be sent through the channel), the second parameter is the routing key (the
    binding rule that will route the message to the right queue), and the message,
    which in this case is just a string.


    As you can see, this is a very simple producer. It’s worth mentioning that the
    `RabbitTemplate` class has a variety of overload methods that help you send, listen,
    use custom converters, and do specialized tasks (you will read more about this
    later).


