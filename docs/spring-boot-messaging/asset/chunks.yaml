    Super FluxSink<T>>`。这个消费者只是一个需要执行的简单调用。参数需要是`FluxSink<T>`类型的接口。该接口是下游订阅者的包装API，发送任意数量的信号，后跟零个或至少一个`onError`或`onComplete`。


