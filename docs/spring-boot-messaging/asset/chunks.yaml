    src/main/resources/application.properties

    ```


    代码清单 4-18 展示了 `application.properties` 文件，其中包含一个特殊属性 `spring.jms.pub-sub-domain`。该属性默认值为
    `false`，因此生产者会将消息发送到队列。当设置为 `true` 时，生产者（发布者）会将消息发送到主题。这也同样适用于监听器。如果你将此属性设置为 `true`，监听器将成为该主题的订阅者。


    也请查看最后一个属性。我们只是定义了所有订阅者将监听的主题名称。


    现在，你可以打开并查看 `jms-topic-subscriber` 项目中的 `com.apress.messaging.jms.RateTopicReceiver.java`
    类，你会发现代码是相同的（除了目标名称）。在此项目中，你需要拥有相同的 `application.properties` 文件，并将 `spring.jms.pub-sub-domain`
    设置为 `true`（请确保包含此属性）。


    现在是时候运行 `jms-topic-subscriber` 项目了。在运行 `jms-demo` 项目之前，请查看 ActiveMQ Web 控制台的“主题”部分，如图
    4-13 所示。


    ![A337882_1_En_4_Fig13_HTML.jpg](img/A337882_1_En_4_Fig13_HTML.jpg)


    图 4-13.


    ActiveMQ Web 控制台的“主题”部分


    图 4-13 显示已创建一个名为 `rates` 的主题，并且有一个消费者。接下来，运行 `jms-sender` 项目，查看汇率是否被发送到该主题。查看
    `jms-topic-subscriber` 项目的日志；你应该会看到正在从 `rates` 主题消费消息。


    作为实验，你可以运行 `jms-topic-subscriber` 项目的多个实例（如果你使用 STS 和 Boot Dashboard，这很容易实现），并验证每个实例是否都收到了汇率的副本。参见图
    4-14。


    ![A337882_1_En_4_Fig14_HTML.jpg](img/A337882_1_En_4_Fig14_HTML.jpg)


    图 4-14.


    STS Boot Dashboard 运行 `jms-topic-subscriber` 项目的两个实例


    ## 货币项目


    为了使用货币项目并开始监听来自其他客户端的新汇率，我们需要做什么？解决方案已经在 `rest-api-jms` 项目中。你需要执行以下操作：


    *   确保已启用 `application.properties`、`spring.activemq.*` 和 `rate.jms.*` 属性。

    *   查看 `RateJmsReceiver` 类，并注释/取消注释你想要使用的监听器（我们提供了简单监听器和带有 `reply-to` 的监听器）。

    *   查看包含 JSON 转换器的 `RateJmsConfiguration` 类。


    作为作业，请尝试使其运行起来。请记住，你需要启动并运行 ActiveMQ 代理。另外，作为额外步骤，请尝试使该项目支持主题。


    ## 总结


    本章向你展示了如何使用 Spring Boot 通过 JMS 技术发送和接收消息。


    你了解了不同的 JMS 消息传递模型，以及开发人员发送或接收消息需要做什么。


    通过 Spring Boot，你看到了设置 JMS 客户端是多么容易，以及如何通过简单的注解就能拥有一个使用 JMS 作为消息传递系统的功能型应用程序。尽管你只看到了如何使用
    Apache ActiveMQ 作为代理，但同样的编程方法也可以应用于 HornetQ、IBM MQ 等，只需在 `application.properties`
    文件中提供正确的属性（连接工厂和消息监听器）即可。


    下一章将讨论一种不同的消息传递方式，即使用高级消息队列协议——AMQP。


    # 5. 使用 Spring Boot 集成 AMQP


    本章将讨论高级消息队列协议（AMQP），这是一种与平台无关的消息协议。你将学习如何使用 Spring AMQP 模块，该模块将与 RabbitMQ 代理进行通信。RabbitMQ
    是全球最常用的代理之一，因为它易于安装和使用。最棒的是，它是开源的。


    AMQP 起源于金融领域，由摩根大通于 2003 年创建。随后，更多公司围绕它进行改进，以增强这种新的消息传递方式。Rabbit Technologies
    使用 Erlang 编程语言实现了 AMQP，RabbitMQ 由此诞生。多年后，VMware/Pivotal 收购了它。


    我们将继续介绍一些重要的定义，这些定义将帮助你更好地理解 AMQP 和 RabbitMQ。本章将使用 `amqp-demo` 和 `rest-api-amqp`
    项目。本章包含与 `amqp-demo` 相关的所有代码，我将让你自行深入研究 `rest-api-amqp` 项目，以完成主要需求：从 RabbitMQ
    接收新汇率并将其发送给感兴趣的消费者。


    注意


    对于本章，启动并运行 RabbitMQ 服务器非常重要。你可以从 [`http://www.rabbitmq.com/download.html`](http://www.rabbitmq.com/download.html)
    下载它。请确保至少安装了 `rabbitmq_management` 插件，因为它为 RabbitMQ 提供了 Web UI 管理功能。设置完成后，你可以打开浏览器，使用用户名和密码
    `guest` 访问 `http://localhost:15672`。有关此 Web UI 插件的更多信息，请访问 [`http://www.rabbitmq.com/management.html`](http://www.rabbitmq.com/management.html)
    。


    ## AMQP 模型


    本节将介绍 AMQP 0.9.1 模型。目前，这个特定版本是最常见的。


    AMQP 模型由发布到交换器的消息组成。这些交换器根据绑定（规则）将消息分发到队列。然后，消费者从这些队列中获取/拉取消息。参见图 5-1。


    ![A337882_1_En_5_Fig1_HTML.jpg](img/A337882_1_En_5_Fig1_HTML.jpg)


    图 5-1.


    AMQP 模型


    你会看到，通常作为生产者或消费者，你需要创建到代理的连接，然后使用通道（主要传输方式）将消息发布到交换器或从队列消费消息。换句话说，AMQP 协议通过通道指定了多路复用连接。


    AMQP 模型具有不同的特性，允许开发人员在创建消息传递应用程序时拥有极大的灵活性。这些特性包括消息属性（内容类型、编码、路由键、投递模式等）、消息确认、消息拒绝、消息重新入队、多路复用连接（通道）、虚拟主机（用于托管隔离环境）、多客户端以及路由能力等。

