- fmt: '### Currency Project


    Let’s talk about the currency project again. Imagine that you have a customer
    who wants to send a more accurate rate, but can only send rate messages using
    JMS. This means that your currency project needs to be a receiver, but the customer
    will need some kind of acknowledgement that you received the rate message.


    Let’s start by creating the sender client using the same `jms-sender` project.
    Review the `com.apress.messaging.jms.RateSender.java` class shown in Listing [4-11](#A337882_1_En_4_Chapter.html#Par84).


    ```

    @Component

    public class RateSender {

    private JmsTemplate jmsTemplate;

    @Autowired

    public RateSender(JmsTemplate jmsTemplate){

    this.jmsTemplate = jmsTemplate;

    }

    public void sendCurrency(String destination, Rate rate){

    this.jmsTemplate.convertAndSend(destination,rate);

    }

    }

    Listing 4-11.

    com.apress.messaging.jms.RateSender.java

    ```


    Listing [4-11](#A337882_1_En_4_Chapter.html#Par84) shows you the class you are
    going to use to send new `Rate` objects. As you can see, it’s very similar to
    the `SimpleSender` class in Listing [4-6](#A337882_1_En_4_Chapter.html#Par34).
    The only difference is that instead of sending a text (String) message, it’s now
    sending a `Rate` object. Take a look at the `com.apress.messaging.domain.Rate.java`
    class in Listing [4-12](#A337882_1_En_4_Chapter.html#Par86).


    ```

    public class Rate {

    private String code;

    private Float rate;

    private Date date;

    public Rate() { }

    public Rate(String base, Float rate, Date date) {

    super();

    this.code = base;

    this.rate = rate;

    this.date = date;

    }

    //Setters and Getter omitted.

    }

    Listing 4-12.

    com.apress.messaging.domain.Rate.java

    ```


    Listing [4-12](#A337882_1_En_4_Chapter.html#Par86) shows you the `Rate` domain
    class that you have already seen in the currency project, but remember that in
    previous chapter, we annotated it with `@Entity` and `@Id` as part of the JPA
    persistence. This time it will just be simple, because there is no need to persist
    the rate.


    If you try to run the app at this point, you will get an error that says something
    like:


    ```

    Cannot convert object of type [com.apress.messaging.domain.Rate] to JMS message.
    Supported message payloads are: String, byte array, Map, Serializable object.

    ```


    We can implement `Serializable` into the `Rate` class, but the currency project
    doesn’t have that. Now, if you remember, the idea was to create a REST API that
    accepts the JSON format, so let’s see how can we use JSON here.


    Open the `com.apress.messaging.config.JMSConfig.java` class. See Listing [4-13](#A337882_1_En_4_Chapter.html#Par92).


    ```

    @Configuration

    @EnableConfigurationProperties(JMSProperties.class)

    public class JMSConfig {

    @Bean

    public MessageConverter jacksonJmsMessageConverter() {

    MappingJackson2MessageConverter converter = new

    MappingJackson2MessageConverter();

    converter.setTargetType(MessageType.TEXT);

    converter.setTypeIdPropertyName("_class_");

    return converter;

    }

    }

    Listing 4-13.

    com.apress.messaging.config.JMSConfig.java

    ```


    Listing [4-13](#A337882_1_En_4_Chapter.html#Par92) shows you the configuration
    needed to expose the message in the JSON format. Let’s review it:


    *   `MessageConverter`: This is an interface that specifies a converter between
    Java objects and JMS messages. It exposes the `toMessage` and `fromMessage` methods.
    The Spring Boot auto-configuration will wire everything up to use this particular
    message converter.

    *   `MappingJackson2MessageConverter`: This class implements the `MessageConverter`
    interface and adds more methods to help with the conversion from/to JSON/object.

    *   `setTargetType`: This method is necessary to help the converter identify what
    type is needed to convert from/to. In this case, we are sending a JSON in a String
    format, which means that it will create a `TextMessage` object behind the scenes.

    *   `setTypeIdPropertyName`: This is an important setting, because it will drive
    the way the mapping is done behind the scenes. This can be any value you want.
    It’s just a simple identifier that will hold the qualified class name that is
    being mapped.


    That’s enough to run the application again, but first let’s see how the main app
    will look. See Listing [4-14](#A337882_1_En_4_Chapter.html#Par99).


    ```

    @SpringBootApplication

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    @Bean

    CommandLineRunner process(JMSProperties props,

    RateSender sender){

    return args -> {

    sender.sendCurrency(props.getRateQueue(),

    new Rate("EUR",0.88857F,new Date()));

    sender.sendCurrency(props.getRateQueue(),

    new Rate("JPY",102.17F,new Date()));

    sender.sendCurrency(props.getRateQueue(),

    new Rate("MXN",19.232F,new Date()));

    sender.sendCurrency(props.getRateQueue(),

    new Rate("GBP",0.75705F,new Date()));

    };

    }

    }

    Listing 4-14.

    com.apress.messaging.JmsSenderApplication.java

    ```


    Listing [4-14](#A337882_1_En_4_Chapter.html#Par99) shows you the main app (just
    remember to comment out the previous code). As you can see, it’s very simple.
    We are just sending the new `Rate` objects. If you run the application, you should
    get the output shown in Figure [4-6](#A337882_1_En_4_Chapter.html#Fig6).


    ![A337882_1_En_4_Fig6_HTML.jpg](A337882_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    Logs when JMS sends a rate object


    Figure [4-6](#A337882_1_En_4_Chapter.html#Fig6) shows you the logs without any
    errors. It’s saying that everything went well and some rates were sent successfully.
    But this is not enough, because how can we guarantee that actually is a JSON format?'
