    Listing 10-1.

    com.apress.messaging.RxJavaDemoApplication.java

    ```


    Listing [10-1](#A337882_1_En_10_Chapter.html#Par18) shows you the main application
    where a basic `Observable` instance is being defined:


    *   `Observable<Exchange>`: Here we are using the `Observable` class that supports
    not just the emission of single scalar values (like Java 8 Future), but also supports
    sequences of values or even infinite streams. In this case, it supports an `Exchange`
    class that contains the rates.

    *   `subscribe`: The `Observable` class has some similarities to its Java cousin
    `Iterable` (normally doing a pull when invoking the `next()` method over it).
    In this case, we are going to do a push, by calling `subscribe`. This subscriber
    will receive all the messages (the exchange rates) and print them out.


    The `Observable` type adds something that’s missing from the observer pattern:
    the ability for the producer to tell the consumer that there is no more data available
    by signaling the observer (subscriber) using the `onCompleted` method, and the
    ability for the producer to let know the consumer that there has been an error,
    by signaling the observer (subscriber) using the `onError` method.


    Next, let’s see an `Observable` that will push data on to the subscriber. Open
    the `com.apress.messaging.service.ExchangeService` class. See Listing [10-2](#A337882_1_En_10_Chapter.html#Par24).


    ```

    @Service

    public class ExchangeService {

    private static final Logger log =

    LoggerFactory.getLogger(ExchangeService.class);

    private Exchange exchange;

    ExchangeService() {

    SortedMap rates =

    new TreeMap() {

    {

    put("EUR", 0.942013F);

    put("JPY", 114.75440909F);

    put("MXN", 19.598225F);

    put("GPB", 0.819626F);

    }

    };

    exchange = new Exchange(rates, new Date());

    }

    public Observable getExchangeRates() {

    return Observable.unsafeCreate(subscriber -> {

    while(!subscriber.isUnsubscribed()) {

    try {

    Float factor =

    (new Random().nextFloat() * 2 - 1) / 10F;

    subscriber.onNext(

    new Exchange(exchange

    .getRates()

    .entrySet()

    .stream()

    .collect(

    Collectors.toMap(

    entry ->

    entry.getKey(),

    entry -> entry.getValue()

    * factor + entry.getValue(),

    (v1, v2) -> {

    throw new RuntimeException(String.format("Duplicate key for values %s

    and %s", v1, v2));

    }, TreeMap::new)), new Date()));

    if (new Random().nextInt(100) > 90 )

    throw new Exception(

    "Some values are getting too high!!");

    sleep(1000);

    } catch (Exception ex){

    log.error(ex.getMessage());

    }

    }

    });

    }

    private void sleep(int ms) {

    try {

    Thread.sleep(ms);

    } catch (Exception ex) {}

    }

    }

    Listing 10-2.

    com.apress.messaging.service.ExchangeService.java

    ```


    Listing [10-2](#A337882_1_En_10_Chapter.html#Par24) shows you the service. The
    observable will push an exchange rate every second. Take a moment to analyze the
    code, and then we can analyze it together:


    *   `Observable.unsafeCreate`: This will return an observable that executes the
    given `OnSubscribe` action for each `Subscriber` (see Listing [10-1](#A337882_1_En_10_Chapter.html#Par18)).
    With this observable, you can execute `onError(Throwable)` when an error occurs
    or `onCompleted()` when there is no more data. One of the important parts here
    is `subscriber.isUnsubscribee()` in the `while` statement. Here we are determining
    whether we have more subscribers. We are going to see this in the next examples.

    *   `subscriber.onNext`: This provides the observer (subscriber) with a new item
    (the exchange rate) to the observer. This method call is pushing the values to
    the subscriber. See Listing [10-1](#A337882_1_En_10_Chapter.html#Par18).


    This particular service will send an exchange rate every second (see the `sleep`
    statement). The exchange rate varies because a factor is applied to it to emulate
    real scenarios in the money exchange world.


    If you run the application, you should get something similar to Figure [10-1](#A337882_1_En_10_Chapter.html#Fig1).


    ![A337882_1_En_10_Fig1_HTML.jpg](A337882_1_En_10_Fig1_HTML.jpg)


    Figure 10-1.


    Application logs


    Figure [10-1](#A337882_1_En_10_Chapter.html#Fig1) shows you the logs of your first
    reactive application. Next, let’s modify the main class and add a subscriber implementation.
    See Listing [10-3](#A337882_1_En_10_Chapter.html#Par31).


    ```

    @SpringBootApplication

    public class RxJavaDemoApplication {

    private static final Logger log =

    LoggerFactory.getLogger(RxJavaDemoApplication.class );

    public static void main(String[] args){

    log.info("Demo Steam Application");

    new SpringApplicationBuilder(RxJavaDemoApplication.class)

    .web(false)

    .run(args);

    }

    @Bean

    CommandLineRunner rxJava(ExchangeService service){

    return args -> {

    Observable observableExchange =

    service.getExchangeRates();

    observableExchange.subscribe(new Subscriber(){

    @Override

    public void onCompleted() {

    log.info("EXCHANGE COMPLETED!!");

    }

    @Override

    public void onError(Throwable t) {

    log.error("EXCHANGE IS SKYROCKETING... >> " +

    t.getMessage());

    unsubscribe();

    }

    @Override

    public void onNext(Exchange ex) {

    log.info(ex.toString());

    if(ex.getRates().get("JPY").floatValue() >

    125.0F){

    log.warn(">>> JPY rate is now to high: " +

    ex.getRates().get("JPY")

    .floatValue() + ", is time to quit. Bye.");

    unsubscribe();

    }

    }

    });

    };

    }

    }

    Listing 10-3.

    com.apress.messaging.RxJavaDemoApplication.java

    ```


    Listing [10-3](#A337882_1_En_10_Chapter.html#Par31) shows you a more complete
    example. In this case, we are not just doing reference methods (`System.out::println`),
    but are creating a new `Subscriber<Exchange>` and overriding some methods:


    *   `Subscriber<Exchange>`: This is an abstract class that provides a way to receive
    push-based notifications from `Observables` and permits manual unsubscribing from
    these `Observables`.

    *   `onError`: This method notifies the observer that the `Observable` has an
    error condition.

    *   `onCompleted`: This method notifies the observer that the `Observable` has
    finished sending push-based notifications.

    *   `onNext`: This method provides to the observer with a new item (in this case,
    a new exchange rate) to observe. Note in this method that there is an `unsubscribe()`
    call that will set the flag so the `Observable` in the `subscriber.isUnsubscribed()`
    evaluates to `true` and will end the `while` statement.


    If you run the application, you should see something similar to Figure [10-2](#A337882_1_En_10_Chapter.html#Fig2).


    ![A337882_1_En_10_Fig2_HTML.jpg](A337882_1_En_10_Fig2_HTML.jpg)


    Figure 10-2.


    Logs


    Figure [10-2](#A337882_1_En_10_Chapter.html#Fig2) shows the logs after running
    the application. Note that the `JPY` rate triggered the `unsubscribe()` call,
    which means the `Observable` will stop sending push-based exchange rates.'
