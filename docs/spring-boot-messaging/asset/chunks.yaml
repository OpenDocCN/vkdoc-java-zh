- fmt: "### `@EventListener`\n\n`@EventListener`注解是一个非常有用的注解，可以直接用于处理事件的方法上。这意味着不再需要实现`ApplicationListener`接口。\n\
    \n清单[3-7](#A337882_1_En_3_Chapter.html#Par50)展示了如何使用它。\n\n```java\n@Component\n\
    public class RestAppEventListener {\n    @EventListener\n    @Log(printParamsValues=true)\n\
    \    public void restAppHandler(\n        SpringApplicationEvent springApp){\n\
    \    }\n}\n```\n*清单 3-7. `com.apress.messaging.listener.RestAppListener.java`*\n\
    \n清单[3-7](#A337882_1_En_3_Chapter.html#Par50)展示了应用于`restAppHandler`方法的`@EventListener`注解。Spring\
    \ Framework 将自动装配所有内容，使得该监听器能够接收所有`SpringApplicationEvent`事件。`SpringApplicationEvent`是另一个继承自`ApplicationEvent`抽象类的事件，但它包含有关\
    \ Spring Boot 应用程序的信息，例如命令行中使用的参数、横幅、资源加载器等。\n\n如果运行该项目，您将看到类似于图[3-8](#A337882_1_En_3_Chapter.html#Fig8)的内容。\n\
    \n![A337882_1_En_3_Fig8_HTML.jpg](A337882_1_En_3_Fig8_HTML.jpg)\n\n*图 3-8. `RestAppEventListener`的日志*\n\
    \n如您所见，`@EventListener`注解使用起来很简单。这个注解还有更多特性：\n\n*   它支持条件，因此仅当给定的表达式为真时才会执行。例如：\n\
    \n    ```java\n    @EventListener(condition = \"#springApp.args.length > 1\")\n\
    \    ```\n\n    这段代码告诉监听器仅在参数长度大于1时才使用该事件。如果您替换清单[3-7](#A337882_1_En_3_Chapter.html#Par50)中的上一个监听器，您将看不到`RestAppEventListener`的日志。\n\
    *   您可以通过传递事件类数组作为默认值来监听多个事件。例如：\n\n    ```java\n    @EventListener({CurrencyEvent.class,\n\
    \    CurrencyConversionEvent.class})\n    @Log(printParamsValues=true)\n    public\
    \ void restAppHandler(ApplicationEvent appEvent){ }\n    ```\n\n    这段代码在同一个方法中监听`CurrencyEvent`和`CurrencyConversionEvent`事件，该方法现在接收一个`ApplicationEvent`实例。此外，您也可以没有参数，但仍然监听多个事件。\n\
    *   当您有多个事件要监听时，您可能希望对它们进行优先级排序。您可以在方法上添加`@Order`注解来实现。例如：\n\n    ```java\n  \
    \  @EventListener\n    @Order(Ordered.HIGHEST_PRECEDENCE)\n    @Log(printParamsValues=true)\n\
    \    public void restAppHandler(SpringApplicationEvent springApp){\n    }\n  \
    \  ```\n\n    这段代码将按最高优先级顺序处理。\n*   您还可以通过添加`@Async`注解以异步方式处理事件监听器。例如：\n\n   \
    \ ```java\n    @EventListener\n    @Async\n    @Log(printParamsValues=true)\n\
    \    public void restAppHandler(SpringApplicationEvent springApp){\n    }\n  \
    \  ```\n\n### `@TransactionalEventListener`\n\nSpring Framework 4.2.x 及更高版本引入了一个额外的注解，允许您监听事务阶段，例如数据库事务或任何其他事务，包括消息传递事件。\n\
    \n让我们开始在货币项目中使用这个注解。查看清单[3-8](#A337882_1_En_3_Chapter.html#Par67)中所示的`RateEventListener`类。\n\
    \n```java\n@Component\npublic class RateEventListener {\n    @TransactionalEventListener\n\
    \    @Log(printParamsValues=true,\n    callMethodWithNoParamsToString=\"getRate\"\
    )\n    public void processEvent(CurrencyEvent event){ }\n}\n```\n*清单 3-8. `com.apress.messaging.listener.RateEventListener.java`*\n\
    \n清单[3-8](#A337882_1_En_3_Chapter.html#Par67)向您展示了`RateEventListener`类，它使用了`@TransactionalEventListener`并处理自定义的`CurrencyEvent`事件（您可以在`com.apress.messaging.event`包中查看代码）。`@TransactionalEventListener`将在事务通道建立时接收事件，无论是通过编程方式还是使用`@Transactional`注解。\n\
    \n如果您查看`com.apress.messaging.service.CurrencyService.java`类，您将看到以下代码：\n\n```java\n\
    @Transactional\npublic void saveRate(Rate rate){\n    repository.save(new\n  \
    \  Rate(rate.getCode(),\n    rate.getRate(),\n    rate.getDate()));\n    publisher.publishEvent(new\
    \ CurrencyEvent(this,rate));\n}\n```\n\n这段代码展示了`saveRate`方法，它被标记了`@Transactional`注解。它将在保存完成后发布一个`CurrencyEvent`事件。\n\
    \n如果您运行该项目，您将多次看到关于`RateEventListener`的日志。查看主应用程序（`RestApiEventsApplication.java`）；您将看到使用`CurrencyService`实例保存的汇率以及由`RateEventListener`监听器记录的每个事务的日志（在它们提交之后）。见图[3-9](#A337882_1_En_3_Chapter.html#Fig9)。\n\
    \n![A337882_1_En_3_Fig9_HTML.jpg](A337882_1_En_3_Fig9_HTML.jpg)\n\n*图 3-9. `RateEventListener`日志*\n\
    \n`@TransactionalEventListener`可以监听特定的事务阶段。如果您需要在某个阶段监听事件，可以像这样使用它：\n\n```java\n\
    @TransactionalEventListener(\nphase = TransactionPhase.BEFORE_COMMIT)\n```\n\n\
    您可以使用：`BEFORE_COMMIT`、`AFTER_COMMIT`（默认）、`AFTER_ROLLBACK`和`AFTER_COMPLETION`。\n\
    \n> **注意**\n>\n> 请记住，您可以从 Apress 网站或直接从 GitHub 仓库获取所有代码：[`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)\n\
    \n## 总结\n\n本章解释了观察者模式的工作原理。它还涵盖了 Spring Framework 使用此模式来暴露应用程序事件的方式。\n\n它向您展示了一些用例，您可以通过这些用例监听应用程序事件，并使用它们通过`ServletRequestHandledEvent`来计算端点被访问的次数。它还向您展示了如何通过扩展`ApplicationEvent`抽象类来创建自己的自定义事件。\n\
    \n您学习了通过使用诸如`@EventListener`之类的注解来监听事件的简便方法。您还了解了如何使用`@TransactionalEventListener`，该注解在事务发生时、提交期间、提交之前或提交之后以及回滚之后被触发。\n\
    \n下一章将介绍 Java 消息服务 API 以及如何使用它进行消息传递。\n\n# 4. JMS with Spring Boot\n\nJava 消息服务（JMS）于\
    \ 2001 年 6 月随版本 1.0.2b 发布。它是在两个或多个客户端之间发送消息的另一种解决方案。在当时，它被认为是面向消息的中间件（MOM）技术组的一部分。其理念是为一个反复出现的问题（即生产者-消费者用例）提供一个\
    \ API，该用例允许在分布式环境中实现松耦合、可靠且异步的组件。\n\n本章从一个简单的项目开始，它将帮助您理解 JMS 客户端的工作原理以及如何使用 Spring\
    \ Boot 进行配置。然后，我们将利用这些知识构建之前的项目——货币 REST API，现在它将作为一个接收器来保存新的汇率。那么，让我们开始吧。"
  raw: "### @EventListener\n\nThe `@EventListener` annotation is a helpful annotation\
    \ that you can use directly in the method that will handle the event. This means\
    \ that there is no need to implement `ApplicationListener` anymore.\n\nListing\
    \ [3-7](#A337882_1_En_3_Chapter.html#Par50) shows how you can use it.\n\n```\n\
    @Component\npublic class RestAppEventListener {\n@EventListener\n@Log(printParamsValues=true)\n\
    public void restAppHandler(\nSpringApplicationEvent springApp){\n}\n}\nListing\
    \ 3-7.\ncom.apress.messaging.listener.RestAppListener.java\n```\n\nListing [3-7](#A337882_1_En_3_Chapter.html#Par50)\
    \ shows you the `@EventListener` annotation, which is applied to the `restAppHandler`\
    \ method . The Spring Framework will wire everything up so this listener receives\
    \ all the `SpringApplicationEvent` events. The `SpringApplicationEvent` is another\
    \ event that extends from the `ApplicationEvent` abstract class but contains information\
    \ about the Spring Boot application, like the arguments used in a command line,\
    \ the banner, the resource loader, etc.\n\nIf you run the project, you will see\
    \ something similar to Figure [3-8](#A337882_1_En_3_Chapter.html#Fig8).\n\n![A337882_1_En_3_Fig8_HTML.jpg](A337882_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8.\n\nLogs of the RestAppEventListener\n\nAs you can see, the `@EventListener`\
    \ annotation is simple to use. This annotation has even more features:\n\n*  \
    \ It supports conditions, so it can be executed only if the expression given is\
    \ true. For example:\n\n    ```\n    @EventListener(condition = \"#springApp.args.length\
    \ > 1\")\n    ```\n\n    This snippet tells the listener to only use the events\
    \ if the argument’s length is greater than 1\\. If you replace the previous listener\
    \ in Listing [3-7](#A337882_1_En_3_Chapter.html#Par50), you won’t see the `RestAppEventListener`\
    \ logs.\n*   You can listen for many events by passing an array of the event classes\
    \ as the default value. For example:\n\n    ```\n    @EventListener({CurrencyEvent.class,\n\
    \    CurrencyConversionEvent.class})\n    @Log(printParamsValues=true)\n    public\
    \ void restAppHandler(ApplicationEvent appEvent){ }\n    ```\n\n    This snippet\
    \ listens for the `CurrencyEvent` and `CurrencyConversion` events in the same\
    \ method, which now gets an `ApplicationEvent` instance. Also you can have no\
    \ arguments and still listen for multiple events.\n*   When you have multiple\
    \ events to listen to, you might want to prioritize them. You can add the `@Order`\
    \ annotation to the method to do so. For example:\n\n    ```\n    @EventListener\n\
    \    @Order(Ordered.HIGHEST_PRECEDENCE)\n    @Log(printParamsValues=true)\n  \
    \  public void restAppHandler(SpringApplicationEvent springApp){\n    }\n    ```\n\
    \n    This snippet will be processed in the order of highest precedence.\n*  \
    \ You can also process your event listeners in an asynchronous way, by adding\
    \ the `@Async` annotation. For example:\n\n    ```\n    @EventListener\n    @Async\n\
    \    @Log(printParamsValues=true)\n    public void restAppHandler(SpringApplicationEvent\
    \ springApp){\n    }\n    ```\n\n### @TransactionalEventListener\n\nThe Spring\
    \ Framework 4.2.x and above versions introduce an additional annotation that allows\
    \ you to listen for the transaction phase, such as a database transaction or any\
    \ other transactions, including messaging events.\n\nLet’s start by using this\
    \ annotation in the currency project. Look at the `RateEventListener` class shown\
    \ in Listing [3-8](#A337882_1_En_3_Chapter.html#Par67).\n\n```\n@Component\npublic\
    \ class RateEventListener {\n@TransactionalEventListener\n@Log(printParamsValues=true,\n\
    callMethodWithNoParamsToString=\"getRate\")\npublic void processEvent(CurrencyEvent\
    \ event){ }\n}\nListing 3-8.\ncom.apress.messaging.listener.RateEventListener.java\n\
    ```\n\nListing [3-8](#A337882_1_En_3_Chapter.html#Par67) shows you the `RateEventListener`\
    \ class, which uses the `@TransactionalEventListener` and processes the custom\
    \ `CurrencyEvent` event (you can look at the code in the `com.apress.messaging.event`\
    \ package). The `@TransactionalEventListener` will receive the events when a transactional\
    \ channel is being established, either programmatically or by using the `@Transactional`\
    \ annotation.\n\nIf you look at the `com.apress.messaging.service.CurrencyService.java`\
    \ class, you will see the following code:\n\n```\n@Transactional\npublic void\
    \ saveRate(Rate rate){\nrepository.save(new\nRate(rate.getCode(),\nrate.getRate(),\n\
    rate.getDate()));\npublisher.publishEvent(new CurrencyEvent(this,rate));\n}\n\
    ```\n\nThis snippet shows the `saveRate` method , which is marked with the `@Transactional`\
    \ annotation. It will publish a `CurrencyEvent` when it’s done saving.\n\nIf you\
    \ run the project you will see the logs about the `RateEventListener` several\
    \ times. Take a peek at the main app (`RestApiEventsApplication.java`); you will\
    \ see rates being saved using the `CurrencyService` instance and the logs of each\
    \ transaction (after they are committed) by the `RateEventListener` listener.\
    \ See Figure [3-9](#A337882_1_En_3_Chapter.html#Fig9).\n\n![A337882_1_En_3_Fig9_HTML.jpg](A337882_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9.\n\nRateEventListener logs\n\n`@TransactionalEventListener` can listen\
    \ for specific transaction phases. If you need to listen for events during a phase,\
    \ you can use it like so:\n\n```\n@TransactionalEventListener(\nphase = TransactionPhase.BEFORE_COMMIT)\n\
    ```\n\nyou can have: `BEFORE_COMMIT`, `AFTER_COMMIT` (default), `AFTER_ROLLBACK`\
    \ and `AFTER_COMPLETION`.\n\nNote\n\nRemember that you can get all the code from\
    \ the Apress site or directly from the GitHub Repository: [`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)\n\
    \n## Summary\n\nThis chapter explained how the observer pattern works. It also\
    \ covered the way the Spring Framework uses this pattern to expose application\
    \ events.\n\nIt showed you some use cases whereby you can listen for application\
    \ events and use them to count how many times an endpoint is being accessed by\
    \ `ServletRequestHandledEvent`. It showed you how to create your own custom events\
    \ by extending the `ApplicationEvent` abstract class.\n\nYou learned about an\
    \ easy way to listen for events by using annotations such as the `@EventListener`.\
    \ You also saw how to use the `@TransactionalEventListener` that is being triggered\
    \ when a transaction happens, during, before, or after commit and after a rollback.\n\
    \nThe next chapter covers the Java Message Service API and how you can do messaging\
    \ using it.\n\n# 4. JMS with Spring Boot\n\nThe Java Message Service (JMS) was\
    \ announced in June 2001 with version 1.0.2b. It’s another solution for sending\
    \ messaging between two or more clients. It was considered part of a Message Oriented\
    \ Middleware (MOM) group of technologies at that time. The idea was to provide\
    \ an API for a recurrent problem, a producer-consumer use case that allowed loosely\
    \ coupled, reliable, and asynchronous components in a distributed environment.\n\
    \nThis chapter starts with a simple project that will help you understand how\
    \ the JMS clients work and how to configure it with Spring Boot. Then we are going\
    \ to use this knowledge to build on the previous project, the currency REST API\
    \ that now will be a receiver to save new rates. So, let’s get started."
