    As you can see, it’s very simple to create low-level WebSockets applications.
    What happens if you need to send a message from a Spring application? In other
    words, your app needs to be the client. You can add the following code to your
    application (see Listing [7-4](#A337882_1_En_7_Chapter.html#Par44)).


    ```

    StandardWebSocketClient client = new StandardWebSocketClient();

    ListenableFuture future =

    client.doHandshake(handler,

    new WebSocketHttpHeaders(),

    new URI("ws://localhost:8080/ws-server"));

    WebSocketSession session = future.get();

    WebSocketMessage message =

    new TextMessage("Hello there...");

    session.sendMessage(message) ;

    Listing 7-4.

    WebSockets Client—Snippet of the WebSocketDemoApplication Class

    ```


    Listing [7-4](#A337882_1_En_7_Chapter.html#Par44) shows a snippet of what you
    need to add if you want to create a WebSockets client (instead of HTML web pages).
    Here we are using `StandardWebSocketClient` (a low-level WebSockets protocol)
    and it’s manually doing the handshake. It passes the handler some headers and
    the URI where you will connect. (Note that you can use the previous handler or
    create your own, and you then can implement the `afterConnectionEstablished` to
    check if you were successfully connected.) Then you get a `WebSocketSession` instance
    and can send the message.


    You can see that using the WebSockets client with Spring classes is a straightforward
    implementation. Next, let’s start using the fallback options with SockJS and the
    STOMP sub-protocol.


    ## Using SockJS and STOMP


    Why do we need to use SockJS and STOMP? Remember that not all the browsers support
    WebSockets and normally the client and the server must agree on how they will
    handle messages. Of course, that is not the right way to message, because we want
    to have a decoupling scenario, where the client is not tied to the server.


    SockJS helps emulate WebSockets and performs the initial handshake. Then, by using
    STOMP, we can reply in an interoperable wire format that allows us to use multiple
    brokers that support this protocol.


    ### Chat Room Application


    We are going to continue using the `websocket-demo` project, but we are going
    to work with different files and classes. This example creates a chat room, which
    is a very common use of the WebSockets technology.


    First, let’s see how to configure the project will use SockJS and STOMP. Open
    the `com.apress.messaging.config.WebSocketConfig` class. See Listing [7-5](#A337882_1_En_7_Chapter.html#Par51).


    ```

    @Configuration

    @EnableWebSocketMessageBroker

    @EnableConfigurationProperties(SimpleWebSocketsProperties.class)

    public class WebSocketsConfig extends

    AbstractWebSocketMessageBrokerConfigurer {

    SimpleWebSocketsProperties props;

    public WebSocketsConfig(SimpleWebSocketsProperties props){

    this.props = props;

    }

    @Override

    public void registerStompEndpoints(

    StompEndpointRegistry registry) {

    registry.addEndpoint(props.getEndpoint()).withSockJS();

    }

    @Override

    public void configureMessageBroker(

    MessageBrokerRegistry config) {

    config.enableSimpleBroker(props.getTopic());

    config.setApplicationDestinationPrefixes(

    props.getAppDestinationPrefix()) ;

    }

    }

    Listing 7-5.

    com.apress.messaging.config.WebSocketConfig.java

    ```


    Listing [7-5](#A337882_1_En_7_Chapter.html#Par51) shows you the configuration
    needed to use WebSockets with SocksJS and STOMP. Let’s review it:


    *   `@EnableWebSocketMessageBroker`: This annotation is required to enable broker-backend
    messaging over WebSockets using a higher-level messaging sub-protocols (SockJS/STOMP).

    *   `AbstractWebSocketMessageBrokerConfigurer`: This class implements the `WebSocketMessageBrokerConfigurer`
    to configure message handling with simple messaging protocols like STOMP from
    WebSockets clients.

    *   `registerStompEndpoints`: This method is called to register STOMP endpoints,
    mapping each to a specific URL and configuring the SockJS fallback options.

    *   `StompEndpointRegistry`: This is a contract for registering STOMP over WebSockets
    endpoints. It provides a fluent API to build the registry.

    *   `withSockJS`: This method will enable the SockJS fallback options required
    for the handshake.

    *   `configureMessageBroker`: This method is called to configure the message broker
    options. In this case we are using the `MessageBrokerRegistry`.

    *   `MessageBrokerRegistry`: This instance will help configure all the broker
    options. We are using `enableSimpleBroker`, which accepts one or more prefixes
    to filter destinations targeting the broker. This will be used together with the
    annotated methods that have the `@SendTo` annotation. We are also using the `setApplicationDestinationPrefixes`
    to configure one or more prefixes to filter destination targeting the application
    annotated methods. In other words, it will look for methods that are annotated
    with `@MessageMapping`.


    You can see that we need to add an endpoint, a broker, and prefix paths to configure
    WebSockets using SockJS and STOMP. Take a look at Figure [7-9](#A337882_1_En_7_Chapter.html#Fig9).


    ![A337882_1_En_7_Fig9_HTML.gif](A337882_1_En_7_Fig9_HTML.gif)


    Figure 7-9. Client/server WebSockets using SockJS and STOMP


    Figure [7-9](#A337882_1_En_7_Chapter.html#Fig9) shows you a general picture of
    what the communication will be between the client and the server. Next, open the
    `com.apress.messaging.controller.SimpleController` class. See Listing [7-6](#A337882_1_En_7_Chapter.html#Par62).


    ```

    @Controller

    public class SimpleController {

    @MessageMapping("${apress.ws.mapping}")

    @SendTo("/topic/chat-room")

    public ChatMessage chatRoom(ChatMessage message) {

    return message;

    }

    }

    Listing 7-6.

    com.apress.messaging.controller.SimpleController.java

    ```


    Listing [7-6](#A337882_1_En_7_Chapter.html#Par62) shows you the receiver and sender
    by using new annotations. Remember that the project now will run a chat room,
    so different clients can connect and receive message from other users.'
