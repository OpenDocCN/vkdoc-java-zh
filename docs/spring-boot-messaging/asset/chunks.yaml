- fmt: '### Using a Remote Apache ActiveMQ Broker


    Let’s use ActiveMQ as a remote broker. It will help us determine if the messages
    are actually going over to the broker instead of using the in-memory provider.


    Make sure you have ActiveMQ up and running (you need to download it from [`http://activemq.apache.org/`](http://activemq.apache.org/)
    and follow the installation instructions for your system). I used ActiveMQ version
    5.14.0, but you can use any version. Before you run the application again, you
    need to make sure that it will be using the ActiveMQ broker that is running. Open
    the `src/main/resources/application.properties` file and uncomment out all the
    `spring.activemq.*` and the `apress.jms.*` properties. The result should look
    like Listing [4-15](#A337882_1_En_4_Chapter.html#Par104).


    ```

    spring.activemq.broker-url=tcp://localhost:61616

    spring.activemq.user=admin

    spring.activemq.password=admin

    #Apress Configuration

    apress.jms.queue=jms-demo

    apress.jms.rate-queue=rates

    Listing 4-15.

    src/main/resources/application.properties

    ```


    Listing [4-15](#A337882_1_En_4_Chapter.html#Par104) shows the `application.properties`
    file where the remote ActiveMQ is declared (in this case, it’s the local system),
    the default port is `61616`, and the username and password are set to `admin`.
    With these properties in place, Spring Boot will configure the `connectionFactory`
    that will connect to the remote broker.


    So, if you have the ActiveMQ broker running, you should be able to go to the `http://localhost:8161/admin`
    URL in your browser and see the web page shown in Figure [4-7](#A337882_1_En_4_Chapter.html#Fig7).


    ![A337882_1_En_4_Fig7_HTML.jpg](A337882_1_En_4_Fig7_HTML.jpg)


    Figure 4-7.


    ActiveMQ web console: http://localhost:8161/admin


    Then you can execute the `jms-demo` application and select the queue from the
    web console to see that the queue called `rates` has been created (this name was
    based on the `apress.jms.rate-queue` property value). See Figure [4-8](#A337882_1_En_4_Chapter.html#Fig8).


    ![A337882_1_En_4_Fig8_HTML.jpg](A337882_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    ActiveMQ Queues tab


    If you click the queue called `rates`, you should see the four messages that were
    sent to the broker. See Figure [4-9](#A337882_1_En_4_Chapter.html#Fig9).


    ![A337882_1_En_4_Fig9_HTML.jpg](A337882_1_En_4_Fig9_HTML.jpg)


    Figure 4-9.


    ActiveMQ queue rate messages


    Click in any of the messages to see the content. See Figure [4-10](#A337882_1_En_4_Chapter.html#Fig10).


    ![A337882_1_En_4_Fig10_HTML.jpg](A337882_1_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    ActiveMQ Queue --> Rates --> Message


    Figure [4-10](#A337882_1_En_4_Chapter.html#Fig10) shows you the actual message
    received by the broker. Take a look at the message details; you will see something
    similar to this:


    ```

    {"code":"EUR","rate":0.88857,"date":1479442794599}

    ```


    The rate is sent by the `jms-sender` app. On the right, you can see a Properties
    legend where the `_class_` property ID has the value of the `com.apress.messaging.domain.Rate`
    class (remember that this is important for the receiver as well, so it can convert
    back from JSON to object).


    Now you know how to send objects that can be converted into JSON. Next, you need
    to receive this message, right? The sender needs to receive some acknowledgement
    from the receiver (it was part of the requirements) as well.


    ### Reply-To


    Spring JMS provides a way to reply to another queue, kind of like having a response-request/RPC
    model. You use it along with the listener, the `@SendTo` annotation.


    In order to see this in action, we are going to work with the same `jms-sender`
    project. Remember to disable some of the components. You do this by commenting
    out the `@Component` annotations in all the listeners we have been working on.


    Open the `com.apress.message.jms.RateReplyReceiver.java` class. See Listing [4-16](#A337882_1_En_4_Chapter.html#Par117).


    ```

    @Component

    public class RateReplyReceiver {

    @JmsListener(destination = "${apress.jms.rate-queue}")

    @SendTo("${apress.jms.rate-reply-queue}")

    public Message processRate(Rate rate){

    //Process the Rate and return any significant value

    return MessageBuilder

    .withPayload("PROCCESSED")

    .setHeader("CODE", rate.getCode())

    .setHeader("RATE", rate.getRate())

    .setHeader("ID", UUID.randomUUID().toString())

    .setHeader("DATE",

    new SimpleDateFormat("yyyy-MM-dd")

    .format(new Date()))

    .build();

    }

    }

    Listing 4-16.

    com.apress.message.jms.RateReplyReceiver.java

    ```


    Listing [4-16](#A337882_1_En_4_Chapter.html#Par117) shows you the `RateReplyReceiver.java`
    class and the `@SendTo` annotation, which needs a value that will correspond to
    the `reply-queue` where the result message will be sent. Let’s review it:


    *   `@SendTo`: This annotation will be the key to a reply. Make sure you still
    have the `@JmsListener` annotation, meaning that this method will act as a receiver
    and a sender. The method must have a return type. In this case, it will use the
    `apress.jms.rate-reply-queue` value to set the reply queue. The annotation value
    can be omitted if the main message has the `JMSReplyTo` header set.

    *   `Message<T>`: This is an interface that is built on the `Generics` type and
    provides useful getters, like `getPayload` and `getHeaders`. This is the preferred
    way to send a message.

    *   `MessageBuilder`: This is a helper class that allows you to enhance the message
    by allowing you to add more headers.


    Next let’s look again at the `RateSender` class. It not only will send the rate,
    but also will be listening to the `reply-queue`. Remember that the requirement
    was to receive some kind of acknowledgement from the receiver. See Listing [4-17](#A337882_1_En_4_Chapter.html#Par123).


    ```

    @Component

    public class RateSender {

    private JmsTemplate jmsTemplate;

    @Autowired

    public RateSender(JmsTemplate jmsTemplate){

    this.jmsTemplate = jmsTemplate;

    }

    public void sendCurrency(String destination, Rate rate){

    this.jmsTemplate.convertAndSend(destination,rate);

    }

    @JmsListener(destination="${apress.jms.rate-reply-queue}")

    public void process(String body,@Header("CODE") String code){

    }

    }

    Listing 4-17.

    com.apress.message.jms.RateSender.java

    ```


    Listing [4-17](#A337882_1_En_4_Chapter.html#Par123) shows you the new `RateSender`
    class. As you can see, we are reusing the `@JmsListener` and and new `@Header`
    annotation. Let’s review it:


    *   `@JmsListener`: You already know this annotation. The only difference is to
    include the correct name of the `reply-queue`. In this case, it’s the `apress.jms.rate-reply-queue`
    property value.

    *   `@Header`: This annotation will provide you with direct access to the header
    of the `Message<T>`, and in this case it will be the rate code that was processed.
    Spring JMS has more options: `@Headers` brings a `java.util.Map` object, `@Payload`
    brings the actual payload, and `@Valid` turns on validation for your payload.


    Before you run this, make sure you have the ActiveMQ broker up and running.


    If you run the application you should have not only the sender, but also the receiver
    and the reply logs. See Figure [4-11](#A337882_1_En_4_Chapter.html#Fig11).


    ![A337882_1_En_4_Fig11_HTML.jpg](A337882_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Logs with the reply-to queue


    You can take a look at the ActiveMQ web console and see that the `reply-rate`
    queue was created. See Figure [4-12](#A337882_1_En_4_Chapter.html#Fig12).


    ![A337882_1_En_4_Fig12_HTML.jpg](A337882_1_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    Queues showing the reply-rate queue


    Now you know how to create a `reply-to` and have a kind of RPC mechanism for your
    applications.'
