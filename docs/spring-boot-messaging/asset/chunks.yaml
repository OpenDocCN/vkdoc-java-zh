    \n![A337882_1_En_9_Fig20_HTML.jpg](A337882_1_En_9_Fig20_HTML.jpg)\n\n*图 9-20.\
    \ `processed.tickets`消息*\n\n![A337882_1_En_9_Fig19_HTML.jpg](A337882_1_En_9_Fig19_HTML.jpg)\n\
    \n*图 9-19. 队列（person、tickets和processed.tickets）*\n\n![A337882_1_En_9_Fig18_HTML.jpg](A337882_1_En_9_Fig18_HTML.jpg)\n\
    \n*图 9-18. 交换器（person、tickets）*\n\n恭喜！您已经使用Spring Cloud Stream创建了一个数据驱动的微服务解决方案。想象一下您可以用这项技术做什么。\n\
    \n在继续之前，您是否意识到我们缺少一个可选功能——动态路由？别担心，您将在currency项目中创建它！\n\n## Spring Cloud Stream\
    \ App Starters\n\n如果我告诉您，我们可以避免创建前面的示例，而直接使用Spring Cloud Stream应用启动器呢？\n\nSpring\
    \ Cloud Stream提供了开箱即用的应用启动器。Spring Cloud团队已经实现了大约52个应用，您可以直接下载、配置并执行。这些应用启动器按source、processor和sink模型划分：\n\
    \n*   **Source**: file, ftp, gemfire, gemfire-cq, http, jdbc, jms, load-generator,\
    \ loggregator, mail, mongodb, rabbit, s3, sftp, syslog, tcp, tcp-client, time,\
    \ trigger, triggertask, 和 twitterstream\n*   **Processor**: bridge, filter, groovy-filter,\
    \ groovy-transform, httpclient, pmml, scriptable-transform, splitter, tcp-client,\
    \ 和 transform\n*   **Sink**: aggregate-counter, cassandra, counter, field-value-counter,\
    \ file, ftp, gemfire, gpfdist, hdfs, hdfs-dataset, jdbc, log, rabbit, redis-pubsub,\
    \ router, s3, sftp, task-launcher-local, task-launcher-yarn, tcp, throughput,\
    \ 和 websocket\n\n那么，让我们使用`source:http`和`sink:log`创建一个示例。我在本章的`ch09/app-starters`文件夹中添加了必要的JAR文件。您会为每个JAR找到一个子文件夹和一个`start.sh`脚本。\n\
    \n### `source:http`\n\n打开一个终端，从`http`子文件夹执行`start.sh`脚本。或者，您可以执行以下命令：\n\n```bash\n\
    java -jar http-source-rabbit-1.1.2.RELEASE.jar --spring.cloud.stream.bindings.output.destination=simple-demo\n\
    ```\n\n注意，我们传递了一些关于目标（destination）的参数。当然，您可以创建一个`application.properties`文件并将其放在同一目录下，包含此属性。`source:http`\
    \ JAR将在`8080`端口运行。\n\n### `sink:log`\n\n打开一个新的终端，从`log`子文件夹执行`start.sh`脚本。或者，您可以执行以下命令：\n\
    \n```bash\njava -jar log-sink-rabbit-1.1.1.RELEASE.jar --spring.cloud.stream.bindings.input.destination=simple-demo\
    \ --server.port=8081\n```\n\n注意，我们传递了与`source:http`相同的参数，但这次是针对`input`通道，并且它在`8081`端口运行。\n\
    \n现在您可以进行测试了。使用`cURL`命令发送一条消息（Windows用户可以使用`POSTMAN`（[https://www.getpostman.com/](https://www.getpostman.com/)））。例如：\n\
    \n```bash\n$ curl -X POST -d \"Hello Spring Cloud Starter Apps\" localhost:8080\n\
    ```\n\n`sink:log`日志打印出一个字节数组，对吗？尝试这个新命令：\n\n```bash\n$ curl -X POST -d \"Hello\
    \ Spring Cloud Starter Apps\" localhost:8080 -H \"Content-Type: text/plain\"\n\
    ```\n\n您应该会收到消息`Hello Spring Cloud Starter Apps`。参见图[9-21](#A337882_1_En_9_Chapter.html#Fig21)。\n\
    \n![A337882_1_En_9_Fig21_HTML.jpg](A337882_1_En_9_Fig21_HTML.jpg)\n\n*图 9-21.\
    \ `source:http` | `sink:log` 说明*\n\n您可以在[`http://repo.spring.io/libs-release/org/springframework/cloud/stream/app/`](http://repo.spring.io/libs-release/org/springframework/cloud/stream/app/)获取应用启动器的最新版本。\n\
    \n如果您想使用其他Spring Cloud Stream应用启动器并查看它们的配置，可以参考[`http://docs.spring.io/spring-cloud-stream-app-starters/docs/Avogadro.SR1/reference/html/`](http://docs.spring.io/spring-cloud-stream-app-starters/docs/Avogadro.SR1/reference/html/)的文档。\n\
    \n## Currency Project\n\n对于currency项目，假设您将从某个源获取多个汇率，并且根据汇率的代码，您需要将此汇率发送给正确的消费者。换句话说，如果您发送一个来自JPY的汇率，它将选择目标JPY来发送它。这类似于您希望为微服务示例实现的动态路由。\n\
    \n请查看`rest-api-cloud-stream`项目中的`com.apress.messaging.cloud.stream.RateProcessor`类，了解动态路由。同时查看`com.apress.messaging.RestApiCloudStreamApplication`类（主类），因为它提供了一种使用`Source`流发送消息的新方法。"
