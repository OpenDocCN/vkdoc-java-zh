    `handleMessage` 方法。


    图 6-3 显示了带有 Redis 客户端的终端。监控器在执行代码之前显示，仅用于判断 Redis 是否接受消息。如你所见，Redis 显示了在 `redis-server`
    中执行的命令——在本例中，是 `PSUBSCRIBE` 和 `PUBLISH`，当然还有一个用于检查客户端与服务器之间连接的 `PING` 命令。


