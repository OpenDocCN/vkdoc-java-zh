  trans: "\n#### Sink（接收端）\n\nSink 流会创建一个输入通道来监听新的传入消息。打开 `com.apress.messaging.cloud.stream.SimpleSink`\
    \ 类。参见代码清单 9-4。\n\n```\n@EnableBinding(Sink.class)\npublic class SimpleSink {\n\
    @StreamListener(Sink.INPUT)\npublic void process(String message){\n}\n}\n代码清单\
    \ 9-4.\ncom.apress.messaging.cloud.stream.SimpleSink.java\n```\n\n代码清单 9-4 展示了一个\
    \ Sink 流，您已经了解这些注解的作用。`@EnableBinding` 会将此类转换为一个 `Source` 流，并通过 `@StreamListener`\
    \ 和 `Sink.INPUT` 通道监听新的传入消息。`Sink.INPUT` 会创建一个输入通道（`SubscribableChannel input()`）。\n\
    \n如果您使用与代码清单 9-3 相同的配置并运行应用程序，请查看 RabbitMQ 管理界面。您会看到 `input` 交换机和 `input.anonymous.*`\
    \ 相互绑定。在日志级别中，您应该会看到类似图 9-16 的内容。\n\n![A337882_1_En_9_Fig16_HTML.jpg](img/A337882_1_En_9_Fig16_HTML.jpg)\n\
    \n图 9-16.\n\n应用程序日志\n\n请记住，Sink 流会对接收到的消息执行一些额外操作，但它会终止整个流程。\n\n到目前为止，我所解释的内容并没有做太多事情，因为我希望您先了解其内部工作原理。现在，让我们考虑一个真实场景，在这个场景中，我们实际创建一个完整的流程，并观察各个流如何在不进入\
    \ RabbitMQ 管理界面的情况下相互通信。\n\n### 微服务\n\n尽管有一章专门讨论微服务，但本节将触及这种利用新概念创建可扩展、高可用性应用程序的新方式。最重要的部分是能够通过消息传递在流之间进行通信。您应该将每个流（每个\
    \ Source、Processor 和 Sink）视为一个微服务。\n\n#### 示例功能\n\n此列表包含了本示例所需的一些功能（需求）。这是一个完整的流程，允许我们打印电影票。以下是需求：\n\
    \n*   所有人员信息均以 CSV 格式接收，并存储在 `contacts.txt` 文件中。\n*   每个人包含名字、姓氏、出生日期、电话、电子邮件和是否为朋友字段。朋友字段是一个布尔值，用于指示此人是否为朋友。\n\
    *   读取 `contacts.txt` 文件后，示例必须处理每个人，然后根据以下规则创建电影票：\n    *   如果此人是朋友，则他/她可以获得免费爆米花。\n\
    \    *   如果此人是朋友，则电影免费；否则，费用为 15.75 美元。\n    *   为电影票设置过期日期。它们在一周内有效。\n*   电影票必须以\
    \ JSON 格式发送到队列，以便其他客户端易于读取。\n*   可选。为朋友和非朋友创建单独的队列。\n\n对于此流程，我创建了三个独立的项目：`cloud-stream-source-demo`、`cloud-stream-processor-demo`\
    \ 和 `cloud-stream-sink-demo`。每个项目都需要独立运行，并且必须按以下顺序启动：sink、processor，最后是 source。\n\
    \n接下来的部分将解释这三个项目的主要代码。\n\n#### cloud-stream-source-demo\n\n打开 `com.apress.messaging.cloud.stream.PersonFileSource`\
    \ 类。参见代码清单 9-5。\n\n```\n@EnableBinding(Source.class)\npublic class PersonFileSource\
    \ {\nprivate PersonFileProperties props;\nprivate PersonConverter personConverter;\n\
    public PersonFileSource(\nPersonFileProperties props,\nPersonConverter personConverter){\n\
    this.props = props;\nthis.personConverter = personConverter;\n}\n@Bean\npublic\
    \ IntegrationFlow fileFlow(){\nreturn IntegrationFlows\n.from(Files.inboundAdapter(\n\
    new File(this.props.getDirectory()))\n.preventDuplicates(true)\n.patternFilter(this.props.getNamePattern()),\n\
    e -> e.poller(Pollers.fixedDelay(5000L)))\n.split(Files.splitter().markers())\n\
    .filter(p -> !(p instanceof FileSplitter.FileMarker))\n.transform(Transformers.converter(personConverter))\n\
    .channel(Source.OUTPUT)\n.get();\n}\n}\n代码清单 9-5.\ncom.apress.messaging.cloud.stream.PersonFileSource.java\n\
    ```\n\n代码清单 9-5 展示了 Source 流。请注意，它使用 `IntegrationFlow` 类来创建文件读取，并进行少量转换以生成 `Person`\
    \ 对象。然后将其发送到 `Source.OUTPUT` 通道。\n\n接下来，打开 `application.properties`。参见代码清单 9-6。\n\
    \n```\nserver.port=${port:8081}\nspring.cloud.stream.bindings.output.destination=person\n\
    apress.stream.file.directory=.\napress.stream.file.name-pattern=*.txt\n代码清单 9-6.\n\
    src/main/resources/application.properties\n```\n\n代码清单 9-6 展示了 `application.properties`\
    \ 文件。如您所见，如果在运行时未指定端口参数，它将在端口 `8081` 启动。这里重要的是 `output.destination` 允许我们创建一个名为\
    \ `person` 的通道。为什么需要这样做？请记住，流（source、processor 和 sink）使用相同的通道名称。如果我们不更改目标，则不会处理任何文件。如果我们从\
    \ source 启动，source 需要发送到输出，但 processor 也有一个输出，那么将使用哪个通道？这里存在冲突。这就是为什么我们需要添加目标。一旦您运行此示例，就会变得清晰。\n\
    \n#### cloud-stream-processor-demo\n\n打开 `com.apress.messaging.cloud.stream.PersonTicketProcessor`\
    \ 类。参见代码清单 9-7。\n\n```\n@EnableBinding(Processor.class)\npublic class PersonTicketProcessor\
    \ {\nprivate List movieTitles =\nArrays.asList(\"死侍 2\"\n,\"超人总动员 2\"\n,\"阿凡达\
    \ 2\",\"人猿泰山 2\"\n,\"赛车总动员 3\");\nprivate Random rand = new Random();\n@StreamListener(Processor.INPUT)\n\
    @SendTo(Processor.OUTPUT)\npublic Ticket process(Person person) {\nTicket ticket\
    \ = new Ticket();\nticket.setPerson(person);\nticket.setMovieTitle(\nmovieTitles.get(\n\
    rand.nextInt(movieTitles.size())));\nticket.setFreePopcorn(person.isFriend());\n\
    ticket.setCost(person.isFriend() ? 0.0f: 15.75f);\nticket.setValidUntil(\nnew\
    \ DateTime(new Date()).plusWeeks(1).toDate());\nreturn ticket;\n}\n}\n代码清单 9-7.\n\
    com.apress.messaging.cloud.stream.PersonTicket.java\n```\n\n代码清单 9-7 展示了 Processor\
    \ 流。如您所见，没有新内容。我们接收一个 person 对象，但返回一个 ticket 对象，当然，我们根据需求执行了逻辑。\n\n接下来，打开 `application.properties`\
    \ 文件。参见代码清单 9-8。\n\n```\nserver.port=${port:8082}\nspring.cloud.stream.bindings.input.destination=person\n\
    spring.cloud.stream.bindings.output.destination=tickets\nspring.cloud.stream.bindings.output.content-type=application/json\n\
    spring.jackson.date-format=yyyy-MM-dd\n代码清单 9-8.\nsrc/main/resources/application.properties\n\
    ```\n\n代码清单 9-8 展示了 `application.properties` 文件。请记住，Processor 流具有输入和输出通道，因此我们需要通过为每个通道添加目标来重命名它们。输入通道将命名为\
    \ `person`，输出通道将命名为 `tickets`。\n\n回想一下，其中一个需求是让票证采用 JSON 格式，这就是我们将 `content-type`\
    \ 设置为 `application/json` 的原因。这将使用 Jackson 库将票证转换为 JSON 格式。最后，我们添加了更好的日期格式。\n"
