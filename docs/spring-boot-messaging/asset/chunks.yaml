- fmt: "#### Sink\n\nThe `Sink` stream will create an input channel to listen for\
    \ new incoming messages. Open the `com.apress.messaging.cloud.stream.SimpleSink`\
    \ class. See Listing [9-4](#A337882_1_En_9_Chapter.html#Par100).\n\n```\n@EnableBinding(Sink.class)\n\
    public class SimpleSink {\n@StreamListener(Sink.INPUT)\npublic void process(String\
    \ message){\n}\n}\nListing 9-4.\ncom.apress.messaging.cloud.stream.SimpleSink.java\n\
    ```\n\nListing [9-4](#A337882_1_En_9_Chapter.html#Par100) shows you a `Sink` stream,\
    \ and you already know about the annotations. The `@EnableBinding` will convert\
    \ this class to a `Source` stream and it will listen for new incoming message\
    \ through `@StreamListener` and the `Sink.INPUT` channel. The `Sink.INPUT` will\
    \ create an input channel (`SubscribableChannel input()`).\n\nIf you use the same\
    \ Listing [9-3](#A337882_1_En_9_Chapter.html#Par97) and run the application, take\
    \ a look at the RabbitMQ management. You will see the `input` exchange and the\
    \ `input.anonymous.*` bound to each other. At the log levels, should you have\
    \ something similar to Figure [9-16](#A337882_1_En_9_Chapter.html#Fig16).\n\n\
    ![A337882_1_En_9_Fig16_HTML.jpg](A337882_1_En_9_Fig16_HTML.jpg)\n\nFigure 9-16.\
    \ Application logs\n\nRemember, the `Sink` stream will do some extra work with\
    \ the message it received, but it will end the flow.\n\nWhat I explained so far\
    \ doesn’t do too much, because I wanted you to understand how this works internally\
    \ first. Now, let’s consider a real-life scenario, where we actually create a\
    \ complete flow and see how the streams communicate with each other without going\
    \ into the RabbitMQ management.\n\n### Microservices\n\nEven though there is a\
    \ chapter dedicated to microservices, this section touches on this new way to\
    \ create scalable and highly available applications using this new concept. The\
    \ most important part is to be able to communicate between streams using messaging.\
    \ You should consider each stream (each source, processor, and sink) as a microservice.\n\
    \n#### Example Features\n\nThis list includes some of the features (requirements)\
    \ needed for this example. This is a complete flow that will allow us to print\
    \ movie tickets. Here are the requirements:\n\n- All persons are received in CSV\
    \ format in the `contacts.txt` file.\n- Each person includes first name, last\
    \ name, date of birth, phone, e-mail, and friend fields. The Friend field is a\
    \ Boolean that indicates if this is a friend or not.\n- After reading the `contacts.txt`\
    \ file, the example must process each person and then create a movie ticket using\
    \ the following rules:\n  - If the person is a friend, he or she gets free popcorn.\n\
    \  - If the person is a friend, the movie is free; otherwise, the cost is $15.75.\n\
    \  - Set an expiration date for the movie tickets. They are valid for a week.\n\
    - Movie tickets must be sent to a queue in JSON format, so it’s easy for other\
    \ clients to read them.\n- Optional. Create a queue for friends and non-friends.\n\
    \nFor this flow, I created three separate projects: `cloud-stream-source-demo`,\
    \ `cloud-stream-processor-demo`, and `cloud-stream-sink-demo`. Each one needs\
    \ to run separate and must start in the following order: sink, processor, and\
    \ last source.\n\nThe next sections explain the main code of these three projects.\n\
    \n#### cloud-stream-source-demo\n\nOpen the `com.apress.messaging.cloud.stream.PersonFileSource`\
    \ class. See Listing [9-5](#A337882_1_En_9_Chapter.html#Par118).\n\n```\n@EnableBinding(Source.class)\n\
    public class PersonFileSource {\nprivate PersonFileProperties props;\nprivate\
    \ PersonConverter personConverter;\npublic PersonFileSource(\nPersonFileProperties\
    \ props,\nPersonConverter personConverter){\nthis.props = props;\nthis.personConverter\
    \ = personConverter;\n}\n@Bean\npublic IntegrationFlow fileFlow(){\nreturn IntegrationFlows\n\
    .from(Files.inboundAdapter(\nnew File(this.props.getDirectory()))\n.preventDuplicates(true)\n\
    .patternFilter(this.props.getNamePattern()),\ne -> e.poller(Pollers.fixedDelay(5000L)))\n\
    .split(Files.splitter().markers())\n.filter(p -> !(p instanceof FileSplitter.FileMarker))\n\
    .transform(Transformers.converter(personConverter))\n.channel(Source.OUTPUT)\n\
    .get();\n}\n}\nListing 9-5.\ncom.apress.messaging.cloud.stream.PersonFileSource.java\n\
    ```\n\nListing [9-5](#A337882_1_En_9_Chapter.html#Par118) shows the source stream.\
    \ Note that it uses the `IntegrationFlow` class to create the `File` reading,\
    \ a small transformation into a `Person` object. It’s then sent to the `Source.OUTPUT`\
    \ channel.\n\nNext, open `application.properties`. See Listing [9-6](#A337882_1_En_9_Chapter.html#Par121).\n\
    \n```\nserver.port=${port:8081}\nspring.cloud.stream.bindings.output.destination=person\n\
    apress.stream.file.directory=.\napress.stream.file.name-pattern=*.txt\nListing\
    \ 9-6.\nsrc/main/resources/application.properties\n```\n\nListing [9-6](#A337882_1_En_9_Chapter.html#Par121)\
    \ shows you the `application.properties` file. As you can see, it start in port\
    \ `8081` if the port argument is not specified at runtime. What is important here\
    \ is the `output.destination` allows us to create a channel named `person`. Why\
    \ is this necessary? Remember that the streams (source, processor, and sink) use\
    \ the same name of the channels. If we don’t change the destination, no files\
    \ will be processed. If we start with the source, the source needs to send to\
    \ the output, but the processor also has an output, so which channel will be used?\
    \ There is a conflict here. That’s why we need to add the destination. Once you\
    \ run this example, it will become clear.\n\n#### cloud-stream-processor-demo\n\
    \nOpen the `com.apress.messaging.cloud.stream.PersonTicketProcessor` class. See\
    \ Listing [9-7](#A337882_1_En_9_Chapter.html#Par124).\n\n```\n@EnableBinding(Processor.class)\n\
    public class PersonTicketProcessor {\nprivate List movieTitles =\nArrays.asList(\"\
    Dead Pool 2\"\n,\"The Incredibles 2\"\n,\"Avatar 2\",\"Tarzan 2\"\n,\"Cars 3\"\
    );\nprivate Random rand = new Random();\n@StreamListener(Processor.INPUT)\n@SendTo(Processor.OUTPUT)\n\
    public Ticket process(Person person) {\nTicket ticket = new Ticket();\nticket.setPerson(person);\n\
    ticket.setMovieTitle(\nmovieTitles.get(\nrand.nextInt(movieTitles.size())));\n\
    ticket.setFreePopcorn(person.isFriend());\nticket.setCost(person.isFriend() ?\
    \ 0.0f: 15.75f);\nticket.setValidUntil(\nnew DateTime(new Date()).plusWeeks(1).toDate());\n\
    return ticket;\n}\n}\nListing 9-7.\ncom.apress.messaging.cloud.stream.PersonTicket.java\n\
    ```\n\nListing [9-7](#A337882_1_En_9_Chapter.html#Par124) shows you the processor\
    \ stream. As you can see, nothing is new. We are receiving a person, but we are\
    \ returning a ticket, and of course we are doing the logic based on the requirements.\n\
    \nNext, open the `application.properties` file. See Listing [9-8](#A337882_1_En_9_Chapter.html#Par127).\n\
    \n```\nserver.port=${port:8082}\nspring.cloud.stream.bindings.input.destination=person\n\
    spring.cloud.stream.bindings.output.destination=tickets\nspring.cloud.stream.bindings.output.content-type=application/json\n\
    spring.jackson.date-format=yyyy-MM-dd\nListing 9-8.\nsrc/main/resources/application.properties\n\
    ```\n\nListing [9-8](#A337882_1_En_9_Chapter.html#Par127) shows the `application.properties`\
    \ file. Remember that the processor stream has input and output channels, so we\
    \ need to rename them by adding the destination to each one. The input channel\
    \ will be named `person` and the output will be named `tickets`.\n\nRecall that\
    \ one of the requirements is to have the ticket in JSON format, which is why we\
    \ add the `content-type` as `application/json`. This will convert the ticket using\
    \ the Jackson library into JSON format. Finally, we add a better date format."
