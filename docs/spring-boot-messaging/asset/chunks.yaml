  trans: "\n## 货币项目\n\n你可以继续推进货币项目，并添加必要的逻辑，以便提供一种消费不同市场货币汇率消息的方式。你可以审查所有代码；代码已准备就绪，可直接使用。\n\
    \n使用演示程序发送汇率消息（演示程序在 [`http://projects.spring.io/spring-amqp/`](http://projects.spring.io/spring-amqp/)\
    \ 处包含所有必要代码）。\n\n## 总结\n\n本章讨论了 AMQP 模型，并解释了交换机、绑定和队列之间的区别。我们回顾了一些简单的示例，这些示例展示了创建生产者和消费者的方法。\n\
    \n你了解了 Spring AMQP 模块的一些出色特性，以及 Spring Boot 如何帮助你进行配置。\n\n使用 Spring 消息传递的好处之一是，所有\
    \ Spring 技术都使用相同的概念。我们发送消息的方式（生产者）；模板模式的使用（`JmsTemplate`、`RabbitTemplate` 等）；我们通过实现\
    \ `MessageListener` 接口或使用注解（如 `@JmsListener`、`@RabbitListener`、`@SendTo`，很快你还会看到\
    \ `@StreamListener`）来创建监听器（消费者）的方式；以及通过注解（如 `@Payload`、`@Header` 等）直接访问消息结构的方式——它们在构造上都是相似的。\n\
    \n请记住，这只是你使用 Spring AMQP 所能实现功能的一小部分，我需要写一整本关于 Spring AMQP 的书才能向你展示每一个特性。现在，你已经具备了创建出色\
    \ AMQP 应用所需的最低限度知识。\n\n下一章将介绍发布者/订阅者消息传递，但这次将使用 Redis 作为主要消息传递引擎。\n\n# 6. 使用 Redis\
    \ 进行消息传递\n\n本章将向你展示如何将 Redis（远程字典服务器）与 Spring Boot 结合使用，作为消息代理。Redis 是一个内存数据结构存储系统，可用作数据库、缓存和消息代理。它不仅存储键值对，还可用于存储复杂的数据类型，例如哈希、列表、集合、有序集合、位图、HyperLogLog\
    \ 和地理空间索引。\n\nSpring Boot 使用 Spring Data 模块，特别是 Redis 模块。换句话说，为了在你的项目中使用 Redis，你必须在\
    \ `pom.xml` 文件或 Gradle 中添加 `spring-boot-starter-redis` 依赖。然后，你将拥有连接到 Redis 服务器所需的所有必要依赖。\n\
    \n## Redis 作为消息代理\n\nRedis 不仅提供了一种存储数据结构的方式，还实现了发布/订阅消息传递范式。前面的章节已经用 JMS 解释过这种范式。\n\
    \n这里的重要部分将向你展示如何与 Redis 交互并启用消息代理。Redis 拥有通道的概念，消息将由发布者发送到通道。消息将被对一个或多个通道感兴趣的订阅者消费。如你所见，Redis\
    \ 中使用了 `channel` 关键字。Redis 中的通道相当于 JMS 世界中的主题。\n\nRedis 有几个命令允许你与发布/订阅功能进行交互：\n\
    \n*   `SUBSCRIBE`：告诉 Redis 订阅一个或多个特定通道。例如：\n\n    ```\n    127.0.0.1:6379> SUBSCRIBE\
    \ spring-boot-chat\n    ```\n\n    你可以通过列出多个通道并用空格分隔来同时订阅它们。\n*   `UNSUBSCRIBE`：取消订阅某个通道。此命令不需要参数。\n\
    *   `PUBLISH`：通过指定通道（作为第一个参数）和实际消息来发布消息。例如：\n\n    ```\n    127.0.0.1:6379> PUBLISH\
    \ spring-boot-chat \"Hi there\"\n    ```\n\n*   `PSUBSCRIBE`：此命令与 `SUBSCRIBE`\
    \ 相同，但接受用于匹配多个通道的模式。例如：\n\n    ```\n    127.0.0.1:6379> PSUBSCRIBE currency .*\n\
    \    ```\n\n    此示例将订阅任何以 `currency` 开头的通道，例如 `currency.us`、`currency.asia.jp`、`currency.eu.gb`\
    \ 等。\n*   `PUNSUBSCRIBE`：使用模式匹配取消订阅。例如：\n\n    ```\n    127.0.0.1:6379> PUNSUBSCRIBE\
    \ currency.asia.*\n    ```\n\n*   `PING`：如果未提供参数，则返回 `PONG`。通常使用此命令来测试连接是否仍然存活。\n\
    \n为了尝试一下，请确保你已安装 Redis 并且它正在运行。（你可以从 [`https://redis.io/download`](https://redis.io/download)\
    \ 下载它。）打开一个新的终端窗口，并使用 `redis-cli` 命令与 Redis 交互。参见图 6-1。\n\n![A337882_1_En_6_Fig1_HTML.jpg](img/A337882_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1.\n\n使用发布/订阅命令与 Redis 交互\n\n图 6-1 向你展示了一种与 Redis 交互的简单方法，并说明了订阅和发布消息是多么容易。\n\
    \n本章不讨论 Redis 集群、哨兵、分片等。它专注于消息传递。许多客户广泛使用 Redis 作为消息代理和用于实时数据分析的 Web 会话管理工具。本章首先介绍如何使用\
    \ Spring Boot 和 Redis 进行消息传递。\n\n## 使用 Redis 进行发布/订阅消息传递\n\n如前所述，Spring Boot 将利用\
    \ Spring Data Redis 的强大功能，这与你已经熟悉的 Spring JMS 非常相似。Spring Boot 将配置必要的组件，例如连接、要使用的数据库（默认是\
    \ 0 号索引数据库）、集群节点（如果有）、连接池、哨兵、超时等。请记住，只需添加 `spring-boot-starter-redis` 即可启用 Redis\
    \ 的自动配置。\n\nSpring Data Redis 模块有两个主要的消息传递领域——消息的生产或发布，以及消息的消费或订阅。对于消息发布，它使用 `RedisTemplate<K,V>`\
    \ 类（它使用了模板设计模式）；对于订阅，它有一个专用的异步消息监听器容器（一个 MDP——消息驱动的 POJO）。对于同步消息，它使用 `RedisConnection`\
    \ 接口契约。以下各节仅涵盖异步订阅。\n\n在本章中，我们将使用两个项目：`redis-demo` 和 `rest-api-redis`。`redis-demo`\
    \ 项目包含完成和补充货币项目所需的所有代码。\n"
- fmt: '### Subscriber


    As a Redis subscriber you can subscribe to one or multiple channels (or topics)
    by using a fixed name or by using pattern matching. The Spring Data Redis module
    offers a way to do low-level subscriptions via the `RedisConnection`. This includes
    the `subscribe` and `pSubscribe` methods.


    A low-level subscription needs a way to deal with connections and thread management
    for simple listeners. Now imagine having multiple listeners. You might think it
    would be a hassle to implement this functionality, but Spring Data Redis includes
    the `RedisMessageListenerContainer` class, which does all the heavy lifting and
    supports the message-driven pojos (MDPs). In other words, you can create your
    own class and method to receive the message and process it. This means that you
    need to use the `MessageListenerAdapter` class in order to use this feature. Don’t
    worry too much, this is what I’m going to show you next.


    Open the `redis-demo` project and review the `com.apress.messaging.config.RedisConfig`
    class, shown in Listing [6-1](#A337882_1_En_6_Chapter.html#Par27).


    ```

    @Configuration

    @EnableConfigurationProperties(SimpleRedisProperties.class)

    public class RedisConfig {

    @Bean

    public RedisMessageListenerContainer

    container(RedisConnectionFactory connectionFactory,

    MessageListenerAdapter listenerAdapter,

    @Value("${apress.redis.topic}") String topic) {

    RedisMessageListenerContainer container = new

    RedisMessageListenerContainer();

    container.setConnectionFactory(connectionFactory);

    container.addMessageListener(listenerAdapter,

    new PatternTopic(topic));

    return container;

    }

    @Bean

    MessageListenerAdapter listenerAdapter(

    Subscriber subscriber) {

    return new MessageListenerAdapter(subscriber);

    }

    }

    Listing 6-1.

    com.apress.messaging.config.RedisConfig.java

    ```


    Listing [6-1](#A337882_1_En_6_Chapter.html#Par27) shows you the configuration
    that we are going to use in order to subscribe to a channel. Let’s see the code
    in more detail:


    *   `RedisMessageListenerContainer`: This is a class that does all the heavy lifting
    and acts as a message listener container that will receive messages from the Redis
    channel (topic). You need to set the connection factory and the message listener
    that will process the message received. Remember that this listener container
    is responsible for all the threading and message dispatching.

    *   `RedisConnectionFactory`: This interface is necessary for the `RedisMessageListenerContainer`
    and it holds all the information about the Redis connections. Because it is part
    of the method, Spring will auto-wire this, so you don’t need to create it by hand.
    Behind the scenes, Spring Boot takes care of this configuration for you.

    *   `MessageListenerAdapter`: This class is an adapter that delegates the incoming
    message to a declared class that is complaint with `MessageListener` signatures.
    You can see that this is being set by calling the `container.addMessageListener`
    method and passing as parameters the subscriber (`listenerAdapter` - `MessageListenerAdapter`)
    and topic (`PatternTopic`) where it will subscribe.

    *   `PatternTopic`: This is a class and is one of the parameters that the message
    listener needs. It normally holds the name of the topic or the name pattern that
    will be used to subscribe to the right channel.


    Next, let’s look at the `Subscriber` class. Open the `com.apress.messaging.redis.Subscriber`
    class, as shown in Listing [6-2](#A337882_1_En_6_Chapter.html#Par34).


    ```

    @Component

    public class Subscriber {

    public void handleMessage(String message){

    // Process message here ...

    }

    }

    Listing 6-2.

    com.apress.messaging.redis.Subscriber.java

    ```


    Listing [6-2](#A337882_1_En_6_Chapter.html#Par34) shows you the `Subscriber` class
    with only one required method (`handleMessage`). The `Subscriber` class is an
    adapter for a message delegation. In other words, `MessageListenerAdapter` is
    compliant with the following signatures:


    ```

    void handleMessage(String message);

    void handleMessage(Map message);

    void handleMessage(byte[] message);

    void handleMessage(Serializable message);

    //You can get the channel or the pattern used

    void handleMessage(Serializable message, String channel);

    void handleMessage(byte[] bytes, String pattern);

    //You can have your own object

    void handleMessage(MyOwnDomainObject obj);

    ```


    There may be times when your adapter class will have more methods that do extra
    processing or are being called from the outside. In these cases, you can let the
    `MessageListenerAdapter` class know what method you want to use by adding an extra
    parameter in its constructor. For example:


    ```

    @Component

    public class Subscriber {

    public void shipping(Order order){

    // Process order here ...

    }

    //This method is used as listener for Redis topics

    public void processTicket(String message){

    // Process message here ...

    }

    // ... more methods

    }

    // RedisConfig.java

    @Bean

    MessageListenerAdapter listenerAdapter(Subscriber subscriber) {

    return new MessageListenerAdapter(subscriber,"processTicket");

    }

    ```


    Add the name of the method that you will use for processing the incoming message
    from the Redis topic to the constructor; in this example, that’s the `processTicket`
    method.


    As you can see, the benefit of using a `MessageListenerAdapter` is that you have
    no dependencies in your `POJO` class, making your application more extensible.'
