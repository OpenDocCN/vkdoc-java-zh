    `Listing 4-4` shows you the publisher code—a publisher-subscriber message model—that
    will publish a simple text message to a topic named `myTopic`. Not too different
    from the point-to-point model. How about the subscriber? See `Listing 4-5`.


    ```

    // Step 1\. Create Connection

    InitialContext ctx = new InitialContext();

    TopicConnectionFactory factory = (TopicConnectionFactory)ctx.lookup("connectionFactory");

    TopicConnection connection = factory.createTopicConnection();

    connection.start();

    // Step 2\. Create Session

    TopicSession session = connection.createTopicSession(false, Session.AUTO_ACKNOWLEDGE);

    // Step 3\. Get the Topic

    Topic topic = (Topic)ctx.lookup("myTopic");

    // Step 4\. Create the Receiver

    TopicSubscriber subscriber = session.createSubscriber(topic);

    // Step 5\. Create the Listener

    MessageListener listener = new MessageListener() {

    @Override

    public void onMessage(Message message) {

    //Process the message here

    }

    };

    // Step 6\. Register the Listener

    subscriber.setMessageListener(listener);

    Listing 4-5.

    Publisher-Subscriber Subscriber Client

    ```


    `Listing 4-5` shows the publisher-subscriber messaging client; this client subscribes
    to the topic named `myTopic`. You can run multiple clients with this code and
    each one will receive the message from the publisher; again not too different
    from the point-to-point model. Of course, you still need `jndi.properties` for
    these clients.


    As you can see, both messaging model implementations are very straightforward.
    If you take a closer look to any of the code, you will notice that in every case,
    the message sent is just a text message, but what happens if you need to send
    something else? JMS supports different message types:


    *   `StreamMessage` is a serialized stream object.

    *   `MapMessage` consists of a name/value pairs, like a hash table.

    *   `TextMessage` is a string.

    *   `ObjectMessage` is a serializable object.

    *   `ByteMessage` is a raw stream of bytes.


    As homework, try to create some clients (point-to-point or publisher-subscribe
    models) using these code snippets. The idea is to familiarize yourself on what
    you can do with this kind of messaging.


    I’ve just given you a sneak peek on what you normally do with JMS without using
    an external framework. I think there are a lot of steps just to do something simple.


    ## JMS with Spring Boot


    `Chapter 2` showed you how Spring Boot knows about the application you are trying
    to run because it’s an opinionated technology. Just by adding a `spring-boot-starter`
    pom, you tell Spring Boot how to configure everything, right?


    We are going to use Apache ActiveMQ in this example (you are welcome to use any
    other broker; the code will be the same), which means that we can include the
    `spring-boot-starter-activemq` dependency. By adding this dependency, Spring Boot
    will bring all the JMS and ActiveMQ (JAR files) that we will need for the applications
    and it will auto-configure all the necessary properties and extra configuration
    needed for the JMS client.


    Remember all the steps that you needed to do in Java? These are not necessary
    with Spring Boot.


    Note


    We are going to use more dependencies like AOP to take care of some logging concerns.
    Take a look at the `pom.xml` file in the projects of these chapters.


    We are going to work with the `jms-sender` project, which you can find in the
    book’s source code. This project has a lot of the classes with some code commented
    out, and just by uncommenting, it should work. Don’t worry, though, as I’ll guide
    you through the following sections by explaining each snippet of code.


    Note


    Remember that you can get all the code from the Apress site or directly from the
    GitHub Repository at [`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)'
