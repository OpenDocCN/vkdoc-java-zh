    \ logs and the `ChatMessage` is being handled by the `chatRoom` method (this happened\
    \ because of the `@MessageMapping` and `@SendTo` annotations) .\n\nThat’s how\
    \ you create a chat room very easily with Spring Boot and the `spring-websocket`\
    \ module.\n\nQuestion: How can you create a SockJS client using Spring? Imagine\
    \ that you need to send a message to a remote WebSockets connection using STOMP.\
    \ Look at the code in the `WebSocketsDemoApplication` class, which is commented\
    \ out. You will see how to use the `SockJSClient` and `WebSocketsStompClient`\
    \ classes there.\n\n## Using RabbitMQ as a STOMP Broker Relay\n\nHave you wondered\
    \ what would happen if your application needed more support, being more scalable?\
    \ Well, one solution is to add several Spring Boot apps that have the WebSockets\
    \ broker enabled and then add a load balancer in front of them. The problem is\
    \ getting high availability, because you need to add the logic and behavior for\
    \ the apps, so that, if one is down, the others keep responding to the clients.\n\
    \nThe good news is that the `spring-websocket` module has a way to use an external\
    \ relay: RabbitMQ. RabbitMQ includes the STOMP protocol as a plugin. It also includes\
    \ real full high availability and an easy way to set up a cluster.\n\nFollow these\
    \ steps to add RabbitMQ as a STOMP relay to your application:\n\n1.  Make sure\
    \ to enable the RabbitMQ STOMP plugin:\n\n    ```\n    $ rabbitmq-plugins enable\
    \ rabbitmq_stomp\n    $ rabbitmq-plugins enable rabbitmq_web_stomp\n    ```\n\n\
    2.  Add the following dependencies to your `pom.xml` file.\n\n    ```\n    io.projectreactor\n\
    \    reactor-core\n\n    io.projectreactor\n    reactor-net\n\n    io.netty\n\
    \    netty-all\n    4.1.8.Final\n\n    ```\n\n3.  Configure the `WebSocketsConfig`\
    \ class similar to the following code:\n\n    ```\n    @Override\n    public void\
    \ configureMessageBroker(\n    MessageBrokerRegistry config) {\n    config.setApplicationDestinationPrefixes(\n\
    \    props.getAppDestinationPrefix());\n    config.enableStompBrokerRelay(\n \
    \   \"/topic\", \"/queue\").setRelayPort(61613);\n    }\n    ```\n\nWhat is different\
    \ from the previous version is that now in the `configureMessageBroker` method\
    \ you are configuring the `enableStompBrokerRelay` (using `/topic` and `/queue`)\
    \ and adding the STOMP port with the `setRelayPort` method (with the value of\
    \ `61613`, the RabbitMQ’s STOMP port ).\n\nAnd that’s it. You can now use RabbitMQ\
    \ as a broker relay. Before you run the project, make sure the RabbitMQ broker\
    \ is up and running. Then you can run the project and use the same `sockjs-stomp.html`\
    \ web page. The important part here is to keep an eye on the RabbitMQ console\
    \ to see connections and queues."
  trans: "\n*   `@MessageMapping`：此注解与应用前缀有关，意味着客户端需要向 `prefix + mapping` 发送消息。在本例中，即\
    \ `/my-app/chat-room`。该注解由 `@Controller` 类中的方法支持，其值可视为 ant 风格、以斜杠分隔的路径模式。与此注解配合，你还可以使用其他注解作为方法参数，包括\
    \ `@Payload`、`@Header`、`@Headers`、`@DestinationVariable` 和 `java.security.Principal`。\n\
    *   `@SendTo`：你已经了解此注解；它与我们在 JMS 和 RabbitMQ 章节中使用的注解相同。在此场景下，该注解用于将消息发送到任何其他目的地。\n\
    \n尽管我们没有使用 `@SubscribeMapping`，但你可以在 `@Controller` 注解的类中，将其用于你想要处理传入消息的方法上。当你需要通过\
    \ `@SendTo` 获取响应副本时，这通常会很有用。\n\n另一个我们未使用的工具类是 `SimpleMessagingTemplate`。它可用于发送消息。例如：\n\
    \n```\n@Controller\npublic class AnotherController {\nprivate SimpMessagingTemplate\
    \ template;\n@Autowired\npublic AnotherController(SimpMessagingTemplate template)\
    \ {\nthis.template = template;\n}\n@RequestMapping(path=\"/rate/new\", method=POST)\n\
    public void newRates(Rate rate) {\nthis.template.convertAndSend(\"/topic/new-rate\"\
    , rate);\n}\n}\n```\n\n如你所见，使用 WebSockets 技术实现订阅者/发布者模型非常简单。`AnotherController`\
    \ 通过发送消息（`ChatMessage`）也充当了客户端角色。\n\n接下来，让我们看看另一个客户端。打开 `src/main/resources/static/sockjs-stomp.html`\
    \ 页面。参见代码清单 7-7。\n\n```\n$(function(){\nvar socket =\nnew SockJS('http://localhost:8080/stomp-endpoint');\n\
    var stompClient = Stomp.over(socket);\nstompClient.connect({}, function (frame)\
    \ {\nconsole.log('Connected: ' + frame);\nstompClient.subscribe('/topic/chat-room',\n\
    function (data) {\nconsole.log('>>>>> ' + data);\nvar json = JSON.parse(data.body);\n\
    $(\"#output\")\n.append(\"\"\n+ json.user\n+ \": \"\n+ json.message\n+ \"\");\n\
    });\n});\n$(\"#send\").click(function(){\nvar chatMessage = {}\nchatMessage[\"\
    user\"] = $(\"#user\").val();\nchatMessage[\"message\"] = $(\"#message\").val();\n\
    stompClient.send(\n\"/my-app/chat-room\",\n{},\nJSON.stringify(chatMessage));\n\
    });\n});\n代码清单 7-7.\nsockjs-stomp.html 代码片段\n```\n\n代码清单 7-7 展示了 JavaScript 客户端。我们来分析一下：\n\
    \n*   `SockJS`：这是一个模拟 WebSockets 协议的 JavaScript 库。此对象连接到服务器端指定的 `/stomp` 端点。有关此库的更多信息，请访问\
    \ [`http://sockjs.org/`](http://sockjs.org/)。\n*   `STOMP`：这是一个使用 WebSockets 协议的\
    \ JavaScript 库，通常需要 SockJS 对象。更多信息请访问 [`http://jmesnil.net/stomp-websocket/doc/`](http://jmesnil.net/stomp-websocket/doc/)。\n\
    *   `connect`：这是一个回调函数，在与服务器建立连接时被调用。\n*   `subscribe`：这是一个回调函数，当订阅的目的地有消息时被调用。\n\
    *   `send`：此方法将消息发送到指定的目的地。\n\n这是在 JavaScript 客户端中使用 SockJS 和 STOMP 的一种非常简单的方式。现在你可以运行\
    \ `websockets-demo` 项目了。\n\n注意\n\n在运行本节中的 `websocket-demo` 项目之前，请确保 `LlWebSocketConfig`\
    \ 类已被禁用（通过注释掉 `@Configuration` 和 `@EnableWebSocket` 注解）。\n\n运行项目并打开浏览器。访问 `http://localhost:8080/sockjs-stomp.html`\
    \ 网页。你将看到与之前示例类似的内容。如果你好奇，可以打开浏览器的开发者控制台查看控制台日志。参见图 7-10。\n\n![A337882_1_En_7_Fig10_HTML.jpg](img/A337882_1_En_7_Fig10_HTML.jpg)\n\
    \n图 7-10.\n\n浏览器控制台日志\n\n图 7-10 展示了连接日志。现在打开第二个浏览器窗口并访问相同的 URL。目的是模拟两个客户端进行通信。接下来，发送一些消息并查看结果。参见图\
    \ 7-11 和图 7-12。\n\n![A337882_1_En_7_Fig12_HTML.jpg](img/A337882_1_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12.\n\n应用日志\n\n![A337882_1_En_7_Fig11_HTML.jpg](img/A337882_1_En_7_Fig11_HTML.jpg)\n\
    \n图 7-11.\n\n两个浏览器客户端\n\n图 7-11 展示了两个客户端通过 SockJS 和 STOMP 使用 WebSockets 发送消息。\n\
    \n图 7-12 展示了 `SimpleController` 日志，并且 `ChatMessage` 正在由 `chatRoom` 方法处理（这是由于 `@MessageMapping`\
    \ 和 `@SendTo` 注解的作用）。\n\n这就是如何使用 Spring Boot 和 `spring-websocket` 模块非常轻松地创建一个聊天室。\n\
    \n问题：如何使用 Spring 创建一个 SockJS 客户端？想象一下，你需要使用 STOMP 向远程 WebSockets 连接发送消息。查看 `WebSocketsDemoApplication`\
    \ 类中被注释掉的代码。你将看到如何在那里使用 `SockJSClient` 和 `WebSocketsStompClient` 类。\n\n## 使用 RabbitMQ\
    \ 作为 STOMP 代理中继\n\n你是否想过，如果你的应用需要更多支持，需要更具可扩展性，会发生什么？嗯，一种解决方案是添加多个启用了 WebSockets\
    \ 代理的 Spring Boot 应用，然后在它们前面添加一个负载均衡器。问题在于实现高可用性，因为你需要为这些应用添加逻辑和行为，以便当其中一个宕机时，其他应用能继续响应客户端。\n\
    \n好消息是，`spring-websocket` 模块提供了一种使用外部中继的方式：RabbitMQ。RabbitMQ 将 STOMP 协议作为一个插件包含在内。它还提供了真正的完全高可用性以及一种简单的集群设置方法。\n\
    \n按照以下步骤将 RabbitMQ 作为 STOMP 中继添加到你的应用中：\n\n1.  确保启用 RabbitMQ STOMP 插件：\n\n   \
    \ ```\n    $ rabbitmq-plugins enable rabbitmq_stomp\n    $ rabbitmq-plugins enable\
    \ rabbitmq_web_stomp\n    ```\n\n2.  将以下依赖项添加到你的 `pom.xml` 文件中。\n\n    ```\n \
    \   io.projectreactor\n    reactor-core\n\n    io.projectreactor\n    reactor-net\n\
    \n    io.netty\n    netty-all\n    4.1.8.Final\n\n    ```\n\n3.  配置 `WebSocketsConfig`\
    \ 类，类似于以下代码：\n\n    ```\n    @Override\n    public void configureMessageBroker(\n\
    \    MessageBrokerRegistry config) {\n    config.setApplicationDestinationPrefixes(\n\
    \    props.getAppDestinationPrefix());\n    config.enableStompBrokerRelay(\n \
    \   \"/topic\", \"/queue\").setRelayPort(61613);\n    }\n    ```\n\n与之前版本的不同之处在于，现在在\
    \ `configureMessageBroker` 方法中，你配置了 `enableStompBrokerRelay`（使用 `/topic` 和 `/queue`），并通过\
    \ `setRelayPort` 方法添加了 STOMP 端口（值为 `61613`，即 RabbitMQ 的 STOMP 端口）。\n\n就是这样。现在你可以将\
    \ RabbitMQ 用作代理中继了。在运行项目之前，请确保 RabbitMQ 代理已启动并正在运行。然后你可以运行项目并使用相同的 `sockjs-stomp.html`\
    \ 网页。这里重要的是要关注 RabbitMQ 控制台，以查看连接和队列。\n"
- fmt: '# Currency Project


    Take a look at the `rest-api-websockets` project. You will find the `RateWebSocketsConfig`
    class, which is very similar to the other project. The idea is that the currency
    project has a simple WebSockets broker, which will accept any client connection
    through the WebSockets protocol.


    Every time there is a new rate posted, it will send a message to the client’s
    subscribe to the `/rate/new` endpoint. Take a look at this:


    - `RateWebSocketsConfig`: This class has the configuration needed for WebSockets
    messaging.

    - `CurrencyController`: This class in the `addNewRates` method has the following
    statement:


    ```

    webSocket.convertAndSend("/rate/new", currencyExchange);

    ```


    - `src/main/resources/public/index-ws.html`: This web page has the code that defines
    the client that connects to the server. Take a look; it’s very straightforward.


    To test it, you just add a simple post to the command line:


    ```

    $ curl -i -X POST -H "Content-Type: application/json" -H "Accept: application/json"
    -d ''{"base":"USD","date":"2017-02-15","rates":[{"code":"EUR","rate":0.82857,"date":"2017-02-15"},{"code":"JPY","rate":105.17,"date":"2017-02-15"},{"code":"MXN","rate":22.232,"date":"2017-02-15"},{"code":"GBP","rate":0.75705,"date":"2017-02-16"}]}''
    localhost:8080/currency/new

    ```


    You can also use any other REST client, such as `POSTMAN`: [https://www.getpostman.com/](https://www.getpostman.com/).
    After posting the new rate, you will see the Rates in the panel, as shown in Figure
    [7-13](#A337882_1_En_7_Chapter.html#Fig13).


    ![A337882_1_En_7_Fig13_HTML.jpg](A337882_1_En_7_Fig13_HTML.jpg)


    Figure 7-13. Currency exchange through WebSockets


    # Summary


    This chapter discussed WebSockets messaging using the `spring-websocket` module
    and Spring Boot.


    You learned how the WebSockets uses an HTTP handshake and then switches to TCP
    connections. You saw examples of how to create a low-level server/client.


    You saw how to use the SockJS and STOMP to facilitate communication for doing
    async or event-driven messaging. You also learned how to configure RabbitMQ and
    use it as a STOMP relay. You saw some code in the currency exchange project that
    sends new rates for any client that connects to this service.


    The next chapter shows you how to integrate your code with multiple technologies
    using the Spring Integration module.


    # Messaging with Spring Integration


    This chapter covers one of the best integration frameworks for the Java community,
    the Spring Integration module. It’s of course based on the Spring Framework.


    If we look at software development and business needs as a developer or an architect,
    we are always looking at how to integrate internal and external components and
    systems into our architecture. We need components that are fully functional, highly
    available, and easy to maintain and enhance.


    The main uses cases that developers and architects face include:


    - Creating a system that reliably transfers and analyzes files. Most applications
    need to read information from a file and process it. Developers need to create
    robust file systems that save and read data but can also share it and deal with
    large file sizes.

    - Using data in a shared environment. Multiple clients (systems or users) need
    to have access to the same database or the same table and perform operations on
    them and deal with inconsistency, duplication, and more.

    - Having remote access to different systems is always challenging, from executing
    remote procedures to sending information. We always want to have this access in
    real time and in a synchronous way. We must get a response as fast as possible
    without forgetting that the remote system always needs to be reachable. In other
    words, the system must be fault tolerant and have high availability.

    - Messaging is an important use case that we always want for any system, from
    a basic internal call to a billions of messages per second sent to remote brokers.
    We typically handle messaging in a asynchronous way, so we need to deal with concurrency,
    multi-threading, speed (network latency), high availability, fault tolerance,
    and more.


    How can developers implement all of these use cases? About 14 years ago, two software
    engineers named Gregor Hohpe and Bobby Woolf wrote the seminal book *Enterprise
    Integration Patterns: Designing, Building and Deploying Messaging Solutions*,
    published by Addison-Wesley. This book exposes all the messaging patterns needed
    to solve these use cases. The book also provides a better understanding of how
    systems interconnect and work, and how—with application architecture, object-oriented
    design, and message-oriented design—you can create a robust integration system.
    I highly recommend you read it.


    The following sections show you some of these patterns using the Spring Integration
    module from the Spring Framework.'
