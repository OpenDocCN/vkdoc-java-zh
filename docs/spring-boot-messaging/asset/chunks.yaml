    ## Summary


    This chapter talked about the publish/subscribe messaging pattern and showed that
    Redis provides this functionality out-of-the-box. It’s very easy to use. The chapter
    showed you how Spring Boot helps configure your publisher and subscriber with
    ease, simply by adding `spring-boot-starter-redis`.


    You saw how to publish and listen for incoming messages and you saw that the Spring
    Data Redis module uses very a similar way as a publisher and subscriber by using
    the `RedisTemplate` (the same behavior as the Spring JMS and Spring AMQP modules).


    Even though this chapter is short, it gives you a starting point for using Redis
    as an in-memory message broker.


    The next chapter covers WebSockets, which is another way to do messaging using
    Spring Boot.


    # 7. Web Messaging


    This chapter covers WebSockets with Spring Boot and describes how this technology
    can help you implement messaging across apps or even across multiple instances
    of the same application.


    When talking about web applications, we can say that REST is another way to do
    messaging, and it is. In this chapter, we are going to focus on a stateful way
    of communicating, which is what WebSockets brings to the table.


    ## WebSockets


    WebSockets is a protocol that enables two-way communication, and it’s normally
    used in web browsers. This protocol starts by using a handshake (normally a HTTP
    request) and then sends a basic message frame (a protocol switch) over TCP. The
    idea of the WebSockets is to avoid multiple HTTP connections like the AJAX (`XMLHttpRequest`)
    or the iframe and the long polling. See Figure [7-1](#A337882_1_En_7_Chapter.html#Fig1).


    ![A337882_1_En_7_Fig1_HTML.gif](A337882_1_En_7_Fig1_HTML.gif)


    Figure 7-1. TCP/WebSockets


    ## Using WebSockets with Spring


    Before we get into how to use WebSockets with Spring Boot, it’s important to know
    that not all the browsers support this technology. Visit [`http://caniuse.com/websockets`](http://caniuse.com/websockets)
    to find out which browsers are WebSockets-ready.


    The Spring Framework version 4 includes a new `spring-websocket` module that supports
    WebSockets; it’s also compatible with the Java specification JSR-356. This module
    also has fallback options that simulate the WebSockets API when necessary (remember
    that not all the browsers support WebSockets). It uses the SockJS protocol for
    this task. You can get more information about it at [`https://github.com/sockjs/sockjs-protocol`](https://github.com/sockjs/sockjs-protocol).


    It’s also worth mentioning that after the initial handshake (the HTTP, where we
    use SockJS), the communications switch to a TCP connection (meaning that you are
    sending just a stream of bytes—either text or binary). Therefore, you can use
    any type of messaging architecture, like async or event-driven messaging. At this
    level, you can use sub-protocols like STOMP (Simple/Streaming Text Oriented Message
    Protocol), which allows you to have a better messaging format that the client
    and server can understand. See Figure [7-2](#A337882_1_En_7_Chapter.html#Fig2).


