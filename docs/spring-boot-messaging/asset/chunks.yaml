  trans: "\n# 1. 消息传递\n\n通信是一个自古以来就存在的概念。万物都需要通过交换某种信息来进行沟通，没错，你读得没错，我说的是万物。仔细想想，就连你在公交车侧面或杂货店里看到的广告，不也是在试图向你传达信息或推销商品吗？\n\
    \n在计算机世界中，设备（鼠标、显示器、键盘等）通过交换信息位来相互通信。如果考虑应用程序，那么我们所谈论的是需要相互通信或通过通信暴露某些功能的组件、函数、类等。我们通常称之为消息传递。\n\
    \n## 消息传递\n\n本节将介绍一些主要概念，这些概念将在后续章节中详细阐述，首先从消息传递及其在日常开发周期中的定位开始。请参见图 1-1。\n\n\
    ![A337882_1_En_1_Fig1_HTML.gif](img/A337882_1_En_1_Fig1_HTML.gif)\n\n图 1-1.\n\n\
    消息传递\n\n图 1-1 展示了一个简单的消息传递过程，即通过任何可能的媒介从点 A 传递到点 B。在此例中，图 1-1 使用了一个通道，它可以是简单的函数调用、套接字连接或\
    \ HTTP 请求。其核心思想是生成/发送消息给消费者/接收者。\n\n### 消息传递用例\n\n本节涵盖了一些最常见的消息传递用例。这些用例对于理解消息传递为何如此重要至关重要：\n\
    \n*   **保证送达**\n    *   开发者需要确保他们发送的消息能够到达目的地。如果你正在使用代理（一个处理连接、消息以及同步或异步消息传递的系统），那么生产者需要通过某种确认机制来知晓代理是否收到了消息。消费者也必须这样做，通过向代理确认消息已收到。因此，这个特定用例通常用于传递关键消息时，例如支付、股票或任何其他重要信息。\n\
    *   **解耦**\n    *   在处理软件架构时，开发者会寻求解耦的组件，以便于集成、扩展以及简单的运维。但如何实现解耦呢？消息传递是解决方案的一部分，因为它允许你专注于自己的业务领域，这是一个有界上下文。你生成/发送的信息是你的主要关注点，而无需关心消费者/接收者将如何实现其自身的业务逻辑。\n\
    *   **可扩展与高可用**\n    *   每当系统面临高请求需求时，它需要具备可扩展性，并且不能存在单点故障。对于这些特定场景，消息传递是解决方案，因为多个消费者/接收者可以跟上负载，并且你可以跨多个系统实例或代理复制消息。这样，即使你的某个实例/代理宕机，你仍然可以掌控局面。\n\
    *   **异步**\n    *   应用程序必须非常快速，并能够尽快响应请求。在这种情况下，时间是关键因素。当你知道处理请求需要花费大量时间，并且有多个客户端时，你如何实现这种速度？你可以通过使用前一个用例的解决方案（可扩展性和/或高可用性）来解决这个问题，但这会达到一个阻塞请求的临界点。解决方案是异步消息传递——一种即发即弃的方式——你的生产者/发送者发送消息后继续执行自己的业务逻辑，让消费者/接收者自行安排时间处理消息。\n\
    *   **互操作性**\n    *   创建消息传递系统时的一个重要因素是，能够生成/发送消息，并在消费/接收时能够理解该消息（可能是纯文本 JSON、XML\
    \ 格式或序列化对象）。在过去的几十年里，人们进行了许多尝试来创建可互操作的系统。如今，借助新的代理（例如实现 AMQP 协议的代理），甚至通过简单的 RESTful\
    \ API 或 WebSocket，无论具体实现如何，都能使生产者和消费者无缝互操作。\n\n这些用例已经演变为广为人知的消息传递模型和设计模式，下一节将对此进行讨论。\n\
    \n### 消息传递模型与消息传递模式\n\n当消息传递成为所有系统的一部分时，一些消息传递模型便应运而生。在我看来，这些模型后来演变成了消息传递设计模式的创建。\n\
    \n#### 点对点\n\n点对点模型是一种将消息发送到队列（先进先出）的方式，其中只有一个接收者能获取该消息。参见图 1-2。\n\n![A337882_1_En_1_Fig2_HTML.gif](img/A337882_1_En_1_Fig2_HTML.gif)\n\
    \n图 1-2.\n\n点对点模型\n\n点对点模型也用作消息通道模式，此时你拥有的是一个通道（一种传输消息的方式）而非队列。它仍然保证只有一个接收者能按照消息发送的顺序获取消息。\n\
    \n你将在本书后续部分看到关于这些模型和模式的一些示例。\n\n#### 发布-订阅\n\n发布-订阅模型描述了一个发布者向该主题的多个订阅者发送消息（一个主题）。每个订阅者将只收到消息的一个副本。参见图\
    \ 1-3。\n\n![A337882_1_En_1_Fig3_HTML.gif](img/A337882_1_En_1_Fig3_HTML.gif)\n\n\
    图 1-3.\n\n发布-订阅模型\n\n发布-订阅模型也用作消息通道模式，此时你拥有的是一个通道而非主题，该通道将消息的一个副本传递给其订阅者。\n\n\
    这些模型与 JMS（Java 消息服务）关系更为密切，理解它们很重要，因为它们构成了所有企业系统的基础。\n"
- fmt: '# Messaging Patterns


    A design pattern is a solution to a commonly known problem in the software design.
    By the same token, messaging patterns attempt to solve problems with messaging
    designs.


    You will learn about the implementation of the following patterns during the course
    of this book, so I want to list them here with simple definitions to introduce
    them:


    - **Message type patterns**: Describe different forms of messaging, such as string
    (maybe plain text, JSON and/or XML), byte array, object, etc.

    - **Message channel patterns**: Determine what kind of a transport (channel) will
    be used to send a message and what kind of attributes it will have. The idea here
    is that the producer and consumer know how to connect to the transport (channel)
    and can send and receive the message. Possible attributes of this transport include
    a request-reply feature and a unidirectional channel, which you will learn about
    very soon. One example of this pattern is the point-to-point channel.

    - **Routing patterns**: Describe a way to send messages between producer and consumers
    by providing a routing mechanism (filtering that’s dependent on a set of conditions)
    in an integrated solution. That can be accomplished by programming, or in some
    cases, the messaging system (the broker) can have these capabilities (as with
    RabbitMQ).

    - **Service consumer patterns**: Describe how the consumers will behave when messages
    arrive, such as adding a transactional approach when processing the message. There
    are frameworks that allow you to initiate this kind of behavior (like the Spring
    Framework, which you do by adding the `@Transactional`, a transaction-based abstraction).

    - **Contract patterns**: Contracts between the producer and consumer to have simple
    communications, such as when you do some REST calls, where you call a JSON or
    XML message with some fields.

    - **Message construction patterns**: Describe how a message is created so it can
    travel within the messaging system. For example, you can create an “envelope”
    that can have a body (the actual message) and some headers (with a correlation
    ID or a sequence or maybe a reply address). With a simple web request, you can
    add parameters or headers and the actual message becomes the body of the request,
    making the whole request part of the construction pattern. The HTTP protocol allows
    for that kind of communication (messaging).

    - **Transformation patterns**: Describe how to change the content of the message
    within the messaging system. Think about a message that requires some processing
    and needs to be enhanced on the fly, such as a content enricher.


    As you can see, these patterns not only describe the messaging process but some
    of them describe how to handle some of the common use cases you saw earlier. Of
    course, there are a lot more messaging patterns, and these are just a few that
    we are going to explore in this book.


    If you want more information, I recommend that you visit the Enterprise Integration
    Patterns web site, [`http://www.enterpriseintegrationpatterns.com/`](http://www.enterpriseintegrationpatterns.com/).
    Also check out this must-read book—Enterprise Integration Patterns: Designing,
    Building, and Deploying Messaging Solutions by Gregor Hohpe and Bobby Woolf, from
    Addison-Wesley.


    In the book, I cover some of these patterns using the Spring Integration module
    and various messaging systems (brokers).


    ## Messaging with Spring Framework


    The Spring Framework is one of the most commonly used frameworks by the Java community.
    The Spring Framework has enabled a simple and easy way to do messaging, by implementing
    a template design pattern that can be used with any messaging system. It supports
    the JMS API with the `JmsTemplate`, the AMQP with the `RabbitTemplate`, STOMP,
    and internal messaging with events and listeners. Don’t worry, we will cover all
    of these later in book.


    It’s worth mentioning that the Spring Integration project has been well accepted
    by the community, and the core of the Spring Integration (messaging, channels,
    and other interfaces) has been part of the Spring Core since version 4.0.


    There are many good messaging frameworks out there. Some of them use pure Java,
    and others depend on the Spring Framework. The Spring team has been working very
    hard to make it even easier for its developers to use all the features, including
    concurrency, transactions, retries, etc. To use other libraries, you have to implement
    them by hand using the same logic.


    **Note**


    You can download the book’s source code from the Apress site or you can clone
    it from this GitHub repository: [`https://github.com/felipeg48/spring-messaging`](https://github.com/felipeg48/spring-messaging).


    ## Summary


    This chapter introduced messaging and the messaging systems. You read about the
    basic concept of messaging, whereby developers need to send information from one
    point to another.


    The chapter reviewed some use cases, models, and patterns of messaging. The book
    will cover them in more detail and use them via some of the best implementations
    out there, including the Spring Framework and some of their modules, including
    Spring Integration, Spring AMQP, and Spring Cloud Stream.


    The next chapter includes a tour of Spring Boot, which is the next generation
    of creating enterprise-ready Spring applications. Spring Boot is the base for
    all the modules you use in this book.


    # 2. Spring Boot


    I’ll start with a phrase that I wrote in another book: Spring Boot is a new chapter
    in creating enterprise-ready applications with the Spring Framework.


    Spring Boot does not replace the Spring Framework; you can see it as a new way
    to create awesome applications with the framework used by the Java community.


    In this chapter, I show you what Spring Boot is and how it works behind the scenes.
    You will also see the power of Spring Boot with a small example. So why do we
    need to look at Spring Boot? First of all, all the technologies that we are going
    to use, such as Spring Integration, Spring AMQP, Spring Cloud Stream, and others,
    use Spring Boot as their base. All the examples in this book use Spring Boot to
    create Spring apps. And of course, Spring Boot makes messaging even easier.


    ## What Is Spring Boot?


    To begin with, Spring Boot is an opinionated technology. What does that mean?


    Spring Boot looks at the classpath and tries to determine what kind of application
    you are trying to run. For example, if you have the `spring-mvc` modules in your
    classpath, Spring Boot will wire up the `WebApplicationInitializer` and `DispatcherServlet`
    classes inside the Spring container and will set up an embedded container (Tomcat
    by default), so you can run your application without having to copy or deploy
    your application to a servlet container.


    ### Spring Boot’s Features


    Let’s look at the most important Spring Boot features:


    - It can create standalone Spring applications. Based on its Maven or Gradle plugin,
    you can create executable JARs or WARs.

    - It has an opinionated technology based on the starter `pom`s.

    - Includes auto-configuration, which will configure your Spring application without
    any XML or Java config classes.

    - Includes embedded servlet containers for web apps (Tomcat, Jetty, or Undertow).

    - Includes production-ready features (non-functional requirements) that are ready
    to use, such as metrics and health checks.

    - Spring Boot is not a plugin or a code generator (this means that Spring Boot
    doesn’t create a file to be compiled).

    - If you have an application or servlet container, you can deploy Spring Boot
    as a WAR without making any changes.

    - You can access all the Spring application events and listeners (something that
    we will discuss in the next chapter).


    This list is just a few features of what Spring Boot can offer; of course there
    are more. I recommend my other book—Pro Spring Boot from Apress—if you need to
    know more about it. That book includes more comprehensive and detailed sections
    about how Spring Boot works internally.'
