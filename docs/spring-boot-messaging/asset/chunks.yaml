    The JMS API provides two messaging models—point-to-point and publish-subscribe.
    Point-to-point is where messages are delivered to a receiver, and the delivery
    is guaranteed to only one consumer that is connected to a queue (see Figure [4-1](#A337882_1_En_4_Chapter.html#Fig1)).


    ![A337882_1_En_4_Fig1_HTML.gif](A337882_1_En_4_Fig1_HTML.gif)


    Figure 4-1.


    The point-to-point messaging model


    The publish-subscribe model is where a message is delivered to zero or more consumers
    (normally called subscribers). The publisher creates a message topic for all the
    clients that want to subscribe to it (see Figure [4-2](#A337882_1_En_4_Chapter.html#Fig2)).


    ![A337882_1_En_4_Fig2_HTML.gif](A337882_1_En_4_Fig2_HTML.gif)


