    下一章将介绍 WebSocket，这是使用 Spring Boot 进行消息传递的另一种方式。


    # 7. Web 消息传递


    本章介绍 Spring Boot 中的 WebSocket，并描述这项技术如何帮助您在应用程序之间，甚至在同一应用程序的多个实例之间实现消息传递。


    在讨论 Web 应用程序时，我们可以说 REST 是另一种消息传递方式，事实也确实如此。在本章中，我们将重点讨论一种有状态的通信方式，这正是 WebSocket
    所带来的。


    ## WebSocket


    WebSocket 是一种支持双向通信的协议，通常用于 Web 浏览器。该协议首先通过握手（通常是 HTTP 请求）开始，然后通过 TCP 发送基本消息帧（协议切换）。WebSocket
    的理念是避免像 AJAX（`XMLHttpRequest`）、iframe 或长轮询那样的多次 HTTP 连接。请参见图 7-1。


    ![A337882_1_En_7_Fig1_HTML.gif](img/A337882_1_En_7_Fig1_HTML.gif)


    图 7-1.


    TCP/WebSocket


    ## 在 Spring 中使用 WebSocket


    在我们深入了解如何在 Spring Boot 中使用 WebSocket 之前，重要的是要知道并非所有浏览器都支持这项技术。请访问[`http://caniuse.com/websockets`](http://caniuse.com/websockets)了解哪些浏览器已准备好支持
    WebSocket。


    Spring Framework 4 版本包含一个新的`spring-websocket`模块，该模块支持 WebSocket；它也与 Java 规范 JSR-356
    兼容。该模块还提供了回退选项，可以在必要时模拟 WebSocket API（请记住，并非所有浏览器都支持 WebSocket）。它为此任务使用了 SockJS
    协议。您可以在[`https://github.com/sockjs/sockjs-protocol`](https://github.com/sockjs/sockjs-protocol)获取更多相关信息。


    同样值得一提的是，在初始握手（我们使用 SockJS 的 HTTP 阶段）之后，通信会切换到 TCP 连接（这意味着您只发送字节流——文本或二进制）。因此，您可以使用任何类型的消息传递架构，例如异步或事件驱动的消息传递。在此层面上，您可以使用像
    STOMP（简单/流式文本定向消息协议）这样的子协议，它允许您拥有客户端和服务器都能理解的更好的消息格式。请参见图 7-2。


    ![A337882_1_En_7_Fig2_HTML.gif](img/A337882_1_En_7_Fig2_HTML.gif)


    图 7-2.


    使用 Spring 的 WebSocket


    图 7-2 展示了如何使用 Spring 实现 WebSocket，以及客户端所需的组件。

