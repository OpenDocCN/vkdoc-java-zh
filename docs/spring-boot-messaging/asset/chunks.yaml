  trans: '

    ### 订阅者


    作为 Redis 订阅者，你可以通过固定名称或模式匹配来订阅一个或多个频道（或主题）。Spring Data Redis 模块提供了通过 `RedisConnection`
    进行底层订阅的方式，其中包括 `subscribe` 和 `pSubscribe` 方法。


    对于简单的监听器，底层订阅需要一种处理连接和线程管理的方式。现在想象一下有多个监听器的情况。你可能会认为实现这个功能很麻烦，但 Spring Data Redis
    包含了 `RedisMessageListenerContainer` 类，它承担了所有繁重的工作，并支持消息驱动的 POJO（MDP）。换句话说，你可以创建自己的类和方法来接收并处理消息。这意味着你需要使用
    `MessageListenerAdapter` 类来使用此功能。不过别担心，接下来我将向你展示如何操作。


    打开 `redis-demo` 项目，查看 `com.apress.messaging.config.RedisConfig` 类，如代码清单 6-1 所示。


    ```

    @Configuration

    @EnableConfigurationProperties(SimpleRedisProperties.class)

    public class RedisConfig {

    @Bean

    public RedisMessageListenerContainer

    container(RedisConnectionFactory connectionFactory,

    MessageListenerAdapter listenerAdapter,

    @Value("${apress.redis.topic}") String topic) {

    RedisMessageListenerContainer container = new

    RedisMessageListenerContainer();

    container.setConnectionFactory(connectionFactory);

    container.addMessageListener(listenerAdapter,

    new PatternTopic(topic));

    return container;

    }

    @Bean

    MessageListenerAdapter listenerAdapter(

    Subscriber subscriber) {

    return new MessageListenerAdapter(subscriber);

    }

    }

    代码清单 6-1.

    com.apress.messaging.config.RedisConfig.java

    ```


    代码清单 6-1 展示了我们将用于订阅频道的配置。让我们更详细地看看代码：


    *   `RedisMessageListenerContainer`：这是一个承担所有繁重工作的类，充当消息监听器容器，将从 Redis 频道（主题）接收消息。你需要设置连接工厂和将处理接收到的消息的消息监听器。请记住，此监听器容器负责所有线程处理和消息分发。

    *   `RedisConnectionFactory`：此接口对于 `RedisMessageListenerContainer` 是必需的，它保存了所有关于
    Redis 连接的信息。由于它是方法的一部分，Spring 会自动装配它，因此你无需手动创建。在幕后，Spring Boot 会为你处理此配置。

    *   `MessageListenerAdapter`：此类是一个适配器，它将传入的消息委托给一个符合 `MessageListener` 签名的声明类。你可以看到，这是通过调用
    `container.addMessageListener` 方法，并将订阅者（`listenerAdapter` - `MessageListenerAdapter`）和主题（`PatternTopic`）作为参数传递来设置的。

    *   `PatternTopic`：这是一个类，是消息监听器所需的参数之一。它通常保存主题的名称或用于订阅正确频道的名称模式。


    接下来，让我们看看 `Subscriber` 类。打开 `com.apress.messaging.redis.Subscriber` 类，如代码清单 6-2
    所示。


    ```

    @Component

    public class Subscriber {

    public void handleMessage(String message){

    // 在此处处理消息 ...

    }

    }

    代码清单 6-2.

    com.apress.messaging.redis.Subscriber.java

    ```


    代码清单 6-2 展示了 `Subscriber` 类，它只有一个必需的方法（`handleMessage`）。`Subscriber` 类是消息委托的适配器。换句话说，`MessageListenerAdapter`
    兼容以下签名：


    ```

    void handleMessage(String message);

    void handleMessage(Map message);

    void handleMessage(byte[] message);

    void handleMessage(Serializable message);

    //你可以获取使用的频道或模式

    void handleMessage(Serializable message, String channel);

    void handleMessage(byte[] bytes, String pattern);

    //你可以使用自己的对象

    void handleMessage(MyOwnDomainObject obj);

    ```


    有时，你的适配器类可能会有更多的方法来执行额外的处理或被外部调用。在这些情况下，你可以通过在 `MessageListenerAdapter` 的构造函数中添加一个额外参数，来告知它你想要使用哪个方法。例如：


    ```

    @Component

    public class Subscriber {

    public void shipping(Order order){

    // 在此处处理订单 ...

    }

    //此方法用作 Redis 主题的监听器

    public void processTicket(String message){

    // 在此处处理消息 ...

    }

    // ... 更多方法

    }

    // RedisConfig.java

    @Bean

    MessageListenerAdapter listenerAdapter(Subscriber subscriber) {

    return new MessageListenerAdapter(subscriber,"processTicket");

    }

    ```


    将用于处理来自 Redis 主题的传入消息的方法名称添加到构造函数中；在此示例中，即 `processTicket` 方法。


    如你所见，使用 `MessageListenerAdapter` 的好处是你的 `POJO` 类没有依赖关系，从而使你的应用程序更具可扩展性。

    '
- fmt: '### Publisher


    This section covers publishing messages to the channels (topics). To publish a
    message in Redis, you have two options. You can use the low-level `RedisConnection`
    class or the high-level `RedisTemplate` class (remember, it’s very similar to
    `JmsTemplate` and `RabbitTemplate`). Both interfaces provide the publish method
    `connection.publish(msg,channel)`. You must determine the channel (the topic)
    as well.


    The benefit of using `RedisTemplate` is that you have a way to define serialization/deserialization
    strategies. This method hides the complexity of calling raw methods and is thread-safe.


    Let’s jump into the code. Open the `com.apress.messaging.RedisDemoApplication`
    class shown in Listing [6-3](#A337882_1_En_6_Chapter.html#Par44).


    ```

    @SpringBootApplication

    public class RedisDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(RedisDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner sendMessage(StringRedisTemplate template,

    @Value("${apress.redis.topic}")String topic){

    return args -> {

    template.convertAndSend(topic,

    "Hello Redis with Spring Boot!");

    };

    }

    }

    Listing 6-3.

    com.apress.messaging.RedisDemoApplication.java

    ```


    Listing [6-3](#A337882_1_En_6_Chapter.html#Par44) shows the main application class.
    As you know, once Spring Boot finalizes the auto-configuration, it will execute
    the `sendMessage` method. This method will auto-wire the `StringRedisTemplate`
    and the topic with the provided values in the `application.properties` file with
    the `apress.redis.topic=spring-boot-chat` key. Then it will use the template to
    send a message, by using the `template.convertAndSend` method that accepts the
    topic and the message as its parameters.


    You normally need to use the `RedisTemplate`, but in this case, we are using the
    `StringRedisTemplate`. We do this because `RedisTemplate` is defined as `RedisTemplate<K,V>`
    where the `K` is the Redis key type (normally a string) and the `V` is the Redis
    value type (it will be the message). Then, `StringRedisTemplate` is a subclass
    that uses the string. In other words, it is like creating a `RedisTemplate<String,String>`
    object.


    What is interesting here is that `StringRedisTemplate` defines multiple string
    serializers for different operations that apply to different data structures,
    such as the `Set` and `Hash` key/values.


    Now, if you run the project (remember to have the `redis-server` up and running),
    you will see the subscriber logs shown in Figures [6-2](#A337882_1_En_6_Chapter.html#Fig2),
    [6-3](#A337882_1_En_6_Chapter.html#Fig3), and [6-4](#A337882_1_En_6_Chapter.html#Fig4).


    ![A337882_1_En_6_Fig4_HTML.jpg](A337882_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. redis-cli subscribe


    ![A337882_1_En_6_Fig3_HTML.jpg](A337882_1_En_6_Fig3_HTML.jpg)


    Figure 6-3. The redis-cli monitor command


    ![A337882_1_En_6_Fig2_HTML.jpg](A337882_1_En_6_Fig2_HTML.jpg)


    Figure 6-2. Project logs


    Figure [6-2](#A337882_1_En_6_Chapter.html#Fig2) shows you the logs. The `RedisAudit`
    class that has an Around AOP advice generates those logs. As you can see, it’s
    using the `Subscriber` class (listener adapter) and the `handleMessage` method
    that received the string message.


    Figure [6-3](#A337882_1_En_6_Chapter.html#Fig3) shows the terminal with the Redis
    client. The monitor is shown before executing the code, just to determine if Redis
    accepts the messages. As you can see, Redis is showing the commands executed in
    the `redis-server`—in this case, `PSUBSCRIBE` and `PUBLISH` and of course a `PING`
    command to check out the connections between the client and the server.


    Figure [6-4](#A337882_1_En_6_Chapter.html#Fig4) shows you another terminal window,
    where we subscribe to the `spring-boot-chat` channel/topic. After running the
    project, it will print the message. This is another way to make sure your `redis-server`
    is running and you can have multiple subscribers to a channel/topic.


    ### JSON Serialization


    Now, going back to serialization/deserialization, recall that we are working with
    the JSON format. What do you need to do to make the publisher/subscribe use JSON
    and serialize/deserialize it into a custom object back and forth?


    If you follow the same idea from the previous modules (JMS and RabbitMQ), answering
    this question is easier because you can apply the same concepts here.


    Let’s start by modifying the `RedisConfig` class, as shown in Listing [6-4](#A337882_1_En_6_Chapter.html#Par55).


    ```

    @Configuration

    @EnableConfigurationProperties(SimpleRedisProperties.class)

    public class RedisConfig {

    @Bean

    public RedisMessageListenerContainer container(

    RedisConnectionFactory connectionFactory,

    MessageListenerAdapter rateListenerAdapter,

    @Value("${apress.redis.rate}") String topic) {

    RedisMessageListenerContainer container =

    new RedisMessageListenerContainer();

    container.setConnectionFactory(connectionFactory); container.addMessageListener(rateListenerAdapter,

    new PatternTopic(topic));

    return container;

    }

    @Bean

    MessageListenerAdapter rateListenerAdapter(

    RateSubscriber subscriber) {

    MessageListenerAdapter messageListenerAdapter =

    new MessageListenerAdapter(subscriber);

    messageListenerAdapter.setSerializer(

    new Jackson2JsonRedisSerializer(Rate.class));

    return messageListenerAdapter;

    }

    @Bean

    RedisTemplate

    redisTemplate(RedisConnectionFactory connectionFactory){

    RedisTemplate redisTemplate =

    new RedisTemplate();

    redisTemplate.setConnectionFactory(connectionFactory);

    redisTemplate.setDefaultSerializer(

    new Jackson2JsonRedisSerializer(Rate.class));

    redisTemplate.afterPropertiesSet();

    return redisTemplate;

    }

    }

    Listing 6-4.

    com.apress.messaging.config.RedisConfig.java

    ```


    Listing [6-4](#A337882_1_En_6_Chapter.html#Par55) shows you the modified `RedisConfig`
    class. Comparing it to the previous version, what is the difference? The `RedisMessageListenerContainer`
    bean is the same, except that now we are also using the `rateListenerAdapter`
    bean. Let’s review this listing:


    *   `MessageListenerAdapter`: This is the same as before, but here we are setting
    a new class adapter, in this case the `RateSubscriber`. It’s important to note
    that we are setting a serializer by calling the `setSerializer` method and we
    are instantiating a `Jackson2JsonRedisSerializer` object using the `Rate` class
    as an object mapper.

    *   `RedisTemplate<String,Rate>`: As you can see, we are defining this bean to
    return a `RedisTemplate`, where the key is a string and the value is the `Rate`
    class. Note also that we are setting a serializer by calling the `setDefaultSerializer`
    method and we are using the same class as before, `Jackson2JsonRedisSerializer`.


    Look at the `RateSubscriber` class, shown in Listing [6-5](#A337882_1_En_6_Chapter.html#Par60).


    ```

    @Component

    public class RateSubscriber {

    public void handleMessage(Rate rate){

    // Process message here ...

    }

    }

    Listing 6-5.

    com.apress.messaging.redis.RateSubscriber.java

    ```


    Listing [6-5](#A337882_1_En_6_Chapter.html#Par60) shows you the `RateSubscriber`
    class. Nothing has changed from the previous example. The `handleMessage` method
    will receive a `Rate` message. Now, let’s look at the publisher, shown in Listing
    [6-6](#A337882_1_En_6_Chapter.html#Par62).


    ```

    @SpringBootApplication

    public class RedisDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(RedisDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner sendRateMessage(

    RedisTemplate template,

    @Value("${apress.redis.rate}")String topic){

    return args -> {

    template.convertAndSend(topic,

    new Rate("MX",21.17F,new Date()));

    };

    }

    }

    Listing 6-6.

    com.apress.messaging.RedisDemoApplication.java

    ```


    Listing [6-6](#A337882_1_En_6_Chapter.html#Par62) shows you the main application.
    Compare this class to the previous version; what changed? We are using the `RedisTemplate`
    class and using the `Rate` as the value. We are also using the `Rate` class as
    a message by creating a new rate.'
  raw: '### Publisher


    This section covers publishing messages to the channels (topics). To publish a
    message in Redis, you have two options. You can use the low-level `RedisConnection`
    class or the high-level `RedisTemplate` class (remember, it’s very similar to
    `JmsTemplate` and `RabbitTemplate`). Both interfaces provide the publish method
    `connection.publish(msg,channel)`. You must determine the channel (the topic)
    as well.


    The benefit of using `RedisTemplate` is that you have a way to define serialization/deserialization
    strategies. This method hides the complexity of calling raw methods and is thread-safe.


    Let’s jump into the code. Open the `com.apress.messaging.RedisDemoApplication`
    class shown in Listing [6-3](#A337882_1_En_6_Chapter.html#Par44).


    ```

    @SpringBootApplication

    public class RedisDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(RedisDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner sendMessage(StringRedisTemplate template,

    @Value("${apress.redis.topic}")String topic){

    return args -> {

    template.convertAndSend(topic,

    "Hello Redis with Spring Boot!");

    };

    }

    }

    Listing 6-3.

    com.apress.messaging.RedisDemoApplication.java

    ```


    Listing [6-3](#A337882_1_En_6_Chapter.html#Par44) shows the main application class.
    As you know, once Spring Boot finalizes the auto-configuration, it will execute
    the `sendMessage` method. This method will auto-wire the `StringRedisTemplate`
    and the topic with the provided values in the `application.properties` file with
    the `apress.redis.topic=spring-boot-chat` key. Then it will use the template to
    send a message, by using the `template.convertAndSend` method that accepts the
    topic and the message as its parameters.


    You normally need to use the `RedisTemplate` , but in this case, we are using
    the `StringRedisTemplate` . We do this because `RedisTemplate` is defined as `RedisTemplate<K,V>`
    where the `K` is the Redis key type (normally a string) and the `V` is the Redis
    value type (it will be the message). Then, `StringRedisTemplate` is a subclass
    that uses the string. In other words, it is like creating a `RedisTemplate<String,String>`
    object.


    What is interesting here is that `StringRedisTemplate` defines multiple string
    serializers for different operations that apply to different data structures,
    such as the `Set` and `Hash` key/values.


    Now, if you run the project (remember to have the `redis-server` up and running),
    you will see the subscriber logs shown in Figures [6-2](#A337882_1_En_6_Chapter.html#Fig2),
    [6-3](#A337882_1_En_6_Chapter.html#Fig3), and [6-4](#A337882_1_En_6_Chapter.html#Fig4).


