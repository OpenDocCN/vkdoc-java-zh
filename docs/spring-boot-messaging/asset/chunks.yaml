- fmt: '# What’s Next?


    Based on what I showed you, think about what would happen if one of the microservices
    went down. Would your entire flow be down? How can you solve the point of failure
    and add high availability? How can you orchestrate all these microservices? How
    can you avoid zero downtime?


    The good thing is that Spring Cloud Stream is the base of Spring Cloud Data Flow
    technology. Spring Cloud Data Flow is an orchestration service for composable
    microservice applications that live in a cloud environment, and it is very useful
    for real-time data analytics and Big Data solutions.


    The benefit of using Spring Cloud Data Flow is that this technology is supported
    by Cloud Foundry, Apache Mesos, Kubernetes, and Apache Yarn. Spring Cloud Data
    Flow relies on these technologies to orchestrate register, creation, deployment,
    and tasks over a cloud infrastructure, plus it’s compatible with Spring Cloud
    Services (something that I’ll talk in the microservices chapter).


    The recommendation here is to look at this awesome technology. You will be comfortable
    learning that, because it’s all about Spring Cloud Stream.


    # Summary


    This chapter showed you how easy you can create simple Stream applications with
    Spring Cloud Stream and Spring Boot. Simply by using the `@EnableBinding` annotation
    and the binder, you can create message-driven solutions.


    I also showed you that Spring Cloud Stream has application starters that can be
    used just by adding the appropriate configuration.


    The next chapter discusses a new trending technology, reactive frameworks. In
    this case, we cover the Spring Reactor project for creating non-blocking applications
    on the JVM based on the Reactive Stream specification.


    # 10. Reactive Messaging


    Nowadays the practice of being reactive is at the top of all IT companies’ goals.
    There are also related terms that we are hearing often, such as reactive programming,
    functional reactive programming, and reactive streams. Even though there are different,
    what we are seeing here is a change to how we are tackling data consumption, concurrency,
    asynchronous events, high performance, and distributed computing.


    This chapter discusses reactive programming and messaging. This is not a new topic.
    Several years ago, Microsoft released the C# Reactive extensions (in a formal
    way) and JavaScript was gaining momentum in being reactive to events. Not only
    that, this concept has been around since the 60s, when programmers wanted to interconnect
    hardware.


    Let’s start by learning more about reactive programming and what it is good for.
    Later, you learn what kind of frameworks will help you with this new micro-event
    reactive architecture.


    ## Reactive Programming


    Reactive programming is a way to deal asynchronously with event data streams (in
    a non-blocking form) that change over time. It’s a way to react to their changing
    behavior.


    Reactive programming is good for the following use cases:


    - **Spreadsheets/cells**: When you open your spreadsheet application, have you
    imagined how it works internally? Every cell can have other cell dependencies,
    so any new change in one needs to be reflected in the others—this is being reactive
    to change. Also imagine your matrix when you are doing Calculus or Algebra computations.
    How can you react to a value in a particular matrix cell? Normally, you start
    dealing with event-driven architectures.

    - **High concurrent messaging**: Messaging in my opinion is the most critical
    part of every system. The idea of sending a few thousand or even millions of messages
    per second has been always the goal. Being able to process all these messages
    and consume them concurrently (synchronously and asynchronously) has also been
    a challenge.

    - **External service calls**: Nowadays devices (cell phones, tablets, sensors,
    etc.) require a lot of information with a single swipe, gesture, or click. Their
    backend services need to collect data from different services (local or remote)
    and aggregate information into a single response. They become very chatty and
    sometimes very slow. Reactive programming is a good fit here.

    - **Async processing**: This has been a dangerous territory for many developers,
    because every time we start thinking about async processes, we need to think about
    threads, callbacks, concurrency, orchestration, and more. With reactive programming,
    we are almost there.


    Most of the solutions to these use cases involve creating libraries with non-blocking
    I/O, like event-machine (from the Ruby programming language), which worked and
    performed very well.


    Java and its new `java.util.concurrent` package expose the `Future`/`CompletableFuture`
    interfaces. Map-Reduce and Fork-Join help in parallel processing with Big Data
    scenarios. Actor Models expose concurrency in a natural way, one of the important
    implementations is in the Akka framework.


    Reactive programming is the next step in creating a system that is responsive,
    resilient, elastic, and of course message-driven in an asynchronous way, allowing
    flow control and applying back-pressure when necessary. All of these features
    are provided with non-blocking communication. In contrast with Java 8 streams
    or `Iterable`/`Iterator`, which are just pull-based, reactive programming is push-based.
    In other words, reactive programming deals with synchronous/pull and asynchronous/push
    concepts.


    It’s time to focus on the implementation. The following sections use two main
    modules or libraries: RxJava and Reactor. Then we cover the new upcoming release
    of Spring Framework 5 and its WebFlux module.


    > **Note**

    >

    > This chapter contains five projects that we are going to use in the following
    sections: `rxjava-demo`, `reactor-demo`, `web-emitter`, `spring-web-flux`, and
    `spring-web-flux-reactive`.


    ## RxJava


    RxJava came from Netflix (called ReactiveX; see [http://reactivex.io](http://reactivex.io))
    and is a library for composing asynchronous and event-based programs by using
    observable sequences. It extends the observer pattern and supports sequences of
    data. It removes the complexity of threading, synchronization, thread safety,
    concurrent data structures, and non-blocking I/O by providing a simple API.


    RxJava provides a collection of operators that can filter, select, transform,
    combine, and compose observables, allowing for a better and more efficient execution
    and composition. It exposes several classes like `Observable`, which we are going
    to see in the example code.'
