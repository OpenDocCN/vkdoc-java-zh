- fmt: '# JMS


    The JMS API provides two messaging models—point-to-point and publish-subscribe.
    Point-to-point is where messages are delivered to a receiver, and the delivery
    is guaranteed to only one consumer that is connected to a queue (see Figure [4-1](#A337882_1_En_4_Chapter.html#Fig1)).


    ![A337882_1_En_4_Fig1_HTML.gif](A337882_1_En_4_Fig1_HTML.gif)


    Figure 4-1. The point-to-point messaging model


    The publish-subscribe model is where a message is delivered to zero or more consumers
    (normally called subscribers). The publisher creates a message topic for all the
    clients that want to subscribe to it (see Figure [4-2](#A337882_1_En_4_Chapter.html#Fig2)).


    ![A337882_1_En_4_Fig2_HTML.gif](A337882_1_En_4_Fig2_HTML.gif)


    Figure 4-2. The publish-subscribe messaging model


    JMS is a required API that needs to be implemented. In order to use or create
    JMS applications, you need to choose a provider (often called JMS server or broker)
    that will connect and decouple your senders/publishers from your receivers/subscribers,
    a client that will produce/send or receive/subscribe messages, a JMS message that
    contains the actual message (payload), and a JMS queue for a point-to-point messaging
    or a topic for a publish-subscriber scenario. We first talk more about the client.


    ## JMS with Java


    Let’s first see how can you create a point-to-point sender client in Java; see
    Listing [4-1](#A337882_1_En_4_Chapter.html#Par7).


    ```

    //Step 1\. Create the Connection

    InitialContext ctx = new InitialContext();

    QueueConnectionFactory factory = (QueueConnectionFactory)ctx.lookup("connectionFactory");

    QueueConnection connection = factory.createQueueConnection();

    connection.start();

    //Step 2\. Create a Queue Session

    QueueSession session = connection.createQueueSession(false, Session.AUTO_ACKNOWLEDGE);

    //Step 3\. Get the Queue object

    Queue queue =( Queue)ctx.lookup("myQueue");

    //Step 4\. Create the Sender

    QueueSender sender = session.createSender(queue);

    //Step 5\. Create the Message

    TextMessage msg = session.createTextMessage();

    msg.setText("Hello World");

    //Step 6\. Send the Message

    sender.send(msg);

    Listing 4-1.

    Point-to-Point Sender Client Snippet Code

    ```


    As you can see in Listing [4-1](#A337882_1_En_4_Chapter.html#Par7), this process
    is very straightforward. There are only six steps to send a text message. In Step
    1, you need to know which connection process to use. Normally you need to include
    the `jndi.properties` file in your code with some information about your JMS provider;
    for example, if you use the Apache ActiveMQ, you need to specify its properties,
    as shown in Listing [4-2](#A337882_1_En_4_Chapter.html#Par9) (`jndi.properties`).


    ```

    # Initial Context for the Apache ActiveMQ

    java.naming.factory.initial=org.apache.activemq.jndi.ActiveMQInitialContextFactory

    # This property must be the same as the one declared in the ctx.lookup statement.

    # by default is: connectionFactory or ConnectionFactory

    # connectionFactoryNames = connectionFactory, queueConnectionFactory, queueConnectionFactory

    #   Memory Broker = vm://localhost

    # External Broker = tcp://hostname:61616

    java.naming.provider.url=vm://localhost

    # Queue naming rules:

    # queue.[jndiName] = [physicalName]

    queue.myQueue = apress.MyQueue

    # Topic naming rules:

    # topic.[jndiName] = [physicalName]

    topic.myTopic = apress.MyTopic

