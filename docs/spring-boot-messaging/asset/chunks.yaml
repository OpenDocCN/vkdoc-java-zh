- fmt: "### Exchanges, Bindings, and Queues\n\nThese keywords are also known as AMQP\
    \ entities. Let’s define these entities (remember that all this is still part\
    \ of the AMQP model):\n\n- **Exchanges**: Entities where the producer sends messages.\
    \ The exchange will use bindings to route the messages to the correct queue. The\
    \ exchanges have the following properties: `name`, `durability` (can be durable\
    \ or transient), `auto-delete` (the exchange is deleted when all the queues have\
    \ finished using it), and `arguments` (hash map, broker dependent).\n- **Bindings**:\
    \ The rules that connect an exchange with another exchange or a queue. This is\
    \ a string value.\n- **Queue**: Store the messages (in memory or on disk) until\
    \ they are consumed by applications. The queues have properties like `name`, `durable`\
    \ (survive to a broker restart), `exclusive` (used by only one connection, which\
    \ means the queue will be deleted when the connection is closed), `auto-delete`\
    \ (the queue is deleted when the last consumer unsubscribes) and `arguments` (hash\
    \ map, broker dependent).\n\nThe AMQP model provides four types of exchanges:\n\
    \n- **Direct exchange**: A one-to-one relationship with a queue through its binding.\
    \ There is a default exchange that is a direct exchange type that uses the queue’s\
    \ name as a routing key for its binding.\n- **Fanout exchange**: This exchange\
    \ will copy a message for every queue bound to it. You must think as a broadcast;\
    \ it’s very similar to the publish/subscribe pattern (topic).\n- **Topic exchange**:\
    \ This exchange is similar to the direct exchange, the only difference being that\
    \ it accepts wildcards (regex) for the routing keys by using the `*` (can substitute\
    \ exactly one word) and `#` (can substitute zero or more words) options.\n- **Headers\
    \ exchange**: This exchange will do the routing by comparing multiple headers.\
    \ You have to indicate if you want the headers to match exactly by adding the\
    \ `x-match:all` (header: key) or match any of the headers by adding the `x-match:any`\
    \ (header: key) to the same message header.\n\nFigure [5-2](#A337882_1_En_5_Chapter.html#Fig2)\
    \ illustrates these exchange types.\n\n![A337882_1_En_5_Fig2_HTML.jpg](A337882_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2. Exchange types\n\nThis little introduction is enough to get started\
    \ with RabbitMQ and learn how to use it.\n\n## RabbitMQ\n\nRabbitMQ is an open\
    \ source broker that implements the AMQP model (from version 0.8.x to the 1.0\
    \ version of the AMQP model). RabbitMQ is written in the Erlang programming language,\
    \ making it flexible and robust.\n\nHere are some of its features:\n\n- Distributed\
    \ nodes\n- Cluster ready\n- Plugin based; the most important plugins are:\n  \
    \  - Federation\n    - Shovel\n    - Consistent hash\n    - Community plugins\n\
    - Data/state replication with full ACID (Atomicity, Consistency, Isolation, Durability)\n\
    - Reliable and scalable out of the box: Federation and Shovel\n- High availability\
    \ with mirror queues\n- Multi-protocol:\n    - AMQP\n    - MQTT\n    - STOMP\n\
    \    - SMTP\n    - XMPP\n- Web console and Rest API (for monitoring and administration)\n\
    - Secure: SSL and LDAP\n- Multiple client libraries: Java, .NET, Ruby, Erlang,\
    \ Python, Clojure, PHP, JavaScript, etc.\n\nWe could write an entire book defining\
    \ every feature available, but what I want to do is give you a sense of what RabbitMQ\
    \ can do. (If you need more info, you can get it at [`http://www.rabbitmq.com/features.html`](http://www.rabbitmq.com/features.html).)\
    \ So, let’s start using it by creating clients.\n\n## RabbitMQ with Spring Boot\n\
    \nSpring Boot relies on the Spring’s `spring-amqp` project to do all the heavy\
    \ lifting to connect, publish, consume, and manage the RabbitMQ broker. The `spring-amqp`\
    \ project has been one of the most used modules in messaging application.\n\n\
    So, why do we need Spring Boot? Remember that Spring Boot is an opinionated runtime\
    \ and it will help us configure what we need from the `spring-amqp` module by\
    \ facilitating some properties that we can add to our `application.properties`\
    \ file or by using a `@Configuration` class to override some of these opinions.\n\
    \nThe `spring-amqp` project uses the known template pattern that exposes a `RabbitTemplate`\
    \ class that allows us to publish and consume messages, among other tasks. It\
    \ also provides easy-to-use message listeners that connect to the queues and consume\
    \ messages. If you are worried about threading, transactions, reconnection (in\
    \ case of failure), management, etc., you are covered with `spring-amqp`."
