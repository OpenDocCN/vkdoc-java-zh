    ### 发布者


    本节介绍如何向频道（主题）发布消息。在 Redis 中发布消息有两种选择：你可以使用低层次的 `RedisConnection` 类，也可以使用高层次的 `RedisTemplate`
    类（请记住，它与 `JmsTemplate` 和 `RabbitTemplate` 非常相似）。这两个接口都提供了发布方法 `connection.publish(msg,channel)`。同时，你也需要确定频道（主题）。


    使用 `RedisTemplate` 的好处在于，你可以定义序列化/反序列化策略。该方法隐藏了调用原始方法的复杂性，并且是线程安全的。


    让我们直接进入代码。打开清单 6-3 中所示的 `com.apress.messaging.RedisDemoApplication` 类。


    ```

    @SpringBootApplication

    public class RedisDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(RedisDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner sendMessage(StringRedisTemplate template,

    @Value("${apress.redis.topic}")String topic){

    return args -> {

    template.convertAndSend(topic,

    "Hello Redis with Spring Boot!");

    };

    }

    }

    清单 6-3.

    com.apress.messaging.RedisDemoApplication.java

    ```


    清单 6-3 展示了主应用程序类。如你所知，一旦 Spring Boot 完成自动配置，它将执行 `sendMessage` 方法。该方法会自动注入 `StringRedisTemplate`，并通过
    `application.properties` 文件中 `apress.redis.topic=spring-boot-chat` 键提供的值来获取主题。然后，它将使用模板，通过
    `template.convertAndSend` 方法发送一条消息，该方法接受主题和消息作为参数。


    通常你需要使用 `RedisTemplate`，但在这个例子中，我们使用的是 `StringRedisTemplate`。我们这样做是因为 `RedisTemplate`
    被定义为 `RedisTemplate<K,V>`，其中 `K` 是 Redis 键类型（通常是一个字符串），`V` 是 Redis 值类型（即消息）。而
    `StringRedisTemplate` 是一个使用字符串的子类。换句话说，它类似于创建一个 `RedisTemplate<String,String>`
    对象。


    有趣的是，`StringRedisTemplate` 为不同的操作定义了多种字符串序列化器，这些操作适用于不同的数据结构，例如 `Set` 和 `Hash`
    的键/值。


    现在，如果你运行该项目（请确保 `redis-server` 已启动并正在运行），你将看到如图 6-2、6-3 和 6-4 所示的订阅者日志。


