- fmt: "### Reply Management\n\nOne of the cool things about using Spring AMQP is\
    \ that it has some really nice features. For example, you can create an actual\
    \ reply-to scenario using an exchange and a routing key. In other words, you send\
    \ a message without waiting for a response (kind of a fire and forget) and you\
    \ reply to a specific exchange/queue that will have another flow.\n\nSpring AMQP\
    \ includes the `@SendTo` annotation, whereby you can send your reply to an exchange\
    \ or to a queue. Open the `com.apress.messaging.amqp.ReplyToService` class shown\
    \ in Listing [5-11](#A337882_1_En_5_Chapter.html#Par113).\n\n```\n@Component\n\
    public class ReplyToService {\n@RabbitListener(queues=\"${apress.amqp.queue}\"\
    )\n@SendTo(\"${apress.amqp.reply-exchange-queue}\")\npublic Message replyToProcess(String\
    \ message){\n//More Processing here...\nreturn MessageBuilder\n.withPayload(\"\
    PROCESSED:OK\")\n.setHeader(\"PROCESSED\", new\nSimpleDateFormat(\"yyyy-MM-dd\"\
    )\n.format(new Date()))\n.setHeader(\"CODE\", UUID.randomUUID().toString())\n\
    .build();\n}\n}\nListing 5-11.\ncom.apress.messaging.amqp.ReplyToService.java\n\
    ```\n\nListing [5-11](#A337882_1_En_5_Chapter.html#Par113) shows the `@SendTo`\
    \ annotation. As you can see, the `replyToProcess` method is also annotated with\
    \ `@RabbitListener`. This means that it will be listening to a queue (provided\
    \ by the `apress.amqp.queue` property value). The important part here is that\
    \ it will return a message that will be sent to the exchange/routing-key (provided\
    \ by the `apress.amqp.reply-exchange-queue` property value) as a reply-to mechanism\
    \ by the `@SendTo` annotation.\n\nYou can use the `Producer` class to send the\
    \ message (see Listing [5-2](#A337882_1_En_5_Chapter.html#Par53)), but before\
    \ you run this example, you need to do the following using the RabbitMQ Web Console:\n\
    \n*   Create a direct exchange called `my-exchange`\n*   Create a queue (using\
    \ any name you want)\n*   Bind `my-exchange` to the queue you just created using\
    \ the `my-reply-rk` routing key\n\nOf course, you can also create this programmatically\
    \ (may be as homework?).\n\nNow you are ready to experiment with this. Run the\
    \ example and you should have a message in the queue you have created. As you\
    \ can see, you have another way to do reply-to and create another flow.\n\n###\
    \ Flow Control\n\nFlow control is one of the best features of RabbitMQ. It will\
    \ reduce the speed of connections of the publishers that are sending messages\
    \ that can’t be consumed fast enough.\n\nRabbitMQ will normally reduce the speed\
    \ and sometimes it will block the connections, preventing them from flooding.\
    \ It’s good to know about this feature because you can use it to determine where\
    \ your bottleneck is. Either you increase the number of concurrent consumers to\
    \ the queue or you review the customer’s code to determine why it’s taking too\
    \ long to process a message.\n\nSo, how easy is it to find these bottlenecks?\
    \ One way to find them is to monitor your RabbitMQ console and see if you are\
    \ triggering the flow control mechanism. You can determine this by checking the\
    \ status of the Connections or Channels tabs, They are normally yellow and say\
    \ “Flow Control”. However, there is an easier way. RabbitMQ send events that allow\
    \ you to react to flow control and complete a shutdown.\n\n#### Blocking/Unblocking\
    \ Events\n\nSpring AMQP provides a mechanism for attaching the `Block`, `Unblock`,\
    \ and the `Shutdown` events. You can find the code in the `com.apress.messaging.config.AMQConfig`\
    \ class.\n\nIf you want to listen for the `Block` or `Unblock` events, just add\
    \ the following code to your configuration, the `BlockedListener` event:\n\n```\n\
    @Bean\npublic RabbitTemplate rabbitTemplate(ConnectionFactory\nconnectionFactory){\n\
    RabbitTemplate template = new\nRabbitTemplate(connectionFactory);\ntemplate.execute(new\
    \ ChannelCallback() {\npublic Object\ndoInRabbit(Channel channel) throws Exception\
    \ {\nchannel.getConnection().addBlockedListener(\nnew BlockedListener() {\npublic\
    \ void handleUnblocked()\nthrows IOException{\n// Resume business logic\n}\npublic\
    \ void handleBlocked(String reason)\nthrows IOException {\n// FlowControl -> Logic\
    \ to handle block\n}\n});\nreturn null;\n}\n});\nreturn template;\n}\n```\n\n\
    If you only want to listen for a failure or a Rabbit shutdown, you can use the\
    \ following code, the `ShutdownListener` event:\n\n```\n@Bean\npublic RabbitTemplate\
    \ rabbitTemplate(\nConnectionFactory connectionFactory){\nRabbitTemplate template\
    \ = new\nRabbitTemplate(connectionFactory);\ntemplate.execute(new ChannelCallback()\
    \ {\npublic Object doInRabbit(Channel channel)\nthrows Exception {\nchannel.getConnection()\n\
    .addShutdownListener(new ShutdownListener() {\npublic void shutdownCompleted(\n\
    ShutdownSignalException cause) {\n// Process the shutdown\n}\n});\nreturn null;\n\
    }\n});\nreturn template ;\n}\n```\n\nYou can have only one `RabbitTemplate` and\
    \ add the `BlockedListener` and `ShutdownListener` to the same code.\n\n## More\
    \ Features\n\nThere are a lot of features exposed by the Spring AMQP module, and\
    \ it would take a whole book just to explain each one of them. I point out some\
    \ of them in this section:\n\n*   **Transactions**: The Spring AMQP allows you\
    \ to use the `@Transactional` annotation in your code, so by adding this annotation,\
    \ the Spring AMQP module sets the channels in transaction mode. It then can do\
    \ the commit or rollback, depending on the case. You can also specify the transaction\
    \ manager you want to use by defining a bean:\n\n    ```\n    @Transactional\n\
    \    public void processInvoice() {\n    String incoming = rabbitTemplate.receiveAndConvert();\n\
    \    // Do some more database processing...\n    String reply = reviewInvoice(incoming);\n\
    \    rabbitTemplate.convertAndSend(reply);\n    }\n    ```\n\n*   **Multi-Listeners**:\
    \ Spring AMQP version 1.5.0 and above adds a new way to have one class that processes\
    \ multiple listeners depending of the type of message (if needed). Take a look\
    \ at the `MultiListenerService` code. You can add the methods the `@Payload`,\
    \ `@Header`, and `@Headers` annotations if you need to.\n\n    ```\n    @Component\n\
    \    @RabbitListener(id=\"multi\", queues = \"${apress.amqp.queue}\")\n    public\
    \ class MultiListenerService {\n    @RabbitHandler\n    @SendTo(\"${apress.amqp.reply-exchange-queue}\"\
    )\n    public Order processInvoice(Invoice invoice) {\n    Order order = new Order();\n\
    \    //Process Invoice here...\n    order.setInvoice(invoice);\n    return order;\n\
    \    }\n    @RabbitHandler\n    public Order processInvoiceWithTax(\n    InvoiceWithTax\
    \ invoiceWithTax) {\n    Order order = new Order();\n    //Process Invoice with\
    \ Tax here...\n    return order;\n    }\n    @RabbitHandler\n    public String\
    \ itemProcess(\n    @Header(\"amqp_receivedRoutingKey\") String routingKey,\n\
    \    @Payload Item item) {\n    //Some Process here...\n    return \"{\\\"message\\\
    \": \\\"OK\\\"}\" ;\n    }\n    }\n    ```\n\n*   **Retries**: Sometimes you will\
    \ get an error, either by processing the message or by the broker, and you will\
    \ need to retry at the consumer level. You need to use this feature for that scenario:\n\
    \n    ```\n    // Retry for the consumer,\n    // normally this needs to be set\
    \ in the container:\n    // container.setAdviceChain(new Advice[] { interceptor()\
    \ });\n    //\n    @Bean\n    public StatefulRetryOperationsInterceptor interceptor()\
    \ {\n    return RetryInterceptorBuilder.stateful()\n    .maxAttempts(3)\n    .backOffOptions(1000,\
    \ 2.0, 10000)\n    .build();\n    }\n    ```\n\n*   Or this:\n\n    ```\n    @Bean\n\
    \    RetryOperationsInterceptor interceptor(\n    RabbitTemplate template,\n \
    \   @Value(\"${apress.amqp.error-exchange:}\")String errorExchange,\n    @Value(\"\
    ${apress.amqp.error-routing-key}\")String\n    errorExchangeRoutingKey) {\n  \
    \  return RetryInterceptorBuilder.stateless()\n    .maxAttempts(3)\n    .recoverer(\n\
    \    new RepublishMessageRecoverer(template, errorExchange,\n    errorExchangeRoutingKey))\n\
    \    .build();\n    }\n    ```\n\nThere are more. Take a look at the Spring AMQP\
    \ project reference to learn more about these awesome features."
