- fmt: '注意：我包含了更多书中未涉及的代码，希望你能尝试运行。花点时间分析一下发生了什么。我添加了一个示例，演示如何与固定数量的推送式汇率数据进行交互。


    到目前为止，这些示例都在同一个主线程中运行，但有一种方法可以使用多线程。看看这段代码，你可以通过`ExecutorService`类使用自己的线程池。例如：


    ```

    ExecutorService executorService =

    Executors.newFixedThreadPool(100);

    Observable observableExchange =

    service.getExchangeRates();

    observableExchange

    .take(10)

    .subscribeOn(

    Schedulers

    .from(executorService))

    .forEach(ex -> { log.info(ex.toString()); });

    ```


    `RxJava`目前已经发展到2.x版本，并且修改了一些签名。你可以在[`https://github.com/ReactiveX/RxJava/wiki/What’s-different-in-2.0`](https://github.com/ReactiveX/RxJava/wiki/What%27s-different-in-2.0)查看变更内容。


    ## Reactor


    `Reactor`（来自Spring框架团队）是一个完全成熟且非阻塞的JVM响应式编程基础库。它与所有Java 8函数式API（`CompletableFuture`、`Stream`和`Duration`）协同工作，提供两个可组合的异步序列API（`Flux`——N个元素和`Mono`——0或1个元素），并实现了Reactive
    Extension规范。


    你可以在[`http://projectreactor.io/`](http://projectreactor.io/)获取更多关于`Reactor`的信息。让我们从代码开始。


