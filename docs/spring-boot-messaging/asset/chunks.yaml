  trans: '

    #### 消息传递模式


    设计模式是软件设计中常见问题的解决方案。同理，消息传递模式则试图解决消息传递设计中的问题。


    在本书的学习过程中，你将了解以下模式的实现，因此我在此列出它们并附上简单定义作为介绍：


    *   **消息类型模式**：描述消息传递的不同形式，例如字符串（可能是纯文本、JSON 和/或 XML）、字节数组、对象等。

    *   **消息通道模式**：确定将使用何种传输方式（通道）来发送消息，以及它将具有哪些属性。其核心思想是生产者和消费者知道如何连接到传输通道，并能够发送和接收消息。该传输方式的可能属性包括请求-回复功能和单向通道，你很快就会了解到。点对点通道是该模式的一个例子。

    *   **路由模式**：描述通过在集成解决方案中提供路由机制（依赖于一组条件的过滤）在生产者和消费者之间发送消息的方式。这可以通过编程实现，或者在某些情况下，消息传递系统（代理）可以具备这些能力（如
    RabbitMQ）。

    *   **服务消费者模式**：描述消息到达时消费者的行为，例如在处理消息时添加事务性方法。有一些框架允许你启动此类行为（例如 Spring 框架，你可以通过添加基于事务抽象的
    `@Transactional` 来实现）。

    *   **契约模式**：生产者和消费者之间为进行简单通信而达成的契约，例如当你进行一些 REST 调用时，调用一个包含某些字段的 JSON 或 XML 消息。

    *   **消息构造模式**：描述消息如何创建以便在消息传递系统中传输。例如，你可以创建一个“信封”，它包含一个主体（实际消息）和一些头部（带有关联 ID、序列号或可能的回复地址）。通过一个简单的
    Web 请求，你可以添加参数或头部，实际消息成为请求的主体，从而使整个请求成为构造模式的一部分。HTTP 协议支持这种通信（消息传递）。

    *   **转换模式**：描述如何在消息传递系统中更改消息的内容。想象一条消息需要一些处理，并且需要在传输过程中进行增强，例如内容丰富器。


    如你所见，这些模式不仅描述了消息传递过程，其中一些还描述了如何处理你之前看到的一些常见用例。当然，还有更多的消息传递模式，这些只是我们将在本书中探讨的一部分。


    如果你需要更多信息，我建议你访问企业集成模式网站：[`http://www.enterpriseintegrationpatterns.com/`](http://www.enterpriseintegrationpatterns.com/)。同时，也请查阅这本必读书籍——《企业集成模式：设计、构建和部署消息传递解决方案》，作者是
    Gregor Hohpe 和 Bobby Woolf，由 Addison-Wesley 出版。


    在本书中，我将使用 Spring Integration 模块和各种消息传递系统（代理）来介绍其中的一些模式。


    ## 使用 Spring 框架进行消息传递


    Spring 框架是 Java 社区最常用的框架之一。Spring 框架通过实现一个可用于任何消息传递系统的模板设计模式，提供了一种简单易行的消息传递方式。它通过
    `JmsTemplate` 支持 JMS API，通过 `RabbitTemplate` 支持 AMQP，支持 STOMP，以及通过事件和监听器支持内部消息传递。别担心，我们将在本书后面部分介绍所有这些内容。


    值得一提的是，Spring Integration 项目已被社区广泛接受，并且自 4.0 版本以来，Spring Integration 的核心（消息传递、通道和其他接口）已成为
    Spring Core 的一部分。


    市面上有许多优秀的消息传递框架。有些使用纯 Java，有些则依赖于 Spring 框架。Spring 团队一直非常努力地让开发者更容易使用所有功能，包括并发、事务、重试等。要使用其他库，你必须使用相同的逻辑手动实现它们。


    注意


    你可以从 Apress 网站下载本书的源代码，或者从以下 GitHub 仓库克隆：[`https://github.com/felipeg48/spring-messaging`](https://github.com/felipeg48/spring-messaging)。


    ## 总结


    本章介绍了消息传递和消息传递系统。你了解了消息传递的基本概念，即开发者需要将信息从一个点发送到另一个点。


    本章回顾了消息传递的一些用例、模型和模式。本书将更详细地介绍它们，并通过一些最佳实现（包括 Spring 框架及其部分模块，如 Spring Integration、Spring
    AMQP 和 Spring Cloud Stream）来使用它们。


    下一章将带你了解 Spring Boot，它是创建企业级 Spring 应用的下一代技术。Spring Boot 是你在本书中使用的所有模块的基础。


    # 2. Spring Boot


    我将用我在另一本书中写过的一句话开始：Spring Boot 是使用 Spring 框架创建企业级应用的新篇章。


    Spring Boot 并没有取代 Spring 框架；你可以将其视为一种使用 Java 社区使用的框架创建出色应用的新方式。


    在本章中，我将向你展示什么是 Spring Boot 以及它在幕后是如何工作的。你还将通过一个小例子看到 Spring Boot 的强大之处。那么，我们为什么需要了解
    Spring Boot？首先，我们将要使用的所有技术，如 Spring Integration、Spring AMQP、Spring Cloud Stream
    等，都以 Spring Boot 为基础。本书中的所有示例都使用 Spring Boot 来创建 Spring 应用。当然，Spring Boot 使消息传递变得更加容易。


    ## 什么是 Spring Boot？


    首先，Spring Boot 是一种“有主见”的技术。这意味着什么？


    Spring Boot 会查看类路径，并尝试确定你正在尝试运行哪种类型的应用。例如，如果你的类路径中有 `spring-mvc` 模块，Spring Boot
    将在 Spring 容器内自动装配 `WebApplicationInitializer` 和 `DispatcherServlet` 类，并设置一个嵌入式容器（默认为
    Tomcat），这样你就可以运行你的应用，而无需将应用复制或部署到 Servlet 容器。


    ### Spring Boot 的特性


    让我们看看 Spring Boot 最重要的特性：


    *   它可以创建独立的 Spring 应用。基于其 Maven 或 Gradle 插件，你可以创建可执行的 JAR 或 WAR 文件。

    *   它基于 starter `pom` 拥有“有主见”的技术。

    *   包含自动配置，无需任何 XML 或 Java 配置类即可配置你的 Spring 应用。

    *   为 Web 应用包含嵌入式 Servlet 容器（Tomcat、Jetty 或 Undertow）。

    *   包含可直接使用的生产就绪特性（非功能性需求），例如指标和健康检查。

    *   Spring Boot 不是一个插件或代码生成器（这意味着 Spring Boot 不会创建需要编译的文件）。

    *   如果你有一个应用或 Servlet 容器，你可以将 Spring Boot 作为 WAR 部署，而无需进行任何更改。

    *   你可以访问所有 Spring 应用事件和监听器（我们将在下一章讨论）。


    这个列表只是 Spring Boot 所能提供功能的一小部分；当然还有更多。如果你需要了解更多，我推荐我的另一本书——Apress 出版的《Pro Spring
    Boot》。那本书包含了关于 Spring Boot 内部工作原理的更全面和详细的章节。

