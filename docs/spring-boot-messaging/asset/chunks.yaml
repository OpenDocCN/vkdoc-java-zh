  trans: "\n## 货币项目\n\n请查看 `rest-api-websockets` 项目。你会找到 `RateWebSocketsConfig` 类，它与另一个项目非常相似。其设计思路是，货币项目拥有一个简单的\
    \ WebSockets 代理，该代理会接受任何通过 WebSockets 协议的客户端连接。\n\n每当有新的汇率发布时，它都会向订阅了 `/rate/new`\
    \ 端点的客户端发送一条消息。请查看以下内容：\n\n*   `RateWebSocketsConfig`：此类包含 WebSockets 消息传递所需的配置。\n\
    *   `CurrencyController`：此类中的 `addNewRates` 方法包含以下语句：\n\n    ```\n    webSocket.convertAndSend(\"\
    /rate/new\", currencyExchange);\n    ```\n\n*   `src/main/resources/public/index-ws.html`：此网页包含定义连接到服务器的客户端的代码。请查看一下，它非常直观。\n\
    \n要进行测试，你只需在命令行中添加一个简单的 POST 请求：\n\n```\n$ curl -i -X POST -H \"Content-Type:\
    \ application/json\" -H \"Accept: application/json\" -d '{\"base\":\"USD\",\"\
    date\":\"2017-02-15\",\"rates\":[{\"code\":\"EUR\",\"rate\":0.82857,\"date\":\"\
    2017-02-15\"},{\"code\":\"JPY\",\"rate\":105.17,\"date\":\"2017-02-15\"},{\"code\"\
    :\"MXN\",\"rate\":22.232,\"date\":\"2017-02-15\"},{\"code\":\"GBP\",\"rate\":0.75705,\"\
    date\":\"2017-02-16\"}]}' localhost:8080/currency/new\n```\n\n你也可以使用任何其他 REST\
    \ 客户端，例如 `POSTMAN:` [`https://www.getpostman.com/`](https://www.getpostman.com/)\
    \ 。发布新汇率后，你将在面板中看到这些汇率，如图 7-13 所示。\n\n![A337882_1_En_7_Fig13_HTML.jpg](img/A337882_1_En_7_Fig13_HTML.jpg)\n\
    \n图 7-13.\n\n通过 WebSockets 进行货币兑换\n\n## 总结\n\n本章讨论了使用 `spring-websocket` 模块和 Spring\
    \ Boot 进行 WebSockets 消息传递。\n\n你学习了 WebSockets 如何使用 HTTP 握手，然后切换到 TCP 连接。你看到了如何创建低级服务器/客户端的示例。\n\
    \n你了解了如何使用 SockJS 和 STOMP 来促进通信，以实现异步或事件驱动的消息传递。你还学习了如何配置 RabbitMQ 并将其用作 STOMP\
    \ 中继。你在货币兑换项目中看到了一些代码，这些代码向连接到该服务的任何客户端发送新汇率。\n\n下一章将向你展示如何使用 Spring Integration\
    \ 模块将你的代码与多种技术集成。\n\n# 8. 使用 Spring Integration 进行消息传递\n\n本章介绍 Java 社区中最好的集成框架之一——Spring\
    \ Integration 模块。它当然基于 Spring 框架。\n\n如果我们作为开发人员或架构师来看待软件开发和业务需求，我们总是在寻找如何将内部和外部的组件及系统集成到我们的架构中。我们需要功能完备、高可用且易于维护和增强的组件。\n\
    \n开发人员和架构师面临的主要用例包括：\n\n*   创建一个能够可靠传输和分析文件的系统。大多数应用程序需要从文件中读取信息并进行处理。开发人员需要创建健壮的文件系统，用于保存和读取数据，同时也能共享数据并处理大文件。\n\
    *   在共享环境中使用数据。多个客户端（系统或用户）需要访问同一个数据库或同一张表，对其执行操作，并处理数据不一致、重复等问题。\n*   远程访问不同的系统始终充满挑战，从执行远程过程到发送信息。我们总是希望以实时和同步的方式获得这种访问。我们必须尽可能快地得到响应，同时不能忘记远程系统必须始终可达。换句话说，系统必须具有容错性和高可用性。\n\
    *   消息传递是我们始终希望在任何系统中拥有的一个重要用例，从基本的内部调用到每秒发送数十亿条消息到远程代理。我们通常以异步方式处理消息传递，因此需要处理并发、多线程、速度（网络延迟）、高可用性、容错等问题。\n\
    \n开发人员如何实现所有这些用例？大约 14 年前，两位名叫 Gregor Hohpe 和 Bobby Woolf 的软件工程师撰写了开创性的著作《企业集成模式：设计、构建和部署消息传递解决方案》，由\
    \ Addison-Wesley 出版。这本书揭示了解决这些用例所需的所有消息传递模式。该书还提供了对系统如何互联和工作的更好理解，以及如何通过应用程序架构、面向对象设计和面向消息的设计来创建一个健壮的集成系统。我强烈推荐你阅读它。\n\
    \n以下各节将使用 Spring 框架中的 Spring Integration 模块向你展示其中一些模式。\n"
- fmt: "# Spring Integration Primer\n\nSpring Integration is a simple model for implementing\
    \ enterprise integration solutions, because it facilitates asynchronous and message-driven\
    \ design within a Spring Boot application. It implements the Enterprise Integration\
    \ patterns for creating enterprise, robust, and portable integration solutions.\n\
    \nYou can use the Spring Integration module to create components that are loosely\
    \ coupled for modularity and testability. It helps enforce the separation of concerns\
    \ between your business and integration logic.\n\nSpring Integration exposes these\
    \ main components:\n\n- **Message**: This is a generic wrapper for any Java object.\
    \ It consists of headers and a payload. The headers normally have important information\
    \ like IDs, timestamps, correlation IDs, and return addresses. You can add your\
    \ own information to be used with your business logic. The payload can be any\
    \ type of data, from an array of bytes, strings, and custom objects—anything.\
    \ You can find its definition in the `spring-messaging` module, which is in the\
    \ `org.springframework.messaging` package.\n\n```\npublic interface Message {\n\
    \    T getPayload();\n    MessageHeaders getHeaders();\n}\n```\n\nAs you can see,\
    \ there is nothing too fancy in the `Message` definition.\n\n- **Message Channel**:\
    \ You can see a message channel as a pipes and filters architecture, very similar\
    \ to the command you use in a UNIX system. To use the message channel, you need\
    \ to have producers and consumers. The producer sends the message to the message\
    \ channel, where a consumer receives it. See Figure [8-1](#A337882_1_En_8_Chapter.html#Fig1).\n\
    \n![A337882_1_En_8_Fig1_HTML.gif](A337882_1_En_8_Fig1_HTML.gif)\n\nFigure 8-1.\
    \ Message channel\n\nThis message channel can follow the messaging patterns discussed\
    \ in previous chapters—the point-to-point and publish/subscribe models. Spring\
    \ Integration offers several message channels, including pollable channels (allow\
    \ you to have buffered messages within a queue) or subscribable channels for the\
    \ consumers.\n\n- **Message Endpoint**: A message endpoint is like a filter that\
    \ will connect the application code to the messaging framework. Most of these\
    \ endpoints are part of the Enterprise Integration patterns’ implementations:\n\
    \    - **Filter**: A message filter determines when a message should be passed\
    \ to the output channel.\n    - **Transformer**: A message transformer modifies\
    \ the content or structure of a message and passes it to the output channel.\n\
    \    - **Router**: A message router decides what to do and where to send the message\
    \ based on rules. These rules can be in the headers or even in the same payload.\
    \ This message router has many patterns that can be applied, and I’ll show you\
    \ at least one of them.\n    - **Splitter**: A message splitter will accept a\
    \ message (input channel) and split and return new multiple messages (output channel).\n\
    \    - **Service Activator**: This is an endpoint that acts as a service by receiving\
    \ a message (input channel) and processing it. It can end the flow of the integration,\
    \ return the same message, or send a new one (output channel).\n    - **Aggregator**:\
    \ This message endpoint will receive multiple messages (input channel). It will\
    \ combine the messages into a new single message (based on a release strategy)\
    \ and it will send the new message out (output channel).\n    - **Channel Adapters**:\
    \ This is a particular endpoint that connects a message channel to other systems\
    \ or transports. Spring Integration offers you inbound and outbound adapters.\
    \ When you need a response, it offers a gateway adapter. You will see that these\
    \ are the most commonly used. If your solution is looking to connect to RabbitMQ,\
    \ JMS, FTP, a file system, HTTP, or any other technology, Spring Integration already\
    \ has the adapter to connect to it without you having to code a client.\n\nIt\
    \ would take a whole new book to describe everything about Spring Integration\
    \ and each message (message patterns), messaging channels, adapters, and more.\
    \ If you are interested in this technology, I recommend my Pro Spring Integration\
    \ book from Apress [`http://www.apress.com/us/book/9781430233459`](http://www.apress.com/us/book/9781430233459).\n\
    \nThe next section describes some of these components and patterns, which should\
    \ be enough to get you started.\n\n## Programming Spring Integration\n\nWith Spring\
    \ Integration, you have several ways to configure all the components (`Message`,\
    \ `Message Channel`, and `Message Endpoints`). You can do it using XML, Java Config\
    \ classes, annotations, and the new Integration DSL. So far, there is no book\
    \ that covers DSL (Domain Specific Language), which is why I focus a little more\
    \ on it.\n\nWe start with a simple example, just to show what you need to have\
    \ and do to start with Spring Integration. In the book’s source code, open the\
    \ `si-demo` project from the Chapter [8](#A337882_1_En_8_Chapter.html) folder.\
    \ This project includes all the examples found in this chapter.\n\n### A Simple\
    \ Spring Integration Example"
