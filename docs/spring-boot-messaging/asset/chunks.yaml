  trans: "\n## Spring Integration 入门指南\n\nSpring Integration 为实现企业集成解决方案提供了一个简洁的模型，因为它能在\
    \ Spring Boot 应用中促进异步和消息驱动的设计。它实现了企业集成模式，用于创建健壮、可移植的企业级集成解决方案。\n\n你可以使用 Spring\
    \ Integration 模块来创建松耦合的组件，从而提高模块化和可测试性。它有助于在业务逻辑与集成逻辑之间实施关注点分离。\n\nSpring Integration\
    \ 暴露了以下主要组件：\n\n*   **消息**：这是任何 Java 对象的通用包装器。它由消息头和消息体组成。消息头通常包含重要信息，如 ID、时间戳、关联\
    \ ID 和返回地址。你可以添加自己的信息用于业务逻辑。消息体可以是任何类型的数据，从字节数组、字符串到自定义对象——任何类型都可以。你可以在 `spring-messaging`\
    \ 模块中找到它的定义，该模块位于 `org.springframework.messaging` 包中。\n\n```\n    public interface\
    \ Message {\n    T getPayload();\n    MessageHeaders getHeaders();\n    }\n  \
    \  ```\n\n如你所见，`Message` 的定义并不复杂。\n*   **消息通道**：你可以将消息通道视为一种管道和过滤器架构，这与你在 UNIX\
    \ 系统中使用的命令非常相似。要使用消息通道，你需要有生产者和消费者。生产者将消息发送到消息通道，消费者从通道中接收消息。参见图 8-1。\n\n![A337882_1_En_8_Fig1_HTML.gif](img/A337882_1_En_8_Fig1_HTML.gif)\n\
    \n图 8-1.\n\n消息通道 此消息通道可以遵循前几章讨论的消息传递模式——点对点和发布/订阅模型。Spring Integration 提供了多种消息通道，包括可轮询通道（允许你在队列中缓冲消息）或可供消费者订阅的通道。\n\
    *   **消息端点**：消息端点就像一个过滤器，它将应用程序代码连接到消息传递框架。这些端点大多是企业集成模式实现的一部分：\n    *   **过滤器**：消息过滤器决定何时应将消息传递到输出通道。\n\
    \    *   **转换器**：消息转换器修改消息的内容或结构，并将其传递到输出通道。\n    *   **路由器**：消息路由器根据规则决定如何处理消息以及将消息发送到哪里。这些规则可以位于消息头中，甚至可以在消息体本身中。此消息路由器有许多可应用的模式，我将至少向你展示其中一种。\n\
    \    *   **拆分器**：消息拆分器接收一条消息（输入通道），将其拆分并返回多条新消息（输出通道）。\n    *   **服务激活器**：这是一个端点，通过接收消息（输入通道）并处理它来充当服务。它可以结束集成流程、返回相同的消息或发送一条新消息（输出通道）。\n\
    \    *   **聚合器**：此消息端点接收多条消息（输入通道）。它将根据释放策略将这些消息合并成一条新消息，然后将新消息发送出去（输出通道）。\n \
    \   *   **通道适配器**：这是一种特殊的端点，用于将消息通道连接到其他系统或传输协议。Spring Integration 为你提供了入站和出站适配器。当你需要响应时，它还提供了网关适配器。你会看到这些是最常用的。如果你的解决方案需要连接到\
    \ RabbitMQ、JMS、FTP、文件系统、HTTP 或任何其他技术，Spring Integration 已经提供了相应的适配器，无需你编写客户端代码。\n\
    \n要完整描述 Spring Integration 以及每条消息（消息模式）、消息通道、适配器等，需要一整本新书。如果你对此技术感兴趣，我推荐我编写的 Apress\
    \ 出版社的《Pro Spring Integration》一书 [`http://www.apress.com/us/book/9781430233459`](http://www.apress.com/us/book/9781430233459)。\n\
    \n下一节将描述其中一些组件和模式，这应该足以让你入门。\n\n## 编程实现 Spring Integration\n\n使用 Spring Integration，你有多种方式配置所有组件（消息、消息通道和消息端点）。你可以使用\
    \ XML、Java 配置类、注解以及新的集成 DSL 来完成。到目前为止，还没有一本书涵盖 DSL（领域特定语言），这就是我稍微多关注一下它的原因。\n\n\
    我们从一个简单的示例开始，只是为了展示开始使用 Spring Integration 需要具备和完成的工作。在本书的源代码中，打开第 8 章文件夹中的 `si-demo`\
    \ 项目。该项目包含了本章中的所有示例。\n\n### 一个简单的 Spring Integration 示例\n"
- fmt: '### Using DSL


    We are going to start with the configuration class. Open the `com.apress.messsaging.config.SpiSimpleConfiguration`
    class. See Listing [8-1](#A337882_1_En_8_Chapter.html#Par31).


    ```

    @Configuration

    public class SpiSimpleConfiguration {

    @Bean

    public IntegrationFlow simpleFlow(){

    return IntegrationFlows

    .from(MessageChannels.direct("input"))

    .filter("World"::equals)

    .transform("Hello "::concat)

    .handle(System.out::println)

    .get();

    }

    }

    Listing 8-1.

    com.apress.messsaging.config.SpiSimpleConfiguration.java

    ```


    Listing [8-1](#A337882_1_En_8_Chapter.html#Par31) shows a basic example. This
    example receives a message from the `input` channel, filters this message only
    if it equals the string `"World"`, and then transforms the message by concatenating
    the string `"Hello"` and the message `"World"`. It then prints it to the console.
    All of this is called integration flow. Let’s take a deeper look inside:


    - `IntegrationFlow`: This is the way we expose the DSL as a bean (this must have
    a `@Bean` annotation). This class is a factory for the `IntegrationFlowBuilder`
    and defines the flow of the integration. It registers all the components like
    Message Channels, endpoints, etc.

    - `IntegrationFlows`: This class exposes a fluent API that helps build the integration
    flow. It’s easy to incorporate any endpoints like transform, filter, handle, split,
    aggregate, route, and bridge. With these endpoints, you can use any Java 8 (and
    above) Lambda expressions as arguments.

    - `from`: This is an overloaded method where you normally pass the `MessageSource`.
    In this case, we are passing a direct channel named `input`.

    - `filter`: This is an overloaded method that will populate a `MessageFilter`.
    The `MessageFilter` delegates to a `MessageSelector` that will send the message
    to the filter’s output channel only if the selector accepts the `Message`.

    - `transform`: This method can receive a Lambda expression, but actually receives
    a `GenericTransformer<S,T>`, where `S` is the source and `T` is the type that
    it will be converted to. Here, we can use out-of-the-box transformers, including
    `ObjectToJsonTransformer`, `FileToStringTransformer`, etc. In this example, we
    are just using the contact method from the `String` class.

    - `handle`: This is an overloaded method that populates a `ServiceActivatingHandler`.
    Normally we can use a POJO (Plain Old Java Object), which allows us to receive
    the message and return a new message or trigger another call. This is a useful
    endpoint that we are going to see in this chapter and in the next one as a service
    activator endpoint.


    Don’t worry too much if this looks different from what you have done in the past
    for integration solutions; you will get more comfortable as you see more examples
    and it will get easier.


    Next, let’s look at the main application, so we can run this example. Open the
    `com.apress.messaging.SpiDemoApplication` class. See Listing [8-2](#A337882_1_En_8_Chapter.html#Par41).


    ```

    @EnableIntegration

    @SpringBootApplication

    public class SpiDemoApplication {

    public static void main(String[] args) {

    new SpringApplicationBuilder(SpiDemoApplication.class)

    .web(false)

    .run(args);

    }

    @Bean

    CommandLineRunner process(MessageChannel input){

    return args -> {

    input.send(MessageBuilder.withPayload("World").build());

    };

    }

    }

    Listing 8-2.

    com.apress.messaging.SpiDemoApplication.java

    ```


    Listing [8-2](#A337882_1_En_8_Chapter.html#Par41) shows you the main application.
    Here we are using a new annotation, `@EnableIntegration`, which will set up all
    the Spring Integration beans that we need for our flow. This annotation registers
    different beans like `errorChannel`, `LoggingHandler`, `taskScheduler`, and more.
    These beans complement our flow in an integration solution. This annotation is
    necessary when using a Java configuration, annotations, and DSL in a Spring Boot
    application.


    Note that I added a different way to run a Spring Boot application by using the
    `SpringApplicationBuilder` class. If you look at the `pom.xml` file, you will
    find that the `spring-boot-starter-web` dependency is there, meaning that this
    is a web application. With this example, we don’t need the whole embedded server,
    which is why it’s a `.web(false)` statement.


    In the `process` method, we are requesting a `MessageChannel` to be injected.
    Then we use `MessageBuilder` (a fluent API class), which helps create a message
    with a payload `World`.


    Remember that in Listing [8-1](#A337882_1_En_8_Chapter.html#Par31) we used the
    `.from(MessageChannels.direct("input"))` statement? This statement will create
    the message channel `"input"`. This is the channel we are using to send the message
    to. If you run the application, you should have something similar to Figure [8-2](#A337882_1_En_8_Chapter.html#Fig2).


    ![A337882_1_En_8_Fig2_HTML.jpg](A337882_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. SpiDemoApplication logs


    Figure [8-2](#A337882_1_En_8_Chapter.html#Fig2) shows the logs. You should have
    a print out. Remember that a message is just about headers and payload, which
    is why we get a `GenericMessage` class. The final message is `"Hello World"` and
    there are some headers that include the ID and the timestamp.


    ### Using XML


    Next, let’s try the same example using XML and learn how to configure the integration
    flow. Open the `src/main/resources/META-INF/spring/integration/spi-context.xml`
    file. See Listing [8-3](#A337882_1_En_8_Chapter.html#Par48).


    ```


    Listing 8-3.

    src/main/resources/META-INF/spring/integration/spi-context.xml

    ```


    Listing [8-3](#A337882_1_En_8_Chapter.html#Par48) shows how to configure the integration
    flow for XML. I think it’s very straightforward. If you are using a STS (Spring
    Tool Suite) IDE, you can use one of its features, such as the drag-and-drop panel
    for Spring Integration flows (Integration-Graph). See Figure [8-3](#A337882_1_En_8_Chapter.html#Fig3).


    ![A337882_1_En_8_Fig3_HTML.jpg](A337882_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. Spring Integration-Graph panel


    Figure [8-3](#A337882_1_En_8_Chapter.html#Fig3) shows the Integration-Graph panel,
    where you can create your flows graphically, by dragging and dropping components
    from the left section. As you can see, there are Channels, Routing, Transformation,
    Endpoints, and more. Figure [8-3](#A337882_1_En_8_Chapter.html#Fig3) is actually
    a translation of the XML. In other words, you can start doing the XML and if you
    switch to the Integration-Graph, it will show you what you have so far. You can
    also use this feature to switch to the source, and you will have the XML. A very
    cool way to create flows, don’t you think?


    To run this example, you have to comment out the `@Configuration` annotation from
    Listing [8-1](#A337882_1_En_8_Chapter.html#Par31) (or any other `@Component` annotation
    files). Then, the main app (`SpiDemoApplication.java`) must look like Listing
    [8-4](#A337882_1_En_8_Chapter.html#Par52).


    ```

    @ImportResource({"META-INF/spring/integration/spi-context.xml"})

    @EnableIntegration

    @SpringBootApplication

    public class SpiDemoApplication {

    public static void main(String[] args) {

    new SpringApplicationBuilder(SpiDemoApplication.class)

    .web(false)

    .run(args);

    }

    @Bean

    CommandLineRunner process(MessageChannel input){

    return args -> {

    input.send(MessageBuilder.withPayload("World").build());

    };

    }

    }

    Listing 8-4.

    com.apress.messaging.SpiDemoApplication.java

    ```


    Listing [8-4](#A337882_1_En_8_Chapter.html#Par52) shows the new version. What
    changed? We simply added the `@ImportResource` annotation. This will tell Spring
    Boot that there is a configuration file that needs to be processed. If you run
    it (remember to comment out `@Configuration` from the `SpiSimpleConfiguration`
    class), it will print `"Hello World"` in the logs (by the `LoggingHandler` class).
    See Figure [8-4](#A337882_1_En_8_Chapter.html#Fig4).


    ![A337882_1_En_8_Fig4_HTML.jpg](A337882_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. Application logs showing Hello World'
