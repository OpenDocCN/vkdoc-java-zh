    #### 使用 DSL


    我们将从配置类开始。打开 `com.apress.messsaging.config.SpiSimpleConfiguration` 类。参见代码清单 8-1。


    ```

    @Configuration

    public class SpiSimpleConfiguration {

    @Bean

    public IntegrationFlow simpleFlow(){

    return IntegrationFlows

    .from(MessageChannels.direct("input"))

    .filter("World"::equals)

    .transform("Hello "::concat)

    .handle(System.out::println)

    .get();

    }

    }

    代码清单 8-1.

    com.apress.messsaging.config.SpiSimpleConfiguration.java

    ```


    代码清单 8-1 展示了一个基础示例。该示例从 `input` 通道接收消息，仅当消息内容等于字符串 `"World"` 时才进行过滤，然后通过拼接字符串
    `"Hello"` 和消息 `"World"` 来转换消息，最后将其打印到控制台。所有这些统称为**集成流**。让我们深入了解一下：


    *   `IntegrationFlow`：这是我们以 Bean 形式暴露 DSL 的方式（必须带有 `@Bean` 注解）。该类是 `IntegrationFlowBuilder`
    的工厂，用于定义集成流。它会注册所有组件，如消息通道、端点等。

    *   `IntegrationFlows`：该类暴露了一个流畅的 API，有助于构建集成流。它可以轻松地整合任何端点，如 transform、filter、handle、split、aggregate、route
    和 bridge。使用这些端点时，你可以将任何 Java 8（及以上版本）的 Lambda 表达式作为参数。

    *   `from`：这是一个重载方法，通常用于传入 `MessageSource`。在此例中，我们传入了一个名为 `input` 的直接通道。

    *   `filter`：这是一个重载方法，用于填充 `MessageFilter`。`MessageFilter` 委托给 `MessageSelector`，仅当选择器接受该
    `Message` 时，才会将消息发送到过滤器的输出通道。

    *   `transform`：该方法可以接收一个 Lambda 表达式，但实际上接收的是 `GenericTransformer<S,T>`，其中 `S`
    是源类型，`T` 是转换后的目标类型。这里我们可以使用开箱即用的转换器，包括 `ObjectToJsonTransformer`、`FileToStringTransformer`
    等。在此示例中，我们仅使用了 `String` 类的连接方法。

    *   `handle`：这是一个重载方法，用于填充 `ServiceActivatingHandler`。通常我们可以使用 POJO（Plain Old
    Java Object，普通 Java 对象），它允许我们接收消息并返回新消息或触发另一个调用。这是一个非常有用的端点，我们将在本章和下一章中将其作为服务激活器端点进行介绍。


    如果这与您过去在集成解决方案中所做的看起来不同，请不要过于担心；随着您看到更多示例，您会越来越熟悉，一切也会变得更容易。


    接下来，让我们看看主应用程序，以便运行此示例。打开 `com.apress.messaging.SpiDemoApplication` 类。参见代码清单 8-2。


    ```

    @EnableIntegration

    @SpringBootApplication

    public class SpiDemoApplication {

    public static void main(String[] args) {

    new SpringApplicationBuilder(SpiDemoApplication.class)

    .web(false)

    .run(args);

    }

    @Bean

    CommandLineRunner process(MessageChannel input){

    return args -> {

    input.send(MessageBuilder.withPayload("World").build());

    };

    }

    }

    代码清单 8-2.

    com.apress.messaging.SpiDemoApplication.java

    ```


    代码清单 8-2 展示了主应用程序。这里我们使用了一个新注解 `@EnableIntegration`，它将设置我们流程所需的所有 Spring Integration
    Bean。该注解会注册不同的 Bean，例如 `errorChannel`、`LoggingHandler`、`taskScheduler` 等。这些 Bean
    在集成解决方案中补充了我们的流程。在 Spring Boot 应用程序中使用 Java 配置、注解和 DSL 时，此注解是必需的。


    请注意，我添加了一种使用 `SpringApplicationBuilder` 类运行 Spring Boot 应用程序的不同方式。如果你查看 `pom.xml`
    文件，会发现其中包含了 `spring-boot-starter-web` 依赖项，这意味着这是一个 Web 应用程序。在此示例中，我们不需要整个嵌入式服务器，这就是使用
    `.web(false)` 语句的原因。


    在 `process` 方法中，我们请求注入一个 `MessageChannel`。然后我们使用 `MessageBuilder`（一个流畅的 API 类），它有助于创建一个负载为
    `World` 的消息。


    还记得在代码清单 8-1 中我们使用了 `.from(MessageChannels.direct("input"))` 语句吗？该语句将创建消息通道 `"input"`。这就是我们用来发送消息的通道。如果你运行该应用程序，应该会得到类似于图
    8-2 的结果。


    ![A337882_1_En_8_Fig2_HTML.jpg](img/A337882_1_En_8_Fig2_HTML.jpg)


    图 8-2.


    SpiDemoApplication 日志


    图 8-2 显示了日志。你应该会看到打印输出。请记住，消息仅包含标头和负载，这就是我们得到 `GenericMessage` 类的原因。最终消息是 `"Hello
    World"`，并且包含一些标头，其中包括 ID 和时间戳。


    #### 使用 XML


    接下来，让我们尝试使用 XML 实现相同的示例，并学习如何配置集成流。打开 `src/main/resources/META-INF/spring/integration/spi-context.xml`
    文件。参见代码清单 8-3。


    ```


    代码清单 8-3.

    src/main/resources/META-INF/spring/integration/spi-context.xml

    ```


    代码清单 8-3 展示了如何为 XML 配置集成流。我认为这非常直观。如果你使用的是 STS（Spring Tool Suite，Spring 工具套件）IDE，则可以使用其功能之一，例如用于
    Spring 集成流的拖放面板（Integration-Graph）。参见图 8-3。


    ![A337882_1_En_8_Fig3_HTML.jpg](img/A337882_1_En_8_Fig3_HTML.jpg)


    图 8-3.


    Spring Integration-Graph 面板


    图 8-3 显示了 Integration-Graph 面板，您可以通过从左侧部分拖放组件来以图形方式创建流程。如您所见，有通道、路由、转换、端点等。图 8-3
    实际上是 XML 的图形化翻译。换句话说，您可以先开始编写 XML，如果切换到 Integration-Graph，它会显示您到目前为止所做的工作。您也可以使用此功能切换到源代码，然后您将看到
    XML。这是一种非常酷的创建流程的方式，您不觉得吗？


    要运行此示例，您必须注释掉代码清单 8-1 中的 `@Configuration` 注解（或任何其他 `@Component` 注解文件）。然后，主应用程序（`SpiDemoApplication.java`）必须看起来像代码清单
    8-4 所示。


    ```

    @ImportResource({"META-INF/spring/integration/spi-context.xml"})

    @EnableIntegration

    @SpringBootApplication

    public class SpiDemoApplication {

    public static void main(String[] args) {

    new SpringApplicationBuilder(SpiDemoApplication.class)

    .web(false)

    .run(args);

    }

    @Bean

    CommandLineRunner process(MessageChannel input){

    return args -> {

    input.send(MessageBuilder.withPayload("World").build());

    };

    }

    }

    代码清单 8-4.

    com.apress.messaging.SpiDemoApplication.java

    ```


    代码清单 8-4 展示了新版本。发生了什么变化？我们只是添加了 `@ImportResource` 注解。这将告诉 Spring Boot 有一个需要处理的配置文件。如果你运行它（记得从
    `SpiSimpleConfiguration` 类中注释掉 `@Configuration`），它将在日志中打印 `"Hello World"`（由 `LoggingHandler`
    类完成）。参见图 8-4。


    ![A337882_1_En_8_Fig4_HTML.jpg](img/A337882_1_En_8_Fig4_HTML.jpg)


    图 8-4.


    显示 Hello World 的应用程序日志

