    ### 底层 WebSocket


    在深入探讨回退方案（SockJS）和子协议（STOMP）之前，我们先来看看如何将 Spring Boot 与底层 WebSocket 结合使用。


    在本书的源代码中，请进入第 7 章，并打开两个项目（你可以将它们导入到你喜欢的 IDE 中，或使用任何文本编辑器）。在接下来的部分中，我们将使用 `websocket-demo`
    项目。


    我们先从分析配置开始。为了使用底层 WebSocket 通信，我们需要实现 `org.springframework.web.socket.config.annotation.WebSocketConfigurer`
    接口。打开 `com.apress.messaging.config.LlWebSocketConfig` 类，如代码清单 7-1 所示。


    ```

    @Configuration

    @EnableWebSocket

    public class LlWebSocketConfig implements WebSocketConfigurer{

    LlWebSocketHandler handler;

    public LlWebSocketConfig(LlWebSocketHandler handler){

    this.handler = handler;

    }

    @Override

    public void registerWebSocketHandlers(

    WebSocketHandlerRegistry registry) {

    registry.addHandler(this.handler, "/llws");

    }

    }

    代码清单 7-1.

    com.apress.messaging.config.LlWebSocketConfig.java

    ```


    代码清单 7-1 展示了在 Spring 中启用 WebSocket 所需的配置。请记住，我们这样配置该类是为了实现底层 WebSocket 通信。让我们回顾一下所使用的组件：


    *   `@EnableWebSocket`：这是启用和配置 WebSocket 请求所必需的。

    *   `WebSocketConfigurer`：这是一个接口，定义了用于配置 WebSocket 请求处理的回调方法。通常你需要实现 `registerWebSocketHandlers`
    方法。

    *   `registerWebSocketHandlers`：需要通过添加用于处理 WebSocket 请求的处理器来实现此方法。在此方法中，我们注册了一个处理器（`LlWebSocketHandler`）实例，并传入了用于握手和通信的端点。

    *   `WebSocketHandlerRegistry`：这是一个用于注册 `WebSocketHandler` 实现的接口。我们将使用一个 `TextWebSocketHandler`
    实现，并在下一节中查看其代码。


    如你所见，使用 Spring 配置底层 WebSocket 非常简单。接下来，让我们打开 `com.apress.messaging.web.socket.LlWebSocketHandler`
    类。参见代码清单 7-2。


    ```

    @Component

    public class LlWebSocketHandler extends TextWebSocketHandler{

    @Override

    public void afterConnectionEstablished(

    WebSocketSession session) throws Exception {

    super.afterConnectionEstablished(session);

    }

    @Override

    protected void handleTextMessage(

    WebSocketSession session, TextMessage message)

    throws Exception {

    System.out.println(">>>> " + message);

    }

    }

    代码清单 7-2.

    com.apress.messaging.web.socket.LlWebSocketHandler.java

    ```


    代码清单 7-2 展示了我们将用于接收来自客户端消息的 WebSocket 处理器。让我们来检查这个类：


    *   `TextWebSocketHandler`：这是一个具体类，通过 `AbstractWebSocketHandler` 类实现了 `WebSocketHandler`
    接口。此实现仅用于处理文本消息。我们将重写两个方法：`afterConnectionEstablished` 和 `handleTextMessage`。

    *   `afterConnectionEstablished`：当客户端使用 WebSocket 协议成功连接时，会调用此方法。在此方法中，你可以使用 `WebSocketSession`
    实例来发送或接收消息。目前，我们将使用其默认行为，但我们会在日志中（通过 AOP `WebSocketsAudit` 类）看到更多信息。

    *   `handleTextMessage`：此方法接收一个 `WebSocketSession`（我们稍后会用到）和一个 `TextMessage` 实例。`TextMessage`
    实例管理字节流并将其转换为字符串。


    到目前为止，我们已经实现了服务器端，但客户端呢？通常，你会有一个网页来执行客户端的工作。


    打开 `src/main/resources/static/llws.html` 文件，如代码清单 7-3 所示。


    ```

    $(function(){

    var connection = new

    WebSocket(''ws://localhost:8080/llws'');

    connection.onopen = function () {

    console.log(''Connected...'');

    };

    connection.onmessage = function(event){

    console.log(''>>>>> '' + event.data);

    var json = JSON.parse(event.data);

    $("#output").append(""

    + json.user

    + ": "

    + json.message

    + "");

    };

    connection.onclose = function(event){

    $("#output").append("CONNECTION: CLOSED");

    };

    $("#send").click(function(){

    var message = {}

    message["user"] = $("#user").val();

    message["message"] = $("#message").val();

    connection.send(JSON.stringify(message));

    });

    });


    代码清单 7-3.

    llws.html 片段

    ```


    代码清单 7-3 仅展示了重要代码的 JavaScript 片段，我将在下面进行解释：


    *   `WebSocket`：这是 JavaScript 引擎的一部分，它将连接到指定的 URI。请注意，模式是 `ws`，并且我们使用的是在配置类中指定的
    `/llws` 端点（参见代码清单 7-1）。

    *   `onopen`：这是一个回调函数，在与服务器建立连接时执行。请注意，我们只是将一条字符串记录到控制台。

    *   `onmessage`：这是一个回调函数，在从服务器接收到消息时执行。在这种情况下，我们将 `event.data` 解析为一个 JSON 对象。

    *   `onclose`：这是一个回调函数，在与服务器的连接关闭或丢失时执行。

    *   `$.click`/`send`：这是一个附加到“发送”按钮的回调函数，在点击按钮时被调用。这里我们使用了 `send` 方法，它将发送消息对象的
    JSON 字符串。


