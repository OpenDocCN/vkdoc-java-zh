  trans: '

    ### 生产者


    让我们从一个简单的生产者开始。`ampq-demo` 项目包含了入门所需的一切。打开项目，从清单 5-1 所示的简单生产者开始。


    ```

    @Component

    public class Producer {

    private RabbitTemplate template;

    @Autowired

    public Producer(RabbitTemplate template){

    this.template = template;

    }

    public void sendMessage(String exchange,

    String routingKey, String message){

    this.template.convertAndSend(exchange,

    routingKey, message);

    }

    }

    清单 5-1.

    com.apress.messaging.amqp.Producer

    ```


    清单 5-1 展示了一个简单的 `amqp` 生产者。我们来分析一下代码中的重要部分：


    *   `@Component`：这是 Spring 框架的一个标记，它会将该类识别为 Spring Bean，以便在应用程序中使用。接下来你会在主应用程序中看到它的实际应用。

    *   `RabbitTemplate`：这是 Spring AMQP 模块的主要类之一，它提供了与 RabbitMQ 交互的许多功能，例如发送、接收以及执行
    RabbitMQ 中的管理任务。在本例中，它用于将消息转换并发送到代理。请记住，要与 RabbitMQ 交互，你必须打开一个连接并创建一个通道（从该连接中），然后将消息发送到交换机。这个设置过程将由
    `RabbitTemplate` 实例处理。

    *   `convertAndSend`：此方法会将消息转换为正确的类型（转换为字节数组），并将其发送到 `RabbitMQ` 代理。这个特定的方法有三个参数。第一个参数是交换机的名称（消息将通过通道发送到该交换机），第二个参数是路由键（将消息路由到正确队列的绑定规则），第三个参数是消息本身，在本例中只是一个字符串。


    如你所见，这是一个非常简单的生产者。值得一提的是，`RabbitTemplate` 类提供了多种重载方法，可以帮助你发送、监听、使用自定义转换器以及执行专门的任务（稍后你将了解更多相关内容）。


    接下来，让我们看看如何使用这个生产者。打开清单 5-2 中所示的 `AmqpDemoApplication.java` 类。


    ```

    @SpringBootApplication

    public class AmqpDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(AmqpDemoApplication.class, args);

    }

    @Bean

    CommandLineRunner simple(

    @Value("${apress.amqp.exchange:}")String exchange,

    @Value("${apress.amqp.queue}")String routingKey,

    Producer producer){

    return args -> {

    producer.sendMessage(

    exchange,

    routingKey, "HELLO AMQP!");

    };

    }

    }

    清单 5-2.

    com.apress.messaging.AmqpDemoApplication.java

    ```


    清单 5-2 展示了主 Spring Boot 应用程序。我们来回顾一下代码：


    *   `@Bean CommandLineRunner`：你已经熟悉这个注解和接口。它会在 Spring 容器初始化所有 Bean 并准备就绪后执行。

    *   `@Value("${apress.amqp.exchange:}")`：此注解会评估包含 `apress.amqp.exchange` 键的属性（通过
    `application.properties`、命令行参数或环境变量）。如果未找到，它将使用一个空字符串，即 `exchange` 后面的 `:`。

    *   `@Value("${apress.amqp.queue}")`：此注解会评估包含 `apress.amqp.queue` 键的属性（通过 `application.properties`、命令行参数或环境变量）。此键是必需的，因此你会在
    `src/resources/application.properties` 文件中找到它，其值为 `spring-boot-queue`。

    *   `Producer`：这是简单的生产者类（如清单 5-1 所示）。如你所见，我们使用 `sendMessage` 方法来发送交换机名称、路由键以及
    `"HELLO AMQP!"` 消息。


    在测试之前，你需要确保 RabbitMQ 代理已启动并正在运行。你还需要设置交换机、绑定和队列，不过这里你不需要这样做，因为 `amqp-demo` 项目已经为你配置好了。请查看清单
    5-3 中所示的 `AMQPConfig.java` 类。


    ```

    @Configuration

    @EnableConfigurationProperties(AMQPProperties.class)

    public class AMQPConfig {

    @Bean

    public Queue queue(

    @Value("${apress.amqp.queue}")String queueName){

    return new Queue(queueName,false);

    }

    }

    清单 5-3.

    com.apress.messaging.config.AMQPConfig.java

    ```


    清单 5-3 展示了 `AMQPConfig`，它定义了以下内容：


    *   `@EnableConfigurationProperties`：这将声明一个自定义属性，其前缀为 `apress.amqp.*`。这就是我们可以使用
    `apress.amqp.queue` 或 `apress.amqp.exchange` 键的原因。

    *   `@Bean Queue`：这是重要的部分，我们通过编程方式声明队列，在本例中，通过返回 `Queue` 类的新实例来创建队列。

    *   `@Value("${apress.amqp.queue}")`：此注解会评估在 `src/main/resources/application.properties`
    中定义的键 `apress.amqp.queue`，其值为 `spring-boot-queue`。


    我认为这个配置非常直接，但仔细想想，我们似乎缺少了 `Exchange` 声明以及将消息路由到队列的绑定。实际上，每次在 RabbitMQ 中创建队列时，它都会绑定到一个默认交换机（通常声明为空字符串），而路由键恰好就是队列的名称。如你所见，我们将队列的名称作为路由键传递给了生产者实例。


    现在你可以运行应用程序，并在 RabbitMQ 管理控制台中看到 `spring-boot-queue` 已被创建，并且有一条消息。输出如图 5-3 所示。


    ![A337882_1_En_5_Fig3_HTML.jpg](img/A337882_1_En_5_Fig3_HTML.jpg)


    图 5-3.


    生产者日志


    图 5-3 展示了日志。在 `amqp-demo` 项目中，你会找到 `com.apress.messaging.aop.AMQPAudit.java` 类。这是一个环绕通知，它会记录
    `Producer` 方法的调用。见图 5-4。


    ![A337882_1_En_5_Fig4_HTML.jpg](img/A337882_1_En_5_Fig4_HTML.jpg)


    图 5-4.


    RabbitMQ 管理控制台 (http://localhost:15672/#/queues): spring-boot-queue


    图 5-4 展示了 RabbitMQ 管理控制台，你可以看到队列已创建，并且消息已发送。


    你知道我们是如何连接到 RabbitMQ 代理的吗？如果我有一个远程服务器，需要指定连接位置，传递 IP 地址或用户名和密码，该怎么办？


    Spring Boot 会自动处理这个问题，因为 Spring Boot 是一个有主见的运行时，它会在类路径中找到 `spring-boot-starter-amqp`
    依赖项，并询问你是否已经有一个包含代理所有必要信息的 `ConnectionFactory`（用于连接 RabbitMQ）。如果没有，它将尝试使用默认设置并查找本地代理。


    如果你想指定一个远程代理，可以通过在 `src/main/resources/application.properties` 文件中提供 `spring.rabbitmq.*`
    属性来实现。这足以连接到远程 RabbitMQ。

    '
- fmt: '### Consumer


    Now, let’s talk about how we consume the message that we sent using the producer.
    Open the `Consumer.java` class shown in Listing [5-4](#A337882_1_En_5_Chapter.html#Par73).


    ```

    @Component

    public class Consumer implements MessageListener{

    public void onMessage(Message message) {

    }

    }

    Listing 5-4.

    com.apress.messaging.amqp.Consumer.java

    ```


    Listing [5-4](#A337882_1_En_5_Chapter.html#Par73) shows you the simplest consumer
    code. This is an asynchronous consumer that implements a `org.springframework.amqp.core.MessageListener`
    interface and the `onMessage` method. This method will receive the message as
    an `org.springframework.amqp.core.Message` instance. In order to use this consumer,
    you need to provide Spring Boot with some useful configuration settings. Open
    the `AMQPConfig` java class. See Listing [5-5](#A337882_1_En_5_Chapter.html#Par75).


    ```

    @Configuration

    @EnableConfigurationProperties(AMQPProperties.class)

    public class AMQPConfig {

    @Bean

    public Queue queue(

    @Value("${apress.amqp.queue}")String queueName){

    return new Queue(queueName,false);

    }

    @Bean

    public SimpleMessageListenerContainer

    container(ConnectionFactory connectionFactory,

    MessageListener consumer,

    @Value("${apress.amqp.queue}")String queueName) {

    SimpleMessageListenerContainer container = new

    SimpleMessageListenerContainer();

    container.setConnectionFactory(connectionFactory);

    container.setQueueNames(queueName);

    container.setMessageListener(consumer);

    return container;

    }

    }

    Listing 5-5.

    com.apress.messaging.config.AMQPConfig.java

    ```


    Listing [5-5](#A337882_1_En_5_Chapter.html#Par75) shows you the augmented `AMQPConfig`
    class (from listing [5-3](#A337882_1_En_5_Chapter.html#Par60)), where we have
    the following:


    - `SimpleMessageListenerContainer`: This class creates a message listener container
    that will listen to the queue for any messages. This class needs to be set up
    with a connection factory, a message listener handler, and the name of the queue(s).
    As you can see, this is a bean that we need to return to initiate the message
    listener container.

    - `ConnectionFactory`: This interface is mandatory for the `SimpleMessageListenerContainer`
    class, because it’s the one that knows about the RabbitMQ broker (host, username,
    password, vhost, etc.). It’s important to know that this connection factory is
    being wired up by Spring Boot, either by using the default settings (no configuration
    at all) or by specifying its properties in the `application.properties` file with
    the `spring.rabbitmq.*` properties. You can also declare your own `ConnectionFactory`
    as a bean (by declaring the `@Bean` in a method).

    - `MessageListener`: As you can see, this is one of the parameters of the method
    container (`consumer`), and Spring will register the `com.apress.messaging.amqp.Consumer`
    class as a handler. It’s then used when calling the `container.setMessageListener`
    method.


    Note that we are using the `queueName`, which is being wired up by Spring Boot
    by using the `apress.amqp.queue` property.


    That’s pretty much it. You now have a complete producer and consumer. You can
    run the program and see the logs shown in Figure [5-5](#A337882_1_En_5_Chapter.html#Fig5).


    ![A337882_1_En_5_Fig5_HTML.jpg](A337882_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    Consumer logs


    Figure [5-5](#A337882_1_En_5_Chapter.html#Fig5) shows you the logs of the consumer.
    Note that the method that’s called is `onMessage` and it’s represented by the
    `org.springframework.amqp.core.Message` instance.


    ### Consumer Using Annotations


    Wait a minute! I told you Spring Boot does this easier, right? In the current
    example, we needed to register our container and implement the `MessageListener`
    interface. The good thing is that the Spring AMQP provides a way to use annotations
    and, with the help of Spring Boot, everything is configured the right way.


    Go to your `AMQPConfig` class and remove the container method. It should look
    like Listing [5-3](#A337882_1_En_5_Chapter.html#Par60). Open the `com.apress.messaging.amqp.AnnotatedConsumer`
    class; it should look like Listing [5-6](#A337882_1_En_5_Chapter.html#Par85).


    ```

    @Component

    public class AnnotatedConsumer {

    @RabbitListener(queues="${apress.amqp.queue}")

    public void process(String message){

    }

    }

    Listing 5-6.

    com.apress.messaging.amqp.AnnotatedConsumer.java

    ```


    Listing [5-6](#A337882_1_En_5_Chapter.html#Par85) shows you how to create a consumer
    without creating a container, simply by adding the `@RabbitListener` annotation.
    Spring AMQP will create the container for you, and it will wire everything up
    with Spring Boot’s help. As you can see, it uses `queues` as the parameter and
    it’s using the `apress.amqp.queue` property. See also that the method receives
    a `String` (and not a `Message` object). You can use your own object, which would
