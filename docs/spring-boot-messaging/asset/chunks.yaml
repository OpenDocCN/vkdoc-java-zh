- fmt: "## Restful API with Spring Boot\n\nOne of the important features of Spring\
    \ Boot is that you can create executable JARs and run them by just executing `java\
    \ -jar yourapp.jar`. You can also create executable WARs (web archive) that can\
    \ run standalone (using the embedded container within the WAR) or deploy them\
    \ to a servlet container without changing anything in your code.\n\nThis section\
    \ shows you a Restful API that lists the currency and the rates based on the country\
    \ code. This project is a Spring Boot web application.\n\n**Note**\n\nYou can\
    \ find a download link for all the source code at the [`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257).\n\
    \nI'll show you some code snippets of the application, so you have an idea of\
    \ what Spring Boot can do with very minimal code and no configuration files.\n\
    \nI'm assuming that you already have the code. I suggest that you use the STS\
    \ (Spring Tool Suite), which you can get from [`https://spring.io/tools/sts/all`](https://spring.io/tools/sts/all).\
    \ I use this IDE because it has very nice features for running Spring Boot, and\
    \ all the figures that you see are based on this IDE, but you can choose any IDE\
    \ you like.\n\n### The `rest-api-demo` Project\n\nThis project is a Spring Boot\
    \ web application that will expose Restful endpoints that will show a country\
    \ currency and the rates of other countries. This project is in the folder named\
    \ `ch02`.\n\nThis project also uses the JPA (Java Persistence API) with an in-memory\
    \ database (using the H2 engine), AOP (Aspect-Oriented Programming). The exposed\
    \ endpoints are listed in Table 2-1.\n\n**Table 2-1.** Restful Endpoints\n\n|\
    \ Method | Path | Description |\n| --- | --- | --- |\n| `GET` | `/currency/latest[?base=<code>]`\
    \ | Shows the latest rates in JSON format. USD is the default base. |\n| `GET`\
    \ | `/currency/{date}[?base=<code>]` | Shows the rates based on the date: yyyy-MM-dd\
    \ in JSON format. |\n| `GET` | `/currency/{amount}/{base}/to/{code}` | Shows a\
    \ conversion based on the amount, base, and code. |\n| `POST` | `/currency/new`\
    \ | Adds new rates by date. The body should be in JSON format. |\n\nListing 2-1\
    \ shows an example of the JSON response. You can use a `base` parameter for some\
    \ of the endpoints as well.\n\n```\n{\n\"base\": \"USD\",\n\"date\": \"2016-09-22\"\
    ,\n\"rates\": [\n{\n\"code\": \"EUR\",\n\"rate\": 0.88857\n},\n{\n\"code\": \"\
    JPY\",\n\"rate\": 102.17\n},\n{\n\"code\": \"MXN\",\n\"rate\": 19.232\n},\n{\n\
    \"code\": \"GBP\",\n\"rate\": 0.75705\n}\n]\n}\n```\n\n**Listing 2-1.** JSON Currency\
    \ Response - `/currency/latest`\n\nListing 2-1 shows you the result response by\
    \ accessing the `/currency/latest` endpoint. It shows the base currency, in this\
    \ case the U.S. Dollar, and all the rates (currency) that you can get from the\
    \ other countries with 1 USD.\n\nFor a conversion, you request the endpoint `/currency/{amount}/{base}/to/{code}`.\
    \ Imagine you want to know how many Japanese Yens are equal to 10 USD. The request\
    \ can be done like this: `/currency/10/usd/to/jpy`. You should get the result\
    \ shown in Listing 2-2.\n\n```\n{\n\"base\": \"USD\",\n\"code\": \"JPY\",\n\"\
    amount\": 10.0,\n\"total\": 1021.69995\n}\n```\n\n**Listing 2-2.** Conversion\
    \ Response - `/currency/10/usd/to/jpy`\n\nListing 2-2 shows you the result of\
    \ the conversion endpoint. Let's review the other files.\n\n#### The `pom.xml`\
    \ File\n\nOpen the `pom.xml` file and review its contents. Let's review the tags\
    \ and their meanings:\n\n*   The `<packaging/>` tag has the WAR value. When packaging\
    \ this application, it will generate a WAR that will be executable and deployable\
    \ to any servlet container.\n\n    ```\n    war\n    ```\n\n*   The `<parent/>`\
    \ tag is the key for Spring Boot to work, because it has all the dependencies\
    \ and versions that you need in your application. It is based on Maven's BOM (Bill\
    \ of Materials) feature. So, it is important that this particular tag always be\
    \ in your Spring Boot application.\n\n    ```\n    org.springframework.boot\n\
    \    spring-boot-starter-parent\n    1.4.0.RELEASE\n    ```\n\n*   The `<dependencies/>`\
    \ tag holds all the dependencies in the Spring Boot application. When you choose\
    \ the web dependency (using the command line or the Spring starter), the `spring-boot-web-starter`\
    \ dependency is added to this `pom`. This is similar to when you selected the\
    \ project as a WAR type, whereby the `spring-boot-starter-tomcat` dependency was\
    \ added. By default, you always have the `spring-boot-starter-test` dependency.\n\
    \n    ```\n    org.springframework.boot\n    spring-boot-starter-web\n\n    org.springframework.boot\n\
    \    spring-boot-starter-tomcat\n    provided\n\n    org.springframework.boot\n\
    \    spring-boot-starter-data-jpa\n\n    com.h2database\n    h2\n    runtime\n\
    \n    org.springframework.boot\n    spring-boot-starter-aop\n\n    org.springframework.boot\n\
    \    spring-boot-starter-test\n    test\n    ```\n\nLet's take a moment to look\
    \ at the `<dependencies/>` tag. If you are familiar with the Maven way to create\
    \ a project, you will figure this out by now, that there is a missing tag in the\
    \ `<dependency/>` tag. That's right, the `<version/>` tag is missing. This version\
    \ is not used any more because the `<parent/>` tag definition includes all the\
    \ versions and dependencies that you will use in your web application.\n\nNotice\
    \ that `spring-boot-starter-tomcat` has the scope as provided, which means you\
    \ can create a runnable WAR (that you can run using `java -jar <war-name>.war`)\
    \ and deploy it to any servlet container.\n\nNotice the naming convention that\
    \ you use to create Spring Boot apps—every `<groupId/>` tag is `org.springframework.boot`\
    \ and the `<artifactId/>` tag is `spring-boot-starter-<technology>`.\n\nWhy is\
    \ this important? Remember that Spring Boot is an opinionated technology, so based\
    \ on this `pom` and the `spring-boot-starter`, it will recognize which application\
    \ you are trying to run.\n\n#### The `Rate.java` Class\n\nThis will be the domain\
    \ class. It includes an annotation that defines it as an entity. This is because\
    \ this class will be persisted into the H2 engine (in-memory database). See Listing\
    \ 2-3.\n\n```\n@Entity\npublic class Rate {\n@Id\nprivate String code;\nprivate\
    \ Float rate;\n@JsonIgnore\n@Temporal(TemporalType.DATE)\nprivate Date date;\n\
    // Setters and Getters omitted.\n}\n```\n\n**Listing 2-3.** `src/main/java/com/apress/messaging/domain/Rate.java`\n\
    \nListing 2-3 shows you the domain class—here the `@Entity` and `@Id` annotations\
    \ are being used—and this is related to the JPA technology (Spring Data JPA).\
    \ As you can see, it's very basic. Nothing too complicated."
