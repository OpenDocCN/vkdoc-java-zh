    Congratulations! You created a data-driven microservices solution with Spring
    Cloud Stream. Imagine what you can do with this technology.


    Before we continue, did you realize that we are missing an optional feature—a
    dynamic routing? Don’t worry, you will create it in the currency project!


    ## Spring Cloud Stream App Starters


    What about if I tell you that we could avoid creating the previous example and
    just use the Spring Cloud Stream app starters?


    The Spring Cloud Stream provides out-of-the-box applications starters that run.
    The Spring Cloud team already implemented around 52 applications that you can
    just download, configure, and execute. These application starters are divided
    by source, processor, and sink model:


    *   Source: file, ftp, gemfire, gemfire-cq, http, jdbc, jms, load-generator, loggregator,
    mail, mongodb, rabbit, s3, sftp, syslog, tcp, tcp-client, time, trigger, triggertask,
    and twitterstream

    *   Processor: bridge, filter, groovy-filter, groovy-transform, httpclient, pmml,
    scriptable-transform, splitter, tcp-client, and transform

    *   Sink : aggregate-counter, cassandra, counter, field-value-counter, file, ftp,
    gemfire, gpfdist, hdfs, hdfs-dataset, jdbc, log, rabbit, redis-pubsub, router,
    s3, sftp, task-launcher-local, task-launcher-yarn, tcp, throughput, and websocket


    So, let’s create an example using the `source:http` and the `sink:log`. I added
    the necessary JARs in this chapter in the folder `ch09/app-starters`. You will
    find a subfolder for each JAR and a `start.sh` script.


    ### source:http


    Open a terminal and execute the `start.sh` script from the `http` subfolder. Or
    you can execute the following command:


    ```

    java -jar http-source-rabbit-1.1.2.RELEASE.jar --spring.cloud.stream.bindings.output.destination=simple-demo

    ```


    Note that we are passing some arguments about the destination. Of course, you
    can create an `application.properties` file and put it into the same directory
    with this property. The `source:http` JAR will run in the `8080` port.


    ### sink:log


    Open a new terminal and execute the `start.sh` script from the `log` subfolder.
    Or you can execute the following command:


    ```

    java -jar log-sink-rabbit-1.1.1.RELEASE.jar --spring.cloud.stream.bindings.input.destination=simple-demo
    --server.port=8081

    ```


    Note that we are passing the same arguments as the `source:http`, but in this
    case for the `input` channel and it’s running in the `8081` port.


    Now you are ready to test. Use the `cURL` command to post a message (Windows users
    can use `POSTMAN(` [`https://www.getpostman.com/`](https://www.getpostman.com/)
    ). For example:


    ```

    $ curl -X POST -d "Hello Spring Cloud Starter Apps" localhost:8080

    ```


    The `sink:log` log prints out a byte array, right? Try this new command:


    ```

    $ curl -X POST -d "Hello Spring Cloud Starter Apps" localhost:8080 -H "Content-Type:
    text/plain"

    ```


    You should get the message `Hello Spring Cloud Starter Apps`. See Figure [9-21](#A337882_1_En_9_Chapter.html#Fig21).


    ![A337882_1_En_9_Fig21_HTML.jpg](A337882_1_En_9_Fig21_HTML.jpg)


    Figure 9-21.


    source:http | sink:log Note


    You can get the latest release of the app starters at [`http://repo.spring.io/libs-release/org/springframework/cloud/stream/app/`](http://repo.spring.io/libs-release/org/springframework/cloud/stream/app/)
    .


    If you want to use the other Spring Cloud Stream Application Starters and see
    their configurations, you can take a look at [`http://docs.spring.io/spring-cloud-stream-app-starters/docs/Avogadro.SR1/reference/html/`](http://docs.spring.io/spring-cloud-stream-app-starters/docs/Avogadro.SR1/reference/html/)
    for reference.


    ## Currency Project


    For the currency project, imagine you will get several rates from a source and,
    based on the rate’s code, you need to send this rate to the right consumer. In
    other words, if you send a rate from JPY, it will choose the destination JPY to
    send it. This is similar to the dynamic routing that you want to have for the
    microservices example.


    Take a look in the `rest-api-cloud-stream` project, the `com.apress.messaging.cloud.stream.RateProcessor`
    class for a dynamic routing. Also look at the `com.apress.messaging.RestApiCloudStreamApplication`
    class (the main class), as it has a new way to send messages using the Source
    stream.'
