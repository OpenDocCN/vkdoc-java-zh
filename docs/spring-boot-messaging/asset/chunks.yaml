    \    @Payload Item item) {\n    //Some Process here...\n    return \"{\\\"message\\\
    \": \\\"OK\\\"}\" ;\n    }\n    }\n    ```\n\n*   Retries : Sometimes you will\
    \ get an error, either by processing the message or by the broker, and you will\
    \ need to retry at the consumer level. You need to use this feature for that scenario:\n\
    \n    ```\n    // Retry for the consumer,\n    // normally this needs to be set\
    \ in the container:\n    // container.setAdviceChain(new Advice[] { interceptor()\
    \ });\n    //\n    @Bean\n    public StatefulRetryOperationsInterceptor interceptor()\
    \ {\n    return RetryInterceptorBuilder.stateful()\n    .maxAttempts(3)\n    .backOffOptions(1000,\
    \ 2.0, 10000)\n    .build();\n    }\n    ```\n\n*   Or this:\n\n    ```\n    @Bean\n\
    \    RetryOperationsInterceptor interceptor(\n    RabbitTemplate template,\n \
    \   @Value(\"${apress.amqp.error-exchange:}\")String errorExchange,\n    @Value(\"\
    ${apress.amqp.error-routing-key}\")String\n    errorExchangeRoutingKey) {\n  \
    \  return RetryInterceptorBuilder.stateless()\n    .maxAttempts(3)\n    .recoverer(\n\
    \    new RepublishMessageRecoverer(template, errorExchange,\n    errorExchangeRoutingKey))\n\
    \    .build();\n    }\n    ```\n\nThere are more. Take a look at the Spring AMQP\
    \ project reference to learn more about these awesome features ."
  trans: "\n### 回复管理\n\n使用 Spring AMQP 的一个很酷的地方在于它拥有一些非常棒的特性。例如，你可以使用交换器和路由键创建一个实际的回复（reply-to）场景。换句话说，你发送一条消息而不等待响应（有点像即发即弃），然后回复到一个特定的交换器/队列，该队列将会有另一个流程。\n\
    \nSpring AMQP 包含了 `@SendTo` 注解，通过它你可以将回复发送到一个交换器或一个队列。打开清单 5-11 中所示的 `com.apress.messaging.amqp.ReplyToService`\
    \ 类。\n\n```\n@Component\npublic class ReplyToService {\n@RabbitListener(queues=\"\
    ${apress.amqp.queue}\")\n@SendTo(\"${apress.amqp.reply-exchange-queue}\")\npublic\
    \ Message replyToProcess(String message){\n//更多处理逻辑在此...\nreturn MessageBuilder\n\
    .withPayload(\"PROCESSED:OK\")\n.setHeader(\"PROCESSED\", new\nSimpleDateFormat(\"\
    yyyy-MM-dd\")\n.format(new Date()))\n.setHeader(\"CODE\", UUID.randomUUID().toString())\n\
    .build();\n}\n}\n清单 5-11.\ncom.apress.messaging.amqp.ReplyToService.java\n```\n\
    \n清单 5-11 展示了 `@SendTo` 注解。如你所见，`replyToProcess` 方法也使用了 `@RabbitListener` 注解。这意味着它将监听一个队列（由\
    \ `apress.amqp.queue` 属性值提供）。这里的关键部分是，它将返回一条消息，该消息会通过 `@SendTo` 注解作为回复机制，被发送到由\
    \ `apress.amqp.reply-exchange-queue` 属性值提供的交换器/路由键。\n\n你可以使用 `Producer` 类来发送消息（参见清单\
    \ 5-2），但在运行此示例之前，你需要使用 RabbitMQ Web 控制台执行以下操作：\n\n*   创建一个名为 `my-exchange` 的直连交换器\n\
    *   创建一个队列（使用你想要的任何名称）\n*   使用 `my-reply-rk` 路由键将 `my-exchange` 绑定到你刚刚创建的队列\n\n\
    当然，你也可以通过编程方式创建这些（也许作为家庭作业？）。\n\n现在你可以开始试验了。运行该示例，你应该会在你创建的队列中看到一条消息。如你所见，你有另一种方式来实现回复并创建另一个流程。\n\
    \n### 流量控制\n\n流量控制是 RabbitMQ 的最佳特性之一。它会降低那些发送消息但消费速度不够快的发布者的连接速度。\n\nRabbitMQ\
    \ 通常会降低速度，有时甚至会阻塞连接，以防止它们造成洪泛。了解这个特性是件好事，因为你可以用它来确定你的瓶颈在哪里。要么增加队列的并发消费者数量，要么审查消费者的代码以确定处理消息耗时过长的原因。\n\
    \n那么，找到这些瓶颈有多容易呢？一种方法是监控你的 RabbitMQ 控制台，查看是否触发了流量控制机制。你可以通过检查“连接”或“通道”选项卡的状态来确定这一点，它们通常会显示为黄色并提示“流量控制”。然而，还有一种更简单的方法。RabbitMQ\
    \ 会发送事件，允许你对流量控制做出反应并完成关闭。\n\n#### 阻塞/解除阻塞事件\n\nSpring AMQP 提供了一种机制来附加 `Block`、`Unblock`\
    \ 和 `Shutdown` 事件。你可以在 `com.apress.messaging.config.AMQConfig` 类中找到相关代码。\n\n如果你想监听\
    \ `Block` 或 `Unblock` 事件，只需将以下代码（`BlockedListener` 事件）添加到你的配置中：\n\n```\n@Bean\n\
    public RabbitTemplate rabbitTemplate(ConnectionFactory\nconnectionFactory){\n\
    RabbitTemplate template = new\nRabbitTemplate(connectionFactory);\ntemplate.execute(new\
    \ ChannelCallback() {\npublic Object\ndoInRabbit(Channel channel) throws Exception\
    \ {\nchannel.getConnection().addBlockedListener(\nnew BlockedListener() {\npublic\
    \ void handleUnblocked()\nthrows IOException{\n// 恢复业务逻辑\n}\npublic void handleBlocked(String\
    \ reason)\nthrows IOException {\n// FlowControl -> 处理阻塞的逻辑\n}\n});\nreturn null;\n\
    }\n});\nreturn template;\n}\n```\n\n如果你只想监听故障或 RabbitMQ 关闭事件，可以使用以下代码（`ShutdownListener`\
    \ 事件）：\n\n```\n@Bean\npublic RabbitTemplate rabbitTemplate(\nConnectionFactory\
    \ connectionFactory){\nRabbitTemplate template = new\nRabbitTemplate(connectionFactory);\n\
    template.execute(new ChannelCallback() {\npublic Object doInRabbit(Channel channel)\n\
    throws Exception {\nchannel.getConnection()\n.addShutdownListener(new ShutdownListener()\
    \ {\npublic void shutdownCompleted(\nShutdownSignalException cause) {\n// 处理关闭事件\n\
    }\n});\nreturn null;\n}\n});\nreturn template ;\n}\n```\n\n你可以只使用一个 `RabbitTemplate`，并将\
    \ `BlockedListener` 和 `ShutdownListener` 添加到同一段代码中。\n\n## 更多特性\n\nSpring AMQP\
    \ 模块提供了许多特性，要逐一解释每个特性可能需要一整本书。本节我将指出其中一些：\n\n*   **事务**：Spring AMQP 允许你在代码中使用\
    \ `@Transactional` 注解，因此添加此注解后，Spring AMQP 模块会将通道设置为事务模式。然后它可以根据情况执行提交或回滚。你还可以通过定义一个\
    \ Bean 来指定要使用的事务管理器：\n\n    ```\n    @Transactional\n    public void processInvoice()\
    \ {\n    String incoming = rabbitTemplate.receiveAndConvert();\n    // 执行更多数据库处理...\n\
    \    String reply = reviewInvoice(incoming);\n    rabbitTemplate.convertAndSend(reply);\n\
    \    }\n    ```\n\n*   **多监听器**：Spring AMQP 1.5.0 及以上版本增加了一种新方式，允许一个类根据消息类型（如果需要）处理多个监听器。查看\
    \ `MultiListenerService` 代码。如果需要，你可以为方法添加 `@Payload`、`@Header` 和 `@Headers` 注解。\n\
    \n    ```\n    @Component\n    @RabbitListener(id=\"multi\", queues = \"${apress.amqp.queue}\"\
    )\n    public class MultiListenerService {\n    @RabbitHandler\n    @SendTo(\"\
    ${apress.amqp.reply-exchange-queue}\")\n    public Order processInvoice(Invoice\
    \ invoice) {\n    Order order = new Order();\n    //在此处理发票...\n    order.setInvoice(invoice);\n\
    \    return order;\n    }\n    @RabbitHandler\n    public Order processInvoiceWithTax(\n\
    \    InvoiceWithTax invoiceWithTax) {\n    Order order = new Order();\n    //在此处理含税发票...\n\
    \    return order;\n    }\n    @RabbitHandler\n    public String itemProcess(\n\
    \    @Header(\"amqp_receivedRoutingKey\") String routingKey,\n    @Payload Item\
    \ item) {\n    //在此进行一些处理...\n    return \"{\\\"message\\\": \\\"OK\\\"}\" ;\n\
    \    }\n    }\n    ```\n\n*   **重试**：有时你会遇到错误，无论是处理消息时还是代理端出错，你都需要在消费者级别进行重试。针对这种场景，你需要使用此特性：\n\
    \n    ```\n    // 消费者的重试，\n    // 通常这需要在容器中设置：\n    // container.setAdviceChain(new\
    \ Advice[] { interceptor() });\n    //\n    @Bean\n    public StatefulRetryOperationsInterceptor\
    \ interceptor() {\n    return RetryInterceptorBuilder.stateful()\n    .maxAttempts(3)\n\
    \    .backOffOptions(1000, 2.0, 10000)\n    .build();\n    }\n    ```\n\n*   或者这样：\n\
    \n    ```\n    @Bean\n    RetryOperationsInterceptor interceptor(\n    RabbitTemplate\
    \ template,\n    @Value(\"${apress.amqp.error-exchange:}\")String errorExchange,\n\
    \    @Value(\"${apress.amqp.error-routing-key}\")String\n    errorExchangeRoutingKey)\
    \ {\n    return RetryInterceptorBuilder.stateless()\n    .maxAttempts(3)\n   \
    \ .recoverer(\n    new RepublishMessageRecoverer(template, errorExchange,\n  \
    \  errorExchangeRoutingKey))\n    .build();\n    }\n    ```\n\n还有更多特性。请查阅 Spring\
    \ AMQP 项目参考文档，以了解更多关于这些出色特性的信息。\n"
- fmt: '# Currency Project


    You can continue with the currency project and add the necessary logic to provide
    a way to consume messages about the different market currency rates. You can review
    all the code; it’s ready to go.


    Use the demo to send the rate messages (the demo has all necessary code at [`http://projects.spring.io/spring-amqp/`](http://projects.spring.io/spring-amqp/)
    ).


    # Summary


    This chapter discussed the AMQP model and explained the difference between exchanges,
    bindings, and queues. It reviewed some simple examples that illustrated the way
    to create producers and consumers.


    You saw some amazing features of the Spring AMQP module and how Spring Boot helps
    you with the configuration.


    One of the benefits of using Spring messaging is that every Spring technology
    uses the same concept. The way we send messages (producers); the use of the template
    pattern (`JmsTemplate`, `RabbitTemplate`, etc.); the way we create the listeners
    (consumers) using interfaces (by implementing a `MessageListener`) or annotations
    (like `@JmsListener`, `@RabbitListener`, `@SendTo`, and very soon you will see
    the `@StreamListener`); the way to access the message structure directly with
    annotations (like `@Payload`, `@Header`, etc.)—they are all similar in construction.


    Remember that this is just a tiny bit of what you can do with Spring AMQP, and
    I would need to write an entire book on Spring AMQP to show you every single feature.
    You now have the minimum knowledge needed to create awesome AMQP apps.


    The next chapter covers publisher/subscriber messaging, but this time using Redis
    as the main messaging engine.


    # 6. Messaging with Redis


    This chapter shows you how to use Redis (REmote DIctionary Server) as a message
    broker with Spring Boot. Redis is an in-memory data structure store that is used
    as a database, cache, and message broker. It not only stores key-value pairs,
    but also can be used to store complex data types such as hashes, lists, sets,
    sorted sets, bitmaps, hyperlogs, and geospatial indexes.


    Spring Boot uses the Spring Data module and in particular the Redis one. In other
    words, in order to use Redis in your project, you must add the `spring-boot-starter-redis`
    dependency to your `pom.xml` file or to Gradle. You will then have all the necessary
    dependencies to connect to a Redis server.


    ## Redis as a Message Broker


    Redis not only provides a way to store data structures, but also implements the
    publish/subscribe messaging paradigm. Previous chapters explained this paradigm
    with JMS.


    The important part here shows you how to interact with Redis and enable the message
    broker. Redis has the knowledge of a channel, where a message will be sent by
    the publisher. It will be consumed by subscribers that are interested in one or
    more of the channels. As you can see, the `channel` keyword is used in Redis.
    The channels in Redis are the topics in the JMS world.


    Redis has several commands that allow you to interact with the publish/subscribe
    feature:


    * `SUBSCRIBE`: Tells Redis to subscribe to a particular channel or channels. For
    example:


    ```

    127.0.0.1:6379> SUBSCRIBE spring-boot-chat

    ```


    You can subscribe to multiple channels at once by listing them separated by spaces.


    * `UNSUBSCRIBE`: Unsubscribes from a channel. This command doesn’t require a parameter.

    * `PUBLISH`: Publishes a message by specifying the channels (as first parameter)
    and the actual message. For example:


    ```

    127.0.0.1:6379> PUBLISH spring-boot-chat "Hi there"

    ```


    * `PSUBSCRIBE`: This command is the same as `SUBSCRIBE`, but accepts a pattern
    for multiple channels. For example:


    ```

    127.0.0.1:6379> PSUBSCRIBE currency .*

    ```


    This example will subscribe to any channel that starts with `currency`, such as
    `currency.us`, `currency.asia.jp`, `currency.eu.gb`, and so on.


    * `PUNSUBSCRIBE`: Unsubscribes using pattern matching. For example:


    ```

    127.0.0.1:6379> PUNSUBSCRIBE currency.asia.*

    ```


    * `PING`: Returns a `PONG` if no argument is provided. Normally you use this to
    test if the connections are still alive.


    Just to give it a try, make sure you have Redis installed and it’s up and running.
    (You can download it from [`https://redis.io/download`](https://redis.io/download)
    .) Open a new terminal window and use the `redis-cli` command to interact with
    Redis. See Figure [6-1](#A337882_1_En_6_Chapter.html#Fig1).


    ![A337882_1_En_6_Fig1_HTML.jpg](A337882_1_En_6_Fig1_HTML.jpg)


    Figure 6-1. Redis interaction with the publish/subscribe commands


    Figure [6-1](#A337882_1_En_6_Chapter.html#Fig1) shows you a simple way to interact
    with Redis and determine how easy it is to subscribe and publish a message.


    This chapter does not talk about Redis clustering or about sentinels, sharding,
    and so forth. It covers messaging. Many customers use Redis extensively as a messaging
    broker and as a web session management tool for real-time data analysis. The chapter
    starts by using Spring Boot and Redis for messaging.


    ## Publish/Subscribe Messaging with Redis


    As mentioned, Spring Boot will use the power of Spring Data Redis, which is very
    similar to the Spring JMS, which you are familiar with. Spring Boot will configure
    the necessary components, such as the connection, the database to use (the 0 index
    DB by default), cluster nodes if any, the pool, the sentinel, the timeouts, etc.
    Remember simply adding `spring-boot-starter-redis` enables the Redis auto-configuration.


    The Spring Data Redis module has two main areas for messaging—the production or
    publication and the consumption or subscription of messages. For message publication,
    it uses the `RedisTemplate<K,V>` class (it uses the template design pattern) and
    for subscription, it has a dedicated asynchronous message listener container (an
    MDP—message-driven pojo). For synchronous messages, it uses a `RedisConnection`
    interface contract. The following sections cover only the asynchronous subscription.


    In this chapter, we are going to work with two projects: `redis-demo` and `rest-api-redis`.
    The `redis-demo` project has all the necessary code to complete and complement
    the currency project.'
