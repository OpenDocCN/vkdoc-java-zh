    \ group (this is similar to the Kafka consumer groups feature), where you can\
    \ have multiple consumers in a group for a load-balancing scenario. This makes\
    \ the scale needs very easy to set up.\n*   Partitioning support : Spring Cloud\
    \ Stream support data partition, which allows multiple producers to send data\
    \ to multiple consumers and ensure that common data is processed by the same consumer\
    \ instances. This is a benefit for performance and consistency of data.\n*   Binder\
    \ API : Spring Cloud Stream provides an API interface. It’s actually a binder\
    \ SPI (Service Provider Interface ) where you can extend the core by modifying\
    \ the original code, so it’s easy to implement a specific binder, such as JMS,\
    \ WebSockets, etc.\n\nThis section covers about the programming model and the\
    \ binders. If you want to know more about the other concepts, you can take a look\
    \ at the Spring Cloud Stream reference. The idea is just to show you how to start\
    \ creating event-driven microservices with Spring Cloud Stream. To show you what\
    \ we are going to cover, take a look at Figure [9-1](#A337882_1_En_9_Chapter.html#Fig1).\n\
    \n![A337882_1_En_9_Fig1_HTML.gif](A337882_1_En_9_Fig1_HTML.gif)\n\nFigure 9-1.\n\
    \nSpring Cloud Stream application\n\n## Spring Cloud Stream Programming\n\nFollowing\
    \ Figure [9-1](#A337882_1_En_9_Chapter.html#Fig1), consider what would you need\
    \ to create a Spring Cloud Stream app:\n\n*   `<dependencyManagement/>`: You need\
    \ to add this tag with the latest Spring Cloud library dependencies.\n*   Binder:\
    \ You need to choose what kind of a binder you will need:\n    *   Kafka: If you\
    \ choose Kafka as your binder, you need to add the following dependency:\n\n```\n\
    \        org.springframework.cloud\n        spring-cloud-starter-stream-kafka\n\
    \n```\n\n*   RabbitMQ : If you choose RabbitMQ as your binder, you need to add\
    \ the following dependency:\n\n```\n        org.springframework.cloud\n      \
    \  spring-cloud-starter-stream-rabbit\n\n```\n\nYou must also have Kafka or RabbitMQ\
    \ up and running. You can even use both at the same time. You can configure them\
    \ in the `application.properties` or `application.yml` files.\n*   `@EnableBinding`\
    \ : This is a Spring Boot application, so just by adding `@EnableBinding` you\
    \ can convert the app into a Spring Cloud Stream.\n\nThe following sections show\
    \ you how to send and receive messages from one application to another using RabbitMQ\
    \ as transport layer without knowing any specifics about the brokers API or how\
    \ to configure the producer or consumer messages.\n\nSpring Cloud Stream uses\
    \ channels (input/output) as a mechanism to send and receive messages. A Spring\
    \ Cloud Stream application can have any number of channels, and it defines two\
    \ annotations: `@Input` and `@Output`. These annotations help to identify consumers\
    \ from producers. Normally a `SubscribableChannel` class will be marked with `@Input`\
    \ annotation and a `MessageChannel` class will be marked with `@Output`. They\
    \ listen for incoming messages and send outgoing messages, respectively.\n\nThe\
    \ `SubscribableChannel` and `MessageChannel` interfaces should be well known to\
    \ you from the Spring Integration chapter. Remember that I told you that Spring\
    \ Cloud Stream is based on Spring Integration.\n\nIf you don’t want to deal directly\
    \ with these channels and annotations, Spring Cloud Stream simplifies this by\
    \ adding three interfaces that cover the most common messaging use cases: source,\
    \ processor, and sink. Behind the scenes, these interfaces have the right channels\
    \ (input/output) your application needs:\n\n*   Source : A source is used in an\
    \ application where you are ingesting data from an external system (by listening\
    \ into a queue, a REST call, file system, database query, etc.) and sending it\
    \ through an output channel. This is the actual interface from Spring Cloud Stream:\n\
    \n```\n    public interface Source {\n    String OUTPUT = \"output\";\n    @Output(Source.OUTPUT)\n\
    \    MessageChannel output();\n    }\n    ```\n\n*   Processor : You can use a\
    \ processor in an application when you want to start listening from the input\
    \ channel for new incoming messages, process the message received (enhancements,\
    \ transformations, etc.), and send a new message to the output channel. This is\
    \ the actual interface from Spring Cloud Stream:\n\n```\n    public interface\
    \ Processor extends Source, Sink {\n    }\n    ```\n\n*   Sink : You can use a\
    \ sink application when you want to start listening from the input channel for\
    \ new incoming messages, do some processing, and then end the flow (saving data,\
    \ firing a task, logging into the console, etc.). This is the actual interface\
    \ from Spring Cloud Stream:\n\n```\n    public interface Sink {\n    String INPUT\
    \ = \"input\";\n    @Input(Sink.INPUT)\n    SubscribableChannel input();\n   \
    \ }\n    ```\n\nFigures [9-2](#A337882_1_En_9_Chapter.html#Fig2) and [9-3](#A337882_1_En_9_Chapter.html#Fig3)\
    \ show the models we are going to start working on.\n\n![A337882_1_En_9_Fig3_HTML.gif](A337882_1_En_9_Fig3_HTML.gif)\n\
    \nFigure 9-3.\n\nSource to processor to sink model\n\n![A337882_1_En_9_Fig2_HTML.gif](A337882_1_En_9_Fig2_HTML.gif)\n\
    \nFigure 9-2.\n\nSource to sink model\n\nYou can get all the examples from the\
    \ book’s source code. This chapter includes several examples. Let’s get started\
    \ and see some code."
  trans: "\n## Spring Cloud Stream\n\n是时候来谈谈 Spring Cloud Stream 了。这是本章的重点，因为本书讨论的是消息传递，也因为\
    \ Spring Cloud Stream 是一个轻量级的消息驱动微服务框架。它基于 Spring Integration 和 Spring Boot（提供了一套便于配置的、固执己见的运行时），这意味着你可以轻松创建企业级的消息传递和集成解决方案应用。它提供了一个简单的声明式模型，用于使用\
    \ RabbitMQ 或 Apache Kafka 发送和接收消息。\n\n我认为 Spring Cloud Stream 最重要的特性之一，是通过创建开箱即用的绑定，实现了生产者和消费者之间的消息解耦。换句话说，你无需在应用程序中添加特定于代理的代码来生产或消费消息。你只需将所需的绑定（稍后我会解释）依赖项添加到应用程序中，Spring\
    \ Cloud Stream 就会处理消息的连接和通信。\n\n下一节将介绍 Spring Cloud Stream 的主要组件。\n\n### Spring\
    \ Cloud Stream 概念\n\n让我们来看看 Spring Cloud Stream 的主要组件：\n\n*   **应用模型**：应用模型只是一个与中间件无关的核心，这意味着应用程序将通过绑定器实现，使用输入和输出通道与外部代理（作为消息传输方式）进行通信。\n\
    *   **绑定器抽象**：Spring Cloud Stream 目前提供了 Kafka 和 RabbitMQ 的绑定器实现。这种抽象使得 Spring\
    \ Cloud Stream 应用能够连接到中间件。但是，这种抽象如何知道目标呢？它可以在运行时根据通道动态选择目标。通常，我们需要通过 `application.properties`\
    \ 文件中的 `spring.cloud.stream.bindings.[input|ouput].destination` 属性来提供这些信息。我将在查看示例时讨论这一点。\n\
    *   **持久化发布/订阅**：应用程序通信将通过众所周知的发布/订阅模型进行。如果使用 Kafka，它将遵循其自身的主题/订阅者模型；如果使用 RabbitMQ，它将创建一个主题交换器并为每个队列创建必要的绑定。该模型降低了生产者和消费者的复杂性。\n\
    *   **消费者组**：你会发现你的消费者在某些时候需要能够进行扩展。可扩展性可以通过使用消费者组的概念来实现（这类似于 Kafka 消费者组的功能），你可以在一个组中拥有多个消费者以实现负载均衡场景。这使得扩展需求非常容易设置。\n\
    *   **分区支持**：Spring Cloud Stream 支持数据分区，允许多个生产者向多个消费者发送数据，并确保公共数据由相同的消费者实例处理。这有利于提高数据的一致性和性能。\n\
    *   **绑定器 API**：Spring Cloud Stream 提供了一个 API 接口。它实际上是一个绑定器 SPI（服务提供者接口），你可以通过修改原始代码来扩展核心功能，因此很容易实现特定的绑定器，例如\
    \ JMS、WebSockets 等。\n\n本节涵盖了编程模型和绑定器。如果你想了解更多关于其他概念的信息，可以查看 Spring Cloud Stream\
    \ 参考文档。这里的目的只是向你展示如何开始使用 Spring Cloud Stream 创建事件驱动的微服务。为了向你展示我们将要涵盖的内容，请查看图 9-1。\n\
    \n![A337882_1_En_9_Fig1_HTML.gif](img/A337882_1_En_9_Fig1_HTML.gif)\n\n图 9-1.\n\
    \nSpring Cloud Stream 应用\n\n## Spring Cloud Stream 编程\n\n参照图 9-1，考虑一下创建一个 Spring\
    \ Cloud Stream 应用需要什么：\n\n*   `<dependencyManagement/>`：你需要添加此标签以及最新的 Spring Cloud\
    \ 库依赖项。\n*   **绑定器**：你需要选择需要哪种类型的绑定器：\n    *   **Kafka**：如果你选择 Kafka 作为绑定器，则需要添加以下依赖项：\n\
    \n```\n        org.springframework.cloud\n        spring-cloud-starter-stream-kafka\n\
    \n```\n\n*   **RabbitMQ**：如果你选择 RabbitMQ 作为绑定器，则需要添加以下依赖项：\n\n```\n        org.springframework.cloud\n\
    \        spring-cloud-starter-stream-rabbit\n\n```\n\n你还必须确保 Kafka 或 RabbitMQ\
    \ 已启动并正在运行。你甚至可以同时使用两者。你可以在 `application.properties` 或 `application.yml` 文件中配置它们。\n\
    *   `@EnableBinding`：这是一个 Spring Boot 应用，因此只需添加 `@EnableBinding` 即可将应用转换为 Spring\
    \ Cloud Stream。\n\n以下部分将向你展示如何使用 RabbitMQ 作为传输层，从一个应用程序向另一个应用程序发送和接收消息，而无需了解代理\
    \ API 的任何细节，也无需配置生产者或消费者消息。\n\nSpring Cloud Stream 使用通道（输入/输出）作为发送和接收消息的机制。一个\
    \ Spring Cloud Stream 应用可以有任意数量的通道，并定义了两个注解：`@Input` 和 `@Output`。这些注解有助于区分消费者和生产者。通常，`SubscribableChannel`\
    \ 类会使用 `@Input` 注解标记，而 `MessageChannel` 类会使用 `@Output` 注解标记。它们分别用于监听传入消息和发送传出消息。\n\
    \n`SubscribableChannel` 和 `MessageChannel` 接口应该从 Spring Integration 章节中就很熟悉了。还记得我告诉过你\
    \ Spring Cloud Stream 是基于 Spring Integration 的吗？\n\n如果你不想直接处理这些通道和注解，Spring Cloud\
    \ Stream 通过添加三个涵盖了最常见消息传递用例的接口来简化操作：Source、Processor 和 Sink。在幕后，这些接口拥有你的应用所需的正确通道（输入/输出）：\n\
    \n*   **Source**：Source 用于从外部系统（通过监听队列、REST 调用、文件系统、数据库查询等）摄取数据，并通过输出通道发送数据的应用程序。这是\
    \ Spring Cloud Stream 的实际接口：\n\n```\n    public interface Source {\n    String\
    \ OUTPUT = \"output\";\n    @Output(Source.OUTPUT)\n    MessageChannel output();\n\
    \    }\n    ```\n\n*   **Processor**：当你想要开始监听输入通道以获取新的传入消息，处理接收到的消息（增强、转换等），然后将新消息发送到输出通道时，可以在应用程序中使用\
    \ Processor。这是 Spring Cloud Stream 的实际接口：\n\n```\n    public interface Processor\
    \ extends Source, Sink {\n    }\n    ```\n\n*   **Sink**：当你想要开始监听输入通道以获取新的传入消息，进行一些处理，然后结束流程（保存数据、触发任务、记录到控制台等）时，可以使用\
    \ Sink 应用程序。这是 Spring Cloud Stream 的实际接口：\n\n```\n    public interface Sink {\n\
    \    String INPUT = \"input\";\n    @Input(Sink.INPUT)\n    SubscribableChannel\
    \ input();\n    }\n    ```\n\n图 9-2 和 9-3 展示了我们将要开始使用的模型。\n\n![A337882_1_En_9_Fig3_HTML.gif](img/A337882_1_En_9_Fig3_HTML.gif)\n\
    \n图 9-3.\n\nSource 到 Processor 到 Sink 模型\n\n![A337882_1_En_9_Fig2_HTML.gif](img/A337882_1_En_9_Fig2_HTML.gif)\n\
    \n图 9-2.\n\nSource 到 Sink 模型\n\n你可以从本书的源代码中获取所有示例。本章包含多个示例。让我们开始并看一些代码。\n"
- fmt: "### cloud-stream-demo\n\nThe purpose of this project is to show how to create\
    \ a source and send a message through its output channel, a processor, and how\
    \ to receive and send messages from the input and output channels, respectively.\
    \ You’ll also create a sink and learn how to receive messages from the input channel.\
    \ Practically, I’m showing what Figure [9-3](#A337882_1_En_9_Chapter.html#Fig3)\
    \ illustrates, but considering each Stream app one at a time.\n\nRight now the\
    \ communication between these application is manual, meaning that we need to do\
    \ some steps in between, and this is because I want you to learn how each of these\
    \ applications works. In the next section, you are going to see how the whole\
    \ flow works.\n\n#### Source\n\nWe are going to start by defining a source. Remember\
    \ that this component has an output channel. Open the `com.apress.messaging.cloud.stream.SimpleSource`\
    \ class. It should look like Listing [9-1](#A337882_1_En_9_Chapter.html#Par49).\n\
    \n```\n@EnableBinding(Source.class)\npublic class SimpleSource {\nprivate SimpleDateFormat\
    \ simpleDate =\nnew SimpleDateFormat(\"HH:mm:ss\");\n@Bean\n@InboundChannelAdapter(channel=Source.OUTPUT)\n\
    public MessageSource simpleText(){\nreturn () -> MessageBuilder\n.withPayload(\"\
    Hello at \" +\nsimpleDate.format(new Date()))\n.build();\n}\n}\nListing 9-1.\n\
    com.apress.messaging.cloud.stream.SimpleSource.java\n```\n\nListing [9-1](#A337882_1_En_9_Chapter.html#Par49)\
    \ shows you the simplest `Source` stream application you can have. Let’s take\
    \ a look:\n\n*   `@EnableBinding` : This annotation will enable this class as\
    \ a Spring Cloud Stream application, and it will enable the necessary configuration\
    \ for sending or receiving messages through the provided binder.\n*   `Source`:\
    \ This interface marks the Spring Cloud Stream app as a source stream. It will\
    \ create the necessary channels; in this case the output channel that will be\
    \ used to send messages to the provided binder.\n*   `@InboundChannelAdapter`\
    \ : This annotation is part of the Spring Integration framework. It simply polls\
    \ over the `simpleText` method every second. This means that a new message will\
    \ be sent every second. You can change the frequency and the number of messages\
    \ by adding a poller and modifying the default settings. For example:\n\n```\n\
    \    @InboundChannelAdapter(value = Source.OUTPUT, poller = @Poller(fixedDelay\
    \ = \"5000\", maxMessagesPerPoll = \"3\"))\n    ```\n\nThe important part of this\
    \ declaration is the channel, where in this case it’s pointing to `Source.OUTPUT`.\
    \ This means that it will use the output channel (`MessageChannel output()`).\n\
    *   `MessageSource` : This is an interface that sends a `Message<T>`, which is\
    \ a wrapper that has payload and headers.\n*   `MessageBuilder`: You are already\
    \ familiar with this class, which sends a `MessageSource` type. In this case,\
    \ we are sending `\"Hello at – Date\"` as a string message.\n\nBefore you run\
    \ the example, make sure you have RabbitMQ up and running. Next, run the example.\
    \ You might not see too much, but there is something going on behind the scenes.\
    \ Follow these steps:\n\n1.  Open RabbitMQ Web Management in a browser. Go to\
    \ `http://localhost:15672`. The username and password are `guest`. Go to the Exchanges\
    \ tab, as shown in Figure [9-4](#A337882_1_En_9_Chapter.html#Fig4).\n\n![A337882_1_En_9_Fig4_HTML.jpg](A337882_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4.\n\nThe Exchanges tab in RabbitMQ Note that an output (a topic exchange)\
    \ was created and the message rate is 1.0/s.  \n2.  Next, you’ll create a queue\
    \ so you can bind this exchange to it. Go to the Queues tab and create a new queue\
    \ named `my-queue`. See Figure [9-5](#A337882_1_En_9_Chapter.html#Fig5).\n\n![A337882_1_En_9_Fig5_HTML.jpg](A337882_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5.\n\nThe Queues tab of RabbitMQ  \n3.  Once the queue is created,\
    \ it appears in the list. Next, click the `my-queue` queue, go to the Bindings\
    \ section, and add the binding. See Figure [9-6](#A337882_1_En_9_Chapter.html#Fig6)\
    \ for the proper values.\n\n![A337882_1_En_9_Fig6_HTML.jpg](A337882_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6.\n\nThe Bindings tab of RabbitMQ Fill out the From Exchange field\
    \ with the value `output` (this is the name of the exchange) and the Routing Key\
    \ field with the value `#`. This will allow any message to get into the `my-queue`\
    \ queue.  \n4.  A few seconds after you bind the output exchange to the `my-queue`\
    \ queue, you will start seeing several messages. Open the Overview panel shown\
    \ in Figure [9-7](#A337882_1_En_9_Chapter.html#Fig7).\n\n![A337882_1_En_9_Fig7_HTML.jpg](A337882_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7.\n\nThe Overview tab of RabbitMQ  \n5.  Let’s review a message by\
    \ opening the Get Messages panel. You can get any number of messages and view\
    \ their contents. See Figure [9-8](#A337882_1_En_9_Chapter.html#Fig8).\n\n![A337882_1_En_9_Fig8_HTML.jpg](A337882_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8.\n\nGetting messages from RabbitMQ After you choose several messages,\
    \ take a look at the payload. You will have a message every second. Note also\
    \ that the message has properties, such as the headers with the `contentType`\
    \ `: text/plain` and the `delivery_mode: 2` (this means the messages are being\
    \ persisted). This is how Spring Cloud Stream and its binder connect to RabbitMQ\
    \ to publish messages."
