- fmt: "# Cloud Config Server\n\nTo use the Config Server, this is what you need to\
    \ do:\n\n1. In your `pom.xml` file, you need to use the following `<dependency/>`\
    \ and the `<dependencyManagement/>` tags:\n\n    ```\n    ...\n    org.springframework.cloud\n\
    \    spring-cloud-config-server\n    ...\n    org.springframework.cloud\n    spring-cloud-dependencies\n\
    \    Camden.SR6\n    pom\n    import\n    ```\n\n    At the time of this book\
    \ writing, the version was `Camden.SR6`. To keep updated, take a look at the main\
    \ web project found at [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/).\n\
    \n2. Add `@EnableConfigServer`:\n\n    ```\n    @SpringBootApplication\n    @EnableConfigServer\n\
    \    public class ConfigServerDemoApplication {\n        public static void main(String[]\
    \ args) {\n            SpringApplication.run(\n                ConfigServerDemoApplication.class,\
    \ args);\n        }\n    }\n    ```\n\n    `@EnableConfigServer` will create the\
    \ Config Server that will get the latest values from GitHub and process the request\
    \ from the clients.\n\n3. Add the `application.properties` (or `application.yml`)\
    \ file where the Git repository is located by providing the URI.\n\n    ```\n\
    \    # Default port\n    server.port=8888\n    # Spring Config Server\n    spring.cloud.config.server.git.uri=https://github.com//your-repo-app-config.git\n\
    \    ```\n\nThat’s it; you don’t need anything else. You can now run the Config\
    \ Server. You can take a look at the `config-server-demo` project.\n\n## Cloud\
    \ Config Client\n\nTo connect to the Cloud Config Server, you need to do the following:\n\
    \n1. Add the `<dependency/>` and the `<dependencyManagement/>` tags to your `pom.xml`\
    \ file:\n\n    ```\n    ...\n    org.springframework.cloud\n    spring-cloud-starter-config\n\
    \    ...\n    org.springframework.cloud\n    spring-cloud-dependencies\n    Camden.SR6\n\
    \    pom\n    import\n    ```\n\nThat’s it. You can now use any property like\
    \ you are used to doing, either using a regular `@Value(\"${hello-world-message}\"\
    )` or via `@ConfigurationProperties`. You can get a complete example in the `config-client-demo`\
    \ project.\n\nI think this is very straightforward solution. If you need more\
    \ in-depth references, visit the [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
    \ web site.\n\n# Service Registry\n\nThe Service Registry provides the implementation\
    \ of the Service Discovery pattern. This pattern is one of the most important\
    \ features of the microservice architecture. See Figure [11-3](#A337882_1_En_11_Chapter.html#Fig3).\n\
    \n![A337882_1_En_11_Fig3_HTML.gif](A337882_1_En_11_Fig3_HTML.gif)\n\nFigure 11-3.\
    \ Service Registry\n\nWhen a client registers to the Service Registry, it provides\
    \ metadata about itself like its host and port number. It also keeps sending heartbeats\
    \ to the Service Registry. The Service Registry has everything in memory.\n\n\
    ## Service Registry: Eureka Server\n\nIn order to use the Service Registry (the\
    \ Eureka server), you need to do the following:\n\n1. Add the `<dependency/>`\
    \ and the `<dependencyManagement/>` tags to your `pom.xml` file:\n\n    ```\n\
    \    org.springframework.cloud\n    spring-cloud-starter-eureka-server\n    ...\n\
    \    org.springframework.cloud\n    spring-cloud-dependencies\n    Camden.SR6\n\
    \    pom\n    import\n    ```\n\n2. Add `@EnableEurekaServer` to your application:\n\
    \n    ```\n    @SpringBootApplication\n    @EnableEurekaServer\n    public class\
    \ ServiceRegistryDemoApplication {\n        public static void main(String[] args)\
    \ {\n            SpringApplication.run(\n                ServiceRegistryDemoApplication.class,\
    \ args);\n        }\n    }\n    ```\n\n    `@EnableEurekaServer` calls up a web\
    \ page. You can look at `http://localhost:8761/` in your browser, as shown in\
    \ Figure [11-4](#A337882_1_En_11_Chapter.html#Fig4).\n\n    ![A337882_1_En_11_Fig4_HTML.jpg](A337882_1_En_11_Fig4_HTML.jpg)\n\
    \n    Figure 11-4. The Eureka server at `http://localhost:8761`\n\n3. Add the\
    \ following properties to `application.properties` (or `application.yml`):\n\n\
    \    ```\n    # Default Server Port\n    server.port=8761\n    # Eureka Configuration\n\
    \    eureka.instance.hostname=localhost\n    eureka.client.register-with-eureka=false\n\
    \    eureka.client.fetch-registry=false\n    eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/\n\
    \    ```\n\nThat’s it; you don’t need anything else. You can take a look at the\
    \ `service-registry-server-demo` project and run it. It will run in the `8761`\
    \ port.\n\n## Registering a Service Application with the Eureka Server\n\nTo register\
    \ an application, follow these steps:\n\n1. Add the `<dependency/>` and the `<dependencyManagement/>`\
    \ tags to your `pom.xml` file:\n\n    ```\n    org.springframework.cloud\n   \
    \ spring-cloud-starter-eureka\n    ...\n    org.springframework.cloud\n    spring-cloud-dependencies\n\
    \    Camden.SR6\n    pom\n    import\n    ```\n\n2. Add `@EnableDiscoveryClient`\
    \ to your application:\n\n    ```\n    @RestController\n    @SpringBootApplication\n\
    \    @EnableDiscoveryClient\n    public class ServiceRegistryServiceDemoApplication\
    \ {\n        public static void main(String[] args) {\n            SpringApplication.run(\n\
    \                ServiceRegistryServiceDemoApplication.class, args);\n       \
    \ }\n        @GetMapping(\"/message\")\n        public String getMessage(){\n\
    \            return \"Hello World from a Service Discovery\";\n        }\n   \
    \ }\n    ```\n\n    This annotation will talk to the Eureka server automatically\
    \ (the default port is `8761`).\n\n3. Add the following properties to `application.properties`\
    \ (or `application.yml`):\n\n    ```\n    #Server Port\n    server.port=8181\n\
    \    #Application Name\n    spring.application.name=simple-service\n    ```\n\n\
    \    It’s important to include the application name because that’s how it will\
    \ get discovered.\n\nYou can look at the `service-registry-service-demo` project.\
    \ If you run the application, you should see the name `SIMPLE-SERVICE` listed\
    \ in the Eureka server. See Figure [11-5](#A337882_1_En_11_Chapter.html#Fig5).\n\
    \n![A337882_1_En_11_Fig5_HTML.jpg](A337882_1_En_11_Fig5_HTML.jpg)\n\nFigure 11-5.\
    \ The Eureka discovery"
