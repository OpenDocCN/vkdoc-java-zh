  trans: '

    ## Rest API 货币项目


    让我们回到项目，并将这种设计模式应用其中。通过仅实现 `ApplicationEvent` 类型的 `ApplicationListener`，应用程序将开始监听
    Spring 容器初始化期间以及 Bean 生命周期部分发生的每一个事件。


    请看清单 3-1，其中展示了 `RestApiEventsListener` 类是一个 Spring 组件。


    ```

    @Component

    public class RestApiEventsListener implements ApplicationListener{

    public void onApplicationEvent(ApplicationEvent event) {

    }

    }

    清单 3-1.

    com.apress.messaging.listener.RestApiEventsListener.java

    ```


    清单 3-1 仅展示了部分代码，其中 `RestApiEventsListener` 类实现了 `ApplicationEvent` 事件的 `ApplicationListener`。你必须实现接收
    `ApplicationEvent` 作为参数的 `onApplicationEvent` 方法。


    同样，一个用例是确定某个 Rest 端点被访问的次数。请看图 3-2，其中展示了 ApplicationEvent 的层次结构——你会注意到有一个 `RequestHandledEvent`
    以及一个继承自它的 `ServletRequestHandledEvent`。通过 `ServletRequestHandledEvent` 类，你可以获取正在被访问的
    URL（端点），并为其创建一个计数器。参见清单 3-2。


    ```

    @Component

    public class RestApiEventsListener implements ApplicationListener{

    private static final String LATEST = "/currency/latest";

    @Autowired

    private CounterService counterService;

    @Log(printParamsValues=true)

    public void onApplicationEvent(ApplicationEvent event) {

    if(event instanceof ServletRequestHandledEvent){

    if(((ServletRequestHandledEvent)event)

    .getRequestUrl().equals(LATEST)){

    counterService

    .increment("url.currency.latest.hits");

    }

    }

    }

    }

    清单 3-2.

    com.apress.messaging.listener.RestApiEventsListener.java

    ```


    清单 3-2 展示了更多代码。让我们来看一下：


    *   `ServletRequestHandledEvent`：当有请求到达某个端点时，此事件会被发布。这是 Web 框架的一部分。该事件包含所有 Web
    上下文信息，因此你可以获取正在被访问的 URL 信息。

    *   `CounterService`：此接口属于 `spring-boot-actuator` 模块，它允许你通过递增或递减一个 `tag/` 属性来获得一个度量指标。在本例中，标签是
    `url.currency.latest.hits`。

    *   `@Log(printParamsValues=true)`：这是一个自定义注解，将作为前置通知的一部分使用，用于记录被调用方法的所有信息。你可以在
    `com.apress.messaging.aop.CodeLogger.java` 类中查看相关代码。


    如果你运行该应用程序，你会从 `@Log` 注解得到一些输出（见图 3-4），但如果你多次访问 `/currency/latest` 端点（见图 3-5），应用程序将开始使用
