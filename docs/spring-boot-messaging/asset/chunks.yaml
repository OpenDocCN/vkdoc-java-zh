    #### RateRepository.java 类


    接下来是 `RateRepository` 接口，它基于 Spring Data JPA 技术。你需要继承 `JpaRepository<E,ID>` 并添加用于持久化的实体（领域）和
    ID 类类型（`String`，一个可序列化的类）。请参见代码清单 2-4。


    ```

    @Repository

    public interface RateRepository  extends JpaRepository{

    List findByDate(Date date);

    Rate findByDateAndCode(Date date,String code);

    }

    代码清单 2-4.

    src/main/java/com/apress/messaging/repository/RateRepository.java

    ```


    代码清单 2-4 展示了 `RateRepository` 接口。你可以看到 `@Repository` 注解（这只是 Spring 容器的一个标记）；关键部分是你需要继承
    `JpaRepository` 接口。该接口将为你实现所有 CRUD（创建、读取、更新和删除）操作，因此你无需自行实现。这里定义了两个查询方法——`findByDate`（查找具有该日期的汇率）和
    `findByDateAndCode`（查找特定日期和代码的汇率）。该接口的特殊之处在于，你可以通过使用领域类的属性来创建 SQL 查询。如果你想了解更多关于
    Spring Data JPA 的信息，请访问 [`http://docs.spring.io/spring-data/jpa/docs/current/reference/html/`](http://docs.spring.io/spring-data/jpa/docs/current/reference/html/)。


    #### CurrencyController.java 类


    该类定义了 REST 端点。它通过一个服务使用 `RateRepository` 接口。请参见代码清单 2-5。


    ```

    @RestController

    @RequestMapping("/currency")

    public class CurrencyController {

    @Autowired

    CurrencyConversionService service;

    @RequestMapping("/latest")

    public ResponseEntity getLatest(@RequestParam(name="base",defaultValue=CurrencyExchange.BASE_CODE)String
    base) throws Exception{

    //...

    }

    @RequestMapping("/{amount}/{base}/to/{code}")

    public ResponseEntity conversion(@PathVariable("amount")Float amount,@PathVariable("base")String
    base,@PathVariable("code")String code) throws Exception{

    //...

    }

    //此处有更多方法...

    }

    代码清单 2-5.

    src/main/java/com/apress/messaging/controller/CurrencyController.java

    ```


    代码清单 2-5 展示了 `CurrencyController` 类的一个片段，该类使用了 Spring MVC 的 `@RestController`、`@RequestMapping`、`@RequestParam`
    和 `@PathVariable` 注解。每个响应都基于 `ResponseEntity` 类。


    这是纯粹的 Spring MVC（没有太多 Spring Boot 特性）。如果你想了解更多关于 Spring MVC 的信息，请访问 [`http://docs.spring.io/spring/docs/current/spring-framework-reference/html/mvc.html`](http://docs.spring.io/spring/docs/current/spring-framework-reference/html/mvc.html)。


    请复习此类并进行实验。


    #### RestApiDemoApplication.java 类


    该类是 Web 应用程序的主入口点。请参见代码清单 2-6。


    ```

    @SpringBootApplication

    public class RestApiDemoApplication {

    public static void main(String[] args) {

    SpringApplication.run(RestApiDemoApplication.class, args);

    }

    @Bean

    public CommandLineRunner data(RateRepository repository) {

    return (args) -> {

    repository.save(new Rate("EUR",0.88857F,new Date()));

    repository.save(new Rate("JPY",102.17F,new Date()));

    repository.save(new Rate("MXN",19.232F,new Date()));

    repository.save(new Rate("GBP",0.75705F,new Date()));

    };

    }

    }

    代码清单 2-6.

    src/main/java/com/apress/messaging/RestApiDemoApplication.java

    ```


    代码清单 2-6 展示了主类，Spring Boot 将在此引导应用程序。`@SpringBootApplication` 是每个 Spring Boot
    应用必需的注解，因为它将触发 Spring Boot 背后的所有魔法。该注解将使用自动配置功能来确定你的应用及其最佳配置。在这种情况下，由于你拥有 `spring-boot-starter-web`
    依赖（通过 `pom.xml` 文件在类路径中），它将设置所有必要的 Bean（如 `DispatcherServlet`）和嵌入式 Servlet 容器（默认为
    Tomcat）来配置你的 Web 应用。


    注意 `@Bean`，它返回一个 `CommandLineRunner` 接口。这将在 Spring 容器准备好所有 Bean 后执行，并将使用 `RateRepository`
    接口来保存汇率。你可以将其视为初始化数据库的一种方式。


    #### 其他文件……


    当然，还有更多的类，但这里的目的是让你对它们进行实验，看看它们的作用以及如何在项目中使用它们。查看 `CurrencyConversionService`
    类，它在 Web 控制器中被使用。


    如果你想了解 AOP 在此项目中的使用方式，请查看 `CurrencyCodeAudit` 类。它定义了一个 `around` 通知，该通知仅在方法中找到
    `@ToUpper` 注解时执行。（你可以从本书的源代码中获取此注解的代码。）为什么需要使用这个切面？嗯，如果你查看转换端点，你期望的是大写形式（对于基准货币和代码，如
    `/150/USD/to/JPY`），但通过这种方法，你可以忽略大小写。从 `CurrencyConversionService` 方法中移除 `@ToUpper`
    后，像 `/150/usd/to/jpy` 这样的请求就无法工作，因为它只评估基准货币和代码的大写字母。你需要添加额外的代码来支持它。


    ### 运行 Spring Boot 货币 Web 应用


    运行此类项目有多种方式。如果你使用 STS 并导入项目，只需右键单击项目名称，选择“运行方式” -> “Spring Boot 应用”即可！


    如果你想使用命令行运行，请确保已安装 Maven 并执行：


    ```

    $ mvn spring-boot:run

    ```


    然后你可以打开浏览器，输入 `http://localhost:8080/currency/latest`，应该会得到与代码清单 2-1 相同的结果。你也可以使用
    `curl` 命令：


    ```

    $ curl http://localhost:8080/currency/latest

    ```


    如你所见，你不需要创建 WAR 文件并部署到容器中，因为 Spring Boot 自带嵌入式 Tomcat 容器。这使你能够拥有可移植性。


    ### 部署 Spring Boot 货币 Web 应用


    如果你想将此代码部署到 Servlet 容器，你需要打包此项目。如果你使用 STS，可以右键单击项目并选择“运行方式” -> “Maven 构建”。这将弹出一个对话框。在“目标”字段中输入
    `Package`，然后勾选“跳过测试”复选框。然后点击“运行”。这将在目标目录中创建一个可执行且可部署的文件。


    如果你使用命令行，可以执行：


    ```

    $ mvn package -DskipTests=true

    ```


    这将在目标目录中创建可执行且可部署的 WAR 文件。你可以通过运行以下命令来执行该 WAR 文件：


    ```

    $ java -jar target/rest-api-demo-0.0.1-SNAPSHOT.war

    ```


    例如，如果你已经有一个 Tomcat 容器，你可以直接将 WAR 文件放入 `webapps/` 文件夹并运行你的容器。在复制/移动 WAR 文件时，尝试重命名它。


    ```

    $ cp target/rest-api-demo-0.0.1-SNAPSHOT.war /opt/tomcat/webapps/rest-api-demo.war

    $ /opt/tomcat/bin/startup.sh

    ```


    然后你可以打开浏览器，访问 `http://localhost:8080/rest-api-demo/currency/latest` 来获得相同的结果。


    ## 更多关于 Spring Boot 的内容


    如果你想了解更多关于 Spring Boot 及其其他有用特性的信息，我推荐我的另一本书，Apress 出版的《Pro Spring Boot》。该书从使用
    Spring Boot CLI 到将其部署到云端，对这一技术进行了更深入的探讨。

    '
- fmt: '# Summary


    This chapter introduced Spring Boot, discussed some of its features, and explained
    how it works with Spring MVC by creating a simple currency Restful application.


    In the next chapter, you are going to start with the Spring Application events
    and listeners, which is a way to do messaging by emitting and consuming messages
    through the Observer pattern.


    # 3. Application Events


    This chapter covers how to use the observer pattern (behavioral pattern) as a
    way to send messages to whoever needs them or whoever is listening. The chapter
    also shows how the Spring Framework implements this pattern through its application
    events, which can be declared as a simple interface implementation or by using
    specialized annotations.


    ## The Observer Pattern


    This particular pattern defines one-to-many dependencies between objects, so when
    one object (the subject) change its state, it needs to inform the others (observers)
    about this change. Then they can react to the change, as shown in Figure [3-1](#A337882_1_En_3_Chapter.html#Fig1).


    ![A337882_1_En_3_Fig1_HTML.gif](A337882_1_En_3_Fig1_HTML.gif)


    Figure 3-1. The observer pattern


    There are many ways to implement this design pattern. The Java SDK includes the
    `java.util.Observable` class, which will set the change and notify the observers,
    as well as the `java.util.Observer` interface, which will receive the notification
    through its `update` method.


    The Spring Framework has a sophisticated way to use this observer pattern and
    the recent versions (4.x) of Spring include even more improvements. They not only
    include this pattern but also have multiple events that allow you to determine
    more about the internals of the Spring container and to create your own events.


    Remember that even though we are talking about the observer pattern and events,
    this is simply a way to communicate between components using messaging through
    events.


    ## The Spring ApplicationEvent


    You will find that the Spring Framework exposes the abstract `org.springframework.context.ApplicationEvent`
    class, which extends `java.util.EventObject`. The `EventObject` has an object
    where the event initially occurred. See Figure [3-2](#A337882_1_En_3_Chapter.html#Fig2).


    ![A337882_1_En_3_Fig2_HTML.jpg](A337882_1_En_3_Fig2_HTML.jpg)


    Figure 3-2. The Spring ApplicationEvent hierarchy


    Figure [3-2](#A337882_1_En_3_Chapter.html#Fig2) shows you the `ApplicationEvent`
    hierarchy, and as you can see, this class is extended by several events. It’s
    worth mentioning at least two important events:


    *   `ApplicationContextEvent` (belongs to the Spring Framework): This is an abstract
    class where you have full access to the main central interface, which provides
    the entire configuration for your application. This class is also extended by
    the `ContextClosed`, `ContextStartedEvent`, `ContextRefreshedEvent`, and `ContextStoppedEvent`
    events to give you more details of the lifecycle of the Spring container.

    *   `SpringApplicationEvent` (belongs to Spring Boot): This is also an abstract
    class that contains all the information about the Spring Boot application through
    the `SpringApplication` class. The `SpringApplication` class is used to bootstrap
    and launch a Spring Boot application from a Java main method.


    I chose these events because the project you are doing, the Rest API for currency
    exchanges, uses them. More about this later in this chapter.


    ## Spring ApplicationListener


    Now, for every event, you should have a way to receive the message. The Spring
    Framework has a main event listener. The `org.springframework.context.ApplicationListener<E
    extends ApplicationEvent>` interface extends from the `java.util.EventListener`
    (which is just a marker). The `ApplicationListener` is the main event listener
    for all the Spring `ApplicationContext` events, which you read about in the previous
    section. See Figure [3-3](#A337882_1_En_3_Chapter.html#Fig3).


    ![A337882_1_En_3_Fig3_HTML.jpg](A337882_1_En_3_Fig3_HTML.jpg)


    Figure 3-3. ApplicationListener interface and hierarchy


    Figure [3-3](#A337882_1_En_3_Chapter.html#Fig3) shows the `ApplicationListener`
    hierarchy and all the event listeners you can use. The Spring Framework will send
    the appropriate events on start, during runtime, and even upon normal shutdown
    in your Spring application. They will be filtered when the listener is invoked
    to match the event objects.


    There are many use cases whereby you can use the `ApplicationEvent` or some of
    its implementations to listen (using the `ApplicationListener`) for incoming messages
    and then act on them. For example, in the Rest API currency project, discussed
    again in the next section, you determine when a user hits some of the Rest endpoints,
    and you then have a statistical way to see the traffic and recognize which endpoint
    is used more often.'
