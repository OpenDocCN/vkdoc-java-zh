    ## Spring 5: WebFlux Framework


    Spring 5 has many of new features, including support for JDK 9\. One of its major
    features is the Functional Web Framework or WebFlux, which is based on Reactor.


    The Servlet 3.1 specification was capable of non-blocking I/O, but not as well
    as you might think. The rest of the Servlet API is still an imperative style and
    can’t be used in a reactive, non-blocking stack.


    The Spring team includes the `spring-webflux` module to add a new functional programming
    model to web applications. Together with `spring-mvc`, you can have a reactive
    stack web framework. The `spring-webflux` module also has a reactive `WebClient`
    that is a non-blocking alternative to the `RestTemplate` class, which allows you
    to deal with asynchronous and streaming scenarios. See Figure [10-4](#A337882_1_En_10_Chapter.html#Fig4).


    ![A337882_1_En_10_Fig4_HTML.gif](A337882_1_En_10_Fig4_HTML.gif)


    Figure 10-4.


    Spring WebFlux


    ### Programming Models


    Spring WebFlux has two programming models: annotation-based and functional-based.'
