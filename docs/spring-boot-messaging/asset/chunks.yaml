    ## 接下来是什么？


    基于我向你展示的内容，思考一下如果其中一个微服务宕机了会发生什么。你的整个流程会中断吗？你如何解决故障点并增加高可用性？你如何编排所有这些微服务？你如何避免零停机？


    好消息是，Spring Cloud Stream 是 Spring Cloud Data Flow 技术的基础。Spring Cloud Data Flow
    是一种用于编排云环境中可组合微服务应用的编排服务，它对于实时数据分析和大数据解决方案非常有用。


    使用 Spring Cloud Data Flow 的好处在于，这项技术得到了 Cloud Foundry、Apache Mesos、Kubernetes
    和 Apache Yarn 的支持。Spring Cloud Data Flow 依赖这些技术来编排云基础设施上的注册、创建、部署和任务，此外，它还与 Spring
    Cloud Services 兼容（我将在微服务章节中讨论这一点）。


    这里的建议是研究一下这项出色的技术。你会很轻松地学习它，因为它完全是基于 Spring Cloud Stream 的。


    ## 本章小结


    本章向你展示了使用 Spring Cloud Stream 和 Spring Boot 创建简单的 Stream 应用是多么容易。只需使用 `@EnableBinding`
    注解和绑定器，你就可以创建消息驱动的解决方案。


    我还向你展示了 Spring Cloud Stream 拥有应用启动器，只需添加适当的配置即可使用。


    下一章将讨论一项新兴技术：响应式框架。在这种情况下，我们将介绍 Spring Reactor 项目，用于在 JVM 上基于 Reactive Stream
    规范创建非阻塞应用。


    # 10. 响应式消息传递


    如今，实践响应式是所有 IT 公司的首要目标。还有一些我们经常听到的相关术语，例如响应式编程、函数式响应式编程和响应式流。尽管它们有所不同，但我们在这里看到的是我们处理数据消费、并发、异步事件、高性能和分布式计算方式的一种转变。


    本章讨论响应式编程和消息传递。这并不是一个新话题。几年前，微软发布了 C# 响应式扩展（以正式的方式），而 JavaScript 在事件响应方面也势头正劲。不仅如此，这个概念自
    60 年代就已经存在，当时程序员想要互连硬件。


    让我们首先深入了解响应式编程及其适用场景。然后，你将了解哪些框架将帮助你实现这种新的微事件响应式架构。


    ## 响应式编程


    响应式编程是一种异步处理随时间变化的事件数据流（以非阻塞形式）的方式。它是一种对其变化行为做出反应的方式。


    响应式编程适用于以下用例：


    *   **电子表格/单元格**：当你打开电子表格应用时，你是否想过它的内部工作原理？每个单元格可能依赖于其他单元格，因此一个单元格的任何新变化都需要反映到其他单元格中——这就是对变化做出响应。再想象一下你在进行微积分或代数计算时的矩阵。你如何对特定矩阵单元格中的值做出反应？通常，你会开始处理事件驱动架构。

    *   **高并发消息传递**：在我看来，消息传递是每个系统中最关键的部分。每秒发送几千甚至数百万条消息的想法一直是目标。能够处理所有这些消息并并发（同步和异步）消费它们也一直是一个挑战。

    *   **外部服务调用**：如今，设备（手机、平板电脑、传感器等）只需一次滑动、手势或点击就需要大量信息。它们的后端服务需要从不同的服务（本地或远程）收集数据，并将信息聚合到单个响应中。它们变得非常“健谈”，有时非常缓慢。响应式编程非常适合这里。

    *   **异步处理**：这对许多开发者来说一直是一个危险的领域，因为每当我们开始考虑异步进程时，就需要考虑线程、回调、并发、编排等等。有了响应式编程，我们几乎就解决了这些问题。


    针对这些用例的大多数解决方案都涉及创建具有非阻塞 I/O 的库，例如 event-machine（来自 Ruby 编程语言），它运行良好且性能出色。


    Java 及其新的 `java.util.concurrent` 包暴露了 Future/CompletableFuture 接口。Map-Reduce 和
    Fork-Join 有助于大数据场景下的并行处理。Actor 模型以一种自然的方式暴露了并发性，其中一个重要的实现是在 Akka 框架中。


    响应式编程是创建响应式、弹性、可伸缩，当然还有异步消息驱动系统的下一步，它允许流量控制并在必要时应用背压。所有这些特性都通过非阻塞通信提供。与仅基于拉取的
    Java 8 流或 Iterable/Iterator 相比，响应式编程是基于推送的。换句话说，响应式编程处理同步/拉取和异步/推送的概念。


    现在是时候关注实现了。以下部分使用了两个主要模块或库：RxJava 和 Reactor。然后我们将介绍即将发布的 Spring Framework 5 及其
    WebFlux 模块。


    注意


    本章包含五个项目，我们将在以下部分中使用它们：`rxjava-demo`、`reactor-demo`、`web-emitter`、`spring-web-flux`
    和 `spring-web-flux-reactive`。


    ## RxJava


    RxJava 来自 Netflix（称为 ReactiveX；请参阅 [`http://reactivex.io`](http://reactivex.io)），是一个通过使用可观察序列来组合异步和基于事件的程序的库。它扩展了观察者模式并支持数据序列。它通过提供一个简单的
    API，消除了线程、同步、线程安全、并发数据结构和非阻塞 I/O 的复杂性。


    RxJava 提供了一组操作符，可以过滤、选择、转换、组合和编排可观察对象，从而实现更好、更高效的执行和组合。它暴露了几个类，比如 `Observable`，我们将在示例代码中看到。

