  ## 总结


  本章向你展示了如何使用 Spring Boot 通过 JMS 技术发送和接收消息。


  你了解了不同的 JMS 消息传递模型，以及开发人员发送或接收消息需要做什么。


  通过 Spring Boot，你看到了设置 JMS 客户端是多么容易，以及如何通过简单的注解就能拥有一个使用 JMS 作为消息传递系统的功能型应用程序。尽管你只看到了如何使用
  Apache ActiveMQ 作为代理，但同样的编程方法也可以应用于 HornetQ、IBM MQ 等，只需在 `application.properties`
  文件中提供正确的属性（连接工厂和消息监听器）即可。


  下一章将讨论一种不同的消息传递方式，即使用高级消息队列协议——AMQP。


  '
- "# 5. 使用 Spring Boot 集成 AMQP\n\n本章将讨论高级消息队列协议（AMQP），这是一种与平台无关的消息协议。你将学习如何使用 Spring\
  \ AMQP 模块，该模块将与 RabbitMQ 代理进行通信。RabbitMQ 是全球最常用的代理之一，因为它易于安装和使用。最棒的是，它是开源的。\n\n\
  AMQP 起源于金融领域，由摩根大通于 2003 年创建。随后，更多公司围绕它进行改进，以增强这种新的消息传递方式。Rabbit Technologies 使用\
  \ Erlang 编程语言实现了 AMQP，RabbitMQ 由此诞生。多年后，VMware/Pivotal 收购了它。\n\n我们将继续介绍一些重要的定义，这些定义将帮助你更好地理解\
  \ AMQP 和 RabbitMQ。本章将使用 `amqp-demo` 和 `rest-api-amqp` 项目。本章包含与 `amqp-demo` 相关的所有代码，我将让你自行深入研究\
  \ `rest-api-amqp` 项目，以完成主要需求：从 RabbitMQ 接收新汇率并将其发送给感兴趣的消费者。\n\n注意\n\n对于本章，启动并运行\
  \ RabbitMQ 服务器非常重要。你可以从 [`http://www.rabbitmq.com/download.html`](http://www.rabbitmq.com/download.html)\
  \ 下载它。请确保至少安装了 `rabbitmq_management` 插件，因为它为 RabbitMQ 提供了 Web UI 管理功能。设置完成后，你可以打开浏览器，使用用户名和密码\
  \ `guest` 访问 `http://localhost:15672`。有关此 Web UI 插件的更多信息，请访问 [`http://www.rabbitmq.com/management.html`](http://www.rabbitmq.com/management.html)\
  \ 。\n\n## AMQP 模型\n\n本节将介绍 AMQP 0.9.1 模型。目前，这个特定版本是最常见的。\n\nAMQP 模型由发布到交换器的消息组成。这些交换器根据绑定（规则）将消息分发到队列。然后，消费者从这些队列中获取/拉取消息。参见图\
  \ 5-1。\n\n![A337882_1_En_5_Fig1_HTML.jpg](img/A337882_1_En_5_Fig1_HTML.jpg)\n\n\
  图 5-1.\n\nAMQP 模型\n\n你会看到，通常作为生产者或消费者，你需要创建到代理的连接，然后使用通道（主要传输方式）将消息发布到交换器或从队列消费消息。换句话说，AMQP\
  \ 协议通过通道指定了多路复用连接。\n\nAMQP 模型具有不同的特性，允许开发人员在创建消息传递应用程序时拥有极大的灵活性。这些特性包括消息属性（内容类型、编码、路由键、投递模式等）、消息确认、消息拒绝、消息重新入队、多路复用连接（通道）、虚拟主机（用于托管隔离环境）、多客户端以及路由能力等。\n\
  \n\n\n### 交换机、绑定与队列\n\n这些关键词也被称为 AMQP 实体。让我们来定义这些实体（请记住，所有这些仍然是 AMQP 模型的一部分）：\n\n\
  *   **交换机**：生产者发送消息的实体。交换机将使用绑定将消息路由到正确的队列。交换机具有以下属性：名称、持久性（可以是持久或瞬态）、自动删除（当所有队列使用完毕后，交换机被删除）以及参数（哈希映射，依赖于代理）。\n\
  *   **绑定**：连接交换机与另一个交换机或队列的规则。这是一个字符串值。\n*   **队列**：存储消息（在内存或磁盘中），直到它们被应用程序消费。队列具有以下属性：名称、持久性（在代理重启后依然存在）、独占性（仅由一个连接使用，这意味着当连接关闭时队列将被删除）、自动删除（当最后一个消费者取消订阅时队列被删除）以及参数（哈希映射，依赖于代理）。\n\
  \nAMQP 模型提供了四种类型的交换机：\n\n*   **直连交换机**：通过其绑定与队列建立一对一的关系。有一个默认交换机，它是一种直连交换机类型，使用队列名称作为其绑定的路由键。\n\
  *   **扇形交换机**：此交换机会为每个绑定到它的队列复制一条消息。你可以将其视为广播；它与发布/订阅模式（主题）非常相似。\n*   **主题交换机**：此交换机类似于直连交换机，唯一的区别在于它接受路由键的通配符（正则表达式），通过使用\
  \ `*`（可替代恰好一个单词）和 `#`（可替代零个或多个单词）选项。\n*   **头交换机**：此交换机通过比较多个头信息来进行路由。你需要通过向同一消息头添加\
  \ `x-match:all`（头：键）来指示是否要求头信息完全匹配，或通过添加 `x-match:any`（头：键）来指示匹配任意一个头信息。\n\n图 5-2\
  \ 展示了这些交换机类型。\n\n![A337882_1_En_5_Fig2_HTML.jpg](img/A337882_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2.\n\n交换机类型\n\n这个简短的介绍足以让你开始使用 RabbitMQ 并学习如何使用它。\n\n## RabbitMQ\n\nRabbitMQ\
  \ 是一个实现了 AMQP 模型（从 AMQP 模型的 0.8.x 版本到 1.0 版本）的开源代理。RabbitMQ 使用 Erlang 编程语言编写，使其灵活且健壮。\n\
  \n以下是它的一些特性：\n\n*   分布式节点\n*   支持集群\n*   基于插件；最重要的插件包括：\n    *   联邦\n    *   铲子\n\
  \    *   一致性哈希\n    *   社区插件\n*   具有完整 ACID（原子性、一致性、隔离性、持久性）特性的数据/状态复制\n*   开箱即用的可靠性和可扩展性：联邦和铲子\n\
  *   通过镜像队列实现高可用性\n*   多协议：\n    *   AMQP\n    *   MQTT\n    *   STOMP\n    *   SMTP\n\
  \    *   XMPP\n*   Web 控制台和 Rest API（用于监控和管理）\n*   安全性：SSL 和 LDAP\n*   多种客户端库：Java、.NET、Ruby、Erlang、Python、Clojure、PHP、JavaScript\
  \ 等。\n\n我们可以写一整本书来定义每一个可用的特性，但我想做的是让你了解 RabbitMQ 能做什么。（如果你需要更多信息，可以访问 [`http://www.rabbitmq.com/features.html`](http://www.rabbitmq.com/features.html)\
  \ 。）那么，让我们通过创建客户端来开始使用它。\n\n## 使用 Spring Boot 的 RabbitMQ\n\nSpring Boot 依赖 Spring\
  \ 的 `spring-amqp` 项目来完成连接、发布、消费和管理 RabbitMQ 代理的所有繁重工作。`spring-amqp` 项目一直是消息传递应用程序中最常用的模块之一。\n\
  \n那么，为什么我们需要 Spring Boot？请记住，Spring Boot 是一个有主见的运行时，它将通过提供一些我们可以添加到 `application.properties`\
  \ 文件中的属性，或者通过使用 `@Configuration` 类来覆盖其中一些默认配置，从而帮助我们配置 `spring-amqp` 模块所需的内容。\n\n\
  `spring-amqp` 项目使用了众所周知的模板模式，它暴露了一个 `RabbitTemplate` 类，允许我们发布和消费消息，以及执行其他任务。它还提供了易于使用的消息监听器，用于连接到队列并消费消息。如果你担心线程、事务、重连（在故障情况下）、管理等问题，`spring-amqp`\
  \ 都能为你解决。\n\n\n\n### 生产者\n\n让我们从一个简单的生产者开始。`ampq-demo` 项目包含了入门所需的一切。打开项目，从清单 5-1\
  \ 所示的简单生产者开始。\n\n```\n@Component\npublic class Producer {\nprivate RabbitTemplate\
  \ template;\n@Autowired\npublic Producer(RabbitTemplate template){\nthis.template\
  \ = template;\n}\npublic void sendMessage(String exchange,\nString routingKey, String\
  \ message){\nthis.template.convertAndSend(exchange,\nroutingKey, message);\n}\n\
  }\n清单 5-1.\ncom.apress.messaging.amqp.Producer\n```\n\n清单 5-1 展示了一个简单的 `amqp` 生产者。我们来分析一下代码中的重要部分：\n\
  \n*   `@Component`：这是 Spring 框架的一个标记，它会将该类识别为 Spring Bean，以便在应用程序中使用。接下来你会在主应用程序中看到它的实际应用。\n\
  *   `RabbitTemplate`：这是 Spring AMQP 模块的主要类之一，它提供了与 RabbitMQ 交互的许多功能，例如发送、接收以及执行\
  \ RabbitMQ 中的管理任务。在本例中，它用于将消息转换并发送到代理。请记住，要与 RabbitMQ 交互，你必须打开一个连接并创建一个通道（从该连接中），然后将消息发送到交换机。这个设置过程将由\
  \ `RabbitTemplate` 实例处理。\n*   `convertAndSend`：此方法会将消息转换为正确的类型（转换为字节数组），并将其发送到 `RabbitMQ`\
  \ 代理。这个特定的方法有三个参数。第一个参数是交换机的名称（消息将通过通道发送到该交换机），第二个参数是路由键（将消息路由到正确队列的绑定规则），第三个参数是消息本身，在本例中只是一个字符串。\n\
  \n如你所见，这是一个非常简单的生产者。值得一提的是，`RabbitTemplate` 类提供了多种重载方法，可以帮助你发送、监听、使用自定义转换器以及执行专门的任务（稍后你将了解更多相关内容）。\n\
  \n接下来，让我们看看如何使用这个生产者。打开清单 5-2 中所示的 `AmqpDemoApplication.java` 类。\n\n```\n@SpringBootApplication\n\
  public class AmqpDemoApplication {\npublic static void main(String[] args) {\nSpringApplication.run(AmqpDemoApplication.class,\
  \ args);\n}\n@Bean\nCommandLineRunner simple(\n@Value(\"${apress.amqp.exchange:}\"\
  )String exchange,\n@Value(\"${apress.amqp.queue}\")String routingKey,\nProducer\
  \ producer){\nreturn args -> {\nproducer.sendMessage(\nexchange,\nroutingKey, \"\
  HELLO AMQP!\");\n};\n}\n}\n清单 5-2.\ncom.apress.messaging.AmqpDemoApplication.java\n\
  ```\n\n清单 5-2 展示了主 Spring Boot 应用程序。我们来回顾一下代码：\n\n*   `@Bean CommandLineRunner`：你已经熟悉这个注解和接口。它会在\
  \ Spring 容器初始化所有 Bean 并准备就绪后执行。\n*   `@Value(\"${apress.amqp.exchange:}\")`：此注解会评估包含\
  \ `apress.amqp.exchange` 键的属性（通过 `application.properties`、命令行参数或环境变量）。如果未找到，它将使用一个空字符串，即\
  \ `exchange` 后面的 `:`。\n*   `@Value(\"${apress.amqp.queue}\")`：此注解会评估包含 `apress.amqp.queue`\
  \ 键的属性（通过 `application.properties`、命令行参数或环境变量）。此键是必需的，因此你会在 `src/resources/application.properties`\
  \ 文件中找到它，其值为 `spring-boot-queue`。\n*   `Producer`：这是简单的生产者类（如清单 5-1 所示）。如你所见，我们使用\
  \ `sendMessage` 方法来发送交换机名称、路由键以及 `\"HELLO AMQP!\"` 消息。\n\n在测试之前，你需要确保 RabbitMQ 代理已启动并正在运行。你还需要设置交换机、绑定和队列，不过这里你不需要这样做，因为\
  \ `amqp-demo` 项目已经为你配置好了。请查看清单 5-3 中所示的 `AMQPConfig.java` 类。\n\n```\n@Configuration\n\
  @EnableConfigurationProperties(AMQPProperties.class)\npublic class AMQPConfig {\n\
  @Bean\npublic Queue queue(\n@Value(\"${apress.amqp.queue}\")String queueName){\n\
  return new Queue(queueName,false);\n}\n}\n清单 5-3.\ncom.apress.messaging.config.AMQPConfig.java\n\
  ```\n\n清单 5-3 展示了 `AMQPConfig`，它定义了以下内容：\n\n*   `@EnableConfigurationProperties`：这将声明一个自定义属性，其前缀为\
  \ `apress.amqp.*`。这就是我们可以使用 `apress.amqp.queue` 或 `apress.amqp.exchange` 键的原因。\n\
  *   `@Bean Queue`：这是重要的部分，我们通过编程方式声明队列，在本例中，通过返回 `Queue` 类的新实例来创建队列。\n*   `@Value(\"\
  ${apress.amqp.queue}\")`：此注解会评估在 `src/main/resources/application.properties` 中定义的键\
  \ `apress.amqp.queue`，其值为 `spring-boot-queue`。\n\n我认为这个配置非常直接，但仔细想想，我们似乎缺少了 `Exchange`\
  \ 声明以及将消息路由到队列的绑定。实际上，每次在 RabbitMQ 中创建队列时，它都会绑定到一个默认交换机（通常声明为空字符串），而路由键恰好就是队列的名称。如你所见，我们将队列的名称作为路由键传递给了生产者实例。\n\
  \n现在你可以运行应用程序，并在 RabbitMQ 管理控制台中看到 `spring-boot-queue` 已被创建，并且有一条消息。输出如图 5-3 所示。\n\
  \n![A337882_1_En_5_Fig3_HTML.jpg](img/A337882_1_En_5_Fig3_HTML.jpg)\n\n图 5-3.\n\n\
  生产者日志\n\n图 5-3 展示了日志。在 `amqp-demo` 项目中，你会找到 `com.apress.messaging.aop.AMQPAudit.java`\
  \ 类。这是一个环绕通知，它会记录 `Producer` 方法的调用。见图 5-4。\n\n![A337882_1_En_5_Fig4_HTML.jpg](img/A337882_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4.\n\nRabbitMQ 管理控制台 (http://localhost:15672/#/queues): spring-boot-queue\n\
  \n图 5-4 展示了 RabbitMQ 管理控制台，你可以看到队列已创建，并且消息已发送。\n\n你知道我们是如何连接到 RabbitMQ 代理的吗？如果我有一个远程服务器，需要指定连接位置，传递\
  \ IP 地址或用户名和密码，该怎么办？\n\nSpring Boot 会自动处理这个问题，因为 Spring Boot 是一个有主见的运行时，它会在类路径中找到\
  \ `spring-boot-starter-amqp` 依赖项，并询问你是否已经有一个包含代理所有必要信息的 `ConnectionFactory`（用于连接\
  \ RabbitMQ）。如果没有，它将尝试使用默认设置并查找本地代理。\n\n如果你想指定一个远程代理，可以通过在 `src/main/resources/application.properties`\
  \ 文件中提供 `spring.rabbitmq.*` 属性来实现。这足以连接到远程 RabbitMQ。\n\n\n\n### 消费者\n\n现在，我们来讨论如何消费使用生产者发送的消息。打开清单\
  \ 5-4 中所示的 `Consumer.java` 类。\n\n```\n@Component\npublic class Consumer implements\
  \ MessageListener{\npublic void onMessage(Message message) {\n}\n}\n清单 5-4.\ncom.apress.messaging.amqp.Consumer.java\n\
  ```\n\n清单 5-4 展示了最简单的消费者代码。这是一个异步消费者，它实现了 `org.springframework.amqp.core.MessageListener`\
  \ 接口和 `onMessage` 方法。该方法将接收一个 `org.springframework.amqp.core.Message` 实例作为消息。要使用此消费者，你需要为\
  \ Spring Boot 提供一些有用的配置设置。打开 `AMQPConfig` Java 类。参见清单 5-5。\n\n```\n@Configuration\n\
  @EnableConfigurationProperties(AMQPProperties.class)\npublic class AMQPConfig {\n\
  @Bean\npublic Queue queue(\n@Value(\"${apress.amqp.queue}\")String queueName){\n\
  return new Queue(queueName,false);\n}\n@Bean\npublic SimpleMessageListenerContainer\n\
  container(ConnectionFactory connectionFactory,\nMessageListener consumer,\n@Value(\"\
  ${apress.amqp.queue}\")String queueName) {\nSimpleMessageListenerContainer container\
  \ = new\nSimpleMessageListenerContainer();\ncontainer.setConnectionFactory(connectionFactory);\n\
  container.setQueueNames(queueName);\ncontainer.setMessageListener(consumer);\nreturn\
  \ container;\n}\n}\n清单 5-5.\ncom.apress.messaging.config.AMQPConfig.java\n```\n\n\
  清单 5-5 展示了增强后的 `AMQPConfig` 类（来自清单 5-3），其中包含以下内容：\n\n*   `SimpleMessageListenerContainer`：此类创建一个消息监听容器，用于监听队列中的任何消息。需要为此类设置连接工厂、消息监听处理器以及队列名称。如你所见，这是一个我们需要返回的\
  \ Bean，用于初始化消息监听容器。\n*   `ConnectionFactory`：对于 `SimpleMessageListenerContainer`\
  \ 类来说，此接口是必需的，因为它负责了解 RabbitMQ 代理（主机、用户名、密码、虚拟主机等）的信息。需要注意的是，这个连接工厂是由 Spring Boot\
  \ 自动装配的，要么使用默认设置（完全不配置），要么通过在 `application.properties` 文件中使用 `spring.rabbitmq.*`\
  \ 属性来指定其属性。你也可以将你自己的 `ConnectionFactory` 声明为一个 Bean（通过在方法中声明 `@Bean`）。\n*   `MessageListener`：如你所见，这是方法容器（`consumer`）的参数之一，Spring\
  \ 会将 `com.apress.messaging.amqp.Consumer` 类注册为处理器。然后在调用 `container.setMessageListener`\
  \ 方法时使用它。\n\n请注意，我们使用了 `queueName`，它是由 Spring Boot 通过 `apress.amqp.queue` 属性自动装配的。\n\
  \n基本上就是这样。现在你有了一个完整的生产者和消费者。你可以运行程序，并查看图 5-5 中所示的日志。\n\n![A337882_1_En_5_Fig5_HTML.jpg](img/A337882_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5.\n\n消费者日志\n\n图 5-5 展示了消费者的日志。请注意，被调用的方法是 `onMessage`，它由 `org.springframework.amqp.core.Message`\
  \ 实例表示。\n\n#### 使用注解的消费者\n\n等等！我告诉过你 Spring Boot 会让这变得更简单，对吧？在当前示例中，我们需要注册容器并实现\
  \ `MessageListener` 接口。好消息是，Spring AMQP 提供了一种使用注解的方式，并且在 Spring Boot 的帮助下，一切都能正确配置。\n\
  \n转到你的 `AMQPConfig` 类，移除容器方法。它应该看起来像清单 5-3。打开 `com.apress.messaging.amqp.AnnotatedConsumer`\
  \ 类；它应该看起来像清单 5-6。\n\n```\n@Component\npublic class AnnotatedConsumer {\n@RabbitListener(queues=\"\
  ${apress.amqp.queue}\")\npublic void process(String message){\n}\n}\n清单 5-6.\ncom.apress.messaging.amqp.AnnotatedConsumer.java\n\
  ```\n\n清单 5-6 展示了如何在不创建容器的情况下创建一个消费者，只需添加 `@RabbitListener` 注解即可。Spring AMQP 会为你创建容器，并在\
  \ Spring Boot 的帮助下将所有内容自动装配起来。如你所见，它使用 `queues` 作为参数，并且使用了 `apress.amqp.queue` 属性。还要注意，该方法接收一个\
  \ `String`（而不是 `Message` 对象）。你可以使用自己的对象，但这需要额外的步骤。别担心，我们将在后续章节中介绍这一点。\n\n现在你可以运行项目，应该会得到类似于图\
  \ 5-6 的结果。\n\n![A337882_1_En_5_Fig6_HTML.jpg](img/A337882_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6.\n\n使用 @RabbitListener 注解的消费者\n\n如你所见，只需几行代码就能非常简单地创建一个生产者和消费者。接下来，让我们回顾一下如何创建和使用\
  \ RPC 模型。\n\n\n\n### RPC\n\n远程过程调用（RPC）模型是上世纪 60 年代众多应用场景之一，当时分布式计算是一项挑战（现在依然如此）。RPC\
  \ 模型被视为一种请求-响应协议，其中客户端通过向远程服务器发送请求消息来启动一个进程，以执行一个或多个任务。随后远程服务器向客户端发送响应，以便客户端继续执行进程。参见图\
  \ 5-7。\n\n![A337882_1_En_5_Fig7_HTML.gif](img/A337882_1_En_5_Fig7_HTML.gif)\n\n\
  图 5-7.\n\n简单的 RPC 模型\n\n在 Spring Boot 中创建 RPC 消息模型非常简单。请记住，Spring Boot 依赖于 Spring\
  \ AMQP 模块，因此您无需配置 RabbitMQ 代理。Spring AMQP 会处理这一切。让我们查看代码，以便您更好地了解其工作原理。\n\n打开 `com.apress.messaging.amqp.RpcClient`\
  \ 类。它应该如清单 5-7 所示。\n\n```\n@Component\npublic class RpcClient {\nprivate RabbitTemplate\
  \ template;\n@Autowired\npublic RpcClient(RabbitTemplate template) {\nthis.template\
  \ = template;\n}\npublic Object sendMessage(String exchange,\nString routingKey,\
  \ String message) {\nObject response =\nthis.template\n.convertSendAndReceive(exchange,\
  \ routingKey, message);\nreturn response;\n}\n}\n清单 5-7.\ncom.apress.messaging.amqp.RpcClient.java\n\
  ```\n\n清单 5-7 展示了 `RpcClient` 类，如果您将其与清单 5-1（`Producer` 类）进行比较，您会发现只有一个区别——调用的模板方法不同。在此示例中，我们使用了\
  \ `convertSendAndReceive` 方法，该方法接受三个参数——交换机名称、路由键和消息。它返回一个对象（返回值通常会被包装为 `org.springframework.amqp.core.Message`\
  \ 实例）。当然，您可以从这个签名中找到更多重载方法，但就目前而言，我们将尽可能简化。\n\n接下来，让我们看看服务器端。打开 `com.apress.messaging.amqp.RpcServer`\
  \ 类。参见清单 5-8。\n\n```\n@Component\npublic class RpcServer {\n@RabbitListener(queues=\"\
  ${apress.amqp.queue}\")\npublic Message process(String message){\n//更多处理逻辑在此...\n\
  return MessageBuilder\n.withPayload(\"PROCESSED:OK\")\n.setHeader(\"PROCESSED\"\
  , new\nSimpleDateFormat(\"yyyy-MM-dd\")\n.format(new Date()))\n.setHeader(\"CODE\"\
  , UUID.randomUUID().toString())\n.build();\n}\n}\n清单 5-8.\ncom.apress.messaging.amqp.RpcServer.java\n\
  ```\n\n清单 5-8 展示了 `RpcServer` 类。让我们看看与其他版本相比有哪些新变化和不同之处：\n\n*   `@RabbitListener`：您已经熟悉这个注解。它会创建一个消息监听器容器，并监听来自\
  \ `apress.amqp.queue` 队列的任何传入消息（请记住，这是在 `application.properties` 文件中指定的属性）。\n* \
  \  `Message<String>`：如果您想增强消息功能，这就是您需要返回的类型，因为它提供了一种使用消息头的方式。在此示例中，我们使用了字符串类型的消息。\n\
  *   `MessageBuilder`：这是一个辅助类，允许您构建新消息、添加/复制消息头等。如您所见，我们只是创建了一个有效负载设置为 `PROCESSED:OK`\
  \ 的新消息，并添加了几个消息头。\n\n如果您仔细查看清单 5-8，您会注意到 `process` 方法处理器返回一个 `String` 类型的 `Message`，正因如此，Spring\
  \ AMQP 使用了 RabbitMQ 的 `direct reply-to` 功能。该功能允许我们将服务器连接到客户端以进行响应，而无需创建 `reply-queue`（这是自\
  \ RabbitMQ 代理 3.4.x 版本以来就有的功能）。\n\n您无需担心任何关联数据，因为 Spring AMQP 会为您创建。您也可以自定义或创建自己的关联数据。\n\
  \n现在，让我们看看主应用程序。打开您的 `com.apress.messaging.AmqpDemoApplication` 类；它应该如清单 5-9 所示。\n\
  \n```\n@SpringBootApplication\npublic class AmqpDemoApplication {\npublic static\
  \ void main(String[] args) {\nSpringApplication.run(AmqpDemoApplication.class, args);\n\
  }\n@Bean\nCommandLineRunner\nsimple(@Value(\"${apress.amqp.exchange:}\")String exchange,\n\
  @Value(\"${apress.amqp.queue}\")String routingKey,\nRpcClient client){\nreturn args\
  \ -> {\nObject result = client\n.sendMessage(exchange,\nroutingKey,\n\"HELLO AMQP/RPC!\"\
  );\nassert result!=null;\n};\n}\n}\n清单 5-9.\ncom.apress.messaging.AmqpDemoApplication.java\n\
  ```\n\n清单 5-9 展示了主应用程序，其中我们只使用了 `RpcClient`。\n\n在运行 RPC 示例之前，请确保没有其他监听器使用同一个队列。\n\
  \n运行应用程序后，您应该会得到类似于图 5-8 的结果。\n\n![A337882_1_En_5_Fig8_HTML.jpg](img/A337882_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8.\n\nRPC 模型日志\n\n有时您需要对 RPC 有更多控制。例如，您可能希望有一个固定的队列用于回复。为此，您需要向应用程序添加一些配置。参见清单\
  \ 5-10。\n\n```\n@Configuration\n@EnableConfigurationProperties(AMQPProperties.class)\n\
  public class AMQPConfig {\n@Configuration\n@EnableConfigurationProperties(AMQPProperties.class)\n\
  public class AMQPConfig {\n@Autowired\nConnectionFactory connectionFactory;\n@Value(\"\
  ${apress.amqp.reply-queue}\")\nString replyQueueName;\n@Bean\npublic RabbitTemplate\
  \ fixedReplyQueueRabbitTemplate() {\nRabbitTemplate template = new\nRabbitTemplate(connectionFactory);\n\
  template.setReplyAddress(replyQueueName);\ntemplate.setReplyTimeout(60000L);\nreturn\
  \ template;\n}\n@Bean\npublic SimpleMessageListenerContainer\nreplyListenerContainer()\
  \ {\nSimpleMessageListenerContainer container = new\nSimpleMessageListenerContainer();\n\
  container.setConnectionFactory(connectionFactory);\ncontainer.setQueues(replyQueue());\n\
  container.setMessageListener(\nfixedReplyQueueRabbitTemplate());\nreturn container;\n\
  }\n@Bean\npublic Queue replyQueue(){\nreturn new Queue(replyQueueName,false);\n\
  }\n@Bean\npublic Queue queue(\n@Value(\"${apress.amqp.queue}\")String queueName){\n\
  return new Queue(queueName,false);\n}\n}\n清单 5-10.\ncom.apress.messaging.config.AMQPConfig.java\n\
  ```\n\n清单 5-10 展示了如何设置一个固定队列，该队列将由服务器用于回复客户端请求，并且客户端将监听该队列。这里的关键部分是 `RabbitTemplate`，它将通过使用\
  \ `setReplyAddress` 方法来配置 `reply-to` 队列。同时，还需要使用与监听器相同的模板来监听来自服务器的响应（这是通过将监听器容器设置为\
  \ `setMessageListener` 来实现的）。\n\n注意\n\nRabbitMQ Java 客户端（ [`https://www.rabbitmq.com/java-client.html`](https://www.rabbitmq.com/java-client.html)\
  \ ）提供了开箱即用的 RPC 客户端/服务器类，但您仍然需要处理重连、事务等问题，而 Spring AMQP 会为您处理这些。\n\n\n\n### 回复管理\n\
  \n使用 Spring AMQP 的一个很酷的地方在于它拥有一些非常棒的特性。例如，你可以使用交换器和路由键创建一个实际的回复（reply-to）场景。换句话说，你发送一条消息而不等待响应（有点像即发即弃），然后回复到一个特定的交换器/队列，该队列将会有另一个流程。\n\
  \nSpring AMQP 包含了 `@SendTo` 注解，通过它你可以将回复发送到一个交换器或一个队列。打开清单 5-11 中所示的 `com.apress.messaging.amqp.ReplyToService`\
  \ 类。\n\n```\n@Component\npublic class ReplyToService {\n@RabbitListener(queues=\"\
  ${apress.amqp.queue}\")\n@SendTo(\"${apress.amqp.reply-exchange-queue}\")\npublic\
  \ Message replyToProcess(String message){\n//更多处理逻辑在此...\nreturn MessageBuilder\n\
  .withPayload(\"PROCESSED:OK\")\n.setHeader(\"PROCESSED\", new\nSimpleDateFormat(\"\
  yyyy-MM-dd\")\n.format(new Date()))\n.setHeader(\"CODE\", UUID.randomUUID().toString())\n\
  .build();\n}\n}\n清单 5-11.\ncom.apress.messaging.amqp.ReplyToService.java\n```\n\n\
  清单 5-11 展示了 `@SendTo` 注解。如你所见，`replyToProcess` 方法也使用了 `@RabbitListener` 注解。这意味着它将监听一个队列（由\
  \ `apress.amqp.queue` 属性值提供）。这里的关键部分是，它将返回一条消息，该消息会通过 `@SendTo` 注解作为回复机制，被发送到由 `apress.amqp.reply-exchange-queue`\
  \ 属性值提供的交换器/路由键。\n\n你可以使用 `Producer` 类来发送消息（参见清单 5-2），但在运行此示例之前，你需要使用 RabbitMQ Web\
  \ 控制台执行以下操作：\n\n*   创建一个名为 `my-exchange` 的直连交换器\n*   创建一个队列（使用你想要的任何名称）\n*   使用\
  \ `my-reply-rk` 路由键将 `my-exchange` 绑定到你刚刚创建的队列\n\n当然，你也可以通过编程方式创建这些（也许作为家庭作业？）。\n\
  \n现在你可以开始试验了。运行该示例，你应该会在你创建的队列中看到一条消息。如你所见，你有另一种方式来实现回复并创建另一个流程。\n\n### 流量控制\n\n\
  流量控制是 RabbitMQ 的最佳特性之一。它会降低那些发送消息但消费速度不够快的发布者的连接速度。\n\nRabbitMQ 通常会降低速度，有时甚至会阻塞连接，以防止它们造成洪泛。了解这个特性是件好事，因为你可以用它来确定你的瓶颈在哪里。要么增加队列的并发消费者数量，要么审查消费者的代码以确定处理消息耗时过长的原因。\n\
  \n那么，找到这些瓶颈有多容易呢？一种方法是监控你的 RabbitMQ 控制台，查看是否触发了流量控制机制。你可以通过检查“连接”或“通道”选项卡的状态来确定这一点，它们通常会显示为黄色并提示“流量控制”。然而，还有一种更简单的方法。RabbitMQ\
  \ 会发送事件，允许你对流量控制做出反应并完成关闭。\n\n#### 阻塞/解除阻塞事件\n\nSpring AMQP 提供了一种机制来附加 `Block`、`Unblock`\
  \ 和 `Shutdown` 事件。你可以在 `com.apress.messaging.config.AMQConfig` 类中找到相关代码。\n\n如果你想监听\
  \ `Block` 或 `Unblock` 事件，只需将以下代码（`BlockedListener` 事件）添加到你的配置中：\n\n```\n@Bean\n\
  public RabbitTemplate rabbitTemplate(ConnectionFactory\nconnectionFactory){\nRabbitTemplate\
  \ template = new\nRabbitTemplate(connectionFactory);\ntemplate.execute(new ChannelCallback()\
  \ {\npublic Object\ndoInRabbit(Channel channel) throws Exception {\nchannel.getConnection().addBlockedListener(\n\
  new BlockedListener() {\npublic void handleUnblocked()\nthrows IOException{\n//\
  \ 恢复业务逻辑\n}\npublic void handleBlocked(String reason)\nthrows IOException {\n//\
  \ FlowControl -> 处理阻塞的逻辑\n}\n});\nreturn null;\n}\n});\nreturn template;\n}\n```\n\
  \n如果你只想监听故障或 RabbitMQ 关闭事件，可以使用以下代码（`ShutdownListener` 事件）：\n\n```\n@Bean\npublic\
  \ RabbitTemplate rabbitTemplate(\nConnectionFactory connectionFactory){\nRabbitTemplate\
  \ template = new\nRabbitTemplate(connectionFactory);\ntemplate.execute(new ChannelCallback()\
  \ {\npublic Object doInRabbit(Channel channel)\nthrows Exception {\nchannel.getConnection()\n\
  .addShutdownListener(new ShutdownListener() {\npublic void shutdownCompleted(\n\
  ShutdownSignalException cause) {\n// 处理关闭事件\n}\n});\nreturn null;\n}\n});\nreturn\
  \ template ;\n}\n```\n\n你可以只使用一个 `RabbitTemplate`，并将 `BlockedListener` 和 `ShutdownListener`\
  \ 添加到同一段代码中。\n\n## 更多特性\n\nSpring AMQP 模块提供了许多特性，要逐一解释每个特性可能需要一整本书。本节我将指出其中一些：\n\
  \n*   **事务**：Spring AMQP 允许你在代码中使用 `@Transactional` 注解，因此添加此注解后，Spring AMQP 模块会将通道设置为事务模式。然后它可以根据情况执行提交或回滚。你还可以通过定义一个\
  \ Bean 来指定要使用的事务管理器：\n\n    ```\n    @Transactional\n    public void processInvoice()\
  \ {\n    String incoming = rabbitTemplate.receiveAndConvert();\n    // 执行更多数据库处理...\n\
  \    String reply = reviewInvoice(incoming);\n    rabbitTemplate.convertAndSend(reply);\n\
  \    }\n    ```\n\n*   **多监听器**：Spring AMQP 1.5.0 及以上版本增加了一种新方式，允许一个类根据消息类型（如果需要）处理多个监听器。查看\
  \ `MultiListenerService` 代码。如果需要，你可以为方法添加 `@Payload`、`@Header` 和 `@Headers` 注解。\n\
  \n    ```\n    @Component\n    @RabbitListener(id=\"multi\", queues = \"${apress.amqp.queue}\"\
  )\n    public class MultiListenerService {\n    @RabbitHandler\n    @SendTo(\"${apress.amqp.reply-exchange-queue}\"\
  )\n    public Order processInvoice(Invoice invoice) {\n    Order order = new Order();\n\
  \    //在此处理发票...\n    order.setInvoice(invoice);\n    return order;\n    }\n   \
  \ @RabbitHandler\n    public Order processInvoiceWithTax(\n    InvoiceWithTax invoiceWithTax)\
  \ {\n    Order order = new Order();\n    //在此处理含税发票...\n    return order;\n    }\n\
  \    @RabbitHandler\n    public String itemProcess(\n    @Header(\"amqp_receivedRoutingKey\"\
  ) String routingKey,\n    @Payload Item item) {\n    //在此进行一些处理...\n    return \"\
  {\\\"message\\\": \\\"OK\\\"}\" ;\n    }\n    }\n    ```\n\n*   **重试**：有时你会遇到错误，无论是处理消息时还是代理端出错，你都需要在消费者级别进行重试。针对这种场景，你需要使用此特性：\n\
  \n    ```\n    // 消费者的重试，\n    // 通常这需要在容器中设置：\n    // container.setAdviceChain(new\
  \ Advice[] { interceptor() });\n    //\n    @Bean\n    public StatefulRetryOperationsInterceptor\
  \ interceptor() {\n    return RetryInterceptorBuilder.stateful()\n    .maxAttempts(3)\n\
  \    .backOffOptions(1000, 2.0, 10000)\n    .build();\n    }\n    ```\n\n*   或者这样：\n\
  \n    ```\n    @Bean\n    RetryOperationsInterceptor interceptor(\n    RabbitTemplate\
  \ template,\n    @Value(\"${apress.amqp.error-exchange:}\")String errorExchange,\n\
  \    @Value(\"${apress.amqp.error-routing-key}\")String\n    errorExchangeRoutingKey)\
  \ {\n    return RetryInterceptorBuilder.stateless()\n    .maxAttempts(3)\n    .recoverer(\n\
  \    new RepublishMessageRecoverer(template, errorExchange,\n    errorExchangeRoutingKey))\n\
  \    .build();\n    }\n    ```\n\n还有更多特性。请查阅 Spring AMQP 项目参考文档，以了解更多关于这些出色特性的信息。\n\
  \n\n\n## 货币项目\n\n你可以继续推进货币项目，并添加必要的逻辑，以便提供一种消费不同市场货币汇率消息的方式。你可以审查所有代码；代码已准备就绪，可直接使用。\n\
  \n使用演示程序发送汇率消息（演示程序在 [`http://projects.spring.io/spring-amqp/`](http://projects.spring.io/spring-amqp/)\
  \ 处包含所有必要代码）。\n\n## 总结\n\n本章讨论了 AMQP 模型，并解释了交换机、绑定和队列之间的区别。我们回顾了一些简单的示例，这些示例展示了创建生产者和消费者的方法。\n\
  \n你了解了 Spring AMQP 模块的一些出色特性，以及 Spring Boot 如何帮助你进行配置。\n\n使用 Spring 消息传递的好处之一是，所有\
  \ Spring 技术都使用相同的概念。我们发送消息的方式（生产者）；模板模式的使用（`JmsTemplate`、`RabbitTemplate` 等）；我们通过实现\
  \ `MessageListener` 接口或使用注解（如 `@JmsListener`、`@RabbitListener`、`@SendTo`，很快你还会看到\
  \ `@StreamListener`）来创建监听器（消费者）的方式；以及通过注解（如 `@Payload`、`@Header` 等）直接访问消息结构的方式——它们在构造上都是相似的。\n\
  \n请记住，这只是你使用 Spring AMQP 所能实现功能的一小部分，我需要写一整本关于 Spring AMQP 的书才能向你展示每一个特性。现在，你已经具备了创建出色\
  \ AMQP 应用所需的最低限度知识。\n\n下一章将介绍发布者/订阅者消息传递，但这次将使用 Redis 作为主要消息传递引擎。\n\n"
- "# 6. 使用 Redis 进行消息传递\n\n本章将向你展示如何将 Redis（远程字典服务器）与 Spring Boot 结合使用，作为消息代理。Redis\
  \ 是一个内存数据结构存储系统，可用作数据库、缓存和消息代理。它不仅存储键值对，还可用于存储复杂的数据类型，例如哈希、列表、集合、有序集合、位图、HyperLogLog\
  \ 和地理空间索引。\n\nSpring Boot 使用 Spring Data 模块，特别是 Redis 模块。换句话说，为了在你的项目中使用 Redis，你必须在\
  \ `pom.xml` 文件或 Gradle 中添加 `spring-boot-starter-redis` 依赖。然后，你将拥有连接到 Redis 服务器所需的所有必要依赖。\n\
  \n## Redis 作为消息代理\n\nRedis 不仅提供了一种存储数据结构的方式，还实现了发布/订阅消息传递范式。前面的章节已经用 JMS 解释过这种范式。\n\
  \n这里的重要部分将向你展示如何与 Redis 交互并启用消息代理。Redis 拥有通道的概念，消息将由发布者发送到通道。消息将被对一个或多个通道感兴趣的订阅者消费。如你所见，Redis\
  \ 中使用了 `channel` 关键字。Redis 中的通道相当于 JMS 世界中的主题。\n\nRedis 有几个命令允许你与发布/订阅功能进行交互：\n\n\
  *   `SUBSCRIBE`：告诉 Redis 订阅一个或多个特定通道。例如：\n\n    ```\n    127.0.0.1:6379> SUBSCRIBE\
  \ spring-boot-chat\n    ```\n\n    你可以通过列出多个通道并用空格分隔来同时订阅它们。\n*   `UNSUBSCRIBE`：取消订阅某个通道。此命令不需要参数。\n\
  *   `PUBLISH`：通过指定通道（作为第一个参数）和实际消息来发布消息。例如：\n\n    ```\n    127.0.0.1:6379> PUBLISH\
  \ spring-boot-chat \"Hi there\"\n    ```\n\n*   `PSUBSCRIBE`：此命令与 `SUBSCRIBE` 相同，但接受用于匹配多个通道的模式。例如：\n\
  \n    ```\n    127.0.0.1:6379> PSUBSCRIBE currency .*\n    ```\n\n    此示例将订阅任何以\
  \ `currency` 开头的通道，例如 `currency.us`、`currency.asia.jp`、`currency.eu.gb` 等。\n*  \
  \ `PUNSUBSCRIBE`：使用模式匹配取消订阅。例如：\n\n    ```\n    127.0.0.1:6379> PUNSUBSCRIBE currency.asia.*\n\
  \    ```\n\n*   `PING`：如果未提供参数，则返回 `PONG`。通常使用此命令来测试连接是否仍然存活。\n\n为了尝试一下，请确保你已安装\
  \ Redis 并且它正在运行。（你可以从 [`https://redis.io/download`](https://redis.io/download) 下载它。）打开一个新的终端窗口，并使用\
  \ `redis-cli` 命令与 Redis 交互。参见图 6-1。\n\n![A337882_1_En_6_Fig1_HTML.jpg](img/A337882_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1.\n\n使用发布/订阅命令与 Redis 交互\n\n图 6-1 向你展示了一种与 Redis 交互的简单方法，并说明了订阅和发布消息是多么容易。\n\
  \n本章不讨论 Redis 集群、哨兵、分片等。它专注于消息传递。许多客户广泛使用 Redis 作为消息代理和用于实时数据分析的 Web 会话管理工具。本章首先介绍如何使用\
  \ Spring Boot 和 Redis 进行消息传递。\n\n## 使用 Redis 进行发布/订阅消息传递\n\n如前所述，Spring Boot 将利用\
  \ Spring Data Redis 的强大功能，这与你已经熟悉的 Spring JMS 非常相似。Spring Boot 将配置必要的组件，例如连接、要使用的数据库（默认是\
  \ 0 号索引数据库）、集群节点（如果有）、连接池、哨兵、超时等。请记住，只需添加 `spring-boot-starter-redis` 即可启用 Redis\
  \ 的自动配置。\n\nSpring Data Redis 模块有两个主要的消息传递领域——消息的生产或发布，以及消息的消费或订阅。对于消息发布，它使用 `RedisTemplate<K,V>`\
  \ 类（它使用了模板设计模式）；对于订阅，它有一个专用的异步消息监听器容器（一个 MDP——消息驱动的 POJO）。对于同步消息，它使用 `RedisConnection`\
  \ 接口契约。以下各节仅涵盖异步订阅。\n\n在本章中，我们将使用两个项目：`redis-demo` 和 `rest-api-redis`。`redis-demo`\
  \ 项目包含完成和补充货币项目所需的所有代码。\n\n\n\n### 订阅者\n\n作为 Redis 订阅者，你可以通过固定名称或模式匹配来订阅一个或多个频道（或主题）。Spring\
  \ Data Redis 模块提供了通过 `RedisConnection` 进行底层订阅的方式，其中包括 `subscribe` 和 `pSubscribe`\
  \ 方法。\n\n对于简单的监听器，底层订阅需要一种处理连接和线程管理的方式。现在想象一下有多个监听器的情况。你可能会认为实现这个功能很麻烦，但 Spring\
  \ Data Redis 包含了 `RedisMessageListenerContainer` 类，它承担了所有繁重的工作，并支持消息驱动的 POJO（MDP）。换句话说，你可以创建自己的类和方法来接收并处理消息。这意味着你需要使用\
  \ `MessageListenerAdapter` 类来使用此功能。不过别担心，接下来我将向你展示如何操作。\n\n打开 `redis-demo` 项目，查看\
  \ `com.apress.messaging.config.RedisConfig` 类，如代码清单 6-1 所示。\n\n```\n@Configuration\n\
  @EnableConfigurationProperties(SimpleRedisProperties.class)\npublic class RedisConfig\
  \ {\n@Bean\npublic RedisMessageListenerContainer\ncontainer(RedisConnectionFactory\
  \ connectionFactory,\nMessageListenerAdapter listenerAdapter,\n@Value(\"${apress.redis.topic}\"\
  ) String topic) {\nRedisMessageListenerContainer container = new\nRedisMessageListenerContainer();\n\
  container.setConnectionFactory(connectionFactory);\ncontainer.addMessageListener(listenerAdapter,\n\
  new PatternTopic(topic));\nreturn container;\n}\n@Bean\nMessageListenerAdapter listenerAdapter(\n\
  Subscriber subscriber) {\nreturn new MessageListenerAdapter(subscriber);\n}\n}\n\
  代码清单 6-1.\ncom.apress.messaging.config.RedisConfig.java\n```\n\n代码清单 6-1 展示了我们将用于订阅频道的配置。让我们更详细地看看代码：\n\
  \n*   `RedisMessageListenerContainer`：这是一个承担所有繁重工作的类，充当消息监听器容器，将从 Redis 频道（主题）接收消息。你需要设置连接工厂和将处理接收到的消息的消息监听器。请记住，此监听器容器负责所有线程处理和消息分发。\n\
  *   `RedisConnectionFactory`：此接口对于 `RedisMessageListenerContainer` 是必需的，它保存了所有关于\
  \ Redis 连接的信息。由于它是方法的一部分，Spring 会自动装配它，因此你无需手动创建。在幕后，Spring Boot 会为你处理此配置。\n*  \
  \ `MessageListenerAdapter`：此类是一个适配器，它将传入的消息委托给一个符合 `MessageListener` 签名的声明类。你可以看到，这是通过调用\
  \ `container.addMessageListener` 方法，并将订阅者（`listenerAdapter` - `MessageListenerAdapter`）和主题（`PatternTopic`）作为参数传递来设置的。\n\
  *   `PatternTopic`：这是一个类，是消息监听器所需的参数之一。它通常保存主题的名称或用于订阅正确频道的名称模式。\n\n接下来，让我们看看 `Subscriber`\
  \ 类。打开 `com.apress.messaging.redis.Subscriber` 类，如代码清单 6-2 所示。\n\n```\n@Component\n\
  public class Subscriber {\npublic void handleMessage(String message){\n// 在此处处理消息\
  \ ...\n}\n}\n代码清单 6-2.\ncom.apress.messaging.redis.Subscriber.java\n```\n\n代码清单\
  \ 6-2 展示了 `Subscriber` 类，它只有一个必需的方法（`handleMessage`）。`Subscriber` 类是消息委托的适配器。换句话说，`MessageListenerAdapter`\
  \ 兼容以下签名：\n\n```\nvoid handleMessage(String message);\nvoid handleMessage(Map message);\n\
  void handleMessage(byte[] message);\nvoid handleMessage(Serializable message);\n\
  //你可以获取使用的频道或模式\nvoid handleMessage(Serializable message, String channel);\nvoid\
  \ handleMessage(byte[] bytes, String pattern);\n//你可以使用自己的对象\nvoid handleMessage(MyOwnDomainObject\
  \ obj);\n```\n\n有时，你的适配器类可能会有更多的方法来执行额外的处理或被外部调用。在这些情况下，你可以通过在 `MessageListenerAdapter`\
  \ 的构造函数中添加一个额外参数，来告知它你想要使用哪个方法。例如：\n\n```\n@Component\npublic class Subscriber {\n\
  public void shipping(Order order){\n// 在此处处理订单 ...\n}\n//此方法用作 Redis 主题的监听器\npublic\
  \ void processTicket(String message){\n// 在此处处理消息 ...\n}\n// ... 更多方法\n}\n// RedisConfig.java\n\
  @Bean\nMessageListenerAdapter listenerAdapter(Subscriber subscriber) {\nreturn new\
  \ MessageListenerAdapter(subscriber,\"processTicket\");\n}\n```\n\n将用于处理来自 Redis\
  \ 主题的传入消息的方法名称添加到构造函数中；在此示例中，即 `processTicket` 方法。\n\n如你所见，使用 `MessageListenerAdapter`\
  \ 的好处是你的 `POJO` 类没有依赖关系，从而使你的应用程序更具可扩展性。\n\n\n\n### 发布者\n\n本节介绍如何向频道（主题）发布消息。在 Redis\
  \ 中发布消息有两种选择：你可以使用低层次的 `RedisConnection` 类，也可以使用高层次的 `RedisTemplate` 类（请记住，它与 `JmsTemplate`\
  \ 和 `RabbitTemplate` 非常相似）。这两个接口都提供了发布方法 `connection.publish(msg,channel)`。同时，你也需要确定频道（主题）。\n\
  \n使用 `RedisTemplate` 的好处在于，你可以定义序列化/反序列化策略。该方法隐藏了调用原始方法的复杂性，并且是线程安全的。\n\n让我们直接进入代码。打开清单\
  \ 6-3 中所示的 `com.apress.messaging.RedisDemoApplication` 类。\n\n```\n@SpringBootApplication\n\
  public class RedisDemoApplication {\npublic static void main(String[] args) {\n\
  SpringApplication.run(RedisDemoApplication.class, args);\n}\n@Bean\nCommandLineRunner\
  \ sendMessage(StringRedisTemplate template,\n@Value(\"${apress.redis.topic}\")String\
  \ topic){\nreturn args -> {\ntemplate.convertAndSend(topic,\n\"Hello Redis with\
  \ Spring Boot!\");\n};\n}\n}\n清单 6-3.\ncom.apress.messaging.RedisDemoApplication.java\n\
  ```\n\n清单 6-3 展示了主应用程序类。如你所知，一旦 Spring Boot 完成自动配置，它将执行 `sendMessage` 方法。该方法会自动注入\
  \ `StringRedisTemplate`，并通过 `application.properties` 文件中 `apress.redis.topic=spring-boot-chat`\
  \ 键提供的值来获取主题。然后，它将使用模板，通过 `template.convertAndSend` 方法发送一条消息，该方法接受主题和消息作为参数。\n\n\
  通常你需要使用 `RedisTemplate`，但在这个例子中，我们使用的是 `StringRedisTemplate`。我们这样做是因为 `RedisTemplate`\
  \ 被定义为 `RedisTemplate<K,V>`，其中 `K` 是 Redis 键类型（通常是一个字符串），`V` 是 Redis 值类型（即消息）。而\
  \ `StringRedisTemplate` 是一个使用字符串的子类。换句话说，它类似于创建一个 `RedisTemplate<String,String>`\
  \ 对象。\n\n有趣的是，`StringRedisTemplate` 为不同的操作定义了多种字符串序列化器，这些操作适用于不同的数据结构，例如 `Set` 和\
  \ `Hash` 的键/值。\n\n现在，如果你运行该项目（请确保 `redis-server` 已启动并正在运行），你将看到如图 6-2、6-3 和 6-4\
  \ 所示的订阅者日志。\n\n![A337882_1_En_6_Fig4_HTML.jpg](img/A337882_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4.\n\nredis-cli 订阅\n\n![A337882_1_En_6_Fig3_HTML.jpg](img/A337882_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3.\n\nredis-cli 监控命令\n\n![A337882_1_En_6_Fig2_HTML.jpg](img/A337882_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2.\n\n项目日志\n\n图 6-2 向你展示了日志。这些日志由包含一个环绕 AOP 通知的 `RedisAudit` 类生成。如你所见，它使用了\
  \ `Subscriber` 类（监听器适配器）和接收字符串消息的 `handleMessage` 方法。\n\n图 6-3 显示了带有 Redis 客户端的终端。监控器在执行代码之前显示，仅用于判断\
  \ Redis 是否接受消息。如你所见，Redis 显示了在 `redis-server` 中执行的命令——在本例中，是 `PSUBSCRIBE` 和 `PUBLISH`，当然还有一个用于检查客户端与服务器之间连接的\
  \ `PING` 命令。\n\n图 6-4 显示了另一个终端窗口，我们在此订阅了 `spring-boot-chat` 频道/主题。运行项目后，它将打印出消息。这是确保你的\
  \ `redis-server` 正在运行的另一种方式，并且你可以为一个频道/主题设置多个订阅者。\n\n### JSON 序列化\n\n现在，回到序列化/反序列化，回想一下我们正在使用\
  \ JSON 格式。你需要做什么才能使发布者/订阅者使用 JSON，并将其序列化/反序列化为自定义对象呢？\n\n如果你遵循之前模块（JMS 和 RabbitMQ）的相同思路，回答这个问题会更容易，因为你可以在这里应用相同的概念。\n\
  \n让我们从修改 `RedisConfig` 类开始，如清单 6-4 所示。\n\n```\n@Configuration\n@EnableConfigurationProperties(SimpleRedisProperties.class)\n\
  public class RedisConfig {\n@Bean\npublic RedisMessageListenerContainer container(\n\
  RedisConnectionFactory connectionFactory,\nMessageListenerAdapter rateListenerAdapter,\n\
  @Value(\"${apress.redis.rate}\") String topic) {\nRedisMessageListenerContainer\
  \ container =\nnew RedisMessageListenerContainer();\ncontainer.setConnectionFactory(connectionFactory);\
  \ container.addMessageListener(rateListenerAdapter,\nnew PatternTopic(topic));\n\
  return container;\n}\n@Bean\nMessageListenerAdapter rateListenerAdapter(\nRateSubscriber\
  \ subscriber) {\nMessageListenerAdapter messageListenerAdapter =\nnew MessageListenerAdapter(subscriber);\n\
  messageListenerAdapter.setSerializer(\nnew Jackson2JsonRedisSerializer(Rate.class));\n\
  return messageListenerAdapter;\n}\n@Bean\nRedisTemplate\nredisTemplate(RedisConnectionFactory\
  \ connectionFactory){\nRedisTemplate redisTemplate =\nnew RedisTemplate();\nredisTemplate.setConnectionFactory(connectionFactory);\n\
  redisTemplate.setDefaultSerializer(\nnew Jackson2JsonRedisSerializer(Rate.class));\n\
  redisTemplate.afterPropertiesSet();\nreturn redisTemplate;\n}\n}\n清单 6-4.\ncom.apress.messaging.config.RedisConfig.java\n\
  ```\n\n清单 6-4 向你展示了修改后的 `RedisConfig` 类。与之前的版本相比，有什么区别？`RedisMessageListenerContainer`\
  \ bean 是相同的，只是现在我们还使用了 `rateListenerAdapter` bean。让我们回顾一下这个清单：\n\n*   `MessageListenerAdapter`：这与之前相同，但这里我们设置了一个新的类适配器，在本例中是\
  \ `RateSubscriber`。需要注意的是，我们通过调用 `setSerializer` 方法设置了一个序列化器，并使用 `Rate` 类作为对象映射器实例化了一个\
  \ `Jackson2JsonRedisSerializer` 对象。\n*   `RedisTemplate` `<String,Rate>`：如你所见，我们定义了这个\
  \ bean 以返回一个 `RedisTemplate`，其中键是字符串，值是 `Rate` 类。还要注意，我们通过调用 `setDefaultSerializer`\
  \ 方法设置了一个序列化器，并且使用了与之前相同的类 `Jackson2JsonRedisSerializer`。\n\n看一下清单 6-5 中所示的 `RateSubscriber`\
  \ 类。\n\n```\n@Component\npublic class RateSubscriber {\npublic void handleMessage(Rate\
  \ rate){\n// 在此处处理消息...\n}\n}\n清单 6-5.\ncom.apress.messaging.redis.RateSubscriber.java\n\
  ```\n\n清单 6-5 向你展示了 `RateSubscriber` 类。与之前的示例相比，没有任何变化。`handleMessage` 方法将接收一条 `Rate`\
  \ 消息。现在，让我们看一下清单 6-6 中所示的发布者。\n\n```\n@SpringBootApplication\npublic class RedisDemoApplication\
  \ {\npublic static void main(String[] args) {\nSpringApplication.run(RedisDemoApplication.class,\
  \ args);\n}\n@Bean\nCommandLineRunner sendRateMessage(\nRedisTemplate template,\n\
  @Value(\"${apress.redis.rate}\")String topic){\nreturn args -> {\ntemplate.convertAndSend(topic,\n\
  new Rate(\"MX\",21.17F,new Date()));\n};\n}\n}\n清单 6-6.\ncom.apress.messaging.RedisDemoApplication.java\n\
  ```\n\n清单 6-6 向你展示了主应用程序。将这个类与之前的版本进行比较，发生了什么变化？我们使用了 `RedisTemplate` 类，并将 `Rate`\
  \ 作为值。我们还通过创建一个新的 `Rate` 对象，将 `Rate` 类用作消息。\n\n\n\n现在您可以运行项目并查看日志。请参见图 6-5、6-6 和\
  \ 6-7。\n\n![A337882_1_En_6_Fig7_HTML.jpg](img/A337882_1_En_6_Fig7_HTML.jpg)\n\n\
  图 6-7.\n\nredis-cli 订阅者\n\n![A337882_1_En_6_Fig6_HTML.jpg](img/A337882_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6.\n\nredis-cli 监视器\n\n![A337882_1_En_6_Fig5_HTML.jpg](img/A337882_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5.\n\nRateSubscriber 日志\n\n图 6-5 展示了`RateSubscriber`处理消息时的日志。请记住，在后台，为了获取对象，会进行序列化/反序列化操作。\n\
  \n图 6-6 展示了一个运行着 Redis 客户端监视器的终端。其目的是展示发布的方法是一个 JSON 格式的字符串，这意味着`Jackson2JsonRedisSerializer`对`Rate`类执行了序列化。\n\
  \n图 6-7 展示了一个订阅了`currency-rate`频道/主题的终端。请注意，该订阅者接收到的`Rate`消息是 JSON 字符串格式。\n\n如果您将这些结果与之前的\
  \ Spring 模块（JMS 和 AMQP）进行比较，您会发现我们正在做同样的事情。尽管这个 Spring Data Redis 模块没有用于简化发布/订阅模式的注解，但也能轻松快速地启动并运行起来。\n\
  \n## 货币项目\n\n现在您已拥有完成货币项目所需的所有必要信息。请先查看`RateRedisSubscriber`、`RateRedisConfig`和`RateRedisProperties`这几个类。您可以复用`demo`项目来向频道/主题发布消息。\n\
  \n注意\n\n请记住，在运行货币项目之前，确保`redis-server`已启动并正在运行，这一点很重要。\n\n## 总结\n\n本章讨论了发布/订阅消息传递模式，并展示了\
  \ Redis 开箱即用地提供了此功能。它非常易于使用。本章向您展示了 Spring Boot 如何通过简单地添加`spring-boot-starter-redis`来轻松配置您的发布者和订阅者。\n\
  \n您了解了如何发布和监听传入的消息，并且您看到 Spring Data Redis 模块使用`RedisTemplate`（与 Spring JMS 和 Spring\
  \ AMQP 模块行为相同）的方式与发布者和订阅者非常相似。\n\n尽管本章篇幅较短，但它为您提供了使用 Redis 作为内存消息代理的起点。\n\n下一章将介绍\
  \ WebSocket，这是使用 Spring Boot 进行消息传递的另一种方式。\n\n"
- "# 7. Web 消息传递\n\n本章介绍 Spring Boot 中的 WebSocket，并描述这项技术如何帮助您在应用程序之间，甚至在同一应用程序的多个实例之间实现消息传递。\n\
  \n在讨论 Web 应用程序时，我们可以说 REST 是另一种消息传递方式，事实也确实如此。在本章中，我们将重点讨论一种有状态的通信方式，这正是 WebSocket\
  \ 所带来的。\n\n## WebSocket\n\nWebSocket 是一种支持双向通信的协议，通常用于 Web 浏览器。该协议首先通过握手（通常是 HTTP\
  \ 请求）开始，然后通过 TCP 发送基本消息帧（协议切换）。WebSocket 的理念是避免像 AJAX（`XMLHttpRequest`）、iframe 或长轮询那样的多次\
  \ HTTP 连接。请参见图 7-1。\n\n![A337882_1_En_7_Fig1_HTML.gif](img/A337882_1_En_7_Fig1_HTML.gif)\n\
  \n图 7-1.\n\nTCP/WebSocket\n\n## 在 Spring 中使用 WebSocket\n\n在我们深入了解如何在 Spring Boot\
  \ 中使用 WebSocket 之前，重要的是要知道并非所有浏览器都支持这项技术。请访问[`http://caniuse.com/websockets`](http://caniuse.com/websockets)了解哪些浏览器已准备好支持\
  \ WebSocket。\n\nSpring Framework 4 版本包含一个新的`spring-websocket`模块，该模块支持 WebSocket；它也与\
  \ Java 规范 JSR-356 兼容。该模块还提供了回退选项，可以在必要时模拟 WebSocket API（请记住，并非所有浏览器都支持 WebSocket）。它为此任务使用了\
  \ SockJS 协议。您可以在[`https://github.com/sockjs/sockjs-protocol`](https://github.com/sockjs/sockjs-protocol)获取更多相关信息。\n\
  \n同样值得一提的是，在初始握手（我们使用 SockJS 的 HTTP 阶段）之后，通信会切换到 TCP 连接（这意味着您只发送字节流——文本或二进制）。因此，您可以使用任何类型的消息传递架构，例如异步或事件驱动的消息传递。在此层面上，您可以使用像\
  \ STOMP（简单/流式文本定向消息协议）这样的子协议，它允许您拥有客户端和服务器都能理解的更好的消息格式。请参见图 7-2。\n\n![A337882_1_En_7_Fig2_HTML.gif](img/A337882_1_En_7_Fig2_HTML.gif)\n\
  \n图 7-2.\n\n使用 Spring 的 WebSocket\n\n图 7-2 展示了如何使用 Spring 实现 WebSocket，以及客户端所需的组件。\n\
  \n\n\n### 底层 WebSocket\n\n在深入探讨回退方案（SockJS）和子协议（STOMP）之前，我们先来看看如何将 Spring Boot 与底层\
  \ WebSocket 结合使用。\n\n在本书的源代码中，请进入第 7 章，并打开两个项目（你可以将它们导入到你喜欢的 IDE 中，或使用任何文本编辑器）。在接下来的部分中，我们将使用\
  \ `websocket-demo` 项目。\n\n我们先从分析配置开始。为了使用底层 WebSocket 通信，我们需要实现 `org.springframework.web.socket.config.annotation.WebSocketConfigurer`\
  \ 接口。打开 `com.apress.messaging.config.LlWebSocketConfig` 类，如代码清单 7-1 所示。\n\n```\n\
  @Configuration\n@EnableWebSocket\npublic class LlWebSocketConfig implements WebSocketConfigurer{\n\
  LlWebSocketHandler handler;\npublic LlWebSocketConfig(LlWebSocketHandler handler){\n\
  this.handler = handler;\n}\n@Override\npublic void registerWebSocketHandlers(\n\
  WebSocketHandlerRegistry registry) {\nregistry.addHandler(this.handler, \"/llws\"\
  );\n}\n}\n代码清单 7-1.\ncom.apress.messaging.config.LlWebSocketConfig.java\n```\n\n\
  代码清单 7-1 展示了在 Spring 中启用 WebSocket 所需的配置。请记住，我们这样配置该类是为了实现底层 WebSocket 通信。让我们回顾一下所使用的组件：\n\
  \n*   `@EnableWebSocket`：这是启用和配置 WebSocket 请求所必需的。\n*   `WebSocketConfigurer`：这是一个接口，定义了用于配置\
  \ WebSocket 请求处理的回调方法。通常你需要实现 `registerWebSocketHandlers` 方法。\n*   `registerWebSocketHandlers`：需要通过添加用于处理\
  \ WebSocket 请求的处理器来实现此方法。在此方法中，我们注册了一个处理器（`LlWebSocketHandler`）实例，并传入了用于握手和通信的端点。\n\
  *   `WebSocketHandlerRegistry`：这是一个用于注册 `WebSocketHandler` 实现的接口。我们将使用一个 `TextWebSocketHandler`\
  \ 实现，并在下一节中查看其代码。\n\n如你所见，使用 Spring 配置底层 WebSocket 非常简单。接下来，让我们打开 `com.apress.messaging.web.socket.LlWebSocketHandler`\
  \ 类。参见代码清单 7-2。\n\n```\n@Component\npublic class LlWebSocketHandler extends TextWebSocketHandler{\n\
  @Override\npublic void afterConnectionEstablished(\nWebSocketSession session) throws\
  \ Exception {\nsuper.afterConnectionEstablished(session);\n}\n@Override\nprotected\
  \ void handleTextMessage(\nWebSocketSession session, TextMessage message)\nthrows\
  \ Exception {\nSystem.out.println(\">>>> \" + message);\n}\n}\n代码清单 7-2.\ncom.apress.messaging.web.socket.LlWebSocketHandler.java\n\
  ```\n\n代码清单 7-2 展示了我们将用于接收来自客户端消息的 WebSocket 处理器。让我们来检查这个类：\n\n*   `TextWebSocketHandler`：这是一个具体类，通过\
  \ `AbstractWebSocketHandler` 类实现了 `WebSocketHandler` 接口。此实现仅用于处理文本消息。我们将重写两个方法：`afterConnectionEstablished`\
  \ 和 `handleTextMessage`。\n*   `afterConnectionEstablished`：当客户端使用 WebSocket 协议成功连接时，会调用此方法。在此方法中，你可以使用\
  \ `WebSocketSession` 实例来发送或接收消息。目前，我们将使用其默认行为，但我们会在日志中（通过 AOP `WebSocketsAudit`\
  \ 类）看到更多信息。\n*   `handleTextMessage`：此方法接收一个 `WebSocketSession`（我们稍后会用到）和一个 `TextMessage`\
  \ 实例。`TextMessage` 实例管理字节流并将其转换为字符串。\n\n到目前为止，我们已经实现了服务器端，但客户端呢？通常，你会有一个网页来执行客户端的工作。\n\
  \n打开 `src/main/resources/static/llws.html` 文件，如代码清单 7-3 所示。\n\n```\n$(function(){\n\
  var connection = new\nWebSocket('ws://localhost:8080/llws');\nconnection.onopen\
  \ = function () {\nconsole.log('Connected...');\n};\nconnection.onmessage = function(event){\n\
  console.log('>>>>> ' + event.data);\nvar json = JSON.parse(event.data);\n$(\"#output\"\
  ).append(\"\"\n+ json.user\n+ \": \"\n+ json.message\n+ \"\");\n};\nconnection.onclose\
  \ = function(event){\n$(\"#output\").append(\"CONNECTION: CLOSED\");\n};\n$(\"#send\"\
  ).click(function(){\nvar message = {}\nmessage[\"user\"] = $(\"#user\").val();\n\
  message[\"message\"] = $(\"#message\").val();\nconnection.send(JSON.stringify(message));\n\
  });\n});\n\n代码清单 7-3.\nllws.html 片段\n```\n\n代码清单 7-3 仅展示了重要代码的 JavaScript 片段，我将在下面进行解释：\n\
  \n*   `WebSocket`：这是 JavaScript 引擎的一部分，它将连接到指定的 URI。请注意，模式是 `ws`，并且我们使用的是在配置类中指定的\
  \ `/llws` 端点（参见代码清单 7-1）。\n*   `onopen`：这是一个回调函数，在与服务器建立连接时执行。请注意，我们只是将一条字符串记录到控制台。\n\
  *   `onmessage`：这是一个回调函数，在从服务器接收到消息时执行。在这种情况下，我们将 `event.data` 解析为一个 JSON 对象。\n\
  *   `onclose`：这是一个回调函数，在与服务器的连接关闭或丢失时执行。\n*   `$.click`/`send`：这是一个附加到“发送”按钮的回调函数，在点击按钮时被调用。这里我们使用了\
  \ `send` 方法，它将发送消息对象的 JSON 字符串。\n\n接下来，让我们运行 `websocket-demo` 项目；启动后，打开浏览器并访问 `http://localhost:8080/llws.html`。你应该会看到类似于图\
  \ 7-3 的内容。\n\n![A337882_1_En_7_Fig3_HTML.jpg](img/A337882_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3.\n\nhttp://localhost:8080/llws.html\n\n在浏览器中访问 `llws.html` 后，查看应用程序日志。你应该会看到类似于图\
  \ 7-4 的内容。\n\n![A337882_1_En_7_Fig4_HTML.jpg](img/A337882_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4.\n\nwebsocket-demo 项目日志\n\n图 7-4 展示了日志，其中 `afterConnectionEstablished` 正在从\
  \ `LlWebSocketHandler` 类中被调用。这意味着客户端已成功连接到服务器。你也可以查看浏览器的开发者控制台，看看显示字符串 `Connected...`\
  \ 的日志。参见图 7-5。\n\n![A337882_1_En_7_Fig5_HTML.jpg](img/A337882_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5.\n\n浏览器控制台\n\n接下来，你可以通过修改 `llws.html` 页面中的用户和消息输入框，并点击“发送”按钮来发送消息。点击“发送”按钮后，你应该会看到类似于图\
  \ 7-6 的内容。\n\n![A337882_1_En_7_Fig6_HTML.jpg](img/A337882_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6.\n\n点击发送后的 websocket-demo 项目日志\n\n图 7-6 展示了发送消息后的日志以及 `handleTextMessage`\
  \ 方法的打印输出。\n\n这个示例向你展示了如何将消息从客户端发送到服务器。现在，让我们从服务器做一个响应，即回声。你需要在 `handleTextMessage`\
  \ 中添加一些内容来处理回复。\n\n将 `handleTextMessage` 修改为如下所示：\n\n```\n@Override\npublic void\
  \ handleTextMessage(\nWebSocketSession session,\nTextMessage message) throws Exception\
  \ {\nSystem.out.println(\">>>> \" + message);\nsession.sendMessage(message);\n}\n\
  ```\n\n\n\n如您所见，我们使用 `session` 实例来调用 `sendMessage`，这意味着我们将使用已连接客户端的同一会话进行回复。\n\n\
  重启 `websocket-demo` 项目并刷新 `llws.html` 页面。然后通过填写用户和消息输入框来发送一条消息。您应该会在“来自服务器的回显消息”面板中看到响应，如图\
  \ 7-7 所示。请注意，如果您使用的是 STS，只需等待项目自行重启即可；这要归功于 `spring-boot-devtools`。\n\n![A337882_1_En_7_Fig7_HTML.jpg](img/A337882_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7.\n回显服务器响应\n\n如果您停止应用程序，您将在“来自服务器的回显消息”面板中看到类似图 7-8 的内容。\n\n![A337882_1_En_7_Fig8_HTML.jpg](img/A337882_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8.\n连接已关闭\n\n如您所见，创建低层级的 WebSockets 应用程序非常简单。如果您需要从 Spring 应用程序发送消息，会发生什么？换句话说，您的应用程序需要充当客户端。您可以将以下代码添加到您的应用程序中（参见清单\
  \ 7-4）。\n\n```\nStandardWebSocketClient client = new StandardWebSocketClient();\n\
  ListenableFuture future =\nclient.doHandshake(handler,\nnew WebSocketHttpHeaders(),\n\
  new URI(\"ws://localhost:8080/ws-server\"));\nWebSocketSession session = future.get();\n\
  WebSocketMessage message =\nnew TextMessage(\"Hello there...\");\nsession.sendMessage(message)\
  \ ;\n清单 7-4.\nWebSockets 客户端——WebSocketDemoApplication 类的代码片段\n```\n\n清单 7-4 展示了如果您想创建一个\
  \ WebSockets 客户端（而不是 HTML 网页）所需添加的代码片段。这里我们使用了 `StandardWebSocketClient`（一个低层级的\
  \ WebSockets 协议），并手动执行握手。它将处理器、一些标头以及您将要连接的 URI 传递给它。（请注意，您可以使用之前的处理器或创建自己的处理器，然后实现\
  \ `afterConnectionEstablished` 方法来检查是否成功连接。）然后您会获得一个 `WebSocketSession` 实例，并可以发送消息。\n\
  \n您可以看到，使用 Spring 类来操作 WebSockets 客户端是一种直接的实现方式。接下来，让我们开始使用 SockJS 和 STOMP 子协议的回退选项。\n\
  \n### 使用 SockJS 和 STOMP\n\n为什么我们需要使用 SockJS 和 STOMP？请记住，并非所有浏览器都支持 WebSockets，并且通常客户端和服务器必须就如何处理消息达成一致。当然，这不是正确的消息传递方式，因为我们希望实现一种解耦的场景，即客户端不依赖于服务器。\n\
  \nSockJS 有助于模拟 WebSockets 并执行初始握手。然后，通过使用 STOMP，我们可以以一种可互操作的线路格式进行回复，这使我们能够使用支持此协议的多个代理。\n\
  \n#### 聊天室应用程序\n\n我们将继续使用 `websocket-demo` 项目，但我们将使用不同的文件和类。此示例创建了一个聊天室，这是 WebSockets\
  \ 技术非常常见的用途。\n\n首先，让我们看看如何配置项目以使用 SockJS 和 STOMP。打开 `com.apress.messaging.config.WebSocketConfig`\
  \ 类。参见清单 7-5。\n\n```\n@Configuration\n@EnableWebSocketMessageBroker\n@EnableConfigurationProperties(SimpleWebSocketsProperties.class)\n\
  public class WebSocketsConfig extends\nAbstractWebSocketMessageBrokerConfigurer\
  \ {\nSimpleWebSocketsProperties props;\npublic WebSocketsConfig(SimpleWebSocketsProperties\
  \ props){\nthis.props = props;\n}\n@Override\npublic void registerStompEndpoints(\n\
  StompEndpointRegistry registry) {\nregistry.addEndpoint(props.getEndpoint()).withSockJS();\n\
  }\n@Override\npublic void configureMessageBroker(\nMessageBrokerRegistry config)\
  \ {\nconfig.enableSimpleBroker(props.getTopic());\nconfig.setApplicationDestinationPrefixes(\n\
  props.getAppDestinationPrefix()) ;\n}\n}\n清单 7-5.\ncom.apress.messaging.config.WebSocketConfig.java\n\
  ```\n\n清单 7-5 展示了使用 SockJS 和 STOMP 配置 WebSockets 所需的配置。让我们回顾一下：\n\n*   @`EnableWebSocketMessageBroker`：此注解是必需的，用于启用通过\
  \ WebSockets 使用更高级别的消息子协议（SockJS/STOMP）进行代理后端消息传递。\n*   `AbstractWebSocketMessageBrokerConfigurer`：此类实现了\
  \ `WebSocketMessageBrokerConfigurer`，用于配置使用来自 WebSockets 客户端的简单消息协议（如 STOMP）进行消息处理。\n\
  *   `registerStompEndpoints`：调用此方法来注册 STOMP 端点，将每个端点映射到特定的 URL，并配置 SockJS 回退选项。\n\
  *   `StompEndpointRegistry`：这是一个用于注册基于 WebSockets 的 STOMP 端点的契约。它提供了一个流畅的 API 来构建注册表。\n\
  *   `withSockJS`：此方法将启用握手所需的 SockJS 回退选项。\n*   `configureMessageBroker`：调用此方法来配置消息代理选项。在这种情况下，我们使用的是\
  \ `MessageBrokerRegistry`。\n*   `MessageBrokerRegistry`：此实例将帮助配置所有代理选项。我们使用 `enableSimpleBroker`，它接受一个或多个前缀来过滤目标代理。这将与带有\
  \ `@SendTo` 注解的方法一起使用。我们还使用 `setApplicationDestinationPrefixes` 来配置一个或多个前缀，以过滤目标应用程序注解方法。换句话说，它将查找带有\
  \ `@MessageMapping` 注解的方法。\n\n您可以看到，我们需要添加一个端点、一个代理以及前缀路径，以使用 SockJS 和 STOMP 配置\
  \ WebSockets。请查看图 7-9。\n\n![A337882_1_En_7_Fig9_HTML.gif](img/A337882_1_En_7_Fig9_HTML.gif)\n\
  \n图 7-9.\n使用 SockJS 和 STOMP 的客户端/服务器 WebSockets\n\n图 7-9 向您展示了客户端和服务器之间通信的总体情况。接下来，打开\
  \ `com.apress.messaging.controller.SimpleController` 类。参见清单 7-6。\n\n```\n@Controller\n\
  public class SimpleController {\n@MessageMapping(\"${apress.ws.mapping}\")\n@SendTo(\"\
  /topic/chat-room\")\npublic ChatMessage chatRoom(ChatMessage message) {\nreturn\
  \ message;\n}\n}\n清单 7-6.\ncom.apress.messaging.controller.SimpleController.java\n\
  ```\n\n清单 7-6 通过使用新的注解向您展示了接收器和发送器。请记住，该项目现在将运行一个聊天室，因此不同的客户端可以连接并接收来自其他用户的消息。\n\
  \n\n\n*   `@MessageMapping`：此注解与应用前缀有关，意味着客户端需要向 `prefix + mapping` 发送消息。在本例中，即\
  \ `/my-app/chat-room`。该注解由 `@Controller` 类中的方法支持，其值可视为 ant 风格、以斜杠分隔的路径模式。与此注解配合，你还可以使用其他注解作为方法参数，包括\
  \ `@Payload`、`@Header`、`@Headers`、`@DestinationVariable` 和 `java.security.Principal`。\n\
  *   `@SendTo`：你已经了解此注解；它与我们在 JMS 和 RabbitMQ 章节中使用的注解相同。在此场景下，该注解用于将消息发送到任何其他目的地。\n\
  \n尽管我们没有使用 `@SubscribeMapping`，但你可以在 `@Controller` 注解的类中，将其用于你想要处理传入消息的方法上。当你需要通过\
  \ `@SendTo` 获取响应副本时，这通常会很有用。\n\n另一个我们未使用的工具类是 `SimpleMessagingTemplate`。它可用于发送消息。例如：\n\
  \n```\n@Controller\npublic class AnotherController {\nprivate SimpMessagingTemplate\
  \ template;\n@Autowired\npublic AnotherController(SimpMessagingTemplate template)\
  \ {\nthis.template = template;\n}\n@RequestMapping(path=\"/rate/new\", method=POST)\n\
  public void newRates(Rate rate) {\nthis.template.convertAndSend(\"/topic/new-rate\"\
  , rate);\n}\n}\n```\n\n如你所见，使用 WebSockets 技术实现订阅者/发布者模型非常简单。`AnotherController`\
  \ 通过发送消息（`ChatMessage`）也充当了客户端角色。\n\n接下来，让我们看看另一个客户端。打开 `src/main/resources/static/sockjs-stomp.html`\
  \ 页面。参见代码清单 7-7。\n\n```\n$(function(){\nvar socket =\nnew SockJS('http://localhost:8080/stomp-endpoint');\n\
  var stompClient = Stomp.over(socket);\nstompClient.connect({}, function (frame)\
  \ {\nconsole.log('Connected: ' + frame);\nstompClient.subscribe('/topic/chat-room',\n\
  function (data) {\nconsole.log('>>>>> ' + data);\nvar json = JSON.parse(data.body);\n\
  $(\"#output\")\n.append(\"\"\n+ json.user\n+ \": \"\n+ json.message\n+ \"\");\n\
  });\n});\n$(\"#send\").click(function(){\nvar chatMessage = {}\nchatMessage[\"user\"\
  ] = $(\"#user\").val();\nchatMessage[\"message\"] = $(\"#message\").val();\nstompClient.send(\n\
  \"/my-app/chat-room\",\n{},\nJSON.stringify(chatMessage));\n});\n});\n代码清单 7-7.\n\
  sockjs-stomp.html 代码片段\n```\n\n代码清单 7-7 展示了 JavaScript 客户端。我们来分析一下：\n\n*   `SockJS`：这是一个模拟\
  \ WebSockets 协议的 JavaScript 库。此对象连接到服务器端指定的 `/stomp` 端点。有关此库的更多信息，请访问 [`http://sockjs.org/`](http://sockjs.org/)。\n\
  *   `STOMP`：这是一个使用 WebSockets 协议的 JavaScript 库，通常需要 SockJS 对象。更多信息请访问 [`http://jmesnil.net/stomp-websocket/doc/`](http://jmesnil.net/stomp-websocket/doc/)。\n\
  *   `connect`：这是一个回调函数，在与服务器建立连接时被调用。\n*   `subscribe`：这是一个回调函数，当订阅的目的地有消息时被调用。\n\
  *   `send`：此方法将消息发送到指定的目的地。\n\n这是在 JavaScript 客户端中使用 SockJS 和 STOMP 的一种非常简单的方式。现在你可以运行\
  \ `websockets-demo` 项目了。\n\n注意\n\n在运行本节中的 `websocket-demo` 项目之前，请确保 `LlWebSocketConfig`\
  \ 类已被禁用（通过注释掉 `@Configuration` 和 `@EnableWebSocket` 注解）。\n\n运行项目并打开浏览器。访问 `http://localhost:8080/sockjs-stomp.html`\
  \ 网页。你将看到与之前示例类似的内容。如果你好奇，可以打开浏览器的开发者控制台查看控制台日志。参见图 7-10。\n\n![A337882_1_En_7_Fig10_HTML.jpg](img/A337882_1_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10.\n\n浏览器控制台日志\n\n图 7-10 展示了连接日志。现在打开第二个浏览器窗口并访问相同的 URL。目的是模拟两个客户端进行通信。接下来，发送一些消息并查看结果。参见图\
  \ 7-11 和图 7-12。\n\n![A337882_1_En_7_Fig12_HTML.jpg](img/A337882_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12.\n\n应用日志\n\n![A337882_1_En_7_Fig11_HTML.jpg](img/A337882_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11.\n\n两个浏览器客户端\n\n图 7-11 展示了两个客户端通过 SockJS 和 STOMP 使用 WebSockets 发送消息。\n\n\
  图 7-12 展示了 `SimpleController` 日志，并且 `ChatMessage` 正在由 `chatRoom` 方法处理（这是由于 `@MessageMapping`\
  \ 和 `@SendTo` 注解的作用）。\n\n这就是如何使用 Spring Boot 和 `spring-websocket` 模块非常轻松地创建一个聊天室。\n\
  \n问题：如何使用 Spring 创建一个 SockJS 客户端？想象一下，你需要使用 STOMP 向远程 WebSockets 连接发送消息。查看 `WebSocketsDemoApplication`\
  \ 类中被注释掉的代码。你将看到如何在那里使用 `SockJSClient` 和 `WebSocketsStompClient` 类。\n\n## 使用 RabbitMQ\
  \ 作为 STOMP 代理中继\n\n你是否想过，如果你的应用需要更多支持，需要更具可扩展性，会发生什么？嗯，一种解决方案是添加多个启用了 WebSockets\
  \ 代理的 Spring Boot 应用，然后在它们前面添加一个负载均衡器。问题在于实现高可用性，因为你需要为这些应用添加逻辑和行为，以便当其中一个宕机时，其他应用能继续响应客户端。\n\
  \n好消息是，`spring-websocket` 模块提供了一种使用外部中继的方式：RabbitMQ。RabbitMQ 将 STOMP 协议作为一个插件包含在内。它还提供了真正的完全高可用性以及一种简单的集群设置方法。\n\
  \n按照以下步骤将 RabbitMQ 作为 STOMP 中继添加到你的应用中：\n\n1.  确保启用 RabbitMQ STOMP 插件：\n\n    ```\n\
  \    $ rabbitmq-plugins enable rabbitmq_stomp\n    $ rabbitmq-plugins enable rabbitmq_web_stomp\n\
  \    ```\n\n2.  将以下依赖项添加到你的 `pom.xml` 文件中。\n\n    ```\n    io.projectreactor\n \
  \   reactor-core\n\n    io.projectreactor\n    reactor-net\n\n    io.netty\n   \
  \ netty-all\n    4.1.8.Final\n\n    ```\n\n3.  配置 `WebSocketsConfig` 类，类似于以下代码：\n\
  \n    ```\n    @Override\n    public void configureMessageBroker(\n    MessageBrokerRegistry\
  \ config) {\n    config.setApplicationDestinationPrefixes(\n    props.getAppDestinationPrefix());\n\
  \    config.enableStompBrokerRelay(\n    \"/topic\", \"/queue\").setRelayPort(61613);\n\
  \    }\n    ```\n\n与之前版本的不同之处在于，现在在 `configureMessageBroker` 方法中，你配置了 `enableStompBrokerRelay`（使用\
  \ `/topic` 和 `/queue`），并通过 `setRelayPort` 方法添加了 STOMP 端口（值为 `61613`，即 RabbitMQ 的\
  \ STOMP 端口）。\n\n就是这样。现在你可以将 RabbitMQ 用作代理中继了。在运行项目之前，请确保 RabbitMQ 代理已启动并正在运行。然后你可以运行项目并使用相同的\
  \ `sockjs-stomp.html` 网页。这里重要的是要关注 RabbitMQ 控制台，以查看连接和队列。\n\n\n\n## 货币项目\n\n请查看\
