  ### 主题


  本节将讨论另一种 JMS 消息传递模型：发布者-订阅者模型，即主题。在该模型中，发布者将消息发送到主题，而主题可以有零个到多个订阅者，每个订阅者都会收到消息的副本。你可以将其想象成报纸或杂志的订阅。你订阅（某个特定兴趣——主题）以从发布者处接收报纸或杂志。


  本节将继续使用 `jms-sender` 项目，该项目将扮演发布者的角色。同时，本章还将开启一个新项目 `jms-topic-subscriber`。它的结构类似于
  `jms-sender`。


  在 `jms-sender` 中，我们将使用相同的 `RateSender.java` 以及发送汇率的主入口点，但有一处小改动。打开 `src/main/resources/application.properties`
  文件。其内容应如代码清单 4-18 所示。


  ```

