  \ 文件。\n\n\n\n### AMQP 集成示例\n\n还记得在之前的章节中，我们使用 RabbitMQ 创建了一个生产者和消费者。在本节中，我将向您展示如何使用\
  \ Spring Integration 中的 AMQP 协议适配器。这些适配器本身已经充当了生产者和消费者的角色。如果您需要创建一个涉及 AMQP 的消息系统，可以使用这些适配器，它们将为您提供构建生产级集成解决方案所需的所有灵活性。接下来的示例使用\
  \ `Rate` 领域对象将汇率发送到队列。\n\n打开 `com.apress.messaging.config.RateConfig` 类。参见清单 8-10。\n\
  \n```\n@Configuration\n@EnableConfigurationProperties(SpiProperties.class)\npublic\
  \ class RateConfig {\n@Bean\npublic RabbitTemplate rabbitTemplate(\nConnectionFactory\
  \ connectionFactory){\nRabbitTemplate template = new\nRabbitTemplate(connectionFactory);\n\
  template.setMessageConverter(\nnew Jackson2JsonMessageConverter());\nreturn template;\n\
  }\n@Bean\npublic Queue rateQueue(@Value(\"${apress.spi.queue}\")\nString queue){\n\
  return new Queue(queue,true);\n}\n@Bean\npublic MessageChannel amqpChannel() {\n\
  return MessageChannels.direct().get();\n}\n@Bean\npublic IntegrationFlow rateFlow(\n\
  RabbitTemplate rabbitTemplate, @Value(\"${apress.spi.exchange:}\") String exchange,\n\
  @Value(\"${apress.spi.queue}\") String queue){\nreturn IntegrationFlows\n.from(\"\
  amqpChannel\")\n.handle(Amqp\n.outboundAdapter(rabbitTemplate)\n.exchangeName(exchange)\n\
  .routingKey(queue))\n.get();\n}\n}\n清单 8-10.\ncom.apress.messaging.config.RateConfig.java\n\
  ```\n\n清单 8-10 向您展示了 `RateConfig` 类，我们在其中定义了集成流。首先，注意一些熟悉的对象（RabbitMQ 的 Java 配置），例如设置了\
  \ `Jackson2JsonMessageConverter` 的 `RabbitTemplate` 以及队列的创建。\n\n`amqpChannel` bean\
  \ 的创建方式是新的。我使用了 `MessageChannels`（注意类名末尾的 `s`），它提供了一个用于创建通道的流畅 API。在本例中，它创建了一个 `direct`\
  \ 通道。\n\n在集成流中，我使用了 `Amqp`（类）协议适配器。在这种情况下，由于我们要发送消息，因此使用了 `outboundAdapter`。此适配器将接收\
  \ `rabbitTemplate`、交换机名称和路由键。生产者就是 `Amqp.outboundAdapter` 协议适配器。\n\n#### AMQP 生产者\n\
  \n在运行此示例之前，请记住 RabbitMQ 需要启动并运行。在您的主应用程序中，添加以下代码：\n\n```\n@Bean\nCommandLineRunner\
  \ processRate(MessageChannel amqpChannel){\nreturn args -> {\namqpChannel.send(\n\
  MessageBuilder.withPayload(new Rate(\"EUR\",0.88857F,new Date())).build());\namqpChannel.send(\n\
  MessageBuilder.withPayload(new Rate(\"JPY\",102.17F,new Date())).build());\namqpChannel.send(\n\
  MessageBuilder.withPayload(new Rate(\"MXN\",19.232F,new Date())).build());\namqpChannel.send(\n\
  MessageBuilder.withPayload(new Rate(\"GBP\",0.75705F,new Date())).build());\n};\n\
  }\n```\n\n从这段代码片段中可以看到，我们正在使用 `amqpChannel` 并将 `Rate` 作为消息发送。如果您运行它，请查看您的 RabbitMQ\
  \ Web 控制台，您会看到 `spi.rate` 队列中有四条 JSON 格式的消息。\n\n#### AMQP 消费者\n\n如果您需要一个消费者，您将使用\
  \ `inboundAdapter`。您可以在 `RateConfig` 类中使用以下代码：\n\n```\n@Bean IntegrationFlow incomingRateFlow(\n\
  ConnectionFactory connectionFactory,\n@Value(\"${apress.spi.queue}\") String queue){\n\
  return IntegrationFlows\n.from(Amqp.inboundAdapter(connectionFactory,queue)\n.messageConverter(new\
  \ Jackson2JsonMessageConverter()))\n.handle(\"simpleMessageHandler\",\"process\"\
  )\n.get();\n}\n```\n\n这段代码向您展示了消费者，其中使用了 `Amqp.inboundAdapter`，通过传递 `connectionFactory`、`queue`、转换器，并由\
  \ `simpleMessageHandler` bean 处理。\n\n注意\n\n如果您对 `ConnectionFactory` 引用有疑问，请记住 Spring\
  \ Boot 会自动配置它。如果您想连接到远程服务器，只需在 `application.properties` 文件中添加 `spring.rabbitmq.*`\
  \ 属性。\n\n## 货币兑换项目\n\n基于您在之前章节中学到的知识，假设货币兑换项目将开始通过文件接收新汇率，然后同时将它们发送到 RabbitMQ 队列和一个已处理的文件。您如何实现此功能？您需要一种将消息发送给两个接收者的方法。\n\
