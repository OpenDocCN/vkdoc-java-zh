  )\npublic ResponseEntity conversion(@PathVariable(\"amount\")Float amount,@PathVariable(\"\
  base\")String base,@PathVariable(\"code\")String code) throws Exception{\n//...\n\
  }\n//此处有更多方法...\n}\n代码清单 2-5.\nsrc/main/java/com/apress/messaging/controller/CurrencyController.java\n\
  ```\n\n代码清单 2-5 展示了 `CurrencyController` 类的一个片段，该类使用了 Spring MVC 的 `@RestController`、`@RequestMapping`、`@RequestParam`\
  \ 和 `@PathVariable` 注解。每个响应都基于 `ResponseEntity` 类。\n\n这是纯粹的 Spring MVC（没有太多 Spring\
  \ Boot 特性）。如果你想了解更多关于 Spring MVC 的信息，请访问 [`http://docs.spring.io/spring/docs/current/spring-framework-reference/html/mvc.html`](http://docs.spring.io/spring/docs/current/spring-framework-reference/html/mvc.html)。\n\
  \n请复习此类并进行实验。\n\n#### RestApiDemoApplication.java 类\n\n该类是 Web 应用程序的主入口点。请参见代码清单\
  \ 2-6。\n\n```\n@SpringBootApplication\npublic class RestApiDemoApplication {\npublic\
  \ static void main(String[] args) {\nSpringApplication.run(RestApiDemoApplication.class,\
  \ args);\n}\n@Bean\npublic CommandLineRunner data(RateRepository repository) {\n\
  return (args) -> {\nrepository.save(new Rate(\"EUR\",0.88857F,new Date()));\nrepository.save(new\
  \ Rate(\"JPY\",102.17F,new Date()));\nrepository.save(new Rate(\"MXN\",19.232F,new\
  \ Date()));\nrepository.save(new Rate(\"GBP\",0.75705F,new Date()));\n};\n}\n}\n\
  代码清单 2-6.\nsrc/main/java/com/apress/messaging/RestApiDemoApplication.java\n```\n\
  \n代码清单 2-6 展示了主类，Spring Boot 将在此引导应用程序。`@SpringBootApplication` 是每个 Spring Boot\
  \ 应用必需的注解，因为它将触发 Spring Boot 背后的所有魔法。该注解将使用自动配置功能来确定你的应用及其最佳配置。在这种情况下，由于你拥有 `spring-boot-starter-web`\
  \ 依赖（通过 `pom.xml` 文件在类路径中），它将设置所有必要的 Bean（如 `DispatcherServlet`）和嵌入式 Servlet 容器（默认为\
  \ Tomcat）来配置你的 Web 应用。\n\n注意 `@Bean`，它返回一个 `CommandLineRunner` 接口。这将在 Spring 容器准备好所有\
  \ Bean 后执行，并将使用 `RateRepository` 接口来保存汇率。你可以将其视为初始化数据库的一种方式。\n\n#### 其他文件……\n\n\
  当然，还有更多的类，但这里的目的是让你对它们进行实验，看看它们的作用以及如何在项目中使用它们。查看 `CurrencyConversionService` 类，它在\
  \ Web 控制器中被使用。\n\n如果你想了解 AOP 在此项目中的使用方式，请查看 `CurrencyCodeAudit` 类。它定义了一个 `around`\
  \ 通知，该通知仅在方法中找到 `@ToUpper` 注解时执行。（你可以从本书的源代码中获取此注解的代码。）为什么需要使用这个切面？嗯，如果你查看转换端点，你期望的是大写形式（对于基准货币和代码，如\
  \ `/150/USD/to/JPY`），但通过这种方法，你可以忽略大小写。从 `CurrencyConversionService` 方法中移除 `@ToUpper`\
  \ 后，像 `/150/usd/to/jpy` 这样的请求就无法工作，因为它只评估基准货币和代码的大写字母。你需要添加额外的代码来支持它。\n\n### 运行\
  \ Spring Boot 货币 Web 应用\n\n运行此类项目有多种方式。如果你使用 STS 并导入项目，只需右键单击项目名称，选择“运行方式” -> “Spring\
  \ Boot 应用”即可！\n\n如果你想使用命令行运行，请确保已安装 Maven 并执行：\n\n```\n$ mvn spring-boot:run\n```\n\
  \n然后你可以打开浏览器，输入 `http://localhost:8080/currency/latest`，应该会得到与代码清单 2-1 相同的结果。你也可以使用\
  \ `curl` 命令：\n\n```\n$ curl http://localhost:8080/currency/latest\n```\n\n如你所见，你不需要创建\
  \ WAR 文件并部署到容器中，因为 Spring Boot 自带嵌入式 Tomcat 容器。这使你能够拥有可移植性。\n\n### 部署 Spring Boot\
  \ 货币 Web 应用\n\n如果你想将此代码部署到 Servlet 容器，你需要打包此项目。如果你使用 STS，可以右键单击项目并选择“运行方式” -> “Maven\
  \ 构建”。这将弹出一个对话框。在“目标”字段中输入 `Package`，然后勾选“跳过测试”复选框。然后点击“运行”。这将在目标目录中创建一个可执行且可部署的文件。\n\
  \n如果你使用命令行，可以执行：\n\n```\n$ mvn package -DskipTests=true\n```\n\n这将在目标目录中创建可执行且可部署的\
  \ WAR 文件。你可以通过运行以下命令来执行该 WAR 文件：\n\n```\n$ java -jar target/rest-api-demo-0.0.1-SNAPSHOT.war\n\
  ```\n\n例如，如果你已经有一个 Tomcat 容器，你可以直接将 WAR 文件放入 `webapps/` 文件夹并运行你的容器。在复制/移动 WAR 文件时，尝试重命名它。\n\
  \n```\n$ cp target/rest-api-demo-0.0.1-SNAPSHOT.war /opt/tomcat/webapps/rest-api-demo.war\n\
  $ /opt/tomcat/bin/startup.sh\n```\n\n然后你可以打开浏览器，访问 `http://localhost:8080/rest-api-demo/currency/latest`\
  \ 来获得相同的结果。\n\n## 更多关于 Spring Boot 的内容\n\n如果你想了解更多关于 Spring Boot 及其其他有用特性的信息，我推荐我的另一本书，Apress\
  \ 出版的《Pro Spring Boot》。该书从使用 Spring Boot CLI 到将其部署到云端，对这一技术进行了更深入的探讨。\n\n\n\n##\
  \ 摘要\n\n本章介绍了 Spring Boot，探讨了其部分特性，并通过创建一个简单的货币 Restful 应用，解释了它如何与 Spring MVC 协同工作。\n\
  \n在下一章中，你将开始学习 Spring 应用事件和监听器，这是一种通过观察者模式发射和消费消息来实现消息传递的方式。\n\n"
- "# 3. 应用事件\n\n本章涵盖如何使用观察者模式（行为型模式）作为向需要者或监听者发送消息的方式。同时展示了 Spring 框架如何通过其应用事件实现该模式，这些事件可以声明为简单的接口实现，或使用专门的注解。\n\
  \n## 观察者模式\n\n该特定模式定义了对象之间的一对多依赖关系，因此当一个对象（主体）改变其状态时，需要将这一变化通知给其他对象（观察者）。随后观察者可以对该变化做出响应，如图\
  \ 3-1 所示。\n\n![A337882_1_En_3_Fig1_HTML.gif](img/A337882_1_En_3_Fig1_HTML.gif)\n\
  \n图 3-1.\n\n观察者模式\n\n实现这种设计模式有多种方式。Java SDK 包含了 `java.util.Observable` 类，用于设置变更并通知观察者，以及\
  \ `java.util.Observer` 接口，该接口通过其 `update` 方法接收通知。\n\nSpring 框架提供了一种精妙的方式来使用观察者模式，并且较新版本（4.x）的\
  \ Spring 还包含了更多改进。它们不仅实现了该模式，还提供了多种事件，允许你更深入地了解 Spring 容器的内部机制，并创建自定义事件。\n\n请记住，尽管我们讨论的是观察者模式和事件，但这本质上是一种通过事件进行消息传递的组件间通信方式。\n\
  \n## Spring 应用事件\n\n你会发现 Spring 框架暴露了抽象的 `org.springframework.context.ApplicationEvent`\
  \ 类，它继承自 `java.util.EventObject`。`EventObject` 包含事件最初发生的对象。参见图 3-2。\n\n![A337882_1_En_3_Fig2_HTML.jpg](img/A337882_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2.\n\nSpring 应用事件层次结构\n\n图 3-2 展示了 `ApplicationEvent` 的层次结构，如你所见，该类被多个事件扩展。至少有两个重要事件值得提及：\n\
  \n*   `ApplicationContextEvent` `（属于 Spring 框架）`：这是一个抽象类，你可以完全访问主要的中央接口，该接口为你的应用提供完整配置。此类还被\
  \ `ContextClosed`、`ContextStartedEvent`、`ContextRefreshedEvent` 和 `ContextStoppedEvent`\
  \ 事件扩展，以提供 Spring 容器生命周期的更多细节。\n*   `SpringApplicationEvent` `（属于 Spring Boot）`：这也是一个抽象类，通过\
  \ `SpringApplication` 类包含 Spring Boot 应用的所有信息。`SpringApplication` 类用于从 Java main\
  \ 方法引导和启动 Spring Boot 应用。\n\n我选择这些事件是因为你正在进行的项目——货币兑换的 Rest API——会用到它们。本章稍后会详细介绍。\n\
  \n## Spring 应用监听器\n\n现在，对于每个事件，你应该有一种接收消息的方式。Spring 框架有一个主要的事件监听器。`org.springframework.context.ApplicationListener<E\
  \ extends ApplicationEvent>` 接口继承自 `java.util.EventListener`（后者仅是一个标记接口）。`ApplicationListener`\
  \ 是所有 Spring `ApplicationContext` 事件的主要事件监听器，这些事件你在上一节已经了解过。参见图 3-3。\n\n![A337882_1_En_3_Fig3_HTML.jpg](img/A337882_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3.\n\nApplicationListener 接口及其层次结构\n\n图 3-3 展示了 `ApplicationListener` 的层次结构以及你可以使用的所有事件监听器。Spring\
  \ 框架会在启动时、运行期间，甚至在 Spring 应用正常关闭时发送相应的事件。当监听器被调用时，这些事件会被过滤以匹配事件对象。\n\n有许多用例可以让你使用\
  \ `ApplicationEvent` 或其某些实现来监听（通过 `ApplicationListener`）传入的消息并对其做出响应。例如，在下一节再次讨论的\
  \ Rest API 货币项目中，你可以确定用户何时访问某些 Rest 端点，从而通过统计方式查看流量并识别哪个端点被更频繁地使用。\n\n\n\n## Rest\
  \ API 货币项目\n\n让我们回到项目，并将这种设计模式应用其中。通过仅实现 `ApplicationEvent` 类型的 `ApplicationListener`，应用程序将开始监听\
  \ Spring 容器初始化期间以及 Bean 生命周期部分发生的每一个事件。\n\n请看清单 3-1，其中展示了 `RestApiEventsListener`\
  \ 类是一个 Spring 组件。\n\n```\n@Component\npublic class RestApiEventsListener implements\
  \ ApplicationListener{\npublic void onApplicationEvent(ApplicationEvent event) {\n\
  }\n}\n清单 3-1.\ncom.apress.messaging.listener.RestApiEventsListener.java\n```\n\n\
  清单 3-1 仅展示了部分代码，其中 `RestApiEventsListener` 类实现了 `ApplicationEvent` 事件的 `ApplicationListener`。你必须实现接收\
  \ `ApplicationEvent` 作为参数的 `onApplicationEvent` 方法。\n\n同样，一个用例是确定某个 Rest 端点被访问的次数。请看图\
  \ 3-2，其中展示了 ApplicationEvent 的层次结构——你会注意到有一个 `RequestHandledEvent` 以及一个继承自它的 `ServletRequestHandledEvent`。通过\
  \ `ServletRequestHandledEvent` 类，你可以获取正在被访问的 URL（端点），并为其创建一个计数器。参见清单 3-2。\n\n```\n\
  @Component\npublic class RestApiEventsListener implements ApplicationListener{\n\
  private static final String LATEST = \"/currency/latest\";\n@Autowired\nprivate\
  \ CounterService counterService;\n@Log(printParamsValues=true)\npublic void onApplicationEvent(ApplicationEvent\
  \ event) {\nif(event instanceof ServletRequestHandledEvent){\nif(((ServletRequestHandledEvent)event)\n\
  .getRequestUrl().equals(LATEST)){\ncounterService\n.increment(\"url.currency.latest.hits\"\
  );\n}\n}\n}\n}\n清单 3-2.\ncom.apress.messaging.listener.RestApiEventsListener.java\n\
  ```\n\n清单 3-2 展示了更多代码。让我们来看一下：\n\n*   `ServletRequestHandledEvent`：当有请求到达某个端点时，此事件会被发布。这是\
  \ Web 框架的一部分。该事件包含所有 Web 上下文信息，因此你可以获取正在被访问的 URL 信息。\n*   `CounterService`：此接口属于\
  \ `spring-boot-actuator` 模块，它允许你通过递增或递减一个 `tag/` 属性来获得一个度量指标。在本例中，标签是 `url.currency.latest.hits`。\n\
  *   `@Log(printParamsValues=true)`：这是一个自定义注解，将作为前置通知的一部分使用，用于记录被调用方法的所有信息。你可以在 `com.apress.messaging.aop.CodeLogger.java`\
  \ 类中查看相关代码。\n\n如果你运行该应用程序，你会从 `@Log` 注解得到一些输出（见图 3-4），但如果你多次访问 `/currency/latest`\
  \ 端点（见图 3-5），应用程序将开始使用 `CounterService` 实例来统计该端点的访问次数。然后，你可以从 `/metrics` 端点访问这个度量指标，并看到\
  \ `url.currency.latest.hits` 显示了该端点的命中次数（见图 3-6）。\n\n![A337882_1_En_3_Fig6_HTML.jpg](img/A337882_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6.\n\nhttp://localhost:8080/metrics\n\n![A337882_1_En_3_Fig5_HTML.jpg](img/A337882_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5.\n\n访问 /currency/latest 端点后的控制台日志\n\n![A337882_1_En_3_Fig4_HTML.jpg](img/A337882_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4.\n\n运行 rest-api-events 项目后的控制台日志\n\n图 3-4 展示了运行应用程序时你将看到的部分日志输出。这些日志是 Spring\
  \ 框架作为 `ApplicationEvent` 事件发送的消息。请记住，此输出是由 `@Log` 注解（一个前置 AOP 通知）生成的。\n\n图 3-5\
  \ 展示了多次访问 `/currency/latest` 端点后的一些日志。你可以看到 `ApplicationEvent` 是 `ServletRequestedEvent`\
  \ 的一个实例，其中包含了被请求的 URL。\n\n图 3-6 展示了 `/metrics` 端点（由 `spring-boot-actuator` 依赖提供）。在图底部，你可以看到\
  \ `\"counter.url.currency.latest.hits\":4` 这个度量指标，它由 `CounterService` 实例更新（参见清单\
  \ 3-2）。\n\n\n\n### 自定义事件\n\n到目前为止，你已经了解了如何为任何 `ApplicationEvent` 创建监听器，但如果是使用包含领域对象信息的自定义事件呢？本节将展示如何创建自定义事件。\n\
  \n要创建自定义事件，你必须继承 `ApplicationEvent`，这样后续才能方便地发布它。\n\n以当前项目为例，假设在调用任何货币转换期间发生错误（非受检异常）时，你将发送一个事件。这个事件可能只是记录原因并显示导致异常的对象。让我们先回顾一下\
  \ `CurrencyConversionEvent` 类，如清单 3-3 所示。\n\n```\npackage com.apress.messaging.event;\n\
  import org.springframework.context.ApplicationEvent;\nimport com.apress.messaging.domain.CurrencyConversion;\n\
  public class CurrencyConversionEvent extends ApplicationEvent {\nprivate static\
  \ final long serialVersionUID = -4481493963350551884L;\nprivate CurrencyConversion\
  \ conversion;\nprivate String message;\npublic CurrencyConversionEvent(Object source,\
  \ CurrencyConversion conversion) {\nsuper(source);\nthis.conversion = conversion;\n\
  }\npublic CurrencyConversionEvent(Object source, String message, CurrencyConversion\
  \ conversion) {\nsuper(source);\nthis.message = message;\nthis.conversion = conversion;\n\
  }\npublic CurrencyConversion getConversion(){\nreturn conversion;\n}\npublic String\
  \ getMessage(){\nreturn message;\n}\n}\n清单 3-3.\ncom.apress.messaging.event.CurrencyConversionEvent.java\n\
  ```\n\n清单 3-3 展示了一个继承自 `ApplicationEvent` 并包含两个构造方法的基础类。每个构造方法都会调用其父类（`ApplicationEvent`）来设置来源，设置当前的\
  \ `CurrencyConversion` 实例，并确定消息内容。换句话说，你拥有了确定任何货币转换调用中错误来源所需的信息。\n\n接下来，让我们回顾一下将接收\
  \ `CurrencyConversionEvent` 的事件监听器。请参见清单 3-4。\n\n```\npackage com.apress.messaging.listener;\n\
  import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.context.ApplicationListener;\n\
  import org.springframework.stereotype.Component;\nimport com.apress.messaging.event.CurrencyConversionEvent;\n\
  @Component\npublic class CurrencyConversionEventListener implements ApplicationListener\
  \ {\nprivate static final String DASH_LINE = \"===================================\"\
  ;\nprivate static final String NEXT_LINE = \"\\n\";\nprivate static final Logger\
  \ log = LoggerFactory.getLogger(CurrencyConversionEventListener.class);\n@Override\n\
  public void onApplicationEvent(CurrencyConversionEvent event) {\nObject obj = event.getSource();\n\
  StringBuilder str = new StringBuilder(NEXT_LINE);\nstr.append(DASH_LINE);\nstr.append(NEXT_LINE);\n\
  str.append(\"  Class: \" + obj.getClass().getSimpleName());\nstr.append(NEXT_LINE);\n\
  str.append(\"Message: \" + event.getMessage());\nstr.append(NEXT_LINE);\nstr.append(\"\
  \  Value: \" + event.getConversion());\nstr.append(NEXT_LINE);\nstr.append(DASH_LINE);\n\
  log.error(str.toString());\n}\n}\n清单 3-4.\ncom.apress.messaging.listener.CurrencyConversionEventListener.java\n\
  ```\n\n清单 3-4 展示了将接收所有 `CurrencyConversionEvent` 事件的监听器。该类实现了类型为 `CurrencyConversionEvent`\
  \ 的 `ApplicationListener`，并且需要实现 `onApplicationEvent` 方法。如你所见，它只是记录了类名、消息以及 `CurrencyConversion`\
  \ 领域对象。\n\n接下来，让我们看看当错误发生时，哪个类将发布事件。我们来回顾一下 `CurrencyConversionService` 和 `convertFromTo`\
  \ 方法，该方法包含获取货币代码的逻辑。请参见清单 3-5。\n\n```\npublic CurrencyConversion convertFromTo(@ToUpper\
  \ String base, @ToUpper String code,Float amount) {\nRate baseRate = new Rate(CurrencyExchange.BASE_CODE,1.0F,new\
  \ Date());\nRate codeRate = new Rate(CurrencyExchange.BASE_CODE,1.0F,new Date());\n\
  if(!CurrencyExchange.BASE_CODE.equals(base))\nbaseRate = repository.findByDateAndCode(new\
  \ Date(), base);\nif(!CurrencyExchange.BASE_CODE.equals(code))\ncodeRate = repository.findByDateAndCode(new\
  \ Date(), code);\nif(null == codeRate || null == baseRate)\nthrow new BadCodeRuntimeException(\"\
  Bad Code Base, unknown code: \" + base, new CurrencyConversion(base,code,amount,-1F));\n\
  return new CurrencyConversion(base,code,amount,(codeRate.getRate()/baseRate.getRate())\
  \ * amount);\n}\n清单 3-5.\ncom.apress.messaging.service.CurrencyConversionService.java\n\
  ```\n\n清单 3-5 展示了 `convertFromTo` 方法，它通过基于 `base` 和 `code` 变量查找汇率来进行转换。`if` 语句会抛出一个\
  \ `BadCodeRuntimeException`，该异常的构造方法接受一个字符串和一个 `CurrencyConversion` 对象。`BadCodeRuntimeException`\
  \ 是一个继承自 `RuntimeException` 的非受检异常（你可以在源代码中查看）。\n\n当抛出异常时，我们必须发布 `CurrencyConversionEvent`\
  \ 和错误消息，但添加此逻辑会使代码变得混乱，很快我们就会得到纠缠不清、混乱的代码。相反，我们可以创建一个 AOP，在抛出异常时使用该异常。清单 3-6 使用\
  \ AOP 在抛出异常后发布 `CurrencyConversionEvent` 事件。\n\n```\n@Aspect\n@Component\npublic\
  \ class CurrencyConversionAudit {\nprivate ApplicationEventPublisher publisher;\n\
  @Autowired\npublic CurrencyConversionAudit(\nApplicationEventPublisher publisher){\n\
  this.publisher = publisher;\n}\n@Pointcut(\"execution(* com.apress.messaging.service.*Service.*(..))\"\
  )\npublic void exceptionPointcut() {}\n@AfterThrowing(pointcut=\"exceptionPointcut()\"\
  ,\nthrowing=\"ex\")\npublic void badCodeException(JoinPoint jp,\nBadCodeRuntimeException\
  \ ex){\nif(ex.getConversion()!=null){\npublisher.publishEvent(\nnew CurrencyConversionEvent(\n\
  jp.getTarget(),\nex.getMessage(),\nex.getConversion()));\n}\n}\n}\n清单 3-6.\ncom.apress.messaging.aop.CurrencyConversionAudit.java\n\
  ```\n\n清单 3-6 展示了 `@` `AfterThrowing`，它会在 `BadCodeRuntimeException` 被抛出时感知到，然后执行方法内部的代码。如你所见，它使用了\
  \ `ApplicationEventPublisher` 实例（由 Spring 框架在类构造方法中注入）和 `publishEvent` 方法，该方法发送关于异常发生所在类的信息、消息以及\
  \ `CurrencyConversion` 对象。\n\n如果你运行项目并像这样访问 `/{amount}/{base}/to/{code}`，例如 `/1.0/usdx/to/mx`，你将得到类似于图\
  \ 3-7 的结果。\n\n![A337882_1_En_3_Fig7_HTML.jpg](img/A337882_1_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7.\n\nCurrencyConversionService 中的错误日志\n\n如你所见，创建自定义事件非常简单。请记住使用自定义事件的这些简单规则：\n\
  \n*   创建一个继承自 `ApplicationEvent` 的事件类。\n*   创建一个实现自定义事件类型的 `ApplicationListener`\
  \ 并实现 `onApplication` 方法的事件监听器类。\n*   使用 `ApplicationEventPublisher` 类来发布你的自定义事件。\n\
  \n## 使用注解的事件监听器\n\n到目前为止，我们已经了解了如何使用和实现类型为 `ApplicationEvent` 的 `ApplicationListener`。本节将展示如何使用一些\
  \ Spring 提供的注解，作为监听事件的简便方法。\n\n\n\n### @EventListener\n\n`@EventListener` 注解是一个非常有用的注解，你可以直接在将要处理事件的方法上使用它。这意味着不再需要实现\
  \ `ApplicationListener` 接口。\n\n清单 3-7 展示了如何使用它。\n\n```\n@Component\npublic class\
  \ RestAppEventListener {\n@EventListener\n@Log(printParamsValues=true)\npublic void\
  \ restAppHandler(\nSpringApplicationEvent springApp){\n}\n}\nListing 3-7.\ncom.apress.messaging.listener.RestAppListener.java\n\
  ```\n\n清单 3-7 向你展示了应用于 `restAppHandler` 方法的 `@EventListener` 注解。Spring 框架会自动装配所有内容，使得这个监听器能够接收所有\
  \ `SpringApplicationEvent` 事件。`SpringApplicationEvent` 是另一个继承自 `ApplicationEvent`\
  \ 抽象类的事件，但它包含有关 Spring Boot 应用程序的信息，例如命令行中使用的参数、横幅、资源加载器等。\n\n如果你运行该项目，你将看到类似于图\
  \ 3-8 的内容。\n\n![A337882_1_En_3_Fig8_HTML.jpg](img/A337882_1_En_3_Fig8_HTML.jpg)\n\
  \nFigure 3-8.\n\nRestAppEventListener 的日志\n\n如你所见，`@EventListener` 注解使用起来很简单。这个注解甚至还有更多特性：\n\
  \n*   它支持条件，因此只有在给定表达式为真时才会执行。例如：\n\n    ```\n    @EventListener(condition = \"\
  #springApp.args.length > 1\")\n    ```\n\n    这段代码告诉监听器，仅当参数长度大于 1 时才使用该事件。如果你替换清单\
  \ 3-7 中的上一个监听器，你将看不到 `RestAppEventListener` 的日志。\n*   你可以通过传递一个事件类数组作为默认值来监听多个事件。例如：\n\
  \n    ```\n    @EventListener({CurrencyEvent.class,\n    CurrencyConversionEvent.class})\n\
  \    @Log(printParamsValues=true)\n    public void restAppHandler(ApplicationEvent\
  \ appEvent){ }\n    ```\n\n    这段代码在同一个方法中监听 `CurrencyEvent` 和 `CurrencyConversion`\
  \ 事件，该方法现在接收一个 `ApplicationEvent` 实例。此外，你也可以没有参数，但仍然监听多个事件。\n*   当你有多个事件需要监听时，你可能希望为它们设置优先级。你可以通过向方法添加\
  \ `@Order` 注解来实现。例如：\n\n    ```\n    @EventListener\n    @Order(Ordered.HIGHEST_PRECEDENCE)\n\
  \    @Log(printParamsValues=true)\n    public void restAppHandler(SpringApplicationEvent\
  \ springApp){\n    }\n    ```\n\n    这段代码将按照最高优先级进行处理。\n*   你也可以通过添加 `@Async` 注解来异步处理事件监听器。例如：\n\
  \n    ```\n    @EventListener\n    @Async\n    @Log(printParamsValues=true)\n  \
  \  public void restAppHandler(SpringApplicationEvent springApp){\n    }\n    ```\n\
  \n### @TransactionalEventListener\n\nSpring Framework 4.2.x 及更高版本引入了一个额外的注解，允许你监听事务阶段，例如数据库事务或任何其他事务，包括消息传递事件。\n\
  \n让我们开始在货币项目中使用这个注解。查看清单 3-8 中所示的 `RateEventListener` 类。\n\n```\n@Component\npublic\
  \ class RateEventListener {\n@TransactionalEventListener\n@Log(printParamsValues=true,\n\
  callMethodWithNoParamsToString=\"getRate\")\npublic void processEvent(CurrencyEvent\
  \ event){ }\n}\nListing 3-8.\ncom.apress.messaging.listener.RateEventListener.java\n\
  ```\n\n清单 3-8 向你展示了 `RateEventListener` 类，它使用了 `@TransactionalEventListener` 并处理自定义的\
  \ `CurrencyEvent` 事件（你可以在 `com.apress.messaging.event` 包中查看代码）。当通过编程方式或使用 `@Transactional`\
  \ 注解建立事务通道时，`@TransactionalEventListener` 将接收事件。\n\n如果你查看 `com.apress.messaging.service.CurrencyService.java`\
  \ 类，你将看到以下代码：\n\n```\n@Transactional\npublic void saveRate(Rate rate){\nrepository.save(new\n\
  Rate(rate.getCode(),\nrate.getRate(),\nrate.getDate()));\npublisher.publishEvent(new\
  \ CurrencyEvent(this,rate));\n}\n```\n\n这段代码展示了 `saveRate` 方法，它被标记了 `@Transactional`\
  \ 注解。它将在保存完成后发布一个 `CurrencyEvent` 事件。\n\n如果你运行该项目，你将多次看到关于 `RateEventListener` 的日志。查看主应用程序（`RestApiEventsApplication.java`）；你将看到使用\
  \ `CurrencyService` 实例保存的汇率，以及由 `RateEventListener` 监听器记录的每个事务（在它们提交之后）的日志。见图 3-9。\n\
  \n![A337882_1_En_3_Fig9_HTML.jpg](img/A337882_1_En_3_Fig9_HTML.jpg)\n\nFigure 3-9.\n\
  \nRateEventListener 日志\n\n`@TransactionalEventListener` 可以监听特定的事务阶段。如果你需要在某个阶段监听事件，可以像这样使用它：\n\
  \n```\n@TransactionalEventListener(\nphase = TransactionPhase.BEFORE_COMMIT)\n```\n\
  \n你可以使用：`BEFORE_COMMIT`、`AFTER_COMMIT`（默认）、`AFTER_ROLLBACK` 和 `AFTER_COMPLETION`。\n\
  \n注意\n\n请记住，你可以从 Apress 网站或直接从 GitHub 仓库获取所有代码：[`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)\n\
  \n## 总结\n\n本章解释了观察者模式的工作原理。它还涵盖了 Spring 框架使用此模式来暴露应用程序事件的方式。\n\n它向你展示了一些用例，通过这些用例，你可以监听应用程序事件，并使用它们通过\
  \ `ServletRequestHandledEvent` 来统计端点被访问的次数。它还向你展示了如何通过扩展 `ApplicationEvent` 抽象类来创建自己的自定义事件。\n\
  \n你学习了一种通过使用诸如 `@EventListener` 之类的注解来监听事件的简便方法。你还了解了如何使用 `@TransactionalEventListener`，该注解在事务发生时、提交期间、提交之前或提交之后以及回滚之后被触发。\n\
  \n下一章将介绍 Java 消息服务 API 以及如何使用它进行消息传递。\n\n"
- '# 4. 使用 Spring Boot 的 JMS


  Java 消息服务（JMS）于 2001 年 6 月随版本 1.0.2b 发布。它是在两个或多个客户端之间发送消息的另一种解决方案。当时，它被认为是面向消息中间件（MOM）技术组的一部分。其理念是为一个反复出现的问题提供一个
  API，即一个生产者-消费者用例，该用例允许在分布式环境中实现松耦合、可靠且异步的组件。


  本章从一个简单的项目开始，它将帮助你理解 JMS 客户端的工作原理以及如何使用 Spring Boot 进行配置。然后，我们将利用这些知识构建之前的项目，即货币
  REST API，现在它将作为一个接收器来保存新的汇率。那么，让我们开始吧。




  ## JMS


  JMS API 提供了两种消息传递模型——点对点模型和发布-订阅模型。点对点模型是指消息被传递给一个接收者，并且保证只会传递给连接到某个队列的一个消费者（见图
  4-1）。


  ![A337882_1_En_4_Fig1_HTML.gif](img/A337882_1_En_4_Fig1_HTML.gif)


  图 4-1.


  点对点消息传递模型


  发布-订阅模型是指消息被传递给零个或多个消费者（通常称为订阅者）。发布者为所有想要订阅该主题的客户端创建一个消息主题（见图 4-2）。


  ![A337882_1_En_4_Fig2_HTML.gif](img/A337882_1_En_4_Fig2_HTML.gif)


  图 4-2.


  发布-订阅消息传递模型


  JMS 是一个需要被实现的必需 API。为了使用或创建 JMS 应用程序，你需要选择一个提供者（通常称为 JMS 服务器或代理），它将连接并解耦你的发送者/发布者与接收者/订阅者；一个用于生产/发送或接收/订阅消息的客户端；一个包含实际消息（有效载荷）的
  JMS 消息；以及一个用于点对点消息传递的 JMS 队列，或用于发布-订阅场景的主题。我们首先来详细讨论客户端。


  ### 使用 Java 的 JMS


  让我们先看看如何在 Java 中创建一个点对点发送者客户端；见代码清单 4-1。


  ```

  //Step 1\. 创建连接

  InitialContext ctx = new InitialContext();

  QueueConnectionFactory factory = (QueueConnectionFactory)ctx.lookup("connectionFactory");

  QueueConnection connection = factory.createQueueConnection();

  connection.start();

  //Step 2\. 创建队列会话

  QueueSession session = connection.createQueueSession(false, Session.AUTO_ACKNOWLEDGE);

  //Step 3\. 获取队列对象

  Queue queue =( Queue)ctx.lookup("myQueue");

  //Step 4\. 创建发送者

  QueueSender sender = session.createSender(queue);

  //Step 5\. 创建消息

  TextMessage msg = session.createTextMessage();

  msg.setText("Hello World");

  //Step 6\. 发送消息

  sender.send(msg);

  代码清单 4-1.

  点对点发送者客户端代码片段

  ```


  如代码清单 4-1 所示，这个过程非常直接。发送一条文本消息只需要六个步骤。在步骤 1 中，你需要知道使用哪个连接过程。通常，你需要在代码中包含一个 `jndi.properties`
  文件，其中包含关于你的 JMS 提供者的一些信息；例如，如果你使用 Apache ActiveMQ，你需要指定其属性，如代码清单 4-2 (`jndi.properties`)
  所示。


  ```

  # Apache ActiveMQ 的初始上下文

  java.naming.factory.initial=org.apache.activemq.jndi.ActiveMQInitialContextFactory

  # 此属性必须与 ctx.lookup 语句中声明的属性相同。

  # 默认值为：connectionFactory 或 ConnectionFactory

  # connectionFactoryNames = connectionFactory, queueConnectionFactory, queueConnectionFactory

  #   Memory Broker = vm://localhost

  # External Broker = tcp://hostname:61616

  java.naming.provider.url=vm://localhost

  # 队列命名规则：

  # queue.[jndiName] = [physicalName]

  queue.myQueue = apress.MyQueue

  # 主题命名规则：

  # topic.[jndiName] = [physicalName]

  topic.myTopic = apress.MyTopic

  代码清单 4-2.

  用于 Apache ActiveMQ 的 jndi.properties

  ```


  代码清单 4-2 展示了你需要包含在每个 JMS 应用程序中的 `jndi.properties` 文件。在这个例子中，它使用了 Apache ActiveMQ
  的设置以及队列和主题的命名约定。


  现在，让我们看看接收者，如代码清单 4-3 所示。


  ```

  // Step 1\. 创建连接

  InitialContext ctx = new InitialContext();

  QueueConnectionFactory factory = (QueueConnectionFactory)ctx.lookup("connectionFactory");

  QueueConnection connection = factory.createQueueConnection();

  connection.start();

  // Step 2\. 创建会话

  QueueSession session = connection.createQueueSession(false, Session.AUTO_ACKNOWLEDGE);

  // Step 3\. 获取队列

  Queue queue=(Queue)ctx.lookup("myQueue");

  // Step 4\. 创建接收者

  QueueReceiver receiver = session.createReceiver(queue);

  // Step 5\. 创建监听器

  MessageListener listener = new MessageListener() {

  @Override

  public void onMessage(Message message) {

  //在此处处理消息

  }

  };

  // Step 6\. 注册监听器

  receiver.setMessageListener(listener);

  代码清单 4-3.

  点对点接收者客户端代码片段

  ```


  代码清单 4-3 展示了创建点对点消息消费者所需的六个步骤。当然，如果你将此代码放在一个单独的项目中，你还需要包含 `jndi.properties`（见代码清单
  4-2）。


  如果你想使用发布者-订阅者消息传递模型，你可以按照代码清单 4-4 所示创建你的发布者。




  ```

  //步骤 1. 创建连接

  InitialContext ctx = new InitialContext();

  TopicConnectionFactory factory =(TopicConnectionFactory)ctx.lookup("connectionFactory");

  TopicConnection connection=f.createTopicConnection();

  connection.start();

  //步骤 2. 创建主题会话

  TopicSession session = connection.createTopicSession(false, Session.AUTO_ACKNOWLEDGE);

  //步骤 3. 获取主题对象

  Topic topic = (Topic)ctx.lookup("myTopic");

  //步骤 4. 创建发送者

  TopicPublisher publisher = session.createPublisher(topic);

  //步骤 5. 创建消息

  TextMessage msg = session.createTextMessage();

  msg.setText("Hello World");

  //步骤 6. 发送消息

  publisher.publish(msg);

  清单 4-4.

  发布者-订阅者模式中的发布者客户端

  ```


  清单 4-4 展示了发布者代码——一种发布者-订阅者消息模型——该代码将向名为 `myTopic` 的主题发布一条简单的文本消息。这与点对点模型差别不大。那么订阅者呢？请参见清单
  4-5。


  ```

  // 步骤 1. 创建连接

  InitialContext ctx = new InitialContext();

  TopicConnectionFactory factory = (TopicConnectionFactory)ctx.lookup("connectionFactory");

  TopicConnection connection = factory.createTopicConnection();

  connection.start();

  // 步骤 2. 创建会话

  TopicSession session = connection.createTopicSession(false, Session.AUTO_ACKNOWLEDGE);

  // 步骤 3. 获取主题

  Topic topic = (Topic)ctx.lookup("myTopic");

  // 步骤 4. 创建接收者

  TopicSubscriber subscriber = session.createSubscriber(topic);

  // 步骤 5. 创建监听器

  MessageListener listener = new MessageListener() {

  @Override

  public void onMessage(Message message) {

  //在此处处理消息

  }

  };

  // 步骤 6. 注册监听器

  subscriber.setMessageListener(listener);

  清单 4-5.

  发布者-订阅者模式中的订阅者客户端

  ```


  清单 4-5 展示了发布者-订阅者消息客户端；该客户端订阅了名为 `myTopic` 的主题。你可以使用此代码运行多个客户端，每个客户端都会收到来自发布者的消息；同样，这与点对点模型差别不大。当然，这些客户端仍然需要
  `jndi.properties` 文件。


  如你所见，两种消息模型的实现都非常直接。如果你仔细查看任何一段代码，你会发现每次发送的消息都只是文本消息，但如果你需要发送其他内容呢？JMS 支持不同的消息类型：


  *   `StreamMessage` 是一个序列化的流对象。

  *   `MapMessage` 由名称/值对组成，类似于哈希表。

  *   `TextMessage` 是一个字符串。

  *   `ObjectMessage` 是一个可序列化的对象。

  *   `ByteMessage` 是一个原始的字节流。


  作为练习，尝试使用这些代码片段创建一些客户端（点对点或发布者-订阅者模型）。目的是让你熟悉如何使用这类消息传递。


  我刚刚向你简要介绍了在不使用外部框架的情况下，通常如何使用 JMS。我认为即使只是做一些简单的事情，也需要很多步骤。


  ## 使用 Spring Boot 的 JMS


  第 2 章向你展示了 Spring Boot 如何了解你正在尝试运行的应用程序，因为它是一种有主见的技术。只需添加一个 `spring-boot-starter`
  pom，你就可以告诉 Spring Boot 如何配置一切，对吧？


  我们将在本例中使用 Apache ActiveMQ（欢迎你使用任何其他代理；代码将是相同的），这意味着我们可以包含 `spring-boot-starter-activemq`
  依赖项。通过添加此依赖项，Spring Boot 将引入应用程序所需的所有 JMS 和 ActiveMQ（JAR 文件），并将自动配置 JMS 客户端所需的所有必要属性和额外配置。


  还记得你在 Java 中需要执行的所有步骤吗？使用 Spring Boot 则无需这些步骤。


  注意


  我们将使用更多依赖项，例如 AOP，来处理一些日志记录问题。请查看本章项目中的 `pom.xml` 文件。


  我们将使用 `jms-sender` 项目，你可以在本书的源代码中找到它。该项目包含许多类，其中一些代码被注释掉了，只需取消注释，它就应该能工作。不过别担心，我将在接下来的章节中通过解释每一段代码来指导你。


  注意


  请记住，你可以从 Apress 网站或直接从 GitHub 仓库 [`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)
  获取所有代码。




  ### 生产者


  让我们先回顾一下使用 Spring Boot 的生产者。打开 `com.apress.messaging.jms.SimpleSender.java` 类。参见代码清单
  4-6。


  ```

  @Component

  public class SimpleSender {

  private JmsTemplate jmsTemplate;

  @Autowired

  public SimpleSender(JmsTemplate jmsTemplate){

  this.jmsTemplate = jmsTemplate;

  }

  public void sendMessage(String destination,

  String message){

  this.jmsTemplate.convertAndSend(destination, message);

  }

  }

  代码清单 4-6.

  com.apress.messaging.jms.SimpleSender.java

  ```


  代码清单 4-6 展示了创建生产者的最简单直接的方式。我们来分析一下代码的每个部分：


  *   `@Component`：你可能已经知道，这个注解将类标记为 Spring Bean，使其在运行时可用。

  *   `JmsTemplate`：这是客户端最重要的部分，因为该类负责向 JMS 提供者/代理发送消息（以及其他操作）。

  *   @Autowired：该注解用于类构造函数，以注入 `JmsTemplate` Bean（如前所述）。你甚至可以省略此注解，Spring 会自动推断出你需要此依赖。

  *   `convertAndSend`：`JmsTemplate` 实例拥有此方法，用于转换消息。由于这是一个字符串，它会被自动转换为 `javax.jms.TextMessage`
  并发送到目标（通常是一个队列）。


  在运行这部分代码之前，我们先检查一下主应用程序。打开 `com.apress.messaging.JmsSenderApplication.java` 类，如代码清单
  4-7 所示。


  ```

  @SpringBootApplication

  public class JmsSenderApplication {

  public static void main(String[] args) {

  SpringApplication.run(JmsSenderApplication.class, args);

  }

  @Bean

  CommandLineRunner simple(JMSProperties props,

  SimpleSender sender){

  return args -> {

  sender.sendMessage(props.getQueue(), "Hello World");

  };

  }

  }

  代码清单 4-7.

  com.apress.messaging.JmsSenderApplication.java

  ```


  代码清单 4-7 展示了主应用程序。我们来逐一分析每个部分：


  *   `@SpringBootApplication`：你已经熟悉这个注解了。它是 Spring Boot 识别你试图运行何种应用程序的方式。

  *   `simple(JMSProperties,SimpleSender)`：当 Spring 容器准备就绪时，此方法会被执行，并注入 `JMSProperties`
  和 `SimpleSender` Bean 供其使用。

  *   `JMSProperties`：此类用作属性持有者，读取 `application.properties` 文件并查找 `apress.jms.queue`
  属性（本例中设置为 `jms-sender`）。如果你想了解更多，可以阅读 Spring Boot 参考文档中“外部化配置”部分的内容。


  现在你可以运行它了。（你可以使用 Maven 命令行运行：`$ mvn spring-boot:run`，或者如果你已将其导入 STS，则可以在 Boot Dashboard
  中运行。）运行后，你将看到类似图 4-3 的内容。


  ![A337882_1_En_4_Fig3_HTML.jpg](img/A337882_1_En_4_Fig3_HTML.jpg)


  图 4-3.


  JmsSenderApplication 日志


  图 4-3 展示了应用程序运行时的日志。代码实际上正在将消息 `"Hello World"` 发送到 `jms-demo` 队列。这意味着你将看到 `JMSAudit`
  文本以及一些额外信息。我究竟在哪里打印了这些信息？请查看 `com.apress.messaging.aop.JMSAudit.java` 类。这个类是一个环绕通知，通常用于日志记录。我知道对于这个示例来说可能有些过度，但这给了我更多探索
  AOP 的方式。


  你可以看到这个客户端正在发送消息，但消息发到哪里去了？你知道我们使用了 `spring-boot-starter-activemq` 依赖，但似乎并没有任何代理在运行。这是怎么回事？


  请记住，Spring Boot 会根据你的类路径依赖做出判断，因此当它知道你拥有 `spring-boot-starter-activemq` 依赖时，会检查你是否已经声明了
  `connectionFactory`、`session`、`sender` 等类型的 Bean，以便使用它们。如果 Spring Boot 没有找到任何东西，它会默认创建所有这些
  Bean，并使用内存中的提供者（URL 为 `vm://localhost`）。这就是为什么运行时没有错误，并且你可以看到消息已被发送的原因。




