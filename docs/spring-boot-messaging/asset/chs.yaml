  \ `com.apress.messaging.cloud.stream.RateProcessor` 类，了解动态路由。同时查看 `com.apress.messaging.RestApiCloudStreamApplication`\
  \ 类（主类），因为它提供了一种使用 Source 流发送消息的新方法。\n\n\n\n## 接下来是什么？\n\n基于我向你展示的内容，思考一下如果其中一个微服务宕机了会发生什么。你的整个流程会中断吗？你如何解决故障点并增加高可用性？你如何编排所有这些微服务？你如何避免零停机？\n\
  \n好消息是，Spring Cloud Stream 是 Spring Cloud Data Flow 技术的基础。Spring Cloud Data Flow\
  \ 是一种用于编排云环境中可组合微服务应用的编排服务，它对于实时数据分析和大数据解决方案非常有用。\n\n使用 Spring Cloud Data Flow 的好处在于，这项技术得到了\
  \ Cloud Foundry、Apache Mesos、Kubernetes 和 Apache Yarn 的支持。Spring Cloud Data Flow\
  \ 依赖这些技术来编排云基础设施上的注册、创建、部署和任务，此外，它还与 Spring Cloud Services 兼容（我将在微服务章节中讨论这一点）。\n\
  \n这里的建议是研究一下这项出色的技术。你会很轻松地学习它，因为它完全是基于 Spring Cloud Stream 的。\n\n## 本章小结\n\n本章向你展示了使用\
  \ Spring Cloud Stream 和 Spring Boot 创建简单的 Stream 应用是多么容易。只需使用 `@EnableBinding` 注解和绑定器，你就可以创建消息驱动的解决方案。\n\
  \n我还向你展示了 Spring Cloud Stream 拥有应用启动器，只需添加适当的配置即可使用。\n\n下一章将讨论一项新兴技术：响应式框架。在这种情况下，我们将介绍\
  \ Spring Reactor 项目，用于在 JVM 上基于 Reactive Stream 规范创建非阻塞应用。\n\n"
- "# 10. 响应式消息传递\n\n如今，实践响应式是所有 IT 公司的首要目标。还有一些我们经常听到的相关术语，例如响应式编程、函数式响应式编程和响应式流。尽管它们有所不同，但我们在这里看到的是我们处理数据消费、并发、异步事件、高性能和分布式计算方式的一种转变。\n\
  \n本章讨论响应式编程和消息传递。这并不是一个新话题。几年前，微软发布了 C# 响应式扩展（以正式的方式），而 JavaScript 在事件响应方面也势头正劲。不仅如此，这个概念自\
  \ 60 年代就已经存在，当时程序员想要互连硬件。\n\n让我们首先深入了解响应式编程及其适用场景。然后，你将了解哪些框架将帮助你实现这种新的微事件响应式架构。\n\
  \n## 响应式编程\n\n响应式编程是一种异步处理随时间变化的事件数据流（以非阻塞形式）的方式。它是一种对其变化行为做出反应的方式。\n\n响应式编程适用于以下用例：\n\
  \n*   **电子表格/单元格**：当你打开电子表格应用时，你是否想过它的内部工作原理？每个单元格可能依赖于其他单元格，因此一个单元格的任何新变化都需要反映到其他单元格中——这就是对变化做出响应。再想象一下你在进行微积分或代数计算时的矩阵。你如何对特定矩阵单元格中的值做出反应？通常，你会开始处理事件驱动架构。\n\
  *   **高并发消息传递**：在我看来，消息传递是每个系统中最关键的部分。每秒发送几千甚至数百万条消息的想法一直是目标。能够处理所有这些消息并并发（同步和异步）消费它们也一直是一个挑战。\n\
  *   **外部服务调用**：如今，设备（手机、平板电脑、传感器等）只需一次滑动、手势或点击就需要大量信息。它们的后端服务需要从不同的服务（本地或远程）收集数据，并将信息聚合到单个响应中。它们变得非常“健谈”，有时非常缓慢。响应式编程非常适合这里。\n\
  *   **异步处理**：这对许多开发者来说一直是一个危险的领域，因为每当我们开始考虑异步进程时，就需要考虑线程、回调、并发、编排等等。有了响应式编程，我们几乎就解决了这些问题。\n\
  \n针对这些用例的大多数解决方案都涉及创建具有非阻塞 I/O 的库，例如 event-machine（来自 Ruby 编程语言），它运行良好且性能出色。\n\n\
  Java 及其新的 `java.util.concurrent` 包暴露了 Future/CompletableFuture 接口。Map-Reduce 和 Fork-Join\
  \ 有助于大数据场景下的并行处理。Actor 模型以一种自然的方式暴露了并发性，其中一个重要的实现是在 Akka 框架中。\n\n响应式编程是创建响应式、弹性、可伸缩，当然还有异步消息驱动系统的下一步，它允许流量控制并在必要时应用背压。所有这些特性都通过非阻塞通信提供。与仅基于拉取的\
  \ Java 8 流或 Iterable/Iterator 相比，响应式编程是基于推送的。换句话说，响应式编程处理同步/拉取和异步/推送的概念。\n\n现在是时候关注实现了。以下部分使用了两个主要模块或库：RxJava\
  \ 和 Reactor。然后我们将介绍即将发布的 Spring Framework 5 及其 WebFlux 模块。\n\n注意\n\n本章包含五个项目，我们将在以下部分中使用它们：`rxjava-demo`、`reactor-demo`、`web-emitter`、`spring-web-flux`\
  \ 和 `spring-web-flux-reactive`。\n\n## RxJava\n\nRxJava 来自 Netflix（称为 ReactiveX；请参阅\
  \ [`http://reactivex.io`](http://reactivex.io)），是一个通过使用可观察序列来组合异步和基于事件的程序的库。它扩展了观察者模式并支持数据序列。它通过提供一个简单的\
  \ API，消除了线程、同步、线程安全、并发数据结构和非阻塞 I/O 的复杂性。\n\nRxJava 提供了一组操作符，可以过滤、选择、转换、组合和编排可观察对象，从而实现更好、更高效的执行和组合。它暴露了几个类，比如\
  \ `Observable`，我们将在示例代码中看到。\n\n\n\n### rxjava-demo 项目\n\n打开 `com.apress.messaging.RxJavaDemoApplication`\
  \ 类。参见代码清单 10-1。\n\n```\n@SpringBootApplication\npublic class RxJavaDemoApplication\
  \ {\nprivate static final Logger log =\nLoggerFactory.getLogger(RxJavaDemoApplication.class);\n\
  public static void main(String[] args){\nlog.info(\"Demo Steam Application\");\n\
  new SpringApplicationBuilder(RxJavaDemoApplication.class)\n.web(false)\n.run(args);\n\
  }\n@Bean\nCommandLineRunner rxJava(ExchangeService service){\nreturn args -> {\n\
  log.info(\"RxJava >> Observable\");\nObservable exchange =\nservice.getExchangeRates();\n\
  exchange.subscribe(System.out::println);\n};\n}\nListing 10-1.\ncom.apress.messaging.RxJavaDemoApplication.java\n\
  ```\n\n代码清单 10-1 展示了主应用程序，其中定义了一个基本的 `Observable` 实例：\n\n*   `Observable<Exchange>`：这里我们使用了\
  \ `Observable` 类，它不仅支持发射单个标量值（如 Java 8 的 Future），还支持值序列甚至无限流。在本例中，它支持一个包含汇率的 `Exchange`\
  \ 类。\n*   `subscribe`：`Observable` 类与其 Java 同类 `Iterable`（通常通过调用其 `next()` 方法进行拉取）有一些相似之处。在本例中，我们将通过调用\
  \ `subscribe` 进行推送。这个订阅者将接收所有消息（汇率）并打印出来。\n\n`Observable` 类型增加了观察者模式所缺失的功能：生产者能够通过使用\
  \ `onCompleted` 方法向观察者（订阅者）发送信号，告知其没有更多数据可用；以及生产者能够通过使用 `onError` 方法向观察者（订阅者）发送信号，告知其发生了错误。\n\
  \n接下来，让我们看一个将数据推送给订阅者的 `Observable`。打开 `com.apress.messaging.service.ExchangeService`\
  \ 类。参见代码清单 10-2。\n\n```\n@Service\npublic class ExchangeService {\nprivate static\
  \ final Logger log =\nLoggerFactory.getLogger(ExchangeService.class);\nprivate Exchange\
  \ exchange;\nExchangeService() {\nSortedMap rates =\nnew TreeMap() {\n{\nput(\"\
  EUR\", 0.942013F);\nput(\"JPY\", 114.75440909F);\nput(\"MXN\", 19.598225F);\nput(\"\
  GPB\", 0.819626F);\n}\n};\nexchange = new Exchange(rates, new Date());\n}\npublic\
  \ Observable getExchangeRates() {\nreturn Observable.unsafeCreate(subscriber ->\
  \ {\nwhile(!subscriber.isUnsubscribed()) {\ntry {\nFloat factor =\n(new Random().nextFloat()\
  \ * 2 - 1) / 10F;\nsubscriber.onNext(\nnew Exchange(exchange\n.getRates()\n.entrySet()\n\
  .stream()\n.collect(\nCollectors.toMap(\nentry ->\nentry.getKey(),\nentry -> entry.getValue()\n\
  * factor + entry.getValue(),\n(v1, v2) -> {\nthrow new RuntimeException(String.format(\"\
  Duplicate key for values %s\nand %s\", v1, v2));\n}, TreeMap::new)), new Date()));\n\
  if (new Random().nextInt(100) > 90 )\nthrow new Exception(\n\"Some values are getting\
  \ too high!!\");\nsleep(1000);\n} catch (Exception ex){\nlog.error(ex.getMessage());\n\
  }\n}\n});\n}\nprivate void sleep(int ms) {\ntry {\nThread.sleep(ms);\n} catch (Exception\
  \ ex) {}\n}\n}\nListing 10-2.\ncom.apress.messaging.service.ExchangeService.java\n\
  ```\n\n代码清单 10-2 展示了该服务。这个 observable 将每秒推送一次汇率。花点时间分析一下代码，然后我们一起分析：\n\n*   `Observable.`\
  \ `unsafeCreate`：这将返回一个 observable，它会为每个 `Subscriber` 执行给定的 `OnSubscribe` 操作（参见代码清单\
  \ 10-1）。使用这个 observable，你可以在发生错误时执行 `onError(Throwable)`，或者在没有更多数据时执行 `onCompleted()`。这里重要的部分之一是\
  \ `while` 语句中的 `subscriber.isUnsubscribee()`。这里我们正在判断是否还有更多的订阅者。我们将在接下来的示例中看到这一点。\n\
  *   `subscriber.onNext`：这为观察者（订阅者）提供了一个新项目（汇率）。此方法调用将值推送给订阅者。参见代码清单 10-1。\n\n这个特定的服务将每秒发送一次汇率（参见\
  \ `sleep` 语句）。汇率会变化，因为对其应用了一个因子，以模拟货币兑换世界中的真实场景。\n\n如果你运行该应用程序，应该会得到类似于图 10-1 的结果。\n\
  \n![A337882_1_En_10_Fig1_HTML.jpg](img/A337882_1_En_10_Fig1_HTML.jpg)\n\n图 10-1.\n\
  \n应用程序日志\n\n图 10-1 展示了你的第一个响应式应用程序的日志。接下来，让我们修改主类并添加一个订阅者实现。参见代码清单 10-3。\n\n```\n\
  @SpringBootApplication\npublic class RxJavaDemoApplication {\nprivate static final\
  \ Logger log =\nLoggerFactory.getLogger(RxJavaDemoApplication.class );\npublic static\
  \ void main(String[] args){\nlog.info(\"Demo Steam Application\");\nnew SpringApplicationBuilder(RxJavaDemoApplication.class)\n\
  .web(false)\n.run(args);\n}\n@Bean\nCommandLineRunner rxJava(ExchangeService service){\n\
  return args -> {\nObservable observableExchange =\nservice.getExchangeRates();\n\
  observableExchange.subscribe(new Subscriber(){\n@Override\npublic void onCompleted()\
  \ {\nlog.info(\"EXCHANGE COMPLETED!!\");\n}\n@Override\npublic void onError(Throwable\
  \ t) {\nlog.error(\"EXCHANGE IS SKYROCKETING... >> \" +\nt.getMessage());\nunsubscribe();\n\
  }\n@Override\npublic void onNext(Exchange ex) {\nlog.info(ex.toString());\nif(ex.getRates().get(\"\
  JPY\").floatValue() >\n125.0F){\nlog.warn(\">>> JPY rate is now to high: \" +\n\
  ex.getRates().get(\"JPY\")\n.floatValue() + \", is time to quit. Bye.\");\nunsubscribe();\n\
  }\n}\n});\n};\n}\n}\nListing 10-3.\ncom.apress.messaging.RxJavaDemoApplication.java\n\
  ```\n\n代码清单 10-3 展示了一个更完整的示例。在本例中，我们不仅仅是使用方法引用（`System.out::println`），而是创建了一个新的\
  \ `Subscriber<Exchange>` 并重写了一些方法：\n\n*   `Subscriber<Exchange>`：这是一个抽象类，它提供了一种从\
  \ `Observables` 接收基于推送的通知的方式，并允许手动取消对这些 `Observables` 的订阅。\n*   `onError`：此方法通知观察者\
  \ `Observable` 出现了错误情况。\n*   `onCompleted`：此方法通知观察者 `Observable` 已完成发送基于推送的通知。\n\
  *   `onNext`：此方法向观察者提供一个新项目（在本例中是一个新的汇率）以供观察。请注意，在此方法中有一个 `unsubscribe()` 调用，它将设置标志，使得\
  \ `subscriber.isUnsubscribed()` 中的 `Observable` 评估为 `true`，从而结束 `while` 语句。\n\n\
  如果你运行该应用程序，应该会看到类似于图 10-2 的结果。\n\n![A337882_1_En_10_Fig2_HTML.jpg](img/A337882_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2.\n\n日志\n\n图 10-2 展示了运行应用程序后的日志。请注意，`JPY` 汇率触发了 `unsubscribe()` 调用，这意味着\
  \ `Observable` 将停止发送基于推送的汇率。\n\n\n\n请注意，我在本书的源代码中包含了更多代码，但此处未作介绍，希望你能自行实验。花点时间分析一下发生了什么。我添加了一个示例，演示如何与固定数量的基于推送的汇率进行交互。\n\
  \n到目前为止，这些示例都在同一个主线程中运行，但有一种方法可以使用多线程。看看这段代码，你可以通过 `ExecutorService` 类使用自己的线程池。例如：\n\
  \n```\nExecutorService executorService =\nExecutors.newFixedThreadPool(100);\nObservable\
  \ observableExchange =\nservice.getExchangeRates();\nobservableExchange\n.take(10)\n\
  .subscribeOn(\nSchedulers\n.from(executorService))\n.forEach(ex -> { log.info(ex.toString());\
  \ });\n```\n\nRxJava 目前已经发展到 2.x 版本，并且更改了一些签名。你可以在 [`https://github.com/ReactiveX/RxJava/wiki/What’s-different-in-2.0`](https://github.com/ReactiveX/RxJava/wiki/What%27s-different-in-2.0)\
  \ 查看这些变更。\n\n## Reactor\n\nReactor（来自 Spring 框架团队）是一个完全成熟且非阻塞的 JVM 响应式编程基础库。它与所有\
  \ Java 8 函数式 API（`CompletableFuture`、`Stream` 和 `Duration`）协同工作，提供了两个可组合的异步序列 API（`Flux`——N\
  \ 个元素和 `Mono`——0 或 1 个元素），并实现了响应式扩展规范。\n\n你可以在 [`http://projectreactor.io/`](http://projectreactor.io/)\
  \ 获取关于 Reactor 的更多信息。让我们从代码开始。\n\n### reactor-demo 项目\n\n这个项目与我们之前看到的 RxJava 项目非常相似，但这次我们不再使用\
  \ `Observable`，而是使用 `Flux`。打开 `com.apress.messaging.ReactorDemoApplication` 类。参见清单\
  \ 10-4。\n\n```\n@SpringBootApplication\npublic class ReactorDemoApplication {\n\
  private static final Logger log =\nLoggerFactory\n.getLogger(ReactorDemoApplication.class);\n\
  public static void main(String[] args) throws IOException {\nSpringApplication.run\n\
  (ReactorDemoApplication.class, args);\nSystem.in.read();\n}\n@Bean\nCommandLineRunner\
  \ reactorFlux(ExchangeService service){\nreturn args -> {\nlog.info(\"Reactor >>\
  \ Flux\");\nFlux fluxExchange =\nservice.getExchangeRates();\nfluxExchange.subscribe(\
  \ ex -> log.info(ex.toString()));\n}\n}\n}\n清单 10-4.\ncom.apress.messaging.ReactorDemoApplication.java\n\
  ```\n\n清单 10-4 向你展示了 Reactor 的方式，使用 `Flux` 和 `subscribe` 方法调用来处理基于推送的数据流。`Flux`\
  \ 表示一个包含 0 到 N 个项目的响应式序列（在本例中为汇率）。\n\n在底层，`Flux` 被描述为 `Flux<T>`，并实现了 `Publisher<T>`\
  \ 接口。该接口是无限数量有序元素的提供者，并根据其订阅者的需求发布这些元素。一个发布者可以在不同时间点以动态方式服务于多个订阅者（`Subscriber<T>`\
  \ 接口）。\n\n让我们看看服务类。打开 `com.apress.messaging.service.ExchangeService` 类。参见清单 10-5。\n\
  \n```\n@Service\npublic class ExchangeService {\nprivate static final Logger log\
  \ =\nLoggerFactory.getLogger(ExchangeService.class);\nprivate Exchange exchange;\n\
  ExchangeService() {\nlog.info(\">>> Exchange Service created.\");\n@SuppressWarnings({\
  \ \"serial\" })\nSortedMap rates =\nnew TreeMap() {\n{\nput(\"EUR\", 0.942013F);\n\
  put(\"JPY\", 114.75440909F);\nput(\"MXN\", 19.598225F);\nput(\"GPB\", 0.819626F);\n\
  }\n};\nexchange = new Exchange(rates, new Date());\n}\npublic Flux getExchangeRates(){\n\
  return Flux.create( sink -> {\nwhile(true){\nFloat factor =\n(new Random().nextFloat()\
  \ * 2 - 1) / 10F;\nsink.next(\nnew Exchange(\nexchange\n.getRates()\n.entrySet()\n\
  .stream()\n.collect(\nCollectors.toMap(\nentry -> entry.getKey(),\nentry -> entry.getValue()\
  \ * factor + entry.getValue(),\n(v1, v2) -> {\nthrow new RuntimeException(\nString.format(\"\
  Duplicate key for values %s and %s\", v1, v2));\n}, TreeMap::new)), new Date()));\n\
  sleep(1000);\nif(factor > 0.095F)\nsink.complete();\n}\n});\n}\nprivate void sleep(int\
  \ ms) {\ntry {\nThread.sleep(ms);\n} catch (Exception ex) { }\n}\n}\n清单 10-5.\n\
  com.apress.messaging.service.ExchangeService.java\n```\n\n清单 10-5 向你展示了 `Subscriber`\
  \ 通过调用 `create` 方法使用 `Flux<Exchange>`。该方法接收一个 `Consumer<? Super FluxSink<T>>`。这个消费者只是一个需要执行的简单调用。参数需要是\
  \ `FluxSink<T>` 类型的接口。该接口是下游订阅者的包装 API，并发送任意数量的信号，后跟零个或至少一个 `onError` 或 `onComplete`。\n\
  \n如果你运行该应用程序，你应该会看到类似于图 10-3 的内容。\n\n![A337882_1_En_10_Fig3_HTML.jpg](img/A337882_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3.\n\n日志\n\n使用 RxJava 和 Reactor 有什么区别？Reactor 支持函数式编程、调度器、低延迟和 Lambda 管道方法。Reactor\
  \ 最大的优势之一是它支持 Spring 的所有 HTTP MVC 类型，这是一种开箱即用的流式功能（服务器发送事件——SSE）。\n\n我在项目中添加了更多示例。你只需启用它们，然后运行、实验并与之互动。\n\
  \n## Spring 5：WebFlux 框架\n\nSpring 5 有许多新特性，包括对 JDK 9 的支持。其主要特性之一是基于 Reactor 的函数式\
  \ Web 框架（Functional Web Framework）或 WebFlux。\n\nServlet 3.1 规范能够支持非阻塞 I/O，但效果可能不如你想象的那么好。Servlet\
  \ API 的其余部分仍然是命令式风格，无法在响应式、非阻塞的栈中使用。\n\nSpring 团队包含了 `spring-webflux` 模块，为 Web 应用程序添加了新的函数式编程模型。与\
  \ `spring-mvc` 一起，你可以拥有一个响应式栈的 Web 框架。`spring-webflux` 模块还有一个响应式的 `WebClient`，它是\
  \ `RestTemplate` 类的非阻塞替代方案，允许你处理异步和流式场景。参见图 10-4。\n\n![A337882_1_En_10_Fig4_HTML.gif](img/A337882_1_En_10_Fig4_HTML.gif)\n\
  \n图 10-4.\n\nSpring WebFlux\n\n### 编程模型\n\nSpring WebFlux 有两种编程模型：基于注解的和基于函数的。\n\
  \n\n\n#### 基于注解的编程模型\n\n你可以使用与 `spring-webmvc` 模块中相同的知名注解；主要区别在于核心现在是非阻塞的，并且基于响应式的\
  \ `ServerHttpRequest` 和 `ServerHttpResponse` 响应（而不是 `HttpServletRequest` 和 `HttpServletResponse`\
  \ 响应）。\n\n打开 `spring-web-flux-reactive` 项目，然后打开 `com.apress.messaging.controller.ReactiveController`\
  \ 类。参见清单 10-6。\n\n```\n@RestController\npublic class ReactiveController {\n    SubscribableChannel\
  \ personChannel;\n    PersonRepository repo;\n    public ReactiveController(SubscribableChannel\
  \ personChannel, PersonRepository repo){\n        this.personChannel = personChannel;\n\
  \        this.repo = repo;\n    }\n    @GetMapping(\"/person\")\n    Flux list()\
  \ {\n        return Flux.fromStream(this.repo.getAll());\n    }\n    @GetMapping(\"\
  /person/{id}\")\n    Mono findById(@PathVariable String id) {\n        return Mono.just(this.repo.findOne(id));\n\
  \    }\n    @GetMapping(value=\"/person-watcher\", produces=MediaType.TEXT_EVENT_STREAM_VALUE)\n\
  \    public Flux log4Person(){\n        return Flux.create( sink -> {\n        \
  \    MessageHandler handler = message -> sink.next((Person) message.getPayload());\n\
  \            personChannel.subscribe(handler);\n            sink.setCancellation(()\
  \ -> personChannel.unsubscribe(handler));\n        });\n    }\n    @PostMapping(value=\"\
  /person\", consumes = {MediaType.APPLICATION_JSON_VALUE})\n    public void createPerson(@RequestBody\
  \ Person person){\n        if(person != null && person.getName() != null){\n   \
  \         repo.save(person);\n            personChannel.send(MessageBuilder.withPayload(person).build());\n\
  \        }\n    }\n}\n清单 10-6.\ncom.apress.messaging.controller.ReactiveController.java\n\
  ```\n\n清单 10-6 展示了你在 Spring MVC 中见过的注解，但现在它们基于响应式流。分析代码，注意我们正在使用 Reactor 编程模型——`Flux`\
  \ 和 `Mono` 响应式类。\n\n尽管我不打算详细讨论服务器推送事件（SSE）技术，但 `spring-webflux` 只需生成 `TEXT_EVENT_STREAM_VALUE`\
  \ 内容类型即可引入该技术。SSE 是一种通过推送通知将消息从服务器发送到网页的方式。\n\n注意\n\n`web-emitter` 项目包含一个 SSE 示例。SSE\
  \ 已包含在 Spring 4.2 中，因此这不是一项新技术。它已经存在了几年。浏览器需要实现接收通知的方式。\n\n#### 基于函数的编程模型\n\n你可以使用函数式编程来配置服务器的所有请求和响应。你需要定义\
  \ `RouterFunctions`、`HandlerFunctions` 和一个服务器。\n\n##### RouterFunctions、HandlerFunctions\
  \ 和 Server\n\nSpring WebFlux 包含多个响应式类和概念，使得对 Web 请求和响应进行建模更加容易：\n\n*   `HandlerFunctions`：所有请求都由一个\
  \ `HandlerFunction<T>` 处理，它接收 `ServerRequest` 并返回一个 `Mono<ServerResponse>`。\n* \
  \  `RouterFunctions`：所有传入的请求都通过一个 `RouterFunction<T>` 路由到处理函数，该函数接收 `ServerRequest`\
  \ 并返回一个 `Mono<HandlerFunction>` 类型。\n*   `Server`：需要配置一个新的服务器来使用新的 `RouterFunctions`\
  \ 和 `Handlers`。\n\n`spring-web-flux` 项目包含你在本节中需要的所有代码。\n\n首先打开包含所有 `RouterFunctions`\
  \ 的配置。打开 `com.apress.messaging.config.ServerConfig` 类。参见清单 10-7。\n\n```\n@Configuration\n\
  public class ServerConfig {\n    PersonHandler handler;\n    ServerConfig(PersonHandler\
  \ handler){\n        this.handler = handler;\n    }\n    @Bean\n    RouterFunction\
  \ router(){\n        return RouterFunctions\n                .route(GET(\"/persons/{id}\"\
  ).and(accept(APPLICATION_JSON)), handler::findById)\n                .andRoute(GET(\"\
  /persons\").and(accept(APPLICATION_JSON)), handler::findAll)\n                .andRoute(GET(\"\
  /personwatcher\").and(accept(APPLICATION_JSON)), handler::newPersonLog)\n      \
  \          .andRoute(POST(\"/persons\").and(accept(APPLICATION_JSON)), handler::createPerson);\n\
  \    }\n    @Bean\n    HttpServer httpServer(RouterFunction router){\n        HttpHandler\
  \ httpHandler = RouterFunctions.toHttpHandler(router);\n        ReactorHttpHandlerAdapter\
  \ adapter = new ReactorHttpHandlerAdapter(httpHandler);\n        HttpServer server\
  \ = HttpServer.create(\"localhost\", 8080);\n        server.newHandler(adapter).block();\n\
  \        return server;\n    }\n}\n清单 10-7.\ncom.apress.messaging.config.ServerConfig.java\n\
  ```\n\n清单 10-7 展示了配置新的响应式 Web 栈所需的函数式编程，通过创建 `RouterFunctions`。你可以将其视为创建 Web 控制器的一种新方式。注意我们正在定义路由和处理程序。\n\
  \n清单 10-7 向你展示了如何配置服务器。在此示例中，配置的是 `Netty` 服务器。注意 `HttpHandler` 和 `ReactorHttpHandler`\
  \ 是如何被使用的。\n\n接下来，打开 `com.apress.messaging.handler.PersonHandler` 类。参见清单 10-8。\n\
  \n```\n@Component\npublic class PersonHandler {\n    PersonRepository repo;\n  \
  \  EmitterProcessor stream = EmitterProcessor.create().connect();\n    PersonHandler(PersonRepository\
  \ repo) {\n        this.repo = repo;\n    }\n    public Mono findAll(ServerRequest\
  \ request) {\n        Flux people = Flux.fromStream(this.repo.getAll());\n     \
  \   return ServerResponse.ok().contentType(APPLICATION_JSON).body(people, Person.class);\n\
  \    }\n    public Mono findById(ServerRequest request) {\n        String personId\
  \ = request.pathVariable(\"id\");\n        Mono notFound = ServerResponse.notFound().build();\n\
  \        Mono personMono = Mono.just(this.repo.findOne(personId));\n        return\
  \ personMono.then(person -> ServerResponse.ok().contentType(APPLICATION_JSON).body(fromObject(person)))\n\
  \                .otherwiseIfEmpty(notFound);\n    }\n    public Mono createPerson(ServerRequest\
  \ request) {\n        Mono person = request.bodyToMono(Person.class);\n        return\
  \ ServerResponse.ok().build(person.doOnNext(p -> {\n            this.repo.save(p);\n\
  \            this.stream.onNext(p);\n        }).then());\n    }\n    public Mono\
  \ newPersonLog(ServerRequest request){\n        Mono personMono = stream.doOnNext(\
  \ person -> {\n            System.out.println(\">>>> [Person created] \" + person);\n\
  \        }).next().subscribe();\n        personMono.block();\n        return personMono.then(person\
  \ -> ServerResponse.ok().contentType(APPLICATION_JSON).body(fromObject(person)));\n\
  \    }\n}\n清单 10-8.\ncom.apress.messaging.handler.PersonHandler.java\n```\n\n清单\
  \ 10-8 展示了将用于每个路由函数的处理程序。注意每个方法都接收 `ServerRequest` 作为参数，并返回一个 `Mono<ServerResponse>`。\n\
  \n注意\n\n要运行 `spring-web-flux-reactive` 和 `spring-web-flux` 项目，你需要启动并运行 Mongo 服务器。\n\
  \n## 总结\n\n本章介绍了响应式编程，包括讨论它的优点以及我们可以用它做什么。目前有很多关于响应式编程的内容需要解释，本章只是一个开始。\n\n你看到了两个模块/库——RxJava（来自\
  \ Netflix）和 Reactor（来自 Spring 框架团队）。你还预览了即将在几周后发布的 Spring 5 和函数式 Web：WebFlux 中的内容。\n\
  \n在下一章中，我们将讨论微服务，你将学习如何将本书中学到的所有知识应用到基于微服务的项目中。\n\n"
- "# 11. 微服务\n\n本章讨论微服务架构，并介绍为了使用微服务进入云原生应用设计而需要做出的更改。它还涵盖了消息传递如何成为成功的关键因素。\n\n\n\n\
  ## 什么是微服务\n\n微服务并非新鲜事物，自 UNIX 诞生以来就已存在。UNIX 拥有许多执行各种任务的小程序（称为命令），它们可以相互通信以创建更出色的解决方案。它们是如何做到的呢？\n\
  \n如果你是一位经验丰富的 UNIX 程序员，你已经知道答案了。这些命令通过管道 `|` 进行通信，管道允许 UNIX 将信息传递给下一个可用的程序或命令。例如：\n\
  \n```\nls -al | grep Aug | grep -v '200[456]' | more\n```\n\n如果你现在开始思考自己的系统和应用程序，如何实现同样的效果？你能创建基于特定领域的小型应用程序，并让它们与其他应用程序通信吗？\n\
  \n微服务在架构师、开发人员和运维团队中引起了极大的热情，但我们为什么需要它们呢？我认为时间是其中的关键因素，因为应用程序需要快速、有弹性、高可用且可扩展，同时还要保持高性能。\n\
  \n*   **速度**：你需要比竞争对手更快地交付。你可以使用微服务来帮助你在上市时间上更快地交付。\n*   **安全性**：你需要通过监控、隔离、容错和自动恢复实践，在整个开发周期中保持稳定性、可用性和持久性。开始考虑持续交付和持续集成。\n\
  *   **可扩展性**：垂直扩展（即购买更多硬件）的扩展性不佳。使用通用硬件，重用现有资源并进行水平扩展，创建同一应用程序的多个实例。使用容器来帮助你扩展。\n\
  *   **移动性**：准备支持多种设备，随时随地访问。移动设备连接到互联网，不仅用于社交媒体、电子邮件和聊天，还用于监控房屋、引擎等。\n\n一切似乎都说得通，对吧？但我还没有解释一个微服务如何与多个其他微服务通信。消息传递是关键！许多公司通过创建装饰器、转换器或外观模式，使用\
  \ RESTful API 与其他系统或程序（甚至是遗留系统）通信，但你还有更多通信选项，包括 HTTP、TCP（Web Socket、AMQP）、响应式流等。\n\
  \n以简单方式创建微服务的基本指南被称为十二要素应用原则。\n\n## 十二要素应用\n\n为了概述创建云原生架构所需的内容，Heroku（参见 [`https://www.heroku.com/`](https://www.heroku.com/)\
  \ ）的工程师们识别出了一些模式，这些模式后来成为了十二要素应用指南（参见 [`https://12factor.net/`](https://12factor.net/)\
  \ ）。该指南展示了如何架构一个应用程序（单个单元）。它侧重于声明式配置、无状态和部署无关性。换句话说，你的应用程序需要快速、安全且可扩展。\n\n以下是十二要素应用指南的摘要：\n\
  \n*   **代码库**：一份在版本控制系统（VCS）中跟踪的代码库，多次部署。一个应用只有一个代码库，并由 Git、Subversion、Mercurial\
  \ 等版本控制系统跟踪。你可以（从同一代码库）进行多次部署到开发、测试、预发布和生产环境。\n*   **依赖**：显式声明并隔离依赖。有时你的环境没有互联网连接（如果是私有系统），因此你需要考虑打包你的依赖（jar、gem、共享库等）。如果你有一个内部库仓库，你可以声明类似\
  \ pom、gemfile、bundle 的清单。永远不要假设你的最终环境中会拥有一切。\n*   **配置**：将配置存储在环境中。你不应对任何可变的内容进行硬编码。使用环境变量或配置服务器。\n\
  *   **后端服务**：将后端服务视为附加资源。通过 URL 或配置连接到服务。\n*   **构建、发布、运行**：严格分离构建和运行阶段。与 CI/CD（持续集成、持续交付）相关。\n\
  *   **进程**：以一个或多个无状态进程的方式执行应用。进程不应存储内部状态。不共享任何内容。任何必要的状态都应被视为后端服务。\n*   **端口绑定**：通过端口绑定导出服务。你的应用程序是自包含的，这些应用通过端口绑定暴露。一个应用程序可以成为另一个应用的服务。\n\
  *   **并发**：通过进程模型进行水平扩展。通过添加更多应用实例来扩展。单个进程可以自由地进行多线程处理。\n*   **可处置性**：通过快速启动和优雅关闭最大化鲁棒性。进程应该是可处置的（记住它们是无状态的）并且具有容错能力。\n\
  *   **环境等价**：尽可能保持开发、预发布和生产环境相似。换句话说，检查你安装的操作系统，以及你使用的框架、运行时或库版本。它们在每个环境中必须相同。这是高质量的结果，并确保持续交付。\n\
  *   **日志**：将日志视为事件流。你的应用应写入 `stdout`。日志是聚合的、按时间排序的事件流。\n*   **管理进程**：将管理和维护任务作为一次性进程运行。在平台上运行管理进程：数据库迁移、一次性脚本等。\n\
  \n一些程序员认为你需要拥有云基础设施才能使用微服务，但在我看来，你并不需要。如果你遵循这些原则，你将准备好与更大的公司竞争。当你准备迁移或切换到更好的基础设施时，你已经准备好了。\n\
  \n如果你想开始创建微服务并遵循这十二要素原则，仅靠单个或小型团队从零开始创建一切是不够的。你将面临几个变化：\n\n*   **文化层面**：我们需要摆脱人员孤岛，开始创建跨职能团队。他们工作更高效，并致力于解决单一领域的业务场景。开始思考持续交付，分散决策权，并寻求团队自主性。\n\
  *   **组织层面**：创建跨职能的业务能力团队。这些团队拥有自主决策权。创建平台团队运营，该团队也应是跨职能的。\n*   **技术层面**：摆脱构建单体应用，转向微服务架构。思考限界上下文。遵循领域驱动设计的一些原则和实践。开始使用容器化，以获得应用的隔离性、可扩展性和高性能，然后寻找能让你控制分布的服务集成。参见图\
  \ 11-1 。\n\n![A337882_1_En_11_Fig1_HTML.gif](img/A337882_1_En_11_Fig1_HTML.gif)\n\
  \n图 11-1.\n\n单体架构与使用微服务的对比\n\n## Spring Cloud 服务\n\nSpring Cloud 服务是一组工具/框架，可以轻松、快速且安全地开发微服务架构。本节涵盖最常见的\
  \ Spring Cloud 服务：Spring Cloud Config、服务注册中心和断路器。\n\n### Spring Cloud Config 服务器\n\
  \nConfig 服务器是一个外部化的应用配置服务，它为你提供了一个集中管理应用跨环境外部属性的地方。参见图 11-2 。\n\n![A337882_1_En_11_Fig2_HTML.gif](img/A337882_1_En_11_Fig2_HTML.gif)\n\
  \n图 11-2.\n\nConfig 服务器\n\n你可以在开发阶段或与你的流水线（持续交付）一起使用 Config 服务器。你可以集中管理每个环境以访问通用的外部配置，而无需重新打包或重新部署。\n\
  \n\n\n#### 云配置服务器\n\n要使用配置服务器，你需要执行以下操作：\n\n1.  在你的 `pom.xml` 文件中，需要使用以下 `<dependency/>`\
  \ 和 `<dependencyManagement/>` 标签：\n\n    ```\n    ...\n\n    org.springframework.cloud\n\
  \    spring-cloud-config-server\n\n    ...\n\n    org.springframework.cloud\n  \
  \  spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\n\
  \    在本书撰写时，版本为 Camdem.SR6。如需保持更新，请查看位于 [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
  \ 的主项目网站。  \n2.  添加 `@EnableConfigServer`：\n\n    ```\n    @SpringBootApplication\n\
  \    @EnableConfigServer\n    public class ConfigServerDemoApplication {\n    public\
  \ static void main(String[] args) {\n    SpringApplication.run(\n    ConfigServerDemoApplication.class,\
  \ args);\n    }\n    }\n    ```\n\n    `@EnableConfigServer` 将创建配置服务器，它会从 GitHub\
  \ 获取最新值并处理来自客户端的请求。  \n3.  添加 `application.properties`（或 `application.yml`）文件，通过提供\
  \ URI 来指定 Git 仓库的位置。\n\n    ```\n    # 默认端口\n    server.port=8888\n    # Spring\
  \ 配置服务器\n    spring.cloud.config.server.git.uri=https://github.com//your-repo-app-config.git\n\
  \    ```\n\n仅此而已，你不需要其他任何东西。现在你可以运行配置服务器了。你可以查看 `config-server-demo` 项目。\n\n####\
  \ 云配置客户端\n\n要连接到云配置服务器，你需要执行以下操作：\n\n1.  将 `<dependency/>` 和 `<dependencyManagement/>`\
  \ 标签添加到你的 `pom.xml` 文件中：  \n\n```\n...\n\norg.springframework.cloud\nspring-cloud-starter-config\n\
  \n...\n\norg.springframework.cloud\nspring-cloud-dependencies\nCamden.SR6\npom\n\
  import\n\n```\n\n仅此而已。现在你可以像往常一样使用任何属性，无论是通过常规的 `@Value(\"${hello-world-message}\"\
  )` 还是通过 `@ConfigurationProperties`。你可以在 `config-client-demo` 项目中找到完整的示例。\n\n我认为这是一个非常直接的解决方案。如果你需要更深入的参考资料，请访问\
  \ [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
  \ 网站。\n\n### 服务注册中心\n\n服务注册中心提供了服务发现模式的实现。该模式是微服务架构最重要的特性之一。见图 11-3。\n\n![A337882_1_En_11_Fig3_HTML.gif](img/A337882_1_En_11_Fig3_HTML.gif)\n\
  \n图 11-3.\n\n服务注册中心\n\n当客户端向服务注册中心注册时，它会提供关于自身的元数据，例如其主机和端口号。它还会持续向服务注册中心发送心跳。服务注册中心将所有信息保存在内存中。\n\
  \n#### 服务注册中心：Eureka 服务器\n\n要使用服务注册中心（Eureka 服务器），你需要执行以下操作：\n\n1.  将 `<dependency/>`\
  \ 和 `<dependencyManagement/>` 标签添加到你的 `pom.xml` 文件中：\n\n    ```\n    org.springframework.cloud\n\
  \    spring-cloud-starter-eureka-server\n\n    ...\n\n    org.springframework.cloud\n\
  \    spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\
  \n2.  将 `@EnableEurekaServer` 添加到你的应用程序中：\n\n    ```\n    @SpringBootApplication\n\
  \    @EnableEurekaServer\n    public class ServiceRegistryDemoApplication {\n  \
  \  public static void main(String[] args) {\n    SpringApplication.run(\n    ServiceRegistryDemoApplication.class,\
  \ args);\n    }\n    }\n    ```\n\n    `@` `EnableEurekaServer` 会启动一个网页。你可以在浏览器中查看\
  \ `http://localhost:8761/`，如图 11-4 所示。\n\n    ![A337882_1_En_11_Fig4_HTML.jpg](img/A337882_1_En_11_Fig4_HTML.jpg)\n\
  \n    图 11-4.\n\n    位于 http://localhost:8761 的 Eureka 服务器  \n3.  将以下属性添加到 `application.properties`（或\
  \ `application.yml`）中：\n\n    ```\n    # 默认服务器端口\n    server.port=8761\n    # Eureka\
  \ 配置\n    eureka.instance.hostname=localhost\n    eureka.client.register-with-eureka=false\n\
  \    eureka.client.fetch-registry=false\n    eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/\n\
  \    ```\n\n仅此而已，你不需要其他任何东西。你可以查看 `service-registry-server-demo` 项目并运行它。它将在 `8761`\
  \ 端口运行。\n\n#### 向 Eureka 服务器注册服务应用程序\n\n要注册一个应用程序，请遵循以下步骤：\n\n1.  将 `<dependency/>`\
  \ 和 `<dependencyManagement/>` 标签添加到你的 `pom.xml` 文件中：\n\n    ```\n    org.springframework.cloud\n\
  \    spring-cloud-starter-eureka\n\n    ...\n\n    org.springframework.cloud\n \
  \   spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\n\
  2.  将 `@EnableDiscoveryClient` 添加到你的应用程序中：\n\n    ```\n    @RestController\n   \
  \ @SpringBootApplication\n    @EnableDiscoveryClient\n    public class ServiceRegistryServiceDemoApplication\
  \ {\n    public static void main(String[] args) {\n    SpringApplication.run(\n\
  \    ServiceRegistryServiceDemoApplication.class, args);\n    }\n    @GetMapping(\"\
  /message\")\n    public String getMessage(){\n    return \"Hello World from a Service\
  \ Discovery\";\n    }\n    }\n    ```\n\n    此注解会自动与 Eureka 服务器通信（默认端口为 `8761`）。\
  \  \n3.  将以下属性添加到 `application.properties`（或 `application.yml`）中：\n\n    ```\n \
  \   # 服务器端口\n    server.port=8181\n    # 应用程序名称\n    spring.application.name=simple-service\n\
  \    ```\n\n    包含应用程序名称非常重要，因为这是它被发现的方式。  \n\n你可以查看 `service-registry-service-demo`\
  \ 项目。如果你运行该应用程序，你应该会在 Eureka 服务器中看到名为 `SIMPLE-` `SERVICE` 的条目。见图 11-5。\n\n![A337882_1_En_11_Fig5_HTML.jpg](img/A337882_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5.\n\nEureka 发现\n\n\n\n#### 通过客户端应用程序访问服务\n\n要访问应用程序，请遵循以下步骤：\n\n1.  将 `<dependency/>`\
  \ 和 `<dependencyManagement/>` 标签添加到你的 `pom.xml` 文件中：\n\n    ```\n    org.springframework.cloud\n\
  \    spring-cloud-starter-eureka\n\n    ...\n\n    org.springframework.cloud\n \
  \   spring-cloud-dependencies\n    Camden.SR6\n    pom\n    import\n\n    ```\n\n\
  2.  使用 `EurekaClient` 类和 `RestTemplate`（在此示例中）来获取服务。\n\n    ```\n    @RestController\n\
  \    @SpringBootApplication\n    public class ServiceRegistryClientDemoApplication\
  \ {\n    private static Logger log =\n    LoggerFactory.getLogger(\n    ServiceRegistryClientDemoApplication.class);\n\
  \    public static void main(String[] args) {\n    SpringApplication.run(\n    ServiceRegistryClientDemoApplication.class,\
  \ args);\n    }\n    private EurekaClient discoveryClient;\n    private RestTemplate\
  \ restTemplate = new RestTemplate();\n    ServiceRegistryClientDemoApplication(\n\
  \    EurekaClient discoveryClient){\n    this.discoveryClient = discoveryClient;\n\
  \    }\n    @GetMapping(\"/\")\n    public String getMessageFromRemoteServer(){\n\
  \    return\n    restTemplate.getForObject(\n    fetchServiceUrl() + \"/message\"\
  , String.class);\n    }\n    private String fetchServiceUrl() {\n    InstanceInfo\
  \ instance = discoveryClient\n    .getNextServerFromEureka(\"SIMPLE-SERVICE\", false);\n\
  \    String serviceUrl = instance.getHomePageUrl();\n    log.info(\">>> Accessing:\
  \ \" + serviceUrl);\n    return serviceUrl;\n    }\n    }\n    ```\n\n你可以查看 `service-registry-client-demo`\
  \ 项目。在这里，`EurekaClient` 使用 `getNextServerFromEureka` 方法，并传入服务名称，在本例中为 `SIMPLE-SERVICE`。（这就是为什么在服务中拥有应用程序名称很重要的原因。）通过这种方式，它可以获取一个\
  \ `InstanceInfo` 实例，从中你可以获取服务的实际 URL、端口等信息。\n\n使用 Eureka 服务器和 Eureka 发现客户端相当简单。当然，这只是一个简单的示例，但你可以创建多个实例，并将\
  \ ribbon（一个客户端负载均衡器）与 Eureka 服务器结合使用。如果你需要更多相关信息，请访问 [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
  \ 。\n\n### 断路器\n\n这是断路器模式的一种实现，它可以防止级联故障，并在故障服务恢复正常之前提供回退行为。请参见图 11-6 。\n\n![A337882_1_En_11_Fig6_HTML.gif](img/A337882_1_En_11_Fig6_HTML.gif)\n\
  \n图 11-6.\n\n断路器模式\n\n当你对某个服务应用断路器时，它会监视失败的调用。如果这些失败达到某个阈值（可以通过编程方式设置），断路器就会打开，并将调用重定向到指定的回退操作。这为故障服务提供了恢复时间。此模式实现基于\
  \ Netflix 的 Hystrix，Spring Cloud 团队通过注解启用此功能。请参见以下代码：\n\n```\n@RestController\n\
  @SpringBootApplication\n@EnableCircuitBreaker\npublic class CircuitBreakerServiceDemoApplication\
  \ {\npublic static void main(String[] args) {\nSpringApplication.run(\nCircuitBreakerServiceDemoApplication.class,\
  \ args);\n}\n@Autowired\nprivate RestTemplate restTemplate;\n@LoadBalanced\n@Bean\n\
  RestTemplate restTemplate() {\nreturn new RestTemplate();\n}\n@GetMapping(\"/\"\
  )\npublic String getMessageFromRemoteServer(){\nreturn this.getMessage();\n}\n@HystrixCommand(fallbackMethod\
  \ = \"defaultMessage\")\npublic String getMessage(){\nreturn restTemplate\n.getForObject(\"\
  http://simple-service\" + \"/message\", String.class);\n}\npublic String defaultMessage(){\n\
  return \"Nothing here\";\n}\n}\n```\n\n从这段代码可以看出，使用断路器模式非常简单。你只需添加 `@EnableCircuitBreaker`\
  \ 和 `@HystrixCommand`，并将回退方法作为参数传入。如果你尝试使用的服务不可用，它将使用 `defaultMessage` 方法，直到该服务恢复并重新运行。\n\
  \nHystrix 仪表盘可以帮助你监控服务并获取其指标。你需要添加 `spring-boot-actuator` 和 `spring-cloud-starter-hystrix-dashboard`\
  \ 依赖项才能使用该仪表盘。如果你需要有关获取此仪表盘的更多信息，请访问 [`http://projects.spring.io/spring-cloud/`](http://projects.spring.io/spring-cloud/)\
  \ 。\n\n我知道 Spring Cloud 项目提供的服务不止这些，但这些内容将留待另一本书来介绍。现在，你已经拥有了创建微服务解决方案所需的工具。\n\n\
  ## 关于响应式编程\n\n到目前为止，我已经向你展示了一些 Spring 服务，这些服务可用于满足十二要素应用指南的部分要求，并朝着微服务架构迈进。本节将解释响应式编程如何融入这一切。\n\
  \n请记住，微服务最重要的特性之一是能够与其他微服务（包括遗留系统）进行通信。想象一下，你的微服务应用需要同时访问多个系统，并且你已经有一个客户端进行多次调用来聚合所有数据。在某个时刻，这个应用会变得非常“健谈”（由于网络延迟、并发、阻塞等原因），而且你并非只有一个客户端发出此类请求。你现在有数百万个请求。你该如何处理？\n\
  \n这就是响应式编程的用武之地。它使用一种称为 API 网关的特定模式来解决这个问题。\n\n```\nObservable details = Observable.zip(\n\
  localService.getExchangeRates(\"usd\"),\nyahooFinancialService.getGlobalRates(\"\
  mxn\",\"jpy\"),\ngoogleFinancialService.getEuropeExchangeRates(),\n(local, yahoo,\
  \ google) -> {\nMarketExchangeRates exchangeRates = new\nMarketExchangeRates();\n\
  exchangeRates.setLocalMarket(local.getRates());\nexchangeRates.setEurope(google.getRates({\"\
  eur\",\"gpb\"}));\nexchangeRates.setGlobal(yahoo.getRate());\nreturn exchangeRates;\n\
  }\n);\n```\n\n从之前的代码中可以看出，你可以并行执行多个任务，并避免诸如网络跳转和延迟、并发以及阻塞等资源问题。请记住，每个服务（如 `yahooFinacialService`）都可以拥有一个服务配置，可以将其自身注册到服务注册中心，并且可以在发生故障时暴露默认方法（断路器）。\n\
  \n## 总结\n\n本章涵盖了微服务架构以及设计原生云应用所需面对的挑战。\n\n你学习了 Spring Cloud 服务如何借助 Spring Boot 的强大功能，通过消息传递帮助你快速轻松地创建原生云应用。现在，你更深入地理解了为什么消息传递对于每种架构和集成解决方案都至关重要。\n\
