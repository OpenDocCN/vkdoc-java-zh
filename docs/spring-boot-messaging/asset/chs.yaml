  我们可以在 `Rate` 类中实现 `Serializable`，但货币项目并没有这样做。现在，如果你还记得，我们的想法是创建一个接受 JSON 格式的 REST
  API，那么让我们看看如何在这里使用 JSON。


  打开 `com.apress.messaging.config.JMSConfig.java` 类。参见清单 4-13。


  ```

  @Configuration

  @EnableConfigurationProperties(JMSProperties.class)

  public class JMSConfig {

  @Bean

  public MessageConverter jacksonJmsMessageConverter() {

  MappingJackson2MessageConverter converter = new

  MappingJackson2MessageConverter();

  converter.setTargetType(MessageType.TEXT);

  converter.setTypeIdPropertyName("_class_");

  return converter;

  }

  }

  清单 4-13.

  com.apress.messaging.config.JMSConfig.java

  ```


  清单 4-13 展示了以 JSON 格式公开消息所需的配置。让我们回顾一下：


  *   `MessageConverter`：这是一个接口，指定了 Java 对象和 JMS 消息之间的转换器。它公开了 `toMessage` 和 `fromMessage`
  方法。Spring Boot 的自动配置将连接所有内容以使用这个特定的消息转换器。

  *   `MappingJackson2MessageConverter`：该类实现了 `MessageConverter` 接口，并添加了更多方法来帮助进行
  JSON/对象之间的转换。

  *   `setTargetType`：此方法对于帮助转换器识别需要转换的类型是必要的。在本例中，我们以字符串格式发送 JSON，这意味着它将在后台创建一个 `TextMessage`
  对象。

  *   `setTypeIdPropertyName`：这是一个重要的设置，因为它将决定后台映射的方式。这可以是任何你想要的值。它只是一个简单的标识符，用于保存正在映射的限定类名。


  这足以再次运行应用程序，但首先让我们看看主应用程序的样子。参见清单 4-14。


  ```

  @SpringBootApplication

  public class JmsSenderApplication {

