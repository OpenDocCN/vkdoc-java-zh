  接下来，我们来看看消费者。首先，我将向你展示一个使用 `javax.jms.MessageListener` 接口的消费者（这与之前“Java 中的 JMS”部分中的示例相同），以便了解配置它需要做些什么。请参见清单
  4-8。


  ```

  @Component

  public class QueueListener implements MessageListener {

  public void onMessage(Message message) {

  }

  }

  清单 4-8.

  com.apress.messaging.jms.QueueListener.java

  ```


  清单 4-8 展示了将监听队列（`jms-demo`）中任何消息的接收器。我们来回顾一下这段代码：


  *   `@Component`：如果此项被注释掉了，请移除 `//` 并添加正确的导入。我建议你使用 STS，在 Mac 上按 Cmd+Shift+O，在 Windows
  上按 Ctrl+Shift+O。此注解会将类标记为 Spring Bean，以便在配置中使用。

  *   `MessageListener`：接收 JMS 消息需要此接口，并且需要实现 `onMessage` 方法。

  *   `onMessage(Message)`：需要实现此方法，它包含了从队列中消费的实际消息。


  如你所见，这非常简单，但如果你尝试运行它，你会看到与之前相同的结果。你只会看到关于发送消息的日志。这是为什么呢？嗯，你必须告诉 Spring Boot 如何使用这个监听器，所以请看一下清单
  4-9。


  ```

  @Configuration

  @EnableConfigurationProperties(JMSProperties.class)

  public class JMSConfig {

  @Bean

  public DefaultMessageListenerContainer

  customMessageListenerContainer(

  ConnectionFactory connectionFactory,

  MessageListener queueListener,

  @Value("${apress.jms.queue}") final

  String destinationName){

  DefaultMessageListenerContainer listener = new

  DefaultMessageListenerContainer();

  listener.setConnectionFactory(connectionFactory);

  listener.setDestinationName(destinationName);

  listener.setMessageListener(queueListener);

  return listener;

  }

  }

  清单 4-9.

  com.apress.messaging.config.JMSConfig.java

  ```


  清单 4-9 展示了启用 `QueueListener` 类所需的配置。我们来回顾一下这个类：


  *   `@Configuration`：这是一个标记，表示该类将被视为 Spring 容器的 Java 配置，因此这里的所有内容都将用于设置 Spring。

  *   `@EnableConfigurationProperties`：还记得我们使用 `application.properties` 文件来设置队列名称吗？这个特定的注解将使用提供的类（`JMSProperties.class`）作为属性持有者，这样你就可以在
  `application.properties` 文件中设置一些属性。之后，你可以通过使用 `@Value` 或使用 `JMSProperties` 实例 Bean
  及其 getter 方法来获取其值。

  *   `@Bean`：这是一个标记，用于在 Spring 容器中创建一个类型为 `DefaultMessageListenerContainer` 的 Bean。

  *   `DefaultMessageListenerContainer`：在这种情况下，这是一个返回类型，将被视为一个 Spring Bean。它包含了确定
  `QueueListener` 类以及从哪个队列（`destinationName`）消费所需的所有信息。

  *   `ConnectionFactory`：Spring 将注入此实例，并使用默认值自动配置它（除非你提供了自定义的 `ConnectionFactory`）。在这种情况下，它将使用内存中的提供者/代理。

  *   `MessageListener`：Spring 将注入 `QueueListener` 类（来自清单 4-8 的接收器），以便用于设置 `DefaultMessageListenerContainer`
  实例。

  *   `@Value("${apress.jms.queue}")`：此注解会将 `application.properties` 文件中 `apress.jms.queue`
  属性的值 `"jms-demo"` 注入到 `destinationName` 参数中。


  然后，实际的方法将创建 `DefaultMessageListenerContainer` 并设置其所有属性（`connectionFactory`、`queueListener`
  和 `destinationName`）。


