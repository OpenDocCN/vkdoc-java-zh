  \ 通道。\n\n\n\n#### Sink（接收端）\n\nSink 流会创建一个输入通道来监听新的传入消息。打开 `com.apress.messaging.cloud.stream.SimpleSink`\
  \ 类。参见代码清单 9-4。\n\n```\n@EnableBinding(Sink.class)\npublic class SimpleSink {\n\
