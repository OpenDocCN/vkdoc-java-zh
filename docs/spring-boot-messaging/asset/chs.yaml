  \ 会将此类转换为一个 `Source` 流，并通过 `@StreamListener` 和 `Sink.INPUT` 通道监听新的传入消息。`Sink.INPUT`\
  \ 会创建一个输入通道（`SubscribableChannel input()`）。\n\n如果您使用与代码清单 9-3 相同的配置并运行应用程序，请查看 RabbitMQ\
  \ 管理界面。您会看到 `input` 交换机和 `input.anonymous.*` 相互绑定。在日志级别中，您应该会看到类似图 9-16 的内容。\n\n\
