  \n图 7-13.\n\n通过 WebSockets 进行货币兑换\n\n## 总结\n\n本章讨论了使用 `spring-websocket` 模块和 Spring\
  \ Boot 进行 WebSockets 消息传递。\n\n你学习了 WebSockets 如何使用 HTTP 握手，然后切换到 TCP 连接。你看到了如何创建低级服务器/客户端的示例。\n\
