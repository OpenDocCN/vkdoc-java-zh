  *   `@JmsListener`：您已经知道这个注解。唯一的区别是包含正确的 `reply-queue` 名称。在本例中，它是 `apress.jms.rate-reply-queue`
  属性值。

  *   `@Header`：此注解将允许您直接访问 `Message<T>` 的标头，在本例中，它将是被处理的汇率代码。Spring JMS 有更多选项：`@Headers`
  带来一个 `java.util.Map` 对象，`@Payload` 带来实际的有效载荷，`@Valid` 为您的有效载荷开启验证。


