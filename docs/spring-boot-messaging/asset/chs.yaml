- "# 1. 消息传递\n\n通信是一个自古以来就存在的概念。万物都需要通过交换某种信息来进行沟通，没错，你读得没错，我说的是万物。仔细想想，就连你在公交车侧面或杂货店里看到的广告，不也是在试图向你传达信息或推销商品吗？\n\
  \n在计算机世界中，设备（鼠标、显示器、键盘等）通过交换信息位来相互通信。如果考虑应用程序，那么我们所谈论的是需要相互通信或通过通信暴露某些功能的组件、函数、类等。我们通常称之为消息传递。\n\
  \n## 消息传递\n\n本节将介绍一些主要概念，这些概念将在后续章节中详细阐述，首先从消息传递及其在日常开发周期中的定位开始。请参见图 1-1。\n\n![A337882_1_En_1_Fig1_HTML.gif](img/A337882_1_En_1_Fig1_HTML.gif)\n\
  \n图 1-1.\n\n消息传递\n\n图 1-1 展示了一个简单的消息传递过程，即通过任何可能的媒介从点 A 传递到点 B。在此例中，图 1-1 使用了一个通道，它可以是简单的函数调用、套接字连接或\
  \ HTTP 请求。其核心思想是生成/发送消息给消费者/接收者。\n\n### 消息传递用例\n\n本节涵盖了一些最常见的消息传递用例。这些用例对于理解消息传递为何如此重要至关重要：\n\
  \n*   **保证送达**\n    *   开发者需要确保他们发送的消息能够到达目的地。如果你正在使用代理（一个处理连接、消息以及同步或异步消息传递的系统），那么生产者需要通过某种确认机制来知晓代理是否收到了消息。消费者也必须这样做，通过向代理确认消息已收到。因此，这个特定用例通常用于传递关键消息时，例如支付、股票或任何其他重要信息。\n\
  *   **解耦**\n    *   在处理软件架构时，开发者会寻求解耦的组件，以便于集成、扩展以及简单的运维。但如何实现解耦呢？消息传递是解决方案的一部分，因为它允许你专注于自己的业务领域，这是一个有界上下文。你生成/发送的信息是你的主要关注点，而无需关心消费者/接收者将如何实现其自身的业务逻辑。\n\
  *   **可扩展与高可用**\n    *   每当系统面临高请求需求时，它需要具备可扩展性，并且不能存在单点故障。对于这些特定场景，消息传递是解决方案，因为多个消费者/接收者可以跟上负载，并且你可以跨多个系统实例或代理复制消息。这样，即使你的某个实例/代理宕机，你仍然可以掌控局面。\n\
  *   **异步**\n    *   应用程序必须非常快速，并能够尽快响应请求。在这种情况下，时间是关键因素。当你知道处理请求需要花费大量时间，并且有多个客户端时，你如何实现这种速度？你可以通过使用前一个用例的解决方案（可扩展性和/或高可用性）来解决这个问题，但这会达到一个阻塞请求的临界点。解决方案是异步消息传递——一种即发即弃的方式——你的生产者/发送者发送消息后继续执行自己的业务逻辑，让消费者/接收者自行安排时间处理消息。\n\
  *   **互操作性**\n    *   创建消息传递系统时的一个重要因素是，能够生成/发送消息，并在消费/接收时能够理解该消息（可能是纯文本 JSON、XML\
  \ 格式或序列化对象）。在过去的几十年里，人们进行了许多尝试来创建可互操作的系统。如今，借助新的代理（例如实现 AMQP 协议的代理），甚至通过简单的 RESTful\
  \ API 或 WebSocket，无论具体实现如何，都能使生产者和消费者无缝互操作。\n\n这些用例已经演变为广为人知的消息传递模型和设计模式，下一节将对此进行讨论。\n\
  \n### 消息传递模型与消息传递模式\n\n当消息传递成为所有系统的一部分时，一些消息传递模型便应运而生。在我看来，这些模型后来演变成了消息传递设计模式的创建。\n\
  \n#### 点对点\n\n点对点模型是一种将消息发送到队列（先进先出）的方式，其中只有一个接收者能获取该消息。参见图 1-2。\n\n![A337882_1_En_1_Fig2_HTML.gif](img/A337882_1_En_1_Fig2_HTML.gif)\n\
  \n图 1-2.\n\n点对点模型\n\n点对点模型也用作消息通道模式，此时你拥有的是一个通道（一种传输消息的方式）而非队列。它仍然保证只有一个接收者能按照消息发送的顺序获取消息。\n\
  \n你将在本书后续部分看到关于这些模型和模式的一些示例。\n\n#### 发布-订阅\n\n发布-订阅模型描述了一个发布者向该主题的多个订阅者发送消息（一个主题）。每个订阅者将只收到消息的一个副本。参见图\
  \ 1-3。\n\n![A337882_1_En_1_Fig3_HTML.gif](img/A337882_1_En_1_Fig3_HTML.gif)\n\n\
  图 1-3.\n\n发布-订阅模型\n\n发布-订阅模型也用作消息通道模式，此时你拥有的是一个通道而非主题，该通道将消息的一个副本传递给其订阅者。\n\n这些模型与\
  \ JMS（Java 消息服务）关系更为密切，理解它们很重要，因为它们构成了所有企业系统的基础。\n\n\n\n#### 消息传递模式\n\n设计模式是软件设计中常见问题的解决方案。同理，消息传递模式则试图解决消息传递设计中的问题。\n\
  \n在本书的学习过程中，你将了解以下模式的实现，因此我在此列出它们并附上简单定义作为介绍：\n\n*   **消息类型模式**：描述消息传递的不同形式，例如字符串（可能是纯文本、JSON\
  \ 和/或 XML）、字节数组、对象等。\n*   **消息通道模式**：确定将使用何种传输方式（通道）来发送消息，以及它将具有哪些属性。其核心思想是生产者和消费者知道如何连接到传输通道，并能够发送和接收消息。该传输方式的可能属性包括请求-回复功能和单向通道，你很快就会了解到。点对点通道是该模式的一个例子。\n\
  *   **路由模式**：描述通过在集成解决方案中提供路由机制（依赖于一组条件的过滤）在生产者和消费者之间发送消息的方式。这可以通过编程实现，或者在某些情况下，消息传递系统（代理）可以具备这些能力（如\
  \ RabbitMQ）。\n*   **服务消费者模式**：描述消息到达时消费者的行为，例如在处理消息时添加事务性方法。有一些框架允许你启动此类行为（例如 Spring\
  \ 框架，你可以通过添加基于事务抽象的 `@Transactional` 来实现）。\n*   **契约模式**：生产者和消费者之间为进行简单通信而达成的契约，例如当你进行一些\
  \ REST 调用时，调用一个包含某些字段的 JSON 或 XML 消息。\n*   **消息构造模式**：描述消息如何创建以便在消息传递系统中传输。例如，你可以创建一个“信封”，它包含一个主体（实际消息）和一些头部（带有关联\
  \ ID、序列号或可能的回复地址）。通过一个简单的 Web 请求，你可以添加参数或头部，实际消息成为请求的主体，从而使整个请求成为构造模式的一部分。HTTP 协议支持这种通信（消息传递）。\n\
  *   **转换模式**：描述如何在消息传递系统中更改消息的内容。想象一条消息需要一些处理，并且需要在传输过程中进行增强，例如内容丰富器。\n\n如你所见，这些模式不仅描述了消息传递过程，其中一些还描述了如何处理你之前看到的一些常见用例。当然，还有更多的消息传递模式，这些只是我们将在本书中探讨的一部分。\n\
  \n如果你需要更多信息，我建议你访问企业集成模式网站：[`http://www.enterpriseintegrationpatterns.com/`](http://www.enterpriseintegrationpatterns.com/)。同时，也请查阅这本必读书籍——《企业集成模式：设计、构建和部署消息传递解决方案》，作者是\
  \ Gregor Hohpe 和 Bobby Woolf，由 Addison-Wesley 出版。\n\n在本书中，我将使用 Spring Integration\
  \ 模块和各种消息传递系统（代理）来介绍其中的一些模式。\n\n## 使用 Spring 框架进行消息传递\n\nSpring 框架是 Java 社区最常用的框架之一。Spring\
  \ 框架通过实现一个可用于任何消息传递系统的模板设计模式，提供了一种简单易行的消息传递方式。它通过 `JmsTemplate` 支持 JMS API，通过 `RabbitTemplate`\
  \ 支持 AMQP，支持 STOMP，以及通过事件和监听器支持内部消息传递。别担心，我们将在本书后面部分介绍所有这些内容。\n\n值得一提的是，Spring Integration\
  \ 项目已被社区广泛接受，并且自 4.0 版本以来，Spring Integration 的核心（消息传递、通道和其他接口）已成为 Spring Core 的一部分。\n\
  \n市面上有许多优秀的消息传递框架。有些使用纯 Java，有些则依赖于 Spring 框架。Spring 团队一直非常努力地让开发者更容易使用所有功能，包括并发、事务、重试等。要使用其他库，你必须使用相同的逻辑手动实现它们。\n\
  \n注意\n\n你可以从 Apress 网站下载本书的源代码，或者从以下 GitHub 仓库克隆：[`https://github.com/felipeg48/spring-messaging`](https://github.com/felipeg48/spring-messaging)。\n\
  \n## 总结\n\n本章介绍了消息传递和消息传递系统。你了解了消息传递的基本概念，即开发者需要将信息从一个点发送到另一个点。\n\n本章回顾了消息传递的一些用例、模型和模式。本书将更详细地介绍它们，并通过一些最佳实现（包括\
  \ Spring 框架及其部分模块，如 Spring Integration、Spring AMQP 和 Spring Cloud Stream）来使用它们。\n\
  \n下一章将带你了解 Spring Boot，它是创建企业级 Spring 应用的下一代技术。Spring Boot 是你在本书中使用的所有模块的基础。\n\n"
- "# 2. Spring Boot\n\n我将用我在另一本书中写过的一句话开始：Spring Boot 是使用 Spring 框架创建企业级应用的新篇章。\n\n\
  Spring Boot 并没有取代 Spring 框架；你可以将其视为一种使用 Java 社区使用的框架创建出色应用的新方式。\n\n在本章中，我将向你展示什么是\
  \ Spring Boot 以及它在幕后是如何工作的。你还将通过一个小例子看到 Spring Boot 的强大之处。那么，我们为什么需要了解 Spring Boot？首先，我们将要使用的所有技术，如\
  \ Spring Integration、Spring AMQP、Spring Cloud Stream 等，都以 Spring Boot 为基础。本书中的所有示例都使用\
  \ Spring Boot 来创建 Spring 应用。当然，Spring Boot 使消息传递变得更加容易。\n\n## 什么是 Spring Boot？\n\
  \n首先，Spring Boot 是一种“有主见”的技术。这意味着什么？\n\nSpring Boot 会查看类路径，并尝试确定你正在尝试运行哪种类型的应用。例如，如果你的类路径中有\
  \ `spring-mvc` 模块，Spring Boot 将在 Spring 容器内自动装配 `WebApplicationInitializer` 和 `DispatcherServlet`\
  \ 类，并设置一个嵌入式容器（默认为 Tomcat），这样你就可以运行你的应用，而无需将应用复制或部署到 Servlet 容器。\n\n### Spring Boot\
  \ 的特性\n\n让我们看看 Spring Boot 最重要的特性：\n\n*   它可以创建独立的 Spring 应用。基于其 Maven 或 Gradle\
  \ 插件，你可以创建可执行的 JAR 或 WAR 文件。\n*   它基于 starter `pom` 拥有“有主见”的技术。\n*   包含自动配置，无需任何\
  \ XML 或 Java 配置类即可配置你的 Spring 应用。\n*   为 Web 应用包含嵌入式 Servlet 容器（Tomcat、Jetty 或 Undertow）。\n\
  *   包含可直接使用的生产就绪特性（非功能性需求），例如指标和健康检查。\n*   Spring Boot 不是一个插件或代码生成器（这意味着 Spring\
  \ Boot 不会创建需要编译的文件）。\n*   如果你有一个应用或 Servlet 容器，你可以将 Spring Boot 作为 WAR 部署，而无需进行任何更改。\n\
  *   你可以访问所有 Spring 应用事件和监听器（我们将在下一章讨论）。\n\n这个列表只是 Spring Boot 所能提供功能的一小部分；当然还有更多。如果你需要了解更多，我推荐我的另一本书——Apress\
  \ 出版的《Pro Spring Boot》。那本书包含了关于 Spring Boot 内部工作原理的更全面和详细的章节。\n\n\n\n## 使用 Spring\
  \ Boot 构建 Restful API\n\nSpring Boot 的一个重要特性是，你可以创建可执行的 JAR 文件，并通过执行 `java -jar\
  \ yourapp.jar` 来运行它们。你还可以创建可独立运行（使用 WAR 中的嵌入式容器）的可执行 WAR 文件，或者将其部署到 Servlet 容器中，而无需在代码中进行任何修改。\n\
  \n本节将向你展示一个 Restful API，它能够根据国家代码列出货币及其汇率。该项目是一个 Spring Boot Web 应用程序。\n\n注意\n\n\
  你可以在 [`http://www.apress.com/9781484212257`](http://www.apress.com/9781484212257)\
  \ 找到所有源代码的下载链接。\n\n我将向你展示该应用程序的一些代码片段，以便你了解 Spring Boot 如何以极少的代码且无需配置文件就能实现的功能。\n\
  \n我假设你已经拥有了代码。我建议你使用 STS（Spring Tool Suite），你可以从 [`https://spring.io/tools/sts/all`](https://spring.io/tools/sts/all)\
  \ 获取。我使用这个 IDE 是因为它在运行 Spring Boot 方面有非常好的特性，并且你看到的所有截图都是基于这个 IDE 的，但你可以选择任何你喜欢的\
  \ IDE。\n\n### rest-api-demo 项目\n\n该项目是一个 Spring Boot Web 应用程序，它将暴露 Restful 端点，用于显示某个国家的货币以及其他国家的汇率。该项目位于名为\
  \ `ch02` 的文件夹中。\n\n该项目还使用了带有内存数据库（使用 H2 引擎）的 JPA（Java Persistence API）以及 AOP（面向切面编程）。暴露的端点列在表\
  \ 2-1 中。\n\n表 2-1.\n\nRestful 端点\n\n| 方法 | 路径 | 描述 |\n| --- | --- | --- |\n| `GET`\
  \ | `/currency/latest[?base=<code>]` | 以 JSON 格式显示最新汇率。默认基准货币为 USD。 |\n| `GET` |\
  \ `/currency/{date}[?base=<code>]` | 根据日期（格式：yyyy-MM-dd）以 JSON 格式显示汇率。 |\n| `GET`\
  \ | `/currency/{amount}/{base}/to/{code}` | 根据金额、基准货币和目标货币代码显示换算结果。 |\n| `POST`\
  \ | `/currency/new` | 按日期添加新汇率。请求体应为 JSON 格式。 |\n\n清单 2-1 展示了一个 JSON 响应的示例。你也可以为某些端点使用\
  \ `base` 参数。\n\n```\n{\n\"base\": \"USD\",\n\"date\": \"2016-09-22\",\n\"rates\"\
  : [\n{\n\"code\": \"EUR\",\n\"rate\": 0.88857\n},\n{\n\"code\": \"JPY\",\n\"rate\"\
  : 102.17\n},\n{\n\"code\": \"MXN\",\n\"rate\": 19.232\n},\n{\n\"code\": \"GBP\"\
  ,\n\"rate\": 0.75705\n}\n]\n}\n清单 2-1.\nJSON 货币响应 - /currency/latest\n```\n\n清单\
  \ 2-1 展示了通过访问 `/currency/latest` 端点得到的结果响应。它显示了基准货币（此处为美元）以及用 1 美元可以从其他国家获得的所有汇率（货币）。\n\
  \n对于换算，你可以请求端点 `/currency/{amount}/{base}/to/{code}`。假设你想知道 10 美元等于多少日元。可以这样发起请求：`/currency/10/usd/to/jpy`。你应该会得到如清单\
  \ 2-2 所示的结果。\n\n```\n{\n\"base\": \"USD\",\n\"code\": \"JPY\",\n\"amount\": 10.0,\n\
  \"total\": 1021.69995\n}\n清单 2-2.\n换算响应 - /currency/10/usd/to/jpy\n```\n\n清单 2-2\
  \ 展示了换算端点的结果。让我们来查看其他文件。\n\n#### pom.xml 文件\n\n打开 `pom.xml` 文件并查看其内容。让我们来回顾一下这些标签及其含义：\n\
  \n*   `<packaging/>` 标签的值为 WAR。打包此应用程序时，它将生成一个可执行且可部署到任何 Servlet 容器的 WAR 文件。\n\n\
  \    ```\n    war\n    ```\n\n*   `<parent/>` 标签是 Spring Boot 能够运行的关键，因为它包含了应用程序所需的所有依赖项和版本。它基于\
  \ Maven 的 BOM（物料清单）功能。因此，这个特定的标签始终存在于你的 Spring Boot 应用程序中非常重要。\n\n    ```\n    org.springframework.boot\n\
  \    spring-boot-starter-parent\n    1.4.0.RELEASE\n\n    ```\n\n*   `<dependencies/>`\
  \ 标签包含了 Spring Boot 应用程序中的所有依赖项。当你选择 Web 依赖项（使用命令行或 Spring starter）时，`spring-boot-web-starter`\
  \ 依赖项会被添加到这个 `pom` 中。这类似于当你将项目选择为 WAR 类型时，`spring-boot-starter-tomcat` 依赖项会被添加。默认情况下，你总是拥有\
  \ `spring-boot-starter-test` 依赖项。\n\n    ```\n\n    org.springframework.boot\n \
  \   spring-boot-starter-web\n\n    org.springframework.boot\n    spring-boot-starter-tomcat\n\
  \    provided\n\n    org.springframework.boot\n    spring-boot-starter-data-jpa\n\
  \n    com.h2database\n    h2\n    runtime\n\n    org.springframework.boot\n    spring-boot-starter-aop\n\
  \n    org.springframework.boot\n    spring-boot-starter-test\n    test\n\n    ```\n\
  \n让我们花点时间看看 `<dependencies/>` 标签。如果你熟悉使用 Maven 创建项目的方式，你现在应该会发现 `<dependency/>`\
  \ 标签中缺少了一个标签。没错，`<version/>` 标签不见了。这个版本不再使用，因为 `<parent/>` 标签的定义包含了你在 Web 应用程序中将使用的所有版本和依赖项。\n\
  \n请注意，`spring-boot-starter-tomcat` 的作用域被设置为 provided，这意味着你可以创建一个可运行的 WAR（可以使用 `java\
  \ -jar <war-name>.war` 运行）并将其部署到任何 Servlet 容器中。\n\n请注意你创建 Spring Boot 应用程序时使用的命名约定——每个\
  \ `<groupId/>` 标签都是 `org.springframework.boot`，而 `<artifactId/>` 标签是 `spring-boot-starter-<technology>`。\n\
  \n为什么这很重要？请记住，Spring Boot 是一种有主见的技术，因此基于这个 `pom` 和 `spring-boot-starter`，它将识别出你正在尝试运行哪个应用程序。\n\
  \n#### Rate.java 类\n\n这将是领域类。它包含一个将其定义为实体的注解。这是因为这个类将被持久化到 H2 引擎（内存数据库）中。参见清单 2-3。\n\
  \n```\n@Entity\npublic class Rate {\n@Id\nprivate String code;\nprivate Float rate;\n\
  @JsonIgnore\n@Temporal(TemporalType.DATE)\nprivate Date date;\n// Setters and Getters\
  \ omitted.\n}\n清单 2-3.\nsrc/main/java/com/apress/messaging/domain/Rate.java\n```\n\
  \n清单 2-3 向你展示了领域类——这里使用了 `@Entity` 和 `@Id` 注解——这与 JPA 技术（Spring Data JPA）相关。如你所见，它非常基础，没有什么太复杂的。\n\
  \n\n\n#### RateRepository.java 类\n\n接下来是 `RateRepository` 接口，它基于 Spring Data JPA\
  \ 技术。你需要继承 `JpaRepository<E,ID>` 并添加用于持久化的实体（领域）和 ID 类类型（`String`，一个可序列化的类）。请参见代码清单\
  \ 2-4。\n\n```\n@Repository\npublic interface RateRepository  extends JpaRepository{\n\
  List findByDate(Date date);\nRate findByDateAndCode(Date date,String code);\n}\n\
  代码清单 2-4.\nsrc/main/java/com/apress/messaging/repository/RateRepository.java\n```\n\
  \n代码清单 2-4 展示了 `RateRepository` 接口。你可以看到 `@Repository` 注解（这只是 Spring 容器的一个标记）；关键部分是你需要继承\
  \ `JpaRepository` 接口。该接口将为你实现所有 CRUD（创建、读取、更新和删除）操作，因此你无需自行实现。这里定义了两个查询方法——`findByDate`（查找具有该日期的汇率）和\
  \ `findByDateAndCode`（查找特定日期和代码的汇率）。该接口的特殊之处在于，你可以通过使用领域类的属性来创建 SQL 查询。如果你想了解更多关于\
  \ Spring Data JPA 的信息，请访问 [`http://docs.spring.io/spring-data/jpa/docs/current/reference/html/`](http://docs.spring.io/spring-data/jpa/docs/current/reference/html/)。\n\
  \n#### CurrencyController.java 类\n\n该类定义了 REST 端点。它通过一个服务使用 `RateRepository` 接口。请参见代码清单\
