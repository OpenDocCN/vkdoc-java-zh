  让我们再次讨论货币项目。假设你有一个客户想要发送更精确的汇率，但只能使用 JMS 发送汇率消息。这意味着你的货币项目需要充当接收方，但客户需要某种确认，表明你已收到汇率消息。


  让我们从使用同一个 `jms-sender` 项目创建发送方客户端开始。查看清单 4-11 中所示的 `com.apress.messaging.jms.RateSender.java`
  类。


