  ## 总结\n\n本章涵盖了企业集成模式，并讨论了 Spring Integration 模块如何为您提供所有必要的组件，以使用 Spring Boot 创建企业级和集成解决方案。\n\
  \n它向您展示了使用 Spring Boot 进行 Spring Integration 编程的不同方式。还向您展示了如何结合 XML、Java 配置和注解来创建集成应用程序。\n\
  \n为什么 Spring Integration 很重要？下一章将展示 Spring Cloud Stream 技术基于 Spring Integration，并且是使用所有这些组件的更简单方法。\n\
  \n"
- "# 9. 使用 Spring Cloud Stream 进行消息传递\n\n到目前为止，您已经了解了所有可用的消息传递技术。使用 Spring 框架和 Spring\
  \ Boot 使开发人员和架构师能够轻松创建健壮的消息传递解决方案。本章向前迈出了新的一步，进入了新的云原生应用程序开发领域。\n\n本章涵盖 Spring Cloud\
  \ Stream，以及这项新技术如何帮助您编写消息驱动的微服务应用程序。\n\n## Spring Cloud\n\n在我开始讨论 Spring Cloud Stream\
  \ 的内部机制和用法之前，让我们先了解一下它的父项目：Spring Cloud。\n\nSpring Cloud 是一套工具，允许开发人员创建使用分布式系统中常见模式的应用程序，从配置管理、服务发现、断路器、智能路由、微代理、控制总线、全局锁、分布式会话、服务间调用、分布式消息传递等等。这些分布式模式也将在微服务章节中介绍。\n\
  \n基于 Spring Cloud，我们有多个项目，包括 Spring Cloud Config、Spring Cloud Netflix、Spring Cloud\
  \ Bus、Spring Cloud for Cloud Foundry、Spring Cloud Cluster、Spring Cloud Stream、Spring\
  \ Cloud Stream App Starters 等等。\n\n如果您想立即开始使用这些技术中的任何一种，您需要在 `pom.xml` 文件中添加三样东西：\n\
  \n*   添加带有 `spring-boot-starter-parent` 的 `<parent/>` 标签。例如：\n\n    ```\n    org.springframework.boot\n\
  \    spring-boot-starter-parent\n    1.4.4.RELEASE\n\n    ```\n\n*   添加带有 `GA` 版本的\
  \ `<dependencyManagement/>` 标签。例如：\n\n    ```\n\n    org.springframework.cloud\n\
  \    spring-cloud-dependencies\n    Camden.SR5\n    pom\n    import\n\n    ```\n\
  \n*   在 `<dependencies/>` 标签中添加您想要使用的技术。例如：\n\n    ```\n\n    org.springframework.cloud\n\
  \    spring-cloud-starter-stream-rabbit\n\n    ```\n\n如果您深入研究 Spring Cloud 注解的 `pom.xml`\
  \ 文件，您会看到命名约定现在是 `spring-cloud-starter-<要使用的技术>`。还要注意，我们添加了一个依赖管理标签，它允许我们处理所有传递依赖和库版本管理。\n\
  \n\n\n## Spring Cloud Stream\n\n是时候来谈谈 Spring Cloud Stream 了。这是本章的重点，因为本书讨论的是消息传递，也因为\
  \ Spring Cloud Stream 是一个轻量级的消息驱动微服务框架。它基于 Spring Integration 和 Spring Boot（提供了一套便于配置的、固执己见的运行时），这意味着你可以轻松创建企业级的消息传递和集成解决方案应用。它提供了一个简单的声明式模型，用于使用\
  \ RabbitMQ 或 Apache Kafka 发送和接收消息。\n\n我认为 Spring Cloud Stream 最重要的特性之一，是通过创建开箱即用的绑定，实现了生产者和消费者之间的消息解耦。换句话说，你无需在应用程序中添加特定于代理的代码来生产或消费消息。你只需将所需的绑定（稍后我会解释）依赖项添加到应用程序中，Spring\
  \ Cloud Stream 就会处理消息的连接和通信。\n\n下一节将介绍 Spring Cloud Stream 的主要组件。\n\n### Spring\
  \ Cloud Stream 概念\n\n让我们来看看 Spring Cloud Stream 的主要组件：\n\n*   **应用模型**：应用模型只是一个与中间件无关的核心，这意味着应用程序将通过绑定器实现，使用输入和输出通道与外部代理（作为消息传输方式）进行通信。\n\
  *   **绑定器抽象**：Spring Cloud Stream 目前提供了 Kafka 和 RabbitMQ 的绑定器实现。这种抽象使得 Spring Cloud\
  \ Stream 应用能够连接到中间件。但是，这种抽象如何知道目标呢？它可以在运行时根据通道动态选择目标。通常，我们需要通过 `application.properties`\
  \ 文件中的 `spring.cloud.stream.bindings.[input|ouput].destination` 属性来提供这些信息。我将在查看示例时讨论这一点。\n\
  *   **持久化发布/订阅**：应用程序通信将通过众所周知的发布/订阅模型进行。如果使用 Kafka，它将遵循其自身的主题/订阅者模型；如果使用 RabbitMQ，它将创建一个主题交换器并为每个队列创建必要的绑定。该模型降低了生产者和消费者的复杂性。\n\
  *   **消费者组**：你会发现你的消费者在某些时候需要能够进行扩展。可扩展性可以通过使用消费者组的概念来实现（这类似于 Kafka 消费者组的功能），你可以在一个组中拥有多个消费者以实现负载均衡场景。这使得扩展需求非常容易设置。\n\
  *   **分区支持**：Spring Cloud Stream 支持数据分区，允许多个生产者向多个消费者发送数据，并确保公共数据由相同的消费者实例处理。这有利于提高数据的一致性和性能。\n\
  *   **绑定器 API**：Spring Cloud Stream 提供了一个 API 接口。它实际上是一个绑定器 SPI（服务提供者接口），你可以通过修改原始代码来扩展核心功能，因此很容易实现特定的绑定器，例如\
  \ JMS、WebSockets 等。\n\n本节涵盖了编程模型和绑定器。如果你想了解更多关于其他概念的信息，可以查看 Spring Cloud Stream\
  \ 参考文档。这里的目的只是向你展示如何开始使用 Spring Cloud Stream 创建事件驱动的微服务。为了向你展示我们将要涵盖的内容，请查看图 9-1。\n\
  \n![A337882_1_En_9_Fig1_HTML.gif](img/A337882_1_En_9_Fig1_HTML.gif)\n\n图 9-1.\n\n\
  Spring Cloud Stream 应用\n\n## Spring Cloud Stream 编程\n\n参照图 9-1，考虑一下创建一个 Spring Cloud\
  \ Stream 应用需要什么：\n\n*   `<dependencyManagement/>`：你需要添加此标签以及最新的 Spring Cloud 库依赖项。\n\
  *   **绑定器**：你需要选择需要哪种类型的绑定器：\n    *   **Kafka**：如果你选择 Kafka 作为绑定器，则需要添加以下依赖项：\n\n\
  ```\n        org.springframework.cloud\n        spring-cloud-starter-stream-kafka\n\
  \n```\n\n*   **RabbitMQ**：如果你选择 RabbitMQ 作为绑定器，则需要添加以下依赖项：\n\n```\n        org.springframework.cloud\n\
  \        spring-cloud-starter-stream-rabbit\n\n```\n\n你还必须确保 Kafka 或 RabbitMQ 已启动并正在运行。你甚至可以同时使用两者。你可以在\
  \ `application.properties` 或 `application.yml` 文件中配置它们。\n*   `@EnableBinding`：这是一个\
  \ Spring Boot 应用，因此只需添加 `@EnableBinding` 即可将应用转换为 Spring Cloud Stream。\n\n以下部分将向你展示如何使用\
  \ RabbitMQ 作为传输层，从一个应用程序向另一个应用程序发送和接收消息，而无需了解代理 API 的任何细节，也无需配置生产者或消费者消息。\n\nSpring\
  \ Cloud Stream 使用通道（输入/输出）作为发送和接收消息的机制。一个 Spring Cloud Stream 应用可以有任意数量的通道，并定义了两个注解：`@Input`\
  \ 和 `@Output`。这些注解有助于区分消费者和生产者。通常，`SubscribableChannel` 类会使用 `@Input` 注解标记，而 `MessageChannel`\
  \ 类会使用 `@Output` 注解标记。它们分别用于监听传入消息和发送传出消息。\n\n`SubscribableChannel` 和 `MessageChannel`\
  \ 接口应该从 Spring Integration 章节中就很熟悉了。还记得我告诉过你 Spring Cloud Stream 是基于 Spring Integration\
  \ 的吗？\n\n如果你不想直接处理这些通道和注解，Spring Cloud Stream 通过添加三个涵盖了最常见消息传递用例的接口来简化操作：Source、Processor\
  \ 和 Sink。在幕后，这些接口拥有你的应用所需的正确通道（输入/输出）：\n\n*   **Source**：Source 用于从外部系统（通过监听队列、REST\
  \ 调用、文件系统、数据库查询等）摄取数据，并通过输出通道发送数据的应用程序。这是 Spring Cloud Stream 的实际接口：\n\n```\n  \
  \  public interface Source {\n    String OUTPUT = \"output\";\n    @Output(Source.OUTPUT)\n\
  \    MessageChannel output();\n    }\n    ```\n\n*   **Processor**：当你想要开始监听输入通道以获取新的传入消息，处理接收到的消息（增强、转换等），然后将新消息发送到输出通道时，可以在应用程序中使用\
  \ Processor。这是 Spring Cloud Stream 的实际接口：\n\n```\n    public interface Processor\
  \ extends Source, Sink {\n    }\n    ```\n\n*   **Sink**：当你想要开始监听输入通道以获取新的传入消息，进行一些处理，然后结束流程（保存数据、触发任务、记录到控制台等）时，可以使用\
  \ Sink 应用程序。这是 Spring Cloud Stream 的实际接口：\n\n```\n    public interface Sink {\n\
  \    String INPUT = \"input\";\n    @Input(Sink.INPUT)\n    SubscribableChannel\
  \ input();\n    }\n    ```\n\n图 9-2 和 9-3 展示了我们将要开始使用的模型。\n\n![A337882_1_En_9_Fig3_HTML.gif](img/A337882_1_En_9_Fig3_HTML.gif)\n\
  \n图 9-3.\n\nSource 到 Processor 到 Sink 模型\n\n![A337882_1_En_9_Fig2_HTML.gif](img/A337882_1_En_9_Fig2_HTML.gif)\n\
  \n图 9-2.\n\nSource 到 Sink 模型\n\n你可以从本书的源代码中获取所有示例。本章包含多个示例。让我们开始并看一些代码。\n\n\n\n\
  ### cloud-stream-demo\n\n本项目的目的是展示如何创建一个源（Source），并通过其输出通道发送消息；如何创建一个处理器（Processor），并分别从输入通道接收消息和向输出通道发送消息；以及如何创建一个汇（Sink），并学习如何从输入通道接收消息。实际上，我演示的是图\
  \ 9-3 所展示的内容，但每次只考虑一个 Stream 应用。\n\n目前，这些应用之间的通信是手动的，这意味着我们需要在中间执行一些步骤，这是因为我希望你能了解每个应用的工作原理。在下一节中，你将看到整个流程是如何运作的。\n\
  \n#### 源（Source）\n\n我们将从定义一个源开始。请记住，该组件有一个输出通道。打开 `com.apress.messaging.cloud.stream.SimpleSource`\
  \ 类。它应该如代码清单 9-1 所示。\n\n```\n@EnableBinding(Source.class)\npublic class SimpleSource\
  \ {\nprivate SimpleDateFormat simpleDate =\nnew SimpleDateFormat(\"HH:mm:ss\");\n\
  @Bean\n@InboundChannelAdapter(channel=Source.OUTPUT)\npublic MessageSource simpleText(){\n\
  return () -> MessageBuilder\n.withPayload(\"Hello at \" +\nsimpleDate.format(new\
  \ Date()))\n.build();\n}\n}\n代码清单 9-1.\ncom.apress.messaging.cloud.stream.SimpleSource.java\n\
  ```\n\n代码清单 9-1 向你展示了你能拥有的最简单的 `Source` 流应用。让我们来看一下：\n\n*   `@EnableBinding`：此注解会将此类启用为\
  \ Spring Cloud Stream 应用，并启用通过提供的绑定器发送或接收消息的必要配置。\n*   `Source`：此接口将 Spring Cloud\
  \ Stream 应用标记为源流。它将创建必要的通道；在本例中，即用于向提供的绑定器发送消息的输出通道。\n*   `@InboundChannelAdapter`：此注解是\
  \ Spring Integration 框架的一部分。它每秒轮询一次 `simpleText` 方法。这意味着每秒将发送一条新消息。你可以通过添加一个轮询器并修改默认设置来更改频率和消息数量。例如：\n\
  \n```\n    @InboundChannelAdapter(value = Source.OUTPUT, poller = @Poller(fixedDelay\
  \ = \"5000\", maxMessagesPerPoll = \"3\"))\n    ```\n\n此声明中重要的部分是通道，在本例中它指向 `Source.OUTPUT`。这意味着它将使用输出通道（`MessageChannel\
  \ output()`）。\n*   `MessageSource`：这是一个发送 `Message<T>` 的接口，`Message<T>` 是一个包含有效载荷和头部的包装器。\n\
  *   MessageBuilder：你已经熟悉这个类了，它发送一个 `MessageSource` 类型。在本例中，我们发送 `\"Hello at – Date\"\
