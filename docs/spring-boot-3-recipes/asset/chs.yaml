  #### 使用 JNDI


  将 Spring Boot 应用程序部署到 JEE 容器时，您很可能希望也使用该容器中预先注册的 `ConnectionFactory`。要启用此功能，您需要依赖
  `spring-jms` 库和 `jakarta.jms-api`（后者可能可以标记为 provided，因为它将由您的 JEE 容器提供）。您可以使用其中一个
  starter 并排除显式的 ActiveMQ 或 Artemis 依赖项；但是，仅声明所需的依赖项更简单、更清晰。请参阅代码清单 8-5。


  ```

  org.springframework

  spring-jms


  jakarta.jms

  jakarta.jms-api


  代码清单 8-5

  纯 JMS 依赖项

  ```


  当 JNDI 可用时，Spring Boot 将首先尝试在 JNDI 注册表中以众所周知的名称（例如 `java:/JmsXA` 和 `java:/XAConnectionFactory`）或通过
  `spring.jms.jndi-name` 属性指定的名称来检测 `ConnectionFactory`。此外，它还会自动创建一个 `JndiDestinationResolver`，以便队列和主题也将在
  JNDI 中被检测到；默认情况下，允许回退到动态创建目标。


  ```

  spring.jms.jndi-name=java:/jms/connectionFactory

  ```


  完成上述配置并构建好您的工件后，您现在可以将应用程序部署到 JEE 容器，并重用现有的 `ConnectionFactory`。




  #### 手动配置


  配置 JMS 的最后一种方式是手动完成。为此，你至少需要 `spring-jms` 和 `jakarta.jms-api` 依赖，以及你所使用的 JMS 代理的一些客户端库。在以下情况下可能需要手动配置：


  *   Spring Boot 无法自动配置你的 `ConnectionFactory`


  *   需要对 `ConnectionFactory` 实例进行大量设置


  *   需要多个 `ConnectionFactory` 实例


  要配置一个 `ConnectionFactory` 实例，你需要添加一个带有 `@Bean` 注解的方法，该方法用于构造一个 `ConnectionFactory`
  实例。参见清单 8-6。


  ```

  @Bean

  public ConnectionFactory connectionFactory() {

  var connectionFactory =

  new ActiveMQConnectionFactory("vm://localhost?broker.persistent=false");

  connectionFactory.setClientID("someId");

  return connectionFactory;

  }

  清单 8-6

  ConnectionFactory Bean 配置

  ```


  这将为 Artemis 创建一个 `ConnectionFactory` 实例；它将使用一个嵌入式的非持久化代理，并设置 `clientId` 实例。当 Spring
  Boot 检测到一个预配置的 `ConnectionFactory` 时，它不会尝试自己创建一个。运行时，输出应如图 8-3 所示。


