- '# 10. 打包


  在本章中，您将了解打包 Spring Boot 应用程序的不同解决方案，从创建可执行 JAR 到使用 GraalVM 从代码创建原生镜像。


  ## 10-1. 创建可执行归档文件


  默认情况下，Spring Boot 会创建一个可以使用 `java -jar your-application.jar` 运行的 JAR 或 WAR。但是，您可能希望将应用程序作为服务器启动的一部分来运行（目前已在基于
  Debian 和 Ubuntu 的系统上测试并支持）。为此，您可以使用 Maven 或 Gradle 插件来创建一个可执行 JAR。


  ### 问题


  您需要一个可执行文件，以便将其作为服务安装在您的环境中。


  ### 解决方案


  Spring Boot Maven 和 Gradle 插件都提供了使创建的构件可执行的选项。^(⁶) 这样做之后，归档文件也会变成/表现得像一个用于启动/停止服务的
  Unix shell 脚本。


  ### 工作原理


  要使构件可执行，您需要按如下方式配置 Maven 或 Gradle 插件。


  #### 使归档文件可执行


  在 Maven 插件中，您可以将 `executable` 属性设置为 `true`，归档文件将变为可执行。参见清单 10-1。


  ```

  org.springframework.boot

  spring-boot-maven-plugin


  true


  清单 10-1

  用于创建可执行文件的 Spring Boot Maven 插件

  ```


  对于 Gradle，您需要指定 `launchScript()` 来实现这一点。参见清单 10-2。


  ```

  tasks.named(''bootJar'') {

  launchScript()

  }

  清单 10-2

  用于创建可执行文件的 Spring Boot Gradle 插件

  ```


  现在，在构建您的构件之后，该构件本身是可执行的，并且可以用来启动应用程序。您现在可以简单地输入 `./your-application.jar` 来启动它，而无需使用
  `java -jar your-application.jar`。


  ![](img/464036_2_En_10_Figa_HTML.gif)一个信息图标。 可能需要使归档文件可执行；您可以使用 `chmod +x your-application.jar`
  来实现。


  当使归档文件可执行时，实际上是在归档文件前面加上了一个 bash 脚本。您可能会认为这样做会破坏 Java 归档文件。然而，由于 Java 读取归档文件的方式（从底部到顶部）和
  shell 读取归档文件的方式（从顶部到底部），这实际上是可行的。


  ![](img/464036_2_En_10_Figb_HTML.gif)一个信息图标。 您可以使用 `head -n 309 your-application.jar`
  来查看这个 bash 脚本。




  #### 指定配置


  通常，在启动基于 Spring Boot 的应用程序时，有多种方式可以提供额外配置（参见第 2 章）。^(⁷) 然而，当将归档文件作为脚本（或服务）使用时，其中一些方式不再适用。此时，你可以在可执行归档文件旁边使用一个
  `.conf` 文件（必须命名为 `your-application.conf`），来为应用程序包含额外的配置选项。请参见表 10-1。


  表 10-1


  可用属性


  | 属性 | 描述 |

  | --- | --- |

  | `MODE` | 设置操作的“模式”。默认值为 `auto`，将自动检测模式。当从符号链接启动时，其行为类似于 `service`。如果希望在前台运行进程，请改为
  `run`。 |

  | `RUN_AS_USER` | 设置用于运行应用程序的用户；默认值为 JAR 文件的所有者。 |

  | `USE_START_STOP_DAEMON` | 设置是否使用 `start-stop-daemon` 命令。默认情况下，将检测该命令是否可用。 |

  | `PID_FOLDER` | 设置写入 PID 的文件夹名称；默认值为 `/var/run`。 |

  | `LOG_FOLDER` | 设置写入日志的文件夹名称；默认值为 `/var/log`。 |

  | `CONF_FOLDER` | 设置读取 `.conf` 文件的文件夹名称；默认值为与 JAR 文件相同的目录。 |

  | `LOG_FILENAME` | 设置要写入的日志文件名；默认值为 `<appname>.log`。 |

  | `APP_NAME` | 设置应用程序的名称。如果 JAR 文件是从符号链接运行的，脚本会猜测应用程序名称。 |

  | `RUN_ARGS` | 设置传递给 Spring Boot 应用程序的参数。 |

  | `JAVA_HOME` | 默认情况下，将从 `$PATH` 中发现此路径，但如有需要，可以显式定义。 |

  | `JAVA_OPTS` | 设置传递给 JVM 的选项（如内存设置、GC 设置等）。 |

  | `JARFILE` | 设置 JAR 文件的显式位置，以防脚本用于启动未实际嵌入的 JAR。 |

  | `DEBUG` | 如果不为空，则在 shell 进程上设置 `-x` 标志，便于查看脚本中的逻辑。 |

  | `STOP_WAIT_TIME` | 设置强制关闭前的等待时间（默认值为 60 秒）。 |


  当使用嵌入式脚本（默认情况）时，`JARFILE` 和 `APP_NAME` 属性无法通过 `.conf` 文件配置。请参见清单 10-3。


  ```

  JAVA_OPTS=-Xmx1024m

  DEBUG=true

  清单 10-3

  可执行文件的属性

  ```


  通过此配置，你将为应用程序分配最多 1 GB 的内存，并且 shell 脚本将进行一些额外的日志记录。当然，你也可以将表 10-1 中的任何属性添加到此文件中。


  ## 10-2\. 创建用于部署的 WAR 文件


  ### 问题


  你希望创建一个 WAR 文件以部署到 Servlet 容器或 Jakarta EE 容器，而不是创建 JAR 文件。如果你所在的组织仍在使用 Oracle WebLogic、IBM
  WebSphere 或 Tomcat 等服务器，则可能需要这种所谓的传统部署方式。


  ### 解决方案


  将应用程序的打包方式从 JAR 改为 WAR，并让你的 Spring Boot 应用程序继承 `SpringBootServletInitializer`，以便它能够像常规应用程序一样自行引导。最后，确保将你用于开发的服务器作为
  `provided` 依赖项包含在内，以便在生成可部署工件时将其过滤掉。




  ### 工作原理


  要将配方 3-1 制作成可部署的 WAR 文件，需要完成三件事。


  1.  将打包方式从 JAR 改为 WAR。

  2.  继承 `SpringBootServletInitializer` 以在部署时引导应用程序。

  3.  将嵌入式服务器的作用域改为 `provided`。


  在 `pom.xml` 文件中，将打包方式从 JAR 改为 WAR。参见清单 10-4。


  ```

  war

  清单 10-4

  使用 Maven 创建 WAR 文件

  ```


  为了防止嵌入式容器将其类添加到 Web 应用程序中，需要将嵌入式容器的作用域从默认的 `compile` 改为 `provided`。


  当使用嵌入式 Tomcat（默认）时，将清单 10-5 添加到 `pom.xml` 中。


  ```

  org.springframework.boot

  spring-boot-starter-tomcat

  provided


  清单 10-5

  作用域依赖

  ```


  当使用其他嵌入式容器时，请参见配方 3-7；然后通过添加 `<scope>provided</scope>` 将该容器的作用域改为 `provided`。这样做之后，Spring
  Boot 插件将不会把这些库添加到默认的 `WEB-INF/lib` 目录中。不过，它们仍然会作为创建的 WAR 文件的一部分，但会位于特殊的 `WEB-INF/lib-provided`
  目录中。Spring Boot 知道这个位置，因此你也可以使用该 WAR 文件来启动嵌入式容器。启动嵌入式容器对于开发来说非常方便；然而，由于它是一个 WAR
  文件，它也可以部署到像 Tomcat 或 WebSphere 这样的容器中。


  为了确保应用程序能够启动，你需要让你的应用程序继承 `SpringBootServletInitializer`。这是一个特殊的类，用于在 Servlet 或
  JEE 容器中引导 Spring Boot。参见清单 10-6。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.boot.builder.SpringApplicationBuilder;

  import org.springframework.boot.web.servlet.support.SpringBootServletInitializer;

  @SpringBootApplication

  public class HelloWorldApplication extends SpringBootServletInitializer {

  public static void main(String[] args) {

  SpringApplication.run(HelloWorldApplication.class, args);

  }

  @Override

  protected SpringApplicationBuilder configure(SpringApplicationBuilder builder) {

  return builder.sources(HelloWorldApplication.class);

  }

  }

  清单 10-6

  带有 SpringBootServletInitializer 的 SpringBootApplication

  ```


  当继承 `SpringBootServletInitializer` 时，你需要重写 `configure` 方法。`configure` 方法接收一个 `SpringApplicationBuilder`，你可以用它来配置应用程序。需要添加的内容之一就是主配置类，就像使用
  `SpringApplication.run` 一样。这正是 `builder.sources(HelloWorldApplication.class)` 这一行代码的作用。它将用于引导应用程序。


  为了完整性，清单 10-7 展示了控制器。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  @RestController

  public class HelloWorldController {

  @GetMapping

  public String hello() {

  return "Hello World, from Spring Boot 3!";

  }

  }

  清单 10-7

  HelloWorldController

  ```


  ![](img/464036_2_En_10_Figc_HTML.gif)一个警告图标。 当将某些内容部署到 Servlet 或 JakartaEE 容器时，Spring
  Boot 不再控制服务器。因此，来自 `server` 和 `management.servlet` 命名空间的配置选项不再适用。所以，如果定义了 `server.port`，在部署到外部服务器时它将被忽略。


  当应用程序被部署后，它将不再像使用嵌入式服务器时那样可以通过根 URL `/` 访问。而是可以通过 `<war 文件名>` 这个 URL 来访问。通常，访问应用程序的地址类似于
  `http://<服务器名称>:8080/<war 文件名>`。


