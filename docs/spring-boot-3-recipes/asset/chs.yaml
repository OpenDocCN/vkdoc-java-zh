  #### 发送对象


  要向 RabbitMQ 发送消息，消息负载必须转换为 `byte[]`。对于 `String` 类型，通过调用 `String.getBytes` 即可轻松实现。然而，发送对象时，这一过程会变得更为繁琐。默认实现会检查对象是否为
  `Serializable`，如果是，则使用 Java 序列化将对象转换为 `byte[]`。使用 Java 序列化并非最佳方案，尤其是在需要向非 Java 客户端发送消息时。


  `RabbitTemplate` 使用 `MessageConverter` 来委托消息的创建。默认情况下，它使用 `SimpleMessageConverter`，该转换器实现了前述策略。然而，还有多种实现方式，它们使用
  XML（`MarshallingMessageConverter`）或 JSON（`Jackson2JsonMessageConverter`）来处理实际负载（而非
  Java 序列化）。


  Spring Boot 会自动检测配置的 `MessageConverter`，并将其同时用于 `RabbitTemplate` 和监听器（参见配方 8-6）。请参见清单
  8-26。


  ```

  @Bean

  public Jackson2JsonMessageConverter jsonMessageConverter() {

  return new Jackson2JsonMessageConverter();

  }

  清单 8-26

  MessageConverter 配置

  ```


