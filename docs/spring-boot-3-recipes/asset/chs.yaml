  ## 3-8\. 为 Servlet 容器配置 SSL


  ### 问题


  你希望你的应用程序能够通过 HTTPS（或者替代 HTTP）进行访问。


  ### 解决方案


  获取一个证书，将其放入密钥库，并使用 `server.ssl` 属性来配置该密钥库。然后 Spring Boot 将自动配置服务器，使其仅能通过 HTTPS 访问。


  ### 工作原理


  使用 `server.ssl.keystore`（及相关属性），你可以配置嵌入式容器仅接受 HTTPS 连接。在配置 SSL 之前，你需要有一个证书来保护你的应用程序。通常，你会希望从像
  Verisign 或 Let’s Encrypt 这样的证书颁发机构获取证书。然而，出于开发目的，你可以使用自签名证书（参见“创建自签名证书”一节）。


  #### 创建自签名证书


  Java 自带了一个名为 `keytool` 的工具，它可以用于生成证书等。参见清单 3-35。


  ```

  keytool -genkey -keyalg RSA -alias sb3-recipes -keystore sb3-recipes.pfx -storepass
  password -validity 3600 -keysize 4096 -storetype pkcs12

  清单 3-35

  keytool 命令

  ```


  此命令将指示 `keytool` 使用 RSA 算法生成一个密钥，并将其放入名为 `sb3-recipes.pfx` 的密钥库中，别名为 `sb3-recipes`，有效期为
  3600 天。运行该命令时，它会询问一些问题。请相应回答（或留空）。之后，会生成一个名为 `sb3-recipes.pfx` 的文件，其中包含证书，并用密码保护。


  将此文件放入 `src/main/resources` 文件夹中，这样它就会作为应用程序的一部分被打包，Spring Boot 也能轻松访问它。


  ![](img/464036_2_En_3_Fign_HTML.gif)一个三角形抽象图形内有一个感叹号符号。它类似于一个警告图标。 使用自签名证书会在浏览器中产生一个警告，提示该网站不安全且未受保护。


  #### 配置 Spring Boot 使用密钥库


  Spring Boot 需要知道密钥库的信息，才能配置嵌入式容器。为此，请使用 `server.ssl.keystore` 属性。你还需要指定密钥库的类型（`pkcs12`）和密码。参见清单
  3-36 和图 3-15。


  ![](img/464036_2_En_3_Fig15_HTML.jpg)


  一张 Spring Boot 下本地主机页面的截图。它在“可用书籍”下显示了标题、作者和 ISBN 的列表。该页面通过 http 链接访问。


  图 3-15


  通过 HTTPS 访问的图书馆


  ```

  server.ssl.key-store=classpath:sb3-recipes.pfx

  server.ssl.key-store-type=pkcs12

  server.ssl.key-store-password=password

  server.ssl.key-password=password

  server.ssl.key-alias=sb2-recipes

  清单 3-36

  SSL 属性

  ```


  #### 同时支持 HTTP 和 HTTPS


  Spring Boot 默认只启动一个连接器，要么是 HTTP，要么是 HTTPS，但不会同时启动两者。如果你想同时支持 HTTP 和 HTTPS，你需要手动添加一个额外的连接器。最简单的方法是自行创建
  HTTP 连接器，并让 Spring Boot 设置 SSL 部分。


  首先，让我们配置 Spring Boot 在端口 8443 上启动服务器。参见清单 3-37。


  ```

  server.port=8443

  清单 3-37

  服务器端口属性

  ```


  要向嵌入式 Tomcat 添加额外的连接器，你需要将 `TomcatServletWebServerFactory` 作为一个 bean 添加到我们的上下文中。通常
  Spring Boot 会检测容器并选择要使用的 `WebServerFactory`；然而，由于需要进行自定义，我们需要手动添加它。参见清单 3-38。


  ```

  @Bean

  public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

  var factory = new TomcatServletWebServerFactory();

  factory.addAdditionalTomcatConnectors(httpConnector());

  return factory;

  }

  private Connector httpConnector() {

  var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

  connector.setScheme("http");

  connector.setPort(8080);

  connector.setSecure(false);

  return connector;

  }

  清单 3-38

  额外的 Tomcat 连接器

  ```


  这将在端口 8080 上添加一个额外的连接器，现在应用程序可以通过端口 8080 和 8443 使用了。使用 Spring Security，你现在可以强制通过
  HTTPS 而不是 HTTP 访问应用程序的某些部分。参见清单 3-39。


  ![](img/464036_2_En_3_Figo_HTML.gif)一个灯泡图标。 如果你不想显式配置 `TomcatServletWebServerFactory`，你可以使用
  `BeanPostProcessor` 向 `TomcatServletWebServerFactory` 注册额外的 `Connector`。这样，你就可以为不同的嵌入式容器实现此功能，而不是局限于单个容器。


  ```

  @Bean

  public BeanPostProcessor addHttpConnectorProcessor() {

  return new BeanPostProcessor() {

  @Override

  public Object postProcessBeforeInitialization(Object bean, String beanName)

  throws BeansException {

  if (bean instanceof TomcatServletWebServerFactory factory) {

  factory.addAdditionalTomcatConnectors(httpConnector());

  }

  return bean;

  }

  };

  }

  清单 3-39

  额外的 Tomcat 连接器：使用 BeanPostProcessor

  ```




  #### 将 HTTP 重定向到 HTTPS


  除了同时支持 HTTP 和 HTTPS，另一种方案是仅支持 HTTPS，并将 HTTP 流量重定向到 HTTPS。其配置与同时支持 HTTP 和 HTTPS 时类似。不过，现在你需要配置连接器，将所有来自
  8080 端口的流量重定向到 8443 端口。参见清单 3-40。


  ```

  @Bean

  public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

  var factory = new TomcatServletWebServerFactory();

  factory.addAdditionalTomcatConnectors(httpConnector());

  factory.addContextCustomizers(securityCustomizer());

  return factory;

  }

  private Connector httpConnector() {

  var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

  connector.setScheme("http");

  connector.setPort(8080);

  connector.setSecure(false);

  connector.setRedirectPort(8443);

  return connector;

  }

  private TomcatContextCustomizer securityCustomizer() {

  return context -> {

  var collection = new SecurityCollection();

  collection.addPattern("/*");

  var securityConstraint = new SecurityConstraint();

  securityConstraint.setUserConstraint("CONFIDENTIAL");

  securityConstraint.addCollection(collection);

  context.addConstraint(securityConstraint);

  };

  }

  清单 3-40

  附加 Tomcat 连接器：带重定向功能

  ```


  现在，`httpConnector` 设置了 `redirectPort`，以便它知道要使用哪个端口。最后，你需要使用 `SecurityConstraint`
  来保护所有 URL。使用 Spring Boot，你可以使用专门的 `TomcatContextCustomizer` 在 Tomcat 启动前对 `Context`
  进行后置处理。该约束使得所有内容（由于使用了 `/*` 作为模式）都变为机密（允许使用 `NONE`、`INTEGRAL` 或 `CONFIDENTIAL` 之一），结果就是所有内容都将被重定向。


  ## 3-9. 使用控制器和 TaskExecutor 实现异步请求处理


  ### 问题


  为了提高 Servlet 容器的吞吐量，你希望异步处理请求，以便更有效地分配资源。


  ### 解决方案


  当请求进入时，它会被同步处理，这会阻塞 HTTP 请求处理线程。响应保持打开状态，并且可以写入。例如，当某个调用需要一些时间才能完成时，这很有用，你可以让它在后台处理，并在完成后向用户返回一个值，而不是阻塞线程。


  ### 工作原理


  Spring MVC 支持多种方法返回类型；表 3-12 中的返回类型以异步方式处理。


  表 3-12


  异步返回类型


  | 类型 | 描述 |

  | --- | --- |

  | `DeferredResult<?>` | 稍后由另一个线程生成的异步结果。 |

  | `ListenableFuture<?>` | 稍后由另一个线程生成的异步结果，是 `DeferredResult` 的等效替代方案。从 Spring 6.0
  开始，此类型已弃用，推荐使用 `CompletableFuture<?>`。 |

  | `CompletionStage<?>`/`CompletableFuture<?>` | 稍后由另一个线程生成的异步结果，是 `DeferredResult`
  的等效替代方案。 |

  | `Callable<?>` | 一个异步计算，结果在计算完成后产生。 |

  | `ResponseBodyEmitter` | 可用于异步地向响应写入多个对象。 |

  | `SseEmitter` | 可用于异步地写入服务器发送事件。 |

  | `StreamingResponseBody` | 可用于异步地写入 `OutputStream`。 |


  这些泛型返回类型又可以返回控制器的任何返回类型，因此可以是添加到模型的对象、视图的名称，甚至是 `ModelAndView`。


  #### 配置异步处理


  Servlet 规范在版本 3 中添加了对异步请求处理的支持。要启用它，你必须告知所有过滤器和 Servlet 以异步方式运行。在 Spring Boot 应用程序中，对于
  `DispatcherServlet` 和检测到的 `Filter` Bean，默认会执行此操作。


  Spring Boot 默认会配置一个 `AsyncTaskExecutor` 供 Spring MVC 使用。但是，你可以根据需求配置一个 `AsyncTaskExecutor`，并将其注入到
  MVC 配置中。参见清单 3-41。


  ```

  @SpringBootApplication

  public class HelloWorldApplication implements WebMvcConfigurer {

  public static void main(String[] args) {

  SpringApplication.run(HelloWorldApplication.class, args);

  }

  @Override

  public void configureAsyncSupport(AsyncSupportConfigurer configurer) {

  configurer.setDefaultTimeout(5000);

  configurer.setTaskExecutor(mvcTaskExecutor());

  }

  @Bean

  public ThreadPoolTaskExecutor mvcTaskExecutor() {

  ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

  taskExecutor.setThreadNamePrefix("mvc-executor-");

  return taskExecutor;

  }

  }

  清单 3-41

  显式 TaskExecutor 配置

  ```


  ![](img/464036_2_En_3_Figp_HTML.gif)一个灯泡图标。 当 Spring Boot 检测到你可以使用虚拟线程（Java 21）并且属性
  `spring.threads.virtual.enabled` 设置为 `true` 时，它将自动为虚拟线程使用进行设置。


  要配置异步处理，你需要重写 `WebMvcConfigurer` 的 `configureAsyncSupport` 方法。重写此方法可以让你访问 `AsyncSupportConfigurer`。这允许你设置
  `defaultTimeout` 和要使用的 `AsyncTaskExecutor`。超时时间设置为 5 秒，作为执行器，你将使用 `ThreadPoolTaskExecutor`。


  ![](img/464036_2_En_3_Figq_HTML.gif)一个灯泡图标。 `defaultTimeout` 也可以通过设置 `application.properties`
  中的 `spring.mvc.async.request-timeout` 来设置。添加 `spring.mvc.async.request-timeout=5s`
  与在 `@Bean` 方法中设置的效果相同。


  #### 编写异步控制器


  编写一个控制器并让它异步处理请求，只需更改控制器处理方法的返回类型即可（参见表 3-12）。假设对 `HelloWorldController.hello` 的调用需要一些时间，但我们不希望因此阻塞服务器。




  #### 使用 Callable


  清单 3-42 展示了如何使用 Callable。


  ```

  package com.apress.springboot3recipes;

  import org.springframework.boot.SpringBootVersion;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  import java.util.concurrent.Callable;

  import java.util.concurrent.ThreadLocalRandom;

  @RestController

  public class HelloWorldController {

  @GetMapping

  public Callable hello() {

  return () -> {

  Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

  var version = SpringBootVersion.getVersion();

  return String.format("Hello World, from Spring Boot %s!", version);

  };

  }

  }

  清单 3-42

  使用 Callable 的异步控制器

  ```


  `hello` 方法现在返回一个 `Callable<String>`，而不是直接返回 `String`。在新构建的 `Callable<String>` 内部，有一个随机等待，用于模拟向客户端返回消息之前的延迟。


  现在，当进行预订时，你会在日志中看到类似的内容（见图 3-16）。


  ![](img/464036_2_En_3_Figr_HTML.gif)一个信息图标，圆圈内包含字母 i。 要启用此日志记录，你需要为 Web 相关组启用 `DEBUG`
  级别的日志记录。你可以通过在 `application.properties` 中添加 `logging.level.web=DEBUG` 来实现。


  ![](img/464036_2_En_3_Fig16_HTML.jpg)


  Spring Boot 下本地主机页面的截图。它显示了进行预订时的一系列日志。它启动异步请求并写入来自 Spring Boot 的消息“Hello World”。


  图 3-16


  启用异步后的日志输出


  你会注意到，请求处理是在某个线程（此处为 `nio-8080-exec-2`）上启动的。另一个线程正在执行处理并返回结果（此处为 `task-1`）。最后，请求被分派到
  `DispatcherServlet`，以便在另一个线程上处理结果。


  #### 使用 CompletableFuture


  将方法的签名改为返回 `CompletableFuture``<String>`，并使用 `AsyncTaskExecutor` 异步执行代码。参见清单 3-43。


  ```

  package com.apress.springboot3recipes;

  import org.springframework.boot.SpringBootVersion;

  import org.springframework.core.task.AsyncTaskExecutor;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  import java.util.concurrent.CompletableFuture;

  import java.util.concurrent.ThreadLocalRandom;

  @RestController

  public class HelloWorldController {

  private final AsyncTaskExecutor taskExecutor;

  public HelloWorldController(AsyncTaskExecutor taskExecutor) {

  this.taskExecutor = taskExecutor;

  }

  @GetMapping

  public CompletableFuture hello() {

  return taskExecutor.submitCompletable(() -> {

  randomDelay();

  var version = SpringBootVersion.getVersion();

  return String.format("Hello World, from Spring Boot %s!", version);

  });

  }

  private void randomDelay() {

  try {

  Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

  } catch (InterruptedException e) {

  Thread.currentThread().interrupt();

  }

  }

  }

