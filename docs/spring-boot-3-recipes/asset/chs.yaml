  ### 工作原理


  Spring Boot 使用 Micrometer 观测来观测通过您应用程序的调用。当 `spring-boot-starter-actuator` 作为依赖包含进来时，Spring
  Boot 会自动引入 Micrometer 观测。


  借此，Spring Boot 会自动设置一个 `ObservationHandler` 供您的应用程序使用。这个 `ObservationHandler` 会被注入到一个
  `ObservationRegistry` 中。`ObservationRegistry` 是一个被注入到框架和库的各个位置的组件。在撰写本文时，`ObservationRegistry`
  会自动应用于以下组件：


  *   Spring JMS

  *   Spring Web 和 Spring WebFlux

  *   Spring Security

  *   Spring Kafka

  *   Spring Data for MongoDB

  *   Spring Data R2DBC

  *   Spring Task Executor 和 Task Scheduler

  *   Spring AMQP (RabbitMQ)


  Spring Boot 在 `management.observations` 命名空间中暴露了一些属性，用于配置某些特性（参见表 9-4）。某些观测可以被禁用，但也可以指定要包含在观测中的默认值。这对于将应用程序名称或版本等部分作为默认键/值包含在内非常有用。


  表 9-4

  观测配置属性


  | 属性 | 描述 |

  | --- | --- |

  | `management.observations.enable.<key>` | 设置是否应启用 `<key>` 的给定观测；默认值为 `true`。`all`
  是一个特殊关键字，用于启用或禁用所有观测。 |

  | [`management.observations.http.client.requests.name`](http://management.observations.http.client.requests.name)
  | 设置客户端请求的观测名称；默认值为 `http.client.requests`。 |

  | [`management.observations.http.server.requests.name`](http://management.observations.http.server.requests.name)
  | 设置服务器请求的观测名称；默认值为 `http.server.requests`。 |

  | `management.observations.key-values.<key>` | 设置应用于所有观测的公共键/值。默认值为空。 |

  | `management.observations.r2dbc.include-parameter-values` | 设置是否包含 R2DBC 观测的查询参数；默认值为
  `false`。 |


  ![](img/464036_2_En_9_Figd_HTML.gif)一个警告图标。 当 Spring Boot 检测到预先配置的 `ObservationHandler`
  时，它不会为您配置一个，并且表 9-4 中的属性将不会被应用，因为预期您会进行完整配置！


  接下来，您需要包含一个追踪桥接器（用于将 Micrometer 连接到所选的追踪解决方案）。这将引入必要的 Micrometer 追踪依赖（参见代码清单 9-12
  中一个使用 Zipkin 的 Brave 实现示例）。


  ```

  org.springframework.boot

  spring-boot-starter-actuator


  io.micrometer

  micrometer-tracing-bridge-brave


  io.zipkin.reporter2

  zipkin-reporter-brave


  代码清单 9-12

  使用 Zipkin 的 Brave 追踪依赖

  ```


  有了所有这些依赖，Spring Boot 的自动配置将配置一个 `ObservationHandler`。默认情况下，它会设置一个 `io.micrometer.tracing.handler.DefaultTracingObservationHandler`。当检测到预先配置的
  `ObservationHandler` 时，Spring Boot 不会创建默认的，而是会重用预先配置的那个。


  除了配置 `ObservationHandler`，Spring Boot 还会稍微修改正在使用的日志模式，以自动包含已检测或生成的 `span-id` 和 `trace-id`。这样，日志也将包含必要的信息，这在排查特定调用时非常有用。也可以通过在你的应用程序属性中指定
  `logging.pattern.correlation` 属性来手动配置日志模式。`span-id` 和 `trace-id` 在映射诊断上下文（MDC）中可用，名称为
  `traceId` 和 `spanId`。代码清单 9-13 显示了 Spring Boot 将应用于日志关联的默认模式。当然，如果需要，可以修改此模式。


  ```

  logging.pattern.correlation=[${spring.application.name:},%X{traceId:-},%X{spanId:-}]

  代码清单 9-13

  关联日志属性

  ```




  #### 配置追踪


  Spring Boot 提供了一些属性，以便更轻松地配置追踪。您可以配置应使用的传播类型以及应采样的调用比例（默认为 10%）。默认情况下，如果检测到追踪功能，它将被启用，但您也可以禁用它。


  表 9-5


  追踪配置属性


  | 属性 | 描述 |

  | --- | --- |

  | `management.tracing.enabled` | 设置是否应启用追踪的自动配置；默认值为 `true`。 |

  | `management.tracing.sampling.probability` | 设置采样范围的概率，从 0 到 1.0；默认值为 0.1。 |

  | `management.tracing.propagation.type` | 列出支持的追踪上下文传播方式（可包含 `W3C`、`B3` 或 `B3_MULTI`）；默认值为
  `null`。设置后，它将优先于更细粒度的 `consumes` 和 `produces` 属性。 |

  | `management.tracing.propagation.consume` | 列出接收时支持的追踪上下文传播方式（可包含 `W3C`、`B3` 或
  `B3_MULTI`）；默认值为所有值。 |

  | `management.tracing.propagation.produce` | 列出发送时支持的追踪上下文传播方式（可包含 `W3C`、`B3` 或
  `B3_MULTI`）；默认值为 `W3C`。 |

  | `management.tracing.sampling.probability` | 追踪被采样的概率，范围从 `0.0` 到 `1.0`。 |


  接下来，可以配置 Zipkin。主要可以设置端点的 URL 和一些连接超时（参见表 9-6）。这同样适用于其他解决方案，如 Wavefront、Open Telemetry
  和 Prometheus。


  表 9-6


  Zipkin 配置属性


  | `management.zipkin.tracing.endpoint` | 设置 Zipkin API 的 URL；默认值为 `http://localhost:9411/api/v2/spans`。
  |

  | `management.zipkin.tracing.connect-timeout` | 设置对 Zipkin 请求的连接超时；默认值为 1 秒。 |

  | `management.zipkin.tracing.read-timeout` | 设置对 Zipkin 请求的读取超时；默认值为 10 秒。 |


  #### 使用 ObservationRegistry 设置追踪


  Spring Boot 会自动构建一个 `ObservationRegistry`。如果需要，这个 `ObservationRegistry` 也可以注入到常规
  Bean 中供手动使用。参见清单 9-14。


  ```

  package com.apress.springboot3recipes.library;

  import io.micrometer.observation.Observation;

  import io.micrometer.observation.ObservationRegistry;

  import io.micrometer.observation.annotation.Observed;

  import org.springframework.stereotype.Service;

  import java.util.Map;

  import java.util.Optional;

  import java.util.concurrent.ConcurrentHashMap;

  @Service

  class InMemoryBookService implements BookService {

  private final Map books = new ConcurrentHashMap();

  private final ObservationRegistry observations;

  InMemoryBookService(ObservationRegistry observations) {

  this.observations = observations;

  }

  public Optional find(String isbn) {

  var observation = Observation

  .createNotStarted("BookService.find", this.observations);

  observation.lowCardinalityKeyValue("isbn", isbn);

  return observation.observe(() -> Optional.ofNullable(books.get(isbn)));

  }

  }

  清单 9-14

  使用 ObservationRegistry

  ```


  这里为 `find` 方法添加了一个观测。为此，使用一个名称和注入的 `ObservationRegistry` 创建了一个 `Observation`。接下来，我们通过使用
  `observe()` 方法来调用我们希望被观测的实际代码。`Observation.observe()` 方法根据是否需要返回结果，接受一个 `Runnable`
  或一个 `Supplier`。通过这个小小的调整，我们现在就能看到查找一本书所需的时间，并且它将作为 Zipkin 中追踪的一部分额外显示出来。


  #### 使用 AspectJ 设置追踪


  当检测到 AspectJ 时，它还会注册一个 `io.micrometer.observation.aop.ObservedAspect`。`ObservedAspect`
  会检测带有 `@Observed` 注解的方法，并为其创建一个新的观测。参见清单 9-15。


  ```

  package com.apress.springboot3recipes.library;

  import io.micrometer.observation.Observation;

  import io.micrometer.observation.ObservationRegistry;

  import io.micrometer.observation.annotation.Observed;

  import org.springframework.stereotype.Service;

  import java.util.Map;

  import java.util.Optional;

  import java.util.concurrent.ConcurrentHashMap;

  @Service

  class InMemoryBookService implements BookService {

  private final Map books = new ConcurrentHashMap();

  private final ObservationRegistry observations;

  InMemoryBookService(ObservationRegistry observations) {

  this.observations = observations;

  }

  @Override

  @Observed(name = "BookService.create")

  public Book create(Book book) {

  books.put(book.isbn(), book);

  return book;

  }

  }

  清单 9-15

  使用 @Observed 注解

  ```


  `@Observed` 注解会触发创建一个具有给定 `name` 的新 `Observation`。如果省略 `name`，它将使用 `method.observed`
  作为默认值。此外，类名和方法名会作为低基数键添加到观测中。也可以在 `@Observed` 注解中提供静态值作为低基数键；但（在撰写本文时）尚无法指定表达式来检索，例如，从
  `Book` 参数中获取 `isbn` 值。


