  ## 总结


  在本章中，我们探讨了如何在 Spring Boot 中使用一些企业级技术，例如执行异步任务、发送电子邮件、与 JMX 集成以及暴露指标。我们简要了解了 Spring
  Boot Actuator 和对 JFR 事件的支持。JFR 事件对于识别应用程序启动过程中的问题非常有帮助。


  下一章将探讨 Spring Boot 开箱即支持的各种消息传递解决方案以及如何应用配置。


  '
- '# 8. Spring 消息传递


  Spring 产品组合为与各种消息传递系统集成提供了广泛支持。从相当简单的 JMS API 到 RabbitMQ 和 Kafka。当检测到这些框架和技术时，Spring
  Boot 会提供自动配置。


  ## 8-1\. 配置 JMS


  ### 问题


  你想在 Spring Boot 应用程序中使用 JMS，并且需要连接到 JMS 代理。


  ### 解决方案


  Spring Boot 支持 ActiveMQ 和 Artemis 的自动配置。通过添加其中一个库并设置一些属性，`spring.activemq` 或 `spring.artemis`
  命名空间就是你所需要的全部。


  ### 工作原理


  通过声明对你选择的 JMS 提供程序的依赖，Spring Boot 将自动配置 `ConnectionFactory`，并为你的环境启用一种查找目标（`DestinationResolver`）的策略。这也可以通过使用
  JNDI 来完成。另一种解决方案是自己完成所有配置；如果你需要对 `ConnectionFactory` 实例进行更多控制，或者想要使用非自动配置的 JMS 提供程序，则可能需要这样做。


  为受支持的 JMS 提供程序添加依赖非常容易，因为 Spring Boot 为它们提供了启动器项目。对于 JNDI，你需要自己包含 JMS 依赖。




  #### 使用 ActiveMQ


  使用 ActiveMQ 时，首先要引入 `spring-boot-starter-activemq`。这将拉取所有必要的 JMS 和 ActiveMQ 依赖项，以便开始使用。它会包含
  `spring-jms` 依赖项以及 ActiveMQ 的客户端库。请参见代码清单 8-1。


  ```

  org.springframework.boot

  spring-boot-starter-activemq


  代码清单 8-1

  Spring Boot ActiveMQ 启动器依赖

  ```


  默认情况下，如果没有显式配置代理，Spring Boot 会启动一个嵌入式代理。可以通过使用 `spring.activemq` 命名空间中的属性来更改配置（参见表
  8-1）。


  表 8-1


  ActiveMQ 配置属性


  | 属性 | 描述 |

  | --- | --- |

  | `spring.activemq.broker-url` | 设置要连接的代理的 URL。对于内存代理，默认值为 `vm://localhost?broker.persistent=false`；否则，默认值为
  `tcp://localhost:61616`。 |

  | `spring.activemq.user` | 设置用于连接代理的用户名；默认为空。 |

  | `spring.activemq.password` | 设置用于连接代理的密码；默认为空。 |

  | `spring.activemq.in-memory` | 设置是否应使用嵌入式代理；默认为 `true`。当显式设置了 `spring.activemq.broker-url`
  时，此设置将被忽略。 |

  | `spring.activemq.non-blocking-redelivery` | 设置在重新传递回滚消息之前停止消息传递。启用后，消息顺序将无法保持；默认为
  `false`。 |

  | `spring.activemq.close-timeout` | 设置等待关闭生效的时间；默认为 15 秒。 |

  | `spring.activemq.send-timeout` | 设置等待代理响应的时间；默认为 0（无限期等待）。 |

  | `spring.activemq.packages.trust-all` | 当使用 Java 序列化发送 JMS 消息时，设置是否应信任来自所有包的类；默认为
  none（需要显式设置受信任的包）。 |

  | `spring.activemq.packages.trusted` | 一个逗号分隔的列表，列出要信任的特定包。 |


  以下是一个简单的应用程序，用于列出所有名称中包含 `jms` 的 Bean。这应该包含一个名为 `jmsConnectionFactory` 的 Bean。


  ```

  package com.apress.springboot3recipes.jms;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import java.util.Comparator;

  import java.util.stream.Stream;

  @SpringBootApplication

  public class JmsApplication {

  private static final String MSG = "\tName: %100s, Type: %s\n";

  public static void main(String[] args) {

  var ctx = SpringApplication.run(JmsApplication.class, args);

  System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

  var names = ctx.getBeanDefinitionNames();

  Stream.of(names)

  .filter(name -> name.toLowerCase().contains("jms") || ctx.getType(name).getName().contains("jms"))

  .sorted(Comparator.naturalOrder())

  .forEach(name -> {

  var bean = ctx.getBean(name);

  System.out.printf(MSG, name, bean.getClass().getSimpleName());

  });

  }

  }

  ```


  运行时，程序会将所有名称中包含 `jms` 的 Bean 的名称和类型打印到控制台。输出应类似于图 8-1。


  ![](img/464036_2_En_8_Fig1_HTML.jpg)


  一个简单应用程序的输出，用于列出所有名称中包含 j m s 的 Bean。它显示了所有名称中包含 j m s 的 Bean 的名称和类型。


  图 8-1


  ActiveMQ Bean 输出


  使用 ActiveMQ 时，也可以使用 JMS 连接池（类似于基于 JDBC 的连接池）。默认情况下，此功能是禁用的。要启用并配置它，可以使用 `spring.activemq.pool`
  命名空间中的属性（参见表 8-2）。


  表 8-2


  ActiveMQ 连接池配置属性


  | 属性 | 描述 |

  | --- | --- |

  | `spring.activemq.pool.enabled` | 设置是否应使用连接池；默认为 `false`。 |

  | `spring.activemq.pool.max-connections` | 设置最大连接数；默认为 1。 |

  | `spring.activemq.pool.maximum-active-session-per-connection` | 设置每个连接允许的最大活动 JMS
  会话数；默认为 500。 |

  | `spring.activemq.pool.idle-timeout` | 设置连接可以空闲多长时间；默认为 30 秒。 |

  | `spring.activemq.pool.expiry-timeout` | 设置连接过期前的时间；默认为 0（永不过期）。 |

  | `spring.activemq.pool.reconnect-on-exception` | 当发生 `JMSException` 时重置连接；默认为 `true`。
  |

  | `spring.activemq.pool.block-if-full` | 当请求连接时阻塞，或者抛出 `JMSException`；默认为 `true`。
  |

  | `spring.activemq.pool.block-if-full-timeout` | 设置在抛出 `JMSException` 之前阻塞的时间；默认为
  -1（阻塞直到有可用连接）。 |

  | `spring.activemq.pool.create-connection-on-startup` | 设置是否应在应用程序启动时立即创建连接；默认为
  `true`。 |


  使用连接池功能需要将 `pooled-jms` 依赖项添加到构建文件中。请参见代码清单 8-2。


  ```

  org.messaginghub

  pooled-jms


  代码清单 8-2

  JMS 连接池依赖

  ```


  再次运行应用程序时，您会注意到 `ConnectionFactory` 的类型已更改为 `PooledConnectionFactory`。




