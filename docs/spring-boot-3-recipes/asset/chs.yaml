  #### 添加控制器和视图


  当点击索引页面中提供的链接时，我们希望看到一个显示图书馆中可用书籍列表的页面（见图 3-6）。为此，需要添加两个部分：首先是一个能够处理请求并准备模型的控制器，其次是一个用于渲染书籍列表的视图。


  ![](img/464036_2_En_3_Fig6_HTML.jpg)


  本地主机页面的截图。它显示了可用书籍的标题、作者和 ISBN 链接列表。


  图 3-6


  书籍列表页面


  让我们添加一个控制器，它将用书籍列表填充模型，并选择要渲染的视图名称。控制器是一个带有 `@Controller` 注解的类，其中包含请求处理方法（带有 `@RequestMapping`
  注解的方法，或者如本示例中使用的 `@GetMapping`，它是 `@RequestMapping` 的一种特化注解）。参见代码清单 3-14。


  ```

  package com.apress.springboot3recipes.library.web;

  import com.apress.springboot3recipes.library.Book;

  import com.apress.springboot3recipes.library.BookService;

  import org.springframework.stereotype.Controller;

  import org.springframework.ui.Model;

  import org.springframework.web.bind.annotation.GetMapping;

  @Controller

  public class BookController {

  private final BookService bookService;

  public BookController(BookService bookService) {

  this.bookService = bookService;

  }

  @GetMapping("/books.html")

  public String all(Model model) {

  model.addAttribute("books", bookService.findAll());

  return "books/list";

  }

  }

  代码清单 3-14

  BookController

  ```


  `BookController` 需要 `BookService`，以便获取要显示的书籍列表。`all` 方法将 `org.springframework.ui.Model`
  作为方法参数，这样我们就可以将书籍列表放入模型中。请求处理方法可以有不同的参数^(⁴)，其中之一就是 `Model` 类。在方法中，我们使用 `BookService`
  从数据存储中检索所有书籍，并通过 `model.addAttribute` 将其添加到模型中。现在，书籍列表在模型中可以通过键 `books` 获取。


  最后，我们返回要渲染的视图名称 `books/list`。


  现在，控制器及其请求处理方法已添加完毕，我们需要创建视图。在 `src/main/templates/books` 目录下创建一个 `list.html` 文件。参见代码清单
  3-15。


  ```


  Library - Available Books


  Available Books


  Title

  Author

  ISBN


  Title

  Authors

  ISBN


  代码清单 3-15

  书籍列表页面

  ```


  这又是一个使用 Thymeleaf 语法的 HTML5 页面。该页面将使用 `th:each` 表达式渲染书籍列表。它会从模型中的 `books` 属性获取所有书籍，并为每本书创建一行。行中的每一列都使用
  `th:text` 表达式包含一些文本；它将打印书籍的标题、作者和 ISBN。表格的最后一列包含一个指向书籍详情的链接。它使用 `th:href` 表达式构建
  URL。注意 `()` 之间的表达式；这将添加 `isbn` 请求参数。


  启动应用程序并点击索引页面上的链接后，您应该会看到一个显示图书馆内容的页面，如图 3-6 所示。


  #### 添加详情页面


  最后，当点击表格中的 ISBN 号码时，您希望看到一个显示详情的页面。该链接包含一个名为 `isbn` 的请求参数，我们可以在控制器中检索并使用它来查找书籍。请求参数可以通过带有
  `@RequestParam` 注解的方法参数来获取。


  以下方法将处理 GET 请求，将请求参数映射到方法参数，并包含模型，以便我们可以将书籍添加到模型中。


  ```

  @GetMapping(value = "/books.html", params = "isbn")

  public String get(@RequestParam("isbn") String isbn, Model model) {

  bookService.find(isbn)

  .ifPresent(book -> model.addAttribute("book", book));

  return "books/details";

  }

  ```


  控制器将渲染 `books/details` 页面。将 `details.html` 文件添加到 `src/main/resources/templates/books`
  目录。参见代码清单 3-16。


  ```


  Library - Available Books


  Title

  authors

  ISBN


  Not Found


  代码清单 3-16

  书籍详情页面

  ```


  这个 HTML5 Thymeleaf 模板将渲染页面上两个可用块之一。要么找到了书籍，然后显示详情；要么显示“未找到”消息。这是通过使用 `th:if` 表达式实现的。“未找到”消息中的
  `isbn` 通过使用 `param` 作为前缀从请求参数中检索；`${param.isbn}` 将获取 `isbn` 请求参数。




