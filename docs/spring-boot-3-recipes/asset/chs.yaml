  `application.properties` 中添加 `logging.level.web=TRACE`，它将在控制台列出所有映射。它还会对传入的请求及其处理过程启用大量日志记录，因此你可能不希望一直保持此设置，但它可以成为调试映射问题的绝佳工具。示例输出见图
