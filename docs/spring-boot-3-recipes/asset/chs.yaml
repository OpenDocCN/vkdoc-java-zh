  一个 JSON 片段，在 `_links` 对象下提供了指向 Actuator 服务各个端点的链接。它包括 self 引用、健康检查、beans、caches、info、conditions、config
  props 和 environment details 的链接。每个链接都包含其各自的 URL 和用于动态路径生成的 templated 状态。


