  @MockBean

  private RabbitTemplate rabbitTemplate;

  @Test

  void shouldSendAtLeastASingleMessage() {

  verify(rabbitTemplate, Mockito.atLeastOnce())

  .convertAndSend("hello", "Hello World, from Spring Boot 3, over RabbitMQ!");

  }

  }

