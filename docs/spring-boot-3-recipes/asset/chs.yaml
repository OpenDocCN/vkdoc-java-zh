  I18N 支持，另请参阅配方 3-6）。


  ## 3-5. 实现国际化（I18N）


  ### 问题


  在开发国际化 Web 应用程序时，你必须以用户偏好的区域设置显示网页。你不想为不同的区域设置创建同一页面的不同版本。


  ### 解决方案


  为了避免为不同区域设置创建页面的不同版本，你应该通过外部化区域设置敏感的文本消息来使你的网页独立于区域设置。Spring 能够通过使用消息源为你解析文本消息，该消息源必须实现
  `MessageSource` 接口。在你的页面模板中，你可以使用特殊标签或查找消息。




  ### 工作原理


  当 Spring Boot 在 `src/main/resources`（默认位置）找到 `messages.properties` 文件时，它会自动配置一个
  `MessageSource`。此 `messages.properties` 文件包含应用程序中要使用的默认消息。Spring Boot 将使用请求中的 `Accept-Language`
  头来确定当前请求应使用哪个区域设置（有关如何更改此设置，请参阅配方 3-6）。


  有一些属性可以改变 `MessageSource` 对缺失翻译、缓存等的响应方式。有关这些属性的概述，请参见表 3-6。


  表 3-6


  国际化属性


  | 属性 | 描述 |

  | --- | --- |

  | `spring.messages.basename` | 以逗号分隔的基础名称列表；默认为 `messages`。 |

  | `spring.messages.encoding` | 消息包编码；默认为 `UTF-8`。 |

  | `spring.messages.always-use-message-format` | 设置是否应将 `MessageFormat` 应用于所有消息；默认为
  `false`。 |

  | `spring.messages.fallback-to-system-locale` | 当找不到检测到的区域设置的资源包时，回退到系统区域设置。禁用时，将从默认文件加载默认值。默认为
  `true`。 |

  | `spring.messages.use-code-as-default-message` | 当找不到消息时，使用消息代码作为默认消息，而不是抛出 `NoSuchMessageException`。默认为
  `false`。 |

  | `spring.messages.cache-duration` | 缓存持续时间；默认为 `forever`。 |


  ![](img/464036_2_En_3_Figg_HTML.gif)一个灯泡图标。 将应用程序部署到云或其他外部托管方时，将 `spring.messages.fallback-to-system-locale`
  设置为 `false` 可能会很有用。这样，您就可以控制应用程序的默认语言，而不是由您无法控制的部署环境来决定。


  将 `messages.properties` 文件添加到 `src/main/resources` 目录。请参见清单 3-25。


  ```

