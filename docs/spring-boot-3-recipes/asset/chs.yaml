  在 Docker 容器中运行 Spring Boot 应用时，您可能希望能够根据应用部署的环境来更改属性。为此，您可以使用 Spring 配置文件（另请参阅第
  2 章），但仍然需要提供一个变量来指定使用哪个配置文件。通常，您会像这样启动应用：`java -jar your-applicarion.jar --spring.profiles.active=profile1,profile2`；但是，由于您使用的是
  Docker 容器，这种方式并不可行。


  幸运的是，借助 Docker，您可以使用 `-e` 开关来传入环境变量，而 Spring Boot 也会考虑本地环境中的变量。^(⁸)


