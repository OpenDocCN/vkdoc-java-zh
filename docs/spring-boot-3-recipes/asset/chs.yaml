- '# 2. Spring Boot 基础


  在本章中，我们将研究 Spring Boot 的基础特性。


  ![](img/464036_2_En_2_Figa_HTML.gif)一个信息图标，圆圈内有一个字母 i。使用 Spring Initializr 创建一个项目；不需要额外的依赖项。


  ## 2-1\. 配置 Bean


  ### 问题


  你想让 Spring Boot 将你的类用作 bean。


  ### 解决方案


  根据你的需求，你可以利用 `@ComponentScan` 自动检测你的类并创建一个实例，结合使用 `@Autowired` 和 `@Value` 来注入依赖项或属性；或者，你也可以在
  `@Configuration` 类中使用带有 `@Bean` 注解的方法，以便对正在创建的 bean 保持更多控制。




  ### 工作原理


  配方 1-1 中已说明，`@SpringBootApplication` 同时包含了 `@ComponentScan` 和 `@Configuration`。这意味着任何带有
  `@Component` 注解的类都会被 Spring Boot 自动检测并实例化；同时，它也允许定义带有 `@Bean` 注解的方法来声明 Bean。


  #### 使用 @Component 配置 Bean


  首先创建一个类来启动应用程序。创建一个带有 `@SpringBootApplication` 注解的 `HelloWorldApplication` 实例。参见清单
  2-1。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  @SpringBootApplication

  public class HelloWorldApplication {

  public static void main(String[] args) {

  SpringApplication.run(HelloWorldApplication.class, args);

  }

  }

  清单 2-1

  HelloWorldApplication 源码

  ```


  ![](img/464036_2_En_2_Figb_HTML.gif)一个灯泡图标。请将带有 `@SpringBootApplication` 注解的类放在顶层包中。这样，它就能自动检测所有带注解的组件、配置类等。^(¹)


  这将启动应用程序，检测所有带有 `@Component` 注解的类，并检测类路径上有哪些库（另请参见第 1 章）。运行这个 `HelloWorldApplication`
  时，你会发现它不会做太多事情，因为没有什么需要检测或运行的内容。让我们创建一个 Spring Boot 能自动检测的简单类。


  ```

  package com.apress.springboot3recipes.helloworld;

  import jakarta.annotation.PostConstruct;

  import org.springframework.stereotype.Component;

  @Component

  public class HelloWorld {

  @PostConstruct

  public void sayHello() {

  System.out.println("Hello World, from Spring Boot 3!");

  }

  }

  ```


  由于 `@Component` 注解，这个类会被 Spring Boot 自动检测到。`@PostConstruct` 注解告诉 Spring 在构造 Bean
  并注入所有依赖后调用此方法。简单来说，在启动时 `sayHello` 方法会被执行，控制台将打印出 `Hello World, from Spring Boot
  3!` 这一行。


  ![](img/464036_2_En_2_Figc_HTML.gif)一个灯泡图标。当你需要扫描默认组件扫描未覆盖的包时，可以在 `@SpringBootApplication`
  注解上使用 `scanBasePackages` 或 `scanBasePackagesClasses` 来定义需要额外扫描的包。




  #### 使用 @Bean 方法配置 Bean


  除了自动检测组件，你还可以使用工厂方法来创建 Bean。当你希望或需要对 Bean 的构造过程进行更多控制时，这种方法非常有用。工厂方法是一个使用 `@Bean`^(²)
  注解的方法，它将被用于在应用上下文中注册一个 Bean。默认情况下，Bean 的名称与方法名称相同。该方法也可以带有参数，这些参数会被自动解析为应用上下文中的其他
  Bean。


  让我们创建一个能够对整数进行基本计算的应用。首先，编写 `Calculator` 类。它会在构造函数中接收一个 `Operation` Bean 的集合。`Operation`
  是一个接口，不同的实现将执行实际的计算。参见清单 2-2。


  ```

  package com.apress.springboot3recipes.calculator;

  import org.springframework.stereotype.Component;

  import java.util.Collection;

  @Component

  public class Calculator {

  private final Collection operations;

  public Calculator(Collection operations) {

  this.operations = operations;

  }

  public void calculate(int lhs, int rhs, char op) {

  operations.stream()

  .filter((operation) -> operation.handles(op))

  .map((operation) -> operation.apply(lhs, rhs))

  .peek( (result) -> System.out.printf("%d %s %d = %s%n", lhs, op, rhs, result))

  .findFirst()

  .orElseThrow(() ->

  new IllegalArgumentException("Unknown operation " + op));

  }

  }

  清单 2-2

  Calculator 类源码

  ```


  在 `calculate` 方法中，通过 `Operation.handles` 方法检测到正确的 `Operation`；当找到正确的操作时，会调用 `Operation.apply`
  方法来执行实际的计算。如果我们传入一个计算器无法处理的操作，则会抛出一个异常。


  `Operation` 接口是一个简单的接口，包含前面提到的两个方法。参见清单 2-3。


  ```

  package com.apress.springboot3recipes.calculator;

  public interface Operation {

  int apply(int lhs, int rhs);

  boolean handles(char op);

  }

  清单 2-3

  Operation 接口源码

  ```


  现在，让我们添加两个操作：一个用于加法，一个用于乘法。参见清单 2-4 和清单 2-5。


  ```

  package com.apress.springboot3recipes.calculator.operation;

  import com.apress.springboot3recipes.calculator.Operation;

  import org.springframework.stereotype.Component;

  @Component

  class Multiplication implements Operation {

  @Override

  public int apply(int lhs, int rhs) {

  return lhs * rhs;

  }

  @Override

  public boolean handles(char op) {

  return ''*'' == op;

  }

  }

  清单 2-5

  乘法操作类源码

  ```


  ```

  package com.apress.springboot3recipes.calculator.operation;

  import com.apress.springboot3recipes.calculator.Operation;

  import org.springframework.stereotype.Component;

  @Component

  class Addition implements Operation {

  @Override

  public int apply(int lhs, int rhs) {

  return lhs + rhs;

  }

  @Override

  public boolean handles(char op) {

  return ''+'' == op;

  }

  }

  清单 2-4

  加法操作类源码

  ```


  这些就是我们制作一个能够进行加法和乘法运算，并且仍然具有可扩展机制的计算器所需的所有组件。


  最后，让我们创建一个配置并使用 `Calculator` 的应用。为了创建 `Calculator` 的实例，需要一个 `@Bean` 方法；这个方法可以添加到使用
  `@SpringBootApplication` 注解的类中，或者一个普通的 `@Configuration` 类中。参见清单 2-6。


  ```

  package com.apress.springboot3recipes.calculator;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  import java.util.Collection;

  @SpringBootApplication

  public class CalculatorApplication {

  public static void main(String[] args) {

  var ctx = SpringApplication.run(CalculatorApplication.class, args);

  var calculator = ctx.getBean(Calculator.class);

  calculator.calculate(137, 21, ''+'');

  calculator.calculate(137, 21, ''*'');

  calculator.calculate(137, 21, ''-'');

  }

  @Bean

  public Calculator calculator(Collection operations) {

  return new Calculator(operations);

  }

  }

  清单 2-6

  CalculatorApplication 源码

  ```


  `calculator` 工厂方法接收一个 `Collection<Operation>`，我们用它来构造 `Calculator`。当在 `@Bean` 注解的方法中使用参数时，这些参数会被自动解析。当注入一个泛型集合时，Spring
  会自动检测所需 Bean 的所有实例，并使用它们来调用 `calculator` 工厂方法。


  在 `main` 方法中，我们获取 `Calculator` 并使用不同的数字和操作调用其 `calculate` 方法。前两个操作会正常在控制台打印一些输出。最后一个操作会抛出异常，因为没有合适的操作来执行减法（图
  2-1）。


  ![](img/464036_2_En_2_Fig1_HTML.jpg)


  一个 Marten 窗口的截图。它显示了一段 Spring Boot 程序代码，该代码获取计算器并使用不同的数字和操作调用其 calculate 方法，最后一个操作抛出了异常。


  图 2-1

  计算器应用输出


  尽管你为 `Calculator` 创建了一个工厂方法，但这实际上并非必需，因为它已经使用了 `@Component` 注解，Spring 会自动使用该类中的唯一构造函数并尝试检测所有依赖项。这段代码的另一个不太好的地方是手动获取
  Bean，这可以被认为是一种不良实践。通常，你应该使用依赖注入。Spring Boot 有一个 `ApplicationRunner` 接口，可用于在应用启动后运行一些代码。当
  Spring Boot 检测到类型为 `ApplicationRunner` 的 Bean 时，它会在应用完全启动后立即调用其方法。让我们使用这个接口来清理代码。参见清单
  2-7。


  ```

  package com.apress.springboot3recipes.calculator;

  import org.springframework.boot.ApplicationRunner;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  @SpringBootApplication

  public class CalculatorApplication {

  public static void main(String[] args) {

  SpringApplication.run(CalculatorApplication.class, args);

  }

  @Bean

  public ApplicationRunner calculationRunner(Calculator calculator) {

  return args -> {

  calculator.calculate(137, 21, ''+'');

  calculator.calculate(137, 21, ''*'');

  calculator.calculate(137, 21, ''-'');

  };

  }

  }

  清单 2-7

  CalculatorApplication 源码（更新版）

  ```


  创建 `Calculator` 的方法已被替换为 `ApplicationRunner`。这个 `ApplicationRunner` 接收自动配置好的 `Calculator`，并对其执行一些操作。运行这个类时，输出应该与之前相同（图
  2-1）。主要的区别和优势在于，不再需要手动从 `ApplicationContext` 获取 Bean，因为 Spring 会负责获取正确的 Bean。


  ## 2-2\. 外部化属性


  ### 问题


  你希望使用属性来为不同的环境或执行场景配置你的应用。




  ### 解决方案


  Spring Boot 支持从多个位置获取属性。默认情况下，它会加载名为 `application.properties` 的文件，同时也会使用操作系统环境变量以及
  Java `System` 属性。当从命令行运行时，它还会考虑命令行参数。根据应用程序的类型以及可用性或功能（例如 JNDI），还会考虑更多位置。^(³) 对于我们的应用程序，将按给定顺序考虑以下资源：


  *   打包应用程序外部的 `application.properties`/`application.yaml`


  *   打包在应用程序内部的 `application.properties`/`application.yaml`


  *   操作系统环境变量


  *   Java 系统属性


  *   命令行参数


  ![](img/464036_2_En_2_Figd_HTML.gif)一个灯泡图标。除了 `.properties` 文件，您也可以使用 YAML 文件来表达配置属性。与
  `.properties` 文件相同的规则仍然适用。


  此外，对于前两个选项，您还可以根据激活的配置文件加载特定于配置文件的属性。要激活的配置文件可以通过 `spring.profiles.active` 属性传递。特定于配置文件的
  `application-{profile}.properties` 文件优先级高于非特定于配置文件的文件。每个文件都会被加载，因此您可以覆盖属性。因此，这个列表会稍长一些：


  *   打包应用程序外部的 `application-{profile}.properties`


  *   打包应用程序外部的 `application.properties`


  *   打包在应用程序内部的 `application-{profile}.properties`


  *   打包在应用程序内部的 `application.properties`


  *   操作系统环境变量


  *   Java 系统属性


  *   命令行参数


  ### 工作原理


  为配方 2-1 创建的 `Calculator` 非常灵活；然而，`CalculatorApplication` 在其执行的计算方面使用了硬编码的值。现在，当我们想要计算不同的内容时，就需要修改代码、重新编译并运行新编译的代码。我们可能希望为此使用属性，以便在需要时能够更改它们。


  首先修改应用程序，使其使用属性中的值而不是硬编码的值。为此，更改 `ApplicationRunner` 的 `@Bean` 方法，使其接受三个额外的参数，这些参数将使用
  `@Value` 进行注解。参见清单 2-8。


  ```

  package com.apress.springboot3recipes.calculator;

  import org.springframework.beans.factory.annotation.Value;

  import org.springframework.boot.ApplicationRunner;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  @SpringBootApplication

  public class CalculatorApplication {

  public static void main(String[] args) {

  SpringApplication.run(CalculatorApplication.class, args);

  }

  @Bean

  public ApplicationRunner calculationRunner(Calculator calculator,

  @Value("${lhs}") int lhs,

  @Value("${rhs}") int rhs,

  @Value("${op}") char op) {

  return args -> calculator.calculate(lhs, rhs, op);

  }

  }

  清单 2-8

  使用属性的 CalculatorApplication 源码

  ```


  `@Value` 将指示 Spring 查找该属性并使用该属性的值。例如，如果我们使用 `@Value("${lhs}")`，Spring 将尝试检测名为 `lhs`
  的属性并使用其值。您也可以通过添加冒号和默认值来指定默认值，例如 `@Value("${lhs:12}")`。现在，如果找不到值，它将使用 `12`。如果没有指定默认值，则会抛出异常。如果我们现在启动应用程序，将会抛出一个异常，说明找不到名为
  `lhs` 的属性。


  在 `src/main/resources` 中添加 `application.properties`，并在其中为 `lhs`、`rhs` 和 `op` 设置值。参见清单
  2-9。


  ```

  lhs=12

  rhs=15

  op=*

  清单 2-9

  默认属性

  ```


  Spring Boot 将在启动时加载 `application.properties`，因此这些属性可用。现在运行应用程序时，它应该再次生成输出，并遵循 `application.properties`
  中给出的值（图 2-2）。


