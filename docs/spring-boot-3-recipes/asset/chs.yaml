  一本书由其 ISBN 号定义；它有一个标题和一位或多位作者。通常，记录会创建 `equals`、`hashCode` 和 `toString` 方法，这些方法会包含记录中的所有数据（因为它是不可变的）。然而，在这里我们希望
  `equals` 和 `hashCode` 仅基于 `isbn` 字段，因此我们自己提供了实现。


