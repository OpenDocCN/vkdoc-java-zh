  private void sendAndDelay(ResponseBodyEmitter emitter, Order order) throws IOException{

  var eventBuilder = SseEmitter.event();

  emitter.send(

  eventBuilder

  .data(order, MediaType.APPLICATION_JSON)

  .name("order-created")

  .id(String.valueOf(order.hashCode())).build());

  randomDelay();

  }

