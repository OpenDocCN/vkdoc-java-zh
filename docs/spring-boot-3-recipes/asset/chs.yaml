  `DockerApplication` 类包含一个简单的 `ApplicationRunner`，它在启动时会查询 PostgreSQL 的 `pg_tables`
  系统表，以检索可用表的名称并将其打印到控制台。之后，它会停止。请注意，这里没有任何 Docker 特定的内容，也没有为数据库指定任何配置。


  现在，当运行应用程序时，会有一些输出表明已找到 Docker Compose 文件，并且它将启动容器。当容器启动后，应用程序将继续运行并列出表。参见图 2-6。


