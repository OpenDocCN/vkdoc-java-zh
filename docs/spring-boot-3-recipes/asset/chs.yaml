  #### 使用 Spring Boot 切片进行集成测试


  除了使用 `@SpringBootTest`，你还可以测试应用程序的一部分。为此，Spring Boot 提供了所谓的切片。通过专用的 `@*Test` 注解（参见表
  2-2），它将仅加载所需配置部分的 `ApplicationContext`。例如，使用 `@JdbcTest` 时，它将创建一个仅包含 JDBC 相关 bean（如
  `DataSource`、`JdbcTemplate` 等）的 `ApplicationContext`。它不会创建所有不相关的 bean，例如你的 Web 服务器或
  Web 相关的 bean。


