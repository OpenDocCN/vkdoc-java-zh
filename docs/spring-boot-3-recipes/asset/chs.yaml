  ## 3-6\. 更改用户区域设置


  ### 问题


  为了使您的 Web 应用程序支持国际化，您必须识别每个用户偏好的区域设置，并根据此区域设置显示内容。


  ### 解决方案


  在 Spring MVC 应用程序中，用户的区域设置由组件识别，该组件必须实现 `LocaleResolver` 接口。Spring MVC 提供了几个 `LocaleResolver`
  实现，供您根据不同的标准解析区域设置。或者，您也可以通过实现此接口来创建自己的自定义区域设置解析器。


  您可以通过在 Web 应用程序上下文中注册一个类型为 `LocaleResolver` 的 bean 来定义区域设置解析器。您必须将区域设置解析器的 bean
  名称设置为 `localeResolver`，以便它可以被自动检测到。


  ### 工作原理


  Spring MVC 提供了 `LocaleResolver` 接口的几个默认实现，其中一些允许更改 `Locale`。要更改 `Locale`，可以使用特定的
  `HandlerInterceptor` 来允许用户覆盖他们想要使用的区域设置，即 `LocaleChangeInterceptor`。


  #### 使用 HTTP 请求头解析区域设置


  Spring Boot 注册的默认区域设置解析器是 `AcceptHeaderLocaleResolver`。它通过检查 HTTP 请求的 `Accept-Language`
  头来解析区域设置。此头由用户的 Web 浏览器根据底层操作系统的区域设置进行设置。请参见清单 3-28。


  ![](img/464036_2_En_3_Figi_HTML.gif)一个信息图标，圆圈内有一个字母 i。 `AcceptHeaderLocaleResolver`
  无法更改用户的区域设置，因为它无法修改用户操作系统的区域设置。


  ```

  @Bean

  public LocaleResolver localeResolver () {

  return new AcceptHeaderLocaleResolver();

  }

  清单 3-28

  AcceptHeaderLocaleResolver Bean 定义

  ```


  #### 使用会话属性解析区域设置


  另一种解析区域设置的方法是使用 `SessionLocaleResolver`。它通过检查用户会话中的预定义属性来解析区域设置。如果会话属性不存在，此区域设置解析器将从
  `Accept-Language` HTTP 头确定默认区域设置。请参见清单 3-29。


  ```

  @Bean

  public LocaleResolver localeResolver () {

  var localeResolver = new SessionLocaleResolver();

  localeResolver.setDefaultLocale(Locale.forLanguageTag("en"));

  return localeResolver;

  }

  清单 3-29

  SessionLocaleResolver Bean 定义

  ```


  如果会话属性不存在，您可以为该解析器设置 `defaultLocale` 属性。请注意，此区域设置解析器能够通过更改存储区域设置的会话属性来更改用户的区域设置。




  #### 通过 Cookie 解析区域设置


  你也可以使用 `CookieLocaleResolver`，通过检查用户浏览器中的 Cookie 来解析区域设置。如果 Cookie 不存在，此区域设置解析器会从
  `Accept-Language` HTTP 标头确定默认区域设置。请参见清单 3-30。


  ```

  @Bean

  public LocaleResolver localeResolver() {

  return new CookieLocaleResolver();

  }

  清单 3-30

  CookieLocaleResolver Bean 定义

  ```


  此区域设置解析器使用的 Cookie 可以通过配置表 3-7 中 `CookieLocaleResolver` 的属性进行自定义。请参见清单 3-31。


  表 3-7


  CookieLocaleResolver 属性


  | 属性 | 描述 |

  | --- | --- |

  | `cookieDomain` | 设置 Cookie 的 `Domain` 属性值。 |

  | `cookieHttpOnly` | 为 Cookie 添加 `HttpOnly` 属性。 |

  | `cookieMaxAge` | 设置 Cookie 的 `Max-Age` 属性，-1 表示持续到浏览器关闭（默认值）。 |

  | `cookieName` | 设置 Cookie 的名称（已弃用；改用构造函数）。 |

  | `cookiePath` | 设置 Cookie 的 `Path` 属性；默认值为 `/`。 |

  | `cookieSameSite` | 设置 Cookie 的 `Same-Site` 属性；默认值为 `Lax`。 |

  | `cookieSecure` | 设置 Cookie 的 `Secure` 属性；默认值为 `false`。 |

  | `langagueTagCompliant` | 设置解析器是否应遵循 BCP47 语言标签规范（而非 Java 旧版区域设置）；默认值为 `true`。
  |

  | `rejectInvalidCookies` | 设置是否拒绝无效/损坏的 Cookie；默认值为 `true`。 |


  ```

  @Bean

  public LocaleResolver localeResolver() {

  var cookieLocaleResolver = new CookieLocaleResolver("language");

  cookieLocaleResolver.setCookieMaxAge(Duration.ofMinutes(30));

  cookieLocaleResolver.setDefaultLocale(Locale.forLanguageTag("en"));

  return cookieLocaleResolver;

  }

  清单 3-31

  设置属性的示例

  ```


  如果用户浏览器中不存在 Cookie，你还可以为此解析器设置 `defaultLocale` 属性。此区域设置解析器能够通过修改存储区域设置的 Cookie 来更改用户的区域设置。


  #### 更改用户的区域设置


  除了通过显式调用 `LocaleResolver.setLocale()` 来更改用户的区域设置外，你还可以将 `LocaleChangeInterceptor`
  应用于处理程序映射。此拦截器会检测当前 HTTP 请求中是否存在特殊参数。该参数名称可以通过此拦截器的 `paramName` 属性进行自定义（默认值为 `locale`）。如果当前请求中存在此类参数，此拦截器会根据参数值更改用户的区域设置。


  要能够更改区域设置，必须使用允许更改的 `LocaleResolver`。


  ```

  @Bean

  public LocaleResolver localeResolver() {

  return new CookieLocaleResolver();

  }

  ```


  要更改区域设置，请将 `LocaleChangeInterceptor` 添加为 Bean 并将其注册为拦截器；对于后者，请使用 `WebMvcConfigurer`
  中的 `addInterceptors` 方法。请参见清单 3-32。


  ![](img/464036_2_En_3_Figj_HTML.gif)一个信息图标，圆圈内包含字母 i。 除了将其添加到 `@SpringBootApplication`
  之外，你还可以创建一个专门的 `@Configuration` 注解类来注册拦截器。请注意*不要*向该类添加 `@EnableWebMvc`，因为这会禁用 Spring
  Boot 的自动配置！


  ```

  @SpringBootApplication

  public class LibraryApplication implements WebMvcConfigurer {

  public static void main(String[] args) {

  SpringApplication.run(LibraryApplication.class, args);

  }

  @Override

  public void addInterceptors(InterceptorRegistry registry) {

  registry.addInterceptor(new LocaleChangeInterceptor());

  }

  @Bean

  public LocaleResolver localeResolver() {

  return new CookieLocaleResolver();

  }

  }

  清单 3-32

  LocaleChangeInterceptor Bean 和配置

  ```


