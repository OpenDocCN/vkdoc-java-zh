  ## 8-2. 使用 JMS 发送消息


  ### 问题


  你想通过 JMS 向其他系统发送消息。


  ### 解决方案


  使用 Spring Boot 提供的 `JmsTemplate` 来发送和（可选地）转换消息。


  ### 工作原理


  使用 Spring Boot 时，如果它检测到 JMS 和一个单一的 `ConnectionFactory`，它还会自动配置一个 `JmsTemplate`，可用于发送和转换消息。Spring
  Boot 在 `spring.jms.template` 命名空间中暴露了一些属性，可用于配置 `JmsTemplate` 实例。


  #### 使用 JmsTemplate 发送消息


  要通过 JMS 发送消息，你可以使用 `JmsTemplate` 上的 `send` 或 `sendAndConvert` 方法。让我们编写一个组件，它每秒向一个队列发送一条包含当前日期和时间的消息。参见清单
  8-7。


  ```

  @Component

  class MessageSender {

  private final JmsTemplate jms;

  MessageSender(JmsTemplate jms) {

  this.jms = jms;

  }

  @Scheduled(fixedRate = 1000)

  public void sendTime() {

  var msg = "Current Date & Time is: " + LocalDateTime.now();

  jms.convertAndSend("time-queue", msg);

  }

  }

  清单 8-7

  JMS 消息发送组件

  ```


  `JmsTemplate` 实例通过构造函数自动注入，并且由于使用了调度，我们将在一个名为 `time-queue` 的队列上获得一条包含当前日期和时间的消息。要运行此代码，你需要一个带有
  `@EnableScheduling` 注解的 `@SpringBootApplication` 类，以便 `@Scheduled` 能够被处理。参见清单 8-8。


  ```

  @SpringBootApplication

  @EnableScheduling

  public class JmsSenderApplication {

  public static void main(String[] args) {

  SpringApplication.run(JmsSenderApplication.class, args);

  }

  }

  清单 8-8

  JMS 发送器的 Spring Boot 应用程序

  ```


  现在运行这个类时，看起来似乎没有发生什么，但消息正在填充队列。我们可以编写一个集成测试来检查这段代码是否正常工作。参见清单 8-9。


  ```

  package com.apress.springboot3recipes.jms;

  import jakarta.jms.JMSException;

  import jakarta.jms.TextMessage;

  import org.junit.jupiter.api.Test;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.boot.test.context.SpringBootTest;

  import org.springframework.jms.core.JmsTemplate;

  import static org.assertj.core.api.Assertions.assertThat;

  @SpringBootTest

  class JmsSenderApplicationTest {

  @Autowired

  private JmsTemplate jms;

  @Test

  void shouldSendMessage() throws JMSException {

  var message = jms.receive("time-queue");

  assertThat(message)

  .isInstanceOf(TextMessage.class);

  assertThat(((TextMessage) message).getText())

  .startsWith("Current Date & Time is: ");

  }

  }

  清单 8-9

  Spring Boot JMS 集成测试

  ```


  这个 JUnit 测试将启动应用程序并开始发送消息。在测试中，我们使用一个 `JmsTemplate` 实例来 `receive` 一条消息，并对其进行一些断言，以检查消息是否真的被发送并且包含我们期望的内容。由于我们没有配置任何东西，测试将使用嵌入式的
  JMS 代理。运行测试时，它应该通过，因为消息会被发送和接收。要查看它是否失败，你可以从 `MessageSender` 中移除 `@Scheduled` 注解。然后测试将失败，表明没有收到消息。


  ![](img/464036_2_En_8_Figb_HTML.gif)一个灯泡图标。在编写消息传递测试时，你可能想要设置 `JmsTemplate` 的 `receive-timeout`
  属性，因为默认情况下它会无限期地等待消息到来。然而，在 500 毫秒后，你可能希望测试失败。




  #### 配置 JmsTemplate


  Spring Boot 在 `spring.jms.template` 命名空间中提供了用于配置 `JmsTemplate` 的属性（参见表 8-6）。


  表 8-6


  `JmsTemplate` 属性


  | 属性 | 描述 |

  | --- | --- |

  | `spring.jms.template.default-destination` | 设置未指定特定目标时用于发送和接收操作的默认目标。 |

  | `spring.jms.template.delivery-delay` | 设置发送消息的投递延迟。 |

  | `spring.jms.template.delivery-mode` | 设置投递模式，`persistent`（持久化）或 `non-persistent`（非持久化）。显式设置时，会将
  `qos-enabled` 设为 `true`。 |

  | `spring.jms.template.priority` | 设置发送消息时的优先级。默认值为无；显式设置时，会将 `qos-enabled` 设为 `true`。
  |

  | `spring.jms.template.qos-enabled` | 设置是否启用服务质量（QOS）。启用后，将设置消息的优先级、投递模式和存活时间。默认值为
  `false`。 |

  | `spring.jms.template.receive-timeout` | 设置接收调用的超时时间。默认值为无限期。 |

  | `spring.jms.template.time-to-live` | 设置 JMS 消息的存活时间；设置时，会将 `qos-enabled` 设为 `true`。
  |

  | `spring.jms.pub-sub-domain` | 将默认目标设置为主题或队列。默认值为 `false`，表示队列。 |


  除了这些属性之外，如果能够找到唯一的 Bean 实例，`JmsTemplate` 还会自动配置一个 `DestinationResolver` 和 `MessageConverter`。如果找不到唯一的实例，将使用默认值，即
  `DynamicDestinationResolver` 和 `SimpleMessageConverter`（参见表 8-7）。


  表 8-7


  SimpleMessageConverter 类到 JMS 消息的转换器


  | 类型 | JMS 消息类型 |

  | --- | --- |

  | `java.lang.String` | `javax.jms.TextMessage` |

  | `java.util.Map` | `javax.jms.MapMessage` |

  | `java.io.Serializable` | `javax.jms.ObjectMessage` |

  | `byte[]` | `javax.jms.BytesMessage` |


  让我们将一个 `Order` 发送到 `orders` 队列，并使用 Jackson 发送 JSON，而不是使用 Java 序列化机制。参见清单 8-10。


  ```

  package com.apress.springboot3recipes.order;

  import java.math.BigDecimal;

  public record Order (String id, BigDecimal amount) { }

  清单 8-10

  Order 类

  ```


  这就是我们要发送的 `Order` 类。为了能够生成订单，让我们创建一个 `OrderGenerator` 类，它将创建一个包含 ID 和随机金额的订单。参见清单
  8-11。


  ```

  package com.apress.springboot3recipes.order;

  import java.math.BigDecimal;

  import java.math.RoundingMode;

  import java.util.UUID;

  import java.util.concurrent.ThreadLocalRandom;

  public class OrderGenerator {

  public static Order generate() {

  var rnd = ThreadLocalRandom.current().nextDouble(1000.00);

  var amount = BigDecimal.valueOf(rnd).setScale(2, RoundingMode.HALF_EVEN);

  var id = UUID.randomUUID().toString();

  return new Order(id, amount);

  }

  }

  清单 8-11

  OrderGenerator 类

  ```


  现在我们需要一个发送者，它生成一个 `Order` 并使用 `JmsTemplate` 将其放入队列。参见清单 8-12。


  ```

  @Component

  class OrderSender {

  private final JmsTemplate jms;

  OrderSender(JmsTemplate jms) {

  this.jms = jms;

  }

  @Scheduled(fixedRate = 500)

  public void sendOrder() {

  var order = OrderGenerator.generate();

  jms.convertAndSend("orders", order);

  }

  }

  清单 8-12

  基于 JMS 的 OrderSender

  ```


  这与之前编写的 `MessageSender` 没有太大区别，但现在它会生成一个包含一些随机生成数据的 `Order`（参见 `OrderGenerator`），并将其发送到
  `orders` 队列。运行时，这实际上会失败。因为 `Order` 没有实现 `Serializable`，所以它不会被转换为 `ObjectMessage`。然而，我们想要使用
  JSON。为了实现这一点，需要一个不同的 `MessageConverter`：确切地说是 `MappingJackson2MessageConverter`。它使用
  Jackson 将对象编组和解组为 JSON。它应该作为 Bean 添加到配置中。


  首先，你需要添加依赖项以将 Jackson（或者更确切地说是 JSON 支持）添加到你的应用程序中。添加 `spring-boot-starter-json`
  以获取所需的依赖项。参见清单 8-13。


  ```

  org.springframework.boot

  spring-boot-starter-json


  清单 8-13

  Spring Boot JSON Starter 依赖项

  ```


  ![](img/464036_2_En_8_Figc_HTML.gif)一个信息图标。如果你的依赖项列表中已经有 `spring-boot-starter-web`
  或 `spring-boot-starter-webflux`，那么 `spring-boot-starter-json` 已经包含在内。


  接下来，你可以配置 `MappingJackson2MessageConverter`。参见清单 8-14。


  *   ① `typeIdPropertyName` 是一个必需属性，指示存储消息实际类型的属性名称。如果没有进一步配置，将使用类的完全限定名（FQN）。


  *   ② 这是用于给定类应使用哪个类型标识符（`typeId`）的映射。它不会发送类的 FQN，而是使用映射中的类型来标识类型。发送 `Order` 时，`content-type`
  头将包含值 `order`。


  ```

  @Bean

  public MappingJackson2MessageConverter messageConverter() {

  var converter = new MappingJackson2MessageConverter();

  converter.setTypeIdPropertyName("content_type"); ①

  converter.setTypeIdMappings(Map.of("order", Order.class)); ②

  return converter;

  }

  清单 8-14

  MessageConverter 配置

  ```


  ![](img/464036_2_En_8_Figd_HTML.gif)一个灯泡图标。通常，显式定义类型映射是一个好主意。这样，你就不会在 Java 层面上将两个或多个应用程序显式绑定在一起。它们可以使用自己的映射，将
  `order` 映射到它们自己的 `Order` 类。


  完成所有这些设置后，我们可以编写一个测试来查看订单是否确实被发送。


  ```

  package com.apress.springboot3recipes.jms;

  import com.apress.springboot3recipes.order.Order;

  import com.fasterxml.jackson.databind.ObjectMapper;

  import jakarta.jms.BytesMessage;

  import org.junit.jupiter.api.Test;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.boot.test.context.SpringBootTest;

  import org.springframework.jms.core.JmsTemplate;

  import static org.assertj.core.api.Assertions.assertThat;

  @SpringBootTest

  class JmsSenderApplicationTest {

  @Autowired

  private JmsTemplate jms;

  @Test

  void shouldReceiveOrderPlain() throws Exception {

  var message = jms.receive("orders");

  assertThat(message)

  .isInstanceOf(BytesMessage.class);

  var msg = (BytesMessage) message;

  var mapper = new ObjectMapper();

  var content = new byte[(int) msg.getBodyLength()];

  msg.readBytes(content);

  var order = mapper.readValue( content, Order.class);

  assertThat(order).hasNoNullFieldsOrProperties();

  }

  @Test

  void shouldReceiveOrderWithConversion() throws Exception {

  var order = (Order) jms.receiveAndConvert("orders");

  assertThat(order).hasNoNullFieldsOrProperties();

  }

  }

  ```


  这里有两个测试方法。第一个是手动将消息转换为 `Order`，而第二个使用 `receiveAndConvert` 方法为你完成转换。这是为了展示 `MessageConverter`
  的作用，以及它如何使你的代码更具可读性。如你所见，`MappingJackson2MessageConverter` 将 `Order` 转换为 `BytesMessages`。如果你想改用
  `TextMessage`，可以将 `targetType` 属性设置为 `TEXT`；然后你将收到一个 `TextMessage`，其有效负载是一个 JSON
  字符串。


  ## 8-3\. 使用 JMS 接收消息


  ### 问题


  你想从 JMS 目标读取消息，以便在应用程序中处理它们。


  ### 解决方案


  创建一个类，并使用 `@JmsListener` 注解方法，将其绑定到一个目标并处理传入的消息。




  ### 工作原理


  您可以创建一个 POJO，并使用 `@JmsListener` 注解其方法。Spring 会检测到该注解并为其创建一个 JMS 监听器。Spring Boot
  暴露了 `spring.jms.listener` 命名空间下的属性，用于配置这些监听器。


  #### 接收消息


  让我们创建一个服务，用于监听配方 8-2 中发送方发送的消息。参见清单 8-15。


  ```

  @Component

  class CurrentDateTimeService {

  @JmsListener(destination = "time-queue")

  public void handle(TextMessage msg) throws JMSException {

  System.out.println("[RECEIVED] - " + msg.getText());

  }

  }

  清单 8-15

  基于 JMS 的 Spring JMS 监听器

  ```


  这是一个常规类，其方法使用了 `@JmsListener` 注解，该注解至少需要一个 `destination` 属性，以便知道从何处检索消息。它接受一个 `jakarta.jms.TextMessage`
  参数，并将内容打印到控制台。`@JmsListener` 注解方法的签名具有一定的灵活性，因为它允许使用多个参数，这些参数可以是注解类型的，也可以是特定类型的（参见表
  8-8）。


  表 8-8


  允许的方法参数类型


  | 类型 | 描述 |

  | --- | --- |

  | `java.lang.String` | 仅针对 `TextMessage` 获取字符串形式的消息负载 |

  | `java.util.Map` | 仅针对 `MapMessage` 获取 Map 形式的消息负载 |

  | `byte[]` | 仅针对 `BytesMessage` 获取字节数组形式的消息负载 |

  | Serializable 对象 | 从 `ObjectMessage` 反序列化 `Object` |

  | `jakarta.jms.Message` | 获取实际的 JMS 消息 |

  | `jakarta.jms.Session` | 访问 `Session`，例如用于发送自定义回复 |

  | `@Header` 注解的元素 | 从 JMS 消息中提取一个标头 |

  | `@Headers` 注解的元素 | 仅可用于 `java.util.Map`，用于获取所有 JMS 消息标头 |

  | `org.springframework.messaging.Message` | 表示传入的 JMS 消息 |


  通过使用 `String` 作为方法参数，而不是自行处理 `jakarta.jms.Message` 配置，可以简化监听器。参见清单 8-16。


  ```

  @Component

  class CurrentDateTimeService {

  @JmsListener(destination = "time-queue")

  public void handle(String msg) {

  System.out.println("[RECEIVED] - " + msg);

  }

  }

  清单 8-16

  基于字符串的 Spring JMS 监听器

  ```


  两个应用的输出应类似于图 8-4。


  ![](img/464036_2_En_8_Fig4_HTML.jpg)


  一个基于字符串的 Spring JMS 监听器的输出。输出中包含：启动的 JMS 接收应用、未设置配置文件、已启动的 JMS 接收应用、Spring Boot，以及接收到的当前日期和时间。


  图 8-4


  JMS 接收输出


  #### 配置监听器容器


  Spring 使用 `JmsListenerContainerFactory` 来创建支持 `@JmsListener` 注解所需的基础设施。Spring Boot
  配置了一个默认工厂，可以通过 `spring.jms.listener` 命名空间下的属性进行配置。如果这还不够，您可以随时配置自己的实例并手动完成所有配置选项。当
  Spring Boot 在上下文中检测到已存在 `JmsListenerContainerFactory` 时，它将不会创建新的工厂（参见表 8-9）。


  表 8-9


  JMS 监听器属性


  | 属性 | 描述 |

  | --- | --- |

  | `spring.jms.listener.acknowledge-mode` | 设置容器的确认模式；默认为自动确认。 |

  | `spring.jms.listener.auto-startup` | 设置是否在启动时自动启动容器。默认为 `true`。 |

  | `spring.jms.listener.concurrency` | 设置最小并发消费者数。默认为 none，表示一个并发消费者（Spring 默认值）。
  |

  | `spring.jms.listener.max-concurrency` | 设置最大并发消费者数。默认为 none，表示一个并发消费者（Spring 默认值）。
  |

  | `spring.jms.receive-timeout` | 设置接收消息的超时时间；默认为一秒。 |

  | `spring.jms.pub-sub-domain` | 设置默认目标类型是主题还是队列。默认为 `false`，表示队列。 |


  默认配置的 `JmsListenerContainerFactory` 还会检测是否存在唯一的 `DestinationResolver` 和 `MessageConverter`，如果找到则使用它们；否则，将使用
  Spring 默认的 `DynamicDestinationResolver` 和 `SimpleMessageConverter`（更多信息请参见配方 8-2）。


  #### 使用自定义 MessageConverter


  如果您想通过 JMS 将对象作为 JSON 发送到下一个系统，该怎么办？您可以依赖 Java 序列化，但这通常不被推荐，因为它会导致系统紧密耦合。使用 JSON
  或 XML 来传输对象/消息是更好的方式。使用 Spring JMS，只需配置一个不同的 `MessageConverter` 即可（发送部分也请参见配方 8-2）。参见清单
  8-17。


  ```

  @Bean

  public MappingJackson2MessageConverter messageConverter() {

  var messageConverter = new MappingJackson2MessageConverter();

  messageConverter.setTypeIdPropertyName("content_type");

  messageConverter.setTypeIdMappings(singletonMap("order", Order.class));

  return messageConverter;

  }

  清单 8-17

  MessageConverter 配置

  ```


  默认情况下，`MappingJackson2MessageConverter` 需要一个属性名来存放内容类型的标识符。该标识符将从 JMS 消息的标头中读取（此处我们将其设置为
  `content_type`）。接下来，我们可以选择性地定义类型与类之间的映射。由于我们希望能够将对象映射到 `Order` 类，因此我们将其指定为内容类型 `order`
  的映射。参见清单 8-18。


  ```

  @Component

  class OrderService {

  @JmsListener(destination = "orders")

  public void handle(Order order) {

  System.out.println("[RECEIVED] - " + order);

  }

  }

  清单 8-18

  接收 Order 的 JMS 消息监听器

  ```


  监听器接收 `Order` 对象，因为 Spring JMS 会负责接收和转换消息。如果您将此监听器与配方 8-2 中的订单发送器结合使用，您将看到源源不断的订单流入（图
  8-5）。


  ![](img/464036_2_En_8_Fig5_HTML.jpg)


  一个接收订单的 JMS 消息监听器的输出。输出中包含：启动的 JMS 发送器应用（使用 Java 21.0）、未设置活动配置文件、在 2.376 秒内启动的 JMS
  发送器应用、Spring Boot，以及接收到的订单和金额。


  图 8-5


  JMS 接收输出，订单




  #### 发送回复


  有时在接收消息时，您希望返回一个答案或触发流程的另一部分。使用 Spring 消息传递，这非常简单；您只需从处理器方法中返回想要发送的内容即可。要确定响应的发送位置，可以添加一个额外的
  `@SendTo` 注解来指定目标。让我们修改示例，将 `OrderConfirmation` 发送到 `order-confirmation` 队列。请参见清单
  8-19。


  ```

  @Component

  class OrderService {

  @JmsListener(destination = "orders")

  @SendTo("order-confirmations")

  public OrderConfirmation handle(Order order) {

  System.out.println("[RECEIVED] - " + order);

  return new OrderConfirmation(order.id());

  }

  }

  清单 8-19

  发送 OrderConfirmation 的 OrderService

  ```


  `OrderService` 的配置略有变化；现在它在处理订单后会返回一个 `OrderConfirmation`。通过 `@SendTo` 注解，我们指定了将结果放入哪个目标。


  让我们为 `OrderConfirmation` 对象创建另一个监听器，以便能够看到它们的到来。请参见清单 8-20。


  ```

  @Component

  class OrderConfirmationService {

  @JmsListener(destination = "order-confirmations")

  public void handle(OrderConfirmation confirmation) {

  System.out.println("[RECEIVED] - " + confirmation);

  }

  }

  清单 8-20

  JMS OrderConfirmationService

  ```


  `OrderConfirmation` 类，以便我们知道要编组的内容。请参见清单 8-21。


  ```

  package com.apress.springboot3recipes.order;

  public record OrderConfirmation(String orderId) { }

  清单 8-21

  简单的 OrderConfirmation

  ```


