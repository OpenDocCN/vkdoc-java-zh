  ## 4-7\. 选择并配置嵌入式服务器


  ### 问题


  您希望使用 Undertow 作为嵌入式容器，而不是默认的 Reactor Netty 容器。


  ### 解决方案


  排除 Reactor Netty 运行时，并包含 Undertow 运行时。Spring Boot 会自动检测类路径上是否存在 Tomcat、Jetty、Reactor
  Netty 或 Undertow，并相应地配置容器。


  ### 工作原理


  Spring Boot 原生支持 Tomcat、Jetty、Reactor Netty 和 Undertow 作为嵌入式响应式容器。默认情况下，Spring Boot
  使用 Reactor Netty 作为容器（通过 `spring-boot-starter-webflux` 工件中的 `spring-boot-starter-reactor-netty`
  依赖项体现）。可以使用属性配置容器，其中一些属性适用于所有容器，另一些则适用于特定容器。全局属性以 `server` 或 `server.reactive` 为前缀，而容器特定的属性以
  `server.<container>` 开头（其中 `container` 是 `tomcat`、`jetty`、`netty` 或 `undertow`）。




  #### 设置通用配置属性


  有几个通用的服务器属性可用，如表 4-4 和表 4-5 所示。


