  index.title=Library

  index.books.link=List of books

  books.list.title=Available Books

  books.list.table.title=Title

  books.list.table.author=Author

  books.list.table.isbn=ISBN

  清单 3-25

  默认消息

  ```


  现在更改模板以使用翻译。请参见清单 3-26。


