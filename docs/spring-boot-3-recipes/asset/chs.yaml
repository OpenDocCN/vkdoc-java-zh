  您会注意到 JMX 暴露的端点比 HTTP 多。默认情况下，HTTP 仅暴露 `/actuator/health` 和 `/actuator/info`。这是出于安全考虑。`/actuator`
  是公开暴露的，因此您不希望所有人都能看到这些信息。您可以通过 `management.endpoints.web.exposure.include` 和 `management.endpoints.web.exposure.exclude`
  属性来配置要暴露的内容。在 include 中使用 `*` 将向 Web 暴露所有端点。请参见清单 9-2。


  ```

  management.endpoints.web.exposure.include=*

