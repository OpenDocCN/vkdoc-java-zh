  | `management.endpoint.configprops.show-values``management.endpoint.env.show-values``management.endpoint.quartz.show-values`
  | 设置何时显示端点的未脱敏值；默认值为 `never`。可更改为 `always` 或 `when_authorized`。 |

  | `management.endpoint.configprops.roles``management.endpoint.env.roles``management.endpoint.health.roles``management.endpoint.quartz.roles`
  | 设置允许查看详细信息的角色（与 `show-details`/`show-values` 的 `when_authorized` 值配合使用）。 |


