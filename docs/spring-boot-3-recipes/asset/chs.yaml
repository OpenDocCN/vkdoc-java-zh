  #### 启用并使用问题详情


  Spring 6 增加了对 HTTP API 问题详情（RFC-7807）的支持，并且在 Spring Boot 中启用它非常容易。通过添加 `spring.mvc.problemdetails.enabled=true`（或对于基于
  WebFlux 的应用程序添加 `spring.webflux.problemdetails.enabled=true`），即可启用此支持。


  启用后，Spring Boot 会以更高的优先级注册 `ProblemDetailsExceptionHandler` 作为额外的 `ExceptionHandler`。`ProblemDetailsExceptionHandler`
  将处理一些众所周知的异常（所有与 Spring 相关的 Web 异常），并返回包含更多信息的结果，包括类型 `application/problem+json`（见图
  3-12）。


