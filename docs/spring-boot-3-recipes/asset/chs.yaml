  `LibraryApplication` 将检测所有类并启动服务器。启动时，它会预先注册三本书，以便我们的图书馆中有一些数据。


  为了将 `Book` 暴露为 REST 资源，创建一个名为 `BookController` 的类，并使用 `@RestController` 注解。Spring
  Boot 将检测到这个类并创建其实例。使用 `@RequestMapping`（以及 `@GetMapping` 和 `@PostMapping`），你可以编写方法来处理传入的请求。


  ![](img/464036_2_En_3_Figb_HTML.gif)一个信息图标，圆圈内包含字母 i。 你可以使用 `@Controller` 并在每个请求处理方法上添加
  `@ResponseBody`，来代替 `@RestController`。使用 `@RestController` 会隐式地将 `@ResponseBody`
  添加到请求处理方法上。


  ```

  package com.apress.springboot3recipes.library.rest;

  import com.apress.springboot3recipes.library.Book;

  import com.apress.springboot3recipes.library.BookService;

  import org.springframework.http.ResponseEntity;

  import org.springframework.web.bind.annotation.*;

  import org.springframework.web.util.UriComponentsBuilder;

  @RestController

  @RequestMapping("/books")

  public class BookController {

  private final BookService bookService;

  public BookController(BookService bookService) {

  this.bookService = bookService;

  }

  @GetMapping

  public Iterable<Book> all() {

  return bookService.findAll();

  }

  @GetMapping("/{isbn}")

  public ResponseEntity<Book> get(@PathVariable("isbn") String isbn) {

  return ResponseEntity.of(bookService.find(isbn));

  }

  @PostMapping

  public ResponseEntity<Book> create(@RequestBody Book book,

  UriComponentsBuilder uriBuilder) {

  var created = bookService.create(book);

  var newBookUri = uriBuilder.path("/books/{isbn}").build(created.isbn());

  return ResponseEntity.created(newBookUri).body(created);

  }

  }

  ```


  由于类上使用了 `@RequestMapping("/books")` 注解，控制器将被映射到 `/books` 路径。`list` 方法将在对 `/books`
  的 GET 请求时被调用。当使用 GET 请求调用 `/books/979-8-8688-0112-9` 时，`get` 方法将被调用，并返回单本书的结果，如果找不到书，则返回
  404 响应状态。最后，你可以使用 POST 请求向 `/books` 添加图书。此时 `create` 方法将被调用，传入请求的正文将被转换为图书对象。


