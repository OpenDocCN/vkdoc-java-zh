  #### 使其更具响应性


  当运行应用程序并打开页面时，您需要等待一段时间页面才开始渲染。当渲染页面且模型包含 `Flux` 时，默认情况下会等待整个 `Flux` 被消费完毕。之后，它才会开始渲染页面。其行为基本上就像您检索的是
  `Collection` 而不是 `Flux`。为了更快地开始渲染页面并实现页面流式传输，请将 `Flux` 包装在 `ReactiveDataDriverContextVariable`
  中。参见清单 4-14。


  ```

  @GetMapping("/books.html")

  public String all(Model model) {

  var books = new ReactiveDataDriverContextVariable(bookService.findAll(), 5);

  model.addAttribute("books", books);

  return "books/list";

  }

  清单 4-14

  使用 ReactiveDataDriverContextVariable 的方法

  ```


  `all` 方法看起来相同，但请注意 `Flux` 被包装在了 `ReactiveDataDriverContextVariable` 中。这将在接收到五个元素后立即开始渲染，并持续渲染页面直到接收到所有元素。现在，当打开图书页面时，您将看到表格逐渐增长，直到所有订单都被读取完毕。


  ## 4-4\. 使用 Spring WebFlux 处理异常


  ### 问题


  您希望为 Spring WebFlux 配置异常处理，并根据您的需求进行配置。


  ### 解决方案


  Spring WebFlux 提供了几种处理异常的方式，并且使用 Spring Boot 可以很容易地修改默认行为。


  对于与视图相关的实现，可以轻松添加能被自动识别的页面。添加 `error.html` 作为自定义错误页面，或者为特定的 HTTP 错误代码添加特定的错误页面，例如
  `404.html` 和 `500.html`。


  Spring Boot 也支持基于 REST 的控制器的异常处理。它将返回一个包含错误信息的响应，这与常规 WebFlux 异常处理中可用的错误信息非常相似。另一种选择是启用问题详情支持（RFC-7807），这是一个用于定义错误响应的小型标准。要启用它，请将
  `spring.webflux.problemdetails.enabled` 属性设置为 `true`。


  ### 工作原理


  现在我们来解释其工作原理。




  #### 处理 REST 控制器的异常


  编写一个自定义的`ErrorAttributes`属性来替换默认属性（图 4-4），并填充作为响应写入的模型。


  ![](img/464036_2_En_4_Fig4_HTML.jpg)


  Marten 窗口截图。当尝试访问端点`books/500`时，HTTP 响应显示 500 内部服务器错误。响应中包含包含错误详情的 JSON 数据，包括错误消息、路径、请求
  ID、状态码和时间戳。


  图 4-4

  默认错误响应


  默认情况下，Spring Boot 会在错误响应的模型中包含表 4-2 中所示的属性。


  表 4-2

  默认错误模型属性


  | **属性** | **描述** |

  | --- | --- |

  | `timestamp` | 提取错误的时间 |

  | `status` | 状态码 |

  | `error` | 错误原因 |

  | `exception` | 根异常的类名（如果已配置） |

  | `message` | 异常消息 |

  | `errors` | 来自`BindingResult`的任何错误（使用绑定和/或验证时） |

  | `trace` | 异常堆栈跟踪（如果已配置） |

  | `path` | 引发异常时的 URL 路径 |


  这一切都是通过使用`ErrorAttributes`组件完成的。默认实现是`DefaultErrorAttributes`。你可以创建自己的`ErrorAttributes`处理器来创建自定义模型，或扩展`DefaultErrorAttributes`以添加额外属性。参见清单
  4-20。


  ```

  package com.apress.springboot3recipes.library;

  import org.springframework.boot.web.error.ErrorAttributeOptions;

  import org.springframework.boot.web.reactive.error.DefaultErrorAttributes;

  import org.springframework.web.reactive.function.server.ServerRequest;

  import java.util.Map;

  public class CustomizedErrorAttributes extends DefaultErrorAttributes {

  @Override

  public Map getErrorAttributes(ServerRequest req,

  ErrorAttributeOptions options) {

  var errorAttributes = super.getErrorAttributes(req, options);

  errorAttributes.put("parameters", req.exchange().getRequest().getQueryParams());

  return errorAttributes;

  }

  }

  清单 4-20

  自定义 ErrorAttributes 实现

  ```


  `CustomizedErrorAttributes`会将原始请求参数添加到默认属性旁边的模型中。下一步是将其配置为一个 Bean，以便 Spring Boot
  能够检测到它并使用它，而不是配置默认实现。将清单 4-21 中的 Bean 定义添加到`LibraryApplication`中即可实现。


  ```

  @Bean

  public CustomizedErrorAttributes errorAttributes() {

  return new CustomizedErrorAttributes();

  }

  清单 4-21

  自定义 ErrorAttributes Bean 定义

  ```


  这将生成图 4-5 中的错误；注意额外的`parameters`属性。


  ![](img/464036_2_En_4_Fig5_HTML.jpg)


  Marten 窗口截图。当尝试访问端点`books/500`时，HTTP 响应显示 500 内部服务器错误。响应中包含包含错误详情的 JSON 数据，例如错误消息、参数、路径、请求
  ID、状态码和错误发生的时间戳。


  图 4-5

  自定义错误响应


  #### 启用并使用问题详情


  Spring 6 增加了对 HTTP API 问题详情（RFC-7807）的支持，并且在 Spring Boot 中启用它非常容易。通过添加`spring.webflux.problemdetails.enabled=true`（对于基于
  MVC 的应用程序则为`spring.mvc.problemdetails.enabled=true`），即可启用此支持。


  启用后，Spring Boot 会以更高优先级注册`ProblemDetailsExceptionHandler`作为额外的`ExceptionHandler`。`ProblemDetailsExceptionHandler`会处理一些已知的异常（所有与
  Spring 相关的 Web 异常），并返回包含更多信息且类型为`application/problem+json`的结果。参见图 4-6。


  ![](img/464036_2_En_4_Fig6_HTML.jpg)


  共享响应式窗口截图。它显示了一段 Spring Boot 程序代码，该代码注册了问题详情异常处理器，并返回一个包含类型`application/json`的内部服务器错误结果。


  图 4-6

  问题详情错误响应


  图 4-6 显示了在启用问题详情支持后调用`http://localhost:8080/books/500`的结果。


  这适用于所有不同的 Spring MVC 异常。当发生验证或绑定错误时，它还会显示一个包含失败字段及其错误的列表。它甚至（如果可能）会将这些错误消息翻译成客户端使用的语言（有关
  I18N 支持，另请参见技巧 4-5 和 4-6）。


  ## 4-5. 实现国际化（I18N）


  ### 问题


  在开发国际化 Web 应用程序时，你需要以用户偏好的区域设置显示网页。你不想为不同的区域设置创建同一页面的不同版本。


  ### 解决方案


  为了避免为不同区域设置创建页面的不同版本，你应该通过外部化区域设置敏感的文本消息来使网页独立于区域设置。Spring 能够通过使用消息源（必须实现`MessageSource`接口）为你解析文本消息。在你的页面模板中，你可以使用特殊标签或查找消息。




  ### 工作原理


  当 Spring Boot 在 `src/main/resources`（默认位置）中找到 `messages.properties` 文件时，它会自动配置一个
  `MessageSource`。该 `messages.properties` 文件包含了应用程序中要使用的默认消息。Spring Boot 会使用请求中的 `Accept-Language`
  头部信息来确定当前请求应使用哪个区域设置（关于如何更改此行为，请参见配方 4-6）。


  一些属性会改变 `MessageSource` 对缺失翻译、缓存等情况的行为。有关这些属性的概述，请参见表 4-3。


  表 4-3


  国际化属性


  | **属性** | **描述** |

  | --- | --- |

  | `spring.messages.basename` | 以逗号分隔的基础名称列表；默认值为 `messages`。 |

  | `spring.messages.encoding` | 消息包的编码；默认值为 `UTF-8`。 |

  | `spring.messages.always-use-message-format` | 设置是否应将 `MessageFormat` 应用于所有消息；默认值为
  `false`。 |

  | `spring.messages.fallback-to-system-locale` | 当找不到检测到的区域设置的资源包时，回退到系统区域设置。禁用时，将从默认文件加载默认值。默认值为
  `true`。 |

  | `spring.messages.use-code-as-default-message` | 当找不到消息时，使用消息代码作为默认消息，而不是抛出 `NoSuchMessageException`。默认值为
  `false`。 |

  | `spring.messages.cache-duration` | 缓存持续时间；默认值为永久。 |


  ![](img/464036_2_En_4_Figc_HTML.gif)一个灯泡图标。 将应用程序部署到云或其他外部托管平台时，将 `spring.messages.fallback-to-system-locale`
  设置为 `false` 可能会很有用。这样，你就可以控制应用程序的默认语言，而不是由你无法控制的部署环境来决定。


  将 `messages.properties` 文件添加到 `src/main/resources` 目录中。请参见清单 4-22。


  ```

