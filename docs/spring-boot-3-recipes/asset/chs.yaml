  1-8 所示。根据你选择使用的依赖项，输出可能会有所不同（例如启动 Tomcat 服务器、初始化 H2 数据库等）。


  ![](img/464036_2_En_1_Fig8_HTML.jpg)


  一张包含 JAR 文件的输出窗口截图。


  图 1-8


  运行 JAR 文件的控制台输出


  ## 总结


  在本章中，你了解了如何使用 Spring Boot 启动你的开发。我们研究了如何使用 Maven 和 Gradle 入门，最后我们研究了如何使用 Spring
  Initializr 入门。


  在下一章中，我们将研究 Spring Boot 应用程序的基本配置，如何定义 bean，如何使用属性文件，以及如何覆盖属性。


