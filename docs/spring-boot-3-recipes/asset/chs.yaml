  #### 配置管理服务器


  默认情况下，Spring Boot Actuator 与常规应用使用相同的端口和地址（`http://localhost:8080`）。然而，通常的做法是在不同的端口上运行管理端点。您可以通过
  `management.server` 命名空间下的属性进行配置。大多数属性与常规 `server` 命名空间中的属性类似（见表 9-1）。


  表 9-1


  管理服务器属性


  | 属性 | 描述 |

  | --- | --- |

  | `management.server.add-application-context-header` | 向响应中添加一个 `X-Application-Context`
  头，包含应用上下文名称 |

  | `management.server.port` | 设置管理服务器运行的端口；默认与 `server.port` 相同 |

  | `management.server.address` | 设置要绑定的网络地址；默认与 `server.address` 相同（即 `0.0.0.0` 或所有地址）
  |

  | `management.server.base-path` | 设置管理端点的基础路径；默认是 `/`，这需要设置一个端口 |

  | `management.server.ssl.*` | 设置 SSL 属性，为管理服务器配置 SSL |


  将清单 9-3 添加到 `application.properties` 文件中，这将在单独的端口上运行管理端点，并添加 `X-Application-Context`
  头。


  ```

  management.server.add-application-context-header=true

  management.server.port=8090

  清单 9-3

  管理服务器属性

  ```


  重新启动应用后，管理端点现在可通过 `http://localhost:8090/actuator` 访问。在不同的端口上运行 Spring Boot Actuator
  的好处是，可以通过在防火墙上阻止该端口并仅允许本地访问，从而将其对公共互联网隐藏。


  ![](img/464036_2_En_9_Figa_HTML.gif)信息图标。 `management.server` 属性仅在使用嵌入式服务器时有效。当部署到外部服务器时，这些属性不再适用！




  #### 配置单个管理端点


  可以通过 `management.endpoint.<端点名称>` 命名空间中的属性来配置单个端点。大多数端点至少包含一个 `enabled` 属性和一个 `cache.time-to-live`
  属性。前者用于启用或禁用端点，后者则指定端点结果的缓存时长（参见表 9-2）。


  表 9-2


  端点配置属性


  | 属性 | 描述 |

  | --- | --- |

  | `management.endpoint.<端点名称>.enabled` | 设置特定端点是否启用；通常默认为 `true`，有时取决于某项功能的可用性。例如，如果
  Flyway 不存在，那么启用 `flyway` 端点将不会产生任何效果。 |

  | `management.endpoint.<端点名称>.cache.time-to-live` | 设置响应的缓存时间；默认值为 0ms，表示不缓存。 |

  | `management.endpoint.health.show-details` | 设置是否显示健康端点的详细信息；默认值为 `never`，可更改为
