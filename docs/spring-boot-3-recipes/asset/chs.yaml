- '# 7. Java 企业级服务


  在本章中，你将学习 Spring Boot 对最常见 Java 企业级服务的支持：使用 Java 管理扩展（JMX）、通过 Jakarta Mail 发送电子邮件以及任务调度。


  JMX 是 Java SE 的一部分，是一种用于管理和监控系统资源（如设备、应用程序、对象和服务驱动型网络）的技术。这些资源以托管 Bean（MBean）的形式表示。Spring
  通过将任意 Bean 导出为模型 MBean 来支持 JMX，而无需针对 JMX API 进行编程。


  Jakarta Mail 是 Java 中用于发送电子邮件的标准 API 和实现。Spring 进一步提供了一个抽象层，以独立于实现的方式发送电子邮件，并且 Spring
  Boot 在检测到时会自动添加配置。


  在 Java 平台上进行任务调度主要有两种选择：JDK Timer 和 Quartz Scheduler。JDK Timer 提供了与 JDK 捆绑的简单任务调度功能。与
  JDK Timer 相比，Quartz 提供了更强大的作业调度功能。对于这两种选择，Spring 都提供了工具类，用于在 Bean 配置文件中配置调度任务，而无需直接使用任一
  API。


  我们还将介绍如何使用 Java Flight Recorder 以及 Micrometer API 来深入了解应用程序的行为和使用情况。


  ## 7-1. 配置 Spring 异步处理


  ### 问题


  你想要异步调用一个包含长时间运行方法的方法。


  ### 解决方案


  Spring 支持配置 `TaskExecutor`，并能够异步执行带有 `@Async` 注解的方法。这可以以一种透明的方式完成，无需进行异步执行的常规设置。然而，Spring
  Boot 不会自动检测异步方法执行的需求。必须使用 `@EnableAsync` 配置注解来启用此支持。


  ### 工作原理


  让我们编写一个组件，以异步方式向控制台打印一些内容。参见清单 7-1。


  ```

  package com.apress.springboot3recipes.scheduling;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import org.springframework.scheduling.annotation.Async;

  import org.springframework.stereotype.Component;

  @Component

  public class HelloWorldService {

  private final Logger logger = LoggerFactory.getLogger(getClass());

  @Async

  public void printMessage() {

  try {

  Thread.sleep(500);

  } catch (InterruptedException ex) {

  Thread.currentThread().interrupt();

  }

  logger.info("Hello World, from Spring Boot 3!");

  }

  }

  清单 7-1

  简单的 HelloWorldService

  ```


  该类将等待 500 毫秒，然后向日志记录器打印内容。方法上的 `@Async` 注解表明该方法将以异步方式执行。但是，必须为 Spring Boot 应用程序显式启用此支持。


  要启用异步处理，需要使用 `@EnableAsync` 配置注解。最简单的解决方案是将此注解添加到你的应用程序类中。参见清单 7-2。


  ```

  package com.apress.springboot3recipes.scheduling;

  import org.springframework.boot.ApplicationRunner;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  import org.springframework.scheduling.annotation.EnableAsync;

  import java.io.IOException;

  @SpringBootApplication

  @EnableAsync

  public class ThreadingApplication {

  public static void main(String[] args) throws IOException {

  SpringApplication.run(ThreadingApplication.class, args);

  System.out.println("Press [ENTER] to quit:");

  System.in.read();

  }

  @Bean

  public ApplicationRunner startupRunner(HelloWorldService hello) {

  return (args) -> hello.printMessage();

  }

  }

  清单 7-2

  启用异步处理的 Spring Boot 应用程序

  ```


  `@EnableAsync` 注解会注册异步执行方法所需的组件，以及检测带有 `@Async` 注解的方法。如果未显式配置，Spring Boot 将添加一个
  `TaskExecutor`。


  ![](img/464036_2_En_7_Figa_HTML.gif)抽象符号表示信息。 `System.in.read` 在此处用于防止应用程序关闭，以便后台任务能够完成处理。当你按下
  Enter 键时，程序将退出。通常在开发 Web 应用程序时，你不需要这样的东西。


  运行应用程序时，输出将类似于图 7-1。


  ![](img/464036_2_En_7_Fig1_HTML.jpg)


  一组代码。它展示了一个没有设置活动配置文件的线程应用程序，并且使用 Enter 键退出程序。


  图 7-1


  异步执行输出




  #### 配置 TaskExecutor


  默认情况下，Spring Boot 会使用 `ThreadPoolTaskExecutor` 来运行异步任务。这可以通过 `spring.task.execution`
  命名空间下的属性进行配置（见表 7-1），除非 `spring.threads.virtual.enabled` 被设置为 `true`，在这种情况下，它将使用一个配置为创建虚拟线程（在
  Java 21 中可用）的 `SimpleAsyncTaskExecutor`。


  表 7-1


  任务属性


  | 属性 | 描述 |

  | --- | --- |

  | `spring.task.execution.thread-name-prefix` | 设置线程的前缀；默认值为 `task-`。 |

  | `spring.task.execution.pool.core-size` | 设置要创建的默认线程数；默认值为 8。 |

  | `spring.task.execution.pool.max-size` | 设置要创建的最大线程数；默认值为 `Integer.MAX_VALUE`。
  |

  | `spring.task.execution.pool.allow-core-thread-timeout` | 允许核心线程超时；启用线程池的扩容和缩容。默认值为
  `true`。 |

  | `spring.task.execution.pool.keep-alive` | 设置线程在被终止前的空闲时间限制。默认值为 60 秒。 |

  | `spring.task.execution.pool.queue-capacity` | 设置任务队列容量。默认值为 `Integer.MAX_VALUE`。仅当队列达到其容量时，才会创建新线程。使用无界队列将有效地忽略
  `max-size` 属性。 |

  | `spring.task.execution.shutdown.await-termination` | 设置任务执行器是否应在关闭时等待任务完成；默认值为
  `false`。 |

  | `spring.task.execution.shutdown.await-termination-period` | 设置等待任务完成的时间。 |

  | `spring.threads.virtual.enabled` | 设置我们是使用虚拟线程还是平台线程。默认值为 `false`。 |


  这些属性可用于配置由 Spring Boot 管理的 `TaskExecutor`。如图 7-1 所示，默认线程名称以 `task-` 为前缀，因为这是默认值。让我们在
  `application.properties` 文件中添加 `spring.task.execution.thread-name-prefix` 属性，其值为
  `sb3r-exec-`。当同时配置 `spring.task.execution.shutdown.await-termination` 时，我们可以移除 `System.in.read()`，因为现在
  Spring Boot 会等待任务完成。参见清单 7-3。


  ```

  spring.task.execution.thread-name-prefix=sb3r-exec-

  spring.task.execution.shutdown.await-termination=true

  spring.task.execution.shutdown.await-termination-period=45S

  清单 7-3

  Spring 任务应用属性

  ```


  设置好属性后，您可以看到线程名称已更改为 `sb3r-exec-1`，如图 7-2 所示。


  ![](img/464036_2_En_7_Fig2_HTML.jpg)


  一组代码。它展示了线程应用程序，并且线程名称已更改为 s b 3 r hyphen exec hyphen 1。


  图 7-2


  异步执行输出


  如果由于某种原因，您的应用程序中存在多个 `TaskExecutor` 实例，您需要将其中一个标记为 `@Primary` 以用作默认的 `TaskExecutor`，或者使用
  `AsyncConfigurer` 接口并实现 `taskExecutor` 方法来返回要使用的 `TaskExecutor`。参见清单 7-4。


  ```

  package com.apress.springboot3recipes.scheduling;

  import org.springframework.boot.ApplicationRunner;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  import org.springframework.core.task.VirtualThreadTaskExecutor;

  import org.springframework.scheduling.annotation.AsyncConfigurer;

  import org.springframework.scheduling.annotation.EnableAsync;

  import java.io.IOException;

  import java.util.concurrent.Executor;

  @SpringBootApplication

  @EnableAsync

  public class ThreadingApplication implements AsyncConfigurer {

  public static void main(String[] args) throws IOException {

  SpringApplication.run(ThreadingApplication.class, args);

  System.out.println("Press [ENTER] to quit:");

  System.in.read();

  }

  @Bean

  public VirtualThreadTaskExecutor taskExecutor() {

  return new VirtualThreadTaskExecutor();

  }

  @Override

  public Executor getAsyncExecutor() {

  return taskExecutor();

  }

  @Bean

  public ApplicationRunner startupRunner(HelloWorld hello) {

  return (args) -> hello.printMessage();

  }

  }

  清单 7-4

  使用 AsyncConfigurer 显式配置的执行器

  ```


  ## 7-2\. 配置 Spring 任务调度


  ### 问题


  您希望以一致的方式调度方法调用，可以使用 cron 表达式、固定间隔或固定速率。


  ### 解决方案


  Spring 支持配置 `TaskExecutor` 和 `TaskScheduler`。此功能与使用 `@Scheduled` 注解调度方法执行的能力相结合，使得
  Spring 的调度支持以最少的麻烦工作：您所需要的只是一个方法和一个注解，并且需要开启注解扫描器。Spring Boot 不会自动检测调度的需求，因此您需要使用
  `@EnableScheduling` 注解自行启用它。




  ### 工作原理


  让我们编写一个组件，每隔四秒向日志打印一条消息。创建一个 Java 类，并在方法上使用 `@Scheduled` 注解来指示该方法需要被调用。当使用 `fixedRate=4000`
  作为参数时，它将每四秒运行一次。如果你想使用 cron 表达式，可以在 `@Scheduled` 注解上设置 `cron` 属性。


  ```

  package com.apress.springboot3recipes.scheduling;

  import org.slf4j.Logger;

  import org.slf4j.LoggerFactory;

  import org.springframework.boot.SpringBootVersion;

  import org.springframework.scheduling.annotation.Scheduled;

  import org.springframework.stereotype.Component;

  @Component

  public class HelloWorld {

  private static final Logger logger = LoggerFactory.getLogger(HelloWorld.class);

  @Scheduled(fixedRate = 4000L)

  public void printMessage() {

  logger.info("Hello World, from Spring Boot {}", SpringBootVersion.getVersion());

  }

  }

  ```


  `@Component` 注解将确保它被 Spring Boot 检测到。


  接下来要做的是为你的应用程序启用调度功能。最简单的解决方案是在应用程序类上添加 `@EnableScheduling` 注解。当然，你也可以将其放在其他带有 `@Configuration`
  注解的类上。


  ```

  package com.apress.springboot3recipes.scheduling;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.scheduling.annotation.EnableScheduling;

  @SpringBootApplication

  @EnableScheduling

  public class SchedulingApplication {

  public static void main(String[] args) {

  SpringApplication.run(SchedulingApplication.class, args);

  }

  }

  ```


  `@EnableScheduling` 注解将启用对 `@Scheduled` 注解方法的检测，并注册一个 `TaskScheduler` 用于调度任务。当在应用程序上下文中检测到单个
  `TaskScheduler` 时，它将使用该调度器，而不是创建一个新的。


  运行 `SchedulingApplication` 将在大约每四秒在日志中输出一次结果（图 7-3）。


  ![](img/464036_2_En_7_Fig3_HTML.jpg)


  一组代码。其中展示了带有 `@Scheduled` 注解的方法以及使用调度应用程序的任务调度器。


  图 7-3


  调度执行输出


  除了使用 `@Scheduled` 注解，你也可以使用 Java 来调度一个方法。如果你无法在你想要定期执行的方法上放置 `@Scheduled` 注解，或者只是想减少注解的数量，你可能会这样做。为此，你可以使用
  `SchedulingConfigurer`，它有一个用于配置额外任务的单一回调方法。


  ```

  package com.apress.springboot3recipes.scheduling;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.scheduling.annotation.EnableScheduling;

  import org.springframework.scheduling.annotation.SchedulingConfigurer;

  import org.springframework.scheduling.config.ScheduledTaskRegistrar;

  import java.time.Duration;

  @SpringBootApplication

  @EnableScheduling

  public class SchedulingApplication implements SchedulingConfigurer {

  @Autowired

  private HelloWorld helloWorld;

  public static void main(String[] args) {

  SpringApplication.run(SchedulingApplication.class, args);

  }

  @Override

  public void configureTasks(ScheduledTaskRegistrar taskRegistrar) {

  taskRegistrar.addFixedRateTask(

  () -> helloWorld.printMessage(), Duration.ofSeconds(4));

  }

  }

  ```


  此应用程序的输出与图 7-3 中所示相同。


  ## 7-3\. 发送电子邮件


  当在类路径上检测到邮件属性和 Java 邮件库时，Spring Boot 将自动配置发送邮件的能力。在本节中，我们将了解如何设置属性以及如何使用 Spring
  Boot 发送电子邮件。


  ### 问题


  你想使用标准的 Jakarta Mail API 从 Spring Boot 应用程序发送电子邮件。


  ### 解决方案


  Spring 的邮件支持通过提供一个抽象且与实现无关的 API 来发送电子邮件，从而简化了邮件发送过程。Spring 邮件支持的核心接口是 `MailSender`。`JavaMailSender`
  接口是 `MailSender` 的子接口，它包含了专门的 JavaMail 特性，例如多用途互联网邮件扩展（MIME）支持。要发送包含 HTML 内容、内嵌图片或附件的电子邮件，你必须将其作为
  MIME 消息发送。当在类路径上找到 `jakarta.mail` 类并且设置了相应的 `spring.mail` 属性时，Spring Boot 将自动配置
  `JavaMailSender`。


  ### 工作原理


  首先要做的是将 `spring-boot-starter-mail` 依赖项添加到你的依赖项列表中。这会将必要的 `jakarta.mail` 以及 `spring-context`
  依赖项添加到类路径中。


  ```

  org.springframework.boot

  spring-boot-starter-mail


  ```


  #### 配置 JavaMailSender


  为了能够发送邮件，你需要配置相应的 `spring.mail` 属性；请参见表 7-2。`spring.mail.host` 属性是必需的；其他属性是可选的。


  表 7-2


  邮件属性


  | 属性 | 描述 |

  | --- | --- |

  | `spring.mail.host` | SMTP 服务器主机 |

  | `spring.mail.port` | SMTP 服务器端口（默认 25） |

  | `spring.mail.username` | 用于连接 SMTP 服务器的用户名 |

  | `spring.mail.password` | 用于连接 SMTP 服务器的密码 |

  | `spring.mail.protocol` | SMTP 服务器使用的协议（默认 `smtp`） |

  | `spring.mail.test-connection` | 在启动时测试 SMTP 服务器是否可用（默认 `false`） |

  | `spring.mail.default-encoding` | MIME 消息使用的编码（默认 `UTF-8`） |

  | `spring.mail.properties` | 要在 JavaMail Session 上设置的附加属性 |

  | `spring.mail.jndi-name` | JavaMail Session 的 JNDI 名称；当部署到具有预配置 JavaMail Session
  的 JEE 服务器时可以使用 |


  接下来，你至少需要定义 `spring.mail.host` 属性才能发送邮件。


  ```

  spring.mail.host=localhost

  spring.mail.port=3025

  ```


  ![](img/464036_2_En_7_Figb_HTML.gif)一个抽象图形展示了信息符号。 本节的代码使用 GreenMail 作为 SMTP 服务器。可以使用
  `bin` 目录中的 `smtp.sh` 脚本来运行配置好的实例。默认情况下，它会在端口 3025 上暴露一个 SMTP 服务器。




  #### 发送纯文本邮件


  添加了相关依赖和 `spring.mail` 属性后，Spring Boot 会将一个预配置的 `JavaMailSenderImpl` 作为 Bean 添加到
  `ApplicationContext` 中。该 Bean 可以通过 `@Autowired` 字段、构造函数，或者像此处所示，在 `@Bean` 注解的方法中通过依赖注入的方式，自动装配到组件中。参见清单
  7-5。


  ```

  package com.apress.springboot3recipes.mailsender;

  import org.springframework.boot.ApplicationRunner;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  import org.springframework.mail.javamail.JavaMailSender;

  import org.springframework.mail.javamail.MimeMessageHelper;

  @SpringBootApplication

  public class MailSenderApplication {

  public static void main(String[] args) {

  SpringApplication.run(MailSenderApplication.class, args);

  }

  @Bean

  public ApplicationRunner startupMailSender(JavaMailSender mailSender) {

  return (args) -> mailSender.send((msg) -> {

  var helper = new MimeMessageHelper(msg);

  helper.setTo("recipient@some.where");

  helper.setFrom("spring-boot-3-recipes@apress.com");

  helper.setSubject("Status message");

  helper.setText("All is well.");

  });

  }

  }

  清单 7-5

  发送邮件的 SpringBootApplication

  ```


