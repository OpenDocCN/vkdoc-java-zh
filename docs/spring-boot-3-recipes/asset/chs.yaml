  # 4. WebFlux


  Spring WebFlux 是 Spring 包含的一个响应式 Web 框架。它支持完全非阻塞，并支持响应式流背压。它可以在 Netty、Undertow 或
  Servlet 容器等服务器上运行。当检测到此类服务器时，Spring Boot 会自动为您配置该服务器。


  ## 4-1. 使用 Spring WebFlux 开发响应式应用程序


  ### 问题


  您希望使用 Spring WebFlux 开发一个简单的响应式 Web 应用程序，以学习该框架的基本概念和配置。


  ### 解决方案


  Spring WebFlux 的最低层组件是 `org.springframework.http.server.reactive.HttpHandler`。`HttpHandler`
  接口有一个单一的 `handle` 方法。参见清单 4-1。


  ```

  public interface HttpHandler {

  Mono handle(ServerHttpRequest request, ServerHttpResponse response);

  }

  清单 4-1

  HttpHandler 接口

  ```


  `handle` 方法返回 `Mono<Void>`，这是返回 `void` 的响应式表达方式。它接受 `ServerHttpRequest` 接口和 `ServerHttpResponse`
  接口，两者均来自 `org.springframework.http.server.reactive` 包。根据所使用的容器，会创建相应的实现。为此，存在多个用于容器的适配器或桥接器。当在
  Servlet 5.0 容器（支持非阻塞 I/O）上运行时，会使用 `ServletHttpHandlerAdapter`（或其子类之一）来从纯 Servlet
  世界适配到响应式世界。当在 Netty 等原生响应式引擎上运行时，则使用 `ReactorHttpHandlerAdapter`。


  当 Web 请求发送到 Spring WebFlux 应用程序时，`HandlerAdapter` 首先接收该请求。然后，它会组织在 Spring 应用程序上下文中配置的、处理该请求所需的各种组件。


  要在 Spring WebFlux 中定义控制器类，必须使用 `@Controller` 或 `@RestController` 注解标记该类（与 Spring
  MVC 相同；参见第 3 章）。


  当带有 `@Controller` 注解的类（即控制器类）接收到请求时，它会查找适当的处理程序方法来处理该请求。这要求控制器类通过一个或多个处理程序映射将每个请求映射到处理程序方法。为此，控制器类的方法会使用
  `@RequestMapping` 注解进行修饰，使其成为处理程序方法。


  这些处理程序方法的签名——正如您对任何标准类所期望的那样——是开放式的。您可以为处理程序方法指定任意名称，并定义各种方法参数。同样，处理程序方法可以返回一系列值中的任何一个（例如
  `String` 或 `void`），具体取决于其实现的应用程序逻辑。以下仅是有效参数类型的部分列表，旨在让您有所了解：


  *   `ServerHttpRequest` 或 `ServerHttpResponse`

  *   来自 URL 的任意类型的请求参数，使用 `@RequestParam` 注解

  *   任意类型的模型属性，使用 `@ModelAttribute` 注解

  *   传入请求中包含的 Cookie 值，使用 `@CookieValue` 注解

  *   任意类型的请求头值，使用 `@RequestHeader` 注解

  *   任意类型的请求属性，使用 `@RequestAttribute` 注解

  *   `Map` 或 `ModelMap`，用于处理程序方法向模型添加属性

  *   `Errors` 或 `BindingResult`，用于处理程序方法访问命令对象的绑定和验证结果

  *   `WebSession`，用于会话


  一旦控制器类选择了适当的处理程序方法，它就会使用请求调用该处理程序方法的逻辑。通常，控制器的逻辑会调用后端服务来处理请求。此外，处理程序方法的逻辑可能会从众多输入参数（例如
  `ServerHttpRequest`、`Map` 或 `Errors`）中添加或删除信息，这些参数将构成后续流程的一部分。


  处理程序方法完成请求处理后，它会将控制权委托给一个视图，该视图表示为处理程序方法的返回值。为了提供灵活的方法，处理程序方法的返回值并不代表视图的实现（例如 `user.html`
  或 `report.pdf`），而是代表一个逻辑视图（例如 `user` 或 `report`）——注意缺少文件扩展名。


  处理程序方法的返回值可以是表示逻辑视图名称的 `String`，也可以是 `void`，在后一种情况下，将根据处理程序方法或控制器的名称确定默认的逻辑视图名称。




  要将信息从控制器传递到视图，处理程序方法返回的是逻辑视图名称（`String`）还是 `void` 并不重要，因为处理程序方法的输入参数将对视图可用。


  例如，如果处理程序方法将 `Map` 和 `Model` 对象作为输入参数——并在处理程序方法的逻辑中修改它们的内容——那么这些相同的对象将对处理程序方法返回的视图可访问。


  当控制器类接收到一个视图时，它会通过视图解析器将逻辑视图名称解析为特定的视图实现（例如，`user.html` 或 `report.fmt`）。视图解析器是在
  Web 应用程序上下文中配置的一个 bean，它实现了 `ViewResolver` 接口。其职责是为逻辑视图名称返回一个特定的视图实现。


  一旦控制器类将视图名称解析为视图实现，根据视图实现的设计，它会渲染由控制器处理程序方法传递的对象（例如，`ServerHttpRequest`、`Map`、`Errors`
  或 `WebSession`）。视图的职责是将处理程序方法逻辑中添加的对象展示给用户。


  ### 工作原理


  让我们编写一个来自配方 3-1 的 `HelloWorldApplication` 的响应式版本。参见清单 4-2。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.springframework.boot.SpringBootVersion;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  import reactor.core.publisher.Mono;

  @RestController

  public class HelloWorldController {

  @GetMapping

  public Mono hello() {

  var version= SpringBootVersion.getVersion();

  var msg = String.format("Hello World, from Reactive Spring Boot %s!", version);

  return Mono.just(msg);

  }

  }

  清单 4-2

  响应式 HelloWorldController

  ```


  注意，`Mono<String>` 是 `hello` 方法的返回类型，而不是普通的 `String`。`Mono` 正是使其具有响应式特性的关键。


  #### 设置 Spring WebFlux 应用程序


  为了能够以响应式方式处理请求，你需要启用 WebFlux。这可以通过添加对 `spring-boot-starter-webflux` 的依赖来完成。


  ```

  org.springframework.boot

  spring-boot-starter-webflux


  ```


  这会引入所需的依赖项，例如 `spring-webflux` 和 Project Reactor 的依赖项。它还包括一个响应式运行时，默认情况下是 Netty。


  现在一切已配置完毕，最后要做的是创建一个应用程序类。参见清单 4-3。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  @SpringBootApplication

  public class HelloWorldApplication {

  public static void main(String[] args) {

  SpringApplication.run(HelloWorldApplication.class, args);

  }

  }

  清单 4-3

  HelloWorldApplication

  ```


  Spring Boot 将检测响应式运行时，并使用 `server.*` 属性对其进行配置（参见配方 3-1）。


  #### 创建 Spring WebFlux 控制器


  基于注解的控制器类可以是任意类，它不需要实现特定接口或继承特定基类。你可以使用 `@Controller` 或 `@RestController` 注解对其进行标注。控制器中可以定义一个或多个处理程序方法来处理单个或多个操作。处理程序方法的签名足够灵活，可以接受一系列参数。（有关请求映射的更多信息，另请参见配方
  4-2。）


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.springframework.boot.SpringBootVersion;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.RestController;

  import reactor.core.publisher.Mono;

  @RestController

  public class HelloWorldController {

  @GetMapping

  public Mono hello() {

  var version= SpringBootVersion.getVersion();

  var msg = String.format("Hello World, from Reactive Spring Boot %s!", version);

  return Mono.just(msg);

  }

  }

  ```


  注解 `@GetMapping` 用于将 `hello` 方法修饰为控制器的 HTTP GET 处理程序方法。值得一提的是，如果没有声明默认的 HTTP GET
  处理程序方法，则会抛出 `ServletException`。因此，控制器至少拥有一个 URL 路由和至少一个处理程序方法非常重要。由于 `@GetMapping`
  中的表达式，该方法绑定到 `/hello`。


  当向 `http://localhost:8080/hello` 发出请求时，它将响应式地返回 `Hello World, from Reactive Spring
  Boot 3!`。但是，客户端不会注意到这一点。对于客户端来说，它仍然是一个普通的 HTTP 请求。


  #### 对响应式控制器进行单元测试


  对控制器进行集成测试有两种方法。第一种方法是简单地编写一个测试，创建 `HelloWorldController` 的实例，调用该方法，并对结果进行断言。第二种方法是使用
  `@WebFluxTest` 注解来创建测试。后者将启动一个包含 Web 基础设施的最小应用程序上下文，你可以使用 `MockMvc` 来测试控制器。最后这种方法介于纯单元测试和全面集成测试之间。参见清单
  4-4。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.junit.jupiter.api.Test;

  import reactor.test.StepVerifier;

  class HelloWorldControllerUnitTest {

  private final HelloWorldController controller = new HelloWorldController();

  @Test

  void shouldSayHello() {

  var result = controller.hello();

  StepVerifier.create(result)

  .expectNext("Hello World, from Reactive Spring Boot 3.2.1!")

  .verifyComplete();

  }

  }

  清单 4-4

  HelloWorldController 单元测试

  ```


  这是一个基本的单元测试。它实例化控制器并直接调用要测试的方法。它使用来自 `reactive-test` 模块的 `StepVerifier` 来简化测试。调用
  `hello` 方法，然后使用 `StepVerifier` 验证结果。


  添加 `reactive-test` 依赖项是通过添加以下依赖项完成的：


  ```

  io.projectreactor

  reactor-test

  test


  ```


  第二种选择是对特定控制器使用 `@WebFluxTest`。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.hamcrest.Matchers;

  import org.junit.jupiter.api.Test;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.boot.test.autoconfigure.web.reactive.WebFluxTest;

  import org.springframework.http.MediaType;

  import org.springframework.test.web.reactive.server.WebTestClient;

  @WebFluxTest(HelloWorldController.class)

  class HelloWorldControllerSliceTest {

  @Autowired

  private WebTestClient webClient;

  @Test

  void shouldSayHello() {

  webClient

  .get().uri("/").accept(MediaType.TEXT_PLAIN).exchange()

  .expectStatus().isOk()

  .expectBody(String.class)

  .value(Matchers.startsWith("Hello World, from Reactive Spring Boot"));

  }

  }

  ```


  此测试将启动一个最小的 Spring Boot 上下文，并自动检测项目中所有与 WebFlux 相关的 bean，例如 `@ControllerAdvice`。现在，无需直接调用
  `HelloWorldController`，你可以使用特殊的 `WebTestClient` 来声明一个请求 `.get().uri("/")`，并使用 `exchange()`
  以非阻塞方式发送该请求。最后，验证断言/期望。预期请求具有 OK 状态并包含指定的响应体。




  #### 对响应式控制器进行集成测试


  集成测试与上一节中的 `@WebFluxTest` 非常相似。主要区别在于使用 `@SpringBootTest` 而不是 `@WebFluxText`。使用
  `@SpringBootTest` 会启动整个应用程序，包括所有其他 Bean（服务、仓库等）。通过 `webEnvironment`，你可以指定要使用的环境。其值包括
  `RANDOM_PORT`、`MOCK`（默认）、`DEFINED_PORT` 和 `NONE`。这里我们使用随机端口，并再次使用 `WebTestClient`
  来发起请求：


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.hamcrest.Matchers;

  import org.junit.jupiter.api.Test;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.boot.test.autoconfigure.web.reactive.AutoConfigureWebTestClient;

  import org.springframework.boot.test.context.SpringBootTest;

  import org.springframework.http.MediaType;

  import org.springframework.test.web.reactive.server.WebTestClient;

  @SpringBootTest

  @AutoConfigureWebTestClient

  class HelloWorldControllerIntegrationTest {

  @Autowired

  private WebTestClient webClient;

  @Test

  void shouldSayHello() {

  webClient

  .get().uri("/").accept(MediaType.TEXT_PLAIN).exchange()

  .expectStatus().isOk()

  .expectBody(String.class)

  .value(Matchers.containsString("Hello World, from Reactive Spring Boot"));

  }

  }

  ```


  请求被发送到嵌入式服务器，之后验证结果是否具有正确的状态和正文内容。


  ![](img/464036_2_En_4_Figa_HTML.gif)一个信息图标，圆圈内包含字母 i。 当使用 `MOCK`（也是默认值）作为 `webEnvironment`
  时，必须添加 `@AutoConfigureWebTestClient` 注解才能获取用于测试的 `WebTestClient`。


  ## 4-2\. 使用响应式 REST 服务进行发布和消费


  ### 问题


  你想要编写一个能够生成 JSON 的响应式 REST 端点。


  ### 解决方案


  与常规的 `@RestController` 一样，你可以返回一个普通对象或对象列表，它们将被发送给客户端。为了使它们具有响应式特性，你需要将这些返回值包装在对应的响应式类型中，即
  `Mono` 或 `Flux`。


  ### 工作原理


  让我们从编写一个响应式 `BookService` 开始。每个方法将返回 `Mono<Book>` 或 `Flux<Book>`。参见清单 4-5。


  ```

  package com.apress.springboot3recipes.library;

  import reactor.core.publisher.Flux;

  import reactor.core.publisher.Mono;

  public interface BookService {

  Flux findAll();

  Mono create(Book book);

  Mono find(String isbn);

  }

  清单 4-5

  响应式 BookService 接口

  ```


  对于 `BookService` 接口，我们可以编写一个内存实现。参见清单 4-6。


  ```

  package com.apress.springboot3recipes.library;

  import org.springframework.stereotype.Service;

  import reactor.core.publisher.Flux;

  import reactor.core.publisher.Mono;

  import java.util.Map;

  import java.util.concurrent.ConcurrentHashMap;

  @Service

  class InMemoryBookService implements BookService {

  private final Map books = new ConcurrentHashMap();

  @Override

  public Flux findAll() {

  return Flux.fromIterable(books.values());

  }

  @Override

  public Mono create(Book book) {

  books.put(book.isbn(), book);

  return Mono.just(book);

  }

  @Override

  public Mono find(String isbn) {

  return Mono.justOrEmpty(books.get(isbn));

  }

  }

  清单 4-6

  响应式 BookService 实现（内存）

  ```


  `InMemoryBookService` 有一些简单的方法来获取或保存书籍。当检索所有书籍时，它会延迟 128 毫秒。`Book` 类与第 3 章中使用的相同。参见清单
  4-7。


  ```

  package com.apress.springboot3recipes.library;

  import java.util.List;

  import java.util.Objects;

  public record Book(String isbn, String title, List authors) {

  @Override

  public boolean equals(Object o) {

  if (o instanceof Book other) {

  return this.isbn != null && Objects.equals(this.isbn, other.isbn);

  }

  return false;

  }

  @Override

  public int hashCode() {

  return Objects.hash(this.isbn);

  }

  }

  清单 4-7

  Book 记录

  ```


  需要一个 `BookController` 控制器来将 `Book` 暴露为 REST 资源。


  ```

  package com.apress.springboot3recipes.library.rest;

  import com.apress.springboot3recipes.library.Book;

  import com.apress.springboot3recipes.library.BookService;

  import org.springframework.http.ResponseEntity;

  import org.springframework.web.bind.annotation.GetMapping;

  import org.springframework.web.bind.annotation.PathVariable;

  import org.springframework.web.bind.annotation.PostMapping;

  import org.springframework.web.bind.annotation.RequestBody;

  import org.springframework.web.bind.annotation.RequestMapping;

  import org.springframework.web.bind.annotation.RestController;

  import org.springframework.web.util.UriComponentsBuilder;

  import reactor.core.publisher.Flux;

  import reactor.core.publisher.Mono;

  import java.time.Duration;

  @RestController

  @RequestMapping("/books")

  public class BookController {

  private final BookService bookService;

  public BookController(BookService bookService) {

  this.bookService = bookService;

  }

  @GetMapping

  public Flux all() {

  return bookService.findAll().delayElements(Duration.ofMillis(64));

  }

  @GetMapping("/{isbn}")

  public Mono get(@PathVariable("isbn") String isbn) {

  return bookService.find(isbn);

  }

  @PostMapping

  public Mono> create(@RequestBody Mono book,

  UriComponentsBuilder uriBuilder) {

  var created = book.flatMap(bookService::create);

  return created.map((it) -> createResponse(it, uriBuilder));

  }

  private ResponseEntity createResponse(Book book,

  UriComponentsBuilder ucb) {

  var newBookUri = ucb.path("/books/{isbn}").build(book.isbn());

  return ResponseEntity.created(newBookUri).body(book);

  }

  }

  ```


  为了启动所有组件，需要一个简单的 `LibraryApplication`。


  ```

  package com.apress.springboot3recipes.library;

  import org.springframework.boot.ApplicationRunner;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.Bean;

  import reactor.core.publisher.Flux;

  @SpringBootApplication

  public class LibraryApplication {

  public static void main(String[] args) {

  SpringApplication.run(LibraryApplication.class, args);

  }

  @Bean

  public ApplicationRunner initData(BookService books) {

  return (args) -> Flux.fromIterable(BookGenerator.all())

  .map(books::create).subscribe();

  }

  }

  ```


  `BookController` 映射到 `/books`，支持列出所有书籍或单本书籍，以及添加和修改书籍。使用 `HTTPie` 或 `curl` 之类的工具，你可以查询该端点。


  命令 `http http://localhost:8080/books` 应列出系统中的所有订单（参见图 4-1），而 `http http://localhost:8080/books/{isbn}`
  应列出单本书籍。


  ![](img/464036_2_En_4_Fig1_HTML.jpg)


  一个 Marten 窗口的截图。HTTP 响应包含 JSON 数据，列出了带有作者、ISBN 和标题的书籍。数组中的每个对象代表一本书。


  图 4-1


