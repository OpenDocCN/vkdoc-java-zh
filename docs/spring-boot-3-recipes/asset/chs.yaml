  #### 流式传输 JSON


  对 `/books` 的调用结果并非流式传输，而是阻塞式的。它会先收集所有结果，然后再发送出去。另请参见图 4-1 中的内容类型标头，其设置为 `application/json`。要实现流式传输结果，应将其设置为
  `application/x-ndjson`（或支持流式传输的其他内容类型）。在编写客户端来消费此端点时，这一点需要考虑。对于 `HTTPie`，我们可以指定
  `Accept` 标头来使其支持流式传输。将 `''Accept:application/x-ndjson''` 添加到之前的 `HTTPie` 命令中，结果现在将变为流式传输。结果将缓缓流入，直到没有更多内容可供消费（参见图
  4-2）。


  ![](img/464036_2_En_4_Fig2_HTML.jpg)


  一个 Marten 窗口的截图。HTTP 响应使用 application/x-ndjson 格式，流式传输换行符分隔的 JSON 数据。每个对象代表一本书，包含作者、ISBN
  和标题字段。但是，存在格式问题，例如缺少逗号和对象不完整。


  图 4-2


  流式传输所有书籍的结果


  结果也略有变化。它不再返回一个数组或订单（参见图 4-1），而是返回单个订单（参见图 4-2）。


  #### 编写集成测试


  使用 `WebTestClient` 和 `MOCK` Web 环境可以很容易地为 `BookController` 编写集成测试（你也可以使用 `RANDOM_PORT`
  代替 `MOCK`）。


  ```

  package com.apress.springboot3recipes.library.rest;

  import com.apress.springboot3recipes.library.Book;

  import org.junit.jupiter.api.Test;

  import org.springframework.beans.factory.annotation.Autowired;

  import org.springframework.boot.test.autoconfigure.web.reactive.AutoConfigureWebTestClient;

  import org.springframework.boot.test.context.SpringBootTest;

  import org.springframework.test.annotation.DirtiesContext;

  import org.springframework.test.web.reactive.server.WebTestClient;

  import java.util.List;

  @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.MOCK)

  @AutoConfigureWebTestClient

  @DirtiesContext(methodMode = DirtiesContext.MethodMode.AFTER_METHOD)

  class BookControllerIntegrationTest {

  @Autowired

  private WebTestClient webTestClient;

  @Test

  void listBooks() {

  webTestClient.get().uri("/books")

  .exchange()

  .expectStatus().isOk()

  .expectBodyList(Book.class).hasSize(24);

  }

  @Test

  void addAndGetBook() {

  var book = new Book("B0CBC71PHR", "Testing Spring Boot Applications Demystified",
  List.of("Philip Riecks"));

  webTestClient.post().uri("/books").bodyValue(book)

  .exchange()

  .expectStatus().isCreated()

  .expectBody(Book.class).isEqualTo(book);

  webTestClient.get().uri("/books/{isbn}", book.isbn())

  .exchange()

  .expectStatus().isOk()

  .expectBody(Book.class).isEqualTo(book);

  }

  }

  ```


  这里需要 `@DirtiesContext` 注解，因为 `BookService` 是一个有状态的 Bean。因此，在向库中添加 `Book` 后，需要为下一个测试重置它。由于使用了带有模拟环境的
  `@SpringBootTest` 注解，测试将启动完整的应用程序。对于模拟环境，需要 `@AutoConfigureWebTestClient` 注解来获取
  `WebTestClient`。`WebTestClient` 使得构建请求并将其发送到服务器变得容易。发送响应后，它可以对结果进行断言。


  ![](img/464036_2_En_4_Figb_HTML.gif)一个信息图标，圆圈内有一个字母 i。 `webEnvironment = SpringBootTest.WebEnvironment.MOCK`
  也是默认值，因此显式添加它并非严格必要。


  ## 4-3\. 使用 Thymeleaf 作为模板引擎


  ### 问题


  你希望在基于 WebFlux 的应用程序中使用 Thymeleaf 渲染视图。


  ### 解决方案


  添加 Thymeleaf 的依赖项，并创建一个处理器来确定视图并填充模型。


  ### 工作原理


  添加对 `spring-boot-starter-webflux` 和 `spring-boot-starter-thymeleaf` 的依赖。这足以让 Spring
  Boot 自动配置 Thymeleaf 以在 WebFlux 应用程序中使用。参见清单 4-8。


  ```

  org.springframework.boot

  spring-boot-starter-webflux


  org.springframework.boot

  spring-boot-starter-thymeleaf


  清单 4-8

  WebFlux 和 Thymeleaf 依赖项

  ```


  添加此依赖项后，你将获得 Thymeleaf 库以及 Thymeleaf Spring 方言，以便它们能够很好地集成。由于这两个库的存在，Spring Boot
  将自动配置 `ThymeleafReactiveViewResolver`。`ThymeleafReactiveViewResolver` 需要一个 Thymeleaf
  `ISpringWebFluxTemplateEngine` 才能解析和渲染视图。一个特殊的 `SpringWebFluxTemplateEngine` 将预先配置好
  `SpringDialect`，以便你可以在 Thymeleaf 页面中使用 SpEL。


  配置 Thymeleaf Spring Boot 在 `spring.thymeleaf` 和 `spring.thymeleaf.reactive` 命名空间中公开了几个属性（参见表
  4-1）。


  表 4-1


  Thymeleaf 属性


  | **属性** | **描述** |

  | --- | --- |

  | `spring.thymeleaf.prefix` | 设置用于 `ViewResolver` 的 `prefix`；默认值为 `classpath:/templates`。
  |

  | `spring.thymeleaf.suffix` | 设置用于 `ViewResolver` 的 `suffix`；默认值为 `.html`。 |

  | `spring.thymeleaf.encoding` | 设置模板的编码；默认值为 `UTF-8`。 |

  | `spring.thymeleaf.check-template` | 在渲染前检查模板是否存在；默认值为 `true`。 |

  | `spring.thymeleaf.check-template-location` | 检查模板位置是否存在。 |

  | `spring.thymeleaf.mode` | 设置要使用的 Thymeleaf `TemplateMode`；默认值为 `HTML`。 |

  | `spring.thymeleaf.cache` | 设置是否应缓存已解析的模板；默认值为 `true`。 |

  | `spring.thymeleaf.template-resolver-order` | 设置 `ViewResolver` 的顺序；默认值为 1。 |

  | `spring.thymeleaf.view-names` | 设置可以使用此 `ViewResolver` 解析的视图名称（以逗号分隔）。 |

  | `spring.thymeleaf.exclude-view-names` | 设置被排除解析的视图名称（以逗号分隔）。 |

  | `spring.thymeleaf.enabled` | 设置是否启用 Thymeleaf；默认值为 `true`。 |

  | `spring.thymeleaf.enable-spring-el-compiler` | 启用 SpEL 表达式的编译；默认值为 `false`。 |

  | `spring.thymeleaf.reactive.max-chunk-size` | 设置用于写入响应的数据缓冲区的最大大小（以字节为单位）。 |

  | `spring.thymeleaf.reactive.media-types` | 设置此视图技术支持的媒体类型。 |

  | `spring.thymeleaf.reactive.full-mode-view-names` | 应以 `FULL` 模式运行的视图名称的逗号分隔列表。默认值为
  `none`。`FULL` 模式基本上意味着阻塞模式。 |

  | `spring.thymeleaf.reactive.chunked-mode-view-names` | 应以分块模式运行的视图名称的逗号分隔列表。 |




