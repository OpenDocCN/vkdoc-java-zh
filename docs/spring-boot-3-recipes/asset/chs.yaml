  );\n@Autowired\nprivate CustomerRepository repository;\n清单 6-82\n用于 Testcontainers\
  \ 的 CustomerRepositoryTest 测试设置\n```\n\n`@DataR2dbcTest` 注解通过一个特殊的 JUnit 扩展（`SpringExtension`）来执行测试，以引导\
