  ## 10-5\. 使用 Spring Boot GraalVM 原生镜像


  GraalVM 原生镜像是无需 Java 和其他依赖即可运行的单文件可执行程序。它们是通过提前编译 Java 应用程序生成的，而不是像 JVM 那样即时编译。这些原生镜像通常体积更小、内存占用更低，并且启动速度更快。原生镜像是特定于平台的可执行文件；在这些环境中无需包含
  JVM。


  原生镜像非常适合在容器化环境中运行，尤其是在使用 AWS Lambda 等函数即服务（FaaS）时。


  然而，使用原生镜像也存在一些缺点。


  *   类路径是固定的，需要在构建时完全定义。


  *   应用程序中定义的 Bean 在运行时无法更改。


  *   原生镜像不支持 `@Profile`；需要在构建时指定要运行的 profile。


  *   依赖于 `Environment` 的 `@Conditional` Bean 仅在构建时可用。


  *   定义为 Lambda 表达式或方法引用的 Bean 定义无法使用。


  所有这些限制都源于 GraalVM 在封闭世界中运行的事实，这意味着运行时所需的所有类和字节码都必须在构建时存在。通过使用 Spring 提前（AOT）处理，我们可以帮助
  GraalVM 全面清晰地了解需要哪些类和字节码。Spring 本身已经尽力提供了尽可能多的信息，但我们也可以通过提供额外的元数据和信息来为 AOT 处理提供一些帮助。


  ### 问题


  您希望为 Spring Boot 应用程序创建一个原生可执行文件。


  ### 解决方案


  Spring Boot 可以利用 Maven 和 Gradle 的 GraalVM 插件来创建原生镜像。对于 Maven，有一个特殊的 profile 可以添加额外的配置来生成正确的镜像。运行
  `mvn -Pnative native:compile` 将执行常规编译、AOT 处理，最后执行 GraalVM 编译器。


  #### 使用原生构建工具构建原生镜像


  要使用 Maven（或 Gradle）插件在本地机器上构建镜像，您需要安装 GraalVM 并在构建中包含该插件。请参见清单 10-15。


  ```

  org.graalvm.buildtools

  native-maven-plugin


  清单 10-15

  Maven GraalVM 插件

  ```


  完成此设置后，您可以运行 `mvn -Pnative native:compile`，应用程序将被构建、启动并分析，最终生成一个针对您编译平台的可执行文件。即使是这个简单的
  Hello World 应用程序，生成二进制文件也需要一些时间。


  ![](img/464036_2_En_10_Figh_HTML.gif)信息图标。 在撰写本文时，尚无法进行交叉编译，因此无法在 macOS 上创建 Windows
  可执行文件；您需要使用包含 Windows 和 GraalVM 的构建容器。


  生成的二进制文件可以在 `target` 目录中找到，名称为 `recipe_10_5_i`（即工件名称）。启动它将显示与 Java 方式运行相同的输出。唯一不同的是，它的启动速度会非常快。


  其中一些权衡是：更长的编译时间换来了更快的启动速度和更低的内存占用。


  #### 使用 Buildpacks 构建原生镜像


  构建原生镜像的另一种方法是使用 buildpack（另请参见配方 10-4）。使用 buildpack 时，您无需在本地系统上安装 GraalVM，因为它会作为镜像的一部分被下载。您需要在构建中包含
  GraalVM Maven 插件。请参见清单 10-16。


  ```

  org.graalvm.buildtools

  native-maven-plugin


  清单 10-16

  Maven GraalVM 插件

  ```


  要使用 buildpack，只需使用所需的 Maven profile 运行常规构建即可。只需运行 `mvn -Pnative spring-boot:build-image`。该过程完成后，您将获得一个包含原生可执行文件的容器镜像，可以使用
  Docker、K8S 或其他容器技术来运行它。




  ### 工作原理


  构建时，GraalVM 会根据 JVM 中当前可用的代码创建一个原生镜像。基于此，GraalVM 将编译出一个原生可执行文件。GraalVM 假设在检查应用程序时，运行该应用所需的所有代码都已存在于
  JVM 中。如果代码不存在，它就不会被包含在最终的原生可执行文件中。这种将字节码编译为原生代码的过程被称为*提前（AOT）编译*，这与 JVM 采用的即时编译（JIT）不同。


  Spring 支持提前向 GraalVM 提供信息，而 Spring Boot 在其插件中利用了这种支持。当运行 `mvn -Pnative native:compile`
  时，你会在输出中看到类似 `[INFO] --- spring-boot:3.2.1:process-aot (process-aot) @ recipe_10_5_i
  ---` 的一行信息。参见图 10-5。


  ![](img/464036_2_En_10_Fig5_HTML.jpg)


  一个显示 Maven 插件输出的命令提示符屏幕。其中包含 spring boot，使用 Java 21.0.1 在 v 3.0.0-SNAPSHOT 上启动 Hello
  World 应用程序，PID 为 27635，未设置活动配置文件，回退到 1 个默认配置文件，以及 INFO 信息。


  图 10-5


  Maven 插件输出


  在执行 `process-aot` 时，Spring Boot 会做几件事。


  *   为 Bean 定义生成源代码

  *   生成包含 GraalVM 提示的文件

  *   为代理类生成字节码


  所有这些步骤都是 GraalVM 对运行应用程序所需的代码进行正确的静态分析所必需的。


  #### 为 Bean 定义生成源代码


  由于我们无法在 GraalVM 原生镜像中包含动态代码，因此需要静态配置。通常，`@Configuration` 类会在应用程序启动时被解析，Spring 会根据带有
  `@Bean` 注解的方法创建特殊的 `BeanDefinition` 源文件。实际的 `@Bean` 方法是通过反射调用的，这在原生镜像中是无法做到的。


  现在，在创建原生镜像时，不是在运行时解析 `@Configuration` 类和解析 Bean，而是在 AOT 处理期间生成 Bean 定义。它实际上会为 `@Configuration`
  类生成一个源文件。这些类可以在 `target/spring-aot/main/sources` 目录中找到。参见图 10-6。


  ![](img/464036_2_En_10_Fig6_HTML.jpg)


  一个显示为 Bean 定义生成的源代码的屏幕。项目文件夹在左侧。Hello World Application 下划线 Bean definitions 点 java
  被选中。代码在右侧。代码包含一个公共类、一个公共静态、一个根 Bean 定义和初始化配置类。


  图 10-6


  生成的源代码


  如你所见，还有一个 `org` 目录，因为它会为其生成的所有 `@Configuration` 类生成源代码。这也适用于 Spring Boot 自动配置类和其他被加载的
  `@Configuration` 类。


  #### 生成 GraalVM 提示


  除了生成源代码，Spring AOT 还会生成一个供 GraalVM 使用的提示文件。该提示文件包含 JSON 格式的数据，描述了 GraalVM 应如何处理其无法直接理解的情况，例如反射、多个构造函数或动态类加载。


  提示文件会自动生成在 `target/spring-aot/main/resources` 目录中。参见图 10-7。


  ![](img/464036_2_En_10_Fig7_HTML.jpg)


  一个显示生成的提示文件的屏幕。项目文件夹在左侧。reflect-config 点 j s o n 被选中。代码在右侧。代码包含名称、查询所有公共方法、查询所有声明方法、字段和参数类型。代码中高亮显示了
  com 点 apress。


  图 10-7


  生成的提示文件


  虽然 Spring Boot 会尽力根据代码推断要生成的提示，但有时它可能无法确定要生成什么，这时可能需要一些帮助。Spring AOT 可以提供帮助，它提供了
  `RuntimeHintsRegistrar` 接口，允许你为相关代码注册额外的提示。在定义了特定提示后，你可以使用 `@ImportRuntimeHints`
  注解让 Spring AOT 知道这个类。参见清单 10-17。


  ```

  package com.apress.springboot3recipes.helloworld;

  import org.springframework.aot.hint.RuntimeHints;

  import org.springframework.aot.hint.RuntimeHintsRegistrar;

  import org.springframework.boot.SpringApplication;

  import org.springframework.boot.autoconfigure.SpringBootApplication;

  import org.springframework.context.annotation.ImportRuntimeHints;

  import org.springframework.scheduling.annotation.EnableScheduling;

  @SpringBootApplication

  @EnableScheduling

  @ImportRuntimeHints(HelloWorldApplication.HelloWorldRuntimeHints.class)

  public class HelloWorldApplication {

  public static void main(String[] args) {

  SpringApplication.run(HelloWorldApplication.class, args);

  }

  static class HelloWorldRuntimeHints implements RuntimeHintsRegistrar {

  @Override

  public void registerHints(RuntimeHints hints, ClassLoader cl) {

  hints.resources().registerPattern("classpath:/*.properties");

  }

  }

  }

  清单 10-17

  注册运行时提示

  ```


  这里我们创建了资源提示，用于包含类路径根目录下的所有 `.properties` 文件。如果文件是动态加载的，而 Spring 或 GraalVM 无法检测到这一点，则可能需要这样做。注册运行时提示时，我们可以为
  `jni`、`proxies`、`reflection`、`resources` 和/或 `serialization` 注册提示。所有这些都会向可用的提示文件之一添加条目。


  #### 为代理类生成字节码


  最后，Spring AOT 会生成实际的类文件，其中包含运行时创建的代理的字节码。代理是动态创建的类，这在 GraalVM 中是无法实现的；因此，它们会在构建时被导出。代码生成在常规的
  `target/classes` 目录中，可以通过 `$SpringCGLIB$$<number>` 后缀来识别。参见图 10-8。


  ![](img/464036_2_En_10_Fig8_HTML.jpg)


  一个显示生成的类文件的屏幕。项目文件夹在左侧。Hello World Application $ $ Spring C G LIB $ $ 0 被选中。代码在右侧。代码中包含包、导入、公共类、私有布尔值、公共静态、私有静态
  final 和私有方法拦截器。


  图 10-8


  生成的类文件


  这个代理之所以被创建，是因为 `@SpringBootApplication` 也是一个 `@Configuration` 类，其 `proxyBeanMethods`
  属性被设置为 `true`。对于所有使用 AOP（如 `@Transactional` 和安全注解）的类，都会生成类文件，因此在常规应用程序中，可能会生成一些类。




