  ## 7-4\. 注册 JMX MBean


  ### 问题


  您希望在 Spring Boot 应用程序中将一个对象注册为 JMX MBean，以便能够查看正在运行的服务并在运行时操作其状态。这将允许您执行诸如重新运行批处理作业、调用方法以及更改配置元数据等任务。


  ### 解决方案


  Spring Boot 通过 Spring JMX 支持来注册 Bean；它会检测带有 `@ManagedResource` 注解的 Bean，并将其注册到 JMX
  服务器。但是，默认情况下 JMX 是禁用的，必须通过在 `application.properties` 中添加 `spring.jmx.enabled=true`
  来启用。




  ### 工作原理


  首先，我们来检查 Spring Boot 提供的 JMX 支持。创建一个简单的 Spring Boot 应用程序，它将持续运行，并使用 JConsole 来检查正在运行的应用程序。参见清单
  7-11。


