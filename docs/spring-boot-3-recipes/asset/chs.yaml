  #### 在 Spring Boot 测试中使用 Testcontainers


  你可能听说过 Testcontainers 库，并希望在你的 Spring Boot 应用程序中将其用于测试。借助 Testcontainers 库，你可以轻松编写测试，并使用你在生产环境中实际使用的数据库、消息解决方案或邮件提供商（以及更多其他组件）。因此，无需退而求其次使用内存或嵌入式解决方案，你就能获得与生产环境完全相同的完整解决方案。Testcontainers
  通过 Docker 实现这一点，并且默认将容器的生命周期与你的测试绑定。


  要使用它，你需要在依赖管理（Maven 或 Gradle）中添加 `spring-boot-testcontainers` 依赖，并且需要引入你想要使用的 Testcontainers
  模块。我们使用的示例将利用一个 PostgreSQL 容器在其上执行一些 JDBC 查询；它还将利用前面提到的切片支持来设置一个基于 JDBC 的测试。参见清单
  2-24。


