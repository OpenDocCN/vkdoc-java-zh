    #### 将多个结果作为事件发送


    `ResponseBodyEmitter` 是 `SseEmitter` 的同类组件，它可以将事件从服务器发送到客户端。这里使用的是服务器发送事件（Server-Sent-Events）。服务器发送事件是从服务器发送到客户端的消息。它们的
    `Content-Type` 标头值为 `text/event-stream`。它们非常轻量，仅包含四个字段（见表 3-13）。


    表 3-13


    服务器发送事件允许的字段


    | 字段 | 描述 |

    | --- | --- |

    | `Id` | 事件的 ID |

    | `Event` | 事件的类型 |

    | `Data` | 事件数据 |

    | `Retry` | 事件流的重新连接时间 |


    要从请求处理方法发送事件，你需要创建一个 `SseEmitter` 实例，并将其从请求处理方法中返回。然后使用 `send` 方法将各个元素发送到客户端。参见清单
    3-47。


    ```

    @GetMapping("/orders")

    public SseEmitter orders() {

    var emitter = new SseEmitter();

    executor.execute(() -> {

    var orders = orderService.findAll();

    try {

    for (var order : orders) {

    sendAndDelay(emitter, order);

    }

    emitter.complete();

    } catch (IOException ex) {

    emitter.completeWithError(ex);

    }

    });

    return emitter;

    }

    private void sendAndDelay(ResponseBodyEmitter emitter, Order order)

    throws IOException{

    emitter.send(order, MediaType.APPLICATION_JSON);

    randomDelay();

    }

