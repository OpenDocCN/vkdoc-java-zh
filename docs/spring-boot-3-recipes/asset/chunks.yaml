  trans: '

    ### 工作原理


    要配置 Spring WebFlux 的部分功能，你可以使用 `WebFluxConfigurer` 接口。要配置专用的 `AsyncTaskExecutor`（通常是一个由
    Spring 管理的 `AsyncTaskExecutor`），请重写并实现 `configureBlockingExecution` 方法。参见清单 4-34。


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.boot.task.SimpleAsyncTaskExecutorBuilder;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.reactive.config.BlockingExecutionConfigurer;

    import org.springframework.web.reactive.config.WebFluxConfigurer;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Configuration

    public static class WebFluxConfiguration implements WebFluxConfigurer {

    private final SimpleAsyncTaskExecutorBuilder builder;

    public WebFluxConfiguration(SimpleAsyncTaskExecutorBuilder builder) {

    this.builder = builder;

    }

    @Override

    public void configureBlockingExecution(BlockingExecutionConfigurer configurer)
    {

    configurer.setExecutor(builder.threadNamePrefix("blocking-").build());

    }

    }

    }

    清单 4-34

    使用 WebFluxConfigurer 的 Spring Boot 应用

    ```


    内部类 `WebFluxConfiguration` 实现了 `WebFluxConfigurer` 接口，我们在此重写了 `configureBlockingExecution`
    方法。我们使用 `SimpleAsyncTaskExecutorBuilder` 来创建一个 `AsyncTaskExecutor` 实例。通过 `SimpleAsyncTaskExecutorBuilder`，我们可以利用属性通过应用配置进行一些默认配置（更多信息请参见技巧
    7-1）。我们也可以创建一个新的 `AsyncTaskExecutor`，例如 `SimpleAsyncTaskExecutor` 或 `VirtualThreadTaskExecutor`。


    使用 `SimpleAsyncTaskExecutorBuilder`，我们设置了线程前缀，构建了执行器，并将其传递给 `BlockingExecutionConfigurer`。这样，Spring
    WebFlux 会自动检测到它。现在，任何非响应式返回类型（除了来自 Project Reactor、RxJava、Java Flow 或 SmallRye
    Mutiny 的类型之外的任何类型）都将使用此执行器执行。参见清单 4-35。


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Mono;

    @RestController

    public class HelloWorldController {

    @GetMapping("/blocking")

    public String hello() {

    return sayHello();

    }

    @GetMapping("/reactive")

    public Mono helloReactive() {

    return Mono.just(sayHello());

    }

    private static String sayHello() {

    var version = SpringBootVersion.getVersion();

    var thread = Thread.currentThread().getName();

    return String.format("Hello World, from Spring Boot %s on Thread ''%s''!"

    , version, thread);

    }

    }

    清单 4-35

    包含阻塞和响应式处理的 HelloWorldController

    ```


    `HelloWorldController` 有两个方法。绑定到 `/blocking` 的方法返回一个常规的 `String`，而绑定到 `/reactive`
    的方法返回一个 `Mono<String>`，这是一种响应式类型。


    现在，当启动应用并使用 `HTTPie`、`curl` 或浏览器调用端点时，你应该能够看到发生了什么，因为它会返回执行该操作的线程名称（参见图 4-10）。


    ![](img/464036_2_En_4_Fig10_HTML.jpg)


    一个 Marten 窗口的截图。它显示了一组程序代码，这些代码启动了应用，使用 HTTP 调用了端点，并返回了执行该操作的线程名称。


    图 4-10


    阻塞和响应式输出


    调用 `/blocking` 将在前缀为 `blocking` 的线程上执行，表明它确实是由配置的 `AsyncTaskExecutor` 执行的。`/reactive`
    则在所使用的响应式框架（此处为 Project Reactor）的某个线程上执行。


    由于我们使用的是 Spring Boot，它会自动为你配置阻塞式 WebFlux 执行。默认情况下，Spring Boot 会创建一个 `AsyncTaskExecutor`，用于应用中的多个位置，包括
    WebFlux 阻塞执行。此执行器可通过多种属性进行配置（参见技巧 7-1），甚至可以通过将 `spring.threads.virtual.enabled`
    设置为 `true` 来切换到虚拟线程。参见清单 4-36。


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    清单 4-36

    没有显式 WebFluxConfigurer 的 Spring Boot 应用

    ```


    无需任何额外配置，阻塞执行仍然会发生。


    ## 4-10. 创建响应写入器


    ### 问题


    你有一个服务或多次调用，并希望将响应分块发送给客户端。


    ### 解决方案


    Spring WebFlux 与 Spring MVC 一样，会进行内容协商。当它接收到可以流式传输的内容类型（例如 `application/x-ndjson`
    和 `text/event-stream`）时，它会切换到一个对流式结果进行编解码的编解码器。对于 `text/event-stream`，我们可以使用 `SseEventBuilder`
    来添加额外信息。


    ### 工作原理


    让我们来谈谈它是如何工作的。

    '
- fmt: '### Send Multiple Results in a Response


    Spring WebFlux will automatically stream the results when a content type that
    requires it is detected. Create an `OrderController` with an `orders` method that
    returns a `Flux<Order>` and send the results one by one to the client.


    ```java

    package com.apress.springboot3recipes.order.rest;

    import com.apress.springboot3recipes.order.Order;

    import com.apress.springboot3recipes.order.OrderService;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Flux;

    import java.time.Duration;

    @RestController

    public class OrderController {

    private final OrderService orderService;

    public OrderController(OrderService orderService) {

    this.orderService = orderService;

    }

    @GetMapping("/orders")

    public Flux orders() {

    return orderService.findAll().delayElements(Duration.ofMillis(32));

    }

    }

    ```


    The controller is very simple, because all complexities for returning the correct
    response are handled by the framework.


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Figj_HTML.gif) An information icon
    with the letter i inside a circle. There is a delay in sending each item to the
    client, just so you can see the different events coming in. You wouldn’t do this
    in real code.


    When using a tool like `HTTPie` or `curl`, calling the URL `http://localhost:8080/orders`
    without specifying a streaming `Content-Type` will return an array of orders (see
    Figure [4-11](#464036_2_En_4_Chapter.xhtml#Fig11)).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig11_HTML.jpg)


    A screenshot of the marten window. It has a set of program codes that calls the
    local host using a tool through the H T T P link and returns an array of orders
    without specifying a streaming content type.


    **Figure 4-11** Response without streaming `Content-Type`


    When specifying an accept header of `application/x-ndjson`, the results will be
    streamed individually instead of collected and sent as an array. Using `http :8080/orders
    ''Accept:application/x-ndjson'' --stream` will result in Figure [4-12](#464036_2_En_4_Chapter.xhtml#Fig12).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig12_HTML.jpg)


    A screenshot of the marten window. It reads a set of program codes in Spring Boot
    that specifies an accept header of the application, streams the result individually,
    and sent as an array. It streams individual JSON objects representing orders,
    each containing an amount and id fields.


    **Figure 4-12** Response with streaming JSON


    Finally, we could use event streaming by specifying the `text/event-stream` content
    type. Using `http :8080/orders ''Accept:text/event-stream'' --stream` will result
    in Figure [4-13](#464036_2_En_4_Chapter.xhtml#Fig13).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig13_HTML.jpg)


    A screenshot of the marten window. It reads a set of program codes in Spring Boot
    that uses the event streaming by specifying the text, event, and stream content
    type and displays the result. Each line represents an event, starting with data,
    followed by a JSON payload containing amount and id fields.


    **Figure 4-13** Response with event stream


    Finally let’s write a test for this controller. Annotate a class with `@WebFluxTest(OrderController.class)`
    to get a WebFlux slice test. `OrderController` needs an `OrderService` that is
    mocked by using `@MockBean` on the `OrderService` field. See Listing [4-37](#464036_2_En_4_Chapter.xhtml#PC42).


    ```java

    package com.apress.springboot3recipes.order.rest;

    import com.apress.springboot3recipes.order.Order;

    import com.apress.springboot3recipes.order.OrderService;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.reactive.WebFluxTest;

    import org.springframework.boot.test.mock.mockito.MockBean;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.reactive.server.WebTestClient;

    import reactor.core.publisher.Flux;

    import java.math.BigDecimal;

    import static org.mockito.Mockito.when;

    @WebFluxTest(OrderController.class)

    public class OrderControllerTest {

    @Autowired

    private WebTestClient webTestClient;

    @MockBean

    private OrderService orderService;

    @Test

    public void shouldReturnOrdres() throws Exception {

    when(orderService.findAll()).thenReturn(Flux.just((new Order("1234", BigDecimal.TEN))));

    webTestClient.get()

    .uri("/orders")

    .accept(MediaType.APPLICATION_NDJSON)

    .exchange()

    .expectStatus().isOk()

    .expectBody().json("{\"id\":\"1234\",\"amount\":10}");

    }

    }

    ```


    **Listing 4-37** `WebFluxTest` for the `OrderController`


    The test method first registers the behavior on the mocked `OrderService` to return
    a single instance of an `Order`. Next we use a `WebTestClient` to perform a `get`
    on the `/orders` endpoint with a streaming response type. The result should be
    a single JSON element containing the `id` and `amount` as the `OrderService` returns
    just a single element.'
