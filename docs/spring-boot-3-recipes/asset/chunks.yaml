  raw: '### How It Works


    Spring Boot will automatically create a `ConnectionFactory` instance when it detects
    the Spring Kafka and Kafka libraries on the classpath. To get started, you need
    to add the `spring-kafka` dependency. This will pull in all the required dependencies.
    See Listing [8-36](#464036_2_En_8_Chapter.xhtml#PC42).


    ```

    org.springframework.kafka

    spring-kafka


    Listing 8-36

    Spring Kafka Dependency

    ```


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fige_HTML.gif)An information icon.This
    recipe uses the Spring Boot Docker Compose support to bootstrap Kafka, so a dependency
    on `spring-boot-docker-compose` is needed as well.


    Now you can use the `spring.kafka` properties to connect to the broker. See Listing
    [8-37](#464036_2_En_8_Chapter.xhtml#PC43).


    ```

    spring.kafka.bootstrap-servers=localhost:9092

    Listing 8-37

    Minimal Spring Kafka Properties to Connect and Receive Messages

    ```


    This configuration is all that is needed to connect to the Kafka container and
    send and receive messages through Kafka. Table [8-14](#464036_2_En_8_Chapter.xhtml#Tab14)
    describes the global Kafka properties that can be set. In the `spring.kafka.consumer`
    and `spring.kafka.producer` namespaces, you can set the respective properties
    for Kafka Consumer (Table [8-15](#464036_2_En_8_Chapter.xhtml#Tab15)) or Producer
    (Table [8-16](#464036_2_En_8_Chapter.xhtml#Tab16)).


    Table 8-14


    Common Kafka Properties


    | Property | Description |

    | --- | --- |

    | `spring.kafka.bootstrap-servers` | Comma-separated list of addresses to which
    the client should connect |

    | `spring.kafka.client-id` | ID to pass to the server when making requests, mainly
    used for server-side logging |

    | `spring.kafka.properties` | Additional properties, common for the producer and
    consumer, used to configure the client |


    To configure the receiving side of the Kafka support, you can add the `spring.kafka.consumer`
    properties to your configuration (Table [8-15](#464036_2_En_8_Chapter.xhtml#Tab15)).


    Table 8-15


    Kafka Consumer Properties


    | Property | Description |

    | --- | --- |

    | `spring.kafka.consumer.auto-commit-interval` | Sets the frequency in which the
    consumer offsets are committed to Kafka, if `enable-auto-commit` is `true`. |

    | `spring.kafka.consumer.auto-offset-reset` | Sets what to do when there is no
    initial offset in Kafka or if the current offset is no longer available. |

    | `spring.kafka.consumer.bootstrap-servers` | Is a comma-separated list of addresses
    to which the client should connect. This overrides the global setting. |

    | `spring.kafka.consumer.client-id` | Sets the ID to pass to the server when making
    requests; used in server logging. |

    | `spring.kafka.consumer.enable-auto-commit` | Sets whether the offset should
    be automatically committed. |

    | `spring.kafka.consumer.fetch-max-wait` | Sets the amount of time to block before
    answering the fetch request. |

    | `spring.kafka.consumer.fetch-min-size` | Sets the minimal amount of data the
    server should return for a fetch request. |

    | `spring.kafka.consumer.group-id` | Sets the unique string to identify the consumer
    group; this is required! |

    | `spring.kafka.consumer.heartbeat-interval` | Sets the heartbeat time between
    signals to the consumer coordinator. |

    | `spring.kafka.consumer.isolation-level` | Sets the isolation level for reading
    messages that have been written transactionally. The default is `READ_UNCOMMITTED`.
    |

    | `spring.kafka.consumer.key-deserializer` | Sets the deserializer for the keys;
    the default is `StringDeserializer`. |

    | `spring.kafka.consumer.value-deserializer` | Sets the deserializer for the values;
    the default is `StringDeserializer`. |

    | `spring.kafka.consumer.max-poll-records` | Sets the maximum number of records
    to return in a single call to `poll()`. |

    | `spring.kafka.consumer.properties` | Sets the additional consumer-specific properties
    used to configure the client. |

    | `spring.kafka.consumer.security.protocol` | Sets the security protocol to use
    when communicating with the Kafka broker. |

    | `Spring.kafka.consumer.ssl.*` | Sets the SSL configuration used for connecting
    to the Kafka broker, used to set keystore, trust store, etc. |


    To configure the producing side of the Kafka support, you can add the `spring.kafka.producer`
    properties to your configuration (Table [8-16](#464036_2_En_8_Chapter.xhtml#Tab16)).


    Table 8-16


    Kafka Producer Properties


    | Property | Description |

    | --- | --- |

    | `spring.kafka.producer.acks` | Sets the number of acks needed by the producer
    from the broker to consider a request complete. |

    | `spring.kafka.producer.batch-size` | Sets the default batch size. |

    | `spring.kafka.producer.bootstrap-servers` | Sets the comma-separated list of
    addresses to which the client should connect. This overrides the global setting.
    |

    | `spring.kafka.producer.buffer-memory` | Sets the total memory size the producer
    is allowed to use for buffering records waiting to be sent to the server. |

    | `spring.kafka.producer.client-id` | Sets the ID to pass to the server when making
    requests; used in server logging. |

    | `spring.kafka.producer.compression-type` | Sets the compression type for all
    data generated by the producer. |

    | `spring.kafka.producer.key-deserializer` | Sets the deserializer for the keys;
    the default is `StringDeserializer`. |

    | `spring.kafka.producer.value-deserializer` | Sets the deserializer for the values;
    the default is `StringDeserializer`. |

    | `spring.kafka.producer.retries` | Sets the number of allowed retries; the default
    is `0`. |

    | `spring.kafka.producer.transaction-id-prefix` | When nonempty, this enables
    transaction support for the producer. |

    | `spring.kafka.producer.properties` | Sets the additional producer-specific properties
    used to configure the client. |

    | `spring.kafka.producer.security.protocol` | Sets the security protocol to use
    when communicating with the Kafka broker. |

    | `Spring.kafka.producer.ssl.*` | Sets the SSL configuration used for connecting
    to the Kafka broker; used to set keystore, trust store, etc. |


    When adding the minimal configuration (Listing [8-35](#464036_2_En_8_Chapter.xhtml#PC41))
    and the needed dependencies, Kafka auto-configuration will kick in. It will automatically
    connect to the Kafka server and configure `KafkaTemplate` and the needed beans
    to enable `@KafkaListener`. The default (and most basic configuration) is to allow
    for sending and receiving `String`-based messages.


    ## 8-8\. Send Messages Using Spring Kafka


    ### Problem


    You want to send a message to a Kafka server so that the messages can be delivered
    to the receiver.


    ### Solution


    Using `KafkaTemplate`, you can send messages to a topic and provide a key.


    ### How It Works


    Spring Boot automatically configures a `KafkaTemplate` instance when Kafka is
    available and configured.


    #### Configure the KafkaTemplate


    Spring Boot will automatically configure a `KafkaTemplate` instance if no `KafkaTemplate`
    exists in the configuration. Spring Boot allows you to modify the configured `KafkaTemplate`
    instance through properties in the `spring.kafka.template` namespace (see Table
    [8-17](#464036_2_En_8_Chapter.xhtml#Tab17)).


    Table 8-17


    KafkaTemplate Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.kafka.template.default-topic` | Sets the name of the default topic to
    use for send operations; the default is none. |

    | `spring.kafka.template.transaction-id-prefix` | Sets the transaction ID prefix;
    overrides the transaction ID specified in the producer configuration. |'
  trans: '

    ### 工作原理


    当 Spring Boot 在类路径上检测到 Spring Kafka 和 Kafka 库时，它会自动创建一个 `ConnectionFactory` 实例。要开始使用，你需要添加
    `spring-kafka` 依赖。这将引入所有必需的依赖项。请参见清单 8-36。


    ```

    org.springframework.kafka

    spring-kafka


    清单 8-36

    Spring Kafka 依赖

    ```


    ![](img/464036_2_En_8_Fige_HTML.gif)信息图标。本示例使用 Spring Boot Docker Compose 支持来启动
    Kafka，因此还需要依赖 `spring-boot-docker-compose`。


    现在，你可以使用 `spring.kafka` 属性连接到代理。请参见清单 8-37。


    ```

    spring.kafka.bootstrap-servers=localhost:9092

    清单 8-37

    连接和接收消息所需的最小 Spring Kafka 属性

    ```


    此配置是连接到 Kafka 容器并通过 Kafka 发送和接收消息所需的全部内容。表 8-14 描述了可以设置的全局 Kafka 属性。在 `spring.kafka.consumer`
    和 `spring.kafka.producer` 命名空间中，你可以分别设置 Kafka 消费者（表 8-15）或生产者（表 8-16）的相应属性。


    表 8-14


    通用 Kafka 属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.kafka.bootstrap-servers` | 客户端应连接的地址列表，以逗号分隔 |

    | `spring.kafka.client-id` | 发起请求时传递给服务器的 ID，主要用于服务器端日志记录 |

    | `spring.kafka.properties` | 生产者和消费者通用的附加属性，用于配置客户端 |


    要配置 Kafka 支持的接收端，你可以将 `spring.kafka.consumer` 属性添加到配置中（表 8-15）。


    表 8-15


    Kafka 消费者属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.kafka.consumer.auto-commit-interval` | 如果 `enable-auto-commit` 为 `true`，则设置消费者偏移量提交到
    Kafka 的频率。 |

    | `spring.kafka.consumer.auto-offset-reset` | 设置当 Kafka 中没有初始偏移量或当前偏移量不再可用时的处理方式。
    |

    | `spring.kafka.consumer.bootstrap-servers` | 客户端应连接的地址列表，以逗号分隔。这会覆盖全局设置。 |

    | `spring.kafka.consumer.client-id` | 设置发起请求时传递给服务器的 ID；用于服务器日志记录。 |

    | `spring.kafka.consumer.enable-auto-commit` | 设置是否应自动提交偏移量。 |

    | `spring.kafka.consumer.fetch-max-wait` | 设置响应获取请求之前的阻塞时间。 |

    | `spring.kafka.consumer.fetch-min-size` | 设置服务器对获取请求应返回的最小数据量。 |

    | `spring.kafka.consumer.group-id` | 设置用于标识消费者组的唯一字符串；这是必需的！ |

    | `spring.kafka.consumer.heartbeat-interval` | 设置向消费者协调器发送信号之间的心跳时间。 |

    | `spring.kafka.consumer.isolation-level` | 设置读取事务性写入消息的隔离级别。默认值为 `READ_UNCOMMITTED`。
    |

    | `spring.kafka.consumer.key-deserializer` | 设置键的反序列化器；默认值为 `StringDeserializer`。
    |

    | `spring.kafka.consumer.value-deserializer` | 设置值的反序列化器；默认值为 `StringDeserializer`。
    |

    | `spring.kafka.consumer.max-poll-records` | 设置单次调用 `poll()` 返回的最大记录数。 |

    | `spring.kafka.consumer.properties` | 设置用于配置客户端的其他消费者特定属性。 |

    | `spring.kafka.consumer.security.protocol` | 设置与 Kafka 代理通信时使用的安全协议。 |

    | `Spring.kafka.consumer.ssl.*` | 设置用于连接 Kafka 代理的 SSL 配置，用于设置密钥库、信任库等。 |


    要配置 Kafka 支持的生产端，你可以将 `spring.kafka.producer` 属性添加到配置中（表 8-16）。


    表 8-16


    Kafka 生产者属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.kafka.producer.acks` | 设置生产者需要从代理收到的确认数，以认为请求完成。 |

    | `spring.kafka.producer.batch-size` | 设置默认批次大小。 |

    | `spring.kafka.producer.bootstrap-servers` | 设置客户端应连接的地址列表，以逗号分隔。这会覆盖全局设置。 |

    | `spring.kafka.producer.buffer-memory` | 设置生产者允许用于缓冲等待发送到服务器的记录的总内存大小。 |

    | `spring.kafka.producer.client-id` | 设置发起请求时传递给服务器的 ID；用于服务器日志记录。 |

    | `spring.kafka.producer.compression-type` | 设置生产者生成的所有数据的压缩类型。 |

    | `spring.kafka.producer.key-deserializer` | 设置键的反序列化器；默认值为 `StringDeserializer`。
    |

    | `spring.kafka.producer.value-deserializer` | 设置值的反序列化器；默认值为 `StringDeserializer`。
    |

    | `spring.kafka.producer.retries` | 设置允许的重试次数；默认值为 `0`。 |

    | `spring.kafka.producer.transaction-id-prefix` | 当非空时，为生产者启用事务支持。 |

    | `spring.kafka.producer.properties` | 设置用于配置客户端的其他生产者特定属性。 |

    | `spring.kafka.producer.security.protocol` | 设置与 Kafka 代理通信时使用的安全协议。 |

    | `Spring.kafka.producer.ssl.*` | 设置用于连接 Kafka 代理的 SSL 配置；用于设置密钥库、信任库等。 |


    当添加最小配置（清单 8-35）和所需的依赖项时，Kafka 自动配置将启动。它将自动连接到 Kafka 服务器，并配置 `KafkaTemplate` 以及启用
    `@KafkaListener` 所需的 Bean。默认（也是最基本）的配置是允许发送和接收基于 `String` 的消息。


    ## 8-8\. 使用 Spring Kafka 发送消息


    ### 问题


    你想向 Kafka 服务器发送消息，以便消息能够传递给接收者。


    ### 解决方案


    使用 `KafkaTemplate`，你可以向主题发送消息并提供键。


    ### 工作原理


    当 Kafka 可用并已配置时，Spring Boot 会自动配置一个 `KafkaTemplate` 实例。


    #### 配置 KafkaTemplate


    如果配置中不存在 `KafkaTemplate`，Spring Boot 将自动配置一个 `KafkaTemplate` 实例。Spring Boot 允许你通过
    `spring.kafka.template` 命名空间中的属性来修改已配置的 `KafkaTemplate` 实例（参见表 8-17）。


    表 8-17


    KafkaTemplate 配置属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.kafka.template.default-topic` | 设置用于发送操作的默认主题名称；默认值为无。 |

    | `spring.kafka.template.transaction-id-prefix` | 设置事务 ID 前缀；覆盖生产者配置中指定的事务 ID。
    |

