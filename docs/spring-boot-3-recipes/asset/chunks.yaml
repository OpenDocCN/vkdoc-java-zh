    ## 10-5\. 使用 Spring Boot GraalVM 原生镜像


    GraalVM 原生镜像是无需 Java 和其他依赖即可运行的单文件可执行程序。它们是通过提前编译 Java 应用程序生成的，而不是像 JVM 那样即时编译。这些原生镜像通常体积更小、内存占用更低，并且启动速度更快。原生镜像是特定于平台的可执行文件；在这些环境中无需包含
    JVM。


    原生镜像非常适合在容器化环境中运行，尤其是在使用 AWS Lambda 等函数即服务（FaaS）时。


    然而，使用原生镜像也存在一些缺点。


    *   类路径是固定的，需要在构建时完全定义。


    *   应用程序中定义的 Bean 在运行时无法更改。


    *   原生镜像不支持 `@Profile`；需要在构建时指定要运行的 profile。


    *   依赖于 `Environment` 的 `@Conditional` Bean 仅在构建时可用。


    *   定义为 Lambda 表达式或方法引用的 Bean 定义无法使用。


    所有这些限制都源于 GraalVM 在封闭世界中运行的事实，这意味着运行时所需的所有类和字节码都必须在构建时存在。通过使用 Spring 提前（AOT）处理，我们可以帮助
    GraalVM 全面清晰地了解需要哪些类和字节码。Spring 本身已经尽力提供了尽可能多的信息，但我们也可以通过提供额外的元数据和信息来为 AOT 处理提供一些帮助。


    ### 问题


    您希望为 Spring Boot 应用程序创建一个原生可执行文件。


    ### 解决方案


    Spring Boot 可以利用 Maven 和 Gradle 的 GraalVM 插件来创建原生镜像。对于 Maven，有一个特殊的 profile 可以添加额外的配置来生成正确的镜像。运行
    `mvn -Pnative native:compile` 将执行常规编译、AOT 处理，最后执行 GraalVM 编译器。


    #### 使用原生构建工具构建原生镜像


    要使用 Maven（或 Gradle）插件在本地机器上构建镜像，您需要安装 GraalVM 并在构建中包含该插件。请参见清单 10-15。


    ```

    org.graalvm.buildtools

    native-maven-plugin


    清单 10-15

    Maven GraalVM 插件

    ```


    完成此设置后，您可以运行 `mvn -Pnative native:compile`，应用程序将被构建、启动并分析，最终生成一个针对您编译平台的可执行文件。即使是这个简单的
    Hello World 应用程序，生成二进制文件也需要一些时间。


    ![](img/464036_2_En_10_Figh_HTML.gif)信息图标。 在撰写本文时，尚无法进行交叉编译，因此无法在 macOS 上创建 Windows
    可执行文件；您需要使用包含 Windows 和 GraalVM 的构建容器。


    生成的二进制文件可以在 `target` 目录中找到，名称为 `recipe_10_5_i`（即工件名称）。启动它将显示与 Java 方式运行相同的输出。唯一不同的是，它的启动速度会非常快。


    其中一些权衡是：更长的编译时间换来了更快的启动速度和更低的内存占用。


    #### 使用 Buildpacks 构建原生镜像


    构建原生镜像的另一种方法是使用 buildpack（另请参见配方 10-4）。使用 buildpack 时，您无需在本地系统上安装 GraalVM，因为它会作为镜像的一部分被下载。您需要在构建中包含
    GraalVM Maven 插件。请参见清单 10-16。


    ```

    org.graalvm.buildtools

    native-maven-plugin


    清单 10-16

    Maven GraalVM 插件

    ```


    要使用 buildpack，只需使用所需的 Maven profile 运行常规构建即可。只需运行 `mvn -Pnative spring-boot:build-image`。该过程完成后，您将获得一个包含原生可执行文件的容器镜像，可以使用
    Docker、K8S 或其他容器技术来运行它。

