    #### 发送对象


    要向 Kafka 发送消息，消息负载必须转换为 `byte[]`。对于 `String`，通过调用 `String.getBytes` 很容易实现。但是，发送对象时，这变得更加繁琐。默认的
    Spring Kafka 自动配置会设置基于 `String` 的消息发送。


    要能够发送其他类型的值，你需要为生产者配置一个 `Serializer`。这可以通过 `spring.kafka.producer.value-serializer`
    属性完成。其他配置可以通过 `spring.kafka.producer.properties` 命名空间传递。这里我们将设置 `JsonSerializer`，它会从传入的
    `Order` 对象创建 JSON。参见清单 8-40。


    ```

    spring.kafka.bootstrap-servers=localhost:9092 spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
    spring.kafka.properties.spring.json.trusted.packages=com.apress.springboot3recipes.order

    清单 8-40

    序列化器配置

    ```


    `spring.kafka.producer.value-serializer` 设置为 `JsonSerializer`；默认情况下，只允许发送少数几种类型。因此，设置
    `spring.json.trusted.packages` 将允许发送该包中的类。


    让我们创建一个 `Order` 并使用 `KafkaTemplate` 将其发送到 `orders` 主题。参见清单 8-41。


    ```

    package com.apress.springboot3recipes.order;

    import java.math.BigDecimal;

    public record Order (String id, BigDecimal amount) { }

