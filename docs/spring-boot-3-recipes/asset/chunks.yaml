    # 8. Spring Messaging


    The Spring Portfolio provides extensive support for integrating with various messaging
    systems. From a fairly simple JMS API to RabbitMQ and Kafka. Spring Boot provides
    auto-configuration when these frameworks and technologies are detected.


    ## 8-1. Configure JMS


    ### Problem


    You want to use JMS in a Spring Boot application and need to connect to the JMS
    broker.


    ### Solution


    Spring Boot supports auto-configuration for ActiveMQ and Artemis. By adding one
    of those libraries and setting some properties, the `spring.activemq` or `spring.artemis`
    namespace will be all you need.


    ### How It Works


    By declaring a dependency on the JMS provider of your choice, Spring Boot will
    automatically configure `ConnectionFactory` and enable a strategy to look up destinations,
    `DestinationResolver`, for your environment. This can also be done by using JNDI.
    Another solution is to do all the configuration yourself; this might be necessary
    if you need more control over the `ConnectionFactory` instance or want to use
    a non-auto-configured JMS provider.


    Adding dependencies for the supported JMS providers is pretty easy as Spring Boot
    provides starter projects for them. For JNDI, you need to include the JMS dependencies
    yourself.'
