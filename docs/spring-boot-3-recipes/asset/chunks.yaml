    ## 7-5\. 使用 Java Flight Recorder 调查应用程序启动


    ### 问题


    你想调查 Spring Boot 应用程序的启动过程，并确定可以使用 Java Flight Recorder (JFR) 改进哪些方面。JFR 是一种用于记录
    JVM 上正在运行的应用程序的诊断和性能分析信息的工具。它几乎不会带来性能开销，这使得它在几乎所有环境中都很有用。JFR 将收集关于其运行的 JVM 以及其运行的应用程序的数据。


    ### 解决方案


    核心 Spring 容器提供了一个 API 来监控应用程序上下文的设置和启动。这个 API，即 `ApplicationStartup` 接口，有一个实现
    `FlightRecorderApplicationStartup`，可用于发布 JFR 事件。但是，默认情况下 `ApplicationStartup`
    是一个空操作，不执行任何操作，因此你需要激活它。


    启用 `FlightRecorderApplicationStartup` 后，你还需要指示 JDK 记录 JFR 事件。最后，要调查这些事件，你需要一个像
    Java Mission Control 这样的工具。


    ### 工作原理


    首先，我们需要设置要使用的正确的 `ApplicationStartup` 实现。接下来，我们使用正确的命令行属性启动，最后，我们可以检查这些事件。

