- fmt: '### How It Works


    To make Recipe 3-1 into a deployable WAR, three things need to be done.


    1. Change the packaging from JAR to WAR.

    2. Extend `SpringBootServletInitializer` to bootstrap the application on deployment.

    3. Change the scope of the embedded server to `provided`.


    In the `pom.xml` file, change the packaging from JAR to WAR. See Listing [10-4](#464036_2_En_10_Chapter.xhtml#PC4).


    ```

    war

    Listing 10-4

    Create a WAR File with Maven

    ```


    To prevent the embedded container from adding its classes to the web application,
    the scope of the embedded container needs to be changed to `provided` instead
    of the default `compile`.


    When using an embedded Tomcat (the default), add Listing [10-5](#464036_2_En_10_Chapter.xhtml#PC5)
    to `pom.xml`.


    ```

    org.springframework.boot

    spring-boot-starter-tomcat

    provided


    Listing 10-5

    Scoped Dependency

    ```


    When using a different embedded container, see Recipe 3-7; then change the scope
    of that container to `provided` by including `<scope>provided</scope>`. When doing
    so, the Spring Boot plugin will not add the libraries to the default `WEB-INF/lib`.
    However, they will still be part of the created WAR file, but in the special `WEB-INF/lib-provided`
    directory. Spring Boot knows this location, and as such you can also use the WAR
    to start the embedded container. Starting an embedded container is very nice for
    development; however, as it is a WAR file, it is also deployable to a container
    like Tomcat of WebSphere.


    To make sure that the application will start, you need your application to extend
    `SpringBootServletInitializer`. This is a special class needed to bootstrap Spring
    Boot in a servlet or JEE container. See Listing [10-6](#464036_2_En_10_Chapter.xhtml#PC6).


    ```

    package com.apress.springboot3recipes.helloworld;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.boot.builder.SpringApplicationBuilder;

    import org.springframework.boot.web.servlet.support.SpringBootServletInitializer;

    @SpringBootApplication

    public class HelloWorldApplication extends SpringBootServletInitializer {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Override

    protected SpringApplicationBuilder configure(SpringApplicationBuilder builder)
    {

    return builder.sources(HelloWorldApplication.class);

    }

    }

    Listing 10-6

    SpringBootApplication with SpringBootServletInitializer

    ```


    When extending the `SpringBootServletInitializer`, you need to override the `configure`
    method. The `configure` method gets a `SpringApplicationBuilder`, which you can
    use to configure the application. One of the things to add is the main configuration
    class, just as with `SpringApplication.run`. That is what the line `builder.sources(HelloWorldApplication.class)`
    does. This will be used to bootstrap the application.


    For completeness, Listing [10-7](#464036_2_En_10_Chapter.xhtml#PC7) shows the
    controller.


    ```

    package com.apress.springboot3recipes.helloworld;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public String hello() {

    return "Hello World, from Spring Boot 3!";

    }

    }

    Listing 10-7

    HelloWorldController

    ```


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Figc_HTML.gif) A warning icon.
    When deploying something to a servlet or JakartaEE container, Spring Boot is no
    longer in control of the server. Therefore, configuration options from the `server`
    and `management.servlet` namespaces don’t apply anymore. So when `server.port`
    has been defined, it will be ignored when deploying to an external server.


    When the application has been deployed, it is no longer available at the root
    URL `/` as it would be when using the embedded server. It will be available at
    the `<name-of-war>` URL instead. Generally, it is something like `http://<name-of-server>:8080/<name-of-war>`
    to access the application.


    When deployed to a standard Tomcat installation and looking at the Management
    GUI, you will see a screen like that in Figure [10-1](#464036_2_En_10_Chapter.xhtml#Fig1).


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Fig1_HTML.jpg)


    A screenshot of the Tomcat Management GUI screen. The Tomcat web application manager
    has the options of list applications, HTML manager help, manager help, and server
    status. The path, version, display name, running, sessions, and commands of applications
    are displayed on the screen.


    Figure 10-1

    Tomcat Management GUI


    Click the `/spring-mvc-as-war` link to open the application (see Figure [10-2](#464036_2_En_10_Chapter.xhtml#Fig2)).


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Fig2_HTML.jpg)


    A screenshot of the output window of the deployed application. The text on the
    screen reads, Hello World, from Spring Boot 3!


    Figure 10-2

    Result of deployed application


    ## 10-3. Reduce the Archive Size Through the Thin Launcher


    ### Problem


    Spring Boot by default generates a *fat JAR*, which is a JAR file with all the
    dependencies inside it. This has some obvious benefits as the JAR file is fully
    self-contained. However, the JAR size can grow considerably, and when using multiple
    applications, you might want to reuse already downloaded dependencies to reduce
    the overall footprint.


    ### Solution


    When packaging the application, you can specify a custom layout to use. This behavior
    can be changed by using a custom layout. One such custom layout is the Thin Launcher.
    This launcher will result in the dependencies to be downloaded before starting
    the application, instead of the dependencies packaged inside the application.'
