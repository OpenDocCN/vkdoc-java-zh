- fmt: '# Spring Boot Testcontainers Support


    To utilize the Testcontainers support during development time, a dependency on
    the `spring-boot-testcontainers` module is needed as well as the various Testcontainers
    modules (in this case for PostgreSQL). See also Recipe 2-3 for testing support.


    In this sample, we will use the PostgreSQL container and the JUnit Jupiter integration.
    As we are using PostgreSQL, we will also need the JDBC driver for this. See Listing
    [2-33](#464036_2_En_2_Chapter.xhtml#PC39).


    ```

    org.springframework.boot

    spring-boot-testcontainers

    test


    org.testcontainers

    junit-jupiter

    test


    org.testcontainers

    postgresql

    test


    org.postgresql

    postgresql

    runtime


    Listing 2-33

    Testcontainers Support Dependencies

    ```


    As we want to use Testcontainers, we need to add a Java configuration class containing
    our container definitions. In this case, it is just one as we need only PostgreSQL,
    but it can be as many as you need. The containers need to be Spring managed beans,
    accomplished by adding `@Bean` to the methods as well as with `@ServiceConnection`.
    The latter makes it visible to the Spring Testcontainers support, and it will
    extract the needed information for the container and make it available to the
    application. The information that will be extracted depends on the type of container.
    For our PostgreSQL container, it will be the information needed to configure a
    JDBC data source, like `spring.datasource.url`, `spring.datasource.username`,
    and `spring.datasource.password`. See Listing [2-34](#464036_2_En_2_Chapter.xhtml#PC40).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.test.context.TestConfiguration;

    import org.springframework.boot.testcontainers.service.connection.ServiceConnection;

    import org.springframework.context.annotation.Bean;

    import org.testcontainers.containers.PostgreSQLContainer;

    @TestConfiguration(proxyBeanMethods = false)

    public class TestContainersConfig {

    @Bean

    @ServiceConnection

    public PostgreSQLContainer postgres() {

    return new PostgreSQLContainer("postgres:15.2");

    }

    }

    Listing 2-34

    Testcontainers Java Configuration

    ```


    Next we can reuse the Spring Boot application class from the previous section
    (see Listing [2-31](#464036_2_En_2_Chapter.xhtml#PC37)). To use the Testcontainers
    support, we will need to add another class with a `main` method in the test directory.
    See Listing [2-35](#464036_2_En_2_Chapter.xhtml#PC41).


    > A bulb icon. When using this with Spring Boot Devtools (see Recipe 2-7), you
    might want to add the `@RestartScope` annotation. This will reuse and keep the
    container instead of stopping it and restart. This will also keep the data that
    is in the container between updates.


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.SpringApplication;

    public class TestDockerApplication {

    public static void main(String[] args) {

    SpringApplication.from(DockerApplication::main)

    .with(TestContainersConfig.class).run(args);

    }

    }

    Listing 2-35

    Spring Boot Testcontainers Main

    ```


    Notice that this class bears no annotations and just has a simple `main` method.
    In this method, we reference the `main` method of our actual `@SpringBootApplication`
    annotation class with the `from`. Next, we augment the configuration with our
    `TestContainersConfig.class` using the `with` method. Finally, we call `run` to
    start the actual application.


    A common way to define Testcontainers is to declare them as `static` fields in
    a class or interface. When you use an interface to define the container(s), you
    can reuse them between your tests and your specialized application runner. To
    reuse the interface-based definitions, you can use the `@ImportTestContainers`
    annotation on your configuration class. See Listing [2-36](#464036_2_En_2_Chapter.xhtml#PC42).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.testcontainers.service.connection.ServiceConnection;

    import org.testcontainers.containers.PostgreSQLContainer;

    import org.testcontainers.junit.jupiter.Container;

    public interface OurContainersConfig {

    @ServiceConnection

    @Container

    PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15.2");

    }

    Listing 2-36

    Testcontainers Definitions on Interface

    ```


    Now use the `@ImportTestContainers` annotation to reuse this interface. See Listing
    [2-37](#464036_2_En_2_Chapter.xhtml#PC43).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.test.context.TestConfiguration;

    import org.springframework.boot.testcontainers.context.ImportTestcontainers;

    @TestConfiguration(proxyBeanMethods = false)

    @ImportTestcontainers(OurContainersConfig.class)

    public class TestContainers2Config { }

    Listing 2-37

    Testcontainers Definitions on Interface

    ```


    ## 2-7. Use Spring Boot Devtools to Speed Up Development


    ### Problem


    You want to have fast feedback during development and not have to rebuild and
    restart the application.


    ### Solution


    You can use Spring Boot Devtools. Devtools allows you to detect classpath changes,
    and when a change is detected, it will restart the application. This restart will
    be much faster than a cold start. It will also set certain properties to values
    that make sense during development (such as disabling caching for Thymeleaf templates,
    including full error details in error responses). Table [2-6](#464036_2_En_2_Chapter.xhtml#Tab6)
    lists the properties with their default values as set by Spring Boot Devtools.
    If you want to disable these defaults, add `spring.devtools.add-properties` with
    the value of `false` to your `application.properties`.


    **Table 2-6** Spring Boot Devtools Default Properties


    | Property | Value | Description |

    | --- | --- | --- |

    | `server.error.include-binding-errors` | `always` | Show full info on binding
    errors. |

    | `server.error.include-message` | `always` | Include the custom error message
    in error response. |

    | `server.error.include-stacktrace` | `always` | Show full stacktrace in error
    response. |

    | `server.servlet.jsp.init-parameters.development` | `true` | JSP development
    parameter, allows reload. |

    | `server.servlet.session.persistent` | `true` | Persist session information during
    restarts. |

    | `spring.docker.compose.readiness.wait` | `only-if-started` | Wait for Docker
    containers to be ready. |

    | `spring.freemarker.cache` | `false` | Disable Freemarker template caching. |

    | `spring.graphql.graphiql.enabled` | `true` | Enable the GraphiQL UI. |

    | `spring.groovy.template.cache` | `false` | Disable Groovy template caching.
    |

    | `spring.h2-console.enabled` | `true` | Enable the H2 console, when available.
    |

    | `spring.mustache.servlet.cache` | `false` | Disable Mustache template cache.
    |

    | `spring.mvc.log-resolved-exception` | `true` | Log exceptions. |

    | `spring.reactor.netty.shutdown-quiet-period` | `0s` | Shut down Netty immediately
    instead of waiting. |

    | `spring.template.provider.cache` | `false` | Disable template caching. |

    | `spring.thymeleaf.cache` | `false` | Disable Thymeleaf template caching. |

    | `spring.web.resource.cache.period` | `0s` | Disable static resource caching.
    |

    | `spring.web.resource.chain.cache` | `0s` | Disable static resource caching.
    |'
