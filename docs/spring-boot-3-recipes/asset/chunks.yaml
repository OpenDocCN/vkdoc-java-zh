  trans: "\n#### 使用 OAuth2 进行身份验证\n\n除了手动存储密码和用户信息外，通常还会使用外部资源，主要通过 OAuth2 或 OpenID\
    \ Connect 实现。许多提供商都支持这种方式，例如 Google、Microsoft 和 GitHub，以及像 Keycloak 和 Okta 这样专注于安全的公司。在本部分中，我们将使用\
    \ GitHub。\n\n首先，在 GitHub 上注册一个新的 OAuth 应用程序（见图 5-4）。确保主页 URL 和授权回调 URL 与此图像中的一致。\n\
    \n![](img/464036_2_En_5_Fig4_HTML.jpg)\n\n注册新 OAuth 应用程序页面的截图。它显示了应用程序名称、主页 URL、应用程序描述、授权回调\
    \ URL，以及一个用于启用设备流的复选框。底部是注册应用程序和取消按钮。\n\n图 5-4\n\nGitHub OAuth 应用程序注册\n\n在下一页完成注册后，复制\
    \ `clientId` 并生成一个*密钥*，同时复制该密钥，因为配置中需要这些信息。见图 5-5。\n\n![](img/464036_2_En_5_Fig5_HTML.jpg)\n\
    \nSpring Boot 3 食谱页面的截图。客户端 ID 和生成新客户端密钥的选项被突出显示。\n\n图 5-5\n\nGitHub OAuth 应用程序注册，第\
    \ 2 页\n\n要在 Spring Security 中启用 OAuth 支持，你需要添加 `spring-boot-starter-oauth2-client`\
    \ 依赖项；这将引入必要的 Spring Security 和 OAuth 依赖项。见清单 5-27。\n\n```\norg.springframework.boot\n\
    spring-boot-starter-oauth2-client\n\n清单 5-27\nSpring Security OAuth2 客户端启动器依赖项\n\
    ```\n\n现在，Spring Boot 中的这个依赖项会自动检测相关类，并在提供正确配置时设置 OAuth2 身份验证。要进行配置，我们需要向 Spring\
    \ Security 提供来自 GitHub OAuth 应用程序的 `clientId` 和 `secret`。见清单 5-28。\n\n```\nspring:\n\
    security:\noauth2:\nclient:\nregistration:\ngithub:\nclient-id: \nclient-secret:\
    \  \n清单 5-28\nSpring Security OAuth2 客户端配置\n```\n\n这里一个重要的部分是配置中的 `github` 名称。Spring\
    \ Security 会自动为某些提供商配置正确的身份验证 URL，GitHub 就是其中之一。开箱即用的支持提供商包括 GitHub、Google、Facebook\
    \ 和 Okta。对于这些提供商，`authorizationUri` 会被自动设置。这是你将被重定向以进行身份验证的 URL。\n\n当然，如果需要，也可以完全自定义\
    \ URL 或从 OAuth 提供商检索的信息。对于本场景，默认设置就足够了。\n\n现在，启动应用程序并尝试访问 `http://localhost:8080/books`，你将被重定向到\
    \ GitHub，并被要求登录（如果你尚未登录）并批准之前注册的应用程序的访问权限。如果你批准，你将被重定向回应用程序，并看到书籍列表。\n\n#### 加密密码\n\
    \n到目前为止，你一直以明文密码的形式存储用户详细信息。但这种方法容易受到黑客攻击，因此你应该在存储密码之前对其进行加密。Spring Security 支持多种加密密码的算法。例如，你可以选择\
    \ BCrypt（一种单向哈希算法）来加密你的密码。\n\n![](img/464036_2_En_5_Figg_HTML.gif)一个信息图标，圆圈内有一个字母\
    \ i。你可能需要一个辅助工具来计算密码的 BCrypt 哈希值。你可以通过在线方式完成，例如 [`https://www.dailycred.com/article/bcrypt-calculator`](https://www.dailycred.com/article/bcrypt-calculator)，或者你可以简单地创建一个包含\
    \ `main` 方法的类，使用 Spring Security 的 `BCryptPasswordEncoder`。另一种不常用的方法是安装 Spring\
    \ Boot CLI 并使用它来生成哈希值。\n\n当然，你必须在数据库表中存储加密后的密码，而不是明文密码，如表 5-7 所示。为了在密码字段中存储 BCrypt\
    \ 哈希值，该字段的长度必须至少为 68 个字符（这是 BCrypt 哈希值的长度加上加密类型 `{bcrypt}` 的长度）。\n\n表 5-7\n\n\
    USERS 表中使用加密密码的用户数据\n\n| USERNAME | PASSWORD | ENABLED |\n| --- | --- | --- |\n\
    | `admin@ya2do.io` | `{bcrypt}$2a$10$E3mPTZb50e7sSW15fDx8Ne7hDZpfDjrmMPTTUp8wVjLTu.G5oPYCO`\
    \ | `1` |\n| `marten@ya2do.io` | `{bcrypt}$2a$10$5VWqjwoMYnFRTTmbWCRZT.iY3WW8ny27kQuUL9yPK1/WJcPcBLFWO`\
    \ | `1` |\n| `jdoe@does.net` | `{bcrypt}$2a$10$cFKh0.XCUOA9L.in5smIiO2QIOT8.6ufQSwIIC.AVz26WctxhSWC6`\
    \ | `0` |\n\n## 5-4\\. 做出访问控制决策\n\n### 问题\n\n在身份验证过程中，应用程序会为成功通过身份验证的用户授予一组权限。当该用户尝试访问应用程序中的资源时，应用程序必须根据授予的权限或其他特征来决定该资源是否可访问。\n\
    \n### 解决方案\n\n关于是否允许用户访问应用程序中资源的决策称为*访问控制决策*。它基于用户的身份验证状态以及资源的性质和访问属性。\n"
- fmt: '### How It Works


    With Spring Security, it is possible to use Spring''s Expression Language (`SpEL`)
    to create powerful access control rules. Spring Security supports a couple of
    expressions out of the box (see Table 5-8 for a list). Using constructs such as
    `and`, `or`, and `not`, you can create very powerful and flexible expressions.


    **Table 5-8** Spring Security Built-in Expressions


    | Expression | Description |

    | --- | --- |

    | `hasRole(''role'')` or `hasAuthority(''authority'')` | Returns `true` if the
    current user has the given role |

    | `hasAnyRole(''role1'',''role2'')` or `hasAnyAuthority(''auth1'',''auth2'')`
    | Returns `true` if the current user has at least one of the given roles |

    | `hasIpAddress(''ip-address'')` | Returns `true` if the current user has the
    given IP address. |

    | `principal` | The current user |

    | `authentication` | Access to the Spring Security authentication object |

    | `permitAll()` | Always evaluates to `true` |

    | `denyAll()` | Always evaluates to `false` |

    | `isAnonymous()` | Returns `true` if the current user is anonymous |

    | `isRememberMe()` | Returns `true` if the current user logged in by the means
    of remember-me functionality |

    | `isAuthenticated()` | Returns `true` if this is not an anonymous user |

    | `isFullyAuthenticated()` | Returns `true` if the user is not an anonymous or
    a remember-me user |

    | `access()` | Use a function to determine whether access is granted |


    An abstract of a fire. Although role and authority are almost the same, there
    is a slight, but important, difference in how they are processed. When using `hasRole`,
    the passed-in value for the role will be checked if it starts with `ROLE_` (the
    default role prefix). If not, this will be added before checking the authority.
    So, `hasRole(''ADMIN'')` will actually check if the current user has the authority
    `ROLE_ADMIN`. When using `hasAuthority`, it will check the value as is.


    The previous expression would give access to deletion of a book if someone had
    the `ADMIN` role or was logged in on the local machine. Writing such an expression
    can be done through the `access` method instead of one of the `has*` methods when
    defining a matcher. See Listing 5-29.


    ```

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    @Override

    public SecurityFilterChain securityFilterChain(HttpSecurity http) throws Exception
    {

    http

    .authorizeRequests()

    .requestMatchers(HttpMethod.GET, "/books*")

    .hasAnyRole("USER", "GUEST")

    .requestMatchers(HttpMethod.POST, "/books*")

    .hasRole("USER")

    .requestMatchers(HttpMethod.DELETE, "/books*")

    .access("hasRole(''ADMIN'') or hasIpAddress(''127.0.0.1'') " +

    "or hasIpAddress(''0:0:0:0:0:0:0:1'')");

    return http.build();

    }

    }

    ```


    **Listing 5-29** Spring Security with Access Rules


    ### Use an Expression to Make Access Control Decisions Using Spring Beans


    Using the `@` syntax in the expression, you can call any bean in the application
    context. So, you could write an expression like `@accessChecker.hasLocalAccess(authentication)`
    and provide a bean named `accessChecker`, which has a `hasLocalAccess` method
    that takes an `Authentication` object. See Listing 5-30.


    ```

    package com.apress.springboot3recipes.library.security;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.web.authentication.WebAuthenticationDetails;

    import org.springframework.stereotype.Component;

    @Component

    public final class AccessChecker {

    public boolean hasLocalAccess(Authentication auth) {

    boolean access = false;

    if (auth.getDetails() instanceof WebAuthenticationDetails details) {

    String address = details.getRemoteAddress();

    access = address.equals("127.0.0.1") || address.equals("0:0:0:0:0:0:0:1");

    }

    return access;

    }

    }

    ```


    **Listing 5-30** AccessChecker Source


    Next you can use this `AccessChecker` in an `access` method using `SpEL`. See
    Listing 5-31.


    ```

    @Bean

    public SecurityFilterChain securityFilterChain(HttpSecurity http) throws Exception
    {

    http

    .authorizeRequests()

    .requestMatchers(HttpMethod.GET, "/books*").hasAnyRole("USER", "GUEST")

    .requestMatchers(HttpMethod.POST, "/books*").hasRole("USER")

    .requestMatchers(HttpMethod.DELETE, "/books*")

    .access("hasRole(''ADMIN'') or @accessChecker.hasLocalAccess(authentication)");

    return http.build();

    }

    ```


    **Listing 5-31** Spring Security with Access Rules Using AccessChecker


    ### Secure Methods with Annotations and Expressions


    You can use the `@PreAuthorize` and `@PostAuthorize` annotations to secure method
    invocations instead of only securing URLs. With these annotations you can write
    security-based expressions just as with the URL-based security. To enable the
    annotation processing, add the `@EnableMethodSecurity` annotation to the security
    configuration. See Listing 5-32.


    ```

    @Configuration

    @EnableMethodSecurity

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    }

    ```


    **Listing 5-32** Security Configuration with Method Security


    Now you can use the `@PreAuthorize` annotation to secure your application. See
    Listing 5-33.


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.security.access.prepost.PreAuthorize;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    @PreAuthorize("isAuthenticated()")

    public Iterable findAll() {

    return books.values();

    }

    @PreAuthorize("hasAuthority(''USER'')")

    public Book create(Book book) {

    books.put(book.isbn(), book);

    return book;

    }

    @PreAuthorize("hasAuthority(''ADMIN'') " +

    "or @accessChecker.hasLocalAccess(authentication)")

    public void remove(Book book) {

    books.remove(book.isbn());

    }

    public Optional find(String isbn) {

    return Optional.ofNullable(books.get(isbn));

    }

    }

    ```


    **Listing 5-33** InMemoryBookService with Authorization Rules


    The `@PreAuthorize` annotation will trigger Spring Security to validate the expression.
    If it is successful, then access is granted; otherwise, an exception will be thrown
    that tells the user that access is not granted.


    ## Add Security to a WebFlux Application


    ### Problem


    You have an application built with Spring WebFlux (see Chapter 4) and you want
    to secure it using Spring Security.


    ### Solution


    When adding Spring Security as a dependency to a WebFlux-based application, Spring
    Boot will automatically enable security. It will add an `@EnableWebFluxSecurity`
    configuration class to the application. The `@EnableWebFluxSecurity` annotation
    then imports the default Spring Security configuration called `WebFluxSecurityConfiguration`.'
