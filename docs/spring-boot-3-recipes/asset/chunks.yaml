    #### 创建自签名证书


    Java 自带一个名为 `keytool` 的工具，可用于生成证书等操作。参见清单 4-32。


    ```

    keytool -genkey -keyalg RSA -alias sb3-recipes -keystore sb3-recipes.pfx -storepass
    password -validity 3600 -keysize 4096 -storetype pkcs12

    清单 4-32

    keytool 命令

    ```


    该命令将指示 `keytool` 使用 RSA 算法生成一个密钥，并将其放入别名为 `sb3-recipes`、名为 `sb3-recipes.pfx` 的密钥库中，证书有效期为
    3600 天。运行该命令时，会询问一些问题，请相应作答（或留空）。之后，会生成一个名为 `sb3-recipes.pfx` 的文件，其中包含受密码保护的证书。


    将此文件放入 `src/main/resources` 文件夹，以便它作为应用程序的一部分被打包，并且 Spring Boot 可以轻松访问它。


    ![](img/464036_2_En_4_Figi_HTML.gif)一个三角形抽象图形内含一个感叹号符号，类似于警告图标。 使用自签名证书会在浏览器中产生警告，提示该网站不安全或未受保护。


    #### 配置 Spring Boot 使用密钥库


    Spring Boot 需要知道密钥库的位置，才能配置嵌入式容器。为此，首先创建一个所谓的 SSL 捆绑包，并使用 `server.ssl.bundle`
    属性将其链接到服务器。


    为此，请使用 `server.ssl.keystore` 属性。你还需要指定密钥库的类型（`pkcs12`）和密码。参见清单 4-33。


    ```

    server.ssl.bundle=server

    # SSL 捆绑包

    spring.ssl.bundle.jks.server.key.alias=sb3-recipes

    spring.ssl.bundle.jks.server.key.password=password

    spring.ssl.bundle.jks.server.keystore.location=classpath:sb3-recipes.pfx

    spring.ssl.bundle.jks.server.keystore.password=password

    spring.ssl.bundle.jks.server.keystore.type=pkcs12

    清单 4-33

    SSL 属性

    ```


    这些 SSL 属性将创建一个名为 `server` 的 SSL 捆绑包。它是 JKS 类型。要传递别名（用于创建证书时使用的别名），请使用 `key.alias`
    属性；对于密码，请使用 `key.password` 属性。此外，我们需要链接到实际的证书，该证书位于 `sb3-recipes.pfx` 文件中。为此，请使用
    `keystore.location`，因为此文件受密码保护。我们需要指定 `keystore.password` 属性，最后还需要指定证书的类型。


    现在，当通过 HTTPS 访问服务器时，由于自签名证书，你会收到一个警告。当使用官方证书时，显然不会收到此警告。参见图 4-9。


    ![](img/464036_2_En_4_Fig9_HTML.jpg)


    本地主机页面的截图。它列出了可用的书籍，包括标题、作者和 ISBN。由于自签名证书，通过 HTTP 服务器访问本地主机时会显示警告。


    图 4-9


    通过 HTTPS 访问的图书馆


    ## 4-9\. 使用控制器和 TaskExecutor 执行同步请求处理


    ### 问题


    你有一段阻塞代码，希望在一个完全响应式的堆栈中执行它，并且不希望阻塞所有处理过程。


    ### 解决方案


    当请求到来时，它通过事件循环以响应式方式处理。当调用会阻塞的代码时，它会阻塞事件循环并阻止进一步的处理。Spring WebFlux 可以为那些否则会阻塞事件循环的进程使用专用的
    `TaskExecutor`。

    '
- fmt: '### How It Works


    To configure parts of Spring WebFlux, you can use the `WebFluxConfigurer` interface.
    To configure the dedicated `AsyncTaskExecutor` (which generally is a Spring-managed
    `AsyncTaskExecutor`), override and implement the `configureBlockingExecution`
    method. See Listing [4-34](#464036_2_En_4_Chapter.xhtml#PC38).


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.boot.task.SimpleAsyncTaskExecutorBuilder;

    import org.springframework.context.annotation.Configuration;

    import org.springframework.web.reactive.config.BlockingExecutionConfigurer;

    import org.springframework.web.reactive.config.WebFluxConfigurer;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Configuration

    public static class WebFluxConfiguration implements WebFluxConfigurer {

    private final SimpleAsyncTaskExecutorBuilder builder;

    public WebFluxConfiguration(SimpleAsyncTaskExecutorBuilder builder) {

    this.builder = builder;

    }

    @Override

    public void configureBlockingExecution(BlockingExecutionConfigurer configurer)
    {

    configurer.setExecutor(builder.threadNamePrefix("blocking-").build());

    }

    }

    }

    Listing 4-34

    Spring Boot Application with WebFluxConfigurer

    ```


    The inner class `WebFluxConfiguration` implements the `WebFluxConfigurer` interface,
    and here we override `configureBlockingExecution`. We are using `SimpleAsyncTaskExecutorBuilder`
    to create an `AsyncTaskExecutor` instance. Using `SimpleAsyncTaskExecutorBuilder`,
    we can use properties to do some default configuration through application properties
    (see Recipe 7-1 for more information). We could have created a new `AsyncTaskExecutor`,
    like `SimpleAsyncTaskExecutor` or `VirtualThreadTaskExecutor` as well.


    Using `SimpleAsyncTaskExecutorBuilder`, we set the thread prefix, build the executor,
    and pass it to `BlockingExecutionConfigurer`. This way, it is automatically detected
    by Spring WebFlux. Now any nonreactive return type (anything other than the types
    from Project Reactor, RxJava, Java Flow, or SmallRye Mutiny) will be executed
    using this executor. See Listing [4-35](#464036_2_En_4_Chapter.xhtml#PC39).


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Mono;

    @RestController

    public class HelloWorldController {

    @GetMapping("/blocking")

    public String hello() {

    return sayHello();

    }

    @GetMapping("/reactive")

    public Mono helloReactive() {

    return Mono.just(sayHello());

    }

    private static String sayHello() {

    var version = SpringBootVersion.getVersion();

    var thread = Thread.currentThread().getName();

    return String.format("Hello World, from Spring Boot %s on Thread ''%s''!"

    , version, thread);

    }

    }

    Listing 4-35

    HelloWorldController with Blocking and Reactive Handling

    ```


    `HelloWorldController` has two methods. The one bound to `/blocking` returns a
    regular `String`, whereas the one bound to `/reactive` returns a `Mono<String>`,
    which is a reactive type.


    Now when launching the application and calling the endpoints using `HTTPie`, `curl`,
    or a browser, you should be able to see what is happening as it will return the
    name of the thread it executed on (see Figure [4-10](#464036_2_En_4_Chapter.xhtml#Fig10)).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig10_HTML.jpg)


    A screenshot of the marten window. It reads a set of program codes that launches
    the application, calls the endpoints using H T T P, and returns the name of the
    thread it executed on.


    Figure 4-10


    Blocking and reactive output


    Calling `/blocking` will be executed on a thread prefixed with `blocking`, indicating
    it is indeed executed by the configured `AsyncTaskExecutor`. The `/reactive` one
    is executed on one of the threads of the reactive framework in use (here Project
    Reactor).


    As we are using Spring Boot, it will automatically configure the blocking WebFlux
    execution for you. By default Spring Boot creates an `AsyncTaskExecutor` for use
    in various places in the application including the WebFlux blocking execution.
    This executor is configurable to various properties (see Recipe 7-1) and could
    even be switched to virtual threads by setting `spring.threads.virtual.enabled`
    to `true`. See Listing [4-36](#464036_2_En_4_Chapter.xhtml#PC40).


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    Listing 4-36

    Spring Boot Application Without Explicit WebFluxConfigurer

    ```


    Without any further configuration, the blocking execution will still happen.


    ## 4-10. Create Response Writers


    ### Problem


    You have a service, or multiple calls, and want to send the response in chunks
    to the client.


    ### Solution


    Spring WebFlux, like Spring MVC, does content negotiation. When it receives a
    content type that can be streamed, like `application/x-ndjson` and `text/event-stream`,
    it will switch to a codec that streams the result. For `text/event-stream`, we
    could use the `SseEventBuilder` to add additional information.


    ### How It Works


    Let’s talk about how it works.'
