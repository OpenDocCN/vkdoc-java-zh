    ## 6-7\. 使用 JPA 进行测试


    ### 问题


    你想要使用单元测试或小型集成测试来测试基于 JPA 的仓库。


    ### 解决方案


    使用 Spring Test Context 框架和 Spring Boot 测试支持，通过嵌入式容器（如 Apache Derby）编写单元测试，或使用
    Testcontainers 编写专门的集成测试。


    ### 工作原理


    在测试 JPA 代码时，需要数据库，通常使用嵌入式数据库（如 H2、Derby 或 HSQLDB）进行测试。Spring Boot 使得为 JPA 编写测试变得容易。基于
    JPA 的测试可以使用 `@DataJpaTest` 注解，Spring Boot 将创建一个仅包含 JPA 相关 bean 的最小化应用程序。相关的 bean
    包括 `DataSource`、事务管理器，以及（如果需要）Spring Data JPA 仓库。

