    ## 4-5. 实现国际化（I18N）


    ### 问题


    在开发国际化 Web 应用程序时，你需要以用户偏好的区域设置显示网页。你不想为不同的区域设置创建同一页面的不同版本。


    ### 解决方案


    为了避免为不同区域设置创建页面的不同版本，你应该通过外部化区域设置敏感的文本消息来使网页独立于区域设置。Spring 能够通过使用消息源（必须实现`MessageSource`接口）为你解析文本消息。在你的页面模板中，你可以使用特殊标签或查找消息。

    '
- fmt: '### How It Works


    Spring Boot automatically configures a `MessageSource` when it finds a `messages.properties`
    in `src/main/resources` (the default location). This `messages.properties` contains
    the default messages to be used in your application. Spring Boot will use the
    `Accept-Language` header from the request to determine which locale to use for
    the current request (see Recipe 4-6 for how to change that).


    Some properties change the way `MessageSource` reacts to missing translations,
    caching, etc. See Table [4-3](#464036_2_En_4_Chapter.xhtml#Tab3) for an overview
    of the properties.


    **Table 4-3** I18N Properties


    | Property | Description |

    | --- | --- |

    | `spring.messages.basename` | Comma-separated list of base names; the default
    is `messages`. |

    | `spring.messages.encoding` | Message bundle encoding; the default is `UTF-8`.
    |

    | `spring.messages.always-use-message-format` | Sets whether `MessageFormat` should
    be applied to all messages; the default is `false`. |

    | `spring.messages.fallback-to-system-locale` | Fallback to the system’s locale
    when no resource bundle for the detected locale can be found. When disabled, this
    will load the defaults from the default file. The default is `true`. |

    | `spring.messages.use-code-as-default-message` | Use the message code as a default
    message when no message can be found instead of throwing a `NoSuchMessageException`.
    The default is `false`. |

    | `spring.messages.cache-duration` | Cache duration; the default is forever. |


    > 💡 It can be useful to set `spring.messages.fallback-to-system-locale` to `false`
    when deploying your application to the cloud or other external hosting parties.
    That way, you control what the default language of your application is, instead
    of the (out of your control) environment you are deploying on.


    Add a `messages.properties` file to the `src/main/resources` directory. See Listing
    [4-22](#464036_2_En_4_Chapter.xhtml#PC25).


    ```

    main.title=Spring Boot Recipes - Library

    index.title=Library

    index.books.link=List of books

    books.list.title=Available Books

    books.list.table.title=Title

    books.list.table.author=Author

    books.list.table.isbn=ISBN

    ```


    **Listing 4-22** Default Messages


    Now change the templates to use message interpolation (the lookup of the text
    using the `MessageSource`). See Listing [4-23](#464036_2_En_4_Chapter.xhtml#PC26).


    ```

    Spring Boot Recipes - Library


    Library

    List of books

    ```


    **Listing 4-23** Index Page with I18N Support


    For Thymeleaf you can use an `#{...}` expression in the `th:text` attribute; this
    will (due to the automatic Spring integration) resolve the messages from the `MessageSource`.
    When restarting the application, it appears as if nothing has changed in the output.
    However, all the text now comes from `messages.properties`.


    Now let’s add a `messages_nl.properties` for the Dutch translation of the website.
    See Listing [4-24](#464036_2_En_4_Chapter.xhtml#PC27).


    ```

    main.title=Spring Boot Recipes - Bibliotheek

    index.title=Bibliotheek

    index.books.link=Lijst van boeken

    books.list.title=Beschikbare Boeken

    books.list.table.title=Titel

    books.list.table.author=Auteur

    books.list.table.isbn=ISBN

    ```


    **Listing 4-24** Dutch Messages


    Now when changing the accept header to Dutch, the website will magically translate
    to Dutch (see Figure [4-7](#464036_2_En_4_Chapter.xhtml#Fig7)).


    > 💡 Changing the language for your browser might not be that easy. For Chrome
    and Firefox there are plugins that allow you to switch the `Accept-Language` header
    easily.


    ## 4-6. Change User Locales


    ### Problem


    For your web application to support internationalization, you have to identify
    each user’s preferred locale and display the contents according to this locale.


    ### Solution


    In a Spring WebFlux application, a user’s locale is identified by a component
    that has to implement the `LocaleContextResolver` interface. Spring WebFlux comes
    with two `LocaleContextResolver` implementations for you to resolve locales with
    different criteria. Alternatively, you can create your own custom locale resolver
    by implementing this interface.


    You can define a locale resolver by registering a bean of type `LocaleContextResolver`
    in the web application context. You must set the bean name of the locale resolver
    to `localeContextResolver` so it can be autodetected.


    ### How It Works


    Spring WebFlux ships with several default implementations of the `LocaleContextResolver`
    interface, some of which allow the `Locale` to be changed. To change the `Locale`,
    one can use a `WebFilter` to allow users to override the locale they want to use.
    None of these is provided by Spring WebFlux (at least not at the moment of writing);
    hence, you will need to implement them yourself.


    #### Resolve Locales with an HTTP Request Header


    The default locale resolver registered by Spring Boot is `AcceptHeaderLocaleContextResolver`.
    It resolves locales by inspecting the `accept-language` header of an HTTP request.
    This header is set by a user’s web browser according to the locale setting of
    the underlying operating system. See Listing [4-25](#464036_2_En_4_Chapter.xhtml#PC28).


    > ℹ️ `AcceptHeaderLocaleContextResolver` cannot change a user’s locale because
    it is unable to modify the locale setting of the user’s operating system.


    ```

    @Bean

    public AcceptHeaderLocaleContextResolver localeContextResolver () {

    return new AcceptHeaderLocaleContextResolver();

    }

    ```


    **Listing 4-25** AcceptHeaderLocaleContextResolver Bean Definition


    #### Use a Fixed Locale for Your Application


    The other provided `LocaleContextResolver` is `FixedLocaleContextResolver`. It
    doesn’t actually resolve a `Locale` but rather returns a preconfigured one, which
    is why this resolvers is fixed. It doesn’t allow for the `Locale` to be changed
    as it is fixed to a single one. See Listing [4-26](#464036_2_En_4_Chapter.xhtml#PC29).


    ```

    @Bean

    public FixedLocaleContextResolver localeContextResolver () {

    return new FixedLocaleContextResolver(Locale.GERMANY);

    }

    ```


    **Listing 4-26** FixedLocaleContextResolver Bean Definition'
