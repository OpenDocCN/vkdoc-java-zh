    When using Artemis, the first thing to do is to include `spring-boot-starter-artemis`.
    This will pull in all the needed JMS and Artemis dependencies to get started.
    It will include the `spring-jms` dependency and the libraries for Artemis (see
    Table [8-3](#464036_2_En_8_Chapter.xhtml#Tab3)). See Listing [8-3](#464036_2_En_8_Chapter.xhtml#PC4).


    **Table 8-3** Artemis Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.artemis.broker-url` | Sets the Artemis broker URL. |

    | `spring.artemis.user` | Sets the username for connecting to the Artemis broker;
    the default is empty. |

    | `spring.artemis.password` | Sets the password for connecting to the Artemis
    broker; the default is empty. |

    | `spring.artemis.mode` | Sets the mode of operation, either `native` or `embedded`;
    the default is none, leading to auto-detection of the mode. When the embedded
    classes are found, it will run in embedded mode. |


    ```

    org.springframework.boot

    spring-boot-starter-artemis

    ```


    **Listing 8-3** Spring Boot Artemis Starter Dependency


    The following is a simple application to list all the beans with `jms` in their
    name. This should include a bean named `jmsConnectionFactory`.


    ```

    package com.apress.springboot3recipes.jms;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import java.util.Comparator;

    import java.util.stream.Stream;

    @SpringBootApplication

    public class JmsApplication {

    private static final String MSG = "\tName: %100s, Type: %s\n";

    public static void main(String[] args) {

    var ctx = SpringApplication.run(JmsApplication.class, args);

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Stream.of(names)

    .filter(name -> name.toLowerCase().contains("jms") || ctx.getType(name).getName().contains("jms"))

    .sorted(Comparator.naturalOrder())

    .forEach(name -> {

    var bean = ctx.getBean(name);

    System.out.printf(MSG, name, bean.getClass().getSimpleName());

    });

    }

    }

    ```


    When run, the output will look like Figure [8-2](#464036_2_En_8_Chapter.xhtml#Fig2).


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig2_HTML.jpg)


    An output of a simple application to list all the beans with `jms` in their name.
    The job application, `jmsConnectionFactory`, `jmsListenerContainerFactory`, `jmsListenerContainerFactoryConfigurer`,
    `jmsMessagingTemplate`, and `jmsTemplate` are in the output.


    **Figure 8-2** Artemis beans output


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Figa_HTML.gif) An information icon.
    You might wonder when using Artemis if there is still an `ActiveMQConnectionFactory`
    in your configuration. Artemis is based on ActiveMQ and as such shares classes
    with it.


    Artemis can be used in embedded mode (just like ActiveMQ); it will then start
    an embedded broker. To configure it, there are several properties exposed in the
    `spring.artemis.embedded` namespace. The embedded mode requires `artemis-jakarta-server`
    as an additional dependency (see Table [8-4](#464036_2_En_8_Chapter.xhtml#Tab4)).


    **Table 8-4** Artemis Embedded Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.artemis.embedded.enabled` | Sets whether embedded mode should be enabled;
    the default is `true`. |

    | `spring.artemis.embedded.persistent` | Sets whether messages are persisted;
    the default is `false`. |

    | `spring.artemis.embedded.data-directory` | Sets the directory used to store
    the journal; this is useful only when `persistent` is `true`. |

    | `spring.artemis.embedded.queues` | Comma-separated list of queues to create
    on startup. |

    | `spring.artemis.embedded.topics` | Comma-separated list of topics to create
    on startup. |

    | `spring.artemis.embedded.cluster-password` | Cluster password; the default is
    generated. |

    | `spring.artemis.embedded.server-id` | The ID of the server; the default is an
    autogenerated counter. |


    ```

    org.apache.activemq

    artemis-jakarta-server

    ```


    #### Use Artemis with a Connection Pool


    When using Artemis, it is also possible to use a pool of JMS connections (much
    like a JDBC-based connection pool). By default this is disabled. To enable and
    configure it, you can use the properties in the `spring.artemis.pool` namespace
    (see Table [8-5](#464036_2_En_8_Chapter.xhtml#Tab5)).


    **Table 8-5** ActiveMQ Pooling Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.artemis.pool.enabled` | Sets whether a connection pool should be used;
    the default is `false`. |

    | `spring.artemis.pool.max-connections` | Sets the maximum number of connections;
    the default is 1. |

    | `spring.artemis.pool.maximum-active-session-per-connection` | Sets the maximum
    number of active JMS sessions allowed per connection; the default is 500. |

    | `spring.artemis.pool.idle-timeout` | Sets how long a connection can be idle;
    the default is 30 seconds. |

    | `spring.artemis.pool.expiry-timeout` | Sets how long before a connection is
    expired; the default is 0 (never). |

    | `spring.artemis.pool.reconnect-on-exception` | Resets the connection when a
    `JMSException` occurs; the default is `true`. |

    | `spring.artemis.pool.block-if-full` | Blocks when a connection is requested
    or throws a `JMSException` instead; the default is `true`. |

    | `spring.artemis.pool.block-if-full-timeout` | Sets how long to block before
    throwing a `JMSException`; the default is -1 (which blocks until a connection
    is available). |

    | `spring.artemis.pool.create-connection-on-startup` | Sets whether a connection
    should be eagerly created on startup of the application; the default is `true`.
    |


    Using the pooling facility requires the `pooled-jms` dependency to be added to
    your build file. See Listing [8-4](#464036_2_En_8_Chapter.xhtml#PC7).


    ```

    org.messaginghub

    pooled-jms

    ```


    **Listing 8-4** JMS ConnectionPool Dependency


    When running the application again, you will notice that the type of the `ConnectionFactory`
    has changed to `PooledConnectionFactory`.


    #### Use JNDI


    When deploying a Spring Boot application to a JEE container, there is a big chance
    that you want to use a preregistered `ConnectionFactory` from that container as
    well. To enable this, you would need a dependency on the `spring-jms` library
    and the `jakarta.jms-api` (the latter can then probably be marked provided that
    it will be supplied by your JEE container). You could use one of the starters
    and exclude the explicit ActiveMQ or Artemis dependencies; however, declaring
    only the needed dependencies is easier and clearer. See Listing [8-5](#464036_2_En_8_Chapter.xhtml#PC8).


    ```

    org.springframework

    spring-jms


    jakarta.jms

    jakarta.jms-api

    ```


    **Listing 8-5** Bare JMS Dependencies


    When JNDI is available, Spring Boot will first try to detect `ConnectionFactory`
    in the JNDI register under one of the well-known names such as `java:/JmsXA` and
    `java:/XAConnectionFactory` or by the name specified in the `spring.jms.jndi-name`
    property. Furthermore, it will also automatically create a `JndiDestinationResolver`
    so that the queues and topics will also be detected in JNDI; by default a fallback
    to dynamic creation of destinations is allowed.


    ```

    spring.jms.jndi-name=java:/jms/connectionFactory

    ```


    With that in place and having built your artifact, you can now deploy your application
    to the JEE container and reuse the existing `ConnectionFactory`.'
