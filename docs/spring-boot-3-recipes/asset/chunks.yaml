    ```


    The controller uses the `WebClient` to call the URL. First we determine what type
    of request we want to make; this is a `get()` in our case. Next we specify the
    URL using the `uri()` method with the parameters we want. That finishes our request,
    which we can now execute through the `receive()` method. Finally, we map the response
    body using the `bodyToMono()` method.


    As this is a reactive implementation, this code doesn’t do anything yet. We need
    to combine the `Mono` results into a new result. For this we can use `zip`, extract
    both results (which will then execute them in parallel), and produce `EnrichedBook`.


    As the `WebClient` reuses parts of the same infrastructure as the rest of WebFlux,
    we can reuse the same exception handling we used earlier. When calling `http://localhost:8090/books/9780618260300`
    from the command line using `curl` or `HTTPie`, you will get output similar to
