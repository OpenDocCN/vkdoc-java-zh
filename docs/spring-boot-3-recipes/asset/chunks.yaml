    ## 8-7\. Configure Spring for Apache Kafka


    ### Problem


    You want to use Spring for Apache Kafka in a Spring Boot application and need
    to connect to the Kafka cluster.


    ### Solution


    Configure the appropriate `spring.kafka` properties (minimally `spring.kafka.bootstrap-servers`)
    to connect to the cluster and be able to send (or receive) messages.'
  trans: '

    #### 接收消息并发送回复


    当接收到消息时，可能需要向客户端发送响应或通过不同的消息进行通信；可以在非 void 方法上使用 `@RabbitListener`。它会创建一个结果消息，并将其放置到带有路由键的交换机上；这需要在
    `@SendTo` 注解中指定。请参见清单 8-34。


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    @SendTo("orders/order-confirmation")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.id());

    }

    }

    清单 8-34

    带回复的订单 Rabbit 监听器

    ```


    当接收到 `Order` 并处理它时，会发送一个 `OrderConfirmation`；`@SendTo` 注解（来自通用 Spring Messaging
    组件）包含交换机和路由键。`/` 之前的部分是交换机，之后的部分是路由键；因此，`<exchange>/<routing-key>` 是所使用的模式。交换机或路由键的值可以为空（或两者都为空）；在这种情况下，将使用默认配置的交换机和路由键。此处将使用
    `orders` 交换机，并将 `order-confirmation` 作为路由键。


    可以使用另一个监听器来处理 `OrderConfirmation` 消息。请参见清单 8-35。


    ```

    @Component

    class OrderConfirmationService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "order-confirmations"),

    key = "order-confirmation"

    ))

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    清单 8-35

    RabbitMQ 的 OrderConfirmationService

    ```


    它将使用 `order-confirmation` 路由键创建一个队列 `order-confirmations`，并将其绑定到 `orders` 交换机上（就像之前创建的
    `OrderService` 一样）。运行代码时，结合来自配方 8-4 的发送方，您应该会接收到 `Order` 实例，并看到它们也会被确认（图 8-9）。


    ![](img/464036_2_En_8_Fig9_HTML.jpg)


    Rabbit M Q 订单确认服务的输出。启动的 Rabbit 接收器应用程序使用 Java 21.0.1，P I D 33009，未设置活动配置文件，已创建新连接，启动的
    Rabbit 接收器应用程序耗时 1.941 秒，输出中包含接收到的订单 i d 和金额。


    图 8-9


    订单和确认的 RabbitMQ 监听器输出


    ## 8-7\. 为 Apache Kafka 配置 Spring


    ### 问题


    您希望在 Spring Boot 应用程序中使用 Spring for Apache Kafka，并且需要连接到 Kafka 集群。


    ### 解决方案


    配置适当的 `spring.kafka` 属性（至少需要 `spring.kafka.bootstrap-servers`）以连接到集群，并能够发送（或接收）消息。

    '
- fmt: "### How It Works\n\nSpring Boot will automatically create a `ConnectionFactory`\
    \ instance when it detects the Spring Kafka and Kafka libraries on the classpath.\
    \ To get started, you need to add the `spring-kafka` dependency. This will pull\
    \ in all the required dependencies. See Listing [8-36](#464036_2_En_8_Chapter.xhtml#PC42).\n\
    \n```xml\n<dependency>\n    <groupId>org.springframework.kafka</groupId>\n   \
    \ <artifactId>spring-kafka</artifactId>\n</dependency>\n```\n\n**Listing 8-36**\
    \ Spring Kafka Dependency\n\n> ℹ️ An information icon. This recipe uses the Spring\
    \ Boot Docker Compose support to bootstrap Kafka, so a dependency on `spring-boot-docker-compose`\
    \ is needed as well.\n\nNow you can use the `spring.kafka` properties to connect\
    \ to the broker. See Listing [8-37](#464036_2_En_8_Chapter.xhtml#PC43).\n\n```properties\n\
    spring.kafka.bootstrap-servers=localhost:9092\n```\n\n**Listing 8-37** Minimal\
    \ Spring Kafka Properties to Connect and Receive Messages\n\nThis configuration\
    \ is all that is needed to connect to the Kafka container and send and receive\
    \ messages through Kafka. Table [8-14](#464036_2_En_8_Chapter.xhtml#Tab14) describes\
    \ the global Kafka properties that can be set. In the `spring.kafka.consumer`\
    \ and `spring.kafka.producer` namespaces, you can set the respective properties\
    \ for Kafka Consumer (Table [8-15](#464036_2_En_8_Chapter.xhtml#Tab15)) or Producer\
    \ (Table [8-16](#464036_2_En_8_Chapter.xhtml#Tab16)).\n\n**Table 8-14** Common\
    \ Kafka Properties\n\n| Property | Description |\n| --- | --- |\n| `spring.kafka.bootstrap-servers`\
    \ | Comma-separated list of addresses to which the client should connect |\n|\
    \ `spring.kafka.client-id` | ID to pass to the server when making requests, mainly\
    \ used for server-side logging |\n| `spring.kafka.properties` | Additional properties,\
    \ common for the producer and consumer, used to configure the client |\n\nTo configure\
    \ the receiving side of the Kafka support, you can add the `spring.kafka.consumer`\
    \ properties to your configuration (Table [8-15](#464036_2_En_8_Chapter.xhtml#Tab15)).\n\
    \n**Table 8-15** Kafka Consumer Properties\n\n| Property | Description |\n| ---\
    \ | --- |\n| `spring.kafka.consumer.auto-commit-interval` | Sets the frequency\
    \ in which the consumer offsets are committed to Kafka, if `enable-auto-commit`\
    \ is `true`. |\n| `spring.kafka.consumer.auto-offset-reset` | Sets what to do\
    \ when there is no initial offset in Kafka or if the current offset is no longer\
    \ available. |\n| `spring.kafka.consumer.bootstrap-servers` | Is a comma-separated\
    \ list of addresses to which the client should connect. This overrides the global\
