    最后一种方法是使用命令行参数来覆盖属性。在上一节中，你已经使用了命令行参数 `--spring.profile.active=add` 来指定激活的配置文件。你也可以用同样的方式指定
    `lhs` 和其他参数。使用 `java -jar recipe_2_2-3.0.0.jar --lhs=22 --rhs=25 --op=+` 来运行应用程序；你会看到它根据通过命令行传入的参数进行计算（图
