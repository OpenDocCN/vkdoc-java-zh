    ### Use Spring Data JPA Repositories


    Instead of writing your own repositories, which can be a tedious and repetitive
    task, you can also let Spring Data JPA do the heavy lifting for you. Instead of
    writing your own implementation, you can extend the `CrudRepository` interface
    from Spring Data and have a repository available at runtime. This saves you from
    writing the data access code. Spring Boot will also autoconfigure Spring Data
    JPA when it detects it on the classpath (Listing [6-37](#464036_2_En_6_Chapter.xhtml#PC38)).


    ```

    package com.apress.springboot3recipes.jpa;

    import org.springframework.data.repository.CrudRepository;

    public interface CustomerRepository extends CrudRepository { }

    Listing 6-37

    Spring Data JPA-Based CustomerRepository

    ```


    That is all you need. The `findAll`, `findById`, and `save` methods, among others,
    are provided out of the box by Spring Data JPA. You can remove the `JpaCustomerRepository`
    implementation. Because of the `CrudRepository<Customer, Long>`, Spring Data knows
    that it can query for `Customer` instances and that it has a `Long` as an ID field.


    ### Include Entities from Different Packages


    By default Spring Boot will detect components, repositories, and entities starting
    from the package the `@SpringBootApplication` annotated class is in. But what
    if you have entities in a different package that still need to be included? For
    this you can use the `@EntityScan` annotation; it works like `@ComponentScan`
    but is for `@Entity` annotated beans.


    First let’s add an entity in a different package, like an `Order` entity (Listing
    [6-38](#464036_2_En_6_Chapter.xhtml#PC39)).


    ```

    package com.apress.springboot3recipes.order;

    import jakarta.persistence.Entity;

    import jakarta.persistence.Id;

    import java.util.Objects;

    @Entity

    public class Order {

    @Id

    private Long id;

    private String number;

    public Long getId() {

    return id;

    }

    public String getNumber() {

    return number;

    }

    public void setNumber(String number) {

    this.number = number;

    }

    @Override

    public boolean equals(Object o) {

    if (o instanceof Order other) {

    return Objects.equals(this.id, other.id);

    }

    return false;

    }

    @Override

    public int hashCode() {

    return getClass().hashCode();

    }

    @Override

    public String toString() {

    return String.format("Order[id=%d, number=''%s'']",

    this.id, this.number);

    }

    }

    Listing 6-38

    Order Entity

    ```


    This `Order` class is in the `com.apress.springboot3recipes.order` package, which
    isn’t covered by the `@SpringBootApplication` annotated class as that is in the
    `com.apress.springboot3.recipes.jpa` package. To have this entity detected, you
    can add the `@EntityScan` annotation with the additional packages to scan to your
    `@SpringBootApplication` annotated class (or a regular `@Configuration` class)
    (Listing [6-39](#464036_2_En_6_Chapter.xhtml#PC40)).


    ```

    @SpringBootApplication

    @EntityScan({ "com.apress.springboot3recipes.order",

    "com.apress.springboot3recipes.jpa"})

    Listing 6-39

    Application Class Header with @EntityScan

    ```


    With this addition, the `Order` entity will now be detected and accessible by
    JPA.


    ## 6-7. Test with JPA


    ### Problem


    You want to test your JPA-based repositories using a unit or small integration
    test.


    ### Solution


    Use the Spring Test Context framework and the Spring Boot testing support to write
    a unit test using an embedded container like Apache Derby or use Testcontainers
    to write a dedicated integration test.


    ### How It Works


    When testing JPA code, a database is required, and often an embedded database
    like H2, Derby, or HSQLDB is used for testing. Spring Boot makes it easy to write
    tests for JPA. JPA-based tests can be annotated with `@DataJpaTest`, and Spring
    Boot will create a minimal application with only the JPA-related beans. Related
    beans like a `DataSource`, a transaction manager, and if needed Spring Data JPA
    repositories.'
