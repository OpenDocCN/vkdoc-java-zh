    `Accept-Language` 头部信息。


    ## 4-6\. 更改用户区域设置


    ### 问题


    为了使你的 Web 应用程序支持国际化，你必须识别每个用户偏好的区域设置，并根据该区域设置显示内容。


    ### 解决方案


    在 Spring WebFlux 应用程序中，用户的区域设置由一个必须实现 `LocaleContextResolver` 接口的组件来识别。Spring
    WebFlux 提供了两个 `LocaleContextResolver` 实现，供你根据不同的标准解析区域设置。或者，你也可以通过实现此接口来创建自己的自定义区域设置解析器。


    你可以通过在 Web 应用程序上下文中注册一个类型为 `LocaleContextResolver` 的 Bean 来定义区域设置解析器。你必须将区域设置解析器的
    Bean 名称设置为 `localeContextResolver`，以便它可以被自动检测到。


    ### 工作原理


    Spring WebFlux 提供了 `LocaleContextResolver` 接口的几个默认实现，其中一些允许更改 `Locale`。要更改 `Locale`，可以使用
    `WebFilter` 允许用户覆盖他们想要使用的区域设置。Spring WebFlux 并未提供这些功能（至少在撰写本文时如此）；因此，你需要自己实现它们。


    #### 使用 HTTP 请求头部解析区域设置


    Spring Boot 注册的默认区域设置解析器是 `AcceptHeaderLocaleContextResolver`。它通过检查 HTTP 请求的 `accept-language`
    头部信息来解析区域设置。此头部信息由用户的 Web 浏览器根据底层操作系统的区域设置进行设置。请参见清单 4-25。


    ![](img/464036_2_En_4_Fige_HTML.gif)一个信息图标，圆圈内有一个字母 i。 `AcceptHeaderLocaleContextResolver`
    无法更改用户的区域设置，因为它无法修改用户操作系统的区域设置。


    ```

    @Bean

    public AcceptHeaderLocaleContextResolver localeContextResolver () {

    return new AcceptHeaderLocaleContextResolver();

    }

    清单 4-25

    AcceptHeaderLocaleContextResolver Bean 定义

    ```


    #### 为你的应用程序使用固定区域设置


    另一个提供的 `LocaleContextResolver` 是 `FixedLocaleContextResolver`。它实际上并不解析 `Locale`，而是返回一个预先配置好的区域设置，这就是为什么这个解析器是固定的。它不允许更改
    `Locale`，因为它固定为单一区域设置。请参见清单 4-26。


    ```

    @Bean

    public FixedLocaleContextResolver localeContextResolver () {

    return new FixedLocaleContextResolver(Locale.GERMANY);

    }

    清单 4-26

    FixedLocaleContextResolver Bean 定义

    ```

