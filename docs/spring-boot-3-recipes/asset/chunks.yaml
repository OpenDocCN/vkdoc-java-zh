- fmt: '#### Configure a Bean Using an `@Bean` Method


    Instead of automatically detecting components, you can also use a factory method
    to create beans. This is useful if you want or need more control over the construction
    of your bean. A factory method is a method annotated with `@Bean`, and it will
    be used to register a bean in the application context. By default, the name of
    the bean is the same as the name of the method. The method can also have arguments,
    and they will be automatically resolved to other beans in the application context.


    Let’s create an application that can do some basic calculations for integers.
    First let’s write the `Calculator`. It will get a collection of `Operation` beans
    in the constructor. `Operation` is an interface, and the different implementations
    will do the actual calculation. See Listing 2-2.


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.stereotype.Component;

    import java.util.Collection;

    @Component

    public class Calculator {

    private final Collection operations;

    public Calculator(Collection operations) {

    this.operations = operations;

    }

    public void calculate(int lhs, int rhs, char op) {

    operations.stream()

    .filter((operation) -> operation.handles(op))

    .map((operation) -> operation.apply(lhs, rhs))

    .peek( (result) -> System.out.printf("%d %s %d = %s%n", lhs, op, rhs, result))

    .findFirst()

    .orElseThrow(() ->

    new IllegalArgumentException("Unknown operation " + op));

    }

    }

    ```


    In the `calculate` method, the right `Operation` is detected using the `Operation.handles`
    method; when the right one is found, the `Operation.apply` method is called to
    do the actual calculation. If we pass in an operation that the calculator cannot
    handle, a method is thrown.


    The `Operation` interface is a simple interface with the earlier mentioned two
    methods. See Listing 2-3.


    ```

    package com.apress.springboot3recipes.calculator;

    public interface Operation {

    int apply(int lhs, int rhs);

    boolean handles(char op);

    }

    ```


    Now let’s add two operations: one for adding values and one for multiplying values.
    See Listing 2-4 and Listing 2-5.


    ```

    package com.apress.springboot3recipes.calculator.operation;

    import com.apress.springboot3recipes.calculator.Operation;

    import org.springframework.stereotype.Component;

    @Component

    class Multiplication implements Operation {

    @Override

    public int apply(int lhs, int rhs) {

    return lhs * rhs;

    }

    @Override

    public boolean handles(char op) {

    return ''*'' == op;

    }

    }

    ```


    ```

    package com.apress.springboot3recipes.calculator.operation;

    import com.apress.springboot3recipes.calculator.Operation;

    import org.springframework.stereotype.Component;

    @Component

    class Addition implements Operation {

    @Override

    public int apply(int lhs, int rhs) {

    return lhs + rhs;

    }

    @Override

    public boolean handles(char op) {

    return ''+'' == op;

    }

    }

    ```


    These are all the components we need to make a calculator that can do addition
    and multiplication and still have an extensible mechanism.


    Finally, let’s make an application that configures and uses the `Calculator`.
    To make an instance of the `Calculator`, an `@Bean` method is needed; this method
    can be added to the class annotated with `@SpringBootApplication` or a regular
    `@Configuration`. See Listing 2-6.


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import java.util.Collection;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    var ctx = SpringApplication.run(CalculatorApplication.class, args);

    var calculator = ctx.getBean(Calculator.class);

    calculator.calculate(137, 21, ''+'');

    calculator.calculate(137, 21, ''*'');

    calculator.calculate(137, 21, ''-'');

    }

    @Bean

    public Calculator calculator(Collection operations) {

    return new Calculator(operations);

    }

    }

    ```


    The `calculator` factory method takes a `Collection<Operation>`, and we use that
    to construct the `Calculator`. When using parameters in the `@Bean` annotated
    method, those will automatically be resolved. When injecting a generic collection,
    Spring will automatically detect all instances of the beans required and use that
    to invoke the `calculator` factory method.


    In the `main` method, we retrieve the `Calculator` and call its `calculate` method
    with different numbers and operations. The first two will nicely print some output
    to the console. The last one will throw an exception as there is no suitable operation
    to do subtractions (Figure 2-1).


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Fig1_HTML.jpg)


    A screenshot of the marten window. It reads a set of program codes in Spring Boot
    that retrieves the calculator and calls its calculate method with different numbers
    and operations with an exception at the last.


    Figure 2-1 Calculator application output


    Although you created a factory method for the `Calculator`, this isn’t actually
    needed, as it has been annotated with `@Component`, and Spring will automatically
    use the single constructor in the class and try to detect all dependencies. Another
    thing that isn’t really nice about this code is that beans are retrieved manually,
    which could be considered a bad practice. Generally, you want to use dependency
    injection. Spring Boot has an `ApplicationRunner` interface that can be used to
    run some code after the application starts. When Spring Boot detects a bean of
    type `ApplicationRunner`, it will invoke its method as soon as the application
    has fully started. Let’s clean up the code by using this interface. See Listing
    2-7.


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    SpringApplication.run(CalculatorApplication.class, args);

    }

    @Bean

    public ApplicationRunner calculationRunner(Calculator calculator) {

    return args -> {

    calculator.calculate(137, 21, ''+'');

    calculator.calculate(137, 21, ''*'');

    calculator.calculate(137, 21, ''-'');

    };

    }

    }

    ```


    The method to create a `Calculator` has been replaced by an `ApplicationRunner`.
    This `ApplicationRunner` receives the automatically configured `Calculator` and
    runs some operations on it. When running this class, the output should still be
    the same as before (Figure 2-1). The major difference and advantage is that it
    is no longer needed to manually get beans from the `ApplicationContext` as Spring
    will take care of getting the correct beans.


    ## 2-2. Externalize Properties


    ### Problem


    You want to use properties to configure your application for different environments
    or executions.'
