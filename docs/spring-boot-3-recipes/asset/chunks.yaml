    ### 工作原理


    在你的项目中，添加 `spring-boot-starter-web` 依赖。参见清单 3-1。


    ```

    org.springframework.boot

    spring-boot-starter-web


    清单 3-1

    Spring MVC 的 Spring Boot Starter

    ```


    这会为 Spring MVC 添加所需的依赖项：`spring-web` 和 `spring-webmvc`。现在，Spring Boot 能够检测到这些类，并会进行额外的配置来设置
    `DispatcherServlet`。它还会添加启动嵌入式 Tomcat 服务器所需的所有 JAR 文件。参见清单 3-2。


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    清单 3-2

    用于启动 Spring MVC 的 Spring Boot 应用程序

    ```


    这几行代码足以启动嵌入式 Tomcat 服务器并设置预配置的 Spring MVC。当你启动应用程序时，会看到类似于图 3-1 的输出。


    ![](img/464036_2_En_3_Fig1_HTML.jpg)


    一张页面截图，显示 Spring Boot 中的代码。它启动了嵌入式 Tomcat 服务器并设置了预配置的 Spring MVC。


    图 3-1


    启动输出


    当你启动 `HelloWorldApplication` 时，Spring Boot 会执行以下操作：


    表 3-1


    自动注册的 Servlet 过滤器


    | 过滤器 | 描述 |

    | --- | --- |

    | `DefaultCharacterEncodingFilter` | 默认强制编码为 `UTF-8`。可通过设置 `spring.http.encoding.charset`
    属性进行配置。可通过将 `server.servlet.encoding.enabled` 设置为 `false` 来禁用。 |

    | `FormContentFilter` | 对 `PUT`、`PATCH` 和 `DELETE` 请求，使用 `FormContentRequestWrapper`
    包装请求，以便对这些请求进行一致的处理，并能够与它们进行绑定。可通过将 `spring.mvc.formcontent.enabled` 属性设置为 `false`
    来禁用。 |

    | `RequestContextFilter` | 将当前请求暴露给当前线程，以便即使在非 Spring MVC 应用程序（如 Jersey）中，也能使用
    `RequestContextHolder` 和 `LocaleContextHolder`。 |


    1.  在端口 8080 上启动嵌入式 Tomcat 服务器（默认情况下）。


    2.  注册并启用一些默认的 Servlet 过滤器（参见表 3-1）。


    3.  设置对 `*.css`、`*.js` 和 `favicon.ico` 等静态资源的处理。


    4.  启用与 Web JAR 的集成。


    5.  设置基本的错误处理功能。


    6.  使用所需的组件（即 `ViewResolvers`、I18N 等）配置 `DispatcherServlet`。


    在当前状态下，`HelloWorldApplication` 除了启动服务器外不做任何事情。让我们添加一个控制器来返回一些信息。参见清单 3-3。


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class HelloWorldController {

    @GetMapping("/")

    public String hello() {

    var version = SpringBootVersion.getVersion();

    return String.format("Hello World, from Spring Boot %s!", version);

    }

    }

    清单 3-3

    HelloWorld 控制器

    ```


    这个 `HelloWorldController` 控制器将注册到 `/` URL，当被调用时，会返回包含 Spring Boot 版本的短语 `Hello
    World, from Spring Boot`。`@RestController` 表明这是一个 `@Controller`，因此会被 Spring Boot
    检测到。此外，它还会为所有请求处理方法添加 `@ResponseBody` 注解。`@GetMapping` 将 `hello` 方法映射到到达 `/` 的每个
    GET 请求。我们也可以写成 `@RequestMapping(path="/", method=RequestMethod.GET)`。


    当重新启动 `HelloWorldApplication` 时，`HelloWorldController` 控制器将被检测并处理。现在，当使用 `curl`
    或 `HTTPie` 等工具访问 `http://localhost:8080/` 时，结果应如图 3-2 所示。


    ![](img/464036_2_En_3_Fig2_HTML.jpg)


    一张 Marten 页面的截图。它检测并处理了 Hello World 控制器，并在访问本地主机时在 Spring Boot 中显示控制器的输出。


    图 3-2


    控制器的输出


    #### 测试控制器


    现在应用程序正在运行并返回结果，是时候为控制器添加测试了。Spring 已经拥有一些令人印象深刻的测试功能，而 Spring Boot 则增加了更多功能。使用
    Spring Boot 测试控制器变得相当容易。参见清单 3-4。


    ```

    package com.apress.springboot3recipes.library;

    import org.hamcrest.Matchers;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.request.MockMvcRequestBuilders;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @WebMvcTest(HelloWorldController.class)

    class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    void testHelloWorldController() throws Exception {

    var expected = "Hello World, from Spring Boot ";

    mockMvc.perform(MockMvcRequestBuilders.get("/"))

    .andExpect(status().isOk())

    .andExpect(content().string(Matchers.containsString(expected)))

    .andExpect(content().contentTypeCompatibleWith(MediaType.TEXT_PLAIN));

    }

    }

    清单 3-4

    针对 HelloWorldController 的 WebMvcTest 切片测试

    ```


    `@WebMvcTest` 注解指示 Spring 测试框架为测试这个特定控制器设置一个应用程序上下文。它将启动一个最小的 Spring Boot 应用程序，仅包含与
    Web 相关的 Bean，如 `@Controller`、`@ControllerAdvice` 等。此外，它还会预配置 Spring Test Mock
    MVC 支持，然后可以自动注入该支持。


    Spring Test Mock MVC 可用于模拟向控制器发起 HTTP 请求，并对结果执行一些操作。这里我们使用 `GET` 调用 `/`，并期望得到一个
    HTTP 200（即 OK）响应，其中包含文本消息 `Hello World, from Spring Boot`。


    ## 3-2\. 使用 Spring MVC 暴露 REST 资源


    ### 问题


    你想使用 Spring MVC 来暴露基于 REST 的资源。


    ### 解决方案


    你需要一个 JSON 库来进行 JSON 编组（尽管你也可以使用 XML 和其他格式，因为内容协商是 REST 的一部分，正如最初描述的那样）。在本方案中，我们将使用
    Jackson 库来处理 JSON 转换。

