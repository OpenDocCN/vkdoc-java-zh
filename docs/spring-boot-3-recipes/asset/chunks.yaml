- fmt: '### Perform Integration Testing with Spring Boot and Mocks


    Spring Boot makes it easy to replace a bean with a mock in the application context.
    For this, Spring Boot has the `@MockBean` annotation. See Listing [2-17](#464036_2_En_2_Chapter.xhtml#PC18).


    ```

    @MockBean

    private Calculator calculator

    Listing 2-17

    MockBean Annotation Sample

    ```


    This would replace the whole calculator with a mocked instance. To be able to
    use it, you would need to define the behavior using the regular Mockito way. When
    there are multiple beans of a certain type, you need to specify the `name` attribute
    of the bean you want to replace. See Listing [2-18](#464036_2_En_2_Chapter.xhtml#PC19).


    ```

    @MockBean(name ="addition")

    private Operation mockOperation;

    Listing 2-18

    MockBean Annotation with Name Sample

    ```


    This would replace the regular `Addition` bean with a mocked instance, which we
    can then use to register mock behavior on. When a bean with that name cannot be
    found, the mocked bean will be registered as a new instance of that bean. See
    Listing [2-19](#464036_2_En_2_Chapter.xhtml#PC20).


    ```

    @MockBean(name ="division")

    private Operation mockOperation;

    Listing 2-19

    MockBean Annotation with Name Sample (Nonexisting Bean)

    ```


    This will not replace an existing bean but add a bean to the application context,
    and as a result, the `Calculator` would have an additional operation added to
    the `operations` it can handle. You could test that using the `ReflectionTestUtils`
    helper class from the Spring test framework. See Listing [2-20](#464036_2_En_2_Chapter.xhtml#PC21).


    ```

    @Test

    public void calculatorShouldHave3Operations() {

    var operations = ReflectionTestUtils.getField(calculator,

    "operations");

    assertEquals(3, ((Collection) operations).size());

    }

    Listing 2-20

    Validating the Number of Operations

    ```


    This will obtain the `operations` field through reflection and assert that the
    collection size is 3. When the `@MockBean` annotation is removed (or the name
    changed to `addition`), this test will fail as there are now only two operations
    registered.


    Using the mock is straightforward. See Listing [2-21](#464036_2_En_2_Chapter.xhtml#PC22).


    ```

    @Test

    public void mockDivision(CapturedOutput capture) {

    when(mockOperation.handles(''/'')).thenReturn(true);

    when(mockOperation.apply(14, 7)).thenReturn(2);

    calculator.calculate(14, 7, ''/'');

    assertTrue(capture.getOut().contains("14 / 7 = 2"));

    }

    Listing 2-21

    Using the Mocked Bean

    ```


    Here we instruct Mockito to return `true` when a division (`/`) is being tested
    and return a value when the `apply` method is called. Next the method is called,
    and we assert that the output is what is expected from this test.


    ### Perform Integration Testing with Spring Boot Using Slices


    Instead of using `@SpringBootTest`, you can also test part of your application.
    For this, Spring Boot has so-called slices. With the dedicated `@*Test` annotation
    (see Table [2-2](#464036_2_En_2_Chapter.xhtml#Tab2)), it will load an `ApplicationContext`
    with only the parts of the configuration that are needed. For instance, when using
    `@JdbcTest`, it will create an `ApplicationContext` with only the JDBC-related
    beans like a `DataSource`, `JdbcTemplate`, etc. It will not create all non-related
    beans like your web server or web-related beans.


    **Table 2-2** Test Slice Annotations


    | Annotation | Description |

    | --- | --- |

    | `@JsonTest` | Auto-configure the available JSON mappers and apply the found
    JSON configuration. |

    | `@WebMvcTest` | Auto-configure the web-related parts of your application (filters,
    controllers, security, etc.) and set up `MockMvc`. This is generally used to test
    a single controller using `@MockBean` for the dependencies. |

    | `@WebfluxTest` | Auto-configure the WebFlux-related parts of your application
    and set up a `WebTestClient` based on this. This is generally used to test a single
    controller using `@MockBean` for the dependencies. |

    | `@GraphQlTest` | Auto-configure Spring GraphQL. |

    | `@DataCassandraTest` | Auto-configure Spring Data Cassandra. |

    | `@DataCouchbaseTest` | Auto-configure Spring Data Couchbase. |

    | `@DataElasticsearchTest` | Auto-configure Spring Data ElasticSearch. |

    | `@DataJdbcTest` | Auto-configure Spring Data JDBC and by default will configure
    an in-memory database if present. |

    | `@DataJpaTest` | Auto-configure Spring Data JPA and by default will configure
    an in-memory database if present. |

    | `@DataLdapTest` | Auto-configure Spring Data LDAP; by default it will set up
    an in-memory LDAP server for testing. |

    | `@DataMongoTest` | Auto-configure Spring Data MongoDB. |

    | `@DataNeo4jTest` | Auto-configure Spring Data Neo4J. |

    | `@DataR2dbcTest` | Auto-configure Spring Data R2DBC. |

    | `@DataRedisTest` | Auto-configure Spring Data Redis. |

    | `@JdcbTest` | Auto-configure JDBC and by default will configure an in-memory
    database if present. |

    | `@JooqTest` | Auto-configure JOOQ and by default will configure an in-memory
    database if present. |

    | `@RestClientTest` | Auto-configure REST clients and set up `MockRestServiceServer`.
    |

    | `@WebServiceClientTest` | Auto-configure `WebServiceTemplate` and set up `MockWebServiceServer`.
    |

    | `@WebServiceServerTest` | Auto-configure the Spring web service and set up a
    `MockWebServiceClient`. |


    As an example, let’s take a look at `@WebMvcTest` and use that to test a controller,
    without bootstrapping the whole application. Listing [2-22](#464036_2_En_2_Chapter.xhtml#PC23)
    contains a sample controller that allows us to execute a calculation through the
    Web. It will take the parameters and call the calculator. For more information
    on controllers and web-related recipes, see Chapters [3](#464036_2_En_3_Chapter.xhtml)
    and [4](#464036_2_En_4_Chapter.xhtml). See Listing [2-22](#464036_2_En_2_Chapter.xhtml#PC23).


    ```

    package com.apress.springboot3recipes.calculator.web;

    import com.apress.springboot3recipes.calculator.Calculator;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class CalculatorController {

    private final Calculator calculator;

    public CalculatorController(Calculator calculator) {

    this.calculator = calculator;

    }

    @GetMapping("/calculate")

    public int calculate(Calculation calc) {

    return calculator.calculate(calc.lhs(), calc.rhs(), calc.op());

    }

    }

    record Calculation(int lhs, int rhs, char op) {}

    Listing 2-22

    Calculator Controller

    ```


    To test this, we can use the `@WebMvcTest` annotation on a test and use a mocked
    instance of the `Calculator`, as that won’t be part of the context. See Listing
    [2-23](#464036_2_En_2_Chapter.xhtml#PC24).'
