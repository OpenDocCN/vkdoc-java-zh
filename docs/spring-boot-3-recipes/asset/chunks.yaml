    ## 3-7\. 选择并配置嵌入式服务器


    ### 问题


    你想使用 Jetty 作为嵌入式容器，而不是默认的 Tomcat 容器。


    ### 解决方案


    排除 Tomcat 运行时并包含 Jetty 运行时。Spring Boot 会自动检测类路径上是否存在 Tomcat、Jetty 或 Undertow，并相应地配置容器。


    ### 工作原理


    Spring Boot 原生支持 Tomcat、Jetty 和 Undertow 作为嵌入式 Servlet 容器。默认情况下，Spring Boot 使用
    Tomcat 作为容器（通过 `spring-boot-starter-web` 工件中的 `spring-boot-starter-tomcat` 依赖项体现）。可以使用属性配置容器，其中一些属性适用于所有容器，另一些则适用于特定容器。全局属性以
    `server.` 或 `server.servlet` 为前缀，而容器属性以 `server.<container>` 开头（其中 `container`
    是 `tomcat`、`jetty` 或 `undertow`）。

