    ### 工作原理


    当 Spring Boot 在 `src/main/resources`（默认位置）找到 `messages.properties` 文件时，它会自动配置一个
    `MessageSource`。此 `messages.properties` 文件包含应用程序中要使用的默认消息。Spring Boot 将使用请求中的
    `Accept-Language` 头来确定当前请求应使用哪个区域设置（有关如何更改此设置，请参阅配方 3-6）。


    有一些属性可以改变 `MessageSource` 对缺失翻译、缓存等的响应方式。有关这些属性的概述，请参见表 3-6。


    表 3-6


    国际化属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.messages.basename` | 以逗号分隔的基础名称列表；默认为 `messages`。 |

    | `spring.messages.encoding` | 消息包编码；默认为 `UTF-8`。 |

    | `spring.messages.always-use-message-format` | 设置是否应将 `MessageFormat` 应用于所有消息；默认为
    `false`。 |

    | `spring.messages.fallback-to-system-locale` | 当找不到检测到的区域设置的资源包时，回退到系统区域设置。禁用时，将从默认文件加载默认值。默认为
    `true`。 |

    | `spring.messages.use-code-as-default-message` | 当找不到消息时，使用消息代码作为默认消息，而不是抛出 `NoSuchMessageException`。默认为
    `false`。 |

    | `spring.messages.cache-duration` | 缓存持续时间；默认为 `forever`。 |


    ![](img/464036_2_En_3_Figg_HTML.gif)一个灯泡图标。 将应用程序部署到云或其他外部托管方时，将 `spring.messages.fallback-to-system-locale`
    设置为 `false` 可能会很有用。这样，您就可以控制应用程序的默认语言，而不是由您无法控制的部署环境来决定。


    将 `messages.properties` 文件添加到 `src/main/resources` 目录。请参见清单 3-25。


    ```

    main.title=Spring Boot Recipes - Library

    index.title=Library

    index.books.link=List of books

    books.list.title=Available Books

    books.list.table.title=Title

    books.list.table.author=Author

    books.list.table.isbn=ISBN

    清单 3-25

    默认消息

    ```


    现在更改模板以使用翻译。请参见清单 3-26。


    ```


    Spring Boot Recipes - Library


    Library

    List of books


    清单 3-26

    支持国际化的索引页面

    ```


    对于 Thymeleaf，您可以在 `th:text` 属性中使用 `#{...}` 表达式；这将（由于自动的 Spring 集成）从 `MessageSource`
    解析消息。重新启动应用程序时，输出看起来似乎没有任何变化。但是，所有文本现在都来自 `messages.properties`。


    现在让我们为网站的荷兰语翻译添加一个 `messages_nl.properties` 文件。请参见清单 3-27。


    ```

    main.title=Spring Boot Recipes - Bibliotheek

    index.title=Bibliotheek

    index.books.link=Lijst van boeken

    books.list.title=Beschikbare Boeken

    books.list.table.title=Titel

    books.list.table.author=Auteur

    books.list.table.isbn=ISBN

    清单 3-27

    荷兰语消息

    ```


    现在，当将接受头更改为荷兰语时，网站将神奇地翻译成荷兰语（参见图 3-13）。


    ![](img/464036_2_En_3_Figh_HTML.gif)一个灯泡图标。 更改浏览器的语言可能并不那么容易；对于 Chrome 和 Firefox，有一些插件可以让您轻松切换
    `Accept-Language` 头。


    ![](img/464036_2_En_3_Fig13_HTML.jpg)


    Spring Boot 中本地主机窗口的屏幕截图。它显示了标题“Bibliotheek”下的翻译链接。


