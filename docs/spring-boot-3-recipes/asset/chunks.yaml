    #### Spring Boot Testcontainers 支持


    要在开发阶段使用 Testcontainers 支持，需要依赖 `spring-boot-testcontainers` 模块以及各种 Testcontainers
    模块（本例中为 PostgreSQL）。另请参阅配方 2-3 了解测试支持。


    在本示例中，我们将使用 PostgreSQL 容器和 JUnit Jupiter 集成。由于我们使用的是 PostgreSQL，因此还需要其 JDBC 驱动程序。请参见清单
    2-33。


    ```

    org.springframework.boot

    spring-boot-testcontainers

    test


    org.testcontainers

    junit-jupiter

    test


    org.testcontainers

    postgresql

    test


    org.postgresql

    postgresql

    runtime


    清单 2-33

    Testcontainers 支持依赖项

    ```


    由于我们要使用 Testcontainers，因此需要添加一个包含容器定义的 Java 配置类。在本例中，由于只需要 PostgreSQL，所以只有一个容器，但可以根据需要定义任意多个。这些容器需要成为
    Spring 管理的 Bean，通过为方法添加 `@Bean` 注解以及 `@ServiceConnection` 注解来实现。后者使其对 Spring Testcontainers
    支持可见，并会提取容器所需的信息，使其可供应用程序使用。提取的信息取决于容器的类型。对于我们的 PostgreSQL 容器，它将提取配置 JDBC 数据源所需的信息，例如
    `spring.datasource.url`、`spring.datasource.username` 和 `spring.datasource.password`。请参见清单
    2-34。


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.test.context.TestConfiguration;

    import org.springframework.boot.testcontainers.service.connection.ServiceConnection;

    import org.springframework.context.annotation.Bean;

    import org.testcontainers.containers.PostgreSQLContainer;

    @TestConfiguration(proxyBeanMethods = false)

    public class TestContainersConfig {

    @Bean

    @ServiceConnection

    public PostgreSQLContainer postgres() {

    return new PostgreSQLContainer("postgres:15.2");

    }

    }

    清单 2-34

    Testcontainers Java 配置

    ```


    接下来，我们可以重用上一节中的 Spring Boot 应用程序类（参见清单 2-31）。要使用 Testcontainers 支持，我们需要在测试目录中添加另一个带有
    `main` 方法的类。请参见清单 2-35。


    ![](img/464036_2_En_2_Figk_HTML.gif)一个灯泡图标。当与 Spring Boot Devtools（参见配方 2-7）一起使用时，你可能需要添加
    `@RestartScope` 注解。这将重用并保持容器运行，而不是停止并重启它。这也会在更新之间保留容器中的数据。


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.SpringApplication;

    public class TestDockerApplication {

    public static void main(String[] args) {

    SpringApplication.from(DockerApplication::main)

    .with(TestContainersConfig.class).run(args);

    }

    }

    清单 2-35

    Spring Boot Testcontainers 主类

    ```


    请注意，此类没有任何注解，只有一个简单的 `main` 方法。在此方法中，我们使用 `from` 引用了实际带有 `@SpringBootApplication`
    注解的类的 `main` 方法。接下来，我们使用 `with` 方法，通过 `TestContainersConfig.class` 来增强配置。最后，我们调用
    `run` 来启动实际应用程序。


    定义 Testcontainers 的一种常见方式是将它们声明为类或接口中的 `static` 字段。当你使用接口来定义容器时，可以在测试和专门的应用程序运行器之间重用它们。要重用基于接口的定义，可以在配置类上使用
    `@ImportTestContainers` 注解。请参见清单 2-36。


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.testcontainers.service.connection.ServiceConnection;

    import org.testcontainers.containers.PostgreSQLContainer;

    import org.testcontainers.junit.jupiter.Container;

    public interface OurContainersConfig {

    @ServiceConnection

    @Container

    PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15.2");

    }

    清单 2-36

    接口上的 Testcontainers 定义

    ```


    现在使用 `@ImportTestContainers` 注解来重用此接口。请参见清单 2-37。


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.test.context.TestConfiguration;

    import org.springframework.boot.testcontainers.context.ImportTestcontainers;

    @TestConfiguration(proxyBeanMethods = false)

    @ImportTestcontainers(OurContainersConfig.class)

    public class TestContainers2Config { }

    清单 2-37

    接口上的 Testcontainers 定义

