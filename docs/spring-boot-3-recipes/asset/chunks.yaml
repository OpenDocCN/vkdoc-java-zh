    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figb_HTML.gif)An information icon
    with the letter i inside a circle. Instead of `@RestController`, you could use
    `@Controller` and put `@ResponseBody` on each request handling method. Using `@RestController`
