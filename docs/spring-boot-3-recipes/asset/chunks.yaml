    ```


    正确执行此调用后，将返回新添加的书籍。此时获取书籍列表，应包含四本书，而非初始的三本。


    其原理是`HTTPie`将参数转换为 JSON 请求体，随后由 Jackson 库读取并转换为`Book`对象。参见代码清单 3-11。


    ```

    {

    "title": "The Lord of the Rings",

    "isbn": "9780618640157",

    "authors": ["J.R.R. Tolkien"]

    }

    代码清单 3-11

    Book 的 JSON 表示形式

    ```


    Jackson 会检测我们创建的`Book`记录（参见代码清单 3-6），并将属性映射到正确的构造函数参数。


    #### 测试@RestController


    为确保控制器按预期工作，需要编写测试来验证其正确行为。参见代码清单 3-12。


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.hamcrest.Matchers;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.boot.test.mock.mockito.MockBean;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.result.MockMvcResultMatchers;

    import java.util.Arrays;

    import java.util.List;

    import java.util.Optional;

    import static org.mockito.ArgumentMatchers.any;

    import static org.mockito.ArgumentMatchers.anyString;

    import static org.mockito.Mockito.when;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.header;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @WebMvcTest(BookController.class)

    public class BookControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @MockBean

    private BookService bookService;

    @Test

    public void shouldReturnListOfBooks() throws Exception {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", List.of("Marten Deinum", "Josh Long")),

    new Book("321", "Pro Spring MVC", List.of("Marten Deinum", "Colin Yates"))));

    mockMvc.perform(get("/books"))

    .andExpect(status().isOk())

    .andExpect(MockMvcResultMatchers.jsonPath("$", Matchers.hasSize(2)))

    .andExpect(MockMvcResultMatchers.jsonPath("$[*].isbn", Matchers.containsInAnyOrder("123",
    "321")))

    .andExpect(MockMvcResultMatchers.jsonPath("$[*].title", Matchers.containsInAnyOrder("Spring
    5 Recipes", "Pro Spring MVC")));

    }

    @Test

    public void shouldReturn404WhenBookNotFound() throws Exception {

    when(bookService.find(anyString())).thenReturn(Optional.empty());

    mockMvc.perform(get("/books/123"))

    .andExpect(status().isNotFound());

    }

    @Test

    public void shouldReturnBookWhenFound() throws Exception {

    when(bookService.find(anyString())).thenReturn(

    Optional.of(new Book("123", "Spring 6 Recipes", List.of("Marten Deinum", "Josh
    Long"))));

    mockMvc.perform(get("/books/123"))

    .andExpect(status().isOk())

    .andExpect(MockMvcResultMatchers.jsonPath("$.isbn", Matchers.equalTo("123")))

    .andExpect(MockMvcResultMatchers.jsonPath("$.title", Matchers.equalTo("Spring
    6 Recipes")));

    }

    @Test

    public void shouldAddBook() throws Exception {

    when(bookService.create(any(Book.class))).thenReturn(new Book("123456789", "Test
    Book Stored", List.of("T. Author")));

    mockMvc.perform(post("/books")

    .contentType(MediaType.APPLICATION_JSON)

    .content("{ \"isbn\" : \"123456789\", \"title\" : \"Test Book\", \"authors\" :
    [\"T. Author\"]}"))

    .andExpect(status().isCreated())

    .andExpect(header().string("Location", "http://localhost/books/123456789"));

    }

    }

    代码清单 3-12

    使用 WebMvcTest 对 BookController 进行集成测试

    ```


    该测试使用`@WebMvcTest`创建基于`MockMvc`的集成测试。它会创建一个最小化的 Spring Boot 应用程序来运行控制器。控制器需要`BookService`的实例，因此我们通过`@MockBean`注解让框架为其创建模拟对象。在不同的测试方法中，我们模拟了预期行为（例如返回书籍列表、返回空的`Optional`等）。


    ![](img/464036_2_En_3_Figc_HTML.gif)一个信息图标，圆圈内包含字母 i。 Spring Boot 使用 Mockito 通过`@MockBean`创建模拟对象。


    此外，测试还使用了 JsonPath 库，以便通过表达式测试 JSON 结果。JsonPath 之于 JSON，就如同 XPath 之于 XML。


    ## 3-3\. 在 Spring Boot 中使用 Thymeleaf


    ### 问题


    你希望使用 Thymeleaf 来渲染应用程序的页面。


    ### 解决方案


    添加 Thymeleaf 的依赖，并创建一个`@Controller`来确定视图并填充模型。

    '
- fmt: '### How It Works


    To get started, you will first need to add `spring-boot-starter-thymeleaf` as
    a dependency to your project to get the desired Thymeleaf dependencies.


    ```

    org.springframework.boot

    spring-boot-starter-thymeleaf

    ```


    With the addition of this dependency, you will get the Thymeleaf library as well
    as the Thymeleaf Spring dialect so that the two integrate nicely. Because of the
    existence of these two libraries, Spring Boot will automatically configure `ThymeleafViewResolver`.


    `ThymeleafViewResolver` requires a Thymeleaf `ITemplateEngine` to be able to resolve
    and render the views. A special `SpringTemplateEngine` will be preconfigured with
    `SpringDialect` so that you can use SpEL inside Thymeleaf pages.


    > A bulb icon. To add other Thymeleaf dialects, you only need to create an `@Bean`
    method for it, and Spring Boot will automatically detect and wire them with Thymeleaf.
    Some of them are even automatically configured like when integrating with Spring
    Security (see Chapter [5](#464036_2_En_5_Chapter.xhtml)).


    To configure Thymeleaf, Spring Boot exposes several properties in the `spring.thymeleaf`
    namespace (see Table 3-2).


    **Table 3-2** Thymeleaf Properties


    | Property | Description |

    | --- | --- |

    | `spring.thymeleaf.cache` | Sets whether resolved templates should be cached;
    the default is `true`. |

    | `spring.thymeleaf.check-template` | Checks if the template exists before rendering;
    the default is `true`. |

    | `spring.thymeleaf.check-template-location` | Checks if the template location
    exists; the default is `true`. |

    | `spring.thymeleaf.enabled` | Sets whether Thymeleaf should be enabled; the default
    is `true`. |

    | `spring.thymeleaf.enable-spring-el-compiler` | Enables the compilation of SpEL
    expressions; the default is `false`. |

    | `spring.thymeleaf.encoding` | Sets the encoding of the templates; the default
    is `UTF-8`. |

    | `spring.thymeleaf.exclude-view-names` | Lists the view names (separated with
    commas) that are excluded from being resolved. |

    | `spring.thymeleaf.mode` | Sets the Thymeleaf `TemplateMode` to use; the default
    is `HTML`. |

    | `spring.thymeleaf.prefix` | Sets the `prefix` to use for `ViewResolver`; the
    default is `classpath:/templates/`. |

    | `spring.thymeleaf.suffix` | Sets the `suffix` to use for `ViewResolver`; the
    default is `.html`. |

    | `spring.thymeleaf.render-hidden-markers-before-checkbox` | Sets whether hidden
    inputs for checkboxes should be rendered before the checkbox element itself (the
    default is `false`). |

    | `spring.thymeleaf.template-resolver-order` | Sets the order of `ViewResolver`;
    the default is 1. |

    | `spring.thymeleaf.view-names` | Sets the view names (separated with commas)
    that can be resolved with this `ViewResolver`. |

    | `spring.thymeleaf.servlet.content-type` | Sets the Content-Type used to write
    the HTTP response; the default is `text/html`. |

    | `spring.thymeleaf.servlet.produce-partial-output-while-processing` | Sets whether
    writing (partial content) should start as soon as possible or buffer until the
    template processing finished; the default is `true`. |

    | `spring.thymeleaf.reactive.max-chunk-size` | Sets the maximum size of data buffers
    used for writing to the response. If this is not set, it uses chunked mode by
    default. |

    | `spring.thymeleaf.reactive.media-types` | Sets the media types supported by
    this view technology. |

    | `spring.thymeleaf.reactive.full-mode-view-names` | Contains a comma-separated
    list of view names (patterns are allowed) that should execute in `FULL` mode.
    |

    | `spring.thymeleaf.reactive.chunked-mode-view-names` | Contains a comma-separated
    list of view names (patterns are allowed) that should execute in `CHUNKED` mode.
    |


    ### Add an Index Page


    First add an index page to our application. Create an `index.html` file inside
    the `src/main/resources/templates` directory (the default location). See Listing
    3-13.


    ```

    Spring Boot Recipes - Library


    Library

    List of books

    ```


    **Listing 3-13** Index Page


    This is just a basic HTML5 page with some minor additions for Thymeleaf. First
    there is `xmlns:th="http://www.thymeleaf.org"` to enable the namespace for Thymeleaf.
    The namespace is used in the link through `th:href`. The `@{/books.html}` part
    will be expanded, by Thymeleaf, to a proper link and placed in the actual `href`
    attribute of the link.


    Now when running the application, you should be greeted by a page with a link
    to the book’s overview (see Figure 3-5).


    **Figure 3-5** Rendered index page'
