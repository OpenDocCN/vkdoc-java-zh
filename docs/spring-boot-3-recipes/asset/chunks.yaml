    `BookServiceClient` 有一个方法，该方法使用 `@GetExchange` 注解。注解提供了一个值 `http://localhost:8080/books/{isbn}`，这是一个
    URI 模板。该方法接受一个参数 `isbn`，该参数已使用 `@PathVariable` 注解。调用此方法时，传入的值将在执行请求前被放入 URI 的
    `{isbn}` 部分。请求发送后，返回的响应会被转换为 `Mono<Book>`，就像我们使用 `WebClient` 时一样。


