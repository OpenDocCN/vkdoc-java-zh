    ```


    This command will tell `keytool` to generate a key using the RSA algorithm and
    place it in the keystore named `sb3-recipes.pfx` with the alias `sb3-recipes`,
    and it will be valid for 3,600 days. When running the command, it will ask a few
    questions. Answer them accordingly (or leave them empty). After that, there will
    be a file called `sb3-recipes.pfx` containing the certificate and protected with
    a password.


    Place this file in the `src/main/resources` folder so that it is packaged as part
    of your application and Spring Boot can easily access it.


