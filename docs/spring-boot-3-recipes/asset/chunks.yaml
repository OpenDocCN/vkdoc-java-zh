- fmt: '### Use ActiveMQ


    When using ActiveMQ, the first thing to do is to include `spring-boot-starter-activemq`.
    This will pull in all the needed JMS and ActiveMQ dependencies to get started.
    It will include the `spring-jms` dependency and the client libraries for ActiveMQ.
    See Listing [8-1](#464036_2_En_8_Chapter.xhtml#PC1).


    ```

    org.springframework.boot

    spring-boot-starter-activemq


    Listing 8-1

    Spring Boot ActiveMQ Starter Dependency

    ```


    By default Spring Boot will start an embedded broker if no explicit broker configuration
    is given. The configuration can be changed by using properties from the `spring.activemq`
    namespace (see Table [8-1](#464036_2_En_8_Chapter.xhtml#Tab1)).


    **Table 8-1** ActiveMQ Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.activemq.broker-url` | Sets the URL of the broker to connect to. The
    default is `vm://localhost?broker.persistent=false` for an in-memory broker; otherwise,
    it’s `tcp://localhost:61616`. |

    | `spring.activemq.user` | Sets the username to use to connect to the broker;
    the default is empty. |

    | `spring.activemq.password` | Sets the password to use to connect to the broker;
    the default is empty. |

    | `spring.activemq.in-memory` | Sets whether an embedded broker should be used;
    the default is `true`. This is ignored when `spring.activemq.broker-url` has been
    explicitly set. |

    | `spring.activemq.non-blocking-redelivery` | Sets the stop message delivery before
    re-delivering rolled-back messages. When it’s enabled, the message order will
    not be preserved; the default is `false`. |

    | `spring.activemq.close-timeout` | Sets the time to wait to consider a close
    to be effective; the default is 15 seconds. |

    | `spring.activemq.send-timeout` | Sets the time to wait for a response from the
    broker; the default is 0 (unlimited). |

    | `spring.activemq.packages.trust-all` | When using Java serialization to send
    JMS messages, this sets whether classes from all packages should be trusted; the
    default is none (which requires explicitly setting the packages). |

    | `spring.activemq.packages.trusted` | Is a comma-separated list of specific packages
    to trust. |


    The following is a simple application to list all the beans with `jms` in their
    name. This should include a bean named `jmsConnectionFactory`.


    ```

    package com.apress.springboot3recipes.jms;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import java.util.Comparator;

    import java.util.stream.Stream;

    @SpringBootApplication

    public class JmsApplication {

    private static final String MSG = "\tName: %100s, Type: %s\n";

    public static void main(String[] args) {

    var ctx = SpringApplication.run(JmsApplication.class, args);

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Stream.of(names)

    .filter(name -> name.toLowerCase().contains("jms") || ctx.getType(name).getName().contains("jms"))

    .sorted(Comparator.naturalOrder())

    .forEach(name -> {

    var bean = ctx.getBean(name);

    System.out.printf(MSG, name, bean.getClass().getSimpleName());

    });

    }

    }

    ```


    When running this, the program will print all the names and types of the beans
    containing `jms` in their name to the console. The output should look like Figure
    [8-1](#464036_2_En_8_Chapter.xhtml#Fig1).


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig1_HTML.jpg)


    **Figure 8-1** ActiveMQ beans output


    When using ActiveMQ, it is also possible to use a pool of JMS connections (much
    like a JDBC-based connection pool). By default this is disabled. To enable and
    configure it, you can use the properties in the `spring.activemq.pool` namespace
    (see Table [8-2](#464036_2_En_8_Chapter.xhtml#Tab2)).


    **Table 8-2** ActiveMQ Pooling Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.activemq.pool.enabled` | Sets whether a connection pool should be used;
    the default is `false`. |

    | `spring.activemq.pool.max-connections` | Sets the maximum number of connections;
    the default is 1. |

    | `spring.activemq.pool.maximum-active-session-per-connection` | Sets the maximum
    number of active JMS sessions that are allowed per connection; the default is
    500. |

    | `spring.activemq.pool.idle-timeout` | Sets how long a connection can be idle;
    the default is 30 seconds. |

    | `spring.activemq.pool.expiry-timeout` | Sets how long before a connection is
    expired; the default is 0 (never). |

    | `spring.activemq.pool.reconnect-on-exception` | Resets the connection when a
    `JMSException` occurs; the default is `true`. |

    | `spring.activemq.pool.block-if-full` | Blocks when a connection is requested
    or throws a `JMSException` instead; the default is `true`. |

    | `spring.activemq.pool.block-if-full-timeout` | Sets how long to block before
    throwing a `JMSException`; the default is -1 (block until a connection is available).
    |

    | `spring.activemq.pool.create-connection-on-startup` | Sets whether a connection
    should be eagerly created on startup of the application; the default is `true`.
    |


    Using the pooling facility requires the `pooled-jms` dependency to be added to
    your build file. See Listing [8-2](#464036_2_En_8_Chapter.xhtml#PC3).


    ```

    org.messaginghub

    pooled-jms


    Listing 8-2

    JMS ConnectionPool Dependency

    ```


    When running the application again, you will notice that the type of `ConnectionFactory`
    has changed to `PooledConnectionFactory`.'
