    #### 指定通过服务器发送事件发送的内容


    服务器发送事件（Server-Sent-Events）是从服务器发送到客户端的消息。它们的 `Content-Type` 标头为 `text/event-stream`。它们非常轻量，仅包含四个字段（见表
    4-7）。


    表 4-7


    服务器发送事件允许的字段


    | **字段** | **描述** |

    | --- | --- |

    | `id` | 事件的 ID |

    | `event` | 事件的类型 |

    | `data` | 事件数据 |

    | `retry` | 事件流的重新连接时间 |


    默认情况下，响应中仅包含 `data` 元素。


    要从请求处理方法发送事件，你需要使用 `ServerSentEvent`，它提供了一个 `builder` 方法来实际创建 `ServerSentEvent`
    实例。要将 `ServerSentEvent` 发送到客户端，你需要将你的对象转换为该类型。我们可以扩展最初创建的 `OrderController`，为其添加一个专门处理
    `ServerSentEvent` 实例的方法（见代码清单 4-38）。


    ```

    package com.apress.springboot3recipes.order.rest;

    import com.apress.springboot3recipes.order.Order;

    import com.apress.springboot3recipes.order.OrderService;

    import org.springframework.http.MediaType;

    import org.springframework.http.codec.ServerSentEvent;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Flux;

    import java.time.Duration;

    @RestController

    public class OrderController {

    private final OrderService orderService;

    public OrderController(OrderService orderService) {

    this.orderService = orderService;

    }

    @GetMapping("/orders")

    public Flux orders() {

    return orderService.findAll().delayElements(Duration.ofMillis(32));

    }

    @GetMapping(value = "/orders", produces = MediaType.TEXT_EVENT_STREAM_VALUE)

    public Flux> orderEvents() {

    return orderService.findAll()

    .map(this::toEvent)

    .delayElements(Duration.ofMillis(32));

    }

    private ServerSentEvent toEvent(Order order) {

    return ServerSentEvent.builder(order)

    .event("order-event")

    .id(order.id()).build();

    }

