- fmt: "### How It Works\n\nA bean that has `@RabbitListener` and/or `@RabbitHandler`\
    \ annotated methods will be used as message listeners from incoming messages.\
    \ A message listener container is constructed, and the annotated method will receive\
    \ the incoming message. The message listener container can be configured through\
    \ properties in the `spring.rabbitmq.listener` namespace (see Table [8-13](#464036_2_En_8_Chapter.xhtml#Tab13)).\n\
    \n**Table 8-13** Rabbit Listener Properties\n\n| Property | Description |\n| ---\
    \ | --- |\n| `spring.rabbitmq.listener.type` | Sets the listener container type\
    \ `direct` or `simple`; the default is `simple`. |\n| `spring.rabbitmq.listener.simple.acknowledge-mode`\
    \ | Sets the container acknowledge mode; the default is none. |\n| `spring.rabbitmq.listener.simple.prefetch`\
    \ | Sets the number of messages to be handled in a single request; the default\
    \ is none. |\n| `spring.rabbitmq.listener.simple.default-requeue-rejected` | Sets\
    \ whether rejected deliveries should be re-queued. |\n| `spring.rabbitmq.listener.simple.concurrency`\
    \ | Sets the minimum number of listener invoker threads. |\n| `spring.rabbitmq.listener.simple.max-concurrency`\
    \ | Sets the maximum number of listener invoker threads. |\n| `spring.rabbitmq.listener.simple.transaction-size`\
    \ | Sets the number of messages processed in a single transaction. For best results,\
    \ this should be smaller or equal to the prefetch size. |\n| `spring.rabbitmq.listener.direct.acknowledge-mode`\
    \ | Sets the container acknowledge mode; the default is none. |\n| `spring.rabbitmq.listener.direct.prefetch`\
    \ | Sets the number of messages to be handled in a single request; the default\
    \ is none. |\n| `spring.rabbitmq.listener.direct.default-requeue-rejected` | Sets\
    \ whether rejected deliveries should be re-queued. |\n| `spring.rabbitmq.listener.direct.consumers-per-queue`\
    \ | Sets whether rejected deliveries should be re-queued. |\n\n### Receive a Simple\
    \ Message\n\nA component with an `@RabbitListener` annotation is all that is needed\
    \ to start receiving messages from RabbitMQ. See Listing [8-31](#464036_2_En_8_Chapter.xhtml#PC37).\n\
    \n```\n@Component\nclass HelloWorldReceiver {\n    @RabbitListener(queues = \"\
    hello\")\n    public void receive(String msg) {\n        System.out.println(\"\
    Received: \" + msg);\n    }\n}\n```\n\n**Listing 8-31** RabbitMQ Listener for\
    \ String Messages\n\nThis component will receive all the messages from the `hello`\
    \ queue and print them to the console (Figure [8-7](#464036_2_En_8_Chapter.xhtml#Fig7)).\
    \ This works fine for simple payloads or if the receiving object can be deserialized\
    \ from the payload of the message. However, when sending objects or complex messages,\
    \ you might prefer to use JSON or XML.\n\n![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig7_HTML.jpg)\n\
    \nAn output of a RabbitMQ Listener for String Messages. It receives all the messages\
    \ from the `hello` queue and prints them to the console. The starting Rabbit sender\
    \ application using Java 21.0.1 with PID 33009, no active profile set, and the\
    \ started Rabbit sender application in 1.803 seconds are included in the output.\n\
    \n**Figure 8-7** RabbitMQ listener output\n\n### Receive an Object\n\nTo receive\
    \ a more complex object without relying on Java serialization, you need to configure\
    \ a `MessageConverter` (see also Recipe 8-4). The configured `MessageConverter`\
    \ will be used by the message listener container to convert incoming payloads\
    \ into an object required by the `@RabbitListener` annotated method. See Listing\
    \ [8-32](#464036_2_En_8_Chapter.xhtml#PC38).\n\n```\n@Bean\npublic Jackson2JsonMessageConverter\
    \ jsonMessageConverter() {\n    return new Jackson2JsonMessageConverter();\n}\n\
    ```\n\n**Listing 8-32** JSON MessageConverter Configuration\n\nTo configure the\
    \ `MessageConverter`, create an `@Bean` annotated method and construct the converter\
