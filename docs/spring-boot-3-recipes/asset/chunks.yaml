    #### 连接到外部 MongoDB


    ![](img/464036_2_En_6_Figf_HTML.gif)一个圆形抽象图形内包含小写字母 i。 `bin` 目录中包含一个 `mongo.sh`
    脚本，该脚本将使用 Docker 启动一个 MongoDB 实例。


    启动 `MongoApplication` 时，默认会尝试通过端口 27017 连接到 localhost 上的 MongoDB 服务器。如果这不是您想要连接的地址，请使用
    `spring.data.mongodb` 属性（参见表 6-5）来配置正确的位置。


    表 6-5


    MongoDB 属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.data.mongodb.uri` | 设置 Mongo 数据库 URI，包括凭据、设置等。默认值为 `mongodb://localhost/test`。
    |

    | `spring.data.mongodb.username` | 设置 Mongo 服务器的登录用户。默认值为无。 |

    | `spring.data.mongodb.password` | 设置 Mongo 服务器的登录密码。默认值为无。 |

    | `spring.data.mongodb.host` | 设置 MongoDB 服务器的主机名（或 IP 地址）。默认回退为 `localhost`。
    |

    | `spring.data.mongodb.port` | 设置 MongoDB 服务器的端口。默认回退为 27017。 |

    | `spring.data.mongodb.database` | 设置要使用的 MongoDB 数据库/集合的名称。 |

    | `spring.data.mongodb.field-naming-strategy` | 设置用于将对象字段映射到文档字段的 `FieldNamingStrategy`
    实例的完全限定名（FQN）。默认值为 `PropertyNameFieldNamingStrategy`。 |

    | `spring.data.mongodb.authentication-database` | 设置用于身份验证的 MongoDB 名称。默认值为 `spring.data.mongodb.database`
    的值。 |

    | `spring.data.mongodb.gridfs-database` | 设置要连接的 MongoDB 名称。默认值为 `spring.data.mongodb.database`
    的值。 |

    | `spring.data.mongodb.replica-set-name` | 设置集群的副本集名称；使用集群 MongoDB 时需要。 |


    虽然您可以使用 Spring Boot 来配置 `MongoClient`，但如果需要更多控制，您始终可以自行将 `MongoDbFactory` 或 `MongoClient`
    指定为 Bean，此时 Spring Boot 将不会自动配置 `MongoClient`。它仍会检测 Spring Data MongoDB 类并启用仓库支持。


    #### 使用 Spring Data MongoDB 仓库


    您无需自行编写仓库的实现，也可以使用 Spring Data MongoDB 为您创建仓库（就像使用 Spring Data JPA 一样）。为此，您需要扩展
    Spring Data 提供的 `Repository` 接口之一。最简单的方法是扩展 `CrudRepository` 或 `MongoRepository`（清单
    6-55）。


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.repository.MongoRepository;

    public interface CustomerRepository extends MongoRepository { }

    清单 6-55

    基于 Spring Data MongoDB 的 CustomerRepository

    ```


    这就是我们获得一个功能完整的仓库所需的全部内容；您可以移除 `MongoCustomerRepository` 的实现。这将为您提供 `save`、`findAll`、`findById`
    以及更多方法。


    应用程序仍将运行，插入一些客户，并在日志中列出它们（参见图 6-4）。


    #### 使用响应式 MongoDB 仓库


    MongoDB 不仅可以用于常规的阻塞操作，还可以以响应式方式使用。为此，请使用 `spring-boot-starter-data-mongodb-reactive`
    替代 `spring-boot-starter-data-mongodb`。此依赖项将包含所需的响应式库和 MongoDB 响应式驱动程序（清单 6-56）。


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb-reactive


    清单 6-56

    用于响应式使用的 Spring Data MongoDB 依赖项

    ```


    依赖项就绪后，您可以使 `CustomerRepository` 变为响应式。只需根据您的需求扩展 `ReactiveCrudRepository`、`ReactiveSortingRepository`
    或 `ReactiveMongoRepository` 即可（清单 6-57）。


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.repository.ReactiveMongoRepository;

    public interface CustomerRepository

    extends ReactiveMongoRepository { }

    清单 6-57

    响应式 CustomerRepository

    ```


    现在 `CustomerRepository` 扩展了 `ReactiveMongoRepository`，所有方法都返回 `Flux`（零个或多个元素）或
    `Mono`（零个或一个元素）。


    ![](img/464036_2_En_6_Figg_HTML.gif)一个圆形抽象图形内包含小写字母 i。 默认实现使用 Project Reactor
    作为响应式框架；不过，您也可以使用 RxJava。此时，您将使用 `Observable` 或 `Single` 替代 `Flux` 和 `Mono`。为此，您需要扩展
    `RxJava3CrudRepository` 或 `RxJava3SortingRepository`。


    `DataInitializer` 也需要变为响应式（清单 6-58）。


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    var newCustomers = Flux.just(

    new Customer("Marten Deinum", "marten.deinum@conspect.nl"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"));

    customers.deleteAll()

    .thenMany(customers.saveAll(newCustomers))

    .blockLast();

    }

    }

    清单 6-58

    响应式 DataInitializer

    ```


    首先它会删除所有内容；然后我们创建新的 `Customer` 实例并将其添加到仓库中。为了确保在继续之前所有数据都已存储，我们使用 `blockLast`，它会等待最后一个元素写入后再继续执行。


    最后，`CustomerLister` 也需要变为响应式（清单 6-59）。


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .subscribe( (customer) -> logger.info("{}", customer));

    }

    }

    清单 6-59

    响应式 CustomerLister

    ```


    它会从仓库中查找所有客户，并为每个客户在日志文件中打印一行。


    启动应用程序时，您可能不会在日志文件中看到任何内容。由于应用程序的响应式特性，它会很快完成，而 `CustomerLister` 没有时间注册自身并开始监听。为了防止应用程序关闭，请添加一个
    `System.in.read()` 方法。这将使应用程序保持运行，直到您按下回车键（清单 6-60）。通常，在运行应用程序时，这并非必需，因为应用程序会作为服务/Web
    应用程序暴露，从而自动保持运行。


    ```

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ReactiveMongoApplication.class, args);

    System.in.read();

    }

    清单 6-60

    使用 System.in.read 保持应用程序运行

    ```

