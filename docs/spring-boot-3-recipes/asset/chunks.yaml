- fmt: '#### Use `DatabaseClient`


    When Spring Boot detects the presence of `spring-r2dbc`, it will automatically
    add `DatabaseClient` as a bean to the application. The most basic way to access
    the database is to use this preconfigured `DatabaseClient`, which comes from `spring-r2dbc`,
    which is part of the Spring Framework. With this `DatabaseClient`, you can create
    an implementation of `CustomerRepository` (Listing [6-73](#464036_2_En_6_Chapter.xhtml#PC74)).


    ```

    package com.apress.springboot3recipes.r2dbc;

    import io.r2dbc.spi.Readable;

    import org.springframework.r2dbc.core.DatabaseClient;

    import org.springframework.stereotype.Repository;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    @Repository

    class R2dbcCustomerRepository implements CustomerRepository {

    private static final String ALL_QUERY = "SELECT id, name, email FROM customer";

    private static final String BY_ID_QUERY =

    "SELECT id, name, email FROM customer WHERE id=:id";

    private static final String INSERT_QUERY =

    "INSERT INTO customer (name, email) VALUES (:name, :email)";

    private final DatabaseClient client;

    R2dbcCustomerRepository(DatabaseClient client) {

    this.client = client;

    }

    @Override

    public Flux findAll() {

    return client.sql(ALL_QUERY)

    .map(this::toCustomer)

    .all();

    }

    @Override

    public Mono findById(long id) {

    return client.sql(BY_ID_QUERY)

    .bind("id", id)

    .map(this::toCustomer)

    .one();

    }

    @Override

    public Mono save(Customer customer) {

    var result = client.sql(INSERT_QUERY)

    .filter( (s) -> s.returnGeneratedValues("id"))

    .bind("name", customer.name())

    .bind("email", customer.email())

    .map( (row) -> row.get("id", Long.class))

    .first();

    return result

    .map((id) -> new Customer(id, customer.name(), customer.email()));

    }

    private Customer toCustomer(Readable row) {

    var id = row.get(0, Long.class);

    var name = row.get(1, String.class);

    var email = row.get(2, String.class);

    return new Customer(id, name, email);

    }

    }

    Listing 6-73

    Reactive CustomerRepository Implementation with DatabaseClient

    ```


    `R2dbcCustomerRepository` uses `DatabaseClient` to execute queries, map the result,
    and return it. With the `sql` method, we can specify which SQL query we want to
    execute. Using `map`, we can transform the result into something we can use, like
    a `Customer`. In the `findAll` method, we execute the query to retrieve everything
    from the database and `map` the result to a `Customer`. The `map` method used
    here takes a `Function`, which maps `io.r2dbc.spi.Readable` (a `Row` is just that)
    to another element. The `all()` method instructs the `DatabaseClient` that we
    can have 0 or more results to return, and thus it will create a `Flux`. The `findById`
    executes a query but first uses `bind` to fill in the `:id` attribute in the query;
    then we map the result. The `one()` method instructs `DatabaseClient` to return
    a 0 or 1 result; if we get multiple results, an error will be issued.


    The `save` method is a bit more complicated as we need to get the `id`; we can
    use the `filter` method to modify `io.r2dbc.spi.Statement` and instruct it to
    return the generated keys. Next we need to bind the `:name` and `:email` attributes.
    Using `first()` we get the first result returned. We could also have used `one()`
    in this case. As we get a `Mono<Long>`, which contains the generated ID of the
    `Customer`, we can use the `map` method to instruct it to create a `Customer`
    with that ID and the given `Customer` to save.


    #### Use `R2dbcEntityTemplate`


    When Spring Data R2DBC is detected on the classpath, Spring Boot will, in addition
    to `DatabaseClient`, also automatically prepare an `R2dbcEntityTemplate` instance.
    `R2dbcEntityTemplate` is a wrapper around `DatabaseClient` to make it easier to
    work with database entities (Listing [6-74](#464036_2_En_6_Chapter.xhtml#PC75)).


    ```

    package com.apress.springboot3recipes.r2dbc;

    import static org.springframework.data.relational.core.query.Criteria.where;

    import org.springframework.data.r2dbc.core.R2dbcEntityTemplate;

    import org.springframework.data.relational.core.query.Query;

    import org.springframework.stereotype.Repository;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    @Repository

    class R2dbcCustomerRepository implements CustomerRepository {

    private final R2dbcEntityTemplate template;

    R2dbcCustomerRepository(R2dbcEntityTemplate template) {

    this.template = template;

    }

    @Override

    public Flux findAll() {

    return template.select(Customer.class).all();

    }

    @Override

    public Mono findById(long id) {

    return template

    .selectOne(Query.query(where("id").is(id)), Customer.class);

    }

    @Override

    public Mono save(Customer customer) {

    return template.insert(customer);

    }

    }

    Listing 6-74

    Reactive CustomerRepository Implementation with DatabaseClient

    ```


    `R2dbcCustomerRepository` using the `R2dbcEntityTemplate` is a bit simpler than
    the one using a `DatabaseClient` instance. The mapping from the database to `Customer`
    is done automatically, as well as the binding for the insert. The `findById` method
    has some complexity still as we need to specify the `where` clause for the query.
    To make it easier to write queries, Spring Data R2DBC contains a query builder.
    Here we specify a limitation on the `id` column.


    Mapping from/to database columns is done based on metadata on the `Customer` class.
    This is optional. The default is that it will use the name of the class `Customer`,
    with a lowercase first letter as the name of the table `customer`. If a different
    table is to be used, this can be supplied through the `@Table` annotation. For
    column names to field names, something similar happens: it will use the names
    of the field as is for the column; if something else is needed, this can be specified
    through an `@Column` annotation. A database record also needs a primary key (in
    general). If the class has a field named `id`, this will be automatically used
    as the primary key. If another field is to be used or if you want to make it explicit,
    you can annotate that field (or fields) with `@Id` (see Listing [6-75](#464036_2_En_6_Chapter.xhtml#PC76)).


    ```

    package com.apress.springboot3recipes.r2dbc;

    import org.springframework.data.annotation.Id;

    import org.springframework.data.relational.core.mapping.Column;

    import org.springframework.data.relational.core.mapping.Table;

    @Table("customer")

    public record Customer(@Column("id") @Id Long id,

    @Column("name") String name,

    @Column("email") String email) {

    }

    Listing 6-75

    Customer Class for Use with R2DBC

    ```


    #### Use the `R2dbcRepository`


    Instead of writing an implementation with Spring Data R2DBC, you can also have
    a dynamic implementation (just as with Spring Data JPA). For the R2DBC case, you
    simply extend `ReactiveCrudRepository`, `ReactiveSortingRepository`, or `R2dbcRepository`
    depending on your needs (Listing [6-76](#464036_2_En_6_Chapter.xhtml#PC77)).


    ```

    package com.apress.springboot3recipes.r2dbc;

    import org.springframework.data.r2dbc.repository.R2dbcRepository;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    public interface CustomerRepository

    extends R2dbcRepository {

    }

    Listing 6-76

    Reactive CustomerRepository with Spring Data Repositories

    ```


    As Spring Boot automatically detects the presence of Spring Data R2DBC, it will
    automatically pick up this interface and create a dynamic bean for it to use in
    our application. The output will be similar to that of Figure [6-4](#464036_2_En_6_Chapter.xhtml#Fig4).


    ## 6-10\. Test with Spring Data R2DBC


    ### Problem


    You want to test your R2DBC-based repositories using a unit or small integration
    test.


    ### Solution


    Use the Spring Test Context framework and the Spring Boot testing support to write
    a unit test using an embedded container such as Apache Derby, or use Testcontainers
    to write a dedicated integration test.'
