- fmt: '### How It Works


    When testing JDBC code, one requires a database, and often an embedded database
    like H2, Apache Derby, or HSQLDB is used for testing. Spring Boot makes it easy
    to write tests for JDBC code. JDBC-based tests can be annotated with `@JdbcTest`,
    and Spring Boot will create a minimal application with only the JDBC-related beans,
    like a `DataSource` and transaction manager.


    #### Test JDBC Code with an Embedded Database


    Let’s write a test for `JdbcCustomerRepository`, and let’s use H2 as the embedded
    database. First add H2 as a test dependency (Listing [6-24](#464036_2_En_6_Chapter.xhtml#PC24)).


    ```

    com.h2database

    h2

    test


    Listing 6-24

    H2 Database as a Test Dependency

    ```


    Next create `JdbcCustomerRepositoryTest` (Listing [6-25](#464036_2_En_6_Chapter.xhtml#PC25)).


    ```

    @JdbcTest

    @TestPropertySource(properties = "spring.flyway.enabled=false")

    @Import(JdbcCustomerRepository.class)

    class JdbcCustomerRepositoryTest {

    @Autowired

    private JdbcCustomerRepository repository;

    }

    Listing 6-25

    JdbcCustomerRepositoryTest Test Setup

    ```


    The `@JdbcTest` annotation executes the test by a special JUnit extension (the
    `SpringExtension`) to bootstrap the Spring Test Context framework. The `@JdbcTest`
    annotation will replace the preconfigured `DataSource` with an embedded one (H2
    in this case). As we want to test our repository, the `@Import(JdbcCustomerRepository.class)`
    annotation is added.


    Finally, there is the `@TestPropertySource(properties = "spring.flyway.enabled=false")`,
    which indicates that we want to disable Flyway. The application uses Flyway to
    manage the schema; however, those scripts are written for PostgreSQL and not H2.
    For testing we want to disable Flyway and provide an H2-based `schema.sql` to
    create the schema.


    > A circular abstract reads the lowercase letter i inside it. This is one of the
    drawbacks of using a different database for testing (H2) than actually in the
    live system (PostgreSQL). You either need to maintain two sets of scripts for
    the schema or use the same database for testing as in the live system.


    Create a `schema.sql` file in `src/test/resources` and add the DDL statement in
    Listing [6-26](#464036_2_En_6_Chapter.xhtml#PC26).


    ```

    CREATE TABLE customer (

    id BIGINT AUTO_INCREMENT PRIMARY KEY,

    name VARCHAR(100) NOT NULL,

    email VARCHAR(255) NOT NULL,

    UNIQUE(name)

    );

    Listing 6-26

    Customer DDL for H2

    ```


    Now write a test that tests if records get inserted correctly (Listing [6-27](#464036_2_En_6_Chapter.xhtml#PC27)).


    ```

    @Test

    void insertNewCustomer() {

    assertThat(repository.findAll()).isEmpty();

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.id()).isNotNull();

    assertThat(customer.name()).isEqualTo("T. Testing");

    assertThat(customer.email()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.id())).hasValue(customer);

    }

    Listing 6-27

    Insert Customer Test

    ```


    This test first asserts that the database is empty. This is not really required
    but can be useful to detect if other tests pollute the database. Next a `Customer`
    is added to the database by calling the `save` method on the `JdbcCustomerRepository`.
    The resulting `Customer` is validated to have an ID and `name` and `email` attributes.
    Finally, the `Customer` is retrieved again and compared to be the same.


    Another test you could add is the `findAll` method. When inserting two records,
    calling `findAll` should result in two records being retrieved (Listing [6-28](#464036_2_En_6_Chapter.xhtml#PC28)).


    ```

    @Test

    void findAllCustomers() {

    assertThat(repository.findAll()).isEmpty();

    repository.save(new Customer("T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer("T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(2);

    }

    Listing 6-28

    Find All Customer Test

    ```


    There could be more assertions, but saving the data is already verified in the
    other test method.


    #### Test JDBC Code with Testcontainers


    A better option nowadays is to use Testcontainers. Testcontainers uses Docker
    to bootstrap a Docker container for your given technology. In this case, we could
    use a PostgreSQL Docker image to boot a real database and use that in our tests.
    With this you are now using your actual database for testing and don’t need to
    do with an in-memory version, meaning you can execute all the queries you want
    and test them. It gives you also the opportunity to test your database migration
    scripts (when in use).


    To use Testcontainers, in this case for PostgreSQL, we need to add the appropriate
    dependencies (see Listing [6-29](#464036_2_En_6_Chapter.xhtml#PC29)).


    ```

    org.springframework.boot

    spring-boot-testcontainers


    org.testcontainers

    postgresql

    test


    org.testcontainers

    junit-jupiter

    test


    Listing 6-29

    Testcontainers Dependency for PostgreSQL and JUnit Jupiter

    ```


    Now write a test that tests if records get inserted correctly into our actual
    PostgreSQL database (see Listing [6-30](#464036_2_En_6_Chapter.xhtml#PC30)).


    ```

    @JdbcTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Import(JdbcCustomerRepository.class)

    @Testcontainers

    class JdbcCustomerRepositoryTest {

    @Container

    @ServiceConnection

    static PostgreSQLContainer postgres =

    new PostgreSQLContainer("postgres:15-alpine");

    }

    Listing 6-30

    JdbcCustomerRepositoryTest Test Setup for Testcontainers

    ```


    The `@JdbcTest` executes the test by a special JUnit extension (the `SpringExtension`)
    to bootstrap the Spring Test Context framework. The `@JdbcTest` annotation will
    replace the preconfigured `DataSource` with an embedded one by default. The `@AutoConfigureTestDatabase(replace
    = AutoConfigureTestDatabase.Replace.NONE)` annotation prevents this replacing
    as we want to provide an actual `DataSource`. As we want to create an instance
    of our repository, the `@Import(JdbcCustomerRepository.class)` annotation is added.


    Now to register the special JUnit extension for Testcontainers, the `@Testcontainers`
    annotation has been added. This extension finds fields annotated with `@Container`
    and will bootstrap the given container. For this test, that is a `PostgreSQLContainer`,
    which we instruct to use a PostgreSQL 15 Docker container. Testcontainers will
    take care of the download of this container and start an instance and then stop
    it after the test.


    When the test runs, the provided Flyway script will automatically execute and
    create the schema and populate it with some data (as that was in our Flyway script;
    see Listing [6-8](#464036_2_En_6_Chapter.xhtml#PC8) in the previous recipe).


    As the container for each test will start with a different URL, we need to tell
    this to our Spring Boot application. The created URL is automatically registered
    with the application through the use of the `@ServiceConnection` annotation. See
    also Recipe 2-3 for more information about this.


    With this we can now write some tests to validate our behavior (Listing [6-31](#464036_2_En_6_Chapter.xhtml#PC31)).


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.id()).isGreaterThan(0);

    assertThat(customer.name()).isEqualTo("T. Testing");

    assertThat(customer.email()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.id())).hasValue(customer);

    }

    @Test

    void findAllCustomers() {

    int count = repository.findAll().size();

    repository.save(new Customer("T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer("T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(count + 2);

    }

    Listing 6-31

    JdbcCustomerRepositoryTest Tests with Testcontainers

    ```'
