- fmt: '# Test Spring Data JDBC Repositories


    The tests are more or less similar to the ones used from the embedded database;
    however, here we have some additional data already in our database, and we have
    to account for that in our tests. This depends on what your database migration
    script looks like. If it generates an empty schema, you don''t need to change
    the tests.


    When using Spring Data JDBC, the test setup is slightly different. Instead of
    the `@JdbcTest` annotation, there is now the `@DataJdbcTest` annotation, which
    indicates the use of Spring Data JDBC and its test setup. Next, to do the setup
    for the needed JDBC Components (like the `DataSource`), it also enabled scanning
    for Spring Data JDBC-based repositories.


    As with the `@JdbcTest`, this setup will also automatically try to replace the
    existing `DataSource` with an embedded one. As we use Testcontainers to bootstrap
    our database, we need to disable this by adding `@AutoConfigureTestDatabase(replace
    = AutoConfigureTestDatabase.Replace.NONE)`.


    The test class still looks a lot like the regular JDBC-based test, but the difference
    is the annotation (Listing [6-32](#464036_2_En_6_Chapter.xhtml#PC32)).


    ```

    @DataJdbcTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Testcontainers

    class JdbcCustomerRepositoryTest {

    @Container

    @ServiceConnection

    static PostgreSQLContainer postgres =

    new PostgreSQLContainer("postgres:15-alpine");

    @Autowired

    private CustomerRepository repository;

    }

    ```


    It is largely the same as the initial `@JdbcTest` with Testcontainers, with the
    differences that we now use the `@DataJdbcTest` annotation, indicating we want
    to use Spring Data JDBC, and that we autowire `CustomerRepository` instead of
    the previous `JdbcCustomerRepository`. We now only need the interface for testing.


    ## Access Data with JPA


    ### Problem


    You want to use JPA in your Spring Boot application.


    ### Solution


    Spring Boot automatically detects the presence of Hibernate, and the needed JPA
    classes will use that information to configure the `EntityManagerFactory` instance.


    ### How It Works


    Spring Boot has out-of-the-box support for JPA through Hibernate. When Hibernate
    is detected, an `EntityManagerFactory` instance will be automatically configured
    using the earlier configured `DataSource`.


    You need to add `hibernate-core` and `spring-orm` as dependencies to your project.
    However, it is easier to add the `spring-boot-starter-data-jpa` dependency to
    your project (Listing [6-33](#464036_2_En_6_Chapter.xhtml#PC33)), although this
    will also pull in `spring-data-jpa` as a dependency.


    ```

    org.springframework.boot

    spring-boot-starter-data-jpa

    ```


    This will add all the necessary dependencies to the classpath.


    #### Use Plain JPA Repositories


    For JPA to work, you have to annotate the classes representing entities in your
    system. In your system, we are going to store and retrieve `Customer` from the
    database. We need to mark this as an entity using the `@Entity` annotation. In
    addition, we need to identify the ID (primary key) of the entity (here we use
    `@Id` on the `id` field). A JPA entity class is required to have a default no-args
    constructor (although it can be `package private`).


    ```

    package com.apress.springboot3recipes.jpa;

    import java.util.Objects;

    import jakarta.persistence.Column;

    import jakarta.persistence.Entity;

    import jakarta.persistence.GeneratedValue;

    import jakarta.persistence.GenerationType;

    import jakarta.persistence.Id;

    @Entity

    public class Customer {

    @Id

    @GeneratedValue(strategy = GenerationType.IDENTITY)

    private Long id;

    @Column(nullable = false)

    private final String name;

    @Column(nullable = false)

    private final String email;

    public Customer() {

    this(null,null);

    }

    public Customer(String name, String email) {

    this.name = name;

    this.email = email;

    }

    public Long getId() {

    return id;

    }

    public String getName() {

    return name;

    }

    public String getEmail() {

    return email;

    }

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o instanceof Customer other) {

    return Objects.equals(this.id, other.id);

    }

    return false;

    }

    @Override

    public int hashCode() {

    return getClass().hashCode();

    }

    @Override

    public String toString() {

    return String.format("Customer[id=%d, name=%s, email=''%s'']",

    this.id, this.name, this.email);

    }

    }

    ```


    Next, create a JPA implementation of `CustomerRepository` (see Recipe 6-2). To
    use JPA you have to get `EntityManager`. This is done by declaring a field and
    annotating it with `@PersistenceContext` (see Listing [6-34](#464036_2_En_6_Chapter.xhtml#PC35)).


    ```

    package com.apress.springboot3recipes.jpa;

    import org.springframework.stereotype.Repository;

    import java.util.List;

    import java.util.Optional;

    import jakarta.persistence.EntityManager;

    import jakarta.persistence.PersistenceContext;

    @Repository

    class JpaCustomerRepository implements CustomerRepository {

    @PersistenceContext

    private EntityManager em;

    @Override

    public List findAll() {

    return em.createQuery("SELECT c FROM Customer c", Customer.class).getResultList();

    }

    @Override

    public Optional findById(long id) {

    var customer = em.find(Customer.class, id);

    return Optional.ofNullable(customer);

    }

    @Override

    public Customer save(Customer customer) {

    em.persist(customer);

    return customer;

    }

    }

    ```


    The following `CustomerLister` class (similar to the one of Recipe 6-2) will read
    all `Customer` records from the database and print them to the log (Listing [6-35](#464036_2_En_6_Chapter.xhtml#PC36)).


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    ```


    There are some configuration options you can use to configure `EntityManagerFactory`
    in your application. Those properties can be found in the `spring.jpa` namespace
    (Table [6-4](#464036_2_En_6_Chapter.xhtml#Tab4)).


    **Table 6-4** JPA Properties'
