    ## 6-8\. Access Spring Data with MongoDB


    ### Problem


    You want to use MongoDB in your Spring Boot application.


    ### Solution


    Add the Mongo Driver as a dependency and use the `spring.data.mongodb` properties
    to let Spring Boot set up a `MongoTemplate` to the correct MongoDB.'
  trans: '

    #### 使用嵌入式数据库测试 JPA 代码


    让我们为 `CustomerRepository` 编写一个测试，并使用 H2 作为嵌入式数据库。首先，将 H2 添加为测试依赖项（清单 6-40）。


    ```

    com.h2database

    h2

    test


    清单 6-40

    用于测试的 H2 依赖项

    ```


    接下来创建 `CustomerRepositoryTest` 类（清单 6-41）。


    ```

    @DataJpaTest

    @TestPropertySource(properties = "spring.flyway.enabled=false")

    class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private TestEntityManager testEntityManager;

    }

    清单 6-41

    CustomerRepositoryTest 类

    ```


    `@DataJpaTest` 注解会使用一个特殊的 JUnit 扩展（`SpringExtension`）来执行测试，以引导 Spring 测试上下文框架。最后，还有
    `@TestPropertySource(properties = "spring.flyway.enabled=false")`，它表示我们希望禁用 Flyway。该应用程序使用
    Flyway 来管理模式；然而，这些脚本是为 PostgreSQL 编写的，而非 H2。为了进行测试，我们希望禁用 Flyway，并提供一个基于 H2 的
    `schema.sql` 来创建模式。


    ![](img/464036_2_En_6_Fige_HTML.gif)一个圆形抽象图形内部包含一个小写字母 i。 这是使用与生产系统（PostgreSQL）不同的数据库（H2）进行测试的缺点之一。你需要维护两套模式脚本，或者使用与生产系统相同的数据库进行测试。


    Spring Boot 提供了一个 `TestEntityManager`，它包含一些便捷方法，可以轻松地存储和查找测试数据。现在编写一个测试，验证记录是否正确插入（清单
    6-42）。


    ```

    @Test

    void insertNewCustomer() {

    Assertions.assertThat(repository.findAll()).isEmpty();

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.getId()).isGreaterThan(-1L);

    assertThat(customer.getName()).isEqualTo("T. Testing");

    assertThat(customer.getEmail()).isEqualTo("t.testing@test123.tst");

    Assertions.assertThat(repository.findById(customer.getId())).hasValue(customer);

    }

    清单 6-42

    CustomerRepository 插入新客户测试

    ```


    该测试首先断言数据库为空。这并非必需，但有助于检测其他测试是否污染了数据库。接下来，通过调用 `CustomerRepository` 上的 `save`
    方法，将一个 `Customer` 实例添加到数据库中。对生成的 `Customer` 实例进行验证，确保其具有 ID 以及 `name` 和 `email`
    属性。最后，再次检索该 `Customer` 并进行比较，确认其相同。


    你可以添加的另一个测试是 `findAll` 方法。当插入两条记录时，调用 `findAll` 应检索到两条记录（清单 6-43）。


    ```

    @Test

    void findAllCustomers() {

    Assertions.assertThat(repository.findAll()).isEmpty();

    testEntityManager.persist(new Customer("T. Testing1", "t.testing@test123.tst"));

    testEntityManager.persist(new Customer("T. Testing2", "t.testing@test123.tst"));

    testEntityManager.flush();

    Assertions.assertThat(repository.findAll()).hasSize(2);

    }

    清单 6-43

    CustomerRepository 查找所有测试

    ```


    可能还有更多断言，但保存数据的操作已在另一个测试方法中得到验证。


    #### 使用 Testcontainers 测试 JPA 代码


    如今更好的选择是使用 Testcontainers。Testcontainers 使用 Docker 为你的特定技术启动一个 Docker 容器。在这种情况下，我们可以使用
    PostgreSQL Docker 镜像来启动一个真实的数据库，并在测试中使用它。这样，你就可以使用实际的数据库进行测试，而无需使用内存版本，这意味着你可以执行所有想要的查询并对其进行测试。它还为你提供了测试数据库迁移脚本（如果使用）的机会。


    要使用 Testcontainers（此处针对 PostgreSQL），我们需要添加相应的依赖项（参见清单 6-44）。


    ```

    org.springframework.boot

    spring-boot-testcontainers


    org.testcontainers

    postgresql

    test


    org.testcontainers

    junit-jupiter

    test


    清单 6-44

    用于 PostgreSQL 和 JUnit Jupiter 的 Testcontainers 依赖项

    ```


    现在编写一个测试，验证记录是否正确插入到实际的 PostgreSQL 数据库中（参见清单 6-45）。


    ```

    @DataJpaTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Testcontainers

    class CustomerRepositoryTest {

    @Container

    @ServiceConnection

    static PostgreSQLContainer postgres =

    new PostgreSQLContainer("postgres:15-alpine");

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private TestEntityManager testEntityManager;

    清单 6-45

    用于 Testcontainers 的 CustomerRepositoryTest 测试设置

    ```


    `@DataJpaTest` 注解会使用一个特殊的 JUnit 扩展（`SpringExtension`）来执行测试，以引导 Spring 测试上下文框架。默认情况下，`@DataJpaTest`
    会将预配置的 `DataSource` 替换为嵌入式数据源。`@AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)`
    阻止了这种替换，因为我们希望提供一个实际的 `DataSource`。


    现在，为了注册 Testcontainers 的特殊 JUnit 扩展，添加了 `@Testcontainers` 注解。该扩展会查找带有 `@Container`
    注解的字段，并启动相应的容器。对于此测试，它是一个 `PostgreSQLContainer`，我们指示它使用 PostgreSQL 15 Docker 容器。Testcontainers
    将负责下载此容器，然后启动一个实例，并在测试结束后停止它。


    当测试运行时，提供的 Flyway 脚本将自动执行，创建模式并用一些数据填充它（因为我们的 Flyway 脚本中包含了这些；参见清单 6-8）。


    由于每个测试的容器将以不同的 URL 启动，我们需要将此信息告知 Spring Boot 应用程序。为此，我们可以使用 `@ServiceConnection`
    注解。这将自动将所需属性传递给容器。有关此内容的更多信息，请参见配方 2-3。


    有了这些，我们现在可以编写一些测试来验证我们的行为（清单 6-46）。


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.getId()).isGreaterThan(-1L);

    assertThat(customer.getName()).isEqualTo("T. Testing");

    assertThat(customer.getEmail()).isEqualTo("t.testing@test123.tst");

    testEntityManager.flush();

    testEntityManager.clear();

    Assertions.assertThat(repository.findById(customer.getId())).hasValue(customer);

    }

    @Test

    void findAllCustomers() {

    var count = repository.count();

    testEntityManager.persist(new Customer("T. Testing1", "t.testing@test123.tst"));

    testEntityManager.persist(new Customer("T. Testing2", "t.testing@test123.tst"));

    testEntityManager.flush();

    Assertions.assertThat(repository.findAll()).hasSize( (int) count + 2);

    }

    清单 6-46

    使用 Testcontainers 的 CustomerRepositoryTest 测试

    ```


    这些测试与嵌入式数据库使用的测试大致相似；但是，这里我们的数据库中已经有一些额外的数据，我们必须在测试中考虑到这一点。这取决于你的数据库迁移脚本的外观。如果它生成一个空模式，则无需更改测试。


    ## 6-8. 使用 MongoDB 访问 Spring Data


    ### 问题


    你想在 Spring Boot 应用程序中使用 MongoDB。


    ### 解决方案


    将 Mongo 驱动程序添加为依赖项，并使用 `spring.data.mongodb` 属性让 Spring Boot 为正确的 MongoDB 设置一个
    `MongoTemplate`。

    '
- fmt: '### How It Works


    Spring Boot automatically detects the presence of the MongoDB driver combined
    with the Spring Data MongoDB classes. If those are found, MongoDB as well as the
    `MongoTemplate` (among others) will be automatically set up for you.


    To use MongoDB with Spring Boot, first we need the proper dependencies. Using
    `spring-boot-starter-data-mongodb` will pull in all the needed dependencies. It
    will pull in `spring-data-mongodb` as well as the `mongodb-driver-sync` dependency,
    which is all you need to connect to MongoDB (Listing [6-47](#464036_2_En_6_Chapter.xhtml#PC48)).


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb


    Listing 6-47

    MongoDB Dependencies

    ```


    Next we need to specify the configuration for MongoDB. Where it is and which username/password
    to use are the minimum properties we need (see Listing [6-48](#464036_2_En_6_Chapter.xhtml#PC49)).


    ```

    spring.data.mongodb.host=localhost

    spring.data.mongodb.port=27017

    spring.data.mongodb.database=customer

    Listing 6-48

    MongoDB Properties

    ```


    The `application.properties` file in Listing [6-45](#464036_2_En_6_Chapter.xhtml#PC46)
    specifies the host, username/password, and name of the database to use. This is
    done by setting the respective properties in the `spring.data.mongodb` namespace.
    With the dependencies in place and the properties set, upon startup Spring Boot
    will detect both and configure MongoDB for the application. It will create the
    connections to MongoDB and configure a `MongoTemplate` to use in your application
    and when detected will also detect Spring Data–based Mongo repositories.


    ### Use the MongoTemplate


    Now that the connection is set up, you can use it, ideally through `MongoTemplate`
    to make it easier to store and retrieve documents. First you need a document you
    want to store. Let’s create a `Customer` that we want to persist (Listing [6-49](#464036_2_En_6_Chapter.xhtml#PC50)).


    ```

    package com.apress.springboot3recipes.mongo;

    public record Customer(String id, String name, String email) {

    public Customer(String name, String email) {

    this(null, name, email);

    }

    }

    Listing 6-49

    Customer Record

    ```


    The `id` field will automatically be mapped to the `_id` document identifier of
    MongoDB. If you would like to use another field, you could use the `@Id` annotation
    from Spring Data to specify which field should be used.


    Let’s create a `CustomerRepository` instance so that instances can be saved and
    retrieved (Listing [6-50](#464036_2_En_6_Chapter.xhtml#PC51)).


    ```

    package com.apress.springboot3recipes.mongo;

    import java.util.List;

    import java.util.Optional;

    public interface CustomerRepository {

    List findAll();

    Optional findById(long id);

    Customer save(Customer customer);

    }

    Listing 6-50

    CustomerRepository Interface

    ```


    The MongoDB implementation uses a `MongoTemplate`-based implementation (Listing
    [6-51](#464036_2_En_6_Chapter.xhtml#PC52)).


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.core.MongoTemplate;

    import org.springframework.stereotype.Repository;

    import java.util.List;

    import java.util.Optional;

    @Repository

    class MongoCustomerRepository implements CustomerRepository {

    private final MongoTemplate mongoTemplate;

    MongoCustomerRepository(MongoTemplate mongoTemplate) {

    this.mongoTemplate = mongoTemplate;

    }

    @Override

    public List findAll() {

    return mongoTemplate.findAll(Customer.class);

    }

    @Override

    public Optional findById(long id) {

    return Optional.ofNullable(mongoTemplate.findById(id, Customer.class));

    }

    @Override

    public Customer save(Customer customer) {

    mongoTemplate.save(customer);

    return customer;

    }

    }

    Listing 6-51

    CustomerRepository MongoTemplate-Based Implementation

    ```


    `MongoCustomerRepository` uses the preconfigured `MongoTemplate` to store and
    retrieve customers in MongoDB.


    To use all the parts, first there needs to be some data in MongoDB. An `ApplicationRunner`
    can be used to insert some data (Listing [6-52](#464036_2_En_6_Chapter.xhtml#PC53)).


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    List.of(

    new Customer("Marten Deinum", "marten@deinum.biz"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    .forEach(customers::save);

    }

    }

    Listing 6-52

    DataInitializer for MongoDB

    ```


    `DataInitializer` will use the `CustomerRepository` instance to save some `Customer`
    instances into MongoDB. Notice the `@Order`. We want this to execute first, which
    can be enforced by explicitly ordering the bean.


    Next create an `ApplicationRunner` instance to retrieve all the customers from
    MongoDB (Listing [6-53](#464036_2_En_6_Chapter.xhtml#PC54)).


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    Listing 6-53

    CustomerLister Using CustomerRepository

    ```


    This `CustomerLister` instance will use `CustomerRepository` to load all customers
    from the database and print a line in the logs.


    The application class to bootstrap all this (including the two aforementioned
    `ApplicationRunner` classes) is shown in Listing [6-54](#464036_2_En_6_Chapter.xhtml#PC55).


    ```

    package com.apress.springboot3recipes.mongo;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.core.annotation.Order;

    import org.springframework.stereotype.Component;

    import java.util.List;

    @SpringBootApplication

    public class MongoApplication {

    public static void main(String[] args) {

    SpringApplication.run(MongoApplication.class, args);

    }

    }

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    List.of(

    new Customer("Marten Deinum", "marten@deinum.biz"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    .forEach(customers::save);

    }

    }

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    Listing 6-54

    Full Application Class

    ```


    When you run the application, it will automatically connect to the MongoDB instance,
    insert data into it, and finally retrieve it and print it to the logs.


    You will need a MongoDB instance to store and retrieve documents.'
