- fmt: '### Override Properties Using Command-Line Arguments


    The last option is to use command-line arguments to override properties. In the
    previous section, you already used the command-line argument `--spring.profile.active=add`
    to specify the active profile. You can also specify `lhs` and other arguments
    that way. Use `java -jar recipe_2_2-3.0.0.jar --lhs=22 --rhs=25 --op=+` to run
    the application; you will see that it does the calculation based on the arguments
    passed in through the command line (Figure [2-5](#464036_2_En_2_Chapter.xhtml#Fig5)).
    Arguments from the command line always override all other configurations.


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Fig5_HTML.jpg)


    A screenshot of the marten window. It reads a set of program codes in Spring Boot
    that runs the application with a Java jar recipe and performs the calculation
    based on the arguments passed in through the command line.


    **Figure 2-5** Calculator application output - overridden properties using arguments


    ### Load Properties from Different Configuration Files


    If you are using a different file than `application.properties` or you have some
    component that comes with an embedded file you want to load, you can always use
    an additional `@PropertySource` annotation on your `@SpringBootApplication` annotated
    class to load that additional file. See Listing [2-12](#464036_2_En_2_Chapter.xhtml#PC13).


    ```

    @PropertySource("classpath:your-external.properties")

    @SpringBootApplication

    public class MyApplication { ... }

    ```


    **Listing 2-12** Application Class with `@PropertySource`


    The `@PropertySource` annotation allows you to add additional property files to
    be loaded during startup. You can also specify the behavior when the file isn’t
    found by specifying the `ignoreResourceNotFound` attribute and setting it to `true`
    (the default is `false`).


    Although adding an additional `@PropertySource` annotation would work, it doesn’t
    rely on Spring Boot to load it and as such wouldn’t get the same treatment. You
    wouldn’t be able to load a different configuration for another profile. However,
    instead of using an `@PropertySource` annotation, you can instruct Spring Boot
    to load additional property files using command-line parameters (see Table [2-1](#464036_2_En_2_Chapter.xhtml#Tab1)).


    **Table 2-1** Configuration Parameters


    | Parameter | Description |

    | --- | --- |

    | `spring.config.name` | Comma-separated string of filenames to load; the default
    is `application`. |

    | `spring.config.location` | Comma-separated string of resource locations (or
    files) to consider for loading property files from; the default is `classpath:/,classpath:/config/,file:./,file:./config/`.
    |

    | `spring.config.additional-location` | Comma-separated string of additional resource
    locations (or files) to consider for loading property files from; the default
    is empty. |


    > **Note:** An information icon with the letter i inside a circle. When using
    `spring.config.location` or `spring.config.additional-location` with a file location,
    this will be used as is, and a profile-specific one won’t be loaded. When using
    a directory, the profile-specific files will be loaded.


    Using `--spring.config.name=your-external` would be sufficient to load the `your-external.properties`
    file; however, this will break loading `application.properties`, so it is better
    to use `--spring.config.name=application,your-external`. Now all the locations
    will be searched for both `application.properties` and `your-external.properties`,
    and also the profile-specific versions will be taken into consideration.


    ## 2-3. Configure Testing


    ### Problem


    You want to write a test for a component or part of your Spring Boot application.


    ### Solution


    Spring Boot extends the range of features of the Spring Testing framework. It
    adds support for mocking and spying (through Mockito) on beans as well as provides
    autoconfiguration for web tests. It also introduces easy ways of testing slices
    of your application by bootstrapping only what is needed (through the use of `@WebMvCTest`
    or `@JdbcTest`, for instance) or to write full-blown integration tests with `@SpringBootTest`.


    ### How It Works


    Spring Boot extended the auto-configuration to parts of the test framework as
    well. It integrates with Mockito for easy mocking (or spying) on beans. It also
    provides auto-configuration for web-based tests using either the Spring MockMvc
    testing framework or WebDriver-based testing.


    #### Write a Unit Test


    First let’s write a simple unit test for one of the components of the calculator,
    `MultiplicationTest`, which will test the `Multiplication` class. See Listing
    [2-13](#464036_2_En_2_Chapter.xhtml#PC14).


    ```

    package com.apress.springboot3recipes.calculator.operation;

    import org.junit.jupiter.api.Test;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class MultiplicationTest {

    private final Multiplication operation = new Multiplication();

    @Test

    public void shouldMatchSign() {

    assertTrue(operation.handles(''*''));

    assertFalse(operation.handles(''/''));

    }

    @Test

    public void shouldCorrectlyApplyFormula() {

    assertEquals(4, operation.apply(2, 2));

    assertEquals(120, operation.apply(12, 10));

    }

    }

    ```


    **Listing 2-13** Basic Unit Test


    This is a basic unit test. Once `Multiplication` is instantiated, we call methods
    on it, and finally we validate the outcome. The first test will test if it really
    reacts to the `*` operator and not something else. The second test will test the
    actual multiplication logic. To make a method a test method, you will have to
    annotate it with `@Test`.'
  raw: '#### Override Properties Using Command-Line Arguments


    The last option is to use command-line arguments to override properties. In the
    previous section, you already used the command-line argument `--spring.profile.active=add`
    to specify the active profile. You can also specify `lhs` and other arguments
    that way. Use `java -jar recipe_2_2-3.0.0.jar --lhs=22 --rhs=25 --op=+` to run
    the application; you will see that it does the calculation based on the arguments
    passed in through the command line (Figure [2-5](#464036_2_En_2_Chapter.xhtml#Fig5)).
    Arguments from the command line always override all other configurations.


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Fig5_HTML.jpg)


    A screenshot of the marten window. It reads a set of program codes in Spring Boot
    that runs the application with a Java jar recipe and performs the calculation
    based on the arguments passed in through the command line.


    Figure 2-5


    Calculator application output - overridden properties using arguments


    #### Load Properties from Different Configuration Files


    If you are using a different file than `application.properties` or you have some
    component that comes with an embedded file you want to load, you can always use
    an additional `@PropertySource` annotation on your `@SpringBootApplication` annotated
    class to load that additional file. See Listing [2-12](#464036_2_En_2_Chapter.xhtml#PC13).


    ```

    @PropertySource("classpath:your-external.properties")

    @SpringBootApplication

    public class MyApplication { ... }

    Listing 2-12

    Application Class with @PropertySource

    ```


    The `@PropertySource` annotation allows you to add additional property files to
    be loaded during startup. You can also specify the behavior when the file isn’t
    found by specifying the `ignoreResourceNotFound` attribute and setting it to `true`
    (the default is `false`).


    Although adding an additional `@PropertySource` annotation would work, it doesn’t
    rely on Spring Boot to load it and as such wouldn’t get the same treatment. You
    wouldn’t be able to load a different configuration for another profile. However,
    instead of using an `@PropertySource` annotation, you can instruct Spring Boot
    to load additional property files using command-line parameters (see Table [2-1](#464036_2_En_2_Chapter.xhtml#Tab1)).


    Table 2-1


    Configuration Parameters


    | Parameter | Description |

    | --- | --- |

    | `spring.config.name` | Comma-separated string of filenames to load; the default
    is `application`. |

    | `spring.config.location` | Comma-separated string of resource locations (or
    files) to consider for loading property files from; the default is `classpath:/,classpath:/config/,file:./,file:./config/`.
    |

    | `spring.config.additional-location` | Comma-separated string of additional resource
    locations (or files) to consider for loading property files from; the default
    is empty. |


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Figf_HTML.gif)An information icon
    with the letter i inside a circle.When using `spring.config.location` or `spring.config.additional-location`
    with a file location, this will be used as is, and a profile-specific one won’t
    be loaded. When using a directory, the profile-specific files will be loaded.


    Using `--spring.config.name=your-external` would be sufficient to load the `your-external.properties`
    file; however, this will break loading `application.properties`, so it is better
    to use `--spring.config.name=application,your-external`. Now all the locations
    will be searched for both `application.properties` and `your-external.properties`,
    and also the profile-specific versions will be taken into consideration.


    ## 2-3\. Configure Testing


    ### Problem


    You want to write a test for a component or part of your Spring Boot application.


    ### Solution


    Spring Boot extends the range of features of the Spring Testing framework. It
    adds support for mocking and spying (through Mockito) on beans as well as provides
    autoconfiguration for web tests. It also introduces easy ways of testing slices
    of your application by bootstrapping only what is needed (through the use of `@WebMvCTest`
    or `@JdbcTest`, for instance) or to write full-blown integration tests with `@SpringBootTest`.


    ### How It Works


    Spring Boot extended the auto-configuration to parts of the test framework as
    well. It integrates with Mockito for easy mocking (or spying) on beans. It also
    provides auto-configuration for web-based tests using either the Spring MockMvc
    testing framework or WebDriver-based testing.


    #### Write a Unit Test


    First let’s write a simple unit test for one of the components of the calculator,
    `MultiplicationTest`, which will test the `Multiplication` class. See Listing
    [2-13](#464036_2_En_2_Chapter.xhtml#PC14).


    ```

    package com.apress.springboot3recipes.calculator.operation;

    import org.junit.jupiter.api.Test;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class MultiplicationTest {

    private final Multiplication operation = new Multiplication();

    @Test

    public void shouldMatchSign() {

    assertTrue(operation.handles(''*''));

    assertFalse(operation.handles(''/''));

    }

    @Test

    public void shouldCorrectlyApplyFormula() {

    assertEquals(4, operation.apply(2, 2));

    assertEquals(120, operation.apply(12, 10));

    }

    }

    Listing 2-13

    Basic Unit Test

    ```


    This is a basic unit test. Once `Multiplication` is instantiated, we call methods
    on it, and finally we validate the outcome. The first test will test if it really
    reacts to the `*` operator and not something else. The second test will test the
    actual multiplication logic. To make a method a test method, you will have to
    annotate it with `@Test`.'
