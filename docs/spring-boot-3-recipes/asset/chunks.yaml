- fmt: "### Authenticate Using OAuth2\n\nInstead of manually storing passwords and\
    \ users, often an external resource is being used, mostly by utilizing OAuth2\
    \ or OpenID Connect. This is supported by a large number of providers such as\
    \ Google, Microsoft, and GitHub but also by companies that specialize in security\
    \ like Keycloak and Okta. For this part we are going to use GitHub.\n\nTo start,\
    \ register a new OAuth application with GitHub (see Figure [5-4](#464036_2_En_5_Chapter.xhtml#Fig4)).\
    \ Make sure the `Homepage URL` and `Authorization Callback URL` are as in this\
    \ image.\n\n![](images/464036_2_En_5_Chapter/464036_2_En_5_Fig4_HTML.jpg)\n\n\
    A screenshot of the page to register a new OAuth application. It displays the\
    \ application name, home page URL, application description, authorization callback\
    \ URL, and a check box to enable device flow. The register application and cancel\
    \ buttons are at the bottom.\n\n**Figure 5-4** GitHub OAuth application registration\n\
    \nAfter the registration on the next page, copy the `clientId` and generate a\
    \ secret and copy that as well, as those are needed in the configuration. See\
    \ Figure [5-5](#464036_2_En_5_Chapter.xhtml#Fig5).\n\n![](images/464036_2_En_5_Chapter/464036_2_En_5_Fig5_HTML.jpg)\n\
    \nA screenshot of the Spring Boot 3 recipes page. The client ID and the option\
    \ to generate a new client secret option are highlighted.\n\n**Figure 5-5** GitHub\
    \ OAuth application registration, page 2\n\nTo enable the OAuth support in Spring\
    \ Security, you need to add the `spring-boot-starter-oauth2-client` dependency;\
    \ this will pull in the necessary Spring Security and OAuth dependencies. See\
    \ Listing [5-27](#464036_2_En_5_Chapter.xhtml#PC31).\n\n```\norg.springframework.boot\n\
    spring-boot-starter-oauth2-client\n```\n\n**Listing 5-27** Spring Security OAuth2\
    \ Client Starter Dependency\n\nNow that this dependency in Spring Boot will automatically\
    \ detect the classes and, when the proper configuration is given, will set up\
    \ OAuth2 authentication. To configure it, we need to provide Spring Security with\
    \ the `clientId` and `secret` from our GitHub OAuth application. See Listing [5-28](#464036_2_En_5_Chapter.xhtml#PC32).\n\
    \n```\nspring:\n  security:\n    oauth2:\n      client:\n        registration:\n\
    \          github:\n            client-id: \n            client-secret:  \n```\n\
    \n**Listing 5-28** Spring Security OAuth2 Client Configuration\n\nAn important\
    \ part here is the `github` name in this configuration. Spring Security will automatically\
    \ configure the proper authentication URLs for certain providers, and GitHub is\
    \ one of them. The out-of-the-box supported providers are GitHub, Google, Facebook,\
    \ and Okta. For these providers, automatically `authorizationUri` is being set.\
    \ This is the URL that you will be redirected to for authentication.\n\nIt is\
    \ of course possible to fully customize the URL or the information retrieved from\
    \ the OAuth provider if needed. For this, the defaults will suffice.\n\nNow when\
    \ launching the application and trying to access `http://localhost:8080/books`,\
    \ you will be redirected to GitHub and will be asked to log in (if you aren’t\
    \ already) and to approve the access for the previously registered application.\
    \ If you approve, you will be redirected to the application and will see the list\
    \ of books.\n\n### Encrypt Passwords\n\nUntil now, you have been storing user\
    \ details with clear-text passwords. But this approach is vulnerable to hacker\
    \ attacks, so you should encrypt the passwords before storing them. Spring Security\
    \ supports several algorithms for encrypting passwords. For example, you can choose\
    \ BCrypt, a one-way hash algorithm, to encrypt your passwords.\n\n![](images/464036_2_En_5_Chapter/464036_2_En_5_Figg_HTML.gif)\
    \ An information icon with the letter i inside a circle. You may need a helper\
    \ to calculate BCrypt hashes for your passwords. You can do this online through,\
    \ for example, [`https://www.dailycred.com/article/bcrypt-calculator`](https://www.dailycred.com/article/bcrypt-calculator),\
    \ or you can simply create a class with a `main` method that uses Spring Security’s\
    \ `BCryptPasswordEncoder`. Another option, not commonly used, is to install the\
    \ Spring Boot CLI and use that to generate the hashes.\n\nOf course, you have\
    \ to store the encrypted passwords in the database tables, instead of the clear-text\
    \ passwords, as shown in Table [5-7](#464036_2_En_5_Chapter.xhtml#Tab7). To store\
    \ BCrypt hashes in the password field, the length of the field has to be at least\
    \ 68 characters long (that is the length of the BCrypt hash plus the encryption\
    \ type `{bcrypt}`).\n\n**Table 5-7** User Data with Encrypted Passwords for the\
    \ USERS Table\n\n| USERNAME | PASSWORD | ENABLED |\n| --- | --- | --- |\n| `admin@ya2do.io`\
    \ | `{bcrypt}$2a$10$E3mPTZb50e7sSW15fDx8Ne7hDZpfDjrmMPTTUp8wVjLTu.G5oPYCO` | `1`\
    \ |\n| `marten@ya2do.io` | `{bcrypt}$2a$10$5VWqjwoMYnFRTTmbWCRZT.iY3WW8ny27kQuUL9yPK1/WJcPcBLFWO`\
    \ | `1` |\n| `jdoe@does.net` | `{bcrypt}$2a$10$cFKh0.XCUOA9L.in5smIiO2QIOT8.6ufQSwIIC.AVz26WctxhSWC6`\
    \ | `0` |\n\n## 5-4. Make Access Control Decisions\n\n### Problem\n\nIn the authentication\
    \ process, an application will grant a successfully authenticated user a set of\
    \ authorities. When this user attempts to access a resource in the application,\
    \ the application has to decide whether the resource is accessible with the granted\
    \ authorities or other characteristics.\n\n### Solution\n\nThe decision about\
    \ whether a user is allowed to access a resource in an application is called an\
    \ *access control decision*. It is based on the user’s authentication status and\
    \ the resource’s nature and access attributes."
