    #### 启用 JFR 事件处理


    要启用 JFR 事件发布，我们需要使用 `FlightRecorderApplicationStartup` 类来配置 Spring Boot，而不是使用默认的空操作类。你可以通过调用
    `setApplicationStartup` 方法来实现这一点，该方法在大多数（但并非所有）应用程序上下文实现所使用的基类中定义。注册之后，调用 `refresh`
    来开始加载应用程序上下文。请参见清单 7-13。


    ```

    package com.apress.springboot3recipes.order;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.core.metrics.jfr.FlightRecorderApplicationStartup;

    @SpringBootApplication

    public class OrderApplication {

    public static void main(String[] args) {

    var app = new SpringApplication(OrderApplication.class);

    app.setApplicationStartup(new FlightRecorderApplicationStartup());

    app.run(args);

    }

    @Bean

    ApplicationRunner orderInitializer(OrderService orders) {

    return args -> {

    OrderGenerator.generate(5)

    .subscribe(orders::save);

    };

    }

    }

    清单 7-13

    包含 ApplicationStartup 配置的主类

    ```


    现在，我们不再使用便捷的 `SpringApplication.run`，而是构造一个 `SpringApplication` 实例，这允许我们在应用程序实际启动之前进行更多配置。这里我们将
    `applicationStartup` 属性设置为前面提到的 `FlightRecorderApplicationStartup`。


    然而，仅凭这些设置，事件并不会被记录。为此，你需要将 `StartFlightRecording` 属性添加到 JVM 中。为 JVM 添加属性是通过在 `java`
    命令后传递 `-XX` 参数来完成的。请参见清单 7-14。


    ```

    java -XX:StartFlightRecording:filename=recording.jfr,duration=30s -jar target/recipe_7_5_i-3.0.0.jar

    清单 7-14

    Java 启动命令

    ```


    这将启动启用了 JFR 的应用程序。它会将事件写入名为 `recording.jfr` 的文件中，并记录 30 秒的数据。


    另一种选择是在运行时（即应用程序运行过程中）启用 JFR。你可以使用 `jcmd` 命令来实现。在基于 Unix 的系统上，使用进程资源管理器（Windows）或
    `ps` 命令，你需要确定要启用 JFR 的 Java 进程的进程 ID。假设进程 ID 是 4321，那么清单 7-15 将启用 JFR。


    ```

    jcmd 4321 JFR.start duration=30s filename=recording.jfr

    清单 7-15

    JCMD 启动命令

    ```


    启用 JFR 时，你会在控制台上看到一些指示输出，如清单 7-16 所示。


    ```

    [0,524s][info][jfr,startup] Started recording 1\. The result will be written to:

    [0,524s][info][jfr,startup]

    [0,524s][info][jfr,startup] /Users/marten/Repositories/apress/spring-boot-3-recipes/code/ch07/recipe_7_5_i/recording.jfr

    清单 7-16

    记录已启用输出

    ```


    停止应用程序后，你可以在 Java Mission Control 中打开 `recording.jfr` 文件来观察事件。请参见图 7-8。


    ![](img/464036_2_En_7_Fig8_HTML.jpg)


    Azul Mission Control 窗口的截图。它在事件浏览器下列出了选项，并带有一个包含六列的表格，标题分别为开始时间、持续时间、结束时间、事件线程、事件
    ID、名称、父级和标签。


    图 7-8


    Java Mission Control


    如你所见，有几个 `spring.*` 事件，它们都对应于应用程序上下文或其 Bean 生命周期的一部分。这使得 JFR 成为一个强大的工具，有助于识别应用程序启动的哪些部分拖慢了速度。


    ## 7-6\. 使用 Micrometer 观察你的应用程序


    在配方 7-5 中，你了解了 Java Flight Recorder。虽然这是一个强大的工具，但对于 Spring Boot 应用程序来说，它主要用于监控应用程序的启动。它不能替代
    Java 分析器或像 Micrometer 这样的指标库。当有需要时，Spring 和 Spring Boot 会与 Micrometer 进行开箱即用的集成，Spring
    安全、Spring Data 等许多 Spring 项目组合也是如此。


    近年来，Micrometer API 已成为记录指标和对应用程序进行追踪的事实标准。Micrometer 可以与许多不同的监控系统集成，例如 Prometheus、Influx
    和 New Relic。越来越多的监控系统正在被添加进来，如果某个系统不支持开箱即用，你也可以很容易地自己将其与 Micrometer 集成。


    为了提供更好的集成，Spring 和 Spring Boot 在其内部嵌入了对 Micrometer API 的支持，默认使用一个空操作注册表，但可以配置为将数据发送到受支持的监控系统之一。Spring
    Boot 会自动配置指标，并将其暴露给所选的监控系统。包含 `spring-boot-starter-actuator` 会添加对暴露指标的支持。由于我们在此示例中使用的是
    Web 应用程序，因此指标会自动作为 Spring Boot Actuator 端点暴露出来。


    ### 问题


    你想要为你的应用程序收集指标，并且希望你的基于 Spring 的应用程序通过 JMX 发布这些指标。


    ### 解决方案


    Micrometer 定义了 `Observation`（观察）的概念，它允许在你的应用程序中同时支持指标和追踪。指标包括计时器、计量器和计数器，并提供了一种收集应用程序运行时行为统计数据的方法，例如正在处理的
    HTTP 请求数量及其各自的结果。指标有助于分析性能、应用程序使用模式和错误率。追踪则允许更全面地了解你的应用程序环境，并使你能够跟踪整个系统中的请求（HTTP、消息等）。


    #### Micrometer 概念


    以下是 Micrometer `Observation` 概念的快速概述：


    *   `Observation` 是对应用程序中发生的事件的实际记录。`Observation` 实例由 `ObservationHandler` 处理，以提供指标和/或追踪。


    *   每个观察都有一个 `ObservationContext` 实现，它保存了该 `Observation` 的所有相关元数据。例如，在 HTTP 请求的情况下，它将保存
    HTTP 方法、响应状态等。


    *   每个 `Observation` 由一个或多个 `KeyValues` 组成。在 HTTP 请求的情况下，这将是 HTTP 方法、响应状态、处理时间等。`KeyValues`
    被提供给一个 `ObservationConvention` 实现（有很多这样的实现），该实现与特定的 `ObservationContext` 实现相关联。


    *   当 `KeyValue` 的可能值数量较少且有限时（例如，HTTP 方法只有少数几种），`KeyValues` 被称为*低基数*。低基数值仅贡献给指标。


    *   当可能性数量无限时（例如 URL），`KeyValues` 被称为*高基数*。高基数值仅贡献给追踪。


    *   最后，还有一个 `ObservationDocumentation`，它记录了一个领域内所有可能的观察，描述了预期的键名及其含义。


    为了记录指标，Micrometer 需要一个 `MeterRegistry`，这样 `Observation` 实例就可以使用它来创建计数器、计时器等。不同的技术有不同的
    `MeterRegistry` 实现（这是与所使用的特定监控工具集成的部分）。这里我们将使用默认的 Spring Boot Actuator 端点来显示指标。

