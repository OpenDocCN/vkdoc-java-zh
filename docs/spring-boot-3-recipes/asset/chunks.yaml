    ### Initialize the Database with Flyway


    When developing an application, you want more control of the database migration.
    While using `schema.sql` and `data.sql` files is very quick and easy, it eventually
    will get cumbersome to maintain. Spring Boot also supports Flyway, which is, simply
    said, a version control for your database schema. It allows you to incrementally
    change/update your database schema. To use Flyway, the first thing to do is to
    add the dependency on Flyway itself (Listing [6-12](#464036_2_En_6_Chapter.xhtml#PC12)).


    ```

    org.flywaydb

    flyway-core


    Listing 6-12

    Flyway Dependency

    ```


    Spring Boot will detect the presence of Flyway, and it will assume you want to
    use it to do database migrations. The migration scripts should be in the `db/migration`
    folder in `src/main/resources`. This is the default location that can be changed
    by specifying `spring.flyway.locations` in your `application.properties` file.
    See Listing [6-13](#464036_2_En_6_Chapter.xhtml#PC13) for a migration script to
    use instead of `schema.sql` and `data.sql`.


    ```

    CREATE TABLE customer (

    id SERIAL PRIMARY KEY,

    name VARCHAR(100) NOT NULL,

    email VARCHAR(255) NOT NULL,

    UNIQUE(name)

    );

    INSERT INTO customer (name, email) VALUES

    (''Marten Deinum'', ''marten@deinum.biz''),

    (''Josh Long'', ''jlong@pivotal.com''),

    (''John Doe'', ''john.doe@island.io''),

    (''Jane Doe'', ''jane.doe@island.io'');

    Listing 6-13

    Flyway Migration Script

    ```


    This SQL when put in a `V1__first.sql` file in the `db/migration` folder will
    be executed on startup (assuming an empty database). The naming convention by
    default is `V<sequence>__<name>.sql` and is used to determine what to execute.
    Once a script has been executed, you cannot (and shouldn’t) modify the script
    as that will lead to Flyway preventing your application from starting. It detects
    changes in scripts already executed.


    When running the application, the customers should still be listed, and you will
    notice an additional table in the table listing: `flyway_schema_history`. This
    table contains the metadata used by Flyway to detect (and guard) database changes.


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Fig4_HTML.jpg)


    A screenshot of the page reads a set of program logs in Spring Boot. It runs the
    application and lists the customers, along with an additional table listing flyaway
    schema history. It contains the flyway metadata to detect database changes.


    Figure 6-4


    CustomerLister output: Flyway


    There are also several properties you can use to configure Flyway with Spring
    Boot; see Table [6-3](#464036_2_En_6_Chapter.xhtml#Tab3) for the most commonly
    used properties.


    Table 6-3


    Commonly Used Flyway Properties


    | Property | Description |

    | --- | --- |

    | `spring.flyway.enabled` | Sets whether Flyway should be enabled; the default
    is `true`. |

    | `spring.flyway.encoding` | Sets the encoding of the SQL migration files; this
    defaults to UTF-8. |

    | `spring.flyway.fail-on-missing-locations` | Sets whether Flyway should fail/abort
    if the location is missing; the default is `false`. |

    | `spring.flyway.locations` | Sets the locations of the migration scripts; the
    default is `classpath:db/migration`. |

    | `spring.flyway.url` | Sets the JDBC URL of the database to migrate; when not
    set, it uses the default configured `DataSource`. |

    | `spring.flyway.user` | Sets the username to use for the database if Flyway uses
    its own `DataSource`. |

    | `spring.flyway.password` | Sets the password to use for the database if Flyway
    uses its own `DataSource`. |

    | `spring.flyway.sql-migration-prefix` | Sets the prefix to detect the SQL migration
    files; the default is `V`. |

    | `spring.flyway.sql-migration-suffixes` | Sets the suffixes used to detect the
    SQL migration files; the default is `.sql`. |

    | `spring.flyway.license-key` | Sets the license key for Flyway Teams (the paid
    version of Flyway). |


    ## 6-3\. Use JdbcTemplate or JdbcClient


    ### Problem


    You want to use `JdbcTemplate`, `NamedParameterJdbcTemplate`, or `JdbcClient`
    to have a better JDBC experience.


    ### Solution


    Use the automatically configured `JdbcTemplate`, `NamedParameterJdbcTemplate`,
    or `JdbcClient` to execute the queries and handle the results.


    ### How It Works


    Spring Boot will configure a `JdbcTemplate`, `NamedParameterJdbcTemplate`, and
    `JdbcClient` by default and does so when it can detect a single candidate `DataSource`.
    A single candidate `DataSource` means there is either only a single `DataSource`
    or there is one marked as a primary resource using `@Primary`. As the `JdbcTemplate`
    is already available, you can use that to write your JDBC code. Rewriting the
    `CustomerLister` to use the `JdbcTemplate` instead of a plain `DataSource` will
    make the code a little easier to read and thus easier to handle (see Listing [6-14](#464036_2_En_6_Chapter.xhtml#PC14)).


    ```

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final JdbcTemplate jdbc;

    CustomerLister(JdbcTemplate jdbc) {

    this.jdbc = jdbc;

    }

    @Override

    public void run(ApplicationArguments args) {

    jdbc.query("SELECT id, name, email FROM customer", rs -> {

    logger.info("Customer [id={}, name={}, email={}]",

    rs.getLong(1), rs.getString(2), rs.getString(3));

    });

    }

    }

    Listing 6-14

    CustomerLister Using JdbcTemplate

    ```


    The `JdbcTemplate` is used to execute the query through the `query` method; this
    method takes a `String` and a `RowCallbackHandler`. The `JdbcTemplate` will execute
    the query and for each row call the `RowCallbackHandler`, which does the logging
    of the row. When running the application, the output is still the same, but the
    code becomes easier.


    The `JdbcTemplate` also has the probably more familiar `RowMapper` interface,
    which can be used to map a row from the `ResultSet` to a Java object. Let’s create
    a `Customer` class and use a `RowMapper` to create `Customer` instances from the
    database (Listing [6-15](#464036_2_En_6_Chapter.xhtml#PC15)).


    ```

    package com.apress.springboot3recipes.jdbc;

    public record Customer(Long id, String name, String email) {

    public Customer(String name, String email) {

    this(null, name, email);

    }

    }

    Listing 6-15

    Customer Record

    ```


    Next we create a repository interface to define the contract and create a JDBC-based
    implementation (Listing [6-16](#464036_2_En_6_Chapter.xhtml#PC16)).


    ```

    package com.apress.springboot3recipes.jdbc;

    import java.util.List;

    import java.util.Optional;

    public interface CustomerRepository {

    List findAll();

    Optional findById(long id);

    Customer save(Customer customer);

    }

    Listing 6-16

    CustomerRepository Interface

    ```


    Next the implementation uses `JdbcTemplate` and a `RowMapper` instance to map
    the results to `Customer` objects (Listing [6-17](#464036_2_En_6_Chapter.xhtml#PC17)).'
