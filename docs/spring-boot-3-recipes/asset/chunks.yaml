  raw: '### How It Works


    A bean that has `@RabbitListener` and/or `@RabbitHandler` annotated methods will
    be used as message listeners from incoming messages. A message listener container
    is constructed, and the annotated method will receive the incoming message. The
    message listener container can be configured through properties in the `spring.rabbitmq.listener`
    namespace (see Table [8-13](#464036_2_En_8_Chapter.xhtml#Tab13)).


    Table 8-13


    Rabbit Listener Properties


    | Property | Description |

    | --- | --- |

    | `spring.rabbitmq.listener.type` | Sets the listener container type `direct`
    or `simple`; the default is `simple`. |

    | `spring.rabbitmq.listener.simple.acknowledge-mode` | Sets the container acknowledge
    mode; the default is none. |

    | `spring.rabbitmq.listener.simple.prefetch` | Sets the number of messages to
    be handled in a single request; the default is none. |

    | `spring.rabbitmq.listener.simple.default-requeue-rejected` | Sets whether rejected
    deliveries should be re-queued. |

    | `spring.rabbitmq.listener.simple.concurrency` | Sets the minimum number of listener
    invoker threads. |

    | `spring.rabbitmq.listener.simple.max-concurrency` | Sets the maximum number
    of listener invoker threads. |

    | `spring.rabbitmq.listener.simple.transaction-size` | Sets the number of messages
    processed in a single transaction. For best results, this should be smaller or
    equal to the prefetch size. |

    | `spring.rabbitmq.listener.direct.acknowledge-mode` | Sets the container acknowledge
    mode; the default is none. |

    | `spring.rabbitmq.listener.direct.prefetch` | Sets the number of messages to
    be handled in a single request; the default is none. |

    | `spring.rabbitmq.listener.direct.default-requeue-rejected` | Sets whether rejected
    deliveries should be re-queued. |

    | `spring.rabbitmq.listener.direct.consumers-per-queue` | Sets whether rejected
    deliveries should be re-queued. |


    #### Receive a Simple Message


    A component with an `@RabbitListener` annotation is all that is needed to start
    receiving messages from RabbitMQ. See Listing [8-31](#464036_2_En_8_Chapter.xhtml#PC37).


    ```

    @Component

    class HelloWorldReceiver {

    @RabbitListener( queues = "hello")

    public void receive(String msg) {

    System.out.println("Received: " + msg);

    }

    }

    Listing 8-31

    RabbitMQ Listener for String Messages

    ```


    This component will receive all the messages from the `hello` queue and print
    them to the console (Figure [8-7](#464036_2_En_8_Chapter.xhtml#Fig7)). This works
    fine for simple payloads or if the receiving object can be deserialized from the
    payload of the message. However, when sending objects or complex messages, you
    might prefer to use JSON or XML.


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig7_HTML.jpg)


    An output of a Rabbit M Q Listener for String Messages. It receives all the messages
    from the hello queue and prints them to the console. The starting Rabbit sender
    application using Java 21.0.1 with P I D 33009, no active profile set, and the
    started Rabbit sender application in 1.803 seconds are included in the output.


    Figure 8-7


    RabbitMQ listener output


    #### Receive an Object


    To receive a more complex object without relying on Java serialization, you need
    to configure a `MessageConverter` (see also Recipe 8-4). The configured `MessageConverter`
    will be used by the message listener container to convert incoming payloads into
    an object required by the `@RabbitListener` annotated method. See Listing [8-32](#464036_2_En_8_Chapter.xhtml#PC38).


    ```

    @Bean

    public Jackson2JsonMessageConverter jsonMessageConverter() {

    return new Jackson2JsonMessageConverter();

    }

    Listing 8-32

    JSON MessageConverter Configuration

    ```


    To configure the `MessageConverter`, create an `@Bean` annotated method and construct
    the converter you want to use; here the converter is a Jackson 2–based one, but
    there is also one for unmarshaling XML: `MarshallingMessageConverter`. See Listing
    [8-33](#464036_2_En_8_Chapter.xhtml#PC39).


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings =

    @QueueBinding(

    exchange =@Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    Listing 8-33

    Rabbit Listener for Orders

    ```


    The previous listener will user the `orders` exchange (which is a fanout exchange)
    and create a binding for the `incoming-orders` using the `new-order` routing key.
    When started, the exchange and queue will automatically be created if they don’t
    already exist. The incoming message is converted into an `Order` using `Jackson2JsonMessageConverter`.
    The output should be similar to Figure [8-8](#464036_2_En_8_Chapter.xhtml#Fig8).


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig8_HTML.jpg)


    An output of a Rabbit listener for orders. The starting Rabbit sender application
    using Java 21.0.1 with P I D 33009, no active profile set, the started Rabbit
    receiver application in 2.063 seconds, and the received order i d and amount are
    included in the output.


    Figure 8-8


    RabbitMQ listener output: orders'
