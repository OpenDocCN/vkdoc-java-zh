    This will result in a warning in the log if not explicitly enabled or disabled.
    |

    | `spring.jpa.hibernate.ddl-auto` | Shorthand for the `hibernate.hbm2ddl.auto`
    property. The default is `none` and `create-drop` for embedded databases. |

