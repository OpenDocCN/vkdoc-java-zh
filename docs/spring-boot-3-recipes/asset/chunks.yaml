- fmt: '### How It Works


    Spring Boot enables the default security settings when no explicit security configuration
    can be found. When one or more are found, it will use them to configure the security.
    Security configurations are those with an `@EnableWebSecurity` and/or `@EnableMethodSecurity`.
    Including the `@EnableWebSecurity` annotation will automatically pull in the `HttpSecurityConfiguration`
    class, which contains the default security settings and possibility to customize
    them.


    To help you better understand the various login mechanisms in isolation, let’s
    first discuss the default security configuration. Note that the login services
    introduced are registered automatically if you include `@EnableWebSecurity`.


    Before enabling the authentication features, you will have to enable the basic
    Spring Security requirements. You need at least to configure exception handling
    and security context integration. See Listing [5-7](#464036_2_En_5_Chapter.xhtml#PC8).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.securityContext(Customizer.withDefaults());

    http.exceptionHandling(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-7

    Security Context Integration and Exception Handling

    ```


    Without these basics, Spring Security wouldn’t store the user after doing a login,
    and it wouldn’t do proper exception translation for security-related exceptions
    (they would simply bubble up, which might expose some of your internals to the
    outside world). You also might want to enable the Servlet API integration so that
    you can use the methods on `HttpServletRequest` to do checks in your view. See
    Listing [5-8](#464036_2_En_5_Chapter.xhtml#PC9).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.servletApi(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-8

    Servlet API Defaults

    ```


    ### HTTP Basic Authentication


    The HTTP Basic authentication support can be configured via the `httpBasic()`
    method. When HTTP Basic authentication is required, a browser will typically display
    a login dialog box or a browser-specific login page for users to log in. See Listing
    [5-9](#464036_2_En_5_Chapter.xhtml#PC10).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.httpBasic(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-9

    Enabling Basic Authentication with the Defaults

    ```


    ### Form-Based Login


    The form-based login service will render a web page that contains a login form
    for users to input their login details and process the login form submission.
    It’s configured via the `formLogin` method. See Listing [5-10](#464036_2_En_5_Chapter.xhtml#PC11).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-10

    Enable Form-Based Login

    ```


    By default, Spring Security automatically creates a login page and maps it to
    the URL `/login`. So, you can add a link to your application (e.g., in `index.html`
    of Recipe 3-3), referring to this URL for login:


    ```

    Login

    ```


    If you don’t prefer the default login page, you can provide a custom login page
    of your own. For example, you can create the `login.html` file in `src/main/resources/templates`
    (when using Thymeleaf). See Listing [5-11](#464036_2_En_5_Chapter.xhtml#PC13).


    ```

    Login


    body {

    background-color: #DADADA;

    }

    body > .grid {

    height: 100%;

    }

    .column {

    max-width: 450px;

    }


    Log-in to your account


    Login


    Listing 5-11

    Custom Login Page

    ```


    For Spring Security to display your custom login page when a login is requested,
    you have to specify its URL in the `loginPage` configuration method (see Listing
    [5-12](#464036_2_En_5_Chapter.xhtml#PC14)).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin( (login) ->

    login.loginPage("/login.html")

    return http.build();

    }

    }

    Listing 5-12

    Custom Login Page Configuration

    ```


    Finally, add a view resolver to map `/login` to the `login.html` page. For this
    you can have the `LibrarySecurityConfig` implement `WebMvcConfigurer` and implement
    the `addViewControllers` methods.


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    ...

    public void addViewControllers(ViewControllerRegistry registry) {

    registry.addViewController("/login").setViewName("login");

    }

    }

    ```


    If the login page is displayed by Spring Security when a user requests a secure
    URL, the user will be redirected to the target URL once the login succeeds. However,
    if the user requests the login page directly via its URL, by default the user
    will be redirected to the context path’s root (i.e., `http://localhost:8080/`)
    after a successful login. If you have not defined a welcome page in your web deployment
    descriptor, you may want to redirect the user to a default target URL when the
    login succeeds. See Listing [5-13](#464036_2_En_5_Chapter.xhtml#PC16).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin( (login) ->

    login.loginPage("/login.html")

    .defaultSuccessUrl("/books")

    return http.build();

    }

    }

    Listing 5-13

    Custom Login Page Configuration with Success URL

    ```


    If you use the default login page created by Spring Security, then when a login
    fails, Spring Security will render the login page again with the error message.
    However, if you specify a custom login page, you will have to configure `authentication-failure-url`
    to specify which URL to redirect to when there is a login error. For example,
    you can redirect to the custom login page again with the error request parameter.
    See Listing [5-14](#464036_2_En_5_Chapter.xhtml#PC17).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin( (login) ->

    login.loginPage("/login.html")

    .defaultSuccessUrl("/books")

    .failureUrl("/login.html?error=true").permitAll());

    return http.build();

    }

    }

    Listing 5-14

    Custom Login Page Configuration with Failure Configuration

    ```


    Then your login page should test whether the error request parameter is present.
    If an error has occurred, you will have to display the error message by accessing
    the session scope attribute `SPRING_SECURITY_LAST_EXCEPTION`, which stores the
    last exception for the current user. See Listing [5-15](#464036_2_En_5_Chapter.xhtml#PC18).


    ```

    Authentication Failed

    Reason : Exception Here


    Listing 5-15

    Login Page Display Error

    ```'
