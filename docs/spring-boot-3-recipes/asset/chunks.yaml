- fmt: '# Enable JFR Event Processing


    To enable JFR event publishing, we need to configure Spring Boot with the `FlightRecorderApplicationStartup`
    class, instead of the default no-op one. You can do this by calling the `setApplicationStartup`
    method, which is defined in a base class used by most, so not all, application
    context implementations. After the registration, you call `refresh` to start loading
    the application context. See Listing [7-13](#464036_2_En_7_Chapter.xhtml#PC18).


    ```

    package com.apress.springboot3recipes.order;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.core.metrics.jfr.FlightRecorderApplicationStartup;

    @SpringBootApplication

    public class OrderApplication {

    public static void main(String[] args) {

    var app = new SpringApplication(OrderApplication.class);

    app.setApplicationStartup(new FlightRecorderApplicationStartup());

    app.run(args);

    }

    @Bean

    ApplicationRunner orderInitializer(OrderService orders) {

    return args -> {

    OrderGenerator.generate(5)

    .subscribe(orders::save);

    };

    }

    }

    Listing 7-13

    Main Class with ApplicationStartup Configuration

    ```


    Instead of the convenient `SpringApplication.run`, we now construct an instance
    of `SpringApplication`, which allows to do some more configuration before the
    actual start of the application. Here we set the `applicationStartup` property
    to the mentioned `FlightRecorderApplicationStartup`.


    However, with only this in place, the events won’t be recorded. For that you would
    need to add the `StartFlightRecording` attribute to the JVM. Adding an attribute
    for the JVM is done by passing it with `-XX` to the `java` command. See Listing
    [7-14](#464036_2_En_7_Chapter.xhtml#PC19).


    ```

    java -XX:StartFlightRecording:filename=recording.jfr,duration=30s -jar target/recipe_7_5_i-3.0.0.jar

    Listing 7-14

    Java Launch Command

    ```


    This will start the application with the JFR enabled. It will write the events
    in a file named `recording.jfr` and will record 30 seconds of data.


    Another option is to enable the JFR in-flight, meaning in a running application.
    You can use the `jcmd` command for that. Using the Process Explorer (Windows)
    of the `ps` command on Unix-based systems, you need to determine the process ID
    of the Java process you want to enable the JFR. Let’s say the process ID is 4321;
    then Listing [7-15](#464036_2_En_7_Chapter.xhtml#PC20) would enable the JFR.


    ```

    jcmd 4321 JFR.start duration=30s filename=recording.jfr

    Listing 7-15

    JCMD Launch Command

    ```


    When enabling the JFR, you will see some output on the console indicating this,
    as shown in Listing [7-16](#464036_2_En_7_Chapter.xhtml#PC21).


    ```

    [0,524s][info][jfr,startup] Started recording 1\. The result will be written to:

    [0,524s][info][jfr,startup]

    [0,524s][info][jfr,startup] /Users/marten/Repositories/apress/spring-boot-3-recipes/code/ch07/recipe_7_5_i/recording.jfr

    Listing 7-16

    Recording Enabled Output

    ```


    After stopping the application, you can open the `recording.jfr` file in Java
    Mission Control to observe the events. See Figure [7-8](#464036_2_En_7_Chapter.xhtml#Fig8).


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Fig8_HTML.jpg)


    A screenshot of the Azul Mission control window. It lists the options under the
    event browser with a table that has six columns titled start time, duration end
    time, event thread, event i d, name, parent, and tags.


    Figure 7-8


    Java Mission Control


    As you can see, there are several `spring.*` events all corresponding to part
    of the life cycle of the application context or the beans in it. This makes the
    JFR a powerful tool to help identifying which parts of the application startup
    are slowing things down.


    ## 7-6\. Observe Your Application with Micrometer


    In Recipe 7-5 you looked at the Java Flight Recorder. While that is a powerful
    tool, for Spring Boot applications it’s mainly useful for monitoring the startup
    of an application. It is no replacement for a Java profiler or metrics library
    like Micrometer. When the need arises, Spring and Spring Boot integrate with Micrometer
    out of the box, as do many of the Spring portfolio projects such as Spring Security,
    Spring Data, etc.


    In recent years, the Micrometer API has become the de facto standard for recording
    metrics and applying tracing to your applications. Micrometer can integrate with
    many different monitoring systems, such as Prometheus, Influx, and New Relic.
    More and more monitoring systems are being added, and if it isn’t supported out
    of the box, it is fairly easy to integrate it with Micrometer yourself.


    To provide better integration, Spring and Spring Boot have embedded support for
    the Micrometer API in its internals, by default using a no-op registry, but it
    can be configured to send data to one of the supported monitoring systems. Spring
    Boot will automatically configure the metrics as well as expose them to the monitoring
    systems of choice. Including `spring-boot-starter-actuator` adds the support to
    expose the metrics. As we are using a web application for this example, the metrics
    are automatically exposed as a Spring Boot Actuator endpoint.


    ### Problem


    You want to gather metrics for your applications, and you want your Spring-based
    application to publish these metrics over JMX.


    ### Solution


    Micrometer defines a concept of an `Observation`, which allows for both metrics
    as well as tracing to be supported in your application. Metrics are timers, gauges,
    and counters and provide a way to collect statistics on the runtime behavior of
    your application such as the number of HTTP requests that are being handled and
    the respective outcome. Metrics help in analyzing performance, application usage
    patterns, and error rates. Tracing allows a more holistic view of your application
    landscape and enables you to track requests (HTTP, messages, etc.) through your
    entire system.


    #### Micrometer Concepts


    Here is a quick overview of the concepts of Micrometer `Observation`:


    *   `Observation` is the actual recording of something happening in your application.
    The `Observation` instance is handled by an `ObservationHandler` to provide metrics
    and/or traces.


    *   Every observation has an `ObservationContext` implementation, which holds
    all relevant metadata for the `Observation`. For example, in the case of an HTTP
    request, it will hold the HTTP method, response status, etc.


    *   Each `Observation` consists of one or more `KeyValues`. In the case of an
    HTTP request, this will be the HTTP method, response status, processing time,
    etc. The `KeyValues` are provided to an `ObservationConvention` implementation
    (for which there are many), which is tied to specific `ObservationContext` implementations.


    *   `KeyValues` are called *low-cardinality* when there are a low and bound number
    of possible values for the `KeyValue` (for instance, an HTTP method for which
    there are just a few). Low-cardinality values are contributed to metrics only.


    *   `KeyValues` are called *high-cardinality* when there are an unbounded number
    of possibilities (like the URL). High-cardinality values are contributed to traces
    only.


    *   Finally, there is an `ObservationDocumentation` that documents all possible
    observations in a domain, describing the expected key names and their meaning.


    To record metrics, Micrometer needs a `MeterRegistry` so the `Observation` instance
    can use it to create the counters, timers, etc. Different technologies have different
    `MeterRegistry` implementations (this is the integration part to the specific
    monitoring tool in use). Here we are going to use the default Spring Boot Actuator
    endpoint to show the metrics.'
