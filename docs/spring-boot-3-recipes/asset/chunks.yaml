- fmt: '#### Create the `pom.xml` File


    Before you can start coding, you need to create the `pom.xml` file used by Maven
    to determine what needs to be done. The easiest way to use Spring Boot is to use
    `spring-boot-starter-parent` as the parent for your application (see Listing [1-1](#464036_2_En_1_Chapter.xhtml#PC1)).


    ```

    org.springframework.boot

    spring-boot-starter-parent

    3.2.1


    Listing 1-1

    Spring Boot Starter Parent

    ```


    Next, you need to add some Spring dependencies to get started using Spring. For
    this, add `spring-boot-starter` as a dependency to your `pom.xml` file (see Listing
    [1-2](#464036_2_En_1_Chapter.xhtml#PC2)).


    ```

    org.springframework.boot

    spring-boot-starter


    Listing 1-2

    Spring Boot Dependency

    ```


    Notice that there is no version or other information needed; all this is managed
    for you because `spring-boot-starter-parent` is used as the parent for the application.
    This will pull in all the core dependencies needed to start a very basic Spring
    Boot application; this includes dependencies such as the Spring Framework, Logback
    for logging, and Spring Boot itself.


    Finally, to be able to create a JAR file that is executable, you will need to
    add the `spring-boot-maven-plugin` (Listing [1-3](#464036_2_En_1_Chapter.xhtml#PC3)).
    This plugin takes care of creating an executable JAR file. If you have ever used
    the Maven Shade plugin, this should be familiar. It takes the original JAR file
    and repackages it with all the dependencies inside it (a so-called JAR with dependencies).
    That way, you can just hand over the JAR file to the operations team, which only
    needs to use the command `java -jar <your-application>.jar` to launch the application.
    There’s no need to deploy it to a servlet container or JEE container.


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    Listing 1-3

    Spring Boot Maven Plugin

    ```


    The full `pom.xml` should now look like Listing [1-4](#464036_2_En_1_Chapter.xhtml#PC4).


    ```


    4.0.0

    com.apress.springboot3recipes

    recipe_1_1_i

    6.0.0-SNAPSHOT


    org.springframework.boot

