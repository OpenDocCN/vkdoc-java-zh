    #### 创建 pom.xml 文件


    在开始编码之前，你需要创建 Maven 用来确定构建任务的 `pom.xml` 文件。使用 Spring Boot 最简单的方式是将 `spring-boot-starter-parent`
    作为你应用的父项目（参见清单 1-1）。


    ```

    org.springframework.boot

    spring-boot-starter-parent

    3.2.1


    清单 1-1

    Spring Boot 父项目

    ```


    接下来，你需要添加一些 Spring 依赖来开始使用 Spring。为此，将 `spring-boot-starter` 作为依赖添加到你的 `pom.xml`
    文件中（参见清单 1-2）。


    ```

    org.springframework.boot

    spring-boot-starter


    清单 1-2

    Spring Boot 依赖

    ```


    请注意，这里不需要版本号或其他信息；所有这些都由系统为你管理，因为 `spring-boot-starter-parent` 被用作应用的父项目。这将引入启动一个非常基础的
    Spring Boot 应用所需的所有核心依赖；这些依赖包括 Spring 框架、用于日志记录的 Logback 以及 Spring Boot 本身。


    最后，为了能够创建一个可执行的 JAR 文件，你需要添加 `spring-boot-maven-plugin`（清单 1-3）。这个插件负责创建可执行的 JAR
    文件。如果你曾经使用过 Maven Shade 插件，应该对此很熟悉。它会获取原始的 JAR 文件，并将所有依赖重新打包到其中（即所谓的包含依赖的 JAR）。这样，你只需将
    JAR 文件交给运维团队，他们只需使用命令 `java -jar <你的应用>.jar` 即可启动应用，无需将其部署到 Servlet 容器或 JEE 容器中。


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    清单 1-3

    Spring Boot Maven 插件

    ```


    完整的 `pom.xml` 现在应该如清单 1-4 所示。


    ```


    4.0.0

    com.apress.springboot3recipes

    recipe_1_1_i

    6.0.0-SNAPSHOT


    org.springframework.boot

    spring-boot-starter-parent

    3.2.1


    org.springframework.boot

    spring-boot-starter


    org.springframework.boot

    spring-boot-maven-plugin


    清单 1-4

    完整的 pom.xml

    ```


    #### 创建应用类


    让我们创建一个包含 `main` 方法的 `DemoApplication` 类。`main` 方法调用 `SpringApplication.run`，并传入
    `DemoApplication.class` 和来自 main 方法的参数。`run` 方法返回一个 `ApplicationContext`，可以从中获取
    Bean 的名称。使用 `getBeanDefinitionNames` 方法获取名称，遍历这些名称并从 `ApplicationContext` 中获取实际的
    Bean，然后打印关于该 Bean 的一些信息。


    最终的类将如清单 1-5 所示。


    ```

    package com.apress.springboot3recipes.demo;

    import java.util.Arrays;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class DemoApplication {

    public static void main(String[] args) {

    try (var ctx = SpringApplication.run(DemoApplication.class, args)) {

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Arrays.sort(names);

    Arrays.asList(names).forEach(System.out::println);

    }

    }

    }

    清单 1-5

    DemoApplication 类

    ```


    这个类是一个包含 `main` 方法的普通 Java 类，因此你可以直接从 IDE 运行它。当应用运行时，它将显示类似于图 1-1 的输出。


    ![](img/464036_2_En_1_Fig1_HTML.jpg)


    演示应用类程序的输出。


    图 1-1


    运行应用的输出


    这段代码和注解发生了什么？`@SpringBootApplication` 注解使这个类成为 Spring Boot 应用的入口点。`@SpringBootApplication`
    类是一个所谓的组合注解，它本身被其他注解所注解（参见图 1-2）。除了某些通用的基于 Java 的注解外，你还可以看到 `@SpringBootConfiguration`、`@EnableAutoConfiguration`
    和 `@ComponentScan` 注解。


    ![](img/464036_2_En_1_Fig2_HTML.jpg)


    一张包含 @SpringBootApplication 类的截图。


    图 1-2


    @SpringBootApplication 定义


    让我们快速了解一下这些不同的注解及其作用：


    *   `@ComponentScan`：此注解指示 Spring 扫描此包及其所有子包中的所有内容。它将检测所有带有 `@Component` 注解的类。定义的过滤器用于排除某些类，可以通过使用
    `@EnableAutoConfiguration` 的 `exclude` 属性，或者通过在应用上下文中提供一个 `TypeFilter` Bean 来实现。


    *   `@EnableAutoConfiguration`：这会注册 `AutoConfigurationImportSelector`，它将从类路径中的一个文件（`/META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports`）加载自动配置类，并检查该配置是否应被包含。它还有一个额外的
    `@AutoConfigurationPackage` 注解，该注解也会将此包注册到组件扫描中，因此此包（及其子包）中的组件也会被自动检测到。


    *   `@SpringBootConfiguration`：此类是 Spring Boot 对 `@Configuration` 的特化，主要用于检测应用的主入口点。这在测试中尤其有用。你的应用应该只有一个带有
    `@SpringBootConfiguration` 注解的类，通常就是那个带有 `@SpringBootApplication` 注解的类。


    ## 1-2\. 使用 Gradle 创建 Spring Boot 应用


    ### 问题


    你想使用 Spring Boot 和 Gradle 开始开发一个应用。


    ### 解决方案


    创建一个 Gradle 构建文件 `build.gradle`，并添加所需的依赖。要启动应用，创建一个包含 `main` 方法的 Java 类来引导应用。


    ### 工作原理


    假设你将创建一个简单的应用，该应用引导 `SpringApplication`，从 `ApplicationContext` 获取所有 Bean，并将它们输出到控制台。


    #### 创建 build.gradle 文件


    首先，你需要创建一个 `build.gradle` 文件，并使用 Gradle 正确管理 Spring Boot 依赖所需的两个插件。Spring Boot
    需要一个特殊的 Gradle 插件，以及一个用于扩展 Gradle 默认依赖管理能力的插件。由于这也是一个 Java 项目，你还需要 `java` 插件。


    ```

    plugins {

    id ''java''

    id ''org.springframework.boot'' version ''3.2.1''

    id ''io.spring.dependency-management'' version ''1-1-4''

    }

    清单 1-6

    Spring Boot Gradle 插件

    ```


    最后，你需要添加所需的依赖。与配方 1-1 一样，添加 `spring-boot-starter` 依赖。


    ```

    dependencies {

    implementation ''org.springframework.boot:spring-boot-starter''

    }

    清单 1-7

    Spring Boot Gradle 依赖

    ```


    请注意依赖项上没有指定具体的版本号。如果你熟悉 Gradle，这可能会让你感到惊讶。你无需指定版本，因为它由 `io.spring.dependency-management`
    插件自动管理。与 Maven 一样，这可以简化依赖管理。


    完整的 `build.gradle` 文件现在应该类似于清单 1-8。


    ```

    plugins {

    id ''java''

    id ''org.springframework.boot'' version ''3.2.1''

    id ''io.spring.dependency-management'' version ''1-1-4''

    }

    sourceCompatibility = 21

    repositories {

    mavenCentral()

    }

    dependencies {

    implementation ''org.springframework.boot:spring-boot-starter''

    }

    tasks.named(''test'') {

    useJUnitPlatform()

    }

    清单 1-8

    完整的 Gradle 构建文件

    ```

