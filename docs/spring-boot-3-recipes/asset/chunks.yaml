  raw: '#### Stream JSON


    The result of the call to `/books` isn’t streaming, but rather it is blocking.
    It first collects all the results before sending them out. See also the content-type
    header in Figure [4-1](#464036_2_En_4_Chapter.xhtml#Fig1), which is set to `application/json`.
    To stream the result, it should be `application/x-ndjson` (or another content
    type that supports streaming). This is something to take into consideration when
    writing a client to consume this endpoint. For `HTTPie` we can specify the `Accept`
    header to make it streaming. Add `''Accept:application/x-ndjson''` to the `HTTPie`
    command from earlier, and the result will now be streaming. The result will now
    gently stream in until there is nothing more to consume (see Figure [4-2](#464036_2_En_4_Chapter.xhtml#Fig2)).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig2_HTML.jpg)


    A screenshot of the marten window. H T T P response uses the application slash
    x n d json format, streaming newline-delimited JSON data. Each object represents
    a book with authors, i s b n and title fields. However, there are formatting issues
    with missing commas and incomplete objects.


    Figure 4-2


    Result of streaming all books


    The result also slightly changes. Instead of returning an array or orders (see
    Figure [4-1](#464036_2_En_4_Chapter.xhtml#Fig1)), it now returns single orders
    (see Figure [4-2](#464036_2_En_4_Chapter.xhtml#Fig2)).


    #### Write an Integration Test


    An integration test for the `BookController` can be written quite easily using
    `WebTestClient` and a `MOCK` web environment (you could also use `RANDOM_PORT`
    instead of `MOCK`).


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.reactive.AutoConfigureWebTestClient;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.test.annotation.DirtiesContext;

    import org.springframework.test.web.reactive.server.WebTestClient;

    import java.util.List;

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.MOCK)

    @AutoConfigureWebTestClient

    @DirtiesContext(methodMode = DirtiesContext.MethodMode.AFTER_METHOD)

    class BookControllerIntegrationTest {

    @Autowired

    private WebTestClient webTestClient;

    @Test

    void listBooks() {

    webTestClient.get().uri("/books")

    .exchange()

    .expectStatus().isOk()

    .expectBodyList(Book.class).hasSize(24);

    }

    @Test

    void addAndGetBook() {

    var book = new Book("B0CBC71PHR", "Testing Spring Boot Applications Demystified",
    List.of("Philip Riecks"));

    webTestClient.post().uri("/books").bodyValue(book)

    .exchange()

    .expectStatus().isCreated()

    .expectBody(Book.class).isEqualTo(book);

    webTestClient.get().uri("/books/{isbn}", book.isbn())

    .exchange()

    .expectStatus().isOk()

    .expectBody(Book.class).isEqualTo(book);

    }

    }

    ```


    The `@DirtiesContext` annotation is needed here because `BookService` is a stateful
    bean. So after adding a `Book` to the library, it needs to be reset for the next
    test. The test will start the full application because of the `@SpringBootTest`
    annotation with a mocked environment. The `@AutoConfigureWebTestClient` annotation
    is needed for a mocked environment to get a `WebTestClient`. The `WebTestClient`
    makes it easy to build a request and send that to the server. After sending the
    response, it can do expectations on the result.


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Figb_HTML.gif)An information icon
    with the letter i inside a circle. `webEnvironment = SpringBootTest.WebEnvironment.MOCK`
    is also the default, so adding it explicitly isn’t strictly needed.


    ## 4-3\. Use Thymeleaf as a Template Engine


    ### Problem


    You want to render a view using Thymeleaf in a WebFlux-based application.


    ### Solution


    Add the dependency for Thymeleaf and create a handler to determine the view and
    fill the model.


    ### How It Works


    Add a dependency on `spring-boot-starter-webflux` and `spring-boot-starter-thymeleaf`.
    This is enough for Spring Boot to automatically configure Thymeleaf for use in
    a WebFlux application. See Listing [4-8](#464036_2_En_4_Chapter.xhtml#PC16).


    ```

    org.springframework.boot

    spring-boot-starter-webflux


    org.springframework.boot

    spring-boot-starter-thymeleaf


    Listing 4-8

    WebFlux and Thymeleaf Dependencies

    ```


    With the addition of this dependency you will get the Thymeleaf library as well
    as the Thymeleaf Spring Dialect so that they integrate nicely. Because of the
    existence of these two libraries, Spring Boot will automatically configure the
    `ThymeleafReactiveViewResolver`. The `ThymeleafReactiveViewResolver` requires
    a Thymeleaf `ISpringWebFluxTemplateEngine` to be able to resolve and render the
    views. A special `SpringWebFluxTemplateEngine` will be preconfigured with `SpringDialect`
    so that you can use SpEL inside Thymeleaf pages.


    Configuring Thymeleaf Spring Boot exposes several properties in the `spring.thymeleaf`
    and `spring.thymeleaf.reactive` namespaces (see Table [4-1](#464036_2_En_4_Chapter.xhtml#Tab1)).


    Table 4-1


    Thymeleaf Properties


    | **Property** | **Description** |

    | --- | --- |

    | `spring.thymeleaf.prefix` | Sets the `prefix` to use for the `ViewResolver`;
    the default is `classpath:/templates`. |

    | `spring.thymeleaf.suffix` | Sets the `suffix` to use for the `ViewResolver`;
    the default is `.html`. |

    | `spring.thymeleaf.encoding` | Sets the encoding of the templates; the default
    is `UTF-8`. |

    | `spring.thymeleaf.check-template` | Checks if the template exists before rendering;
    the default is `true`. |

    | `spring.thymeleaf.check-template-location` | Checks if the template location
    exists. |

    | `spring.thymeleaf.mode` | Sets the Thymeleaf `TemplateMode` to use; the default
    is `HTML`. |

    | `spring.thymeleaf.cache` | Sets whether resolved templates should be cached;
    the default is `true`. |

    | `spring.thymeleaf.template-resolver-order` | Sets the order of the `ViewResolver`;
    the default is 1. |

    | `spring.thymeleaf.view-names` | Sets the view names (separated by commas) that
    can be resolved with this `ViewResolver`. |

    | `spring.thymeleaf.exclude-view-names` | Sets the view names (separated by commas)
    that are excluded from being resolved. |

    | `spring.thymeleaf.enabled` | Sets whether Thymeleaf should be enabled; the default
    is `true`. |

    | `spring.thymeleaf.enable-spring-el-compiler` | Enables the compilation of SpEL
    expressions; the default is `false`. |

    | `spring.thymeleaf.reactive.max-chunk-size` | Sets the maximum size of the data
    buffer used to write the response in bytes. |

    | `spring.thymeleaf.reactive.media-types` | Sets the media types supported by
    this view technology. |

    | `spring.thymeleaf.reactive.full-mode-view-names` | Comma-separated list of view
    names that should operate in `FULL` mode. The default is `none`. `FULL` mode means
    basically blocking mode. |

    | `spring.thymeleaf.reactive.chunked-mode-view-names` | Comma-separated list of
    view names that should operate in chunked mode. |'
