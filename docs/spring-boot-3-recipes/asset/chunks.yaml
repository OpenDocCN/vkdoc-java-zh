- fmt: '# Use a Declarative Client


    Spring Framework 6 introduced the declarative HTTP client. With this it is possible
    to write an interface with some annotations. At runtime a proxy would be created
    that would handle the request/response including the mapping and exception handling.


    The starting point is an interface with an `@HttpExchange` annotation (or one
    of the derived annotations like `@GetExchange` or `@PostExchange`) on either the
    class or methods. It functions much in the same way as `@RequestMapping` from
    the server API.


    Using `@HttpExchange`, it is possible to set some properties (see Table 3-16).


    **Table 3-16** `HttpExchange` Properties


    | Attribute | Description |

    | --- | --- |

    | `value` or `url` | Sets the URL for the request; can be a full URL, a path relative
    to the type-level `@HttpExchange`; or the preset base URI. |

    | `method` | The HTTP method to use; `DELETE`, `GET`, `PATCH`, `POST`, `PUT`.
    The default is empty. |

    | `contentType` | The media type to send for the `Content-Type` header; the default
    is empty. |

    | `accept` | The media type for the `Accept` header. |


    In addition to the `@HttpExchange` annotation, there are also `@DeleteExchange`,
    `@GetExchange`, `@PatchExchange`, `@PostExchange`, and `@PutExchange`. These can
    be used instead of `@HttpExchange` with a specific `method` value. Using those
    annotations makes it more explicit.


    Just like request handling methods with `@RequestMapping`, the declarative client
    supports multiple arguments, annotations, and return types. It reuses common parts
    of the web infrastructure for this. See Table 3-17.


    **Table 3-17** `HttpExchange` Supported Method Arguments


    | Type | Description |

    | --- | --- |

    | `java.net.URI` | Dynamically sets the URL for the request; overrides the `url`
    attribute from the `@HttpExchange`. |

    | `UriBuilderFactory` | Provides a `UriBuilderFactory` to expand the URI template
    and URI variables. Used instead of the `UriBuilderFactory` of the underlying client.
    |

    | `HttpMethod` | Dynamically sets the HTTP method to use for the request; overrides
    the `method` attribute from the `@HttpExchange`. |

    | `MultipartFile` | Adds a request part from a `MultipartFile`; typically used
    with Spring MVC to indicate an uploaded file. |

    | `@CookieValue` | Adds cookie(s) to the outgoing request. The argument can be
    a `Map<String, ?>` or a `MultiValueMap<String, ?>` with multiple cookies or individual
    values. Uses the type conversion for non-`String` values. |

    | `@RequestHeader` | Adds request headers to the outgoing request. The argument
    can be a `Map<String, ?>` or a `MultiValueMap<String, ?>` with multiple headers
    or individual values. Uses the type conversion for non-`String` values. |

    | `@PathVariable` | Adds a variable to expand a placeholder in the request URL.
    The argument may be a `Map<String, ?>` for multiple values or an individual value.
    Uses the type conversion for non-`String` values. |

    | `@RequestBody` | Provides the body of the request either as an `Object` to be
    serialized or as a Reactive Streams Publisher such as `Mono`, `Flux`, or any other
    async type supported through the configured `ReactiveAdapterRegistry`. |

    | `@RequestParam` | Adds request parameters. Can be a `Map<String, ?>` / `MultiValueMap<String,
    ?>` for multiple values. Or can be an individual type. Uses the type conversion
    for non-`String` values. When `contentType` is `application/x-www-form-urlencoded`,
    the parameters are added to the request body. |

    | `@RequestPart` | Adds a request part that can be a `String` (becomes a form
    field), a `Resource`, an `Object` to be encoded as JSON (or whatever is configured),
    an `HttpEntity` including headers, a Spring `Part`, or a supported Reactive Streams
    Publisher. |


    In addition to the method arguments, there is also support for several method
    return types. See Table 3-18.


    **Table 3-18** `HttpExchange` Supported Method Return Types


    | Type | Description |

    | --- | --- |

    | `void` | Perform the request; no response. |

    | `HttpHeaders` | Perform the request and return only the headers. |

    | `<T>` | Perform the request and return the decoded body as type `T`. |

    | `ResponseEntity<Void>` | Perform the request and return a `ResponseEntity` with
    the `status` and `headers`. |

    | `ResponseEntity<T>` | Perform the request and return a `ResponseEntity` with
    the `status` and `headers` and the body decoded as type `T`. |


    Given this information, we could provide two interfaces to provide access to the
    APIs that we need to call. Let’s start with the API for the books. See Listing
    3-56.


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.service.annotation.GetExchange;

    public interface BookServiceClient {

    @GetExchange("http://localhost:8080/books/{isbn}")

    Book getBook(@PathVariable String isbn);

    }

    ```


    **Listing 3-56** `BookServiceClient` Sources


    The `BookServiceClient` has one method, which is annotated with `@GetExchange`.
    There is a provided value of `http://localhost:8080/books/{isbn}`, which is a
    URI template. The method takes a single argument `isbn`, which has been annotated
    with `@PathVariable`. When calling this method, the value we pass in will be placed
    in the `{isbn}` part of the URI before executing the request. When the request
    has been sent, a response comes in that is converted to a `Book`, just as we did
    with the `RestTemplate` or `RestClient`.


    Next we need an interface for the Open Library API as well. See Listing 3-57.


    ```

    package com.apress.springboot3recipes.library.rest;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.service.annotation.GetExchange;

    import org.springframework.web.service.annotation.HttpExchange;

    import java.util.Map;

    @HttpExchange(url = "https://openlibrary.org/isbn")

    public interface OpenLibraryClient {

    @GetExchange("/{isbn}.json")

    Map getInformation(@PathVariable String isbn);

    }

    ```


    **Listing 3-57** `OpenLibraryClient` Sources


    `OpenLibraryClient` has an `@HttpExchange` method with the `url` attribute set.
    This will set a base URI for use for all other methods in this interface. This
    allows us to specify only relative URLs for all other methods. Now there is only
    a single method with an `@GetExchange`. This method also takes a single argument,
    `isbn`, which is placed in the URI template as well before executing. The response
    is turned into a `Map` again just as before.


    Now that the interfaces are ready, we need to expose them in our configuration,
    but we cannot create an instance from an interface. This is where `HttpServiceProxyFactory`
    comes into play; it creates a proxy at runtime for these interfaces. To do this,
    we need to add some configuration to our application. See Listing 3-58.


    ```

    @Bean

    public HttpServiceProxyFactory httpServiceProxyFactory(RestClient.Builder builder)
    {

    var adapter = RestClientAdapter.create(builder.build());

    return HttpServiceProxyFactory.builderFor(adapter).build();

    }

    @Bean

    public BookServiceClient bookServiceClient(HttpServiceProxyFactory factory) {

    return factory.createClient(BookServiceClient.class);

    }

    @Bean

    public OpenLibraryClient openLibraryClient(HttpServiceProxyFactory factory) {

    return factory.createClient(OpenLibraryClient.class);

    }

    ```


    **Listing 3-58** `HttpServiceProxyFactory` Configuration


    `RestClient.Builder` is used to construct a `RestClient` for use with the `HttpServiceProxyFactory`.
    As the `RestClient` cannot be used directly, we need to wrap it in a `RestClientAdapter`,
    which adapts `RestClient` to the `HttpExchangeAdapter` interface.'
