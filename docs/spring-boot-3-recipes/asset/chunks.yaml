    ### Test an @RestController


    As you want to make sure that the controller does what it is supposed to do, write
    a test to verify the correct behavior of the controller. See Listing [3-12](#464036_2_En_3_Chapter.xhtml#PC13).


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.hamcrest.Matchers;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.boot.test.mock.mockito.MockBean;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.result.MockMvcResultMatchers;

    import java.util.Arrays;

    import java.util.List;

    import java.util.Optional;

    import static org.mockito.ArgumentMatchers.any;

    import static org.mockito.ArgumentMatchers.anyString;

    import static org.mockito.Mockito.when;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.header;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @WebMvcTest(BookController.class)

    public class BookControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @MockBean

    private BookService bookService;

    @Test

    public void shouldReturnListOfBooks() throws Exception {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", List.of("Marten Deinum", "Josh Long")),

    new Book("321", "Pro Spring MVC", List.of("Marten Deinum", "Colin Yates"))));

    mockMvc.perform(get("/books"))

    .andExpect(status().isOk())

    .andExpect(MockMvcResultMatchers.jsonPath("$", Matchers.hasSize(2)))

    .andExpect(MockMvcResultMatchers.jsonPath("$[*].isbn", Matchers.containsInAnyOrder("123",
    "321")))

    .andExpect(MockMvcResultMatchers.jsonPath("$[*].title", Matchers.containsInAnyOrder("Spring
    5 Recipes", "Pro Spring MVC")));

    }

    @Test

    public void shouldReturn404WhenBookNotFound() throws Exception {

    when(bookService.find(anyString())).thenReturn(Optional.empty());

    mockMvc.perform(get("/books/123"))

    .andExpect(status().isNotFound());

    }

    @Test

    public void shouldReturnBookWhenFound() throws Exception {

    when(bookService.find(anyString())).thenReturn(

    Optional.of(new Book("123", "Spring 6 Recipes", List.of("Marten Deinum", "Josh
    Long"))));

    mockMvc.perform(get("/books/123"))

    .andExpect(status().isOk())

    .andExpect(MockMvcResultMatchers.jsonPath("$.isbn", Matchers.equalTo("123")))

    .andExpect(MockMvcResultMatchers.jsonPath("$.title", Matchers.equalTo("Spring
    6 Recipes")));

    }

    @Test

    public void shouldAddBook() throws Exception {

    when(bookService.create(any(Book.class))).thenReturn(new Book("123456789", "Test
    Book Stored", List.of("T. Author")));

    mockMvc.perform(post("/books")

    .contentType(MediaType.APPLICATION_JSON)

    .content("{ \"isbn\" : \"123456789\", \"title\" : \"Test Book\", \"authors\" :
    [\"T. Author\"]}"))

    .andExpect(status().isCreated())

    .andExpect(header().string("Location", "http://localhost/books/123456789"));

    }

    }

    ```


    **Listing 3-12** Integration Test for BookController Using WebMvcTest


    The test uses `@WebMvcTest` to create a `MockMvc`-based integration test. It will
    create a minimal Spring Boot application to be able to run the controller. The
    controller needs an instance of a `BookService`, so we let the framework create
    a mock for this using the `@MockBean` annotation. In the different test methods,
    we mock the expected behavior (such as returning a list of books, returning an
    empty `Optional`, etc.).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figc_HTML.gif) An information icon
    with the letter i inside a circle. Spring Boot uses Mockito to create mocks using
    `@MockBean`.


    Furthermore, the test uses the JsonPath library so that you can use expressions
    to test the JSON result. JsonPath is to JSON as XPath is to XML.


