    #### 发送回复


    有时在接收消息时，您希望返回一个答案或触发流程的另一部分。使用 Spring 消息传递，这非常简单；您只需从处理器方法中返回想要发送的内容即可。要确定响应的发送位置，可以添加一个额外的
    `@SendTo` 注解来指定目标。让我们修改示例，将 `OrderConfirmation` 发送到 `order-confirmation` 队列。请参见清单
    8-19。


