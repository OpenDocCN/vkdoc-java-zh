    ### How It Works


    Spring Boot uses the Micrometer observation to observe calls to pass through your
    applications. When `spring-boot-starter-actuator` is included as a dependency,
    Spring Boot will automatically pull in the Micrometer observation.


    With this, Spring Boot will automatically set up an `ObservationHandler` for use
    in your application. This `ObservationHandler` will be injected in an `ObservationRegistry`.
    The `ObservationRegistry` is the component that is injected into various places
    of the framework and libraries. At the moment of writing, the `ObservationRegistry`
    will automatically be applied to components from the following:


    - Spring JMS

    - Spring Web and Spring WebFlux

    - Spring Security

    - Spring Kafka

    - Spring Data for MongoDB

    - Spring Data R2DBC

    - Spring Task Executor and Task Scheduler

    - Spring AMQP (RabbitMQ)


    Spring Boot exposes some properties in the `management.observations` namespace
    to configure certain features (see Table [9-4](#464036_2_En_9_Chapter.xhtml#Tab4)).
    Some observations could be disabled, but it is also possible to specify default
    values to include in the observations. This can be useful to include parts like
    the application name or version as default key/values.


    **Table 9-4** Observation Configuration Properties


    | Property | Description |

    | --- | --- |

    | `management.observations.enable.<key>` | Sets whether the given observation
    of `<key>` should be enabled; the default is `true`. The `all` is a special keyword
    to enable or disable all observations. |

    | `management.observations.http.client.requests.name` | Sets the name of the observation
    for the client requests; the default is `http.client.requests`. |

    | `management.observations.http.server.requests.name` | Sets the name of the observation
    for the client requests; the default is `http.server.requests`. |

    | `management.observations.key-values.<key>` | Sets the common key/values that
    are applied to all observations. The default is empty. |

    | `management.observations.r2dbc.include-parameter-values` | Sets whether to include
    the query parameters for the R2DBC observations; the default is `false`. |


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Figd_HTML.gif) A warning icon.
    When Spring Boot detects a preconfigured `ObservationHandler`, it will not configure
    one for you, and the properties from Table [9-4](#464036_2_En_9_Chapter.xhtml#Tab4)
    won’t be applied as it is expected that you do the full configuration!


    Next you need to include a tracing bridge (needed to connect Micrometer with the
    tracing solution of choice). This will pull in the necessary Micrometer tracing
    dependencies (see Listing [9-12](#464036_2_En_9_Chapter.xhtml#PC12) for a sample
    Brave with Zipkin implementation).


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    io.micrometer

    micrometer-tracing-bridge-brave


    io.zipkin.reporter2

    zipkin-reporter-brave


    Listing 9-12

    Tracing Dependencies for Brave with Zipkin

    ```


    With all these dependencies in place, the auto-configuration of Spring Boot will
    configure an `ObservationHandler`. By default it will set up an `io.micrometer.tracing.handler.DefaultTracingObservationHandler`.
    When a preconfigured `ObservationHandler` is detected, Spring Boot will not create
    the default one but will reuse the preconfigured one.


    In addition to configuring an `ObservationHandler`, Spring Boot will also slightly
    modify the logging pattern that is being used to automatically include the `span-id`
    and `trace-id` that have been detected or generated. This way, logs will also
    contain the necessary information, which can be useful while troubleshooting a
    certain call. It is also possible to manually configure the log pattern by specifying
    the `logging.pattern.correlation` property in your application properties. The
    `span-id` and `trace-id` are available in the Mapped Diagnostic Context (MDC)
    under the names `traceId` and `spanId`. Listing [9-13](#464036_2_En_9_Chapter.xhtml#PC13)
    shows the default pattern that Spring Boot will apply for log correlation. This
    can of course be modified if you need.


    ```

    logging.pattern.correlation=[${spring.application.name:},%X{traceId:-},%X{spanId:-}]

    Listing 9-13

    Correlation Logging Properties

    ```'
