- fmt: '#### Set General Configuration Properties


    Several general server properties are available, as shown in Table [4-4](#464036_2_En_4_Chapter.xhtml#Tab4)
    and Table [4-5](#464036_2_En_4_Chapter.xhtml#Tab5).


    **Table 4-5** Reactive Container HTTP Session Properties


    | Property | Description |

    | --- | --- |

    | `server.reactive.session.timeout` | Session timeout; the default is 30 minutes.
    |

    | `server.reactive.session.cookie.name` | Name of the cookie to store the session
    identifier. The default is empty leaving it to the container default. |

    | `server.reactive.session.cookie.domain` | Domain value to use for the session
    cookie. The default is empty leaving it to the container default. |

    | `server.reactive.session.cookie.path` | Path value to use for the session cookie.
    The default is empty leaving it to the container default. |

    | `server.reactive.session.cookie.http-only` | Sets whether the session cookie
    should be http-only accessible. The default is empty leaving it to the container
    default. |

    | `server.reactive.session.cookie.secure` | Sets whether the cookie should be
    sent through SSL only. The default is empty leaving it to the container default.
    |

    | `server.reactive.session.cookie.max-age` | Sets the lifetime of the session
    cookie. The default is empty leaving it to the container default. |

    | `server.reactive.session.cookie.same-site` | Sets the Same-Site policy to use
    (`NONE`/`LAX`/`STRICT`); the default is `NONE`. |


    **Table 4-4** General Server Properties


    | Property | Description |

    | --- | --- |

    | `server.port` | The HTTP server port; the default is `8080`. |

    | `server.address` | The IP address to bind to; the default is `0.0.0.0`, i.e.,
    all adapters. |

    | `server.server-header` | Name of the header to send the server name; the default
    is empty. |

    | `server.max-http-header-size` | Maximum size of an HTTP header; the default
    is `0` (unlimited). |

    | `server.connection-timout` | Timeout for HTTP connectors to wait for the next
    request before closing. The default is empty leaving it to the container; a value
    of `-1` means infinite and to never time out. |

    | `server.http2.enabled` | Enable `Http2` support if the current container supports
    it. The default is `false`. |

    | `server.forward-headers-strategy` | Strategy for the `X-Forward-*` headers support;
    one of `native`, `framework`, `none`. |

    | `server.compression.enabled` | Sets whether HTTP compression should be enabled;
    the default is `false`. |

    | `server.compression.mime-types` | Comma-separated list of MIME types that compression
    applies to. |

    | `server.compression.excluded-user-agents` | Comma-separated list of user agents
    for which compression should be disabled. |

    | `server.compression.min-response-size` | Minimum size of the request for compression
    to be applied; the default is `2048`. |

    | `server.shutdown` | Server shutdown mode; one of `immediate` or `graceful`.
    The default is `immediate`. |


    > **Note:** An information icon with the letter i inside a circle. When using
    Spring Session, only the `server.servlet.session.timeout` property applies!


    Finally, Spring Boot makes it easy to configure SSL by exposing a few properties;
    see Table [4-6](#464036_2_En_4_Chapter.xhtml#Tab6) and Recipe 4-8 for how to configure
    SSL.


    **Table 4-6** Servlet Container SSL Properties


    | Property | Description |

    | --- | --- |

    | `server.ssl.enabled` | Enables SSL; the default is `true`. |

    | `server.ssl.bundle` | Sets the name of the SSL bundle to use. |

    | `server.ssl.ciphers` | Sets the supported SSL ciphers; the default is empty.
    |

    | `server.ssl.client-auth` | Enables SSL client authentication; one of `none`,
    `want` or `need`. The default is empty. |

    | `server.ssl.protocol` | Sets the SSL protocol to use; the default is `TLS`.
    |

    | `server.ssl.enabled-protocols` | Sets which SSL protocols are enabled; the default
    is empty. |

    | `server.ssl.key-alias` | Sets the alias to identify the key in the keystore;
    the default is empty. |

    | `server.ssl.key-password` | Sets the password to access the key in the keystore;
    the default is empty. |

    | `server.ssl.key-store` | Sets the location of the keystore, typically a JKS
    file; the default is empty. |

    | `server.ssl.key-store-password` | Sets the password to access the keystore;
    the default is empty. |

    | `server.ssl.key-store-type` | Sets the type of the keystore; the default is
    empty. |

    | `server.ssl.key-store-provider` | Sets the provider of the keystore; the default
    is empty. |

    | `server.ssl.trust-store` | Sets the location of the trust store. |

    | `server.ssl.trust-store-password` | Sets the password to access the trust store;
    the default is empty. |

    | `server.ssl.trust-store-type` | Sets the type of the trust store; the default
    is empty. |

    | `server.ssl.trust-store-provider` | Sets the provider of the trust store; the
    default is empty. |


    > **Note:** An information icon with the letter i inside a circle. All the properties
    mentioned in the previous tables apply *only* when using an embedded container
    to run your application. When deploying to an external container (i.e., deploying
    a WAR file), the settings do not apply!


    #### Change the Runtime Container


    When including the `spring-boot-starter-webflux` dependency, it will automatically
    include a dependency to the Reactor Netty container as it has a dependency on
    the `spring-boot-starter-reactor-netty` artifact. To enable a different servlet
    container, `spring-boot-starter-reactor-netty` needs to be excluded, and one of
    `spring-boot-starter-jetty` or `spring-boot-starter-undertow` needs to be included.
    See Listing [4-31](#464036_2_En_4_Chapter.xhtml#PC35).


    ```

    org.springframework.boot

    spring-boot-starter-webflux


    org.springframework.boot

    spring-boot-starter-reactor-netty


    org.springframework.boot

    spring-boot-starter-undertow


    Listing 4-31

    Exclusion of Reactor Netty and Use of Undertow

    ```


    In Maven you can use an `<exclusion>` element inside your `<dependency>` to exclude
    a dependency.


    Now when the application is started, it will start with Undertow instead of using
    Reactor Netty (see Figure [4-8](#464036_2_En_4_Chapter.xhtml#Fig8)).


    ![A screenshot of the Spring Boot page. It reads a set of program logs that starts
    the application with an undertow instead of using reactor netty.](images/464036_2_En_4_Chapter/464036_2_En_4_Fig8_HTML.jpg)


    **Figure 4-8** Bootstrap logging with Undertow container


    ## 4-8. Configure SSL for the Reactive Container


    ### Problem


    You want your application to be accessible through HTTPS next (or instead of)
    HTTP.


    ### Solution


    Get a certificate, place it in a keystore, and use the `server.ssl` properties
    to configure the keystore. Spring Boot will then automatically configure the server
    to be accessible through HTTPS only.


    ### How It Works


    Using `server.ssl.keystore` (and related properties), you can configure the embedded
    container to accept only HTTPS connections. Before you can configure SSL, you
    will need to have a certificate to secure your application. Generally, you will
    want to get a certificate from a certificate authority such as Verisign or Let’s
    Encrypt. However, for development purposes, you can use a self-signed certificate
    (see the section “Create a Self-Signed Certificate”).'
