- fmt: "### How It Works\n\nTo work with R2DBC, the first thing you need to do is\
    \ to add the required dependencies: `r2dbc`, `spring-r2dbc`, and `spring-data-r2dbc`.\
    \ However, to make it easier, Spring Boot provides `spring-boot-starter-r2dbc`\
    \ to pull in all those dependencies at once (Listing [6-68](#464036_2_En_6_Chapter.xhtml#PC69)).\n\
    \n```\norg.postgresql\nr2dbc-postgresql\n\nListing 6-68\nSpring Data R2DBC Starter\
    \ Dependency\n```\n\nIt will use the properties in the `spring.r2dbc` namespace\
    \ to configure the connections to the database (see Table [6-6](#464036_2_En_6_Chapter.xhtml#Tab6)\
    \ and Table [6-7](#464036_2_En_6_Chapter.xhtml#Tab7)). Just like for JDBC, the\
    \ `spring.datasource` namespace is used.\n\n**Table 6-7**  \nR2DBC Connection\
    \ Pool Properties\n\n| Property | Description |\n| --- | --- |\n| `spring.r2dbc.pool.enabled`\
    \ | Sets whether the R2DBC connection pooling is enabled; the default is `true`.\
    \ |\n| `spring.r2dbc.pool.initial-size` | Sets the initial number of connections\
    \ to create; the default is `10`. |\n| `spring.r2dbc.pool.max-acquire-time` |\
    \ Sets the maximum time to wait to obtain a connection from the pool; the default\
    \ is indefinite. |\n| `spring.r2dbc.pool.max-create-connection-time` | Sets the\
    \ maximum time to wait to create a new connection; the default is indefinite.\
    \ |\n| `spring.r2dbc.pool.max-idle-time` | Sets the maximum time for a connection\
    \ to sit idle in the pool; the default is 30 minutes. |\n| `spring.r2dbc.pool.max-life-time`\
    \ | Sets the maximum time for a connection to live; the default is indefinite.\
    \ |\n| `spring.r2dbc.pool.max-size` | Sets the maximum number of connections to\
    \ allow to be created; the default is `10`. |\n| `spring.r2dbc.pool.validation-depth`\
    \ | Sets the depth of the validation, `LOCAL` or `REMOTE`; the default is `LOCAL`.\
    \ |\n| `spring.r2dbc.pool.validation-query` | Sets the query to use to validate\
    \ the health of the connection; the default is `null`. |\n\n**Table 6-6**  \n\
    R2DBC Connection Properties\n\n| Property | Description |\n| --- | --- |\n| `spring.r2dbc.url`\
    \ | Sets the R2DBC URL of the database. |\n| `spring.r2dbc.username` | Sets the\
    \ username to use to connect to the database. |\n| `spring.r2dbc.password` | Sets\
    \ the password to use to connect to the database. |\n| `spring.r2dbc.name` | Sets\
    \ the name of the database to use if not set in the URL; the default is `testdb`.\
    \ |\n| `spring.r2dbc.generate-unique-name` | Sets whether to generate a random\
    \ database name. Ignores any configured name when enabled; the default is `false`.\
    \ This is useful when writing tests with an in-memory database. |\n| `spring.r2dbc.properties`\
    \ | Sets additional R2DBC driver properties. |\n\nTo connect to the database,\
    \ we need at least `spring.r2dbc.url` to be set; this can include all the information\
    \ needed such as the database name, username, and password. But often `spring.r2dbc.username`\
    \ and `spring.r2dbc.password` are passed separately. To connect to the database\
    \ created earlier (see Recipe 6-2), we need the properties shown in Listing [6-69](#464036_2_En_6_Chapter.xhtml#PC70).\n\
    \n```\nspring.r2dbc.url=r2dbc:postgresql://localhost:5432/customers\nspring.r2dbc.username=customers\n\
    spring.r2dbc.password=customers\nspring.sql.init.mode=always\nListing 6-69\nR2DBC\
    \ Application Properties\n```\n\nHere you see the `spring.r2dbc` properties to\
    \ connect to the database as well as a `spring.sql.init.mode` property with a\
    \ value of `ALWAYS`. This is to initialize the database and insert some data (see\
    \ Recipe 6-2 for more on database initialization).\n\nTo work with the database,\
    \ let’s use a repository and create a different implementation for this. Listing\
    \ [6-70](#464036_2_En_6_Chapter.xhtml#PC71) shows the `CustomerRepository` interface.\n\
    \n```\npackage com.apress.springboot3recipes.r2dbc;\nimport reactor.core.publisher.Flux;\n\
    import reactor.core.publisher.Mono;\npublic interface CustomerRepository {\nFlux\
    \ findAll();\nMono findById(long id);\nMono save(Customer customer);\n}\nListing\
    \ 6-70\nReactive CustomerRepository Interface\n```\n\nThe methods return either\
    \ a `Flux` or `Mono`, respectively zero or more or zero or one, which are the\
    \ reactive types from Project Reactor. Project Reactor is the reactive implementation\
    \ used internally with Spring, but it is also possible to work with RxJava or\
    \ SmallRye Mutiny.\n\nNext we need a class that uses this interface to retrieve\
    \ the customers and prints out the results (Listing [6-71](#464036_2_En_6_Chapter.xhtml#PC72)).\n\
    \n```\n@Component\nclass CustomerLister implements ApplicationRunner {\nprivate\
    \ final Logger logger = LoggerFactory.getLogger(getClass());\nprivate final CustomerRepository\
    \ customers;\nCustomerLister(CustomerRepository customers) {\nthis.customers =\
    \ customers;\n}\n@Override\npublic void run(ApplicationArguments args) {\ncustomers.findAll()\n\
    .subscribe( (customer) -> logger.info(\"{}\", customer));\n}\n}\nListing 6-71\n\
    Reactive Customer Lister\n```\n\nThis `CustomerLister` instance will use the `CustomerRepository`\
    \ interface to call the `findAll` method and print out the given results to the\
    \ console (see Figure [6-4](#464036_2_En_6_Chapter.xhtml#Fig4)).\n\nFinally, we\
    \ need a bootstrap class to run the code (Listing [6-72](#464036_2_En_6_Chapter.xhtml#PC73)).\n\
    \n```\npackage com.apress.springboot3recipes.r2dbc;\nimport org.slf4j.Logger;\n\
    import org.slf4j.LoggerFactory;\nimport org.springframework.boot.ApplicationArguments;\n\
    import org.springframework.boot.ApplicationRunner;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.core.annotation.Order;\n\
    import org.springframework.r2dbc.core.DatabaseClient;\nimport org.springframework.stereotype.Component;\n\
    @SpringBootApplication\npublic class R2dbcApplication {\npublic static void main(String[]\
    \ args) throws Exception {\nSpringApplication.run(R2dbcApplication.class, args);\n\
    System.in.read();\n}\n}\nListing 6-72\nSpring Boot Application\n```\n\nThis Spring\
    \ Boot application will detect the implementation of `CustomerRepository` (see\
    \ the next sections), inject it into `CustomerLister`, and execute it as an `ApplicationRunner`\
    \ instance. As we have a reactive application and nothing to keep it running,\
    \ we need something to prevent the shutdown. For this we can use a `System.in.read()`\
    \ method. This will pause the shutdown until you press Enter."
  raw: '### How It Works


    To work with R2DBC, the first thing you need to do is to add the required dependencies:
    `r2dbc`, `spring-r2dbc`, and `spring-data-r2dbc`. However, to make it easier,
    Spring Boot provides `spring-boot-starter-r2dbc` to pull in all those dependencies
    at once (Listing [6-68](#464036_2_En_6_Chapter.xhtml#PC69)).


    ```

    org.postgresql

    r2dbc-postgresql


    Listing 6-68

    Spring Data R2DBC Starter Dependency

    ```


    It will use the properties in the `spring.r2dbc` namespace to configure the connections
    to the database (see Table [6-6](#464036_2_En_6_Chapter.xhtml#Tab6) and Table
    [6-7](#464036_2_En_6_Chapter.xhtml#Tab7)). Just like for JDBC, the `spring.datasource`
    namespace is used.


    Table 6-7


    R2DBC Connection Pool Properties


    | Property | Description |

    | --- | --- |

    | `spring.r2dbc.pool.enabled` | Sets whether the R2DBC connection pooling is enabled;
    the default is `true`. |

    | `spring.r2dbc.pool.initial-size` | Sets the initial number of connections to
    create; the default is `10`. |

    | `spring.r2dbc.pool.max-acquire-time` | Sets the maximum time to wait to obtain
    a connection from the pool; the default is indefinite. |

    | `spring.r2dbc.pool.max-create-connection-time` | Sets the maximum time to wait
    to create a new connection; the default is indefinite. |

    | `spring.r2dbc.pool.max-idle-time` | Sets the maximum time for a connection to
    sit idle in the pool; the default is 30 minutes. |

    | `spring.r2dbc.pool.max-life-time` | Sets the maximum time for a connection to
    live; the default is indefinite. |

    | `spring.r2dbc.pool.max-size` | Sets the maximum number of connections to allow
    to be created; the default is `10`. |

    | `spring.r2dbc.pool.validation-depth` | Sets the depth of the validation, `LOCAL`
    or `REMOTE`; the default is `LOCAL`. |

    | `spring.r2dbc.pool.validation-query` | Sets the query to use to validate the
    health of the connection; the default is `null`. |


    Table 6-6


    R2DBC Connection Properties


    | Property | Description |

    | --- | --- |

    | `spring.r2dbc.url` | Sets the R2DBC URL of the databse. |

    | `spring.r2dbc.username` | Sets the username to use to connect to the database.
    |

    | `spring.r2dbc.password` | Sets the password to use to connect to the database.
    |

    | `spring.r2dbc.name` | Sets the name of the database to use if not set in the
    URL; the default is `testdb`. |

    | `spring.r2dbc.generate-unique-name` | Sets whether to generate a random database
    name. Ignores any configured name when enabled; the default is `false`. This is
    useful when writing tests with an in-memory database. |

    | `spring.r2dbc.properties` | Sets additional R2DBC driver properties. |


    To connect to the database, we need at least `spring.r2dbc.url` to be set; this
    can include all the information needed such as the database name, username, and
    password. But often `spring.r2dbc.username` and `spring.r2dbc.password` are passed
    separately. To connect to the database created earlier (see Recipe 6-2), we need
    the properties shown in Listing [6-69](#464036_2_En_6_Chapter.xhtml#PC70).


    ```

    spring.r2dbc.url=r2dbc:postgresql://localhost:5432/customers

    spring.r2dbc.username=customers

    spring.r2dbc.password=customers

    spring.sql.init.mode=always

    Listing 6-69

    R2DBC Application Properties

    ```


    Here you see the `spring.r2dbc` properties to connect to the database as well
    as a `spring.sql.init.mode` property with a value of `ALWAYS`. This is to initialize
    the database and insert some data (see Recipe 6-2 for more on database initialization).


    To work with the database, let’s use a repository and create a different implementation
    for this. Listing [6-70](#464036_2_En_6_Chapter.xhtml#PC71) shows the `CustomerRepository`
    interface.


    ```

    package com.apress.springboot3recipes.r2dbc;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    public interface CustomerRepository {

    Flux findAll();

    Mono findById(long id);

    Mono save(Customer customer);

    }

    Listing 6-70

    Reactive CustomerRepository Interface

    ```


    The methods return either a `Flux` or `Mono`, respectively zero or more or zero
    or one, which are the reactive types from Project Reactor. Project Reactor is
    the reactive implementation used internally with Spring, but it is also possible
    to work with RxJava or SmallRye Mutiny.


    Next we need a class that uses this interface to retrieve the customers and prints
    out the results (Listing [6-71](#464036_2_En_6_Chapter.xhtml#PC72)).


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .subscribe( (customer) -> logger.info("{}", customer));

    }

    }

    Listing 6-71

    Reactive Customer Lister

    ```


    This `CustomerLister` instance will use the `CustomerRepository` interface to
    call the `findAll` method and print out the given results to the console (see
    Figure [6-4](#464036_2_En_6_Chapter.xhtml#Fig4)).


    Finally, we need a bootstrap class to run the code (Listing [6-72](#464036_2_En_6_Chapter.xhtml#PC73)).


    ```

    package com.apress.springboot3recipes.r2dbc;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.core.annotation.Order;

    import org.springframework.r2dbc.core.DatabaseClient;

    import org.springframework.stereotype.Component;

    @SpringBootApplication

    public class R2dbcApplication {

    public static void main(String[] args) throws Exception {

    SpringApplication.run(R2dbcApplication.class, args);

    System.in.read();

    }

    }

    Listing 6-72

    Spring Boot Application

    ```


    This Spring Boot application will detect the implementation of `CustomerRepository`
    (see the next sections), inject it into `CustomerLister`, and execute it as an
    `ApplicationRunner` instance. As we have a reactive application and nothing to
    keep it running, we need something to prevent the shutdown. For this we can use
    a `System.in.read()` method. This will pause the shutdown until you press Enter.'
