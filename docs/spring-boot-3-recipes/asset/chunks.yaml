    请注意，我们现在可以调用接口上的方法，而无需担心构建正确的请求。这一切都隐藏在接口外观和代理内部。这使得编写可在应用程序中使用的可重用API客户端变得更加容易。


    最后，请注意异常处理没有改变，因为声明式客户端仍然使用相同的基础设施，因此`RestClient`的异常处理无需更改。


