- fmt: '### Handle Exceptions for REST Controllers


    Write a custom `ErrorAttributes` to replace the default one (Figure [3-10](#464036_2_En_3_Chapter.xhtml#Fig10))
    and to fill the model that is being written as a response.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig10_HTML.jpg)


    A screenshot of the marten window. It reads a set of program code that defines
    the custom error attributes to replace the default one and to fill the model that
    is being written as a response.


    **Figure 3-10** Default error response


    By default Spring Boot will include the attributes listed in Table [3-5](#464036_2_En_3_Chapter.xhtml#Tab5)
    in the model for the error response.


    **Table 3-5** Default Error Model Attributes


    | Attribute | Description |

    | --- | --- |

    | `timestamp` | The time that the errors were extracted |

    | `status` | The status code |

    | `error` | The error reason |

    | `exception` | The class name of the root exception (if configured) |

    | `message` | The exception message |

    | `errors` | Any errors from a `BindingResult` (when using binding and/or validation)
    |

    | `trace` | The exception stack trace (if configured) |

    | `path` | The URL path when the exception was raised |


    This is all done through the use of an `ErrorAttributes` component. The default
    used and configured is `DefaultErrorAttributes`. You can create your own `ErrorAttributes`
    handler to create a custom model or extend `DefaultErrorAttributes` to add additional
    attributes. See Listing [3-23](#464036_2_En_3_Chapter.xhtml#PC27).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.web.error.ErrorAttributeOptions;

    import org.springframework.boot.web.servlet.error.DefaultErrorAttributes;

    import org.springframework.web.context.request.WebRequest;

    import java.util.Map;

    public class CustomizedErrorAttributes extends DefaultErrorAttributes {

    @Override

    public Map getErrorAttributes(WebRequest webRequest,

    ErrorAttributeOptions options) {

    var errorAttributes = super.getErrorAttributes(webRequest, options);

    errorAttributes.put("parameters", webRequest.getParameterMap());

    return errorAttributes;

    }

    }

    ```


    **Listing 3-23** Custom `ErrorAttributes` Implementation


    The `CustomizedErrorAttributes` bean will add the original request parameters
    to the model next to the default attributes. The next step is to configure this
    as a bean so that Spring Boot can detect it and use it instead of configuring
    the default. Adding the bean definition from Listing [3-24](#464036_2_En_3_Chapter.xhtml#PC28)
    to `LibraryApplication` will make that possible.


    ```

    @Bean

    public CustomizedErrorAttributes errorAttributes() {

    return new CustomizedErrorAttributes();

    }

    ```


    **Listing 3-24** Custom `ErrorAttributes` Bean Definition


    This will generate the error shown in Figure [3-11](#464036_2_En_3_Chapter.xhtml#Fig11);
    notice the additional `parameters` attribute.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig11_HTML.jpg)


    A screenshot of the marten window. It has a set of program codes that generates
    the internal server error with the additional parameters attribute.


    **Figure 3-11** Customized error response


    ### Enable and Use Problem Details


    Spring 6 added support for the Problem Details for HTTP API (RFC-7807), and with
    Spring Boot it is quite easy to enable it. By adding `spring.mvc.problemdetails.enabled=true`
    (or `spring.webflux.problemdetails.enabled=true` for WebFlux-based applications),
    this support will be enabled.


    When this is enabled, Spring Boot will register `ProblemDetailsExceptionHandler`
    as an additional `ExceptionHandler` with a higher order. `ProblemDetailsExceptionHandler`
    will handle some well-known exception (all the Spring-related web exceptions)
    and return a result containing more information including the type `application/problem+json`
    (see Figure [3-12](#464036_2_En_3_Chapter.xhtml#Fig12)).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig12_HTML.jpg)


    A screenshot of the marten window. It has a set of program codes that generates
    the result of calling a local host with problem detail support enabled and returns
    a result containing more information including the type of application and problem
    with JSON.


    **Figure 3-12** Problem detail error response


    Figure [3-12](#464036_2_En_3_Chapter.xhtml#Fig12) shows the result of calling
    `http://localhost:8080/books/500` with Problem Detail support enabled.


    This will work for all the different Spring MVC exceptions. When a validation
    or binding error occurs, it will also show a list of fields with the error on
    what failed. It will even translate (if possible) those error messages to the
    language used by the client (see also Recipe 3-6 for I18N support).


    ## 3-5. Implement Internationalization (I18N)


    ### Problem


    When developing an internationalized web application, you have to display your
    web pages in a user’s preferred locale. You don’t want to create different versions
    of the same page for different locales.


    ### Solution


    To avoid creating different versions of a page for different locales, you should
    make your web page independent of the locale by externalizing locale-sensitive
    text messages. Spring is able to resolve text messages for you by using a message
    source, which has to implement the `MessageSource` interface. In your page templates,
    you can then either use special tags or do lookups for the messages.'
  raw: '#### Handle Exceptions for REST Controllers


    Write a custom `ErrorAttributes` to replace the default one (Figure [3-10](#464036_2_En_3_Chapter.xhtml#Fig10))
    and to fill the model that is being written as a response.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig10_HTML.jpg)


    A screenshot of the marten window. It reads a set of program code that defines
    the custom error attributes to replace the default one and to fill the model that
    is being written as a response.


    Figure 3-10


    Default error response


    By default Spring Boot will include the attributes listed in Table [3-5](#464036_2_En_3_Chapter.xhtml#Tab5)
    in the model for the error response.


    Table 3-5


    Default Error Model Attributes


    | Attribute | Description |

    | --- | --- |

    | `timestamp` | The time that the errors were extracted |

    | `status` | The status code |

    | `error` | The error reason |

    | `exception` | The class name of the root exception (if configured) |

    | `message` | The exception message |

    | `errors` | Any errors from a `BindingResult` (when using binding and/or validation)
    |

    | `trace` | The exception stack trace (if configured) |

    | `path` | The URL path when the exception was raised |


    This is all done through the use of an `ErrorAttributes` component. The default
    used and configured is `DefaultErrorAttributes`. You can create your own `ErrorAttributes`
    handler to create a custom model or extend `DefaultErrorAttributes` to add additional
    attributes. See Listing [3-23](#464036_2_En_3_Chapter.xhtml#PC27).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.web.error.ErrorAttributeOptions;

    import org.springframework.boot.web.servlet.error.DefaultErrorAttributes;

    import org.springframework.web.context.request.WebRequest;

    import java.util.Map;

    public class CustomizedErrorAttributes extends DefaultErrorAttributes {

    @Override

    public Map getErrorAttributes(WebRequest webRequest,

    ErrorAttributeOptions options) {

    var errorAttributes = super.getErrorAttributes(webRequest, options);

    errorAttributes.put("parameters", webRequest.getParameterMap());

    return errorAttributes;

    }

    }

    Listing 3-23

    Custom ErrorAttributes Implementation

    ```


    The `CustomizedErrorAttributes` bean will add the original request parameters
    to the model next to the default attributes. The next step is to configure this
    as a bean so that Spring Boot can detect it and use it instead of configuring
    the default. Adding the bean definition from Listing [3-24](#464036_2_En_3_Chapter.xhtml#PC28)
    to `LibraryApplication` will make that possible.


    ```

    @Bean

    public CustomizedErrorAttributes errorAttributes() {

    return new CustomizedErrorAttributes();

    }

    Listing 3-24

    Custom ErrorAttributes Bean Defnition

    ```


    This will generate the error shown in Figure [3-11](#464036_2_En_3_Chapter.xhtml#Fig11);
    notice the additional `parameters` attribute.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig11_HTML.jpg)


    A screenshot of the marten window. It has a set of program codes that generates
    the internal server error with the additional parameters attribute.


    Figure 3-11


    Customized error response


    #### Enable and Use Problem Details


    Spring 6 added support for the Problem Details for HTTP API (RFC-7807), and with
    Spring Boot it is quite easy to enable it. By adding `spring.mvc.problemdetails.enabled=true`
    (or `spring.webflux.problemdetails.enabled=true` for WebFlux-based applications),
    this support will be enabled.


    When this is enabled, Spring Boot will register `ProblemDetailsExceptionHandler`
    as an additional `ExceptionHandler` with a higher order. `ProblemDetailsExceptionHandler`
    will handle some well-known exception (all the Spring-related web exceptions)
    and return a result containing more information including the type `application/problem+json`
    (see Figure [3-12](#464036_2_En_3_Chapter.xhtml#Fig12)).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig12_HTML.jpg)


    A screenshot of the marten window. It has a set of program codes that generates
    the result of calling a local host with problem detail support enabled and returns
    a result containing more information including the type of application and problem
    with J S O N.


    Figure 3-12


    Problem detail error response


    Figure [3-12](#464036_2_En_3_Chapter.xhtml#Fig12) shows the result of calling
    `http://localhost:8080/books/500` with Problem Detail support enabled.


    This will work for all the different Spring MVC exceptions. When a validation
    or binding error occurs, it will also show a list of fields with the error on
    what failed. It will even translate (if possible) those error messages to the
    language used by the client (see also Recipe 3-6 for I18N support).


    ## 3-5\. Implement Internationalization (I18N)


    ### Problem


