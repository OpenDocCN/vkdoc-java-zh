    要确定消息是否已发送，我们需要一个 Kafka `Consumer`。为此，我们可以使用 Spring Kafka 的 `ConsumerFactory`
    轻松创建一个。我们订阅主题并检查是否收到任何消息。


    ![](img/464036_2_En_8_Figf_HTML.gif)一个灯泡图标。默认的 `KafkaTemplate` 没有预配置 `ConsumerFactory`。如果设置了此项（或者你使用了自定义配置的
