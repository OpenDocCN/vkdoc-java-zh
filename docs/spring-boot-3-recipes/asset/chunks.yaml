    import org.springframework.data.annotation.Id;

    import org.springframework.data.relational.core.mapping.Column;

    import org.springframework.data.relational.core.mapping.Table;

    @Table("customer")

    public record Customer(@Column("id") @Id Long id,

    @Column("name") String name,

    @Column("email") String email) {

    }

    Listing 6-75

    Customer Class for Use with R2DBC

    ```


    #### Use the R2dbcRepository


    Instead of writing an implementation with Spring Data R2DBC, you can also have
    a dynamic implementation (just as with Spring Data JPA). For the R2DBC case, you
    simply extend `ReactiveCrudRepository`, `ReactiveSortingRepository`, or `R2dbcRepository`
    depending on your needs (Listing [6-76](#464036_2_En_6_Chapter.xhtml#PC77)).


    ```

    package com.apress.springboot3recipes.r2dbc;

    import org.springframework.data.r2dbc.repository.R2dbcRepository;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    public interface CustomerRepository

    extends R2dbcRepository {

    }

    Listing 6-76

    Reactive CustomerRepository with Spring Data Repositories

    ```


    As Spring Boot automatically detects the presence of Spring Data R2DBC, it will
    automatically pick up this interface and create a dynamic bean for it to use in
    our application. The output will be similar to that of Figure [6-4](#464036_2_En_6_Chapter.xhtml#Fig4).


    ## 6-10\. Test with Spring Data R2DBC


    ### Problem


    You want to test your R2DBC-based repositories using a unit or small integration
    test.


    ### Solution


    Use the Spring Test Context framework and the Spring Boot testing support to write
    a unit test using an embedded container such as Apache Derby, or use Testcontainers
    to write a dedicated integration test.'
  trans: '

    #### 使用 DatabaseClient


    当 Spring Boot 检测到 `spring-r2dbc` 时，它会自动将 `DatabaseClient` 作为 bean 添加到应用程序中。访问数据库最基本的方式就是使用这个预配置好的
    `DatabaseClient`，它来自 `spring-r2dbc`，而 `spring-r2dbc` 是 Spring 框架的一部分。借助这个 `DatabaseClient`，你可以创建
    `CustomerRepository` 的实现（清单 6-73）。


    ```

    package com.apress.springboot3recipes.r2dbc;

    import io.r2dbc.spi.Readable;

    import org.springframework.r2dbc.core.DatabaseClient;

    import org.springframework.stereotype.Repository;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    @Repository

    class R2dbcCustomerRepository implements CustomerRepository {

    private static final String ALL_QUERY = "SELECT id, name, email FROM customer";

    private static final String BY_ID_QUERY =

    "SELECT id, name, email FROM customer WHERE id=:id";

    private static final String INSERT_QUERY =

    "INSERT INTO customer (name, email) VALUES (:name, :email)";

    private final DatabaseClient client;

    R2dbcCustomerRepository(DatabaseClient client) {

    this.client = client;

    }

    @Override

    public Flux findAll() {

    return client.sql(ALL_QUERY)

    .map(this::toCustomer)

    .all();

    }

    @Override

    public Mono findById(long id) {

    return client.sql(BY_ID_QUERY)

    .bind("id", id)

    .map(this::toCustomer)

    .one();

    }

    @Override

    public Mono save(Customer customer) {

    var result = client.sql(INSERT_QUERY)

    .filter( (s) -> s.returnGeneratedValues("id"))

    .bind("name", customer.name())

    .bind("email", customer.email())

    .map( (row) -> row.get("id", Long.class))

    .first();

    return result

    .map((id) -> new Customer(id, customer.name(), customer.email()));

    }

    private Customer toCustomer(Readable row) {

    var id = row.get(0, Long.class);

    var name = row.get(1, String.class);

    var email = row.get(2, String.class);

    return new Customer(id, name, email);

    }

    }

    清单 6-73 使用 DatabaseClient 的响应式 CustomerRepository 实现

    ```


    `R2dbcCustomerRepository` 使用 `DatabaseClient` 来执行查询、映射结果并返回。通过 `sql` 方法，我们可以指定要执行的
    SQL 查询。使用 `map`，我们可以将结果转换为可用的对象，例如 `Customer`。在 `findAll` 方法中，我们执行查询以从数据库中检索所有数据，并将结果
    `map` 为 `Customer`。这里使用的 `map` 方法接受一个 `Function`，它将 `io.r2dbc.spi.Readable`（`Row`
    正是此类型）映射为另一个元素。`all()` 方法指示 `DatabaseClient` 我们可能返回 0 个或多个结果，因此它将创建一个 `Flux`。`findById`
    执行一个查询，但首先使用 `bind` 来填充查询中的 `:id` 属性；然后我们映射结果。`one()` 方法指示 `DatabaseClient` 返回
    0 个或 1 个结果；如果得到多个结果，则会抛出错误。


    `save` 方法稍微复杂一些，因为我们需要获取 `id`；我们可以使用 `filter` 方法来修改 `io.r2dbc.spi.Statement` 并指示它返回生成的键。接下来，我们需要绑定
    `:name` 和 `:email` 属性。使用 `first()` 我们可以获取返回的第一个结果。在这种情况下，我们也可以使用 `one()`。由于我们得到一个
    `Mono<Long>`，其中包含 `Customer` 的生成 ID，我们可以使用 `map` 方法来指示它使用该 ID 和给定的 `Customer`
    创建一个新的 `Customer` 进行保存。


    #### 使用 R2dbcEntityTemplate


    当在类路径上检测到 Spring Data R2DBC 时，Spring Boot 除了 `DatabaseClient` 之外，还会自动准备一个 `R2dbcEntityTemplate`
    实例。`R2dbcEntityTemplate` 是 `DatabaseClient` 的一个包装器，旨在简化数据库实体的操作（清单 6-74）。


    ```

    package com.apress.springboot3recipes.r2dbc;

    import static org.springframework.data.relational.core.query.Criteria.where;

    import org.springframework.data.r2dbc.core.R2dbcEntityTemplate;

    import org.springframework.data.relational.core.query.Query;

    import org.springframework.stereotype.Repository;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    @Repository

    class R2dbcCustomerRepository implements CustomerRepository {

    private final R2dbcEntityTemplate template;

    R2dbcCustomerRepository(R2dbcEntityTemplate template) {

    this.template = template;

    }

    @Override

    public Flux findAll() {

    return template.select(Customer.class).all();

    }

    @Override

    public Mono findById(long id) {

    return template

    .selectOne(Query.query(where("id").is(id)), Customer.class);

    }

    @Override

    public Mono save(Customer customer) {

    return template.insert(customer);

    }

    }

    清单 6-74 使用 R2dbcEntityTemplate 的响应式 CustomerRepository 实现

    ```


    使用 `R2dbcEntityTemplate` 的 `R2dbcCustomerRepository` 比使用 `DatabaseClient` 实例的版本要简单一些。从数据库到
    `Customer` 的映射以及插入操作的绑定都是自动完成的。`findById` 方法仍然有些复杂，因为我们需要为查询指定 `where` 子句。为了简化查询编写，Spring
    Data R2DBC 包含一个查询构建器。这里我们指定了对 `id` 列的限制。


    从/到数据库列的映射是基于 `Customer` 类上的元数据完成的。这是可选的。默认情况下，它会使用类名 `Customer`（首字母小写）作为表名 `customer`。如果要使用不同的表，可以通过
    `@Table` 注解来指定。对于列名到字段名的映射，情况类似：它会直接使用字段名作为列名；如果需要其他名称，可以通过 `@Column` 注解来指定。数据库记录通常也需要一个主键。如果类有一个名为
    `id` 的字段，它将自动被用作主键。如果要使用其他字段，或者想明确指定，可以用 `@Id` 注解该字段（或多个字段）（参见清单 6-75）。


    ```

    package com.apress.springboot3recipes.r2dbc;

    import org.springframework.data.annotation.Id;

    import org.springframework.data.relational.core.mapping.Column;

    import org.springframework.data.relational.core.mapping.Table;

    @Table("customer")

    public record Customer(@Column("id") @Id Long id,

    @Column("name") String name,

    @Column("email") String email) {

    }

    清单 6-75 用于 R2DBC 的 Customer 类

    ```


    #### 使用 R2dbcRepository


    除了使用 Spring Data R2DBC 编写实现之外，你还可以使用动态实现（就像使用 Spring Data JPA 一样）。对于 R2DBC 的情况，你只需根据需求扩展
    `ReactiveCrudRepository`、`ReactiveSortingRepository` 或 `R2dbcRepository` 即可（清单
    6-76）。


    ```

    package com.apress.springboot3recipes.r2dbc;

    import org.springframework.data.r2dbc.repository.R2dbcRepository;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    public interface CustomerRepository

    extends R2dbcRepository {

    }

    清单 6-76 使用 Spring Data 仓库的响应式 CustomerRepository

    ```


    由于 Spring Boot 会自动检测 Spring Data R2DBC 的存在，它会自动识别此接口并为其创建一个动态 bean，供我们的应用程序使用。输出结果将类似于图
    6-4 所示。


    ## 6-10. 使用 Spring Data R2DBC 进行测试


    ### 问题


    你想使用单元测试或小型集成测试来测试基于 R2DBC 的仓库。


    ### 解决方案


    使用 Spring 测试上下文框架和 Spring Boot 测试支持，通过嵌入式容器（如 Apache Derby）编写单元测试，或者使用 Testcontainers
    编写专门的集成测试。

    '
- fmt: '### How It Works


    When testing R2DBC code, a database is required. Often an embedded database such
    as H2, Derby, or HSQLDB is used for testing. Spring Boot makes it easy to write
    tests for R2DBC. R2DBC-based tests can be annotated with `@DataR2JpaTest`, and
    Spring Boot will create a minimal application with only the R2DBC-related beans.
    R2DBC related beans like a `ConnectionFactory`, a transaction manager and if needed
    Spring Data R2DBC repositories.


    #### Test R2DBC Code with an Embedded Database


    Let’s write a test for `CustomerRepository` and use H2 as the embedded database.
    First add H2 as a test dependency (Listing [6-77](#464036_2_En_6_Chapter.xhtml#PC78)).


    ```

    io.r2dbc

    r2dbc-h2

    test


    Listing 6-77

    Reactive H2 Dependency for Testing

    ```


    As you can see, this isn’t just the H2 dependency but rather the `r2dbc-h2` dependency
    (which pulls in the H2 database). This dependency is the reactive counterpart
    of the regular JDBC driver for H2.


    Next create `CustomerRepositoryTest` (Listing [6-78](#464036_2_En_6_Chapter.xhtml#PC79)).


    ```

    @DataR2dbcTest

    @TestPropertySource(properties =

    { "spring.r2dbc.url=r2dbc:h2:mem://testdb",

    "spring.r2dbc.generate-unique-name=true" })

    @Import(R2dbcCustomerRepository.class)

    class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private DatabaseClient db;

    @BeforeEach

    public void setup() {

    db.sql("DELETE FROM customer").fetch().first().subscribe();

    }

    }

    Listing 6-78

    CustomerRepositoryTest Class

    ```


    The `@DataR2dbcTest` annotation executes the test by a special JUnit extension
    (`SpringExtension`) to bootstrap the Spring Test Context framework. The `@DataR2dbcTest`
    annotation sets up Spring Data R2DBC (if needed) and enables all other R2DBC features.
    Using `@TestPropertySource`, we provide `spring.r2dbc.url` with an H2 in-memory
    database, and we set `spring.r2dbc.generate-unique-name` to `true`. As we want
    to test our repository, we add `@Import(R2dbcCustomerRepository.class)`. In `@BeforeEach`
    we clean up the database as to not have one test interfere with another test.


    **Tip:** When using the Spring Data R2DBC-based repository, you don’t need `@Import`
    as the repository will be automatically detected.


    Now write a test that tests if records get inserted correctly (Listing [6-79](#464036_2_En_6_Chapter.xhtml#PC80)).


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    repository.save(newCustomer)

    .as(StepVerifier::create)

    .assertNext( (c) -> assertThat(c.id()).isNotNull())

    .verifyComplete();

    }

    Listing 6-79

    CustomerRepository Inserting New Customer Test

    ```


    A `Customer` instance is added to the database by calling the `save` method on
    `CustomerRepository`. The resulting `Customer` instance is validated to have an
    ID and verify if the reactive pipeline has finished.


    Another test you could add is the `findAll` method. When inserting two records,
    calling `findAll` should result in two records being retrieved (Listing [6-80](#464036_2_En_6_Chapter.xhtml#PC81)).


    ```

    @Test

    void findAllCustomers() {

    var customers = Flux.just(

    new Customer("T. Testing1", "t.testing@test123.tst"),

    new Customer("T. Testing2", "t.testing@test123.tst"));

    customers.doOnNext(repository::save)

    .as(StepVerifier::create)

    .expectNextCount(2)

    .verifyComplete();

    }

    Listing 6-80

    CustomerRepository Find All Tests

    ```


    Of course, there could be more assertions, but saving the data is already verified
    in the other test method.


    #### Test Spring Data R2DBC Code with Testcontainers


    A better option nowadays is to use Testcontainers. Testcontainers uses Docker
    to bootstrap a Docker container for your given technology. In this case, we could
    use a PostgreSQL Docker image to boot a real database and use that in our tests.
    With this you are now using your actual database for testing and don’t need to
    have an in-memory version, meaning you can execute all the queries you want and
    test them. It also gives you the opportunity to test your database migration scripts
    (when in use).


    To use Testcontainers, in this case for PostgreSQL, we need to add the appropriate
    dependencies (see Listing [6-81](#464036_2_En_6_Chapter.xhtml#PC82)). We need
    the PostgreSQL dependency from Testcontainers as well as the JUnit Jupiter one
    and a special one for R2DBC.


    ```

    org.springframework.boot

    spring-boot-testcontainers

    test


    org.testcontainers

    postgresql

    test


    org.testcontainers

    r2dbc

    test


    Listing 6-81

    Testcontainers Dependency for PostgreSQL and JUnit Jupiter

    ```


    Now write a test that tests if records get inserted correctly into our actual
    PostgreSQL database (see Listing [6-82](#464036_2_En_6_Chapter.xhtml#PC83)).


    ```

    @Import(R2dbcCustomerRepository.class)

    @Testcontainers

    class CustomerRepositoryTest {

    @Container

    @ServiceConnection

    static PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15-alpine");

    @Autowired

    private CustomerRepository repository;

    Listing 6-82

    CustomerRepositoryTest Test Setup for Testcontainers

    ```


    The `@DataR2dbcTest` annotation executes the test by a special JUnit extension
    (the `SpringExtension`) to bootstrap the Spring Test Context framework. Now to
    register the special JUnit extension for Testcontainers, the `@Testcontainers`
    annotation has been added. This extension finds fields annotated with `@Container`
    and will bootstrap the given container. For this test, that is a `PostgreSQLContainer`,
    which we instruct to use a PostgreSQL 15 Docker container. Testcontainers will
    take care of the download of this container and start an instance and stop it
    after the test.


    As the container for each test will start with a different URL, we need to tell
    this to our Spring Boot application. For this we can use the `@ServiceConnection`
    annotation. This is a Spring Boot Test support annotation that registers the needed
    properties based on this container instance in the application. Properties such
    as `spring.r2dbc.url`, etc., are thus added automatically for the tests. This
    can also be done manually using the `@DynamicPropertySource` annotation on a static
    method (see also Recipe 2-3).


    With this we can now write some tests to validate our behavior (Listing [6-83](#464036_2_En_6_Chapter.xhtml#PC84)).


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    repository.save(newCustomer)

    .as(StepVerifier::create)

    .assertNext( (c) -> assertThat(c.id()).isNotNull())

    .verifyComplete();

    }

    @Test

    void findAllCustomers() {

    var customers = Flux.just(

    new Customer("T. Testing1", "t.testing@test123.tst")

    ,new Customer("T. Testing2", "t.testing@test123.tst"));

    customers.flatMap(repository::save)

    .as(StepVerifier::create)

    .expectNextCount(2)

    .verifyComplete();

    repository.findAll()

    .count()

    .as(StepVerifier::create)

    .expectNext(6L)

    .verifyComplete();

    }

    Listing 6-83

    CustomerRepositoryTest Tests with Testcontainers

    ```


    The tests are more or less similar to the ones used from the embedded database;
    however, here we have some additional data already in our database, and we have
    to account for that in our tests. This depends on what your database migration
    script looks like. If it generates an empty schema, you don’t need to change the
    tests.'
