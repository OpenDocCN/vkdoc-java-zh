    ## 3-11\. 使用 Spring MVC 消费 REST 资源


    ### 问题


    你需要为应用程序连接到一个 REST 资源，并希望使用 `RestTemplate` 或 `RestClient` 来实现。


    ### 解决方案


    Spring Boot 提供了配置和构建器来帮助构造所需的类。本方案将构建一个可用于消费 API 的应用程序，如方案 3-2 所示。


    你可以使用 `RestTemplateBuilder` 创建 `RestTemplate` 并在应用程序中使用它，或者使用暴露的 `RestClient.Builder`
    创建 `RestClient`。最后一种选择是使用基于 `@HttpExchange` 的声明式客户端。


    ![](img/464036_2_En_3_Figu_HTML.gif)一个信息图标，圆圈内包含字母 i。 `RestClient` 在构建、执行和处理 REST
    调用方面比 `RestTemplate` 更加流畅。它是作为 Webflux 的 `WebClient` 的阻塞变体构建的（参见第 4 章）。

