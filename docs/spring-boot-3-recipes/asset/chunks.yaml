    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Figa_HTML.gif)An information icon. The
    `management.server` properties are effective only when using an embedded server.
    When deploying to an external server, these properties don’t apply anymore!'
  trans: '

    # 9. Spring Boot Actuator


    在开发应用程序时，您希望能够监控应用启动后的行为。Spring Boot 通过引入 Spring Boot Actuator 简化了这一过程。Spring
    Boot Actuator 向相关方暴露应用的健康状态和指标。这可以通过 JMX 或 HTTP 实现，也可以将数据导出到外部系统。


    健康端点会告知应用及其运行系统的健康状况。它们会检测数据库是否正常运行、报告可用磁盘空间等。指标端点则暴露使用情况和性能统计数据，例如请求数量、最长请求时间、最快请求时间、连接池利用率等。


    启用后，所有这些指标都可以通过 JMX 或 HTTP 查看，并且可以自动导出到外部系统，例如 Graphite、InfluxDB 等。


    ## 9-1. 启用和配置 Spring Boot Actuator


    ### 问题


    您希望在应用中启用健康检查和指标功能，以便监控应用的状态。


    ### 解决方案


    在项目中添加 `spring-boot-starter-actuator` 依赖，以启用并暴露应用的健康状态和指标。可以通过 `management` 命名空间下的属性进行额外配置。


    ### 工作原理


    添加 `spring-boot-starter-actuator` 后，Spring Boot 会根据应用上下文中的 Bean 自动设置健康检查和指标。暴露哪些健康检查和指标取决于已启用的
    Bean 和功能。当检测到数据源时，将收集并暴露该数据源的指标，同时 Spring Boot 会监控数据源的健康状况。Spring Boot 对许多组件（如
    Hibernate、RabbitMQ、Kafka、缓存等）都执行此操作。


    要启用 Spring Boot Actuator，请将依赖添加到您的应用中（此处假设使用配方 3-3 的源码），如清单 9-1 所示。


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    清单 9-1

    Spring Boot Starter Actuator 依赖

    ```


    现在启动应用时，Spring Boot 将配置好 Spring Boot Actuator。它可以通过 Web 访问（默认路径为 `/actuator`），如图
    9-1 所示。也可以通过 JMX 暴露 Spring Boot Actuator（图 9-2）；这需要显式地将 `spring.jmx.enabled` 属性设置为
    `true` 来启用。


    ![](img/464036_2_En_9_Fig2_HTML.jpg)


    一个标题为“Java 监控与管理控制台”的窗口。已选中“M Bean”选项卡。在左侧窗格中，选中并展开了“endpoint”文件夹。下方列出了子文件夹。


    图 9-2


    通过 HTTP 暴露的指标


    ![](img/464036_2_En_9_Fig1_HTML.jpg)


    一个 JSON 片段，包含指向本地主机上运行的 Actuator 服务提供的不同端点的链接。它包括 self、health 的链接，以及一个包含用于监控系统健康状态的模板化
    URL 的 health 路径。


    图 9-1


    通过 Web 访问 Spring Boot Actuator


    您会注意到 JMX 暴露的端点比 HTTP 多。默认情况下，HTTP 仅暴露 `/actuator/health` 和 `/actuator/info`。这是出于安全考虑。`/actuator`
    是公开暴露的，因此您不希望所有人都能看到这些信息。您可以通过 `management.endpoints.web.exposure.include` 和 `management.endpoints.web.exposure.exclude`
    属性来配置要暴露的内容。在 include 中使用 `*` 将向 Web 暴露所有端点。请参见清单 9-2。


    ```

    management.endpoints.web.exposure.include=*

    清单 9-2

    通过 Web 暴露属性

    ```


    将此配置添加到 `application.properties` 后，Web 将暴露与 JMX 相同的功能（见图 9-3）。


    ![](img/464036_2_En_9_Fig3_HTML.jpg)


    一个 JSON 片段，在 `_links` 对象下提供了指向 Actuator 服务各个端点的链接。它包括 self 引用、健康检查、beans、caches、info、conditions、config
    props 和 environment details 的链接。每个链接都包含其各自的 URL 和用于动态路径生成的 templated 状态。


    图 9-3


    HTTP 暴露所有指标


    #### 配置管理服务器


    默认情况下，Spring Boot Actuator 与常规应用使用相同的端口和地址（`http://localhost:8080`）。然而，通常的做法是在不同的端口上运行管理端点。您可以通过
    `management.server` 命名空间下的属性进行配置。大多数属性与常规 `server` 命名空间中的属性类似（见表 9-1）。


    表 9-1


    管理服务器属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.server.add-application-context-header` | 向响应中添加一个 `X-Application-Context`
    头，包含应用上下文名称 |

    | `management.server.port` | 设置管理服务器运行的端口；默认与 `server.port` 相同 |

    | `management.server.address` | 设置要绑定的网络地址；默认与 `server.address` 相同（即 `0.0.0.0`
    或所有地址） |

    | `management.server.base-path` | 设置管理端点的基础路径；默认是 `/`，这需要设置一个端口 |

    | `management.server.ssl.*` | 设置 SSL 属性，为管理服务器配置 SSL |


    将清单 9-3 添加到 `application.properties` 文件中，这将在单独的端口上运行管理端点，并添加 `X-Application-Context`
    头。


    ```

    management.server.add-application-context-header=true

    management.server.port=8090

    清单 9-3

    管理服务器属性

    ```


    重新启动应用后，管理端点现在可通过 `http://localhost:8090/actuator` 访问。在不同的端口上运行 Spring Boot Actuator
    的好处是，可以通过在防火墙上阻止该端口并仅允许本地访问，从而将其对公共互联网隐藏。


    ![](img/464036_2_En_9_Figa_HTML.gif)信息图标。 `management.server` 属性仅在使用嵌入式服务器时有效。当部署到外部服务器时，这些属性不再适用！

