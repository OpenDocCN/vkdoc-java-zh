    and `spring.sql.init.data-locations` properties. See Table [6-2](#464036_2_En_6_Chapter.xhtml#Tab2)
    for a description of the available properties.


    Table 6-2


    DataSource Initialize Properties


    | Property | Description |

    | --- | --- |

    | `spring.sql.init.continue-on-error` | Sets whether to stop if an error occurs
    while initializing the database; the default is `false`. |

    | `spring.sql.init.data-locations` | Sets the data (DML) script resource references;
    the default is `classpath:data.sql`. |

    | `spring.sql.init.password` | Sets the password of the database to execute DML
    scripts; it defaults to the normal password. |

    | `spring.sql.init.username` | Sets the username of the database to execute DML
    scripts; this defaults to the normal username. |

    | `spring.sql.init.mode` | Initializes the data source with the available DDL
    and DML scripts. The default is `EMBEDDED` and can be changed to `NEVER` or `ALWAYS`.
    |

    | `spring.sql.init.platform` | Sets the platform to use in the DDL or DML scripts
    (such as `schema-${platform}.sql` or `data-${platform}.sql`). The default is `all`.
    |

    | `spring.sql.init.schema-locations` | Sets the data (DDL) script resource references;
    the default is `classpath:schema.sql`. |

    | `spring.sql.init.separator` | Sets the statement separator in SQL initialization
    scripts. The default is `;`. |

    | `spring.sql.init.encoding` | Sets the SQL script’s encoding. This defaults to
    platform encoding. |


    Let’s create a table called `customer` and insert some data into it. To create
