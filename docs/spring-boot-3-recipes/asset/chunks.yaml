- fmt: "### Send Multiple Results as Events\n\n`ResponseBodyEmitter` is a sibling\
    \ of the `SseEmitter` that can deliver events from the server to the client. For\
    \ this Server-Sent-Events are used. Server-Sent-Events are messages from the server\
    \ to the client. They have a `Content-Type` header of `text/event-stream`. They\
    \ are quite lightweight with only four fields (see Table [3-13](#464036_2_En_3_Chapter.xhtml#Tab13)).\n\
    \n**Table 3-13** Allowed Fields for Server-Sent-Events\n\n| Field | Description\
    \ |\n| --- | --- |\n| `Id` | The ID of the event |\n| `Event` | The type of event\
    \ |\n| `Data` | The event data |\n| `Retry` | Reconnection time for the event\
    \ stream |\n\nTo send events from a request handling method, you need to create\
    \ an instance of `SseEmitter` and return it from the request handling method.\
    \ Then use the `send` method to send individual elements to the client. See Listing\
    \ [3-47](#464036_2_En_3_Chapter.xhtml#PC52).\n\n```java\n@GetMapping(\"/orders\"\
    )\npublic SseEmitter orders() {\n    var emitter = new SseEmitter();\n    executor.execute(()\
    \ -> {\n        var orders = orderService.findAll();\n        try {\n        \
    \    for (var order : orders) {\n                sendAndDelay(emitter, order);\n\
    \            }\n            emitter.complete();\n        } catch (IOException\
    \ ex) {\n            emitter.completeWithError(ex);\n        }\n    });\n    return\
    \ emitter;\n}\n\nprivate void sendAndDelay(ResponseBodyEmitter emitter, Order\
    \ order) throws IOException {\n    emitter.send(order, MediaType.APPLICATION_JSON);\n\
    \    randomDelay();\n}\n```\n\n**Listing 3-47** OrderController with `SseEmitter`\n\
    \n> An information icon with the letter i inside a circle. There is a delay in\
    \ sending each item to the client, just so you can see the different events coming\
    \ in. You wouldn’t do this in real code.\n\nNow when the URL `http://localhost:8080/orders`\
    \ is called, you see events coming in one by one (Figure [3-18](#464036_2_En_3_Chapter.xhtml#Fig18)).\n\
    \n**Figure 3-18** Server-Sent-Events result\n\nNote the `Content-Type` header.\
    \ It has a value of `text/event-stream` to indicate that we get a stream of events.\
    \ The stream can be kept open and to receive event notifications. Each object\
    \ written is converted to JSON. This is done with an `HttpMessageConverter` just\
    \ as with a plain `ResponseBodyEmitter`. Each object is written in the `data`\
