  trans: '

    ### 工作原理


    当直接使用 Spring Boot 插件时，所有必需的库都会被包含在归档文件的 `BOOT-INF/lib` 文件夹中。然而，有时你可能希望减小 JAR 文件的大小，并通过复用依赖来进一步降低整体资源占用。例如，使用配方
    10-1 生成的归档文件大小约为 7.1 MB，其中大部分空间被包含的依赖所占据。


    可以为 Spring Boot 插件添加自定义布局（layout）和启动器（launcher）。布局定义了从何处加载源文件，而启动器则利用这些信息来加载依赖。Thin
    Launcher 会从 Maven Central 下载工件并将其存放在一个共享仓库中。这样一来，当多个应用程序共享这些依赖时，它们只需被下载一次。


    要使用 Thin Launcher，需要为 Spring Boot 插件添加一个依赖。参见清单 10-8。


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    org.springframework.boot.experimental

    spring-boot-thin-layout

    1.0.31.RELEASE


    清单 10-8

    Thin 布局配置

    ```


    仅此一步就足以创建一个体积显著更小的归档文件（归档文件内不再包含 `BOOT-INF/lib` 目录）。当运行 `mvn verify` 时，生成的 JAR
    文件大小约为 12 KB。然而，其缺点在于，应用程序启动时需要下载依赖，因此根据依赖数量的不同，启动时间可能会更长。


    其原理是，一个名为 `ThinJarWrapper` 的类被添加进来，并成为应用程序的入口点。现在，你的应用程序包含一个 `pom.xml` 和/或 `META-INF/thin.properties`
    文件，用于确定依赖关系。`thinJarWrapper` 会定位另一个 JAR 文件（即“启动器”）。该包装器会下载启动器（如果需要的话），否则会使用本地
    Maven 仓库中的缓存版本。


    随后，启动器接管控制权，读取 `pom.xml`（如果存在）和 `META-INF/thin.properties`，并根据需要下载依赖（包括所有传递性依赖）。接着，它会创建一个自定义类加载器，将所有已下载的依赖添加到类路径中。最后，它使用该自定义类加载器来运行应用程序自身的
    main 方法。


    ![](img/464036_2_En_10_Figd_HTML.gif)信息图标。 从 Maven 下载依赖时，由于它使用常规的 Maven 工具，因此会遵循
    Maven `settings.xml` 文件中的设置。如果为 Maven 仓库使用了镜像（如 Nexus），请在 `META-INF/thin.properties`
    文件中添加 `thin.repo` 配置项以指向该镜像。否则，下载启动器将会失败。


    ## 10-4\. 容器化 Spring Boot 应用程序


    使用 Docker 构建和交付容器是当今的常见做法。使用 Spring Boot 时，将其打包到 Docker 容器中相当容易。


    ### 问题


    你希望在 Docker 容器中运行基于 Spring Boot 的应用程序。


    ### 解决方案


    创建一个 `Dockerfile`，并使用 Maven 可用的 Docker 插件之一来构建 Docker 容器。


    ![](img/464036_2_En_10_Fige_HTML.gif)信息图标。 在本配方中，我们选择使用 Fabric8 的 `docker-maven-plugin`，但其他插件同样可以很好地完成此任务。


    ### 工作原理


    首先，你需要一个包含构建容器所需信息的 `Dockerfile`。容器构建完成后，你可以使用 `docker run` 命令启动它。


    #### 更新构建脚本以生成 Docker 容器


    要创建 Docker 容器，首先创建一个 `Dockerfile`。`Dockerfile` 是包含如何构建容器信息的文件。将此文件放置在项目的根目录下。参见清单
    10-9。


    ```

    FROM eclipse-temurin:21-jre-alpine

    ARG JAR_FILE

    COPY ${JAR_FILE} app.jar

    ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

    清单 10-9

    Dockerfile

    ```


    通过这个 `Dockerfile`，我们使用 Eclipse Temurin 提供的容器作为基础来构建我们自己的容器。我们将使用 `ADD` 命令将应用程序添加到其中，最后需要告诉容器在启动时运行什么。为此，你可以使用
    `ENTRYPOINT` 命令。


    ![](img/464036_2_En_10_Figf_HTML.gif)火焰图标。 使用公开可用的容器作为起点似乎是个好主意，但你必须意识到这可能带来的安全隐患。由于你无法控制那个特定的容器，因此无法保证容器中构建了（或未构建）什么内容。在实际场景中，你可能希望构建自己的基础容器。


    `JAR_FILE` 参数中的 `ARG` 告诉构建过程，存在一个名为 `JAR_FILE` 的变量，可以在构建脚本中使用。我们将通过插件配置提供该变量的值。


    `ENTRYPOINT` 简单地指定了它将运行 `java -jar /app.jar`；你也可以将其与配方 14-1 结合使用，将可执行 JAR 安装为脚本，从而使入口点更简洁。


    现在有了 `Dockerfile`，你需要将 `docker-maven-plugin` 添加到 `pom.xml` 文件的构建部分。参见清单 10-10。


    ```

    io.fabric8

    docker-maven-plugin

    0.43.4


    target/${project.build.finalName}.jar


    清单 10-10

    Docker Maven 插件

    ```


    `buildArgs` 元素用于向 `docker build` 命令传递参数，以便在处理 `Dockerfile` 时可以使用这些参数。由于我们指定了 `JAR_FILE`，我们也在配置中声明了它，并将其指向生成的工件的位置。


    #### 构建并启动容器


    现在一切就绪，你可以使用 `mvn package docker:build` 来生成一个 Docker 容器。


    要启动容器，你可以使用类似清单 10-11 的命令来运行它。


    ```

    docker run -d springboot3recipes/recipe_10_4_i:latest

    清单 10-11

    Docker 命令

    ```


    这将在后台启动一个容器，并开始向控制台打印消息。要查看日志，请执行 `docker logs <容器名称> --follow`，你将看到每两秒打印一条消息（参见图
    10-3）。


    ![](img/464036_2_En_10_Fig3_HTML.jpg)


    命令提示符屏幕，显示 Docker 容器的日志输出。内容包括：使用 Java 21 在 PID 1 上启动 Hello World 应用程序（版本 3.0.0-SNAPSHOT），未设置活动配置文件，回退到
    1 个默认配置文件，并在 3.4 秒内启动了 Hello World 应用程序。


    图 10-3

    Docker 容器的日志输出

    '
- fmt: '#### Pass Properties to the Spring Boot Application


    When running a Spring Boot application in a Docker container, you probably want
    to be able to change properties based on the environment the application gets
    deployed on. You can use Spring profiles for this (see also Chapter [2](#464036_2_En_2_Chapter.xhtml)),
    but you still need to provide a variable specifying which profile to use. Normally
    you would start the application like `java -jar your-applicarion.jar --spring.profiles.active=profile1,profile2`;
    however, as you have a Docker container, that isn’t possible.


    Luckily, with Docker you can use the `-e` switch to pass in environment variables,
    and Spring Boot also takes into consideration the variables in the local environment.^([⁸](#fn8))


    For the simple application we have here, we can pass the `audience` property (by
    default it will say `World` and the message becomes `Hello World, from Spring
    Boot 3!`). Let’s change it to `Docker`. To do this, you need to add `-e AUDIENCE="Docker"`
    to the run command. See Listing [10-12](#464036_2_En_10_Chapter.xhtml#PC12).


    ```

    docker run -d -e AUDIENCE=''Docker'' springboot3recipes/recipe_10_4_i:latest

    Listing 10-12

    Docker Command

    ```


    When looking at the logging of the newly started container, the message has changed
    to `Hello Docker, from Spring Boot 3!` (see Figure [10-4](#464036_2_En_10_Chapter.xhtml#Fig4)).


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Fig4_HTML.jpg)


    A screen of the command prompt with log output of the Docker container. It includes
    spring boot, starting Hello World application on v 3.0.0-SNAPSHOT using Java 21
    with P I D 1, no active profile set, falling back to 1 default profile, and started
    Hello World application in 4.357 seconds.


    Figure 10-4


    Log output of the Docker container


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Figg_HTML.gif)An information
    icon. When setting variables to a Unix-based system, you generally want to use
    all uppercase characters in the name and replace any `.` with a `_`. So when passing
    in `spring.profiles.active`, that would become `SPRING_PROFILES_ACTIVE`.


    #### Build a Better Docker Container


    While the simple Dockerfile we have will work, it is far from efficient from a
    Docker standpoint. It would be better to include some additional layers that could
    be reused. When building a Spring Boot runnable JAR, it will include some layers
    already in the structure of the JAR and placement of files. We can utilize this
    to create a more efficient container.


    Spring Boot has support for extracting the layers; we can do this by starting
    the application with some parameters. Using `java -Djarmode=layertools -jar app.jar
    extract`, it will extract the content of the application in separate directories,
    which can then be used to create additional layers in the container.


    With this it is possible to create a multistage Dockerfile, which first extracts
    the needed information and finally builds the container image we need. This could
    allow for reusable layers in our container. Reusable layers will reduce build
    time and the total size used for the images. See Listing [10-13](#464036_2_En_10_Chapter.xhtml#PC13).


    ```

    FROM eclipse-temurin:21-jre-alpine as builder

    WORKDIR application

    ARG JAR_FILE

    COPY ${JAR_FILE} app.jar

    RUN java -Djarmode=layertools -jar app.jar extract

    FROM eclipse-temurin:21-jre-alpine

    WORKDIR application

    COPY --from=builder application/dependencies/ ./

    COPY --from=builder application/spring-boot-loader/ ./

    COPY --from=builder application/snapshot-dependencies/ ./

    COPY --from=builder application/application/ ./

    ENTRYPOINT ["java", "org.springframework.boot.loader.launch.JarLauncher"]

    Listing 10-13

    Multistage Dockerfile with Layers

    ```


    The first part (or stage) of this Docker file copies our JAR file and extracts
    the different layers. The next part (or stage) copies the different layers to
    the resulting image. When layers haven’t changed, they wouldn’t need re-creating
    and will be thus reused. This is generally the case when modifying application
    code but not upgrading dependencies.


    The container can be built in the same way as before through running `mvn package
    docker:build`.


    #### Use Buildpacks to Build a Container


    Although you can use a Dockerfile to build a container, there are other options.
    One of those is to use cloud-native buildpacks. Cloud-native buildpacks are part
    of cloud platforms like Heroku and Cloud Foundry, which allow pushed JAR files
    to run on the cloud. You can, however, also use these buildpacks to generate a
    Docker-compatible container.


    The Spring Boot plugins for Maven and Gradle both have support for this. Invoking
    `mvn spring-boot:build-image` is enough to create the container image. When executing,
    it will first download a container to run the build and a container to use to
    create the final image. This will take some time; however, this is a one-time
    (until there is a new version of the container) download. Subsequent builds will
    run much faster. See Listing [10-14](#464036_2_En_10_Chapter.xhtml#PC14).'
