  trans: '

    #### 在 Spring Boot 测试中使用 Testcontainers


    你可能听说过 Testcontainers 库，并希望在你的 Spring Boot 应用程序中将其用于测试。借助 Testcontainers 库，你可以轻松编写测试，并使用你在生产环境中实际使用的数据库、消息解决方案或邮件提供商（以及更多其他组件）。因此，无需退而求其次使用内存或嵌入式解决方案，你就能获得与生产环境完全相同的完整解决方案。Testcontainers
    通过 Docker 实现这一点，并且默认将容器的生命周期与你的测试绑定。


    要使用它，你需要在依赖管理（Maven 或 Gradle）中添加 `spring-boot-testcontainers` 依赖，并且需要引入你想要使用的
    Testcontainers 模块。我们使用的示例将利用一个 PostgreSQL 容器在其上执行一些 JDBC 查询；它还将利用前面提到的切片支持来设置一个基于
    JDBC 的测试。参见清单 2-24。


    ```

    org.springframework.boot

    spring-boot-testcontainers

    test


    org.testcontainers

    junit-jupiter

    test


    org.testcontainers

    postgresql

    test


    org.postgresql

    postgresql

    runtime


    清单 2-24

    Testcontainers 和 PostgreSQL 的 Maven 依赖

    ```


    我们添加了 `spring-boot-testcontainers` 依赖，以及 PostgreSQL JDBC 驱动和 PostgreSQL 与 JUnit
    的 Testcontainers 模块。有了这些，我们可以使用 `@TestContainers` 注解为我们的测试启动一个 PostgreSQL 数据库。参见清单
    2-25。


    ```

    package com.apress.springboot3recipes.calculator;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.jdbc.AutoConfigureTestDatabase;

    import org.springframework.boot.test.autoconfigure.jdbc.JdbcTest;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.test.context.DynamicPropertyRegistry;

    import org.springframework.test.context.DynamicPropertySource;

    import org.springframework.test.jdbc.JdbcTestUtils;

    import org.testcontainers.containers.PostgreSQLContainer;

    import org.testcontainers.junit.jupiter.Container;

    import org.testcontainers.junit.jupiter.Testcontainers;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    @JdbcTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Testcontainers

    public class JdbcTestWithTestcontainers {

    @Container

    static PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15.2");

    @Autowired

    private JdbcTemplate jdbc;

    @DynamicPropertySource

    public static void properties(DynamicPropertyRegistry props) {

    props.add("spring.datasource.url", postgres::getJdbcUrl);

    props.add("spring.datasource.username", postgres::getUsername);

    props.add("spring.datasource.password", postgres::getPassword);

    }

    @Test

    void retrieveTables() {

    var tables = JdbcTestUtils.countRowsInTable(jdbc, "pg_catalog.pg_tables");

    assertEquals(68, tables);

    }

    }

    清单 2-25

    使用常规 Testcontainers 的 @JdbcTest

    ```


    在测试中，我们添加了 `@Testcontainers`，这是 Testcontainers 的一个特殊 JUnit 扩展。它现在会检测带有 `@Container`
    注解的字段，并自动启动它们。由于我们使用了容器，我们需要指示 Spring Boot 使用它。对于 JDBC，我们需要配置 `spring.datasource.url`
    属性（以及用户名和密码）。为此，我们可以利用 `@DynamicPropertySource`，它可以放在测试中的一个 `static` 方法上，然后从容器中获取设置并将其注册为属性。


    最后，请注意 `@AutoConfigureTestDatabase`，这对于数据库驱动的测试是必需的，因为默认情况下 Spring Boot 会尝试启动一个嵌入式容器并将其用作
    `Datasource`。如果我们不添加这个注解，测试用例将会失败。现在，当运行测试时，Testcontainers 将介入，下载并启动容器，然后测试将执行。之后，容器将被停止并销毁。


    尽管这种方法有效，并且是与 Testcontainers 协作的一种有效方式，但它还可以更好。Spring Boot 引入了一种所谓的服务连接。这是对各种你可以连接的服务（如数据库或消息代理）的抽象。为了利用这一点，有
    `@ServiceConnection` 注解，可以放在你想要使用的容器上。使用此注解时，你无需再添加一个方法来为上下文动态注册属性。参见清单 2-26。


    ```

    package com.apress.springboot3recipes.calculator;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.jdbc.AutoConfigureTestDatabase;

