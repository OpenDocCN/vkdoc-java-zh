    | `spring.artemis.pool.idle-timeout` | 设置连接可以空闲多长时间；默认为 30 秒。 |

    | `spring.artemis.pool.expiry-timeout` | 设置连接过期前的时间；默认为 0（永不过期）。 |

    | `spring.artemis.pool.reconnect-on-exception` | 当发生 `JMSException` 时重置连接；默认为
    `true`。 |

    | `spring.artemis.pool.block-if-full` | 当请求连接时阻塞，或者抛出 `JMSException`；默认为 `true`。
    |

    | `spring.artemis.pool.block-if-full-timeout` | 设置在抛出 `JMSException` 之前阻塞多长时间；默认为
    -1（即阻塞直到有可用连接）。 |

    | `spring.artemis.pool.create-connection-on-startup` | 设置是否应在应用程序启动时立即创建连接；默认为
    `true`。 |


    使用池化功能需要将 `pooled-jms` 依赖项添加到您的构建文件中。请参阅代码清单 8-4。


    ```

    org.messaginghub

    pooled-jms


    代码清单 8-4

    JMS 连接池依赖项

    ```


    再次运行应用程序时，您会注意到 `ConnectionFactory` 的类型已更改为 `PooledConnectionFactory`。


    #### 使用 JNDI


    将 Spring Boot 应用程序部署到 JEE 容器时，您很可能希望也使用该容器中预先注册的 `ConnectionFactory`。要启用此功能，您需要依赖
    `spring-jms` 库和 `jakarta.jms-api`（后者可能可以标记为 provided，因为它将由您的 JEE 容器提供）。您可以使用其中一个
    starter 并排除显式的 ActiveMQ 或 Artemis 依赖项；但是，仅声明所需的依赖项更简单、更清晰。请参阅代码清单 8-5。


    ```

    org.springframework

    spring-jms


    jakarta.jms

    jakarta.jms-api


    代码清单 8-5

    纯 JMS 依赖项

    ```


    当 JNDI 可用时，Spring Boot 将首先尝试在 JNDI 注册表中以众所周知的名称（例如 `java:/JmsXA` 和 `java:/XAConnectionFactory`）或通过
    `spring.jms.jndi-name` 属性指定的名称来检测 `ConnectionFactory`。此外，它还会自动创建一个 `JndiDestinationResolver`，以便队列和主题也将在
    JNDI 中被检测到；默认情况下，允许回退到动态创建目标。


    ```

    spring.jms.jndi-name=java:/jms/connectionFactory

    ```


    完成上述配置并构建好您的工件后，您现在可以将应用程序部署到 JEE 容器，并重用现有的 `ConnectionFactory`。

