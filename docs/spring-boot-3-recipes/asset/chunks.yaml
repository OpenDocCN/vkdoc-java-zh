- fmt: '### Configure Individual Management Endpoints


    Individual endpoints can be configured through properties in the `management.endpoint.<endpoint-name>`
    namespace. Most of them have at least an `enabled` property and a `cache.time-to-live`
    property. The first will enable or disable the endpoint. The other one specifies
    how long to cache the result of the endpoint (see Table [9-2](#464036_2_En_9_Chapter.xhtml#Tab2)).


    **Table 9-2** Endpoint Configuration Properties


    | Property | Description |

    | --- | --- |

    | `management.endpoint.<endpoint-name>.enabled` | Sets whether the specific endpoint
    is enabled; generally defaults to `true` and sometimes depends on availability
    of a feature. For example, if Flyway isn’t present, then enabling the `flyway`
    endpoint wouldn’t have any effect. |

    | `management.endpoint.<endpoint-name>.cache.time-to-live` | Sets the time to
    cache a response; the default is 0ms, meaning no caching. |

    | `management.endpoint.health.show-details` | Sets whether to show details for
    the health endpoint; the default is `never` and can be changed to `always` or
    `when_authorized`. |

    | `management.endpoint.configprops.show-values` `management.endpoint.env.show-values`
    `management.endpoint.quartz.show-values` | Sets when to show unsanitized values
    for the endpoint; the default is `never`. This can be changed to `always` or `when_authorized`.
    |

    | `management.endpoint.configprops.roles` `management.endpoint.env.roles` `management.endpoint.health.roles`
    `management.endpoint.quartz.roles` | Sets the roles that are allowed to see the
    details (use with `when_authorized` for `show-details`/`show-values`). |


    Adding `management.endpoint.health.show-details=always` to `application.properties`
    will show more information about the health of the application, as shown in Figure
    [9-4](#464036_2_En_9_Chapter.xhtml#Fig4).


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig4_HTML.jpg)


    A JSON snippet presents a system status report. It indicates that both disk space
    and ping components are up. It also provides details on disk space, including
    total, free, and threshold values, along with the file path. Ping status is also
    up.


    **Figure 9-4** Extended health endpoint output


    ### Secure Management Endpoints


    When Spring Boot detects both Spring Boot Actuator and Spring Security, it will
    enable secure access to management endpoints automatically. When accessing the
    endpoint, a basic login prompt will be shown and will ask for a username and password.
    Spring Boot will generate a default user named `user` with a generated password
    (see Recipe 5-1) for logging in.


    Adding `spring-boot-starter-security` in addition to `spring-boot-starter-actuator`
    is enough to secure your management endpoints. See Listing [9-4](#464036_2_En_9_Chapter.xhtml#PC4).


    ```

    org.springframework.boot

    spring-boot-starter-security


    Listing 9-4

    Spring Boot Security Starter Dependency

    ```


    This will enable security in your application and for the management endpoints.
    Now when accessing the endpoint `http://localhost:8090/actuator`, a basic login
    prompt will be shown. After entering the correct credentials, you should still
    be able to see the results.


    ### Configure Health Checks


    One of the features of Spring Boot Actuator is to do health checks. They are exposed
    under `http://localhost:8090/actuator/health`. This produces a result if the application
    is `UP` or `DOWN`. The health endpoint calls all the available `HealthIndicator`s
    in the system and reports them in the endpoint. You can control which `HealthIndicator`s
    are present by setting the `management.health.<health-indicator>.enabled` property.
    Setting a property to `true` for a not available feature (such as trying to get
    information on `DataSource` while one isn’t available) won’t work. See Listing
    [9-5](#464036_2_En_9_Chapter.xhtml#PC5).


    ```

    management.health.diskspace.enabled=false

    Listing 9-5

    Disabling a Health Indicator

    ```


    This will disable the health check for the disk space, and it won’t be part of
    the health checks anymore.


    ### Configure Metrics


    One of the features of Spring Boot Actuator is to expose metrics. They are exposed
    under `http://localhost:8090/actuator/metrics`. This will produce a list of available
    metrics for your application (see Figure [9-5](#464036_2_En_9_Chapter.xhtml#Fig5)).


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig5_HTML.jpg)


    A JSON array contains a list of various metrics related to system performance
    and health, such as disk usage, executor activity, JVM metrics, HTTP server requests,
    and thread counts.


    **Figure 9-5** List of currently available metrics


    You can contain more information about a metric by accessing `http://localhost:8090/actuator/metrics/{name-of-metric}`.
    For example, `http://localhost:8090/actuator/metrics/system.cpu.usage` will show
    the current CPU usage (Figure [9-6](#464036_2_En_9_Chapter.xhtml#Fig6)).


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig6_HTML.jpg)


    A JSON object presents the system CPU usage metric, describing recent CPU usage
    of the application''s system. Value is 0.15789473684210525.


    **Figure 9-6** Detailed CPU metrics


    Spring and Spring Boot use Micrometer to collect (and expose) metrics. Metrics
    are enabled by default for the features detected by Spring Boot. So if a data
    source is detected, metrics will be enabled. To disable metrics, add them to the
    `management.metrics.enable` property. This property is a map containing keys and
    values on which metrics to enable. See Listing [9-6](#464036_2_En_9_Chapter.xhtml#PC6).


    ```

    management.metrics.enable.system=false

    management.metrics.enable.tomcat=false

    Listing 9-6

    Disabling Metrics for a Category

    ```


    This configuration will disable `system` and `tomcat` metrics. When viewing the
    metrics at `http://localhost:8090/actuator/metrics`, you can see they aren’t part
    of the list anymore.


    ## 9-2. Create Custom Health Checks and Metrics


    ### Problem


    Your application needs to expose certain metrics and have health checks that aren’t
    available by default.


    ### Solution


    Health checks and metrics are pluggable, and beans of type `HealthIndicator` and
    `MetricBinder` are automatically registered to provide additional health checks
    and metrics. You just need to create a class implementing the desired interface
    and register an instance of that class as a bean in the context to have it contribute
    to the health and metrics.'
