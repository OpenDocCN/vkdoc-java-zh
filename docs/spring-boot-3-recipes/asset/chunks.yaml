    荷兰语翻译的索引页面


    ## 3-6\. 更改用户区域设置


    ### 问题


    为了使您的 Web 应用程序支持国际化，您必须识别每个用户偏好的区域设置，并根据此区域设置显示内容。


    ### 解决方案


    在 Spring MVC 应用程序中，用户的区域设置由组件识别，该组件必须实现 `LocaleResolver` 接口。Spring MVC 提供了几个 `LocaleResolver`
    实现，供您根据不同的标准解析区域设置。或者，您也可以通过实现此接口来创建自己的自定义区域设置解析器。


    您可以通过在 Web 应用程序上下文中注册一个类型为 `LocaleResolver` 的 bean 来定义区域设置解析器。您必须将区域设置解析器的 bean
    名称设置为 `localeResolver`，以便它可以被自动检测到。


    ### 工作原理


    Spring MVC 提供了 `LocaleResolver` 接口的几个默认实现，其中一些允许更改 `Locale`。要更改 `Locale`，可以使用特定的
    `HandlerInterceptor` 来允许用户覆盖他们想要使用的区域设置，即 `LocaleChangeInterceptor`。


    #### 使用 HTTP 请求头解析区域设置


    Spring Boot 注册的默认区域设置解析器是 `AcceptHeaderLocaleResolver`。它通过检查 HTTP 请求的 `Accept-Language`
    头来解析区域设置。此头由用户的 Web 浏览器根据底层操作系统的区域设置进行设置。请参见清单 3-28。


    ![](img/464036_2_En_3_Figi_HTML.gif)一个信息图标，圆圈内有一个字母 i。 `AcceptHeaderLocaleResolver`
    无法更改用户的区域设置，因为它无法修改用户操作系统的区域设置。


    ```

    @Bean

    public LocaleResolver localeResolver () {

    return new AcceptHeaderLocaleResolver();

    }

    清单 3-28

    AcceptHeaderLocaleResolver Bean 定义

    ```


    #### 使用会话属性解析区域设置


    另一种解析区域设置的方法是使用 `SessionLocaleResolver`。它通过检查用户会话中的预定义属性来解析区域设置。如果会话属性不存在，此区域设置解析器将从
    `Accept-Language` HTTP 头确定默认区域设置。请参见清单 3-29。


    ```

    @Bean

    public LocaleResolver localeResolver () {

    var localeResolver = new SessionLocaleResolver();

    localeResolver.setDefaultLocale(Locale.forLanguageTag("en"));

    return localeResolver;

    }

    清单 3-29

    SessionLocaleResolver Bean 定义

    ```


    如果会话属性不存在，您可以为该解析器设置 `defaultLocale` 属性。请注意，此区域设置解析器能够通过更改存储区域设置的会话属性来更改用户的区域设置。

    '
- fmt: '### Resolve Locales with a Cookie


    You can also use `CookieLocaleResolver` to resolve locales by inspecting a cookie
    in a user’s browser. If the cookie doesn’t exist, this locale resolver determines
    the default locale from the `Accept-Language` HTTP header. See Listing [3-30](#464036_2_En_3_Chapter.xhtml#PC34).


    ```

    @Bean

    public LocaleResolver localeResolver() {

    return new CookieLocaleResolver();

    }

    Listing 3-30

    CookieLocaleResolver Bean Definition

    ```


    The cookie used by this locale resolver can be customized by configuring the properties
    in Table [3-7](#464036_2_En_3_Chapter.xhtml#Tab7) on `CookieLocaleResolver`. See
    Listing [3-31](#464036_2_En_3_Chapter.xhtml#PC35).


    **Table 3-7** `CookieLocaleResolver` Properties


    | Property | Description |

    | --- | --- |

    | `cookieDomain` | Sets the value for the `Domain` attribute of a cookie. |

    | `cookieHttpOnly` | Adds the `HttpOnly` attribute to the cookie. |

    | `cookieMaxAge` | Sets the `Max-Age` attribute of the cookie, -1 will persist
    until browser shutdown (the default). |

    | `cookieName` | Sets the name of the cookie (deprecated; uses the constructor
    instead). |

    | `cookiePath` | Sets the `Path` attribute of the cookie; the default is `/`.
    |

    | `cookieSameSite` | Sets the `Same-Site` attribute of the cookie; the default
    is `Lax`. |

    | `cookieSecure` | Sets the `Secure` attribute of the cookie; the default is `false`.
    |

    | `langagueTagCompliant` | Sets whether the resolver should be BCP47 language
    tag compliant versus the Java Legacy locals; the default is `true`. |

    | `rejectInvalidCookies` | Sets whether we reject invalid/corrupt cookies; the
    default is `true`. |


    ```

    @Bean

    public LocaleResolver localeResolver() {

    var cookieLocaleResolver = new CookieLocaleResolver("language");

    cookieLocaleResolver.setCookieMaxAge(Duration.ofMinutes(30));

    cookieLocaleResolver.setDefaultLocale(Locale.forLanguageTag("en"));

    return cookieLocaleResolver;

    }

    Listing 3-31

    Example with Properties Set

    ```


    You can also set the `defaultLocale` property for this resolver in case the cookie
    doesn’t exist in a user’s browser. This locale resolver is able to change a user’s
    locale by altering the cookie that stores the locale.


    ### Change a User’s Locale


    In addition to changing a user’s locale by calling `LocaleResolver.setLocale()`
    explicitly, you can also apply `LocaleChangeInterceptor` to your handler mappings.
    This interceptor detects if a special parameter is present in the current HTTP
    request. The parameter name can be customized with the `paramName` property of
    this interceptor (the default is `locale`). If such a parameter is present in
    the current request, this interceptor changes the user’s locale according to the
    parameter value.


    To be able to change the locale, a `LocaleResolver` that allows change has to
    be used.


    ```

    @Bean

    public LocaleResolver localeResolver() {

    return new CookieLocaleResolver();

    }

    ```


    To change the locale, add the `LocaleChangeInterceptor` as a bean and register
    it as an interceptor; for the latter, use the `addInterceptors` method from the
    `WebMvcConfigurer`. See Listing [3-32](#464036_2_En_3_Chapter.xhtml#PC37).


    > **Note:** Instead of adding it to the `@SpringBootApplication`, you could also
    create a specialized `@Configuration` annotated class to register the interceptors.
    Be aware of *not* adding `@EnableWebMvc` to that class as that will disable the
    auto-configuration from Spring Boot!


    ```

    @SpringBootApplication

    public class LibraryApplication implements WebMvcConfigurer {

    public static void main(String[] args) {

    SpringApplication.run(LibraryApplication.class, args);

    }

    @Override

    public void addInterceptors(InterceptorRegistry registry) {

    registry.addInterceptor(new LocaleChangeInterceptor());

    }

    @Bean

    public LocaleResolver localeResolver() {

    return new CookieLocaleResolver();

    }

    }

    Listing 3-32

    LocaleChangeInterceptor Beans and Configuration

    ```


    Now add the snippet to the `index.html` file, as shown in Listing [3-33](#464036_2_En_3_Chapter.xhtml#PC38).


    ```

    Language


    NL |

    EN


    Listing 3-33

    Language Change Modifications for Index Page

    ```


    Now when selecting one of the languages, the page will rerender and display in
    the selected language. When you continue browsing, the remainder of the pages
    will also be shown in the selected language (as in Figure [3-13](#464036_2_En_3_Chapter.xhtml#Fig13)).


    ## 3-7. Select and Configure the Embedded Server


    ### Problem


    You want to use Jetty as an embedded container instead of the default Tomcat container.


    ### Solution


    Exclude the Tomcat runtime and include the Jetty runtime. Spring Boot will automatically
    detect whether Tomcat, Jetty, or Undertow is on the classpath and configure the
    container accordingly.


    ### How It Works


    Spring Boot has out-of-the-box support for Tomcat, Jetty, and Undertow as embedded
    servlet containers. By default Spring Boot uses Tomcat as the container (expressed
    through the `spring-boot-starter-tomcat` dependency in the `spring-boot-starter-web`
    artifact). The container can be configured using properties for which some apply
    to all containers and others to a specific container. The global properties are
    prefixed with `server.` or `server.servlet`, whereas the container ones start
    with `server.<container>` (where `container` is either `tomcat`, `jetty`, or `undertow`).'
