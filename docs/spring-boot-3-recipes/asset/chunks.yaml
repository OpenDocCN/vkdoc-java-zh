    WORKDIR application

    ARG JAR_FILE

    COPY ${JAR_FILE} app.jar

    RUN java -Djarmode=layertools -jar app.jar extract

    FROM eclipse-temurin:21-jre-alpine

    WORKDIR application

    COPY --from=builder application/dependencies/ ./

    COPY --from=builder application/spring-boot-loader/ ./

    COPY --from=builder application/snapshot-dependencies/ ./

    COPY --from=builder application/application/ ./

    ENTRYPOINT ["java", "org.springframework.boot.loader.launch.JarLauncher"]

    代码清单 10-13

    带层的多阶段 Dockerfile

    ```


    此 Docker 文件的第一部分（或阶段）复制我们的 JAR 文件并提取不同的层。下一部分（或阶段）将不同的层复制到生成的镜像中。当层没有更改时，它们不需要重新创建，因此将被重用。这在修改应用代码但未升级依赖项时通常是这种情况。


    可以通过运行 `mvn package docker:build` 以与之前相同的方式构建容器。


    #### 使用 Buildpacks 构建容器


    虽然您可以使用 Dockerfile 构建容器，但还有其他选择。其中之一是使用云原生 buildpacks。云原生 buildpacks 是 Heroku
    和 Cloud Foundry 等云平台的一部分，它们允许推送的 JAR 文件在云上运行。但是，您也可以使用这些 buildpacks 来生成与 Docker
    兼容的容器。


    Maven 和 Gradle 的 Spring Boot 插件都支持此功能。调用 `mvn spring-boot:build-image` 就足以创建容器镜像。执行时，它将首先下载一个容器来运行构建，以及一个用于创建最终镜像的容器。这将花费一些时间；但是，这是一次性下载（直到有新版本的容器）。后续构建将运行得更快。请参见代码清单
    10-14。

