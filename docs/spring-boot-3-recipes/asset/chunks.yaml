- fmt: "#### Send a Simple Message\n\nSending a message with the `KafkaTemplate` can\
    \ be done with the `send` method. It takes, at least, the topic (if no default\
    \ is configured) and the object to send in the message.\n\n```java\n@Component\n\
    class HelloWorldSender {\n    private final KafkaTemplate kafka;\n    HelloWorldSender(KafkaTemplate\
    \ kafka) {\n        this.kafka = kafka;\n    }\n    @Scheduled(fixedRate = 50)\n\
    \    public void sayHello() {\n        String msg = \"Hello World, from Spring\
    \ Boot 3, over Apache Kafka!\";\n        kafka.send(\"hello\", msg);\n    }\n\
    }\n```\n\n`HelloWorldSender` will be injected with `KafkaTemplate` through the\
    \ constructor. Each 50 ms, a message will be sent on the `hello` topic.\n\nWrite\
    \ a test to verify the correct behavior of the application. We can create a mock\
    \ for the `KafkaTemplate` and verify if it calls the correct methods. See Listing\
    \ [8-38](#464036_2_En_8_Chapter.xhtml#PC45).\n\n```java\npackage com.apress.springboot3recipes.kafka;\n\
    import org.junit.jupiter.api.Test;\nimport org.mockito.Mockito;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
    import org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.kafka.core.KafkaTemplate;\n\
    import static org.mockito.Mockito.verify;\n\n@SpringBootTest\nclass KafkaSenderApplicationTest\
    \ {\n    @MockBean\n    private KafkaTemplate kafka;\n    @Test\n    void shouldSendAtLeastASingleMessage()\
    \ {\n        var msg = \"Hello World, from Spring Boot 3, over Apache Kafka!\"\
    ;\n        verify(kafka, Mockito.atLeastOnce()).send(\"hello\", msg);\n    }\n\
    }\n```\n\nAnother option is to use the Spring Boot Testcontainer support to start\
    \ a broker in Docker and use that to communicate with. See Listing [8-39](#464036_2_En_8_Chapter.xhtml#PC46).\n\
    \n```java\npackage com.apress.springboot3recipes.kafka;\nimport org.junit.jupiter.api.Test;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.context.SpringBootTest;\n\
    import org.springframework.boot.testcontainers.service.connection.ServiceConnection;\n\
    import org.springframework.kafka.core.ConsumerFactory;\nimport org.testcontainers.containers.KafkaContainer;\n\
    import org.testcontainers.junit.jupiter.Container;\nimport org.testcontainers.junit.jupiter.Testcontainers;\n\
    import org.testcontainers.utility.DockerImageName;\nimport java.time.Duration;\n\
    import java.util.List;\nimport static org.assertj.core.api.Assertions.assertThat;\n\
    \n@SpringBootTest(properties = \"spring.kafka.consumer.group-id=test-group\")\n\
    @Testcontainers\nclass KafkaSenderApplicationIntegrationTest {\n    @ServiceConnection\n\
    \    @Container\n    static KafkaContainer kafkaContainer =\n        new KafkaContainer(DockerImageName.parse(\"\
    confluentinc/cp-kafka:latest\"));\n    @Autowired\n    private ConsumerFactory\
    \ consumerFactory;\n    @Test\n    void shouldSendAtLeastASingleMessage() {\n\
    \        try (var consumer = consumerFactory.createConsumer()) {\n           \
    \ consumer.subscribe(List.of(\"hello\"));\n            var records = consumer.poll(Duration.ofSeconds(2));\n\
    \            assertThat(records).isNotNull();\n            assertThat(records).isNotEmpty();\n\
    \        }\n    }\n}\n```\n\nTo determine whether the message has been sent, we\
    \ need a Kafka `Consumer`. For this we can use the `ConsumerFactory` from Spring\
    \ Kafka to easily create one. We subscribe to the topic and check if we get any\
    \ messages.\n\n> A light bulb icon. The default `KafkaTemplate` doesn’t come preconfigured\
    \ with `ConsumerFactory`. If this is being set (or you are using a custom configured\
    \ `KafkaTemplate`), that could be used as well.\n\n#### Send an Object\n\nTo send\
    \ a message to Kafka, the message payload has to be converted into a `byte[]`.\
    \ For a `String`, that is pretty easy by calling `String.getBytes`. However, when\
    \ sending an object, this becomes more cumbersome. The default Spring Kafka auto-configuration\
    \ will set up the sending of `String`-based messages.\n\nTo be able to send a\
    \ different type of value, you need to configure a `Serializer` for the producer.\
    \ This can be done through the `spring.kafka.producer.value-serializer` property.\
    \ Additional configuration can be passed through the `spring.kafka.producer.properties`\
