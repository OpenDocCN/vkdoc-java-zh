- fmt: "### Handle Exceptions for View Technologies\n\nThere are also some other properties\
    \ that can be used to configure the whitelabel error page, mainly for what is\
    \ going to be included in the model so that it, optionally, could be used to display\
    \ additional information. See Table [3-3](#464036_2_En_3_Chapter.xhtml#Tab3) for\
    \ the properties.\n\n**Table 3-3** Error Handling Properties\n\n| Property | Description\
    \ |\n| --- | --- |\n| `server.error.whitelabel.enabled` | Sets whether the `whitelabel`\
    \ error page is enabled; the default is `true`. |\n| `server.error.path` | Sets\
    \ the path of the error page; the default is `/error`. |\n| `server.error.include-exception`\
    \ | Sets whether the name of the exception should be included in the model; the\
    \ default is `false`. |\n| `server.error.include-stacktrace` | Sets whether the\
    \ stack trace should be included in the model; the default is `NEVER`. |\n| `server.error.include-message`\
    \ | Sets whether the message should be included in the model; the default is `NEVER`.\
    \ |\n| `server.error.include-binding-errors` | Sets whether the message should\
    \ be included in the model; the default is `NEVER`. |\n\nFirst let’s add a method\
    \ to `BookController` that forces an exception.\n\n```java\n@GetMapping(\"/books/500\"\
    )\npublic void error() {\n    var cause = new NullPointerException(\"Dummy Exception\"\
    );\n    throw new ServerErrorException(cause.getMessage(), cause);\n}\n```\n\n\
    This will throw an exception, and as a result the `whitelabel` error page will\
    \ be shown (see Figure [3-7](#464036_2_En_3_Chapter.xhtml#Fig7)).\n\n![A screenshot\
    \ of the local host page. It reads a list of links under the white label error\
    \ page.](images/464036_2_En_3_Chapter/464036_2_En_3_Fig7_HTML.jpg)\n\n**Figure\
    \ 3-7** Default whitelabel error page\n\nThis is shown if no error page can be\
    \ found. To override this, add an `error.html` file to the `src/main/resources/templates`\
    \ directory. See Listing [3-18](#464036_2_En_3_Chapter.xhtml#PC22).\n\n```html\n\
    Spring Boot Recipes - Library\n\nOops something went wrong, we don't know what\
    \ but we are going to work on it!\n\nStatus\n\nError\n\nMessage\n\nException\n\
    \nStacktrace\n```\n\n**Listing 3-18** Customized Error Page\n\nNow when the application\
    \ starts and an exception occurs, this custom error page will be shown (see Figure\
    \ [3-8](#464036_2_En_3_Chapter.xhtml#Fig8)). The page will be rendered by the\
    \ view technology of your choice (in this case, it uses Thymeleaf).\n\n![A screenshot\
    \ of the local host page under the Spring Boot. It displays the customized error\
    \ message that reads, Oops something went wrong, we don't know what but we are\
    \ going to work on it.](images/464036_2_En_3_Chapter/464036_2_En_3_Fig8_HTML.jpg)\n\
    \n**Figure 3-8** Customized error page\n\nIf you now set `server.error.include-exception`\
    \ to `true` and `server.error.include-stacktrace` and `server.error.include-message`\
    \ to `always`, the customized error page will show the classname of the exception,\
    \ the message, and the stacktrace (see Figure [3-9](#464036_2_En_3_Chapter.xhtml#Fig9)).\n\
    \n![A screenshot of the local host page under the Spring Boot. It displays the\
    \ customized error message that reads, Oops something went wrong, we don't know\
    \ what but we are going to work on it, along with the extended message under stack\
    \ trace.](images/464036_2_En_3_Chapter/464036_2_En_3_Fig9_HTML.jpg)\n\n**Figure\
    \ 3-9** Extended customized error page\n\nIn addition to providing a custom generic\
    \ error page, you could also add an error page for specific HTTP status codes.\
    \ This can be achieved by adding an `<http-status>.html` file to the `src/main/resources/templates/error`\
    \ directory. Let’s add a `404.html` file to be shown for unknown URLs. See Listing\
    \ [3-19](#464036_2_En_3_Chapter.xhtml#PC23).\n\n```html\nSpring Boot Recipes -\
    \ Library - Resource Not Found\n\nOops the page couldn't be located.\n```\n\n\
    **Listing 3-19** Custom 404 Page\n\nWhen navigating to a URL that is unknown,\
    \ it will render this page, and when triggering the exception, it will still show\
    \ the customized error page, as shown in Figure [3-8](#464036_2_En_3_Chapter.xhtml#Fig8).\n\
    \n![A bulb icon.](images/464036_2_En_3_Chapter/464036_2_En_3_Figf_HTML.gif) You\
    \ can also add a `4xx.html` or `5xx.html` file for a custom error page for all\
    \ HTTP status codes in the 400 or 500 range.\n\n### Add Attributes to the Model\n\
    \nBy default Spring Boot will include the attributes listed in Table [3-4](#464036_2_En_3_Chapter.xhtml#Tab4)\
    \ in the model for the error page.\n\n**Table 3-4** Default Error Model Attributes\n\
    \n| Attribute | Description |\n| --- | --- |\n| `timestamp` | The time that the\
    \ errors were extracted |\n| `status` | The status code |\n| `error` | The error\
    \ reason |\n| `exception` | The class name of the root exception (if configured)\
    \ |\n| `message` | The exception message |\n| `errors` | Any errors from a `BindingResult`\
    \ (when using binding and/or validation) |\n| `trace` | The exception stack trace\
    \ (if configured) |\n| `path` | The URL path when the exception was raised |\n\
    \nThis is all done through the use of an `ErrorAttributes` component. The default\
    \ used and configured is the `DefaultErrorAttributes` component. You can create\
    \ your own `ErrorAttributes` handler to create a custom model or extend `DefaultErrorAttributes`\
    \ to add additional attributes. See Listing [3-20](#464036_2_En_3_Chapter.xhtml#PC24).\n\
    \n```java\npackage com.apress.springboot3recipes.library;\n\nimport org.springframework.boot.web.error.ErrorAttributeOptions;\n\
    import org.springframework.boot.web.servlet.error.DefaultErrorAttributes;\nimport\
    \ org.springframework.web.context.request.WebRequest;\nimport java.util.Map;\n\
    \npublic class CustomizedErrorAttributes extends DefaultErrorAttributes {\n  \
    \  @Override\n    public Map getErrorAttributes(WebRequest webRequest,\n     \
    \                             ErrorAttributeOptions options) {\n        var errorAttributes\
    \ = super.getErrorAttributes(webRequest, options);\n        errorAttributes.put(\"\
    parameters\", webRequest.getParameterMap());\n        return errorAttributes;\n\
    \    }\n}\n```\n\n**Listing 3-20** Custom ErrorAttributes Implementation\n\n`CustomizedErrorAttributes`\
    \ will add the original request parameters to the model in addition to the default\
    \ attributes. The next step is to configure this as a bean so that Spring Boot\
    \ can detect it and use it instead of configuring the default. Adding the bean\
    \ definition shown in Listing [3-21](#464036_2_En_3_Chapter.xhtml#PC25) to `LibraryApplication`\
    \ will make that possible.\n\n```java\n@Bean\npublic CustomizedErrorAttributes\
    \ errorAttributes() {\n    return new CustomizedErrorAttributes();\n}\n```\n\n\
    **Listing 3-21** Custom ErrorAttributes Bean Definition\n\nFinally, you want to\
    \ use the additional properties in your `error.html` file. See Listing [3-22](#464036_2_En_3_Chapter.xhtml#PC26).\n\
    \n```html\nParameters\n```\n\n**Listing 3-22** Modification to the Errors Page\n\
    \nWhen Listing [3-22](#464036_2_En_3_Chapter.xhtml#PC26) is included in your `error.html`\
    \ file, it will print the content of the map of parameters available in the model."
  raw: '#### Handle Exceptions for View Technologies


    There are also some other properties that can be used to configure the whitelabel
    error page, mainly for what is going to be included in the model so that it, optionally,
    could be used to display additional information. See Table [3-3](#464036_2_En_3_Chapter.xhtml#Tab3)
    for the properties.


    Table 3-3


    Error Handling Properties


    | Property | Description |

    | --- | --- |

    | `server.error.whitelabel.enabled` | Sets whether the `whitelabel` error page
    is enabled; the default is `true`. |

    | `server.error.path` | Sets the path of the error page; the default is `/error`.
    |

    | `Server.error.include-exception` | Sets whether the name of the exception should
    be included in the model; the default is `false`. |

    | `server.error.include-stacktrace` | Sets whether the stack trace should be included
    in the model; the default is `NEVER`. |

    | `server.error.include-message` | Sets whether the message should be included
    in the model; the default is `NEVER`. |

    | `server.error.include-binding-errors` | Sets whether the message should be included
    in the model; the default is `NEVER`. |


    First let’s add a method to `BookController` that forces an exception.


    ```

    @GetMapping("/books/500")

    public void error() {

    var cause = new NullPointerException("Dummy Exception");

    throw new ServerErrorException(cause.getMessage(), cause);

    }

    ```


    This will throw an exception, and as a result the `whitelabel` error page will
    be shown (see Figure [3-7](#464036_2_En_3_Chapter.xhtml#Fig7)).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig7_HTML.jpg)


    A screenshot of the local host page. It reads a list of links under the white
    label error page.


    Figure 3-7


    Default whitelabel error page


    This is shown if no error page can be found. To override this, add an `error.html`
    file to the `src/main/resources/templates` directory. See Listing [3-18](#464036_2_En_3_Chapter.xhtml#PC22).


    ```


    Spring Boot Recipes - Library


    Oops something went wrong, we don''t know what but we are going to work on it!


    Status


    Error


    Message


    Exception


    Stacktrace


    Listing 3-18

    Customized Error Page

    ```


    Now when the application starts and an exception occurs, this custom error page
    will be shown (see Figure [3-8](#464036_2_En_3_Chapter.xhtml#Fig8)). The page
    will be rendered by the view technology of your choice (in this case, it uses
    Thymeleaf).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig8_HTML.jpg)


    A screenshot of the local host page under the Spring Boot. It displays the customized
    error message that reads, Oops something went wrong, we don''t know what but we
    are going to work on it.


    Figure 3-8


    Customized error page


    If you now set `server.error.include-exception` to `true` and `server.error.include-stacktrace`
    and `server.error.include-message` to `always`, the customized error page will
    show the classname of the exception, the message, and the stacktrace (see Figure
    [3-9](#464036_2_En_3_Chapter.xhtml#Fig9)).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig9_HTML.jpg)


    A screenshot of the local host page under the Spring Boot. It displays the customized
    error message that reads, Oops something went wrong, we don''t know what but we
    are going to work on it, along with the extended message under stack trace.


    Figure 3-9


    Extended customized error page


    In addition to providing a custom generic error page, you could also add an error
    page for specific HTTP status codes. This can be achieved by adding an `<http-status>.html`
    file to the `src/main/resources/templates/error` directory. Let’s add a `404.html`
    file to be shown for unknown URLs. See Listing [3-19](#464036_2_En_3_Chapter.xhtml#PC23).


    ```


    Spring Boot Recipes - Library - Resource Not Found


    Oops the page couldn''t be located.


    Listing 3-19

    Custom 404 Page

    ```


    When navigating to a URL that is unknown, it will render this page, and when triggering
    the exception, it will still show the customized error page, as shown in Figure
    [3-8](#464036_2_En_3_Chapter.xhtml#Fig8).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figf_HTML.gif)A bulb icon. You
    can also add a `4xx.html` or `5xx.html` file for a custom error page for all HTTP
    status codes in the 400 or 500 range.


    ##### Add Attributes to the Model


    By default Spring Boot will include the attributes listed in Table [3-4](#464036_2_En_3_Chapter.xhtml#Tab4)
    in the model for the error page.


    Table 3-4


    Default Error Model Attributes


    | Attribute | Description |

    | --- | --- |

    | `timestamp` | The time that the errors were extracted |

    | `status` | The status code |

    | `error` | The error reason |

    | `exception` | The class name of the root exception (if configured) |

    | `message` | The exception message |

    | `errors` | Any errors from a `BindingResult` (when using binding and/or validation)
    |

    | `trace` | The exception stack trace (if configured) |

    | `path` | The URL path when the exception was raised |


    This is all done through the use of an `ErrorAttributes` component. The default
    used and configured is the `DefaultErrorAttributes` component. You can create
    your own `ErrorAttributes` handler to create a custom model or extend `DefaultErrorAttributes`
    to add additional attributes. See Listing [3-20](#464036_2_En_3_Chapter.xhtml#PC24).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.web.error.ErrorAttributeOptions;

    import org.springframework.boot.web.servlet.error.DefaultErrorAttributes;

    import org.springframework.web.context.request.WebRequest;

    import java.util.Map;

    public class CustomizedErrorAttributes extends DefaultErrorAttributes {

    @Override

    public Map getErrorAttributes(WebRequest webRequest,

    ErrorAttributeOptions options) {

    var errorAttributes = super.getErrorAttributes(webRequest, options);

    errorAttributes.put("parameters", webRequest.getParameterMap());

    return errorAttributes;

    }

    }

    Listing 3-20

    Custom ErrorAttributes Implementation

    ```


    `CustomizedErrorAttributes` will add the original request parameters to the model
    in addition to the default attributes. The next step is to configure this as a
    bean so that Spring Boot can detect it and use it instead of configuring the default.
    Adding the bean definition shown in Listing [3-21](#464036_2_En_3_Chapter.xhtml#PC25)
    to `LibraryApplication` will make that possible.


    ```

    @Bean

    public CustomizedErrorAttributes errorAttributes() {

    return new CustomizedErrorAttributes();

    }

    Listing 3-21

    Custom ErrorAttributes Bean Definition

    ```


    Finally, you want to use the additional properties in your `error.html` file.
    See Listing [3-22](#464036_2_En_3_Chapter.xhtml#PC26).


    ```

    Parameters


    Listing 3-22

    Modification to the Errors Page

    ```


    When Listing [3-22](#464036_2_En_3_Chapter.xhtml#PC26) is included in your `error.html`
    file, it will print the content of the map of parameters available in the model.'
  trans: '

    #### 处理视图技术的异常


    还有一些其他属性可用于配置白标错误页面，主要用于确定模型中包含哪些内容，以便可选地用于显示附加信息。相关属性请参见表 3-3。


    表 3-3


    错误处理属性


    | 属性 | 描述 |

    | --- | --- |

    | `server.error.whitelabel.enabled` | 设置是否启用`whitelabel`错误页面；默认值为`true`。 |

    | `server.error.path` | 设置错误页面的路径；默认值为`/error`。 |

    | `Server.error.include-exception` | 设置是否在模型中包含异常名称；默认值为`false`。 |

    | `server.error.include-stacktrace` | 设置是否在模型中包含堆栈跟踪；默认值为`NEVER`。 |

    | `server.error.include-message` | 设置是否在模型中包含消息；默认值为`NEVER`。 |

    | `server.error.include-binding-errors` | 设置是否在模型中包含消息；默认值为`NEVER`。 |


    首先，让我们在`BookController`中添加一个强制引发异常的方法。


    ```

    @GetMapping("/books/500")

    public void error() {

    var cause = new NullPointerException("Dummy Exception");

    throw new ServerErrorException(cause.getMessage(), cause);

    }

    ```


    这将抛出一个异常，结果会显示`whitelabel`错误页面（见图 3-7）。


    ![](img/464036_2_En_3_Fig7_HTML.jpg)


    本地主机页面的屏幕截图。它显示白标错误页面下的链接列表。


    图 3-7


    默认的白标错误页面


    当找不到错误页面时，会显示此页面。要覆盖此行为，请在`src/main/resources/templates`目录中添加一个`error.html`文件。参见清单
    3-18。


    ```


    Spring Boot Recipes - Library


    Oops something went wrong, we don''t know what but we are going to work on it!


    Status


    Error


    Message


    Exception


    Stacktrace


    清单 3-18

    自定义错误页面

    ```


    现在，当应用程序启动并发生异常时，将显示此自定义错误页面（见图 3-8）。该页面将由您选择的视图技术渲染（在本例中，使用的是 Thymeleaf）。


    ![](img/464036_2_En_3_Fig8_HTML.jpg)


    Spring Boot 下本地主机页面的屏幕截图。它显示自定义的错误消息，内容为：哎呀，出了点问题，我们不知道是什么，但我们会努力解决。


    图 3-8


    自定义错误页面


    如果您现在将`server.error.include-exception`设置为`true`，并将`server.error.include-stacktrace`和`server.error.include-message`设置为`always`，自定义错误页面将显示异常的类名、消息和堆栈跟踪（见图
    3-9）。


    ![](img/464036_2_En_3_Fig9_HTML.jpg)


    Spring Boot 下本地主机页面的屏幕截图。它显示自定义的错误消息，内容为：哎呀，出了点问题，我们不知道是什么，但我们会努力解决，并在堆栈跟踪下显示扩展消息。


    图 3-9


    扩展的自定义错误页面


    除了提供通用的自定义错误页面外，您还可以为特定的 HTTP 状态码添加错误页面。这可以通过在`src/main/resources/templates/error`目录中添加`<http-status>.html`文件来实现。让我们添加一个`404.html`文件，用于显示未知
    URL 的情况。参见清单 3-19。


    ```


    Spring Boot Recipes - Library - Resource Not Found


    Oops the page couldn''t be located.


    清单 3-19

    自定义 404 页面

    ```


    当导航到未知 URL 时，将渲染此页面；而当触发异常时，仍会显示自定义错误页面，如图 3-8 所示。


    ![](img/464036_2_En_3_Figf_HTML.gif)一个灯泡图标。 您还可以添加`4xx.html`或`5xx.html`文件，为所有
    400 或 500 范围内的 HTTP 状态码提供自定义错误页面。


    ##### 向模型添加属性


    默认情况下，Spring Boot 会在错误页面的模型中包含表 3-4 中列出的属性。


    表 3-4


    默认错误模型属性


    | 属性 | 描述 |

    | --- | --- |

    | `timestamp` | 提取错误的时间 |

    | `status` | 状态码 |

    | `error` | 错误原因 |

    | `exception` | 根异常的类名（如果已配置） |

    | `message` | 异常消息 |

    | `errors` | 来自`BindingResult`的任何错误（使用绑定和/或验证时） |

    | `trace` | 异常堆栈跟踪（如果已配置） |

    | `path` | 引发异常时的 URL 路径 |


    这一切都是通过使用`ErrorAttributes`组件完成的。默认使用和配置的是`DefaultErrorAttributes`组件。您可以创建自己的`ErrorAttributes`处理器来创建自定义模型，或者扩展`DefaultErrorAttributes`来添加额外的属性。参见清单
    3-20。


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.web.error.ErrorAttributeOptions;

    import org.springframework.boot.web.servlet.error.DefaultErrorAttributes;

    import org.springframework.web.context.request.WebRequest;

    import java.util.Map;

    public class CustomizedErrorAttributes extends DefaultErrorAttributes {

    @Override

    public Map getErrorAttributes(WebRequest webRequest,

    ErrorAttributeOptions options) {

    var errorAttributes = super.getErrorAttributes(webRequest, options);

    errorAttributes.put("parameters", webRequest.getParameterMap());

    return errorAttributes;

    }

    }

    清单 3-20

    自定义 ErrorAttributes 实现

    ```


    `CustomizedErrorAttributes`将在默认属性的基础上，将原始请求参数添加到模型中。下一步是将其配置为一个 bean，以便 Spring
    Boot 能够检测到它并使用它，而不是配置默认的。将清单 3-21 中所示的 bean 定义添加到`LibraryApplication`中即可实现。


    ```

    @Bean

    public CustomizedErrorAttributes errorAttributes() {

    return new CustomizedErrorAttributes();

    }

    清单 3-21

    自定义 ErrorAttributes Bean 定义

    ```


    最后，您希望在`error.html`文件中使用这些额外的属性。参见清单 3-22。


    ```

    Parameters


    清单 3-22

    对错误页面的修改

    ```


    当清单 3-22 被包含在您的`error.html`文件中时，它将打印模型中可用参数映射的内容。

