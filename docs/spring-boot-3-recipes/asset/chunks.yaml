    #### 使用声明式客户端


    Spring Framework 6 引入了声明式 HTTP 客户端。借助它，可以编写一个带有一些注解的接口。在运行时，将创建一个代理来处理请求/响应，包括映射和异常处理。


    起点是一个带有 `@HttpExchange` 注解（或其派生注解，如 `@GetExchange` 和 `@PostExchange`）的接口，该注解可以放在类或方法上。其工作方式与服务器端
    API 中的 `@RequestMapping` 注解非常相似。


    使用 `@HttpExchange` 注解，可以设置一些属性（参见表 4-9）。


    表 4-9 HttpExchange 属性


    | **属性** | **描述** |

    | --- | --- |

    | `value` 或 `url` | 请求的 URL；可以是完整 URL、相对于类型级别 `@HttpExchange` 的路径，或预设的基础 URI。
    |

    | `Method` | 要使用的 HTTP 方法；`DELETE`、`GET`、`PATCH`、`POST` 或 `PUT`。默认为空。 |

    | `contentType` | 为 `Content-Type` 标头发送的媒体类型；默认为空。 |

    | `Accept` | `Accept` 标头的媒体类型。 |


    除了 `@HttpExchange` 注解之外，还有 `@DeleteExchange`、`@GetExchange`、`@PatchExchange`、`@PostExchange`
    和 `@PutExchange` 注解。这些注解可以替代带有特定 `method` 值的 `@HttpExchange` 使用。使用这些注解可以使意图更加明确。


    就像使用 `@RequestMapping` 的请求处理方法一样，声明式客户端支持多种参数、注解和返回类型。它为此复用了 Web 基础设施的公共部分。参见表
    4-10。


    表 4-10 HttpExchange 支持的方法参数


    | 类型 | 描述 |

    | --- | --- |

    | `java.net.URI` | 动态设置请求的 URL；覆盖 `@HttpExchange` 中的 `url` 属性。 |

    | `UriBuilderFactory` | 提供一个 `UriBuilderFactory` 来展开 URI 模板和 URI 变量。用于替代底层客户端的
    `UriBuilderFactory`。 |

    | `HttpMethod` | 动态设置请求使用的 HTTP 方法；覆盖 `@HttpExchange` 中的 `method` 属性。 |

    | `MultipartFile` | 从 `MultipartFile` 添加一个请求部分，通常与 Spring MVC 一起使用以指示上传的文件。 |

    | `@CookieValue` | 向传出请求添加 Cookie。参数可以是包含多个 Cookie 的 `Map<String, ?>` 或 `MultiValueMap<String,
    ?>`，也可以是单个值。对非 `String` 值使用类型转换。 |

    | `@RequestHeader` | 向传出请求添加请求头。参数可以是包含多个标头的 `Map<String, ?>` 或 `MultiValueMap<String,
    ?>`，也可以是单个值。对非 `String` 值使用类型转换。 |

    | `@PathVariable` | 添加一个变量来展开请求 URL 中的占位符。参数可以是用于多个值的 `Map<String, ?>`，也可以是单个值。对非
    `String` 值使用类型转换。 |

    | `@RequestBody` | 提供请求体，可以是待序列化的 `Object`，也可以是响应式流 Publisher（例如 `Mono`、`Flux`），或通过配置的
    `ReactiveAdapterRegistry` 支持的任何其他异步类型。 |

    | `@RequestParam` | 添加请求参数。可以是用于多个值的 `Map<String, ?>` / `MultiValueMap<String,
    ?>`。也可以是单个类型。对非 `String` 值使用类型转换。当 `contentType` 为 `application/x-www-form-urlencoded`
    时，参数会添加到请求体中。 |

    | `@RequestPart` | 添加一个请求部分，可以是 `String`（成为表单字段）、`Resource`、待编码为 JSON（或配置的其他格式）的
    `Object`、包含标头的 `HttpEntity`、Spring `Part`，或受支持的响应式流 Publisher。 |


    除了方法参数之外，还支持多种方法返回类型。参见表 4-11。


    表 4-11 HttpExchange 支持的方法返回类型

    '
- fmt: '| **Type** | **Description** |

    | --- | --- |

    | `void` | Performs the request; no response. |

    | `HttpHeaders` | Performs the request and returns only the headers. |

    | `<T>` | Performs the request and returns the decoded body as type `T`. |

    | `ResponseEntity<Void>` | Performs the request and returns a `ResponseEntity`
    with the `status` and `headers`. |

    | `ResponseEntity<T>` | Performs the request and returns a `ResponseEntity` with
    the `status` and `headers` and the body decoded as type `T`. |

    | `Mono<Void>` | Performs the request and drops the body if any. |

    | `Mono<HttpHeaders>` | Performs the request, drops the body, and returns the
    headers. |

    | `Mono<T>` | Performs the request and decodes the body to type `T`. |

    | `Flux<T>` | Performs the request and decodes the body to a stream of type `T`.
    |

    | `Mono<ResponseEntity<Void>>` | Performs the request, drops the body, and returns
    the `ResponseEntity` with headers and status. |

    | `Mono<ResponseEntity<T>>` | Performs the request, decodes the body to type `T`,
    and returns a `ResponseEntity` with the body, headers, and status. |

    | `Mono<ResponseEntity<FluxT>>>` | Performs the request, decodes the body to a
    stream of type `T`, and returns a `ResponseEntity` with a stream of `T`, headers,
    and status. |


    Given this information, we could provide two interfaces to provide access to the
    APIs that we need to call. Let’s start with the API for the books. See Listing
    [4-43](#464036_2_En_4_Chapter.xhtml#PC48).


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.service.annotation.GetExchange;

    import reactor.core.publisher.Mono;

    public interface BookServiceClient {

    @GetExchange("http://localhost:8080/books/{isbn}")

    Mono getBook(@PathVariable String isbn);

    }

    Listing 4-43

    BookServiceClient Sources

    ```


    `BookServiceClient` has one method, which is annotated with `@GetExchange`. There
    is a provided value of `http://localhost:8080/books/{isbn}`, which is a URI template.
    The method takes a single argument `isbn` that has been annotated with `@PathVariable`.
    When calling this method, the value we pass in will be placed in the `{isbn}`
    part of the URI before executing the request. When the request has been sent,
    a response comes in that is converted to a `Mono<Book>`, just as we did with the
    `WebClient`.


    Next we need an interface for the Open Library API as well. See Listing [4-44](#464036_2_En_4_Chapter.xhtml#PC49).


    ```

    package com.apress.springboot3recipes.library.rest;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.service.annotation.GetExchange;

    import org.springframework.web.service.annotation.HttpExchange;

    import reactor.core.publisher.Mono;

    import java.util.Map;

    @HttpExchange(url = "https://openlibrary.org/isbn")

    public interface OpenLibraryClient {

    @GetExchange("/{isbn}.json")

    Mono getInformation(@PathVariable String isbn);

    }

    Listing 4-44

    OpenLibraryClient Sources

    ```


    `OpenLibraryClient` has an `@HttpExchange` method with the `url` attribute set.
    This will set a base URI for use for all other methods in this interface. This
    allows us to specify only relative URLs for all other methods. Now there is only
    a single method with an `@GetExchange`. This method also takes a single argument,
    `isbn`, which is placed in the URI template before executing. The response is
    turned into a `Mono<Map>` again just as before.


    Now that the interfaces are ready, we need to expose them in our configuration,
    but we cannot create an instance from an interface. This is where `HttpServiceProxyFactory`
    comes into play; it creates a proxy at runtime for these interfaces. To do this,
    we need to add some configuration to our application. See Listing [4-45](#464036_2_En_4_Chapter.xhtml#PC50).


    ```

    @Bean

    public WebClient webClient(WebClient.Builder builder) {

    var httpClient = HttpClient.create().followRedirect(true);

    var connector = new ReactorClientHttpConnector(httpClient);

    return builder.clientConnector(connector).build();

    }

    @Bean

    public HttpServiceProxyFactory httpServiceProxyFactory(WebClient client) {

    var adapter = WebClientAdapter.create(client);

    return HttpServiceProxyFactory.builderFor(adapter).build();

    }

    @Bean

    public BookServiceClient bookServiceClient(HttpServiceProxyFactory factory) {

    return factory.createClient(BookServiceClient.class);

    }

    @Bean

    public OpenLibraryClient openLibraryClient(HttpServiceProxyFactory factory) {

    return factory.createClient(OpenLibraryClient.class);

    }

    Listing 4-45

    HttpServiceProxyFactory Configuration

    ```


    As the `WebClient` cannot be used directly, we need to wrap it in a `WebClientAdapter`,
    which adapts the `WebClient` to the `HttpExchangeAdapter` interface.


    `HttpExchangeAdapter` has three implementations: `RestClientAdapter`, `RestTemplateAdapter`,
    and `WebClientAdapter`. The first two are used in Chapter [3](#464036_2_En_3_Chapter.xhtml)
    and are blocking.


    `HttpServiceProxyFactory` in turn is used to create proxies for `BookServiceClient`
    and `OpenLibraryClient`. This is simply done by calling `createClient` with the
    given interface on `HttpServiceProxyFactory`. See Listing [4-46](#464036_2_En_4_Chapter.xhtml#PC51).


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.EnrichedBook;

    import org.springframework.http.ResponseEntity;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.bind.annotation.RequestMapping;

    import org.springframework.web.bind.annotation.RestController;

    import org.springframework.web.client.RestClientResponseException;

    import reactor.core.publisher.Mono;

    import java.util.Map;

    @RestController

    @RequestMapping("/books")

    public class EnrichedBookController {

    private final BookServiceClient bookServiceClient;

    private final OpenLibraryClient openLibraryClient;

    public EnrichedBookController(BookServiceClient bookServiceClient,

    OpenLibraryClient openLibraryClient) {

    this.bookServiceClient = bookServiceClient;

    this.openLibraryClient = openLibraryClient;

    }

    @GetMapping("/{isbn}")

    public Mono> get(@PathVariable("isbn") String isbn) {

    var book = bookServiceClient.getBook(isbn);

    var library = openLibraryClient.getInformation(isbn);

    var enriched = enrich(book, library);

    return enriched.map(ResponseEntity::ok).onErrorResume(this::handleError);

    }

    private Mono> handleError(Throwable ex) {

    if (ex instanceof RestClientResponseException rex) {

    return Mono.just(ResponseEntity.status(rex.getStatusCode()).build());

    }

    return Mono.just(ResponseEntity.internalServerError().build());

    }

    private Mono enrich(Mono book, Mono ol) {

    return Mono.zip(book, ol)

    .map( (res) -> enrich(res.getT1(), res.getT2()));

    }

    private EnrichedBook enrich(Book book, Map json) {

    var publishDate = extractPublishData(json);

    return new EnrichedBook(book.isbn(), book.title(), publishDate, book.authors());

    }

    private String extractPublishData(Map json) {

    return (String) json.getOrDefault("publish_date", "");

    }

    }

    Listing 4-46

    EnrichedBookController with Declarative Clients

    ```


    Notice that we now can call methods on the interface instead of worrying about
    constructing a proper request. That is all hidden behind the interface facade
    and inside the proxy. This makes it easier to write reusable API clients for use
    in your applications.


    Finally, notice that the exception handling didn’t change. As the declarative
    clients still use the same infrastructure as the `WebClient`, the exception handling
    doesn’t need to change.


    When rerunning the application and requesting the information for the books, the
    output should still be the same as in Figure [4-15](#464036_2_En_4_Chapter.xhtml#Fig15).'
