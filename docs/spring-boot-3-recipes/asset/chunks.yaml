    ```

    package com.apress.springboot3recipes.library.rest;

    import org.springframework.web.bind.annotation.PathVariable;

    import org.springframework.web.service.annotation.GetExchange;

    import org.springframework.web.service.annotation.HttpExchange;

    import reactor.core.publisher.Mono;

    import java.util.Map;

    @HttpExchange(url = "https://openlibrary.org/isbn")

    public interface OpenLibraryClient {

    @GetExchange("/{isbn}.json")

    Mono getInformation(@PathVariable String isbn);

    }

    清单 4-44

    OpenLibraryClient 源码

    ```


    `OpenLibraryClient` 有一个设置了 `url` 属性的 `@HttpExchange` 方法。这将为此接口中的所有其他方法设置一个基础 URI。这样我们就可以只为所有其他方法指定相对
    URL。现在只有一个带有 `@GetExchange` 的方法。该方法也接受一个参数 `isbn`，该参数在执行请求前被放入 URI 模板。响应同样被转换为
    `Mono<Map>`，和之前一样。


    现在接口已经就绪，我们需要在配置中暴露它们，但我们无法从接口创建实例。这时 `HttpServiceProxyFactory` 就派上了用场；它在运行时为这些接口创建代理。为此，我们需要在应用程序中添加一些配置。参见清单
    4-45。


    ```

    @Bean

    public WebClient webClient(WebClient.Builder builder) {

    var httpClient = HttpClient.create().followRedirect(true);

    var connector = new ReactorClientHttpConnector(httpClient);

    return builder.clientConnector(connector).build();

    }

