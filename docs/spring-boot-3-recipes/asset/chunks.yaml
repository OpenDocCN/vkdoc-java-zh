    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n*For my wife and daughters,I\
    \ love you.*\n\n# Introduction\n\nWelcome to *Spring Boot 3 Recipes*!\n\n## Who\
    \ This Book Is For\n\nThis book is for developers who want to make it easier to\
    \ work with their Spring applications. If your project uses Spring, introducing\
    \ Spring Boot will simplify your application configuration, deployment, and management.\n\
    \nThis book assumes that you are familiar with Java and Spring and that you have\
    \ an integrated development environment (IDE) of some sort. This book doesn’t\
    \ explain all the internals and in-depth workings of Spring or the related projects;\
    \ for that you might want to pick up a copy of *Spring 6 Recipes*.\n\n## How This\
    \ Book Is Structured\n\nThere are 10 chapters in this book.\n\nChapter [1](#464036_2_En_1_Chapter.xhtml),\
    \ “Introduction to Spring Boot,” gives a quick overview of Spring Boot and how\
    \ to get started.\n\nChapter [2](#464036_2_En_2_Chapter.xhtml), “The Basics of\
    \ Spring Boot,” covers the foundations of how to define and configure a bean and\
    \ do dependency injection with Spring Boot.\n\nChapter [3](#464036_2_En_3_Chapter.xhtml),\
    \ “Spring MVC,” covers web-based application development using Spring MVC.\n\n\
    Chapter [4](#464036_2_En_4_Chapter.xhtml), “Spring Webflux,” covers reactive web-based\
    \ application development using Spring Webflux.\n\nChapter [5](#464036_2_En_5_Chapter.xhtml),\
    \ “Spring Security,” provides an overview of how to secure your Spring Boot application\
    \ using Spring Security.\n\nChapter [6](#464036_2_En_6_Chapter.xhtml), “Data Access,”\
    \ explains how to access data storage such as a database or No-SQL store.\n\n\
    Chapter [7](#464036_2_En_7_Chapter.xhtml), “Java Enterprise Services,” introduces\
    \ how to use enterprise services such as JMX, Mail, and JFR with Spring Boot\n\
    \nChapter [8](#464036_2_En_8_Chapter.xhtml), “Messaging,” introduces how to do\
    \ messaging with several different messaging technologies.\n\nChapter [9](#464036_2_En_9_Chapter.xhtml),\
    \ “Spring Boot Actuator,” explains how to use the production-ready features such\
    \ as health and metrics from Spring Boot Actuator.\n\nChapter [10](#464036_2_En_10_Chapter.xhtml),\
    \ “Packaging,” shows how to package and deploy your Spring Boot applications by\
    \ making them executable and how use Docker and GraalVM.\n\n## Conventions\n\n\
    We use the following code conventions in this book:\n\n*   Sometimes, when we\
    \ want you to pay particular attention to a certain part of a code example, we\
    \ will put the code in bold. Please note that the bold doesn’t necessarily reflect\
    \ a code change from the previous version.\n\n*   When a code line is too long\
    \ to fit within the page’s width, we will break it with a code continuation character.\
    \ Please note that when you try to type the code, you have to concatenate the\
    \ line without any spaces.\n\n## Prerequisites\n\nBecause the Java programming\
    \ language is platform independent, you are free to choose any supported operating\
    \ system. However, some of the examples in this book use platform-specific paths.\
    \ Translate them as necessary to your operating system’s format before typing\
    \ the examples.\n\nTo make the most out of this book, install JDK version 21.\
    \ You should have a Java IDE installed to make development easier. For this book,\
    \ most of the sample code is Maven based, and most IDEs have built-in support\
    \ for Maven to manage the classpath.\n\nThe samples sometimes need additional\
    \ libraries installed such as PostreSQL, ActiveMQ, etc. For this, the book uses\
    \ Docker. Of course, you can install the libraries on your machine instead of\
    \ using Docker, but for ease of use (and not polluting your system) using Docker\
    \ is preferred.\n\n## Contacting the Author\n\nWe always welcome your questions\
    \ and feedback regarding the contents of this book. You can contact Marten Deinum\
    \ by email at marten@deinum.biz or via X at @mdeinum.\n\n# About the Author\n\n\
    # 1. Introduction to Spring Boot\n\nIn this chapter, you will learn about the\
    \ fundamentals of Spring Boot. At the heart of Spring Boot lies the Spring Framework,\
    \ which Spring Boot extends to make auto-configuration, among other features,\
    \ possible.\n\n> Spring Boot makes it easy to create stand-alone, production-grade\
    \ Spring-based applications that you can “just run.” We take an opinionated view\
    \ of the Spring platform and third-party libraries so you can get started with\
    \ minimum fuss. Most Spring Boot applications need very little Spring configuration.\n\
    > \n> —Spring Boot Reference Guide\n\nSpring Boot has auto-configuration for infrastructure\
    \ like JMS, JDBC, JPA, RabbitMQ, and more, and it comes with auto-configuration\
    \ for different frameworks such as Spring Integration, Spring Batch, Spring Security,\
    \ and many others. When these frameworks or capabilities are detected, Spring\
    \ Boot will auto-configure them with opiniated but sensible defaults.\n\nThe source\
    \ code uses Maven for its build. Maven will take care of getting the necessary\
    \ dependencies, compiling the code, and creating the artifact (generally a JAR\
    \ file). Furthermore, if a recipe illustrates more than one approach, the source\
    \ code is classified with various examples with roman letters (e.g., `recipe_2_1_i`,\
    \ `recipe_2_1_ii`, `recipe_2_1_iii`, etc.).\n\n![](images/464036_2_En_1_Chapter/464036_2_En_1_Figa_HTML.jpg)An\
    \ illustration of a bulb. To build each application, go in the recipe directory\
    \ (e.g., `ch2/recipe_2_1_i/`) and execute the `mvnw` command to compile the source\
    \ code. Once the source code is compiled, a `target` subdirectory is created with\
    \ the application executable. You can then run the application JAR from the command\
    \ line (e.g., `java -jar target/Recipe_2_1_i.jar`).\n\n## 1-1. Create a Spring\
    \ Boot Application Using Maven\n\n### Problem\n\nYou want to start developing\
    \ an application using Spring Boot and Maven.\n\n### Solution\n\nCreate a Maven\
    \ build file, `pom.xml`, and add the needed dependencies. To launch the application,\
    \ create a Java class containing a `main` method to bootstrap the application.\n\
    \n### How It Works\n\nSuppose you are going to create a simple application that\
    \ bootstraps `SpringApplication`, gets all the beans from `ApplicationContext`,\
    \ and outputs them to the console."
