    ## 6-3\. Use JdbcTemplate or JdbcClient


    ### Problem


    You want to use `JdbcTemplate`, `NamedParameterJdbcTemplate`, or `JdbcClient`
    to have a better JDBC experience.


    ### Solution


    Use the automatically configured `JdbcTemplate`, `NamedParameterJdbcTemplate`,
    or `JdbcClient` to execute the queries and handle the results.


    ### How It Works


    Spring Boot will configure a `JdbcTemplate`, `NamedParameterJdbcTemplate`, and
    `JdbcClient` by default and does so when it can detect a single candidate `DataSouce`.
    A single candidate `DataSource` means there is either only a single `DataSource`
    or there is one marked as a primary resource using `@Primary`. As the `JdbcTemplate`
    is already available, you can use that to write your JDBC code. Rewriting the
    `CustomerLister` to use the `JdbcTemplate` instead of a plain `DataSource` will
    make the code a little easier to read and thus easier to handle (see Listing [6-14](#464036_2_En_6_Chapter.xhtml#PC14)).


    ```

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final JdbcTemplate jdbc;

    CustomerLister(JdbcTemplate jdbc) {

    this.jdbc = jdbc;

    }

    @Override

    public void run(ApplicationArguments args) {

    jdbc.query("SELECT id, name, email FROM customer", rs -> {

    logger.info("Customer [id={}, name={}, email={}]",

    rs.getLong(1), rs.getString(2), rs.getString(3));

    });

    }

    }

    Listing 6-14

    CustomerLister Using JdbcTemplate

    ```


    The `JdbcTemplate` is used to execute the query through the `query` method; this
    method takes a `String` and a `RowCallbackHandler`. The `JdbcTemplate` will execute
    the query and for each row call the `RowCallbackHandler`, which does the logging
    of the row. When running the application, the output is still the same, but the
    code becomes easier.


    The `JdbcTemplate` also has the probably more familiar `RowMapper` interface,
    which can be used to map a row from the `ResultSet` to a Java object. Let’s create
    a `Customer` class and use a `RowMapper` to create `Customer` instances from the
    database (Listing [6-15](#464036_2_En_6_Chapter.xhtml#PC15)).


    ```

    package com.apress.springboot3recipes.jdbc;

    public record Customer(Long id, String name, String email) {

    public Customer(String name, String email) {

    this(null, name, email);

    }

    }

    Listing 6-15

    Customer Record

    ```


    Next we create a repository interface to define the contract and create a JDBC-based
    implementation (Listing [6-16](#464036_2_En_6_Chapter.xhtml#PC16)).


    ```

    package com.apress.springboot3recipes.jdbc;

    import java.util.List;

    import java.util.Optional;

    public interface CustomerRepository {

    List findAll();

    Optional findById(long id);

    Customer save(Customer customer);

    }

    Listing 6-16

    CustomerRepository Interface

    ```


    Next the implementation uses `JdbcTemplate` and a `RowMapper` instance to map
    the results to `Customer` objects (Listing [6-17](#464036_2_En_6_Chapter.xhtml#PC17)).'
