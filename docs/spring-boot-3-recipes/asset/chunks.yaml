    #### 发送一条简单消息


    使用 `RabbitTemplate` 发送消息可以通过 `convertAndSend` 方法完成。该方法至少需要提供路由键和要发送的对象。


    ```

    @Component

    class HelloWorldSender {

    private final RabbitTemplate rabbit;

    HelloWorldSender(RabbitTemplate rabbit) {

    this.rabbit = rabbit;

    }

    @Scheduled(fixedRate = 500)

    public void sayHello() {

    var msg =  "Hello World, from Spring Boot 3, over RabbitMQ!";

    rabbit.convertAndSend("hello", msg);

    }

    }

    ```


    `HelloWorldSender` 将通过构造函数注入 `RabbitTemplate`。每 500 毫秒，一条消息将被发送到默认交换机，路由键为 `hello`。由于消息发送到默认交换机，一个名为
    `hello` 的队列将被自动创建。你可以在 RabbitMQ 管理控制台中查看队列中的消息数量。


    编写一个测试来验证应用程序的正确行为。由于 RabbitMQ 没有内嵌代理，你需要使用 `@MockBean` 来模拟 `RabbitTemplate`。在
    `@Test` 方法中，验证方法调用是否使用了正确的参数。参见清单 8-24。


