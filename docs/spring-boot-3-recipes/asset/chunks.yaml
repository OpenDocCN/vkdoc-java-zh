    ### 工作原理


    您可以创建一个 POJO，并使用 `@JmsListener` 注解其方法。Spring 会检测到该注解并为其创建一个 JMS 监听器。Spring Boot
    暴露了 `spring.jms.listener` 命名空间下的属性，用于配置这些监听器。


    #### 接收消息


    让我们创建一个服务，用于监听配方 8-2 中发送方发送的消息。参见清单 8-15。


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(TextMessage msg) throws JMSException {

    System.out.println("[RECEIVED] - " + msg.getText());

    }

    }

    清单 8-15

    基于 JMS 的 Spring JMS 监听器

    ```


    这是一个常规类，其方法使用了 `@JmsListener` 注解，该注解至少需要一个 `destination` 属性，以便知道从何处检索消息。它接受一个
    `jakarta.jms.TextMessage` 参数，并将内容打印到控制台。`@JmsListener` 注解方法的签名具有一定的灵活性，因为它允许使用多个参数，这些参数可以是注解类型的，也可以是特定类型的（参见表
    8-8）。


    表 8-8


    允许的方法参数类型


    | 类型 | 描述 |

    | --- | --- |

    | `java.lang.String` | 仅针对 `TextMessage` 获取字符串形式的消息负载 |

    | `java.util.Map` | 仅针对 `MapMessage` 获取 Map 形式的消息负载 |

    | `byte[]` | 仅针对 `BytesMessage` 获取字节数组形式的消息负载 |

    | Serializable 对象 | 从 `ObjectMessage` 反序列化 `Object` |

    | `jakarta.jms.Message` | 获取实际的 JMS 消息 |

    | `jakarta.jms.Session` | 访问 `Session`，例如用于发送自定义回复 |

    | `@Header` 注解的元素 | 从 JMS 消息中提取一个标头 |

    | `@Headers` 注解的元素 | 仅可用于 `java.util.Map`，用于获取所有 JMS 消息标头 |

    | `org.springframework.messaging.Message` | 表示传入的 JMS 消息 |


    通过使用 `String` 作为方法参数，而不是自行处理 `jakarta.jms.Message` 配置，可以简化监听器。参见清单 8-16。


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(String msg) {

    System.out.println("[RECEIVED] - " + msg);

    }

    }

    清单 8-16

    基于字符串的 Spring JMS 监听器

    ```


    两个应用的输出应类似于图 8-4。


    ![](img/464036_2_En_8_Fig4_HTML.jpg)


    一个基于字符串的 Spring JMS 监听器的输出。输出中包含：启动的 JMS 接收应用、未设置配置文件、已启动的 JMS 接收应用、Spring Boot，以及接收到的当前日期和时间。


    图 8-4


    JMS 接收输出


    #### 配置监听器容器


    Spring 使用 `JmsListenerContainerFactory` 来创建支持 `@JmsListener` 注解所需的基础设施。Spring
    Boot 配置了一个默认工厂，可以通过 `spring.jms.listener` 命名空间下的属性进行配置。如果这还不够，您可以随时配置自己的实例并手动完成所有配置选项。当
    Spring Boot 在上下文中检测到已存在 `JmsListenerContainerFactory` 时，它将不会创建新的工厂（参见表 8-9）。


    表 8-9


    JMS 监听器属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.jms.listener.acknowledge-mode` | 设置容器的确认模式；默认为自动确认。 |

    | `spring.jms.listener.auto-startup` | 设置是否在启动时自动启动容器。默认为 `true`。 |

    | `spring.jms.listener.concurrency` | 设置最小并发消费者数。默认为 none，表示一个并发消费者（Spring 默认值）。
    |

    | `spring.jms.listener.max-concurrency` | 设置最大并发消费者数。默认为 none，表示一个并发消费者（Spring
    默认值）。 |

    | `spring.jms.receive-timeout` | 设置接收消息的超时时间；默认为一秒。 |

    | `spring.jms.pub-sub-domain` | 设置默认目标类型是主题还是队列。默认为 `false`，表示队列。 |


    默认配置的 `JmsListenerContainerFactory` 还会检测是否存在唯一的 `DestinationResolver` 和 `MessageConverter`，如果找到则使用它们；否则，将使用
    Spring 默认的 `DynamicDestinationResolver` 和 `SimpleMessageConverter`（更多信息请参见配方 8-2）。


    #### 使用自定义 MessageConverter


    如果您想通过 JMS 将对象作为 JSON 发送到下一个系统，该怎么办？您可以依赖 Java 序列化，但这通常不被推荐，因为它会导致系统紧密耦合。使用 JSON
    或 XML 来传输对象/消息是更好的方式。使用 Spring JMS，只需配置一个不同的 `MessageConverter` 即可（发送部分也请参见配方
    8-2）。参见清单 8-17。


    ```

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var messageConverter = new MappingJackson2MessageConverter();

    messageConverter.setTypeIdPropertyName("content_type");

    messageConverter.setTypeIdMappings(singletonMap("order", Order.class));

    return messageConverter;

    }

    清单 8-17

    MessageConverter 配置

    ```


    默认情况下，`MappingJackson2MessageConverter` 需要一个属性名来存放内容类型的标识符。该标识符将从 JMS 消息的标头中读取（此处我们将其设置为
    `content_type`）。接下来，我们可以选择性地定义类型与类之间的映射。由于我们希望能够将对象映射到 `Order` 类，因此我们将其指定为内容类型
    `order` 的映射。参见清单 8-18。


    ```

    @Component

    class OrderService {

    @JmsListener(destination = "orders")

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    清单 8-18

    接收 Order 的 JMS 消息监听器

    ```


    监听器接收 `Order` 对象，因为 Spring JMS 会负责接收和转换消息。如果您将此监听器与配方 8-2 中的订单发送器结合使用，您将看到源源不断的订单流入（图
    8-5）。


    ![](img/464036_2_En_8_Fig5_HTML.jpg)


    一个接收订单的 JMS 消息监听器的输出。输出中包含：启动的 JMS 发送器应用（使用 Java 21.0）、未设置活动配置文件、在 2.376 秒内启动的
    JMS 发送器应用、Spring Boot，以及接收到的订单和金额。


    图 8-5


    JMS 接收输出，订单

