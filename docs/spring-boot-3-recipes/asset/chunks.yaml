    ## 1-3\. Create a Spring Boot Application Using Spring Initializr


    ### Problem


    You want to start a Spring Boot application using Spring Initializr.


    ### Solution


    Go to [`https://start.spring.io`](https://start.spring.io), select the Spring
    Boot version and the different dependencies you think you need, and download the
    project.


    ### How It Works


    First go to [`https://start.spring.io`](https://start.spring.io), which will open
    the Spring Initializr (see Figure [1-5](#464036_2_En_1_Chapter.xhtml#Fig5)).


