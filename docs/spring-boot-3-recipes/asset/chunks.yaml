    Write a `BookController` that will return `orders/list` as the name of the view
    and add `Flux<Book>` to the model. See Listing [4-11](#464036_2_En_4_Chapter.xhtml#PC19).


    ```

    package com.apress.springboot3recipes.library.web;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.springframework.stereotype.Controller;

    import org.springframework.ui.Model;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.ModelAttribute;

    import org.springframework.web.bind.annotation.PostMapping;

    import org.springframework.web.bind.annotation.RequestParam;

    import reactor.core.publisher.Mono;

    @Controller

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping("/books.html")

    public String all(Model model) {

    model.addAttribute("books", bookService.findAll());

    return "books/list";

    }

    }

    Listing 4-11

    BookController to List Books

    ```


    Now that the controller and the other needed components are ready, a view is required.
    Create a `list.html` file in the `src/main/resources/templates/books` directory.
    This page will render a table with the books showing the ISBN, title, and authors.
    See Listing [4-12](#464036_2_En_4_Chapter.xhtml#PC20).


    ```

    Library - Available Books


    Available Books


    Title

    Author

    ISBN


    Title

    Authors

    ISBN


    Listing 4-12

    HTML Page for Book List

    ```


    Finally, Listing [4-13](#464036_2_En_4_Chapter.xhtml#PC21) shows the `LibraryApplication`
    to start the application.


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import reactor.core.publisher.Flux;

    @SpringBootApplication

    public class LibraryApplication {

    public static void main(String[] args) {

    SpringApplication.run(LibraryApplication.class, args);

    }

    @Bean

    public ApplicationRunner initData(BookService books) {

    return (args) -> Flux.fromIterable(BookGenerator.all())

    .map(books::create).subscribe();

    }

    }

    Listing 4-13

    Library Spring Boot Application

    ```


    Now when launching the application and clicking the link, you will end up with
    a page showing the books (Figure [4-3](#464036_2_En_4_Chapter.xhtml#Fig3)).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig3_HTML.jpg)


    A screenshot of the local host page. It has a list of titles, authors, and I S
    B N links under the available books.


    Figure 4-3


    Books list


    ### Make It More Reactive


    When running the application and opening the page, you have to wait some time
    before the page starts to render. When rendering a page and the model contains
    `Flux`, it will by default wait until the whole `Flux` is consumed. After that,
    it will start rendering the page. It basically behaves like you would retrieve
    a `Collection` instead of a `Flux`. To start rendering the page quicker and get
    the page streaming, wrap the `Flux` in a `ReactiveDataDriverContextVariable`.
    See Listing [4-14](#464036_2_En_4_Chapter.xhtml#PC22).


    ```

    @GetMapping("/books.html")

    public String all(Model model) {

    var books = new ReactiveDataDriverContextVariable(bookService.findAll(), 5);

    model.addAttribute("books", books);

    return "books/list";

    }

    Listing 4-14

    Method Using ReactiveDataDriverContextVariable

    ```


    The `all` method looks the same, but notice that the `Flux` is wrapped in `ReactiveDataDriverContextVariable`.
    This will start rendering as soon as five elements are received and will continue
    to render the page until everything is received. Now when opening the books page,
    you will see the table grow until all orders are read.


    ## Handle Exceptions with Spring WebFlux


    ### Problem


    You want to configure the exception handling for Spring WebFlux and configure
    it according to your needs.


    ### Solution


    Spring WebFlux provides several ways of handling exceptions, and with Spring Boot
    it has become pretty easy to modify the default behavior.


    For view-related implementations, it is easy to add pages that will be automatically
    picked up. Add `error.html` as a customized error page, or add specific error
    pages for specific HTTP error codes, i.e., `404.html` and `500.html`.


    Spring Boot also has exception handling support for REST-based controllers. It
    will return a response containing the error information, much like the error information
    that is available with regular WebFlux exception handling. Another option is to
    enable Problem Detail support (RFC-7807), which is a small standard for defining
    error responses. To enable it, set the `spring.webflux.problemdetails.enabled`
    property to `true`.


    ### How It Works


    We’ll now explain how it works.'
