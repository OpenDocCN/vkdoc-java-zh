    ## 10-5\. Use Spring Boot GraalVM Native Images


    GraalVM native images are single-image executables that can be run without Java
    and other dependencies. They are generated by compiling the Java application ahead
    of time instead of just in time with the JVM. These native images will most likely
    have a smaller size, have a smaller memory footprint, and are quicker to start.
    The native image is a platform-specific executable; there is no need to include
    a JVM on those environments.


    Native images are very suitable to run in containerized environments, especially
    when using functions as a service, like AWS Lambda.


    There are some drawbacks, however, when using native images.


    *   The classpath is fixed and needs to be fully defined at build time.


    *   The beans defined in the application cannot be changed at runtime.


    *   `@Profile` support isn’t available in native images; the profile to run with
    needs to be supplied at build time.


    *   `@Conditional` beans, which rely on the `Environment`, are available only
    at build time.


    *   Bean definitions that are defined as Lambda expressions or method references
    cannot be used.


    All of the restrictions come from the fact that GraalVM operates in a closed world,
    which means that all classes and bytecode that are needed at runtime need to be
    there at build time. Using Spring ahead-of-time (AOT) processing, we can help
    GraalVM get a full and clear view on which classes and bytecode are needed. Spring
    itself already does a great job of providing as much information as it can, but
    we can also help the AOT processing a little by providing additional metadata
    and information.


    ### Problem


    You want to create a native executable for your Spring Boot application.


    ### Solution


    Spring Boot can leverage the GraalVM plugins for both Maven and Gradle to create
    a native image. For Maven there is a special profile that adds additional configuration
    to generate the proper image. Running `mvn -Pnative native:compile` will run the
    regular compilation, the AOT processing, and finally the GraalVM compiler.


    #### Build a Native Image Using Native Build Tools


    To build the image on your local machine using the Maven (or Gradle) plugins,
    you will need to install GraalVM and include the plugin in your build. See Listing
    [10-15](#464036_2_En_10_Chapter.xhtml#PC15).


    ```

    org.graalvm.buildtools

    native-maven-plugin


    Listing 10-15

    Maven GraalVM Plugin

    ```


    With this in place, you can run `mvn -Pnative native:compile`, and the application
    will be built, started, and analyzed, and eventually it will result in an executable
    for the platform you are compiling on. It will take a while even for this small
    Hello World application for the binary to be created.


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Figh_HTML.gif)An information
    icon. At the moment of writing, it isn’t possible to do cross compilation, so
    it isn’t possible to create a Windows executable on macOS; you would need to use
    a build container that would contain Windows and GraalVM.


    The resulting binary can be found in the `target` directory and is named `recipe_10_5_i`
    (the name of the artifact). Starting it will show the same output as the Java
    way of running it. With one difference, it will start blazingly fast.


    Some of the trade-offs are longer compilation for faster startup times and lower
    memory footprint.


    #### Build a Native Image Using Buildpacks


    Another way of building a native image is to use a buildpack (see also Recipe
    10-4). When using a buildpack, you wouldn’t need to have a GraalVM installed on
    your local system as it would be downloaded as part of the image. You would need
    the GraalVM Maven plugin in your build. See Listing [10-16](#464036_2_En_10_Chapter.xhtml#PC16).


    ```

    org.graalvm.buildtools

    native-maven-plugin


    Listing 10-16

    Maven GraalVM Plugin

    ```


    To use a buildpack, running the regular build with the desired Maven profile is
    enough. `mvn -Pnative spring-boot:build-image` is all that is needed. After the
    process has finished, you have a container image with a native executable, which
    you can run using Docker, K8S, or another container technology.'
