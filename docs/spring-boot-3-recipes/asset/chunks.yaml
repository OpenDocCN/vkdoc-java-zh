- fmt: '## 2-4. Configure Logging


    ### Problem


    You want to configure log levels for certain loggers.


    ### Solution


    With Spring Boot you can configure the logging framework and configuration.


    ### How It Works


    Spring Boot ships with a default configuration for the supported log providers
    (Logback, Log4J2, and Java Util Logging). In addition to the default configuration,
    it adds support for configuring the logging levels through the regular `application.properties`
    as well as specifying patterns and where to, optionally, write log files to.


    Spring Boot uses SLF4J as the logging API, and when writing components, you should
    use those interfaces to write your logging. That way, you have a choice in which
    logging framework to use.


    #### Configure Logging


    One of the general things to do with a logging framework is to enable or disable
    logging for parts of the framework. With Spring Boot, you can do this by adding
    some lines to your `application.properties` file. The lines need to be prefixed
    with `logging.level.` followed by the name of the logger and finally the level
    you want it to be.


    ```

    logging.level.org.springframework.web=DEBUG

    ```


    The previous line will enable DEBUG logging for the `org.springframework.web`
    logger (generally all classes in that package and subpackages). To set the level
    of the ROOT logger, use `logging.level.ROOT=<level>`. This will set the default
    level of logging.


    #### Log to a File


    By default Spring Boot will log only to the console. If you want to write to a
    file as well, you need to specify either `logging.file` or `logging.path`. The
    first takes the name of the file, and the second takes the path. The default filename
    used is `spring.log`, and the default directory used is the Java temp dir.


    ```

    logging.file=application.log

    logging.path=/var/log

    ```


    With this configuration, a logfile named `application.log` will be written to
    the `/var/log` directory.


    When writing logs to a file, you might want to prevent the logfiles from flooding
    your system. You can specify how many files to retain with `logging.file.max-history`
    (the default is 0, meaning unlimited) and `logging.file.max-size` to specify the
    file size (the default is 10 MB).


    #### Use Your Preferred Logging Provider


    Spring Boot by default uses Logback as the provider for the logging. It also supports
    Java Util Logging as well as Log4j 2. To use another logging framework, you will
    have to first exclude the default framework and then include your own. Spring
    Boot has `spring-boot-starter-log4j2` to include all the necessary dependencies
    for Log4j 2. To exclude the default Logback logging, you need to add an exclusion
    rule to the `spring-boot-starter` dependency. This is the main dependency that
    brings in the logging.


    - ① Include the dependency for `spring-boot-starter` with an exclusion for `spring-boot-starter-logging`.

    - ② Include the `spring-boot-starter-log4j` to bring in the necessary dependencies
    for Log4j 2.


    ```

    ①

    org.springframework.boot

    spring-boot-starter


    org.springframework.boot

    spring-boot-starter-logging


    ②

    org.springframework.boot

    spring-boot-starter-log4j2

    ```


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Figh_HTML.gif) An information icon
    with the letter i inside a circle. Spring Boot 3 doesn’t support the older Log4j
    framework. It supports its successor Log4j 2.


    ## 2-5. Reuse an Existing Configuration


    ### Problem


    You have an existing application or module, and you want to reuse the configuration
    with Spring Boot.


    ### Solution


    To import an existing configuration, add the `@Import` or `@ImportResource` annotation
    to your `@Configuration` or `@SpringBootApplication` annotated class.


    ### How It Works


    On your main application class, the one with `@SpringBootApplication`, place the
    `@Import` or `@ImportResource` annotation to let Spring load the additional files.


    #### Reuse an Existing XML Configuration


    Find the class with the `@SpringBootApplication` annotation and add the `@ImportResource`
    annotation to it.


    ```

    @SpringBootApplication

    @ImportResource("classpath:application-context.xml")

    public class Application { ... }

    ```


    This configuration will load the `application-context.xml` file from the classpath
    because of the `classpath:` prefix. If the file is somewhere on the file system,
    you can use the `file:` prefix, i.e., `file:/var/conf/application-context.xml`.


    When bootstrapping the application, Spring Boot will load the additional configuration
    from the mentioned XML file.


    #### Reuse an Existing Java Configuration


    Find the class with the `@SpringBootApplication` annotation and add the `@Import`
    annotation to it.


    ```

    @SpringBootApplication

    @Import(ExistingConfiguration.class)

    public class Application { ... }

    ```


    The `@Import` annotation will take care of adding the mentioned class to the configuration.
    This can be needed if you want to include things not covered in the component
    scan or if you have disabled the auto-detection of `@Configuration` classes.


    ## 2-6. Use Docker with Spring Boot During Development


    Docker has become a popular technology to drive the development using a containerized
    environment for both development and production.


    ### Problem


    You have some containerized infrastructure (such as database, messaging providers,
    email, etc.) that you want to use during development and local testing as well.


    ### Solution


    Spring Boot supports a dockerized environment in two ways. First, it has optional
    support for Docker Compose, and second, it can utilize Testcontainers to bootstrap
    containers just as with tests (see Recipe 2-3).


    The Docker Compose support can be enabled by including the `spring-boot-docker-compose`
    dependency. When it detects a `docker-compose.yml` or `compose.yml` in the root
    of your application folder, it will use that to start the containers before starting
    the application. It will use the `ConnectionProvider` abstraction and `@ServiceConnection`
    support (see Recipe 2-3 on Testcontainers and Docker support) to determine which
    containers are started and will make the metadata (like URL, username, password,
    etc.) available to Spring Boot automatically.


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Figi_HTML.gif) An information icon
    with the letter i inside a circle. By default the Docker Compose support is disabled
    for testing in favor of using Testcontainers.


    The other option is to define some containers using Testcontainers and use the
    `@ImportTestcontainers` annotation to use them to start the dockerized environment.
    The added benefit of this is that you can reuse the same container definitions
    as used when writing tests.


    ### How It Works'
