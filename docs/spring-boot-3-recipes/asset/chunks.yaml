- fmt: "#### Configure Manually\n\nThe final way to configure JMS is to do it manually.\
    \ For this you will need at least the `spring-jms` and `jakarta.jms-api` dependencies\
    \ and probably some client libraries for the JMS broker you are using. Manual\
    \ configuration can be needed when:\n\n- Spring Boot cannot auto-configure your\
    \ `ConnectionFactory`\n- Extensive setup of the `ConnectionFactory` instance is\
    \ needed\n- Multiple `ConnectionFactory` instances are needed\n\nTo configure\
    \ a `ConnectionFactory` instance, you add an `@Bean` annotated method that constructs\
    \ a `ConnectionFactory` instance. See Listing [8-6](#464036_2_En_8_Chapter.xhtml#PC10).\n\
    \n```\n@Bean\npublic ConnectionFactory connectionFactory() {\n    var connectionFactory\
    \ = new ActiveMQConnectionFactory(\"vm://localhost?broker.persistent=false\");\n\
    \    connectionFactory.setClientID(\"someId\");\n    return connectionFactory;\n\
    }\n```\n\nThis will create a `ConnectionFactory` instance for Artemis; it will\
    \ use an embedded nonpersistent broker and set the `clientId` instance. When Spring\
    \ Boot detects a preconfigured `ConnectionFactory`, it doesn’t attempt to create\
    \ one itself. When running it, the output should look like Figure [8-3](#464036_2_En_8_Chapter.xhtml#Fig3).\n\
    \n![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig3_HTML.jpg)\n\nAn output of\
    \ a Connection Factory Bean Configuration. Starting JMS ActiveMQ application using\
    \ Java 21.0.1 with PID 31249, no active profile set, JMS ActiveMQ application,\
    \ connection factory, and JMS template are included in the output.\n\n**Figure\
    \ 8-3** Artemis beans output\n\n## 8-2\\. Send Messages Using JMS\n\n### Problem\n\
    \nYou want to send messages to other systems over JMS.\n\n### Solution\n\nUse\
    \ the Spring Boot–provided `JmsTemplate` to send and (optionally) convert messages.\n\
    \n### How It Works\n\nWhen using Spring Boot, if it detects JMS and a single `ConnectionFactory`,\
    \ it will also automatically configure a `JmsTemplate`, which can be used to send\
    \ and convert messages. Spring Boot exposes properties in the `spring.jms.template`\
    \ namespace, which can be used to configure the `JmsTemplate` instance.\n\n####\
    \ Send a Message with JmsTemplate\n\nTo send a message through JMS, you can use\
    \ the `send` or `sendAndConvert` method on `JmsTemplate`. Let’s write a component\
    \ that every second places a message with the current date and time on a queue.\
    \ See Listing [8-7](#464036_2_En_8_Chapter.xhtml#PC11).\n\n```\n@Component\nclass\
    \ MessageSender {\n    private final JmsTemplate jms;\n    MessageSender(JmsTemplate\
    \ jms) {\n        this.jms = jms;\n    }\n    @Scheduled(fixedRate = 1000)\n \
    \   public void sendTime() {\n        var msg = \"Current Date & Time is: \" +\
    \ LocalDateTime.now();\n        jms.convertAndSend(\"time-queue\", msg);\n   \
    \ }\n}\n```\n\nThe `JmsTemplate` instance is automatically injected through the\
    \ constructor, and because of scheduling, we will get a message containing the\
    \ current date and time on a queue called `time-queue`. To run this code, you\
    \ will need an `@SpringBootApplication` class with the `@EnableScheduling` annotation\
    \ so that `@Scheduled` will be processed. See Listing [8-8](#464036_2_En_8_Chapter.xhtml#PC12).\n\
    \n```\n@SpringBootApplication\n@EnableScheduling\npublic class JmsSenderApplication\
    \ {\n    public static void main(String[] args) {\n        SpringApplication.run(JmsSenderApplication.class,\
    \ args);\n    }\n}\n```\n\nNow when running this class, it appears as if nothing\
    \ much is happening, but the messages are filling up the queue. We can write an\
    \ integration test to check if this code is working. See Listing [8-9](#464036_2_En_8_Chapter.xhtml#PC13).\n\
    \n```\npackage com.apress.springboot3recipes.jms;\n\nimport jakarta.jms.JMSException;\n\
    import jakarta.jms.TextMessage;\nimport org.junit.jupiter.api.Test;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.jms.core.JmsTemplate;\n\
    \nimport static org.assertj.core.api.Assertions.assertThat;\n\n@SpringBootTest\n\
    class JmsSenderApplicationTest {\n\n    @Autowired\n    private JmsTemplate jms;\n\
    \n    @Test\n    void shouldSendMessage() throws JMSException {\n        var message\
    \ = jms.receive(\"time-queue\");\n        assertThat(message).isInstanceOf(TextMessage.class);\n\
    \        assertThat(((TextMessage) message).getText()).startsWith(\"Current Date\
    \ & Time is: \");\n    }\n}\n```\n\nThis JUnit test will bootstrap the application\
    \ and start sending messages. In the test, we use a `JmsTemplate` instance to\
    \ `receive` a message, and we do some assertions on it to see if messages are\
    \ really sent and contain what we expected them to contain. The test will use\
    \ the embedded JMS broker as we haven’t configured anything. When running the\
    \ test, it should be green as a message will be sent and received. To see if it\
    \ fails, you can remove the `@Scheduled` annotation from `MessageSender`. The\
    \ test will then fail indicating a message wasn’t received.\n\n> \U0001F4A1 When\
    \ writing tests for messaging, you might want to set the `receive-timeout` property\
    \ of `JmsTemplate` because the default is to indefinitely wait for a message to\
    \ come. However, after 500 ms, you might want to fail your test."
  raw: '#### Configure Manually


    The final way to configure JMS is to do it manually. For this you will need at
    least the `spring-jms` and `jakarta.jms-api` dependencies and probably some client
    libraries for the JMS broker you are using. Manual configuration can be needed
    when:


    *   Spring Boot cannot auto-configure your `ConnectionFactory`


    *   Extensive setup of the `ConnectionFactory` instance is needed


    *   Multiple `ConnectionFactory` instances are needed


    To configure a `ConnectionFactory` instance, you add an `@Bean` annotated method
    that constructs a `ConnectionFactory` instance. See Listing [8-6](#464036_2_En_8_Chapter.xhtml#PC10).


    ```

    @Bean

    public ConnectionFactory connectionFactory() {

    var connectionFactory =

    new ActiveMQConnectionFactory("vm://localhost?broker.persistent=false");

    connectionFactory.setClientID("someId");

    return connectionFactory;

    }

    Listing 8-6

    ConnectionFactory Bean Configuration

    ```


    This will create a `ConnectionFactory` instance for Artemis; it will use an embedded
    nonpersistent broker and set the `clientId` instance. When Spring Boot detects
    a preconfigured `ConnectionFactory`, it doesn’t attempt to create one itself.
    When running it, the output should look like Figure [8-3](#464036_2_En_8_Chapter.xhtml#Fig3).


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig3_HTML.jpg)


    An output of a Connection Factory Bean Configuration. Starting j m s active M
    Q application using Java 21.0.1 with P I D 31249, no active profile set, j m s
    active M Q application, connection factory, and j m s template are included in
    the output.


    Figure 8-3


    Artemis beans output


    ## 8-2\. Send Messages Using JMS


    ### Problem


    You want to send messages to other systems over JMS.


    ### Solution


    Use the Spring Boot–provided `JmsTemplate` to send and (optionally) convert messages.


    ### How It Works


    When using Spring Boot, if it detects JMS and a single `ConnectionFactory`, it
    will also automatically configure a `JmsTemplate`, which can be used to send and
    convert messages. Spring Boot exposes properties in the `spring.jms.template`
    namespace, which can be used to configure the `JmsTemplate` instance.


    #### Send a Message with JmsTemplate


    To send a message through JMS, you can use the `send` or `sendAndConvert` method
    on `JmsTemplate`. Let’s write a component that every second places a message with
    the current date and time on a queue. See Listing [8-7](#464036_2_En_8_Chapter.xhtml#PC11).


    ```

    @Component

    class MessageSender {

    private final JmsTemplate jms;

    MessageSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 1000)

    public void sendTime() {

    var msg = "Current Date & Time is: " + LocalDateTime.now();

    jms.convertAndSend("time-queue", msg);

    }

    }

    Listing 8-7

    JMS Message Sender Component

    ```


    The `JmsTemplate` instance is automatically injected through the constructor,
    and because of scheduling, we will get a message containing the current date and
    time on a queue called `time-queue`. To run this code, you will need an `@SpringBootApplication`
    class with the `@EnableScheduling` annotation so that `@Scheduled` will be processed.
    See Listing [8-8](#464036_2_En_8_Chapter.xhtml#PC12).


    ```

    @SpringBootApplication

    @EnableScheduling

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    }

    Listing 8-8

    Spring Boot Application for the JMS Sender

    ```


    Now when running this class, it appears as if nothing much is happening, but the
    messages are filling up the queue. We can write an integration test to check if
    this code is working. See Listing [8-9](#464036_2_En_8_Chapter.xhtml#PC13).


    ```

    package com.apress.springboot3recipes.jms;

    import jakarta.jms.JMSException;

    import jakarta.jms.TextMessage;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.jms.core.JmsTemplate;

    import static org.assertj.core.api.Assertions.assertThat;

    @SpringBootTest

    class JmsSenderApplicationTest {

    @Autowired

    private JmsTemplate jms;

    @Test

    void shouldSendMessage() throws JMSException {

    var message = jms.receive("time-queue");

    assertThat(message)

    .isInstanceOf(TextMessage.class);

    assertThat(((TextMessage) message).getText())

    .startsWith("Current Date & Time is: ");

    }

    }

    Listing 8-9

    Spring Boot JMS Integration Test

    ```


    This JUnit test will bootstrap the application and start sending messages. In
    the test, we use a `JmsTemplate` instance to `receive` a message, and we do some
    assertions on it to see if messages are really sent and contain what we expected
    them to contain. The test will use the embedded JMS broker as we haven’t configured
    anything. When running the test, it should be green as a message will be sent
    and received. To see if it fails, you can remove the `@Scheduled` annotation from
    `MessageSender`. The test will then fail indicating a message wasn’t received.


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Figb_HTML.gif)A light bulb icon.When
    writing tests for messaging, you might want to set the `receive-timeout` property
    of `JmsTemplate` because the default is to indefinitely wait for a message to
    come. However, after 500 ms, you might want to fail your test.'
  trans: '

    #### 手动配置


    配置 JMS 的最后一种方式是手动完成。为此，你至少需要 `spring-jms` 和 `jakarta.jms-api` 依赖，以及你所使用的 JMS 代理的一些客户端库。在以下情况下可能需要手动配置：


    *   Spring Boot 无法自动配置你的 `ConnectionFactory`


    *   需要对 `ConnectionFactory` 实例进行大量设置


    *   需要多个 `ConnectionFactory` 实例


    要配置一个 `ConnectionFactory` 实例，你需要添加一个带有 `@Bean` 注解的方法，该方法用于构造一个 `ConnectionFactory`
    实例。参见清单 8-6。


    ```

    @Bean

    public ConnectionFactory connectionFactory() {

    var connectionFactory =

    new ActiveMQConnectionFactory("vm://localhost?broker.persistent=false");

    connectionFactory.setClientID("someId");

    return connectionFactory;

    }

    清单 8-6

    ConnectionFactory Bean 配置

    ```


    这将为 Artemis 创建一个 `ConnectionFactory` 实例；它将使用一个嵌入式的非持久化代理，并设置 `clientId` 实例。当 Spring
    Boot 检测到一个预配置的 `ConnectionFactory` 时，它不会尝试自己创建一个。运行时，输出应如图 8-3 所示。


    ![](img/464036_2_En_8_Fig3_HTML.jpg)


    一个 Connection Factory Bean 配置的输出。使用 Java 21.0.1 启动 j m s active M Q 应用程序，PID 为
    31249，未设置活动配置文件，输出中包含 j m s active M Q 应用程序、连接工厂和 j m s 模板。


    图 8-3


    Artemis beans 输出


    ## 8-2. 使用 JMS 发送消息


    ### 问题


    你想通过 JMS 向其他系统发送消息。


    ### 解决方案


    使用 Spring Boot 提供的 `JmsTemplate` 来发送和（可选地）转换消息。


    ### 工作原理


    使用 Spring Boot 时，如果它检测到 JMS 和一个单一的 `ConnectionFactory`，它还会自动配置一个 `JmsTemplate`，可用于发送和转换消息。Spring
    Boot 在 `spring.jms.template` 命名空间中暴露了一些属性，可用于配置 `JmsTemplate` 实例。


    #### 使用 JmsTemplate 发送消息


    要通过 JMS 发送消息，你可以使用 `JmsTemplate` 上的 `send` 或 `sendAndConvert` 方法。让我们编写一个组件，它每秒向一个队列发送一条包含当前日期和时间的消息。参见清单
    8-7。


    ```

    @Component

    class MessageSender {

    private final JmsTemplate jms;

    MessageSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 1000)

    public void sendTime() {

    var msg = "Current Date & Time is: " + LocalDateTime.now();

    jms.convertAndSend("time-queue", msg);

    }

    }

    清单 8-7

    JMS 消息发送组件

    ```


    `JmsTemplate` 实例通过构造函数自动注入，并且由于使用了调度，我们将在一个名为 `time-queue` 的队列上获得一条包含当前日期和时间的消息。要运行此代码，你需要一个带有
    `@EnableScheduling` 注解的 `@SpringBootApplication` 类，以便 `@Scheduled` 能够被处理。参见清单
    8-8。


    ```

    @SpringBootApplication

    @EnableScheduling

    public class JmsSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(JmsSenderApplication.class, args);

    }

    }

    清单 8-8

    JMS 发送器的 Spring Boot 应用程序

    ```


    现在运行这个类时，看起来似乎没有发生什么，但消息正在填充队列。我们可以编写一个集成测试来检查这段代码是否正常工作。参见清单 8-9。


    ```

    package com.apress.springboot3recipes.jms;

    import jakarta.jms.JMSException;

    import jakarta.jms.TextMessage;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.jms.core.JmsTemplate;

    import static org.assertj.core.api.Assertions.assertThat;

    @SpringBootTest

    class JmsSenderApplicationTest {

    @Autowired

    private JmsTemplate jms;

    @Test

    void shouldSendMessage() throws JMSException {

    var message = jms.receive("time-queue");

    assertThat(message)

    .isInstanceOf(TextMessage.class);

    assertThat(((TextMessage) message).getText())

    .startsWith("Current Date & Time is: ");

    }

    }

    清单 8-9

    Spring Boot JMS 集成测试

    ```


    这个 JUnit 测试将启动应用程序并开始发送消息。在测试中，我们使用一个 `JmsTemplate` 实例来 `receive` 一条消息，并对其进行一些断言，以检查消息是否真的被发送并且包含我们期望的内容。由于我们没有配置任何东西，测试将使用嵌入式的
    JMS 代理。运行测试时，它应该通过，因为消息会被发送和接收。要查看它是否失败，你可以从 `MessageSender` 中移除 `@Scheduled`
    注解。然后测试将失败，表明没有收到消息。


    ![](img/464036_2_En_8_Figb_HTML.gif)一个灯泡图标。在编写消息传递测试时，你可能想要设置 `JmsTemplate` 的
    `receive-timeout` 属性，因为默认情况下它会无限期地等待消息到来。然而，在 500 毫秒后，你可能希望测试失败。

