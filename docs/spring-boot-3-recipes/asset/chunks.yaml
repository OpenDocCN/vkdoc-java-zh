- fmt: "# 6. Data Access\n\nMost applications use a relational database such as Oracle,\
    \ MySQL, or PostgreSQL; however, there is more to data storage than just SQL databases.\
    \ There are also these types:\n\n- Document stores (`MongoDB`, `Couchbase`)\n\
    - Key-value stores (`Redis`, `Voldemort`)\n- Column stores (`Cassandra`)\n- Graph\
    \ stores (`Neo4j`, `Apache Giraph`)\n\nEach of these technologies (even different\
    \ implementations of them) has its own purpose. They can also be hard to use or\
    \ configure, but Spring Boot makes it easier to configure and use them. Spring\
    \ Boot uses auto-configuration, which will detect which data store is in use (it\
    \ detects the drivers) and will apply the configuration for it. To make it easier\
    \ to work with these technologies, Spring Boot utilizes the Spring Data project.\n\
    \n> A bulb icon. Although each section uses a different persistence store, the\
    \ `bin` directory contains scripts that set up Docker containers for each persistence\
    \ store.\n\nThe Spring Data project can help make life easier; it can help configure\
    \ the different technologies with the plumbing code. Each of the integration modules\
    \ will have support for exception translation to Spring’s consistent `DataAccessException`\
    \ hierarchy and will be able to use Spring’s templating approach. Spring Data\
    \ also provides a cross-storage solution for some technologies, which means part\
    \ of your model can be stored in a relational database with JPA, and the other\
    \ part can be stored in a graph or document store.\n\n## 6-1. Configure a Data\
    \ Source\n\nWhen working with a relational database, the first thing you need\
    \ is a connection to the database. A connection in Java is obtained through `javax.sql.DataSource`.\
    \ Spring provides several out-of-the-box implementations of `DataSource` like\
    \ `DriverManagerDataSource` and `SimpleDriverDataSource`. However, these implementations\
    \ are not connection pools and should be considered mainly for testing use, not\
    \ production use. For a live system, you want to use a proper connection pool\
    \ such as HikariCP.\n\n### Problem\n\nYou need access to a database from your\
    \ application.\n\n### Solution\n\nUse the `spring.datasource.url`, `spring.datasource.username`,\
    \ and `spring.datasource.password` properties to let Spring Boot configure a `DataSource`\
    \ instance.\n\n### How It Works\n\nTo configure a `DataSource` instance, Spring\
    \ Boot requires the presence of a connection pool such as HikariCP, a JDBC driver,\
    \ or an embedded database such as H2, HSQLDB, or Derby. Spring Boot automatically\
    \ detects HikariCP, Tomcat JDBC, and Commons DBCP2-based connection pools. To\
    \ use the connection pool, configure the `spring.datasource.url`, `spring.datasource.username`,\
    \ and `spring.datasource.password` properties (the minimum properties you need\
    \ to set). Enable the JDBC support by adding the `spring-boot-starter-jdbc` dependency\
    \ (see Listing 6-1). This will pull in all the required dependencies to work with\
    \ JDBC.\n\n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-jdbc</artifactId>\n</dependency>\n```\n\n\
    **Listing 6-1** Spring Boot JDBC Starter Dependency\n\nThe dependencies included\
    \ are `spring-jdbc`, `spring-tx`, and HikariCP as the default connection pool.\n\
    \n#### Use an Embedded Data Source\n\nWhen Spring Boot detects the presence of\
    \ H2, HSQLDB, or Derby, it will by default start an embedded database using the\
    \ detected embedded implementation. This is very useful when writing a test or\
    \ preparing a demonstration. Getting Spring Boot to create this is a simple matter\
    \ of including the desired dependency (see Listing 6-2).\n\n```\n<dependency>\n\
    \    <groupId>org.apache.derby</groupId>\n    <artifactId>derby</artifactId>\n\
    \    <scope>runtime</scope>\n</dependency>\n<dependency>\n    <groupId>org.apache.derby</groupId>\n\
    \    <artifactId>derbytools</artifactId>\n    <scope>runtime</scope>\n</dependency>\n\
    ```\n\n**Listing 6-2** Apache Derby Dependencies for an Embedded Server\n\nSpring\
    \ Boot will now detect Derby and bootstrap an embedded `DataSource` instance.\
    \ Let’s write an application that lists the tables in the database (see Listing\
    \ 6-3).\n\n```\npackage com.apress.springboot3recipes.jdbc;\n\nimport javax.sql.DataSource;\n\
    import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.boot.ApplicationArguments;\n\
    import org.springframework.boot.ApplicationRunner;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.stereotype.Component;\n\
    \n@SpringBootApplication\npublic class JdbcApplication {\n\n    public static\
    \ void main(String[] args) {\n        SpringApplication.run(JdbcApplication.class,\
    \ args);\n    }\n}\n\n@Component\nclass TableLister implements ApplicationRunner\
    \ {\n\n    private final Logger logger = LoggerFactory.getLogger(getClass());\n\
    \    private final DataSource dataSource;\n\n    TableLister(DataSource dataSource)\
    \ {\n        this.dataSource = dataSource;\n    }\n\n    @Override\n    public\
    \ void run(ApplicationArguments args) throws Exception {\n        try (var con\
    \ = dataSource.getConnection();\n             var rs = con.getMetaData().getTables(null,\
    \ null, \"%\", null)) {\n            while (rs.next()) {\n                logger.info(\"\
    {}\", rs.getString(3));\n            }\n        }\n    }\n}\n```\n\n**Listing\
    \ 6-3** Spring Boot Application with `TableLister`\n\nWhen the application runs,\
    \ it will create an instance of the `TableLister`, and the instance will receive\
    \ the configured `DataSource` instance. Spring Boot will then detect the fact\
    \ it is an `ApplicationRunner` and will call the `run` method. The `run` method\
    \ obtains a `Connection` from the `DataSource` and uses the `DatabaseMetaData`\
    \ (from JDBC) to obtain the tables in the database. Now when running the application,\
    \ it should display output similar to that in Figure 6-1.\n\n**Figure 6-1** `TableLister`\
    \ output for Derby\n\n#### Use an External Database\n\nTo connect to a database,\
    \ you need a JDBC driver. This recipe uses PostgreSQL, so you need to include\
    \ the driver for this database (Listing 6-4).\n\n```\n<dependency>\n    <groupId>org.postgresql</groupId>\n\
    \    <artifactId>postgresql</artifactId>\n</dependency>\n```\n\n**Listing 6-4**\
    \ PostgreSQL Dependency\n\nConfiguring a single data source is a matter of including\
    \ the properties in the `application.properties` file (Listing 6-5).\n\n```\n\
    spring.datasource.url=jdbc:postgresql://localhost:5432/customers\nspring.datasource.username=customers\n\
    spring.datasource.password=customers\n```\n\n**Listing 6-5** Data Source Properties\
    \ to Connect to the PostgreSQL Database\n\nThe `spring.datasource.url` instance\
    \ tells the connection pool where to connect to, and `spring.datasource.username`\
    \ and `spring.datasource.password` configure the username and password to use\
    \ when connecting. You could also use `spring.datasource.driver-class-name` to\
    \ specify the JDBC driver class to use. Generally, Spring Boot will detect the\
    \ driver to use from the passed-in URL. If you want to use a nondefault driver\
    \ (for performance or logging), you could specify this as well.\n\nWhen running\
    \ the `JdbcApplication`, the output should be like that of Figure 6-2; there are\
    \ now a bunch of different tables (compared to Derby).\n\n**Figure 6-2** `TableLister`\
    \ output for PostgreSQL"
  raw: '# 6. Data Access


    Most applications use a relational database such as Oracle, MySQL, or PostgreSQL;
    however, there is more to data storage than just SQL databases. There are also
    these types:


    *   Document stores (MongoDB, Couchbase)


    *   Key-value stores (Redis, Voldemort)


    *   Column stores (Cassandra)


    *   Graph stores (Neo4j, Apache Giraph)


    Each of these technologies (even different implementations of them) has its own
    purpose. They can also be hard to use or configure, but Spring Boot makes it easier
    to configure and use them. Spring Boot uses auto-configuration, which will detect
    which data store is in use (it detects the drivers) and will apply the configuration
    for it. To make it easier to work with these technologies, Spring Boot utilizes
    the Spring Data project.


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Figa_HTML.gif)A bulb icon. Although
    each section uses a different persistence store, the `bin` directory contains
    scripts that set up Docker containers for each persistence store.


    The Spring Data project can help make life easier; it can help configure the different
    technologies with the plumbing code. Each of the integration modules will have
    support for exception translation to Spring’s consistent `DataAccessException`
    hierarchy and will be able to use Spring’s templating approach. Spring Data also
    provides a cross-storage solution for some technologies, which means part of your
    model can be stored in a relational database with JPA, and the other part can
    be stored in a graph or document store.


    ## 6-1\. Configure a Data Source


    When working with a relational database, the first thing you need is a connection
    to the database. A connection in Java is obtained through `javax.sql.DataSource`.
    Spring provides several out-of-the-box implementations of `DataSource` like `DriverManagerDataSource`
    and `SimpleDriverDataSource`. However, these implementations are not connection
    pools and should be considered mainly for testing use, not production use. For
    a live system, you want to use a proper connection pool such as HikariCP.


    ### Problem


    You need access to a database from your application.


    ### Solution


    Use the `spring.datasource.url`, `spring.datasource.username`, and `spring.datasource.password`
    properties to let Spring Boot configure a `DataSource` instance.


    ### How It Works


    To configure a `DataSource` instance, Spring Boot requires the presence of a connection
    pool such as HikariCP, a JDBC driver, or an embedded database such as H2, HSQLDB,
    or Derby. Spring Boot automatically detects HikariCP, Tomcat JDBC, and Commons
    DBCP2-based connection pools. To use the connection pool, configure the `spring.datasource.url`,
    `spring.datasource.username`, and `spring.datasource.password` properties (the
    minimum properties you need to set). Enable the JDBC support by adding the `spring-boot-starter-jdbc`
    dependency (see Listing [6-1](#464036_2_En_6_Chapter.xhtml#PC1)). This will pull
    in all the required dependencies to work with JDBC.


    ```

    org.springframework.boot

    spring-boot-starter-jdbc


    Listing 6-1

    Spring Boot JDBC Starter Dependency

    ```


    The dependencies included are `spring-jdbc`, `spring-tx`, and HikariCP as the
    default connection pool.


    #### Use an Embedded Data Source


    When Spring Boot detects the presence of H2, HSQLDB, or Derby, it will by default
    start an embedded database using the detected embedded implementation. This is
    very useful when writing a test or preparing a demonstration. Getting Spring Boot
    to create this is a simple matter of including the desired dependency (see Listing
    [6-2](#464036_2_En_6_Chapter.xhtml#PC2)).


    ```

    org.apache.derby

    derby

    runtime


    org.apache.derby

    derbytools

    runtime


    Listing 6-2

    Apache Derby Dependencies for an Embedded Server

    ```


    Spring Boot will now detect Derby and bootstrap an embedded `DataSource` instance.
    Let’s write an application that lists the tables in the database (see Listing
    [6-3](#464036_2_En_6_Chapter.xhtml#PC3)).


    ```

    package com.apress.springboot3recipes.jdbc;

    import javax.sql.DataSource;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.stereotype.Component;

    @SpringBootApplication

    public class JdbcApplication {

    public static void main(String[] args) {

    SpringApplication.run(JdbcApplication.class, args);

    }

    }

    @Component

    class TableLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final DataSource dataSource;

    TableLister(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    try (var con = dataSource.getConnection();

    var rs = con.getMetaData().getTables(null, null, "%", null)) {

    while (rs.next()) {

    logger.info("{}", rs.getString(3));

    }

    }

    }

    }

    Listing 6-3

    Spring Boot Application with TableLister

    ```


    When the application runs, it will create an instance of the `TableLister`, and
    the instance will receive the configured `DataSource` instance. Spring Boot will
    then detect the fact it is an `ApplicationRunner` and will call the `run` method.
    The `run` method obtains a `Connection` from the `DataSource` and uses the `DatabaseMetaData`
    (from JDBC) to obtain the tables in the database. Now when running the application,
    it should display output similar to that in Figure [6-1](#464036_2_En_6_Chapter.xhtml#Fig1).


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Fig1_HTML.jpg)


    A screenshot of the page reads a set of program logs in Spring Boot. It starts
    the J d b c application with Java, registers the drivers with Java class names,
    and displays the output that uses the database metadata.


    Figure 6-1


    TableLister output for Derby


    #### Use an External Database


    To connect to a database, you need a JDBC driver. This recipes use PostgreSQL,
    so you need to include the driver for this database (Listing [6-4](#464036_2_En_6_Chapter.xhtml#PC4)).


    ```

    org.postgresql

    postgresql


    Listing 6-4

    PostgreSQL Dependency

    ```


    Configuring a single data source is a matter of including the properties in the
    `application.properties` file (Listing [6-5](#464036_2_En_6_Chapter.xhtml#PC5)).


    ```

    spring.datasource.url=jdbc:postgresql://localhost:5432/customers

    spring.datasource.username=customers

    spring.datasource.password=customers

    Listing 6-5

    Data Source Properties to Connect to the PostgreSQL Database

    ```


    The `spring.datasource.url` instance tells the connection pool where to connect
    to, and `spring.datasource.username` and `spring.datasource.password` configure
    the username and password to use when connecting. You could also use `spring.datasource.driver-class-name`
    to specify the JDBC driver class to use. Generally, Spring Boot will detect the
    driver to use from the passed-in URL. If you want to use a nondefault driver (for
    performance or logging), you could specify this as well.


    When running the `JdbcApplication`, the output should be like that of Figure [6-2](#464036_2_En_6_Chapter.xhtml#Fig2);
    there are now a bunch of different tables (compared to Derby).


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Fig2_HTML.jpg)


    A screenshot of the page reads a set of program logs in Spring Boot. It starts
    the J d b c application, runs it with Java, and displays the output that reads
    a bunch of different tables.


    Figure 6-2


    TableLister output for PostgreSQL'
  trans: "\n# 6. 数据访问\n\n大多数应用程序使用关系型数据库，例如 Oracle、MySQL 或 PostgreSQL；然而，数据存储不仅仅局限于\
    \ SQL 数据库。还有以下这些类型：\n\n*   文档存储（MongoDB、Couchbase）\n*   键值存储（Redis、Voldemort）\n\
    *   列存储（Cassandra）\n*   图存储（Neo4j、Apache Giraph）\n\n这些技术中的每一种（即使是它们的不同实现）都有其特定的用途。它们可能难以使用或配置，但\
    \ Spring Boot 使得配置和使用它们变得更加容易。Spring Boot 使用自动配置，它会检测正在使用的数据存储（检测驱动程序）并为其应用配置。为了简化这些技术的使用，Spring\
    \ Boot 利用了 Spring Data 项目。\n\n![](img/464036_2_En_6_Figa_HTML.gif)一个灯泡图标。 尽管每个部分使用不同的持久化存储，但\
    \ `bin` 目录包含为每个持久化存储设置 Docker 容器的脚本。\n\nSpring Data 项目可以帮助简化工作；它可以帮助使用样板代码配置不同的技术。每个集成模块都将支持将异常转换为\
    \ Spring 一致的 `DataAccessException` 层次结构，并且能够使用 Spring 的模板方法。Spring Data 还为某些技术提供了跨存储解决方案，这意味着你的模型的一部分可以存储在带有\
    \ JPA 的关系型数据库中，而另一部分可以存储在图或文档存储中。\n\n## 6-1. 配置数据源\n\n在使用关系型数据库时，你首先需要的是与数据库的连接。在\
    \ Java 中，连接是通过 `javax.sql.DataSource` 获得的。Spring 提供了几个开箱即用的 `DataSource` 实现，例如\
    \ `DriverManagerDataSource` 和 `SimpleDriverDataSource`。然而，这些实现不是连接池，应主要考虑用于测试，而非生产环境。对于生产系统，你应该使用合适的连接池，例如\
    \ HikariCP。\n\n### 问题\n\n你需要从应用程序访问数据库。\n\n### 解决方案\n\n使用 `spring.datasource.url`、`spring.datasource.username`\
    \ 和 `spring.datasource.password` 属性，让 Spring Boot 配置一个 `DataSource` 实例。\n\n###\
    \ 工作原理\n\n要配置一个 `DataSource` 实例，Spring Boot 需要存在一个连接池（例如 HikariCP）、一个 JDBC 驱动程序或一个嵌入式数据库（例如\
    \ H2、HSQLDB 或 Derby）。Spring Boot 会自动检测 HikariCP、Tomcat JDBC 和 Commons DBCP2 连接池。要使用连接池，请配置\
    \ `spring.datasource.url`、`spring.datasource.username` 和 `spring.datasource.password`\
    \ 属性（这是你需要设置的最少属性）。通过添加 `spring-boot-starter-jdbc` 依赖项来启用 JDBC 支持（参见清单 6-1）。这将引入使用\
    \ JDBC 所需的所有依赖项。\n\n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-jdbc</artifactId>\n</dependency>\n清单 6-1\n\
    Spring Boot JDBC Starter 依赖项\n```\n\n包含的依赖项有 `spring-jdbc`、`spring-tx` 以及作为默认连接池的\
    \ HikariCP。\n\n#### 使用嵌入式数据源\n\n当 Spring Boot 检测到 H2、HSQLDB 或 Derby 时，它将默认使用检测到的嵌入式实现启动一个嵌入式数据库。这在编写测试或准备演示时非常有用。让\
    \ Spring Boot 创建它只需包含所需的依赖项即可（参见清单 6-2）。\n\n```\n<dependency>\n    <groupId>org.apache.derby</groupId>\n\
    \    <artifactId>derby</artifactId>\n    <scope>runtime</scope>\n</dependency>\n\
    <dependency>\n    <groupId>org.apache.derby</groupId>\n    <artifactId>derbytools</artifactId>\n\
    \    <scope>runtime</scope>\n</dependency>\n清单 6-2\n用于嵌入式服务器的 Apache Derby 依赖项\n\
    ```\n\nSpring Boot 现在将检测 Derby 并引导一个嵌入式的 `DataSource` 实例。让我们编写一个列出数据库中所有表的应用程序（参见清单\
    \ 6-3）。\n\n```\npackage com.apress.springboot3recipes.jdbc;\n\nimport javax.sql.DataSource;\n\
    import org.slf4j.Logger;\nimport org.slf4j.LoggerFactory;\nimport org.springframework.boot.ApplicationArguments;\n\
    import org.springframework.boot.ApplicationRunner;\nimport org.springframework.boot.SpringApplication;\n\
    import org.springframework.boot.autoconfigure.SpringBootApplication;\nimport org.springframework.stereotype.Component;\n\
    \n@SpringBootApplication\npublic class JdbcApplication {\n\n    public static\
    \ void main(String[] args) {\n        SpringApplication.run(JdbcApplication.class,\
    \ args);\n    }\n}\n\n@Component\nclass TableLister implements ApplicationRunner\
    \ {\n\n    private final Logger logger = LoggerFactory.getLogger(getClass());\n\
    \    private final DataSource dataSource;\n\n    TableLister(DataSource dataSource)\
    \ {\n        this.dataSource = dataSource;\n    }\n\n    @Override\n    public\
    \ void run(ApplicationArguments args) throws Exception {\n        try (var con\
    \ = dataSource.getConnection();\n             var rs = con.getMetaData().getTables(null,\
    \ null, \"%\", null)) {\n            while (rs.next()) {\n                logger.info(\"\
    {}\", rs.getString(3));\n            }\n        }\n    }\n}\n清单 6-3\n带有 TableLister\
    \ 的 Spring Boot 应用程序\n```\n\n当应用程序运行时，它将创建一个 `TableLister` 实例，并且该实例将接收配置好的 `DataSource`\
    \ 实例。Spring Boot 随后会检测到它是一个 `ApplicationRunner`，并调用 `run` 方法。`run` 方法从 `DataSource`\
    \ 获取一个 `Connection`，并使用 `DatabaseMetaData`（来自 JDBC）获取数据库中的表。现在运行应用程序时，它应该会显示类似于图\
    \ 6-1 的输出。\n\n![](img/464036_2_En_6_Fig1_HTML.jpg)\n\n一张页面截图，显示 Spring Boot 中的一组程序日志。它使用\
    \ Java 启动 Jdbc 应用程序，注册带有 Java 类名的驱动程序，并显示使用数据库元数据的输出。\n\n图 6-1\nDerby 的 TableLister\
    \ 输出\n\n#### 使用外部数据库\n\n要连接到数据库，你需要一个 JDBC 驱动程序。本方案使用 PostgreSQL，因此你需要包含该数据库的驱动程序（清单\
    \ 6-4）。\n\n```\n<dependency>\n    <groupId>org.postgresql</groupId>\n    <artifactId>postgresql</artifactId>\n\
    </dependency>\n清单 6-4\nPostgreSQL 依赖项\n```\n\n配置单个数据源只需在 `application.properties`\
    \ 文件中包含相关属性即可（清单 6-5）。\n\n```\nspring.datasource.url=jdbc:postgresql://localhost:5432/customers\n\
    spring.datasource.username=customers\nspring.datasource.password=customers\n清单\
    \ 6-5\n连接到 PostgreSQL 数据库的数据源属性\n```\n\n`spring.datasource.url` 实例告诉连接池连接到哪里，`spring.datasource.username`\
    \ 和 `spring.datasource.password` 配置连接时使用的用户名和密码。你也可以使用 `spring.datasource.driver-class-name`\
    \ 来指定要使用的 JDBC 驱动程序类。通常，Spring Boot 会根据传入的 URL 检测要使用的驱动程序。如果你想使用非默认的驱动程序（出于性能或日志记录目的），你也可以指定它。\n\
    \n当运行 `JdbcApplication` 时，输出应该类似于图 6-2；现在有一堆不同的表（与 Derby 相比）。\n\n![](img/464036_2_En_6_Fig2_HTML.jpg)\n\
    \n一张页面截图，显示 Spring Boot 中的一组程序日志。它启动 Jdbc 应用程序，使用 Java 运行它，并显示读取一堆不同表的输出。\n\n\
    图 6-2\nPostgreSQL 的 TableLister 输出\n"
- fmt: '### Obtain a Data Source from JNDI


    If you are deploying your Spring Boot application to an application server (or
    if you have a remote JNDI server) and want to use a preconfigured `DataSource`
    instance, you can use the `spring.datasource.jndi-name` property to let Spring
    Boot know you want to obtain a `DataSource` from JNDI (see Listing [6-6](#464036_2_En_6_Chapter.xhtml#PC6)).


    ```

    spring.datasource.jndi-name=java:jdbc/customers

    Listing 6-6

    DataSource JNDI Lookup Property

    ```


    ### Configure the Connection Pool


    The default connection pool used by Spring Boot is HikariCP. This comes automatically
    when including the `spring-boot-starter-jdbc` dependency (or one of the other
    database-related dependencies). Spring Boot will configure the connection pool
    with some default settings; however, you might want to override this (increase
    the max connections or reduce it, set the timeouts, etc.). The configuration options
    for HikariCP are in the `spring.datasource.hikari` namespace (see Table [6-1](#464036_2_En_6_Chapter.xhtml#Tab1)).


    **Table 6-1** HikariCP Common Connection Pool Settings


    | Property | Description |

    | --- | --- |

    | `spring.datasource.hikari.connection-timeout` | Sets the maximum number of milliseconds
    that a client will wait for a connection from the pool. The default is 30 seconds.
    |

    | `spring.datasource.hikari.leak-detection-threshold` | Sets the number of milliseconds
    that a connection can be out of the pool before a message is logged indicating
    a possible connection leak. The default is disabled. |

    | `spring.datasource.hikari.idle-timeout` | Sets the maximum number of milliseconds
    that a connection is allowed to sit idle in the pool. The default is 10 seconds.
    |

    | `spring.datasource.hikari.validation-timeout` | Sets the maximum number of milliseconds
    that the pool will wait for a connection to be validated as alive. The default
    is 5 seconds. |

    | `spring.datasource.hikari.connection-test-query` | Sets the SQL query to be
    executed to test the validity of connections. Generally, this is not needed with
    JDBC 4.0 (or higher) drivers! |

    | `spring.datasource.hikari.maximum-pool-size` | Sets the maximum number of connections
    that will be kept in the pool. The default is 10 connections. |

    | `spring.datasource.hikari.minimum-idle` | Sets the minimum number of idle connections
    that are maintained in the pool. The default is 10 connections. |

    | `spring.datasource.hikari.data-source-properties` | Sets the driver-specific
    properties. |


    There are more properties you can use (see Listing [6-7](#464036_2_En_6_Chapter.xhtml#PC7)),
    but the list is quite long, and the properties mentioned in Table [6-1](#464036_2_En_6_Chapter.xhtml#Tab1)
    are the most commonly used ones.


    > A circular abstract reads the lowercase letter i inside it. The properties for
    Tomcat JDBC are in the `spring.datasource.tomcat` namespace and for Commons DBCP2
    in the `spring.datasource.dbcp2` namespace.


    ```

    spring.datasource.hikari.maximum-pool-size=5

    spring.datasource.hikari.minimum-idle=2

    spring.datasource.hikari.leak-detection-threshold=20s

    Listing 6-7

    Additional Hikari Properties

    ```


    This configuration will set the maximum number of connections to 5 and the minimum
    to 2. It will also enable leak detection with a threshold of 20 seconds.


    ## 6-2. Manage the Database Schema with Spring Boot


    ### Problem


    You need to initialize or extend the objects in the schema of the database you
    are using, and you want them to be triggered/managed by your Spring Boot application.


    > A circular abstract reads the lowercase letter i inside it. There is a `postgres.sh`
    script in the `bin` directory that will start a PostgreSQL server for use with
    this recipe.


    ### Solution


    Spring Boot has out-of-the-box support for simple database management as well
    as for Flyway and Liquibase. Include the (if needed) dependencies, and Spring
    Boot will automatically use the database management of your choice and provide
    sensible defaults as well as the ability to apply some configuration properties.


    ### How It Works


    When working with an existing database, you probably already have existing tables,
    views, and procedures. However, when you create a new database, it is empty, and
    you will need to create the tables yourself. Using Spring Boot, this is supported
    out of the box. You can add a `schema.sql` file to initialize the schema (tables,
    views, etc.) and a `data.sql` file to insert data into the tables. Spring Boot
    will also allow you to provide a `schema-<platform>.sql` and `data-<platform>.sql`
    to do database-specific initialization. When using Derby, you could add a `schema-derby.sql`
    file, etc. The name of the schema and data files can be changed through the `spring.sql.init.schema-locations`
    and `spring.sql.init.data-locations` properties. See Table [6-2](#464036_2_En_6_Chapter.xhtml#Tab2)
    for a description of the available properties.


    **Table 6-2** DataSource Initialize Properties


    | Property | Description |

    | --- | --- |

    | `spring.sql.init.continue-on-error` | Sets whether to stop if an error occurs
    while initializing the database; the default is `false`. |

    | `spring.sql.init.data-locations` | Sets the data (DML) script resource references;
    the default is `classpath:data.sql`. |

    | `spring.sql.init.password` | Sets the password of the database to execute DML
    scripts; it defaults to the normal password. |

    | `spring.sql.init.username` | Sets the username of the database to execute DML
    scripts; this defaults to the normal username. |

    | `spring.sql.init.mode` | Initializes the data source with the available DDL
    and DML scripts. The default is `EMBEDDED` and can be changed to `NEVER` or `ALWAYS`.
    |

    | `spring.sql.init.platform` | Sets the platform to use in the DDL or DML scripts
    (such as `schema-${platform}.sql` or `data-${platform}.sql`). The default is `all`.
    |

    | `spring.sql.init.schema-locations` | Sets the data (DDL) script resource references;
    the default is `classpath:schema.sql`. |

    | `spring.sql.init.separator` | Sets the statement separator in SQL initialization
    scripts. The default is `;`. |

    | `spring.sql.init.encoding` | Sets the SQL script’s encoding. This defaults to
    platform encoding. |


    Let’s create a table called `customer` and insert some data into it. To create
    the table, add the `schema.sql` file to the `src/main/resources` directory (Listing
    [6-8](#464036_2_En_6_Chapter.xhtml#PC8)).


    ```

    DROP TABLE IF EXISTS customer;

    CREATE TABLE customer (

    id SERIAL PRIMARY KEY,

    name VARCHAR(100) NOT NULL,

    email VARCHAR(255) NOT NULL,

    UNIQUE(name)

    );

    Listing 6-8

    Customer DDL

    ```


    To insert the data, add the `data.sql` file to the `src/main/resources` directory
    (Listing [6-9](#464036_2_En_6_Chapter.xhtml#PC9)).


    ```

    INSERT INTO customer (name, email)

    VALUES (''Marten Deinum'', ''marten@deinum.biz''),

    (''Josh Long'', ''jlong@pivotal.com''),

    (''John Doe'', ''john.doe@island.io''),

    (''Jane Doe'', ''jane.doe@island.io'');

    Listing 6-9

    Customer Data Initialization SQL

    ```


    To see if this is working, let’s add another `ApplicationRunner` instance that
    prints the content of the `customer` table using the `DataSource` instance (Listing
    [6-10](#464036_2_En_6_Chapter.xhtml#PC10)).


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final DataSource dataSource;

    CustomerLister(DataSource dataSource) {

    this.dataSource = dataSource;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    var sql = "SELECT id, name, email FROM customer";

    try (var con = dataSource.getConnection();

    var stmt = con.createStatement();

    var rs = stmt.executeQuery(sql)) {

    while (rs.next()) {

    logger.info("Customer [id={}, name={}, email={}]", rs.getLong(1), rs.getString(2),
    rs.getString(3));

    }

    }

    }

    }

    Listing 6-10

    CustomerLister

    ```'
