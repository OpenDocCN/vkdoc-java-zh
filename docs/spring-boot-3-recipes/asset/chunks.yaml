- fmt: '# Spring Boot Docker Compose Support


    To start, you would need a `docker-compose.yaml` file to determine which services
    need to run. Let’s create one that bootstraps Postgresql with a database and a
    given username/password combination (see Listing [2-29](#464036_2_En_2_Chapter.xhtml#PC35)).


    ```

    services:

    postgres:

    image: ''postgres:15.2''

    environment:

    - ''POSTGRES_DB=springboot3recipes''

    - ''POSTGRES_USER=springboot3''

    - ''POSTGRES_PASSWORD=recipes''

    ports:

    - ''5432''

    Listing 2-29

    Docker Compose File

    ```


    To enable the support, the `spring-boot-docker-compose` dependency needs to be
    added as a dependency. See Listing [2-30](#464036_2_En_2_Chapter.xhtml#PC36) and
    Listing [2-31](#464036_2_En_2_Chapter.xhtml#PC37).


    ```

    org.springframework.boot

    spring-boot-docker-compose


    Listing 2-30

    Spring Boot Additional Dependency

    ```


    Finally, one would need an application that uses the database to do something.
    Let’s write a simple JDBC program that lists the tables available in PostgreSQL.


    ```

    package com.apress.springboot3recipes.docker;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.jdbc.core.JdbcTemplate;

    @SpringBootApplication

    public class DockerApplication {

    public static void main(String[] args) {

    SpringApplication.run(DockerApplication.class, args);

    }

    @Bean

    public ApplicationRunner lister(JdbcTemplate jdbc) {

    return (args) -> {

    jdbc.query("select * from pg_catalog.pg_tables", rs -> {

    System.out.printf("Table: %s.%s%n", rs.getString(1), rs.getString(2));

    });

    };

    }

    }

    Listing 2-31

    Spring Boot Application Using a Docker Container

    ```


    The `DockerApplication` class contains a simple `ApplicationRunner` that at startup
    will query the PostgreSQL `pg_tables` system table to retrieve the names of the
    available tables and print them to the console. After that, it will stop. Notice
    how there is nothing Docker specific here nor that we have specified anything
    for the database as a configuration.


    Now when running the application, there will be some output stating that a Docker
    compose file has been found and that it will start the containers. When the containers
    have started, the application will continue and list the tables. See Figure [2-6](#464036_2_En_2_Chapter.xhtml#Fig6).


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Fig6_HTML.jpg)


    A screenshot of the services window. It reads a set of program logs in Spring
    Boot that runs the application with the docker file output, starts the containers,
    and lists the tables.


    Figure 2-6


    Docker application output


    There was/is no manually starting the containers anymore with `docker compose
    up` or by modifying your build (or `main` method) to start the containers.


    By default the Spring Boot Docker Compose support will look for a `docker-compose.yaml`/`compose.yml`
    file. This can be changed using the `spring.docker.compose.file` property. You
    can point it to a specific file on your file system. There are more properties
    (see Table [2-3](#464036_2_En_2_Chapter.xhtml#Tab3)) that you can use to modify
    the behavior.


    Table 2-3


    Docker Compose Configuration Parameters


    | Parameter | Description |

    | --- | --- |

    | `spring.docker.compose.enabled` | Sets whether Docker Compose support is enabled;
    default is `true`. |

    | `spring.docker.compose.file` | Path to a specific Docker Compose file. |

    | `spring.docker.compose.lifecycle-management` | Docker Compose life cycle; default
    is `START_AND_STOP`. |

    | `spring.docker.compose.host` | Hostname/IP address of the machine where the
    Docker containers will start and run. |

    | `spring.docker.compose.start.command` | The Docker Compose command used when
    starting; the default is `UP`. |

    | `spring.docker.compose.start.loglevel` | Log level for Docker Compose output.
    |

    | `spring.docker.compose.stop.command` | The Docker Compose command used when
    stopping; the default is `STOP`. |

    | `spring.docker.compose.stop.duration` | Timeout for stopping Docker Compose;
    the default is 10 seconds. Set it to 0 for forced stop. |

    | `spring.docker.compose.profiles.active` | Docker compose profiles that should
    be activated. |

    | `spring.docker.compose.skip.in-tests` | Sets whether Docker Compose support
    is enabled in tests; the default is `false`. |

    | `spring.docker.compose.readiness.wait` | The wait strategy to use; the default
    is `ALWAYS`. |

    | `spring.docker.compose.readiness.timeout` | Timeout for the readiness check;
    the default is 2 minutes. |

    | `spring.docker.compose.readiness.tcp.connect-timeout` | Timeout for connections.
    |

    | `spring.docker.compose.readiness.tcp.read-timeout` | Timeout for reads. |


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Figj_HTML.gif)A triangular abstract
    reads an exclamatory symbol inside it. It resembles a warning icon.`spring.docker.compose.profiles.active`
    is to set/enable the profiles to use with Docker Compose. These profiles aren’t
    related to Spring profiles.


    The Docker Compose support in Spring Boot uses the names of the Docker images
    to determine what to configure. See Table [2-4](#464036_2_En_2_Chapter.xhtml#Tab4)
    for the names and supported technologies.


    Table 2-4


    Docker Compose Supported Containers


    | Technology | Container Image Name(s) Matched |

    | --- | --- |

    | Cassandra | `cassandra` |

    | ElasticSearch | `elasticsearch` |

    | JDBC and R2DBC | • `gvenzl/oracle-xe`• `mariadb`• `mssql/server`• `mysql`• `postgres`
    |

    | MongoDB | `mongo` |

    | RabbitMQ | `rabbitmq` |

    | Redis | `redis` |

    | Zipkin | `openzipkin/zipkin` |


    ## Spring Boot Docker Compose Support: Custom Container Images


    As Table [2-4](#464036_2_En_2_Chapter.xhtml#Tab4) shows, the names of the container
    matter. But what if you want to use a customized container, for instance with
    a preconfigured and filled PostgreSQL database or a preconfigured and secured
    message broker? With the Spring Docker Compose Support, this is still possible,
    with some additional configuration in the Docker Compose file. With Docker Compose,
    it is possible to specify labels. The Spring Boot Docker Compose support will
    read the `org.springframework.boot.service-connection` label; the value it has
    will be used as the name of the container. See Listing [2-32](#464036_2_En_2_Chapter.xhtml#PC38).


    ```

    services:

    postgres:

    image: ''postgres:15.2''

    environment:

    - ''POSTGRES_DB=springboot3recipes''

    - ''POSTGRES_USER=springboot3''

    - ''POSTGRES_PASSWORD=recipes''

    ports:

    - ''5432''

    labels:

    org.springframework.boot.service-connection: redis

    Listing 2-32

    Docker Compose File with Label

    ```


    There are more labels that can be used to configure/influence the Docker Compose
    support (see Table [2-5](#464036_2_En_2_Chapter.xhtml#Tab5)).


    Table 2-5


    Docker Compose Labels


    | Parameter | Description |

    | --- | --- |

    | `org.springframework.boot.service-connection` | The name of the container image
    to use (see Table [2-4](#464036_2_En_2_Chapter.xhtml#Tab4)). |

    | `org.springframework.boot.ignore` | Ignore this container for the Docker Compose
    support. |

    | `org.springframework.boot.readiness-check.tcp.disable` | Disable the TCP readiness
    check. |

    | `org.springframework.boot.readiness-check.tcp.connect-timeout` | The connection
    timeout. |

    | `org.springframework.boot.readiness-check.tcp.read-timeout` | The read timeout.
    |'
