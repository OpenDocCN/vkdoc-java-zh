- fmt: '#### Redirect HTTP to HTTPS


    Instead of supporting both HTTP and HTTPS, another option is to support only HTTPS
    and redirect the traffic from HTTP to HTTPS. The configuration is similar to that
    when supporting both HTTP and HTTPS. However, you now configure the connector
    to redirect all traffic from `8080` to `8443`. See Listing [3-40](#464036_2_En_3_Chapter.xhtml#PC45).


    ```

    @Bean

    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

    var factory = new TomcatServletWebServerFactory();

    factory.addAdditionalTomcatConnectors(httpConnector());

    factory.addContextCustomizers(securityCustomizer());

    return factory;

    }

    private Connector httpConnector() {

    var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    connector.setRedirectPort(8443);

    return connector;

    }

    private TomcatContextCustomizer securityCustomizer() {

    return context -> {

    var collection = new SecurityCollection();

    collection.addPattern("/*");

    var securityConstraint = new SecurityConstraint();

    securityConstraint.setUserConstraint("CONFIDENTIAL");

    securityConstraint.addCollection(collection);

    context.addConstraint(securityConstraint);

    };

    }

    Listing 3-40

    Additional Tomcat Connector: With Redirect

    ```


    The `httpConnector` now has a `redirectPort` set so that it knows which port to
    use. Finally, you need to secure all URLs with a `SecurityConstraint`. With Spring
    Boot, you can use a specialized `TomcatContextCustomizer` to post process the
    `Context` from Tomcat before it is started. The constraint makes everything (due
    to the use of `/*` as pattern) confidential (one of `NONE`, `INTEGRAL`, or `CONFIDENTIAL`
    is allowed), and the result is that everything will be redirected.


    ## 3-9\. Implement Asynchronous Request Handling with Controllers and TaskExecutor


    ### Problem


    To increase the throughput on the servlet container, you want to asynchronously
    handle the request so resources can be assigned more efficiently.


    ### Solution


    When a request comes in, it is handled synchronously, which blocks the HTTP request
    handling thread. The response stays open and is available to be written to. This
    is useful when a call, for instance, takes some time to finish, and instead of
    blocking threads, you can have this processed in the background and return a value
    to the user when finished.


    ### How It Works


    Spring MVC supports a number of return types from methods; the return types in
    Table [3-12](#464036_2_En_3_Chapter.xhtml#Tab12) are processed in an asynchronous
    way.


    **Table 3-12** Asynchronously Return Types


    | Type | Description |

    | --- | --- |

    | `DeferredResult<?>` | Async result produced later from another thread. |

    | `ListenableFuture<?>` | Async result produced later from another thread, an
    equivalent alternative for `DeferredResult`. As of Spring 6.0, this is deprecated
    in favor of a `CompletableFuture<?>`. |

    | `CompletionStage<?>`/`CompletableFuture<?>` | Async result produced later from
    another thread, an equivalent alternative for `DeferredResult`. |

    | `Callable<?>` | An async computation with the result produced after the computation
    finishes. |

    | `ResponseBodyEmitter` | Can be used to write multiple objects to the response
    asynchronously. |

    | `SseEmitter` | Can be used to write Server-Sent event asynchronously. |

    | `StreamingResponseBody` | Can be used to write to the `OutputStream` asynchronously.
    |


    The generic return types in turn can return any of the return types for the controller,
    so either an object to be added to the model, a name of the view, or even a `ModelAndView`.


    #### Configure Async Processing


    Async request handling support has been added to the servlet specification in
    version 3. To enable it, you have to tell all your filters and servlets to behave
    asynchronously. In a Spring Boot application, this is done by default for the
    `DispatcherServlet` and detected `Filter` beans.


    Spring Boot by default configures an `AsyncTaskExecutor` for use with Spring MVC.
    You can, however, depending on your needs, configure an `AsyncTaskExecutor`, and
    wire that in the MVC configuration. See Listing [3-41](#464036_2_En_3_Chapter.xhtml#PC46).


    ```

    @SpringBootApplication

    public class HelloWorldApplication implements WebMvcConfigurer {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Override

    public void configureAsyncSupport(AsyncSupportConfigurer configurer) {

    configurer.setDefaultTimeout(5000);

    configurer.setTaskExecutor(mvcTaskExecutor());

    }

    @Bean

    public ThreadPoolTaskExecutor mvcTaskExecutor() {

    ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

    taskExecutor.setThreadNamePrefix("mvc-executor-");

    return taskExecutor;

    }

    }

    Listing 3-41

    Explicit TaskExecutor Configuration

    ```


    > 💡 When Spring Boot detects that you have access to virtual threads (Java 21)
    and the property `spring.threads.virtual.enabled` is set to `true`, it will automatically
    set this up for Virtual Thread usage.


    To configure async processing, you override the `configureAsyncSupport` method
    of `WebMvcConfigurer`. Overriding this method gives you access to the `AsyncSupportConfigurer`.
    This allows you to set `defaultTimeout` and the `AsyncTaskExecutor` to use. The
    timeout is set to 5 seconds, and as an executor you will use a `ThreadPoolTaskExecutor`.


    > 💡 The `defaultTimeout` can also be set by setting `spring.mvc.async.request-timeout`
    in the `application.properties`. Adding `spring.mvc.async.request-timeout=5s`
    is the same as in the `@Bean` method.


    #### Write an Asynchronous Controller


    Writing a controller and having it handle the request asynchronously is as simple
    as changing the return type of the controller’s handler method (see Table [3-12](#464036_2_En_3_Chapter.xhtml#Tab12)).
    Let’s imagine that the call to `HelloWorldController.hello` takes some time, but
    we don’t want to block the server for that.'
