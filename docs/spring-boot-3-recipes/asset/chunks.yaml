    Listing [3-42](#464036_2_En_3_Chapter.xhtml#PC47) shows how to use a callable.


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import java.util.concurrent.Callable;

    import java.util.concurrent.ThreadLocalRandom;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public Callable hello() {

    return () -> {

    Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

    var version = SpringBootVersion.getVersion();

    return String.format("Hello World, from Spring Boot %s!", version);

    };

    }

    }

    Listing 3-42

    Async Controller Using a Callable

    ```


    The `hello` method now returns a `Callable<String>` instead of returning a `String`
    directly. Inside the newly constructed `Callable<String>` there is a random wait
    to simulate a delay before the message is returned to the client.


    Now when making a reservation, you will see something similair in the logs (see
    Figure [3-16](#464036_2_En_3_Chapter.xhtml#Fig16)).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figr_HTML.gif)An information icon
    with the letter i inside a circle. To enable this logging, you need to enable
    `DEBUG` level logging for the web-related groups. You can do this by adding `logging.level.web=DEBUG`
    to your `application.properties`.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig16_HTML.jpg)


    A screenshot of the local host page under the Spring Boot. It displays a list
    of logs while making a reservation. It starts the asymmetric request and writes
    the message Hello world from the Spring Boot.


    Figure 3-16


    Logging output with async enabled


    You notice that request handling is started on a certain thread (here `nio-8080-exec-2`).
    Another thread is doing the processing and returning the result (here `task-1`).
    Finally, the request is dispatched to `DispatcherServlet` again to handle the
    result on yet another thread.


    ### Use a CompletableFuture


    Change the signature of the method to return `CompletableFuture<String>` and use
    the `AsyncTaskExecutor` to async execute the code. See Listing [3-43](#464036_2_En_3_Chapter.xhtml#PC48).


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.core.task.AsyncTaskExecutor;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import java.util.concurrent.CompletableFuture;

    import java.util.concurrent.ThreadLocalRandom;

    @RestController

    public class HelloWorldController {

    private final AsyncTaskExecutor taskExecutor;

    public HelloWorldController(AsyncTaskExecutor taskExecutor) {

    this.taskExecutor = taskExecutor;

    }

    @GetMapping

    public CompletableFuture hello() {

    return taskExecutor.submitCompletable(() -> {

    randomDelay();

    var version = SpringBootVersion.getVersion();

    return String.format("Hello World, from Spring Boot %s!", version);

    });

    }

    private void randomDelay() {

    try {

    Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

    } catch (InterruptedException e) {

    Thread.currentThread().interrupt();

    }

    }

    }

    Listing 3-43

    Async Controller Using a CompletableFuture

    ```


    The task is executed on a thread from the `AsyncTaskExecutor`. We pass the task
    using the `submitCompletable`, which returns a `CompletableFuture`. When returning
    a `CompletableFuture`, you can take advantage of all the features of it, like
    composing and chaining multiple `CompletableFuture` instances.


    ### Test Async Controllers


    Just like regular controllers, the Spring MVC Test framework can be used to test
    async controllers.


    Create a test class and annotate it with `@WebMvcTest(HelloWorldController.class)`.
    The `@WebMvcTest` will bootstrap a minimal Spring Boot application containing
    the things needed to test the controller. It automatically configures Spring `MockMvc`,
    which is autowired into the test. See Listing [3-44](#464036_2_En_3_Chapter.xhtml#PC49).


    ```

    package com.apress.springboot3recipes;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.MvcResult;

    import org.springframework.test.web.servlet.request.MockMvcRequestBuilders;

    import org.springframework.test.web.servlet.result.MockMvcResultHandlers;

    import static org.hamcrest.Matchers.startsWith;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.asyncDispatch;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.request;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @WebMvcTest(HelloWorldController.class)

    public class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    public void testHelloWorldController() throws Exception {

    MvcResult mvcResult = mockMvc.perform(MockMvcRequestBuilders.get("/"))

    .andExpect(request().asyncStarted())

    .andDo(MockMvcResultHandlers.print())

    .andReturn();

    mockMvc.perform(asyncDispatch(mvcResult))

    .andExpect(status().isOk())

    .andExpect(content().contentTypeCompatibleWith(MediaType.TEXT_PLAIN))

    .andExpect(content().string(startsWith("Hello World, from Spring Boot ")));

    }

    }

    Listing 3-44

    Test for the HelloWorldController

    ```


    The main difference between an async web test and a regular web test is the fact
    that the async dispatching needs to be initiated. First the initial request is
    performed and validated for the async to start. For debugging purposes, you could
    log the result. Next the `asyncDispatch` is applied. Finally, we can assert the
    expected response.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figs_HTML.gif)An information icon
    with the letter i inside a circle. Instead of using `asyncDispatch`, you could
    also use `mvcResult.getAsyncResult` (with or without a timeout) to directly get
    the result. However, generally you want to write additional assertions on the
    response.


