    ## 3-7\. Select and Configure the Embedded Server


    ### Problem


    You want to use Jetty as an embedded container instead of the default Tomcat container.


    ### Solution


    Exclude the Tomcat runtime and include the Jetty runtime. Spring Boot will automatically
    detect whether Tomcat, Jetty, or Undertow is on the classpath and configure the
    container accordingly.


    ### How It Works


    Spring Boot has out-of-the-box support for Tomcat, Jetty, and Undertow as embedded
    servlet containers. By default Spring Boot uses Tomcat as the container (expressed
    through the `spring-boot-starter-tomcat` dependency in the `spring-boot-starter-web`
    artifact). The container can be configured using properties for which some apply
    to all containers and others to a specific container. The global properties are
    prefixed with `server.` or `server.servlet`, whereas the container ones start
    with `server.<container>` (where `container` is either `tomcat`, `jetty`, or `undertow`).'
