    注意 `Content-Type` 标头。它的值为 `text/event-stream`，表示我们获取的是一个事件流。该流可以保持打开状态以接收事件通知。每个写入的对象都会被转换为
    JSON。这是通过 `HttpMessageConverter` 完成的，与普通的 `ResponseBodyEmitter` 一样。每个对象都会作为事件数据写入
    `data` 标签中。


    如果你想向事件添加更多信息（填写表 3-13 中提到的其他字段），请使用 `SseEventBuilder`。`SseEmitter` 的 `event()`
