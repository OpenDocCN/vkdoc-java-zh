  raw: '#### Receive a Message and Send a Reply


    When receiving a message, it might be necessary to send a response to the client
    or communicate with a different message; using an `@RabbitListener` on a nonvoid
    method is possible. It will create a result message and place it on an exchange
    with a routing key; this needs to be specified in the `@SendTo` annotation. See
    Listing [8-34](#464036_2_En_8_Chapter.xhtml#PC40).


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    @SendTo("orders/order-confirmation")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.id());

    }

    }

    Listing 8-34

    Rabbit Listener for Orders with Reply

    ```


    When receiving an `Order` and processing it, an `OrderConfirmation` will be sent;
    the `@SendTo` annotation (from the general Spring Messaging component) contains
    the exchange and routing key. The part before the `/` is the exchange, and the
    part afterward is the routing key; thus, `<exchange>/<routing-key>` is the pattern
    used. An empty exchange or routing key value is possible (or both); in that case,
    the default configured exchange and routing key will be used. Here it will use
    the `orders` exchange and use `order-confirmation` as the routing key.


    Another listener could be used to process the `OrderConfirmation` messages. See
    Listing [8-35](#464036_2_En_8_Chapter.xhtml#PC41).


    ```

    @Component

    class OrderConfirmationService {

    @RabbitListener(bindings = @QueueBinding(

    exchange = @Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "order-confirmations"),

    key = "order-confirmation"

    ))

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    Listing 8-35

    OrderConfirmationService for RabbitMQ

    ```


    It will create a queue `order-confirmations` using the `order-confirmation` routing-key
    and bind that on the `orders` exchange (just as the `OrderService` created earlier).
    When running the code, together with the sender from Recipe 8-4, you should receive
    `Order` instances and see that they will be confirmed as well (Figure [8-9](#464036_2_En_8_Chapter.xhtml#Fig9)).


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig9_HTML.jpg)


    An output of an order confirmation service for Rabbit M Q. The starting Rabbit
    receiver application using Java 21.0.1 with P I D 33009, no active profile set,
    created new connection, the started Rabbit receiver application in 1.941 seconds,
    and the received order i d and amount are included in the output.


