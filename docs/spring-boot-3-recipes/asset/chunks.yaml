- fmt: '### Test Mongo Repositories


    When testing MongoDB code, a running Mongo instance is needed. For testing an
    embedded MongoDB is often used. Spring Boot makes it easy to write tests for MongoDB,
    using `@DataMongoTest`. Spring Boot will create a minimal application with only
    the MongoDB-related beans and start an embedded MongoDB (if detected).


    Let’s write a test for `CustomerRepository` and use an embedded MongoDB. First
    add the embedded MongoDB as a test dependency (Listing [6-61](#464036_2_En_6_Chapter.xhtml#PC62)).


    ```

    de.flapdoodle.embed

    de.flapdoodle.embed.mongo.spring3x

    4.12.0

    test


    Listing 6-61

    Flapdoodle Embedded Mongo Spring Boot Starter Dependency

    ```


    To use it, we also need to specify `de.flapdoodle.mongodb.embedded.version`, which
    contains the version of MongoDB we are using (Listing [6-62](#464036_2_En_6_Chapter.xhtml#PC63)).
    In our case, this is the 6.0.5 version (the same as the Docker container version).
    This together with the starter (Listing [6-61](#464036_2_En_6_Chapter.xhtml#PC62))
    will automatically download an embedded MongoDB version and start it, ready to
    use for testing.


    ```

    de.flapdoodle.mongodb.embedded.version=6.0.5

    Listing 6-62

    Flapdoodle application.properties

    ```


    Next create `CustomerRepositoryTest` (Listing [6-63](#464036_2_En_6_Chapter.xhtml#PC64)).


    ```

    @DataMongoTest

    class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @BeforeEach

    public void cleanUp() {

    repository.deleteAll();

    }

    }

    Listing 6-63

    MongoDB-Based Test for the CustomerRepository

    ```


    The `@DataMongoTest` annotation executes the test with a special JUnit Extension
    (`SpringExtention`) to bootstrap the Spring Test Context framework. The `@DataMongoTest`
    annotation will replace the preconfigured MongoDB with an embedded one (if on
    the classpath). It will also bootstrap the MongoDB components and when detected
    Spring Data Mongo repositories.


    After each test, we want to make sure that the embedded MongoDB doesn’t contain
    any data. This can be achieved by adding an `@BeforeEach` annotated method and
    calling `deleteAll` on the repository. This method will be called before each
    executed test method.


    Now write a test that tests if records get inserted correctly (Listing [6-64](#464036_2_En_6_Chapter.xhtml#PC65)).


    ```

    @Test

    void insertNewCustomer() {

    assertThat(repository.findAll()).isEmpty();

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.id()).isNotNull();

    assertThat(customer.name()).isEqualTo("T. Testing");

    assertThat(customer.email()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.id()))

    .contains( customer);

    }

    Listing 6-64

    Insert New Customer Test: MongoDB

    ```


    This test first asserts that the database is empty, which is not really required
    but can be useful to detect if other tests pollute the database. Next a `Customer`
    is added to the database by calling the `save` method on the `CustomerRepository`.
    The resulting `Customer` instance is validated to have an ID and the `name` and
    `email` attributes. Finally, the `Customer` instance is retrieved again and compared
    to be the same.


    Another test you could add is the `findAll` method. When inserting two records,
    calling `findAll` should result in two records being retrieved (Listing [6-65](#464036_2_En_6_Chapter.xhtml#PC66)).


    ```

    @Test

    void findAllCustomers() {

    assertThat(repository.findAll()).isEmpty();

    repository.save(new Customer("T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer("T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(2);

    }

    Listing 6-65

    Find All Customers Test: MongoDB

    ```


    Of course, there could be more assertions, but saving the data is already verified
    in the other test method.


    When running the test, they should all succeed (Figure [6-5](#464036_2_En_6_Chapter.xhtml#Fig5)),
    and the output should show the download and start of the embedded MongoDB.


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Fig5_HTML.jpg)


    A screenshot of the run window with two panes. The left pane lists the files under
    the customer repository test. The right panel reads a set of program logs in Spring
    Boot that starts the test with Java, bootstraps the data, and lists the downloads
    and start of the embedded Mongo D B.


    Figure 6-5


    Test output with Flapdoodle


    ### Test MongoDB Code with Testcontainers


    Another option is to use Testcontainers. Testcontainers uses Docker to bootstrap
    a Docker container for your given technology. In this case, we could use a MongoDB
    Docker image to boot a real MongoDB instance and use that in our tests. This also
    you the opportunity to test your database migration scripts (when in use). This
    is also useful when you are combining different technologies such as SQL and MongoDB
    because you can use Testcontainers to bootstrap both.


    To use Testcontainers, in this case for MongoDB, we need to add the appropriate
    dependencies (see Listing [6-66](#464036_2_En_6_Chapter.xhtml#PC67))


    ```

    org.springframework.boot

    spring-boot-testcontainers


    org.testcontainers

    mongodb

    test


    org.testcontainers

    junit-jupiter

    test


    Listing 6-66

    Testcontainers MongoDB Dependencies

    ```


    Next create `CustomerRepositoryTest` (Listing [6-67](#464036_2_En_6_Chapter.xhtml#PC68)).


    ```

    @Testcontainers

    class CustomerRepositoryTest {

    @Container

    @ServiceConnection

    static MongoDBContainer mongodb = new MongoDBContainer("mongo:6.0");

    @Autowired

    private CustomerRepository repository;

    @BeforeEach

    public void cleanUp() {

    repository.deleteAll();

    }

    }

    Listing 6-67

    MongoDB-Based Test Using Testcontainers for the CustomerRepository

    ```


    `@DataMongoTest` executes the test by a special JUnit extension (`SpringExtension`)
    to bootstrap the Spring Test Context framework. Now to register the special JUnit
    extension for Testcontainers, the `@Testcontainers` annotation has been added.
    This extension finds fields annotated with `@Container` and will bootstrap the
    given container. For this test, that is a `MongoDBContainer`, which we instruct
    to use a MongoDB 6.0 container. Testcontainers will take care of the download
    of this container and start an instance and will stop it after the test.


    As the container for each test will start with a different URL, we need to tell
    this to our Spring Boot application. For this we can use the `@ServiceConnection`
    annotation. This will pass the required and needed properties to the container
    automatically. See also Recipe 2-3 for more information on this.


    ## Access Data with R2DBC


    Most Java developers will know, or at least have heard of, the JDBC API (see the
    beginning of this chapter). JDBC, however, is blocking by nature and will not
    do well in an environment with reactive programming. For reactive programming
    and SQL databases, there is R2DBC. This is a low-level reactive API (or rather
    SPI) developed by the community. Several database already have a driver implementation
    based on this SPI, such as (but not limited to) PostgreSQL, Oracle, MySQL, and
    H2.


    ### Problem


    You have a reactive application but are still using a relational database. Using
    JDBC isn’t an option as that is blocking in nature. Use R2DBC to have a reactive
    way to access your database.


    ### Solution


    Spring Boot will (as with JDBC) detect the presence of R2DBC and/or Spring Data
    R2DBC, and the properties in the `spring.r2dbc` namespace will connect to the
    database.'
  raw: '#### Test Mongo Repositories


    When testing MongoDB code, a running Mongo instance is needed. For testing an
    embedded MongoDB is often used. Spring Boot makes it easy to write tests for MongoDB,
    using `@DataMongoTest`. Spring Boot will create a minimal application with only
    the MongoDB-related beans and start an embedded MongoDB (if detected).


    Let’s write a test for `CustomerRepository` and use an embedded MongoDB. First
    add the embedded MongoDB as a test dependency (Listing [6-61](#464036_2_En_6_Chapter.xhtml#PC62)).


    ```

    de.flapdoodle.embed

    de.flapdoodle.embed.mongo.spring3x

    4.12.0

    test


    Listing 6-61

    Flapdoodle Embedded Mongo Spring Boot Starter Dependency

    ```


    To use it, we also need to specify `de.flapdoodle.mongodb.embedded.version`, which
    contains the version of MongoDB we are using (Listing [6-62](#464036_2_En_6_Chapter.xhtml#PC63)).
    In our case, this is the 6.0.5 version (the same as the Docker container version).
    This together with the starter (Listing [6-61](#464036_2_En_6_Chapter.xhtml#PC62))
    will automatically download an embedded MongoDB version and start it, ready to
    use for testing.


    ```

    de.flapdoodle.mongodb.embedded.version=6.0.5

    Listing 6-62

    Flapdoodle application.properties

    ```


    Next create `CustomerRepositoryTest` (Listing [6-63](#464036_2_En_6_Chapter.xhtml#PC64)).


    ```

    @DataMongoTest

    class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @BeforeEach

    public void cleanUp() {

    repository.deleteAll();

    }

    }

    Listing 6-63

    MongoDB-Based Test for the CustomerRepository

    ```


    The `@DataMongoTest` annotation executes the test with a special JUnit Extension
    (`SpringExtention`) to bootstrap the Spring Test Context framework. The `@DataMongoTest`
    annotation will replace the preconfigured MongoDB with an embedded one (if on
    the classpath). It will also bootstrap the MongoDB components and when detected
    Spring Data Mongo repositories.


    After each test, we want to make sure that the embedded MongoDB doesn’t contain
    any data. This can be achieved by adding an `@BeforeEach` annotated method and
    calling `deleteAll` on the repository. This method will be called before each
    executed test method.


    Now write a test that tests if records get inserted correctly (Listing [6-64](#464036_2_En_6_Chapter.xhtml#PC65)).


    ```

    @Test

    void insertNewCustomer() {

    assertThat(repository.findAll()).isEmpty();

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.id()).isNotNull();

    assertThat(customer.name()).isEqualTo("T. Testing");

    assertThat(customer.email()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.id()))

    .contains( customer);

    }

    Listing 6-64

    Insert New Customer Test: MongoDB

    ```


    This test first asserts that the database is empty, which is not really required
    but can be useful to detect if other tests pollute the database. Next a `Customer`
    is added to the database by calling the `save` method on the `CustomerRepository`.
    The resulting `Customer` instance is validated to have an ID and the `name` and
    `email` attributes. Finally, the `Customer` instance is retrieved again and compared
    to be the same.


    Another test you could add is the `findAll` method. When inserting two records,
    calling `findAll` should result in two records being retrieved (Listing [6-65](#464036_2_En_6_Chapter.xhtml#PC66)).


    ```

    @Test

    void findAllCustomers() {

    assertThat(repository.findAll()).isEmpty();

    repository.save(new Customer("T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer("T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(2);

    }

    Listing 6-65

    Find All Customers Test: MongoDB

    ```


    Of course, there could be more assertions, but saving the data is already verified
    in the other test method.


    When running the test, they should all succeed (Figure [6-5](#464036_2_En_6_Chapter.xhtml#Fig5)),
    and the output should show the download and start of the embedded MongoDB.


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Fig5_HTML.jpg)


    A screenshot of the run window with two panes. The left pane lists the files under
    the customer repository test. The right panel reads a set of program logs in Spring
    Boot that starts the test with Java, bootstraps the data, and lists the downloads
    and start of the embedded Mongo D B.


    Figure 6-5


    Test output with Flapdoodle


    #### Test MongoDB Code with Testcontainers


    Another option is to use Testcontainers. Testcontainers uses Docker to bootstrap
    a Docker container for your given technology. In this case, we could use a MongoDB
    Docker image to boot a real MongoDB instance and use that in our tests. This also
    you the opportunity to test your database migration scripts (when in use). This
    is also useful when you are combining different technologies such as SQL and MongoDB
    because you can use Testcontainers to bootstrap both.


    To use Testcontainers, in this case for MongoDB, we need to add the appropriate
    dependencies (see Listing [6-66](#464036_2_En_6_Chapter.xhtml#PC67))


    ```

    org.springframework.boot

    spring-boot-testcontainers


    org.testcontainers

    mongodb

    test


    org.testcontainers

    junit-jupiter

    test


    Listing 6-66

    Testcontainers MongoDB Dependencies

    ```


    Next create `CustomerRepositoryTest` (Listing [6-67](#464036_2_En_6_Chapter.xhtml#PC68)).


    ```

    @Testcontainers

    class CustomerRepositoryTest {

    @Container

    @ServiceConnection

    static MongoDBContainer mongodb = new MongoDBContainer("mongo:6.0");

    @Autowired

    private CustomerRepository repository;

    @BeforeEach

    public void cleanUp() {

    repository.deleteAll();

    }

    }

    Listing 6-67

    MongoDB-Based Test Using Testcontainers for the CustomerRepository

    ```


    `@DataMongoTest` executes the test by a special JUnit extension (`SpringExtension`)
    to bootstrap the Spring Test Context framework. Now to register the special JUnit
    extension for Testcontainers, the `@Testcontainers` annotation has been added.
    This extension finds fields annotated with `@Container` and will bootstrap the
    given container. For this test, that is a `MongoDBContainer`, which we instruct
    to use a MongoDB 6.0 container. Testcontainers will take care of the download
    of this container and start an instance and will stop it after the test.


    As the container for each test will start with a different URL, we need to tell
    this to our Spring Boot application. For this we can use the `@ServiceConnection`
    annotation. This will pass the required and needed properties to the container
    automatically. See also Recipe 2-3 for more information on this.


    ## 6-9\. Access Data with R2DBC


    Most Java developers will know, or at least have heard of, the JDBC API (see the
    beginning of this chapter). JDBC, however, is blocking by nature and will not
    do well in an environment with reactive programming. For reactive programming
    and SQL databases, there is R2DBC. This is a low-level reactive API (or rather
    SPI) developed by the community. Several database already have a driver implementation
    based on this SPI, such as (but not limited to) PostgreSQL, Oracle, MySQL, and
    H2.


    ### Problem


    You have a reactive application but are still using a relational database. Using
    JDBC isn’t an option as that is blocking in nature. Use R2DBC to have a reactive
    way to access your database.


    ### Solution


    Spring Boot will (as with JDBC) detect the presence of R2DBC and/or Spring Data
    R2DBC, and the properties in the `spring.r2dbc` namespace will connect to the
    database.'
  trans: '

    #### 测试 Mongo 仓库


    在测试 MongoDB 代码时，需要一个正在运行的 Mongo 实例。通常使用嵌入式 MongoDB 进行测试。Spring Boot 通过 `@DataMongoTest`
    可以轻松编写 MongoDB 测试。Spring Boot 将创建一个仅包含 MongoDB 相关 Bean 的最小化应用程序，并启动一个嵌入式 MongoDB（如果检测到）。


    让我们为 `CustomerRepository` 编写一个测试，并使用嵌入式 MongoDB。首先，将嵌入式 MongoDB 添加为测试依赖项（清单 6-61）。


    ```

    de.flapdoodle.embed

    de.flapdoodle.embed.mongo.spring3x

    4.12.0

    test


    清单 6-61

    Flapdoodle 嵌入式 Mongo Spring Boot Starter 依赖项

    ```


    要使用它，我们还需要指定 `de.flapdoodle.mongodb.embedded.version`，其中包含我们正在使用的 MongoDB 版本（清单
    6-62）。在我们的例子中，版本是 6.0.5（与 Docker 容器版本相同）。这与 Starter（清单 6-61）一起将自动下载一个嵌入式 MongoDB
    版本并启动它，准备好用于测试。


    ```

    de.flapdoodle.mongodb.embedded.version=6.0.5

    清单 6-62

    Flapdoodle application.properties

    ```


    接下来创建 `CustomerRepositoryTest`（清单 6-63）。


    ```

    @DataMongoTest

    class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @BeforeEach

    public void cleanUp() {

    repository.deleteAll();

    }

    }

    清单 6-63

    基于 MongoDB 的 CustomerRepository 测试

    ```


    `@DataMongoTest` 注解通过一个特殊的 JUnit 扩展（`SpringExtension`）执行测试，以引导 Spring 测试上下文框架。`@DataMongoTest`
    注解会将预配置的 MongoDB 替换为嵌入式 MongoDB（如果在类路径上）。它还会引导 MongoDB 组件，并在检测到时引导 Spring Data
    Mongo 仓库。


    每次测试后，我们希望确保嵌入式 MongoDB 不包含任何数据。这可以通过添加一个带有 `@BeforeEach` 注解的方法并在仓库上调用 `deleteAll`
    来实现。该方法将在每个执行的测试方法之前被调用。


    现在编写一个测试，测试记录是否正确插入（清单 6-64）。


    ```

    @Test

    void insertNewCustomer() {

    assertThat(repository.findAll()).isEmpty();

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.id()).isNotNull();

    assertThat(customer.name()).isEqualTo("T. Testing");

    assertThat(customer.email()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.id()))

    .contains( customer);

    }

    清单 6-64

    插入新客户测试：MongoDB

    ```


    此测试首先断言数据库为空，这并非必需，但有助于检测其他测试是否污染了数据库。接下来，通过在 `CustomerRepository` 上调用 `save`
    方法，将一个 `Customer` 添加到数据库。验证生成的 `Customer` 实例具有 ID 以及 `name` 和 `email` 属性。最后，再次检索
    `Customer` 实例并进行比较，以确保它们是同一个。


    你可以添加的另一个测试是 `findAll` 方法。当插入两条记录时，调用 `findAll` 应检索到两条记录（清单 6-65）。


    ```

    @Test

    void findAllCustomers() {

    assertThat(repository.findAll()).isEmpty();

    repository.save(new Customer("T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer("T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(2);

    }

    清单 6-65

    查找所有客户测试：MongoDB

    ```


    当然，还可以有更多断言，但保存数据的操作已在另一个测试方法中得到验证。


    运行测试时，它们应该全部通过（图 6-5），并且输出应显示嵌入式 MongoDB 的下载和启动。


    ![](img/464036_2_En_6_Fig5_HTML.jpg)


    运行窗口的截图，包含两个窗格。左窗格列出了客户仓库测试下的文件。右窗格显示了一组 Spring Boot 中的程序日志，这些日志使用 Java 启动测试，引导数据，并列出嵌入式
    MongoDB 的下载和启动。


    图 6-5


    使用 Flapdoodle 的测试输出


    #### 使用 Testcontainers 测试 MongoDB 代码


    另一种选择是使用 Testcontainers。Testcontainers 使用 Docker 为你的特定技术引导一个 Docker 容器。在这种情况下，我们可以使用
    MongoDB Docker 镜像来启动一个真实的 MongoDB 实例，并在测试中使用它。这也为你提供了测试数据库迁移脚本（如果使用）的机会。当你结合使用
    SQL 和 MongoDB 等不同技术时，这也很有用，因为你可以使用 Testcontainers 同时引导两者。


    要使用 Testcontainers（此处用于 MongoDB），我们需要添加适当的依赖项（参见清单 6-66）。


    ```

    org.springframework.boot

    spring-boot-testcontainers


    org.testcontainers

    mongodb

    test


    org.testcontainers

    junit-jupiter

    test


    清单 6-66

    Testcontainers MongoDB 依赖项

    ```


    接下来创建 `CustomerRepositoryTest`（清单 6-67）。


    ```

    @Testcontainers

    class CustomerRepositoryTest {

    @Container

    @ServiceConnection

    static MongoDBContainer mongodb = new MongoDBContainer("mongo:6.0");

    @Autowired

    private CustomerRepository repository;

    @BeforeEach

    public void cleanUp() {

    repository.deleteAll();

    }

    }

    清单 6-67

    使用 Testcontainers 的基于 MongoDB 的 CustomerRepository 测试

    ```


    `@DataMongoTest` 通过一个特殊的 JUnit 扩展（`SpringExtension`）执行测试，以引导 Spring 测试上下文框架。现在，为了注册
    Testcontainers 的特殊 JUnit 扩展，添加了 `@Testcontainers` 注解。此扩展会查找带有 `@Container` 注解的字段，并引导给定的容器。对于此测试，它是一个
    `MongoDBContainer`，我们指示它使用 MongoDB 6.0 容器。Testcontainers 将负责下载此容器并启动一个实例，并在测试后将其停止。


    由于每次测试的容器都会以不同的 URL 启动，我们需要将此信息告知我们的 Spring Boot 应用程序。为此，我们可以使用 `@ServiceConnection`
    注解。这将自动将所需和必要的属性传递给容器。有关此内容的更多信息，请参见配方 2-3。


    ## 6-9\. 使用 R2DBC 访问数据


    大多数 Java 开发人员都知道，或者至少听说过 JDBC API（参见本章开头）。然而，JDBC 本质上是阻塞的，在响应式编程环境中表现不佳。对于响应式编程和
    SQL 数据库，有 R2DBC。这是由社区开发的一个底层响应式 API（或者更确切地说是 SPI）。多个数据库已经拥有基于此 SPI 的驱动程序实现，例如（但不限于）PostgreSQL、Oracle、MySQL
    和 H2。


    ### 问题


    你有一个响应式应用程序，但仍在使用关系型数据库。使用 JDBC 不是一个选项，因为它本质上是阻塞的。使用 R2DBC 以响应式方式访问你的数据库。


    ### 解决方案


    Spring Boot 会（与 JDBC 一样）检测 R2DBC 和/或 Spring Data R2DBC 的存在，并且 `spring.r2dbc` 命名空间中的属性将用于连接到数据库。

