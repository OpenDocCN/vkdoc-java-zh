    ## 2-7\. 使用 Spring Boot Devtools 加速开发


    ### 问题


    你希望在开发过程中获得快速反馈，而不必重新构建和重启应用程序。


    ### 解决方案


    你可以使用 Spring Boot Devtools。Devtools 允许检测类路径更改，当检测到更改时，它将重启应用程序。这种重启比冷启动快得多。它还会将某些属性设置为在开发期间有意义的默认值（例如，禁用
    Thymeleaf 模板的缓存，在错误响应中包含完整的错误详细信息）。表 2-6 列出了 Spring Boot Devtools 设置的属性及其默认值。如果你想禁用这些默认值，请在
    `application.properties` 中添加 `spring.devtools.add-properties` 并将其值设置为 `false`。


    表 2-6


    Spring Boot Devtools 默认属性


    | 属性 | 值 | 描述 |

    | --- | --- | --- |

    | `server.error.include-binding-errors` | `always` | 显示绑定错误的完整信息。 |

    | `server.error.include-message` | `always` | 在错误响应中包含自定义错误消息。 |

    | `server.error.include-stacktrace` | `always` | 在错误响应中显示完整的堆栈跟踪。 |

    | `server.servlet.jsp.init-parameters.development` | `true` | JSP 开发参数，允许重新加载。
    |

    | `server.servlet.session.persistent` | `true` | 在重启期间持久化会话信息。 |

    | `spring.docker.compose.readiness.wait` | `only-if-started` | 等待 Docker 容器准备就绪。
    |

    | `spring.freemarker.cache` | `false` | 禁用 Freemarker 模板缓存。 |

    | `spring.graphql.graphiql.enabled` | `true` | 启用 GraphiQL UI。 |

    | `spring.groovy.template.cache` | `false` | 禁用 Groovy 模板缓存。 |

    | `spring.h2-console.enabled` | `true` | 启用 H2 控制台（如果可用）。 |

    | `spring.mustache.servlet.cache` | `false` | 禁用 Mustache 模板缓存。 |

    | `spring.mvc.log-resolved-exception` | `true` | 记录异常。 |

    | `spring.reactor.netty.shutdown-quiet-period` | `0s` | 立即关闭 Netty，而不是等待。 |

    | `spring.template.provider.cache` | `false` | 禁用模板缓存。 |

    | `spring.thymeleaf.cache` | `false` | 禁用 Thymeleaf 模板缓存。 |

    | `spring.web.resource.cache.period` | `0s` | 禁用静态资源缓存。 |

    | `spring.web.resource.chain.cache` | `0s` | 禁用静态资源缓存。 |

    '
- fmt: '### How It Works


    To enable and reload Spring Boot Devtools, you would first need a dependency on
    the `spring-boot-devtools` module. See Listing [2-38](#464036_2_En_2_Chapter.xhtml#PC44).


    ```

    org.springframework.boot

    spring-boot-devtools

    true


    Listing 2-38

    Devtools Dependency

    ```


    Notice how the dependency is marked as optional. This means to not include it
    in the runnable artifact that is created by Spring Boot.


    Now let’s write a simple controller that lists the tables in a PostgreSQL database.
    It will directly access the database through a `JdbcTemplate` and fire a query
    to obtain the `tablename` from the `pg_tables` table in PostgreSQL. Finally, it
    will turn this into a response.


    First we need some dependencies to make this work. In addition to the dependencies
    for the controller and JDBC classes, we also use the Docker Compose support to
    bootstrap a PostgreSQL container (see recipe 2-6).


    ```

    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-jdbc


    org.springframework.boot

    spring-boot-docker-compose


    ```


    Next comes the controller, shown here:


    ```

    package com.apress.springboot3recipes;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import java.util.List;

    @RestController

    public class ShowTablesController {

    private final JdbcTemplate jdbc;

    public ShowTablesController(JdbcTemplate jdbc) {

    this.jdbc = jdbc;

    }

    @GetMapping("/show-tables")

    public List showTables() {

    var sql = "select tablename from pg_catalog.pg_tables";

    return jdbc.queryForList(sql, String.class);

    }

    }

    ```


    This will use a `JdbcTemplate` to retrieve the `tablename` from the PostgreSQL
    `pg_tables` table and return it as a response. To launch, we need a basic Spring
    Boot application.


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class DevtoolsApplication {

    public static void main(String[] args) {

    SpringApplication.run(DevtoolsApplication.class, args);

    }

    }

    ```


    With all of this in place, we can launch the application, either in our IDE or
    through the command line using Maven or Gradle. Here we will use the IDE. In Figure
