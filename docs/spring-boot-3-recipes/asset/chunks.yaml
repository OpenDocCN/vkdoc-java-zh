    #### 测试基于 RestTemplate 或 RestClient 的代码


    为了使用`RestTemplate`或`RestClient`测试客户端代码，Spring Test框架提供了`MockRestServiceServer`。`MockRestServiceServer`可用于针对特定请求（基于URL、标头、内容等）返回响应。


    Spring Boot通过提供`@RestClientTest`注解使这变得更容易。这将设置`MockRestServiceServer`，使其可以被自动注入，并同时配置被测类。参见清单[3-60](#464036_2_En_3_Chapter.xhtml#PC65)。


    ```

    package com.apress.springboot3recipes.library.rest;

    import org.junit.jupiter.api.Assertions;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.client.RestClientTest;

    import org.springframework.http.HttpStatusCode;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.client.MockRestServiceServer;

    import static org.springframework.test.web.client.match.MockRestRequestMatchers.requestTo;

    import static org.springframework.test.web.client.response.MockRestResponseCreators.withSuccess;

    @RestClientTest(EnrichedBookController.class)

    class EnrichedBookControllerTest {

    private static final String BOOK_JSON = """

    {

    "authors": [

    "T. Author"

    ],

    "isbn": "123456789",

    "title": "The Client Test"

    }

    """;

    private static final String OL_JSON = """

    "{ "publish_date": "2024"}"

    """;

    @Autowired

    private MockRestServiceServer mockServer;

    @Autowired

    private EnrichedBookController controller;

    @Test

    void enrichBook() {

    mockServer

    .expect(requestTo("http://localhost:8080/books/123456789"))

    .andRespond(withSuccess(BOOK_JSON, MediaType.APPLICATION_JSON));

    mockServer

    .expect(requestTo("https://openlibrary.org/isbn/123456789.json"))

    .andRespond(withSuccess(OL_JSON, MediaType.APPLICATION_JSON));

    var response = controller.get("123456789");

    var enrichedBook = response.getBody();

    Assertions.assertNotNull(enrichedBook);

    Assertions.assertEquals(HttpStatusCode.valueOf(200), response.getStatusCode());

    Assertions.assertEquals(enrichedBook.published(), "2024");

    mockServer.verify();

    }

    }

    清单 3-60

    Rest 客户端设置测试

    ```


    该测试使用`@RestClientTest`来设置服务器并准备`EnrichedBookController`进行测试。`MockRestServiceServer`和`EnrichedBookController`都被注入，以便在测试中可用。


    在实际的测试方法中，我们首先设置`MockRestServiceServer`的行为。这里我们只匹配URL，并设置它们返回特定的JSON响应以及HTTP 200
    OK状态（更多可能性请参见表[3-19](#464036_2_En_3_Chapter.xhtml#Tab19)）。测试运行后，我们在`MockRestServiceServer`上调用`verify()`来验证我们记录的请求是否也被发出，这表明我们的客户端按预期工作。


    表 3-19


    `MockRestRequestMatchers`设置方法


    | `anything()` | 匹配任何请求。 |

    | --- | --- |

    | `content()` | 设置内容匹配，例如`Content-Type`或请求的实际主体。 |

    | `header()` | 匹配具有给定标头的请求，可以是值或Hamcrest匹配器。 |

    | `headerDoesNotExist` | 匹配给定标头不存在的请求。 |

    | `headerList()` | 匹配具有给定标头的请求，可以是值或Hamcrest匹配器。 |

    | `jsonPath` | 使用`JsonPath`设置请求主体匹配。 |

    | `method` | 匹配请求的`HttpMethod`。 |

    | `queryParam` | 匹配请求参数，可以是值或Hamcrest匹配器。 |

    | `queryParamList` | 匹配具有给定值或Hamcrest匹配器的请求参数。 |

    | `requestTo` | 使用预期的URI匹配请求（可以是`String`或`URI`）。 |

    | `requestToUriTemplate` | 使用URI模板匹配请求。 |

    | `xpath` | 使用XPath设置请求主体匹配。 |'
