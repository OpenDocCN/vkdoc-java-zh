    = AutoConfigureTestDatabase.Replace.NONE)` annotation prevents this replacing
    as we want to provide an actual `DataSource`. As we want to create an instance
    of our repository, the `@Import(JdbcCustomerRepository.class)` annotation is added.


    Now to register the special JUnit extension for Testcontainers, the `@Testcontainers`
    annotation has been added. This extension finds fields annotated with `@Container`
    and will bootstrap the given container. For this test, that is a `PostgreSQLContainer`,
    which we instruct to use a PostgreSQL 15 Docker container. Testcontainers will
    take care of the download of this container and start an instance and then stop
    it after the test.


    When the test runs, the provided Flyway script will automatically execute and
    create the schema and populate it with some data (as that was in our Flyway script;
    see Listing [6-8](#464036_2_En_6_Chapter.xhtml#PC8) in the previous recipe).


    As the container for each test will start with a different URL, we need to tell
    this to our Spring Boot application. The created URL is automatically registered
    with the application through the use of the `@ServiceConnection` annotation. See
    also Recipe 2-3 for more information about this.


    With this we can now write some tests to validate our behavior (Listing [6-31](#464036_2_En_6_Chapter.xhtml#PC31)).


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.id()).isGreaterThan(0);

    assertThat(customer.name()).isEqualTo("T. Testing");

    assertThat(customer.email()).isEqualTo("t.testing@test123.tst");

    assertThat(repository.findById(customer.id())).hasValue(customer);

    }

    @Test

    void findAllCustomers() {

    int count = repository.findAll().size();

    repository.save(new Customer("T. Testing1", "t.testing@test123.tst"));

    repository.save(new Customer("T. Testing2", "t.testing@test123.tst"));

    assertThat(repository.findAll()).hasSize(count + 2);

    }

