    计算器应用程序输出——使用参数覆盖属性


    #### 从不同的配置文件加载属性


    如果你使用的文件不是 `application.properties`，或者你有一些组件带有你想要加载的内嵌文件，你可以在带有 `@SpringBootApplication`
    注解的类上使用额外的 `@PropertySource` 注解来加载该额外文件。参见代码清单 2-12。


    ```

    @PropertySource("classpath:your-external.properties")

    @SpringBootApplication

    public class MyApplication { ... }

    代码清单 2-12

    带有 @PropertySource 的应用程序类

    ```


    `@PropertySource` 注解允许你添加额外的属性文件，以便在启动时加载。你还可以通过指定 `ignoreResourceNotFound` 属性并将其设置为
    `true`（默认值为 `false`）来定义文件未找到时的行为。


    虽然添加额外的 `@PropertySource` 注解是可行的，但它并不依赖 Spring Boot 来加载，因此不会得到相同的处理方式。你将无法为另一个配置文件加载不同的配置。不过，除了使用
    `@PropertySource` 注解，你还可以通过命令行参数指示 Spring Boot 加载额外的属性文件（参见表 2-1）。


    表 2-1


    配置参数


    | 参数 | 描述 |

    | --- | --- |

    | `spring.config.name` | 要加载的文件名的逗号分隔字符串；默认值为 `application`。 |

    | `spring.config.location` | 要考虑从中加载属性文件的资源位置（或文件）的逗号分隔字符串；默认值为 `classpath:/,classpath:/config/,file:./,file:./config/`。
    |

    | `spring.config.additional-location` | 要考虑从中加载属性文件的额外资源位置（或文件）的逗号分隔字符串；默认值为空。
    |


    ![](img/464036_2_En_2_Figf_HTML.gif)一个信息图标，圆圈内有一个字母 i。当使用 `spring.config.location`
    或 `spring.config.additional-location` 并指定文件位置时，该文件将按原样使用，而不会加载特定于配置文件的文件。当使用目录时，则会加载特定于配置文件的文件。


    使用 `--spring.config.name=your-external` 就足以加载 `your-external.properties` 文件；然而，这会破坏
    `application.properties` 的加载，因此最好使用 `--spring.config.name=application,your-external`。这样，所有位置都会搜索
    `application.properties` 和 `your-external.properties`，并且特定于配置文件的版本也会被考虑在内。


    ## 2-3\. 配置测试


    ### 问题


    你想为 Spring Boot 应用程序的某个组件或部分编写测试。


    ### 解决方案


    Spring Boot 扩展了 Spring 测试框架的功能范围。它增加了对 Bean 的模拟和监视（通过 Mockito）的支持，并为 Web 测试提供了自动配置。它还引入了简单的方法来测试应用程序的切片（例如，通过使用
    `@WebMvCTest` 或 `@JdbcTest`），或者使用 `@SpringBootTest` 编写完整的集成测试。


    ### 工作原理


    Spring Boot 也将自动配置扩展到了测试框架的部分。它与 Mockito 集成，以便于对 Bean 进行模拟（或监视）。它还提供了基于 Web 的测试的自动配置，可以使用
    Spring MockMvc 测试框架或基于 WebDriver 的测试。


    #### 编写单元测试


    首先，让我们为计算器的一个组件 `MultiplicationTest` 编写一个简单的单元测试，该测试将测试 `Multiplication` 类。参见代码清单
    2-13。


    ```

    package com.apress.springboot3recipes.calculator.operation;

    import org.junit.jupiter.api.Test;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    import static org.junit.jupiter.api.Assertions.assertFalse;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    public class MultiplicationTest {

    private final Multiplication operation = new Multiplication();

    @Test

    public void shouldMatchSign() {

    assertTrue(operation.handles(''*''));

    assertFalse(operation.handles(''/''));

    }

    @Test

    public void shouldCorrectlyApplyFormula() {

    assertEquals(4, operation.apply(2, 2));

    assertEquals(120, operation.apply(12, 10));

    }

    }

    代码清单 2-13

    基本单元测试

    ```


    这是一个基本的单元测试。一旦实例化 `Multiplication`，我们就调用它的方法，最后验证结果。第一个测试将测试它是否真的对 `*` 运算符有反应，而不是其他运算符。第二个测试将测试实际的乘法逻辑。要使一个方法成为测试方法，你需要用
    `@Test` 注解它。

