    虽然我们拥有的简单 Dockerfile 可以工作，但从 Docker 的角度来看，它远非高效。最好包含一些可以重复使用的额外层。在构建 Spring Boot
    可运行 JAR 时，它已经会在 JAR 的结构和文件放置中包含一些层。我们可以利用这一点来创建更高效的容器。


    Spring Boot 支持提取这些层；我们可以通过使用一些参数启动应用来实现这一点。使用 `java -Djarmode=layertools -jar
    app.jar extract`，它会将应用的内容提取到单独的目录中，然后可以使用这些目录在容器中创建额外的层。


    这样，就可以创建一个多阶段 Dockerfile，它首先提取所需的信息，最后构建我们需要的容器镜像。这可以使我们容器中的层可重用。可重用的层将减少构建时间和镜像使用的总大小。请参见代码清单
    10-13。


    ```

