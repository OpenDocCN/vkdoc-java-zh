  trans: '

    ### 工作原理


    当找不到显式的安全配置时，Spring Boot 会启用默认安全设置。如果找到一个或多个配置，则会使用它们来配置安全性。安全配置是指带有 `@EnableWebSecurity`
    和/或 `@EnableMethodSecurity` 注解的类。包含 `@EnableWebSecurity` 注解会自动引入 `HttpSecurityConfiguration`
    类，该类包含默认安全设置并允许自定义。


    为了帮助您更好地理解各种独立的登录机制，我们首先讨论默认的安全配置。请注意，如果您包含了 `@EnableWebSecurity`，所介绍的登录服务会自动注册。


    在启用身份验证功能之前，您需要先启用基本的 Spring Security 要求。您至少需要配置异常处理和安全上下文集成。请参见清单 5-7。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.securityContext(Customizer.withDefaults());

    http.exceptionHandling(Customizer.withDefaults());

    return http.build();

    }

    }

    清单 5-7

    安全上下文集成与异常处理

    ```


    没有这些基础，Spring Security 在用户登录后将无法存储用户信息，也无法对安全相关的异常进行正确的异常转换（异常会直接向上抛出，这可能会向外界暴露一些内部信息）。您可能还需要启用
    Servlet API 集成，以便在视图中使用 `HttpServletRequest` 的方法进行检查。请参见清单 5-8。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.servletApi(Customizer.withDefaults());

    return http.build();

    }

    }

    清单 5-8

    Servlet API 默认设置

    ```


    #### HTTP 基本认证


    HTTP 基本认证支持可以通过 `httpBasic()` 方法进行配置。当需要 HTTP 基本认证时，浏览器通常会显示一个登录对话框或特定于浏览器的登录页面供用户登录。请参见清单
    5-9。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.httpBasic(Customizer.withDefaults());

    return http.build();

    }

    }

    清单 5-9

    使用默认设置启用基本认证

    ```


    #### 基于表单的登录


    基于表单的登录服务会渲染一个包含登录表单的网页，供用户输入登录信息并处理登录表单的提交。它通过 `formLogin` 方法进行配置。请参见清单 5-10。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin(Customizer.withDefaults());

    return http.build();

    }

    }

    清单 5-10

    启用基于表单的登录

    ```


    默认情况下，Spring Security 会自动创建一个登录页面，并将其映射到 URL `/login`。因此，您可以在应用程序中添加一个链接（例如，在配方
    3-3 的 `index.html` 中），指向此 URL 进行登录：


    ```

    登录

    ```


    如果您不喜欢默认的登录页面，可以提供自己的自定义登录页面。例如，您可以在 `src/main/resources/templates` 中创建 `login.html`
    文件（使用 Thymeleaf 时）。请参见清单 5-11。


    ```


    登录


    body {

    background-color: #DADADA;

    }

    body > .grid {

    height: 100%;

    }

    .column {

    max-width: 450px;

    }


    登录您的账户


    登录


    清单 5-11

    自定义登录页面

    ```


    为了让 Spring Security 在请求登录时显示您的自定义登录页面，您必须在 `loginPage` 配置方法中指定其 URL（参见清单 5-12）。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin( (login) ->

    login.loginPage("/login.html")

    return http.build();

    }

    }

    清单 5-12

    自定义登录页面配置

    ```


    最后，添加一个视图解析器，将 `/login` 映射到 `login.html` 页面。为此，您可以让 `LibrarySecurityConfig` 实现
    `WebMvcConfigurer` 并实现 `addViewControllers` 方法。


    ```

    @Configuration

    public class LibrarySecurityConfig extends WebSecurityConfigurerAdapter

    implements WebMvcConfigurer {

    ...

    public void addViewControllers(ViewControllerRegistry registry) {

    registry.addViewController("/login").setViewName("login");

    }

    }

    ```


    如果当用户请求一个安全 URL 时，Spring Security 显示了登录页面，那么一旦登录成功，用户将被重定向到目标 URL。但是，如果用户直接通过其
    URL 请求登录页面，默认情况下，登录成功后用户将被重定向到上下文路径的根目录（即 `http://localhost:8080/`）。如果您没有在 Web
    部署描述符中定义欢迎页面，您可能希望在登录成功时将用户重定向到一个默认的目标 URL。请参见清单 5-13。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin( (login) ->

    login.loginPage("/login.html")

    .defaultSuccessUrl("/books")

    return http.build();

    }

    }

    清单 5-13

    带有成功 URL 的自定义登录页面配置

    ```


    如果您使用 Spring Security 创建的默认登录页面，那么当登录失败时，Spring Security 会再次渲染登录页面并显示错误消息。但是，如果您指定了自定义登录页面，则必须配置
    `authentication-failure-url` 来指定登录错误时要重定向到的 URL。例如，您可以再次重定向到自定义登录页面，并附带错误请求参数。请参见清单
    5-14。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.formLogin( (login) ->

    login.loginPage("/login.html")

    .defaultSuccessUrl("/books")

    .failureUrl("/login.html?error=true").permitAll());

    return http.build();

    }

    }

    清单 5-14

    带有失败配置的自定义登录页面配置

    ```


    然后，您的登录页面应测试是否存在错误请求参数。如果发生错误，您需要通过访问会话范围属性 `SPRING_SECURITY_LAST_EXCEPTION` 来显示错误消息，该属性存储了当前用户的最后一个异常。请参见清单
    5-15。


    ```


    身份验证失败

    原因：此处显示异常


    清单 5-15

    登录页面显示错误

    ```

    '
- fmt: '#### The Logout Service


    The logout service provides a handler to handle logout requests. It can be configured
    via the `logout()` configuration method. See Listing [5-16](#464036_2_En_5_Chapter.xhtml#PC19).


    ```java

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.logout(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-16

    Default Logout Configuration

    ```


    By default, it’s mapped to the URL `/logout` and will react to POST requests only.
    You can add a small HTML form to your page to log out.


    ```html

    Logout

    ```


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Figd_HTML.gif) An information icon
    with the letter i inside a circle. When using CSRF protection, don’t forget to
    add the CSRF token to the form; otherwise, logout will fail.


    By default, a user will be redirected to the context path’s root when the logout
    succeeds, but sometimes, you may want to direct the user to another URL, which
    you can do by using the `logoutSuccessUrl` configuration method. See Listing [5-17](#464036_2_En_5_Chapter.xhtml#PC21).


    ```java

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.logout( (logout) -> logout.logoutSuccessUrl("/"));

    return http.build();

    }

    }

    Listing 5-17

    Logout Configuration with Success URL

    ```


    After logout, you might notice that when using the browser back button, you will
    still be able to see the previous pages, even if your logout was successful. This
    has to do with the fact that the browser caches the pages. By enabling the security
    headers, with the `headers()` configuration method, the browser will be instructed
    to not cache the page. See Listing [5-18](#464036_2_En_5_Chapter.xhtml#PC22).


    ```java

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.headers(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-18

    Security Headers Configuration

    ```


    In addition to the no-cache headers, this will also disable content-sniffing and
    enable x-frame protection. With this enabled and using the browser back button,
    you will be redirected to the login page again.


    #### Anonymous Login


    The anonymous login service can be configured via the `anonymous()` method in
    Java config, where you can customize the `username` and `authorities` of an anonymous
    user, whose default values are `anonymousUser` and `ROLE_ANONYMOUS`. See Listing
    [5-19](#464036_2_En_5_Chapter.xhtml#PC23).


    ```java

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.anonymous( (anon) ->

    anon.principal("guest").authorities("ROLE_GUEST"));

    return http.build();

    }

    }

    Listing 5-19

    Anonymous Login Configuration

    ```


    #### Remember-Me Support


    Remember-me support can be configured via the `rememberMe()` method in Java config.
    By default, it encodes the username, the password, the remember-me expiration
    time, and a private key as a token, and stores it as a cookie in the user’s browser.
    The next time the user accesses the same web application, this token will be detected
    so that the user can log in automatically. See Listing [5-20](#464036_2_En_5_Chapter.xhtml#PC24).


    ```java

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.rememberMe(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-20

    Remember-Me Configuration

    ```


    However, static remember-me tokens can cause security issues, because they may
    be captured by hackers. Spring Security supports rolling tokens for more advanced
    security needs, but this requires a database to persist the tokens. For details
    about rolling remember-me token deployment, please refer to the Spring Security
    reference documentation.


    ## 5-3\. Authenticate Users


    ### Problem


    When a user attempts to log into your application to access its secure resources,
    you have to authenticate the user’s principal and grant authorities to this user.


    ### Solution


    In Spring Security, authentication is performed by one or more `AuthenticationProvider`s,
    connected as a chain. If any of these providers authenticates a user successfully,
    that user will be able to log into the application. If any provider reports that
    the user is disabled or locked or that the credential is incorrect, or if no provider
    can authenticate the user, then the user will be unable to log into this application.


    Spring Security supports multiple ways of authenticating users and includes built-in
    provider implementations for them. You can easily configure these providers with
    the built-in XML elements. Most common authentication providers authenticate users
    against a user repository storing user details (e.g., in an application’s memory,
    a relational database, or an LDAP repository).


    When storing user details in a repository, you should avoid storing user passwords
    in clear text, because that makes them vulnerable to hackers. Instead, you should
    always store encrypted passwords in your repository. A typical way to encrypt
    passwords is to use a one-way hash function to encode the passwords. When a user
    enters a password to log in, you apply the same hash function to this password
    and compare the result with the one stored in the repository. Spring Security
    supports several algorithms for encoding passwords (including BCrypt and SCrypt)
    and provides built-in password encoders for these algorithms.


    ### How It Works


    Let’s talk about how it works.


    #### Authenticate Users with In-Memory Definitions


    If you have only a few users in your application and you seldom modify their details,
    you can consider defining the user details in Spring Security’s configuration
    file so that they will be loaded into your application’s memory. See Listing [5-21](#464036_2_En_5_Chapter.xhtml#PC25).


    ```java

    @Bean

    public UserDetailsService userDetailsService() {

    var adminUser = User.withDefaultPasswordEncoder()

    .username("admin@books.io").password("secret")

    .authorities("ADMIN","USER").build();

    var normalUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io").password("user")

    .authorities("USER").build();

    var disabledUser = User.withDefaultPasswordEncoder()

    .username("jdoe@books.io").password("unknown")

    .disabled(true)

    .authorities("USER").build();

    return new InMemoryUserDetailsManager(adminUser, normalUser, disabledUser);

    }

    }

    Listing 5-21

    In-Memory UserDetailsService Configuration

    ```


    Using `UserBuild`, obtained through `User.withDefaultPasswordEncoder()`, you can
    construct users with an encrypted password. It will use the Spring Security default
    password encoding (which is by default encoded with BCrypt). For each user, you
    can specify a username, a password, a disabled status, and a set of granted authorities.
    A disabled user cannot log into an application. When you create the users, you
    can use them to create an `InMemoryUserDetailsManager`.'
  raw: '#### The Logout Service


    The logout service provides a handler to handle logout requests. It can be configured
    via the `logout()` configuration method. See Listing [5-16](#464036_2_En_5_Chapter.xhtml#PC19).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.logout(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-16

    Default Logout Configuration

    ```


    By default, it’s mapped to the URL `/logout` and will react to POST requests only.
    You can add a small HTML form to your page to log out.


    ```

    Logout

    ```


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Figd_HTML.gif)An information icon
    with the letter i inside a circle. When using CSRF protection, don’t forget to
    add the CSRF token to the form; otherwise, logout will fail.


    By default, a user will be redirected to the context path’s root when the logout
    succeeds, but sometimes, you may want to direct the user to another URL, which
    you can do by using the `logoutSuccessUrl` configuration method. See Listing [5-17](#464036_2_En_5_Chapter.xhtml#PC21).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.logout( (logout) -> logout.logoutSuccessUrl("/"));

    return http.build();

    }

    }

    Listing 5-17

    Logout Configuration with Success URL

    ```


    After logout, you might notice that when using the browser back button, you will
    still be able to see the previous pages, even if your logout was successful. This
    has to do with the fact that the browser caches the pages. By enabling the security
    headers, with the `headers()` configuration method, the browser will be instructed
    to not cache the page. See Listing [5-18](#464036_2_En_5_Chapter.xhtml#PC22).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.headers(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-18

    Security Headers Configuration

    ```


    In addition to the no-cache headers, this will also disable content-sniffing and
    enable x-frame protection. With this enabled and using the browser back button,
    you will be redirected to the login page again.


    #### Anonymous Login


    The anonymous login service can be configured via the `anonymous()` method in
    Java config, where you can customize the `username` and `authorities` of an anonymous
    user, whose default values are `anonymousUser` and `ROLE_ANONYMOUS`. See Listing
    [5-19](#464036_2_En_5_Chapter.xhtml#PC23).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.anonymous( (anon) ->

    anon.principal("guest").authorities("ROLE_GUEST"));

    return http.build();

    }

    }

    Listing 5-19

    Anonymous Login Configuration

    ```


    #### Remember-Me Support


    Remember-me support can be configured via the `rememberMe()` method in Java config.
    By default, it encodes the username, the password, the remember-me expiration
    time, and a private key as a token, and stores it as a cookie in the user’s browser.
    The next time the user accesses the same web application, this token will be detected
    so that the user can log in automatically. See Listing [5-20](#464036_2_En_5_Chapter.xhtml#PC24).


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.rememberMe(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-20

    Remember-Me Configuration

    ```


    However, static remember-me tokens can cause security issues, because they may
    be captured by hackers. Spring Security supports rolling tokens for more advanced
    security needs, but this requires a database to persist the tokens. For details
    about rolling remember-me token deployment, please refer to the Spring Security
    reference documentation.


    ## 5-3\. Authenticate Users


    ### Problem


    When a user attempts to log into your application to access its secure resources,
    you have to authenticate the user’s principal and grant authorities to this user.


    ### Solution


    In Spring Security, authentication is performed by one or more `AuthenticationProvider`s,
    connected as a chain. If any of these providers authenticates a user successfully,
    that user will be able to log into the application. If any provider reports that
    the user is disabled or locked or that the credential is incorrect, or if no provider
    can authenticate the user, then the user will be unable to log into this application.


    Spring Security supports multiple ways of authenticating users and includes built-in
    provider implementations for them. You can easily configure these providers with
    the built-in XML elements. Most common authentication providers authenticate users
    against a user repository storing user details (e.g., in an application’s memory,
    a relational database, or an LDAP repository).


    When storing user details in a repository, you should avoid storing user passwords
    in clear text, because that makes them vulnerable to hackers. Instead, you should
    always store encrypted passwords in your repository. A typical way to encrypt
    passwords is to use a one-way hash function to encode the passwords. When a user
    enters a password to log in, you apply the same hash function to this password
    and compare the result with the one stored in the repository. Spring Security
    supports several algorithms for encoding passwords (including BCrypt and SCrypt)
    and provides built-in password encoders for these algorithms.


    ### How It Works


    Let’s talk about how it works.


    #### Authenticate Users with In-Memory Definitions


    If you have only a few users in your application and you seldom modify their details,
    you can consider defining the user details in Spring Security’s configuration
    file so that they will be loaded into your application’s memory. See Listing [5-21](#464036_2_En_5_Chapter.xhtml#PC25).


    ```

    @Bean

    public UserDetailsService userDetailsService() {

    var adminUser = User.withDefaultPasswordEncoder()

    .username("admin@books.io").password("secret")

    .authorities("ADMIN","USER").build();

    var normalUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io").password("user")

    .authorities("USER").build();

    var disabledUser = User.withDefaultPasswordEncoder()

    .username("jdoe@books.io").password("unknown")

    .disabled(true)

    .authorities("USER").build();

    return new InMemoryUserDetailsManager(adminUser, normalUser, disabledUser);

    }

    }

    Listing 5-21

    In-Memory UserDetailsService Configuration

    ```


    Using `UserBuild`, obtained through `User.withDefaultPasswordEncoder()`, you can
    construct users with an encrypted password. It will use the Spring Security default
    password encoding (which is by default encoded with BCrypt). For each user, you
    can specify a username, a password, a disabled status, and a set of granted authorities.
    A disabled user cannot log into an application. When you create the users, you
    can use them to create an `InMemoryUserDetailsManager`.'
  trans: '

    #### 注销服务


    注销服务提供了一个用于处理注销请求的处理器。它可以通过 `logout()` 配置方法进行配置。参见清单 5-16。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.logout(Customizer.withDefaults());

    return http.build();

    }

    }

    清单 5-16

    默认注销配置

    ```


    默认情况下，它映射到 URL `/logout`，并且仅响应 POST 请求。你可以在页面中添加一个小的 HTML 表单来执行注销操作。


    ```

    Logout

    ```


    ![](img/464036_2_En_5_Figd_HTML.gif)一个信息图标，圆圈内包含字母 i。当使用 CSRF 保护时，不要忘记将 CSRF 令牌添加到表单中；否则，注销将失败。


    默认情况下，注销成功后，用户会被重定向到上下文路径的根目录，但有时你可能希望将用户引导至另一个 URL，这可以通过使用 `logoutSuccessUrl`
    配置方法来实现。参见清单 5-17。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.logout( (logout) -> logout.logoutSuccessUrl("/"));

    return http.build();

    }

    }

    清单 5-17

    带有成功 URL 的注销配置

    ```


    注销后，你可能会注意到，即使注销成功，使用浏览器后退按钮时，你仍然能够看到之前的页面。这是因为浏览器缓存了这些页面。通过使用 `headers()` 配置方法启用安全标头，可以指示浏览器不要缓存页面。参见清单
    5-18。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.headers(Customizer.withDefaults());

    return http.build();

    }

    }

    清单 5-18

    安全标头配置

    ```


    除了无缓存标头之外，这还会禁用内容嗅探并启用 X-Frame 保护。启用此功能后，使用浏览器后退按钮时，你将被重定向回登录页面。


    #### 匿名登录


    匿名登录服务可以通过 Java 配置中的 `anonymous()` 方法进行配置，你可以在其中自定义匿名用户的 `username` 和 `authorities`，其默认值分别为
    `anonymousUser` 和 `ROLE_ANONYMOUS`。参见清单 5-19。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.anonymous( (anon) ->

    anon.principal("guest").authorities("ROLE_GUEST"));

    return http.build();

    }

    }

    清单 5-19

    匿名登录配置

    ```


    #### 记住我支持


    记住我支持可以通过 Java 配置中的 `rememberMe()` 方法进行配置。默认情况下，它会将用户名、密码、记住我过期时间以及一个私钥编码为一个令牌，并将其作为
    cookie 存储在用户的浏览器中。下次用户访问同一个 Web 应用程序时，该令牌将被检测到，从而使用户能够自动登录。参见清单 5-20。


    ```

    @Configuration

    @EnableWebSecurity

    public class LibrarySecurityConfig {

    @Bean

    public SecurityFilterChain security(HttpSecurity http) throws Exception {

    http.rememberMe(Customizer.withDefaults());

    return http.build();

    }

    }

    清单 5-20

    记住我配置

    ```


    然而，静态的记住我令牌可能会引发安全问题，因为它们可能被黑客捕获。Spring Security 支持滚动令牌以满足更高级的安全需求，但这需要一个数据库来持久化令牌。关于滚动记住我令牌部署的详细信息，请参考
    Spring Security 参考文档。


    ## 5-3\. 用户认证


    ### 问题


    当用户尝试登录你的应用程序以访问其安全资源时，你必须对用户的主体进行认证，并向该用户授予权限。


    ### 解决方案


    在 Spring Security 中，认证由一个或多个 `AuthenticationProvider` 执行，它们以链的形式连接。如果这些提供者中的任何一个成功认证了用户，该用户将能够登录到应用程序。如果任何提供者报告用户被禁用、锁定或凭据不正确，或者没有提供者能够认证该用户，那么该用户将无法登录此应用程序。


    Spring Security 支持多种用户认证方式，并包含了针对这些方式的内置提供者实现。你可以使用内置的 XML 元素轻松配置这些提供者。最常见的认证提供者会针对存储用户详细信息的用户仓库（例如，在应用程序的内存、关系数据库或
    LDAP 仓库中）来认证用户。


    在仓库中存储用户详细信息时，应避免以明文形式存储用户密码，因为这会使它们容易受到黑客攻击。相反，你应该始终在仓库中存储加密后的密码。一种典型的密码加密方式是使用单向哈希函数对密码进行编码。当用户输入密码登录时，你对该密码应用相同的哈希函数，并将结果与仓库中存储的密码进行比较。Spring
    Security 支持多种用于编码密码的算法（包括 BCrypt 和 SCrypt），并为这些算法提供了内置的密码编码器。


    ### 工作原理


    让我们来谈谈它是如何工作的。


    #### 使用内存定义进行用户认证


    如果你的应用程序中只有少量用户，并且很少修改他们的详细信息，你可以考虑在 Spring Security 的配置文件中定义用户详细信息，这样它们将被加载到应用程序的内存中。参见清单
    5-21。


    ```

    @Bean

    public UserDetailsService userDetailsService() {

    var adminUser = User.withDefaultPasswordEncoder()

    .username("admin@books.io").password("secret")

    .authorities("ADMIN","USER").build();

    var normalUser = User.withDefaultPasswordEncoder()

    .username("marten@books.io").password("user")

    .authorities("USER").build();

    var disabledUser = User.withDefaultPasswordEncoder()

    .username("jdoe@books.io").password("unknown")

    .disabled(true)

    .authorities("USER").build();

    return new InMemoryUserDetailsManager(adminUser, normalUser, disabledUser);

    }

    }

    清单 5-21

    内存 UserDetailsService 配置

    ```


    使用通过 `User.withDefaultPasswordEncoder()` 获取的 `UserBuild`，你可以构建带有加密密码的用户。它将使用 Spring
    Security 默认的密码编码方式（默认情况下使用 BCrypt 编码）。对于每个用户，你可以指定用户名、密码、禁用状态以及一组已授予的权限。被禁用的用户无法登录应用程序。创建用户后，你可以使用它们来创建一个
    `InMemoryUserDetailsManager`。

    '
- fmt: '#### Authenticate Users Against a Database


    More typically, user details should be stored in a database for easy maintenance.
    Spring Security has built-in support for querying user details from a database.
    By default, it queries user details, including authorities, with the SQL statements
    in Listing [5-22](#464036_2_En_5_Chapter.xhtml#PC26).


    ```

    SELECT username, password, enabled

    FROM   users

    WHERE  username = ?

    SELECT username, authority

    FROM   authorities

    WHERE  username = ?

    Listing 5-22

    Default Spring Security SQL Queries

    ```


    For Spring Security to query user details with these SQL statements, you have
    to create the corresponding tables in your database. For example, you can create
    them in the database with the SQL statements in Listing [5-23](#464036_2_En_5_Chapter.xhtml#PC27).


    ```

    CREATE TABLE USERS

    (

    USERNAME VARCHAR(50) NOT NULL,

    PASSWORD VARCHAR(50) NOT NULL,

    ENABLED  SMALLINT    NOT NULL,

    PRIMARY KEY (USERNAME)

    );

    CREATE TABLE AUTHORITIES

    (

    USERNAME  VARCHAR(50) NOT NULL,

    AUTHORITY VARCHAR(50) NOT NULL,

    FOREIGN KEY (USERNAME) REFERENCES USERS

    );

    Listing 5-23

    DDL for Default Spring Security Table Structure

    ```


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Fige_HTML.gif)An information icon
    with the letter i inside a circle. Spring Security provides a `users.ddl` file
    in the `spring-security-core` JAR, under the `org.springframework.security.userdetails.jdbc`
    package. You could use this; however, this provided some limitations in the names
    (max length 50) and relations. So, you might be better off using your own script.


    Next, you can input some user details into these tables for testing purposes.
    The data for these two tables is shown in Tables [5-3](#464036_2_En_5_Chapter.xhtml#Tab3)
    and [5-4](#464036_2_En_5_Chapter.xhtml#Tab4).


    Table 5-4


    Testing User Data for the AUTHORITIES Table


    | USERNAME | AUTHORITY |

    | --- | --- |

    | `admin@books.io` | `ADMIN` |

    | `admin@books.io` | `USER` |

    | `marten@books.io` | `USER` |

    | `jdoe@books.net` | `USER` |


    Table 5-3


    Testing User Data for the USERS Table


    | USERNAME | PASSWORD | ENABLED |

    | --- | --- | --- |

    | `admin@books.io` | `{noop}secret` | `1` |

    | `marten@books.io` | `{noop}user` | `1` |

    | `jdoe@books.net` | `{noop}unknown` | `0` |


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Figf_HTML.gif)An information icon
    with the letter i inside a circle. The `{noop}` in the password field indicates
    that no encryption has been applied to the stored password. Spring Security uses,
    by default, delegation to determine which encoding method to use; the values can
    be `{bcrypt}`, `{scrypt}`, `{pbkdf2}`, and `{sha256}`. The `{sha256}` is mainly
    there for compatibility reasons and should be considered unsecure.


    For Spring Security to access these tables, you have to declare a data source
    to be able to create connections to this database. Spring Security provides an
    out-of-the-box implementation of a `UserDetailsService` that can be used (the
    `JdbcDaoImpl`). When a `UserDetailsService` is detected as a bean, this is automatically
    picked up and used by Spring Security. See Listing [5-24](#464036_2_En_5_Chapter.xhtml#PC28).


    ```

    @Bean

    public UserDetailsService jdbcUserDetailsService(DataSource datasource) {

    var usd = new JdbcDaoImpl();

    usd.setDataSource(datasource);

    return usd;

    }

    Listing 5-24

    JDBC Based UserDetailsService Configuration

    ```


    However, in some cases, you may already have your own user repository defined
    in a legacy database. For example, suppose that the tables are created with the
    SQL statements in Listing [5-25](#464036_2_En_5_Chapter.xhtml#PC29) and that all
    users in the `MEMBER` table have the enabled status.


    ```

    CREATE TABLE MEMBER

    (

    ID       BIGINT      NOT NULL,

    USERNAME VARCHAR(50) NOT NULL,

    PASSWORD VARCHAR(32) NOT NULL,

    PRIMARY KEY (ID)

    );

    CREATE TABLE MEMBER_ROLE

    (

    MEMBER_ID BIGINT      NOT NULL,

    ROLE      VARCHAR(10) NOT NULL,

    FOREIGN KEY (MEMBER_ID) REFERENCES MEMBER

    );

    Listing 5-25

    DDL for Custom Spring Security Table Structure (Sample)

    ```


    Suppose you have the legacy user data stored in these tables, as shown in Tables
    [5-5](#464036_2_En_5_Chapter.xhtml#Tab5) and [5-6](#464036_2_En_5_Chapter.xhtml#Tab6).


    Table 5-6


    Legacy User Data in the MEMBER_ROLE Table


    | MEMBER_ID | ROLE |

    | --- | --- |

    | `1` | `ROLE_ADMIN` |

    | `1` | `ROLE_USER` |

    | `2` | `ROLE_USER` |


    Table 5-5


    Legacy User Data in the MEMBER Table


    | ID | USERNAME | PASSWORD |

    | --- | --- | --- |

    | `1` | `admin@ya2do.io` | `{noop}secret` |

    | `2` | `marten@ya2do.io` | `{noop}user` |


    Fortunately, Spring Security also supports using custom SQL statements to query
    a legacy database for user details. You can specify the statements for querying
    a user’s information and authorities by setting the `usersByUsernameQuery` and
    `authoritiesByUsernameQuery` properties on the configured `JdbcDaoImpl`. See Listing
    [5-26](#464036_2_En_5_Chapter.xhtml#PC30).


    ```

    @Configuration

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    private static final String USERS_BY_USERNAME_QUERY =

    """

    SELECT username, password, ‘true’ as enabled

    FROM member WHERE username = ?

    """;

    private static final String AUTHORITIES_BY_USERNAME_QUERY =

    """

    SELECT member.username, member_role.role as authorities

    FROM member, member_role

    WHERE  member.username = ? AND member.id = member_role.member_id

    """;

    @Bean

    public UserDetailsService jdbcUserDetailsService(DataSource datasource) {

    var usd = new JdbcDaoImpl();

    usd.setDataSource(datasource);

    usd.setUsersByUsernameQuery(USERS_BY_USERNAME_QUERY);

    usd.setAuthoritiesByUsernameQuery(AUTHORITIES_BY_USERNAME_QUERY);

    return usd;

    }

    }

    Listing 5-26

    Configuration for Custom Queries

    ```'
