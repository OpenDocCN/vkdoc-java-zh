    #### 将 HTTP 重定向到 HTTPS


    除了同时支持 HTTP 和 HTTPS，另一种方案是仅支持 HTTPS，并将 HTTP 流量重定向到 HTTPS。其配置与同时支持 HTTP 和 HTTPS
    时类似。不过，现在你需要配置连接器，将所有来自 8080 端口的流量重定向到 8443 端口。参见清单 3-40。


    ```

    @Bean

    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

    var factory = new TomcatServletWebServerFactory();

    factory.addAdditionalTomcatConnectors(httpConnector());

    factory.addContextCustomizers(securityCustomizer());

    return factory;

    }

    private Connector httpConnector() {

    var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    connector.setRedirectPort(8443);

    return connector;

    }

    private TomcatContextCustomizer securityCustomizer() {

    return context -> {

    var collection = new SecurityCollection();

    collection.addPattern("/*");

    var securityConstraint = new SecurityConstraint();

    securityConstraint.setUserConstraint("CONFIDENTIAL");

    securityConstraint.addCollection(collection);

    context.addConstraint(securityConstraint);

    };

    }

    清单 3-40

    附加 Tomcat 连接器：带重定向功能

    ```


    现在，`httpConnector` 设置了 `redirectPort`，以便它知道要使用哪个端口。最后，你需要使用 `SecurityConstraint`
    来保护所有 URL。使用 Spring Boot，你可以使用专门的 `TomcatContextCustomizer` 在 Tomcat 启动前对 `Context`
    进行后置处理。该约束使得所有内容（由于使用了 `/*` 作为模式）都变为机密（允许使用 `NONE`、`INTEGRAL` 或 `CONFIDENTIAL`
    之一），结果就是所有内容都将被重定向。


    ## 3-9. 使用控制器和 TaskExecutor 实现异步请求处理


    ### 问题


    为了提高 Servlet 容器的吞吐量，你希望异步处理请求，以便更有效地分配资源。


    ### 解决方案


    当请求进入时，它会被同步处理，这会阻塞 HTTP 请求处理线程。响应保持打开状态，并且可以写入。例如，当某个调用需要一些时间才能完成时，这很有用，你可以让它在后台处理，并在完成后向用户返回一个值，而不是阻塞线程。


    ### 工作原理


    Spring MVC 支持多种方法返回类型；表 3-12 中的返回类型以异步方式处理。


    表 3-12


    异步返回类型


    | 类型 | 描述 |

    | --- | --- |

    | `DeferredResult<?>` | 稍后由另一个线程生成的异步结果。 |

    | `ListenableFuture<?>` | 稍后由另一个线程生成的异步结果，是 `DeferredResult` 的等效替代方案。从 Spring
    6.0 开始，此类型已弃用，推荐使用 `CompletableFuture<?>`。 |

    | `CompletionStage<?>`/`CompletableFuture<?>` | 稍后由另一个线程生成的异步结果，是 `DeferredResult`
    的等效替代方案。 |

    | `Callable<?>` | 一个异步计算，结果在计算完成后产生。 |

    | `ResponseBodyEmitter` | 可用于异步地向响应写入多个对象。 |

    | `SseEmitter` | 可用于异步地写入服务器发送事件。 |

    | `StreamingResponseBody` | 可用于异步地写入 `OutputStream`。 |


    这些泛型返回类型又可以返回控制器的任何返回类型，因此可以是添加到模型的对象、视图的名称，甚至是 `ModelAndView`。


    #### 配置异步处理


    Servlet 规范在版本 3 中添加了对异步请求处理的支持。要启用它，你必须告知所有过滤器和 Servlet 以异步方式运行。在 Spring Boot
    应用程序中，对于 `DispatcherServlet` 和检测到的 `Filter` Bean，默认会执行此操作。


    Spring Boot 默认会配置一个 `AsyncTaskExecutor` 供 Spring MVC 使用。但是，你可以根据需求配置一个 `AsyncTaskExecutor`，并将其注入到
    MVC 配置中。参见清单 3-41。


    ```

    @SpringBootApplication

    public class HelloWorldApplication implements WebMvcConfigurer {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    @Override

    public void configureAsyncSupport(AsyncSupportConfigurer configurer) {

    configurer.setDefaultTimeout(5000);

    configurer.setTaskExecutor(mvcTaskExecutor());

    }

    @Bean

    public ThreadPoolTaskExecutor mvcTaskExecutor() {

    ThreadPoolTaskExecutor taskExecutor = new ThreadPoolTaskExecutor();

    taskExecutor.setThreadNamePrefix("mvc-executor-");

    return taskExecutor;

    }

    }

    清单 3-41

    显式 TaskExecutor 配置

    ```


    ![](img/464036_2_En_3_Figp_HTML.gif)一个灯泡图标。 当 Spring Boot 检测到你可以使用虚拟线程（Java 21）并且属性
    `spring.threads.virtual.enabled` 设置为 `true` 时，它将自动为虚拟线程使用进行设置。


    要配置异步处理，你需要重写 `WebMvcConfigurer` 的 `configureAsyncSupport` 方法。重写此方法可以让你访问 `AsyncSupportConfigurer`。这允许你设置
    `defaultTimeout` 和要使用的 `AsyncTaskExecutor`。超时时间设置为 5 秒，作为执行器，你将使用 `ThreadPoolTaskExecutor`。


    ![](img/464036_2_En_3_Figq_HTML.gif)一个灯泡图标。 `defaultTimeout` 也可以通过设置 `application.properties`
    中的 `spring.mvc.async.request-timeout` 来设置。添加 `spring.mvc.async.request-timeout=5s`
    与在 `@Bean` 方法中设置的效果相同。


    #### 编写异步控制器


    编写一个控制器并让它异步处理请求，只需更改控制器处理方法的返回类型即可（参见表 3-12）。假设对 `HelloWorldController.hello`
    的调用需要一些时间，但我们不希望因此阻塞服务器。

