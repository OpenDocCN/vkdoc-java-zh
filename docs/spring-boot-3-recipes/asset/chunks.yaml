- fmt: "#### Configure `JmsTemplate`\n\nSpring Boot provides properties in the `spring.jms.template`\
    \ namespace to configure `JmsTemplate` (see Table 8-6).\n\n**Table 8-6** `JmsTemplate`\
    \ Properties\n\n| Property | Description |\n| --- | --- |\n| `spring.jms.template.default-destination`\
    \ | Sets the default destination to use for send and receive operations when a\
    \ specific destination isn’t specified. |\n| `spring.jms.template.delivery-delay`\
    \ | Sets the delivery delay for sending a message. |\n| `spring.jms.template.delivery-mode`\
    \ | Sets the delivery mode, `persistent` or `non-persistent`. When explicitly\
    \ set, it sets `qos-enabled` to `true`. |\n| `spring.jms.template.priority` |\
    \ Sets the priority of the message when sending. The default is none; when explicitly\
    \ set, it sets `qos-enabled` to `true`. |\n| `spring.jms.template.qos-enabled`\
    \ | Sets whether quality of service (QOS) should be enabled. When enabled, the\
    \ priority, delivery-mode, and time-to-live of a message will be set. The default\
    \ is `false`. |\n| `spring.jms.template.receive-timeout` | Sets the timeout to\
    \ use for receive calls. The default is indefinite. |\n| `spring.jms.template.time-to-live`\
    \ | Sets the time-to-live of a JMS message; when set, it sets `qos-enabled` to\
    \ `true`. |\n| `spring.jms.pub-sub-domain` | Sets the default destination to a\
    \ topic or queue. The default is `false`, meaning queue. |\n\nIn addition to these\
    \ properties, `JmsTemplate` will also be auto-configured with a `DestinationResolver`\
    \ and `MessageConverter` if a unique instance of the beans can be found. If no\
    \ unique instance can be found, the defaults will be used, `DynamicDestinationResolver`\
    \ and `SimpleMessageConverter` (see Table 8-7).\n\n**Table 8-7** `SimpleMessageConverter`\
    \ Class to JMS Message Converter\n\n| Type | JMS Message Type |\n| --- | --- |\n\
    | `java.lang.String` | `javax.jms.TextMessage` |\n| `java.util.Map` | `javax.jms.MapMessage`\
    \ |\n| `java.io.Serializable` | `javax.jms.ObjectMessage` |\n| `byte[]` | `javax.jms.BytesMessage`\
    \ |\n\nLet’s send an `Order` to the `orders` queue, and let’s use Jackson to send\
    \ JSON instead of using the Java Serialization mechanism. See Listing 8-10.\n\n\
    ```\npackage com.apress.springboot3recipes.order;\nimport java.math.BigDecimal;\n\
    public record Order (String id, BigDecimal amount) { }\n```\n\nThat is the `Order`\
    \ class we are going to send. To be able to generate an order, let’s create an\
    \ `OrderGenerator` class that will create an order with an ID and a random amount.\
    \ See Listing 8-11.\n\n```\npackage com.apress.springboot3recipes.order;\nimport\
    \ java.math.BigDecimal;\nimport java.math.RoundingMode;\nimport java.util.UUID;\n\
    import java.util.concurrent.ThreadLocalRandom;\npublic class OrderGenerator {\n\
    public static Order generate() {\nvar rnd = ThreadLocalRandom.current().nextDouble(1000.00);\n\
    var amount = BigDecimal.valueOf(rnd).setScale(2, RoundingMode.HALF_EVEN);\nvar\
    \ id = UUID.randomUUID().toString();\nreturn new Order(id, amount);\n}\n}\n```\n\
    \nNow we need a sender that generates an `Order` and places it on the queue using\
    \ `JmsTemplate`. See Listing 8-12.\n\n```\n@Component\nclass OrderSender {\nprivate\
    \ final JmsTemplate jms;\nOrderSender(JmsTemplate jms) {\nthis.jms = jms;\n}\n\
    @Scheduled(fixedRate = 500)\npublic void sendOrder() {\nvar order = OrderGenerator.generate();\n\
    jms.convertAndSend(\"orders\", order);\n}\n}\n```\n\nIt isn’t that different from\
    \ `MessageSender` written earlier, but now it generates an `Order` with some random\
    \ generated data (see the `OrderGenerator`) and sends it on the `orders` queue.\
    \ When running this, it would actually fail. Because `Order` doesn’t implement\
    \ `Serializable`, it won’t be converted into an `ObjectMessage`. However, we wanted\
    \ to use JSON. To make this happen, a different `MessageConverter` is needed:\
    \ the `MappingJackson2MessageConverter` to be exact. This uses Jackson to marshal\
    \ and unmarshal objects to JSON. It should be added as a bean to the configuration.\n\
    \nFirst you will need to add the dependency to add Jackson (or, rather, JSON support)\
    \ to your application. Add `spring-boot-starter-json` to get the needed dependencies.\
    \ See Listing 8-13.\n\n```\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-json</artifactId>\n</dependency>\n```\n\n\
    > An information icon. When you already have `spring-boot-starter-web` or `spring-boot-starter-webflux`\
    \ in your list of dependencies, `spring-boot-starter-json` is already included.\n\
    \nNext you can configure `MappingJackson2MessageConverter`. See Listing 8-14.\n\
    \n- ① The `typeIdPropertyName` is a required property and indicates the name of\
    \ the property in which the actual type of the message is stored. Without any\
    \ further configuration, the FQN of the class will be used.\n- ② This is the mapping\
    \ for which type identifier (`typeId`) to use for a given class. Instead of sending\
    \ the FQN of a class, it will use the type in the mapping to identify the type.\
    \ When sending an `Order`, the `content-type` header will contain the value `order`.\n\
    \n```\n@Bean\npublic MappingJackson2MessageConverter messageConverter() {\nvar\
