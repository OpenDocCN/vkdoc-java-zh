- fmt: '### Test an `@Controller`


    As you want to make sure that the controller does what it is supposed to do, write
    a test to verify the correct behavior of the controller. See Listing [3-17](#464036_2_En_3_Chapter.xhtml#PC20).


    ```java

    package com.apress.springboot3recipes.library.web;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.hamcrest.Matchers;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.boot.test.mock.mockito.MockBean;

    import org.springframework.test.web.servlet.MockMvc;

    import java.util.Arrays;

    import java.util.List;

    import java.util.Optional;

    import static org.mockito.ArgumentMatchers.anyString;

    import static org.mockito.Mockito.when;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.*;

    @WebMvcTest(BookController.class)

    public class BookControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @MockBean

    private BookService bookService;

    @Test

    public void shouldReturnListOfBooks() throws Exception {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 6 Recipes", List.of("Marten Deinum", "Josh Long")),

    new Book("321", "Pro Spring MVC", List.of("Marten Deinum", "Colin Yates"))));

    mockMvc.perform(get("/books.html"))

    .andExpect(status().isOk())

    .andExpect(view().name("books/list"))

    .andExpect(model().attribute("books", Matchers.hasSize(2)));

    }

    @Test

    public void shouldReturnNoBookWhenNotFound() throws Exception {

    when(bookService.find(anyString())).thenReturn(Optional.empty());

    mockMvc.perform(get("/books.html").param("isbn", "123"))

    .andExpect(status().isOk())

    .andExpect(view().name("books/details"))

    .andExpect(model().attributeDoesNotExist("book"));

    }

    @Test

    public void shouldReturnBookWhenFound() throws Exception {

    Book book = new Book("123", "Spring 6 Recipes",

    List.of("Marten Deinum", "Josh Long"));

    when(bookService.find(anyString())).thenReturn(Optional.of(book));

    mockMvc.perform(get("/books.html").param("isbn", "123"))

    .andExpect(status().isOk())

    .andExpect(view().name("books/details"))

    .andExpect(model().attribute("book", Matchers.is(book)));

    }

    }

    Listing 3-17

    Integration Test for BookController Using WebMvcTest

    ```


    The test uses `@WebMvcTest` to create a `MockMvc`-based integration test. It will
    create a minimal Spring Boot application to be able to run the controller. The
    controller needs an instance of a `BookService`, so we let the framework create
    a mock for this using the `@MockBean` annotation. In the different test methods,
    we mock the expected behavior (like returning a list of books, returning an empty
    `Optional`, etc.).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fige_HTML.gif)An information icon
    with the letter i inside a circle. Spring Boot uses Mockito to create mocks using
    `@MockBean`.


    With the `MockMvc` support from the Spring Test framework, we can check if the
    controller returns what we expect. We can check the HTTP status, the name of the
    view, and if the `Model` has the correct entries.


    ## 3-4\. Handle Exceptions with Spring MVC


    ### Problem


    You want to configure the exception handling for Spring MVC and configure it according
    to your needs.


    ### Solution


    Spring MVC provides several ways of handling exceptions, and with Spring Boot
    it has become pretty easy to modify the default behavior.


    For view-related implementations, it is easy to add pages that will be automatically
    picked up. Add an `error.html` file as a customized error page, or add specific
    error pages for specific HTTP error codes, i.e., `404.html` and `500.html`.


    Spring Boot also has exception handling support for REST-based controllers. It
    will return a response containing the error information, much like the error information
    that is available with the regular MVC exception handling. Another option is to
    enable the Problem Detail support (RFC-7807), which is a small standard for defining
    error responses. To enable it, set the `spring.mvc.problemdetails.enabled` property
    to `true`.


    ### How It Works


    Spring Boot by default comes with the error handling enabled and will show a default
    error page. This can be disabled in full by setting the `server.error.whitelabel.enabled`
    property to `false`. When disabled, the exception handling will be handled by
    the servlet container instead of the general exception handling mechanism provided
    by Spring and Spring Boot.'
