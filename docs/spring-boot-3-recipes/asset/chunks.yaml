  trans: '

    ### 工作原理


    Spring Boot 会自动检测 MongoDB 驱动以及 Spring Data MongoDB 类的存在。如果检测到这些组件，MongoDB 以及 `MongoTemplate`（以及其他组件）将会自动为您配置好。


    要在 Spring Boot 中使用 MongoDB，首先需要添加正确的依赖。使用 `spring-boot-starter-data-mongodb` 将会引入所有必需的依赖。它会引入
    `spring-data-mongodb` 以及 `mongodb-driver-sync` 依赖，这是连接 MongoDB 所需的全部内容（列表 6-47）。


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb


    列表 6-47

    MongoDB 依赖

    ```


    接下来，我们需要指定 MongoDB 的配置。MongoDB 的位置以及要使用的用户名/密码是我们所需的最基本属性（参见列表 6-48）。


    ```

    spring.data.mongodb.host=localhost

    spring.data.mongodb.port=27017

    spring.data.mongodb.database=customer

    列表 6-48

    MongoDB 属性

    ```


    列表 6-45 中的 `application.properties` 文件指定了主机、用户名/密码以及要使用的数据库名称。这是通过在 `spring.data.mongodb`
    命名空间中设置相应属性来完成的。有了依赖和属性设置后，在启动时 Spring Boot 会检测到两者，并为应用程序配置 MongoDB。它会创建到 MongoDB
    的连接，并配置一个 `MongoTemplate` 供应用程序使用，并且在检测到时还会配置基于 Spring Data 的 Mongo 仓库。


    #### 使用 MongoTemplate


    现在连接已经建立，您可以使用它了，理想情况下通过 `MongoTemplate` 来简化文档的存储和检索。首先，您需要一个要存储的文档。让我们创建一个想要持久化的
    `Customer`（列表 6-49）。


    ```

    package com.apress.springboot3recipes.mongo;

    public record Customer(String id, String name, String email) {

    public Customer(String name, String email) {

    this(null, name, email);

    }

    }

    列表 6-49

    Customer 记录

    ```


    `id` 字段会自动映射到 MongoDB 的 `_id` 文档标识符。如果您想使用其他字段，可以使用 Spring Data 的 `@Id` 注解来指定应使用哪个字段。


    让我们创建一个 `CustomerRepository` 实例，以便可以保存和检索实例（列表 6-50）。


    ```

    package com.apress.springboot3recipes.mongo;

    import java.util.List;

    import java.util.Optional;

    public interface CustomerRepository {

    List findAll();

    Optional findById(long id);

    Customer save(Customer customer);

    }

    列表 6-50

    CustomerRepository 接口

    ```


    MongoDB 的实现使用基于 `MongoTemplate` 的实现（列表 6-51）。


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.core.MongoTemplate;

    import org.springframework.stereotype.Repository;

    import java.util.List;

    import java.util.Optional;

    @Repository

    class MongoCustomerRepository implements CustomerRepository {

    private final MongoTemplate mongoTemplate;

    MongoCustomerRepository(MongoTemplate mongoTemplate) {

    this.mongoTemplate = mongoTemplate;

    }

    @Override

    public List findAll() {

    return mongoTemplate.findAll(Customer.class);

    }

    @Override

    public Optional findById(long id) {

    return Optional.ofNullable(mongoTemplate.findById(id, Customer.class));

    }

    @Override

    public Customer save(Customer customer) {

    mongoTemplate.save(customer);

    return customer;

    }

    }

    列表 6-51

    基于 MongoTemplate 的 CustomerRepository 实现

    ```


    `MongoCustomerRepository` 使用预配置的 `MongoTemplate` 在 MongoDB 中存储和检索客户。


    要使用所有组件，首先需要在 MongoDB 中有一些数据。可以使用 `ApplicationRunner` 来插入一些数据（列表 6-52）。


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    List.of(

    new Customer("Marten Deinum", "marten@deinum.biz"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    .forEach(customers::save);

    }

    }

    列表 6-52

    MongoDB 的数据初始化器

    ```


    `DataInitializer` 将使用 `CustomerRepository` 实例将一些 `Customer` 实例保存到 MongoDB 中。注意
    `@Order` 注解。我们希望它先执行，这可以通过显式地对 bean 进行排序来强制执行。


    接下来创建一个 `ApplicationRunner` 实例，用于从 MongoDB 中检索所有客户（列表 6-53）。


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    列表 6-53

    使用 CustomerRepository 的 CustomerLister

    ```


    这个 `CustomerLister` 实例将使用 `CustomerRepository` 从数据库加载所有客户，并在日志中打印一行信息。


    用于启动所有这些组件（包括前面提到的两个 `ApplicationRunner` 类）的应用程序类如列表 6-54 所示。


    ```

    package com.apress.springboot3recipes.mongo;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.ApplicationArguments;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.core.annotation.Order;

    import org.springframework.stereotype.Component;

    import java.util.List;

    @SpringBootApplication

    public class MongoApplication {

    public static void main(String[] args) {

    SpringApplication.run(MongoApplication.class, args);

    }

    }

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) throws Exception {

    List.of(

    new Customer("Marten Deinum", "marten@deinum.biz"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"))

    .forEach(customers::save);

    }

    }

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    列表 6-54

    完整的应用程序类

    ```


    当您运行应用程序时，它会自动连接到 MongoDB 实例，向其中插入数据，最后检索数据并将其打印到日志中。


    您需要一个 MongoDB 实例来存储和检索文档。

    '
- fmt: '### Connect to an External MongoDB


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Figf_HTML.gif) A circular abstract
    reads the lowercase letter i inside it. The `bin` directory contains a `mongo.sh`
    script that will start a MongoDB instance using Docker.


    When starting `MongoApplication`, it will by default try to connect to a MongoDB
    server on the localhost via port 27017. If that is not where you want to connect,
    use the `spring.data.mongodb` properties (see Table 6-5) to configure the correct
    location.


    **Table 6-5** MongoDB Properties


    | Property | Description |

    | --- | --- |

    | `spring.data.mongodb.uri` | Sets the Mongo database URI, including credentials,
    settings, etc. The default is `mongodb://localhost/test`. |

    | `spring.data.mongodb.username` | Sets the login user of the Mongo server. The
    default is none. |

    | `spring.data.mongodb.password` | Sets the login password of the mongo server.
    The default is none. |

    | `spring.data.mongodb.host` | Sets the hostname (or IP address) of the MongoDB
    server. The default is to fall back to `localhost`. |

    | `spring.data.mongodb.port` | Sets the port of the MongoDB server. The default
    is to fall back to 27017. |

    | `spring.data.mongodb.database` | Sets the name of the MongoDB database/collection
    to use. |

    | `spring.data.mongodb.field-naming-strategy` | Sets the FQN of the `FieldNamingStrategy`
    instance used to map object fields to document fields. This defaults to `PropertyNameFieldNamingStrategy`.
    |

    | `spring.data.mongodb.authentication-database` | Sets the name of MongoDB to
    use for authentication. This defaults to the `spring.data.mongodb.database` value.
    |

    | `spring.data.mongodb.gridfs-database` | Sets the name of MongoDB to connect
    to. This defaults to a `spring.data.mongodb.database` value. |

    | `spring.data.mongodb.replica-set-name` | Sets the replica set name for the cluster;
    required when using a clustered MongoDB. |


    Although you can use Spring Boot to configure the `MongoClient`, if you need more
    control, you can always specify `MongoDbFactory` or `MongoClient` yourself as
    a bean, and Spring Boot will not auto-configure the `MongoClient`. It will still
    detect Spring Data MongoDB classes and will enable repository support.


    ### Use Spring Data MongoDB Repositories


    Instead of writing your own implementation of the repository, you can also use
    Spring Data MongoDB to create them for you (just like as with Spring Data JPA).
    For this you need to extend one of the `Repository` interfaces from Spring Data.
    The easiest is to extend `CrudRepository` or `MongoRepository` (Listing 6-55).


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.repository.MongoRepository;

    public interface CustomerRepository extends MongoRepository { }

    ```


    This is all we need to get a fully functional repository; you can remove the `MongoCustomerRepository`
    implementation. This will give you `save`, `findAll`, `findById`, and many more
    methods.


    The application will still run, insert some customers, and list them in the logs
    (see Figure 6-4).


    ### Use Reactive MongoDB Repositories


    Instead of using regular blocking operations, MongoDB can also be used in a reactive
    fashion. For this, use `spring-boot-starter-data-mongodb-reactive` instead of
    `spring-boot-starter-data-mongodb`. This dependency will include the needed reactive
    libraries and reactive driver for MongoDB (Listing 6-56).


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb-reactive

    ```


    With the dependencies in order, you can make `CustomerRepository` reactive. This
    is done by simply extending `ReactiveCrudRepository`, `ReactiveSortingRepository`,
    or `ReactiveMongoRepository` depending on your needs (Listing 6-57).


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.repository.ReactiveMongoRepository;

    public interface CustomerRepository

    extends ReactiveMongoRepository { }

    ```


    Now that `CustomerRepository` extends `ReactiveMongoRepository`, all the methods
    return either `Flux` (zero or more elements) or `Mono` (zero or one element).


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Figg_HTML.gif) A circular abstract
    reads the lowercase letter i inside it. The default implementations use Project
    Reactor as the reactive framework; however, you can also use RxJava. Then, instead
    of `Flux` and `Mono`, you will use an `Observable` or `Single` instead. For this
    you need to extend `RxJava3CrudRepository` or `RxJava3SortingRepository`.


    `DataInitializer` needs to be made reactive as well (Listing 6-58).


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    var newCustomers = Flux.just(

    new Customer("Marten Deinum", "marten.deinum@conspect.nl"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"));

    customers.deleteAll()

    .thenMany(customers.saveAll(newCustomers))

    .blockLast();

    }

    }

    ```


    First it deletes everything; then we create new `Customer` instances and add them
    to the repository. As we want to make sure everything is stored before we move
    on, we use `blockLast`, which will wait until the last element is written before
    the process continues.


    Finally, `CustomerLister` needs to be made reactive (Listing 6-59).


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .subscribe( (customer) -> logger.info("{}", customer));

    }

    }

    ```


    It will find all the customers from the repository and for each will print a line
    in the log file.


    When starting the application, you will probably see nothing in the log files.
    Because of the reactive nature of the application, it finishes quickly, and `CustomerLister`
    doesn’t have time to register itself and start listening. To prevent the shutdown
    of the application, add an `System.in.read()` method. This will keep the application
    running until you press Enter (Listing 6-60). Generally when running an application,
    this isn’t needed because the application is exposed as a service/web application
    that keeps running automatically.


    ```

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ReactiveMongoApplication.class, args);

    System.in.read();

    }

    ```'
  raw: '#### Connect to an External MongoDB


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Figf_HTML.gif)A circular abstract
    reads the lowercase letter i inside it. The `bin` directory contains a `mongo.sh`
    script that will start a MongoDB instance using Docker.


    When starting `MongoApplication`, it will by default try to connect to a MongoDB
    server on the localhost via port 27017\. If that is not where you want to connect,
    use the `spring.data.mongodb` properties (see Table [6-5](#464036_2_En_6_Chapter.xhtml#Tab5))
    to configure the correct location.


    Table 6-5


    MongoDB Properties


    | Property | Description |

    | --- | --- |

    | `spring.data.mongodb.uri` | Sets the Mongo database URI, including credentials,
    settings, etc. The default is `mongodb://localhost/test`. |

    | `spring.data.mongodb.username` | Sets the login user of the Mongo server. The
    default is none. |

    | `spring.data.mongodb.password` | Sets the login password of the mongo server.
    The default is none. |

    | `spring.data.mongodb.host` | Sets the hostname (or IP address) of the MongoDB
    server. The default is to fall back to `localhost`. |

    | `spring.data.mongodb.port` | Sets the port of the MongoDB server. The default
    is to fall back to 27017. |

    | `spring.data.mongodb.database` | Sets the name of the MongoDB database/collection
    to use. |

    | `spring.data.mongodb.field-naming-strategy` | Sets the FQN of the `FieldNamingStrategy`
    instance used to map object fields to document fields. This defaults to `PropertyNameFieldNamingStrategy`.
    |

    | `spring.data.mongodb.authentication-database` | Sets the name of MongoDB to
    use for authentication. This defaults to the `spring.data.mongodb.database` value.
    |

    | `spring.data.mongodb.gridfs-database` | Sets the name of MongoDB to connect
    to. This defaults to a `spring.data.mongodb.database` value. |

    | `spring.data.mongodb.replica-set-name` | Sets the replica set name for the cluster;
    required when using a clustered MongoDB. |


    Although you can use Spring Boot to configure the `MongoClient`, if you need more
    control, you can always specify `MongoDbFactory` or `MongoClient` yourself as
    a bean, and Spring Boot will not auto-configure the `MongoClient`. It will still
    detect Spring Data MongoDB classes and will enable repository support.


    #### Use Spring Data MongoDB Repositories


    Instead of writing your own implementation of the repository, you can also use
    Spring Data MongoDB to create them for you (just like as with Spring Data JPA).
    For this you need to extend one of the `Repository` interfaces from Spring Data.
    The easiest is to extend `CrudRepository` or `MongoRepository` (Listing [6-55](#464036_2_En_6_Chapter.xhtml#PC56)).


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.repository.MongoRepository;

    public interface CustomerRepository extends MongoRepository { }

    Listing 6-55

    Spring Data MongoDB-Based CustomerRepository

    ```


    This is all we need to get a fully functional repository; you can remove the `MongoCustomerRepository`
    implementation. This will give you `save`, `findAll`, `findById`, and many more
    methods.


    The application will still run, insert some customers, and list them in the logs
    (see Figure [6-4](#464036_2_En_6_Chapter.xhtml#Fig4))


    #### Use Reactive MongoDB Repositories


    Instead of using regular blocking operations, MongoDB can also be used in a reactive
    fashion. For this, use `spring-boot-starter-data-mongodb-reactive` instead of
    `spring-boot-starter-data-mongodb`. This dependency will include the needed reactive
    libraries and reactive driver for MongoDB (Listing [6-56](#464036_2_En_6_Chapter.xhtml#PC57)).


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb-reactive


    Listing 6-56

    Spring Data MongoDB Dependencies for Reactive Use

    ```


    With the dependencies in order, you can make `CustomerRepository` reactive. This
    is done by simply extending `ReactiveCrudRepository`, `ReactiveSortingRepository`,
    or `ReactiveMongoRepository` depending on your needs (Listing [6-57](#464036_2_En_6_Chapter.xhtml#PC58)).


    ```

    package com.apress.springboot3recipes.mongo;

    import org.springframework.data.mongodb.repository.ReactiveMongoRepository;

    public interface CustomerRepository

    extends ReactiveMongoRepository { }

    Listing 6-57

    Reactive CustomerRepository

    ```


    Now that `CustomerRepository` extends `ReactiveMongoRepository`, all the methods
    return either `Flux` (zero or more elements) or `Mono` (zero or one element).


    ![](images/464036_2_En_6_Chapter/464036_2_En_6_Figg_HTML.gif)A circular abstract
    reads the lowercase letter i inside it. The default implementations use Project
    Reactor as the reactive framework; however, you can also use RxJava. Then, instead
    of `Flux` and `Mono`, you will use an `Observable` or `Single` instead. For this
    you need to extend `RxJava3CrudRepository` or `RxJava3SortingRepository`.


    `DataInitializer` needs to be made reactive as well (Listing [6-58](#464036_2_En_6_Chapter.xhtml#PC59)).


    ```

    @Component

    @Order(1)

    class DataInitializer implements ApplicationRunner {

    private final CustomerRepository customers;

    DataInitializer(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    var newCustomers = Flux.just(

    new Customer("Marten Deinum", "marten.deinum@conspect.nl"),

    new Customer("Josh Long", "jlong@pivotal.io"),

    new Customer("John Doe", "john.doe@island.io"),

    new Customer("Jane Doe", "jane.doe@island.io"));

    customers.deleteAll()

    .thenMany(customers.saveAll(newCustomers))

    .blockLast();

    }

    }

    Listing 6-58

    Reactive DataInitializer

    ```


    First it deletes everything; then we create new `Customer` instances and add them
    to the repository. As we want to make sure everything is stored before we move
    on, we use `blockLast`, which will wait until the last element is written before
    the process continues.


    Finally, `CustomerLister` needs to be made reactive (Listing [6-59](#464036_2_En_6_Chapter.xhtml#PC60)).


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .subscribe( (customer) -> logger.info("{}", customer));

    }

    }

    Listing 6-59

    Reactive CustomerLister

    ```


    It will find all the customers from the repository and for each will print a line
    in the log file.


    When starting the application, you will probably see nothing in the log files.
    Because of the reactive nature of the application, it finishes quickly, and `CustomerLister`
    doesn’t have time to register itself and start listening. To prevent the shutdown
    of the application, add an `System.in.read()` method. This will keep the application
    running until you press Enter (Listing [6-60](#464036_2_En_6_Chapter.xhtml#PC61)).
    Generally when running an application, this isn’t needed because the application
    is exposed as a service/web application that keeps running automatically.


    ```

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ReactiveMongoApplication.class, args);

    System.in.read();

    }

    Listing 6-60

    Keeping the Application Alive with System.in.read

    ```'
