  raw: '#### Send a Simple Message


    Sending a message with the `KafkaTemplate` can be done with the `send` method.
    It takes, at least, the topic (if no default is configured) and the object to
    send in the message.


    ```

    @Component

    class HelloWorldSender {

    private final KafkaTemplate kafka;

    HelloWorldSender(KafkaTemplate kafka) {

    this.kafka = kafka;

    }

    @Scheduled(fixedRate = 50)

    public void sayHello() {

    String msg = "Hello World, from Spring Boot 3, over Apache Kafka!";

    kafka.send("hello", msg);

    }

    }

    ```


    `HelloWorldSender` will be injected with `KafkaTemplate` through the constructor.
    Each 50 ms, a message will be sent on the `hello` topic.


    Write a test to verify the correct behavior of the application. We can create
    a mock for the `KafkaTemplate` and verify if it calls the correct methods. See
    Listing [8-38](#464036_2_En_8_Chapter.xhtml#PC45).


