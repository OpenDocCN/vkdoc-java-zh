    Spring Boot provides the `spring-boot-starter-data-jdbc` dependency for this,
    which will pull in all the needed dependencies (see Listing [6-20](#464036_2_En_6_Chapter.xhtml#PC20)).


    ```

    org.springframework.boot

    spring-boot-starter-data-jdbc


    Listing 6-20

    Spring Data JDBC Dependency

    ```


    As we are going to store and retrieve `Customer` objects, we need a `Customer`
    class as well. We can reuse the one from Recipe 6-14; Listing [6-21](#464036_2_En_6_Chapter.xhtml#PC21)
    shows it again for completeness.


    ```

    package com.apress.springboot3recipes.jdbc;

    import org.springframework.data.annotation.Id;

    public record Customer(@Id long id, String name, String email) { }

    Listing 6-21

    Customer Record

    ```


    There is a small difference in this customer compared to the one in Recipe 6-15\.
    The difference is the `@Id` annotation on the `id` property. We need to tell Spring
    Data which fields to use as the primary key. This is needed so things like `findById`
    will work; otherwise, Spring Data will not know which fields make up the identifier
    and cannot generate the query. For this we need to mark the fields with `@Id`.
    When there is only one field making up the primary key for this object and it
    is also named `id`, you could omit the `@Id` annotation. However, being explicit
    about it is never wrong and aids the expressiveness of the code.


    Finally, we need a repository. In earlier recipes we defined an interface (Recipe
    6-15) and provided the implementation we wanted (Recipe 6-16). With Spring Data
    JDBC we only need to specify an interface (Listing [6-22](#464036_2_En_6_Chapter.xhtml#PC22)),
    which has to extend one of the Spring Data interfaces. Now Spring Data will dynamically
    create the appropriate repository at runtime.


    ```

    package com.apress.springboot3recipes.jdbc;

    import org.springframework.data.repository.CrudRepository;

    public interface CustomerRepository extends CrudRepository { }

    Listing 6-22

    CustomerRepository for Spring Data JDBC

    ```


    `CustomerRespository` extends `CrudRepository` and contains no methods. All the
    methods needed are provided out of the box by Spring Data. Finally, we need to
    create something that uses the repository. Let’s write a `CustomerLister` that
    retrieves all the `Customer` instances from the database and prints the output
    (Listing [6-23](#464036_2_En_6_Chapter.xhtml#PC23)).


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    Listing 6-23

    CustomerLister Using CustomerRepository

    ```


    ## 6-5\. Test JDBC Code


    When writing JDBC code, eventually you want to test if your code behaves as you
    think it does. For this the Spring Test module can help you out. It allows for
    easy test setup, and Spring Boot extends it even further to make testing data-access
    code even easier. This recipe explores what is needed to write a test for JDBC
    code.


    ### Problem


    You want to test your JDBC layer against an actual database.


    ### Solution


    Use the Spring Test Context framework and the Spring Boot testing support to write
    a unit test using an embedded container like Apache Derby or use Testcontainers
    to write a dedicated integration test.'
  trans: '

    ```

    package com.apress.springboot3recipes.jdbc;

    import org.springframework.dao.EmptyResultDataAccessException;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.jdbc.support.GeneratedKeyHolder;

    import org.springframework.stereotype.Repository;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.util.List;

    import java.util.Optional;

    @Repository

    class JdbcCustomerRepository implements CustomerRepository {

    private static final String ALL_QUERY = "SELECT id, name, email FROM customer";

    private static final String BY_ID_QUERY =

    "SELECT id, name, email FROM customer WHERE id=?";

    private static final String INSERT_QUERY =

    "INSERT INTO customer (name, email) VALUES (?,?) RETURNING id";

    private final JdbcTemplate jdbc;

    JdbcCustomerRepository(JdbcTemplate jdbc) {

    this.jdbc = jdbc;

    }

    @Override

    public List findAll() {

    return jdbc.query(ALL_QUERY, (rs, rowNum) -> toCustomer(rs));

    }

    @Override

    public Optional findById(long id) {

    try {

    var customer = jdbc

    .queryForObject(BY_ID_QUERY, (rs, rowNum) -> toCustomer(rs), id);

    return Optional.of(customer);

    } catch (EmptyResultDataAccessException ex) {

    return Optional.empty();

    }

    }

    @Override

    public Customer save(Customer customer) {

    var keyHolder = new GeneratedKeyHolder();

    jdbc.update( (con) -> {

    var ps = con.prepareStatement(INSERT_QUERY);

    ps.setString(1, customer.name());

    ps.setString(2, customer.email());

    return ps;

    }, keyHolder);

    var id = keyHolder.getKey().longValue();

    return new Customer(id, customer.name(), customer.email());

    }

    private Customer toCustomer(ResultSet rs) throws SQLException {

    var id = rs.getLong(1);

    var name = rs.getString(2);

    var email = rs.getString(3);

    return new Customer(id, name, email);

    }

    }

    清单 6-17 使用 JdbcTemplate 的 CustomerRepository 实现

    ```


    `JdbcCustomerRepository` 使用 `JdbcTemplate` 和 `RowMapper`（通过 lambda 表达式）将 `ResultSet`
    对象中的每一行转换为 `Customer` 对象。现在，`CustomerLister` 可以使用 `CustomerRepository` 从数据库中获取所有
    `Customer` 记录，并将其打印到控制台（清单 6-18）。


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    清单 6-18 使用 CustomerRepository 的 CustomerLister

    ```


    由于所有 JDBC 代码都已移至 `JdbcCustomerRepository`，该类变得非常简单。它注入了一个 `CustomerRepository`
    实例，并使用 `findAll` 方法获取数据库内容，然后为每个客户打印一行信息。


    #### 通过 JdbcClient 访问 JDBC


    Spring JDBC 的新增功能是 `JdbcClient`，它在内部仍然使用 `JdbcTemplate` 或 `NamedParameterJdbcTemplate`，但提供了一种更流畅的方式来执行
    SQL 和映射响应。


    基于 `JdbcClient` 的 `CustomerLister` 可能如清单 6-19 所示。


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final JdbcClient jdbc;

    CustomerLister(JdbcClient jdbc) {

    this.jdbc = jdbc;

    }

    @Override

    public void run(ApplicationArguments args) {

    jdbc.sql("SELECT id, name, email FROM customer")

    .query((rs) -> {

    logger.info("Customer [id={}, name={}, email={}]",

    rs.getLong(1), rs.getString(2), rs.getString(3));

    });

    }

    }

    清单 6-19 使用 JdbcClient 的 CustomerLister

    ```


    `sql` 方法用于设置要执行的 SQL 语句。使用 `param` 方法，我们可以在语句中设置位置参数或命名参数。`query` 方法用于执行查询并将结果映射。这里我们使用了接受
    `RowCallbackHandler` 的 `query` 方法，这与我们在 `JdbcTemplate` 中的做法非常相似。


    ## 6-4. 使用 Spring Data JDBC


    ### 问题


    您希望将一些结果映射到对象，而无需编写太多集成代码。Spring Data JDBC 基于熟悉的 `JdbcTemplate` 为 JDBC 提供了抽象，并会自动提供映射。


    ### 解决方案


    将 Spring Data JDBC 作为依赖项添加到您的项目中，并使用基类创建仓库。


    ### 工作原理


    要使用 Spring Data JDBC，首先需要将依赖项添加到该项目中。Spring Boot 为此提供了 `spring-boot-starter-data-jdbc`
    依赖项，它将引入所有必需的依赖项（参见清单 6-20）。


    ```

    org.springframework.boot

    spring-boot-starter-data-jdbc


    清单 6-20 Spring Data JDBC 依赖项

    ```


    由于我们将要存储和检索 `Customer` 对象，因此也需要一个 `Customer` 类。我们可以复用配方 6-14 中的类；清单 6-21 为了完整性再次展示它。


    ```

    package com.apress.springboot3recipes.jdbc;

    import org.springframework.data.annotation.Id;

    public record Customer(@Id long id, String name, String email) { }

    清单 6-21 Customer 记录

    ```


    此处的客户与配方 6-15 中的客户有一个小差异。区别在于 `id` 属性上的 `@Id` 注解。我们需要告诉 Spring Data 哪些字段用作主键。这是必需的，以便
    `findById` 等方法能够正常工作；否则，Spring Data 将不知道哪些字段构成标识符，也无法生成查询。为此，我们需要使用 `@Id` 标记这些字段。当只有一个字段构成此对象的主键并且该字段也名为
    `id` 时，可以省略 `@Id` 注解。然而，明确标注它永远不会错，并且有助于增强代码的表达力。


    最后，我们需要一个仓库。在之前的配方中，我们定义了一个接口（配方 6-15）并提供了我们想要的实现（配方 6-16）。使用 Spring Data JDBC，我们只需要指定一个接口（清单
    6-22），该接口必须扩展 Spring Data 的接口之一。然后 Spring Data 将在运行时动态创建适当的仓库。


    ```

    package com.apress.springboot3recipes.jdbc;

    import org.springframework.data.repository.CrudRepository;

    public interface CustomerRepository extends CrudRepository { }

    清单 6-22 用于 Spring Data JDBC 的 CustomerRepository

    ```


    `CustomerRepository` 扩展了 `CrudRepository` 并且不包含任何方法。所有需要的方法都由 Spring Data 开箱即用地提供。最后，我们需要创建一些使用该仓库的东西。让我们编写一个
    `CustomerLister`，它从数据库中检索所有 `Customer` 实例并打印输出（清单 6-23）。


    ```

    @Component

    class CustomerLister implements ApplicationRunner {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    private final CustomerRepository customers;

    CustomerLister(CustomerRepository customers) {

    this.customers = customers;

    }

    @Override

    public void run(ApplicationArguments args) {

    customers.findAll()

    .forEach( (customer) -> logger.info("{}", customer));

    }

    }

    清单 6-23 使用 CustomerRepository 的 CustomerLister

    ```


    ## 6-5. 测试 JDBC 代码


    在编写 JDBC 代码时，最终您需要测试代码的行为是否符合预期。为此，Spring Test 模块可以为您提供帮助。它允许轻松进行测试设置，而 Spring
    Boot 进一步扩展了它，使测试数据访问代码更加容易。本配方探讨了为 JDBC 代码编写测试所需的内容。


    ### 问题


    您希望针对实际数据库测试您的 JDBC 层。


    ### 解决方案


    使用 Spring Test Context 框架和 Spring Boot 测试支持，通过嵌入式容器（如 Apache Derby）编写单元测试，或使用
    Testcontainers 编写专用的集成测试。

