- fmt: '### How It Works


    To publish metrics, we need to add a dependency to the Spring Boot Actuator starter.
    This will add the automatic configuration for the Micrometer metrics as well as
    expose them as an endpoint. If you included one of the supported Micrometer integrations
    like Prometheus, it would be configured automatically as well. See Listing [7-17](#464036_2_En_7_Chapter.xhtml#PC22).


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    Listing 7-17

    Maven Dependency

    ```


    With this dependency, the metrics collection will be automatically configured.
    To expose them over the Actuator endpoint, we need to add the `metrics` endpoint
    to it. By default, only the `health` endpoint is being exposed over HTTP. To do
    so, we can configure `management.endpoints.web.exposure.include`. See Listing
    [7-18](#464036_2_En_7_Chapter.xhtml#PC23).


    ```

    management.endpoints.web.exposure.include=health,metrics

    Listing 7-18

    Application Property to Enable Exposing Metrics

    ```


    This property can take a list of what to expose (depending on the used dependencies
    and technologies, this list can grow); here we expose the `health` and `metrics`.
    It is also possible to use `*`, which will expose all the available endpoints
    (such as `info`, `shutdown` if enabled, `threaddump`, etc.).


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Fige_HTML.gif)An abstract presents
    the triangle shaped structure with an exclamation mark inside. Exposing all the
    endpoints can be a security risk as this can either leak information as it exposes
    the beans and configuration and, when configured incorrectly, can allow external
    parties to shut down your application.


    Now when accessing the `metrics` endpoint through `http://localhost:8080/actuator/metrics`,
    it will show you a list of all the available metrics (Figure [7-9](#464036_2_En_7_Chapter.xhtml#Fig9)).


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Fig9_HTML.jpg)


    A screenshot of the window. It features the local host page, which includes several
    names. Some of them are application ready time, application started time, disk
    free, disk total, executor, server requests, buffer, classes, complication, and
    concurrent phase.


    Figure 7-9


    Available metrics


    Spring Boot will detect the metrics to expose based on the technologies in use.
    When Kafka is detected, it will add metrics for that, Hibernate, etc.


    When looking at a specific metric (`name-of-metrics`), it will show you what is
    available. When looking at `http.server.requests` (Figure [7-10](#464036_2_En_7_Chapter.xhtml#Fig10)),
    it will show you how many there have been, what the max execution time it was,
    and the total time. It will also show the available tags; those tags are also
    propagated to monitoring tools such as Prometheus and can be used to group metrics.


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Fig10_HTML.jpg)


    A screenshot of the window. It features the local host page, which includes the
