  trans: '

    ### 解决方案


    Spring Boot 支持从多个位置获取属性。默认情况下，它会加载名为 `application.properties` 的文件，同时也会使用操作系统环境变量以及
    Java `System` 属性。当从命令行运行时，它还会考虑命令行参数。根据应用程序的类型以及可用性或功能（例如 JNDI），还会考虑更多位置。^(³)
    对于我们的应用程序，将按给定顺序考虑以下资源：


    *   打包应用程序外部的 `application.properties`/`application.yaml`


    *   打包在应用程序内部的 `application.properties`/`application.yaml`


    *   操作系统环境变量


    *   Java 系统属性


    *   命令行参数


    ![](img/464036_2_En_2_Figd_HTML.gif)一个灯泡图标。除了 `.properties` 文件，您也可以使用 YAML 文件来表达配置属性。与
    `.properties` 文件相同的规则仍然适用。


    此外，对于前两个选项，您还可以根据激活的配置文件加载特定于配置文件的属性。要激活的配置文件可以通过 `spring.profiles.active` 属性传递。特定于配置文件的
    `application-{profile}.properties` 文件优先级高于非特定于配置文件的文件。每个文件都会被加载，因此您可以覆盖属性。因此，这个列表会稍长一些：


    *   打包应用程序外部的 `application-{profile}.properties`


    *   打包应用程序外部的 `application.properties`


    *   打包在应用程序内部的 `application-{profile}.properties`


    *   打包在应用程序内部的 `application.properties`


    *   操作系统环境变量


    *   Java 系统属性


    *   命令行参数


    ### 工作原理


    为配方 2-1 创建的 `Calculator` 非常灵活；然而，`CalculatorApplication` 在其执行的计算方面使用了硬编码的值。现在，当我们想要计算不同的内容时，就需要修改代码、重新编译并运行新编译的代码。我们可能希望为此使用属性，以便在需要时能够更改它们。


    首先修改应用程序，使其使用属性中的值而不是硬编码的值。为此，更改 `ApplicationRunner` 的 `@Bean` 方法，使其接受三个额外的参数，这些参数将使用
    `@Value` 进行注解。参见清单 2-8。


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    SpringApplication.run(CalculatorApplication.class, args);

    }

    @Bean

    public ApplicationRunner calculationRunner(Calculator calculator,

    @Value("${lhs}") int lhs,

    @Value("${rhs}") int rhs,

    @Value("${op}") char op) {

    return args -> calculator.calculate(lhs, rhs, op);

    }

    }

    清单 2-8

    使用属性的 CalculatorApplication 源码

    ```


    `@Value` 将指示 Spring 查找该属性并使用该属性的值。例如，如果我们使用 `@Value("${lhs}")`，Spring 将尝试检测名为
    `lhs` 的属性并使用其值。您也可以通过添加冒号和默认值来指定默认值，例如 `@Value("${lhs:12}")`。现在，如果找不到值，它将使用 `12`。如果没有指定默认值，则会抛出异常。如果我们现在启动应用程序，将会抛出一个异常，说明找不到名为
    `lhs` 的属性。


    在 `src/main/resources` 中添加 `application.properties`，并在其中为 `lhs`、`rhs` 和 `op` 设置值。参见清单
    2-9。


    ```

    lhs=12

    rhs=15

    op=*

    清单 2-9

    默认属性

    ```


    Spring Boot 将在启动时加载 `application.properties`，因此这些属性可用。现在运行应用程序时，它应该再次生成输出，并遵循
    `application.properties` 中给出的值（图 2-2）。


    ![](img/464036_2_En_2_Fig2_HTML.jpg)


    一个 Marten 窗口的截图。它显示了一组 Spring Boot 中的程序代码，这些代码运行应用程序并生成遵循 application.properties
    中给定值的输出。


    图 2-2


    计算器应用程序输出


    尽管您现在已将属性外部化到 `application.properties` 中，但这些属性仍然打包在应用程序内部。这意味着您仍然需要更改它们才能进行不同的计算。想象一下，对于一个真正的生产系统，仅仅因为配置需要更改就创建新的构建产物。Spring
    Boot 可以通过多种方式帮助您解决这个问题。


    #### 使用外部 application.properties 文件覆盖属性


    首先构建构建产物，并使用 `java -jar recipe_2_2-3.0.0.jar` 启动应用程序。它仍将运行并使用提供的、打包在内的 `application.properties`。现在，在与构建产物相同的位置，添加
    `application.properties` 并为不同的属性设置值。参见清单 2-10。


    ```

    lhs=26

    rhs=952

    op=*

    清单 2-10

    示例覆盖属性

    ```


    再次启动应用程序时，它将使用此 `application.properties` 中的值。参见图 2-3。


    ![](img/464036_2_En_2_Fig3_HTML.jpg)


    一个 Marten 窗口的截图。它显示了一组 Spring Boot 中的程序代码，这些代码启动应用程序并使用 application.properties
    中的值。


    图 2-3


    计算器应用程序输出 - 使用覆盖属性


    #### 使用配置文件覆盖属性


    Spring Boot 可以使用激活的配置文件来加载额外的配置文件，这些文件可以完全替换或覆盖通用配置的一部分。让我们在 `src/main/resources`
    中添加 `application-add.properties`，其中包含 `op` 的不同值。参见清单 2-11。


    ```

    op=+

    清单 2-11

    特定于配置文件的属性


    现在构建构建产物（一个 JAR 文件），并从命令行使用 `java -jar recipe_2_2-3.0.0.jar --spring.profiles.active=add`
    启动它。它将启动并使用 `application.properties` 和 `application-add.properties` 中的属性来配置应用程序。注意，执行的是加法运算而不是乘法运算（图
    2-4），这表明 `application-add.properties` 中的属性优先级高于通用的 `application.properties` 属性。


    ![](img/464036_2_En_2_Fig4_HTML.jpg)


    一个 Marten 窗口的截图。它显示了一组 Spring Boot 中的程序代码，这些代码启动了一个加法运算，该运算优先级高于通用的 application.properties。


    图 2-4


    计算器应用程序输出 - 使用配置文件覆盖属性


    ![](img/464036_2_En_2_Fige_HTML.gif)一个灯泡图标。当使用外部的 `application.properties` 和 `application-{profile}.properties`
    文件时，这也同样适用。

