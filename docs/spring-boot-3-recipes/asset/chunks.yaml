    ## 8-4\. Configure RabbitMQ


    ### Problem


    You want to use AMQP messaging in a Spring Boot application and need to connect
    to the RabbitMQ broker.


    ### Solution


    Configure the appropriate `spring.amqp` properties (minimal `spring.amqp.host`)
    to connect to the exchange and be able to send and receive messages.


    ### How It Works


    Spring Boot will automatically create a `ConnectionFactory` instance when it detects
    the RabbitMQ library on the classpath. To get started, you need to add the `spring-boot-starter-amqp`
    dependencies. This will pull in all the required dependencies. See Listing [8-22](#464036_2_En_8_Chapter.xhtml#PC27).


    ```

    org.springframework.boot

    spring-boot-starter-amqp


    Listing 8-22

    Spring Boot Starter AMQP Dependency

    ```


    Now you can use the `spring.amqp` properties to connect to the broker. See Listing
    [8-23](#464036_2_En_8_Chapter.xhtml#PC28).


    ```

    spring.amqp.host=localhost

    spring.amqp.port=5672

    spring.amqp.username=guest

    spring.amqp.password=guest

    Listing 8-23

    Spring AMQP Basic Configuration

    ```


    This configuration is all that is needed to connect to a default instance of RabbitMQ
    using the Spring Boot defaults (see Table [8-10](#464036_2_En_8_Chapter.xhtml#Tab10)).


    Table 8-10


    RabbitMQ Properties


    | Property | Description |

    | --- | --- |

    | `spring.amqp.addresses` | A comma-separated list of addresses to which the client
    should connect. |

    | `spring.amqp.connection-timeout` | Sets a connection timeout. The default is
    none; `0` means never timeout. |

    | `spring.amqp.host` | Sets the RabbitMQ host. |

    | `spring.amqp.port` | Sets the RabbitMQ port. |

    | `spring.amqp.username` | Sets the username to use for connecting; the default
    is `guest`. |

    | `spring.amqp.password` | Sets the password to use for connecting; the default
    is `guest`. |

    | `spring.amqp.publisher-confirms` | Sets whether to enable publisher confirms.
    The default is `false`. |

    | `spring.amqp.publisher-returns` | Sets whether to enable publisher returns.
    The default is `false`. |

    | `spring.amqp.requested-heartbeat` | Sets the requested heartbeat timeout. The
    default is none; `0` means no heartbeat. |

    | `spring.amqp.virtual-host` | Sets the virtual host to use when connecting to
    the broker. |


    ## 8-5\. Send Messages Using RabbitMQ


    ### Problem


    You want to send a message to a RabbitMQ broker so that the message can be delivered
    to the receiver.


    ### Solution


    Using `RabbitTemplate`, you can send messages to an exchange and provide a routing
    key.


    ### How It Works


    Spring Boot automatically configures a `RabbitTemplate` when it finds a unique
    `ConnectionFactory`; this template can be used to send a message to a queue.


    #### Configure the RabbitTemplate


    Spring Boot will automatically configure a `RabbitTemplate` if it can find a unique
    `ConnectionFactory` and if no `RabbitTemplate` exists in the configuration. Spring
    Boot allows you to modify the configured `RabbitTemplate` through properties in
    the `spring.rabbitmq.template` namespace (see Table [8-11](#464036_2_En_8_Chapter.xhtml#Tab11)).


    Table 8-11


    RabbitTemplate Configuration Properties


    | Property | Description |

    | --- | --- |

    | `spring.rabbitmq.template.exchange` | Sets the name of the default exchange
    to use for send operations; the default is none. |

    | `spring.rabbitmq.template.routing-key` | Sets the value of a default routing
    key to use for send operations; the default is none. |

    | `spring.rabbitmq.template.receive-timeout` | Sets the timeout for send and receive
    operations. |

    | `spring.rabbitmq.template.reply-timeout` | Sets the timeout for receive operations.
    |


    Spring Boot also makes it easy to configure retry logic with `RabbitTemplate`,
    but by default it is disabled. Putting `spring.rabbitmq.template.retry.enabled=true`
    in `application.properties` will enable it. Now when sending fails, it will try
    an additional two times to send the message. To change the number of retries or
    the interval, you can use properties from the `spring.rabbitmq.template.retry`
    namespace (see Table [8-12](#464036_2_En_8_Chapter.xhtml#Tab12)).


    Table 8-12


    RabbitTemplate Retry Configuration


    | Property | Description |

    | --- | --- |

    | `spring.rabbitmq.template.retry.enabled` | Enables publishing retries; the default
    is false. |

    | `spring.rabbitmq.template.retry.max-attempts` | Sets the number of attempts
    to deliver a message; the default is 3. |

    | `spring.rabbitmq.template.retry.initial-interval` | Sets the duration between
    the first and second publishing attempts; the default is 1 second. |

    | `spring.rabbitmq.template.retry.max-interval` | Sets the number of attempts
    to deliver a message; the default is 10 seconds. |

    | `spring.rabbitmq.template.retry.multiplier` | Sets the multiplier to apply to
    the previous interval; the default is 1.0. |'
