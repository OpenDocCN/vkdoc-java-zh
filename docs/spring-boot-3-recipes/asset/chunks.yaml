    ## 2-4\. 配置日志记录


    ### 问题


    您希望为特定的日志记录器配置日志级别。


    ### 解决方案


    使用 Spring Boot，您可以配置日志框架及其配置。


    ### 工作原理


    Spring Boot 为支持的日志提供程序（Logback、Log4J2 和 Java Util Logging）提供了默认配置。除了默认配置外，它还支持通过常规的
    `application.properties` 文件配置日志级别，以及指定日志输出模式和可选的日志文件写入位置。


    Spring Boot 使用 SLF4J 作为日志记录 API，在编写组件时，您应使用这些接口来记录日志。这样，您就可以自由选择使用哪种日志框架。


    #### 配置日志级别


    使用日志框架时，常见的操作之一是启用或禁用框架特定部分的日志记录。使用 Spring Boot，您可以通过在 `application.properties`
    文件中添加几行配置来实现。这些配置行需要以 `logging.level.` 开头，后跟日志记录器的名称，最后是您想要设置的日志级别。


    ```

    logging.level.org.springframework.web=DEBUG

    ```


    上述配置将为 `org.springframework.web` 日志记录器（通常包括该包及其子包中的所有类）启用 DEBUG 级别的日志记录。要设置根日志记录器的级别，请使用
    `logging.level.ROOT=<level>`。这将设置日志记录的默认级别。


    #### 将日志输出到文件


    默认情况下，Spring Boot 仅将日志输出到控制台。如果您还想将日志写入文件，则需要指定 `logging.file` 或 `logging.path`。前者指定文件名，后者指定路径。默认文件名为
    `spring.log`，默认目录为 Java 临时目录。


    ```

    logging.file=application.log

    logging.path=/var/log

    ```


    通过此配置，一个名为 `application.log` 的日志文件将被写入 `/var/log` 目录。


    将日志写入文件时，您可能希望防止日志文件淹没系统。您可以使用 `logging.file.max-history` 指定保留的文件数量（默认为 0，表示无限制），并使用
    `logging.file.max-size` 指定文件大小（默认为 10 MB）。


    #### 使用您偏好的日志提供程序


    Spring Boot 默认使用 Logback 作为日志提供程序。它也支持 Java Util Logging 和 Log4j 2。要使用其他日志框架，您需要先排除默认框架，然后引入您自己的框架。Spring
    Boot 提供了 `spring-boot-starter-log4j2` 来包含 Log4j 2 的所有必要依赖。要排除默认的 Logback 日志记录，您需要在
    `spring-boot-starter` 依赖中添加一个排除规则。这是引入日志记录的主要依赖。


    *   ① 引入 `spring-boot-starter` 依赖，并排除 `spring-boot-starter-logging`。


    *   ② 引入 `spring-boot-starter-log4j` 以引入 Log4j 2 的必要依赖。


    ```

    ①

    org.springframework.boot

    spring-boot-starter


    org.springframework.boot

    spring-boot-starter-logging


    ②

    org.springframework.boot

    spring-boot-starter-log4j2


    ```


    ![](img/464036_2_En_2_Figh_HTML.gif)一个信息图标，圆圈内包含字母 i。  Spring Boot 3 不支持较旧的 Log4j
    框架。它支持其继任者 Log4j 2。


    ## 2-5\. 重用现有配置


    ### 问题


    您有一个现有的应用程序或模块，并且希望使用 Spring Boot 重用其配置。


    ### 解决方案


    要导入现有配置，请在带有 `@Configuration` 或 `@SpringBootApplication` 注解的类上添加 `@Import` 或 `@ImportResource`
    注解。


    ### 工作原理


    在您的主应用程序类（带有 `@SpringBootApplication` 注解的类）上，放置 `@Import` 或 `@ImportResource`
    注解，让 Spring 加载额外的文件。


    #### 重用现有的 XML 配置


    找到带有 `@SpringBootApplication` 注解的类，并为其添加 `@ImportResource` 注解。


    ```

    @SpringBootApplication

    @ImportResource("classpath:application-context.xml")

    public class Application { ... }

    ```


    由于使用了 `classpath:` 前缀，此配置将从类路径加载 `application-context.xml` 文件。如果文件位于文件系统的某个位置，您可以使用
    `file:` 前缀，例如 `file:/var/conf/application-context.xml`。


    在引导应用程序时，Spring Boot 将从指定的 XML 文件中加载额外的配置。


    #### 重用现有的 Java 配置


    找到带有 `@SpringBootApplication` 注解的类，并为其添加 `@Import` 注解。


    ```

    @SpringBootApplication

    @Import(ExistingConfiguration.class)

    public class Application { ... }

    ```


    `@Import` 注解将负责将指定的类添加到配置中。如果您想包含组件扫描未覆盖的内容，或者您已禁用 `@Configuration` 类的自动检测，则可能需要这样做。


    ## 2-6\. 在开发期间将 Docker 与 Spring Boot 结合使用


    Docker 已成为一种流行的技术，通过在开发和生成环境中使用容器化环境来推动开发。


    ### 问题


    您有一些容器化的基础设施（例如数据库、消息传递提供程序、电子邮件等），您希望在开发和本地测试期间也能使用它们。


    ### 解决方案


    Spring Boot 以两种方式支持容器化环境。首先，它可选地支持 Docker Compose；其次，它可以利用 Testcontainers 来引导容器，就像在测试中一样（参见配方
    2-3）。


    可以通过包含 `spring-boot-docker-compose` 依赖来启用 Docker Compose 支持。当它在应用程序文件夹的根目录中检测到
    `docker-compose.yml` 或 `compose.yml` 文件时，它将在启动应用程序之前使用该文件启动容器。它将使用 `ConnectionProvider`
    抽象和 `@ServiceConnection` 支持（参见配方 2-3 关于 Testcontainers 和 Docker 支持的内容）来确定哪些容器已启动，并将元数据（如
    URL、用户名、密码等）自动提供给 Spring Boot。


    ![](img/464036_2_En_2_Figi_HTML.gif)一个信息图标，圆圈内包含字母 i。默认情况下，Docker Compose 支持在测试中被禁用，以支持使用
    Testcontainers。


    另一种选择是使用 Testcontainers 定义一些容器，并使用 `@ImportTestcontainers` 注解来启动容器化环境。这样做的一个额外好处是，您可以重用编写测试时使用的相同容器定义。


    ### 工作原理

