    the current record is processed or after all the records from previous polls have
    been processed. The default is `false`. |

    | `spring.kafka.listener.auto-startup` | Sets whether to automatically start the
    container. The default is `true`. |

    | `spring.kafka.listener.change-consumer-thread-name` | Sets whether the consumer
    thread should be changed during startup. The default is none. |


    #### Receive a Simple Message


    A component with an `@KafkaListener` annotation is all that is needed to start
    receiving messages from Kafka. See Listing [8-43](#464036_2_En_8_Chapter.xhtml#PC50).


    ```

    @Component

    class HelloWorldReceiver {

    @KafkaListener(

    topics = "hello",

    groupId = "recipe_8_9_i" )

    public void handle(String msg) {

    System.out.println("[RECEIVED] - " + msg);

    }

    }

    Listing 8-43

    Kafka Listener for String Messages

    ```


    This component will receive all the messages from the `hello` topic and print
    it to the console. This works fine for `String`-based payloads. However, when
    sending objects or complex messages, one might prefer to use JSON, XML, or maybe
    even AVRO.


    #### Receive an Object


    To receive a more complex object without relying on Java serialization, you need
    to configure a `Serializer` (see also Recipe 8-8). The configured `Serializer`
    will be used by the message listener container to convert incoming payloads into
    an object required by the `@KafkaListener` annotated method. See Listing [8-44](#464036_2_En_8_Chapter.xhtml#PC51).


    ```

    spring.kafka.bootstrap-servers=localhost:9092

    spring.kafka.consumer.value-deserializer=\

    org.springframework.kafka.support.serializer.JsonDeserializer

    spring.kafka.properties.spring.json.trusted.packages=\

    com.apress.springboot3recipes.order

    Listing 8-44

    JSON Serializer Configuration

    ```


    To configure the `Serializer` used by the Kafka client, we can add some configuration
    properties to `application.properties`. In this case, we can add the `spring.kafka.consumer.value-deserializer`
    property. This will register the serializer to convert the actual value being
    sent from a Java object to JSON. We also need to specify `spring.json.trusted.packages`
    as we need to allow it to serialize our classes. This can be done by specifying
    it using `spring.kafka.properties`, which can be used to set additional properties.
    See Listing [8-45](#464036_2_En_8_Chapter.xhtml#PC52).


    ```

    @Component

    class OrderService {

    @KafkaListener(topics = "orders")

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    Listing 8-45

    Kafka Listener for Orders

    ```


    This listener will user the `orders` topic to receive messages. When started,
    the topic will automatically be created if they don’t already exist. The incoming
    message is converted into an `Order` using the configured `JsonDeserializer`.
    The output should be similar to that of Figure [8-10](#464036_2_En_8_Chapter.xhtml#Fig10).


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig10_HTML.jpg)


    An output of Kafka Listener for Orders. The starting Kafka receiver application
    using Java 21.0.1 with P I D 33009, no active profile set, container zookeeper
    created, the started Kafka receiver application in 16.175 seconds, and the received
    order i d and amount are included in the output.


    Figure 8-10


    Kafka listener output for orders


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Figg_HTML.gif)An information icon.The
    sample recipe uses the Spring Boot Docker support to launch a Kafka container
    to send and receive messages.


    #### Receive a Message and Send a Reply


    When receiving a message, it might be necessary to send a response to the client
    or communicate with a different message. Using an `@KafkaListener` on a nonvoid
    method is possible. This will create a result message and place it on the topic,
    which needs to be specified in the `@SendTo` annotation. See Listing [8-46](#464036_2_En_8_Chapter.xhtml#PC53).


    ```

    @Component

    class OrderService {

    @KafkaListener(topics = "orders")

    @SendTo("order-confirmations")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.id());

    }

    }

    Listing 8-46

    Kafka Listener for Orders with Reply

    ```


    When receiving an `Order` after processing it, an `OrderConfirmation` will be
    sent. The `@SendTo` annotation (from the general Spring Messaging component) contains
    the topic name. Another listener could be used to process the `OrderConfirmation`
    messages. See Listing [8-47](#464036_2_En_8_Chapter.xhtml#PC54).


    ```

    @Component

    class OrderConfirmationService {

    @KafkaListener(topics = "order-confirmations")

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    Listing 8-47

    OrderConfirmationService for Kafka

    ```


    When running the code, together with the sender from Recipe 8-8, you should receive
    `Order` instances and see that they will be confirmed as well.


    ## Summary


    In this chapter, we looked at the messaging support from Spring and how to use
    it with Spring Boot. We covered JMS, RabbitMQ, and Kafka. However, support for
    messaging doesn’t end there. There is also support for Apache Pulsar and more;
    they all follow the same pattern for receiving and sending messages.'
  trans: '

    ### 工作原理


    一个包含 `@KafkaListener` 和/或 `@KafkaHandler` 注解方法的 Bean 将被用作传入消息的消息监听器。系统会构建一个消息监听器容器，注解方法将接收传入的消息。消息监听器容器可以通过
    `spring.rabbitmq.listener` 命名空间中的属性进行配置（参见表 8-18）。


    表 8-18


    Kafka 监听器属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.kafka.listener.type` | 设置监听器容器类型 `SINGLE` 或 `BATCH`；默认为 `SINGLE`。 |

    | `spring.kafka.listener.ack-mode` | 设置容器确认模式；默认为 none。 |

    | `spring.kafka.listener.async-acks` | 设置是否异步确认；默认为 none。仅在 ack-mode 设置为 `MANUAL`
    或 `MANUAL-IMMEDIATE` 时有用。 |

    | `spring.kafka.listener.client-id` | 设置 `client-id` 属性的前缀。 |

    | `spring.kafka.listener.concurrency` | 设置监听器调用线程的最小数量。 |

    | `spring.kafka.listener.poll-timeout` | 设置轮询消费者时的超时时间。 |

    | `spring.kafka.listener.no-poll-threshold` | 设置应用于 `poll-timeout` 的乘数，以确定消费者是否无响应。
    |

    | `spring.kafka.listener.ack-count` | 设置 `ack-mode COUNT` 或 `COUNT_TIME` 的偏移量提交之间的记录数。
    |

    | `spring.kafka.listener.ack-time` | 设置 `ack-mode TIME` 或 `COUNT_TIME` 的偏移量提交之间的时间间隔。
    |

    | `spring.kafka.listener.idle-between-polls` | 设置消费者轮询之间的间隔。 |

    | `spring.kafka.listener.idle-event-interval` | 设置发布空闲消费者事件之间的时间间隔。 |

    | `spring.kafka.listener.idle-partition-event-interval` | 设置发布空闲分区消费者事件之间的时间间隔。
    |

    | `spring.kafka.listener.monitor-interval` | 设置检查无响应消费者之间的时间间隔。 |

    | `spring.kafka.listener.log-container-config` | 设置是否在启动时记录容器配置；默认为 none。 |

    | `spring.kafka.listener.missing-topics-fatal` | 设置如果主题缺失，容器是否失败；默认为 `false`。
    |

    | `spring.kafka.listener.immediate-stop` | 设置容器是在处理完当前记录后停止，还是在处理完之前轮询的所有记录后停止。默认为
    `false`。 |

    | `spring.kafka.listener.auto-startup` | 设置是否自动启动容器。默认为 `true`。 |

    | `spring.kafka.listener.change-consumer-thread-name` | 设置是否应在启动时更改消费者线程名称。默认为
    none。 |


    #### 接收简单消息


    一个带有 `@KafkaListener` 注解的组件就是开始从 Kafka 接收消息所需的全部。参见清单 8-43。


    ```

    @Component

    class HelloWorldReceiver {

    @KafkaListener(

    topics = "hello",

    groupId = "recipe_8_9_i" )

    public void handle(String msg) {

    System.out.println("[RECEIVED] - " + msg);

    }

    }

    清单 8-43

    用于字符串消息的 Kafka 监听器

    ```


    该组件将接收来自 `hello` 主题的所有消息并将其打印到控制台。这对于基于 `String` 的负载来说效果很好。然而，当发送对象或复杂消息时，人们可能更倾向于使用
    JSON、XML，甚至可能是 AVRO。


    #### 接收对象


    要接收更复杂的对象而不依赖 Java 序列化，你需要配置一个 `Serializer`（另请参阅配方 8-8）。配置好的 `Serializer` 将由消息监听器容器使用，以将传入的负载转换为
    `@KafkaListener` 注解方法所需的对象。参见清单 8-44。


    ```

    spring.kafka.bootstrap-servers=localhost:9092

    spring.kafka.consumer.value-deserializer=\

    org.springframework.kafka.support.serializer.JsonDeserializer

    spring.kafka.properties.spring.json.trusted.packages=\

    com.apress.springboot3recipes.order

    清单 8-44

    JSON 序列化器配置

    ```


    要配置 Kafka 客户端使用的 `Serializer`，我们可以向 `application.properties` 添加一些配置属性。在这种情况下，我们可以添加
    `spring.kafka.consumer.value-deserializer` 属性。这将注册序列化器，以将实际发送的值从 Java 对象转换为 JSON。我们还需要指定
    `spring.json.trusted.packages`，因为我们需要允许它序列化我们的类。这可以通过使用 `spring.kafka.properties`
    来指定，该属性可用于设置其他属性。参见清单 8-45。


    ```

    @Component

    class OrderService {

    @KafkaListener(topics = "orders")

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    清单 8-45

    用于订单的 Kafka 监听器

    ```


    该监听器将使用 `orders` 主题来接收消息。启动时，如果主题不存在，将自动创建。传入的消息使用配置的 `JsonDeserializer` 转换为 `Order`。输出应类似于图
    8-10 所示。


    ![](img/464036_2_En_8_Fig10_HTML.jpg)


    用于订单的 Kafka 监听器的输出。启动的 Kafka 接收器应用程序使用 Java 21.0.1，进程 ID 为 33009，未设置活动配置文件，已创建容器
    zookeeper，Kafka 接收器应用程序在 16.175 秒内启动，输出中包含接收到的订单 ID 和金额。


    图 8-10


    订单的 Kafka 监听器输出


    ![](img/464036_2_En_8_Figg_HTML.gif)信息图标。示例配方使用 Spring Boot Docker 支持来启动一个 Kafka
    容器以发送和接收消息。


    #### 接收消息并发送回复


    在接收消息时，可能需要向客户端发送响应或与不同的消息进行通信。可以在非 void 方法上使用 `@KafkaListener`。这将创建一个结果消息并将其放置到主题上，该主题需要在
    `@SendTo` 注解中指定。参见清单 8-46。


    ```

    @Component

    class OrderService {

    @KafkaListener(topics = "orders")

    @SendTo("order-confirmations")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.id());

    }

    }

    清单 8-46

    带回复的订单 Kafka 监听器

    ```


    当接收到一个 `Order` 并在处理之后，将发送一个 `OrderConfirmation`。`@SendTo` 注解（来自通用的 Spring Messaging
    组件）包含主题名称。另一个监听器可用于处理 `OrderConfirmation` 消息。参见清单 8-47。


    ```

    @Component

    class OrderConfirmationService {

    @KafkaListener(topics = "order-confirmations")

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    清单 8-47

    用于 Kafka 的 OrderConfirmationService

    ```


    运行代码时，结合配方 8-8 中的发送方，你应该会收到 `Order` 实例，并看到它们也会被确认。


    ## 总结


    在本章中，我们研究了 Spring 的消息传递支持以及如何将其与 Spring Boot 一起使用。我们涵盖了 JMS、RabbitMQ 和 Kafka。然而，对消息传递的支持并不仅限于此。还有对
    Apache Pulsar 等的支持；它们在接收和发送消息方面都遵循相同的模式。

