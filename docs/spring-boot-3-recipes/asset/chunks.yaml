    `management.metrics.enable` 属性中。此属性是一个映射，包含要启用哪些指标的键和值。参见清单 9-6。


    ```

    management.metrics.enable.system=false

    management.metrics.enable.tomcat=false

    清单 9-6

    禁用某个类别的指标

    ```


    此配置将禁用 `system` 和 `tomcat` 指标。当在 `http://localhost:8090/actuator/metrics` 查看指标时，您会发现它们已不在列表中。


    ## 9-2\. 创建自定义健康检查和指标


    ### 问题


    您的应用程序需要暴露某些默认情况下不可用的指标，并执行某些健康检查。


    ### 解决方案


    健康检查和指标是可插拔的，类型为 `HealthIndicator` 和 `MetricBinder` 的 Bean 会被自动注册，以提供额外的健康检查和指标。您只需创建一个实现所需接口的类，并在上下文中将该类的一个实例注册为
    Bean，即可使其为健康和指标功能做出贡献。

