    ## 10-3\. 通过精简启动器减小归档文件大小


    ### 问题


    Spring Boot 默认生成一个*胖 JAR*，即一个包含所有依赖项的 JAR 文件。这有一些明显的好处，因为 JAR 文件是完全自包含的。然而，JAR
    文件的大小可能会显著增长，并且当使用多个应用程序时，你可能希望重用已下载的依赖项以减少总体占用空间。


    ### 解决方案


    在打包应用程序时，你可以指定要使用的自定义布局。这种行为可以通过使用自定义布局来改变。其中一种自定义布局是精简启动器。该启动器将导致依赖项在启动应用程序之前被下载，而不是将依赖项打包在应用程序内部。

    '
- fmt: '### How It Works


    When using the Spring Boot plugin as is, all the needed libraries are included
    in the archive in the `BOOT-INF/lib` folder. However, one might want to reduce
    the size of the JAR and enable reuse of dependencies to create an even smaller
    overall footprint. For example, the archive generated with Recipe 10-1 is around
    7.1 MB. Most of this comes from included dependencies.


    It is possible to add a custom layout and launcher to the Spring Boot plugin.
    A layout defines where the sources are loaded from, and the launcher uses this
    information to load those dependencies. The Thin Launcher will download the artifacts
    from Maven Central and place them in a shared repository. So when multiple applications
    share the dependencies, they are downloaded only once.


    To use the Thin Launcher, add a dependency to the Spring Boot plugin. See Listing
    [10-8](#464036_2_En_10_Chapter.xhtml#PC8).


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    org.springframework.boot.experimental

    spring-boot-thin-layout

    1.0.31.RELEASE


    Listing 10-8

    Thin Layout Configuration

    ```


    This is enough to create a considerably smaller archive (there is no `BOOT-INF/lib`
    directory inside the archive anymore). When running `mvn verify`, the resulting
    JAR is around 12 KB. The drawback is, however, that it needs to download the dependencies
    when the application is started, so starting the application might take longer
    depending on the number of dependencies.


    What happens is that a class named `ThinJarWrapper` has been added, and that will
    be the entrypoint of your application. Now your application contains a `pom.xml`
    and/or `META-INF/thin.properties` file to determine the dependencies. The `thinJarWrapper`
    will locate another JAR file (the “launcher”). The wrapper downloads the launcher
    (if it needs to) or else uses the cached version in your local Maven repository.


    The launcher then takes over and reads `pom.xml` (if present) and `META-INF/thin.properties`,
    downloading the dependencies (and all transitives) as necessary. It will now create
    a custom class loader with all the downloaded dependencies on the classpath. Then
    it runs the application’s own main method with that class loader.


    > **An information icon.** When downloading the dependencies from Maven, it will
    respect the settings made in the Maven `settings.xml` file as it uses regular
    Maven tooling. When using a mirror, like Nexus, for Maven repositories, include
    `thin.repo` in the `META-INF/thin.properties` file to point to that mirror. Otherwise,
    downloading the launcher will fail.


    ## 10-4. Containerize a Spring Boot Application


    Using Docker to build and ship containers is a common practice nowadays. When
    using Spring Boot, it is quite easy to wrap that into a Docker container.


    ### Problem


    You want to run your Spring Boot–based application inside a Docker container.


    ### Solution


    Create a `Dockerfile` and use one of the Docker plugins available to Maven to
    build the Docker container.


    > **An information icon.** In this recipe we choose to use `docker-maven-plugin`
    from Fabric8, but there are others that work equally well.


    ### How It Works


    First you will need a `Dockerfile` containing the information needed to build
    the container. When the container has been built, you can launch it using the
    `docker run` command.


    #### Update a Build Script to Produce a Docker Container


    To create a Docker container, first create a `Dockerfile`. The `Dockerfile` is
    the file containing the information on how to build the container. Place this
    file in the root of the project. See Listing [10-9](#464036_2_En_10_Chapter.xhtml#PC9).


    ```

    FROM eclipse-temurin:21-jre-alpine

    ARG JAR_FILE

    COPY ${JAR_FILE} app.jar

    ENTRYPOINT ["java","-Djava.security.egd=file:/dev/./urandom","-jar","/app.jar"]

    Listing 10-9

    Dockerfile

    ```


    With this `Dockerfile` we use the Eclipse Temurin–provided container to build
    our own. We are going to add our application to it using the `ADD` command, and
    finally we need to tell the container what to start during startup. For this you
    can use the `ENTRYPOINT` command.


    > **A fire icon.** Using publicly available containers as a starting point might
    seem like a good idea, but you have to be aware of the possible security implications
    this can have. As you don’t control that specific container, you cannot guarantee
    what is built into (or not into) the container. For real-life situations, you
    might want to build your own base containers.


    The `ARG` in the `JAR_FILE` argument is telling the build that there is a variable
    `JAR_FILE` available that can be used in the build script. We will provide the
    value of that variable through the plugin configuration.


    The `ENTRYPOINT` simply specifies that it will run `java -jar /app.jar`; you could
    also combine this with Recipe 14-1 and install an executable JAR as a script,
    making the entrypoint a little smaller.


    Now that there is a `Dockerfile`, you need to add `docker-maven-plugin` to your
    build section of the `pom.xml` file. See Listing [10-10](#464036_2_En_10_Chapter.xhtml#PC10).


    ```

    io.fabric8

    docker-maven-plugin

    0.43.4


    target/${project.build.finalName}.jar


    Listing 10-10

    Docker Maven Plugin

    ```


    The `buildArgs` elements are for passing arguments to the `docker build` command
    so that they can be made available when processing the `Dockerfile`. As we have
    specified a `JAR_FILE`, we also declare that in the configuration and point it
    to the location of the generated artifact.


    #### Build and Start the Container


    Now that everything is in place, you can use `mvn package docker:build` to generate
    a Docker container.


    To launch the container, you can run it with something like Listing [10-11](#464036_2_En_10_Chapter.xhtml#PC11).


    ```

    docker run -d springboot3recipes/recipe_10_4_i:latest

    Listing 10-11

    Docker Command

    ```


    This will start a container in the background, and it will start to print messages
    to the console. To see the logs, do `docker logs <name-of-container> --follow`,
    and you will see a message printed every two seconds (see Figure [10-3](#464036_2_En_10_Chapter.xhtml#Fig3)).


    **Figure 10-3** Log output of the Docker container'
  raw: '### How It Works


    When using the Spring Boot plugin as is, all the needed libraries are included
    in the archive in the `BOOT-INF/lib` folder. However, one might want to reduce
    the size of the JAR and enable reuse of dependencies to create an even smaller
    overall footprint. For example, the archive generated with Recipe 10-1 is around
    7.1 MB. Most of this comes from included dependencies.


    It is possible to add a custom layout and launcher to the Spring Boot plugin.
    A layout defines where the sources are loaded from, and the launcher uses this
    information to load those dependencies. The Thin Launcher will download the artifacts
    from Maven Central and place them in a shared repository. So when multiple applications
    share the dependencies, they are downloaded only once.


