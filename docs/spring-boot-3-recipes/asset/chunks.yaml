  trans: '

    #### 处理 REST 控制器的异常


    编写一个自定义的 `ErrorAttributes` 来替换默认的（图 3-10），并填充作为响应写入的模型。


    ![](img/464036_2_En_3_Fig10_HTML.jpg)


    一个 Marten 窗口的截图。它显示了一段程序代码，该代码定义了自定义的错误属性，用于替换默认属性并填充作为响应写入的模型。


    图 3-10

    默认错误响应


    默认情况下，Spring Boot 会在错误响应的模型中包含表 3-5 中列出的属性。


    表 3-5

    默认错误模型属性


    | 属性 | 描述 |

    | --- | --- |

    | `timestamp` | 提取错误的时间 |

    | `status` | 状态码 |

    | `error` | 错误原因 |

    | `exception` | 根异常的类名（如果已配置） |

    | `message` | 异常消息 |

    | `errors` | 来自 `BindingResult` 的任何错误（使用绑定和/或验证时） |

    | `trace` | 异常堆栈跟踪（如果已配置） |

    | `path` | 引发异常时的 URL 路径 |


    这一切都是通过使用 `ErrorAttributes` 组件完成的。默认使用和配置的是 `DefaultErrorAttributes`。你可以创建自己的
    `ErrorAttributes` 处理器来创建自定义模型，或者扩展 `DefaultErrorAttributes` 来添加额外的属性。参见清单 3-23。


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.web.error.ErrorAttributeOptions;

    import org.springframework.boot.web.servlet.error.DefaultErrorAttributes;

    import org.springframework.web.context.request.WebRequest;

    import java.util.Map;

    public class CustomizedErrorAttributes extends DefaultErrorAttributes {

    @Override

    public Map getErrorAttributes(WebRequest webRequest,

    ErrorAttributeOptions options) {

    var errorAttributes = super.getErrorAttributes(webRequest, options);

    errorAttributes.put("parameters", webRequest.getParameterMap());

    return errorAttributes;

    }

    }

    清单 3-23

    自定义 ErrorAttributes 实现

    ```


    `CustomizedErrorAttributes` Bean 会将原始请求参数添加到默认属性旁边的模型中。下一步是将其配置为一个 Bean，以便 Spring
    Boot 能够检测到它并使用它，而不是配置默认的。将清单 3-24 中的 Bean 定义添加到 `LibraryApplication` 中即可实现。


    ```

    @Bean

    public CustomizedErrorAttributes errorAttributes() {

    return new CustomizedErrorAttributes();

    }

    清单 3-24

    自定义 ErrorAttributes Bean 定义

    ```


    这将生成图 3-11 中所示的错误；请注意额外的 `parameters` 属性。


    ![](img/464036_2_En_3_Fig11_HTML.jpg)


    一个 Marten 窗口的截图。它包含一段程序代码，该代码生成了带有额外参数属性的内部服务器错误。


    图 3-11

    自定义错误响应


    #### 启用并使用问题详情


    Spring 6 增加了对 HTTP API 问题详情（RFC-7807）的支持，并且在 Spring Boot 中启用它非常容易。通过添加 `spring.mvc.problemdetails.enabled=true`（或对于基于
    WebFlux 的应用程序添加 `spring.webflux.problemdetails.enabled=true`），即可启用此支持。


    启用后，Spring Boot 会以更高的优先级注册 `ProblemDetailsExceptionHandler` 作为额外的 `ExceptionHandler`。`ProblemDetailsExceptionHandler`
    将处理一些众所周知的异常（所有与 Spring 相关的 Web 异常），并返回包含更多信息的结果，包括类型 `application/problem+json`（见图
    3-12）。


    ![](img/464036_2_En_3_Fig12_HTML.jpg)


    一个 Marten 窗口的截图。它包含一段程序代码，该代码生成了在启用问题详情支持后调用本地主机的结果，并返回包含更多信息的结果，包括应用程序类型和带有 JSON
    的问题。


    图 3-12

    问题详情错误响应


    图 3-12 显示了在启用问题详情支持后调用 `http://localhost:8080/books/500` 的结果。


    这将适用于所有不同的 Spring MVC 异常。当发生验证或绑定错误时，它还会显示一个字段列表，其中包含失败的错误信息。它甚至会将（如果可能）这些错误消息翻译成客户端使用的语言（有关
    I18N 支持，另请参阅配方 3-6）。


    ## 3-5. 实现国际化（I18N）


    ### 问题


    在开发国际化 Web 应用程序时，你必须以用户偏好的区域设置显示网页。你不想为不同的区域设置创建同一页面的不同版本。


    ### 解决方案


    为了避免为不同区域设置创建页面的不同版本，你应该通过外部化区域设置敏感的文本消息来使你的网页独立于区域设置。Spring 能够通过使用消息源为你解析文本消息，该消息源必须实现
    `MessageSource` 接口。在你的页面模板中，你可以使用特殊标签或查找消息。

    '
- fmt: '### How It Works


    Spring Boot automatically configures a `MessageSource` when it finds a `messages.properties`
    file in `src/main/resources` (the default location). This `messages.properties`
    file contains the default messages to be used in your application. Spring Boot
    will use the `Accept-Language` header from the request to determine which locale
    to use for the current request (see Recipe 3-6 on how to change that).


    There are some properties that change the way the `MessageSource` reacts to missing
    translations, caching, etc. See Table [3-6](#464036_2_En_3_Chapter.xhtml#Tab6)
    for an overview of the properties.


    **Table 3-6** I18N Properties


    | Property | Description |

    | --- | --- |

    | `spring.messages.basename` | Comma-separated list of base names; the default
    is `messages`. |

    | `spring.messages.encoding` | Message bundle encoding; the default is `UTF-8`.
    |

    | `spring.messages.always-use-message-format` | Sets whether `MessageFormat` should
    be applied to all messages; the default is `false`. |

    | `spring.messages.fallback-to-system-locale` | Fallback to the system’s locale
    when no resource bundle for the detected locale can be found. When disabled, this
    will load the defaults from the default file. The default is `true`. |

    | `spring.messages.use-code-as-default-message` | Use the message code as a default
    message when no message can be found instead of throwing a `NoSuchMessageException`.
    The default is `false`. |

    | `spring.messages.cache-duration` | Cache duration; the default is `forever`.
    |


    > 💡 A bulb icon. It can be useful to set `spring.messages.fallback-to-system-locale`
    to `false` when deploying your application to the cloud or other external hosting
    parties. That way you control what the default language of your application is,
    instead of the (out of your control) environment you are deploying on.


    Add a `messages.properties` file to the `src/main/resources` directory. See Listing
    [3-25](#464036_2_En_3_Chapter.xhtml#PC29).


    ```

    main.title=Spring Boot Recipes - Library

    index.title=Library

    index.books.link=List of books

    books.list.title=Available Books

    books.list.table.title=Title

    books.list.table.author=Author

    books.list.table.isbn=ISBN

    ```


    **Listing 3-25** Default Messages


    Now change the templates to use the translations. See Listing [3-26](#464036_2_En_3_Chapter.xhtml#PC30).


    ```

    Spring Boot Recipes - Library


    Library

    List of books

    ```


    **Listing 3-26** Index Page with I18N Support


    For Thymeleaf, you can use an `#{...}` expression in the `th:text` attribute;
    this will (due to the automatic Spring integration) resolve the messages from
    the `MessageSource`. When restarting the application, it appears as if nothing
    has changed in the output. However, all the texts now come from the `messages.properties`.


    Now let’s add a `messages_nl.properties` for the Dutch translation of the website.
    See Listing [3-27](#464036_2_En_3_Chapter.xhtml#PC31).


    ```

    main.title=Spring Boot Recipes - Bibliotheek

    index.title=Bibliotheek

    index.books.link=Lijst van boeken

    books.list.title=Beschikbare Boeken

    books.list.table.title=Titel

    books.list.table.author=Auteur

    books.list.table.isbn=ISBN

    ```


    **Listing 3-27** Dutch Messages


    Now when changing the accept header to Dutch, the website will magically translate
    to Dutch (see Figure [3-13](#464036_2_En_3_Chapter.xhtml#Fig13)).


    > 💡 A bulb icon. Changing the language for your browser might not be that easy;
    for Chrome and Firefox there are plugins that allow you to switch the `Accept-Language`
    header easily.


    ![A screenshot of the local host window in the Spring Boot. It displays the translated
    link under the title Bibliotheek.](images/464036_2_En_3_Chapter/464036_2_En_3_Fig13_HTML.jpg)


    **Figure 3-13** Dutch translated index page


    ## 3-6. Change User Locales


    ### Problem


    For your web application to support internationalization, you have to identify
    each user’s preferred locale and display contents according to this locale.


    ### Solution


    In a Spring MVC application, a user’s locale is identified by component, which
    has to implement the `LocaleResolver` interface. Spring MVC comes with several
    `LocaleResolver` implementations for you to resolve locales by different criteria.
    Alternatively, you may create your own custom locale resolver by implementing
    this interface.


    You can define a locale resolver by registering a bean of type `LocaleResolver`
    in the web application context. You must set the bean name of the locale resolver
    to `localeResolver` so it can be autodetected.


    ### How It Works


    Spring MVC ships with several default implementations of the `LocaleResolver`
    interface, some of which allow the `Locale` to be changed. To change the `Locale`,
    one can use a specific `HandlerInterceptor` to allow users to override the locale
    they want to use, the `LocaleChangeInterceptor`.


    #### Resolve Locales with an HTTP Request Header


    The default locale resolver registered by Spring Boot is the `AcceptHeaderLocaleResolver`.
    It resolves locales by inspecting the `Accept-Language` header of an HTTP request.
    This header is set by a user’s web browser according to the locale setting of
    the underlying operating system. See Listing [3-28](#464036_2_En_3_Chapter.xhtml#PC32).


    > ℹ️ An information icon with the letter i inside a circle. The `AcceptHeaderLocaleResolver`
    cannot change a user’s locale because it is unable to modify the locale setting
    of the user’s operating system.


    ```

    @Bean

    public LocaleResolver localeResolver () {

    return new AcceptHeaderLocaleResolver();

    }

    ```


    **Listing 3-28** `AcceptHeaderLocaleResolver` Bean Definition


    #### Resolve Locales with a Session Attribute


    Another option of resolving locales is by `SessionLocaleResolver`. It resolves
    locales by inspecting a predefined attribute in a user’s session. If the session
    attribute doesn’t exist, this locale resolver determines the default locale from
    the `Accept-Language` HTTP header. See Listing [3-29](#464036_2_En_3_Chapter.xhtml#PC33).


    ```

    @Bean

    public LocaleResolver localeResolver () {

    var localeResolver = new SessionLocaleResolver();

    localeResolver.setDefaultLocale(Locale.forLanguageTag("en"));

    return localeResolver;

    }

    ```


    **Listing 3-29** `SessionLocaleResolver` Bean Definition


    You can set the `defaultLocale` property for this resolver in case the session
    attribute doesn’t exist. Note that this locale resolver is able to change a user’s
    locale by altering the session attribute that stores the locale.'
