    ### 工作原理


    在测试 JDBC 代码时，需要一个数据库，通常使用像 H2、Apache Derby 或 HSQLDB 这样的嵌入式数据库进行测试。Spring Boot
    让编写 JDBC 代码的测试变得简单。基于 JDBC 的测试可以使用 `@JdbcTest` 注解，Spring Boot 将创建一个仅包含 JDBC 相关
    Bean（如 `DataSource` 和事务管理器）的最小化应用程序。


    #### 使用嵌入式数据库测试 JDBC 代码


    让我们为 `JdbcCustomerRepository` 编写一个测试，并使用 H2 作为嵌入式数据库。首先，将 H2 添加为测试依赖项（清单 6-24）。


