- fmt: '#### Change the Runtime Container


    When including the `spring-boot-starter-web` dependency, it will automatically
    include a dependency to the Tomcat container as it has a dependency on the `spring-boot-starter-tomcat`
    artifact. To enable a different servlet container, `spring-boot-starter-tomcat`
    needs to be excluded, and one of `spring-boot-starter-jetty` or `spring-boot-starter-undertow`
    needs to be included. See Listing [3-34](#464036_2_En_3_Chapter.xhtml#PC39).


    ```

    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-starter-tomcat


    org.springframework.boot

    spring-boot-starter-jetty


    Listing 3-34

    Exclusion of Tomcat and Use of Jetty

    ```


    In Maven, you can use an `<exclusion>` element inside your `<dependency>` to exclude
    a dependency.


    Now when the application is started, it will start with Jetty instead of using
    Tomcat (see Figure [3-14](#464036_2_En_3_Chapter.xhtml#Fig14)).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig14_HTML.jpg)


    A screenshot of a page reads a set of program codes in Spring Boot. It lists the
    links that start the library, initializes the server, adds the welcome page template,
    connects the server, and starts the jetty on the port.


    Figure 3-14


    Bootstrap logging with the Jetty container


    ## 3-8. Configure SSL for the Servlet Container


    ### Problem


    You want your application to be accessible through HTTPS next (or instead of)
    HTTP.


    ### Solution


    Get a certificate, place it in a keystore, and use the `server.ssl` properties
    to configure the keystore. Spring Boot will then automatically configure the server
    to be accessible through HTTPS only.


    ### How It Works


    Using the `server.ssl.keystore` (and related properties), you can configure the
    embedded container to accept only an HTTPS connection. Before you can configure
    SSL, you will need to have a certificate to secure your application with. Generally,
    you will want to get a certificate from a certificate authority like Verisign
    or Let’s Encrypt. However, for development purposes, you can use a self-signed
    certificate (see the section “Create a Self-Signed Certificate”).


    #### Create a Self-Signed Certificate


    Java comes with a tool called the `keytool`, which can be used to generate certificates,
    among other things. See Listing [3-35](#464036_2_En_3_Chapter.xhtml#PC40).


    ```

    keytool -genkey -keyalg RSA -alias sb3-recipes -keystore sb3-recipes.pfx -storepass
    password -validity 3600 -keysize 4096 -storetype pkcs12

    Listing 3-35

    keytool Command

    ```


    This command will tell `keytool` to generate a key using the RSA algorithm and
    place it in the keystore named `sb3-recipes.pfx` with the alias `sb3-recipes`,
    and it will be valid for 3,600 days. When running the command, it will ask a few
    questions. Answer them accordingly (or leave them empty). After that, there will
    be a file called `sb3-recipes.pfx` containing the certificate and protected with
    a password.


    Place this file in the `src/main/resources` folder so that it is packaged as part
    of your application and Spring Boot can easily access it.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fign_HTML.gif)A triangular abstract
    reads an exclamatory symbol inside it. It resembles a warning icon. Using a self-signed
    certificate will produce a warning in the browser that the website isn’t safe
    and protected.


    #### Configure Spring Boot to Use the Keystore


    Spring Boot will need to know about the keystore to be able to configure the embedded
    container. For this use the `server.ssl.keystore` property. You will also need
    to specify the type of keystore (`pkcs12`) and the password. See Listing [3-36](#464036_2_En_3_Chapter.xhtml#PC41)
    and Figure [3-15](#464036_2_En_3_Chapter.xhtml#Fig15).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig15_HTML.jpg)


    A screenshot of the local host page under the Spring Boot. It displays the list
    of titles, authors, and I S B N under available books. The page is addressed through
    the h t t p link.


    Figure 3-15


    Library accessed through HTTPS


    ```

    server.ssl.key-store=classpath:sb3-recipes.pfx

    server.ssl.key-store-type=pkcs12

    server.ssl.key-store-password=password

    server.ssl.key-password=password

    server.ssl.key-alias=sb2-recipes

    Listing 3-36

    SSL Properties

    ```


    #### Support Both HTTP and HTTPS


    Spring Boot by default starts only one connector, either HTTP or HTTPS, but not
    both. If you want to support both HTTP and HTTPS, you will manually have to add
    an additional connector. It is easiest to create the HTTP connector yourself and
    let Spring Boot set up the SSL part.


    First let’s configure Spring Boot to start the server on port 8443. See Listing
    [3-37](#464036_2_En_3_Chapter.xhtml#PC42).


    ```

    server.port=8443

    Listing 3-37

    Server Property for the Port

    ```


    To add an additional connector to the embedded Tomcat, you will need to add `TomcatServletWebServerFactory`
    as a bean to our context. Normally Spring Boot would detect the container and
    select the `WebServerFactory` to use; however, as a customization needs to be
    done, we need to add it manually. See Listing [3-38](#464036_2_En_3_Chapter.xhtml#PC43).


    ```

    @Bean

    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

