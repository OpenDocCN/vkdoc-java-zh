    ### 工作原理


    带有 `@RabbitListener` 和/或 `@RabbitHandler` 注解方法的 Bean 将被用作传入消息的消息监听器。系统会构建一个消息监听器容器，注解方法将接收传入的消息。消息监听器容器可以通过
    `spring.rabbitmq.listener` 命名空间中的属性进行配置（参见表 8-13）。


    表 8-13


    Rabbit 监听器属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.rabbitmq.listener.type` | 设置监听器容器类型 `direct` 或 `simple`；默认为 `simple`。
    |

    | `spring.rabbitmq.listener.simple.acknowledge-mode` | 设置容器确认模式；默认为 none。 |

    | `spring.rabbitmq.listener.simple.prefetch` | 设置单次请求中处理的消息数量；默认为 none。 |

    | `spring.rabbitmq.listener.simple.default-requeue-rejected` | 设置被拒绝的消息是否应重新入队。
    |

    | `spring.rabbitmq.listener.simple.concurrency` | 设置监听器调用线程的最小数量。 |

    | `spring.rabbitmq.listener.simple.max-concurrency` | 设置监听器调用线程的最大数量。 |

    | `spring.rabbitmq.listener.simple.transaction-size` | 设置单个事务中处理的消息数量。为获得最佳效果，该值应小于或等于预取大小。
    |

    | `spring.rabbitmq.listener.direct.acknowledge-mode` | 设置容器确认模式；默认为 none。 |

    | `spring.rabbitmq.listener.direct.prefetch` | 设置单次请求中处理的消息数量；默认为 none。 |

    | `spring.rabbitmq.listener.direct.default-requeue-rejected` | 设置被拒绝的消息是否应重新入队。
    |

    | `spring.rabbitmq.listener.direct.consumers-per-queue` | 设置被拒绝的消息是否应重新入队。 |


    #### 接收简单消息


    一个带有 `@RabbitListener` 注解的组件即可开始从 RabbitMQ 接收消息。参见清单 8-31。


    ```

    @Component

    class HelloWorldReceiver {

    @RabbitListener( queues = "hello")

    public void receive(String msg) {

    System.out.println("Received: " + msg);

    }

    }

    清单 8-31

    用于字符串消息的 RabbitMQ 监听器

    ```


    该组件将从 `hello` 队列接收所有消息并将其打印到控制台（图 8-7）。这对于简单负载或接收对象可以从消息负载中反序列化的情况效果良好。然而，当发送对象或复杂消息时，您可能更倾向于使用
    JSON 或 XML。


    ![](img/464036_2_En_8_Fig7_HTML.jpg)


    一个用于字符串消息的 RabbitMQ 监听器的输出。它从 hello 队列接收所有消息并将其打印到控制台。输出中包含使用 Java 21.0.1 启动的
    Rabbit 发送方应用程序（PID 33009，未设置活动配置文件），以及启动的 Rabbit 发送方应用程序（耗时 1.803 秒）。


    图 8-7


    RabbitMQ 监听器输出


    #### 接收对象


    要接收更复杂的对象而不依赖 Java 序列化，您需要配置一个 `MessageConverter`（另请参阅配方 8-4）。配置好的 `MessageConverter`
    将被消息监听器容器用于将传入负载转换为 `@RabbitListener` 注解方法所需的对象。参见清单 8-32。


    ```

    @Bean

    public Jackson2JsonMessageConverter jsonMessageConverter() {

    return new Jackson2JsonMessageConverter();

    }

    清单 8-32

    JSON MessageConverter 配置

    ```


    要配置 `MessageConverter`，请创建一个带有 `@Bean` 注解的方法并构造您要使用的转换器；此处转换器是基于 Jackson 2 的，但还有一个用于解组
    XML 的转换器：`MarshallingMessageConverter`。参见清单 8-33。


    ```

    @Component

    class OrderService {

    @RabbitListener(bindings =

    @QueueBinding(

    exchange =@Exchange(name="orders", type = ExchangeTypes.TOPIC),

    value = @Queue(name = "incoming-orders"),

    key = "new-order"

    ))

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    清单 8-33

    用于订单的 Rabbit 监听器

    ```


    上述监听器将使用 `orders` 交换机（这是一个主题交换机），并使用 `new-order` 路由键为 `incoming-orders` 队列创建绑定。启动时，如果交换机和队列不存在，它们将自动创建。传入的消息会使用
    `Jackson2JsonMessageConverter` 转换为 `Order` 对象。输出应类似于图 8-8。


    ![](img/464036_2_En_8_Fig8_HTML.jpg)


    一个用于订单的 Rabbit 监听器的输出。输出中包含使用 Java 21.0.1 启动的 Rabbit 发送方应用程序（PID 33009，未设置活动配置文件），启动的
    Rabbit 接收方应用程序（耗时 2.063 秒），以及接收到的订单 ID 和金额。


    图 8-8


    RabbitMQ 监听器输出：订单

