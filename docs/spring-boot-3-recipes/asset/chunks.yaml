  trans: '

    # 7. Java 企业级服务


    在本章中，你将学习 Spring Boot 对最常见 Java 企业级服务的支持：使用 Java 管理扩展（JMX）、通过 Jakarta Mail 发送电子邮件以及任务调度。


    JMX 是 Java SE 的一部分，是一种用于管理和监控系统资源（如设备、应用程序、对象和服务驱动型网络）的技术。这些资源以托管 Bean（MBean）的形式表示。Spring
    通过将任意 Bean 导出为模型 MBean 来支持 JMX，而无需针对 JMX API 进行编程。


    Jakarta Mail 是 Java 中用于发送电子邮件的标准 API 和实现。Spring 进一步提供了一个抽象层，以独立于实现的方式发送电子邮件，并且
    Spring Boot 在检测到时会自动添加配置。


    在 Java 平台上进行任务调度主要有两种选择：JDK Timer 和 Quartz Scheduler。JDK Timer 提供了与 JDK 捆绑的简单任务调度功能。与
    JDK Timer 相比，Quartz 提供了更强大的作业调度功能。对于这两种选择，Spring 都提供了工具类，用于在 Bean 配置文件中配置调度任务，而无需直接使用任一
    API。


    我们还将介绍如何使用 Java Flight Recorder 以及 Micrometer API 来深入了解应用程序的行为和使用情况。


    ## 7-1. 配置 Spring 异步处理


    ### 问题


    你想要异步调用一个包含长时间运行方法的方法。


    ### 解决方案


    Spring 支持配置 `TaskExecutor`，并能够异步执行带有 `@Async` 注解的方法。这可以以一种透明的方式完成，无需进行异步执行的常规设置。然而，Spring
    Boot 不会自动检测异步方法执行的需求。必须使用 `@EnableAsync` 配置注解来启用此支持。


    ### 工作原理


    让我们编写一个组件，以异步方式向控制台打印一些内容。参见清单 7-1。


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorldService {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    @Async

    public void printMessage() {

    try {

    Thread.sleep(500);

    } catch (InterruptedException ex) {

    Thread.currentThread().interrupt();

    }

    logger.info("Hello World, from Spring Boot 3!");

    }

    }

    清单 7-1

    简单的 HelloWorldService

    ```


    该类将等待 500 毫秒，然后向日志记录器打印内容。方法上的 `@Async` 注解表明该方法将以异步方式执行。但是，必须为 Spring Boot 应用程序显式启用此支持。


    要启用异步处理，需要使用 `@EnableAsync` 配置注解。最简单的解决方案是将此注解添加到你的应用程序类中。参见清单 7-2。


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.scheduling.annotation.EnableAsync;

    import java.io.IOException;

    @SpringBootApplication

    @EnableAsync

    public class ThreadingApplication {

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ThreadingApplication.class, args);

    System.out.println("Press [ENTER] to quit:");

    System.in.read();

    }

    @Bean

    public ApplicationRunner startupRunner(HelloWorldService hello) {

    return (args) -> hello.printMessage();

    }

    }

    清单 7-2

    启用异步处理的 Spring Boot 应用程序

    ```


    `@EnableAsync` 注解会注册异步执行方法所需的组件，以及检测带有 `@Async` 注解的方法。如果未显式配置，Spring Boot 将添加一个
    `TaskExecutor`。


    ![](img/464036_2_En_7_Figa_HTML.gif)抽象符号表示信息。 `System.in.read` 在此处用于防止应用程序关闭，以便后台任务能够完成处理。当你按下
    Enter 键时，程序将退出。通常在开发 Web 应用程序时，你不需要这样的东西。


    运行应用程序时，输出将类似于图 7-1。


    ![](img/464036_2_En_7_Fig1_HTML.jpg)


    一组代码。它展示了一个没有设置活动配置文件的线程应用程序，并且使用 Enter 键退出程序。


    图 7-1


    异步执行输出

    '
- fmt: '#### Configure the TaskExecutor


    By default Spring Boot will use a `ThreadPoolTaskExecutor` to run the async tasks.
    This can be configured through properties in the `spring.task.execution` namespace
    (see Table [7-1](#464036_2_En_7_Chapter.xhtml#Tab1)) unless `spring.threads.virtual.enabled`
    is set to `true`, in which case it will use a `SimpleAsyncTaskExecutor` configured
    to create virtual threads (available in Java 21).


    **Table 7-1** Task Properties


    | Property | Description |

    | --- | --- |

    | `spring.task.execution.thread-name-prefix` | Sets the prefix for the threads;
    the default is `task-`. |

    | `spring.task.execution.pool.core-size` | Sets the default number of threads
    to create; the default is 8. |

    | `spring.task.execution.pool.max-size` | Sets the maximum number of threads to
    create; the default is `Integer.MAX_VALUE`. |

    | `spring.task.execution.pool.allow-core-thread-timeout` | Allows core threads
    to time out; enables the growing and shrinking of the pool. The default is `true`.
    |

    | `spring.task.execution.pool.keep-alive` | Sets the idle limit for threads, before
    being terminated. The default is 60 seconds. |

    | `spring.task.execution.pool.queue-capacity` | Sets the task queue capacity.
    The default is `Integer.MAX_VALUE`. New threads will be created only if the queue
    reaches its capacity. Using an unbounded queue will effectively ignore the `max-size`
    property. |

    | `spring.task.execution.shutdown.await-termination` | Sets whether the task executor
    should wait for tasks to complete on shutdown; the default is `false`. |

    | `spring.task.execution.shutdown.await-termination-period` | Sets the time to
    wait for tasks to complete. |

    | `spring.threads.virtual.enabled` | Sets whether we use virtual or platform threads.
    The default is `false`. |


    These properties can be used to configure the Spring Boot–managed `TaskExecutor`.
    As shown in Figure [7-1](#464036_2_En_7_Chapter.xhtml#Fig1), the default thread
    name is prefixed with `task-`, as that is the default. Let’s add the `spring.task.execution.thread-name-prefix`
    property to the `application.properties` file with a value of `sb3r-exec-`. When
    also configuring `spring.task.execution.shutdown.await-termination`, we could
    remove `System.in.read()` as now Spring Boot will wait for the task to complete.
    See Listing [7-3](#464036_2_En_7_Chapter.xhtml#PC3).


    ```

    spring.task.execution.thread-name-prefix=sb3r-exec-

    spring.task.execution.shutdown.await-termination=true

    spring.task.execution.shutdown.await-termination-period=45S

    ```


    *Listing 7-3* Spring Task Application Properties


    With the property in place, you can see that the name of the thread has changed
    to `sb3r-exec-1`, as shown in Figure [7-2](#464036_2_En_7_Chapter.xhtml#Fig2).


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Fig2_HTML.jpg)


    A set of codes. It features the thread application, and the name of the thread
    is changed to s b 3 r hyphen exec hyphen 1.


    **Figure 7-2** Async execution output


    If there are, for some reason, multiple `TaskExecutor` instances in your application,
    you would need to either mark one of them as `@Primary` to be used as the default
    `TaskExecutor` or use the `AsyncConfigurer` interface and implement the `taskExecutor`
    method to return the `TaskExecutor` to use. See Listing [7-4](#464036_2_En_7_Chapter.xhtml#PC4).


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.core.task.VirtualThreadTaskExecutor;

