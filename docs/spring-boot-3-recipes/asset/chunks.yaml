  raw: '#### Specify What to Send with Server Send Events


    Server-Sent-Events are messages from the server to the client. They have a `Content-Type`
    header of `text/event-stream`. They are quite lightweight with only four fields
    (see Table [4-7](#464036_2_En_4_Chapter.xhtml#Tab7)).


    Table 4-7


    Allowed Fields for Server-Sent-Events


    | **Field** | **Description** |

    | --- | --- |

    | `id` | The ID of the event |

    | `event` | The type of event |

    | `data` | The event data |

    | `retry` | Reconnection time for the event stream |


    By default only the `data` element is included in the response.


    To send events from a request handling method, you use the `ServerSentEvent` that
    provided a `builder` method to actually create the `ServerSentEvent` instance.
    To send the `ServerSentEvent` to the client, you need to convert your object to
    this. We can extend the `OrderController`, which was created initially, with a
    dedicated method for `ServerSentEvent` instances (see Listing [4-38](#464036_2_En_4_Chapter.xhtml#PC43)).


    ```

    package com.apress.springboot3recipes.order.rest;

    import com.apress.springboot3recipes.order.Order;

    import com.apress.springboot3recipes.order.OrderService;

    import org.springframework.http.MediaType;

    import org.springframework.http.codec.ServerSentEvent;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Flux;

    import java.time.Duration;

    @RestController

    public class OrderController {

    private final OrderService orderService;

    public OrderController(OrderService orderService) {

    this.orderService = orderService;

    }

    @GetMapping("/orders")

    public Flux orders() {

    return orderService.findAll().delayElements(Duration.ofMillis(32));

    }

    @GetMapping(value = "/orders", produces = MediaType.TEXT_EVENT_STREAM_VALUE)

    public Flux> orderEvents() {

    return orderService.findAll()

    .map(this::toEvent)

    .delayElements(Duration.ofMillis(32));

    }

    private ServerSentEvent toEvent(Order order) {

    return ServerSentEvent.builder(order)

    .event("order-event")

    .id(order.id()).build();

    }

    }

    Listing 4-38

    OrderController with Special ServerSentEvent Request Handling Method

    ```


    We create a dedicated `ServerSentEvent` for each `Order` we receive. We specify
    the `id` and `event`. The `order` is used as the body (the `data` field). Finally,
    after calling the `build` method, we can use the created `ServerSentEvent`.


    Now when the URL `http://localhost:8080/orders` with a `Content-Type` of `text/event-stream`
    is called, you see events coming in one by one (Figure [4-14](#464036_2_En_4_Chapter.xhtml#Fig14)).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig14_HTML.jpg)


    A screenshot of the marten window. It reads a set of program codes in Spring Boot
    that calls the local host page through an H T T P link with a content type of
    text and event stream and displays the events one by one with amount and I D.


    Figure 4-14


    Server-Sent-Events result


    Note the `Content-Type` header; it has a value of `text/event-stream` to indicate
    that we get a stream of events. The stream can be kept open and receive event
    notifications. Each object written is converted to JSON; this is done with an
    `Encoder`. The object is written in the `data` tag as the event data.


    ## 4-11\. Consume REST Resources with Spring WebFlux


    ### Problem


    You need to connect to a REST resource for your application and want to use a
    `WebClient` for this.


    ### Solution


    Spring Boot provides the configuration and builders to help construct the needed
    classes. This recipe will show how to build an application that can be used to
    consume the API built in Recipe 4-2.


    You can use `WebClient.Builder` to create a `WebClient`. Another option is to
    use a declarative client using an `@HttpExchange`.


    ### How It Works


    Although each approach differs in the classes in use, we are still going to need
    a dependency on the web classes for Spring MVC. For this we can add the `spring-boot-starter-webflux`
    dependency. See Listing [4-39](#464036_2_En_4_Chapter.xhtml#PC44).


    ```

    org.springframework.boot

    spring-boot-starter-webflux


    Listing 4-39

    Spring Boot Starter WebFlux Dependency

    ```


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Figk_HTML.gif)An information icon
    with the letter i inside a circle. If you are writing a stand-alone client not
    in need of a servlet container, you might want to add an exclusion for `spring-boot-starter-netty`.


    We are going to use Recipe 4-2 as our server API, and we will write an application
    that looks up a book on that API, calls another API (on [`https://openlibrary.org`](https://openlibrary.org))
    to retrieve additional information for the book, and returns an enriched response.


    The `EnrichedBook` looks like Listing [4-40](#464036_2_En_4_Chapter.xhtml#PC45).


    ```

    package com.apress.springboot3recipes.library;

    import java.util.List;

    import java.util.Objects;

    public record EnrichedBook(

    String isbn,

    String title,

    String published,

    List authors) {

    @Override

    public boolean equals(Object o) {

    if (o instanceof EnrichedBook book) {

    return Objects.equals(isbn, book.isbn);

    }

    return false;

    }

    @Override

    public int hashCode() {

    return Objects.hash(isbn);

    }

    }

    Listing 4-40

    EnrichedBook Record

    ```


    This is a slightly extended version of the `Book` class created in Recipe 3-2
    (see Listing [3-6](#464036_2_En_3_Chapter.xhtml#PC6)). We can reuse the `Book`
    class to bind the result from our own server. For the Open Library API, we will
    use a `HashMap` to put the response in and retrieve the elements we needed.


    #### Use a WebClient


    A `WebClient` is constructed through a `WebClient.Builder`, which is exposed by
    Spring Boot automatically. See Listing [4-41](#464036_2_En_4_Chapter.xhtml#PC46).


    ```

    @Bean

    public WebClient restClient(WebClient.Builder builder) {

    var httpClient = HttpClient.create().followRedirect(true);

    var connector = new ReactorClientHttpConnector(httpClient);

    return builder.clientConnector(connector).build();

    }

    Listing 4-41

    WebClient Bean Definition with Builder

    ```


    `RestClient.Builder` provides some methods to enhance the configuration. Each
    method will result in a new `RestClient.Builder` instance. Here we configure the
    Project Reactor `HttpClient` to automatically follow redirects (HTTP status 301/302)
    as this is disabled by default. The API we are using (from Open Library) uses
    a redirect to point to the right results. See Table [4-8](#464036_2_En_4_Chapter.xhtml#Tab8)
    and Listing [4-42](#464036_2_En_4_Chapter.xhtml#PC47).


    Table 4-8


    WebClient.Builder Configuration Methods


    | **Method** | **Description** |

    | --- | --- |

    | `baseUrl` | Sets the root URL to be used with requests; the default is `null`.
    |

    | `clientConnector` | Configures the `ClientHttpConnector` to be used. Useful
    for using a preconfigured one in case of (for instance) SSL. |

    | `defaultCookie``defaultCookies` | Adds a cookie(s) with a default value. |

    | `defaultHeader``defaultHeaders` | Adds a header(s) with a default value. |

    | `defaultRequest` | Consumer to customize every request that is being built.
    |

    | `defaultStatusHandler` | Registers a default status handler to be applied to
    each response. |

    | `defaultUriVariables` | Default values for URI variables. |

    | `messageConverters` | Replaces the `HttpMessageConverter` that should be used
    with the created `RestTemplate`. |

    | `exchangeFunction` | Registers a default `ExchangeFunction` with a preconfigured
    `Client HttpConnector` and `ExchangeStrategies`. |

    | `exchangeStrategies` | Configures the `ExchangeStrategies` to use. |

    | `filter` | Adds the given filter to the end of the filter chain. |

    | `observationConvention` | Configures the `ObservationConvention` used to collect
    metadata for the request observation/metrics. The default will be set to `DefaultClientRequestObservationConvention`.
    |

    | `observationRegistry` | Configures the `ObservationRegistry` to use for recording
    HTTP Client observations. Generally automatically set by Spring Boot. |

    | `uriBuilderFactory` | Sets the `UriBuilderFactory` to use. |'
