- fmt: "#### Send a Reply\n\nSometimes when receiving a message you want to return\
    \ an answer or trigger another part of the process. With Spring messaging, this\
    \ is pretty easy; you can simply return what you want to send from your handler\
    \ method. To determine where to send the response, you can add an additional `@SendTo`\
    \ annotation to specify the destination. Let’s modify the sample to send an `OrderConfirmation`\
    \ to the `order-confirmation` queue. See Listing [8-19](#464036_2_En_8_Chapter.xhtml#PC24).\n\
    \n```java\n@Component\nclass OrderService {\n@JmsListener(destination = \"orders\"\
    )\n@SendTo(\"order-confirmations\")\npublic OrderConfirmation handle(Order order)\
    \ {\nSystem.out.println(\"[RECEIVED] - \" + order);\nreturn new OrderConfirmation(order.id());\n\
    }\n}\nListing 8-19\nOrderService Sending OrderConfirmation\n```\n\nThe `OrderService`\
    \ configuration changed slightly; it now returns an `OrderConfirmation` after\
    \ processing the order. With the `@SendTo` annotation, we specify which destination\
    \ to put the result on.\n\nLet’s create another listener for the `OrderConfirmation`\
    \ objects so that we can see them coming in. See Listing [8-20](#464036_2_En_8_Chapter.xhtml#PC25).\n\
    \n```java\n@Component\nclass OrderConfirmationService {\n@JmsListener(destination\
    \ = \"order-confirmations\")\npublic void handle(OrderConfirmation confirmation)\
    \ {\nSystem.out.println(\"[RECEIVED] - \" + confirmation);\n}\n}\nListing 8-20\n\
    JMS OrderConfirmationService\n```\n\nThe `OrderConfirmation` class so that we\
    \ know what to marshal into. See Listing [8-21](#464036_2_En_8_Chapter.xhtml#PC26).\n\
    \n```java\npackage com.apress.springboot3recipes.order;\npublic record OrderConfirmation(String\
    \ orderId) { }\nListing 8-21\nSimple OrderConfirmation\n```\n\nWhen running the\
    \ application, you will see that first the order is received and next that the\
    \ `OrderConfirmation` is being received (Figure [8-6](#464036_2_En_8_Chapter.xhtml#Fig6)).\n\
    \n![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig6_HTML.jpg)\n\nAn output of\
    \ a simple order confirmation. The starting J m s sender application using Java\
    \ 21.0, no active profile set, the started J m s sender application in 1.99 seconds,\
    \ spring boot, and the received order and amount are included in the output.\n\
    \n**Figure 8-6** JMS receive output, orders and confirmations\n\n## 8-4. Configure\
    \ RabbitMQ\n\n### Problem\n\nYou want to use AMQP messaging in a Spring Boot application\
    \ and need to connect to the RabbitMQ broker.\n\n### Solution\n\nConfigure the\
    \ appropriate `spring.amqp` properties (minimal `spring.amqp.host`) to connect\
    \ to the exchange and be able to send and receive messages.\n\n### How It Works\n\
    \nSpring Boot will automatically create a `ConnectionFactory` instance when it\
    \ detects the RabbitMQ library on the classpath. To get started, you need to add\
    \ the `spring-boot-starter-amqp` dependencies. This will pull in all the required\
    \ dependencies. See Listing [8-22](#464036_2_En_8_Chapter.xhtml#PC27).\n\n```xml\n\
    <dependency>\n    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-amqp</artifactId>\n\
    </dependency>\nListing 8-22\nSpring Boot Starter AMQP Dependency\n```\n\nNow you\
    \ can use the `spring.amqp` properties to connect to the broker. See Listing [8-23](#464036_2_En_8_Chapter.xhtml#PC28).\n\
    \n```properties\nspring.amqp.host=localhost\nspring.amqp.port=5672\nspring.amqp.username=guest\n\
    spring.amqp.password=guest\nListing 8-23\nSpring AMQP Basic Configuration\n```\n\
    \nThis configuration is all that is needed to connect to a default instance of\
    \ RabbitMQ using the Spring Boot defaults (see Table [8-10](#464036_2_En_8_Chapter.xhtml#Tab10)).\n\
    \n**Table 8-10** RabbitMQ Properties\n\n| Property | Description |\n| --- | ---\
    \ |\n| `spring.amqp.addresses` | A comma-separated list of addresses to which\
    \ the client should connect. |\n| `spring.amqp.connection-timeout` | Sets a connection\
    \ timeout. The default is none; `0` means never timeout. |\n| `spring.amqp.host`\
    \ | Sets the RabbitMQ host. |\n| `spring.amqp.port` | Sets the RabbitMQ port.\
    \ |\n| `spring.amqp.username` | Sets the username to use for connecting; the default\
    \ is `guest`. |\n| `spring.amqp.password` | Sets the password to use for connecting;\
    \ the default is `guest`. |\n| `spring.amqp.publisher-confirms` | Sets whether\
    \ to enable publisher confirms. The default is `false`. |\n| `spring.amqp.publisher-returns`\
    \ | Sets whether to enable publisher returns. The default is `false`. |\n| `spring.amqp.requested-heartbeat`\
    \ | Sets the requested heartbeat timeout. The default is none; `0` means no heartbeat.\
    \ |\n| `spring.amqp.virtual-host` | Sets the virtual host to use when connecting\
    \ to the broker. |\n\n## 8-5. Send Messages Using RabbitMQ\n\n### Problem\n\n\
    You want to send a message to a RabbitMQ broker so that the message can be delivered\
    \ to the receiver.\n\n### Solution\n\nUsing `RabbitTemplate`, you can send messages\
    \ to an exchange and provide a routing key.\n\n### How It Works\n\nSpring Boot\
    \ automatically configures a `RabbitTemplate` when it finds a unique `ConnectionFactory`;\
    \ this template can be used to send a message to a queue.\n\n#### Configure the\
    \ RabbitTemplate\n\nSpring Boot will automatically configure a `RabbitTemplate`\
    \ if it can find a unique `ConnectionFactory` and if no `RabbitTemplate` exists\
    \ in the configuration. Spring Boot allows you to modify the configured `RabbitTemplate`\
    \ through properties in the `spring.rabbitmq.template` namespace (see Table [8-11](#464036_2_En_8_Chapter.xhtml#Tab11)).\n\
    \n**Table 8-11** RabbitTemplate Configuration Properties\n\n| Property | Description\
    \ |\n| --- | --- |\n| `spring.rabbitmq.template.exchange` | Sets the name of the\
    \ default exchange to use for send operations; the default is none. |\n| `spring.rabbitmq.template.routing-key`\
    \ | Sets the value of a default routing key to use for send operations; the default\
    \ is none. |\n| `spring.rabbitmq.template.receive-timeout` | Sets the timeout\
    \ for send and receive operations. |\n| `spring.rabbitmq.template.reply-timeout`\
    \ | Sets the timeout for receive operations. |\n\nSpring Boot also makes it easy\
    \ to configure retry logic with `RabbitTemplate`, but by default it is disabled.\
    \ Putting `spring.rabbitmq.template.retry.enabled=true` in `application.properties`\
    \ will enable it. Now when sending fails, it will try an additional two times\
    \ to send the message. To change the number of retries or the interval, you can\
    \ use properties from the `spring.rabbitmq.template.retry` namespace (see Table\
    \ [8-12](#464036_2_En_8_Chapter.xhtml#Tab12)).\n\n**Table 8-12** RabbitTemplate\
    \ Retry Configuration\n\n| Property | Description |\n| --- | --- |\n| `spring.rabbitmq.template.retry.enabled`\
    \ | Enables publishing retries; the default is false. |\n| `spring.rabbitmq.template.retry.max-attempts`\
    \ | Sets the number of attempts to deliver a message; the default is 3. |\n| `spring.rabbitmq.template.retry.initial-interval`\
    \ | Sets the duration between the first and second publishing attempts; the default\
    \ is 1 second. |\n| `spring.rabbitmq.template.retry.max-interval` | Sets the number\
    \ of attempts to deliver a message; the default is 10 seconds. |\n| `spring.rabbitmq.template.retry.multiplier`\
    \ | Sets the multiplier to apply to the previous interval; the default is 1.0.\
    \ |"
  raw: '#### Send a Reply


    Sometimes when receiving a message you want to return an answer or trigger another
    part of the process. With Spring messaging, this is pretty easy; you can simply
    return what you want to send from your handler method. To determine where to send
    the response, you can add an additional `@SendTo` annotation to specify the destination.
    Let’s modify the sample to send an `OrderConfirmation` to the `order-confirmation`
    queue. See Listing [8-19](#464036_2_En_8_Chapter.xhtml#PC24).


    ```

    @Component

    class OrderService {

    @JmsListener(destination = "orders")

    @SendTo("order-confirmations")

    public OrderConfirmation handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    return new OrderConfirmation(order.id());

    }

    }

    Listing 8-19

    OrderService Sending OrderConfirmation

    ```


    The `OrderService` configuration changed slightly; it now returns an `OrderConfirmation`
    after processing the order. With the `@SendTo` annotation, we specify which destination
    to put the result on.


    Let’s create another listener for the `OrderConfirmation` objects so that we can
    see them coming in. See Listing [8-20](#464036_2_En_8_Chapter.xhtml#PC25).


    ```

    @Component

    class OrderConfirmationService {

    @JmsListener(destination = "order-confirmations")

    public void handle(OrderConfirmation confirmation) {

    System.out.println("[RECEIVED] - " + confirmation);

    }

    }

    Listing 8-20

    JMS OrderConfirmationService

    ```


    The `OrderConfirmation` class so that we know what to marshal into. See Listing
