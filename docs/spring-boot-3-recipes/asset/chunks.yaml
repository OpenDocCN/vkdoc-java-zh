  trans: '

    #### 配置单个管理端点


    可以通过 `management.endpoint.<端点名称>` 命名空间中的属性来配置单个端点。大多数端点至少包含一个 `enabled` 属性和一个
    `cache.time-to-live` 属性。前者用于启用或禁用端点，后者则指定端点结果的缓存时长（参见表 9-2）。


    表 9-2


    端点配置属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.endpoint.<端点名称>.enabled` | 设置特定端点是否启用；通常默认为 `true`，有时取决于某项功能的可用性。例如，如果
    Flyway 不存在，那么启用 `flyway` 端点将不会产生任何效果。 |

    | `management.endpoint.<端点名称>.cache.time-to-live` | 设置响应的缓存时间；默认值为 0ms，表示不缓存。
    |

    | `management.endpoint.health.show-details` | 设置是否显示健康端点的详细信息；默认值为 `never`，可更改为
    `always` 或 `when_authorized`。 |

    | `management.endpoint.configprops.show-values``management.endpoint.env.show-values``management.endpoint.quartz.show-values`
    | 设置何时显示端点的未脱敏值；默认值为 `never`。可更改为 `always` 或 `when_authorized`。 |

    | `management.endpoint.configprops.roles``management.endpoint.env.roles``management.endpoint.health.roles``management.endpoint.quartz.roles`
    | 设置允许查看详细信息的角色（与 `show-details`/`show-values` 的 `when_authorized` 值配合使用）。 |


    在 `application.properties` 中添加 `management.endpoint.health.show-details=always`
    将显示关于应用程序健康状况的更多信息，如图 9-4 所示。


    ![](img/464036_2_En_9_Fig4_HTML.jpg)


    一个 JSON 片段展示了系统状态报告。它表明磁盘空间和 ping 组件均处于正常运行状态。它还提供了磁盘空间的详细信息，包括总容量、可用容量和阈值，以及文件路径。Ping
    状态也显示为正常。


    图 9-4


    扩展的健康端点输出


    #### 保护管理端点


    当 Spring Boot 同时检测到 Spring Boot Actuator 和 Spring Security 时，它会自动启用对管理端点的安全访问。访问端点时，将显示一个基本登录提示，要求输入用户名和密码。Spring
    Boot 会生成一个默认用户名为 `user` 的用户，并附带一个生成的密码（参见配方 5-1）用于登录。


    在 `spring-boot-starter-actuator` 之外添加 `spring-boot-starter-security` 就足以保护您的管理端点。参见清单
    9-4。


    ```

    org.springframework.boot

    spring-boot-starter-security


    清单 9-4

    Spring Boot Security Starter 依赖

    ```


    这将在您的应用程序和管理端点中启用安全性。现在，当访问端点 `http://localhost:8090/actuator` 时，将显示一个基本登录提示。输入正确的凭据后，您应该仍然能够看到结果。


    #### 配置健康检查


    Spring Boot Actuator 的功能之一是进行健康检查。这些检查通过 `http://localhost:8090/actuator/health`
    暴露。如果应用程序状态为 `UP` 或 `DOWN`，则会生成相应结果。健康端点会调用系统中所有可用的 `HealthIndicator`，并在端点中报告它们。您可以通过设置
    `management.health.<健康指示器>.enabled` 属性来控制哪些 `HealthIndicator` 存在。对于不可用的功能（例如，在数据源不可用时尝试获取其信息），将属性设置为
    `true` 不会生效。参见清单 9-5。


    ```

    management.health.diskspace.enabled=false

    清单 9-5

    禁用健康指示器

    ```


    这将禁用磁盘空间的健康检查，并且它不再属于健康检查的一部分。


    #### 配置指标


    Spring Boot Actuator 的功能之一是暴露指标。这些指标通过 `http://localhost:8090/actuator/metrics`
    暴露。这将生成应用程序可用指标的列表（参见图 9-5）。


    ![](img/464036_2_En_9_Fig5_HTML.jpg)


    一个 JSON 数组包含与系统性能和健康相关的各种指标列表，例如磁盘使用情况、执行器活动、JVM 指标、HTTP 服务器请求和线程计数。


    图 9-5


    当前可用指标列表


    您可以通过访问 `http://localhost:8090/actuator/metrics/{指标名称}` 来获取有关某个指标的更多信息。例如，`http://localhost:8090/actuator/metrics/system.cpu.usage`
    将显示当前的 CPU 使用率（图 9-6）。


    ![](img/464036_2_En_9_Fig6_HTML.jpg)


    一个 JSON 对象展示了系统 CPU 使用率指标，描述了应用程序系统的近期 CPU 使用情况。值为 0.15789473684210525。


