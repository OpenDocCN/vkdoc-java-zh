    ## 4-2\. Publish and Consume with Reactive REST Services


    ### Problem


    You want to write a reactive REST endpoint that will produce JSON.


    ### Solution


    Just as with a regular `@RestController`, you can return a regular object or a
    list of objects, and they will be sent to the client. To make them reactive, you
    will have to wrap those return values in their reactive counterparts, a `Mono`
    or a `Flux`.


    ### How It Works


    Let’s start by writing a Reactive `BookService`. Each method will return either
    a `Mono<Book>` or a `Flux<Book>`. See Listing [4-5](#464036_2_En_4_Chapter.xhtml#PC10).


    ```

    package com.apress.springboot3recipes.library;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    public interface BookService {

    Flux findAll();

    Mono create(Book book);

    Mono find(String isbn);

    }

    Listing 4-5

    Reactive BookService Interface

    ```


    For the `BookService` interface, we can write an in-memory implementation. See
    Listing [4-6](#464036_2_En_4_Chapter.xhtml#PC11).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.stereotype.Service;

    import reactor.core.publisher.Flux;

    import reactor.core.publisher.Mono;

    import java.util.Map;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    @Override

    public Flux findAll() {

    return Flux.fromIterable(books.values());

    }

    @Override

    public Mono create(Book book) {

    books.put(book.isbn(), book);

    return Mono.just(book);

    }

    @Override

    public Mono find(String isbn) {

    return Mono.justOrEmpty(books.get(isbn));

    }

    }

    Listing 4-6

    Reactive BookService Implementation (In-Memory)

    ```


    `InMemoryBookService` has some simple methods to obtain or save a book. When retrieving
    all books, it will delay them by 128 milliseconds. The `Book` class is the same
    as used in Chapter [3](#464036_2_En_3_Chapter.xhtml). See Listing [4-7](#464036_2_En_4_Chapter.xhtml#PC12).


    ```

    package com.apress.springboot3recipes.library;

    import java.util.List;

    import java.util.Objects;

    public record Book(String isbn, String title, List authors) {

    @Override

    public boolean equals(Object o) {

    if (o instanceof Book other) {

    return this.isbn != null && Objects.equals(this.isbn, other.isbn);

    }

    return false;

    }

    @Override

    public int hashCode() {

    return Objects.hash(this.isbn);

    }

    }

    Listing 4-7

    Book Record

    ```


