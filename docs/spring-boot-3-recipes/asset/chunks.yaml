    2-1）。主要的区别和优势在于，不再需要手动从 `ApplicationContext` 获取 Bean，因为 Spring 会负责获取正确的 Bean。


    ## 2-2\. 外部化属性


    ### 问题


    你希望使用属性来为不同的环境或执行场景配置你的应用。

    '
- fmt: '### Solution


    Spring Boot supports getting properties from numerous locations. By default it
    will load a file named `application.properties` and also use the OS environment
    variables as well as Java `System` properties. When running from the command line,
    it will also take command-line arguments into consideration. There are more locations
    that are taken into account depending on the type of application and availability
    or capabilities (like JNDI, for instance).^([³](#fn3)) For our application, the
    following resources are taken into consideration in a given order:


    - `application.properties`/`application.yaml` outside of the packaged application

    - `application.properties`/`application.yaml` packaged inside the application

    - OS environment variables

    - Java system properties

    - Command-line arguments


    > A bulb icon. Instead of `.properties` files, you could also use a YAML file
    to express the configuration properties. The same rules as with `.properties`
    files still apply.


    In addition, for the first two options, you can also load a profile-specific one
    based on the active profiles. The profiles to activate can be passed through the
    `spring.profiles.active` property. The profile-specific `application-{profile}.properties`
    profiles take precedence over the non-profile-specific ones. Each will get loaded,
    and with that you can override properties. Therefore, this list is a bit longer:


    - `application-{profile}.properties` outside the packaged application

    - `application.properties` outside of the packaged application

    - `application-{profile}.properties` packaged inside the application

    - `application.properties` packaged inside the application

    - OS environment variables

    - Java system properties

    - Command-line arguments


    ### How It Works


    The `Calculator` created for Recipe 2-1 is pretty flexible; however, the `CalculatorApplication`
    has hard-coded values when it comes to the calculations it does. Now when we want
    to calculate something different, we would need to modify the code, recompile,
    and run the newly compiled code. We probably want to use properties for this so
    that we are able to change them when needed.


    First modify the application to use the values from properties instead of hard-coded
    values. For this, change the `@Bean` method for the `ApplicationRunner` to accept
    three additional parameters, which are going to be annotated with `@Value`. See
    Listing [2-8](#464036_2_En_2_Chapter.xhtml#PC9).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.beans.factory.annotation.Value;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class CalculatorApplication {

    public static void main(String[] args) {

    SpringApplication.run(CalculatorApplication.class, args);

    }

    @Bean

    public ApplicationRunner calculationRunner(Calculator calculator,

    @Value("${lhs}") int lhs,

    @Value("${rhs}") int rhs,

    @Value("${op}") char op) {

    return args -> calculator.calculate(lhs, rhs, op);

    }

    }

    Listing 2-8

    CalculatorApplication Source with Properties

    ```


    The `@Value` will instruct Spring to look up the property and use the value of
    that property. For instance, if we would use a `@Value("${lhs}")`, Spring would
    try to detect a property named `lhs` and use the value. You could also specify
    a default value by adding a semicolon with the value `@Value("${lhs:12}")`. Now,
    if no value can be found, it will use `12`. If there is no default value specified,
    an exception will be thrown. If we started the application now, an exception would
    be thrown explaining that no property called `lhs` can be found.


    Add `application.properties` in `src/main/resources` and put values in there for
    `lhs`, `rhs`, and `op`. See Listing [2-9](#464036_2_En_2_Chapter.xhtml#PC10).


    ```

    lhs=12

    rhs=15

    op=*

    Listing 2-9

    Default Properties

    ```


    Spring Boot will load the `application.properties` at startup, and with that the
    properties are available. Now when running the application, it should again create
    output honoring the values given in `application.properties` (Figure [2-2](#464036_2_En_2_Chapter.xhtml#Fig2)).


    > A screenshot of the marten window. It reads a set of program codes in Spring
    Boot that runs the application and creates the output honoring the values given
    in application properties.


    **Figure 2-2** Calculator application output


    Although you now have externalized the properties into `application.properties`,
    those properties are still packaged up inside the application. That would mean
    you still would need to change them to do a different calculation. Imagine doing
    this for a real production system and creating new artifacts just because your
    configuration needs to change. There are different ways in which Spring Boot can
    help you with that.


    #### Override Properties Using an External application.properties File


    First build the artifact and launch the application with `java -jar recipe_2_2-3.0.0.jar`.
    It will still run and use the supplied and packaged `application.properties`.
    Now in the same location as the artifact, add `application.properties` and put
    values in there for the different properties. See Listing [2-10](#464036_2_En_2_Chapter.xhtml#PC11).


    ```

    lhs=26

    rhs=952

    op=*

    Listing 2-10

    Example Overridden Properties

    ```


    When launching the application again, it will now use the values from this `application.properties`.
    See Figure [2-3](#464036_2_En_2_Chapter.xhtml#Fig3).


    > A screenshot of the marten window. It reads a set of program codes in Spring
    Boot that launches the application and uses the values from the application properties.


    **Figure 2-3** Calculator application output - using overridden properties


    #### Override Properties Using Profiles


    Spring Boot can use the active profiles to load additional configuration files
    that can totally replace or override parts of the general configuration. Let’s
    add `application-add.properties` in `src/main/resources`, which contains a different
    value for `op`. See Listing [2-11](#464036_2_En_2_Chapter.xhtml#PC12).


    ```

    op=+

    Listing 2-11

    Profile-Specific Properties

    ```


    Now build the artifact (a JAR file) and launch it from the command line with `java
    -jar recipe_2_2-3.0.0.jar --spring.profiles.active=add`, and it will start and
    use the properties from both `application.properties` and `application-add.properties`
    to configure the application. Notice how an addition operation is done instead
    of multiplication (Figure [2-4](#464036_2_En_2_Chapter.xhtml#Fig4)), which indicates
    that the `application-add.properties` properties take precedence over the general
    `application.properties` properties.


    > A screenshot of the marten window. It reads a set of program codes in Spring
    Boot that launches an addition operation that takes precedence over the general
    application properties.


    **Figure 2-4** Calculator application output - overridden properties using profiles


    > A bulb icon. This also works when working with an external `application.properties`
    and `application-{profile}.properties` files.'
  raw: '### Solution


    Spring Boot supports getting properties from numerous locations. By default it
    will load a file named `application.properties` and also use the OS environment
    variables as well as Java `System` properties. When running from the command line,
    it will also take command-line arguments into consideration. There are more locations
    that are taken into account depending on the type of application and availability
    or capabilities (like JNDI, for instance).^([³](#fn3)) For our application, the
    following resources are taken into consideration in a given order:


    *   `application.properties`/`application.yaml` outside of the packaged application


    *   `application.properties`/`application.yaml` packaged inside the application


    *   OS environment variables


    *   Java system properties


    *   Command-line arguments


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Figd_HTML.gif)A bulb icon.Instead
    of `.properties` files, you could also use a YAML file to express the configuration
    properties. The same rules as with `.properties` files still apply.


    In addition, for the first two options, you can also load a profile-specific one
    based on the active profiles. The profiles to activate can be passed through the
    `spring.profiles.active` property. The profile-specific `application-{profile}.properties`
    profiles take precedence over the non-profile-specific ones. Each will get loaded,
    and with that you can override properties. Therefore, this list is a bit longer:


    *   `application-{profile}.properties` outside the packaged application


    *   `application.properties` outside of the packaged application


    *   `application-{profile}.properties` packaged inside the application


    *   `application.properties` packaged inside the application


    *   OS environment variables


    *   Java system properties


    *   Command-line arguments


