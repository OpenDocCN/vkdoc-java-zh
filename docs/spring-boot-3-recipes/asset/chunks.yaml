- fmt: '### Create a Self-Signed Certificate


    Java comes with a tool called `keytool` that can be used to generate certificates
    among other things. See Listing [4-32](#464036_2_En_4_Chapter.xhtml#PC36).


    ```

    keytool -genkey -keyalg RSA -alias sb3-recipes -keystore sb3-recipes.pfx -storepass
    password -validity 3600 -keysize 4096 -storetype pkcs12

    Listing 4-32

    keytool Command

    ```


    This command will tell `keytool` to generate a key using the RSA algorithm and
    place it in the keystore named `sb3-recipes.pfx` with the alias `sb3-recipes`,
    and it will be valid for 3,600 days. When running the command, it will ask a few
    questions and answer them accordingly (or leave them empty). After that, there
    will be a file called `sb3-recipes.pfx` containing the certificate protected with
    a password.


    Place this file in the `src/main/resources` folder so that it is packaged as part
    of your application and Spring Boot can easily access it.


    > ⚠️ Using a self-signed certificate will produce a warning in the browser that
    the website isn’t safe or protected.


    ### Configure Spring Boot to Use the Keystore


    Spring Boot will need to know about the keystore to be able to configure the embedded
    container. For this you first create a so-called SSL bundle and use the `server.ssl.bundle`
    property to link it to the server.


    For this use the `server.ssl.keystore` property. You will also need to specify
    the type of keystore (`pkcs12`) and the password. See Listing [4-33](#464036_2_En_4_Chapter.xhtml#PC37).


    ```

    server.ssl.bundle=server

    # SSL Bundle

    spring.ssl.bundle.jks.server.key.alias=sb3-recipes

    spring.ssl.bundle.jks.server.key.password=password

    spring.ssl.bundle.jks.server.keystore.location=classpath:sb3-recipes.pfx

    spring.ssl.bundle.jks.server.keystore.password=password

    spring.ssl.bundle.jks.server.keystore.type=pkcs12

    Listing 4-33

    SSL Properties

    ```


    These SSL properties will create an SSL bundle named `server`. It is a JKS type.
    To pass the alias (as used to create the certificate), use the `key.alias` and
    for the password the `key.password` property. In addition, we need to link to
    the actual certificate, which is in the `sb3-recipes.pfx` file. For this use the
    `keystore.location` as this file is password protected. We need to specify the
    `keystore.password` property, and finally the type of certificate is needed as
    well.


    Now when accessing the server through HTTPS, you will receive a warning due to
    the self-signed certificate. When using an official certificate, you obviously
    wouldn’t get this warning. See Figure [4-9](#464036_2_En_4_Chapter.xhtml#Fig9).


    ![A screenshot of the local host page. It lists the available books with titles,
    authors, and ISBN. The local host is accessed through an HTTP server with a warning
    due to the self-signed certificate.](images/464036_2_En_4_Chapter/464036_2_En_4_Fig9_HTML.jpg)


    **Figure 4-9** Library accessed through HTTPS


    ## 4-9. Perform Synchronous Request Handling with Controllers and TaskExecutor


    ### Problem


    You have a piece of blocking code that you want to execute in an otherwise totally
    reactive stack and you don’t want to block all the processing.


    ### Solution


    When a request comes in, it is handled reactively with an event loop. When calling
    code that blocks, it will block the event loop and prevent further processing.
    Spring WebFlux can use a dedicated `TaskExecutor` for processes that would otherwise
    block the event loop.'
