- fmt: '### How It Works


    When building, a GraalVM native image is created based on the code that is currently
    available in the JVM. Based on that, the GraalVM will compile a native executable.
    GraalVM assumes that all the code that is needed to run the application is present
    in the JVM at the moment the application is being inspected. If the code isn’t
    there, it will not be part of the resulting native executable. The process to
    compile the bytecode in native code is called *ahead-of-time (AOT) compilation*,
    instead of what the JVM does with just-in-time compilation (JIT).


    Spring has support for contributing information ahead of time to GraalVM, and
    Spring Boot leverages that support in the Spring Boot plugins. When running `mvn
    -Pnative native:compile`, you will see a line in the output that reads something
    like `[INFO] --- spring-boot:3.2.1:process-aot (process-aot) @ recipe_10_5_i ---`.
    See Figure [10-5](#464036_2_En_10_Chapter.xhtml#Fig5).


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Fig5_HTML.jpg)


    A screen of the command prompt with Maven plugin output. It includes spring boot,
    starting Hello World Application on v 3.0.0-SNAPSHOT using Java 21.0.1 with P
    I D 27635, no active profile set, falling back to 1 default profile, and INFO.


    **Figure 10-5** Maven plugin output


    While executing `process-aot`, Spring Boot will do a couple of things.


    - Generate source code for bean definitions

    - Generate a file containing GraalVM hints

    - Generate bytecode for proxy classes


    All of these steps are needed for GraalVM to do a proper static analysis of the
    code needed to run the application.


    ### Generate Source Code for Bean Definitions


    As we cannot have dynamic code in a GraalVM native image, we need to have a static
    configuration. Normally an `@Configuration` class is parsed while starting the
    application, and based on the `@Bean` annotated methods, Spring will create special
    `BeanDefinition` source files. The actual `@Bean` methods are being invoked with
    reflection, something we cannot do in a native image.


    Now when creating a native image instead of parsing the `@Configuration` classes
    at runtime and parsing the beans, it generates the bean definitions during the
    AOT processing. It will actually generate a source file for the `@Configuration`
    class. These classes can be found in the `target/spring-aot/main/sources` directory.
    See Figure [10-6](#464036_2_En_10_Chapter.xhtml#Fig6).


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Fig6_HTML.jpg)


    A screen with generated source code for bean definitions. The folders for the
    project are on the left. Hello World Application underscore Bean definitions dot
    java is selected. The code is on the right. The code has a public class, a public
    static, a root bean definition, and initialize configuration class.


    **Figure 10-6** Generated sources


    As you can see, there is also an `org` directory, as it will generate sources
    for all `@Configuration` classes it generates. This also works for the Spring
    Boot auto-configuration classes and other `@Configuration` classes that are loaded.


    ### Generate GraalVM Hints


    In addition to generating sources, Spring AOT will also generate a hints file
    that is used by the GraalVM. The hint file contains data, in JSON format, that
    describes how GraalVM should deal with situations it cannot understand directly,
    like in the case of reflection, multiple constructors, or dynamic class loading.


    The hint file is automatically generated in the `target/spring-aot/main/resources`
    directory. See Figure [10-7](#464036_2_En_10_Chapter.xhtml#Fig7).


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Fig7_HTML.jpg)


    A screen with generated hint files. The folders for the project are on the left.
    The `reflect-config.json` is selected. The code is on the right. The code has
    a name, query all public methods, query all declare methods, fields, and parameter
    types. The `com.apress` is highlighted on the code.


    **Figure 10-7** Generated hint files


    While Spring Boot will do its best to infer the hints to generate based on the
    code, it might be that it cannot determine what to generate, and it might need
    some help. Spring AOT can help here and provides the `RuntimeHintsRegistrar` interface,
    which allows you to register additional hints for the code in question. After
    defining the specific hints, you can use the `@ImportRuntimeHints` annotation
    to make Spring AOT aware of this class. See Listing [10-17](#464036_2_En_10_Chapter.xhtml#PC17).


    ```

    package com.apress.springboot3recipes.helloworld;

    import org.springframework.aot.hint.RuntimeHints;

    import org.springframework.aot.hint.RuntimeHintsRegistrar;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.ImportRuntimeHints;

    import org.springframework.scheduling.annotation.EnableScheduling;

    @SpringBootApplication

    @EnableScheduling

    @ImportRuntimeHints(HelloWorldApplication.HelloWorldRuntimeHints.class)

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    static class HelloWorldRuntimeHints implements RuntimeHintsRegistrar {

    @Override

    public void registerHints(RuntimeHints hints, ClassLoader cl) {

    hints.resources().registerPattern("classpath:/*.properties");

    }

    }

    }

    ```


    **Listing 10-17** Register Runtime Hints


    Here we create resource hints for including all `.properties` files in the root
    of the classpath. This can be needed if files are dynamically loaded and Spring
    or GraalVM isn’t able to detect this. When registering runtime hints, we can register
    hints for `jni`, `proxies`, `reflection`, `resources`, and/or `serialization`.
    All of these will contribute entries to one of the available hint files.


    ### Generate Bytecode for Proxy Classes


    Finally, Spring AOT will generate actual class files containing the bytecode for
    the proxies created at runtime. Proxies are dynamically created classes, and this
    is something that isn’t possible with GraalVM; thus, they are exported at build
    time. The code is generated in the regular `target/classes` directory and can
    be noticed by the `$SpringCGLIB$$<number>` suffix. See Figure [10-8](#464036_2_En_10_Chapter.xhtml#Fig8).


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Fig8_HTML.jpg)


    A screen with generated class files. The folders for the project are on the left.
    The `HelloWorldApplication$$SpringCGLIB$$0` is selected. The code is on the right.
    The package, import, public class, private Boolean, public static, private static
    final, and private method interceptor are included in the code.


    **Figure 10-8** Generated class files


    This proxy is created because of `@SpringBootApplication` also being an `@Configuration`
    class, which has the `proxyBeanMethods` attribute set to `true`. The classfiles
    will be generated for all classes that use AOP like `@Transactional` and security
    annotations, so in a regular application there might be a few classes being generated.'
