    public void shouldReturnOrdres() throws Exception {

    when(orderService.findAll())

    .thenReturn(List.of(new Order("1234", BigDecimal.TEN)));

    MvcResult mvcResult = mockMvc.perform(get("/orders"))

    .andExpect(request().asyncStarted())

    .andDo(MockMvcResultHandlers.log())

    .andReturn();

    mockMvc.perform(asyncDispatch(mvcResult))

    .andDo(MockMvcResultHandlers.log())

    .andExpect(status().isOk())

    .andExpect(content().json("{\"id\":\"1234\",\"amount\":10}"));

    }

    }

    Listing 3-46

    Test for OrderController

    ```


    The test method first registers the behavior on the mocked `OrderService` to return
    a single instance of an `Order`. Next, we use `MockMvc` to perform a `get` on
    the `/orders` endpoint. As this is an async controller, the request should start
    async processing, which is asserted here. Next, we mimic the async dispatching
    and write assertions for the actual response. The result should be a single JSON
    element containing the `id` and `amount`.'
