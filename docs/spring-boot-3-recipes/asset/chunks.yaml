- fmt: '### How It Works


    Recipe 1-1 explained that `@SpringBootApplication` includes both `@ComponentScan`
    and `@Configuration`. This means that any `@Component` annotated class will be
    automatically detected and instantiated by Spring Boot; it also allows for `@Bean`
    methods to be defined to declare beans.


    #### Configure a Bean Using @Component


    First create a class to bootstrap the application. Create a `HelloWorldApplication`
    instance that is annotated with `@SpringBootApplication`. See Listing [2-1](#464036_2_En_2_Chapter.xhtml#PC1).


    ```

    package com.apress.springboot3recipes.helloworld;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class HelloWorldApplication {

    public static void main(String[] args) {

    SpringApplication.run(HelloWorldApplication.class, args);

    }

    }

    Listing 2-1

    HelloWorldApplication Source

    ```


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Figb_HTML.gif)A bulb icon.Place
    the `@SpringBootApplication` annotated class in a top-level package. This way
    it will automatically detect all your annotated components, configuration classes,
    etc.^([¹](#fn1))


    This will bootstrap the application, detect all `@Component` annotated classes,
    and detect which libraries are on the classpath (see also Chapter [1](#464036_2_En_1_Chapter.xhtml)).
    When running this `HelloWorldApplication`, you will see that it won’t do much,
    as there is nothing to detect or to run. Let’s create a simple class that Spring
    Boot will automatically detect.


    ```

    package com.apress.springboot3recipes.helloworld;

    import jakarta.annotation.PostConstruct;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorld {

    @PostConstruct

    public void sayHello() {

    System.out.println("Hello World, from Spring Boot 3!");

    }

    }

    ```


    This class will automatically be detected by Spring Boot due to the `@Component`
    annotation. The `@PostConstruct` annotation tells Spring to invoke this method
    after constructing the bean and injecting all the dependencies. Simply put, at
    startup the `sayHello` method will be run, and the console will print the line
    `Hello World, from Spring Boot 3!`.


    ![](images/464036_2_En_2_Chapter/464036_2_En_2_Figc_HTML.gif)A bulb icon.When
    you need to scan packages not covered by the default component scanning, you can
    use `scanBasePackages` or `scanBasePackagesClasses` on the `@SpringBootApplication`
    annotation to define additional packages to scan.'
