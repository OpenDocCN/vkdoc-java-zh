    ### 工作原理


    首先，你需要在项目中添加 `spring-boot-starter-thymeleaf` 依赖，以获取所需的 Thymeleaf 依赖项。


    ```

    org.springframework.boot

    spring-boot-starter-thymeleaf


    ```


    添加此依赖后，你将获得 Thymeleaf 库以及 Thymeleaf Spring 方言，从而使两者能够良好集成。由于这两个库的存在，Spring Boot
    将自动配置 `ThymeleafViewResolver`。


    `ThymeleafViewResolver` 需要一个 Thymeleaf `ITemplateEngine` 来解析和渲染视图。一个特殊的 `SpringTemplateEngine`
    将预先配置好 `SpringDialect`，以便你可以在 Thymeleaf 页面中使用 SpEL。


    ![](img/464036_2_En_3_Figd_HTML.gif)一个灯泡图标。 要添加其他 Thymeleaf 方言，你只需为其创建一个 `@Bean`
    方法，Spring Boot 会自动检测并将其与 Thymeleaf 连接。其中一些方言甚至会自动配置，例如与 Spring Security 集成时（参见第
    5 章）。


    为了配置 Thymeleaf，Spring Boot 在 `spring.thymeleaf` 命名空间中暴露了多个属性（参见表 3-2）。


    **表 3-2 Thymeleaf 属性**


    | 属性 | 描述 |

    | --- | --- |

    | `spring.thymeleaf.cache` | 设置是否缓存已解析的模板；默认值为 `true`。 |

    | `spring.thymeleaf.check-template` | 在渲染前检查模板是否存在；默认值为 `true`。 |

    | `spring.thymeleaf.check-template-location` | 检查模板位置是否存在；默认值为 `true`。 |

    | `spring.thymeleaf.enabled` | 设置是否启用 Thymeleaf；默认值为 `true`。 |

    | `spring.thymeleaf.enable-spring-el-compiler` | 启用 SpEL 表达式的编译；默认值为 `false`。
    |

    | `spring.thymeleaf.encoding` | 设置模板的编码；默认值为 `UTF-8`。 |

    | `spring.thymeleaf.exclude-view-names` | 列出被排除解析的视图名称（以逗号分隔）。 |

    | `spring.thymeleaf.mode` | 设置要使用的 Thymeleaf `TemplateMode`；默认值为 `HTML`。 |

    | `spring.thymeleaf.prefix` | 设置 `ViewResolver` 使用的 `prefix`；默认值为 `classpath:/templates/`。
    |

    | `spring.thymeleaf.suffix` | 设置 `ViewResolver` 使用的 `suffix`；默认值为 `.html`。 |

    | `spring.thymeleaf.render-hidden-markers-before-checkbox` | 设置复选框的隐藏输入是否应在复选框元素本身之前渲染（默认值为
    `false`）。 |

    | `spring.thymeleaf.template-resolver-order` | 设置 `ViewResolver` 的顺序；默认值为 1。 |

    | `spring.thymeleaf.view-names` | 设置可以使用此 `ViewResolver` 解析的视图名称（以逗号分隔）。 |

    | `spring.thymeleaf.servlet.content-type` | 设置用于写入 HTTP 响应的 Content-Type；默认值为
    `text/html`。 |

    | `spring.thymeleaf.servlet.produce-partial-output-while-processing` | 设置是否应尽快开始写入（部分内容），还是缓冲直到模板处理完成；默认值为
    `true`。 |

    | `spring.thymeleaf.reactive.max-chunk-size` | 设置用于写入响应的数据缓冲区的最大大小。如果未设置，则默认使用分块模式。
    |

    | `spring.thymeleaf.reactive.media-types` | 设置此视图技术支持的媒体类型。 |

    | `spring.thymeleaf.reactive.full-mode-view-names` | 包含一个逗号分隔的视图名称列表（允许使用模式），这些视图应在
    `FULL` 模式下执行。 |

    | `spring.thymeleaf.reactive.chunked-mode-view-names` | 包含一个逗号分隔的视图名称列表（允许使用模式），这些视图应在
    `CHUNKED` 模式下执行。 |


    #### 添加索引页面


    首先，为我们的应用程序添加一个索引页面。在 `src/main/resources/templates` 目录（默认位置）下创建一个 `index.html`
    文件。参见清单 3-13。


    ```


    Spring Boot Recipes - 图书馆


    图书馆

    书籍列表


    清单 3-13 索引页面

    ```


    这只是一个基本的 HTML5 页面，为 Thymeleaf 做了一些小补充。首先，添加 `xmlns:th="`[`http://www.thymeleaf.org`](http://www.thymeleaf.org)`"`
    以启用 Thymeleaf 的命名空间。该命名空间通过 `th:href` 在链接中使用。`@{/books.html}` 部分将由 Thymeleaf 扩展为正确的链接，并放置在链接的实际
    `href` 属性中。


    现在，运行应用程序时，你应该会看到一个包含书籍概览链接的页面（参见图 3-5）。


    ![](img/464036_2_En_3_Fig5_HTML.jpg)


    本地主机页面的截图。它显示了指向名为“图书馆”的书籍列表的链接。


    **图 3-5 渲染后的索引页面**

    '
- fmt: '### Add a Controller and View


    When clicking the link provided in the index page, we want to see a page that
    shows a list of available books in the library (see Figure [3-6](#464036_2_En_3_Chapter.xhtml#Fig6)).
    For this, two things need to be added: first a controller that can handle the
    request and prepare the model and second a view to render the list of books.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig6_HTML.jpg)


    A screenshot of the local host page. It displays a list of titles, authors, and
    I S B N links of the available books.


    **Figure 3-6** Book list page


    Let’s add a controller that will fill the model with a list of books and that
    selects the name of the view to render. A controller is a class annotated with
    `@Controller` and that contains request handling methods (methods annotated with
    `@RequestMapping` or as in this recipe `@GetMapping`, which is a specialized `@RequestMapping`
    annotation). See Listing [3-14](#464036_2_En_3_Chapter.xhtml#PC16).


    ```

    package com.apress.springboot3recipes.library.web;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.springframework.stereotype.Controller;

    import org.springframework.ui.Model;

    import org.springframework.web.bind.annotation.GetMapping;

    @Controller

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping("/books.html")

    public String all(Model model) {

    model.addAttribute("books", bookService.findAll());

    return "books/list";

    }

    }

    ```


    **Listing 3-14** BookController


    `BookController` needs `BookService` so that it can obtain a list of books to
    show. The `all` method has `org.springframework.ui.Model` as a method argument
    so that we can put the list of books in the model. A request handling method can
    have different arguments^([⁴](#fn4)); one of them is the `Model` class. In the
    method, we use the `BookService` to retrieve all the books from the datastore
    and add it to the model using `model.addAttribute`. The list of books is now available
    in the model under the key `books`.


    Finally, we return the name of the view to render `books/list`.


    Now that the controller together with the request handling method has been added,
    we need to create the view. Create a `list.html` file in the `src/main/templates/books`
    directory. See Listing [3-15](#464036_2_En_3_Chapter.xhtml#PC17).


    ```

    Library - Available Books


    Available Books


    Title

    Author

    ISBN


    Title

    Authors

    ISBN

    ```


    **Listing 3-15** Book List Page


    This is again an HTML5 page using the Thymeleaf syntax. The page will render a
    list of books using the `th:each` expression. It will take all the books from
    the `books` property in the model and for each book create a row. Each column
    in the row will contain some text using the `th:text` expression; it will print
    the title, authors, and ISBN of the book. The final column in the table contains
    a link to the book details. It constructs a URL using the `th:href` expression.
    Notice the expression between `()`; this will add the `isbn` request parameter.


    When launching the application and clicking the link on the index page, you should
    be greeted with a page showing the contents of the library, as shown earlier in
    Figure [3-6](#464036_2_En_3_Chapter.xhtml#Fig6).


    ### Add a Details Page


    Finally, when clicking the ISBN number in the table, you want a page with details
    to be shown. The link contains a request parameter named `isbn`, which we can
    retrieve and use in the controller to find a book. The request parameter can be
    retrieved through a method argument annotated with `@RequestParam`.


    The following method will handle the GET request, map the request parameter to
    the method argument, and include the model so that we can add the book to the
    model.


    ```

    @GetMapping(value = "/books.html", params = "isbn")

    public String get(@RequestParam("isbn") String isbn, Model model) {

    bookService.find(isbn)

    .ifPresent(book -> model.addAttribute("book", book));

    return "books/details";

    }

    ```


    The controller will render the `books/details` page. Add the `details.html` file
