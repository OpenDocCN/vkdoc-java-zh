    如果你将 Spring Boot 应用部署到应用服务器（或拥有远程 JNDI 服务器），并希望使用预配置的 `DataSource` 实例，可以使用 `spring.datasource.jndi-name`
    属性让 Spring Boot 从 JNDI 获取 `DataSource`（参见清单 6-6）。


