- fmt: '### How It Works


    Although each approach differs in the classes in use, we are still going to need
    a dependency on the web classes for Spring MVC. For this, we can add the `spring-boot-starter-web`
    dependency. See Listing [3-50](#464036_2_En_3_Chapter.xhtml#PC55).


    ```

    org.springframework.boot

    spring-boot-starter-web


    Listing 3-50

    Spring Boot Starter Web Dependency

    ```


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figv_HTML.gif)An information icon
    with the letter i inside a circle. If you are writing a stand-alone client not
    in need of a servlet container, you might want to add an exclusion for `spring-boot-starter-tomcat`.


    We are going to use Recipe 3-2 as our server API, and we will write an application
    that looks up a book on that API, calls another API (on [`https://openlibrary.org`](https://openlibrary.org))
    to retrieve additional information for the book, and returns an enriched response.


    `EnrichedBook` looks like Listing [3-51](#464036_2_En_3_Chapter.xhtml#PC56).


    ```

    package com.apress.springboot3recipes.library;

    import java.util.List;

    import java.util.Objects;

    public record EnrichedBook(

    String isbn,

    String title,

    String published,

    List authors) {

    @Override

    public boolean equals(Object o) {

    if (o instanceof EnrichedBook book) {

    return Objects.equals(isbn, book.isbn);

    }

    return false;

    }

    @Override

    public int hashCode() {

    return Objects.hash(isbn);

    }

    }

    Listing 3-51

    EnrichedBook Record

    ```


    It is a slightly extended version of the `Book` class created in Recipe 3-2 (see
    Listing [3-6](#464036_2_En_3_Chapter.xhtml#PC6)). For the Open Library API we
    will use a `HashMap` to put the response in and retrieve the elements we needed.


    ### Use a RestTemplate


    To create a `RestTemplate`, we can use the `RestTemplateBuilder`, ideally as an
    argument in an `@Bean` method. With this we can create a new `RestTemplate` as
    a bean. The `RestTemplateBuilder` takes care of configuring the `RestTemplate`
    we need. See Listing [3-52](#464036_2_En_3_Chapter.xhtml#PC57).


    ```

    @Bean

    public RestTemplate restTemplate(RestTemplateBuilder builder) {

    return builder.build();

    }

    Listing 3-52

    RestTemplate Configuration

    ```


    This will construct a new `RestTemplate` for use in our application.


    It is also possible to specify additional configuration for the `RestTemplateBuilder`
    through the helper methods. Each method will construct a new `RestTemplateBuilder`
    as the `RestTemplateBuilder` itself is immutable. So, changes set will not be
    reflected in other places that use a `RestTemplateBuilder`. See Table [3-14](#464036_2_En_3_Chapter.xhtml#Tab14).


    **Table 3-14** RestTemplateBuilder Configuration Methods


    | Method | Description |

    | --- | --- |

    | `additionalCustomizers` | Adds additional `RestTemplateCustomizer` that should
    be applied to the created `RestTemplate`. Applied in the order as added on the
    configuration. |

    | `additionalInterceptors` | Adds additional `ClientHttpRequestInterceptors` that
    should be added/configured on the created `RestTemplate`. |

    | `additionalMessageConverters` | Adds additional `HttpMessageConverter` that
    should be used with the created `RestTemplate`. |

    | `additionalRequestCustomizers` | Adds additional `RestTemplateRequestCustomizer`
    instances to be used to modify the `ClientHttpRequest` for the created `RestTemplate`.
    |

    | `basicAuthentication` | Sets a basic authentication header with `username` and
    `password`. |

    | `customizers` | Replaces the `RestTemplateCustomizer`s that are used by the
    created `RestTemplate`. |

    | `defaultHeader` | Adds a header with a default value. |

    | `detectRequestFactory` | Sets whether the request factory should be detected;
    the default is `true`. Set to `false` when explicitly configuring the `requestFactory`.
    |

    | `errorHandler` | Sets the `ResponseErrorHandler` that should be used with the
    created `RestTemplate`. |

    | `interceptors` | Replaces the interceptors that are used by the created `RestTemplate`.
    |

    | `messageConverters` | Replaces the `HttpMessageConverter` that should be used
    with the created `RestTemplate`. |

    | `requestCustomizers` | Replaces the `RestTemplateRequestCustomizer` instances
    to be used to modify the `ClientHttpRequest` for the created `RestTemplate`. |

    | `requestFactory` | Sets the `ClientHttpRequestFactory` to be used with the created
    `RestTemplate`, by default auto-detected. |

    | `rootUri` | Sets the root URL to be used with requests; the default is `null`.
    |

    | `setConnectTimeout` | Sets the connection timeout to use on the `RestTemplate`.
    |

    | `setReadTimeout` | Sets the read timeout to use on the `RestTemplate`. |

    | `setSslBundle` | If SSL in use, use this to set the SSL configuration. |

    | `uriTemplateHandler` | Sets the `UriTemplateHandler` to use. |


    Let’s write a controller that will fetch a `Book` from our own server (see Recipe
