  trans: "\n### 工作原理\n\nSpring WebFlux 应用在本质上与常规的 Spring MVC 应用有很大不同。尽管如此，Spring Boot\
    \ 和 Spring Security 仍致力于让构建安全的 WebFlux 应用变得更加容易。\n\n要启用安全性，请将 `spring-boot-starter-security`\
    \ 添加到你的 WebFlux 应用中（来自配方 4-3）。参见清单 5-34。\n\n```\norg.springframework.boot\nspring-boot-starter-security\n\
    \n清单 5-34\nSpring Security 启动器依赖\n```\n\n这会将 `spring-security-core`、`spring-security-config`\
    \ 和 `spring-security-web` 依赖项添加到你的项目中。Spring Boot 会检测这些 JAR 文件中某些类的可用性，并据此自动启用安全性。\n\
    \nSpring Boot 将使用以下内容配置 Spring Security：\n\n*   使用基本认证和表单登录进行身份验证\n*   用于安全性的\
    \ HTTP 头\n*   访问任何资源都需要登录\n\n    ![](img/464036_2_En_5_Figi_HTML.gif)一个三角形抽象图形内包含一个感叹号符号。它类似于一个警告图标。Spring\
    \ Boot 会添加一个默认用户，名为 `user`，并附带一个生成的密码，该密码在启动日志中可见。这仅用于测试目的。原型设计和演示不会在真实系统中使用生成的用户。\n\
    \n当将依赖项 `spring-boot-starter-security` 添加到配方 3-3 时，它会自动保护所有暴露的端点。在启动时，生成的密码会被记录下来（参见图\
    \ 5-6）。\n\n![](img/464036_2_En_5_Fig6_HTML.jpg)\n\nSpring Boot 页面的截图。它包含一组程序日志，这些日志会自动保护所有暴露的端点，并且在启动时，生成的密码会被记录下来。\n\
    \n图 5-6\n\n安全的 WebFlux 输出\n\n现在，当尝试访问 `http://localhost:8080/` 时，将显示一个登录页面（参见图\
    \ 5-7）。\n\n![](img/464036_2_En_5_Fig7_HTML.jpg)\n\n本地主机页面的截图显示了登录页面。它显示“请登录”，并包含用户名和密码字段以及登录按钮。\n\
    \n图 5-7\n\n默认登录页面\n\n#### 安全 URL 访问\n\n可以通过添加自定义的 `SecurityWebFilterChain` 来配置访问规则。首先，让我们创建一个\
    \ `OrdersSecurityConfiguration`。参见清单 5-35。\n\n```\n@Configuration\n@EnableWebFluxSecurity\n\
    public class OrdersSecurityConfiguration {\n@Bean\npublic SecurityWebFilterChain\
    \ springWebFilterChain(ServerHttpSecurity http) {\nhttp\n.formLogin(Customizer.withDefaults())\n\
    .headers(Customizer.withDefaults())\n.logout(Customizer.withDefaults())\n.csrf(Customizer.withDefaults());\n\
    return http.build();\n}\n}\n清单 5-35\nWebFlux 的 Spring Security 配置\n```\n\n来自 Spring\
    \ Security 的 `WebFluxSecurityConfiguration` 类会检测 `SecurityWebFilterChain` 的实例（包含安全配置），该实例被包装为\
    \ `WebFilter`，而 `WebFilter` 又被 WebFlux 用来为传入请求添加行为（就像普通的 Servlet 过滤器一样）。`WebFluxSecurityConfiguration`\
    \ 通过 `@EnableWebFluxSecurity` 注解被包含进来（该注解也由 Spring Boot 提供/启用）。\n\n目前，该配置仅启用了安全性；让我们添加一些安全规则。参见清单\
    \ 5-36。\n\n```\n@Configuration\n@EnableWebFluxSecurity\npublic class OrdersSecurityConfiguration\
    \ {\n@Bean\npublic SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity\
    \ http) {\nhttp\n.formLogin(Customizer.withDefaults())\n.headers(Customizer.withDefaults())\n\
    .logout(Customizer.withDefaults())\n.csrf(Customizer.withDefaults());\nhttp\n\
    .authorizeExchange((auth) -> auth\n.pathMatchers(\"/\").permitAll()\n.pathMatchers(\"\
    /orders*\").hasRole(\"USER\")\n.anyExchange().authenticated());\nreturn http.build();\n\
    }\n}\n清单 5-36\n带有访问规则的 WebFlux 的 Spring Security 配置\n```\n\n`ServerHttpSecurity`\
    \ 应该看起来很熟悉（参见本章中的其他配方），它用于添加安全规则并进行进一步配置（例如添加/删除头以及配置登录方法）。使用 `authorizeExchange`，可以编写规则；这里我们保护\
    \ URL。`/` 路径允许所有人访问，而 `/orders` URL 仅对具有 `USER` 角色的用户可用。对于其他请求，你至少需要进行身份验证。最后，你需要调用\
    \ `build()` 来实际构建并返回 `SecurityWebFilterChain`。\n\n除了 `authorizeExchange`，还可以使用\
    \ `headers()` 配置方法向请求添加安全头，使用 `csrf()` 添加 CSRF 保护等。\n\n#### 登录 WebFlux 应用\n\n\
    你可以通过显式配置来覆盖默认配置的某些部分，并且可以覆盖所使用的身份验证管理器以及用于存储安全上下文的存储库。身份验证管理器是自动检测的；你只需要注册一个类型为\
    \ `ReactiveAuthenticationManager` 或 `UserDetailsRepository` 的 Bean。\n\n你还可以通过配置\
    \ `ServerSecurityContextRepositor` 来设置 `SecurityContext` 的存储位置。默认使用的实现是 `WebSessionServerSecurityContextRepository`，它将上下文存储在\
    \ `WebSession` 中。另一个默认实现是 `NoOpServerSecurityContextRepository`，用于无状态应用。参见清单 5-37。\n\
    \n```\n@Bean\nSecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http)\
    \ throws Exception {\nreturn http\n.formLogin()\n.authenticationManager(new CustomReactiveAuthenticationManager())\n\
    .securityContextRepository(new NoOpServerSecurityContextRepository())\n.build();\n\
    }\n清单 5-37\nSpring Security 配置\n```\n\n这将使用 `CustomReactiveAuthenticationManager`\
    \ 和无状态的 `NoOpServerSecurityContextRepository` 覆盖默认值。不过，对于我们的应用，我们将继续使用默认配置。\n"
- fmt: "### Authenticate Users\n\nAuthenticating users in a Spring WebFlux–based application\
    \ is done through a `ReactiveAuthenticationManager` interface. This is an interface\
    \ with a single `authenticate` method. You can either provide your own implementation\
    \ or use one of the provided implementations. The first is `UserDetailsRepositoryReactiveAuthenticationManager`,\
    \ which wraps an instance of `ReactiveUserDetailsService`.\n\n![](images/464036_2_En_5_Chapter/464036_2_En_5_Figj_HTML.gif)\
    \ An information icon with the letter i inside a circle. `ReactiveUserDetailsService`\
    \ has only a single implementation, `MapReactiveUserDetailsService`, which is\
    \ an in-memory implementation. You could provide your own implementation based\
    \ on a reactive datastore (like MongoDB or Couchbase).\n\nAs another implementation,\
    \ `ReactiveAuthenticationManagerAdapter` is actually a wrapper for a regular `AuthenticationManager`.\
    \ It will wrap a regular instance, and therefore, you can use the blocking implementations\
    \ in a reactive way. This doesn’t make them reactive; they still block, but they\
    \ are reusable this way. You can also use JDBC, LDAP, etc., for your reactive\
    \ application.\n\nWhen configuring Spring Security in a Spring WebFlux application,\
    \ you can either add an instance of a `ReactiveAuthenticationManager` to your\
    \ Java configuration class or add a `ReactiveUserDetailsService`. When the latter\
    \ is detected, it will automatically be wrapped in a `UserDetailsRepositoryReactiveAuthenticationManager`.\
    \ See Listing [5-38](#464036_2_En_5_Chapter.xhtml#PC42).\n\n```java\n@Bean\npublic\
    \ MapReactiveUserDetailsService userDetailsService() {\nvar marten = User.withDefaultPasswordEncoder()\n\
    .username(\"marten\").password(\"secret\").roles(\"USER\").build();\nvar admin\
    \ = User.withDefaultPasswordEncoder()\n.username(\"admin\").password(\"admin\"\
    ).roles(\"USER\", \"ADMIN\").build();\nreturn new MapReactiveUserDetailsService(marten,\
    \ admin);\n}\n```\n\n*Listing 5-38*  \n*Reactive In-Memory UserDetailsService*\n\
    \nWhen you now run the application, you are free to access the `/` page, but when\
    \ accessing a URL starting with `/orders`, you will be greeted by a login form\
    \ (see Figure [5-7](#464036_2_En_5_Chapter.xhtml#Fig7)). When entering the credentials\
    \ of one of the predefined users, you should be allowed access to the requested\
    \ URL.\n\n### Make Access Control Decisions\n\nTable [5-9](#464036_2_En_5_Chapter.xhtml#Tab9)\
    \ shows the built-in expressions for access control decisions. See Listing [5-39](#464036_2_En_5_Chapter.xhtml#PC43).\n\
    \n**Table 5-9**  \nSpring Security WebFlux Built-in Expressions\n\n| Expression\
    \ | Description |\n| --- | --- |\n| `hasRole('role')` or `hasAuthority('authority')`\
    \ | Returns `true` if the current user has the given role |\n| `permitAll()` |\
    \ Always evaluates to `true` |\n| `denyAll()` | Always evaluates to `false` |\n\
    | `authenticated()` | Returns `true` if the user is authenticated |\n| `access()`\
    \ | Use a function to determine if access is granted |\n\n![](images/464036_2_En_5_Chapter/464036_2_En_5_Figk_HTML.gif)\
    \ An abstract of a fire.  Although the role and authority are almost the same,\
    \ there is a slight, but important, difference in how they are processed. When\
    \ using `hasRole`, the passed-in value for the role will be checked if it starts\
    \ with `ROLE_` (the default role prefix). If not, this will be added before checking\
    \ the authority. So, `hasRole('ADMIN')` will actually check if the current user\
    \ has the authority `ROLE_ADMIN`. When using `hasAuthority`, it will check the\
    \ value as is.\n\n```java\n@Bean\npublic SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity\
    \ http) {\nhttp\n.authorizeExchange((auth) -> auth\n.pathMatchers(\"/\").permitAll()\n\
    .pathMatchers(\"/orders*\").access(this::ordersAllowed)\n.anyExchange().authenticated());\n\
    return http.build();\n}\n\nprivate Mono ordersAllowed(\nMono authentication, AuthorizationContext\
    \ context) {\nreturn authentication\n.map(a -> a.getAuthorities().contains(new\
    \ SimpleGrantedAuthority(\"ROLE_ADMIN\")))\n.map(AuthorizationDecision::new);\n\
    }\n```\n\n*Listing 5-39*  \n*Spring Security Custom Security Rules*\n\nThe `access()`\
    \ expression can be used to write very powerful expressions. The previous snippet\
    \ allows access if the current user has the `ROLE_ADMIN` authority. The `Authentication`\
    \ contains the collection of `GrantedAuthorities`, which you can check for the\
    \ `ROLE_ADMIN`. Of course, you can write as many complex expressions as you like;\
    \ you could check for the IP address, request headers, etc.\n\n## Summary\n\n\
    In this chapter, you learned how to secure Spring Boot applications with Spring\
    \ Security. It can be used to secure any Java application, but it’s mostly used\
    \ for web-based applications. The concepts of authentication, authorization, and\
    \ access control are essential in the security area, so you should have a clear\
    \ understanding of them.\n\nYou often have to secure critical URLs by preventing\
    \ unauthorized access to them. Spring Security can help you to achieve this in\
    \ a declarative way. It handles security by applying servlet filters, which can\
    \ be configured with a simple Java-based configuration. Spring Security will automatically\
    \ configure the basic security services for you and tries to be as secure as possible\
    \ by default.\n\nSpring Security supports multiple ways for users to log into\
    \ a web application, such as form-based login and HTTP Basic authentication. It\
    \ also provides an anonymous login service that allows you to handle an anonymous\
    \ user just like a normal user. Remember-me support allows an application to remember\
    \ a user’s identity across multiple browser sessions.\n\nSpring Security supports\
    \ multiple ways of authenticating users and has built-in provider implementations\
    \ for them. For example, it supports authenticating users against in-memory definitions,\
    \ a relational database, and an LDAP repository. You should always store encrypted\
    \ passwords in your user repository, because clear-text passwords are vulnerable\
    \ to hacker attacks. Spring Security also supports caching user details locally\
    \ to save you the overhead of performing remote queries.\n\nDecisions about whether\
    \ a user is allowed to access a given resource are made by access decision managers.\
    \ Spring Security comes with three access decision managers that are based on\
    \ the voting approach. All of them require a group of voters to be configured\
    \ for voting on access control decisions.\n\nSpring Security enables you to secure\
    \ method invocations in a declarative way, either by embedding a security interceptor\
    \ in a bean definition or by matching multiple methods with AspectJ pointcut expressions\
    \ or annotations. Spring Security also allows you to display a user’s authentication\
    \ information in JSP views and to render view contents conditionally according\
    \ to a user’s authorities.\n\nSpring Security provides an ACL module that allows\
    \ each domain object to have an ACL for controlling access. You can read and maintain\
    \ an ACL for each domain object with Spring Security’s high-performance APIs,\
    \ which are implemented with JDBC. Spring Security also provides facilities such\
    \ as access decision voters and JSP tags for you to use ACLs consistently with\
    \ other security facilities.\n\nSpring Security also has support for securing\
    \ Spring WebFlux–based applications, and you explored how you can add security\
    \ to such an application."
  raw: '#### Authenticate Users


    Authenticating users in a Spring WebFlux–based application is done through a `ReactiveAuthenticationManager`
    interface. This is an interface with a single `authenticate` method. You can either
    provide your own implementation or use one of the provided implementations. The
    first is `UserDetailsRepositoryReactiveAuthenticationManager`, which wraps an
    instance of `ReactiveUserDetailsService`.


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Figj_HTML.gif)An information icon
    with the letter i inside a circle. `ReactiveUserDetailsService` has only a single
    implementation, `MapReactiveUserDetailsService`, which is an in-memory implementation.
    You could provide your own implementation based on a reactive datastore (like
    MongoDB or Couchbase).


    As another implementation, `ReactiveAuthenticationManagerAdapter` is actually
    a wrapper for a regular `AuthenticationManager`. It will wrap a regular instance,
    and therefore, you can use the blocking implementations in a reactive way. This
    doesn’t make them reactive; they still block, but they are reusable this way.
    You can also use JDBC, LDAP, etc., for your reactive application.


    When configuring Spring Security in a Spring WebFlux application, you can either
    add an instance of a `ReactiveAuthenticationManager` to your Java configuration
    class or add a `ReactiveUserDetailsService`. When the latter is detected, it will
    automatically be wrapped in a `UserDetailsRepositoryReactiveAuthenticationManager`.
    See Listing [5-38](#464036_2_En_5_Chapter.xhtml#PC42).


    ```

    @Bean

    public MapReactiveUserDetailsService userDetailsService() {

    var marten = User.withDefaultPasswordEncoder()

    .username("marten").password("secret").roles("USER").build();

    var admin = User.withDefaultPasswordEncoder()

    .username("admin").password("admin").roles("USER", "ADMIN").build();

    return new MapReactiveUserDetailsService(marten, admin);

    }

    Listing 5-38

    Reactive In-Memory UserDetailsService

    ```


    When you now run the application, you are free to access the `/` page, but when
    accessing a URL starting with `/orders`, you will be greeted by a login form (see
    Figure [5-7](#464036_2_En_5_Chapter.xhtml#Fig7)). When entering the credentials
    of one of the predefined users, you should be allowed access to the requested
    URL.


    #### Make Access Control Decisions


    Table [5-9](#464036_2_En_5_Chapter.xhtml#Tab9) shows the built-in expressions
    for access control decisions. See Listing [5-39](#464036_2_En_5_Chapter.xhtml#PC43).


    Table 5-9


    Spring Security WebFlux Built-in Expressions


    | Expression | Description |

    | --- | --- |

    | `hasRole(''role'')` or `hasAuthority(''authority'')` | Returns `true` if the
    current user has the given role |

    | `permitAll()` | Always evaluates to `true` |

    | `denyAll()` | Always evaluates to `false` |

    | `authenticated()` | Returns `true` if the user is authenticated |

    | `access()` | Use a function to determine if access is granted |


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Figk_HTML.gif)An abstract of a
    fire.  Although the role and authority are almost the same, there is a slight,
    but important, difference in how they are processed. When using `hasRole`, the
    passed-in value for the role will be checked if it starts with `ROLE_` (the default
    role prefix). If not, this will be added before checking the authority. So, `hasRole(''ADMIN'')`
    will actually check if the current user has the authority `ROLE_ADMIN`. When using
    `hasAuthority`, it will check the value as is.


    ```

    @Bean

    public SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) {

    http

    .authorizeExchange((auth) -> auth

    .pathMatchers("/").permitAll()

    .pathMatchers("/orders*").access(this::ordersAllowed)

    .anyExchange().authenticated());

    return http.build();

    }

    private Mono ordersAllowed(

    Mono authentication, AuthorizationContext context) {

    return authentication

    .map(a -> a.getAuthorities().contains(new SimpleGrantedAuthority("ROLE_ADMIN")))

    .map(AuthorizationDecision::new);

    }

    Listing 5-39

    Spring Security Custom Security Rules

    ```


    The `access()` expression can be used to write very powerful expressions. The
    previous snippet allows access if the current user has the `ROLE_ADMIN` authority.
    The `Authentication` contains the collection of `GrantedAuthorities`, which you
    can check for the `ROLE_ADMIN`. Of course, you can write as many complex expressions
    as you like; you could check for the IP address, request headers, etc.


    ## Summary


    In this chapter, you learned how to secure Spring Boot applications with Spring
    Security. It can be used to secure any Java application, but it’s mostly used
    for web-based applications. The concepts of authentication, authorization, and
    access control are essential in the security area, so you should have a clear
    understanding of them.


    You often have to secure critical URLs by preventing unauthorized access to them.
    Spring Security can help you to achieve this in a declarative way. It handles
    security by applying servlet filters, which can be configured with a simple Java-based
    configuration. Spring Security will automatically configure the basic security
    services for you and tries to be as secure as possible by default.


    Spring Security supports multiple ways for users to log into a web application,
    such as form-based login and HTTP Basic authentication. It also provides an anonymous
    login service that allows you to handle an anonymous user just like a normal user.
    Remember-me support allows an application to remember a user’s identity across
    multiple browser sessions.


    Spring Security supports multiple ways of authenticating users and has built-in
    provider implementations for them. For example, it supports authenticating users
    against in-memory definitions, a relational database, and an LDAP repository.
    You should always store encrypted passwords in your user repository, because clear-text
    passwords are vulnerable to hacker attacks. Spring Security also supports caching
    user details locally to save you the overhead of performing remote queries.


    Decisions about whether a user is allowed to access a given resource are made
    by access decision managers. Spring Security comes with three access decision
    managers that are based on the voting approach. All of them require a group of
    voters to be configured for voting on access control decisions.


    Spring Security enables you to secure method invocations in a declarative way,
    either by embedding a security interceptor in a bean definition or by matching
    multiple methods with AspectJ pointcut expressions or annotations. Spring Security
    also allows you to display a user’s authentication information in JSP views and
    to render view contents conditionally according to a user’s authorities.


    Spring Security provides an ACL module that allows each domain object to have
    an ACL for controlling access. You can read and maintain an ACL for each domain
    object with Spring Security’s high-performance APIs, which are implemented with
    JDBC. Spring Security also provides facilities such as access decision voters
    and JSP tags for you to use ACLs consistently with other security facilities.


    Spring Security also has support for securing Spring WebFlux–based applications,
    and you explored how you can add security to such an application.'
  trans: '

    #### 认证用户


    在基于 Spring WebFlux 的应用程序中，用户认证是通过 `ReactiveAuthenticationManager` 接口完成的。这是一个包含单一
    `authenticate` 方法的接口。你可以提供自己的实现，也可以使用框架提供的实现之一。第一个是 `UserDetailsRepositoryReactiveAuthenticationManager`，它包装了一个
    `ReactiveUserDetailsService` 实例。


    ![](img/464036_2_En_5_Figj_HTML.gif)一个信息图标，圆圈内包含字母 i。`ReactiveUserDetailsService`
    只有一个实现，即 `MapReactiveUserDetailsService`，这是一个内存实现。你可以基于响应式数据存储（如 MongoDB 或 Couchbase）提供自己的实现。


    作为另一种实现，`ReactiveAuthenticationManagerAdapter` 实际上是常规 `AuthenticationManager`
    的包装器。它将包装一个常规实例，因此你可以以响应式方式使用阻塞式实现。这并不会使它们变成响应式；它们仍然会阻塞，但这种方式可以重用它们。你也可以为你的响应式应用程序使用
    JDBC、LDAP 等。


    在 Spring WebFlux 应用程序中配置 Spring Security 时，你可以将 `ReactiveAuthenticationManager`
    的实例添加到 Java 配置类中，或者添加一个 `ReactiveUserDetailsService`。当检测到后者时，它将自动被包装在 `UserDetailsRepositoryReactiveAuthenticationManager`
    中。参见清单 5-38。


    ```

    @Bean

    public MapReactiveUserDetailsService userDetailsService() {

    var marten = User.withDefaultPasswordEncoder()

    .username("marten").password("secret").roles("USER").build();

    var admin = User.withDefaultPasswordEncoder()

    .username("admin").password("admin").roles("USER", "ADMIN").build();

    return new MapReactiveUserDetailsService(marten, admin);

    }

    清单 5-38

    响应式内存 UserDetailsService

    ```


    现在运行应用程序时，你可以自由访问 `/` 页面，但当访问以 `/orders` 开头的 URL 时，你会看到一个登录表单（参见图 5-7）。输入预定义用户的凭据后，你应该被允许访问请求的
    URL。


    #### 做出访问控制决策


    表 5-9 展示了用于访问控制决策的内置表达式。参见清单 5-39。


    表 5-9


    Spring Security WebFlux 内置表达式


    | 表达式 | 描述 |

    | --- | --- |

    | `hasRole(''role'')` 或 `hasAuthority(''authority'')` | 如果当前用户拥有给定角色，则返回 `true`
    |

    | `permitAll()` | 始终评估为 `true` |

    | `denyAll()` | 始终评估为 `false` |

    | `authenticated()` | 如果用户已认证，则返回 `true` |

    | `access()` | 使用函数来确定是否授予访问权限 |


    ![](img/464036_2_En_5_Figk_HTML.gif)一个火焰的抽象图。  尽管角色和权限几乎相同，但它们的处理方式存在细微但重要的差异。使用
    `hasRole` 时，会检查传入的角色值是否以 `ROLE_`（默认角色前缀）开头。如果不是，则在检查权限之前添加此前缀。因此，`hasRole(''ADMIN'')`
    实际上会检查当前用户是否拥有 `ROLE_ADMIN` 权限。使用 `hasAuthority` 时，它会按原样检查该值。


    ```

    @Bean

    public SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) {

    http

    .authorizeExchange((auth) -> auth

    .pathMatchers("/").permitAll()

    .pathMatchers("/orders*").access(this::ordersAllowed)

    .anyExchange().authenticated());

    return http.build();

    }

    private Mono ordersAllowed(

    Mono authentication, AuthorizationContext context) {

    return authentication

    .map(a -> a.getAuthorities().contains(new SimpleGrantedAuthority("ROLE_ADMIN")))

    .map(AuthorizationDecision::new);

    }

    清单 5-39

    Spring Security 自定义安全规则

    ```


    `access()` 表达式可用于编写非常强大的表达式。前面的代码片段允许当前用户拥有 `ROLE_ADMIN` 权限时访问。`Authentication`
    包含 `GrantedAuthorities` 集合，你可以检查其中是否包含 `ROLE_ADMIN`。当然，你可以根据需要编写任意复杂的表达式；你可以检查
    IP 地址、请求头等。


    ## 总结


    在本章中，你学习了如何使用 Spring Security 保护 Spring Boot 应用程序。它可以用于保护任何 Java 应用程序，但主要用于基于
    Web 的应用程序。认证、授权和访问控制的概念在安全领域至关重要，因此你应该对它们有清晰的理解。


    你通常需要保护关键 URL，防止未经授权的访问。Spring Security 可以帮助你以声明式方式实现这一点。它通过应用 Servlet 过滤器来处理安全性，这些过滤器可以通过简单的基于
    Java 的配置进行配置。Spring Security 会自动为你配置基本的安全服务，并默认尽可能保持安全。


    Spring Security 支持多种用户登录 Web 应用程序的方式，例如基于表单的登录和 HTTP Basic 认证。它还提供匿名登录服务，允许你将匿名用户视为普通用户。Remember-me
    支持允许应用程序在多个浏览器会话中记住用户的身份。


    Spring Security 支持多种用户认证方式，并为此提供了内置的提供者实现。例如，它支持针对内存定义、关系数据库和 LDAP 仓库进行用户认证。你应该始终在用户仓库中存储加密密码，因为明文密码容易受到黑客攻击。Spring
    Security 还支持在本地缓存用户详细信息，以节省执行远程查询的开销。


    关于是否允许用户访问给定资源的决策由访问决策管理器做出。Spring Security 提供了三个基于投票方法的访问决策管理器。它们都需要配置一组投票者来对访问控制决策进行投票。


    Spring Security 使你能够以声明式方式保护方法调用，可以通过在 Bean 定义中嵌入安全拦截器，也可以通过使用 AspectJ 切入点表达式或注解匹配多个方法。Spring
    Security 还允许你在 JSP 视图中显示用户的认证信息，并根据用户的权限有条件地渲染视图内容。


    Spring Security 提供了一个 ACL 模块，允许每个领域对象拥有一个用于控制访问的 ACL。你可以使用 Spring Security 的高性能
    API（通过 JDBC 实现）来读取和维护每个领域对象的 ACL。Spring Security 还提供了诸如访问决策投票者和 JSP 标签之类的工具，使你能够一致地使用
    ACL 和其他安全设施。


    Spring Security 还支持保护基于 Spring WebFlux 的应用程序，并且你探索了如何为此类应用程序添加安全性。

