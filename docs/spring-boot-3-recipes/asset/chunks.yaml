  raw: '#### Configure JmsTemplate


    Spring Boot provides properties in the `spring.jms.template` namespace to configure
    `JmsTemplate` (see Table [8-6](#464036_2_En_8_Chapter.xhtml#Tab6)).


    Table 8-6


    `JmsTemplate` Properties


    | Property | Description |

    | --- | --- |

    | `spring.jms.template.default-destination` | Sets the default destination to
    use for send and receive operations when a specific destination isn’t specified.
    |

    | `spring.jms.template.delivery-delay` | Sets the delivery delay for sending a
    message. |

    | `spring.jms.template.delivery-mode` | Sets the delivery mode, `persistent` or
    `non-persistent`. When explicitly set, it sets `qos-enabled` to `true`. |

    | `spring.jms.template.priority` | Sets the priority of the message when sending.
    The default is none; when explicitly set, it sets `qos-enabled` to `true`. |

    | `spring.jms.template.qos-enabled` | Sets whether quality of service (QOS) should
    be enabled. When enabled, the priority, delivery-mode, and time-to-live of a message
    will be set. The default is `false`. |

    | `spring.jms.template.receive-timeout` | Sets the timeout to use for receive
    calls. The default is indefinite. |

    | `spring.jms.template.time-to-live` | Sets the time-to-live of a JMS message;
    when set, it sets `qos-enabled` to `true`. |

    | `spring.jms.pub-sub-domain` | Sets the default destination to a topic or queue.
    The default is `false`, meaning queue. |


    In addition to these properties, `JmsTemplate` will also be auto-configured with
    a `DestinationResolver` and `MessageConverter` if a unique instance of the beans
    can be found. If no unique instance can be found, the defaults will be used, `DynamicDestinationResolver`
    and `SimpleMessageConverter` (see Table [8-7](#464036_2_En_8_Chapter.xhtml#Tab7)).


    Table 8-7


    SimpleMessageConverter Class to JMS Message Converter


    | Type | JMS Message Type |

    | --- | --- |

    | `java.lang.String` | `javax.jms.TextMessage` |

    | `java.util.Map` | `javax.jms.MapMessage` |

    | `java.io.Serializable` | `javax.jms.ObjectMessage` |

    | `byte[]` | `javax.jms.BytesMessage` |


    Let’s send an `Order` to the `orders` queue, and let’s use Jackson to send JSON
    instead of using the Java Serialization mechanism. See Listing [8-10](#464036_2_En_8_Chapter.xhtml#PC14).


    ```

    package com.apress.springboot3recipes.order;

    import java.math.BigDecimal;

    public record Order (String id, BigDecimal amount) { }

    Listing 8-10

    Order Class

    ```


    That is the `Order` class we are going to send. To be able to generate an order,
    let’s create an `OrderGenerator` class that will create an order with an ID and
    a random amount. See Listing [8-11](#464036_2_En_8_Chapter.xhtml#PC15).


    ```

    package com.apress.springboot3recipes.order;

    import java.math.BigDecimal;

    import java.math.RoundingMode;

    import java.util.UUID;

    import java.util.concurrent.ThreadLocalRandom;

    public class OrderGenerator {

    public static Order generate() {

    var rnd = ThreadLocalRandom.current().nextDouble(1000.00);

    var amount = BigDecimal.valueOf(rnd).setScale(2, RoundingMode.HALF_EVEN);

    var id = UUID.randomUUID().toString();

    return new Order(id, amount);

    }

    }

    Listing 8-11

    OrderGenerator Class

    ```


    Now we need a sender that generates an `Order` and places it on the queue using
    `JmsTemplate`. See Listing [8-12](#464036_2_En_8_Chapter.xhtml#PC16).


    ```

    @Component

    class OrderSender {

    private final JmsTemplate jms;

    OrderSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 500)

    public void sendOrder() {

    var order = OrderGenerator.generate();

    jms.convertAndSend("orders", order);

    }

    }

    Listing 8-12

    JMS-Based OrderSender

    ```


    It isn’t that different from `MessageSender` written earlier, but now it generates
    an `Order` with some random generated data (see the `OrderGenerator`) and sends
    it on the `orders` queue. When running this, it would actually fail. Because `Order`
    doesn’t implement `Serializable`, it won’t be converted into an `ObjectMessage`.
    However, we wanted to use JSON. To make this happen, a different `MessageConverter`
    is needed: the `MappingJackson2MessageConverter` to be exact. This uses Jackson
    to marshal and unmarshal objects to JSON. It should be added as a bean to the
    configuration.


    First you will need to add the dependency to add Jackson (or, rather, JSON support)
    to your application. Add `spring-boot-starter-json` to get the needed dependencies.
    See Listing [8-13](#464036_2_En_8_Chapter.xhtml#PC17).


    ```

    org.springframework.boot

    spring-boot-starter-json


    Listing 8-13

    Spring Boot JSON Starter Dependency

    ```


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Figc_HTML.gif)An information icon.When
    you already have `spring-boot-starter-web` or `spring-boot-starter-webflux` in
    your list of dependencies, `spring-boot-starter-json` is already included.


    Next you can configure `MappingJackson2MessageConverter`. See Listing [8-14](#464036_2_En_8_Chapter.xhtml#PC18).


    *   ① The `typeIdPropertyName` is a required property and indicates the name of
    the property in which the actual type of the message is stored. Without any further
    configuration, the FQN of the class will be used.


    *   ② This is the mapping for which type identifier (`typeId`) to use for a given
    class. Instead of sending the FQN of a class, it will use the type in the mapping
    to identify the type. When sending an `Order`, the `content-type` header will
    contain the value `order`.


    ```

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var converter = new MappingJackson2MessageConverter();

    converter.setTypeIdPropertyName("content_type"); ①

    converter.setTypeIdMappings(Map.of("order", Order.class)); ②

    return converter;

    }

    Listing 8-14

    MessageConverter Configuration

    ```


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Figd_HTML.gif)A light bulb icon.It
    generally is a good idea to explicitly define type mappings. This way you don’t
    explicitly bind two or more applications together on the Java level. They can
    use their own mapping for `order` to their own `Order` class.


    With all this in place, we can write a test to see if orders are actually being
    sent.


    ```

    package com.apress.springboot3recipes.jms;

    import com.apress.springboot3recipes.order.Order;

    import com.fasterxml.jackson.databind.ObjectMapper;

    import jakarta.jms.BytesMessage;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.jms.core.JmsTemplate;

    import static org.assertj.core.api.Assertions.assertThat;

    @SpringBootTest

    class JmsSenderApplicationTest {

    @Autowired

    private JmsTemplate jms;

    @Test

    void shouldReceiveOrderPlain() throws Exception {

    var message = jms.receive("orders");

    assertThat(message)

    .isInstanceOf(BytesMessage.class);

    var msg = (BytesMessage) message;

    var mapper = new ObjectMapper();

    var content = new byte[(int) msg.getBodyLength()];

    msg.readBytes(content);

    var order = mapper.readValue( content, Order.class);

    assertThat(order).hasNoNullFieldsOrProperties();

    }

    @Test

    void shouldReceiveOrderWithConversion() throws Exception {

    var order = (Order) jms.receiveAndConvert("orders");

    assertThat(order).hasNoNullFieldsOrProperties();

    }

    }

    ```


    There are two test methods here. The plain one does manual conversion of the message
    to an `Order`, whereas the second uses the `receiveAndConvert` method to have
    the conversion done for you. This to show what the `MessageConverter` is doing
    and that it makes your code more readable. As you can see, `MappingJackson2MessageConverter`
    converts the `Order` into a `BytesMessages`. If you want to use `TextMessage`
    instead, you can set the `targetType` property to `TEXT`; you will then recieve
    a `TextMessage` with a JSON as a `String` as the payload.


    ## 8-3\. Receive Messages Using JMS


    ### Problem


    You want to read messages from a JMS destination so that you can handle them in
    your application.


    ### Solution


    Create a class and annotate methods with `@JmsListener` to bind it to a destination
    and handle incoming messages.'
  trans: '

    #### 配置 JmsTemplate


    Spring Boot 在 `spring.jms.template` 命名空间中提供了用于配置 `JmsTemplate` 的属性（参见表 8-6）。


    表 8-6


    `JmsTemplate` 属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.jms.template.default-destination` | 设置未指定特定目标时用于发送和接收操作的默认目标。 |

    | `spring.jms.template.delivery-delay` | 设置发送消息的投递延迟。 |

    | `spring.jms.template.delivery-mode` | 设置投递模式，`persistent`（持久化）或 `non-persistent`（非持久化）。显式设置时，会将
    `qos-enabled` 设为 `true`。 |

    | `spring.jms.template.priority` | 设置发送消息时的优先级。默认值为无；显式设置时，会将 `qos-enabled` 设为
    `true`。 |

    | `spring.jms.template.qos-enabled` | 设置是否启用服务质量（QOS）。启用后，将设置消息的优先级、投递模式和存活时间。默认值为
    `false`。 |

    | `spring.jms.template.receive-timeout` | 设置接收调用的超时时间。默认值为无限期。 |

    | `spring.jms.template.time-to-live` | 设置 JMS 消息的存活时间；设置时，会将 `qos-enabled` 设为
    `true`。 |

    | `spring.jms.pub-sub-domain` | 将默认目标设置为主题或队列。默认值为 `false`，表示队列。 |


    除了这些属性之外，如果能够找到唯一的 Bean 实例，`JmsTemplate` 还会自动配置一个 `DestinationResolver` 和 `MessageConverter`。如果找不到唯一的实例，将使用默认值，即
    `DynamicDestinationResolver` 和 `SimpleMessageConverter`（参见表 8-7）。


    表 8-7


    SimpleMessageConverter 类到 JMS 消息的转换器


    | 类型 | JMS 消息类型 |

    | --- | --- |

    | `java.lang.String` | `javax.jms.TextMessage` |

    | `java.util.Map` | `javax.jms.MapMessage` |

    | `java.io.Serializable` | `javax.jms.ObjectMessage` |

    | `byte[]` | `javax.jms.BytesMessage` |


    让我们将一个 `Order` 发送到 `orders` 队列，并使用 Jackson 发送 JSON，而不是使用 Java 序列化机制。参见清单 8-10。


    ```

    package com.apress.springboot3recipes.order;

    import java.math.BigDecimal;

    public record Order (String id, BigDecimal amount) { }

    清单 8-10

    Order 类

    ```


    这就是我们要发送的 `Order` 类。为了能够生成订单，让我们创建一个 `OrderGenerator` 类，它将创建一个包含 ID 和随机金额的订单。参见清单
    8-11。


    ```

    package com.apress.springboot3recipes.order;

    import java.math.BigDecimal;

    import java.math.RoundingMode;

    import java.util.UUID;

    import java.util.concurrent.ThreadLocalRandom;

    public class OrderGenerator {

    public static Order generate() {

    var rnd = ThreadLocalRandom.current().nextDouble(1000.00);

    var amount = BigDecimal.valueOf(rnd).setScale(2, RoundingMode.HALF_EVEN);

    var id = UUID.randomUUID().toString();

    return new Order(id, amount);

    }

    }

    清单 8-11

    OrderGenerator 类

    ```


    现在我们需要一个发送者，它生成一个 `Order` 并使用 `JmsTemplate` 将其放入队列。参见清单 8-12。


    ```

    @Component

    class OrderSender {

    private final JmsTemplate jms;

    OrderSender(JmsTemplate jms) {

    this.jms = jms;

    }

    @Scheduled(fixedRate = 500)

    public void sendOrder() {

    var order = OrderGenerator.generate();

    jms.convertAndSend("orders", order);

    }

    }

    清单 8-12

    基于 JMS 的 OrderSender

    ```


    这与之前编写的 `MessageSender` 没有太大区别，但现在它会生成一个包含一些随机生成数据的 `Order`（参见 `OrderGenerator`），并将其发送到
    `orders` 队列。运行时，这实际上会失败。因为 `Order` 没有实现 `Serializable`，所以它不会被转换为 `ObjectMessage`。然而，我们想要使用
    JSON。为了实现这一点，需要一个不同的 `MessageConverter`：确切地说是 `MappingJackson2MessageConverter`。它使用
    Jackson 将对象编组和解组为 JSON。它应该作为 Bean 添加到配置中。


    首先，你需要添加依赖项以将 Jackson（或者更确切地说是 JSON 支持）添加到你的应用程序中。添加 `spring-boot-starter-json`
    以获取所需的依赖项。参见清单 8-13。


    ```

    org.springframework.boot

    spring-boot-starter-json


    清单 8-13

    Spring Boot JSON Starter 依赖项

    ```


    ![](img/464036_2_En_8_Figc_HTML.gif)一个信息图标。如果你的依赖项列表中已经有 `spring-boot-starter-web`
    或 `spring-boot-starter-webflux`，那么 `spring-boot-starter-json` 已经包含在内。


    接下来，你可以配置 `MappingJackson2MessageConverter`。参见清单 8-14。


    *   ① `typeIdPropertyName` 是一个必需属性，指示存储消息实际类型的属性名称。如果没有进一步配置，将使用类的完全限定名（FQN）。


    *   ② 这是用于给定类应使用哪个类型标识符（`typeId`）的映射。它不会发送类的 FQN，而是使用映射中的类型来标识类型。发送 `Order` 时，`content-type`
    头将包含值 `order`。


    ```

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var converter = new MappingJackson2MessageConverter();

    converter.setTypeIdPropertyName("content_type"); ①

    converter.setTypeIdMappings(Map.of("order", Order.class)); ②

    return converter;

    }

    清单 8-14

    MessageConverter 配置

    ```


    ![](img/464036_2_En_8_Figd_HTML.gif)一个灯泡图标。通常，显式定义类型映射是一个好主意。这样，你就不会在 Java 层面上将两个或多个应用程序显式绑定在一起。它们可以使用自己的映射，将
    `order` 映射到它们自己的 `Order` 类。


    完成所有这些设置后，我们可以编写一个测试来查看订单是否确实被发送。


    ```

    package com.apress.springboot3recipes.jms;

    import com.apress.springboot3recipes.order.Order;

    import com.fasterxml.jackson.databind.ObjectMapper;

    import jakarta.jms.BytesMessage;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.jms.core.JmsTemplate;

    import static org.assertj.core.api.Assertions.assertThat;

    @SpringBootTest

    class JmsSenderApplicationTest {

    @Autowired

    private JmsTemplate jms;

    @Test

    void shouldReceiveOrderPlain() throws Exception {

    var message = jms.receive("orders");

    assertThat(message)

    .isInstanceOf(BytesMessage.class);

    var msg = (BytesMessage) message;

    var mapper = new ObjectMapper();

    var content = new byte[(int) msg.getBodyLength()];

    msg.readBytes(content);

    var order = mapper.readValue( content, Order.class);

    assertThat(order).hasNoNullFieldsOrProperties();

    }

    @Test

    void shouldReceiveOrderWithConversion() throws Exception {

    var order = (Order) jms.receiveAndConvert("orders");

    assertThat(order).hasNoNullFieldsOrProperties();

    }

    }

    ```


    这里有两个测试方法。第一个是手动将消息转换为 `Order`，而第二个使用 `receiveAndConvert` 方法为你完成转换。这是为了展示 `MessageConverter`
    的作用，以及它如何使你的代码更具可读性。如你所见，`MappingJackson2MessageConverter` 将 `Order` 转换为 `BytesMessages`。如果你想改用
    `TextMessage`，可以将 `targetType` 属性设置为 `TEXT`；然后你将收到一个 `TextMessage`，其有效负载是一个 JSON
    字符串。


    ## 8-3\. 使用 JMS 接收消息


    ### 问题


    你想从 JMS 目标读取消息，以便在应用程序中处理它们。


    ### 解决方案


    创建一个类，并使用 `@JmsListener` 注解方法，将其绑定到一个目标并处理传入的消息。

    '
- fmt: '### How It Works


    You can create a POJO and annotate its methods with `@JmsListener`. Spring will
    detect this and create a JMS listener for it. Spring Boot exposes properties to
    configure the listeners under the `spring.jms.listener` namespace.


    #### Receive Messages


    Let’s create a service that listens to the message sent by the sender from Recipe
    8-2. See Listing [8-15](#464036_2_En_8_Chapter.xhtml#PC20).


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(TextMessage msg) throws JMSException {

    System.out.println("[RECEIVED] - " + msg.getText());

    }

    }

    Listing 8-15

    JMS-Based Spring JMS Listener

    ```


    It is a regular class and has a method annotated with `@JmsListener`, which requires
    at least a `destination` so that it knows where to retrieve messages from. It
    accepts a `jakarta.jms.TextMessage` and prints the content to the console. The
    method signature of a `@JmsListener` annotated method is somewhat flexible as
    it allows for several arguments either annotated or from a specific type (see
    Table [8-8](#464036_2_En_8_Chapter.xhtml#Tab8)).


    **Table 8-8** Allowed Method Parameter Types


    | Type | Description |

    | --- | --- |

    | `java.lang.String` | Gets message payload as `String` only for `TextMessage`
    |

    | `java.util.Map` | Gets message payload as `Map` only for `MapMessage` |

    | `byte[]` | Gets message payload as `byte[]` only for `BytesMessage` |

    | Serializable object | Deserializes `Object` from `ObjectMessage` |

    | `jakarta.jms.Message` | Gets the actual JMS message |

    | `jakarta.jms.Session` | Accesses the `Session` for access, sending a custom
    reply, for instance |

    | `@Header` annotated element | Extracts a header from the JMS message |

    | `@Headers` annotated element | Only usable on a `java.util.Map` to get all the
    JMS message headers |

    | `org.springframework.messaging.Message` | Representation of the incoming JMS
    message |


    The listener could be simplified by using a `String` as a method argument instead
    of handling the `jakarta.jms.Message` configuration ourselves. See Listing [8-16](#464036_2_En_8_Chapter.xhtml#PC21).


    ```

    @Component

    class CurrentDateTimeService {

    @JmsListener(destination = "time-queue")

    public void handle(String msg) {

    System.out.println("[RECEIVED] - " + msg);

    }

    }

    Listing 8-16

    String-Based Spring JMS Listener

    ```


    The output of both application should look like Figure [8-4](#464036_2_En_8_Chapter.xhtml#Fig4).


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Fig4_HTML.jpg)


    An output of a string-based Spring J M S Listener. The starting J m s receive
    application, no profile set, started J m s receive application, spring boot, and
    the received current data and time are included in the output.


    **Figure 8-4** JMS receive output


    #### Configure the Listener Container


    Spring uses a `JmsListenerContainerFactory` to create the infrastructure needed
    to support the `@JmsListener` annotation. Spring Boot configures a default one,
    which can be configured using properties from the `spring.jms.listener` namespace.
    If that isn’t sufficient, you can always configure your own instance and do all
    the configuration options manually. Spring Boot will refrain from creating `JmsListenerContainerFactory`
    when it already detects one in the context (see Table [8-9](#464036_2_En_8_Chapter.xhtml#Tab9)).


    **Table 8-9** JMS Listener Properties


    | Property | Description |

    | --- | --- |

    | `spring.jms.listener.acknowledge-mode` | Acknowledges the mode of the container;
    the default is automatic. |

    | `spring.jms.listener.auto-startup` | Starts the container automatically on startup.
    The default is `true`. |

    | `spring.jms.listener.concurrency` | Sets the minimum number of concurrent consumers.
    The default is none, leading to one concurrent consumer (the Spring default).
    |

    | `spring.jms.listener.max-concurrency` | Sets the maximum number of concurrent
    consumers. The default is none, leading to one concurrent consumer (the Spring
    default). |

    | `spring.jms.receive-timeout` | Sets the timeout to use for receiving messaged;
    the default is one second. |

    | `spring.jms.pub-sub-domain` | Sets whether the default destination is a topic
    or queue. The default is `false`, meaning queue. |


    The default configured `JmsListenerContainerFactory` will also detect a single,
    unique `DestinationResolver` and `MessageConverter` and when found will use that;
    otherwise, it will use the Spring defaults `DynamicDestinationResolver` and `SimpleMessageConverter`
    (see Recipe 8-2 for more information).


    #### Use a Custom MessageConverter


    What if you want to send objects as JSON to the next system over JMS? You could
    rely on Java Serialization, but that generally is frowned upon as that is a tightly
    coupled system. Using JSON or XML to transfer objects/messages is a better way
    to do it. With Spring JMS, it is a matter of configuring a different `MessageConverter`
    (see also Recipe 8-2 for the sending part). See Listing [8-17](#464036_2_En_8_Chapter.xhtml#PC22).


    ```

    @Bean

    public MappingJackson2MessageConverter messageConverter() {

    var messageConverter = new MappingJackson2MessageConverter();

    messageConverter.setTypeIdPropertyName("content_type");

    messageConverter.setTypeIdMappings(singletonMap("order", Order.class));

    return messageConverter;

    }

    Listing 8-17

    MessageConverter Configuration

    ```


    `MappingJackson2MessageConverter` by default requires a property name to put the
    identifier for the content type in. This will be read from a header in the JMS
    message (here we set it to `content_type`). Next we can, optionally, define a
    mapping between a type and the class. As we want to be able to map objects to
    the `Order` class, we specify that as the mapping for the content-type `order`.
    See Listing [8-18](#464036_2_En_8_Chapter.xhtml#PC23).


    ```

    @Component

    class OrderService {

    @JmsListener(destination = "orders")

    public void handle(Order order) {

    System.out.println("[RECEIVED] - " + order);

    }

    }

    Listing 8-18

    JMS MessageListener Receiving an Order

    ```


