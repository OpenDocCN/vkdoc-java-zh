    ### 工作原理


    当 Spring Boot 在 `src/main/resources`（默认位置）中找到 `messages.properties` 文件时，它会自动配置一个
    `MessageSource`。该 `messages.properties` 文件包含了应用程序中要使用的默认消息。Spring Boot 会使用请求中的
    `Accept-Language` 头部信息来确定当前请求应使用哪个区域设置（关于如何更改此行为，请参见配方 4-6）。


    一些属性会改变 `MessageSource` 对缺失翻译、缓存等情况的行为。有关这些属性的概述，请参见表 4-3。


    表 4-3


    国际化属性


    | **属性** | **描述** |

    | --- | --- |

    | `spring.messages.basename` | 以逗号分隔的基础名称列表；默认值为 `messages`。 |

    | `spring.messages.encoding` | 消息包的编码；默认值为 `UTF-8`。 |

    | `spring.messages.always-use-message-format` | 设置是否应将 `MessageFormat` 应用于所有消息；默认值为
    `false`。 |

    | `spring.messages.fallback-to-system-locale` | 当找不到检测到的区域设置的资源包时，回退到系统区域设置。禁用时，将从默认文件加载默认值。默认值为
    `true`。 |

    | `spring.messages.use-code-as-default-message` | 当找不到消息时，使用消息代码作为默认消息，而不是抛出 `NoSuchMessageException`。默认值为
    `false`。 |

    | `spring.messages.cache-duration` | 缓存持续时间；默认值为永久。 |


    ![](img/464036_2_En_4_Figc_HTML.gif)一个灯泡图标。 将应用程序部署到云或其他外部托管平台时，将 `spring.messages.fallback-to-system-locale`
    设置为 `false` 可能会很有用。这样，你就可以控制应用程序的默认语言，而不是由你无法控制的部署环境来决定。


    将 `messages.properties` 文件添加到 `src/main/resources` 目录中。请参见清单 4-22。


