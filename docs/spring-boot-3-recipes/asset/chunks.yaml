- fmt: '# Mock Dependencies in a Unit Test


    Sometimes a class needs dependencies; however, you want your test to test only
    a single component (when writing a unit test). Spring Boot automatically brings
    in the Mockito framework. Mockito is a nice library to mock classes and record
    behavior on them. Writing a test for the `Calculator` application requires additional
    components as it delegates the actual calculation to the available `Operation`
    classes. To test the correct behavior of the `Calculator`, we would need to create
    a mock of the `Operation` and inject that into the `Calculator`. See Listing [2-14](#464036_2_En_2_Chapter.xhtml#PC15).


    ```

    package com.apress.springboot3recipes.calculator;

    import static org.junit.jupiter.api.Assertions.assertThrows;

    import static org.mockito.Mockito.anyChar;

    import static org.mockito.Mockito.times;

    import static org.mockito.Mockito.verify;

    import static org.mockito.Mockito.when;

    import java.util.Collections;

    import org.junit.jupiter.api.BeforeEach;

    import org.junit.jupiter.api.Test;

    import org.mockito.Mockito;

    public class CalculatorTest {

    private Calculator calculator;

    private Operation mockOperation;

    @BeforeEach

    public void setup() {

    mockOperation = Mockito.mock(Operation.class);

    calculator = new Calculator(Collections.singletonList(mockOperation));

    }

    @Test

    public void throwExceptionWhenNoSuitableOperationFound() {

    when(mockOperation.handles(anyChar())).thenReturn(false);

    assertThrows(IllegalArgumentException.class,

    () -> calculator.calculate(2, 2, ''*''));

    }

    @Test

    public void shouldCallApplyMethodWhenSuitableOperationFound() {

    when(mockOperation.handles(anyChar())).thenReturn(true);

    when(mockOperation.apply(2, 2)).thenReturn(4);

    calculator.calculate(2, 2, ''*'');

    verify(mockOperation, times(1)).apply(2, 2);

    }

    }

    Listing 2-14

    Unit Test with Mock

    ```


    In the `@BeforeEach` class, we mock the `Operation` by calling `Mockito.mock`,
    and we construct the `Calculator` using the mocked operation. The mock is used
    in the test methods to have a certain behavior. In the first test method, we want
    to test the situation where no suitable operation can be found, and hence we instruct
    the mock to return `false` when the `handles` method is being called. The test
    will expect an exception; if the exception occurs, the test will succeed. The
    second test is to test if the correct flow is followed; we want to test the correct
    behavior. The mock is instructed to return `true` for the `handles` method and
    a return value for the `apply` method.


    # Perform Integration Testing with Spring Boot


    Spring Boot provides several annotations to aid in testing. The first is `@SpringBootTest`,
    which will make the test a Spring Boot–driven test, which means that the test
    context framework will be searching for the class annotated with `@SpringBootApplication`
    (if no specific configuration is passed) and will use that to actually start the
    application. See Listing [2-15](#464036_2_En_2_Chapter.xhtml#PC16).


    ```

    package com.apress.springboot3recipes.calculator;

    import static org.junit.jupiter.api.Assertions.assertThrows;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    @SpringBootTest(classes = CalculatorApplication.class)

    public class CalculatorApplicationTests {

    @Autowired

    private Calculator calculator;

    @Test

    public void doingDivisionShouldFail() {

    assertThrows(IllegalArgumentException.class,

    () -> calculator.calculate(12,13, ''/''));

    }

    }

    Listing 2-15

    Spring Boot Integration Test

    ```


    The previous test will start the `CalculatorApplication` and inject the fully
    configured `Calculator`. We can then write a test, in this case a situation that
    the calculator cannot handle, and write expectations for it.


    When doing a calculation, the output is printed to the console. Using the `OutputCaptureExtension`
    JUnit extension, we could also write a success test and test the written output.
    See Listing [2-16](#464036_2_En_2_Chapter.xhtml#PC17).


    ```

    package com.apress.springboot3recipes.calculator;

    import static org.junit.jupiter.api.Assertions.assertThrows;

    import static org.junit.jupiter.api.Assertions.assertTrue;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.ExtendWith;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.context.SpringBootTest;

    import org.springframework.boot.test.system.CapturedOutput;

    import org.springframework.boot.test.system.OutputCaptureExtension;

    @ExtendWith(OutputCaptureExtension.class)

    @SpringBootTest(classes = CalculatorApplication.class)

    public class CalculatorApplicationTests {

    @Autowired

    private Calculator calculator;

    @Test

    public void doingMultiplicationShouldSucceed(CapturedOutput capture) {

    calculator.calculate(12,13, ''*'');

    assertTrue(capture.getOut().contains("12 * 13 = 156"));

    }

    @Test

    public void doingDivisionShouldFail() {

    assertThrows(IllegalArgumentException.class,

    () -> calculator.calculate(12,13, ''/''));

    }

    }

    Listing 2-16

    Spring Boot Integration Test (Extended)

    ```


    The `@ExtendWith` will configure the given JUnit extension, in this case the `OutputCaptureExtension`
    extension, which comes with Spring Boot and intercepts `System.out` and `System.err`
    so that assertions can be written on the output generated on those streams. To
    inspect the output, use the `CapturedOutput` class. This can be injected into
    the method automatically by the extension. In this case, we do multiplication,
    and the output should reflect that.'
