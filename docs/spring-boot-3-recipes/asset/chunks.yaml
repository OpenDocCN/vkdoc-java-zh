    ### 工作原理


    Spring Boot 使用 Micrometer 观测来观测通过您应用程序的调用。当 `spring-boot-starter-actuator` 作为依赖包含进来时，Spring
    Boot 会自动引入 Micrometer 观测。


    借此，Spring Boot 会自动设置一个 `ObservationHandler` 供您的应用程序使用。这个 `ObservationHandler`
    会被注入到一个 `ObservationRegistry` 中。`ObservationRegistry` 是一个被注入到框架和库的各个位置的组件。在撰写本文时，`ObservationRegistry`
    会自动应用于以下组件：


    *   Spring JMS

    *   Spring Web 和 Spring WebFlux

    *   Spring Security

    *   Spring Kafka

    *   Spring Data for MongoDB

    *   Spring Data R2DBC

    *   Spring Task Executor 和 Task Scheduler

    *   Spring AMQP (RabbitMQ)


    Spring Boot 在 `management.observations` 命名空间中暴露了一些属性，用于配置某些特性（参见表 9-4）。某些观测可以被禁用，但也可以指定要包含在观测中的默认值。这对于将应用程序名称或版本等部分作为默认键/值包含在内非常有用。


    表 9-4

    观测配置属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.observations.enable.<key>` | 设置是否应启用 `<key>` 的给定观测；默认值为 `true`。`all`
    是一个特殊关键字，用于启用或禁用所有观测。 |

    | [`management.observations.http.client.requests.name`](http://management.observations.http.client.requests.name)
    | 设置客户端请求的观测名称；默认值为 `http.client.requests`。 |

    | [`management.observations.http.server.requests.name`](http://management.observations.http.server.requests.name)
    | 设置服务器请求的观测名称；默认值为 `http.server.requests`。 |

    | `management.observations.key-values.<key>` | 设置应用于所有观测的公共键/值。默认值为空。 |

    | `management.observations.r2dbc.include-parameter-values` | 设置是否包含 R2DBC 观测的查询参数；默认值为
    `false`。 |


    ![](img/464036_2_En_9_Figd_HTML.gif)一个警告图标。 当 Spring Boot 检测到预先配置的 `ObservationHandler`
    时，它不会为您配置一个，并且表 9-4 中的属性将不会被应用，因为预期您会进行完整配置！


    接下来，您需要包含一个追踪桥接器（用于将 Micrometer 连接到所选的追踪解决方案）。这将引入必要的 Micrometer 追踪依赖（参见代码清单 9-12
    中一个使用 Zipkin 的 Brave 实现示例）。


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    io.micrometer

    micrometer-tracing-bridge-brave


    io.zipkin.reporter2

    zipkin-reporter-brave


    代码清单 9-12

    使用 Zipkin 的 Brave 追踪依赖

    ```


    有了所有这些依赖，Spring Boot 的自动配置将配置一个 `ObservationHandler`。默认情况下，它会设置一个 `io.micrometer.tracing.handler.DefaultTracingObservationHandler`。当检测到预先配置的
    `ObservationHandler` 时，Spring Boot 不会创建默认的，而是会重用预先配置的那个。


    除了配置 `ObservationHandler`，Spring Boot 还会稍微修改正在使用的日志模式，以自动包含已检测或生成的 `span-id` 和
    `trace-id`。这样，日志也将包含必要的信息，这在排查特定调用时非常有用。也可以通过在你的应用程序属性中指定 `logging.pattern.correlation`
    属性来手动配置日志模式。`span-id` 和 `trace-id` 在映射诊断上下文（MDC）中可用，名称为 `traceId` 和 `spanId`。代码清单
    9-13 显示了 Spring Boot 将应用于日志关联的默认模式。当然，如果需要，可以修改此模式。


    ```

    logging.pattern.correlation=[${spring.application.name:},%X{traceId:-},%X{spanId:-}]

    代码清单 9-13

    关联日志属性

    ```

