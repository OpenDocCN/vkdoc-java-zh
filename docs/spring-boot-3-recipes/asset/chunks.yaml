  raw: '#### Send Multiple Results as Events


    `ResponseBodyEmitter` is a sibling of the `SseEmitter` that can deliver events
    from the server to the client. For this Server-Sent-Events are used. Server-Sent-Events
    are messages from the server to the client. They have a `Content-Type` header
    of `text/event-stream`. They are quite lightweight with only four fields (see
    Table [3-13](#464036_2_En_3_Chapter.xhtml#Tab13)).


    Table 3-13


    Allowed Fields for Server-Sent-Events


    | Field | Description |

    | --- | --- |

    | `Id` | The ID of the event |

    | `Event` | The type of event |

    | `Data` | The event data |

    | `Retry` | Reconnection time for the event stream |


    To send events from a request handling method, you need to create an instance
    of `SseEmitter` and return it from the request handling method. Then use the `send`
    method to send individual elements to the client. See Listing [3-47](#464036_2_En_3_Chapter.xhtml#PC52).


    ```

    @GetMapping("/orders")

    public SseEmitter orders() {

    var emitter = new SseEmitter();

    executor.execute(() -> {

    var orders = orderService.findAll();

    try {

    for (var order : orders) {

    sendAndDelay(emitter, order);

    }

    emitter.complete();

    } catch (IOException ex) {

    emitter.completeWithError(ex);

    }

    });

    return emitter;

    }

    private void sendAndDelay(ResponseBodyEmitter emitter, Order order)

    throws IOException{

    emitter.send(order, MediaType.APPLICATION_JSON);

    randomDelay();

    }

    Listing 3-47

    OrderController with SseEmitter

    ```


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figt_HTML.gif)An information icon
    with the letter i inside a circle. There is a delay in sending each item to the
    client, just so you can see the different events coming in. You wouldn’t do this
    in real code.


    Now when the URL `http://localhost:8080/orders` is called, you see events coming
    in one by one (Figure [3-18](#464036_2_En_3_Chapter.xhtml#Fig18)).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig18_HTML.jpg)


    A screenshot of the marten window. It reads a set of program commands that use
    a tool to call the local host order through a h t t p link and generates the events
    one by one.


    Figure 3-18


    Server-Sent-Events result


    Note the `Content-Type` header. It has a value of `text/event-stream` to indicate
    that we get a stream of events. The stream can be kept open and to receive event
    notifications. Each object written is converted to JSON. This is done with an
    `HttpMessageConverter` just as with a plain `ResponseBodyEmitter`. Each object
    is written in the `data` tag as the event data.


    If you want to add more info to the event (fill one of the other fields as mentioned
    in Table [3-13](#464036_2_En_3_Chapter.xhtml#Tab13)), use the `SseEventBuilder`.
    The `event()` factory method of the `SseEmitter` creates an instance. Use it to
    fill in the `id` and `event` fields. See Listing [3-48](#464036_2_En_3_Chapter.xhtml#PC53).


    ```

    private void sendAndDelay(ResponseBodyEmitter emitter, Order order) throws IOException{

    var eventBuilder = SseEmitter.event();

    emitter.send(

    eventBuilder

    .data(order, MediaType.APPLICATION_JSON)

    .name("order-created")

    .id(String.valueOf(order.hashCode())).build());

    randomDelay();

    }

    Listing 3-48

    OrderController with SseEmitter: Extended Events

    ```


    Now when calling the URL `http://localhost:8080/orders`, events contain `id`,
    `event`, and `data` fields. See Figure [3-19](#464036_2_En_3_Chapter.xhtml#Fig19).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig19_HTML.jpg)


    A screenshot of the marten window. It reads a set of program commands that use
    a tool to call the local host order through a h t t p link and generates the events
    containing I D, event, and data fields.


    Figure 3-19


    Server-Sent-Events extended results


    #### Test Server-Sent Events


    Testing the output for Server-Sent Events is much like a regular async test. The
    main difference is the content type that is being returned (`text/event-stream`)
    and the assertions that are being done (on the `id`, `event`, and `data` fields).
    See Listing [3-49](#464036_2_En_3_Chapter.xhtml#PC54).


    ```

    package com.apress.springboot3recipes.order.rest;

    import com.apress.springboot3recipes.order.Order;

    import com.apress.springboot3recipes.order.OrderService;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.boot.test.mock.mockito.MockBean;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.result.MockMvcResultHandlers;

    import java.util.List;

    import static java.math.BigDecimal.TEN;

    import static org.hamcrest.Matchers.allOf;

    import static org.hamcrest.Matchers.containsString;

    import static org.mockito.Mockito.when;

    import static org.springframework.http.MediaType.TEXT_EVENT_STREAM_VALUE;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.asyncDispatch;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.request;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @WebMvcTest(OrderController.class)

    public class OrderControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @MockBean

    private OrderService orderService;

    @Test

    public void ordersEventStream() throws Exception {

    var orders = List.of(new Order("1234", TEN));

    when(orderService.findAll()).thenReturn(orders);

    var mvcResult = mockMvc.perform(get("/orders"))

    .andExpect(request().asyncStarted())

    .andDo(MockMvcResultHandlers.log())

    .andReturn();

    mockMvc.perform(asyncDispatch(mvcResult))

    .andDo(MockMvcResultHandlers.log())

    .andExpect(status().isOk())

    .andExpect(content().contentTypeCompatibleWith(TEXT_EVENT_STREAM_VALUE))

    .andExpect(content().string(

    allOf(

    containsString("data:{\"id\":\"1234\",\"amount\":10}"),

    containsString("event:order-created"),

    containsString("id:"))));

    }

    }

    Listing 3-49

    OrderControllerTest for Server-Sent Events Test

    ```


    ## 3-11\. Consume REST Resources with Spring MVC


    ### Problem


    You need to connect to a REST resource for your application and want to use a
    `RestTemplate` or `RestClient` for this.


    ### Solution


    Spring Boot provides the configuration and builders to help construct the needed
    classes. This recipe is going to build an application that can be used to consume
    the API, as shown in Recipe 3-2.


    You can use either the `RestTemplateBuilder` to create a `RestTemplate` and use
    that in your application or the exposed `RestClient.Builder` to create a `RestClient`.
    A final option is to use a declarative client using an `@HttpExchange`.


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Figu_HTML.gif)An information icon
    with the letter i inside a circle. The `RestClient` is a more fluent approach
    to building, executing, and processing REST calls than the `RestTemplate` is.
    It is built as a blocking variant of the `WebClient` for Webflux (see Chapter
    [4](#464036_2_En_4_Chapter.xhtml)).'
