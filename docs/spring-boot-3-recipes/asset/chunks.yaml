    将方法的签名改为返回 `CompletableFuture``<String>`，并使用 `AsyncTaskExecutor` 异步执行代码。参见清单 3-43。


    ```

    package com.apress.springboot3recipes;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.core.task.AsyncTaskExecutor;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import java.util.concurrent.CompletableFuture;

    import java.util.concurrent.ThreadLocalRandom;

    @RestController

    public class HelloWorldController {

    private final AsyncTaskExecutor taskExecutor;

    public HelloWorldController(AsyncTaskExecutor taskExecutor) {

    this.taskExecutor = taskExecutor;

    }

    @GetMapping

    public CompletableFuture hello() {

    return taskExecutor.submitCompletable(() -> {

    randomDelay();

    var version = SpringBootVersion.getVersion();

    return String.format("Hello World, from Spring Boot %s!", version);

    });

    }

    private void randomDelay() {

    try {

    Thread.sleep(ThreadLocalRandom.current().nextInt(5000));

    } catch (InterruptedException e) {

    Thread.currentThread().interrupt();

    }

    }

    }

    清单 3-43

    使用 CompletableFuture 的异步控制器

    ```


    该任务在 `AsyncTaskExecutor` 的一个线程上执行。我们使用 `submitCompletable` 提交任务，该方法返回一个 `CompletableFuture`。当返回
    `CompletableFuture` 时，你可以利用它的所有特性，例如组合和链式调用多个 `CompletableFuture` 实例。


    #### 测试异步控制器


    与常规控制器一样，Spring MVC 测试框架可用于测试异步控制器。


    创建一个测试类，并使用 `@WebMvcTest(HelloWorldController.class)` 对其进行注解。`@WebMvcTest` 将启动一个最小的
    Spring Boot 应用程序，其中包含测试控制器所需的内容。它会自动配置 Spring `MockMvc`，并将其自动注入到测试中。参见清单 3-44。


    ```

    package com.apress.springboot3recipes;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.MvcResult;

    import org.springframework.test.web.servlet.request.MockMvcRequestBuilders;

    import org.springframework.test.web.servlet.result.MockMvcResultHandlers;

    import static org.hamcrest.Matchers.startsWith;

    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.asyncDispatch;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.request;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @WebMvcTest(HelloWorldController.class)

    public class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    public void testHelloWorldController() throws Exception {

    MvcResult mvcResult = mockMvc.perform(MockMvcRequestBuilders.get("/"))

    .andExpect(request().asyncStarted())

    .andDo(MockMvcResultHandlers.print())

    .andReturn();

    mockMvc.perform(asyncDispatch(mvcResult))

    .andExpect(status().isOk())

    .andExpect(content().contentTypeCompatibleWith(MediaType.TEXT_PLAIN))

    .andExpect(content().string(startsWith("Hello World, from Spring Boot ")));

    }

    }

    清单 3-44

    HelloWorldController 的测试

    ```


    异步 Web 测试与常规 Web 测试的主要区别在于，需要启动异步分派。首先执行初始请求，并验证异步是否已启动。出于调试目的，你可以记录结果。接下来应用 `asyncDispatch`。最后，我们可以断言预期的响应。


    ![](img/464036_2_En_3_Figs_HTML.gif)一个信息图标，圆圈内包含字母 i。 除了使用 `asyncDispatch`，你也可以使用
    `mvcResult.getAsyncResult`（带或不带超时）来直接获取结果。但是，通常你希望对响应编写额外的断言。


    ## 3-10\. 创建响应写入器


    ### 问题


    你有一个服务或多次调用，并希望将响应分块发送给客户端。


    ### 解决方案


    使用 `ResponseBodyEmitter`（或其同类 `SseEmitter`）来分块发送响应。


    ### 工作原理


    其工作原理如下。

    '
- fmt: '### Send Multiple Results in a Response


    Spring MVC has a class named `ResponseBodyEmitter` that is particularly useful
    if instead of a single result you want to return multiple objects to the client.
    When sending an object, it is converted to a result using an `HttpMessageConverter`.
    To use the `ResponseBodyEmitter`, you have construct it and return it from the
    request handling method.


    Create an `OrderController` with an `orders` method that returns a `ResponseBodyEmitter`
    and send the results one by one to the client. See Listing [3-45](#464036_2_En_3_Chapter.xhtml#PC50).


    ```

    package com.apress.springboot3recipes.order.rest;

    import com.apress.springboot3recipes.order.Order;

    import com.apress.springboot3recipes.order.OrderService;

    import org.springframework.core.task.TaskExecutor;

    import org.springframework.http.MediaType;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import org.springframework.web.servlet.mvc.method.annotation.ResponseBodyEmitter;

    import java.io.IOException;

    import java.util.concurrent.ThreadLocalRandom;

    @RestController

    public class OrderController {

    private final OrderService orderService;

    private final TaskExecutor executor;

    public OrderController(OrderService orderService, TaskExecutor executor) {

    this.orderService = orderService;

    this.executor = executor;

    }

    @GetMapping("/orders")

    public ResponseBodyEmitter orders() {

    var emitter = new ResponseBodyEmitter();

    executor.execute(() -> {

    var orders = orderService.findAll();

    try {

    for (var order : orders) {

    sendAndDelay(emitter, order);

    }

    emitter.complete();

    } catch (IOException ex) {

    emitter.completeWithError(ex);

    }

    });

    return emitter;

    }

    private void sendAndDelay(ResponseBodyEmitter emitter, Order order) throws IOException{

    emitter.send(order, MediaType.APPLICATION_JSON);

    randomDelay();

    }

    private void randomDelay() {

    try {

    Thread.sleep(ThreadLocalRandom.current().nextInt(150));

    } catch (InterruptedException e) {

    Thread.currentThread().interrupt();

    }

    }

    }

    Listing 3-45

    OrderController Using ResponseBodyEmitter

    ```


    First a `ResponseBodyEmitter` is created and in the end returned from this method.
    Next a task is executed, which will query the reservations using the `OrderService.findAll`
    method. All the results from that call are returned one by one using the `send`
    method of the `ResponseBodyEmitter`. When all the objects have been sent, the
    `complete()` method needs to be called so that the thread responsible for sending
    the response can complete the request and be freed up for the next response to
    handle. When an exception occurs and you want to inform the user of this, you
    call the `completeWithError`. The exception will pass through the normal exception
    handling of Spring MVC, and after that the response is completed.


    When using a tool like `HTTPie` or `curl`, calling the URL `http://localhost:8080/orders`
    will yield the results shown in Figure [3-17](#464036_2_En_3_Chapter.xhtml#Fig17).
    The result will be chunked and has a status of 200 (OK).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig17_HTML.jpg)


    A screenshot of the marten window. It reads a set of program commands that use
    a tool, calls the local host order through a h t t p link, and yields chunked
    results with the status.


    Figure 3-17


    Chunked result


    Finally, let’s write a test for this controller. Annotate a class with `@WebMvcTest(OrderController.class)`
    to get a web slice test. `OrderController` needs an `OrderService` that is mocked
    by using `@MockBean` on the `OrderService` field. See Listing [3-46](#464036_2_En_3_Chapter.xhtml#PC51).


    ```

