    public void sayHello() {

    String msg = "Hello World, from Spring Boot 3, over Apache Kafka!";

    kafka.send("hello", msg);

    }

    }

    ```


    `HelloWorldSender` 将通过构造函数注入 `KafkaTemplate`。每 50 毫秒，就会向 `hello` 主题发送一条消息。


