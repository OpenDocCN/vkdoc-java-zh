    ## 5-5\. Add Security to a WebFlux Application


    ### Problem


    You have an application built with Spring WebFlux (see Chapter [4](#464036_2_En_4_Chapter.xhtml))
    and you want to secure it using Spring Security.


    ### Solution


    When adding Spring Security as a dependency to a WebFlux-based application, Spring
    Boot will automatically enable security. It will add an `@EnableWebFluxSecurity`
    configuration class to the application. The `@EnableWebFluxSecurity` annotation
    then imports the default Spring Security configuration called `WebFluxSecurityConfiguration`.'
  trans: '

    ### 工作原理


    借助 Spring Security，可以使用 Spring 表达式语言（SpEL）来创建强大的访问控制规则。Spring Security 内置支持若干表达式（完整列表见表
    5-8）。通过使用 `and`、`or` 和 `not` 等结构，你可以创建非常强大且灵活的表达式。


    **表 5-8 Spring Security 内置表达式**


    | 表达式 | 描述 |

    | --- | --- |

    | `hasRole(''role'')` 或 `hasAuthority(''authority'')` | 如果当前用户拥有指定角色，则返回 `true`
    |

    | `hasAnyRole(''role1'',''role2'')` 或 `hasAnyAuthority(''auth1'',''auth2'')` |
    如果当前用户至少拥有其中一个指定角色，则返回 `true` |

    | `hasIpAddress(''ip-address'')` | 如果当前用户拥有指定的 IP 地址，则返回 `true` |

    | `principal` | 当前用户 |

    | `authentication` | 访问 Spring Security 认证对象 |

    | `permitAll()` | 始终返回 `true` |

    | `denyAll()` | 始终返回 `false` |

    | `isAnonymous()` | 如果当前用户是匿名用户，则返回 `true` |

    | `isRememberMe()` | 如果当前用户通过“记住我”功能登录，则返回 `true` |

    | `isAuthenticated()` | 如果当前用户不是匿名用户，则返回 `true` |

    | `isFullyAuthenticated()` | 如果当前用户既不是匿名用户也不是“记住我”用户，则返回 `true` |

    | `access()` | 使用函数判断是否授予访问权限 |


    ![](img/464036_2_En_5_Figh_HTML.gif)一个关于火的抽象说明。尽管角色（role）和权限（authority）几乎相同，但它们在处理方式上存在细微但重要的区别。使用
    `hasRole` 时，会检查传入的角色值是否以 `ROLE_`（默认角色前缀）开头。如果不是，则在检查权限之前会自动添加此前缀。因此，`hasRole(''ADMIN'')`
    实际上会检查当前用户是否拥有 `ROLE_ADMIN` 权限。而使用 `hasAuthority` 时，则会按原样检查该值。


    之前的表达式表示：如果某人拥有 `ADMIN` 角色，或者是在本地机器上登录，则允许其删除图书。在定义匹配器时，可以通过 `access` 方法（而非某个
    `has*` 方法）来编写此类表达式。参见代码清单 5-29。


    ```

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    @Override

    public SecurityFilterChain securityFilterChain(HttpSecurity http) throws Exception
    {

    http

    .authorizeRequests()

    .requestMatchers(HttpMethod.GET, "/books*")

    .hasAnyRole("USER", "GUEST")

    .requestMatchers(HttpMethod.POST, "/books*")

    .hasRole("USER")

    .requestMatchers(HttpMethod.DELETE, "/books*")

    .access("hasRole(''ADMIN'') or hasIpAddress(''127.0.0.1'') " +

    "or hasIpAddress(''0:0:0:0:0:0:0:1'')");

    return http.build();

    }

    代码清单 5-29

    包含访问规则的 Spring Security 配置

    ```


    #### 使用表达式通过 Spring Bean 做出访问控制决策


    在表达式中使用 `@` 语法，可以调用应用上下文中的任何 Bean。因此，你可以编写类似 `@accessChecker.hasLocalAccess(authentication)`
    的表达式，并提供一个名为 `accessChecker` 的 Bean，该 Bean 包含一个接受 `Authentication` 对象的 `hasLocalAccess`
    方法。参见代码清单 5-30。


    ```

    package com.apress.springboot3recipes.library.security;

    import org.springframework.security.core.Authentication;

    import org.springframework.security.web.authentication.WebAuthenticationDetails;

    import org.springframework.stereotype.Component;

    @Component

    public final class AccessChecker {

    public boolean hasLocalAccess(Authentication auth) {

    boolean access = false;

    if (auth.getDetails() instanceof WebAuthenticationDetails details) {

    String address = details.getRemoteAddress();

    access = address.equals("127.0.0.1") || address.equals("0:0:0:0:0:0:0:1");

    }

    return access;

    }

    }

    代码清单 5-30

    AccessChecker 源码

    ```


    接下来，你可以在 `access` 方法中使用 SpEL 来调用这个 `AccessChecker`。参见代码清单 5-31。


    ```

    @Bean

    public SecurityFilterChain securityFilterChain(HttpSecurity http) throws Exception
    {

    http

    .authorizeRequests()

    .requestMatchers(HttpMethod.GET, "/books*").hasAnyRole("USER", "GUEST")

    .requestMatchers(HttpMethod.POST, "/books*").hasRole("USER")

    .requestMatchers(HttpMethod.DELETE, "/books*")

    .access("hasRole(''ADMIN'') or @accessChecker.hasLocalAccess(authentication)");

    return http.build();

    }

    代码清单 5-31

    使用 AccessChecker 的 Spring Security 访问规则

    ```


    #### 使用注解和表达式保护方法


    你可以使用 `@PreAuthorize` 和 `@PostAuthorize` 注解来保护方法调用，而不仅仅是保护 URL。使用这些注解，你可以像基于 URL
    的安全机制一样编写基于安全性的表达式。要启用注解处理，请在安全配置中添加 `@EnableMethodSecurity` 注解。参见代码清单 5-32。


    ```

    @Configuration

    @EnableMethodSecurity

    public class LibrarySecurityConfig implements WebMvcConfigurer {

    }

    代码清单 5-32

    启用方法安全性的安全配置

    ```


    现在，你可以使用 `@PreAuthorize` 注解来保护你的应用程序。参见代码清单 5-33。


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.security.access.prepost.PreAuthorize;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    @PreAuthorize("isAuthenticated()")

    public Iterable findAll() {

    return books.values();

    }

    @PreAuthorize("hasAuthority(''USER'')")

    public Book create(Book book) {

    books.put(book.isbn(), book);

    return book;

    }

    @PreAuthorize("hasAuthority(''ADMIN'') " +

    "or @accessChecker.hasLocalAccess(authentication)")

    public void remove(Book book) {

    books.remove(book.isbn());

    }

    public Optional find(String isbn) {

    return Optional.ofNullable(books.get(isbn));

    }

    }

    代码清单 5-33

    包含授权规则的 InMemoryBookService

    ```


    `@PreAuthorize` 注解会触发 Spring Security 验证表达式。如果验证成功，则授予访问权限；否则，将抛出一个异常，告知用户访问未被授权。


    ## 5-5. 为 WebFlux 应用程序添加安全性


    ### 问题


    你有一个使用 Spring WebFlux 构建的应用程序（参见第 4 章），并且希望使用 Spring Security 来保护它。


    ### 解决方案


    当将 Spring Security 作为依赖项添加到基于 WebFlux 的应用程序时，Spring Boot 会自动启用安全性。它会在应用程序中添加一个
    `@EnableWebFluxSecurity` 配置类。然后，`@EnableWebFluxSecurity` 注解会导入名为 `WebFluxSecurityConfiguration`
    的默认 Spring Security 配置。

    '
- fmt: '### How It Works


    A Spring WebFlux application is very different in nature than a regular Spring
    MVC application. Nonetheless, Spring Boot and Spring Security strive to make it
    easier to build secure WebFlux-based applications.


    To enable security, add `spring-boot-starter-security` to your WebFlux application
    (from Recipe 4-3). See Listing [5-34](#464036_2_En_5_Chapter.xhtml#PC38).


    ```

    org.springframework.boot

    spring-boot-starter-security


    Listing 5-34

    Spring Security Starter Dependency

    ```


    This will add the `spring-security-core`, `spring-security-config`, and `spring-security-web`
    dependencies to your project. Spring Boot detects the availability of some of
    the classes inside these JAR files and with that will automatically enable security.


    Spring Boot will configure Spring Security with the following:


    - Authentication with Basic authentication and form login

    - HTTP headers for security

    - Login requirements to access any resource


    > ⚠️ Spring Boot will add a default user, named `user` and with a generated password,
    that is visible in the startup logs. This is intended to be used only for testing.
    Prototyping and demos do not use the generated user in a live system.


    When adding the dependency `spring-boot-starter-security` to Recipe 3-3, it will
    automatically secure all exposed endpoints. At startup, the generated password
    will be logged (see Figure [5-6](#464036_2_En_5_Chapter.xhtml#Fig6)).


    ![A screenshot of the Spring Boot page. It has a set of program logs that automatically
    secure all exposed endpoints and at the start-up, the generated password will
    be logged.](images/464036_2_En_5_Chapter/464036_2_En_5_Fig6_HTML.jpg)


    **Figure 5-6** Secure WebFlux output


    Now when trying to access `http://localhost:8080/`, a login page will be shown
    (see Figure [5-7](#464036_2_En_5_Chapter.xhtml#Fig7)).


    ![A screenshot of the local host page displays the login page. It reads, please
    sign in with the fields for username and password along with the sign-in button.](images/464036_2_En_5_Chapter/464036_2_En_5_Fig7_HTML.jpg)


    **Figure 5-7** Default login page


    ### Secure URL Access


    Access rules can be configured by adding a custom `SecurityWebFilterChain`. First
    let’s create an `OrdersSecurityConfiguration`. See Listing [5-35](#464036_2_En_5_Chapter.xhtml#PC39).


    ```

    @Configuration

    @EnableWebFluxSecurity

    public class OrdersSecurityConfiguration {

    @Bean

    public SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) {

    http

    .formLogin(Customizer.withDefaults())

    .headers(Customizer.withDefaults())

    .logout(Customizer.withDefaults())

    .csrf(Customizer.withDefaults());

    return http.build();

    }

    }

    Listing 5-35

    Spring Security Configuration for WebFlux

    ```


    The `WebFluxSecurityConfiguration` class from Spring Security detects instances
    of `SecurityWebFilterChain` (containing the security configuration), which is
    wrapped as a `WebFilter`, which in turn is used by WebFlux to add behavior to
    the incoming request (just as a normal servlet filter). `WebFluxSecurityConfiguration`
    is included through the `@EnableWebFluxSecurity` annotation (which is also provided/enabled
    by Spring Boot).


    Currently, the configuration now only enables security; let’s add some security
    rules. See Listing [5-36](#464036_2_En_5_Chapter.xhtml#PC40).


    ```

    @Configuration

    @EnableWebFluxSecurity

    public class OrdersSecurityConfiguration {

    @Bean

    public SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) {

    http

    .formLogin(Customizer.withDefaults())

    .headers(Customizer.withDefaults())

    .logout(Customizer.withDefaults())

    .csrf(Customizer.withDefaults());

    http

    .authorizeExchange((auth) -> auth

    .pathMatchers("/").permitAll()

    .pathMatchers("/orders*").hasRole("USER")

    .anyExchange().authenticated());

    return http.build();

    }

    }

    Listing 5-36

    Spring Security Configuration for WebFlux with Access Rules

    ```


    `ServerHttpSecurity` should look familiar (see the other recipes in this chapter)
    and is used to add security rules and do further configuration (such as adding/removing
    headers and configuring the login method). With `authorizeExchange`, it is possible
    to write rules; here we secure URLs. The `/` is permitted for everyone, and the
    `/orders` URLs are available only for the role `USER`. For other requests, you
    have to at least be authenticated. Finally, you need to call `build()` to actually
    build and return the `SecurityWebFilterChain`.


    In addition to `authorizeExchange`, it is possible to use the `headers()` configuration
    method to add security headers to requests, use `csrf()` to add CSRF protection,
    etc.


    ### Log in to WebFlux Applications


    You can override parts of the default configuration by explicitly configuring
    them, and you can override the authentication manager used and the repository
    used to store the security context. The authentication manager is detected automatically;
    you just need to register a bean of type `ReactiveAuthenticationManager` or `UserDetailsRepository`.


    You can also configure the location where `SecurityContext` is stored by configuring
    the `ServerSecurityContextRepositor`. The default implementation used is the `WebSessionServerSecurityContextRepository`,
    which stores the context in `WebSession`. The other default implementation is
    `NoOpServerSecurityContextRepository`, which is used in stateless applications.
    See Listing [5-37](#464036_2_En_5_Chapter.xhtml#PC41).


    ```

    @Bean

    SecurityWebFilterChain springWebFilterChain(ServerHttpSecurity http) throws Exception
    {

    return http

    .formLogin()

    .authenticationManager(new CustomReactiveAuthenticationManager())

    .securityContextRepository(new NoOpServerSecurityContextRepository())

    .build();

    }

    Listing 5-37

    Spring Security Configuration

    ```


    This will override the defaults with a `CustomReactiveAuthenticationManager` and
    the stateless `NoOpServerSecurityContextRepository`. However, for our application,
    we are going to stick with the defaults.'
