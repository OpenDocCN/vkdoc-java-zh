    To determine whether the message has been sent, we need a Kafka `Consumer`. For
    this we can use the `ConsumerFactory` from Spring Kafka to easily create one.
    We subscribe to the topic and check if we get any messages.


    ![](images/464036_2_En_8_Chapter/464036_2_En_8_Figf_HTML.gif)A light bulb icon.The
    default `KafkaTemplate` doesn’t come preconfigured with `ConsumerFactory`. If
    this is being set (or you are using a custom configured `KafkaTemplate`), that
    could be used as well.


    #### Send an Object


    To send a message to Kafka, the message payload has to be converted into a `byte[]`.
    For a `String`, that is pretty easy by calling `String.getBytes`. However, when
    sending an object, this becomes more cumbersome. The default Spring Kafka auto-configuration
    will set up the sending of `String`-based messages.


    To be able to send a different type of value, you need to configure a `Serializer`
    for the producer. This can be done through the `spring.kafka.producer.value-serializer`
    property. Additional configuration can be passed through the `spring.kafka.producer.properties`
    namespace. Here we will set up the `JsonSerializer`, which will create JSON from
    our passed-in `Order` object. See Listing [8-40](#464036_2_En_8_Chapter.xhtml#PC47).


    ```

    spring.kafka.bootstrap-servers=localhost:9092 spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
    spring.kafka.properties.spring.json.trusted.packages=com.apress.springboot3recipes.order

    Listing 8-40

    Serializer Configuration

    ```


    `spring.kafka.producer.value-serializer` is set to `JsonSerializer`; by default
    only a few types are allowed to be sent. Hence, setting `spring.json.trusted.packages`
    will allow classes from that package to be sent.


    Let’s create an `Order` and use the `KafkaTemplate` to send it to the `orders`
    topic. See Listing [8-41](#464036_2_En_8_Chapter.xhtml#PC48).


    ```

    package com.apress.springboot3recipes.order;

    import java.math.BigDecimal;

    public record Order (String id, BigDecimal amount) { }

    Listing 8-41

    Order Class

    ```


    Now that we have an order, let’s create a scheduled method that periodically sends
    a message with a random order. See Listing [8-42](#464036_2_En_8_Chapter.xhtml#PC49).


    ```

    @Component

    class OrderSender {

    private final KafkaTemplate kafka;

    OrderSender(KafkaTemplate kafka) {

    this.kafka = kafka;

    }

    @Scheduled(fixedRate = 50)

    public void sendOrder() {

    var order = OrderGenerator.generate();

    kafka.send("orders", order);

    }

    }

    Listing 8-42

    OrderSender for Kafka

    ```


    It will create an `Order` with a random amount and a max of 1000.00\. It will
    then send it using the `send` method to the `orders` topic. Using `JsonDeserializer`,
    it will create JSON from the object and eventually convert that into a `byte[]`
    that is being sent out to Kafka.


    ## 8-9\. Receive Messages Using Kafka


    ### Problem


    You want to receive messages from a Kafka topic.


    ### Solution


    Annotating a method with `@KafkaListener` will bind it to a topic and will let
    it receive messages.'
