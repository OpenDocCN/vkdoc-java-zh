    ## 7-6\. Observe Your Application with Micrometer


    In Recipe 7-5 you looked at the Java Flight Recorder. While that is a powerful
    tool, for Spring Boot applications it’s mainly useful for monitoring the startup
    of an application. It is no replacement for a Java profiler or metrics library
    like Micrometer. When the need arises, Spring and Spring Boot integrate with Micrometer
    out of the box, as do many of the Spring portfolio projects such as Spring Security,
    Spring Data, etc.


