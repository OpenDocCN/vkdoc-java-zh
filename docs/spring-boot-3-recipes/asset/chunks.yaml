  trans: '

    ### 工作原理


    在测试 R2DBC 代码时，需要用到数据库。通常使用 H2、Derby 或 HSQLDB 等嵌入式数据库进行测试。Spring Boot 让编写 R2DBC
    测试变得简单。基于 R2DBC 的测试可以使用 `@DataR2JpaTest` 注解，Spring Boot 将创建一个仅包含 R2DBC 相关 Bean
    的最小化应用程序。这些 R2DBC 相关的 Bean 包括 `ConnectionFactory`、事务管理器，以及（如果需要的话）Spring Data
    R2DBC 仓库。


    #### 使用嵌入式数据库测试 R2DBC 代码


    我们来为 `CustomerRepository` 编写一个测试，并使用 H2 作为嵌入式数据库。首先，将 H2 添加为测试依赖项（清单 6-77）。


    ```

    io.r2dbc

    r2dbc-h2

    test


    清单 6-77

    用于测试的响应式 H2 依赖项

    ```


    如你所见，这不仅仅是 H2 依赖项，而是 `r2dbc-h2` 依赖项（它会拉取 H2 数据库）。此依赖项是 H2 常规 JDBC 驱动对应的响应式版本。


    接下来创建 `CustomerRepositoryTest`（清单 6-78）。


    ```

    @DataR2dbcTest

    @TestPropertySource(properties =

    { "spring.r2dbc.url=r2dbc:h2:mem://testdb",

    "spring.r2dbc.generate-unique-name=true" })

    @Import(R2dbcCustomerRepository.class)

    class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private DatabaseClient db;

    @BeforeEach

    public void setup() {

    db.sql("DELETE FROM customer").fetch().first().subscribe();

    }

    }

    清单 6-78

    CustomerRepositoryTest 类

    ```


    `@DataR2dbcTest` 注解通过一个特殊的 JUnit 扩展（`SpringExtension`）来执行测试，以引导 Spring 测试上下文框架。`@DataR2dbcTest`
    注解会设置 Spring Data R2DBC（如果需要），并启用所有其他 R2DBC 功能。使用 `@TestPropertySource`，我们提供了
    `spring.r2dbc.url`，指向一个 H2 内存数据库，并将 `spring.r2dbc.generate-unique-name` 设置为 `true`。由于我们要测试仓库，因此添加了
    `@Import(R2dbcCustomerRepository.class)`。在 `@BeforeEach` 中，我们清理数据库，以防止一个测试干扰另一个测试。


    提示


    当使用基于 Spring Data R2DBC 的仓库时，你不需要 `@Import`，因为仓库会被自动检测到。


    现在编写一个测试，验证记录是否正确插入（清单 6-79）。


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    repository.save(newCustomer)

    .as(StepVerifier::create)

    .assertNext( (c) -> assertThat(c.id()).isNotNull())

    .verifyComplete();

    }

    清单 6-79

    CustomerRepository 插入新客户测试

    ```


    通过调用 `CustomerRepository` 上的 `save` 方法，将一个 `Customer` 实例添加到数据库中。验证生成的 `Customer`
    实例是否具有 ID，并确认响应式管道是否已完成。


    你可以添加的另一个测试是 `findAll` 方法。当插入两条记录时，调用 `findAll` 应检索到两条记录（清单 6-80）。


    ```

    @Test

    void findAllCustomers() {

    var customers = Flux.just(

    new Customer("T. Testing1", "t.testing@test123.tst"),

    new Customer("T. Testing2", "t.testing@test123.tst"));

    customers.doOnNext(repository::save)

    .as(StepVerifier::create)

    .expectNextCount(2)

    .verifyComplete();

    }

    清单 6-80

    CustomerRepository 查找所有测试

    ```


    当然，还可以有更多断言，但保存数据的操作已在另一个测试方法中得到验证。


    #### 使用 Testcontainers 测试 Spring Data R2DBC 代码


    如今更好的选择是使用 Testcontainers。Testcontainers 使用 Docker 为你的特定技术启动一个 Docker 容器。在这种情况下，我们可以使用
    PostgreSQL Docker 镜像来启动一个真实的数据库，并在测试中使用它。这样，你现在就可以使用实际的数据库进行测试，而无需使用内存版本，这意味着你可以执行所有想要的查询并对其进行测试。它还为你提供了测试数据库迁移脚本（如果使用的话）的机会。


    要使用 Testcontainers（此处针对 PostgreSQL），我们需要添加相应的依赖项（参见清单 6-81）。我们需要 Testcontainers
    的 PostgreSQL 依赖项、JUnit Jupiter 依赖项以及一个专门用于 R2DBC 的依赖项。


    ```

    org.springframework.boot

    spring-boot-testcontainers

    test


    org.testcontainers

    postgresql

    test


    org.testcontainers

    r2dbc

    test


    清单 6-81

    用于 PostgreSQL 和 JUnit Jupiter 的 Testcontainers 依赖项

    ```


    现在编写一个测试，验证记录是否正确插入到我们的实际 PostgreSQL 数据库中（参见清单 6-82）。


    ```

    @Import(R2dbcCustomerRepository.class)

    @Testcontainers

    class CustomerRepositoryTest {

    @Container

    @ServiceConnection

    static PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15-alpine");

    @Autowired

    private CustomerRepository repository;

    清单 6-82

    用于 Testcontainers 的 CustomerRepositoryTest 测试设置

    ```


    `@DataR2dbcTest` 注解通过一个特殊的 JUnit 扩展（`SpringExtension`）来执行测试，以引导 Spring 测试上下文框架。现在，为了注册
    Testcontainers 的特殊 JUnit 扩展，添加了 `@Testcontainers` 注解。此扩展会查找带有 `@Container` 注解的字段，并启动相应的容器。对于此测试，它是一个
    `PostgreSQLContainer`，我们指示它使用 PostgreSQL 15 Docker 容器。Testcontainers 将负责下载此容器，启动一个实例，并在测试后停止它。


    由于每个测试的容器都会以不同的 URL 启动，我们需要将此信息告知我们的 Spring Boot 应用程序。为此，我们可以使用 `@ServiceConnection`
    注解。这是一个 Spring Boot 测试支持注解，它根据应用程序中的此容器实例注册所需的属性。诸如 `spring.r2dbc.url` 等属性会自动为测试添加。也可以使用静态方法上的
    `@DynamicPropertySource` 注解手动完成此操作（另请参见配方 2-3）。


    有了这些，我们现在可以编写一些测试来验证我们的行为（清单 6-83）。


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    repository.save(newCustomer)

    .as(StepVerifier::create)

    .assertNext( (c) -> assertThat(c.id()).isNotNull())

    .verifyComplete();

    }

    @Test

    void findAllCustomers() {

    var customers = Flux.just(

    new Customer("T. Testing1", "t.testing@test123.tst")

    ,new Customer("T. Testing2", "t.testing@test123.tst"));

    customers.flatMap(repository::save)

    .as(StepVerifier::create)

    .expectNextCount(2)

    .verifyComplete();

    repository.findAll()

    .count()

    .as(StepVerifier::create)

    .expectNext(6L)

    .verifyComplete();

    }

    清单 6-83

    使用 Testcontainers 的 CustomerRepositoryTest 测试

    ```


    这些测试与嵌入式数据库使用的测试或多或少相似；但是，这里我们的数据库中已经有一些额外的数据，我们必须在测试中考虑到这一点。这取决于你的数据库迁移脚本是什么样的。如果它生成一个空模式，则无需更改测试。

    '
- fmt: '# 7. Java Enterprise Services


    In this chapter, you will learn about Spring Boot''s support for the most common
    Java enterprise services: using Java Management Extensions (JMX), sending email
    with Jakarta Mail, and scheduling tasks.


    JMX is part of Java SE and is a technology for managing and monitoring system
    resources such as devices, applications, objects, and service-driven networks.
    These resources are represented as managed beans (MBeans). Spring supports JMX
    by exporting any bean as a model MBean without programming against the JMX API.


    Jakarta Mail is the standard API and implementation for sending email in Java.
    Spring further provides an abstract layer to send email in an implementation-independent
    fashion, and Spring Boot adds automatic configuration when detected.


    There are two main options for scheduling tasks on the Java platform: JDK Timer
    and Quartz Scheduler. JDK Timer offers simple task scheduling features that are
    bundled with the JDK. Compared with JDK Timer, Quartz offers more powerful job
    scheduling features. For both options, Spring supplies utility classes to configure
    scheduling tasks in a bean configuration file, without using either API directly.


    We will also cover how you can use the Java Flight Recorder as well as the Micrometer
    API to get insights into your application''s behavior and usage.


    ## 7-1. Configure Spring Asynchronous Processing


    ### Problem


    You want to asynchronously invoke a method with a long-running method.


    ### Solution


    Spring has support to configure a `TaskExecutor` and the ability to asynchronously
    execute methods annotated with `@Async`. This can be done in a transparent way
    without the normal setup for doing asynchronous execution. Spring Boot, however,
    will not automatically detect the need for asynchronous method execution. This
    support has to be enabled with the `@EnableAsync` configuration annotation.


    ### How It Works


    Let''s write a component that prints something in an asynchronous way to the console.
    See Listing 7-1.


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.scheduling.annotation.Async;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorldService {

    private final Logger logger = LoggerFactory.getLogger(getClass());

    @Async

    public void printMessage() {

    try {

    Thread.sleep(500);

    } catch (InterruptedException ex) {

    Thread.currentThread().interrupt();

    }

    logger.info("Hello World, from Spring Boot 3!");

    }

    }

    ```


    The class will wait for 500 milliseconds before printing something to the logger.
    The `@Async` annotation on the method indicates that the method will be executed
    in an asynchronous manner. However, this support has to be explicitly enabled
    for a Spring Boot application.


    To enable asynchronous processing, the `@EnableAsync` configuration annotation
    is needed. The easiest solution is to add this annotation to your application
    class. See Listing 7-2.


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.scheduling.annotation.EnableAsync;

    import java.io.IOException;

    @SpringBootApplication

    @EnableAsync

    public class ThreadingApplication {

    public static void main(String[] args) throws IOException {

    SpringApplication.run(ThreadingApplication.class, args);

    System.out.println("Press [ENTER] to quit:");

    System.in.read();

    }

    @Bean

    public ApplicationRunner startupRunner(HelloWorldService hello) {

    return (args) -> hello.printMessage();

    }

    }

    ```


    The `@EnableAsync` annotation registers the needed components for the async execution
    of methods as well as the detection of `@Async` annotated methods. Spring Boot
    will, if not explicitly configured, add a `TaskExecutor`.


    An abstract presents the information symbol. `System.in.read` is in there to prevent
    the application from shutting down so that the background tasks can finish processing.
    When you press the Enter key, the program will quit. Generally when developing
    a web application, you don''t need things like this.


    When running the application, the output will be similar to Figure 7-1.


    A set of codes. It features a threading application with no active profile set,
    and the enter key is used to quit the program.'
