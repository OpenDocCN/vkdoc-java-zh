    ## 3-8\. 为 Servlet 容器配置 SSL


    ### 问题


    你希望你的应用程序能够通过 HTTPS（或者替代 HTTP）进行访问。


    ### 解决方案


    获取一个证书，将其放入密钥库，并使用 `server.ssl` 属性来配置该密钥库。然后 Spring Boot 将自动配置服务器，使其仅能通过 HTTPS
    访问。


    ### 工作原理


    使用 `server.ssl.keystore`（及相关属性），你可以配置嵌入式容器仅接受 HTTPS 连接。在配置 SSL 之前，你需要有一个证书来保护你的应用程序。通常，你会希望从像
    Verisign 或 Let’s Encrypt 这样的证书颁发机构获取证书。然而，出于开发目的，你可以使用自签名证书（参见“创建自签名证书”一节）。


    #### 创建自签名证书


    Java 自带了一个名为 `keytool` 的工具，它可以用于生成证书等。参见清单 3-35。


    ```

    keytool -genkey -keyalg RSA -alias sb3-recipes -keystore sb3-recipes.pfx -storepass
    password -validity 3600 -keysize 4096 -storetype pkcs12

    清单 3-35

    keytool 命令

    ```


    此命令将指示 `keytool` 使用 RSA 算法生成一个密钥，并将其放入名为 `sb3-recipes.pfx` 的密钥库中，别名为 `sb3-recipes`，有效期为
    3600 天。运行该命令时，它会询问一些问题。请相应回答（或留空）。之后，会生成一个名为 `sb3-recipes.pfx` 的文件，其中包含证书，并用密码保护。


    将此文件放入 `src/main/resources` 文件夹中，这样它就会作为应用程序的一部分被打包，Spring Boot 也能轻松访问它。


    ![](img/464036_2_En_3_Fign_HTML.gif)一个三角形抽象图形内有一个感叹号符号。它类似于一个警告图标。 使用自签名证书会在浏览器中产生一个警告，提示该网站不安全且未受保护。


    #### 配置 Spring Boot 使用密钥库


    Spring Boot 需要知道密钥库的信息，才能配置嵌入式容器。为此，请使用 `server.ssl.keystore` 属性。你还需要指定密钥库的类型（`pkcs12`）和密码。参见清单
    3-36 和图 3-15。


    ![](img/464036_2_En_3_Fig15_HTML.jpg)


    一张 Spring Boot 下本地主机页面的截图。它在“可用书籍”下显示了标题、作者和 ISBN 的列表。该页面通过 http 链接访问。


    图 3-15


    通过 HTTPS 访问的图书馆


    ```

    server.ssl.key-store=classpath:sb3-recipes.pfx

    server.ssl.key-store-type=pkcs12

    server.ssl.key-store-password=password

    server.ssl.key-password=password

    server.ssl.key-alias=sb2-recipes

    清单 3-36

    SSL 属性

    ```


    #### 同时支持 HTTP 和 HTTPS


    Spring Boot 默认只启动一个连接器，要么是 HTTP，要么是 HTTPS，但不会同时启动两者。如果你想同时支持 HTTP 和 HTTPS，你需要手动添加一个额外的连接器。最简单的方法是自行创建
    HTTP 连接器，并让 Spring Boot 设置 SSL 部分。


    首先，让我们配置 Spring Boot 在端口 8443 上启动服务器。参见清单 3-37。


    ```

    server.port=8443

    清单 3-37

    服务器端口属性

    ```


    要向嵌入式 Tomcat 添加额外的连接器，你需要将 `TomcatServletWebServerFactory` 作为一个 bean 添加到我们的上下文中。通常
    Spring Boot 会检测容器并选择要使用的 `WebServerFactory`；然而，由于需要进行自定义，我们需要手动添加它。参见清单 3-38。


    ```

    @Bean

    public TomcatServletWebServerFactory tomcatServletWebServerFactory() {

    var factory = new TomcatServletWebServerFactory();

    factory.addAdditionalTomcatConnectors(httpConnector());

    return factory;

    }

    private Connector httpConnector() {

    var connector = new Connector(TomcatServletWebServerFactory.DEFAULT_PROTOCOL);

    connector.setScheme("http");

    connector.setPort(8080);

    connector.setSecure(false);

    return connector;

    }

    清单 3-38

    额外的 Tomcat 连接器

    ```


    这将在端口 8080 上添加一个额外的连接器，现在应用程序可以通过端口 8080 和 8443 使用了。使用 Spring Security，你现在可以强制通过
    HTTPS 而不是 HTTP 访问应用程序的某些部分。参见清单 3-39。


    ![](img/464036_2_En_3_Figo_HTML.gif)一个灯泡图标。 如果你不想显式配置 `TomcatServletWebServerFactory`，你可以使用
    `BeanPostProcessor` 向 `TomcatServletWebServerFactory` 注册额外的 `Connector`。这样，你就可以为不同的嵌入式容器实现此功能，而不是局限于单个容器。


    ```

    @Bean

    public BeanPostProcessor addHttpConnectorProcessor() {

    return new BeanPostProcessor() {

    @Override

    public Object postProcessBeforeInitialization(Object bean, String beanName)

    throws BeansException {

    if (bean instanceof TomcatServletWebServerFactory factory) {

    factory.addAdditionalTomcatConnectors(httpConnector());

    }

    return bean;

    }

    };

    }

    清单 3-39

    额外的 Tomcat 连接器：使用 BeanPostProcessor

    ```

