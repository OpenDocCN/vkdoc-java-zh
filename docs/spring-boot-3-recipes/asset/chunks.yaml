    name VARCHAR(100) NOT NULL,

    email VARCHAR(255) NOT NULL,

    UNIQUE(name)

    );

    清单 6-8

    客户 DDL

    ```


    要插入数据，请将 `data.sql` 文件添加到 `src/main/resources` 目录（清单 6-9）。


