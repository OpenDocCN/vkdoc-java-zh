    ## 4-4\. 使用 Spring WebFlux 处理异常


    ### 问题


    您希望为 Spring WebFlux 配置异常处理，并根据您的需求进行配置。


    ### 解决方案


    Spring WebFlux 提供了几种处理异常的方式，并且使用 Spring Boot 可以很容易地修改默认行为。


    对于与视图相关的实现，可以轻松添加能被自动识别的页面。添加 `error.html` 作为自定义错误页面，或者为特定的 HTTP 错误代码添加特定的错误页面，例如
    `404.html` 和 `500.html`。


    Spring Boot 也支持基于 REST 的控制器的异常处理。它将返回一个包含错误信息的响应，这与常规 WebFlux 异常处理中可用的错误信息非常相似。另一种选择是启用问题详情支持（RFC-7807），这是一个用于定义错误响应的小型标准。要启用它，请将
    `spring.webflux.problemdetails.enabled` 属性设置为 `true`。


    ### 工作原理


    现在我们来解释其工作原理。

