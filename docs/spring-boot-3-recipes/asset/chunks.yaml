    ![](img/464036_2_En_10_Fig4_HTML.jpg)


    命令提示符屏幕，显示 Docker 容器的日志输出。其中包括 Spring Boot，在 v 3.0.0-SNAPSHOT 上使用 Java 21 启动 Hello
    World 应用程序，PID 为 1，未设置活动配置文件，回退到 1 个默认配置文件，并在 4.357 秒内启动了 Hello World 应用程序。


    图 10-4


    Docker 容器的日志输出


    ![](img/464036_2_En_10_Figg_HTML.gif)信息图标。 在向基于 Unix 的系统设置变量时，通常应使用全大写字符作为名称，并将任何
    `.` 替换为 `_`。因此，传入 `spring.profiles.active` 时，它将变为 `SPRING_PROFILES_ACTIVE`。


