- fmt: '#### Handle Exceptions for REST Controllers


    Write a custom `ErrorAttributes` property to replace the default one (Figure [4-4](#464036_2_En_4_Chapter.xhtml#Fig4))
    and to fill the model that is being written as a response.


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig4_HTML.jpg)


    A screenshot of the marten window. HTTP response indicates a 500 Internal Server
    Error when trying to access the endpoint `books/500`. The response includes JSON
    data with details of the error, including the error message, path, request ID,
    status code, and timestamp.


    **Figure 4-4** Default error response


    By default Spring Boot will include the attributes shown in Table [4-2](#464036_2_En_4_Chapter.xhtml#Tab2)
    in the model for the error response.


    **Table 4-2** Default Error Model Attributes


    | **Attribute** | **Description** |

    | --- | --- |

    | `timestamp` | The time that the errors were extracted |

    | `status` | The status code |

    | `error` | The error reason |

    | `exception` | The class name of the root exception (if configured) |

    | `message` | The exception message |

    | `errors` | Any errors from a `BindingResult` (when using binding and/or validation)
    |

    | `trace` | The exception stack trace (if configured) |

    | `path` | The URL path when the exception was raised |


    This is all done through the use of an `ErrorAttributes` component. The default
    is `DefaultErrorAttributes`. You can create your own `ErrorAttributes` handler
    to create a custom model or extend `DefaultErrorAttributes` to add additional
    attributes. See Listing [4-20](#464036_2_En_4_Chapter.xhtml#PC23).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.web.error.ErrorAttributeOptions;

    import org.springframework.boot.web.reactive.error.DefaultErrorAttributes;

    import org.springframework.web.reactive.function.server.ServerRequest;

    import java.util.Map;

    public class CustomizedErrorAttributes extends DefaultErrorAttributes {

    @Override

    public Map getErrorAttributes(ServerRequest req,

    ErrorAttributeOptions options) {

    var errorAttributes = super.getErrorAttributes(req, options);

    errorAttributes.put("parameters", req.exchange().getRequest().getQueryParams());

    return errorAttributes;

    }

    }

    ```


    **Listing 4-20** Custom `ErrorAttributes` Implementation


    `CustomizedErrorAttributes` will add the original request parameters to the model
    next to the default attributes. The next step is to configure this as a bean so
    that Spring Boot can detect it and use it instead of configuring the default.
    Adding the bean definition in Listing [4-21](#464036_2_En_4_Chapter.xhtml#PC24)
    to the `LibraryApplication` will make that possible.


    ```

    @Bean

    public CustomizedErrorAttributes errorAttributes() {

    return new CustomizedErrorAttributes();

    }

    ```


    **Listing 4-21** Custom `ErrorAttributes` Bean Definition


    This will generate the error in Figure [4-5](#464036_2_En_4_Chapter.xhtml#Fig5);
    notice the additional `parameters` attribute.


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig5_HTML.jpg)


    A screenshot of the marten window. HTTP response indicates a 500 Internal Server
    Error when attempting to access the endpoint `books/500`. The response includes
    JSON data detailing the error, such as the error message, parameters, path, request
    ID, status code, and timestamp of when the error occurred.


    **Figure 4-5** Customized error response


    #### Enable and Use Problem Details


    Spring 6 added support for the Problem Details for HTTP API (RFC-7807), and with
    Spring Boot it is quite easy to enable it. By adding `spring.webflux.problemdetails.enabled=true`
    (or `spring.mvc.problemdetails.enabled=true` for MVC-based applications), this
    support will be enabled.


    When this is enabled, Spring Boot will register `ProblemDetailsExceptionHandler`
    as an additional `ExceptionHandler` with a higher order. The `ProblemDetailsExceptionHandler`
    will handle some well-known exception (all the Spring-related web exceptions)
    and return a result containing more information and of the type `application/problem+json`.
    See Figure [4-6](#464036_2_En_4_Chapter.xhtml#Fig6).


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig6_HTML.jpg)


    A screenshot of the shared reactive window. It reads a set of program codes in
    Spring Boot that registers the problem details exception handler and returns an
    internal server error result containing the type `application/problem+json`.


    **Figure 4-6** Problem detail error response


    Figure [4-6](#464036_2_En_4_Chapter.xhtml#Fig6) shows the result of calling `http://localhost:8080/books/500`
    with Problem Detail support enabled.


    This will work for all the different Spring MVC exceptions. When a validation
    or binding error occurs, it will also show a list of fields with the error on
    what failed. It will even translate (if possible) those error messages to the
    language used by the client (see also Recipes 4-5 and 4-6 for I18N support).


    ## 4-5. Implement Internationalization (I18N)


    ### Problem


    When developing an internationalized web application, you have to display your
    web pages in a user’s preferred locale. You don’t want to create different versions
    of the same page for different locales.


    ### Solution


    To avoid creating different versions of a page for different locales, you should
    make your web page independent of the locale by externalizing locale-sensitive
    text messages. Spring is able to resolve text messages for you by using a message
    source, which has to implement the `MessageSource` interface. In your page templates,
    you can then either use special tags or do lookups for the messages.'
