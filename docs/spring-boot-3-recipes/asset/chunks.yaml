  trans: "\n# 5. Spring Security\n\n在本章中，我们将探讨 Spring Boot 对 Spring Security 的集成。Spring\
    \ Security 可用于对应用程序的用户进行身份验证和授权。Spring Security 在身份验证和授权过程中均采用可插拔机制，并默认支持多种不同的机制。在身份验证方面，Spring\
    \ Security 内置了对 JDBC、LDAP 和属性文件的支持。\n\n## 5-1. 在 Spring Boot 应用程序中启用安全性\n\n###\
    \ 问题\n\n你有一个基于 Spring Boot 的应用程序，并希望在其中启用安全性。\n\n### 解决方案\n\n添加 `spring-boot-starter-security`\
    \ 作为依赖项，即可为你的应用程序自动设置和配置安全性。\n\n### 工作原理\n\n首先，你需要将 Spring Security 的库导入到你的应用程序中。为此，可以将\
    \ `spring-boot-starter-security` 添加到你的依赖项列表中。参见代码清单 5-1。\n\n```\norg.springframework.boot\n\
    spring-boot-starter-security\n\n代码清单 5-1\nSpring Security 起步依赖\n```\n\n这将把 `spring-security-core`、`spring-security-config`\
    \ 和 `spring-security-web` 依赖项添加到你的项目中。Spring Boot 会检测到 Spring Security 的存在，并自动启用安全性。\n\
    \nSpring Boot 将使用以下内容配置 Spring Security：\n\n*   使用基本身份验证和表单登录进行身份验证\n*   用于安全性的\
    \ HTTP 标头\n*   Servlet API 集成\n*   匿名登录\n*   禁用资源缓存\n\n    ![](img/464036_2_En_5_Figa_HTML.gif)一个三角形抽象图形，内部包含一个感叹号符号。它类似于一个警告图标。Spring\
    \ Boot 会添加一个默认用户，名为 `user`，并附带一个生成的密码，该密码在启动日志中可见。这仅用于测试、原型设计或演示。**切勿**在生产系统中使用生成的用户。\n\
    \n当将依赖项 `spring-boot-starter-security` 添加到配方 3-2 时，它将自动保护所有暴露的端点。在启动时，生成的密码将被记录（参见图\
    \ 5-1）。\n\n![](img/464036_2_En_5_Fig1_HTML.jpg)\n\nSpring Boot 应用程序页面的屏幕截图。它显示了通过启动库、初始化端口、启动\
    \ Servlet 服务和引擎以及初始化 Spring 嵌入式 Web 应用程序来生成密码的过程。\n\n图 5-1\n生成的密码输出\n\nSpring\
    \ Boot 暴露了一些属性来配置默认用户。你可以在 `spring.security` 命名空间中找到它们（参见表 5-1）。\n\n表 5-1\n默认用户的属性\n\
    \n| 属性 | 描述 |\n| --- | --- |\n| `spring.security.user.name` | 默认用户名；默认值为 `user`。\
    \ |\n| `spring.security.user.password` | 默认用户的密码；默认值为 `UUID`。 |\n| `spring.security.user.roles`\
    \ | 默认用户的角色。默认值为 `none`。 |\n\n添加依赖项并启动 `LibraryApplication` 后，端点将被保护。当尝试从 `http://localhost:8080/books`\
    \ 获取书籍列表时，结果将是一个 HTTP 状态码为 401（未授权）的响应（参见图 5-2）。\n\n![](img/464036_2_En_5_Fig2_HTML.jpg)\n\
    \nMarten 页面的屏幕截图。它显示了一组程序命令，这些命令从本地主机获取书籍列表，并返回 HTTP 状态码 401（未授权）。\n\n图 5-2\n\
    未认证的访问结果\n\n当添加正确的身份验证标头（用户名为 `user`，密码来自日志或 `spring.security.user.password` 属性中指定的值）时，结果将是正常的书籍列表（参见图\
    \ 5-3）。\n\n![](img/464036_2_En_5_Fig3_HTML.jpg)\n\nMarten 页面的屏幕截图。它包含一组程序命令，这些命令添加了正确的身份验证标头并读取了正常的书籍列表。\n\
    \n图 5-3\n已认证的访问结果\n\n#### 测试安全性\n\n当使用 Spring Security 并通过 `@WebMvcTest` 注解保护你的端点时，安全基础设施将自动应用。Spring\
    \ Security 提供了一些有用的注解来帮助编写测试（参见表 5-2）。\n\n表 5-2\n用于测试的 Spring Security 注解\n\n\
    | 注解 | 描述 |\n| --- | --- |\n| `@WithMockUser` | 以具有给定 `username`、`password` 和\
    \ `roles`/`authorities` 的用户身份运行 |\n| `@WithAnonymousUser` | 以匿名用户身份运行 |\n| `@WithUserDetails`\
    \ | 以配置了名称的用户身份运行；在 `UserDetailsService` 中执行查找 |\n\n![](img/464036_2_En_5_Figb_HTML.gif)一个信息图标，圆圈内有一个字母\
    \ i。  如果你想在没有安全性的情况下测试控制器，可以通过排除 `SecurityAutoConfiguration` 的运行来禁用它。为此，请在 `@WebMvcTest`\
    \ 注解上指定 `excludeAutoConfiguration`。\n\n要使用这些注解，请添加对 `spring-security-test` 的依赖。\n\
    \n```\norg.springframework.security\nspring-security-test\ntest\n\n```\n\n有了这个依赖项，就可以扩展并修复配方\
    \ 3-2 中的 `BookControllerTest`。如果你不介意在测试中禁用安全性，可以将 `@WebMvcTest(value = BookController.class,\
    \ excludeAutoConfiguration = SecurityAutoConfiguration.class)` 添加到测试类中。这样，安全过滤器就不会被添加，从而禁用了安全性。测试将运行并通过。参见代码清单\
    \ 5-2。\n\n```\n@WebMvcTest(value = BookController.class, excludeAutoConfiguration\
    \ = SecurityAutoConfiguration.class)\nclass BookControllerUnsecuredTest {\n}\n\
    代码清单 5-2\n禁用安全性的测试\n```\n\n但是，如果你想在启用安全性的情况下进行测试，则需要对测试类进行一些小的修改。首先，添加 `@WithMockUser`\
    \ 以使用已认证的用户运行。其次，由于 Spring Security 默认启用 CSRF 保护，因此需要在请求中添加一个标头或参数。使用 Mock MVC\
    \ 时，Spring Security 为此提供了一个 `RequestPostProcessor`，即 `CsrfRequestPostProcessor`。`SecurityMockMvcRequestPostProcessors`\
    \ 包含工厂方法，可以轻松使用它们。参见代码清单 5-3。\n\n```\npackage com.apress.springboot3recipes.library.rest;\n\
    import org.junit.jupiter.api.Test;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\nimport\
    \ org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.security.test.context.support.WithMockUser;\n\
    import static org.mockito.ArgumentMatchers.any;\nimport static org.mockito.Mockito.when;\n\
    import static org.springframework.security.test.web.servlet.request.SecurityMockMvcRequestPostProcessors.csrf;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.header;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
    @WebMvcTest(BookController.class)\n@WithMockUser\npublic class BookControllerSecuredTest\
    \ {\n@Autowired\nprivate MockMvc mockMvc;\n@MockBean\nprivate BookService bookService;\n\
    @Test\nvoid shouldAddBook() throws Exception {\nwhen(bookService.create(any(Book.class)))\n\
    .thenReturn(new Book(\"123456789\", \"Test Book Stored\", List.of(\"T. Author\"\
    )));\nmockMvc.perform(post(\"/books\")\n.with(csrf())\n.contentType(MediaType.APPLICATION_JSON)\n\
    .content(\"{ \\\"isbn\\\" : \\\"123456789\\\"}, \\\"title\\\" : \\\"Test Book\\\
    \", \\\"authors\\\" : [\\\"T. Author\\\"]\"))\n.andExpect(status().isCreated())\n\
    .andExpect(header().string(\"Location\", \"http://localhost/books/123456789\"\
    ));\n}\n}\n代码清单 5-3\n启用安全性的测试\n```\n"
- fmt: '测试现在使用`@WithMockUser`中指定的用户；这里它使用默认用户，用户名为`user`，密码为`password`。`with(csrf())`这一行负责向请求添加CSRF令牌。


    使用哪个选项取决于你的需求。例如，如果你的控制器中需要当前用户，那么应该启用安全功能，并使用`@WithMockUser`或`@WithUserDetails`注解。如果不是这种情况，并且你可以在没有安全功能的情况下测试控制器（并且没有额外的安全规则，如配方5-2中所述），你可以在禁用安全功能的情况下运行。


    ### 执行安全集成测试


    当使用`@SpringBootTest`编写集成测试时，是否可以使用`@With*`注解取决于所使用的`webEnvironment`。在默认的模拟环境下，它仍然可以工作。参见清单[5-4](#464036_2_En_5_Chapter.xhtml#PC5)。


    ```

    @SpringBootTest

    @WithMockUser

    @AutoConfigureMockMvc

    class BookControllerIntegrationMockTest {

    }

    清单 5-4 启用安全功能的模拟集成测试

    ```


    这个测试将创建一个近乎完整的应用程序，但仍然使用Mock MVC来访问端点。它仍然在与测试相同的进程中运行，这就是为什么`@WithMockUser`注解和`with(csrf())`仍然有效。当在外部端口上运行测试时，它将不再有效。


    要在端口上测试应用程序，你需要通过测试客户端`TestRestTemplate`和/或`WebTestClient`运行测试，并传递认证头，或者通过首先在集成测试中执行基于表单的登录来实现流程。要编写一个成功的集成测试，请注入`TestRestTemplate`，并在执行实际请求之前，使用`withBasicAuth`辅助方法来设置基本认证头。参见清单[5-5](#464036_2_En_5_Chapter.xhtml#PC6)。


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Figc_HTML.gif)一个灯泡图标。在编写此测试并使用默认用户时，你可能希望使用`spring.security.user.password`设置一个默认密码。本配方使用`@TestPropertySource`来执行此操作，但你也可以将其添加到`application.properties`文件中。


    ```

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @TestPropertySource(properties = "spring.security.user.password=s3cr3t")

    class BookControllerIntegrationTest {

    @Autowired

    private TestRestTemplate testRestTemplate;

    @MockBean

    private BookService bookService;

    @Test

    void shouldReturnListOfBooks() {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", List.of("Marten Deinum", "Josh Long")),

    new Book("321", "Pro Spring MVC", List.of("Marten Deinum", "Colin Yates"))));

    ResponseEntity books = testRestTemplate

    .withBasicAuth("user", "s3cr3t")

    .getForEntity("/books", Book[].class);

    assertThat(books.getStatusCode()).isEqualTo(HttpStatus.OK);

    assertThat(books.getBody()).hasSize(2);

    }

    }

    清单 5-5 使用 TestRestTemplate 的启用安全功能的集成测试

    ```


    该测试使用默认配置的`TestRestTemplate`来发起请求。`withBasicAuth`使用默认的`user`，并将`s3cr3t`作为用户名和密码发送到服务器。`getForEntity`可用于获取结果，包括关于响应的一些附加信息。使用`ResponseEntity`，还可以验证状态码等。


    当测试基于WebFlux的应用程序时，你需要使用`WebTestClient`而不是`TestRestTemplate`（有关Spring WebFlux的更多信息，另请参见第[4](#464036_2_En_4_Chapter.xhtml)章）。你可以使用`headers()`函数向请求添加额外的头。它暴露了`HttpHeaders`实例，该实例又具有方便的`setBasicAuth`方法来应用基本认证。参见清单[5-6](#464036_2_En_5_Chapter.xhtml#PC7)。


    ```

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @TestPropertySource(properties = "spring.security.user.password=s3cr3t")

    @AutoConfigureWebTestClient

    class BookControllerIntegrationWebClientTest {

    @Autowired

    private WebTestClient webTestClient;

    @MockBean

    private BookService bookService;

    @Test

    void shouldReturnListOfBooks() {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", List.of("Marten Deinum", "Josh Long")),

    new Book("321", "Pro Spring MVC", List.of("Marten Deinum", "Colin Yates"))));

    webTestClient

    .get()

    .uri("/books")

    .headers( httpHeaders -> httpHeaders.setBasicAuth("user", "s3cr3t"))

    .exchange()

    .expectStatus().isOk()

    .expectBodyList(Book.class).hasSize(2);

    }

    清单 5-6 使用 WebTestClient 的启用安全功能的集成测试

    ```


    请求被构建并通过`exchange()`“触发”。然后期望结果是HTTP 200（OK），并且结果包含两本书。


    ## 5-2. 登录 Web 应用程序


    ### 问题


    一个安全的应用程序要求其用户在访问某些安全功能之前先登录。这对于在开放互联网上运行的应用程序尤其重要，因为黑客可以轻易地访问它们。大多数应用程序必须提供一种方式，让用户输入其凭据以登录。


    ### 解决方案


    Spring Security 支持多种方式让用户登录 Web 应用程序。它通过提供一个包含登录表单的默认网页来支持基于表单的登录。你也可以提供一个自定义网页作为登录页面。此外，Spring
    Security 通过处理 HTTP 请求头中提供的 Basic 认证凭据来支持 HTTP Basic 认证。HTTP Basic 认证也可用于对通过远程协议和
    Web 服务发出的请求进行认证。


    你应用程序的某些部分可能允许匿名访问（例如，访问欢迎页面）。Spring Security 提供了一个匿名登录服务，它可以为匿名用户分配一个主体并授予权限，这样在定义安全策略时，你可以像处理普通用户一样处理匿名用户。


    Spring Security 还支持“记住我”登录，它能够在多个浏览器会话中记住用户的身份，这样用户在首次登录后就不需要再次登录。'
  raw: 'The test now uses the user as specified in `@WithMockUser;` here it uses the
    default user with `user` as the username and `password` as the password. The line
    `with(csrf())` takes care of adding the CSRF token to the request.


    Which option to use depends on the needs you have. If for instance in your controller
    you need the current user, then security should probably be enabled, and an `@WithMockUser`
    or `@WithUserDetails` annotation should be used. If that isn’t the case and you
    can test your controller without the security (and you don’t have additional security
    rules, as in Recipe 5-2), you can run with disabled security.


    #### Perform Integration Testing for Security


    When using `@SpringBootTest` to write an integration test it depends on the used
    `webEnvironment` if you can use the `@With*` annotations. With the default mocked
    environment, it still will work. See Listing [5-4](#464036_2_En_5_Chapter.xhtml#PC5).


    ```

    @SpringBootTest

    @WithMockUser

    @AutoConfigureMockMvc

    class BookControllerIntegrationMockTest {

    }

    Listing 5-4

    Integration Test Using Mocks with Security Enabled

    ```


    This test will create an almost full-blown application but still uses Mock MVC
    to access the endpoints. It still runs in the same process as the tests, which
    is why the `@WithMockUser` annotation and `with(csrf())` still work. When running
    the test on an external port, it won’t work anymore.


    To test the application on a port, you would need to run the tests through the
    test client `TestRestTemplate` and/or `WebTestClient` and pass the authentication
    headers or implement the flow by first doing a form-based login in your integration
    test. To write a successful integration test, inject `TestRestTemplate`, and before
    doing the actual request, use the `withBasicAuth` helper method to set the basic
    authentication header. See Listing [5-5](#464036_2_En_5_Chapter.xhtml#PC6).


    ![](images/464036_2_En_5_Chapter/464036_2_En_5_Figc_HTML.gif)A bulb icon.When
    writing this test and using the default user, you might want to set a default
    password using `spring.security.user.password`. This recipe uses `@TestPropertySource`
    to do so, but you could add it to the `application.properties` file as well.


    ```

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @TestPropertySource(properties = "spring.security.user.password=s3cr3t")

    class BookControllerIntegrationTest {

    @Autowired

    private TestRestTemplate testRestTemplate;

    @MockBean

    private BookService bookService;

    @Test

    void shouldReturnListOfBooks() {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", List.of("Marten Deinum", "Josh Long")),

    new Book("321", "Pro Spring MVC", List.of("Marten Deinum", "Colin Yates"))));

    ResponseEntity books = testRestTemplate

    .withBasicAuth("user", "s3cr3t")

    .getForEntity("/books", Book[].class);

    assertThat(books.getStatusCode()).isEqualTo(HttpStatus.OK);

    assertThat(books.getBody()).hasSize(2);

    }

    }

    Listing 5-5

    Integration Test Using TestRestTemplate with Security Enabled

    ```


    The test uses the default configured `TestRestTemplate` to issue a request. `withBasicAuth`
    uses the default `user` and presets `s3cr3t` as the username and password to send
    to the server. `getForEntity` can be used to get the result including some additional
    information about the response. Using `ResponseEntity`, it is also possible to
    validate the status code, etc.


    When testing a WebFlux-based application instead of `TestRestTemplate`, you would
    need `WebTestClient` (see also Chapter [4](#464036_2_En_4_Chapter.xhtml) for more
    information on Spring WebFlux). You can use the `headers()` function to add additional
    headers to the request. It exposes the `HttpHeaders` instance, which in turn has
    the convenient `setBasicAuth` method to apply the basic authentication. See Listing
    [5-6](#464036_2_En_5_Chapter.xhtml#PC7).


    ```

    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.RANDOM_PORT)

    @TestPropertySource(properties = "spring.security.user.password=s3cr3t")

    @AutoConfigureWebTestClient

    class BookControllerIntegrationWebClientTest {

    @Autowired

    private WebTestClient webTestClient;

    @MockBean

    private BookService bookService;

    @Test

    void shouldReturnListOfBooks() {

    when(bookService.findAll()).thenReturn(Arrays.asList(

    new Book("123", "Spring 5 Recipes", List.of("Marten Deinum", "Josh Long")),

    new Book("321", "Pro Spring MVC", List.of("Marten Deinum", "Colin Yates"))));

    webTestClient

    .get()

    .uri("/books")

    .headers( httpHeaders -> httpHeaders.setBasicAuth("user", "s3cr3t"))

    .exchange()

    .expectStatus().isOk()

    .expectBodyList(Book.class).hasSize(2);

    }

    Listing 5-6

    Integration Test Using WebTestClient with Security Enabled

    ```


    The request is built and “fired” using `exchange()`. Then the result is expected
    to be an HTTP 200 (OK), and the result contains two books.


    ## 5-2\. Log In to Web Applications


    ### Problem


    A secure application requires its users to log in before they can access certain
    secure functions. This is especially important for applications running on the
    open Internet, because hackers can easily reach them. Most applications have to
    provide a way for users to input their credentials to log in.


    ### Solution


    Spring Security supports multiple ways for users to log into a web application.
    It supports form-based login by providing a default web page that contains a login
    form. You can also provide a custom web page as the login page. In addition, Spring
    Security supports HTTP Basic authentication by processing the Basic authentication
    credentials presented in HTTP request headers. HTTP Basic authentication can also
    be used for authenticating requests made with remoting protocols and web services.


    Some parts of your application may allow for anonymous access (e.g., access to
    the welcome page). Spring Security provides an anonymous login service that can
    assign a principal and grant authorities to an anonymous user so that you can
    handle an anonymous user like a normal user when defining security policies.


    Spring Security also supports remember-me login, which is able to remember a user’s
    identity across multiple browser sessions so that a user doesn’t need to log in
    again after logging in for the first time.'
