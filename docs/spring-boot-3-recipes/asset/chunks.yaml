    ### 工作原理


    要发布指标，我们需要添加对 Spring Boot Actuator 启动器的依赖。这将添加 Micrometer 指标的自动配置，并将其作为端点暴露。如果你包含了受支持的
    Micrometer 集成（如 Prometheus），它也会被自动配置。参见清单 7-17。


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    清单 7-17

    Maven 依赖

    ```


    有了这个依赖，指标收集将被自动配置。要通过 Actuator 端点暴露它们，我们需要添加 `metrics` 端点。默认情况下，只有 `health` 端点通过
    HTTP 暴露。为此，我们可以配置 `management.endpoints.web.exposure.include`。参见清单 7-18。


    ```

    management.endpoints.web.exposure.include=health,metrics

    清单 7-18

    用于启用暴露指标的应用属性

    ```


    此属性可以接受一个列表，指定要暴露的内容（根据所使用的依赖和技术，此列表可以增长）；这里我们暴露了 `health` 和 `metrics`。也可以使用 `*`，这将暴露所有可用的端点（例如
    `info`、如果启用了 `shutdown`、`threaddump` 等）。


    ![](img/464036_2_En_7_Fige_HTML.gif)一个抽象图形展示了三角形结构，内部有一个感叹号。 暴露所有端点可能存在安全风险，因为这可能会泄露信息（因为它暴露了
    Bean 和配置），并且如果配置不当，可能允许外部人员关闭你的应用程序。


    现在，通过 `http://localhost:8080/actuator/metrics` 访问 `metrics` 端点时，它将显示所有可用指标的列表（图
    7-9）。


    ![](img/464036_2_En_7_Fig9_HTML.jpg)


    窗口截图。显示了本地主机页面，其中包含多个名称。其中一些是：应用就绪时间、应用启动时间、磁盘空闲、磁盘总量、执行器、服务器请求、缓冲区、类、编译和并发阶段。


    图 7-9


    可用指标


    Spring Boot 会根据所使用的技术检测要暴露的指标。当检测到 Kafka 时，它会为其添加指标，Hibernate 等也是如此。


    当查看特定指标（`name-of-metrics`）时，它会显示可用的信息。当查看 `http.server.requests`（图 7-10）时，它会显示有多少请求、最大执行时间以及总时间。它还会显示可用的标签；这些标签也会传播到诸如
    Prometheus 之类的监控工具，并可用于对指标进行分组。


    ![](img/464036_2_En_7_Fig10_HTML.jpg)


    窗口截图。显示了本地主机页面，其中包含名称、基本单位、测量值以及带有计数、总时间和最大值的统计信息。


    图 7-10


    特定指标


    实际上，由于你可能拥有多个实例，你会使用监控工具来监控你的应用程序。但在开发过程中或查看生产环境中的单个实例时，Actuator 端点可以是一个很好的辅助工具。


    ## 总结


    在本章中，我们探讨了如何在 Spring Boot 中使用一些企业级技术，例如执行异步任务、发送电子邮件、与 JMX 集成以及暴露指标。我们简要了解了 Spring
    Boot Actuator 和对 JFR 事件的支持。JFR 事件对于识别应用程序启动过程中的问题非常有帮助。


    下一章将探讨 Spring Boot 开箱即支持的各种消息传递解决方案以及如何应用配置。


    # 8. Spring 消息传递


    Spring 产品组合为与各种消息传递系统集成提供了广泛支持。从相当简单的 JMS API 到 RabbitMQ 和 Kafka。当检测到这些框架和技术时，Spring
    Boot 会提供自动配置。


    ## 8-1\. 配置 JMS


    ### 问题


    你想在 Spring Boot 应用程序中使用 JMS，并且需要连接到 JMS 代理。


    ### 解决方案


    Spring Boot 支持 ActiveMQ 和 Artemis 的自动配置。通过添加其中一个库并设置一些属性，`spring.activemq` 或 `spring.artemis`
    命名空间就是你所需要的全部。


    ### 工作原理


    通过声明对你选择的 JMS 提供程序的依赖，Spring Boot 将自动配置 `ConnectionFactory`，并为你的环境启用一种查找目标（`DestinationResolver`）的策略。这也可以通过使用
    JNDI 来完成。另一种解决方案是自己完成所有配置；如果你需要对 `ConnectionFactory` 实例进行更多控制，或者想要使用非自动配置的 JMS
    提供程序，则可能需要这样做。


    为受支持的 JMS 提供程序添加依赖非常容易，因为 Spring Boot 为它们提供了启动器项目。对于 JNDI，你需要自己包含 JMS 依赖。

