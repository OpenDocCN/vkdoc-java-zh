    | `RequestContextFilter` | Exposes the current request to the current thread so
    that you can use `RequestContextHolder` and `LocaleContextHolder` even in a non-Spring
    MVC application like Jersey. |


    1.  Start an embedded Tomcat server on port 8080 (by default).


    2.  Register and enable a couple of default servlet filters (see Table [3-1](#464036_2_En_3_Chapter.xhtml#Tab1)).


    3.  Set up static resource handling for things like `*.css`, `*.js`, and `favicon.ico`.


    4.  Enable integration with web JARs.


    5.  Set up basic error handling features.


    6.  Configure the `DispatcherServlet` with the needed components (i.e., `ViewResolvers`,
    I18N, etc.).


    In the current state, `HelloWorldApplication` doesn’t do anything but start the
    server. Let’s add a controller to return some information. See Listing [3-3](#464036_2_En_3_Chapter.xhtml#PC3).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    @RestController

    public class HelloWorldController {

    @GetMapping("/")

    public String hello() {

    var version = SpringBootVersion.getVersion();

    return String.format("Hello World, from Spring Boot %s!", version);

    }

    }

    Listing 3-3

    HelloWorld Controller

    ```


    This `HelloWorldController` controller will be registered at the `/` URL and when
    called will return the phrase `Hello World, from Spring Boot` with the Spring
    Boot version included. `@RestController` indicates that this is an `@Controller`
    and as such will be detected by Spring Boot. Additionally, it adds the `@ResponseBody`
    annotation to all request handling methods. `@GetMapping` maps the `hello` method
    to every GET request that arrives at `/`. We could also have written `@RequestMapping(path="/",
    method=RequestMethod.GET)`.


    When restarting `HelloWorldApplication`, the `HelloWorldController` controller
    will be detected and processed. Now when using something like `curl` or `HTTPie`
    to access `http://localhost:8080/`, the result should look like Figure [3-2](#464036_2_En_3_Chapter.xhtml#Fig2).


    ![](images/464036_2_En_3_Chapter/464036_2_En_3_Fig2_HTML.jpg)


    A screenshot of the Marten page. It detects and processes the Hello World Controller
    and displays the output of the controller in the Spring Boot when a local host
    is accessed.


    Figure 3-2


    Output of controller


    #### Test the Controller


    Now that the application is running and returning results, it’s time to add a
    test for the controller. Spring already has some impressive testing features,
    and Spring Boot adds even more. Testing a controller has become pretty easy with
    Spring Boot. See Listing [3-4](#464036_2_En_3_Chapter.xhtml#PC4).


    ```

    package com.apress.springboot3recipes.library;

    import org.hamcrest.Matchers;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.servlet.MockMvc;

    import org.springframework.test.web.servlet.request.MockMvcRequestBuilders;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.content;

    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;

    @WebMvcTest(HelloWorldController.class)

    class HelloWorldControllerTest {

    @Autowired

    private MockMvc mockMvc;

    @Test

    void testHelloWorldController() throws Exception {

    var expected = "Hello World, from Spring Boot ";

    mockMvc.perform(MockMvcRequestBuilders.get("/"))

    .andExpect(status().isOk())

    .andExpect(content().string(Matchers.containsString(expected)))

    .andExpect(content().contentTypeCompatibleWith(MediaType.TEXT_PLAIN));

    }

    }

    Listing 3-4

    WebMvcTest Slice Test for HelloWorldController

    ```


    The `@WebMvcTest` annotation instructs the Spring Test framework to set up an
    application context for testing this specific controller. It will start a minimal
    Spring Boot application with only the web-related beans like `@Controller`, `@ControllerAdvice`,
    etc. In addition, it will preconfigure the Spring Test Mock MVC support, which
    can then be autowired.


    Spring Test Mock MVC can be used to simulate making an HTTP request to the controller
    and to do some operations on the result. Here we call `/` with `GET` and expect
    an HTTP 200 (thus OK) response with a text message containing `Hello World, from
    Spring Boot`.


    ## 3-2\. Expose REST Resources with Spring MVC


    ### Problem


    You want to use Spring MVC to expose REST-based resources.


    ### Solution


    You will need a JSON library to do the JSON marshaling (although you could use
    XML and other formats as well, as content negotiation is part of REST as originally
    described). In this recipe, we will use the Jackson library to take care of the
    JSON conversion.'
