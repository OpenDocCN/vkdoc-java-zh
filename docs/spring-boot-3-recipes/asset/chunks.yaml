    #### 配置连接池


    Spring Boot 默认使用的连接池是 HikariCP。当引入 `spring-boot-starter-jdbc` 依赖（或其他与数据库相关的依赖）时，它会自动生效。Spring
    Boot 会使用一些默认设置来配置连接池；不过，你可能希望覆盖这些设置（增加或减少最大连接数、设置超时时间等）。HikariCP 的配置选项位于 `spring.datasource.hikari`
    命名空间下（参见表 6-1）。


    表 6-1


    HikariCP 常用连接池设置


    | 属性 | 描述 |

    | --- | --- |

    | `spring.datasource.hikari.connection-timeout` | 设置客户端等待从连接池获取连接的最大毫秒数。默认值为 30
    秒。 |

    | `spring.datasource.hikari.leak-detection-threshold` | 设置连接离开连接池后，在记录可能连接泄漏消息之前的毫秒数。默认值为禁用。
    |

    | `spring.datasource.hikari.idle-timeout` | 设置连接在连接池中允许空闲的最大毫秒数。默认值为 10 秒。 |

    | `spring.datasource.hikari.validation-timeout` | 设置连接池等待连接被验证为存活的最大毫秒数。默认值为 5
    秒。 |

    | `spring.datasource.hikari.connection-test-query` | 设置用于测试连接有效性的 SQL 查询。通常，JDBC
    4.0（或更高版本）驱动程序不需要此设置！ |

    | `spring.datasource.hikari.maximum-pool-size` | 设置连接池中保持的最大连接数。默认值为 10 个连接。 |

    | `spring.datasource.hikari.minimum-idle` | 设置连接池中维护的最小空闲连接数。默认值为 10 个连接。 |

    | `spring.datasource.hikari.data-source-properties` | 设置驱动程序特定的属性。 |


    你还可以使用更多属性（参见清单 6-7），但列表相当长，而表 6-1 中提到的属性是最常用的。


    ![](img/464036_2_En_6_Figb_HTML.gif)一个圆形抽象图形内包含小写字母 i。 Tomcat JDBC 的属性位于 `spring.datasource.tomcat`
    命名空间下，Commons DBCP2 的属性位于 `spring.datasource.dbcp2` 命名空间下。


    ```

    spring.datasource.hikari.maximum-pool-size=5

    spring.datasource.hikari.minimum-idle=2

    spring.datasource.hikari.leak-detection-threshold=20s

    清单 6-7

    其他 Hikari 属性

    ```


    此配置将最大连接数设置为 5，最小连接数设置为 2。它还会启用泄漏检测，阈值为 20 秒。


    ## 6-2\. 使用 Spring Boot 管理数据库模式


    ### 问题


    你需要初始化或扩展所用数据库模式中的对象，并且希望这些操作由你的 Spring Boot 应用触发/管理。


    ![](img/464036_2_En_6_Figc_HTML.gif)一个圆形抽象图形内包含小写字母 i。 `bin` 目录中有一个 `postgres.sh`
    脚本，它将启动一个 PostgreSQL 服务器，供本方案使用。


    ### 解决方案


    Spring Boot 对简单的数据库管理以及 Flyway 和 Liquibase 提供了开箱即用的支持。包含（如果需要）相关依赖，Spring Boot
    将自动使用你选择的数据库管理工具，并提供合理的默认值以及应用某些配置属性的能力。


    ### 工作原理


    当使用现有数据库时，你可能已经拥有现有的表、视图和存储过程。但是，当你创建新数据库时，它是空的，你需要自己创建表。使用 Spring Boot，这得到了开箱即用的支持。你可以添加
    `schema.sql` 文件来初始化模式（表、视图等），并添加 `data.sql` 文件来向表中插入数据。Spring Boot 还允许你提供 `schema-<platform>.sql`
    和 `data-<platform>.sql` 文件来进行特定数据库的初始化。例如，使用 Derby 时，你可以添加 `schema-derby.sql`
    文件等。模式和数据文件的名称可以通过 `spring.sql.init.schema-locations` 和 `spring.sql.init.data-locations`
    属性进行更改。有关可用属性的描述，请参见表 6-2。


    表 6-2


    数据源初始化属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.sql.init.continue-on-error` | 设置初始化数据库时发生错误是否停止；默认值为 `false`。 |

    | `spring.sql.init.data-locations` | 设置数据（DML）脚本资源引用；默认值为 `classpath:data.sql`。
    |

    | `spring.sql.init.password` | 设置执行 DML 脚本的数据库密码；默认使用普通密码。 |

    | `spring.sql.init.username` | 设置执行 DML 脚本的数据库用户名；默认使用普通用户名。 |

    | `spring.sql.init.mode` | 使用可用的 DDL 和 DML 脚本初始化数据源。默认值为 `EMBEDDED`，可更改为 `NEVER`
    或 `ALWAYS`。 |

    | `spring.sql.init.platform` | 设置在 DDL 或 DML 脚本中使用的平台（例如 `schema-${platform}.sql`
    或 `data-${platform}.sql`）。默认值为 `all`。 |

    | `spring.sql.init.schema-locations` | 设置模式（DDL）脚本资源引用；默认值为 `classpath:schema.sql`。
    |

    | `spring.sql.init.separator` | 设置 SQL 初始化脚本中的语句分隔符。默认值为 `;`。 |

    | `spring.sql.init.encoding` | 设置 SQL 脚本的编码。默认使用平台编码。 |


    让我们创建一个名为 `customer` 的表并向其中插入一些数据。要创建该表，请将 `schema.sql` 文件添加到 `src/main/resources`
    目录（清单 6-8）。


    ```

    DROP TABLE IF EXISTS customer;

