- fmt: '# Use Testcontainers with Spring Boot Testing


    You might have heard of the Testcontainers library, and you might want to use
    it in your Spring Boot application for testing. With the Testcontainers library,
    it becomes easy to write your tests and use your actual database, messaging solution,
    or mail provider (and many more) that you are using in production. So instead
    of reverting to an in-memory or embedded solution, you get your fully fledge solution
    as used in production. Testcontainers uses Docker to make this possible, and it,
    by default, binds the life cycle of the container to your tests.


    To be able to use this, you will need to add a dependency, `spring-boot-testcontainers`,
    to your dependency management (Maven or Gradle), and you need to include the modules
    from Testcontainers that you want to utilize. The sample we are using will utilize
    a PostgreSQL container to execute some JDBC queries on it; it will also leverage
    the aforementioned slice support to set up a JDBC-based test. See Listing [2-24](#464036_2_En_2_Chapter.xhtml#PC25).


    ```

    org.springframework.boot

    spring-boot-testcontainers

    test


    org.testcontainers

    junit-jupiter

    test


    org.testcontainers

    postgresql

    test


    org.postgresql

    postgresql

    runtime


    Listing 2-24

    Maven Dependencies for Testcontainers and PostgreSQL

    ```


    We add the `spring-boot-testcontainers` dependency as well as the PostgreSQL JDBC
    driver and the PostgreSQL and JUnit Testcontainers modules. With this we can use
    the `@TestContainers` annotation to start a PostgreSQL database for our test.
    See Listing [2-25](#464036_2_En_2_Chapter.xhtml#PC26).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.jdbc.AutoConfigureTestDatabase;

    import org.springframework.boot.test.autoconfigure.jdbc.JdbcTest;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.test.context.DynamicPropertyRegistry;

    import org.springframework.test.context.DynamicPropertySource;

    import org.springframework.test.jdbc.JdbcTestUtils;

    import org.testcontainers.containers.PostgreSQLContainer;

    import org.testcontainers.junit.jupiter.Container;

    import org.testcontainers.junit.jupiter.Testcontainers;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    @JdbcTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Testcontainers

    public class JdbcTestWithTestcontainers {

    @Container

    static PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15.2");

    @Autowired

    private JdbcTemplate jdbc;

    @DynamicPropertySource

    public static void properties(DynamicPropertyRegistry props) {

    props.add("spring.datasource.url", postgres::getJdbcUrl);

    props.add("spring.datasource.username", postgres::getUsername);

    props.add("spring.datasource.password", postgres::getPassword);

    }

    @Test

    void retrieveTables() {

    var tables = JdbcTestUtils.countRowsInTable(jdbc, "pg_catalog.pg_tables");

    assertEquals(68, tables);

    }

    }

    Listing 2-25

    @JdbcTest with Regular Testcontainers Usage

    ```


    On the test, we added `@Testcontainers`, which is a special JUnit extension for
    Testcontainers. It will now detect fields annotated with `@Container` and automatically
    start them. As we are using a container, we need to instruct Spring Boot to use
    it. For JDBC, we need to configure the `spring.datasource.url` property (and the
    username and password). To do this, we can utilize the `@DynamicPropertySource`,
    which can be placed on a `static` method in the test, and it can then retrieve
    the settings from the container and register them as properties.


    Finally, notice the `@AutoConfigureTestDatabase`, which is needed for database-driven
    tests as by default Spring Boot will try to start an embedded container and use
    that as a `Datasource`. If we didn''t add this, the test case would fail. Now
    when running the test, Testcontainers will kick in and download the container
    and start it, and the test will execute. Afterward, the container will be stopped
    and destroyed.


    Although this works and is a valid way to work with Testcontainers, it could be
    better. Spring Boot introduced a so-called service connection. This is an abstraction
    over various different services you can connect to, like a database or message
    broker. To make use of this, there is the `@ServiceConnection` annotation, which
    can be placed on the container you want to use. When using this, you don''t need
    to add a method to dynamically register the properties for the context. See Listing
    [2-26](#464036_2_En_2_Chapter.xhtml#PC27).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.jdbc.AutoConfigureTestDatabase;

    import org.springframework.boot.test.autoconfigure.jdbc.JdbcTest;

    import org.springframework.boot.testcontainers.service.connection.ServiceConnection;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.test.jdbc.JdbcTestUtils;

    import org.testcontainers.containers.PostgreSQLContainer;

    import org.testcontainers.junit.jupiter.Container;

    import org.testcontainers.junit.jupiter.Testcontainers;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    @JdbcTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Testcontainers

    public class JdbcTestWithTestcontainersServiceConnection {

    @Container

    @ServiceConnection

    static PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15.2");

    @Autowired

    private JdbcTemplate jdbc;

    @Test

    void retrieveTables() {

    var tables = JdbcTestUtils.countRowsInTable(jdbc, "pg_catalog.pg_tables");

    assertEquals(68, tables);

    }

    }

    Listing 2-26

    @JdbcTest with Spring Boot @ServiceConnection

    ```


    The test will still behave the same: download the container (if needed), start
    the container, run the test, and stop and destroy the container. However, there
    is no more need to explicitly configure the properties. This reduces the code
    we have to write and maintain.


    The `@ServiceConnection` annotation doesn''t work for all containers, only for
    a selection of well-known containers. At the moment of writing, the following
    containers are supported:


    *   Containers of type `CassandraContainer`

    *   Containers of type `CouchbaseContainer`

    *   Containers of type `ElasticSearchContainer`

    *   Containers of type `JdbcDatabaseContainer`

    *   Containers of type `KafkaContainer`/`RedpandaContainer`

    *   Containers of type `MongoDBContainer`

    *   Containers of type `Neo4jContainer`

    *   Containers of type `RabbitMQContainer`

    *   Containers named `redis`

    *   Containers named `openzipkin/zipkin`


    By default the service connection infrastructure will use the `Container.getDockerImageName`
    to determine which connection details to expose. This can be problematic in case
    of custom images (especially for those based on name instead of type). For these
    circumstances, you can specify the `name` attribute of the `@ServiceConnection`
    to match the proper name.


    When there are multiple tests using the same containers, you can also specify
    the containers in an interface or abstract base class and let the test classes
    import/extend that. This allows for easier reuse of the containers and saves you
    from defining the containers in each test that would need them. An additional
    benefit is that you could also use these containers when running Spring, and with
    the reuse you can make sure your tests as well as your application are using the
    same containers (see Recipe 2-6). See Listing [2-27](#464036_2_En_2_Chapter.xhtml#PC28).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.springframework.boot.testcontainers.service.connection.ServiceConnection;

    import org.testcontainers.containers.PostgreSQLContainer;

    import org.testcontainers.junit.jupiter.Container;

    public interface TestcontainersConfig {

    @ServiceConnection

    @Container

    PostgreSQLContainer postgres = new PostgreSQLContainer("postgres:15.2");

    }

    Listing 2-27

    Interface with Container Definitions

    ```


    Next you can just let your test class implement this interface to reuse the container
    definitions. See Listing [2-28](#464036_2_En_2_Chapter.xhtml#PC29).


    ```

    package com.apress.springboot3recipes.calculator;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.jdbc.AutoConfigureTestDatabase;

    import org.springframework.boot.test.autoconfigure.jdbc.JdbcTest;

    import org.springframework.jdbc.core.JdbcTemplate;

    import org.springframework.test.jdbc.JdbcTestUtils;

    import org.testcontainers.junit.jupiter.Testcontainers;

    import static org.junit.jupiter.api.Assertions.assertEquals;

    @JdbcTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Testcontainers

    public class JdbcTestWithTestcontainersReuse implements TestcontainersConfig {

    @Autowired

    private JdbcTemplate jdbc;

    @Test

    void retrieveTables() {

    var tables = JdbcTestUtils.countRowsInTable(jdbc, "pg_catalog.pg_tables");

    assertEquals(66, tables);

    }

    }

    Listing 2-28

    Test Class with Reused Definitions

    ```'
