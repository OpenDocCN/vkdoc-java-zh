    ## 7-2\. 配置 Spring 任务调度


    ### 问题


    您希望以一致的方式调度方法调用，可以使用 cron 表达式、固定间隔或固定速率。


    ### 解决方案


    Spring 支持配置 `TaskExecutor` 和 `TaskScheduler`。此功能与使用 `@Scheduled` 注解调度方法执行的能力相结合，使得
    Spring 的调度支持以最少的麻烦工作：您所需要的只是一个方法和一个注解，并且需要开启注解扫描器。Spring Boot 不会自动检测调度的需求，因此您需要使用
    `@EnableScheduling` 注解自行启用它。

    '
- fmt: '### How It Works


    Let’s write a component that prints a message to the log every four seconds. Create
    a Java class and use the `@Scheduled` annotation on a method to indicate that
    this needs to be invoked. When using `fixedRate=4000` as an argument, it will
    run every four seconds. If you want to use a cron expression, you can set the
    `cron` attribute on the `@Scheduled` annotation instead.


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorld {

    private static final Logger logger = LoggerFactory.getLogger(HelloWorld.class);

    @Scheduled(fixedRate = 4000L)

    public void printMessage() {

    logger.info("Hello World, from Spring Boot {}", SpringBootVersion.getVersion());

    }

    }

    ```


    The `@Component` annotation will make sure that it will be detected by Spring
    Boot.


    The next thing to do is enable scheduling for your application. The easiest solution
    is to annotate the application class with `@EnableScheduling`. Of course, you
    can also place it on other `@Configuration` annotated classes.


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication {

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    }

    ```


    The `@EnableScheduling` annotation will enable the detection of `@Scheduled` annotated
    methods and will register a `TaskScheduler` to use for scheduling tasks. When
    a single `TaskScheduler` is detected in the application context, it will use that
    one rather than creating a new one.


    Running `SchedulingApplication` will give you an output in the logs about every
    four seconds (Figure [7-3](#464036_2_En_7_Chapter.xhtml#Fig3)).


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Fig3_HTML.jpg)


    A set of codes. It features the scheduled annotated method and the task scheduler
    using the scheduling application.


    Figure 7-3


    Scheduled execution output


    Instead of using the `@Scheduled` annotation, you could schedule a method using
    Java. You might want to do this if you cannot place an `@Scheduled` annotation
    on the method you want to execute periodically or you just want to limit the amount
    of annotations. For this you can use the `SchedulingConfigurer`, which has a single
    callback method to configure additional tasks.


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;

    import org.springframework.scheduling.annotation.SchedulingConfigurer;

    import org.springframework.scheduling.config.ScheduledTaskRegistrar;

    import java.time.Duration;

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication implements SchedulingConfigurer {

    @Autowired

    private HelloWorld helloWorld;

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    @Override

    public void configureTasks(ScheduledTaskRegistrar taskRegistrar) {

    taskRegistrar.addFixedRateTask(

    () -> helloWorld.printMessage(), Duration.ofSeconds(4));

    }

    }

    ```


    The output from this application is still the same as that shown in Figure [7-3](#464036_2_En_7_Chapter.xhtml#Fig3).


    ## 7-3. Send Email


    Spring Boot will automatically configure the ability to send mail when mail properties
    and the Java mail library is detected on the classpath. In this recipe, we will
    take a look at how to set the properties and how to send an email using Spring
    Boot.


    ### Problem


    You want to send email from a Spring Boot application using the standard Jakarta
    Mail API.


    ### Solution


    Spring’s email support makes it easier to send email by providing an abstract
    and implementation-independent API for sending email. The core interface of Spring’s
    email support is `MailSender`. The `JavaMailSender` interface is a subinterface
    of `MailSender` that includes specialized JavaMail features such as Multipurpose
    Internet Mail Extensions (MIME) support. To send an email message with HTML content,
    inline images, or attachments, you have to send it as a MIME message. Spring Boot
    will automatically configure the `JavaMailSender` when the `jakarta.mail` classes
    are found on the classpath and when the appropriate `spring.mail` properties have
    been set.


    ### How It Works


    The first thing to do is add the `spring-boot-starter-mail` dependency to your
    list of dependencies. This will add the necessary `jakarta.mail` as well as the
    `spring-context` dependencies on the classpath.


    ```

    org.springframework.boot

    spring-boot-starter-mail

    ```


    #### Configure the JavaMailSender


    To be able to send mail, you need to configure the appropriate `spring.mail` properties;
    see Table [7-2](#464036_2_En_7_Chapter.xhtml#Tab2). The `spring.mail.host` property
    is required; the other properties are optional.


    Table 7-2


    Mail Properties


    | Property | Description |

    | --- | --- |

    | `spring.mail.host` | The SMTP server host |

    | `spring.mail.port` | The SMTP server port (default 25) |

    | `spring.mail.username` | The username to use for connecting to the SMTP server
    |

    | `spring.mail.password` | The password to use for connecting to the SMTP server
    |

    | `spring.mail.protocol` | The protocol used by the SMTP server (default `smtp`)
    |

    | `spring.mail.test-connection` | Tests if the SMTP server is available at startup
    (default `false`) |

    | `spring.mail.default-encoding` | Encoding used for MIME messages (default `UTF-8`)
    |

    | `spring.mail.properties` | Additional properties to be set on the JavaMail Session
    |

    | `spring.mail.jndi-name` | JNDI name of the JavaMail Session; can be used when
    deploying to an JEE server with preconfigured JavaMail sessions in JNDI |


    Next you need to define at least the `spring.mail.host` property to be able to
    send mail.


    ```

    spring.mail.host=localhost

    spring.mail.port=3025

    ```


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Figb_HTML.gif)An abstract presents
    the information symbol. The code for this recipe uses GreenMail as an SMTP server.
    A configured instance can be run using the `smtp.sh` script from the `bin` directory.
    It will, by default, expose an SMTP server on port 3025.'
