    metrics and applying tracing to your applications. Micrometer can integrate with
    many different monitoring systems, such as Prometheus, Influx, and New Relic.
    More and more monitoring systems are being added, and if it isn’t supported out
    of the box, it is fairly easy to integrate it with Micrometer yourself.


