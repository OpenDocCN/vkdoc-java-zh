    作为参数时，它将每四秒运行一次。如果你想使用 cron 表达式，可以在 `@Scheduled` 注解上设置 `cron` 属性。


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.slf4j.Logger;

    import org.slf4j.LoggerFactory;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.scheduling.annotation.Scheduled;

    import org.springframework.stereotype.Component;

    @Component

    public class HelloWorld {

    private static final Logger logger = LoggerFactory.getLogger(HelloWorld.class);

    @Scheduled(fixedRate = 4000L)

    public void printMessage() {

    logger.info("Hello World, from Spring Boot {}", SpringBootVersion.getVersion());

    }

    }

    ```


    `@Component` 注解将确保它被 Spring Boot 检测到。


    接下来要做的是为你的应用程序启用调度功能。最简单的解决方案是在应用程序类上添加 `@EnableScheduling` 注解。当然，你也可以将其放在其他带有
    `@Configuration` 注解的类上。


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication {

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    }

    ```


    `@EnableScheduling` 注解将启用对 `@Scheduled` 注解方法的检测，并注册一个 `TaskScheduler` 用于调度任务。当在应用程序上下文中检测到单个
    `TaskScheduler` 时，它将使用该调度器，而不是创建一个新的。


    运行 `SchedulingApplication` 将在大约每四秒在日志中输出一次结果（图 7-3）。


    ![](img/464036_2_En_7_Fig3_HTML.jpg)


    一组代码。其中展示了带有 `@Scheduled` 注解的方法以及使用调度应用程序的任务调度器。


    图 7-3


    调度执行输出


    除了使用 `@Scheduled` 注解，你也可以使用 Java 来调度一个方法。如果你无法在你想要定期执行的方法上放置 `@Scheduled` 注解，或者只是想减少注解的数量，你可能会这样做。为此，你可以使用
    `SchedulingConfigurer`，它有一个用于配置额外任务的单一回调方法。


    ```

    package com.apress.springboot3recipes.scheduling;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.scheduling.annotation.EnableScheduling;

    import org.springframework.scheduling.annotation.SchedulingConfigurer;

    import org.springframework.scheduling.config.ScheduledTaskRegistrar;

    import java.time.Duration;

    @SpringBootApplication

    @EnableScheduling

    public class SchedulingApplication implements SchedulingConfigurer {

    @Autowired

    private HelloWorld helloWorld;

    public static void main(String[] args) {

    SpringApplication.run(SchedulingApplication.class, args);

    }

    @Override

    public void configureTasks(ScheduledTaskRegistrar taskRegistrar) {

    taskRegistrar.addFixedRateTask(

    () -> helloWorld.printMessage(), Duration.ofSeconds(4));

    }

    }

    ```


    此应用程序的输出与图 7-3 中所示相同。


    ## 7-3\. 发送电子邮件


    当在类路径上检测到邮件属性和 Java 邮件库时，Spring Boot 将自动配置发送邮件的能力。在本节中，我们将了解如何设置属性以及如何使用 Spring
    Boot 发送电子邮件。


    ### 问题


    你想使用标准的 Jakarta Mail API 从 Spring Boot 应用程序发送电子邮件。


    ### 解决方案


    Spring 的邮件支持通过提供一个抽象且与实现无关的 API 来发送电子邮件，从而简化了邮件发送过程。Spring 邮件支持的核心接口是 `MailSender`。`JavaMailSender`
    接口是 `MailSender` 的子接口，它包含了专门的 JavaMail 特性，例如多用途互联网邮件扩展（MIME）支持。要发送包含 HTML 内容、内嵌图片或附件的电子邮件，你必须将其作为
    MIME 消息发送。当在类路径上找到 `jakarta.mail` 类并且设置了相应的 `spring.mail` 属性时，Spring Boot 将自动配置
    `JavaMailSender`。


    ### 工作原理


    首先要做的是将 `spring-boot-starter-mail` 依赖项添加到你的依赖项列表中。这会将必要的 `jakarta.mail` 以及 `spring-context`
    依赖项添加到类路径中。


    ```

    org.springframework.boot

    spring-boot-starter-mail


    ```


    #### 配置 JavaMailSender


    为了能够发送邮件，你需要配置相应的 `spring.mail` 属性；请参见表 7-2。`spring.mail.host` 属性是必需的；其他属性是可选的。


    表 7-2


    邮件属性


    | 属性 | 描述 |

    | --- | --- |

    | `spring.mail.host` | SMTP 服务器主机 |

    | `spring.mail.port` | SMTP 服务器端口（默认 25） |

    | `spring.mail.username` | 用于连接 SMTP 服务器的用户名 |

    | `spring.mail.password` | 用于连接 SMTP 服务器的密码 |

    | `spring.mail.protocol` | SMTP 服务器使用的协议（默认 `smtp`） |

    | `spring.mail.test-connection` | 在启动时测试 SMTP 服务器是否可用（默认 `false`） |

    | `spring.mail.default-encoding` | MIME 消息使用的编码（默认 `UTF-8`） |

    | `spring.mail.properties` | 要在 JavaMail Session 上设置的附加属性 |

    | `spring.mail.jndi-name` | JavaMail Session 的 JNDI 名称；当部署到具有预配置 JavaMail Session
    的 JEE 服务器时可以使用 |


    接下来，你至少需要定义 `spring.mail.host` 属性才能发送邮件。


    ```

    spring.mail.host=localhost

    spring.mail.port=3025

    ```


    ![](img/464036_2_En_7_Figb_HTML.gif)一个抽象图形展示了信息符号。 本节的代码使用 GreenMail 作为 SMTP 服务器。可以使用
    `bin` 目录中的 `smtp.sh` 脚本来运行配置好的实例。默认情况下，它会在端口 3025 上暴露一个 SMTP 服务器。

    '
- fmt: '# Send a Plain-Text Email


    With the added dependencies and `spring.mail` properties, Spring Boot will add
    a preconfigured `JavaMailSenderImpl` as a bean to the `ApplicationContext`. This
    bean can be autowired into components by using an `@Autowired` field, by using
    constructors, or, as shown here, by using dependencies in the `@Bean` annotated
    methods. See Listing [7-5](#464036_2_En_7_Chapter.xhtml#PC10).


    ```

    package com.apress.springboot3recipes.mailsender;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.mail.javamail.JavaMailSender;

    import org.springframework.mail.javamail.MimeMessageHelper;

    @SpringBootApplication

    public class MailSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(MailSenderApplication.class, args);

    }

    @Bean

    public ApplicationRunner startupMailSender(JavaMailSender mailSender) {

    return (args) -> mailSender.send((msg) -> {

    var helper = new MimeMessageHelper(msg);

    helper.setTo("recipient@some.where");

    helper.setFrom("spring-boot-3-recipes@apress.com");

    helper.setSubject("Status message");

    helper.setText("All is well.");

    });

    }

    }

    Listing 7-5

    SpringBootApplication Sending Email

    ```


    The `MailSenderApplication` will send an email when the application has finished
    starting. The `startupMailSender` is an `ApplicationRunner` (see Chapter [2](#464036_2_En_2_Chapter.xhtml)),
    which takes the preconfigured `JavaMailSender` to send a mail message.


    ## Test the Sending of Email


    To test this, we can use the GreenMail JUnit5 support to bootstrap an SMTP server.
    For this you will need to add the `greenmail-junit5` dependency to the list of
    dependencies. See Listing [7-6](#464036_2_En_7_Chapter.xhtml#PC11).


    ```

    com.icegreen

    greenmail-junit5

    2.0.1

    test


    Listing 7-6

    GreenMail JUnit5 Dependency

    ```


    Next we can use the `@SpringBootTest` annotation to boot our application. The
    application that was written sends a message after startup, so in our test we
    can verify that this has happened. See Listing [7-7](#464036_2_En_7_Chapter.xhtml#PC12).


    ```

    package com.apress.springboot3recipes.mailsender;

    import com.icegreen.greenmail.junit5.GreenMailExtension;

    import com.icegreen.greenmail.util.ServerSetupTest;

    import jakarta.mail.Message;

    import jakarta.mail.internet.InternetAddress;

    import jakarta.mail.internet.MimeMessage;

    import org.junit.jupiter.api.Test;

    import org.junit.jupiter.api.extension.RegisterExtension;

    import org.springframework.boot.test.context.SpringBootTest;

    import static org.assertj.core.api.Assertions.assertThat;

    @SpringBootTest

    class MailSenderApplicationTest {

    @RegisterExtension

    static GreenMailExtension greenMail = new GreenMailExtension(ServerSetupTest.ALL)

    .withPerMethodLifecycle(false);

    @Test

    void shouldHaveSendMail() throws Exception {

    MimeMessage[] receivedMessages = greenMail.getReceivedMessages();

    assertThat(receivedMessages).hasSize(1);

    assertThat(receivedMessages[0].getSubject())

    .isEqualTo("Status message");

    assertThat(receivedMessages[0]

    .getRecipients(Message.RecipientType.TO))

    .contains(new InternetAddress("recipient@some.where"));

    }

    }

    Listing 7-7

    Test for Mail Sending Application

    ```


    The test first starts the GreenMail test mail server; this is done as a Junit5
    extension using the `@RegisterExtension` annotation. The `ServerSetupTest.ALL`
    starts all available mail protocols such as IMAP, POP3, SMTP, etc., and will expose
    the ports.


    ![](images/464036_2_En_7_Chapter/464036_2_En_7_Figc_HTML.gif)An abstract presents
    the information symbol. The `withPerMethodLifecycle(false)` is needed here because
    we are sending mail at startup. If we didn''t specify this, the mail server would
    start and stop per the test method, which means the application would fail to
    start as there isn''t a mail server.


    In the test method, we can verify if we received the message, and using AssertJ
    we can verify if it was the message that we expected to receive. Of course, this
    applies to other or larger use cases as well.


    ## Use Thymeleaf for Email Templates


    Spring Boot has some nice support for using Thymeleaf as a templating solution;
    however, the default setup is mainly for using Thymeleaf for web pages. It is,
    however, possible to use Thymeleaf for other templating solutions as well, like
    here for email.


    First add `spring-boot-starter-thymeleaf` as a dependency. This will pull in all
    the needed Thymeleaf dependencies and will automatically configure the Thymeleaf
    `TemplateEngine`, which we need to generate the HTML content. See Listing [7-8](#464036_2_En_7_Chapter.xhtml#PC13).


    ```

    org.springframework.boot

    spring-boot-starter-thymeleaf


    Listing 7-8

    Spring Boot Thymeleaf Dependency

    ```


    By default the Spring-configured Thymeleaf `TemplateEngine` will resolve the HTML
    templates from the `templates` directory under `src/main/resources`. Add a file
    named `email.html` to this directory and make a nice-looking email message from
    it. See Listing [7-9](#464036_2_En_7_Chapter.xhtml#PC14).


    ```


    Some email content will be here.


    Kind Regards,

    Your Application


    Listing 7-9

    Email HTML Template

    ```


    The `th:text` is a Thymeleaf tag and will replace the content with the value of
    that attribute. Of course we would need to pass in a value for that attribute
    from our mail-sending/generating code. See Listing [7-10](#464036_2_En_7_Chapter.xhtml#PC15).


    ```

    package com.apress.springboot3recipes.mailsender;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    import org.springframework.context.i18n.LocaleContextHolder;

    import org.springframework.mail.javamail.JavaMailSender;

    import org.springframework.mail.javamail.MimeMessageHelper;

    import org.thymeleaf.context.Context;

    import org.thymeleaf.spring6.ISpringTemplateEngine;

    import java.util.Collections;

    @SpringBootApplication

    public class MailSenderApplication {

    public static void main(String[] args) {

    SpringApplication.run(MailSenderApplication.class, args);

    }

    @Bean

    public ApplicationRunner startupMailSender(

    JavaMailSender mailSender, ISpringTemplateEngine templateEngine) {

    return (args) -> mailSender.send((msg) -> {

    var helper = new MimeMessageHelper(msg);

    helper.setTo("recipient@some.where");

    helper.setFrom("spring-boot-3-recipes@apress.com");

    helper.setSubject("Status message");

    var context =  new Context(

    LocaleContextHolder.getLocale(),

    Collections.singletonMap("msg", "All is well!"));

    var body = templateEngine.process("email.html", context);

    helper.setText(body, true);

    });

    }

    }

    Listing 7-10

    MailSender with Templating

    ```


    The code is similar to the previous code, with the difference that we also now
    have an `ISpringTemplateEnginge` at our disposable to generate the HTML content
    for our email. We use the `process` method to select the template we want to render,
    `email.html`, and pass in a `Context` object. The `Context` object is used by
    Thymeleaf to resolve the attributes, in our case the `msg` one.


    ## 7-4. Register a JMX MBean


    ### Problem


    You want to register an object in your Spring Boot application as a JMX MBean,
    to have the ability to look at services that are running and manipulate their
    state at runtime. This will allow you to run tasks such as rerunning batch jobs,
    invoking methods, and changing configuration metadata.


    ### Solution


    Spring Boot has support for registering beans through the Spring JMX support;
    it will detect the `@ManagedResource` annotated beans and register them with the
    JMX server. However, by default JMX is disabled and must be enabled by adding
    `spring.jmx.enabled=true` to `application.properties`.'
