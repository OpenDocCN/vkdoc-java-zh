    #### Create the Application Class


    Let’s create a `DemoApplication` class with a `main` method. The `main` method
    calls `SpringApplication.run` with `DemoApplication.class` and arguments from
    the main method. The `run` method returns an `ApplicationContext`, and the bean
    names can be retrieved from it. Use the `getBeanDefinitionNames` method to retrieve
    the names, iterate over them and get the actual beans from the `ApplicationContext`,
    and print some information about the bean.


    The resulting class will look like Listing [1-5](#464036_2_En_1_Chapter.xhtml#PC5).


    ```

    package com.apress.springboot3recipes.demo;

    import java.util.Arrays;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication

    public class DemoApplication {

    public static void main(String[] args) {

    try (var ctx = SpringApplication.run(DemoApplication.class, args)) {

    System.out.println("# Beans: " + ctx.getBeanDefinitionCount());

    var names = ctx.getBeanDefinitionNames();

    Arrays.sort(names);

    Arrays.asList(names).forEach(System.out::println);

    }

    }

    }

    Listing 1-5

    DemoApplication Class

    ```


    This class is a regular Java class with a `main` method, so you can just run this
    class from your IDE. When the application runs, it will show output similar to
    Figure [1-1](#464036_2_En_1_Chapter.xhtml#Fig1).


    ![](images/464036_2_En_1_Chapter/464036_2_En_1_Fig1_HTML.jpg)


    An output of the demo application class program.


    Figure 1-1


    Output of running the application


    What happened with this code and annotations? The `@SpringBootApplication` annotation
    makes this class the entry point for a Spring Boot application. The `@SpringBootApplication`
    class is a so-called composed annotation and is annotated with other annotations
    (see Figure [1-2](#464036_2_En_1_Chapter.xhtml#Fig2)). Next to some general Java-based
    annotations, you see the `@SpringBootConfiguration`, `@EnableAutoConfiguration`,
    and `@ComponentScan` annotations.


    ![](images/464036_2_En_1_Chapter/464036_2_En_1_Fig2_HTML.jpg)


    A screenshot contains the at spring boot application class.


    Figure 1-2


    `@SpringBootApplication` definition


    Let’s take a quick look at the different annotations and what they achieve:


    *   `@ComponentScan`: This annotation instructs Spring to scan everything in this
    package and all of its subpackages. It will detect all the `@Component` annotated
    classes. The defined filters are so that exclusions can be made, either by using
    the `exclude` attribute from `@EnableAutoConfiguration` or by providing a `TypeFilter`
    as a bean in the application context.


    *   `@EnableAutoConfiguration`: This registers `AutoConfigurationImportSelector`,
    which will load the auto-configuration classes from a file in the classpath (`/META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports`)
    and check if the config should be included. It also has an additional `@AutoConfigurationPackage`
    annotation, which will also register this package for component scanning, so components
    in this (and subpackages) will also be automatically detected.


    *   `@SpringBootConfiguration`: This class is a specialization of the `@Configuration`
    for Spring Boot and will be mainly used to detect the main entrypoint for the
    application. This is especially useful for testing. Your application should have
    only one class with the `@SpringBootConfiguration` annotation, and generally that
    is the `@SpringBootApplication` annotated class.


    ## 1-2\. Create a Spring Boot Application Using Gradle


    ### Problem


    You want to start developing an application using Spring Boot and Gradle.


    ### Solution


    Create a Gradle build file, `build.gradle`, and add the needed dependencies. To
    launch the application, create a Java class containing a `main` method to bootstrap
    the application.


    ### How It Works


    Suppose you are going to create a simple application that bootstraps `SpringApplication`,
    gets all the beans from `ApplicationContext`, and outputs them to the console.


    #### Create the `build.gradle` File


    First you need to create a `build.gradle` file and use the two plugins needed
    for Gradle to properly manage the dependencies for Spring Boot. Spring Boot requires
    a special Gradle plugin as well as a plugin to extend the default dependency management
    capabilities of Gradle. As this is also a Java project, you will also need the
    `java` plugin.


    ```

    plugins {

    id ''java''

    id ''org.springframework.boot'' version ''3.2.1''

    id ''io.spring.dependency-management'' version ''1-1-4''

    }

    Listing 1-6

    Spring Boot Gradle Plugins

    ```


    Finally, you will need to add the needed dependencies. Just as with Recipe 1-1,
    add the `spring-boot-starter` dependency.


    ```

    dependencies {

    implementation ''org.springframework.boot:spring-boot-starter''

    }

    Listing 1-7

    Spring Boot Gradle Dependencies

    ```


    Notice the absence of the specific version on the dependency. If you are familiar
    with Gradle, this might come as a surprise. You do not have to specify the version
    because it is automatically managed by the `io.spring.dependency-management` plugin.
    Just as with Maven, this allows for easier dependency management.


    The full `build.gradle` file should now look something like Listing [1-8](#464036_2_En_1_Chapter.xhtml#PC8).


    ```

    plugins {

    id ''java''

    id ''org.springframework.boot'' version ''3.2.1''

    id ''io.spring.dependency-management'' version ''1-1-4''

    }

    sourceCompatibility = 21

    repositories {

    mavenCentral()

    }

    dependencies {

    implementation ''org.springframework.boot:spring-boot-starter''

    }

    tasks.named(''test'') {

    useJUnitPlatform()

    }

    Listing 1-8

    Full Gradle Build File

    ```'
