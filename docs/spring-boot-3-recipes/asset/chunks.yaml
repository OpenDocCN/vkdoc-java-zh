    # 4. WebFlux


    Spring WebFlux is a reactive web framework included with Spring. It supports fully
    nonblocking and support Reactive Streams backpressure. It runs on servers like
    Netty, Undertow or Servlet Containers. When such a server is detected Spring Boot
    will automatically configure the server for you.


    ## 4-1. Develop a Reactive Application with Spring WebFlux


    ### Problem


    You want to develop a simple reactive web application with Spring WebFlux to learn
    the basic concepts and configurations of this framework.


    ### Solution


    The lowest component of Spring WebFlux is `org.springframework.http.server.reactive.HttpHandler`.
    The `HttpHandler` interface has a single `handle` method. See Listing [4-1](#464036_2_En_4_Chapter.xhtml#PC1).


    ```

    public interface HttpHandler {

    Mono handle(ServerHttpRequest request, ServerHttpResponse response);

    }

    ```


    **Listing 4-1** `HttpHandler` Interface


    The `handle` method returns `Mono<Void>`, which is the reactive way of saying
    it returns `void`. It takes a `ServerHttpRequest` interface and a `ServerHttpResponse`
    interface, both from the `org.springframework.http.server.reactive` package. Depending
    on the container used, the proper implementation is created. For this several
    adapters or bridges for containers exist. When running on a Servlet 5.0 container
    (supporting nonblocking I/O), `ServletHttpHandlerAdapter` (or one of its subclasses)
    is used to adapt from the plain Servlet world to the Reactive world. When running
    on a native Reactive engine like Netty, the `ReactorHttpHandlerAdapter` is used.


    When a web request is sent to a Spring WebFlux application, `HandlerAdapter` first
    receives the request. Then it organizes the different components configured in
    Spring’s application context that are needed to handle the request.


    To define a controller class in Spring WebFlux, a class has to be marked with
    the `@Controller` or `@RestController` annotation (just as with Spring MVC; see
    Chapter [3](#464036_2_En_3_Chapter.xhtml)).


    When an `@Controller` annotated class (i.e., a controller class) receives a request,
    it looks for an appropriate handler method to handle the request. This requires
    that a controller class map each request to a handler method by one or more handler
    mappings. To do this, a controller class’s methods are decorated with the `@RequestMapping`
    annotation, making them handler methods.


    The signature for these handler methods—as you can expect from any standard class—is
    open-ended. You can specify an arbitrary name for a handler method and define
    a variety of method arguments. Equally, a handler method can return any of a series
    of values (e.g., `String` or `void`), depending on the application logic it fulfills.
    The following is only a partial list of valid argument types, just to give you
    an idea:


    *   `ServerHttpRequest` or `ServerHttpResponse`

    *   Request parameters from the URL of arbitrary type, annotated with `@RequestParam`

    *   Model attributes of arbitrary type, annotated with `@ModelAttribute`

    *   Cookie values included in an incoming request, annotated with `@CookieValue`

    *   Request header values of any arbitrary type, annotated with `@RequestHeader`

    *   Request attribute of arbitrary type, annotated with `@RequestAttribute`

    *   `Map` or `ModelMap`, for the handler method to add attributes to the model

    *   `Errors` or `BindingResult`, for the handler method to access the binding
    and validation result for the command object

    *   `WebSession`, for the session


    Once the controller class has picked an appropriate handler method, it invokes
    the handler method’s logic with the request. Usually, a controller’s logic invokes
    back-end services to handle the request. In addition, a handler method’s logic
    is likely to add or remove information from the numerous input arguments (e.g.,
    `ServerHttpRequest`, `Map`, or `Errors`) that will form part of the ongoing flow.


    After a handler method has finished processing the request, it delegates control
    to a view, which is represented as the handler method’s return value. To provide
    a flexible approach, a handler method’s return value doesn’t represent a view’s
    implementation (e.g., `user.html` or `report.pdf`) but rather a logical view (e.g.,
    `user` or `report`)—note the lack of file extension.


    A handler method’s return value can be either a `String`—representing a logical
    view name—or void, in which case a default logical view name is determined on
    the basis of a handler method’s or controller’s name.'
