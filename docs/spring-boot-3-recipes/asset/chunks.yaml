- fmt: '# Change a User’s Locale


    To change a user’s locale, we need to implement a `LocaleContextResolver` that
    is allowed to change; however, we want to retain the values between requests from
    the client. One place to store the value is an HTTP cookie. Another option is
    to utilize the `WebSession`. For this code sample, we are going to store the value
    into a cookie, as this allows our server to remain stateless. See Listing [4-27](#464036_2_En_4_Chapter.xhtml#PC30).


    ```

    package com.apress.springboot3recipes.library.i18n;

    import org.springframework.context.i18n.LocaleContext;

    import org.springframework.context.i18n.SimpleLocaleContext;

    import org.springframework.http.ResponseCookie;

    import org.springframework.web.server.ServerWebExchange;

    import org.springframework.web.server.i18n.AcceptHeaderLocaleContextResolver;

    import java.util.Locale;

    public class CookieLocaleContextResolver extends AcceptHeaderLocaleContextResolver
    {

    public static final String DEFAULT_NAME =

    CookieLocaleContextResolver.class.getName() + ".LOCALE";

    @Override

    public LocaleContext resolveLocaleContext(ServerWebExchange exchange) {

    parseCookieIfNecessary(exchange);

    return exchange.getAttribute(DEFAULT_NAME);

    }

    private void parseCookieIfNecessary(ServerWebExchange exchange) {

    if (exchange.getAttribute(DEFAULT_NAME) == null) {

    var cookies = exchange.getRequest().getCookies();

    var cookie = cookies.getFirst(DEFAULT_NAME);

    var attributes = exchange.getAttributes();

    if (cookie != null) {

    var locale = Locale.forLanguageTag(cookie.getValue());

    var context = new SimpleLocaleContext(locale);

    attributes.put(DEFAULT_NAME, context);

    } else

    attributes.put(DEFAULT_NAME,super.resolveLocaleContext(exchange));

    }

    }

    @Override

    public void setLocaleContext(ServerWebExchange exchange, LocaleContext lc) {

    var cookies = exchange.getResponse().getCookies();

    if (lc != null && lc.getLocale() != null) {

    exchange.getAttributes().put(DEFAULT_NAME, lc);

    var langTag = lc.getLocale().toLanguageTag();

    var cookie = ResponseCookie.from(DEFAULT_NAME, langTag).build();

    cookies.set(DEFAULT_NAME, cookie);

    } else {

    exchange.getAttributes().remove(DEFAULT_NAME, lc);

    cookies.remove(DEFAULT_NAME);

    }

    }

    }

    Listing 4-27

    Cookie-Based LocaleContextResolver Implementation

    ```


    `CookieLocaleContextResolver` will store, if needed, the user-selected `Locale`
    into an HTTP cookie (see the `setLocaleContext` method). How this method is called
    will be shown later. To resolve the `Locale`, we, if needed, parse the cookie
    from the request and store the resulting `LocaleContext` in the attributes for
    the exchange. This is done to prevent parsing the cookie over and over. The value
    is also set upon explicitly by setting the `LocaleContext` in the response to
    directly activate the selected `Locale`. Finally, if nothing has been set, a fallback
    is done to use the `accept-header` of the browser, which is why it has an extension
    of `AcceptHeaderLocaleContextResolver`.


    `CookieLocaleContextResolver` needs to be registered as a bean with the name `localeContextResolver`
    so that Spring will pick it up for resolving the `Locale`. See Listing [4-28](#464036_2_En_4_Chapter.xhtml#PC31).


    ```

    @Bean

    public CookieLocaleContextResolver localeContextResolver() {

    return new CookieLocaleContextResolver();

    }

    Listing 4-28

    CookieLocaleContextResolver Bean Definition

    ```


    To change the locale, we need to intercept the incoming request and call the `setLocaleContext`
    method of the `LocaleContextResolver` interface. For this we can use a `WebFilter`
    in which we check if a query parameter is present and if so determine the `LocaleContext`.
    See Listing [4-29](#464036_2_En_4_Chapter.xhtml#PC32).


    ```

    package com.apress.springboot3recipes.library.i18n;

    import org.springframework.context.i18n.SimpleLocaleContext;

    import org.springframework.util.StringUtils;

    import org.springframework.web.server.ServerWebExchange;

    import org.springframework.web.server.WebFilter;

    import org.springframework.web.server.WebFilterChain;

    import org.springframework.web.server.i18n.LocaleContextResolver;

    import reactor.core.publisher.Mono;

    import java.util.Locale;

    public class LocaleChangeWebFilter implements WebFilter {

    public static final String DEFAULT_PARAM_NAME = "locale";

    private final LocaleContextResolver resolver;

    public LocaleChangeWebFilter(LocaleContextResolver resolver) {

    this.resolver = resolver;

    }

    @Override

    public Mono filter(ServerWebExchange exchange, WebFilterChain chain) {

    var params = exchange.getRequest().getQueryParams();

    if (params.containsKey(DEFAULT_PARAM_NAME)) {

    var locale = params.getFirst(DEFAULT_PARAM_NAME);

    var context = StringUtils.hasText(locale) ?

    new SimpleLocaleContext(Locale.forLanguageTag(locale)) : null;

    resolver.setLocaleContext(exchange, context);

    }

    return chain.filter(exchange);

    }

    }

    Listing 4-29

    WebFilter Implementation to Change the Locale

    ```


    `LocaleChangeWebFilter` will check if a `locale` named request parameter (or rather
    query parameter) is present and if so use that to set the user-selected `Locale`.


    Next, this `LocaleChangeWebFilter` needs to be registered with Spring WebFlux.
    Spring WebFlux will automatically detect beans of the type `WebFilter` and register
    them with the request processing chain. It is necessary only to make this a bean.
    See Listing [4-30](#464036_2_En_4_Chapter.xhtml#PC33).


    ```

    @Bean

    public LocaleChangeWebFilter localeChangeWebFilter(LocaleContextResolver lcr)
    {

    return new LocaleChangeWebFilter(lcr);

    }

    Listing 4-30

    LocaleChangeWebFilter Bean Definition

    ```


    To change the locale, add `LocaleChangeInterceptor` as a bean and register it
    as an interceptor; for the latter, use the `addInterceptors` method from `WebMvcConfigurer`.


    ![](images/464036_2_En_4_Chapter/464036_2_En_4_Figf_HTML.gif) An information icon
    with the letter i inside a circle. Instead of adding it to `@SpringBootApplication`,
    you could also create a specialized `@Configuration` annotated class to register
    the filters and resolver. Be aware to *not* add `@EnableWebFlux` to that class
