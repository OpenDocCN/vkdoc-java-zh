- fmt: "# 5. Spring Security\n\nIn this chapter, we will take a look at the Spring\
    \ Security integration for Spring Boot. Spring Security can be used for both authenticating\
    \ and authorizing users for your application. Spring Security has a pluggable\
    \ mechanism for both the authentication and authorization process and by default\
    \ supports different mechanisms. For authentication, Spring Security has out-of-the-box\
    \ support for JDBC, LDAP, and property files.\n\n## 5-1. Enable Security in Your\
    \ Spring Boot Application\n\n### Problem\n\nYou have a Spring Boot–based application\
    \ and you want to enable security in it.\n\n### Solution\n\nAdd `spring-boot-starter-security`\
    \ as a dependency to set up and configure security automatically for your application.\n\
    \n### How It Works\n\nTo get started, you will need to import the libraries for\
    \ Spring Security into your application. To do this, you can add `spring-boot-starter-security`\
    \ to your list of dependencies. See Listing 5-1.\n\n```\norg.springframework.boot\n\
    spring-boot-starter-security\n```\n\nListing 5-1: Spring Security Starter Dependency\n\
    \nThis will add the `spring-security-core`, `spring-security-config`, and `spring-security-web`\
    \ dependencies to your project. Spring Boot detects the availability of Spring\
    \ Security and automatically enables security.\n\nSpring Boot will configure Spring\
    \ Security with the following:\n\n- Authentication with basic authentication and\
    \ form login\n- HTTP headers for security\n- Servlet API integration\n- Anonymous\
    \ login\n- Caching of resources disabled\n\n> ⚠️ Spring Boot will add a default\
    \ user, named `user` and with a generated password, that is visible in the startup\
    \ logs. This is intended only to be used for testing, prototyping, or demos. Do\
    \ not use the generated user in a live system.\n\nWhen adding the dependency `spring-boot-starter-security`\
    \ to Recipe 3-2, it will automatically secure all exposed endpoints. At startup,\
    \ the generated password will be logged (see Figure 5-1).\n\n![Generated password\
    \ output](images/464036_2_En_5_Chapter/464036_2_En_5_Fig1_HTML.jpg)\n\nFigure\
    \ 5-1: Generated password output\n\nSpring Boot exposes some properties to configure\
    \ the default user. You can find them in the `spring.security` namespace (see\
    \ Table 5-1).\n\nTable 5-1: Properties for Default User\n\n| Property | Description\
    \ |\n| --- | --- |\n| `spring.security.user.name` | The default username; the\
    \ default is `user`. |\n| `spring.security.user.password` | Password for the default\
    \ user; the default is `UUID`. |\n| `spring.security.user.roles` | Roles for the\
    \ default user. The default is `none`. |\n\nAfter adding the dependency and starting\
    \ `LibraryApplication`, the endpoints are secured. When trying to obtain a list\
    \ of books from `http://localhost:8080/books`, the result will be an HTTP result\
    \ with status 401: Unauthorized (see Figure 5-2).\n\n![Unauthenticated access\
    \ result](images/464036_2_En_5_Chapter/464036_2_En_5_Fig2_HTML.jpg)\n\nFigure\
    \ 5-2: Unauthenticated access result\n\nWhen adding the correct authentication\
    \ headers (username `user` with the password from the logging or as specified\
    \ in the `spring.security.user.password` property), the result will be the regular\
    \ list of books (see Figure 5-3).\n\n![Authenticated access result](images/464036_2_En_5_Chapter/464036_2_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3: Authenticated access result\n\n#### Test the Security\n\nWhen using\
    \ Spring Security to secure your endpoints with an `@WebMvcTest` annotation, the\
    \ security infrastructure will be automatically applied. Spring Security provides\
    \ some nice annotations to help in writing tests (see Table 5-2).\n\nTable 5-2:\
    \ Spring Security Annotations for Testing\n\n| Annotation | Description |\n| ---\
    \ | --- |\n| `@WithMockUser` | Run as the user with the given `username`, `password`,\
    \ and `roles`/`authorities` |\n| `@WithAnonymousUser` | Run as an anonymous user\
    \ |\n| `@WithUserDetails` | Run as the user with the configured name; does a lookup\
    \ in the `UserDetailsService` |\n\n> ℹ️ If you want to test your controllers without\
    \ security, you can disable them by excluding `SecurityAutoConfiguration` from\
    \ being run. To do this, specify `excludeAutoConfiguration` on the `@WebMvcTest`\
    \ annotation.\n\nTo use these annotations, add a dependency to `spring-security-test`.\n\
    \n```\norg.springframework.security\nspring-security-test\ntest\n```\n\nWith this\
    \ dependency, `BookControllerTest` from Recipe 3-2 can be extended and fixed again.\
    \ If you don't mind disabling security for your test, you could add `@WebMvcTest(value\
    \ = BookController.class, excludeAutoConfiguration = SecurityAutoConfiguration.class)`\
    \ to the test class. With it, the security filter won't be added, and thus security\
    \ will be disabled. The tests will run and succeed. See Listing 5-2.\n\n```\n\
    @WebMvcTest(value = BookController.class, excludeAutoConfiguration = SecurityAutoConfiguration.class)\n\
    class BookControllerUnsecuredTest {\n}\n```\n\nListing 5-2: Test with Security\
    \ Disabled\n\nIf, however, you want to test with security enabled, you will need\
    \ to make some minor modifications to the test class. First, add `@WithMockUser`\
    \ to run with an authenticated user. Second, because Spring Security by default\
    \ enables CSRF protection, a header or parameter needs to be added to the request.\
    \ When using Mock MVC, Spring Security provides a `RequestPostProcessor` for that,\
    \ the `CsrfRequestPostProcessor`. `SecurityMockMvcRequestPostProcessors` contains\
    \ factory methods to easily use them. See Listing 5-3.\n\n```\npackage com.apress.springboot3recipes.library.rest;\n\
    \nimport org.junit.jupiter.api.Test;\nimport org.springframework.beans.factory.annotation.Autowired;\n\
    import org.springframework.boot.test.autoconfigure.web.servlet.WebMvcTest;\nimport\
    \ org.springframework.boot.test.mock.mockito.MockBean;\nimport org.springframework.security.test.context.support.WithMockUser;\n\
    \nimport static org.mockito.ArgumentMatchers.any;\nimport static org.mockito.Mockito.when;\n\
    import static org.springframework.security.test.web.servlet.request.SecurityMockMvcRequestPostProcessors.csrf;\n\
    import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.post;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.header;\n\
    import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;\n\
    \n@WebMvcTest(BookController.class)\n@WithMockUser\npublic class BookControllerSecuredTest\
    \ {\n\n    @Autowired\n    private MockMvc mockMvc;\n\n    @MockBean\n    private\
    \ BookService bookService;\n\n    @Test\n    void shouldAddBook() throws Exception\
    \ {\n        when(bookService.create(any(Book.class)))\n                .thenReturn(new\
    \ Book(\"123456789\", \"Test Book Stored\", List.of(\"T. Author\")));\n\n    \
    \    mockMvc.perform(post(\"/books\")\n                        .with(csrf())\n\
    \                        .contentType(MediaType.APPLICATION_JSON)\n          \
    \              .content(\"{ \\\"isbn\\\" : \\\"123456789\\\"}, \\\"title\\\" :\
    \ \\\"Test Book\\\", \\\"authors\\\" : [\\\"T. Author\\\"]\"))\n             \
    \   .andExpect(status().isCreated())\n                .andExpect(header().string(\"\
    Location\", \"http://localhost/books/123456789\"));\n    }\n}\n```\n\nListing\
    \ 5-3: Test with Security Enabled"
