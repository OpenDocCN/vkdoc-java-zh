- fmt: '#### Configure Tracing


    Spring Boot exposes some properties to make it easier to configure tracing. You
    can configure the propagation type it should and how many of the calls should
    be sampled (the default is 10%). By default it will be enabled if detected, but
    you can also disable it.


    **Table 9-5** Tracing Configuration Properties


    | Property | Description |

    | --- | --- |

    | `management.tracing.enabled` | Sets whether the auto-configuration of tracing
    should be enabled; the default is `true`. |

    | `management.tracing.sampling.probability` | Sets the probability of the sample
    range, from 0 to 1.0; the default is 0.1. |

    | `management.tracing.propagation.type` | Lists supported tracing context propagations
    (can contain `W3C`, `B3`, or `B3_MULTI`); the default is `null`. When set, it
    takes precedence over the more fine-grained `consumes` and `produces` properties.
    |

    | `management.tracing.propagation.consume` | Lists supported tracing context propagations
    for receiving (can contain `W3C`, `B3`, or `B3_MULTI`); the default is all values.
    |

    | `management.tracing.propagation.produce` | Lists supported tracing context propagations
    for sending (can contain `W3C`, `B3`, or `B3_MULTI`); the default is `W3C`. |

    | `management.tracing.sampling.probability` | Probability in the range from `0.0`
    to `1.0` that a trace will be sampled. |


    Next, it is possible to configure Zipkin. Mainly the URL to the endpoint and some
    connection timeouts can be set (see Table [9-6](#464036_2_En_9_Chapter.xhtml#Tab6)).
    This applies to other solutions such as Wavefront, Open Telemetry, and Prometheus.


    **Table 9-6** Zipkin Configuration Properties


    | Property | Description |

    | --- | --- |

    | `management.zipkin.tracing.endpoint` | Sets the URL to the Zipkin API; the default
    is `http://localhost:9411/api/v2/spans`. |

    | `management.zipkin.tracing.connect-timeout` | Sets the connection timeout for
    requests to Zipkin; the default is 1 second. |

    | `management.zipkin.tracing.read-timeout` | Sets a read timeout for requests
    to Zipkin; the default is 10 seconds. |


    #### Set Up Tracing with an ObservationRegistry


    Spring Boot will automatically construct an `ObservationRegistry`. This `ObservationRegistry`
    can also be injected into regular beans for manual use (if needed). See Listing
    [9-14](#464036_2_En_9_Chapter.xhtml#PC14).


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.observation.Observation;

    import io.micrometer.observation.ObservationRegistry;

    import io.micrometer.observation.annotation.Observed;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    private final ObservationRegistry observations;

    InMemoryBookService(ObservationRegistry observations) {

    this.observations = observations;

    }

    public Optional find(String isbn) {

    var observation = Observation

    .createNotStarted("BookService.find", this.observations);

    observation.lowCardinalityKeyValue("isbn", isbn);

    return observation.observe(() -> Optional.ofNullable(books.get(isbn)));

    }

    }

    ```


    **Listing 9-14** Using an `ObservationRegistry`


    Here an observation is added to the `find` method. To do this, an `Observation`
    is created with a name and the injected `ObservationRegistry`. Next we invoke
    the actual code we want to have observed by using the `observe()` method. The
    `Observation.observe()` method takes either a `Runnable` or a `Supplier` depending
    on whether you need to return a result. With this small adaptation, we will now
    be able to see how long it takes to look up a book, and it will display as an
    additional part of the trace in Zipkin.


    #### Set Up Tracing with AspectJ


    When AspectJ is detected, it will also register an `io.micrometer.observation.aop.ObservedAspect`.
    The `ObservedAspect` will detect methods with an `@Observed` annotation and create
    a new observation for it. See Listing [9-15](#464036_2_En_9_Chapter.xhtml#PC15).


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.observation.Observation;

    import io.micrometer.observation.ObservationRegistry;

    import io.micrometer.observation.annotation.Observed;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    private final ObservationRegistry observations;

    InMemoryBookService(ObservationRegistry observations) {

    this.observations = observations;

    }

    @Override

    @Observed(name = "BookService.create")

    public Book create(Book book) {

    books.put(book.isbn(), book);

    return book;

    }

    }

    ```


    **Listing 9-15** Using the `@Observed` Annotation


    The `@Observed` annotation will trigger the creation of a new `Observation` with
    the given `name`. If `name` is omitted, it will use `method.observed` as the default.
    Additionally, the class name and method name are added as low-cardinality keys
    to the observation. It is also possible to supply static values as low-cardinality
    keys in the `@Observed` annotation; it isn’t possible (at the time of writing)
    to specify an expression to retrieve, for instance, the `isbn` value from the
    `Book` parameter.


    # 10. Packaging


    In this chapter, you will learn about different solutions for packaging a Spring
    Boot application, from creating an executable JAR to using GraalVM to create a
    native image from the code.


    ## 10-1. Create an Executable Archive


    By default Spring Boot creates a JAR or WAR that can be run with `java -jar your-application.jar`.
    However, you might want to run the application as part of the startup of your
    server (currently tested and supported for Debian- and Ubuntu-based systems).
    For this you can use the Maven or Gradle plugins to create an executable JAR.


    ### Problem


    You want an executable file so that it can be installed as a service in your environment.


    ### Solution


    The Spring Boot Maven and Gradle plugins both have the option to make the created
    artifact executable.^([⁶](#fn6)) When doing so, the archive also becomes/behaves
    like a Unix shell script to start/stop a service.


    ### How It Works


    To make an artifact executable, you need to configure the Maven or Gradle plugin
    as such.


    #### Make the Archive Executable


    In the Maven plugin, you can set the `executable` property to `true`, and the
    archive will be executable. See Listing [10-1](#464036_2_En_10_Chapter.xhtml#PC1).


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    true

    ```


    **Listing 10-1** Spring Boot Maven Plugin to Create Executable


    For Gradle you need to specify `launchScript()` to achieve this. See Listing [10-2](#464036_2_En_10_Chapter.xhtml#PC2).


    ```

    tasks.named(''bootJar'') {

    launchScript()

    }

    ```


    **Listing 10-2** Spring Boot Gradle Plugin to Create Executable


    Now after building your artifact, the artifact itself is executable and can be
    used to launch the application. Instead of `java -jar your-application.jar`, you
    can now simply type `./your-application.jar` and it will start.


    > **Note:** It might be necessary to make the archive executable; you can use
    `chmod +x your-application.jar` for that.


    When making the archive executable, what happens is the archive will be prefixed
    with a bash script. You might think that doing so will break the Java archive.
    However, because of the way Java reads archives (bottom to top) and the way the
    shell reads the archives (top to bottom), this actually does work.


    > **Note:** You can see the bash script using `head -n 309 your-application.jar`.'
  raw: '#### Configure Tracing


    Spring Boot exposes some properties to make it easier to configure tracing. You
    can configure the propagation type it should and how many of the calls should
    be sampled (the default is 10%). By default it will be enabled if detected, but
    you can also disable it.


    Table 9-5


    Tracing Configuration Properties


    | Property | Description |

    | --- | --- |

    | `management.tracing.enabled` | Sets whether the auto-configuration of tracing
    should be enabled; the default is `true`. |

    | `management.tracing.sampling.probability` | Sets the probability of the sample
    range, from 0 to 1.0; the default is 0.1. |

    | `management.tracing.propagation.type` | Lists supported tracing context propagations
    (can contain `W3C`, `B3`, or `B3_MULTI`); the default is `null`. When set, it
    takes precedence over the more fine-grained `consumes` and `produces` properties.
    |

    | `management.tracing.propagation.consume` | Lists supported tracing context propagations
    for receiving (can contain `W3C`, `B3`, or `B3_MULTI`); the default is all values.
    |

    | `management.tracing.propagation.produce` | Lists supported tracing context propagations
    for sending (can contain `W3C`, `B3`, or `B3_MULTI`); the default is `W3C`. |

    | `management.tracing.sampling.probability` | Probability in the range from `0.0`
    to `1.0` that a trace will be sampled. |


    Next, it is possible to configure Zipkin. Mainly the URL to the endpoint and some
    connection timeouts can be set (see Table [9-6](#464036_2_En_9_Chapter.xhtml#Tab6)).
    This applies to other solutions such as Wavefront, Open Telemetry, and Prometheus.


    Table 9-6


    Zipking Configuration Properties


    | `management.zipkin.tracing.endpoint` | Sets the URL to the Zipkin API; the default
    is `http://localhost:9411/api/v2/spans`. |

    | `management.zipkin.tracing.connect-timeout` | Sets the connection timeout for
    requests to Zipkin; the default is 1 second. |

    | `management.zipkin.tracing.read-timeout` | Sets a read timeout for requests
    to Zipkin; the default is 10 seconds. |


    #### Set Up Tracing with an ObservationRegistry


    Spring Boot will automatically construct an `ObservationRegistry`. This `ObservationRegistry`
    can also be injected into regular beans for manual use (if needed). See Listing
    [9-14](#464036_2_En_9_Chapter.xhtml#PC14).


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.observation.Observation;

    import io.micrometer.observation.ObservationRegistry;

    import io.micrometer.observation.annotation.Observed;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    private final ObservationRegistry observations;

    InMemoryBookService(ObservationRegistry observations) {

    this.observations = observations;

    }

    public Optional find(String isbn) {

    var observation = Observation

    .createNotStarted("BookService.find", this.observations);

    observation.lowCardinalityKeyValue("isbn", isbn);

    return observation.observe(() -> Optional.ofNullable(books.get(isbn)));

    }

    }

    Listing 9-14

    Using an ObservationRegistry

    ```


    Here an observation is added to the find method. To do this, an `Observation`
    is created with a name and the injected `ObservationRegistry`. Next we invoke
    the actual code we want to have observed by using the `observe()` method. The
    `Observation.observe()` method takes either a `Runnable` or a `Supplier` depending
    on whether you need to return a result. With this small adaptation, we will now
    be able to see how long it takes to look up a book, and it will display as an
    additional part of the trace in Zipkin.


    #### Set Up Tracing with AspectJ


    When AspectJ is detected, it will also register an `io.micrometer.observation.aop.ObservedAspect`.
    The `ObservedAspect` will detect methods with an `@Observed` annotation and create
    a new observation for it. See Listing [9-15](#464036_2_En_9_Chapter.xhtml#PC15).


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.observation.Observation;

    import io.micrometer.observation.ObservationRegistry;

    import io.micrometer.observation.annotation.Observed;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    private final ObservationRegistry observations;

    InMemoryBookService(ObservationRegistry observations) {

    this.observations = observations;

    }

    @Override

    @Observed(name = "BookService.create")

    public Book create(Book book) {

    books.put(book.isbn(), book);

    return book;

    }

    }

    Listing 9-15

    Using the @Observed Annotation

    ```


    The `@Observed` annotation will trigger the creation of a new `Observation` with
    the given `name`. If `name` is omitted, it will use `method.observed` as the default.
    Additionally, the class name and method name are added as low-cardinality keys
    to the observation. It is also possible to supply static values as low-cardinality
    keys in the `@Observed` annotation; it isn’t possible (at the time of writing)
    to specify an expression to retrieve, for instance, the `isbn` value from the
    `Book` parameter.


    # 10. Packaging


    In this chapter, you will learn about different solutions for packaging a Spring
    Boot application, from creating an executable JAR to using GraalVM to create a
    native image from the code.


    ## 10-1\. Create an Executable Archive


    By default Spring Boot creates a JAR or WAR that can be run with `java -jar your-application.jar`.
    However, you might want to run the application as part of the startup of your
    server (currently tested and supported for Debian- and Ubuntu-based systems).
    For this you can use the Maven or Gradle plugins to create an executable JAR.


    ### Problem


    You want an executable file so that it can be installed as a service in your environment.


    ### Solution


    The Spring Boot Maven and Gradle plugins both have the option to make the created
    artifact executable.^([⁶](#fn6)) When doing so, the archive also becomes/behaves
    like a Unix shell script to start/stop a service.


    ### How It Works


    To make an artifact executable, you need to configure the Maven or Gradle plugin
    as such.


    #### Make the Archive Executable


    In the Maven plugin, you can set the `executable` property to `true`, and the
    archive will be executable. See Listing [10-1](#464036_2_En_10_Chapter.xhtml#PC1).


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    true


    Listing 10-1

    Spring Boot Maven Plugin to Create Executable

    ```


    For Gradle you need to specify `launchScript()` to achieve this. See Listing [10-2](#464036_2_En_10_Chapter.xhtml#PC2).


    ```

    tasks.named(''bootJar'') {

    launchScript()

    }

    Listing 10-2

    Spring Boot Gradle Plugin to Create Executable

    ```


    Now after building your artifact, the artifact itself is executable and can be
    used to launch the application. Instead of `java -jar your-application.jar`, you
    can now simply type `./your-application.jar` and it will start.


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Figa_HTML.gif)An information
    icon. It might be necessary to make the archive executable; you can use `chmod
    +x your-application.jar` for that.


    When making the archive executable, what happens is the archive will be prefixed
    with a bash script. You might think that doing so will break the Java archive.
    However, because of the way Java reads archives (bottom to top) and the way the
    shell reads the archives (top to bottom), this actually does work.


    ![](images/464036_2_En_10_Chapter/464036_2_En_10_Figb_HTML.gif)An information
    icon. You can see the bash script using `head -n 309 your-application.jar`.'
  trans: '

    #### 配置追踪


    Spring Boot 提供了一些属性，以便更轻松地配置追踪。您可以配置应使用的传播类型以及应采样的调用比例（默认为 10%）。默认情况下，如果检测到追踪功能，它将被启用，但您也可以禁用它。


    表 9-5


    追踪配置属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.tracing.enabled` | 设置是否应启用追踪的自动配置；默认值为 `true`。 |

    | `management.tracing.sampling.probability` | 设置采样范围的概率，从 0 到 1.0；默认值为 0.1。 |

    | `management.tracing.propagation.type` | 列出支持的追踪上下文传播方式（可包含 `W3C`、`B3` 或 `B3_MULTI`）；默认值为
    `null`。设置后，它将优先于更细粒度的 `consumes` 和 `produces` 属性。 |

    | `management.tracing.propagation.consume` | 列出接收时支持的追踪上下文传播方式（可包含 `W3C`、`B3`
    或 `B3_MULTI`）；默认值为所有值。 |

    | `management.tracing.propagation.produce` | 列出发送时支持的追踪上下文传播方式（可包含 `W3C`、`B3`
    或 `B3_MULTI`）；默认值为 `W3C`。 |

    | `management.tracing.sampling.probability` | 追踪被采样的概率，范围从 `0.0` 到 `1.0`。 |


    接下来，可以配置 Zipkin。主要可以设置端点的 URL 和一些连接超时（参见表 9-6）。这同样适用于其他解决方案，如 Wavefront、Open Telemetry
    和 Prometheus。


    表 9-6


    Zipkin 配置属性


    | `management.zipkin.tracing.endpoint` | 设置 Zipkin API 的 URL；默认值为 `http://localhost:9411/api/v2/spans`。
    |

    | `management.zipkin.tracing.connect-timeout` | 设置对 Zipkin 请求的连接超时；默认值为 1 秒。 |

    | `management.zipkin.tracing.read-timeout` | 设置对 Zipkin 请求的读取超时；默认值为 10 秒。 |


    #### 使用 ObservationRegistry 设置追踪


    Spring Boot 会自动构建一个 `ObservationRegistry`。如果需要，这个 `ObservationRegistry` 也可以注入到常规
    Bean 中供手动使用。参见清单 9-14。


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.observation.Observation;

    import io.micrometer.observation.ObservationRegistry;

    import io.micrometer.observation.annotation.Observed;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    private final ObservationRegistry observations;

    InMemoryBookService(ObservationRegistry observations) {

    this.observations = observations;

    }

    public Optional find(String isbn) {

    var observation = Observation

    .createNotStarted("BookService.find", this.observations);

    observation.lowCardinalityKeyValue("isbn", isbn);

    return observation.observe(() -> Optional.ofNullable(books.get(isbn)));

    }

    }

    清单 9-14

    使用 ObservationRegistry

    ```


    这里为 `find` 方法添加了一个观测。为此，使用一个名称和注入的 `ObservationRegistry` 创建了一个 `Observation`。接下来，我们通过使用
    `observe()` 方法来调用我们希望被观测的实际代码。`Observation.observe()` 方法根据是否需要返回结果，接受一个 `Runnable`
    或一个 `Supplier`。通过这个小小的调整，我们现在就能看到查找一本书所需的时间，并且它将作为 Zipkin 中追踪的一部分额外显示出来。


    #### 使用 AspectJ 设置追踪


    当检测到 AspectJ 时，它还会注册一个 `io.micrometer.observation.aop.ObservedAspect`。`ObservedAspect`
    会检测带有 `@Observed` 注解的方法，并为其创建一个新的观测。参见清单 9-15。


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.observation.Observation;

    import io.micrometer.observation.ObservationRegistry;

    import io.micrometer.observation.annotation.Observed;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    private final ObservationRegistry observations;

    InMemoryBookService(ObservationRegistry observations) {

    this.observations = observations;

    }

    @Override

    @Observed(name = "BookService.create")

    public Book create(Book book) {

    books.put(book.isbn(), book);

    return book;

    }

    }

    清单 9-15

    使用 @Observed 注解

    ```


    `@Observed` 注解会触发创建一个具有给定 `name` 的新 `Observation`。如果省略 `name`，它将使用 `method.observed`
    作为默认值。此外，类名和方法名会作为低基数键添加到观测中。也可以在 `@Observed` 注解中提供静态值作为低基数键；但（在撰写本文时）尚无法指定表达式来检索，例如，从
    `Book` 参数中获取 `isbn` 值。


    # 10. 打包


    在本章中，您将了解打包 Spring Boot 应用程序的不同解决方案，从创建可执行 JAR 到使用 GraalVM 从代码创建原生镜像。


    ## 10-1. 创建可执行归档文件


    默认情况下，Spring Boot 会创建一个可以使用 `java -jar your-application.jar` 运行的 JAR 或 WAR。但是，您可能希望将应用程序作为服务器启动的一部分来运行（目前已在基于
    Debian 和 Ubuntu 的系统上测试并支持）。为此，您可以使用 Maven 或 Gradle 插件来创建一个可执行 JAR。


    ### 问题


    您需要一个可执行文件，以便将其作为服务安装在您的环境中。


    ### 解决方案


    Spring Boot Maven 和 Gradle 插件都提供了使创建的构件可执行的选项。^(⁶) 这样做之后，归档文件也会变成/表现得像一个用于启动/停止服务的
    Unix shell 脚本。


    ### 工作原理


    要使构件可执行，您需要按如下方式配置 Maven 或 Gradle 插件。


    #### 使归档文件可执行


    在 Maven 插件中，您可以将 `executable` 属性设置为 `true`，归档文件将变为可执行。参见清单 10-1。


    ```

    org.springframework.boot

    spring-boot-maven-plugin


    true


    清单 10-1

    用于创建可执行文件的 Spring Boot Maven 插件

    ```


    对于 Gradle，您需要指定 `launchScript()` 来实现这一点。参见清单 10-2。


    ```

    tasks.named(''bootJar'') {

    launchScript()

    }

    清单 10-2

    用于创建可执行文件的 Spring Boot Gradle 插件

    ```


    现在，在构建您的构件之后，该构件本身是可执行的，并且可以用来启动应用程序。您现在可以简单地输入 `./your-application.jar` 来启动它，而无需使用
    `java -jar your-application.jar`。


    ![](img/464036_2_En_10_Figa_HTML.gif)一个信息图标。 可能需要使归档文件可执行；您可以使用 `chmod +x your-application.jar`
    来实现。


    当使归档文件可执行时，实际上是在归档文件前面加上了一个 bash 脚本。您可能会认为这样做会破坏 Java 归档文件。然而，由于 Java 读取归档文件的方式（从底部到顶部）和
    shell 读取归档文件的方式（从顶部到底部），这实际上是可行的。


    ![](img/464036_2_En_10_Figb_HTML.gif)一个信息图标。 您可以使用 `head -n 309 your-application.jar`
    来查看这个 bash 脚本。

    '
- fmt: '### Specify the Configuration


    Normally when you launch a Spring Boot–based application, there are several options
    for providing additional configuration (see Chapter [2](#464036_2_En_2_Chapter.xhtml)).^([⁷](#fn7))
    However, when using the archive as a script (or as a service), some of them don’t
    apply anymore. What you can do instead is make use of a `.conf` file next to your
    executable archive (it must be named `your-application.conf`) to contain additional
    configuration options for your application. See Table [10-1](#464036_2_En_10_Chapter.xhtml#Tab1).


    **Table 10-1** Available Properties


    | Property | Description |

    | --- | --- |

    | `MODE` | Sets the “mode” of operation. The default is `auto`, which will detect
    the mode. When launched from a symlink, it will behave like `service`. Change
    to `run` if you want to run the process in the foreground. |

    | `RUN_AS_USER` | Sets the user that is used to run the application; the default
    is the owner of the JAR file. |

    | `USE_START_STOP_DAEMON` | Sets whether to use the `start-stop-daemon` command.
    By default this will detect if the command is available. |

    | `PID_FOLDER` | Sets the name of the folder to write the PID to; the default
    is `/var/run`. |

    | `LOG_FOLDER` | Sets the name of the folder to write the logging to; the default
    is `/var/log`. |

    | `CONF_FOLDER` | Sets the name of the folder to read `.conf` from; the default
    is the same directory as the JAR file. |

    | `LOG_FILENAME` | Sets the name of the logfile to write to; the default is `<appname>.log`.
    |

    | `APP_NAME` | Sets the name of the application. If the JAR file is run from a
    symlink, the script guesses the app name. |

    | `RUN_ARGS` | Sets the arguments to pass to the Spring Boot application. |

    | `JAVA_HOME` | By default, this will be discovered from the `$PATH` but can be
    explicitly defined if needed. |

    | `JAVA_OPTS` | Sets the options to pass to the JVM (like memory settings, GC
    settings, etc.). |

    | `JARFILE` | Sets the explicit location of the JAR file, in case the script is
    being used to launch a JAR that is not actually embedded. |

    | `DEBUG` | If not empty, sets the `-x` flag on the shell process, making it easy
    to see the logic in the script. |

    | `STOP_WAIT_TIME` | Sets the time to wait before forcing a shutdown (the default
    is 60 seconds). |


    When using an embedded script (the default), the `JARFILE` and `APP_NAME` properties
    aren’t configurable using a `.conf` file. See Listing [10-3](#464036_2_En_10_Chapter.xhtml#PC3).


    ```

    JAVA_OPTS=-Xmx1024m

    DEBUG=true

    Listing 10-3

    Properties for Executable

    ```


    With this, you will assign a max of 1 GB of memory to your application, and it
    will do some additional logging for the shell script. It is of course possible
    to add any of the properties from Table [10-1](#464036_2_En_10_Chapter.xhtml#Tab1)
    to this file.


    ## 10-2. Create a WAR File for Deployment


    ### Problem


    Instead of creating a JAR file, you want a WAR file to deploy to a servlet container
    or Jakarta EE container. This so-called traditional deployment can be necessary
    if you are in an organization that still uses servers such as Oracle WebLogic,
    IBM WebSphere, or Tomcat.


    ### Solution


    Change the packaging of the application from JAR to WAR and let your Spring Boot
    application extend `SpringBootServletInitializer` so that it can bootstrap itself
    as a regular application. Lastly, make sure the server you use for development
    is included as a `provided` dependency so that it can be filtered while generating
    the deployable artifact.'
