- fmt: '### How It Works


    Assuming that a dependency on Spring Boot Actuator is already present, you can
    start writing an implementation right away. Assume you have an application using
    a `TaskScheduler` and you want to have some metrics and health checks on it. (Adding
    `@EnableScheduling` is enough to have Spring Boot create a default `TaskScheduler`.)


    First let’s write the `HealthIndicator` interface. You can either directly implement
    the `HealthIndicator` interface (and implement the `health()` method) or use the
    convenience `AbstractHealthIndicator` method as a base class (which adds some
    logic and exception handling out of the box). We can use Recipe 3-3 as the starting
    point for this recipe. See Listing [9-7](#464036_2_En_9_Chapter.xhtml#PC7).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.actuate.health.AbstractHealthIndicator;

    import org.springframework.boot.actuate.health.Health;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerHealthIndicator extends AbstractHealthIndicator {

    private final ThreadPoolTaskScheduler taskScheduler;

    TaskSchedulerHealthIndicator(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    protected void doHealthCheck(Health.Builder builder) throws Exception {

    int poolSize = taskScheduler.getPoolSize();

    int active = taskScheduler.getActiveCount();

    int free = poolSize - active;

    builder

    .withDetail("active", active)

    .withDetail("poolsize", poolSize);

    if (poolSize > 0 && free <= 1) {

    builder.down();

    } else {

    builder.up();

    }

    }

    }

    Listing 9-7

    HealthIndicator Implementation

    ```


    The `TaskSchedulerHealthIndicator` interface operates on the given `ThreadPoolTaskExecutor`.
    It reports the status as down if there are 1 or fewer threads available to schedule
    tasks. The condition on `poolSize > 0` is there because the creation of the underlying
    `Executor` is delayed until needed; until then, the `poolSize` will report `0`.
    The returned value includes the `poolsize` and `active` thread count.


    The `TaskSchedulerMetrics` implementation extends the `MeterBinder` interface
    from Micrometer.io. It exposes the `active` and `pool-size` values to the metrics
    registry. See Listing [9-8](#464036_2_En_9_Chapter.xhtml#PC8).


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.core.instrument.FunctionCounter;

    import io.micrometer.core.instrument.MeterRegistry;

    import io.micrometer.core.instrument.binder.MeterBinder;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerMetrics implements MeterBinder {

    private final ThreadPoolTaskScheduler taskScheduler;

    public TaskSchedulerMetrics(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    public void bindTo(MeterRegistry registry) {

    FunctionCounter

    .builder("task.scheduler.active", taskScheduler,

    ThreadPoolTaskScheduler::getActiveCount)

    .register(registry);

    FunctionCounter

    .builder("task.scheduler.pool-size", taskScheduler,

    ThreadPoolTaskScheduler::getPoolSize)

    .register(registry);

    }

    }

    Listing 9-8

    MeterBinder Implementation to Expose Metrics

    ```


    Now when placing an `@EnableScheduling` annotation on `LibraryApplication` and
    restarting the application, metrics and health will be reported for `TaskScheduler`
    (see Figure [9-7](#464036_2_En_9_Chapter.xhtml#Fig7)).


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig7_HTML.jpg)


    A JSON status report indicates that disk space and task scheduler components are
    up. It provides disk details such as total and free space, along with ping status.
    Task scheduler is reported as active with a pool size of 0.


    **Figure 9-7** TaskScheduler health check


    ## 9-3. Export Metrics


    ### Problem


    You want to export the metrics to an external system to create a dashboard to
    monitor the application.


    ### Solution


    Use one of the supported systems such as Graphite and periodically push the metrics
    to that system. Include a Micrometer.io registry dependency in your application
    (in addition to the `spring-boot-starter-actuator` dependency), and metrics will
    automatically be exported. By default, every minute the data will be pushed to
    the server.


    ### How It Works


    The ability to export metrics is part of the Micrometer.io library, and it supports
    a wide variety of services such as Graphite, DataDog, Prometheus, or regular StatsD.
    This recipe uses Graphite, so a dependency to `micrometer-registry-graphite` needs
    to be added. See Listing [9-9](#464036_2_En_9_Chapter.xhtml#PC9).


    ```

    io.micrometer

    micrometer-registry-graphite


    Listing 9-9

    Micrometer Graphite Registry Dependency

    ```


    In theory, this could be enough to have metrics published to Graphite if Graphite
    is running on `localhost` and with the default ports. However, Spring Boot makes
    it easy to configure this by exposing some properties. Generally, this is in the
    `management.metrics.export.<registry-name>` namespace (see Table [9-3](#464036_2_En_9_Chapter.xhtml#Tab3)).


    **Table 9-3** Common Metrics Export Properties


    | Property | Description |

    | --- | --- |

    | `management.<registry-name>.metrics.export.enabled` | Sets whether to enable
    metrics exporting. The default is `true` when the library is detected on the classpath.
    |

    | `management.<registry-name>.metrics.export.host` | Sets the host to send metrics
    to, mostly `localhost` or a well-known URL of the service (like SignalFX, DataDog,
    etc.). |

    | `management.<registry-name>.metrics.export.port` | Sets the port to send metrics
    to; this defaults to the well-known port of the desired service. |

    | `management.<registry-name>.metrics.export.step` | Sets how often to send metrics;
    the default is 1 minute. |

    | `management.<registry-name>.metrics.export.rate-units` | Sets the base time
    unit used to report rates; the default is `seconds`. |

    | `management.<registry-name>.metrics.export.duration-units` | Sets the base time
    unit used to report durations; the default is `milliseconds`. |


    To report the metrics every 10 seconds instead of each minute, add Listing [9-10](#464036_2_En_9_Chapter.xhtml#PC10)
    to the `application.properties` file.


    ```

    management.graphite.metrics.export.step=10s

    Listing 9-10

    Graphite Configuration

    ```


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Figb_HTML.gif)An information icon.
    The `bin` directory contains a `graphite.sh` file that uses Docker to start a
    Graphite instance.


    Now the metrics will be published to Graphite every 10 seconds. If you start the
    application and open Graphite on `http://localhost/` (assuming you are running
    the aforementioned Docker container), you could, for example, create a graph of
    the CPU usage and load (see Figure [9-8](#464036_2_En_9_Chapter.xhtml#Fig8)).


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig8_HTML.jpg)


    A screenshot of a window titled graphite. From the left pane, the tab labeled
    tree is selected. Metrics directory is expanded. The subfolder labeled system
    is expanded further. The right pane has a graphite composer window displaying
    a line graph. The title reads, now showing the past 5 minutes.


    **Figure 9-8** Graphite CPU graph


    ## 9-4. Tracing with Zipkin


    ### Problem


    You want to correlate log lines in your logfiles to incoming requests, messages,
    and call flows as well as record traces to a tracing solution like Zipkin.'
