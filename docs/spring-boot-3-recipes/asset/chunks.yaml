    ### 工作原理


    假设已经存在对 Spring Boot Actuator 的依赖，你就可以立即开始编写实现。假设你有一个使用 `TaskScheduler` 的应用程序，并且希望对其进行一些指标和健康检查。（添加
    `@EnableScheduling` 就足以让 Spring Boot 创建一个默认的 `TaskScheduler`。）


    首先，我们来编写 `HealthIndicator` 接口。你可以直接实现 `HealthIndicator` 接口（并实现 `health()` 方法），或者使用便捷的
    `AbstractHealthIndicator` 方法作为基类（它开箱即用地添加了一些逻辑和异常处理）。我们可以将配方 3-3 作为本配方的起点。参见清单
    9-7。


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.boot.actuate.health.AbstractHealthIndicator;

    import org.springframework.boot.actuate.health.Health;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerHealthIndicator extends AbstractHealthIndicator {

    private final ThreadPoolTaskScheduler taskScheduler;

    TaskSchedulerHealthIndicator(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    protected void doHealthCheck(Health.Builder builder) throws Exception {

    int poolSize = taskScheduler.getPoolSize();

    int active = taskScheduler.getActiveCount();

    int free = poolSize - active;

    builder

    .withDetail("active", active)

    .withDetail("poolsize", poolSize);

    if (poolSize > 0 && free <= 1) {

    builder.down();

    } else {

    builder.up();

    }

    }

    }

    清单 9-7

    HealthIndicator 实现

    ```


    `TaskSchedulerHealthIndicator` 接口对给定的 `ThreadPoolTaskExecutor` 进行操作。如果可用于调度任务的线程数为
    1 或更少，则将其状态报告为 down。`poolSize > 0` 的条件之所以存在，是因为底层 `Executor` 的创建会延迟到需要时才进行；在此之前，`poolSize`
    将报告为 `0`。返回值包括 `poolsize` 和 `active` 线程数。


    `TaskSchedulerMetrics` 实现扩展了 Micrometer.io 中的 `MeterBinder` 接口。它将 `active` 和 `pool-size`
    值暴露给指标注册表。参见清单 9-8。


    ```

    package com.apress.springboot3recipes.library;

    import io.micrometer.core.instrument.FunctionCounter;

    import io.micrometer.core.instrument.MeterRegistry;

    import io.micrometer.core.instrument.binder.MeterBinder;

    import org.springframework.scheduling.concurrent.ThreadPoolTaskScheduler;

    import org.springframework.stereotype.Component;

    @Component

    class TaskSchedulerMetrics implements MeterBinder {

    private final ThreadPoolTaskScheduler taskScheduler;

    public TaskSchedulerMetrics(ThreadPoolTaskScheduler taskScheduler) {

    this.taskScheduler = taskScheduler;

    }

    @Override

    public void bindTo(MeterRegistry registry) {

    FunctionCounter

    .builder("task.scheduler.active", taskScheduler,

    ThreadPoolTaskScheduler::getActiveCount)

    .register(registry);

    FunctionCounter

    .builder("task.scheduler.pool-size", taskScheduler,

    ThreadPoolTaskScheduler::getPoolSize)

    .register(registry);

    }

    }

    清单 9-8

    用于暴露指标的 MeterBinder 实现

    ```


    现在，当在 `LibraryApplication` 上放置 `@EnableScheduling` 注解并重新启动应用程序时，将报告 `TaskScheduler`
    的指标和健康状态（参见图 9-7）。


    ![](img/464036_2_En_9_Fig7_HTML.jpg)


    一个 JSON 状态报告表明磁盘空间和任务调度器组件处于 up 状态。它提供了磁盘详细信息，例如总空间和可用空间，以及 ping 状态。任务调度器报告为 active，池大小为
    0。


    图 9-7


    TaskScheduler 健康检查


    ## 9-3\. 导出指标


    ### 问题


    你想将指标导出到外部系统，以创建仪表板来监控应用程序。


    ### 解决方案


    使用 Graphite 等受支持的系统之一，并定期将指标推送到该系统。在你的应用程序中包含一个 Micrometer.io 注册表依赖项（除了 `spring-boot-starter-actuator`
    依赖项之外），指标将自动导出。默认情况下，数据将每分钟推送到服务器。


    ### 工作原理


    导出指标的能力是 Micrometer.io 库的一部分，它支持多种服务，例如 Graphite、DataDog、Prometheus 或常规 StatsD。本配方使用
    Graphite，因此需要添加对 `micrometer-registry-graphite` 的依赖。参见清单 9-9。


    ```

    io.micrometer

    micrometer-registry-graphite


    清单 9-9

    Micrometer Graphite 注册表依赖项

    ```


    理论上，如果 Graphite 运行在 `localhost` 上并使用默认端口，这足以将指标发布到 Graphite。然而，Spring Boot 通过暴露一些属性使配置变得容易。通常，这位于
    `management.metrics.export.<registry-name>` 命名空间下（参见表 9-3）。


    表 9-3


    常用指标导出属性


    | 属性 | 描述 |

    | --- | --- |

    | `management.<registry-name>.metrics.export.enabled` | 设置是否启用指标导出。当在类路径上检测到该库时，默认值为
    `true`。 |

    | `management.<registry-name>.metrics.export.host` | 设置发送指标的主机，通常是 `localhost`
    或服务的已知 URL（如 SignalFX、DataDog 等）。 |

    | `management.<registry-name>.metrics.export.port` | 设置发送指标的端口；默认为所需服务的已知端口。 |

    | `management.<registry-name>.metrics.export.step` | 设置发送指标的频率；默认为 1 分钟。 |

    | `management.<registry-name>.metrics.export.rate-units` | 设置用于报告速率的基本时间单位；默认为
    `seconds`。 |

    | `management.<registry-name>.metrics.export.duration-units` | 设置用于报告持续时间的基本时间单位；默认为
    `milliseconds`。 |


    要每 10 秒而不是每分钟报告一次指标，请将清单 9-10 添加到 `application.properties` 文件中。


    ```

    management.graphite.metrics.export.step=10s

    清单 9-10

    Graphite 配置

    ```


    ![](img/464036_2_En_9_Figb_HTML.gif)一个信息图标。 `bin` 目录包含一个 `graphite.sh` 文件，该文件使用
    Docker 启动一个 Graphite 实例。


    现在，指标将每 10 秒发布到 Graphite。如果你启动应用程序并在 `http://localhost/` 上打开 Graphite（假设你正在运行上述
    Docker 容器），你可以，例如，创建一个 CPU 使用率和负载的图表（参见图 9-8）。


    ![](img/464036_2_En_9_Fig8_HTML.jpg)


    一个标题为 graphite 的窗口截图。从左侧窗格中，选择了标记为 tree 的选项卡。Metrics 目录已展开。标记为 system 的子文件夹进一步展开。右侧窗格有一个
    graphite composer 窗口，显示一个折线图。标题显示为“now showing the past 5 minutes”。


    图 9-8


    Graphite CPU 图表


    ## 9-4\. 使用 Zipkin 进行追踪


    ### 问题


    你想将日志文件中的日志行与传入请求、消息和调用流关联起来，并将追踪记录到像 Zipkin 这样的追踪解决方案中。

