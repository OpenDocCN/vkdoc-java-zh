    ### Solution


    Exclude the Reactor Netty runtime and include the Undertow runtime. Spring Boot
    will automatically detect if Tomcat, Jetty, Reactor Netty, or Undertow is on the
    classpath and configure the container accordingly.


    ### How It Works


    Spring Boot has out-of-the-box support for Tomcat, Jetty, Reactor Netty, and Undertow
    as embedded reactive containers. By default Spring Boot uses Reactor Netty as
    the container (expressed through the `spring-boot-starter-reactor-netty` dependency
    in the `spring-boot-starter-webflux` artifact). The container can be configured
    using properties, some of which apply to all containers and others to a specific
    container. The global properties are prefixed with `server` or `server.reactive`,
    whereas the containers start with `server.<container>` (where `container` is either
    `tomcat`, `jetty`, `netty`, or `undertow`).'
