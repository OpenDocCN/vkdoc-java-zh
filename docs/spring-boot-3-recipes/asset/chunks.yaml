- fmt: '### How It Works


    Imagine you are working at a public library and you need to develop a REST API
    to make it possible to list and search for books.


    First you need to add the dependencies of the Jackson library to your build. Spring
    Boot has `spring-boot-starter-json` to add all the needed dependencies. See Listing
    [3-5](#464036_2_En_3_Chapter.xhtml#PC5).


    ```

    org.springframework.boot

    spring-boot-starter-json


    Listing 3-5

    Spring Boot JSON Starter Dependency

    ```


    An information icon with the letter i inside a circle. The `spring-boot-starter-web`
    dependency already has a dependency on `spring-boot-starter-json` and will pull
    it in automatically. But it can be handy to declare it explicitly to state that
    you are using/enabling JSON.


    You can also use the Google GSON library; just use the appropriate GSON dependency
    instead and exclude `spring-boot-starter-json` from the `spring-boot-starter-web`
    dependency.


    As you are making an application for a library, it will probably include books,
    so let’s create a `Book` record. See Listing [3-6](#464036_2_En_3_Chapter.xhtml#PC6).


    ```

    package com.apress.springboot3recipes.library;

    import java.util.List;

    import java.util.Objects;

    public record Book(

    String isbn,

    String title,

    List authors) {

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || getClass() != o.getClass()) return false;

    Book book = (Book) o;

    return Objects.equals(isbn, book.isbn);

    }

    @Override

    public int hashCode() {

    return Objects.hash(isbn);

    }

    }

    Listing 3-6

    Book Record

    ```


    A book is defined by its ISBN number; it has a title and one or more authors.
    Normally a record creates an `equals`, a `hashCode`, and a `toString` method,
    which will include all the data from the record (as it is immutable). However,
    here we want to have an `equals` and `hashCode` based only on the `isbn` field,
    so we provide the implementation ourselves.


    You would also need a service to work with the books in the library. Let’s define
    an interface and implementation for the `BookService`. See Listing [3-7](#464036_2_En_3_Chapter.xhtml#PC7).


    ```

    package com.apress.springboot3recipes.library;

    import java.util.Optional;

    public interface BookService {

    Iterable findAll();

    Book create(Book book);

    Optional find(String isbn);

    }

    Listing 3-7

    BookService Interface

    ```


    The implementation, for now, is a simple in-memory implementation. See Listing
    [3-8](#464036_2_En_3_Chapter.xhtml#PC8).


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map books = new ConcurrentHashMap();

    @Override

    public Iterable findAll() {

    return books.values();

    }

    @Override

    public Book create(Book book) {

    books.put(book.isbn(), book);

    return book;

    }

    @Override

    public Optional find(String isbn) {

    return Optional.ofNullable(books.get(isbn));

    }

    }

    Listing 3-8

    BookService In-Memory Implementation

    ```


    The service has been annotated with `@Service` so that Spring Boot will detect
    it and create an instance of it. See Listing [3-9](#464036_2_En_3_Chapter.xhtml#PC9).


    ```

    package com.apress.springboot3recipes.library;

    import java.util.List;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class LibraryApplication {

    public static void main(String[] args) {

    SpringApplication.run(LibraryApplication.class, args);

    }

    @Bean

    public ApplicationRunner booksInitializer(BookService bookService) {

    return args -> {

    bookService.create(

    new Book("9780061120084", "To Kill a Mockingbird",

    List.of("Harper Lee")));

    bookService.create(

    new Book("9780451524935", "1984",

    List.of("George Orwell")));

    bookService.create(

    new Book("9780618260300", "The Hobbit",

    List.of("J.R.R. Tolkien")));

    };

    }

    }

    Listing 3-9

    Application Class with Setup Data

    ```


    The `LibraryApplication` will detect all the classes and start the server. Upon
    starting, it will preregister three books so that we have something in our library.


    To expose the `Book` as a REST resource, create a class called `BookController`
    and annotate it with `@RestController`. Spring Boot will detect this class and
    create an instance of it. Using `@RequestMapping` (and `@GetMapping` and `@PostMapping`),
    you can write methods to handle the incoming requests.


    An information icon with the letter i inside a circle. Instead of `@RestController`,
    you could use `@Controller` and put `@ResponseBody` on each request handling method.
    Using `@RestController` will implicitly add `@ResponseBody` to the request handling
    methods.


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.springframework.http.ResponseEntity;

    import org.springframework.web.bind.annotation.*;

    import org.springframework.web.util.UriComponentsBuilder;

    @RestController

    @RequestMapping("/books")

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping

    public Iterable all() {

    return bookService.findAll();

    }

    @GetMapping("/{isbn}")

    public ResponseEntity get(@PathVariable("isbn") String isbn) {

    return ResponseEntity.of(bookService.find(isbn));

    }

    @PostMapping

    public ResponseEntity create(@RequestBody Book book,

    UriComponentsBuilder uriBuilder) {

    var created = bookService.create(book);

    var newBookUri = uriBuilder.path("/books/{isbn}").build(created.isbn());

    return ResponseEntity.created(newBookUri).body(created);

    }

    }

    ```


    The controller will be mapped to the `/books` path due to the `@RequestMapping("/books")`
    annotation on the class. The `list` method will be invoked for GET requests on
    `/books`. When `/books/979-8-8688-0112-9` is called with a GET request, the `get`
    method will be invoked and return the result for a single book or, when no book
    can be found, a 404 response status. Finally, you can add books to the library
    using a POST request on `/books`. Then the `create` method will be invoked, and
    the body of the incoming request will be converted into a book.


    Spring Boot can also show you what mappings are available during startup. For
    this to happen, you will need to enable TRACE logging for the `web` group (a placeholder
    in Spring Boot to enable logging for a bunch of packages). By adding `logging.level.web=TRACE`
    to `application.properties`, it will list all the mappings onto the console. It
    will also enable a lot of logging on incoming requests and process those requests,
    so you probably don’t want to keep this on, but it can be a great tool to debug
    mapping issues. See Figure [3-3](#464036_2_En_3_Chapter.xhtml#Fig3) for sample
    output.'
