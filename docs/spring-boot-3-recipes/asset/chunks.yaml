    output should still be the same as shown in Figure [3-20](#464036_2_En_3_Chapter.xhtml#Fig20).


    #### Test RestTemplate or RestClient-Based Code


    To test the client-side code with a `RestTemplate` or `RestClient`, the Spring
    Test framework provides the `MockRestServiceServer`. The `MockRestServiceServer`
    can be used to return a response for a specific request (based on URL, header,
    content, etc.).


    Spring Boot in turn makes it easier to work with this by providing the `@RestClientTest`
    annotation. This will set up the `MockRestServiceServer` so it can be autowired
    and will configure the class under test as well. See Listing [3-60](#464036_2_En_3_Chapter.xhtml#PC65).


    ```

    package com.apress.springboot3recipes.library.rest;

    import org.junit.jupiter.api.Assertions;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.client.RestClientTest;

    import org.springframework.http.HttpStatusCode;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.client.MockRestServiceServer;

    import static org.springframework.test.web.client.match.MockRestRequestMatchers.requestTo;

    import static org.springframework.test.web.client.response.MockRestResponseCreators.withSuccess;

    @RestClientTest(EnrichedBookController.class)

    class EnrichedBookControllerTest {

    private static final String BOOK_JSON = """

    {

    "authors": [

    "T. Author"

    ],

    "isbn": "123456789",

    "title": "The Client Test"

    }

    """;

    private static final String OL_JSON = """

    "{ "publish_date": "2024"}"

    """;

    @Autowired

    private MockRestServiceServer mockServer;

    @Autowired

    private EnrichedBookController controller;

    @Test

    void enrichBook() {

    mockServer

    .expect(requestTo("http://localhost:8080/books/123456789"))

    .andRespond(withSuccess(BOOK_JSON, MediaType.APPLICATION_JSON));

    mockServer

    .expect(requestTo("https://openlibrary.org/isbn/123456789.json"))

    .andRespond(withSuccess(OL_JSON, MediaType.APPLICATION_JSON));

    var response = controller.get("123456789");

    var enrichedBook = response.getBody();

    Assertions.assertNotNull(enrichedBook);

    Assertions.assertEquals(HttpStatusCode.valueOf(200), response.getStatusCode());

    Assertions.assertEquals(enrichedBook.published(), "2024");

    mockServer.verify();

    }

    }

    Listing 3-60

    Test for Rest Client Setup

    ```


    The test uses the `@RestClientTest` to set up the server and prepare `EnrichedBookController`
    for testing. Both the `MockRestServiceServer` and the `EnrichedBookController`
    are injected so that they are available for the test.


    In the actual test method, we start by setting up the `MockRestServiceServer`
    with the behavior we want. Here we only match the URL and set them up to return
    a certain JSON response with the HTTP 200 OK (see Table [3-19](#464036_2_En_3_Chapter.xhtml#Tab19)
    for more possibilities). After the test has run, we call `verify()` on the `MockRestServiceServer`
    to validate if the requests as we recorded them are also being issued, indicating
    that our client is working as expected.


    Table 3-19


    MockRestRequestMatchers Setup Methods


    | `anything()` | Matches any request. |

    | --- | --- |

    | `content()` | Setup matches for the content, like `Content-Type` or the actual
    body of the request. |

    | `header()` | Matches request with given header, with either a value or Hamcrest
    Matcher. |

    | `headerDoesNotExist` | Matches request where the given header doesn’t exist.
    |

    | `headerList()` | Matches request with given header, with values or Hamcrest
    Matcher. |

    | `jsonPath` | Setup matches for the request body with `JsonPath`. |

    | `method` | Matches the `HttpMethod` of the request. |

    | `queryParam` | Match the request parameter with either a value or Hamcrest Matcher.
    |

    | `queryParamList` | Match the request parameter with given values or Hamcrest
    Matcher. |

    | `requestTo` | Match the request using the expected URI (can be a `String` or
    `URI`). |

    | `requestToUriTemplate` | Match the request using a URI template. |

    | `xpath` | Setup matches for the request body with XPath. |'
