    ## 3-4\. 使用 Spring MVC 处理异常


    ### 问题


    您希望为 Spring MVC 配置异常处理，并根据自身需求进行定制。


    ### 解决方案


    Spring MVC 提供了多种处理异常的方式，而借助 Spring Boot，修改默认行为变得非常简单。


    对于与视图相关的实现，可以轻松添加页面，这些页面会被自动识别。添加一个 `error.html` 文件作为自定义错误页面，或者为特定的 HTTP 错误代码添加特定的错误页面，例如
    `404.html` 和 `500.html`。


    Spring Boot 也为基于 REST 的控制器提供了异常处理支持。它会返回一个包含错误信息的响应，类似于常规 MVC 异常处理中可用的错误信息。另一种选择是启用问题详情支持（RFC-7807），这是一个用于定义错误响应的小型标准。要启用它，请将
    `spring.mvc.problemdetails.enabled` 属性设置为 `true`。


    ### 工作原理


    Spring Boot 默认启用了错误处理，并会显示一个默认的错误页面。可以通过将 `server.error.whitelabel.enabled` 属性设置为
    `false` 来完全禁用它。禁用后，异常处理将由 Servlet 容器接管，而不是由 Spring 和 Spring Boot 提供的通用异常处理机制处理。

