    Sending a message with `RabbitTemplate` can be done by the `convertAndSend` method.
    It takes, at least, the routing key and the object to send in the message.


    ```java

    @Component

    class HelloWorldSender {

    private final RabbitTemplate rabbit;

    HelloWorldSender(RabbitTemplate rabbit) {

    this.rabbit = rabbit;

    }

    @Scheduled(fixedRate = 500)

    public void sayHello() {

    var msg =  "Hello World, from Spring Boot 3, over RabbitMQ!";

    rabbit.convertAndSend("hello", msg);

    }

    }

    ```


    `HelloWorldSender` will be injected with `RabbitTemplate` through the constructor.
    Each 500 ms, a message will be sent on the default exchange with the `hello` routing
    key. As it is sent to the default exchange, a queue with the name `hello` will
    be automatically created. You can check the number of messages on the queue in
    the RabbitMQ management console.


    Write a test to verify the correct behavior of the application. As there isn’t
    an embedded broker for RabbitMQ, you need to mock the `RabbitTemplate` with `@MockBean`.
    In the `@Test` method, validate the method call with the proper arguments. See
    Listing [8-24](#464036_2_En_8_Chapter.xhtml#PC30).


