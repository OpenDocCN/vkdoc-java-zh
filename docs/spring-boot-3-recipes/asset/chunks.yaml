    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.springframework.http.ResponseEntity;

    import org.springframework.web.bind.annotation.*;

    import org.springframework.web.util.UriComponentsBuilder;

    @RestController

    @RequestMapping("/books")

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping

    public Iterable all() {

    return bookService.findAll();

    }

    @GetMapping("/{isbn}")

    public ResponseEntity get(@PathVariable("isbn") String isbn) {

    return ResponseEntity.of(bookService.find(isbn));

    }

    @PostMapping

    public ResponseEntity create(@RequestBody Book book,

    UriComponentsBuilder uriBuilder) {

    var created = bookService.create(book);

    var newBookUri = uriBuilder.path("/books/{isbn}").build(created.isbn());

    return ResponseEntity.created(newBookUri).body(created);

    }

    }

    ```


    The controller will be mapped to the `/books` path due to the `@RequestMapping("/books")`
    annotation on the class. The `list` method will be invoked for GET requests on
    `/books`. When `/books/979-8-8688-0112-9` is called with a GET request, the `get`
    method will be invoked and return the result for a single book or, when no book
    can be found, a 404 response status. Finally, you can add books to the library
    using a POST request on `/books`. Then the `create` method will be invoked, and
    the body of the incoming request will be converted into a book.


    Spring Boot can also show you what mappings are available during startup. For
    this to happen, you will need to enable TRACE logging for the `web` group (a placeholder
    in Spring Boot to enable logging for a bunch of packages). By adding `logging.level.web=TRACE`
    to `application.properties`, it will list all the mappings onto the console. It
    will also enable a lot of logging on incoming requests and process those requests,
    so you probably don’t want to keep this on, but it can be a great tool to debug
    mapping issues. See Figure [3-3](#464036_2_En_3_Chapter.xhtml#Fig3) for sample
    output.


