- fmt: "### Stream JSON\n\nThe result of the call to `/books` isn’t streaming, but\
    \ rather it is blocking. It first collects all the results before sending them\
    \ out. See also the content-type header in Figure [4-1](#464036_2_En_4_Chapter.xhtml#Fig1),\
    \ which is set to `application/json`. To stream the result, it should be `application/x-ndjson`\
    \ (or another content type that supports streaming). This is something to take\
    \ into consideration when writing a client to consume this endpoint. For `HTTPie`\
    \ we can specify the `Accept` header to make it streaming. Add `'Accept:application/x-ndjson'`\
    \ to the `HTTPie` command from earlier, and the result will now be streaming.\
    \ The result will now gently stream in until there is nothing more to consume\
    \ (see Figure [4-2](#464036_2_En_4_Chapter.xhtml#Fig2)).\n\n![](images/464036_2_En_4_Chapter/464036_2_En_4_Fig2_HTML.jpg)\n\
    \nA screenshot of the marten window. H T T P response uses the application slash\
    \ x n d json format, streaming newline-delimited JSON data. Each object represents\
    \ a book with authors, i s b n and title fields. However, there are formatting\
    \ issues with missing commas and incomplete objects.\n\n**Figure 4-2** Result\
    \ of streaming all books\n\nThe result also slightly changes. Instead of returning\
    \ an array or orders (see Figure [4-1](#464036_2_En_4_Chapter.xhtml#Fig1)), it\
    \ now returns single orders (see Figure [4-2](#464036_2_En_4_Chapter.xhtml#Fig2)).\n\
    \n### Write an Integration Test\n\nAn integration test for the `BookController`\
    \ can be written quite easily using `WebTestClient` and a `MOCK` web environment\
    \ (you could also use `RANDOM_PORT` instead of `MOCK`).\n\n```java\npackage com.apress.springboot3recipes.library.rest;\n\
    import com.apress.springboot3recipes.library.Book;\nimport org.junit.jupiter.api.Test;\n\
    import org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.boot.test.autoconfigure.web.reactive.AutoConfigureWebTestClient;\n\
    import org.springframework.boot.test.context.SpringBootTest;\nimport org.springframework.test.annotation.DirtiesContext;\n\
    import org.springframework.test.web.reactive.server.WebTestClient;\nimport java.util.List;\n\
    @SpringBootTest(webEnvironment = SpringBootTest.WebEnvironment.MOCK)\n@AutoConfigureWebTestClient\n\
    @DirtiesContext(methodMode = DirtiesContext.MethodMode.AFTER_METHOD)\nclass BookControllerIntegrationTest\
    \ {\n@Autowired\nprivate WebTestClient webTestClient;\n@Test\nvoid listBooks()\
    \ {\nwebTestClient.get().uri(\"/books\")\n.exchange()\n.expectStatus().isOk()\n\
    .expectBodyList(Book.class).hasSize(24);\n}\n@Test\nvoid addAndGetBook() {\nvar\
    \ book = new Book(\"B0CBC71PHR\", \"Testing Spring Boot Applications Demystified\"\
    , List.of(\"Philip Riecks\"));\nwebTestClient.post().uri(\"/books\").bodyValue(book)\n\
    .exchange()\n.expectStatus().isCreated()\n.expectBody(Book.class).isEqualTo(book);\n\
    webTestClient.get().uri(\"/books/{isbn}\", book.isbn())\n.exchange()\n.expectStatus().isOk()\n\
    .expectBody(Book.class).isEqualTo(book);\n}\n}\n```\n\nThe `@DirtiesContext` annotation\
    \ is needed here because `BookService` is a stateful bean. So after adding a `Book`\
    \ to the library, it needs to be reset for the next test. The test will start\
    \ the full application because of the `@SpringBootTest` annotation with a mocked\
    \ environment. The `@AutoConfigureWebTestClient` annotation is needed for a mocked\
    \ environment to get a `WebTestClient`. The `WebTestClient` makes it easy to build\
    \ a request and send that to the server. After sending the response, it can do\
    \ expectations on the result.\n\n![](images/464036_2_En_4_Chapter/464036_2_En_4_Figb_HTML.gif)An\
    \ information icon with the letter i inside a circle. `webEnvironment = SpringBootTest.WebEnvironment.MOCK`\
    \ is also the default, so adding it explicitly isn’t strictly needed.\n\n## 4-3.\
    \ Use Thymeleaf as a Template Engine\n\n### Problem\n\nYou want to render a view\
    \ using Thymeleaf in a WebFlux-based application.\n\n### Solution\n\nAdd the dependency\
    \ for Thymeleaf and create a handler to determine the view and fill the model.\n\
    \n### How It Works\n\nAdd a dependency on `spring-boot-starter-webflux` and `spring-boot-starter-thymeleaf`.\
    \ This is enough for Spring Boot to automatically configure Thymeleaf for use\
    \ in a WebFlux application. See Listing [4-8](#464036_2_En_4_Chapter.xhtml#PC16).\n\
    \n```xml\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-webflux</artifactId>\n\
    </dependency>\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-thymeleaf</artifactId>\n</dependency>\n```\n\
    \n**Listing 4-8** WebFlux and Thymeleaf Dependencies\n\nWith the addition of this\
    \ dependency you will get the Thymeleaf library as well as the Thymeleaf Spring\
    \ Dialect so that they integrate nicely. Because of the existence of these two\
    \ libraries, Spring Boot will automatically configure the `ThymeleafReactiveViewResolver`.\
    \ The `ThymeleafReactiveViewResolver` requires a Thymeleaf `ISpringWebFluxTemplateEngine`\
    \ to be able to resolve and render the views. A special `SpringWebFluxTemplateEngine`\
    \ will be preconfigured with `SpringDialect` so that you can use SpEL inside Thymeleaf\
    \ pages.\n\nConfiguring Thymeleaf Spring Boot exposes several properties in the\
    \ `spring.thymeleaf` and `spring.thymeleaf.reactive` namespaces (see Table [4-1](#464036_2_En_4_Chapter.xhtml#Tab1)).\n\
    \n**Table 4-1** Thymeleaf Properties\n\n| Property | Description |\n| --- | ---\
    \ |\n| `spring.thymeleaf.prefix` | Sets the `prefix` to use for the `ViewResolver`;\
    \ the default is `classpath:/templates`. |\n| `spring.thymeleaf.suffix` | Sets\
    \ the `suffix` to use for the `ViewResolver`; the default is `.html`. |\n| `spring.thymeleaf.encoding`\
    \ | Sets the encoding of the templates; the default is `UTF-8`. |\n| `spring.thymeleaf.check-template`\
    \ | Checks if the template exists before rendering; the default is `true`. |\n\
    | `spring.thymeleaf.check-template-location` | Checks if the template location\
    \ exists. |\n| `spring.thymeleaf.mode` | Sets the Thymeleaf `TemplateMode` to\
    \ use; the default is `HTML`. |\n| `spring.thymeleaf.cache` | Sets whether resolved\
    \ templates should be cached; the default is `true`. |\n| `spring.thymeleaf.template-resolver-order`\
    \ | Sets the order of the `ViewResolver`; the default is 1. |\n| `spring.thymeleaf.view-names`\
    \ | Sets the view names (separated by commas) that can be resolved with this `ViewResolver`.\
    \ |\n| `spring.thymeleaf.exclude-view-names` | Sets the view names (separated\
    \ by commas) that are excluded from being resolved. |\n| `spring.thymeleaf.enabled`\
    \ | Sets whether Thymeleaf should be enabled; the default is `true`. |\n| `spring.thymeleaf.enable-spring-el-compiler`\
    \ | Enables the compilation of SpEL expressions; the default is `false`. |\n|\
    \ `spring.thymeleaf.reactive.max-chunk-size` | Sets the maximum size of the data\
    \ buffer used to write the response in bytes. |\n| `spring.thymeleaf.reactive.media-types`\
    \ | Sets the media types supported by this view technology. |\n| `spring.thymeleaf.reactive.full-mode-view-names`\
