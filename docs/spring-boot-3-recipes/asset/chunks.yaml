- fmt: '# 9. Spring Boot Actuator


    When developing an application, you want to be able to monitor the behavior of
    the application once it’s launched. Spring Boot makes it easy to enable this by
    introducing Spring Boot Actuator. Spring Boot Actuator exposes the health status
    and metrics from the application to interested parties. This can be over JMX or
    HTTP, or data can be exported to an external system.


    The health endpoints tell something about the health of your application and/or
    the system it is running on. They will detect if the database is up, report the
    disk space available, etc. The metrics endpoints expose usage and performance
    statistics such as the number of requests, the longest request, the fastest request,
    the utilization of your connection pool, etc.


    All these metrics can be viewed through either JMX or HTTP when enabled and can
    also be automatically exported to an external system such as Graphite, InfluxDB,
    and many others.


    ## 9-1. Enable and Configure Spring Boot Actuator


    ### Problem


    You want to enable health and metrics in your application so that you can monitor
    the status of the application.


    ### Solution


    Add a dependency for `spring-boot-starter-actuator` to your project to enable
    and expose the health status and metrics for your application. Additional configuration
    can be done through properties in the `management` namespace.


    ### How It Works


    When adding `spring-boot-starter-actuator`, Spring Boot will automatically set
    up the health checks and metrics based on the beans in the application context.
    Which health checks and metrics are exposed depends on the beans and features
    that are enabled. When a data source is detected, metrics for that data source
    will be collected and exposed, and Spring Boot will monitor the health of the
    data source. Spring Boot does this for many components such as Hibernate, RabbitMQ,
    Kafka, caches, etc.


    To enable Spring Boot Actuator, add the dependency to your application (here we
    assume Recipe 3-3 sources), as shown in Listing 9-1.


    ```

    org.springframework.boot

    spring-boot-starter-actuator


    Listing 9-1

    Spring Boot Starter Actuator Dependency

    ```


    Now when starting the application, Spring Boot will have the Spring Boot Actuator
    configured. It is accessible through the Web (by default under the `/actuator`
    path), as shown in Figure 9-1. It is also possible to expose Spring Boot Actuator
    over JMX (Figure 9-2); this needs to be explicitly enabled by setting the `spring.jmx.enabled`
    property to `true`.


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig2_HTML.jpg)


    A window titled Java monitoring and management console. The M Beans tab is selected.
    From the left pane, the endpoint folder is selected and expanded. The subfolders
    are listed below.


    Figure 9-2


    HTTP exposed metrics


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig1_HTML.jpg)


    A JSON snippet contains links to different endpoints provided by an Actuator service
    running on local host. It includes links for self, health, and a health path with
    templated U R Ls for monitoring system health.


    Figure 9-1


    Access Spring Boot Actuator through the Web


    You will notice that JMX exposes more endpoints than HTTP does. HTTP, by default,
    exposes only `/actuator/health` and `/actuator/info`. This is done with security
    in mind. The `/actuator` is exposed publicly, and as such you don’t want everyone
    to see this information. You can configure what to expose through the `management.endpoints.web.exposure.include`
    and `management.endpoints.web.exposure.exclude` properties. Using a `*` for the
    include will expose all endpoints to the Web. See Listing 9-2.


    ```

    management.endpoints.web.exposure.include=*

    Listing 9-2

    Expose Properties Through the Web

    ```


    With this configuration added to `application.properties`, the same features will
    be exposed to the Web as through JMX (see Figure 9-3).


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Fig3_HTML.jpg)


    A JSON snippet provides links to various endpoints under underscore links object
    for an actuator service. It includes links for self reference, health check, beans,
    caches, info, conditions, config props and environment details. Each link includes
    its respective U R L and templated status for dynamic path generation.


    Figure 9-3


    HTTP exposing all metrics


    #### Configure the Management Server


    By default Spring Boot Actuator is available on the same port and address (`http://localhost:8080`)
    as the regular application. It is, however, common to run the management endpoints
    on a different port. You can configure this through properties in the `management.server`
    namespace. Most of the properties mimic the ones in the regular `server` namespace
    (see Table 9-1).


    Table 9-1


    Management Server Properties


    | Property | Description |

    | --- | --- |

    | `management.server.add-application-context-header` | Adds an `X-Application-Context`
    header to the response, containing the application context name |

    | `management.server.port` | Sets the port to run the management server on; the
    default is the same as `server.port` |

    | `management.server.address` | Sets the network address to bind to; the default
    is the same as `server.address` (which is `0.0.0.0` or all addresses) |

    | `management.server.base-path` | Sets the management endpoint base path; the
    default is `/`, which requires a port to be set |

    | `management.server.ssl.*` | Sets the SSL properties to configure SSL for the
    management server |


    Add Listing 9-3 to the `application.properties` file, which will run the management
    endpoints on a separate port and add the `X-Application-Context` header.


    ```

    management.server.add-application-context-header=true

    management.server.port=8090

    Listing 9-3

    Management Server Properties

    ```


    When restarting the application, the management endpoints are now available on
    `http://localhost:8090/actuator`. Running Spring Boot Actuator on a different
    port has the benefit of hiding it from the public Internet by blocking the port
    on the firewall and allowing only local access.


    ![](images/464036_2_En_9_Chapter/464036_2_En_9_Figa_HTML.gif)An information icon. The
    `management.server` properties are effective only when using an embedded server.
    When deploying to an external server, these properties don’t apply anymore!'
