- fmt: '#### Test JPA Code with an Embedded Database


    Let’s write a test for `CustomerRepository` and use H2 as the embedded database.
    First add H2 as a test dependency (Listing [6-40](#464036_2_En_6_Chapter.xhtml#PC41)).


    ```

    com.h2database

    h2

    test

    ```


    *Listing 6-40* H2 Dependency for Testing


    Next create the `CustomerRepositoryTest` class (Listing [6-41](#464036_2_En_6_Chapter.xhtml#PC42)).


    ```

    @DataJpaTest

    @TestPropertySource(properties = "spring.flyway.enabled=false")

    class CustomerRepositoryTest {

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private TestEntityManager testEntityManager;

    }

    ```


    *Listing 6-41* `CustomerRepositoryTest` Class


    The `@DataJpaTest` annotation executes the test with a special JUnit extension
    (the `SpringExtension`) to bootstrap the Spring Test Context framework. Finally,
    there is `@TestPropertySource(properties = "spring.flyway.enabled=false")`, which
    indicates that we want to disable Flyway. The application uses Flyway to manage
    the schema; however, those scripts are written for PostgreSQL and not H2. For
    testing we want to disable Flyway and provide an H2-based `schema.sql` to create
    the schema.


    > A circular abstract reads the lowercase letter i inside it. This is one of the
    drawbacks of using a different database for testing (H2) than actually in the
    live system (PostgreSQL). You either need to maintain two sets of scripts for
    the schema or use the same database for testing as in the live system.


    Spring Boot offers a `TestEntityManager`, which has some convenience methods to
    easily store and find data for testing. Now write a test that tests if records
    get inserted correctly (Listing [6-42](#464036_2_En_6_Chapter.xhtml#PC43)).


    ```

    @Test

    void insertNewCustomer() {

    Assertions.assertThat(repository.findAll()).isEmpty();

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.getId()).isGreaterThan(-1L);

    assertThat(customer.getName()).isEqualTo("T. Testing");

    assertThat(customer.getEmail()).isEqualTo("t.testing@test123.tst");

    Assertions.assertThat(repository.findById(customer.getId())).hasValue(customer);

    }

    ```


    *Listing 6-42* `CustomerRepository` Insert New Customer Test


    This test first asserts that the database is empty. This is not really required
    but can be useful to detect if other tests pollute the database. Next a `Customer`
    instance is added to the database by calling the `save` method on `CustomerRepository`.
    The resulting `Customer` instance is validated to make sure it has an ID and the
    `name` and `email` attributes. Finally, the `Customer` is retrieved again and
    compared to be the same.


    Another test you could add is the `findAll` method. When inserting two records,
    calling `findAll` should result in two records being retrieved (Listing [6-43](#464036_2_En_6_Chapter.xhtml#PC44)).


    ```

    @Test

    void findAllCustomers() {

    Assertions.assertThat(repository.findAll()).isEmpty();

    testEntityManager.persist(new Customer("T. Testing1", "t.testing@test123.tst"));

    testEntityManager.persist(new Customer("T. Testing2", "t.testing@test123.tst"));

    testEntityManager.flush();

    Assertions.assertThat(repository.findAll()).hasSize(2);

    }

    ```


    *Listing 6-43* `CustomerRepository` Find All Test


    There could be more assertions, but saving the data is already verified in the
    other test method.


    #### Test JPA Code with Testcontainers


    A better option nowadays is to use Testcontainers. Testcontainers uses Docker
    to bootstrap a Docker container for your given technology. In this case, we could
    use a PostgreSQL Docker image to boot a real database and use that in our tests.
    With this you are now using your actual database for testing and don’t need to
    do with an in-memory version, meaning you can execute all the queries you want
    and test them. It also gives you the opportunity to test your database migration
    scripts (when in use).


    To use Testcontainers, in this case for PostgreSQL, we need to add the appropriate
    dependencies (see Listing [6-44](#464036_2_En_6_Chapter.xhtml#PC45)).


    ```

    org.springframework.boot

    spring-boot-testcontainers


    org.testcontainers

    postgresql

    test


    org.testcontainers

    junit-jupiter

    test

    ```


    *Listing 6-44* Testcontainers Dependency for PostgreSQL and JUnit Jupiter


    Now write a test that tests if records get inserted correctly into our actual
    PostgreSQL database (see Listing [6-45](#464036_2_En_6_Chapter.xhtml#PC46)).


    ```

    @DataJpaTest

    @AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)

    @Testcontainers

    class CustomerRepositoryTest {

    @Container

    @ServiceConnection

    static PostgreSQLContainer postgres =

    new PostgreSQLContainer("postgres:15-alpine");

    @Autowired

    private CustomerRepository repository;

    @Autowired

    private TestEntityManager testEntityManager;

    }

    ```


    *Listing 6-45* `CustomerRepositoryTest` Test Setup for Testcontainers


    The `@DataJpaTest` annotation executes the test with a special JUnit extension
    (the `SpringExtension`) to bootstrap the Spring Test Context framework. `@DataJpaTest`
    will replace the preconfigured `DataSource` with an embedded one by default. `@AutoConfigureTestDatabase(replace
    = AutoConfigureTestDatabase.Replace.NONE)` prevents this replacing as we want
    to provide an actual `DataSource`.


    Now to register the special JUnit extension for Testcontainers, the `@Testcontainers`
    annotation has been added. This extension finds fields annotated with `@Container`
    and will bootstrap the given container. For this test, that is a `PostgreSQLContainer`,
    which we instruct to use a PostgreSQL 15 Docker container. Testcontainers will
    take care of the download of this container and then start an instance and stop
    it after the test.


    When the test runs, the provided Flyway script will automatically execute and
    create the schema and populate it with some data (as that was in our Flyway script;
    see Listing [6-8](#464036_2_En_6_Chapter.xhtml#PC8)).


    As the container for each test will start with a different URL, we need to tell
    this to our Spring Boot application. For this we can use the `@ServiceConnection`
    annotation. This will pass the required and needed properties to the container
    automatically. See also Recipe 2-3 for more information on this.


    With this we can now write some tests to validate our behavior (Listing [6-46](#464036_2_En_6_Chapter.xhtml#PC47)).


    ```

    @Test

    void insertNewCustomer() {

    var newCustomer = new Customer("T. Testing", "t.testing@test123.tst");

    var customer = repository.save(newCustomer);

    assertThat(customer.getId()).isGreaterThan(-1L);

    assertThat(customer.getName()).isEqualTo("T. Testing");

    assertThat(customer.getEmail()).isEqualTo("t.testing@test123.tst");

    testEntityManager.flush();

    testEntityManager.clear();

    Assertions.assertThat(repository.findById(customer.getId())).hasValue(customer);

    }

    @Test

    void findAllCustomers() {

    var count = repository.count();

    testEntityManager.persist(new Customer("T. Testing1", "t.testing@test123.tst"));

    testEntityManager.persist(new Customer("T. Testing2", "t.testing@test123.tst"));

    testEntityManager.flush();

    Assertions.assertThat(repository.findAll()).hasSize( (int) count + 2);

    }

    ```


    *Listing 6-46* `CustomerRepositoryTest` tests with Testcontainers


    The tests are more or less similar to the ones used from the embedded database;
    however, here we have some additional data already in our database, and we have
    to account for that in our tests. This depends on what your database migration
    script looks like. If it generates an empty schema, you don’t need to change the
    tests.


    ## 6-8. Access Spring Data with MongoDB


    ### Problem


    You want to use MongoDB in your Spring Boot application.


    ### Solution


    Add the Mongo Driver as a dependency and use the `spring.data.mongodb` properties
    to let Spring Boot set up a `MongoTemplate` to the correct MongoDB.'
