    ### Create Spring WebFlux Controllers


    An annotation-based controller class can be an arbitrary class that doesn’t implement
    a particular interface or extend a particular base class. You can annotate it
    with the `@Controller` or `@RestController` annotation. There can be one or more
    handler methods defined in a controller to handle single or multiple actions.
    The signature of the handler methods is flexible enough to accept a range of arguments.
    (See also Recipe 4-2 for more information on request mapping.)


    ```

    package com.apress.springboot3recipes.helloworld;

    import org.springframework.boot.SpringBootVersion;

    import org.springframework.web.bind.annotation.GetMapping;

    import org.springframework.web.bind.annotation.RestController;

    import reactor.core.publisher.Mono;

    @RestController

    public class HelloWorldController {

    @GetMapping

    public Mono hello() {

    var version= SpringBootVersion.getVersion();

    var msg = String.format("Hello World, from Reactive Spring Boot %s!", version);

    return Mono.just(msg);

    }

    }

    ```


    The annotation `@GetMapping` is used to decorate the `hello` method as the controller’s
    HTTP GET handler method. It’s worth mentioning that if no default HTTP GET handler
    method is declared, a `ServletException` is thrown. Hence, it’s important for
    a controller to have at a minimum a URL route and at least one handler method.
    The method is bound to `/hello` because of the expression in `@GetMapping`.


    When a request is made to `http://localhost:8080/hello`, it will reactively return
    `Hello World, from Reactive Spring Boot 3!`. However, the client won’t notice
    this. For the client, it still is a regular HTTP request.


    ### Do Unit Testing for Reactive Controllers


    You have two ways of doing an integration test for a controller. The first approach
    is to simply write a test that creates an instance of `HelloWorldController`,
    calls the method, and does expectations on the result. The second is to use the
    `@WebFluxTest` annotation to create the test. The latter will start a minimal
    application context containing the web infrastructure, and you can use `MockMvc`
    to test the controller. This last approach sits between a plain unit test and
    a full-blown integration test. See Listing [4-4](#464036_2_En_4_Chapter.xhtml#PC6).


    ```

    package com.apress.springboot3recipes.helloworld;

    import org.junit.jupiter.api.Test;

    import reactor.test.StepVerifier;

    class HelloWorldControllerUnitTest {

    private final HelloWorldController controller = new HelloWorldController();

    @Test

    void shouldSayHello() {

    var result = controller.hello();

    StepVerifier.create(result)

    .expectNext("Hello World, from Reactive Spring Boot 3.2.1!")

    .verifyComplete();

    }

    }

    Listing 4-4

    HelloWorldController Unit Test

    ```


    This is a basic unit test. It instantiates the controller and simply calls the
    method to be tested. It uses `StepVerifier` from the `reactive-test` module to
    make it easier to test. The `hello` method is called, and the result is then verified
    using `StepVerifier`.


    Adding the `reactive-test` dependency is done by adding the following dependency:


    ```

    io.projectreactor

    reactor-test

    test

    ```


    The second option is to use `@WebFluxTest` for a specific controller.


    ```

    package com.apress.springboot3recipes.helloworld;

    import org.hamcrest.Matchers;

    import org.junit.jupiter.api.Test;

    import org.springframework.beans.factory.annotation.Autowired;

    import org.springframework.boot.test.autoconfigure.web.reactive.WebFluxTest;

    import org.springframework.http.MediaType;

    import org.springframework.test.web.reactive.server.WebTestClient;

    @WebFluxTest(HelloWorldController.class)

    class HelloWorldControllerSliceTest {

    @Autowired

    private WebTestClient webClient;

    @Test

    void shouldSayHello() {

    webClient

    .get().uri("/").accept(MediaType.TEXT_PLAIN).exchange()

    .expectStatus().isOk()

    .expectBody(String.class)

    .value(Matchers.startsWith("Hello World, from Reactive Spring Boot"));

    }

    }

    ```


    This test will start a minimal Spring Boot context and auto-detect all WebFlux-related
    beans in your project, like `@ControllerAdvice`. Instead of now directly calling
    the `HelloWorldController`, you can use the special `WebTestClient` to declare
    a request `.get().uri("/")` and send that nonblocking using `exchange()`. Finally,
    the assertions/expectations are verified. The request is expected to have an OK
    status and to contain the specified body.'
  raw: 'To pass information from a controller to a view, it’s irrelevant that a handler’s
    method returns a logical view name—`String` or a `void`—since the handler method
    input arguments will be available to a view.


    For example, if a handler method takes `Map` and `Model` objects as input parameters—modifying
    their contents inside the handler method’s logic—these same objects will be accessible
    to the view returned by the handler method.


    When the controller class receives a view, it resolves the logical view name into
    a specific view implementation (e.g., `user.html` or `report.fmt`) by means of
    a view resolver. A view resolver is a bean configured in the web application context
    that implements the `ViewResolver` interface. Its responsibility is to return
    a specific view implementation for a logical view name.


    Once the controller class has resolved a view name into a view implementation,
    per the view implementation’s design, it renders the objects (e.g., `ServerHttpRequest`,
    `Map`, `Errors`, or `WebSession`) passed by the controller’s handler method. The
    view’s responsibility is to display the objects added in the handler method’s
    logic to the user.


