    ## 7-5\. Use Java Flight Recorder to Investigate Application Startup


    ### Problem


    You want to investigate the startup of your Spring Boot application and determine
    what can be improved using the Java Flight Recorder (JFR). The JFR is a tool for
    recording diagnostic and profiling information about a running application on
    a JVM. It does this with almost no performance overhead, which makes it useful
    in almost every environment. The JFR will collect data about the JVM it runs on
    as well as the application it runs.


    ### Solution


    The core Spring container provides an API to monitor the setup and start of the
    application context. This API, the `ApplicationStartup` interface, has one implementation,
    `FlightRecorderApplicationStartup`, which can be used to publish JFR events. However,
    by default the `ApplicationStartup` is no-op and doesn’t do anything, so you will
    need to activate it.


    After enabling the `FlightRecorderApplicationStartup`, you also need to instruct
    the JDK to record the JFR events. Finally, to investigate the events, you need
    a tool such as Java Mission Control.


    ### How It Works


    First we need to set the proper `ApplicationStartup` implementation we want to
    use. Next we start with the proper command-line properties, and finally we can
    inspect the events.'
