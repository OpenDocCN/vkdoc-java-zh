    它将创建一个金额随机且最大为 1000.00 的 `Order`。然后使用 `send` 方法将其发送到 `orders` 主题。使用 `JsonDeserializer`，它会从对象创建
    JSON，并最终将其转换为 `byte[]` 发送到 Kafka。


    ## 8-9. 使用 Kafka 接收消息


    ### 问题


    您希望从 Kafka 主题接收消息。


    ### 解决方案


    使用 `@KafkaListener` 注解方法会将其绑定到主题，并使其能够接收消息。

