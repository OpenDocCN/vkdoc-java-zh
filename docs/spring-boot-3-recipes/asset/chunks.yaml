    ### 工作原理


    假设你正在一家公共图书馆工作，需要开发一个 REST API 来实现图书的检索和搜索功能。


    首先，你需要在构建配置中添加 Jackson 库的依赖。Spring Boot 提供了 `spring-boot-starter-json` 来添加所有必需的依赖项。参见代码清单
    3-5。


    ```

    org.springframework.boot

    spring-boot-starter-json


    代码清单 3-5

    Spring Boot JSON 启动器依赖

    ```


    ![](img/464036_2_En_3_Figa_HTML.gif)一个信息图标，圆圈内包含字母 i。 `spring-boot-starter-web`
    依赖项已经包含了 `spring-boot-starter-json` 的依赖，并会自动将其引入。但显式声明它以表明你正在使用/启用 JSON 功能，可能会更方便。


    你也可以使用 Google 的 GSON 库；只需使用相应的 GSON 依赖项，并从 `spring-boot-starter-web` 依赖中排除 `spring-boot-starter-json`
    即可。


    由于你正在为图书馆开发应用程序，它很可能包含图书，因此我们创建一个 `Book` 记录。参见代码清单 3-6。


    ```

    package com.apress.springboot3recipes.library;

    import java.util.List;

    import java.util.Objects;

    public record Book(

    String isbn,

    String title,

    List<String> authors) {

    @Override

    public boolean equals(Object o) {

    if (this == o) return true;

    if (o == null || getClass() != o.getClass()) return false;

    Book book = (Book) o;

    return Objects.equals(isbn, book.isbn);

    }

    @Override

    public int hashCode() {

    return Objects.hash(isbn);

    }

    }

    代码清单 3-6

    Book 记录

    ```


    一本书由其 ISBN 号定义；它有一个标题和一位或多位作者。通常，记录会创建 `equals`、`hashCode` 和 `toString` 方法，这些方法会包含记录中的所有数据（因为它是不可变的）。然而，在这里我们希望
    `equals` 和 `hashCode` 仅基于 `isbn` 字段，因此我们自己提供了实现。


    你还需要一个服务来处理图书馆中的图书。让我们为 `BookService` 定义一个接口和实现。参见代码清单 3-7。


    ```

    package com.apress.springboot3recipes.library;

    import java.util.Optional;

    public interface BookService {

    Iterable<Book> findAll();

    Book create(Book book);

    Optional<Book> find(String isbn);

    }

    代码清单 3-7

    BookService 接口

    ```


    目前，该实现是一个简单的内存实现。参见代码清单 3-8。


    ```

    package com.apress.springboot3recipes.library;

    import org.springframework.stereotype.Service;

    import java.util.Map;

    import java.util.Optional;

    import java.util.concurrent.ConcurrentHashMap;

    @Service

    class InMemoryBookService implements BookService {

    private final Map<String, Book> books = new ConcurrentHashMap<>();

    @Override

    public Iterable<Book> findAll() {

    return books.values();

    }

    @Override

    public Book create(Book book) {

    books.put(book.isbn(), book);

    return book;

    }

    @Override

    public Optional<Book> find(String isbn) {

    return Optional.ofNullable(books.get(isbn));

    }

    }

    代码清单 3-8

    BookService 内存实现

    ```


    该服务已使用 `@Service` 注解，以便 Spring Boot 能够检测到它并创建其实例。参见代码清单 3-9。


    ```

    package com.apress.springboot3recipes.library;

    import java.util.List;

    import org.springframework.boot.ApplicationRunner;

    import org.springframework.boot.SpringApplication;

    import org.springframework.boot.autoconfigure.SpringBootApplication;

    import org.springframework.context.annotation.Bean;

    @SpringBootApplication

    public class LibraryApplication {

    public static void main(String[] args) {

    SpringApplication.run(LibraryApplication.class, args);

    }

    @Bean

    public ApplicationRunner booksInitializer(BookService bookService) {

    return args -> {

    bookService.create(

    new Book("9780061120084", "杀死一只知更鸟",

    List.of("哈珀·李")));

    bookService.create(

    new Book("9780451524935", "1984",

    List.of("乔治·奥威尔")));

    bookService.create(

    new Book("9780618260300", "霍比特人",

    List.of("J.R.R. 托尔金")));

    };

    }

    }

    代码清单 3-9

    包含初始化数据的应用程序类

    ```


    `LibraryApplication` 将检测所有类并启动服务器。启动时，它会预先注册三本书，以便我们的图书馆中有一些数据。


    为了将 `Book` 暴露为 REST 资源，创建一个名为 `BookController` 的类，并使用 `@RestController` 注解。Spring
    Boot 将检测到这个类并创建其实例。使用 `@RequestMapping`（以及 `@GetMapping` 和 `@PostMapping`），你可以编写方法来处理传入的请求。


    ![](img/464036_2_En_3_Figb_HTML.gif)一个信息图标，圆圈内包含字母 i。 你可以使用 `@Controller` 并在每个请求处理方法上添加
    `@ResponseBody`，来代替 `@RestController`。使用 `@RestController` 会隐式地将 `@ResponseBody`
    添加到请求处理方法上。


    ```

    package com.apress.springboot3recipes.library.rest;

    import com.apress.springboot3recipes.library.Book;

    import com.apress.springboot3recipes.library.BookService;

    import org.springframework.http.ResponseEntity;

    import org.springframework.web.bind.annotation.*;

    import org.springframework.web.util.UriComponentsBuilder;

    @RestController

    @RequestMapping("/books")

    public class BookController {

    private final BookService bookService;

    public BookController(BookService bookService) {

    this.bookService = bookService;

    }

    @GetMapping

    public Iterable<Book> all() {

    return bookService.findAll();

    }

    @GetMapping("/{isbn}")

    public ResponseEntity<Book> get(@PathVariable("isbn") String isbn) {

    return ResponseEntity.of(bookService.find(isbn));

    }

    @PostMapping

    public ResponseEntity<Book> create(@RequestBody Book book,

    UriComponentsBuilder uriBuilder) {

    var created = bookService.create(book);

    var newBookUri = uriBuilder.path("/books/{isbn}").build(created.isbn());

    return ResponseEntity.created(newBookUri).body(created);

    }

    }

    ```


    由于类上使用了 `@RequestMapping("/books")` 注解，控制器将被映射到 `/books` 路径。`list` 方法将在对 `/books`
    的 GET 请求时被调用。当使用 GET 请求调用 `/books/979-8-8688-0112-9` 时，`get` 方法将被调用，并返回单本书的结果，如果找不到书，则返回
    404 响应状态。最后，你可以使用 POST 请求向 `/books` 添加图书。此时 `create` 方法将被调用，传入请求的正文将被转换为图书对象。


    Spring Boot 还可以在启动时显示可用的映射。为此，你需要为 `web` 组启用 TRACE 日志记录（这是 Spring Boot 中用于为一组包启用日志记录的占位符）。通过在
    `application.properties` 中添加 `logging.level.web=TRACE`，它将在控制台列出所有映射。它还会对传入的请求及其处理过程启用大量日志记录，因此你可能不希望一直保持此设置，但它可以成为调试映射问题的绝佳工具。示例输出见图
    3-3。


