    引言


    欢迎阅读《Spring Boot 3 实战》！


    ## 本书适合的读者


    本书适合希望更轻松地使用 Spring 应用程序的开发者。如果你的项目使用了 Spring，引入 Spring Boot 将简化应用程序的配置、部署和管理。


    本书假设你熟悉 Java 和 Spring，并且拥有某种集成开发环境（IDE）。本书不会解释 Spring 或相关项目的所有内部机制和深入工作原理；如需了解这些内容，建议阅读《Spring
    6 实战》。


    ## 本书的结构


    本书共包含 10 章。


    第 1 章“Spring Boot 简介”快速概述了 Spring Boot 及其入门方法。


    第 2 章“Spring Boot 基础”介绍了如何使用 Spring Boot 定义和配置 Bean 以及进行依赖注入的基础知识。


    第 3 章“Spring MVC”介绍了使用 Spring MVC 进行基于 Web 的应用程序开发。


    第 4 章“Spring Webflux”介绍了使用 Spring Webflux 进行响应式 Web 应用程序开发。


    第 5 章“Spring Security”概述了如何使用 Spring Security 保护 Spring Boot 应用程序。


    第 6 章“数据访问”解释了如何访问数据库或 NoSQL 存储等数据存储。


    第 7 章“Java 企业服务”介绍了如何使用 Spring Boot 中的 JMX、邮件和 JFR 等企业服务。


    第 8 章“消息传递”介绍了如何使用多种不同的消息传递技术进行消息传递。


    第 9 章“Spring Boot Actuator”解释了如何使用 Spring Boot Actuator 中的健康检查和指标等生产就绪功能。


    第 10 章“打包”展示了如何通过使 Spring Boot 应用程序可执行来打包和部署它们，以及如何使用 Docker 和 GraalVM。


    ## 约定


    本书使用以下代码约定：


    *   有时，当我们希望您特别注意代码示例的某一部分时，我们会将代码加粗。请注意，加粗并不一定反映与先前版本的代码更改。


    *   当一行代码过长无法在页面宽度内显示时，我们会使用代码续行符进行换行。请注意，在尝试输入代码时，您需要将行连接起来，中间不留空格。


    ## 前提条件


    由于 Java 编程语言是平台无关的，您可以自由选择任何支持的操作系统。但是，本书中的一些示例使用了特定于平台的路径。在输入示例之前，请根据操作系统的格式进行相应转换。


    为了充分利用本书，请安装 JDK 21 版本。您应该安装一个 Java IDE 以简化开发。在本书中，大部分示例代码基于 Maven，大多数 IDE 都内置了对
    Maven 管理类路径的支持。


    示例有时需要安装额外的库，例如 PostgreSQL、ActiveMQ 等。为此，本书使用了 Docker。当然，您也可以在自己的机器上安装这些库，而不是使用
    Docker，但为了使用方便（并且不污染您的系统），推荐使用 Docker。


    ## 联系作者


    我们始终欢迎您就本书内容提出问题和反馈。您可以通过电子邮件 marten@deinum.biz 或通过 X 平台 @mdeinum 联系 Marten Deinum。


    关于作者


    # 1. Spring Boot 简介


    在本章中，您将了解 Spring Boot 的基础知识。Spring Boot 的核心是 Spring 框架，Spring Boot 扩展了该框架，以实现自动配置等功能。


    > Spring Boot 让创建可以“直接运行”的独立、生产级的基于 Spring 的应用程序变得简单。我们对 Spring 平台和第三方库持有自己的观点，以便您可以以最少的麻烦开始。大多数
    Spring Boot 应用程序只需要很少的 Spring 配置。

    >

    > ——Spring Boot 参考指南


    Spring Boot 为 JMS、JDBC、JPA、RabbitMQ 等基础设施提供了自动配置，并且为 Spring Integration、Spring
    Batch、Spring Security 等不同框架提供了自动配置。当检测到这些框架或功能时，Spring Boot 会使用有观点但合理的默认值自动配置它们。


    源代码使用 Maven 进行构建。Maven 将负责获取必要的依赖项、编译代码以及创建构件（通常是 JAR 文件）。此外，如果某个方案说明了多种方法，源代码会使用罗马数字（例如，`recipe_2_1_i`、`recipe_2_1_ii`、`recipe_2_1_iii`等）对各种示例进行分类。


    ![](img/464036_2_En_1_Figa_HTML.jpg)灯泡插图。 要构建每个应用程序，请进入方案目录（例如，`ch2/recipe_2_1_i/`）并执行`mvnw`命令来编译源代码。源代码编译完成后，会创建一个包含应用程序可执行文件的`target`子目录。然后，您可以从命令行运行应用程序
    JAR（例如，`java -jar target/Recipe_2_1_i.jar`）。


    ## 1-1. 使用 Maven 创建 Spring Boot 应用程序


    ### 问题


    您希望开始使用 Spring Boot 和 Maven 开发应用程序。


    ### 解决方案


    创建一个 Maven 构建文件`pom.xml`，并添加所需的依赖项。要启动应用程序，请创建一个包含`main`方法的 Java 类来引导应用程序。


    ### 工作原理


    假设您要创建一个简单的应用程序，该应用程序引导`SpringApplication`，从`ApplicationContext`获取所有 Bean，并将它们输出到控制台。

