    is needed, as is the respective tracer bridge for Micrometer (either `io.micrometer:micrometer-tracing-bridge-otel`
    or `io.micrometer:micrometer-tracing-bridge-brave`). The final component is the
    exporter for either Brave or OpenTelemetry. In Listing [9-11](#464036_2_En_9_Chapter.xhtml#PC11),
    we are going to use OpenZipkin Brave (the other integrations have very similar
    setup options).


    ```

    org.springframework.boot

