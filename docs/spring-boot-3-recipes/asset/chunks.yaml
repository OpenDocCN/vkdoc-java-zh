- fmt: '#### Set General Configuration Properties


    Several general server properties are available, as shown in Table [3-8](#464036_2_En_3_Chapter.xhtml#Tab8).


    **Table 3-8** General Server Properties


    | Property | Description |

    | --- | --- |

    | `server.port` | Specifies the HTTP server port; the default is `8080`. |

    | `server.address` | Specifies the IP address to bind to; the default is `0.0.0.0`,
    i.e., all adapters. |

    | `server.server-header` | Specifies the name of the header to send the server
    name; the default is empty. |

    | `server.max-http-header-size` | Specifies the maximum size of a HTTP header;
    the default is `0` (unlimited). |

    | `server.connection-timout` | Specifies the timeout for HTTP connectors to wait
    for the next request before closing. The default is empty leaving it to the container;
    a value of `-1` means infinite and never time out. |

    | `server.http2.enabled` | Enables `Http2` support if the current container supports
    it. The default is `false`. |

    | `server.forward-headers-strategy` | Strategy for the `X-Forward-*` headers support;
    one of `native`, `framework`, `none`. |

    | `server.compression.enabled` | Specifies whether the HTTP compression should
    be enabled; the default is `false`. |

    | `server.compression.mime-types` | Contains a comma-separated list of MIME types
    that compression applies to. |

    | `server.compression.excluded-user-agents` | Contains a comma-separated of user
    agents for which compression should be disabled. |

    | `server.compression.min-response-size` | Sets the minimum size of the request
    for compression to be applied; the default is `2048`. |

    | `server.servlet.context-path` | Sets the main context path of the application;
    the default is launched as the root application. |

    | `server.servlet.application-display-name` | Sets the name used as the display
    name in the container; the default is `application`. |

    | `server.servlet.context-parameters` | Sets the servlet container context/init
    parameters. |

    | `server.shutdown` | Server shutdown mode; one of `immediate` or `graceful`.
    The default is `immediate`. |


    As the embedded containers all adhere to the Servlet specification, there is also
    support for JSP pages, and that support is enabled by default. Spring Boot makes
    it easy to change the JSP provider or even disable the support in full. See Table
    [3-9](#464036_2_En_3_Chapter.xhtml#Tab9) for the exposed properties.


    **Table 3-9** JSP-Related Server Properties


    | Property | Description |

    | --- | --- |

    | `server.servlet.jsp.registered` | Specifies whether the JSP servlet should be
    registered; the default is `true`. |

    | `server.servlet.jsp.class-name` | Sets the JSP servlet classname; the default
    is `org.apache.jasper.servlet.JspServlet` as both Tomcat and Jetty use Jasper
    as the JSP implementation. |

    | `server.servlet.jsp.init-parameters` | Sets the context parameters for the JSP
    servlet. |


    > **i** The use of JSP with a Spring Boot application is discouraged and limited.^([⁵](#fn5))


    When using Spring MVC, you might want to use the HTTP session to store attributes
    (generally with Spring Security to store CSFR tokens, etc.). The general servlet
    configuration also allows you to configure the HTTP session and the way it will
    be stored (cookie, URL, etc.). See Table [3-10](#464036_2_En_3_Chapter.xhtml#Tab10)
    for the properties.


    **Table 3-10** Servlet Container HTTP Session Properties


    | Property | Description |

    | --- | --- |

    | `server.servlet.session.timeout` | Sets a session timeout; the default is 30
    minutes. |

    | `server.servlet.session.tracking-modes` | Session tracking modes; one or more
    of `cookie`, `url`, and `ssl`. The default is empty, leaving it to the container.
    |

    | `server.servlet.session.persistent` | Sets whether session data should be persisted
    between restarts; the default is `false`. |

    | `server.reactive.session.cookie.name` | Specifies the name of the cookie to
    store the session identifier. The default is empty, leaving it to the container
    default. |

    | `server.reactive.session.cookie.domain` | Specifies the domain value to use
    for the session cookie. The default is empty, leaving it to the container default.
    |

    | `server.reactive.session.cookie.path` | Specifies the path value to use for
    the session cookie. The default is empty, leaving it to the container default.
    |

    | `server.reactive.session.cookie.http-only` | Specifies whether the session cookie
    should be HTTP-only accesible. The default is empty, leaving it to the container
    default. |

    | `server.reactive.session.cookie.secure` | Specifies whether the cookie should
    be sent through SSL only. The default is empty, leaving it to the container default.
    |

    | `server.reactive.session.cookie.max-age` | Sets the lifetime of the session
    cookie. The default is empty, leaving it to the container default. |

    | `server.reactive.session.cookie.same-site` | Sets the Same-Site policy to use
    (`NONE`/`LAX`/`STRICT`); the default is `NONE`. |

    | `server.servlet.session.session-store-directory.directory` | Sets the name of
    the directory to use for persistent cookies. This has to be an existing directory.
    |


    > **i** When using a Spring session, only the `server.servlet.session.timeout`
    property applies!


    Finally, Spring Boot makes it easy to configure SSL by exposing a few properties.
    See Table [3-11](#464036_2_En_3_Chapter.xhtml#Tab11) and Recipe 3-8 for how to
    configure SSL.


    **Table 3-11** Servlet Container SSL Properties


    | Property | Description |

    | --- | --- |

    | `server.ssl.enabled` | Specifies whether SSL should be enabled; the default
    is `true`. |

    | `server.ssl.bundle` | Sets the name of the SSL bundle to use. |

    | `server.ssl.ciphers` | Specifies the supported SSL ciphers; the default is empty.
    |

    | `server.ssl.client-auth` | Sets the SSL client authentication, one of `none`,
    `want`, or `need`. The default is empty. |

    | `server.ssl.protocol` | Sets the SSL protocol to use; the default is `TLS`.
    |

    | `server.ssl.enabled-protocols` | Sets which SSL protocols are enabled; the default
    is empty. |

    | `server.ssl.key-alias` | Sets the alias to identify the key in the keystore;
    the default is empty. |

    | `server.ssl.key-password` | Sets the password to access the key in the keystore;
    the default is empty. |

    | `server.ssl.key-store` | Sets the location of the keystore, typically a JKS
    file; the default is empty. |

    | `server.ssl.key-store-password` | Sets the password to access the keystore;
    the default is empty. |

    | `server.ssl.key-store-type` | Sets the type of the keystore; the default is
    empty. |

    | `server.ssl.key-store-provider` | Sets the provider of the keystore; the default
    is empty. |

    | `server.ssl.trust-store` | Sets the location of the trust store. |

    | `server.ssl.trust-store-password` | Sets the password to access the trust store;
    the default is empty. |

    | `server.ssl.trust-store-type` | Sets the type of the trust store; the default
    is empty. |

    | `server.ssl.trust-store-provider` | Sets the provider of the trust store; the
    default is empty. |


    > **i** All the properties mentioned in the previous tables apply *only* when
    using an embedded container to run your application. When deploying to an external
    container (i.e., deploying a WAR file), the settings do not apply!'
