  \nxmlBeansCursor.addElement(xmlFile);\n\nxmlBeansCursor.selectWithXPath(xmlFile);\n\
  \nxmlBeansCursor.selectWithXQuery(xmlFile);\n\n}\n\n}\n\n**总结**\n\nXMLBeans 是一个类似于\
  \ JAXB 的 XML 到 Java 的绑定及运行时框架。您可以使用绑定框架将 XML Schema 绑定到 Java 类型。XMLBeans 提供了对所有\
  \ XML Schema 结构的完整支持。您可以使用绑定配置文件来自定义 XML Schema 到 Java 类型的绑定。您可以使用运行时框架将 XML 文档解组和编组为绑定\
  \ Java 类型的实例化 Java 对象。\n\n除了对 XML 文档进行编组和解组之外，XMLBeans 还通过 XmlCursor API 提供了低级别的导航支持。使用\
  \ XmlCursor API，您可以将游标定位到指定位置，并修改该位置的文档内容。该 API 还支持使用 XPath 定位文档内容，以及使用 XQuery 语言查询\
  \ XML 文档。\n\n我们认为，JAXB 2.0 应作为 XML Schema 到 Java 类型绑定框架的默认选择，主要原因如下：\n\n• 它是 Java\
  \ 标准的一部分。\n\n• 它支持 XML Schema 内容与 Java 类型之间的双向映射。\n\n然而，以下实际原因可能表明 XMLBeans 是更合适的选择：\n\
  \n• 您需要完整的 XML Schema 支持，但尚未准备好迁移到 J2SE 5.0。\n\n• 在编组过程中，您希望对编组后 XML 文档中包含的 XML\
  \ 标记进行低级别控制。\n\n\n\n• 在解组过程中，你可能希望使用 XPath 来定位 XML 文档中的特定节点，或者使用 XQuery 语言来查询 XML\
  \ 文档的内容。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C07.fm\
