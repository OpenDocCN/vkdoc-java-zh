  \ 接口允许过滤输入，而 `LSSerializerFilter` 接口允许过滤输出。在我们的示例中，过滤输入的步骤如下：\n\n**1.** 创建一个输入过滤器，即一个实现\
  \ `LSParserFilter` 接口的类。\n\n**2.** 在输入过滤器类中，展示要过滤的元素节点。未展示给过滤器的节点会被添加到 Document\
  \ 对象中，而无需过滤器选择要添加到 Document 对象的节点。\n\n**3.** 接受所有展示给过滤器的节点。\n\n**4.** 创建一个 `LSParser`\
  \ 对象。\n\n**5.** 为要过滤的 XML 文档创建一个 `LSInput` 对象。\n\n**6.** 在 `LSParser` 对象上设置输入过滤器。\n\
  \n**7.** 使用 `LSInput` 对象解析 XML 文档。\n\n在我们的示例中，过滤输出的步骤如下：\n**1.** 创建一个输出过滤器，即一个实现\
