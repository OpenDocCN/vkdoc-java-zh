  \ ■ 模式验证简介\n\n显然，如果应用程序需要解析 XML 文档，并且所选解析器支持模式验证，那么将验证与解析结合起来是有意义的。然而，在其他场景中，由于各种原因，验证过程需要与解析过程解耦。以下是应用程序可能需要将验证与解析解耦的一些场景：\n\
  \n• 在根据模式验证 XML 文档之前，应用程序可能需要首先验证模式本身。验证 API 允许应用程序在将模式用于验证 XML 文档之前，单独编译和验证模式。例如，如果模式来自外部来源，而该来源不能自动被信任为正确，则此方法适用。\n\
  \n• 应用程序可能拥有 XML 文档的 DOM 树表示形式，并且可能需要根据模式定义来验证该树。如果通过编程或交互方式操作 XML 文档的 DOM 树以创建新的\
  \ DOM 树，并且需要根据模式验证新树，则在实际中会出现此场景。\n\n• 应用程序可能需要根据可用解析器不支持的模式语言来验证 XML 文档。这对于支持度较低的模式语言通常是正确的，对于新的自定义模式语言当然也是如此。\n\
  \n• 应用程序可能需要使用相同的模式定义来验证多个 XML 文档。由于验证 API 会构建模式的对象表示，因此使用单个模式对象来验证多个文档是高效的。\n\n\
  • 应用程序可能需要验证已知格式良好的 XML 内容，因此首先解析此类内容是没有意义的。这种情况的一个示例场景是，当 XML 文档通过可靠的转换过程以编程方式生成时。\n\
  \n我们在第 2 章中讨论了选择适当 JAXP 1.3 解析 API 的指南。表 3-1 列出了选择适当 JAXP 1.3 验证 API 的标准。\n\n**表\
  \ 3-1.** *选择验证 API*\n\n**验证 API**\n\n**适用应用程序**\n\nSAX 解析器\n\n文档适合使用 SAX 解析器进行解析且需要验证，并且解析器支持该模式语言。\n\
  \nDOM 解析器\n\n文档适合使用 DOM 解析器进行解析且需要验证，并且解析器支持该模式语言。\n\n验证\n\n应用程序需要将解析与验证解耦；我们之前讨论过相关场景。\n\
  \n**为模式验证配置 JAXP 解析器**\n\n\n\n要启用 JAXP 解析器进行模式验证，需要在解析器上设置相应的属性。首先，需要将 Validating\
  \ 属性设置为 true，之后描述的其他模式验证属性才会生效。其他模式验证属性如下：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
