  \n**133**\n\n**清单 5-31.** *Eclipse 中过滤元素的输出* 标题: Service Oriented Architecture Frameworks\n\
  \n作者: Naveen Balani\n\n**复制节点**\n\nXSLT 规范提供了两个用于复制节点的元素：`xsl-copy-of` 和 `xsl-copy`。`xsl:copy-of`\
  \ 元素复制选定的元素，同时也复制选定节点的属性和子元素。`xsl:copy` 是 `xsl:copy-of` 元素的一个不同版本，它不复制选定节点的子元素和属性。例如，将\
  \ `catalog.xml` 中 journal 元素内的第二个 article 元素复制到输出中。清单 5-32 中的样式表 `copy.xslt` 将 `catalog.xml`\
  \ 文档中 journal 节点内的第二个 article 元素复制到输出文档。XPath 表达式 `journal/article[2]` 选择 journal\
  \ 元素中的第二个 article 元素。\n\n**清单 5-32.** *copy.xslt*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<xsl:stylesheet version=\"1.0\" >\n\n<xsl:output method=\"xml\"/>\n\
  \n<xsl:template match=\"/catalog\">\n\n<xsl:copy-of select=\"journal/article[2]\"\
  />\n\n</xsl:template>\n\n</xsl:stylesheet>\n\n\n\n要运行使用 `copy.xslt` 的转换应用程序，请在 `XSLTTransformer.java`\
  \ 中将 `copy.xslt` 指定为 `File` 对象样式表的输入。XSLT 转换的输出由输入 XML 文档中 `journal` 节点内的第二个 `article`\
  \ 元素组成，如清单 5-33 所示。\n\n**清单 5-33.** *在 Eclipse 中复制节点的输出*\n\n<?xml version=\"1.0\"\
  \ encoding=\"UTF-8\"?>\n\n<article\n\ndate=\"October-2003\" level=\"Advanced\"\n\
  \nsection=\"Java Technology\">\n\n<title>高级 DAO 编程</title>\n\n<author>Sean Sullivan</author>\n\
  \n</article>\n\n**创建元素和属性**\n\nXSLT 规范提供了 `xsl:element` 元素来创建元素，以及 `xsl:attribute`\
  \ 元素来在生成的 XML 文档中创建属性。你可以在 `name` 属性中指定元素或属性的名称，并在 `namespace` 属性中指定元素或属性的命名空间。清单\
  \ 5-34 中的样式表 `createElement.xslt` 创建了一个 `journal` 元素，并向该 `journal` 元素添加了一个 `publisher`\
  \ 属性。属性值通过 `xsl:attribute` 元素中的 `xsl:text` 元素指定。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C05.fm Page 134 Thursday, July 6, 2006 1:42 PM\n\n**134**\n\n第 5 章\
  \ ■ 使用 XSLT 进行转换\n\n**清单 5-34.** *createElement.xslt*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<xsl:stylesheet version=\"1.0\" >\n\n<xsl:output method=\"xml\" omit-xml-declaration=\"\
  yes\"/>\n\n<xsl:template match=\"/\">\n\n<xsl:element name=\"journal\">\n\n<xsl:attribute\
  \ name=\"publisher\">\n\n<xsl:text>IBM developerWorks</xsl:text>\n\n</xsl:attribute>\n\
  \n</xsl:element>\n\n</xsl:template>\n\n</xsl:stylesheet>\n\n要运行使用 `createElement.xslt`\
  \ 的转换应用程序，请在 `XSLTTransformer.java` 中将输入指定为 `File` 对象样式表 `createElement.xslt`。该样式表的输出由一个带有\
  \ `publisher` 属性的 `journal` 元素组成，如清单 5-35 所示。\n\n**清单 5-35.** *在 Eclipse 中使用 createElement.xslt\
  \ 的输出*\n\n<journal publisher=\"IBM developerWorks\"/> **添加缩进**\n\n你可以使用 `xsl:output`\
  \ 元素来格式化 XSLT 输出。你可以通过 `indent` 属性在 `xsl:output` 元素中设置缩进。要添加缩进，请指定 `xalan-indent-amount`\
  \ 属性和 `xalan` 命名空间属性。如果 XSLT 处理器支持缩进，则输出会进行缩进。清单 5-36 显示了样式表 `indent.xslt`，它为示例\
  \ XML 文档添加了缩进。\n\n**清单 5-36.** *indent.xslt*\n\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n\n<xsl:stylesheet version=\"1.0\"\n\n>\n\n<xsl:output method=\"xml\"\
  \ xalan:indent-amount=\"3\"\n\nindent=\"yes\"/>\n\n<xsl:template match=\"/\">\n\n\
  <xsl:copy-of select=\"catalog\"/>\n\n</xsl:template>\n\n</xsl:stylesheet>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C05.fm Page 135 Thursday, July 6, 2006 1:42 PM\n\n第 5 章 ■ 使用 XSLT 进行转换\n\
  \n**135**\n\n**总结**\n\nXSLT 是一种用于将 XML 文档转换为其他 XML 文档或非 XML 文档（如 HTML 或纯文本文档）的语言。要将\
  \ XSLT 样式表中描述的转换应用于 XML 文档，你需要一个 XSLT 处理器和一个调用该 XSLT 处理器的 API。\n\nJAXP 1.3 中提供的\
  \ TrAX API 集非常适合使用 XSLT 样式表转换输入 XML 文档。XSLT 样式表所能生成的目标输出文档类型仅受限于你的想象力。在本章中，我们展示了如何成功地将\
  \ XML 文档转换为其他 XML 文档、HTML 文档和纯文本文档。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C05.fm Page 136 Thursday, July 6, 2006 1:42 PM\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C06.fm Page 137 Thursday, July 13, 2006 1:11 PM\n\n第 2 部分\n\n■ ■ ■\n\
  \n对象绑定\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C06.fm\
  \ Page 138 Thursday, July 13, 2006 1:11 PM\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C06.fm Page 139 Thursday, July 13, 2006 1:11 PM\n\n第 6 章\n\n■ ■ ■\n\
  \n使用 JAXB 进行对象绑定\n\n\n\n**X**ML 是一种简单、灵活、平台无关的语言，用于表示结构化的文本信息。XML 的平台无关性使其成为跨应用组件交换数据的理想载体。当不同的应用组件交换基于\
  \ XML 的数据时，它们这样做是因为希望以某种特定于应用的方式处理所交换的数据，例如将数据提取并存储到数据库中，或者将数据格式化并呈现为用户界面的一部分。这就引出了一个有趣的问题：尽管\
  \ XML 是交换数据的理想选择，但使用我们在前几章讨论过的各种 API 来处理 XML 内容可能效率极低。为什么会这样呢？\n\n答案在于，当今大多数处理逻辑都驻留在面向对象的应用组件中，而处理\
  \ XML 内容本质上却是极其过程化的。每个想要处理某些 XML 内容的组件，不仅需要关注内容格式是否良好，还必须确保其符合某种特定的结构（或者换句话说，相对于某个模式是有效的）。此外，一旦组件验证了\
  \ XML 内容格式良好且有效，它还必须使用适当的 API 来访问嵌入在 XML 内容中的数据。\n\n当然，它完全可以做到这一切——在前几章中，我们讨论了如何解析和验证\
  \ XML 内容，以及如何使用适当的 API 访问和修改嵌入在 XML 内容中的数据。但从封装和代码复用的角度来看，在大多数面向对象的应用程序中直接使用这些 API\
  \ 可能效率极低。为了解决在面向对象的 Java 应用程序中直接处理 XML 内容所带来的低效问题，你需要一个能够透明地将 XML 内容映射到 Java 对象，并将\
  \ Java 对象映射回 XML 内容的 Java API。\n\nJava 架构用于 XML 绑定（JAXB）正是这样一个 API。\n\n**概述**\n\n\
  理解 JAXB 的关键在于关注以下几点：\n\n• 给定一个 XML Schema 文档，可以构造出无数个相对于该模式有效的 XML 文档。\n\n• 给定一个模式和一个符合该模式的\
  \ XML 文档，该 XML 文档中的某个元素必须符合该模式中指定的某个类型组件。\n\n• 对象实例相对于 Java 中其对应的类，就如同 XML 文档中的元素相对于该文档模式中指定的元素声明。\n\
  \n**139**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C06.fm\
  \ 第 140 页 2006 年 7 月 13 日，星期四，下午 1:11\n\n**140**\n\n第 6 章 ■ 使用 JAXB 进行对象绑定\n\n•\
  \ 模式中指定的每个类型组件（除了一些例外情况）都可以映射到一个 Java 类。这个 Java 类可能已经作为 Java 平台的一部分存在，也可能需要被定义为一个新类。\n\
  \n• 将模式类型组件绑定到各种 Java 类定义的过程是 JAXB 的核心。\n\nJAXB API 是作为 Java Community Process¹\
  \ 的一部分开发的。需要注意的是，在撰写本书时，有两个版本的 JAXB 可用：\n\n• 第一个可用版本是 JAXB 1.0，于 2003 年 1 月最终确定。该规范的实现可在\
  \ Java Web 服务开发包（JWSDP）1.6 以及 J2EE 1.4 中找到。\n\n• 第二个可用版本是 JAXB 2.0，于 2006 年 5 月最终确定。该规范的实现可在\
  \ JWSDP 2.0 以及 Java 企业版 5 中找到。\n\nJAXB 的主要目标从 JAXB 1.0 到 2.0 保持不变。然而，2.0 版本有许多重要的新增功能。因此，我们将首先详细讨论\
  \ JAXB 1.0，然后再讨论 JAXB 2.0 中重要的新增内容。\n\n**JAXB 1.0**\n\n在以下各节中，我们将介绍 JAXB 1.0。\n\n\
  **架构**\n\n图 6-1 展示了 JAXB 1.0 的基本架构。JAXB 将一个*源 XML Schema* 绑定到一组从模式派生的 Java 内容类。JAXB\
  \ 中的*绑定编译器*（xjc）会生成与源模式中指定的顶级类型组件相对应的 Java 内容类。JAXB 中可用的运行时绑定框架 API 负责将 XML 文档*编组*和*反编组*为相应的\
  \ Java 对象，反之亦然。\n\n**图 6-1.** *JAXB 1.0 架构*\n\n1. 有关此过程的更多信息，请访问 http://jcp.org/en/home/index。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C06.fm 第 141 页\
  \ 2006 年 7 月 13 日，星期四，下午 1:11\n\n第 6 章 ■ 使用 JAXB 进行对象绑定\n\n**141**\n\n需要注意的是，JAXB\
  \ 1.0 绑定编译器不支持映射所有类型的 XML Schema 组件。事实上，JAXB 1.0 不支持以下 XML Schema² 组件：\n\n• 使用 `substitutionGroup`\
  \ 属性的元素声明，该属性解析为预定义的模型组模式组件（`<xs:element @substitutionGroup>`）。\n\n• 通配符模式组件（`xs:any`\
  \ 和 `xs:anyAttribute`）。\n\n• 用于指定跨多个元素唯一性的标识约束（`xs:key`、`xs:keyref` 和 `xs:unique`）。\n\
  \n• 使用 `redefine` 声明重新定义的 XML Schema 组件（`<xs:redefine>`）。\n\n• 表示法 XML Schema 组件（`<xs:notation>`）。\n\
  \n• 不支持以下模式属性：`complexType.abstract`、`element.abstract`、`element.substitutionGroup`、`xsi:type`、`complexType.block`、`complexType.final`、`element.block`、`element.final`、`schema.blockDefault`\
  \ 和 `schema.finalDefault`。\n\n**XML Schema 到 Java 表示的绑定**\n\nJAXB 1.0 定义了所支持的模式子集到\
  \ Java 的默认绑定。但是，你可以通过外部绑定声明来覆盖此默认绑定，这些声明可以内联在模式中，也可以放在单独的 XML 绑定声明文档中。无论哪种方式，绑定声明都会覆盖默认的\
  \ XML Schema 到 Java 的绑定。\n\n将 XML Schema 子集绑定到 Java 的详细算法最好留给 JAXB 1.0 规范去处理。话虽如此，我们想补充一点，如果你唯一的兴趣在于应用\
  \ JAXB，而不是实现 JAXB，那么这些细节对你的价值将非常有限。因此，我们不会涵盖与模式绑定到 Java 相关的所有细节，而是通过提供一个简单的示例，帮助你直观地理解模式绑定。\n\
  \n简单绑定示例\n\n假设你有一个简单的模式，它定义了美国或加拿大境内邮政地址的结构。它指定了明显的元素，如姓名、街道、城市和州。它指定了美国邮政编码或加拿大邮政编码的选择。它将国家元素的内容限制为只能是美国或加拿大。清单\
  \ 6-1 展示了这样一个模式的示例。\n\n**清单 6-1.** *美国或加拿大地址模式：address.xsd*\n\n```xml\n<?xml version='1.0'\
  \ encoding='UTF-8' ?>\n\n<xs:schema jxb:version=\"1.0\"\n\nxsi:schemaLocation=\"\
  http://www.w3.org/2001/XMLSchema http://www.nubean.com/schemas/schema.xsd\" >\n\n\
  <xs:element name=\"UsOrCanadaAddress\" >\n\n<xs:complexType>\n\n2. 你可以在 http://www.w3.org/TR/xmlschema-1/\
  \ 找到关于 XML Schema 组件的详细信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C06.fm 第 142 页 2006 年 7 月 13 日，星期四，下午 1:11\n\n**142**\n\n第 6 章 ■ 使用\
  \ JAXB 进行对象绑定\n\n<xs:sequence>\n\n<xs:element name=\"name\" type=\"xs:string\" ></xs:element>\n\
  \n<xs:element name=\"street\" type=\"xs:string\" ></xs:element>\n\n<xs:element name=\"\
  city\" type=\"xs:string\" ></xs:element>\n\n<xs:element name=\"state\" type=\"xs:string\"\
  \ ></xs:element>\n\n<xs:choice>\n\n<xs:element name=\"zip\" type=\"xs:int\" ></xs:element>\n\
  \n<xs:element name=\"postalCode\" type=\"xs:string\" ></xs:element>\n\n</xs:choice>\n\
  \n<xs:element name=\"country\" >\n\n<xs:simpleType>\n\n<xs:restriction base=\"xs:string\"\
  \ >\n\n<xs:enumeration value=\"United States\" ></xs:enumeration>\n\n<xs:enumeration\
  \ value=\"Canada\" ></xs:enumeration>\n\n\n\n</xs:restriction>\n\n</xs:simpleType>\n\
  \n</xs:element>\n\n</xs:sequence>\n\n</xs:complexType>\n\n</xs:element>\n\n</xs:schema>\n\
  \n现在，为简化操作，你将接受所有默认的 XML Schema 绑定规则，但有一条例外。你将使用特定的包名 `com.apress.jaxb1.example`\
  \ 覆盖生成的 Java 类和接口的默认包名，如清单 6-2 所示的外部绑定文件。\n\n**清单 6-2.** *包名的外部绑定声明*\n\n<?xml version='1.0'\
  \ encoding='utf-8' ?>\n\n<jxb:bindings version=\"1.0\"\n\n>\n\n<jxb:bindings node=\"\
  /xs:schema\" schemaLocation=\"address.xsd\" >\n\n<jxb:schemaBindings>\n\n**<jxb:package\
  \ name=\"com.apress.jaxb1.example\" ></jxb:package>**\n\n</jxb:schemaBindings>\n\
  \n</jxb:bindings>\n\n</jxb:bindings>\n\n在本章稍后的“将目录模式绑定到 Java 类”一节中，我们将详细讨论如何在 Eclipse\
  \ 中配置和运行 xjc 编译器。现在，假设你已掌握操作方法，并运行 xjc 编译器，使其处理清单 6-1 中的模式和清单 6-2 中的外部绑定声明。运行 xjc\
  \ 会将模式组件绑定到 Java。对于清单 6-1 所示的模式，xjc 的模式绑定工作方式如下：\n\n• 在 `com.apress.jaxb1.example`\
  \ 包中，xjc 生成两个 Java 接口和一个 Java 类。接口为 `UsOrCanadaAddressType` 和 `UsOrCanadaAddress`，类为\
  \ `ObjectFactory`。\n\n• `UsOrCanadaAddressType` 接口是 `<xs:element name=\"UsOrCanadaAddress\"\
  \ >` 组件内定义的 `<xs:complexType>` 组件的 Java 表示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C06.fm 第 143 页 2006 年 7 月 13 日星期四下午 1:11\n\n第 6 章 ■ 使用 JAXB 进行对象绑定\n\
  \n**143**\n\n• `UsOrCanadaAddress` 接口是 `<xs:element name=\"UsOrCanadaAddress\" >`\
  \ 组件的 Java 表示。\n\n• `UsOrCanadaAddress` 接口继承自 `UsOrCanadaAddressType` 接口。\n\n• `ObjectFactory`\
  \ 类是一个典型的对象工厂实现，可用于创建 `UsOrCanadaAddress` 或 `UsOrCanadaAddressType` 的新实例。\n\n• 在\
  \ `com.apress.jaxb1.example.impl` 包中，xjc 生成两个实现类：`UsOrCanadaAddressTypeImpl` 和 `UsOrCanadaAddressImpl`。这些实现类实现了对应的接口。\n\
  \n• 在 `com.apress.jaxb1.example.impl.runtime` 包中，xjc 生成多个类，负责所有与解析、验证、元素访问、编组和解组相关的底层工作。\n\
  \n• 编组 XML 文档是指从 Java 类创建 XML 文档。解组 XML 文档是指从 XML 文档创建 Java 对象树。\n\n现在，让我们看看 Java\
  \ 接口 `UsOrCanadaAddressType` 中的代码。清单 6-3 展示了这段生成的代码。\n\n**清单 6-3.** *UsOrCanadaAddressType\
  \ 接口代码* package com.apress.jaxb1.example;\n\npublic interface UsOrCanadaAddressType\
  \ {\n\njava.lang.String getPostalCode();\n\nvoid setPostalCode(java.lang.String\
  \ value);\n\njava.lang.String getState();\n\nvoid setState(java.lang.String value);\n\
  \nint getZip();\n\nvoid setZip(int value);\n\njava.lang.String getCountry();\n\n\
  void setCountry(java.lang.String value);\n\njava.lang.String getCity();\n\nvoid\
  \ setCity(java.lang.String value);\n\njava.lang.String getStreet();\n\nvoid setStreet(java.lang.String\
  \ value);\n\njava.lang.String getName();\n\nvoid setName(java.lang.String value);\n\
  \n}\n\n研究清单 6-3 中的代码时，请注意清单 6-1 中顶层元素内定义的每个元素都映射到一个带有 get 和 set 访问器方法的属性。这种映射对大多数元素来说直观合理，但对于属于选择组的两个元素\
  \ `zip` 和 `postalCode` 则不然。对于这两个元素，一个显而易见的问题是：选择组是如何在 `UsOrCanadaAddressType` 接口中体现的？简单的答案是：没有体现。在默认映射规则下，选择组不会在接口中反映出来。然而，选择逻辑在编组和解组逻辑中得到了正确实现。清单\
  \ 6-1 中 `country` 元素的枚举值也是如此。\n\n从直观角度来看，你已经看到默认绑定模型将顶层元素内的嵌套元素视为一个扁平的元素列表，忽略了诸如选择组之类的组组件。然而，另一种称为*模型组绑定*的绑定风格会将每个组组件绑定到其自己的\
  \ Java 接口。为了更好地理解这种替代风格，可以在外部绑定声明文件中使用 `globalBindings` 元素来指定，如清单 6-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C06.fm 第 144 页 2006 年 7 月 13 日星期四下午 1:11\n\n**144**\n\n第 6 章 ■ 使用 JAXB\
  \ 进行对象绑定\n\n**清单 6-4.** *采用模型组绑定风格的外部绑定声明*\n\n<?xml version='1.0' encoding='utf-8'\
  \ ?>\n\n<jxb:bindings version=\"1.0\"\n\n>\n\n<jxb:bindings node=\"/xs:schema\"\
  \ schemaLocation=\"address.xsd\" >\n\n**<jxb:globalBindings bindingStyle=\"modelGroupBinding\"\
  >**\n\n**</jxb:globalBindings>**\n\n<jxb:schemaBindings>\n\n<jxb:package name=\"\
  com.apress.jaxb1.example\" ></jxb:package>\n\n</jxb:schemaBindings>\n\n</jxb:bindings>\n\
  \n</jxb:bindings>\n\n现在，如果将清单 6-4 所示的绑定应用于清单 6-1 中的模式，结果会略有不同。具体来说，接口 `UsOrCanadaAddressType`\
  \ 包含嵌套接口 `ZipOrPostalCode`；此外，ZIP 和邮政编码对应的属性 get 和 set 方法现在合并了，并使用这个新接口，如清单 6-5\
  \ 所示。（为简洁起见，我们在清单 6-5 中省略了与默认绑定风格相比未发生变化的属性 get 和 set 方法。）\n\n**清单 6-5.** *通过模型组绑定风格派生的\
  \ UsOrCanadaAddressType* package com.apress.jaxb1.example;\n\npublic interface UsOrCanadaAddressType\
