  \ 所使用，下一节将对此进行讨论。\n\n**端口类型**\n\n与 Java 接口类似，`wsdl:portType` 元素描述了一个抽象的 Web 服务接口。每个\
  \ `wsdl:portType` 元素包含一个或多个 `wsdl:operation` 元素，其中每个 `wsdl:operation` 元素定义了该操作的消息交换模式。\n\
  \n在最常见的请求-响应消息交换模式中，一个 `wsdl:operation` 元素包含一个 `wsdl:input` 元素、一个 `wsdl:output`\
  \ 元素以及零个或多个 `wsdl:fault` 元素，这些元素通过 `message` 属性与 `wsdl:message` 定义相关联。顾名思义，`wsdl:input`\
  \ 定义了请求消息，`wsdl:output` 定义了响应消息，而 `wsdl:fault` 则定义了 SOAP 错误消息的详细信息。以下是一个请求-响应 `wsdl:operation`\
  \ 的示例，即 `download`：\n\n<wsdl:operation name=\"download\" >\n\n<wsdl:input message=\"\
  defs:DownloadProject\" name=\"project\" >\n\n</wsdl:input>\n\n<wsdl:output message=\"\
  defs:DownloadZip\" name=\"downloadZip\" >\n\n</wsdl:output>\n\n<wsdl:fault message=\"\
  defs:ProjectFault\" name=\"fault\" >\n\n</wsdl:fault>\n\n</wsdl:operation>\n\n在上述\
  \ `download` 的 `wsdl:operation` 中，`defs:DownloadProject`、`defs:DownloadZip` 和 `defs:ProjectFault`\
  \ 是用于请求-响应消息交换模式的抽象消息。\n\n对于单向交换模式，只需要一个 `wsdl:input` 元素，如下所示 `remove` 的 `wsdl:operation`\
  \ 示例：\n\n<wsdl:operation name=\"remove\" >\n\n<wsdl:input message=\"defs:RemoveProject\"\
  \ name=\"project\" >\n\n</wsdl:input>\n\n</wsdl:operation>\n\n你不能在没有 `wsdl:output`\
  \ 消息的情况下指定 `wsdl:fault` 消息，因为只有在期望响应时才会生成 SOAP 错误消息。因此，例如，你不能向名为 `remove` 的 `wsdl:operation`\
  \ 添加 `wsdl:fault`。\n\n示例 Web 服务的 `wsdl:portType` 被命名为 `ProjectPortType`，它为用例场景定义了以下\
  \ `wsdl:operation`：\n\n• 向项目上传文档由 `upload` 定义。\n• 从项目下载文档由 `download` 定义。\n• 获取用户拥有的所有项目信息由\
