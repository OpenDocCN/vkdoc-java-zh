  使用 XSLT 进行转换\n\n**X**SL 转换（XSLT）1 是 W3C 推荐的可扩展样式表语言（XSL）2 家族的一部分。XSL 家族包括以下规范：\n\
  \n• XPath 规范定义了用于在 XML 文档中对各种节点集进行寻址的语法结构。\n\n\n\n• XSL 格式化对象（XSL-FO）规范定义了一种用于表达格式化语义的\
  \ XML 词汇表。\n\n• XSLT 规范规定了一种将 XML 文档转换为其他 XML 文档的语言。3\n\n最初促使 XSLT 产生的用例是：将给定的 XML\
  \ 文档转换为相关的 XML 文档，该文档使用 XSL-FO 词汇表指定格式化语义。尽管 XSLT 最初是为解决这一特定用例而开发的，但它也被设计用于与 XSL-FO\
  \ 无关的转换。事实上，由于 XSL-FO 本身是一个主题，超出了本书的范围，因此在本章中，我们将只关注与 XSL-FO 无关的 XSLT 转换。\n\nXSLT\
  \ 语言结构完全基于 XML。因此，用 XSLT 编写的转换也是格式良好的 XML 文档。包含 XSLT 转换的 XML 文档通常被称为*样式表*。这是因为最初促使\
  \ XSLT 产生的用例与 XML 文档的格式化有关。\n\nXSLT 样式表仅仅*指定*了一组转换。因此，你需要一个 XSLT 处理器来*应用*这些转换到给定的\
  \ XML 文档。XSLT 处理器以 XML 文档和 XSLT 样式表作为输入，并根据样式表中指定的转换，将给定的 XML 文档转换为其目标输出。XSLT 转换的目标输出通常是\
  \ XML 文档，但也可能是 HTML 文档或任何类型的文本文档。两个常用的 XSLT 处理器是 Xalan-Java4 和 Saxon。5 要使用 XSLT\
  \ 处理器，你需要一组 Java API，而 TrAX6 正是这样一组 API。在接下来的章节中，我们将首先概述 XSLT，然后介绍 TrAX。\n\n1. XSLT\
  \ 规范可在 http://www.w3.org/TR/xslt 获取。\n2. XSL 系列推荐标准可在 http://www.w3.org/Style/XSL/\
  \ 获取。\n3. 正如你将在本章中学到的，XSLT 的应用范围超出了最初的规范目标。\n4. Xalan-Java 信息可在 http://xml.apache.org/xalan-j/\
  \ 获取。\n5. Saxon 信息可在 http://saxon.sourceforge.net/ 获取。\n6. TrAX API 是 JAXP 1.3 的一部分；自\
  \ 1.1 版本起，它已成为 JAXP 的一部分。\n\n**111**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
