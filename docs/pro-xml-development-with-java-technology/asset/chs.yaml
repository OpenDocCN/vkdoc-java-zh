  \   保存文档中的选定节点，而非整个文档\n*   将完整文档或选定的文档节点序列化为字符串，而非文件\n\nDOM Level 3 加载和保存接口相比 JAXP\
  \ 的`DocumentBuilder`和`Transformer`类具有一些优势。JAXP 的`DocumentBuilder`和`Transformer`类中未包含的\
  \ DOM Level 3 加载和保存特性如下：\n\n*   文档加载和保存期间的事件处理\n*   文档加载和保存期间的内容过滤\n*   加载和保存选定节点，而非完整文档\n\
  *   将`Document`对象保存为字符串，而非文件\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
