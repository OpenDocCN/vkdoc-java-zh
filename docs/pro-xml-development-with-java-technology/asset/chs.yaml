  \ 目录。\n\n默认的 Xindice 数据库位置是 `[Xindice-Web-Application-directory]/WEB-INF/db`，其中\
  \ `Xindice-Web-Application-directory` 是部署 `xindice.war` 时由 JBoss 应用服务器自动创建的临时目录。很可能你会想要修改这个默认位置。要修改此默认数据库位置，你有两个选项：\n\
