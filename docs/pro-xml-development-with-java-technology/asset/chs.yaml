  \n</xsl:stylesheet>\n\n**去除重复项**\n\nXML 文档中可能包含需要在输出中去除的重复元素。示例 XML 文档包含一个重复的 title\
  \ 元素。要移除任何重复的 title 元素，请使用清单 5-20 所示的样式表运行转换应用程序，该样式表会输出非重复的文章标题。XPath 表达式`//title[not(.=following::title)]`选择非重复的\
  \ title 元素。XSLT 模式中的 XPath 函数`text()`输出 title 元素的文本。\n\n**清单 5-20.** *removeDuplicates.xslt*\n\
  \n<xsl:stylesheet version=\"1.0\"\n\n>\n\n<xsl:output method=\"xml\" version=\"\
  1.0\" omit-xml-declaration=\"yes\"/>\n\n<xsl:template match=\"/\">\n\n<xsl:variable\
  \ name=\"unique-list\"\n\nselect=\"//title[not(.=following::title)]/text()\" />\n\
  \n<xsl:for-each select=\"$unique-list\">\n\n<xsl:copy>\n\n<xsl:apply-templates/>\n\
  \n</xsl:copy>\n\n<xsl:text disable-output-escaping=\"yes\">\n\n&#13;\n\n</xsl:text>\n\
  \n</xsl:for-each>\n\n</xsl:template>\n\n</xsl:stylesheet>\n\n当输出方法为 xml 或 html 时，某些字符会在输出中被自动转义。要禁用字符的自动转义，可以在`xsl:text`中使用`disable-output-escaping=\"\
  yes\"`属性；元素的主体包含转义序列。例如，在清单 5-20 中，以下指令禁用了回车符的输出转义：\n\n<xsl:text disable-output-escaping=\"\
  yes\">&#13; </xsl:text> 在应用此样式表之前，我们需要向 catalog.xml（如清单 5-11 所示）中添加重复的 title 元素。我们可以通过简单地复制并粘贴最后一个\
  \ article 元素，将其放在自身下方来实现。由于存在重复的 article 元素，这将添加一个重复的 title 元素。\n\n\n\n要使用 removeDuplicates.xslt\
