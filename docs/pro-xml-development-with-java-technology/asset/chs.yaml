  \ 类负责生成消息输出。默认情况下，`MessageHandler` 输出到屏幕。你也可以将 `MessageHandler` 类配置为输出到文件。`setScreenLogger(Logger)`\
  \ 方法用于设置 `MessageHandler` 类的屏幕日志记录器。\n\n**清单 12-8.** *创建 FOP 驱动*\n\nDriver driver=new\
