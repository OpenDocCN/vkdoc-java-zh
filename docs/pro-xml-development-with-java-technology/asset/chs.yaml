  \n• 通过 `http://java.sun.com/xml/jaxp/properties/schemaLanguage` 属性指定模式定义中使用的模式语言。该属性的值必须是模式语言规范的\
  \ URI，对于 W3C XML Schema 语言，其值为 `http://www.w3.org/2001/XMLSchema`。\n\n• 通过 `http://java.sun.com/xml/jaxp/properties/schemaSource`\
  \ 属性指定模式定义源的位置。该属性的值必须是以下之一：\n\n• 模式文档位置的 URI（以字符串形式提供）\n\n• 以 `java.io.InputStream`\
  \ 对象或 `org.xml.sax.InputSource` 对象形式提供的模式源\n\n• 以 `File` 对象形式提供的模式源\n\n• 上述类型对象的数组\n\
  \n• 未设置 schemaLanguage 属性时，设置 schemaSource 属性是非法的。\n\n• XML 文档可以通过文档元素中的 `xsi:schemaLocation`\
  \ 属性指定命名空间感知模式的位置，如下例所示：\n\n<jsp:root\n\n**xsi:schemaLocation=\n\n\"http://java.sun.com/JSP/Page\
  \ http://www.nubean.com/schemas/jsf_1_1.xsd\" > schemaLocation 属性可以包含一个或多个值对。在每个值对中，第一个值是命名空间\
  \ URI，第二个值是关联命名空间的模式位置 URI。W3C XML Schema 1.0 推荐标准并未强制要求使用此属性值在模式验证期间定位模式文件。\n\n\
  • XML 文档可以通过文档元素中的 `xsi:noNamespaceSchemaLocation` 属性指定无命名空间模式的位置，如下例所示：\n\n<root\n\
  \nxsi:noNamespaceSchemaLocation=\n\n\"http://www.nubean.com/schemas/jsf_1_1.xsd\"\
