  \n</catalog>\n\nXML 文档已删除\n\n**总结**\n\n原生 XML 数据库定义了一种用于存储和检索 XML 文档的模型。原生 XML 数据库将\
  \ XML 文档存储在集合中，并分别支持使用 XPath 进行查询和使用 XML:DB XUpdate API 进行更新。原生 XML 数据库相比关系数据库具有优势，因为原生\
  \ XML 数据库是专门为存储、查询和更新 XML 文档而设计的，而关系数据库则设计用于在数据库的行列单元格中存储原子值。具有多级层次结构和属性的复杂 XML\
  \ 文档可以轻松地在原生 XML 数据库中存储、查询和更新。\n\n在本章中，我们以 Xindice 开源原生 XML 数据库为具体背景，讨论了通用的原生 XML\
  \ 数据库概念。除了支持查询和更新 API 之外，Xindice 还提供了一个用于管理 Xindice 原生 XML 数据库的命令行工具，本章也对此进行了讨论。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C08.fm 第 248 页\
  \ 2006 年 8 月 12 日，星期六，上午 5:05\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C09.fm 第 249 页 2006 年 7 月 25 日，星期二，上午 5:00\n\n第 9 章\n\n■ ■ ■\n\n在关系数据库中存储\
  \ XML\n\n**在**上一章中，你学习了如何将 XML 文档存储在原生 XML 数据库中。原生 XML 数据库当然仅限于存储 XML 文档。如果你需要将\
  \ XML 文档与其他数据一起存储，关系数据库则更为合适。在关系数据库中，你可以像存储任何其他类型的数据一样，将 XML 文档存储在表行的列中。\n\n\n\n\
  在缺乏将 XML 内容存储到关系型数据库的相关标准时，关系型数据库厂商开始添加各自专用的数据类型、工具和 API，以便在其数据库中提供 XML 相关支持。表 9-1\
  \ 讨论了一些厂商专用工具。\n\n**表 9-1.** *用于存储 XML 的数据库工具*\n\n**数据库工具**\n\n**数据库**\n\n**描述**\n\
  \nOracle XML\n\nOracle\n\n将不包含子元素或属性的 XML 文档存储到\n\nSQL 工具\n\n预定义的数据库表中。你可以应用\n\n\
  XSLT 来存储包含子元素和属性的 XML 文档。\n\nIBM DB2\n\nDB2 UDB\n\n将 XML 文档存储为\n\nXML 扩展器\n\n类似\
  \ BLOB 的对象，或存储为一组称为\n\nXML *集合* 的集合。\n\nSQL 扩展\n\nSQL Server 2000\n\n使用行集函数存储 XML\
  \ 文档，\n\n和行集函数\n\n并使用 SQL 结构 FOR XML 检索 XML 文档。\n\n结果集 DTD\n\nSybase Adaptive Server\n\
  \n使用 ResultSetXml 类存储和检索 XML 文档。\n\n显然，业界需要一个独立于厂商的标准来在关系型数据库中存储和访问 XML 内容，因此 SQL:2003\
  \ 国际标准新增了第 14 部分：SQL/XML（XML 相关规范），专门用于解决此问题。\n\n**概述**\n\nSQL:2003 标准提供了一种新的 XML\
  \ 数据类型来存储 XML 内容。XML 数据类型与其他任何数据类型一样；使用 XML 数据类型，你可以将 XML 文档存储到表行的列中。1. “SQL:2003\
  \ 已发布”（http://www.sigmod.org/sigmod/record/issues/0403/E.JimAndrew-standard.pdf）是了解\
  \ SQL:2003 标准概述的很好参考。\n\n**249**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C09.fm Page 250 Tuesday, July 25, 2006 5:00 AM\n\n**250**\n\n第 9 章\
  \ ■ 在关系型数据库中存储 XML\n\nSQL:2003 是一个相对较新的标准。因此，目前并非所有关系型数据库都支持该标准。你可能需要研究厂商专用信息，以了解你的数据库是否支持\
  \ SQL:2003 标准。\n\n在 Java 中，JDBC 驱动程序是与关系型数据库交互的成熟方式。JDBC 4.0 API 规范公开评审草案（JSR-000221）提议支持\
  \ SQL:2003 标准。预计当 JDBC 4.0 规范最终确定后，越来越多的数据库将增加对 XML 数据类型的支持。在 J2SE 6.0 中实现的 JDBC\
  \ 4.0 API 中，XML 数据类型映射到 java.sql.SQLXML Java 数据类型。SQLXML Java 数据类型的关键区别特性在于，你可以使用它来导航\
  \ XML 文档。在 J2SE 5.0 中实现的 JDBC 3.0 API 没有定义 SQLXML 数据类型；在 JDBC 3.0 中，你只能将 XML 类型列作为\
  \ String 或 CLOB 检索。与使用 java.sql.SQLXML 类型不同，你不能使用 String 或 CLOB 来导航 XML 文档。\n\n\
  你需要一个 JDBC 4.0 驱动程序来从 XML 数据类型列中检索 XML 文档，并将其映射到实现 java.sql.SQLXML 接口的对象。由于 JDBC\
  \ 4.0 规范仍在公开评审中，目前没有知名的关系型数据库提供 JDBC 4.0 驱动程序。因此，只有当 JDBC 4.0 驱动程序可用时，你才能测试本章中的示例应用程序。同时，我们将使用\
  \ JDBC 3.0 驱动程序来构建和执行示例。\n\n在本章中，我们将解释如何将 XML 文档存储到关系型数据库中、如何从数据库中检索 XML 文档，以及如何使用\
  \ java.sql.SQLXML 接口导航 XML 文档；当然，使用 java.sql.SQLXML 导航文档仅在 JDBC 4.0 驱动程序下可行。清单 9-1\
  \ 显示了我们在示例中将使用的示例 XML 文档。\n\n**清单 9-1.** *catalog.xml*\n\n<catalog title=\"OnJava.com\"\
