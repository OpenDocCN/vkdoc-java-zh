  \ Shenoy\n\n在接下来的部分中，您将使用 XmlCursor API 遍历一个 XML 文档。\n\n**使用 XmlCursor API 遍历 XML\
  \ 文档**\n\nXMLBeans 提供了使用 XmlCursor API 遍历 XML 文档的功能。XML 游标定义了 XML 文档中的一个位置，可以在此位置上对\
  \ XML 文档执行操作。\n\n由于游标可以在有或没有对应 XML Schema 的情况下创建，因此当 XML 文档没有可用模式时，游标非常适合导航 XML\
  \ 文档。通过将游标定位在 XML 文档的某个位置，您可以执行获取和设置值、添加元素和属性、选择节点以及查询 XML 文档等操作。使用 XmlCursor，您可以执行以下操作：\n\
