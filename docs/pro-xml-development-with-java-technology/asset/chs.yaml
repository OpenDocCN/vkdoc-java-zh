  \ Ajax 构建 Web 应用程序\n\n**异**步 JavaScript 和 XML（Ajax）是由 Adaptive Path 公司的 Jesse James\
  \ Garrett 提出的术语¹，用于描述一种 Web 技术，该技术允许你使用 JavaScript、文档对象模型（DOM）和 XMLHttpRequest 技术创建异步\
  \ Web 应用程序。使用这种技术，基于浏览器的用户界面可以与服务器交互，更新网页的选定部分，而无需重新加载整个网页。\n\n这种 Web 技术减少了浏览器与后端之间交换的数据量，从而降低了延迟，并使基于浏览器的用户界面更具交互性；这使得它更像传统的桌面应用程序。\n\
  \nAjax 有许多有用的应用；一些常见的应用如下：**动态表单数据验证**：当用户填写需要字段中唯一标识符的表单时，可以在不提交整个表单的情况下验证表单字段。\n\
  \n**自动补全**：当用户在表单字段中输入数据时，表单字段会根据从服务器获取的数据自动补全。\n\n**页面数据刷新**：某些网页需要频繁刷新部分内容；例如，天气网站就有此需求。使用\
  \ Ajax 技术，网页可以向服务器轮询最新数据，并刷新网页的选定部分，而无需重新加载页面。\n\nJavaScript 和 DOM 脚本是基本的 Web 技术；因此，我们在此不详细讨论。不过，我们将介绍\
  \ XMLHttpRequest 对象的工作原理。\n\n■**注意** 如果你想了解更多关于 JavaScript、DOM 脚本和通用 Ajax 技术的内容，请参阅\
  \ Christian Heilmann 所著的 *Beginning JavaScript with DOM Scripting and Ajax*（Apress，2006\
  \ 年）。如需更多关于使用 Java 进行 Ajax 编程的内容，请参阅 Nathaniel T. Schutta 和 Ryan Asleson 所著的 *Pro\
  \ Ajax with Java Frameworks*（Apress，2006 年）。\n\n1\\. 关于 Ajax 的开创性文章可在 http://adaptivepath.com/publications/essays/archives/000385.php\
  \ 获取。\n\n**329**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C13.fm\
  \ 第 330 页 2006 年 7 月 29 日星期六 上午 5:45\n\n**330**\n\n第 13 章 ■ 使用 Ajax 构建 Web 应用程序\n\
  \n**什么是 XMLHttpRequest？**\n\nXMLHttpRequest 对象提供了基于浏览器的用户界面与基于 Web 服务器的业务服务之间的异步通信。使用\
  \ XMLHttpRequest 对象，客户端可以在不重新加载网页的情况下，向 Web 服务器提交和检索 XML 数据。你可以使用 DOM 和 XSLT 在客户端将\
  \ XML 数据转换为 HTML。\n\n微软在 Internet Explorer (IE) 5 中作为 ActiveXObject 引入了 XMLHttpRequest²。大多数浏览器都支持\
  \ XMLHttpRequest；然而，其实现并不互操作。例如，你可以在 IE 6 中使用以下代码创建 XMLHttpRequest 对象的实例：var req\
  \ = new ActiveXObject(\"Microsoft.XMLHTTP\"); 在 IE 7 中，XMLHttpRequest 作为 window\
  \ 对象属性可用。你可以按如下方式在 IE 7 中创建 XMLHttpRequest 对象的实例：\n\nvar req = new XMLHttpRequest();\n\
  \n最近，W3C 发布了 XMLHttpRequest 对象的工作草案³，这将标准化其实现。XMLHttpRequest 对象提供了多种用于实现 HTTP 客户端功能的属性，详见表\
  \ 13-1。\n\n**表 13-1.** *XMLHttpRequest 属性*\n\n**属性**\n\n**描述**\n\nonreadystatechange\n\
  \n设置异步请求的回调方法。\n\nreadyState\n\n\n\n检索请求的当前状态。0：已创建 XMLHttpRequest 对象。1：已创建对象，并已调用\
  \ open() 方法。2：已调用 send() 方法，但尚未收到响应。3：已收到部分数据，这些数据可在 responseText 属性中获取。此时 responseXML\
  \ 属性返回 null，响应头和状态尚未完全可用。4：已收到响应。\n\nresponseText\n\n从服务器检索响应的文本。\n\nresponseXML\n\
  \n从服务器检索响应的 XML DOM。\n\nstatus\n\n检索请求的 HTTP 状态码。有关状态码的定义，请参考 http://www.w3.org/Protocols/rfc2616/rfc2616-sec10.html。\n\
  \nstatusText\n\n检索 HTTP 请求的状态文本。\n\nXMLHttpRequest 对象的方法用于打开 HTTP 请求、发送请求以及接收响应。表\
  \ 13-2 描述了 XMLHttpRequest 的方法。\n\n2\\. 它可以是一个应用服务器内的 Web 容器，这也是我们将要使用的。在本章中，我们将互换使用术语\
  \ *Web 服务器*和*应用服务器*。\n\n3\\. ActiveXObject API 可在 http://msdn2.microsoft.com/en-us/library/6958xykx.aspx\
  \ 获取。\n\n4\\. 你可以在 http://www.w3.org/TR/XMLHttpRequest/ 找到 XMLHttpRequest 对象的 W3C\
  \ 工作草案。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C13.fm\
  \ Page 331 Saturday, July 29, 2006 5:45 AM\n\n第 13 章 ■ 使用 AJAX 构建 Web 应用程序\n\n**331**\n\
  \n**表 13-2.** *XMLHttpRequest 方法*\n\n**方法**\n\n**描述**\n\nabort()\n\n取消当前 HTTP 请求。\n\
  \ngetAllResponseHeaders()\n\n获取所有响应头。readyState 必须为 3 或 4 才能检索响应头。\n\ngetResponseHeader(string\
  \ header)\n\n获取指定的响应头。readyState 必须为 3 或 4 才能检索响应头。\n\nopen(string method, string\
  \ url, boolean\n\n打开一个 HTTP 请求但不发送请求。readyState 属性被设置为 1。\n\nasynch, string username,\
  \ string password)\n\nresponseText、responseXML、status 和 statusText 属性被重置为初始值。HTTP\
  \ 方法和服务器 URL（可以是相对或绝对路径）是必需参数。布尔参数 asynch 指定 HTTP 请求是否为异步；默认值为 true。参数 username\
  \ 和 password 是可选的。\n\nsend(data)\n\n向服务器发送一个 HTTP 请求，包含数据，数据可以是字符串、无符号字节数组、XML DOM\
  \ 对象或 null。此方法是同步或异步的，对应于 open() 方法的 asynch 参数值。如果是同步的，该方法在请求完全加载并收到整个响应后才返回。如果是异步的，该方法立即返回。调用\
  \ send() 方法后，readyState 属性被设置为 2。请求完成加载后，readyState 属性被设置为 4。\n\nsetRequestHeader(string\
  \ headerName, string\n\n设置 HTTP 请求头。\n\nheaderValue)\n\n现在你已经了解了 Ajax 背后的一些理论并看到了它的能力，接下来你将实现一个可运行的示例——动态表单验证。\n\
  \n**安装软件**\n\nAjax 作为一种 Web 技术而非一项技术，除了支持 XMLHttpRequest 对象的浏览器外，不需要任何额外的软件。如果尚未安装，你需要安装一个\
  \ Web 浏览器，例如 IE 7 或 6，或 Netscape 6+。\n\n要开发和部署 Ajax Web 应用程序，你需要一个支持 J2EE 1.4 的应用服务器。因此，请下载并安装\
