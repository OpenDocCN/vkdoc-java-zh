  \n将 XML 转换为电子表格，\n\n反之亦然\n\n**通**常，将 XML 数据呈现为电子表格是很有用的。一个典型的电子表格（例如，Microsoft Excel\
  \ 电子表格）由以行和列网格形式表示的单元格组成，其中包含文本数据、数值数据或公式。Excel 电子表格定义了一些标准函数，例如`SUM`和`AVERAGE`，你可以在单元格中指定这些函数。Apache\
  \ Jakarta POI 项目提供了 HSSF API，用于从 XML 文档创建 Excel 电子表格，或者反向操作，解析 Excel 电子表格并将其转换为\
  \ XML。HSSF API 提供了设置 Excel 文档布局、边框设置和字体的功能。在本章中，你将学习如何通过解析 XML 文档并将 XML 文档中的数据添加到电子表格来生成一个示例\
  \ Excel 电子表格。随后，你将把 Excel 电子表格转换为 XML 文档。\n\n**概述**\n\n\n\nJakarta POI HSSF API\
  \ 提供了用于创建 Excel 工作簿并向工作簿中添加电子表格的类。使用 POI API，`HSSFWorkbook` 类代表一个工作簿，您可以在 `HSSFWorkbook`\
  \ **类中设置电子表格的字体、工作表顺序和单元格样式。您可以使用 `HSSFSheet` 类来表示电子表格。具体来说，您可以使用 `HSSFSheet` 类设置工作表布局，包括列宽、页边距、页眉、页脚和打印设置。您可以使用\
  \ `HSSFRow` 类表示电子表格中的一行，并使用 `HSSFRow` 类设置行高。`HSSFCell` 类表示电子表格行中的一个单元格，您可以使用 `HSSFCell`\
  \ 类设置单元格样式。工作簿中的电子表格、电子表格中的行以及行中的单元格的索引都是从零开始的。在本章中，我们将演示如何将示例 XML 文档转换为 Excel 电子表格，然后将该电子表格转换为\
