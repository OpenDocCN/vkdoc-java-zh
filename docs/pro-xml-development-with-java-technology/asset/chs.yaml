  \n在本章中，我们指出了将在后续章节中详细讨论的不同 API，并提供了关于 XML 和 XML Schema 的快速入门。我们还介绍了 Eclipse IDE，它用于构建和执行本书中包含的所有示例应用程序。在下一章中，我们将使用\
