  \ 章 ■ 构建基于 XML 的 Web 服务\n\n• `project`、`remove` 和 `manifest` 元素都是 `projectInfo`\
  \ 类型。\n\n• `projects` 模式元素包含关于项目列表的信息。\n\n• `projectsDetail` 模式元素包含在获取所有项目信息时，返回内容中应包含哪些类型元素的信息。\n\
  \n• `folderInfo` 模式类型包含关于文件夹的信息，并且它们嵌套在 `projectInfo` 中。\n\n• `documentInfo` 模式类型包含关于文档的信息，并且它们嵌套在\
  \ `folderInfo` 中。\n\n• `authScope` 模式元素定义了认证范围。\n\n• `authDetail` 模式元素定义了可能随 `userInfo`\
  \ 一起发送的任意认证数据。这是使用 `xsd:any` 实现可扩展性的一个示例。\n\n通过检查清单 14-7 中所示的模式，你应该能够毫无困难地解读这些模式元素或类型中每一个的结构。\n\
  \n**模式导入**\n\n你将在 WSDL 1.1 文档中引用清单 14-7 中所示的 `xsd:complexType` 定义和 `xsd:element`\
  \ 声明，因此你在 WSDL 1.1 中需要采取的第一步是\n\n\n\n文档的作用是导入模式定义，该定义假定在名为 `types.xsd` 的文件中。WSDL\
  \ 文档中的模式导入如下所示：\n\n<wsdl:types>\n\n<xsd:schema>\n\n<xsd:import\n\nnamespace=\"http://www.apress.com/xmljava/webservices/schemas\"\
  \n\nschemaLocation=\"types.xsd\" >\n\n</xsd:import>\n\n</xsd:schema>\n\n</wsdl:types>\n\
  \n**抽象消息定义**\n\n正如您已经看到的，所有 Web 服务交互都涉及消息的交换。因此，在 WSDL 1.1 文档中，您必须定义示例 Web 服务所使用的抽象消息。通过适当的\
  \ `wsdl:binding` 定义，稍后您将把这些抽象消息映射到 `soapenv:Body` 内容中。\n\n毫不意外，这些消息基于清单 14-7 所示的模式中定义的模式元素；`wsdl:part`\
  \ 的 `element` 属性表示 `types` 命名空间中的一个模式元素。例如，用于获取用户所有项目的抽象请求消息 `GetProjects` 如下所示：\n\
  \n<wsdl:message name=\"GetProjects\" >\n\n<wsdl:part element=\"types:userInfo\"\
  \ name=\"user\" ></wsdl:part>\n\n<wsdl:part element=\"types:projectsDetail\" name=\"\
  detail\" ></wsdl:part>\n\n</wsdl:message>\n\n`GetProjects` 抽象消息包含两个部分：\n\n• 第一部分基于\
  \ `types:userInfo` 模式元素。\n\n• 第二部分基于 `types:projectsDetail` 模式元素。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C14.fm Page 377 Saturday, August 12, 2006 5:18 AM\n\n第 14 章 ■ 构建基于\
  \ XML 的 Web 服务\n\n**377**\n\n每个 `wsdl:message` 元素包含一个或多个 `wsdl:part` 元素。`wsdl:message`\
  \ 名称和 `wsdl:part` 名称完全是任意的，但应尽量传达一些关于 Web 服务语义的信息。\n\n某些 `wsdl:part` 元素基于清单 14-7\
  \ 所示的模式中定义的模式元素，例如 `types:manifest`；其他 `wsdl:part` 元素则基于内置模式类型，例如 `xsd:base64Binary`，如下面的\
  \ `DownloadZip` 消息所示：\n\n<wsdl:message name=\"DownloadZip\" >\n\n<wsdl:part element=\"\
  types:manifest\" name=\"manifest\" ></wsdl:part>\n\n<wsdl:part name=\"zip\" type=\"\
  xsd:base64Binary\" ></wsdl:part>\n\n</wsdl:message>\n\n`xsd:base64Binary` 数据类型指的是采用\
  \ Base 64 编码的二进制数据。\n\n清单 14-8 展示了完整的抽象消息定义集，这些定义描述了 WSDL 1.1 文档中所有用例场景的消息。\n\n\
