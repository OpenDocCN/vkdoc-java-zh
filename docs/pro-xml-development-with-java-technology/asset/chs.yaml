  \ 章 ■ 使用 DOM Level 3 API 加载与保存 在加载部分，我们从 URI 解析了一个 XML 文档。在本节中，我们将展示如何从 `LSInput`\
  \ 对象解析示例 XML 文档。因此，创建一个 `LSInput` 对象，并为该 `LSInput` 设置一个 `InputStream`，如清单 10-16\
  \ 所示。\n\n**清单 10-16.** *创建 LSInput 对象*\n\nLSInput input = impl.createLSInput();\n\
  \nInputStream inputStream = new FileInputStream(new File(\"catalog.xml\")); input.setByteStream(inputStream);\n\
  \n你需要创建一个输入过滤器用于输入过滤。在输入过滤器中，你将在解析元素节点时打印它们，而不过滤任何节点。输入过滤器需要实现 `LSParserFilter`\
  \ 接口。因此，定义一个实现 `LSParserFilter` 接口的过滤器类，并实现该接口的 `acceptNode()`、`startElement()`\
  \ 和 `getWhatToShow()` 方法。`acceptNode()` 方法返回一个 short 值，指示节点是被接受、拒绝还是跳过。表 10-1 列出了\
  \ `acceptNode()` 方法可以返回的值。\n\n**表 10-1.** *acceptNode() 方法的返回值* **返回值**\n\n**描述**\n\
  \nFILTER_ACCEPT\n\n接受该节点\n\nFILTER_INTERRUPT\n\n中断文档过滤\n\nFILTER_REJECT\n\n拒绝该节点\n\
  \nFILTER_SKIP\n\n跳过该节点\n\n如果使用 `FILTER_ACCEPT` 接受一个节点，则该节点会被包含在解析器返回的 `Document`\
  \ 对象中。如果使用 `FILTER_SKIP` 跳过一个节点，则仅跳过指定的节点；该节点的子节点会被解析并包含在 DOM 文档中。如果使用 `FILTER_REJECT`\
  \ 拒绝一个节点，则该节点及其子节点都会被拒绝。`startElement()` 方法指定一个 `Element` 节点是被接受、拒绝还是跳过。表 10-1 也列出了\
  \ `startElement()` 方法的返回值。只有 `Element` 和该元素的属性会被输入到 `startElement()` 方法中。你可以使用 `startElement()`\
  \ 方法来修改元素的属性。`acceptNode()` 方法与 `startElement()` 方法的区别如下：\n\n• 与 `acceptNode()`\
  \ 方法相比，只有 `Element` 节点会被输入到 `startElement()` 方法，而 `acceptNode()` 方法中，除了 `Document`、`DocumentType`、`Notation`、`Entity`、`DocumentFragment`\
  \ 和 `Attribute` 节点之外的所有节点都可能被输入到该方法。属性节点可能被输入到 `LSSerializerFilter` 接口的 `acceptNode()`\
  \ 方法。\n\n• 输入到 `startElement()` 的元素节点将包含该元素的所有属性，但不包含任何子节点。输入到 `LSParserFilter`\
  \ 的 `acceptNode()` 方法的节点包含所有子节点，但不包含任何属性节点。输入到 `LSSerializerFilter` 的 `acceptNode()`\
  \ 方法的节点包含所有子节点，并且可能包含属性节点。\n\n`getWhatToShow()` 方法指定哪些节点会被输入到 `LSParserFilter.acceptNode()`\
  \ 方法。表 10-2 显示了 `getWhatToShow()` 方法的返回值。未输入到过滤器 `acceptNode()` 方法的节点会被直接包含在正在构建的\
  \ DOM 文档模型中，而不经过过滤。输入到过滤器 `acceptNode()` 方法的节点则会按照该方法中的指定被接受、跳过或拒绝。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
