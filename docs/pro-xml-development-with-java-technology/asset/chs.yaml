  \ 下午 1:42\n\n第 5 章 ■ 使用 XSLT 进行转换\n\n**121**\n\n**图 5-3.** *Chapter5 项目目录结构* **JAXP\
  \ 1.3 转换 API**\n\nTrAX 在 JAXP 1.3 中指定，并包含在 J2SE 5.0 中。你使用 TrAX API 通过将 XSLT 样式表应用于输入\
  \ XML 文档来转换 XML 文档。转换应用程序的输出可以是 XML、HTML 或文本。转换 API 被组织成以下包：\n\n• 通用转换 API 位于`javax.xml.transform`包中。\n\
  \n• 流和 URI 特定的转换 API，用于为转换应用程序指定基于流的输入和输出，位于`javax.xml.transform.stream`包中。\n\n\
  • DOM 特定的转换 API，用于为转换应用程序指定基于 DOM 的输入和输出，位于`javax.xml.transform.dom`包中。\n\n• SAX\
  \ 2 特定的转换 API，用于为转换应用程序指定基于 SAX 的输入和输出，位于`javax.xml.transform.sax`包中。\n\n表 5-1 列出了`javax.xml.transform`包中的基本类。\n\
  \n**表 5-1.** *javax.xml.transform 包中的类* **类名**\n\n**描述**\n\nTransformerFactory\n\
  \n用于生成 Transformer 对象的工厂类\n\nTransformer\n\n用于将源树转换为结果树的类\n\nSource\n\n定义输入 XML\
  \ 文档或输入 XSLT 样式表的输入源的接口\n\nResult\n\n定义转换结果树的接口\n\nOutputKeys\n\n为 Transformer 对象指定输出属性\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C05.fm 第 122 页\
  \ 2006 年 7 月 6 日星期四 下午 1:42\n\n**122**\n\n第 5 章 ■ 使用 XSLT 进行转换\n\n唯一的顺序约束是，在将转换器应用于输入源之前，输入源和结果树持有者都必须准备就绪。使用转换\
  \ API 的概念性步骤如下：\n\n**1.** 创建转换器工厂的实例。\n\n**2.** 使用该工厂基于 XSLT 样式表定义的输入源创建转换器的实例。\n\
  \n**3.** 配置转换器以进行错误处理。\n\n**4.** 从输入 XML 文档创建输入源。输入源可以基于输入流或文档对象树。\n\n**5.** 定义结果树的持有者；该持有者可以是流或文档对象。\n\
  \n**6.** 将转换器应用于输入源，以在其持有者中获取结果树。\n\n用于将源树转换为结果树的主要类是`Transformer`类。你使用`TransformerFactory`类来生成`Transformer`对象。`TransformerFactory`类通过静态方法`newInstance()`实例化：\n\
  \nTransformerFactory factory=TransformerFactory.newInstance(); 实例化的默认`TransformerFactory`实现类是`org.apache.xalan.processor.TransformerFactoryImpl`。你可以使用以下查找过程来获取`TransformerFactory`实现类：\n\
  \n**1.** 使用系统属性`javax.xml.transform.TransformerFactory`。\n\n**2.** 使用 JRE 目录中`lib/jaxp.properties`文件中的`javax.xml.transform.TransformerFactory`属性值。\n\
  \n\n\n**3.** 使用 Services API 从 `META-INF/services/javax.xml.transform.TransformerFactory`\
  \ 文件中获取类名。\n\n**4.** 使用平台默认的 `TransformerFactory` 实例。\n\n你可以通过 `newTransformer(Source\
  \ xsltSource)` 方法从 `TransformerFactory` 对象获取 `Transformer` 对象。要应用 XSLT 样式表到 XML\
  \ 文档，请使用 `StreamSource` 类获取 XSLT `Source` 对象，如清单 5-12 所示。\n\n**清单 5-12.** *创建 Transformer\
  \ 对象*\n\n```java\nStreamSource xsltSource = new StreamSource(new File(\"sort.xslt\"\
  ));\nTransformer transformer = factory.newTransformer(xsltSource);\n```\n\n你也可以从\
  \ `Templates` 对象获取 `Transformer` 对象，`Templates` 对象是 XSLT 样式表中转换操作的表示。要使用 `Templates`\
  \ 接口获取 `Transformer` 对象，请先从 `TransformerFactory` 对象创建 `Templates` 对象，再从 `Templates`\
  \ 对象创建 `Transformer` 对象，如清单 5-13 所示。\n\n**清单 5-13.** *从 Templates 对象创建 Transformer\
  \ 对象*\n\n```java\nTemplates templates = factory.newTemplates(xsltSource);\nTransformer\
  \ transformer = templates.newTransformer();\n```\n\n你可以使用 `setOutputProperty(String\
  \ name, String value)` 方法在 `Transformer` 对象上设置输出属性。`Transformer` 输出的字符串常量在 `OutputKeys`\
  \ 类中指定。表 5-2 列出了 `OutputKeys` 类中指定的字符串常量。\n\n**表 5-2.** *输出属性*\n\n| **静态字段** | **描述**\
  \ |\n| --- | --- |\n| `DOCTYPE_PUBLIC` | 指定 DOCTYPE 声明的公共标识符。 |\n| `DOCTYPE_SYSTEM`\
  \ | 指定 DOCTYPE 标识符的系统标识符。 |\n| `ENCODING` | 指定 XML 文档的编码。 |\n| `INDENT` | 值可以是 `yes`\
  \ 或 `no`。如果 `INDENT` 属性设置为 `yes`，则输出会缩进。 |\n| `METHOD` | 值可以是 `xml`、`html` 或 `text`。也可以指定其他非命名空间的值。指定用于构建结果树的方法。\
  \ |\n| `OMIT_XML_DECLARATION` | 值可以是 `yes` 或 `no`。要从输出 XML 文档中省略 XML 声明，请将值指定为 `yes`。\
  \ |\n| `VERSION` | 指定输出版本。如果输出方法设置为 `xml`，默认版本为 1.0。如果输出方法设置为 `html`，默认版本为 4.0。\
  \ |\n\n你可以向 `Transformer` 对象注册一个 `ErrorListener` 以输出转换错误。\n\n要为 `Transformer` 注册错误处理，请创建一个\
  \ `ErrorListener` 的实现类，如清单 5-14 所示。\n\n**清单 5-14.** *ErrorListener 实现类*\n\n```java\n\
  private class ErrorListenerImpl implements ErrorListener {\n    public TransformerException\
  \ e = null;\n\n    public void error(TransformerException exception) {\n       \
  \ this.e = exception;\n    }\n\n    public void fatalError(TransformerException\
  \ exception) {\n        this.e = exception;\n    }\n\n    public void warning(TransformerException\
  \ exception) {\n        this.e = exception;\n    }\n}\n```\n\n要向 `Transformer` 对象注册错误处理器，请创建一个错误处理器对象。使用\
  \ `setErrorListener(ErrorListener)` 方法，将错误处理器注册到 `Transformer` 对象，如清单 5-15 所示。\n\
  \n**清单 5-15.** *设置 ErrorListener*\n\n```java\nErrorListenerImpl errorHandler = new\
  \ ErrorListenerImpl();\ntransformer.setErrorListener(errorHandler);\n```\n\nXML\
  \ 源树通过 `transform(Source source, Result result)` 方法转换为结果树。`Source` 对象可以是 `DOMSource`、`SAXSource`\
  \ 或 `StreamSource`。`Result` 对象可以是 `DOMResult`、`SAXResult` 或 `StreamResult`。\n\n\
  要使用 `DOMSource` 对象，请从 `DocumentBuilder` 解析器类获取 `Document` 对象，如清单 5-16 所示。\n\n**清单\
  \ 5-16.** *创建 DOMSource 对象*\n\n\n\n`DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();`\
  \  \n`DocumentBuilder builder = factory.newDocumentBuilder();`\n\n`Document document\
  \ = builder.parse(new File(\"catalog.xml\"));`  \n`DOMSource domSource = new DOMSource(document);`\n\
  \n要输出到 `StreamResult`，请创建一个 `StreamResult` 对象。然后使用 `transform()` 方法转换输入的 XML 文档，如清单\
  \ 5-17 所示。\n\n**清单 5-17.** *将源树转换为结果树*  \n`StreamResult streamResult = new StreamResult(System.out);`\n\
  \n`transformer.transform(domSource, streamResult);`\n\n**TrAX 应用程序**\n\n在上一节中，我们讨论了\
