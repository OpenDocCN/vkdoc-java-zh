  \n\n需要特别指出的是，WSDL 1.1 文档并未定义服务语义。服务语义是通过提供方实体与请求方实体之间的口头或书面交流，以隐式或显式的方式定义的。在某些情况下，服务语义可能被定义为提供方实体与请求方实体之间具有法律约束力的合同。\n\
  \n**Web 服务架构模型**\n\nWeb 服务架构是一个多层面的架构。为简化问题，最好在独立的架构模型背景下审视该架构的每个层面。因此，我们将分别介绍以下三种\
  \ Web 服务架构模型：\n\n• 面向消息模型\n\n• 面向服务模型\n\n• 面向资源模型\n\n**面向消息模型**\n\nWeb 服务与其客户端之间的所有交互都基于封装在\
  \ SOAP 1.1 消息中的 XML 内容交换，这些消息在 HTTP 1.0/1.1 消息内部传输。面向消息模型关注的是这些基于 XML 的消息的结构、处理和传输。\n\
  \n然而，该模型并不关心 SOAP 1.1 消息中特定于 Web 服务的内容，也不关心基于 Web 的服务的语义。通过面向消息模型的视角，您可以观察到以下关键点：\n\
  \n• 在使用 Web 服务期间，所有代理之间的对话都建立在发送方代理与接收方代理之间单向交换 SOAP 1.1 消息的基础上。当然，某一时刻的接收方在下一时刻可能成为发送方。\n\
  \n• SOAP 1.1 消息包含在一个信封中。每个信封包含一个可选的标头和一个必需的主体。\n\n• SOAP 1.1 消息通过 HTTP 消息传输在发送方和接收方之间传递。\n\
  \n消息的可靠传递是消息传输层关注的问题。\n\n• 接收方必须拥有唯一的 HTTP URI 地址，以便发送方能够唯一标识接收方。\n\n• 您可以在基本的单向交换模式之上定义复杂的\
  \ Web 服务消息交换模式。\n\n图 14-2 总结了面向消息模型。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
