  \ XML 的 WEB 服务\n\n**363**\n\nSOAP 1.1 是一个基于 XML 的消息传递框架，用于在基于网络的分布式环境中对等节点之间交换结构化信息。SOAP\
  \ 被设计为可扩展的。所谓*可扩展*，我们的意思是，可以在基本的 SOAP 消息传递框架之上分层添加更高级别的服务，例如安全或事务，而无需更改 SOAP 消息的底层结构规则。SOAP\
  \ 不暗示任何特定的语义模型。由于它基于 XML、可扩展且不暗示任何特定的语义模型，因此非常适合用于 Web 服务消息传递。\n\n为了便于讨论，我们将 `soapenv`\
  \ 前缀与 `http://schemas.xmlsoap.org/soap/envelope/` 命名空间关联起来，当然要记住 `soapenv` 前缀的选择是完全任意的。\n\
  \n基本概念\n\nSOAP 1.1 消息传递框架最重要的概念如下：\n\n*   SOAP 1.1 消息是一种单向消息，从初始发送者到最终接收者，可能经过中间节点。\n\
  *   SOAP 1.1 消息包含在一个信封中。\n*   信封包含一个可选的头部和一个必需的正文。\n*   头部的子元素，也称为*头部块*，可以针对消息路径上的任何节点。\n\
  *   应用程序数据作为格式良好的 XML 内容包含在正文元素中。\n*   正文内容通常针对最终接收者。\n\n您将更深入地了解 SOAP 1.1 消息的内部结构。\n\
  \nSOAP 1.1 信封\n\nSOAP 1.1 消息是一个 XML 文档，其根元素是 `soapenv:Envelope`。符合 WS-I BP 1.1 的\
  \ SOAP 1.1 消息 XML 文档的结构必须遵守以下规则：\n\n*   文档不得包含任何处理指令或文档类型声明。如果您不确定这些是什么，请回顾第 1 章中的\
  \ XML 入门。\n*   `soapenv:Envelope` 元素不应包含命名空间声明 `xmlns:soapenv=\"http://schemas.xmlsoap.org/soap/envelope/\"\
  `。\n*   `soapenv:Envelope` 可以有一个可选的 `soapenv:Header` 子元素。如果存在，`soapenv:Header` 必须是\
  \ `soapenv:Envelope` 元素的第一个直接子元素。`soapenv:Header` 的所有直接子元素必须具有命名空间限定。\n*   `soapenv:Envelope`\
  \ 必须有一个必需的 `soapenv:Body` 元素。如果存在 `soapenv:Header` 元素，则它必须跟在 `soapenv:Header` 元素之后；否则，它必须是\
  \ `soapenv:Envelope` 元素的第一个直接子元素。`soapenv:Body` 元素的直接子元素必须具有命名空间限定。\n*   `soapenv:Body`\
  \ 必须是 `soapenv:Envelope` 元素的最后一个子元素。\n*   `soapenv:Envelope`、`soapenv:Header` 和\
  \ `soapenv:Body` 不得包含任何在 `http://schemas.xmlsoap.org/soap/envelope/` 命名空间中限定的属性。\n\
  \n清单 14-1 和 14-2 中显示的 SOAP 1.1 消息是符合 WS-I BP 1.1 的消息示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
