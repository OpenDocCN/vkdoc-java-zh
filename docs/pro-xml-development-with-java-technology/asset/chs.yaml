  **XML 1.0 入门**\n\nXML10 是一种基于文本的标记语言，是不同应用程序之间交换数据的事实行业标准。XML 为构成格式良好的文档定义了精确的语法规则。XML\
  \ 1.0 是 W3C 推荐标准（http://www.w3.org/TR/2004/REC-xml-20040204/），XML 1.1 是 W3C 推荐标准（http://www.w3.org/TR/xml11/）。\n\
