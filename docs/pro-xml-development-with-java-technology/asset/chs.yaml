  <xsd:attribute name=\"lastUpdated\"\n\ntype=\"xsd:dateTime\" use=\"optional\" >\n\
  \n</xsd:attribute>\n\n</xsd:complexType>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
