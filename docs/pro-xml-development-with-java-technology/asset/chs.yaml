  XML 与 Java 入门\n\n\n\n**可扩展标记语言（XML）** 基于简单且平台无关的规则，用于表示结构化文本信息。XML 的平台无关性使其成为在不同应用程序之间交换结构化文本信息的理想格式。因此，XML\
  \ 的核心在于互操作性。\n\nXML 1.0 于 1998 年成为 W3C¹ 推荐标准。Sun 公司于 1995 年正式推出 Java 编程语言，短短几年内，Java\
