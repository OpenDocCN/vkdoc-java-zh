  \ ■\n\n构建基于 XML 的 Web 服务\n\n**当**你想从亚马逊购买一本书时 1，你会访问亚马逊的网站，找到你的书并下单。这很简单。现在，想象你是一个需要从亚马逊大量订购书籍的组织，比如一个大型大学图书馆。你当然可以手动进行图书选择。\n\
  \n但是，如果亚马逊提供一个网络服务，计算机程序可以根据你的选择标准自动搜索、选择书籍并将其添加到购物车，那会怎样？事实证明，亚马逊确实提供了这样的服务！\n\n\
  一般来说，这种网络服务被称为 *Web 服务*。\n\nWeb 服务存在的根本原因是实现松散耦合应用程序之间的*互操作性*。所谓*松散耦合*，是指交互的应用程序是独立的应用程序，并且应用程序之间的交互通过基于标准的协议进行。\n\
  \n\n\n本章整合了全书中的多个概念，并展示了一个真实的 Web 服务示例。呈现真实示例的挑战之一在于，构建它所使用的技术无法被整齐地限定在一本书所涵盖的主题范围内。因此，这个真实的\
  \ Web 服务示例至少部分地基于本书范围之外的技术，这并不令人意外。当然，当我们涉及此类技术时，会告知你，并就如何进一步学习它们提供建议。\n\n系好安全带。这将是一段颠簸的旅程！\n\
  \n**Web 服务概述**\n\n我们在本书开头指出，XML 是一种独立于平台的表示结构化文本信息的手段，这使其成为松散耦合软件应用之间交换信息的理想载体。由于\
  \ Web 服务本质上是一种基于标准的互操作性方法，因此 Web 服务在许多方面使用 XML 也就顺理成章了。\n\n本章对 Web 服务的讨论基于以下 W3C\
  \ 建议、备注以及其他互操作性标准：\n\n• 基于 XML 的技术解决了 Web 服务架构的关键技术问题。我们在本书第一部分中介绍的 XML 1.0、XML\
  \ Schema 和 XPath 1.0，在 Web 服务技术中扮演着基础性角色。\n\n• SOAP 1.12 定义了一个基于 XML 的消息传递框架，用于\
  \ Web 服务交互。SOAP 1.23 是该消息传递框架的最新版本。在本章中，我们将主要介绍 SOAP 1.1。不过，我们也会指出 SOAP 1.1 与 SOAP\
  \ 1.2 之间的差异。\n\n1. Amazon 是一家在线销售图书及其他商品的商家，网址为 http://www.amazon.com。\n2. SOAP\
  \ 1.1 W3C 备注可在 http://www.w3.org/TR/2000/NOTE-SOAP-20000508/ 获取。\n3. SOAP 1.2 W3C\
  \ 建议可在 http://www.w3.org/TR/soap12 获取。\n\n**353**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C14.fm Page 354 Saturday, August 12, 2006 5:18 AM\n\n**354**\n\n第 14\
  \ 章 ■ 构建基于 XML 的 Web 服务\n\n• 带附件的 SOAP 消息 4 定义了如何将 SOAP 1.1 消息承载在 Multipurpose Internet\
  \ Mail Extensions (MIME) 多部分相关消息中，以便保留正常的 SOAP 1.1 消息处理。我们将在本章中介绍带附件的 SOAP 消息。\n\
  \n• WSDL 1.15 是一种基于 XML 的语言，用于正式描述 Web 服务。在撰写本书时，WSDL 1.1 被广泛使用，而 WSDL 2.0 是候选推荐标准。在本章中，我们将仅介绍\
  \ WSDL 1.1。\n\n• 尽管有 WSDL 1.1 和 SOAP 1.1，但使用 Web 服务的应用程序之间的*互操作性*仍然是一个问题。为了缓解这个问题，Web\
  \ 服务互操作性组织 (WS-I) 定义了基本配置文件 (BP)6 1.1 规范，该规范试图澄清与 Web 服务相关的 W3C 备注和建议。我们将在本章中介绍\
  \ WS-I BP 1.1。\n\n• 通用描述、发现和集成 (UDDI) 是 WS-I BP 1.1 认可的 Web 服务注册中心。UDDI 注册中心类似于电话白页或黄页。应用程序可以查询\
  \ UDDI 注册中心以了解特定 Web 服务（就像你查询在线白页网站一样），并作为响应，获取正式描述该 Web 服务的 WSDL 1.1 文档的位置（就像你从白页查询中获得电话号码一样）。使用\
  \ UDDI 进行 Web 服务注册和发现是一个高级主题，超出了本书的范围。不过，我们将在 Web 服务架构的背景下讨论 UDDI。\n\n本章涵盖的所有与 Web\
  \ 服务相关的备注和建议，均受基于 XML 的 Web 服务 Java API (JAX-WS) 2.07 规范支持，该规范在 Java 平台企业版 8 (Java\
  \ EE) 5 中实现。具体来说，JAX-WS 2.0 支持 SOAP 1.1、带附件的 SOAP 消息、WSDL 1.1 和 WS-I BP 1.1。\n\n\
  \n\n**理解 Web 服务架构**\n\n在接下来的章节中，我们将讨论 Web 服务的整体架构，首先定义基本的 Web 服务概念，然后介绍各种 Web 服务架构模型。\n\
  \n**基本 Web 服务概念**\n\n首先，我们将了解一些基本的 Web 服务概念，这些概念将帮助你理解后续的讨论。\n\nWeb 服务客户端视角\n\n\
  从客户端的角度来看，Web 服务具有以下几个关键方面：\n\n• 一个 Web 服务通过 WSDL 1.1 文档进行正式描述。我们将在“理解 WSDL 1.1”一节中详细讨论\
