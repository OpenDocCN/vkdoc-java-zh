  ```\n\n如果你检查清单 14-5 中的响应消息，会注意到它是一个 MIME 多部分相关消息。第一部分包含一个 SOAP 1.1 消息文档，第二部分包含与下载的\
  \ ZIP 文件关联的二进制内容（我们已从清单 14-5 中删除了二进制内容）。\n\nSOAP 1.1 消息部分和相关部分构成了一个 SOAP 1.1 消息包。在一个\
  \ SOAP 1.1 消息包中，核心部分包含 SOAP 1.1 消息，一个或多个相关部分包含附件。在“理解 WSDL 1.1”一节中，你将看到抽象的 WSDL\
  \ 1.1 消息定义如何绑定到具体的 MIME 多部分相关消息。\n\n**理解 WSDL 1.1**\n\n每当需要构建一个 Web 服务时，第一步是在 WSDL\
  \ 1.1 文档中正式描述该 Web 服务。虽然可以从 Java 类逆向工程生成 WSDL 1.1 文档，但我们认为，这种逆向工程仅适用于构建简单的 Web 服务，或许用于快速原型设计。逆向工程选项严重限制了描述非平凡、真实世界\
  \ Web 服务所需的灵活性。因此，本章不再进一步讨论它。\n\n接下来，我们描述 WSDL 1.1 文档的整体结构。\n\n**WSDL 1.1 文档结构**\n\
  \n\n\nWSDL 1.1 文档是一种符合 WSDL 1.1 模式的 XML 文档，该模式位于 http://schemas.xmlsoap.org/wsdl/。WSDL\
  \ 1.1 模式位置还定义了 WSDL 1.1 命名空间。假设 `wsdl` 前缀代表 WSDL 1.1 命名空间，则 WSDL 1.1 文档的根元素是 `wsdl:definitions`。\n\
  \n`wsdl:definitions` 元素包含以下子元素：\n\n• `wsdl:types` 元素使用 XML Schema 语言定义数据类型。换句话说，`wsdl:types`\
  \ 元素的 XML 内容就是一个模式定义。\n\n• `wsdl:message` 元素定义 Web 服务交互中使用的抽象消息类型。每个 `wsdl:message`\
  \ 由一个或多个 `wsdl:part` 元素组成，其中每个 `wsdl:part` 基于在 `wsdl:types` 中定义的模式元素或模式类型。`wsdl:definitions`\
  \ 元素可以包含一个或多个 `wsdl:message` 元素。\n\n• `wsdl:portType` 元素定义抽象服务接口。每个 `wsdl:portType`\
  \ 元素可以包含一个或多个 `wsdl:operation` 元素。但是，`wsdl:portType` 中的每个 `wsdl:operation` 元素必须具有唯一的\
  \ `name` 属性值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C14.fm\
  \ Page 371 Saturday, August 12, 2006 5:18 AM\n\n第 14 章 ■ 构建基于 XML 的 Web 服务\n\n**371**\n\
  \n• `wsdl:operation` 元素是服务操作的抽象定义。每个 `wsdl:operation` 包含 `wsdl:input`、`wsdl:output`\
  \ 和 `wsdl:fault` 元素的组合；这些元素中的每一个都是消息组件，是 `wsdl:operation` 使用的消息交换模式的一部分。\n\n• 每个\
  \ `wsdl:input`、`wsdl:output` 和 `wsdl:fault` 元素都基于一个 `wsdl:message` 元素。如果 `wsdl:operation`\
  \ 使用请求-响应消息交换模式，则必须指定一个 `wsdl:input` 元素和一个 `wsdl:output` 元素，并且可能指定一个或多个 `wsdl:fault`\
  \ 元素。如果 `wsdl:operation` 使用单向消息交换模式，则必须指定一个单独的 `wsdl:input` 元素。\n\n• 由于 `wsdl:portType`\
  \ 元素定义了抽象服务接口，因此需要将其映射到消息协议和传输协议。每个 `wsdl:portType` 在 `wsdl:binding` 元素（`wsdl:definitions`\
  \ 的子元素）中被递归地映射到消息协议和传输协议。\n\n• 每个 `wsdl:portType` 抽象接口通过 `wsdl:port` 元素映射到具体的网络端点地址。`wsdl:port`\
  \ 元素定义在 `wsdl:service` 元素（`wsdl:definitions` 的子元素）内。\n\n清单 14-6 展示了 WSDL 1.1 文档的基本结构。\n\
  \n**清单 14-6.** *WSDL 1.1 文档的基本结构*\n\n<wsdl:definitions\n\n>\n\n<wsdl:types>\n\n\
  <!-- 模式元素或模式类型 -->\n\n</wsdl:types>\n\n<!-- 一个或多个抽象消息类型 -->\n\n<wsdl:message name=\"\
  ...\">\n\n<!-- 一个或多个消息部分 -->\n\n<wsdl:part element=\"...\" name=\"...\" type=\"\
  ...\">\n\n<!-- 基于模式元素或模式类型 -->\n\n</wsdl:part>\n\n</wsdl:message>\n\n<!-- 一个或多个抽象端口类型接口\
  \ -->\n\n<wsdl:portType name=\"...\">\n\n<!-- 一个或多个抽象操作，但名称必须唯一 -->\n\n<wsdl:operations\
  \ name=\"...\">\n\n<!-- 请求必须有一个输入 -->\n\n<wsdl:input message=\"...\" name=\"...\"\
  >\n\n</wsdl:input>\n\n<!-- 可选响应包含一个输出元素\n\n和零个或多个故障元素 -->\n\n<wsdl:output message=\"\
  ...\" name=\"...\">\n\n</wsdl:output>\n\n<wsdl:fault message=\"...\" name=\"...\"\
  >\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C14.fm Page\
  \ 372 Saturday, August 12, 2006 5:18 AM\n\n**372**\n\n第 14 章 ■ 构建基于 XML 的 Web 服务\n\
  \n</wsdl:fault>\n\n</wsdl:operations>\n\n</wsdl:portType>\n\n<wsdl:binding name=\"\
  ...\" type=\"...\">\n\n<!-- 将端口类型映射到消息协议\n\n和传输协议 -->\n\n</wsdl:binding>\n\n<wsdl:service\
  \ name=\"...\" >\n\n<!-- 一个或多个端口 -->\n\n<wsdl:port binding=\"...\" name=\"...\"\
  >\n\n<!-- 将端口类型绑定绑定到网络端点地址 -->\n\n</wsdl:port>\n\n</wsdl:service>\n\n</wsdl:definitions>\n\
  \n在下一节中，你将看到一个 WSDL 1.1 文档的示例。\n\n\n\n**WSDL 1.1 文档示例**\n\n我们认为，在构建 Web 服务时，唯一正确的起点就是首先构建一个\
  \ WSDL 1.1 文档。为了构建实现所有用例场景的示例 Web 服务，您需要构建一个正式描述该示例 Web 服务的 WSDL 1.1 文档。我们将逐步向您展示如何操作；并在以下章节中详细描述这些步骤：**1.**\
  \ 声明相关命名空间。\n\n**2.** 在单独的文档中定义模式。\n\n**3.** 将模式导入 WSDL 1.1 文档。\n\n**4.** 定义 Web\
  \ 服务使用的消息类型。\n\n**5.** 定义 Web 服务接口（端口类型），包括所有操作。\n\n**6.** 定义端口类型到 SOAP 1.1/HTTP\
  \ 消息传递和传输协议的绑定。\n\n**7.** 定义将 Web 服务绑定绑定到端点地址的端口。\n\n**命名空间声明**\n\n您需要采取的第一步是声明本文档中所需的所有命名空间：\n\
  \n• WSDL 1.1 语言构造在命名空间 http://schemas.xmlsoap.org/wsdl/ 中定义，您将使用 `wsdl` 前缀与此命名空间关联。\n\
  \n• 文档的目标命名空间将是 http://www.apress.com/xmljava/webservices/definitions，这完全是任意的。您将使用\
  \ `defs` 前缀与此命名空间关联。\n\n• XML Schema 语言的命名空间是 http://www.w3.org/2001/XMLSchema，您将使用\
  \ `xsd` 前缀与此命名空间关联。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C14.fm\
  \ 第 373 页 2006 年 8 月 12 日，星期六，上午 5:18\n\n第 14 章 ■ 构建基于 XML 的 Web 服务\n\n**373**\n\
  \n• MIME 构造的命名空间是 http://schemas.xmlsoap.org/wsdl/mime/，您将使用 `mime` 前缀与此命名空间关联。\n\
  \n• WSDL 1.1 到 SOAP 的绑定在命名空间 http://schemas.xmlsoap.org/wsdl/soap/ 中指定，并使用 `soap`\
  \ 前缀。\n\n• 您将定义自己的模式类型，并将使用命名空间 http://www.apress.com/xmljava/webservices/schemas\
  \ 来定义这些模式类型。您将使用 `types` 前缀与此命名空间关联。\n\n包含相关命名空间声明的 WSDL 1.1 文档的根元素 `wsdl:definitions`\
  \ 如下所示：\n\n```xml\n<?xml version='1.0' encoding='UTF-8' ?>\n\n<wsdl:definitions\n\
  \ntargetNamespace=\"http://www.apress.com/xmljava/webservices/definitions\"\n\n\
  >\n\n</wsdl:definitions>\n```\n\n**模式定义**\n\n在编写任何 WSDL 1.1 文档（即使是最简单的文档）时，您都需要模式数据类型。虽然不是必须的，但最好将这些数据类型定义在单独的模式文件中，并在\
  \ WSDL 1.1 文档中导入该模式文件。强烈建议将模式定义与 WSDL 1.1 文档分离，这既有利于维护，也有利于重用。对于示例 Web 服务，请在名为 `types.xsd`\
  \ 的单独文件中定义如清单 14-7 所示的模式定义。\n\n**清单 14-7.** *types.xsd 中示例 Web 服务的模式类型*\n\n```xml\n\
