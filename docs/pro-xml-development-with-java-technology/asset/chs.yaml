  \ 要编辑 `system.xml`，你当然需要解压 `xindice.war` 归档文件，编辑该文件，然后重新构建归档文件。\n\n•   第二个选项是设置一个名为\
  \ `xindice.db.home` 的 Java 系统属性为你想要的数据库位置。你可以在用于启动 JBoss 应用服务器的 `<jboss-4.0.2>\\\
  bin\\run` 批处理文件中设置此属性。\n\n要打开默认的 Xindice 数据库，你需要启动 JBoss 服务器。通过 `<jboss-4.0.2>\\\
