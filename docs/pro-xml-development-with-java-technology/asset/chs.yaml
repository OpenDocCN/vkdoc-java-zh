  \ 章 ■ 在关系型数据库中存储 XML**\n\n**存储 XML 文档**\n\n在本节中，我们将讨论如何将 XML 文档存储到数据库表中类型为 `XML`\
  \ 的列中。此过程的关键步骤如下：\n\n**1.** 创建一个 `SQLXML` 对象。\n\n**2.** 使用一个 XML 文档初始化该 `SQLXML`\
  \ 对象。\n\n**3.** 创建一个包含 `XML` 类型列的数据库表。\n\n**4.** 创建一个 `PreparedStatement`，用于将 `SQLXML`\
  \ 对象存储到 `XML` 类型的列中。\n\n**5.** 执行该 `PreparedStatement` 以存储 `SQLXML` 对象。\n\n\n\n\
  在 XMLToSQL.java 应用程序中，你需要导入 `java.sql` 和 `javax.xml.stream` 包，其中 `javax.xml.stream`\
  \ 包包含处理 SQLXML 对象所需的 `XMLStreamWriter` 和 `XMLStreamReader` 接口。要创建要存储在 XML 类型列中的\
  \ XML 文档，首先需要创建一个 SQLXML 对象。你可以使用 `createSQLXML()` 方法从 Connection 对象创建 SQLXML 对象，如下所示：\n\
  \n`SQLXML sqlXML=connection.createSQLXML();`\n\n使用 `createSQLXML()` 方法创建的 SQLXML\
