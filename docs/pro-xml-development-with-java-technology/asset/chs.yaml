  Event Type:END_DOCUMENT\n\n**迭代器 API**\n\n`XMLEventReader` 对象使用对象事件迭代器解析 XML 文档，并为每个解析事件生成一个\
  \ `XMLEvent` 对象。要创建 `XMLEventReader` 对象，首先需要使用静态方法 `newInstance()` 创建一个 `XMLInputFactory`\
  \ 对象，然后使用 `createXMLEventReader` 方法从 `XMLInputFactory` 对象获取一个 `XMLEventReader` 对象，如清单\
  \ 2-25 所示。\n\n**清单 2-25.** *创建 XMLEventReader 对象* XMLInputFactory inputFactory=XMLInputFactory.newInstance();\
  \ InputStream input=new FileInputStream(new File(\"catalog.xml\")); XMLEventReader\
  \ xmlEventReader = inputFactory.createXMLEventReader(input); `XMLEvent` 对象表示 StAX\
  \ 中的 XML 文档事件。你可以使用 `XMLEventReader` 对象的 `nextEvent()` 方法获取下一个事件。`XMLEventReader`\
  \ 对象的 `getEventType()` 方法返回事件类型，如下所示：\n\nXMLEvent event=xmlEventReader.nextEvent();\n\
  \nint eventType=event.getEventType();\n\n\n\n表 2-13 中列出的 XMLStreamReader 对象的事件类型，也是使用\
  \ XMLEventReader 对象生成的事件类型。XMLEventReader 接口中的 isXXX()方法会在事件类型与 isXXX()方法对应的类型时返回布尔值。例如，如果事件类型为\
  \ START_DOCUMENT，则 isStartDocument()方法返回 true。你可以使用相关的 XMLStreamReader 方法来处理应用程序感兴趣的事件类型。\n\
  \n**总结**\n\n你可以使用三种方法之一来解析 XML 文档：DOM、推式或拉式。\n\nDOM 方法提供随机访问以及操作文档元素和属性的完整能力；然而，这种方法消耗的内存最多。此方法最适合于需要\
  \ XML 结构和内容的内存模型，以便应用程序能够轻松操作 XML 文档结构和内容的情况。需要可视化 XML 文档并通过用户界面操作文档的应用程序可能会发现此\
  \ API 与其应用目标高度相关。JAXP 1.3 中包含的 DOM Level 3 API 实现了这种方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C02.fm Page 63 Wednesday, June 28, 2006 6:38 AM\n\n第 2 章 ■ 解析 XML 文档\n\
  \n**63**\n\n推式方法基于一个简单的事件通知模型，解析器同步地传递解析事件，因此应用程序可以通过实现回调处理程序接口来处理这些事件。SAX 2.0 API\
  \ 最适合于核心目标如下所述的情况：快速解析 XML 文档，确保其格式良好且有效，并在解析文档时提取文档中包含的内容信息。值得注意的是，DOM API 实现可以在内部使用基于\
  \ SAX 2.0 API 的解析器来解析 XML 文档并构建 DOM 树，但并非必须如此。JAXP 1.3 中包含的 SAX 2.0 API 实现了这种方法。\n\
  \n拉式方法为应用程序提供了对文档解析事件处理方式的完全控制，并提供了基于游标的方法和基于迭代器的方法来控制解析事件的流程。此方法最适合处理通过网络连接流式传输的\
  \ XML 内容。此外，此 API 对于将 XML 文档编组和解组为 Java 类型也很有用。此 API 的主要应用领域包括与 Web 服务相关的消息处理和 XML\
  \ 到 Java 的绑定。J2SE 6.0 中包含的 StAX API 实现了这种方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
