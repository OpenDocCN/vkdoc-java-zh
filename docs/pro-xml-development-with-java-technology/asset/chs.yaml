  \ XML 内容会被原封不动地复制到结果树中；到目前为止，一切顺利。然而，我们猜想，此时你想知道转换是如何具体指定的，以及处理器是如何处理它们的。那么，接下来让我们深入探讨这些细节。\n\
  \n**XSLT 处理算法**\n\n你通过模板和指令的组合来指定 XSLT 转换。一个模板结构由目标文档中的指令和字面内容组成。你可以在模板结构内部或外部定义指令。例如，以下来自清单\
  \ 5-3 样式表的模板包含一条单独的 `<xsl:value-of select=\"@title\" />` 指令：\n\n<xsl:template match=\"\
  journal\" >\n\n<xsl:value-of select=\"@title\" />\n\n</xsl:template>\n\n每个模板都与一个特定的模式相关联，该模式由\
  \ `match` 属性的值给出。前面显示的简单模板的模式是 `journal`。这意味着该模板适用于所有名称为 `journal` 的节点。\n\n每条指令都作用于从源树中选择的一个节点集。当要求\
  \ XSLT 处理器使用 XSLT 样式表转换源文档时，处理器基本上遵循以下算法：\n\n**1.** 它将样式表和源文档解析成各自的节点树。\n\n**2.**\
  \ 它执行一条隐式指令 `<xsl:apply-templates select=\"/\" />`。该指令有一个 `select` 属性，其 XPath 表达式值为\
  \ `/`。此 XPath 表达式求值得到一个包含源树文档元素的节点集。因此，该指令选择源树文档元素作为当前节点集，并扫描样式表节点树，寻找一个 `match`\
  \ 属性与源树文档元素匹配的 `xsl:template` 指令。如果找到这样的模板，则该模板被实例化为结果树根节点的模板。如果没有找到这样的模板，另一条隐式规则会继续递归处理，选择根节点的每个子节点，并为每个选中的子节点寻找匹配的模板（依此类推，递归进行），直到找到匹配的模板。例如，在清单\
  \ 5-3 的示例样式表中，`<xsl:template match=\"/\" >` 模板将与隐式指令匹配。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C05.fm 第 115 页 2006 年 7 月 6 日，星期四，下午 1:42\n\n第 5 章 ■ 使用 XSLT 进行转换\n\
  \n**115**\n\n**3.** 从这一点开始，随着每个模板在结果树中被实例化，它又会依次被处理。模板中的字面元素被原封不动地复制到结果树中。对于在已实例化模板中找到的每个\
  \ XSLT 指令，处理将按照下一步所述继续进行。例如，在清单 5-3 的 `<xsl:template match=\"/\" >` 模板中，HTML 元素是原封不动复制的字面内容，而\
  \ `<xsl:for-each select=\"catalog/journal\" >` 是一个 XSLT 指令的示例，它将继续进行下一步所述的处理。\n\n\
  **4.** 对于在已实例化模板中找到的每个 `xsl:apply-templates` 指令，使用 `select` 属性的 XPath 表达式值从源树中选择一个节点集。对于所选节点集中的每个节点，处理器扫描样式表以寻找匹配的\
  \ `xsl:template`，如果找到 `xsl:template`，则将其实例化到结果树中，并继续处理。如果为当前节点集中的某个节点找到了多个匹配的 `xsl:template`，则视为错误。但是，处理器可能会选择忽略该错误并选取其中一个匹配的模板进行实例化。这可能是不同处理器之间行为不一致的一个来源。请注意，`xsl:template`\
  \ 匹配的算法并不要求 `select` 属性值和 `match` 属性值必须相同。例如，在清单 5-3 的 `<xsl:apply-templates select=\"\
  .\" >` 指令中，`select` 值与 `<xsl:template match=\"journal\" >` 模板匹配，如下一步所述。\n\n**5.**\
  \ 对于在已实例化模板中找到的每个 `xsl:for-each` 指令，使用 `select` 属性的 XPath 表达式值从源树中选择一个节点集。对于所选节点集中的每个节点，`xsl:for-each`\
  \ 指令的主体被实例化到结果树中并进行处理。例如，清单 5-3 中的 `<xsl:for-each select=\"catalog/journal\" >`\
  \ 指令遍历所有 `journal` 元素的节点集，并为每个 `journal` 元素执行 `for` 循环的主体。`for` 循环的主体是 `<xsl:apply-templates\
  \ select=\".\" >` 指令。该指令的 `select` 值与 `<xsl:template match=\"journal\" >` 模板匹配，因为该指令是在\
  \ `xsl:for-each` 循环中执行的，循环的每次迭代都会选择不同的 `journal` 元素。而 `<xsl:template match=\"journal\"\
  \ >` 中的 `<xsl:value-of select=\"@title\" />` 指令会打印每个 `journal` 的 `title` 属性的值。\n\
  \n有了对处理算法的这种基本理解，你就可以准备查看转换是如何指定的了，接下来你将进行这一步骤。\n\n**XSLT 语法和语义**\n\n以下各节重点介绍 XSLT\
  \ 的语法和语义。\n\nxsl:stylesheet 元素\n\n\nXSLT 样式表中的根元素是`xsl:stylesheet`，其中`xsl`是与 XSLT\
  \ 命名空间 URI `http://www.w3.org/1999/XSL/Transform`关联的前缀。当然，只要与正确的命名空间 URI 关联，你也可以使用`xsl`以外的其他前缀。`stylesheet`元素的属性包括`id`、`version`、`extension-element-prefixes`和`exclude-result-prefixes`。`version`属性指定\
  \ XSLT 版本，可以是 1.0 或 1.1⁷。此属性必须指定。\n\n我们将使用 1.0 版本，因为目前它是唯一成为 W3C 推荐标准的版本，也是 Java\
  \ XML API（JAXP）1.3 规范所支持的版本。`extension-element-prefixes`属性指定扩展元素的命名空间前缀。`exclude-result-prefixes`属性指定要从输出中排除的命名空间前缀。清单\
  \ 5-4 展示了一个`xsl:stylesheet`元素的示例。\n\n7\\. 版本 1.1 已于 2001 年 8 月作为 W3C 工作草案被废弃（http://www.w3.org/TR/xslt11/）。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C05.fm 第 116 页\
  \ 2006 年 7 月 6 日星期四 下午 1:42\n\n**116**\n\n第 5 章 ■ 使用 XSLT 进行转换\n\n**清单 5-4.** *xsl:stylesheet*\n\
  \n<xsl:stylesheet\n\nexclude-result-prefixes = \"jaxb\"\n\nversion =\"1.0\" >\n\n\
  </xsl:stylesheet>\n\nxsl:output 元素\n\n`xsl:output`元素是`xsl:stylesheet`元素的子元素，用于指定结果树输出的特性。`xsl:output`元素的部分属性包括`method`、`version`、`encoding`、`omit-xml-declaration`、`doctype-public`、`doctype-system`和`indent`。这些属性的作用如下：\n\
  \n• `method`属性指定结果树类型，其值可以是`xml`、`html`或`text`。你也可以指定其他输出方法类型。\n\n• `version`属性指定生成输出文档中\
  \ XML 声明的版本。\n\n• 如果`omit-xml-declaration`设置为`yes`，则输出文档中省略 XML 声明。\n\n• `encoding`属性指定生成文档的编码。\n\
  \n• `doctype-public`指定 DOCTYPE 声明中的公共标识符，这在第 1 章中讨论过。\n\n• `doctype-system`属性指定\
  \ DOCTYPE 声明中的系统标识符。如果`indent`属性设置为`yes`，则输出会进行缩进。\n\n清单 5-5 展示了一个`xsl:output`元素的示例。\n\
  \n**清单 5-5.** *xsl:output*\n\n<xsl:output\n\nmethod = \"xml\"\n\nversion = \"1.0\"\
  \n\nencoding = \"utf-8\"\n\nomit-xml-declaration = \"no\"\n\ndoctype-public =\"\
  -//Sun Microsystems, Inc.//DTD Enterprise JavaBeans 2.0//EN\"\n\ndoctype-system\
  \ =\"http://java.sun.com/dtd/ejb-jar_2_0.dtd\"\n\nindent = \"yes\" />\n\nxsl:template\
  \ 元素\n\n如前所述，`xsl:template`元素是 XSLT 的核心，每个`xsl:template`都与一个模式（以 XPath 表达式表示）相关联。`xsl:template`元素的两个重要属性是`match`和`name`。`match`属性指定要匹配的模式；`name`属性通过名称标识模板。除非指定了`name`属性（此时`match`属性为可选），否则`match`属性是必需的。以下是一个`xsl:template`元素的示例：\n\
  \n<xsl:template match=\"journal\" >\n\n<xsl:value-of select=\"@title\" />\n\n</xsl:template>\n\
  \n上述示例中`match`属性的 XPath 模式匹配清单 5-1 所示示例源文档中所有`journal`元素的节点集。如果你还记得，这正是清单 5-3 循环中`xsl:for-each`指令的主体，该循环遍历每个`journal`元素，并通过`<xsl:apply-templates\
  \ select=\".\" >`指令选择并应用前面显示的模板。\n\nxsl:apply-templates 元素\n\n你可以使用`xsl:apply-templates`元素从源树中选择一个节点集。与`xsl:for-each`指令一起，它是用于更改当前节点集的两个关键指令之一。`xsl:apply-templates`元素的`select`属性指定一个\
  \ XPath 表达式，该表达式在源树上下文中求值得到一个节点集。如果 XPath 表达式是相对表达式，则相对于当前处理节点进行求值。如果省略`select`属性，则处理当前处理节点的所有子节点。清单\
  \ 5-6 展示了`xsl:template`元素内`xsl:apply-templates`元素的示例。\n\n**清单 5-6.** *xsl:apply-templates*\n\
  \n<xsl:template match=\"/\" >\n\n<html>\n\n<body>\n\n<table>\n\n<tr><th>标题</th></tr>\n\
  \n<xsl:for-each select=\"catalog/journal\" >\n\n<tr><td>\n\n**<xsl:apply-templates\
  \ select=\".\" ></xsl:apply-templates>**\n\n</td></tr>\n\n</xsl:for-each>\n\n</table>\n\
  \n</body>\n\n</html>\n\n</xsl:template>\n\n在清单 5-6 中，`xsl:apply-templates`指令选择当前`catalog`元素的子`journal`节点，尝试在清单\
  \ 5-3 中为所选`journal`节点找到匹配的模板，然后应用该匹配模板。前面我们已经讨论过此`xsl:apply-templates`指令的匹配模板。\n\
  \nxsl:call-template 元素\n\n如果在`xsl:template`元素中指定了`name`属性，则可以使用`xsl:call-template`元素调用该模板。清单\
  \ 5-7 展示了`xsl:call-template`的示例。\n\n**清单 5-7.** *xsl:call-template*\n\n<xsl:template\
  \ name=\"template1\">\n\n</xsl:template>\n\n<xsl:call-template name=\"template1\"\
  >\n\n</xsl:call-template>\n\n`xsl:call-template`和`xsl:apply-template`的区别在于：前者是对命名`xsl:template`元素的显式调用，此时`match`属性无关紧要；后者是隐式调用，依赖于`xsl:apply-template`中的`select`属性与`xsl:template`中的`match`属性之间的匹配。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C05.fm 第 118 页\
  \ 2006 年 7 月 6 日星期四 下午 1:42\n\n**118**\n\n第 5 章 ■ 使用 XSLT 进行转换\n\nxsl:for-each 元素\n\
  \n要遍历节点集，可以使用`xsl:for-each`元素。清单 5-8 展示了`xsl:for-each`的示例，该示例摘自清单 5-3。\n\n**清单 5-8.**\
  \ *xsl:for-each 元素*\n\n<xsl:for-each select=\"catalog/journal\" >\n\n<tr><td>\n\n\
  <xsl:apply-templates select=\".\" ></xsl:apply-templates>\n\n</td></tr>\n\n</xsl:for-each>\n\
  \n在示例`xsl:for-each`元素中，`select`属性求值得到清单 5-1 所示文档中`journal`元素的节点集。对于该节点集中的每个节点，都会处理`xsl:for-each`指令的主体。\n\
  \n变量\n\n你可以使用`xsl:variable`和`xsl:param`元素在 XSLT 中指定变量。`xsl:variable`和`xsl:param`元素具有`name`和`select`属性。你可以在`select`属性或元素内容中指定变量或参数的值。例如，你可以按如下方式指定值为`var1`的变量：\n\
  \n<xsl:variable name=\"var1\" select=\"'var1'\"/> 或按如下方式：\n\n<xsl:variable name=\"\
  var1\">var1</xsl:variable> 你可以类似地指定参数：\n\n<xsl:param name=\"param1\" select=\"'param1'\"\
  /> 参数和变量之间的一个区别是，`xsl:param`元素中指定的值是默认值，并且在调用模板时可以被覆盖。你可以使用`xsl:with-param`元素指定参数值。清单\
  \ 5-9 展示了覆盖默认参数值的示例。\n\n**清单 5-9.** *使用参数值应用模板*\n\n<xsl:apply-templates>\n\n<xsl:with-param\
  \ name=\"param1\" select=\"'param1'\"/>\n\n</xsl:apply-templates>\n\n你可以在顶层或模板中声明`xsl:variable`和`xsl:param`元素。`xsl:param`和`xsl:variable`的另一个区别是，你只能在模板的开头在`xsl:template`元素中声明`xsl:param`元素。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C05.fm 第 119 页\
  \ 2006 年 7 月 6 日星期四 下午 1:42\n\n\n\n第 5 章 ■ 使用 XSLT 进行转换\n\n**119**\n\n条件处理\n\nXSLT\
  \ 规范提供了`xsl:if`和`xsl:choose`元素用于条件处理。`xsl:if`元素中名为`test`的属性会计算出一个布尔值，并控制条件处理。清单\
  \ 5-10 展示了一个`xsl:if`元素的示例。\n\n**清单 5-10.** *模板的条件应用*\n\n<xsl:if test=\"$param1='param1'\"\
  >\n\n<xsl:apply-templates/>\n\n</xsl:if>\n\n清单 5-10 中的`test`属性将`param`参数的值与字符串`param1`进行比较。如果测试表达式计算结果为`true`，则会调用`<xsl:apply-templates/>`。\n\
  \nxsl:copy-of 元素\n\n你可以从源树中选择结果树中的元素，也可以添加新元素。你可以使用`xsl:copy-of`元素将源树片段复制到结果树中。`xsl:copy-of`会复制选定的元素节点、该元素的属性以及该元素的子元素。以下是`xsl:copy-of`的一个示例：\n\
  \n<xsl:copy-of select=\"catalog/journal\"/>\n\n`xsl:copy`元素会复制选定的节点，但不会复制该节点的任何属性和子元素。\n\
  \nxsl:value-of 元素\n\n`xsl:value-of`元素会在结果树中添加一个文本节点。`xsl:value-of`元素的`select`属性表达式会计算出一个字符串。以下是`xsl:value-of`元素的一个示例，它计算`journal`元素的`title`属性的字符串值：\n\
  \n<xsl:value-of select=\"journal/@title\" />\n\n添加元素、属性和文本\n\n你可以使用`xsl:element`元素向结果树添加元素。以下是`xsl:element`的一个示例，它创建了一个`table`元素：\n\
  \n<xsl:element name=\"table\">\n\n</xsl:element>\n\n你可以使用`xsl:attribute`元素向结果树添加属性。以下是`xsl:attribute`元素的一个示例，它创建了`title`属性：\n\
  \n<xsl:attribute name=\"title\" >XML Journal</xsl:attribute> 你可以使用`xsl:text`元素向结果树添加文本节点。该元素的主体指定了结果树中的文本节点。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C05.fm 第 120 页\
