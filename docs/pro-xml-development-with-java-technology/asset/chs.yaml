  \ XML 文档转换为 XSL-FO**\n\nXSL-FO 格式化对象包含有关要在 PDF 文档中呈现的数据的格式化信息、文档中使用的布局和字体，以及文档中的表格。要将\
  \ XML 文档转换为 PDF 文档，首先需要将 XML 文档转换为 XSL-FO 文档。将 XML 文档转换为 XSL-FO 文档的步骤如下： **1.**\
  \ 创建一个 XSLT 来将 XML 转换为 XSL-FO。\n\n**2.** 设置解析器和转换器系统属性。\n\n**3.** 从 XML 文档创建一个 Document\
  \ 对象。\n\n**4.** 创建一个 Transformer 对象。\n\n**5.** 将 XML 文档转换为 XSL-FO 文档。\n\nXSL-FO\
  \ 文档位于 FO 命名空间中。因此，XSL-FO 文档在根元素 `fo:root` 中包含一个命名空间声明：`xmlns:fo=http://www.w3.org/1999/XSL/Format`。\n\
  \n表 12-2 列出了 XSL-FO 文档中一些常用的元素。\n\n**表 12-2.** *XSL-FO 元素*\n\n**元素**\n\n**属性**\n\
  \n**子元素**\n\n**描述**\n\nfo:root\n\nxmlns:fo\n\nfo:layout-master-set, XSL-FO 文档中的根元素\n\
  \nfo:page-sequence\n\nfo:layout-master-set\n\nfo:simple-page-master 由一组页面母版组成\n\n\
  （至少需要一个页面母版）\n\nfo:simple-page-master\n\nmargin-right, margin-left,\n\nfo:region-body\n\
