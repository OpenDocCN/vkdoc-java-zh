  \ 内容类，也用于作为输入生成模式定义的 Java 类中。这些绑定注解定义在 javax.xml.bind.annotation 包中。使用这些注解需要（并且假定）熟悉\
  \ J2SE 5.0。表 6-2 列出了 javax.xml.bind.annotation 包中定义的一些更常用的注解。\n\n5\\. 注解是 Java 编程语言的一种元数据工具，作为\
