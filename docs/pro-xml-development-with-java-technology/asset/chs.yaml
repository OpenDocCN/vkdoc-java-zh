  </xsl:template>\n\n</xsl:stylesheet>\n\n**设置系统属性**\n\n您可以使用第 5 章讨论的 XML 转换 API（Transformation\
  \ API for XML）执行 XML 到 XSL-FO 的转换。您将使用 `DocumentBuilder` 解析器解析示例 XML 文档，并使用 `Transformer`\
  \ 对象对其进行转换。因此，您需要设置系统属性 `javax.xml.parsers.DocumentBuilderFactory` 和 `javax.xml.transform.TransformerFactory`，如清单\
  \ 12-3 所示。您使用 `DocumentBuilderFactory` 创建 `DocumentBuilder` 对象，使用 `TransformerFactory`\
  \ 创建 `Transformer` 对象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C12.fm\
  \ 第 318 页 2006 年 7 月 29 日，星期六，上午 6:20\n\n**318**\n\n第 12 章 ■ 将 XML 转换为 PDF\n\n**清单\
  \ 12-3.** *设置系统属性*\n\nSystem.setProperty(\"javax.xml.parsers.DocumentBuilderFactory\"\
  ,\n\n\"org.apache.xerces.jaxp.DocumentBuilderFactoryImpl\"); System.setProperty\n\
  \n(\"javax.xml.transform.TransformerFactory\",\n\n\"org.apache.xalan.processor.TransformerFactoryImpl\"\
  ); **创建文档**\n\n您可以通过使用 `DocumentBuilder` 对象解析 XML 文档来创建 `Document` 对象。您从 `DocumentBuilderFactory`\
  \ 对象获取 `DocumentBuilder` 对象。因此，您需要使用静态方法 `newInstance()` 创建一个 `DocumentBuilderFactory`\
  \ 对象。随后，使用 `DocumentBuilderFactory` 对象的方法 `newDocumentBuilder()` 创建 `DocumentBuilder`\
  \ 对象，如清单 12-4 所示。您可以使用 `InputStream`、`InputSource` 或 `File` 的重载 `parse()` 方法之一来解析\
  \ XML 文档。示例应用程序从 `File` 对象解析 XML 文档，如清单 12-4 所示。`parse(File)` 对象返回一个 `Document`\
  \ 对象。\n\n**清单 12-4.** *解析 XML 文档*\n\nDocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();\
  \ DocumentBuilder builder = factory.newDocumentBuilder();\n\nDocument document =\
  \ builder.parse(new File(\"catalog.xml\")); **创建转换器**\n\n您还需要创建一个 `Transformer`\
  \ 对象来转换通过 `DocumentBuilder` 对象获得的 `Document` 对象。您可以从 `TransformerFactory` 对象获取 `Transformer`\
  \ 对象。因此，使用静态方法 `newInstance()` 创建一个 `TransformerFactory` 对象，如清单 12-5 所示。为了在从 `TransformerFactory`\
  \ 对象获得的 `Transformer` 对象上设置样式表，请从示例样式表创建一个 `StreamSource` 对象。随后，使用方法 `newTransformer(StyleSource)`\
  \ 创建一个 `Transformer` 对象。\n\n**清单 12-5.** *创建 Transformer 对象*\n\nTransformerFactory\
  \ tFactory = TransformerFactory.newInstance(); StreamSource stylesource = new StreamSource(new\
  \ File(\"catalog.xslt\")); Transformer transformer = tFactory.newTransformer(stylesource);\
  \ **将 XML 文档转换为 XSL-FO**\n\n`Transformer` 类提供了方法 `transform(Source, Result)` 来将\
  \ XML 输入转换为输出。您可以将输入指定为 `DOMSource`、`SAXSource` 或 `StreamSource`。您可以将输出指定为 `DOMResult`、`SAXResult`\
  \ 或 `StreamResult`。在示例应用程序中，输入被指定为 `DOMSource`，输出被指定为 `StreamResult`。因此，从 `Document`\
  \ 对象创建一个 `DOMSource` 对象，并从 `catalog.fo` 文件创建一个 `StreamResult` 对象，如清单 12-6 所示。随后，使用\
  \ `transform(DOMSource, SAXResult)` 对象转换示例 XML 文档，如清单 12-6 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C12.fm 第 319 页 2006 年 7 月 29 日，星期六，上午 6:20\n\n第 12 章 ■ 将 XML 转换为 PDF\n\
  \n**319**\n\n**清单 12-6.** *将 XML 文档转换为 XSL-FO*\n\nDOMSource source = new DOMSource(document);\n\
  \nStreamResult result = new StreamResult(\"catalog.fo\"); transformer.transform(source,\
  \ result);\n\n\n\nXSL-FO 文档 `catalog.fo` 以表格形式呈现 XML 文档数据。`layout-master-set` 元素指定了页面布局和页面特性，例如页边距、页面宽度和页面高度。`page-sequence`\
  \ 元素定义了一个 XSL-FO 页面。`fo:block` 元素指定页面内容。`fo:table` 元素定义了一个表格。清单 12-7 展示了转换生成的 XSL-FO\
