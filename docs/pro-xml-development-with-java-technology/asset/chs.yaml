  \ Saturday, August 12, 2006 5:18 AM\n\n第 14 章 ■ 构建基于 XML 的 Web 服务\n\n**365**\n\n\
  • 头部块上的`soapenv:actor`属性表示接收者在处理该头部块时必须扮演的逻辑功能或角色。如果中间接收节点理解指定的角色，则该头部块供其使用。  \n\
  • 头部块上的`soapenv:mustUnderstand`属性表示，假设接收者符合`soapenv:actor`属性指定的角色，那么接收者是否必须处理特定的头部子元素。\n\
  \n**soapenv:actor 属性** `soapenv:actor`属性的值是一个 URI，表示接收者在处理相关头部块时必须承担的逻辑角色。特殊 URI\
  \ `http://schemas.xmlsoap.org/soap/actor/next/` 表示消息路径上下一节点的逻辑角色。省略此属性意味着该子元素应由最终接收者处理。\n\
  \n考虑以下`soapenv:Header`元素示例：\n\n<soapenv:Header>\n\n<ns1:userInfo\n\nsoapenv:actor=\"\
  http:// www.apress.com/xmljava/webservices/auth\">\n\n<email>foo@acme.com</email>\n\
  \n<pwd>bar</pwd>\n\n</ns1:userInfo>\n\n</soapenv:Header>\n\n此示例`soapenv:Header`元素包含一个头部块`ns1:userInfo`，其`soapenv:actor`属性设置为\
  \ URI `http://www.apress.com/xmljava/webservices/auth`。这意味着如果接收者符合该 URI 关联的隐含角色，则预期它会处理`ns1:userInfo`头部块。\n\
  \n处理头部块的中间节点必须将该头部块从`soapenv:Header`元素中移除。如果中间节点处理了头部块，但希望该头部块也被消息路径上的另一节点处理，则可以修改并将该头部块重新添加到`soapenv:Header`元素中。只需就地修改头部块，即可实现移除后再添加。\n\
  \n**soapenv:mustUnderstand 属性** 此属性只能取值 0 或 1。省略此属性意味着值为 0。如果头部块上指定此属性且值为 1，则表示如果接收者能承担该头部块`soapenv:actor`属性隐含的角色，则接收者必须处理该头部块。\n\
  \n考虑之前示例的修订版`soapenv:Header`元素：\n\n<soapenv:Header>\n\n<ns1:userInfo\n\nsoapenv:mustUnderstand=\"\
  1\"\n\nsoapenv:actor=\"http://www.apress.com/xmljava/webservices/auth\">\n\n<email>foo@acme.com</email>\n\
  \n<pwd>bar</pwd>\n\n</ns1:userInfo>\n\n</soapenv:Header>\n\n如果此消息的接收者能承担`http://www.apress.com/xmljava/webservices/`\n\
  \n\nauth 角色（无论其语义含义如何），都必须处理 `ns1:userInfo` 标头块。我们将在“SOAP 1.1 处理模型”一节中讨论，如果接收方无法履行此义务，将会发生什么情况。\n\
