  如果你希望将 `mime:content` 绑定到 `type` 属性中元数据所允许的最具体的 Java 类型，那么你可以在定制中指定，如下所示：\n\n<jaxws:enableMIMEContent>true</jaxws:enableMIMEContent>\n\
  \n**方法名**\n\n如果你想自定义与 `wsdl:operation` 对应的 Java 方法名，可以像下面这样为 `download wsdl:operation`\
  \ 进行操作：\n\n<jaxws:bindings\n\nnode=\"//wsdl:portType[@name='ProjectPortType']/wsdl:operation[@name='download']\"\
  \ >\n\n<jaxws:method name=\"downloadProject\" ></jaxws:method>\n\n</jaxws:bindings>\n\
  \n在上面的例子中，`download wsdl:operation` 的名称被映射到了 `downloadProject` Java 方法名。\n\n**处理程序链**\n\
  \n可以指定一个处理程序链，它在 Web 服务客户端和 SEI 之间对双向传输的消息进行干预。下面的例子为一个日志处理程序指定了处理程序链：\n\n<javaee:handler-chains>\n\
