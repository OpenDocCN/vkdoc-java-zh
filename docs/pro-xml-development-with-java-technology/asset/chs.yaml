  \nVohra_706-0C01.fm 第 32 页 2006 年 6 月 28 日星期三 上午 6:27\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C02.fm 第 33 页 2006 年 6 月 28 日星期三 上午 6:38\n\n第 2 章\n\n■ ■ ■\n\n解析 XML\
  \ 文档\n\n**X**ML 文档包含结构化的文本信息。我们在第 1 章的 XML 1.0 入门中介绍了定义格式良好的 XML 文档结构的语法规则。本章将讨论解析文档结构以提取文档中包含的内容信息。\n\
  \n我们将首先讨论解析 XML 文档的各种目标，并介绍与这些目标兼容的各种解析方法。我们将讨论每种方法的优缺点以及它们对特定应用程序的适用性。然后，我们将讨论实现这些方法的具体解析\
  \ API，这些 API 定义在 J2SE 5.0 中包含的 JAXP 1.3 以及 J2SE 6.0 中包含的 XML 流式 API（StAX）中。我们将通过代码示例解释每个\
  \ API。最后，我们将提供如何在 Eclipse IDE 中构建和执行这些代码示例的说明。\n\n**解析 XML 的目标**\n\n\n\n解析是处理 XML\
  \ 文档最基础的环节。当应用程序解析 XML 文档时，通常有三个明确的目标：\n\n• 确保文档格式良好\n\n• 检查文档是否符合 DTD 或 XML Schema\
  \ 所指定的结构\n\n• 以满足应用程序特定需求的方式，访问（或许还会修改）文档中指定的各种元素和属性\n\n所有应用程序都共享第一个目标。第二个目标虽不如第一个那样普遍，但仍相当常见。第三个目标则因应用程序而异，这并不奇怪。\n\
  \n受不同应用程序多样化访问需求的推动，逐渐发展出不同的解析方法来满足这些需求。迄今为止，解析 XML 文档主要有三种不同的方法：\n\n• DOM1 解析\n\
  \n• 推式解析\n\n• 拉式解析\n\n在下一节中，我们将概述这三种方法，然后对它们进行比较分析。\n\n1. 你可以在 http://www.w3.org/TR/DOM-Level-3-Core/\
  \ 找到文档对象模型（DOM）Level 3 核心规范。\n\n**33**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nVohra_706-0C02.fm Page 34 Wednesday, June 28, 2006 6:38 AM\n\n**34**\n\n第 2 章\
  \ ■ 解析 XML 文档\n\n**解析方法概述**\n\n在接下来的几节中，我们将从概念层面概述三种主要的解析方法。在后续章节中，我们将讨论实现这些方法的具体\
  \ Java API。我们先从 DOM 方法开始。\n\n**DOM 方法**\n\n文档对象模型（DOM）Level 3 核心规范定义了用于访问和操作内容、以及指定通用文档结构的平台与语言无关的接口。DOM\
  \ 将文档表示为 Node 对象的树。其中一些 Node 对象拥有子节点对象；另一些则是没有子节点的叶对象。\n\n为了表示 XML 文档的结构，通用的 Node\
  \ 类型被特化为其他 Node 类型，每种特化的节点类型都指定了一组允许的子 Node 类型。表 2-1 解释了用于表示 XML 文档的特化 DOM Node\
  \ 类型及其允许的子 Node 类型。\n\n**表 2-1.** *用于 XML 文档的特化 DOM Node 类型* **特化节点类型**\n\n**描述**\n\
  \n**允许的子节点类型**\n\nDocument\n\n表示一个 XML 文档\n\nDocumentType, ProcessingInstruction,\
  \ Comment, Element（最多 1 个）\n\nDocumentFragment\n\n表示 XML 文档的一部分\n\nElement, ProcessingInstruction,\
  \ Comment, Text, CDATASection, EntityReference\n\nDocumentType\n\n表示文档的 DTD\n\n\
  无子节点\n\nEntityReference\n\n表示一个实体引用\n\nElement, ProcessingInstruction, Comment,\
  \ Text, CDATASection, EntityReference\n\nElement\n\n表示一个元素\n\nElement, ProcessingInstruction,\
  \ Comment, Text, CDATASection, EntityReference\n\nAttr\n\n表示一个属性\n\nText, EntityReference\n\
  \nProcessingInstruction\n\n表示一条处理指令\n\n无子节点\n\nComment\n\n表示一条注释\n\n无子节点\n\nText\n\
  \n表示文本，包括空白\n\n无子节点\n\nCDATASection\n\n表示一个 CDATA 段\n\n无子节点\n\nEntity\n\n表示一个实体\n\
  \nElement, ProcessingInstruction, Comment, Text, CDATASection, EntityReference\n\
  \nNotation\n\n表示一个表示法\n\n无子节点\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 24](img/index-54_1.png)\n\nVohra_706-0C02.fm Page 35 Wednesday, June 28,\
  \ 2006 6:38 AM\n\n第 2 章 ■ 解析 XML 文档\n\n**35**\n\nDocument 特化节点类型有些独特，因为在 XML 文档中最多只能存在一个此类型的实例。同样值得注意的是，Document\
  \ 节点类型是一种特化的 Element 节点类型，用于表示 XML 文档的根元素。Text 节点类型除了表示文本外，还用于表示 XML 文档中的空白。\n\n\
  \n\n在 DOM 方法下，XML 文档会被解析成一个随机访问的树形结构，其中文档中的所有元素和属性都表示为不同的节点，每个节点被实例化为特定节点类型的实例。因此，例如，在\
  \ DOM 方法下，清单 2-1 中展示的示例 XML 文档将被解析为图 2-1 所示的树形结构（附有特定节点类型的注释）。\n\n**清单 2-1.** *示例\
  \ XML 文档*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n<catalog title=\"OnJava.com\"\
  \ publisher=\"O'Reilly\">\n\n<journal date=\"January 2004\">\n\n<article>\n\n<title>Data\
  \ Binding with XMLBeans</title>\n\n<author>Daniel Steinberg</author>\n\n</article>\n\
  \n</journal>\n\n</catalog>\n\n**图 2-1.** *示例 XML 文档的带注释 DOM 树* DOM 方法具有以下显著特点：\n\
  \n• 在访问或操作文档结构和内容之前，会先在内存中构建完整文档的 DOM 树表示。\n\n• 文档节点可以随机访问，不必严格按文档顺序访问。\n\n• 对任意树节点的随机访问快速且灵活，但在访问任何节点之前解析整个文档可能会降低解析效率。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C02.fm Page 36\
  \ Wednesday, June 28, 2006 6:38 AM\n\n**36**\n\n第 2 章 ■ 解析 XML 文档\n\n• 对于大小从几百兆字节到几千兆字节的大型文档，内存中的\
  \ DOM 树结构可能会耗尽所有可用内存，导致在 DOM 方法下无法解析此类大型文档。\n\n• 如果需要随机导航 XML 文档，或者需要操作文档内容和结构，DOM\
