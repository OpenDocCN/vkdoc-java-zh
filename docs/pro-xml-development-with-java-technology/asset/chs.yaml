  \ \"</journal>\" 终止。  \n\n**使用 StAX 进行解析**  \n\nStAX 是一种用于解析 XML 的拉模型 API。StAX 相比推模型\
  \ SAX 具有优势。在推模型中，解析器在解析 XML 文档时生成事件。而使用 StAX 的拉解析，应用程序生成解析事件；因此，你可以根据需要生成解析事件。 \
  \ \n\nStAX API（JSR-173）6 已在 J2SE 6.0 中实现。  \n\n关于 StAX API 的要点如下：  \n\n• StAX API\
  \ 类位于 `javax.xml.stream` 和 `javax.xml.stream.events` 包中。  \n\n• StAX API 提供了两种不同的\
  \ API 来解析 XML 文档：基于游标的 API 和基于迭代器的 API。  \n\n• `XMLStreamReader` 接口使用游标 API 解析 XML\
  \ 文档。  \n\n• `XMLEventReader` 使用迭代器 API 解析 XML 文档。  \n\n• 你可以使用 `XMLStreamWriter`\
  \ 接口生成 XML 文档。  \n\n我们将首先讨论游标 API，然后讨论迭代器 API。  \n\n**游标 API**  \n\n你可以使用 `XMLStreamReader`\
  \ 对象通过游标方法解析 XML 文档。`next()` 方法生成下一个解析事件。你可以通过 `getEventType()` 方法获取事件类型。你可以从 `XMLInputFactory`\
  \ 对象创建 `XMLStreamReader` 对象，并且可以使用静态方法 `newInstance()` 创建 `XMLInputFactory` 对象，如清单\
  \ 2-18 所示。  \n\n**清单 2-18.** *创建 XMLStreamReader 对象*  \n```  \nXMLInputFactory inputFactory=XMLInputFactory.newInstance();\
  \  \nInputStream input=new FileInputStream(new File(\"catalog.xml\"));  \nXMLStreamReader\
  \ xmlStreamReader = inputFactory.createXMLStreamReader(input);  \n```  \n下一个解析事件通过\
  \ `XMLStreamReader` 对象的 `next()` 方法生成，如清单 2-19 所示。  \n\n**清单 2-19.** *获取解析事件*  \n\
  ```  \nwhile (xmlStreamReader.hasNext()) {  \n    int event = xmlStreamReader.next();\
  \  \n}  \n```  \n`next()` 方法返回一个 `int` 值，该值对应于一个解析事件，由 `XMLStreamConstants` 常量指定。表\
  \ 2-13 列出了 `XMLStreamReader` 对象返回的事件类型。\n\n\n对于 `START_DOCUMENT` 事件类型，`getEncoding()`\
  \ 方法返回 XML 文档中的编码。`getVersion()` 方法返回 XML 文档的版本。\n\n6\\. 你可以在 http://jcp.org/aboutJava/communityprocess/final/jsr173/index.html\
