  \ JAXB 命名空间声明。如果命名空间声明带有前缀，则应使用该前缀添加绑定声明。你可以使用清单 6-24 中列出的语法添加绑定声明。\n\n**清单 6-24.**\
  \ *绑定声明的语法*\n\n<xs:annotation>\n\n<xs:appinfo>\n\nJAXB 绑定声明\n\n</xs:appinfo>\n\n\
  </xs:annotation>\n\n**全局绑定声明**\n\n全局绑定声明适用于指定该声明的模式定义中的所有元素。它们也适用于任何包含或导入的模式。你可以在根元素中使用\
  \ `globalBindings` 元素指定全局绑定声明。清单 6-25 展示了示例模式中的全局绑定声明。\n\n**清单 6-25.** *全局绑定声明*\n\
  \n<jxb:globalBindings\n\ncollectionType =\"java.util.ArrayList\"\n\nfixedAttributeAsConstantProperty=\
  \ \"true\"\n\ngenerateIsSetMethod= \"false\"\n\nenableJavaNamingConventions = \"\
  true\">\n\n</jxb:globalBindings>\n\n`globalBindings` 元素中的 `collectionType` 属性指定了一个列表类型类，该类必须实现\
  \ `java.util.List` 接口。在示例中，它指定生成实现中的所有列表应在内部表示为 `java.util.ArrayList`。`fixedAttributeAsConstantProperty`\
  \ 属性指定固定属性应作为常量生成到 Java 类中。`generateIsSetMethod` 属性指定应生成与 getter 和 setter 属性方法对应的\
  \ `isSet()` 方法。`enableJavaNamingConventions` 属性指定应启用 Java 命名约定。\n\n**模式绑定声明**\n\n\
  你也可以在根元素中使用 `schemaBindings` 元素指定模式绑定声明，如清单 6-26 所示。模式声明的范围是模式目标命名空间中的所有模式元素。在示例模式中，模式绑定声明指定\
