  \n**解组 XML 文档**\n\n解组是指从 XML 文档创建 Java 对象树。在示例用例中，网站接收到包含目录信息的 XML 文档，需要先解组该文档，然后才能处理其中包含的目录信息。本节将首先展示如何使用\
  \ JAXB 2.0 API 解组示例 XML 文档，随后展示如何访问生成的 Java 对象树中的各种元素和属性值。\n\n解组步骤如下：\n\n**1.**\
