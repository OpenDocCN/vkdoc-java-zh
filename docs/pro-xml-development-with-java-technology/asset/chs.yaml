  \ 3 API 加载和保存 **279**\n\n**过滤 XML 文档**\n\n你可以在解析 XML 文档模型时对其进行过滤，也可以在存储 DOM 文档模型时对其进行过滤。在本节中，我们将展示如何过滤\
