  \n在本章中，我们将演示如何使用各种 XSLT 样式表转换一个示例 XML 文档（如清单 5-11 所示）；每个样式表将演示一个特定的转换示例。\n\n在这些样式表中，将移除`catalog.xml`中的重复元素，对`title`元素进行排序，并对各种节点进行过滤。\n\
