  使用 DOM Level 3 API 进行加载与保存\n\n**D**OM Level 3 Core 规范建立在 DOM Level 2 和 Level 1 Core\
  \ 规范之上，定义了用于访问和操作通用文档（以文档树形式表示）内容与结构的平台无关、语言无关的接口。除了通用文档的接口外，DOM Level 3 Core 规范还包含用于操作\
  \ XML 文档的特定接口。（第 2 章讨论了 DOM Level 3 Core 规范。）DOM Level 3 Load and Save¹规范提供了一组用于加载和保存（*序列化*与*反序列化*）XML\
  \ 文档的接口。加载 XML 文档意味着将 XML 文档模型映射到 DOM 文档模型。保存 XML 文档意味着将 DOM 文档模型转换为 XML 文档模型。DOM\
  \ Load and Save Level 3 是一个平台无关、语言无关的规范。除了其语言和平台无关的特性外，推动该规范的关键特性如下：\n\n• 在加载和保存过程中过滤内容的能力\n\
  • 加载和保存文档中选定节点（而非整个文档）的能力\n• 将文档序列化为字符串（而非文件）的能力\n• 文档加载和保存过程中的事件处理功能\n\n过滤内容或加载/保存选定节点的原因不胜枚举，但一些常见原因如下：\n\
  \n• 在将文档传递给第三方之前，过滤其中的机密信息\n• 向文档添加或移除特定于应用程序的注释或处理指令\n• 为特定目的调整模板文档\n\n在本章中，我们将讨论\
  \ JAXP 1.3（包含在 J2SE 5.0 中）所实现的 DOM 3 Load and Save 规范。除了提供 XML 文档的加载与保存以及加载/保存过程中的内容过滤功能外，DOM\
  \ 3 Load and Save API 还提供了文档加载或序列化时的事件处理功能。在本章中，我们将涵盖 DOM Level 3 Load and Save\
  \ API 的所有这些特性。\n\n1. DOM Level 3 Load and Save 规范是 W3C 推荐标准，可在 http://www.w3.org/TR/DOM-Level-3-LS/获取。\n\
