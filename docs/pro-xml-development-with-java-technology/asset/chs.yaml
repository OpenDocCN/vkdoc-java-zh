  \ XML 的 Web 服务\n\n**385**\n\n**服务端口**\n\n\n\n每个 `wsdl:portType` 绑定都必须附加到 `wsdl:service`\
  \ 内的一个 `wsdl:port` 上。例如，清单 14-10 中显示的 `defs:ProjectSoapBinding` 端口类型绑定被映射到 `ProjectPortTypeImplService`\
  \ 服务中的 `ProjectPortTypeImplPort` 端口，如下所示：\n\n<wsdl:service name=\"ProjectPortTypeImplService\"\
  \ >\n\n<wsdl:port binding=\"defs:ProjectSoapBinding\" name=\"ProjectPortTypeImplPort\"\
  \ >\n\n<soap:address location=\"REPLACE_WITH_ACTUAL_URL\" ></soap:address>\n\n</wsdl:port>\n\
  \n</wsdl:service>\n\n将具体的端口类型绑定映射到端口位置会创建一个网络服务端点，其他应用程序可以通过 HTTP URL 访问该端点。通常，尽管你可以指定一个位置\
  \ HTTP URL，但不应这样做，而应保持其与上例所示一致。\n\n通常，此 URL 应在 Web 服务部署期间自动分配，这将在“使用 JAX-WS 2.0”一节中详细讨论。\n\
  \n示例 Web 服务的完整 WSDL 1.1 文档包含在项目中。回顾一下，构建 WSDL 文档涉及定义模式定义、定义消息类型、定义端口类型（Web 服务接口）、定义将端口类型绑定到\
  \ SOAP/HTTP 的端口类型绑定，以及最后定义将端口类型绑定绑定到网络地址的端口。\n\n现在你已经有了 WSDL 1.1 文档，就可以使用 JAX-WS\
  \ 2.0 构建示例 Web 服务了，这将在下一节中进行。\n\n**使用 JAX-WS 2.0**\n\nJAX-WS 2.0 基于 JSR-224.11。Java\
  \ EE 5 SDK 中包含了 JAX-WS 2.0 规范的参考实现。12 在本节中，我们将使用 Java EE 5 SDK 来演示如何构建和部署示例 Web\
