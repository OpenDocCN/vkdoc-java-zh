  \n}\n\n}\n\npublic static void main(String[] argv) {\n\nFile xmlDocument = new File(\"\
  catalog.xml\");\n\nJAXBUnMarshaller jaxbUnmarshaller = new JAXBUnMarshaller(); jaxbUnmarshaller.unMarshall(xmlDocument);\n\
