  \ 方法被调用。在 `doGet()` 方法中，输入值与数据库中的数据进行比较。HTTP Servlet 返回一个 XML 响应，其中包含关于输入数据有效性的信息。\n\
  \n在客户端应用程序中，处理来自服务器的 XML 响应，如果指令指示数据输入有效，则显示消息“Catalog ID is Valid”。每当输入字段发生修改时，都会向服务器发送一个\
  \ `XMLHttpRequest` 请求。如果没有 Ajax，你将不得不将完整的输入表单提交给服务器，然后在收到服务器响应后重新加载浏览器网页。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
