  </soap:operation>\n\n请记住，每个 SOAP 1.1 消息都在 HTTP 消息内传输。`soap:operation` 的 `soapAction`\
  \ 属性中的 URI 将作为 `SOAPAction` HTTP 头部的值包含在内。\n\n**绑定 wsdl:input**\n\n`download` 操作中的\
  \ `wsdl:input` 基于 `defs:DownloadProject` 抽象消息，该消息定义了两个 `wsdl:part` 元素，如下所示：\n\n\
  <wsdl:message name=\"DownloadProject\" >\n\n<wsdl:part element=\"types:userInfo\"\
