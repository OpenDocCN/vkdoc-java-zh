  \ 进行加载与保存\n\n**概述**\n\nDOM 3 Load and Save 规范提供了 DOM 文档模型与 XML 文档模型之间双向映射的接口。该映射由一组接口实现，我们将在后续章节中简要讨论这些接口；并在后续章节中更详细地解释这些接口。\n\
  \nDOMImplementationLS 接口扩展了 DOM Level 3 Core 的 DOMImplementation 接口，并提供了用于创建加载和保存\
  \ XML 文档所需对象的工厂方法。使用 DOMImplementationLS 对象，您可以创建 LSParser、LSSerializer、LSInput\
  \ 或 LSOutput 对象。\n\n**介绍加载 API**\n\n以下是加载 API 的关键点：\n\n• LSParser 是将数据解析为 DOM 文档模型的接口。\n\
  • LSInput 接口表示数据源。您可以使用字符流、字节流、字符串、系统 ID 或公共 ID 在 LSInput 对象上设置数据源。LSParser 使用 LSInput\
  \ 对象来确定如何读取数据。您可以在 LSParser 对象上设置多个输入源，LSParser 将使用第一个非空且非空字符串的输入源。\n\nLSParser\
  \ 对象按以下顺序扫描不同的输入源以选择读取源：\n\n**a.** LSInput.characterStream\n**b.** LSInput.byteStream\n\
  **c.** LSInput.stringData\n**d.** LSInput.systemId\n**e.** LSInput.publicId\n\n\
  • LSResourceResolver 接口用于解析外部资源（如外部实体），并从外部资源创建 LSInput 对象。\n• LSParserFilter 在解析数据时过滤节点。\n\
  \n**介绍保存 API**\n\n以下是保存 API 的关键点：\n\n• LSSerializer 接口用于将 DOM 文档模型序列化（保存）为 XML 文档模型。\n\
  • LSOutput 接口表示序列化 DOM 文档模型的输出。LSSerializer 将使用 LSOutput 对象来确定输出目标。您可以在 LSSerializer\
  \ 对象上设置多个输出，LSSerializer 将使用第一个非空且非空字符串的输出。LSSerializer 对象按以下顺序扫描不同的输出以确定输出目标：\n\
  \n**a.** LSOutput.characterStream\n**b.** LSOutput.byteStream\n**c.** LSOutput.systemId\n\
  \n• LSSerializerFilter 接口在保存 DOM 文档模型时过滤节点。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
