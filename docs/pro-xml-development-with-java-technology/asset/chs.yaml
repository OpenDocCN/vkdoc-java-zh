  \ 绑定编译器 xjc 提供了 XML Schema 到 Java 类的默认绑定。您可以通过向 Schema 添加内联绑定声明或使用外部绑定文件来自定义 Schema\
  \ 绑定。在本节中，我们将展示如何自定义 JAXB 绑定。定义 JAXB 自定义绑定有两种选择：\n\n• 定义自定义绑定的第一种选择是使用（相对于 Schema\
  \ 的）外部绑定文件。\n\n外部绑定的优势在于可以对同一个 Schema 定义应用不同的自定义设置，以满足不同的绑定目标。然而，外部绑定使用 XPath 表达式来定位绑定节点，因此定义起来相对复杂。\n\
  \n• 内联绑定在 Schema 定义元素内部定义；它们隐式地定位绑定节点。与外部绑定不同，它们不需要使用 XPath 表达式，因此定义起来相对简单。\n\n\
  为简单起见，本节我们将使用内联绑定。绑定声明有以下几种类型：\n\n• 全局绑定声明\n\n• Schema 绑定声明\n\n• XML 到 Java 数据类型绑定声明\n\
  \n• 类绑定声明\n\n• 属性绑定声明\n\n我们已向示例 XML Schema 文档 `catalog_inline.xsd` 中添加了每种绑定声明类型的示例，如清单\
