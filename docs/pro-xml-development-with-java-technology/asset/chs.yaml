  \ XML 文档。\n\n在继续之前，我们想提一下构成 XML 文档所有语法规则的两个核心概念：\n\n• 首先，XML 文档中的所有语法结构都由标记字符序列界定，这意味着在任何语法结构的主体内部，不允许出现标记字符序列。例如，一种称为*开始标签*的语法结构由<和>字符界定，这意味着这两个字符不能出现在开始标签的主体内部。\n\
  \n• 其次，如果你需要绕过前一条中描述的限制，转义字符序列可以帮你做到这一点。（我们并不期望这个第二个概念能立即被理解，但我们将在后面的“元素”部分详细阐述这个概念。）我们将从大多数\
  \ XML 文档的起点开始：XML 声明。\n\n**XML 声明**\n\n一个格式良好的 XML 文档可以以 XML 声明开头。XML 声明可以省略，但如果出现，它应该是文档中的第一个内容。XML\
  \ 声明定义如下：\n\n<?xml version='1.0' ?>\n\nversion 属性指定 XML 版本，并且是必需属性。XML 声明可能包含其他属性：encoding\
  \ 和 standalone。一个包含 encoding 和 standalone 属性的 XML 声明示例如下：\n\n<?xml version='1.0'\
  \ encoding='UTF-8' standalone='yes' ?> encoding 属性指定用于编码 XML 文档中数据的字符集。默认编码是 UTF-8。standalone\
  \ 属性指定 XML 文档是否引用外部实体。如果没有引用外部实体，则将 standalone 属性指定为 yes。\n\n**元素**\n\nXML 文档的基本语法结构是元素。XML\
  \ 文档中的元素由开始标签和结束标签界定。一个 XML 元素的示例如下：\n\n<journal></journal>\n\n元素内的开始标签由<和>字符界定，并包含一个标签名称。在前面的开始标签中，名称是\
  \ journal。有效标签名称的精确规则相当复杂，最好留给 W3C 推荐标准去定义。然而，记住标签名称必须以字母开头，并且可以包含连字符（-）和下划线（_）字符是很有用的。结束标签由</和>字符序列界定，也包含一个标签名称。\n\
  \n一个文档必须有一个单一的根元素，也称为*文档元素*。如果你假设 journal 元素是你的根元素，那么到目前为止你的文档如下所示：\n\n<?xml version='1.0'\
  \ encoding='UTF-8' standalone='yes' ?>\n\n<journal></journal>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
