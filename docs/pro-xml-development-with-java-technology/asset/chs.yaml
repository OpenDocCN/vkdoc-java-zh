  \ XML\n\n**217**\n\n**概述**\n\n从逻辑角度来看，Xindice 数据库的一个实例由层级结构的集合组成，每个集合可以包含嵌套的集合和\
  \ XML 文档。每个查询都在一个集合上执行，该集合也被称为*集合上下文*。在 Xindice 的默认安装中，Xindice 数据库实例中的根集合名为 db，因此根集合上下文由上下文路径\
  \ /db 标识。\n\n**简单示例**\n\n将 Xindice 数据库中的集合类比为文件系统文件夹，将存储在这些集合中的文档类比为存储在文件夹中的文档，是完全恰当的。将集合上下文的引用路径类比为文件系统路径也很有用。有了这种直观的理解，让我们来看一个简单的示例。\n\
  \n假设你是一家汽车零部件供应商，你有一个 XML 文档，其中存储了关于 2006 款福特野马敞篷车雨刮器片的信息，如下面的示例文档所示：\n\n<?xml version='1.0'\
  \ encoding='UTF-8' ?>\n\n<wipers>\n\n<blade location=\"driver\" part=\"FMWD256783\"\
  >\n\n<description>Driver side wiper blade</description>\n\n<size>22 inches</size>\n\
  \n</blade>\n\n<blade location=\"passenger\" part=\"FMWP256783\">\n\n<description>Passenger\
  \ side wiper blade</description>\n\n<size>20 inches</size>\n\n</blade>\n\n</wipers>\n\
  \n你可能会认为，将所有品牌和型号的汽车雨刮器片数据放在一个集合中效率不高，因此你决定采用更具层级结构的方案，并将前面显示的示例文档存储在如下所示的集合上下文中：\n\
  \n/db/parts/Ford/Mustang/2006/Convertible/\n\n\n\n现在，假设你想查询这个集合中关于驾驶员侧雨刮片的信息。由于我们尚未讨论如何查询集合，你将暂时忽略构建查询的具体机制，而是纯粹从直观的角度来看一个示例查询。以下是一个示例查询，它使用\
  \ Xindice 命令行工具和 XPath 查询语言来提取与驾驶员侧雨刮片相关的信息：\n\nxindice xpath\n\n–c /db/parts/Ford/Mustang/2006/Convertible/\n\
  \n–q \"/wipers/blade[@location='driver']\"\n\n你能直观地理解发生了什么吗？现在，请忽略此查询中的所有内容，只关注集合上下文\
  \ `/db/parts/Ford/Mustang/2006/Convertible/` 和 XPath 查询 `\"/wipers/blade[@location='driver']\"\
  `。仅凭这两部分，你可以直观地看到，该查询在给定的集合上下文中搜索所有嵌套在 `wipers` 元素内且 `location` 属性等于 `driver` 的\
  \ `blade` 元素。此查询将返回所有匹配该 XPath 表达式的元素，无论它们位于哪个文档中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
