  \n将 XML 转换为 PDF\n\n**在**上一章中，我们讨论了将 XML 文档转换为 Microsoft Excel 电子表格的过程。在本章中，我们将展示如何将\
  \ XML 文档转换为 PDF 文档。\n\n开源 Apache 格式化对象处理器 (FOP) 项目提供了一个 API，用于将 XML 文档转换为 PDF 或其他格式，例如打印机控制语言\
  \ (PCL)、PostScript (PS)、可缩放矢量图形 (SVG)、XML、打印、抽象窗口工具包 (AWT)、Maker 交换格式 (MIF) 或 TXT。您还可以使用\
  \ Apache FOP API 设置布局和字体。Apache FOP 接收 XSL 格式化对象（一个 XSL-FO 对象）作为输入，并生成 PDF（或其他格式）文档作为输出。XSL-FO\
  \ 在 XSL 1.0 规范中定义。¹ 因此，要将 XML 转换为 PDF，您首先需要将 XML 转换为 XSL-FO，然后再将 XSL-FO 转换为 PDF。\n\
