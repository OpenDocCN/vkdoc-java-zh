  \ 服务\n\n**381**\n\n清单 14-1 是一个文档风格消息的示例。在下一节中，你将看到在 `wsdl:operation` 到 `soap:operation`\
  \ 的绑定中指定文档风格的示例。\n\n将 wsdl:operation 绑定到 SOAP 1.1\n\n这一步通过将每个 `wsdl:operation` 绑定到\
  \ SOAP 1.1 消息传递，使 `wsdl:operation` 具体化。例如，将 `download` 的 `wsdl:operation` 绑定到 SOAP\
  \ 1.1 包括以下部分：\n\n• 定义一个带有 `soapAction` 和 SOAP 1.1 消息传递风格的 `soap:operation`。`soapAction`\
  \ 是对消息处理节点的一个提示，根据 WS-I BP 1.1，它有助于提高应用程序之间的互操作性。它作为 HTTP 头部属性进行传输。本质上，它是一种通过仅查看\
  \ HTTP 头部就能推断 SOAP 消息某些信息的机制，而无需检查 SOAP 消息本身。\n\n• 将 `wsdl:input` 抽象消息绑定到 `soap:header`\
  \ 和 `soap:body`。\n\n• 将 `wsdl:output` 绑定到 `mime:multipartRelated` 消息。\n\n• 将 `wsdl:fault`\
  \ 绑定到 `soap:fault`。\n\n我们将在以下各节中解释上述每个步骤。\n\n**定义 soap:operation**\n\n`download`\
  \ 的 `wsdl:operation` 的 `soap:operation` 绑定定义如下：\n\n<soap:operation\n\nsoapAction=\"\
