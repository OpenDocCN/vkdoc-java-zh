  \n</fo:flow>\n\n</fo:page-sequence>\n\n</fo:root>\n\n**生成 PDF 文档**\n\n在接下来的章节中，你将使用\
  \ Apache FOP API 从 XSL-FO 文档 `catalog.fo` 生成一个 PDF 文档。从 XSL-FO 文档生成 PDF 文档的步骤如下：\n\
  \n**1.** 创建一个 FOP 驱动程序。\n\n**2.** 将 FOP 驱动程序的渲染器设置为 PDF 渲染器。\n\n**3.** 指定 XSL-FO\
  \ 文档的输入和 PDF 文档的输出。\n\n**4.** 运行 FOP 驱动程序以生成 PDF 文档。\n\n你需要导入 Apache FOP 包 `org.apache.fop.apps`\
  \ 和 `org.apache.avalon`。\n\n\n\n将 `framework.logger` 应用于 XMLToPDF.java 应用程序。\n\n\
  **创建 FOP 驱动**\n\n要将 XSL-FO 文档转换为 PDF 文档，需要创建一个 FOP 驱动对象，如清单 12-8 所示。还需要创建一个日志级别设置为\
  \ `LEVEL_INFO` 的控制台日志记录器，并将该日志记录器设置到 FOP 驱动和 `MessageHandler` 上。你也可以将日志级别设置为 `LEVEL_DEBUG`、`LEVEL_DISABLED`、`LEVEL_ERROR`、`LEVEL_FATAL`\
