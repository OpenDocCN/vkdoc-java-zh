  \n完整支持留给了后续规范。JAXB 2.0 弥补了 JAXB 1.0 中模式支持不完整的缺陷，并为缺失的模式组件添加了绑定支持。具体来说，JAXB 2.0 新增了以下模式支持：\n\
  \n• 使用 substitutionGroup 属性的元素声明，该属性解析为预定义的模型组模式组件（<xs:element @substitutionGroup>）。\n\
  \n• 通配符模式组件（xs:any 和 xs:anyAttribute）。\n\n• 用于指定跨多个元素唯一性的标识约束（xs:key、xs:keyref 和\
  \ xs:unique）。\n\n• 使用 redefine 声明重新定义的 XML Schema 组件（<xs:redefine>）。\n\n• 表示法 XML\
  \ Schema 组件（<xs:notation>）。\n\n• 支持以下模式属性：complexType.abstract、element.abstract、element.substitutionGroup、xsi:type、complexType.block、complexType.final、element.block、element.final、schema.blockDefault\
  \ 和 schema.finalDefault。\n\nJAXB 2.0 的绑定框架增强了 JAXB 1.0 的单向绑定框架，并增加了对双向绑定的支持。JAXB\
