  \n**219**\n\n**使用 JBoss 服务器配置 Xindice**\n\n为了便于讨论，我们假设你已经安装了 JBoss 4.0.26 应用服务器。假设\
  \ `<jboss-4.0.2>` 是 JBoss 4.0.2 安装目录，你需要在 `<jboss-4.0.2>\\bin\\run` 批处理文件中将 `JAVA_HOME`\
