  \n在原生 XML 数据库 Xindice 中存储 XML\n\n**原**生 XML 数据库定义了一种用于存储、检索和更新 XML 文档的逻辑模型。XML 文档是原生\
  \ XML 数据库中的存储单元。原生 XML 数据库将 XML 文档存储为集合，这些集合可以被查询、更新和修改。存储在原生 XML 数据库集合中的 XML 文档不受任何模式的约束；这与关系数据库不同，关系数据库中存储的数据受底层数据库模式的约束。你可以使用\
  \ XPath 查询原生 XML 数据库；也可以使用 XML:DB XUpdate 语言更新原生 XML 数据库。\n\n大多数关系数据库也支持 XML 存储；因此，比较原生\
  \ XML 数据库中的 XML 存储与关系数据库中的 XML 存储是很有必要的。表 8-1 提供了这样的比较。\n\n**表 8-1.** *原生 XML 数据库与关系型\
  \ XML 数据库的比较* **特性**\n\n**原生 XML 数据库**\n\n**关系数据库**\n\n数据库\n\nXML 文档是基本存储单元，由元素\n\
  \n数据以行和列的形式存储。\n\n结构\n\n的层级结构表示。\n\n顺序\n\n元素是有序的。\n\n行的顺序未定义。\n\n模式\n\n不使用模式定义来约束\
  \ XML 文档。\n\n可以使用模式来约束数据结构。\n\n查询\n\n使用 XPath 执行查询。\n\n使用 SQL 执行查询。\n\n应用\n\n适用于存储包含属性和子元素的复\n\
  \n适用于存储需要作为单个单元进行\n\n场景\n\n杂 XML 文档。\n\n存储和检索的 XML 文档。\n\n在本章中，我们将结合 Xindice¹ 原生\
  \ XML 数据库来讨论通用的原生 XML 数据库概念。Xindice 是一个开源的原生 XML 数据库，可用于存储、检索、查询和更新 XML 文档。由于 Xindice\
  \ 是众多原生 XML 数据库之一，一个显而易见的问题是，为什么我们选择专注于 Xindice？我们决定将 Xindice 作为代表性原生 XML 数据库进行重点介绍，主要有三个原因：\n\
  \n• Xindice 从零开始就被设计为原生 XML 数据库，并且由于它只专注于这一功能，因此相当易于理解。\n\n• Xindice 非常紧凑，易于安装，并且管理简单。\n\
  \n• Xindice 提供了命令行工具和基于标准的 API，用于管理、访问和修改 Xindice 数据库实例。\n\n当然，我们鼓励你探索其他原生 XML 数据库，当你这样做时，可以将本章在\
  \ Xindice 背景下学到的基本概念迁移到其他原生 XML 数据库中。表 8-2 列出了一些其他常用的原生 XML 数据库。\n\n**表 8-2.** *原生\
  \ XML 数据库*\n\n**数据库**\n\n**描述**\n\n**更多信息**\n\nBerkeley DB XML\n\n开源原生 XML 数据库\n\
  \nhttp://www.sleepycat.com/\n\ndbXML\n\n开源原生 XML 数据库\n\nhttp://www.dbxmlgroup.com/\n\
  \n比“为什么应该关注 Xindice”更相关的问题是，“为什么需要原生 XML 数据库？”以下是一些关键点，可以回答这个切中要害的问题：\n\n• 如果你只想存储和检索完整的\
  \ XML 文档，那么关系数据库确实足够了。\n\n• 然而，如果你想查询已存储 XML 文档的集合并检索这些文档的部分内容，或者你想更新这些已存储 XML 文档的部分内容，而无需先检索整个文档、修改它再存回去，那么你就需要一个原生\
  \ XML 数据库。\n\n• 当然，理论上可以将 XML 文档映射到关系数据库模式。然而，在实践中，从关系数据库编组 XML 文档比将 XML 文档解组到关系数据库更容易。这种不对称性的简单原因是，当\
  \ XML 文档的树形结构被映射到关系数据库的网格结构时，与文档模型相关的信息会丢失，任何依赖文档模型的查询或更新都无法进行。\n\n• 原生 XML 数据库中的存储单元是一个文档。XML\
  \ 数据库的模型不仅关注在文档中存储 XML 数据，还关注保留关于文档模型的所有信息。\n\n• 由于原生 XML 数据库保留了关于文档模型的信息，因此可以使用\
  \ XPath 语言查询原生 XML 数据库，并使用 XML:DB XUpdate² 语言（一种基于 XPath 的更新语言）进行更新。\n\n就像使用关系数据库一样，你需要工具、查询语言和编程\
  \ API 来管理、访问和修改原生 XML 数据库。幸运的是，在 Xindice 中，所有这些工具都可用，你将在本章中详细探索它们。\n\n². 这是 XML:DB\
  \ 计划的一部分；你可以在 http://xmldb-org.sourceforge.net/xupdate/xupdate-wd.html#N1f64158\
  \ 找到更多信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C08.fm\
