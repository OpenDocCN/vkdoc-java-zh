  \ **总结**\n\nAjax 允许你动态刷新网页内容，而无需将网页提交到服务器。你可以通过结合 XML DOM、JavaScript 和 XMLHttpRequest\
  \ 技术来实现 Ajax Web 技术。W3C 已经引入了 XMLHttpRequest 对象的工作草案，以标准化该技术。Ajax 有多种有用的用途，例如表单验证、自动完成以及定期刷新网页上的数据。在本章中，你实现了其中一种应用：动态表单验证。\n\
