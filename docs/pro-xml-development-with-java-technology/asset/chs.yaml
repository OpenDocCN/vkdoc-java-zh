  \n模式验证简介\n\n**第**2 章介绍了如何解析 XML 文档，这是处理 XML 文档最基本的一个方面。在关于解析的讨论中，我们注意到解析 XML 文档的目标之一是验证\
  \ XML 文档相对于模式的结构。根据模式验证 XML 文档的过程称为*模式验证*，这正是本章的主题。\n\n如果一个文档符合某个模式，则称其为该模式的*实例*。模式定义了一类\
  \ XML 文档，该类中的每个文档都是该模式的一个实例。模式类与实例文档之间的关系类似于 Java 类与实例对象之间的关系。有多种模式语言可用于定义模式。以下两种模式语言是\
  \ W3C 推荐标准的一部分：\n\n• DTD 是 XML 1.0 内置的模式语言，它使用 XML 标记声明 1 语法来定义模式。根据 DTD 验证 XML\
  \ 文档是解析过程的一个组成部分，已在第 2 章中介绍。\n\n• W3C XML Schema2 是一种基于 XML 的模式语言。第 1 章提供了 XML Schema\
  \ 的入门介绍。\n\n根据基于 XML Schema 语言的模式定义来验证 XML 文档是本章的重点。\n\n**模式验证 API**\n\n在本章中，我们将重点介绍\
  \ JAXP 1.33 模式验证 API。你可以将这些 API 分为两组：\n\n• 第一组包括 JAXP 1.3 SAX 和 DOM 解析器 API。这两个\
  \ API 都将验证作为解析过程的内在组成部分来执行。\n\n• 第二组包括 JAXP 1.3 验证 API。验证 API 与前两个 API 不同，它将验证与解析完全解耦。\n\
  \n1\\. 完整的标记声明语法是 XML 1.0 的一部分；更多信息请访问 http://www.w3.org/TR/REC-xml/#dt-markupdecl。\n\
  \n2\\. 参见 http://www.w3.org/XML/Schema。\n\n3\\. Java API for XML Processing (http://java.sun.com/webservices/jaxp/)\
