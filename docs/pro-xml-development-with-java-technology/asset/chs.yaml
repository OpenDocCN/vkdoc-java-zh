  \ 章 ■ 在原生 XML 数据库中存储 XML：XINDICE\n\n当然，完全有理由假设，除了与挡风玻璃雨刮器相关的文档外，你还可以选择在此集合中存储其他包含该特定汽车其他部件数据的\
  \ XML 文档。从这个简单示例中得出的关键结论是，如何组织集合和文档完全取决于应用程序的需求，只要你牢记以下几点重要事项：\n\n•   在一个集合中，你可以存储集合或\
  \ XML 文档。\n\n•   如果集合中不同类型的对象具有相同的名称，Xindice 不会报错。\n\n•   你需要知道存在一个优先级顺序来解决不同类型对象之间的名称冲突，顺序如下：集合和\
  \ XML 文档。最实际的做法当然是避免集合中不同类型对象之间出现任何名称冲突。\n\n•   Xindice 设计用于存储中小型文档，因此请避免存储大型 XML\
  \ 文档。建议将大型文档拆分为多个独立的小型文档。\n\n可以使用 XML:DB API 或 Xindice 命令行工具访问和修改 Xindice 数据库内容。在本章中，我们将首先讨论命令行工具，然后讨论\
