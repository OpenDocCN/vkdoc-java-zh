  \ 3 API 进行加载与保存 **269**\n\n**比较 JAXP 的 DocumentBuilder 和 Transformer API**\n\nDOM\
  \ Level 3 Load and Save 规范受到了早期 JAXP 版本的影响。事实证明，在 DOM Level 3 Load and Save 规范之前，JAXP\
  \ 已经定义了可用于序列化和反序列化 XML 文档的 API。JAXP 的 DocumentBuilder 类提供了将 XML 文档映射到 DOM 对象的标准方法，而\
  \ JAXP 的 Transformer 类提供了将 DOM 文档模型序列化为 XML 文档模型的方法。当然，JAXP 是 Java 特定的 API。DOM Level\
  \ 3 Load and Save 规范基于 JAXP 的思想，定义了用于加载和保存 XML 文档的平台无关、语言无关的接口，并增加了事件处理和过滤等功能。为了形成完整闭环，JAXP\
  \ 1.3 现在提供了 DOM Level 3 Load and Save 规范的 Java 绑定。\n\n如果您不需要过滤、事件处理或加载/保存选定节点等功能，可以使用\
  \ JAXP 的 DocumentBuilder 和 Transformer API 来加载和保存 XML 文档。DOM 3 Load and Save 规范接口在\
  \ JAXP 的 DocumentBuilder 和 Transformer 类提供的功能之外，还提供了以下特性：\n\n• DOM Level 3 Load\
  \ and Save 支持向解析器注册事件监听器。当使用 DOM 3 解析器完成 XML 文档加载时，生成的加载事件会指示文档加载已完成。\n• 您可以在 DOM\
  \ 3 解析器加载节点或序列化节点时过滤节点。\n• 您可以保存 DOM 文档模型中的选定节点，而不是整个文档。\n• 您可以将 Document 节点或 Element\
  \ 节点保存为 java.lang.String 对象，而不是文件。在 Web 服务中交换 XML 文档时，有时需要将 XML 文档作为 String 类型。\n\
  \n在本章中，我们将解释使用 DOM Level 3 规范加载和保存 XML 文档的过程。我们将演示如何使用 DOM Level 3 Load and Save\
  \ 规范在加载时和序列化时过滤内容。本章使用 JAXP 1.3（包含在 J2SE 5.0 中）提供的 DOM Level 3 Load and Save 实现。\n\
