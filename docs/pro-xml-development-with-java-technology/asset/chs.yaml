  \ 1 章。简而言之，清单 14-7 中的模式定义了用于示例 WSDL 1.1 文档的数据类型；这些数据类型包括以下内容：\n\n• `userInfo` 模式类型包含电子邮件和密码信息。\n\
  \n• `projectInfo` 模式类型包含关于项目的信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
