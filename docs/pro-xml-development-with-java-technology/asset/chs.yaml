  \ ■ 使用 XSLT 进行转换\n\n**排序元素**\n\n您可以使用 XSLT 元素 `xsl:sort` 对一组元素进行排序。`xsl:sort` 元素的\
  \ `order` 属性指定排序顺序：升序或降序。`data-type` 属性（其值可以是 `number` 或 `text`）指定待排序元素的数据类型。默认数据类型值为\
  \ `text`。`xsl:sort` 元素必须位于 `xsl:for-each` 元素或 `xsl:apply-templates` 元素内部。\n\n例如，尝试按升序对示例\
  \ XML 文档中的 `title` 元素进行排序。\n\n清单 5-22 所示的样式表 sort.xslt 按升序对 `title` 元素进行排序，并输出 `title`\
  \ 元素中的文本节点。要使用 sort.xslt 运行转换应用程序，请在 XSLTTransformer.java 中将 sort.xslt 设置为 File\
  \ 对象 stylesheet 中的样式表。\n\n**清单 5-22.** *sort.xslt*\n\n<xsl:stylesheet version=\"\
  1.0\">\n\n<xsl:output method=\"xml\" omit-xml-declaration=\"yes\"/>\n\n<xsl:template\
  \ match=\"/catalog/journal\">\n\n<xsl:apply-templates>\n\n<xsl:sort select=\"title\"\
  \n\norder=\"ascending\"/>\n\n</xsl:apply-templates>\n\n</xsl:template>\n\n<xsl:template\
  \ match=\"article\">\n\nTitle: <xsl:apply-templates select=\"title\"/>\n\n</xsl:template>\n\
  \n</xsl:stylesheet>\n\n在清单 5-22 中，`<xsl:template match=\"/catalog/journal\">` 模板由以下内置隐式\
  \ XSLT 指令匹配：\n\n<xsl:template match=\"*|/\">\n\n<xsl:apply-templates/>\n\n</xsl:template>\n\
  \n内置规则为输入源文档（如清单 5-11 所示）中的每个 `journal` 节点匹配 `<xsl:template match=\"/catalog/journal\"\
  >` 模板。由于 `<xsl:template match=\"/catalog/journal\">` 模板内的 `<xsl:apply-templates>`\
  \ 指令没有 `select` 属性，这意味着会选择 `journal` 节点的每个子节点，并搜索匹配的模板。对于 `journal` 节点的每个 `article`\
  \ 子节点，起作用的匹配模板当然是 `<xsl:template match=\"article\">`，它会输出标题，这些标题在结果树中由 `xsl:sort`\
  \ 指令进行排序。输出结果是按升序排列的文章标题列表，如清单 5-23 所示。\n\n**清单 5-23.** *在 Eclipse 中排序后的输出*\n\n\
