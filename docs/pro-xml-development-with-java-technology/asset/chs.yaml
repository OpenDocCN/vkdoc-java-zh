  \n**WSDL 1.1 到 Java 的映射**\n\n在您运行 wsimport 工具为 services.wsdl 生成 WSDL 1.1 到 Java\
  \ 的映射之前，我们将介绍此映射过程的一般概念（我们参考了自定义的概念，稍后将在“自定义 WSDL 1.1 到 Java 的映射”一节中介绍）：\n\n• WSDL\
  \ 1.1 文档中的每个 wsdl:portType 都映射到一个 Java SEI。\n\n• wsdl:portType 中的每个 wsdl:operation\
  \ 都映射到 SEI 中的一个 Java 方法。\n\n• 在没有自定义的情况下，映射的 Java 方法的名称与 wsdl:operation 名称属性的名称相同。默认情况下，由于\
  \ wsdl:portType 中的 wsdl:operation 名称是唯一的，因此不会存在重载方法。如果您使用自定义，最好坚持使用唯一的方法名称。\n\n\
  • 每个 wsdl:operation 必须有一个输入消息（wsdl:input）。它可能有零个或一个输出消息（wsdl:output），并且如果存在输出消息，则可能有零个或多个错误消息（wsdl:fault）。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\nVohra_706-0C14.fm 第 390\
  \ 页 2006 年 8 月 12 日，星期六，上午 5:18\n\n**390**\n\n第 14 章 ■ 构建基于 XML 的 Web 服务\n\n• 输入和输出消息通过非包装样式或包装样式映射到\
  \ Java 方法参数。关于这些样式下映射的详尽规则，我们推荐参考 JAX-WS 2.0 规范。不过，以下关于这些样式的细节对于大多数用途来说应该足够了：\n\n\
  • 在非包装样式中，如果 `wsdl:part` 是输入消息的一部分，则 `wsdl:part` 元素会映射到一个 Java 方法参数。对于输出消息，`wsdl:part`\
  \ 元素会映射到一个持有者类参数或返回类型。使用非包装样式永远不会出错——问题迎刃而解。\n\n• 包装样式仅当 `wsdl:input` 或 `wsdl:output`\
  \ 引用的 `wsdl:message` 只有一个 `wsdl:part` 时才适用。依我们看，不必费心去用它。不过，如果你非要用，请阅读下一点。\n\n• 在包装样式中，`wsdl:part`\
  \ 元素被视为一个包装元素（这也是该样式名称的由来）。如果 `wsdl:part` 是输入消息的一部分，则包装元素的子元素会映射到 Java 方法参数。如果 `wsdl:part`\
  \ 是输出消息的一部分，并且包装元素有多个子元素，则这些子元素会通过一个持有者类映射到 Java 方法参数；如果只有一个子元素，则直接映射到 Java 方法返回类型。如果\
  \ `wsdl:part` 同时是输入和输出消息的一部分，则使用持有者类方法参数。\n\n• 错误消息会映射到一个自定义的 Java 异常类。\n\n在下一节中，我们将讨论如何自定义\
  \ WSDL 1.1 到 Java 的映射。\n\n自定义 WSDL 1.1 到 Java 的映射\n\n你可以通过一个外部定制文件来自定义 `services.wsdl`\
  \ 中 WSDL 1.1 到 Java 的映射。关于所有可能定制的详尽调查，我们推荐参考 JAX-WS 2.0 规范¹⁷。不过，我们将在以下各节中讨论一些更常用的定制。\n\
  \n一个快速观察：各种绑定的作用域是通过寻址 WSDL 1.1 文档节点的 XPath 表达式来确定的。例如，`node=\"//wsdl:portType[@name='ProjectPortType']\"\
  ` 这个 XPath 表达式寻址的是 `services.wsdl` 中的 `ProjectPortType wsdl:portType`。\n\n**包名**\n\
  \n你可以像这样自定义 Java 绑定的包名：\n\n<jaxws:package name=\"com.apress.javaxml.ws\" >\n\n</jaxws:package>\n\
  \n**MIME 内容**\n\n还记得吗，我们在 `services.wsdl` 中有一些 `wsdl:parts` 绑定到了 SOAP 1.1 的 `mime:content`，如下面来自清单\
  \ 14-10 的摘录所示：\n\n<mime:part>\n\n<mime:content part=\"zip\" type=\"application/zip\"\
  \ >\n\n</mime:content>\n\n</mime:part>\n\n¹⁷. JAX-WS 2.0 规范可从 http://www.jcp.org/en/jsr/detail?id=224\
  \ 下载。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C14.fm 第\
