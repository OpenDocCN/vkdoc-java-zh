    **Understanding WSDL 1.1**


    Whenever you have to build a web service, the first step you need to take is to
    formally describe the web service in a WSDL 1.1 document. Although it is possible
    to reverse engineer a WSDL 1.1 document from Java classes, in our opinion, such
    reverse engineering is adequate only for building trivial web services, perhaps
    for quick prototyping. The reverse-engineering option seriously limits the flexibility
    you need to describe nontrivial, real-world web services. So, we will not discuss
    it any further in this chapter.


    We describe the overall structure of a WSDL 1.1 document next.


