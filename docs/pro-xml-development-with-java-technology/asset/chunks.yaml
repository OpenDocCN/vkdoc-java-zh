    ## 恒等转换


    恒等转换将输入XML文档复制到输出文档，而不更改任何元素或属性。您可以应用恒等转换来修改编码或`DOCTYPE`，或添加适当的缩进。清单5-19展示了一个用于恒等转换的XSLT示例。样式表`identityTransform.xslt`递归地将模板模式应用于`catalog.xml`中的节点。XPath表达式`@*|node()`选择所有元素和属性节点。在XPath模式中，`@*`表示所有属性节点，`node()`表示所有其他节点。恒等转换的输出是输入XML文档，并可选择性地修改文档编码、`DOCTYPE`或缩进。


    **清单5-19.** `identityTransform.xslt`


    ```xml

    <xsl:stylesheet version="1.0"

    xmlns:xsl="http://www.w3.org/1999/XSL/Transform">

    <xsl:output method="xml" version="1.0" indent="yes"/>

    <xsl:template match="@* | node()">

    <xsl:copy>

    <xsl:apply-templates select="@* | node()"/>

    </xsl:copy>

    </xsl:template>

    </xsl:stylesheet>

    ```


    ## 删除重复项


