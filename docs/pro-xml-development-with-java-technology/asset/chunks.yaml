    **总结**


    原生 XML 数据库定义了一种用于存储和检索 XML 文档的模型。原生 XML 数据库将 XML 文档存储在集合中，并分别支持使用 XPath 进行查询和使用
    XML:DB XUpdate API 进行更新。原生 XML 数据库相比关系数据库具有优势，因为原生 XML 数据库是专门为存储、查询和更新 XML 文档而设计的，而关系数据库则设计用于在数据库的行列单元格中存储原子值。具有多级层次结构和属性的复杂
    XML 文档可以轻松地在原生 XML 数据库中存储、查询和更新。


    在本章中，我们以 Xindice 开源原生 XML 数据库为具体背景，讨论了通用的原生 XML 数据库概念。除了支持查询和更新 API 之外，Xindice
    还提供了一个用于管理 Xindice 原生 XML 数据库的命令行工具，本章也对此进行了讨论。


