- fmt: "# Example WSDL 1.1 Document\n\nIn our opinion, if you are building a web service,\
    \ the only way to start is to first construct a WSDL 1.1 document. To build the\
    \ example web service that implements all the use case scenarios, you need to\
    \ construct a WSDL 1.1 document that formally describes the example web service.\
    \ We will show you how to do that step by step; we describe these steps in detail\
    \ in the following sections:\n\n1. Declare the relevant namespaces.\n2. Define\
    \ a schema in a separate document.\n3. Import the schema into a WSDL 1.1 document.\n\
    4. Define message types used by the web service.\n5. Define the web service interface\
    \ (port type), including all the operations.\n6. Define the binding of port type\
    \ to the SOAP 1.1/HTTP messaging and transport protocols.\n7. Define the port\
    \ that binds the web service binding to the endpoint address.\n\n## Namespace\
    \ Declarations\n\nThe first step you want to take is to declare all the namespace\
    \ declarations you will need in this document:\n\n- The WSDL 1.1 language constructs\
    \ are defined in the `http://schemas.xmlsoap.org/wsdl/` namespace, and you will\
    \ use the `wsdl` prefix with this namespace.\n- The target namespace for the document\
    \ will be `http://www.apress.com/xmljava/webservices/definitions`, which is entirely\
    \ arbitrary. You will use the `defs` prefix with this namespace.\n- The namespace\
    \ for the XML Schema language is `http://www.w3.org/2001/XMLSchema`, and you will\
    \ use the `xsd` prefix with this namespace.\n- The namespace for MIME constructs\
    \ is `http://schemas.xmlsoap.org/wsdl/mime/`, and you will use the `mime` prefix\
    \ with this namespace.\n- The WSDL 1.1 to SOAP binding is specified in the `http://schemas.xmlsoap.org/wsdl/soap/`\
    \ namespace in the `soap` prefix.\n- You will be defining your own schema types,\
    \ and you will use the `http://www.apress.com/xmljava/webservices/schemas` namespace\
    \ for the schema types. You will use the `types` prefix with this namespace.\n\
    \nThe root `wsdl:definitions` element of the WSDL 1.1 document with the relevant\
    \ namespace declarations is as follows:\n\n```xml\n<?xml version='1.0' encoding='UTF-8'\
    \ ?>\n<wsdl:definitions\n  targetNamespace=\"http://www.apress.com/xmljava/webservices/definitions\"\
    \n>\n</wsdl:definitions>\n```\n\n## Schema Definition\n\nIn writing any but the\
    \ most trivial of WSDL 1.1 documents, you will need schema data types. Although\
    \ it is not a must, it is best to define these data types within a separate schema\
    \ file and the schema file imported within the WSDL 1.1 document. Separating the\
    \ schema definition from the WSDL 1.1 document is highly recommended, both for\
    \ maintenance and for reuse. For the example web service, define the schema definition\
    \ shown in Listing 14-7 in a separate file named `types.xsd`.\n\n**Listing 14-7.**\
    \ *Schema Types for Example Web Service in types.xsd*\n\n```xml\n<?xml version='1.0'\
    \ encoding='UTF-8' ?>\n<xsd:schema\n  targetNamespace=\"http://www.apress.com/xmljava/webservices/schemas\"\
    \n  xsi:schemaLocation=\"http://www.w3.org/2001/XMLSchema http://www.nubean.com/schemas/schema.xsd\"\
    \ >\n  <xsd:complexType name=\"documentInfo\" >\n    <xsd:attribute name=\"name\"\
    \ type=\"xsd:string\" use=\"required\" ></xsd:attribute>\n    <xsd:attribute name=\"\
    createdOn\"\n      type=\"xsd:dateTime\" use=\"optional\" >\n    </xsd:attribute>\n\
    \    <xsd:attribute name=\"lastUpdated\"\n      type=\"xsd:dateTime\" use=\"optional\"\
    \ >\n    </xsd:attribute>\n  </xsd:complexType>\n  <xsd:complexType name=\"folderInfo\"\
    \ >\n    <xsd:sequence>\n      <xsd:element maxOccurs=\"unbounded\" minOccurs=\"\
    0\" name=\"document\"\n        type=\"documentInfo\" >\n      </xsd:element>\n\
    \    </xsd:sequence>\n    <xsd:attribute name=\"location\"\n      type=\"xsd:string\"\
    \ use=\"required\" >\n    </xsd:attribute>\n    <xsd:attribute name=\"createdOn\"\
    \n      type=\"xsd:dateTime\" use=\"optional\" >\n    </xsd:attribute>\n    <xsd:attribute\
    \ name=\"lastUpdated\"\n```"
  raw: '**Example WSDL 1.1 Document**


    In our opinion, if you are building a web service, the only way to start is to
    first construct a WSDL 1.1


    document. To build the example web service that implements all the use case scenarios,
    you need to construct a WSDL 1.1 document that formally describes the example
    web service. We will show you how to do that step by step; we describe these steps
    in detail in the following sections: **1.** Declare the relevant namespaces.


    **2.** Define a schema in a separate document.


    **3.** Import the schema into a WSDL 1.1 document.


    **4.** Define message types used by the web service.


    **5.** Define the web service interface (port type), including all the operations.


    **6.** Define the binding of port type to the SOAP 1.1/HTTP messaging and transport
    protocols.


    **7.** Define the port that binds the web service binding to the endpoint address.


    **Namespace Declarations**


    The first step you want to take is to declare all the namespace declarations you
    will need in this document:


    • The WSDL 1.1 language constructs are defined in the http://schemas.xmlsoap.org/wsdl/


    namespace, and you will use the wsdl prefix with this namespace.


    • The target namespace for the document will be http://www.apress.com/xmljava/webservices/


    definitions, which is entirely arbitrary. You will use the defs prefix with this
    namespace.


    • The namespace for the XML Schema language is http://www.w3.org/2001/XMLSchema,
    and you will use the xsd prefix with this namespace.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C14.fm Page 373 Saturday, August 12, 2006 5:18 AM


    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **373**


    • The namespace for MIME constructs is http://schemas.xmlsoap.org/wsdl/mime/,
    and you will use the mime prefix with this namespace.


    • The WSDL 1.1 to SOAP binding is specified in the http://schemas.xmlsoap.org/wsdl/soap/


    namespace in the soap prefix.


    • You will be defining your own schema types, and you will use the http://www.apress.com/


    xmljava/webservices/schemas namespace for the schema types. You will use the types
    prefix with this namespace.


    The root wsdl:definitions element of the WSDL 1.1 document with the relevant namespace
    declarations is as follows:


    <?xml version=''1.0'' encoding=''UTF-8'' ?>


    <wsdl:definitions


    targetNamespace="http://www.apress.com/xmljava/webservices/definitions"


    >


    </wsdl:definitions>


    **Schema Definition**


    In writing any but the most trivial of WSDL 1.1 documents, you will need schema
    data types. Although it is not a must, it is best to define these data types within
    a separate schema file and the schema file imported within the WSDL 1.1 document.
    Separating the schema definition from the WSDL 1.1


    document is highly recommended, both for maintenance and for reuse. For the example
    web service, define the schema definition shown in Listing 14-7 in a separate
    file named types.xsd.


    **Listing 14-7.** *Schema Types for Example Web Service in types.xsd*


    <?xml version=''1.0'' encoding=''UTF-8'' ?>


    <xsd:schema


    targetNamespace="http://www.apress.com/xmljava/webservices/schemas"


    xsi:schemaLocation="http://www.w3.org/2001/XMLSchema http://www.nubean.com/schemas/schema.xsd"
    >


    <xsd:complexType name="documentInfo" >


    <xsd:attribute name="name" type="xsd:string" use="required" ></xsd:attribute>


    <xsd:attribute name="createdOn"


    type="xsd:dateTime" use="optional" >


    </xsd:attribute>


    <xsd:attribute name="lastUpdated"


    type="xsd:dateTime" use="optional" >


    </xsd:attribute>


    </xsd:complexType>


