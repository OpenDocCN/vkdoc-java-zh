  trans: '

    **WSDL 1.1 文档示例**


    我们认为，在构建 Web 服务时，唯一正确的起点就是首先构建一个 WSDL 1.1 文档。为了构建实现所有用例场景的示例 Web 服务，您需要构建一个正式描述该示例
    Web 服务的 WSDL 1.1 文档。我们将逐步向您展示如何操作；并在以下章节中详细描述这些步骤：**1.** 声明相关命名空间。


    **2.** 在单独的文档中定义模式。


    **3.** 将模式导入 WSDL 1.1 文档。


    **4.** 定义 Web 服务使用的消息类型。


    **5.** 定义 Web 服务接口（端口类型），包括所有操作。


    **6.** 定义端口类型到 SOAP 1.1/HTTP 消息传递和传输协议的绑定。


    **7.** 定义将 Web 服务绑定绑定到端点地址的端口。


    **命名空间声明**


    您需要采取的第一步是声明本文档中所需的所有命名空间：


    • WSDL 1.1 语言构造在命名空间 http://schemas.xmlsoap.org/wsdl/ 中定义，您将使用 `wsdl` 前缀与此命名空间关联。


    • 文档的目标命名空间将是 http://www.apress.com/xmljava/webservices/definitions，这完全是任意的。您将使用
    `defs` 前缀与此命名空间关联。


    • XML Schema 语言的命名空间是 http://www.w3.org/2001/XMLSchema，您将使用 `xsd` 前缀与此命名空间关联。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C14.fm 第 373 页 2006 年 8 月 12 日，星期六，上午 5:18


    第 14 章 ■ 构建基于 XML 的 Web 服务


    **373**


    • MIME 构造的命名空间是 http://schemas.xmlsoap.org/wsdl/mime/，您将使用 `mime` 前缀与此命名空间关联。


    • WSDL 1.1 到 SOAP 的绑定在命名空间 http://schemas.xmlsoap.org/wsdl/soap/ 中指定，并使用 `soap`
    前缀。


    • 您将定义自己的模式类型，并将使用命名空间 http://www.apress.com/xmljava/webservices/schemas 来定义这些模式类型。您将使用
    `types` 前缀与此命名空间关联。


    包含相关命名空间声明的 WSDL 1.1 文档的根元素 `wsdl:definitions` 如下所示：


    ```xml

    <?xml version=''1.0'' encoding=''UTF-8'' ?>


    <wsdl:definitions


    targetNamespace="http://www.apress.com/xmljava/webservices/definitions"


    >


    </wsdl:definitions>

    ```


    **模式定义**


    在编写任何 WSDL 1.1 文档（即使是最简单的文档）时，您都需要模式数据类型。虽然不是必须的，但最好将这些数据类型定义在单独的模式文件中，并在 WSDL
    1.1 文档中导入该模式文件。强烈建议将模式定义与 WSDL 1.1 文档分离，这既有利于维护，也有利于重用。对于示例 Web 服务，请在名为 `types.xsd`
    的单独文件中定义如清单 14-7 所示的模式定义。


    **清单 14-7.** *types.xsd 中示例 Web 服务的模式类型*


    ```xml

    <?xml version=''1.0'' encoding=''UTF-8'' ?>


    <xsd:schema


    targetNamespace="http://www.apress.com/xmljava/webservices/schemas"


    xsi:schemaLocation="http://www.w3.org/2001/XMLSchema http://www.nubean.com/schemas/schema.xsd"
    >


    <xsd:complexType name="documentInfo" >


    <xsd:attribute name="name" type="xsd:string" use="required" ></xsd:attribute>


    <xsd:attribute name="createdOn"


    type="xsd:dateTime" use="optional" >


    </xsd:attribute>


    <xsd:attribute name="lastUpdated"


    type="xsd:dateTime" use="optional" >


    </xsd:attribute>


    </xsd:complexType>

    ```


