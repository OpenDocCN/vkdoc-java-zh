    开源原生 XML 数据库


    http://www.sleepycat.com/


    dbXML


    开源原生 XML 数据库


    http://www.dbxmlgroup.com/


    比“为什么应该关注 Xindice”更相关的问题是，“为什么需要原生 XML 数据库？”以下是一些关键点，可以回答这个切中要害的问题：


    • 如果你只想存储和检索完整的 XML 文档，那么关系数据库确实足够了。


    • 然而，如果你想查询已存储 XML 文档的集合并检索这些文档的部分内容，或者你想更新这些已存储 XML 文档的部分内容，而无需先检索整个文档、修改它再存回去，那么你就需要一个原生
    XML 数据库。


    • 当然，理论上可以将 XML 文档映射到关系数据库模式。然而，在实践中，从关系数据库编组 XML 文档比将 XML 文档解组到关系数据库更容易。这种不对称性的简单原因是，当
    XML 文档的树形结构被映射到关系数据库的网格结构时，与文档模型相关的信息会丢失，任何依赖文档模型的查询或更新都无法进行。


    • 原生 XML 数据库中的存储单元是一个文档。XML 数据库的模型不仅关注在文档中存储 XML 数据，还关注保留关于文档模型的所有信息。


    • 由于原生 XML 数据库保留了关于文档模型的信息，因此可以使用 XPath 语言查询原生 XML 数据库，并使用 XML:DB XUpdate² 语言（一种基于
    XPath 的更新语言）进行更新。


    就像使用关系数据库一样，你需要工具、查询语言和编程 API 来管理、访问和修改原生 XML 数据库。幸运的是，在 Xindice 中，所有这些工具都可用，你将在本章中详细探索它们。


    ². 这是 XML:DB 计划的一部分；你可以在 http://xmldb-org.sourceforge.net/xupdate/xupdate-wd.html#N1f64158
    找到更多信息。


