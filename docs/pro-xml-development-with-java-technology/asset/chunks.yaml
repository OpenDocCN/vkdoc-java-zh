    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **357**


    **Figure 14-2.** *Message-oriented model*


    It is possible to build complex message exchange patterns based on the simple
    one-way exchange pattern described in Figure 14-2. The most obvious message exchange
    pattern that follows naturally from the one-way exchange pattern is the request-response
    pattern. Figure 14-3 shows both the one-way pattern and the request-response pattern.


    **Figure 14-3.** *Message exchange patterns*


    The simple two-node patterns can be extended to multiple nodes, where a message
    travels from an initial sender to an ultimate receiver through a number of intermediate
    nodes, as shown in Figure 14-4.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


