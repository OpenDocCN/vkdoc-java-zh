    to be mapped to a messaging protocol and a transport protocol. Each wsdl:portType
    is recursively mapped to a messaging protocol and a transport protocol in a wsdl:binding
    element, which is a child of wsdl:definitions.


    • Each wsdl:portType abstract interface is mapped to a concrete network endpoint
    address through a wsdl:port element. A wsdl:port element is defined within a wsdl:service
    element, which is a child of wsdl:definitions.


