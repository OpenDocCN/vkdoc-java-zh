    • The soapenv:Envelope element should not contain the namespace declaration .


    • soapenv:Envelope can have an optional soapenv:Header child element. If present,
    soapenv:Header must be the first immediate child of the soapenv:Envelope element.


    All immediate child elements of soapenv:Header must be namespace qualified.


    • soapenv:Envelope must have a mandatory soapenv:Body element. It must follow
    the soapenv:Header element if the soapenv:Header element is present, or it must
    be the first immediate child of the soapenv:Envelope element. Immediate child
    elements of the soapenv:Body element must be namespace qualified.


    • soapenv:Body must be the last child element of the soapenv:Envelope element.


    • soapenv:Envelope, soapenv:Header, and soapenv:Body must not contain any attributes
    qualified in the http://schemas.xmlsoap.org/soap/envelope/ namespace.


    The SOAP 1.1 messages shown in Listings 14-1 and 14-2 are examples of WS-I BP
    1.1–conformant messages.


