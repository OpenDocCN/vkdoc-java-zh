    ## Class Binding Declarations


    You specify class binding declarations with the `class` element in a schema element,
    as shown in Listing 6-28. With class binding declarations, you can map a schema
    element to a specified interface and implementation class. In the example schema,
    the complex type `catalogType` maps to `CatalogClass`. The default mapping for
    the complex type `catalogType` is `CatalogType`.


    **Listing 6-28.** *Class Binding Declaration*


    ```

    <jxb:class name = "CatalogClass">


    </jxb:class>

    ```


    ## Property Binding Declarations


    You specify a property binding declaration with the `property` element. A property
    binding declaration specifies the customization in the binding of an element to
    a Java interface or class. In the example schema, an `isSet()` method is generated
    for the `title` element. An `isSet()` method returns `true` if a default value
    has been specified in the schema.


    ```

    <jxb:property generateIsSetMethod= "true" />

    ```


    If you run the `xjc` compiler again, you will notice that the Java classes get
    generated in the `jaxb` package. Lists are represented internally in implementation
    classes with `java.util.ArrayList`.


    The datatype `xsd:date` maps to `java.util.Date`. Java representations generated
    corresponding to schema elements have an `Element` suffix. The complex type `catalogType`
    maps to the `CatalogClass` interface, and the `isSet()` and `unset()` methods
    are generated for the `title` element.


    ## JAXB 2.0


    In the following sections, we will cover JAXB 2.0 and how it differs in operation
    from JAXB 1.0.


    ### Architecture


    JAXB 1.0 was designed under a tight time constraint. As a result, the architects
    of this specification made a conscious decision to support the binding of only
    a subset of schema components to Java; complete support was left to a later specification.
    JAXB 2.0 remedies the lack of complete schema support in JAXB 1.0 and adds binding
    support for missing schema components. In particular, the following schema support
    was added to JAXB 2.0:


    - Element declarations using the `substitutionGroup` attribute, which is resolved
    to a predefined model group schema component (`<xs:element @substitutionGroup>`).

    - Wildcard schema components (`xs:any` and `xs:anyAttribute`).

    - Identity constraints used to specify uniqueness across multiple elements (`xs:key`,
    `xs:keyref`, and `xs:unique`).

    - Redefined XML Schema components using the `redefine` declaration (`<xs:redefine>`).

    - Notation XML Schema components (`<xs:notation>`).

    - The following schema attributes are supported: `complexType.abstract`, `element.abstract`,
    `element.substitutionGroup`, `xsi:type`, `complexType.block`, `complexType.final`,
    `element.block`, `element.final`, `schema.blockDefault`, and `schema.finalDefault`.


    The binding framework of JAXB 2.0 enhances the JAXB 1.0 unidirectional binding
    framework and adds support for bidirectional binding. JAXB 2.0 adds support for
    the binding of Java classes to XML Schema components, as shown in Figure 6-9.


    **Figure 6-9.** *JAXB 2.0 supports bidirectional binding.*


    ### Annotations


    JAXB 2.0 relies on J2SE 5.0 annotations to support bidirectional mapping between
    XML Schema and Java types. Annotations are used both in generated Java content
    classes and in Java classes as input to generate schema definitions. These binding
    annotations are defined in the `javax.xml.bind.annotation` package. Familiarity
    with J2SE 5.0 is required (and is assumed) to use these annotations. Table 6-2
    lists some of the more commonly used annotations defined in the `javax.xml.bind.annotation`
    package.'
