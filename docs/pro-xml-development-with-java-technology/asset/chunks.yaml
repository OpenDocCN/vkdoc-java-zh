    **Summary**


    XMLBeans is an XML-to-Java binding and runtime framework that is similar to JAXB.
    You can use the binding framework to bind an XML Schema to Java types. XMLBeans
    offers complete support for all XML Schema constructs. You can use a binding configuration
    file to customize XML Schema to Java type bindings. You can use the runtime framework
    to unmarshal and marshal an XML document to and from Java objects that are instances
    of bound Java types.


    In addition to marshaling and unmarshaling an XML document, XMLBeans offers low-level
    navigational support through the XmlCursor API. Using the XmlCursor API, you can
    position a cursor at a specified location and modify the document content at that
    location. This API also provides support for addressing document content with
    XPath and querying an XML document using the XQuery language.


    In our opinion, JAXB 2.0 should be the default choice for an XML Schema to Java
    types binding framework, mainly because of the following reasons:


    • It is part of the Java standards.


    • It offers support for the bidirectional mapping between XML Schema content and
    Java types.


    However, the following pragmatic reasons may indicate XMLBeans to be the more
    appropriate choice:


    • You are looking for full XML Schema support, but you are not ready to move to
    J2SE 5.0.


    • During the marshaling process, you want low-level control over the XML markup
    contained in the marshaled XML document.'
