    第 9 章 ■ 在关系型数据库中存储 XML


    SQL:2003 是一个相对较新的标准。因此，目前并非所有关系型数据库都支持该标准。你可能需要研究厂商专用信息，以了解你的数据库是否支持 SQL:2003
    标准。


    在 Java 中，JDBC 驱动程序是与关系型数据库交互的成熟方式。JDBC 4.0 API 规范公开评审草案（JSR-000221）提议支持 SQL:2003
    标准。预计当 JDBC 4.0 规范最终确定后，越来越多的数据库将增加对 XML 数据类型的支持。在 J2SE 6.0 中实现的 JDBC 4.0 API
    中，XML 数据类型映射到 java.sql.SQLXML Java 数据类型。SQLXML Java 数据类型的关键区别特性在于，你可以使用它来导航 XML
    文档。在 J2SE 5.0 中实现的 JDBC 3.0 API 没有定义 SQLXML 数据类型；在 JDBC 3.0 中，你只能将 XML 类型列作为 String
    或 CLOB 检索。与使用 java.sql.SQLXML 类型不同，你不能使用 String 或 CLOB 来导航 XML 文档。


    你需要一个 JDBC 4.0 驱动程序来从 XML 数据类型列中检索 XML 文档，并将其映射到实现 java.sql.SQLXML 接口的对象。由于 JDBC
    4.0 规范仍在公开评审中，目前没有知名的关系型数据库提供 JDBC 4.0 驱动程序。因此，只有当 JDBC 4.0 驱动程序可用时，你才能测试本章中的示例应用程序。同时，我们将使用
    JDBC 3.0 驱动程序来构建和执行示例。


    在本章中，我们将解释如何将 XML 文档存储到关系型数据库中、如何从数据库中检索 XML 文档，以及如何使用 java.sql.SQLXML 接口导航 XML
    文档；当然，使用 java.sql.SQLXML 导航文档仅在 JDBC 4.0 驱动程序下可行。清单 9-1 显示了我们在示例中将使用的示例 XML 文档。


