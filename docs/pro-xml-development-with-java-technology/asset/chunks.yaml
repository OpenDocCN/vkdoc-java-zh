    在本章中，我们将结合 Xindice¹ 原生 XML 数据库来讨论通用的原生 XML 数据库概念。Xindice 是一个开源的原生 XML 数据库，可用于存储、检索、查询和更新
    XML 文档。由于 Xindice 是众多原生 XML 数据库之一，一个显而易见的问题是，为什么我们选择专注于 Xindice？我们决定将 Xindice
    作为代表性原生 XML 数据库进行重点介绍，主要有三个原因：


    • Xindice 从零开始就被设计为原生 XML 数据库，并且由于它只专注于这一功能，因此相当易于理解。


    • Xindice 非常紧凑，易于安装，并且管理简单。


    • Xindice 提供了命令行工具和基于标准的 API，用于管理、访问和修改 Xindice 数据库实例。


    当然，我们鼓励你探索其他原生 XML 数据库，当你这样做时，可以将本章在 Xindice 背景下学到的基本概念迁移到其他原生 XML 数据库中。表 8-2
