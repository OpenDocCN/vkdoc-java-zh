    从逻辑角度来看，Web 服务端点可以分为两部分：


    • 第一部分是*服务端点接口*（SEI）。SEI 是 Web 服务与其客户端之间的契约，类似于 Java 接口。

    • 第二部分是*代理*。代理是 SEI 的具体软件实现，类似于实现 Java 接口的 Java 类。


    提供者与请求者


    Web 服务由提供者实体提供。*提供者实体*可以是个人或组织。提供者实体通过*提供者代理*提供 Web 服务。提供者代理是 Web 服务 SEI 的具体软件实现。例如，如果亚马逊提供
    Web 服务，那么亚马逊就是提供者实体。


    Web 服务由*请求者实体*使用。请求者实体可以是个人或组织。请求者实体通过*请求者代理*使用 Web 服务。请求者代理是一个软件组件，它使用基于 Web
    服务的 WSDL 1.1 文档的描述与 Web 服务进行交互。例如，任何使用亚马逊 Web 服务的实体都是请求者实体。


    你可以使用 JAX-WS 2.0 API 来实现提供者代理和请求者代理。


