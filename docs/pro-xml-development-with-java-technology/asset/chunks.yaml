    **Summary**


    JAXB 1.0 specifies XML Schema binding to Java representation. JAXB 2.0 specifies
    a bidirectional XML Schema to Java representation. Both specifications provide
    a binding compiler for generating schema-derived Java content classes and a runtime
    framework for the marshaling and unmarshaling of XML documents.


    You can customize the XML Schema binding to Java types through external or inline
    binding declarations. The external binding declarations allow the schema definition
    and customizations to be cleanly separated and offer the advantage of applying
    different customizations to the same schema definition to satisfy different binding
    objectives. However, external binding declarations rely on XPath expressions to
    address binding nodes for customizations and are therefore relatively more complex
    to specify than inline bindings, which are specified within the schema definition
    and thus address binding nodes implicitly.


    JAXB 2.0 provides following advantages over JAXB 1.0:


    • Support for all the schema constructs


    • A relatively compact binding of a schema definition to Java content classes


    • Bidirectional mapping between schema definition and Java types We strongly recommend
    using JAXB 2.0, unless you explicitly need to stay with JAXB 1.0, such as for
    backward compatibility.


