    你将在Eclipse中运行`xjc`。因此，需要将`xjc`配置为Eclipse中的外部工具。要配置`xjc`作为外部工具，选择 **Run** ➤ **External
    Tools**。在 **External Tools** 对话框中，你需要创建一个新的程序配置，通过右键单击 **Program** 节点并选择 **New**
    来完成。这会添加一个新配置，如图6-5所示。在新配置中，在 **Name** 字段中指定配置的名称，并在 **Location** 字段中指定`xjc`批处理文件或shell文件的路径，该文件位于JWSDP安装目录下的`jaxb/bin`文件夹中。


    **图6-5.** *为`xjc`创建外部工具配置* 你还需要设置工作目录和程序参数。要设置工作目录，请单击 **Working Directory** 字段的
    **Variables** 按钮，并选择`container_loc`变量。这会在 **Working Directory** 字段中指定值`${container_loc}`。这个值意味着，无论运行`xjc`时选择了哪个模式文件，该文件的父目录都会成为`xjc`的工作目录。


