- fmt: '# CHAPTER 9: STORING XML IN RELATIONAL DATABASES


    **Listing 9-13.** *Creating a Statement Object*


    `Statement stmt = connection.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE,
    ResultSet.CONCUR_UPDATABLE);`


    Subsequently, obtain a `ResultSet` from the Catalog database table, as shown in
    Listing 9-14. To add a new row, move the `ResultSet` cursor to the insert row.
    You can update the `INT` column value using the `updateInt()` method, and you
    can update the `SQLXML` column value using the `updateSQLXML()` method. A new
    row is not inserted until the `insertRow()` method is called, as shown in Listing
    9-14.


    **Listing 9-14.** *Adding a New Row*


    ```

    ResultSet rs = stmt.executeQuery("SELECT * from Catalog");

    rs.moveToInsertRow();

    rs.updateInt(1, 2);

    rs.updateSQLXML(2, xmlObject);

    rs.insertRow();

    ```


    You can also update a `ResultSet` from the current row in a scrollable `ResultSet`.
    To update a `ResultSet` from the current row in a scrollable `ResultSet`, move
    to a `ResultSet` row using the `absolute(int)` or `relative(int)` method. The
    method `absolute(int)` moves the cursor to the specified row; the method `relative(int)`
    moves the cursor a specified number of rows relative to the current row. You can
    update the `SQLXML` value in the `ResultSet` using an update method, and subsequently
    you can update the database row using the `updateRow()` method, as shown in Listing
    9-15.


    **Listing 9-15.** *Updating a Row*


    ```

    rs.absolute(5);

    rs.updateSQLXML("catalog", xmlObject);

    rs.updateRow();

    ```


    If an `XMLStreamWriter` object has not been closed prior to invoking the update
    methods, `SQLException` gets thrown.


    ## Retrieving an XML Document


    In this section, you will retrieve an XML document from a database table column
    of type XML. To obtain a `ResultSet` object from the Catalog database table, create
    a `PreparedStatement` using a `SELECT` query, as shown in Listing 9-16. The SQL
    statement has a parameter marker for the `CatalogId` value. You set the `CatalogId`
    value using the `setInt(int index, int value)` method. Using the `PreparedStatement`
    object, obtain a result set using the `executeQuery()` method, as shown in Listing
    9-16.


    **Listing 9-16.** *Retrieving a ResultSet*


    ```

    PreparedStatement stmt = connection.prepareStatement("SELECT * FROM CATALOG WHERE
    CatalogId=?");

    stmt.setInt(1, 1);

    ResultSet rs = stmt.executeQuery();

    ```


    You can obtain the `SQLXML` object for the Catalog column, which is of type XML,
    from the `ResultSet` using the `getSQLXML(int index)` method or the `getSQLXML(String
    columnName)` method, as shown in Listing 9-17. You can output the XML document
    in an `SQLXML` object using the `getString()` method of the `SQLXML` interface.


    **Listing 9-17.** *Retrieving the SQLXML Object*


    ```

    SQLXML sqlXML = rs.getSQLXML("Catalog");

    System.out.println(sqlXML.getString());

    ```


    ## Navigating an XML Document


    Instead of outputting the XML document to a `String` value, you can navigate a
    document using an `XMLStreamReader` object. The `XMLStreamReader` interface is
