    •   *节点测试*是一个过滤器，它基于节点类型或节点名称来约束选定的节点集。


    •   *谓词*是一个过滤器，它基于 XPath 表达式来约束选定的节点集。


    我们将在以下各节中更详细地介绍这些组件中的每一个。例如，位置路径 `/child::catalog/child::journal/child::article[attribute::date=''January-2004'']/attribute::level`
