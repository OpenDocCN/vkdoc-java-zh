- fmt: '# XPath 轴与节点测试


    ## 轴（Axis）


    - `descendant-or-self::` 指代所有节点，包括当前节点及其后代节点，按文档顺序排列。图 4-2 展示了 `descendant::`
    和 `self::` 节点的示例，它们共同构成 `descendant-or-self::` 轴。这是一个正向轴。


    - `namespace::` 指代所有附加的命名空间节点。如果上下文节点不是元素节点，则该轴为空。例如，在图 4-2 中，假设上下文节点是根 `catalog`
    元素，则其 `xmlns:journal` 命名空间属性位于 `namespace::` 轴上。这是一个正向轴。


    ## 节点测试（Node Test）


    在位置路径步骤中，当沿着指定轴移动时，会遇到不同类型和名称的节点。这些节点构成一个节点集。可以对此基础节点集应用节点测试过滤器，该过滤器能够基于节点类型或节点名称过滤节点。


    ### 节点类型测试


    基于节点类型的节点测试如下：


    - `node()` 是一个节点测试，指代任何类型的节点。例如，表达式 `child::node()` 选择上下文节点的所有子节点。如前所述，元素节点的属性不属于其子节点。

    - 轴和节点测试的组合 `self::node()` 可以缩写为 `.` 字符。例如，表达式 `./child::node()` 选择上下文节点的所有子节点。

    - 轴和节点测试的组合 `parent::node()` 可以缩写为 `..` 字符序列。例如，表达式 `../child::node()` 选择上下文节点父节点的所有子节点，这些子节点可能包含也可能不包含上下文节点。（你能看出原因吗？提示：上下文节点可能是一个属性节点。）

    - 轴和节点测试的组合 `/descendant-or-self::node()/` 可以缩写为 `//` 字符序列。例如，XPath 表达式开头的 `//`
    选择文档中所有非属性且非命名空间的节点。

    - `text()` 是一个节点测试，指代类型为 `Text` 的节点。例如，`descendant::text()` 将求值为上下文节点中所有类型为 `Text`
    的后代节点。

    - `comment()` 是一个节点测试，指代类型为 `Comment` 的节点。例如，`preceding::comment()` 将求值为上下文节点中所有类型为
    `Comment` 的前置节点。

    - `processing-instruction()` 是一个节点测试，指代类型为 `ProcessingInstruction` 的节点。例如，`following::processing-instruction()`
    将求值为上下文节点中所有类型为 `processing-instruction` 的后继节点。


    ### 节点名称测试


    不带命名空间前缀的基于名称的节点测试指代以下内容：


