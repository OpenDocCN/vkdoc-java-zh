    •   `child::` 指按文档顺序排列的子节点。此轴仅适用于元素节点。如果上下文节点是属性、文本或命名空间节点，则此轴为空。元素的属性节点不是子节点。此轴不包含任何属性或命名空间节点。图
    4-2 显示了 `child::` 轴的示例。如果省略轴说明符，则这是默认值。这是一个正向轴。


    •   `parent::` 当上下文节点是元素节点或文本节点时，指父节点；但当上下文节点是属性节点时，指附加的元素节点。图 4-2 显示了 `parent::`
    轴的示例，其中上下文节点是元素节点。如果上下文节点是当前 article 上下文节点的 date 属性，那么 `parent::` 轴将仅包含当前 article
    上下文节点。这是一个反向轴。


