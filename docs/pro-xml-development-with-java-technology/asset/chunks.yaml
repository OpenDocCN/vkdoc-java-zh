    \ 的错误处理程序参数，你需要创建一个实现 `DOMErrorHandler` 接口的类。清单 10-5 显示了一个 `DOMErrorHandler` 实现类。\n\
    \n**清单 10-5.** *错误处理程序类*\n\n```java\nprivate class DOMErrorHandlerImpl implements\
