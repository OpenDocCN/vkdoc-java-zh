    # About the Authors


    **AJAY VOHRA** is a senior solutions architect at DataSynapse (http://www.datasynapse.com).
    His current focus is service-oriented architecture based on grid-enabled virtualized
    application services. He has 15 years of software development experience, spanning
    diverse areas such as X Windows Toolkit, ATM networking, automatic conversion
    of COBOL to J2EE applications, and J2EE-based enterprise applications. He has
    a master’s degree in computer science from Southern Illinois University–Carbondale
    and an MBA from the University of Michigan Ross School of Business in Ann Arbor,
    Michigan. Ajay is an avid golfer and loves swimming in Lake Michigan with his
    family.


    **DEEPAK VOHRA** is an independent consultant and a founding member of NuBean
    (http://www.nubean.com). He has worked in the area of XML and Java programming
    for more than five years and is a Sun Certified Java Programmer and a Sun Certified
    Web Component Developer. He has a master’s degree in mechanical engineering from
    Southern Illinois University–Carbondale and has published original research papers
    in the area of fluidized bed combustion. Currently, he is working on an automated,
    web-based J2EE development environment for NuBean. When not programming, Deepak
    likes to bike and play tennis.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ---


    # About the Technical Reviewer


    **BHARATH GOWDA** works as a technical account manager (TAM) at Compuware in Michigan.
    In his capacity as a TAM, he is responsible for crafting development solutions
    based on OptimalJ in the application delivery management space. Previously, he
    spent most of his time building and enhancing enterprise-level J2EE solutions
    for organizations in the Michigan region. Bharath earned his master’s degree in
    computer science from the University of Southern California–Los Angeles. He lives
    in Ann Arbor, Michigan, with his wife, Swarupa.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


