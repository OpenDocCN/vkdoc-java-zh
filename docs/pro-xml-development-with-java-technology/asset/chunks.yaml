    第 5 章 ■ 使用 XSLT 进行转换


    **115**


    **3.** 从这一点开始，随着每个模板在结果树中被实例化，它又会依次被处理。模板中的字面元素被原封不动地复制到结果树中。对于在已实例化模板中找到的每个 XSLT
    指令，处理将按照下一步所述继续进行。例如，在清单 5-3 的 `<xsl:template match="/" >` 模板中，HTML 元素是原封不动复制的字面内容，而
    `<xsl:for-each select="catalog/journal" >` 是一个 XSLT 指令的示例，它将继续进行下一步所述的处理。


    **4.** 对于在已实例化模板中找到的每个 `xsl:apply-templates` 指令，使用 `select` 属性的 XPath 表达式值从源树中选择一个节点集。对于所选节点集中的每个节点，处理器扫描样式表以寻找匹配的
    `xsl:template`，如果找到 `xsl:template`，则将其实例化到结果树中，并继续处理。如果为当前节点集中的某个节点找到了多个匹配的 `xsl:template`，则视为错误。但是，处理器可能会选择忽略该错误并选取其中一个匹配的模板进行实例化。这可能是不同处理器之间行为不一致的一个来源。请注意，`xsl:template`
    匹配的算法并不要求 `select` 属性值和 `match` 属性值必须相同。例如，在清单 5-3 的 `<xsl:apply-templates select="."
    >` 指令中，`select` 值与 `<xsl:template match="journal" >` 模板匹配，如下一步所述。


    **5.** 对于在已实例化模板中找到的每个 `xsl:for-each` 指令，使用 `select` 属性的 XPath 表达式值从源树中选择一个节点集。对于所选节点集中的每个节点，`xsl:for-each`
    指令的主体被实例化到结果树中并进行处理。例如，清单 5-3 中的 `<xsl:for-each select="catalog/journal" >` 指令遍历所有
    `journal` 元素的节点集，并为每个 `journal` 元素执行 `for` 循环的主体。`for` 循环的主体是 `<xsl:apply-templates
    select="." >` 指令。该指令的 `select` 值与 `<xsl:template match="journal" >` 模板匹配，因为该指令是在
    `xsl:for-each` 循环中执行的，循环的每次迭代都会选择不同的 `journal` 元素。而 `<xsl:template match="journal"
    >` 中的 `<xsl:value-of select="@title" />` 指令会打印每个 `journal` 的 `title` 属性的值。


    有了对处理算法的这种基本理解，你就可以准备查看转换是如何指定的了，接下来你将进行这一步骤。


    **XSLT 语法和语义**


    以下各节重点介绍 XSLT 的语法和语义。


    xsl:stylesheet 元素'
- fmt: "# XSLT Elements Reference\n\nThe root element in an XSLT style sheet is `xsl:stylesheet`,\
    \ where `xsl` is the prefix associated with the XSLT namespace URI `http://www.w3.org/1999/XSL/Transform`.\
    \ You can use a prefix other than `xsl`, of course, as long as it is associated\
    \ with the correct namespace URI. Attributes of the `stylesheet` element are `id`,\
    \ `version`, `extension-element-prefixes`, and `exclude-result-prefixes`. The\
    \ `version` attribute specifies the XSLT version, which may be either `1.0` or\
    \ `1.1`[^7]. This attribute must be specified.\n\nWe will use version `1.0`, because,\
    \ at this point, it is the only version that is a W3C Recommendation, and it is\
    \ the version supported in the Java API for the XML (JAXP) `1.3` specification.\
    \ The `extension-element-prefixes` attribute specifies namespace prefixes for\
    \ extension elements. The `exclude-result-prefixes` attribute specifies namespace\
    \ prefixes that are to be excluded from the output. Listing 5-4 shows an example\
    \ `xsl:stylesheet` element.\n\n[^7]: Version `1.1` was abandoned as a W3C Working\
    \ Draft in August 2001 (http://www.w3.org/TR/xslt11/).\n\n**Listing 5-4.** *`xsl:stylesheet`*\n\
    \n```xml\n<xsl:stylesheet\n    exclude-result-prefixes = \"jaxb\"\n    version\
    \ =\"1.0\" >\n</xsl:stylesheet>\n```\n\n## `xsl:output` Element\n\nThe `xsl:output`\
    \ element, a subelement of the `xsl:stylesheet` element, specifies features of\
    \ the result tree output. Some of the attributes of the `xsl:output` element are\
    \ `method`, `version`, `encoding`, `omit-xml-declaration`, `doctype-public`, `doctype-system`,\
    \ and `indent`. These attributes work as follows:\n\n- The `method` attribute\
    \ specifies the result tree type and may have the value `xml`, `html`, or `text`.\
    \ You can also specify other output method types.\n- The `version` attribute specifies\
    \ the version in the XML declaration in the generated output document.\n- If `omit-xml-declaration`\
    \ is set to `yes`, the XML declaration is omitted from the output document.\n\
    - The `encoding` attribute specifies the encoding of the document generated.\n\
    - `doctype-public` specifies the public identifier in the `DOCTYPE` declaration,\
    \ which was discussed in Chapter 1.\n- The `doctype-system` attribute specifies\
    \ the system identifier in the `DOCTYPE` declaration. If the `indent` attribute\
    \ is set to `yes`, the output is indented.\n\nListing 5-5 shows an example `xsl:output`\
    \ element.\n\n**Listing 5-5.** *`xsl:output`*\n\n```xml\n<xsl:output\n    method\
    \ = \"xml\"\n    version = \"1.0\"\n    encoding = \"utf-8\"\n    omit-xml-declaration\
    \ = \"no\"\n    doctype-public =\"-//Sun Microsystems, Inc.//DTD Enterprise JavaBeans\
    \ 2.0//EN\"\n    doctype-system =\"http://java.sun.com/dtd/ejb-jar_2_0.dtd\"\n\
    \    indent = \"yes\" />\n```\n\n## `xsl:template` Element\n\nAs noted, the `xsl:template`\
    \ element is the core of XSLT, and each `xsl:template` is associated with a pattern,\
    \ expressed as an XPath expression. Two important attributes of the `xsl:template`\
    \ element are `match` and `name`. The `match` attribute specifies the pattern\
    \ to match; the `name` attribute identifies a template by name. The `match` attribute\
    \ is required unless the `name` attribute is specified, in which case it is optional.\
    \ An example of an `xsl:template` element is as follows:\n\n```xml\n<xsl:template\
    \ match=\"journal\" >\n    <xsl:value-of select=\"@title\" />\n</xsl:template>\n\
    ```\n\nThe XPath pattern in the `match` attribute in the previous example matches\
    \ the node set of all the `journal` elements in the example source document shown\
    \ in Listing 5-1. If you recall, it is the body of the `xsl:for-each` instruction\
    \ in the Listing 5-3 loop that iterates over each `journal` element and, through\
    \ the `<xsl:apply-templates select=\".\" >` instruction, selects and applies the\
    \ template shown previously.\n\n## `xsl:apply-templates` Element\n\nYou can use\
    \ the `xsl:apply-templates` element to select a node set from the source tree.\
    \ Along with the `xsl:for-each` instruction, it is one of the two key instructions\
    \ used to change the current node set. The `select` attribute of the `xsl:apply-templates`\
    \ element specifies an XPath expression that evaluates to a node set in the context\
    \ of the source tree. If the XPath expression is a relative expression, it is\
    \ evaluated with respect to the current processing node. If the `select` attribute\
    \ is omitted, all the child nodes of the current processing node are processed.\
    \ Listing 5-6 shows an example of an `xsl:apply-templates` element within an `xsl:template`\
    \ element.\n\n**Listing 5-6.** *`xsl:apply-templates`*\n\n```xml\n<xsl:template\
    \ match=\"/\" >\n    <html>\n        <body>\n            <table>\n           \
    \     <tr><th>Titles</th></tr>\n                <xsl:for-each select=\"catalog/journal\"\
    \ >\n                    <tr><td>\n                        <xsl:apply-templates\
    \ select=\".\" ></xsl:apply-templates>\n                    </td></tr>\n     \
    \           </xsl:for-each>\n            </table>\n        </body>\n    </html>\n\
    </xsl:template>\n```\n\nIn Listing 5-6, the `xsl:apply-templates` instruction\
    \ selects child `journal` nodes of the current `catalog` element, tries to find\
    \ a matching template in Listing 5-3 for the selected `journal` node, and then\
    \ applies the matched template. Earlier we discussed the matched template for\
    \ this `xsl:apply-templates` instruction.\n\n## `xsl:call-template` Element\n\n\
    If you specify the `name` attribute in an `xsl:template` element, you can invoke\
    \ the template with the `xsl:call-template` element. Listing 5-7 shows an example\
    \ of `xsl:call-template`.\n\n**Listing 5-7.** *`xsl:call-template`*\n\n```xml\n\
    <xsl:template name=\"template1\">\n</xsl:template>\n\n<xsl:call-template name=\"\
    template1\">\n</xsl:call-template>\n```\n\nThe difference between `xsl:call-template`\
    \ and `xsl:apply-template` is that the former is an explicit call to a named `xsl:template`\
    \ element where the `match` attribute is irrelevant; the latter is an implicit\
    \ call that depends on a match between the `select` attribute in `xsl:apply-template`\
    \ and the `match` attribute in `xsl:template`.\n\n## `xsl:for-each` Element\n\n\
    For iterating over a node set, you can use the `xsl:for-each` element. Listing\
    \ 5-8 shows an example of `xsl:for-each`, which is an excerpt from Listing 5-3.\n\
    \n**Listing 5-8.** *The `xsl:for-each` Element*\n\n```xml\n<xsl:for-each select=\"\
    catalog/journal\" >\n    <tr><td>\n        <xsl:apply-templates select=\".\" ></xsl:apply-templates>\n\
    \    </td></tr>\n</xsl:for-each>\n```\n\nIn the example `xsl:for-each` element,\
    \ the `select` attribute evaluates to a node set of `journal` elements in the\
    \ document shown in Listing 5-1. For each node in this node set, the body of the\
    \ `xsl:for-each` instruction is processed.\n\n## Variables\n\nYou can specify\
    \ variables in XSLT with `xsl:variable` and `xsl:param` elements. The `xsl:variable`\
    \ and `xsl:param` elements have the attributes `name` and `select`. You specify\
    \ the value of a variable or a parameter in the `select` attribute or in the element.\
    \ For example, you can specify a variable with the value `var1` as follows:\n\n\
    ```xml\n<xsl:variable name=\"var1\" select=\"'var1'\"/>\n```\n\nor as follows:\n\
    \n```xml\n<xsl:variable name=\"var1\">var1</xsl:variable>\n```\n\nYou can specify\
    \ a parameter similarly:\n\n```xml\n<xsl:param name=\"param1\" select=\"'param1'\"\
    />\n```\n\nA difference between a parameter and a variable is that the value specified\
    \ in the `xsl:param` element is the default value and may be overridden when a\
    \ template is invoked. You can specify a parameter value with the `xsl:with-param`\
    \ element. Listing 5-9 shows an example of overriding the default parameter value.\n\
    \n**Listing 5-9.** *Applying Templates with Parameter Values*\n\n```xml\n<xsl:apply-templates>\n\
    \    <xsl:with-param name=\"param1\" select=\"'param1'\"/>\n</xsl:apply-templates>\n\
    ```\n\nYou can declare `xsl:variable` and `xsl:param` elements at the top level\
    \ or in a template. Another difference between `xsl:param` and `xsl:variable`\
    \ is that you can declare an `xsl:param` element in an `xsl:template` element\
    \ only at the beginning of the template."
