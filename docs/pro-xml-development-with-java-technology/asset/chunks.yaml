    \    <edition>Sep-2004</edition>\n    <title>Migrating to Eclipse</title>\n  \
    \  <author>David Gallardo</author>\n  </journal>\n  <journal>\n    <section>Java\
    \ Technology</section>\n    <publisher>IBM developerWorks</publisher>\n    <level>Intermediate</level>\n\
    \    <edition>Jan-2004</edition>\n  </journal>\n</catalog>\n```"
