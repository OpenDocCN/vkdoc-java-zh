  raw: 'In the XMLToSQL.java application, you need to import the java.sql and javax.xml.stream
    packages, where the javax.xml.stream package has the XMLStreamWriter and XMLStreamReader
    interfaces that are required to work with an SQLXML object. To create an XML document
    to be stored in the XML type column, first you need to create an SQLXML object.
    You create an SQLXML object from a Connection object using the createSQLXML()
    method, as shown here:


    SQLXML sqlXML=connection.createSQLXML();


    An SQLXML object created using the createSQLXML() method does not contain any
    data. To add data to an SQLXML object, you need to initialize this SQLXML object.
    You can initialize the SQLXML object either using an XMLStreamWriter object or
    using the setString() method of the SQLXML interface. To add data to an SQLXML
    object with an XMLStreamWriter object, create an XMLStreamWriter object from this
    SQLXML object by first creating a StAXResult object and subsequently obtaining
    an XMLStreamWriter object using the getXMLStreamWriter() method of the StAXResult
    class, as shown here: StAXResult staxResult = sqlXML.setResult(StAXResult.class);
    XMLStreamWriter xmlStreamWriter = staxResult.getXMLStreamWriter(); You use the
    setResult(Class<T> resultClass) method of the SQLXML interface to create a StAXResult
    object. The SQLXML object becomes unwritable when the setResult(Class<T> resultClass)
    method is invoked.


    An XMLStreamWriter object creates an XML document by adding elements and attributes.
    In an XMLStreamWriter object, you start an XML document using the writeStartDocument
    (String encoding, String version) method, as shown here:


    xmlStreamWriter.writeStartDocument("UTF-8","1.0"); Encoding specified in the writeStartDocument
    (String encoding, String version) method sets the encoding in the XML declaration
    of the XML document under construction. The XMLStreamWriter interface also provides
    the writeStartDocument() method to create an XML document without specifying an
    encoding and version and provides the writeStartDocument(String version) method
    to create an XML document with just the version information but no encoding.


    You add the root catalog element of the example XML document using the writeStartElement(String
    localName) method, as shown here: xmlStreamWriter.writeStartElement("catalog");


    You can create an element with a namespace prefix using the writeStartElement(String
    prefix, String localName, String namespaceURI) method. You can generate an empty
    element using the writeEmptyElement(String localName) method.


