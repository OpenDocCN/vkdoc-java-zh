    元素以及零个或多个 `wsdl:fault` 元素，这些元素通过 `message` 属性与 `wsdl:message` 定义相关联。顾名思义，`wsdl:input`
    定义了请求消息，`wsdl:output` 定义了响应消息，而 `wsdl:fault` 则定义了 SOAP 错误消息的详细信息。以下是一个请求-响应 `wsdl:operation`
    的示例，即 `download`：


    <wsdl:operation name="download" >


    <wsdl:input message="defs:DownloadProject" name="project" >


    </wsdl:input>


    <wsdl:output message="defs:DownloadZip" name="downloadZip" >


    </wsdl:output>


    <wsdl:fault message="defs:ProjectFault" name="fault" >


    </wsdl:fault>


    </wsdl:operation>


    在上述 `download` 的 `wsdl:operation` 中，`defs:DownloadProject`、`defs:DownloadZip`
    和 `defs:ProjectFault` 是用于请求-响应消息交换模式的抽象消息。


