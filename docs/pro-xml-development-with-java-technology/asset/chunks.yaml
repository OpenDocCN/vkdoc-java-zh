    restriction with a restriction element. If you want to define a titleType as an
    element that allows a string type in its content but restricts the length of this
    content to between 10 to 256 characters, you can do so using a simpleContent restriction
    that adds the minLength and maxLength constraining facets to a string base type,
    as shown here:


    <xsd:complexType name="titleType" >


    <xsd:simpleContent>


    <xsd:restriction base="xsd:string" >


    <xsd:minLength value="10" />


    <xsd:maxLength value="256" />


    </xsd:restriction>


    </xsd:simpleContent>


    </xsd:complexType>


