    The DocumentBuilder class implements the DOM parser. The steps to instantiate
    a DocumentBuilder object are as follows:


    **1.** Create a DocumentBuilderFactory object using the static method newInstance().
    The DocumentBuilderFactory class is a factory API for generating DocumentBuilder
    objects.


    **2.** Create a DocumentBuilder object by invoking the newDocumentBuilder() static
    method on the DocumentBuilderFactory object.


    The DocumentBuilder parser creates an in-memory DOM structure from an XML document.
    If you want to handle validation errors during parsing, you need to define a class
    that implements the ErrorHandler interface shown in Table 2-3 and set an instance
    of this error handler class on the parser.


    Listing 2-3 shows an example class that implements the ErrorHandler interface.


    **Listing 2-3.** *Implementing ErrorHandler*


    class ErrorHandlerImpl implements org.xml.sax.ErrorHandler {


    public void error(SAXParseException exception)


    throws SAXException{


    // application-specific logic


    }


    public void fatalError(SAXParseException exception)


    throws SAXException{


    // application-specific logic


    }


    public void warning(SAXParseException exception)


    throws SAXException{


    // application-specific logic


    }


    }


    Listing 2-4 shows the complete code sequence for creating a DOM parser object
    that will validate a document and use an instance of the ErrorHandlerImpl class
    for error handling.


    **Listing 2-4.** *Complete Code Sequence to Instantiate the Factory*


    //Create a DocumentBuilderFactory


    DocumentBuilderFactory factory=DocumentBuilderFactory.newInstance();


    //Create a DocumentBuilder


    DocumentBuilder documentBuilder=factory.newDocumentBuilder();


    //Create and set an ErrorHandler


    ErrorHandlerImpl errorHandler=new ErrorHandlerImpl();


    documentBuilder.setErrorHandler(errorHandler);


    A parser can parse an XML document from a File, an InputSource, an InputStream,
    or a URI.


    An example of how to parse an XML document from a File object is as follows: Document
    document=documentBuilder.parse(new File("catalog.xml"));


