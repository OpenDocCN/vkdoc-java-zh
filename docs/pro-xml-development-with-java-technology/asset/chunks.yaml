  trans: '

    第 1 章


    ■ ■ ■


    使用 DOM Level 3 API 进行加载与保存


    **D**OM Level 3 Core 规范建立在 DOM Level 2 和 Level 1 Core 规范之上，定义了用于访问和操作通用文档（以文档树形式表示）内容与结构的平台无关、语言无关的接口。除了通用文档的接口外，DOM
    Level 3 Core 规范还包含用于操作 XML 文档的特定接口。（第 2 章讨论了 DOM Level 3 Core 规范。）DOM Level 3
    Load and Save¹规范提供了一组用于加载和保存（*序列化*与*反序列化*）XML 文档的接口。加载 XML 文档意味着将 XML 文档模型映射到
    DOM 文档模型。保存 XML 文档意味着将 DOM 文档模型转换为 XML 文档模型。DOM Load and Save Level 3 是一个平台无关、语言无关的规范。除了其语言和平台无关的特性外，推动该规范的关键特性如下：


    • 在加载和保存过程中过滤内容的能力

    • 加载和保存文档中选定节点（而非整个文档）的能力

    • 将文档序列化为字符串（而非文件）的能力

    • 文档加载和保存过程中的事件处理功能


    过滤内容或加载/保存选定节点的原因不胜枚举，但一些常见原因如下：


    • 在将文档传递给第三方之前，过滤其中的机密信息

    • 向文档添加或移除特定于应用程序的注释或处理指令

    • 为特定目的调整模板文档


    在本章中，我们将讨论 JAXP 1.3（包含在 J2SE 5.0 中）所实现的 DOM 3 Load and Save 规范。除了提供 XML 文档的加载与保存以及加载/保存过程中的内容过滤功能外，DOM
    3 Load and Save API 还提供了文档加载或序列化时的事件处理功能。在本章中，我们将涵盖 DOM Level 3 Load and Save
    API 的所有这些特性。


    1. DOM Level 3 Load and Save 规范是 W3C 推荐标准，可在 http://www.w3.org/TR/DOM-Level-3-LS/获取。


    **267**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C10.fm Page 268 Tuesday, July 25, 2006 5:05 AM


    **268**


    第 1 章 ■ 使用 DOM Level 3 API 进行加载与保存


    **概述**


    DOM 3 Load and Save 规范提供了 DOM 文档模型与 XML 文档模型之间双向映射的接口。该映射由一组接口实现，我们将在后续章节中简要讨论这些接口；并在后续章节中更详细地解释这些接口。


    DOMImplementationLS 接口扩展了 DOM Level 3 Core 的 DOMImplementation 接口，并提供了用于创建加载和保存
    XML 文档所需对象的工厂方法。使用 DOMImplementationLS 对象，您可以创建 LSParser、LSSerializer、LSInput
    或 LSOutput 对象。


    **介绍加载 API**


    以下是加载 API 的关键点：


    • LSParser 是将数据解析为 DOM 文档模型的接口。

    • LSInput 接口表示数据源。您可以使用字符流、字节流、字符串、系统 ID 或公共 ID 在 LSInput 对象上设置数据源。LSParser 使用
    LSInput 对象来确定如何读取数据。您可以在 LSParser 对象上设置多个输入源，LSParser 将使用第一个非空且非空字符串的输入源。


    LSParser 对象按以下顺序扫描不同的输入源以选择读取源：


    **a.** LSInput.characterStream

    **b.** LSInput.byteStream

    **c.** LSInput.stringData

    **d.** LSInput.systemId

    **e.** LSInput.publicId


    • LSResourceResolver 接口用于解析外部资源（如外部实体），并从外部资源创建 LSInput 对象。

    • LSParserFilter 在解析数据时过滤节点。


    **介绍保存 API**


    以下是保存 API 的关键点：


    • LSSerializer 接口用于将 DOM 文档模型序列化（保存）为 XML 文档模型。

    • LSOutput 接口表示序列化 DOM 文档模型的输出。LSSerializer 将使用 LSOutput 对象来确定输出目标。您可以在 LSSerializer
    对象上设置多个输出，LSSerializer 将使用第一个非空且非空字符串的输出。LSSerializer 对象按以下顺序扫描不同的输出以确定输出目标：


    **a.** LSOutput.characterStream

    **b.** LSOutput.byteStream

    **c.** LSOutput.systemId


    • LSSerializerFilter 接口在保存 DOM 文档模型时过滤节点。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C10.fm Page 269 Tuesday, July 25, 2006 5:05 AM


    第 1 章 ■ 使用 DOM Level 3 API 进行加载与保存 **269**


    **比较 JAXP 的 DocumentBuilder 和 Transformer API**


    DOM Level 3 Load and Save 规范受到了早期 JAXP 版本的影响。事实证明，在 DOM Level 3 Load and Save
    规范之前，JAXP 已经定义了可用于序列化和反序列化 XML 文档的 API。JAXP 的 DocumentBuilder 类提供了将 XML 文档映射到
    DOM 对象的标准方法，而 JAXP 的 Transformer 类提供了将 DOM 文档模型序列化为 XML 文档模型的方法。当然，JAXP 是 Java
    特定的 API。DOM Level 3 Load and Save 规范基于 JAXP 的思想，定义了用于加载和保存 XML 文档的平台无关、语言无关的接口，并增加了事件处理和过滤等功能。为了形成完整闭环，JAXP
    1.3 现在提供了 DOM Level 3 Load and Save 规范的 Java 绑定。


    如果您不需要过滤、事件处理或加载/保存选定节点等功能，可以使用 JAXP 的 DocumentBuilder 和 Transformer API 来加载和保存
    XML 文档。DOM 3 Load and Save 规范接口在 JAXP 的 DocumentBuilder 和 Transformer 类提供的功能之外，还提供了以下特性：


    • DOM Level 3 Load and Save 支持向解析器注册事件监听器。当使用 DOM 3 解析器完成 XML 文档加载时，生成的加载事件会指示文档加载已完成。

    • 您可以在 DOM 3 解析器加载节点或序列化节点时过滤节点。

    • 您可以保存 DOM 文档模型中的选定节点，而不是整个文档。

    • 您可以将 Document 节点或 Element 节点保存为 java.lang.String 对象，而不是文件。在 Web 服务中交换 XML 文档时，有时需要将
    XML 文档作为 String 类型。


    在本章中，我们将解释使用 DOM Level 3 规范加载和保存 XML 文档的过程。我们将演示如何使用 DOM Level 3 Load and Save
    规范在加载时和序列化时过滤内容。本章使用 JAXP 1.3（包含在 J2SE 5.0 中）提供的 DOM Level 3 Load and Save 实现。


    **创建 Eclipse 项目**

