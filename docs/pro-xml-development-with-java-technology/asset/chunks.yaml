    \ Java classes. So far, you have looked at binding the XML Schema content to Java\
    \ classes. In this section, you will generate XML Schema content from a Java class\
    \ using the JAXB 2.0 binding annotations. Therefore, you need to define an annotated\
    \ class: `Catalog.java`. To this class, you will apply the `schemagen` tool to\
    \ generate a schema definition.\n\nIn the `Catalog.java` class, import the `javax.xml.bind.annotation`\
    \ package that includes the binding annotation types. Define the root element\
    \ with the `@XmlRootElement` annotation. Create a complex type using the `@XmlType`\
    \ annotation:\n\n```\n@XmlRootElement\n@XmlType(name=\"\", propOrder={\"publisher\"\
    , \"edition\", \"title\", \"author\"})\n```\n\nYou specify the annotation element\
    \ `name` as an empty string because the complex type is defined anonymously within\
    \ an element. You specify the element order using the `propOrder` annotation element.\
    \ In the `Catalog` class, define constructors for the class, and define the different\
    \ JavaBean properties (`publisher`, `edition`, `title`, `author`). The root element\
    \ `catalog` has an attribute `journal`.\n\nDefine the `journal` attribute using\
    \ the `@XmlAttribute` annotation:\n\n```\n@XmlAttribute\npublic String journal;\n\
    ```\n\nYou also need to define getter and setter methods for the different properties\
    \ and the `journal` attribute. Listing 6-48 shows the complete `Catalog.java`\
    \ class.\n\n**Listing 6-48.** *Catalog.java*\n\n```\nimport javax.xml.bind.annotation.XmlRootElement;\n\
    import javax.xml.bind.annotation.XmlAttribute;\nimport javax.xml.bind.annotation.XmlType;\n\
    \n@XmlRootElement\n@XmlType(name = \"\", propOrder = { \"publisher\", \"edition\"\
    , \"title\", \"author\" })\npublic class Catalog {\n\n    private String publisher;\n\
    \    private String edition;\n    private String title;\n    private String author;\n\
    \n    public Catalog() {\n    }\n\n    public Catalog(String journal, String publisher,\
    \ String edition, String title, String author) {\n        this.journal = journal;\n\
    \        this.publisher = publisher;\n        this.edition = edition;\n      \
    \  this.title = title;\n        this.author = author;\n    }\n\n    @XmlAttribute\n\
    \    public String journal;\n\n    private String getJournal() {\n        return\
    \ this.journal;\n    }\n\n    public void setJournal(String journal) {\n     \
    \   this.journal = journal;\n    }\n\n    public String getPublisher() {\n   \
    \     return this.publisher;\n    }\n\n    public void setPublisher(String publisher)\
    \ {\n        this.publisher = publisher;\n    }\n\n    public String getEdition()\
    \ {\n        return this.edition;\n    }\n\n    public void setEdition(String\
