    Next, we will discuss the server-side processing of the XMLHttpRequest request.


    **Web Server–Side Processing**


    The XMLHttpRequest object is sent to the relative URL


    validateForm?catalogId=encodeURIComponent(catalogId.value), which invokes the
    FormServlet servlet. Because the XMLHttpRequest method is GET, the doGet() method
    of the servlet gets invoked.


    In the doGet() method, first you retrieve the value of the catalogId parameter,
    as shown here: String catalogId = request.getParameter("catalogId"); Next, you
    obtain data from the database to check whether a catalog ID value is already specified
    in the database. Connecting to a database is a two-step process: **1.** First,
    you discover the database through a lookup process that is akin to looking up
    a phone number in a phone directory, based on a name. This lookup process involves
    creating a JNDI10


    InitialContext object and invoking the lookup("java:MySqlDS") method on the object.
    The lookup() method returns a DataSource object.


    **2.** From the DataSource object, you create a Connection object, as shown in
    Listing 13-11.


    **Listing 13-11.** *Creating a Connection Object*


    InitialContext initialContext = new InitialContext();


    javax.sql.DataSource ds = (javax.sql.DataSource)


    initialContext.lookup("java:MySqlDS");


    java.sql.Connection conn = ds.getConnection();


    Subsequently, you create a Statement object to run a SQL query. Using the catalog
    ID value specified in the input form, you create a SQL query to retrieve data
    from the database. You run the SQL query using the executeQuery(String) method,
    which returns a ResultSet object, as shown in Listing 13-12.


