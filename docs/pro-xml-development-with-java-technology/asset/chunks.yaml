- fmt: '# Installing the Software


    The `SQLXML` Java type, which maps the XML database type to Java, is implemented
    in J2SE 6.0. Therefore, you need to install J2SE 6.0.2. Another requirement for
    storing an XML document in the XML type column using the `SQLXML` API is a JDBC
    4.0 driver. As mentioned earlier, no well-known relational database currently
    provides a JDBC 4.0 driver. Therefore, the best you can do at this point is to
    develop an application using a JDBC 3.0 driver to determine whether a database
    supports the XML data type.


    Of course, when a JDBC 4.0 driver becomes available, you can modify this application
    for use with a JDBC 4.0 driver.


    You also need a relational database that supports the XML data type. Currently,
    only a few well-known databases, DB2 UDB 9.1 and SQL Server 2005, support the
    XML data type; however, since none of them currently supports a JDBC 4.0 driver,
    you won’t be able to develop an `SQLXML` application with any of the well-known
    databases. Again, for a practical example that can be executed, you have to wait
    until JDBC 4.0 is finalized and JDBC 4.0 driver support is made available in commonly
    used databases.


    With the caveats already noted, we will show how to develop an application with
    the open source database MySQL using a JDBC 3.0 driver. Therefore, you need to
    download and install MySQL 5.0.


    You also need to download the MySQL JDBC driver. Or, if the JDBC 4.0 driver has
    since become available, download and install the relevant database and corresponding
    JDBC 4.0 driver.


    For more information about J2SE 6.0 Beta, see [http://java.sun.com/javase/6/download.jsp](http://java.sun.com/javase/6/download.jsp).


    # Setting Up the Eclipse Project


    We will show how to develop an application (`XMLToSQL.java`) to store and retrieve
    XML data in a relational database. Some of the methods of the `XMLToSQL.java`
    application are commented out and can be run when a database with support for
    a JDBC 4.0 driver and the XML data type becomes available.


    To compile and run the example application `XMLToSQL.java`, you need an Eclipse
    project. You can download project Chapter9 from the Apress website ([http://www.apress.com](http://www.apress.com))
    and import it into your Eclipse workspace by selecting **File ➤ Import**.


    To compile and run the `XMLToSQL.java` application, you need the JDBC JAR files
    in your project’s Java build path; Figure 9-1 shows these JAR files for the MySQL
    driver. If you modify the `XMLToSQL.java` application for another database, add
    the JDBC JAR files for the database to the Java build path. You also need to set
    the JRE system library to JRE 6.0, as shown in Figure 9-1.


    **Figure 9-1.** *Chapter9 Java build path*


    > MySQL, at the time of writing this book, did not support the XML database type.
    If you have access to a relational database that supports the XML database type,
    you can use such a database.

    >

    > For more information about the MySQL database, see [http://www.mysql.com/products/database/mysql/community_edition.html](http://www.mysql.com/products/database/mysql/community_edition.html).

    >

    > For more information about the MySQL Connector/J driver, see [http://www.mysql.com/products/connector/j/](http://www.mysql.com/products/connector/j/).


    Figure 9-2 shows the Chapter9 directory structure.


    **Figure 9-2.** *Chapter9 directory structure*


    # Selecting a Database


    As the `String` Java type is to the `VARCHAR` database type, the `SQLXML` Java
    type is to the XML database type. In JDBC 4.0, the `java.sql.Connection` interface
    has a new `createSQLXML()` method to create an `SQLXML` object. The `SQLXML` object
    thus created does not initially have any data. You can add data to an `SQLXML`
    object using its `setString(String)` method or its `createXMLStreamWriter()` method.'
