    **Listing 5-29.** *Output in Eclipse with XPath Node Selection* Date: October-2003


    Title: Best Practices in EJB Exception Handling


    **Filtering Elements**


    Applying xsl:apply-templates elements to only those elements and attributes that
    are required in the output can filter elements in an XML document. As an example,
    select the article elements with the level attribute specified as Intermediate.
    The style sheet filter.xslt, shown in Listing 5-30, selects the article elements
    that have level attributes with a value of Intermediate. The XPath expression
    article[@level=''Intermediate''] selects the article elements with the level attributes
    set to Intermediate.


    **Listing 5-30.** *filter.xslt*


    <?xml version="1.0" encoding="UTF-8"?>


    <xsl:stylesheet version="1.0" >


    <xsl:output method="xml" omit-xml-


    declaration="yes"/>


    <xsl:template match="/catalog/journal">


    <xsl:apply-templates select="article[@level=''Intermediate'']"/>


    </xsl:template>


    <xsl:template match="article">


    Title: <xsl:value-of select="title"/>


    Author: <xsl:value-of select="author"/>


    </xsl:template>


    </xsl:stylesheet>


    To run the transformation application with filter.xslt, set the File object stylesheet
    input to filter.xslt in XSLTTransformer.java. The output contains only the article
    element with the level value of Intermediate, as shown in Listing 5-31.


