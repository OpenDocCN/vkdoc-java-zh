    **Summary**


    In this chapter, we discussed three JAXP 1.3 schema validation APIs that can be
    classified into two groups:


    • The first group consists of the JAXP parser APIs, and these APIs perform validation
    as an intrinsic part of the parsing process, if the parser is configured for schema
    validation.


    • The second group consists of the JAXP Validation API, which decouples validation
    from parsing.


    This API instantiates an object representation of a schema and uses it to validate
    one or more XML documents.


    When the application intent is to make sure a document being parsed is not only
    well-formed but also valid, then using the first group of APIs makes perfect sense.
    When the intent is to validate a document outside the context of parsing a document,
    clearly the JAXP Validation API is the way to go.


