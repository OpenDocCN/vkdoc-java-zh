  raw: 'For JAXB 2.0, we will use the same example as for JAXB 1.0\. The example schema
    definition is the same, catalog.xsd, listed in Listing 6-6\. The example XML document
    is also the same, catalog.xml, listed in Listing 6-7\. The example XML document
    will be marshaled and unmarshaled with the JAXB


    2.0 API, instead of the JAXB 1.0 API, and we’ll discuss the differences.


    Before discussing the marshaling and unmarshaling Java applications developed
    with JAXB 2.0, we will show how to download and install some required software
    and create and configure an Eclipse project for JAXB 2.0.


    **Downloading and Installing Software**


    To run the JAXB 2.0 examples, you will need the following software.


    Installing Java Web Service Developer Pack (JWSDP)


    JAXB 2.0 is included in JWSDP 2.0\. Therefore, you need to download and install
    JWSDP 2.0.6 Install JWSDP 2.0 in any directory. We will assume JWSDP 2.0 is installed
    under the default installation directory, which on Windows is C:\Sun\jwsdp-2.0;
    assuming that is the case, JAXB is included in the C:\Sun\jwsdp-2.0\jaxb directory.


    Install J2SE 5.0


    In the JAXB 1.0 example, you used J2SE 5.0, because J2SE 1.4.2 does not provide
    some SAXParserFactory class methods. With JAXB 2.0, you need to use J2SE 5.0,
    because JAXB 2.0 uses parameterized types.


    Of course, you may have already installed J2SE 5.0 in the context of JAXB 1.0,
    so you may not need to install it at this point.


    **Creating and Configuring Eclipse Project**


    To compile the example schema with xjc and to run the marshaling and unmarshaling
    code examples for JAXB 2.0, you need to create an Eclipse Java project. The quickest
    way to create the Eclipse project is to download the Chapter6-JAXB2.0 project
    from the Apress website (http://www.apress.com) and import this project into Eclipse.
    This creates all the Java packages and files needed for this chapter automatically.


    You also need to set the Chapter6-JAXB2.0 JRE to the J2SE 5.0 JRE. You set the
    JRE in the project Java build path by clicking the Add Library button. Figure
    6-10 shows the Chapter6-JAXB2.0 Java build path. If your JWSDP 2.0 install location
    is not C:\Sun\jwsdp-2.0, you may need to explicitly add or edit the external JARs
    shown in Figure 6-10\. Either way, make sure your Java build path shows all the
    JWSDP 2.0 JAR files shown in Figure 6-10.


    6\. You can find JWSDP 2.0 at http://java.sun.com/webservices/downloads/webservicespack.html.


