    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **Figure 14-7.** *Chapter14 project Java build path* **Setting Up the wsimport
    Tool**


    The wsimport tool processes a WSDL 1.1 document as follows:


    • It generates the SEI, the service, and the JAXB 2.0 object bindings, based on
    the contents of the WSDL 1.1 document.


    • The SEI is a Java interface corresponding to a wsdl:portType definition within
    a WSDL 1.1


    document. The provider agent that implements the web service provides a concrete
    implementation for an SEI.


    • The service is a class that can be used by a web service client to interact
    with the web service.


    • The JAXB 2.0 object bindings correspond to the schema types in the WSDL 1.1
    document.


    These object bindings are used for marshaling and unmarshaling web service data
    types to and from XML content encapsulated within SOAP 1.1 messages.


    You will use wsimport to generate the SEI, the service, and the JAXB 2.0 object
    bindings for the services.wsdl WSDL 1.1 document.


    To use the wsimport tool, you need to first create an external tools configuration
    for wsimport by selecting Run ➤ External Tools ➤ External Tools. To create an
    external tools configuration, go through the following steps:


    **1.** Right-click the Program node in the External Tools area, and select New.


    **2.** Specify a name for the configuration, such as wsimport.


    **3.** Specify the wsimport.bat file in the Location field.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 93](index-408_1.png)


    Vohra_706-0C14.fm Page 389 Saturday, August 12, 2006 5:18 AM


    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **389**


    **4.** In the Working Directory field, specify ${project_loc}, and in the Arguments
    field, you need to specify the following arguments: -s wsgen -d bin -keep -verbose
    -b wsdl/binding.xjb


    -b wsdl/svcbindings.xml wsdl/${resource_name}.


    **5.** Click the Apply button. An external tools configuration gets configured
    for the wsimport tool, as shown in Figure 14-8.


    **Figure 14-8.** *wsimport external tools configuration* You also need to add
    the environment variable JAVA_HOME by selecting the Environment tab and subsequently
    clicking the New button. To add the wsimport external tools configuration to the
    Favorites menu, select the Common tab, and select the External Tools box in the
    Display in Favorites menu.


    **WSDL 1.1 to Java Mapping**


    Before you run the wsimport tool to generate the WSDL 1.1 to Java mapping for
    services.wsdl, we will cover the general concepts of this mapping process (we
    refer to the concept of customizations, which we will cover later in the section
    “Customizing WSDL 1.1 to Java Mapping”):


    • Each wsdl:portType within a WSDL 1.1 document is mapped to a Java SEI.


    • Each wsdl:operation within a wsdl:portType is mapped to a Java method within
    the SEI.


    • In the absence of customizations, the name of the mapped Java method is the
    same as the name of the wsdl:operation name attribute. By default, since the wsdl:operation
    name within a wsdl:portType is unique, there will be no overloaded methods. It
    is best to adhere to unique method names if you are using customizations.


    • Each wsdl:operation must have one input message (wsdl:input). It may have zero
    or one output messages (wsdl:output) and, if an output message is present, zero
    or more fault messages (wsdl:fault).


