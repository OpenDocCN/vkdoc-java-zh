    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **Figure 14-4.** *Request-response messaging with intermediate agent nodes*


    The message-oriented model is the closest abstraction of physical reality, because
    a web service interaction is essentially an exchange of XML documents encapsulated
    in SOAP 1.1 messages, which are transported inside HTTP messages. However, it
    may not be the appropriate model from the point of view of abstracting the essential
    elements of a web service interface. For that, the service-oriented model exists,
    which we discuss next.


    ### The Service-Oriented Model


    In the service-oriented model, the focus is on the service provided by a provider
    agent and used by a requestor agent. From the perspective of this model, you focus
    on the following aspects of a web service:


    - A provider agent implements all the operations defined by the web service SEI.

    - A requestor agent uses a service proxy to invoke an SEI operation, which, depending
    on the operation, may return nothing, a response, or one or more faults.


    Figure 14-5 summarizes the service-oriented model.


    **Figure 14-5.** *The service-oriented model*


    This model is fairly simple to understand, but from a practical point of view,
    it says nothing about how a requestor agent discovers or addresses the service
    provider agent. For that you need to focus on the resource-oriented model, which
    is covered next.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


