    **Complex Content**


    A complexContent element specifies a constraint on elements (including attributes).
    You specify a complexContent construct in a complexType element. Just like in
    the case of simple content, complex content has two types of constructs: an extension
    and a restriction.


    You specify a complexContent extension with an extension element. If, for example,
    you want to add a webAddress attribute to a catalogType complex type using a complex
    content extension, you can do so as shown here:


    <xsd:complexType name="catalogTypeExt" >


    <xsd:complexContent>


    <xsd:extension base="catalogType" >


    <xsd:attribute name="webAddress" type="xsd:string" />


    </xsd:extension>


    </xsd:complexContent>


    </xsd:complexType>


    You specify a complexContent restriction with a restriction element. In a complex
    content restriction, you basically have to repeat, in the restriction element,
    the part of the base model you want to retain in the restricted complex type.
    If, for example, you want to restrict the paperType complex type to only a title
    element using a complex content restriction, you can do so as shown here:


    <xsd:complexType name="paperTypeRes" >


    <xsd:restriction base="paperType" >


    <xsd:all>


    <xsd:element name="title" type="titleType" />


    </xsd:all>


    </xsd:restriction>


    </xsd:complexType>


    A complex content restriction construct has a fairly limited use.


    **Simple Type Declarations**


    A simpleType construct specifies information and constraints on attributes and
    text elements. Since XML Schema has 44 built-in simple types, a simpleType is
    either used to constrain built-in datatypes or used to define a list or union
    type. If you wanted, you could have specified authorType as a simple type restriction
    on a built-in string type, as shown here:


    <xsd:element name="authorType" >


    <xsd:simpleType>


    <xsd:restriction base="xsd:string" >


    <xsd:minLength value="10" />


    <xsd:maxLength value="256" />


    </xsd:restriction>


    </xsd:simpleType>


    </xsd:element>


