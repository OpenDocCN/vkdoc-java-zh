    # CHAPTER 14


    ## Building XML-Based Web Services


    When you want to buy a book from Amazon, you go to Amazon’s website, find your
    book, and order it. That is simple enough. Now, imagine you are an organization
    that orders lots of books from Amazon, such as a large university library. You
    could certainly do your book selection manually.


    However, what if Amazon offered a network service that a computer program could
    use to automatically search, select, and add books to a shopping cart based on
    your selection criteria? It turns out that Amazon indeed offers such a service!


    In general, such network services are called *web services*.


    The *raison d’etre* for web services is *interoperability* between loosely coupled
    applications. By *loosely coupled*, we mean that the interacting applications
    are stand-alone applications and that the interaction between applications happens
    via standards-based protocols.'
