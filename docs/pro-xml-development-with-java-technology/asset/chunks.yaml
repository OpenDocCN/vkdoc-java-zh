    a response in the form of an XML string. Therefore, you need to construct an XML
    DOM object that contains instructions about the validity of the catalog ID field
    value.


    An empty ResultSet object implies that the catalog ID field value is not defined
    in the database table Catalog; thus, the catalog ID field value is valid. A ResultSet
    object that contains data implies that the catalog ID value is already defined
    in the database; thus, the catalog ID field value is not valid.


    For a nonvalid catalog ID, you construct an XML string that includes the contents
