    Variables


    You can specify variables in XSLT with xsl:variable and xsl:param elements. The
    xsl:variable and xsl:param elements have the attributes name and select. You specify
    the value of a variable or a parameter in the select attribute or in the element.
    For example, you can specify a variable with the value var1 as follows:


    <xsl:variable name="var1" select="''var1''"/> or as follows:


    <xsl:variable name="var1">var1</xsl:variable> You can specify a parameter similarly:


    <xsl:param name="param1" select="''param1''"/> A difference between a parameter
    and a variable is that the value specified in the xsl:param element is the default
    value and may be overridden when a template is invoked. You can specify a parameter
    value with the xsl:with-param element. Listing 5-9 shows an example of overriding
    the default parameter value.


