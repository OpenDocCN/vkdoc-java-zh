    or role that the recipient must play in processing this header block. If an intermediate
    recipient node understands the specified role, then the header block is intended
    for its consumption.


    • The soapenv:mustUnderstand attribute on a header block indicates whether, assuming
    the recipient fits the role specified by the soapenv:actor attribute, the processing
    of a particular header child element is mandatory by a recipient.


    **The soapenv:actor Attribute** The value of a soapenv:actor attribute is a URI
    that indicates the logical role that the recipient must assume in processing the
    associated header block. A special URI, http://schemas.xmlsoap.org/soap/actor/next/,
    denotes the logical role of being the next node along the message path. Omitting
    this attribute implies that this child element should be processed by the ultimate
    receiver.


    Consider the following example soapenv:Header element:


    <soapenv:Header>


    <ns1:userInfo


    soapenv:actor="http:// www.apress.com/xmljava/webservices/auth">


    <email>foo@acme.com</email>


    <pwd>bar</pwd>


    </ns1:userInfo>


    </soapenv:Header>


    This example soapenv:Header element has a single header block, ns1:userInfo, which
    has a soapenv:actor attribute set to the http://www.apress.com/xmljava/webservices/auth
    URI. This means if a recipient fits the implied role associated with the specified
    URI, it is expected to process the ns1:userInfo header block.


    An intermediate node that processes a header block must remove the header block
    from the soapenv:Header element. If an intermediate node processes a header block
    but also wants the header block to be processed by another node along the message
    path, it may modify and add the header block to the soapenv:Header element. You
    can remove and then add a header block simply by modifying the header block in
    place.


    **The soapenv:mustUnderstand Attribute** This attribute can have a value of only
    0 or 1\. Omitting this attribute implies a value of 0\. If this attribute is specified
    on a header block with the value 1, it means that if the recipient can assume
    the role implied by the soapenv:actor attribute of the header block, then the
    recipient must process the header block.


