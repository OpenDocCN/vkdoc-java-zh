    <!ATTLIST article title CDATA #IMPLIED>


    ]>


    你可以如下指定一个私有的外部 DTD：


    <!DOCTYPE rootElement SYSTEM "DTDLocation"> 例如，假设示例文档的 DTD 存在于一个名为 journal.dtd
    的本地文件中，你可以如下指定一个私有的外部 DTD：


    <!DOCTYPE journal SYSTEM "journal.dtd">


    你可以如下指定一个公共的外部 DTD：


    <!DOCTYPE rootElement PUBLIC "DTDName" "DTDLocation"> 因此，假设示例文档的 DTD 的公共名称为 -//Apress.//DTD
    Journal Example 1.0//EN，并且位于 http://www.apress.com/javaxml/dtd/journal.dtd，你可以如下指定一个公共的外部
    DTD：


    <!DOCTYPE journal PUBLIC "-//Apress.//DTD Journal Example 1.0//EN"


    "http://www.apress.com/javaxml/dtd/journal.dtd"> **实体**


    XML 文档中的实体是一个存储单元，可以通过实体引用来引用。实体可以是已解析的或未解析的。已解析的实体充当替换文本，该文本会替换文档中的实体引用。未解析的实体可以是文本，也可以不是文本；如果是文本，则可能不是
    XML 文本。未解析的实体永远不会被解析到 XML 文档中，它们本质上是被传递给处理应用程序。由处理应用程序来决定如何理解这些未解析的实体。


    实体可以是以下类型之一：内部已解析通用实体、外部已解析通用实体或外部未解析通用实体。内部已解析通用实体的语法如下：


    <!ENTITY entity_name "entity_value">


    私有的外部已解析通用实体的语法如下：


    <!ENTITY entity_name SYSTEM "SYSTEM_URI"> 公共的外部已解析通用实体的语法如下：


    <!ENTITY entity_name PUBLIC "publicId" "PUBLIC_URI"> 外部未解析通用实体用于引用 XML 文档无需解析的数据。外部未解析通用实体的语法如下：


    <!ENTITY entity_name SYSTEM "SYSTEM_URI" NDATA notation_name>


    <!ENTITY entity_name PUBLIC "publicId" "Public_URI" NDATA notation_name> 所有实体声明都必须位于
    DTD 或 DOCTYPE 内部的内部 DTD 声明中。


    例如，前面讨论的转义序列 &lt; 和 &gt; 实际上是隐式内部已解析实体的实体引用。


