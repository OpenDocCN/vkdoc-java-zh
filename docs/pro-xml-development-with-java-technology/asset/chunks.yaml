    **编组 XML 文档**


    编组 XML 文档是指根据 XML 文档的 Java 对象表示来创建 XML 文档。在用例示例中，Web 服务客户端必须编组清单 6-7 中所示的 XML
    文档。在本节中，我们将展示如何从包含模式派生类实例（使用 JAXB 2.0 生成）的 Java 对象树来编组此类文档。


    要编组示例文档，您需要遵循以下步骤：


    • 创建一个 `JAXBContext` 对象，并使用该对象创建一个 `Marshaller` 对象。


    • 创建一个 `ObjectFactory` 对象，用于创建相关生成的 Java 内容类的实例。


    • 使用 `ObjectFactory` 对象，创建一个以 `CatalogType` 为根对象的对象树。


    使用相应的 setter 方法，用相关数据填充这些树对象。


    • 从 `CatalogType` 对象创建一个 `JAXBElement<CatalogType>` 对象。


    `JAXBElement<CatalogType>` 表示 XML 文档中的 catalog 元素。


    应用程序使用静态方法 `newInstance(String contextPath)` 创建 `JAXBContext` 类的新实例，其中 `contextPath`
    指定了模式派生类的 Java 包列表。在本例中，`generated` 包含模式派生类，您可以按如下方式创建此对象：


    JAXBContext jaxbContext=JAXBContext.newInstance("generated"); `Marshaller` 类将
    Java 对象树转换为 XML 文档。您可以使用 `JAXBContext` 类的 `createMarshaller()` 方法创建一个 `Marshaller`
    对象，如下所示： Marshaller marshaller=jaxbContext.createMarshaller();


    `Marshaller` 类具有重载的 `marshal()` 方法，用于编组到 SAX 2 事件、DOM 结构、`OutputStream`、`javax.xml.transform.Result`
    或 `java.io.Writer` 对象。


    要创建用于编组为 XML 文档的 Java 对象树，请创建一个 `ObjectFactory`，如下所示：


    ObjectFactory factory=new ObjectFactory();


