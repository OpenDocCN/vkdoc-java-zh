    -src "${resource_loc}" –out "${resource_loc}/xmltypes.jar" "${resource_loc}"


    **图 7-4.** *将 scomp 配置为外部工具* 变量 `resource_loc` 指定了运行 `scomp` 命令时选定的项目文件夹的位置，您可以通过单击“变量”按钮并选择
