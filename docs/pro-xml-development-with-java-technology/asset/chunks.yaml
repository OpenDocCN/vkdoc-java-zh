    \ N D I N G W I T H X M L B E A N S\n\n**Figure 7-7.** *Chapter7 directory structure\
    \ with the Java classes generated from the schema7*\n\nJava classes generated\
    \ from the schema include a JAR file, `xmltypes.jar`, which you need to add to\
    \ the `Chapter7` Java build path, as shown in Figure 7-8.\n\n**Figure 7-8.** *Adding\
    \ xmltypes.jar to the Java build path* 7. The `src` directory may show an error\
    \ icon next to it until binding classes are generated and the Java files under\
    \ the `src` directory are compiled.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nVohra_706-0C07.fm Page 195 Thursday, July 13, 2006 1:11 PM\n\nC H A P T E R\
    \ 7 ■ B I N D I N G W I T H X M L B E A N S\n\n**195**\n\nThe `scomp` compiler\
    \ generates a Java interface and an implementation class for each of the top-level\
    \ elements in the example schema. For example, for the top-level schema element\
    \ `catalog` excerpted in Listing 7-5, the Java interface `CatalogDocument.java`\
    \ (Listing 7-6) gets generated.\n\n**Listing 7-5.** *Schema Element catalog*\n\
    \n```xml\n<xs:element name=\"catalog\">\n  <xs:complexType>\n    <xs:sequence>\n\
    \      <xs:element ref=\"journal\" minOccurs=\"0\" maxOccurs=\"unbounded\"/>\n\
    \    </xs:sequence>\n  </xs:complexType>\n</xs:element>\n```\n\n**Listing 7-6.**\
    \ *CatalogDocument.java*\n\n```java\npackage noNamespace;\n\npublic interface\
    \ CatalogDocument extends org.apache.xmlbeans.XmlObject {\n  // … some code deleted\n\
    \  noNamespace.CatalogDocument.Catalog getCatalog();\n  void setCatalog(noNamespace.CatalogDocument.Catalog\
    \ catalog);\n  noNamespace.CatalogDocument.Catalog addNewCatalog();\n\n  public\
    \ interface Catalog extends org.apache.xmlbeans.XmlObject {\n    // … some code\
    \ deleted\n    noNamespace.JournalDocument.Journal[] getJournalArray();\n    //\
    \ … some code deleted\n    void setJournalArray(noNamespace.JournalDocument.Journal[]\
    \ journalArray);\n    void setJournalArray(int i, noNamespace.JournalDocument.Journal\
    \ journal);\n    // … some code deleted\n\n    public static final class Factory\
    \ {\n      public static noNamespace.CatalogDocument.Catalog newInstance() {\n\
    \        return (noNamespace.CatalogDocument.Catalog)\n          org.apache.xmlbeans.XmlBeans.getContextTypeLoader().\n\
    \          newInstance( type, null );\n      }\n      // … some code deleted\n\
    \      private Factory() { } // No instance of this class allowed\n    }\n  }\n\
    \n  public static final class Factory {\n    public static noNamespace.CatalogDocument\
    \ newInstance() {\n      return (noNamespace.CatalogDocument)\n        org.apache.xmlbeans.XmlBeans.\n\
    \        getContextTypeLoader().\n        newInstance( type, null );\n    }\n\
