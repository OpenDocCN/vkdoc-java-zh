    **Listing 12-3.** *Setting System Properties*


    System.setProperty("javax.xml.parsers.DocumentBuilderFactory",


    "org.apache.xerces.jaxp.DocumentBuilderFactoryImpl"); System.setProperty


    ("javax.xml.transform.TransformerFactory",


    "org.apache.xalan.processor.TransformerFactoryImpl"); **Creating a Document**


    You can create a Document object by parsing an XML document with a DocumentBuilder
    object.


    You obtain a DocumentBuilder object from a DocumentBuilderFactory object. Therefore,
    you need to create a DocumentBuilderFactory object using the static method newInstance().
    Subsequently, create a DocumentBuilder object from the DocumentBuilderFactory
    object using the method newDocumentBuilder(), as shown in Listing 12-4\. You can
    parse an XML document using one of the overloaded parse() methods from an InputStream,
    an InputSource, or a File. The example application parses the XML document from
    a File object, as shown in Listing 12-4\. The parse(File) object returns a Document
    object.


    **Listing 12-4.** *Parsing an XML Document*


    DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance(); DocumentBuilder
    builder = factory.newDocumentBuilder();


    Document document = builder.parse(new File("catalog.xml")); **Creating a Transformer**


    You also need to create a Transformer object to transform the Document object
    obtained with a DocumentBuilder object. You can obtain a Transformer object from
    a TransformerFactory object.


    Therefore, create a TransformerFactory object using the static method newInstance(),
    as shown in Listing 12-5\. To set a stylesheet on the Transformer object obtained
    from the TransformerFactory object, create a StreamSource object from the example
    style sheet. Subsequently, create a Transformer object using the method newTransformer(StyleSource).


    **Listing 12-5.** *Creating a Transformer Object*


    TransformerFactory tFactory = TransformerFactory.newInstance(); StreamSource stylesource
    = new StreamSource(new File("catalog.xslt")); Transformer transformer = tFactory.newTransformer(stylesource);
    **Transforming the XML Document to XSL-FO**


    The Transformer class provides the method transform(Source, Result) to transform
    XML input to output. You can specify the input as DOMSource, SAXSource, or StreamSource.
    You can specify the output as DOMResult, SAXResult, or StreamResult. In the example
    application, input is specified as DOMSource, and output is specified as StreamResult.
    Therefore, create a DOMSource object from the Document object, and create a StreamResult
    object from a catalog.fo file, as shown in Listing 12-6.


    Subsequently, transform the example XML document using the transform(DOMSource,
    SAXResult) object, as shown in Listing 12-6.


