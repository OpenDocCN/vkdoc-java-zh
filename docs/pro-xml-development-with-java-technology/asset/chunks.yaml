    当输出方法为`xml`或`html`时，某些字符会在输出中自动转义。要禁用字符的自动转义，可以在`xsl:text`中使用`disable-output-escaping="yes"`属性；元素体包含转义序列。例如，在清单5-20中，以下指令禁用了回车符的输出转义：


    ```xml

    <xsl:text disable-output-escaping="yes">&#13; </xsl:text>

