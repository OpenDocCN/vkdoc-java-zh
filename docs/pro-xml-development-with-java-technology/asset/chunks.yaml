    from a predicate becomes the input node set for subsequent predicates. Multiple
    predicates within a location path step are evaluated from left to right.


    Predicates within a location path step are evaluated with respect to the axis
    associated with the current step. The proximity position of a context node is
    defined as its position along the step axis, in document order if it is a forward
    axis or in reverse document order if it is a reverse axis. The proximity position
    of a node is defined as its context position. The size of an input node set is
    defined as the context size. Context node, context position, and context size
    comprise the total XPath context, relative to which all predicates are evaluated.


    You can apply some of the concepts associated with predicates when looking at
