    **Listing 5-31.** *Output in Eclipse from Filtering Elements* Title: Service Oriented
    Architecture Frameworks


    Author: Naveen Balani


    **Copying Nodes**


    The XSLT specification provides two elements for copying nodes, xsl-copy-of and
    xsl-copy. The xsl:copy-of element copies a selected element and also copies attributes
    and subelements of the selected node. xsl:copy, a different version of the xsl:copy-of
    element, doesn’t copy the subelements and attributes of the selected node. As
    an example, copy the second article element in the journal element in catalog.xml
    to output. The style sheet copy.xslt in Listing 5-32 copies the second article
    element in the journal node in the catalog.xml document to the output document.
    The XPath expression journal/article[2] selects the second article element in
    the journal element.


    **Listing 5-32.** *copy.xslt*


    <?xml version="1.0" encoding="UTF-8"?>


    <xsl:stylesheet version="1.0" >


    <xsl:output method="xml"/>


    <xsl:template match="/catalog">


    <xsl:copy-of select="journal/article[2]"/>


    </xsl:template>


    </xsl:stylesheet>'
