    **TrAX Application**


    In the previous section, we discussed TrAX. In this section, we will use a transformation
    application built using TrAX to demonstrate some examples of XSLT transformations.
    We’ll use the example XML document shown in Listing 5-11 as input for the XSLT
    transformations.


    We’ll use a generic Java application called XSLTTransformer.java, shown in Listing
    5-18, for all the transformation examples. XSLTTransformer.java takes a style
    sheet and an XML document as input and transforms the XML document with the transformations
    specified in the style sheet. The TrAX application, XSLTTransformer, parses the
    example XML document, catalog.xml, and creates a Document object. It then transforms
    the Document object with a style sheet using Transformer object.


    An ErrorListener is set on the Transformer object to output transformation errors.


    You can run the TrAX application, XSLTTransformer.java, with different XSLT style
    sheets by setting the style sheet in the stylesheet File object to the required
    XSLT. For example, to sort elements in the input XML document, set the style sheet
    to sort.xslt, as shown here: File stylesheet = new File("sort.xslt");


    We’ve discussed most of the code in Listing 5-18 in the preceding sections; in
    addition, it is annotated with comments.


    **Listing 5-18.** *XSLTTransformer.java*


    package com.apress.xslt;


    import javax.xml.parsers.*;


    import org.xml.sax.*;


    import org.w3c.dom.*;


