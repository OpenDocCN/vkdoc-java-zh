    运行 wsimport


    要运行 `wsimport` 工具，首先选择 `services.wsdl` WSDL 1.1 文档，然后选择 **运行 ➤ 外部工具 ➤ wsimport**。


    运行 `wsimport` 工具会将 `services.wsdl` 文档映射到 SEI 和服务 Java 类型，并根据作为参数传递给 `wsimport`
    的自定义配置生成 JAXB 2.0 对象绑定。


    请记住，传递给 `wsimport` 的参数是 `-s wsgen -d bin -keep -verbose -b wsdl/binding.xjb -b
    wsdl/svcbindings.xml wsdl/${resource_name}`。在这些参数中，`binding.xjb` 指的是 JAXB 2.0
    绑定的外部自定义文件，而 `svcbindings.xml` 指的是 WSDL 1.1 到 Java 映射的外部自定义文件。


    对应于 `services.wsdl` 文档的 SEI、服务和 JAXB 2.0 对象绑定的 Java 文件，会生成在 `wsgen` 文件夹下的 `com.apress.javaxml.ws`
    包中。


    要将生成的文件引入 Eclipse 项目视图，您需要通过选择 **文件 ➤ 刷新** 来刷新 Chapter14 项目文件。清单 14-13 显示了 `wsimport`
    工具的输出。


