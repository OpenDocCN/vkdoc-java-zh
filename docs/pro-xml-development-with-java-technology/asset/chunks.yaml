- fmt: 'Under the DOM approach, an XML document is parsed into a random-access tree
    structure in which all the elements and attributes from the document are represented
    as distinct nodes, with each node instantiated as an instance of a specialized
    node type. So, for example, under the DOM approach, the example XML document shown
    in Listing 2-1 would be parsed into the tree structure (annotated with specialized
    node types) shown in Figure 2-1.


    **Listing 2-1.** *Example XML Document*


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <catalog title="OnJava.com" publisher="O''Reilly">

    <journal date="January 2004">

    <article>

    <title>Data Binding with XMLBeans</title>

    <author>Daniel Steinberg</author>

    </article>

    </journal>

    </catalog>

    ```


    **Figure 2-1.** *Annotated DOM tree for example XML document*


    The DOM approach has the following notable aspects:


    - An in-memory DOM tree representation of the complete document is constructed
    before the document structure and content can be accessed or manipulated.

    - Document nodes can be accessed randomly and do not have to be accessed strictly
    in document order.

    - Random access to any tree node is fast and flexible, but parsing the complete
    document before accessing any node can reduce parsing efficiency.

    - For large documents ranging from hundreds of megabytes to gigabytes in size,
    the in-memory DOM tree structure can exhaust all available memory, making it impossible
    to parse such large documents under the DOM approach.

    - If an XML document needs to be navigated randomly or if the document content
    and structure needs to be manipulated, the DOM parsing approach is the most practical
    approach. This is because no other approach offers an in-memory representation
    of a document, and although such representation can certainly be created by the
    parsing application, doing so would be essentially replicating the DOM approach.

    - An API for using the DOM parsing approach is available in `JAXP 1.3`.


    ## Push Approach


    Under the push parsing approach, a push parser generates synchronous events as
    a document is parsed, and these events can be processed by an application using
    a callback handler model. An API for the push approach is available as `SAX 2.0`,
    which is also included in `JAXP 1.3`. `SAX` is a read-only API. The `SAX` API
    is recommended if no modification or random-access navigation of an XML document
    is required.


    The `SAX 2.0` API defines a `ContentHandler` interface, which may be implemented
    by an application to define a callback handler for processing synchronous parsing
    events generated by a `SAX` parser. The `ContentHandler` event methods have fairly
    intuitive semantics, as listed in Table 2-2.


    **Table 2-2.** *SAX 2.0 ContentHandler Event Methods*


    | Method | Notification |

    | --- | --- |

    | `startDocument` | Start of a document |

    | `startElement` | Start of an element |

    | `characters` | Character data |

    | `endElement` | End of an element |

    | `endDocument` | End of a document |

    | `startPrefixMapping` | Start of namespace prefix mapping |

    | `endPrefixMapping` | End of namespace prefix mapping |

    | `skippedEntity` | Skipped entity |

    | `ignorableWhitespace` | Ignorable whitespace |

    | `processingInstruction` | Processing instruction |


    In addition to the `ContentHandler` interface, `SAX 2.0` defines an `ErrorHandler`
    interface, which may be implemented by an application to receive notifications
    about errors. Table 2-3 lists the `ErrorHandler` notification methods.


    **Table 2-3.** *SAX 2.0 ErrorHandler Notification Methods*


    | Method | Notification |

    | --- | --- |

    | `fatalError` | Violation of XML 1.0 well-formed constraint |

    | `error` | Violation of validity constraint |

    | `warning` | Non-XML-related warning |'
