    *   `web` 文件夹包含与基于 Java Server Faces (JSF) 的网页实现相关的 Java 文件、XML 文档和属性文件。理解此文件夹的内容对于理解
    Web 服务并非核心内容，本章包含这些内容仅仅是因为我们想展示如何构建一个完整的可运行示例。JSF 是 Java EE 5 的一部分，是一种用于构建基于 Web
    的用户界面的服务器端技术。JSF 超出了本书的范围。但是，如果你有兴趣了解更多关于 JSF 的信息，我们推荐 *Pro JSF and Ajax: Building
    Rich Internet Components*。15

    *   `ejb` 文件夹包含与应用程序逻辑和数据库持久性相关的 Java 代码，基于 Enterprise Java Beans (EJB) 3.0 技术。EJB
    3.0 是 Java EE 5 的一部分，是一种用于实现对象关系映射、自动数据库持久性和应用程序逻辑的技术。EJB 3.0 超出了本章的范围。有关 EJB
    3.0 的更详细说明，我们推荐 *Pro EJB3: Java Persistence API*。16

    *   `wsgen` 文件夹用于存放由 `wsimport` 工具生成的 Java 源文件。当你最初将项目导入 Eclipse 时，此文件夹将为空。生成的
    Java 文件对应于 JAXB 2.0 对象绑定文件和 Web 服务接口。

    *   `wsimpl` 文件夹包含用于实现 Web 服务接口的 Java 文件。这些实现文件使用 EJB 来实现应用程序逻辑并与数据库交互。

    *   `app` 目录在 `config` 文件夹中包含 `application.xml` 部署描述符。在此项目中，我们将展示如何构建一个企业应用程序归档文件，该文件将部署在服务器中。此归档文件将包含示例
    Web 服务。当应用程序部署在 Sun One Application Server 9.0 中时，`application.xml` 部署描述符指定了企业应用程序的部署指令。有关此内容的更多详细信息，我们推荐位于
    http://java.sun.com/javaee/5/docs/tutorial/doc/ 的 Java EE 5 教程。

