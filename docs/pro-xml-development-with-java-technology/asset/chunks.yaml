- fmt: "# Loading and Saving with the DOM Level 3 API\n\nThe DOM Level 3 specification\
    \ is implemented in several API distributions such as `Xerce2-j` and `JAXP 1.3`.\
    \ In this chapter, you will use the `JAXP 1.3` API distribution included in `J2SE\
    \ 5.0`. You will use `JAXP 1.3`, because `JAXP 1.3` is a Java Specification Requests\
    \ (JSR) specification. Before you can set up your project, you need to download\
    \ `Xerces2` version 2.7.1 and extract the zip file to an installation directory.\
    \ The `Xerces2-j.zip` file is required, because an implementation class in the\
    \ `xercesImpl.jar` file is required to set a `DOMImplementationRegistry` property.\
    \ You also need to download and install `J2SE` version 5.0, which includes the\
    \ `JAXP 1.3` implementation of the DOM Level 3 Load and Save specification.\n\n\
    To compile and run the code examples, you need an Eclipse project. You can download\
    \ project `Chapter10` from the Apress website (http://www.apress.com) and import\
    \ it into your Eclipse workspace.\n\nTo compile and run your DOM Level 3 Load\
    \ and Save code examples, you need a `Xerces2-J` JAR file in your project's Java\
    \ build path; Figure 10-1 shows the JAR files. The JAR file required for a DOM\
    \ 3 Load and Save application is `xercesImpl.jar`, which consists of the Xerces\
    \ implementation API. You also need to set the JRE system library to `JRE 5.0`,\
    \ as shown in Figure 10-1.\n\nFor more information about `Xerces2-j`, see http://xerces.apache.org/xerces2-j/.\n\
    \n![Image 74](index-289_1.png)\n![Image 75](index-289_2.png)\n\n**Figure 10-1.**\
    \ *Chapter10 project Java build path*\n\nFigure 10-2 shows the `Chapter10` project\
    \ directory structure.\n\n**Figure 10-2.** *Chapter10 project directory structure*\n\
    \n## Loading an XML Document\n\nLet's first look at how to load an XML document.\
    \ You use the interfaces and classes in the `org.w3c.dom.ls` package to load,\
    \ save, and filter an XML document. You use the `LSParser` interface in this package\
    \ to load an XML document, parse an XML document, and obtain a `Document` object.\
    \ The procedure to load an XML document is as follows:\n\n1. Set the system property\
    \ `DOMImplementationRegistry.PROPERTY`.\n2. Create a `DOMImplementationRegistry`\
    \ object.\n3. Create a `DOMImplementationLS` object.\n4. Create an `LSParser`\
    \ object.\n5. Create a `DOMConfiguration` object.\n6. Create an error handler\
    \ class, and set the error-handler parameter.\n7. Set the `validate`, `schema-type`,\
    \ `validate-if-schema`, and `schema-location` parameters.\n8. Parse the XML document.\n\
    \nListing 10-1 shows the example document loaded, `catalog.xml`.\n\n**Listing\
    \ 10-1.** *catalog.xml*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <catalog title=\"dev2dev\">\n  <journal date=\"May 2005\">\n    <article section=\"\
    WebLogic Server\">\n      <title>Session Management for Clustered Applications</title>\n\
    \      <author> Jon Purdy</author>\n    </article>\n  </journal>\n  <journal date=\"\
    April 2005\">\n    <article section=\"WebLogic Platform\">\n      <title>Integrating\
    \ WebLogic Platform 8.1 with the\n        Stellent Web Content Management System</title>\n\
    \      <author>Munish Gandhi</author>\n    </article>\n  </journal>\n</catalog>\n\
    ```\n\nYou can also validate the document that is loaded by an `LSParser` object\
    \ with an XML Schema. Listing 10-2 shows the example XML Schema, `catalog.xsd`,\
    \ with which the example XML document is validated.\n\n**Listing 10-2.** *catalog.xsd*\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<xs:schema>\n  <xs:element\
    \ name=\"catalog\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element\
    \ ref=\"journal\" minOccurs=\"0\" maxOccurs=\"unbounded\"/>\n      </xs:sequence>\n\
    \      <xs:attribute name=\"title\" type=\"xs:string\"/>\n    </xs:complexType>\n\
    \  </xs:element>\n  <xs:element name=\"journal\">\n    <xs:complexType>\n    \
