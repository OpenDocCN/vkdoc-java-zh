- fmt: "# 构建 Ajax Web 应用程序\n\n您还需要下载并安装 J2EE 1.4 SDK 和 J2SE 5.0，以便编译示例应用程序。\n\n您将要开发的\
    \ Ajax 应用程序使用 JDBC5 驱动程序从数据库检索数据。\n\n因此，您需要安装一个关系数据库以及一个兼容的 JDBC 驱动程序。本章我们使用开源关系数据库\
    \ MySQL；如果您选择这样做，请下载并安装 MySQL 5.06 数据库和兼容的 MySQL Connector/J JDBC 驱动程序。当然，您也可以使用任何其他支持\
    \ JDBC 的关系数据库，例如 Oracle、IBM DB2 或 Microsoft SQL Server。\n\n## 使用 MySQL 数据库配置 JBoss\n\
    \n安装 MySQL 数据库后，您需要创建一个 MySQL 数据库用户。要创建用户，请使用以下命令登录 MySQL 数据库：\n\n```\nmysql --user=root\
    \ mysql\n```\n\n您可以使用 `GRANT` 语句向 `user` 表添加新用户，如下例所示，其中您创建了用户 `mysql`，密码为 `mysql`：\n\
    \n```\nGRANT ALL PRIVILEGES ON test TO 'mysql'@'localhost' IDENTIFIED BY 'mysql';\n\
    ```\n\n您还需要在 MySQL 数据库中创建一个示例表。要创建示例表，请以 `mysql` 用户身份登录数据库并运行清单 13-1 中所示的 SQL\
    \ 脚本。\n\n### 清单 13-1. SQL 脚本 `catalog.sql`\n\n```\nCREATE TABLE Catalog(CatalogId\
    \ VARCHAR(25),\nJournal VARCHAR(25), Publisher Varchar(25),\nEdition VARCHAR(25),\
    \ Title Varchar(45),\nAuthor Varchar(25));\n\nINSERT INTO Catalog VALUES\n('catalog1',\
    \ 'XML Zone', 'IBM developerWorks', 'Jan 2006',\n'Managing XML data: Tag URIs',\
    \ 'Elliotte Harold');\n\nINSERT INTO Catalog VALUES\n('catalog2', 'XML Zone',\
    \ 'IBM developerWorks',\n'Jan 2006', 'Practical data binding', 'Brett McLaughlin');\n\
    ```\n\n您还需要使用 MySQL 数据库配置 JBoss 应用服务器。假设 `<jboss-4.0.2>` 是 JBoss 4.0.2 安装目录的根目录，您可以按如下步骤操作：\n\
    \n1.  要将 JBoss 4.0.2 应用服务器与 MySQL 一起使用，首先需要将 MySQL 驱动程序类复制到 JBoss 服务器类路径。因此，将\
    \ `mysql-connector-java-3.1.11-bin.jar` 复制到 `<jboss-4.0.2>/server/default/lib`\
    \ 目录。\n\n2.  要使用 MySQL 数据源，请将 `<jboss-4.0.2>/docs/examples/jca/mysql-ds.xml` 复制到\
    \ `<jboss-4.0.2>/server/default/deploy` 目录。通过将 `<driver-class>` XML 元素设置为 `com.mysql.jdbc.Driver`，并将\
    \ `<connection-url>` XML 元素设置为 `jdbc:mysql://localhost:3306/test` 来修改 `mysql-ds.xml`\
    \ 配置文件。在 `mysql-ds.xml` 中，将 `user-name` 指定为 `mysql`，将 `password` 指定为 `mysql`。`jndi-name`\
    \ 默认设置为 `MySqlDS`。清单 13-2 显示了完全配置的 `mysql-ds.xml` 文件。\n\n5.  有关 JDBC 技术的信息，请访问\
    \ http://java.sun.com/javase/technologies/database.jsp。\n\n6.  MySQL 5.0 可从 http://www.mysql.com\
    \ 获取。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C13.fm\
    \ Page 333 Saturday, July 29, 2006 5:45 AM\n\n### 清单 13-2. `Mysql-ds.xml`\n\n\
    ```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<datasources>\n  <local-tx-datasource>\n\
    \    <jndi-name>MySqlDS</jndi-name>\n    <connection-url>jdbc:mysql://localhost:3306/test</connection-url>\n\
    \    <driver-class>com.mysql.jdbc.Driver</driver-class>\n    <user-name>mysql</user-name>\n\
    \    <password>mysql</password>\n  </local-tx-datasource>\n</datasources>\n```\n\
    \n3.  您还需要通过将清单 13-3 中所示的 `<application-policy>` XML 元素添加到 `login-config.xml`\
    \ 来修改 `<jboss-4.0.2>/server/default/conf/login-config.xml`。\n\n### 清单 13-3. `login-config.xml`\n\
    \n```\n<application-policy name = \"MySqlDbRealm\">\n  <authentication>\n    <login-module\
