    **Adding an Element**


    In this section, you’ll add a journal element to the catalog.xml document in the
    catalog collection.


    You need to specify the elements and attributes to be updated in an xupdate configuration
    file.


    Therefore, you will use the xupdate.xml (Listing 8-10) configuration file to add
    a journal element.


    **Listing 8-10.** *xupdate.xml*


    <xupdate:modifications version="1.0"


    >


    <xupdate:insert-after select="/catalog/journal[3]">


    <xupdate:element name="journal">


    <xupdate:attribute name="date">Aug 2005</xupdate:attribute>


    <article>


    <title>iBatis DAO</title>


    <author>Sunil Patil</author>


    </article>


    </xupdate:element>


    </xupdate:insert-after>


    </xupdate:modifications>


    Listing 8-11 shows the Xindice command to update the XML document catalog.xml
    in the catalog collection.


    **Listing 8-11.** *Xindice Command to Update an XML Document* xindice xupdate


    –c xmldb:xindice://localhost:8080/db/catalog


    –n catalog.xml –f "${resource_loc}"


    The Xindice xupdate action specifies that an XML document be updated, the –c switch
    specifies the collection context to be the catalog collection, the –n switch identifies
    the XML document to be updated, and the –f switch specifies the variable ${resource_loc}
    corresponding to the xupdate.xml configuration file.


    The Xindice command to update the XML file catalog.xml is run in Eclipse. Therefore,
    modify the arguments in the XINDICE external tools configuration, and specify
    the arguments listed in Listing 8-11\. To run the XINDICE configuration with the
    specified arguments, select the xupdate.xml document in the xindice_resources
    folder on the Package Explorer tab in the Chapter8 project, and click the Run
    button, as shown in Figure 8-12.


    The XML document catalog.xml in the catalog collection gets updated, as shown
    by the output message in Listing 8-12.


    **Listing 8-12.** *Output in Eclipse from Updating an XML Document* trying to
    register database


