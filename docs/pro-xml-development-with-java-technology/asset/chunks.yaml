- fmt: "`complexType`约束 XML 文档中的元素和属性。你可以在模式构造或元素声明中指定`complexType`。如果在模式构造中指定`complexType`，则在元素声明中通过`type`属性引用该`complexType`。在示例模式中，你可以将`catalogType`类型定义为一个复杂类型，如下所示：\n\
    \n```\n<xsd:schema >\n  <xsd:element name=\"catalog\" type=\"catalogType\" ></xsd:element>\n\
    \  <xsd:complexType name=\"catalogType\" >\n  </xsd:complexType>\n</xsd:schema>\n\
    ```\n\n## Sequence 模型组\n\n你也可以在`sequence`模型组中定义一个元素，顾名思义，该模型组定义了一个或多个元素的有序列表。在示例模式中，假设你希望允许在`catalogType`复杂类型中包含一个`journal`元素，你可以像下面这样使用`sequence`模型组：\n\
    \n```\n<xsd:complexType name=\"catalogType\" >\n  <xsd:sequence>\n    <xsd:element\
    \ ref=\"journal\" />\n    <!-- we have yet to define a global journal element\
    \ -->\n  </xsd:sequence>\n</xsd:complexType>\n```\n\n`catalogType`复杂类型中的`journal`元素声明使用`ref`属性来引用一个全局的`journal`元素定义。当然，我们还没有定义任何全局的`journal`元素，因此接下来我们将使用`choice`模型组来定义它。\n\
    \n## Choice 模型组\n\n你也可以在`choice`模型组中定义一个元素，该模型组定义了一组可供选择的元素，从中可以选择一个元素。在示例模式文档中，假设你希望定义一个全局的`journal`元素，该元素提供`article`和`research`元素之间的选择，如下所示：\n\
    \n```\n<xsd:element name=\"journal\" >\n  <xsd:complexType>\n    <xsd:choice>\n\
    \      <xsd:element name=\"article\" type=\"paperType\" />\n      <xsd:element\
    \ name=\"research\" type=\"paperType\" />\n      <!-- we have yet to define a\
    \ paperType type -->\n    </xsd:choice>\n  </xsd:complexType>\n</xsd:element>\n\
    ```\n\n## All 模型组\n\n你也可以在`all`模型组中定义一个元素，该模型组定义了一个无序的元素列表，所有元素可以以任意顺序出现，但每个元素最多只能出现一次。在示例模式文档中，你可以使用`all`模型组来定义`paperType`复杂类型，如下所示：\n\
    \n```\n<xsd:complexType name=\"paperType\" >\n  <xsd:all>\n    <xsd:element name=\"\
    title\" type=\"titleType\" />\n    <xsd:element name=\"author\" type=\"authorType\"\
    \ />\n    <!-- we have yet to define titleType and authorType -->\n  </xsd:all>\n\
    </xsd:complexType>\n```\n\n## 命名模型组\n\n你可以将到目前为止所见的所有模型组（`sequence`、`choice`和`all`）定义在一个命名模型组中。然后，可以在复杂类型和其他命名模型组中引用该命名模型组。这提高了模型组的可重用性。例如，你可以将`paperGroup`定义为一个命名模型组，并在`paperType`复杂类型中使用`ref`属性来引用它，如下例所示：\n\
    \n```\n<?xml version='1.0' encoding='UTF-8' ?>\n<xsd:schema >\n  <xsd:complexType\
    \ name=\"paperType\">\n    <xsd:group ref=\"paperGroup\" />\n  </xsd:complexType>\n\
    \  <xsd:group name=\"paperGroup\">\n    <xsd:all>\n      <xsd:element ref=\"title\"\
    \ />\n      <xsd:element ref=\"author\" />\n    </xsd:all>\n  </xsd:group>\n</xsd:schema>\n\
    ```\n\n## 基数\n\n你可以使用`minOccurs`和`maxOccurs`属性来指定构造的基数。只要这些组是在命名模型组之外指定的，你就可以在元素声明或`sequence`、`choice`和`all`模型组上指定基数。当在复杂类型中引用命名模型组时，可以指定其基数。`minOccurs`和`maxOccurs`属性的默认值都是`1`，这意味着如果未指定基数，任何构造的默认基数都是`1`。\n\
    \n如果你希望指定`catalogType`复杂类型允许零个或多个`journal`元素，可以像下面这样操作：\n\n```\n<xsd:complexType\
    \ name=\"catalogType\" >\n  <xsd:sequence>\n    <xsd:element maxOccurs=\"unbounded\"\
    \ minOccurs=\"0\" ref=\"journal\" />\n  </xsd:sequence>\n</xsd:complexType>\n\
    ```"
  raw: 'A complexType constrains elements and attributes in an XML document. You can
    specify a complexType in a schema construct or an element declaration. If you
    specify a complexType in a schema construct, the complexType is referenced in
    an element declaration with a type attribute. In the example schema, you can define
    the catalogType type as a complex type as shown here:


    <xsd:schema >


    <xsd:element name="catalog" type="catalogType" ></xsd:element>


    <xsd:complexType name="catalogType" >


    </xsd:complexType>


    </xsd:schema>


    Sequence Model Groups


    You can also define an element within a sequence model group, which, as the name
    implies, defines an ordered list of one or more elements. In the example schema,
    say you want to allow a journal element in the catalogType complex type; you’d
    use a sequence model group as shown here:


    <xsd:complexType name="catalogType" >


    <xsd:sequence>


    <xsd:element ref="journal" />


    <!-- we have yet to define a global journal element -->


    </xsd:sequence>


    </xsd:complexType>


    The journal element declaration within the catalogType complex type uses a ref
    attribute to refer to a global journal element definition. Of course, we have
    not yet defined any global journal element, so we will do that next, using a choice
    model group.


    Choice Model Groups


    You can also define an element within a choice model group, which defines a choice
    of elements from which one element may be selected. In the example schema document,
    say you want to define a global journal element that offers a choice between article
    and research elements, as shown here:


    <xsd:element name="journal" >


    <xsd:complexType>


    <xsd:choice>


    <xsd:element name="article" type="paperType" />


    <xsd:element name="research" type="paperType" />


    <!-- we have yet to define a paperType type -->


    </xsd:choice>


    </xsd:complexType>


    </xsd:element>


    All Model Groups


    You can also define an element within an all model group, which defines an unordered
    list of elements, all of which can appear in any order, but each element may be
    present at most once. In the example schema document, you can define the paperType
    complex type with an all model group, as shown here:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


