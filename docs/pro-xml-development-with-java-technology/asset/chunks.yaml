- fmt: 'An application should make no assumption about whether the `endDocument` method
    of the `ContentHandler` interface will be called after the `fatalError` method
    in the `ErrorHandler` interface has been called.


    ## Pull Approach


    Under the pull approach, events are pulled from an XML document under the control
    of the application using the parser. `StAX` is similar to the `SAX` API in that
    both offer event-based APIs. However, `StAX` differs from the `SAX` API in the
    following respects:


    - Unlike in the `SAX` API, in the `StAX` API, it is the application rather than
    the parser that controls the delivery of the parsing events. `StAX` offers two
    event-based APIs: a cursor-based API and an iterator-based API, both of which
    are under the application’s control.

    - The cursor API allows a walk-through of the document in document order and provides
    the lowest level of access to all the structural and content information within
    the document.

    - The iterator API is similar to the cursor API but instead of providing low-level
    access, it provides access to the structural and content information in the form
    of event objects.

    - Unlike the `SAX` API, the `StAX` API can be used both for reading and for writing
    XML documents.


    ### Cursor API


    Key points about the `StAX` cursor API are as follows:


    - The `XMLStreamReader` interface is the main interface for parsing an XML document.
    You can use this interface to scan an XML document’s structure and contents using
    the `next()` and `hasNext()` methods.

    - The `next()` method returns an integer token for the next parse event.

    - Depending on the next event type, you can call specific allowed methods on the
    `XMLStreamReader` interface. Table 2-4 lists various event types and the corresponding
    allowed methods.


    **Table 2-4.** *StAX Cursor API Event Types and Allowed Methods*


    | Event Type | Allowed Methods |

    | --- | --- |

    | Any event type | `getProperty()`, `hasNext()`, `require()`, `close()`, `getNamespaceURI()`,
    `isStartElement()`, `isEndElement()`, `isCharacters()`, `isWhiteSpace()`, `getNamespaceContext()`,
    `getEventType()`, `getLocation()`, `hasText()`, `hasName()` |

    | START_ELEMENT | `next()`, `getName()`, `getLocalName()`, `hasName()`, `getPrefix()`,
    `getAttributeXXX()`, `isAttributeSpecified()`, `getNamespaceXXX()`, `getElementText()`,
    `nextTag()` |

    | ATTRIBUTE | `next()`, `nextTag()`, `getAttributeXXX()`, `isAttributeSpecified()`
    |

    | NAMESPACE | `next()`, `nextTag()`, `getNamespaceXXX()` |

    | END_ELEMENT | `next()`, `getName()`, `getLocalName()`, `hasName()`, `getPrefix()`,
    `getNamespaceXXX()`, `nextTag()` |

    | CHARACTERS | `next()`, `getTextXXX()`, `nextTag()` |

    | CDATA | `next()`, `getTextXXX()`, `nextTag()` |

    | COMMENT | `next()`, `getTextXXX()`, `nextTag()` |

    | SPACE | `next()`, `getTextXXX()`, `nextTag()` |

    | START_DOCUMENT | `next()`, `getEncoding()`, `getVersion()`, `isStandalone()`,
    `standaloneSet()`, `getCharacterEncodingScheme()`, `nextTag()` |

    | END_DOCUMENT | `close()` |

    | PROCESSING_INSTRUCTION | `next()`, `getPITarget()`, `getPIData()`, `nextTag()`
    |

    | ENTITY_REFERENCE | `next()`, `getLocalName()`, `getText()`, `nextTag()` |

    | DTD | `next()`, `getText()`, `nextTag()` |


    ### Iterator API


    Key points about the `StAX` iterator API are as follows:


    - The `XMLEventReader` interface is the main interface for parsing an XML document.
    You can use this interface to iterate over an XML document’s structure and contents
    using the `nextEvent()` and `hasNext()` methods.

    - The `nextEvent()` method returns an `XMLEvent` object.

    - The `XMLEvent` interface provides utility methods for determining the next event
    type and for processing it appropriately.


    The `StAX` API is recommended for data-binding applications, specifically for
    the marshaling and unmarshaling of an XML document during the bidirectional XML-to-Java
    mapping process.


    A `StAX` API implementation is included in J2SE 6.0.


    ## Comparing the Parsing Approaches'
