- fmt: '# Extensible Markup Language (XML) and Java


    **Extensible Markup Language (XML)** is based on simple, platform-independent
    rules for representing structured textual information. The platform-independent
    nature of XML makes it an ideal format for exchanging structured textual information
    among disparate applications. Therefore, at the heart of it, XML is about interoperability.


    `XML 1.0` was made a W3C Recommendation in 1998. Sun formally introduced the Java
    programming language in 1995, and within a few years Java had cemented its status
    as the preferred programming and execution platform for a dizzyingly diverse set
    of applications. Incidentally, both Java and XML were shaped with an eye toward
    the Internet. Therefore, it is not surprising that most of the XML-related W3C
    Recommendations have inspired corresponding Java-based application programming
    interfaces (APIs). Some of these Java APIs are part of the Java Platform Standard
    Edition (`J2SE`) platform; others are part of various open source or proprietary
    endeavors. XML-related W3C Recommendations and their corresponding Java APIs are
    the main focus of this book.


    ## Scope of This Book


    In this book, we have two main objectives. Our first objective is to discuss a
    selected subset of XML-related W3C Recommendations that have inspired corresponding
    Java APIs. And to that end, here is a quick synopsis of the XML-related W3C Recommendations
    and Java APIs that we’ll cover in this book:


    - `XML 1.0` (http://www.w3.org/TR/REC-xml/) describes precise rules for crafting
    a well-formed XML document and describes partial rules for processing well-formed
    documents. `Java API for XML Processing (JAXP) 1.3` in `J2SE 5.0` is its corresponding
    Java API. In addition, `Streaming API for XML 1.0 (StAX)` in `J2SE 6.0` is relevant
    for processing XML documents.

    - `XML Schema 1.0` (http://www.w3.org/TR/xmlschema-1/) describes a language that
    can be used to specify the precise structure of an XML document and constrain
    its contents. `JAXP 1.3` in `J2SE 5.0` and `Java XML Architecture for XML Binding
    (JAXB) 2.0` in `Java 2 Enterprise Edition (J2EE) 5.0` are corresponding Java APIs.

    - `XML Path Language (XPath) 1.0` (http://www.w3.org/TR/xpath) describes a language
    for addressing parts of an XML document. The `XPath API` within `JAXP 1.3` is
    its corresponding Java API.

    - `XSL Transformations (XSLT) 1.0` (http://www.w3.org/TR/xslt) describes a language
    for transforming an XML document into other XML or non-XML documents. `Transformation
    API for XML (TrAX)` within `JAXP 1.3` is its corresponding API.

    - `Document Object Model Level 3 Load and Save` (http://www.w3.org/TR/DOM-Level-3-LS/)
    defines a platform- and language-neutral interface for bidirectional mapping between
    an XML document and a DOM document. The `DOM Level 3 API` within `JAXP 1.3` is
    its corresponding API.

    - `SOAP 1.1` and `1.2` (http://www.w3.org/TR/soap/) define a messaging framework
    for exchanging XML content across distributed processing nodes. `SOAP with Attachments
    API for Java (SAAJ) 1.3` is its corresponding Java API.

    - `Web Services Description Language (WSDL) 1.1` (http://www.w3.org/TR/wsdl) is
    an XML-based format for describing web service endpoints. The `Java API for XML
    Web Services (JAX-WS 2.0)` in `J2EE 5.0` is its corresponding Java API.


    Our second objective is to discuss selected XML-related utility Java APIs that
    are useful in building interoperable enterprise software solutions. And to that
    end, here are the utility Java APIs discussed in this book:


    - The `XMLBeans 2.0 API`, which is used for XML binding to JavaBeans. This is
    an alternative to `JAXB 2.0` and has some pros and cons compared to `JAXB 2.0`.

    - The `XML:DB` group of APIs, which can be used to access and update XML documents
    stored in a native XML database.

    - The `Java Database Connectivity (JDBC) 4.0 API`, which is useful for storing
    XML content within a relational database.

    - The `Apache POI API`, which is useful for transforming XML content into Microsoft
    Excel spreadsheets.

    - The `Apache Formatting Objects Processor (FOP) API`, which is useful for transforming
    XML content into Portable Document Format (PDF).


    We aim to cover all this material from a pragmatic viewpoint; by that we mean
    we will do the following:


    - Briefly explain various XML-related W3C Recommendations in simple, straightforward
    terms, without being imprecise.

    - Discuss related Java APIs from a developer’s viewpoint, without being tedious.


    Based on the overall objectives of this book, we think this book is suitable for
    an intermediate-to advanced-level Java developer who understands introductory
    XML concepts and the `J2SE 5.0` core APIs.


    > **Note** This book is not a comprehensive, in-depth survey of XML-related W3C
    Recommendations. We think all W3C Recommendations are well written and are the
    best source for such comprehensive information.


    ## Overview of This Book’s Contents


    We have strived to cover a wide swath of XML-related Java APIs in this book, ranging
    from basic, building-block APIs used to parse XML documents to more advanced APIs
    used to implement interoperable XML-based web services. This book is organized
    in five parts. Part 1 spans Chapters 1 through 5 and covers basics of parsing,
    validating, addressing, and transforming XML documents. Part 2 comprises Chapters
    6 and 7 and covers the binding of XML Schema to Java types. Part 3 includes Chapters
    8 and 9 and focuses on XML and databases. Part 4 consists of Chapters 10 through
    12 and focuses on transforming the XML document model to other document models.
    Part 5 consists of Chapters 13 and 14 and focuses on XML-based web applications
    and web services. Here is a quick synopsis of what is in each chapter:


    - Chapter 1 reviews `XML 1.0` and `XML Schema 1.0`.

    - Chapter 2 discusses the parsing of XML documents using `JAXP 1.3` in `J2SE 5.0`
    and `StAX 1.0` in `J2SE 6.0`.

    - Chapter 3 discusses validating an XML document with an XML Schema, and in this
    context, we cover the following APIs: `JAXP 1.3` APIs: `SAX parser`, `DOM parser`,
    and the `Validation API`.

    - Chapter 4 reviews `XPath 1.0` and discusses the `JAXP 1.3` and `JDOM 1.0` XPath
    APIs.

    - Chapter 5 reviews `XSLT 1.0` and discusses the `TrAX API` defined within `JAXP
    1.3`.

    - Chapter 6 discusses the mapping of XML Schema to Java types and covers the `JAXB
    1.0` and `2.0` APIs.

    - Chapter 7 discusses the mapping of XML Schema to JavaBeans and covers the `XMLBeans
    2.0 API`.

    - Chapter 8 discusses native databases and covers the `XML:DB APIs`. We use the
    open source `Apache Xindice` native XML database as the example database in this
    chapter.

    - Chapter 9 discusses storing an XML document in a relational database management
    system (RDBMS) using the `JDBC 4.0 API`.

    - Chapter 10 discusses `DOM Level 3 Load and Save` and the `DOM Level 3 API` defined
    within `JAXP 1.3`.'
