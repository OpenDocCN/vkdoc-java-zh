    **Abstract Message Definitions**


    As you have already seen, all web service interactions involve the exchange of
    messages. So, of course, in the WSDL 1.1 document, you have to define the abstract
    messages used by the example web service. Through the appropriate wsdl:binding
    definition, you will later map these abstract messages to the soapenv:Body content.


    Not surprisingly, these messages are based on the schema elements defined within
    the schema shown in Listing 14-7; the element attribute of a wsdl:part denotes
    a schema element in the types namespace. For example, the abstract request message
    for getting all the projects for a user, GetProjects, is as follows:


    <wsdl:message name="GetProjects" >


    <wsdl:part element="types:userInfo" name="user" ></wsdl:part>


    <wsdl:part element="types:projectsDetail" name="detail" ></wsdl:part>


    </wsdl:message>


    The GetProjects abstract message has two parts:


    • The first part is based on the types:userInfo schema element.


    • The second part is based on the types:projectsDetail schema element.


