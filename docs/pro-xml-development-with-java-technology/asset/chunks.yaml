- fmt: '# Parsing XML Documents


    Parsing is the most fundamental aspect of processing an XML document. When an
    application parses an XML document, typically it has three distinct objectives:


    - To ensure that the document is well-formed

    - To check that the document conforms to the structure specified by a DTD or an
    XML Schema

    - To access, and maybe modify, various elements and attributes specified in the
    document, in a manner that meets the specific needs of an application


    All applications share the first objective. The second objective is not as pervasive
    as the first but is still fairly standard. The third objective, not surprisingly,
    varies from application to application.


    Prompted by the diverse access requirements of various applications, different
    parsing approaches have evolved to satisfy these requirements. To date, you can
    take one of three distinct approaches to parsing XML documents:


    - DOM parsing

    - Push parsing

    - Pull parsing


    In the next section, we will give an overview of these three approaches and then
    offer a comparative analysis of them.


    You can find the Document Object Model (DOM) Level 3 Core specification at `http://www.w3.org/TR/DOM-Level-3-Core/`.


    ## Overview of Parsing Approaches


    In the following sections, we will give you an overview of the three major parsing
    approaches from a conceptual standpoint. In later sections, we will discuss specific
    Java APIs that implement these approaches. We will start with the DOM approach.


    ### DOM Approach


    The Document Object Model (DOM) Level 3 Core specification specifies platform-
    and language-neutral interfaces for accessing and manipulating content and specifies
    the structure of a generalized document. The DOM represents a document as a tree
    of `Node` objects. Some of these `Node` objects have child node objects; others
    are leaf objects with no children.


    To represent the structure of an XML document, the generic `Node` type is specialized
    to other `Node` types, and each specialized node type specifies a set of allowable
    child `Node` types. Table 2-1 explains the specialized DOM `Node` types for representing
    an XML document, along with their allowable child `Node` types.


    **Table 2-1.** Specialized DOM Node Types for an XML Document


    | Specialized Node Type | Description | Allowable Child Node Types |

    | --- | --- | --- |

    | `Document` | Represents an XML document | `DocumentType`, `ProcessingInstruction`,
    `Comment`, `Element` (maximum of 1) |

    | `DocumentFragment` | Represents part of an XML document | `Element`, `ProcessingInstruction`,
    `Comment`, `Text`, `CDATASection`, `EntityReference` |

    | `DocumentType` | Represents a DTD for a document | No children |

    | `EntityReference` | Represents an entity reference | `Element`, `ProcessingInstruction`,
    `Comment`, `Text`, `CDATASection`, `EntityReference` |

    | `Element` | Represents an element | `Element`, `ProcessingInstruction`, `Comment`,
    `Text`, `CDATASection`, `EntityReference` |

    | `Attr` | Represents an attribute | `Text`, `EntityReference` |

    | `ProcessingInstruction` | Represents a processing instruction | No children
    |

    | `Comment` | Represents a comment | No children |

    | `Text` | Represents text, including whitespace | No children |

    | `CDATASection` | Represents a CDATA section | No children |

    | `Entity` | Represents an entity | `Element`, `ProcessingInstruction`, `Comment`,
    `Text`, `CDATASection`, `EntityReference` |

    | `Notation` | Represents a notation | No children |


    The `Document` specialized node type is somewhat unique in that at most only one
    instance of this type may exist within an XML document. It is also worth noting
    that the `Document` node type is a specialized `Element` node type and is used
    to represent the root element of an XML document. `Text` node types, in addition
    to representing text, are also used to represent whitespace in an XML document.'
