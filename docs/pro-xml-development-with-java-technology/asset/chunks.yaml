    **Sorting Elements**


    You can use the XSLT element xsl:sort to sort a group of elements. The attribute
    order of the xsl:sort element specifies the sorting order: ascending or descending.
    The data-type attribute (whose value can be number or text) specifies the data
    type of the element to be sorted. The default datatype value is text. The xsl:sort
    element is required to be in an xsl:for-each element or xsl:apply-templates element.


    For instance, try sorting the title elements in the example XML document in ascending
    order.


    The style sheet sort.xslt, shown in Listing 5-22, sorts the title elements in
    ascending order and outputs the text nodes in the title elements. To run the transformation
    application with sort.xslt, set sort.xslt as the style sheet in the File object
    stylesheet in XSLTTransformer.java.


    **Listing 5-22.** *sort.xslt*


    <xsl:stylesheet version="1.0">


    <xsl:output method="xml" omit-xml-declaration="yes"/>


    <xsl:template match="/catalog/journal">


    <xsl:apply-templates>


    <xsl:sort select="title"


    order="ascending"/>


    </xsl:apply-templates>


    </xsl:template>


    <xsl:template match="article">


    Title: <xsl:apply-templates select="title"/>


    </xsl:template>


    </xsl:stylesheet>


    In Listing 5-22, the <xsl:template match="/catalog/journal"> template is matched
    by the following built-in implicit XSLT instruction:


    <xsl:template match="*|/">


    <xsl:apply-templates/>


    </xsl:template>


    The built-in rule matches the <xsl:template match="/catalog/journal"> template
    for each journal node in the input source document, shown in Listing 5-11\. Since
    the


    <xsl:apply-templates> instruction within the <xsl:template match="/catalog/journal">
    template has no select attribute, this means each child of the journal node is
    selected and a matching template is searched. For each article child of the journal
    node, the matching template that works is of course <xsl:template match="article">,
    which outputs titles that get sorted by the xsl:sort instruction in the result
    tree. The output is a sorted list of article titles in ascending order, as shown
    in Listing 5-23.


    **Listing 5-23.** *Output in Eclipse from Sorting*


    Title: Advanced DAO Programming


    Title: Best Practices in EJB Exception Handling


    Title: Service Oriented Architecture Frameworks


    **Converting to HTML**


    Data in an XML document may have to be presented as an HTML document. You can
    define a transformation with HTML output by setting the method attribute to html
    within the xsl:output element.


    Listing 5-24 shows the XSLT style sheet for applying an HTML transformation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


