    responseText、responseXML、status 和 statusText 属性被重置为初始值。HTTP 方法和服务器 URL（可以是相对或绝对路径）是必需参数。布尔参数
    asynch 指定 HTTP 请求是否为异步；默认值为 true。参数 username 和 password 是可选的。


    send(data)


    向服务器发送一个 HTTP 请求，包含数据，数据可以是字符串、无符号字节数组、XML DOM 对象或 null。此方法是同步或异步的，对应于 open()
    方法的 asynch 参数值。如果是同步的，该方法在请求完全加载并收到整个响应后才返回。如果是异步的，该方法立即返回。调用 send() 方法后，readyState
    属性被设置为 2。请求完成加载后，readyState 属性被设置为 4。


    setRequestHeader(string headerName, string


    设置 HTTP 请求头。


