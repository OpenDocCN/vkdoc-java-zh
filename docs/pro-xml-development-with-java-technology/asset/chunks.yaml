    Xindice implements XML:DB XUpdate commands to update an XML document; Table 8-6
    lists these commands.


    **Table 8-6.** *XUpdate Commands*


    **XUpdate Command**


    **Description**


    xupdate:insert-after


    Adds a node after the selected node


    xupdate:update


    Updates the selected node


    xupdate:remove


    Removes the selected node


