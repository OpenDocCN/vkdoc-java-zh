- fmt: '# JAXP 1.3 DOM Parser API and Schema Validation


    We covered parsing with the JAXP 1.3 DOM parser API in Chapter 2. In this section,
    the focus is on schema validation using the JAXP 1.3 DOM parser API. The basic
    steps for schema validation using this API are as follows:


    1. Create an instance of the DOM parser factory.

    2. Configure the DOM parser factory instance to support schema validation.

    3. Obtain a DOM parser from the configured DOM parser factory.

    4. Configure a parser instance with an error handler so the parser can report
    validation errors.

    5. Parse the document using the configured parser.


    We will map these basic steps to specific steps using the JAXP 1.3 DOM API, which
    is defined in the `org.w3c.dom` package. In addition, the DOM API relies on the
    following SAX packages: `org.xml.sax` and `org.xml.sax.helpers`. The reliance
    on the SAX API within the DOM API is specified in JAXP 1.3 and is merely an effort
    to reuse classes, where appropriate. To begin, import the following classes:


    ```

    import javax.xml.parsers.DocumentBuilderFactory;

    import javax.xml.parsers.DocumentBuilder;

    import javax.xml.parsers.ParserConfigurationException;

    import org.xml.sax.SAXException;

    import org.xml.sax.SAXParseException;

    import org.xml.sax.helpers.DefaultHandler;

    ```


    ## Create a DOM Parser Factory


    As noted previously, the first step is to create a DOM parser factory, so you
    need to create a `DocumentBuilderFactory`, as shown here:


    ```

    DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();

    ```


    The implementation class for `DocumentBuilderFactory` is pluggable. The JAXP 1.3
    API loads the implementation class for `DocumentBuilderFactory` by applying the
    following rules, in order, until a rule succeeds:


    1. Use the `javax.xml.parsers.DocumentBuilderFactory` system property to load
    an implementation class.

    2. Use the properties file `lib/jaxp.properties` in the JRE directory. If this
    file exists, parse this file to check whether a property has the `javax.xml.parsers.DocumentBuilderFactory`
    key. If such a property exists, use the value of this property to load an implementation
    class.

    3. Files in the `META-INF/services` directory within a JAR file are deemed service
    provider configuration files. Use the Services API, and obtain the factory class
    name from the `META-INF/services/javax.xml.parsers.DocumentBuilderFactory` file
    contained in any JAR file in the runtime classpath.

    4. Use the platform default `DocumentBuilderFactory` instance, included in the
    J2SE platform being used by the application.


    ## Configure a Factory for Validation


    Before you can use a `DocumentBuilderFactory` instance to create a parser for
    schema validation, you need to configure the factory for schema validation. To
    configure a factory for validation, you may use the following options:


    - To parse an XML document with a namespace-aware parser, set the `setNamespaceAware()`
    feature of the factory to `true`. By default, the namespace-aware feature is set
    to `false`.

    - To make the parser a validating parser, set the `setValidating()` feature of
    the factory to `true`. By default, the validation feature is set to `false`.

    - To validate with an XML Schema language–based schema definition, set the `schemaLanguage`
    attribute, which specifies the schema language for validation. The attribute name
    is `http://java.sun.com/xml/jaxp/properties/schemaLanguage`, and the attribute
    value for the W3C XML Schema language is `http://www.w3.org/2001/XMLSchema`.

    - The `schemaSource` attribute specifies the location of the schema. The attribute
    name is `http://java.sun.com/xml/jaxp/properties/schemaSource`, and the attribute
    value is a URL pointing to the schema definition source.


    Listing 3-3 shows the configuration of a factory instance based on these validation
    options.'
