    **介绍 Eclipse IDE**


    本书中的 Java 应用程序是使用 Eclipse 3.1.1 集成开发环境（IDE）开发的，该环境是 Java 开发者中最常用的 IDE。你可以从 http://www.eclipse.org/
    下载它。以下各节是对 Eclipse 的快速介绍；我们涵盖了构建和执行本书中包含的 Java 应用程序所需了解的所有内容。特别是，我们提供了一个关于如何创建
    Java 项目以及在 Java 项目中创建 Java 应用程序的快速教程。


    **创建 Java 项目**


    要在 Eclipse 中创建 Java 项目，请选择 **文件** ➤ **新建** ➤ **项目**。在“新建项目”对话框中，选择 **Java 项目**，然后点击
    **下一步**，如图 1-1 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


