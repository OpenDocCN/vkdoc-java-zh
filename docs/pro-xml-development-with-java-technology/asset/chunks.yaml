    SOAP 1.1 Encoding Style


    The header blocks and the soapenv:Body content can be whatever the web service
    requires, as long as the header blocks and the soapenv:Body content are namespace
    qualified and are, of course, well-formed XML.


    This raises the obvious question, how should the header blocks and the soapenv:Body
    content be encoded? The answer, as per WS-I BP 1.1, is simple: neither the header
    blocks nor the soapenv:Body content should be encoded. WS-I BPI 1.1 prohibits
    the use of any encoding style, including SOAP 1.1


    encoding.9


    All header blocks and soapenv:Body content must be serialized literally, which
    means the header blocks and soapenv:Body content must conform to a schema definition.
    In case you are wondering, does this lack of an encoding style limit the ability
    of web services in any way? The answer, simply, is no. In fact, the only reason
    for the existence of SOAP 1.1 encoding is that at the time the SOAP 1.1


    W3C Note was being composed, the XML Schema language was not completed.


    The detailed rules related to encoding are as follows:


    • Any element in the http://schemas.xmlsoap.org/soap/envelope/ namespace must
    not contain the soapenv:encodingStyle attribute.


    • Any immediate child or grandchild of the soapenv:Body element must not contain
    any soapenv:encodingStyle attribute.


    Now you are ready to take a closer look at each of the soapenv:Envelope child
    elements.


    SOAP 1.1 Header


    The main purpose of the soapenv:Header element is extensibility. Web services
    need different types of capabilities that overlay the basic web services interaction.
    These capabilities could be services related to security,10 transaction management,
    or orchestration of complex business processes based on elementary web services.
    Information related to these capabilities resides in the child elements of the
    soapenv:Header element; these immediate child elements are called *header blocks*.


