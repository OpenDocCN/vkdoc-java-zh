    DOM API Example


    The Java application DOMParser.java shown in Listing 2-11 parses the XML document
    shown in Listing 2-2\. We are assuming you have imported the XML document shown
    in Listing 2-2 to the Chapter2 project, as shown in Figure 2-2.


    This example demonstrates how to use a DocumentBuilder object to parse the example
    XML


    document. Once you successfully parse the document, you get a Document object,
    which represents an in-memory tree structure for the example document. You retrieve
    the node representing the root element from the Document object, and you use the
    visitNode() method to walk down this tree and visit each node, starting at the
    root element.


    When you get to a node while traversing the tree, you first find its node type.
    If the node type is Element, you traverse the child nodes of the Element node
    with the visitNode() method. The visitNode() method also outputs the element tag
    name and attributes in an element. If the node type is Text and the Text node
    is not an empty node, the text value of the Text node is output.


