- fmt: '# Sorting Elements


    You can use the XSLT element `xsl:sort` to sort a group of elements. The attribute
    `order` of the `xsl:sort` element specifies the sorting order: ascending or descending.
    The `data-type` attribute (whose value can be `number` or `text`) specifies the
    data type of the element to be sorted. The default datatype value is `text`. The
    `xsl:sort` element is required to be in an `xsl:for-each` element or `xsl:apply-templates`
    element.


    For instance, try sorting the `title` elements in the example XML document in
    ascending order.


    The style sheet `sort.xslt`, shown in Listing 5-22, sorts the `title` elements
    in ascending order and outputs the text nodes in the `title` elements. To run
    the transformation application with `sort.xslt`, set `sort.xslt` as the style
    sheet in the `File` object `stylesheet` in `XSLTTransformer.java`.


    **Listing 5-22.** *sort.xslt*


    ```

    <xsl:stylesheet version="1.0">


    <xsl:output method="xml" omit-xml-declaration="yes"/>


    <xsl:template match="/catalog/journal">


    <xsl:apply-templates>


    <xsl:sort select="title"


    order="ascending"/>


    </xsl:apply-templates>


    </xsl:template>


    <xsl:template match="article">


    Title: <xsl:apply-templates select="title"/>


    </xsl:template>


    </xsl:stylesheet>

    ```


    In Listing 5-22, the `<xsl:template match="/catalog/journal">` template is matched
    by the following built-in implicit XSLT instruction:


    ```

    <xsl:template match="*|/">

    <xsl:apply-templates/>

    </xsl:template>

    ```


    The built-in rule matches the `<xsl:template match="/catalog/journal">` template
    for each `journal` node in the input source document, shown in Listing 5-11. Since
    the `<xsl:apply-templates>` instruction within the `<xsl:template match="/catalog/journal">`
    template has no `select` attribute, this means each child of the `journal` node
    is selected and a matching template is searched. For each `article` child of the
    `journal` node, the matching template that works is of course `<xsl:template match="article">`,
    which outputs titles that get sorted by the `xsl:sort` instruction in the result
    tree. The output is a sorted list of article titles in ascending order, as shown
    in Listing 5-23.


    **Listing 5-23.** *Output in Eclipse from Sorting*


    ```

    Title: Advanced DAO Programming

    Title: Best Practices in EJB Exception Handling

    Title: Service Oriented Architecture Frameworks

    ```


    # Converting to HTML


    Data in an XML document may have to be presented as an HTML document. You can
    define a transformation with HTML output by setting the `method` attribute to
    `html` within the `xsl:output` element.


    Listing 5-24 shows the XSLT style sheet for applying an HTML transformation.


    The style sheet `htmlTransform.xslt` has HTML tags to generate an HTML file. In
    this style sheet, a template matches the pattern `/catalog/journal`, and the `xsl:for-each`
    element is used to iterate over the `article` elements in a `journal` element.
    Text values are output with the `xsl:value-of` element. To run the transformation
    application `XSLTTransformer.java` with this style sheet, set input to the `File`
    object `stylesheet` to `htmlTransform.xslt`, and set the output file to `catalog.html`.


    **Listing 5-24.** *htmlTransform.xslt*


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <xsl:stylesheet version="1.0"

    >

    <xsl:output method="html"/>

    <xsl:template match="/catalog/journal">

    <html>

    <head>

    <title>Catalog</title>

    </head>

    <body>

    <table border="1" cellspacing="0">

    <tr>

    <th>Level</th>

    <th>Date</th>

    <th>Section</th>

    <th>Title</th>

    <th>Author</th>

    </tr>

    <xsl:for-each select="article">

    <tr>

    <td><xsl:value-of select="@

    level"/></td>

    <td><xsl:value-of select="

    @date"/></td>

    <td><xsl:value-of select="@

    section"/></td>

    <td><xsl:value-of select="title"

    /></td>

    <td><xsl:value-of select="author"

    /></td>

    </tr>

    </xsl:for-each>

    </table>

    </body>

    </html>

    </xsl:template>

    </xsl:stylesheet>

    ```


    The output from the XSLT is an HTML document that can be displayed in a browser,
    as shown in Figure 5-4.


    ![Image 36](index-149_1.png)


    **Figure 5-4.** *Output in Eclipse from HTML transformation*


    # Merging Documents


    When you merge XML documents, you create a new XML document from two XML documents.
    You obtain a copy of an XML document in another XML document with the `document()`
    function. As an example, combine the example XML document, `catalog.xml`, with
    the XML document, `catalog2.xml`, listed in Listing 5-25.


    **Listing 5-25.** *catalog2.xml*


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <catalog >

    <journal title="Java Technology"

