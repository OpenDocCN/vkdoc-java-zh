    <wsdl:operation name="remove" >


    <wsdl:input message="defs:RemoveProject" name="project" >


    </wsdl:input>


    </wsdl:operation>


    你不能在没有 `wsdl:output` 消息的情况下指定 `wsdl:fault` 消息，因为只有在期望响应时才会生成 SOAP 错误消息。因此，例如，你不能向名为
    `remove` 的 `wsdl:operation` 添加 `wsdl:fault`。


