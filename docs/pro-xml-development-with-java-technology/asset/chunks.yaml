    **Customizing JAXB Bindings**


    The JAXB binding compiler, xjc, provides a default binding of an XML Schema to
    Java classes. You can customize the schema bindings either by adding inline binding
    declarations to the schema or by using an external binding file. In this section,
    we will show how to customize JAXB bindings. You have two choices for defining
    JAXB customization bindings:


    • The first choice for defining customization bindings is an external (to schema)
    bindings file.


    External bindings offer the advantage of applying different customizations to
    the same schema definition to satisfy different binding objectives. However, external
    bindings use XPath expressions to address binding nodes and are therefore relatively
    complex to define.


    • Inline bindings are defined within schema definition elements; they address
    binding nodes implicitly. Unlike external bindings, they require no use of XPath
    expressions, so they are relatively easy to define.


    To keep things simple, we will use inline bindings in this section. Binding declarations
    are of the following types:


    • Global binding declarations


    • Schema binding declarations


    • XML-to-Java datatype binding declarations


    • Class binding declarations


    • Property binding declarations


    We have added an example of each of the binding declaration types to the example
    XML Schema document, catalog_inline.xsd, as shown in Listing 6-23\. We discuss
    these inline binding declarations in subsequent sections.


