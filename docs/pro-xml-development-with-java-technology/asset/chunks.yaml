    \ Patil</author>\n        </article>\n    </journal>\n</catalog>\nXML Document\
    \ Deleted\n```\n\n## Summary\n\nNative XML databases define a model for storing\
    \ and retrieving an XML document. Native XML databases store XML documents in\
    \ collections and support querying with XPath and updating with the XML:DB XUpdate\
    \ APIs, respectively. Native XML databases have an advantage over relational databases\
    \ in that the native XML databases are specifically designed for storing, querying,\
    \ and updating XML documents, whereas relational databases are designed to store\
    \ atomic values within a database row-column cell. Complex XML documents with\
    \ multilevel hierarchies and attributes can be easily stored, queried, and updated\
    \ in a native XML database.\n\nIn this chapter, we discussed general native XML\
    \ database concepts in the specific context of the Xindice open source native\
    \ XML database. In addition to support for the query and update APIs, Xindice\
    \ provides a command-line tool for administrating the Xindice native XML database,\
    \ which was also discussed in this chapter.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`Vohra_706-0C08.fm` Page 248 Saturday, August 12, 2006 5:05 AM\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`Vohra_706-0C09.fm` Page 249 Tuesday, July 25, 2006 5:00 AM\n\n# CHAPTER 9\n\
    \n## Storing XML in Relational Databases\n\n**I**n the previous chapter, you learned\
    \ how to store an XML document in a native XML database. Native XML databases\
    \ are of course limited to storing only XML documents. If you need to store an\
    \ XML document along with other data, a relational database is more appropriate.\
    \ In a relational database, you can store an XML document just like any other\
    \ type of data, within a column in a table row."
