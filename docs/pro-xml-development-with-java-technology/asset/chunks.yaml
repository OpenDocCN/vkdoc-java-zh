    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **387**


    The project folders are as follows:


    • The wsclient folder contains Java files corresponding to the web service clients,
    used to interact with the example web service.


    • The wsdl folder has the web service WSDL 1.1 document (services.wsdl), the WSDL
    1.1


    customization file (svcbindings.xml) used for customizing WSDL 1.1 to Java mappings,
    the schema document (types.xsd), and the JAXB 2.0 binding customization file (binding.xjb)
    used for customizing JAXB 2.0 object bindings.


    • The web folder has Java files, XML documents, and properties files related to
    Java Server Faces (JSF)–based implementations of web pages. Understanding the
    contents of this folder is not central to understanding web services, and this
    content appears in this chapter solely because we wanted to show how to build
    a complete working example. JSF is part of Java EE 5 and is a server-based technology
    for constructing a web-based user interface. JSF is beyond the scope of this book.
    However, if you are interested in learning more about JSF, we recommend *Pro*
    *JSF and Ajax: Building Rich Internet Components*.15


    • The ejb folder contains Java code related to application logic and database
    persistence, based on the Enterprise Java Beans (EJB) 3.0 technology. EJB 3.0
    is part of Java EE 5 and is a technology for implementing object-relational mapping,
    automatic database persistence, and application logic. EJB 3.0 is beyond the scope
    of this chapter. For a more detailed look at EJB


    3.0, we recommend *Pro EJB3: Java Persistence API*.16


    • The wsgen folder is for Java source files generated by the wsimport tool. When
    you initially import the project into Eclipse, this folder will be empty. The
    generated Java files correspond to JAXB 2.0 object binding files and web service
    interfaces.


    • The wsimpl folder has Java files for implementing web service interfaces. These
    implementation files use EJBs to implement the application logic and interact
    with the database.


    • The app directory has the application.xml deployment descriptor in the config
    folder. In this project, we will show how to build an enterprise application archive,
    which will be deployed in the server. This archive will contain the example web
    service. The application.xml deployment descriptor specifies deployment directives
    for the enterprise application, when the application is deployed in the Sun One
    Application Server 9.0\. For more details about this, we recommend the Java EE
    5 tutorial at http://java.sun.com/javaee/5/docs/tutorial/doc/.'
