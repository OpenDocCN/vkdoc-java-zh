  raw: 'The XML Schema 1.012 definition language specifies the structure of an XML
    document and constrains its content. The key concept to understand is that a schema
    based on the XML Schema language defines a class of valid XML documents. A document
    is considered valid with respect to a schema if it conforms to the structure defined
    by the schema. A valid XML document is formally referred to as an *instance* of
    the schema document. As a rough analogy, what a Java class is to a Java object,
    a schema is to an XML document.


    One more important point to keep in mind is that a schema is also an XML document.
    In fact, this was one of the key motivations for the XML Schema language; the
    alternative structure standard, which is a DTD, is not an XML document. In case
    it is not already obvious, you could actually write a schema for an XML Schema–based
    schema document!


    This is a non-normative discussion of the XML Schema language. As far as possible,
    we will explain various XML Schema constructs in the context of an example schema.
    We will show how to build an example schema incrementally as we explain various
    XML Schema constructs. The example schema will define a structure for the example
    XML document shown in Listing 1-2.


    **Listing 1-2.** *Example XML Document*


    <?xml version=''1.0'' encoding=''UTF-8'' ?>


    <catalog publisher="O''Reilly" title="OnJava.com" >


    <journal date="2004-05-05" >


    <article>


    <title>Java and XML</title>


    <author>Narayanan Jayaratchagan</author>


    12\. See XML Schema Part 1: Structures (http://www.w3.org/TR/xmlschema-1/) and
    XML Schema Part 2: Datatypes (http://www.w3.org/TR/xmlschema-2/) for more information.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C01.fm Page 12 Wednesday, June 28, 2006 6:27 AM


    **12**


    C H A P T E R 1 ■ I N T R O D U C I N G X M L A N D J A V A


    </article>


    </journal>


    </catalog>


    **Schema Declarations**


    The root element of a schema is schema, and it is defined in the XML Schema namespace
    . An example schema document with its root element is as follows:


    <xsd:schema >


    </xsd:schema>


    **Built-in Datatypes**


    The XML Schema language has 44 built-in simple types that are specified in XML
    Schema Part 2: Datatypes (http://www.w3.org/TR/xmlschema-2/). These datatypes
    of course belong to the XML


    Schema namespace, so we will use them with the xsd: prefix, as in xsd:string.
    Table 1-1 lists the most commonly used built-in datatypes. For a complete list
    of built-in datatypes, consult the W3C


    Recommendation.


    **Table 1-1.** *Commonly Used Built-in Datatypes*


    **Datatype**


    **Description**


    **Example**


    string


    A character string


    New York, NY


    int


    –2147483648 to 2147483647


    +234, –345, 678987


    double


    A 64-bit floating point number


    –345.e-7, NaN, –INF, INF


    decimal


    A valid decimal number


    –42.5, 67, 92.34, +54.345


    date


    A date in CCYY-MM-DD format


    2006-05-05


    time


    Time in hh:mm:ss-hh:mm format


    10:27:34-05:00 (for 10:27:34 EST, which is


    –5 hours UTC)


    **Element Declarations**


    You define an element in an XML Schema–based schema with the element construct,
    as shown here:


    <xsd:element name="element_name" type="element_type"/> You can define an element
    within a schema construct. The example schema document with a top-level catalog
    element declaration within a schema construct is as follows:


    <xsd:schema >


    <xsd:element name="catalog" type="catalogType" ></xsd:element>


    <!-- we have yet to define a catalogType -->


    </xsd:schema>


    Of course, we have not yet defined catalogType. The XML Schema language defines
    two main type constructs: a simple type and a complex type. Almost no meaningful
    document structure is feasible without the use of a complex type, so that is what
    we will cover next.


