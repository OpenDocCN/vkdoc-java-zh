    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **359**


    ### Resource-Oriented Model


    From this model’s perspective, a web service is a resource that can be consumed
    by a web service client. Essential aspects of this model are as follows:


    - A web service is a network-based resource identifiable through an HTTP URI.

    - A web service resource is described through a WSDL 1.1 document.

    - A web service resource may be registered with a UDDI registry.

    - A web service resource may be discovered by querying a UDDI registry, as shown
    in Figure 14-1.


    Now, you are ready to examine the details associated with the web service messaging
    framework, WSDL, client-service interaction, and the JAX-WS 2.0 APIs that implement
    a complete web service client-side and service-side protocol stack.


    However, it is best to do all this in the context of example use case scenarios.
    So, in the next section, we will explain the example use case scenarios that will
    provide a practical framework for our discussion of SOAP 1.1, SOAP Message with
    Attachments, WSDL 1.1, and JAX-WS 2.0.


    ## Example Use Case Scenarios


    Imagine you want to build a document storage website. Naturally, users would expect
    to be able to upload their documents to this website and retrieve them later,
    using a browser-based user interface.


    However, you survey prospective and current users and find that in addition to
    a browser-based user interface, they want a web service that will allow computer
    programs to interact with this website.


    You give the issue some thought, and you come with the following four use case
    scenarios for this web service:


    - Uploading documents to a project

    - Downloading documents from a project

    - Getting information about all the projects owned by a user

    - Removing documents from a project


    You’ll now examine each use case in detail.


    ### Uploading Documents to a Project


    The first use case is uploading documents to a project under your account. In
    this use case scenario, a ZIP file and a manifest file are sent to the web service
    for uploading the documents in the ZIP file into a project in your account.


    The motivation for this scenario is a program that could be configured to do the
    following:


    1. Automatically select a set of documents from your desktop.

    2. Zip the documents into a ZIP file.

    3. Add a manifest to the ZIP file.

    4. Upload the ZIP file documents into a project in your account, using the web
    service.


    The manifest file will contain information about documents in the ZIP file that
    need to be put into the project. The web service will do the following:


