    在讨论使用 JAXB 2.0 开发的编组和解组 Java 应用程序之前，我们将展示如何下载和安装一些必需的软件，以及如何为 JAXB 2.0 创建和配置 Eclipse
    项目。


    ## 下载和安装软件


    要运行 JAXB 2.0 示例，您需要以下软件。


    ### 安装 Java Web Service Developer Pack (JWSDP)


    JAXB 2.0 包含在 JWSDP 2.0 中。因此，您需要下载并安装 JWSDP 2.0.6。将 JWSDP 2.0 安装到任意目录。我们假设 JWSDP
    2.0 安装在默认安装目录下，在 Windows 中为 `C:\Sun\jwsdp-2.0`；如果是这种情况，JAXB 包含在 `C:\Sun\jwsdp-2.0\jaxb`
    目录中。


    ### 安装 J2SE 5.0


    在 JAXB 1.0 示例中，您使用了 J2SE 5.0，因为 J2SE 1.4.2 不提供某些 `SAXParserFactory` 类方法。使用 JAXB
    2.0 时，您需要使用 J2SE 5.0，因为 JAXB 2.0 使用了参数化类型。


    当然，您可能已经在 JAXB 1.0 的上下文中安装了 J2SE 5.0，因此此时可能无需再次安装。


    ## 创建和配置 Eclipse 项目


    要使用 `xjc` 编译示例模式，并运行 JAXB 2.0 的编组和解组代码示例，您需要创建一个 Eclipse Java 项目。创建 Eclipse 项目最快的方法是从
    Apress 网站（http://www.apress.com）下载 `Chapter6-JAXB2.0` 项目，并将其导入 Eclipse。这将自动创建本章所需的所有
    Java 包和文件。


    您还需要将 `Chapter6-JAXB2.0` 的 JRE 设置为 J2SE 5.0 JRE。您可以通过单击“添加库”按钮，在项目的 Java 构建路径中设置
    JRE。图 6-10 显示了 `Chapter6-JAXB2.0` 的 Java 构建路径。如果您的 JWSDP 2.0 安装位置不是 `C:\Sun\jwsdp-2.0`，您可能需要显式添加或编辑图
    6-10 中显示的外部 JAR。无论哪种方式，请确保您的 Java 构建路径显示了图 6-10 中所示的所有 JWSDP 2.0 JAR 文件。


    您可以在 http://java.sun.com/webservices/downloads/webservicespack.html 找到 JWSDP 2.0。


