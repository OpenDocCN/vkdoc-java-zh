  raw: 'A WSDL 1.1 document is an XML document that conforms to the WSDL 1.1 schema,
    which is available at http://schemas.xmlsoap.org/wsdl/. The WSDL 1.1 schema location
    also defines the WSDL 1.1


    namespace. Assuming the wsdl prefix for the WSDL 1.1 namespace, the root element
    of a WSDL 1.1


    document is wsdl:definitions.


    The wsdl:definitions element contains the following child elements:


    • The wsdl:types element defines data type definitions using the XML Schema language.
    In other words, the XML content of wsdl:types element is a schema definition.


    • The wsdl:message element defines an abstract message type used in web service
    interaction.


    Each wsdl:message consists of one or more wsdl:part elements, whereby each wsdl:part
    is based on either a schema element or a schema type, defined within wsdl:types.
    The wsdl:definitions element can contain one or more wsdl:message elements.


    • The wsdl:portType element defines an abstract service interface. Each wsdl:portType
    element can contain one or more wsdl:operation elements. However, each wsdl:operation
    element within a wsdl:portType must have a unique value for its name attribute.


