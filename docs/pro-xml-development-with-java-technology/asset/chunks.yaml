    **Parsing with StAX**


    StAX is a pull-model API for parsing XML. StAX has an advantage over the push-model
    SAX. In the push model, the parser generates events as the XML document is parsed.
    With the pull parsing in StAX, the application generates the parse events; thus,
    you can generate parse events as required.


    The StAX API (JSR-173)6 is implemented in J2SE 6.0.


    Key points about StAX API are as follows:


    • The StAX API classes are in the javax.xml.stream and javax.xml.stream.events
    packages.


    • The StAX API offers two different APIs for parsing an XML document: a cursor-based
    API and an iterator-based API.


    • The XMLStreamReader interface parses an XML document using the cursor API.


    • XMLEventReader parses an XML document using the iterator API.


    • You can use the XMLStreamWriter interface to generate an XML document.


    We will first discuss the cursor API and then the iterator API.


    **Cursor API**


    You can use the XMLStreamReader object to parse an XML document using the cursor
    approach. The next() method generates the next parse event. You can obtain the
    event type from the getEventType() method. You can create an XMLStreamReader object
    from an XMLInputFactory object, and you can create an XMLInputFactory object using
    the static method newInstance(), as shown in Listing 2-18.


