    \ and classes get generated in the `gen_source` folder, as shown in Figure 7-7.\
    \ You must refresh the `Chapter7` project to see the generated files. You use\
    \ interfaces from the `noNamespace` package for marshaling and unmarshaling an\
    \ XML document. Classes in the `noNamespace.impl` package provide an implementation\
    \ of the interfaces in the `noNamespace` package.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 55](index-213_1.png)\n\n![Image 56](index-213_2.png)\n\nVohra_706-0C07.fm\
