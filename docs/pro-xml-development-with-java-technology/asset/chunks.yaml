    ## CHAPTER 10 ■ LOADING AND SAVING WITH THE DOM LEVEL 3 API **279**


    ## Filtering an XML Document


    You can filter an XML document model as the XML document model is parsed, and
    you can filter a DOM document model as the DOM document model is stored. In this
    section, we will show how to filter an XML document model. We will show how to
    filter an input XML document model using an input filter and save the parsed DOM
    document model using an output filter. In filtering a document model, you can
    remove some of the nodes from the document. The `LSParserFilter` interface allows
    the filtering of input, while the `LSSerializerFilter` interface allows the filtering
    of output. For our example, the procedure to filter input is as follows:


    1. Create an input filter, a class that implements the `LSParserFilter` interface.

    2. In the input filter class, show the element nodes to filter. Nodes that are
    not shown to the filter are added to the `Document` object without the filter
    selecting the nodes to add to the `Document` object.

    3. Accept all the nodes that are shown to the filter.

    4. Create an `LSParser` object.

    5. Create an `LSInput` object for the XML document to filter.

    6. Set the input filter on the `LSParser` object.

    7. Parse an XML document using the `LSInput` object.


    For our example, the procedure to filter the output is as follows:


    1. Create an output filter, a class that implements the `LSSerializerFilter` interface.

    2. In the output filter class, show the element nodes to filter. Nodes that are
    not shown to the filter are output without the filter selecting the nodes to output.

    3. As an example, accept all the nodes that are shown to the filter except the
    journal node with the date attribute set to April 2005.

    4. Create an `LSSerializer` object.

    5. Create an `LSOutput` object for the filter output.

    6. Set the output filter on the `LSSerializer` object.

    7. Filter the `Document` object.


    As when loading and saving, import the DOM 3 `org.w3c.dom.ls` package. For input
    filtering, create an `LSParser` implementation and an `LSParser` parser, as shown
    in Listing 10-15. The procedure to create a filter is same as in the loading section:
    create a `DOMImplementationRegistry` object, obtain a `DOMImplementation` object
    from the registry object, cast `DOMImplementation` to `DOMImplementationLS`, and
    create an `LSParser` from the `DOMImplementationLS` object.


    **Listing 10-15.** *Creating an LSParser*


    ```java

    System.setProperty(DOMImplementationRegistry.PROPERTY,

    "org.apache.xerces.dom.DOMImplementationSourceImpl");

    DOMImplementationRegistry registry =DOMImplementationRegistry.newInstance();

    DOMImplementation domImpl = registry.getDOMImplementation("LS 3.0");

    DOMImplementationLS implLS = (DOMImplementationLS)domImpl;

    LSParser parser =

    implLS.createLSParser(DOMImplementationLS.MODE_SYNCHRONOUS,

    "http://www.w3.org/2001/XMLSchema");

    ```


