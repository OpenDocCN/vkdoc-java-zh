    **清单 12-3.** *设置系统属性*


    System.setProperty("javax.xml.parsers.DocumentBuilderFactory",


    "org.apache.xerces.jaxp.DocumentBuilderFactoryImpl"); System.setProperty


    ("javax.xml.transform.TransformerFactory",


    "org.apache.xalan.processor.TransformerFactoryImpl"); **创建文档**


    您可以通过使用 `DocumentBuilder` 对象解析 XML 文档来创建 `Document` 对象。您从 `DocumentBuilderFactory`
    对象获取 `DocumentBuilder` 对象。因此，您需要使用静态方法 `newInstance()` 创建一个 `DocumentBuilderFactory`
    对象。随后，使用 `DocumentBuilderFactory` 对象的方法 `newDocumentBuilder()` 创建 `DocumentBuilder`
    对象，如清单 12-4 所示。您可以使用 `InputStream`、`InputSource` 或 `File` 的重载 `parse()` 方法之一来解析
    XML 文档。示例应用程序从 `File` 对象解析 XML 文档，如清单 12-4 所示。`parse(File)` 对象返回一个 `Document`
    对象。


    **清单 12-4.** *解析 XML 文档*


    DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance(); DocumentBuilder
    builder = factory.newDocumentBuilder();


    Document document = builder.parse(new File("catalog.xml")); **创建转换器**


    您还需要创建一个 `Transformer` 对象来转换通过 `DocumentBuilder` 对象获得的 `Document` 对象。您可以从 `TransformerFactory`
    对象获取 `Transformer` 对象。因此，使用静态方法 `newInstance()` 创建一个 `TransformerFactory` 对象，如清单
    12-5 所示。为了在从 `TransformerFactory` 对象获得的 `Transformer` 对象上设置样式表，请从示例样式表创建一个 `StreamSource`
    对象。随后，使用方法 `newTransformer(StyleSource)` 创建一个 `Transformer` 对象。


    **清单 12-5.** *创建 Transformer 对象*


    TransformerFactory tFactory = TransformerFactory.newInstance(); StreamSource stylesource
    = new StreamSource(new File("catalog.xslt")); Transformer transformer = tFactory.newTransformer(stylesource);
    **将 XML 文档转换为 XSL-FO**


    `Transformer` 类提供了方法 `transform(Source, Result)` 来将 XML 输入转换为输出。您可以将输入指定为 `DOMSource`、`SAXSource`
    或 `StreamSource`。您可以将输出指定为 `DOMResult`、`SAXResult` 或 `StreamResult`。在示例应用程序中，输入被指定为
    `DOMSource`，输出被指定为 `StreamResult`。因此，从 `Document` 对象创建一个 `DOMSource` 对象，并从 `catalog.fo`
    文件创建一个 `StreamResult` 对象，如清单 12-6 所示。随后，使用 `transform(DOMSource, SAXResult)` 对象转换示例
    XML 文档，如清单 12-6 所示。


