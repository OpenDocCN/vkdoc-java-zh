    JAXB 的主要目标从 JAXB 1.0 到 2.0 保持不变。然而，2.0 版本有许多重要的新增功能。因此，我们将首先详细讨论 JAXB 1.0，然后再讨论
    JAXB 2.0 中重要的新增内容。


    **JAXB 1.0**


    在以下各节中，我们将介绍 JAXB 1.0。


    **架构**


