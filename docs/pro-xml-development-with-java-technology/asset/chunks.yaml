- fmt: '# Chapter 10: Loading and Saving with the DOM Level 3 API


    The DOM Level 3 Core specification, which builds upon the DOM Level 2 and Level
    1 Core specifications, defines platform- and language-neutral interfaces for accessing
    and manipulating the content and structure of a generalized document, represented
    as a document tree. In addition to the interfaces for a generalized document,
    the DOM Level 3 Core specification contains specific interfaces for manipulating
    XML documents. (Chapter 2 discussed the DOM Level 3 Core specification.) The DOM
    Level 3 Load and Save specification provides a set of interfaces for loading and
    saving (*serializing* and *deserializing*) an XML document. Loading an XML document
    means mapping the XML document model to a DOM document model. Saving an XML document
    implies converting a DOM document model to an XML document model. DOM Load and
    Save Level 3 is a platform- and language-neutral specification. Beside its language-
    and platform-neutral status, the key features that motivated this specification
    are as follows:


    - The ability to filter content during the loading and saving process

    - The ability to load and save selected nodes within a document, as opposed to
    the whole document

    - The ability to serialize a document to a string, rather than a file

    - The facility for event handling during document loads and saves


    The myriad reasons for filtering content, or loading and saving selected nodes,
    are too numerous to enumerate, but some common reasons are as follows:


    - Filtering confidential information from a document, before it is communicated
    to a third party

    - Adding or removing application-specific annotations or processing instructions
    to a document

    - Adapting a template document for a specific purpose


    In this chapter, we will discuss the DOM 3 Load and Save specification as implemented
    by JAXP 1.3, which is included in J2SE 5.0. In addition to providing the loading
    and saving of an XML document and the filtering of content during loading and
    saving, the DOM 3 Load and Save API provides event handling as the document is
    loaded or serialized. In this chapter, we will cover all these features of the
    DOM Level 3 Load and Save API.


    The DOM Level 3 Load and Save specification is a W3C Recommendation available
    at http://www.w3.org/TR/DOM-Level-3-LS/.


    ## Overview


    The DOM 3 Load and Save specification provides an interface for bidirectional
    mapping between a DOM document model and an XML document model. The mapping is
    implemented by a set of interfaces that we will discuss briefly in the following
    sections; we explain the interfaces in greater detail in subsequent sections.


    The `DOMImplementationLS` interface extends the DOM Level 3 Core `DOMImplementation`
    interface and provides factory methods for creating objects required for loading
    and saving an XML document. Using a `DOMImplementationLS` object, you can create
    an `LSParser`, `LSSerializer`, `LSInput`, or `LSOutput` object.


    ## Introducing the Load API


    The following are the key points of the Load API:


    - `LSParser` is an interface to parse data into a DOM document model.

    - The `LSInput` interface represents a data source. You can set a data source
    on an `LSInput` object using a character stream, a byte stream, a string, a system
    ID, or a public ID. `LSParser` uses an `LSInput` object to determine how to read
    data. You can set multiple input sources on an `LSParser` object, and `LSParser`
    uses the first input that is not null and not an empty string.


    The `LSParser` object scans the different input sources in the following order
    to select one to read from:


    1. `LSInput.characterStream`

    2. `LSInput.byteStream`

    3. `LSInput.stringData`

    4. `LSInput.systemId`

    5. `LSInput.publicId`


    - The `LSResourceResolver` interface resolves external resources, such as external
    entities, and creates an `LSInput` object from an external resource.

    - `LSParserFilter` filters nodes as data is parsed.


    ## Introducing the Save API


    The following are the key points of the Save API:


    - The `LSSerializer` interface is for serializing (saving) a DOM document model
    to an XML document model.

    - The `LSOutput` interface represents output for serializing a DOM document model.
    The `LSSerializer` will use an `LSOutput` object to determine the output destination.
    You can set multiple outputs on an `LSSerializer` object, and `LSSerializer` uses
    the first output that is not null and not an empty string. The `LSSerializer`
    object scans the different outputs in the following order to determine which one
    to output to:


    1. `LSOutput.characterStream`

    2. `LSOutput.byteStream`

    3. `LSOutput.systemId`


    - The `LSSerializerFilter` interface filters nodes as a DOM document model is
    saved.


    ## Comparing JAXP’s DocumentBuilder and Transformer APIs


    The DOM Level 3 Load and Save specification was influenced by earlier versions
    of JAXP. It turns out that prior to the DOM Level 3 Load and Save specification,
    JAXP defined APIs that you can use for serializing and deserializing an XML document.
    The JAXP `DocumentBuilder` class provides a standard method to map an XML document
    to a DOM object, and the JAXP `Transformer` class provides a method for serializing
    a DOM document model to an XML document model. Of course, JAXP is a Java-specific
    API. The DOM Level 3 Load and Save specification built upon ideas from JAXP and
    defined platform- and language-neutral interfaces for loading and saving an XML
    document and also added features such as event handling and filtering. And to
    bring things full circle, JAXP 1.3 now provides a Java binding of the DOM Level
    3 Load and Save specification.


    If you don’t require the filtering, event handling, or loading and saving of selected
    nodes, you can use JAXP’s `DocumentBuilder` and `Transformer` APIs for loading
    and saving an XML document. The DOM 3 Load and Save specification interfaces offer
    the following features over and above what the JAXP `DocumentBuilder` and `Transformer`
    classes offer:


    - DOM Level 3 Load and Save supports the registration of an event listener with
    a parser. When the loading of an XML document using the DOM 3 parser is complete,
    the generated load event indicates that the document loading has completed.

    - You can filter nodes as a DOM 3 parser loads them or as they are serialized.

    - You can save a selected node in a DOM document model instead of the complete
    document.

    - You can save a `Document` node or an `Element` node as a `java.lang.String`
    object, instead of a file. Exchanging XML documents in a web service sometimes
    requires an XML document as a `String` type.


    In this chapter, we will explain the procedure to load and save an XML document
    using the DOM Level 3 specification. We will demonstrate how to filter content
    at load time and at serialization time using the DOM Level 3 Load and Save specification.
    This chapter uses the DOM Level 3 Load and Save implementation provided by JAXP
    1.3, which is included in J2SE 5.0.


    ## Creating an Eclipse Project'
