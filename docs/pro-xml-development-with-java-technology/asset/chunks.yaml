    # CHAPTER 8 ■ STORING XML IN NATIVE XML DATABASES: XINDICE


    **239**


    ## Adding an XML Document to the Xindice Database


    在本节中，您将向上一节创建的集合中添加一个XML文档。


    示例XML文档将被添加到`catalog`集合中；因此，使用`getCollection()`方法从数据库中获取`catalog`集合，如清单8-23所示。


    **Listing 8-23.** *Obtaining a Collection from DriverManager*

    ```java

    Collection collection = DatabaseManager.getCollection

    ("xmldb:xindice://localhost:8080/db/catalog");

    ```


    Xindice数据库中的XML文档资源使用`XMLResource`接口表示。您可以使用DOM节点或SAX `ContentHandler`来设置`XMLResource`的内容。在示例应用程序中，您将使用DOM节点设置`XMLResource`的内容。因此，获取要添加的XML文档的`Document`对象，如清单8-24所示。


    **Listing 8-24.** *Creating a Document Object*

    ```java

    DocumentBuilderFactory factory =

    DocumentBuilderFactory.newInstance();

    File datafile = new File("xindice_resources/catalog.xml");

    DocumentBuilder builder = factory.newDocumentBuilder();

    Document document = builder.parse(datafile);

    ```


    在清单8-25中，您使用`xindice_resources/catalog.xml`文件创建了一个要添加的XML文档的`File`对象。您需要为要添加到集合中的XML文档资源创建一个ID。该ID将集合与一个标识符关联起来。Xindice数据库中的XML文档使用`XMLResource`接口表示；因此，为要添加到`catalog`集合的XML文档创建一个`org.xmldb.api.modules.XMLResource`对象。您可以从`Document`对象设置`XMLResource`的内容。要将XML文档存储到数据库中，您需要使用`storeResource(XMLResource)`方法将XML资源添加到`catalog`集合中。


    清单8-25列出了创建`XMLResource`并将资源添加到集合的过程。


    **Listing 8-25.** *Adding an XML Resource to a Collection*

    ```java

    String resourceID = collection.createId();

    XMLResource resource = (XMLResource)

    (collection.createResource(resourceID,"XMLResource"));

    resource.setContentAsDOM(document);

    collection.storeResource(resource);

    ```


    示例XML文档`catalog.xml`被添加到数据库集合中。


    ## Retrieving an XML Document from the Xindice Database


    在本节中，您将使用XML:DB API从Xindice数据库中检索一个示例XML文档。Xindice数据库中的XML资源通过资源ID进行标识。在上一节中，为要存储的XML文档创建并设置了资源ID。使用相同的资源ID，从数据库中获取XML资源。您可以使用`getContent()`方法输出XML资源中的XML文档。清单8-26展示了获取`XMLResource`以及XML资源中XML文档的过程。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C08.fm Page 240 Saturday, August 12, 2006 5:05 AM


    **240**


    CHAPTER 8 ■ STORING XML IN NATIVE XML DATABASES: XINDICE


    **Listing 8-26.** *Retrieving an XML Resource*

    ```java

    XMLResource resource = (XMLResource)

    (collection.getResource(resourceID));

    System.out.println(resource.getContent());

    ```


    上一节添加的XML文档被检索出来。


    ## Querying the Xindice Database Using XPath


    在本节中，您将使用XML:DB API查询Xindice数据库。您将看到一个查询，用于查找第一个`journal`元素中文章的`title`。一个XPath查询表达式被指定为一个`String`，如下所示：


    ```java

    String xpath = "/catalog/journal[1]/article/title";

    ```


    `org.xmldb.api.modules.XpathQueryService`服务用于查询数据库集合。因此，创建一个`XPathQueryService`对象。随后，使用`XpathQueryService.query()`方法查询数据库。该查询返回一个`org.xmldb.api.base.ResourceSet`。


    一个`ResourceSet`由XML资源组成。要检索一个XML资源，遍历资源集并获取一个XML文档资源`org.xmldb.api.base.Resource`。清单8-27展示了使用XPath查询查询Xindice数据库、遍历查询返回的资源集以及输出资源中XML文档的过程。


    **Listing 8-27.** *Querying Xindice*

    ```java

    XPathQueryService queryService =

    (XPathQueryService)

    collection.getService("XPathQueryService","1.0");

    ResourceSet resourceSet = queryService.query(xpath);

    ResourceIterator iterator = resourceSet.getIterator();

    while (iterator.hasMoreResources()) {

    Resource resource = iterator.nextResource();

    System.out.println(resource.getContent());

    }

    ```


    ## Modifying the Document Using XUpdate


    在以下部分中，您将使用XML:DB和XUpdate API更新Xindice数据库中的XML文档。表8-4列出了一些用于更新XML文档的XUpdate命令。


    ### Adding an Element Using the XML:DB API


    在本节中，您将使用XML:DB API更新示例XML文档。作为一个例子，您将在第三个`journal`元素之后添加一个`journal`元素。您可以在XUpdate字符串中指定XUpdate命令，如清单8-28所示。XUpdate命令`xupdate:insert-after`在`select`属性指定的元素之后添加一个元素。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C08.fm Page 241 Saturday, August 12, 2006 5:05 AM


    CHAPTER 8 ■ STORING XML IN NATIVE XML DATABASES: XINDICE


    **241**


    **Listing 8-28.** *XUpdate Configuration String for Adding an Element*

    ```java

    String xupdate =

    "<xupdate:modifications version=\"1.0\"" +

    " xmlns:xupdate=\"http://www.xmldb.org/xupdate\">" +

    " <xupdate:insert-after select=\"/catalog/journal[3]\">" +

    " <journal date=\"Aug 2005\">" + " <article>" +

    " <title>iBatis DAO</title>" +

    " <author>Sunil Patil</author>" + " </article>" +

    " </journal>" + " </xupdate:insert-after>" +

    "</xupdate:modifications>";

    ```


    查询服务类`org.xmldb.api.modules.XUpdateQueryService`用于通过XUpdate更新数据库。因此，使用`getService()`方法从要更新的集合中创建一个`XUpdateQueryService`对象。可以使用`XUpdateQueryService`对象的`update()`方法更新Xindice数据库，如清单8-29所示。


    **Listing 8-29.** *Updating a Collection Using XUpdate*

    ```java

    XUpdateQueryService queryService =

    (XUpdateQueryService) collection.getService("XUpdateQueryService",

    "1.0");

    queryService.update(xupdate);

    ```


    ### Deleting an Element Using the XML:DB API


    作为另一个例子，我们将展示如何使用`xupdate:remove`命令从数据库的XML文档中移除一个`journal`元素。要移除第一个`journal`元素，创建一个如清单8-30所示的XUpdate命令字符串。要移除的元素在`xupdate:remove`元素的`select`属性中指定。


    **Listing 8-30.** *XUpdate Configuration for Deleting an Element*

    ```java

    String xupdate = "<xupdate:modifications version=\"1.0\"" +

    " xmlns:xupdate=\"http://www.xmldb.org/xupdate\">" +

    " <xupdate:remove select=\"/catalog/journal[1]\"/>" +

    "</xupdate:modifications>";

    queryService.update(xupdate);

    ```


    ### Modifying an Element Using the XML:DB API'
