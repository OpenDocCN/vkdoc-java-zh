    • `UsOrCanadaAddress` 接口继承自 `UsOrCanadaAddressType` 接口。


    • `ObjectFactory` 类是一个典型的对象工厂实现，可用于创建 `UsOrCanadaAddress` 或 `UsOrCanadaAddressType`
    的新实例。


    • 在 `com.apress.jaxb1.example.impl` 包中，xjc 生成两个实现类：`UsOrCanadaAddressTypeImpl`
    和 `UsOrCanadaAddressImpl`。这些实现类实现了对应的接口。


