    `union` 构造用于指定多个 `simpleType` 的联合。例如，如果你首先将 `chapterNames` 定义为一个字符串值列表，如下所示：


    <xsd:element name="chapterNames">


    <xsd:simpleType>


    <xsd:list itemType="xsd:string"/>


    </xsd:simpleType>


    </xsd:element>


    那么你可以像下面这样指定 `chapterNumbers` 和 `chapterNames` 的联合：


    <xsd:element name="chapters" >


    <xsd:simpleType>


    <xsd:union memberTypes="chapterNumbers, chapterNames" />


    </xsd:simpleType>


    </xsd:element>


    这是一个与之前定义的 `chapters` 声明相对应的元素示例：


    <chapters>8 XSLT 11</chapters>


    当然，由于列表值不能包含任何空白字符，这个例子完全是虚构的，因为现实生活中的章节名称几乎总是包含空白字符。


    **模式示例文档**


    基于上述讨论，清单 1-3 展示了清单 1-2 中示例 XML 文档的完整示例模式文档。


    **清单 1-3.** *完整示例模式文档*


