- fmt: 'Imagine a website selling various trade journals. This website offers a web
    service where associated publishers can send catalog information about their journals.
    The website provides an XML Schema that specifies the structure of an XML document
    containing catalog information. This catalog schema defines a top-level `catalog`
    element. This `catalog` element can have zero or more `journal` elements, and
    each `journal` element can have zero or more `article` elements. Each of these
    elements defines relevant attributes. The elements are defined by reference to
    their associated types, which are defined separately. Listing 6-6 shows this catalog
    schema, `catalog.xsd`.


    **Listing 6-6.** *catalog.xsd*


    ```xml

    <xsd:schema >


    <xsd:element name="catalog" type="catalogType"/>


    <xsd:complexType name="catalogType">


    <xsd:sequence>


    <xsd:element ref="journal" minOccurs="0" maxOccurs="unbounded"/>


    </xsd:sequence>


    <xsd:attribute name="section" type="xsd:string"/>


    <xsd:attribute name="publisher" type="xsd:string"/>


    </xsd:complexType>


    <xsd:element name="journal" type="journalType"/>


    <xsd:complexType name="journalType">


    <xsd:sequence>


    <xsd:element ref="article" minOccurs="0" maxOccurs="unbounded"/>


    </xsd:sequence>


    </xsd:complexType>


    <xsd:element name="article" type="articleType"/>


    <xsd:complexType name="articleType">


    <xsd:sequence>


    <xsd:element name="title" type="xsd:string"/>


    <xsd:element name="author" type="xsd:string"/>


    </xsd:sequence>


    <xsd:attribute name="level" type="xsd:string"/>


    <xsd:attribute name="date" type="xsd:string"/>


    </xsd:complexType>


    </xsd:schema>

    ```


    The web service client at the publisher must construct an XML document that conforms
    to the catalog schema shown in Listing 6-6 and must send this document in a web
    service message. Listing 6-7 shows an example of such a document, `catalog.xml`.


    **Listing 6-7.** *catalog.xml*


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <catalog

    section="Java Technology"

    publisher="IBM developerWorks">


    <journal>

    <article level="Intermediate" date="January-2004" >

    <title>Service Oriented Architecture Frameworks </title>

    <author>Naveen Balani</author>

    </article>

    <article level="Advanced" date="October-2003" >

    <title>Advance DAO Programming</title>

    <author>Sean Sullivan</author>

    </article>

    <article level="Advanced" date="May-2002" >

    <title>Best Practices in EJB Exception Handling </title>

    <author>Srikanth Shenoy </author>

    </article>

    </journal>

    </catalog>

    ```


    The web service receiving this catalog information message needs to retrieve relevant
    element and attribute values from the message and store those values in a database.
    In this chapter, you are not concerned with the aspects of this use case that
    deal with storing data in a database or that deal with the mechanics of assembling
    and transporting a web service message. We will cover those aspects in later chapters.
    Your sole concern in this chapter is marshaling and unmarshaling the document
    shown in Listing 6-7 and subsequently retrieving the relevant element and attribute
    values from the mapped Java objects.


    In this use case example, your objectives are as follows:


    - Bind the catalog schema shown in Listing 6-6 using the `xjc` compiler, and generate
    Java content classes representing the various schema components defined within
    the catalog schema.

    - Marshal and unmarshal the XML document shown in Listing 6-7.

    - Retrieve the relevant element and attribute values from the mapped Java objects.

    - Customize schema bindings using inline binding declarations.


    Before presenting some Java code associated with this use case, we’ll discuss
    how to download and install the required software and how to create and configure
    the Eclipse project required for this chapter.


    **Downloading and Installing the Software**'
