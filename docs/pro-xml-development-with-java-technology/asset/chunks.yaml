    • 对于所有其他指定的轴，它指的是关联命名空间中的一个元素节点。例如，在图 4-2 中，`preceding::journal:journal` 元素按文档顺序选择了第一个
    journal 元素。


    • 带有 `*` 的节点名称测试指的是元素节点的无限制通配符。例如，在图 4-2 中，`child::*` 选择了一个包含所有 `child::` 轴元素的节点集。这意味着
    `child::*` 和 `child::node()` 不具有相同的语义，因为前者仅限于 `child::` 轴元素节点，而后者选择任何节点类型的 `child::`
    轴节点。


    • 带有 `prefix:*` 名称的节点测试指的是元素节点的命名空间受限通配符。例如，`/catalog/child::journal:*` 计算得到一个节点集，该节点集包含所有作为
    catalog 元素子元素且属于 `journal:` 命名空间的元素，按文档顺序，这正好是文档中的第一个 journal 元素。


    **谓词**


    位置路径步中的最后一部分是零个或多个可选的谓词。以下是理解谓词的两个关键点：


    • 谓词是对节点集的过滤器。


    • 谓词是 XPath 表达式，通过使用核心 XPath 的 `boolean()` 函数对其进行求值并映射为布尔值，具体如下所述：


    • 当且仅当一个数字值是非零数字时，它被映射为 true。例如，在图 4-2 中，表达式 `//title[position()]` 使用了内置的 XPath
    `position()` 函数，该函数返回所选 title 节点的子节点位置（作为一个数字）。由于节点的子节点位置总是大于或等于 1，因此该表达式将选择所有
    title 节点。然而，表达式 `//title[position() – 1]` 将只选择那些子节点位置大于 1 的 title 节点。在该示例中，第二个表达式不会选择任何节点，因为所有
    title 节点都位于子节点位置 1。


    • 当且仅当一个字符串值是非零长度的字符串时，它被映射为 true。例如，在图 4-2 中，表达式 `//title[string()]` 使用内置的 XPath
    `string()` 函数将节点集中的第一个节点隐式转换为其字符串节点值。该表达式将只选择那些具有非零长度文本内容的 title 节点，对于示例文档而言，这意味着选择所有
    title 节点。


    • 当且仅当一个节点集是非空时，它被映射为 true。例如，在图 4-2 中，表达式 `//article[child::title]` 中的 `[child::title]`
    谓词仅在 `child::title` 节点集非空时才求值为 true，因此该表达式选择所有具有 title 子元素的 article 元素。


    谓词左侧组件的输出节点集是其输入节点集，而求值一个谓词涉及遍历此输入节点集。随着求值的进行，迭代中的当前节点成为上下文节点，并且谓词相对于此上下文节点进行求值。如果谓词求值为
    true，则此上下文节点被添加到谓词的输出节点集中；否则，它被忽略。来自一个谓词的输出节点集成为后续谓词的输入节点集。位置路径步中的多个谓词从左到右进行求值。


    位置路径步中的谓词相对于当前步关联的轴进行求值。上下文节点的邻近位置定义为它沿步轴的位置，如果是正向轴则按文档顺序，如果是反向轴则按逆文档顺序。节点的邻近位置定义为其上下文位置。输入节点集的大小定义为上下文大小。上下文节点、上下文位置和上下文大小构成了完整的
    XPath 上下文，所有谓词都相对于此上下文进行求值。


    在查看以下基于图 4-2 数据模型的示例时，可以应用一些与谓词相关的概念：


    • `/catalog/child::journal[attribute::title=''Java Technology'']` 是一个 XPath 表达式，其中第二步包含谓词
    `[attribute::title=''Java Technology'']`。此谓词的输入节点集由所有作为 catalog 元素子元素且非命名空间的 journal
    元素组成。按文档顺序，输入节点集仅包含第二个 journal 元素，因为第一个 journal 元素属于 journal 命名空间。因此，在第一次迭代开始时，上下文大小为
    1，上下文位置也为 1。当遍历输入节点集时，将当前节点（即 journal 节点）设为上下文节点，然后测试谓词。该谓词检查上下文节点是否具有一个名为 title
    且值等于 Java Technology 的属性。如果谓词测试成功（应该会成功），则将此 journal 上下文节点包含在输出集中。遍历完输入集中的所有节点后，输出节点集将包含所有满足谓词的
    journal 元素。此表达式的结果将只是文档中按文档顺序的第二个 journal 节点。


    • `/catalog/descendant::article[position() = 2]` 是一个 XPath 表达式，其中第二步包含谓词 `[position()
    = 2]`。此谓词的输入节点集由所有作为 catalog 元素后代的 article 元素组成。此输入节点集将包含文档中的所有三个 article 节点。因此，在第一次迭代开始时，上下文大小为
    3，上下文位置为 1。此谓词示例应用了上下文位置的概念。当遍历输入节点集时，将当前 article 元素设为上下文节点，然后测试谓词。该谓词检查 article
    元素的上下文位置（通过 XPath 核心函数 `position()` 测试）是否等于 2。当将此谓词应用于图 4-2 的数据模型时，只有第二个以展开形式出现的
    article 节点会测试为 true。注意，`[position() = 2]` 谓词等价于缩写谓词 `[2]`。此表达式的结果将是按文档顺序的第二个 article
    节点。


    在详细了解了 XPath 表达式之后，现在可以将注意力转向使用基于 Java 的 XPath API 来应用 XPath 表达式。


    **应用 XPath 表达式**


    想象一个提供与期刊文章信息相关服务的网站。再进一步想象，该网站通过一些基于 Web 服务的消息从各个出版商处接收期刊内容信息，并且这些消息的内容是一个 XML
    文档，看起来类似于前面清单 4-1 中显示的文档。


    一旦 Web 服务接收到此文档，它需要根据某些标准从此 XML 文档中提取内容信息。假设要求你构建一个应用程序，根据某些特定标准从此文档中提取内容信息。你会怎么做？


    你的第一步是确保接收到的文档具有有效的结构，或者换句话说，符合其模式定义。为了确保这一点，你将首先根据其模式验证文档，如第 3 章所述。


    你的下一个任务是设计一种提取相关内容信息的方法。在这里，你有两个选择：


    • 你可以使用 DOM API 检索文档节点

    • 你可以使用 XPath API 检索文档节点。


    那么，这就引出了一个显而易见的问题：哪个是更好的选择？


    **比较 XPath API 与 DOM API**

