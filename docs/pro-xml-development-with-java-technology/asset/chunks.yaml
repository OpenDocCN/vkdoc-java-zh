    **Summary**


    XSLT is a language for transforming XML documents to other XML documents or non-XML
    documents such as HTML or plain-text documents. To apply transformations described
    in an XSLT style sheet to an XML document, you need an XSLT processor and an API
    to invoke the XSLT processor.


    The TrAX API set available within JAXP 1.3 is ideally suited for transforming
    an input XML document using an XSLT style sheet. The type of target output document
    types produced by an XSLT style sheet is limited only by your imagination. In
    this chapter, we showed how to successfully transform XML documents into other
    XML documents, HTML documents, and plain-text documents.


