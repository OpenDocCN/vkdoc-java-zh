    DefaultHandler 类并重写相关的基类方法，以实现自定义的回调处理器。清单 2-13 中所示的 CustomSAXHandler 就是这样一个类，它重写了部分基类事件通知方法，包括错误处理方法。


    关于 CustomSAXHandler 类的要点如下：


    • 在 CustomSAXHandler 类中，startDocument() 和 endDocument() 方法会输出事件类型。

    • 在 startElement() 方法中，会输出事件类型、元素限定名和元素属性。startElement() 方法的 uri 参数是元素的命名空间 URI，可能为
