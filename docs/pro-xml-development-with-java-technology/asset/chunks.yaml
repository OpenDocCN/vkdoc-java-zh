- fmt: '# Understanding the Web Services Architecture


    In the following sections, we will discuss the overall web services architecture,
    first defining basic web service concepts and then covering various web service
    architectural models.


    ## Basic Web Service Concepts


    You will start by looking at some basic web service concepts that will help you
    understand the rest of this discussion.


    ### Web Service Client Perspective


    From a client perspective, a web service has the following key aspects:


    - A web service is formally described through a `WSDL 1.1` document. We will cover
    in detail what is in a `WSDL 1.1` document in the “Understanding WSDL 1.1” section,
    but for now, it is sufficient to understand that a `WSDL` document defines an
    interface for a web service. For example, an Amazon web service has its formal
    description available at `http://soap.amazon.com/schemas2/AmazonWebServices.wsdl`.


    - The `SOAP Messages with Attachments` W3C Note is available at `http://www.w3.org/TR/SOAP-attachments`.


    - The `WSDL 1.1` W3C Note is available at `http://www.w3.org/TR/wsdl`.


    - The `WS-I Basic Profile 1.1` specification is available at `http://www.ws-i.org/Profiles/BasicProfile-1.1.html`.


    - More information about `JAX-WS 2.0` is available at `http://www.jcp.org/en/jsr/detail?id=224`.


    - `Java EE` is available at `http://java.sun.com/javaee/`.


    - The web service network address defines a location where a web service is available
    on the network; this location is specified as an `HTTP URL`. For example, the
    network address of an Amazon web service is `http://soap.amazon.com/onca/soap2`.


    - Client applications that want to use the web service may discover the location
    of the `WSDL 1.1` document through a `UDDI` registry, or through other means,
    such as direct input.


    - Client applications interact with the web service using `SOAP 1.1` messages
    transported within `HTTP 1.0/1.1` messages.


    Figure 14-1 shows web service interaction from a client perspective.


    **Figure 14-1.** *Web service interaction from a client perspective*


    ### Agents and Services


    From a logical viewpoint, a web service endpoint can be split into two parts:


    - The first part is the *service endpoint interface* (`SEI`). The `SEI` is the
    web service contract with its clients, analogous to a Java interface.

    - The second part is the *agent*. The agent is a concrete software implementation
    of the `SEI`, analogous to a Java class implementing a Java interface.


    ### Providers and Requestors


    A web service is provided by a provider entity. A *provider entity* can be an
    individual or an organization. A provider entity provides the web service through
    a *provider agent*. A provider agent is a concrete software implementation of
    the web service `SEI`. For example, if Amazon provides a web service, Amazon is
    the provider entity.


    A web service is used by a *requestor entity*. A requestor entity can be an individual
    or an organization. A requestor entity uses the web service through a *requestor
    agent*. A requestor agent is a software component that uses the web service’s
    `WSDL 1.1` document–based description to interact with the web service. For example,
    any entity using Amazon’s web service would be the requestor entity.


    You can implement both the provider agent and the requestor agent using the `JAX-WS
    2.0` APIs.


    ### Service Description


    A provider entity describes a web service through a `WSDL 1.1` document. You will
    learn about the details of a `WSDL 1.1` document in the section “Understanding
    WSDL 1.1.” For now, it is sufficient to understand that a `WSDL 1.1` document
    is capable of formally describing a service interface and includes the endpoint
    `HTTP URI` address of the provider agent.


    ### Service Semantics'
