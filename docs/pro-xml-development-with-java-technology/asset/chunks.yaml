- fmt: "# XSLT Node Selection and Filtering\n\nXSLT node selection is based on XPath.\
    \ With the `xsl:value-of` element, you can select the element and attribute nodes\
    \ in an XML document with XPath. As an example, select the value of the `date`\
    \ attribute for the `article` element with the title `Advanced DAO Programming`,\
    \ and select the value of the `title` element for the `article` by author `Srikanth\
    \ Shenoy`. The style sheet `xpath.xslt`, shown in Listing 5-28, outputs the value\
    \ of the `date` attribute and the `title` element. The XPath expression `article[title='Advanced\
    \ DAO Programming']/@date` selects the `date` attribute, and the XPath expression\
    \ `article[author='Srikanth Shenoy']/title` selects the `title` element.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nVohra_706-0C05.fm Page 132 Thursday, July 6, 2006 1:42 PM\n\n**132**\n\nCHAPTER\
    \ 5 ■ TRANSFORMING WITH XSLT\n\n**Listing 5-28.** *xpath.xslt*\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<xsl:stylesheet version=\"1.0\" xmlns:xsl=\"http://www.w3.org/1999/XSL/Transform\"\
    >\n  <xsl:output method=\"xml\" omit-xml-declaration=\"yes\"/>\n  <xsl:template\
    \ match=\"/catalog/journal\">\n    Date: <xsl:value-of select=\"article[title='Advanced\
    \ DAO Programming']/@date\"/>\n    Title: <xsl:value-of select=\"article[author='Srikanth\
    \ Shenoy']/title\"/>\n  </xsl:template>\n</xsl:stylesheet>\n```\n\nTo run the\
    \ transformation application with `xpath.xslt`, set the input style sheet in `XSLTTransformer.java`\
    \ to `xpath.xslt`. Listing 5-29 shows the output from the XSLT transformation.\n\
    \n**Listing 5-29.** *Output in Eclipse with XPath Node Selection*\n\n```\nDate:\
    \ October-2003\nTitle: Best Practices in EJB Exception Handling\n```\n\n## Filtering\
    \ Elements\n\nApplying `xsl:apply-templates` elements to only those elements and\
    \ attributes that are required in the output can filter elements in an XML document.\
    \ As an example, select the `article` elements with the `level` attribute specified\
    \ as `Intermediate`. The style sheet `filter.xslt`, shown in Listing 5-30, selects\
    \ the `article` elements that have `level` attributes with a value of `Intermediate`.\
    \ The XPath expression `article[@level='Intermediate']` selects the `article`\
    \ elements with the `level` attributes set to `Intermediate`.\n\n**Listing 5-30.**\
    \ *filter.xslt*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<xsl:stylesheet\
    \ version=\"1.0\">\n  <xsl:output method=\"xml\" omit-xml-declaration=\"yes\"\
    />\n  <xsl:template match=\"/catalog/journal\">\n    <xsl:apply-templates select=\"\
    article[@level='Intermediate']\"/>\n  </xsl:template>\n  <xsl:template match=\"\
    article\">\n    Title: <xsl:value-of select=\"title\"/>\n    Author: <xsl:value-of\
    \ select=\"author\"/>\n  </xsl:template>\n</xsl:stylesheet>\n```\n\nTo run the\
    \ transformation application with `filter.xslt`, set the `File` object `stylesheet`\
    \ input to `filter.xslt` in `XSLTTransformer.java`. The output contains only the\
    \ `article` element with the `level` value of `Intermediate`, as shown in Listing\
    \ 5-31.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C05.fm\
    \ Page 133 Thursday, July 6, 2006 1:42 PM\n\nCHAPTER 5 ■ TRANSFORMING WITH XSLT\n\
    \n**133**\n\n**Listing 5-31.** *Output in Eclipse from Filtering Elements*\n\n\
    ```\nTitle: Service Oriented Architecture Frameworks\nAuthor: Naveen Balani\n\
    ```\n\n## Copying Nodes\n\nThe XSLT specification provides two elements for copying\
    \ nodes, `xsl:copy-of` and `xsl:copy`. The `xsl:copy-of` element copies a selected\
    \ element and also copies attributes and subelements of the selected node. `xsl:copy`,\
    \ a different version of the `xsl:copy-of` element, doesn't copy the subelements\
    \ and attributes of the selected node. As an example, copy the second `article`\
    \ element in the `journal` element in `catalog.xml` to output. The style sheet\
    \ `copy.xslt` in Listing 5-32 copies the second `article` element in the `journal`\
    \ node in the `catalog.xml` document to the output document. The XPath expression\
    \ `journal/article[2]` selects the second `article` element in the `journal` element.\n\
    \n**Listing 5-32.** *copy.xslt*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<xsl:stylesheet version=\"1.0\">\n  <xsl:output method=\"xml\"/>\n  <xsl:template\
    \ match=\"/catalog\">\n    <xsl:copy-of select=\"journal/article[2]\"/>\n  </xsl:template>\n\
    </xsl:stylesheet>\n```"
