    <!-- Binds a port type binding to a network endpoint address -->


    </wsdl:port>


    </wsdl:service>


    </wsdl:definitions>


    In the next section, you will examine an example WSDL 1.1 document.'
  trans: '

    WSDL 1.1 文档是一种符合 WSDL 1.1 模式的 XML 文档，该模式位于 http://schemas.xmlsoap.org/wsdl/。WSDL
    1.1 模式位置还定义了 WSDL 1.1 命名空间。假设 `wsdl` 前缀代表 WSDL 1.1 命名空间，则 WSDL 1.1 文档的根元素是 `wsdl:definitions`。


    `wsdl:definitions` 元素包含以下子元素：


    • `wsdl:types` 元素使用 XML Schema 语言定义数据类型。换句话说，`wsdl:types` 元素的 XML 内容就是一个模式定义。


    • `wsdl:message` 元素定义 Web 服务交互中使用的抽象消息类型。每个 `wsdl:message` 由一个或多个 `wsdl:part`
    元素组成，其中每个 `wsdl:part` 基于在 `wsdl:types` 中定义的模式元素或模式类型。`wsdl:definitions` 元素可以包含一个或多个
    `wsdl:message` 元素。


    • `wsdl:portType` 元素定义抽象服务接口。每个 `wsdl:portType` 元素可以包含一个或多个 `wsdl:operation` 元素。但是，`wsdl:portType`
    中的每个 `wsdl:operation` 元素必须具有唯一的 `name` 属性值。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C14.fm Page 371 Saturday, August 12, 2006 5:18 AM


    第 14 章 ■ 构建基于 XML 的 Web 服务


    **371**


    • `wsdl:operation` 元素是服务操作的抽象定义。每个 `wsdl:operation` 包含 `wsdl:input`、`wsdl:output`
    和 `wsdl:fault` 元素的组合；这些元素中的每一个都是消息组件，是 `wsdl:operation` 使用的消息交换模式的一部分。


    • 每个 `wsdl:input`、`wsdl:output` 和 `wsdl:fault` 元素都基于一个 `wsdl:message` 元素。如果 `wsdl:operation`
    使用请求-响应消息交换模式，则必须指定一个 `wsdl:input` 元素和一个 `wsdl:output` 元素，并且可能指定一个或多个 `wsdl:fault`
    元素。如果 `wsdl:operation` 使用单向消息交换模式，则必须指定一个单独的 `wsdl:input` 元素。


    • 由于 `wsdl:portType` 元素定义了抽象服务接口，因此需要将其映射到消息协议和传输协议。每个 `wsdl:portType` 在 `wsdl:binding`
    元素（`wsdl:definitions` 的子元素）中被递归地映射到消息协议和传输协议。


    • 每个 `wsdl:portType` 抽象接口通过 `wsdl:port` 元素映射到具体的网络端点地址。`wsdl:port` 元素定义在 `wsdl:service`
    元素（`wsdl:definitions` 的子元素）内。


    清单 14-6 展示了 WSDL 1.1 文档的基本结构。


    **清单 14-6.** *WSDL 1.1 文档的基本结构*


    <wsdl:definitions


    >


    <wsdl:types>


    <!-- 模式元素或模式类型 -->


    </wsdl:types>


    <!-- 一个或多个抽象消息类型 -->


    <wsdl:message name="...">


    <!-- 一个或多个消息部分 -->


    <wsdl:part element="..." name="..." type="...">


    <!-- 基于模式元素或模式类型 -->


    </wsdl:part>


    </wsdl:message>


    <!-- 一个或多个抽象端口类型接口 -->


    <wsdl:portType name="...">


    <!-- 一个或多个抽象操作，但名称必须唯一 -->


    <wsdl:operations name="...">


    <!-- 请求必须有一个输入 -->


    <wsdl:input message="..." name="...">


    </wsdl:input>


    <!-- 可选响应包含一个输出元素


    和零个或多个故障元素 -->


    <wsdl:output message="..." name="...">


    </wsdl:output>


    <wsdl:fault message="..." name="...">


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C14.fm Page 372 Saturday, August 12, 2006 5:18 AM


    **372**


    第 14 章 ■ 构建基于 XML 的 Web 服务


    </wsdl:fault>


    </wsdl:operations>


    </wsdl:portType>


    <wsdl:binding name="..." type="...">


    <!-- 将端口类型映射到消息协议


    和传输协议 -->


    </wsdl:binding>


    <wsdl:service name="..." >


    <!-- 一个或多个端口 -->


    <wsdl:port binding="..." name="...">


    <!-- 将端口类型绑定绑定到网络端点地址 -->


    </wsdl:port>


    </wsdl:service>


    </wsdl:definitions>


    在下一节中，你将看到一个 WSDL 1.1 文档的示例。

