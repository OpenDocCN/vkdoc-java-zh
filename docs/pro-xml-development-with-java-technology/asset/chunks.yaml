    此外，它还指定了 SOAP 1.1 消息模式应为 `document` 类型，下一节将对此进行描述。


    SOAP 1.1 消息样式


    SOAP 1.1 消息样式是一个与消息交换模式（可以是请求-响应或单向）和消息编码（对我们来说始终是字面量）概念完全不同的概念，它规定了 `soapenv:Body`
    元素有效负载中 XML 内容的结构规则。存在两种可能的 SOAP 1.1 消息样式：


    • 远程过程调用（rpc）样式

    • 文档（document）样式


    接下来你将了解每种消息样式。


    **远程过程调用样式**


    顾名思义，此样式体现了与远程过程调用相关的语义。在此样式下，以下内容成立：


    • `soapenv:Body` 元素的内容始终有一个子元素，其标签名称对应于正在远程调用的操作名称。

    • `soapenv:Body` 元素的孙元素表示与远程操作关联的参数。

    • 孙元素的名称和顺序对应于远程操作的参数名称及其顺序。

    • `soapenv:Body` 元素的子元素和孙元素必须具有命名空间限定；该命名空间是特定于应用程序的。


    此样式完全是多余的，因为文档样式（我们将在下一节中描述）更加通用，更重要的是，它遵循了保持交互应用程序尽可能松散耦合的基本原则。相比之下，rpc 样式类似于进行方法调用，并带有调用应用程序与被调用应用程序之间紧密耦合的所有相关影响。在我们看来，rpc
    样式是松散耦合应用程序的对立面，应尽可能避免使用。


    **文档样式**


    文档样式中 `soapenv:Body` 的结构规则很简单：


    • `soapenv:Body` 元素的内容应为格式良好的 XML，并且所有 `soapenv:Body` 子元素应在特定于应用程序的命名空间中进行命名空间限定。

    • 如果映射到 `soapenv:Body` 元素的 `wsdl:part` 对应于一个模式元素（即它具有 `element` 属性），则在文档样式的消息中，该模式元素作为
    `soapenv:Body` 元素的子元素出现。

