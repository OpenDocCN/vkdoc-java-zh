    接收此目录信息消息的网络服务需要从消息中提取相关的元素和属性值，并将这些值存储到数据库中。在本章中，你无需关注此用例中涉及数据存储到数据库的方面，也无需关注组装和传输网络服务消息的机制。我们将在后续章节中介绍这些内容。本章你唯一需要关注的是对清单
    6-7 所示文档进行编组和解组，然后从映射后的 Java 对象中提取相关的元素和属性值。


    在此用例示例中，你的目标如下：


    *   使用`xjc`编译器绑定清单 6-6 所示的目录模式，并生成代表目录模式中定义的各种模式组件的 Java 内容类。

    *   对清单 6-7 所示的 XML 文档进行编组和解组。

    *   从映射后的 Java 对象中提取相关的元素和属性值。

    *   使用内联绑定声明自定义模式绑定。


