    第 7 章 ■ 使用 XMLBeans 进行绑定


    **清单 7-3.** *scomp 绑定编译器语法*


    scomp [opts] [schema.xsd]* [config.xsdconfig]*


    scomp [opts] [directory]


    在第一个 `scomp` 命令中，`[schema.xsd]*` 是零个或多个用于绑定到其 Java 类型的输入模式，`[config.xsdconfig]*`
    是零个或多个包含影响绑定编译器的自定义绑定的配置文件。第二个命令显示了 `scomp` 的另一种语法，其中 `[directory]` 包含输入模式和自定义绑定文件；这是我们将在示例中使用的语法。在这两个命令中，`[opts]`
    表示 `scomp` 编译器选项，这些选项列在表 7-2 中。


    **表 7-2.** *Scomp 编译器选项*


    **选项**


    **描述**


    -cp [a;b;c]


    指定类路径。


    -d [dir]


    指定 `.class` 和 `.xsb` 文件的目标二进制目录。

    XSB 文件包含模式元信息，这是绑定和验证等任务所必需的。


    -src [dir]


    指定生成的 `.java` 文件的目标目录。


    -out [xmltypes.jar]


    指定 XML 类型的输出 JAR 文件。


    -compiler


    指定外部 Java 编译器的路径。


    我们将展示如何在 Eclipse 中运行 `scomp`。因此，将 `scomp` 配置为 Eclipse 中的外部工具。要在 Eclipse 中配置 `scomp`，您需要执行以下步骤：**1.**
    要将 `scomp` 配置为外部工具，请选择“运行”➤“外部工具”。在“外部工具”区域中，通过右键单击“程序”节点并选择“新建”来创建一个新的程序配置。

    这将添加一个新配置，如图 7-4 所示。


    **2.** 外部工具配置包括配置名称和 `scomp` 编译器命令文件的位置。您在“名称”字段中指定配置名称。`scomp` 命令文件的位置位于 XMLBeans
    安装目录的 `bin` 目录中，您在“位置”字段中指定该位置。您还需要设置工作目录和程序参数。要设置工作目录，请单击“工作目录”字段的“变量”按钮，然后选择
    `container_loc` 变量。这将在“工作目录”字段中指定值 `${container_loc}`，如图 7-4 所示。


    **3.** 在“参数”字段中，您需要设置需要使用 `scomp` 编译器编译的模式。您还需要指定 `scomp` 编译器选项 `-src` 和 `-out`。（表
    7-2 讨论了编译器选项。）在“参数”字段中，指定编译器选项 `-src` 和 `-out`，并使用清单 7-4 中所示的语法设置模式资源。


