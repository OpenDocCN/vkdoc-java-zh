    要运行 JAXB 1.0 示例，您需要安装以下软件。


    安装 Java Web Service Developer Pack (JWSDP)


    JAXB 1.0 包含在 JWSDP 1.6 中。因此，您需要下载并安装 JWSDP 1.6.3。将 JWSDP 1.6 安装到任意目录。在本章中，我们假设
    JWSDP 安装在默认安装目录下，在 Windows 系统中为 `C:\Sun\jwsdp-1.6`；如果是这种情况，JAXB 包含在 `C:\Sun\jwsdp-1.6\jaxb`
    目录中。


    安装 J2SE


    我们建议将 J2SE 5.0 与 JWSDP 1.6 配合使用，因为 JAXB 使用了 `SAXParserFactory` 类的一些方法，这些方法在 J2SE
    5.0 中已定义，但在 J2SE 1.4.2 中未定义。使用 JRE 1.4.2 时，解组操作会生成以下错误：


    `java.lang.NoSuchMethodError: javax.xml.parsers.SAXParserFactory.`


    `getSchema()Ljavax/xml/validation/Schema`


    如果您使用 Endorsed Standards Override Mechanism (http://java.sun.com/j2se/1.4.2/docs/guide/standards/)，则可以在
    JWSDP 1.6 中使用 J2SE 1.4.2。如果您想使用 J2SE 5.0（我们强烈推荐），则需要下载并安装它。如果 `JAVA_HOME` 环境变量的路径名中包含空格，`xjc`
    编译器将无法运行。因此，请将 J2SE 5.0 安装到路径名中没有空格的目录中。


    **创建并配置 Eclipse 项目**


    要使用 `xjc` 编译示例模式，并运行本项目包含的编组和解组代码示例，您需要创建一个 Eclipse Java 项目。创建 Eclipse 项目最快的方法是从
    Apress 网站 (http://www.apress.com) 下载 Chapter6 项目，然后将该项目导入 Eclipse。这将自动创建本章所需的所有
    Java 包和文件。


    您还需要将 Chapter6 的 JRE 设置为 J2SE 5.0 JRE。通过单击“添加库”按钮，在项目的 Java 构建路径中设置 JRE。图 6-2
    显示了 Chapter6 的构建路径。如果您的 JWSDP 1.6 安装位置不是 `C:\Sun\jwsdp-1.6`，则可能需要显式添加或编辑外部 JAR
    文件。


    无论采用哪种方式，请确保您的 Java 构建路径显示了图 6-2 中所示的所有 JWSDP 1.6 JAR 文件。


    我们将展示如何配置绑定编译器 `xjc`，以在 `gen_source` 文件夹和 `gen_source_customized_bindings` 文件夹中生成
    Java 内容类；因此，请将这两个文件夹添加到 Java 构建路径区域中“源”选项卡下的源路径中，如图 6-3 所示。


    3. 您可以在 http://java.sun.com/webservices/downloads/webservicespack.html 找到 JWSDP
    1.6。

    4. 您可以在 http://java.sun.com/webservices/docs/1.6/ReleaseNotes.html#new 找到此信息。


