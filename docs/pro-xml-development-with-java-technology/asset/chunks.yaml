    您可以使用第 5 章讨论的 XML 转换 API（Transformation API for XML）执行 XML 到 XSL-FO 的转换。您将使用 `DocumentBuilder`
    解析器解析示例 XML 文档，并使用 `Transformer` 对象对其进行转换。因此，您需要设置系统属性 `javax.xml.parsers.DocumentBuilderFactory`
    和 `javax.xml.transform.TransformerFactory`，如清单 12-3 所示。您使用 `DocumentBuilderFactory`
    创建 `DocumentBuilder` 对象，使用 `TransformerFactory` 创建 `Transformer` 对象。


