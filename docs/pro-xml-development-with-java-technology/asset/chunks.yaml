- fmt: "# XMLStreamReader Events\n\nFor a `START_DOCUMENT` event type, the `getEncoding()`\
    \ method returns the encoding in the XML document. The `getVersion()` method returns\
    \ the XML document version.\n\nYou can find this specification at http://jcp.org/aboutJava/communityprocess/final/jsr173/index.html.\n\
    \n**Table 2-13.** *XMLStreamReader Events*\n\n| Event Type | Description |\n|------------|-------------|\n\
    | `START_DOCUMENT` | Start of a document |\n| `START_ELEMENT` | Start of an element\
    \ |\n| `ATTRIBUTE` | An element attribute |\n| `NAMESPACE` | A namespace declaration\
    \ |\n| `CHARACTERS` | Characters may be text or whitespace |\n| `COMMENT` | A\
    \ comment |\n| `SPACE` | Ignorable whitespace |\n| `PROCESSING_INSTRUCTION` |\
    \ Processing instruction |\n| `DTD` | A DTD |\n| `ENTITY_REFERENCE` | An entity\
    \ reference |\n| `CDATA` | CDATA section |\n| `END_ELEMENT` | End element |\n\
    | `END_DOCUMENT` | End document |\n| `ENTITY_DECLARATION` | An entity declaration\
    \ |\n| `NOTATION_DECLARATION` | A notation declaration |\n\nFor a `START_ELEMENT`\
    \ event type, the `getPrefix()` method returns the element prefix, and the `getNamespaceURI()`\
    \ method returns the namespace or the default namespace. The `getLocalName()`\
    \ method returns the local name of an element, as shown in Listing 2-20.\n\n**Listing\
    \ 2-20.** *Outputting the Element Name*\n\n```java\nif (event == XMLStreamConstants.START_ELEMENT)\
    \ {\n    System.out.println(\"Element Local Name:\"+ xmlStreamReader.getLocalName());\n\
    }\n```\n\nThe `getAttributesCount()` method returns the number of attributes in\
    \ an element. The `getAttributePrefix(int)` method returns the attribute prefix\
    \ for a specified attribute index. The `getAttributeNamespace(int)` method returns\
    \ the attribute namespace for a specified attribute index. The `getAttributeLocalName(int)`\
    \ method returns the local name of an attribute, and the `getAttributeValue(int)`\
    \ method returns the attribute value. The attribute name and value are output\
    \ as shown in Listing 2-21.\n\n**Listing 2-21.** *Outputting the Attribute Name\
    \ and Value*\n\n```java\nfor (int i = 0; i < xmlStreamReader.getAttributeCount();\
    \ i++) {\n    //Output Attribute Name\n    System.out.println(\"Attribute Local\
    \ Name:\"+\n        xmlStreamReader.getAttributeLocalName(i));\n    //Output Attribute\
    \ Value\n    System.out.println(\"Attribute Value:\"+ xmlStreamReader.getAttributeValue(i));\n\
    }\n```\n\nThe `getText()` method retrieves the text of a `CHARACTERS` event, as\
    \ shown in Listing 2-22.\n\n**Listing 2-22.** *Outputting Text*\n\n```java\nif\
    \ (event == XMLStreamConstants.CHARACTERS) {\n    System.out.println(\"Text:\"\
    \ + xmlStreamReader.getText());\n}\n```\n\nListing 2-23 shows the complete StAX\
    \ cursor API parsing application.\n\n**Listing 2-23.** *StAXParser.java*\n\n```java\n\
    package com.apress.stax;\n\nimport javax.xml.stream.*;\nimport javax.xml.stream.events.*;\n\
    import javax.xml.stream.XMLInputFactory;\nimport java.io.*;\n\npublic class StAXParser\
    \ {\n    public void parseXMLDocument () {\n        try {\n            //Create\
    \ XMLInputFactory object\n            XMLInputFactory inputFactory = XMLInputFactory.newInstance();\n\
    \            //Create XMLStreamReader\n            InputStream input = new FileInputStream(new\
    \ File(\"catalog.xml\"));\n            XMLStreamReader xmlStreamReader = inputFactory\n\
    \                .createXMLStreamReader(input);\n            //Obtain StAX Parsing\
    \ Events\n            while (xmlStreamReader.hasNext()) {\n                int\
    \ event = xmlStreamReader.next();\n                if (event == XMLStreamConstants.START_DOCUMENT)\
    \ {\n                    System.out.println(\"Event Type:START_DOCUMENT\");\n\
    \                }\n                if (event == XMLStreamConstants.START_ELEMENT)\
    \ {\n                    System.out.println(\"Event Type: START_ELEMENT\");\n\
    \                    //Output Element Local Name\n                    System.out.println(\"\
    Element Local Name:\"\n                        + xmlStreamReader.getLocalName());\n\
    \                    //Output Element Attributes\n                    for (int\
    \ i = 0; i < xmlStreamReader.getAttributeCount(); i++) {\n                   \
    \     System.out.println(\"Attribute Local Name:\"\n                         \
    \   + xmlStreamReader.getAttributeLocalName(i));\n                        System.out.println(\"\
    Attribute Value:\"\n                            + xmlStreamReader.getAttributeValue(i));\n\
    \                    }\n                }\n                if (event == XMLStreamConstants.CHARACTERS)\
    \ {\n                    System.out.println(\"Event Type: CHARACTERS\");\n   \
    \                 System.out.println(\"Text:\" + xmlStreamReader.getText());\n\
    \                }\n                if (event == XMLStreamConstants.END_DOCUMENT)\
    \ {\n                    System.out.println(\"Event Type:END_DOCUMENT\");\n  \
    \              }\n                if (event == XMLStreamConstants.END_ELEMENT)\
    \ {\n                    System.out.println(\"Event Type: END_ELEMENT\");\n  \
    \              }\n            }\n        } catch (FactoryConfigurationError e)\
    \ {\n            System.out.println(\"FactoryConfigurationError\" + e.getMessage());\n\
    \        } catch (XMLStreamException e) {\n            System.out.println(\"XMLStreamException\"\
    \ + e.getMessage());\n        } catch (IOException e) {\n            System.out.println(\"\
    IOException\" + e.getMessage());\n        }\n    }\n\n    public static void main(String[]\
    \ argv) {\n        StAXParser staxParser = new StAXParser();\n        staxParser.parseXMLDocument();\n\
    \    }\n}\n```\n\nListing 2-24 shows the output from the StAX parsing application\
    \ in Eclipse.\n\n**Listing 2-24.** *Output from the StAXParser Application*\n\n\
    ```\nEvent Type: START_ELEMENT\nElement Local Name:catalog\nAttribute Local Name:title\n\
    Attribute Value:OnJava.com\nAttribute Local Name:publisher\nAttribute Value:O'Reilly\n\
    Event Type: CHARACTERS\nText:\nEvent Type: START_ELEMENT\nElement Local Name:journal\n\
    Attribute Local Name:date\nAttribute Value:January 2004\nEvent Type: CHARACTERS\n\
    Text:\nEvent Type: START_ELEMENT\nElement Local Name:article\nEvent Type: CHARACTERS\n\
    Text:\nEvent Type: START_ELEMENT\nElement Local Name:title\nEvent Type: CHARACTERS\n\
    Text:Data Binding with XMLBeans\nEvent Type: END_ELEMENT\nEvent Type: CHARACTERS\n\
    Text:\nEvent Type: START_ELEMENT\nElement Local Name:author\nEvent Type: CHARACTERS\n\
    Text:Daniel Steinberg\nEvent Type: END_ELEMENT\nEvent Type: CHARACTERS\nText:\n\
    Event Type: END_ELEMENT\nEvent Type: CHARACTERS\nText:\nEvent Type: END_ELEMENT\n\
    Event Type: CHARACTERS\nText:\nEvent Type: START_ELEMENT\nElement Local Name:journal\n\
    Attribute Local Name:date\nAttribute Value:Sept 2005\nEvent Type: CHARACTERS\n\
    Text:\nEvent Type: START_ELEMENT\nElement Local Name:article\nEvent Type: CHARACTERS\n\
    Text:\nEvent Type: START_ELEMENT\nElement Local Name:title\nEvent Type: CHARACTERS\n\
    Text:What Is Hibernate\nEvent Type: END_ELEMENT\nEvent Type: CHARACTERS\nText:\n\
    Event Type: START_ELEMENT\nElement Local Name:author\nEvent Type: CHARACTERS\n\
    Text:James Elliott\nEvent Type: END_ELEMENT\nEvent Type: CHARACTERS\nText:\nEvent\
    \ Type: END_ELEMENT\nEvent Type: CHARACTERS\nText:\nEvent Type: END_ELEMENT\n\
    Event Type: CHARACTERS\nText:\nEvent Type: END_ELEMENT\nEvent Type:END_DOCUMENT\n\
    ```\n\n## Iterator API\n\nThe `XMLEventReader` object parses an XML document with\
    \ an object event iterator and generates an `XMLEvent` object for each parse event.\
    \ To create an `XMLEventReader` object, you need to first create an `XMLInputFactory`\
    \ object with the static method `newInstance()` and then obtain an `XMLEventReader`\
    \ object from the `XMLInputFactory` object with the `createXMLEventReader` method,\
    \ as shown in Listing 2-25.\n\n**Listing 2-25.** *Creating an XMLEventReader Object*\n\
    \n```java\nXMLInputFactory inputFactory = XMLInputFactory.newInstance();\nInputStream\
    \ input = new FileInputStream(new File(\"catalog.xml\"));\nXMLEventReader xmlEventReader\
    \ = inputFactory.createXMLEventReader(input);\n```\n\nAn `XMLEvent` object represents\
    \ an XML document event in StAX. You obtain the next event with the `nextEvent()`\
    \ method of an `XMLEventReader` object. The `getEventType()` method of an `XMLEventReader`\
    \ object returns the event type, as shown here:\n\n```java\nXMLEvent event = xmlEventReader.nextEvent();\n\
    int eventType = event.getEventType();\n```"
