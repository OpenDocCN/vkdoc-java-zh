    **总结**


    SQL:2003 标准提供了一种新的数据库数据类型——XML。JDBC 4.0 为数据库数据类型 XML 提供了 Java 数据类型 SQLXML。JDBC
    4.0 API 包含在即将发布的 J2SE 6.0 中。要将 XML 文档存储在类型为 XML 的数据库表列中，数据库需要支持 XML 数据库类型。在撰写本书时，DB2
    UDB 9.1 和 SQL Server 2005 数据库支持 XML 数据类型。要使用 SQLXML Java 数据类型从 XML 类型列中检索 XML
    文档，您需要相关数据库的 JDBC 4.0 驱动程序。在撰写本书时，JDBC 4.0 规范尚未最终确定。


    当 JDBC 4.0 驱动程序可用时，您可以使用本章中的示例应用程序。


    在本章中，我们解释了创建 SQLXML 对象、初始化 SQLXML 对象以及使用 JDBC 4.0 API 存储 SQLXML 对象的过程。我们还讨论了从
    ResultSet 中检索 SQLXML 对象并导航 XML 文档的过程。


