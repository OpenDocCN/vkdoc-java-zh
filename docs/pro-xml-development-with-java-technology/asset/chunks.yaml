    \ XML 文档提供源代码视图和大纲视图。\n\n其他用例，例如 XSLT3 模板语言，需要的是命令式访问而不是编程式访问文档节点。命令式访问意味着存在一种表达性语言，允许您定位任何文档节点集的位置；XPath4\
    \ 正是这样一种语言。在本章中，我们将讨论实现 XPath 规范的各种 Java API，特别是 JAXP 1.3 中的 XPath API（包含在 J2SE\
    \ 5.05 中）以及 JDOM6。\n\n**理解 XPath 表达式**\n"
- fmt: 'XPath is a language for addressing node sets within an XML document. It is
    based on an abstract data model exclusively focused on the core information content
    in an XML document and ignores all information related to syntax markup. The XPath
    data model treats an XML document as a tree of various node types, such as an
    element node, an attribute node, and a text node. The XPath language provides
    an XPath expression as the main syntactic construct for addressing a node set
    within an XML document.


    ## Simple Example


    Since XPath expressions address a document node set, before you can proceed, you
    need an XML document to reference while we discuss XPath expressions. So, consider
    the following simple XML document:


    1.  Document order is the same as the depth-first order of the parse tree.

    2.  An example of such an editor is XMLEspresso; you can find it at http://www.nubean.com.

    3.  Chapter 5 covers XSLT.

    4.  You can find the XPath specification at http://www.w3.org/TR/xpath.

    5.  For more information about JDK 5.0, see http://java.sun.com/j2se/1.5.0/download.jsp.

    6.  For more information about JDOM, see http://www.jdom.org/.


    ```

    <catalog >

    <journal title="XML" />

    <journal title="Java Technology" />

    </catalog>

    ```


    Now, consider a simple XPath expression, `/catalog/journal`, that is based on
    this reference XML document. When you look at this XPath expression, you may be
    tempted to draw an analogy between an XPath expression and a file system path,
    and based on that analogy, you may intuitively interpret the expression `/catalog/journal`
    to refer to the first `journal` element within the document.


    In fact, this intuitive interpretation and the underlying analogy would both be
    wrong because this expression selects a node set containing both `journal` elements.


    The reason the file system analogy does not work is simple: if `/catalog/journal`
    were a file system path, you could be assured that there would be only one `journal`
    folder under a `catalog` folder, but that clearly does not hold for XML document
    nodes. So, here is a more appropriate analogy for understanding XPath expressions:
    each component in an XPath expression is like a pattern that must be matched to
    locate the node set addressed by an XPath expression. With this basic insight
    in place, let’s develop your intuition further by examining more XPath examples.


    ## XPath Expression Examples


    XPath expression syntax can be fairly complex, so the best way to begin understanding
    XPath expressions is to quickly walk through some examples. We will base these
    XPath examples on a slightly more complex XML document, shown in Listing 4-1,
    than the introductory document.


    **Listing 4-1.** *Example XML Document: catalog.xml*


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <catalog >

    <journal:journal title="XML" publisher="IBM developerWorks">

    <article journal:level="Intermediate"

    date="February-2003">

    <title>Design XML Schemas Using UML</title>

    <author>Ayesha Malik</author>

    </article>

    </journal:journal>

    <journal title="Java Technology" publisher="IBM developerWorks">

    <article level="Advanced" date="January-2004">

    <title>Design service-oriented architecture

    frameworks with J2EE technology</title>

    <author>Naveen Balani</author>

    </article>

    <article level="Advanced" date="October-2003">

    <title>Advance DAO Programming</title>

    <author>Sean Sullivan </author>

    </article>

    </journal>

    </catalog>

    ```


    As we noted earlier, the XPath data model treats an XML document as a tree of
    nodes. Figure 4-17 shows the XPath data model for the example document. To fit
    the image within a page, not all `article` nodes in Figure 4-1 appear in expanded
    form. In Figure 4-1, the document element is designated as 7. This data model
    visualization is based on an Eclipse plug-in, available at http://www.nubean.com.


    ![Image 29](index-106_1.png)


    `#document`, element nodes are designated with their name with an “e” icon, attribute
    nodes are designated with their name-value pair and an “a” icon, and text nodes
    are designated as `#text`. The `#text` nodes in the data model correspond to the
    text content in element nodes, including whitespace text.


    **Figure 4-1.** *XPath data model for catalog.xml*


    Since we have not yet discussed XPath expression syntax, we will cover the following
    examples from an intuitive standpoint, referring to the data model shown in Figure
    4-1. Later in the “Location Path” section, we will discuss XPath expression syntax
    in more detail.


    Take a quick look at the following XPath expressions that address node sets within
    `catalog.xml`:


    - `/catalog/journal/article[@level=''Advanced'']/title` is an XPath expression
    that evaluates to a node set containing elements named `title`, nested within
    elements named `article`, nested within an element named `journal`, nested within
    an element named `catalog`, whereby the element named `article` has an attribute
    named `level` (attributes are identified with the `@` prefix) with a value equal
    to `Advanced`. Evaluating this expression selects the second `title` element,
    in document order.


    - `/catalog/journal[@title=''Java Technology'']/article[2]` is an XPath expression
    that evaluates to a node set containing elements named `article`, nested within
    an element named `journal`, nested within an element named `catalog`, whereby
    the element named `journal` has an attribute named `title` with a value equal
    to `Java Technology` and an element named `article` in the second context position,
    in document order. The second context position of the `article` element is specified
    through the `[2]` suffix. Evaluating this expression selects the second `article`
    element in document order, in the `journal` titled `Java Technology`.


    - `/child::catalog/child::journal/child::article[attribute::date=''January-2004'']/attribute::level`
    is an XPath expression that evaluates to a node set containing attributes named
    `level` that are attached to the element named `article`, nested within an element
    named `journal`, nested within an element named `catalog`, whereby the element
    named `article` has an attribute named `date` with a value equal to `January-2004`.
    The syntax construct `::` in an XPath expression defines a selection axis, with
    the name of the axis preceding this construct. So, for example, `child::` defines
    the child axis, and `attribute::` defines the attribute axis. If you specify no
    selection axis, `child::` is the implicit selection axis. So, `/` and `/child::`
    are equivalent constructs. Also, the `@` syntax is shorthand for the `attribute::`
    syntax. Evaluating this expression selects the `level` attribute of the second
    `article` element, in document order.


    - `//article[ancestor::journal[@title=''Java Technology'']]` is an XPath expression
    that evaluates to a node set containing elements named `article`, with an ancestor
    element named `journal`, whereby the element named `journal` has an attribute
    named `title` with a value equal to `Java Technology`. The syntax construct `//`
    is shorthand for all descendant nodes; since it is at the beginning of the expression,
    it implies all the descendants of the root node. Evaluating this expression selects
    the second and third `article` elements, in document order.'
