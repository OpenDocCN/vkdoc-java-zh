- fmt: '# To run the JAXB 1.0 examples, you will need to install the following software.


    ## Installing Java Web Service Developer Pack (JWSDP)


    `JAXB 1.0` is included in `JWSDP 1.6`. Therefore, you need to download and install
    `JWSDP 1.6.3`. Install `JWSDP 1.6` in any directory. For this chapter, we will
    assume `JWSDP` is installed under the default installation directory, which on
    Windows is `C:\Sun\jwsdp-1.6`; assuming that is the case, `JAXB` is included in
    the `C:\Sun\jwsdp-1.6\jaxb` directory.


    ## Installing J2SE


    We recommend using `J2SE 5.0` with `JWSDP 1.6` because `JAXB` uses some `SAXParserFactory`
    class methods that are defined in `J2SE 5.0` but are not defined in `J2SE 1.4.2`.
    With `JRE 1.4.2`, unmarshaling generates the following error:


    ```

    java.lang.NoSuchMethodError: javax.xml.parsers.SAXParserFactory.

    getSchema()Ljavax/xml/validation/Schema

    ```


    You can use `J2SE 1.4.2` with `JWSDP 1.6` if you use the Endorsed Standards Override
    Mechanism (http://java.sun.com/j2se/1.4.2/docs/guide/standards/). If you want
    to use `J2SE 5.0`, which we strongly recommend, you need to download and install
    it. The `xjc` compiler does not run if the `JAVA_HOME` environment variable has
    empty spaces in its path name. Therefore, install `J2SE 5.0` in a directory with
    no empty spaces in its path name.


    ## Creating and Configuring the Eclipse Project


    To compile the example schema with `xjc` and to run the marshaling and unmarshaling
    code examples included in this project, you need to create an Eclipse Java project.
    The quickest way to create the Eclipse project is to download the `Chapter6` project
    from the Apress website (http://www.apress.com) and import this project into Eclipse.
    This creates all the Java packages and files needed for this chapter automatically.


    You also need to set the `Chapter6` JRE to the `J2SE 5.0` JRE. You set the JRE
    in the project Java build path by clicking the Add Library button. Figure 6-2
    shows the `Chapter6` build path. If your `JWSDP 1.6` install location is not `C:\Sun\jwsdp-1.6`,
    you may need to explicitly add or edit the external JARs.


    Either way, make sure your Java build path shows all the `JWSDP 1.6` JAR files
    shown in Figure 6-2.


    We will show how to configure the binding compiler `xjc` to generate Java content
    classes in the `gen_source` folder and the `gen_source_customized_bindings` folder;
    therefore, add these two folders to the source path under the Source tab in the
    Java build path area, as shown in Figure 6-3.


    3. You can find `JWSDP 1.6` at http://java.sun.com/webservices/downloads/webservicespack.html.


    4. You can find this information at http://java.sun.com/webservices/docs/1.6/ReleaseNotes.html#new.


