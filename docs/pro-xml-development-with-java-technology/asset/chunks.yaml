    **Creating Elements and Attributes**


    The XSLT specification provides the xsl:element element to create an element and
    the xsl:attribute element to create an attribute in the resulting XML document.
    You specify the name of an element or an attribute in the name attribute, and
    you specify the namespace of an element or attribute in the namespace attribute.
    The style sheet createElement.xslt in Listing 5-34 creates an element journal
    and adds an attribute publisher to the journal element. The attribute value is
    specified with an xsl:text element in an xsl:attribute element.


