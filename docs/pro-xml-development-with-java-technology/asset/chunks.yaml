- fmt: "# Loading and Saving with the DOM Level 3 API\n\nIn the loading section, an\
    \ XML document was parsed from a URI. In this section, we will show how to parse\
    \ the example XML document from an `LSInput` object. Therefore, create an `LSInput`\
    \ object, and set an `InputStream` for the `LSInput`, as shown in Listing 10-16.\n\
    \n**Listing 10-16.** *Creating an LSInput Object*\n\n```\nLSInput input = impl.createLSInput();\n\
    InputStream inputStream = new FileInputStream(new File(\"catalog.xml\"));\ninput.setByteStream(inputStream);\n\
    ```\n\nYou need to create an input filter for input filtering. In the input filter,\
    \ you will print the `Element` nodes as they are parsed without filtering any\
    \ nodes. An input filter is required to implement the `LSParserFilter` interface.\
    \ Therefore, define a filter class that implements the `LSParserFilter` interface\
    \ and implements the `acceptNode()`, `startElement()`, and `getWhatToShow()` methods\
    \ of the `LSParserFilter` interface. The `acceptNode()` method returns a `short`\
    \ that indicates whether a node is to be accepted, rejected, or skipped. Table\
    \ 10-1 lists the values that can be returned by the `acceptNode()` method.\n\n\
    **Table 10-1.** *Return Values for the acceptNode() Method*\n\n| Return Value\
    \ | Description |\n|--------------|-------------|\n| `FILTER_ACCEPT` | Accepts\
    \ the node |\n| `FILTER_INTERRUPT` | Interrupts document filtering |\n| `FILTER_REJECT`\
    \ | Rejects the node |\n| `FILTER_SKIP` | Skips the node |\n\nIf a node is accepted\
    \ using `FILTER_ACCEPT`, the node is included in the `Document` object returned\
    \ by a parser. If a node is skipped using `FILTER_SKIP`, only the specified node\
    \ is skipped; the children of the node are parsed and included in the DOM document.\
    \ If a node is rejected using `FILTER_REJECT`, the node and its children are rejected.\
    \ The `startElement()` method specifies whether an `Element` node is to be accepted,\
    \ rejected, or skipped. Table 10-1 also lists the return values of the `startElement()`\
    \ method. Only an `Element` and the `Element`'s attributes are input to the `startElement()`\
    \ method. You can use the `startElement()` method to modify attributes of an element.\
    \ The differences between the `acceptNode()` method and the `startElement()` method\
    \ are as follows:\n\n- Only `Element` nodes are input to the `startElement()`\
    \ method as compared to the `acceptNode()` method in which all nodes except the\
    \ `Document`, `DocumentType`, `Notation`, `Entity`, `DocumentFragment`, and `Attribute`\
    \ nodes may be input to the method. `Attribute` nodes may be input to the `acceptNode()`\
    \ method of the `LSSerializerFilter` interface.\n- The element node input to `startElement()`\
    \ will include all the `Element`'s attributes but none of the children nodes.\
    \ Nodes input to the `acceptNode()` method of `LSParserFilter` include all the\
    \ children nodes but none of the attribute nodes. Nodes input to the `acceptNode()`\
    \ method of `LSSerializerFilter` include all the children nodes and may include\
    \ the attribute nodes.\n\nThe `getWhatToShow()` method specifies nodes that are\
    \ input to the `LSParserFilter.acceptNode()` method. Table 10-2 shows the return\
    \ values of the `getWhatToShow()` method. Nodes that are not input to the `acceptNode()`\
    \ method of a filter are included in the DOM document model being built without\
    \ filtering. Nodes that are input to the `acceptNode()` method of a filter are\
    \ accepted, skipped, or rejected as specified in the method.\n\n**Table 10-2.**\
    \ *Return Values for the getWhatToShow() Method*\n\n| Return Value | Description\
    \ |\n|--------------|-------------|\n| `NodeFilter.SHOW_ALL` | Shows all nodes\
    \ |\n| `NodeFilter.SHOW_ELEMENT` | Shows `Element` nodes |\n| `NodeFilter.SHOW_TEXT`\
    \ | Shows `Text` nodes |\n| `NodeFilter.SHOW_COMMENT` | Shows `Comment` nodes\
    \ |\n| `NodeFilter.SHOW_PROCESSING_INSTRUCTION` | Shows `ProcessingInstruction`\
    \ nodes |\n| `NodeFilter.SHOW_CDATA_SECTION` | Shows `CDATASection` section nodes\
    \ |\n| `NodeFilter.SHOW_ENTITY_REFERENCE` | Shows `EntityReference` nodes |\n\n\
    In the example input filter class, `InputFilter`, the filtering application shows\
    \ element nodes to the `acceptNode()` method. Therefore, specify the return type\
    \ of the `getWhatToShow()` method as `NodeFilter.SHOW_ELEMENT`. The return type\
    \ of the `acceptNode()` and `startElement()` methods is `LSParser.FILTER_ACCEPT`.\
    \ Listing 10-17 shows the input filter class.\n\n**Listing 10-17.** *InputFilter\
    \ Class*\n\n```\nprivate class InputFilter implements LSParserFilter {\n\n   \
    \ public short acceptNode(Node node) {\n        return NodeFilter.FILTER_ACCEPT;\n\
    \    }\n\n    public int getWhatToShow() {\n        return NodeFilter.SHOW_ELEMENT;\n\
    \    }\n\n    public short startElement(Element element) {\n        System.out.println(\"\
    Element Parsed \" + element.getTagName());\n        return NodeFilter.FILTER_ACCEPT;\n\
    \    }\n}\n```\n\nThe example input filter inputs only `Element` nodes to the\
    \ filter's `acceptNode()` method; other nodes are included in the DOM document\
    \ model without filtering. The `acceptNode()` method of the filter accepts all\
    \ nodes that are input. The `startElement()` method prints element nodes as element\
    \ nodes are parsed and accepts all element nodes that are parsed. To set filtering\
    \ on input, create an instance of the `InputFilter` class, and set the filter\
    \ on the `LSParser`, as shown in Listing 10-18. Subsequently, parse the example\
    \ XML document using the `parse(LSInput)` method of the `LSParser` interface.\n\
    \n**Listing 10-18.** *Filtering Input*\n\n```\nInputFilter inputFilter = new InputFilter();\n\
    parser.setFilter(inputFilter);\nDocument document = parser.parse(input);\n```\n\
    \nNext, we will demonstrate output filtering. For output filtering, create an\
    \ output filter. As an example, we will filter a journal node from `Document`\
    \ using an output filter. An output filter class is required to implement the\
    \ `LSSerializerFilter` interface. Therefore, create an output filter class, `OutputFilter`,\
    \ that implements the `LSSerializerFilter` interface. In addition to returning\
    \ the values listed in Table 10-2, the `getWhatToShow()` method of the `LSSerializerFilter`\
    \ interface may also return `SHOW_ATTRIBUTE`. In the example, the `OutputFilter`\
    \ class specifies the return type of the `getWhatToShow()` method as `NodeFilter.SHOW_ELEMENT`\
    \ and the return type of the `acceptNode()` method as `FILTER_ACCEPT` for journal\
    \ nodes other than the journal node with the `date` attribute `April 2005`. In\
    \ the example output filter, only element nodes are input to the filter's `acceptNode()`\
    \ method, and the `acceptNode()` method accepts all nodes except the journal node\
    \ with the `date` `April 2005`. Listing 10-19 shows the output filter class `OutputFilter`.\n\
    \n**Listing 10-19.** *Output Filter Class*\n\n```\nprivate class OutputFilter\
    \ implements LSSerializerFilter {\n\n    public short acceptNode(Node node) {\n\
    \        Element element = (Element) node;\n        if (element.getTagName().equals(\"\
    journal\")) {\n            if (element.getAttribute(\"date\").equals(\"April 2005\"\
    )) {\n                return NodeFilter.FILTER_REJECT;\n            }\n      \
    \  }\n        return NodeFilter.FILTER_ACCEPT;\n    }\n\n    public int getWhatToShow()\
    \ {\n        return NodeFilter.SHOW_ELEMENT;\n    }\n}\n```\n\nTo set filtering\
    \ on the `LSSerializer` object, create an instance of `OutputFilter`, and set\
    \ the filter on the `LSSerializer`, as shown in Listing 10-20.\n\n**Listing 10-20.**\
    \ *Setting Filtering on LSSerializer*\n\n```\nLSSerializer domWriter = impl.createLSSerializer();\n\
    OutputFilter outputFilter = new OutputFilter();\ndomWriter.setFilter(outputFilter);\n\
    ```\n\nTo output a filtered XML document, create an `LSOutput` object, and set\
    \ an `OutputStream` for the `LSOutput` object. Then output the filtered XML document\
    \ using the `write(Node, LSOutput)` method, as shown in Listing 10-21.\n\n**Listing\
    \ 10-21.** *Outputting Filtered XML Document*\n\n```\nLSOutput lsOutput = impl.createLSOutput();\n\
    lsOutput.setByteStream(System.out);\ndomWriter.write(document, lsOutput);\n```"
