    <xsd:complexType name="catalogType">


    <xsd:sequence>


    <xsd:element ref="journal" minOccurs="0" maxOccurs="unbounded" />


    </xsd:sequence>


    <xsd:attribute name="title" type="xsd:string" use="required" />


    <xsd:attribute name="publisher" type="xsd:string"


    use="optional" default="Unknown" />


    </xsd:complexType>


    An attribute declaration may specify a use attribute, with a value of optional
    or required. The default use value for an attribute is optional. In addition,
    an attribute can specify a default value using the default attribute, as shown
    in the previous example. When an XML document instance does not specify an optional
    attribute with a default value, an attribute with the default value is assumed
    during document validation with respect to its schema. Clearly, an attribute with
    a default value cannot be a required attribute.


    Attribute Groups


    An attributeGroup construct specifies a group of attributes. For example, if you
    want to define the attributes for a catalogType as an attribute group, you can
    define a catalogAttrGroup attribute group, as shown here:


    <xsd:attributeGroup name="catalogAttrGroup" >


    <xsd:attribute name="title" type="xsd:string" use="required" />


    <xsd:attribute default="Unknown" name="publisher"


    type="xsd:string" use="optional" />


    </xsd:attributeGroup>


    You can specify an attributeGroup in a schema, complexType, and attributeGroup.
    You can specify the catalogAttrGroup shown previously within the schema element
    and can reference it using the ref attribute in the catalogType complex type,
    as shown here:


    <xsd:complexType name="catalogType" >


    <xsd:sequence>


    <xsd:element maxOccurs="unbounded" minOccurs="0" ref="journal" />


    </xsd:sequence>


    <xsd:attributeGroup ref="catalogAttrGroup" />


    </xsd:complexType>


    Simple Content


    A simpleContent construct specifies a constraint on character data and attributes.
    You specify a simpleContent construct in a complexType construct. Two types of
    simple content constructs exist: an extension and a restriction.


    You specify simpleContent extension with an extension construct. If you want to
    define an authorType as an element that allows a string type in its content and
    also allows an email attribute, you can do so using a simpleContent extension
    that adds an email attribute to a string built-in type, as shown here:


    <xsd:complexType name="authorType" >


    <xsd:simpleContent>


    <xsd:extension base="xsd:string" >


    <xsd:attribute name="email" type="xsd:string" use="optional" />


    </xsd:extension>


    </xsd:simpleContent>


    </xsd:complexType>


