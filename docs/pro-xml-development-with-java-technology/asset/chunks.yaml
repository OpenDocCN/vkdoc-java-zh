    Running the ProjectClient Client


    To run the ProjectClient client in Eclipse, you need to configure a Java application
    configuration for ProjectClient by selecting Run ➤ Run.


    ProjectClient needs to know about the location of the WSDL document for the web
    service.


    You obtain the location of the WSDL document from the web service deployed in
    Sun One Application Server 9.0 by selecting the Web Services ➤ ProjectPortTypeImpl
    node and clicking the services.wsdl link, as shown in Figure 14-14.


    In the services.wsdl file, the soap:address element’s location attribute, suffixed
    with ?WSDL, specifies the WSDL URL.


    In the Program Arguments field of the ProjectClient application configuration,
    specify the user email, password, WSDL URL, and the testproject.zip file, as shown
    here: useremail password <WSDL URL> testproject.zip


