    第 14 章 ■ 构建基于 XML 的 Web 服务


    • 输入和输出消息通过非包装样式或包装样式映射到 Java 方法参数。关于这些样式下映射的详尽规则，我们推荐参考 JAX-WS 2.0 规范。不过，以下关于这些样式的细节对于大多数用途来说应该足够了：


    • 在非包装样式中，如果 `wsdl:part` 是输入消息的一部分，则 `wsdl:part` 元素会映射到一个 Java 方法参数。对于输出消息，`wsdl:part`
    元素会映射到一个持有者类参数或返回类型。使用非包装样式永远不会出错——问题迎刃而解。


    • 包装样式仅当 `wsdl:input` 或 `wsdl:output` 引用的 `wsdl:message` 只有一个 `wsdl:part` 时才适用。依我们看，不必费心去用它。不过，如果你非要用，请阅读下一点。


    • 在包装样式中，`wsdl:part` 元素被视为一个包装元素（这也是该样式名称的由来）。如果 `wsdl:part` 是输入消息的一部分，则包装元素的子元素会映射到
    Java 方法参数。如果 `wsdl:part` 是输出消息的一部分，并且包装元素有多个子元素，则这些子元素会通过一个持有者类映射到 Java 方法参数；如果只有一个子元素，则直接映射到
    Java 方法返回类型。如果 `wsdl:part` 同时是输入和输出消息的一部分，则使用持有者类方法参数。


    • 错误消息会映射到一个自定义的 Java 异常类。


    在下一节中，我们将讨论如何自定义 WSDL 1.1 到 Java 的映射。


    自定义 WSDL 1.1 到 Java 的映射


    你可以通过一个外部定制文件来自定义 `services.wsdl` 中 WSDL 1.1 到 Java 的映射。关于所有可能定制的详尽调查，我们推荐参考 JAX-WS
    2.0 规范¹⁷。不过，我们将在以下各节中讨论一些更常用的定制。


    一个快速观察：各种绑定的作用域是通过寻址 WSDL 1.1 文档节点的 XPath 表达式来确定的。例如，`node="//wsdl:portType[@name=''ProjectPortType'']"`
    这个 XPath 表达式寻址的是 `services.wsdl` 中的 `ProjectPortType wsdl:portType`。


    **包名**


    你可以像这样自定义 Java 绑定的包名：


    <jaxws:package name="com.apress.javaxml.ws" >


    </jaxws:package>


    **MIME 内容**


    还记得吗，我们在 `services.wsdl` 中有一些 `wsdl:parts` 绑定到了 SOAP 1.1 的 `mime:content`，如下面来自清单
    14-10 的摘录所示：


    <mime:part>


    <mime:content part="zip" type="application/zip" >


    </mime:content>


    </mime:part>


    ¹⁷. JAX-WS 2.0 规范可从 http://www.jcp.org/en/jsr/detail?id=224 下载。


