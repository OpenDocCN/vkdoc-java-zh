    现在，您已经从直观的角度看了一些示例，我们将尝试拓宽您对 XPath 语法的理解。与大多数语言中的表达式类似，您可以通过加法或乘法组合基本表达式来构成复杂的
    XPath 表达式。因此，理解 XPath 表达式的关键在于掌握基本表达式以及评估 XPath 表达式可能产生的各种数据类型。以此为近期目标，您将专注于两个主题：


    •   XPath 表达式评估数据类型


