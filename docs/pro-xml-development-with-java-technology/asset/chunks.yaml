    **过滤 XML 文档**


    你可以在解析 XML 文档模型时对其进行过滤，也可以在存储 DOM 文档模型时对其进行过滤。在本节中，我们将展示如何过滤 XML 文档模型。我们将展示如何使用输入过滤器过滤输入的
    XML 文档模型，并使用输出过滤器保存解析后的 DOM 文档模型。在过滤文档模型时，你可以从文档中移除某些节点。`LSParserFilter` 接口允许过滤输入，而
    `LSSerializerFilter` 接口允许过滤输出。在我们的示例中，过滤输入的步骤如下：


    **1.** 创建一个输入过滤器，即一个实现 `LSParserFilter` 接口的类。


    **2.** 在输入过滤器类中，展示要过滤的元素节点。未展示给过滤器的节点会被添加到 Document 对象中，而无需过滤器选择要添加到 Document
    对象的节点。


    **3.** 接受所有展示给过滤器的节点。


    **4.** 创建一个 `LSParser` 对象。


    **5.** 为要过滤的 XML 文档创建一个 `LSInput` 对象。


    **6.** 在 `LSParser` 对象上设置输入过滤器。


    **7.** 使用 `LSInput` 对象解析 XML 文档。


    在我们的示例中，过滤输出的步骤如下：

    **1.** 创建一个输出过滤器，即一个实现 `LSSerializerFilter` 接口的类。


    **2.** 在输出过滤器类中，展示要过滤的元素节点。未展示给过滤器的节点会被输出，而无需过滤器选择要输出的节点。


    **3.** 作为示例，接受所有展示给过滤器的节点，但 `date` 属性设置为 `April 2005` 的 `journal` 节点除外。


    **4.** 创建一个 `LSSerializer` 对象。


    **5.** 为过滤器输出创建一个 `LSOutput` 对象。


    **6.** 在 `LSSerializer` 对象上设置输出过滤器。


    **7.** 过滤 Document 对象。


    与加载和保存时一样，导入 DOM 3 的 `org.w3c.dom.ls` 包。对于输入过滤，创建一个 `LSParser` 实现和一个 `LSParser`
    解析器，如清单 10-15 所示。创建过滤器的过程与加载部分相同：创建一个 `DOMImplementationRegistry` 对象，从注册表对象中获取一个
    `DOMImplementation` 对象，将 `DOMImplementation` 转换为 `DOMImplementationLS`，然后从 `DOMImplementationLS`
    对象创建一个 `LSParser`。


    **清单 10-15.** *创建 LSParser*


