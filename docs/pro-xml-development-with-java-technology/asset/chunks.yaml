    \ 对象获取一个 `DOMImplementation` 实例，如清单 10-3 所示。\n\n**清单 10-3.** *创建 DOMImplementation*\n\
    \n```java\nDOMImplementationRegistry registry = DOMImplementationRegistry.newInstance();\n\
    DOMImplementation domImpl = registry.getDOMImplementation(\"LS 3.0\");\n```\n\n\
    在功能列表中指定 `LS 3.0` 可确保 `DOMImplementation` 对象实现 DOM 3.0 规范的加载和保存功能。可能包含的其他一些功能包括\
