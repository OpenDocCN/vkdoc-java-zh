    **总结**


    DOM Level 3 规范提供了一组接口，用于以下方面：


    *   加载和保存 XML 文档

    *   在 XML 文档加载和保存期间过滤内容

    *   保存文档中的选定节点，而非整个文档

    *   将完整文档或选定的文档节点序列化为字符串，而非文件


    DOM Level 3 加载和保存接口相比 JAXP 的`DocumentBuilder`和`Transformer`类具有一些优势。JAXP 的`DocumentBuilder`和`Transformer`类中未包含的
    DOM Level 3 加载和保存特性如下：


    *   文档加载和保存期间的事件处理

    *   文档加载和保存期间的内容过滤

    *   加载和保存选定节点，而非完整文档

    *   将`Document`对象保存为字符串，而非文件


