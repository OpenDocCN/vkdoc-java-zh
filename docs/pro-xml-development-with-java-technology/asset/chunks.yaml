    classes. This means the SAXParserFactory implementation class is not a fixed class.
    Instead, the SAXParserFactory implementation class is obtained by JAXP, using
    the following lookup procedure: **1.** Use the javax.xml.parsers.SAXParserFactory
    system property to determine the factory class to load.


    **2.** Use the javax.xml.parsers.SAXParserFactory property specified in the lib/jaxp.properties
    file under the JRE directory to determine the factory class to load. JAXP reads
    this file only once, and the property values defined in this file are cached by
    JAXP.


    **3.** Files in the META-INF/services directory within a JAR file are deemed service
    provider configuration files. Use the Services API, and obtain the factory class
    name from the META-INF/


    services/javax.xml.parsers.SAXParserFactory file contained in any JAR file in
    the runtime classpath.


    **4.** Use the default SAXParserFactory class, included in the J2SE platform.


    If validation is desired, set the validating attribute on factory to true: factory.setValidating(true);


    If the validation attribute of the SAXParserFactory object is set to true, the
    parser obtained from such a factory object, by default, validates an XML document
    with respect to a DTD. To validate the document with respect to XML Schema, you
    need to do more, which is covered in detail in Chapter 3.


    **SAX Features**


    SAXParserFactory features are logical switches that you can turn on and off to
    change parser behavior.


    You can set the features of a factory through the setFeature(String, boolean)
    method. The first argument passed to setFeature is the name of a feature, and
    the second argument is a true or false value.


    Table 2-11 lists some of the commonly used SAXParserFactory features. Some of
    the SAXParserFactory features are implementation specific, so not all features
    may be supported by different factory implementations.


