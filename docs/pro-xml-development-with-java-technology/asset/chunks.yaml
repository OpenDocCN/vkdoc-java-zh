- fmt: "# Building XML-Based Web Services\n\n- The input and output messages are mapped\
    \ to Java method parameters using either the nonwrapper style or the wrapper style.\
    \ For exhaustive rules governing mapping under these styles, we recommend the\
    \ JAX-WS 2.0 specification. However, the following details pertaining to these\
    \ styles should be sufficient for most purposes:\n\n- In the nonwrapper style,\
    \ if the `wsdl:part` is part of an input message, the `wsdl:part` element is mapped\
    \ to a Java method parameter. For output messages, the `wsdl:part` element is\
    \ mapped to either a holder class parameter or a return type. You can never go\
    \ wrong if you use the nonwrapper style—problem solved.\n\n- The wrapper style\
    \ is applicable only if the `wsdl:message` referred to by a `wsdl:input` or a\
    \ `wsdl:output` has only one `wsdl:part`. In our opinion, don't bother with it.\
    \ However, if you must, read the next point.\n\n- In the wrapper style, the `wsdl:part`\
    \ element is deemed to be a wrapper element (which is how the style gets its name).\
    \ The children of the wrapper element are mapped to Java method parameters if\
    \ the `wsdl:part` is part of an input message. If the `wsdl:part` is part of an\
    \ output message and the wrapper element has more than one child, the children\
    \ are mapped to Java method parameters using a holder class; for one child, it\
    \ is just mapped to a Java method return type. If the `wsdl:part` is part of both\
    \ input and output messages, the holder class method parameter is the answer.\n\
    \n- The fault message is mapped to a custom Java exception class.\n\nIn the next\
    \ section, we will discuss how to customize the WSDL 1.1 to Java mapping.\n\n\
    ## Customizing the WSDL 1.1 to Java Mapping\n\nYou can customize the WSDL 1.1\
    \ to Java mapping for `services.wsdl` through an external customization file.\
    \ For an exhaustive survey of all the possible customizations, we recommend the\
    \ JAX-WS 2.0 specification. However, we will discuss some of the more commonly\
    \ used customizations in the following sections.\n\nOne quick observation: the\
    \ scope of the various bindings is determined through XPath expressions addressing\
    \ the WSDL 1.1 document node. For example, the `node=\"//wsdl:portType[@name='ProjectPortType']\"\
    ` XPath expression addresses `ProjectPortType wsdl:portType` in `services.wsdl`.\n\
    \n### Package Name\n\nYou can customize the Java bindings package name as shown\
    \ here:\n\n```xml\n<jaxws:package name=\"com.apress.javaxml.ws\" >\n</jaxws:package>\n\
    ```\n\n### MIME Content\n\nRemember, we had some `wsdl:parts` in `services.wsdl`\
    \ that were bound to SOAP 1.1 `mime:content`, as shown here in an excerpt from\
    \ Listing 14-10:\n\n```xml\n<mime:part>\n  <mime:content part=\"zip\" type=\"\
    application/zip\" >\n  </mime:content>\n</mime:part>\n```\n\nIf you want to bind\
    \ the `mime:content` to the most specific Java type allowed by metadata in the\
    \ `type` attribute, then you can specify that in the customization, as shown here:\n\
    \n```xml\n<jaxws:enableMIMEContent>true</jaxws:enableMIMEContent>\n```\n\n###\
    \ Method Name\n\nIf you want to customize the Java method name corresponding to\
    \ a `wsdl:operation`, you can do so as shown here for `download wsdl:operation`:\n\
    \n```xml\n<jaxws:bindings\n  node=\"//wsdl:portType[@name='ProjectPortType']/wsdl:operation[@name='download']\"\
    \ >\n  <jaxws:method name=\"downloadProject\" ></jaxws:method>\n</jaxws:bindings>\n\
    ```\n\nIn the previous example, the `download wsdl:operation` name is mapped to\
    \ the `downloadProject` Java method name.\n\n### Handler Chains\n\nIt is possible\
    \ to specify a handler chain that intercedes between a web service client and\
    \ an SEI for messages traveling in either direction. The following example specifies\
    \ a handler chain for a logging handler:\n\n```xml\n<javaee:handler-chains>\n\
    \  <javaee:handler-chain>\n    <javaee:handler>\n      <javaee:handlerclass>\n\
    ```"
