    **Adding an XML Document to the Xindice Database**


    In this section, you will add an XML document to the collection created in the
    previous section.


    The example XML document will be added to the catalog collection; therefore, obtain
    the catalog collection from the database using the getCollection() method, as
    shown in Listing 8-23.


    **Listing 8-23.** *Obtaining a Collection from DriverManager* Collection collection
    = DatabaseManager.getCollection


    ("xmldb:xindice://localhost:8080/db/catalog");


    An XML document resource in the Xindice database is represented with the XMLResource
    interface. You can set the content of an XMLResource using a DOM node or a SAX
    ContentHandler. In the example application, you will set the content of XMLResource
    using a DOM node. Therefore, obtain a Document object for the XML document to
    be added, as shown in Listing 8-24.


    **Listing 8-24.** *Creating a Document Object*


    DocumentBuilderFactory factory =


    DocumentBuilderFactory.newInstance();


    File datafile = new File("xindice_resources/catalog.xml"); DocumentBuilder builder
    = factory.newDocumentBuilder();


    Document document = builder.parse(datafile);


    In Listing 8-25, you create a File object of the XML document to be added using
    the xindice_resources/catalog.xml file. You need to create an ID for the XML document
    resource to be added to collection. The ID associates the collection with an identifier.
    An XML document in the Xindice database is represented with the XMLResource interface;
    therefore, create an org.xmldb.api.


    modules.XMLResource object for the XML document to add to the catalog collection.
    You can set the content of the XMLResource from a Document object. To store the
    XML document in the database, you need to add the XML resource to the catalog
    collection using the storeResource(XMLResource) method.


    Listing 8-25 lists the procedure to create an XMLResource and add the resource
    to a collection.


    **Listing 8-25.** *Adding an XML Resource to a Collection* String resourceID =
    collection.createId();


    XMLResource resource = (XMLResource)


    (collection.createResource(resourceID,"XMLResource")); resource.setContentAsDOM(document);


    collection.storeResource(resource);


    The example XML document, catalog.xml, gets added to the database collection.


