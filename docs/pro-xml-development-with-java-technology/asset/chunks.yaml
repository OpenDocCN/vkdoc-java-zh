    在您看到这三种解析 API 的代码示例之前，我们将展示如何创建和配置一个合适的 Eclipse 项目。


    **设置 Eclipse 项目**


    在接下来的章节中，我们将展示如何设置一个 Eclipse 项目，并填充构建和执行本章讨论的三种解析方法相关代码示例所需的内容。尽管在后续章节中我们将分别讨论每种解析方法，但在此我们将一次性展示如何为所有三种解析方法准备
