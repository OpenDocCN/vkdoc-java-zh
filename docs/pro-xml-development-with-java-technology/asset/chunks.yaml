    **总结**


    本章是一篇总结性章节，借鉴了本书中涵盖的许多概念。


    构建基于 XML 的 Web 服务，首先要通过 WSDL 文档正式描述 Web 服务。指定 WSDL 文档时，首先要通过模式定义描述用户定义的数据类型。用户定义的数据类型是定义
    Web 服务用例所需的各种消息类型的基本构建块。然后，消息类型用于定义端口类型，端口类型定义了 Web 服务接口。


    Web 服务消息类型和端口类型是抽象类型。要使这些类型具体化，需要将这些类型绑定到 SOAP 消息框架和 HTTP 传输协议。


    最后，端口类型的具体绑定被绑定到一个 HTTP URL，该 URL 定义了一个 Web 服务端口。在本章中，我们通过一个完整的 Web 服务示例涵盖了所有这些概念。


    WSDL 文档包含足够的信息，代码生成工具可以轻松生成与实现 Web 服务提供者代理相关的 Java 代码。此外，代码生成工具可以使用 WSDL 文档生成服务代理，Web
    服务请求者代理可以使用该代理与 Web 服务进行交互。在本章中，我们使用 Sun One Application Server 9.0 工具为示例 Web
    服务生成相应的 Java 代码，然后在 Sun One Application Server 9.0 中构建和部署该 Web 服务。最后，我们展示了如何构建一个可以与
    Web 服务交互的 Web 服务客户端。


