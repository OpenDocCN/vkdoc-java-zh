    面向消息模型是对物理现实最接近的抽象，因为 Web 服务交互本质上是封装在 SOAP 1.1 消息中的 XML 文档的交换，而这些消息又在 HTTP 消息内部传输。然而，从抽象
    Web 服务接口基本要素的角度来看，它可能不是合适的模型。为此，存在面向服务模型，我们接下来将讨论它。


    **面向服务模型**


    在面向服务模型中，重点是由提供方代理提供并由请求方代理使用的服务。从该模型的角度来看，您关注 Web 服务的以下方面：


    • 提供方代理实现 Web 服务 SEI 定义的所有操作。


    • 请求方代理使用服务代理来调用 SEI 操作，根据操作的不同，该调用可能不返回任何内容、返回一个响应或返回一个或多个错误。


    图 14-5 总结了面向服务模型。


    **图 14-5.** *面向服务模型*


    这个模型相当容易理解，但从实践角度来看，它没有说明请求方代理如何发现或寻址服务提供方代理。为此，您需要关注面向资源模型，接下来将介绍该模型。


