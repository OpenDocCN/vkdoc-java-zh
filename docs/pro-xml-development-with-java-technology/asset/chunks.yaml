  trans: '

    应用程序不应假设在 `ErrorHandler` 接口的 `fatalError` 方法被调用后，`ContentHandler` 接口的 `endDocument`
    方法一定会被调用。


    **拉取式方法**


    在拉取式方法中，事件是在应用程序的控制下，通过解析器从 XML 文档中拉取的。StAX 与 SAX API 的相似之处在于两者都提供基于事件的 API。然而，StAX
    在以下几个方面与 SAX API 有所不同：


    • 与 SAX API 不同，在 StAX API 中，控制解析事件传递的是应用程序，而非解析器。StAX 提供了两种基于事件的 API：基于游标的 API
    和基于迭代器的 API，两者都受应用程序控制。


    • 基于游标的 API 允许按文档顺序遍历文档，并提供对文档内所有结构和内容信息的最低层级访问。


    • 基于迭代器的 API 与基于游标的 API 类似，但它不提供低层级访问，而是以事件对象的形式提供对结构和内容信息的访问。


    • 与 SAX API 不同，StAX API 既可用于读取 XML 文档，也可用于写入 XML 文档。


    **游标 API**


    关于 StAX 游标 API 的要点如下：


    • `XMLStreamReader` 接口是解析 XML 文档的主要接口。你可以使用此接口，通过 `next()` 和 `hasNext()` 方法来扫描
    XML 文档的结构和内容。


    • `next()` 方法为下一个解析事件返回一个整数标记。


    • 根据下一个事件类型，你可以在 `XMLStreamReader` 接口上调用特定的允许方法。表 2-4 列出了各种事件类型及对应的允许方法。


