    • A wsdl:operation element is an abstract definition of a service operation. Each
    wsdl:operation contains a combination of wsdl:input, wsdl:output, and wsdl:fault
    elements; each of these elements is a message component that is part of the message
    exchange pattern used by wsdl:operation.


    • Each wsdl:input, wsdl:output, and wsdl:fault element is based on a wsdl:message
    element.


    If a wsdl:operation uses a request-response message exchange pattern, it must
    specify a wsdl:input element and a wsdl:output element, and possibly one or more
    wsdl:fault elements. If a wsdl:operation uses a one-way message exchange pattern,
    it must specify a single wsdl:input element.


