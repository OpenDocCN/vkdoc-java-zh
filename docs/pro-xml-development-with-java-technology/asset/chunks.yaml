  raw: '• The NodeList interface represents an ordered list of nodes. A NamedNodeMap
    represents an unordered set of nodes, such as attributes of an element. Both these
    classes are useful in traversing the DOM tree representing an XML document.


    • The XML document–parsing API is in the javax.xml.parsers package. This is an
    essential package and must be imported by an application parsing an XML document
    using the DOM


    API.


    • An application needs to import the org.xml.sax package so it can access the
    SAXException and SAXParseException classes, which are used in error handling.
    This reference to the SAX


    API within the DOM API may seem out of place. However, this reliance of the DOM
    API on the SAX API is specified by JAXP 1.3 and is basically an attempt to reuse
    the SAX API where appropriate.


    DOM API Parsing Steps


    To parse an XML document using the DOM API, you need to follow these steps: **1.**
    Create a DOM parser factory.


    **2.** Use the parser factory to instantiate a DOM parser.


    **3.** Use the DOM parser to parse an XML document and create a DOM tree.


    **4.** Access and manipulate the XML structure and content by accessing the DOM
    tree.


