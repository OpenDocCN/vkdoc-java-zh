    />\n  <xsd:attribute name=\"publisher\" type=\"xsd:string\"/>\n</xsd:complexType>\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C06.fm Page\
