    **Port Type**


    Just like a Java interface, the wsdl:portType element describes an abstract web
    service interface. Each wsdl:portType element contains one or more wsdl:operation
    elements, whereby each wsdl:operation element defines the message exchange pattern
    for that wsdl:operation.


    A wsdl:operation element in the most general request-response message exchange
    pattern case contains a wsdl:input element, a wsdl:output element, and zero or
    more wsdl:fault elements, where each of these elements is associated with a wsdl:message
    definition through the message attribute. wsdl:input, as the name implies, defines
    the request message, wsdl:output defines the response message, and wsdl:fault
    defines the details of the SOAP fault message. An example of a request-response
    wsdl:operation is download, as shown here:


    <wsdl:operation name="download" >


    <wsdl:input message="defs:DownloadProject" name="project" >


    </wsdl:input>


    <wsdl:output message="defs:DownloadZip" name="downloadZip" >


    </wsdl:output>


    <wsdl:fault message="defs:ProjectFault" name="fault" >


    </wsdl:fault>


    </wsdl:operation>


    In download wsdl:operation shown previously, defs:DownloadProject, defs:DownloadZip,
    and defs:ProjectFault are abstract messages that are used in the request-response
    message exchange pattern.


    For a one-way exchange pattern, only a single wsdl:input element is required,
    as in the case of remove wsdl:operation shown here:


    <wsdl:operation name="remove" >


    <wsdl:input message="defs:RemoveProject" name="project" >


    </wsdl:input>


    </wsdl:operation>


    You cannot specify a wsdl:fault message without a wsdl:output message, because
    a SOAP fault message is generated only if a response was expected. So, for example,
    you cannot add a wsdl:fault to a wsdl:operation named remove.


    The wsdl:portType for the example web service is named ProjectPortType, and it
    defines the following wsdl:operation for the use case scenarios:


    • Uploading documents to a project is defined by upload.


    • Downloading documents from a project is defined by download.


    • Getting information about all the projects owned by a user is defined by getProjects.


    • Removing documents from a project is defined by remove.


    • An authenticate operation, which is not required for these use cases, can be
    used to authenticate a user and keep user information in an HTTP session.


