    • 并非源树中的所有节点都会出现在结果树中。实际上，只有源树中 `title` 属性节点的值作为文本节点出现在结果树中。


    • 结果树包含许多源树中不存在的元素。


    从这些要点中，你可能能够快速推断出，样式表是一个格式良好的 XML 文档，它混合了 XSLT 指令和字面 XML 内容。稍加思考，你可能还能推断出，样式表中的
    XSLT 指令使用 XPath 表达式来定位源树节点，然后对这些源节点应用一些转换以生成结果树。最后，你可能很容易推断出，源树中的字面 XML 内容会被原封不动地复制到结果树中；到目前为止，一切顺利。然而，我们猜想，此时你想知道转换是如何具体指定的，以及处理器是如何处理它们的。那么，接下来让我们深入探讨这些细节。


    **XSLT 处理算法**


    你通过模板和指令的组合来指定 XSLT 转换。一个模板结构由目标文档中的指令和字面内容组成。你可以在模板结构内部或外部定义指令。例如，以下来自清单 5-3
    样式表的模板包含一条单独的 `<xsl:value-of select="@title" />` 指令：


    <xsl:template match="journal" >


    <xsl:value-of select="@title" />


    </xsl:template>


    每个模板都与一个特定的模式相关联，该模式由 `match` 属性的值给出。前面显示的简单模板的模式是 `journal`。这意味着该模板适用于所有名称为 `journal`
    的节点。


    每条指令都作用于从源树中选择的一个节点集。当要求 XSLT 处理器使用 XSLT 样式表转换源文档时，处理器基本上遵循以下算法：


    **1.** 它将样式表和源文档解析成各自的节点树。


    **2.** 它执行一条隐式指令 `<xsl:apply-templates select="/" />`。该指令有一个 `select` 属性，其 XPath
    表达式值为 `/`。此 XPath 表达式求值得到一个包含源树文档元素的节点集。因此，该指令选择源树文档元素作为当前节点集，并扫描样式表节点树，寻找一个 `match`
    属性与源树文档元素匹配的 `xsl:template` 指令。如果找到这样的模板，则该模板被实例化为结果树根节点的模板。如果没有找到这样的模板，另一条隐式规则会继续递归处理，选择根节点的每个子节点，并为每个选中的子节点寻找匹配的模板（依此类推，递归进行），直到找到匹配的模板。例如，在清单
    5-3 的示例样式表中，`<xsl:template match="/" >` 模板将与隐式指令匹配。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


