    In the following sections, we will cover JAXB 1.0.


    **Architecture**


    Figure 6-1 shows the basic architecture of JAXB 1.0\. JAXB binds a *source XML
    Schema* to a set of schema-derived Java content classes. A *binding compiler*
    (xjc) within JAXB generates Java content classes corresponding to top-level type
    components specified within the source schema. A runtime-binding framework API
    available within JAXB *marshals* and *unmarshals* an XML document *from* and *to*
    its corresponding Java objects.


