    **面向资源模型**


    从该模型的角度来看，Web 服务是一种可以被 Web 服务客户端消费的资源。该模型的基本方面如下：


    • Web 服务是一种基于网络的资源，可通过 HTTP URI 进行标识。


    • Web 服务资源通过 WSDL 1.1 文档进行描述。


    • Web 服务资源可以注册到 UDDI 注册中心。


    • Web 服务资源可以通过查询 UDDI 注册中心来发现，如图 14-1 所示。


    现在，您已准备好研究 Web 服务消息传递框架、WSDL、客户端-服务交互以及实现完整 Web 服务客户端和服务端协议栈的 JAX-WS 2.0 API 的相关细节。


    然而，最好在示例用例场景的背景下进行所有这些工作。因此，在下一节中，我们将解释示例用例场景，这些场景将为我们讨论 SOAP 1.1、带附件的 SOAP 消息、WSDL
    1.1 和 JAX-WS 2.0 提供一个实践框架。


    **示例用例场景**


    假设您想构建一个文档存储网站。自然，用户期望能够将他们的文档上传到该网站，并在以后使用基于浏览器的用户界面检索它们。


    然而，您对潜在用户和现有用户进行了调查，发现除了基于浏览器的用户界面外，他们还希望有一个 Web 服务，允许计算机程序与该网站交互。


    您对这个问题进行了一些思考，并为该 Web 服务提出了以下四个用例场景：


    • 将文档上传到项目


    • 从项目下载文档


    • 获取用户拥有的所有项目的信息


    • 从项目中删除文档


    现在，您将详细检查每个用例。


    **将文档上传到项目**


    第一个用例是将文档上传到您账户下的项目。在此用例场景中，一个 ZIP 文件和一个清单文件被发送到 Web 服务，用于将 ZIP 文件中的文档上传到您账户中的一个项目。


    此场景的动机是一个可以配置为执行以下操作的程序：**1.** 自动从您的桌面选择一组文档。


