    • 任何中间节点必须处理一个标头块，如果该中间节点能够承担为该标头块指定的`soapenv:actor`角色，并且该标头块的`soapenv:mustUnderstand`属性设置为
    1。如果未能处理此类标头块，则必须返回一条包含`soapenv:MustUnderstand`故障码子元素的`soapenv:Fault`消息。


    • 任何中间节点在将消息转发到消息路径上的下一个节点之前，必须移除其已处理的标头块。当然，如果中间节点需要将标头块定位到消息路径上的另一个节点，它可以在处理并移除该标头块后重新添加回去。


    • 通常预期的约定是，只有最终接收者才应处理`soapenv:Body`元素，尽管 SOAP 1.1 或 WS-I BP 1.1 中并没有明确规定这一点。如果你选择违反此约定，请仔细考虑其影响。


    • 只有在预期有响应时，才能返回 SOAP 1.1 故障。如果任何节点返回故障，则该故障必须代替响应传播回初始发送者。


    在下一节中，你将了解 SOAP 1.1 和 SOAP 1.2 之间的重要区别。


    **SOAP 1.2 与 SOAP 1.1 的区别**


    请记住，WS-I BP 1.1 并未明确支持 SOAP 1.2，因此我们目前不推荐使用它。然而，在不久的将来，它将被广泛采用，因此熟悉 SOAP 1.1 和
    SOAP 1.2 之间的一般区别非常重要。


    SOAP 1.1 和 SOAP 1.2 之间最显著的区别在于，SOAP 1.2 处理模型比 SOAP 1.1 处理模型明确得多。事实上，SOAP 1.2 采用了
    WS-I BP 1.1 中规定的许多处理模型要求，以提高互操作性。因此，从提高互操作性的角度来看，SOAP 1.2 几乎等同于 SOAP 1.1 加上 WS-I
    BP 1.1。


    SOAP 1.1 和 SOAP 1.2 之间的其他重要区别如下：


    • 最重要的区别当然是 SOAP 1.2 关联了一个新的命名空间：`http://www.w3.org/2003/05/soap-envelope`。这意味着接收到
    SOAP 1.2 消息的 SOAP 1.1 节点将生成一个`VersionMismatch` SOAP 故障。SOAP 1.2 节点可以选择将 SOAP 1.1
    消息作为 SOAP 1.1 消息处理，或者生成一个`VersionMismatch` SOAP 故障。


    • SOAP 1.2 引入了 SOAP*角色*的概念。在某个时间点，一个 SOAP 节点承担一个特定的 SOAP 1.2 角色，该角色由一个 URI 标识。SOAP
    1.2 中定义了三个特殊角色：`next`、`none`和`ultimateReceiver`；每个角色都关联一个唯一的 URI。SOAP 1.2 的`role`属性取代了
    SOAP 1.1 中用于 Header 子元素的`actor`属性。这一变化的重要性在于，一直以来，与 SOAP 1.1 的`actor`属性相关联的语义通常被理解为角色；SOAP
    1.2 通过将属性名称改为`role`，最终澄清了这个问题。


    • SOAP 1.2 引入了一个`relay`属性，该属性可以与 Header 子元素关联。这个`relay`属性规定了在中间节点上转发 Header 子元素的规则，如果该
    Header 子元素未被中间节点理解，并且该子元素的`mustUnderstand`属性未设置为`true`。


