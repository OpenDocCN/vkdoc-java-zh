    ## Implementing the ProjectPortType SEI


    The `ProjectPortType` SEI is implemented in the `ProjectPortTypeImpl.java` file
    in the `com.apress.javaxml.ws.impl` package, under the `wsimpl` folder, as shown
    in Listing 14-15. The `javax.ejb.EJB` annotation tag in Listing 14-16 refers to
    an EJB interface. In the code shown in Listing 14-15, you will notice that in
    each of the SEI methods, you merely invoke a corresponding EJB method. This is
    because the application logic is all implemented within EJB classes.


