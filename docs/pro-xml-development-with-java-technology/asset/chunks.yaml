- fmt: "# Pro XML Development with Java™ Technology\n\n## Empowering Productivity\
    \ for the Java™ Developer\n\n**Companion eBook Available**\n\n**Supports Java\
    \ versions up to 6!**\n\nDear Reader,\n\nTo say that XML and Java™ technologies\
    \ are pervasive is to state the obvious, as you might verify from your own experience.\
    \ Working with these technologies over the years, we found excellent books focused\
    \ on specific XML technologies, such as XSLT, XPath and XML Schema. We also found\
    \ very well written sources that covered Java APIs related to various XML technologies\
    \ and discussed specific topics in depth, such as Web Services. Unfortunately,\
    \ developing enterprise applications requires applied knowledge spanning many\
    \ of these topics, so we often found ourselves flipping through more books than\
    \ we would have liked to whilst working in a busy, professional setting. We also\
    \ struggled with the fact that many of the XML-centric books were too abstract\
    \ and did not provide practical examples to illustrate theoretical concepts, and\
    \ many of the Java-centric books on XML technologies did not explain the underlying\
    \ XML concepts.\n\nWe wrote this book to help us and all the other professional\
    \ Java developers out there who face the same problems. Our main objective was\
    \ to consolidate the theory and practice of XML and Java technologies in a single,\
    \ up-to-date source, that is firmly grounded in underlying XML concepts, which\
    \ can be consulted time and again to rapidly speed up enterprise application development!\n\
    \nWe have strived to cover all the essential XML topics, including XML Schema\
    \ based schemas, addressing of XML documents through XPath, transformation of\
    \ XML documents using XSLT stylesheets, storage and retrieval of XML content in\
    \ native XML and relational databases, web applications based on AJAX, and SOAP/HTTP\
    \ and WSDL based Web Services. These XML topics are covered in the applied context\
    \ of up-to-date Java technologies, including JAXP, JAXB, XMLBeans, and JAX-WS.\
    \ We are confident that you will find this book useful in building contemporary,\
    \ service-oriented enterprise applications.\n\nAjay Vohra and Deepak Vohra\n\n\
    *All the essential techniques you need to know to develop powerful XML applications\
    \ using Java™ technology!*\n\n---\n\n**Pro XML Development with Java™ Technology**\n\
    \n**Copyright © 2006 by Ajay Vohra and Deepak Vohra**\n\nAll rights reserved.\
    \ No part of this work may be reproduced or transmitted in any form or by any\
    \ means, electronic or mechanical, including photocopying, recording, or by any\
    \ information storage or retrieval system, without the prior written permission\
    \ of the copyright owner and the publisher.\n\nISBN-13 (pbk): 978-1-59059-706-4\
    \  \nISBN-10 (pbk): 1-59059-706-0"
