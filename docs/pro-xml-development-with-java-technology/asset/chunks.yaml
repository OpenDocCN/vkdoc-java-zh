- fmt: '# Building Web Applications with AJAX


    Select the **Targets** tab in the `Chapter13` `build.xml` dialog box. Select the
    boxes for the `init`, `compile`, and `webapp` targets, and click the **Apply**
    button, as shown in Figure 13-3.


    **Figure 13-3.** *Selecting the Ant build.xml targets*


    Next, you need to run the Ant `build.xml` file to compile the Ajax web application
    and deploy it to the JBoss application server. Right-click `build.xml` in the
    **Package Explorer**, and select **Run As** and the first Ant `build.xml` file.
    The Ant `build.xml` script runs, compiles, and deploys the Ajax web application,
    as shown in Listing 13-5. We will discuss the details of the Ajax web application
    in the next section.


    **Listing 13-5.** *Output of Ant Build File*


    ```

    Buildfile: C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\build.xml


    init:

    [mkdir] Created dir: C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\build

    [mkdir] Created dir: C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\dist

    [mkdir] Created dir: C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\build\WEB-INF

    [mkdir] Created dir: C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\build\WEB-INF\classes


    compile:

    [copy] Copying 1 file to C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\build\WEB-INF

    [copy] Copying 1 file to C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\build\WEB-INF\classes

    [copy] Copying 1 file to C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\build


    webapp:

    [war] Building war: C:\Documents and Settings\Deepak Vohra\workspace\Chapter13\src\dist\ajax.war

    [copy] Copying 1 file to C:\JBoss\jboss-4.0.2\server\default\deploy


    init:

    compile:

    init:


    BUILD SUCCESSFUL

    ```


    ## Developing an Ajax Application


    Now that you have put together the Eclipse project, you can start constructing
    the actual functionality of the Ajax application. In this section, you will create
    the functionality to validate data input in an HTML form.


    The input form requires a unique catalog ID to create a catalog entry. Therefore,
    you will validate catalog ID input in the form against data in the database to
    check whether the catalog ID is already specified in the database. Data typed
    in the HTML form is sent to a servlet URL using the GET method. On the server
    side, an HTTP servlet''s `doGet()` method gets invoked. In the `doGet()` method,
    the input value is compared with data in the database. The HTTP servlet returns
    an XML response that contains information about the validity of the input data.


    In the client application, the XML response from the server is processed, and
    if the instructions indicate that the data input is valid, the message "Catalog
    ID is Valid" displays. An `XMLHttpRequest` request is sent to the server with
    each modification in the input field. Without Ajax, you would have to submit the
    complete input form to the server and then reload the browser web page after a
    response is received from the server.


    The procedure to send an `XMLHttpRequest` request to the server involves the following
    steps:


    1. Invoke a JavaScript function from an event handler in response to an HTML event.

    2. Create an `XMLHttpRequest` object in the JavaScript function.

    3. Open an `XMLHttpRequest` request, which specifies the URL and the HTTP method.

    4. Register a callback event handler that gets invoked when the request state
    changes.

    5. Send an `XMLHttpRequest` request asynchronously.

    6. Retrieve the XML response, and modify the HTML page.


    Next, you will examine the browser-side processing involved in the example application.


    ### Browser-Side Processing


    To initiate an `XMLHttpRequest` request, register a JavaScript function as an
    event handler for the `onkeyup` event generated from the HTML form input field,
    `catalogId`, which is required to be validated. In the example application, a
    JavaScript function, `validateCatalogId()`, is invoked on the `onkeyup` event,
    as shown in Listing 13-6.


    **Listing 13-6.** *Input Form*


    ```html

    <form name="validationForm" action="validateForm" method="post">

    <table>

    <tr>

    <td>Catalog ID:</td>

    <td><input type="text"

    size="20"

    id="catalogId"

    name="catalogId"

    autocomplete="off"

    onkeyup="validateCatalogId()"></td>

    <td><div id="validationMessage"></div></td>

    </tr>

    ....

    </table>

    </form>

    ```


    In the JavaScript function `validateCatalogId()`, you need to create a new `XMLHttpRequest`
    object. If a browser supports the `XMLHttpRequest` object as an `ActiveXObject`
    object, the procedure to create an `XMLHttpRequest` object is different when the
    `XMLHttpRequest` object is a window object property. IE 7 and Netscape support
    `XMLHttpRequest` as a window property, and IE 6 supports the `XMLHTTPRequest`
    object as an `ActiveXObject` object. Therefore, you check to see whether the `XMLHttpRequest`
    object is a window object property and act accordingly, as shown in Listing 13-7.


    **Listing 13-7.** *Creating an XMLHttpRequest Object*


    ```html

    <script type="text/javascript">

    function validateCatalogId(){

    var xmlHttpRequest=init();


    function init(){

    if (window.XMLHttpRequest) {

    return new XMLHttpRequest();

    } else if (window.ActiveXObject) {

    return new ActiveXObject("Microsoft.XMLHTTP");

    }

    }

    }

    </script>

    ```


    Next, you need to construct a URL to which the `XMLHttpRequest` will be sent.
    In the example application, you will invoke a servlet, `FormServlet`. Within the
    web server, `FormServlet` is mapped to the servlet URL pattern `/validateForm`,
    as specified in the `web.xml` deployment descriptor shown in Listing 13-8.


    **Listing 13-8.** *web.xml*


    ```xml

    <?xml version="1.0" ?>

    <!DOCTYPE web-app PUBLIC ''-//Sun Microsystems, Inc.//DTD Web Application 2.3//EN''

    ''http://java.sun.com/dtd/web-app_2_3.dtd''>

    <web-app>

    <servlet>

    <servlet-name>FormServlet</servlet-name>

    <servlet-class>com.apress.ajax.FormServlet</servlet-class>

    </servlet>

    <servlet-mapping>

    <servlet-name>FormServlet</servlet-name>

    <url-pattern>/validateForm</url-pattern>

    </servlet-mapping>

    </web-app>

    ```


    Therefore, you specify the URL as `validateForm?catalogId=encodeURIComponent(catalogId.value)`,
    whereby the parameter `catalogId` specifies the value of the catalog ID input
    in the HTML form, and you use the `encodeURIComponent(string)` method to encode
    the catalog ID value. The HTTP method specified is GET, because form data is encoded
    into the URL as shown in Listing 13-9.


    **Listing 13-9.** *Opening an HTTP Request*


    ```javascript

    var catalogId=document.getElementById("catalogId");

    xmlHttpRequest.open("GET",

    "validateForm?catalogId="+

    encodeURIComponent(catalogId.value), true);

    ```


    You need to register a callback event handler with the `XMLHttpRequest` object
    using the `onreadystatechange` property. In the example application, the callback
    method is the JavaScript function `processRequest()`, as shown here:


    ```javascript

    xmlHttpRequest.onreadystatechange=processRequest;

    ```


    Next, you need to send an HTTP request using the `send()` method, as shown here:


    ```javascript

    xmlHttpRequest.send(null);

    ```'
