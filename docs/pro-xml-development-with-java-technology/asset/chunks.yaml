    **Creating a FOP Driver**


    To convert the XSL-FO document to a PDF document, you need to create a FOP driver
    object, as shown in Listing 12-8\. You also need to create a console logger with
    the level setting LEVEL_INFO and set the logger on the FOP driver and MessageHandler.
    You can also set the logger level to LEVEL_DEBUG, LEVEL_DISABLED, LEVEL_ERROR,
    LEVEL_FATAL, or LEVEL_WARN. ConsoleLogger outputs to the standard output stream.
    You can also use a BufferedLogger, which outputs to a StringBuffer. The MessageHandler
    class generates the message output. By default, MessageHandler outputs to the
    screen. You can also configure the MessageHandler class to output to a file. The
    setScreenLogger(Logger) method sets the screen logger of the MessageHandler class.


    **Listing 12-8.** *Creating a FOP Driver*


    Driver driver=new Driver();


    Logger logger=new ConsoleLogger(ConsoleLogger.LEVEL_INFO); driver.setLogger(logger);


    org.apache.fop.messaging.MessageHandler.setScreenLogger(logger);


