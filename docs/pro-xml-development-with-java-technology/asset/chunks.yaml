    \ {\n        return this.title;\n    }\n\n    public void setTitle(String title)\
    \ {\n        this.title = title;\n    }\n\n    public String getAuthor() {\n \
    \       return this.author;\n    }\n\n    public void setAuthor(String author)\
    \ {\n        this.author = author;\n    }\n}\n```\n\nYou will use the `schemagen`\
    \ folder to generate an XML Schema document from the annotated class `Catalog.java`.\n\
    \nTo generate an XML Schema from the annotated class `Catalog.java`, you need\
    \ to create an external tools configuration for the `schemagen` tool. To create\
    \ an external tools configuration, select **Run** ➤ **External Tools** ➤ **External\
    \ Tools**. Right-click the **Program** node, and select **New**. In the external\
    \ tools configuration, specify a configuration name. In the **Location** field,\
    \ specify the JAXB 2.0 `schemagen.bat` file, and for **Working Directory**, specify\
