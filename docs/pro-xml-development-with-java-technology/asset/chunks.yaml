    进行 Ajax 编程的内容，请参阅 Nathaniel T. Schutta 和 Ryan Asleson 所著的 *Pro Ajax with Java
    Frameworks*（Apress，2006 年）。


    1\. 关于 Ajax 的开创性文章可在 http://adaptivepath.com/publications/essays/archives/000385.php
    获取。


