    ■ ■ ■


    Addressing with XPath


    **I**n Chapter 2, we discussed three approaches to parsing an XML document: the
    document object approach, the push approach, and the pull approach. These approaches
    are embodied in three APIs—


    DOM, SAX and StAX, respectively. To recap, you can use all three APIs to check
    that a document is well-formed and valid, but each provides different mechanisms
    for accessing document nodes. The SAX and StAX APIs allow access to document nodes
    only in document order1 but offer the advantage of efficient memory use. The DOM
    API provides random access to document nodes but at the expense of higher processing
    overhead in terms of memory use.


    The DOM approach creates a tree representation of an XML document that is ideally
    suited for use cases that require programmatic access and manipulation of document
    nodes. A classic example of a use case requiring programmatic access is an XML
    editor2 that provides a source view and an outline view for an XML document.


    Other use cases, such as the XSLT3 template language, require imperative access
    instead of programmatic access to document nodes. Imperative access implies the
    existence of an expressive language that allows you to address the location of
    any document node set; XPath4 is precisely such a language. In this chapter, we
    will discuss the various Java APIs that implement the XPath specification, in
    particular the XPath API in JAXP 1.3, which is included in J2SE 5.0,5 and JDOM.6


