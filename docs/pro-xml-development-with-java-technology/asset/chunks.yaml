  raw: 'Each wsdl:portType binding must be attached to a wsdl:port within a wsdl:service.
    For example, the defs:ProjectSoapBinding port type binding shown in Listing 14-10
    is mapped to the ProjectPortTypeImplPort port within the ProjectPortTypeImplService
    service, as shown here:


    <wsdl:service name="ProjectPortTypeImplService" >


    <wsdl:port binding="defs:ProjectSoapBinding" name="ProjectPortTypeImplPort" >


    <soap:address location="REPLACE_WITH_ACTUAL_URL" ></soap:address>


    </wsdl:port>


    </wsdl:service>


    The mapping of a concrete port type binding to a port location creates a network
    service endpoint that can be accessed by other applications using an HTTP URL.
    In general, although you can, you should not specify a location HTTP URL and leave
    it as it is shown in the previous example.


    Typically, this URL should be automatically assigned during the deployment of
    the web service, which is discussed in detail in the “Using JAX-WS 2.0” section.


    The complete WSDL 1.1 document for the example web service is included in the
    project. To recap, building a WSDL document involves defining a schema definition,
    defining message types, defining a port type (web service interface), defining
    a port type binding that binds a port type to SOAP/HTTP, and, finally, defining
    a port that binds a port type binding to a network address.


    Now that you have a WSDL 1.1 document, you are ready to build the example web
    service using JAX-WS 2.0, which is what you will do in the next section.


    **Using JAX-WS 2.0**


    JAX-WS 2.0 is based on JSR-224.11 A reference implementation of the JAX-WS 2.0
    specification is included in the Java EE 5 SDK.12 In this section, we will use
    Java EE 5 SDK to show how to build and deploy the example web service. The steps
    for building the web service using the Java EE 5 SDK are as follows:


    **1.** Use the wsimport tool included in the Java EE 5 SDK to automatically generate
    the Java code that defines the Java types corresponding to the schema types, message
    types, and port types defined in the services.wsdl document shown in Listing 14-10.


    **2.** Implement the web service provider agent, writing whatever Java code is
    needed to implement the application logic. The application logic implemented by
    this web service corresponds to the use cases described earlier in the “Example
    Use Case Scenarios” section.


    **3.** Compile generated and manually coded Java class files and package them
    into a Java EE


    enterprise application archive file.


    **4.** Deploy the enterprise application archive file in Sun One Application Server
    9.0, which is included in the Java EE 5 SDK. This makes the web service available
    for use at a specific HTTP URL.


    **5.** Write web service clients (requestor agents) to interact with the web service
    and run the clients, and then observe the interaction.


    In the following sections, you will follow the steps outlined previously.


    11\. JSR-224 is available at http://www.jcp.org/en/jsr/detail?id=224.


    12\. The Java EE 5 SDK is available at http://java.sun.com/javaee/downloads/index.jsp.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


