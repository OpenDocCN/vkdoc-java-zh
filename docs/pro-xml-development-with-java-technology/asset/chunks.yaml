- fmt: "# Chapter 8: Storing XML in Native XML Databases: XINDICE\n\n**Figure 8-9.**\
    \ *XINDICE configuration for retrieving an XML document*\n\nThe XML document `catalog.xml`\
    \ gets retrieved from the `catalog` collection, as shown in the `xindice` command\
    \ output in Listing 8-6.\n\n**Listing 8-6.** *Output in Eclipse from Retrieving\
    \ an XML Document*\n\n```\ntrying to register database\n\n<?xml version=\"1.0\"\
    ?>\n<catalog title=\"OnJava.com\" publisher=\"OReilly\">\n  <journal date=\"Sept\
    \ 2005\">\n    <article>\n      <title>What Is a Portlet</title>\n      <author>Sunil\
    \ Patil</author>\n    </article>\n  </journal>\n  <journal date=\"Sept 2005\"\
    >\n    <article>\n      <title>What Is Hibernate</title>\n      <author>James\
    \ Elliott</author>\n    </article>\n  </journal>\n  <journal date=\"Oct 2003\"\
    >\n    <article>\n      <title>BCEL Maven and CSS with Swing</title>\n      <author>Daniel\
    \ Steinberg</author>\n    </article>\n  </journal>\n</catalog>\n```\n\n## Querying\
    \ Xindice Database Using XPath\n\nXindice provides an XPath query engine to query\
    \ the XML document in the database using XPath. In this section, you will query\
    \ the example XML document in the Xindice database using XPath. You query the\
    \ XML document using the `xindice xpath` action. For example, Listing 8-7 shows\
    \ the command to retrieve title of article in the first `journal` element.\n\n\
    **Listing 8-7.** *Xindice Command to Query an XML Document*\n\n```\nxindice xpath\n\
    \  –c xmldb:xindice://localhost:8080/db/catalog\n  –q /catalog/journal[1]/article/title\n\
    ```\n\nThe `xindice xpath` action specifies that an XPath query be executed, the\
    \ `–c` switch specifies the collection context to be the `catalog` collection,\
    \ and the `–q` switch specifies the XPath query to retrieve title of article in\
    \ the first `journal` element.\n\nYou will run this `xindice` command in Eclipse.\
    \ Therefore, modify the arguments in the XINDICE external tools configuration\
    \ to specify the arguments listed in Listing 8-7, as shown in Figure 8-10.\n\n\
    To run the XINDICE configuration with the specified arguments, click the Run button,\
    \ as shown in Figure 8-10.\n\nListing 8-8 shows the output from the XPath query.\n\
    \n**Listing 8-8.** *Output in Eclipse from Querying an XML Document*\n\n```\n\
    trying to register database\n<title src:col=\"/db/catalog\" src:key=\"catalog.xml\"\
    \ xmlns:src=\"http://xml.apache.org/xindice/Query\">What Is a Portlet</title>\n\
    ```\n\nAs another example, the command to retrieve the `publisher` attribute of\
    \ the `catalog` element is as follows:\n\n```\nxindice xpath –c xmldb:xindice://localhost:8080/db/catalog\
    \ –q /catalog/@publisher\n```\n\n**Figure 8-10.** *XINDICE configuration to query\
    \ an XML document*\n\nTo run the XINDICE configuration with the specified arguments,\
    \ click the Run button, as shown in Figure 8-11.\n\nListing 8-9 shows the output\
    \ from the XPath query. In this case, the XPath query output is generated as an\
    \ `xq:result` element. The attribute value `publisher=\"OReilly\"` is specified\
    \ in the `xq:result` element.\n\n**Listing 8-9.** *Output in Eclipse from Querying\
    \ an XML Document*\n\n```\ntrying to register database\n<xq:result publisher=\"\
    OReilly\" xq:col=\"/db/catalog\" xq:key=\"catalog.xml\" />\n```\n\n**Figure 8-11.**\
    \ *XINDICE configuration to query an XML document*\n\n## Modifying Documents Using\
    \ XUpdate Commands\n\nXindice implements XML:DB XUpdate commands to update an\
    \ XML document; Table 8-6 lists these commands.\n\n**Table 8-6.** *XUpdate Commands*\n\
    \n| XUpdate Command | Description |\n|-----------------|-------------|\n| `xupdate:insert-after`\
    \ | Adds a node after the selected node |\n| `xupdate:update` | Updates the selected\
    \ node |\n| `xupdate:remove` | Removes the selected node |\n\n### Adding an Element\n\
    \nIn this section, you’ll add a `journal` element to the `catalog.xml` document\
    \ in the `catalog` collection.\n\nYou need to specify the elements and attributes\
    \ to be updated in an `xupdate` configuration file. Therefore, you will use the\
    \ `xupdate.xml` (Listing 8-10) configuration file to add a `journal` element.\n\
    \n**Listing 8-10.** *xupdate.xml*\n\n```xml\n<xupdate:modifications version=\"\
    1.0\">\n  <xupdate:insert-after select=\"/catalog/journal[3]\">\n    <xupdate:element\
    \ name=\"journal\">\n      <xupdate:attribute name=\"date\">Aug 2005</xupdate:attribute>\n\
    \      <article>\n        <title>iBatis DAO</title>\n        <author>Sunil Patil</author>\n\
    \      </article>\n    </xupdate:element>\n  </xupdate:insert-after>\n</xupdate:modifications>\n\
    ```\n\nListing 8-11 shows the Xindice command to update the XML document `catalog.xml`\
    \ in the `catalog` collection.\n\n**Listing 8-11.** *Xindice Command to Update\
    \ an XML Document*\n\n```\nxindice xupdate\n  –c xmldb:xindice://localhost:8080/db/catalog\n\
    \  –n catalog.xml –f \"${resource_loc}\"\n```\n\nThe `xindice xupdate` action\
    \ specifies that an XML document be updated, the `–c` switch specifies the collection\
    \ context to be the `catalog` collection, the `–n` switch identifies the XML document\
    \ to be updated, and the `–f` switch specifies the variable `${resource_loc}`\
    \ corresponding to the `xupdate.xml` configuration file.\n\nThe Xindice command\
    \ to update the XML file `catalog.xml` is run in Eclipse. Therefore, modify the\
    \ arguments in the XINDICE external tools configuration, and specify the arguments\
    \ listed in Listing 8-11. To run the XINDICE configuration with the specified\
    \ arguments, select the `xupdate.xml` document in the `xindice_resources` folder\
    \ on the Package Explorer tab in the Chapter8 project, and click the Run button,\
    \ as shown in Figure 8-12.\n\nThe XML document `catalog.xml` in the `catalog`\
    \ collection gets updated, as shown by the output message in Listing 8-12.\n\n\
    **Listing 8-12.** *Output in Eclipse from Updating an XML Document*\n\n```\ntrying\
    \ to register database\n1 documents updated\n```\n\n**Figure 8-12.** *XINDICE\
    \ configuration to update an XML document*\n\n### Deleting and Modifying an Element\n\
    \nAs another example, you will remove a `journal` element and modify the `title`\
    \ attribute in another `journal` element. Let’s remove the first `journal` element\
    \ and modify `title` in the third `journal` element. Since the first `journal`\
    \ element is removed before the third `journal` element is updated, the `journal`\
    \ element to be updated becomes the second `journal` element. You use `xupdate:remove`\
    \ to remove an element and `xupdate:update` to update an element. Listing 8-13\
    \ shows the XUpdate configuration file `xupdate.xml` for removing and modifying\
    \ elements. To run the XINDICE configuration using `xupdate.xml`, replace the\
    \ contents of the `xupdate.xml` file in the `xindice_resources` folder with Listing\
    \ 8-13.\n\n**Listing 8-13.** *Xupdate.xml*\n\n```xml\n<xupdate:modifications version=\"\
    1.0\">\n  <xupdate:remove select=\"/catalog/journal[1]\"/>\n  <xupdate:update\
    \ select=\"/catalog/journal[2]/article/title\">Maven with Swing</xupdate:update>\n\
    </xupdate:modifications>\n```"
