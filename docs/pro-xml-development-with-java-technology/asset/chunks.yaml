- fmt: "消息在到达最终接收者之前，会经过中间节点，如图14-4所示。这些中间节点既充当接收者也充当发送者，根据需要切换自身状态。实际上，这些中间节点与最终接收者协同工作，以实现安全或事务管理等能力。\n\
    \n这引出了一个显而易见的问题：如果与这些基础设施服务相关的信息被携带在`soapenv:Header`头部块中，那么中间节点接收者如何知道哪些头部块是发给它的，而不是发给消息路径上的其他节点？这就是接下来要描述的头部属性发挥作用的地方。\n\
    \n**头部属性**\n\nSOAP 1.1定义了某些只能与头部块关联的属性，用于指示消息接收者应如何处理相关的头部块。这些属性如下：\n\n- `soapenv:actor`属性：位于头部块上，指示接收者在处理该头部块时必须扮演的逻辑功能或角色。如果某个中间接收节点理解指定的角色，则该头部块就是供其消费的。\n\
    - `soapenv:mustUnderstand`属性：位于头部块上，指示在接收者符合`soapenv:actor`属性指定的角色的前提下，接收者是否必须处理特定的头部子元素。\n\
    \n**`soapenv:actor`属性**\n\n`soapenv:actor`属性的值是一个URI，指示接收者在处理关联头部块时必须承担的逻辑角色。一个特殊的URI\
    \ `http://schemas.xmlsoap.org/soap/actor/next/` 表示消息路径上下一个节点的逻辑角色。省略此属性意味着该子元素应由最终接收者处理。\n\
    \n考虑以下`soapenv:Header`元素示例：\n\n```xml\n<soapenv:Header>\n   <ns1:userInfo\n  \
    \    soapenv:actor=\"http://www.apress.com/xmljava/webservices/auth\">\n     \
    \ <email>foo@acme.com</email>\n      <pwd>bar</pwd>\n   </ns1:userInfo>\n</soapenv:Header>\n\
    ```\n\n此示例中的`soapenv:Header`元素包含一个头部块`ns1:userInfo`，其`soapenv:actor`属性设置为URI `http://www.apress.com/xmljava/webservices/auth`。这意味着如果接收者符合该URI所关联的隐含角色，则它应处理`ns1:userInfo`头部块。\n\
    \n处理头部块的中间节点必须将该头部块从`soapenv:Header`元素中移除。如果中间节点处理了一个头部块，但希望该头部块也能被消息路径上的另一个节点处理，它可以修改并将该头部块重新添加到`soapenv:Header`元素中。只需就地修改头部块，即可实现移除后再添加。\n\
    \n**`soapenv:mustUnderstand`属性**\n\n此属性的值只能是`0`或`1`。省略此属性意味着值为`0`。如果此属性在头部块上指定且值为`1`，则表示如果接收者能够承担该头部块`soapenv:actor`属性所隐含的角色，则接收者必须处理该头部块。\n\
    \n考虑之前看到的`soapenv:Header`元素的修订示例：\n\n```xml\n<soapenv:Header>\n   <ns1:userInfo\n\
    \      soapenv:mustUnderstand=\"1\"\n      soapenv:actor=\"http://www.apress.com/xmljava/webservices/auth\"\
    >\n      <email>foo@acme.com</email>\n      <pwd>bar</pwd>\n   </ns1:userInfo>\n\
    </soapenv:Header>\n```\n\n如果此消息的接收者能够承担`http://www.apress.com/xmljava/webservices/`所隐含的角色，则它必须处理该头部块。"
