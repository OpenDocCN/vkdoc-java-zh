    was created and set on the XML document to store in the previous section. With
    the same resource ID, obtain the XML resource from the database. You can output
    the XML document in the XML


    resource using the getContent() method. Listing 8-26 shows the procedure to obtain
    an XMLResource and XML document in the XML resource.


