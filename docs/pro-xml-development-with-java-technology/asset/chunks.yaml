- fmt: "# In the Absence of Standards for Storing XML in Relational Databases\n\n\
    In the absence of standards related to storing XML content in relational databases,\
    \ relational database vendors started adding vendor-specific data types, utilities,\
    \ and APIs to provide XML-related support within their databases. Table 9-1 discusses\
    \ some of the vendor-specific tools.\n\n**Table 9-1.** *Database Tools for Storing\
    \ XML*\n\n| **Database Tool** | **Database** | **Description** |\n| --- | ---\
    \ | --- |\n| `Oracle XML SQL Utility` | Oracle | Stores an XML document that does\
    \ not consist of subelements or attributes in a predefined database table. You\
    \ can apply an XSLT to store an XML document with subelements and attributes.\
    \ |\n| `IBM DB2 XML Extender` | DB2 UDB | Stores an XML document either as a BLOB-like\
    \ object or as a set of collection called an XML *collection*. |\n| `SQL extension\
    \ and rowset function` | SQL Server 2000 | Stores an XML document with a rowset\
    \ function and retrieves an XML document with the SQL construct `FOR XML`. |\n\
    | `ResultSet DTD` | Sybase Adaptive Server | Stores and retrieves an XML document\
    \ using a `ResultSetXml` class. |\n\nClearly, a vendor-independent standard for\
    \ storing and accessing XML content in relational databases was called for, so\
    \ the SQL:2003 international standard added the new Part 14: SQL/XML (XML-Related\
    \ Specifications), which is devoted to this issue.\n\n## Overview\n\nThe SQL:2003\
    \ standard provides a new XML data type for storing XML content. The XML data\
    \ type is just like any other data type; using the XML data type, you can store\
    \ an XML document within a column in a table row. SQL:2003 is a relatively new\
    \ standard. Therefore, not all relational databases currently support this standard.\
    \ You may need to research vendor-specific information to find out whether your\
    \ database supports the SQL:2003 standard.\n\nIn Java, a JDBC driver is the well-established\
    \ means for interacting with a relational database. The JDBC 4.0 API specification\
    \ Public Review Draft (JSR-000221) proposes support for the SQL:2003 standard.\
    \ It is expected that when the JDBC 4.0 specification is finalized, more and more\
    \ databases will add support for the XML data type. In the JDBC 4.0 API, which\
    \ is implemented in J2SE 6.0, the XML data type is mapped to the `java.sql.SQLXML`\
    \ Java data type. The key distinguishing feature of the `SQLXML` Java data type\
    \ is that you can use it to navigate an XML document. The JDBC 3.0 API, which\
    \ is implemented in J2SE 5.0, does not define an `SQLXML` data type; in JDBC 3.0,\
    \ you could retrieve an XML type column only as a `String` or as a `CLOB`. Unlike\
    \ working with the `java.sql.SQLXML` type, you cannot use a `String` or a `CLOB`\
    \ to navigate an XML document.\n\nYou need a JDBC 4.0 driver to retrieve an XML\
    \ document from an XML data type column and map it to an object that implements\
    \ the `java.sql.SQLXML` interface. Because the JDBC 4.0 specification is still\
    \ under public review, no well-known relational database currently provides a\
    \ JDBC 4.0 driver. Therefore, you can test the example application in this chapter\
    \ only when a JDBC 4.0 driver becomes available. Meanwhile, we will use JDBC 3.0\
    \ drivers to build and execute the examples.\n\nIn this chapter, we will explain\
    \ how to store an XML document in a relational database, retrieve an XML document\
    \ from a database, and navigate an XML document using the `java.sql.SQLXML` interface;\
    \ navigating the document using `java.sql.SQLXML` will of course be feasible only\
    \ with a JDBC 4.0 driver. Listing 9-1 shows the example XML document we will use\
    \ in the examples.\n\n**Listing 9-1.** *catalog.xml*\n\n```xml\n<catalog title=\"\
    OnJava.com\" publisher=\"OReilly\">\n  <journal date=\"September 2005\">\n   \
    \ <article>\n      <title>What Is a Portlet</title>\n      <author>Sunil Patil</author>\n\
    \    </article>\n    <article>\n      <title>What Is Hibernate</title>\n     \
    \ <author>James Elliott</author>\n    </article>\n  </journal>\n</catalog>\n```"
