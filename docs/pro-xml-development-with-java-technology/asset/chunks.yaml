    **Unmarshaling an XML Document**


    Unmarshaling means creating a Java object tree from an XML document. In the example
    use case, the website receives an XML document containing catalog information,
    and it needs to unmarshal this document before it can process the catalog information
    contained within the document. In this section, we’ll show first how to unmarshal
    the example XML document using the JAXB 2.0 API, and subsequently we’ll show how
    to access various element and attribute values in the resulting Java object tree.


    To unmarshal, follow these steps:


    **1.** The example XML document, catalog.xml (Listing 6-7), is the starting point
    for unmarshaling.


    Therefore, import catalog.xml to the Chapter6-JAXB2.0 project in Eclipse by selecting
    File ➤ Import.


    **2.** Create a JAXBContext object, and use this object to create an UnMarshaller
    object.


    **3.** The Unmarshaller class converts an XML document to a JAXBElement object
    of type CatalogType.


    **4.** Create a CatalogType object from the JAXBElement object.


    As discussed earlier, create a JAXBContext object, which implements the JAXB binding
    framework unmarshal() operation.


    You need an Unmarshaller object to unmarshal an XML document to a Java object.
    Therefore, create an Unmarshaller object with the createUnmarshaller() method
    of the JAXBContext class, as shown here:


    Unmarshaller unMarshaller=jaxbContext.createUnmarshaller();


