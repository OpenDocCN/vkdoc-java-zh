    # Chapter 3: Introducing Schema Validation


    In Chapter 2, we covered how to parse XML documents, which is the most fundamental
    aspect of processing an XML document. During the discussion on parsing, we noted
    that one of the objectives of parsing an XML document is to validate the structure
    of an XML document with respect to a schema. The process of validating an XML
    document with respect to a schema is *schema validation*, and that is the subject
    of this chapter.


    If a document conforms to a schema, it is called an *instance* of the schema.
    A schema defines a class of XML documents, where each document in the class is
    an instance of the schema. The relationship between a schema class and an instance
    document is analogous to the relationship between a Java class and an instance
    object. Several schema languages are available to define a schema. The following
    two schema languages are part of W3C Recommendations:


    - DTD is the XML 1.0 built-in schema language that uses XML markup declarations
    syntax to define a schema. Validating an XML document with respect to a DTD is
    an integral part of parsing and was covered in Chapter 2.

    - W3C XML Schema is an XML-based schema language. Chapter 1 offered a primer on
    XML Schema.


    Validating an XML document with respect to a schema definition based on the XML
    Schema language is the focus of this chapter.


    ## Schema Validation APIs


    In this chapter, we will focus on the `JAXP 1.3` schema validation APIs. You can
    classify the APIs into two groups:


    - The first group includes the `JAXP 1.3` SAX and DOM parser APIs. Both these
    APIs perform validation as an intrinsic part of the parsing process.

    - The second group includes the `JAXP 1.3` Validation API. The Validation API
    is unlike the first two APIs in that it completely decouples validation from parsing.


    Clearly, if the application needs to parse an XML document and the selected parser
    supports schema validation, it makes sense to combine validation with parsing.
    However, in other scenarios, for a variety of reasons, the validation process
    needs to be decoupled from the parsing process. The following are some of the
    scenarios where an application may need to decouple validation from parsing:


    - Prior to validating an XML document with a schema, an application may need to
    first validate the schema itself. The Validation API allows an application to
    separately compile and validate a schema, before it is used for validating an
    XML document. For example, this could be applicable if the schema were available
    from an external source that could not automatically be trusted to be correct.

    - An application may have a DOM tree representation of an XML document, and the
    application may need to validate the tree with respect to a schema definition.
    This scenario comes about in practice if a DOM tree for an XML document is programmatically
    or interactively manipulated to create a new DOM tree and the new tree needs to
    be validated against a schema.

    - An application may need to validate an XML document with respect to a schema
    language that is not supported by the available parser. This is generally true
    for less widely supported schema languages and is of course true for a new custom
    schema language.

    - An application may need to use the same schema definition to validate multiple
    XML documents. Because the Validation API constructs an object representation
    of a schema, it is efficient to use a single schema object to validate multiple
    documents.

    - An application may need to validate XML content that is known to be well-formed,
    so there is no point in first parsing such content. An example scenario for this
    case is when an XML document is being produced programmatically through a reliable
    transformation process.


    We discussed guidelines for selecting the appropriate `JAXP 1.3` parsing API in
    Chapter 2. Table 3-1 lists criteria for selecting the appropriate `JAXP 1.3` validation
    API.


    **Table 3-1.** *Selecting a Validation API*


    | Validation API | Suitable Application |

    |----------------|---------------------|

    | SAX parser | The document is suitable for parsing with the SAX parser and requires
    validation, and the parser supports the schema language. |

    | DOM parser | The document is suitable for parsing with the DOM parser and requires
    validation, and the parser supports the schema language. |

    | Validation | The application needs to decouple parsing from validation; we discussed
    scenarios earlier. |


    ## Configuring JAXP Parsers for Schema Validation'
