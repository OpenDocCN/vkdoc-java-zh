    \ metadata contained within an XML Schema. This is useful if you want to dynamically\
    \ create an XML document that conforms to a schema.\n\nIn our opinion, JAXB should\
    \ be the default choice for a binding framework, because it is part of the Java\
    \ Platform Standard Edition. However, in certain situations, for reasons discussed\
    \ previously and summarized in Table 7-1, XMLBeans may be the more pragmatic choice."
