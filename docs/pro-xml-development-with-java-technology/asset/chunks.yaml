- fmt: 'It is important to note that the WSDL 1.1 document does not define service
    semantics. Service semantics are defined either implicitly or explicitly through
    a verbal or written exchange between a provider entity and a requestor entity.
    In some cases, the service semantics may be defined as a legally binding contract
    between a provider entity and a requestor entity.


    ## Web Service Architectural Models


    The web services architecture is a multifaceted architecture. To simplify things,
    it is best to examine each facet of this architecture in the context of a separate
    architectural model. So, we will cover the following three web service architectural
    models individually:


    - The message-oriented model

    - The service-oriented model

    - The resource-oriented model


    ### Message-Oriented Model


    All interaction between a web service and its client is based on the exchange
    of XML content encapsulated within SOAP 1.1 messages, which are transported inside
    HTTP 1.0/1.1 messages. The message-oriented model is focused on the structure,
    processing, and transmission of these XML-based messages.


    However, this model is not concerned with the web service–specific content of
    a SOAP 1.1 message or the semantics of a Web-based service. Looking through the
    prism of a message-oriented model, you can observe the following key points:


    - All agent-to-agent conversations during the use of a web service are built upon
    a one-way exchange of a SOAP 1.1 message between a sender agent and a receiver
    agent. Of course, the receiver at one moment can become a sender the next moment.

    - A SOAP 1.1 message is contained in an envelope. Each envelope contains an optional
    header and a required body.

    - A SOAP 1.1 message travels between a sender and a receiver over an HTTP message
    transport. The reliable delivery of a message is the concern of the message transport.

    - A receiver must have a unique HTTP URI address so a sender can uniquely identify
    the receiver.

    - You can define complex web service message exchange patterns on top of the basic
    one-way exchange pattern.


    Figure 14-2 summarizes the message-oriented model.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


