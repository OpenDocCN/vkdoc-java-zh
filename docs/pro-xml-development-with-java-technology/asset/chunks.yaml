    # Chapter 2: Parsing XML Documents


    An XML document contains structured textual information. We covered the syntactic
    rules that define the structure of a well-formed XML document in the primer on
    XML 1.0 in Chapter 1. This chapter is about parsing the structure of a document
    to extract the content information contained in the document.


    We''ll start by discussing various objectives for parsing an XML document and
    by covering various parsing approaches compatible with these objectives. We''ll
    discuss the advantages and disadvantages of each approach and the appropriateness
    of them for particular applications. We''ll then discuss specific parsing APIs
    that implement these approaches and are defined within JAXP 1.3, which is included
    in J2SE 5.0, and Streaming API for XML (StAX), which is included in J2SE 6.0.
    We''ll explain each API through code examples. Finally, we''ll offer instructions
    on how to build and execute these code examples within the Eclipse IDE.


    ## Objectives of Parsing XML'
