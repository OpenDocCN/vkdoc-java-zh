    将 wsdl:operation 绑定到 SOAP 1.1


    这一步通过将每个 `wsdl:operation` 绑定到 SOAP 1.1 消息传递，使 `wsdl:operation` 具体化。例如，将 `download`
    的 `wsdl:operation` 绑定到 SOAP 1.1 包括以下部分：


    • 定义一个带有 `soapAction` 和 SOAP 1.1 消息传递风格的 `soap:operation`。`soapAction` 是对消息处理节点的一个提示，根据
    WS-I BP 1.1，它有助于提高应用程序之间的互操作性。它作为 HTTP 头部属性进行传输。本质上，它是一种通过仅查看 HTTP 头部就能推断 SOAP
    消息某些信息的机制，而无需检查 SOAP 消息本身。


    • 将 `wsdl:input` 抽象消息绑定到 `soap:header` 和 `soap:body`。


    • 将 `wsdl:output` 绑定到 `mime:multipartRelated` 消息。


    • 将 `wsdl:fault` 绑定到 `soap:fault`。


    我们将在以下各节中解释上述每个步骤。


    **定义 soap:operation**


    `download` 的 `wsdl:operation` 的 `soap:operation` 绑定定义如下：


    <soap:operation


    soapAction="http://www.apress.com/xmljava/webservices/download"


    style="document" >


    </soap:operation>


    请记住，每个 SOAP 1.1 消息都在 HTTP 消息内传输。`soap:operation` 的 `soapAction` 属性中的 URI 将作为 `SOAPAction`
    HTTP 头部的值包含在内。


    **绑定 wsdl:input**


    `download` 操作中的 `wsdl:input` 基于 `defs:DownloadProject` 抽象消息，该消息定义了两个 `wsdl:part`
    元素，如下所示：


    <wsdl:message name="DownloadProject" >


    <wsdl:part element="types:userInfo" name="user" ></wsdl:part>


    <wsdl:part element="types:project" name="project" ></wsdl:part>


    </wsdl:message>


    当 `defs:DownloadProject` 绑定到 SOAP 1.1 消息时，你可以选择将 `user` 部分绑定到 `soap:header` 元素，将
    `project` 部分绑定到 `soap:body` 元素，如下所示：


