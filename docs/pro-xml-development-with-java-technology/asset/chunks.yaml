    ```


    If you now examine the style sheet in Listing 5-3 from an intuitive standpoint,
    you may notice the following interesting facts:


    - This style sheet is a well-formed XML document.

    - Elements with the `xsl` prefix belong to the `http://www.w3.org/1999/XSL/Transform`
    namespace and are part of the XSLT language instruction set (well, you may not
    know that for a fact, but you may suspect that).

    - Elements without the `xsl` prefix, such as the `table` element, are copied unchanged
    from the source tree to the result tree.

    - The output method is specified as `xml`, but the result document is instructed
    not to have any xml declaration: you may intuitively infer that the `<xsl:output
    encoding="UTF-8" method="xml" omit-xml-declaration="yes" />` instruction in the
    XSLT style sheet accomplishes these objectives.

    - The `xsl:template` instructions in the style sheet contain an attribute named
    `match`, whose value is an XPath expression. The `xsl:apply-templates` instructions
    in the style sheet contain an attribute named `select`, whose value is also an
    XPath expression. We will explain all this in detail in a moment; for now, you
    are just trying to develop an intuitive understanding.

    - Not all nodes from the source tree appear in the result tree. In fact, only
    the value of the `title` attribute node from the source tree appears as a text
    node in the result tree.

    - The result tree contains many elements that are not present in the source tree.


    From these points, you may be able to quickly surmise that a style sheet is a
    well-formed XML document that contains a mix of XSLT instructions and literal
    XML content. With a little bit of thought, you may also be able to surmise that
    XSLT instructions within the style sheet use XPath expressions to address source
    tree nodes and then apply some transformations to these source nodes to produce
    the result tree. Finally, you may be able to easily infer that the literal XML
    content in the source tree gets copied into the result tree, unchanged; so far,
    so good. However, we suspect that at this point you want to know exactly how the
    transformations are specified and how a processor processes them. So, let’s dive
    into those details next.


    ## XSLT Processing Algorithm


    You specify XSLT transformations through a combination of templates and instructions.
    A template construct is comprised of instructions and literal content in a target
    document. You can define instructions inside or outside a template construct.
    For example, the following template, from the style sheet in Listing 5-3, contains
    a single `<xsl:value-of select="@title" />` instruction:


    ```xml

    <xsl:template match="journal" >

    <xsl:value-of select="@title" />

    </xsl:template>

    ```


    Each template is associated with a specific pattern, which is given by the value
    of the `match` attribute. The pattern for the simple template shown previously
    is `journal`. This means the template is applicable to all nodes with the name
    `journal`.


    Each instruction operates on a node set selected from the source tree. When an
    XSLT processor is asked to transform a source document using an XSLT style sheet,
    the processor essentially follows this algorithm:


    1. It parses the style sheet and the source document into their respective node
    trees.

    2. It executes an implicit instruction, `<xsl:apply-templates select="/" />`.
    This instruction has a `select` attribute with an XPath expression value of `/`.
    This XPath expression evaluates to a node set containing the source tree document
    element. Therefore, this instruction selects the source tree document element
    as the current node set and scans the style sheet node tree for an `xsl:template`
    instruction with a `match` attribute that matches the source tree document element.
    If such a template is found, this template is instantiated as the template for
    the result tree root node. If no such template is found, another implicit rule
    continues recursive processing by selecting each child node of the root node and
    looking for a matching template for each selected child node (and so on, recursively),
    until a matching template is found. For example, in the example style sheet in
    Listing 5-3, the `<xsl:template match="/" >` template will match the implicit
    instruction.

    3. From this point, as each template is instantiated in the result tree, it is
    in turn processed. Literal elements in the template are copied unchanged into
    the result tree. For each XSLT instruction found in an instantiated template,
    the processing continues as described in the next step. For example, in the `<xsl:template
    match="/" >` template in Listing 5-3, HTML elements are literal content that is
    copied unchanged, and `<xsl:for-each select="catalog/journal" >` is an example
    of an XSLT instruction that continues the processing described in the next step.

    4. For each `xsl:apply-templates` instruction found in an instantiated template,
    the `select` attribute’s XPath expression value is used to select a node set from
    the source tree. For each node in the selected node set, the processor scans the
    style sheet for a matching `xsl:template`, and if an `xsl:template` is found,
    it is instantiated in the result tree, and the processing continues. If more than
    one matching `xsl:template` is found for a node in the current node set, it is
    considered an error. However, the processor may choose to ignore the error and
    pick one of the matching templates and instantiate it. This may be a source of
    inconsistent behavior across different processors. Note, the algorithm for an
    `xsl:template` match does not require that the `select` attribute value and the
    `match` attribute value have to be the same. For example, in the `<xsl:apply-templates
    select="." >` instruction in Listing 5-3, the `select` value matches the `<xsl:template
    match="journal" >` template, as discussed in detail in the next step.

    5. For each `xsl:for-each` instruction found in an instantiated template, the
    `select` attribute’s XPath expression value is used to select a node set from
    the source tree. For each node in the selected node set, the body of the `xsl:for-each`
    instruction is instantiated into the result tree and processed. For example, the
    `<xsl:for-each select="catalog/journal" >` instruction in Listing 5-3 iterates
    over the node set of all the `journal` elements and executes the body of the for
    loop for each `journal` element. The body of the for loop is the `<xsl:apply-templates
    select="." >` instruction. The `select` value of this instruction matches the
    `<xsl:template match="journal" >` template, because this instruction gets executed
    in an `xsl:for-each` loop, where each iteration of the loop selects a different
    `journal` element. And the `<xsl:value-of select="@title" />` instruction within
    `<xsl:template match="journal" >` prints the value of each journal’s `title` attribute.


    With this basic understanding of the processing algorithm in place, you are ready
    to look at how transformations are specified, which you will do next.


