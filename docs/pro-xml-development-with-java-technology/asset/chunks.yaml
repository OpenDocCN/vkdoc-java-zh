- fmt: "• `CatalogDocument`接口的工厂类提供了`newInstance()`方法用于创建新的`CatalogDocument`对象。它还定义了`parse()`方法，用于解析以`catalog`为根元素的XML文档。`parse()`方法返回一个`CatalogDocument`对象。\n\
    \n需要牢记的一个重要概念是，示例模式定义（清单7-1）定义了三个顶级元素——`catalog`、`journal`和`article`——因此，符合此模式定义的有效XML文档可以将这三个元素中的任何一个作为其根元素。\n\
    \n这就是`scomp`生成三种Java类型的原因：`CatalogDocument`、`JournalDocument`和`ArticleDocument`。\n\
    \n实现类`CatalogDocumentImpl.java`、`JournalDocumentImpl.java`和`ArticleDocumentImpl.java`生成在`noNamespace.impl`包中。\n\
    \n## 自定义XMLBeans绑定\n\n您可以使用XMLBeans配置文件自定义由`scomp`编译器生成的XML Schema到Java类型的绑定。可以在配置文件中定义的定制示例包括：向Java类型名称添加前缀或后缀，以及指定生成Java类型的自定义包。绑定配置文件的元素定义在`http://www.bea.com/2002/09/xbean/config`命名空间中。\n\
    \nXMLBeans类生成的默认包是`noNamespace`。通过在XMLBeans配置文件中指定包名，可以在另一个包中生成XMLBeans类；您可以通过两种方式实现：\n\
    \n- 如果绑定模式具有目标命名空间，则其目标命名空间可以映射到包名。例如，命名空间`http://xmlbeans/journal`可以映射到`journal`包，如清单7-7所示。\n\
    - 如果绑定模式没有目标命名空间，则可以将其映射到自定义包名，如清单7-8所示。\n\n> 8. XMLBeans最初由BEA开发，并于2003年9月捐赠给Apache软件基金会。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 57](index-216_1.png)\n\
    \nVohra_706-0C07.fm Page 197 Thursday, July 13, 2006 1:11 PM\n\n第7章 ■ 使用XMLBeans进行绑定\n\
    \n**197**\n\n**清单7-7.** *catalog.xsdconfig*\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<xb:config>\n  <xb:namespace uri=\"http://xmlbeans/journal\">\n   \
    \ <xb:package>journal</xb:package>\n  </xb:namespace>\n</xb:config>\n```\n\n**清单7-8.**\
    \ *catalog.xsdconfig*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <xb:config>\n  <xb:namespace>\n    <xb:package>xmlbeans</xb:package>\n  </xb:namespace>\n\
    </xb:config>\n```\n\n要将`catalog.xsd`模式与配置文件`catalog.xsdconfig`绑定，请将`catalog.xsdconfig`导入到Chapter7项目中的`gen_source`文件夹。要使用配置文件生成Java类型，请选择`gen_source`文件夹，然后运行外部工具配置`XMLBeans`。\n\
    \nJava类生成在`xmlbeans`包中，如图7-9所示。您必须刷新Chapter7项目才能看到新生成的文件。\n\n**图7-9.** *在`xmlbeans`包中生成的Java类*\n\
    \n## 编组XML文档\n\n在本节中，您将使用XMLBeans生成的Java类来编组示例XML文档（`catalog.xml`）。由于Java类是从XML\
    \ Schema编译而来的，因此从Java类生成的XML文档符合该模式。您首先构建XML文档的Java对象表示，然后将Java对象输出为XML文档。表示XML文档实例的Java接口是`noNamespace.CatalogDocument`。因此，创建一个`CatalogDocument`类型的对象，如下所示：\n\
    \n```java\nnoNamespace.CatalogDocument catalogDoc =\n    noNamespace.CatalogDocument.Factory.newInstance();\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nVohra_706-0C07.fm Page\
    \ 198 Thursday, July 13, 2006 1:11 PM\n\n**198**\n\n第7章 ■ 使用XMLBeans进行绑定\n\nXML文档实例中的根元素是`catalog`，它由Java接口`noNamespace.CatalogDocument.Catalog`表示。您可以使用`addNewCatalog()`方法向`noNamespace.CatalogDocument`对象添加一个`Catalog`对象，如下所示：\n\
    \n```java\nCatalogDocument.Catalog catalog = catalogDoc.addNewCatalog();\n```\n\
    \n要编组的XML文档在`catalog`元素中包含`journal`元素。`journal`元素由接口`noNamespace.JournalDocument.Journal`表示。您可以使用`addNewJournal()`方法向`noNamespace.CatalogDocument.Catalog`对象添加一个`Journal`对象，如清单7-9所示。`Journal`元素的属性`publisher`的值通过`setPublisher()`方法设置。\n\
    \n**清单7-9.** *添加Journal对象并设置publisher属性*\n\n```java\nnoNamespace.JournalDocument.Journal\
    \ journal = catalog.addNewJournal();\njournal.setPublisher(\"IBM developerWorks\"\
    );\n```\n\n`article`元素由Java接口`noNamespace.ArticleDocument.Article`表示。您可以使用`addNewArticle()`方法向`noNamespace.JournalDocument.Journal`对象添加一个`Article`对象，如清单7-10所示。您可以使用这些属性的setter方法设置`article`元素的`level`、`date`和`section`属性。\n\
    \n**清单7-10.** *添加Article对象并设置属性*\n\n```java\narticleDocument.Article article =\
    \ journal.addNewArticle();\narticle.setLevel(\"Intermediate\");\narticle.setDate(\"\
    January-2004\");\narticle.setSection(\"Java Technology\");\n```\n\n您可以使用这些元素的setter方法设置`article`元素的`title`和`author`子元素的值，如清单7-11所示。\n\
    \n**清单7-11.** *设置title和author值*\n\n```java\narticle.setTitle(\"Service Oriented\
    \ Architecture Frameworks\");\narticle.setAuthor(\"Naveen Balani\");\n```\n\n\
    类似地，添加另一个`Article`对象以构造清单7-2中所示的XML文档。\n\n清单7-12显示了用于构造示例XML文档的Java应用程序`XMLBeansMarshaller.java`。`XMLBeansMarshaller`类包含`createCatalog()`方法，该方法创建XML文档的Java对象表示。XML文档实例由`CatalogDocument`接口表示。因此，从`CatalogDocument`的工厂类创建一个`CatalogDocument`对象。您使用`addNewCatalog()`方法将根元素`catalog`的Java类表示`CatalogDocument.Catalog`添加到`CatalogDocument`对象。您使用`addNewJournal()`方法将`journal`元素的Java类表示`JournalDocument.Journal`添加到`Catalog`对象。您使用`addNewArticle()`方法将`article`元素的Java类表示`ArticleDocument.Article`添加到`Journal`对象。您使用这些属性和文本节点的setter方法设置属性和元素文本的值。\n\
    \n**清单7-12.** *XMLBeansMarshaller.java*\n\n```java\npackage com.apress.xmlbeans;\n\
    \nimport noNamespace.*;\nimport noNamespace.impl.*;\n\npublic class XMLBeansMarshaller\
    \ {\n\n    //createCatalog方法\n    public CatalogDocument createCatalog() {\n\n\
    \        //从工厂类创建CatalogDocument对象\n        CatalogDocument catalogDoc = CatalogDocument.Factory.newInstance();\n\
    \n        //向CatalogDocument对象添加CatalogDocument.Catalog对象\n        CatalogDocument.Catalog\
    \ catalog = catalogDoc.addNewCatalog();\n\n        //向CatalogDocument.Catalog对象添加JournalDocument.Journal对象\n\
    \        JournalDocument.Journal journal = catalog.addNewJournal();\n\n      \
    \  //设置publisher属性的值\n        journal.setPublisher(\"IBM developerWorks\");\n\n\
    \        //向JournalDocument.Journal对象添加ArticleDocument.Article对象\n        ArticleDocument.Article\
    \ article = journal.addNewArticle();\n\n        //设置Article对象属性和元素的值\n       \
    \ article.setTitle(\"Service Oriented Architecture Frameworks\");\n        article.setAuthor(\"\
    Naveen Balani\");\n        article.setLevel(\"Intermediate\");\n        article.setDate(\"\
    January-2004\");\n```"
  raw: '• The factory class for the CatalogDocument interface provides the newInstance()
    methods for creating the new CatalogDocument objects. It also defines the parse()
    methods for parsing an XML document with catalog as its root element. The parse()
    methods return a CatalogDocument object.


    One important concept to keep in mind is that the example schema definition (Listing
    7-1) defines three top-level elements—catalog, journal, and article—so a valid
    XML document that conforms to this schema definition can have any one of these
    three elements as its root element.


    This is why scomp generates three Java types: CatalogDocument, JournalDocument,
    and ArticleDocument.


    The implementation classes CatalogDocumentImpl.java, JournalDocumentImpl.java,
    and ArticleDocumentImpl.java get generated in the noNamespace.impl package.


    **Customizing XMLBeans Bindings**


    You can customize the XML Schema to Java types binding generated by the scomp
    compiler with an XMLBeans configuration file. Examples of customizations that
    can be defined in the configuration file include the addition of prefixes or suffixes
    to Java type names and the specification of a custom package in which the Java
    types are generated. The elements of a binding configuration file are defined
    in the http://www.bea.com/2002/09/xbean/config namespace.8


    The default package in which XMLBeans classes get generated is noNamespace. XMLBeans
    classes may be generated in another package by specifying a package name in an
    XMLBeans configuration file; you can do this in two ways:


    • If the binding schema has a target namespace, then its target namespace can
    be mapped to a package name. For example, the http://xmlbeans/journal namespace
    can be mapped to the journal package, as shown in Listing 7-7.


    • If the binding schema has no target namespace, then it can be mapped to a custom
    package name as shown in Listing 7-8.


    8\. XMLBeans was originally developed by BEA and donated to the Apache Software
    Foundation in September 2003.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


