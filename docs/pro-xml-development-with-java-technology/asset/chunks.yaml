    第 2 章 ■ 解析 XML 文档


    • 对于大小从几百兆字节到几千兆字节的大型文档，内存中的 DOM 树结构可能会耗尽所有可用内存，导致在 DOM 方法下无法解析此类大型文档。


    • 如果需要随机导航 XML 文档，或者需要操作文档内容和结构，DOM 解析方法是最实用的方法。这是因为没有其他方法能提供文档的内存表示，虽然解析应用程序当然可以创建这种表示，但这样做本质上是在复制
    DOM 方法。


    • 在 JAXP 1.3 中提供了使用 DOM 解析方法的 API。


    **推送方法**


    在推送解析方法下，推送解析器在解析文档时会生成同步事件，应用程序可以使用回调处理程序模型来处理这些事件。推送方法的 API 以 SAX 2.0 的形式提供，它也包含在
    JAXP 1.3 中。SAX 是一个只读 API。如果不需要修改或随机访问导航 XML 文档，建议使用 SAX API。


    SAX 2.0 API 定义了一个 `ContentHandler` 接口，应用程序可以实现该接口来定义回调处理程序，以处理 SAX 解析器生成的同步解析事件。`ContentHandler`
    事件方法具有相当直观的语义，如表 2-2 所示。


