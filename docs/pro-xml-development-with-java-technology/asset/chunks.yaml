    Predicates


    The last piece in a location path step is zero or more optional predicates. The
    following are the two keys to understanding predicates:


    • Predicates are filters on a node set.


    • Predicates are XPath expressions that are evaluated and mapped to a Boolean
    value through the use of a core XPath boolean() function, as described here:


    • A number value is mapped to true if and only if it is a nonzero number. For
    example, in Figure 4-2, the expression //title[position()] uses the built-in XPath
    position() function that returns the child position of the selected title node
    as a number. Since the child position of a node is always 1 or greater, this expression
    will select all the title nodes. However, the expression //title[position() –
    1] will select only those title nodes that occur at a child position greater than
    1\. In the example, the second expression will not select any nodes since all
    the title nodes are at child position 1.


    • A string value is mapped to true if and only if it is a nonzero length string.
    For example, in Figure 4-2, the expression //title[string()] uses the built-in
    XPath string() function to implicitly convert the first node in a node set to
    its string node value. This expression will select only those title nodes that
    have nonzero-length text content, which for the example document means all the
    title nodes.


    • A node set is mapped to true if and only if it is nonempty. For example, in
    Figure 4-2, in the expression //article[child::title], the [child::title] predicate
    evaluates to true only when the child::title node set is nonempty, so the expression
    selects all the article elements that have title child elements.


    The output node set of a component to the left of a predicate is its input node
    set, and evaluating a predicate involves iterating over this input node set. As
    the evaluation proceeds, the current node


