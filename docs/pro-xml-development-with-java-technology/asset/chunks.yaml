    **存储 XML 文档**


    在本节中，我们将讨论如何将 XML 文档存储到数据库表中类型为 `XML` 的列中。此过程的关键步骤如下：


    **1.** 创建一个 `SQLXML` 对象。


    **2.** 使用一个 XML 文档初始化该 `SQLXML` 对象。


    **3.** 创建一个包含 `XML` 类型列的数据库表。


    **4.** 创建一个 `PreparedStatement`，用于将 `SQLXML` 对象存储到 `XML` 类型的列中。


    **5.** 执行该 `PreparedStatement` 以存储 `SQLXML` 对象。

    '
- fmt: '在`XMLToSQL.java`应用程序中，你需要导入`java.sql`和`javax.xml.stream`包，其中`javax.xml.stream`包包含处理`SQLXML`对象所需的`XMLStreamWriter`和`XMLStreamReader`接口。要创建要存储在XML类型列中的XML文档，首先需要创建一个`SQLXML`对象。你可以使用`createSQLXML()`方法从`Connection`对象创建`SQLXML`对象，如下所示：


    ```

    SQLXML sqlXML=connection.createSQLXML();

    ```


    使用`createSQLXML()`方法创建的`SQLXML`对象不包含任何数据。要向`SQLXML`对象添加数据，你需要初始化此`SQLXML`对象。你可以使用`XMLStreamWriter`对象或`SQLXML`接口的`setString()`方法来初始化`SQLXML`对象。要使用`XMLStreamWriter`对象向`SQLXML`对象添加数据，请先从此`SQLXML`对象创建一个`StAXResult`对象，然后使用`StAXResult`类的`getXMLStreamWriter()`方法获取`XMLStreamWriter`对象，如下所示：`StAXResult
    staxResult = sqlXML.setResult(StAXResult.class); XMLStreamWriter xmlStreamWriter
    = staxResult.getXMLStreamWriter();` 你使用`SQLXML`接口的`setResult(Class<T> resultClass)`方法来创建`StAXResult`对象。当调用`setResult(Class<T>
    resultClass)`方法时，`SQLXML`对象变为不可写。


    `XMLStreamWriter`对象通过添加元素和属性来创建XML文档。在`XMLStreamWriter`对象中，你使用`writeStartDocument
    (String encoding, String version)`方法启动一个XML文档，如下所示：


    ```

    xmlStreamWriter.writeStartDocument("UTF-8","1.0");

    ```


    在`writeStartDocument (String encoding, String version)`方法中指定的编码会设置正在构建的XML文档的XML声明中的编码。`XMLStreamWriter`接口还提供了`writeStartDocument()`方法来创建不指定编码和版本的XML文档，并提供了`writeStartDocument(String
    version)`方法来创建仅包含版本信息但不包含编码的XML文档。


    你使用`writeStartElement(String localName)`方法添加示例XML文档的根`catalog`元素，如下所示：`xmlStreamWriter.writeStartElement("catalog");`


    你可以使用`writeStartElement(String prefix, String localName, String namespaceURI)`方法创建带有命名空间前缀的元素。你可以使用`writeEmptyElement(String
    localName)`方法生成一个空元素。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


