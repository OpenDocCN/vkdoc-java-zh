    **Installing the Software**


    The SQLXML Java type, which maps the XML database type to Java, is implemented
    in J2SE 6.0\. Therefore, you need to install J2SE 6.0.2 Another requirement for
    storing an XML document in the XML type column using the SQLXML API is a JDBC
    4.0 driver. As mentioned earlier, no well-known relational database currently
    provides a JDBC 4.0 driver. Therefore, the best you can do at this point is to
    develop an application using a JDBC 3.0 driver to determine whether a database
    supports the XML data type.


