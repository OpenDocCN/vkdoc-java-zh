- fmt: '# XML 1.0 Primer


    `XML10` is a text-based markup language that is the de facto industry standard
    for exchanging data among disparate applications. `XML` defines precise syntactic
    rules for what constitutes a well-formed `10`. `XML 1.0` is a W3C Recommendation
    (http://www.w3.org/TR/2004/REC-xml-20040204/), and `XML 1.1` is a W3C Recommendation
    (http://www.w3.org/TR/xml11/).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **6**


    C H A P T E R 1 ■ I N T R O D U C I N G X M L A N D J A V A `XML` document. This
    primer is a non-normative discussion of these rules. We will gradually introduce
    these rules and use them to show how to incrementally build an `XML` document.


    Before we proceed, we want to mention two central concepts that underlie all the
    syntactic rules defining an `XML` document:


    - First, all syntactic constructs within an `XML` document are delimited by markup
    character sequences, which implies that within the body of any syntactic construct,
    the markup character sequences are not allowed. For example, a syntactic construct
    called a *start tag* is delimited by `<` and `>` characters, which implies that
    these two characters cannot appear within the body of a start tag.

    - Second, if you need to get around the limitation described in the previous bulleted
    item, escape character sequences allow you to do that. (We do not expect this
    second concept to be immediately clear, but we will elaborate on this concept
    later in the “Elements” section.)


    We will begin where most `XML` documents begin: `XML` declarations.


    ## XML Declarations


    A well-formed `XML` document can begin with an `XML` declaration. An `XML` declaration
    can be omitted, but if it appears, it should be the first thing within a document.
    You define an `XML` declaration as follows:


    ```

    <?xml version=''1.0'' ?>

    ```


    The `version` attribute specifies the `XML` version, and it is a required attribute.
    The `XML` declaration may include additional attributes: `encoding` and `standalone`.
    An example `XML` declaration with the `encoding` and `standalone` attributes is
    as follows:


    ```

    <?xml version=''1.0'' encoding=''UTF-8'' standalone=''yes'' ?>

    ```


    The `encoding` attribute specifies the character set used to encode data in an
    `XML` document. The default encoding is `UTF-8`. The `standalone` attribute specifies
    whether the `XML` document references external entities. If no external entities
    are referenced, specify the `standalone` attribute as `yes`.


    ## Elements


    The basic syntactic construct of an `XML` document is an element. An element in
    an `XML` document is delimited by a start tag and an end tag. An example of an
    `XML` element is as follows:


    ```

    <journal></journal>

    ```


    A start tag within an element is delimited by the `<` and `>` characters and has
    a tag name. In the previous start tag, the name is `journal`. The precise rules
    for a valid tag name are fairly complex and best left to the W3C Recommendation.
    However, it is useful to keep in mind that a tag name must begin with a letter
    and can contain hyphen (`-`) and underscore (`_`) characters. An end tag is delimited
    by the `</` and `>` character sequences and also contains a tag name.


    A document must have a single root element, which is also known as the *document
    element*. If you assume that the `journal` element is your root element, then
    your document so far looks as follows:


    ```

    <?xml version=''1.0'' encoding=''UTF-8'' standalone=''yes'' ?>

    <journal></journal>

    ```


