    • You specify the schema language used in the schema definition through the http://


    java.sun.com/xml/jaxp/properties/schemaLanguage property. The value of this property
    must be the URI of the schema language specification, which for the W3C XML Schema
    language is http://www.w3.org/2001/XMLSchema.


    • You specify the location of the schema definition source through the http://java.sun.com/


    xml/jaxp/properties/schemaSource property. The value of this property must be
    one of the following:


    • The URI of the schema document location as a string


    • The schema source supplied as a java.io.InputStream object or an org.xml.sax.InputSource
    object


    • The schema source supplied as a File object


    • An array of the type of objects described previously


    • It is illegal to set the schemaSource property without setting schemaLanguage.


    • An XML document can specify the location of a namespace-aware schema through
    the xsi:schemaLocation attribute in the document element, as shown in the following
    example:


    <jsp:root


    **xsi:schemaLocation=


    "http://java.sun.com/JSP/Page http://www.nubean.com/schemas/jsf_1_1.xsd" > The
    schemaLocation attribute can have one or more value pairs. In each value pair,
    the first value is a namespace URI, and the second value is the schema location
    URI for the associated namespace. The XML Schema 1.0 W3C Recommendation does not
    mandate that this attribute value be used to locate the schema file during the
    schema validation.


    • An XML document can specify the location of a no-namespace schema through the
    xsi:noNamespaceSchemaLocation attribute in the document element, as shown in the
    following example:


    <root


    xsi:noNamespaceSchemaLocation=


    "http://www.nubean.com/schemas/jsf_1_1.xsd" > The xsi:noNamespaceSchemaLocation
    attribute specifies the schema location URI. The XML


    Schema 1.0 W3C Recommendation does not mandate that this attribute value be used
    to locate the schema file during the schema validation.


