    **可扩展标记语言（XML）** 基于简单且平台无关的规则，用于表示结构化文本信息。XML 的平台无关性使其成为在不同应用程序之间交换结构化文本信息的理想格式。因此，XML
    的核心在于互操作性。


    XML 1.0 于 1998 年成为 W3C¹ 推荐标准。Sun 公司于 1995 年正式推出 Java 编程语言，短短几年内，Java 便巩固了其作为众多多样化应用首选编程与执行平台的地位。巧合的是，Java
    和 XML 都是面向互联网设计的。因此，大多数与 XML 相关的 W3C 推荐标准都催生了相应的基于 Java 的应用程序编程接口（API），这并不令人意外。其中一些
    Java API 是 Java 平台标准版（J2SE）的一部分；另一些则属于各种开源或专有项目。与 XML 相关的 W3C 推荐标准及其对应的 Java API
    是本书的主要焦点。


    **本书范围**


    本书有两个主要目标。第一个目标是讨论一部分选定的、已催生相应 Java API 的 XML 相关 W3C 推荐标准。为此，以下是本书将涵盖的 XML 相关
    W3C 推荐标准及 Java API 的简要概述：


    • XML 1.0 (http://www.w3.org/TR/REC-xml/) 描述了构建格式良好的 XML 文档的精确规则，并描述了处理格式良好² 文档的部分规则。J2SE
    5.0 中的 Java API for XML Processing (JAXP) 1.3 是其对应的 Java API。此外，J2SE 6.0 中的 Streaming
    API for XML 1.0 (StAX) 也与处理 XML 文档相关。


    • XML Schema 1.0 (http://www.w3.org/TR/xmlschema-1/) 描述了一种语言，可用于指定 XML 文档的精确结构并约束其内容。J2SE
    5.0 中的 JAXP 1.3 和 Java 2 企业版（J2EE）³ 5.0 中的 Java XML Architecture for XML Binding
    (JAXB) 2.0 是其对应的 Java API。


    • XML Path Language (XPath) 1.0 (http://www.w3.org/TR/xpath) 描述了一种用于定位 XML 文档各部分的语言。JAXP
    1.3 中的 XPath API 是其对应的 Java API。


    1. 万维网联盟（W3C）致力于开发可互操作的技术。您可以在 http://www.w3.org 找到关于 W3C 的更多信息。

