    **X**ML 是一种简单、灵活、平台无关的语言，用于表示结构化的文本信息。XML 的平台无关性使其成为跨应用组件交换数据的理想载体。当不同的应用组件交换基于
    XML 的数据时，它们这样做是因为希望以某种特定于应用的方式处理所交换的数据，例如将数据提取并存储到数据库中，或者将数据格式化并呈现为用户界面的一部分。这就引出了一个有趣的问题：尽管
    XML 是交换数据的理想选择，但使用我们在前几章讨论过的各种 API 来处理 XML 内容可能效率极低。为什么会这样呢？


    答案在于，当今大多数处理逻辑都驻留在面向对象的应用组件中，而处理 XML 内容本质上却是极其过程化的。每个想要处理某些 XML 内容的组件，不仅需要关注内容格式是否良好，还必须确保其符合某种特定的结构（或者换句话说，相对于某个模式是有效的）。此外，一旦组件验证了
    XML 内容格式良好且有效，它还必须使用适当的 API 来访问嵌入在 XML 内容中的数据。


    当然，它完全可以做到这一切——在前几章中，我们讨论了如何解析和验证 XML 内容，以及如何使用适当的 API 访问和修改嵌入在 XML 内容中的数据。但从封装和代码复用的角度来看，在大多数面向对象的应用程序中直接使用这些
    API 可能效率极低。为了解决在面向对象的 Java 应用程序中直接处理 XML 内容所带来的低效问题，你需要一个能够透明地将 XML 内容映射到 Java
    对象，并将 Java 对象映射回 XML 内容的 Java API。


    Java 架构用于 XML 绑定（JAXB）正是这样一个 API。


    **概述**


    理解 JAXB 的关键在于关注以下几点：


    • 给定一个 XML Schema 文档，可以构造出无数个相对于该模式有效的 XML 文档。


    • 给定一个模式和一个符合该模式的 XML 文档，该 XML 文档中的某个元素必须符合该模式中指定的某个类型组件。


    • 对象实例相对于 Java 中其对应的类，就如同 XML 文档中的元素相对于该文档模式中指定的元素声明。


