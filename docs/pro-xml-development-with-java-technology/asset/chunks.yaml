    ## Summary


    This was a capstone chapter that drew from many concepts covered in this book.
    Building a XML-based web service starts with formally describing a web service
    in a WSDL document. Specifying a WSDL document starts with describing user-defined
    data types in a schema definition. The user-defined data types are the basic building
    blocks for defining various messages types required by the web service use cases.
    The message types are then used in defining a port type, which defines a web service
    interface.


    The web service message types and port types are abstract types. To make these
    types concrete, you need to bind these types to the SOAP messaging framework and
    the HTTP transport protocol. Finally, the concrete binding of the port type is
    bound to an HTTP URL, which defines a web service port. We covered all these concepts
    in this chapter in the context of a complete web service example.


    A WSDL document contains enough information that code generation tools can easily
    generate the Java code associated with implementing a web service provider agent.
    In addition, code generation tools can use a WSDL document to generate a service
    proxy that can be used by a web service requestor agent to interact with the web
    service. In this chapter, we used Sun One Application Server 9.0 tools to generate
    Java code corresponding to an example web service and then build and deploy the
    web service in Sun One Application Server 9.0. Finally, we showed how to build
    a web service client that can interact with the web service.


