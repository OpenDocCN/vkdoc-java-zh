    对于此示例，清单 4-1 中显示的示例 XML 文档使用 `javax.xml.xpath.XPath` 类进行评估，并使用 XPath API 提取相关的节点集。`XPath`
    和 `XPathExpression` 接口中的 `evaluate()` 方法用于根据相关的 XPath 表达式访问各种文档节点集。


    XPath 表达式可以在使用前显式编译，也可以直接评估。显式编译 XPath 表达式的主要优点是在评估之前验证表达式的正确性，并促进表达式在多次评估中的重用。假设你有兴趣了解
    XPath 表达式的显式编译，那么接下来我们将介绍这一点。


    **显式编译 XPath 表达式**


    假设你需要一个 `XPath` 对象来编译 XPath 表达式。你可以使用 `XPathFactory` 工厂类来创建 `XPath` 对象。要创建 `XPath`
    对象，首先使用 `XPathFactory` 类的静态方法 `newInstance()` 创建一个 `XPathFactory` 对象，如清单 4-5 所示。`newInstance()`
    方法使用默认对象模型 `DEFAULT_OBJECT_MODEL_URI`，该模型基于 W3C DOM。

    '
- fmt: 'If you’re going to use an object model other than the default, create an `XPathFactory`
    object with the `newInstance(String uri)` method. Using the specified or the default
    object model, create an `XPath` object from the `XPathFactory` object using the
    `newXPath()` method, as illustrated in Listing 4-5.


    **Listing 4-5.** *Creating an XPath Object*


    ```

    XPathFactory factory=XPathFactory.newInstance();

    XPath xPath=factory.newXPath();

    ```


    Let’s assume you are interested in compiling the XPath expression `/catalog/journal/article[@date=''January-2004'']/title`,
    which addresses `title` elements within all `article` elements with the `date`
    attribute set to `January-2004`. You can do so with the `compile()` method of
    the `XPath` object, as shown here:


    ```

    XPathExpression xPathExpression=

    xPath.compile("/catalog/journal/article[@date=''January-2004'']/title");

    ```


    This `compile()` method returns an `XPathExpression` object. If the XPath expression
    has an error, an `XPathExpressionException` gets generated.


    **Evaluating a Compiled XPath Expression**


    The `XPathExpression` interface provides overloaded `evaluate()` methods to evaluate
    an XPath expression. Table 4-2 lists the `evaluate()` methods in the `XPathExpression`
    interface.


    Two of the overloaded `evaluate()` methods take a `returnType` as a parameter.
    The return types are represented with `javax.xml.xpath.XPathConstants` class static
    fields. Table 4-3 lists the different return types supported by the `evaluate()`
    methods, and they provide the flexibility that is needed to convert the result
    of evaluating an expression to different return types. The default `returnType`
    is `javax.xml.xpath.XpathConstants.STRING`.


    **Table 4-2.** *XPathExpression evaluate() Methods*


    | Evaluate Method | Description |

    | --- | --- |

    | `evaluate(InputSource source)` | Evaluates the compiled XPath expression in
    the context of the specified `InputSource` and returns a string. The default return
    type, `XPathConstants.STRING`, is used for evaluating the XPath expression. |

    | `evaluate(InputSource source, QName returnType)` | Evaluates the compiled XPath
    expression in the context of the specified `InputSource` and returns a value of
    the specified return type. |

    | `evaluate(Object item)` | Evaluates the compiled XPath expression in the specified
    context, which may be a `Node` or a `NodeList`. Returns a string. |

    | `evaluate(Object item, QName returnType)` | Evaluates a compiled XPath expression
    in the specified context and returns a value of the specified return type. |


    **Table 4-3.** *XPath Return Types*


    | Return Type | Description |

    | --- | --- |

    | `javax.xml.xpath.XpathConstants.BOOLEAN` | XPath 1.0 boolean datatype |

    | `javax.xml.xpath.XpathConstants.NODESET` | XPath 1.0 NodeSet datatype |

    | `javax.xml.xpath.XpathConstants.NODE` | XPath 1.0 Node datatype |

    | `javax.xml.xpath.XpathConstants.STRING` | XPath 1.0 string datatype |

    | `javax.xml.xpath.XpathConstants.NUMBER` | XPath 1.0 number datatype |


    The `evaluate()` methods of the `XPathExpression` interface evaluate in the context
    of either an `InputSource` or a `java.lang.Object` that represents a DOM structure,
    such as an `org.w3c.dom.Node` object. For the sample application, you will evaluate
    an XPath expression in the context of an `InputSource` based on the XML document,
    as shown in Listing 4-6. In this code listing, `xmlDocument` is a `java.io.File`
    object that is associated with `catalog.xml`.


    **Listing 4-6.** *Creating an InputSource Object*


    ```

    File xmlDocument = new File("catalog.xml");

    InputSource inputSource = new InputSource(newFileInputStream(xmlDocument));

    ```


    Once you create an `InputSource` object, you can evaluate the XPath expression
    in the context of this `InputSource` object, as shown here:


    ```

    String title =xPathExpression.evaluate(inputSource);

    ```


    A new `InputSource` object is required after each invocation of `evaluate()` with
    an `InputSource` object. The result of evaluating the compiled `/catalog/journal/article[@date=''January-2004'']/title`
    XPath expression is the title: Design service-oriented architecture frameworks
    with J2EE technology.


    **Evaluating an XPath Expression Directly**


    As noted earlier, XPath expressions can be directly evaluated in the context of
    a DOM object or an `InputSource` object, without any compilation. The `XPath`
    interface provides overloaded `evaluate()` methods to evaluate an XPath expression
    directly. Table 4-4 lists the `XPath` interface `evaluate()` methods.


    **Table 4-4.** *XPath Interface evaluate() Methods*


    | Evaluate Method | Description |

    | --- | --- |

    | `evaluate(String expression, InputSource source)` | Evaluates the specified
    XPath expression in the context of the specified `InputSource` and returns a string.
    The default return type, `XPathConstants.STRING`, is used for evaluating the XPath
    expression. |

    | `evaluate(String expression, InputSource source, QName returnType)` | Evaluates
    the specified XPath expression in the context of the specified `InputSource` and
    returns a value of the specified return type. |

    | `evaluate(String expression, Object item)` | Evaluates the specified XPath expression
    in the specified context, which may be a `Node` or a `NodeList`. Returns a string.
    |

    | `evaluate(String expression, Object item, QName returnType)` | Evaluates a specified
    XPath expression in the specified context and returns a value of the specified
    return type. |


    The `returnType` values are the same as for the `XPathExpression` interface `evaluate()`
    methods and are listed in Table 4-3.


    Assume you want to find the publishers for all the journals in your XML document.
    The XPath expression for addressing the node set for all `publisher` attributes
    attached to `journal` elements that are not in any namespace would be `/catalog/journal/@publisher`.
    You can directly evaluate this expression, without compilation, as shown here:


    ```

    inputSource = new InputSource(new FileInputStream(xmlDocument)));

    String publisher = xPath.evaluate("/catalog/journal/@publisher",inputSource);

    ```


    The result of this XPath evaluation is the attribute value IBM developerWorks.


    You can also use the `evaluate()` methods in the `XPath` class to evaluate a node
    set. Say you want to evaluate the XPath expression `//title` that selects all
    the `title` elements. To select the node set of the `title` element nodes in the
    example XML document, you need to create an XPath expression that selects the
    `title` node and invoke the `evaluate()` method that takes an XPath expression,
    a `org.w3c.dom.Document` object, and a `returnType` as parameters, as shown in
    Listing 4-7.


    **Listing 4-7.** *Retrieving a NodeSet*


    ```

    DocumentBuilder builder = DocumentBuilderFactory.newInstance().newDocumentBuilder();

    Document document = builder.parse(xmlDocument);

    String expression="//title";

    NodeList nodes = (NodeList)xPath.evaluate(expression, document, XPathConstants.NODESET);

    ```


    `XPathConstants.NODESET` specifies the return type of a `evaluate()` method as
    a `NodeSet`. Because the `NodeSet` class implements the `NodeList` interface,
    you can cast the `NodeSet` object to `NodeList`.


