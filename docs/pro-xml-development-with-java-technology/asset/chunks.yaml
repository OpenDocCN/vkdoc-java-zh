- fmt: 'You can store an `SQLXML` object in a database table using `PreparedStatement`
    interface’s `setSQLXML(int index, SQLXML sqlXML)` method or `setSQLXML(String
    columnName, SQLXML sqlXML)` method. You can retrieve an `SQLXML` object from a
    `ResultSet` or a `CallableStatement` object using the `getSQLXML(int index)` method
    or the `getSQLXML(String columnName)` method. The `PreparedStatement` and `ResultSet`
    methods for the `SQLXML` data type are similar to the methods for any other data
    type, such as `String`.


    To develop an application using the `SQLXML` API, you need a relational database
    that supports the XML data type. Not all databases support the XML data type.
    To determine whether a database supports the XML data type, obtain the database
    metadata from a `Connection` object. For example, to determine whether the MySQL
    database supports the XML data type, load and register the `com.mysql.jdbc.Driver`
    JDBC driver, as shown in Listing 9-2. You need a connection URL to connect to
    the MySQL database. Listing 9-2 shows the connection URL for the MySQL database.


    **Listing 9-2.** *Loading a JDBC Driver*


    ```

    Class.forName("com.mysql.jdbc.Driver");

    String url=" jdbc:mysql://localhost:3306/test ";

    ```


    To obtain metadata information from the MySQL database, you first need to obtain
    a connection to the database. You can create a connection to the database using
    the static method `getConnection()` in the `DriverManager` interface, as shown
    in Listing 9-3. The user `root` does not require a password by default. Subsequently,
    you can obtain the database metadata from this `Connection` object.


    **Listing 9-3.** *Retrieving Database Metadata*


    ```

    Connection connection = DriverManager.getConnection(url, "root", null);

    DatabaseMetaData metadata= connection.getMetaData();

    ```


    You retrieve data types supported by a database from metadata using the `getTypeInfo()`
    method, as shown in Listing 9-4. To determine whether a database supports the
    XML data type, iterate over the data type result set, and output the `TYPE_NAME`
    column, as shown in Listing 9-4; the complete code for this example is shown in
    Listing 9-23.


    **Listing 9-4.** *Outputting Data Types*


    ```

    ResultSet rs=metadata.getTypeInfo();

    System.out.println("TYPE_NAME:"+rs.getString("TYPE_NAME"));

    ```


    If a database supports the XML data type, XML `TYPE_NAME` gets output, as shown
    here: `TYPE_NAME: XML`


