- fmt: "• The `XSL Formatting Objects` (`XSL-FO`) specification defines an XML vocabulary\
    \ for expressing formatting semantics.\n\n• The `XSLT` specification specifies\
    \ a language for transforming XML documents into other XML documents.\n\nThe original\
    \ use case that prompted `XSLT` was this: transform a given XML document into\
    \ a related XML document that specifies formatting semantics in the `XSL-FO` vocabulary.\
    \ Even though `XSLT` was originally developed to address this specific use case,\
    \ `XSLT` was also designed for transformations that have nothing to do with `XSL-FO`.\
    \ In fact, because `XSL-FO` is a topic unto itself that is beyond the scope of\
    \ this book, in this chapter we will focus only on `XSLT` transformations that\
    \ are independent of `XSL-FO`.\n\n`XSLT` language constructs are completely based\
    \ on XML. Therefore, transformations written in `XSLT` exist as well-formed XML\
    \ documents. An XML document containing `XSLT` transformations is commonly referred\
    \ to as a *style sheet*. This is because the original use case that prompted `XSLT`\
    \ was related to the formatting of XML documents.\n\nAn `XSLT` style sheet merely\
    \ *specifies* a set of transformations. Therefore, you need an `XSLT` processor\
    \ to *apply* these transformations to a given XML document. An `XSLT` processor\
    \ takes an XML document and an `XSLT` style sheet as inputs, and it transforms\
    \ the given XML document to its target output, according to transformations specified\
    \ in the style sheet. The target output of `XSLT` transformations is typically\
    \ an XML document but could be an HTML document or any type of text document.\
    \ Two commonly used `XSLT` processors are `Xalan-Java` and `Saxon`. To use an\
    \ `XSLT` processor, you need a set of Java APIs, and `TrAX` is precisely such\
    \ an API set. In the following sections, we will first provide an overview of\
    \ `XSLT` and then cover `TrAX`.\n\n1. The `XSLT` specification is available at\
    \ `http://www.w3.org/TR/xslt`.\n2. The `XSL` family of recommendations is available\
    \ at `http://www.w3.org/Style/XSL/`.\n3. As you will learn in this chapter, `XSLT`\
    \ is applicable beyond this original specification goal.\n4. `Xalan-Java` information\
    \ is available at `http://xml.apache.org/xalan-j/`.\n5. `Saxon` information is\
    \ available at `http://saxon.sourceforge.net/`.\n6. The `TrAX` API is part of\
    \ `JAXP 1.3`; it has been part of `JAXP` since version 1.1.\n\n**Overview of XSLT**\n\
    \nBefore you look at the `XSLT` language syntax and semantics in detail, you will\
    \ first see a simple example so you can develop an intuitive understanding of\
    \ `XSLT` transformations.\n\n**Simple Example**\n\nAssume you have an XML document\
    \ that describes a catalog of journals, as shown in Listing 5-1.\n\n**Listing\
    \ 5-1.** *Example Source Document*\n\n```\n<catalog>\n  <journal title=\"XML Journal\"\
    \ />\n  <journal title=\"Java Developer Journal\" />\n</catalog>\n```\n\nThis\
    \ XML document is the source document, and Figure 5-1 shows the corresponding\
    \ source tree.\n\n**Figure 5-1.** *Example source tree*\n\nNow, further assume\
    \ you want to transform this catalog document into an HTML document that displays\
    \ all the magazine titles, or *journals*, in a table, as shown in Listing 5-2.\n\
    \n**Listing 5-2.** *Example Result Document*\n\n```\n<html>\n  <body>\n    <table>\n\
    \      <tr><th>Titles</th></tr>\n      <tr><td>XML Journal</td></tr>\n      <tr><td>Java\
    \ Developer Journal</td></tr>\n    </table>\n  </body>\n</html>\n```\n\nThis HTML\
    \ document is the result document, and Figure 5-2 shows the corresponding result\
    \ tree.\n\n**Figure 5-2.** *Example result tree*\n\nHaving looked at what you\
    \ want to do, the obvious question is, what `XSLT` style sheet will transform\
