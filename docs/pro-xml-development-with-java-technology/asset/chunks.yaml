    **小结**


    XPath 语言是使用命令式表达式对 XML 文档各部分进行寻址的关键。


    XPath 是一项基础技术，本书后续章节将介绍的许多其他 XML 技术都会用到它。使用 XPath 的技术示例包括 XSL 转换（XSLT）和用于 XML
    绑定的 Java 架构（JAXB），这两者都将在本书中介绍。


    在本章中，我们介绍了 JAXP 1.3 XPath 和 JDOM XPath API。JAXP 1.3 XPath API 完全基于标准，因此应该是首选方法。然而，JDOM
    API 使用起来更简单，并且最终可能会成为标准的一部分，因此也值得研究。


