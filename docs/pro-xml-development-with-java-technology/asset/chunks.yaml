    研究清单 6-3 中的代码时，请注意清单 6-1 中顶层元素内定义的每个元素都映射到一个带有 get 和 set 访问器方法的属性。这种映射对大多数元素来说直观合理，但对于属于选择组的两个元素
    `zip` 和 `postalCode` 则不然。对于这两个元素，一个显而易见的问题是：选择组是如何在 `UsOrCanadaAddressType` 接口中体现的？简单的答案是：没有体现。在默认映射规则下，选择组不会在接口中反映出来。然而，选择逻辑在编组和解组逻辑中得到了正确实现。清单
    6-1 中 `country` 元素的枚举值也是如此。


    从直观角度来看，你已经看到默认绑定模型将顶层元素内的嵌套元素视为一个扁平的元素列表，忽略了诸如选择组之类的组组件。然而，另一种称为*模型组绑定*的绑定风格会将每个组组件绑定到其自己的
    Java 接口。为了更好地理解这种替代风格，可以在外部绑定声明文件中使用 `globalBindings` 元素来指定，如清单 6-4 所示。


