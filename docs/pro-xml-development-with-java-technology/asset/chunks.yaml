    **Unmarshaling an XML Document**


    Unmarshaling means creating a Java object tree from an XML document. In the example
    use case, the website receives an XML document containing catalog information,
    and it needs to unmarshal this document before it can process the catalog information
    contained within the document. In this section, we’ll first show how to unmarshal
    the example XML document using the JAXB API, and subsequently we’ll show how to
    access various element and attribute values in the resulting Java object tree.


    To unmarshal, you need to follow these steps:


    1. The example XML document, `catalog.xml` (Listing 6-7), is the starting point
    for unmarshaling. Therefore, import `catalog.xml` to the Chapter6 project in Eclipse
    by selecting File ➤ Import.


    2. Create a `JAXBContext` object, and use this object to create an `UnMarshaller`
    object.


    3. The `Unmarshaller` class converts an XML document to a Java object.


    As discussed in the previous section, create a `JAXBContext` object, which implements
    the JAXB binding framework operations `unmarshal()` and `validate()`.


    You need an `Unmarshaller` object to unmarshal an XML document to a Java object.
    Therefore, create an `UnMarshaller` object with the `createUnmarshaller()` method
    of the `JAXBContext` class, as shown here:


    `Unmarshaller unMarshaller=jaxbContext.createUnmarshaller();`


    The `Unmarshaller` class has overloaded `unmarshal()` methods for unmarshaling.
    To validate an XML document that is being unmarshaled, set the `Unmarshaller`
    object to be validating with the `setValidating(boolean)` method, as shown here:


    `unMarshaller.setValidating(true);`


    To create a Java object representation of an XML document, unmarshal the XML document
    to obtain a `Catalog` object:


    `Catalog catalog=(Catalog)(unMarshaller.unmarshal(xmlDocument));`


