    as shown in Listing 9-11.


    **Listing 9-11.** *Creating a PreparedStatement*


    PreparedStatement statement=


    connection.prepareStatement


    ("INSERT INTO CATALOG(catalogId, catalog)


    VALUES(?,?)");


    You set the INT value using the setInt(int index, int value) method, and you set
    the SQLXML


    value using the setSQLXML(int index, SQLXML value) method of the PreparedStatement
    interface, as shown in Listing 9-12\. If the XMLStreamWriter object has not been
    closed prior to invoking the setSQLXML() method, SQLException gets thrown. You
    can update the database using the executeUpdate() method.


