    按钮并选择变量`project_loc`和`resource_loc`来完成。这会在 **Arguments** 字段中指定值`${project_loc}`和`${resource_loc}`。在`${project_loc}`之前添加`-classpath`选项。值`${resource_loc}`意味着，无论运行`xjc`时选择了哪个文件，该文件都会成为`xjc`的模式文件参数。如果Eclipse安装目录的路径名中包含空格，请将`${project_loc}`和`${resource_loc}`用双引号括起来，如图6-5所示。


