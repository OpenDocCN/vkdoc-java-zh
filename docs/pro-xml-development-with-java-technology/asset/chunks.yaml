    \ element.\n\n## Response Message\n\nListing 14-2 shows the response to the request\
    \ message in Listing 14-1.\n\n**Listing 14-2.** *SOAP 1.1 Response Message for\
    \ Third Use Case*\n\n```xml\n<?xml version=\"1.0\" ?>\n<soapenv:Envelope>\n  <soapenv:Body>\n\
    \    <ns1:projects>\n      <project createdOn=\"2006-06-27T19:00:35.046-04:00\"\
    \n               email=\"foo@acme.com\"\n               lastUpdated=\"2006-06-27T19:00:35.187-04:00\"\
    \n               name=\"testproject.zip\" />\n    </ns1:projects>\n  </soapenv:Body>\n\
    </soapenv:Envelope>\n```\n\nIf you examine the response message, again from an\
    \ intuitive standpoint, you may notice the following points:\n\n- The response\
    \ message has no `soapenv:Header` element. This suggests the `soapenv:Header`\
    \ element must be optional in a SOAP 1.1 message, which it is.\n- The response\
    \ message `soapenv:Body` has an `ns1:projects` child element, which presumably\
    \ is a list of all the projects.\n- The `ns1:projects` element has a single `ns1:project`\
    \ child element with `name` equal to `testproject.zip`. It also shows additional\
    \ information about when the project was created (`createdOn`) and last updated\
    \ (`lastUpdated`). Presumably, `foo@acme.com` owns the project.\n\nHaving looked\
    \ at an example SOAP 1.1 message exchange based on the request-response message\
    \ pattern, you are ready to learn more about SOAP 1.1 messaging.\n\n## SOAP 1.1\
    \ Messaging (WS-I BP 1.1)\n\nIn this section, you will examine SOAP 1.1 messaging\
    \ details but *filtered through WS-I BP 1.1*. In our opinion, there is no point\
    \ in ignoring WS-I BP 1.1, since the whole idea behind using web services is interoperability.\n\
    \nSOAP 1.1 is an XML-based messaging framework for exchanging structured information\
    \ between peer nodes in a network-based distributed environment. SOAP is designed\
    \ to be extensible. By *extensible*, we mean that higher-level services, such\
    \ as security or transactions, can be layered upon the basic SOAP messaging framework,\
    \ without having to change the underlying structural rules for a SOAP message.\
    \ SOAP implies no particular semantic model. Because it is XML-based, is extensible,\
    \ and implies no particular semantic model, it's ideal for use in web services\
    \ messaging.\n\nFor the purpose of this discussion, we will associate the `soapenv`\
    \ prefix with the `http://schemas.xmlsoap.org/soap/envelope/` namespace, keeping\
    \ in mind of course that the choice of the `soapenv` prefix is completely arbitrary.\n\
    \n### Basic Concepts\n\nThe most important concepts of the SOAP 1.1 messaging\
    \ framework are as follows:\n\n- A SOAP 1.1 message is a one-way message, going\
    \ from an initial sender to an ultimate receiver, possibly via intermediate nodes.\n\
    - A SOAP 1.1 message is contained in an envelope.\n- The envelope contains an\
    \ optional header and a mandatory body.\n- The header child elements, also known\
    \ as *header blocks*, can be targeted at anybody along the message path.\n- The\
    \ application data is contained as well-formed XML content within the body element.\n\
    - The body content is generally targeted at the ultimate receiver.\n\nYou'll take\
    \ a closer look inside a SOAP 1.1 message.\n\n### SOAP 1.1 Envelope\n\nA SOAP\
    \ 1.1 message is an XML document with `soapenv:Envelope` as its root element.\
    \ The structure of a SOAP 1.1 message XML document that conforms to WS-I BP 1.1\
    \ must adhere to the following rules:\n\n- The document must not contain any processing\
    \ instructions or a document type declaration. If you are not sure what these\
    \ are, review the XML primer in Chapter 1.\n- The `soapenv:Envelope` element should\
    \ not contain the namespace declaration.\n- `soapenv:Envelope` can have an optional\
    \ `soapenv:Header` child element. If present, `soapenv:Header` must be the first\
    \ immediate child of the `soapenv:Envelope` element. All immediate child elements\
    \ of `soapenv:Header` must be namespace qualified.\n- `soapenv:Envelope` must\
    \ have a mandatory `soapenv:Body` element. It must follow the `soapenv:Header`\
    \ element if the `soapenv:Header` element is present, or it must be the first\
    \ immediate child of the `soapenv:Envelope` element. Immediate child elements\
    \ of the `soapenv:Body` element must be namespace qualified.\n- `soapenv:Body`\
    \ must be the last child element of the `soapenv:Envelope` element.\n- `soapenv:Envelope`,\
    \ `soapenv:Header`, and `soapenv:Body` must not contain any attributes qualified\
    \ in the `http://schemas.xmlsoap.org/soap/envelope/` namespace.\n\nThe SOAP 1.1\
    \ messages shown in Listings 14-1 and 14-2 are examples of WS-I BP 1.1–conformant\
    \ messages.\n\n### SOAP 1.1 Encoding Style\n\nThe header blocks and the `soapenv:Body`\
    \ content can be whatever the web service requires, as long as the header blocks\
    \ and the `soapenv:Body` content are namespace qualified and are, of course, well-formed\
    \ XML.\n\nThis raises the obvious question, how should the header blocks and the\
    \ `soapenv:Body` content be encoded? The answer, as per WS-I BP 1.1, is simple:\
    \ neither the header blocks nor the `soapenv:Body` content should be encoded.\
    \ WS-I BP 1.1 prohibits the use of any encoding style, including SOAP 1.1 encoding.\n\
    \nAll header blocks and `soapenv:Body` content must be serialized literally, which\
    \ means the header blocks and `soapenv:Body` content must conform to a schema\
    \ definition. In case you are wondering, does this lack of an encoding style limit\
    \ the ability of web services in any way? The answer, simply, is no. In fact,\
    \ the only reason for the existence of SOAP 1.1 encoding is that at the time the\
    \ SOAP 1.1 W3C Note was being composed, the XML Schema language was not completed.\n\
    \nThe detailed rules related to encoding are as follows:\n\n- Any element in the\
    \ `http://schemas.xmlsoap.org/soap/envelope/` namespace must not contain the `soapenv:encodingStyle`\
    \ attribute.\n- Any immediate child or grandchild of the `soapenv:Body` element\
    \ must not contain any `soapenv:encodingStyle` attribute.\n\nNow you are ready\
    \ to take a closer look at each of the `soapenv:Envelope` child elements.\n\n\
    ### SOAP 1.1 Header\n\nThe main purpose of the `soapenv:Header` element is extensibility.\
    \ Web services need different types of capabilities that overlay the basic web\
    \ services interaction. These capabilities could be services related to security,\
    \ transaction management, or orchestration of complex business processes based\
    \ on elementary web services. Information related to these capabilities resides\
    \ in the child elements of the `soapenv:Header` element; these immediate child\
    \ elements are called *header blocks*.\n\nIn the following discussion, keep in\
    \ mind that multiple intermediate nodes may process a SOAP 1.1 message."
