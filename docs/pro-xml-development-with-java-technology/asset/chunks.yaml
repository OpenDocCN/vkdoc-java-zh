    to access the Xindice database. You will create a collection in a database instance,
    add an example XML document to the collection, retrieve the example XML document,
    query the document using XPath, update the document using XUpdate, and delete
    the document, all with the Xindice command-line tool. The Xindice database instance
    in which the collection is created is the default database, db. Listing 8-1 shows
    the example XML document that is added to the db database.


