    #### Request Message


    Imagine that the web service client requests information about all the projects
    owned by a user but restricts the information detail to just project names. Listing
    14-1 shows the complete SOAP 1.1 request message for this use case.


    **Listing 14-1.** *SOAP 1.1 Request Message for Third Use Case*


    ```

    <?xml version="1.0" ?>

    <soapenv:Envelope

    >

    <soapenv:Header>

    <ns1:userInfo>

    <email>foo@acme.com</email>

    <pwd>bar</pwd>

    </ns1:userInfo>

    </soapenv:Header>

    <soapenv:Body>

    <ns1:projectsDetail>

    <folders>false</folders>

    <documents>false</documents>

    </ns1:projectsDetail>

    </soapenv:Body>

    </soapenv:Envelope>

    ```


    If you examine the message in Listing 14-1 from an intuitive standpoint, you may
    notice the following points:


    - Apparently, the `soapenv` prefix associated with the `http://schemas.xmlsoap.org/soap/envelope/`
    namespace defines SOAP 1.1 constructs.

    - The root element is `soapenv:Envelope`, and it contains two subelements: `soapenv:Header`
    and `soapenv:Body`.

    - You may notice that the `soapenv:Header` element has a single child element
    named `ns1:userInfo`, which is qualified with the `ns1` prefix in the `http://www.apress.com/xmljava/webservices/schemas`
    namespace. The child elements of `ns1:userInfo` contain email (`foo@acme.com`)
    and password (`bar`) information related to the user.

    - You may notice that the `soapenv:Body` element has a single child element named
    `ns1:projectsDetail`. The child elements of `ns1:projectsDetail` appear to be
    boolean switches that indicate you do not want any information about folders (`<folders>false</folders>`)
    or documents (`<documents>false</documents>`) within the projects, which conforms
    with your intent of getting information about project names owned by the user.


