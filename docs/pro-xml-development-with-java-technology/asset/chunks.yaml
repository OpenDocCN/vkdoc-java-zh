    \ 类的实例，并设置 `DOMConfiguration` 对象的错误处理程序参数，如清单 10-6 所示。\n\n**清单 10-6.** *设置错误处理*\n"
- fmt: "`DOMErrorHandlerImpl errorHandler = new DOMErrorHandlerImpl(); config.setParameter(\"\
    error-handler\", errorHandler);` 你可以通过设置`validate`、`schema-type`、`validate-if-schema`和`schema-location`参数，将`LSParser`对象配置为模式验证解析器，如清单10-7所示。\n\
    \n**清单10-7.** *设置模式验证*\n\n```\nconfig.setParameter(\"validate\" , Boolean.TRUE);\n\
    config.setParameter(\"schema-type\" , \"http://www.w3.org/2001/XMLSchema\");\n\
    config.setParameter(\"validate-if-schema\" , Boolean.TRUE);\nconfig.setParameter(\"\
    schema-location\" ,\"catalog.xsd\");\n```\n\n最后，使用`LSParser`解析XML文档，如下所示：\n\n\
    ```\nDocument document = parser.parseURI(\"catalog.xml\");\n```\n\n如果XML文档模式验证有任何错误，通过`error-handler`参数指定的错误处理器会记录这些错误。加载XML文档后，你可以使用DOM\
