    第 6 章 ■ 使用 JAXB 进行对象绑定


    **165**


    **表 6-2.** *JAXB 2.0 绑定注解*


    **注解类型**


    **描述**


    **注解元素**


    XmlAccessorType


    指定字段和属性的默认序列化方式


    AccessType.PUBLIC_MEMBER 仅映射公共字段和 JavaBean 属性。

    AccessType.FIELDS 仅映射字段。

    AccessType.PROPERTIES 仅映射 JavaBeans 属性。

    AccessType.NONE 既不映射字段也不映射属性。


    XmlAttribute


    将 JavaBean 属性映射到 XML 属性


    name: 属性名称。namespace: 属性命名空间。required: 指定属性是否为必需；默认为 false。


    XmlElement


    将 JavaBean 属性映射到 XML 元素


    defaultValue: 元素的默认值。name: 元素名称。namespace: 元素的目标命名空间。nillable: 指定元素是否可为空；默认为 false。type:
    元素类型。


    XmlEnum


    将枚举映射到带有枚举值的简单类型


    value: 枚举值


    XmlList


    将属性映射到列表简单类型


    XmlRootElement


    将类映射到根元素


    name: 根元素的本地名称。namespace: 根元素的命名空间。


    XmlSchema


    将包名映射到 XML 命名空间


    attributeFormDefault: 指定 attributeFormDefault 属性的值。elementFormDefault: 指定 elementFormDefault
    属性的值。namespace: XML 命名空间。xmlns: 将命名空间前缀映射到命名空间 URI。


    XmlType


    将类映射到 XML Schema 类型（可以是简单类型或复杂类型）


    name: XML Schema 类型的目标命名空间。propOrder: 当类映射到复杂类型时，指定 XML Schema 元素的顺序。


    XmlValue


    将类映射到具有 simpleContent 的 XML Schema 复杂类型或 XML Schema 简单类型


    **XML Schema 到 Java 表示的绑定**


    与 JAXB 1.0 类似，JAXB 2.0 指定了默认的 XML Schema 到 Java 的绑定，该绑定可以通过外部绑定声明进行覆盖。从概念上讲，JAXB
    2.0 将 XML Schema 组件绑定到 Java 的方式与 JAXB 1.0 相似。然而，由于 JAXB 2.0 绑定基于 J2SE 5.0，其 Java
    表示使用了 Java 5 注解标签，并且比 JAXB 1.0 的 Java 表示更加紧凑。


    让我们重新审视在 JAXB 1.0 上下文中看到的简单示例，以便了解 XML Schema 到 Java 的绑定在 JAXB 2.0 下是如何工作的。


