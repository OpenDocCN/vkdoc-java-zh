    **Setting the System Properties**


    You perform the XML to XSL-FO transformation using the Transformation API for
    XML, which was discussed in Chapter 5\. You will parse the example XML document
    using a DocumentBuilder parser and transform it using a Transformer object. So,
    you need to set the system properties javax.xml.parsers.DocumentBuilderFactory
    and javax.xml.transform.TransformerFactory, as shown in Listing 12-3\. You use
    DocumentBuilderFactory to create a DocumentBuilder object and TransformerFactory
    to create a Transformer object.


