    ## Summary


    Ajax allows you to refresh the content of a web page dynamically without posting
    the web page to the server. You can implement Ajax web techniques by combining
    the XML DOM, JavaScript, and XMLHttpRequest technologies. W3C has introduced a
    Working Draft of the `XMLHttpRequest` object to standardize the technology. Ajax
    has various helpful uses such as form validation, autocompletion, and data refreshes
    on a web page periodically. You implemented one of these applications, dynamic
    form validation, in this chapter.


