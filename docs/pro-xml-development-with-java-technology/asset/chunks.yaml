    **Figure 8-12.** *XINDICE configuration to update an XML document* **Deleting
    and Modifying an Element**


    As another example, you will remove a journal element and modify the title attribute
    in another journal element. Let’s remove the first journal element and modify
    title in the third journal element. Since the first journal element is removed
    before the third journal element is updated, the journal element to be updated
    becomes the second journal element. You use xupdate:remove to remove an element
    and xupdate:update to update an element. Listing 8-13 shows the XUpdate configuration
    file xupdate.xml for removing and modifying elements. To run the XINDICE configuration
    using xupdate.xml, replace the contents of the xupdate.xml file in the xindice_resources
    folder with Listing 8-13.


    **Listing 8-13.** *Xupdate.xml*


    <xupdate:modifications version="1.0"


    >


    <xupdate:remove select="/catalog/journal[1]"/>


    <xupdate:update select="/catalog/journal[2]/article/title"> Maven with Swing</xupdate:update>


    </xupdate:modifications>


