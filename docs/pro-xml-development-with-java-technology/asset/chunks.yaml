    Other important differences between SOAP 1.1 and SOAP 1.2 are as follows:


    • The most important difference is of course that SOAP 1.2 is associated with
    a new namespace: http://www.w3.org/2003/05/soap-envelope. This means a SOAP 1.1
    node receiving a SOAP 1.2


    message will generate a VersionMismatch SOAP fault. A SOAP 1.2 node may choose
    to process a SOAP 1.1 message as a SOAP 1.1 message or generate a VersionMismatch
    SOAP fault.


    • SOAP 1.2 introduces the concept of SOAP *roles*. At a given point of time, a
    SOAP node assumes a specific SOAP 1.2 role, which is identified by a URI. Three
    special roles—next, none, and ultimateReceiver—are defined in SOAP 1.2; each of
    those roles is associated with a unique URI. The SOAP 1.2 role attribute replaces
    the SOAP 1.1 actor attribute for Header child elements.


    The importance of this change is that all along, the semantics associated with
    the SOAP 1.1


    actor attribute were what one would normally ascribe to a role; SOAP 1.2 finally
    clarifies this issue by changing the name of the attribute to role.


    • SOAP 1\. 2 introduce s a relay attribute that can be associated with a Header
    child element. This relay attribute suggests rules for forwarding a Header child
    element at an intermediate node, if the Header child is not understood by the
    intermediate node and if the mustUnderstand attribute for the child element is
    not set to true.


    Next, you will look at how SOAP 1.1 messages are carried within MIME multipart-related
    messages.


