    <xsl:with-param name="param1" select="''param1''"/>


    </xsl:apply-templates>


    You can declare xsl:variable and xsl:param elements at the top level or in a template.
    Another difference between xsl:param and xsl:variable is that you can declare
    an xsl:param element in an xsl:template element only at the beginning of the template.


