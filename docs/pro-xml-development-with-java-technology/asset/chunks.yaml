    完整支持留给了后续规范。JAXB 2.0 弥补了 JAXB 1.0 中模式支持不完整的缺陷，并为缺失的模式组件添加了绑定支持。具体来说，JAXB 2.0 新增了以下模式支持：


    • 使用 substitutionGroup 属性的元素声明，该属性解析为预定义的模型组模式组件（<xs:element @substitutionGroup>）。


    • 通配符模式组件（xs:any 和 xs:anyAttribute）。


    • 用于指定跨多个元素唯一性的标识约束（xs:key、xs:keyref 和 xs:unique）。


    • 使用 redefine 声明重新定义的 XML Schema 组件（<xs:redefine>）。


    • 表示法 XML Schema 组件（<xs:notation>）。


    • 支持以下模式属性：complexType.abstract、element.abstract、element.substitutionGroup、xsi:type、complexType.block、complexType.final、element.block、element.final、schema.blockDefault
    和 schema.finalDefault。


    JAXB 2.0 的绑定框架增强了 JAXB 1.0 的单向绑定框架，并增加了对双向绑定的支持。JAXB 2.0 增加了对 Java 类绑定到 XML Schema
    组件的支持，如图 6-9 所示。


    **图 6-9.** *JAXB 2.0 支持双向绑定。*


    **注解**


    JAXB 2.0 依赖 J2SE 5.0 注解 5 来支持 XML Schema 与 Java 类型之间的双向映射。注解既用于生成的 Java 内容类，也用于作为输入生成模式定义的
    Java 类中。这些绑定注解定义在 javax.xml.bind.annotation 包中。使用这些注解需要（并且假定）熟悉 J2SE 5.0。表 6-2
    列出了 javax.xml.bind.annotation 包中定义的一些更常用的注解。


    5\. 注解是 Java 编程语言的一种元数据工具，作为 JSR-175 的一部分定义

    (http://www.jcp.org/aboutJava/communityprocess/review/jsr175/)。


    [www.it-ebooks.info](http://www.it-ebooks.info/)

