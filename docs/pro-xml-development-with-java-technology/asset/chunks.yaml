  raw: '• The XSL Formatting Objects (XSL-FO) specification defines an XML vocabulary
    for expressing formatting semantics.


    • The XSLT specification specifies a language for transforming XML documents into
    other XML documents.3


    The original use case that prompted XSLT was this: transform a given XML document
    into a related XML document that specifies formatting semantics in the XSL-FO
    vocabulary. Even though XSLT was originally developed to address this specific
    use case, XSLT was also designed for transformations that have nothing to do with
    XSL-FO. In fact, because XSL-FO is a topic unto itself that is beyond the scope
    of this book, in this chapter we will focus only on XSLT transformations that
    are independent of XSL-FO.


    XSLT language constructs are completely based on XML. Therefore, transformations
    written in XSLT exist as well-formed XML documents. An XML document containing
    XSLT transformations is commonly referred to as a *style sheet*. This is because
    the original use case that prompted XSLT was related to the formatting of XML
    documents.


    An XSLT style sheet merely *specifies* a set of transformations. Therefore, you
    need an XSLT processor to *apply* these transformations to a given XML document.
    An XSLT processor takes an XML document and an XSLT style sheet as inputs, and
    it transforms the given XML document to its target output, according to transformations
    specified in the style sheet. The target output of XSLT transformations is typically
    an XML document but could be an HTML document or any type of text document. Two
    commonly used XSLT processors are Xalan-Java4 and Saxon.5 To use an XSLT processor,
    you need a set of Java APIs, and TrAX6 is precisely such an API set. In the following
    sections, we will first provide an overview of XSLT and then cover TrAX.


    1\. The XSLT specification is available at http://www.w3.org/TR/xslt.


    2\. The XSL family of recommendations is available at http://www.w3.org/Style/XSL/.


    3\. As you will learn in this chapter, XSLT is applicable beyond this original
    specification goal.


    4\. Xalan-Java information is available at http://xml.apache.org/xalan-j/.


    5\. Saxon information is available at http://saxon.sourceforge.net/.


