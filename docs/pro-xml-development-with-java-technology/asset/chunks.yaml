    C H A P T E R 1 4 ■ B U I L D I N G X M L - B A S E D W E B S E R V I C E S


    **Installing the Software**


    Before you can proceed, you need to download and install the Java EE 5 SDK, which
    includes Sun One Application Server 9.0\. The server includes the Java DB database,
    which is based on Apache Derby.13


    After installing the SDK, start the included Java DB database and Sun One Application
    Server 9.0\. On Windows,14 you can select Start Java DB in the Sun One Application
    Server 9.0’s Programs menu to start the database, and select Start Default Server
    to start the server.


    After starting the database and the server, go to http://localhost:8080/ in a
    browser, and verify that the server is running. When the server starts, it prints
    the ports it is listening on, so if http://


    localhost:8080/ does not work, try the other ports listed by server, such as http://localhost:2492/.


    After the server is running, you can go to http://localhost:4848/ to access the
    Sun One Application Server 9.0 administration console. If you are asked to log
    in, specify the username and password you configured during the server installation.
    The administration console provides the Enterprise Applications link for deploying
    enterprise applications and the Web Services link for deploying web services.


    **Setting Up the Eclipse Project**


    You will need J2SE 5.0 to build your Eclipse project. Therefore, install J2SE
    5.0, in case you have not already done so.


    Next, you need to download the Chapter14 project from http://www.apress.com/ and
    import the project into Eclipse by selecting File ➤ Import. It is important that
    your Eclipse workspace not contain any spaces in its file system path; otherwise,
    you will run into problems later in this chapter, as you go through the steps
    for building the example web service. Figure 14-6 shows the Chapter14


    project directory structure.


    **Figure 14-6.** *Project directory structure*


    13\. Apache Derby is part of the Apache DB project (http://db.apache.org/derby/).


    14\. For other platforms, follow the product documentation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


