    ## Setting the Build Path


    The build path of a Java project includes the JAR files and package folders required
    to compile various Java class files in a project. To add JAR files and package
    folders to a project''s build path, select the project node on the Package Explorer
    tab, and select **Project ➤ Properties**. In the Properties dialog box, select
    the **Java Build Path** node, add the external JAR (external to project) files
    by clicking the **Add External JARs** button, and add the internal JAR files by
    clicking the **Add JARs** button. You can add package folders and libraries with
    the **Add Class Folders** and **Add Library** buttons, respectively.


    The JARs and package folders in the project build path appear in the Java Build
    Path window. As an example, it is assumed that `xerces.jar` is an external JAR
    file available at the `C:\JDOM\jdom-1.0\lib` path, and it is added to the Java
    Build Path window with the **Add External JARs** button, as shown in Figure 1-5.


    **Figure 1-5.** *Setting the Java build path*


    ## Creating a Java Package


    To create a Java package within a Java project, select the project node in the
    Package Explorer, and select **File ➤ New ➤ Package**. In the New Java Package
    dialog box, specify a package name, such as `com.apress.chapter1`, and click the
    **Finish** button, as shown in Figure 1-6.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 13](index-43_1.png)


    ![Image 14](index-43_2.png)


    **Figure 1-6.** *Creating a Java package*


    This adds a Java package to the Java project, as shown in Figure 1-7.


    **Figure 1-7.** *Viewing the Java package in Package Explorer*


    ## Creating a Java Class


    To create a Java class, right-click a package node in the Package Explorer, and
    select **New ➤ Class**, as shown in Figure 1-8.


    On the New Java Class screen, specify the class name, class modifiers, and interfaces
    implemented, and then click the **Finish** button, as shown in Figure 1-9.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 15](index-44_1.png)


    ![Image 16](index-44_2.png)


    **Figure 1-8.** *Creating new Java class*


    **Figure 1-9.** *Specifying Java class settings*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 17](index-45_1.png)


    This adds a Java class to the Java project, as shown in Figure 1-10.


    **Figure 1-10.** *Viewing the Java class in the Package Explorer*


    ## Running a Java Application


    To run a Java application, right-click the Java class in the Package Explorer,
    and select **Run As ➤ Run**, as shown in Figure 1-11.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 18](index-46_1.png)


    **Figure 1-11.** *Running a Java application*


    In the Run dialog box, select a Java Application configuration, or create a new
    Java Application configuration by selecting **Java Application ➤ New**, as shown
    in Figure 1-12.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 19](index-47_1.png)


    **Figure 1-12.** *Creating a Java Application configuration*


    This creates a Java Application configuration. If any application arguments are
    to be set, specify the arguments on the **Arguments** tab. To specify the project
    JRE, select the **JRE** tab. The JAR files and packages folders in the build path
    are also automatically included in the Java classpath. You can add classpath JAR
    files and package folders on the **Classpath** tab. To run a Java application,
    click **Run**, as shown in Figure 1-13.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 20](index-48_1.png)


    **Figure 1-13.** *Configuring and running a Java application*


    ## Importing a Java Project


    The Java projects for the applications in this book are available from the Apress
    website (http://www.apress.com). The easiest way to run these applications is
    to download and import these Java projects into Eclipse. Before we cover how to
    import the Chapter1 project, you must delete the Chapter1 project you just created,
    including its contents, by selecting it and hitting the **Delete** key. Be sure
    to choose the option to delete the contents when prompted.


    To import a Java project, select **File ➤ Import**. In the Import dialog box,
    select **Existing Projects into Workspace**, and click **Next**, as shown in Figure
    1-14.


    In the Import Projects dialog box, select a project directory with the **Browse**
    button. Select a directory in the Browse for Folder dialog box, and click **OK**,
    as shown in Figure 1-15. Click **Finish** to import the project directory.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 21](index-49_1.png)


    ![Image 22](index-49_2.png)


    **Figure 1-14.** *Importing a project*


    **Figure 1-15.** *Selecting a directory*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 23](index-50_1.png)


    This imports a Java project into the Eclipse IDE, as shown in Figure 1-16.


    **Figure 1-16.** *Viewing the project in the Package Explorer*


    ## Summary


    In this chapter, we noted the different APIs that we will cover in detail in subsequent
    chapters and offered quick primers on XML and XML Schema. We also introduced the
    Eclipse IDE, which was used to build and execute all the example applications
    included in this book. In the next chapter, we will discuss XML parsing in detail
    using the DOM, SAX, and StAX APIs.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


