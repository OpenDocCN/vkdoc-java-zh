    \nThe abstract messages are used by `wsdl:operation`s within `wsdl:portType`,\
    \ as discussed in the next section.\n\n## Port Type\n\nJust like a Java interface,\
    \ the `wsdl:portType` element describes an abstract web service interface. Each\
    \ `wsdl:portType` element contains one or more `wsdl:operation` elements, whereby\
    \ each `wsdl:operation` element defines the message exchange pattern for that\
    \ `wsdl:operation`.\n\nA `wsdl:operation` element in the most general request-response\
    \ message exchange pattern case contains a `wsdl:input` element, a `wsdl:output`\
    \ element, and zero or more `wsdl:fault` elements, where each of these elements\
    \ is associated with a `wsdl:message` definition through the `message` attribute.\
    \ `wsdl:input`, as the name implies, defines the request message, `wsdl:output`\
    \ defines the response message, and `wsdl:fault` defines the details of the SOAP\
    \ fault message. An example of a request-response `wsdl:operation` is `download`,\
    \ as shown here:\n\n```\n<wsdl:operation name=\"download\" >\n  <wsdl:input message=\"\
    defs:DownloadProject\" name=\"project\" >\n  </wsdl:input>\n  <wsdl:output message=\"\
    defs:DownloadZip\" name=\"downloadZip\" >\n  </wsdl:output>\n  <wsdl:fault message=\"\
    defs:ProjectFault\" name=\"fault\" >\n  </wsdl:fault>\n</wsdl:operation>\n```\n\
    \nIn `download` `wsdl:operation` shown previously, `defs:DownloadProject`, `defs:DownloadZip`,\
    \ and `defs:ProjectFault` are abstract messages that are used in the request-response\
    \ message exchange pattern.\n\nFor a one-way exchange pattern, only a single `wsdl:input`\
    \ element is required, as in the case of `remove` `wsdl:operation` shown here:\n\
    \n```\n<wsdl:operation name=\"remove\" >\n  <wsdl:input message=\"defs:RemoveProject\"\
    \ name=\"project\" >\n  </wsdl:input>\n</wsdl:operation>\n```\n\nYou cannot specify\
    \ a `wsdl:fault` message without a `wsdl:output` message, because a SOAP fault\
    \ message is generated only if a response was expected. So, for example, you cannot\
    \ add a `wsdl:fault` to a `wsdl:operation` named `remove`.\n\nThe `wsdl:portType`\
    \ for the example web service is named `ProjectPortType`, and it defines the following\
    \ `wsdl:operation` for the use case scenarios:\n\n- Uploading documents to a project\
    \ is defined by `upload`.\n- Downloading documents from a project is defined by\
    \ `download`.\n- Getting information about all the projects owned by a user is\
    \ defined by `getProjects`.\n- Removing documents from a project is defined by\
    \ `remove`.\n- An `authenticate` operation, which is not required for these use\
    \ cases, can be used to authenticate a user and keep user information in an HTTP\
    \ session.\n\nListing 14-9 shows the complete `wsdl:portType` for the example\
    \ web service.\n\n**Listing 14-9.** *Port Types for the Example Web Service*\n\
