- fmt: "# Building XML-Based Web Services\n\nIf a `wsdl:part`, mapped to the `soapenv:Body`\
    \ element, corresponds to a schema type (that is, it has a `type` attribute) in\
    \ the document-style message, then the `soapenv:Body` element assumes this schema\
    \ type, and the child elements of `soapenv:Body` conform to this schema type.\
    \ This implies that in the case of a `wsdl:part` with a `type` attribute, there\
    \ can be only one `wsdl:part` in its `wsdl:message`, since the `soapenv:Body`\
    \ element can assume only a single schema type.\n\n`Listing 14-1` is an example\
    \ of document-style message. You will see examples of specifying document style\
    \ in the `wsdl:operation` to `soap:operation` binding in the next section.\n\n\
    ## Binding `wsdl:operation` to SOAP 1.1\n\nThis is where you make a `wsdl:operation`\
    \ concrete by binding each `wsdl:operation` to SOAP 1.1 messaging. For example,\
    \ the binding of `download` `wsdl:operation` to SOAP 1.1 consists of the following\
    \ parts:\n\n- Defining a `soap:operation` with a `soapAction` and SOAP 1.1 messaging\
    \ style. A `soapAction` is a hint to message processing nodes, which, according\
    \ to WS-I BP 1.1, helps improve interoperability between applications. It is transported\
    \ as an HTTP header attribute. It is essentially a mechanism to infer something\
    \ about a SOAP message by just looking at the HTTP header, without having to inspect\
    \ the SOAP message.\n- Binding a `wsdl:input` abstract message to `soap:header`\
    \ and `soap:body`.\n- Binding `wsdl:output` to a `mime:multipartRelated` message.\n\
    - Binding `wsdl:fault` to `soap:fault`.\n\nWe explain each of the previous steps\
    \ in the following sections.\n\n### Defining `soap:operation`\n\nThe `soap:operation`\
    \ binding for `download` `wsdl:operation` is defined as follows:\n\n```xml\n<soap:operation\n\
    \    soapAction=\"http://www.apress.com/xmljava/webservices/download\"\n    style=\"\
    document\" >\n</soap:operation>\n```\n\nRemember, each SOAP 1.1 message is transported\
    \ within an HTTP message. The URI in the `soapAction` attribute of `soap:operation`\
    \ is included as the value of the `SOAPAction` HTTP header.\n\n### Binding `wsdl:input`\n\
    \nThe `wsdl:input` in a `download` operation is based on the `defs:DownloadProject`\
    \ abstract message, which defines two `wsdl:part` elements, as shown here:\n\n\
    ```xml\n<wsdl:message name=\"DownloadProject\" >\n    <wsdl:part element=\"types:userInfo\"\
    \ name=\"user\" ></wsdl:part>\n    <wsdl:part element=\"types:project\" name=\"\
    project\" ></wsdl:part>\n</wsdl:message>\n```\n\nWhen `defs:DownloadProject` is\
    \ bound to a SOAP 1.1 message, you can choose to bind the `user` part to the `soap:header`\
    \ element and the `project` part to the `soap:body` element, as shown here:\n\n\
    ```xml\n<wsdl:input>\n    <soap:header message=\"defs:DownloadProject\"\n    \
    \             part=\"user\" use=\"literal\" >\n    </soap:header>\n    <soap:body\
    \ parts=\"project\" use=\"literal\" ></soap:body>\n</wsdl:input>\n```\n\n### Binding\
