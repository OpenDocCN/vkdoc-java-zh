- fmt: "```xml\n</xsd:sequence>\n</xsd:complexType>\n```\n\n## Attribute Declarations\n\
    \nYou can specify an attribute declaration in a schema with the `attribute` construct.\
    \ You can specify an attribute declaration within a schema or a `complexType`.\
    \ For example, if you want to define the `title` and `publisher` attributes in\
    \ the `catalogType` complex type, you can do so as shown here:\n\n```xml\n<xsd:complexType\
    \ name=\"catalogType\">\n  <xsd:sequence>\n    <xsd:element ref=\"journal\" minOccurs=\"\
    0\" maxOccurs=\"unbounded\" />\n  </xsd:sequence>\n  <xsd:attribute name=\"title\"\
    \ type=\"xsd:string\" use=\"required\" />\n  <xsd:attribute name=\"publisher\"\
    \ type=\"xsd:string\"\n                 use=\"optional\" default=\"Unknown\" />\n\
    </xsd:complexType>\n```\n\nAn attribute declaration may specify a `use` attribute,\
    \ with a value of `optional` or `required`. The default `use` value for an attribute\
    \ is `optional`. In addition, an attribute can specify a default value using the\
    \ `default` attribute, as shown in the previous example. When an XML document\
    \ instance does not specify an optional attribute with a default value, an attribute\
    \ with the default value is assumed during document validation with respect to\
    \ its schema. Clearly, an attribute with a default value cannot be a required\
    \ attribute.\n\n## Attribute Groups\n\nAn `attributeGroup` construct specifies\
    \ a group of attributes. For example, if you want to define the attributes for\
    \ a `catalogType` as an attribute group, you can define a `catalogAttrGroup` attribute\
    \ group, as shown here:\n\n```xml\n<xsd:attributeGroup name=\"catalogAttrGroup\"\
    \ >\n  <xsd:attribute name=\"title\" type=\"xsd:string\" use=\"required\" />\n\
    \  <xsd:attribute default=\"Unknown\" name=\"publisher\"\n                 type=\"\
    xsd:string\" use=\"optional\" />\n</xsd:attributeGroup>\n```\n\nYou can specify\
    \ an `attributeGroup` in a schema, `complexType`, and `attributeGroup`. You can\
    \ specify the `catalogAttrGroup` shown previously within the `schema` element\
    \ and can reference it using the `ref` attribute in the `catalogType` complex\
    \ type, as shown here:\n\n```xml\n<xsd:complexType name=\"catalogType\" >\n  <xsd:sequence>\n\
    \    <xsd:element maxOccurs=\"unbounded\" minOccurs=\"0\" ref=\"journal\" />\n\
    \  </xsd:sequence>\n  <xsd:attributeGroup ref=\"catalogAttrGroup\" />\n</xsd:complexType>\n\
    ```\n\n## Simple Content\n\nA `simpleContent` construct specifies a constraint\
    \ on character data and attributes. You specify a `simpleContent` construct in\
    \ a `complexType` construct. Two types of simple content constructs exist: an\
    \ extension and a restriction.\n\nYou specify `simpleContent` extension with an\
    \ `extension` construct. If you want to define an `authorType` as an element that\
    \ allows a string type in its content and also allows an `email` attribute, you\
    \ can do so using a `simpleContent` extension that adds an `email` attribute to\
    \ a string built-in type, as shown here:\n\n```xml\n<xsd:complexType name=\"authorType\"\
    \ >\n  <xsd:simpleContent>\n    <xsd:extension base=\"xsd:string\" >\n      <xsd:attribute\
    \ name=\"email\" type=\"xsd:string\" use=\"optional\" />\n    </xsd:extension>\n\
    \  </xsd:simpleContent>\n</xsd:complexType>\n```\n\nYou specify a `simpleContent`\
    \ restriction with a `restriction` element. If you want to define a `titleType`\
    \ as an element that allows a string type in its content but restricts the length\
    \ of this content to between 10 to 256 characters, you can do so using a `simpleContent`\
    \ restriction that adds the `minLength` and `maxLength` constraining facets to\
    \ a string base type, as shown here:\n\n```xml\n<xsd:complexType name=\"titleType\"\
    \ >\n  <xsd:simpleContent>\n    <xsd:restriction base=\"xsd:string\" >\n     \
    \ <xsd:minLength value=\"10\" />\n      <xsd:maxLength value=\"256\" />\n    </xsd:restriction>\n\
    \  </xsd:simpleContent>\n</xsd:complexType>\n```\n\n## Constraining Facets\n\n\
    Constraining facets are a powerful mechanism for restricting the content of a\
    \ built-in simple type. We already looked at the use of two constraining facets\
    \ in the context of a simple content construct."
