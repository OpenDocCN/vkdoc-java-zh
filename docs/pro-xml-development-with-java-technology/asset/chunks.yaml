    **解组 XML 文档**


    解组是指从 XML 文档创建 Java 对象树。在示例用例中，网站接收到一个包含目录信息的 XML 文档，它需要先解组该文档，然后才能处理文档中包含的目录信息。在本节中，我们将首先展示如何使用
    JAXB API 解组示例 XML 文档，随后展示如何访问生成的 Java 对象树中的各种元素和属性值。


    要执行解组，需要遵循以下步骤：


    **1.** 示例 XML 文档 `catalog.xml`（清单 6-7）是解组的起点。

    因此，通过选择 **File** ➤ **Import**，将 `catalog.xml` 导入到 Eclipse 的 Chapter6 项目中。


    **2.** 创建一个 `JAXBContext` 对象，并使用该对象创建一个 `UnMarshaller` 对象。


    **3.** `Unmarshaller` 类将 XML 文档转换为 Java 对象。


    如上一节所述，创建一个 `JAXBContext` 对象，该对象实现了 JAXB 绑定框架的操作 `unmarshal()` 和 `validate()`。


    你需要一个 `Unmarshaller` 对象来将 XML 文档解组为 Java 对象。因此，使用 `JAXBContext` 类的 `createUnmarshaller()`
    方法创建一个 `UnMarshaller` 对象，如下所示：


    Unmarshaller unMarshaller=jaxbContext.createUnmarshaller(); `Unmarshaller` 类具有重载的
    `unmarshal()` 方法用于解组。要验证正在解组的 XML 文档，请使用 `setValidating(boolean)` 方法将 `Unmarshaller`
    对象设置为可验证，如下所示：


    unMarshaller.setValidating(true);


    要创建 XML 文档的 Java 对象表示，请解组 XML 文档以获得一个 `Catalog` 对象：


    Catalog catalog=(Catalog)(unMarshaller.unmarshal(xmlDocument));


