- fmt: 'Now, assume you want to query this collection for information about the driver’s
    side wiper blade. Since we have not yet talked about how you can query a collection,
    you will ignore the mechanics of putting together a query and instead look at
    an example query from a purely intuitive standpoint. Here is an example query
    that would extract information related to the driver’s side blade using the Xindice
    command tool and the XPath query language:


    ```

    xindice xpath

    –c /db/parts/Ford/Mustang/2006/Convertible/

    –q "/wipers/blade[@location=''driver'']"

    ```


    Can you intuitively see what is going on? Ignore everything in this query for
    now except for the collection context, which is `/db/parts/Ford/Mustang/2006/Convertible/`,
    and the XPath query, which is `"/wipers/blade[@location=''driver'']"`. Based on
    these two pieces alone, you can intuitively see that the query searches the given
    collection context for all the `blade` elements that are nested within a `wipers`
    element and that have a `location` attribute equal to `driver`. All elements that
    match this XPath expression no matter which document they are in are returned
    by this query.


    It is of course entirely reasonable to assume that in addition to documents related
    to windshield wipers, you may choose to store other XML documents in this collection
    that contain data about other parts associated with this specific car. The key
    take-away from this simple example is that how you organize your collections and
    documents is entirely up to the needs of your application, as long as you keep
    in mind the following important points:


    - Within a collection, you are allowed to store collections or XML documents.

    - `Xindice` will not complain if objects of different types within a collection
    have the same name.

    - You need to be aware that there is a precedence order that resolves name conflicts
    among different types of objects, and this order is as follows: collection and
    XML document. The most practical thing to do is to of course not have any name
    conflicts among different types of objects within a collection.

    - `Xindice` is designed to store small- to medium-sized documents, so avoid storing
    large XML documents. It is recommended that you break up large documents into
    separate smaller documents.


    `Xindice` database content may be accessed and modified using either the `XML:DB`
    API or the `Xindice` command-line tool. In this chapter, we will first discuss
    the command-line tool and then the `XML:DB` API. However, before we can do either,
    you need to download and install the `Xindice` software, which is what we will
    discuss next.


    ## Installing the Xindice Software


    The `Xindice` database is installed as a web application in a J2EE application
    server such as JBoss.


    To install an instance of the `Xindice` database, you need the `Xindice` API JAR
    files and the `Xindice` web application. Therefore, download `xml-xindice-1.1b4-jar.zip`
    (version 1.1 b4 Binary (JAR)), which contains the `Xindice` `XML:DB` API JAR files,
    and `xml-xindice-1.1b4-war.zip` (version 1.1 b4 Binary (webapp)), which contains
    the `Xindice` web application. Extract the contents of the `xml-xindice-1.1b4-jar.zip`
    and `xml-xindice-1.1b4-war.zip` archive files to your desired `Xindice` installation
    directory, for example, `C:/`. There is duplication of some files in these archives,
    so it is all right to overwrite files while extracting files from these archives.


    To run the `Xindice` database, you need Apache Xerces or the Xerces2 XML parser
    classes in the classpath. By default, `Xindice` will use whatever XML parser classes
    are available in the JRE that you use with `Xindice`. Since the XML parser classes
    included in J2SE 1.4.2 are based on the Crimson parser, using `Xindice` 1.1b4
    with J2SE 1.4.2 generates errors. To avoid these errors, the easiest thing to
    do is to use J2SE 5.0, since J2SE 5.0 includes the Xerces2 parser classes.


    Before you can proceed, you need to deploy the `Xindice` web application within
    an application server. In the next section, we will cover how to deploy `Xindice`
    within the JBoss 4.0.2 application server.


    ## Configuring Xindice with the JBoss Server


    For the purpose of this discussion, we’ll assume you have access to an installation
    of the JBoss 4.0.2 application server. Assuming `<jboss-4.0.2>` is the JBoss 4.0.2
    installation directory, you need to set the `JAVA_HOME` variable in the `<jboss-4.0.2>\bin\run`
    batch file to J2SE 5.0. Also, assuming `<Xindice>` is the `Xindice` installation
    directory, you need to rename `<Xindice>/xindice-1.1b4/xindice-1.1b4.war` to `xindice.war`
    and then copy the `xindice.war` file to the `<jboss-4.0.2>\server\default\deploy`
    directory.


    The default `Xindice` database location is `[Xindice-Web-Application-directory]/WEB-INF/db`,
    where `Xindice-Web-Application-directory` is a temporary directory that is automatically
    created by the JBoss application server when `xindice.war` is deployed. Most likely,
    you will want to modify this default location. To modify this default database
    location, you have two options:


    - Your first option is to edit the `WEB-INF/system.xml` file in the `xindice.war`
    file and set the `dbroot` attribute in the `root-collection` element to your desired
    location for the `Xindice` database. For example, the following entry in `system.xml`
    specifies the database location to be `C:/xindice/db/`:


    ```

    <root-collection dbroot="C:/xindice/db/" name="db" use-metadata="on" >

    ```


    To edit `system.xml`, you will of course need to expand the `xindice.war` archive
    file, edit the file, and then rebuild the archive file.


    - Your second option is to set a Java system property called `xindice.db.home`
    to your desired database location. You can set this property in the `<jboss-4.0.2>\bin\run`
    batch file that is used to start the JBoss application server.


    To open the default `Xindice` database, you need to start the JBoss server. Start
    the JBoss server through the `<jboss-4.0.2>\bin\run` batch file. When the JBoss
    server starts, the `Xindice` server web application gets deployed, and at this
    point the `Xindice` database is ready for access. Assuming the JBoss application
    server is listening on its default web port of 8080, the root collection context
    path is given by `xmldb:xindice://localhost:8080/db`. To check whether `Xindice`
    is running on JBoss, invoke the URL `http://localhost:8080/xindice` in a browser
    (assuming of course that your JBoss server is listening on port 8080 on the local
    host).


    To access the `Xindice` database using the `Xindice` command-line tool and to
    run the `Xindice` Java application code examples included in this project, you
    need to create an Eclipse Java project, which is discussed next.


    ## Creating an Eclipse Project


    You can download the `Chapter8` project from the Apress website (http://www.apress.com)
    and import it into your Eclipse workspace.


    You need to add some `Xindice` JAR files to the Java build path of the `Chapter8`
    project.'
  raw: 'Now, assume you want to query this collection for information about the driver’s
    side wiper blade. Since we have not yet talked about how you can query a collection,
    you will ignore the mechanics of putting together a query and instead look at
    an example query from a purely intuitive standpoint. Here is an example query
    that would extract information related to the driver’s side blade using the Xindice
    command tool and the XPath query language:


    xindice xpath


    –c /db/parts/Ford/Mustang/2006/Convertible/


    –q "/wipers/blade[@location=''driver'']"


    Can you intuitively see what is going on? Ignore everything in this query for
    now except for the collection context, which is /db/parts/Ford/Mustang/2006/Convertible/,
    and the XPath query, which is "/wipers/blade[@location=''driver'']". Based on
    these two pieces alone, you can intuitively see that the query searches the given
    collection context for all the blade elements that are nested within a wipers
    element and that have a location attribute equal to driver. All elements that
    match this XPath expression no matter which document they are in are returned
    by this query.


