- fmt: '# Accessing XML with XPath


    Accessing element and attribute values in an XML document with an XPath expression
    is more efficient than using getter methods in the DOM API, because, with XPath
    expressions, you can select an `Element` node without programmatically iterating
    over a node list. To use the DOM API, you must first retrieve a node list with
    the DOM API getter method and then iterate over this node list to retrieve relevant
    element nodes.


    These are the two major advantages of using the XPath API over the DOM API:


    - You can select element nodes though an imperative XPath expression, and you
    do not need to iterate over a node list to select the relevant element node.

    - With an XPath expression, you can select an `Attr` node directly, in contrast
    to DOM API getter methods, where an `Element` node needs to be accessed before
    an `Attr` node can be accessed.


    As an illustration of the first advantage, you can retrieve the `title` element
    within the `article` context node in the example data model shown in Figure 4-2
    with the XPath expression `/catalog/journal/article[2]/title`, and you can evaluate
    this XPath expression using the code shown in Listing 4-2, which results in retrieving
    the relevant `title` element. At this point, we don''t expect you to understand
    the code in Listing 4-2. The sole purpose of showing this code now is to illustrate
    the comparative brevity of XPath API code, as compared to DOM API code.


    **Listing 4-2.** *Addressing a Node with XPath*


    ```

    Element article=(Element)(xPath.evaluate("/catalog/journal/article[2]/title",
    inputSource,XPathConstants.NODE));

    ```


    By way of contrast, if you need to retrieve the same `title` element with DOM
    API getter methods, you need to iterate over a node list, as shown in Listing
    4-3.


    **Listing 4-3.** *Retrieving a Node with the DOM*


    ```

    NodeList nodeList=document.getElementsByTagName("journal");

    Element journal=(Element)(nodeList.item(0));


    NodeList nodeList2=journal.getElementsByTagName("article");

    Element article=(Element)nodeList2.item(1);

    ```


    As an illustration of the second advantage, you can retrieve the value of the
    `level` attribute for the `article` node with the date `January-2004` directly
    with the XPath expression `/catalog/journal/article[@date=''January-2004'']/@level`,
    as shown in Listing 4-4.


    **Listing 4-4.** *Retrieving an Attribute Node with XPath*


    ```

    String level = xPath.evaluate("/catalog/journal/article[@date=''January-2004'']/@level",
    inputSource);

    ```


    Suffice it to say that to achieve the same result with the DOM API, you would
    need to write code that is far more tedious than that shown in Listing 4-4. It
    would involve finding all the `journal` elements, finding all the `article` elements
    for each `journal` element, iterating over those `article` elements, and retrieving
    the `date` attribute for each `article` element, checking to see whether the `date`
    attribute''s value is `January-2004`, and if so, retrieving the `article` element''s
    `level` attribute.


    The preceding discussion should not suggest that the DOM API is *never* useful
    for accessing content information. In fact, sometimes you will be interested in
    accessing all the nodes in a given element subtree. In such a situation, it makes
    perfect sense to access the relevant node through an XPath API and then access
    its node subtree using the DOM API.


    Let''s proceed with creating the XPath API–based application. To that end, you
    will need to first create and configure an Eclipse project.


    ## Setting Up the Eclipse Project


    Before you can build and run the code examples included in this chapter, you need
    an Eclipse project.


    The quickest way to create the Eclipse project is to download the `Chapter4` project
    from Apress (http://www.apress.com) and import this project into Eclipse. This
    will create all the Java packages and files needed for this chapter automatically.


    In this chapter, you will use two XPath APIs: the JAXP 1.3 XPath API included
    in J2SE 5.0 and the JDOM XPath API. To use J2SE 5.0''s XPath API, install the
    J2SE 5.09 SDK, set its JRE system library as the JRE system library in your Eclipse
    project Java build path, and set the Java compiler to the J2SE 5.0 compiler under
    the Eclipse project''s Java compiler. The Java build path in your Eclipse project
    should look like Figure 4-3.


    **Figure 4-3.** *XPath project Java build path in Eclipse IDE*


    9. For more information about J2SE 5.0, see http://java.sun.com/j2se/1.5.0/.


    The complete Eclipse project package structure should look like Figure 4-4.


    **Figure 4-4.** *Eclipse project package structure*


    Now, you are ready to proceed with the application. Since the example''s goal
    is to impart comprehensive information about how to use the XPath APIs, we will
    use different XPath expressions in the sample application to illustrate various
    aspects of the XPath API. Overall, you will examine two specific XPath APIs:


    - The first API is specified in JAXP 1.3 and is included in J2SE 5.0. It is the
    recommended API if you decide to base your application on the Java 5 platform.
    An obvious advantage of this approach is that it is completely standards based,
    and in our opinion, this should be the preferred approach.

    - The second API is based on JDOM, and it is recommended for use if you are not
    yet ready to move to the J2SE 5.0 API or if you find certain aspects of this API
    simpler to use, compared to the J2SE 5.0 API. In our opinion, this API is simple
    to use and easy to understand. However, since it is currently not a standard,
    it may continue to change, which may affect the stability of your application.


    ## JAXP 1.3 XPath API


    The JAXP 1.3 XPath API is defined in the `javax.xml.xpath` package in J2SE 5.0.
    This package defines various interfaces to evaluate XPath expressions. Table 4-1
    lists some of the relevant classes and interfaces in J2SE 5.0.


    **Table 4-1.** *J2SE 5.0 XPath*


    | Class or Interface | Description |

    | --- | --- |

    | `XPath` (interface) | Provides access to the XPath evaluation environment and
    provides `evaluate()` methods to evaluate XPath expressions in an XML document
    |

    | `XPathExpression` (interface) | Provides `evaluate()` methods to evaluate compiled
    XPath expressions in an XML document |

    | `XPathFactory` (class) | Creates an `XPath` object |


    For this example, the example XML document shown in Listing 4-1 is evaluated with
    the `javax.xml.xpath.XPath` class, and relevant node sets are extracted with the
    XPath API. The `evaluate()` methods in `XPath` and the `XPathExpression` interfaces
    are used to access various document node sets, based on the relevant XPath expressions.


    XPath expressions may be explicitly compiled before use, or they may be evaluated
    directly. The main advantage of explicitly compiling an XPath expression is to
    validate an expression for correctness, prior to evaluation, and to promote the
    reuse of an expression in multiple evaluations. Let''s assume you are interested
    in learning about the explicit compilation of XPath expressions, so we will cover
    that next.


    ### Explicitly Compiling an XPath Expression


    Say you need an `XPath` object to compile an XPath expression. You can use the
    `XPathFactory` factory class to create `XPath` objects. To create an `XPath` object,
    first create an `XPathFactory` object with the static method `newInstance()` of
    the `XPathFactory` class, as shown in Listing 4-5. The `newInstance()` method
    uses the default object model, `DEFAULT_OBJECT_MODEL_URI`, which is based on the
    W3C DOM.'
