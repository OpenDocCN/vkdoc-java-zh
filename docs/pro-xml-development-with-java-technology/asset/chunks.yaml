    while (xmlStreamReader.hasNext()) {


    int event = xmlStreamReader.next();


    }


    The next() method returns an int, which corresponds to a parsing event, as specified
    by an XMLStreamConstants constant. Table 2-13 lists the event types returned by
    the XMLStreamReader object.'
