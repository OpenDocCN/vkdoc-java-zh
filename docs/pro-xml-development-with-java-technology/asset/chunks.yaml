    在原生 XML 数据库 Xindice 中存储 XML


    **原**生 XML 数据库定义了一种用于存储、检索和更新 XML 文档的逻辑模型。XML 文档是原生 XML 数据库中的存储单元。原生 XML 数据库将
    XML 文档存储为集合，这些集合可以被查询、更新和修改。存储在原生 XML 数据库集合中的 XML 文档不受任何模式的约束；这与关系数据库不同，关系数据库中存储的数据受底层数据库模式的约束。你可以使用
    XPath 查询原生 XML 数据库；也可以使用 XML:DB XUpdate 语言更新原生 XML 数据库。


    大多数关系数据库也支持 XML 存储；因此，比较原生 XML 数据库中的 XML 存储与关系数据库中的 XML 存储是很有必要的。表 8-1 提供了这样的比较。


