    Now you are ready to look at the SOAP 1.1 processing model.


    ## SOAP 1.1 Processing Model


    SOAP 1.1 defines only a simple one-way message exchange pattern, going from an
    initial sender to an ultimate receiver, possibly via intermediate nodes. However,
    more complex message patterns such as the request-response pattern can be built
    upon the one-way pattern. The message processing rules are as follows:


    - Any intermediate node must process a header block, if the intermediate node
    can assume the `soapenv:actor` role specified for the header block and if the
    `soapenv:mustUnderstand` attribute for the header block is set to 1. Failure to
    process such a header block must return a `soapenv:Fault` message with a `soapenv:MustUnderstand`
    fault code subelement.

    - Any intermediate node must remove header blocks processed by it, before forwarding
    the message to the next node along the message path. An intermediate node may
    of course add back a header block after processing and removing it, if it needs
    to target the header block at another node along the message path.

    - The generally expected convention is that only the ultimate receiver is expected
    to process the `soapenv:Body` element, although there is nothing to that effect
    in SOAP 1.1 or in WS-I BP 1.1. If you choose to violate this convention, consider
    its implications carefully.

    - A SOAP 1.1 fault can be returned only if a response is expected. If any node
    returns a fault, that fault must be propagated back to the initial sender, in
    place of a response.


    In the next section, you will look at the important differences between SOAP 1.1
    and SOAP 1.2.


    ## SOAP 1.2 and SOAP 1.1 Differences


    Remember, WS-I BP 1.1 does not explicitly support SOAP 1.2, so we do not recommend
    it at this point. However, at some point in the near future, it will be widely
    adopted, so it is important to familiarize yourself with the general differences
    between SOAP 1.1 and SOAP 1.2.


    The most notable difference between SOAP 1.1 and SOAP 1.2 is that the SOAP 1.2
    processing model is much more explicit than the SOAP 1.1 processing model. In
    fact, SOAP 1.2 has adopted many of the processing model requirements specified
    in WS-I BP 1.1 to improve interoperability. So, from the point of view of improving
    interoperability, SOAP 1.2 is almost the same as SOAP 1.1 plus WS-I BP 1.1.


    Other important differences between SOAP 1.1 and SOAP 1.2 are as follows:


    - The most important difference is of course that SOAP 1.2 is associated with
    a new namespace: `http://www.w3.org/2003/05/soap-envelope`. This means a SOAP
    1.1 node receiving a SOAP 1.2 message will generate a `VersionMismatch` SOAP fault.
    A SOAP 1.2 node may choose to process a SOAP 1.1 message as a SOAP 1.1 message
    or generate a `VersionMismatch` SOAP fault.

    - SOAP 1.2 introduces the concept of SOAP *roles*. At a given point of time, a
    SOAP node assumes a specific SOAP 1.2 role, which is identified by a URI. Three
    special roles—`next`, `none`, and `ultimateReceiver`—are defined in SOAP 1.2;
    each of those roles is associated with a unique URI. The SOAP 1.2 `role` attribute
    replaces the SOAP 1.1 `actor` attribute for Header child elements. The importance
    of this change is that all along, the semantics associated with the SOAP 1.1 `actor`
    attribute were what one would normally ascribe to a role; SOAP 1.2 finally clarifies
    this issue by changing the name of the attribute to `role`.

    - SOAP 1.2 introduces a `relay` attribute that can be associated with a Header
    child element. This `relay` attribute suggests rules for forwarding a Header child
    element at an intermediate node, if the Header child is not understood by the
    intermediate node and if the `mustUnderstand` attribute for the child element
    is not set to `true`.


    Next, you will look at how SOAP 1.1 messages are carried within MIME multipart-related
    messages.


    ## SOAP 1.1 Message with Attachments


    You’ll now revisit the use case scenarios to see what the request-response message
    exchange for the second use case, downloading a project, looks like. Listing 14-4
    shows the request message for downloading a project.


