    Binding wsdl:operation to SOAP 1.1


    This is where you make a wsdl:operation concrete by binding each wsdl:operation
    to SOAP 1.1


    messaging. For example, the binding of download wsdl:operation to SOAP 1.1 consists
    of the following parts:


    • Defining a soap:operation with a soapAction and SOAP 1.1 messaging style. A
    soapAction is a hint to message processing nodes, which, according to WS-I BP
    1.1, helps improve interoperability between applications. It is transported as
    an HTTP header attribute. It is essentially a mechanism to infer something about
    a SOAP message by just looking at the HTTP header, without having to inspect the
    SOAP message.


    • Bindin g a wsdl:input abstract message to soap:header and soap:body.


    • Binding wsdl:output to a mime:multipartRelated message.


    • Binding wsdl:fault to soap:fault.


    We explain each of the previous steps in the following sections.


    **Defining soap:operation**


    The soap:operation binding for download wsdl:operation is defined as follows:


    <soap:operation


    soapAction="http://www.apress.com/xmljava/webservices/download"


    style="document" >


    </soap:operation>


    Remember, each SOAP 1.1 message is transported within an HTTP message. The URI
    in the soapAction attribute of soap:operation is included as the value of the
    SOAPAction HTTP header.


    **Binding wsdl:input**


    The wsdl:input in a download operation is based on the defs:DownloadProject abstract
    message, which defines two wsdl:part elements, as shown here:


    <wsdl:message name="DownloadProject" >


    <wsdl:part element="types:userInfo" name="user" ></wsdl:part>


    <wsdl:part element="types:project" name="project" ></wsdl:part>


    </wsdl:message>


    When defs:DownloadProject is bound to a SOAP 1.1 message, you can choose to bind
    the user part to the soap:header element and the project part to the soap:body
    element, as shown here:


    <wsdl:input>


    <soap:header message="defs:DownloadProject"


    part="user" use="literal" >


    </soap:header>


    <soap:body parts="project" use="literal" ></soap:body>


    </wsdl:input>


