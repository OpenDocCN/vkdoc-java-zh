    **Figure 8-4.** *XIndiceDB.java application environment variables* **Using the
    Xindice Command-line Tool**


    The following sections focus on details related to using the Xindice command-line
    tool.


    **Command Syntax**


    You access the Xindice command-line tool with the xindice command. The basic syntax
    of the xindice command is as follows:


    xindice action [switch] [parameter]


    Table 8-4 lists the commonly used xindice command action values.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C08.fm Page 223 Saturday, August 12, 2006 5:05 AM


    C H A P T E R 8 ■ S T O R I N G X M L I N N A T I V E X M L D A T A B A S E S
    : X I N D I C E


    **223**


    **Table 8-4.** *Xindice Command Action Values*


    **Xindice Action**


    **Description**


    ac


    Adds a collection


    dc


    Deletes a collection


    ad


    Adds a document


    dd


    Deletes a document


    lc


    Lists the collections


    rd


    Retrieves a document


    ld


    Lists documents in a collection


    xpath


    Queries a document using XPath


    xupdate


    Updates a document using XUpdate


    Table 8-5 lists frequently used xindice command switch values.


    **Table 8-5.** *Xindice Command Switch Values*


    **Xindice Switch**


    **Description**


    -c


    Specifies a collection context. The context syntax is of the format xmldb:xindice://host:port/db.


    -f


    Specifies a file path.


    -n


    Specifies a name.


    -q


    Specifies an XPath query.


    **Command Configuration in Eclipse**


    You will run the xindice command in Eclipse. Therefore, configure xindice as an
    external tool in Eclipse. To configure xindice as an external tool, select Run
    ➤ External Tools. In the External Tools area, you need to create a new Program
    configuration, which you do by right-clicking the Program node and selecting New.
    This adds a new configuration, as shown in Figure 8-5\. In the new configuration,
    specify a name for the configuration, and in the Location field, specify a path
    to the xindice batch or shell file, which resides in the xindice-1.1b4/bin folder.


    You also need to set the working directory and program arguments. To set the working
    directory, click the Variables button for the Working Directory field, and select
    the container_loc variable.


    This specifies a value of ${container_loc} in the Working Directory field. This
    value implies that whatever file is selected at the time xindice is run, that
    file’s parent directory becomes the working directory for xindice. Figure 8-5
    shows the XINDICE external tools configuration.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 62](index-243_1.png)


    Vohra_706-0C08.fm Page 224 Saturday, August 12, 2006 5:05 AM


    **224**


    C H A P T E R 8 ■ S T O R I N G X M L I N N A T I V E X M L D A T A B A S E S
    : X I N D I C E


    **Figure 8-5.** *XINDICE external tools configuration* In the Arguments field,
    you need to set the arguments passed to the xindice command. You can do that by
    clicking the Variables button for the Arguments field and selecting the variable
    resource_loc. The value ${resource_loc} means that whatever file is selected at
    the time xindice is run, that file becomes an argument to xindice. If the directory
    in which Eclipse is installed has empty spaces in its path name, enclose ${resource_loc}
    within double quotes. Because the arguments depend on the Xindice database operation,
    arguments are not specified in Figure 8-5\. To store the new configuration, click
    the Apply button. You also need to set the environment variable JAVA_HOME for
    the XINDICE external tools configuration. Select the Environment tab, and add
    the JAVA_HOME environment variable by clicking the New button, as shown in Figure
    8-6.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 63](index-244_1.png)


    Vohra_706-0C08.fm Page 225 Saturday, August 12, 2006 5:05 AM


