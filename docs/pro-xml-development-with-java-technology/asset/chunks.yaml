- fmt: "# Design Service-Oriented Architecture Frameworks with J2EE Technology\n\n\
    The Apache FOP API generates a PDF document from an XSL-FO document. The PDF document\
    \ presents the XML document data in the form of a table. Therefore, you first\
    \ need to convert the example XML document to an XSL-FO document using XSLT. An\
    \ XSLT style sheet that converts XML to XSL-FO retrieves data from the XML document\
    \ and, using elements in the XSL-FO namespace, creates a formatting object representation\
    \ of the XML data. (Table 12-2 discussed the XSL-FO namespace elements.) Listing\
    \ 12-2 shows the example XSLT document, `catalog.xslt`, to convert the example\
    \ document to an XSL-FO document.\n\n**Listing 12-2.** *catalog.xslt*\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<xsl:stylesheet version=\"1.1\"\n\
    \  xmlns:xsl=\"http://www.w3.org/1999/XSL/Transform\"\n  xmlns:fo=\"http://www.w3.org/1999/XSL/Format\"\
    \n  exclude-result-prefixes=\"fo\">\n  <xsl:output method=\"xml\" version=\"1.0\"\
    \ omit-xml-declaration=\"no\" indent=\"yes\"/>\n  <!-- =========================\
    \ -->\n  <!-- root element: catalog -->\n  <!-- ========================= -->\n\
    \  <xsl:template match=\"/catalog\">\n    <fo:root >\n      <!--Setting up the\
    \ Font and the Pages -->\n      <fo:layout-master-set>\n        <fo:simple-page-master\
    \ master-name=\"simpleA4\" page-height=\"29.7cm\"\n          page-width=\"75cm\"\
    \ margin-top=\"2cm\" margin-bottom=\"2cm\"\n          margin-left=\"5cm\" margin-right=\"\
    5cm\">\n          <fo:region-body/>\n        </fo:simple-page-master>\n      </fo:layout-master-set>\n\
    \      <fo:page-sequence master-reference=\"simpleA4\">\n        <fo:flow flow-name=\"\
    xsl-region-body\">\n          <fo:block font-size=\"40pt\"\n            font-weight=\"\
    bold\" text-align=\"center\"\n            space-after=\"5mm\">\n            Catalog\n\
    \          </fo:block>\n          <fo:block font-size=\"25pt\">\n            [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \            Vohra_706-0C12.fm Page 316 Saturday, July 29, 2006 6:20 AM\n    \
    \        **316**\n            C H A P T E R 1 2 ■ C O N V E R T I N G X M L T\
    \ O P D F\n            <fo:table table-layout=\"fixed\">\n              <fo:table-column\
    \ column-width=\"10cm\"/>\n              <fo:table-column column-width=\"10cm\"\
    />\n              <fo:table-column column-width=\"10cm\"/>\n              <fo:table-column\
    \ column-width=\"10cm\"/>\n              <fo:table-column column-width=\"10cm\"\
    />\n              <fo:table-column column-width=\"10cm\"/>\n              <!--Setting\
    \ up the header -->\n              <fo:table-header>\n                <fo:table-row\
    \ font-weight=\"bold\"><fo:table-cell>\n                  <fo:block>\n       \
    \             <xsl:text>Section</xsl:text>\n                  </fo:block>\n  \
    \              </fo:table-cell>\n                <fo:table-cell>\n           \
    \       <fo:block>\n                    <xsl:text>Publisher</xsl:text>\n     \
    \             </fo:block>\n                </fo:table-cell>\n                <fo:table-cell>\n\
    \                  <fo:block>\n                    <xsl:text>Level</xsl:text>\n\
    \                  </fo:block>\n                </fo:table-cell>\n           \
    \     <fo:table-cell>\n                  <fo:block>\n                    <xsl:text>Edition</xsl:text>\n\
    \                  </fo:block>\n                </fo:table-cell>\n           \
    \     <fo:table-cell>\n                  <fo:block>\n                    <xsl:text>Title</xsl:text>\n\
    \                  </fo:block>\n                </fo:table-cell>\n           \
    \     <fo:table-cell>\n                  <fo:block>\n                    <xsl:text>Author</xsl:text>\n\
    \                  </fo:block>\n                </fo:table-cell>\n           \
    \   </fo:table-row>\n            </fo:table-header>\n            <fo:table-body>\n\
    \              <!--Calling template to add data from XML document to XSL-FO Table\
    \ -->\n              <xsl:apply-templates select=\"journal\"/>\n            </fo:table-body>\n\
    \          </fo:table>\n        </fo:block>\n      </fo:flow>\n    </fo:page-sequence>\n\
    \    <!--End of root element of XSL-FO document -->\n  </fo:root>\n  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \  Vohra_706-0C12.fm Page 317 Saturday, July 29, 2006 6:20 AM\n  C H A P T E R\
    \ 1 2 ■ C O N V E R T I N G X M L T O P D F\n  **317**\n</xsl:template>\n<!--Template\
    \ to add data to XSL-FO document -->\n<xsl:template match=\"journal\">\n  <fo:table-row>\n\
    \    <fo:table-cell>\n      <fo:block>\n        <xsl:value-of select=\"section\"\
    />\n      </fo:block>\n    </fo:table-cell>\n    <fo:table-cell>\n      <fo:block>\n\
    \        <xsl:value-of select=\"publisher\"/>\n      </fo:block>\n    </fo:table-cell>\n\
    \    <fo:table-cell>\n      <fo:block>\n        <xsl:value-of select=\"level\"\
    />\n      </fo:block>\n    </fo:table-cell>\n    <fo:table-cell>\n      <fo:block>\n\
    \        <xsl:value-of select=\"edition\"/>\n      </fo:block>\n    </fo:table-cell>\n\
    \    <fo:table-cell>\n      <fo:block>\n        <xsl:value-of select=\"title\"\
    />\n      </fo:block>\n    </fo:table-cell>\n    <fo:table-cell>\n      <fo:block>\n\
    \        <xsl:value-of select=\"author\"/>\n      </fo:block>\n    </fo:table-cell>\n\
    \  </fo:table-row>\n</xsl:template>\n</xsl:stylesheet>\n```\n\n## Setting the\
    \ System Properties\n\nYou perform the XML to XSL-FO transformation using the\
    \ Transformation API for XML, which was discussed in Chapter 5. You will parse\
    \ the example XML document using a `DocumentBuilder` parser and transform it using\
    \ a `Transformer` object. So, you need to set the system properties `javax.xml.parsers.DocumentBuilderFactory`\
    \ and `javax.xml.transform.TransformerFactory`, as shown in Listing 12-3. You\
    \ use `DocumentBuilderFactory` to create a `DocumentBuilder` object and `TransformerFactory`\
    \ to create a `Transformer` object.\n\n**Listing 12-3.** *Setting System Properties*\n\
    \n```java\nSystem.setProperty(\"javax.xml.parsers.DocumentBuilderFactory\",\n\
    \  \"org.apache.xerces.jaxp.DocumentBuilderFactoryImpl\");\nSystem.setProperty(\"\
    javax.xml.transform.TransformerFactory\",\n  \"org.apache.xalan.processor.TransformerFactoryImpl\"\
    );\n```\n\n## Creating a Document\n\nYou can create a `Document` object by parsing\
    \ an XML document with a `DocumentBuilder` object. You obtain a `DocumentBuilder`\
    \ object from a `DocumentBuilderFactory` object. Therefore, you need to create\
    \ a `DocumentBuilderFactory` object using the static method `newInstance()`. Subsequently,\
    \ create a `DocumentBuilder` object from the `DocumentBuilderFactory` object using\
    \ the method `newDocumentBuilder()`, as shown in Listing 12-4. You can parse an\
    \ XML document using one of the overloaded `parse()` methods from an `InputStream`,\
    \ an `InputSource`, or a `File`. The example application parses the XML document\
    \ from a `File` object, as shown in Listing 12-4. The `parse(File)` object returns\
    \ a `Document` object.\n\n**Listing 12-4.** *Parsing an XML Document*\n\n```java\n\
    DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();\nDocumentBuilder\
    \ builder = factory.newDocumentBuilder();\nDocument document = builder.parse(new\
    \ File(\"catalog.xml\"));\n```\n\n## Creating a Transformer\n\nYou also need to\
    \ create a `Transformer` object to transform the `Document` object obtained with\
    \ a `DocumentBuilder` object. You can obtain a `Transformer` object from a `TransformerFactory`\
    \ object. Therefore, create a `TransformerFactory` object using the static method\
    \ `newInstance()`, as shown in Listing 12-5. To set a stylesheet on the `Transformer`\
    \ object obtained from the `TransformerFactory` object, create a `StreamSource`\
    \ object from the example style sheet. Subsequently, create a `Transformer` object\
    \ using the method `newTransformer(StyleSource)`.\n\n**Listing 12-5.** *Creating\
    \ a Transformer Object*\n\n```java\nTransformerFactory tFactory = TransformerFactory.newInstance();\n\
    StreamSource stylesource = new StreamSource(new File(\"catalog.xslt\"));\nTransformer\
    \ transformer = tFactory.newTransformer(stylesource);\n```\n\n## Transforming\
    \ the XML Document to XSL-FO\n\nThe `Transformer` class provides the method `transform(Source,\
    \ Result)` to transform XML input to output. You can specify the input as `DOMSource`,\
    \ `SAXSource`, or `StreamSource`. You can specify the output as `DOMResult`, `SAXResult`,\
    \ or `StreamResult`. In the example application, input is specified as `DOMSource`,\
    \ and output is specified as `StreamResult`. Therefore, create a `DOMSource` object\
    \ from the `Document` object, and create a `StreamResult` object from a `catalog.fo`\
    \ file, as shown in Listing 12-6. Subsequently, transform the example XML document\
    \ using the `transform(DOMSource, SAXResult)` object, as shown in Listing 12-6.\n\
    \n**Listing 12-6.** *Transforming an XML Document to XSL-FO*\n\n```java\nDOMSource\
    \ source = new DOMSource(document);\nStreamResult result = new StreamResult(\"\
    catalog.fo\");\ntransformer.transform(source, result);\n```"
