    **Figure 8-7.** *XINDICE external tools configuration to add a collection*


    ## Adding an XML Document to the Xindice Database


    In this section, you will add your example XML document, `catalog.xml` (Listing
    8-1), to the `catalog` collection. Listing 8-3 shows the Xindice command to add
    an XML document to a collection.


    **Listing 8-3.** *Xindice Command to Add an XML Document*


    ```

    xindice ad

    –c xmldb:xindice://localhost:8080/db/catalog

    –f <XML File to add> –n catalog.xml

    ```


    The Xindice `ad` action specifies that an XML document be added, `–c` specifies
    the collection context as the `catalog` collection, the `–f` switch specifies
    the XML file to add to collection, and the `–n` switch specifies the XML filename
    in the collection.


    You will run this Xindice command in Eclipse. Therefore, you need to modify the
    Arguments tab in the XINDICE external tools configuration and specify the arguments
    listed in Listing 8-3 using the Eclipse `${resource_loc}` variable for `<XML File
    to add>`, as shown in Figure 8-8. To run the XINDICE configuration with the specified
    arguments, select the `catalog.xml` document in the `xindice_resources` folder
    on the Package Explorer tab of the project `Chapter8` and click the Run button,
    as shown in Figure 8-8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 65](index-247_1.png)


    Vohra_706-0C08.fm Page 228 Saturday, August 12, 2006 5:05 AM


    **228**


    C H A P T E R 8 ■ S T O R I N G X M L I N N A T I V E X M L D A T A B A S E S
    : X I N D I C E


    **Figure 8-8.** *XINDICE configuration for adding an XML document*


    The XML document `catalog.xml` gets added to the `catalog` collection, as indicated
    by the xindice message in Listing 8-4.


    **Listing 8-4.** *Output in Eclipse from Adding an XML Document*


    ```

    trying to register database

    Added document xmldb:xindice://localhost:8080/db/catalog/catalog.xml

    ```


    ## Retrieving an XML Document from the Xindice Database


    In this section, you will retrieve the XML document `catalog.xml` from the `catalog`
    collection. Listing 8-5 shows the Xindice command to retrieve an XML document
    from a collection.


    **Listing 8-5.** *Xindice Command to Retrieve an XML Document*


    ```

    xindice rd –c xmldb:xindice://localhost:8080/db/catalog –n catalog.xml

    ```


    The Xindice `rd` action specifies that an XML document be retrieved, the `–c`
    switch specifies the collection context to be the `catalog` collection, and the
    `–n` switch specifies the XML filename in the `catalog` collection that is to
    be retrieved.


    You will run this Xindice command to retrieve the XML file `catalog.xml` in Eclipse.
    Therefore, modify the arguments in the XINDICE external tools configuration, and
    specify the arguments listed in Listing 8-5, as shown in Figure 8-9. To run the
    XINDICE configuration with the specified arguments, click the Run button, as shown
    in Figure 8-9.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 66](index-248_1.png)


