- fmt: "# XmlCursor Interface Navigation Methods\n\n## Method Descriptions\n\n`toChild(String\
    \ name)` - Moves the cursor to the first child element of the specified element\
    \ name.\n\n`toChild(String namespace, String name)` - Moves the cursor to the\
    \ first child element of the specified element name in the specified namespace.\n\
    \n---\n\n**Table 7-4.** *XmlCursor Interface Navigation Methods*\n\n| Method Name\
    \ | Description |\n|-------------|-------------|\n| `toCursor(XmlCursor moveTo)`\
    \ | Moves the cursor to the position of `moveCursor`. |\n| `toEndDoc()` | Moves\
    \ the cursor to the end of the document. |\n| `toEndToken()` | Moves the cursor\
    \ to the END or ENDDOC token. |\n| `toFirstAttribute()` | Moves the cursor to\
    \ the first attribute of this element. |\n| `toFirstChild()` | Moves the cursor\
    \ to the first child element. |\n| `toLastAttribute()` | Moves the cursor to the\
