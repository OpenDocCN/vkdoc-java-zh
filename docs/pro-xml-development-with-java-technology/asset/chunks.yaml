    C H A P T E R 1 2 ■ C O N V E R T I N G X M L T O P D F


    You can render an XSL-FO document to various output types using the corresponding
    renderer.


    Table 12-3 lists the different rendering types supported by the FOP driver.


    **Table 12-3.** *Renderer Types*


    **Render Type**


    **Description**


    RENDER_PDF


    Renders to a PDF document


    RENDER_AWT


    Renders to a GUI window


    RENDER_MIF


    Renders to MIF


    RENDER_XML


    Renders to an XML document


    RENDER_PCL


    Renders to a PCL document


    RENDER_PS


    Renders to a Postscript document


    RENDER_TXT


    Renders to a text document


    RENDER_SVG


    Renders to SVG


    **Converting XSL-FO to PDF**


    Because you will be converting an XSL-FO document to a PDF document, set the renderer
    type to Driver.RENDER_PDF, as shown here:


    driver.setRenderer(Driver.RENDER_PDF);


    You need to specify the input XSL-FO document for the FOP driver, as shown next.
    You set the XSL-FO document as input using the setInputSource(InputSource) method.


    InputStream input=new FileInputStream(new File("catalog.fo"))); driver.setInputSource(new
    InputSource(input));


    You also need to set the output for the PDF document generated with the FOP driver.
    You set the output using the method setOutputStream(OutputStream), as shown here:
    OutputStream output=new FileOutputStream(new File("catalog.pdf"))); driver.setOutputStream(output);


    To generate a PDF document from the XSL-FO document, run the FOP driver using
    the method run(), as shown next. Subsequently, close the Driver object using the
    close() method.


    driver.run();


    output.flush();


    output.close();


    **Viewing the Complete Example**


    Listing 12-9 shows the Java application, XMLToPDF.java, for converting an XML
    document to a PDF


    document. The application consists of the methods generateXSLFO(File xmlFile,
    File xsltFile) and generatePDF(). In the generateXSLFO() method, a DocumentBuilder
    parses an XML document to obtain a Document object, and a Transformer transforms
    the Document object to an XSL-FO file using a stylesheet. In the generatePDF()
    method, a FOP driver converts the XSL-FO file to a PDF document.


