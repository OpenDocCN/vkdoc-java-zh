    **Summary**


    Native XML databases define a model for storing and retrieving an XML document.
    Native XML


    databases store XML documents in collections and support querying with XPath and
    updating with the XML:DB XUpdate APIs, respectively. Native XML databases have
    an advantage over relational databases in that the native XML databases are specifically
    designed for storing, querying, and updating XML documents, whereas relational
    databases are designed to store atomic values within a database row-column cell.
    Complex XML documents with multilevel hierarchies and attributes can be easily
    stored, queried, and updated in a native XML database.


    In this chapter, we discussed general native XML database concepts in the specific
    context of the Xindice open source native XML database. In addition to support
    for the query and update APIs, Xindice provides a command-line tool for administrating
    the Xindice native XML database, which was also discussed in this chapter.


