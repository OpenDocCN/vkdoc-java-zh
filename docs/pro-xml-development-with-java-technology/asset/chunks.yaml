    Node Test


    In a location path step, as you move along a specified axis, you will encounter
    nodes of different types with varying names. These nodes comprise a node set.
    To this base node set, you can apply a node test filter that can filter nodes
    based on node type or node name.


    **Node Type Tests**


    Node tests based on the node type are as follows:


    • node() is a node test that refers to a node of any type. For example, the expression
    child::node() selects all the child nodes of the context node. As noted earlier,
    the attributes of an element node are not part of its child nodes.


    • The axis and node test combination self::node() may be abbreviated with the
    “.” character.


    For example, the expression ./child::node() selects all the child nodes of the
    context node.


    • The axis and node test combination of parent::node() may be abbreviated as the
    .. character sequence. For example, the expression ../child::node() selects all
    child nodes of the parent of the context node, which may or may not include the
    context node. (Can you see why?


    Hint: The context node may be an attribute node.)


    • The axis and node test combination of /descendant-or-self::node()/ may be abbreviated
    as the // character sequence. For example, the expression // at the start of an
    XPath expression selects all the nonattribute and non-namespace nodes within a
    document.


    • text() is a node test that refers to a node of type Text. For example, descendant::text()
    will evaluate to all descendant nodes of the context node that are of type Text.


    • comment() is a node test that refers to a node of type Comment. For example,
    preceding::comment() will evaluate to all preceding nodes of the context node
    that are of type Comment.


    • processing-instruction() is a node test that refers to the node of type ProcessingInstruction.
    For example, following::processing-instruction() will evaluate to all the following
    nodes of the context node that are of type processing-instruction.


    **Node Name Tests**


    A name-based node test with no namespace prefix refers to the following:


    • A namespace node, if the specified axis is a namespace axis. For example, in
    Figure 4-2, if you assume the context node is the catalog element, then namespace::journal
    selects the xmlns:journal namespace node in the catalog root element.


    • It refers to an attribute node that is not in any namespace (including not in
    the default namespace) if the specified axis is an attribute axis. For example,
    in Figure 4-2, attribute::date selects the date attribute of the article context
    node.


