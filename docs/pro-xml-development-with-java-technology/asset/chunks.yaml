    \    }\n\n    public void setTitle(String title) {\n        this.title = title;\n\
    \    }\n\n    public String getAuthor() {\n        return this.author;\n    }\n\
    \n    public void setAuthor(String author) {\n        this.author = author;\n\
    \    }\n}\n```\n\n你将使用 `schemagen` 文件夹从带注解的类 `Catalog.java` 生成 XML Schema 文档。\n\
    \n要从带注解的类 `Catalog.java` 生成 XML Schema，你需要为 `schemagen` 工具创建一个外部工具配置。要创建外部工具配置，请选择\
    \ **Run** ➤ **External Tools** ➤ **External Tools**。右键单击 **Program** 节点，然后选择 **New**。在外部工具配置中，指定一个配置名称。在\
    \ **Location** 字段中，指定 JAXB 2.0 的 `schemagen.bat` 文件，并在 **Working Directory** 中指定\
    \ `${container_loc}`。在 **Arguments** 字段中，你需要使用 `-d` 选项指定生成 XML Schema 的目录。图 6-13\
    \ 展示了 `schemagen` 工具的外部工具配置。\n\n**图 6-13.** *SCHEMAGEN 配置*\n\n要从带注解的类 `Catalog.java`\
    \ 生成 XML Schema，请在包资源管理器中选择 `Catalog.java`，然后运行 **SCHEMAGEN** 配置。XML Schema 将从带注解的类生成，如图\
    \ 6-14 所示。\n\n**图 6-14.** *从带注解的类 Catalog.java 生成的 XML Schema*\n\n**总结**\n\nJAXB\
    \ 1.0 规定了 XML Schema 到 Java 表示的绑定。JAXB 2.0 规定了 XML Schema 到 Java 表示的双向绑定。两种规范都提供了用于生成基于模式的\
    \ Java 内容类的绑定编译器，以及用于 XML 文档编组和解组的运行时框架。\n\n你可以通过外部或内联绑定声明自定义 XML Schema 到 Java\
    \ 类型的绑定。外部绑定声明允许模式定义和自定义清晰分离，并提供了对同一模式定义应用不同自定义以满足不同绑定目标的优势。然而，外部绑定声明依赖 XPath\
    \ 表达式来定位自定义的绑定节点，因此比内联绑定相对更复杂，内联绑定在模式定义中指定，从而隐式地定位绑定节点。\n\n与 JAXB 1.0 相比，JAXB\
    \ 2.0 具有以下优势：\n\n*   支持所有模式构造\n*   模式定义到 Java 内容类的相对紧凑的绑定\n*   模式定义与 Java 类型之间的双向映射\n\
    \n我们强烈建议使用 JAXB 2.0，除非你明确需要继续使用 JAXB 1.0，例如为了向后兼容。\n\n第 7 章\n\n■ ■ ■\n\n使用 XMLBeans\
    \ 进行绑定\n\n**X**MLBeans¹ 与 JAXB 一样，是一个 XML 到 Java 的绑定和运行时框架。你可以使用绑定框架将 XML Schema\
    \ 绑定到 Java 类型；你可以使用运行时框架将 XML 文档解组和编组到其 Java 绑定类，或从 Java 绑定类解组和编组 XML 文档。如果你想知道为什么还要学习另一种\
    \ XML 到 Java 的绑定，答案在于以下原因：\n\n*   XMLBeans 在多个 Java 平台版本上提供对 XML Schema 绑定到 Java\
    \ 类型的全面支持。尽管 JAXB 2.0 提供了对 XML Schema 的全面支持，但它需要 J2SE 5.0；而 XMLBeans 是唯一一个在 J2SE\
    \ 1.4.*x* 以及 J2SE 5.0 上都能工作的、具有完整模式支持的 XML 到 Java 绑定。\n*   XMLBeans 的出现早于 JAXB，也许正因如此，它在商业产品中的普及程度远高于\
    \ JAXB，尽管不可否认，如果 JAXB 2.0 被广泛采用，这种情况在未来可能不会持续。\n*   XMLBeans 定义了 `XmlObject` API，用于通过类型安全的\
    \ Java 类访问 XML 信息内容。XMLBeans 还定义了 `XmlCursor` API，该 API 提供基于游标的对 XML 文档底层 XML\
    \ InfoSet 的访问。这意味着通过使用 XMLBeans，你可以通过类型安全的 Java 类访问和操作信息内容，并且可以以与文档中低级细节（例如元素或属性的顺序）相关的方式进行操作。\n\
    *   XMLBeans 定义了 `SchemaType` API，该 API 为 XML Schema 中包含的元数据提供了一个模式对象模型。如果你想动态创建符合模式的\
    \ XML 文档，这将非常有用。\n\n在我们看来，JAXB 应该是绑定框架的默认选择，因为它是 Java 平台标准版的一部分。然而，在某些情况下，基于前面讨论并总结在表\
    \ 7-1 中的原因，XMLBeans 可能是更务实的选择。\n\n¹ 译者注：原文此处为“X**MLBeans”，根据上下文和常见写法，应为“**XMLBeans**”或“XMLBeans”，此处按常规处理为“XMLBeans”。"
- fmt: "# Binding with XMLBeans\n\nIn this chapter, we will primarily focus on the\
    \ XMLBeans binding and runtime frameworks. We will also discuss the `XmlCursor`\
    \ API related to the XML InfoSet; however, the APIs related to the schema object\
    \ model are beyond the scope of this chapter, mainly because we want to keep the\
    \ focus on the binding framework and because the `SchemaType` API is not central\
    \ to this focus.\n\n1. This is part of the Apache XML Project; you can find detailed\
    \ information related to this project at http://xmlbeans.apache.org/overview.html.\n\
    \n**Table 7-1.** *XMLBeans vs. JAXB*\n\n| Feature | XMLBeans | JAXB |\n| --- |\
    \ --- | --- |\n| Bidirectional mapping | Does not support bidirectional mapping\
    \ between the XML Schema and the Java class. | JAXB 2.0 supports bidirectional\
    \ mapping between the XML Schema and the Java class. |\n| XML Schema support |\
    \ Supports all the XML Schema constructs. | JAXB 2.0 supports all the XML Schema\
    \ constructs, but JAXB 1.6 does not. |\n| XML document navigation | XMLBeans supports\
    \ XML document navigation with cursors. | JAXB does not support cursors. |\n|\
    \ XQuery | XMLBeans supports XQuery. | JAXB does not support XQuery. |\n| Open\
    \ source | XMLBeans is open source. | JAXB is open source. |\n| Root class | The\
    \ XMLBeans JavaBeans interfaces extend `org.apache.xmlbeans.XmlObject`. | The\
    \ JAXB JavaBeans interfaces do not extend a root interface. |\n\n*XQuery 1.0 is\
    \ an XML-based query language (http://www.w3.org/TR/xquery/).*\n\n## Overview\n\
    \nThe XMLBeans binding framework includes a binding compiler, which you can invoke\
    \ through the `scomp` command. The XMLBeans runtime framework defines the `XmlObject`\
    \ API, which you can use to marshal or unmarshal an XML document to and from the\
    \ Java types corresponding to the document's schema.\n\nIn this chapter, we will\
    \ first show how to use the binding compiler to bind an example schema to its\
    \ Java types and then show how to use these Java types to marshal and unmarshal\
    \ an example XML document. Listing 7-1 shows the example schema.\n\n**Listing\
    \ 7-1.** *catalog.xsd*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
    <xs:schema>\n  <xs:element name=\"catalog\">\n    <xs:complexType>\n      <xs:sequence>\n\
    \        <xs:element ref=\"journal\" minOccurs=\"0\" maxOccurs=\"unbounded\"/>\n\
    \      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n  <xs:element name=\"\
    journal\">\n    <xs:complexType>\n      <xs:sequence>\n        <xs:element ref=\"\
    article\" minOccurs=\"0\" maxOccurs=\"unbounded\"/>\n      </xs:sequence>\n  \
    \    <xs:attribute name=\"publisher\" type=\"xs:string\"/>\n    </xs:complexType>\n\
    \  </xs:element>\n  <xs:element name=\"article\">\n    <xs:complexType>\n    \
    \  <xs:sequence>\n        <xs:element name=\"title\" type=\"xs:string\"/>\n  \
    \      <xs:element name=\"author\" type=\"xs:string\"/>\n      </xs:sequence>\n\
    \      <xs:attribute name=\"level\" type=\"xs:string\"/>\n      <xs:attribute\
    \ name=\"date\" type=\"xs:string\"/>\n      <xs:attribute name=\"section\" type=\"\
    xs:string\"/>\n    </xs:complexType>\n  </xs:element>\n</xs:schema>\n```\n\nListing\
    \ 7-2 shows the example XML document we will marshal and unmarshal. The structure\
    \ and content of the example XML document, of course, conforms to the example\
    \ XML schema.\n\n**Listing 7-2.** *catalog.xml*\n\n```xml\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<catalog>\n  <journal publisher=\"IBM developerWorks\"\
    >\n    <article level=\"Intermediate\" date=\"January-2004\" section=\"Java Technology\"\
    >\n      <title>Service Oriented Architecture Frameworks</title>\n      <author>Naveen\
    \ Balani</author>\n    </article>\n    <article level=\"Advanced\" date=\"October-2003\"\
    \ section=\"Java Technology\">\n      <title>Advance DAO Programming</title>\n\
    \      <author>Sean Sullivan</author>\n    </article>\n    <article level=\"Advanced\"\
    \ date=\"May-2002\" section=\"Java Technology\">\n      <title>Best Practices\
    \ in EJB Exception Handling</title>\n      <author>Srikanth Shenoy</author>\n\
    \    </article>\n  </journal>\n</catalog>\n```\n\nWe will show how to compile\
    \ the example schema with the binding compiler. Subsequently, we will show how\
    \ to unmarshal and marshal the example XML document using the Java classes generated\
    \ from the schema."
