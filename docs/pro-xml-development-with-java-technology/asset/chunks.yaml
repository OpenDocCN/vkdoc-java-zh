    解析器和验证 API。我们将从 JAXP 1.3 DOM 解析器 API 开始。


    **JAXP 1.3 DOM 解析器 API**


    我们在第 2 章中介绍了使用 JAXP 1.3 DOM 解析器 API 进行解析的方法。在本节中，重点将放在使用 JAXP 1.3 DOM 解析器 API
    进行模式验证上。使用此 API 进行模式验证的基本步骤如下：


    **1.** 创建 DOM 解析器工厂的实例。


    **2.** 配置 DOM 解析器工厂实例以支持模式验证。


    **3.** 从配置好的 DOM 解析器工厂获取 DOM 解析器。


    **4.** 为解析器实例配置错误处理器，以便解析器能够报告验证错误。


    **5.** 使用配置好的解析器解析文档。


    我们将使用 JAXP 1.3 DOM API 将这些基本步骤映射到具体步骤，该 API 定义在`org.w3c.dom`包中。此外，DOM API 依赖于以下
    SAX 包：`org.xml.sax`和`org.xml.sax.helpers`。DOM API 中对 SAX API 的依赖关系在 JAXP 1.3 中指定，这仅仅是为了在适当的地方重用类。首先，导入以下类：


    ```java

    import javax.xml.parsers.DocumentBuilderFactory;

    import javax.xml.parsers.DocumentBuilder;

    import javax.xml.parsers.ParserConfigurationException;

    import org.xml.sax.SAXException;

    import org.xml.sax.SAXParseException;

    import org.xml.sax.helpers.DefaultHandler;

    ```


    **创建 DOM 解析器工厂**


    如前所述，第一步是创建 DOM 解析器工厂，因此您需要创建一个`DocumentBuilderFactory`，如下所示：


    ```java

    DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C03.fm Page 72 Wednesday, June 28, 2006 6:41 AM


    **72**


    第 3 章 ■ 介绍模式验证


    `DocumentBuilderFactory`的实现类是可插拔的。JAXP 1.3 API 通过按顺序应用以下规则来加载`DocumentBuilderFactory`的实现类，直到某个规则成功为止：


    **1.** 使用`javax.xml.parsers.DocumentBuilderFactory`系统属性来加载实现类。


    **2.** 使用 JRE 目录中的属性文件`lib/jaxp.properties`。如果此文件存在，则解析此文件以检查是否存在键为`javax.xml.parsers.DocumentBuilderFactory`的属性。如果存在这样的属性，则使用该属性的值来加载实现类。


    **3.** JAR 文件中`META-INF/services`目录下的文件被视为服务提供者配置文件。使用服务 API，并从运行时类路径中任何 JAR 文件包含的`META-INF/services/javax.xml.parsers.DocumentBuilderFactory`文件中获取工厂类名。


    **4.** 使用平台默认的`DocumentBuilderFactory`实例，该实例包含在应用程序所使用的 J2SE 平台中。


    **配置用于验证的工厂**


    在您可以使用`DocumentBuilderFactory`实例创建用于模式验证的解析器之前，需要配置该工厂以进行模式验证。要配置用于验证的工厂，您可以使用以下选项：


    *   要使用支持命名空间的解析器解析 XML 文档，请将工厂的`setNamespaceAware()`特性设置为`true`。默认情况下，命名空间感知特性设置为`false`。

    *   要使解析器成为验证解析器，请将工厂的`setValidating()`特性设置为`true`。默认情况下，验证特性设置为`false`。

    *   要使用基于 XML Schema 语言的模式定义进行验证，请设置`schemaLanguage`属性，该属性指定用于验证的模式语言。属性名称为`http://java.sun.com/xml/jaxp/properties/schemaLanguage`，W3C
    XML Schema 语言的属性值为`http://www.w3.org/2001/XMLSchema`。

    *   `schemaSource`属性指定模式的位置。属性名称为`http://java.sun.com/xml/jaxp/properties/schemaSource`，属性值是指向模式定义源的
    URL。


    清单 3-3 显示了基于这些验证选项配置工厂实例的方法。

    '
- fmt: "### **Listing 3-3.** *Setting the Validation Schema*\n\n`factory.setNamespaceAware(true);`\n\
    \n`factory.setValidating(true);`\n\n`factory.setAttribute(\"http://java.sun.com/xml/jaxp/properties/schemaLanguage\"\
    , \"http://www.w3.org/2001/XMLSchema\");`\n\n`factory.setAttribute(\"http://java.sun.com/xml/jaxp/properties/schemaSource\"\
    , \"SchemaUrl\");`\n\n### **Create a DOM Parser**\n\nFrom the `DocumentBuilderFactory`\
    \ object, create a `DocumentBuilder` DOM parser: `DocumentBuilder builder = factory.newDocumentBuilder();`\n\
    \nThis returns a new `DocumentBuilder` with the schema validation parameters set\
    \ as configured on the `DocumentBuilderFactory` object.\n\n### **Configure a Parser\
    \ for Validation**\n\nTo retrieve validation errors generated during parsing,\
    \ you need to first define a class that implements an `ErrorHandler`, and you\
    \ do that by defining the `Validator` class, which extends the `DefaultHandler`\
    \ SAX helper class, as shown in Listing 3-4.\n\n**Listing 3-4.** *Validator Class*\n\
    \n```java\n//ErrorHandler Class: DefaultHandler implements ErrorHandler\nclass\
    \ Validator extends DefaultHandler {\n    public boolean validationError = false;\n\
    \    public SAXParseException saxParseException = null;\n\n    public void error(SAXParseException\
    \ exception) throws SAXException {\n        validationError = true;\n        saxParseException\
    \ = exception;\n    }\n\n    public void fatalError(SAXParseException exception)\
