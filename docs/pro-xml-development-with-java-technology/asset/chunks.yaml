    \ XML document, where of course the XML declaration on the first line is optional;\
    \ omitting the XML declaration would still leave you with a well-formed document.\n\
    \nAn element can contain other nested elements. So, for example, the root element\
    \ may contain a nested element, as shown here:\n\n```\n<?xml version='1.0' encoding='UTF-8'\
    \ standalone='yes' ?>\n<journal>\n  <article></article>\n</journal>\n```\n\nElements\
    \ may contain text content. So, for example, with some arbitrary text content\
    \ added to the `article` element, the document now looks as follows:\n\n```\n\
    <?xml version='1.0' encoding='UTF-8' standalone='yes' ?>\n<journal>\n  <article>This\
    \ is some arbitrary text!</article>\n</journal>\n```\n\nOf course, element text\
    \ content cannot contain any delimiter character sequences such as `</`.\n\nOne\
    \ way to get around that is to enclose element content within a CDATA construct,\
    \ and assuming you do that for this example, your document now looks as follows:\n\
    \n```\n<?xml version='1.0' encoding='UTF-8' standalone='yes' ?>\n<journal>\n \
    \ <article>\n    <![CDATA[This is some arbitrary text <within> a CDATA!]]>\n \
    \ </article>\n</journal>\n```\n\nAn element may of course have no nested elements\
    \ or content. Such an element is termed an *empty element*, and it can be written\
    \ with a special start tag that has no end tag. For example, `<article/>` is an\
    \ empty element. If you include this empty element within your document, the document\
    \ looks like this:\n\n```\n<?xml version='1.0' encoding='UTF-8' standalone='yes'\
    \ ?>\n<journal>\n  <article>\n    <![CDATA[This is some arbitrary text <within>\
    \ a CDATA!]]>\n  </article>\n  <article/>\n</journal>\n```\n\nElements can have\
    \ attributes, which are specified in the start tag. An example of an attribute\
    \ is `<article title=\"A Tutorial on XML 1.0\"></article>`. An attribute is defined\
    \ as a name-value pair, and in the previous example, the name of the attribute\
    \ is of course `title`, and the value of the attribute is `A Tutorial on XML 1.0`.\
    \ With an attribute added, the example document looks as follows:\n\n```\n<?xml\
    \ version='1.0' encoding='UTF-8' standalone='yes' ?>\n<journal>\n  <article title=\"\
    A Tutorial on XML 1.0\">\n    <![CDATA[This is some arbitrary text <within> a\
    \ CDATA!]]>\n  </article>\n  <article/>\n</journal>\n```\n\nNow let’s assume you\
    \ want to add another attribute named `date` with the value `<04/12/2006>`. If\
    \ you recall the first central concept we mentioned at the outset of this primer,\
    \ you are not allowed to include delimiter characters within an attribute value.\
    \ However, the second central concept mentioned earlier comes to your rescue:\
    \ you can use the `&lt;` character sequence to escape `<`, and—yes, you guessed\
    \ it—you can use the `&gt;` character sequence to escape `>`. So, with that in\
    \ place, the document now looks as follows:\n\n```\n<?xml version='1.0' encoding='UTF-8'\
    \ standalone='yes' ?>\n<journal>\n  <article date=\"&lt;04/12/2006&gt;\" title=\"\
    A Tutorial on XML 1.0\">\n    <![CDATA[This is some arbitrary text <within> a\
    \ CDATA!]]>\n  </article>\n  <article/>\n</journal>\n```\n\nAnother mechanism\
    \ for including delimiter characters within the body of a construct is to use\
    \ escaped numeric references. For example, the numeric American Standard Code\
    \ for Information Interchange (ASCII) value for the `>` character is 62, so you\
    \ can use the `&#62;` character sequence instead of `&gt;`. Using escaped numeric\
    \ references is of course the most general mechanism for including delimiter characters\
    \ within a construct’s body.\n\n## Comments\n\nYou can define comments in an XML\
    \ document within a comment declaration as shown in the following example:\n\n\
    ```\n<!--This is a comment-->\n```\n\nComments can appear anywhere outside markup,\
    \ which consists of start tags, end tags, empty element tags, comments, CDATA\
    \ sections, escape character references, and entity references (discussed later\
    \ in the “Entities” section).\n\n## Processing Instructions"
