    ProjectPortType SEI


    `ProjectPortType.java` 中为 SEI 生成的代码使用了多种不同的 Java 注解标签，这些标签在表 14-3 中进行了解释。


    **表 14-3.** *ProjectPortType.java 中使用的注解标签* **标签名称**


    **描述**


    WebService


    当与 Java 接口一起使用时，它定义了一个 SEI。`name` 属性指定 Web 服务的名称，`targetNamespace` 属性定义相应 `wsdl:portType`
    的目标命名空间。


    HandlerChain


    将此 Web 服务与外部定义的处理程序链关联起来，`file` 属性定义处理程序链文件的位置。处理程序链在 SEI 被调用之前被调用。


    SOAPBinding


    指定 Web 服务如何映射到 SOAP 1.1 消息体。`paramterStyle` 属性指定参数是直接放入消息体（`ParameterStyle.BARE`），还是包装在一个以操作名称命名的元素中（`ParameterStyle.WRAPPED`）。基本上，`BARE`
    对应于文档样式，`WRAPPED` 对应于 rpc 样式。


    WebMethod


    指定一个作为 Web 服务操作公开的方法。`operationName` 属性指定 `wsdl:operation` 的名称。`action` 属性指定相应的
    `soapAction`。


    WebParam


    指定一个映射到 `wsdl:part` 的方法参数。`name` 属性指定此参数的名称。`partName` 指定 `wsdl:part` 的名称。`header`
    属性指定该参数是包含在 SOAP 1.1 头部还是主体中。`targetNamespace` 指定与该参数关联的 XML 命名空间。


    WebResult


    指定一个映射到 `wsdl:part` 的返回值。`name` 属性指定此返回值的名称。`partName` 指定 `wsdl:part` 的名称。`header`
    属性指定该参数是包含在 SOAP 1.1 头部还是主体中。`targetNamespace` 指定与该参数关联的 XML 命名空间。


    OneWay


    指定只有一个输入消息，没有响应。

