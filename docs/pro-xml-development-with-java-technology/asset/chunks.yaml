- fmt: '# This chapter pulls together a number of concepts from the entire book and
    presents a real-world web service example. One of the challenges of presenting
    a real-world example is that the technologies used in building it cannot be neatly
    circumscribed under topics covered in one book. Therefore, it should not come
    as a surprise that this real-world web service example is at least peripherally
    based on technologies beyond the scope of this book. We will, of course, let you
    know when we are dealing with such technologies, and offer suggestions about where
    you can learn more about them.


    Buckle up. It is going to be a bumpy ride!


    ## Overview of Web Services


    We started this book by noting that XML is a platform-independent means of representing
    structured textual information, which makes it an ideal vehicle for exchanging
    information between loosely coupled software applications. Since web services
    are essentially a standards-based approach to interoperability, it is only natural
    that web services use XML in many aspects.


    This chapter’s discussion of web services is based on the following W3C Recommendations
    and Notes and other interoperability standards:


    - XML-based technologies solve key technological issues of the web services architecture.
    `XML 1.0`, `XML Schema`, and `XPath 1.0`, all of which we covered in Part 1 of
    this book, play a foundational role in the web services technologies.

    - `SOAP 1.1` defines an XML-based messaging framework for web services interaction.
    `SOAP 1.2` is the latest version of this messaging framework. In this chapter,
    we will primarily cover `SOAP 1.1`. However, we will note the differences between
    `SOAP 1.1` and `SOAP 1.2`.

    - `SOAP Messages with Attachments` defines how a `SOAP 1.1` message is to be carried
    within a Multipurpose Internet Mail Extensions (MIME) multipart-related message
    so that the normal `SOAP 1.1` message processing is preserved. We will cover `SOAP
    Messages with Attachments` in this chapter.

    - `WSDL 1.1` is an XML-based language for formally describing web services. At
    the time of writing this book, `WSDL 1.1` is in widespread use, and `WSDL 2.0`
    is a Candidate Recommendation. In this chapter, we will confine our coverage to
    `WSDL 1.1`.

    - Despite `WSDL 1.1` and `SOAP 1.1`, *interoperability* between applications using
    web services is still a problem. To alleviate this problem, the Web Services Interoperability
    (WS-I) organization has defined the Basic Profile (BP) `1.1` specification that
    attempts to clarify web services-related W3C Notes and Recommendations. We will
    cover `WS-I BP 1.1` in this chapter.

    - Universal Description, Discovery, and Integration (UDDI) is a `WS-I BP 1.1`–endorsed
    registry for web services. A UDDI registry is analogous to the telephone white
    pages or yellow pages. Applications can query a UDDI registry about a specific
    web service (like you query an online white pages website) and, in response, obtain
    the location of a `WSDL 1.1` document (like you get a phone number from a white
    pages query) that formally describes the web service. Web service registration
    and discovery using UDDI is an advanced topic and is beyond the scope of this
    book. However, we will discuss UDDI in the context of the web services architecture.


    All the web service–related Notes and Recommendations covered in this chapter
    are supported in the Java API for XML-Based Web Services (`JAX-WS 2.0`) specification,
    which is implemented in Java Platform Enterprise Edition (Java EE) version 5.
    In particular, `JAX-WS 2.0` supports `SOAP 1.1`, `SOAP Messages with Attachments`,
    `WSDL 1.1`, and `WS-I BP 1.1`.'
