- fmt: 'In this section, you will create an instance of the Xindice database collection
    using the Xindice command-line tool. For example, to create a top-level collection
    named `catalog`, you can use the following `xindice` command:


    ```

    xindice ac –c xmldb:xindice://localhost:8080/db –n catalog

    ```


    The Xindice command action `ac` specifies that a collection be added, the `–c`
    switch specifies the collection context as the root context, and the `–n` switch
    specifies the collection name as `catalog`.


    Figure 8-7 shows the external tools configuration XINDICE.


    You can run the XINDICE configuration with the specified arguments by clicking
    the Run button. The Xindice command-line tool creates the collection `catalog`
    in the `db` database and prints the message shown in Listing 8-2.


    **Listing 8-2.** *Output from Adding a Collection*


    ```

    trying to register database

    Created : xmldb:xindice://localhost:8080/db/catalog

    ```


