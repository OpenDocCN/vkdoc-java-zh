  trans: '

    XPath 是一种用于在 XML 文档中定位节点集的语言。它基于一个抽象数据模型，该模型仅关注 XML 文档中的核心信息内容，并忽略所有与语法标记相关的信息。XPath
    数据模型将 XML 文档视为由各种节点类型组成的树，例如元素节点、属性节点和文本节点。XPath 语言提供 XPath 表达式作为定位 XML 文档中节点集的主要语法结构。


    **简单示例**


    由于 XPath 表达式定位的是文档节点集，在继续之前，你需要一个 XML 文档作为我们讨论 XPath 表达式时的参考。因此，请考虑以下简单的 XML 文档：


    1.  文档顺序与解析树的深度优先顺序相同。

    2.  此类编辑器的一个例子是 XMLEspresso；你可以在 http://www.nubean.com 找到它。

    3.  第 5 章涵盖 XSLT。

    4.  你可以在 http://www.w3.org/TR/xpath 找到 XPath 规范。

    5.  有关 JDK 5.0 的更多信息，请参见 http://java.sun.com/j2se/1.5.0/download.jsp。

    6.  有关 JDOM 的更多信息，请参见 http://www.jdom.org/。


    **85**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C04.fm Page 86 Thursday, July 6, 2006 1:40 PM


    **86**


    第 4 章 ■ 使用 XPath 进行寻址


    <catalog >


    <journal title="XML" />


    <journal title="Java Technology" />


    </catalog>


    现在，考虑一个基于此参考 XML 文档的简单 XPath 表达式：`/catalog/journal`。当你看到这个 XPath 表达式时，可能会试图将 XPath
    表达式与文件系统路径进行类比，并基于这种类比，直观地将表达式 `/catalog/journal` 解释为指向文档中的第一个 `journal` 元素。


    实际上，这种直观的解释和其背后的类比都是错误的，因为该表达式选择的是包含两个 `journal` 元素的节点集。


    文件系统类比之所以不成立，原因很简单：如果 `/catalog/journal` 是一个文件系统路径，你可以确信在 `catalog` 文件夹下只会有一个
    `journal` 文件夹，但这显然不适用于 XML 文档节点。因此，这里有一个更恰当的类比来理解 XPath 表达式：XPath 表达式中的每个组件都像一个模式，必须匹配该模式才能定位
    XPath 表达式所寻址的节点集。有了这个基本认识，让我们通过检查更多 XPath 示例来进一步培养你的直觉。


    **XPath 表达式示例**


    XPath 表达式的语法可能相当复杂，因此开始理解 XPath 表达式的最佳方法是快速浏览一些示例。我们将基于一个比介绍性文档稍复杂的 XML 文档（如清单
    4-1 所示）来讲解这些 XPath 示例。


    **清单 4-1.** *示例 XML 文档：catalog.xml*


    <?xml version="1.0" encoding="UTF-8"?>

    <catalog >

    <journal:journal title="XML" publisher="IBM developerWorks">

    <article journal:level="Intermediate"

    date="February-2003">

    <title>Design XML Schemas Using UML</title>

    <author>Ayesha Malik</author>

    </article>

    </journal:journal>

    <journal title="Java Technology" publisher="IBM developerWorks">

    <article level="Advanced" date="January-2004">

    <title>Design service-oriented architecture

    frameworks with J2EE technology</title>

    <author>Naveen Balani</author>

    </article>

    <article level="Advanced" date="October-2003">

    <title>Advance DAO Programming</title>

    <author>Sean Sullivan </author>

    </article>

    </journal>

    </catalog>


    如前所述，XPath 数据模型将 XML 文档视为节点树。图 4-17 显示了示例文档的 XPath 数据模型。为了将图像适配到页面内，图 4-1 中并非所有
    `article` 节点都以展开形式显示。在图 4-1 中，文档元素被指定为 7。此数据模型可视化基于一个 Eclipse 插件，可在 http://www.nubean.com
    获取。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 29](img/index-106_1.png)


    Vohra_706-0C04.fm Page 87 Thursday, July 6, 2006 1:40 PM


    第 4 章 ■ 使用 XPath 进行寻址


    **87**


    `#document`，元素节点以其名称和“e”图标表示，属性节点以其名称-值对和“a”图标表示，文本节点则表示为 `#text`。数据模型中的 `#text`
    节点对应于元素节点中的文本内容，包括空白文本。


    **图 4-1.** *catalog.xml 的 XPath 数据模型*


    由于我们尚未讨论 XPath 表达式语法，我们将从直观的角度，参考图 4-1 所示的数据模型来讲解以下示例。稍后在“位置路径”部分，我们将更详细地讨论 XPath
    表达式语法。


    快速浏览以下定位 `catalog.xml` 中节点集的 XPath 表达式：


    • `/catalog/journal/article[@level=''Advanced'']/title` 是一个 XPath 表达式，其计算结果为一个节点集，该节点集包含名为
    `title` 的元素，这些元素嵌套在名为 `article` 的元素内，而 `article` 元素又嵌套在名为 `journal` 的元素内，`journal`
    元素再嵌套在名为 `catalog` 的元素内，其中名为 `article` 的元素有一个名为 `level`（属性通过 `@` 前缀标识）且值等于 `Advanced`
    的属性。计算此表达式将按文档顺序选择第二个 `title` 元素。


    • `/catalog/journal[@title=''Java Technology'']/article[2]` 是一个 XPath 表达式，其计算结果为一个节点集，该节点集包含名为
    `article` 的元素，这些元素嵌套在名为 `journal` 的元素内，而 `journal` 元素嵌套在名为 `catalog` 的元素内，其中名为
    `journal` 的元素有一个名为 `title` 且值等于 `Java Technology` 的属性，并且 `article` 元素处于第二个上下文位置（按文档顺序）。`article`
    元素的第二个上下文位置通过 `[2]` 后缀指定。计算此表达式将按文档顺序选择标题为 `Java Technology` 的期刊中的第二个 `article`
    元素。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C04.fm Page 88 Thursday, July 6, 2006 1:40 PM


    **88**


    第 4 章 ■ 使用 XPath 进行寻址


    • `/child::catalog/child::journal/child::article[attribute::date=''January-2004'']/attribute::level`
    是一个 XPath 表达式，其计算结果为一个节点集，该节点集包含名为 `level` 的属性，这些属性附加在名为 `article` 的元素上，而 `article`
    元素嵌套在名为 `journal` 的元素内，`journal` 元素嵌套在名为 `catalog` 的元素内，其中名为 `article` 的元素有一个名为
    `date` 且值等于 `January-2004` 的属性。XPath 表达式中的语法结构 `::` 定义了一个选择轴，轴名称位于此结构之前。例如，`child::`
    定义了子轴，`attribute::` 定义了属性轴。如果未指定选择轴，则 `child::` 是隐式选择轴。因此，`/` 和 `/child::` 是等价的结构。此外，`@`
    语法是 `attribute::` 语法的简写。计算此表达式将按文档顺序选择第二个 `article` 元素的 `level` 属性。


    • `//article[ancestor::journal[@title=''Java Technology'']]` 是一个 XPath 表达式，其计算结果为一个节点集，该节点集包含名为
    `article` 的元素，这些元素有一个名为 `journal` 的祖先元素，其中名为 `journal` 的元素有一个名为 `title` 且值等于 `Java
    Technology` 的属性。语法结构 `//` 是所有后代节点的简写；由于它位于表达式的开头，它表示根节点的所有后代。计算此表达式将按文档顺序选择第二个和第三个
    `article` 元素。

