- fmt: "# XML\n\n`XML` is a simple, flexible, platform-independent language for representing\
    \ structured textual information. The platform-independent nature of `XML` makes\
    \ it an ideal vehicle for exchanging data across application components. When\
    \ disparate application components exchange XML-based data, they do so because\
    \ they want to process the exchanged data in some application-specific manner,\
    \ such as extracting and storing the data in a database or maybe formatting and\
    \ presenting the data as part of a user interface. This raises an interesting\
    \ point: although `XML` is ideal for exchanging data, processing `XML` content\
    \ using the various APIs we have discussed in the preceding chapters can be highly\
    \ inefficient. Why is that so?\n\nThe answer is that most processing logic today\
    \ resides within application components that are object oriented, whereas processing\
    \ `XML` content is extremely procedural in nature. Each component that wants to\
    \ process some `XML` content has to not only be concerned that the content is\
    \ well-formed but also that it conforms to some specific structure (or, in other\
    \ words, is valid with respect to some schema). Furthermore, once the component\
    \ has verified that the `XML` content is well-formed and valid, it has to use\
    \ an appropriate API to access the data embedded within the `XML` content.\n\n\
    Of course, it can certainly do all that—in previous chapters, we discussed how\
    \ to parse and validate `XML` content and how to access and modify data embedded\
    \ within `XML` content by using the appropriate APIs, but directly using these\
    \ APIs within most object-oriented applications can be highly inefficient from\
    \ the point of view of encapsulation and code reuse. To address the inefficiencies\
    \ associated with directly processing `XML` content within object-oriented Java\
    \ applications, you need a Java API that transparently maps `XML` content to Java\
    \ objects and Java objects to `XML` content.\n\n`Java Architecture for XML Binding\
    \ (JAXB)` is precisely such an API.\n\n## Overview\n\nThe key to understanding\
    \ `JAXB` is to focus on the following points:\n\n- Given an `XML Schema` document,\
    \ an infinite number of `XML` documents can be constructed that would be valid\
    \ with respect to the given schema.\n- Given a schema and an `XML` document that\
    \ conforms to the given schema, an element within the given `XML` document must\
    \ conform to a type component specified within the given schema.\n- What an object\
    \ instance is to its corresponding class within Java, an element in an `XML` document\
    \ is to an element declaration specified within the document’s schema.\n- Each\
    \ type component (with some exceptions) specified within a schema can be mapped\
