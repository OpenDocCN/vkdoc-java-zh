- fmt: '# XML Schema 语言


    `XML Schema 1.0`定义语言规定了XML文档的结构并约束其内容。需要理解的关键概念是，基于`XML Schema`语言的模式定义了一类有效的XML文档。如果文档符合模式定义的结构，则认为该文档相对于该模式是有效的。有效的XML文档在形式上被称为模式文档的*实例*。粗略类比一下，`Java`类之于`Java`对象的关系，就如同模式之于XML文档。


    另一个需要牢记的重要点是，模式本身也是一个XML文档。事实上，这是`XML Schema`语言的关键动机之一；另一种结构标准`DTD`就不是XML文档。如果这一点还不明显，你实际上可以为基于`XML
    Schema`的模式文档编写一个模式！


    以下是对`XML Schema`语言的非规范性讨论。我们将尽可能在示例模式的上下文中解释各种`XML Schema`结构。我们将展示如何逐步构建一个示例模式，同时解释各种`XML
    Schema`结构。该示例模式将为清单1-2中所示的示例XML文档定义结构。


    **清单 1-2.** *示例 XML 文档*


    ```

    <?xml version=''1.0'' encoding=''UTF-8'' ?>


    <catalog publisher="O''Reilly" title="OnJava.com" >


    <journal date="2004-05-05" >


    <article>


    <title>Java and XML</title>


    <author>Narayanan Jayaratchagan</author>


    12\. 参见 XML Schema 第一部分：结构 (http://www.w3.org/TR/xmlschema-1/) 和 XML Schema 第二部分：数据类型
    (http://www.w3.org/TR/xmlschema-2/) 以获取更多信息。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C01.fm Page 12 Wednesday, June 28, 2006 6:27 AM


    **12**


    第一章 ■ 介绍 XML 和 Java


    </article>


    </journal>


    </catalog>

    ```


    ## 模式声明


    模式的根元素是`schema`，它定义在`XML Schema`命名空间中。一个包含根元素的示例模式文档如下：


    ```

    <xsd:schema >


    </xsd:schema>

    ```


    ## 内置数据类型


    `XML Schema`语言有44种内置简单类型，这些类型在`XML Schema`第二部分：数据类型 (http://www.w3.org/TR/xmlschema-2/)
    中指定。这些数据类型当然属于`XML Schema`命名空间，因此我们将使用`xsd:`前缀，例如`xsd:string`。表1-1列出了最常用的内置数据类型。有关内置数据类型的完整列表，请查阅W3C推荐标准。


    **表 1-1.** *常用的内置数据类型*


    | 数据类型 | 描述 | 示例 |

    | --- | --- | --- |

    | `string` | 字符串 | New York, NY |

    | `int` | –2147483648 到 2147483647 | +234, –345, 678987 |

    | `double` | 64位浮点数 | –345.e-7, NaN, –INF, INF |

    | `decimal` | 有效的十进制数 | –42.5, 67, 92.34, +54.345 |

    | `date` | 格式为 CCYY-MM-DD 的日期 | 2006-05-05 |

    | `time` | 格式为 hh:mm:ss-hh:mm 的时间 | 10:27:34-05:00 (表示东部标准时间10:27:34，即UTC-5小时)
    |


    ## 元素声明


    你可以使用`element`结构在基于`XML Schema`的模式中定义一个元素，如下所示：


    ```

    <xsd:element name="element_name" type="element_type"/>

    ```


    你可以在`schema`结构内定义一个元素。包含顶级`catalog`元素声明的示例模式文档如下：


    ```

    <xsd:schema >


    <xsd:element name="catalog" type="catalogType" ></xsd:element>


    <!-- 我们尚未定义 catalogType -->


    </xsd:schema>

    ```


    当然，我们还没有定义`catalogType`。`XML Schema`语言定义了两种主要的类型结构：简单类型和复杂类型。没有复杂类型，几乎任何有意义的文档结构都是不可行的，因此接下来我们将介绍复杂类型。


