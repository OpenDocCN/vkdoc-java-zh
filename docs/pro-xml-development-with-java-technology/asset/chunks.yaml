    第 14 章 ■ 构建基于 XML 的 WEB 服务


    SOAP 1.1 编码风格


    头部块和 `soapenv:Body` 内容可以是 Web 服务所需的任何内容，只要头部块和 `soapenv:Body` 内容具有命名空间限定并且当然是格式良好的
    XML。


    这就引出了一个显而易见的问题：头部块和 `soapenv:Body` 内容应该如何编码？根据 WS-I BP 1.1，答案很简单：头部块和 `soapenv:Body`
    内容都不应该被编码。WS-I BP 1.1 禁止使用任何编码风格，包括 SOAP 1.1 编码。


    所有头部块和 `soapenv:Body` 内容必须按字面意思序列化，这意味着头部块和 `soapenv:Body` 内容必须符合模式定义。如果您想知道，这种编码风格的缺失是否会以任何方式限制
    Web 服务的能力？答案很简单：不会。事实上，SOAP 1.1 编码存在的唯一原因是，在编写 SOAP 1.1 W3C 备忘录时，XML Schema 语言尚未完成。


    与编码相关的详细规则如下：


    *   `http://schemas.xmlsoap.org/soap/envelope/` 命名空间中的任何元素不得包含 `soapenv:encodingStyle`
    属性。

    *   `soapenv:Body` 元素的任何直接子元素或孙元素不得包含任何 `soapenv:encodingStyle` 属性。


    现在您已经准备好更仔细地研究每个 `soapenv:Envelope` 子元素了。


    SOAP 1.1 头部


    `soapenv:Header` 元素的主要目的是可扩展性。Web 服务需要不同类型的能力，这些能力覆盖在基本的 Web 服务交互之上。这些能力可以是与安全、事务管理或基于基本
    Web 服务的复杂业务流程编排相关的服务。与这些能力相关的信息驻留在 `soapenv:Header` 元素的子元素中；这些直接子元素被称为*头部块*。


    在接下来的讨论中，请记住多个中间节点可能会处理一个 SOAP 1.1 消息。

