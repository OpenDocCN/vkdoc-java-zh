    ## Summary


    You can parse an XML document using one of three methods: DOM, push, or pull.


    The DOM approach provides random access and a complete ability to manipulate document
    elements and attributes; however, this approach consumes the most memory. This
    approach is best for use in situations where an in-memory model of the XML structure
    and content is required so that an application can easily manipulate the structure
    and content of an XML document. Applications that need to visualize an XML document
    and manipulate the document through a user interface may find this API extremely
    relevant to their application objectives. The DOM Level 3 API included in `JAXP
    1.3` implements this approach.


    The push approach is based on a simple event notification model where a parser
    synchronously delivers parsing events so an application can handle these events
    by implementing a callback handler interface. The `SAX 2.0` API is best suited
    for situations where the core objectives are as follows: quickly parse an XML
    document, make sure it is well-formed and valid, and extract content information
    contained in the document as the document is being parsed. It is worth noting
    that a DOM API implementation could internally use a `SAX 2.0` API–based parser
    to parse an XML document and build a DOM tree, but it is not required to do so.
    The `SAX 2.0` API included in `JAXP 1.3` implements this approach.


    The pull approach provides complete control to an application over how the document
    parse events are processed and provides a cursor-based approach and an iterator-based
    approach to control the flow of parse events. This approach is best suited for
    processing XML content that is being streamed over a network connection. Also,
    this API is useful for marshaling and unmarshaling XML documents from and to Java
    types. Major areas of applications for this API include web services–related message
    processing and XML-to-Java binding. The StAX API included in `J2SE 6.0` implements
    this approach.


