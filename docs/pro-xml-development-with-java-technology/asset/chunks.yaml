- fmt: "在本节中，您将使用 XQuery 查询 XML 文件 `catalog.xml`。XQuery 是一种类似 SQL 的语言，用于查询 XML 数据源。`XmlCursor`\
    \ 接口方法 `execQuery(queryExpression)` 使用 XQuery 表达式查询 XML 文档。首先，您需要使用 `CatalogDocument`\
    \ 对象的 `newCursor()` 方法创建一个 XML 游标，如清单 7-32 所示。\n\n**清单 7-32.** *创建 XML 游标*\n\n\
    ```\nCatalogDocument catalogDocument = CatalogDocument.Factory.parse(xmlFile);\n\
    XmlCursor cursor = catalogDocument.newCursor();\n```\n\n例如，查询 `journal` 元素中第一个\
    \ `article` 元素的 `level` 属性值。您选择用于 `level` 属性的 XQuery 表达式，如清单 7-33 所示。\n\n**清单\
    \ 7-33.** *选择 `level` 属性的 XQuery 表达式*\n\n```\nString queryExpression = \"for $a\
    \ in $this/catalog/journal/article[1]\"\n    + \"return $a/@level\";\n```\n\n\
    XQuery 表达式片段 `for $a in $this/catalog/journal/article[1]` 定义了一个变量 `$a`，用于选择当前游标位置下\
    \ `catalog` 元素中 `journal` 元素内的第一个 `article`。XQuery 表达式片段 `return $a/@level` 返回\
    \ `article` 元素的 `level` 属性。查询通过 `execQuery(String)` 方法执行，查询结果位于新 XML 文档中 `resultCursor`\
