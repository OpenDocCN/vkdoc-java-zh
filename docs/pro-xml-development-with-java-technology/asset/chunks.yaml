- fmt: '# PART 6


    ## Web Applications and Services


    **A**synchronous JavaScript and XML (`Ajax`) is a term, coined by Jesse James
    Garrett of Adaptive Path,¹ used to describe a web technique that allows you to
    create asynchronous web applications using `JavaScript`, the Document Object Model
    (`DOM`), and `XMLHttpRequest` technologies. Using this technique, a browser-based
    user interface can interact with the server to update selected parts of a web
    page without having to reload the web page.


    This web technique decreases the amount of data exchanged between a browser and
    the back end, which in turn decreases latency and makes a browser-based user interface
    much more interactive; and this makes it more like a conventional desktop application.


    `Ajax` has numerous useful applications; some of the more common ones are as follows:


    - **Dynamic form data validation**: While a user fills in a form that requires
    a unique identifier in a field, a form field can be validated without the complete
    form being submitted.

    - **Autocompletion**: While a user types data in a form field, the form field
    gets autocompleted based on data fetched from the server.

    - **Data refreshes on a page**: Some web pages require that parts of the web page
    be refreshed frequently; a weather website, for example, has this requirement.
    Using `Ajax` techniques, a web page can poll a server for the latest data and
    refresh selected parts of the web page, without reloading the page.


    `JavaScript` and `DOM` scripting are basic web technologies; therefore, we won’t
    discuss them in detail here. We will, however, cover how the `XMLHttpRequest`
    object works.


    > **Note** If you want to read more about `JavaScript`, `DOM` scripting, and general
    `Ajax` techniques, check out *Beginning JavaScript with DOM Scripting and Ajax*
    by Christian Heilmann (Apress, 2006). For a lot more on `Ajax` programming with
    Java, check out *Pro Ajax with Java Frameworks* by Nathaniel T. Schutta and Ryan
    Asleson (Apress, 2006).


    ¹ The seminal article on `Ajax` is available at [http://adaptivepath.com/publications/essays/archives/000385.php](http://adaptivepath.com/publications/essays/archives/000385.php).


    ---


    ## What Is XMLHttpRequest?


    The `XMLHttpRequest` object provides asynchronous communication between a browser-based
    user interface and web server–based business services. Using the `XMLHttpRequest`
    object, clients can submit and retrieve XML data to and from a web server without
    reloading the web page. You can convert XML data to HTML on the client side using
    the `DOM` and `XSLT`.


    Microsoft introduced `XMLHttpRequest` within Internet Explorer (IE) 5 as `ActiveXObject`.³
    Most browsers support `XMLHttpRequest`; however, the implementations are not interoperable.
    For example, you can create an instance of the `XMLHttpRequest` object in IE 6
    with the following code:


    ```

    var req = new ActiveXObject("Microsoft.XMLHTTP");

    ```


    In IE 7, `XMLHttpRequest` is available as a `window` object property. You create
    an instance of the `XMLHttpRequest` object in IE 7 as shown here:


    ```

    var req = new XMLHttpRequest();

    ```


    Recently, the W3C introduced a Working Draft⁴ of the `XMLHttpRequest` object,
    which will standardize the implementations of it. The `XMLHttpRequest` object
    provides various properties for implementing HTTP client functionality, which
    are discussed in Table 13-1.


    **Table 13-1.** *XMLHttpRequest Properties*


    | Property | Description |

    | --- | --- |

    | `onreadystatechange` | Sets the callback method for asynchronous requests. |

    | `readyState` | |'
