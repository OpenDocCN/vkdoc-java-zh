    **解析方法概述**


    在接下来的几节中，我们将从概念层面概述三种主要的解析方法。在后续章节中，我们将讨论实现这些方法的具体 Java API。我们先从 DOM 方法开始。


    **DOM 方法**


    文档对象模型（DOM）Level 3 核心规范定义了用于访问和操作内容、以及指定通用文档结构的平台与语言无关的接口。DOM 将文档表示为 Node 对象的树。其中一些
    Node 对象拥有子节点对象；另一些则是没有子节点的叶对象。


    为了表示 XML 文档的结构，通用的 Node 类型被特化为其他 Node 类型，每种特化的节点类型都指定了一组允许的子 Node 类型。表 2-1 解释了用于表示
    XML 文档的特化 DOM Node 类型及其允许的子 Node 类型。


