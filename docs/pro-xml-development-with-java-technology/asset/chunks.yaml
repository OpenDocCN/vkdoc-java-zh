    • A class that implements the ErrorHandler interface (Table 2-3) The SAX 2.0 API
    provides a DefaultHandler helper class that fully implements the ContentHandler
    and ErrorHandler interfaces and provides default behavior for every parser event
    type along with default error handling. Applications can extend the DefaultHandler
    class and override relevant base class methods to implement their custom callback
    handler. CustomSAXHandler, shown in Listing 2-13, is such a class that overrides
    some of the base class event notification methods, including the error-handling
    methods.


    Key points about CustomSAXHandler class are as follows:


    • In th e CustomSAXHandler class, in the startDocument() and endDocument() methods,
    the event type is output.


    • In th e startElement() method, the event type, element qualified name, and element
    attributes are output. The uri parameter of the startElement() method is the namespace
    uri, which may be null, for an element. The parameter localName is the element
    name without the element prefix. The parameter qName is the element name with
    the prefix. If an element is not in a namespace with a prefix, localName is the
    same as qName.


    • The parameter attributes is a list of element attributes. The startElement()
    method prints the qualified element name and the element attributes. The Attributes
    interface method getQName() returns the qualified name of an attribute. The attribute
    method getValue() returns the attribute value.


    • The characters() method, which gets invoked for a text event, such as element
    text, prints the text for a node.


    • The three error handler methods—fatalError, error, and warning—print the error
    messages contained in the SAXParseException object passed to these methods.


