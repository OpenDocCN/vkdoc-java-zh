    # CHAPTER 12


    ## Converting XML to PDF


    In the previous chapter, we discussed the procedure to convert an XML document
    to a Microsoft Excel spreadsheet. In this chapter, we will show how to convert
    an XML document to a PDF document.


    The open source Apache Formatting Objects Processor (FOP) project provides an
    API to convert an XML document to PDF or other formats such as Printer Control
    Language (PCL), PostScript (PS), Scalable Vector Graphics (SVG), XML, Print, Abstract
    Window Toolkit (AWT), Maker Interchange Format (MIF), or TXT. You can also set
    the layout and font with the Apache FOP API. The Apache FOP takes an XSL formatting
    object (an XSL-FO object) as input and produces a PDF (or other format) document
    as output. XSL-FO is defined in the XSL 1.0 specification.1 Therefore, to convert
    XML to PDF, you first need to convert XML to XSL-FO and subsequently convert XSL-FO
    to PDF.


    ### Installing the Software


    Before you can set up your project, you need to download the Apache FOP2 zip file
    `fop-0.20.5-bin.zip` and extract the zip file to a directory. Assuming `<FOP>`
    is the directory in which you extracted the FOP zip file, you need the JAR files
    listed in Table 12-1 for developing an XML to PDF conversion application.


    **Table 12-1.** *Apache FOP JAR Files*


    | JAR File | Description |

    |----------|-------------|

    | `<FOP>/build/fop.jar` | FOP API classes |

    | `<FOP>/lib/avalon-framework-cvs-20020806.jar` | Logger classes |

    | `<FOP>/lib/batik.jar` | Graphics classes |

    | `<FOP>/lib/xercesImpl-2.2.1.jar` | The Xerces API |

    | `<FOP>/lib/xml-apis.jar` | The XML API |

    | `<FOP>/lib/xalan-2.4.1.jar` | The XSLT API |


    You also need to download JDK 5.0. (You can also use another version of the JDK
    such as 1.4 or 6.0.)


    1. See http://www.w3.org/TR/xsl/.

    2. For more information about Apache FOP, see http://xmlgraphics.apache.org/fop/.


