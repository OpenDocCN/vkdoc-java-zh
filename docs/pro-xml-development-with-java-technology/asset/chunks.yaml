    An XSL-FO formatting object includes formatting information about the data to
    be presented in a PDF document, the layout and fonts used in the document, and
    the tables in the document. To convert an XML document to a PDF document, first
    you need to convert the XML document to an XSL-FO document. The procedure to convert
    an XML document to an XSL-FO document is as follows: **1.** Create an XSLT to
    transform XML to XSL-FO.


