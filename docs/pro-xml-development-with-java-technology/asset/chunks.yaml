    C H A P T E R 7


    ■ ■ ■


    Binding with XMLBeans


    **X**MLBeans,1 just like JAXB, is an XML-to-Java binding and runtime framework.
    You can use the binding framework to bind an XML Schema to Java types; you can
    use the runtime framework to unmarshal and marshal an XML document to and from
    its Java binding classes. If you are wondering why you are studying another XML-to-Java
    binding, the answer lies in the following reasons:


    • XMLBeans provides full support for XML Schema binding to Java types across multiple
    versions of the Java platform. Even though JAXB 2.0 provides full support for
    XML Schema, it requires J2SE 5.0; XMLBeans is the only XML-to-Java binding with
    full schema support that works with J2SE 1.4\. *x*, as well as with J2SE 5.0.


    • XMLBeans predates JAXB, and perhaps because of that, it has found its way into
    many more commercial products than JAXB, although, admittedly, if JAXB 2.0 is
    widely adopted, this may not last into the future.


    • XMLBeans defines the XmlObject API for access to XML information content through
    type-safe Java classes. XMLBeans also defines the XmlCursor API that provides
    cursor-based access to the XML InfoSet that underlies an XML document. This means
    by using XMLBeans, you can access and manipulate information content through type-safe
    Java classes, and you can do so in a manner that is related to the low-level details
    within the document, such as the order of elements or attributes.


    • XMLBeans defines the SchemaType API that provides a schema object model for
    metadata contained within an XML Schema. This is useful if you want to dynamically
    create an XML


    document that conforms to a schema.


    In our opinion, JAXB should be the default choice for a binding framework, because
    it is part of the Java Platform Standard Edition. However, in certain situations,
    for reasons discussed previously and summarized in Table 7-1, XMLBeans may be
    the more pragmatic choice.'
