- fmt: 'Now that you have looked at some examples from an intuitive standpoint, we’ll
    try to broaden your understanding of XPath syntax. Like expressions in most languages,
    you can compose complex XPath expressions by additively or multiplicatively combining
    basic expressions. Therefore, the key to understanding XPath expressions is to
    master the basic expressions and various datatypes that may result from evaluating
    an XPath expression. With that as your immediate goal, you will focus on two topics:


    - XPath expression evaluation datatypes

    - A basic expression construct called the *location path*


    ## Datatypes


    An XPath expression evaluation results in one of the following datatypes:


    - A boolean value of `true` or `false`

    - A number value (a floating-point number, as defined by the Institute of Electrical
    and Electronics Engineers [IEEE])

    - A string value

    - A node-set (a set of document nodes of any type)


    ## Location Path


    Now we’ll cover the syntax associated with the location path construct. A location
    path can be absolute, in which case it begins with a slash (`/`), or it can be
    relative, in which case it does not begin with a slash. A location path can consist
    of zero or more location path steps, with a slash separating adjacent steps.


    Each location path step starts with an axis specifier, followed by a node test,
    and optionally followed by zero or more predicates:


    ```

    Step ::= AxisSpecifier NodeTest Predicate*

    ```


    The location path step components are as follows:


    - An *axis specifier* is basically a logical route (axis) along which you can
    move from the context node to find the next node set (the context node is the
    node where you start from).

    - A *node test* is a filter that constrains the selected node set based on either
    a node type or a node name.

    - A *predicate* is a filter that constrains the selected node set based on an
    XPath expression.


    We will cover each of these components in more detail in the following sections.
    For example, the location path `/child::catalog/child::journal/child::article[attribute::date=''January-2004'']/attribute::level`
    has four steps. The first step is `child::catalog`, the second step is `child::journal`,
    the third step is `child::article[attribute::date=''January-2004'']`, and the
    fourth step is `attribute::level`. In the first two steps, `child::` is the axis
    specifier, and `catalog` and `journal` are node tests. In the third step, `child::`
    is the axis specifier, `article` is a node test, and `[attribute::date=''January-2004'']`
    is a predicate. In the fourth step, `attribute::` is the axis specifier, and `level`
    is a node test. The first, second, and fourth steps don’t have any predicates.


    ### Axis Specifier


    As noted, the axis specifier specifies a logical axis along which you must move
    from the context node to find the next node set specified by a location path expression.
    An axis specifier axis is classified as a *forward axis* if by moving along it
    you encounter nodes that occur at or later than the context node, in document
    order; otherwise, an axis is classified as a *reverse axis*. In Figure 4-2, we
    have taken the basic XPath data model shown in Figure 4-1 and annotated it with
    a context node, axis labels, and associated node sets. For example, the `parent::`
    axis label in Figure 4-2 points to its associated node set of the parent journal
    element. Of course, you always need to keep in mind the context node, whenever
    you interpret the node set for any axis value.


    **Figure 4-2.** *Axis specifier annotations on the data model*


    The following are possible axis specification values with examples based on the
    annotated data model shown in Figure 4-2:


    - `self::` refers to the context node. For example, in Figure 4-2, `self::` refers
    to the article context node.

    - `child::` refers to child nodes in document order. This axis applies only to
    element nodes. This axis is empty if the context node is an attribute, text, or
    namespace node. An element’s attribute node is not a child node. This axis does
    not contain any attribute or namespace nodes. Figure 4-2 shows an example of the
    `child::` axis. If an axis specifier is omitted, this is the default value. This
    is a forward axis.

    - `parent::` refers to the parent node when the context node is an element node
    or a text node, but it refers to the attaching element node when the context node
    is an attribute node. Figure 4-2 shows an example of the `parent::` axis, where
    the context node is an element node. If the context node were the date attribute
    of the current article context node, then the `parent::` axis would include only
    the current article context node. This is a reverse axis.

    - `attribute::` refers to the attached attribute nodes. Figure 4-2 shows an example
    of the `attribute::` axis. This axis may be abbreviated with the `@` character.
    In other words, `attribute::level` and `@level` are equivalent. This axis is empty
    if the context node is not an element node. This is a forward axis.

    - `ancestor::` refers to all the nodes starting with the parent and continuing
    with the parent’s parent, and so on, until it reaches the root node. If you follow
    this axis, you will not come across any parent siblings, attribute, or namespace
    nodes. Figure 4-2 shows an example of the `ancestor::` axis. This is a reverse
    axis.

    - `descendant::` refers to all the nodes starting with all element child nodes
    and continuing with their descendants, in document order. This axis does not contain
    any attribute nodes or namespace nodes. This axis is empty if the context node
    is an attribute or namespace node. Figure 4-2 shows an example of the `descendant::`
    axis. This is a forward axis.

    - `following::` refers to all the nodes that are after the context node, in document
    order, with the exception of those that occur along the `descendant::` axis. This
    axis does not contain any attribute or namespace nodes. Figure 4-2 shows an example
    of the `following::` axis. This is a forward axis.

    - `preceding::` refers to all the nodes that are before the context node, in document
    order, with the exception of those that occur along the `ancestor::` axis. This
    axis does not contain any attribute or namespace nodes. Figure 4-2 shows an example
    of the `preceding::` axis. This is a reverse axis.

    - `following-sibling::` refers to all the `following::` nodes that are siblings
    of the context node, in document order. This axis does not contain any attribute
    or namespace nodes. This axis is empty if the context node is an attribute or
    namespace node. Figure 4-2 shows an example of the `following-sibling::` axis.
    This is a forward axis.

    - `preceding-sibling::` refers to all the `preceding::` nodes that are siblings
    of the context node, in reverse document order. This axis does not contain any
    attribute or namespace nodes. This axis is empty if the context node is an attribute
    or namespace node. Figure 4-2 shows an example of the `preceding-sibling::` axis.
    This is a reverse axis.

    - `ancestor-or-self::` refers to all the nodes, including the current node and
    continuing with its ancestors, in reverse document order. Figure 4-2 shows an
    example of the `ancestor::` and `self::` nodes, and together they form the `ancestor-or-self::`
    axis. This is a reverse axis.'
