    在 DOCTYPE 声明中定义。一个 DOCTYPE


    有三种类型的 DTD 规范：内部、私有和公共。你可以在 XML 文档内部指定一个内部 DTD，如下所示：


    11\. DTD 不是 XML 文档，并且超出了本书的讨论范围。不过，互联网上有大量教程可以让你快速了解 DTD 的基础知识。


