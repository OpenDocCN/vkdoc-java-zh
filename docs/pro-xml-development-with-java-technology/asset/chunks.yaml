    **图 7-2.** *Chapter7 项目的源路径* **图 7-3.** *Chapter7 项目目录结构* **编译 XML Schema**


    在本节中，您将首先将示例模式（catalog.xsd，如清单 7-1 所示）绑定到其对应的 Java 类型。随后，您将编组和解组示例 XML 文档（catalog.xml，如清单
    7-2 所示）。如前所述，您将使用 `scomp` 绑定编译器来绑定示例模式。`scomp` 的语法有多种选择，如清单 7-3 所示。


