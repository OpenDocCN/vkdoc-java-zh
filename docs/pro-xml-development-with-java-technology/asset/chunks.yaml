    ## Binding the Catalog Schema to Java Classes


    In this section, you will bind the catalog schema shown in Listing 6-6 to its
    Java content classes. You’ll subsequently use the Java content classes to marshal
    and unmarshal the XML document shown in Listing 6-7. You compile the XML Schema
    with the JAXB binding compiler `xjc`, which can be run with the runtime options
    listed in Table 6-1.


    **Table 6-1.** *xjc Command Options*


    | Option | Description |

    |--------|-------------|

    | `-nv` | The strict validation of the input schema(s) is not performed. |

    | `-b <file>` | Specifies the external binding file. |

    | `-d <dir>` | Specifies the directory for generated files. |

    | `-p <pkg>` | Specifies the target package. |

    | `-classpath <arg>` | Specifies the classpath. |

    | `-use-runtime <pkg>` | Specifies the runtime package. |'
