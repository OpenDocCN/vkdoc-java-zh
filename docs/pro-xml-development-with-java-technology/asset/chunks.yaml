- fmt: "# Chapter 5: Transforming with XSLT\n\n## Conditional Processing\n\nThe XSLT\
    \ specification provides the `xsl:if` and `xsl:choose` elements for conditional\
    \ processing. The attribute named `test` of the `xsl:if` element evaluates to\
    \ a boolean value and controls conditional processing. Listing 5-10 shows an example\
    \ of an `xsl:if` element.\n\n**Listing 5-10.** *Conditional Application of the\
    \ Template*\n\n```\n<xsl:if test=\"$param1='param1'\">\n  <xsl:apply-templates/>\n\
    </xsl:if>\n```\n\nThe `test` attribute in Listing 5-10 compares the value of the\
    \ `param` parameter with the string `param1`. If the test expression evaluates\
    \ to true, `<xsl:apply-templates/>` is invoked.\n\n## `xsl:copy-of` Element\n\n\
    You can select elements in a result tree from the source tree, or you can add\
    \ new elements. You can copy a source tree fragment to the result tree with the\
    \ `xsl:copy-of` element. `xsl:copy-of` copies the selected element node, the attributes\
    \ of the element, and the subelements of the element. The following is an example\
    \ of `xsl:copy-of`:\n\n```\n<xsl:copy-of select=\"catalog/journal\"/>\n```\n\n\
    The `xsl:copy` element copies a selected node, but any attributes and subelements\
    \ of the node are not copied.\n\n## `xsl:value-of` Element\n\nThe `xsl:value-of`\
    \ element adds a text node in the result tree. The `xsl:value-of` element’s `select`\
    \ attribute expression evaluates to a string. The following is an example of an\
    \ `xsl:value-of` element that evaluates the string value of a `title` attribute\
    \ of a `journal` element:\n\n```\n<xsl:value-of select=\"journal/@title\" />\n\
    ```\n\n## Adding Elements, Attributes, and Text\n\nYou can add elements to a result\
    \ tree with the `xsl:element` element. The following is an example of `xsl:element`\
    \ that creates a `table` element:\n\n```\n<xsl:element name=\"table\">\n</xsl:element>\n\
    ```\n\nYou can add attributes to a result tree with the `xsl:attribute` element.\
    \ The following is an example of the `xsl:attribute` element that creates the\
    \ attribute `title`:\n\n```\n<xsl:attribute name=\"title\" >XML Journal</xsl:attribute>\n\
    ```\n\nYou can add a text node to a result tree with the `xsl:text` element. The\
    \ body of this element specifies the text node in the result tree.\n\n## Setting\
    \ Up the Eclipse Project\n\nIn this chapter, we will show how to transform an\
    \ example XML document, listed in Listing 5-11, using various XSLT style sheets;\
    \ each style sheet will demonstrate a specific transformation example.\n\nIn these\
    \ style sheets, duplicate elements in `catalog.xml` will be removed, `title` elements\
    \ will be sorted, and various nodes will be filtered.\n\n**Listing 5-11.** *catalog.xml*\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<catalog>\n  <journal title=\"\
    Java Technology\" publisher=\"IBM developerWorks\">\n    <article level=\"Intermediate\"\
    \ date=\"January-2004\" section=\"Java Technology\">\n      <title>Service Oriented\
    \ Architecture Frameworks</title>\n      <author>Naveen Balani</author>\n    </article>\n\
    \    <article level=\"Advanced\" date=\"October-2003\" section=\"Java Technology\"\
    >\n      <title>Advanced DAO Programming</title>\n      <author>Sean Sullivan</author>\n\
    \    </article>\n    <article level=\"Advanced\" date=\"May-2002\" section=\"\
    Java Technology\">\n      <title>Best Practices in EJB Exception Handling</title>\n\
    \      <author>Srikanth Shenoy</author>\n    </article>\n  </journal>\n</catalog>\n\
    ```\n\nBefore you can build and run the code examples included in this chapter,\
    \ you need an Eclipse project. The quickest way to create an Eclipse project is\
    \ to download the Chapter5 project from the Apress website (http://www.apress.com)\
    \ and import this project into Eclipse. This will create all the Java packages\
    \ and files needed for this chapter automatically.\n\nIn this chapter, we will\
    \ show how to use the JAXP 1.3 TrAX APIs included in J2SE 5.0. Therefore, you\
    \ need to install the J2SE 5.0 SDK and set its JRE system library as the JRE system\
    \ library in your Eclipse project Java build path. You can do this by right-clicking\
    \ the Eclipse project name in the Package Explorer, choosing Properties, selecting\
    \ the Java Build Path to Libraries tab, and clicking the Add Library button. Figure\
    \ 5-3 shows all the files and folders in the Chapter5 project.\n\nYou can find\
    \ information about J2SE 5.0 at http://java.sun.com/j2se/1.5.0/.\n\n![Image 35](index-140_1.png)\n\
    \n**Figure 5-3.** *Chapter5 project directory structure*\n\n## JAXP 1.3 Transformation\
    \ APIs\n\nTrAX is specified in JAXP 1.3 and included in J2SE 5.0. You use the\
    \ TrAX APIs to transform an XML document by applying an XSLT style sheet to an\
    \ input XML document. The output from a transformation application can be XML,\
    \ HTML, or text. The transformation APIs are organized into the following packages:\n\
    \n- The generic transformation APIs are in the `javax.xml.transform` package.\n\
    - The stream- and URI-specific transformation APIs, which you use to specify stream-based\
    \ input and output for a transformation application, are in the `javax.xml.transform.stream`\
    \ package.\n- The DOM-specific transformation APIs, which you use to specify DOM-based\
    \ input and output to a transformation application, are in the `javax.xml.transform.dom`\
    \ package.\n- The SAX 2-specific transformation APIs, which you use to specify\
    \ SAX-based input and output to a transformation application, are in the `javax.xml.transform.sax`\
    \ package.\n\nTable 5-1 lists the basic classes in the `javax.xml.transform` package.\n\
    \n**Table 5-1.** *Classes in the `javax.xml.transform` Package*\n\n| Class Name\
    \ | Description |\n|------------|-------------|\n| `TransformerFactory` | A factory\
    \ class for generating `Transformer` objects |\n| `Transformer` | A class to transform\
    \ a source tree to a result tree |\n| `Source` | An interface that defines an\
    \ input source for an input XML document or an input XSLT style sheet |\n| `Result`\
    \ | An interface that defines a transformation result tree |\n| `OutputKeys` |\
    \ Specifies output properties for a `Transformer` object |\n\nWith the only ordering\
    \ constraint that both an input source and a result tree holder have to be ready\
    \ before a transformer is applied to an input source, the conceptual steps in\
    \ the use of transformation APIs are as follows:\n\n1. Create an instance of a\
    \ transformer factory.\n2. Use the factory to create an instance of a transformer\
    \ based on an input source for an XSLT style sheet definition.\n3. Configure the\
    \ transformer for error handling.\n4. Create an input source from the input XML\
    \ document. The input source can be based on an input stream or a document object\
    \ tree.\n5. Define a holder for the result tree; the holder can be a stream or\
    \ a document object.\n6. Apply the transformer to the input source to obtain the\
    \ result tree in its holder.\n\nThe main class for transforming a source tree\
    \ to a result tree is the `Transformer` class. You use the `TransformerFactory`\
    \ class to generate `Transformer` objects. The `TransformerFactory` class is instantiated\
    \ with the static method `newInstance()`:\n\n```\nTransformerFactory factory =\
    \ TransformerFactory.newInstance();\n```\n\nThe default `TransformerFactory` implementation\
    \ class that is instantiated is `org.apache.xalan.processor.TransformerFactoryImpl`.\
    \ You can use the following lookup procedure to obtain a `TransformerFactory`\
    \ implementation class:\n\n1. Use the system property `javax.xml.transform.TransformerFactory`.\n\
    2. Use the `javax.xml.transform.TransformerFactory` property value in the `lib/jaxp.properties`\
    \ file in the JRE directory."
