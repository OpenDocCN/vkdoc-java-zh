- fmt: '# Processing Instructions in XML


    Processing instructions in an XML document specify directions for applications
    that are expected to process the document. The semantics associated with these
    instructions are application specific.


    The syntax of a processing instruction is as follows:


    ```

    <?target "instructions"?>

    ```


    In a processing instruction, `target` specifies the target application that is
    expected to process the instruction, and `instructions` specifies the processing
    instructions.


    ## DOCTYPE Declarations


    An XML document can also include a document type definition (DTD). A DTD defines
    the structure of an XML document. If the content of an XML document conforms to
    the structure imposed by its DTD, then such a document is termed *valid*. A DTD
    is defined in a `DOCTYPE` declaration. A `DOCTYPE` has three types of DTD specifications:
    internal, private, and public. You can specify an internal DTD within an XML document
    as follows:


    > A DTD is not an XML document and is beyond the scope of this book. However,
    numerous tutorials available on the Internet can quickly acquaint you with the
    basics of DTDs.


    ```

    <!DOCTYPE root_element [Elements, Attributes]>

    ```


    For example, you could have an internal DTD for the example document as shown
    here:


    ```

    <!DOCTYPE journal

    [

    <!ELEMENT journal (article)*>

    <!ELEMENT article (#PCDATA)>

    <!ATTLIST article title CDATA #IMPLIED>

    ]>

    ```


    You can specify a private external DTD as follows:


    ```

    <!DOCTYPE rootElement SYSTEM "DTDLocation">

    ```


    For example, assuming a DTD for the example document exists in a local file named
    `journal.dtd`, you can specify a private external DTD as shown here:


    ```

    <!DOCTYPE journal SYSTEM "journal.dtd">

    ```


    You can specify a public external DTD as follows:


    ```

    <!DOCTYPE rootElement PUBLIC "DTDName" "DTDLocation">

    ```


    So, assuming a DTD for the example document has a public name of `-//Apress.//DTD
    Journal Example 1.0//EN` and exists at `http://www.apress.com/javaxml/dtd/journal.dtd`,
    you can specify a public external DTD as shown here:


    ```

    <!DOCTYPE journal PUBLIC "-//Apress.//DTD Journal Example 1.0//EN"

    "http://www.apress.com/javaxml/dtd/journal.dtd">

    ```


    ## Entities


    An entity in an XML document is a storage unit that can be referenced with an
    entity reference. Entities may be parsed or unparsed. Parsed entities act like
    replacement text, and this text replaces the entity references within the document.
    Unparsed entities may or may not be text, and if text, they may not be XML text.
    Unparsed entities are never parsed into the XML document, and they are essentially
    passed through to the processing application. It is up to the processing application
    to attach any meaning to these unparsed entities.


    An entity is one of the following types: internal, parsed general entity; external,
    parsed general entity; or external, unparsed general entity. The syntax of an
    internal, parsed general entity is as follows:


    ```

    <!ENTITY entity_name "entity_value">

    ```


    The syntax of a private, external parsed general entity is as follows:


    ```

    <!ENTITY entity_name SYSTEM "SYSTEM_URI">

    ```


    The syntax of a public, external, parsed general entity is as follows:


    ```

    <!ENTITY entity_name PUBLIC "publicId" "PUBLIC_URI">

    ```


    The external, unparsed general entity is used to reference data that an XML document
    does not have to parse. The syntax of an external, unparsed general entity is
    as follows:


    ```

    <!ENTITY entity_name SYSTEM "SYSTEM_URI" NDATA notation_name>

    <!ENTITY entity_name PUBLIC "publicId" "Public_URI" NDATA notation_name>

    ```


    All entity declarations must be within a DTD or an internal DTD declaration within
    a `DOCTYPE`.


    As an example, the escape sequences `&lt;` and `&gt;` discussed earlier are in
    fact entity references to implicit, internal, parsed entities. In fact, you can
    make these implicit entities explicit, as shown in the following example:


    ```

    <!DOCTYPE journal [

    <!ENTITY lt ''&#60;''>

    <!ENTITY gt ''&#62;''>

    ]>

    ```


    The XML declaration and the entity declarations form the prolog of an XML document.


    ## Complete Example XML Document


    **Listing 1-1.** *Complete Example XML Document*


    ```

    <?xml version=''1.0'' encoding=''UTF-8'' ?>

    <!DOCTYPE journal [

    <!ENTITY lt ''&#60;''>

    <!ENTITY gt ''&#62;''>

    <!ELEMENT journal (article)*>

    <!ELEMENT article (#PCDATA)>

    <!ATTLIST article title CDATA #IMPLIED>

    ] >

    <!--XML declaration must be the first thing in a document, if it appears at all
    -->

    <!--journal is the root element -->

    <journal>

    <article date="&lt;04/12/2006&gt;" title="A Tutorial on XML 1.0" >

    <![CDATA[This is some arbitrary text <within> a CDATA!]]>

    </article>

    <!-- An empty element may of course have attributes -->

    <article title="XSLT tutorial" />

    </journal>

    ```


    ## Namespaces in XML


    An XML Namespace associates an element or attribute name with a specified URI
    and thus allows for multiple elements (or attributes) within an XML document to
    have the same name yet have different semantics associated with those names because
    they belong to different XML Namespaces.


    The key point to understand is that the sole purpose of associating a uniform
    resource indicator (URI) to a namespace is to associate a unique value with a
    namespace. There is absolutely no requirement that the URI should point to anything
    meaningful.


    You specify an XML Namespace through one of two reserved attributes:


    - You can specify a default XML Namespace URI using the `xmlns` attribute.

    - You can specify a nondefault XML Namespace URI using the `xmlns:prefix` attribute,
    where `prefix` is a unique prefix associated with this XML Namespace.


    An element or an attribute is designated to be part of an XML Namespace either
    by explicitly prefixing its name with an XML Namespace prefix or by implicitly
    nesting it within an element that has been associated with a default XML Namespace.
    It is important to understand that a namespace prefix is merely a syntactic device
    to impart brevity to a namespace reference and that the real namespace is always
    the associated URI. All this is best illustrated through an example, so turn your
    attention to the following code:


    ```

    <?xml version=''1.0'' encoding=''UTF-8'' ?>

    <jsp:root

    xsi:schemaLocation=

    "http://java.sun.com/JSP/Page http://www.nubean.com/schemas/jsf_1_1.xsd"

    >

    <f:view>

    <f:verbatim></f:verbatim>

    <html>

    <head><title>This was typed by hand</title></head>

    <body>

    <a href="http://www.w3.org/TR/REC-xml-names/">Namespaces in XML</a>

    </body>

    </html>

    </f:view>

    </jsp:root>

    ```


    In this example, the root element is in the `http://java.sun.com/JSP/Page` XML
    Namespace and is designated as such through the use of the associated `jsp` prefix
    in its element name, as in `jsp:root`.


    As another example, the `view` element is in the `http://java.sun.com/jsf/core`
    XML Namespace and is marked as such through the associated `f` prefix, as in the
    `f:view` element name. As an example of a default XML Namespace, the `html` element
    and all its nested elements have no prefix and are in the default XML Namespace
    associated with the `http://www.w3.org/1999/xhtml` URI.


    ## XML Schema 1.0 Primer'
