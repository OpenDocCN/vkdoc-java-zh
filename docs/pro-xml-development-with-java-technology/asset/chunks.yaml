  raw: '**Setting Up the Eclipse Project**


    Before you can set up your project, you need to download XMLBeans2 2.0 and extract
    it to an installation directory. You also need to download the Saxon3 8.1.1 XSLT
    and the XQuery4 processor; you’ll use the Saxon 8.1.1 API to query an XML document
    with the XmlCursor API. XMLBeans requires at least J2SE 1.4\. *x*. We are using
    J2SE 5.0 because we used it for JAXB 2.0, and we think it is convenient to continue
    using it for XMLBeans. You may choose to follow suit or use J2SE 1.4\. *x*. If
    you follow this choice, download and install J2SE 5.0, in case you have not already
    done so.


    2\. You can download the XMLBeans binary version from http://xmlbeans.apache.org/.


    3\. You can download this from http://sourceforge.net/project/


    showfiles.php?group_id=29872&package_id=21888.


    4\. We’ll discuss XQuery in the “Querying XML Document with XQuery” section.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 49](index-207_1.png)


    Vohra_706-0C07.fm Page 188 Thursday, July 13, 2006 1:11 PM


    **188**


    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    To compile and run the code examples, you will need an Eclipse project. Download
    the project Chapter7 from the Apress website (http://www.apress.com), and import
    it into your Eclipse workspace, as described in Chapter 1.


    You need some XMLBeans JAR files in your project’s Java build path; Figure 7-1
    shows these JAR files. The JAR files required for an XMLBeans application are
    xbean.jar, which consists of the XMLBeans API, and jsr173_api.jar, which implements
    JSR-173, Streaming API for XML.5 You also need to set the JRE system library to
    JRE 5.0,6 as shown in Figure 7-1.


    **Figure 7-1.** *Chapter7 project Java build path*


    You will configure the binding compiler scomp to generate Java content classes
    in the gen_source folder; therefore, add the gen_source folder to the source path
    on the Source tab in the Java build path area, as shown in Figure 7-2.


    Figure 7-3 shows the Chapter7 project directory structure.


    5\. JSR-173 defines the StAX API, which we covered in Chapter 2. Information about
    JSR 173 is available at http://www.jcp.org/en/jsr/detail?id=173.


    6\. As noted, you may choose to use JRE 1.4\. *x*.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 50](index-208_1.png)


    ![Image 51](index-208_2.png)


    Vohra_706-0C07.fm Page 189 Thursday, July 13, 2006 1:11 PM


    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    **189**


    **Figure 7-2.** *Source path for the Chapter7 project* **Figure 7-3.** *Chapter7
    project directory structure* **Compiling an XML Schema**


    In this section, you will first bind the example schema (catalog.xsd, shown in
    Listing 7-1) to its corresponding Java types. Subsequently, you will marshal and
    unmarshal the example XML document (catalog.xml, shown in Listing 7-2). As noted
    earlier, you will use the scomp binding compiler to bind the example schema. There
    is a choice of syntax for scomp use, as shown in Listing 7-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C07.fm Page 190 Thursday, July 13, 2006 1:11 PM


    **190**


    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    **Listing 7-3.** *scomp Binding Compiler Syntax*


    scomp [opts] [schema.xsd]* [config.xsdconfig]*


    scomp [opts] [directory]


    In the first scomp command, [schema.xsd]* is zero or more schemas that are inputs
    for binding to their Java types, and [config.xsdconfig]* is zero or more configuration
    files that contain custom bindings that influence the binding compiler. The second
    command shows an alternative syntax for scomp, whereby [directory] contains input
    schemas and custom binding files; this is the syntax we will use in the example.
    In both the commands, [opts] denotes the scomp compiler options, which are listed
    in Table 7-2.


    **Table 7-2.** *Scomp Compiler Options*


    **Option**


    **Description**


    -cp [a;b;c]


    Specifies the classpath.


    -d [dir]


    Specifies the target binary directory for the .class and .xsb files.


    An XSB file contains schema metainformation, which is required for tasks such
    as binding and validating.


    -src [dir]


    Specifies the target directory for the generated .java files.


    -out [xmltypes.jar]


    Specifies the output JAR file for the XML types.


    -compiler


    Specifies the path to the external Java compiler.


    We will show how to run scomp from within Eclipse. Therefore, configure scomp
    as an external tool in Eclipse. To configure scomp within Eclipse, you need to
    execute the following steps: **1.** To configure scomp as an external tool, select
    Run ➤ External Tools. In the External Tools area, create a new Program configuration
    by right-clicking the Program node and selecting New.


    This adds a new configuration, as shown in Figure 7-4.


    **2.** An external tools configuration consists of the configuration name and
    location of the scomp compiler command file. You specify the configuration name
    in the Name field. The location of the scomp command file location is in the bin
    directory of the XMLBeans installation, which you specify in the Location field.
    You also need to set the working directory and program arguments. To set the working
    directory, click the Variables button for the Working Directory field, and select
    the container_loc variable. This specifies a value of ${container_loc} in the
    Working Directory field, as shown in Figure 7-4.


    **3.** In the Arguments field, you need to set the schema that needs to be compiled
    with the scomp compiler. You also need to specify the scomp compiler options –src
    and –out. (Table 7-2


    discussed the compiler options.) In the Arguments field, specify the compiler
    options –src and –out, and set the schema resource using the syntax shown in Listing
    7-4.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 52](index-210_1.png)


    Vohra_706-0C07.fm Page 191 Thursday, July 13, 2006 1:11 PM


    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    **191**


    **Listing 7-4.** *Arguments Field*


    -src "${resource_loc}" –out "${resource_loc}/xmltypes.jar" "${resource_loc}"


    **Figure 7-4.** *Configuring scomp as an external tool* The variable resource_loc
    specifies the location of the project folder that is selected at the time the
    scomp command is run, and you can add it to the Arguments field by clicking the
    Variables button and selecting resource_loc. If the directory in which Eclipse
    is installed has empty spaces in its path name, enclose ${resource_loc} in double
    quotes, as shown in Figure 7-4\. To store the new configuration, click the Apply
    button.


    You also need to set the environment variables JAVA_HOME, PATH, and XMLBEANS_LIB
    in the external tools configuration for scomp. On the Environment tab, add the
    environment variables JAVA_HOME, PATH, and XMLBEANS_LIB, as shown in Figure 7-5\.
    The PATH variable needs to point to the bin directory under JAVA_HOME because
    scomp uses the javac compiler from the bin directory to externally compile some
    of the generated Java files into class files. The XMLBEANS_LIB variable’s value
    is the directory that contains the xbean.jar file.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](index-211_1.png)


    Vohra_706-0C07.fm Page 192 Thursday, July 13, 2006 1:11 PM


    **192**


    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    **Figure 7-5.** *scomp configuration environment variables* To add the XMLBeans
    configuration to the External Tools menu, select the Common tab, and select the
    check box External Tools in the Display in Favorites area. To run the scomp compiler
    on the example schema, select the gen_source folder in the Package Explorer, and
    then select Run ➤


    External Tools ➤ XMLBeans, as shown in Figure 7-6.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 54](index-212_1.png)


    Vohra_706-0C07.fm Page 193 Thursday, July 13, 2006 1:11 PM


