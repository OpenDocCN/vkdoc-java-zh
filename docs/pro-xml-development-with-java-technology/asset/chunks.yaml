- fmt: "Table 1-2 has a complete list of the constraining facets. These facets must\
    \ be applied to relevant built-in types, and most of the time the applicability\
    \ of a facet to a built-in type is fairly intuitive. For complete details on the\
    \ applicability of facets to built-in types, please consult XML Schema Part 2:\
    \ Datatypes.\n\n**Table 1-2.** *Constraining Facets*\n\n| **Facet** | **Description**\
    \ | **Example Value** |\n| --- | --- | --- |\n| `length` | Number of units of\
    \ length | |\n| `minLength` | Minimum number of units of length, say `m1` | |\n\
    | `maxLength` | Maximum number of units of length | 200 (Greater or equal to `m1`)\
    \ |\n| `pattern` | A regular expression | `[0-9]{5}` (for first part of a U.S.\
    \ ZIP code) |\n| `enumeration` | An enumerated value | `Male` |\n| `whitespace`\
    \ | Whitespace processing | `preserve` (as is), `replace` (new line and tab with\
    \ space), or `collapse` (contiguous sequences of space into a single space) |\n\
    | `maxInclusive` | Inclusive upper bound | 255 (for a value less than or equal\
    \ to 255) |\n| `maxExclusive` | Exclusive upper bound | 256 (for a value less\
    \ than 256) |\n| `minExclusive` | Exclusive lower bound | 0 (for a value greater\
    \ than 0) |\n| `minInclusive` | Inclusive lower bound | 1 (for a value greater\
    \ than or equal to 1) |\n| `totalDigits` | Total number of digits in a decimal\
    \ value | |\n| `fractionDigits` | Total number of fractions digits in a decimal\
    \ value | |\n\n## Complex Content\n\nA `complexContent` element specifies a constraint\
    \ on elements (including attributes). You specify a `complexContent` construct\
    \ in a `complexType` element. Just like in the case of simple content, complex\
    \ content has two types of constructs: an extension and a restriction.\n\nYou\
    \ specify a `complexContent` extension with an `extension` element. If, for example,\
    \ you want to add a `webAddress` attribute to a `catalogType` complex type using\
    \ a complex content extension, you can do so as shown here:\n\n```xml\n<xsd:complexType\
    \ name=\"catalogTypeExt\" >\n  <xsd:complexContent>\n    <xsd:extension base=\"\
    catalogType\" >\n      <xsd:attribute name=\"webAddress\" type=\"xsd:string\"\
    \ />\n    </xsd:extension>\n  </xsd:complexContent>\n</xsd:complexType>\n```\n\
    \nYou specify a `complexContent` restriction with a `restriction` element. In\
    \ a complex content restriction, you basically have to repeat, in the `restriction`\
    \ element, the part of the base model you want to retain in the restricted complex\
    \ type. If, for example, you want to restrict the `paperType` complex type to\
    \ only a `title` element using a complex content restriction, you can do so as\
    \ shown here:\n\n```xml\n<xsd:complexType name=\"paperTypeRes\" >\n  <xsd:restriction\
    \ base=\"paperType\" >\n    <xsd:all>\n      <xsd:element name=\"title\" type=\"\
    titleType\" />\n    </xsd:all>\n  </xsd:restriction>\n</xsd:complexType>\n```\n\
    \nA complex content restriction construct has a fairly limited use.\n\n## Simple\
    \ Type Declarations\n\nA `simpleType` construct specifies information and constraints\
    \ on attributes and text elements. Since XML Schema has 44 built-in simple types,\
    \ a `simpleType` is either used to constrain built-in datatypes or used to define\
    \ a list or union type. If you wanted, you could have specified `authorType` as\
    \ a simple type restriction on a built-in string type, as shown here:\n\n```xml\n\
    <xsd:element name=\"authorType\" >\n  <xsd:simpleType>\n    <xsd:restriction base=\"\
    xsd:string\" >\n      <xsd:minLength value=\"10\" />\n      <xsd:maxLength value=\"\
    256\" />\n    </xsd:restriction>\n  </xsd:simpleType>\n</xsd:element>\n```\n\n\
    ### List\n\nA `list` construct specifies a `simpleType` construct as a list of\
    \ values of a specified datatype. For example, the following is a `simpleType`\
    \ that defines a list of integer values in a `chapterNumbers` element:\n\n```xml\n\
    <xsd:element name=\"chapterNumbers\" >\n  <xsd:simpleType>\n    <xsd:list itemType=\"\
    xsd:integer\" />\n  </xsd:simpleType>\n</xsd:element>\n```\n\nThe following example\
    \ is an element corresponding to the `simpleType` declaration defined previously:\n\
    \n```xml\n<chapterNumbers>8 12 11</chapterNumbers>\n```\n\n### Union"
