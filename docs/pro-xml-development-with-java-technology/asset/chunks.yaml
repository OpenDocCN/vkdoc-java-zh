    **Overview**


    From a logical point of view, an instance of the Xindice database is comprised
    of hierarchical collections, where each collection may contain nested collections
    and XML documents. Each query is performed over a collection, which is also referred
    to as a *collection context*. In a default installation of Xindice, the root collection
    within an instance of the Xindice database is named db, and therefore the root
    collection context is identified by the context path /db.


    **Simple Example**


    It is perfectly appropriate to think of collections within the Xindice database
    as analogous to file system folders and to think of documents stored within these
    collections as documents stored in folders. It is also useful to think of a reference
    path to a collection context as analogous to a file system path. With this intuitive
    understanding in place, let’s look at a simple example.


    Say you are an auto parts supplier and you have an XML document that stores information
    about windshield wiper blades for a 2006 Ford Mustang convertible, as shown in
    the following example document:


    <?xml version=''1.0'' encoding=''UTF-8'' ?>


    <wipers>


    <blade location="driver" part="FMWD256783">


    <description>Driver side wiper blade</description>


    <size>22 inches</size>


    </blade>


    <blade location="passenger" part="FMWP256783">


    <description>Passenger side wiper blade</description>


    <size>20 inches</size>


    </blade>


    </wipers>


    You may decide that putting data about wiper blades for all makes and models of
    cars in a single collection may not be efficient so you decide to come with a
    more hierarchical scheme and store the example document shown previously in a
    collection context that looks as follows:


    /db/parts/Ford/Mustang/2006/Convertible/'
