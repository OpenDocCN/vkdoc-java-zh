    **129**


    The style sheet htmlTransform.xslt has HTML tags to generate an HTML file. In
    this style sheet, a template matches the pattern /catalog/journal, and the xsl:for-each
    element is used to iterate over the article elements in a journal element. Text
    values are output with the xsl:value-of element. To run the transformation application
    XSLTTransformer.java with this style sheet, set input to the File object stylesheet
    to htmlTransform.xslt, and set the output file to catalog.html.


    **Listing 5-24.** *htmlTransform.xslt*


    <?xml version="1.0" encoding="UTF-8"?>


    <xsl:stylesheet version="1.0"


    >


    <xsl:output method="html"/>


    <xsl:template match="/catalog/journal">


    <html>


    <head>


    <title>Catalog</title>


    </head>


    <body>


    <table border="1" cellspacing="0">


    <tr>


    <th>Level</th>


    <th>Date</th>


    <th>Section</th>


    <th>Title</th>


    <th>Author</th>


    </tr>


    <xsl:for-each select="article">


    <tr>


    <td><xsl:value-of select="@


    level"/></td>


    <td><xsl:value-of select="


    @date"/></td>


    <td><xsl:value-of select="@


    section"/></td>


    <td><xsl:value-of select="title"


    /></td>


    <td><xsl:value-of select="author"


    /></td>


    </tr>


    </xsl:for-each>


    </table>


    </body>


    </html>


    </xsl:template>


    </xsl:stylesheet>


    The output from the XSLT is an HTML document that can be displayed in a browser,
    as shown in Figure 5-4.


