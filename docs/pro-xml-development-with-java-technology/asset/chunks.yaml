    \ `LSParser` 实例，如清单 10-4 所示。\n\n**清单 10-4.** *创建 LSParser*\n\n```java\nDOMImplementationLS\
    \ implLS = (DOMImplementationLS) domImpl;\nLSParser parser = implLS.createLSParser(DOMImplementationLS.MODE_SYNCHRONOUS,\n\
    \    \"http://www.w3.org/2001/XMLSchema\");\n```\n\n你可以将解析模式设置为 `MODE_SYNCHRONOUS`\
    \ 或 `MODE_ASYNCHRONOUS`。如果模式是 `MODE_SYNCHRONOUS`，则 `LSParser` 对象的 `parse()` 和\
