    \ **SCHEMAGEN** configuration. An XML Schema gets generated from the annotated\
    \ class, as shown in Figure 6-14.\n\n**Figure 6-14.** *XML Schema generated from\
    \ the annotated class `Catalog.java`*\n\n## Summary\n\nJAXB 1.0 specifies XML\
    \ Schema binding to Java representation. JAXB 2.0 specifies a bidirectional XML\
    \ Schema to Java representation. Both specifications provide a binding compiler\
    \ for generating schema-derived Java content classes and a runtime framework for\
    \ the marshaling and unmarshaling of XML documents.\n\nYou can customize the XML\
    \ Schema binding to Java types through external or inline binding declarations.\
