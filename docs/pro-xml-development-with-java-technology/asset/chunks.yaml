- fmt: "# Jakarta POI HSSF API 文档\n\nThe Jakarta POI HSSF API provides classes to\
    \ create an Excel workbook and add spreadsheets to the workbook. With the POI\
    \ API, the `HSSFWorkbook` class represents a workbook, and you set the spreadsheet\
    \ fonts, sheet order, and cell styles in the `HSSFWorkbook` class. You can represent\
    \ the spreadsheet using the `HSSFSheet` class. Specifically, you set the sheet\
    \ layout, including the column widths, margins, header, footer, and print setup\
    \ using the `HSSFSheet` class. You can represent a spreadsheet row using the `HSSFRow`\
    \ class, and you set the row height using the `HSSFRow` class. The `HSSFCell`\
    \ class represents a cell in a spreadsheet row, and you set the cell style using\
    \ the `HSSFCell` class. The indexing of spreadsheets in a workbook, of rows in\
    \ a spreadsheet, and of cells in a row is zero based. In this chapter, we’ll show\
    \ how to convert an example XML document to an Excel spreadsheet and then convert\
    \ the spreadsheet to an XML document. Listing 11-1 shows the example document,\
    \ `incomestatements.xml`.\n\n**Listing 11-1.** *`incomestatements.xml`*\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<incmstmts>\n  <stmt>\n    <year>2005</year>\n\
    \    <revenue>11837</revenue>\n    <costofrevenue>2239</costofrevenue>\n    <researchdevelopment>1591</researchdevelopment>\n\
    \    <salesmarketing>2689</salesmarketing>\n    <generaladmin>661</generaladmin>\n\
    \    <totaloperexpenses>7180</totaloperexpenses>\n    <operincome>4657</operincome>\n\
    \    <invincome>480</invincome>\n    <incbeforetaxes>5137</incbeforetaxes>\n \
    \   <taxes>1484</taxes>\n    <netincome>3653</netincome>\n  </stmt>\n  <stmt>\n\
    \    <year>2004</year>\n    <revenue>10818</revenue>\n    <costofrevenue>1875</costofrevenue>\n\
    \    <researchdevelopment>1421</researchdevelopment>\n    <salesmarketing>2122</salesmarketing>\n\
    \    <generaladmin>651</generaladmin>\n    <totaloperexpenses>6069</totaloperexpenses>\n\
    \    <operincome>4749</operincome>\n    <invincome>420</invincome>\n    <incbeforetaxes>5169</incbeforetaxes>\n\
    \    <taxes>1706</taxes>\n    <netincome>3463</netincome>\n  </stmt>\n</incmstmts>\n\
    ```\n\n## Creating an Eclipse Project\n\nIn this chapter, we’ll show how to create\
    \ and parse an Excel spreadsheet using the Apache POI HSSF API. Before you can\
    \ set up your project, you need to download Apache POI 2.5.1 and extract the zip\
    \ file to an installation directory. You also need to download and install JDK\
    \ 5.0. (You can also use another version of JDK such as 1.4 or 6.0.)\n\nTo compile\
    \ and run the code examples, you will need an Eclipse project. You can download\
    \ project Chapter11 from the Apress website (http://www.apress.com) and import\
    \ it into your Eclipse workspace by selecting **File ➤ Import**.\n\nTo compile\
    \ and run the Apache POI code examples, you need some JAR files in your project’s\
    \ Java build path; Figure 11-1 shows these JAR files. The JAR file required for\
    \ an Apache POI application is `poi-2.5.1-final-20040804.jar`, which consists\
    \ of the Apache POI API. You also need to set the JRE system library to JRE 5.0,\
    \ as shown in Figure 11-1.\n\nFigure 11-2 shows the Chapter11 project directory\
    \ structure.\n\nIf you haven’t got a copy of Excel handy, you can instead open\
    \ the Excel spreadsheet generated from the example XML document using Excel Viewer.\n\
    \n1. For more information about Apache POI, see http://jakarta.apache.org/poi/.\n\
    2. For more information about Excel Viewer, see http://www.microsoft.com/downloads/details.aspx?FamilyID=c8378bf4-996c-4569-b547-75edbd03aaf0&displaylang=EN.\n\
    \n![Image 76](index-310_1.png)\n![Image 77](index-310_2.png)\n\n**Figure 11-1.**\
    \ *Chapter11 Java build path*\n\n**Figure 11-2.** *Chapter11 directory structure*\n\
    \n## Converting an XML Document to an Excel Spreadsheet\n\nIn this section, we\
    \ will show how to convert the example XML document in Listing 11-1 to an Excel\
    \ document using the Apache POI HSSF API. Specifically, you will parse the example\
    \ XML document, retrieve values from the document, and construct an Excel spreadsheet.\
    \ The procedure to create a spreadsheet is as follows:\n\n1. Create an Excel spreadsheet\
    \ workbook and an empty spreadsheet.\n2. Define a cell style.\n3. Set the spreadsheet\
    \ column width.\n4. Add a header row to the spreadsheet.\n5. Parse the XML document.\n\
    6. Add statement columns to the spreadsheet.\n7. Output the spreadsheet.\n\nYou\
    \ need to import the Apache POI HSSF package, `org.apache.poi.hssf.usermodel`.\n\
    \nYou can create an Excel workbook using a no-arguments constructor for `HSSFWorkbook`,\
    \ as shown in Listing 11-2. You create a spreadsheet, represented with the `HSSFSheet`\
    \ class, by using the `createSheet(String sheetName)` method of the `HSSFWorkbook`\
    \ class.\n\n**Listing 11-2.** *Creating an Excel Workbook and Spreadsheet*\n\n\
    ```java\nHSSFWorkbook wb = new HSSFWorkbook();\nHSSFSheet spreadSheet = wb.createSheet(\"\
    spreadSheet\");\n```\n\nYou can represent a cell in a spreadsheet using the `HSSFCell`\
    \ class. You set the cell style using the `HSSFCellStyle` class. To set the cell\
    \ style in the example spreadsheet being generated, create a cell style object\
    \ using the `createCellStyle()` method of the `HSSFWorkbook` class, as shown in\
    \ Listing 11-3.\n\nThe example cell style defines a cell border and is used for\
    \ cells that represent totals for a column or subcolumn. You can set the border\
    \ settings for an `HSSFCellStyle` object using the setter methods `setBorderTop(short)`,\
    \ `setBorderLeft(short)`, `setBorderBottom(short)`, and `setBorderRight(short)`.\n\
    \n**Listing 11-3.** *Setting the Cell Style*\n\n```java\nHSSFCellStyle cellStyle\
    \ = wb.createCellStyle();\ncellStyle.setBorderRight(HSSFCellStyle.BORDER_MEDIUM);\n\
    cellStyle.setBorderTop(HSSFCellStyle.BORDER_MEDIUM);\ncellStyle.setBorderLeft(HSSFCellStyle.BORDER_MEDIUM);\n\
    cellStyle.setBorderBottom(HSSFCellStyle.BORDER_MEDIUM);\n```\n\nYou can represent\
    \ a border type with a short value, as shown in Listing 11-3. Table 11-1 lists\
    \ some of the commonly used types of borders.\n\n**Table 11-1.** *Border Types*\n\
    \n| Short | Description |\n|-------|-------------|\n| `BORDER_DASH_DOT` | Dash-dot\
    \ border |\n| `BORDER_DASHED` | Dashed border |\n| `BORDER_DOUBLE` | Double-line\
    \ border |\n| `BORDER_MEDIUM` | Medium border |\n| `BORDER_NONE` | No border |\n\
    | `BORDER_THICK` | Thick border |\n| `BORDER_THIN` | Thin border |\n\nYou can\
    \ set the border color using the setter methods `setBottomBorderColor(short color)`,\
    \ `setLeftBorderColor(short color)`, `setRightBorderColor(short color)`, and `setTopBorderColor(short\
    \ color)`. You can represent spreadsheet color using the `HSSFColor` subclasses.\
    \ For example, the class `HSSFColor.BLUE` represents the color blue. You can obtain\
    \ a short value corresponding to a color using the field `index`. The following\
    \ is an example of setting a color:\n\n```java\nshort blue = HSSFColor.BLUE.index;\n\
    cellStyle.setRightBorderColor(blue);\n```\n\nYou can set background color and\
    \ foreground color using the methods `setFillBackgroundColor(short fg)` and `setFillForegroundColor(short\
    \ bg)`. You can set text indentation using the `setIndention(short indent)` method.\
    \ You can wrap cell text using the `setWrapText(boolean wrapped)` method. For\
    \ example, you can set cell-style indentation to 4 and add text wrapping, as shown\
    \ here:\n\n```java\ncellStyle.setIndention((short)4);\ncellStyle.setWrapText(true);\n\
    ```\n\nFurther, you can add text rotation to cell text using the `setRotation(short\
    \ rotation)` method."
