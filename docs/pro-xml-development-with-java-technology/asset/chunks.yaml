    ## Web Service Client


    The web service client uses a generated service proxy class, `com.apress.javaxml.ws.ProjectPortTypeImpl.java`,
    as shown in Listing 14-22, to interact with the web service. The key method of
    this class that you will use is the `ProjectPortTypeImplService(URL wsdlLocation,
    QName serviceName)` constructor to create a service proxy instance. You will invoke
    the `getProjectPortTypeImplPort()` method on the service proxy instance to get
    an instance of the `ProjectPortType` service interface.


    **Listing 14-22.** *Service: ProjectPortTypeImpl.java*


    ```

    package com.apress.javaxml.ws;


    import java.net.MalformedURLException;

    import java.net.URL;

    import javax.jws.HandlerChain;

    import javax.xml.namespace.QName;

    import javax.xml.ws.Service;

    import javax.xml.ws.WebEndpoint;

    import javax.xml.ws.WebServiceClient;

    ```'
