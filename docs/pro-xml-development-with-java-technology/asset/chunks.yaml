    **理解 WSDL 1.1**


    每当需要构建一个 Web 服务时，第一步是在 WSDL 1.1 文档中正式描述该 Web 服务。虽然可以从 Java 类逆向工程生成 WSDL 1.1 文档，但我们认为，这种逆向工程仅适用于构建简单的
    Web 服务，或许用于快速原型设计。逆向工程选项严重限制了描述非平凡、真实世界 Web 服务所需的灵活性。因此，本章不再进一步讨论它。


    接下来，我们描述 WSDL 1.1 文档的整体结构。


