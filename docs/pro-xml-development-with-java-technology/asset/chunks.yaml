    @*|node() selects all the element and attribute nodes. In the XPath pattern, @*
    represents all the attribute nodes, and node() represents all the other nodes.
    The output from the identity transformation is the input XML document with optional
    modification to the document encoding, DOCTYPE, or indentation.


