    \ `font-weight`, `font-size` | `fo:table`, `fo:list-block` | Base element for\
    \ page content; includes formatting information. |\n| `fo:list-block` | `provisional-distance-between-starts`,\
    \ `provisional-label-separation` | `fo:list-item` | Specifies a block that includes\
    \ a list |\n| `fo:list-item` | `text-indent` | `fo:list-item-label`, `fo:list-item-body`\
    \ | Specifies a list item |\n| `fo:table` | `border-spacing`, `table-layout` |\
    \ `fo:table-column`, `fo:table-header`, `fo:table-body` | Specifies a table in\
    \ a page |\n| `fo:table-column` | `column-number`, `column-width` | | Column in\
    \ a table |\n| `fo:table-header` | | `fo:table-row` | Table header |\n| `fo:table-body`\
    \ | `table-layout` | `fo:table-row` | Table rows |\n| `fo:table-row` | `font-weight`\
    \ | `fo:table-cell` | Row in a table |\n| `fo:table-cell` | `column-number` |\
    \ `fo:block` | Row cell that has the text of a row cell |\n\nThe DTD for the XSL-FO\
    \ object is available from `http://www.renderx.com/Tests/validator/fo2000.dtd.html`.\
    \ In this section, we will show how to convert an example XML document, `catalog.xml`,\
    \ to an XSL-FO document using XSLT. `Listing 12-1` shows the example XML document,\
    \ `catalog.xml`.\n\n**Listing 12-1.** *catalog.xml*\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<catalog>\n  <journal>\n    <section>Java Technology</section>\n\
    \    <publisher>IBM developerWorks</publisher>\n    <level>Introductory</level>\n\
    \    <edition>Nov-2004</edition>\n    <title>Getting started with enumerated types</title>\n\
    \    <author>Brett McLaughlin</author>\n  </journal>\n  <journal>\n    <section>Java\
