    **最高支持 6 版本！**


    你或许能从自身经验中验证这一点。多年来，在与这些技术打交道的过程中，我们发现了许多优秀的书籍，它们专注于特定的 XML 技术，例如 XSLT、XPath 和
    XML Schema。我们也找到了一些编写得非常出色的资料，涵盖了与各种 XML 技术相关的 Java API，并深入讨论了特定主题，例如 Web 服务。不幸的是，开发企业级


    Ajay Vohra


    应用需要跨越其中许多主题的应用知识，因此我们


    专业 XML 开发


    常常发现自己在繁忙的专业工作环境中，翻阅的书籍数量超出了我们的预期。我们还面临一个困境：许多以 XML 为中心的书籍过于抽象，没有提供实践示例来说明理论概念；而许多以
    Java 为中心的 XML 技术书籍，又没有解释底层的 XML 概念。


    我们编写这本书是为了帮助我们自己以及所有面临同样问题的专业 Java 开发者。我们的主要目标是将 XML 和 Java 技术的理论与实践整合到一个单一的、最新的资料来源中，该资料牢固地植根于底层的
    XML 概念，可以反复查阅，以快速加速企业级应用的开发！


    我们力求涵盖所有基本的 XML 主题，包括基于 XML Schema 的模式、通过 XPath 对 XML 文档的寻址、使用 XSLT 样式表转换 XML
    文档、在原生 XML 数据库和关系数据库中存储和检索 XML 内容、基于 AJAX 的 Web 应用，以及基于 SOAP/HTTP 和 WSDL 的 Web
    服务。这些 XML 主题将在最新的 Java 技术（包括 JAXP、JAXB、XMLBeans 和 JAX-WS）的应用背景下进行讲解。我们相信，您会发现这本书在构建


