    **Summary**


    The SQL:2003 standard provides a new database data type, XML. JDBC 4.0 provides
    a Java data type, SQLXML, for the database data type XML. The JDBC 4.0 API is
    included in the upcoming J2SE 6.0\. To store an XML document in a database table
    column of type XML, the database is required to support the XML database type.
    At the time of writing this book, the databases DB2 UDB 9.1 and SQL Server 2005
    support the XML data type. To retrieve an XML document from an XML type column
    using the SQLXML Java data type, you need a JDBC 4.0 driver for the relevant database.
    At the time of writing this book, the JDBC 4.0 specification is not yet finalized.


    You can use the example application in this chapter when a JDBC 4.0 driver becomes
    available.


    In this chapter, we explained the procedure to create an SQLXML object, initialize
    the SQLXML object, and store the SQLXML object using the JDBC 4.0 API. We also
    discussed the procedure to retrieve an SQLXML object from a ResultSet and navigate
    an XML document.


