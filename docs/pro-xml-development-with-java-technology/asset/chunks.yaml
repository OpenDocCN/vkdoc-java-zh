    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    **189**


    **Figure 7-2.** *Source path for the Chapter7 project* **Figure 7-3.** *Chapter7
    project directory structure*


    ## Compiling an XML Schema


    In this section, you will first bind the example schema (`catalog.xsd`, shown
    in Listing 7-1) to its corresponding Java types. Subsequently, you will marshal
    and unmarshal the example XML document (`catalog.xml`, shown in Listing 7-2).
    As noted earlier, you will use the `scomp` binding compiler to bind the example
    schema. There is a choice of syntax for `scomp` use, as shown in Listing 7-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C07.fm Page 190 Thursday, July 13, 2006 1:11 PM


    **190**


    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    **Listing 7-3.** *scomp Binding Compiler Syntax*


    ```

    scomp [opts] [schema.xsd]* [config.xsdconfig]*

    scomp [opts] [directory]

    ```


    In the first `scomp` command, `[schema.xsd]*` is zero or more schemas that are
    inputs for binding to their Java types, and `[config.xsdconfig]*` is zero or more
    configuration files that contain custom bindings that influence the binding compiler.
    The second command shows an alternative syntax for `scomp`, whereby `[directory]`
    contains input schemas and custom binding files; this is the syntax we will use
    in the example. In both the commands, `[opts]` denotes the `scomp` compiler options,
    which are listed in Table 7-2.


    **Table 7-2.** *Scomp Compiler Options*


    | Option | Description |

    |--------|-------------|

    | `-cp [a;b;c]` | Specifies the classpath. |

    | `-d [dir]` | Specifies the target binary directory for the `.class` and `.xsb`
    files. An XSB file contains schema metainformation, which is required for tasks
    such as binding and validating. |

    | `-src [dir]` | Specifies the target directory for the generated `.java` files.
    |

    | `-out [xmltypes.jar]` | Specifies the output JAR file for the XML types. |

    | `-compiler` | Specifies the path to the external Java compiler. |


    We will show how to run `scomp` from within Eclipse. Therefore, configure `scomp`
    as an external tool in Eclipse. To configure `scomp` within Eclipse, you need
    to execute the following steps:


    1. To configure `scomp` as an external tool, select Run ➤ External Tools. In the
    External Tools area, create a new Program configuration by right-clicking the
    Program node and selecting New. This adds a new configuration, as shown in Figure
    7-4.


    2. An external tools configuration consists of the configuration name and location
    of the `scomp` compiler command file. You specify the configuration name in the
    Name field. The location of the `scomp` command file location is in the `bin`
    directory of the XMLBeans installation, which you specify in the Location field.
    You also need to set the working directory and program arguments. To set the working
    directory, click the Variables button for the Working Directory field, and select
    the `container_loc` variable. This specifies a value of `${container_loc}` in
