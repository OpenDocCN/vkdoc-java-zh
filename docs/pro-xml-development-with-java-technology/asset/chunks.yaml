    **复杂内容**


    complexContent 元素指定了对元素（包括属性）的约束。您在 complexType 元素中指定 complexContent 构造。与简单内容的情况类似，复杂内容有两种类型的构造：扩展和限制。


    您可以使用 extension 元素指定 complexContent 扩展。例如，如果您想使用复杂内容扩展向 catalogType 复杂类型添加一个 webAddress
    属性，可以按如下方式操作：


    <xsd:complexType name="catalogTypeExt" >


    <xsd:complexContent>


    <xsd:extension base="catalogType" >


    <xsd:attribute name="webAddress" type="xsd:string" />


    </xsd:extension>


    </xsd:complexContent>


    </xsd:complexType>


    您可以使用 restriction 元素指定 complexContent 限制。在复杂内容限制中，您基本上必须在 restriction 元素中重复您希望在受限复杂类型中保留的基础模型部分。例如，如果您想使用复杂内容限制将
    paperType 复杂类型限制为仅包含一个 title 元素，可以按如下方式操作：


    <xsd:complexType name="paperTypeRes" >


    <xsd:restriction base="paperType" >


    <xsd:all>


    <xsd:element name="title" type="titleType" />


    </xsd:all>


    </xsd:restriction>


    </xsd:complexType>


    复杂内容限制构造的用途相当有限。


    **简单类型声明**


    simpleType 构造指定了关于属性和文本元素的信息和约束。由于 XML Schema 有 44 种内置简单类型，simpleType 要么用于约束内置数据类型，要么用于定义列表或联合类型。如果您愿意，可以将
    authorType 指定为对内置字符串类型的简单类型限制，如下所示：


    <xsd:element name="authorType" >


    <xsd:simpleType>


    <xsd:restriction base="xsd:string" >


    <xsd:minLength value="10" />


    <xsd:maxLength value="256" />


    </xsd:restriction>


    </xsd:simpleType>


    </xsd:element>


