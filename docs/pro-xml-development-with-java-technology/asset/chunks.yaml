    **Overview of This Book’s Contents**


    We have strived to cover a wide swath of XML-related Java APIs in this book, ranging
    from basic, building-block APIs used to parse XML documents to more advanced APIs
    used to implement interoperable XML-based web services. This book is organized
    in five parts. Part 1 spans Chapters 1 through 5


    and covers basics of parsing, validating, addressing, and transforming XML documents.
    Part 2


    comprises Chapters 6 and 7 and covers the binding of XML Schema to Java types.
    Part 3 includes Chapters 8 and 9 and focuses on XML and databases. Part 4 consists
    of Chapters 10 through 12 and focuses on transforming the XML document model to
    other document models. Part 5 consists of Chapters 13 and 14 and focuses on XML-based
    web applications and web services. Here is a quick synopsis of what is in each
    chapter:


    • Chapter 1 reviews XML 1.0 and XML Schema 1.0.


    • Chapter 2 discusses the parsing of XML documents using JAXP 1.3 in J2SE 5.0
    and StAX 1.0 in J2SE 6.0.


    • Chapter 3 discusses validating an XML document with an XML Schema, and in this
    context, we cover the following APIs: JAXP 1.3 APIs: SAX parser, DOM parser, and
    the Validation API.


    • Chapter 4 reviews XPath 1.0 and discusses the JAXP 1.3 and JDOM 1.0 XPath APIs.


    • Chapter 5 reviews XSLT 1.0 and discusses the TrAX API defined within JAXP 1.3.


