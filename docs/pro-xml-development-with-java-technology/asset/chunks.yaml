- fmt: '# Table 6-2. JAXB 2.0 Binding Annotations


    | **Annotation Type** | **Description** | **Annotation Elements** |

    | --- | --- | --- |

    | `XmlAccessorType` | Specifies the default serialization of fields and properties
    | `AccessType.PUBLIC_MEMBER` maps only public fields and JavaBean properties.
    `AccessType.FIELDS` maps only fields. `AccessType.PROPERTIES` maps only JavaBeans
    properties. `AccessType.NONE` maps neither fields nor properties. |

    | `XmlAttribute` | Maps a JavaBean property to an attribute | `name`: Attribute
    name. `namespace`: Attribute namespace. `required`: Specifies whether attribute
    is required; the default is `false`. |

    | `XmlElement` | Maps a JavaBean property to an element | `defaultValue`: The
    default value of element. `name`: The element name. `namespace`: Target namespace
    of element. `nillable`: Specifies whether element is nillable; the default is
    `false`. `type`: Element type. |

    | `XmlEnum` | Maps an enum to a simple type with enumeration | `value`: Enumeration
    value |

    | `XmlList` | Maps a property to a list simple type | |

    | `XmlRootElement` | Maps a class to root element | `name`: Local name of root
    element. `namespace`: Namespace of root element. |

    | `XmlSchema` | Maps a package name to a XML namespace | `attributeFormDefault`:
    Specifies the value of the `attributeFormDefault` attribute. `elementFormDefault`:
    Specifies the value of the attribute `elementFormDefault`. `namespace`: XML namespace.
    `xmlns`: Maps namespace prefixes to namespace URIs. |

    | `XmlType` | Maps a class to an XML Schema type, which may be a simple type or
    a complex type | `name`: Target namespace of the XML Schema type. `propOrder`:
    Specifies the order of XML schema elements when a class is mapped to a complex
    type. |

    | `XmlValue` | Maps a class to an XML Schema complex type with `simpleContent`
    or an XML Schema simple type | |


    ## XML Schema Binding to Java Representation


    Just like JAXB 1.0, JAXB 2.0 specifies a default XML Schema to Java binding that
    can be overridden through external binding declarations. Conceptually, the JAXB
    2.0 binding of XML Schema components to Java is similar to JAXB 1.0. However,
    since JAXB 2.0 binding is based on J2SE 5.0, its Java representation uses Java
    5 annotation tags and is much more compact than the JAXB 1.0 Java representation.


    Let’s revisit the simple example you looked at in the context of JAXB 1.0 so you
    can see how the XML Schema to Java binding works under JAXB 2.0.


    ## Simple Binding Example Revisited


    `Listing 6-1` shows the simple example schema. As before, to keep things simple,
    you will accept all the default XML Schema binding rules except for one. You will
    override the default package name for the generated Java content with a specific
    package name, `com.apress.jaxb2.example`, as shown in the external binding file
    in `Listing 6-29`. This file differs from `Listing 6-2` in that it has a different
    package name and different version attribute value for the top-level `jxb:bindings`
    element, which in this case is `2.0`.


    **Listing 6-29.** *External Binding Declaration for a Package Name*


    ```xml

    <?xml version=''1.0'' encoding=''utf-8'' ?>

    <jxb:bindings version="2.0"

    >

    <jxb:bindings node="/xs:schema" schemaLocation="address.xsd" >

    <jxb:schemaBindings>

    <jxb:package name="com.apress.jaxb2.example" ></jxb:package>

    </jxb:schemaBindings>

    </jxb:bindings>

    </jxb:bindings>

    ```


    Ignoring for the moment the mechanics of configuring the JAXB 2.0 binding compiler,
    let’s assume you can run the JAXB 2.0 `xjc` compiler. Running `xjc`, of course,
    binds schema components to Java. For the schema shown in `Listing 6-1`, the JAXB
    2.0 `xjc` schema binding works as follows:


    - In the `com.apress.jaxb2.example` package, `xjc` generates two Java classes:
    `UsOrCanadaAddress` and `ObjectFactory`. Because the `complexType` in `Listing
    6-1` is anonymous, no separate class corresponding to an anonymous `complexType`
    is generated.'
