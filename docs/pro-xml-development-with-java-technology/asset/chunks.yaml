- fmt: "A union construct specifies a union of simpleTypes. For example, if you first\
    \ define `chapterNames` as a list of string values, as shown here:\n\n```\n<xsd:element\
    \ name=\"chapterNames\">\n  <xsd:simpleType>\n    <xsd:list itemType=\"xsd:string\"\
    />\n  </xsd:simpleType>\n</xsd:element>\n```\n\nthen you can specify a union of\
    \ `chapterNumbers` and `chapterNames` as shown here:\n\n```\n<xsd:element name=\"\
    chapters\">\n  <xsd:simpleType>\n    <xsd:union memberTypes=\"chapterNumbers,\
    \ chapterNames\" />\n  </xsd:simpleType>\n</xsd:element>\n```\n\nThis is an example\
    \ element corresponding to the `chapters` declaration defined previously:\n\n\
    ```\n<chapters>8 XSLT 11</chapters>\n```\n\nOf course, since list values may not\
    \ contain any whitespace, this example is completely contrived because chapter\
    \ names in real life almost always contain whitespace.\n\n## Schema Example Document\n\
