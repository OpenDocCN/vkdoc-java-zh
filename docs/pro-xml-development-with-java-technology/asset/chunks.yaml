    **197**


    **Listing 7-7.** *catalog.xsdconfig*


    <?xml version="1.0" encoding="UTF-8"?>


    <xb:config


    >


    **<xb:namespace uri="http://xmlbeans/journal">**


    <xb:package>journal</xb:package>


    </xb:namespace>


    </xb:config>


    **Listing 7-8.** *catalog.xsdconfig*


    <?xml version="1.0" encoding="UTF-8"?>


    <xb:config >


    <xb:namespace>


    <xb:package>xmlbeans</xb:package>


    </xb:namespace>


    </xb:config>


    To bind the catalog.xsd schema with the configuration file catalog.xsdconfig,
    import catalog.xsdconfig into the gen_source folder in the Chapter7 project. To
    generate Java types with the configuration file, select the gen_source folder,
    and run the external tools configuration XMLBeans.


    The Java classes get generated in the xmlbeans package, as shown in Figure 7-9\.
    You must refresh the Chapter7 project to see the new generated files.


    **Figure 7-9.** *Java classes generated in the xmlbeans package* **Marshaling
    an XML Document**


    In this section, you will marshal the example XML document (catalog.xml) from
    Java classes generated with XMLBeans. As the Java classes are compiled from an
    XML Schema, the XML document generated from the Java classes conforms to the schema.
    You first construct a Java object representation of an XML document, and you subsequently
    output the Java object as an XML document. The Java interface that represents
    an XML document instance is noNamespace.CatalogDocument. Therefore, create an
    object of type CatalogDocument, as shown here:


    noNamespace.CatalogDocument catalogDoc =


    noNamespace.CatalogDocument.Factory.newInstance();


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C07.fm Page 198 Thursday, July 13, 2006 1:11 PM


    **198**


    C H A P T E R 7 ■ B I N D I N G W I T H X M L B E A N S


    The root element in an XML document instance is catalog, which is represented
    with the Java interface noNamespace.CatalogDocument.Catalog. You can add a Catalog
    object to a noNamespace.


    CatalogDocument object with the addNewCatalog() method, as shown here: CatalogDocument.Catalog
    catalog=catalogDoc.addNewCatalog(); The XML document to be marshaled has the element
    journal in the element catalog. A journal element is represented with the interface
    noNamespace.JournalDocument.Journal. You can add a Journal object to a noNamespace.CatalogDocument.Catalog
    object with the addNewJournal() method, as shown in Listing 7-9\. The Journal
    element attribute publisher’s value is set with the method setPublisher().


    **Listing 7-9.** *Adding a Journal Object and Setting the Attribute publisher*
    noNamespace.JournalDocument.Journal journal=catalog.addNewJournal(); journal.setPublisher("IBM
    developerWorks");


    An article element is represented with the Java interface noNamespace.ArticleDocument.


    Article. You add an Article object to a noNamespace.JournalDocument.Journal object
    with the addNewArticle() method, as shown in Listing 7-10\. You set the level,
    date, and section attributes of an article element with setter methods for these
    attributes.


    **Listing 7-10.** *Adding an Article Object and Setting Attributes* articleDocument.Article
    article=journal.addNewArticle();


    article.setLevel("Intermediate");


    article.setDate("January-2004");


    article.setSection("Java Technology");


    You set the values for the title and author subelements of an article element
    with setter methods for these elements, as shown in Listing 7-11.


    **Listing 7-11.** *Setting the title and author Values* article.setTitle("Service
    Oriented Architecture Frameworks"); article.setAuthor("Naveen Balani");


    Similarly, add another Article object to construct the XML document shown in Listing
    7-2.


    Listing 7-12 shows the Java application XMLBeansMarshaller.java used to construct
    the example XML document. The XMLBeansMarshaller class consists of the method
    createCatalog(), which creates a Java object representation of an XML document.
    An XML document instance is represented with the CatalogDocument interface. Therefore,
    create a CatalogDocument object from the Factory class for CatalogDocument. You
    add the Java class representation CatalogDocument.Catalog of the root element
    catalog to the CatalogDocument object with the addNewCatalog() method. You add
    the Java class representation JournalDocument.Journal of the journal element to
    the Catalog object with the addNewJournal() method. You add the Java class representation
    ArticleDocument.Article of the element article to a Journal object with the method
    addNewArticle(). You set the values for attributes and element text with setter
    methods for these attributes and text nodes.


    **Listing 7-12** *. XMLBeansMarshaller.java*


