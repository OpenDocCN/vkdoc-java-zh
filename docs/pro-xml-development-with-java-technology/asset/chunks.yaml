    • 带有`prefix:*`名称的节点测试指的是元素节点的命名空间受限通配符。例如，`/catalog/child::journal:*`计算得到一个节点集，该节点集包含所有属于`catalog`元素子元素且属于`journal:`命名空间的元素，按文档顺序，这仅指文档中的第一个`journal`元素。


    ### 谓词


    位置路径步骤中的最后一部分是零个或多个可选的谓词。以下是理解谓词的两个关键点：


    • 谓词是节点集上的过滤器。


    • 谓词是XPath表达式，通过使用核心XPath的`boolean()`函数进行评估并映射为布尔值，具体如下：


    • 当且仅当数字值为非零时，该数字值映射为`true`。例如，在图4-2中，表达式`//title[position()]`使用了内置的XPath`position()`函数，该函数返回所选`title`节点的子节点位置（作为数字）。由于节点的子节点位置总是1或更大，此表达式将选择所有`title`节点。然而，表达式`//title[position()
    – 1]`将只选择那些子节点位置大于1的`title`节点。在该示例中，第二个表达式不会选择任何节点，因为所有`title`节点的子节点位置都是1。


    • 当且仅当字符串值为非零长度时，该字符串值映射为`true`。例如，在图4-2中，表达式`//title[string()]`使用内置的XPath`string()`函数隐式地将节点集中的第一个节点转换为其字符串节点值。此表达式将只选择那些具有非零长度文本内容的`title`节点，对于示例文档而言，这意味着所有`title`节点。


    • 当且仅当节点集非空时，该节点集映射为`true`。例如，在图4-2中，表达式`//article[child::title]`中的`[child::title]`谓词仅在`child::title`节点集非空时评估为`true`，因此该表达式选择所有具有`title`子元素的`article`元素。


    谓词左侧组件的输出节点集是其输入节点集，评估谓词涉及遍历此输入节点集。随着评估的进行，迭代中的当前节点成为上下文节点，并且谓词相对于此上下文节点进行评估。如果谓词评估为`true`，则此上下文节点被添加到谓词的输出节点集中；否则，它被忽略。来自一个谓词的输出节点集成为后续谓词的输入节点集。位置路径步骤中的多个谓词从左到右进行评估。


    位置路径步骤中的谓词相对于与当前步骤关联的轴进行评估。上下文节点的邻近位置定义为其沿步骤轴的位置，如果是正向轴则按文档顺序，如果是反向轴则按逆文档顺序。节点的邻近位置定义为其上下文位置。输入节点集的大小定义为上下文大小。上下文节点、上下文位置和上下文大小构成了完整的XPath上下文，所有谓词都相对于此上下文进行评估。


    在查看以下示例时，可以应用一些与谓词相关的概念，这些示例基于图4-2中的数据模型：


    • `/catalog/child::journal[attribute::title=''Java Technology'']`是一个XPath表达式，其中第二步包含谓词`[attribute::title=''Java
    Technology'']`。此谓词的输入节点集由所有作为`catalog`元素子元素的非命名空间`journal`元素组成。按文档顺序，输入节点集仅包含第二个`journal`元素，因为第一个`journal`元素属于`journal`命名空间。因此，在第一次迭代开始时，上下文大小为1，上下文位置也为1。当遍历输入节点集时，将当前节点（即`journal`节点）设为上下文节点，然后测试谓词。该谓词检查上下文节点是否具有名为`title`且值等于`Java
    Technology`的属性。如果谓词测试成功（应该会成功），则将此`journal`上下文节点包含在输出集中。遍历完输入集中的所有节点后，输出节点集将包含所有满足谓词的`journal`元素。此表达式的结果将只是文档中按文档顺序的第二个`journal`节点。


    • `/catalog/descendant::article[position() = 2]`是一个XPath表达式，其中第二步包含谓词`[position()
    = 2]`。此谓词的输入节点集由所有作为`catalog`元素后代的`article`元素组成。此输入节点集将包含文档中的所有三个`article`节点。因此，在第一次迭代开始时，上下文大小为3，上下文位置为1。此谓词示例应用了上下文位置的概念。当遍历输入节点集时，将当前`article`元素设为上下文节点，然后测试谓词。该谓词检查`article`元素的上下文位置（通过XPath核心函数`position()`测试）是否等于2。当将此谓词应用于图4-2中的数据模型时，只有第二个以展开形式出现的`article`节点会测试为`true`。注意，`[position()
    = 2]`谓词等价于缩写谓词`[2]`。此表达式的结果将是按文档顺序的第二个`article`节点。


    在详细了解了XPath表达式之后，现在可以将注意力转向使用基于Java的XPath API来应用XPath表达式。


    ## 应用XPath表达式


    想象一个提供与期刊文章信息相关服务的网站。再进一步想象，该网站通过某些基于Web服务的消息从各个出版商接收期刊内容信息，并且这些消息的内容是一个XML文档，类似于前面清单4-1中所示的文档。


    一旦Web服务接收到此文档，它需要根据某些标准从此XML文档中提取内容信息。假设你被要求构建一个应用程序，该应用程序根据某些特定标准从此文档中提取内容信息。你会怎么做？


    你的第一步是确保接收到的文档具有有效的结构，或者换句话说，符合其模式定义。为了确保这一点，你将首先根据其模式验证文档，如第3章所述。


