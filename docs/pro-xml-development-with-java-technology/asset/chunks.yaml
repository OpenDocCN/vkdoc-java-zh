    Storing XML in Relational Databases


    **I**n the previous chapter, you learned how to store an XML document in a native
    XML database.


    Native XML databases are of course limited to storing only XML documents. If you
    need to store an XML document along with other data, a relational database is
    more appropriate. In a relational database, you can store an XML document just
    like any other type of data, within a column in a table row.'
