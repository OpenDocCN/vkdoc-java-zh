- fmt: '# JAXP 1.3 的 SAXParserFactory 实现类可插拔性


    `JAXP 1.3`为`SAXParserFactory`实现类提供了完整的可插拔性。这意味着`SAXParserFactory`实现类不是一个固定的类。相反，`JAXP`通过以下查找过程获取`SAXParserFactory`实现类：


    1. 使用`javax.xml.parsers.SAXParserFactory`系统属性来确定要加载的工厂类。


    2. 使用`JRE`目录下`lib/jaxp.properties`文件中指定的`javax.xml.parsers.SAXParserFactory`属性来确定要加载的工厂类。`JAXP`只读取此文件一次，并且此文件中定义的属性值由`JAXP`缓存。


    3. `JAR`文件中`META-INF/services`目录下的文件被视为服务提供者配置文件。使用`Services API`，并从运行时类路径中任何`JAR`文件内的`META-INF/services/javax.xml.parsers.SAXParserFactory`文件中获取工厂类名称。


    4. 使用`J2SE`平台中包含的默认`SAXParserFactory`类。


    如果需要验证，请在工厂上设置`validating`属性为`true`：`factory.setValidating(true);`


    如果`SAXParserFactory`对象的`validating`属性设置为`true`，则从此工厂对象获取的解析器默认会根据`DTD`验证`XML`文档。要针对`XML
    Schema`验证文档，您需要做更多工作，这将在第3章中详细讨论。


    ## SAX 特性


    `SAXParserFactory`特性是逻辑开关，您可以打开或关闭它们以更改解析器行为。


    您可以通过`setFeature(String, boolean)`方法设置工厂的特性。传递给`setFeature`的第一个参数是特性的名称，第二个参数是`true`或`false`值。


    表2-11列出了一些常用的`SAXParserFactory`特性。某些`SAXParserFactory`特性是特定于实现的，因此并非所有特性都能被不同的工厂实现支持。


    **表2-11.** *SAXParserFactory 特性*


    | 特性 | 描述 |

    |------|------|

    | `http://xml.org/sax/features/namespaces` | 如果设置为`true`，则执行命名空间处理 |

    | `http://xml.org/sax/features/validation` | 验证`XML`文档 |

    | `http://apache.org/xml/features/validation/schema` | 执行`XML Schema`验证 |

    | `http://xml.org/sax/features/external-general-entities` | 包含外部通用实体 |

    | `http://xml.org/sax/features/external-parameter-entities` | 包含外部参数实体和外部`DTD`子集
    |

    | `http://apache.org/xml/features/nonvalidating/load-external-dtd` | 加载外部`DTD`
    |

    | `http://xml.org/sax/features/namespace-prefixes` | 报告用于命名空间声明的属性和前缀 |

    | `http://xml.org/sax/features/xml-1.1` | 支持`XML 1.1` |


    ## SAX 属性


    `SAX`解析器属性是名称-值对，您可以使用它们向`SAX`解析器提供对象值。这些属性影响解析器行为，可以通过`setProperty(String, Object)`方法在解析器上设置。传递给`setProperty`的第一个参数是属性的名称，第二个参数是一个`Object`值。表2-12列出了一些常用的`SAX`解析器属性。


    某些属性是特定于实现的，因此并非所有属性都能被不同的`SAX`解析器实现支持。


    **表2-12.** *SAX 解析器属性*


    | 属性 | 描述 |

    |------|------|

    | `http://apache.org/xml/properties/schema/external-schemaLocation` | 指定用于验证的外部模式
    |

    | `http://apache.org/xml/properties/schema/external-noNamespaceSchemaLocation`
    | 指定外部无命名空间模式 |

    | `http://xml.org/sax/properties/declaration-handler` | 指定`DTD`声明的处理器 |

    | `http://xml.org/sax/properties/lexical-handler` | 指定词法解析事件的处理器 |

    | `http://xml.org/sax/properties/dom-node` | 如果`SAX`用作`DOM`迭代器，则指定正在解析的`DOM`节点
    |'
