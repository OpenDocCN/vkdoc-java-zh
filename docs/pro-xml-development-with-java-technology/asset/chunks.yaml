  raw: 'You also need to download and install the J2EE 1.4 SDK and J2SE 5.0 so you
    can compile the example application.


    The Ajax application you will develop retrieves data from a database using a JDBC5
    driver.


    Therefore, you need to install a relational database along with a compatible JDBC
    driver. We use the open source relational database MySQL in this chapter; if you
    choose to do the same, download and install the MySQL 5.06 database and a compatible
    MySQL Connector/J JDBC driver. You may, of course, use any other JDBC-supported
    relational database, such as Oracle, IBM DB2, or Microsoft SQL Server.


    **Configuring JBoss with the MySQL Database**


    After installing the MySQL database, you need to create a MySQL database user.
    To create a user, log in to the MySQL database using the following command:


    mysql --user=root mysql


    You can add a new user to the user table with a GRANT statement, as shown in the
    following example, where you create the user mysql with the password mysql: GRANT
    ALL PRIVILEGES ON test TO ''mysql''@''localhost'' IDENTIFIED BY ''mysql'' ; You
    also need to create an example table in the MySQL database. To create the example
    table, log in to the database as the mysql user and run the SQL script shown in
    Listing 13-1.


    **Listing 13-1.** *SQL Script catalog.sql*


    CREATE TABLE Catalog(CatalogId VARCHAR(25),


    Journal VARCHAR(25), Publisher Varchar(25),


    Edition VARCHAR(25), Title Varchar(45),


    Author Varchar(25));


    INSERT INTO Catalog VALUES


    (''catalog1'', ''XML Zone'', ''IBM developerWorks'', ''Jan 2006'',


    ''Managing XML data: Tag URIs'', ''Elliotte Harold'');


    INSERT INTO Catalog VALUES


    (''catalog2'', ''XML Zone'', ''IBM developerWorks'',


    ''Jan 2006'', ''Practical data binding'', ''Brett McLaughlin''); You also need
    to configure the JBoss application server with the MySQL database. Assuming


    < jboss-4.0.2> as the root of the JBoss 4.0.2 install directory, you can proceed
    as follows: **1.** To use the JBoss 4.0.2 application server with MySQL, you first
    need to copy the MySQL


    driver classes to the JBoss server classpath. So, copy mysql-connector-java-3.1.11-bin.jar
    to the < jboss-4.0.2>/server/default/lib directory.


    **2.** To use a MySQL data source, copy < jboss-4.0.2>/docs/examples/jca/mysql-ds.xml
    to the


    < jboss-4.0.2>/server/default/deploy directory. Modify the mysql-ds.xml configuration
    file by setting the <driver-class> XML element to com.mysql.jdbc.Driver and the
    <connection-url> XML element to jdbc:mysql://localhost:3306/test. In mysql-ds.xml,
    specify user-name as mysql and password as mysql. The jndi-name is set to MySqlDS
    by default. Listing 13-2 shows the fully configured mysql-ds.xml file.


    5\. Information about JDBC technology is available at http://java.sun.com/javase/technologies/database.jsp.


    6\. MySQL 5.0 is available at http://www.mysql.com.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Vohra_706-0C13.fm Page 333 Saturday, July 29, 2006 5:45 AM


    C H A P T E R 1 3 ■ B U I L D I N G W E B A P P L I C A T I O N S W I T H A J
    A X


    **333**


    **Listing 13-2.** *Mysql-ds.xml*


    <?xml version="1.0" encoding="UTF-8"?>


    <datasources>


    <local-tx-datasource>


    <jndi-name>MySqlDS</jndi-name>


    <connection-url>jdbc:mysql://localhost:3306/test</connection-url>


    <driver-class>com.mysql.jdbc.Driver</driver-class>


    <user-name>mysql</user-name>


    <password>mysql</password>


    </local-tx-datasource>


    </datasources>


    **3.** You also need to modify <jboss-4.0.2>/server/default/conf/login-config.xml
    by adding the <application-policy> XML element shown in Listing 13-3 to login-config.xml.


    **Listing 13-3.** *login-config.xml*


    <application-policy name = "MySqlDbRealm">


    <authentication>


    <login-module code =


    "org.jboss.resource.security.ConfiguredIdentityLoginModule"


    flag = "required">


    <module-option name ="principal"></module-option>


    <module-option name ="userName">mysql</module-option>


    <module-option name ="password">mysql</module-option>


    <module-option name ="managedConnectionFactoryName"> jboss.jca:service=LocalTxCM,name=MySqlDS


    </module-option>


    </login-module>


    </authentication>


    </application-policy>'
