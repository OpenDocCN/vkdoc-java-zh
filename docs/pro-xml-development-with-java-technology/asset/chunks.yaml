    SOAP 1.1 Messaging Style


    SOAP 1.1 messaging style, which is a completely distinct concept from the concept
    of message exchange patterns (which can be request-response or one-way) and the
    concept of message encoding (which for us is always literal), specifies rules
    for the structure of the XML content in the payload of the soapenv:Body element.
    Two possible SOAP 1.1 messaging styles exist:


    • Remote procedure call (rpc) style


    • Documen t (document) style


    You will look at each of the messaging styles next.


    **Remote Procedure Call Style**


    As the name implies, this style embodies the semantics associated with remote
    procedure invocations.


    Under this style, the following is true:


    • Th e conten t o f th e soapenv:Body element always has a single child element
    whose tag name corresponds to the operation name being remotely invoked.


    • The grandchild elements of the soapenv:Body element denote the parameters associated
    with the remote operation.


    • The names and order of the grandchild elements correspond to the remote operation
    parameter names and their order.


    • The child and grandchild elements of soapenv:Body element must be namespace
    qualified; the namespace is application specific.


    This style is completely redundant, because the document style, which we will
    describe in the next section, is much more general and, more important, adheres
    to the fundamental tenets of keeping interacting applications as loosely coupled
    as possible. By contrast, the rpc style is akin to making a method call, with
    all the attendant implications of tight coupling between the calling application
    and the called application. In our opinion, the rpc style is the antithesis of
    loosely coupled applications and should be, as much as possible, avoided.


    **Document Style**


    The rules for the structure of soapenv:Body in the document style are simple:


    • Th e conten t o f soapenv:Body element should be well-formed XML, and all soapenv:Body
    child elements should be namespace qualified in an application-specific namespace.


    • I f a wsdl:part, mapped to the soapenv:Body element, corresponds to a schema
    element (that is, it has an element attribute), in the document-style message
    the schema element occurs as a child of the soapenv:Body element.'
