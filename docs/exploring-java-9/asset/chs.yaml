  \ Maven 编译器和 Surefire 插件配置中的 `--add-modules java.se.ee`。\n\n## 总结\n\n作为 Java 9 中最重要的新特性，JPMS\
  \ 对 Java 平台的各个方面都产生了影响。本章从模块声明开始，接着讨论了未命名模块和自动模块。我还介绍了 JDK 工具和相关概念。此外，你了解到借助模块相关的\
  \ API，可以在 Java 程序中与模块系统进行交互。最后，本章提供了关于迁移路径的信息，以及一个如何迁移到 Java 9 模块的具体示例。在下一章中，我们将讨论\
  \ Java 9 中的 REPL 交互式编程环境——jshell。\n\n\n\n"
- '# 3. jshell


  jshell 是一个实用的工具，它为 Java 添加了读取-求值-打印循环（REPL）。它允许开发者以交互方式尝试 Java 语言特性，或快速评估某些表达式。例如，Java
  程序通常会将文件写入系统的临时目录。有时你可能想检查临时目录，以验证所创建文件的内容。要获取临时目录的路径，你需要获取 Java 系统属性 `java.io.tmpdir`
  的值。你可以通过创建一个包含 main 方法并输出该值的简单 Java 程序来实现，或者使用 Apache Groovy 控制台（[`http://groovy-lang.org/groovyconsole.html`](http://groovy-lang.org/groovyconsole.html)）来快速运行代码。但对于此类简单任务，编写另一个
  Java 程序似乎有些小题大做，而使用 Groovy 控制台则需要你下载并安装 Groovy。这两种方法都不太理想。现在，在 Java 9 中你有了一个更好的选择——jshell。


  jshell 是 Java 9 中的一个内置工具。你可以通过运行命令 `jshell` 来启动它。


  ```

  $ jshell

  ```


  然后，你只需输入 `System.getProperty("java.io.tmpdir")` 即可获取该值；参见清单 3-1。


  ```

  jshell> System.getProperty("java.io.tmpdir")

  $1 ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

  清单 3-1.

  在 jshell 中输入表达式

  ```


  你可能会注意到输出中的 `$1`。这是对你刚刚输入的表达式结果的引用。你可以在 shell 中稍后使用此引用。在清单 3-2 中，输入 `$1.length()`
  来获取 `$1` 的长度，并得到另一个引用 `$2`。现在 `$2` 引用了 `$1` 所引用字符串的长度。


  ```

  jshell> $1.length()

  $2 ==> 49

  清单 3-2.

  使用结果引用

  ```


  如果你更喜欢使用命名恰当的引用，你可以创建变量并为其赋值；参见清单 3-3。


  ```

  jshell> String tmpdir = System.getProperty("java.io.tmpdir")

  tmpdir ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

  清单 3-3.

  使用变量

  ```


  ## 代码补全


  jshell 提供了基本的代码补全支持。当你按下 `<Tab>` 键时，可以看到一个可能的选项列表。例如，如果你输入 `System.get` 并按下 `<Tab>`
  键，jshell 会列出 `System` 中所有以 `get` 开头的方法。


  ```

  jshell> System.get

  getLogger(             getProperties()        getProperty(

  getSecurityManager()   getenv(

  ```


  代码会自动补全到所有选项的最长公共前缀。例如，如果你输入 `System.getP` 并按下 `<Tab>` 键，代码会补全为 `System.getPropert`，并有两个选项：`getProperties()`
  和 `getProperty(`。


  ## 类


  除了简单的表达式，你还可以在 shell 中创建类。在清单 3-4 中，让我们创建一个包含抽象方法 `getArea()` 的抽象类 `Shape`。


  ```

  jshell> abstract class Shape {

  ...>   protected abstract double getArea();

  ...> }

  |  created class Shape

  清单 3-4.

  创建类 Shape

  ```


  然后创建一个继承自 `Shape` 的新类 `Circle`；参见清单 3-5。


  ```

  jshell> class Circle extends Shape {

  ...>   private final double radius;

  ...>   public Circle(final double radius) {

  ...>     this.radius = radius;

  ...>   }

  ...>   public double getArea() {

  ...>     return Math.PI * this.radius * this.radius;

  ...>   };

  ...> }

  |  created class Circle

  清单 3-5.

  创建类 Circle

  ```


  现在你可以创建 `Circle` 类的新实例并调用其方法；参见清单 3-6。


  ```

  jshell> Circle circle1 = new Circle(10);

  circle1 ==> Circle@2038ae61

  jshell> circle1.getArea()

  $7 ==> 314.1592653589793

  清单 3-6.

  创建类 Circle 的实例

  ```


  ## 方法


  你也可以在 jshell 中添加方法。在清单 3-7 中，让我们创建一个 `add()` 方法。


  ```

  jshell> int add(int x, int y) {

  ...>   return x + y;

  ...> }

  |  created method add(int,int)

  清单 3-7.

  添加方法

  ```


  你可以像清单 3-8 所示那样调用此方法。


  ```

  jshell> add(1, 2)

  $19 ==> 3

  清单 3-8.

  调用方法

  ```


  ## 命令


  在 jshell 中输入 `/help`，你可以看到可用命令的列表。对于某个命令，例如 `/list`，你可以使用 `/help /list` 来查看该命令的详细帮助信息。


  我将在以下章节中讨论这些命令。


  ### `/list`


  `/list` 列出所有代码片段。每个代码片段都有一个 ID。代码片段有三种类型：


  *   启动代码片段在启动期间自动求值。`/list -start` 仅显示启动代码片段。

  *   活动代码片段是你输入的代码片段。`/list` 显示活动代码片段。

  *   错误代码片段是你输入但编译失败的代码片段。


  你可以使用 `/list -all` 列出所有代码片段；参见清单 3-9。每个代码片段前面都有一个 ID。启动代码片段的 ID 以 `s` 为前缀，而错误代码片段的
  ID 以 `e` 为前缀。你可以看到像 `s1`、`s2` 或 `e3` 这样的 ID。活动代码片段的 ID 与其求值结果的引用名称相匹配。例如，你可以使用 `$7`
  来引用 ID 为 `7` 的代码片段的求值结果。如果你想引用之前的代码片段，可以先使用 `/list` 找到其 ID，然后使用 `$<id>` 来引用其结果。


  你也可以使用 `/list <snippet id>` 按 ID 列出代码片段的源代码，例如 `/list s1` 或 `/list 4`。


  ```

  s1 : import java.io.*;

  s2 : import java.math.*;

  s3 : import java.net.*;

  s4 : import java.nio.file.*;

  s5 : import java.util.*;

  s6 : import java.util.concurrent.*;

  s7 : import java.util.function.*;

  s8 : import java.util.prefs.*;

  s9 : import java.util.regex.*;

  s10 : import java.util.stream.*;

  1 : System.getProperty("java.io.tmpdir")

  2 : $1.length()

  e1 : tmpdir = System.getProperty("java.io.tmpdir")

  3 : String tmpdir = System.getProperty("java.io.tmpdir");

  4 : abstract class Shape {

  protected abstract double getArea();

  }

  清单 3-9.

  /list -all 的输出

  ```


  ### `/edit`


  `/edit` 按 ID 编辑代码片段——例如，你可以使用 `/edit 1` 来编辑 ID 为 `1` 的代码片段。会打开一个新窗口，其中包含该代码片段的当前源代码；参见图
  3-1。


  ![A459620_1_En_3_Fig1_HTML.jpg](img/A459620_1_En_3_Fig1_HTML.jpg)


  图 3-1.


  JShell 编辑面板


  如果你在新窗口中将源代码更新为 `System.getProperty("os.name");` 并点击“接受”以保存，则会创建并运行一个新的代码片段。


  ### `/drop`


  `/drop` 按 ID 删除代码片段；例如，使用 `/drop 1` 删除 ID 为 `1` 的代码片段，如清单 3-10 所示。


  ```

  jshell> /drop 23

  |  dropped variable $23

  清单 3-10.

  按 ID 删除代码片段

  ```


  ### `/save`


  `/save` 将代码片段和命令保存到文件。你可以分别使用 `/save -all`、`/save` 或 `/save -start` 选择保存所有代码片段、活动代码片段或启动代码片段。你也可以使用
  `/save -history` 来保存命令；参见清单 3-11。


  ```

  jshell> /save -history ∼/Downloads/snippets.txt

  清单 3-11.

  保存代码片段

  ```




  ### `/open`


  `/open` 命令用于打开文件并将其内容作为输入源。例如，你可以创建一个包含清单 3-12 所示内容的 `rectangle.txt` 文件。


  ```

  class Rectangle extends Shape {

  private final double width;

  private final double height;

  public Rectangle(final double width, final double height) {

  this.width = width;

  this.height = height;

  }

  public double getArea() {

  return this.width * this.height;

  }

  }

  清单 3-12.

  文件 rectangle.txt 的内容

  ```


  然后，你可以使用 `/open` 命令打开该文件，如清单 3-13 所示。


  ```

  /open ∼/Downloads/rectangle.txt

  清单 3-13.

  使用 /open 打开文件

  ```


  当使用 `/list` 检查代码片段时，你会发现该文件已作为 ID 为 `27` 的新代码片段添加。现在你可以使用 `Rectangle` 类了，参见清单 3-14。


  ```

  jshell> Rectangle rectangle = new Rectangle(10, 5)

  rectangle ==> Rectangle@11438d26

  jshell> rectangle.getArea()

  $29 ==> 50.0

  清单 3-14.

  使用 Rectangle 类

  ```


  ### `/imports`


  `/imports` 命令列出所有已导入的项，参见清单 3-15。


  ```

  jshell> /imports

  |    import java.io.*

  |    import java.math.*

  |    import java.net.*

  |    import java.nio.file.*

  |    import java.util.*

  |    import java.util.concurrent.*

  |    import java.util.function.*

  |    import java.util.prefs.*

  |    import java.util.regex.*

  |    import java.util.stream.*

  清单 3-15.

  列出所有已导入的项

  ```


  ### `/vars`


  `/vars` 命令列出所有已声明的变量及其值，参见清单 3-16。它还支持 `-all` 和 `-start` 标志。


  ```

  jshell> /vars

  |    String $1 = "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

  |    int $2 = 49

  |    String tmpdir = "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

  |    Circle circle1 = Circle@2038ae61

  |    double $7 = 314.1592653589793

  清单 3-16.

  列出所有已声明的变量

  ```


  ### `/types`


  `/types` 命令列出所有已声明的类型，参见清单 3-17。它还支持 `-all` 和 `-start` 标志。


  ```

  jshell> /types

  |    class Shape

  |    class Circle

  |    class Rectangle

  清单 3-17.

  列出所有已声明的类型

  ```


  ### `/methods`


  `/methods` 命令列出所有已声明的方法，参见清单 3-18。它还支持 `-all` 和 `-start` 标志。


  ```

  jshell> /methods

  |    int add(int,int)

  清单 3-18.

  列出所有已声明的方法

  ```


  ### `/history`


  `/history` 命令列出你输入的所有内容，参见清单 3-19。


  ```

  jshell> /history

  System.getProperty("java.io.tmpdir")

  $1.length()

  tmpdir = System.getProperty("java.io.tmpdir")

  String tmpdir = System.getProperty("java.io.tmpdir")

  清单 3-19.

  列出你输入的所有内容

  ```


  ### `/env`


  `/env` 命令用于显示或修改 jshell 的求值上下文。你可以使用 `/env` 来显示求值上下文的配置。要修改上下文，你需要至少传递 `-class-path`、`-module-path`、`-add-modules`
  和 `-add-exports` 中的一个值。


  `-class-path` 选项用于设置上下文的类路径。例如，如果你想在 jshell 中测试 Guava，你需要将其 JAR 文件添加到类路径中，参见清单 3-20。


  ```

  jshell> /env -class-path ∼/Downloads/libs/guava-19.0.jar

  清单 3-20.

  将 JAR 文件添加到类路径

  ```


  现在你可以使用 Guava 中的类了，参见清单 3-21。


  ```

  jshell> import com.google.common.collect.Lists

  jshell> Lists.newArrayList("hello", "world")

  $27 ==> [hello, world]

  清单 3-21.

  使用 JAR 文件中的类

  ```


  `-module-path`、`-add-modules` 和 `-add-exports` 选项的含义与第 2 章中 `javac` 或 `java` 使用的选项相同。


  ### `/set`


  `/set` 命令用于配置 jshell。输入 `/set` 会显示当前配置。`/set` 有几个子命令：


  *   `/set editor`：指定 `/edit` 命令使用的编辑器；例如，输入 `/set editor -wait atom` 使用 Atom 编辑器（[`https://atom.io/`](https://atom.io/)）。使用
  `-wait` 标志很重要，它能让 jshell 等待编辑器关闭，否则 jshell 将无法捕获更改。

  *   `/set start`：设置默认启动代码片段和命令的文件。如果你在使用 jshell 之前有一些设置代码需要运行，可以将这些代码放入一个文件，并使用
  `/set start` 配置它优先运行。

  *   `/set feedback`：设置反馈模式。可选值有 `normal`、`concise`、`silent` 和 `verbose`。此配置控制 jshell
  提供的信息量。例如，如果将模式设置为 `verbose`，jshell 在运行代码片段时会提供更多信息，参见清单 3-22。


  ```

  jshell> System.getProperty("java.io.tmpdir")

  $4 ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

  |  created scratch variable $4 : String

  清单 3-22.

  verbose 反馈模式

  ```


  jshell 允许对反馈模式进行细粒度控制，包括显示的提示符、显示值的最大长度以及字段的格式。这些可以通过以下命令进行配置：


  *   `/set prompt <mode>`：设置显示的提示符

  *   `/set truncation <mode>`：设置显示值的最大长度

  *   `/set format <mode> <field>`：设置字段的格式


  直接输入这些命令会显示当前配置。


  ### `/reset`


  `/reset` 命令重置 jshell 的内部状态。重置后，所有正常和错误的代码片段及变量都会被移除。启动代码片段会重新执行。由 `/set` 所做的配置更改会保留。`/reset`
  支持与 `/env` 相同的选项：`-class-path`、`-module-path`、`-add-modules` 和 `-add-exports`。


  ### `/reload`


  `/reload` 命令重置 jshell，并按输入顺序重放每个有效的代码片段和 `/drop` 命令。`/reload` 支持两种模式：普通模式和恢复模式。在普通模式下使用
  `/reload`，它只会重放自上次进入 jshell 以来，或自执行 `/reset` 或 `/reload` 命令以来的有效历史记录。在恢复模式下使用 `/reload
  -restore`，它会重放自上次进入 jshell 到最近一次进入 jshell 之间，或自执行 `/reset` 或 `/reload` 命令以来的有效历史记录。恢复模式可以重放上一次
  jshell 会话的历史记录。当传递 `-quiet` 选项时，`/reload` 不会显示重放的输出，但错误仍会显示。`/reload` 也支持与 `/env`
  相同的选项：`-class-path`、`-module-path`、`-add-modules` 和 `-add-exports`。


  使用 `/env` 修改求值上下文后，历史记录会被静默重放，就像调用了 `/reload -quiet` 命令一样。


  ### `/!`


  此命令重新运行上一个代码片段。


  ### `/<id>`


  此命令重新运行具有指定 ID 的代码片段。


  ### `/-<n>`


  此命令重新运行第 n 个代码片段。


  ### `/exit`


  此命令退出 jshell。


  ## 总结


  jshell 是一个非常有用的工具，开发人员可以用它来快速测试代码并验证结果。本章详细介绍了 jshell 的所有功能，包括所有可用的命令。在下一章中，我将讨论
  Java 9 中集合、`Stream` 和 `Optional` 的变更。


  '
- '# 4. 集合、Stream 和 Optional


  本章涵盖与 Java 9 中集合、`Stream` 和 `Optional` 变更相关的主题。


  ## 集合的工厂方法


  Java 9 添加了一些便捷方法，可用于创建不可变集合。


  ### `List.of()` 方法


  新的静态方法 `List.of()` 有多个重载版本，可用于从零个或多个元素创建不可变列表，参见清单 4-1。


  ```

  List.of();

  List.of("Hello", "World");

  List.of(1, 2, 3);

  清单 4-1.

  List.of() 示例

  ```


  `List.of()` 不允许 `null` 值。向其传递 `null` 会导致 `NullPointerException`。




  ### `Set.of()` 方法


  新的静态方法 `Set.of()` 也提供了多个重载版本，用于从零个或多个元素创建不可变集合；参见清单 4-2。


  ```

  Set.of();

  Set.of("Hello", "World");

  Set.of(1, 2, 3);

  清单 4-2.

  Set.of() 示例

  ```


  由于集合不允许包含重复元素，向 `Set.of()` 传入重复元素会导致其抛出 `IllegalArgumentException`。`Set.of()` 不允许
  `null` 值。向其传入 `null` 会导致 `NullPointerException`。


  ### `Map.of()` 和 `Map.ofEntries()` 方法


  两个新的静态方法 `Map.of()` 和 `Map.ofEntries()` 用于创建包含零个或多个条目的不可变映射。


  `Map.of()` 有 11 个不同的重载版本，用于创建包含零到十个条目的映射；参见清单 4-3。键和值成对指定。


  ```

  Map.of(); // 空映射

  Map.of("Hello", 1, "World", 2); // -> 包含两个条目的映射

  清单 4-3.

  Map.of() 示例

  ```


  `Map.ofEntries()` 可以从任意数量的 `Map.Entry` 对象创建映射；参见清单 4-4。


  ```

  Map.ofEntries(

  new AbstractMap.SimpleEntry("Hello", 1),

  new AbstractMap.SimpleEntry("World", 2)

  );

  清单 4-4.

  Map.ofEntries() 示例

  ```


  `Map.of()` 和 `Map.ofEntries()` 不允许 `null` 键或值。传入重复键会导致它们抛出 `IllegalArgumentException`。向其传入
  `null` 会导致 `NullPointerException`。


  ## Arrays


  本节讨论 Java 9 中添加到 `java.util.Arrays` 的方法。


  ### `Mismatch()` 方法


  `mismatch()` 方法组用于查找并返回两个数组之间第一个不匹配元素的索引。如果没有不匹配，`mismatch()` 返回 `-1`。针对 `boolean`、`byte`、`char`、`double`、`float`、`int`、`long`、`short`
  和 `Object` 数组，有不同的重载版本。你还可以在两个数组中指定起始和结束索引来检查不匹配。对于对象数组，你还可以指定一个 `java.util.Comparator`
  对象进行比较。在清单 4-5 中，你可以看到 `mismatch()` 的不同测试用例。


  ```

  @Test

  public void testMismatch() throws Exception {

  assertEquals(0, Arrays.mismatch(new int[]{1}, new int[]{2}));

  assertEquals(1, Arrays.mismatch(new int[]{1}, new int[]{1, 2}));

  assertEquals(1, Arrays.mismatch(new int[]{1, 3}, new int[]{1, 2}));

  assertEquals(-1, Arrays.mismatch(

  new int[]{1, 3}, 0, 1,

  new int[]{1, 2}, 0, 1));

  }

  清单 4-5.

  mismatch() 示例

  ```


  ### `Compare()` 方法


  `compare()` 方法组用于按字典顺序比较两个数组。针对 `boolean`、`byte`、`char`、`double`、`float`、`int`、`long`、`short`
  和 `Object` 数组，有不同的重载版本。你还可以在两个数组中指定起始和结束索引进行比较。对于对象数组，你还可以指定一个 `java.util.Comparator`
  对象进行比较。清单 4-6 测试了 `compare()` 的不同用例。


  ```

  @Test

  public void testCompare() throws Exception {

  assertEquals(0, Arrays.compare(new int[]{1}, new int[]{1}));

  assertTrue(Arrays.compare(new int[]{0}, new int[]{1}) < 0);

  assertTrue(Arrays.compare(new int[]{1}, new int[]{0}) > 0);

  assertEquals(0, Arrays.compare(

  new int[]{1, 3}, 0, 1,

  new int[]{1, 2}, 0, 1));

  }

  清单 4-6.

  compare() 示例

  ```


  ### `Equals()` 方法


  `equals()` 方法组用于判断两个数组是否相等，如果相等则返回 `true`。针对 `boolean`、`byte`、`char`、`double`、`float`、`int`、`long`、`short`
  和 `Object` 数组，有不同的重载版本。你还可以在两个数组中指定起始和结束索引进行相等性检查。对于对象数组，你还可以指定一个 `java.util.Comparator`
  对象进行比较。清单 4-7 测试了 `equals()` 的不同用例。


  ```

  @Test

  public void testEquals() throws Exception {

  assertTrue(Arrays.equals(new int[]{1}, new int[]{1}));

  assertTrue(Arrays.equals(

  new int[]{1, 2}, 0, 1,

  new int[]{1, 3}, 0, 1));

  }

  清单 4-7.

  equals() 示例

  ```


  ## Stream


  本节介绍 Java 9 中添加到 `java.util.stream.Stream` 的新方法。


  ### `ofNullable()` 方法


  静态方法 `Stream<T> ofNullable(T t)` 返回一个包含零个或一个元素的 `Stream`，具体取决于输入值是否为 `null`。清单 4-8
  展示了此方法的示例。


  ```

  @Test

  public void testOfNullable() throws Exception {

  assertEquals(1, Stream.ofNullable("").count());

  assertEquals(0, Stream.ofNullable(null).count());

  }

  清单 4-8.

  Stream.ofNullable() 示例

  ```


  ### `dropWhile()` 方法


  方法 `Stream<T> dropWhile(Predicate<? super T> predicate)` 会丢弃流中的元素，直到遇到第一个不匹配谓词的元素。如果流是有序的，则丢弃与给定谓词匹配的最长前缀元素。如果流是无序的，并且该流的部分（而非全部）元素与给定谓词匹配，则无法确定哪些元素被丢弃。但是，如果流的所有元素都与给定谓词匹配，或者流的任何元素都不与给定谓词匹配，那么流是有序还是无序就无关紧要了；结果是确定的。


  在清单 4-9 中，流包含从 `1` 到 `5` 的元素。谓词检查元素是否为奇数。第一个元素 `1` 被丢弃。结果流包含四个元素。


  ```

  @Test

  public void testDropWhile() throws Exception {

  final long count = Stream.of(1, 2, 3, 4, 5)

  .dropWhile(i -> i % 2 != 0)

  .count();

  assertEquals(4, count);

  }

  清单 4-9.

  Stream.dropWhile() 示例

  ```


  ### `takeWhile()` 方法


  方法 `Stream<T> takeWhile(Predicate<? super T> predicate)` 对流执行与 `dropWhile()` 相反的操作。`takeWhile()`
  会获取流中的元素，直到遇到第一个不匹配谓词的元素。在处理有序和无序流时，`takeWhile()` 的行为与 `dropWhile()` 相同。


  在清单 4-10 中，当像清单 4-6 那样使用 `takeWhile()` 处理流时，结果流只有一个值为 `1` 的元素。


  ```

  @Test

  public void testTakeWhile() throws Exception {

  final long count = Stream.of(1, 2, 3, 4, 5)

  .takeWhile(i -> i % 2 != 0)

  .count();

  assertEquals(1, count);

  }

  清单 4-10.

  Stream.takeWhile() 示例

  ```


  ### `iterate()` 方法


  静态方法 `Stream<T> iterate(T seed, Predicate<? super T> hasNext, UnaryOperator<T> next)`
  是一种使用迭代器模式生成流的新方式。`seed` 是迭代的初始元素。`hasNext` 是应用于当前元素以检查流是否应终止的谓词。`next` 是应用于当前元素以生成流中下一个元素的函数。如果初始元素
  `seed` 不匹配谓词 `hasNext`，则结果流为空。


  在清单 4-11 中，结果流使用 `2` 作为初始元素，并将当前值增加 `2` 以生成下一个值。当值大于 `10` 时，流终止。流中将包含 `5` 个元素。


  ```

  @Test

  public void testIterate() throws Exception {

  final Stream stream =

  Stream.iterate(2, i -> i <= 10, i -> i + 2);

  assertEquals(5, stream.count());

  }

  清单 4-11.

  Stream.iterate() 示例

  ```


  ### `IntStream`、`LongStream` 和 `DoubleStream`


  方法 `dropWhile()`、`takeWhile()` 和 `iterate()` 也被添加到了 `IntStream`、`LongStream` 和 `DoubleStream`
  中。


  ## Collectors


  Java 9 中，`java.util.stream.Collectors` 也新增了几个方法。




  ### `filtering()` 方法


  方法 `<T, A, R> Collector<T, ?, R> filtering(Predicate<? super T> predicate, Collector<?
  super T,A,R> downstream)` 通过应用谓词函数来过滤输入元素，并且仅当谓词返回 `true` 时，才将元素累积到下游的 `Collector`
  中。


  清单 4-12 展示了如何使用 `filtering()` 根据字符串长度过滤 `String` 流，并将其收集到一个 `Set` 中。实际上，这可以简化为先使用
  `Stream.filter()`，然后将 `String` 收集到 `Set` 中。


  ```

  @Test

  public void testSimpleFiltering() throws Exception {

  final Set result = Stream.of("a", "bc", "def")

  .collect(Collectors.filtering(

  v -> v.length() > 1,

  Collectors.toSet()));

  assertEquals(2, result.size());

  }

  清单 4-12.

  Collectors.filtering() 的简单示例

  ```


  清单 4-13 展示了一个更复杂的 `filtering()` 示例。变量 `users` 是一个将用户名映射到其年龄的 Map。此示例使用 `groupingBy()`
  根据名称的首字符对 Map 条目进行分组。然后，它使用 `filtering()` 仅保留年龄大于 `18` 的条目。最后，它使用 `mapping()` 将条目映射为名称。结果是一个将每个名称的首字符映射到名称
  `Set` 的 Map。由于 `Bob` 的年龄仅为 `16`，因此结果 Map 中键 `B` 对应的值是一个空的 `Set`。


  ```

  @Test

  public void testComplicatedFiltering() throws Exception {

  final Map users = Map.of(

  "Alex", 30,

  "Bob", 16,

  "David", 50

  );

  final Map> result = users

  .entrySet()

  .stream()

  .collect(Collectors.groupingBy(entry -> entry.getKey().substring(0, 1),

  Collectors.filtering(entry -> entry.getValue() > 18,

  Collectors.mapping(

  Map.Entry::getKey,

  Collectors.toSet()))));

  assertEquals(1, result.get("A").size());

  assertEquals(0, result.get("B").size());

  assertEquals(1, result.get("D").size());

  }

  清单 4-13.

  Collectors.filtering() 的复杂示例

  ```


  ### `flatMapping()` 方法


  方法 `<T, U, A, R> Collector<T, ?, R> flatMapping(Function<? super T,? extends Stream<?
  extends U>> mapper, Collector<? super U,A,R> downstream)` 对输入元素应用一个扁平映射函数，并将映射后流中的元素累积到下游的
  `Collector` 中。


  在清单 4-14 中，给定一个 `String` 流，你可以看到 `flatMapping()` 被用于将 `String` 映射为 `Integer` 流，然后将所有
  `Integer` 收集到一个 `Set` 中。结果 `Set` 仅包含三个元素。


  ```

  @Test

  public void testFlatMapping() throws Exception {

  final Set result = Stream.of("a", "ab", "abc")

  .collect(Collectors.flatMapping(v -> v.chars().boxed(),

  Collectors.toSet()));

  assertEquals(3, result.size());

  }

  清单 4-14.

  Collectors.flatMapping() 的示例

  ```


  ## Optional


  `java.util.Optional` 中新增了三个方法。


  ### `ifPresentOrElse()` 方法


  方法 `void ifPresentOrElse(Consumer<? super T> action, Runnable emptyAction)` 在值存在时执行给定的
  `action`，否则执行给定的 `emptyAction`。


  在清单 4-15 中，方法 `checkValue()` 根据值是否存在来增加或减少 `count`。第一次调用 `checkValue()` 会减少 `count`，而第二次调用则会增加
  `count`。


  ```

  public class OptionalTest {

  private AtomicInteger count;

  @Before

  public void setUp() throws Exception {

  this.count = new AtomicInteger();

  }

  @Test

  public void testIfPresentOrElse() throws Exception {

  checkValue(Optional.empty());

  assertEquals(-1, this.count.get());

  checkValue(Optional.of(1));

  assertEquals(0, this.count.get());

  }

  private void checkValue(final Optional value) {

  value.ifPresentOrElse(

  v -> this.count.incrementAndGet(),

  () -> this.count.decrementAndGet()

  );

  }

  }

  清单 4-15.

  Optional.ifPresentOrElse() 的示例

  ```


  ### `Optional.or()` 方法


  方法 `Optional<T> or(Supplier<? extends Optional<? extends T>> supplier)` 在值存在时返回包含该值的
  `Optional`，否则返回由供给函数生成的 `Optional`。清单 4-16 展示了此方法的示例。


  ```

  @Test

  public void testOr() throws Exception {

  assertTrue(Optional.empty().or(() -> Optional.of(1)).isPresent());

  }

  清单 4-16.

  Optional.or() 的示例

  ```


  ### `stream()` 方法


  方法 `Stream<T> stream()` 将 `Optional` 转换为 `Stream`。如果值存在，则结果流仅包含该值，否则结果流为空。当你使用 `flatMap()`
  将 `Optional` 的 `Stream` 转换为仅包含存在值的元素的 `Stream` 时，此方法非常有用。


  在清单 4-17 中，`Optional` 流包含三个元素，但只有两个包含值。使用 `flatMap()` 后，结果流包含这两个存在的值。


  ```

  @Test

  public void testStream() throws Exception {

  final long count = Stream.of(

  Optional.of(1),

  Optional.empty(),

  Optional.of(2)

  ).flatMap(Optional::stream)

  .count();

  assertEquals(2, count);

  }

  清单 4-17.

  Optional.stream() 的示例

  ```


  方法 `ifPresentOrElse()` 和 `stream()` 也被添加到了 `java.util.OptionalInt`、`java.util.OptionalDouble`
  和 `java.util.OptionalLong` 类中。


  ## 总结


  本章涵盖了 Java 9 中与集合、`Stream` 和 `Optional` 相关的变更。用于创建不可变集合的新工厂方法可以在 Java 程序中节省大量代码。添加到
  `Arrays`、`Stream` 和 `Optional` 中的新方法也非常有用。在下一章中，我们将讨论新的进程 API。


