  ## `Process`


  `Process` 也有几个新方法；参见表 5-4。其中一些方法与 `ProcessHandle` 中的方法具有相同的名称和功能。


  表 5-4.


  `Process` 的方法


  | 方法 | 描述 |

  | --- | --- |

  | `long pid()` | 返回原生进程 ID |

  | `ProcessHandle.Info info()` | 返回 `ProcessHandle.Info`，其中包含进程的信息快照 |

  | `boolean isAlive()` | 检查进程是否存活 |

  | `ProcessHandle toHandle()` | 返回此进程的 `ProcessHandle` |

  | `Stream<ProcessHandle> children()` | 返回所有子进程 |

  | `Stream<ProcessHandle> descendants()` | 返回所有后代进程 |

  | `boolean supportsNormalTermination()` | 检查进程是否可以使用 `destroy()` 正常终止 |

  | `CompletableFuture<ProcessHandle> onExit()` | 返回一个 `CompletableFuture<ProcessHandle>`，可用于在进程终止时运行自定义操作
  |


  ## 管理长时间运行的进程


  借助 `ProcessHandle` 的新方法 `onExit()`，现在管理长时间运行的进程变得更加容易。清单 5-3 展示了一个简单的示例。在方法 `start()`
  中，我使用命令 `top` ( [`https://linux.die.net/man/1/top`](https://linux.die.net/man/1/top)
  ) 创建了一个新进程，并返回该进程的 `ProcessHandle`。在方法 `waitFor()` 中，我使用 `onExit()` 返回的 `CompletableFuture`
  对象的 `whenCompleteAsync()` 方法来添加一个在进程退出时调用的处理器。在处理器中，我可以获取已终止进程的 `ProcessHandle`
  对象。这里我只是输出了该进程的 PID。变量 `shutdownThread` 代表一个线程，该线程在延迟一秒钟后销毁进程。我可以使用 `supportsNormalTermination()`
  检查 `ProcessHandle` 是否支持优雅终止，并尝试优雅地终止它。我使用 `CountDownLatch` 来等待异步完成处理器执行完毕。


  ```

  public class LongRunningProcess {

  public ProcessHandle start() throws IOException {

  final ProcessBuilder processBuilder = new ProcessBuilder("top")

  .inheritIO();

  return processBuilder.start().toHandle();

  }

  public void waitFor(final ProcessHandle processHandle) {

  final CountDownLatch latch = new CountDownLatch(1);

  processHandle.onExit().whenCompleteAsync((handle, throwable) -> {

  if (throwable == null) {

  System.out.println(handle.pid());

  } else {

  throwable.printStackTrace();

  }

  latch.countDown();

  });

  final Thread shutdownThread = new Thread(() -> {

  try {

  Thread.sleep(1000);

  } catch (final InterruptedException e) {

  e.printStackTrace();

  }

  if (processHandle.supportsNormalTermination()) {

  processHandle.destroy();

  } else {

  processHandle.destroyForcibly();

  }

  });

  shutdownThread.start();

  try {

  shutdownThread.join();

  latch.await();

  } catch (final InterruptedException e) {

  e.printStackTrace();

  }

  }

  public static void main(final String[] args) {

  final LongRunningProcess longRunningProcess = new LongRunningProcess();

  try {

  longRunningProcess.waitFor(longRunningProcess.start());

  } catch (final IOException e) {

  e.printStackTrace();

  }

  }

  }

  清单 5-3.

  管理长时间运行的进程

  ```


  当你运行清单 5-3 中的代码时，你应该会看到 `top` 命令的输出大约持续一秒钟，然后显示进程的 PID，程序终止。




  ## 总结


  在本章中，我们讨论了新的 `ProcessHandle` API，它能够提供对原生进程的控制。我还向你展示了如何使用这个新 API 来管理长时间运行的进程。在下一章中，我们将讨论平台日志记录
  API 和服务。


  '
- "# 6. 平台日志记录 API 与服务\n\n日志记录是应用程序开发的一个重要方面。Java 平台上有许多可用的日志记录框架，包括流行的选择，如 Apache\
  \ Log4j 2 ( [`https://logging.apache.org/log4j/2.x/`](https://logging.apache.org/log4j/2.x/)\
  \ ) 和 Logback ( [`https://logback.qos.ch/`](https://logback.qos.ch/) )。SLF4J 通常用作不同日志记录实现的门面。Java\
  \ 也有自己的日志记录实现，即 `java.util.logging` API，它是在 Java 1.4 中添加的。尽管 `java.util.logging`\
  \ 是 Java 标准库使用的内置日志记录解决方案，但它并不十分流行。大多数 Java 应用程序仍然使用外部日志记录框架。JDK 本身以及在其上运行的应用程序可能使用不同的日志记录框架。如果应用程序错误实际上与\
  \ Java 标准库相关（尽管这种错误不太可能发生），那么两个独立的日志记录框架将使错误诊断变得更加困难。在你使用两个独立日志记录框架的情况下，你还需要配置这两个日志记录框架，并且它们的配置很可能存在重复。\n\
  \n在 Java 9 中，现在可以通过使用 `java.lang.System.LoggerFinder` 类，为 JDK 和应用程序使用相同的日志记录框架。`LoggerFinder`\
  \ 负责管理 JDK 使用的日志记录器。JVM 有一个单一的系统级 `LoggerFinder` 实例，该实例通过服务提供者机制使用 `ServiceLoader`\
  \ 加载。如果未找到 `LoggerFinder` 提供者，当 `java.logging` 模块存在时，默认的 `LoggerFinder` 实现将使用 `java.util.logging`\
  \ 作为日志记录框架。如果 `java.logging` 模块不存在，则默认的 `LoggerFinder` 实现会使用 `System.err` 将日志消息输出到控制台。\n\
  \n`LoggerFinder` 的静态方法 `getLoggerFinder()` 返回 JVM 中的单一 `LoggerFinder` 实例。`LoggerFinder`\
  \ 的子类需要实现抽象方法 `System.Logger getLogger(String name, Module module)`，该方法为给定模块返回 `java.lang.System.Logger`\
  \ 接口的日志记录器实例。`System.Logger` 有不同的方法来记录不同级别的消息。`LoggerFinder` 还有方法 `System.Logger\
  \ getLocalizedLogger(String name, ResourceBundle bundle, Module module)`，用于为给定模块返回一个可本地化的日志记录器实例。\n\
  \n`System.Logger` 是应用程序用于记录消息的主要类。表 6-1 展示了 `System.Logger` 的方法。\n\n表 6-1. `System.Logger`\
  \ 的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `String getName()` | 返回此日志记录器的名称。 |\n| `boolean\
  \ isLoggable(System.Logger.Level level)` | 检查此日志记录器是否会记录给定级别的日志消息。 |\n| `void log(System.Logger.Level\
  \ level, String msg)` | 记录一条给定级别的消息。 |\n| `void log(System.Logger.Level level, Supplier<String>\
  \ msgSupplier)` | 记录一条由给定供应者函数生成的给定级别的消息。仅当消息将被记录时才会调用供应者函数。 |\n| `void log(System.Logger.Level\
  \ level, Object obj)` | 通过调用对象的 `toString()` 方法来记录一条给定级别的消息。 |\n| `void log(System.Logger.Level\
  \ level, String msg, Throwable thrown)` | 记录一条给定级别的消息，并附带一个给定的可抛出对象。 |\n| `void\
  \ log(System.Logger.Level level, Supplier<String> msgSupplier, Throwable thrown)`\
  \ | 记录一条由给定供应者函数生成的给定级别的消息，并附带一个给定的可抛出对象。 |\n| `void log(System.Logger.Level level,\
  \ String format, Object… params)` | 记录一条从格式字符串和可选参数列表生成的消息。该消息使用 `MessageFormat`\
  \ 中指定的格式。 |\n| `void log(System.Logger.Level level, ResourceBundle bundle, String\
  \ msg, Throwable thrown)` | 记录一条给定级别的本地化消息，并附带一个给定的可抛出对象。 |\n| `void log(System.Logger.Level\
  \ level, ResourceBundle bundle, String format, Object… params)` | 记录一条从格式字符串和可选参数列表生成的本地化消息。\
  \ |\n\n`System.Logger` 在 `System.Logger.Level` 中定义了用于日志记录级别的自有枚举。这些级别可以轻松映射到其他日志记录框架中的日志记录级别。这些日志记录级别是\
  \ `ALL`、`TRACE`、`DEBUG`、`INFO`、`WARNING`、`ERROR` 和 `OFF`。\n\n## 默认的 `LoggerFinder`\
  \ 实现\n\n让我们首先仔细看看默认的 `LoggerFinder` 实现。\n\n`java.base` 模块中的 `jdk.internal.logger.LoggerFinderLoader`\
  \ 类负责加载 `LoggerFinder` 实现。它首先尝试使用 `ServiceLoader` 来加载 `LoggerFinder` 的实现。如果不存在提供者，它会再次使用\
  \ `ServiceLoader` 来加载 `jdk.internal.logger.DefaultLoggerFinder` 类的实现。如果仍然找不到任何提供者，它会使用\
  \ `DefaultLoggerFinder` 的一个新实例。`DefaultLoggerFinder` 本身是一个日志记录实现，它使用 `jdk.internal.logger.SimpleConsoleLogger`\
  \ 类通过 `System.err` 将日志消息写入控制台。\n\n`java.logging` 模块中的 `sun.util.logging.internal.LoggingProviderImpl`\
  \ 类是 `DefaultLoggerFinder` 的一个实现，它将日志记录请求委托给由 `java.util.logging` 创建的基础日志记录器；请参见清单\
  \ 6-1 中 `java.logging` 的模块声明。\n\n```\nmodule java.logging {\n    exports java.util.logging;\n\
  \    provides jdk.internal.logger.DefaultLoggerFinder with\n        sun.util.logging.internal.LoggingProviderImpl;\n\
  }\n清单 6-1. java.logging 的模块声明\n```\n\n\n\n## 创建自定义 `LoggerFinder` 实现\n\n现在你可以创建自己的\
  \ `LoggerFinder` 实现了。由于 `LoggerFinder` 可以更改系统的默认日志实现，因此当安装了 `SecurityManager` 时，`LoggerFinder`\
  \ 的实现应首先检查 `loggerFinder` 权限。\n\n这里我将使用 SLF4J 与 Logback 作为日志框架，来演示如何创建自定义的 `LoggerFinder`。在清单\
  \ 6-2 中，类 `SLF4JLoggerFinder` 就是 `LoggerFinder` 的实现。方法 `checkPermission()` 用于检查所需的权限。在方法\
  \ `getLogger()` 中，我使用 SLF4J 的方法 `LoggerFactory.getLogger()` 来创建一个新的 `org.slf4j.Logger`\
  \ 实例。日志记录器的名称由模块名称和提供的名称共同构成。`getLogger()` 的返回值是类 `SLF4JLoggerWrapper` 的一个实例，如清单\
  \ 6-3 所示。\n\n```\npublic class SLF4JLoggerFinder extends System.LoggerFinder {\n\
  private static final RuntimePermission LOGGERFINDER_PERMISSION =\nnew RuntimePermission(\"\
  loggerFinder\");\npublic SLF4JLoggerFinder() {\nthis.checkPermission();\n}\nprivate\
  \ void checkPermission() {\nfinal SecurityManager sm = System.getSecurityManager();\n\
  if (sm != null) {\nsm.checkPermission(LOGGERFINDER_PERMISSION);\n}\n}\n@Override\n\
  public System.Logger getLogger(final String name, final Module module) {\ncheckPermission();\n\
  final Logger logger = LoggerFactory\n.getLogger(String.format(\"%s/%s\", module.getName(),\
  \ name));\nreturn new SLF4JLoggerWrapper(logger);\n}\n}\n清单 6-2.\nSLF4JLoggerFinder\n\
  ```\n\n类 `SLF4JLoggerWrapper` 实现了接口 `System.Logger`。在方法 `isLoggable()` 中，它将检查日志级别是否应被记录的任务委托给了被包装的\
  \ `org.slf4j.Logger` 实例中的不同方法。例如，如果级别是 `DEBUG`，则委托给方法 `isDebugEnabled()`。`org.slf4j.Logger`\
  \ 中的日志方法（例如 `trace()` 和 `debug()`）接受的参数与 `System.Logger` 中的方法 `log()` 不同，因此我需要为本地化和消息格式创建适配器。方法\
  \ `localizedMessage()` 返回从 `ResourceBundle` 中获取的本地化消息。方法 `doLog()` 仅接收纯文本消息，并根据级别将其委托给\
  \ `org.slf4j.Logger` 中的不同日志方法。在 `SLF4JLoggerWrapper` 的方法 `log()` 中，首先准备纯文本消息，然后将其传递给\
  \ `doLog()` 进行记录。\n\n```\npublic class SLF4JLoggerWrapper implements System.Logger\
  \ {\nprivate final Logger logger;\npublic SLF4JLoggerWrapper(final Logger logger)\
  \ {\nthis.logger = logger;\n}\n@Override\npublic String getName() {\nreturn this.logger.getName();\n\
  }\n@Override\npublic boolean isLoggable(final Level level) {\nswitch (level) {\n\
  case ALL:\ncase TRACE:\nreturn this.logger.isTraceEnabled();\ncase DEBUG:\nreturn\
  \ this.logger.isDebugEnabled();\ncase INFO:\nreturn this.logger.isInfoEnabled();\n\
  case WARNING:\nreturn this.logger.isWarnEnabled();\ncase ERROR:\nreturn this.logger.isErrorEnabled();\n\
  default:\nreturn false;\n}\n}\n@Override\npublic void log(final Level level, final\
  \ ResourceBundle bundle,\nfinal String msg, final Throwable thrown) {\nthis.doLog(level,\
  \ localizedMessage(bundle, msg), thrown);\n}\n@Override\npublic void log(final Level\
  \ level, final ResourceBundle bundle,\nfinal String format, final Object... params)\
  \ {\nthis.doLog(level,\nString.format(localizedMessage(bundle, format), params),\n\
  null);\n}\nprivate void doLog(final Level level,\nfinal String msg,\nfinal Throwable\
  \ thrown) {\nswitch (level) {\ncase ALL:\ncase TRACE:\nthis.logger.trace(msg, thrown);\n\
  break;\ncase DEBUG:\nthis.logger.debug(msg, thrown);\nbreak;\ncase INFO:\nthis.logger.info(msg,\
  \ thrown);\nbreak;\ncase WARNING:\nthis.logger.warn(msg, thrown);\nbreak;\ncase\
  \ ERROR:\nthis.logger.error(msg, thrown);\nbreak;\n}\n}\nprivate String localizedMessage(final\
  \ ResourceBundle resourceBundle,\nfinal String msg) {\nif (resourceBundle != null)\
  \ {\ntry {\nreturn resourceBundle.getString(msg);\n} catch (final MissingResourceException\
  \ e) {\nreturn msg;\n}\n}\nreturn msg;\n}\n}\n清单 6-3.\nSLF4JLoggerWrapper\n```\n\
  \n清单 6-4 中该模块的 `module-info.java` 文件使用 `provides` 来声明 `System.LoggerFinder` 的提供者。\n\
  \n```\nmodule feature.logging {\nrequires transitive slf4j.api;\nprovides java.lang.System.LoggerFinder\n\
  with io.vividcode.feature9.logging.SLF4JLoggerFinder;\n}\n清单 6-4.\n模块声明\n```\n\n\
  现在我可以使用日志服务来记录消息。我使用方法 `System.getLogger()` 创建一个日志记录器，然后使用方法 `log()` 来记录消息。这里我使用了一些\
  \ Java 标准类，以观察应用程序日志和平台日志是如何结合在一起的。\n\n```\npublic class Main {\nprivate static\
  \ final System.Logger LOGGER = System.getLogger(\"Main\");\npublic static void main(final\
  \ String[] args) {\nLOGGER.log(Level.INFO, \"Run!\");\ntry {\nnew URL(\"https://google.com\"\
  ).openConnection().connect();\n} catch (final IOException e) {\nLOGGER.log(Level.WARNING,\
  \ \"Failed to connect\", e);\n}\n}\n}\n清单 6-5.\n使用日志服务\n```\n\n清单 6-6 展示了日志。在输出中，你可以同时看到应用程序日志和\
  \ JDK 日志。这里我配置了 Logback 以输出所有消息。\n\n```\n2017-09-20 21:23:56,202 |  INFO [     \
  \ main] feature.runtime/Main : Run!\n2017-09-20 21:23:56,448 | TRACE [      main]\
  \ .h.HttpURLConnection : ProxySelector Request for https://google.com/\n2017-09-20\
  \ 21:23:56,450 | TRACE [      main] .h.HttpURLConnection : Looking for HttpClient\
  \ for URL https://google.com and proxy value of DIRECT\n2017-09-20 21:23:56,451\
  \ | TRACE [      main] .h.HttpURLConnection : Creating new HttpsClient with url:https://google.com\
  \ and proxy:DIRECT with connect timeout:-1\n2017-09-20 21:23:56,516 | TRACE [  \
  \    main] .h.HttpURLConnection : Proxy used: DIRECT\n清单 6-6.\n日志消息\n```\n\n## 小结\n\
  \n借助新的平台日志 API 和服务，你现在可以为 JDK 本身和应用程序使用统一的日志实现。这使得错误诊断变得更加容易。在下一章中，我们将讨论响应式流。\n\n"
- '# 7. 响应式流


  响应式编程（[`https://en.wikipedia.org/wiki/Reactive_programming`](https://en.wikipedia.org/wiki/Reactive_programming)）近年来在
  Java 社区中越来越受欢迎。在 Java 世界中，我们有流行的响应式库，如 RxJava（[`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)）和
  Reactor（[`http://projectreactor.io/`](http://projectreactor.io/)）。响应式流（[`http://www.reactive-streams.org/`](http://www.reactive-streams.org/)）是一项旨在为具有非阻塞背压的异步流处理提供标准的倡议。响应式流规范中的核心接口已被添加到
  Java 9 的 `java.util.concurrent.Flow` 类中。


  ## 核心接口


  本节介绍 `Flow` 中的四个核心接口。


  ### Flow.Publisher<T>


  接口 `Flow.Publisher<T>` 表示供订阅者接收的项目的生产者。它只有一个方法 `void subscribe(Flow.Subscriber<?
  super T> subscriber)`，用于添加类型为 `Flow.Subscriber` 的订阅者。发布者可以发布三种类型的通知；参见表 7-1。


  表 7-1.


  `Publisher` 的通知


  | 通知 | 描述 |

  | --- | --- |

  | `onNext` | 已发布一个新项目。 |

  | `onComplete` | 将不再发布进一步的通知。 |

  | `onError` | 发布项目时遇到错误。 |


  `onComplete` 和 `onError` 都是终止通知，这意味着在 `onComplete` 或 `onError` 通知之后将不再发布任何通知。发布者不发布任何
  `onNext` 通知是合法的。发布者也可以发布无限数量的 `onNext` 通知。




  ### Flow.Subscriber<T>


  `Flow.Subscriber<T>` 接口表示由 `Flow.Publisher` 发布的通知的接收方。它包含四个方法，详见表 7-2。


  表 7-2.


  `Flow.Subscriber` 的方法


  | 方法 | 描述 |

  | --- | --- |

  | `void onNext(T item)` | 当接收到一个项目时调用 |

  | `void onComplete()` | 当接收到 `onComplete` 通知时调用 |

  | `void onError(Throwable throwable)` | 当接收到 `onError` 通知时调用 |

  | `void onSubscribe(Flow.Subscription subscription)` | 当订阅者成功订阅发布者时调用 |


  如果订阅者无法订阅发布者，则会调用 `onError()` 方法并传入错误信息。


  ### Flow.Subscription


  `Flow.Subscription` 接口表示当 `Flow.Subscriber` 成功订阅 `Flow.Publisher` 时的订阅关系。它作为参数传递给订阅者的
  `onSubscribe()` 方法。表 7-3 展示了 `Flow.Subscription` 的方法。


  表 7-3.


  `Flow.Subscription` 的方法


  | 方法 | 描述 |

  | --- | --- |

  | `void request(long n)` | 请求发布 `n` 个项目。 |

  | `void cancel()` | 取消订阅。 |


  订阅者只有在发出请求后才会接收项目。`request(long n)` 方法向发布者提出需求，表明订阅者已准备好处理 `n` 个项目。这一点很重要，因为它能确保订阅者不会被发布者压垮。如果发布者提前终止，订阅者接收到的项目数量可能少于请求的数量。调用
  `cancel()` 方法后，订阅者仍可能收到额外的通知，但订阅最终会被取消。


