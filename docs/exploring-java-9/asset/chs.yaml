  ## 解析器 API


  Nashorn 有一个标准的解析器 API，您可以使用它将 ECMAScript 源代码解析为抽象语法树（AST）。当您想要分析 ECMAScript 源代码时，此
  API 非常有用。使用此 API，您可以获取有关源代码的信息，但无法修改现有源代码。解析器 API 位于 `jdk.nashorn.api.tree` 包中。




  ### 基本解析


  在清单 11-8 的 `testSimpleParser()` 方法中，我使用 `Parser.create(String… options)` 方法创建了一个新的
  `Parser` 实例。参数 `options` 是一个用于配置解析器行为的选项列表。这里我使用 `--language=es6` 来启用 ECMAScript
  6 解析模式。`Parser` 拥有多个不同的 `parse()` 方法来解析源代码。所有这些 `parse()` 方法都接受参数，通过 `File`、`Reader`、`String`、`URL`、`Path`
  或 `jdk.nashorn.api.scripting.ScriptObjectMirror` 对象来指定源代码，并使用另一个 `DiagnosticListener`
  类型的参数来指定一个监听器以接收解析错误。这里我解析了 JavaScript 代码 `function a() {return ''hello'';}`，它只包含一个函数声明。接口
  `DiagnosticListener` 仅包含一个方法 `report(Diagnostic diagnostic)`。接口 `Diagnostic` 包含用于检索诊断信息的方法，包括种类、代码、消息、行号、列号和文件名；参见表
  11-1。这里我只是将数据打印到控制台。


  表 11-1.


  `Diagnostic` 的方法


  | 方法 | 描述 |

  | --- | --- |

  | `Diagnostic.Kind getKind()` | 返回此诊断的种类 |

  | `long getPosition()` | 返回指示问题位置的字符偏移量 |

  | `String getFileName()` | 返回源文件名 |

  | `long getLineNumber()` | 返回 `getPosition()` 返回的字符偏移量所在的行号 |

  | `long getColumnNumber()` | 返回 `getPosition()` 返回的字符偏移量所在的列号 |

  | `String getCode()` | 返回指示诊断类型的代码 |

  | `String getMessage()` | 返回此诊断的消息 |


  枚举 `Diagnostic.Kind` 表示不同种类的诊断。它具有以下值：`ERROR`、`WARNING`、`MANDATORY_WARNING`、`NOTE`
  和 `OTHER`。


  `parse()` 的返回值是接口 `CompilationUnitTree` 的一个实例，它表示解析后的抽象语法树。方法 `accept(TreeVisitor<R,D>
  visitor, D data)` 接受一个访问者，使用访问者模式来遍历树。Nashorn 提供了类 `SimpleTreeVisitorES5_1` 和 `SimpleTreeVisitorES6`，分别作为
  ECMAScript 5.1 和 6 的简单实现。清单 11-8 扩展了 `SimpleTreeVisitorES6` 类并重写了 `visitFunctionDeclaration()`
  方法，以验证源代码中有一个函数声明。


  ```

  public class ParserAPITest {

  @Test

  public void testSimpleParser() throws Exception {

  final Parser parser = Parser.create("--language=es6");

  final CompilationUnitTree tree =

  parser.parse(

  "test.js",

  "function a() {return ''hello'';}",

  System.out::println

  );

  final List functions = new ArrayList();

  tree.accept(new SimpleTreeVisitorES6() {

  @Override

  public Void visitFunctionDeclaration(

  final FunctionDeclarationTree node,

  final Void r) {

  final String name = node.getName().getName();

  assertEquals("a", name);

  functions.add(name);

  return null;

  }

  }, null);

  assertEquals(1, functions.size());

  }

  }

  清单 11-8.

