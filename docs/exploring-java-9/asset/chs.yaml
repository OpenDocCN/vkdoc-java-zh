  ## 小结


  将 Reactive Streams 规范引入 Java 9，是 Java 平台拥抱响应式编程原则的重要一步。在本章中，我们讨论了 `Flow` 中的核心接口以及内置的
  `SubmissionPublisher`。我还演示了它与流行的响应式库 RxJava 2 和 Reactor 的互操作性。在下一章中，我们将讨论变量句柄。


  '
- '# 8. 变量句柄


  变量句柄是对变量或变量族的引用，包括静态字段、非静态字段、数组元素或堆外数据结构的组件。变量句柄的概念与方法句柄类似。变量句柄使用 `java.lang.invoke.VarHandle`
  类表示。通过变量句柄，你可以对变量执行不同的操作，这些操作称为访问模式。所有支持的访问模式都在枚举 `VarHandle.AccessMode` 中定义。


  ## 创建变量句柄


  `VarHandle` 对象可以使用 `java.lang.invoke.MethodHandles.Lookup` 类中的工厂方法创建。首先，你可以使用 `MethodHandles.lookup()`
  方法获取 `MethodHandles.Lookup` 的实例，然后使用其方法创建 `VarHandle` 对象。


  ### findStaticVarHandle


  方法 `VarHandle findStaticVarHandle(Class<?> decl, String name, Class<?> type)` 返回一个
  `VarHandle`，用于访问在类型 `decl` 中声明的、给定类型的静态字段 `name`。在清单 8-1 中，我创建了一个 `VarHandle`，用于访问在类
  `HandleTarget` 中声明的静态 `int` 字段 `staticVar`。


  ```

  MethodHandles.lookup()

  .findStaticVarHandle(HandleTarget.class, "staticVar", int.class);

