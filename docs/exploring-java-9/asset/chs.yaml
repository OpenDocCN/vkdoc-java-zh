  #### 按位原子更新


  `getAndBitwiseAnd()`、`getAndBitwiseAndAcquire()`、`getAndBitwiseAndRelease()`、`getAndBitwiseOr()`、`getAndBitwiseOrAcquire()`、`getAndBitwiseOrRelease()`、`getAndBitwiseXor()`、`getAndBitwiseXorAcquire()`
  和 `getAndBitwiseXorRelease()` 方法以原子方式将变量的值设置为变量当前值与掩码值进行按位 `AND`/`OR`/`XOR` 运算的结果，并返回变量先前的值。表
