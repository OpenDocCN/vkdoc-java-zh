  ## Thread.onSpinWait


  当您使用线程执行任务时，通常需要任务等待某个条件满足后才能继续。通常的做法是使用一个 `volatile` 变量作为标志位。该标志位由另一个线程设置，以停止等待。在
  Java 9 之前，您使用一个空循环来等待条件。Java 9 中 `Thread` 类新增的静态方法 `onSpinWait()` 可以使等待更高效。


  清单 10-7 展示了 `Thread.onSpinWait()` 的一个示例。`NormalTask` 和 `SpinWaitTask` 类都使用 `volatile`
  布尔变量 `canStart` 作为标志位。该标志位通过 `start()` 方法设置为 `true`。这两个类的区别在于 `SpinWaitTask` 在循环中使用了
  `Thread.onSpinWait()`。这里我使用另一个线程在三秒后调用 `start()` 方法来停止等待。


  ```

  public class ThreadOnSpinWait {

  public static void main(final String[] args) throws InterruptedException {

  final NormalTask task1 = new NormalTask();

  final SpinWaitTask task2 = new SpinWaitTask();

  final Thread thread1 = new Thread(task1);

  thread1.start();

  final Thread thread2 = new Thread(task2);

  thread2.start();

  new Thread(() -> {

  try {

  Thread.sleep(3000);

  } catch (final InterruptedException e) {

  e.printStackTrace();

  } finally {

  task1.start();

  task2.start();

  }

  }).start();

  thread1.join();

  thread2.join();

  }

  private abstract static class Task implements Runnable {

  volatile boolean canStart;

  void start() {

  this.canStart = true;

  }

  }

  private static class NormalTask extends Task {

  @Override

  public void run() {

  while (!this.canStart) {

  }

  System.out.println("Done!");

  }

  }

  private static class SpinWaitTask extends Task {

  @Override

  public void run() {

  while (!this.canStart) {

  Thread.onSpinWait();

  }

  System.out.println("Done!");

  }

  }

  }

  清单 10-7.

  Thread.onSpinWait() 示例

  ```


