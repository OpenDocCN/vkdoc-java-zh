- "# 15. JVM\n\n本章涵盖了 Java 9 中与 JVM 相关的更改。\n\n## 统一日志记录\n\n在 Java 9 中，JVM 为所有组件提供了一个通用的日志记录系统。新的命令行选项\
  \ `-Xlog` 控制 JVM 所有组件的日志记录。新的统一日志记录系统支持标签、级别、修饰和输出。\n\n\n\n### 标签、级别、装饰与输出\n\n标签用于对日志消息进行分类。一条日志消息可以与一个包含一个或多个标签的标签集相关联。JVM\
  \ 预定义了一组标签，例如 `gc`、`system`、`thread`。每条日志消息都有一个与之关联的日志级别，就像使用 Java 日志框架记录的消息一样。可用的级别有\
  \ `error`、`warning`、`info`、`debug`、`trace` 和 `develop`。`develop` 仅在非产品构建中可用。日志消息会附带关于消息的装饰信息。以下是可能的装饰列表：\n\
  \n*   `time`：ISO-8601 格式的当前时间和日期\n*   `utctime`：ISO-8601 格式的当前 UTC 时间和日期\n*   `uptime`：自\
  \ JVM 启动以来的时间（秒和毫秒）\n*   `timemillis`：与 `System.currentTimeMillis()` 生成的值相同\n* \
  \  `uptimemillis`：自 JVM 启动以来的毫秒数\n*   `timenanos`：与 `System.nanoTime()` 生成的值相同\n\
  *   `uptimenanos`：自 JVM 启动以来的纳秒数\n*   `hostname`：主机名\n*   `pid`：进程标识符\n*   `tid`：线程标识符\n\
  *   `level`：日志级别\n*   `tags`：标签集\n\n输出是日志消息的目的地。支持三种类型的输出：\n\n*   `stdout`：输出到 `stdout`。\n\
  *   `stderr`：输出到 `stderr`。\n*   文本文件：输出到文本文件。\n\n文本文件输出支持基于大小和最大文件数量的文件轮转。\n\n对于每个输出，你可以配置一个日志级别来控制写入该输出的日志消息数量。例如，如果输出的日志级别设置为\
  \ `info`，则只会写入级别为 `error`、`warning` 和 `info` 的消息。这与在 Java 中使用其他日志框架相同。日志级别也可以设置为\
  \ `off` 以禁用日志记录。你还可以配置输出使用的装饰器集合。装饰内容将被添加到日志消息之前。\n\n### 日志配置\n\nJVM 日志系统的配置通过 `-Xlog`\
  \ 选项完成。该选项的语法有点复杂。理解语法的最佳方式是运行命令 `java -Xlog:help`；然后帮助信息将打印到控制台。该选项包含四个部分，以冒号（`:`）分隔，格式为\
  \ `-Xlog[:[what][:[output][:[decorators][:output-options]]]]`。\n\n第一部分 `what` 选择要输出的日志消息。其值是一个逗号分隔的选择器列表。每个选择器包含一个标签集和一个可选的日志级别。标签集中的标签用加号（`+`）分隔。标签集和日志级别用等号（`=`）分隔。通配符（`*`）可用于匹配任意数量的标签。所有可用标签都列在\
  \ `-Xlog:help` 的输出中。默认日志级别是 `info`。以下是第一部分的一些示例：\n\n*   `gc`：选择标签 `gc`，级别为 `info`\n\
  *   `gc+heap=debug`：选择标签 `gc` 和 `heap`，级别为 `debug`\n*   `gc=debug,heap=warning`：选择标签\
  \ `gc`，级别为 `debug`，以及标签 `heap`，级别为 `warning`\n*   `*`：选择所有标签，级别为 `info`\n*   `*=debug`：选择所有标签，级别为\
  \ `debug`\n\n如果一个标签集包含多个标签，则只有当一条日志消息恰好与该标签集中的所有标签关联时，才能被选中。当有多个选择器时，选中的日志消息必须匹配所有选择器。\n\
  \n第二部分 `output` 配置日志消息的输出。以下是一些可能的值：\n\n*   `stdout`\n*   `stderr`\n*   `file=<filename>`：支持在文件名中使用\
  \ `%p` 和/或 `%t`，分别表示 JVM 的 PID 和启动时间戳。\n\n第三部分 `decorators` 是一个逗号分隔的装饰器列表。你可以使用\
  \ `none` 来禁用装饰。装饰器的默认值是 `\"uptime,level,tags\"`。\n\n最后一部分 `output-options` 是输出的额外逗号分隔选项。每个选项是一个由等号（`=`）分隔的名称-值对。支持两个选项：\n\
  \n*   `filecount`：滚动日志文件的最大数量\n*   `filesize`：每个日志文件的最大大小\n\n通过组合这四个部分，你可以配置日志系统的行为。以下是一些示例：\n\
  \n*   `-Xlog`：等同于 `-Xlog:all=info:stdout:uptime,levels,tags`。\n*   `-Xlog:gc,class`：记录与标签\
  \ `gc` 或 `class` 关联的消息，使用级别 `info`，输出到 `stdout`，使用默认装饰。同时与 `gc` 和 `class` 关联的消息不会被记录。\n\
  *   `-Xlog:gc+class`：记录同时与标签 `gc` 和 `class` 关联的消息，使用级别 `info`，输出到 `stdout`，使用默认装饰。仅与两个标签之一关联的消息不会被记录。\n\
  *   `-Xlog:gc=debug:file=gc_%p.txt`：记录与标签 `gc` 关联的消息，使用级别 `debug`，输出到文件。文件名中包含 JVM\
  \ 的 PID。\n*   `-Xlog:gc=debug:file=gc.txt:time:filecount=5,filesize=1m`：记录与标签 `gc`\
  \ 关联的消息，使用级别 `debug`，输出到文件 `gc.txt`。滚动文件的最大数量为 `5`，每个文件的最大大小为 `1M`。\n\n你也可以使用 `-Xlog:disable`\
  \ 来禁用所有日志记录，包括错误和警告。\n\n借助新的统一日志系统，GC 日志记录已更新为利用同一系统。所有与 GC 相关的日志消息都与标签 `gc` 关联。应使用\
  \ `-Xlog:gc` 来替代 `-XX:+PrintGC` 和 `-XX:+PrintGCDetails`。\n\n### 诊断命令 VM.log\n\n\
  日志配置可以在运行时通过 `jcmd` 使用诊断命令 `VM.log` 进行更新。`-Xlog` 支持的所有选项都可以使用此命令动态指定。由于诊断命令会自动暴露为\
  \ MBeans，你也可以使用 JMX 在运行时更改日志配置。\n\n要在运行时配置日志记录，首先使用 `jcmd` 列出所有 Java 进程并找到要配置的应用程序的\
  \ PID。你也可以使用主类名来选择要检查的进程。以下命令中的选项 `list` 用于列出当前的日志配置。`31683` 是 PID。\n\n```\n$ jcmd\
  \ 31683 VM.log list\n```\n\n你可以使用键值对来指定前面提到的四个部分的值：`what`、`output`、`decorators`\
  \ 和 `output-options`。使用以下命令，你可以将日志配置更新为类似于 `-Xlog:all=log:file=all.txt:time,level,tags`。\n\
  \n```\n$ jcmd 31683 VM.log what=all=info output=all.txt decorators=time,level,tags\n\
  ```\n\n要禁用日志记录，可以使用以下命令：\n\n```\n$ jcmd 31683 VM.log disable\n```\n\n你也可以使用此命令强制轮转日志文件：\n\
  \n```\n$ jcmd 31683 VM.log rotate\n```\n\n\n\n## 移除 GC 组合\n\nGC 调优是 JVM 性能调优中的一项重要任务。JVM\
  \ 提供了多种使用不同 GC 算法的 GC 组合。其中一些 GC 组合在 Java 8 中已被弃用。这些被弃用的 GC 组合已在 Java 9 中被移除，详见表\
  \ 15-1。如果使用了这些 GC 组合，JVM 将无法启动。由于 JVM 在 Java 8 中已针对这些 GC 组合打印了警告信息，现有应用程序应已迁移至其他\
  \ GC 组合。如果你的应用程序仍在使用这些被弃用的 GC 组合，则应在迁移后执行全面的性能测试。\n\n表 15-1.\n\n已移除的 GC 组合\n\n|\
  \ GC 配置 | 标志 | 推荐配置 |\n| --- | --- | --- |\n| DefNew + CMS | `-XX:-UseParNewGC`\
  \ `-XX:+UseConcMarkSweepGC` | ParNew + CMS |\n| ParNew + SerialOld | `-XX:+UseParNewGC`\
  \ | ParallelScavenge + SerialOld |\n| ParNew + iCMS | `-Xincgc` | CMS |\n| ParNew\
  \ + iCMS | `-XX:+CMSIncrementalMode` `-XX:+UseConcMarkSweepGC` | CMS |\n| DefNew\
  \ + iCMS | `-XX:+CMSIncrementalMode` `-XX:+UseConcMarkSweepGC` `-XX:-UseParNewGC`\
  \ | CMS |\n| CMS foreground | `-XX:+UseCMSCompactAtFullCollection` | G1 或 CMS |\n\
  | CMS foreground | `-XX:+CMSFullGCsBeforeCompaction` | G1 或 CMS |\n| CMS foreground\
  \ | `-XX:+UseCMSCollectionPassing` | G1 或 CMS |\n\n## 将 G1 设为默认垃圾回收器\n\n在 Java 9\
  \ 中，G1 成为 32 位和 64 位服务器配置上的默认垃圾回收器。作为一款低停顿收集器，G1 应能提供比吞吐量导向型收集器（如 Java 8 中的默认 GC——Parallel\
  \ GC）更优的整体性能。\n\n## 弃用并发标记清除 (CMS) 垃圾回收器\n\n既然 G1 已成为默认垃圾回收器，并发标记清除 (CMS) 垃圾回收器已被弃用，并且其支持将在未来的主要版本中移除。当使用命令行选项\
  \ `-XX:+UseConcMarkSweepGC` 时，JVM 会发出警告信息。\n\n## 移除启动时 JRE 版本选择\n\nJDK 5 引入了多 JRE\
  \ (mJRE) 功能，允许开发者指定启动应用程序所需的 JRE 版本或版本范围。版本要求可以在应用程序 JAR 文件的清单条目 `JRE-Version` 中指定，也可以作为\
  \ `java` 命令的命令行选项 `-version:` 指定。如果当前 JRE 的版本不满足要求，它会尝试搜索满足要求的版本并启动该版本。\n\n这个 mJRE\
  \ 功能听起来很有用，但在实践中很少使用。该功能已在 Java 9 中被移除。`java` 命令的命令行选项 `-version:` 也已被移除。如果在 JAR\
  \ 文件中找到清单条目 `JRE-Version`，启动器会发出警告信息并继续执行。\n\n## 更多诊断命令\n\nJava 9 中新增了更多可与 `jcmd`\
  \ 一起运行的诊断命令。你可以使用 jcmd 的 `help` 选项列出所有可用的诊断命令，请参见以下代码。`6239` 是进程 ID。\n\n```\n$ jcmd\
  \ 6239 help\n```\n\n清单 15-1 展示了 Java 8 中可用的诊断命令列表。\n\n```\nJFR.stop\nJFR.start\n\
  JFR.dump\nJFR.check\nVM.native_memory\nVM.check_commercial_features\nVM.unlock_commercial_features\n\
  ManagementAgent.stop\nManagementAgent.start_local\nManagementAgent.start\nGC.rotate_log\n\
  Thread.print\nGC.class_stats\nGC.class_histogram\nGC.heap_dump\nGC.run_finalization\n\
  GC.run\nVM.uptime\nVM.flags\nVM.system_properties\nVM.command_line\nVM.version\n\
  清单 15-1.\nJava 8 中的诊断命令\n```\n\n清单 15-2 展示了 Java 9 中可用的诊断命令列表。\n\n```\nJFR.configure\n\
  JFR.stop\nJFR.start\nJFR.dump\nJFR.check\nVM.log\nVM.native_memory\nManagementAgent.status\n\
  ManagementAgent.stop\nManagementAgent.start_local\nManagementAgent.start\nCompiler.directives_clear\n\
  Compiler.directives_remove\nCompiler.directives_add\nCompiler.directives_print\n\
  VM.print_touched_methods\nCompiler.codecache\nCompiler.codelist\nCompiler.queue\n\
  VM.classloader_stats\nThread.print\nJVMTI.data_dump\nJVMTI.agent_load\nVM.stringtable\n\
