  GC.finalizer_info\nGC.heap_info\nGC.run_finalization\nGC.run\nVM.info\nVM.uptime\n\
  VM.dynlibs\nVM.set_flag\nVM.flags\nVM.system_properties\nVM.command_line\nVM.version\n\
  清单 15-2.\nJava 9 中的诊断命令\n```\n\n当你比较清单 15-1 和清单 15-2 中的列表时，可以看到新增了许多诊断命令。对于每个命令，你可以使用以下\
  \ `help` 命令查看帮助信息。\n\n```\n$ jcmd 6239 help VM.info\n```\n\n以下是这些新命令的简要说明：\n\n*\
  \   `JFR.configure`：配置 Java Flight Recorder\n*   `VM.log`：配置统一日志系统\n*   `VM.classloader_stats`：显示所有类加载器的统计信息\n\
  *   `VM.stringtable`：显示 JVM 的 StringTable 统计信息\n*   `VM.symboltable`：显示 JVM 的 SymbolTable\
  \ 统计信息\n*   `VM.print_touched_methods`：显示在此 JVM 生命周期内所有曾被触及的方法；需要选项 `-XX:+LogTouchedMethods`\n\
  *   `VM.class_hierarchy`：显示所有已加载类的层次结构\n*   `VM.info`：显示 JVM 环境和状态信息\n*   `VM.dynlibs`：显示已加载的动态库\n\
  *   `VM.set_flag`：设置 VM 标志\n*   `ManagementAgent.status`：显示管理代理的状态\n*   `Compiler.directives-`*：管理编译器指令\n\
  *   `Compiler.codecache`：显示编译器代码缓存的布局和边界\n*   `Compiler.codelist`：显示代码缓存中所有存活的已编译方法\n\
  *   `Compiler.queue`：显示排队等待编译的方法\n*   `JVMTI.data_dump`：通知 JVM 执行数据转储\n*   `JVMTI.agent_load`：加载\
  \ JVMTI 原生代理\n*   `GC.heap_info`：显示 Java 堆信息\n*   `GC.finalizer_info`：显示 Java 终结队列的信息。\n\
  \n## 移除 JVM TI hprof 代理\n\n`hprof` 代理是作为 JVM 工具接口的示例项目添加的，并非旨在成为生产工具。该代理已在 Java\
  \ 9 中被移除。如果你想使用此代理提供的功能，应切换到其他 Java 内置工具或第三方解决方案，详见表 15-2。\n\n表 15-2.\n\n`hprof`\
  \ 代理的替代方案\n\n| 功能 | 替代工具 |\n| --- | --- |\n| 堆转储 | 诊断命令 `GC.heap_dump` 或 `jmap -dump`\
  \ |\n| 分配分析器 | VisualVM |\n| CPU 分析器 | VisualVM 或 Flight Recorder |\n\n### 移除 jhat\
  \ 工具\n\n`jhat` 工具在 JDK 6 中引入，是一个用于堆可视化和分析的实验性且不受支持的工具。该工具已在 JDK 9 中被移除。\n\n### 移除演示和示例\n\
  \n虽然你可能没有注意到，但 JDK 实际上附带了一些演示和示例。然而，这些演示和示例已经过时且无人维护，因此已在 JDK 9 中被移除。\n\n\n\n##\
  \ Javadoc\n\n`javadoc` 工具在 JDK 9 中支持生成 HTML5 标记。当使用 `-html5` 选项时，`javadoc` 会生成 HTML5\
  \ 标记。HTML4 仍然是默认的输出类型，但 HTML5 将在 JDK 10 中成为默认选项。生成的 HTML5 标记使用了语义化的结构性 HTML5 元素，包括\
  \ `header`、`footer` 和 `nav`。它还实现了用于无障碍访问的 WAI-ARIA 标准。\n\n`javadoc` 生成的文档中新增了一个搜索框。用户可以使用它来搜索程序元素以及被索引的术语和短语。模块、包、类型和成员的名称都会被索引并可搜索。你可以使用新的标签\
  \ `@index` 将某个术语或短语标记为可搜索。\n\n生成的文档已升级，包含了模块信息。对于每个模块，文档会显示其模块依赖关系和导出的包。\n\n`javadoc`\
  \ 工具现在支持为多个模块生成文档。你可以使用 `--module-source-path` 选项提供模块的源代码，并使用 `--module` 选项指定要处理的模块。第三方库则使用\
  \ `-p` 选项指定。在模块源目录中，每个子目录包含一个模块的源代码。子目录名称必须与模块名称一致；示例应用程序的源代码请参见图 15-1。模块源路径必须采用这种目录结构，否则\
