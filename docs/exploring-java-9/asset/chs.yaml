  ### 其他功能


  这些其他方法提供了不同的功能。


  *   `void openHelpViewer()`：打开原生帮助查看器应用程序

  *   `void setDefaultMenuBar(JMenuBar menuBar)`：当没有框架处于活动状态时，设置默认菜单栏

  *   `void browseFileDirectory(File file)`：打开包含该文件的文件夹，并在默认系统文件管理器中选中它

  *   `boolean moveToTrash(File file)`：将文件移动到废纸篓


  ## 多分辨率图像


  如果你开发过 iOS 应用程序，你应该对多分辨率图像很熟悉。iOS 应用程序中的图像资源可以包含多个不同分辨率的图像。这些图像具有相同的基本名称，但包含诸如 `@1x`、`@2x`
  或 `@3x` 之类的后缀。系统会根据当前的显示 DPI 指标选择最合适的图像来显示。Java 9 为 AWT 图像 API 添加了相同的功能。


  新接口 `java.awt.image.MultiResolutionImage` 表示支持多种分辨率的图像。`MultiResolutionImage` 有两个方法：方法
  `Image getResolutionVariant(double destImageWidth, double destImageHeight)` 获取应在给定大小下渲染的特定图像；方法
  `List<Image> getResolutionVariants()` 获取所有分辨率变体的列表。类 `BaseMultiResolutionImage`
  是 `MultiResolutionImage` 的一个简单实现。`BaseMultiResolutionImage` 由图像数组构造而成。其 `getResolutionVariant()`
  方法的实现只是遍历图像数组，并返回第一个足够大以满足渲染请求的图像。


  大多数情况下，你不需要直接使用 `BaseMultiResolutionImage`。如果平台支持分辨率变体的命名约定，则从方法 `Toolkit.getImage(String
  name)` 和 `Toolkit.getImage(URL url)` 获取的图像将实现 `MultiResolutionImage` 接口。


  清单 14-3 展示了一个使用多分辨率图像的示例。我在资源目录 `/images` 中有两个图像 `flower.png` 和 `flower@2x.png`。方法
  `Toolkit.getImage(URL url)` 用于使用资源 URL 加载图像。


  ```

  public class MultiResolutionImageDemo {

  private static class ImageCanvas extends JComponent {

  private final String name;

  public ImageCanvas(final String name) {

  this.name = name;

  }

  @Override

  public void paint(final Graphics g) {

  final Image image = Toolkit.getDefaultToolkit()

  .getImage(

  MultiResolutionImageDemo.class

  .getResource(String.format("/images/%s", this.name)));

  g.drawImage(image, 10, 10, this);

  g.dispose();

  }

  }

  public static void main(final String[] args) {

  final JFrame frame = new JFrame();

  frame.setTitle("Multi-resolution images");

  frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

  frame.setLayout(new BorderLayout());

  final ImageCanvas canvas = new ImageCanvas("flower.png");

  frame.add("Center", canvas);

  frame.setSize(360, 300);

  frame.setVisible(true);

  }

  }

  清单 14-3.

  多分辨率图像

  ```


  在 macOS 上运行时，你可以看到实际加载的图像是 `flower@2x.png`。如图 14-3 所示，图像中的“2x”确认了它是 `flower@2x.png`。


