- '# 11. Nashorn


  Nashorn ( [`http://openjdk.java.net/projects/nashorn/`](http://openjdk.java.net/projects/nashorn/)
  ) 是 Java 8 中引入的 JavaScript 引擎，用于取代基于 Mozilla Rhino 的旧引擎。在 Java 8 中，Nashorn 基于 ECMAScript
  5。Java 9 的 Nashorn 引擎已经实现了 ECMAScript 6 的一些新特性。与 Nashorn 相关的 API 位于 `jdk.scripting.nashorn`
  模块中。


  ## 获取 Nashorn 引擎


  您可以使用 JSR 223 ( [`https://www.jcp.org/en/jsr/detail?id=223`](https://www.jcp.org/en/jsr/detail?id=223)
  ) `ScriptEngine` 来获取 Nashorn 引擎；参见清单 11-1。表达式 `new ScriptEngineManager().getEngineByName("Nashorn")`
  是获取 Nashorn `ScriptEngine` 实例的标准方式。但是，创建的 `ScriptEngine` 仅适用于 ECMAScript 5。您需要传递额外的参数
  `--language=es6` 来启用 ECMAScript 6 特性。清单 11-1 向您展示了如何直接使用 `NashornScriptEngineFactory`
  类来创建用于 ECMAScript 6 的 `ScriptEngine`。


  ```

  public class NashornTest {

  private final ScriptEngine es5Engine =

  new ScriptEngineManager().getEngineByName("Nashorn");

  private final ScriptEngine es6Engine =

  new NashornScriptEngineFactory().getScriptEngine("--language=es6");

  @Test

  public void testSimpleEval() throws Exception {

  assertEquals(2, es5Engine.eval("1 + 1"));

  }

  }

  清单 11-1.

  创建 Nashorn ScriptEngine

  ```


  您也可以使用 `jjs` 工具来尝试 ECMAScript 6 的新特性。


  ```

  $ jjs --language=es6

  ```


  ## ECMAScript 6 特性


  以下各节展示了 Java 9 中 Nashorn 所支持的 ECMAScript 6 特性。


  ### 模板字符串


