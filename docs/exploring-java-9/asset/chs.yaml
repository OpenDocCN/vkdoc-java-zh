- '# 10. 并发


  本章总结了 Java 9 中与并发相关的更改。


  ## CompletableFuture


  在 Java 9 中，`java.util.concurrent.CompletableFuture` 新增了几个方法。




  ### 异步


  `CompletableFuture<T> completeAsync(Supplier<? extends T> supplier, Executor executor)`
  和 `CompletableFuture<T> completeAsync(Supplier<? extends T> supplier)` 方法通过使用异步任务调用
  `Supplier` 来获取结果，从而完成 `CompletableFuture`。该任务使用提供的执行器或默认执行器执行。清单 10-1 展示了如何使用 `completeAsync()`
  的示例。


  ```

  final Long v1 = new CompletableFuture().completeAsync(() -> 1L).join();

  final Long v2 = new CompletableFuture().completeAsync(() -> 1L,

  Executors.newSingleThreadExecutor()).join();

  System.out.printf("%s %s%n", v1, v2);

  清单 10-1.

  completeAsync() 示例

  ```


  ### 超时


  方法 `CompletableFuture<T> orTimeout(long timeout, TimeUnit unit)` 如果在给定超时时间之前未完成，则会以
  `TimeoutException` 异常完成 `CompletableFuture`。在清单 10-2 中，由于 `CompletableFuture` 从未完成，代码会抛出一个以
  `TimeoutException` 为原因的 `ExecutionException`。


  ```

  try {

  new CompletableFuture().orTimeout(3, TimeUnit.SECONDS).get();

  } catch (final InterruptedException | ExecutionException e) {

  e.printStackTrace();

  }

  清单 10-2.

  orTimeout() 示例

  ```


  方法 `CompletableFuture<T> completeOnTimeout(T value, long timeout, TimeUnit unit)`
  如果在给定超时时间之前未完成，则会使用给定的值完成 `CompletableFuture`。在清单 10-3 中，`CompletableFuture` 在三秒超时后以值
  `1` 完成。


  ```

  try {

  final Long value = new CompletableFuture()

  .completeOnTimeout(1L, 3, TimeUnit.SECONDS).get();

  System.out.println(value);

  } catch (final InterruptedException | ExecutionException e) {

  e.printStackTrace();

  }

  清单 10-3.

  completeOnTimeout() 示例

  ```


  ### 工具方法


  表 10-1 展示了 Java 9 中新增的 `CompletableFuture` 工具方法。


  表 10-1.


  `CompletableFuture` 的工具方法


  | 方法 | 描述 |

  | --- | --- |

  | `<U> CompletableFuture<U> newIncompleteFuture()` | 返回一个新的未完成的 `CompletableFuture`
  |

  | `Executor defaultExecutor()` | 返回用于异步方法的默认 `Executor` |

  | `CompletableFuture<T> copy()` | 返回一个新的 `CompletableFuture`，该对象正常完成时与此 `CompletableFuture`
  的值相同，或者异常完成时以此 `CompletableFuture` 抛出的异常为原因 |

  | `CompletionStage<T> minimalCompletionStage()` | 返回一个新的 `CompletionStage`，该对象只能由此
  `CompletableFuture` 完成 |

  | `Executor delayedExecutor(long delay, TimeUnit unit, Executor executor)` | 返回一个新的
  `Executor`，该对象在给定延迟后将任务提交给给定的执行器 |

  | `Executor delayedExecutor(long delay, TimeUnit unit)` | 类似于前一个方法，但使用默认执行器 |

  | `<U> CompletionStage<U> completedStage(U value)` | 返回一个新的 `CompletionStage`，该对象以给定值完成
  |

  | `<U> CompletionStage<U> failedStage(Throwable ex)` | 返回一个新的 `CompletionStage`，该对象以给定异常异常完成
  |

  | `<U> CompletableFuture<U> failedFuture(Throwable ex)` | 返回一个新的 `CompletableFuture`，该对象以给定异常异常完成
  |


  ### TimeUnit 和 ChronoUnit


  两个静态方法 `ChronoUnit toChronoUnit()` 和 `TimeUnit of(ChronoUnit chronoUnit)` 被添加到 `java.util.concurrent.TimeUnit`
  类中，用于在 `TimeUnit` 和 `java.time.temporal.ChronoUnit` 之间进行转换；参见清单 10-4。


