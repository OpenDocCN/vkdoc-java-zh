  public class TimeUnitTest {

  @Test

  public void testChronoUnit() throws Exception {

  assertEquals(TimeUnit.MINUTES, TimeUnit.of(ChronoUnit.MINUTES));

  assertEquals(ChronoUnit.SECONDS, TimeUnit.SECONDS.toChronoUnit());

  }

  }

