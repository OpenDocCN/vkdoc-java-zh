  ## SubmissionPublisher


  虽然这四个核心接口易于理解，但要正确实现它们却并不容易。不过，你实际上无需关心具体实现，只需依赖第三方库即可。


  `java.util.concurrent.SubmissionPublisher<T>` 类是 `Flow.Publisher` 的一个实现，它会异步地将提交的项目发布给订阅者，直到被关闭。`SubmissionPublisher`
  的项目并非由发布者生成，而是由客户端代码提交的。`SubmissionPublisher` 可以充当一个桥梁，客户端代码可通过它与订阅者通信。


  `SubmissionPublisher` 使用 `Executor` 将项目发送给订阅者。`Executor` 可以在构造函数中提供，否则默认使用 `ForkJoinPool.commonPool()`。当任何订阅者方法抛出错误时，你可以在订阅被取消之前提供一个处理器来处理该异常。`SubmissionPublisher`
  有三个构造函数。


  *   无参构造函数使用默认的 `Executor`，且没有异常处理器。

  *   `SubmissionPublisher(Executor executor, int maxBufferCapacity)` 配置 `Executor`
  和缓冲区的最大大小。缓冲区包含已提交但尚未被订阅者消费的项目。每个订阅者都有自己独立的缓冲区。

  *   `SubmissionPublisher(Executor executor, int maxBufferCapacity, BiConsumer<?
  super Flow.Subscriber<? super T>,? super Throwable> handler)` 配置 `Executor`、缓冲区的最大大小以及异常处理器。


  注意


  最大缓冲区大小的实际值可能会向上取整到最接近的 2 的幂次，或者受限于实现支持的最大值。例如，如果向构造函数传递 `10` 作为 `maxBufferCapacity`
  的值，实际使用的值将是 `16`。我们可以使用 `getMaxBufferCapacity()` 方法来获取实际值。


  由于订阅者消费已发布项目的速度可能不同，因此某些项目可能尚未被所有订阅者消费。`estimateMaximumLag()` 方法返回一个估计值，表示已发布但尚未被所有订阅者消费的最大项目数量。另一方面，项目发布的速度也可能跟不上订阅者的消费速度。在这种情况下，`estimateMinimumDemand()`
  方法返回一个估计值，表示已请求但尚未发布的最小项目数量。


  要向 `SubmissionPublisher` 提交项目，可以使用 `submit()` 和 `offer()` 方法。`submit(T item)` 方法通过调用所有订阅者的
  `onNext()` 方法，异步地将项目发布给所有订阅者。当任何订阅者没有可用资源来处理时，`submit()` 会不可中断地阻塞。当你希望确保项目成功发布给所有订阅者时，应使用
  `submit()`。然而，其阻塞行为可能会带来性能损失。一个不堪重负的订阅者可能会拖慢其他订阅者的处理速度。`submit()` 的返回值是最大延迟的估计值，与
  `estimateMaximumLag()` 方法的返回值相同。




  方法 `int offer(T item, BiPredicate<Flow.Subscriber<? super T>,? super T> onDrop)`
  和 `int offer(T item, long timeout, TimeUnit unit, BiPredicate<Flow.Subscriber<?
  super T>,? super T> onDrop)` 同样会将项目发布给所有订阅者，但当某个或多个订阅者资源不可用时，它们允许丢弃项目。当项目被丢弃时，提供的处理器
  `onDrop` 会被调用，并传入当前订阅者和被丢弃的项目。该处理器的类型是 `BiPredicate`，因此它返回一个布尔值。如果处理器的返回值为 `true`，发布者将尝试重新发布该项目。`offer()`
  的返回值表示发布的结果。如果该值为负数，其绝对值表示丢弃的数量；否则，它表示最大延迟的估计值，含义与 `submit()` 返回的值相同。如果在调用 `offer()`
  时添加了超时时间，则当任何订阅者都没有可用资源时，它会阻塞，并持续阻塞直到指定的超时时间，或直到调用线程被中断。在这两种情况下，都会调用 `onDrop` 处理器。


  表 7-4 展示了 `SubmissionPublisher` 的其他重要方法。


  表 7-4.


  `SubmissionPublisher` 的其他方法


  | 方法 | 描述 |

  | --- | --- |

  | `CompletableFuture<Void> consume(Consumer<? super T> consumer)` | 使用给定的消费者处理所有已发布的项目。返回值是一个
  `CompletableFuture<Void>`，当发布者发出 `onComplete` 信号时正常完成，或在发生任何错误时异常完成。 |

  | `void close()` | 关闭发布者，并向所有订阅者发出 `onComplete` 信号。 |

  | `void closeExceptionally(Throwable error)` | 关闭发布者，并向所有订阅者发出带有给定错误的 `onError`
  信号。 |

  | `boolean isClosed()` | 检查发布者是否已关闭。 |

  | `List<Flow.Subscriber<? super T>> getSubscribers()` | 返回所有订阅者的列表。 |

  | `int getNumberOfSubscribers()` | 返回订阅者的数量。 |

  | `boolean hasSubscribers()` | 检查发布者是否有任何订阅者。 |

  | `boolean isSubscribed(Flow.Subscriber<? super T> subscriber)` | 检查给定的订阅者是否已订阅。
  |


  现在你可以使用 `SubmissionPublisher` 来发布一些数据。在清单 7-2 中，`PeriodicPublisher` 类定期发布给定数量的项目，并在所有项目发布完毕后关闭。构造函数参数
  `Consumer<PeriodicPublisher<T>> action` 用于发布项目。方法 `waitForCompletion()` 可用于等待所有项目发布完毕。


  ```

  public class PeriodicPublisher extends SubmissionPublisher {

  private final ScheduledExecutorService scheduler;

  private final ScheduledFuture periodicTask;

  private final AtomicInteger count = new AtomicInteger(0);

  private final CountDownLatch closeLatch = new CountDownLatch(1);

  public PeriodicPublisher(final Consumer> action,

  final int maxBufferCapacity,

  final int total,

  final long period,

  final TimeUnit timeUnit) {

  super(ForkJoinPool.commonPool(),

  maxBufferCapacity,

  ((subscriber, throwable) ->

  System.out.printf("Publish error for %s: %s",

  subscriber, throwable)));

  this.scheduler = new ScheduledThreadPoolExecutor(1);

  this.periodicTask = this.scheduler.scheduleAtFixedRate(

  () -> {

  action.accept(this);

  final int value = this.count.incrementAndGet();

  if (value >= total) {

  this.doClose();

  }

  }, 0, period, timeUnit);

  }

  @Override

  public void close() {

  this.periodicTask.cancel(false);

  this.scheduler.shutdown();

  super.close();

  }

  public void waitForCompletion() {

  try {

  this.closeLatch.await();

  } catch (final InterruptedException e) {

  this.close();

  }

  }

  private void doClose() {

  try {

  this.close();

  } finally {

  this.closeLatch.countDown();

  }

  }

  }

  清单 7-2.

  PeriodicPublisher

  ```


  你可以使用 `PeriodicPublisher` 创建一个随机数生成器；参见清单 7-3。在构造函数中传入的操作是 `publisher.submit(ThreadLocalRandom.current().nextLong()`，它使用
  `submit()` 方法发布一个随机数。


  ```

  public class RandomNumberGenerator extends PeriodicPublisher {

  public RandomNumberGenerator() {

  super((publisher) ->

  publisher.submit(ThreadLocalRandom.current().nextLong()),

  Flow.defaultBufferSize(),

  10,

  1,

  TimeUnit.SECONDS);

  }

  public static void main(final String[] args) {

  final RandomNumberGenerator generator = new RandomNumberGenerator();

  generator.subscribe(new Flow.Subscriber() {

  @Override

  public void onSubscribe(final Flow.Subscription subscription) {

  subscription.request(Long.MAX_VALUE);

  }

  @Override

  public void onNext(final Long item) {

  System.out.printf("Received: %s%n", item);

  }

  @Override

  public void onError(final Throwable throwable) {

  throwable.printStackTrace();

  }

  @Override

  public void onComplete() {

  System.out.println("Completed!");

  }

  });

  generator.waitForCompletion();

  }

  }

