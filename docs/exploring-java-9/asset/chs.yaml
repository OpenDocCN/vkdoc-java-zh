  ## TIFF 图像格式


  Java 9 增加了对 TIFF 图像格式的支持。Image I/O 框架现在为 TIFF 格式添加了编解码器。


  ## 弃用 Applet API


  Applet API 在 Java 9 中已被弃用，因为浏览器供应商移除了对 Java 浏览器插件的支持。注解 `@Deprecated(since="9")`
  被添加到以下 Applet 相关的类中：


  *   `java.applet.AppletStub`

  *   `java.applet.Applet`

  *   `java.applet.AudioClip`

  *   `java.applet.AppletContext`

  *   `javax.swing.JApplet`


  `appletviewer` 工具也被弃用。但是，Applet API 不会在下一个主要版本中被移除。由于如今 Applet 的使用相当罕见，这种弃用应该只会产生轻微影响。


  ## 总结


  在本章中，我们讨论了 AWT `Desktop` 的新增功能、多分辨率图像、TIFF 图像格式以及 Applet API 的弃用。在下一章中，我们将讨论与 JVM
  相关的更改。


