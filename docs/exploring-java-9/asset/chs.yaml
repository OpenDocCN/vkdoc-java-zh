- "# 2. 模块系统\n\n当我们谈论 Java 9 时，最重要的主题是 Project Jigsaw（[`http://openjdk.java.net/projects/jigsaw/`](http://openjdk.java.net/projects/jigsaw/)）或\
  \ Java 平台模块系统（JPMS），它将模块系统引入了 Java 平台。Project Jigsaw 本应在 Java 8 中添加，但由于改动太大，因此推迟到\
  \ Java 9 发布。Project Jigsaw 给 Java 平台带来了重大变化，不仅影响了 JDK 本身，也影响了在其上运行的 Java 应用程序。\n\
  \n在 Java 9 中，Java SE 平台和 JDK 被组织成模块，因此它们可以被定制以缩小规模，从而在小型设备上运行。在 Java 9 之前，JRE 的安装是全有或全无的。JRE\
  \ 包含可以满足运行不同应用程序需求的工具、库和类。但对于某个特定的应用程序，其中一些工具、库和类可能并不需要。例如，在 JRE 上运行的 REST API 代理可能永远不会使用桌面\
  \ AWT/Swing 库。JPMS 使得从 JRE 中剥离不必要的库成为可能，从而构建适合每个独特应用程序的自定义镜像。这可以显著减小软件包的大小，加快部署速度。\n\
  \nJava 社区一直希望有一种构建模块化 Java 应用程序的方法。OSGi（[`https://en.wikipedia.org/wiki/OSGi`](https://en.wikipedia.org/wiki/OSGi)）是目前实现这一目标的一个不错选择。JPMS\
  \ 也允许开发者创建模块化的 Java 库和应用程序。与使用 OSGi 相比，来自 Java 平台本身的解决方案更有前景。\n\nJPMS 由一个 JSR——JSR\
  \ 376：Java^(TM) 平台模块系统（[`https://jcp.org/en/jsr/detail?id=376`](https://jcp.org/en/jsr/detail?id=376)）——和六个相关的\
  \ JEP 组成。\n\n*   200：模块化 JDK\n*   201：模块化源代码\n*   220：模块化运行时镜像\n*   260：封装大多数内部\
  \ API\n*   261：模块系统\n*   282：`jlink`：Java 链接器\n\n本章涵盖了 JPMS 最重要的概念。\n\n## 模块介绍\n\
  \n请看 Oracle Java 平台组首席架构师 Mark Reinhold（[`http://mreinhold.org/`](http://mreinhold.org/)）在一份文档（[`http://openjdk.java.net/projects/jigsaw/spec/sotms/`](http://openjdk.java.net/projects/jigsaw/spec/sotms/)）中的引述：\n\
  \n> 模块是一个命名的、自描述的代码和数据集合。其代码组织为一组包含类型的包，即 Java 类和接口；其数据包括资源和其他类型的静态信息。——Mark Reinhold\n\
  \n从这个定义中，我们了解到模块只是一组按照预定义结构组织的已编译 Java 代码和补充资源。如果你已经使用 Maven 多模块（[`https://maven.apache.org/guides/mini/guide-multiple-modules.html`](https://maven.apache.org/guides/mini/guide-multiple-modules.html)）或\
  \ Gradle 多项目构建（[`https://docs.gradle.org/current/userguide/multi_project_builds.html`](https://docs.gradle.org/current/userguide/multi_project_builds.html)）来组织代码，那么你可以轻松地将这些\
  \ Maven 模块或 Gradle 项目中的每一个升级为 JPMS 模块。\n\n每个 JPMS 模块都应有一个遵循与 Java 包相同命名约定的名称；也就是说，它应该使用反向域名模式——例如，`com.mycompany.mymodule`。JPMS\
  \ 模块使用根源目录中的 `module-info.java` 文件进行描述，该文件会被编译成 `module-info.class`。在此文件中，你使用新关键字\
  \ `module` 来声明一个带有名称的模块。清单 2-1 展示了包含最少信息的 `com.mycompany.mymodule` 模块的 `module-info.java`\
  \ 文件内容。\n\n```\nmodule com.mycompany.mymodule {\n}\n清单 2-1.\n最小模块描述\n```\n\n现在你已经成功创建了一个新的\
  \ JPMS 模块。\n\n\n\n## 示例应用\n\n让我用一个示例应用来演示模块系统的用法。这是一个功能非常有限的简单电子商务应用。主要目标是演示模块系统的工作原理，因此这些模块的实际实现并不重要。该示例应用是一个\
  \ Maven 项目，其模块如表 2-1 所示。此应用的命名空间是 `io.vividcode.store`，因此表 2-1 中 `common` 模块的实际名称是\
  \ `io.vividcode.store.common`。\n\n表 2-1.\n\n示例应用的模块\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `common` | 通用 API |\n| `common.persistence` | 通用持久化 API |\n| `filestore`\
  \ | 基于文件的持久化实现 |\n| `product` | 产品 API |\n| `product.persistenc`e | 产品持久化实现 |\n\
  | `runtime` | 应用引导程序 |\n\n## 模块声明\n\n模块声明文件 `module-info.java` 是理解模块系统工作原理的第一步。\n\
  \n### `requires` 和 `exports`\n\n在 Java 9 引入模块之后，你应该将 Java 应用组织为模块。一个模块可以使用关键字 `requires`\
  \ 声明对其他模块的依赖。依赖一个模块并不意味着你可以自动访问其公共和受保护类型。一个模块可以声明哪些包对其他模块是可访问的。只有模块的导出包对其他模块是可访问的，并且默认情况下，没有包会被导出。清单\
  \ 2-1 中的模块声明没有导出任何内容。关键字 `exports` 用于导出包。导出包中的公共和受保护类型及其公共和受保护成员可以被其他模块访问。\n\n清单\
  \ 2-2 展示了模块 `io.vividcode.store.common.persistence` 的文件 `module-info.java`。它使用两个\
  \ `requires` 声明来声明其对模块 `slf4j.api` 和 `io.vividcode.store.common` 的依赖。模块 `slf4j.api`\
  \ 来自第三方库 SLF4J ( [`https://www.slf4j.org/`](https://www.slf4j.org/) )，而 `io.vividcode.store.common`\
  \ 是示例应用中的另一个模块。模块 `io.vividcode.store.common.persistence` 将其包 `io.vividcode.store.common.persistence`\
  \ 导出给其他模块。\n\n```\nmodule io.vividcode.store.common.persistence {\nrequires slf4j.api;\n\
  requires io.vividcode.store.common;\nexports io.vividcode.store.common.persistence;\n\
  }\n清单 2-2.\nio.vividcode.store.common.persistence 的模块声明\n```\n\n请注意，当你导出一个包时，你只导出了该包中的类型，而不是其子包中的类型。例如，声明\
  \ `exports com.mycompany.mymodule` 只导出像 `com.mycompany.mymodule.A` 或 `com.mycompany.mymodule.B`\
  \ 这样的类型，但不导出像 `com.mycompany.mymodule.impl.C` 或 `com.mycompany.mymodule.test.demo.D`\
  \ 这样的类型。要导出这些子包，你需要在模块声明中使用 `exports` 显式声明它们。\n\n如果一个类型在模块边界之外不可访问，那么这个类型在模块中会被视为私有方法或字段。任何使用该类型的尝试都会在编译时导致错误，在运行时由\
  \ JVM 抛出 `java.lang.IllegalAccessError`，或者当你使用反射访问该类型时，由 Java 反射 API 抛出 `java.lang.IllegalAccessException`。\n\
  \n注意\n\n所有模块，除了 `java.base` 模块本身，都隐式且强制依赖于 `java.base`。你不需要显式声明此依赖。\n\n### 传递依赖\n\
  \n当模块 A 依赖模块 B 时，模块 A 可以读取模块 B 中导出的公共和受保护类型。这里我们说模块 A 读取模块 B。如果模块 B 也读取模块 C，那么模块\
  \ B 可以拥有返回模块 C 中导出类型的方法。\n\n清单 2-3 展示了模块 C 的文件 `module-info.java`。模块 C 导出了包 `ctest`。\n\
  \n```\nmodule C {\nexports ctest;\n}\n清单 2-3.\nC 的模块声明\n```\n\n清单 2-4 展示了模块 C 中的类\
  \ `ctest.MyC`。它只有一个方法 `sayHi()`，用于向控制台打印一条消息。\n\n```\npackage ctest;\npublic class\
  \ MyC {\npublic void sayHi() {\nSystem.out.println(\"来自模块 C 的问候！\");\n}\n}\n清单 2-4.\n\
  模块 C 中的类 ctest.MyC\n```\n\n清单 2-5 展示了模块 B 的文件 `module-info.java`。模块 B 依赖模块 C 并导出包\
  \ `btest`。\n\n```\nmodule B {\nrequires C;\nexports btest;\n}\n清单 2-5.\nB 的模块声明\n\
  ```\n\n清单 2-6 中类 `btest.MyB` 的方法 `getC()` 返回类 `ctest.MyC` 的一个新实例。\n\n```\npackage\
  \ btest;\nimport ctest.MyC;\npublic class MyB {\npublic MyC getC() {\nreturn new\
  \ MyC();\n}\n}\n清单 2-6.\n模块 B 中的类 btest.MyB\n```\n\n模块 A 在其文件 `module-info.java`\
  \ 中仅依赖模块 B；参见清单 2-7。\n\n```\nmodule A {\nrequires B;\n}\n清单 2-7.\nB 的模块声明\n```\n\
  \n模块 A 中的类 `atest.MyA` 尝试使用类 `MyC`；参见清单 2-8。\n\n```\npackage atest;\nimport btest.MyB;\n\
  public class MyA {\npublic static void main(String[] args) {\nnew MyB().getC().sayHi();\n\
  }\n}\n清单 2-8.\n模块 A 中的类 atest.MyA\n```\n\n尽管清单 2-8 中的代码看起来相当合理，但由于模块 A 未读取模块 C 的错误，它无法编译；参见清单\
  \ 2-9 中的错误消息。默认情况下，模块的可读性关系不是传递的。模块 B 读取模块 C，模块 A 读取模块 B，但模块 A 不读取模块 C。\n\n```\n\
  //A/atest/MyA.java:7: 错误：ctest 包中的 MyC.sayHi() 不可访问\nnew MyB().getC().sayHi();\n\
  ^\n(包 ctest 在模块 C 中声明，但模块 A 未读取它)\n1 个错误\n清单 2-9.\n模块 A 的编译错误\n```\n\n为了使清单 2-8\
  \ 中的代码能够编译，你需要在清单 2-7 中模块 A 的 `module-info.java` 文件中添加 `requires C`。当许多模块相互依赖时，这可能是一项繁琐的任务。由于这是一种常见的使用场景，Java\
  \ 9 为此提供了内置支持。`requires` 声明可以扩展，添加修饰符 `transitive` 来将依赖声明为传递的。一个模块所依赖的传递模块可以被任何依赖该模块的模块读取。这被称为隐式可读性。\n\
  \n在清单 2-10 中将模块 B 的声明改为使用修饰符 `transitive` 后，模块 A 可以成功编译。模块 B 所依赖的传递模块 C 可以被依赖模块\
  \ B 的模块 A 读取。模块 A 现在可以读取模块 C。\n\n```\nmodule B {\nrequires transitive C;\nexports\
  \ btest;\n}\n清单 2-10.\n更新 B 的模块声明以使用 transitive\n```\n\n一般来说，如果一个模块导出的包中包含一个类型，其签名引用了第二个模块中的另一个包，那么第一个模块应该使用\
  \ `requires transitive` 来声明对第二个模块的依赖。就像在模块 B 中，类 `MyB` 的方法 `getC()` 引用了来自模块 C 的类\
  \ `MyC`，因此模块 B 应该使用 `requires transitive C` 而不是 `requires C`。\n\n\n\n### 静态依赖\n\n\
  你可以使用 `requires static` 来指定一个模块依赖在编译时是必需的，但在运行时是可选的；参见清单 2-11。\n\n```\nmodule demo\
  \ {\nrequires static A;\n}\n清单 2-11.\nrequires static 示例\n```\n\n静态依赖对于框架和库非常有用。假设你正在构建一个用于处理不同类型数据库的库。该库模块可以使用静态依赖来要求不同类型的\
  \ JDBC 驱动。在编译时，库的代码可以访问这些驱动中定义的类型。在运行时，库的用户可以只添加他们想要使用的驱动。如果依赖不是静态的，库的用户必须添加所有支持的驱动才能通过模块解析检查。\n\
  \n### 服务\n\nJava 拥有自己的服务接口和提供者机制，使用类 `java.util.ServiceLoader`。这种服务机制主要被 JDK 本身以及第三方框架和库所使用。服务提供者的一个典型例子是\
  \ JDBC 驱动。每个 JDBC 驱动都应提供服务接口 `java.sql.Driver` 的实现。驱动的 JAR 文件应在 `META-INF/services`\
  \ 目录中包含提供者配置文件 `java.sql.Driver`。例如，Apache Derby ( [`https://db.apache.org/derby/`](https://db.apache.org/derby/)\
  \ ) 的 JAR 文件中的 `java.sql.Driver` 文件包含以下内容：\n\n```\norg.apache.derby.jdbc.AutoloadedDriver\n\
  ```\n\n`org.apache.derby.jdbc.AutoloadedDriver` 是服务接口 `java.sql.Driver` 的实现类的名称。\n\
  \n在 Java 9 之前，`ServiceLoader` 扫描类路径以定位给定服务接口的提供者实现。在 Java 9 中，模块描述符 `module-info.java`\
  \ 包含针对服务消费者和提供者的特定声明。\n\n清单 2-12 展示了模块 `io.vividcode.store.common` 中的服务接口 `PersistenceService`。接口\
  \ `PersistenceService` 有一个单一方法 `save()` 用于保存 `Persistable` 对象。\n\n```\npackage io.vividcode.store.common;\n\
  public interface PersistenceService {\nvoid save(final Persistable persistable)\
  \ throws PersistenceException;\n}\n清单 2-12.\n服务接口 PersistenceService\n```\n\n模块\
  \ `io.vividcode.store.common.persistence` 消费此服务接口。在其清单 2-13 的文件 `module-info.java`\
  \ 中，使用新关键字 `uses` 来声明对服务接口 `io.vividcode.store.common.PersistenceService` 的消费。\n\
  \n```\nmodule io.vividcode.store.common.persistence {\nrequires slf4j.api;\nrequires\
  \ transitive io.vividcode.store.common;\nexports io.vividcode.store.common.persistence;\n\
  uses io.vividcode.store.common.PersistenceService;\n}\n清单 2-13.\nio.vividcode.store.common.persistence\
  \ 的模块声明\n```\n\n现在你可以使用 `ServiceLoader` 来查找此服务接口的提供者。在清单 2-14 中，方法 `ServiceLoader.load()`\
  \ 为服务类型 `PersistenceService` 创建一个新的服务加载器，然后使用方法 `findFirst()` 获取第一个可用的服务提供者。如果找到服务提供者，则使用其方法\
  \ `save()` 来保存 `Persistable` 对象。\n\n```\npublic class DataStore {\nprivate final\
  \ Optional persistenceServices;\npublic DataStore() {\nthis.persistenceServices\
  \ = ServiceLoader\n.load(PersistenceService.class)\n.findFirst();\n}\npublic void\
  \ save(final T object) throws PersistenceException {\nif (this.persistenceServices.isPresent())\
  \ {\nthis.persistenceServices.get().save(object);\n}\n}\n}\n清单 2-14.\n使用 ServiceLoader\
  \ 查找提供者\n```\n\n服务接口 `PersistenceService` 的提供者位于模块 `io.vividcode.store.filestore`\
  \ 中。在此模块的声明清单 2-15 中，`provides io.vividcode.store.common.PersistenceService with\
  \ io.vividcode.store.filestore.FileStore` 表示此模块使用类 `io.vividcode.store.filestore.FileStore`\
  \ 提供服务接口 `PersistenceService` 的实现。`FileStore` 的实现非常简单，你可以查看其实现的源代码。\n\n```\nmodule\
  \ io.vividcode.store.filestore {\nrequires io.vividcode.store.common.persistence;\n\
  requires slf4j.api;\nprovides io.vividcode.store.common.PersistenceService\nwith\
  \ io.vividcode.store.filestore.FileStore;\n}\n清单 2-15.\nio.vividcode.store.filestore\
  \ 的模块声明\n```\n\n### 限定导出\n\n当你在模块声明中使用 `exports` 导出一个包时，该包对所有使用 `requires` 依赖它的模块都是可见的。有时你可能希望将某些包的可见性限制在部分模块内。考虑这个例子：一个包最初设计为对其他模块公开，但在后续版本中被弃用了。使用旧版本此包的遗留代码在迁移到\
  \ Java 9 后应能继续工作，而新代码应使用新版本。该包应仅对仍使用旧版本的遗留代码模块可见。这通过在 `exports` 中使用 `to` 子句来指定应具有访问权限的模块名称来实现。\n\
  \n清单 2-16 展示了 JDK 模块 `java.rmi` 的模块声明。你可以看到包 `com.sun.rmi.rmid` 仅对模块 `java.base`\
  \ 可见，而包 `sun.rmi.server` 仅对模块 `jdk.management.agent`、`jdk.jconsole` 和 `java.management.rmi`\
  \ 可见。\n\n```\nmodule java.rmi {\nrequires java.logging;\nexports java.rmi.activation;\n\
  exports com.sun.rmi.rmid to java.base;\nexports sun.rmi.server to jdk.management.agent,\n\
  jdk.jconsole, java.management.rmi;\nexports javax.rmi.ssl;\nexports java.rmi.dgc;\n\
  exports sun.rmi.transport to jdk.management.agent,\njdk.jconsole, java.management.rmi;\n\
  exports java.rmi.server;\nexports sun.rmi.registry to jdk.management.agent;\nexports\
  \ java.rmi.registry;\nexports java.rmi;\nuses java.rmi.server.RMIClassLoaderSpi;\n\
  }\n清单 2-16.\nJDK 模块 java.rmi 的模块声明\n```\n\n### 开放模块与开放包\n\n在模块声明中，你可以在 `module`\
  \ 前添加修饰符 `open` 将其声明为开放模块。开放模块仅在编译时授予对显式导出包的访问权限，但在运行时授予对其所有包中类型的访问权限。它还授予对所有包中所有类型的反射访问权限。所有类型包括私有类型及其私有成员。如果你使用反射\
  \ API 并抑制 Java 语言访问检查——例如，使用 `AccessibleObject` 的 `setAccessible()` 方法——你可以访问开放模块中的私有类型和成员。\n\
  \n你也可以使用 `opens` 将包开放给其他模块。你可以在运行时使用反射 API 访问开放包。就像开放模块一样，开放包中的所有类型及其所有成员都可以被反射\
  \ API 反射。你还可以使用 `to` 限定开放包，其含义与限定导出类似。\n\n清单 2-17 中模块 E 的声明将其标记为开放模块。\n\n```\nopen\
  \ module E {\nexports etest;\n}\n清单 2-17.\n开放模块的声明\n```\n\n清单 2-18 中模块 F 的声明开放了两个包。开放模块中不存在的包是可能的。开放包给不存在的模块也是可能的。在这些情况下，编译器会生成警告，这与将包导出到不存在的模块相同。\n\
  \n```\nmodule F {\nopens ftest1;\nopens ftest2 to G;\n}\n清单 2-18.\n使用开放包的模块声明\n\
  ```\n\n开放模块和开放包主要是为了解决向后兼容性问题而提供的。在迁移依赖反射工作的遗留代码时，你可能需要使用它们。\n\n\n\n## 处理现有代码\n\n\
  对于在 Java 9 中开发新项目，模块声明中的概念已经足够。但如果你需要处理 Java 9 之前编写的现有代码，则需要了解未命名模块和自动模块。\n\n###\
  \ 未命名模块\n\n从前面的章节可以看出，Java 9 对跨模块边界访问类型有严格的限制。如果你正在创建一个针对 Java 9 的全新应用程序，则应使用新的模块系统。然而，Java\
  \ 9 仍然支持运行所有在 Java 9 之前编写的应用程序。这是借助未命名模块实现的。\n\n当模块系统需要加载一个其包未在任何模块中定义的类型时，它会尝试从类路径加载该类型。如果类型加载成功，则该类型被视为一个名为未命名模块的特殊模块的成员。未命名模块之所以特殊，是因为它读取所有其他命名模块，并导出其所有包。\n\
  \n当从类路径加载类型时，它可以访问所有其他命名模块（包括内置平台模块）的导出类型。对于 Java 8 应用程序，该应用程序的所有类型都是从类路径加载的，因此它们都位于同一个未命名模块中，并且可以相互访问而不会出现问题。该应用程序也可以访问平台模块。这就是\
  \ Java 8 应用程序无需修改即可在 Java 9 上运行的原因。\n\n未命名模块会导出其所有包，但其他命名模块中的代码无法访问未命名模块中的类型，并且你不能使用\
  \ `requires` 来声明依赖关系——因为没有名称可供你引用它。这种限制是必要的；否则我们将失去模块系统的所有优势，回到混乱的类路径的黑暗旧时代。未命名模块纯粹是为向后兼容而设计的。如果一个包同时存在于命名模块和未命名模块中，则未命名模块中的该包将被忽略。类路径中意外的重复包不会干扰其他命名模块中的代码。\n\
  \n### 自动模块\n\n由于 Java 9 向后兼容以运行现有的 Java 应用程序，因此没有必要升级现有应用程序以使用模块。但是，建议你进行升级以利用新模块系统的优势。\n\
  \n迁移现有应用程序的推荐方法是自下而上地进行；也就是说，从整个依赖树底部的模块开始。例如，在一个具有三个模块/子项目 A、B 和 C 且依赖树为 `A ->\
  \ B -> C` 的应用程序中，你首先将 C 迁移为一个模块，然后是 B，最后是 A。在 C 迁移为模块后，当前位于未命名模块中的 A 和 B 仍然可以访问\
  \ C 中的类型，因为未命名模块读取所有命名模块。然后你将 B 迁移为一个命名模块，并声明它需要已迁移的命名模块 C。最后，将 A 迁移为一个命名模块；此时，整个应用程序已成功迁移。\n\
  \n自下而上的迁移并不总是可行的。某些库可能由第三方维护，你无法控制这些库何时迁移到模块。但你仍然希望迁移依赖于这些第三方库的模块。然而，你不能仅仅迁移这些模块，而将第三方库留在类路径中，因为命名模块无法读取未命名模块。你可以做的是将这些库的\
  \ JAR 文件放入模块路径中，并将它们转换为自动模块。\n\n除了显式创建的命名模块之外，自动模块是从普通 JAR 文件隐式创建的。这些 JAR 文件中没有模块声明。自动模块的名称来自\
  \ JAR 文件清单文件 `MANIFEST.MF` 中的属性 `Automatic-Module-Name`，或者从 JAR 文件的名称派生而来。其他命名模块可以使用自动模块的名称声明对此\
  \ JAR 文件的依赖。建议你在清单中添加属性 `Automatic-Module-Name`，因为它比从 JAR 文件名派生的模块名称更可靠。\n\n自动模块在许多方面都很特殊：\n\
  \n*   自动模块读取所有其他命名模块。\n*   自动模块导出其所有包。\n*   自动模块读取未命名模块。\n*   自动模块向所有其他自动模块授予传递可读性。\n\
  \n自动模块是类路径和显式命名模块之间的桥梁。目标是将所有现有的模块/子项目/库迁移到 Java 9 命名模块。然而，在迁移过程中，你始终可以将它们添加到模块路径中，以作为自动模块使用。\n\
  \n在清单 2-19 中，类 `MyD` 使用了来自 Guava（[`https://github.com/google/guava`](https://github.com/google/guava)）21.0\
  \ 版本的类 `com.google.common.collect.Lists`。\n\n```\npackage dtest;\nimport com.google.common.collect.Lists;\n\
  public class MyD {\npublic static void main(String[] args) {\nSystem.out.println(Lists.newArrayList(\"\
  Hello\", \"World\"));\n}\n}\n清单 2-19.\n使用 Guava 库的类 MyD\n```\n\n在撰写本文时，Guava 尚未迁移为\
  \ Java 9 模块。在清单 2-20 中 D 的模块声明中，你可以使用 `requires guava` 来声明对其的依赖。`guava` 是 Guava\
  \ 自动模块的名称，该名称派生自 JAR 文件名。\n\n```\nmodule D {\nrequires guava;\n}\n清单 2-20.\n声明对自动模块的依赖\n\
  ```\n\n编译清单 2-20 中的代码时，你可以在 `javac` 中使用命令行选项 `--module-path`，将目录 `∼/libs` 中的 Guava\
  \ JAR 文件 `guava-21.0.jar` 添加到模块路径。\n\n```\n$ javac --module-path ∼/libs /*.java\
  \ /dtest/*.java\n```\n\n## JDK 工具\n\n完成项目模块的源代码后，你需要编译并运行这些模块。大多数情况下，你会使用 IDE 进行开发和测试，因此可以将项目的编译和执行交给\
  \ IDE。但是，你仍然可以直接使用 JDK 工具 `javac` 和 `java` 分别编译和运行代码。深入了解这些 JDK 工具有助于你理解模块的整个生命周期。然而，IDE\
  \ 和构建工具改进其对 JDK 9 的支持需要时间。这个过程可能很慢，因此你可能仍然需要使用这些 JDK 工具来完成某些任务。在迁移到 Java 9 时，你可能会遇到各种与模块系统相关的问题。如果你对这些工具有深入的了解，就可以轻松找到根本原因并解决这些问题。\n\
  \n其中一些 JDK 工具已升级以支持与模块相关的选项，而另一些则是 Java 9 中的新工具。这些工具支持一些与模块系统中常见概念相关的通用命令行选项。这些工具可以在不同阶段使用：\n\
  \n*   编译时：使用 `javac` 将 Java 源代码编译成类文件。\n*   链接时：Java 9 中引入的可选新阶段。使用 `jlink` 组装和优化一组模块及其传递依赖项，以创建自定义运行时镜像。\n\
  *   运行时：使用 `java` 启动 JVM 并执行字节码。\n\n其他实用工具没有特定的工作阶段。\n\n\n\n### 模块路径\n\n模块系统使用模块路径来定位定义在不同工件中的模块。模块路径是一系列指向模块定义或包含模块定义目录的路径序列。模块定义可以是模块工件，也可以是包含模块展开内容的目录。模块路径按照其在序列中的顺序进行搜索，以找到定义特定模块的第一个定义。模块系统还使用模块路径来解析依赖关系。如果模块系统找不到依赖模块的定义，或者在同一个目录中发现两个定义了同名模块的定义，则会报错并退出。模块路径使用平台相关的路径分隔符进行分隔：Windows\
  \ 使用分号（`;`），macOS 和 Linux 使用冒号（`:`）。\n\n不同类型的模块路径用于不同的阶段；参见表 2-2。如表所示，不同的模块路径命令行选项可以应用于多个阶段。当存在多个模块路径时，每个模块路径的顺序定义了搜索顺序。例如，在编译时，使用\
  \ `javac` 时，所有四种类型的模块路径都可以使用。模块系统首先检查 `--module-source-path` 中指定的模块路径，然后检查 `--upgrade-module-path`，接着是\
  \ `--system`，最后是 `--module-path` 或 `-p`。\n\n表 2-2.\n\n不同类型的模块路径\n\n| 顺序 | 名称 | 命令行选项\
  \ | 应用阶段 | 描述 |\n| --- | --- | --- | --- | --- |\n| 1 | 编译模块路径 | `--module-source-path`\
  \ | 编译时 | 模块的源代码 |\n| 2 | 升级模块路径 | `--upgrade-module-path` | 编译时和运行时 | 包含用于替换环境中可升级模块的已编译模块\
  \ |\n| 3 | 系统模块 | `--system` | 编译时和运行时 | 环境中的已编译模块 |\n| 4 | 应用模块路径 | `--module-path`\
  \ 或 `-p` | 所有阶段 | 已编译的应用模块 |\n\n在模块路径上找到的系统模块和模块定义被称为可观察模块集，这在模块解析过程中非常重要。如果要解析的模块不存在于可观察模块集中，模块系统会报错并退出。\n\
  \n### 模块版本\n\n尽管模块声明中没有版本相关的配置，但仍然可以为模块记录版本信息。建议你遵循语义化版本控制方案（[`http://semver.org/`](http://semver.org/)）来记录模块版本。像\
  \ Maven 或 Gradle 这样的构建工具会自动记录版本信息，因此除非你直接使用 `javac` 或 `jar` 工具，否则无需担心。需要了解的重要一点是，模块系统在搜索模块时会忽略版本信息。如果模块路径包含多个同名但不同版本的模块定义，模块系统仍会将其视为错误。在解析模块时，模块名称是唯一重要的因素。\n\
  \n你可以使用 `--module-version` 选项指定模块版本。\n\n### 主模块\n\n可以使用 `--module` 或 `-m` 选项指定主模块。在运行时，主模块包含要运行的主类。如果主类已在模块声明中记录，则只需指定模块名称即可。否则，你需要使用\
  \ `<module>/<mainclass>` 来指定模块和主类，例如 `com.mycompany.mymodule/com.mycompany.mymodule.Main`。\n\
  \n在编译时，`--module` 或 `-m` 指定了唯一要编译的模块。\n\n### 根模块\n\n可观察模块集定义了所有可能被解析的模块。然而，并非所有可观察模块在运行时都是必需的。模块系统从一组根模块开始解析过程，并通过解析这些根模块的依赖关系相对于可观察模块集的传递闭包来构建模块图。有可能并非所有可观察模块都被解析，并且只有可观察模块是可解析的。\n\
  \n模块系统有一些用于选择默认根模块的规则。当你在未命名模块（即早于 Java 9 的代码）中编译或运行代码时，未命名模块的默认根模块集包括 JDK 系统模块和应用模块。如果\
  \ `java.se` 模块存在，它将是唯一包含的 JDK 系统模块。否则，每个无条件导出至少一个包的 `java.*` 模块都是根模块。每个无条件导出至少一个包的非\
  \ `java.*` 模块也是根模块。\n\n当你编译或运行 Java 9 代码时，默认的根模块集取决于阶段：\n\n*   在编译时，它是要编译的模块集。\n\
  *   在链接时，它是空的。\n*   在运行时，它是应用的主模块。\n\n可以使用 `--add-modules` 选项扩展根模块集以包含额外的模块。此选项的值是一个以逗号分隔的模块名称列表。此选项还有三个特殊值。\n\
  \n*   `ALL-DEFAULT`：添加未命名模块的默认根模块集。\n*   `ALL-SYSTEM`：添加所有系统模块。\n*   `ALL-MODULE-PATH`：添加在模块路径上找到的所有可观察模块。\n\
  \n### 限制可观察模块\n\n可以使用 `--limit-modules` 选项来限制可观察模块。使用此选项后，可观察模块集是指定模块的传递闭包，再加上主模块以及通过\
  \ `--add-modules` 选项指定的任何模块。此选项的值也是一个以逗号分隔的模块名称列表。\n\n### 升级模块路径\n\n`--upgrade-module-path`\
  \ 选项指定了升级模块路径。此路径包含可用于升级环境中内置模块的模块。此模块路径取代了现有的扩展机制（[`http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html`](http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html)）。\n\
  \n系统模块是否可升级在 `module-info.java` 文件中有明确记录。例如，`java.xml.bind` 和 `java.xml.ws` 模块是可升级的。\n\
  \n### 增加可读性与打破封装\n\n模块系统完全关乎封装。但有时在处理遗留代码或运行测试时，你仍然希望打破封装。你可以使用几个命令行选项来打破封装。\n\n\
  *   `--add-reads module=target-module(,target-module)*` 更新源模块以读取目标模块。目标模块可以是 `ALL-UNNAMED`，以读取所有未命名模块。\n\
  *   `--add-exports module/package=target-module(,target-module)*` 更新源模块以将包导出到目标模块。这将从源模块向目标模块添加一个限定的包导出。目标模块可以是\
  \ `ALL-UNNAMED`，以导出到所有未命名模块。\n*   `--add-opens module/package=target-module(,target-module)*`\
  \ 更新源模块以向目标模块开放包。这将从源模块向目标模块添加一个限定的包开放。\n*   `--patch-module module=file(;file)*`\
  \ 使用 JAR 文件或目录中的类和资源覆盖或增强模块。当你运行可能需要临时替换模块内容的测试时，`--patch-module` 非常有用。\n\n现在我已经介绍了基本概念，让我们来讨论这些\
  \ JDK 工具。\n\n\n\n### `javac`\n\n`javac` 支持以下与模块相关的选项。这些选项的含义已在本章前面的章节中解释过。\n\n*\
  \   `--module` 或 `-m`\n*   `--module-path` 或 `-p`\n*   `--module-source-path`\n\
  *   `--upgrade-module-path`\n*   `--system`\n*   `--module-version`\n*   `--add-modules`\n\
  *   `--limit-modules`\n*   `--add-exports`\n*   `--add-reads`\n*   `--patch-module`\n\
  \n现在，我将以“传递性依赖”中讨论的模块为例，说明如何使用 `javac`。假设你有一个目录，其中包含这三个模块的源代码。每个模块都有自己的子目录。你可以像这样编译单个模块。模块\
  \ C 没有依赖项，因此可以直接编译。\n\n```\n$ javac -d ∼/Downloads/modules_output/C C/**/*.java\n\
  ```\n\n要编译模块 B，你可以使用 `-p` 来提供已编译的模块 C，因为模块 B 需要模块 C。当需要第三方库时，你也应该使用 `-p`。\n\n```\n\
  $ javac -d ∼/Downloads/modules_output/B -p ∼/Downloads/modules_output B/**/*.java\n\
  ```\n\n由于你拥有所有模块的源代码，你可以简单地一次性编译它们。\n\n```\n$ javac -d ∼/Downloads/modules_output\
  \ --module-source-path . **/*.java\n```\n\n你也可以使用 `-m` 编译单个模块。当使用 `-m` 时，需要使用 `--module-source-path`\
  \ 来指定模块源路径。\n\n```\n$ javac -d ∼/Downloads/modules_output --module-source-path .\
  \ -m B\n```\n\n### `jlink`\n\n要运行 Java 应用程序，你需要先安装 JRE 或 JDK。正如我之前提到的，在 Java 9 之前，没有简单的方法来自定义\
  \ JRE 或 JDK 以仅包含必要的内容。即使是一个简单的“Hello World”应用程序也需要完整大小的 JRE 才能运行。然而，在 JDK 模块化之后，可以创建自己的\
  \ Java 运行时映像，该映像仅包含应用程序所需的系统模块，这可以减小 JRE 映像的大小。\n\n你可以使用 `jlink` 来构建自定义映像。如果你有一个模块\
  \ `demo.simple`，其中包含一个类 `test.Main`，你可以用它来打印出 `Hello World!`。要构建你的映像，请创建模块化 JAR\
  \ 文件 `demo.simple-1.0.0.jar` 并设置主类。清单 2-21 显示了你可以用来使用 `jlink` 创建自定义映像的命令。路径 `<module_dir>`\
  \ 包含模块 `demo.simple` 的工件。`<JDK_PATH>/jmods` 是 JDK 模块的路径。\n\n```\n$ jlink -p :/jmods\
  \ \\\n--add-modules demo.simple \\\n--output  \\\n--launcher simple=demo.simple\n\
  清单 2-21.\n使用 jlink 创建自定义映像\n```\n\n`jlink` 工具会在输出目录中创建一个新的运行时映像。你可以运行 `bin` 目录中的可执行文件\
  \ `simple` 来运行你的应用程序。在 macOS 上，此自定义运行时映像的大小仅为 36.5MB。图 2-1 显示了自定义运行时映像的内容。\n\n![A459620_1_En_2_Fig1_HTML.jpg](img/A459620_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1.\n\n自定义运行时映像的内容\n\n表 2-3 显示了 `jlink` 的选项。\n\n表 2-3.\n\n`jlink` 的选项\n\n|\
  \ 选项 | 描述 |\n| --- | --- |\n| `--module-path` 或 `-p` | 参见“模块路径”。 |\n| `--add-modules`\
  \ | 参见“根模块”。 |\n| `--output` | 输出目录。 |\n| `--launcher` | 用于运行模块或模块中主类的启动器命令。如果模块是使用\
  \ `--main-class` 指定主类创建的，那么仅使用模块名称就足够了。否则，可以使用 `<module>/<mainclass>` 指定主类。 |\n\
  | `--limit-modules` | 参见“限制可观察模块”。 |\n| `--bind-services` | 执行完整的服务绑定。 |\n| `--compress=<0&#124;1&#124;2>`\
  \ 或 `-c` | 启用压缩。可能的值是 `0`、`1` 和 `2`。`0` 表示无压缩，`1` 表示常量字符串共享，`2` 表示使用 ZIP 压缩。 |\n\
  | `--endian` | 生成映像的字节顺序。可能的值是 `little` 或 `big`。默认值是 `native`。 |\n| `--no-header-files`\
  \ | 排除映像中的头文件。 |\n| `--no-man-pages` | 排除手册页。 |\n| `-G` 或 `--strip-debug` | 剥离调试信息。\
  \ |\n| `--ignore-signing-information` | 在链接已签名的模块 JAR 文件时抑制致命错误。已签名模块 JAR 文件的签名相关文件不会被复制到生成的映像中。\
  \ |\n| `--suggest-providers [name, ...]` | 建议实现给定服务类型的提供者。 |\n| `--include-locales=langtag[,langtag]*`\
  \ | 包含语言环境列表。使用此选项时必须添加模块 `jdk.localedata`。 |\n| `--exclude-files=pattern-list`\
  \ | 排除指定的文件。 |\n| `--verbose` 或 `-v` | 启用详细的跟踪输出。 |\n\n`jlink` 的一个主要限制是它不支持自动模块，这意味着无法使用\
  \ `jlink` 链接第三方库。例如，当你尝试使用 `jlink` 为示例应用程序创建映像时，它会给出以下错误。\n\n```\nError: module-info.class\
  \ not found for slf4j.api module\n```\n\n从这条错误信息中，你可以知道它需要模块 `slf4j.api` 的 `module-info.class`，但\
  \ SLF4J 库尚未迁移到 Java 9，因此你无法将其包含在映像中。\n\n### `java`\n\n`java` 命令支持以下与模块相关的选项：\n\n\
  *   `--module-path` 或 `-p`\n*   `--upgrade-module-path`\n*   `--add-modules`\n*\
  \   `--limit-modules`\n*   `--list-modules`：列出可观察的模块。\n*   `--describe-module` 或\
  \ `-d`：描述模块。\n*   `--validate-modules`：验证所有模块。可用于查找冲突和错误。\n*   `--show-module-resolution`：在启动期间显示模块解析结果。\n\
  *   `--add-exports`\n*   `--add-reads`\n*   `--add-opens`\n*   `--patch-module`\n\
  \n对于示例应用程序，在使用 Maven 组装插件将所有库和模块工件复制到一个目录后，你可以使用以下命令启动应用程序：\n\n```\n$ java -p  -m\
  \ io.vividcode.store.runtime/io.vividcode.store.runtime.Main\n```\n\n如果你在主类中记录了模块工件，你可以简单地使用\
  \ `java -p <path> -m io.vividcode.store.runtime` 来运行应用程序。\n\n`--list-modules` 选项在调试模块解析问题时非常有用，因为它可以列出所有可观察的模块。例如，你可以使用\
  \ `java --list-modules` 列出所有 JDK 系统模块。如果你使用 `-p` 添加模块路径，输出还将包括在模块路径中找到的模块。`--show-module-resolution`\
  \ 选项对于解决模块解析问题也非常有用。\n\n\n\n### `jdeps`\n\n你可以使用 `jdeps` 工具来分析指定模块的依赖关系。以下命令会打印出\
  \ `io.vividcode.store.runtime` 的模块描述符、分析后得到的模块依赖关系，以及经过传递缩减后的依赖图；参见清单 2-22。它还会识别出任何未使用的限定导出。\n\
  \n```\n$ jdeps --module-path  --check io.vividcode.store.runtime\n```\n\n```\nio.vividcode.store.runtime\
  \ (file:////runtime-1.0.0-SNAPSHOT.jar)\n[模块描述符]\nrequires io.vividcode.store.filestore;\n\
  requires io.vividcode.store.product.persistence;\nrequires mandated java.base (@9);\n\
  requires slf4j.simple;\n[为 io.vividcode.store.runtime 建议的模块描述符]\nrequires io.vividcode.store.common;\n\
  requires io.vividcode.store.product;\nrequires io.vividcode.store.product.persistence;\n\
  requires mandated java.base;\n[io.vividcode.store.runtime 的传递缩减图]\nrequires io.vividcode.store.product.persistence;\n\
  requires mandated java.base;\n清单 2-22.\n使用 --check 选项的 jdeps 输出\n```\n\n要使用 `--check`\
  \ 选项，你需要先知道模块名称。如果你只有一个 JAR 文件，可以使用 `--list-deps` 选项或 `--list-reduced-deps` 选项。\n\
  \n```\n$ jdeps --module-path  --list-deps /runtime-1.0.0-SNAPSHOT.jar\n```\n\n清单\
  \ 2-23 展示了此命令的输出。\n\n```\nio.vividcode.store.common\nio.vividcode.store.product\n\
  io.vividcode.store.product.persistence\njava.base\n清单 2-23.\n使用 --list-deps 选项的\
  \ jdeps 输出\n```\n\n`--list-deps` 和 `--list-reduced-deps` 的区别在于，使用 `--list-reduced-deps`\
  \ 选项的结果不包含模块图中的隐式读取边。\n\n```\n$ jdeps --module-path  --list-reduced-deps /runtime-1.0.0-SNAPSHOT.jar\n\
  ```\n\n清单 2-24 展示了此命令的输出。\n\n```\nio.vividcode.store.product.persistence\n清单 2-24.\n\
  使用 --list-reduced-deps 选项的 jdeps 输出\n```\n\n`jdeps` 的另一个便捷功能是，它可以生成 graphviz（[`http://graphviz.org/`](http://graphviz.org/)）DOT\
  \ 文件，以便在图表中可视化模块依赖关系。\n\n```\n$ jdeps --module-path  \\\n--dot-output  -m io.vividcode.store.runtime\n\
  ```\n\n输出目录包含一个用于所有模块的 DOT 文件 `summary.dot` 和一个用于该模块的 DOT 文件 `io.vividcode.store.runtime.dot`。然后，你可以使用以下命令将\
  \ DOT 文件转换为 PNG 文件。请确保你已先安装 graphviz。\n\n```\n$ dot -Tpng /summary.dot -o /summary.png\n\
  ```\n\n你也可以使用 `jdeps` 处理多个 JAR 文件，以生成整个项目的模块依赖关系图。生成的 DOT 文件 `summary.dot` 包含所有模块。对于示例应用程序，使用\
  \ Maven 将所有模块工件和第三方库复制到不同的目录中。你可以使用 Maven 的依赖插件轻松完成此操作。然后，你可以使用以下命令生成 DOT 文件。（`<third_party-libs-path>`\
  \ 是第三方库的路径，而 `<modules_path>` 是模块工件的路径。）\n\n```\n$jdeps --module-path  \\\n--dot-output\
  \  \\\n/*.jar\n```\n\n然后，你可以将文件 `summary.dot` 转换为 PNG 文件，生成的模块依赖关系图见图 2-2。\n\n![A459620_1_En_2_Fig2_HTML.jpg](img/A459620_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2.\n\n生成的模块依赖关系图\n\n`jdeps` 还可以从 JAR 文件生成模块声明文件 `module-info.java`。选项 `--generate-module-info`\
  \ 和 `--generate-open-module` 分别用于普通模块和开放模块。例如，你可以使用以下命令为 `jackson-core-2.8.7.jar`\
  \ 生成文件 `module-info.java`。\n\n```\n$ jdeps --generate-module-info  /jackson-core-2.8.7.jar\n\
  ```\n\n生成的 `module-info.java` 如清单 2-25 所示。它简单地导出了所有包并添加了服务提供者。在将遗留 JAR 文件迁移到 Java\
  \ 9 模块时，你可以将生成的 `module-info.java` 文件作为起点。\n\n```\nmodule jackson.core {\nexports\
  \ com.fasterxml.jackson.core;\nexports com.fasterxml.jackson.core.base;\nexports\
  \ com.fasterxml.jackson.core.filter;\nexports com.fasterxml.jackson.core.format;\n\
  exports com.fasterxml.jackson.core.io;\nexports com.fasterxml.jackson.core.json;\n\
  exports com.fasterxml.jackson.core.sym;\nexports com.fasterxml.jackson.core.type;\n\
  exports com.fasterxml.jackson.core.util;\nprovides com.fasterxml.jackson.core.JsonFactory\
  \ with\ncom.fasterxml.jackson.core.JsonFactory;\n}\n清单 2-25.\njackson-core-2.8.7.jar\
  \ 生成的 module-info.java\n```\n\n## 模块 Java API\n\n当 JVM 启动时，它会针对可观察模块解析应用程序的主模块。此解析过程的结果是一个可读性图，这是一个有向图，其节点表示已解析的模块，边表示模块之间的可读性。然后，JVM\
  \ 创建一个模块层，该层由从这些已解析模块定义的运行时模块组成。模块系统提供了 Java API，供应用程序与之交互。\n\n\n\n### `ModuleFinder`\n\
  \n让我们从模块解析过程开始。要解析一个模块，首先需要找到模块定义。接口 `ModuleFinder` 负责定位模块。通过 `ModuleFinder` 中的静态方法，有三种不同的方式可以创建\
  \ `ModuleFinder` 的实例；参见表 2-4。\n\n表 2-4.\n\n`ModuleFinder` 的静态方法\n\n| 方法 | 描述 |\n\
  | --- | --- |\n| `ofSystem()` | 创建一个定位系统模块的 `ModuleFinder` |\n| `of(Path… entries)`\
  \ | 创建一个 `ModuleFinder`，通过搜索 `entries` 指定的一系列路径来定位文件系统上的模块 |\n| `compose(ModuleFinder...\
  \ finders)` | 通过组合零个或多个 `ModuleFinder` 来创建一个 `ModuleFinder` |\n\n一旦创建了 `ModuleFinder`，就可以使用其方法\
  \ `Optional<ModuleReference> find(String name)` 按名称查找模块。类 `ModuleReference` 是对模块内容的引用。方法\
  \ `Set<ModuleReference> findAll()` 返回一个集合，其中包含此 `ModuleFinder` 对象可以定位的所有 `ModuleReference`。通常你不需要直接使用\
  \ `ModuleFinder`，而应该使用它们来为可读性图创建配置。\n\n由 `ModuleFinder` 定位的模块表示为 `ModuleReference`。表\
  \ 2-5 展示了 `ModuleReference` 的方法。\n\n表 2-5.\n\n`ModuleReference` 的方法\n\n| 方法 | 描述\
  \ |\n| --- | --- |\n| `ModuleDescriptor descriptor()` | 返回描述该模块的 `ModuleDescriptor`\
  \ |\n| `Optional<URI> location()` | 以 `URI` 形式返回模块内容的位置 |\n| `ModuleReader open()`\
  \ | 打开模块内容以供读取 |\n\n清单 2-26 展示了一个用于创建 `ModuleFinder` 和 `ModuleReference` 对象的辅助类。`ModuleFinder`\
  \ 对象在资源路径 `/modules` 中查找模块。该路径包含示例应用程序的模块工件。方法 `getModuleReference()` 使用 `ModuleFinder`\
  \ 按名称查找 `ModuleReference`。由于我确信要查找的模块一定存在，这里我直接使用返回的 `Optional<ModuleReference>`\
  \ 的 `get()` 方法来获取 `ModuleReference`。\n\n```\npublic class ModuleTestSupport {\n\
  public static final String MODULE_NAME = \"io.vividcode.store.common\";\npublic\
  \ static ModuleFinder getModuleFinder() throws URISyntaxException {\nreturn ModuleFinder.of(\n\
  Paths.get(\nModuleDescriptorTest.class.getResource(\"/modules\").toURI()));\n}\n\
  public static ModuleReference getModuleReference() throws URISyntaxException {\n\
  return getModuleFinder().find(MODULE_NAME).get();\n}\n}\n清单 2-26.\n模块测试的支持类\n```\n\
  \n清单 2-27 是对 `ModuleFinder` 的测试。这里我验证了 `find()` 和 `findAll()` 方法的结果。\n\n```\npublic\
  \ class ModuleFinderTest {\n@Test\npublic void testFindModule() throws Exception\
  \ {\nfinal ModuleFinder moduleFinder = ModuleTestSupport.getModuleFinder();\nassertTrue(moduleFinder.find(ModuleTestSupport.MODULE_NAME).isPresent());\n\
  final Set allModules = moduleFinder.findAll();\nassertEquals(4, allModules.size());\n\
  }\n}\n清单 2-27.\nModuleFinder 测试\n```\n\n### `ModuleDescriptor`\n\n从 `ModuleReference`\
  \ 中，你可以获取描述模块的 `ModuleDescriptor`。表 2-6 展示了 `ModuleDescriptor` 的方法。\n\n表 2-6.\n\n\
  `ModuleDescriptor` 的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `Set<ModuleDescriptor.Exports>\
  \ exports()` | 返回表示导出包的 `ModuleDescriptor.Exports` 集合 |\n| `Set<ModuleDescriptor.Opens>\
  \ opens()` | 返回表示开放包的 `ModuleDescriptor.Opens` 集合 |\n| `Set<ModuleDescriptor.Requires>\
  \ requires()` | 返回表示模块依赖项的 `ModuleDescriptor.Requires` 集合 |\n| `Set<ModuleDescriptor.Provides>\
  \ provides()` | 返回表示此模块提供的服务的 `ModuleDescriptor.Provides` 集合 |\n| `Set<String> uses()`\
  \ | 返回此模块使用的服务集合 |\n| `String name()` | 返回模块的名称 |\n| `Optional<String> mainClass()`\
  \ | 返回模块的主类 |\n| `Set<ModuleDescriptor.Modifier> modifiers()` | 返回表示模块修饰符的 `ModuleDescriptor.Modifier`\
  \ 集合 |\n| `boolean isAutomatic()` | 检查模块是否为自动模块 |\n| `boolean isOpen()` | 检查模块是否为开放模块\
  \ |\n| `Optional<ModuleDescriptor.Version> version()` | 返回模块的版本 |\n\n在清单 2-28 中，我使用一个测试来验证从\
  \ `ModuleDescriptor` 获取的各种信息。\n\n```\npublic class ModuleDescriptorTest {\n@Test\n\
  public void testModuleDescriptor() throws Exception {\nfinal ModuleReference reference\
  \ = ModuleTestSupport.getModuleReference();\nassertNotNull(reference);\nfinal ModuleDescriptor\
  \ descriptor = reference.descriptor();\nassertEquals(ModuleTestSupport.MODULE_NAME,\
  \ descriptor.name());\nassertFalse(descriptor.isAutomatic());\nassertFalse(descriptor.isOpen());\n\
  assertEquals(1, descriptor.exports().size());\nassertEquals(2, descriptor.packages().size());\n\
  assertTrue(descriptor.requires().stream().map(Requires::name)\n.anyMatch(Predicate.isEqual(\"\
  jackson.core\")));\nassertTrue(descriptor.uses().isEmpty());\nassertTrue(descriptor.provides().isEmpty());\n\
  }\n}\n清单 2-28.\nModuleDescriptor 测试\n```\n\n表 2-6 中的方法用于查询现有 `ModuleDescriptor`\
  \ 对象的信息。要创建 `ModuleDescriptor` 对象，你可以使用构建器类 `ModuleDescriptor.Builder`，或者从模块描述符的二进制形式中读取。静态方法\
  \ `newModule(String name)`、`newOpenModule(String name)` 和 `newAutomaticModule(String\
  \ name)` 可以分别创建用于构建普通模块、开放模块和自动模块的 `ModuleDescriptor.Builder` 对象。`ModuleDescriptor.Builder`\
  \ 有不同的方法，可以通过编程方式配置模块描述符的各种组件。清单 2-29 展示了一个简单的 `ModuleDescriptor.Builder` 测试。\n\n\
  静态方法 `read()` 有不同的重载形式，用于从 `InputStream` 或 `ByteBuffer` 读取模块声明的二进制形式。如果二进制形式不包含模块中的包集合，你可以传递一个额外的\
  \ `Supplier<Set<String>>` 类型的参数来提供这些包。\n\n```\n@Test\npublic void testModuleDescriptorBuilder()\
  \ {\nfinal ModuleDescriptor descriptor = ModuleDescriptor.newModule(\"demo\")\n\
  .exports(\"demo.api\")\n.exports(\"demo.common\")\n.mainClass(\"demo.Main\")\n.version(\"\
  1.0.0\")\n.build();\nassertEquals(2, descriptor.exports().size());\nassertTrue(descriptor.mainClass().isPresent());\n\
  assertEquals(\"demo.Main\", descriptor.mainClass().get());\nassertTrue(descriptor.version().isPresent());\n\
  assertEquals(\"1.0.0\", descriptor.version().get().toString());\n}\n清单 2-29.\nModuleDescriptor.Builder\
  \ 测试\n```\n\n\n\n`ModuleReference.open()` 返回的 `ModuleReader` 用于读取模块中的资源。资源由以 `/`\
  \ 分隔的路径字符串标识，例如 `com/mycompany/mymodule/Main.class`。表 2-7 展示了 `ModuleReader` 的方法。\n\
  \n表 2-7.\n\n`ModuleReader` 的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `Stream<String>\
  \ list()` | 列出模块中所有资源的名称 |\n| `Optional<URI> find(String name)` | 根据名称查找资源 |\n|\
  \ `Optional<InputStream> open(String name)` | 打开资源以供读取 |\n| `Optional<ByteBuffer>\
  \ read(String name)` | 将资源内容读取为 `ByteBuffer` |\n| `void release(ByteBuffer bb)`\
  \ | 释放 `ByteBuffer` |\n| `void close()` | 关闭此 `ModuleReader` |\n\n在清单 2-30 中，我使用\
  \ `ModuleReader` 将 `module-info.class` 的内容读取到 `ByteBuffer` 中，然后从这个 `ByteBuffer`\
  \ 创建一个新的 `ModuleDescriptor`。\n\n```\npublic class ModuleReaderTest {\n@Test\npublic\
  \ void testModuleReader() throws Exception {\nfinal ModuleReference reference =\
  \ ModuleTestSupport.getModuleReference();\nassertNotNull(reference);\nfinal ModuleReader\
  \ reader = reference.open();\nfinal Optional byteBuffer = reader.read(\"module-info.class\"\
  );\nassertTrue(byteBuffer.isPresent());\nfinal ModuleDescriptor descriptor = ModuleDescriptor.read(byteBuffer.get());\n\
  assertEquals(ModuleTestSupport.MODULE_NAME, descriptor.name());\n}\n}\n清单 2-30.\n\
  ModuleReader 测试\n```\n\n### `Configuration`\n\n可读性图表示为 `java.lang.module.Configuration`\
  \ 类的对象。一个配置可以有父配置。配置可以组织成层次结构。`Configuration` 具有创建和查询可读性图的方法。\n\n`Configuration`\
  \ 是使用 `resolve()` 和 `resolveAndBind()` 方法创建的。这两个方法都返回一个新的 `Configuration` 对象，表示模块解析的结果。`Configuration`\
  \ 也有这两个方法的静态版本。对于静态方法，你需要提供 `List<Configuration>` 类型的参数，作为所创建 `Configuration` 的父配置。对于实例方法，当前\
  \ `Configuration` 是所创建 `Configuration` 的唯一父配置。以下是创建 `Configuration` 所需的方法：\n\n*\
  \   `Configuration resolve(ModuleFinder before, ModuleFinder after, Collection<String>\
  \ roots)`\n*   `Configuration resolveAndBind(ModuleFinder before, ModuleFinder after,\
  \ Collection<String> roots)`\n*   `static Configuration resolve(ModuleFinder before,\
  \ List<Configuration> parents, ModuleFinder after, Collection<String> roots)`\n\
  *   `static Configuration resolveAndBind(ModuleFinder before, List<Configuration>\
  \ parents, ModuleFinder after, Collection<String> roots)`\n\n`resolveAndBind()`\
  \ 方法接受与 `resolve()` 方法相同的参数。区别在于，`resolveAndBind()` 解析的模块还包括由服务依赖引入的模块。\n\n以下是上述方法的可能参数：\n\
  \n*   `roots`：根模块名称列表。\n*   `parents`：父配置列表。\n*   `before` 和 `after`：用于定位模块的两个 `ModuleFinder`。`ModuleFinder\
  \ before` 用于定位根模块。如果找不到模块，则使用父配置通过 `findModule()` 方法定位。如果仍然找不到模块，则使用 `ModuleFinder\
  \ after` 定位。传递依赖项按照相同的搜索顺序定位。\n\n当根模块或传递依赖项在父配置中被定位时，该模块的解析过程结束，并且该模块不会包含在结果配置中。\n\
  \n清单 2-31 展示了通过在给定路径中查找模块来创建新 `Configuration` 的示例。\n\n```\npublic Configuration\
  \ resolve(final Path path) {\nreturn Configuration.resolve(\nModuleFinder.of(path),\n\
  List.of(Configuration.empty()),\nModuleFinder.ofSystem(),\nList.of(\"io.vividcode.store.runtime\"\
  )\n);\n}\n清单 2-31.\n使用 resolve() 创建新的 Configuration 对象\n```\n\n模块解析过程可能因各种原因失败。如果找不到根模块、直接依赖项或传递依赖项，或者在尝试查找模块时发生任何错误，`resolve()`\
  \ 和 `resolveAndBind()` 方法会抛出 `FindException`。找到所有模块后，会计算可读性图，并检查模块导出和服务使用的一致性。一致性检查包括检查循环模块依赖、重复模块读取、重复包导出以及无效的服务使用。当任何一致性检查失败时，会抛出\
  \ `ResolutionException`。\n\n表 2-8 展示了 `Configuration` 的其他方法。\n\n表 2-8.\n\n`Configuration`\
  \ 的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `static Configuration empty()` | 返回空配置 |\n\
  | `List<Configuration> parents()` | 按搜索顺序返回此配置的父配置列表 |\n| `Optional<ResolvedModule>\
  \ findModule(String name)` | 按名称查找已解析的模块 |\n| `Set<ResolvedModule> modules()` |\
  \ 返回此配置中所有已解析模块的集合 |\n\n对于每个 `ResolvedModule`，`reads()` 方法返回它读取的一组 `ResolvedModule`；其他方法见表\
  \ 2-9。\n\n表 2-9.\n\n\n\n`ResolvedModule` 的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `Configuration\
  \ configuration()` | 返回此已解析模块所属的 `Configuration` |\n| `String name()` | 返回模块名称 |\n\
  | `Set<ResolvedModule> reads()` | 返回此已解析模块所读取的 `ResolvedModule` 集合 |\n| `ModuleReference\
  \ reference()` | 返回指向此模块内容的 `ModuleReference` |\n\n清单 2-32 展示了如何打印可读性图。方法 `sortedModules()`\
  \ 按名称对 `ResolvedModule` 进行排序。在方法 `printLayer()` 中，我获取配置中的所有 `ResolvedModule` 并打印它们的名称。对于每个\
  \ `ResolvedModule`，我还打印出它所读取的 `ResolvedModule`。\n\n```\npublic class ConfigurationPrinter\
  \ {\npublic void printLayer(final Configuration configuration) {\nsortedModules(configuration.modules()).forEach(module\
  \ -> {\nSystem.out.println(module.name());\nprintModule(module);\nSystem.out.println(\"\
  \");\n});\n}\nprivate void printModule(final ResolvedModule module) {\nsortedModules(module.reads())\n\
  .forEach(m -> System.out.println(\"|--\" + m.name()));\n}\nprivate List sortedModules(final\
  \ Set modules) {\nreturn modules\n.stream()\n.sorted(Comparator.comparing(ResolvedModule::name))\n\
  .collect(Collectors.toList());\n}\npublic static void main(final String[] args)\
  \ {\nfinal Configuration configuration = Configuration.resolve(\nModuleFinder.of(Paths.get(args[0])),\n\
  List.of(Configuration.empty()),\nModuleFinder.ofSystem(),\nList.of(\"io.vividcode.store.runtime\"\
  )\n);\nnew ConfigurationPrinter().printLayer(configuration);\n}\n}\n清单 2-32.\n打印可读性图\n\
  ```\n\n清单 2-33 展示了清单 2-32 的输出。它展示了示例应用程序的所有模块。\n\n```\nio.vividcode.store.common\n\
  |--guava\n|--jackson.annotations\n|--jackson.core\n|--jackson.databind\n|--java.base\n\
  |--slf4j.api\n|--slf4j.simple\nio.vividcode.store.common.persistence\n|--guava\n\
  |--io.vividcode.store.common\n|--jackson.annotations\n|--jackson.core\n|--jackson.databind\n\
  |--java.base\n|--slf4j.api\n|--slf4j.simple\nio.vividcode.store.filestore\n|--guava\n\
  |--io.vividcode.store.common\n|--io.vividcode.store.common.persistence\n|--jackson.annotations\n\
  |--jackson.core\n|--jackson.databind\n|--java.base\n|--slf4j.api\n|--slf4j.simple\n\
  io.vividcode.store.product\n|--io.vividcode.store.common\n|--java.base\nio.vividcode.store.product.persistence\n\
  |--io.vividcode.store.common\n|--io.vividcode.store.common.persistence\n|--io.vividcode.store.product\n\
  |--java.base\nio.vividcode.store.runtime\n|--guava\n|--io.vividcode.store.common\n\
  |--io.vividcode.store.common.persistence\n|--io.vividcode.store.filestore\n|--io.vividcode.store.product\n\
  |--io.vividcode.store.product.persistence\n|--jackson.annotations\n|--jackson.core\n\
  |--jackson.databind\n|--java.base\n|--slf4j.api\n|--slf4j.simple\n清单 2-33.\n可读性图的输出\n\
  ```\n\n### 模块层\n\n模块层用于组织模块。模块层由类 `java.lang.ModuleLayer` 表示。\n\n层是通过将 `Configuration`\
  \ 对象中的可读性图映射到负责加载此模块中定义类型的类加载器来创建的。JVM 至少有一个非空层，即 `boot` 层，它在 JVM 启动时创建。大多数应用程序只会使用这个引导层。可以创建额外的层来支持高级用例。一个层可以有多个父层。一个层中的模块也可以读取该层父层中的模块。创建层时，会为配置中的每个\
  \ `ResolvedModule` 创建一个 `java.lang.Module` 对象。\n\n`ModuleLayer` 的静态方法 `boot()` 返回引导层。有三种不同的方法可以从现有的\
  \ `ModuleLayer` 创建新层；请参见表 2-10。现有的 `ModuleLayer` 将成为新创建层的父层。\n\n表 2-10.\n创建新 `ModuleLayer`\
  \ 的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `defineModules(Configuration cf, Function<String,\
  \ ClassLoader> clf)` | 从 `Configuration` 创建一个新的 `ModuleLayer`。对于每个模块，该函数返回映射的 `ClassLoader`。\
  \ |\n| `defineModulesWithOneLoader(Configuration cf, ClassLoader parentLoader)`\
  \ | 从 `Configuration` 创建一个新的 `ModuleLayer`。所有模块使用同一个 `ClassLoader`，并以 `parentLoader`\
  \ 作为父类加载器。 |\n| `defineModulesWithManyLoaders(Configuration cf, ClassLoader parentLoader)`\
  \ | 从 `Configuration` 创建一个新的 `ModuleLayer`。每个模块都有自己的 `ClassLoader`，并以 `parentLoader`\
  \ 作为父类加载器。 |\n\n`ModuleLayer` 也有静态方法 `defineModules()`、`defineModulesWithOneLoader()`\
  \ 和 `defineModulesWithManyLoaders()` 来创建新层。这些方法需要提供父层列表。与那些实例方法相比，这些静态方法返回 `ModuleLayer.Controller`\
  \ 而不是 `ModuleLayer`。`ModuleLayer.Controller` 具有修改层中模块的方法；请参见表 2-11。\n\n表 2-11.\n\
  `ModuleLayer.Controller` 的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `addReads(Module source,\
  \ Module target)` | 更新模块 `source` 以读取模块 `target` |\n| `ModuleLayer.Controller addExports(Module\
  \ source, String pn, Module target)` | 更新模块 `source` 以将包 `pn` 导出到模块 `target` |\n\
  | `ModuleLayer.Controller addOpens(Module source, String pn, Module target)` | 更新模块\
  \ `source` 以将包 `pn` 开放给模块 `target` |\n| `ModuleLayer layer()` | 返回 `ModuleLayer`\
  \ 对象 |\n\n`ModuleLayer` 还有其他方法；请参见表 2-12。\n\n表 2-12.\n`ModuleLayer` 的方法\n\n| 方法\
  \ | 描述 |\n| --- | --- |\n| `static ModuleLayer empty()` | 返回空层。 |\n| `Configuration\
  \ configuration()` | 返回此层的配置。 |\n| `List<ModuleLayer> parents()` | 返回此层的父层列表。 |\n\
  | `Set<Module> modules()` | 返回此层中的模块集合。 |\n| `Optional<Module> findModule(String\
  \ name)` | 返回具有给定名称的模块。还会递归搜索父层，直到找到该模块。 |\n| `ClassLoader findLoader(String name)`\
  \ | 返回具有给定名称的模块的 `ClassLoader`。父层的搜索方式与 `findModule()` 相同。 |\n\n类 `Module` 表示一个运行时模块。它可以用于检索模块的信息，并在需要时修改它。表\
  \ 2-13 展示了 `Module` 的方法。\n\n表 2-13.\n`Module` 的方法\n\n\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| `String getName()` | 返回此模块的名称，对于未命名模块返回 `null` |\n| `Set<String> getPackages()`\
  \ | 返回此模块中的包名集合 |\n| `ModuleDescriptor getDescriptor()` | 返回描述此模块的 `ModuleDescriptor`\
  \ 对象，对于未命名模块返回 `null` |\n| `boolean isNamed()` | 检查模块是否已命名 |\n| `boolean isExported(String\
  \ pn)` | 检查模块是否无条件导出包 `pn` |\n| `boolean isExported(String pn, Module other)` |\
  \ 检查模块是否将包 `pn` 导出到指定模块 `other` |\n| `boolean isOpen(String pn)` | 检查模块是否无条件开放包\
  \ `pn` |\n| `boolean isOpen(String pn, Module other)` | 检查模块是否将包 `pn` 开放给指定模块 `other`\
  \ |\n| `boolean canRead(Module other)` | 检查模块是否读取指定模块 `other` |\n| `boolean canUse(Class<?>\
  \ service)` | 检查模块是否使用指定的服务类 |\n| `Module addExports(String pn, Module other)` |\
  \ 更新此模块，将指定包 `pn` 导出到指定模块 `other` |\n| `Module addOpens(String pn, Module other)`\
  \ | 更新此模块，将指定包 `pn` 开放给指定模块 `other` |\n| `Module addUses(Class<?> service)` | 更新此模块，添加对指定服务类型的服务依赖\
  \ |\n| `Module addReads(Module other)` | 更新此模块，使其读取指定模块 `other` |\n| `ClassLoader\
  \ getClassLoader()` | 获取此模块的类加载器 |\n| `ModuleLayer getLayer()` | 返回包含此模块的模块层 |\n\
  | `InputStream getResourceAsStream(String name)` | 返回一个输入流，用于读取模块中的资源 |\n\n当使用 `getResourceAsStream()`\
  \ 读取模块中的资源时，该资源可能被封装，导致其他模块中的代码无法定位到它。类文件不会被封装。对于其他资源，首先会根据资源名称推导出包名。如果该包名存在于模块中（即它属于\
  \ `getPackages()` 返回的包名集合），那么调用者代码必须位于该包已对其开放的模块中。\n\n现在，我将用一个示例来演示如何使用 `ModuleLayer`\
  \ 让同一模块的多个版本在同一应用程序中共存。在模块 `demo` 中，我有一个简单的 Java `Version` 类，它包含静态方法 `getVersion()`\
  \ 用于返回版本字符串；参见代码清单 2-34。对于模块版本 `1.0.0`，版本字符串是 `1.0.0`；对于模块版本 `2.0.0`，版本字符串更新为 `2.0.0`。\n\
  \n```\npackage io.vividcode.demo.version;\npublic class Version {\npublic static\
  \ String getVersion() {\nreturn \"1.0.0\";\n}\n}\n代码清单 2-34.\n模块 demo 中的 Version\
  \ 类\n```\n\n我还有另一个模块 `runtime`，它依赖于模块 `demo`。代码清单 2-35 展示了输出版本字符串的 `Main` 类。\n\n\
  ```\npackage io.vividcode.demo.runtime;\nimport io.vividcode.demo.version.Version;\n\
  public class Main {\npublic static void main(final String[] args) {\nSystem.out.println(Version.getVersion());\n\
  }\n}\n代码清单 2-35.\n模块 runtime 中的 Main 类\n```\n\n模块 `runtime` 和模块 `demo` 的两个版本被打包成\
  \ JAR 文件。如果你将这三个 JAR 文件放在同一个目录 `dist` 下，并使用以下命令运行模块 `runtime`，你会发现该命令无法运行。\n\n```\n\
  $ java -p dist -m runtime\n```\n\n该命令会因以下错误而失败。这是因为同一模块 `demo` 的两个版本出现在了模块路径的同一目录中。\n\
  \n```\nError occurred during initialization of boot layer\njava.lang.module.FindException:\
  \ Two versions of module demo found in dist (demo-2.0.0.jar and demo-1.0.0.jar)\n\
  ```\n\n如果你将 `demo-1.0.0.jar` 和 `demo-2.0.0.jar` 放入不同的目录，并按如下所示更新模块路径，输出将是 `1.0.0`，因为\
  \ `demo-1.0.0.jar` 被首先找到。\n\n```\n$ java -p dist:dist/v1:dist/v2 -m runtime\n```\n\
  \n如果你按如下所示更改模块路径中 `dist/v1` 和 `dist/v2` 的顺序，输出将是 `2.0.0`，因为 `demo-2.0.0.jar` 被首先找到。\n\
  \n```\n$ java -p dist:dist/v2:dist/v1 -m runtime\n```\n\n如果你希望两个版本在同一个 JVM 中运行，可以使用\
  \ OSGi 或创建自定义类加载器。在 Java 9 中，你可以使用 `ModuleLayer`。代码清单 2-35 展示了使用 `ModuleLayer` 的\
  \ `Main` 类的更新版本。在方法 `createLayer()` 中，`path` 是包含模块 `demo` 工件的目录路径。在这段代码中，我创建了一个\
  \ `Configuration`，它使用 `ModuleFinder` 仅在此路径中搜索。父 `Configuration` 来自启动层。然后，我使用 `defineModulesWithOneLoader()`\
  \ 从 `Configuration` 创建模块层，并使用系统类加载器作为唯一 `ClassLoader` 对象的父类加载器。创建的 `ModuleLayer`\
  \ 使用启动层作为其父层。\n\n创建模块层后，方法 `showVersion()` 使用 `findLoader()` 查找模块的 `ClassLoader`，然后使用反射\
  \ API 加载类并调用方法 `getVersion()`；参见代码清单 2-36。如果你运行 `Main` 类，可以看到两个版本字符串都被显示出来。\n\n\
  ```\nimport java.lang.module.Configuration;\nimport java.lang.module.ModuleFinder;\n\
  import java.lang.reflect.Method;\nimport java.nio.file.Path;\nimport java.nio.file.Paths;\n\
  import java.util.Set;\npublic class Main {\nprivate static final String MODULE_NAME\
  \ = \"demo\";\nprivate static final String CLASS_NAME = \"io.vividcode.demo.version.Version\"\
  ;\nprivate static final String METHOD_NAME = \"getVersion\";\npublic static void\
  \ main(final String[] args) {\nfinal Main main = new Main();\nmain.load(Paths.get(\"\
  dist\", \"v1\"));\nmain.load(Paths.get(\"dist\", \"v2\"));\n}\npublic void load(final\
  \ Path path) {\nshowVersion(createLayer(path));\n}\nprivate void showVersion(final\
  \ ModuleLayer moduleLayer) {\ntry {\nfinal Class clazz = moduleLayer.findLoader(MODULE_NAME)\n\
  .loadClass(CLASS_NAME);\nfinal Method method = clazz.getDeclaredMethod(METHOD_NAME);\n\
  System.out.println(method.invoke(null));\n} catch (final Exception e) {\ne.printStackTrace();\n\
  }\n}\nprivate ModuleLayer createLayer(final Path path) {\nfinal ModuleLayer parent\
  \ = ModuleLayer.boot();\nfinal Configuration configuration = parent.configuration().resolve(\n\
  ModuleFinder.of(path),\nModuleFinder.of(),\nSet.of(MODULE_NAME)\n);\nreturn parent.defineModulesWithOneLoader(configuration,\n\
  ClassLoader.getSystemClassLoader());\n}\n}\n代码清单 2-36.\n使用 ModuleLayer 加载模块\n```\n\
  \n\n\n### 类加载器\n\nOSGi 使用复杂的类加载器层级结构，使得同一 Bundle 的不同版本能在运行时共存。JPMS 则采用简单的类加载策略。每个模块拥有自己的类加载器，负责加载该模块中的所有类型。一个类加载器可以加载来自一个或多个模块的类型。一个模块中的所有类型应由同一个类加载器加载。\n\
  \n在 Java 9 之前，Java 运行时包含三个内置的类加载器：\n\n*   **启动类加载器**：JVM 内置的类加载器，通常表示为 `null`。它没有父加载器。\n\
  *   **扩展类加载器**：从扩展目录加载类。它是 JDK 1.2 引入的扩展机制的产物。其父加载器是启动类加载器。\n*   **系统或应用程序类加载器**：从应用程序的类路径加载类。其父加载器是扩展类加载器。\n\
  \n清单 2-37 中的代码输出了类加载器的层级结构。\n\n```\nClassLoader classLoader = ClassLoaderMain.class.getClassLoader();\n\
  while (classLoader != null) {\nSystem.out.println(classLoader);\nclassLoader = classLoader.getParent();\n\
  }\n清单 2-37.\n输出类加载器层级结构\n```\n\n当你在 Java 8 上运行清单 2-37 中的代码时，会显示以下输出。`AppClassLoader`\
  \ 和 `ExtClassLoader` 分别是系统类加载器和扩展类加载器的类。启动类加载器表示为 `null`，因此未显示。\n\n```\nsun.misc.Launcher$AppClassLoader@18b4aac2\n\
  sun.misc.Launcher$ExtClassLoader@60e53b93\n```\n\n在 Java 9 中，扩展机制已被升级模块路径取代。扩展类加载器为了向后兼容性而保留，但已重命名为平台类加载器。可以通过\
  \ `ClassLoader` 的 `getPlatformClassLoader()` 方法获取它。以下是 Java 9 中的内置类加载器：\n\n*   **启动类加载器**：定义核心\
  \ Java SE 和 JDK 模块\n*   **平台类加载器**：定义选定的 Java SE 和 JDK 模块\n*   **系统或应用程序类加载器**：定义类路径上的类和模块路径中的模块\n\
  \n在 Java 9 中，平台类加载器和系统类加载器不再是 `URLClassLoader` 的实例。这影响了一种流行的技巧（[`https://stackoverflow.com/a/7884406`](https://stackoverflow.com/a/7884406)），该技巧用于动态地向系统类加载器的搜索路径添加新条目。如清单\
  \ 2-38 所示，这种 hack 将系统类加载器转换为 `URLClassLoader` 并调用其方法 `addURL()`。这在 Java 9 中不再有效，因为转换为\
  \ `URLClassLoader` 会失败。\n\n```\npublic static void addPath(String s) throws Exception\
  \ {\nFile f = new File(s);\nURL u = f.toURL();\nURLClassLoader urlClassLoader =\
  \ (URLClassLoader)\nClassLoader.getSystemClassLoader();\nClass urlClass = URLClassLoader.class;\n\
  Method method = urlClass.getDeclaredMethod(\"addURL\", new Class[]{URL.class});\n\
  method.setAccessible(true);\nmethod.invoke(urlClassLoader, new Object[]{u});\n}\n\
  清单 2-38.\n向 URLClassLoader 添加路径\n```\n\n每个类加载器都有自己的未命名模块，可以通过 `ClassLoader` 的 `getUnnamedModule()`\
  \ 方法获取。如果类加载器加载的类型未在命名模块中定义，则该类型被认为位于该类加载器的未命名模块中。我们之前讨论的未命名模块实际上是应用程序类加载器的未命名模块。\n\
  \n在 Java 9 中，类加载器具有名称。名称在构造函数中指定，并可通过 `getName()` 方法获取。平台类加载器的名称是 `platform`，而应用程序类加载器的名称是\
  \ `app`。新的类加载器名称在调试与类加载器相关的问题时会很有用。\n\n```\n@Test\npublic void testClassLoaderName()\
  \ {\nClassLoader classLoader = ClassLoaderTest.class.getClassLoader();\nfinal List\
  \ names = Lists.newArrayList();\nwhile (classLoader != null) {\nnames.add(classLoader.getName());\n\
  classLoader = classLoader.getParent();\n}\nassertEquals(2, names.size());\nassertEquals(\"\
  app\", names.get(0));\nassertEquals(\"platform\", names.get(1));\n}\n清单 2-39.\n\
  测试类加载器名称\n```\n\n新方法 `Class<?> findClass(String moduleName, String name)` 在此类加载器定义的模块中查找具有给定二进制名称的类。如果模块名称为\
  \ `null`，则在此类加载器的未命名模块中查找该类。如果找不到该类，此方法返回 `null` 而不是抛出 `ClassNotFoundException`。新方法\
  \ `URL findResource(String moduleName, String name)` 返回为此类加载器定义的模块中具有给定名称的资源的 URL。方法\
  \ `Module.getResourceAsStream()` 实际上使用模块类加载器的此方法先获取 `URL`，然后打开输入流。方法 `findClass()`\
  \ 和 `findResource()` 都是受保护的，应由类加载器实现覆盖。\n\n`ClassLoader` 已有方法 `Enumeration<URL>\
  \ getResources(String name)` 来查找所有具有给定名称的资源。新方法 `Stream<URL> resources(String name)`\
  \ 具有相同的功能，但它返回一个 `Stream<URL>`。\n\nJava 9 在访问资源时增加了一项新限制，该限制与模块声明强制执行的访问控制规则相匹配。命名模块中的资源受\
  \ `Module.getResourceAsStream()` 方法中指定的封装规则约束。对于非类资源，`ClassLoader` 中的相关方法只能在包无条件开放时找到该包中的资源。\n\
  \n例如，模块 `io.vividcode.store.common` 在目录 `config` 中有一个属性文件 `application.properties`。此资源的包名是\
  \ `config`。如果包 `config` 未在模块声明中声明为 `open`，则无法使用这些与资源相关的方法定位它。\n\n在清单 2-40 中，我首先获取模块\
  \ `io.vividcode.store.common` 的 `Module` 对象，然后获取其类加载器，并使用 `resources()` 方法列出所有名称为\
  \ `config/application.properties` 的资源。这里包 `config` 必须是开放的，否则 `resources()` 方法会返回一个空流。\n\
  \n```\npublic class ResourceTest {\n@Test\npublic void testResources() throws URISyntaxException\
  \ {\nfinal Optional moduleOpt = ModuleTestSupport.getModule();\nassertTrue(moduleOpt.isPresent());\n\
  final Module module = moduleOpt.get();\nassertTrue(module.isOpen(\"config\"));\n\
  assertTrue(module\n.getClassLoader()\n.resources(\"config/application.properties\"\
  )\n.count() > 0\n);\n}\n}\n清单 2-40.\n测试 ClassLoader.resources()\n```\n\n新方法 `Package[]\
  \ getDefinedPackages()` 返回由此类加载器定义的所有 `Package`，而 `Package getDefinedPackage(String\
  \ name)` 返回由此类加载器定义的给定名称的 `Package`。在清单 2-41 中，要测试的类加载器实际上是系统类加载器，因此它定义了应用程序包，但不定义像\
  \ `java.lang` 这样的包。\n\n```\n@Test\npublic void testGetDefinedPackages() {\nfinal\
  \ ClassLoader classLoader = ClassLoaderTest.class.getClassLoader();\nfinal Package[]\
  \ packages = classLoader.getDefinedPackages();\nassertTrue(Stream.of(packages)\n\
  .map(Package::getName)\n.noneMatch(Predicate.isEqual(\"java.lang\")));\nassertTrue(Stream.of(packages)\n\
  .map(Package::getName)\n.anyMatch(Predicate.isEqual(\"io.vividcode.feature9.module\"\
  )));\nassertNull(classLoader.getDefinedPackage(\"java.lang\"));\nassertNotNull(\n\
  classLoader.getDefinedPackage(\"io.vividcode.feature9.module\"));\n}\n清单 2-41.\n\
  测试 ClassLoader.getDefinedPackages()\n```\n\n\n\n### 类\n\n随着模块的引入，`Class` 新增了与模块相关的方法。`Class<?>\
  \ forName(Module module, String name)` 返回指定模块中具有给定二进制名称的 `Class`。此方法委托给该模块的类加载器进行类加载。与\
  \ `ClassLoader` 的 `findClass()` 方法类似，`forName()` 在失败时返回 `null`，而不是抛出 `ClassNotFoundException`。由于一个类加载器可以为多个模块定义类，因此定义的类可能实际上来自不同的模块。在这种情况下，该方法在类加载后也会返回\
  \ `null`。\n\n由于每个类型现在都位于某个模块中，`Class` 新增了一个方法 `getModule()`，用于返回表示其所属模块的 `Module`\
  \ 对象。如果此类表示数组类型，则此方法返回元素类型的 `Module` 对象。如果此类表示基本类型或 `void`，则返回 `java.base` 模块的 `Module`\
  \ 对象。如果此类位于未命名模块中，则返回此类类加载器的 `getUnnamedModule()` 的结果。清单 2-42 展示了与 `Class.getModule()`\
  \ 相关的测试。\n\n```\n@Test\npublic void testGetModule() {\nassertEquals(\"java.sql\"\
  , Driver.class.getModule().getName());\nassertEquals(\"java.base\", String[].class.getModule().getName());\n\
  assertEquals(\"java.base\", int.class.getModule().getName());\nassertEquals(\"java.base\"\
  , void.class.getModule().getName());\n}\n清单 2-42.\n测试 Class.getModule()\n```\n\n\
  新方法 `String getPackageName()` 返回类的完全限定包名。如果此类表示数组类型，则此方法返回元素类型的包名。如果此类表示基本类型或 `void`，则返回包名\
  \ `java.lang`。否则，包名通过保留 `Class.getName()` 返回的类名中最后一个点号（`.`）之前的字符来派生。清单 2-43 展示了与\
  \ `Class.getPackageName()` 相关的测试。\n\n```\n@Test\npublic void testGetPackageName()\
  \ {\nassertEquals(\"java.sql\", Driver.class.getPackageName());\nassertEquals(\"\
  java.lang\", String[].class.getPackageName());\nassertEquals(\"java.lang\", int.class.getPackageName());\n\
  assertEquals(\"java.lang\", void.class.getPackageName());\n}\n清单 2-43.\n测试 Class.getPackageName()\n\
  ```\n\n### 反射\n\n在上一节中，我向你展示了如何使用 `ServiceLoader` 加载服务接口的提供者类。许多框架使用类似的模式和反射 API\
  \ 来按名称动态加载类并实例化它们。客户端可以通过配置向框架提供类名。框架使用 `Class.forName()` 加载该类，并使用 `Class` 对象的 `newInstance()`\
  \ 方法实例化它。\n\n这种模式在模块系统中可能会出现问题。实际的类可能从未命名模块或其他命名模块加载。如果实际的类从未命名模块加载，则实例化会失败，因为框架的模块无法读取未命名模块。如果实际的类从另一个命名模块加载，框架的模块不可能知道客户端模块的存在并声明对它们的依赖，这实际上颠倒了依赖关系。为了使这正常工作，反射\
  \ API 有一个隐式约定，即假设任何反射类型的代码都位于一个读取定义此类型的模块的模块中。反射 API 可以访问该类型。\n\n在清单 2-44 中，我在一个命名模块中使用反射\
  \ API 加载 Guava 类 `com.google.common.eventbus.EventBus` 并实例化一个新实例。Guava 库被放置在类路径中，因此它位于未命名模块中。`clazz.getModule()`\
  \ 的输出类似于 `unnamed module @1623b78d`，这确认了该类位于未命名模块中。实例化成功，你可以看到类似 `EventBus{default}`\
  \ 的输出。\n\n```\ntry {\nfinal Class clazz = Class.forName(\"com.google.common.eventbus.EventBus\"\
  );\nSystem.out.println(clazz.getModule());\nfinal Object instance = clazz.getDeclaredConstructor().newInstance();\n\
  System.out.println(instance);\n} catch (final Exception e) {\ne.printStackTrace();\n\
  }\n清单 2-44.\n使用反射 API 实例化一个实例\n```\n\n注意\n\n方法 `Class.newInstance()` 在 Java 9 中已被弃用。在清单\
  \ 2-44 中，我使用 `clazz.getDeclaredConstructor().newInstance()` 来获取构造器，然后使用它来实例化新实例。\n\
  \n\n\n### 自动模块名称\n\n前面我提到了自动模块的名称。如果在 JAR 文件的清单中未找到 `Automatic-Module-Name` 属性，则模块名称将从文件名中派生。模块名称的确定遵循以下步骤。\n\
  \n1.  移除后缀 `.jar`。\n2.  尝试将文件名与正则表达式模式 `-(\\\\d+(\\\\.|$))` 进行匹配。如果模式匹配，则匹配位置之前的子字符串被视为模块名称的候选，而连字符（`-`）之后的子字符串则被解析为版本。如果版本无法解析，则忽略它。如果模式不匹配，则整个文件名被视为模块名称的候选。\n\
  3.  清理模块名称的候选，以创建一个有效的模块名称。模块名称中的所有非字母数字字符（`[^A-Za-z0-9]`）都将替换为点号（`.`），所有重复的点号将替换为一个点号，并移除所有前导和尾随的点号。\n\
  \n如果你有兴趣了解这些步骤的实际实现，请查看 `java.base` 模块中 `jdk.internal.module.ModulePath` 类的 `ModuleDescriptor\
  \ deriveModuleDescriptor(JarFile jf)` 方法。版本字符串的解析是使用 `ModuleDescriptor.Version`\
  \ 的静态方法 `Version parse(String v)` 完成的。清单 2-45 中的代码也实现了相同的算法。\n\n表 2-14 展示了一些从 JAR\
  \ 文件名派生自动模块名称的示例。\n\n表 2-14.\n\n从 JAR 文件名派生自动模块名称的示例\n\n| 文件名 | 模块名称 | 版本 |\n| ---\
  \ | --- | --- |\n| `mylib.jar` | `mylib` | `null` |\n| `slf4j-api-1.7.25.jar` |\
  \ `slf4j.api` | `1.7.25` |\n| `hibernate-jpa-2.1-api-1.0.0.Final.jar` | `hibernate.jpa`\
  \ | `2.1-api-1.0.0.Final` |\n| `spring-context-support-4.3.6.RELEASE.jar` | `spring.context.support`\
  \ | `4.3.6.RELEASE` |\n\n清单 2-45 展示了用于派生表 2-14 中所示自动模块名称的代码。\n\n```\npublic class\
  \ DeriveAutomaticModuleName {\nstatic final Pattern DASH_VERSION = Pattern.compile(\"\
  -(\\\\d+(\\\\.|$))\");\nstatic final Pattern NON_ALPHANUM = Pattern.compile(\"[^A-Za-z0-9]\"\
  );\nstatic final Pattern REPEATING_DOTS = Pattern.compile(\"(\\\\.)(\\\\1)+\");\n\
  static final Pattern LEADING_DOTS = Pattern.compile(\"^\\\\.\");\nstatic final Pattern\
  \ TRAILING_DOTS = Pattern.compile(\"\\\\.$\");\npublic Tuple2 deriveModuleName(final\
  \ String fileName) {\nObjects.requireNonNull(fileName);\nString name = fileName;\n\
  String version = null;\nif (fileName.endsWith(\".jar\")) {\nname = fileName.substring(0,\
  \ fileName.length() - 4);\n}\nfinal Matcher matcher = DASH_VERSION.matcher(name);\n\
  if (matcher.find()) {\nfinal int start = matcher.start();\ntry {\nfinal String tail\
  \ = name.substring(start + 1);\nModuleDescriptor.Version.parse(tail);\nversion =\
  \ tail;\n} catch (final IllegalArgumentException ignore) {\n}\nname = name.substring(0,\
  \ start);\n}\nreturn Tuple.of(cleanModuleName(name), version);\n}\npublic void displayModuleName(final\
  \ String fileName) {\nfinal Tuple2 result = deriveModuleName(fileName);\nSystem.out.printf(\"\
  %s => %s [%s]%n\", fileName, result._1, result._2);\n}\nprivate String cleanModuleName(String\
  \ mn) {\n// replace non-alphanumeric\nmn = NON_ALPHANUM.matcher(mn).replaceAll(\"\
  .\");\n// collapse repeating dots\nmn = REPEATING_DOTS.matcher(mn).replaceAll(\"\
  .\");\n// drop leading dots\nif (mn.length() > 0 && mn.charAt(0) == '.') {\nmn =\
  \ LEADING_DOTS.matcher(mn).replaceAll(\"\");\n}\n// drop trailing dots\nfinal int\
  \ len = mn.length();\nif (len > 0 && mn.charAt(len - 1) == '.') {\nmn = TRAILING_DOTS.matcher(mn).replaceAll(\"\
  \");\n}\nreturn mn;\n}\npublic static void main(final String[] args) {\nfinal DeriveAutomaticModuleName\
  \ moduleName = new DeriveAutomaticModuleName();\nmoduleName.displayModuleName(\"\
  mylib.jar\");\nmoduleName.displayModuleName(\"slf4j-api-1.7.25.jar\");\nmoduleName.displayModuleName(\"\
  hibernate-jpa-2.1-api-1.0.0.Final.jar\");\nmoduleName.displayModuleName(\"spring-context-support-4.3.6.RELEASE.jar\"\
  );\n}\n}\n清单 2-45.\n派生自动模块名称\n```\n\n如果使用清单属性 `Automatic-Module-Name` 指定了模块名称，则直接使用该名称。如果指定的模块名称无效，则在加载模块时会抛出\
  \ `FindException`。\n\n## 模块工件\n\n模块被打包为模块工件。有两种类型的模块工件：JAR 文件和 JMOD 文件。\n\n### JAR\
  \ 文件\n\n模块化 JAR 文件就是在其根目录中包含 `module-info.class` 文件的 JAR 文件，因此你可以使用现有的 `jar` 工具来创建模块化\
  \ JAR 文件。`jar` 工具还添加了新选项，用于将附加信息插入到模块描述符中。\n\n*   `-e`，`--main-class=CLASSNAME`\
  \ 将入口点类记录在 `module-info.class` 文件中。这实际上是一个旧选项，它将主类记录在清单文件中。\n*   `--module-version=VERSION`\
  \ 将 `VERSION` 记录在 `module-info.class` 文件中，作为模块的版本。\n*   `--hash-modules=PATTERN`\
  \ 将依赖于该模块的模块的哈希值记录在 `module-info.class` 文件中。仅记录名称与 `PATTERN` 指定的正则表达式匹配的模块的哈希值。\n\
  *   `-d`，`--describe-module` 打印模块描述符或自动模块的名称。\n\n你可以使用清单 2-46 中的命令为模块 `io.vividcode.store.runtime`\
  \ 创建一个模块化 JAR 文件。这里我指定了模块版本和主类。\n\n```\n$ jar --create --file target/runtime-1.0.0.jar\
  \ \\\n--main-class io.vividcode.store.runtime.Main \\\n--module-version 1.0.0 \\\
  \n-C target/classes .\n清单 2-46.\n使用 jar 创建模块工件\n```\n\n然后你可以打印出所创建 JAR 文件的详细信息。\n\
  \n```\n$ jar -d -f target/runtime.jar\n```\n\n清单 2-47 展示了此命令的输出。\n\n```\nmodule\
  \ io.vividcode.store.runtime@1.0.0 (module-info.class)\nrequires io.vividcode.store.filestore\n\
  requires io.vividcode.store.product.persistence\nrequires mandated java.base\nrequires\
  \ slf4j.simple\ncontains io.vividcode.store.runtime\nmain-class io.vividcode.store.runtime.Main\n\
  清单 2-47.\njar -d 的输出\n```\n\n要使用 `--hash-modules` 记录模块哈希值，你还需要使用 `-p` 或 `--module-path`\
  \ 为 `jar` 工具提供模块路径，以便定位模块。\n\n\n\n### JMOD 文件\n\nJMOD 文件是在 Java 9 中引入的，用于打包 JDK\
  \ 模块。与 JAR 文件相比，JMOD 文件可以包含原生代码、配置文件和其他类型的数据。图 2-3 展示了 JDK 的 `jmods` 目录中的 JMOD 文件。\n\
  \n![A459620_1_En_2_Fig3_HTML.jpg](img/A459620_1_En_2_Fig3_HTML.jpg)\n\n图 2-3.\n\n\
  JDK JMOD 文件\n\n开发者也可以使用新的 `jmod` 工具，通过 JMOD 文件来打包模块文件。\n\n你可以使用以下 `jmod list` 命令来列出\
  \ `java.base` 模块的 JMOD 文件中所有条目的名称。\n\n```\n$ jmod list /jmods/java.base.jmod\n```\n\
  \n此 JMOD 文件包含表 2-15 中列出的目录。\n\n表 2-15.\n\nJMOD 文件中的目录\n\n| 目录名称 | 文件 |\n| --- |\
  \ --- |\n| `classes/` | Java 类文件 |\n| `conf/` | 配置文件 |\n| `include/` | 头文件 |\n|\
  \ `legal/` | 法律文件 |\n| `bin/` | 可执行二进制文件 |\n| `lib/` | 原生库 |\n\n其他模块，例如 `java.sql`\
  \ 和 `java.xml`，可能只包含 `classes` 和 `legal` 目录。\n\n命令 `jmod describe` 会打印出模块的详细信息，这与\
  \ `jar -d` 类似。\n\n```\n$ jmod describe /jmods/java.base.jmod\n```\n\n命令 `jmod extract`\
  \ 会将所有文件提取到目标目录。\n\n```\n$ jmod extract /jmods/java.sql.jmod --dir \n```\n\n命令 `jmod\
  \ create` 用于创建 JMOD 文件。你可以使用不同的选项来提供各类文件的路径；参见表 2-16。\n\n表 2-16.\n\n`jmod` 的选项\n\
  \n| 选项 | 描述 |\n| --- | --- |\n| `--class-path` | 包含 Java 类文件的 JAR 文件或目录 |\n| `--cmds`\
  \ | 原生命令的路径 |\n| `--config` | 配置文件的路径 |\n| `--header-files` | 头文件的路径 |\n| `--legal-notices`\
  \ | 法律文件的路径 |\n| `--libs` | 原生库的路径 |\n| `--man-pages` | 手册页的路径 |\n\n`jmod create`\
  \ 还支持 `--main-class` 和 `--module-version` 选项。`--os-arch` 和 `--os-name` 选项可用于指定操作系统架构和名称。清单\
  \ 2-48 展示了如何使用 `jmod` 创建一个 JMOD 文件。\n\n```\n$ jmod create --class-path target/classes\
  \ \\\n--main-class io.vividcode.store.runtime.Main \\\n--module-version 1.0.0 \\\
  \n--os-arch x86_64 \\\n--os-name \"Mac OS X\" \\\ntarget/runtime-1.0.0.jmod\n清单\
  \ 2-48.\n使用 jmod 创建模块工件\n```\n\n### JDK 模块\n\n在 Java 9 中，JDK 本身被组织成多个模块。目前 JDK 中有\
  \ 94 个模块。这些模块有四种不同的前缀来表示它们的分组；参见表 2-17。\n\n表 2-17.\n\nJDK 模块的分组\n\n| 分组 | 描述 |\n\
  | --- | --- |\n| `java.` | 标准 Java 模块，例如 `java.base`、`java.logging`、`java.sql` 和\
  \ `java.xml` |\n| `javafx.` | JavaFX 模块，例如 `javafx.base`、`javafx.deploy` 和 `javafx.media`\
  \ |\n| `jdk.` | JDK 实现的一部分，例如 `jdk.compiler`、`jdk.charsets`、`jdk.accessibility`\
  \ 和 `jdk.management` |\n| `oracle.` | Oracle 模块，例如 `oracle.desktop` 和 `oracle.net`\
  \ |\n\n## 常见问题\n\n随着模块系统的引入，可能会出现一些常见问题。你已经看到了一个潜在问题——平台类加载器和应用程序类加载器不再是 `URLClassLoader`\
  \ 的实例。还有其他一些你可能需要注意的潜在问题。\n\n修饰符 `public` 不再保证程序元素在任何地方都可访问。可访问性现在取决于与模块系统相关的各种条件，包括包是否被导出或开放，以及其模块是否可以被包含尝试访问它的代码的模块读取。\n\
  \n如果一个包同时定义在命名模块和类路径中，那么类路径上的包将被忽略。例如，包 `javax.transaction` 定义在模块 `java.transaction`\
  \ 中。如果模块 `java.transaction` 在模块路径中，并且包含相同包 `javax.transaction` 的 JAR 文件 `javax.transaction-api-1.2.jar`\
  \ 也在类路径上，那么该 JAR 文件中的类将被忽略。这就是为什么你在运行 Spring JPA 应用程序时可能会遇到错误 `java.lang.ClassNotFoundException:\
  \ javax.transaction.SystemException`。解决方案是从模块路径中移除模块 `java.transaction`，或者将 JAR\
  \ 文件放入升级模块路径以覆盖内置模块。\n\n定义 Java EE API 或主要与 Java EE 应用程序相关的 API 的模块已被弃用，并将在未来版本中移除。默认情况下，类路径上的代码不会解析这些模块。未命名模块的默认根模块集基于\
  \ `java.se` 模块。`java.se` 模块仅需要清单 2-49 中列出的模块。\n\n```\njava.compiler\njava.datatransfer\n\
  java.desktop\njava.instrument\njava.logging\njava.management\njava.management.rmi\n\
  java.naming\njava.prefs\njava.rmi\njava.scripting\njava.security.jgss\njava.security.sasl\n\
  java.sql\njava.sql.rowset\njava.xml\njava.xml.crypto\n清单 2-49.\njava.se 模块所需的模块\n\
  ```\n\n清单 2-50 中列出的模块是 `java.se.ee` 模块所需的，因此默认情况下，未命名模块中的代码无法访问这些模块中定义的 API。\n\n\
  ```\njava.activation\njava.corba\njava.transaction\njava.xml.bind\njava.xml.ws\n\
  java.xml.ws.annotation\n清单 2-50.\njava.se.ee 模块所需的模块\n```\n\n如果项目使用了清单 2-50 中模块的类，代码将无法编译。你需要更新\
  \ Java 编译器选项，添加 `--add-modules java.se.ee` 以包含 `java.se.ee` 模块。\n\n默认情况下，JDK 的大部分内部\
  \ API 在编译时是不可访问的。其中一些内部 API，特别是 `sun.misc` 包，已被一些流行的库使用。在 JDK 9 中，非关键的内部 API（例如\
  \ `sun.misc.BASE64Decoder`）被封装起来，默认不可访问。关键的内部 API（例如 `sun.misc.Unsafe` 和 `sun.reflect.Reflection`）则未被封装。这些\
  \ API 定义在 JDK 特定模块 `jdk.unsupported` 中。如果你的项目需要使用这些包，你可以让你的模块 `requires jdk.unsupported`。对于那些被封装的内部\
  \ API，可以在必要时使用 `--add-exports` 和 `--add-opens` 使其可访问。\n\n选项 `-Xbootclasspath` 和\
  \ `-Xbootclasspath/p` 已被移除。JDK 特定的系统属性 `sun.boot.class.path` 也已被移除。这是因为引导类路径默认为空，因为引导类是从模块加载的。如果代码依赖于引导类路径，它可能无法在\
  \ JDK 9 上运行。例如，Elasticsearch 1.7.1 中的类 `org.elasticsearch.monitor.jvm.JvmInfo` 尝试通过方法\
  \ `getBootClassPath()` 从 JMX Bean `java.lang.management.RuntimeMXBean` 获取引导类路径。在\
  \ Java 9 中，此方法直接抛出 `UnsupportedOperationException`。这导致 Elasticsearch 1.7.1 在 JDK\
  \ 9 上运行时启动失败。正确的实现应该在调用 `getBootClassPath()` 之前先检查方法 `boolean isBootClassPathSupported()`。\n\
  \n## 迁移实践\n\n现在你已经了解了 Java 9 模块系统中的所有重要概念，你就有了一条清晰的路径来迁移现有应用程序以使用模块。\n\n\n\n###\
  \ 使用 Java 9 构建项目\n\n在将代码迁移到 Java 9 之前，你应该先在 Java 9 上构建并运行项目。这需要对现有的构建工具进行配置更改。对于\
  \ Maven，你需要将 Maven 编译器插件升级到最新版本，并将 `source` 和 `target` 配置设置为 `9`。对于 Gradle，你需要将\
  \ Java 插件的属性 `sourceCompatibility` 和 `targetCompatibility` 更新为 `9`。你还应将 Maven 或\
  \ Gradle 插件升级到最新版本，以便更好地支持 Java 9。\n\n更新配置后，尝试运行构建。你可能会遇到构建工具的问题，特别是因为 Java 9 刚刚发布，构建工具需要时间来提供对其的支持。在撰写本文时，Gradle\
  \ 4.2 尚未提供对 Java 9 模块的一流支持。你可能需要为各种问题寻找变通方法。或者，你可以等到构建工具的支持成熟后再开始迁移。正如我之前提到的，Java\
  \ 9 在运行之前编写的应用程序方面没有问题。\n\n使用 Java 9 构建项目时，你可能会遇到一些错误。这些错误大多与类访问和反射有关。这是因为模块具有更严格的访问控制。选项\
  \ `--illegal-access` 的默认值是 `permit`，因此 Java 9 已经允许类路径上的代码执行非法访问。在这种默认模式下，大多数与反射相关的问题都可以解决。JVM\
  \ 会输出关于非法访问的警告消息，但应用程序可以启动。\n\n### 迁移路径\n\n在你能成功使用 JDK 9 构建项目后，就可以开始迁移过程了。以下是将现有应用程序迁移到模块的基本步骤。\n\
  \n1.  将现有的第三方库添加到模块路径中。如果你使用的是 Maven 或 Gradle 等构建工具，可能无需执行任何操作。这些工具应该已经为你处理好了。如果你使用的是\
  \ JDK 工具，则可以使用 `--module-path` 或 `-p` 指定模块路径，然后指向库的目录。将库放入模块路径是从类路径迁移到模块路径的第一步。这些库会成为自动模块，你无需迁移它们。\n\
  2.  列出依赖树。你可以使用 Maven 依赖插件的任务 `dependency:tree` 或 Gradle 命令 `gradle dependencies`\
  \ 来完成此操作。依赖树用于理解项目模块或子项目之间的依赖关系。如果你已经了解依赖关系，则此步骤不是必需的。正如我之前提到的，你应该进行自下而上的迁移，因此你需要项目的模块依赖树来确定迁移顺序。\n\
  3.  从依赖树底部的子项目开始，为每个子项目添加模块声明文件。第三方库也在 `module-info.java` 文件中声明为自动模块。作为开始，只需为每个模块导出所有包。如果你的代码已经使用约定来区分公共包和内部包，你应该在模块声明中利用这一点。例如，你可以导出名称以\
  \ `api` 结尾的包，但不导出以 `impl` 或 `internal` 结尾的包。如果应用程序中使用了服务提供者，请将它们添加到模块声明中。\n4.  尝试编译代码并修复编译错误。IDE\
  \ 可以帮助你自动修复大多数问题。\n5.  运行所有单元测试和集成测试，确保全部通过。\n6.  改进模块声明，删除不必要的导出，并修复测试中发现的问题。\n\
  \n借助 `jdeps` 工具，可以简化这些步骤。`jdeps` 工具可以生成模块声明文件。\n\n### BioJava\n\n为了演示 Maven 项目的迁移，我将使用一个真实世界的例子。让我们看看\
  \ BioJava ( [`http://biojava.org/`](http://biojava.org/) ) 项目。BioJava 是一个开源项目 (\
  \ [`https://github.com/biojava/biojava`](https://github.com/biojava/biojava) )，致力于提供一个用于处理生物数据的\
  \ Java 框架。它是一个包含 13 个模块的 Maven 项目，因此是演示迁移过程的一个很好的候选。\n\n第一步是使用 Java 9 构建项目。在构建项目之前，你需要确保\
  \ Maven 使用的是 Java 9。你可以使用 `mvn -v` 来验证 Maven 正在使用的 JVM。如果 Java 9 是你本地机器上的默认 JVM，那么你就可以开始了。如果你安装了多个\
  \ JDK，则需要确保系统属性 `JAVA_HOME` 指向 JDK 9。现在你可以使用 `mvn` 来构建项目。对于 Intellij IDEA 用户，你可以在“偏好设置”\
  \ ➤ “构建、执行、部署” ➤ “构建工具” ➤ “Maven” ➤ “运行器”中配置运行 Maven 的 JRE。\n\n现在，你应该配置 Maven 编译器插件的源和目标级别。这可以通过将属性\
