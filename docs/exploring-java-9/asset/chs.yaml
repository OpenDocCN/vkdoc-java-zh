  `VarHandle` 类中与内存访问模式相关的那些新方法也被添加到了 `java.util.concurrent.atomic` 包中的现有原子类中，包括 `AtomicBoolean`、`AtomicInteger`、`AtomicIntegerArray`、`AtomicLong`、`AtomicLongArray`、`AtomicReference`
  和 `AtomicReferenceArray`。这些方法具有与 `VarHandle` 中相应方法相同的内存语义。


  *   `compareAndExchange()`

  *   `compareAndExchangeAcquire()`

  *   `compareAndExchangeRelease()`

  *   `weakCompareAndSetVolatile()`

  *   `weakCompareAndSetAcquire()`

  *   `weakCompareAndSetRelease()`

  *   `weakCompareAndSetPlain()`

  *   `getAcquire()`

  *   `getOpaque()`

  *   `getPlain()`

  *   `setOpaque()`

  *   `setPlain()`

  *   `setRelease()`


  清单 10-6 展示了如何使用这些新方法的一些示例。


