- '# 14. 用户界面


  大量桌面应用程序仍使用 Java 开发。Java 9 持续改进对这些桌面应用程序的支持。


  ## Desktop


  `java.awt.Desktop` 类允许 Java 应用程序与各种桌面功能进行交互。Java 9 通过增加更多功能扩展了这种支持。然而，这些新功能可能并非所有原生平台都支持。如果底层平台不支持某项功能，则相应的方法将不起作用。所有这些功能在
  `Desktop.Action` 中都有一个枚举值。你可以使用 `Desktop` 中的 `boolean isSupported(Desktop.Action
  action)` 方法来检查某个操作是否受支持。


  ### 应用程序事件


  方法 `void addAppEventListener(SystemEventListener listener)` 为来自原生系统的不同类型的系统事件添加监听器。`SystemEventListener`
  针对不同的系统事件有以下子接口：


  *   `AppForegroundListener`：当应用程序成为前台应用程序以及不再是前台应用程序时收到通知。

  *   `AppHiddenListener`：当应用程序被用户隐藏或显示时收到通知。

  *   `AppReopenedListener`：当应用程序被要求重新打开时收到通知。

  *   `ScreenSleepListener`：当显示器进入省电休眠状态以及从省电休眠状态唤醒后收到通知。

  *   `SystemSleepListener`：当系统进入休眠状态以及系统唤醒后收到通知。

  *   `UserSessionListener`：当用户会话切换到当前会话以及从当前会话切换出去时收到通知。


  如果底层系统不支持特定类型的系统事件，添加相应的监听器将不起作用。你可以使用 `void removeAppEventListener(SystemEventListener
  listener)` 方法移除已添加的监听器。


  你还可以使用 `void requestForeground(boolean allWindows)` 方法请求将应用程序移至前台。如果参数 `allWindows`
  为 `true`，则应用程序的所有窗口都将移至前台，否则仅移动最前面的窗口。


  ### 关于窗口


  方法 `void setAboutHandler(AboutHandler aboutHandler)` 设置一个自定义处理程序，用于处理显示应用程序“关于”窗口的请求。将
  `AboutHandler` 设置为 `null` 可以恢复为默认行为。


  ### 打开文件


  方法 `void` `setOpenFileHandler` `(OpenFilesHandler openFileHandler)` 设置一个自定义处理程序，当应用程序被要求打开一组文件时收到通知。`OpenFilesHandler`
  接收到的事件对象 `OpenFilesEvent` 包含文件列表以及用于查找文件的搜索词。


  ### 打印文件


  方法 `void` `setPrintFileHandler` `(PrintFilesHandler printFileHandler)` 设置一个自定义处理程序，当应用程序被要求打印一组文件时收到通知。`PrintFilesHandler`
  接收到的事件对象 `PrintFilesEvent` 包含要打印的文件列表。




  ### 打开 URI


  方法 `void` `setOpenURIHandler` `(OpenURIHandler openURIHandler)` 用于设置一个自定义处理器，以便在应用程序被要求打开一个
  URI 时获得通知。`OpenURIHandler` 接收的事件对象 `OpenURIEvent` 包含了要打开的 URI。


  注意


  在 macOS 上，仅当 Java 应用程序是一个捆绑应用程序，且其 `Info.plist` 中存在 `CFBundleDocumentTypes` 数组时，才会发送
  `setOpenFileHandler()`、`setPrintFileHandler()` 和 `setOpenURIHandler()` 的通知。


  ### 应用程序退出


  方法 `void setQuitStrategy(QuitStrategy strategy)` 用于设置退出应用程序的默认策略。枚举 `QuitStrategy`
  包含两个值：


  *   `CLOSE_ALL_WINDOWS` 表示通过从后往前关闭每个窗口来关闭应用程序。

  *   `NORMAL_EXIT` 表示通过调用 `System.exit(0)` 来关闭应用程序。


  方法 `void setQuitHandler(QuitHandler quitHandler)` 用于设置一个自定义处理器，以决定应用程序是否应该退出。方法
  `void` `handleQuitRequestWith` `(QuitEvent e, QuitResponse response)` 接收两个参数：第一个参数
  `QuitEvent` 代表事件；第二个参数 `QuitResponse` 代表对退出请求的响应。在 `handleQuitRequestWith()` 方法的实现中，你应该调用
  `QuitResponse.cancelQuit()` 来取消退出请求，或者调用 `QuitResponse.performQuit()` 来执行默认的退出策略。


  方法 `void enableSuddenTermination()` 和 `void disableSuddenTermination()` 分别用于启用和禁用应用程序的突然终止。如果应用程序可以被突然终止，它将在没有通知的情况下被终止。`QuitHandler`
  不会收到通知，并且关闭钩子也不会运行。当你的应用程序状态已保存时，你应该调用 `enableSuddenTermination()` 方法来指示这一点。另一方面，如果你的应用程序状态尚未保存，你应该调用
  `disableSuddenTermination()` 方法来指示这一点。


  清单 14-2 展示了 `QuitHandler` 的演示。在 `QuitHandler` 的实现中，我显示了一个确认对话框，并根据用户的响应调用 `performQuit()`
  或 `cancelQuit()`。


  ```

  public class QuitHandlerDemo {

  private static class MainFrame extends JFrame {

  public MainFrame() throws HeadlessException {

  setTitle("Quit Handler");

  setSize(400, 300);

  setVisible(true);

  }

  }

  public static void main(final String[] args) {

  final MainFrame frame = new MainFrame();

  frame.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

  final Desktop desktop = Desktop.getDesktop();

  desktop.setQuitHandler((e, response) -> {

  final int result = JOptionPane

  .showConfirmDialog(frame, "Quit the app?", "Quit?", YES_NO_OPTION);

  if (result == YES_OPTION) {

  response.performQuit();

  } else {

  response.cancelQuit();

  }

  });

  }

  }

  清单 14-2.

  退出处理器

  ```


