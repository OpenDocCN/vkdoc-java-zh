    ## 小结


    借助新的平台日志 API 和服务，你现在可以为 JDK 本身和应用程序使用统一的日志实现。这使得错误诊断变得更加容易。在下一章中，我们将讨论响应式流。


    # 7. 响应式流


    响应式编程（[`https://en.wikipedia.org/wiki/Reactive_programming`](https://en.wikipedia.org/wiki/Reactive_programming)）近年来在
    Java 社区中越来越受欢迎。在 Java 世界中，我们有流行的响应式库，如 RxJava（[`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)）和
    Reactor（[`http://projectreactor.io/`](http://projectreactor.io/)）。响应式流（[`http://www.reactive-streams.org/`](http://www.reactive-streams.org/)）是一项旨在为具有非阻塞背压的异步流处理提供标准的倡议。响应式流规范中的核心接口已被添加到
    Java 9 的 `java.util.concurrent.Flow` 类中。


    ## 核心接口


    本节介绍 `Flow` 中的四个核心接口。


    ### Flow.Publisher<T>


    接口 `Flow.Publisher<T>` 表示供订阅者接收的项目的生产者。它只有一个方法 `void subscribe(Flow.Subscriber<?
    super T> subscriber)`，用于添加类型为 `Flow.Subscriber` 的订阅者。发布者可以发布三种类型的通知；参见表 7-1。


    表 7-1.


    `Publisher` 的通知


    | 通知 | 描述 |

    | --- | --- |

    | `onNext` | 已发布一个新项目。 |

    | `onComplete` | 将不再发布进一步的通知。 |

    | `onError` | 发布项目时遇到错误。 |


    `onComplete` 和 `onError` 都是终止通知，这意味着在 `onComplete` 或 `onError` 通知之后将不再发布任何通知。发布者不发布任何
    `onNext` 通知是合法的。发布者也可以发布无限数量的 `onNext` 通知。

