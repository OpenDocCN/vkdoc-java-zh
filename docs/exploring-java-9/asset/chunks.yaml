  trans: '

    ### 使用 Java 9 构建项目


    在将代码迁移到 Java 9 之前，你应该先在 Java 9 上构建并运行项目。这需要对现有的构建工具进行配置更改。对于 Maven，你需要将 Maven
    编译器插件升级到最新版本，并将 `source` 和 `target` 配置设置为 `9`。对于 Gradle，你需要将 Java 插件的属性 `sourceCompatibility`
    和 `targetCompatibility` 更新为 `9`。你还应将 Maven 或 Gradle 插件升级到最新版本，以便更好地支持 Java 9。


    更新配置后，尝试运行构建。你可能会遇到构建工具的问题，特别是因为 Java 9 刚刚发布，构建工具需要时间来提供对其的支持。在撰写本文时，Gradle 4.2
    尚未提供对 Java 9 模块的一流支持。你可能需要为各种问题寻找变通方法。或者，你可以等到构建工具的支持成熟后再开始迁移。正如我之前提到的，Java 9
    在运行之前编写的应用程序方面没有问题。


    使用 Java 9 构建项目时，你可能会遇到一些错误。这些错误大多与类访问和反射有关。这是因为模块具有更严格的访问控制。选项 `--illegal-access`
    的默认值是 `permit`，因此 Java 9 已经允许类路径上的代码执行非法访问。在这种默认模式下，大多数与反射相关的问题都可以解决。JVM 会输出关于非法访问的警告消息，但应用程序可以启动。


    ### 迁移路径


    在你能成功使用 JDK 9 构建项目后，就可以开始迁移过程了。以下是将现有应用程序迁移到模块的基本步骤。


    1.  将现有的第三方库添加到模块路径中。如果你使用的是 Maven 或 Gradle 等构建工具，可能无需执行任何操作。这些工具应该已经为你处理好了。如果你使用的是
    JDK 工具，则可以使用 `--module-path` 或 `-p` 指定模块路径，然后指向库的目录。将库放入模块路径是从类路径迁移到模块路径的第一步。这些库会成为自动模块，你无需迁移它们。

    2.  列出依赖树。你可以使用 Maven 依赖插件的任务 `dependency:tree` 或 Gradle 命令 `gradle dependencies`
    来完成此操作。依赖树用于理解项目模块或子项目之间的依赖关系。如果你已经了解依赖关系，则此步骤不是必需的。正如我之前提到的，你应该进行自下而上的迁移，因此你需要项目的模块依赖树来确定迁移顺序。

    3.  从依赖树底部的子项目开始，为每个子项目添加模块声明文件。第三方库也在 `module-info.java` 文件中声明为自动模块。作为开始，只需为每个模块导出所有包。如果你的代码已经使用约定来区分公共包和内部包，你应该在模块声明中利用这一点。例如，你可以导出名称以
    `api` 结尾的包，但不导出以 `impl` 或 `internal` 结尾的包。如果应用程序中使用了服务提供者，请将它们添加到模块声明中。

    4.  尝试编译代码并修复编译错误。IDE 可以帮助你自动修复大多数问题。

    5.  运行所有单元测试和集成测试，确保全部通过。

    6.  改进模块声明，删除不必要的导出，并修复测试中发现的问题。


    借助 `jdeps` 工具，可以简化这些步骤。`jdeps` 工具可以生成模块声明文件。


    ### BioJava


    为了演示 Maven 项目的迁移，我将使用一个真实世界的例子。让我们看看 BioJava ( [`http://biojava.org/`](http://biojava.org/)
    ) 项目。BioJava 是一个开源项目 ( [`https://github.com/biojava/biojava`](https://github.com/biojava/biojava)
    )，致力于提供一个用于处理生物数据的 Java 框架。它是一个包含 13 个模块的 Maven 项目，因此是演示迁移过程的一个很好的候选。


    第一步是使用 Java 9 构建项目。在构建项目之前，你需要确保 Maven 使用的是 Java 9。你可以使用 `mvn -v` 来验证 Maven 正在使用的
    JVM。如果 Java 9 是你本地机器上的默认 JVM，那么你就可以开始了。如果你安装了多个 JDK，则需要确保系统属性 `JAVA_HOME` 指向 JDK
    9。现在你可以使用 `mvn` 来构建项目。对于 Intellij IDEA 用户，你可以在“偏好设置” ➤ “构建、执行、部署” ➤ “构建工具” ➤ “Maven”
    ➤ “运行器”中配置运行 Maven 的 JRE。


    现在，你应该配置 Maven 编译器插件的源和目标级别。这可以通过将属性 `jdk.version` 更新为 `9` 来完成。你还需要将插件更新到最新版本。这对于避免在
    Java 9 中使用这些插件时出现问题来说是必要的。表 2-18 显示了这些插件的最新版本。


    表 2-18.


    Maven 插件版本


    | 插件 | 版本 |

    | --- | --- |

    | maven-compiler-plugin | `3.7.0` |

    | maven-jar-plugin | `3.0.2` |

    | maven-assembly-plugin | `3.1.0` |

    | maven-surefire-plugin | `2.20.1` |

    | maven-enforcer-plugin | `3.0.0-M1` |


    当你首次启动 Maven 构建时，会遇到 Maven enforcer 插件的第一个问题；参见清单 2-51。这是因为 Maven enforcer 插件
    1.2 版本使用了较旧版本（2.3）的 Apache Commons Lang，该版本不支持 Java 9 的新版本方案。将 enforcer 插件升级到版本
    `3.0.0-M1` 可以解决此问题。


    ```

    Caused by: java.lang.ExceptionInInitializerError

    at org.apache.maven.plugins.enforcer.RequireJavaVersion.execute(RequireJavaVersion.java:52)

    at org.apache.maven.plugins.enforcer.EnforceMojo.execute(EnforceMojo.java:178)

    at org.apache.maven.plugin.DefaultBuildPluginManager.executeMojo(DefaultBuildPluginManager.java:134)

    ... 22 more

    Caused by: java.lang.StringIndexOutOfBoundsException: begin 0, end 3, length 1

    at java.base/java.lang.String.checkBoundsBeginEnd(String.java:3116)

    at java.base/java.lang.String.substring(String.java:1885)

    at org.apache.commons.lang.SystemUtils.getJavaVersionAsFloat(SystemUtils.java:1122)

    at org.apache.commons.lang.SystemUtils.(SystemUtils.java:818)

    ... 25 more

    清单 2-51.

    Maven Enforcer 插件的问题

    ```


    在编译源代码时，你会遇到第二个问题 `java.lang.ClassNotFoundException: javax.xml.bind.JAXBException`。这是因为
    BioJava 使用了 JAXB。模块 `java.xml.bind` 不在未命名模块的默认根模块集中，因此无法找到其类。要解决此问题，你需要更新 Java
    编译器选项以添加 `--add-modules java.se.ee`。你可以通过配置 Maven 编译器插件来做到这一点；参见清单 2-52。


    ```

    maven-compiler-plugin

    3.7.0


    ${jdk.version}

    ${jdk.version}


    --add-modules

    java.se.ee


    清单 2-52.

    配置 Maven 编译器插件以添加额外模块

    ```


    还应使用配置 `argLine` 将相同的选项添加到 Maven surefire 插件中。添加此选项后，你就可以成功编译项目了。


    现在你应该运行单元测试。在单元测试期间，你会遇到第三个问题，导致某些测试失败；参见清单 2-53。

