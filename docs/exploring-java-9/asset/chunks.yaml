- fmt: '# InputStream


    类`java.io.InputStream`新增了三个用于从输入流读取和复制数据的方法。


    - `readAllBytes()`：从输入流中读取所有剩余字节。

    - `readNBytes(byte[] b, int off, int len)`：从输入流中读取指定数量的字节到给定的字节数组`b`中。`off`是读取起始位置，`len`是要读取的字节数。

    - `transferTo(OutputStream out)`：从输入流中读取所有字节，并将其写入给定的输出流。


    在清单[12-1](#A459620_1_En_12_Chapter.html#Par7)中，文件`input.txt`包含内容“Hello World”。我使用`readAllBytes()`和`readNBytes()`方法从输入流读取数据，并根据数据创建字符串。我还使用`transferTo()`方法将数据复制到`ByteArrayOutputStream`。


    ```

    public class TestInputStream {

    private InputStream inputStream;

    private static final String CONTENT = "Hello World";

    @Before

    public void setUp() throws Exception {

    this.inputStream =

    TestInputStream.class.getResourceAsStream("/input.txt");

    }

    @Test

    public void testReadAllBytes() throws Exception {

    final String content = new String(this.inputStream.readAllBytes());

    assertEquals(CONTENT, content);

    }

    @Test

    public void testReadNBytes() throws Exception {

    final byte[] data = new byte[5];

    this.inputStream.readNBytes(data, 0, 5);

    assertEquals("Hello", new String(data));

    }

    @Test

    public void testTransferTo() throws Exception {

    final ByteArrayOutputStream outputStream = new ByteArrayOutputStream();

    this.inputStream.transferTo(outputStream);

    assertEquals(CONTENT, outputStream.toString());

    }

    }

    清单 12-1. InputStream 中用于读取和复制数据的方法

    ```


    由于新增了这三个方法，在一些常见使用场景中，你不再需要使用其他第三方库（如 Apache Commons IO）。


    # ObjectInputStream 过滤器


    你可以使用 Java 对象序列化将对象图转换为持久化数据或用于网络传输。在反序列化数据以重新创建对象时，务必检查输入以确保数据有效；否则恶意内容可能会危害系统。你可以在`ObjectInputStream`上设置新接口`java.io.ObjectInputFilter`的实现来过滤输入。


    `ObjectInputFilter`是一个函数式接口，只有一个方法：`ObjectInputFilter.Status checkInput(ObjectInputFilter.FilterInfo
    filterInfo)`。接口`ObjectInputFilter.FilterInfo`包含正在反序列化的对象的信息以及`ObjectInputStream`对象的统计信息；参见表[12-1](#A459620_1_En_12_Chapter.html#Tab1)。


    表 12-1. `ObjectInputFilter.FilterInfo`的方法


    | 方法 | 描述 |

    | --- | --- |

    | `Class<?> serialClass()` | 返回正在反序列化的对象的类 |

    | `long arrayLength()` | 如果正在反序列化的对象是数组，则返回数组的长度 |

    | `long depth()` | 返回当前对象在对象图中的深度 |

    | `long references()` | 返回当前对象引用的数量 |

    | `long streamBytes()` | 返回当前已消耗的字节数 |


    `checkInput()`的返回值是枚举`ObjectInputFilter.Status`；参见表[12-2](#A459620_1_En_12_Chapter.html#Tab2)。


    表 12-2. `ObjectInputFilter.Status`的值


    | 状态 | 描述 |

    | --- | --- |

    | `ALLOWED` | 允许反序列化该对象。 |

    | `REJECTED` | 不允许反序列化该对象。 |

    | `UNDECIDED` | 该过滤器未决定是否允许反序列化该对象。 |


    `ObjectInputFilter`应仅检查其设计所针对的条件，并且仅在知道结果时返回`ALLOWED`或`REJECTED`；否则应返回`UNDECIDED`，让其他过滤器决定结果。如果返回的状态是`REJECTED`，则`ObjectInputStream`会抛出`java.io.InvalidClassException`。


    可以使用新方法`setObjectInputFilter()`在单个`ObjectInputStream`对象上设置`ObjectInputFilter`。你也可以使用`ObjectInputFilter.Config`类的静态方法`setSerialFilter(ObjectInputFilter
    filter)`设置进程级过滤器。如果未设置单个`ObjectInputStream`的过滤器，则将应用进程级过滤器。


    `ObjectInputFilter.Config`的另一个重要特性是，它可以根据字符串模式创建`ObjectInputFilter`。字符串模式比实现`ObjectInputFilter`接口更容易编写。一个过滤器可以包含多个模式，模式之间用分号（`;`）分隔。模式可以设置限制或指定要匹配的类名。支持以下限制：


    - `maxdepth=value`：对象图的最大深度

    - `maxrefs=value`：对象引用的最大数量

    - `maxbytes=value`：输入流中的最大字节数

    - `maxarray=value`：数组的最大长度


    例如，你可以使用`maxdepth=5`将对象图的最大深度限制为`5`。


    其他模式用于匹配类名。以下是一些场景：


    - 如果模式包含“/”，则它同时指定了要匹配的模块名和类名。

    - 如果模式以`".**"`结尾，则它匹配包及其子包中的任何类。

    - 如果模式以`".*"`结尾，则它匹配包中的任何类。

    - 如果模式以`"*"`结尾，则它匹配以该模式为前缀的任何类。

    - 如果模式等于类名，则它匹配该类名。

    - 如果模式以“!”开头，则它否定其后的模式。'
  raw: '## InputStream


    The class `java.io.InputStream` adds three methods for reading and copying data
    from the input stream .


    *   `readAllBytes()` : Reads all remaining bytes from the input stream.

    *   `readNBytes` `(byte[] b, int off, int len)`: Reads the given number of bytes
    from the input stream into the given byte array `b. offset` is the reading position,
    while `len` is the number of bytes to read.

    *   `transferTo` `(OutputStream out)`: Reads all bytes from the input stream and
    writes to the given output stream.


    In Listing [12-1](#A459620_1_En_12_Chapter.html#Par7), the file `input.txt` contains
    the content “Hello World”. I use the methods `readAllBytes()` and `readNBytes()`
    to read data from the input stream and create strings from the data. I also use
    the method `transferTo()` to copy the data to a `ByteArrayOutputStream`.


    ```

    public class TestInputStream {

    private InputStream inputStream;

    private static final String CONTENT = "Hello World";

    @Before

    public void setUp() throws Exception {

    this.inputStream =

    TestInputStream.class.getResourceAsStream("/input.txt");

    }

    @Test

    public void testReadAllBytes() throws Exception {

    final String content = new String(this.inputStream.readAllBytes());

    assertEquals(CONTENT, content);

    }

    @Test

    public void testReadNBytes() throws Exception {

    final byte[] data = new byte[5];

    this.inputStream.readNBytes(data, 0, 5);

    assertEquals("Hello", new String(data));

    }

    @Test

    public void testTransferTo() throws Exception {

    final ByteArrayOutputStream outputStream = new ByteArrayOutputStream();

    this.inputStream.transferTo(outputStream);

    assertEquals(CONTENT, outputStream.toString());

    }

    }

    Listing 12-1.

    Methods in InputStream for Reading and Copying Data

    ```


    Now that these three new methods have been added, you no longer need to use other
    third-party libraries like Apache Commons IO for some common usage scenarios.


    ## The ObjectInputStream Filter


    You can use Java object serialization to transform object graphs for persistence
    or network transfer. When deserializing the data to re-create the objects, make
    sure you check the input to make sure the data is valid; otherwise malicious content
    may compromise the system. You can set an implementation of the new interface
    `java.io.ObjectInputFilter` on an `ObjectInputStream` to filter the input.


    `ObjectInputFilter` is a functional interface with only one method: `ObjectInputFilter.Status
    checkInput(ObjectInputFilter.FilterInfo filterInfo)`. The interface `ObjectInputFilter.FilterInfo`
    contains information about the object being deserialized and the statistics of
    the `ObjectInputStream` object; see Table [12-1](#A459620_1_En_12_Chapter.html#Tab1).


    Table 12-1.


    Methods of `ObjectInputFilter.` `FilterInfo`


    | Method | Description |

    | --- | --- |

    | `Class<?> serialClass()` | Returns the class of the object being deserialized
    |

    | `long arrayLength()` | If the object being deserialized is an array, returns
    the length of the array |

    | `long depth()` | Returns the depth of the current object in the object graph
    |

    | `long references()` | Returns the current number of object references |

    | `long streamBytes()` | Returns the current number of bytes consumed |


    The return value of `checkInput()` is the enum `ObjectInputFilter.Status`; see
    Table [12-2](#A459620_1_En_12_Chapter.html#Tab2).


    Table 12-2.


    Values of `ObjectInputFilter.` `Status`


    | Status | Description |

    | --- | --- |

    | `ALLOWED` | The object is allowed to be deserialized. |

    | `REJECTED` | The object is not allowed to be deserialized. |

    | `UNDECIDED` | This filter doesn’t decide whether the object is allowed to be
    deserialized. |


    An `ObjectInputFilter` should only check for the condition that it’s designed
    for and return `ALLOWED` or `REJECTED` only when it knows the result; otherwise
    it should return `UNDECIDED` to let other filters decide the result. If `REJECTED`
    is returned as the status, then the `ObjectInputStream` throws the `java.io.InvalidClassException`.


    `ObjectInputFilter`s can be set on individual `ObjectInputStream` objects using
    the new method `setObjectInputFilter()`. You can also set a process-wide filter
    using the static method `setSerialFilter(ObjectInputFilter filter)` of the class
    `ObjectInputFilter.Config`. If the individual `ObjectInputFilter` is not set,
    then the process-wide filter will be applied.


    Another important feature of `ObjectInputFilter.Config` is that it can create
    `ObjectInputFilter`s from string patterns. String patterns are much easier to
    write than an `ObjectInputFilter` interface is to implement. A filter can have
    multiple patterns separated by semicolons (`;`). A pattern can set a limit or
    specify the class name to match. The following limits are supported:


    *   `maxdepth=value`: The maximum depth of a graph

    *   `maxrefs=value`: The maximum number of object references

    *   `maxbytes=value`: The maximum number of bytes in the input stream

    *   `maxarray=value`: The maximum length of arrays


    For example, you can use `maxdepth=5` to limit the maximum depth of a graph to
    `5`.


    Other patterns match the class names. Here are some scenarios:


    *   If the pattern contains “/”, then it specifies both the module name and the
    class name to match.

    *   If the pattern ends with `".**"`, then it matches any class in the package
    and subpackages.

    *   If the pattern ends with `".*"`, then it matches any class in the package.

    *   If the pattern ends with `"*"`, then it matches any class with the pattern
    as the prefix.

    *   If the pattern is equal to the class name, then it matches the class name.

    *   If the pattern starts with "!", then it negates the pattern after it.'
