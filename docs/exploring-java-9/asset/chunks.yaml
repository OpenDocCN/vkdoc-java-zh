    \n## 总结\n\n在本章中，我们讨论了与 JVM 相关的变更，包括统一日志系统、已移除的 GC 组合、诊断命令、javadoc 以及其他一些小改动。在下一章中，我们将讨论\
    \ Java 9 中的其他几项小改动。\n\n# 16. 杂项\n\n本章涵盖了 Java 9 中的各种变更。\n\n## 小的语言变更\n\nJava 9\
    \ 增加了一些小的语言变更。\n\n### 私有接口方法\n\n现在可以在 Java 9 的接口中添加私有方法。清单 16-1 中的 `SayHi` 接口包含一个私有方法\
