    ## TIFF Image Format


    Java 9 has added support for the TIFF image format. The Image I/O framework now
    adds codecs for TIFF format.


    ## Deprecating the Applet API


    The Applet API has been deprecated in Java 9 as browser vendors remove support
    for Java browser plugins. The annotation `@Deprecated(since="9")` is added to
    following Applet-related classes:


    *   `java.applet.AppletStub`

    *   `java.applet.Applet`

    *   `java.applet.AudioClip`

    *   `java.applet.AppletContext`

    *   `javax.swing.JApplet`


    The `appletviewer` tool is also deprecated. However, the Applet API will not be
    removed in the next major release. Since the usage of Applet is quite rare these
    days, this deprecation should only have minor impact.


    ## Summary


    In this chapter, we discussed the new features added to AWT `Desktop`, multiresolution
    images, the TIFF image format, and the depreciation of the Applet API. In the
    next chapter, we’ll discuss changes related to the JVM.


    # 15. JVM


    This chapter covers changes related to the JVM in Java 9.


    ## Unified Logging


    In Java 9, JVM has a common logging system for all components. The new command-line
    option `-Xlog` controls logging for all components of the JVM. The new unified
    logging system supports tags, levels, decorations, and output.'
