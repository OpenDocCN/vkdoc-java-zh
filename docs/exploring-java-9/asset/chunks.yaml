- fmt: '### `jdeps`


    You can use the `jdeps` tool to analyze the dependencies of specified modules.
    The following command prints out the module descriptor of `io.vividcode.store.runtime`,
    the resulting module dependencies after analysis, and the graph after transition
    reduction; see Listing [2-22](#A459620_1_En_2_Chapter.html#Par170). It also identifies
    any unused qualified exports.


    ```

    $ jdeps --module-path  --check io.vividcode.store.runtime

    ```


    ```

    io.vividcode.store.runtime (file:////runtime-1.0.0-SNAPSHOT.jar)

    [Module descriptor]

    requires io.vividcode.store.filestore;

    requires io.vividcode.store.product.persistence;

    requires mandated java.base (@9);

    requires slf4j.simple;

    [Suggested module descriptor for io.vividcode.store.runtime]

    requires io.vividcode.store.common;

    requires io.vividcode.store.product;

    requires io.vividcode.store.product.persistence;

    requires mandated java.base;

    [Transitive reduced graph for io.vividcode.store.runtime]

    requires io.vividcode.store.product.persistence;

    requires mandated java.base;

    Listing 2-22.

    Output of jdeps Using --check

    ```


    To use the `--check` option, you need to know the module name first. If you only
    have a JAR file, you can use the `--list-deps` option or `--list-reduced-deps`.


    ```

    $ jdeps --module-path  --list-deps /runtime-1.0.0-SNAPSHOT.jar

    ```


    Listing [2-23](#A459620_1_En_2_Chapter.html#Par175) shows the output of this command.


    ```

    io.vividcode.store.common

    io.vividcode.store.product

    io.vividcode.store.product.persistence

    java.base

    Listing 2-23.

    Output of jdeps Using --list-deps

    ```


    The difference between `--list-deps` and `--list-reduced-deps` is that the result
    of using the `--list-reduced-deps` option doesn’t include implicit read edges
    in the module graph.


    ```

    $ jdeps --module-path  --list-reduced-deps /runtime-1.0.0-SNAPSHOT.jar

    ```


    Listing [2-24](#A459620_1_En_2_Chapter.html#Par179) shows the output of this command.


    ```

    io.vividcode.store.product.persistence

    Listing 2-24.

    Output of jdeps Using --list-reduced-deps

    ```


    Another handy feature of `jdeps` is that it can generate graphviz ( [`http://graphviz.org/`](http://graphviz.org/)
    ) DOT files to visualize module dependencies in graphs.


    ```

    $ jdeps --module-path  \

    --dot-output  -m io.vividcode.store.runtime

    ```


    The output directory contains a DOT file `summary.dot` for all modules and a DOT
    file `io.vividcode.store.runtime.dot` for the module. Then you can turn DOT files
    into PNG files using the following command. Make sure you have graphviz installed
    first.


    ```

    $ dot -Tpng /summary.dot -o /summary.png

    ```


    You can also use `jdeps` to process multiple JAR files to generate the module
    dependencies diagram of the whole project. The generated DOT file `summary.dot`
    contains all the modules. For the sample application, use Maven to copy all module
    artifacts and third-party libraries into different directories. You can do this
    easily using Maven’s dependency plugin. Then you can generate the DOT files using
    following command. (`<third_party-libs-path>` is the path of third-party libraries,
    while `<modules_path>` is the path of module artifacts.)


    ```

    $jdeps --module-path  \

    --dot-output  \

    /*.jar

    ```


    You can then turn the file `summary.dot` into a PNG file, see Figure [2-2](#A459620_1_En_2_Chapter.html#Fig2)
    for the generated module dependencies diagram.


    ![A459620_1_En_2_Fig2_HTML.jpg](A459620_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    Generated module dependencies diagram


    `jdeps` can also generate the module declaration file `module-info.java` from
    JAR files. The options `--generate-module-info` and `--generate-open-module` can
    be used for normal modules and open modules, respectively. For example, you can
    use the following command to generate the file `module-info.java` for `jackson-core-2.8.7.jar`.


    ```

    $ jdeps --generate-module-info  /jackson-core-2.8.7.jar

    ```


    The generated `module-info.java` is shown in Listing [2-25](#A459620_1_En_2_Chapter.html#Par190).
    It simply exports all packages and adds service providers. You can use the generated
    `module-info.java` file as a starting point when migrating legacy JAR files to
    Java 9 modules.


    ```

    module jackson.core {

    exports com.fasterxml.jackson.core;

    exports com.fasterxml.jackson.core.base;

    exports com.fasterxml.jackson.core.filter;

    exports com.fasterxml.jackson.core.format;

    exports com.fasterxml.jackson.core.io;

    exports com.fasterxml.jackson.core.json;

    exports com.fasterxml.jackson.core.sym;

    exports com.fasterxml.jackson.core.type;

    exports com.fasterxml.jackson.core.util;

    provides com.fasterxml.jackson.core.JsonFactory with

    com.fasterxml.jackson.core.JsonFactory;

    }

    Listing 2-25.

    Generated module-info.java of jackson-core-2.8.7.jar

    ```


    ## Module Java API


    When the JVM starts, it resolves the application’s main module against the observable
    modules. The result of this resolution process is a readability graph, which is
    a directed graph with nodes representing resolved modules and edges representing
    the readability among the modules. Then the JVM creates a module layer, which
    consists of runtime modules defined from those resolved modules. The module system
    has Java API for applications to interact with it.'
