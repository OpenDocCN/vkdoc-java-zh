    两个静态方法`ChronoUnit toChronoUnit()`和`TimeUnit of(ChronoUnit chronoUnit)`被添加到`java.util.concurrent.TimeUnit`类中，用于在`TimeUnit`和`java.time.temporal.ChronoUnit`之间进行转换；参见清单[10-4](#A459620_1_En_10_Chapter.html#Par11)。


