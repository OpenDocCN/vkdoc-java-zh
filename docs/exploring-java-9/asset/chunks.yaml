    ## 内存屏障


    `VarHandle` 还增加了对内存屏障的支持，用于控制内存排序，这与 C/C++11 的 `atomic_thread_fence`（[`http://en.cppreference.com/w/cpp/atomic/atomic_thread_fence`](http://en.cppreference.com/w/cpp/atomic/atomic_thread_fence)）一致。屏障确保屏障之前的加载和/或存储不会与屏障之后的加载和/或存储重排序。`VarHandle`
    中有五种不同的静态方法用于创建不同类型的屏障，以控制哪些操作不会被重排序；参见表 8-5。


    表 8-5.

    不同的内存屏障方法


    | 方法 | 屏障前的操作 | 屏障后的操作 |

    | --- | --- | --- |

    | `void fullFence()` | 加载和存储 | 加载和存储 |

    | `void acquireFence()` | 加载 | 加载和存储 |

    | `void releaseFence()` | 加载和存储 | 存储 |

    | `void loadLoadFence()` | 加载 | 加载 |

    | `void storeStoreFence()` | 存储 | 存储 |


    ## 本章小结


    在本章中，我们讨论了如何使用变量句柄来访问和操作变量。`VarHandle` 中的方法可以对变量执行读取、写入和原子更新操作。在下一章中，我们将讨论 Java
    9 中对方法句柄的增强。


    # 9. 增强的方法句柄


    Java 9 对 `java.lang.invoke.MethodHandles` 类进行了增强，增加了更多用于创建不同类型方法句柄的静态方法。


    ## arrayConstructor


    `MethodHandle arrayConstructor(Class<?> arrayClass)` 方法返回一个用于构造指定类型 `arrayClass`
    数组的方法句柄。创建的方法句柄的唯一参数是一个指定数组大小的 `int` 值，返回值是数组。在代码清单 9-1 中，我创建了一个用于构造 `int[]` 数组的方法句柄。然后我使用该
    `MethodHandle` 创建了一个大小为 `3` 的数组。


    ```

    @Test

    public void testArrayConstructor() throws Throwable {

    final MethodHandle handle = MethodHandles.arrayConstructor(int[].class);

    final int[] array = (int[]) handle.invoke(3);

    assertEquals(3, array.length);

    }

    代码清单 9-1.

    arrayConstructor() 示例

    ```


    ## arrayLength


    `MethodHandle arrayLength(Class<?> arrayClass)` 方法返回一个用于获取类型为 `arrayClass` 的数组长度的方法句柄。此方法句柄的唯一参数是要检查的数组，返回值是一个
    `int` 值。在代码清单 9-2 中，我创建了一个用于获取 `int[]` 数组长度的方法句柄。然后我调用它来获取输入数组的长度。


    ```

    @Test

    public void testArrayLength() throws Throwable {

    final MethodHandle handle = MethodHandles.arrayLength(int[].class);

    final int[] array = new int[]{1, 2, 3, 4, 5};

    final int length = (int) handle.invoke(array);

    assertEquals(5, length);

    }

    代码清单 9-2.

    arrayLength() 示例

    ```


    ## varHandleInvoker 和 varHandleExactInvoker


    `MethodHandle varHandleInvoker(VarHandle.AccessMode accessMode, MethodType type)`
    和 `MethodHandle varHandleExactInvoker(VarHandle.AccessMode accessMode, MethodType
    type)` 方法返回一个方法句柄，用于在任何访问模式类型与给定类型兼容的 `VarHandle` 上调用签名多态的访问模式方法。这两个方法都有以下两种类型的参数：


    *   `VarHandle.AccessMode accessMode`：`VarHandle` 的访问模式

    *   `MethodType type`：访问模式方法的类型


    `varHandleInvoker()` 和 `varHandleExactInvoker()` 的区别在于，`varHandleInvoker()` 会进行必要的类型转换，而
    `varHandleExactInvoker()` 则不会。


    在代码清单 9-3 中，变量 `varHandle` 引用了 `HandleTarget` 类中的变量 `count`。我使用访问模式 `VarHandle.AccessMode.GET`
    创建了 `MethodHandle`，并调用它以获取变量的值。当为给定的访问模式创建 `MethodType` 时，`VarHandle` 的 `accessModeType()`
    方法非常方便。


    ```

    @Test

    public void testVarHandleInvoker() throws Throwable {

    final VarHandle varHandle = MethodHandles

    .lookup()

    .findVarHandle(HandleTarget.class, "count", int.class);

    final VarHandle.AccessMode accessMode = VarHandle.AccessMode.GET;

    final MethodHandle methodHandle = MethodHandles.varHandleInvoker(

    accessMode,

    varHandle.accessModeType(accessMode)

    );

    final HandleTarget handleTarget = new HandleTarget();

    final int result = (int) methodHandle.invoke(varHandle, handleTarget);

    assertEquals(result, 1);

    }

    代码清单 9-3.

    varHandleInvoker() 示例

    ```


