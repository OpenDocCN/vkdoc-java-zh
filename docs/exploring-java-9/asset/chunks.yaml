    | --- | --- |

    | `maven-compiler-plugin` | `3.7.0` |

    | `maven-jar-plugin` | `3.0.2` |

    | `maven-assembly-plugin` | `3.1.0` |

    | `maven-surefire-plugin` | `2.20.1` |

    | `maven-enforcer-plugin` | `3.0.0-M1` |


    When you first start the Maven build, you encounter the first issue with Maven
    enforcer plugin; see Listing 2-51. This is because the Maven enforcer plugin version
    1.2 uses an older version (2.3) of Apache Commons Lang, which doesn’t support
    the new version scheme of Java 9. Upgrading the enforcer plugin to version `3.0.0-M1`
    solves this issue.


