    third issue that causes some tests to fail; see Listing 2-53.'
  raw: '### Building the Project Using Java 9


    Before migrating the code to Java 9, you should build and run the project on Java
    9 first. This requires configuration changes to your existing build tools. For
    Maven, you need to upgrade the Maven compiler plugin to the latest version and
    set the source and target configuration to `9`. For Gradle, you need to update
    the properties `sourceCompatibility` and `targetCompatibility` of the Java plugin
    to `9`. You should also upgrade Maven or Gradle plugins to the latest version
    for better support of Java 9.


    After updating the configuration, try to run the build. It’s possible you’ll encounter
    issues with build tools, especially since Java 9 has just been released and it
    takes time for the build tools to provide the support for it. At the time of writing,
    Gradle 4.2 doesn’t have first-class support for Java 9 modules yet. You may need
    to find workarounds for various issues. Or you can wait until the support of build
    tools is mature before you start the migration. As I mentioned before, Java 9
    has no issues running applications written before it.


    When building the project using Java 9, you may encounter some errors. Most of
    these errors are apt to be related to class access and reflections. This is because
    modules have stricter access control. The default value of the option `--illegal-access`
    is `permit`, so Java 9 already allows code on the class path to perform illegal
    access. With this default mode, most of reflection-related issues can be resolved.
    JVM outputs warning messages about illegal access, but the application can be
    started.


    ### The Migration Path


    After you can su ccessfully build the project using JDK 9, you can start the migration
    process. The following are the basic steps for migrating an existing application
    to modules.


    1.  Add existing third-party libraries into the module path. If you are using
    build tools like Maven or Gradle, you may not need to do anything. These tools
    should already handle this for you. If you’re using JDK tools, you can specify
    the module path using `--module-path` or `-p`, and then point to the directory
    of libraries. Putting libraries into the module path is the first step to moving
    from class path to module paths. These libraries become automatic modules and
    you don’t need to migrate them.  

    2.  List the dependency tree. You can do this using the task `dependency:tree`
    of the Maven dependency plugin or the Gradle command `gradle dependencies`. The
    dependency tree is used to understand dependencies between a project’s modules
    or subprojects. This step is not necessary if you already know about the dependencies.
    As I mentioned before, you should do a bottom-up migration, so you need the project’s
    module dependencies tree to figure out the migration order.  

    3.  Start from the subprojects in the bottom of the dependency tree and add module
    declaration files for each subproject. Third-party libraries are also declared
    in the `module-info.java` files as automatic modules. As a start, simply export
    all packages for each module. If your code already uses conventions to distinguish
    between public and internal packages, you should leverage it in the module declaration.
    For example, you can export packages with names that end with `api` but not packages
    that end with `impl` or `internal`. If service providers are used in the application,
    add them in the module declaration.  

    4.  Try to compile the code and fix compilation errors. The IDE can help you to
    auto-fix most of the issues.  

    5.  Run all unit tests and integration tests to make sure all are passed.  

    6.  Improve the module declarations to remove unnecessary exports and fix issues
    found during tests.  


    These steps can be simplified with the help of the `jdeps` tool. The `jdeps` tool
    can generate module declaration files.


    ### BioJava


    To demonstrate the migration of Maven projects, I’ll use a real-world example.
    Let’s take a look at the BioJava ( [`http://biojava.org/`](http://biojava.org/)
    ) project. BioJava is an open-source project ( [`https://github.com/biojava/biojava`](https://github.com/biojava/biojava)
    ) dedicated to providing a Java framework for processing biological data. It’s
    a Maven project with 13 modules, so it’s a good candidate for demonstrating the
    migration process.


    The first step is to build the project using Java 9\. Before building the project,
    you need to make sure Maven is using Java 9\. You can use `mvn -v` to verify the
    JVM that Maven is using. If Java 9 is the default JVM on your local machine, then
    you are good to go. If you have multiple JDKs installed, you need to make sure
    the system property `JAVA_HOME` points to JDK 9\. Now you can use `mvn` to build
    the project. For Intellij IDEA users, you can configure the JRE to run Maven in
    Preferences ➤ Build, Execution, Deployment ➤ Build Tools ➤ Maven ➤ Runner.


    Now you should configure the source and target level of the Maven compiler plugin.
    This can be done by updating the property `jdk.version` to `9`. You also need
    to update the plugins to the latest version. This is necessary to avoid issues
    when using these plugins in Java 9\. Table [2-18](#A459620_1_En_2_Chapter.html#Tab18)
    shows the latest versions of these plugins.


    Table 2-18.


    Versions of Maven Plugins


    | Plugin | Version |

    | --- | --- |

    | maven-compiler-plugin | `3.7.0` |

    | maven-jar-plugin | `3.0.2` |

    | maven-assembly-plugin | `3.1.0` |

    | maven-surefire-plugin | `2.20.1` |

    | maven-enforcer-plugin | `3.0.0-M1` |


    When you first start the Maven build, you encounter the first issue with Maven
    enforcer plugin; see Listing [2-51](#A459620_1_En_2_Chapter.html#Par350). This
    is because the Maven enforcer plugin version 1.2 uses an older version (2.3) of
