  raw: 'The methods `int offer(T item, BiPredicate<Flow.Subscriber<? super T>,? super
    T> onDrop)` and `int offer(T item, long timeout, TimeUnit unit, BiPredicate<Flow.Subscriber<?
    super T>,? super T> onDrop)` also publish the items to all subscribers, but they
    allow items to be dropped when resources are not available for one or more subscribers.
    When an item is dropped, the provided handler `onDrop` is invoked with the current
    subscriber and the dropped item. The type of the handler is `BiPredicate`, so
    it returns a Boolean value. If the return value of the handler is `true`, the
    publisher will try to publish the item again. The return value of `offer()` indicates
    the result of publishing. If the value is negative, its absolute value represents
    the number of drops; otherwise, it represents an estimate of the maximum lag with
    the same meaning as the value `submit()` returned. If a timeout is added when
    `offer()` is invoked, it blocks while no resource is available for any subscriber
    and continues to block up to the specified timeout or until the caller thread
    is interrupted. The `onDrop` handler is invoked in both cases.


