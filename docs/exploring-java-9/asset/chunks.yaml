    ## Summary


    This chapter covers the basic setup required to develop applications using Java
    9, including JDK 9 installation, IDE setup, build tools configuration, Docker
    setup, and CI builds configuration. In the next chapter, we’ll discuss the most
    important feature in Java 9—the Java Platform Module System.


    # 2. The Module System


    When we’re talking about Java 9, the most important topic is Project Jigsaw (
    [`http://openjdk.java.net/projects/jigsaw/`](http://openjdk.java.net/projects/jigsaw/)
    ) or the Java Platform Module System (JPMS), which introduces the module system
    into the Java platform. Project Jigsaw was supposed to be added in Java 8, but
    the changes were too big, so it was delayed to release with Java 9. Project Jigsaw
    brings significant changes to the Java platform, not only to the JDK itself, but
    also to Java applications running on it.


    The Java SE platform and JDK are organized in modules in Java 9 so they can be
    customized to scale down to run on small devices. Before Java 9, the installation
    of JRE was all-or-nothing. The JRE contains tools, libraries, and classes that
    can satisfy requirements for running different applications. But some of these
    tools, libraries, and classes may not be required for a particular application.
    For example, a REST API proxy running on the JRE may never use the desktop AWT/Swing
    library. JPMS makes it possible to strip unnecessary libraries from the JRE to
    build customized images that are suitable for every unique application. This can
    dramatically reduce the package size making deployment faster.


    The Java community has always wanted a way to build modular Java applications.
    OSGi ( [`https://en.wikipedia.org/wiki/OSGi`](https://en.wikipedia.org/wiki/OSGi)
    ) is a good choice for doing this at the moment. JPMS also allows developers to
    create modular Java libraries and applications. Compared to using OSGi, a solution
    from Java platform itself is more promising.


    JPMS is complicated with one JSR—JSR 376: Java^(TM) Platform Module System ( [`https://jcp.org/en/jsr/detail?id=376`](https://jcp.org/en/jsr/detail?id=376)
    )—and six related JEPs.


    *   200: The Modular JDK

    *   201: Modular Source Code

    *   220: Modular Run-Time Images

    *   260: Encapsulate Most Internal APIs

    *   261: Module System

    *   282: `jlink`: The Java Linker


    This chapter covers the most important concepts of JPMS.


    ## Module Introduction


    Take a look at this quote from a document ( [`http://openjdk.java.net/projects/jigsaw/spec/sotms/`](http://openjdk.java.net/projects/jigsaw/spec/sotms/)
    ) by Mark Reinhold ( [`http://mreinhold.org/`](http://mreinhold.org/) ), the chief
    architect of the Java Platform Group at Oracle:


    > A module is a named, self-describing collection of code and data. Its code is
    organized as a set of packages containing types, i.e., Java classes and interfaces;
    its data includes resources and other kinds of static information. Mark Reinhold


    From this definition, we get that a module is just a set of compiled Java code
    and supplementary resources that are organized in a predefined structure. If you
    already use Maven multiple modules ( [`https://maven.apache.org/guides/mini/guide-multiple-modules.html`](https://maven.apache.org/guides/mini/guide-multiple-modules.html)
    ) or Gradle multiproject builds ( [`https://docs.gradle.org/current/userguide/multi_project_builds.html`](https://docs.gradle.org/current/userguide/multi_project_builds.html)
    ) to organize your code, then you can easily upgrade each of these Maven modules
    or Gradle projects to a JPMS module.


    Each JPMS module should have a name that follows the same naming convention as
    Java packages; that is, it should use the reverse-domain-name pattern—for example,
    `com.mycompany.mymodule`. A JPMS module is described using the file `module-info.java`
    in the root source directory, which is compiled to `module-info.class`. In this
    file, you use the new keyword `module` to declare a module with a name. Listing
    [2-1](#A459620_1_En_2_Chapter.html#Par17) shows the content of the file `module-info.java`
    of the module `com.mycompany.mymodule` with minimal information.


    ```

    module com.mycompany.mymodule {

    }

    Listing 2-1.

    Minimal Module Description

    ```


    Now you have successfully created a new JPMS module.'
