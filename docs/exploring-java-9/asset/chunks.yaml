    ## Summary


    With the new platform logging API and service, you can now use a single logging
    implementation for both the JDK itself and applications. This makes the error
    diagnostics much easier. In next chapter, we’ll discuss reactive streams.


    # 7. Reactive Streams


    Reactive programming ( [`https://en.wikipedia.org/wiki/Reactive_programming`](https://en.wikipedia.org/wiki/Reactive_programming)
    ) has gained popularity in the Java community recently. In the Java world, we
    have popular reactive libraries like RxJava ( [`https://github.com/ReactiveX/RxJava`](https://github.com/ReactiveX/RxJava)
    ) and Reactor ( [`http://projectreactor.io/`](http://projectreactor.io/) ). Reactive
    Streams ( [`http://www.reactive-streams.org/`](http://www.reactive-streams.org/)
    ) is an initiative to provide a standard for asynchronous stream processing with
    nonblocking back pressure. Core interfaces from the Reactive Streams specification
    have been added to Java 9 in the class `java.util.concurrent.Flow`.


    ## Core Interfaces


    This section covers the four core interfaces in `Flow`.


    ### Flow.Publisher<T>


    The interface `Flow.Publisher<T>` represents a producer of items to be received
    by subscribers. It only has one method, `void subscribe(Flow.Subscriber<? super
    T> subscriber)`, which adds subscribers of type `Flow.Subscriber`. There are three
    types of notifications that a publisher can publish; see Table [7-1](#A459620_1_En_7_Chapter.html#Tab1).


    Table 7-1.


    Notifications of `Publisher`


    | Notification | Description |

    | --- | --- |

    | `onNext` | A new item has been published. |

    | `onComplete` | No further notifications will be published. |

    | `onError` | An error has been encountered when publishing items. |


    Both `onComplete` and `onError` are terminal notifications meaning that no more
    notifications will be published after an `onComplete` or `onError` notification.
    It’s valid for a publisher to not publish any `onNext` notifications. It’s also
    possible for a publisher to publish an infinite number of `onNext` notifications.'
