    ### Functions


    In Nashorn, you can use the arrow functions ( [`https://developer.mozilla.org/en/docs/Web/JavaScript/Reference/Functions/Arrow_functions`](https://developer.mozilla.org/en/docs/Web/JavaScript/Reference/Functions/Arrow_functions)
    ). Listing [11-6](#A459620_1_En_11_Chapter.html#Par16) is the content of the JavaScript
    file `function.js`. It uses the arrow to create the function `add`.


