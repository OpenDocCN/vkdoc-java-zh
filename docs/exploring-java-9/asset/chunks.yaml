    Java 9 中集合、`Stream` 和 `Optional` 的变更。


    # 4. 集合、Stream 和 Optional


    本章涵盖与 Java 9 中集合、`Stream` 和 `Optional` 变更相关的主题。


    ## 集合的工厂方法


    Java 9 添加了一些便捷方法，可用于创建不可变集合。


    ### `List.of()` 方法


    新的静态方法 `List.of()` 有多个重载版本，可用于从零个或多个元素创建不可变列表，参见清单 4-1。


    ```

    List.of();

    List.of("Hello", "World");

    List.of(1, 2, 3);

    清单 4-1.

    List.of() 示例

    ```


    `List.of()` 不允许 `null` 值。向其传递 `null` 会导致 `NullPointerException`。

    '
- fmt: '### `Set.of()` Method


    The new static method `Set.of()` also has a number of overloads for creating immutable
    sets from zero or many elements; see Listing [4-2](#A459620_1_En_4_Chapter.html#Par7).


    ```

    Set.of();

    Set.of("Hello", "World");

    Set.of(1, 2, 3);

    Listing 4-2.

    Example of Set.of()

    ```


    Because sets don’t allow duplicate elements, passing duplicate elements to `Set.of()`
    causes it to throw `IllegalArgumentException`. `Set.of()` doesn’t allow `null`
    values. Passing `null` to it results in `NullPointerException`.


    ### `Map.of()` and `Map.ofEntries()` Methods


    Two new static methods, `Map.of()` and `Map.ofEntries()`, are used to create immutable
    maps with zero or many entries.


    `Map.of()` has 11 different overloads for creating maps with zero to ten entries;
    see Listing [4-3](#A459620_1_En_4_Chapter.html#Par11). Keys and values are specified
    in pairs.


    ```

    Map.of(); // empty map

    Map.of("Hello", 1, "World", 2); // -> Map with two entries

    Listing 4-3.

    Example of Map.of()

    ```


    `Map.ofEntries()` can create maps from any number of `Map.Entry` objects; see
    Listing [4-4](#A459620_1_En_4_Chapter.html#Par13).


    ```

    Map.ofEntries(

    new AbstractMap.SimpleEntry("Hello", 1),

    new AbstractMap.SimpleEntry("World", 2)

    );

    Listing 4-4.

    Example of Map.ofEntries()

    ```


