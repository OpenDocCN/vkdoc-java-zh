- fmt: '### Open URI


    方法`void setOpenURIHandler(OpenURIHandler openURIHandler)`设置一个自定义处理器，用于在应用程序被要求打开URI时获得通知。`OpenURIHandler`接收到的事件对象`OpenURIEvent`包含要打开的URI。


    **注意：** 在macOS上，仅当Java应用程序是一个捆绑应用程序，且其`Info.plist`中存在`CFBundleDocumentTypes`数组时，才会发送`setOpenFileHandler()`、`setPrintFileHandler()`和`setOpenURIHandler()`的通知。


    ### Application Exit


    方法`void setQuitStrategy(QuitStrategy strategy)`设置退出应用程序的默认策略。枚举`QuitStrategy`包含两个值：


    *   `CLOSE_ALL_WINDOWS`：通过从后到前关闭每个窗口来关闭应用程序。

    *   `NORMAL_EXIT`：通过调用`System.exit(0)`来关闭应用程序。


    方法`void setQuitHandler(QuitHandler quitHandler)`设置一个自定义处理器，用于确定应用程序是否应退出。方法`void
    handleQuitRequestWith(QuitEvent e, QuitResponse response)`接收两个参数：第一个参数`QuitEvent`代表事件；第二个参数`QuitResponse`代表对退出请求的响应。在`handleQuitRequestWith()`方法的实现中，您应该调用`QuitResponse.cancelQuit()`来取消退出请求，或者调用`QuitResponse.performQuit()`来执行默认的退出策略。


    方法`void enableSuddenTermination()`和`void disableSuddenTermination()`分别启用和禁用应用程序的突然终止。如果应用程序可以被突然终止，它将在没有通知的情况下被终止。`QuitHandler`不会收到通知，关闭钩子也不会运行。当您的应用程序状态已保存时，应调用`enableSuddenTermination()`方法来指示这一点。另一方面，如果您的应用程序状态未保存，则应调用`disableSuddenTermination()`方法来指示这一点。


    清单[14-2](#A459620_1_En_14_Chapter.html#Par27)展示了`QuitHandler`的演示。在`QuitHandler`的实现中，我显示了一个确认对话框，并根据用户的响应调用`performQuit()`或`cancelQuit()`。


    ```java

    public class QuitHandlerDemo {

    private static class MainFrame extends JFrame {

    public MainFrame() throws HeadlessException {

    setTitle("Quit Handler");

    setSize(400, 300);

    setVisible(true);

    }

    }

    public static void main(final String[] args) {

    final MainFrame frame = new MainFrame();

    frame.setDefaultCloseOperation(JFrame.DO_NOTHING_ON_CLOSE);

    final Desktop desktop = Desktop.getDesktop();

    desktop.setQuitHandler((e, response) -> {

    final int result = JOptionPane

    .showConfirmDialog(frame, "Quit the app?", "Quit?", YES_NO_OPTION);

    if (result == YES_OPTION) {

    response.performQuit();

    } else {

    response.cancelQuit();

    }

    });

    }

    }

    ```

