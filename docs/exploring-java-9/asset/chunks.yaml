    removed in JDK 9.'
  trans: '

    ## 移除 GC 组合


    GC 调优是 JVM 性能调优中的一项重要任务。JVM 提供了多种使用不同 GC 算法的 GC 组合。其中一些 GC 组合在 Java 8 中已被弃用。这些被弃用的
    GC 组合已在 Java 9 中被移除，详见表 15-1。如果使用了这些 GC 组合，JVM 将无法启动。由于 JVM 在 Java 8 中已针对这些 GC
    组合打印了警告信息，现有应用程序应已迁移至其他 GC 组合。如果你的应用程序仍在使用这些被弃用的 GC 组合，则应在迁移后执行全面的性能测试。


    表 15-1.


    已移除的 GC 组合


    | GC 配置 | 标志 | 推荐配置 |

    | --- | --- | --- |

    | DefNew + CMS | `-XX:-UseParNewGC` `-XX:+UseConcMarkSweepGC` | ParNew + CMS |

    | ParNew + SerialOld | `-XX:+UseParNewGC` | ParallelScavenge + SerialOld |

    | ParNew + iCMS | `-Xincgc` | CMS |

    | ParNew + iCMS | `-XX:+CMSIncrementalMode` `-XX:+UseConcMarkSweepGC` | CMS |

    | DefNew + iCMS | `-XX:+CMSIncrementalMode` `-XX:+UseConcMarkSweepGC` `-XX:-UseParNewGC`
    | CMS |

    | CMS foreground | `-XX:+UseCMSCompactAtFullCollection` | G1 或 CMS |

    | CMS foreground | `-XX:+CMSFullGCsBeforeCompaction` | G1 或 CMS |

    | CMS foreground | `-XX:+UseCMSCollectionPassing` | G1 或 CMS |


    ## 将 G1 设为默认垃圾回收器


    在 Java 9 中，G1 成为 32 位和 64 位服务器配置上的默认垃圾回收器。作为一款低停顿收集器，G1 应能提供比吞吐量导向型收集器（如 Java
    8 中的默认 GC——Parallel GC）更优的整体性能。


    ## 弃用并发标记清除 (CMS) 垃圾回收器


    既然 G1 已成为默认垃圾回收器，并发标记清除 (CMS) 垃圾回收器已被弃用，并且其支持将在未来的主要版本中移除。当使用命令行选项 `-XX:+UseConcMarkSweepGC`
    时，JVM 会发出警告信息。


    ## 移除启动时 JRE 版本选择


    JDK 5 引入了多 JRE (mJRE) 功能，允许开发者指定启动应用程序所需的 JRE 版本或版本范围。版本要求可以在应用程序 JAR 文件的清单条目
    `JRE-Version` 中指定，也可以作为 `java` 命令的命令行选项 `-version:` 指定。如果当前 JRE 的版本不满足要求，它会尝试搜索满足要求的版本并启动该版本。


    这个 mJRE 功能听起来很有用，但在实践中很少使用。该功能已在 Java 9 中被移除。`java` 命令的命令行选项 `-version:` 也已被移除。如果在
    JAR 文件中找到清单条目 `JRE-Version`，启动器会发出警告信息并继续执行。


    ## 更多诊断命令


    Java 9 中新增了更多可与 `jcmd` 一起运行的诊断命令。你可以使用 jcmd 的 `help` 选项列出所有可用的诊断命令，请参见以下代码。`6239`
    是进程 ID。


    ```

    $ jcmd 6239 help

    ```


    清单 15-1 展示了 Java 8 中可用的诊断命令列表。


    ```

    JFR.stop

    JFR.start

    JFR.dump

    JFR.check

    VM.native_memory

    VM.check_commercial_features

    VM.unlock_commercial_features

    ManagementAgent.stop

    ManagementAgent.start_local

    ManagementAgent.start

    GC.rotate_log

    Thread.print

    GC.class_stats

    GC.class_histogram

    GC.heap_dump

    GC.run_finalization

    GC.run

    VM.uptime

    VM.flags

    VM.system_properties

    VM.command_line

    VM.version

    清单 15-1.

    Java 8 中的诊断命令

    ```


