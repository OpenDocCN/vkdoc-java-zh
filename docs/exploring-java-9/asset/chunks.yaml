    ## 本章小结


    在本章中，我们讨论了 Java 9 中与并发相关的变更，包括 `CompletableFuture` 中的异步任务执行和超时支持、队列和原子类新增的方法，以及新方法
    `Thread.onSpinWait()`。在下一章中，我们将讨论 JavaScript 引擎 Nashorn 的变更。


    # 11. Nashorn


    Nashorn ( [`http://openjdk.java.net/projects/nashorn/`](http://openjdk.java.net/projects/nashorn/)
    ) 是 Java 8 中引入的 JavaScript 引擎，用于取代基于 Mozilla Rhino 的旧引擎。在 Java 8 中，Nashorn 基于
    ECMAScript 5。Java 9 的 Nashorn 引擎已经实现了 ECMAScript 6 的一些新特性。与 Nashorn 相关的 API 位于
    `jdk.scripting.nashorn` 模块中。


    ## 获取 Nashorn 引擎


    您可以使用 JSR 223 ( [`https://www.jcp.org/en/jsr/detail?id=223`](https://www.jcp.org/en/jsr/detail?id=223)
    ) `ScriptEngine` 来获取 Nashorn 引擎；参见清单 11-1。表达式 `new ScriptEngineManager().getEngineByName("Nashorn")`
    是获取 Nashorn `ScriptEngine` 实例的标准方式。但是，创建的 `ScriptEngine` 仅适用于 ECMAScript 5。您需要传递额外的参数
    `--language=es6` 来启用 ECMAScript 6 特性。清单 11-1 向您展示了如何直接使用 `NashornScriptEngineFactory`
    类来创建用于 ECMAScript 6 的 `ScriptEngine`。


