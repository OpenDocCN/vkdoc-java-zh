    ## `Process`


    `Process` also has several new methods; see Table [5-4](#A459620_1_En_5_Chapter.html#Tab4).
    Some of these methods have the same name and functionality as they do in `ProcessHandle`.


    Table 5-4.


    Methods of `Process`


    | Method | Description |

    | --- | --- |

    | `long pid()` | Returns the native process ID |

    | `ProcessHandle.Info info()` | Returns `ProcessHandle.Info`, which contains an
    information snapshot about the process |

    | `boolean isAlive()` | Checks if the process is alive |

    | `ProcessHandle toHandle()` | Returns a `ProcessHandle` for this process |

    | `Stream<ProcessHandle> children()` | Returns all the children processes |

    | `Stream<ProcessHandle> descendants()` | Returns all the descendant processes
    |

    | `boolean supportsNormalTermination()` | Checks if the process can be terminated
    normally using `destroy()` |

    | `CompletableFuture<ProcessHandle> onExit()` | Returns a `CompletableFuture<ProcessHandle>`
    that can be used to run custom actions when the process is terminated |


    ## Managing Long-Running Processes


    With the new method `onExit()` of `ProcessHandle`, it’s now much easier to manage
    long-running processes. Listing [5-3](#A459620_1_En_5_Chapter.html#Par11) shows
    a simple example. In the method `start()`, I create a new process with the command
    `top` ( [`https://linux.die.net/man/1/top`](https://linux.die.net/man/1/top) )
    and it returns the `ProcessHandle` of the process. In the method `waitFor()`,
    I use the method `whenCompleteAsync()` of the `CompletableFuture` object returned
    by `onExit()` to add a handler that invokes when the process exits. In the handler,
    I can get the `ProcessHandle` object of the terminated process. Here I just output
    the PID of this process. The variable `shutdownThread` represents a thread that
    destroys the process after a one-second delay. I can check if the `ProcessHandle`
    supports graceful termination using `supportsNormalTermination()` and try to terminate
    it gracefully. I use the `CountDownLatch` to wait for the asynchronous completion
    handler to finish.


    ```

    public class LongRunningProcess {

    public ProcessHandle start() throws IOException {

    final ProcessBuilder processBuilder = new ProcessBuilder("top")

    .inheritIO();

    return processBuilder.start().toHandle();

    }

    public void waitFor(final ProcessHandle processHandle) {

    final CountDownLatch latch = new CountDownLatch(1);

    processHandle.onExit().whenCompleteAsync((handle, throwable) -> {

    if (throwable == null) {

    System.out.println(handle.pid());

    } else {

    throwable.printStackTrace();

    }

    latch.countDown();

    });

    final Thread shutdownThread = new Thread(() -> {

    try {

    Thread.sleep(1000);

    } catch (final InterruptedException e) {

    e.printStackTrace();

    }

    if (processHandle.supportsNormalTermination()) {

    processHandle.destroy();

    } else {

    processHandle.destroyForcibly();

    }

    });

    shutdownThread.start();

    try {

    shutdownThread.join();

    latch.await();

    } catch (final InterruptedException e) {

    e.printStackTrace();

    }

    }

    public static void main(final String[] args) {

    final LongRunningProcess longRunningProcess = new LongRunningProcess();

    try {

    longRunningProcess.waitFor(longRunningProcess.start());

    } catch (final IOException e) {

    e.printStackTrace();

    }

    }

    }

    Listing 5-3.

    Managing Long-Running Processes

    ```


    When you run the code in Listing [5-3](#A459620_1_En_5_Chapter.html#Par11), you
    should see the output of `top` command for about one second, then the PID of the
    process displays and the program terminates.'
