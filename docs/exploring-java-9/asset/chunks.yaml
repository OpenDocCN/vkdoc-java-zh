    ### Timeout


    The method `CompletableFuture<T> orTimeout(long timeout, TimeUnit unit)` co mpletes
    the `CompletableFuture` exceptionally with a `TimeoutException` if it’s not completed
    before the given timeout. In Listing [10-2](#A459620_1_En_10_Chapter.html#Par6),
    because the `CompletableFuture` is never completed, the code throws an `ExecutionException`
    with a `TimeoutException` as the cause.


    ```

    try {

    new CompletableFuture().orTimeout(3, TimeUnit.SECONDS).get();

    } catch (final InterruptedException | ExecutionException e) {

    e.printStackTrace();

    }

    Listing 10-2.

    Example of orTimeout()

    ```


    The method `CompletableFuture<T> completeOnTimeout(T value, long timeout, TimeUnit
    unit)` completes the `CompletableFuture` with the given value if it’s not completed
    before the given timeout. In Listing [10-3](#A459620_1_En_10_Chapter.html#Par8),
    the `CompletableFuture` is completed with value `1` after a three-second timeout.


    ```

    try {

    final Long value = new CompletableFuture()

    .completeOnTimeout(1L, 3, TimeUnit.SECONDS).get();

    System.out.println(value);

    } catch (final InterruptedException | ExecutionException e) {

    e.printStackTrace();

    }

    Listing 10-3.

    Example of completeOnTimeout()

