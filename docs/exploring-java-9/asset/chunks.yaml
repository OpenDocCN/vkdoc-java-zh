    ## TIFF Image Format


    Java 9已添加对TIFF图像格式的支持。Image I/O框架现在为TIFF格式添加了编解码器。


    ## Deprecating the Applet API


    由于浏览器供应商移除了对Java浏览器插件的支持，Applet API在Java 9中已被弃用。注解`@Deprecated(since="9")`已添加到以下与Applet相关的类中：


    *   `java.applet.AppletStub`

    *   `java.applet.Applet`

    *   `java.applet.AudioClip`

    *   `java.applet.AppletContext`

    *   `javax.swing.JApplet`


    `appletviewer`工具也已弃用。但是，Applet API不会在下一个主要版本中被移除。由于如今Applet的使用相当罕见，此弃用应该只会产生轻微影响。


