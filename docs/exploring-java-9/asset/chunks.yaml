    Nashorn supports iterators and `for..of` loops. The JavaScript code in Listing
    [11-4](#A459620_1_En_11_Chapter.html#Par12) creates a `random` iterator to generate
    random numbers, then it uses a `for..of` loop to get the first `10` elements in
    the iterator.


    ```

