    In Listing [9-6](#A459620_1_En_9_Chapter.html#Par24), I use a static variable
    `sum` to maintain the internal state. I cannot use loop parameters here because
    they are not supposed to be updated. What I can do is to use another iteration
    variable from a different clause. That way, I can use the iteration variable in
    one clause to control the loop exit and use the other iteration variable to store
    the internal state.


    ### countedLoop


    The method `MethodHandle countedLoop(MethodHandle iterations, MethodHandle init,
    MethodHandle body)` creates a method handle representing a loop that runs for
    a given number of iterations. It’s much easier to use than `loop()` for simple
    loops like `for (int i = 0; i < end; ++i)`. The parameters of `countedLoop()`
    are different `MethodHandle`s.


    *   `iterations`: Determines the number of iterations. The result type of this
    method handle must be `int`.

    *   `init`: Initializes the optional loop variable. This variable can be updated
    in each iteration.

    *   `body`: Executes the method body.


    The method handle created by `countedLoop()` has an implicit loop variable that
    starts at `0` and increases by `1` in each iteration. The method handle `init`
    can create a second loop variable that’s passed to `body` as the first parameter
    and uses the return value of `body` as the updated value. The implicit loop variable
    is passed as the second parameter to `body`. Method handles `iterations`, `init`,
    and `body` all accept extra loop parameters that come after the second loop variable
    in the parameters list. The return value of invoking the method handle created
    by `countedLoop()` is the final value of the second loop variable.


    The method `MethodHandle countedLoop(MethodHandle start, MethodHandle end, MethodHandle
    init, MethodHandle body)` is similar to `countedLoop(MethodHandle iterations,
    MethodHandle init, MethodHandle body)`, but it allows customization of the start
    and end values of the implicit loop variable. The method handles `start` and `end`
    must return values of type `int`, which determine the start (inclusive) and end
    (exclusive) values of the loop variable, respectively.


    Listing [9-7](#A459620_1_En_9_Chapter.html#Par33) shows the usage of two `countedLoop()`
    methods to represent the same loop. In the method `body`, the first parameter
    `sum` is the loop variable I created to keep the summarized value. The second
    parameter `i` is the implicit loop variable.


    ```

    public class CountedLoopTest {

    static int body(final int sum, final int i) {

    return sum + i + 1;

    }

    @Test

    public void testCountedLoop() throws Throwable {

    final MethodHandle iterations = MethodHandles.constant(int.class, 10);

    final MethodHandle init = MethodHandles.zero(int.class);

    final MethodHandle body = MethodHandles

    .lookup()

    .findStatic(CountedLoopTest.class, "body",

    MethodType.methodType(int.class, int.class, int.class));

    final MethodHandle countedLoop = MethodHandles

    .countedLoop(iterations, init, body);

    assertEquals(55, countedLoop.invoke());

    }

    @Test

    public void testCountedLoopStartEnd() throws Throwable {

    final MethodHandle start = MethodHandles.zero(int.class);

    final MethodHandle end = MethodHandles.constant(int.class, 10);

    final MethodHandle init = MethodHandles.zero(int.class);

    final MethodHandle body = MethodHandles

    .lookup()

    .findStatic(CountedLoopTest.class, "body",

    MethodType.methodType(int.class, int.class, int.class));

    final MethodHandle countedLoop = MethodHandles

    .countedLoop(start, end, init, body);

    assertEquals(55, countedLoop.invoke());

    }

    }

