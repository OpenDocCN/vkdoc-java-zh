    ## Objects


    In Java 9, more methods have been added to `java.util.Objects`:


    *   `T requireNonNullElse(T obj, T defaultObj)`: Returns the first argument if
    it’s non-null, otherwise returns the second non-null argument.

    *   `T requireNonNullElseGet(T obj, Supplier<? extends T> supplier)`: Returns
    the first argument if it’s non-null, otherwise uses the `Supplier` to get the
    non-null value.

    *   `int checkIndex(int index, int length)`: Checks if `index` is within the bounds
    of range from `0` (inclusive) to `length` (exclusive). It can be used to check
    for array access. This method returns `index` if it’s in the range, otherwise
    the method throws `IndexOutOfBoundsException`.

    *   `int checkFromIndexSize(int fromIndex, int size, int length)`: Checks if the
    subrange from `fromIndex` (inclusive) to `fromIndex + size` (exclusive) is within
    the bounds of the range from `0` (inclusive) to `length` (exclusive). It can be
    used to check for subarray access. This method returns `fromIndex` if the subrange
    is in the range, otherwise the method throws `IndexOutOfBoundsException`.

    *   `int checkFromToIndex(int fromIndex, int toIndex, int length)`: Checks if
    the subrange from `fromIndex` (inclusive) to `toIndex` (exclusive) is within the
    bounds of the range from `0` (inclusive) to `length` (exclusive). This method
    returns `fromIndex` if the subrange is in the range, otherwise the method throws
    `IndexOutOfBoundsException`.


    Listing [16-7](#A459620_1_En_16_Chapter.html#Par31) shows some examples of these
    new methods.


    ```

    public class TestObjects {

    @Test

    public void testRequireNonNullElse() throws Exception {

    assertEquals("hello", Objects.requireNonNullElse("hello", "world"));

    assertEquals("world", Objects.requireNonNullElse(null, "world"));

    }

    @Test(expected = IndexOutOfBoundsException.class)

    public void testCheckIndex() throws Exception {

    assertEquals(0, Objects.checkIndex(0, 1));

    Objects.checkIndex(3, 1);

    assertEquals(1, Objects.checkFromIndexSize(0, 2, 5));

    Objects.checkFromIndexSize(0, 3, 1);

    assertEquals(1, Objects.checkFromToIndex(1, 3, 5));

    Objects.checkFromToIndex(0, 3, 2);

    }

    }

    Listing 16-7.

    Examples of Methods in Objects

    ```


    ## Unicode 8.0


    Java 9 has upgraded its support of Unicode to 8.0 ( [`www.unicode.org/versions/Unicode8.0.0/`](http://www.unicode.org/versions/Unicode8.0.0/)
    ), which is two major versions upgraded from Unicode 6.2 in Java 8. In Unicode
    8.0, you can use emojis ( [`www.unicode.org/emoji/`](http://www.unicode.org/emoji/)
    ). This upgrade also brings better text display for right-to-left languages, such
    as Arabic and Hebrew.


    ## UTF-8 Property Resource Bundles


    The resource bundles in the Java platform have been using the ISO-8859-1 encoding
    for properties files for a long time. Properties files need to be converted using
    the tool `native2ascii` ( [`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/native2ascii.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/native2ascii.html)
    ) to escape Unicode characters. It’s impossible to directly edit these properties
    files.


    In Java 9, the default file encoding for `ResourceBundle` to load properties files
    has changed from ISO-8859-1 to UTF-8. Applications can use UTF-8 properties files
    directly without conversion. In Listing [16-8](#A459620_1_En_16_Chapter.html#Par35),
    I use `ResourceBundle` to load a properties file with Chinese characters.


    ```

    public class UTF8ResourceBundleTest {

    @Test

    public void testGetProperty() {

    final ResourceBundle resourceBundle = ResourceBundle.getBundle("demo");

    assertEquals("你好", resourceBundle.getString("greeting"));

    }

    }

    Listing 16-8.

    UTF-8 Resource Bundles

    ```


    You can override the default resource bundle encoding using the system property
    `java.util.PropertyResourceBundle.encoding`. The possible encodings are `ISO-8859-1`
    and `UTF-8`.'
