    private HandleTarget handleTarget = new HandleTarget();

    private VarHandle varHandle;

    @Before

    public void setUp() throws Exception {

    this.handleTarget = new HandleTarget();

    this.varHandle = MethodHandles

    .lookup()

    .findVarHandle(HandleTarget.class, "count", int.class);

    }

    @Test

    public void testGet() throws Exception {

    assertEquals(1, this.varHandle.get(this.handleTarget));

    assertEquals(1, this.varHandle.getVolatile(this.handleTarget));

    assertEquals(1, this.varHandle.getOpaque(this.handleTarget));

    assertEquals(1, this.varHandle.getAcquire(this.handleTarget));

    }

    }

    Listing 8-5.

    Read Access

    ```


    All these read access methods only require one parameter, which is the target
    object that contains this variable. The class `HandleTarget` is the only coordinate
    type.


    #### Write Access


    This category includes the `set()`, `setVolatile()`, `setOpaque()`, and `setRelease()`
    methods with memory ordering effects specified by the suffix. The method `set()`
    has the plain memory ordering effect (see Table [8-1](#A459620_1_En_8_Chapter.html#Tab1)).
    Listing [8-6](#A459620_1_En_8_Chapter.html#Par25) shows the usage of different
    write access methods.


