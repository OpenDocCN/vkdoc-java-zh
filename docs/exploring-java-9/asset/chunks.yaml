    ### 模块层


    模块层用于组织模块。模块层由类`java.lang.ModuleLayer`表示。


    层是通过将`Configuration`对象中的可读性图中的每个已解析模块映射到一个类加载器（负责加载此模块中定义的类型）来创建的。JVM 至少有一个非空层，即`boot`层，它在
    JVM 启动时创建。大多数应用程序只会使用这个引导层。可以创建额外的层来支持高级用例。一个层可以有多个父层。层中的模块也可以读取该层父层中的模块。创建层时，会为配置中的每个`ResolvedModule`创建一个`java.lang.Module`对象。


    `ModuleLayer`的静态方法`boot()`返回引导层。有三种不同的方法可以从现有的`ModuleLayer`创建新层；参见表 [2-10](#A459620_1_En_2_Chapter.html#Tab10)。现有的`ModuleLayer`将成为新创建层的父层。


    **表 2-10. 创建新`ModuleLayer`的方法**


    | 方法 | 描述 |

    | --- | --- |

    | `defineModules(Configuration cf, Function<String, ClassLoader> clf)` | 从`Configuration`创建一个新的`ModuleLayer`。对于每个模块，该函数返回映射的`ClassLoader`。
    |

    | `defineModulesWithOneLoader(Configuration cf, ClassLoader parentLoader)` | 从`Configuration`创建一个新的`ModuleLayer`。所有模块使用同一个`ClassLoader`，并以`parentLoader`作为父类加载器。
    |

    | `defineModulesWithManyLoaders(Configuration cf, ClassLoader parentLoader)` |
    从`Configuration`创建一个新的`ModuleLayer`。每个模块都有自己的`ClassLoader`，并以`parentLoader`作为父类加载器。
    |


    `ModuleLayer`还具有静态方法`defineModules()`、`defineModulesWithOneLoader()`和`defineModulesWithManyLoaders()`来创建新层。这些方法需要提供父层列表。与实例方法相比，这些静态方法返回`ModuleLayer.Controller`而不是`ModuleLayer`。`ModuleLayer.Controller`具有用于修改层中模块的方法；参见表
    [2-11](#A459620_1_En_2_Chapter.html#Tab11)。


    **表 2-11. `ModuleLayer.Controller`的方法**


    | 方法 | 描述 |

    | --- | --- |

    | `addReads(Module source, Module target)` | 更新模块`source`以读取模块`target` |

    | `ModuleLayer.Controller addExports(Module source, String pn, Module target)`
