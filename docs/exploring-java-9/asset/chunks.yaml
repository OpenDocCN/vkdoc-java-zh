    ### 类


    随着模块的引入，`Class` 新增了与模块相关的方法。`Class<?> forName(Module module, String name)` 返回指定模块中具有给定二进制名称的
    `Class`。此方法委托给该模块的类加载器进行类加载。与 `ClassLoader` 的 `findClass()` 方法类似，`forName()` 在失败时返回
    `null`，而不是抛出 `ClassNotFoundException`。由于一个类加载器可以为多个模块定义类，因此定义的类可能实际上来自不同的模块。在这种情况下，该方法在类加载后也会返回
    `null`。


    由于每个类型现在都位于某个模块中，`Class` 新增了一个方法 `getModule()`，用于返回表示其所属模块的 `Module` 对象。如果此类表示数组类型，则此方法返回元素类型的
    `Module` 对象。如果此类表示基本类型或 `void`，则返回 `java.base` 模块的 `Module` 对象。如果此类位于未命名模块中，则返回此类类加载器的
    `getUnnamedModule()` 的结果。清单 2-42 展示了与 `Class.getModule()` 相关的测试。


    ```

    @Test

    public void testGetModule() {

    assertEquals("java.sql", Driver.class.getModule().getName());

    assertEquals("java.base", String[].class.getModule().getName());

    assertEquals("java.base", int.class.getModule().getName());

    assertEquals("java.base", void.class.getModule().getName());

    }

    清单 2-42.

    测试 Class.getModule()

    ```


    新方法 `String getPackageName()` 返回类的完全限定包名。如果此类表示数组类型，则此方法返回元素类型的包名。如果此类表示基本类型或
    `void`，则返回包名 `java.lang`。否则，包名通过保留 `Class.getName()` 返回的类名中最后一个点号（`.`）之前的字符来派生。清单
    2-43 展示了与 `Class.getPackageName()` 相关的测试。


    ```

    @Test

    public void testGetPackageName() {

    assertEquals("java.sql", Driver.class.getPackageName());

    assertEquals("java.lang", String[].class.getPackageName());

    assertEquals("java.lang", int.class.getPackageName());

    assertEquals("java.lang", void.class.getPackageName());

    }

    清单 2-43.

    测试 Class.getPackageName()

    ```


    ### 反射


    在上一节中，我向你展示了如何使用 `ServiceLoader` 加载服务接口的提供者类。许多框架使用类似的模式和反射 API 来按名称动态加载类并实例化它们。客户端可以通过配置向框架提供类名。框架使用
    `Class.forName()` 加载该类，并使用 `Class` 对象的 `newInstance()` 方法实例化它。


    这种模式在模块系统中可能会出现问题。实际的类可能从未命名模块或其他命名模块加载。如果实际的类从未命名模块加载，则实例化会失败，因为框架的模块无法读取未命名模块。如果实际的类从另一个命名模块加载，框架的模块不可能知道客户端模块的存在并声明对它们的依赖，这实际上颠倒了依赖关系。为了使这正常工作，反射
    API 有一个隐式约定，即假设任何反射类型的代码都位于一个读取定义此类型的模块的模块中。反射 API 可以访问该类型。


    在清单 2-44 中，我在一个命名模块中使用反射 API 加载 Guava 类 `com.google.common.eventbus.EventBus`
    并实例化一个新实例。Guava 库被放置在类路径中，因此它位于未命名模块中。`clazz.getModule()` 的输出类似于 `unnamed module
    @1623b78d`，这确认了该类位于未命名模块中。实例化成功，你可以看到类似 `EventBus{default}` 的输出。


    ```

    try {

    final Class clazz = Class.forName("com.google.common.eventbus.EventBus");

    System.out.println(clazz.getModule());

    final Object instance = clazz.getDeclaredConstructor().newInstance();

    System.out.println(instance);

    } catch (final Exception e) {

    e.printStackTrace();

    }

    清单 2-44.

    使用反射 API 实例化一个实例

    ```


    注意


    方法 `Class.newInstance()` 在 Java 9 中已被弃用。在清单 2-44 中，我使用 `clazz.getDeclaredConstructor().newInstance()`
    来获取构造器，然后使用它来实例化新实例。

