    ## Third-Party Libraries


    If you have used RxJava or Reactor before, you’ll find out that by comparison,
    the interfaces provided by `Flow` are quite minimal. The Reactive Streams specification
    is designed to be minimal and it focuses on the interoperability between different
    libraries. You can integrate `Flow` with RxJava and Reactor.


    ### RxJava 2


    You can use the library RxJava2Jdk9Interop ( [`https://github.com/akarnokd/RxJava2Jdk9Interop`](https://github.com/akarnokd/RxJava2Jdk9Interop)
    ) for the conversion. Listing [7-5](#A459620_1_En_7_Chapter.html#Par30) shows
    you how to do the conversion between RxJava 2 `Flowable` and `Flow`.


    ```

    import hu.akarnokd.rxjava2.interop.FlowInterop;

    import io.reactivex.Flowable;

    import java.util.concurrent.TimeUnit;

    public class RxJava2 {

    public void toFlow() {

    Flowable.interval(0, 50, TimeUnit.MILLISECONDS)

    .take(50)

    .to(FlowInterop.toFlow())

    .subscribe(new DelayedSubscribers.DelayedSubscriber("1"));

    }

    public void fromFlow() {

    final DelayedSubscribers.SequenceGenerator sequenceGenerator =

    new DelayedSubscribers.SequenceGenerator();

    final PeriodicPublisher publisher =

    new PeriodicPublisher(

    pub -> pub.submit(sequenceGenerator.get()),

    16,

    50,

    50,

    TimeUnit.MILLISECONDS);

    FlowInterop.fromFlowPublisher(publisher)

    .map(v -> v * 10)

    .forEach(System.out::println);

    }

    public static void main(final String[] args) {

    final RxJava2 rxJava2 = new RxJava2();

    rxJava2.toFlow();

    rxJava2.fromFlow();

    try {

    Thread.sleep(10000);

    } catch (final InterruptedException e) {

    e.printStackTrace();

    }

    }

    }

    Listing 7-5.

    RxJava 2 and Flow

    ```


    ### Reactor


    Reactor has a built-in adapter for `Flow`. Listing [7-6](#A459620_1_En_7_Chapter.html#Par32)
    shows how to do the conversion between Reactor `Flux` and `Flow`.


    ```

    import java.time.Duration;

    import java.util.concurrent.TimeUnit;

    import reactor.adapter.JdkFlowAdapter;

    import reactor.core.publisher.Flux;

    public class Reactor {

    public void toFlow() {

    JdkFlowAdapter.publisherToFlowPublisher(

    Flux.interval(Duration.ZERO, Duration.ofMillis(50))

    .take(50)

    ).subscribe(new DelayedSubscribers.DelayedSubscriber("1"));

    }

    public void fromFlow() {

    final DelayedSubscribers.SequenceGenerator sequenceGenerator =

    new DelayedSubscribers.SequenceGenerator();

    final PeriodicPublisher publisher =

    new PeriodicPublisher(

    pub -> pub.submit(sequenceGenerator.get()),

    16,

    50,

    50,

    TimeUnit.MILLISECONDS);

    JdkFlowAdapter.flowPublisherToFlux(publisher)

    .map(v -> v * 10)

    .subscribe(System.out::println);

    }

    public static void main(final String[] args) {

    final Reactor reactor = new Reactor();

    reactor.toFlow();

    reactor.fromFlow();

    try {

    Thread.sleep(10000);

    } catch (final InterruptedException e) {

    e.printStackTrace();

    }

    }

    }

    Listing 7-6.

    Reactor and Flow

    ```


    ### Interoperability


    Listing [7-7](#A459620_1_En_7_Chapter.html#Par34) shows you how to use `Flow`
    to convert an RxJava 2 `Flowable` to a Reactor `Flux`.


    ```

    import hu.akarnokd.rxjava2.interop.FlowInterop;

    import io.reactivex.Flowable;

    import java.util.concurrent.Flow;

    import java.util.concurrent.TimeUnit;

    import reactor.adapter.JdkFlowAdapter;

    public class RxInterop {

    public static void main(final String[] args) {

    final Flow.Publisher publisher =

    Flowable.interval(0, 50, TimeUnit.MILLISECONDS)

    .take(50)

    .to(FlowInterop.toFlow());

    JdkFlowAdapter.flowPublisherToFlux(publisher)

    .map(v -> v * 10)

    .toStream()

    .forEach(System.out::println);

    }

    }

