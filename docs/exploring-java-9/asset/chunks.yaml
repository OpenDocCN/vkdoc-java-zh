    模块解析过程可能因各种原因失败。如果找不到根模块、直接依赖项或传递依赖项，或者在尝试查找模块时发生任何错误，`resolve()` 和 `resolveAndBind()`
    方法会抛出 `FindException`。找到所有模块后，会计算可读性图，并检查模块导出和服务使用的一致性。一致性检查包括检查循环模块依赖、重复模块读取、重复包导出以及无效的服务使用。当任何一致性检查失败时，会抛出
    `ResolutionException`。


