    ```


    ### `jlink`


    要运行 Java 应用程序，你需要先安装 JRE 或 JDK。正如我之前提到的，在 Java 9 之前，没有简单的方法来自定义 JRE 或 JDK 以仅包含必要的内容。即使是一个简单的“Hello
    World”应用程序也需要完整大小的 JRE 才能运行。然而，在 JDK 模块化之后，可以创建自己的 Java 运行时映像，该映像仅包含应用程序所需的系统模块，这可以减小
    JRE 映像的大小。


    你可以使用 `jlink` 来构建自定义映像。如果你有一个模块 `demo.simple`，其中包含一个类 `test.Main`，你可以用它来打印出 `Hello
