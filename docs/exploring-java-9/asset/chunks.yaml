- fmt: '# `Thread.onSpinWait()`


    当您使用线程运行任务时，通常需要任务等待某个条件满足后才能继续执行。通常的做法是使用`volatile`变量作为标志位，由另一个线程设置该标志来停止等待。在Java
    9之前，您使用空循环来等待条件。Java 9中`Thread`类的新静态方法`onSpinWait()`可以使等待更加高效。


    清单[10-7](#A459620_1_En_10_Chapter.html#Par39)展示了`Thread.onSpinWait()`的示例。`NormalTask`和`SpinWaitTask`类都使用`volatile`布尔变量`canStart`作为标志位，通过`start()`方法将标志设置为`true`。这两个类的区别在于`SpinWaitTask`在循环中使用了`Thread.onSpinWait()`。这里我使用另一个线程在三秒后调用`start()`方法来停止等待。


    ```

    public class ThreadOnSpinWait {

    public static void main(final String[] args) throws InterruptedException {

    final NormalTask task1 = new NormalTask();

    final SpinWaitTask task2 = new SpinWaitTask();

    final Thread thread1 = new Thread(task1);

    thread1.start();

    final Thread thread2 = new Thread(task2);

    thread2.start();

    new Thread(() -> {

    try {

    Thread.sleep(3000);

    } catch (final InterruptedException e) {

    e.printStackTrace();

    } finally {

    task1.start();

    task2.start();

    }

    }).start();

    thread1.join();

    thread2.join();

    }

    private abstract static class Task implements Runnable {

    volatile boolean canStart;

    void start() {

    this.canStart = true;

    }

    }

    private static class NormalTask extends Task {

    @Override

    public void run() {

    while (!this.canStart) {

    }

    System.out.println("Done!");

    }

    }

    private static class SpinWaitTask extends Task {

    @Override

    public void run() {

    while (!this.canStart) {

    Thread.onSpinWait();

    }

    System.out.println("Done!");

    }

    }

    }

    ```


    *清单 10-7. `Thread.onSpinWait()`示例*


    ## 总结


    在本章中，我们讨论了Java 9中与并发相关的变更，包括`CompletableFuture`中的异步任务执行和超时支持、队列和原子类新增的方法，以及新方法`Thread.onSpinWait()`。在下一章中，我们将讨论JavaScript引擎Nashorn的变更。


    # 11. Nashorn


    Nashorn（[http://openjdk.java.net/projects/nashorn/](http://openjdk.java.net/projects/nashorn/)）是Java
    8中引入的JavaScript引擎，用于替代基于Mozilla Rhino的旧引擎。在Java 8中，Nashorn基于ECMAScript 5。Java
    9中的Nashorn引擎已经实现了ECMAScript 6的一些新特性。与Nashorn相关的API位于`jdk.scripting.nashorn`模块中。


    ## 获取Nashorn引擎


    您可以使用JSR 223（[https://www.jcp.org/en/jsr/detail?id=223](https://www.jcp.org/en/jsr/detail?id=223)）的`ScriptEngine`来获取Nashorn引擎，参见清单[11-1](#A459620_1_En_11_Chapter.html#Par3)。表达式`new
    ScriptEngineManager().getEngineByName("Nashorn")`是获取Nashorn`ScriptEngine`实例的标准方式。然而，创建的`ScriptEngine`仅适用于ECMAScript
    5。您需要传递额外参数`--language=es6`来启用ECMAScript 6特性。清单[11-1](#A459620_1_En_11_Chapter.html#Par3)展示了如何直接使用`NashornScriptEngineFactory`类为ECMAScript
    6创建`ScriptEngine`。


    ```

    public class NashornTest {

    private final ScriptEngine es5Engine =

    new ScriptEngineManager().getEngineByName("Nashorn");

    private final ScriptEngine es6Engine =

    new NashornScriptEngineFactory().getScriptEngine("--language=es6");

    @Test

    public void testSimpleEval() throws Exception {

    assertEquals(2, es5Engine.eval("1 + 1"));

    }

    }

    ```


    *清单 11-1. 创建Nashorn ScriptEngine*


    您也可以使用`jjs`工具来尝试ECMAScript 6的新特性。


    ```

    $ jjs --language=es6

    ```


    ## ECMAScript 6特性


    以下各节展示了Java 9中Nashorn支持的ECMAScript 6特性。


    ### 模板字符串


    Nashorn支持ECMAScript 6模板字符串（[https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/template_strings](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/template_strings)），包括无标签和带标签的模板字符串，参见清单[11-2](#A459620_1_En_11_Chapter.html#Par8)。


    ```

    @Test

    public void testTemplateString() throws Exception {

    final Bindings bindings = new SimpleBindings();

    bindings.put("name", "Alex");

    final Object result = this.es6Engine.eval("Hello ${name}", bindings);

    assertEquals("Hello Alex", result);

    }

    ```


    *清单 11-2. 模板字符串*


    ### 二进制和八进制字面量


    Nashorn也支持二进制（`b`）和八进制（`o`）字面量，参见清单[11-3](#A459620_1_En_11_Chapter.html#Par10)。


    ```

    @Test

    public void testBinaryAndOctalLiterals() throws Exception {

    assertEquals(503, this.es6Engine.eval("0b111110111"));

    assertEquals(503, this.es6Engine.eval("0o767"));

    }

    ```


    *清单 11-3. 二进制和八进制字面量*


    ### 迭代器和`for..of`循环


    Nashorn支持迭代器和`for..of`循环。清单[11-4](#A459620_1_En_11_Chapter.html#Par12)中的JavaScript代码创建了一个`random`迭代器来生成随机数，然后使用`for..of`循环获取迭代器中的前`10`个元素。


    ```

    let random = {

    [Symbol.iterator]() {

    return {

    next() {

    return { done: false, value: Math.random() }

    }

    }

    }

    }

    let result = [];

    for (var n of random) {

    if (result.length >= 10)

    break;

    result.push(n);

    }

    result

