    ### `/reset`


    `/reset` 命令重置 jshell 的内部状态。重置后，所有正常和错误的代码片段及变量都会被移除。启动代码片段会重新执行。由 `/set` 所做的配置更改会保留。`/reset`
    支持与 `/env` 相同的选项：`-class-path`、`-module-path`、`-add-modules` 和 `-add-exports`。


    ### `/reload`


    `/reload` 命令重置 jshell，并按输入顺序重放每个有效的代码片段和 `/drop` 命令。`/reload` 支持两种模式：普通模式和恢复模式。在普通模式下使用
    `/reload`，它只会重放自上次进入 jshell 以来，或自执行 `/reset` 或 `/reload` 命令以来的有效历史记录。在恢复模式下使用
    `/reload -restore`，它会重放自上次进入 jshell 到最近一次进入 jshell 之间，或自执行 `/reset` 或 `/reload`
    命令以来的有效历史记录。恢复模式可以重放上一次 jshell 会话的历史记录。当传递 `-quiet` 选项时，`/reload` 不会显示重放的输出，但错误仍会显示。`/reload`
    也支持与 `/env` 相同的选项：`-class-path`、`-module-path`、`-add-modules` 和 `-add-exports`。


    使用 `/env` 修改求值上下文后，历史记录会被静默重放，就像调用了 `/reload -quiet` 命令一样。


    ### `/!`


    此命令重新运行上一个代码片段。


    ### `/<id>`


    此命令重新运行具有指定 ID 的代码片段。


    ### `/-<n>`


    此命令重新运行第 n 个代码片段。


    ### `/exit`


    此命令退出 jshell。


    ## 总结


