- fmt: '# Creating Custom `LoggerFinder` Implementations


    Now you can create your own `LoggerFinder` implementations. Since `LoggerFinder`
    can change the system’s default logging implementation, when a `SecurityManager`
    is installed, the implementation of `LoggerFinder` should check the permission
    `loggerFinder` first.


    Here I am going to use SLF4J with Logback as the logging framework to demonstrate
    how to create a custom `LoggerFinder`. In Listing [6-2](#A459620_1_En_6_Chapter.html#Par12),
    the class `SLF4JLoggerFinder` is the `LoggerFinder` implementation. The method
    `checkPermission()` is used to check the required permission. In the method `getLogger()`,
    I use the SLF4J method `LoggerFactory.getLogger()` to create a new `org.slf4j.Logger`
    instance. The logger name is created from the module name and the provided name.
    The return value of `getLogger()` is an instance of the class `SLF4JLoggerWrapper`,
    which is shown in Listing [6-3](#A459620_1_En_6_Chapter.html#Par14).


    ```

    public class SLF4JLoggerFinder extends System.LoggerFinder {

    private static final RuntimePermission LOGGERFINDER_PERMISSION =

    new RuntimePermission("loggerFinder");

    public SLF4JLoggerFinder() {

    this.checkPermission();

    }

    private void checkPermission() {

    final SecurityManager sm = System.getSecurityManager();

    if (sm != null) {

    sm.checkPermission(LOGGERFINDER_PERMISSION);

    }

    }

    @Override

    public System.Logger getLogger(final String name, final Module module) {

    checkPermission();

    final Logger logger = LoggerFactory

    .getLogger(String.format("%s/%s", module.getName(), name));

    return new SLF4JLoggerWrapper(logger);

    }

    }

    Listing 6-2.

    SLF4JLoggerFinder

    ```


    The class `SLF4JLoggerWrapper` implements the interface `System.Logger`. In the
    method `isLoggable()`, it delegates to different methods in the wrapped `org.slf4j.Logger`
    instance the task of checking whether the logging level should be logged. For
    example, if the level is `DEBUG`, it delegates to the method `isDebugEnabled()`.
    The logging methods in `org.slf4j.Logger`—for example, `trace()` and `debug()`—accept
    different parameters than the method `log()` in `System.Logger`, so I need to
    create adapters for localization and message format. The method `localizedMessage()`
    returns the localized message retrieved from the `ResourceBundle`. The method
    `doLog()` only takes plain messages and delegates to different logging methods
    in `org.slf4j.Logger` based on the level. In the method `log()` of `SLF4JLoggerWrapper`,
    the plain message is prepared first and passed to `doLog()` for logging.


    ```

    public class SLF4JLoggerWrapper implements System.Logger {

    private final Logger logger;

    public SLF4JLoggerWrapper(final Logger logger) {

    this.logger = logger;

    }

    @Override

    public String getName() {

    return this.logger.getName();

    }

    @Override

    public boolean isLoggable(final Level level) {

    switch (level) {

    case ALL:

    case TRACE:

    return this.logger.isTraceEnabled();

    case DEBUG:

    return this.logger.isDebugEnabled();

    case INFO:

    return this.logger.isInfoEnabled();

    case WARNING:

    return this.logger.isWarnEnabled();

    case ERROR:

    return this.logger.isErrorEnabled();

    default:

    return false;

    }

    }

    @Override

    public void log(final Level level, final ResourceBundle bundle,

    final String msg, final Throwable thrown) {

    this.doLog(level, localizedMessage(bundle, msg), thrown);

    }

    @Override

    public void log(final Level level, final ResourceBundle bundle,

    final String format, final Object... params) {

    this.doLog(level,

    String.format(localizedMessage(bundle, format), params),

    null);

    }

    private void doLog(final Level level,

    final String msg,

    final Throwable thrown) {

    switch (level) {

    case ALL:

    case TRACE:

    this.logger.trace(msg, thrown);

    break;

    case DEBUG:

    this.logger.debug(msg, thrown);

    break;

    case INFO:

    this.logger.info(msg, thrown);

    break;

    case WARNING:

    this.logger.warn(msg, thrown);

    break;

    case ERROR:

    this.logger.error(msg, thrown);

    break;

    }

    }

    private String localizedMessage(final ResourceBundle resourceBundle,

    final String msg) {

    if (resourceBundle != null) {

    try {

    return resourceBundle.getString(msg);

    } catch (final MissingResourceException e) {

    return msg;

    }

    }

    return msg;

    }

    }

    Listing 6-3.

    SLF4JLoggerWrapper

    ```


    The file `module-info.java` of this module in Listing [6-4](#A459620_1_En_6_Chapter.html#Par16)
    uses `provides` to declare the provider of `System.LoggerFinder`.


    ```

    module feature.logging {

    requires transitive slf4j.api;

    provides java.lang.System.LoggerFinder

    with io.vividcode.feature9.logging.SLF4JLoggerFinder;

    }

    Listing 6-4.

    Module Declaration

    ```


    Now I can use the logging service to log messages. I create a logger using the
    method `System.getLogger()`, then use the method `log()` to log messages. Here
    I use some Java standard classes to see how both application and platform logs
    are combined.


    ```

    public class Main {

    private static final System.Logger LOGGER = System.getLogger("Main");

    public static void main(final String[] args) {

    LOGGER.log(Level.INFO, "Run!");

    try {

    new URL("https://google.com").openConnection().connect();

    } catch (final IOException e) {

    LOGGER.log(Level.WARNING, "Failed to connect", e);

    }

    }

    }

    Listing 6-5.

    Using the Logging Service

    ```


    Listing [6-6](#A459620_1_En_6_Chapter.html#Par20) shows the logs. In the output,
    you can see both application logs and JDK logs. Here I configured Logback to log
    out all messages.


    ```

    2017-09-20 21:23:56,202 |  INFO [      main] feature.runtime/Main : Run!

    2017-09-20 21:23:56,448 | TRACE [      main] .h.HttpURLConnection : ProxySelector
    Request for https://google.com/

    2017-09-20 21:23:56,450 | TRACE [      main] .h.HttpURLConnection : Looking for
    HttpClient for URL https://google.com and proxy value of DIRECT

    2017-09-20 21:23:56,451 | TRACE [      main] .h.HttpURLConnection : Creating new
    HttpsClient with url:https://google.com and proxy:DIRECT with connect timeout:-1

    2017-09-20 21:23:56,516 | TRACE [      main] .h.HttpURLConnection : Proxy used:
    DIRECT

    Listing 6-6.

    Log Messages

    ```


    ## Summary


    With the new platform logging API and service, you can now use a single logging
    implementation for both the JDK itself and applications. This makes the error
    diagnostics much easier. In next chapter, we’ll discuss reactive streams.


    # Reactive Streams


    Reactive programming ( [https://en.wikipedia.org/wiki/Reactive_programming](https://en.wikipedia.org/wiki/Reactive_programming)
    ) has gained popularity in the Java community recently. In the Java world, we
    have popular reactive libraries like RxJava ( [https://github.com/ReactiveX/RxJava](https://github.com/ReactiveX/RxJava)
    ) and Reactor ( [http://projectreactor.io/](http://projectreactor.io/) ). Reactive
    Streams ( [http://www.reactive-streams.org/](http://www.reactive-streams.org/)
    ) is an initiative to provide a standard for asynchronous stream processing with
    nonblocking back pressure. Core interfaces from the Reactive Streams specification
    have been added to Java 9 in the class `java.util.concurrent.Flow`.


    ## Core Interfaces


    This section covers the four core interfaces in `Flow`.


    ### `Flow.Publisher<T>`


    The interface `Flow.Publisher<T>` represents a producer of items to be received
    by subscribers. It only has one method, `void subscribe(Flow.Subscriber<? super
    T> subscriber)`, which adds subscribers of type `Flow.Subscriber`. There are three
    types of notifications that a publisher can publish; see Table [7-1](#A459620_1_En_7_Chapter.html#Tab1).


    **Table 7-1.** Notifications of `Publisher`


    | Notification | Description |

    | --- | --- |

    | `onNext` | A new item has been published. |

    | `onComplete` | No further notifications will be published. |

    | `onError` | An error has been encountered when publishing items. |


    Both `onComplete` and `onError` are terminal notifications meaning that no more
    notifications will be published after an `onComplete` or `onError` notification.
    It’s valid for a publisher to not publish any `onNext` notifications. It’s also
    possible for a publisher to publish an infinite number of `onNext` notifications.'
