- fmt: '### The `filtering()` Method


    The method `<T, A, R> Collector<T, ?, R> filtering(Predicate<? super T> predicate,
    Collector<? super T,A,R> downstream)` filters input elements by applying the predicate
    function, and it only accumulates elements to the downstream `Collector` when
    the predicate returns `true`.


    Listing [4-12](#A459620_1_En_4_Chapter.html#Par38) shows how to use `filtering()`
    to filter a stream of `String`s by its length and collect them into a `Set`. This
    actually can be simplified to use `Stream.filter()` first and then collect the
    `String`s into a `Set`.


    ```

    @Test

    public void testSimpleFiltering() throws Exception {

    final Set result = Stream.of("a", "bc", "def")

    .collect(Collectors.filtering(

    v -> v.length() > 1,

    Collectors.toSet()));

    assertEquals(2, result.size());

    }

    Listing 4-12.

    Simple Example of Collectors.filtering()

    ```


    Listing [4-13](#A459620_1_En_4_Chapter.html#Par40) shows a more complicated example
    of `filtering()`. The variable `users` is a map of users’ names to their ages.
    This example uses `groupingBy()` to group the map entries by the first character
    of the name. Then it used `filtering()` to only keep entries with ages greater
    than `18`. Finally, it uses `mapping()` to map the entries into the names. The
    result is a map of each name’s first character to the `Set` of names. Because
    the age of `Bob` is only `16`, the value of key `B` in the result map is an empty
    `Set`.


    ```

    @Test

    public void testComplicatedFiltering() throws Exception {

    final Map users = Map.of(

    "Alex", 30,

    "Bob", 16,

    "David", 50

    );

    final Map> result = users

    .entrySet()

    .stream()

    .collect(Collectors.groupingBy(entry -> entry.getKey().substring(0, 1),

    Collectors.filtering(entry -> entry.getValue() > 18,

    Collectors.mapping(

    Map.Entry::getKey,

    Collectors.toSet()))));

    assertEquals(1, result.get("A").size());

    assertEquals(0, result.get("B").size());

    assertEquals(1, result.get("D").size());

    }

    Listing 4-13.

    Complicated Example of Collectors.filtering()

    ```


    ### The `flatMapping()` Method


    The method `<T, U, A, R> Collector<T, ?, R> flatMapping(Function<? super T,? extends
    Stream<? extends U>> mapper, Collector<? super U,A,R> downstream)` applies a flat
    mapping function to the input elements and accumulates elements in the mapped
    streams to the downstream `Collector`.


    In Listing [4-14](#A459620_1_En_4_Chapter.html#Par43), given a stream of `String`s,
    you can see `flatMapping()` used to map a `String` to a stream of `Integer`s and
    then collect all `Integer`s into a `Set`. The result `Set` only contains three
    elements.


    ```

    @Test

    public void testFlatMapping() throws Exception {

    final Set result = Stream.of("a", "ab", "abc")

    .collect(Collectors.flatMapping(v -> v.chars().boxed(),

    Collectors.toSet()));

    assertEquals(3, result.size());

    }

    Listing 4-14.

    Example of Collectors.flatMapping()

    ```


    ## Optional


    Three new methods have been added to `java.util.Optional`.


    ### The `ifPresentOrElse()` Method


    The method `void ifPresentOrElse(Consumer<? super T> action, Runnable emptyAction)`
    performs the given `action` if the value is present, otherwise it performs the
    given action `emptyAction`.


    In Listing [4-15](#A459620_1_En_4_Chapter.html#Par47), the method `checkValue()`
    increases or decreases the `count` based on whether the value is present. The
    first invocation of `checkValue()` decreases the `count`, whereas the second invocation
    increases the `count`.


    ```

    public class OptionalTest {

    private AtomicInteger count;

    @Before

    public void setUp() throws Exception {

    this.count = new AtomicInteger();

    }

    @Test

    public void testIfPresentOrElse() throws Exception {

    checkValue(Optional.empty());

    assertEquals(-1, this.count.get());

    checkValue(Optional.of(1));

    assertEquals(0, this.count.get());

    }

    private void checkValue(final Optional value) {

    value.ifPresentOrElse(

    v -> this.count.incrementAndGet(),

    () -> this.count.decrementAndGet()

    );

    }

    }

    Listing 4-15.

    Example of Optional.ifPresentOrElse()

    ```


    ### The `Optional.or()` Method


    The method `Optional<T> or(Supplier<? extends Optional<? extends T>> supplier)`
    returns an `Optional` with the value if a value is present, otherwise it returns
    an `Optional` produced by the supplier function. Listing [4-16](#A459620_1_En_4_Chapter.html#Par49)
    shows the example of this method.


    ```

    @Test

    public void testOr() throws Exception {

    assertTrue(Optional.empty().or(() -> Optional.of(1)).isPresent());

    }

    Listing 4-16.

    Example of Optional.or()

    ```


    ### The `stream()` Method


    The method `Stream<T> stream()` converts the `Optional` into a `Stream`. If a
    value is present, then the result stream contains only the value, otherwise the
    result stream is empty. This method is useful when you’re working with `flatMap()`
    to convert a `Stream` of `Optional`s into a `Stream` of present value elements.


    In Listing [4-17](#A459620_1_En_4_Chapter.html#Par52), the stream of `Optional`s
    contains three elements, but only two of them have values. After using `flatMap()`,
    the result stream contains the two present values.


    ```

    @Test

    public void testStream() throws Exception {

    final long count = Stream.of(

    Optional.of(1),

    Optional.empty(),

    Optional.of(2)

    ).flatMap(Optional::stream)

    .count();

    assertEquals(2, count);

    }

    Listing 4-17.

    Example of Optional.stream()

    ```


    Methods `ifPresentOrElse()` and `stream()` are also added to classes `java.util.OptionalInt`,
    `java.util.OptionalDouble`, and `java.util.OptionalLong`.


    ## Summary


    This chapter covered changes related to collections, `Stream`, and `Optional`
    in Java 9. The new factory methods for creating immutable collections can save
    a lot of code in Java programs. The new methods added to `Arrays`, `Stream`, and
    `Optional` are also very useful. In the next chapter, we’ll discuss the new Process
    API.


    # 5. The Process API


    The Java Process API allows developers to create and manage native processes.
    You can now use the `java.lang.ProcessBuilder` from JDK 5 to create processes
    and redirect the output and error streams. The new interface `java.lang.ProcessHandle`
    in Java 9 allows you to control the native processes created by `ProcessBuilder.start()`.'
