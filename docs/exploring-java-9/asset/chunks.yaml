    ### `whileLoop` and `doWhileLoop`


    方法`MethodHandle whileLoop(MethodHandle init, MethodHandle pred, MethodHandle body)`创建了一个表示`while`循环的方法句柄。一个`while`循环由三个方法句柄定义。


    *   `init`：初始化一个可选的循环变量。在每次迭代中，循环变量被传递给`body`，并用`body`的返回值进行更新。循环执行的结果是循环变量的最终值。

    *   `pred`：执行一个谓词来测试循环是否退出。

    *   `body`：执行方法体。


    方法`MethodHandle doWhileLoop(MethodHandle init, MethodHandle body, MethodHandle
    pred)`创建了一个表示`do-while`循环的方法句柄。它具有与`whileLoop`相同的参数，但顺序不同。在`doWhileLoop`中，参数`body`位于`pred`之前。这是因为`do-while`循环在每次迭代中先执行`body`，再执行`pred`。这三个参数的含义与`whileLoop()`中的相同。


    在清单[9-9](#A459620_1_En_9_Chapter.html#Par42)中，循环变量是一个包含两个元素的`int[]`数组；第一个元素是控制循环退出的迭代变量，而第二个元素包含总和。`k`是决定迭代次数的额外参数。方法`init()`的返回值是循环变量的初始值。方法`body()`的返回值作为下一次迭代的输入。所创建的`MethodHandle`的返回值是循环变量的最终值。


    ```

    public class WhileLoopTest {

    static int[] init(final int k) {

    return new int[]{1, 0};

    }

    static boolean pred(final int[] local, final int k) {

    return local[0] < k;

    }

    static int[] body(final int[] local, final int k) {

    return new int[]{local[0] + 1, local[1] + local[0]};

    }

    @Test

    public void testWhileLoop() throws Throwable {

    final MethodHandle init = getMethodHandle("init",

    MethodType.methodType(int[].class, int.class));

    final MethodHandle pred = getMethodHandle("pred",

    MethodType.methodType(boolean.class, int[].class, int.class));

    final MethodHandle body = getMethodHandle("body",

    MethodType.methodType(int[].class, int[].class, int.class));

    final MethodHandle whileLoop = MethodHandles.whileLoop(init, pred, body);

    assertEquals(55, ((int[]) whileLoop.invoke(11))[1]);

    }

    @Test

    public void testDoWhileLoop() throws Throwable {

    final MethodHandle init = getMethodHandle("init",

    MethodType.methodType(int[].class, int.class));

    final MethodHandle pred = getMethodHandle("pred",

    MethodType.methodType(boolean.class, int[].class, int.class));

    final MethodHandle body = getMethodHandle("body",

    MethodType.methodType(int[].class, int[].class, int.class));

    final MethodHandle doWhileLoop = MethodHandles

    .doWhileLoop(init, body, pred);

    assertEquals(55, ((int[]) doWhileLoop.invoke(11))[1]);

    }

    private MethodHandle getMethodHandle(final String name,

    final MethodType methodType)

    throws NoSuchMethodException, IllegalAccessException {

    return MethodHandles

    .lookup()

    .findStatic(WhileLoopTest.class, name, methodType);

    }

    }

    Listing 9-9.

    Example of whileLoop() and doWhileLoop()

    ```


    **注意**


    在`countedLoop()`、`iteratedLoop()`、`whileLoop()`和`doWhileLoop()`中的方法句柄`body`可以有一个可选的循环变量。如果`body`的返回类型是`void`，那么`body`将没有循环变量作为其前导参数。在这种情况下，`init`的返回类型也是`void`。当没有循环变量时，`body`的第一个参数将是隐式循环变量。


    ## `try-finally`


    方法`MethodHandle tryFinally(MethodHandle target, MethodHandle cleanup)`创建了一个方法句柄，它将目标方法句柄包装在一个`try-finally`块中。参数`target`是要包装的`MethodHandle`，而`cleanup`是在`finally`块中调用的`MethodHandle`。执行`target`时抛出的任何异常都会传递给`cleanup`。除非`cleanup`首先抛出异常，否则该异常将被重新抛出。由`tryFinally()`创建的方法句柄的返回值是`cleanup`的返回值。`cleanup`接受两个可选的前导参数：


    *   一个`Throwable`，表示调用方法句柄`target`时抛出的异常。

    *   方法句柄`target`的返回值。


    除了这两个前导参数外，`target`和`cleanup`应具有相同的相应参数和返回类型。在清单[9-10](#A459620_1_En_9_Chapter.html#Par48)中，我有两个不同的目标方法句柄：`success`和`failure`。包装方法`success()`的方法句柄`tryFinallySuccess`返回值`1`，但包装方法`failure()`的方法句柄`tryFinallyFailure`抛出`IllegalArgumentException`。方法`cleanup`在两次调用中都被调用，并向控制台输出不同的信息。


    ```

    public class TryFinallyTest {

    static int success() {

    return 1;

    }

    static int failure() {

    throw new IllegalArgumentException("");

    }

    static int cleanup(final Throwable throwable, final int result) {

    if (throwable != null) {

    throwable.printStackTrace();

    } else {

    System.out.println("Success: " + result);

    }

    return result;

    }

    @Test(expected = IllegalArgumentException.class)

    public void testTryFinally() throws Throwable {

    final MethodHandle targetSuccess = getMethodHandle("success",

    MethodType.methodType(int.class));

    final MethodHandle targetFailure = getMethodHandle("failure",

    MethodType.methodType(int.class));

    final MethodHandle cleanup = getMethodHandle("cleanup",

    MethodType.methodType(int.class, Throwable.class, int.class));

    final MethodHandle tryFinallySuccess = MethodHandles

    .tryFinally(targetSuccess, cleanup);

    assertEquals(1, tryFinallySuccess.invoke());

    final MethodHandle tryFinallyFailure = MethodHandles

    .tryFinally(targetFailure, cleanup);

    tryFinallyFailure.invoke();

    }

    private MethodHandle getMethodHandle(final String name,

    final MethodType methodType)

    throws NoSuchMethodException, IllegalAccessException {

    return MethodHandles

    .lookup()

    .findStatic(TryFinallyTest.class, name, methodType);

    }

    }

