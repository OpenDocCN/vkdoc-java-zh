- fmt: '# 3. jshell


    `jshell` is a useful utility tool that adds the Read-Eval-Print Loop (REPL) to
    Java. It allows developers to try Java language features interactively or to evaluate
    some expressions quickly. For example, it’s common for Java programs to write
    files to the system’s temporary directory. Sometimes you may want to check the
    temporary directory to verify the contents of created files. To get the path of
    the temporary directory, you need to get the value of the Java system property,
    `java.io.tmpdir`. You can do this by creating a simple Java program that has a
    `main` method to output the value, or you can use the Apache Groovy Console (
    [http://groovy-lang.org/groovyconsole.html](http://groovy-lang.org/groovyconsole.html)
    ) to quickly run the code. But writing another Java program seems like overkill
    for simple tasks like this, and using Groovy Console requires that you downloaded
    and install Groovy. Neither approach seems ideal. Now you have a better choice
    in Java 9—`jshell`.


    `jshell` is a built-in tool in Java 9. You can start it by running the command
    `jshell`.


    ```

    $ jshell

    ```


    Then you can just type `System.getProperty("java.io.tmpdir")` to get the value;
    see Listing 3-1.


    ```

    jshell> System.getProperty("java.io.tmpdir")

    $1 ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

    Listing 3-1.

    Typing an Expression in jshell

    ```


    You may notice the `$1` in the output. This is the reference to the result of
    the expression you just typed. You can use this reference later in the shell.
    In Listing 3-2, type `$1.length()` to get the length of `$1` and another reference
    `$2`. `$2` now references the length of the string referenced by `$1`.


    ```

    jshell> $1.length()

    $2 ==> 49

    Listing 3-2.

    Using Result References

    ```


    If you prefer to use a properly named reference, you can create the variable and
    assign the value to it; see Listing 3-3.


    ```

    jshell> String tmpdir = System.getProperty("java.io.tmpdir")

    tmpdir ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

    Listing 3-3.

    Using Variables

    ```


    ## Code Completion


    `jshell` provides the basic support for code completion. When you press the `<Tab>`
    key, you can see a list of possible choices. For example, if you type `System.get`
    and press the `<Tab>` key, `jshell` lists all possible methods in `System` that
    start with `get`.


    ```

    jshell> System.get

    getLogger(             getProperties()        getProperty(

    getSecurityManager()   getenv(

    ```


    The code is completed automatically to the longest common prefix of all choices.
    For example, if you type `System.getP` and press the `<Tab>` key, the code is
    completed to `System.getPropert` with two choices: `getProperties()` and `getProperty(`.


    ## Classes


    Apart from simple expressions, you can also create classes in the shell. In Listing
    3-4, let’s create an abstract class `Shape` with the abstract method `getArea()`.


    ```

    jshell> abstract class Shape {

    ...>   protected abstract double getArea();

    ...> }

    |  created class Shape

    Listing 3-4.

    Creating the Class Shape

    ```


    Then create a new class `Circle` that inherits from `Shape`; see Listing 3-5.


    ```

    jshell> class Circle extends Shape {

    ...>   private final double radius;

    ...>   public Circle(final double radius) {

    ...>     this.radius = radius;

    ...>   }

    ...>   public double getArea() {

    ...>     return Math.PI * this.radius * this.radius;

    ...>   };

    ...> }

    |  created class Circle

    Listing 3-5.

    Creating the Class Circle

    ```


    Now you can create new instances of the class `Circle` and invoke its method;
    see Listing 3-6.


    ```

    jshell> Circle circle1 = new Circle(10);

    circle1 ==> Circle@2038ae61

    jshell> circle1.getArea()

    $7 ==> 314.1592653589793

    Listing 3-6.

    Creating Instances of the Class Circle

    ```


    ## Methods


    You can also add methods in `jshell`. In Listing 3-7, let’s create a method `add()`.


    ```

    jshell> int add(int x, int y) {

    ...>   return x + y;

    ...> }

    |  created method add(int,int)

    Listing 3-7.

    Adding Methods

    ```


    You can invoke this method as shown in Listing 3-8.


    ```

    jshell> add(1, 2)

    $19 ==> 3

    Listing 3-8.

    Invoking Methods

    ```


    ## Commands


    By typing `/help` in `jshell`, you can see a list of available commands. For a
    command, for example, `/list`, you can use `/help /list` to view a detailed help
    message for the command.


    I’ll discuss these commands in following sections.


    ### `/list`


    `/list` lists all the snippets. Each snippet has an ID. There are three types
    of snippets:


    *   Start snippets are evaluated automatically during start-up. `/list -start`
    shows only start snippets.

    *   Active snippets are snippets you have typed. `/list` shows active snippets.

    *   Error snippets are snippets you have typed but have failed to compile.


    You can use `/list -all` to list all snippets; see Listing 3-9. Each snippet is
    prefixed with an ID. The ID of a start snippet is prefixed with `s`, whereas the
    ID of an error snippet is prefixed with `e`. You can see IDs like `s1`, `s2` or
    `e3`. The ID of an active snippet matches the reference name of its evaluated
    result. For example, you can use `$7` to reference the evaluated result of the
    snippet with ID `7`. If you want to reference a previous snippet, you can use
    `/list` to find the ID first, then use `$<id>` to reference its result.


    You can also use `/list <snippet id>` to list the source of a snippet by ID, for
    example, `/list s1` or `/list 4`.


    ```

    s1 : import java.io.*;

    s2 : import java.math.*;

    s3 : import java.net.*;

    s4 : import java.nio.file.*;

    s5 : import java.util.*;

    s6 : import java.util.concurrent.*;

    s7 : import java.util.function.*;

    s8 : import java.util.prefs.*;

    s9 : import java.util.regex.*;

    s10 : import java.util.stream.*;

    1 : System.getProperty("java.io.tmpdir")

    2 : $1.length()

    e1 : tmpdir = System.getProperty("java.io.tmpdir")

    3 : String tmpdir = System.getProperty("java.io.tmpdir");

    4 : abstract class Shape {

    protected abstract double getArea();

    }

    Listing 3-9.

    Output of /list -all

    ```


    ### `/edit`


    `/edit` edits a snippet by ID—for example, you would use `/edit 1` to edit the
    snippet with an ID of `1`. A new window opens with the current source of the snippet;
    see Figure 3-1.


    ![A459620_1_En_3_Fig1_HTML.jpg](A459620_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    The JShell edit pad


    If you update the source to `System.getProperty("os.name");` in the new window
    and click Accept to save it, a new snippet is created and run.


    ### `/drop`


    `/drop` deletes a snippet by ID; for example, use `/drop 1` to delete the snippet
    with an ID of `1`, as shown in Listing 3-10.


    ```

    jshell> /drop 23

    |  dropped variable $23

    Listing 3-10.

    Deleting a Snippet by ID

    ```


    ### `/save`


    `/save` saves snippets and commands to a file. You can choose to save all snippets,
    active snippets, or start snippets using `/save -all`, `/save` or `/save -start`,
    respectively. You can also use `/save -history` to save commands; see Listing
    3-11.


    ```

    jshell> /save -history ∼/Downloads/snippets.txt

    Listing 3-11.

    Saving Snippets

    ```'
  raw: '# 3. jshell


    jshell is a useful utility tool that adds the Read-Eval-Print Loop (REPL) to Java.
    It allows developers to try Java language features interactively or to evaluate
    some expressions quickly. For example, it’s common for Java programs to write
    files to the system’s temporary directory. Sometimes you may want to check the
    temporary directory to verify the contents of created files. To get the path of
    the temporary directory, you need to get the value of the Java system property,
    `java.io.tmpdir`. You can do this by creating a simple Java program that has a
    main method to output the value, or you can use the Apache Groovy Console ( [`http://groovy-lang.org/groovyconsole.html`](http://groovy-lang.org/groovyconsole.html)
    ) to quickly run the code. But writing another Java program seems like overkill
    for simple tasks like this, and using Groovy Console requires that you downloaded
    and install Groovy. Neither approach seems ideal. Now you have a better choice
    in Java 9—jshell.


    jshell is a built-in tool in Java 9\. You can start it by running the command
    `jshell`.


    ```

    $ jshell

    ```


    Then you can just type `System.getProperty("java.io.tmpdir")` to get the value;
    see Listing [3-1](#A459620_1_En_3_Chapter.html#Par5).


    ```

    jshell> System.getProperty("java.io.tmpdir")

    $1 ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

    Listing 3-1.

    Typing an Expression in jshell

    ```


    You may notice the `$1` in the output. This is the reference to the result of
    the expression you just typed. You can use this reference later in the shell.
    In Listing [3-2](#A459620_1_En_3_Chapter.html#Par7), type `$1.length()` to get
    the length of `$1` and another reference `$2\. $2` now references the length of
    the string referenced by `$1`.


    ```

    jshell> $1.length()

    $2 ==> 49

    Listing 3-2.

    Using Result References

    ```


    If you prefer to use a properly named reference, you can create the variable and
    assign the value to it; see Listing [3-3](#A459620_1_En_3_Chapter.html#Par9).


    ```

    jshell> String tmpdir = System.getProperty("java.io.tmpdir")

    tmpdir ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

    Listing 3-3.

    Using Variables

    ```


    ## Code Completion


    jshell provides the basic support for code completion. When you press the `<Tab>`
    key, you can see a list of possible choices. For example, if you type `System.get`
    and press the `<Tab>` key, jshell lists all possible methods in `System` that
    start with `get`.


    ```

    jshell> System.get

    getLogger(             getProperties()        getProperty(

    getSecurityManager()   getenv(

    ```


    The code is completed automatically to the longest common prefix of all choices.
    For example, if you type `System.getP` and press the `<Tab>` key, the code is
    completed to `System.getPropert` with two choices: `getProperties()` and `getProperty(`.


    ## Classes


    Apart from simple expressions, you can also create classes in the shell. In Listing
    [3-4](#A459620_1_En_3_Chapter.html#Par14), let’s create an abstract class `Shape`
    with the abstract method `getArea()`.


    ```

    jshell> abstract class Shape {

    ...>   protected abstract double getArea();

    ...> }

    |  created class Shape

    Listing 3-4.

    Creating the Class Shape

    ```


    Then create a new class `Circle` that inherits from `Shape`; see Listing [3-5](#A459620_1_En_3_Chapter.html#Par16).


    ```

    jshell> class Circle extends Shape {

    ...>   private final double radius;

    ...>   public Circle(final double radius) {

    ...>     this.radius = radius;

    ...>   }

    ...>   public double getArea() {

    ...>     return Math.PI * this.radius * this.radius;

    ...>   };

    ...> }

    |  created class Circle

    Listing 3-5.

    Creating the Class Circle

    ```


    Now you can create new instances of the class `Circle` and invoke its method;
    see Listing [3-6](#A459620_1_En_3_Chapter.html#Par18).


    ```

    jshell> Circle circle1 = new Circle(10);

    circle1 ==> Circle@2038ae61

    jshell> circle1.getArea()

    $7 ==> 314.1592653589793

    Listing 3-6.

    Creating Instances of the Class Circle

    ```


    ## Methods


    You can also add methods in jshell. In Listing [3-7](#A459620_1_En_3_Chapter.html#Par20),
    let’s create a method `add()`.


    ```

    jshell> int add(int x, int y) {

    ...>   return x + y;

    ...> }

    |  created method add(int,int)

    Listing 3-7.

    Adding Methods

    ```


    You can invoke this method as shown in Listing [3-8](#A459620_1_En_3_Chapter.html#Par22).


    ```

    jshell> add(1, 2)

    $19 ==> 3

    Listing 3-8.

    Invoking Methods

    ```


    ## Commands


    By typing `/help` in jshell, you can see a list of available commands. For a command,
    for example, `/list`, you can use `/help /list` to view a detailed help message
    for the command.


    I’ll discuss these commands in following sections.


    ### `/list`


    `/list` lists all the snippets. Each snippet has an ID. There are three types
    of snippets:


    *   Start snippets are evaluated automatically during start-up. `/list -start`
    shows only start snippets.

    *   Active snippets are snippets you have typed. `/list` shows active snippets.

    *   Error snippets are snippets you have typed but have failed to compile.


    You can use `/list -all` to list all snippets; see Listing [3-9](#A459620_1_En_3_Chapter.html#Par31).
    Each snippet is prefixed with an ID. The ID of a start snippet is prefixed with
    `s`, whereas the ID of an error snippet is prefixed with `e`. You can see IDs
    like `s1`, `s2` or `e3`. The ID of an active snippet matches the reference name
    of its evaluated result. For example, you can use `$7` to reference the evaluated
    result of the snippet with ID `7`. If you want to reference a previous snippet,
    you can use `/list` to find the ID first, then use `$<id>` to reference its result.


    You can also use `/list <snippet id>` to list the source of a snippet by ID, for
    example, `/list s1` or `/list 4`.


    ```

    s1 : import java.io.*;

    s2 : import java.math.*;

    s3 : import java.net.*;

    s4 : import java.nio.file.*;

    s5 : import java.util.*;

    s6 : import java.util.concurrent.*;

    s7 : import java.util.function.*;

    s8 : import java.util.prefs.*;

    s9 : import java.util.regex.*;

    s10 : import java.util.stream.*;

    1 : System.getProperty("java.io.tmpdir")

    2 : $1.length()

    e1 : tmpdir = System.getProperty("java.io.tmpdir")

    3 : String tmpdir = System.getProperty("java.io.tmpdir");

    4 : abstract class Shape {

    protected abstract double getArea();

    }

    Listing 3-9.

    Output of /list -all

    ```


    ### `/edit`


    `/edit` edits a snippet by ID—for example, you would use `/edit 1` to edit the
    snippet with and ID of `1`. A new window opens with the current source of the
    snippet; see Figure [3-1](#A459620_1_En_3_Chapter.html#Fig1).


    ![A459620_1_En_3_Fig1_HTML.jpg](A459620_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    The JShell edit pad


    If you update the source to `System.getProperty("os.name");` in the new window
    and click Accept to save it, a new snippet is created and run.


    ### `/drop`


    `/drop` deletes a snippet by ID; for example, use `/drop 1` to delete the snippet
    with an ID of `1`, as shown in Listing [3-10](#A459620_1_En_3_Chapter.html#Par35).


    ```

    jshell> /drop 23

    |  dropped variable $23

    Listing 3-10.

    Deleting a Snippet by ID

    ```


    ### `/save`


    `/save` saves snippets and commands to a file. You can choose to save all snippets,
    active snippets, or start snippets using `/save -all`, `/save` or `/save -start`,
    respectively. You can also use `/save -history` to save commands; see Listing
    [3-11](#A459620_1_En_3_Chapter.html#Par37).


    ```

    jshell> /save -history ∼/Downloads/snippets.txt

    Listing 3-11.

    Saving Snippets

    ```'
