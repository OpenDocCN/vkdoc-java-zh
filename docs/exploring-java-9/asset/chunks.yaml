    ## SubmissionPublisher


    Although the four core interfaces are easy to understand, it’s not easy to correctly
    implement them. However, you don’t actually need to care about the implementations;
    you can simply rely on third-party libraries.


    The class `java.util.concurrent.SubmissionPublisher<T>` is an implementation of
    `Flow.Publisher` that asynchronously publishes submitted items to subscribers
    until it’s closed. The items of `SubmissionPublisher` are not generated by the
    publisher but are submitted by the client code. `SubmissionPublisher` can function
    as a bridge client code can use to communicate with subscribers.


    `SubmissionPublisher` uses an `Executor` to send items to subscribers. The `Executor`
    can be provided in the constructor, or `ForkJoinPool.commonPool()` is used by
    default. When any subscriber method throws an error, you can provide a handler
    to handle the exception before the subscription is cancelled. `SubmissionPublisher`
    has three constructors.


    *   The no-arg constructor uses the default `Executor` and no exception handler.

    *   `SubmissionPublisher(Executor executor, int maxBufferCapacity)` configures
    the `Executor` and the maximum size of the buffer. The buffer contains submitted
    but not consumed items for a subscriber. Each subscriber has its own independent
    buffer.

    *   `SubmissionPublisher(Executor executor, int maxBufferCapacity, BiConsumer<?
    super Flow.Subscriber<? super T>,? super Throwable> handler)` configures the `Executor`,
    the maximum size of the buffer, and the exception handler.


    Note


    The actual value of the maximum buffer size may be rounded up to the nearest power
    of two or bounded by the largest value supported by the implementation. For example,
    if `10` is passed to the constructor as the value of `maxBufferCapacity`, the
    actual used value is `16`. We can use the method `getMaxBufferCapacity()` to get
    the actual value.


    Since subscribers may have different speeds at which they consume published items,
    it’s possible that some items have not yet been consumed by all subscribers. The
    method `estimateMaximumLag()` returns an estimate of the maximum number of items
    that have been published but have not yet been consumed by all subscribers. On
    the other hand, it’s also possible that the speed at which items are published
    cannot keep up with the consumption speed of the subscribers. In this case, the
    method `estimateMinimumDemand()` returns an estimate of the minimum number of
    items that have been requested but not yet published.


    To submit items to `SubmissionPublisher`, you can use the `submit()` and `offer()`
    methods. The method `submit(T item)` publishes the item to all subscribers asynchronously
    by invoking their `onNext()` methods. `submit()` blocks uninterruptibly while
    there is no resource available for any subscriber to handle. You should use `submit()`
    when you want to make sure the items are published to all subscribers successfully.
    However, its blocking behavior may have a performance penalty. An overwhelmed
    subscriber may slow down the processing of other subscribers. The return value
    of `submit()` is the estimate of the maximum lag and is the same as the return
    value of the method `estimateMaximumLag()`.'
