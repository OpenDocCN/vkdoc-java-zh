- fmt: "### JMOD Files\n\n`JMOD` files are introduced in Java 9 to package JDK modules.\
    \ Compared to `JAR` files, `JMOD` files can contain native code, configuration\
    \ files, and other kinds of data. Figure [2-3](#A459620_1_En_2_Chapter.html#Fig3)\
    \ shows the `JMOD` files in the `jmods` directory of the JDK.\n\n![A459620_1_En_2_Fig3_HTML.jpg](A459620_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3. JDK JMOD files\n\nDevelopers can also use `JMOD` files to package\
    \ module files using the new `jmod` tool.\n\nYou can use the following `jmod list`\
    \ command to list the names of all entries in the `JMOD` file of the module `java.base`.\n\
    \n```\n$ jmod list /jmods/java.base.jmod\n```\n\nThis `JMOD` file contains directories\
    \ listed in Table [2-15](#A459620_1_En_2_Chapter.html#Tab15).\n\nTable 2-15. Directories\
    \ in JMOD Files\n\n| Directory Name | Files |\n| --- | --- |\n| `classes/` | Java\
    \ class files |\n| `conf/` | Configuration files |\n| `include/` | Header files\
    \ |\n| `legal/` | Legal files |\n| `bin/` | Executable binaries |\n| `lib/` |\
    \ Native libraries |\n\nOther modules, for example, `java.sql` and `java.xml`,\
    \ may only contain `classes` and `legal` directories.\n\nThe command `jmod describe`\
    \ prints out the module details, which are similar to `jar -d`.\n\n```\n$ jmod\
    \ describe /jmods/java.base.jmod\n```\n\nThe command `jmod extract` extracts all\
    \ the files to the target directory.\n\n```\n$ jmod extract /jmods/java.sql.jmod\
    \ --dir \n```\n\nThe command `jmod create` creates `JMOD` files. You can use different\
    \ options to provide the path for various kinds of files; see Table [2-16](#A459620_1_En_2_Chapter.html#Tab16).\n\
    \nTable 2-16. Options of `jmod`\n\n| Option | Description |\n| --- | --- |\n|\
    \ `--class-path` | JAR files or directories containing Java class files |\n| `--cmds`\
    \ | Path of native commands |\n| `--config` | Path of configuration files |\n\
    | `--header-files` | Path of header files |\n| `--legal-notices` | Path of legal\
    \ files |\n| `--libs` | Path of native libraries |\n| `--man-pages` | Path of\
    \ man pages |\n\n`jmod create` also supports the options `--main-class` and `--module-version`.\
    \ Options `--os-arch` and `--os-name` can be used to specify the operating system\
    \ architecture and name. Listing [2-48](#A459620_1_En_2_Chapter.html#Par322) shows\
    \ how to use `jmod` to create a `JMOD` file.\n\n```\n$ jmod create --class-path\
    \ target/classes \\\n--main-class io.vividcode.store.runtime.Main \\\n--module-version\
    \ 1.0.0 \\\n--os-arch x86_64 \\\n--os-name \"Mac OS X\" \\\ntarget/runtime-1.0.0.jmod\n\
    Listing 2-48. Using jmod to Create Module Artifacts\n```\n\n### JDK Modules\n\n\
    In Java 9, JDK itself is organized as multiple modules. There are currently 94\
    \ modules in JDK. These modules have four different prefixes to indicate their\
    \ groups; see Table [2-17](#A459620_1_En_2_Chapter.html#Tab17).\n\nTable 2-17.\
    \ Groups of JDK Modules\n\n| Group | Description |\n| --- | --- |\n| `java.` |\
    \ Standard Java modules, for example, `java.base`, `java.logging`, `java.sql`\
    \ and `java.xml` |\n| `javafx.` | JavaFX modules, for example, `javafx.base`,\
    \ `javafx.deploy` and `javafx.media` |\n| `jdk.` | Part of JDK implementation,\
    \ for example, `jdk.compiler`, `jdk.charsets`, `jdk.accessibility` and `jdk.management`\
    \ |\n| `oracle.` | Oracle modules, for example, `oracle.desktop` and `oracle.net`\
    \ |\n\n## Common Issues\n\nWith the introduction of the module system, some common\
    \ issues may occur. You’ve already seen a potential issue—that the platform and\
    \ application class loaders are no longer instances of `URLClassLoader`. There\
    \ are other potential issues you may need to be aware of.\n\nThe modifier `public`\
    \ no longer guarantees that a program element is accessible everywhere. Accessibility\
    \ now depends on various conditions related to the module system, including whether\
    \ the package is exported or open and whether its module is readable by the module\
    \ containing the code that is attempting to access it.\n\nIf a package is defined\
    \ in both a named module and on the class path, then the package on the class\
    \ path is ignored. For example, the package `javax.transaction` is defined in\
    \ the module `java.transaction`. If the module `java.transaction` is in the module\
    \ path, and the JAR file `javax.transaction-api-1.2.jar` that contains the same\
    \ package `javax.transaction` is also on the class path, the classes in the JAR\
    \ file are ignored. That’s why you may get the error `java.lang.ClassNotFoundException:\
    \ javax.transaction.SystemException` when you’re running Spring JPA applications.\
    \ The solution is to either remove the module `java.transaction` from the module\
    \ path or put the JAR file in the upgrade module path to override built-in modules.\n\
    \nModules that define Java EE APIs, or APIs primarily of interest to Java EE applications,\
    \ have been deprecated and will be removed in a future release. These modules\
    \ are not resolved by default for code on the class path. The default set of root\
    \ modules for the unnamed module is based upon the `java.se` module. The `java.se`\
    \ module only requires modules shown in Listing [2-49](#A459620_1_En_2_Chapter.html#Par328).\n\
    \n```\njava.compiler\njava.datatransfer\njava.desktop\njava.instrument\njava.logging\n\
    java.management\njava.management.rmi\njava.naming\njava.prefs\njava.rmi\njava.scripting\n\
    java.security.jgss\njava.security.sasl\njava.sql\njava.sql.rowset\njava.xml\n\
    java.xml.crypto\nListing 2-49. Modules Required by the java.se Module\n```\n\n\
    The modules shown in Listing [2-50](#A459620_1_En_2_Chapter.html#Par330) are required\
    \ in the `java.se.ee` module, so by default, code in the unnamed module doesn’t\
    \ have access to APIs defined in these modules.\n\n```\njava.activation\njava.corba\n\
    java.transaction\njava.xml.bind\njava.xml.ws\njava.xml.ws.annotation\nListing\
    \ 2-50. Modules Required by the java.se.ee Module\n```\n\nIf the project uses\
    \ classes from the modules in Listing [2-50](#A459620_1_En_2_Chapter.html#Par330),\
    \ the code cannot compile. You need to update the Java compiler option to add\
    \ `--add-modules java.se.ee` to include the `java.se.ee` module.\n\nMost of JDK’s\
    \ internal APIs are inaccessible by default at compile time. Some of these internal\
    \ APIs, especially the `sun.misc` package, have been used by some popular libraries.\
    \ In JDK 9, noncritical internal APIs, for example `sun.misc.BASE64Decoder`, are\
    \ encapsulated and inaccessible by default. Critical internal APIs, for example,\
    \ `sun.misc.Unsafe` and `sun.reflect.Reflection`, are not encapsulated. These\
    \ APIs are defined in the JDK specific module `jdk.unsupported`. If your project\
    \ requires you to use these packages, you can make your module require `jdk.unsupported`.\
    \ For those encapsulated internal APIs, they can be made accessible using `--add-exports`\
    \ and `--add-opens` when necessary.\n\nThe options `-Xbootclasspath` and `-Xbootclasspath/p`\
    \ have been removed. The JDK-specific system property `sun.boot.class.path` has\
    \ also been removed. This is because the bootstrap class path is empty by default,\
    \ since bootstrap classes are loaded from modules. If the code depends on the\
    \ bootstrap class path, it may not run using JDK 9. For example, the class `org.elasticsearch.monitor.jvm.JvmInfo`\
    \ in Elasticsearch 1.7.1 tries to get the bootstrap class path from the JMX bean\
    \ `java.lang.management.RuntimeMXBean` using the method `getBootClassPath()`.\
    \ This method in Java 9 simply throws `UnsupportedOperationException`. This causes\
    \ Elasticsearch 1.7.1 to fail to start when running on JDK 9. The correct implementation\
    \ should check the method `boolean isBootClassPathSupported()` first before calling\
    \ `getBootClassPath()`.\n\n## Migration in Action\n\nNow that you understand all\
    \ the important concepts in the Java 9 module system, you have a clear path to\
    \ migrate existing applications to use modules."
