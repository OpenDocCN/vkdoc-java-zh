    *   一个 `Throwable`，表示调用方法句柄 `target` 时抛出的异常。

    *   方法句柄 `target` 的返回值。


    除了这两个前导参数外，`target` 和 `cleanup` 应具有相同的对应参数和返回类型。在代码清单 9-10 中，我有两个不同的目标方法句柄：`success`
