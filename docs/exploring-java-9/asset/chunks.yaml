    ### Timeout


    方法`CompletableFuture<T> orTimeout(long timeout, TimeUnit unit)`在给定的超时时间之前未完成时，会以`TimeoutException`异常完成`CompletableFuture`。在清单[10-2](#A459620_1_En_10_Chapter.html#Par6)中，由于`CompletableFuture`从未完成，代码会抛出以`TimeoutException`为原因的`ExecutionException`。


    ```

    try {

    new CompletableFuture().orTimeout(3, TimeUnit.SECONDS).get();

    } catch (final InterruptedException | ExecutionException e) {

    e.printStackTrace();

    }

    Listing 10-2.

    Example of orTimeout()

    ```


    方法`CompletableFuture<T> completeOnTimeout(T value, long timeout, TimeUnit unit)`在给定的超时时间之前未完成时，会使用给定的值完成`CompletableFuture`。在清单[10-3](#A459620_1_En_10_Chapter.html#Par8)中，`CompletableFuture`在三秒超时后以值`1`完成。


    ```

    try {

    final Long value = new CompletableFuture()

    .completeOnTimeout(1L, 3, TimeUnit.SECONDS).get();

    System.out.println(value);

    } catch (final InterruptedException | ExecutionException e) {

    e.printStackTrace();

    }

