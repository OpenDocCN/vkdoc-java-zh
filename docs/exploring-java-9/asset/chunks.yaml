    ### Flow.Subscription


    The interface `Flow.Subscription` represents the subscription when a `Flow.Subscriber`
    successfully subscribes to a `Flow.Publisher`. It’s passed as an argument to the
    subscriber’s method `onSubscribe()`. Table [7-3](#A459620_1_En_7_Chapter.html#Tab3)
