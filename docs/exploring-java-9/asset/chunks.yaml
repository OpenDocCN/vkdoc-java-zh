- fmt: '### `byte[]` and `ByteBuffer` Views


    `VarHandle` allows you to view a byte array or `ByteBuffer` as an array of different
    primitive types, for example, `int[]` or `long[]`. You can use the `MethodHandles.byteArrayViewVarHandle()`
    or `MethodHandles.byteBufferViewVarHandle()` methods to create views of `byte[]`
    or `ByteBuffer`, respectively.


    In order for you to be able to use the `byteArrayViewVarHandle()` method to create
    a `VarHandle`, the first parameter must be the array class you use to view the
    byte array. The element type can be `short`, `char`, `int`, `long`, `float`, and
    `double`. The second parameter is the byte order with type `java.nio.ByteOrder`,
    and it can be `BIG_ENDIAN` or `LITTLE_ENDIAN`. In Listing [8-11](#A459620_1_En_8_Chapter.html#Par46),
    I create a `VarHandle` by viewing the byte array as `int[]` with the byte order
    set to `BIG_ENDIAN`. Then I use the method `get()` to get the `int` value starting
    at the specified index in the original byte array. The maximum value of the index
    is the size of the byte array minus the byte size of the element type. For the
    `VarHandle` in Listing [8-11](#A459620_1_En_8_Chapter.html#Par46), the byte size
    of `int` is `4`, so the maximum value of the index is `8 – 4 = 4`. Using an index
    value greater than `4` will result in an `IndexOutOfBoundsException`.


    ```

    @Test

    public void testByteArrayView() throws Exception {

    final VarHandle varHandle = MethodHandles

    .byteArrayViewVarHandle(int[].class, ByteOrder.BIG_ENDIAN);

    final byte[] data = this.handleTarget.data;

    assertEquals(16777216, varHandle.get(data, 0));

    assertEquals(1, varHandle.get(data, 1));

    assertEquals(256, varHandle.get(data, 2));

    assertEquals(65536, varHandle.get(data, 3));

    assertEquals(16777216, varHandle.get(data, 4));

    }

    Listing 8-11.

    Byte Array View

    ```


    Listing [8-12](#A459620_1_En_8_Chapter.html#Par48) uses the method `byteBufferViewVarHandle()`
    to create a `VarHandle`. The code has the same result as Listing [8-11](#A459620_1_En_8_Chapter.html#Par46).


    ```

    @Test

    public void testByteBufferView() throws Exception {

    final VarHandle varHandle = MethodHandles

    .byteBufferViewVarHandle(int[].class, ByteOrder.BIG_ENDIAN);

    final ByteBuffer dataBuffer = this.handleTarget.dataBuffer;

    assertEquals(16777216, varHandle.get(dataBuffer, 0));

    assertEquals(1, varHandle.get(dataBuffer, 1));

    assertEquals(256, varHandle.get(dataBuffer, 2));

    assertEquals(65536, varHandle.get(dataBuffer, 3));

    assertEquals(16777216, varHandle.get(dataBuffer, 4));

    }

    Listing 8-12.

    ByteBuffer View

    ```


    ## Memory Fence


    `VarHandle` also adds support for memory fencing that controls memory ordering
    in align with the C/C++11 `atomic_thread_fence` ( [`http://en.cppreference.com/w/cpp/atomic/atomic_thread_fence`](http://en.cppreference.com/w/cpp/atomic/atomic_thread_fence)
    ). A fence ensures that loads and/or stores before the fence will not be reordered
    with loads and/or stores after the fence. There are five different static methods
    in `VarHandle` to create different types of fences that control what operations
    are not reordered; see Table [8-5](#A459620_1_En_8_Chapter.html#Tab5).


    **Table 8-5.** Different Memory Fence Methods


    | Method | Operations Before Fence | Operations After Fence |

    | --- | --- | --- |

    | `void fullFence()` | loads and stores | loads and stores |

    | `void acquireFence()` | loads | loads and stores |

    | `void releaseFence()` | loads and stores | stores |

    | `void loadLoadFence()` | loads | loads |

    | `void storeStoreFence()` | stores | stores |


    ## Summary


    In this chapter, we discussed how to use variable handles to access and manipulate
    variables. The methods in `VarHandle` can perform reads, writes, and atomic updates
    to variables. In the next chapter, we’ll discuss the enhancements to method handles
    in Java 9.


    # 9. Enhanced Method Handles


    The class `java.lang.invoke.MethodHandles` is enhanced in Java 9 to include more
    static methods for creating different kinds of method handles.


    ## `arrayConstructor`


    The method `MethodHandle arrayConstructor(Class<?> arrayClass)` returns a method
    handle to construct arrays of the specified type `arrayClass`. The sole argument
    of the created method handle is an `int` value that specifies the size of the
    array, while the return value is the array. In Listing [9-1](#A459620_1_En_9_Chapter.html#Par3),
    I create a method handle to construct `int[]` arrays. Then I create an array of
    size `3` using the `MethodHandle`.


    ```

    @Test

    public void testArrayConstructor() throws Throwable {

    final MethodHandle handle = MethodHandles.arrayConstructor(int[].class);

    final int[] array = (int[]) handle.invoke(3);

    assertEquals(3, array.length);

    }

    Listing 9-1.

    Example of arrayConstructor()

    ```


    ## `arrayLength`


    The method `MethodHandle arrayLength(Class<?> arrayClass)` returns a method handle
    to get the length of an array of type `arrayClass`. The sole argument of this
    method handle is the array to check, while the return value is an `int` value.
    In Listing [9-2](#A459620_1_En_9_Chapter.html#Par5), I create a method handle
    to get the length of `int[]` arrays. Then I invoke it to get the length of the
    input array.


    ```

    @Test

    public void testArrayLength() throws Throwable {

    final MethodHandle handle = MethodHandles.arrayLength(int[].class);

    final int[] array = new int[]{1, 2, 3, 4, 5};

    final int length = (int) handle.invoke(array);

    assertEquals(5, length);

    }

    Listing 9-2.

    Example of arrayLength()

    ```


    ## `varHandleInvoker` and `varHandleExactInvoker`


    The `MethodHandle varHandleInvoker(VarHandle.AccessMode accessMode, MethodType
    type)` and `MethodHandle varHandleExactInvoker(VarHandle.AccessMode accessMode,
    MethodType type)` methods return a method handle to invoke a signature polymorphic
    access mode method on any `VarHandle` that has an access mode type compatible
    with the given type. Both methods have two parameters of following types:


    *   `VarHandle.AccessMode accessMode`: The access mode of `VarHandle`

    *   `MethodType type`: The type of the access mode method


    The difference between `varHandleInvoker()` and `varHandleExactInvoker()` is that
    `varHandleInvoker()` does necessary type conversation, but `varHandleExactInvoker()`
    doesn’t.


    In Listing [9-3](#A459620_1_En_9_Chapter.html#Par11), the variable `varHandle`
    references the variable `count` in the class `HandleTarget`. I create the `MethodHandle`
    with the access mode `VarHandle.AccessMode.GET` and invoke it to get the value
    of the variable. The method `accessModeType()` of `VarHandle` is handy when you’re
    creating the `MethodType` for a given access mode.


    ```

    @Test

    public void testVarHandleInvoker() throws Throwable {

    final VarHandle varHandle = MethodHandles

    .lookup()

    .findVarHandle(HandleTarget.class, "count", int.class);

    final VarHandle.AccessMode accessMode = VarHandle.AccessMode.GET;

    final MethodHandle methodHandle = MethodHandles.varHandleInvoker(

    accessMode,

    varHandle.accessModeType(accessMode)

    );

    final HandleTarget handleTarget = new HandleTarget();

    final int result = (int) methodHandle.invoke(varHandle, handleTarget);

    assertEquals(result, 1);

    }

    Listing 9-3.

    Example of varHandleInvoker()

    ```


    ## `zero`


    The method `MethodHandle zero(Class<?> type)` returns a method handle that always
    returns the default value for the given type. Listing [9-4](#A459620_1_En_9_Chapter.html#Par13)
    shows how to use `zero()` for different types.


    ```

    @Test

    public void testZero() throws Throwable {

    assertEquals(0, MethodHandles.zero(int.class).invoke());

    assertEquals(0L, MethodHandles.zero(long.class).invoke());

    assertEquals(0F, MethodHandles.zero(float.class).invoke());

    assertEquals(0D, MethodHandles.zero(double.class).invoke());

    assertEquals(null, MethodHandles.zero(String.class).invoke());

    }

    Listing 9-4.

    Example of zero()

    ```'
  raw: '### byte[] and ByteBuffer Views


    `VarHandle` allows you to view a byte array or `ByteBuffer` as an array of different
    primitive types, for example, `int[]` or `long[]`. You can use the `MethodHandles.byteArrayViewVarHandle()`
    or `MethodHandles.byteBufferViewVarHandle()` methods to create views of `byte[]`
    or `ByteBuffer`, respectively.


    In order for you to be able to use the `byteArrayViewVarHandle()` method to create
    a `VarHandle`, the first parameter must be the array class you use to view the
    byte array. The element type can be `short`, `char`, `int`, `long`, `float`, and
    `double`. The second parameter is the byte order with type `java.nio.ByteOrder`,
    and it can be `BIG_ENDIAN` or `LITTLE_ENDIAN`. In Listing [8-11](#A459620_1_En_8_Chapter.html#Par46),
    I create a `VarHandle` by viewing the byte array as `int[]` with the byte order
    set to `BIG_ENDIAN`. Then I use the method `get()` to get the `int` value starting
    at the specified index in the original byte array. The maximum value of the index
    is the size of the byte array minus the byte size of the element type. For the
    `VarHandle` in Listing [8-11](#A459620_1_En_8_Chapter.html#Par46), the byte size
    of `int` is `4`, so the maximum value of the index is `8 – 4 = 4`. Using an index
    value greater than `4` will result in an `IndexOutOfBoundsException`.


    ```

    @Test

    public void testByteArrayView() throws Exception {

    final VarHandle varHandle = MethodHandles

    .byteArrayViewVarHandle(int[].class, ByteOrder.BIG_ENDIAN);

    final byte[] data = this.handleTarget.data;

    assertEquals(16777216, varHandle.get(data, 0));

    assertEquals(1, varHandle.get(data, 1));

    assertEquals(256, varHandle.get(data, 2));

    assertEquals(65536, varHandle.get(data, 3));

    assertEquals(16777216, varHandle.get(data, 4));

    }

    Listing 8-11.

    Byte Array View

    ```


    Listing [8-12](#A459620_1_En_8_Chapter.html#Par48) uses the method `byteBufferViewVarHandle()`
    to create a `VarHandle`. The code has the same result as Listing [8-11](#A459620_1_En_8_Chapter.html#Par46).


    ```

    @Test

    public void testByteBufferView() throws Exception {

    final VarHandle varHandle = MethodHandles

    .byteBufferViewVarHandle(int[].class, ByteOrder.BIG_ENDIAN);

    final ByteBuffer dataBuffer = this.handleTarget.dataBuffer;

    assertEquals(16777216, varHandle.get(dataBuffer, 0));

    assertEquals(1, varHandle.get(dataBuffer, 1));

    assertEquals(256, varHandle.get(dataBuffer, 2));

    assertEquals(65536, varHandle.get(dataBuffer, 3));

    assertEquals(16777216, varHandle.get(dataBuffer, 4));

    }

    Listing 8-12.

    ByteBuffer View

    ```


    ## Memory Fence


    `VarHandle` also adds support for memory fencing that controls memory ordering
    in align with the C/C++11 atomic_thread_fence ( [`http://en.cppreference.com/w/cpp/atomic/atomic_thread_fence`](http://en.cppreference.com/w/cpp/atomic/atomic_thread_fence)
    ). A fence ensures that loads and/or stores before the fence will not be reordered
    with loads and/or stores after the fence. There are five different static methods
    in `VarHandle` to create different types of fences that control what operations
    are not reordered; see Table [8-5](#A459620_1_En_8_Chapter.html#Tab5).


    Table 8-5.


    Different Memory Fence Methods


    | Method | Operations Before Fence | Operations After Fence |

    | --- | --- | --- |

    | `void fullFence()` | loads and stores | loads and stores |

    | `void acquireFence()` | loads | loads and stores |

    | `void releaseFence()` | loads and stores | stores |

    | `void loadLoadFence()` | loads | loads |

    | `void storeStoreFence()` | stores | stores |


    ## Summary


    In this chapter, we discussed how to use variable handles to access and manipulate
    variables. The methods in `VarHandle` can perform reads, writes, and atomic updates
    to variables. In the next chapter, we’ll discuss the enhancements to method handles
    in Java 9.


