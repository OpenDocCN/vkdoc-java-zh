- fmt: '# Remove GC Combinations


    GC tuning is an important task in tuning your JVM performance. JVM has a lot of
    GC combinations that use different GC algorithms. Some of these GC combinations
    were already deprecated in Java 8. These deprecated GC combinations have been
    removed in Java 9; see Table [15-1](#A459620_1_En_15_Chapter.html#Tab1). The JVM
    will not start if these GC combinations are used. Since JVM already prints out
    warning messages for these GC combinations in Java 8, existing applications should
    already have migrated to use other GC combinations. If your application still
    uses these deprecated GC combinations, you should run thorough performance tests
    after the migration.


    Table 15-1. Removed GC Combinations


    | GC Configuration | Flags | Recommended Configuration |

    | --- | --- | --- |

    | DefNew + CMS | `-XX:-UseParNewGC` `-XX:+UseConcMarkSweepGC` | ParNew + CMS |

    | ParNew + SerialOld | `-XX:+UseParNewGC` | ParallelScavenge + SerialOld |

    | ParNew + iCMS | `-Xincgc` | CMS |

    | ParNew + iCMS | `-XX:+CMSIncrementalMode` `-XX:+UseConcMarkSweepGC` | CMS |

    | DefNew + iCMS | `-XX:+CMSIncrementalMode` `-XX:+UseConcMarkSweepGC` `-XX:-UseParNewGC`
    | CMS |

    | CMS foreground | `-XX:+UseCMSCompactAtFullCollection` | G1 or CMS |

    | CMS foreground | `-XX:+CMSFullGCsBeforeCompaction` | G1 or CMS |

    | CMS foreground | `-XX:+UseCMSCollectionPassing` | G1 or CMS |


    ## Making G1 the Default Garbage Collector


    In Java 9, G1 becomes the default garbage collector on 32-bit and 64-bit server
    configurations. As a low-pause collector, G1 should provide a better overall performance
    than a throughput-oriented collector such as the Parallel GC, which was the default
    GC in Java 8.


    ## Deprecating the Concurrent Mark Sweep (CMS) Garbage Collector


    Now that G1 is the default garbage collector, the Concurrent Mark Sweep (CMS)
    garbage collector is deprecated and the support for it will be dropped in a future
    major release. JVM issues a warning message when the command-line option `-XX:+UseConcMarkSweepGC`
    is used.


    ## Removing Launch-Time JRE Version Selection


    JDK 5 introduced the Multiple JRE (mJRE) that allowed developers to specify the
    required JRE version, or a range of versions, to launch an application. The version
    requirement could be specified in the manifest entry `JRE-Version` of the application’s
    JAR file, or as a command-line option `-version:` to the `java` command. If the
    version of the current JRE didn’t meet the requirement, it tried to search for
    a version that met the requirement and launched that version.


    This mJRE feature sounds useful, but it is rarely used in practice. This feature
    has been removed in Java 9. The command-line option `-version:` of the `java`
    command has also been removed. If the manifest entry `JRE-Version` is found in
    a JAR file, the launcher emits a warning message and continues.


    ## More Diagnostic Commands


    More diagnostic commands have been added in Java 9 to run with `jcmd`. You can
    list all the available diagnostic commands using the `help` option of `jcmd`;
    see the following code. `6239` is the PID.


    ```

    $ jcmd 6239 help

    ```


    Listing [15-1](#A459620_1_En_15_Chapter.html#Par63) shows the list of available
    diagnostic commands in Java 8.


    ```

    JFR.stop

    JFR.start

    JFR.dump

    JFR.check

    VM.native_memory

    VM.check_commercial_features

    VM.unlock_commercial_features

    ManagementAgent.stop

    ManagementAgent.start_local

    ManagementAgent.start

    GC.rotate_log

    Thread.print

    GC.class_stats

    GC.class_histogram

    GC.heap_dump

    GC.run_finalization

    GC.run

    VM.uptime

    VM.flags

    VM.system_properties

    VM.command_line

    VM.version

    ```


    Listing 15-1. Diagnostic Commands in Java 8


