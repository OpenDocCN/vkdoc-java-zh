- fmt: '### Basic Parsing


    In the method `testSimpleParser()` of Listing [11-8](#A459620_1_En_11_Chapter.html#Par23),
    I create a new instance of `Parser` using the method `Parser.create(String… options)`.
    The parameter `options` is a list of options to configure the parser’s behavior.
    Here I use `--language=es6` to enable the ECMAScript 6 parsing mode. `Parser`
    has different `parse()` methods for parsing source code. All these `parse()` methods
    take arguments to specify the source code using `File`, `Reader`, `String`, `URL`,
    `Path`, or `jdk.nashorn.api.scripting.ScriptObjectMirror` objects and use another
    argument of type `DiagnosticListener` to specify a listener to receive parsing
    errors. Here I parse the JavaScript code `function a() {return ''hello'';}`, which
    only contains one function declaration. The interface `DiagnosticListener` only
    contains one method `report(Diagnostic diagnostic)`. The interface `Diagnostic`
    contains methods for retrieving information about diagnostic data, including kind,
    code, message, line number, column number, and file name; see Table [11-1](#A459620_1_En_11_Chapter.html#Tab1).
    Here I simply print out the data to console.


    **Table 11-1.** Methods of `Diagnostic`


    | Method | Description |

    | --- | --- |

    | `Diagnostic.Kind getKind()` | Returns what kind of diagnostic this is |

    | `long getPosition()` | Returns the character offset that indicates the location
    of the problem |

    | `String getFileName()` | Returns the source file name |

    | `long getLineNumber()` | Returns the line number of the character offset returned
    by `getPosition()` |

    | `long getColumnNumber()` | Returns the column number of the character offset
    returned by `getPosition()` |

    | `String getCode()` | Returns a code indicating the type of diagnostic |

    | `String getMessage()` | Returns a message for this diagnostic |


    The enum `Diagnostic.Kind` represents different kinds of diagnostics. It has the
    following values: `ERROR`, `WARNING`, `MANDATORY_WARNING`, `NOTE`, and `OTHER`.


    The return value of `parse()` is an instance of the interface `CompilationUnitTree`,
    which represents the parsed abstract syntax tree. The method `accept(TreeVisitor<R,D>
    visitor, D data)` accepts a visitor to visit the tree using the visitor pattern.
    Nashorn provides classes, `SimpleTreeVisitorES5_1` and `SimpleTreeVisitorES6`,
    as simple implementations for ECMAScript 5.1 and 6, respectively. Listing [11-8](#A459620_1_En_11_Chapter.html#Par23)
    extends the class `SimpleTreeVisitorES6` and overrides the method `visitFunctionDeclaration()`
    to verify that there is one function declaration in the source code.


    ```

    public class ParserAPITest {

    @Test

    public void testSimpleParser() throws Exception {

    final Parser parser = Parser.create("--language=es6");

    final CompilationUnitTree tree =

    parser.parse(

    "test.js",

    "function a() {return ''hello'';}",

    System.out::println

    );

    final List functions = new ArrayList();

    tree.accept(new SimpleTreeVisitorES6() {

    @Override

    public Void visitFunctionDeclaration(

    final FunctionDeclarationTree node,

    final Void r) {

    final String name = node.getName().getName();

    assertEquals("a", name);

    functions.add(name);

    return null;

    }

    }, null);

    assertEquals(1, functions.size());

    }

    }

    ```


    *Listing 11-8. Simple JavaScript Code Parsing*


    ### Parsing Error


    In Listing [11-9](#A459620_1_En_11_Chapter.html#Par25), I parse the JavaScript
    code that has a syntax error. I provide an implementation of `DiagnosticListener`
    that verifies the line number of the error.


    ```

    @Test

    public void testParseError() throws Exception {

    final Parser parser = Parser.create("--language=es6");

    final List errors = new ArrayList();

    parser.parse(

    "error.js",

    "function error() { var a = 1;",

    diagnostic -> {

    assertEquals(1, diagnostic.getLineNumber());

    assertEquals(Diagnostic.Kind.ERROR, diagnostic.getKind());

    errors.add(diagnostic);

    }

    );

    assertEquals(1, errors.size());

    }

    ```


    *Listing 11-9. JavaScript Code Parse Error*


    ## Analyzing Function Complexity


    Now I’ll show you a complicated example using the parser API. Listing [11-10](#A459620_1_En_11_Chapter.html#Par27)
    shows the class `FunctionLengthAnalyzer` that analyzes the length of functions
    in the source code. I add visitors for `FunctionDeclarationTree` and `FunctionExpressionTree`.
    To measure the length of a function, I first get the start and end character offset
    of the function body in the source code using the methods `getStartPosition()`
    and `getEndPosition()`, respectively. Then I calculate the number of characters
    in the method body by subtracting these two offsets. For `FunctionExpressionTree`
    nodes, the function can be anonymous, so I create a name for these anonymous functions.
    Here I analyze the source code of jQuery 3.


    ```

    import com.google.common.collect.Lists;

    import io.vavr.Tuple2;

    import jdk.nashorn.api.tree.*;

    import java.io.IOException;

    import java.net.URL;

    import java.util.Collections;

    import java.util.Comparator;

    import java.util.List;

    import java.util.Optional;

    public class FunctionLengthAnalyzer {

    public List> analyze(final URL url) throws IOException {

    final Parser parser = Parser.create();

    final CompilationUnitTree tree = parser.parse(url, System.out::println);

    final List> result = Lists.newArrayList();

    tree.accept(new SimpleTreeVisitorES5_1() {

    @Override

    public Void visitFunctionDeclaration(

    final FunctionDeclarationTree node,

    final Void r) {

    result.add(new Tuple2(

    node.getName().getName(),

    node.getBody().getEndPosition() - node.getBody().getStartPosition()));

    return super.visitFunctionDeclaration(node, r);

    }

    @Override

    public Void visitFunctionExpression(

    final FunctionExpressionTree node,

    final Void r) {

    final String name = Optional.ofNullable(node.getName())

    .map(IdentifierTree::getName)

    .orElse("anonymous_" + node.getBody().getStartPosition());

    result.add(new Tuple2(

    name,

    node.getBody().getEndPosition() - node.getBody().getStartPosition()));

    return super.visitFunctionExpression(node, r);

    }

    }, null);

    Collections.sort(result,

    Collections.reverseOrder(Comparator.comparingLong(Tuple2::_2)));

    return result;

    }

    public static void main(final String[] args) throws IOException {

    final List> result =

    new FunctionLengthAnalyzer().analyze(

    new URL("https://code.jquery.com/jquery-3.2.1.js"));

    result.forEach(tuple2 ->

    System.out.printf("%30s -> %s%n", tuple2._1, tuple2._2));

    }

    }

