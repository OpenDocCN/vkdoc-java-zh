    Let me use a sample application to demonstrate the usage of the module system.
    This is a simple e-commerce application with very limited features. The main objective
    is to demonstrate how the module system works, so the actual implementations of
    these modules don’t really matter. The sample application is a Maven project with
    modules shown in Table [2-1](#A459620_1_En_2_Chapter.html#Tab1). The namespace
    of this application is `io.vividcode.store`, so the module name of `common` in
    Table [2-1](#A459620_1_En_2_Chapter.html#Tab1) is actually `io.vividcode.store.common`.


    Table 2-1.


    Modules of the Sample Application


    | Name | Description |

    | --- | --- |

    | `common` | Common API |

    | `common.persistence` | Common persistence API |

    | `filestore` | File-based persistence implementation |

    | `product` | Product API |

    | `product.persistenc`e | Product persistence implementation |

    | `runtime` | Application bootstrap |


    ## Module Declaration


    The module declaration file `module-info.java` is the first step to understanding
    how module system works.


    ### `requires` and `exports`


    After the introduction of modules in Java 9, you should organize Java applications
    as modules. A module can declare its dependencies upon other modules using the
    keyword `requires`. Requiring a module doesn’t mean that you have access to its
    public and protected types automatically. A module can declare which packages
    are accessible to other modules. Only a module’s exported packages are accessible
    to other modules, and by default, no packages are exported. The module declaration
    in Listing [2-1](#A459620_1_En_2_Chapter.html#Par17) exports nothing. The keyword
    `exports` is used to export packages. Public and protected types in exported packages
    and their public and protected members can be accessed by other modules.


    Listing [2-2](#A459620_1_En_2_Chapter.html#Par23) shows the file `module-info.java`
    of the module `io.vividcode.store.common.persistence`. It uses two `requires`
    declarations to declare its dependencies upon modules `slf4j.api` and `io.vividcode.store.common`.
    The module `slf4j.api` comes from the third-party library SLF4J ( [`https://www.slf4j.org/`](https://www.slf4j.org/)
    ), while `io.vividcode.store.common` is another module in the sample application.
    The module `io.vividcode.store.common.persistence` exports its package `io.vividcode.store.common.persistence`
    to other modules.


    ```

    module io.vividcode.store.common.persistence {

    requires slf4j.api;

    requires io.vividcode.store.common;

    exports io.vividcode.store.common.persistence;

    }

    Listing 2-2.

    Module Declaration of io.vividcode.store.common.persistence

    ```


    Please note, when you export a package, you only export types in this package
    but not types in its subpackages. For example, the declaration `exports com.mycompany.mymodule`
    only exports types like `com.mycompany.mymodule.A` or `com.mycompany.mymodule.B`,
    but not types like `com.mycompany.mymodule.impl.C` or `com.mycompany.mymodule.test.demo.D`.
    To export those subpackages, you need to use `exports` to explicitly declare them
    in the module declaration.


    If a type is not accessible across module boundaries, this type is treated like
    a private method or field in the module. Any attempt to use this type will cause
    an error in the compile time, a `java.lang.IllegalAccessError` thrown by the JVM
    in the runtime, or a `java.lang.IllegalAccessException` thrown by the Java reflection
    API when you are using reflection to access this type.


    Note


    All modules, except for the module `java.base` itself, have implicit and mandatory
    dependency upon `java.base`. You don’t need to explicitly declare this dependency.


    ### Transitive Dependencies


    When module A requires module B, module A can read public and protected types
    exported in module B. Here we say module A reads module B. If module B also reads
    module C, module B can have methods that return types exported in module C.


    Listing [2-3](#A459620_1_En_2_Chapter.html#Par29) shows the file `module-info.java`
    of module C. Module C exports the package `ctest`.


    ```

    module C {

    exports ctest;

    }

    Listing 2-3.

    Module Declaration of C

    ```


    Listing [2-4](#A459620_1_En_2_Chapter.html#Par31) shows the class `ctest.MyC`
    in module C. It only has one method, `sayHi()`, that prints out a message to the
    console.


    ```

    package ctest;

    public class MyC {

    public void sayHi() {

    System.out.println("Hi from module C!");

    }

    }

    Listing 2-4.

    Class ctest.MyC in Module C

    ```


    Listing [2-5](#A459620_1_En_2_Chapter.html#Par33) shows the file `module-info.java`
    of module B. Module B requires module C and exports the package `btest`.


    ```

    module B {

    requires C;

    exports btest;

    }

    Listing 2-5.

    Module Declaration of B

    ```


    The method `getC()` of the class `btest.MyB` in Listing [2-6](#A459620_1_En_2_Chapter.html#Par35)
    returns a new instance of the class `ctest.MyC`.


    ```

    package btest;

    import ctest.MyC;

    public class MyB {

    public MyC getC() {

    return new MyC();

    }

    }

    Listing 2-6.

    Class btest.MyB in Module B

    ```


    The module A only requires module B in its file `module-info.java`; see Listing
    [2-7](#A459620_1_En_2_Chapter.html#Par37).


    ```

    module A {

    requires B;

    }

    Listing 2-7.

    Module Declaration of B

    ```


    The class `atest.MyA` in module A tries to use the class `MyC`; see Listing [2-8](#A459620_1_En_2_Chapter.html#Par39).


    ```

    package atest;

    import btest.MyB;

    public class MyA {

    public static void main(String[] args) {

    new MyB().getC().sayHi();

    }

    }

    Listing 2-8.

    Class atest.MyA in Module A

    ```


    Although the code in Listing [2-8](#A459620_1_En_2_Chapter.html#Par39) looks quite
    reasonable, it cannot be compiled due to the error that module A doesn’t read
    module C; see the error message in Listing [2-9](#A459620_1_En_2_Chapter.html#Par41).
    The module readability relationship is not transitive by default. Module B reads
    module C, module A reads module B, but module A doesn’t read module C.


    ```

    //A/atest/MyA.java:7: error: MyC.sayHi() in package ctest is not

    accessible

    new MyB().getC().sayHi();

    ^

    (package ctest is declared in module C, but module A does not read it)

    1 error

    Listing 2-9.

    Compile Error of Module A

    ```


    To make the code in Listing [2-8](#A459620_1_En_2_Chapter.html#Par39) compile,
    you need to add `requires C` to the file `module-info.java` of module A in Listing
    [2-7](#A459620_1_En_2_Chapter.html#Par37). This can be a tedious task when many
    modules depend on each other. Since this is a common usage scenario, Java 9 provides
    built-in support for it. The `requires` declaration can be extended to add the
    modifier `transitive` to declare the dependency as transitive. The transitive
    modules that a module depends on are readable by any module that depends upon
    this module. This is called implicit readability.


    After the declaration of module B is changed to use the modifier `transitive`
    in Listing [2-10](#A459620_1_En_2_Chapter.html#Par44), module A can be compiled
    successfully. The transitive module C that module B depends on is readable by
    module A, which depends upon module B. Module A can now read module C.


    ```

    module B {

    requires transitive C;

    exports btest;

    }

    Listing 2-10.

    Updating the Module Declaration of B to Use transitive

    ```


    In general, if one module exports a package containing a type whose signature
    refers to another package in a second module, then the first module should use
    `requires transitive` to declare the dependency upon the second module. As in
    module B, the method `getC()` of class `MyB` references the class `MyC` from module
    C, so module B should use `requires transitive C` instead of `requires C`.'
