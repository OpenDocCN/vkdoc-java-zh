    ### The Module Layers


    Module layers are used to organize modules. Module layers are represented as the
    class `java.lang.ModuleLayer`.


    A layer is created from the readability graph in a `Configuration` object by mapping
    each resolved module to a class loader that is responsible for loading types defined
    in this module. The JVM has at least one nonempty layer, the `boot` layer, which
    is created when the JVM starts. Most applications will only use this boot layer.
    Additional layers can be created to support advanced use cases. A layer can have
    multiple parent layers. Modules in a layer can also read modules in the layer’s
    parent layers. When a layer is created, a `java.lang.Module` object is created
    for each `ResolvedModule` in the configuration.


    The static method `boot()` of `ModuleLayer` returns the boot layer. There are
    three different ways to create a new layer from an existing `ModuleLayer`; see
    Table [2-10](#A459620_1_En_2_Chapter.html#Tab10). The existing `ModuleLayer` will
    be the parent layer of the newly created layer.


    Table 2-10.


    Methods for Creating New `ModuleLayers`


    | Method | Description |

    | --- | --- |

    | `defineModules(Configuration cf, Function<String, ClassLoader> clf)` | Creates
    a new `ModuleLayer` from the `Configuration`. For each module, the function returns
    the mapped `ClassLoader`. |

    | `defineModulesWithOneLoader(Configuration cf, ClassLoader parentLoader)` | Creates
    a new `ModuleLayer` from the `Configuration`. All modules use the same `ClassLoader`
    with `parentLoader` as the parent class loader. |

    | `defineModulesWithManyLoaders(Configuration cf, ClassLoader parentLoader)` |
    Creates a new `ModuleLayer` from the `Configuration`. Each module has its own
    `ClassLoader` with `parentLoader` as the parent class loader. |


    `ModuleLayer` also has the static methods `defineModules()`, `defineModulesWithOneLoader()`,
    and `defineModulesWithManyLoaders()` to create new layers. These methods require
    to provide the list of parent layers. Compared to those instance methods, these
    static methods return `ModuleLayer.Controller` instead of `ModuleLayer. ModuleLayer.Controller`
    has methods for modifying the modules in the layer; see Table [2-11](#A459620_1_En_2_Chapter.html#Tab11).


    Table 2-11.


    Methods of `ModuleLayer.Controller`


    | Method | Description |

    | --- | --- |

    | `addReads(Module source, Module target)` | Updates the module `source` to read
    the module `target` |

    | `ModuleLayer.Controller addExports(Module source, String pn, Module target)`
    | Updates the module `source` to export the package `pn` to the module `target`
    |

    | `ModuleLayer.Controller addOpens(Module source, String pn, Module target)` |
    Updates the module `source` to open the package `pn` to the module `target` |

    | `ModuleLayer layer()` | Returns the `ModuleLayer` object |


    `ModuleLayer` also has other methods; see Table [2-12](#A459620_1_En_2_Chapter.html#Tab12).


    Table 2-12.


    Methods of `ModuleLayer`


    | Method | Description |

    | --- | --- |

    | `static ModuleLayer empty()` | Returns the empty layer. |

    | `Configuration configuration()` | Returns the configuration for this layer.
    |

    | `List<ModuleLayer> parents()` | Returns the list of this layer’s parents. |

    | `Set<Module> modules()` | Returns the set of modules in this layer. |

    | `Optional<Module> findModule(String name)` | Returns the module with the given
    name. Parent layers are also searched recursively until the module is found. |

    | `ClassLoader findLoader(String name)` | Returns the `ClassLoader` of the module
    with the given name. Parent layers are also searched in the same way as in `findModule()`.
    |


