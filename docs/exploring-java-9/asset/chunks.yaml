    类`java.security.SecureRandom`负责生成加密强随机数。Java有几种内置算法来生成随机数。Java 9新增了确定性随机比特生成器（DRBG）算法。由于DRBG需要额外参数进行配置，现有API也已更新以支持它。


    新的标记接口`SecureRandomParameters`表示不同`SecureRandom`方法中使用的参数。目前只有DRBG相关参数实现了此接口。`SecureRandomSpi`新增了一个以`SecureRandomParameters`为参数的构造函数。新方法`void
    engineNextBytes(byte[] bytes, SecureRandomParameters params)`可以使用`SecureRandomParameters`生成随机字节。如果`SecureRandom`支持重新播种，则应重写方法`void
    engineReseed(SecureRandomParameters params)`以重新播种。最后一个新方法`SecureRandomParameters
    engineGetParameters()`返回引擎使用的有效`SecureRandomParameters`。


    为了使用`SecureRandomParameters`接口，`SecureRandom`有三个新的静态方法`getInstance()`重载，用于添加额外的`SecureRandomParameters`参数。方法`nextBytes()`也有一个带有`SecureRandomParameters`参数的新重载。由于DRBG支持重新播种，新方法`void
    reseed()`和`void reseed(SecureRandomParameters params)`可以从其源重新播种此`SecureRandom`。最后一个新方法`SecureRandomParameters
    getParameters()`返回此`SecureRandom`实例的有效`SecureRandomParameters`。


    DRBG算法有三种`SecureRandomParameters`实现，用于不同阶段；参见表[13-1](#A459620_1_En_13_Chapter.html#Tab1)。


    **表 13-1.** `SecureRandomParameters` 实现


    | 实现 | 描述 | 使用方法 |

    | --- | --- | --- |

    | `DrbgParameters.Instantiation` | 实例化 | `getInstance` |

    | `DrbgParameters.NextBytes` | 随机比特生成 | `nextBytes` |

    | `DrbgParameters.Reseed` | 重新播种 | `reseed` |


    `DrbgParameters`有用于创建这三种参数类型实例的静态方法。创建新的`DrbgParameters.Instantiation`时，可以使用枚举`DrbgParameters.Capability`指定DRBG的最低能力要求；参见表[13-2](#A459620_1_En_13_Chapter.html#Tab2)。DRBG能力包括是否可重新播种以及是否支持预测抗性。由于支持预测抗性的DRBG实现也必须支持重新播种，因此只有三个选项。


    **表 13-2.** `DrbgParameters.Capability` 值


    | 值 | 描述 |

    | --- | --- |

    | `NONE` | 既不可重新播种也不具备预测抗性 |

    | `RESEED_ONLY` | 仅可重新播种 |

    | `PR_AND_RESEED` | 既可重新播种又具备预测抗性 |


    创建的DRBG `SecureRandom`实例可能具有比请求更多的能力。一旦创建了`SecureRandom`实例，就可以使用方法`getParameters()`获取有效的`SecureRandomParameters`，然后检查实际能力。


    清单[13-2](#A459620_1_En_13_Chapter.html#Par11)展示了使用DRBG算法生成随机数的示例。


    ```

    public class DRBGRandom {

    public static void main(final String[] args) throws NoSuchAlgorithmException {

    final DrbgParameters.Instantiation instantiation =

    DrbgParameters.instantiation(

    256,

    Capability.PR_AND_RESEED,

    "HelloWorld".getBytes()

    );

    final SecureRandom secureRandom = SecureRandom.getInstance("DRBG", instantiation);

    final DrbgParameters.NextBytes nextBytes =

    DrbgParameters.nextBytes(-1, true, "Hello".getBytes());

    final byte[] result = new byte[32];

    secureRandom.nextBytes(result, nextBytes);

    System.out.println(Hex.encodeHexString(result));

    final DrbgParameters.Reseed reseed = DrbgParameters.reseed(true, null);

    secureRandom.reseed(reseed);

    secureRandom.nextBytes(result, nextBytes);

    System.out.println(Hex.encodeHexString(result));

    }

    }

    ```


    **清单 13-2.** 使用DRBG算法的示例


    作为实现DRBG的结果，哈希算法`SHA-512/224`和`SHA-512/256`以及相关的`HmacSHA512/224`和`HmacSHA512/256`也已添加。


    # 使用PKCS12作为默认密钥库


    自JDK 1.2以来，JDK一直使用其专有的密钥库格式JKS。JKS密钥库只能存储私钥和受信任的公钥证书。PKCS12（[https://en.wikipedia.org/wiki/PKCS_12](https://en.wikipedia.org/wiki/PKCS_12)）是一种广泛支持的密钥存储格式。在Java
    9中，默认密钥库类型从JKS更改为PKCS12。现有密钥库不会更改，应用程序无需更改即可继续运行。


    # 总结


    在本章中，我们讨论了新的SHA-3哈希算法、DRBG `SecureRandom`算法以及使用PKCS12密钥库。在下一章中，我们将讨论Java 9中与用户界面相关的更改。


    # 14. 用户界面


    大量桌面应用程序仍使用Java开发。Java 9继续改进对这些桌面应用程序的支持。


    ## 桌面


    类`java.awt.Desktop`允许Java应用程序与各种桌面功能交互。Java 9通过添加更多功能扩展了此支持。然而，这些新功能可能并非所有原生平台都支持。如果底层平台不支持某项功能，则相应方法无效。所有这些功能在`Desktop.Action`中都有一个枚举值。可以使用`Desktop`中的方法`boolean
    isSupported(Desktop.Action action)`检查某个操作是否受支持。


    ### 应用程序事件


    方法`void addAppEventListener(SystemEventListener listener)`为来自原生系统的不同类型系统事件添加监听器。`SystemEventListener`有以下子接口用于不同的系统事件：


    *   `AppForegroundListener`：当应用程序成为前台应用程序以及不再是前台应用程序时收到通知。

    *   `AppHiddenListener`：当应用程序被用户隐藏或显示时收到通知。

    *   `AppReopenedListener`：当应用程序被要求重新打开时收到通知。

    *   `ScreenSleepListener`：当显示器进入省电休眠状态以及从省电休眠状态唤醒后收到通知。

    *   `SystemSleepListener`：当系统进入休眠状态以及系统唤醒后收到通知。

    *   `UserSessionListener`：当用户会话切换至以及切换离开时收到通知。


    如果底层系统不支持特定类型的系统事件，添加相应的监听器将无效。可以使用方法`void removeAppEventListener(SystemEventListener
    listener)`移除已添加的监听器。


    还可以使用方法`void requestForeground(boolean allWindows)`请求将应用程序移至前台。如果参数`allWindows`为`true`，则应用程序的所有窗口都将移至前台，否则仅移动最前面的窗口。


    ### 关于窗口


    方法`void setAboutHandler(AboutHandler aboutHandler)`设置自定义处理程序，以处理显示应用程序“关于”窗口的请求。将`AboutHandler`设置为`null`可恢复为默认行为。


    ### 打开文件


    方法`void setOpenFileHandler(OpenFilesHandler openFileHandler)`设置自定义处理程序，以便在应用程序被要求打开文件列表时收到通知。`OpenFilesHandler`接收到的事件对象`OpenFilesEvent`包含文件列表以及用于查找文件的搜索词。


    ### 打印文件


    方法`void setPrintFileHandler(PrintFilesHandler printFileHandler)`设置自定义处理程序，以便在应用程序被要求打印文件列表时收到通知。`PrintFilesHandler`接收到的事件对象`PrintFilesEvent`包含要打印的文件列表。'
  raw: '## SecureRandom


    The class `java.security.SecureRandom` is responsible for generating cryptographically
    strong random numbers. Java has several built-in algorithms to generate random
    numbers. Java 9 adds the new deterministic random bit generator (DRBG) algorithm.
    Because DRBG requires extra parameters to configure, the existing API is also
    updated to support it.


    The new marker interface `SecureRandomParameters` represents parameters used in
    different `SecureRandom` methods. Currently only DRBG-related parameters implement
    this interface. `SecureRandomSpi` adds a new constructor that takes `SecureRandomParameters`
    as the parameter. The new method `void engineNextBytes(byte[] bytes, SecureRandomParameters
    params)` can use the `SecureRandomParameters` to generate random bytes. If the
    `SecureRandom` supports reseeding, the method `void engineReseed(SecureRandomParameters
    params)` should be overridden to reseed. The last new method `SecureRandomParameters
    engineGetParameters()` returns the effective `SecureRandomParameters` used by
    the engine.


    To use the `SecureRandomParameters` interface, `SecureRandom` has three new overloads
    of the static method `getInstance()` to add to the extra `SecureRandomParameters`
    parameter. The method `nextBytes()` also has a new overload with the `SecureRandomParameters`
    parameter. Since DRBG supports reseeding, new methods `void reseed()` and `void
    reseed(SecureRandomParameters params)` can reseed this `SecureRandom` with input
    from its source. The last new method `SecureRandomParameters getParameters()`
    returns the effective `SecureRandomParameters` for this `SecureRandom` instance.


    The DRBG algorithm has three implementations of `SecureRandomParameters` to be
    used in different stages; see Table [13-1](#A459620_1_En_13_Chapter.html#Tab1).


    Table 13-1.


    `SecureRandomParameters` Implementations


    | Implementation | Description | Method to Use |

    | --- | --- | --- |

    | `DrbgParameters.Instantiation` | Instantiation | `getInstance` |

    | `DrbgParameters.NextBytes` | Random bits generation | `nextBytes` |

    | `DrbgParameters.Reseed` | Reseed | `reseed` |


    `DrbgParameters` has static methods for creating instances of these three types
    of parameters. When creating a new `DrbgParameters.Instantiation`, you can specify
    the minimal capability requirement for DRBG with the enum `DrbgParameters.Capability`;
    see Table [13-2](#A459620_1_En_13_Chapter.html#Tab2). DRBG capabilities include
    whether it’s reseedable and supports prediction resistance. Because a DRBG implementation
    that supports prediction resistance must also support reseeding, there are only
    three options.


    Table 13-2.


    `DrbgParameters.Capability` Values


    | Value | Description |

    | --- | --- |

    | `NONE` | Neither reseedable nor prediction resistant |

    | `RESEED_ONLY` | Reseedable only |

    | `PR_AND_RESEED` | Both reseedable and prediction resistant |


    The created DRBG `SecureRandom` instances may have more capabilities than requested.
    Once a `SecureRandom` instance is created, you can get the effective `SecureRandomParameters`
    using the method `getParameters()` and then check the actual capabilities.


    Listing [13-2](#A459620_1_En_13_Chapter.html#Par11) shows an example of using
    the DRBG algorithm to generate random numbers.


    ```

    public class DRBGRandom {

    public static void main(final String[] args) throws NoSuchAlgorithmException {

    final DrbgParameters.Instantiation instantiation =

    DrbgParameters.instantiation(

    256,

    Capability.PR_AND_RESEED,

    "HelloWorld".getBytes()

    );

    final SecureRandom secureRandom = SecureRandom.getInstance("DRBG", instantiation);

    final DrbgParameters.NextBytes nextBytes =

    DrbgParameters.nextBytes(-1, true, "Hello".getBytes());

    final byte[] result = new byte[32];

    secureRandom.nextBytes(result, nextBytes);

    System.out.println(Hex.encodeHexString(result));

    final DrbgParameters.Reseed reseed = DrbgParameters.reseed(true, null);

    secureRandom.reseed(reseed);

    secureRandom.nextBytes(result, nextBytes);

    System.out.println(Hex.encodeHexString(result));

    }

    }

    Listing 13-2.

    Example of Using the DRBG Algorithm

    ```


    As a result of implementing DRBG, hash algorithms `SHA-512/224` and `SHA-512/256`
    and related `HmacSHA512/224` and `HmacSHA512/256` have also been added.


    ## Using PKCS12 as the Default Keystore


    JDK has used its prop rietary keystore format, JKS, since JDK 1.2\. The JKS keystore
    can only store private keys and trusted public-key certificates. PKCS12 ( [`https://en.wikipedia.org/wiki/PKCS_12`](https://en.wikipedia.org/wiki/PKCS_12)
    ) is a widely supported format for storing keys. In Java 9, the default keystore
    type changes from JKS to PKCS12\. Existing keystores are not changed and applications
    can still run without changes.


    ## Summary


    In this chapter, we discussed the new SHA-3 hash algorithm, the DRBG `SecureRandom`
    algorithm, and using the PKCS12 keystore. In the next chapter, we’ll discuss changes
    related to the user interface in Java 9.


    # 14. User Interface


    A large number of desktop applications are still developed in Java. Java 9 continues
    to improve on support for these desktop applications.


    ## Desktop


    The class `java.awt.Desktop` allows Java applications to interact with various
    desktop capabilities. Java 9 extends this support by adding more capabilities.
    However, these new capabilities may not be supported by all native platforms.
    If the underlying platform doesn’t support a capability, the corresponding method
    has no effect. All these capabilities have an enum value in `Desktop.Action`.
    You can use the method `boolean isSupported(Desktop.Action action)` in `Desktop`
    to check whether or not an action is supported.


    ### Application Events


    The method `void addAppEventListener(SystemEventListener listener)` a dds listeners
    for different kinds of system events from the native system. `SystemEventListener`
    has the following subinterfaces for different system events:


    *   `AppForegroundListener` : Gets notified when the app becomes the foreground
    app and when it’s no longer the foreground app.

    *   `AppHiddenListener` : Gets notified when the app is hidden or shown by the
    user.

    *   `AppReopenedListener` : Gets notified when the app has been asked to open
    again.

    *   `ScreenSleepListener` : Gets notified when the displays have entered power
    save sleep and after displays have awoken from power save sleep.

    *   `SystemSleepListener` : Gets notified when the system is entering sleep and
    after the system wakes.

    *   `UserSessionListener` : Gets notified when the user session has been switched
    to and when the user session has been switched away from.


    If the underlying system doesn’t support a particular type of system event, adding
    the corresponding listener has no effect. You can remove added listeners using
    the method `void removeAppEventListener(SystemEventListener listener)`.


    You can also use the method `void requestForeground(boolean allWindows)` to request
    that an application move to the foreground. If the parameter `allWindows` is `true`,
    all windows of the application will be moved to the foreground, otherwise only
    the foremost one will be moved.


    ### About Window


    The method `void setAboutHandler(AboutHandler aboutHandler)` sets a custom handler
    to handle the request to show the About window for your application. Setting the
    `AboutHandler` to `null` can revert it to the default behavior.


    ### Open Files


    The method `void` `setOpenFileHandler` `(OpenFilesHandler openFileHandler)` sets
    a custom handler to get notified when the application is asked to open a list
    of files. The event object `OpenFilesEvent` received by `OpenFilesHandler` contains
    the list of files and the search term used to find the files.


    ### Print Files


    The method `void` `setPrintFileHandler` `(PrintFilesHandler printFileHandler)`
    sets a custom handle r to get notified when the application is asked to print
    a list of files. The event object `PrintFilesEvent` received by `PrintFilesHandler`
    contains the list of files to print.'
