    ## `SubmissionPublisher`


    虽然这四个核心接口易于理解，但正确实现它们并不容易。然而，你实际上不需要关心实现；你可以简单地依赖第三方库。


    类`java.util.concurrent.SubmissionPublisher<T>`是`Flow.Publisher`的一个实现，它异步地将提交的项目发布给订阅者，直到它被关闭。`SubmissionPublisher`的项目不是由发布者生成的，而是由客户端代码提交的。`SubmissionPublisher`可以充当客户端代码与订阅者通信的桥梁。


    `SubmissionPublisher`使用`Executor`向订阅者发送项目。`Executor`可以在构造函数中提供，或者默认使用`ForkJoinPool.commonPool()`。当任何订阅者方法抛出错误时，你可以在订阅被取消之前提供一个处理器来处理该异常。`SubmissionPublisher`有三个构造函数。


    *   无参构造函数使用默认的`Executor`且没有异常处理器。

    *   `SubmissionPublisher(Executor executor, int maxBufferCapacity)`配置`Executor`和缓冲区的最大大小。缓冲区包含已提交但尚未被订阅者消费的项目。每个订阅者都有自己独立的缓冲区。

    *   `SubmissionPublisher(Executor executor, int maxBufferCapacity, BiConsumer<?
    super Flow.Subscriber<? super T>,? super Throwable> handler)`配置`Executor`、缓冲区的最大大小以及异常处理器。


    > **注意**

    > 最大缓冲区大小的实际值可能会向上取整到最近的2的幂，或者受限于实现支持的最大值。例如，如果将`10`作为`maxBufferCapacity`的值传递给构造函数，则实际使用的值是`16`。我们可以使用`getMaxBufferCapacity()`方法来获取实际值。


    由于订阅者消费已发布项目的速度可能不同，因此某些项目可能尚未被所有订阅者消费。`estimateMaximumLag()`方法返回一个估计值，表示已发布但尚未被所有订阅者消费的最大项目数。另一方面，项目发布的速度也可能跟不上订阅者的消费速度。在这种情况下，`estimateMinimumDemand()`方法返回一个估计值，表示已请求但尚未发布的最小项目数。


    要向`SubmissionPublisher`提交项目，你可以使用`submit()`和`offer()`方法。`submit(T item)`方法通过调用所有订阅者的`onNext()`方法异步地将项目发布给它们。当任何订阅者没有可用资源来处理时，`submit()`会不可中断地阻塞。当你希望确保项目成功发布给所有订阅者时，应使用`submit()`。然而，其阻塞行为可能会带来性能损失。一个不堪重负的订阅者可能会减慢其他订阅者的处理速度。`submit()`的返回值是最大延迟的估计值，与`estimateMaximumLag()`方法的返回值相同。'
