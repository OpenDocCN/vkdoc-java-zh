    \ | 在 `StackFrame` 中保留 `Class` 对象 |\n| `SHOW_HIDDEN_FRAMES` | 显示所有隐藏的帧 |\n| `SHOW_REFLECT_FRAMES`\
    \ | 显示所有反射帧 |\n\n获取 `StackWalker` 实例后，你可以使用方法 `<T> T walk(Function<? super Stream<StackWalker.StackFrame>,?\
    \ extends T> function)` 遍历当前线程的堆栈帧。唯一的参数是一个函数，该函数应用于 `StackWalker.StackFrames`\
    \ 的流并返回一个值。当 `walk()` 方法返回时，该流被关闭，无法再次使用。`StackWalker.StackFrame` 有多种方法用于检索堆栈帧的信息；参见表\
