    Logging is an important aspect of application development. Many logging frameworks
    are available for use in the Java platform, including popular choices like Apache
    Log4j 2 ( [`https://logging.apache.org/log4j/2.x/`](https://logging.apache.org/log4j/2.x/)
    ) and Logback ( [`https://logback.qos.ch/`](https://logback.qos.ch/) ). SLF4J
    is commonly used as the facade of different logging implementations. Java also
    has its own logging implementation, the `java.util.logging` API, which was added
    in Java 1.4\. Even though `java.util.logging` is the built-in logging solution
    used by the Java standard library, it’s not very popular. Most Java applications
    still use external logging frameworks. The JDK itself and the applications running
    on top of it may use different logging frameworks. If an application error is
    actually related to the Java standard library, even though such an error is unlikely,
    then two separate logging frameworks will make the error diagnostics much harder.
    In situations in which you are using two separate logging frameworks, you will
    also need to configure both logging frameworks, and their configurations are likely
    to have duplications.


    In Java 9, it’s now possible to use the same logging framework for both the JDK
    and the application by using the class `java.lang.System.LoggerFinder`. `LoggerFinder`
    is responsible for managing loggers used by the JDK. The JVM has a single system-wide
    `LoggerFinder` instance that is loaded using the service provider mechanism with
    `ServiceLoader`. If no `LoggerFinder` provider is found, the default `LoggerFinder`
    implementation will use `java.util.logging` as the logging framework when the
    module `java.logging` is present. If the module `java.logging` is not present,
    then the default `LoggerFinder` implementation outputs log messages to the console
    using `System.err`.


    The static method `getLoggerFinder()` of `LoggerFinder` returns the single `LoggerFinder`
    instance in the JVM. Subclasses of `LoggerFinder` need to implement the abstract
    method `System.Logger getLogger(String name, Module module),` which returns the
    logger instance of interface `java.lang.System.Logger` for a given module. `System.`
    `Logger` has different methods for logging messages of different levels. `LoggerFinder`
    also has the method `System.Logger getLocalizedLogger(String name, ResourceBundle
    bundle, Module module)` to return a localizable logger instance for a given module.


    `System.Logger` is the primary class used by applications to log messages. Table
    [6-1](#A459620_1_En_6_Chapter.html#Tab1) shows methods of `System.Logger`.


    Table 6-1.


    Methods of `System.Logger`


    | Method | Description |

    | --- | --- |

    | `String getName()` | Returns the name of this logger. |

    | `boolean isLoggable(System.Logger.Level level)` | Checks if a log message of
    the given level would be logged by this logger. |

    | `void log(System.Logger.Level level, String msg)` | Logs a message of the given
    level. |

    | `void log(System.Logger.Level level, Supplier<String> msgSupplier)` | Logs a
    message of the given level that is produced by the given supplier function. The
    supplier function is only called when the message will be logged. |

    | `void log(System.Logger.Level level, Object obj)` | Logs a message of the given
    level by calling the object’s `toString()` method. |

    | `void log(System.Logger.Level level, String msg, Throwable thrown)` | Logs a
    message of the given level with a given throwable. |

    | `void log(System.Logger.Level level, Supplier<String> msgSupplier, Throwable
    thrown)` | Logs a message of the given level that is produced by the given supplier
    function with a given throwable. |

    | `void log(System.Logger.Level level, String format, Object… params)` | Logs
    a message generated from the format and an optional list of parameters. The message
    uses the format specified in `MessageFormat`. |

    | `void log(System.Logger.Level level, ResourceBundle bundle, String msg, Throwable
    thrown)` | Logs a localized message of the given level with a given throwable.
    |

    | `void log(System.Logger.Level level, ResourceBundle bundle, String format, Object…
    params)` | Logs a localized message generated from the format and an optional
    list of parameters. |


    `System.Logger` defines its own enum for logging levels in `System.Logger.Level`
    . These levels can be easily mapped to logging levels in other logging frameworks.
    These logging levels are `ALL`, `TRACE`, `DEBUG`, `INFO`, `WARNING`, `ERROR`,
    and `OFF`.


    ## Default `LoggerFinder` Implementation


    Let’s first take a closer look at the default `LoggerFinder` implementation.


    The class `jdk.internal.logger.LoggerFinderLoader` in the module `java.base` is
    responsible for loading the `LoggerFinder` implementation. It first tries to use
    `ServiceLoader` to load the implementation of `LoggerFinder`. If no provider exists,
    it uses the `ServiceLoader` again to load an implementation of the class `jdk.internal.logger.DefaultLoggerFinder`.
    If it still cannot find any providers, it uses a new instance of `DefaultLoggerFinder.
    DefaultLoggerFinder` itself is a logging implementation that uses the class `jdk.internal.logger.SimpleConsoleLogger`
    to write log messages to the console using `System.err`.


    The class `sun.util.logging.internal.LoggingProviderImpl` in the module `java.`
    `logging` is an implementation of `DefaultLoggerFinder` that delegates the logging
    requests to the underlying loggers created from `java.util.logging`; see the module
    declaration of `java.logging` in Listing [6-1](#A459620_1_En_6_Chapter.html#Par9).


    ```

    module java.logging {

    exports java.util.logging;

    provides jdk.internal.logger.DefaultLoggerFinder with

    sun.util.logging.internal.LoggingProviderImpl;

    }

    Listing 6-1.

    Module Declaration of java.logging

