    ### Application Exit


    The method `void setQuitStrategy(QuitStrategy strategy)` sets the default strategy
    to quit the application. The enum `QuitStrategy` contains two values:


    *   `CLOSE_ALL_WINDOWS` means shutting down the application by closing each window
    from back-to-front.

    *   `NORMAL_EXIT` means shutting down the application by calling `System.exit(0)`.


    The method `void setQuitHandler(QuitHandler quitHandler)` sets a custom handler
    to determine if the application should exit. The method `void` `handleQuitRequestWith`
    `(QuitEvent e, QuitResponse response)` receives two parameters: the first, `QuitEvent`,
    represents the event; the second, `QuitResponse`, represents the response to the
    quit request. In the implementation of method `handleQuitRequestWith()`, you should
    either call `QuitResponse.cancelQuit()` to cancel the quit request or `QuitResponse.performQuit()`
    to perform the default quit strategy.


    The methods `void enableSuddenTermination()` and `void disableSuddenTermination()`
    enable and disable sudden termination of the application, respectively. If the
    application can be suddenly terminated, it is terminated without notifications.
    `QuitHandler` is not notified and shutdown hooks are not run. When your application’s
    state is saved, you should call the method `enableSuddenTermination()` to indicate
    that. On the other hand, if your application’s state is not saved, you should
    call the method `disableSuddenTermination()` to indicate that.


