- fmt: '### Class


    With the introduction of modules, `Class` has new methods related to modules.
    `Class<?> forName(Module module, String name)` returns the `Class` with the given
    binary name in the given module. This method delegates to the module’s class loader
    for class loading. Similar to the method `findClass()` of `ClassLoader`, `forName()`
    returns `null` on failure rather than throwing a `ClassNotFoundException`. Since
    a class loader can define classes for multiple modules, it’s possible that the
    defined class actually comes from a different module. In this case, the method
    also returns `null` after the class is loaded.


    Since every type is now in a module, `Class` has a new method, `getModule()`,
    to return the `Module` object representing the module it belongs to. If this class
    represents an array type, then this method returns the `Module` object for the
    element type. If this class represents a primitive type or `void`, then the `Module`
    object for the module `java.base` is returned. If this class is in an unnamed
    module, then the result of `getUnnamedModule()` of the class loader for this class
    is returned. Listing [2-42](#A459620_1_En_2_Chapter.html#Par280) shows the test
    related to `Class.getModule()`.


    ```

    @Test

    public void testGetModule() {

    assertEquals("java.sql", Driver.class.getModule().getName());

    assertEquals("java.base", String[].class.getModule().getName());

    assertEquals("java.base", int.class.getModule().getName());

    assertEquals("java.base", void.class.getModule().getName());

    }

    Listing 2-42.

    Testing Class.getModule()

    ```


    The new method `String getPackageName()` returns the fully qualified package name
    of a class. If this class represents an array type, then this method returns the
    package name of the element type. If this class represents a primitive type or
    `void`, then the package name `java.lang` is returned. Otherwise, the package
    name is derived from the class name returned by `Class.getName()` by keeping the
    characters before the last dot (`.`). Listing [2-43](#A459620_1_En_2_Chapter.html#Par282)
    shows the test related to `Class.getPackageName()`.


    ```

    @Test

    public void testGetPackageName() {

    assertEquals("java.sql", Driver.class.getPackageName());

    assertEquals("java.lang", String[].class.getPackageName());

    assertEquals("java.lang", int.class.getPackageName());

    assertEquals("java.lang", void.class.getPackageName());

    }

    Listing 2-43.

    Testing Class.getPackageName()

    ```


    ### Reflection


    In the previous section, I showed you how to use `ServiceLoader` to load provider
    classes of service interfaces. Many frameworks use the similar pattern and reflection
    API to dynamically load classes by name and instantiate them. A client can provide
    the class name to the framework through configuration. The framework uses `Class.forName()`
    to load the class and instantiate it using the method `newInstance()` of the `Class`
    object.


    This kind of pattern may have issues in the module system. The actual class may
    be loaded from the unnamed module or another named module. If the actual class
    is loaded from the unnamed module, then the instantiation fails because the framework’s
    module cannot read the unnamed module. If the actual class is loaded from another
    named module, it’s not possible for the framework’s module to know of the existence
    of client modules and declare dependencies upon them, which actually reverses
    the dependencies. To make this work, the reflection API has an implicit convention
    in which it assumes any code that reflects a type is in a module that reads the
    module that defines this type. The reflection API has the access to the type.


    In Listing [2-44](#A459620_1_En_2_Chapter.html#Par286), I use the reflection API
    in a named module to load the Guava class `com.google.common.eventbus.EventBus`
    and instantiate a new instance. The Guava library is put into the class path,
    so it’s in the unnamed module. The output of `clazz.getModule()` is something
    similar to `unnamed module @1623b78d`, which confirms that the class is in the
    unnamed module. The instantiation is successful and you can see output like `EventBus{default}`.


    ```

    try {

    final Class clazz = Class.forName("com.google.common.eventbus.EventBus");

    System.out.println(clazz.getModule());

    final Object instance = clazz.getDeclaredConstructor().newInstance();

    System.out.println(instance);

    } catch (final Exception e) {

    e.printStackTrace();

    }

    Listing 2-44.

    Using the Reflection API to Instantiate an Instance

    ```


    Note


    The method `Class.newInstance()` is deprecated in Java 9. In Listing [2-44](#A459620_1_En_2_Chapter.html#Par286),
    I use `clazz.getDeclaredConstructor().newInstance()` to get the constructor and
    then use it to instantiate new instances.'
