    ### byte[] 和 ByteBuffer 视图


    `VarHandle` 允许你将字节数组或 `ByteBuffer` 视为不同原始类型的数组，例如 `int[]` 或 `long[]`。你可以使用 `MethodHandles.byteArrayViewVarHandle()`
    或 `MethodHandles.byteBufferViewVarHandle()` 方法分别创建 `byte[]` 或 `ByteBuffer` 的视图。


