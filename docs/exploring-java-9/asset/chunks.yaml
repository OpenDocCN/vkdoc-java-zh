    ## 增强的弃用机制


    注解 `@Deprecated` 用于标记某个程序元素为已弃用且不应再使用。在 Java 9 中，`@Deprecated` 得到了增强，新增了两个属性。属性
    `since` 用于指明被注解元素从哪个版本开始弃用。版本字符串的格式与 javadoc 标签 `@since` 相同。`since` 的默认值为空字符串。属性
    `forRemoval` 用于指明被注解的元素是否会在未来版本中被移除。默认值为 `false`。如果属性 `forRemoval` 为 `false`，则被注解的元素至少会在下一个主要版本中继续存在。如果属性
    `forRemoval` 为 `true`，则被注解元素将在哪个未来版本中被移除尚不明确。它可能是下一个主要版本，也可能是在几个主要版本之后。`@Deprecated`
    注解和 javadoc 标签 `@deprecated` 应始终同时出现在已弃用的元素上。


    有了这两个新属性，开发者在遇到已弃用的元素时，就能更容易地知道应该采取什么行动。如果某个已弃用元素的 `forRemoval` 为 `true`，那么他们就需要更新使用该元素的代码。否则，当该元素在未来版本中被移除时，代码就会出错。


    在 Java 9 中，许多地方的 `@Deprecated` 注解都已更新，包含了这两个属性。例如，在 `java.lang.Thread` 类中，方法 `suspend()`、`resume()`
    和 `stop()` 被标记为 `@Deprecated(since="1.2")`，这意味着这些方法自 Java 1.2 起就已弃用，但它们至少会在下一个主要版本中继续存在。方法
    `countStackFrames()`、`destroy()` 和 `stop(Throwable obj)` 被标记为 `@Deprecated(since="1.2",
    forRemoval=true)`，因此这些方法将在未来版本中被移除。


    当使用已弃用的元素时，编译器会发出警告。随着 `forRemoval` 的引入，现在有两种类型的弃用警告。普通的弃用警告针对的是 `forRemoval`
    设置为 `false` 的 `@Deprecated`；终结性弃用警告针对的是 `forRemoval` 设置为 `true` 的 `@Deprecated`。在
    Java 9 之前，你可以使用 `@SuppressWarnings("deprecation")` 来抑制弃用警告。在 Java 9 中，`@SuppressWarnings("deprecation")`
    只能抑制普通的弃用警告。要抑制终结性弃用警告，你需要使用 `@SuppressWarnings("removal")`。


    你可以使用工具 `jdeprscan` 来扫描已弃用 API 的使用情况。`jdeprscan` 支持扫描作为包层次结构根目录的目录、JAR 文件和类文件。通过使用
    `--for-removal` 选项，你可以将扫描结果限制为那些因即将被移除而弃用的 API。`jdeprscan -l` 可以打印出已弃用 API 的集合。


    以下命令扫描了 Guava 的 JAR 文件：


    ```

    $ jdeprscan /guava-21.0.jar

    ```


    清单 16-9 展示了扫描结果。


    ```

    class com/google/common/io/FileBackedOutputStream$1 overrides

    deprecated method java/lang/Object::finalize()V

    class com/google/common/reflect/Element uses deprecated

    method java/lang/reflect/AccessibleObject::isAccessible()Z

    class com/google/common/reflect/Element overrides deprecated

    method java/lang/reflect/AccessibleObject::isAccessible()Z

