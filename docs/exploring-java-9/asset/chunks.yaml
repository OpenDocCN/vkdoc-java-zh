    Example of whileLoop() and doWhileLoop()

    ```


    Note


    The method handle `body` in `countedLoop()`, `iteratedLoop()`, `whileLoop()`,
    and `doWhileLoop()` can have an optional loop variable. If the return type of
    `body` is `void`, then there will be no loop variable as the leading parameter
    of `body`. In this case, the return type of `init` is also `void`. When there
    is no loop variable, the first parameter of `body` will be the implicit loop variable.


    ## Try-finally


    The method `MethodHandle tryFinally(MethodHandle target, MethodHandle cleanup)`
    creates a method handle that wraps the target method handle in a `try-finally`
    block. The parameter `target` is the `MethodHandle` to wrap, while `cleanup` is
    the `MethodHandle` to invoke in the `finally` block. Any exception thrown in the
    execution of `target` is passed to `cleanup`. The exception will be rethrown unless
    `cleanup` throws an exception first. The return value of the method handle created
    by `tryFinally()` is the return value of `cleanup. cleanup` accepts two optional
    leading parameters:


    *   A `Throwable` represents the exception thrown by invoking the method handle
    `target`.

    *   Return value of the method handle `target`.


    Except those two leading parameters, `target` and `cleanup` should have the same
    corresponding arguments and return types. In Listing [9-10](#A459620_1_En_9_Chapter.html#Par48),
    I have two different target method handles, `success` and `failure`. The method
    handle `tryFinallySuccess` that wraps the method `success()` returns the value
    `1`, but the method handle `tryFinallyFailure` that wraps the method `failure()`
    throws the `IllegalArgumentException`. The method `cleanup` is invoked in both
    invocations and outputs different information to the console.


    ```

    public class TryFinallyTest {

    static int success() {

    return 1;

    }

    static int failure() {

    throw new IllegalArgumentException("");

    }

    static int cleanup(final Throwable throwable, final int result) {

    if (throwable != null) {

    throwable.printStackTrace();

    } else {

    System.out.println("Success: " + result);

    }

    return result;

    }

    @Test(expected = IllegalArgumentException.class)

    public void testTryFinally() throws Throwable {

    final MethodHandle targetSuccess = getMethodHandle("success",

    MethodType.methodType(int.class));

    final MethodHandle targetFailure = getMethodHandle("failure",

    MethodType.methodType(int.class));

    final MethodHandle cleanup = getMethodHandle("cleanup",

    MethodType.methodType(int.class, Throwable.class, int.class));

    final MethodHandle tryFinallySuccess = MethodHandles

    .tryFinally(targetSuccess, cleanup);

    assertEquals(1, tryFinallySuccess.invoke());

    final MethodHandle tryFinallyFailure = MethodHandles

    .tryFinally(targetFailure, cleanup);

    tryFinallyFailure.invoke();

    }

    private MethodHandle getMethodHandle(final String name,

    final MethodType methodType)

    throws NoSuchMethodException, IllegalAccessException {

    return MethodHandles

    .lookup()

    .findStatic(TryFinallyTest.class, name, methodType);

    }

    }

