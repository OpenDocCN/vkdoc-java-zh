    ### whileLoop and doWhileLoop


    The method `MethodHandle whileLoop(MethodHandle init, MethodHandle pred, MethodHandle
    body)` creates a method handle representing a `while` loop. A `while` loop is
    defined by three method handles.


    *   `init`: Initializ es an optional loop variable. In each iteration, the loop
    variable is passed to the `body` and updated with the return value of the `body`.
    The result of the loop execution is the final value of the loop variable.

    *   `pred`: Executes a predicate to test for loop exit.

    *   `body`: Executes the method body.


    The method `MethodHandle doWhileLoop(MethodHandle init, MethodHandle body, MethodHandle
    pred)` creates a method handle representing a `do-while` loop. It has the same
    parameters as `whileLoop`, but with a different order. In a `doWhileLoop`, the
    parameter `body` comes before `pred`. This is because the `do-while` loop executes
    the `body` before `pred` in each iteration. All three of these parameters have
    the same meaning as in `whileLoop()`.


    In Listing [9-9](#A459620_1_En_9_Chapter.html#Par42), the loop variable is an
    `int[]` array with two elements; the first element is the iteration variable that
    controls the loop exit, while the second elements contains the sum. `k` is the
    extra parameter that determines the number of iterations. The return value of
    method `init()` is the initial value of the loop variable. The return value of
    method `body()` is passed as the input of the next iteration. The return value
    of the created `MethodHandle` is the final value of the loop variable.


    ```

    public class WhileLoopTest {

    static int[] init(final int k) {

    return new int[]{1, 0};

    }

    static boolean pred(final int[] local, final int k) {

    return local[0] < k;

    }

    static int[] body(final int[] local, final int k) {

    return new int[]{local[0] + 1, local[1] + local[0]};

    }

    @Test

    public void testWhileLoop() throws Throwable {

    final MethodHandle init = getMethodHandle("init",

    MethodType.methodType(int[].class, int.class));

    final MethodHandle pred = getMethodHandle("pred",

    MethodType.methodType(boolean.class, int[].class, int.class));

    final MethodHandle body = getMethodHandle("body",

    MethodType.methodType(int[].class, int[].class, int.class));

    final MethodHandle whileLoop = MethodHandles.whileLoop(init, pred, body);

    assertEquals(55, ((int[]) whileLoop.invoke(11))[1]);

    }

    @Test

    public void testDoWhileLoop() throws Throwable {

    final MethodHandle init = getMethodHandle("init",

    MethodType.methodType(int[].class, int.class));

    final MethodHandle pred = getMethodHandle("pred",

    MethodType.methodType(boolean.class, int[].class, int.class));

    final MethodHandle body = getMethodHandle("body",

    MethodType.methodType(int[].class, int[].class, int.class));

    final MethodHandle doWhileLoop = MethodHandles

    .doWhileLoop(init, body, pred);

    assertEquals(55, ((int[]) doWhileLoop.invoke(11))[1]);

    }

    private MethodHandle getMethodHandle(final String name,

    final MethodType methodType)

    throws NoSuchMethodException, IllegalAccessException {

    return MethodHandles

    .lookup()

    .findStatic(WhileLoopTest.class, name, methodType);

    }

    }

