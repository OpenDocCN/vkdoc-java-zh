    本章涵盖了 Java 9 中与 JVM 相关的更改。


    ## 统一日志记录


    在 Java 9 中，JVM 为所有组件提供了一个通用的日志记录系统。新的命令行选项 `-Xlog` 控制 JVM 所有组件的日志记录。新的统一日志记录系统支持标签、级别、修饰和输出。

    '
- fmt: '# Tags, Levels, Decorations, and Output


    Tags are used to classify log messages. A log message can be associated with a
    tag set that consists of one or more tags. JVM has a predefined set of tags, for
    example, `gc`, `system`, `thread`. Each log message has a logging level associated
    with it, just like the messages logged using Java’s logging frameworks. The available
    levels are `error`, `warning`, `info`, `debug`, `trace`, and `develop`. `develop`
    is only available in nonproduct builds. Logging messages are decorated with information
    about the message. The following is a list of possible decorations:


    * `time`: Current time and date in ISO-8601 format

    * `utctime`: Current UTC time and date ISO-8601 format

    * `uptime`: Time since the start of JVM in seconds and milliseconds

    * `timemillis`: The same value as generated by `System.currentTimeMillis()`

    * `uptimemillis`: Milliseconds since JVM started

    * `timenanos`: The same value as generated by `System.nanoTime()`

    * `uptimenanos`: Nanoseconds since JVM started

    * `hostname`: The hostname

    * `pid`: The process identifier

    * `tid`: The thread identifier

    * `level`: The logging level

    * `tags`: The tag set


    Output is the destination of the log messages. There are three types of supported
    output:


    * `stdout`: Outputs to `stdout`.

    * `stderr`: Outputs to `stderr`.

    * text file: Outputs to text files.


    Text file output supports file rotation based on the size and the maximum number
    of files.


    For each output, you can configure a logging level to control the amount of log
    messages written to it. For example, if the output’s logging level is set to `info`,
    then only messages with levels `error`, `warning`, and `info` will be written.
    This is the same as using other logging frameworks in Java. The logging level
    can also be set to `off` to disable logging. You can also configure the set of
    decorators used by the output. Decorations will be prepended to the log messages.


    ## Logging Configuration


    The configuration to the JVM logging system is done through the option `-Xlog`.
    The syntax of the option is a little bit complicated. The best way to understand
    the syntax is by running the command `java -Xlog:help`; then the help message
    will be printed out in the console. The option contains four parts separated by
    colons (`:`) in the format of `-Xlog[:[what][:[output][:[decorators][:output-options]]]]`.


    The first part, `what`, selects the log messages to output. Its value is a comma-separated
    list of selectors. Each selector contains a tag set and an optional logging level.
    Tags in the tag set are separated by plus (`+`). The tag set and logging level
    are separated by an equal sign (`=`). Wildcard (`*`) can be used to match any
    number of tags. All available tags are listed in the output of `-Xlog:help`. The
    default logging level is `info`. The following are some examples of the first
    part:


    * `gc`: Selects the tag `gc` with level `info`

    * `gc+heap=debug`: Selects the tags `gc` and `heap` with level `debug`

    * `gc=debug,heap=warning`: Selects the tag `gc` with level `debug` and the tag
    `heap` with level `warning`

    * `*`: Selects all tags with level `info`

    * `*=debug`: Selects all tags with level `debug`


    If a tag set contains multiple tags, a log message can only be selected when it’s
    associated exactly with all the tags in the tag set. When there are multiple selectors,
    a selected log message must match all selectors.


    The second part, `output`, configures the output of log messages. Here are some
    possible values:


    * `stdout`

    * `stderr`

    * `file=<filename>`: Supports `%p` and/or `%t` in the filename to use the JVM’s
    PID and startup timestamp, respectively.


    The third part, `decorators`, is a list of comma-separated decorators. You can
    use `none` to disable decorations. The default value of decorators is `"uptime,level,tags"`.


    The last part, `output-options`, is the extra comma-separated options for output.
    Each option is a name-value pair separated by an equal sign (`=`). There are two
    options supported:


    * `filecount`: The maximum number of rolling log files

    * `filesize`: The maximum size of each log file


    By combining these four parts, you can configure the behavior of the logging system.
    Here are some examples:


    * `-Xlog`: Equivalent to `-Xlog:all=info:stdout:uptime,levels,tags`.

    * `-Xlog:gc,class`: Log messages associated with the tag `gc` or `class`, using
    level `info`, to `stdout`, with default decorations. Messages associated with
    both gc and class will not be logged.

    * `-Xlog:gc+class`: Log messages associated with both the tags `gc` and `class`,
    using level `info`, to `stdout`, with default decorations. Messages associated
    with only one of the two tags will not be logged.

    * `-Xlog:gc=debug:file=gc_%p.txt`: Log messages associated with tag `gc` using
    level `debug` to the file. The file name has JVM’s PID.

    * `-Xlog:gc=debug:file=gc.txt:time:filecount=5,filesize=1m`: Log messages associated
    with tag `gc` using level `debug` to the file `gc.txt`. The maximum number of
    rolling files is `5` and each file has a maximum size of `1M`.


    You can also use `-Xlog:disable` to disable all loggings, including errors and
    warnings.


    With the new unified logging system, GC logging has been updated to leverage the
    same system. All GC-related log messages are associated with the tag `gc`. `-Xlog:gc`
    should be used to replace `-XX:+PrintGC` and `-XX:+PrintGCDetails`.


    ## The Diagnostic Command VM.log


    Logging configuration can be updated at runtime using the diagnostic command `VM.log`
    through `jcmd`. All the options supported in `-Xlog` can be specified dynamically
    with this command. Since diagnostic commands are automatically exposed as MBeans,
    you can also use the JMX to change logging configuration in runtime.


    To configure the logging at runtime, you use `jcmd` first to list all Java processes
    and locate the PID of the application to configure. You can also use the main
    class name to select the process to check. The option `list` in the following
    command lists current logging configuration. `31683` is the PID.


    ```

    $ jcmd 31683 VM.log list

    ```


    You can use key-value pairs to specify the values for the four parts mentioned
    earlier: `what`, `output`, `decorators`, and `output-options`. Using the following
    command, you update the logging configuration to be like `-Xlog:all=log:file=all.txt:time,level,tags`.


    ```

    $ jcmd 31683 VM.log what=all=info output=all.txt decorators=time,level,tags

    ```


    To disable the logging, you can use the following command:


    ```

    $ jcmd 31683 VM.log disable

    ```


    You can also force the log files to rotate using this command:


    ```

    $ jcmd 31683 VM.log rotate

    ```'
