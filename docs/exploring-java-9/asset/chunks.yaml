- fmt: '# Enhanced Deprecation


    The annotation `@Deprecated` marks a program element as deprecated and as one
    that should not be used. `@Deprecated` is enhanced in Java 9 with the addition
    of two new attributes. The attribute `since` indicates the version in which the
    annotated element became deprecated. The version string has the same format as
    the javadoc tag `@since`. The default value of `since` is an empty string. The
    attribute `forRemoval` indicates whether the annotated element is subject to removal
    in a future version. The default value is `false`. If the attribute `forRemoval`
    is `false`, the annotated element will still exist, at least in the next major
    release. If the attribute `forRemoval` is `true`, the future version in which
    the annotated element will be removed is unclear. It could be the next major release,
    or even after several other major releases. `@Deprecated` and the javadoc tag
    `@deprecated` should always be present at the same time on deprecated elements.


    With these two new attributes, it’s easier for developers to know which actions
    they should take when they’re using deprecated elements. If the `forRemoval` is
    `true` for a deprecated element, then they need to update code that uses this
    element. Otherwise, the code will break when the element is removed in a future
    version.


    In Java 9, `@Deprecated` annotations in many places have been updated to include
    these two attributes. For example, in the class `java.lang.Thread`, the methods
    `suspend()`, `resume()`, and `stop()` are marked as `@Deprecated(since="1.2")`,
    which means these methods are deprecated since Java 1.2, but that they will still
    exist, at least in next major release. The methods `countStackFrames()`, `destroy()`,
    and `stop(Throwable obj)` are marked as `@Deprecated(since="1.2", forRemoval=true)`,
    so these methods will be removed in a future version.


    When deprecated elements are used, the compiler issues warnings. With the introduction
    of `forRemoval`, there are now two types of deprecation warning. The ordinary
    deprecation warnings are for `@Deprecated` with `forRemoval` set to `false`; the
    terminal deprecation warnings are for `@Deprecated` with `forRemoval` set to `true`.
    Before Java 9, you could use `@SuppressWarnings("deprecation")` to suppress the
    deprecation warnings. In Java 9, `@SuppressWarnings("deprecation")` can only suppress
    ordinary deprecation warnings. To suppress terminal deprecation warnings, you
    need to use `@SuppressWarnings("removal")`.


    You can use the tool `jdeprscan` to scan the usages of deprecated APIs. `jdeprscan`
    supports scanning a directory that is the root of a package hierarchy, a JAR file
    and a class file. By using the option `--for-removal`, you can limit the scanning
    results to be with APIs that are deprecated for removal. `jdeprscan -l` can print
    out the set of deprecated APIs.


    The following command scans the JAR file of Guava:


    ```

    $ jdeprscan /guava-21.0.jar

    ```


    Listing [16-9](#A459620_1_En_16_Chapter.html#Par45) shows the scanning result.


    ```

    class com/google/common/io/FileBackedOutputStream$1 overrides

    deprecated method java/lang/Object::finalize()V

    class com/google/common/reflect/Element uses deprecated

    method java/lang/reflect/AccessibleObject::isAccessible()Z

    class com/google/common/reflect/Element overrides deprecated

    method java/lang/reflect/AccessibleObject::isAccessible()Z

    class com/google/common/util/concurrent/AtomicDoubleArray uses deprecated method

    java/util/concurrent/atomic/AtomicLongArray::weakCompareAndSet(IJJ)Z

    Listing 16-9.

    jdeprscan Scanning Result of Guava

    ```


    ## NetworkInterface


    The class `java.net.NetworkInterface` adds three new methods related to network
    interfaces:


    * `Stream<NetworkInterface> networkInterfaces()`: Static; returns a stream of
    `NetworkInterfaces`

    * `Stream<InetAddress> inetAddresses()`: Returns a stream of `InetAddresses` bound
    to this network interface

    * `Stream<NetworkInterface> subInterfaces()`: Returns a stream of subinterfaces
    that attached to this network interface


    Listing [16-10](#A459620_1_En_16_Chapter.html#Par51) shows how to use these three
    new methods. It displays information of all network interfaces.


    ```

    public class NetworkInterfaceDemo {

    public static void main(final String[] args) throws SocketException {

    final String allInterfaces = NetworkInterface.networkInterfaces().map(

    networkInterface ->

    String.format("Name:%s%nHost addresses:%s%nSub-interfaces:%s",

    networkInterface.getDisplayName(),

    networkInterface.inetAddresses().map(InetAddress::getHostAddress)

    .collect(Collectors.joining(", ")),

    networkInterface.subInterfaces().map(NetworkInterface::getName)

    .collect(Collectors.joining(", ")))

    ).collect(Collectors.joining("\n\n"));

    System.out.println(allInterfaces);

    }

    }

    Listing 16-10.

    Usage of New Methods in NetworkInterface

    ```


    ## Summary


    As the last chapter of this book, this chapter covered changes in Java 9 that
    are too small to be in their own chapters, including small language changes, the
    stack-walking API, UTF-8 property resource bundles, enhanced deprecation, and
    other small changes.'
