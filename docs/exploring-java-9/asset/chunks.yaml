  trans: '

    ### 标签、级别、装饰与输出


    标签用于对日志消息进行分类。一条日志消息可以与一个包含一个或多个标签的标签集相关联。JVM 预定义了一组标签，例如 `gc`、`system`、`thread`。每条日志消息都有一个与之关联的日志级别，就像使用
    Java 日志框架记录的消息一样。可用的级别有 `error`、`warning`、`info`、`debug`、`trace` 和 `develop`。`develop`
    仅在非产品构建中可用。日志消息会附带关于消息的装饰信息。以下是可能的装饰列表：


    *   `time`：ISO-8601 格式的当前时间和日期

    *   `utctime`：ISO-8601 格式的当前 UTC 时间和日期

    *   `uptime`：自 JVM 启动以来的时间（秒和毫秒）

    *   `timemillis`：与 `System.currentTimeMillis()` 生成的值相同

    *   `uptimemillis`：自 JVM 启动以来的毫秒数

    *   `timenanos`：与 `System.nanoTime()` 生成的值相同

    *   `uptimenanos`：自 JVM 启动以来的纳秒数

    *   `hostname`：主机名

    *   `pid`：进程标识符

    *   `tid`：线程标识符

    *   `level`：日志级别

    *   `tags`：标签集


    输出是日志消息的目的地。支持三种类型的输出：


    *   `stdout`：输出到 `stdout`。

    *   `stderr`：输出到 `stderr`。

    *   文本文件：输出到文本文件。


    文本文件输出支持基于大小和最大文件数量的文件轮转。


    对于每个输出，你可以配置一个日志级别来控制写入该输出的日志消息数量。例如，如果输出的日志级别设置为 `info`，则只会写入级别为 `error`、`warning`
    和 `info` 的消息。这与在 Java 中使用其他日志框架相同。日志级别也可以设置为 `off` 以禁用日志记录。你还可以配置输出使用的装饰器集合。装饰内容将被添加到日志消息之前。


    ### 日志配置


    JVM 日志系统的配置通过 `-Xlog` 选项完成。该选项的语法有点复杂。理解语法的最佳方式是运行命令 `java -Xlog:help`；然后帮助信息将打印到控制台。该选项包含四个部分，以冒号（`:`）分隔，格式为
    `-Xlog[:[what][:[output][:[decorators][:output-options]]]]`。


    第一部分 `what` 选择要输出的日志消息。其值是一个逗号分隔的选择器列表。每个选择器包含一个标签集和一个可选的日志级别。标签集中的标签用加号（`+`）分隔。标签集和日志级别用等号（`=`）分隔。通配符（`*`）可用于匹配任意数量的标签。所有可用标签都列在
    `-Xlog:help` 的输出中。默认日志级别是 `info`。以下是第一部分的一些示例：


    *   `gc`：选择标签 `gc`，级别为 `info`

    *   `gc+heap=debug`：选择标签 `gc` 和 `heap`，级别为 `debug`

    *   `gc=debug,heap=warning`：选择标签 `gc`，级别为 `debug`，以及标签 `heap`，级别为 `warning`

    *   `*`：选择所有标签，级别为 `info`

    *   `*=debug`：选择所有标签，级别为 `debug`


    如果一个标签集包含多个标签，则只有当一条日志消息恰好与该标签集中的所有标签关联时，才能被选中。当有多个选择器时，选中的日志消息必须匹配所有选择器。


    第二部分 `output` 配置日志消息的输出。以下是一些可能的值：


    *   `stdout`

    *   `stderr`

    *   `file=<filename>`：支持在文件名中使用 `%p` 和/或 `%t`，分别表示 JVM 的 PID 和启动时间戳。


    第三部分 `decorators` 是一个逗号分隔的装饰器列表。你可以使用 `none` 来禁用装饰。装饰器的默认值是 `"uptime,level,tags"`。


    最后一部分 `output-options` 是输出的额外逗号分隔选项。每个选项是一个由等号（`=`）分隔的名称-值对。支持两个选项：


    *   `filecount`：滚动日志文件的最大数量

    *   `filesize`：每个日志文件的最大大小


    通过组合这四个部分，你可以配置日志系统的行为。以下是一些示例：


    *   `-Xlog`：等同于 `-Xlog:all=info:stdout:uptime,levels,tags`。

    *   `-Xlog:gc,class`：记录与标签 `gc` 或 `class` 关联的消息，使用级别 `info`，输出到 `stdout`，使用默认装饰。同时与
    `gc` 和 `class` 关联的消息不会被记录。

    *   `-Xlog:gc+class`：记录同时与标签 `gc` 和 `class` 关联的消息，使用级别 `info`，输出到 `stdout`，使用默认装饰。仅与两个标签之一关联的消息不会被记录。

    *   `-Xlog:gc=debug:file=gc_%p.txt`：记录与标签 `gc` 关联的消息，使用级别 `debug`，输出到文件。文件名中包含
    JVM 的 PID。

    *   `-Xlog:gc=debug:file=gc.txt:time:filecount=5,filesize=1m`：记录与标签 `gc` 关联的消息，使用级别
    `debug`，输出到文件 `gc.txt`。滚动文件的最大数量为 `5`，每个文件的最大大小为 `1M`。


    你也可以使用 `-Xlog:disable` 来禁用所有日志记录，包括错误和警告。


    借助新的统一日志系统，GC 日志记录已更新为利用同一系统。所有与 GC 相关的日志消息都与标签 `gc` 关联。应使用 `-Xlog:gc` 来替代 `-XX:+PrintGC`
    和 `-XX:+PrintGCDetails`。


    ### 诊断命令 VM.log


    日志配置可以在运行时通过 `jcmd` 使用诊断命令 `VM.log` 进行更新。`-Xlog` 支持的所有选项都可以使用此命令动态指定。由于诊断命令会自动暴露为
    MBeans，你也可以使用 JMX 在运行时更改日志配置。


    要在运行时配置日志记录，首先使用 `jcmd` 列出所有 Java 进程并找到要配置的应用程序的 PID。你也可以使用主类名来选择要检查的进程。以下命令中的选项
    `list` 用于列出当前的日志配置。`31683` 是 PID。


    ```

    $ jcmd 31683 VM.log list

    ```


    你可以使用键值对来指定前面提到的四个部分的值：`what`、`output`、`decorators` 和 `output-options`。使用以下命令，你可以将日志配置更新为类似于
    `-Xlog:all=log:file=all.txt:time,level,tags`。


    ```

    $ jcmd 31683 VM.log what=all=info output=all.txt decorators=time,level,tags

    ```


    要禁用日志记录，可以使用以下命令：


    ```

    $ jcmd 31683 VM.log disable

    ```


    你也可以使用此命令强制轮转日志文件：


    ```

    $ jcmd 31683 VM.log rotate

    ```

