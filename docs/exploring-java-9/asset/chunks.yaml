    When using `getResourceAsStream()` to read the resources in a module, the resource
    may be encapsulated so that it cannot be located by code in other modules. Class
    files are not encapsulated. For other resources, the package name is derived from
    the resource name first. If the package name is in the module, that is, it is
    in the set of package names returned by `getPackages()`, then the caller code
    needs to be in a module that the package is open to.


    Now I’ll use an example to show you how to use `ModuleLayer`s to have multiple
    versions of the same module coexist in the same application. In the module `demo`,
    I have a simple Java `Version` class that has the static method `getVersion()`
    to return the version string; see Listing [2-34](#A459620_1_En_2_Chapter.html#Par238).
    The version string is `1.0.0` for the module version `1.0.0` and is updated to
    `2.0.0` for the module version `2.0.0`.


    ```

    package io.vividcode.demo.version;

    public class Version {

    public static String getVersion() {

    return "1.0.0";

    }

    }

    Listing 2-34.

    Version Class in the Module demo

    ```


    I have another `runtime` module that requires the module `demo`. Listing [2-35](#A459620_1_En_2_Chapter.html#Par240)
    shows the `Main` class that outputs the version string.


    ```

    package io.vividcode.demo.runtime;

    import io.vividcode.demo.version.Version;

    public class Main {

    public static void main(final String[] args) {

    System.out.println(Version.getVersion());

    }

    }

    Listing 2-35.

    Main Class in the Module runtime

    ```


    The module `runtime` and two versions of the module `demo` are packaged as JAR
    files. If you put these three JAR files in the same directory `dist` and run the
    module `runtime` using following command, you’ll find out that the command cannot
    run.


    ```

    $ java -p dist -m runtime

    ```


    The command fails with following error. This is because two versions of the same
    module `demo` appear in the same directory of the module path.


    ```

    Error occurred during initialization of boot layer

    java.lang.module.FindException: Two versions of module demo found in dist (demo-2.0.0.jar
    and demo-1.0.0.jar)

    ```


    If you put `demo-1.0.0.jar` and `demo-2.0.0.jar` into separate directories and
    update the module path as shown here, the output is `1.0.0` because the `demo-1.0.0.jar`
    is found first.


    ```

    $ java -p dist:dist/v1:dist/v2 -m runtime

    ```


    If you change the order of `dist/v1` and `dist/v2` in the module path as shown
    here, the output is `2.0.0`, because `demo-2.0.0.jar` is found first.


    ```

    $ java -p dist:dist/v2:dist/v1 -m runtime

    ```


    If you want to have both versions running in the same JVM, you can use OSGi or
    create custom class loaders. In Java 9, you can use `ModuleLayer`s. Listing [2-35](#A459620_1_En_2_Chapter.html#Par240)
    shows the updated version of the `Main` class using `ModuleLayer`s. In the method
    `createLayer()`, `path` is the path of the directory that contains the artifact
    of module `demo`. In this code, I create a `Configuration` that uses the `ModuleFinder`
    to only search in this path. The parent `Configuration` comes from the boot layer.
    I then use `defineModulesWithOneLoader()` to create the module layer from the
    `Configuration` and use the system class loader as the parent class loader for
    the only `ClassLoader` object. The created `ModuleLayer` uses the boot layer as
    the parent.


    Once I have created the module layer, the method `showVersion()` uses the method
    `findLoader()` to find the `ClassLoader` for the module and the use reflections
    API to load the class and invoke the method `getVersion()`; see Listing [2-36](#A459620_1_En_2_Chapter.html#Par251).
    If you run the class `Main`, you can see that both version strings are displayed.


    ```

    import java.lang.module.Configuration;

    import java.lang.module.ModuleFinder;

    import java.lang.reflect.Method;

    import java.nio.file.Path;

    import java.nio.file.Paths;

    import java.util.Set;

    public class Main {

    private static final String MODULE_NAME = "demo";

    private static final String CLASS_NAME = "io.vividcode.demo.version.Version";

    private static final String METHOD_NAME = "getVersion";

    public static void main(final String[] args) {

    final Main main = new Main();

    main.load(Paths.get("dist", "v1"));

    main.load(Paths.get("dist", "v2"));

    }

    public void load(final Path path) {

    showVersion(createLayer(path));

    }

    private void showVersion(final ModuleLayer moduleLayer) {

    try {

    final Class clazz = moduleLayer.findLoader(MODULE_NAME)

    .loadClass(CLASS_NAME);

    final Method method = clazz.getDeclaredMethod(METHOD_NAME);

    System.out.println(method.invoke(null));

    } catch (final Exception e) {

    e.printStackTrace();

    }

    }

    private ModuleLayer createLayer(final Path path) {

    final ModuleLayer parent = ModuleLayer.boot();

    final Configuration configuration = parent.configuration().resolve(

    ModuleFinder.of(path),

    ModuleFinder.of(),

    Set.of(MODULE_NAME)

    );

    return parent.defineModulesWithOneLoader(configuration,

    ClassLoader.getSystemClassLoader());

    }

    }

