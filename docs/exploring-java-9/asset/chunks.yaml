    If you want to use features provided by this agent, you should switch to other
    Java built-in tools or third-party solutions; see Table [15-2](#A459620_1_En_15_Chapter.html#Tab2).


    Table 15-2.


    Alternatives to the `hprof` Agent


    | Feature | Alternative Tool |

    | --- | --- |

    | Heap dumps | Diagnostic command `GC.heap_dump` or `jmap -dump` |

    | Allocation profiler | VisualVM |

    | CPU profiler | VisualVM or Flight Recorder |


    ### Removal of the jhat Tool


    Introduced in JDK 6, `jhat` was an experimental and unsupported tool for heap
    visualization and analysis. This tool has been removed in JDK 9.


    ### Removal of Demos and Samples


    Although you may not notice, the JDK actually comes with some demos and samples.
