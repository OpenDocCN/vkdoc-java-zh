    executor)` and `CompletableFuture<T> completeAsync(Supplier<? extends T> supplier)`
    methods c omplete the `CompletableFuture` by using an asynchronous task to invoke
    the `Supplier` to get the result. The task is executed using the provided executor
    or the default executor. Listing [10-1](#A459620_1_En_10_Chapter.html#Par4) shows
