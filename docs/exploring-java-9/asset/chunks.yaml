    \ listed in Table [2-15](#A459620_1_En_2_Chapter.html#Tab15).\n\nTable 2-15.\n\
    \nDirectories in JMOD Files\n\n| Directory Name | Files |\n| --- | --- |\n| `classes/`\
    \ | Java class files |\n| `conf/` | Configuration files |\n| `include/` | Header\
    \ files |\n| `legal/` | Legal files |\n| `bin/` | Executable binaries |\n| `lib/`\
    \ | Native libraries |\n\nOther modules, for example, `java.sql` and `java.xml`,\
    \ may only contain `classes` and `legal` directories.\n\nThe command `jmod describe`\
    \ prints out the module details, which are similar to `jar -d`.\n\n```\n$ jmod\
    \ describe /jmods/java.base.jmod\n```\n\nThe command `jmod extract` extracts all\
    \ the files to the target directory.\n\n```\n$ jmod extract /jmods/java.sql.jmod\
    \ --dir \n```\n\nThe command `jmod create` creates JMOD files. You can use different\
    \ options to provide the path for various kinds of files; see Table [2-16](#A459620_1_En_2_Chapter.html#Tab16).\n\
    \nTable 2-16.\n\nOptions of `jmod`\n\n| Option | Description |\n| --- | --- |\n\
