    ## Multiresolution Images


    If you have developed iOS apps, you should be familiar with multiresolution images.
    An image asset in iOS apps can have multiple images with different resolutions.
    These images have the same base name, but they contain suffixes like `@1x`, `@2x`
    or `@3x`. The system will choose the most suitable image to show based on the
    current display DPI metric. Java 9 adds the same functionality to the AWT image
    API.


    The new interface `java.awt.image.MultiResolutionImage` represents images that
    support multiple resolutions. `MultiResolutionImage` has two methods: the method
    `Image getResolutionVariant(double destImageWidth, double destImageHeight)` gets
    the specific image that should be rendered at the given size; the method `List<Image>
    getResolutionVariants()` gets a list of all resolution variants. The class `BaseMultiResolutionImage`
    is a simple implementation of `MultiResolutionImage. BaseMultiResolutionImage`
    is constructed from an array of images. Its implementation of the method `getResolutionVariant()`
    simply iterates through the array of images and returns the first image that is
    large enough to satisfy the rendering request.


    Most of the time, you don’t need to use `BaseMultiResolutionImage` directly. The
    images obtained from methods `Toolkit.getImage(String name)` and `Toolkit.getImage(URL
    url)` will implement the interface `MultiResolutionImage` if the platform supports
    naming conventions for resolution variants.


    Listing [14-3](#A459620_1_En_14_Chapter.html#Par38) shows an example of using
    multiresolution images. I have two images `flower.png` and `flower@2x.png` in
    the resources directory `/images`. The method `Toolkit.getImage(URL url)` is used
    to load images using the resource URL.


    ```

    public class MultiResolutionImageDemo {

    private static class ImageCanvas extends JComponent {

    private final String name;

    public ImageCanvas(final String name) {

    this.name = name;

    }

    @Override

    public void paint(final Graphics g) {

    final Image image = Toolkit.getDefaultToolkit()

    .getImage(

    MultiResolutionImageDemo.class

    .getResource(String.format("/images/%s", this.name)));

    g.drawImage(image, 10, 10, this);

    g.dispose();

    }

    }

    public static void main(final String[] args) {

    final JFrame frame = new JFrame();

    frame.setTitle("Multi-resolution images");

    frame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    frame.setLayout(new BorderLayout());

    final ImageCanvas canvas = new ImageCanvas("flower.png");

    frame.add("Center", canvas);

    frame.setSize(360, 300);

    frame.setVisible(true);

    }

    }

    Listing 14-3.

    Multiresolution Images

    ```


