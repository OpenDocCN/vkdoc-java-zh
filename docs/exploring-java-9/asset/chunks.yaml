  trans: "\n### JMOD 文件\n\nJMOD 文件是在 Java 9 中引入的，用于打包 JDK 模块。与 JAR 文件相比，JMOD 文件可以包含原生代码、配置文件和其他类型的数据。图\
    \ 2-3 展示了 JDK 的 `jmods` 目录中的 JMOD 文件。\n\n![A459620_1_En_2_Fig3_HTML.jpg](img/A459620_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3.\n\nJDK JMOD 文件\n\n开发者也可以使用新的 `jmod` 工具，通过 JMOD 文件来打包模块文件。\n\n你可以使用以下\
    \ `jmod list` 命令来列出 `java.base` 模块的 JMOD 文件中所有条目的名称。\n\n```\n$ jmod list /jmods/java.base.jmod\n\
    ```\n\n此 JMOD 文件包含表 2-15 中列出的目录。\n\n表 2-15.\n\nJMOD 文件中的目录\n\n| 目录名称 | 文件 |\n\
    | --- | --- |\n| `classes/` | Java 类文件 |\n| `conf/` | 配置文件 |\n| `include/` | 头文件\
    \ |\n| `legal/` | 法律文件 |\n| `bin/` | 可执行二进制文件 |\n| `lib/` | 原生库 |\n\n其他模块，例如 `java.sql`\
    \ 和 `java.xml`，可能只包含 `classes` 和 `legal` 目录。\n\n命令 `jmod describe` 会打印出模块的详细信息，这与\
    \ `jar -d` 类似。\n\n```\n$ jmod describe /jmods/java.base.jmod\n```\n\n命令 `jmod\
    \ extract` 会将所有文件提取到目标目录。\n\n```\n$ jmod extract /jmods/java.sql.jmod --dir \n\
    ```\n\n命令 `jmod create` 用于创建 JMOD 文件。你可以使用不同的选项来提供各类文件的路径；参见表 2-16。\n\n表 2-16.\n\
    \n`jmod` 的选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `--class-path` | 包含 Java 类文件的 JAR\
    \ 文件或目录 |\n| `--cmds` | 原生命令的路径 |\n| `--config` | 配置文件的路径 |\n| `--header-files`\
    \ | 头文件的路径 |\n| `--legal-notices` | 法律文件的路径 |\n| `--libs` | 原生库的路径 |\n| `--man-pages`\
    \ | 手册页的路径 |\n\n`jmod create` 还支持 `--main-class` 和 `--module-version` 选项。`--os-arch`\
    \ 和 `--os-name` 选项可用于指定操作系统架构和名称。清单 2-48 展示了如何使用 `jmod` 创建一个 JMOD 文件。\n\n```\n\
    $ jmod create --class-path target/classes \\\n--main-class io.vividcode.store.runtime.Main\
    \ \\\n--module-version 1.0.0 \\\n--os-arch x86_64 \\\n--os-name \"Mac OS X\" \\\
    \ntarget/runtime-1.0.0.jmod\n清单 2-48.\n使用 jmod 创建模块工件\n```\n\n### JDK 模块\n\n在\
    \ Java 9 中，JDK 本身被组织成多个模块。目前 JDK 中有 94 个模块。这些模块有四种不同的前缀来表示它们的分组；参见表 2-17。\n\n\
    表 2-17.\n\nJDK 模块的分组\n\n| 分组 | 描述 |\n| --- | --- |\n| `java.` | 标准 Java 模块，例如\
    \ `java.base`、`java.logging`、`java.sql` 和 `java.xml` |\n| `javafx.` | JavaFX 模块，例如\
    \ `javafx.base`、`javafx.deploy` 和 `javafx.media` |\n| `jdk.` | JDK 实现的一部分，例如 `jdk.compiler`、`jdk.charsets`、`jdk.accessibility`\
    \ 和 `jdk.management` |\n| `oracle.` | Oracle 模块，例如 `oracle.desktop` 和 `oracle.net`\
    \ |\n\n## 常见问题\n\n随着模块系统的引入，可能会出现一些常见问题。你已经看到了一个潜在问题——平台类加载器和应用程序类加载器不再是 `URLClassLoader`\
    \ 的实例。还有其他一些你可能需要注意的潜在问题。\n\n修饰符 `public` 不再保证程序元素在任何地方都可访问。可访问性现在取决于与模块系统相关的各种条件，包括包是否被导出或开放，以及其模块是否可以被包含尝试访问它的代码的模块读取。\n\
    \n如果一个包同时定义在命名模块和类路径中，那么类路径上的包将被忽略。例如，包 `javax.transaction` 定义在模块 `java.transaction`\
    \ 中。如果模块 `java.transaction` 在模块路径中，并且包含相同包 `javax.transaction` 的 JAR 文件 `javax.transaction-api-1.2.jar`\
    \ 也在类路径上，那么该 JAR 文件中的类将被忽略。这就是为什么你在运行 Spring JPA 应用程序时可能会遇到错误 `java.lang.ClassNotFoundException:\
    \ javax.transaction.SystemException`。解决方案是从模块路径中移除模块 `java.transaction`，或者将 JAR\
    \ 文件放入升级模块路径以覆盖内置模块。\n\n定义 Java EE API 或主要与 Java EE 应用程序相关的 API 的模块已被弃用，并将在未来版本中移除。默认情况下，类路径上的代码不会解析这些模块。未命名模块的默认根模块集基于\
    \ `java.se` 模块。`java.se` 模块仅需要清单 2-49 中列出的模块。\n\n```\njava.compiler\njava.datatransfer\n\
    java.desktop\njava.instrument\njava.logging\njava.management\njava.management.rmi\n\
    java.naming\njava.prefs\njava.rmi\njava.scripting\njava.security.jgss\njava.security.sasl\n\
    java.sql\njava.sql.rowset\njava.xml\njava.xml.crypto\n清单 2-49.\njava.se 模块所需的模块\n\
    ```\n\n清单 2-50 中列出的模块是 `java.se.ee` 模块所需的，因此默认情况下，未命名模块中的代码无法访问这些模块中定义的 API。\n\
    \n```\njava.activation\njava.corba\njava.transaction\njava.xml.bind\njava.xml.ws\n\
    java.xml.ws.annotation\n清单 2-50.\njava.se.ee 模块所需的模块\n```\n\n如果项目使用了清单 2-50 中模块的类，代码将无法编译。你需要更新\
    \ Java 编译器选项，添加 `--add-modules java.se.ee` 以包含 `java.se.ee` 模块。\n\n默认情况下，JDK 的大部分内部\
    \ API 在编译时是不可访问的。其中一些内部 API，特别是 `sun.misc` 包，已被一些流行的库使用。在 JDK 9 中，非关键的内部 API（例如\
    \ `sun.misc.BASE64Decoder`）被封装起来，默认不可访问。关键的内部 API（例如 `sun.misc.Unsafe` 和 `sun.reflect.Reflection`）则未被封装。这些\
    \ API 定义在 JDK 特定模块 `jdk.unsupported` 中。如果你的项目需要使用这些包，你可以让你的模块 `requires jdk.unsupported`。对于那些被封装的内部\
    \ API，可以在必要时使用 `--add-exports` 和 `--add-opens` 使其可访问。\n\n选项 `-Xbootclasspath`\
    \ 和 `-Xbootclasspath/p` 已被移除。JDK 特定的系统属性 `sun.boot.class.path` 也已被移除。这是因为引导类路径默认为空，因为引导类是从模块加载的。如果代码依赖于引导类路径，它可能无法在\
    \ JDK 9 上运行。例如，Elasticsearch 1.7.1 中的类 `org.elasticsearch.monitor.jvm.JvmInfo`\
    \ 尝试通过方法 `getBootClassPath()` 从 JMX Bean `java.lang.management.RuntimeMXBean`\
    \ 获取引导类路径。在 Java 9 中，此方法直接抛出 `UnsupportedOperationException`。这导致 Elasticsearch\
    \ 1.7.1 在 JDK 9 上运行时启动失败。正确的实现应该在调用 `getBootClassPath()` 之前先检查方法 `boolean isBootClassPathSupported()`。\n\
    \n## 迁移实践\n\n现在你已经了解了 Java 9 模块系统中的所有重要概念，你就有了一条清晰的路径来迁移现有应用程序以使用模块。\n"
- fmt: '### Building the Project Using Java 9


    Before migrating the code to Java 9, you should build and run the project on Java
    9 first. This requires configuration changes to your existing build tools. For
    Maven, you need to upgrade the Maven compiler plugin to the latest version and
    set the source and target configuration to `9`. For Gradle, you need to update
    the properties `sourceCompatibility` and `targetCompatibility` of the Java plugin
    to `9`. You should also upgrade Maven or Gradle plugins to the latest version
    for better support of Java 9.


    After updating the configuration, try to run the build. It’s possible you’ll encounter
    issues with build tools, especially since Java 9 has just been released and it
    takes time for the build tools to provide the support for it. At the time of writing,
    Gradle 4.2 doesn’t have first-class support for Java 9 modules yet. You may need
    to find workarounds for various issues. Or you can wait until the support of build
    tools is mature before you start the migration. As I mentioned before, Java 9
    has no issues running applications written before it.


    When building the project using Java 9, you may encounter some errors. Most of
    these errors are apt to be related to class access and reflections. This is because
    modules have stricter access control. The default value of the option `--illegal-access`
    is `permit`, so Java 9 already allows code on the class path to perform illegal
    access. With this default mode, most of reflection-related issues can be resolved.
    JVM outputs warning messages about illegal access, but the application can be
    started.


    ### The Migration Path


    After you can successfully build the project using JDK 9, you can start the migration
    process. The following are the basic steps for migrating an existing application
    to modules.


    1. Add existing third-party libraries into the module path. If you are using build
    tools like Maven or Gradle, you may not need to do anything. These tools should
    already handle this for you. If you’re using JDK tools, you can specify the module
    path using `--module-path` or `-p`, and then point to the directory of libraries.
    Putting libraries into the module path is the first step to moving from class
    path to module paths. These libraries become automatic modules and you don’t need
    to migrate them.

    2. List the dependency tree. You can do this using the task `dependency:tree`
    of the Maven dependency plugin or the Gradle command `gradle dependencies`. The
    dependency tree is used to understand dependencies between a project’s modules
    or subprojects. This step is not necessary if you already know about the dependencies.
    As I mentioned before, you should do a bottom-up migration, so you need the project’s
    module dependencies tree to figure out the migration order.

    3. Start from the subprojects in the bottom of the dependency tree and add module
    declaration files for each subproject. Third-party libraries are also declared
    in the `module-info.java` files as automatic modules. As a start, simply export
    all packages for each module. If your code already uses conventions to distinguish
    between public and internal packages, you should leverage it in the module declaration.
    For example, you can export packages with names that end with `api` but not packages
    that end with `impl` or `internal`. If service providers are used in the application,
    add them in the module declaration.

    4. Try to compile the code and fix compilation errors. The IDE can help you to
    auto-fix most of the issues.

    5. Run all unit tests and integration tests to make sure all are passed.

    6. Improve the module declarations to remove unnecessary exports and fix issues
    found during tests.


    These steps can be simplified with the help of the `jdeps` tool. The `jdeps` tool
    can generate module declaration files.


    ### BioJava


    To demonstrate the migration of Maven projects, I’ll use a real-world example.
    Let’s take a look at the BioJava ( [http://biojava.org/](http://biojava.org/)
    ) project. BioJava is an open-source project ( [https://github.com/biojava/biojava](https://github.com/biojava/biojava)
    ) dedicated to providing a Java framework for processing biological data. It’s
    a Maven project with 13 modules, so it’s a good candidate for demonstrating the
    migration process.


    The first step is to build the project using Java 9. Before building the project,
    you need to make sure Maven is using Java 9. You can use `mvn -v` to verify the
    JVM that Maven is using. If Java 9 is the default JVM on your local machine, then
    you are good to go. If you have multiple JDKs installed, you need to make sure
    the system property `JAVA_HOME` points to JDK 9. Now you can use `mvn` to build
    the project. For Intellij IDEA users, you can configure the JRE to run Maven in
    Preferences ➤ Build, Execution, Deployment ➤ Build Tools ➤ Maven ➤ Runner.


