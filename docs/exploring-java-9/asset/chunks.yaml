    ### `Configuration`


    可读性图表示为 `java.lang.module.Configuration` 类的对象。一个配置可以有父配置。配置可以组织成层次结构。`Configuration`
    具有创建和查询可读性图的方法。


    `Configuration` 是使用 `resolve()` 和 `resolveAndBind()` 方法创建的。这两个方法都返回一个新的 `Configuration`
    对象，表示模块解析的结果。`Configuration` 也有这两个方法的静态版本。对于静态方法，你需要提供 `List<Configuration>` 类型的参数，作为所创建
    `Configuration` 的父配置。对于实例方法，当前 `Configuration` 是所创建 `Configuration` 的唯一父配置。以下是创建
    `Configuration` 所需的方法：


    *   `Configuration resolve(ModuleFinder before, ModuleFinder after, Collection<String>
    roots)`

    *   `Configuration resolveAndBind(ModuleFinder before, ModuleFinder after, Collection<String>
    roots)`

    *   `static Configuration resolve(ModuleFinder before, List<Configuration> parents,
    ModuleFinder after, Collection<String> roots)`

    *   `static Configuration resolveAndBind(ModuleFinder before, List<Configuration>
    parents, ModuleFinder after, Collection<String> roots)`


    `resolveAndBind()` 方法接受与 `resolve()` 方法相同的参数。区别在于，`resolveAndBind()` 解析的模块还包括由服务依赖引入的模块。


    以下是上述方法的可能参数：


    *   `roots`：根模块名称列表。

    *   `parents`：父配置列表。

    *   `before` 和 `after`：用于定位模块的两个 `ModuleFinder`。`ModuleFinder before` 用于定位根模块。如果找不到模块，则使用父配置通过
    `findModule()` 方法定位。如果仍然找不到模块，则使用 `ModuleFinder after` 定位。传递依赖项按照相同的搜索顺序定位。


    当根模块或传递依赖项在父配置中被定位时，该模块的解析过程结束，并且该模块不会包含在结果配置中。


    清单 2-31 展示了通过在给定路径中查找模块来创建新 `Configuration` 的示例。


    ```

    public Configuration resolve(final Path path) {

    return Configuration.resolve(

    ModuleFinder.of(path),

    List.of(Configuration.empty()),

    ModuleFinder.ofSystem(),

    List.of("io.vividcode.store.runtime")

    );

    }

