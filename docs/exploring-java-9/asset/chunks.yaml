    `ClassLoader` already has the method `Enumeration<URL> getResources(String name)`
    to find all resources with the given name. The new method `Stream<URL> resources(String
    name)` has the same functionality, but it returns a `Stream<URL>`.


    Java 9 adds a new restriction when accessing the resources that matches the access
    control rules enforced by module declaration. Resources in the named modules are
    subject to the encapsulation rules specified in the method `Module.getResourceAsStream()`.
    For nonclass resources, the related methods in `ClassLoader` can only find resources
    in packages when the package is open unconditionally.


    For example, the module `io.vividcode.store.common` has a properties file `application.properties`
    in the directory `config`. The package name of this resource is `config`. If the
    package `config` is not declared as `open` in the module declaration, it cannot
    be located using those resource-related methods.


    In Listing [2-40](#A459620_1_En_2_Chapter.html#Par275), I get the `Module` object
    of the module `io.vividcode.store.common` first, then I get its class loader and
    use the method `resources()` to list all resources with name `config/application.properties`.
    Here the package `config` must be open, otherwise the method `resources()` returns
    an empty stream.


