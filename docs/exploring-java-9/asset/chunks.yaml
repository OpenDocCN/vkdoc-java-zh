    between two arrays. `mismatch()` returns `-1` if there is no mismatch. There are
    different overloads for `boolean`, `byte`, `char`, `double`, `float`, `int`, `long`,
    `short`, and `Object` arrays. You can also specify the start and end index in
    both arrays for checking the mismatch. For object arrays, you can also specify
    a `java.util.Comparator` object for the comparison. In Listing [4-5](#A459620_1_En_4_Chapter.html#Par17),
