    Now I am going to show you the difference between `submit()` and `offer()`. In
    Listing [7-4](#A459620_1_En_7_Chapter.html#Par27), I use three different methods
    to publish items. The `DelayedSubscriber` class delays `100ms` before it processes
    each item. The publisher uses a buffer with a maximum size of `16`. A total number
    of `50` sequence numbers are published with an interval of `50ms`. I use `waitForCompletion()`
    to wait for publishing to complete, then wait another 5 seconds to allow buffered
    items to be processed. When I publish items using `submit()`, all items can be
    processed. When I publish items using `offer()` without a timeout, some of the
    items are dropped. This is because the buffer size is only `16` and it takes `100ms`
    to process a single item. During that time, two items are generated. The buffer
    fills up before all items can be processed, and some of these items are dropped.
    The drop handler of `offer()` returns `true`, so the publisher tries to publish
    again. When you run the code, due to its concurrent nature, the dropped items
    may be different. When I publish items using `offer()` with a timeout of one second,
    because the timeout is much longer than the processing time, all items can be
    processed.'
