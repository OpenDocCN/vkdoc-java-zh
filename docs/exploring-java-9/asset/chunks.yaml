- fmt: '### Atomic Update


    This category includes methods from four subcategories with memory ordering effects
    specified by the suffix. All the methods perform both read and write access to
    a variable, which may have different memory ordering effects for read and write
    access.


    The method `compareAndSet()` atomically sets the value of a variable if the variable’s
    current value equals the expected value with the volatile memory ordering for
    both read and write access. The returned `boolean` value indicates if the operation
    successfully updates the value.


    The `weakCompareAndSet()`, `weakCompareAndSetPlain()`, `weakCompareAndSetAcquire()`,
    and `weakCompareAndSetRelease()` methods could atomically set the value of a variable
    if the variable’s current value equals the expected value. The returned Boolean
    value indicates if the operation successfully updated the value. This operation
    may fail even if the variable’s current value does match the expected value. This
    is why they are called weak operations.


    The `compareAndExchange()`, `compareAndExchangeAcquire()`, and `compareAndExchangeRelease()`
    methods atomically set the value of a variable if the variable’s current value
    is equal to the expected value. The return value is the current value, which will
    be the same as the expected value if the operation is successful.


    The `getAndSet()`, `getAndSetAcquire()`, and `getAndSetRelease()` methods atomically
    set the value of a variable to the new value and return the variable’s previous
    value.


    Table [8-2](#A459620_1_En_8_Chapter.html#Tab2) shows each method’s memory ordering
    for read and write access.


    **Table 8-2.** Memory Ordering for Read and Write Access of Atomic Update Methods


    | Method | Read | Write |

    | --- | --- | --- |

    | `compareAndSet()` | volatile | volatile |

    | `weakCompareAndSet()` | volatile | volatile |

    | `weakCompareAndSetPlain()` | plain | plain |

    | `weakCompareAndSetAcquire()` | acquire | plain |

    | `weakCompareAndSetRelease()` | plain | release |

    | `compareAndExchange()` | volatile | volatile |

    | `compareAndExchangeAcquire()` | acquire | plain |

    | `compareAndExchangeRelease()` | plain | release |

    | `getAndSet()` | volatile | volatile |

    | `getAndSetAcquire()` | acquire | plain |

    | `getAndSetRelease()` | plain | release |


    Listing [8-7](#A459620_1_En_8_Chapter.html#Par34) shows how to use the different
    atomic update methods.


    ```

    @Test

    public void testAtomicUpdate() throws Exception {

    final int expectedValue = 1;

    final int newValue = 2;

    assertEquals(true,

    this.varHandle.compareAndSet(this.handleTarget, expectedValue, newValue));

    assertEquals(newValue,

    this.varHandle.compareAndExchange(this.handleTarget, newValue, newValue + 1));

    assertEquals(newValue + 1, this.varHandle.getAndSet(this.handleTarget, newValue
    + 2));

    }

    ```


    ### Numeric Atomic Update


    The `getAndAdd()`, `getAndAddAcquire()`, and `getAndAddRelease()` methods atomically
    add the value to the current value of a variable and return the variable’s previous
    value. Table [8-3](#A459620_1_En_8_Chapter.html#Tab3) shows the memory ordering
    for read and write access of these methods.


    **Table 8-3.** Memory Ordering for Read and Write Access of Numeric Atomic Update
    Methods


    | Method | Read | Write |

    | --- | --- | --- |

    | `getAndAdd()` | volatile | volatile |

    | `getAndAddAcquire()` | acquire | plain |

    | `getAndAddRelease()` | plain | release |


    Listing [8-8](#A459620_1_En_8_Chapter.html#Par37) shows how to use different numeric
    atomic update methods.


    ```

    @Test

    public void testNumericAtomicUpdate() throws Exception {

    final int expectedValue = 1;

    assertEquals(expectedValue,

    this.varHandle.getAndAdd(this.handleTarget, 1));

    assertEquals(expectedValue + 1,

    this.varHandle.getAndAddAcquire(this.handleTarget, 1));

    assertEquals(expectedValue + 2,

    this.varHandle.getAndAddRelease(this.handleTarget, 1));

    }

    ```


    ### Bitwise Atomic Update


    The `getAndBitwiseAnd()`, `getAndBitwiseAndAcquire()`, `getAndBitwiseAndRelease()`,
    `getAndBitwiseOr()`, `getAndBitwiseOrAcquire()`, `getAndBitwiseOrRelease()`, `getAndBitwiseXor()`,
    `getAndBitwiseXorAcquire()`, and `getAndBitwiseXorRelease()` methods atomically
    set the value of a variable to the result of a bitwise `AND`/`OR`/`XOR` between
    the variable’s current value and the mask value and return the variable’s previous
    value. Table [8-4](#A459620_1_En_8_Chapter.html#Tab4) shows the memory ordering
    for read and write access of these methods.


    **Table 8-4.** Memory Ordering for Read and Write Access of Bitwise Atomic Update
    Methods


    | Method | Read | Write |

    | --- | --- | --- |

    | `getAndBitwiseAnd()` | volatile | volatile |

    | `getAndBitwiseOr()` | volatile | volatile |

    | `getAndBitwiseXor()` | volatile | volatile |

    | `getAndBitwiseAndAcquire()` | acquire | plain |

    | `getAndBitwiseOrAcquire()` | acquire | plain |

    | `getAndBitwiseXorAcquire()` | acquire | plain |

    | `getAndBitwiseAndRelease()` | plain | release |

    | `getAndBitwiseOrRelease()` | plain | release |

    | `getAndBitwiseXorRelease()` | plain | release |


    Listing [8-9](#A459620_1_En_8_Chapter.html#Par40) shows how to use different bitwise
    numeric atomic update methods.


    ```

    @Test

    public void testBitwiseAtomicUpdate() throws Exception {

    final int mask = 1;

    assertEquals(1, this.varHandle.getAndBitwiseAnd(this.handleTarget, mask));

    assertEquals(1, this.varHandle.get(this.handleTarget));

    assertEquals(1, this.varHandle.getAndBitwiseOr(this.handleTarget, mask));

    assertEquals(1, this.varHandle.get(this.handleTarget));

    assertEquals(1, this.varHandle.getAndBitwiseXor(this.handleTarget, mask));

    assertEquals(0, this.varHandle.get(this.handleTarget));

    }

    ```


    ### Arrays


    `VarHandle`s can also be used to access individual elements in an array. You can
    create a `VarHandle` that accesses array elements using the method `MethodHandles.arrayElementVarHandle(Class<?>
    arrayClass)`.


    In Listing [8-10](#A459620_1_En_8_Chapter.html#Par43), I create a `VarHandle`
    that accesses `String[]` arrays. The method `compareAndSet()` updates the first
    element in the array to the new value. You need to provide the array, index, expected
    value, and new value when invoking this method.


    ```

    @Test

    public void testArray() throws Exception {

    final VarHandle arrayElementHandle = MethodHandles

    .arrayElementVarHandle(String[].class);

    assertEquals(true,

    arrayElementHandle.compareAndSet(

    this.handleTarget.names, 0, "Alex", "Alex_new"));

    assertEquals("Alex_new", this.handleTarget.names[0]);

    }

    ```'
