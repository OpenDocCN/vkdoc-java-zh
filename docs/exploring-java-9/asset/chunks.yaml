    ## 示例应用


    让我用一个示例应用来演示模块系统的用法。这是一个功能非常有限的简单电子商务应用。主要目标是演示模块系统的工作原理，因此这些模块的实际实现并不重要。该示例应用是一个
    Maven 项目，其模块如表 2-1 所示。此应用的命名空间是 `io.vividcode.store`，因此表 2-1 中 `common` 模块的实际名称是
    `io.vividcode.store.common`。


    表 2-1.


    示例应用的模块


    | 名称 | 描述 |

    | --- | --- |

    | `common` | 通用 API |

    | `common.persistence` | 通用持久化 API |

    | `filestore` | 基于文件的持久化实现 |

    | `product` | 产品 API |

    | `product.persistenc`e | 产品持久化实现 |

    | `runtime` | 应用引导程序 |


    ## 模块声明


    模块声明文件 `module-info.java` 是理解模块系统工作原理的第一步。


    ### `requires` 和 `exports`


    在 Java 9 引入模块之后，你应该将 Java 应用组织为模块。一个模块可以使用关键字 `requires` 声明对其他模块的依赖。依赖一个模块并不意味着你可以自动访问其公共和受保护类型。一个模块可以声明哪些包对其他模块是可访问的。只有模块的导出包对其他模块是可访问的，并且默认情况下，没有包会被导出。清单
    2-1 中的模块声明没有导出任何内容。关键字 `exports` 用于导出包。导出包中的公共和受保护类型及其公共和受保护成员可以被其他模块访问。


    清单 2-2 展示了模块 `io.vividcode.store.common.persistence` 的文件 `module-info.java`。它使用两个
    `requires` 声明来声明其对模块 `slf4j.api` 和 `io.vividcode.store.common` 的依赖。模块 `slf4j.api`
    来自第三方库 SLF4J ( [`https://www.slf4j.org/`](https://www.slf4j.org/) )，而 `io.vividcode.store.common`
    是示例应用中的另一个模块。模块 `io.vividcode.store.common.persistence` 将其包 `io.vividcode.store.common.persistence`
    导出给其他模块。


    ```

    module io.vividcode.store.common.persistence {

    requires slf4j.api;

    requires io.vividcode.store.common;

    exports io.vividcode.store.common.persistence;

    }

    清单 2-2.

    io.vividcode.store.common.persistence 的模块声明

    ```


    请注意，当你导出一个包时，你只导出了该包中的类型，而不是其子包中的类型。例如，声明 `exports com.mycompany.mymodule` 只导出像
    `com.mycompany.mymodule.A` 或 `com.mycompany.mymodule.B` 这样的类型，但不导出像 `com.mycompany.mymodule.impl.C`
    或 `com.mycompany.mymodule.test.demo.D` 这样的类型。要导出这些子包，你需要在模块声明中使用 `exports` 显式声明它们。


    如果一个类型在模块边界之外不可访问，那么这个类型在模块中会被视为私有方法或字段。任何使用该类型的尝试都会在编译时导致错误，在运行时由 JVM 抛出 `java.lang.IllegalAccessError`，或者当你使用反射访问该类型时，由
    Java 反射 API 抛出 `java.lang.IllegalAccessException`。


    注意


    所有模块，除了 `java.base` 模块本身，都隐式且强制依赖于 `java.base`。你不需要显式声明此依赖。


    ### 传递依赖


    当模块 A 依赖模块 B 时，模块 A 可以读取模块 B 中导出的公共和受保护类型。这里我们说模块 A 读取模块 B。如果模块 B 也读取模块 C，那么模块
    B 可以拥有返回模块 C 中导出类型的方法。


    清单 2-3 展示了模块 C 的文件 `module-info.java`。模块 C 导出了包 `ctest`。


    ```

    module C {

    exports ctest;

    }

    清单 2-3.

    C 的模块声明

    ```


    清单 2-4 展示了模块 C 中的类 `ctest.MyC`。它只有一个方法 `sayHi()`，用于向控制台打印一条消息。


    ```

    package ctest;

    public class MyC {

    public void sayHi() {

    System.out.println("来自模块 C 的问候！");

    }

    }

    清单 2-4.

    模块 C 中的类 ctest.MyC

    ```


    清单 2-5 展示了模块 B 的文件 `module-info.java`。模块 B 依赖模块 C 并导出包 `btest`。


    ```

    module B {

    requires C;

    exports btest;

    }

    清单 2-5.

    B 的模块声明

    ```


    清单 2-6 中类 `btest.MyB` 的方法 `getC()` 返回类 `ctest.MyC` 的一个新实例。


    ```

    package btest;

    import ctest.MyC;

    public class MyB {

    public MyC getC() {

    return new MyC();

    }

    }

    清单 2-6.

    模块 B 中的类 btest.MyB

    ```


    模块 A 在其文件 `module-info.java` 中仅依赖模块 B；参见清单 2-7。


    ```

    module A {

    requires B;

    }

    清单 2-7.

    B 的模块声明

    ```


    模块 A 中的类 `atest.MyA` 尝试使用类 `MyC`；参见清单 2-8。


    ```

    package atest;

    import btest.MyB;

    public class MyA {

    public static void main(String[] args) {

    new MyB().getC().sayHi();

    }

    }

    清单 2-8.

    模块 A 中的类 atest.MyA

    ```


    尽管清单 2-8 中的代码看起来相当合理，但由于模块 A 未读取模块 C 的错误，它无法编译；参见清单 2-9 中的错误消息。默认情况下，模块的可读性关系不是传递的。模块
    B 读取模块 C，模块 A 读取模块 B，但模块 A 不读取模块 C。


    ```

    //A/atest/MyA.java:7: 错误：ctest 包中的 MyC.sayHi() 不可访问

    new MyB().getC().sayHi();

    ^

    (包 ctest 在模块 C 中声明，但模块 A 未读取它)

    1 个错误

    清单 2-9.

    模块 A 的编译错误

    ```


    为了使清单 2-8 中的代码能够编译，你需要在清单 2-7 中模块 A 的 `module-info.java` 文件中添加 `requires C`。当许多模块相互依赖时，这可能是一项繁琐的任务。由于这是一种常见的使用场景，Java
    9 为此提供了内置支持。`requires` 声明可以扩展，添加修饰符 `transitive` 来将依赖声明为传递的。一个模块所依赖的传递模块可以被任何依赖该模块的模块读取。这被称为隐式可读性。


    在清单 2-10 中将模块 B 的声明改为使用修饰符 `transitive` 后，模块 A 可以成功编译。模块 B 所依赖的传递模块 C 可以被依赖模块
    B 的模块 A 读取。模块 A 现在可以读取模块 C。


    ```

    module B {

    requires transitive C;

    exports btest;

    }

    清单 2-10.

    更新 B 的模块声明以使用 transitive

    ```


    一般来说，如果一个模块导出的包中包含一个类型，其签名引用了第二个模块中的另一个包，那么第一个模块应该使用 `requires transitive` 来声明对第二个模块的依赖。就像在模块
    B 中，类 `MyB` 的方法 `getC()` 引用了来自模块 C 的类 `MyC`，因此模块 B 应该使用 `requires transitive C`
    而不是 `requires C`。

