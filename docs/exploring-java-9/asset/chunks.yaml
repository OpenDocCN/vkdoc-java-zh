- fmt: "# Sample Application\n\nLet me use a sample application to demonstrate the\
    \ usage of the module system. This is a simple e-commerce application with very\
    \ limited features. The main objective is to demonstrate how the module system\
    \ works, so the actual implementations of these modules don’t really matter. The\
    \ sample application is a Maven project with modules shown in Table [2-1](#A459620_1_En_2_Chapter.html#Tab1).\
