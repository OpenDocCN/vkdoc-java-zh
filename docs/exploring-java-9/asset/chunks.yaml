- fmt: '# 1. Introduction


    Java SE 9 was released on September 21, 2017. It’s the first major release of
    the Java platform since Java SE 8 was released on March 18, 2014. The Java community
    has been waiting for this release for quite a long time. The release of Java 9
    was delayed several times. In this release, the Java Platform Module System (JPMS),
    or Project Jigsaw, introduces a module system to the Java platform. Now we can
    create modular Java applications using Java 9. The contents of Java SE 9 can be
    found in JSR 379: Java^(TM) SE 9 Release Contents ( [`https://www.jcp.org/en/jsr/detail?id=379`](https://www.jcp.org/en/jsr/detail?id=379)
    ). When I’m talking about Java 9 in this book, I’m referring to Java SE 9 and
    JDK 9.


    ## Installation


    You can download the JDK 9 General Availability (GA) release builds from Oracle
    ( [`http://www.oracle.com/technetwork/java/javase/downloads/jdk9-downloads-3848520.html`](http://www.oracle.com/technetwork/java/javase/downloads/jdk9-downloads-3848520.html)
    ). You can choose the build for your platform and install it on your local machine.


    After the installation, you can run `java -version` to check the version. Listing
    [1-1](#A459620_1_En_1_Chapter.html#Par4) shows the version information of JDK
    9 on macOS.


    ```

    java version "9.0.1"

    Java(TM) SE Runtime Environment (build 9.0.1+11)

    Java HotSpot(TM) 64-Bit Server VM (build 9.0.1+11, mixed mode)

    Listing 1-1.

    JDK 9 Version on macOS

    ```


    Note


    Java 9 uses a new schema for version strings. The version strings before Java
    9 start with `1`, for example, `1.8.0_60` for Java 8. In Java 9, the leading `1`
    of the original version strings has been removed. The version strings for Java
    9 start with `9`. Java 9 also provides the class `Runtime.Version` to represent
    and parse the version strings.


    Installing Java 9 GA builds makes them the default JVM on your local machine,
    which may break some Java applications that are not yet compatible with Java 9.
    You can use a tool like jEnv ( [`http://www.jenv.be/`](http://www.jenv.be/) )
    to manage multiple JDK installations or update the environment variable `JAVA_HOME`
    manually to point to your old JDK installations. Some of these applications may
    have options for configuring the JRE for use. For these applications, you can
    use the options to point to the old JDK installations.


    ## IDE


    IDEs are very useful for Java developers. I''ll discuss Java 9 support of two
    popular IDEs: Intellij IDEA and Eclipse.


    ### Intellij IDEA


    Intellij IDEA ( [`https://www.jetbrains.com/idea/`](https://www.jetbrains.com/idea/)
    ) 2017.1 already supports Java 9. You can simply install Java 9 GA builds and
    add JDK 9 as the project SDK. Don’t forget to change the language level to 9;
    see Figure [1-1](#A459620_1_En_1_Chapter.html#Fig1).


    ![A459620_1_En_1_Fig1_HTML.jpg](A459620_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    Intellij IDEA Java 9 setup


    All the code in this book is written and tested using IDEA 2017.2.


    ### Eclipse


    At the time of writing, when compared to using Intellij IDEA, using Eclipse for
    Java 9 development requires more manual setup steps. To run Java 9 you need at
    least Eclipse Oxygen (4.7) with Eclipse Marketplace Client installed. When you’re
    ready to get started, you first need to modify the file `eclipse.ini` to specify
    the JVM and add extra arguments. If Java 9 is not the default JVM, you need to
    use the option `-vm` to specify the JDK 9 installation path, for example, `-vm
    /Library/Java/JavaVirtualMachines/jdk-9.0.1.jdk/Contents/Home/bin/javaw`. You
    also need to add the JVM argument `--add-modules=ALL-SYSTEM`, which should be
    placed after `-vmargs`. After you’ve done this, you can start Eclipse using JDK
    9. Finally, you need to open Eclipse Marketplace in the Help menu, search for
    “Java 9,” and then install the Java 9 Support (BETA) for Oxygen 4.7; see Figure
    [1-2](#A459620_1_En_1_Chapter.html#Fig2). After you restarting Eclipse, you can
    add a new Java project with Java SE 9 as the execution environment and the compiler
    compliance level set to `9`.


    ![A459620_1_En_1_Fig2_HTML.jpg](A459620_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Install Eclipse support for Java 9


    Eclipse continues to improve its support for Java 9. You should always refer to
    the latest official guide for its Java 9 support.


    ## Build Tools


    Typically, you need to use some kinds of build tools when you’re developing nontrivial
    Java applications. The popular choices are Gradle ( [`https://gradle.org/`](https://gradle.org/)
    ) and Apache Maven ( [`https://maven.apache.org/`](https://maven.apache.org/)
    ).


    ### Gradle


    The support of Gradle for Java 9 is tracked in this GitHub issue ( [`https://github.com/gradle/gradle/issues/719`](https://github.com/gradle/gradle/issues/719)
    ). According to the latest status ( [`https://github.com/gradle/gradle/issues/719#issuecomment-312225355`](https://github.com/gradle/gradle/issues/719#issuecomment-312225355)
    ), you should use at least Gradle version `4.1-milestone-1` to run with Java 9.


    > For the most part, version 4.1-milestone-1 requires no special environment settings
    to get Gradle running on a simple Java project. However, there are still many,
    commonly-used plugins for which at least --permit-illegal-access will be required
    to run.


    The option `--permit-illegal-access` has been renamed to `--illegal-access` and
    already has the default value `permit`, so it’s no longer required to add this
    option. At the time of writing, Gradle 4.2 doesn’t provide first-class support
    of modules. You can experiment with Gradle’s module support using this guide (
    [`https://guides.gradle.org/building-java-9-modules/`](https://guides.gradle.org/building-java-9-modules/)
    ).


    ### Apache Maven


    The Maven Compiler plugin ( [`https://maven.apache.org/plugins/maven-compiler-plugin/`](https://maven.apache.org/plugins/maven-compiler-plugin/)
    ) supports compiling Java 9 modules. Listing [1-2](#A459620_1_En_1_Chapter.html#Par17)
    shows how to configure this plugin in Maven projects.


    ```

    org.apache.maven.plugins

    maven-compiler-plugin

    3.7.0


    true


    Listing 1-2.

    Maven Compiler Plugin Configuration

    ```


    ### `javac` and `java`


    If you just want to run some quick tests to see how Java 9 works, you can skip
    the setup with Gradle or Maven and use `javac` and `java` directly. Java code
    can be compiled using `javac` and run using `java`. `javac` and `java` commands
    both have new options, which I cover in later chapters.


    You should only use `javac` and `java` for small projects. For large projects,
    these command line arguments are very hard to manage. Use Gradle or Maven for
    nontrivial projects.'
