    ```


    The options `-module-path`, `-add-modules`, and `-add-exports` have the same meanings
    as the ones used in `javac` or `java` in Chapter [2](#A459620_1_En_2_Chapter.html).


    ### `/set`


    `/set` configures the jshell. Typing `/set` shows the current configuration. `/set`
    has several subcommands:


    *   `/set editor`: Specifies the editor to use for the `/edit` command; for example,
    type `/set editor -wait atom` to use the Atom editor ( [`https://atom.io/`](https://atom.io/)
    ). It’s important to use the `-wait` flag to make jshell wait for the editor to
    close, or the changes won’t be captured by jshell.

    *   `/set start`: Sets the file to be the default start snippets and commands.
    If you have some setup code to run before using jshell, you can put that code
    into a file and use `/set start` to configure it to run first.

    *   `/set feedback`: Sets the feedback mode. Possible values are `normal`, `concise`,
    `silent`, and `verbose`. This configuration controls how much information jshell
    provides. For example, if you set the mode to `verbose`, jshell provides more
    information when running a snippet; see Listing [3-22](#A459620_1_En_3_Chapter.html#Par64).


    ```

    jshell> System.getProperty("java.io.tmpdir")

    $4 ==> "/var/folders/27/9mrlr7kd3pdgv8cw9fq9_1z40000gn/T/"

    |  created scratch variable $4 : String

    Listing 3-22.

    verbose Feedback Mode

    ```


    jshell allows fine-grained control of the feedback mode, including the displayed
    prompt, maximum length of a displayed value, and the format of a field. These
    can be configured using following commands:


    *   `/set prompt <mode>`: Sets the displayed prompt

    *   `/set truncation <mode>`: Sets the maximum length of a displayed value

    *   `/set format <mode> <field>`: Sets the format of a field


    Typing these commands directly shows the current configuration.


    ### `/reset`


    `/reset` resets jshell’s internal state. After the reset, all normal and error
    snippets and variables are removed. Start snippets are re-executed. The configuration
    changes made by `/set` are kept. `/reset` supports the same options as `/env`:
    `-class-path`, `-module-path`, `-add-modules`, and `-add-exports`.


    ### `/reload`


    `/reload` resets jshell and replays each valid snippet and `/drop` command in
    the order they were entered. `/reload` supports two modes, normal mode and restore
    mode. In the normal mode with `/reload`, it only replays valid history since the
    last time jshell was entered, or since a `/reset` or `/reload` command was executed.
    In the restore mode with `/reload -restore`, it replays the valid history between
    the previous and most recent time that jshell was entered, or since a `/reset`
    or `/reload` command was executed. The restore mode can replay history from last
    jshell session. When the option `-quiet` is passed, `/reload` won’t show output
    of the replay, but errors will still be displayed. `/reload` also supports the
    same options as `/env`: `-class-path`, `-module-path`, `-add-modules`, and `-add-exports`.


    After the evaluation context is modified using `/env`, the history will be replayed
    silently, just like when the command `/reload -quiet` is invoked.


    ### `/!`


    This reruns the last snippet.


    ### `/<id>`


    This reruns the snippet with the given ID.


    ### `/-<n>`


    This reruns the nth snippet.


    ### `/exit`


    This exits the shell.


