- fmt: '### Class Loaders


    OSGi uses a complicated class loader hierarchy to allow different versions of
    the same bundle to coexist at runtime. JPMS uses a simple class loading strategy.
    A module has its own class loader that is responsible for loading all types in
    this module. A class loader can load types from one module or from many modules.
    All of the types in one module should be loaded by the same class loader.


    Before Java 9, Java runtime has three built-in class loaders:


    - **Bootstrap class loader**: JVM built-in class loader, typically represented
    as `null`. It has no parent.

    - **Extension class loader**: Loads classes from the extension directory. It’s
    a result of the extension mechanism introduced in JDK 1.2. Its parent is the bootstrap
    class loader.

    - **System or application class loader**: Loads classes from the application’s
    class path. Its parent is the extension class loader.


    The code in Listing [2-37](#A459620_1_En_2_Chapter.html#Par258) outputs the class
    loader hierarchy.


    ```

    ClassLoader classLoader = ClassLoaderMain.class.getClassLoader();

    while (classLoader != null) {

    System.out.println(classLoader);

    classLoader = classLoader.getParent();

    }

    Listing 2-37.

    Outputing the Class Loader Hierarchy

    ```


    When you’re running the code in Listing [2-37](#A459620_1_En_2_Chapter.html#Par258)
    on Java 8, the following output is shown. `AppClassLoader` and `ExtClassLoader`
    are the classes of the system class loader and the extension class loader, respectively.
    The bootstrap class loader is represented as `null`, so it’s not shown.


    ```

    sun.misc.Launcher$AppClassLoader@18b4aac2

    sun.misc.Launcher$ExtClassLoader@60e53b93

    ```


    In Java 9, the extension mechanism has been superseded by the upgrade module path.
    The extension class loader is still kept for backward compatibility, but it is
    renamed to platform class loader. It can be retrieved using the method `getPlatformClassLoader()`
    of `ClassLoader`. The following are the built-in class loaders in Java 9:


    - **Bootstrap class loader**: Defines core Java SE and JDK modules

    - **Platform class loader**: Defines selected Java SE and JDK modules

    - **System or application class loader**: Defines classes on the class path and
    modules in the module path


    In Java 9, the platform class loader and system class loader are no longer instances
    of `URLClassLoader`. This affects a popular trick ( [`https://stackoverflow.com/a/7884406`](https://stackoverflow.com/a/7884406)
    ) to dynamically add new entries to the search path of the system class loader.
    As shown in Listing [2-38](#A459620_1_En_2_Chapter.html#Par266), this hack converts
    the system class loader to `URLClassLoader` and invokes its method `addURL()`.
    This no longer works in Java 9 as the cast to `URLClassLoader` fails.


    ```

    public static void addPath(String s) throws Exception {

    File f = new File(s);

    URL u = f.toURL();

    URLClassLoader urlClassLoader = (URLClassLoader)

    ClassLoader.getSystemClassLoader();

    Class urlClass = URLClassLoader.class;

    Method method = urlClass.getDeclaredMethod("addURL", new Class[]{URL.class});

    method.setAccessible(true);

    method.invoke(urlClassLoader, new Object[]{u});

    }

    Listing 2-38.

    Adding a Path to URLClassLoader

    ```


    Every class loader has its own unnamed module that can be retrieved using the
    method `getUnnamedModule()` of `ClassLoader`. If a class loader loads a type that
    is not defined in a named module, this type is considered to be in the class loader’s
    unnamed module. The unnamed module we discussed earlier is actually the unnamed
    module of the application class loader.


    In Java 9, class loaders have names. The name is specified in the constructor
    and can be retrieved using the method `getName()`. The name of the platform class
    loader is `platform`, whereas the name of application class loader is `app`. The
    new class loader name can be useful when you’re debugging class loader–related
    issues.


    ```

    @Test

    public void testClassLoaderName() {

    ClassLoader classLoader = ClassLoaderTest.class.getClassLoader();

    final List names = Lists.newArrayList();

    while (classLoader != null) {

    names.add(classLoader.getName());

    classLoader = classLoader.getParent();

    }

    assertEquals(2, names.size());

    assertEquals("app", names.get(0));

    assertEquals("platform", names.get(1));

    }

    Listing 2-39.

    Testing the Class Loader Names

    ```


    The new method `Class<?> findClass(String moduleName, String name)` finds the
    class with a given binary name in a module defined to this class loader. If the
    module name is `null`, it finds the class in the unnamed module of this class
    loader. If the class cannot be found, this method returns `null` instead of throwing
    a `ClassNotFoundException`. The new method `URL findResource(String moduleName,
    String name)` returns a URL to the resource with a given name in a module that
    is defined for this class loader. The method `Module.getResourceAsStream()` actually
    uses this method of the module’s class loader to get the `URL` first and then
    open the input stream. The methods `findClass()` and `findResource()` are both
    protected and should be overridden by class loader implementations.


    `ClassLoader` already has the method `Enumeration<URL> getResources(String name)`
    to find all resources with the given name. The new method `Stream<URL> resources(String
    name)` has the same functionality, but it returns a `Stream<URL>`.


    Java 9 adds a new restriction when accessing the resources that matches the access
    control rules enforced by module declaration. Resources in the named modules are
    subject to the encapsulation rules specified in the method `Module.getResourceAsStream()`.
    For nonclass resources, the related methods in `ClassLoader` can only find resources
    in packages when the package is open unconditionally.


    For example, the module `io.vividcode.store.common` has a properties file `application.properties`
    in the directory `config`. The package name of this resource is `config`. If the
    package `config` is not declared as `open` in the module declaration, it cannot
    be located using those resource-related methods.


    In Listing [2-40](#A459620_1_En_2_Chapter.html#Par275), I get the `Module` object
    of the module `io.vividcode.store.common` first, then I get its class loader and
    use the method `resources()` to list all resources with name `config/application.properties`.
    Here the package `config` must be open, otherwise the method `resources()` returns
    an empty stream.


    ```

    public class ResourceTest {

    @Test

    public void testResources() throws URISyntaxException {

    final Optional moduleOpt = ModuleTestSupport.getModule();

    assertTrue(moduleOpt.isPresent());

    final Module module = moduleOpt.get();

    assertTrue(module.isOpen("config"));

    assertTrue(module

    .getClassLoader()

    .resources("config/application.properties")

    .count() > 0

    );

    }

    }

    Listing 2-40.

    Testing ClassLoader.resources()

    ```


    The new method `Package[] getDefinedPackages()` returns all of the `Package`s
    defined by this class loader, while `Package getDefinedPackage(String name)` returns
    the `Package` of the given name defined by this class loader. In Listing [2-41](#A459620_1_En_2_Chapter.html#Par277),
    the class loader to test is actually the system class loader, so it defines application
    packages, but not packages like `java.lang`.


    ```

    @Test

    public void testGetDefinedPackages() {

    final ClassLoader classLoader = ClassLoaderTest.class.getClassLoader();

    final Package[] packages = classLoader.getDefinedPackages();

    assertTrue(Stream.of(packages)

    .map(Package::getName)

    .noneMatch(Predicate.isEqual("java.lang")));

    assertTrue(Stream.of(packages)

    .map(Package::getName)

    .anyMatch(Predicate.isEqual("io.vividcode.feature9.module")));

    assertNull(classLoader.getDefinedPackage("java.lang"));

    assertNotNull(

    classLoader.getDefinedPackage("io.vividcode.feature9.module"));

    }

    Listing 2-41.

    Testing ClassLoader.getDefinedPackages()

    ```'
