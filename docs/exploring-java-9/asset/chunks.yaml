    ### `/env`


    `/env` shows or modifies jshell’s evaluation context. You can use `/env` to show
    the configuration of the evaluation context. To modify the context, you need to
    pass at least one value of `-class-path`, `-module-path`, `-add-modules`, and
    `-add-exports`.


    The option `-class-path` sets the class path of the context. For example, if you
    want to test Guava in jshell, you add its JAR file to the class path; see Listing
    [3-20](#A459620_1_En_3_Chapter.html#Par56).


    ```

