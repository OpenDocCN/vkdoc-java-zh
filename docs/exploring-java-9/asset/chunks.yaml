- fmt: '`LoggerManager` in Listing [16-5](#A459620_1_En_16_Chapter.html#Par21) creates
    new `System.Logger` instances. The names of these loggers are based on the caller
    class of the method `getLogger()`. The option `RETAIN_CLASS_REFERENCE` must be
    configured for `getCallerClass()` to work. `getCallerClass()` always ignores reflection
    frames and hidden frames.


    ```

    public class LoggerManager {

    private final static StackWalker walker =

    StackWalker.getInstance(Option.RETAIN_CLASS_REFERENCE);

    public static System.Logger getLogger() {

    final Class caller = walker.getCallerClass();

    return System.getLogger(

    String.format("%s/%s", caller.getModule().getName(), caller.getName()));

    }

    }

