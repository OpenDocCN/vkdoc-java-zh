    The parameter `options` is a list of options to configure the parser’s behavior.
    Here I use `--language=es6` to enable the ECMAScript 6 parsing mode. `Parser`
    has different `parse()` methods for parsing source code. All these `parse()` methods
    take arguments to specify the source code using `File`, `Reader`, `String`, `URL`,
    `Path`, or `jdk.nashorn.api.scripting.ScriptObjectMirror` objects and use another
    argument of type `DiagnosticListener` to specify a listener to receive parsing
    errors. Here I parse the JavaScript code `function a() {return ''hello'';}`, which
    only contains one function declaration. The interface `DiagnosticListener` only
    contains one method `report(Diagnostic diagnostic)`. The interface `Diagnostic`
    contains methods for retrieving information about diagnostic data, including kind,
    code, message, line number, column number, and file name; see Table [11-1](#A459620_1_En_11_Chapter.html#Tab1).
    Here I simply print out the data to console.


    Table 11-1.


    Methods of `Diagnostic`


    | Method | Description |

    | --- | --- |

    | `Diagnostic.Kind getKind()` | Returns what kind of diagnostic this is |

    | `long getPosition()` | Returns the character offset that indicates the location
    of the problem |

    | `String getFileName()` | Returns the source file name |

    | `long getLineNumber()` | Returns the line number of the character offset returned
    by `getPosition()` |

    | `long getColumnNumber()` | Returns the column number of the character offset
    returned by `getPosition()` |

    | `String getCode()` | Returns a code indicating the type of diagnostic |

    | `String getMessage()` | Returns a message for this diagnostic |


    The enum `Diagnostic.Kind` represents different kinds of diagnostics. It has the
    following values: `ERROR`, `WARNING`, `MANDATORY_WARNING`, `NOTE`, and `OTHER`.


    The return value of `parse()` is an instance of the interface `CompilationUnitTree`,
    which represents the parsed abstract syntax tree. The method `accept(TreeVisitor<R,D>
    visitor, D data)` accepts a visitor to visit the tree using the visitor pattern.
