- fmt: '### Automatic Module Names


    I mentioned names of automatic modules earlier. If no attribute `Automatic-Module-Name`
    is found in the manifest of a JAR file, the module name is derived from the file
    name. The module name is determined using following steps.


    1. Remove the suffix `.jar`.

    2. Attempt to match the file name to the regular expression pattern `-(\\d+(\\.|$))`.
    If the pattern matches, then the substring before the matching position is treated
    as the candidate of module name, while the substring after the dash (`-`) is parsed
    as the version. If the version cannot be parsed, then it’s ignored. If the pattern
    doesn’t match, the whole file name is treated as the candidate of module name.

    3. Clean up the candidate of module name to create a valid module name. All nonalphanumeric
    characters (`[^A-Za-z0-9]`) in the module name are replaced with a dot (`.`),
    all repeating dots are replaced with one dot, and all leading and trailing dots
    are removed.


    If you are interested in knowing the actual implementation of these steps, check
    the method `ModuleDescriptor.deriveModuleDescriptor(JarFile jf)` of the class
    `jdk.internal.module.ModulePath` in the module `java.base`. The parse of the version
    string is done using the static method `Version.parse(String v)` of `ModuleDescriptor.Version`.
    The code in Listing [2-45](#A459620_1_En_2_Chapter.html#Par295) also implements
    the same algorithm.


    Table [2-14](#A459620_1_En_2_Chapter.html#Tab14) shows some examples of deriving
    automatic module names from the JAR file names.


    **Table 2-14.** Example of Deriving Automatic Module Names for JAR File Names


    | File Name | Module Name | Version |

    | --- | --- | --- |

    | `mylib.jar` | `mylib` | `null` |

    | `slf4j-api-1.7.25.jar` | `slf4j.api` | `1.7.25` |

    | `hibernate-jpa-2.1-api-1.0.0.Final.jar` | `hibernate.jpa` | `2.1-api-1.0.0.Final`
    |

    | `spring-context-support-4.3.6.RELEASE.jar` | `spring.context.support` | `4.3.6.RELEASE`
    |


    Listing [2-45](#A459620_1_En_2_Chapter.html#Par295) shows the code to derive the
    automatic module names shown in Table [2-14](#A459620_1_En_2_Chapter.html#Tab14).


    ```

    public class DeriveAutomaticModuleName {

    static final Pattern DASH_VERSION = Pattern.compile("-(\\d+(\\.|$))");

    static final Pattern NON_ALPHANUM = Pattern.compile("[^A-Za-z0-9]");

    static final Pattern REPEATING_DOTS = Pattern.compile("(\\.)(\\1)+");

    static final Pattern LEADING_DOTS = Pattern.compile("^\\.");

    static final Pattern TRAILING_DOTS = Pattern.compile("\\.$");

    public Tuple2 deriveModuleName(final String fileName) {

    Objects.requireNonNull(fileName);

    String name = fileName;

    String version = null;

    if (fileName.endsWith(".jar")) {

    name = fileName.substring(0, fileName.length() - 4);

    }

    final Matcher matcher = DASH_VERSION.matcher(name);

    if (matcher.find()) {

    final int start = matcher.start();

    try {

    final String tail = name.substring(start + 1);

    ModuleDescriptor.Version.parse(tail);

    version = tail;

    } catch (final IllegalArgumentException ignore) {

    }

    name = name.substring(0, start);

    }

    return Tuple.of(cleanModuleName(name), version);

    }

    public void displayModuleName(final String fileName) {

    final Tuple2 result = deriveModuleName(fileName);

    System.out.printf("%s => %s [%s]%n", fileName, result._1, result._2);

    }

    private String cleanModuleName(String mn) {

    // replace non-alphanumeric

    mn = NON_ALPHANUM.matcher(mn).replaceAll(".");

    // collapse repeating dots

    mn = REPEATING_DOTS.matcher(mn).replaceAll(".");

    // drop leading dots

    if (mn.length() > 0 && mn.charAt(0) == ''.'') {

    mn = LEADING_DOTS.matcher(mn).replaceAll("");

    }

    // drop trailing dots

    final int len = mn.length();

    if (len > 0 && mn.charAt(len - 1) == ''.'') {

    mn = TRAILING_DOTS.matcher(mn).replaceAll("");

    }

    return mn;

    }

    public static void main(final String[] args) {

    final DeriveAutomaticModuleName moduleName = new DeriveAutomaticModuleName();

    moduleName.displayModuleName("mylib.jar");

    moduleName.displayModuleName("slf4j-api-1.7.25.jar");

    moduleName.displayModuleName("hibernate-jpa-2.1-api-1.0.0.Final.jar");

    moduleName.displayModuleName("spring-context-support-4.3.6.RELEASE.jar");

    }

    }

    Listing 2-45.

    Deriving Automatic Module Names

    ```


    If the module name is specified using the manifest attribute `Automatic-Module-Name`,
    then the name is used as is. If the specified module name is invalid, then a `FindException`
    is thrown when the module is loaded.


    ## Module Artifacts


    Modules are packaged as module artifacts. There are two types of module artifacts,
    JAR files and JMOD files.


    ### JAR Files


    A modular JAR file is just a JAR file with the file `module-info.class` in its
    root directory, so you can use the existing `jar` tool to create modular JAR files.
    The `jar` tool also adds new options to insert additional information into module
    descriptors.


    * `-e`, `--main-class=CLASSNAME` records the entry point class in the file `module-info.class`.
    This is actually an old option that records the main class in the manifest file.

    * `--module-version=VERSION` records the `VERSION` in the `module-info.class`
    file as the module’s version.

    * `--hash-modules=PATTERN` records hashes of modules that depend upon this module
    in the `module-info.class` file. Hashes are only recorded for modules whose names
    match the regular expression specified with `PATTERN`.

    * `-d`, `--describe-module` prints the module descriptor or the name of an automatic
    module.


    You can use the command in Listing [2-46](#A459620_1_En_2_Chapter.html#Par304)
    to create a modular JAR file for the module `io.vividcode.store.runtime`. Here
    I specified the module version and main class.


    ```

    $ jar --create --file target/runtime-1.0.0.jar \

    --main-class io.vividcode.store.runtime.Main \

    --module-version 1.0.0 \

    -C target/classes .

    Listing 2-46.

    Using jar to Create Module Artifacts

    ```


    Then you can print out the details of the created JAR file.


    ```

    $ jar -d -f target/runtime.jar

    ```


    Listing [2-47](#A459620_1_En_2_Chapter.html#Par308) shows the output of this command.


    ```

    module io.vividcode.store.runtime@1.0.0 (module-info.class)

    requires io.vividcode.store.filestore

    requires io.vividcode.store.product.persistence

    requires mandated java.base

    requires slf4j.simple

    contains io.vividcode.store.runtime

    main-class io.vividcode.store.runtime.Main

    Listing 2-47.

    Output of jar -d

    ```


    To record module hashes using `--hash-modules`, you need to also provide the module
    path using `-p` or `--module-path` for the `jar` tool to locate modules.'
