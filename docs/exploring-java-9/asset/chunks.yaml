    ## Stream


    This section covers the new methods that have been added to `java.util.stream.Stream`
    in Java 9.


    ### `ofNullable()` Method


    The static method `Stream<T> ofNullable(T t)` returns a `Stream` of zero or one
    element, depending on whether the input value is `null`. Listing [4-8](#A459620_1_En_4_Chapter.html#Par24)
    shows examples of this method.


    ```

    @Test

    public void testOfNullable() throws Exception {

    assertEquals(1, Stream.ofNullable("").count());

    assertEquals(0, Stream.ofNullable(null).count());

    }

    Listing 4-8.

    Example of Stream.ofNullable()

    ```


    ### `dropWhile()` Method


    The method `Stream<T> dropWhile(Predicate<? super T> predicate)` drops elements
    in the stream until it encounters the first element that doesn’t match the predicate.
    If the stream is ordered, then the longest prefix of elements that matches the
    given predicate is dropped. If the stream is unordered, and some (but not all)
    elements of this stream match the given predicate, then it’s undetermined to tell
    which elements are dropped. However, if all elements of the stream match the given
    predicate, or no elements of the stream match the given predicate, then it doesn’t
    matter whether the stream is ordered or unordered; the result is determined.


    In Listing [4-9](#A459620_1_En_4_Chapter.html#Par27), the stream contains elements
    from `1` to `5`. The predicate checks if the element is odd. The first element
    `1` is dropped. The result stream contains four elements.


    ```

    @Test

    public void testDropWhile() throws Exception {

    final long count = Stream.of(1, 2, 3, 4, 5)

    .dropWhile(i -> i % 2 != 0)

    .count();

    assertEquals(4, count);

    }

    Listing 4-9.

    Example of Stream.dropWhile()

    ```


    ### `takeWhile()` Method


    The method `Stream<T> takeWhile(Predicate<? super T> predicate)` performs the
    opposite action on a stream that `dropWhile()` does. `takeWhile()` takes elements
    in the stream until it encounters the first element that doesn’t match the predicate.
    `takeWhile()` has the same behavior as `dropWhile()` when it processes ordered
    and unordered streams.


    In Listing [4-10](#A459620_1_En_4_Chapter.html#Par30), when the stream is processed
    as in Listing [4-6](#A459620_1_En_4_Chapter.html#Par19) using `takeWhile()`, the
    resulting stream only has one element of value `1`.


    ```

    @Test

    public void testTakeWhile() throws Exception {

    final long count = Stream.of(1, 2, 3, 4, 5)

    .takeWhile(i -> i % 2 != 0)

    .count();

    assertEquals(1, count);

    }

    Listing 4-10.

    Example of Stream.takeWhile()

    ```


    ### `iterate()` Method


    The static method `Stream<T> iterate(T seed, Predicate<? super T> hasNext, UnaryOperator<T>
    next)` is a new way to generate streams using the iterator pattern. `seed` is
    the initial element for iteration. `hasNext` is the predicate that applies to
    the current element to check if the stream should be terminated. `next` is the
    function that applies to the current element to produce the next element in the
    stream. If the initial element `seed` doesn’t match the predicate `hasNext`, the
    result stream is empty.


    In Listing [4-11](#A459620_1_En_4_Chapter.html#Par33), the result stream uses
    `2` as the initial element and increases the current value by `2` to produce the
    next value. The stream terminates when the value is greater than `10`. There will
    be `5` elements in the stream.


    ```

    @Test

    public void testIterate() throws Exception {

    final Stream stream =

    Stream.iterate(2, i -> i <= 10, i -> i + 2);

    assertEquals(5, stream.count());

    }

    Listing 4-11.

    Example of Stream.iterate()

    ```


    ### `IntStream`, `LongStream`, and `DoubleStream`


    Methods `dropWhile()`, `takeWhile()`, and `iterate()` are also added to `IntStream`,
    `LongStream`, and `DoubleStream`.


    ## Collectors


    Several new methods have also been added to `java.util.stream.Collectors` in Java
    9.'
