- fmt: '### Static Dependencies


    You can use `requires static` to specify that a module dependency is required
    in the compile time, but optional in the runtime; see Listing [2-11](#A459620_1_En_2_Chapter.html#Par47).


    ```

    module demo {

    requires static A;

    }

    Listing 2-11.

    Example of requires static

    ```


    Static dependencies are useful for frameworks and libraries. Suppose that you
    are building a library to work with different kinds of databases. The library
    module can use static dependencies to require different kinds of JDBC drivers.
    At compile time, the library’s code can access types defined in those drivers.
    At runtime, users of the library can add only the drivers they want to use. If
    the dependencies are not static, users of the library have to add all supported
    drivers to pass the module resolution checks.


    ### Services


    Java has its own service interfaces and providers mechanism using the class `java.util.ServiceLoader`.
    This service mechanism has been primarily used by JDK itself and third-party frameworks
    and libraries. A typical example of a service provider is a JDBC driver. Each
    JDBC driver should provide the implementation of the service interface `java.sql.Driver`.
    The driver’s JAR file should have the provider configuration file `java.sql.Driver`
    in the directory `META-INF/services`. For example, the file `java.sql.Driver`
    in the JAR file of Apache Derby ( [`https://db.apache.org/derby/`](https://db.apache.org/derby/)
    ) has this content:


    ```

    org.apache.derby.jdbc.AutoloadedDriver

    ```


    `org.apache.derby.jdbc.AutoloadedDriver` is the name of the implementation class
    of the service interface `java.sql.Driver`.


    Before Java 9, `ServiceLoader` scanned the class path to locate provider implementations
    for a given service interface. In Java 9, the module descriptor `module-info.java`
    has specific declarations for service consumers and providers.


    Listing [2-12](#A459620_1_En_2_Chapter.html#Par54) shows the service interface
    `PersistenceService` in the module `io.vividcode.store.common`. The interface
    `PersistenceService` has a single method `save()` to save `Persistable` objects.


    ```

    package io.vividcode.store.common;

    public interface PersistenceService {

    void save(final Persistable persistable) throws PersistenceException;

    }

    Listing 2-12.

    Service Interface PersistenceService

    ```


    The module `io.vividcode.store.common.persistence` consumes this service interface.
    In its file `module-info.java` in Listing [2-13](#A459620_1_En_2_Chapter.html#Par56),
    the new keyword `uses` is used to declare the consumption of the service interface
    `io.vividcode.store.common.PersistenceService`.


    ```

    module io.vividcode.store.common.persistence {

    requires slf4j.api;

    requires transitive io.vividcode.store.common;

    exports io.vividcode.store.common.persistence;

    uses io.vividcode.store.common.PersistenceService;

    }

    Listing 2-13.

    Module Declaration of io.vividcode.store.common.persistence

    ```


    Now you can use `ServiceLoader` to look up providers of this service interface.
    In Listing [2-14](#A459620_1_En_2_Chapter.html#Par58), the method `ServiceLoader.load()`
    creates a new service loader for the service type `PersistenceService`, then you
    use the method `findFirst()` to get the first available service provider. If a
    service provider is found, use its method `save()` to save `Persistable` objects.


    ```

    public class DataStore {

    private final Optional persistenceServices;

    public DataStore() {

    this.persistenceServices = ServiceLoader

    .load(PersistenceService.class)

    .findFirst();

    }

    public void save(final T object) throws PersistenceException {

    if (this.persistenceServices.isPresent()) {

    this.persistenceServices.get().save(object);

    }

    }

    }

    Listing 2-14.

    Using ServiceLoader to Look Up Providers

    ```


    The provider of service interface `PersistenceService` is in the module `io.vividcode.store.filestore`.
    In this module’s declaration of Listing [2-15](#A459620_1_En_2_Chapter.html#Par60),
    `provides io.vividcode.store.common.PersistenceService with io.vividcode.store.filestore.FileStore`
    means this module provides the implementation of the service interface `PersistenceService`
    using the class `io.vividcode.store.filestore.FileStore`. The implementation of
    `FileStore` is quite simple and you can check the source code for its implementation.


    ```

    module io.vividcode.store.filestore {

    requires io.vividcode.store.common.persistence;

    requires slf4j.api;

    provides io.vividcode.store.common.PersistenceService

    with io.vividcode.store.filestore.FileStore;

    }

    Listing 2-15.

    Module Declaration of io.vividcode.store.filestore

    ```


    ### Qualified Exports


    When you are using `exports` to export a package in the module declaration, this
    package is visible to all modules that use `requires` to require it. Sometimes
    you may want to limit the visibility of certain packages to some modules only.
    Consider this example: a package was initially designed to be public to other
    modules, but this package was deprecated in later versions. Legacy code that uses
    the old version of this package should continue to work after migrating to Java
    9, while new code should use the new versions. The package should only be visible
    to modules of the legacy code that still use the old version. This is done by
    using the `to` clause in `exports` to specify the names of modules that should
    have access.


    Listing [2-16](#A459620_1_En_2_Chapter.html#Par63) shows the module declaration
    of the JDK module `java.rmi`. You can see that package `com.sun.rmi.rmid` is only
    visible to module `java.base` and package `sun.rmi.server` is only visible to
    modules `jdk.management.agent`, `jdk.jconsole`, and `java.management.rmi`.


    ```

    module java.rmi {

    requires java.logging;

    exports java.rmi.activation;

    exports com.sun.rmi.rmid to java.base;

    exports sun.rmi.server to jdk.management.agent,

    jdk.jconsole, java.management.rmi;

    exports javax.rmi.ssl;

    exports java.rmi.dgc;

    exports sun.rmi.transport to jdk.management.agent,

    jdk.jconsole, java.management.rmi;

    exports java.rmi.server;

    exports sun.rmi.registry to jdk.management.agent;

    exports java.rmi.registry;

    exports java.rmi;

    uses java.rmi.server.RMIClassLoaderSpi;

    }

    Listing 2-16.

    Module Declaration of JDK Module java.rmi

    ```


    ### Opening Modules and Packages


    In the module declaration, you can add the modifier `open` before `module` to
    declare it as an open module. An open module grants compile time access to explicitly
    exported packages only, but it grants access to types in all its packages at runtime.
    It also grants reflective access to all types in all packages. All types include
    private types and their private members. If you use the reflection API and suppress
    Java language access checks—using the method `setAccessible()` of `AccessibleObject`,
    for example—you can access private types and members in open modules.


    You can also use `opens` to open packages to other modules. You can access open
    packages using the reflection API at runtime. Just like open modules, all types
    in an open package and all their members can be reflected by the reflection API.
    You can also qualify open packages using `to`, which has a similar meaning in
    qualified exports.


    The declaration of module E in Listing [2-17](#A459620_1_En_2_Chapter.html#Par67)
    marks it as an open module.


    ```

    open module E {

    exports etest;

    }

    Listing 2-17.

    Declaration of an Open Module

    ```


    The declaration of module F in Listing [2-18](#A459620_1_En_2_Chapter.html#Par69)
    opens two packages. It’s possible to open packages that don’t exist in the module.
    It’s also possible to open packages to nonexistent modules. The compiler generates
    warnings in these cases, which is the same as exporting packages to non-existent
    modules.


    ```

    module F {

    opens ftest1;

    opens ftest2 to G;

    }

    Listing 2-18.

    Module Declaration That Uses Open Packages

    ```


    Open modules and open packages are provided mainly for resolving backward compatibility
    issues. You may need to use them when migrating legacy code that relies on reflections
    to work.'
