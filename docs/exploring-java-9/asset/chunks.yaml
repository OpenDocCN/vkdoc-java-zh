    ## Parser API


    Nashorn has a standard parser API you can use to parse ECMAScript source code
    into abstract syntax trees (ASTs) . This API is useful when you want to perform
    analysis of ECMAScript source code. With this API, you can get information about
    the source code, but you cannot modify existing source code. The parser API is
    in the package `jdk.nashorn.api.tree`.'
