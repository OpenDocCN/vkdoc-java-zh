    \ how to use `jmod` to create a JMOD file.\n\n```\n$ jmod create --class-path\
    \ target/classes \\\n--main-class io.vividcode.store.runtime.Main \\\n--module-version\
    \ 1.0.0 \\\n--os-arch x86_64 \\\n--os-name \"Mac OS X\" \\\ntarget/runtime-1.0.0.jmod\n\
    Listing 2-48.\nUsing jmod to Create Module Artifacts\n```\n\n### JDK Modules\n\
