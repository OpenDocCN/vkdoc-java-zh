    ### 模块层


    模块层用于组织模块。模块层由类 `java.lang.ModuleLayer` 表示。


    层是通过将 `Configuration` 对象中的可读性图映射到负责加载此模块中定义类型的类加载器来创建的。JVM 至少有一个非空层，即 `boot` 层，它在
    JVM 启动时创建。大多数应用程序只会使用这个引导层。可以创建额外的层来支持高级用例。一个层可以有多个父层。一个层中的模块也可以读取该层父层中的模块。创建层时，会为配置中的每个
    `ResolvedModule` 创建一个 `java.lang.Module` 对象。


    `ModuleLayer` 的静态方法 `boot()` 返回引导层。有三种不同的方法可以从现有的 `ModuleLayer` 创建新层；请参见表 2-10。现有的
    `ModuleLayer` 将成为新创建层的父层。


    表 2-10.

    创建新 `ModuleLayer` 的方法


    | 方法 | 描述 |

    | --- | --- |

    | `defineModules(Configuration cf, Function<String, ClassLoader> clf)` | 从 `Configuration`
    创建一个新的 `ModuleLayer`。对于每个模块，该函数返回映射的 `ClassLoader`。 |

    | `defineModulesWithOneLoader(Configuration cf, ClassLoader parentLoader)` | 从
    `Configuration` 创建一个新的 `ModuleLayer`。所有模块使用同一个 `ClassLoader`，并以 `parentLoader`
    作为父类加载器。 |

    | `defineModulesWithManyLoaders(Configuration cf, ClassLoader parentLoader)` |
    从 `Configuration` 创建一个新的 `ModuleLayer`。每个模块都有自己的 `ClassLoader`，并以 `parentLoader`
    作为父类加载器。 |


    `ModuleLayer` 也有静态方法 `defineModules()`、`defineModulesWithOneLoader()` 和 `defineModulesWithManyLoaders()`
    来创建新层。这些方法需要提供父层列表。与那些实例方法相比，这些静态方法返回 `ModuleLayer.Controller` 而不是 `ModuleLayer`。`ModuleLayer.Controller`
    具有修改层中模块的方法；请参见表 2-11。


    表 2-11.

    `ModuleLayer.Controller` 的方法


    | 方法 | 描述 |

    | --- | --- |

    | `addReads(Module source, Module target)` | 更新模块 `source` 以读取模块 `target` |

    | `ModuleLayer.Controller addExports(Module source, String pn, Module target)`
    | 更新模块 `source` 以将包 `pn` 导出到模块 `target` |

    | `ModuleLayer.Controller addOpens(Module source, String pn, Module target)` |
    更新模块 `source` 以将包 `pn` 开放给模块 `target` |

    | `ModuleLayer layer()` | 返回 `ModuleLayer` 对象 |


    `ModuleLayer` 还有其他方法；请参见表 2-12。


    表 2-12.

    `ModuleLayer` 的方法


    | 方法 | 描述 |

    | --- | --- |

    | `static ModuleLayer empty()` | 返回空层。 |

    | `Configuration configuration()` | 返回此层的配置。 |

    | `List<ModuleLayer> parents()` | 返回此层的父层列表。 |

    | `Set<Module> modules()` | 返回此层中的模块集合。 |

    | `Optional<Module> findModule(String name)` | 返回具有给定名称的模块。还会递归搜索父层，直到找到该模块。 |

    | `ClassLoader findLoader(String name)` | 返回具有给定名称的模块的 `ClassLoader`。父层的搜索方式与
    `findModule()` 相同。 |


    类 `Module` 表示一个运行时模块。它可以用于检索模块的信息，并在需要时修改它。表 2-13 展示了 `Module` 的方法。


