- fmt: '# Module Paths


    The module system uses module paths to locate modules defined in different artifacts.
    A module path is a sequence of paths to a module definition or directories containing
    module definitions. A module definition can be either a module artifact or a directory
    that contains exploded contents of a module. Module paths are searched based on
    their order in a sequence to find the first definition that defines a particular
    module. The module system also uses module paths to resolve dependencies. If the
    module system cannot find the definition for a dependent module, or if it finds
    two definitions in the same directory that define modules with the same name,
    it signals an error and exits. Module paths are separated with platform-dependent
    path separators: a semicolon (`;`) for Windows and a colon (`:`) for macOS and
    Linux.


    Different types of module paths are used in different phases; see Table [2-2](#A459620_1_En_2_Chapter.html#Tab2).
    As shown in this table, different command-line options for module paths can be
    applied to multiple phases. The order for each module path defines the search
    sequence when multiple module paths exist. For example, at compile time, using
    the `javac`, for example, all four types of module paths can be used. The module
    system checks module paths specified in `--module-source-path` first, then it
    checks `--upgrade-module-path`, then `--system`, and finally `--module-path` or
    `-p`.


    **Table 2-2.** Different Types of Module Paths


    | Order | Name | Command-Line Option | Applied Phase | Description |

    | --- | --- | --- | --- | --- |

    | 1 | Compilation module path | `--module-source-path` | Compile time | Source
    code of modules |

    | 2 | Upgrade module path | `--upgrade-module-path` | Compile time and runtime
    | Contains compiled modules used to replace upgradeable modules in the environment
    |

    | 3 | System modules | `--system` | Compile time and runtime | Compiled modules
    in the environment |

    | 4 | Application module path | `--module-path` or `-p` | All phases | Compiled
    application modules |


    The system modules and modules definitions found on the module paths are referred
    to as the set of observable modules, which are very important in the module resolution
    process. If a module to resolve doesn’t exist in the set of observable modules,
    the module system signals an error and exists.


    ## Module Version


    Although there is no version-related configuration in the module declaration,
    it’s still possible to record version information for a module. It’s recommended
    that you record the module version following the scheme of semantic versioning
    ( [`http://semver.org/`](http://semver.org/) ). Build tools like Maven or Gradle
    should record the version information automatically, so you don’t need to worry
    about it unless you’re using `javac` or `jar` tools directly. The important thing
    to know is that the module system ignores version information when searching for
    modules. If a module path contains multiple definitions of modules with the same
    name but different versions, the module system still treats this as an error.
    Module name is the only thing that matters when resolving modules.


    You can specify module version using the option `--module-version`.


    ## The Main Module


    The main module can be specified using the option `--module` or `-m`. At runtime,
    the main module contains the main class to run. If the main class is recorded
    in the module’s declaration, then specifying only the module name is enough. Otherwise,
    you need to use `<module>/<mainclass>` to specify the module and main class, for
    example, `com.mycompany.mymodule/com.mycompany.mymodule.Main`.


    At compile time, `--module` or `-m` specifies the only module to compile.


    ## Root Modules


    The set of observable modules defines all the possible modules that can be resolved.
    However, not all observable modules are required at runtime. The module system
    starts the resolution process from a set of root modules, and it constructs a
    module graph by resolving the transitive closure of the dependencies of these
    root modules against the set of observable modules. It’s possible that not all
    observable modules are resolved, and only the observable modules are resolvable.


    The module system has some rules it uses to select the default root modules. When
    you’re compiling or running code in the unnamed module, that is, code that predates
    Java 9, the default set of root modules for the an unnamed module includes JDK
    system modules and application modules. If the `java.se` module exists, it will
    be the only JDK system module to include. Otherwise, every `java.*` module that
    unconditionally exports at least one package is a root module. Every non-`java.*`
    module that unconditionally exports at least one package is also a root module.


    When you’re compiling or running Java 9 code, the default set of root modules
    depends on the phase:


    * At compile time, it’s the set of modules to compile.

    * At link time, it’s empty.

    * At runtime, it’s the application’s main module.


    The set of root modules can be extended to include extra modules using the option
    `--add-modules`. The value of this option is a comma-separated list of module
    names. There are also three special values of this option.


    * `ALL-DEFAULT`: Add the default set of root modules for the unnamed module.

    * `ALL-SYSTEM`: Add all system modules.

    * `ALL-MODULE-PATH`: Add all observable modules found on the module paths.


    ## Limiting the Observable Modules


    It’s possible to limit the observable modules using the option `--limit-modules`.
    After you use this option, the set of observable modules is the transitive closure
    of those specified modules plus the main module and any modules specified via
    the option `--add-modules`. The value of this option is also a comma-separated
    list of module names.


    ## Upgrading the Module Path


    The option `--upgrade-module-path` specifies the upgrade module path. This path
    contains modules that you can use to upgrade modules that are built-in into the
    environment. This module path supersedes the existing extension mechanism ( [`http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html`](http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html)
    ).


    Whether a system module is upgradable is clearly documented in the file `module-info.java`.
    For example, modules `java.xml.bind` and `java.xml.ws` are upgradable.


    ## Increasing Readability and Breaking Encapsulation


    The module system is all about encapsulation. But sometimes you’ll still want
    to break encapsulation when you’re dealing with legacy code or running tests.
    You can use several command-line options to break encapsulation.


    * `--add-reads module=target-module(,target-module)*` updates the source module
    to read the target module. The target module can be `ALL-UNNAMED` to read all
    unnamed modules.

    * `--add-exports module/package=target-module(,target-module)*` updates the source
    module to export the package to the target module. This will add a qualified export
    of the package from the source module to the target module. The target module
    can be `ALL-UNNAMED` to export to all unnamed modules.

    * `--add-opens module/package=target-module(,target-module)*` updates the sources
    module to open the package to the target module. This will add a qualified open
    of the package from the source module to the target module.

    * `--patch-module module=file(;file)*` overrides or augments a module with classes
    and resources in JAR files or directories. `--patch-module` is useful when you’re
    running tests that may need to temporarily replace the contents of a module.


    Now that I’ve introduced the basic concepts, let’s discuss these JDK tools.'
  raw: '### Module Paths


    The module system uses module paths to locate modules defined in different artifacts.
    A module path is a sequence of paths to a module definition or directories containing
    module definitions. A module definition can be either a module artifact or a directory
    that contains exploded contents of a module. Module paths are searched based on
    their order in a sequence to find the first definition that defines a particular
    module. The module system also uses module paths to resolve dependencies. If the
    module system cannot find the definition for a dependent module, or if it finds
    two definitions in the same directory that define modules with the same name,
    it signals an error and exits. Module paths are separated with platform-dependent
    path separators: a semicolon (`;`) for Windows and a colon (`:`) for macOS and
    Linux.


    Different types of module paths are used in different phases; see Table [2-2](#A459620_1_En_2_Chapter.html#Tab2).
    As shown in this table, different command-line options for module paths can be
    applied to multiple phases. The order for each module path defines the search
    sequence when multiple module paths exist. For example, at compile time, using
    the `javac`, for example, all four types of module paths can be used. The module
    system checks module paths specified in `--module-source-path` first, then it
    checks `--upgrade-module-path`, then `--system`, and finally `--module-path` or
    `-p`.


    Table 2-2.


    Different Types of Module Paths


    | Order | Name | Command-Line Option | Applied Phase | Description |

    | --- | --- | --- | --- | --- |

    | 1 | Compilation module path | `--module-source-path` | Compile time | Source
    code of modules |

    | 2 | Upgrade module path | `--upgrade-module-path` | Compile time and runtime
    | Contains compiled modules used to replace upgradeable modules in the environment
    |

    | 3 | System modules | `--system` | Compile time and runtime | Compiled modules
    in the environment |

    | 4 | Application module path | `--module-path` or `-p` | All phases | Compiled
    application modules |


    The system modules and modules definitions found on the module paths are referred
    to as the set of observable modules, which are very important in the module resolution
    process. If a module to resolve doesn’t exist in the set of observable modules,
    the module system signals an error and exists.


    ### Module Version


    Although there is no version-related configuration in the module declaration,
    it’s still possible to record version information for a module. It’s recommended
    that you record the module version following the scheme of semantic versioning
    ( [`http://semver.org/`](http://semver.org/) ). Build tools like Maven or Gradle
    should record the version information automatically, so you don’t need to worry
    about it unless you’re using `javac` or `jar` tools directly. The important thing
    to know is that the module system ignores version information when searching for
    modules. If a module path contains multiple definitions of modules with the same
    name but different versions, the module system still treats this as an error.
    Module name is the only thing that matters when resolving modules.


    You can specify module version using the option `--module-version`.


    ### The Main Module


    The main module can be specified using the option `--module` or `-m`. At runtime,
    the main module contains the main class to run. If the main class is recorded
    in the module’s declaration, then specifying only the module name is enough. Otherwise,
    you need to use `<module>/<mainclass>` to specify the module and main class, for
    example, `com.mycompany.mymodule/com.mycompany.mymodule.Main`.


    At compile time, `--module` or `-m` specifies the only module to compile.


    ### Root Modules


    The set of observable modules defines all the possible modules that can be resolved.
    However, not all observable modules are required at runtime. The module system
    starts the resolution process from a set of root modules, and it constructs a
    module graph by resolving the transitive closure of the dependencies of these
    root modules against the set of observable modules. It’s possible that not all
    observable modules are resolved, and only the observable modules are resolvable.


    The module system has some rules it uses to select the default root modules. When
    you’re compiling or running code in the unnamed module, that is, code that predates
    Java 9, the default set of root modules for the an unnamed module includes JDK
    system modules and application modules. If the `java.se` module exists, it will
    be the only JDK system module to include. Otherwise, every `java.*` module that
    unconditionally exports at least one package is a root module. Every non-`java.*`
    module that unconditionally exports at least one package is also a root module.


    When you’re compiling or running Java 9 code, the default set of root modules
    depends on the phase:


    *   At compile time, it’s the set of modules to compile.

    *   At link time, it’s empty.

    *   At runtime, it’s the application’s main module.


    The set of root modules can be extended to include extra modules using the option
    `--add-modules`. The value of this option is a comma-separated list of module
    names. There are also three special values of this option.


    *   `ALL-DEFAULT`: Add the default set of root modules for the unnamed module.

    *   `ALL-SYSTEM`: Add all system modules.

    *   `ALL-MODULE-PATH`: Add all observable modules found on the module paths.


    ### Limiting the Observable Modules


    It’s possible to limit the observable modules using the option `--limit-modules`.
    After you use this option, the set of observable modules is the transitive closure
    of those specified modules plus the main module and any modules specified via
    the option `--add-modules`. The value of this option is also a comma-separated
    list of module names.


    ### Upgrading the Module Path


    The option `--upgrade-module-` `path` specifies the upgrade module path. This
    path contains modules that you can use to upgrade modules that are built-in into
    the environment. This module path supersedes the existing extension mechanism
    ( [`http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html`](http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html)
    ).


    Whether a system module is upgradable is clearly documented in the file `module-info.java`.
    For example, modules `java.xml.bind` and `java.xml.ws` are upgradable.


    ### Increasing Readability and Breaking Encapsulation


    The module system is all about encapsulation. But sometimes you’ll still w ant
    to break encapsulation when you’re dealing with legacy code or running tests.
    You can use several command-line options to break encapsulation.


    *   `--add-reads module=target-module(,target-module)*` updates the source module
    to read the target module. The target module can be `ALL-UNNAMED` to read all
    unnamed modules.

    *   `--add-exports module/package=target-module(,target-module)*` updates the
    source module to export the package to the target module. This will add a qualified
    export of the package from the source module to the target module. The target
    module can be `ALL-UNNAMED` to export to all unnamed modules.

    *   `--add-opens module/package=target-module(,target-module)*` updates the sources
    module to open the package to the target module. This will add a qualified open
    of the package from the source module to the target module.

    *   `--patch-module module=file(;file)*` overrides or augments a module with classes
    and resources in JAR files or directories. `--patch-module` is useful when you’re
    running tests that may need to temporarily replace the contents of a module.


    Now that I’ve introduced the basic concepts, let’s discuss these JDK tools.'
  trans: '

    ### 模块路径


    模块系统使用模块路径来定位定义在不同工件中的模块。模块路径是一系列指向模块定义或包含模块定义目录的路径序列。模块定义可以是模块工件，也可以是包含模块展开内容的目录。模块路径按照其在序列中的顺序进行搜索，以找到定义特定模块的第一个定义。模块系统还使用模块路径来解析依赖关系。如果模块系统找不到依赖模块的定义，或者在同一个目录中发现两个定义了同名模块的定义，则会报错并退出。模块路径使用平台相关的路径分隔符进行分隔：Windows
    使用分号（`;`），macOS 和 Linux 使用冒号（`:`）。


    不同类型的模块路径用于不同的阶段；参见表 2-2。如表所示，不同的模块路径命令行选项可以应用于多个阶段。当存在多个模块路径时，每个模块路径的顺序定义了搜索顺序。例如，在编译时，使用
    `javac` 时，所有四种类型的模块路径都可以使用。模块系统首先检查 `--module-source-path` 中指定的模块路径，然后检查 `--upgrade-module-path`，接着是
    `--system`，最后是 `--module-path` 或 `-p`。


    表 2-2.


    不同类型的模块路径


    | 顺序 | 名称 | 命令行选项 | 应用阶段 | 描述 |

    | --- | --- | --- | --- | --- |

    | 1 | 编译模块路径 | `--module-source-path` | 编译时 | 模块的源代码 |

    | 2 | 升级模块路径 | `--upgrade-module-path` | 编译时和运行时 | 包含用于替换环境中可升级模块的已编译模块 |

    | 3 | 系统模块 | `--system` | 编译时和运行时 | 环境中的已编译模块 |

    | 4 | 应用模块路径 | `--module-path` 或 `-p` | 所有阶段 | 已编译的应用模块 |


    在模块路径上找到的系统模块和模块定义被称为可观察模块集，这在模块解析过程中非常重要。如果要解析的模块不存在于可观察模块集中，模块系统会报错并退出。


    ### 模块版本


    尽管模块声明中没有版本相关的配置，但仍然可以为模块记录版本信息。建议你遵循语义化版本控制方案（[`http://semver.org/`](http://semver.org/)）来记录模块版本。像
    Maven 或 Gradle 这样的构建工具会自动记录版本信息，因此除非你直接使用 `javac` 或 `jar` 工具，否则无需担心。需要了解的重要一点是，模块系统在搜索模块时会忽略版本信息。如果模块路径包含多个同名但不同版本的模块定义，模块系统仍会将其视为错误。在解析模块时，模块名称是唯一重要的因素。


    你可以使用 `--module-version` 选项指定模块版本。


    ### 主模块


    可以使用 `--module` 或 `-m` 选项指定主模块。在运行时，主模块包含要运行的主类。如果主类已在模块声明中记录，则只需指定模块名称即可。否则，你需要使用
    `<module>/<mainclass>` 来指定模块和主类，例如 `com.mycompany.mymodule/com.mycompany.mymodule.Main`。


    在编译时，`--module` 或 `-m` 指定了唯一要编译的模块。


    ### 根模块


    可观察模块集定义了所有可能被解析的模块。然而，并非所有可观察模块在运行时都是必需的。模块系统从一组根模块开始解析过程，并通过解析这些根模块的依赖关系相对于可观察模块集的传递闭包来构建模块图。有可能并非所有可观察模块都被解析，并且只有可观察模块是可解析的。


    模块系统有一些用于选择默认根模块的规则。当你在未命名模块（即早于 Java 9 的代码）中编译或运行代码时，未命名模块的默认根模块集包括 JDK 系统模块和应用模块。如果
    `java.se` 模块存在，它将是唯一包含的 JDK 系统模块。否则，每个无条件导出至少一个包的 `java.*` 模块都是根模块。每个无条件导出至少一个包的非
    `java.*` 模块也是根模块。


    当你编译或运行 Java 9 代码时，默认的根模块集取决于阶段：


    *   在编译时，它是要编译的模块集。

    *   在链接时，它是空的。

    *   在运行时，它是应用的主模块。


    可以使用 `--add-modules` 选项扩展根模块集以包含额外的模块。此选项的值是一个以逗号分隔的模块名称列表。此选项还有三个特殊值。


    *   `ALL-DEFAULT`：添加未命名模块的默认根模块集。

    *   `ALL-SYSTEM`：添加所有系统模块。

    *   `ALL-MODULE-PATH`：添加在模块路径上找到的所有可观察模块。


    ### 限制可观察模块


    可以使用 `--limit-modules` 选项来限制可观察模块。使用此选项后，可观察模块集是指定模块的传递闭包，再加上主模块以及通过 `--add-modules`
    选项指定的任何模块。此选项的值也是一个以逗号分隔的模块名称列表。


    ### 升级模块路径


    `--upgrade-module-path` 选项指定了升级模块路径。此路径包含可用于升级环境中内置模块的模块。此模块路径取代了现有的扩展机制（[`http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html`](http://docs.oracle.com/javase/8/docs/technotes/guides/extensions/index.html)）。


    系统模块是否可升级在 `module-info.java` 文件中有明确记录。例如，`java.xml.bind` 和 `java.xml.ws` 模块是可升级的。


    ### 增加可读性与打破封装


    模块系统完全关乎封装。但有时在处理遗留代码或运行测试时，你仍然希望打破封装。你可以使用几个命令行选项来打破封装。


    *   `--add-reads module=target-module(,target-module)*` 更新源模块以读取目标模块。目标模块可以是 `ALL-UNNAMED`，以读取所有未命名模块。

    *   `--add-exports module/package=target-module(,target-module)*` 更新源模块以将包导出到目标模块。这将从源模块向目标模块添加一个限定的包导出。目标模块可以是
    `ALL-UNNAMED`，以导出到所有未命名模块。

    *   `--add-opens module/package=target-module(,target-module)*` 更新源模块以向目标模块开放包。这将从源模块向目标模块添加一个限定的包开放。

    *   `--patch-module module=file(;file)*` 使用 JAR 文件或目录中的类和资源覆盖或增强模块。当你运行可能需要临时替换模块内容的测试时，`--patch-module`
    非常有用。


    现在我已经介绍了基本概念，让我们来讨论这些 JDK 工具。

    '
- fmt: '### `javac`


    `javac` supports the following options related to modules. Meanings of these options
    have been explained in earlier sections of this chapter.


    * `--module` or `-m`

    * `--module-path` or `-p`

    * `--module-source-path`

    * `--upgrade-module-path`

    * `--system`

    * `--module-version`

    * `--add-modules`

    * `--limit-modules`

    * `--add-exports`

    * `--add-reads`

    * `--patch-module`


    I’ll now use the modules discussed in the “Transitive Dependencies” as examples
    of how to use `javac`. Let’s say you have a directory that contains the source
    code of these three modules. Each module has its own subdirectory. You can compile
    a single module as shown here. Module C has no dependencies, so it can be compiled
    directly.


    ```

    $ javac -d ∼/Downloads/modules_output/C C/**/*.java

    ```


    To compile module B, you can use `-p` to provide the compiled module C since module
    B requires module C. You should also use `-p` when third-party libraries are required.


    ```

    $ javac -d ∼/Downloads/modules_output/B -p ∼/Downloads/modules_output B/**/*.java

    ```


    Since you have source code for all the modules, you can simply compile them all.


    ```

    $ javac -d ∼/Downloads/modules_output --module-source-path . **/*.java

    ```


    You can also compile a single module using `-m`. `--module-source-path` is required
    to specify the module source path when you’re using `-m`.


    ```

    $ javac -d ∼/Downloads/modules_output --module-source-path . -m B

    ```


    ### `jlink`


    To run Java applications, you need to have JRE or JDK installed first. As I mentioned
    earlier, before Java 9, there was no easy way to customize the JRE or JDK to include
    only necessary contents. Even a simple “Hello World” application requires the
    full-sized JRE to run. After JDK is modularized, however, it’s possible to create
    your own Java runtime image that only contains the system modules required by
    the application, which can reduce the size of the JRE image.


    You can use `jlink` to build a custom image. If you’re given a module `demo.simple`
    that has a class `test.Main`, you can use it to print out `Hello World!`. To build
    your image, create the modular JAR file `demo.simple-1.0.0.jar` and set the main
    class. Listing [2-21](#A459620_1_En_2_Chapter.html#Par146) shows the command you
    can use to create a custom image using `jlink`. The path `<module_dir>` contains
    the artifact of the module `demo.simple`. `<JDK_PATH>/jmods` is the path to JDK
    modules.


    ```

    $ jlink -p :/jmods \

    --add-modules demo.simple \

    --output  \

    --launcher simple=demo.simple

    Listing 2-21.

    Using jlink to Create Custom Images

    ```


    The `jlink` tool creates a new runtime image in the output directory. You can
    run the executable file `simple` in the `bin` directory to run your application.
    The size of this customized runtime image on macOS is only 36.5MB. Figure [2-1](#A459620_1_En_2_Chapter.html#Fig1)
    shows the content of the custom runtime image.


    ![A459620_1_En_2_Fig1_HTML.jpg](A459620_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Contents of the custom runtime image


    Table [2-3](#A459620_1_En_2_Chapter.html#Tab3) shows the options of `jlink`.


    Table 2-3. Options of `jlink`


    | Option | Description |

    | --- | --- |

    | `--module-path` or `-p` | See “Module Paths”. |

    | `--add-modules` | See “Root Modules”. |

    | `--output` | The output directory. |

    | `--launcher` | The launcher command to run a module or a main class in a module.
    If the module is created with `--main-class` to specify the main class, then using
    the module name is enough. Otherwise, the main class can be specified using `<module>/<mainclass>`.
    |

    | `--limit-modules` | See “Limiting the Observable Modules”. |

    | `--bind-services` | Performs the full service binding. |

    | `--compress=<0&#124;1&#124;2>` or `-c` | Enables compression. Possible values
    are `0`, `1`, and `2`. `0` means no compression, `1` means constant string sharing,
    and `2` means using ZIP compression. |

    | `--endian` | Byte order of the generated image. Possible values can be `little`
    or `big`. The default value is `native`. |

    | `--no-header-files` | Excludes header files in the image. |

    | `--no-man-pages` | Excludes man pages. |

    | `-G` or `--strip-debug` | Strip debug information. |

    | `--ignore-signing-information` | Suppresses the fatal error when linking signed
    module JAR files. The signature-related files of the signed module JAR files are
    not copied to the generated image. |

    | `--suggest-providers [name, ...]` | Suggests providers that implement the given
    service types. |

    | `--include-locales=langtag[,langtag]*` | Includes the list of locales. The module
    `jdk.localedata` must be added when using this option. |

    | `--exclude-files=pattern-list` | Excludes specified files. |

    | `--verbose` or `-v` | Enable verbose tracing output. |


    A major limitation of `jlink` is that it doesn’t support automatic modules, which
    means third-party libraries cannot be linked using `jlink`. For example, when
    you’re trying to use `jlink` to create an image for the sample application, it
    gives following error.


    ```

    Error: module-info.class not found for slf4j.api module

    ```


    From this error message, you know that it requires the `module-info.class` for
    the module `slf4j.api`, but the SLF4J library has not been migrated to Java 9
    yet, so you cannot include it in the image.


    ### `java`


    The `java` command supports the following options related to modules:


    * `--module-path` or `-p`

    * `--upgrade-module-path`

    * `--add-modules`

    * `--limit-modules`

    * `--list-modules`: Lists the observable modules.

    * `--describe-module` or `-d`: Describe the module.

    * `--validate-modules`: Validates all modules. Can be used to find conflicts and
    errors.

    * `--show-module-resolution`: Shows module resolution results during start.

    * `--add-exports`

    * `--add-reads`

    * `--add-opens`

    * `--patch-module`


    For the sample application, after using the Maven assembly plugin to copy all
    libraries and module artifacts into one directory, you can start the application
    using following command:


    ```

    $ java -p  -m io.vividcode.store.runtime/io.vividcode.store.runtime.Main

    ```


    If you record the main class in the module artifact, you can simply use `java
    -p <path> -m io.vividcode.store.runtime` to run the application.


    The `--list-modules` option is very useful when you’re debugging module resolution
    issues, because it can list all the observable modules. For example, you can use
    `java --list-modules` to list all JDK system modules. If you use `-p` to add module
    paths, the output also includes modules found in the module paths. The option
    `--show-module-resolution` is also very useful for solving module resolution issues.'
  raw: '### `javac`


    `javac` supports the following options related to modules. Meanings of these options
    have been explained in earlier sections of this chapter.


    *   `--module` or `-m`

    *   `--module-path` or `-p`

    *   `--module-source-path`

    *   `--upgrade-module-path`

    *   `--system`

    *   `--module-version`

    *   `--add-modules`

    *   `--limit-modules`

    *   `--add-exports`

    *   `--add-reads`

    *   `--patch-module`


    I’ll now use the modules discussed in the “Transitive Dependencies” as examples
    of how to use `javac`. Let’s say you have a directory that contains the source
    code of these three modules. Each module has its own subdirectory. You can compile
    a single module as shown here. Module C has no dependencies, so it can be compiled
    directly.


    ```

    $ javac -d ∼/Downloads/modules_output/C C/**/*.java

    ```


    To compile module B, you can use `-p` to provide the compiled module C since module
    B requires module C. You should also use `-p` when third-party libraries are required.


    ```

    $ javac -d ∼/Downloads/modules_output/B -p ∼/Downloads/modules_output B/**/*.java

    ```


    Since you have source code for all the modules, you can simply compile them all.


    ```

    $ javac -d ∼/Downloads/modules_output --module-source-path . **/*.java

    ```


    You can also compile a single module using `-m. --module-source-path` is required
    to specify the module source path when you’re using `-m`.


    ```

    $ javac -d ∼/Downloads/modules_output --module-source-path . -m B

    ```


    ### `jlink`


    To run Java applications, you need to have JRE or JDK installed first. As I mentioned
    earlier, before Java 9, there was no easy way to customize the JRE or JDK to include
    only necessary contents. Even a simple “Hello World” application requires the
    full-sized JRE to run. After JDK is modularized, however, it’s possible to create
    your own Java runtime image that only contains the system modules required by
    the application, which can reduce the size of the JRE image.


    You can use `jlink` to build a custom image. If you’re given a module `demo.simple`
    that has a class `test.Main`, you can use it to print out `Hello World!`. To build
    your image, create the modular JAR file `demo.simple-1.0.0.jar` and set the main
    class. Listing [2-21](#A459620_1_En_2_Chapter.html#Par146) shows the command you
    can use to create a custom image using `jlink`. The path `<module_dir>` contains
    the artifact of the module `demo.simple. <JDK_PATH>/jmods` is the path to JDK
    modules.


    ```

    $ jlink -p :/jmods \

    --add-modules demo.simple \

    --output  \

    --launcher simple=demo.simple

    Listing 2-21.

    Using jlink to Create Custom Images

    ```


    The `jlink` tool creates a new runtime image in the output directory. You can
    run the executable file `simple` in the `bin` directory to run your application.
    The size of this customized runtime image on macOS is only 36.5MB. Figure [2-1](#A459620_1_En_2_Chapter.html#Fig1)
    shows the content of the custom runtime image.


    ![A459620_1_En_2_Fig1_HTML.jpg](A459620_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Contents of the custom runtime image


    Table [2-3](#A459620_1_En_2_Chapter.html#Tab3) shows the options of `jlink`.


    Table 2-3.


    Options of `jlink`


    | Option | Description |

    | --- | --- |

    | `--module-path` or `-p` | See “Module Paths”. |

    | `--add-modules` | See “Root Modules”. |

    | `--output` | The output directory. |

    | `--launcher` | The launcher command to run a module or a main class in a module.
    If the module is created with `--main-class` to specify the main class, then using
    the module name is enough. Otherwise, the main class can be specified using `<module>/<mainclass>`.
    |

    | `--limit-modules` | See “Limiting the Observable Modules”. |

    | `--bind-services` | Performs the full service binding. |

    | `--compress=<0&#124;1&#124;2>` or `-c` | Enables compression. Possible values
    are `0`, `1`, and `2\. 0` means no compression, `1` means constant string sharing,
    and `2` means using ZIP compression. |

    | `--endian` | Byte order of the generated image. Possible values can be `little`
    or `big`. The default value is `native`. |

    | `--no-header-files` | Excludes header files in the image. |

    | `--no-man-pages` | Excludes man pages. |

    | `-G` or `--strip-debug` | Strip debug information. |

    | `--ignore-signing-information` | Suppresses the fatal error when linking signed
    module JAR files. The signature-related files of the signed module JAR files are
    not copied to the generated image. |

    | `--suggest-providers [name, ...]` | Suggests providers that implement the given
    service types. |

    | `--include-locales=langtag[,langtag]*` | Includes the list of locales. The module
    `jdk.localedata` must be added when using this option. |

    | `--exclude-files=pattern-list` | Excludes specified files. |

    | `--verbose` or `-v` | Enable verbose tracing output. |


    A major limitation of `jlink` is that it doesn’t support automatic modules, which
    means third-party libraries cannot be linked using `jlink`. For example, when
    you’re trying to use `jlink` to create an image for the sample application, it
    gives following error.


    ```

    Error: module-info.class not found for slf4j.api module

    ```


    From this error message, you know that it requires the `module-info.class` for
    the module `slf4j.api`, but the SLF4J library has not been migrated to Java 9
    yet, so you cannot include it in the image.


    ### `java`


    The `java` command supports the followin g options related to modules:


    *   `--module-path` or `-p`

    *   `--upgrade-module-path`

    *   `--add-modules`

    *   `--limit-modules`

    *   `--list-modules`: Lists the observable modules.

    *   `--describe-module` or `-d`: Describe the module.

    *   `--validate-modules`: Validates all modules. Can be used to find conflicts
    and errors.

    *   `--show-module-resolution`: Shows module resolution results during start.

    *   `--add-exports`

    *   `--add-reads`

    *   `--add-opens`

    *   `--patch-module`


    For the sample application, after using the Maven assembly plugin to copy all
    libraries and module artifacts into one directory, you can start the application
    using following command:


    ```

    $ java -p  -m io.vividcode.store.runtime/io.vividcode.store.runtime.Main

    ```


    If you record the main class in the module artifact, you can simply use `java
    -p <path> -m io.vividcode.store.runtime` to run the application.


    The `--list-modules` option is very useful when you’re debugging module resolution
    issues, because it can list all the observable modules. For example, you can use
    `java --list-modules` to list all JDK system modules. If you use `-p` to add module
    paths, the output also includes modules found in the module paths. The option
    `--show-module-resolution` is also very useful for solving module resolution issues.'
