    A subscriber only receives items after requesting them. The method `request(long
    n)` makes a demand of the publisher to indicate that the subscriber is ready to
    handle `n` items. This is important because it makes sure the subscriber is not
    overwhelmed by the publisher. The subscriber may receive fewer items than requested
    if the publisher terminates earlier. After the `cancel()` method is invoked, the
    subscriber may still receive additional notifications, but the subscription will
    be eventually cancelled.


