    exports com.fasterxml.jackson.core.util;

    provides com.fasterxml.jackson.core.JsonFactory with

    com.fasterxml.jackson.core.JsonFactory;

    }

    Listing 2-25.

    Generated module-info.java of jackson-core-2.8.7.jar

    ```


    ## Module Java API


    When the JVM starts, it resolves the application’s main module against the observable
    modules. The result of this resolution process is a readability graph, which is
    a directed graph with nodes representing resolved modules and edges representing
    the readability among the modules. Then the JVM creates a module layer, which
    consists of runtime modules defined from those resolved modules. The module system
    has Java API for applications to interact with it.'
  trans: '

    ### `jdeps`


    你可以使用 `jdeps` 工具来分析指定模块的依赖关系。以下命令会打印出 `io.vividcode.store.runtime` 的模块描述符、分析后得到的模块依赖关系，以及经过传递缩减后的依赖图；参见清单
    2-22。它还会识别出任何未使用的限定导出。


    ```

    $ jdeps --module-path  --check io.vividcode.store.runtime

    ```


    ```

    io.vividcode.store.runtime (file:////runtime-1.0.0-SNAPSHOT.jar)

    [模块描述符]

    requires io.vividcode.store.filestore;

    requires io.vividcode.store.product.persistence;

    requires mandated java.base (@9);

    requires slf4j.simple;

    [为 io.vividcode.store.runtime 建议的模块描述符]

    requires io.vividcode.store.common;

    requires io.vividcode.store.product;

    requires io.vividcode.store.product.persistence;

    requires mandated java.base;

    [io.vividcode.store.runtime 的传递缩减图]

    requires io.vividcode.store.product.persistence;

    requires mandated java.base;

    清单 2-22.

    使用 --check 选项的 jdeps 输出

    ```


    要使用 `--check` 选项，你需要先知道模块名称。如果你只有一个 JAR 文件，可以使用 `--list-deps` 选项或 `--list-reduced-deps`
    选项。


    ```

    $ jdeps --module-path  --list-deps /runtime-1.0.0-SNAPSHOT.jar

    ```


    清单 2-23 展示了此命令的输出。


    ```

    io.vividcode.store.common

    io.vividcode.store.product

    io.vividcode.store.product.persistence

    java.base

    清单 2-23.

    使用 --list-deps 选项的 jdeps 输出

    ```


    `--list-deps` 和 `--list-reduced-deps` 的区别在于，使用 `--list-reduced-deps` 选项的结果不包含模块图中的隐式读取边。


    ```

    $ jdeps --module-path  --list-reduced-deps /runtime-1.0.0-SNAPSHOT.jar

    ```


    清单 2-24 展示了此命令的输出。


    ```

    io.vividcode.store.product.persistence

    清单 2-24.

    使用 --list-reduced-deps 选项的 jdeps 输出

    ```


    `jdeps` 的另一个便捷功能是，它可以生成 graphviz（[`http://graphviz.org/`](http://graphviz.org/)）DOT
    文件，以便在图表中可视化模块依赖关系。


    ```

    $ jdeps --module-path  \

    --dot-output  -m io.vividcode.store.runtime

    ```


    输出目录包含一个用于所有模块的 DOT 文件 `summary.dot` 和一个用于该模块的 DOT 文件 `io.vividcode.store.runtime.dot`。然后，你可以使用以下命令将
    DOT 文件转换为 PNG 文件。请确保你已先安装 graphviz。


    ```

    $ dot -Tpng /summary.dot -o /summary.png

    ```


    你也可以使用 `jdeps` 处理多个 JAR 文件，以生成整个项目的模块依赖关系图。生成的 DOT 文件 `summary.dot` 包含所有模块。对于示例应用程序，使用
    Maven 将所有模块工件和第三方库复制到不同的目录中。你可以使用 Maven 的依赖插件轻松完成此操作。然后，你可以使用以下命令生成 DOT 文件。（`<third_party-libs-path>`
    是第三方库的路径，而 `<modules_path>` 是模块工件的路径。）


    ```

    $jdeps --module-path  \

    --dot-output  \

    /*.jar

    ```


    然后，你可以将文件 `summary.dot` 转换为 PNG 文件，生成的模块依赖关系图见图 2-2。


    ![A459620_1_En_2_Fig2_HTML.jpg](img/A459620_1_En_2_Fig2_HTML.jpg)


    图 2-2.


    生成的模块依赖关系图


    `jdeps` 还可以从 JAR 文件生成模块声明文件 `module-info.java`。选项 `--generate-module-info` 和 `--generate-open-module`
    分别用于普通模块和开放模块。例如，你可以使用以下命令为 `jackson-core-2.8.7.jar` 生成文件 `module-info.java`。


    ```

    $ jdeps --generate-module-info  /jackson-core-2.8.7.jar

    ```


    生成的 `module-info.java` 如清单 2-25 所示。它简单地导出了所有包并添加了服务提供者。在将遗留 JAR 文件迁移到 Java 9 模块时，你可以将生成的
    `module-info.java` 文件作为起点。


    ```

    module jackson.core {

    exports com.fasterxml.jackson.core;

    exports com.fasterxml.jackson.core.base;

    exports com.fasterxml.jackson.core.filter;

    exports com.fasterxml.jackson.core.format;

    exports com.fasterxml.jackson.core.io;

    exports com.fasterxml.jackson.core.json;

    exports com.fasterxml.jackson.core.sym;

    exports com.fasterxml.jackson.core.type;

    exports com.fasterxml.jackson.core.util;

    provides com.fasterxml.jackson.core.JsonFactory with

    com.fasterxml.jackson.core.JsonFactory;

    }

    清单 2-25.

    jackson-core-2.8.7.jar 生成的 module-info.java

    ```


    ## 模块 Java API


    当 JVM 启动时，它会针对可观察模块解析应用程序的主模块。此解析过程的结果是一个可读性图，这是一个有向图，其节点表示已解析的模块，边表示模块之间的可读性。然后，JVM
    创建一个模块层，该层由从这些已解析模块定义的运行时模块组成。模块系统提供了 Java API，供应用程序与之交互。

    '
- fmt: '### `ModuleFinder`


    Let’s start with the module resolution process. To resolve a module, you first
    need to find the module definition. The interface `ModuleFinder` is responsible
    for locating modules. There are three different ways to create instances of `ModuleFinder`
    with static methods in `ModuleFinder`; see Table [2-4](#A459620_1_En_2_Chapter.html#Tab4).


    Table 2-4. Static Methods of `ModuleFinder`


    | Method | Description |

    | --- | --- |

    | `ofSystem()` | Creates a `ModuleFinder` that locates system modules |

    | `of(Path… entries)` | Creates a `ModuleFinder` that locates modules on the file
    system by searching a sequence of paths specified by `entries` |

    | `compose(ModuleFinder... finders)` | Creates a `ModuleFinder` by composing a
    sequence of zero or more `ModuleFinder`s |


    Once a `ModuleFinder` is created, you can use its method `Optional<ModuleReference>
    find(String name)` to find a module by name. The class `ModuleReference` is a
    reference to the module’s contents. The method `Set<ModuleReference> findAll()`
    returns a set that contains all `ModuleReference`s that can be located by this
    `ModuleFinder` object. Normally you don’t need to use `ModuleFinder`s directly,
    but you should use them to create configurations for readability graphs.


    The modules located by `ModuleFinder`s are represented as `ModuleReference`. Table
    [2-5](#A459620_1_En_2_Chapter.html#Tab5) shows the methods of `ModuleReference`.


    Table 2-5. Methods of `ModuleReference`


    | Method | Description |

    | --- | --- |

    | `ModuleDescriptor descriptor()` | Returns the `ModuleDescriptor` that describes
    the module |

    | `Optional<URI> location()` | Returns the location of the module’s content as
    a `URI` |

    | `ModuleReader open()` | Opens the module’s content for reading |


    Listing [2-26](#A459620_1_En_2_Chapter.html#Par197) shows a helper class to create
    `ModuleFinder` and `ModuleReference` objects. The `ModuleFinder` object finds
    modules in the resource path `/modules`. This path contains module artifacts of
    the sample application. The method `getModuleReference()` uses the `ModuleFinder`
    to find a `ModuleReference` by name. Since I am sure that the module to find must
    exist, here I simply use the method `get()` of the returned `Optional<ModuleReference>`
    to retrieve the `ModuleReference` directly.


    ```

    public class ModuleTestSupport {

    public static final String MODULE_NAME = "io.vividcode.store.common";

    public static ModuleFinder getModuleFinder() throws URISyntaxException {

    return ModuleFinder.of(

    Paths.get(

    ModuleDescriptorTest.class.getResource("/modules").toURI()));

    }

    public static ModuleReference getModuleReference() throws URISyntaxException {

    return getModuleFinder().find(MODULE_NAME).get();

    }

    }

    Listing 2-26.

    Support Class for Module Tests

    ```


    Listing [2-27](#A459620_1_En_2_Chapter.html#Par199) is the test of `ModuleFinder`.
    Here I verify the results of methods `find()` and `findAll()`.


    ```

    public class ModuleFinderTest {

    @Test

    public void testFindModule() throws Exception {

    final ModuleFinder moduleFinder = ModuleTestSupport.getModuleFinder();

    assertTrue(moduleFinder.find(ModuleTestSupport.MODULE_NAME).isPresent());

    final Set allModules = moduleFinder.findAll();

    assertEquals(4, allModules.size());

    }

    }

    Listing 2-27.

    ModuleFinder Test

    ```


    ### `ModuleDescriptor`


    From the `ModuleReference`, you can get the `ModuleDescriptor` that describes
    modules. Table [2-6](#A459620_1_En_2_Chapter.html#Tab6) shows the methods of `ModuleDescriptor`.


    Table 2-6. Methods of `ModuleDescriptor`


    | Method | Description |

    | --- | --- |

    | `Set<ModuleDescriptor.Exports> exports()` | Returns the set of `ModuleDescriptor.Exports`
    that represent the exported packages |

    | `Set<ModuleDescriptor.Opens> opens()` | Returns the set of `ModuleDescriptor.Opens`
    that represent the open packages. |

    | `Set<ModuleDescriptor.Requires> requires()` | Returns the set of `ModuleDescriptor.Requires`
    that represent the module’s dependencies |

    | `Set<ModuleDescriptor.Provides> provides()` | Returns the set of `ModuleDescriptor.Provides`
    that represent services provided by this module |

    | `Set<String> uses()` | Returns the set of services this module uses |

    | `String name()` | Returns the module’s name |

    | `Optional<String> mainClass()` | Returns the module’s main class |

    | `Set<ModuleDescriptor.Modifier> modifiers()` | Returns the set of `ModuleDescriptor.Modifier`
    that represent module modifiers |

    | `boolean isAutomatic()` | Checks if the module is automatic |

    | `boolean isOpen()` | Checks if the module is open |

    | `Optional<ModuleDescriptor.Version> version()` | Returns the module’s version
    |


    In Listing [2-28](#A459620_1_En_2_Chapter.html#Par202), I use a test to verify
    various information retrieved from the `ModuleDescriptor`.


    ```

    public class ModuleDescriptorTest {

    @Test

    public void testModuleDescriptor() throws Exception {

    final ModuleReference reference = ModuleTestSupport.getModuleReference();

    assertNotNull(reference);

    final ModuleDescriptor descriptor = reference.descriptor();

    assertEquals(ModuleTestSupport.MODULE_NAME, descriptor.name());

    assertFalse(descriptor.isAutomatic());

    assertFalse(descriptor.isOpen());

    assertEquals(1, descriptor.exports().size());

    assertEquals(2, descriptor.packages().size());

    assertTrue(descriptor.requires().stream().map(Requires::name)

    .anyMatch(Predicate.isEqual("jackson.core")));

    assertTrue(descriptor.uses().isEmpty());

    assertTrue(descriptor.provides().isEmpty());

    }

    }

    Listing 2-28.

    ModuleDescriptor Test

    ```


    The methods in Table [2-6](#A459620_1_En_2_Chapter.html#Tab6) are used to query
    information of existing `ModuleDescriptor` objects. To create `ModuleDescriptor`
    objects, you can either use the builder class `ModuleDescriptor.Builder`, or read
    from the binary form of module descriptors. The static methods `newModule(String
    name)`, `newOpenModule(String name)`, and `newAutomaticModule(String name)` can
    create `ModuleDescriptor.Builder` objects to build a normal, open, and automatic
    module, respectively. `ModuleDescriptor.Builder` has different methods to programmatically
    configure various components of a module descriptor. Listing [2-29](#A459620_1_En_2_Chapter.html#Par205)
    shows a simple test of `ModuleDescriptor.Builder`.


    The static method `read()` has different overloads to read the binary form of
    a module declaration from an `InputStream` or a `ByteBuffer`. It’s possible that
    the binary form doesn’t include a set of packages in the module, if it doesn’t,
    you can pass an extra argument of type `Supplier<Set<String>>` to provide the
    packages.


    ```

    @Test

    public void testModuleDescriptorBuilder() {

    final ModuleDescriptor descriptor = ModuleDescriptor.newModule("demo")

    .exports("demo.api")

    .exports("demo.common")

    .mainClass("demo.Main")

    .version("1.0.0")

    .build();

    assertEquals(2, descriptor.exports().size());

    assertTrue(descriptor.mainClass().isPresent());

    assertEquals("demo.Main", descriptor.mainClass().get());

    assertTrue(descriptor.version().isPresent());

    assertEquals("1.0.0", descriptor.version().get().toString());

    }

    Listing 2-29.

    ModuleDescriptor.Builder Test

    ```'
