    ## Access Modes


    To understand different variable access modes, you first need to understand memory
    ordering.


    ### Memory Ordering


    The access modes of variable handles are compatible with C/C++11 atomics ( [`http://en.cppreference.com/w/cpp/atomic`](http://en.cppreference.com/w/cpp/atomic)
    ). Table [8-1](#A459620_1_En_8_Chapter.html#Tab1) shows the different memory orderings
    supported by access modes.


    Table 8-1.


    Memory Orderings


    | Memory Ordering | Access | Description |

    | --- | --- | --- |

    | plain | read/write | The same memory semantics as non`volatile`, which has no
    special memory ordering effects with respect to other threads. Only atomic for
    references and for primitive values of, at most, 32 bits. |

    | volatile | read/write | The same memory semantics as Java `volatile`. |

    | opaque | read/write | No assurance of memory ordering effects with respect to
    other threads. Only atomic with respect to accesses to the same variable. |

    | acquire | read | Ensures that subsequent loads and stores are not reordered
    before this access; compatible with C/C++11 `memory_order_acquire` ordering. |

    | release | write | Ensures that prior loads and stores are not reordered after
    this access; compatible with C/C++11 `memory_order_release` ordering. |


    Note


    For more details about C/C++11 `acquire` and `release` memory ordering, see [`http://en.cppreference.com/w/cpp/atomic/memory_order#Release-Acquire_ordering`](http://en.cppreference.com/w/cpp/atomic/memory_order#Release-Acquire_ordering)
    .


    These memory orderings are used as the suffix of access modes to specify the memory
    ordering effects of these modes. For example, `GET_AND_ADD_ACQUIRE` has the memory
    ordering `acquire` for the read access.


    ### VarHandle Methods


    Thirty-one access modes are defined in the enum `VarHandle.AccessMode`. For each
    access mode, there is a corresponding method in `VarHandle` that you need to use
    with this access mode. For example, for the access mode `GET_AND_ADD`, the method
    in `VarHandle` is `getAndAdd()`.


    #### Signature Polymorphic


    The methods for access modes in `VarHandle` are signature polymorphic. Even though
    all these methods have the same signature of `Object methodName(Object... args)`,
    a runtime check is done to make sure the runtime types of arguments match the
    requirements of the access modes. If the argument matching fails, JVM throws a
    `java.lang.invoke.WrongMethodTypeException`. Because the compiler doesn’t check
    the arity and types of arguments statically, it’s the developers’ responsibility
    to make sure that the correct number of arguments with the correct types are passed
    when invoking those methods.


    The list of arguments consists of between zero and many objects of coordinate
    types and optional arguments that are required by different access modes:


    *   These coordinate types are used to locate the variable you want to access.
    For example, when accessing an element in the array, the coordinate types are
    the type of the array and the type of the array index. You can use the method
    `List<Class<?>> coordinateTypes()` of `VarHandle` to get the list of coordinate
    types.

    *   Different access modes may require extra arguments. For example, the method
    `compareAndSet()` requires the expected value to compare and the new value to
    set.


    These access modes can be grouped into five categories: read access, write access,
    atomic update, numeric atomic update, and bitwise atomic update. The class `HandleTarget`
    in Listing [8-4](#A459620_1_En_8_Chapter.html#Par19) contains different static
    variables for testing. I’ll use these variables in following sections.


    ```

    public class HandleTarget {

    public int count = 1;

    public String[] names = new String[]{"Alex", "Bob", "David"};

    public byte[] data = new byte[]{1, 0, 0, 0, 1, 0, 0, 0};

    public ByteBuffer dataBuffer = ByteBuffer.wrap(this.data);

    }

    Listing 8-4.

    HandleTarget for Testing

    ```


    Now let’s discuss all five categories of methods.


    #### Read Access


    This category includes the `get()`, `getVolatile()`, `getOpaque()`, and `getAcquire()`
    methods with memory ordering effects specified by the suffix. The method `get()`
    has th e plain memory ordering effect (see Table [8-1](#A459620_1_En_8_Chapter.html#Tab1)).
    Listing [8-5](#A459620_1_En_8_Chapter.html#Par22) shows the usage of different
    read access methods. The variable handle `varHandle` references the variable `count`
    in the class `HandleTarget` of Listing [8-4](#A459620_1_En_8_Chapter.html#Par19).
    Because the test case is not multithreaded, all these read access modes return
    the same result.


    ```

