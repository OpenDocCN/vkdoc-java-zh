  raw: '## Thread.onSpinWait


    When you’re using a thread to run a task, it’s common to have the task wait for
    certain condition before it can continue. You usually do this by using a `volatile`
    variable as the flag. This flag is set by another thread to stop the waiting.
    Before Java 9, you used an empty loop to wait for the condition. The new static
    method `onSpinWait()` of class `Thread` in Java 9 can make the waiting more efficient.


    Listing [10-7](#A459620_1_En_10_Chapter.html#Par39) shows an example of `Thread.onSpinWait()`.
    Classes `NormalTask` and `SpinWaitTask` both use the `volatile` Boolean variable
    `canStart` as the flag. The flag is set to `true` using the method `start()`.
    The different between these two classes is that `SpinWaitTask` uses `Thread.onSpinWait()`
    in the loop. Here I use another thread to call the method `start()` after three
    seconds to stop the waiting.


    ```

    public class ThreadOnSpinWait {

    public static void main(final String[] args) throws InterruptedException {

    final NormalTask task1 = new NormalTask();

    final SpinWaitTask task2 = new SpinWaitTask();

    final Thread thread1 = new Thread(task1);

    thread1.start();

    final Thread thread2 = new Thread(task2);

    thread2.start();

    new Thread(() -> {

    try {

    Thread.sleep(3000);

    } catch (final InterruptedException e) {

    e.printStackTrace();

    } finally {

    task1.start();

    task2.start();

    }

    }).start();

    thread1.join();

    thread2.join();

    }

    private abstract static class Task implements Runnable {

    volatile boolean canStart;

    void start() {

    this.canStart = true;

    }

    }

    private static class NormalTask extends Task {

    @Override

    public void run() {

    while (!this.canStart) {

    }

    System.out.println("Done!");

    }

    }

    private static class SpinWaitTask extends Task {

    @Override

    public void run() {

    while (!this.canStart) {

    Thread.onSpinWait();

    }

    System.out.println("Done!");

    }

    }

    }

    Listing 10-7.

    Example of Thread.onSpinWait()

    ```


    ## Summary


    In this chapter, we discussed changes related to concurrency in Java 9, including
    asynchronous task execution and timeout support in `CompletableFuture`, new methods
    added to queues and atomic classes, and the new method `Thread.onSpinWait()`.
    In the next chapter, we’ll discuss changes in the JavaScript engine Nashorn.


    # 11. Nashorn


    Nashorn ( [`http://openjdk.java.net/projects/nashorn/`](http://openjdk.java.net/projects/nashorn/)
    ) is the JavaScript engine that was introduced in Java 8 to replace the old engine
    based on Mozilla Rhino. In Java 8 Nashorn was based on ECMAScript 5\. Some new
    features of ECMAScript 6 have already been implemented in the Nashorn engine in
    Java 9\. The Nashorn-related API is in the module `jdk.scripting.nashorn`.


    ## Getting the Nashorn Engine


    You can use the JSR 223 ( [`https://www.jcp.org/en/jsr/detail?id=223`](https://www.jcp.org/en/jsr/detail?id=223)
    ) `ScriptEngine` to get the Nashorn engine; see Listing [11-1](#A459620_1_En_11_Chapter.html#Par3).
    The expression `new ScriptEngineManager().getEngineByName("Nashorn")` is the standard
    way to get an instance of the Nashorn `ScriptEngine`. However, the created `ScriptEngine`
    is only for ECMAScript 5\. You need to pass the extra argument `--language=es6`
    to enable ECMAScript 6 features. Listing [11-1](#A459620_1_En_11_Chapter.html#Par3)
    shows you how to use the class `NashornScriptEngineFactory` directly to create
    the `ScriptEngine` for ECMAScript 6.


    ```

    public class NashornTest {

    private final ScriptEngine es5Engine =

    new ScriptEngineManager().getEngineByName("Nashorn");

    private final ScriptEngine es6Engine =

    new NashornScriptEngineFactory().getScriptEngine("--language=es6");

    @Test

    public void testSimpleEval() throws Exception {

    assertEquals(2, es5Engine.eval("1 + 1"));

    }

    }

    Listing 11-1.

    Creating the Nashorn ScriptEngine

    ```


    You can also use the `jjs` tool to try out ECMAScript 6’s new features.


    ```

    $ jjs --language=es6

    ```


    ## ECMAScript 6 Features


    The following sections show ECMAScript 6’s features that are supported by Nashorn
    in Java 9.


    ### Template Strings


    Nashorn supports the ECMAScript 6 template strings ( [`https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/template_strings`](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/template_strings)
    ), untagged and tagged; see Listing [11-2](#A459620_1_En_11_Chapter.html#Par8).


    ```

    @Test

    public void testTemplateString() throws Exception {

    final Bindings bindings = new SimpleBindings();

    bindings.put("name", "Alex");

    final Object result = this.es6Engine.eval("Hello ${name}", bindings);

    assertEquals("Hello Alex", result);

    }

    Listing 11-2.

    Template Strings

    ```


    ### Binary and Octal Literals


    Nashorn also supports binary (`b`) and octal (`o`) literals; see Listing [11-3](#A459620_1_En_11_Chapter.html#Par10).


    ```

    @Test

    public void testBinaryAndOctalLiterals() throws Exception {

    assertEquals(503, this.es6Engine.eval("0b111110111"));

    assertEquals(503, this.es6Engine.eval("0o767"));

    }

    Listing 11-3.

    Binary and Octal Literals

    ```


