    ## `Configuration`


    The readability graph is represented as an object of the class `java.lang.module.Configuration`.
    A configuration may have parent configurations. Configurations can be organized
    in a hierarchy. `Configuration` has methods to create and query the readability
    graph.


    `Configuration`s are created using the methods `resolve()` and `resolveAndBind()`.
    Both methods return a new `Configuration` object representing the result of module
    resolution. `Configuration` also has static versions of these two methods. For
    static methods, you need to provide the parameter of type `List<Configuration>`
    as the parent configurations of the created `Configuration`. For instance methods,
    the current `Configuration` is the only parent configuration of the created `Configuration`.
    The following are the methods you need to create `Configuration`s:


    *   `Configuration resolve(ModuleFinder before, ModuleFinder after, Collection<String>
    roots)`

    *   `Configuration resolveAndBind(ModuleFinder before, ModuleFinder after, Collection<String>
    roots)`

    *   `static Configuration resolve(ModuleFinder before, List<Configuration> parents,
    ModuleFinder after, Collection<String> roots)`

    *   `static Configuration resolveAndBind(ModuleFinder before, List<Configuration>
    parents, ModuleFinder after, Collection<String> roots)`


    The method `resolveAndBind()` takes the same parameters as the method `resolve()`.
    The difference is that the resolved modules of `resolveAndBind()` also includes
    modules introduced by service dependencies.


    The following are the possible parameters of the preceding methods:


    *   `roots`: The list of root module names.

    *   `parents`: The list of parent configurations.

    *   `before` and `after`: Two `ModuleFinder`s to locate modules. The `ModuleFinder
    before` is used to locate root modules. If a module cannot be found, parent configurations
    are used to locate it using the method `findModule()`. If the module still cannot
    be found, then the `ModuleFinder after` is used to locate it. Transitive dependencies
    are located following the same search order.


    When a root module or transitive dependency is located in a parent configuration,
    the resolution process ends for this module and the module is not included in
    the resulting configuration.


    Listing [2-31](#A459620_1_En_2_Chapter.html#Par222) shows the example of creating
    a new `Configuration` by finding modules in the given path.


    ```

    public Configuration resolve(final Path path) {

    return Configuration.resolve(

    ModuleFinder.of(path),

    List.of(Configuration.empty()),

    ModuleFinder.ofSystem(),

    List.of("io.vividcode.store.runtime")

    );

    }

    Listing 2-31.

    Create New Configuration Objects Using resolve()

    ```


    The module resolution process may fail for various reasons. If a root module or
    a direct or transitive dependency, is not found, or any error occurs when trying
    to find a module, the methods `resolve()` and `resolveAndBind()` throw the `FindException`.
    After all modules have been found, the readability graph is computed, and the
    consistency of module exports and service use is checked. Consistency checks include
    checking for cyclic module dependencies, duplicate module reads, duplicate package
    exports, and invalid service use. `ResolutionException` is thrown when any consistency
    check fails.


