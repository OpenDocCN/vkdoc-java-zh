    ## Analyzing Function Complexity


    Now I’ll show you a complicated example using the parser API. Listing [11-10](#A459620_1_En_11_Chapter.html#Par27)
    shows the class `FunctionLengthAnalyzer` that analyzes the length of functions
    in the source code. I add visitors for `FunctionDeclarationTree` and `FunctionExpressionTree`.
    To measure the length of a function, I first get the start and end character offset
    of the function body in the source code using the methods `getStartPosition()`
    and `getEndPosition()`, respectively. Then I calculate the number of characters
    in the method body by subtracting these two offsets. For `FunctionExpressionTree`
    nodes, the function can be anonymous, so I create a name for these anonymous functions.
    Here I analyze the source code of jQuery 3.


    ```

