    The method `MethodHandle iteratedLoop(MethodHandle iterator, MethodHandle init,
    MethodHandle body)` creates a method handle representing a loop that iterates
    over the values produced by an `Iterator<T>`. The method ha ndle `iterator` must
    return a value of type `Iterator<T>`. The usage of `iteratedLoop()` is similar
    with `countedLoop()`, except that the implicit loop variable is a value of type
    `T` instead of `int`. You can also use a second loop variable in `iteratedLoop()`.
    In Listing [9-8](#A459620_1_En_9_Chapter.html#Par35), I use `iteratedLoop()` to
    iterate a `Iterator<String>` from the list of `String`s to calculate the sum of
    the length of these `String`s.


    ```

    public class IteratedLoopTest {

    static int body(final int sum, final String value) {

    return sum + value.length();

    }

    @Test

    public void testIteratedLoop() throws Throwable {

    final MethodHandle iterator = MethodHandles.constant(

    Iterator.class,

    List.of("a", "bc", "def").iterator());

    final MethodHandle init = MethodHandles.zero(int.class);

    final MethodHandle body = MethodHandles

    .lookup()

    .findStatic(

    IteratedLoopTest.class,

    "body",

    MethodType.methodType(

    int.class,

    int.class,

    String.class));

