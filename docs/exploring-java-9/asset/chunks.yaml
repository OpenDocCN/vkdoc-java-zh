    ## 访问模式


    要理解不同的变量访问模式，首先需要理解内存排序。


    ### 内存排序


    变量句柄的访问模式与C/C++11原子操作（[`http://en.cppreference.com/w/cpp/atomic`](http://en.cppreference.com/w/cpp/atomic)）兼容。表[8-1](#A459620_1_En_8_Chapter.html#Tab1)展示了访问模式支持的不同内存排序。


    表8-1. 内存排序


    | 内存排序 | 访问类型 | 描述 |

    | --- | --- | --- |

    | `plain` | 读/写 | 与非`volatile`具有相同的内存语义，对其他线程没有特殊的内存排序效果。仅对引用和最多32位的原始值具有原子性。
    |

    | `volatile` | 读/写 | 与Java `volatile`具有相同的内存语义。 |

    | `opaque` | 读/写 | 不保证对其他线程的内存排序效果。仅对同一变量的访问具有原子性。 |

    | `acquire` | 读 | 确保后续的加载和存储操作不会重排到此访问之前；与C/C++11 `memory_order_acquire`排序兼容。
    |

    | `release` | 写 | 确保先前的加载和存储操作不会重排到此访问之后；与C/C++11 `memory_order_release`排序兼容。
    |


    注意


    关于C/C++11 `acquire`和`release`内存排序的更多细节，请参见[`http://en.cppreference.com/w/cpp/atomic/memory_order#Release-Acquire_ordering`](http://en.cppreference.com/w/cpp/atomic/memory_order#Release-Acquire_ordering)。


    这些内存排序用作访问模式的后缀，以指定这些模式的内存排序效果。例如，`GET_AND_ADD_ACQUIRE`对读访问具有`acquire`内存排序。


    ### `VarHandle`方法


    在枚举`VarHandle.AccessMode`中定义了三十一种访问模式。对于每种访问模式，`VarHandle`中都有一个对应的方法需要与该访问模式一起使用。例如，对于访问模式`GET_AND_ADD`，`VarHandle`中的方法是`getAndAdd()`。


    #### 签名多态性


    `VarHandle`中用于访问模式的方法是签名多态的。尽管所有这些方法都具有相同的签名`Object methodName(Object... args)`，但会在运行时进行检查，以确保参数的运行时类型符合访问模式的要求。如果参数匹配失败，JVM会抛出`java.lang.invoke.WrongMethodTypeException`。由于编译器不会静态检查参数的数量和类型，开发人员有责任确保在调用这些方法时传递了正确数量和正确类型的参数。


    参数列表由零到多个坐标类型对象以及不同访问模式所需的可选参数组成：


    *   这些坐标类型用于定位要访问的变量。例如，当访问数组中的元素时，坐标类型是数组的类型和数组索引的类型。可以使用`VarHandle`的`List<Class<?>>
    coordinateTypes()`方法获取坐标类型列表。

    *   不同的访问模式可能需要额外的参数。例如，`compareAndSet()`方法需要用于比较的期望值和用于设置的新值。


    这些访问模式可以分为五类：读访问、写访问、原子更新、数值原子更新和按位原子更新。清单[8-4](#A459620_1_En_8_Chapter.html#Par19)中的`HandleTarget`类包含用于测试的不同静态变量。我将在后续章节中使用这些变量。


    ```

    public class HandleTarget {

    public int count = 1;

    public String[] names = new String[]{"Alex", "Bob", "David"};

    public byte[] data = new byte[]{1, 0, 0, 0, 1, 0, 0, 0};

    public ByteBuffer dataBuffer = ByteBuffer.wrap(this.data);

    }

    Listing 8-4.

    HandleTarget for Testing

    ```


