    Table [10-1](#A459620_1_En_10_Chapter.html#Tab1) shows the new utilities methods
    of `CompletableFuture` that have been added in Java 9.


    Table 10-1.


    Utilities Methods of `CompletableFuture`


    | Method | Description |

    | --- | --- |

    | `<U> CompletableFuture<U> newIncompleteFuture()` | Returns a new incomplete
    `CompletableFuture` |

    | `Executor defaultExecutor()` | Returns the default `Executor` used for async
    methods |

    | `CompletableFuture<T> copy()` | Returns a new `CompletableFuture` that completes
    normally with the same value as this `CompletableFuture` or completes exceptionally
    with an exception thrown in this `CompletableFuture` as the cause |

    | `CompletionStage<T> minimalCompletionStage()` | Returns a new `CompletionStage`
    that can only be completed by this `CompletableFuture` |

    | `Executor delayedExecutor(long delay, TimeUnit unit, Executor executor)` | Returns
    a new `Executor` that submits tasks to the given executor after the given delay
    |

    | `Executor delayedExecutor(long delay, TimeUnit unit)` | Similar to the preceding
    method, but uses the default executor |

    | `<U> CompletionStage<U> completedStage(U value)` | Returns a new `CompletionStage`
    that is completed with the given value |

    | `<U> CompletionStage<U> failedStage(Throwable ex)` | Returns a new `CompletionStage`
    that is completed exceptionally with the given exception |

    | `<U> CompletableFuture<U> failedFuture(Throwable ex)` | Returns a new `CompletableFuture`
    that is completed exceptionally with the given exception |


