    | `Optional<ResolvedModule> findModule(String name)` | Finds a resolved module
    by name |

    | `Set<ResolvedModule> modules()` | Returns the set of all resolved modules in
    this configuration |


    For each `ResolvedModule`, the `reads()` method returns a set of `ResolvedModule`s
    that it reads; see Table [2-9](#A459620_1_En_2_Chapter.html#Tab9) for other methods.


