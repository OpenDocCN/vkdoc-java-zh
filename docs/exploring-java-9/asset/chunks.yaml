- fmt: "# empty\n\nThe method `MethodHandle.empty(MethodType type)` returns a method\
    \ handle that always returns the default value based on the return type of the\
    \ given `MethodType`. The returned method handle of `zero(type)` is actually equivalent\
    \ to `empty(MethodType.methodType(type))`. Listing [9-5](#A459620_1_En_9_Chapter.html#Par15)\
    \ shows how to use `empty()` for `int` and `String` types.\n\n```\n@Test\npublic\
    \ void testEmpty() throws Throwable {\n    assertEquals(0, MethodHandles.\n  \
    \      empty(MethodType.methodType(int.class)).invoke());\n    assertEquals(null,\
    \ MethodHandles.\n        empty(MethodType.methodType(String.class)).invoke());\n\
    }\nListing 9-5.\nExample of empty()\n```\n\n# Loops\n\n`MethodHandles` has new\
    \ static methods to create method handles representing different kinds of loops,\
    \ including `for` loops, `while` loops, and `do-while` loops.\n\n## loop\n\nThe\
    \ method `MethodHandle.loop(MethodHandle[]... clauses)` represents `for` loops.\
    \ It’s quite complicated to create `for` loops using this method. A loop is defined\
    \ by one or many clauses. A clause can specify up to four actions using method\
    \ handles.\n\n*   `init`: Initializes an iteration variable before the loop executes.\n\
    *   `step`: Updates the iteration variable when a clause executes. The return\
    \ value of this action is used as the updated value of the iteration variable.\n\
    *   `pred`: Executes a predicate to test for loop exit when a clause executes.\n\
    *   `fini`: Computes the loop’s return value if the loop exits.\n\nEach clause\
    \ can define its own iteration variable. Each iteration of the loop executes each\
    \ clause in order. The actions `step`, `pred`, and `fini` receive all iteration\
    \ variables as leading parameters. All these actions can also receive extra loop\
    \ parameters. These loop parameters are passed as arguments when invoking the\
    \ created `MethodHandle` and are available for all actions in all iterations.\
    \ For the actions `step`, `pred`, and `fini`, loop parameters come after the iteration\
    \ variables. The `init` action can only accept loop parameters.\n\nIn Listing\
    \ [9-6](#A459620_1_En_9_Chapter.html#Par24), `init()`, `step()`, `pred()`, and\
    \ `fini()` are methods used as actions in a clause. I only have one clause with\
    \ `MethodHandle`s for these methods when I’m using the method `loop()`. In the\
    \ `step` action, the variable `sum` is updated to add the value of iteration variable\
    \ `i`. The return value of `step` is used as the updated value of the iteration\
    \ variable `i`. In the `pred` action, the variable `k` is the loop parameter with\
    \ a value of `11`, which is provided when the created method handle `loop` is\
    \ invoked. I check the values of `i` and `k` for loop exit. In the `fini` action,\
    \ the value of `sum` is returned as the result of invoking the method handle `loop`.\
    \ Because each clause is represented as an array of `MethodHandle`s, I use the\
    \ helper method `getMethodHandle()` to get the `MethodHandle`s of those static\
    \ methods in the current class.\n\n```\npublic class ForLoopTest {\n    static\
    \ int sum = 0;\n    static int init() {\n        return 1;\n    }\n    static\
    \ int step(final int i) {\n        sum += i;\n        return i + 1;\n    }\n \
    \   static boolean pred(final int i, final int k) {\n        return i < k;\n \
    \   }\n    static int fini(final int i, final int k) {\n        return sum;\n\
    \    }\n    @Test\n    public void testLoop() throws Throwable {\n        final\
    \ MethodHandle init = getMethodHandle(\"init\",\n            MethodType.methodType(int.class));\n\
    \        final MethodHandle step = getMethodHandle(\"step\",\n            MethodType.methodType(int.class,\
    \ int.class));\n        final MethodHandle pred = getMethodHandle(\"pred\",\n\
    \            MethodType.methodType(boolean.class, int.class, int.class));\n  \
    \      final MethodHandle fini = getMethodHandle(\"fini\",\n            MethodType.methodType(int.class,\
    \ int.class, int.class));\n        final MethodHandle[] sumClause =\n        \
    \    new MethodHandle[]{init, step, pred, fini};\n        final MethodHandle loop\
    \ = MethodHandles.loop(sumClause);\n        assertEquals(55, loop.invoke(11));\n\
    \    }\n    private MethodHandle getMethodHandle(final String name,\n        final\
    \ MethodType methodType)\n        throws NoSuchMethodException, IllegalAccessException\
    \ {\n        return MethodHandles\n            .lookup()\n            .findStatic(ForLoopTest.class,\
    \ name, methodType);\n    }\n}\nListing 9-6.\nExample of loop()\n```\n\nIn Listing\
    \ [9-6](#A459620_1_En_9_Chapter.html#Par24), I use a static variable `sum` to\
    \ maintain the internal state. I cannot use loop parameters here because they\
