    ## Summary


    The introduction of the Reactive Streams specification to Java 9 is a big step
    toward embracing reactive programming principles in the Java platform. In this
    chapter, we discussed core interfaces in `Flow` and the built-in `SubmissionPublisher`.
    I also demonstrated the interoperability with the popular reactive libraries RxJava
    2 and Reactor. In the next chapter, we’ll discuss variable handles.


    # 8. Variable Handles


    A variable handle is a reference to a variable, or to a family of variables, including
    static fields, nonstatic fields, array elements, or components of an off-heap
    data structure. The concept of variable handles is similar to method handles.
    Variable handles are represented using the class `java.lang.invoke.VarHandle`.
    With variable handles, you can perform different operations on variables called
    access modes. All supported access modes are defined in the enum `VarHandle.AccessMode`.


    ## Creating Variable Handles


    `VarHandle` objects can be created using factory methods in the `java.lang.invoke.MethodHandles.Lookup`
    class. First you can get an instance of `MethodHandles.Lookup` using the method
    `MethodHandles.lookup()`, then you can use its methods to create `VarHandle` objects.


    ### findStaticVarHandle


    The method `VarHandle findStaticVarHandle(Class<?> decl, String name, Class<?>
    type)` returns a `VarHandle` that accesses a static field `name` of the given
    type declared in a type `decl`. In Listing [8-1](#A459620_1_En_8_Chapter.html#Par4),
    I create a `VarHandle` that accesses the static `int` field `staticVar` declared
    in the class `HandleTarget`.


    ```

    MethodHandles.lookup()

    .findStaticVarHandle(HandleTarget.class, "staticVar", int.class);

