    ## Loops


    `MethodHandles` has new static methods to create method handles representing different
    kinds of loops, including `for` loops, `while` loops, and `do-while` loops.


    ### loop


    The method `MethodHandle loop(MethodHandle[]... clauses)` represents `for` loops.
    It’s quite complicated to create `for` loops using this method. A loop is defined
    by one or many clauses. A clause can specify up to four actions using method handles.


    *   `init`: Initializes an iteration variable before the loop executes.

    *   `step`: Updates the iteration variable when a clause executes. The return
    value of this action is used as the updated value of the iteration variable.

    *   `pred`: Executes a predicate to test for loop exit when a clause executes.

    *   `fini`: Computes the loop’s return value if the loop exits.


    Each clause can define its own iteration variable. Each iteration of the loop
    executes each clause in order. The actions `step`, `pred`, and `fini` receive
    all iteration variables as leading parameters. All these actions can also receive
    extra loop parameters. These loop parameters are passed as arguments when invoking
    the created `MethodHandle` and are available for all actions in all iterations.
    For the actions `step`, `pred`, and `fini`, loop parameters come after the iteration
    variables. The `init` action can only accept loop parameters.


    In Listing [9-6](#A459620_1_En_9_Chapter.html#Par24), `init()`, `step()`, `pred()`,
    and `fini()` are methods used as actions in a clause. I only have one clause with
    `MethodHandle`s for these methods when I’m using the method `loop()`. In the `step`
    action, the variable `sum` is updated to add the value of iteration variable `i`.
    The return value of `step` is used as the updated value of the iteration variable
    `i`. In the `pred` action, the variable `k` is the loop parameter with a value
    of `11`, which is provided when the created method handle `loop` is invoked. I
    check the values of `i` and `k` for loop exit. In the `fini` action, the value
    of `sum` is returned as the result of invoking the method handle `loop`. Because
    each clause is represented as an array of `MethodHandle`s, I use the helper method
    `getMethodHandle()` to get the `MethodHandle`s of those static methods in the
    current class.


    ```

    public class ForLoopTest {

    static int sum = 0;

    static int init() {

    return 1;

    }

    static int step(final int i) {

    sum += i;

    return i + 1;

    }

    static boolean pred(final int i, final int k) {

    return i < k;

    }

    static int fini(final int i, final int k) {

    return sum;

    }

    @Test

    public void testLoop() throws Throwable {

    final MethodHandle init = getMethodHandle("init",

    MethodType.methodType(int.class));

    final MethodHandle step = getMethodHandle("step",

    MethodType.methodType(int.class, int.class));

    final MethodHandle pred = getMethodHandle("pred",

    MethodType.methodType(boolean.class, int.class, int.class));

    final MethodHandle fini = getMethodHandle("fini",

    MethodType.methodType(int.class, int.class, int.class));

    final MethodHandle[] sumClause =

    new MethodHandle[]{init, step, pred, fini};

    final MethodHandle loop = MethodHandles.loop(sumClause);

    assertEquals(55, loop.invoke(11));

    }

    private MethodHandle getMethodHandle(final String name,

    final MethodType methodType)

    throws NoSuchMethodException, IllegalAccessException {

    return MethodHandles

    .lookup()

    .findStatic(ForLoopTest.class, name, methodType);

    }

    }

