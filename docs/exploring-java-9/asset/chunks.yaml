    当你比较清单 15-1 和清单 15-2 中的列表时，可以看到新增了许多诊断命令。对于每个命令，你可以使用以下 `help` 命令查看帮助信息。


    ```

    $ jcmd 6239 help VM.info

    ```


    以下是这些新命令的简要说明：


    *   `JFR.configure`：配置 Java Flight Recorder

    *   `VM.log`：配置统一日志系统

    *   `VM.classloader_stats`：显示所有类加载器的统计信息

    *   `VM.stringtable`：显示 JVM 的 StringTable 统计信息

    *   `VM.symboltable`：显示 JVM 的 SymbolTable 统计信息

    *   `VM.print_touched_methods`：显示在此 JVM 生命周期内所有曾被触及的方法；需要选项 `-XX:+LogTouchedMethods`

    *   `VM.class_hierarchy`：显示所有已加载类的层次结构

    *   `VM.info`：显示 JVM 环境和状态信息

    *   `VM.dynlibs`：显示已加载的动态库

    *   `VM.set_flag`：设置 VM 标志

    *   `ManagementAgent.status`：显示管理代理的状态

    *   `Compiler.directives-`*：管理编译器指令

    *   `Compiler.codecache`：显示编译器代码缓存的布局和边界

    *   `Compiler.codelist`：显示代码缓存中所有存活的已编译方法

    *   `Compiler.queue`：显示排队等待编译的方法

    *   `JVMTI.data_dump`：通知 JVM 执行数据转储

    *   `JVMTI.agent_load`：加载 JVMTI 原生代理

    *   `GC.heap_info`：显示 Java 堆信息

    *   `GC.finalizer_info`：显示 Java 终结队列的信息。


    ## 移除 JVM TI hprof 代理


    `hprof` 代理是作为 JVM 工具接口的示例项目添加的，并非旨在成为生产工具。该代理已在 Java 9 中被移除。如果你想使用此代理提供的功能，应切换到其他
    Java 内置工具或第三方解决方案，详见表 15-2。


    表 15-2.


    `hprof` 代理的替代方案


    | 功能 | 替代工具 |

    | --- | --- |

    | 堆转储 | 诊断命令 `GC.heap_dump` 或 `jmap -dump` |

    | 分配分析器 | VisualVM |

    | CPU 分析器 | VisualVM 或 Flight Recorder |


    ### 移除 jhat 工具


    `jhat` 工具在 JDK 6 中引入，是一个用于堆可视化和分析的实验性且不受支持的工具。该工具已在 JDK 9 中被移除。


    ### 移除演示和示例


    虽然你可能没有注意到，但 JDK 实际上附带了一些演示和示例。然而，这些演示和示例已经过时且无人维护，因此已在 JDK 9 中被移除。

    '
- fmt: "# Javadoc\n\n`javadoc`工具支持在JDK 9中生成HTML5标记。当使用`-html5`选项时，`javadoc`会生成HTML5标记。HTML4仍然是默认的输出类型，但HTML5将在JDK\
    \ 10中成为默认选项。生成的HTML5标记使用语义化的结构性HTML5元素，包括`header`、`footer`和`nav`。它还实现了WAI-ARIA无障碍标准。\n\
    \n`javadoc`生成的文档中新增了一个搜索框。用户可以使用它来搜索程序元素以及索引的术语和短语。模块、包、类型和成员的名称都会被索引并可搜索。你可以使用新的`@index`标签将某个术语或短语标记为可搜索。\n\
    \n生成的文档已升级以包含模块。对于每个模块，文档会显示其模块依赖关系和导出的包。\n\n`javadoc`工具现在支持为多个模块生成文档。你可以使用`--module-source-path`选项提供模块的源代码，并使用`--module`选项指定要处理的模块。第三方库使用`-p`选项指定。在模块源目录中，每个子目录包含一个模块的源代码。子目录名称必须与模块名称一致；示例应用程序的源代码请参见图[15-1](#A459620_1_En_15_Chapter.html#Fig1)。模块源路径必须采用这种目录结构，否则`javadoc`无法找到模块。\n\
    \n![A459620_1_En_15_Fig1_HTML.jpg](A459620_1_En_15_Fig1_HTML.jpg)\n\n图15-1. Javadoc模块源路径的目录结构\n\
    \n例如，你可以使用以下命令为示例项目生成文档。`-d`选项指定输出目录，而`-link`选项链接Java内置API的文档。\n\n```\n$ javadoc\
    \ --module-source-path  \\\n-p  \\\n-d \n--module  \\\n-link https://docs.oracle.com/javase/9/docs/api/\n\
    ```\n\n由于示例应用程序是一个Maven项目，你需要使用额外的任务将所有模块的源代码复制到一个目录中，以便生成Javadoc。你可以通过使用Ant任务来完成此操作。你可以查看源代码了解其实现方式。\n\
    \n## 总结\n\n在本章中，我们讨论了与JVM相关的变更，包括统一日志系统、移除的GC组合、诊断命令、`javadoc`以及其他小改动。在下一章中，我们将讨论Java\
    \ 9中的其他几项小改动。\n\n# 16. 其他杂项\n\n本章涵盖了Java 9中的各种变更。\n\n## 小语言变更\n\nJava 9新增了一些小的语言变更。\n\
    \n### 私有接口方法\n\n现在可以在Java 9的接口中添加私有方法。清单[16-1](#A459620_1_En_16_Chapter.html#Par4)中的`SayHi`接口有一个私有方法`buildMessage()`，用于生成默认方法`sayHi()`中使用的默认消息。\n\
    \n```\npublic interface SayHi {\nprivate String buildMessage() {\nreturn \"Hello\"\
    ;\n}\nvoid sayHi(final String message);\ndefault void sayHi() {\nsayHi(buildMessage());\n\
    }\n}\n清单16-1. 私有接口方法\n```\n\n### 其他变更\n\nJava 9中还有其他一些变更：\n\n*   下划线（`_`）不能再用作标识符。这样做现在会导致编译错误。\n\
    *   `@SafeVarargs`现在可以用于私有实例方法。\n\n## 堆栈遍历API\n\n`java.lang.StackWalker`是Java\
    \ 9中新增的类，用于遍历堆栈跟踪，支持过滤和延迟访问。\n\n首先，使用静态方法`getInstance()`创建`StackWalker`的新实例。使用`getInstance()`时，可以传递一个或多个在枚举`StackWalker.Option`中定义的选项；参见表[16-1](#A459620_1_En_16_Chapter.html#Tab1)。你还可以传递遍历的估计深度。\n\
    \n表16-1. `getInstance()`的选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `RETAIN_CLASS_REFERENCE`\
    \ | 在`StackFrame`中保留`Class`对象 |\n| `SHOW_HIDDEN_FRAMES` | 显示所有隐藏的帧 |\n| `SHOW_REFLECT_FRAMES`\
    \ | 显示所有反射帧 |\n\n获取`StackWalker`实例后，你可以使用`<T> T walk(Function<? super Stream<StackWalker.StackFrame>,?\
    \ extends T> function)`方法遍历当前线程的堆栈帧。唯一的参数是一个函数，该函数应用于`StackWalker.StackFrames`流并返回一个值。当`walk()`方法返回时，流被关闭，无法再次使用。`StackWalker.StackFrame`有多种方法用于检索堆栈帧的信息；参见表[16-2](#A459620_1_En_16_Chapter.html#Tab2)。\n\
    \n表16-2. `StackWalker.StackFrame`的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `String\
    \ getClassName()` | 返回该方法声明类的二进制名称 |\n| `String getMethodName()` | 返回方法的名称 |\n\
    | `Class<?> getDeclaringClass()` | 返回该方法的声明`Class` |\n| `int getByteCodeIndex()`\
    \ | 返回包含执行点的`Code`属性中代码数组的索引 |\n| `String getFileName()` | 返回源文件的名称 |\n| `int\
    \ getLineNumber()` | 返回源代码行的行号 |\n| `boolean isNativeMethod()` | 如果方法是native方法，则返回`true`\
    \ |\n| `StackTraceElement toStackTraceElement()` | 返回`StackTraceElement` |\n\n\
    如果在创建`StackWalker`时没有传递`RETAIN_CLASS_REFERENCE`选项，则方法`getDeclaringClass()`会抛出`UnsupportedOperationException`。\n\
    \n在清单[16-3](#A459620_1_En_16_Chapter.html#Par16)中，我创建了一个带有`RETAIN_CLASS_REFERENCE`选项的`StackWalker`，这样我就可以使用`getDeclaringClass()`方法获取`Class`对象。这里我使用`getClassName()`获取类名，并将它们收集到一个`Set`中。我验证该集合应包含当前类`StackWalkingTest`。\n\
    \n```\npublic class StackWalkingTest {\n@Test\npublic void testWalkClass() throws\
    \ Exception {\nfinal StackWalker stackWalker =\nStackWalker.getInstance(Option.RETAIN_CLASS_REFERENCE);\n\
    final Set classNames = stackWalker.walk(stream ->\nstream.map(StackWalker.StackFrame::getClassName)\n\
    .collect(Collectors.toSet())\n);\nassertTrue(classNames.contains(\"StackWalkingTest\"\
    ));\n}\n}\n清单16-3. `StackWalker`中`walk()`的示例\n```\n\n如果我只需要遍历所有`StackFrame`并对每个帧执行操作，那么`void\
    \ forEach(Consumer<? super StackWalker.StackFrame> action)`方法比`walk()`更容易使用；参见清单[16-4](#A459620_1_En_16_Chapter.html#Par18)。\n\
    \n```\n@Test\npublic void testForEach() throws Exception {\nfinal StackWalker\
    \ stackWalker =\nStackWalker.getInstance(Set.of(Option.SHOW_HIDDEN_FRAMES,\nOption.SHOW_REFLECT_FRAMES));\n\
    stackWalker.forEach(stackFrame -> System.out.printf(\"%6d| %s -> %s %n\",\nstackFrame.getLineNumber(),\n\
    stackFrame.getClassName(),\nstackFrame.getMethodName()));\n}\n清单16-4. `StackWalker`中`forEach()`的示例\n\
    ```\n\n`StackWalker`还有一个`getCallerClass()`方法，它返回调用者的`Class`对象，即调用`getCallerClass()`的方法的调用者。`getCallerClass()`的描述看起来相当复杂且难以理解。实际上，这个方法对于处理类、类加载器和资源的实用方法非常有用。这些实用方法应该使用调用者的类来执行操作。"
  raw: "## Javadoc\n\nThe `javadoc` tool supports the generation of HTML5 markup in\
    \ JDK 9\\. When the option `-html5` is present, `javadoc` generates HTML5 markup.\
    \ HTML4 is still the default output type, but HTML5 will become the default in\
    \ JDK 10\\. The generated HTML5 markup uses semantic structural HTML5 elements,\
    \ including `header`, `footer`, and `nav`. It also implements the WAI-ARIA standard\
    \ for accessibility.\n\nA search box has been added to the documentation generated\
    \ by `javadoc`. Users can use it to search for program elements and indexed terms\
    \ and phrases. Names of modules, packages, types, and members are indexed and\
    \ searchable. You can use the new tag `@index` to mark a term or phrase as searchable.\n\
    \nThe generate documentations have been upgraded to include modules. For each\
    \ module, the documentation shows its module dependencies and exported packages.\n\
    \nThe tool `javadoc` now supports generating documentation for multiple modules.\
    \ You can provide the source code of modules using the option `--module-source-path`\
    \ and specify the modules to process using the option `--module`. Third-party\
    \ libraries are specified using the option `-p`. In the module source directory,\
    \ each subdirectory contains the source code of a module. The subdirectory name\
    \ must be the module name; see Figure [15-1](#A459620_1_En_15_Chapter.html#Fig1)\
    \ for the source code of the sample application. This directory structure for\
    \ the module source path is required, otherwise `javadoc` cannot find the modules.\n\
    \n![A459620_1_En_15_Fig1_HTML.jpg](A459620_1_En_15_Fig1_HTML.jpg)\n\nFigure 15-1.\n\
    \nDirectory structure of Javadoc module source path\n\nFor example, you can use\
    \ the following command to generate documentation for the example project. The\
    \ option `-d` specifies the output directory, while the option `-link` links documentations\
    \ of the Java built-in API.\n\n```\n$ javadoc --module-source-path  \\\n-p  \\\
    \n-d \n--module  \\\n-link https://docs.oracle.com/javase/9/docs/api/\n```\n\n\
    Because the sample application is a Maven project, you need to use an extra task\
    \ to copy the source code of all modules into one directory for Javadoc generation.\
    \ You do this by using an Ant task. You can check the source code to see how it’s\
    \ implemented.\n\n## Summary\n\nIn this chapter, we discussed changes related\
    \ to the JVM, including the unified logging system, removed GC combinations, diagnostic\
    \ commands, javadoc, and other small changes. In the next chapter, we’ll discuss\
    \ several other small changes in Java 9.\n\n# 16. Miscellaneous\n\nThis chapter\
    \ covers various changes in Java 9.\n\n## Small Language Changes\n\nJava 9 has\
    \ added some small language changes.\n\n### Private Interface Methods\n\nIt’s\
    \ now possible to add private methods to interfaces in Java 9\\. The interface\
    \ `SayHi` in Listing [16-1](#A459620_1_En_16_Chapter.html#Par4) has the private\
    \ method `buildMessage()` to generate the default message to use in the default\
    \ method `sayHi()`.\n\n```\npublic interface SayHi {\nprivate String buildMessage()\
    \ {\nreturn \"Hello\";\n}\nvoid sayHi(final String message);\ndefault void sayHi()\
    \ {\nsayHi(buildMessage());\n}\n}\nListing 16-1.\nPrivate Interface Methods\n\
    ```\n\n### Other Changes\n\nThere are a few other changes in Java 9:\n\n*   The\
    \ underscore (`_`) cannot be used as an identifier. Doing so now causes a compile\
    \ error.\n*   `@SafeVarargs` can now be used on private instance methods.\n\n\
    ## The Stack-Walking API\n\n`java.lang.StackWalker` is the new class in Java 9\
    \ to traverse stack traces that supports filtering and lazy access.\n\nYou start\
    \ by creating new instances of `StackWalker` using the static method `getInstance()`.\
    \ When using `getInstance()`, you can pass one or more options defined in the\
    \ enum `StackWalker.Option`; see Table [16-1](#A459620_1_En_16_Chapter.html#Tab1).\
    \ You can also pass an estimate depth of the traverse.\n\nTable 16-1.\n\nOptions\
    \ of `getInstance()`\n\n| Option | Description |\n| --- | --- |\n| `RETAIN_CLASS_REFERENCE`\
    \ | Retains the `Class` object in the `StackFrame` |\n| `SHOW_HIDDEN_FRAMES` |\
    \ Shows all hidden frames |\n| `SHOW_REFLECT_FRAMES` | Shows all reflection frames\
    \ |\n\nAfter you get an instance of `StackWalker`, you can traverse the stack\
    \ frames of the current thread using the method `<T> T walk(Function<? super Stream<StackWalker.StackFrame>,?\
    \ extends T> function)`. The only parameter is a function that applies to a stream\
    \ of `StackWalker.StackFrames` and returns a value. When the method `walk()` returns,\
    \ the stream is closed and cannot be used again. `StackWalker.StackFrame` has\
    \ different methods for retrieving information about the stack frame; see Table\
    \ [16-2](#A459620_1_En_16_Chapter.html#Tab2).\n\nTable 16-2.\n\nMethods of `StackWalker.`\
    \ `StackFrame`\n\n| Method | Description |\n| --- | --- |\n| `String getClassName()`\
    \ | Returns the binary name of the declaring class of the method |\n| `String\
    \ getMethodName()` | Returns the name of the method |\n| `Class<?> getDeclaringClass()`\
    \ | Returns the declaring `Class` of the method |\n| `int getByteCodeIndex()`\
    \ | Returns the index to the code array of the `Code` attribute containing the\
    \ execution point |\n| `String getFileName()` | Returns the name of the source\
    \ file |\n| `int getLineNumber()` | Returns the line number of the source line\
    \ |\n| `boolean isNativeMethod()` | Returns `true` if the method is native |\n\
    | `StackTraceElement toStackTraceElement()` | Returns the `StackTraceElement`\
    \ |\n\nIf the option `RETAIN_CLASS_REFERENCE` is not passed when you create the\
    \ `StackWalker`, the method `getDeclaringClass()` throws `UnsupportedOperationException`.\n\
    \nIn Listing [16-3](#A459620_1_En_16_Chapter.html#Par16), I create a `StackWalker`\
    \ with the option `RETAIN_CLASS_REFERENCE`, so I can use the method `getDeclaringClass()`\
    \ to get the `Class` object. Here I use `getClassName()` to get the class name\
    \ and collect them into a `Set`. I verify that the set should contain the current\
    \ class `StackWalkingTest`.\n\n```\npublic class StackWalkingTest {\n@Test\npublic\
    \ void testWalkClass() throws Exception {\nfinal StackWalker stackWalker =\nStackWalker.getInstance(Option.RETAIN_CLASS_REFERENCE);\n\
    final Set classNames = stackWalker.walk(stream ->\nstream.map(StackWalker.StackFrame::getClassName)\n\
    .collect(Collectors.toSet())\n);\nassertTrue(classNames.contains(\"StackWalkingTest\"\
    ));\n}\n}\nListing 16-3.\nExample of walk() in StackWalker\n```\n\nIf I just need\
    \ to iterate all the `StackFrame`s and perform actions on each of them, the method\
    \ `void forEach(Consumer<? super StackWalker.StackFrame> action)` is easier to\
    \ use than `walk()`; see Listing [16-4](#A459620_1_En_16_Chapter.html#Par18).\n\
    \n```\n@Test\npublic void testForEach() throws Exception {\nfinal StackWalker\
    \ stackWalker =\nStackWalker.getInstance(Set.of(Option.SHOW_HIDDEN_FRAMES,\nOption.SHOW_REFLECT_FRAMES));\n\
    stackWalker.forEach(stackFrame -> System.out.printf(\"%6d| %s -> %s %n\",\nstackFrame.getLineNumber(),\n\
    stackFrame.getClassName(),\nstackFrame.getMethodName()));\n}\nListing 16-4.\n\
    Example of forEach() in StackWalker\n```\n\n`StackWalker` also has the method\
    \ `getCallerClass()` that returns the `Class` object of the caller who invoked\
    \ the method that invoked `getCallerClass()`. The description of `getCallerClass()`\
    \ seems quite complicated and hard to understand. This method is actually very\
    \ useful for utility methods that deal with classes, class loaders, and resources.\
    \ Those utility methods should use the caller’s class to perform actions."
  trans: "\n## Javadoc\n\n`javadoc` 工具在 JDK 9 中支持生成 HTML5 标记。当使用 `-html5` 选项时，`javadoc`\
