- fmt: '# Working with Existing Code


    For developing new projects in Java 9, the concepts in the module declaration
    are enough. But if you need to work with existing code written before Java 9,
    you need to understand unnamed modules and automatic modules.


    ## Unnamed Modules


    From previous sections, you can see that Java 9 has a strict constraint on how
    types can be accessed across module boundaries. If you are creating a brand-new
    application targeting Java 9, then you should use the new module system. However,
    Java 9 still supports running all applications written prior to Java 9. This is
    done with the help of the unnamed modules.


    When the module system needs to load a type whose package is not defined in any
    module, it will try to load it from the class path. If the type is loaded successfully,
    then this type is considered to be a member of a special module called the unnamed
    module. The unnamed module is special because it reads all other named modules
    and exports all of its packages.


    When a type is loaded from the class path, it can access exported types of all
    other named modules, including built-in platform modules. For Java 8 applications,
    all types of this application are loaded from the class path, so they are all
    in the same unnamed module and have no issues accessing each other. The application
    can also access platform modules. That’s why Java 8 applications can run on Java
    9 without changes.


    The unnamed module exports all of its packages, but code in other named modules
    cannot access types in the unnamed module, and you cannot use `requires` to declare
    the dependency—there is no name for you to use to reference it. This constraint
    is necessary; otherwise we lose all the benefits of the module system and go back
    to the dark old days of messy class path. The unnamed module is designed purely
    for backward compatibility. If a package is defined in both a named and unnamed
    module, the package in the unnamed module is ignored. Unexpected duplicate packages
    in the class path won’t interfere with the code in other named modules.


    ## Automatic Modules


    Since Java 9 is backward compatible to run existing Java applications, it’s not
    necessary to upgrade existing applications to use modules. However, it’s recommended
    that you upgrade to take advantages of the new module system.


    The recommended approach to migrate existing applications is to do it in a bottom-up
    way; that is, start with the modules that are in the bottom of the entire dependency
    tree. For example, in an application that has three modules/subprojects A, B,
    and C with a dependency tree like `A -> B -> C`, you start by migrating C to a
    module first, then B, and then A. After C is migrated to a module, A and B, which
    are currently in the unnamed module, can still access types in C because the unnamed
    module reads all named modules. Then you migrate B to a named module and declare
    it to require the migrated named module C. Finally, migrate A to a named module;
    at this point, the whole application has been migrated successfully.


    It’s not always possible to do the bottom-up migration. Some libraries may be
    maintained by third parties and you cannot control when these libraries will be
    migrated to modules. But you still want to migrate modules that depend on those
    third-party libraries. You cannot just migrate those modules, while leaving third-party
    libraries in the class path, however, because named modules cannot read the unnamed
    module. What you can do is put those library JAR files in the module path and
    turn them into automatic modules.


    Other than explicitly created named modules, automatic modules are created implicitly
    from normal JAR files. There is no module declaration in these JAR files. The
    name of an automatic module comes from the attribute `Automatic-Module-Name` in
    the manifest file `MANIFEST.MF` of the JAR file, or it is derived from the name
    of the JAR file. Other named modules can declare dependency upon this JAR file
    using the name of the automatic module. It’s recommended that you add the attribute
    `Automatic-Module-Name` in the manifest, because it is more reliable than the
    derived module names from JAR file names.


    Automatic modules are special in many ways:


    - An automatic module reads all other named modules.

    - An automatic module exports all of its packages.

    - An automatic module reads the unnamed modules.

    - An automatic module grants transitive readability to all other automatic modules.


    Automatic modules are the bridge between the class path and explicitly named modules.
    The goal is to migrate all existing modules/subprojects/libraries to Java 9 named
    modules. However, during the migrating process, you can always add them to the
    module path to use them as automatic modules.


    In Listing [2-19](#A459620_1_En_2_Chapter.html#Par87), the class `MyD` use the
    class `com.google.common.collect.Lists` from Guava ( [https://github.com/google/guava](https://github.com/google/guava)
    ) version 21.0.


    ```

    package dtest;

    import com.google.common.collect.Lists;

    public class MyD {

    public static void main(String[] args) {

    System.out.println(Lists.newArrayList("Hello", "World"));

    }

    }

    Listing 2-19.

    Class MyD Using the Guava Library

    ```


    At the time of writing, Guava has not yet been migrated as a Java 9 module. In
    the module declaration of D in Listing [2-20](#A459620_1_En_2_Chapter.html#Par89),
    you can use `requires guava` to declare dependency upon it. `guava` is the name
    of the automatic module for Guava, which is derived from the JAR file name.


    ```

    module D {

    requires guava;

    }

    Listing 2-20.

    Declaring Dependency Upon an Automatic Module

    ```


    When compiling the code in Listing [2-20](#A459620_1_En_2_Chapter.html#Par89),
    you can use the command-line option `--module-path` in `javac` to add Guava’s
    JAR file `guava-21.0.jar` in the directory `∼/libs` to the module path.


    ```

    $ javac --module-path ∼/libs /*.java /dtest/*.java

    ```


    ## JDK Tools


    After you finish the source code of a project’s modules, you need to compile and
    run these modules. Most of time, you’ll use IDEs for development and testing,
    so you can leave the compilation and execution of the project to the IDE. However,
    you can still use the JDK tools `javac` and `java` directly to compile and run
    the code, respectively. Understanding details about these JDK tools can help you
    to understand the whole life cycle of modules. However, it takes time for IDEs
    and build tools to improve their support for JDK 9. The process may be slow, so
    you may still need to use these JDK tools for some tasks. When migrating to Java
    9, you may encounter various problems related to the module system. If you have
    a deep understanding of these tools, you can easily find the root cause and solve
    these problems.


    Some of these JDK tools have been upgraded to support module-related options,
    while others are new in Java 9. These tools support some common command-line options
    related to common concepts in the module system. These tools can be used in different
    phases:


    - Compile time: Use `javac` to compile Java source code into class files.

    - Link time: The new optional phase introduced in Java 9. Use `jlink` to assemble
    and optimize a set of modules and their transitive dependencies to create a custom
    runtime image.

    - Runtime: Use `java` to launch the JVM and execute the byte code.


    Other utility tools have no special phases to work with.'
