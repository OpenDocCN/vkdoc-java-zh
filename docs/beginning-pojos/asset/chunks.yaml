    第 3 章 ■ 使用 ANT 进行构建


    **63**


    **数据类型（Datatypes）**


    Ant 的数据类型是原始构造块，它们在处理构建文件时提供经常需要的信息。它们的目的是通过封装某些所需信息并提供一种简单的操作方式来简化任务。


    Ant 的几个内置数据类型提供了一种结构，用于封装关于一组相关资源的信息，例如文件、环境变量，甚至是输入和输出文件之间的复杂映射。了解如何正确使用 Ant
    的数据类型将帮助你保持构建文件的简洁和高效。


    数据类型和属性实战：一个简单示例


    许多 Ant 任务需要操作一个文件或一组文件。构建中的一个典型需求是指定一组 JAR 文件，以便将其包含在某些任务的类路径中。假设你正在构建一个具有如图 3-4
    所示目录结构的简单应用程序。


    **图 3-4.** *数据类型和属性的示例目录结构* 清单 3-5 中的示例构建文件展示了一个构建，其中定义了两个路径结构（数据类型），一个的 id 为
    `class.path`，另一个的 id 为 `all.source.path`。这两个数据类型随后在名为“compile”的目标中使用，该目标使用 `javac`
    任务来编译由 id 为 `all.source.path` 的路径引用所引用的类。


    **清单 3-5.** *展示数据类型的简单 Ant 构建文件*


    <?xml version="1.0"?>


    <project name="My Project" default="all" basedir=".">


    ...


    <property name="lib" location="lib"/>


    <property name="src" location="src"/>


    <property name="classes" location="classes"/>


    <property name="build" location="build"/>


    <property name="src-java" location="${src}/java"/>


    <property name="src-test" location="${src}/test"/>


    <property name="some-lib" location="${lib}/some-lib"/>


    ...


    <path id="class.path">


    <fileset dir="${lib}">


    <include name="*.jar"/>


