    The CruiseControl reporting application provides information about the time of
    the last build and whether it was successful or not. If we drill down further
    by clicking on the project’s name link, we are presented with a page that provides
    five tabs: Build Results, Test Results, XML Log File, Metrics, and a JMX Control
    Panel.


    In the Build Results page you will find information about errors and warnings
    produced during the build, general information about the result of running the
    test suite, and a summary of any modifications since the last successful build.
    Figure 9-5 shows the Unit Tests summary for the Lucene project.


    **Figure 9-5.** *Unit Tests summary under the Build Results page* The Test Results
    page gives you a more detailed view of each test executed, including timings.
    Figure 9-6 shows the Test Results page for the Lucene project.


    The metrics page provides a historical graph showing the distribution in time
    of good versus bad builds as well as a pie chart showing the percentage of good
