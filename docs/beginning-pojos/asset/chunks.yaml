    MVC. Spring MVC is a simpler implementation of MVC that provides a way to plug
    in several view technologies such as Struts, WebWork, Tapestry, or simple JSPs
    as shown in the simple example earlier in the chapter.


    In the MVC implementation provided by Spring, the model is not abstracted away
    as in the case of Struts and its ActionForm, but it can be any simple POJO (a
    DTO or a domain object).


    All model objects are stored in a simple map structure. The controller prepares
    the model map for the view to pull data from and for forming backing objects to
    modify data in the model.


