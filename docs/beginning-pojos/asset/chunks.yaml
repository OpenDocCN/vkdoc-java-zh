  raw: 'Choosing one of the strategies previously outlined depends on the complexity
    of the inheritance graph you want to persist, the complexity of each class, how
    the classes will be used in your application, and whether the data is going to
    be used from outside of the application.


    If you don’t need polymorphic queries, the simplest route is to go with the Table-Per-Concrete-Class.
    If you need polymorphic queries and your subclasses differ mainly in behavior
    and not in data, use the Table-Per-Class-Hierarchy. On the other hand, if your
    classes differ mainly in the data, then the Table-Per-Subclass strategy might
    be a viable option.


    In most cases I use the Table-Per-Class-Hierarchy strategy since it provides the
    best compromise between complexity and performance. Of course these choices all
    imply that you have control over the schema and that you are working in a top-down
    fashion.


    **Inheritance: Table-Per-Class Hierarchy**


    Now it’s time to put some of the concepts about mapping inheritance into practice.
    In the first example from the TechConf system, we will map the User, Attendee,
    and Presenter class hierarchy. As you can deduce from Figure 4-14, an Attendee
    and a Presenter are types of User.


