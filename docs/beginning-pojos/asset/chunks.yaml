- fmt: "# Best Practice\n\nWhen choosing a primary key for a new table, especially\
    \ if you know that the table will be used in an object-oriented system by an ORM\
    \ tool, use surrogate primary keys whenever possible. Surrogate primary keys are\
    \ small, simple keys that have no business meaning and are normally not updated\
    \ or even seen by end users. They provide an audit trail, result in small indexes,\
    \ make joins easier to write and faster to execute, are more resilient to business\
    \ changes (because they have no business meaning), and make referential integrity\
    \ easier to maintain. An example of dangerous business-key usage as a primary\
    \ key would be using telephone numbers as account identifiers. Because telephone\
    \ numbers can and do change, maintenance or some sort of mapping would be required\
    \ when a customer’s telephone number changes, even worst in my opinion is the\
    \ use of composite business/natural primary keys in which many such fields are\
    \ used in combination as a primary key. The problem is that those fields are normally\
    \ non-nullable, so there is no easy way (without doing a `SELECT` to check the\
    \ row’s existence) to determine if the object is already in the database.\n\n\
    Table 4-2 shows a quick summary of the generator strategies provided by Hibernate.\n\
    \n**Table 4-2.** *Hibernate’s Identifier Generation Strategies*\n\n| Strategy\
    \ | Description |\n|----------|-------------|\n| `increment` | Generates integer-type\
    \ identifiers (`long`, `short`, and `int`) using an in-memory scheme. Not recommended\
    \ for clustered environments. |\n| `identity` | Uses database identity columns\
    \ for those databases that support it. Use it with an integer-type object property.\
    \ |\n| `sequence` | Uses a database sequence or internal database generator for\
    \ those databases that support these features. |\n| `hilo` | Uses an algorithm\
    \ to determine the next value based on a column in a given table. Used when native\
    \ database sequences are not supported and only in non-JTA environments or with\
    \ user-supplied connections. |\n| `seqhilo` | Uses a named database sequence and\
    \ the `hilo` algorithm. |\n| `uuid` | Uses an algorithm that generates a string\
    \ representation of a 128-bit UUID (Universally Unique Identifier). The returned\
    \ string is hex-encoded. |\n| `guid` | Takes advantage of the capability of certain\
    \ databases (Microsoft SQL Server and MySQL) to generate Globally Unique Identifiers\
    \ (GUIDs). |\n| `foreign` | Uses the identifier of an associated object. |\n|\
    \ `native` | Intelligently chooses the appropriate strategy. It’s the recommended\
    \ strategy for maximum portability. |\n| `select` | Uses a database trigger or\
    \ by issuing a `SELECT` against a unique key tables. |\n| `assigned` | Used for\
    \ applications that use provided business unique keys. |\n\nChoosing the right\
    \ identity-generation strategy depends on many factors, including performance\
    \ and portability. Native database strategies are usually more robust and perform\
    \ better than the equivalent Java-based approach. In most cases I prefer to use\
    \ simple integers for my primary keys in conjunction with the native database\
    \ integer key generator.\n\n## Saving an Object\n\nNow we need to tell Hibernate\
    \ how to connect to the database and load the `Address.hbm.xml` class mapping\
    \ in the `SessionFactory`. For this simple example we will do this directly in\
    \ the Java code. Subsequent examples will use the preferred XML configuration\
    \ file.\n\nListing 4-4 shows how to create a Hibernate configuration object in\
    \ code, add a Hibernate mapped class, and retrieve an instance of the `SessionFactory`\
    \ from the configuration. When you invoke the `addClass` method of the `Configuration`\
    \ class, passing the class object for the `Address` class (`Address.class`), Hibernate\
    \ will look for a HBM file named `\"Address.hbm.xml\"` in the class path. So the\
    \ simplest way to ensure that Hibernate will find your mappings is to place them\
    \ in the same location as the class they map. Once you have a `SessionFactory`,\
    \ working with your persistent objects is as simple as obtaining a `Session` and\
    \ invoking methods on it.\n\nReplace the user name and password with that required\
    \ for your database.\n\n**Listing 4-4.** *Configuring Hibernate in Code*\n\n```\n\
    Configuration config = new Configuration().\n    setProperty(\"hibernate.dialect\"\
    , \"org.hibernate.dialect.MySQLDialect\").\n    setProperty(\"hibernate.connection.driver_class\"\
    , \"com.mysql.jdbc.Driver\").\n    setProperty(\"hibernate.connection.url\", \"\
    jdbc:mysql://localhost/techconf\").\n    setProperty(\"hibernate.connection.username\"\
    , \"mydbuser\").\n    setProperty(\"hibernate.connection.password\", \"mydbpassword\"\
    ).\n    setProperty(\"hibernate.show_sql\", \"true\");\nconfig.addClass(Address.class);\n\
    SessionFactory factory = config.buildSessionFactory();\n```\n\nFor example to\
    \ create an `Address` object and save it to the database we take the following\
    \ steps, reflected in Listing 4-5:\n\n1. POJO is created and values are set.\n\
    2. `SessionFactory` is used to create a `Session`.\n3. A Hibernate `Transaction`\
    \ bound to the `Session` is started.\n4. The object is saved using the `Session`\
    \ `persist` method.\n5. The `Transaction` is committed.\n6. The `Session` is closed.\n\
    \n**Listing 4-5.** *Saving an Address*\n\n```\nAddress address = new Address();\n\
    ...\nSession session = null;\nTransaction tx = null;\ntry {\n    session = factory.openSession();\n\
    \    tx = session.beginTransaction();\n    session.persist(address);\n    tx.commit();\n\
    } catch (Exception e) {\n    if (tx != null) tx.rollback();\n} finally {\n   \
    \ session.close();\n}\n```\n\nThe code in Listing 4-5 follows the pattern you’ll\
    \ use when interacting with Hibernate mapped objects in a simple J2SE application.\
    \ Behind the scenes the Hibernate `Session` just opened is given a JDBC connection\
    \ for the database set in the `SessionFactory` configuration (this connection\
    \ might be a new connection or might come from a pool of existing connections\
    \ available to Hibernate). Once the `Session` is opened it acts as cache for mapped\
    \ object entities, that is, any object you retrieve or save via the opened `Session`\
    \ will now be in the `Session` cache.\n\nSo, if you were to load the same object\
    \ twice, in the first call Hibernate will issue a SQL statement to load the state\
    \ of the object, but in any subsequent calls using the same `Session`, the object\
    \ would be retrieved from the `Session`’s internal cache and no database access\
    \ would occur.\n\nIf the code in Listing 4-5 executes successfully, the `Address`\
    \ instance that was passed to the `persist` method will now have its `Id` field\
    \ populated with the identifier generated by the database and there will be a\
    \ new row in the `ADDRESS` table. Hibernate’s `Session` object provides several\
    \ methods that persist the state of an object to the database, including `persist`,\
    \ `save`, `update`, and `saveOrUpdate`. If an object’s primary key attribute isn’t\
    \ set, Hibernate will detect this and automatically generate a primary key for\
    \ the object based on the strategy selected on the `id` element. This will make\
    \ the underlying operation a SQL `INSERT`.\n\n> **Note:** Hibernate detects that\
    \ an object hasn’t been saved by checking the primary key value for `null`, which\
    \ is the default of the `unsaved-value` attribute. If your class required a value\
    \ other than `null`, set this value in the `unsaved-value` attribute."
