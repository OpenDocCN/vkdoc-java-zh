    开发者们不得不费尽周折，自行实现框架，以便在 J2EE 容器之外独立测试其组件。大多数曾构建过优秀面向对象应用的开发者，在被卷入 EJB 这辆战车后，选择了*阻力最大*的道路，以一种反向的方式使用
    EJB：首先构建健壮的、基于接口驱动、“按契约”设计的面向对象应用，然后将 EJB 作为一层来利用多线程、对象池及其他容器服务。毕竟，J2EE 远不止 EJB，但不幸的是，先前设计糟糕的
    EJB 规范版本抢占了风头，**195**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C06.fm 第 196 页 2006 年 2 月 22 日星期三 下午 1:20


    **196**


    第 6 章 ■ SPRING 框架


    掩盖了规范中其他部分的光芒，尤其是那些真正的精华——依我愚见，即 JNDI 和 JMS。那些选择阻力最小道路的开发者，最终得到的所谓组件既不可真正重用，也难以测试，并且包含了比实际对业务有价值的应用代码更多的管道代码。


    像 Spring 这样的框架，其哲学是使用规范中最好的部分，掩盖那些繁琐的部分，并简化 API，同时始终将良好的面向对象设计作为首要优先级。你很快就会了解到，Spring
    让你能够以松散耦合的方式，使用接口来设计你的应用，而不会损害良好的面向对象原则。


    **依赖注入**


    Spring 主要被视为一个依赖注入容器。依赖注入是 Martin Fowler、Rod Johnson 和 PicoContainer 团队在 2003
    年底提出的一个更恰当的术语，用于指代曾经被称为“控制反转”的概念。另一种观点是，DI 是 IoC 的一种策略或变体。大多数对 DI 的解释也将其称为好莱坞原则：


    “别找我们，我们会找你。”


    在我早期涉足 DI 容器和 Spring 框架时，我发现一些对 IoC/DI 的解释过于复杂。我能给出的关于 DI 的最佳解释是：它是一种技术，通过它，你将运行时使用哪个给定接口实现的选择权外部化。在
    Spring 中，系统使用接口进行设计，而 Spring 框架在运行时插入或注入正确的实现。在 Spring 中，你通常通过一个称为应用上下文的 XML 配置文件，将接口的特定实现注入到其他
    bean 中。


    因此，在 Spring 应用中，你的 POJO 或 bean 不会在代码中显式地构造其依赖关系。相反，依赖关系由容器在运行时“注入”。例如，在一个使用 DAO
    模式的典型 Spring Web 应用中，你会定义 DAO 的接口和服务的接口。在服务的实现中，会定义一个 DAO 的属性（使用接口），以及一个接受 DAO
    作为参数的 setter 方法或构造函数。Spring 应用上下文 XML 配置包含了 DAO 接口的特定实现的定义，该实现将被注入到服务类中（使用提供的
    setter 或构造函数）。在运行时，使用应用上下文的 Spring 容器将正确地装配 bean 以及完成其功能所需的协作者。这与 EJB 2.X 基于查找的方法相反，在
    EJB 2.X 中，使用服务定位器模式以及工厂和直接的对象构造来装配系统中的所有协作者。在一个典型的 EJB 2.X 系统中，服务定位器被用作一种将依赖关系（通常来自
    JNDI）拉入组件的方式（所有这些都是在组件内部通过编程方式完成的）。这并不意味着 JNDI 不是一种强大的资源管理抽象，但 EJB 2.X 中的实现强制了这种对
    JNDI 的“拉取”使用以及对 JNDI API 的依赖（使得在没有 JNDI 可用的情况下测试更加困难，因此在大多数情况下需要容器），并且需要大量代码来执行查找。正如我们在第
    5 章中看到的，EJB3 规范允许通过 Java 注解以松散耦合的方式将 JNDI 绑定的资源注入到组件中。类似地，Spring 也允许注入 JNDI 绑定的资源。图
    6-1 描绘了 Spring 框架支持的依赖注入模式。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C06.fm 第 197 页 2006 年 2 月 22 日星期三 下午 1:20


    第 6 章 ■ SPRING 框架


    **197**


    **图 6-1.** *Spring 中的依赖注入*


    依赖注入以声明式的方式，将配置应用对象和资源查找的责任转移给了容器。DI 的主要优点在于，它消除了业务对象实现任何容器特定接口的要求，并消除了冗余的查找代码或服务定位器实现的需求。通过移除容器特定的依赖关系，对象可以在没有容器的情况下进行测试，并且遗留代码也可以轻松地适应新环境。


    我之前提到，需要被注入资源的实现必须提供一个 setter 方法或构造函数，供容器用来注入给定的资源。这引出了不同类型的依赖注入：基于构造函数的注入和基于
    setter 的注入。两种方法各有优缺点。著名技术专家 Martin Fowler 在 www.martinfowler.com/articles/injection.html
    上的一篇在线文章中提供了对 IoC/DI 的解释。


    在本书以及 TechConf 应用的 Spring 实现中，我使用了基于 setter 的 DI，这主要是因为当多个资源被注入时，它更容易处理，并且防止了过多构造函数的泛滥——我发现，试图考虑所有可能的参数组合或必需参数时，就会导致构造函数过多。当然，通过提供接受必需资源的构造函数（并且没有无参构造函数），你可以有效地保证被构造的对象在创建时处于有效状态。

