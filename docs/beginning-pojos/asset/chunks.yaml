- fmt: "In this example, the `PricingRule` hierarchy is mapped using the Table-Per-Subclass\
    \ strategy.\n\nPricing rules are applied at registration time when a conference\
    \ attendee pays to attend the conference. The `PricingRule` hierarchy is composed\
    \ of the interface `PricingRule` and the classes `GroupPricingRule` and `RegistrationDatePricingRule`,\
    \ which implement the `PricingRule` interface. The `PricingRule` hierarchy is\
    \ shown in Figure 4-24.\n\n**Figure 4-24.** *PricingRule class hierarchy*\n\n\
    The three corresponding tables are shown in Listing 4-28. Notice that tables holding\
    \ the subclasses data, `GROUPPRICINGRULE` and `REGISTRATIONDATEPRICINGRULE`, both\
    \ have foreign key constraints referencing the `PRICINGRULE` table (the root of\
    \ the class hierarchy).\n\n**Listing 4-28.** *Pricing Rules Tables*\n\n```\nCREATE\
    \ TABLE PRICINGRULE (\n    PK_ID INTEGER NOT NULL PRIMARY KEY AUTO_INCREMENT,\n\
    \    NAME VARCHAR(16) NOT NULL,\n    PRIORITY INTEGER,\n    ACTIVE BOOLEAN,\n\
    \    FK_CONFERENCE_ID INTEGER NOT NULL,\n    CONSTRAINT PRICINGRULE_CONFERENCE_FK\
    \ FOREIGN KEY(FK_CONFERENCE_ID) REFERENCES CONFERENCE(PK_ID),\n    CONSTRAINT\
    \ UNIQUE_PRICINGRULE_NAME UNIQUE(NAME)\n);\n```\n\n```\nCREATE TABLE GROUPPRICINGRULE\
    \ (\n    PK_ID INTEGER NOT NULL PRIMARY KEY,\n    MINIMUMATTENDEES INTEGER,\n\
    \    MAXIMUMATTENDEES INTEGER,\n    DISCOUNTRATE DOUBLE,\n    CONSTRAINT GROUPPRICINGRULE_PRICINGRULE_FK\n\
    \        FOREIGN KEY(PK_ID) REFERENCES PRICINGRULE(PK_ID)\n);\n```\n\n```\nCREATE\
    \ TABLE REGISTRATIONDATEPRICINGRULE (\n    PK_ID INTEGER NOT NULL PRIMARY KEY,\n\
    \    STARTDATE DATETIME NOT NULL,\n    ENDDATE DATETIME NOT NULL,\n    PRICE DOUBLE\
    \ NOT NULL,\n    CONSTRAINT REGISTRATIONDATEPRICINGRULE_PRICINGRULE_FK\n     \
    \   FOREIGN KEY(PK_ID) REFERENCES PRICINGRULE(PK_ID)\n);\n```\n\nIn this strategy\
    \ the data model mirrors the object model. Hibernate will rely on matching the\
    \ primary keys to find all the data belonging to a particular subclass and will\
    \ use it to perform joins when querying the `PricingRule` hierarchy.\n\nTo map\
    \ these three tables to the object model, we use `joined-subclass` element in\
    \ the HBM file as shown in Listing 4-29. The `id` element mapped to the column\
    \ `PK_ID` is the primary key of the parent table, while the `key` elements inside\
    \ each `joined-subclass` mapping provide the linkage between the parent table\
    \ and the subclass tables.\n\n**Listing 4-29.** *Table-Per-Subclass Mapping for\
    \ Pricing Rules Hierarchy*\n\n```\n<?xml version=\"1.0\"?>\n<!DOCTYPE hibernate-mapping\
    \ PUBLIC\n    \"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n<hibernate-mapping package=\"com.integrallis.techconf.domain\">\n    <class\
    \ name=\"PricingRule\" table=\"pricingrule\">\n        <id\n            column=\"\
    PK_ID\"\n            name=\"Id\"\n            type=\"integer\"\n        >\n  \
    \          <generator class=\"identity\" />\n        </id>\n        <property\
    \ name=\"Name\" not-null=\"true\" />\n        ...\n        <property\n       \
    \     column=\"FK_CONFERENCE_ID\"\n            name=\"ConferenceId\"\n       \
    \     not-null=\"true\"\n            type=\"integer\"\n        />\n        <joined-subclass\
    \ name=\"GroupPricingRule\" table=\"grouppricingrule\">\n            <key column=\"\
    PK_ID\"/>\n            <property name=\"MinimumAttendees\" type=\"integer\" />\n\
    \            <property name=\"DiscountRate\" type=\"java.lang.Double\" />\n  \
    \          <property name=\"MaximumAttendees\" type=\"integer\" />\n        </joined-subclass>\n\
    \        <joined-subclass name=\"RegistrationDatePricingRule\"\n             \
    \            table=\"registrationdatepricingrule\">\n            <key column=\"\
    PK_ID\"/>\n            <property name=\"StartDate\" not-null=\"true\" type=\"\
    timestamp\" />\n            <property name=\"EndDate\" not-null=\"true\" type=\"\
    timestamp\" />\n            <property name=\"Price\" not-null=\"true\" type=\"\
    java.lang.Double\" />\n        </joined-subclass>\n    </class>\n</hibernate-mapping>\n\
    ```\n\nTesting the Table-Per-Subclass mapping is similar to the testing previously\
    \ performed for the Table-Per-Class-Hierarchy strategy, and it is left as an exercise\
    \ for you.\n\n## Summary\n\nIn this chapter you have learned the foundations of\
