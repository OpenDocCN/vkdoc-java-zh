    **总结**


    在本章中，我们学习了如何使用 Spring 框架实现并组装一个相当复杂的、数据库驱动的 Web 应用程序。Spring 允许你的代码使用 POJO 和 POJI，并允许你声明式地混合搭配
    Bean 来创建完整的应用程序。


    通过使用简单而强大的控制反转（IoC）概念，Spring 框架简化并减少了企业应用程序中所需的样板代码量。


    我们简要地了解了 Spring MVC 框架，这应该有助于从 Struts（目前最流行的 MVC 框架）轻松过渡。与 Struts 一样，Spring MVC
    建立在 Servlet API 语义之上。本章旨在作为 Java Web 开发中这一新选择的轻量级介绍。要了解 Spring MVC 更高级的选项，我推荐
    Rob Harrop 和 Jan Machacek 合著的优秀书籍 *Pro Spring*（Apress，2005）。


    结合大多数企业应用程序所需的大量功能，Spring 已成为 Java 领域领先的应用程序框架，它不依赖于规范或委员会，而是依赖于 Java 社区的实际工作经验。如果你正在构建
    Web 应用程序，Spring 可以显著改善你的开发体验和应用程序的质量。


