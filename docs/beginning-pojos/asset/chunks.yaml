    ### Obtaining Hibernate


    You can download Hibernate (version 3.X) from www.hibernate.org in both binary
    and source distributions. For the examples, you’ll need the distribution file
    `hibernate-3.X.zip`, which you can unzip and save to any location, for example
    `c:\java\hibernate`. The Hibernate distribution contains the Hibernate JAR (`hibernate3.jar`)
    along with all third-party dependencies, full source code including tests, and
    reference and API documentation. In the rest of the chapter we will continue enhancing
    the directory structure developed in Chapter 3 to begin building the ORM layer
    of the TechConf application.


    ### Setup for POJO Development


    Table 4-1 lists the JAR files that are needed for the J2SE examples. These JAR
    files can be found in the Hibernate distribution, and following the advice given
    in Chapter 3 (the Ant build system chapter) we will place them under a versioned
    Hibernate distribution directory under the application’s `lib` directory.


    We will add the Hibernate JARs to the libraries of the TechConf application. To
    do this, create a `hibernate` directory under the `lib` directory of the TechConf
    application and copy the JAR files (`hibernate3.jar`, `dom4j-1.6.1.jar`, `cglib-2.1.1.jar`,
