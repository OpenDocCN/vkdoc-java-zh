    构建阶段


    Ant 构建分为两个阶段：解析阶段和运行阶段。在解析阶段，XML 构建文件被解析，并构建一个对象模型。该对象模型反映了 XML 文件的结构，即根节点包含一个
    project 对象，该对象下包含多个 target 对象，而 target 对象本身又包含其他代表目标内容的对象，如任务、数据类型和属性。


    ■**注意** Ant 脚本可以包含除目标之外的顶层元素。这些元素可以包括某些任务和数据类型。这些元素按出现顺序被分组到一个隐式目标中，该目标在解析过程结束后、任何其他目标执行之前立即执行。


    在运行阶段，Ant 确定要执行的目标的构建顺序。


    该顺序通过解析目标的依赖关系来确定。默认情况下，除非指定了不同的目标，否则 Ant 将使用 default 目标属性作为入口点，以便确定构建顺序。


    让我们执行图 3-1 所示示例构建的示例构建文件，以便熟悉 Ant 以及表 3-1 中显示的一些命令行选项。首先，将列表中显示的内容输入到一个文本文件中，并将其保存为
    build.xml。要运行它，只需切换到构建文件所在的目录，然后输入以下命令：ant


    输出应如下所示：


    构建文件：build.xml


    目标 A：


    [echo] 正在执行步骤 A


    目标 B：


    [echo] 正在执行步骤 B


    [echo] Echo 是众多核心任务之一


    目标 C：


    [echo] 正在执行步骤 C


    构建成功


    总耗时：1 秒


    输出显示 Ant 成功执行了构建文件，耗时 1 秒（执行时间因系统而异）。从输出中，你可以看到目标按以下顺序执行：目标 A、目标 B 和目标 C。要查看

