    \ C05.fm Page 169 Wednesday, February 22, 2006 6:13 AM\n\n第 5 章 ■ 使用 JBoss 的业务服务\n\
    \n**169**\n\n**图 5-10.** *TechConf DAO 异常层次结构*\n\n**使用 DynaDTO 实现 DTO 模式**\n\n\
    在企业级 Java 应用程序中，我们通常还会遇到另一种模式：数据传输对象模式（DTO），也称为值对象模式。当中间层的客户端需要交换数据时（传统上通过基于 EJB\
    \ 的服务层），就会使用 DTO。\n\n**背景**\n\nDTO 通常是用于层间通信的轻量级对象。通常，在面向对象、分布式且由中间件驱动的 Web 应用程序中，存在三个众所周知的层，它们由我定义为两个转换层的部分连接。这三个层通常被称为*集成*层（和/或数据层）、*业务*层（业务/领域对象所在之处）和*表示*层（对于\
    \ Web 应用程序，即 Web 层）。在这三个层之间，我们通常会遇到两个转换层：\n\n• **O/R 转换层：** 位于关系数据库和中间件托管的领域对象（统称为领域模型）之间\n\
    • **DTO 转换层：** 位于领域模型和用户模型之间。我们将用户模型定义为 Web 层为与中间层交互而操作的对象集合。\n\n基于许多企业级 Java\
    \ 应用程序的多层、分布式特性所引发的问题，架构师和开发人员逐渐认识到 DTO 模式的必要性，这些问题包括：\n\n• **粗粒度实体：** 像实体 EJB\
    \ 这样的粗粒度技术不应由 Web 层直接操作，因为每次访问都可能成为远程调用。根据应用程序的时间拓扑结构（如共置或特定于供应商的优化），这可能导致可移植性问题和不稳定的架构。\n\
    \n• **细粒度实体：** 一个设计良好的领域模型所反映的问题域信息，通常比暴露给客户端的信息更多。领域模型应代表问题/解决方案域知识的一个子集。Martin\
    \ Fowler 创造了“贫血领域模型”一词，用来指代领域模型缺乏行为的反模式。\n\n我们经常看到许多“被污染”的领域模型，它们要么被数据层污染，要么被表示层污染。为了加速开发，关注点分离通常被忽视。\n\
    \n换句话说，用户界面应该处理那些为便于用户界面操作而设计的对象。你不应为了满足用户界面的需求而损害领域模型的完整性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nSam-Bodden_596-3 C05.fm Page 170 Wednesday, February 22, 2006 6:13 AM\n\n**170**\n\
    \n第 5 章 ■ 使用 JBoss 的业务服务\n\n• **批量传输：** 分布式带来了大量问题，包括需要通过批量数据传输来最小化网络流量。受层间交换数据粒度影响的其他典型问题还包括分页方案和缓存。\n\
    \n这些问题引导我们走向实现 DTO 模式背后的驱动力：\n\n• 使用粗粒度技术（如实体 EJB）访问远程对象的字段时，存在潜在的远程调用。\n• Web\
    \ 应用程序通常是“以读取为主，偶尔保存更新”。\n• 每页的查看需求通常由来自多个领域对象的多个属性组成。传输满足这些需求所需的所有领域对象，可能导致跨层序列化一个庞大的对象图。\n\
    • 手工编码的 DTO 意味着需要编写代码来在运行时实例化 DTO，并从单个或多个来源填充其值。\n\n开发人员通常最终会创建与领域实体相对应的轻量级对象。他们创建传输对象来封装业务数据。对于大多数用例，这转化为每个用例对应一个\
    \ DTO，该 DTO 封装了用户界面的需求。DTO 模式的传统实现仍然存在一些不良副作用，包括：\n"
- fmt: "# Parallel-Object Hierarchy\n\nAs pointed out by Gavin King of the Hibernate\
    \ project, a parallel class hierarchy to maintain is \"smelly.\" We see this as\
    \ a sign that the domain has been flattened by the influence of either the Web\
    \ tier requirements or the underlying data model. Although there will be obvious\
    \ similarities between the domain objects and the DTOs, we believe that a well-designed\
    \ domain model will be fairly dissimilar to the DTO model in both structure and\
    \ content. Remember, the domain model should be reusable between different applications\
    \ dealing with the same problem domain.\n\n# Code Maintenance\n\nWe find that\
    \ maintaining these transformation and transport objects can add quite a bit of\
    \ overhead to a project. We find this problem similar to the problem of maintaining\
    \ a custom object-relational mapping layer.\n\n## DynaDTO\n\nFor the implementation\
    \ of the TechConf DTO layer I'm using DynaDTO (https://dynadto.dev.java.net/),\
    \ which is a solution to the screen-domain mapping problem similar to what Hibernate\
    \ is to the object-relational mapping problem. DynaDTO is a project that provides\
    \ a library that enables you to dynamically generate DTOs that implement a given\
    \ Java interface.\n\nCreated to ease the burden of hand-coding DTOs, DynaDTO eases\
    \ the enforcement of separation of concerns between your application domain model\
    \ and the user interface, reduces the amount of code required to implement the\
    \ pattern, and provides a consistent way to declaratively define simple and complex\
    \ mappings between your domain model and your user interface model (your DTOs).\n\
    \nDynaDTO is configured via an XML file that configures the DTO builder factory\
    \ for a given DTO. A DTO builder factory serves DTO builders which can construct\
    \ a given type of DTO from one or more domain objects (any JavaBean or POJO).\
    \ A DynaDTO configuration file uses simple property mappings (DTOs can also be\
    \ configured inline using Java), nested properties, and expressions using Jakarta\
    \ Commons Java Expression Language (JEXL) found at http://jakarta.apache.org/commons/jexl/.\n\
    \nTo implement the TechConf application DTO layer, we define the DTOs using Java\
    \ interfaces that represent the contract between the middle tier service layer\
    \ and the Web tier. Let's work on an example using the `Conference` domain POJO\
    \ as shown in Listing 5-7.\n\n**Listing 5-7.** *Conference Domain POJO*\n\n```java\n\
    package com.integrallis.techconf.domain;\n\n...\n\nimport org.apache.commons.lang.builder.ToStringBuilder;\n\
    \npublic class Conference implements Serializable {\n\n    ...\n\n    // primary\
    \ key\n    private Integer id;\n\n    // fields\n    private Date abstractSubmissionStartDate;\n\
    \    private String name;\n    private String description;\n    private Date abstractSubmissionEndDate;\n\
    \    private Date endDate;\n    private Date startDate;\n\n    // many to one\n\
    \    private Venue venue;\n\n    // collections\n    private Set<Track> tracks;\n\
    \n    // constructors\n    public Conference () {}\n\n    ... getters and setters\n\
    \n    public Venue getVenue () {\n        return venue;\n    }\n\n    public void\
    \ setVenue (Venue venue) {\n        this.venue = venue;\n    }\n\n    public Set\
    \ getTracks () {\n        return tracks;\n    }\n\n    public void setTracks (Set<Track>\
    \ tracks) {\n        this.tracks = tracks;\n    }\n\n    public void addTrack(Track\
    \ track) {\n        if (null == this.tracks) this.tracks = new HashSet<Track>();\n\
    \        track.setConference(this);\n        tracks.add(track);\n    }\n\n   \
    \ ...\n}\n```\n\nListing 5-8 shows the DTO interface `ConferenceSummary`, which\
    \ represents the information required by the user interface about a `Conference`\
    \ domain object.\n\n**Listing 5-8.** *ConferenceSummary DTO Interface*\n\n```java\n\
    package com.integrallis.techconf.dto;\n\nimport java.util.Date;\nimport java.util.List;\n\
    \nimport org.dynadto.DTO;\n\npublic interface ConferenceSummary extends DTO {\n\
    \n    int getConferenceId();\n    List<TrackSummary> getTracks();\n```"
