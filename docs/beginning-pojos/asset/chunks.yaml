    ## 第 7 章 ■ TAPESTRY


    **241**


    ## 什么是 Tapestry？


    `Tapestry` 是一个开源的 Java Web 应用程序框架，由 `Howard Lewis-Ship` 和一群才华横溢的贡献者创建。`Tapestry`
    根据 `Apache Software License version 2.0` 分发。在 `Tapestry` 中，与其他框架（如 `Struts`）不同，你处理的是组件和页面（页面本身也是组件），交互性通过监听器提供，这些监听器解释与组件关联的用户操作。


    一个 `Tapestry` 应用程序由页面组成。每个页面包含一个模板和许多组件。模板是标准的 HTML 页面，用声明 `Tapestry` 组件的 `span`
    标签进行装饰。


    `Tapestry` 构建在 `Servlet API` 之上，但与其他框架不同，它通过允许你以类似于 Java Swing 开发人员处理表单和组件的方式处理页面和组件，完全抽象了
    Web 的过程性请求-响应特性。与许多 Web 框架一样，`Tapestry` 消除了常见任务和功能（如状态管理、输入验证、本地化和国际化以及错误报告）的繁琐工作。但你不必处理
    URL、HTTP 请求和响应，而是在更高的抽象级别上工作，以面向对象的方式处理用户与页面和组件的交互。就像在 Swing 应用程序中一样，组件和页面知道如何响应从
    HTML 组件视图表示映射到 Java 实现的事件。


    对于 Web 开发团队来说，`Tapestry` 最大的优势之一在于它在 Web 设计师和 Java 开发人员之间实现了强有力的关注点分离。它还将真正的面向对象开发带到了
    Web 应用程序中。作为前 `Delphi` 和 `Swing` 开发人员，我最初正是因为这个因素而被吸引去尝试 `Tapestry`。在 `Tapestry`
    中，你创建纯 HTML 页面，并使用 `span` 标签或任何其他 HTML 标签来嵌入 `Tapestry` 组件。`Tapestry` 允许你在组件位置使用静态标记，以在设计时准确表示页面的外观和感觉。这些静态占位符（例如，一个下拉字段）在运行时被替换为活动的
    `Tapestry` 组件。这允许 HTML 设计师使用应用程序实际使用的模板，从而保证应用程序外观的责任由设计师承担，而功能的责任由应用程序开发人员承担。


    HTML 中的组件视图以及用户在组件上可能采取的任何操作，通过少量的 Java 代码以及可选的非常简单的 XML 配置文件粘合在一起。`Tapestry`
    在底层使用 `HiveMind IoC` 框架/微内核来处理资源和服务的配置。当我们集成一个 `Tapestry` Web 应用程序与 `EJB3` 后端时，我们将了解更多关于
    `HiveMind` 的知识。`Tapestry` 还附带大量预打包的组件，为 JavaScript（用于客户端验证和交互）提供了良好的支持，并拥有几个提供支持
    AJAX 的组件的第三方库。`Tapestry` 是一个经过实战检验的 Web 框架，可用于创建可扩展且稳健的 Web 应用程序。


    ## Tapestry 4 特性


    我是在 `Tapestry` 生命周期的后期才接触到它的。当我开始使用 `Tapestry` 时，版本 3.0 刚刚发布。那时对我来说很明显，`Tapestry`
    是一个稳健、功能齐全的 Web 框架。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


