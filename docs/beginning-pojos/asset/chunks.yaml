    第 3 章 ■ 使用 Ant 进行构建


    **49**


    对于少数开发者能就 IDE 选择达成一致的团队来说，首选通常是 IDE 提供的构建功能。大多数 IDE 都提供了构建简单应用程序的向导。这些向导只覆盖了部分问题，并且将你的团队束缚在特定的
    IDE 上。


    除了上述问题，这两种方法都将开发环境和生产环境视为概念上分离的。我们需要的是一个低层级的工具，能够跨多种 IDE、开发阶段、平台等统一构建过程。


    多年来，UNIX 程序员一直通过 make 工具及其各种变体（GNU Make、nmake 等）来构建应用程序。与 make 类似，Ant 的核心是一个构建工具，但正如
    Ant 网站所述，Ant“有点像 Make，但没有 Make 的缺点”（http://ant.apache.org/）。


    Ant 的简洁性促成了它的快速普及，并使其成为 Java 世界中构建应用程序的事实标准。Ant 与并发版本系统（CVS）一起，通过提供一种通用的方式让个人获取、构建并为开源社区做出贡献，在促进开源方面发挥了重要作用。Ant
    也已成为大多数 Java 开发者（尤其是开发 J2EE 应用程序的开发者）不可或缺的工具。


    Ant 让全球 Java 开发者的生活变得更加轻松。尽管远非完美，但它已证明能够满足 Java 开发者的需求，从掌控构建过程到摆脱专有构建系统的束缚。


    选择 Ant 最相关的理由如下：


    *   **平台独立性：** 典型的企业级 Java 环境包括在 Wintel 机器上工作并部署到 UNIX 机器进行生产的开发团队。Ant 作为纯 Java
    工具，使得无论平台如何，都能拥有一个一致的构建过程，从而使开发、预发布、集成和生产环境更加接近。Ant 还具有处理平台差异的内置功能。你的 Java 代码是可移植的；你的构建也应该是可移植的！！

    *   **普及度：** Ant 无处不在！是的，这本身并不是支持某项技术的充分理由，但普及性带来的优势很多，包括招聘、培训和技能的市场价值。Ant 也已集成到许多主流
    IDE 中，从而成为开发者之间一致的因素。这在一定程度上是由于（无论出于好坏原因）选择 XML 作为其语言。

    *   **功能性和灵活性：** 对于大多数 Java 项目而言，Ant 是可扩展且高度可配置的；它开箱即用地提供了所需的功能。对于 Java 开发者来说，任何类都可以轻松成为
    Ant 任务，尽管根据我们的经验，我们很少需要编写自己的任务（因为开源社区中似乎总有人抢先一步）。如果需要，你可以插入脚本引擎并运行特定于平台的命令。

    *   **语法：** 无论你喜欢与否，XML 已成为全球公认的数据格式。大多数 Java 开发者都使用过 XML，而 J2EE 开发者更是每天都要处理 XML。XML
    使 Ant 符合流行术语。但 XML 也有一些优势。XML 因其层次结构特性，非常适合表示结构化数据。大量商业和开源解析器的存在，以及轻松检查 XML 文件格式是否正确和有效的能力，使得
    XML 在行业中得到了广泛应用。


