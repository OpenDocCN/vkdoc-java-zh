    new StringPropertySelectionModel(FORMAT_STRINGS);


    private Format timeFormat;


    public void pageBeginRender(PageEvent event) {


    if (getFormatString() == null) {


    setFormatString(FORMAT_STRINGS[0]);


    }


    }


