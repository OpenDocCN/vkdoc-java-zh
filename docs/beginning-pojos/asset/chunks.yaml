    • **可维护性与可扩展性：** 系统必须易于维护和扩展。


    功能模块应能根据特定部署的运营特性，轻松地添加、移除、启用或禁用。


    • **安全性：** 数据必须以安全高效的方式存储和检索。系统用户必须能够根据其角色或安全级别访问相应功能。


    • **可伸缩性与可靠性：** 应允许多个用户与系统交互。系统的性能特征不应随着并发用户数量的增加而发生显著变化。


    • **个性化与定制化：** 用户界面应具有可定制的观感，允许根据用户身份进行品牌化设置和动态更改。


    • **文档与内容管理：** 系统应提供管理各类文档的能力，并允许对基于文档的信息进行操作、分类、编辑和转换。


    • **管理：** 系统应提供一个框架，以便轻松地向各个组件添加管理功能。管理功能应相对易于创建和定制。


    • **消息传递：** 某些子系统之间预计需要异步通信设施。架构必须提供一个消息传递框架，或能够无缝集成一个此类框架。


    • **与遗留系统和外部资源的集成：** 系统应便于从外部和遗留数据源获取数据，并能够以行业标准的方式向外部实体发布数据。


