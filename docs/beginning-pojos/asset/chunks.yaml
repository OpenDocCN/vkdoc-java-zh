    Informa API。RSSFeedManager 类维护了一个静态的单例 FeedManager 实例。FeedManager 用于管理数据源。数据源通过
    addFeed 方法添加到管理器中。使用 getFeed 或 addFeed 请求检索数据源时，如果数据源是最新的，则会返回缓存副本；否则，将直接从源中检索。


