    如您所见，Lucene 项目提供了用于编译和测试应用程序的目标。通过输入 `ant test` 手动测试构建。如果构建在命令行中能正确运行，那么当由 CruiseControl
    构建循环调用时，它也应该能正常工作。


    接下来，我们将创建一个 CruiseControl 将使用的小型 Ant 构建脚本。这个委托构建脚本（如清单 9-1 所示）将在从 CVS 仓库获取最新代码库副本后，调用
    Lucene 项目的构建。请注意，`basedir` 属性被设置为我们要构建的项目目录。将此构建文件命名为 `build-jakarta-lucene`，并将其放置在
    `cc-work-dir` 目录中。在此示例构建文件中，我选择仅从 CVS 更新现有代码库，而不是删除 `jakarta-lucene` 目录并从头检出项目。许多专家建议这样做，因为否则你将依赖构建具有重置或清理先前构建运行产生的任何工件的能力。关于良好
    Ant 清理目标的重要性，请参见第 3 章。


    **清单 9-1.** *用于 CruiseControl 自动化的委托构建文件*


    <project name="cc-lucene-build" default="test" basedir="checkout/jakarta-lucene">


    <target name="cvs">


    <cvs command="up –d –P"/>


    <ant antfile="build.xml" target="clean" />


    </target>


    <target name="test" depends="cvs">


    <ant antfile="build.xml" target="test" />


    </target>


    </project>


    您可以通过将目录更改为 `cc-work-dir` 并输入 `ant -f build-jakarta-lucene` 来测试该脚本。


    有了委托构建脚本后，我们可以继续增强之前创建的空 XML 配置。CruiseControl 使用 XML 配置来确定要构建哪些项目，以及为任何给定项目启用哪些报告和警报功能。


    配置文件默认名为 `config.xml`，尽管您可以使用任何其他名称，并在运行 CruiseControl 脚本（`cruisecontrol.sh` 或
    `cruisecontrol.bat`）时使用 `configfile` 命令行参数。配置 XML 文件如清单 9-2 所示，其格式在 http://cruisecontrol.sourceforge.net/main/configxml.html
    有正式文档说明。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


