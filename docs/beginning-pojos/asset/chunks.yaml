- fmt: "# Generating Source-Code Metrics\n\nAlthough I don’t advocate counting code\
    \ lines, classes, or methods as a measure of a project’s success, static code\
    \ analysis can help you pinpoint some areas of unnecessary complexity that can\
    \ lead to the discovery of potential bugs or high-maintenance code.\n\n`JavaNCSS`\
    \ is a simple source-measurement tool for Java that provides that following basic\
    \ types of analysis:\n\n- **NCSS:** Noncommenting source statements provide counts\
    \ of many features of the code such as lines of code, declarations, methods, statements,\
    \ constructors, and so on.\n- **CCN:** Cyclomatic complexity number (McCabe metric).\
    \ McCabe’s cyclomatic complexity metric looks at a program’s control flow graph\
    \ as a measure of its complexity.\n\nYou can download `JavaNCSS` from `www.kclee.de/clemens/java/javancss/`\
    \ as a simple ZIP file that includes an Ant task. Place all JAR files located\
    \ under the distribution’s `lib` directory in a directory named `javancss` under\
    \ the `lib` directory of the TechConf project. Next, create a directory named\
    \ `xslt` under the `lib/javancss` and copy the contents of the `xslt` directory\
    \ under the JavaNCSS distribution directory.\n\nTo make the JavaNCSS Ant task\
    \ available in the `macros.xml` file we add the following path and `taskdef` definitions:\n\
    \n```\n<path id=\"javancss.class.path\">\n  <fileset dir=\"lib/javancss\">\n \
    \   <include name=\"*.jar\"/>\n  </fileset>\n</path>\n\n<taskdef\n  name=\"javancss\"\
    \n  classname=\"javancss.JavancssAntTask\"\n  classpathref=\"javancss.class.path\"\
    \n/>\n```\n\nThe Ant task can generate a report in plain text of the XML format.\
    \ Similar to the `checkstyle` macrodef, you’ll use the `style` task to transform\
    \ the reports to HTML, as shown in Listing 3-11.\n\n**Listing 3-11.** *Generate-metrics\
    \ Macrodef*\n\n```\n<macrodef name=\"generate-metrics\">\n  <attribute name=\"\
    src\" />\n  <attribute name=\"report-name\" />\n  <attribute name=\"report-dir\"\
    \ default=\".\" />\n  <attribute name=\"xml-report\" default=\"@{report-dir}/@{report-name}.xml\"\
    \ />\n  <attribute name=\"html-report\" default=\"@{report-dir}/@{report-name}.html\"\
    \ />\n  <attribute name=\"stylesheet\" default=\"lib/javancss/xslt/javancss2html.xsl\"\
    \ />\n  <sequential>\n    <mkdir dir=\"@{report-dir}\" />\n    <javancss\n   \
    \   srcdir=\"@{src}\"\n      includes=\"**/*.java\"\n      generateReport=\"true\"\
    \n      outputfile=\"@{xml-report}\"\n      format=\"xml\"\n      functionMetrics=\"\
    false\"\n    />\n    <style\n      in=\"@{xml-report}\"\n      out=\"@{html-report}\"\
    \n      style=\"@{stylesheet}\"\n    />\n  </sequential>\n</macrodef>\n```\n\n\
    The generated HTML reports look like the one shown in Figure 3-7.\n\n**Figure\
    \ 3-7.** *A JavaNCSS HTML report*\n\n# Generating Browsable Source Code\n\nOne\
    \ useful feature for sharing knowledge about a project is the ability to generate\
    \ a browsable version of the code for viewing online. Many open source projects\
    \ use this as a way to allow others to view the source to a particular class without\
    \ having to download a source distribution or having to use CVS. `Java2Html` is\
    \ a tool that enables you to take a Java class or a snippet of Java code and generate\
    \ a syntax-highlighted HTML version of the code.\n\nThe `Java2Html` tool can be\
    \ obtained from `www.java2html.de` as a single ZIP file that contains one JAR\
    \ file (`java2html.jar`). As with the other third-party Ant tasks, place the JAR\
    \ file in a directory named `java2html` under the TechConf `lib` directory.\n\n\
    As mentioned previously, you should load the task using the `taskdef` task. First\
    \ we add the path and `taskdef` to the `macros.xml` file as shown here:\n\n```\n\
    <path id=\"java2html.class.path\">\n  <fileset dir=\"lib/java2html\">\n    <include\
    \ name=\"*.jar\"/>\n  </fileset>\n</path>\n\n<taskdef\n  name=\"java2html\"\n\
    \  classname=\"de.java2html.anttasks.Java2HtmlTask\"\n/>"
  raw: '**Generating Source-Code Metrics**


    Although I don’t advocate counting code lines, classes, or methods as a measure
    of a project’s success, static code analysis can help you pinpoint some areas
    of unnecessary complexity that can lead to the discovery of potential bugs or
    high-maintenance code.


    JavaNCSS is a simple source-measurement tool for Java that provides that following
    basic types of analysis:


    • **NCSS:** Noncommenting source statements provide counts of many features of
    the code such as lines of code, declarations, methods, statements, constructors,
    and so on.


    • **CCN:** Cyclomatic complexity number (McCabe metric). McCabe’s cyclomatic complexity
    metric looks at a program’s control flow graph as a measure of its complexity.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 76 Wednesday, February 22, 2006 6:05 AM


    **76**


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    You can download JavaNCSS from www.kclee.de/clemens/java/javancss/ as a simple
    ZIP


    file that includes an Ant task. Place all JAR files located under the distribution’s
    lib directory in a directory named javancss under the lib directory of the TechConf
    project. Next, create a directory named xslt under the lib/javancss and copy the
    contents of the xslt directory under the JavaNCSS distribution directory.


    To make the JavaNCSS Ant task available in the macros.xml file we add the following
    path and taskdef definitions:


    <path id="javancss.class.path">


    <fileset dir="lib/javancss">


    <include name="*.jar"/>


    </fileset>


    </path>


    <taskdef


    name="javancss"


    classname="javancss.JavancssAntTask"


    classpathref="javancss.class.path"


    />


    The Ant task can generate a report in plain text of the XML format. Similar to
    the checkstyle macrodef, you’ll use the style task to transform the reports to
    HTML, as shown in Listing 3-11.


    **Listing 3-11.** *Generate-metrics Macrodef*


    <macrodef name="generate-metrics">


    <attribute name="src" />


    <attribute name="report-name" />


    <attribute name="report-dir" default="." />


    <attribute name="xml-report" default="@{report-dir}/@{report-name}.xml" />


    <attribute name="html-report" default="@{report-dir}/@{report-name}.html" />


    <attribute name="stylesheet" default="lib/javancss/xslt/javancss2html.xsl" />


    <sequential>


    <mkdir dir="@{report-dir}" />


    <javancss


    srcdir="@{src}"


    includes="**/*.java"


    generateReport="true"


    outputfile="@{xml-report}"


    format="xml"


    functionMetrics="false"


    />


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00065.png)


    Sam-Bodden_596-3 C03.fm Page 77 Wednesday, February 22, 2006 6:05 AM


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    **77**


    <style


    in="@{xml-report}"


    out="@{html-report}"


    style="@{stylesheet}"


    />


    </sequential>


    </macrodef>


    The generated HTML reports look like the one shown in Figure 3-7.


    **Figure 3-7.** *A JavaNCSS HTML report*


    **Generating Browsable Source Code**


    One useful feature for sharing knowledge about a project is the ability to generate
    a browsable version of the code for viewing online. Many open source projects
