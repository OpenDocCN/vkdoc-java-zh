    \ 7-23.** *Attendee Register page (register.html)* AJAX Features\n\nOne of the\
    \ AJAX features that we want to accomplish on the Register page is to use the\
    \ auto-complete effect to allow users to partially enter a ZIP code and have a\
    \ list of matches appear in a drop-down menu. Once they select a ZIP code, the\
    \ city and state corresponding to the selected ZIP code should appear in their\
    \ respective fields.\n\nThe other feature of the Register page is dynamic user\
    \ input validation. In a typical non-AJAX application, the user will enter data\
    \ in the form and submit the form to the server for validation. If errors exist,\
    \ the new page rendered will contain error messages or some kind of indicator\
    \ as to what fields are in error. The goal for the Register page is to use Tacos\
    \ components to submit the form data asynchronously and update the display dynamically\
    \ to show any errors.\n\nTo display the errors on the page, we need a specific\
    \ portion of the page to serve as the container for the error messages. To accomplish\
    \ this, we can create a simple custom component to render error messages.\n\n\
    ## The ErrorDisplay Component\n\nThe `ErrorDisplay` component will construct the\
