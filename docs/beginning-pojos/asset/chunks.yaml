    public Date getTime() {


    return new Date();


    }


    public abstract String getFormatString();


    public abstract void setFormatString(String formatString); public void formSubmit(IRequestCycle
    cycle) {


    System.out.println("The form has been submitted!");


    }


    }


    让我们从 FORMAT_MODEL 的定义开始，我们将使用简单的 StringPropertySelectionModel，它允许将字符串数组用作下拉菜单中标签的来源，并使用简单的整数索引作为值。创建了一个包含多个格式字符串的
    String[]，这些字符串可与 java.text.SimpleDateFormat 实例一起使用，然后将其用于 StringPropertySelectionModel
    的构造函数中。


    getFormatString 方法将在表单提交后返回所选格式字符串的值。该值在 getTimeFormat 方法中用于返回一个 Format 对象。formSubmit
    方法返回 void 且实现为空。返回 void 表示提交后要渲染的页面是当前页面，并且方法体没有任何功能，因为下拉选择的值已经分配给了 formatString
    属性。


    你可能会注意到 getFormatString 和 setFormatString 是抽象方法。


    在运行时，Tapestry 会创建 Home 类的具体实现，并为所有抽象的 getter 和 setter 方法提供实现，同时提供一个字段来保存属性的值。刚接触
    Tapestry 且未遇到过这种巧妙使用抽象类的开发者，可能会对针对抽象类进行编码感到有些不安。但这是 Tapestry 最大的优势之一，它展示了在利用环境动态特性的同时，将用户提供的具体代码进行混合的最佳方式。


    最后，我们需要在页面渲染时（而非表单提交的结果）为格式字符串赋值。为此，我们需要了解页面的生命周期。Tapestry 页面会产生多个不同的事件，可以通过实现相应的监听器接口来监听这些事件。在本例中，我们实现了
    org.apache.tapestry.event.PageBeginRenderListener，该接口用于确定页面何时即将被渲染。


    void pageBeginRender(PageEvent event) 方法的实现会检查 formatString 是否为空，如果为空，则分配数组中的第一个值。


    运行中的应用程序如图 7-10 所示。从下拉菜单中选择一个格式字符串并点击提交按钮，应该会导致显示的字符串更改为所选格式。


