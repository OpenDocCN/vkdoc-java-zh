    ## Open Issues and Assumptions


    The dynamic nature of enterprise development forces you to make assumptions based
    on previous experiences and to delay dealing with certain aspects of the system
    until later in the development stages.


    ### Assumptions


    Some of the assumptions made are the result of implied requirements gathered from
    stakeholders’ meetings and projections about the future usage of the system. Some
    of these assumptions include the following:


    - Concurrency requirements are expected to increase over time.

    - A large percentage of attendees are technologically savvy.

    - Applications will be accessed remotely via the Internet using a browser-based
    interface.

    - The conference internal network will be protected with an HTTP firewall.

    - A large percentage of attendees carry network-ready PDAs or other mobile computing
    devices.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C01.fm Page 11 Wednesday, February 22, 2006 6:01 AM


    C H A P T E R 1 ■ I N T R O D U C T I O N


    **11**


    ### Open Issues


    It’s expected that as the system is designed and developed, your understanding
    about the dynamics governing its behavior will coalesce. New relationships and
    interfaces will be discovered, and previously unidentified usage scenarios will
    appear. Preparing for such discoveries by infusing flexibility in your designs
    is key for any system that will evolve in a controlled fashion.


    Some expected open issues are as follows:


    - Unidentified stakeholders

    - With multiple channels being serviced by the application, the need to find a
    way to produce channel-specific content

    - The need to create several system-level components for authentication, registration,
    and the handling of payments

    - The large number of implementation choices available

    - Unidentified alternate usage scenarios

    - Unidentified requirements


    ## Design Road Map


    To tackle the ongoing design process of the TechConf system, you should follow
    a simple design road map that will guide you through the creation of the models
    and the subsequent production of the code that will materialize those models into
    a working software system. The road map consists of several steps or activities,
    many of which can be accomplished in parallel as follows:


    - **Creation of an analysis object model (domain model):** An understanding of
    the domain is documented in the form of a static model (class model) that will
    serve as guidance during the requirements analysis and creation of the design
    models. This step gives a high-level foundation from which it’s easier to see
    subsystems of related objects and components emerge. A domain model also serves
    as a way to validate any assumptions or preconceived notions about the domain
    and solidifies and centralizes the knowledge about a problem domain.

    - **Requirement analysis:** Actors are defined from the analysis and architectural
    documents. User use cases are created for high-level interactions of the primary
    actors with the system. User use cases are then broken up into system-level use
    cases if necessary. System-level use cases depict actions taken by specific components
    in the system to accomplish a task needed for the fulfillment of a user use case.
    Quick assessment of the reuse of system-level use cases is performed. High-priority
    use cases are written in detail to curtail major risks (detail doesn’t mean implementation-specific
    details). Analysis of requirements continues iteratively for as long as the project
    or product is alive.

    - **Iteration planning:** Iterations are planned based on a group of use cases.
    Integration planning is performed to determine points of integration, and modifications
    or enhancements to the overall automation of the integration process are made.
    In this book, each chapter is set as an iteration that sets out to fulfill a certain
    number of use cases.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C01.fm Page 12 Wednesday, February 22, 2006 6:01 AM


    **12**


    C H A P T E R 1 ■ I N T R O D U C T I O N


    - **Iteration execution:** Detail is added to use cases, both user and system
    use cases. Tests are written for each feature, and integration code or scripts
    are created or enhanced. Detailed, dynamic models are created (detailed enough
    to be implemented and detailed enough to utilize any forward-engineering features
    of the CASE tools available to the maximum). Class diagrams for any subsystems
    created are defined, and the overall model diagram is updated to reflect the results
    of the iteration. Whenever necessary, component diagrams and subsystem diagrams
    are created, thereby displaying the component interfaces and their relationships
    to the object models.'
  raw: '• **Maintainability and extensibility:** The system must be easy to maintain
    and extend.


    Pieces of functionality should be easily added or removed, or turned on or off,
    depending on the operational characteristics applicable to a specific deployment.


    • **Security:** Data must be stored and retrieved in a secure and efficient fashion.
    Users of the system must have access to functionality according to their roles
    or security levels.


    • **Scalability and reliability:** Multiple users should be able to interact with
    the system. The performance characteristics of the system shouldn’t change dramatically
    with an increase in the concurrent user base.


    • **Personalization and customization:** The user interface should have a customizable
    look and feel, allowing for branding and dynamic changes based on the identity
    of the user.


    • **Document and content management:** The system should provide the ability to
    manage the variety of documents used and also allow for the manipulation, classification,
    editing, and transformation of document-based information.


    • **Administration:** The system should provide a framework to easily add management
    capabilities to individual components. Administrative functions should be relatively
    easy to create and customize.


    • **Messaging:** Asynchronous communication facilities are expected to be required
    between certain subsystems. The architecture must provide a messaging framework
    or the ability to seamlessly integrate one.


    • **Integration with legacy and external resources:** The system should facilitate
    the acquisition of data from external and legacy sources, as well as the ability
    to publish data to external entities in an industry-standard fashion.


    Figure 1-2 diagrams the architectural requirements.


