    一个好的实践是将生命周期方法分离到一个单独的类中。为此，您需要使用 `@CallbackListener` 标签来注解 Bean 类，该标签指定用作生命周期调用监听器的类。


    **持久化之路**


    有多种方式可以满足 Java EE 应用程序的持久化需求，但在使用 JBoss 时，两个显而易见的选择是：使用 Hibernate（如第 4 章所示），或者使用
    EJB3 持久化服务。在底层，JBoss 使用 Hibernate 来驱动 EJB3 持久化引擎。Hibernate 通过其注解和 `EntityManager`
    实现来执行 EJB 3.0/JSR-220 持久化规范。从 Hibernate 迁移到 EJB3 是一个相对简单的过程（如果您的应用程序需要使用 EJB3
    持久化）。在本章中，我们将使用第 4 章开发的持久化映射 POJO，因为 Hibernate 基于其在行业中的流行度和普及性，也可以被视为一种标准。更不用说
    JBoss AS 提供了所有应用服务器中与 Hibernate 的最佳集成。


    **JBoss 中的 Hibernate**


    JBoss AS 通过其 HAR 部署器和 Hibernate 服务提供了强大的 Hibernate 集成。通过 Hibernate 服务，您可以拥有一个绑定到
    JNDI 的 Hibernate `SessionFactory` 对象。HAR 部署器是一个专门的 JBoss 部署器，它会扫描扩展名为 `.har` 的
    JAR 归档内容，并根据找到的任何 Hibernate 映射文件（`.hbm.xml` 文件）创建一个 `SessionFactory`。HAR 代表 Hibernate
    归档，它代表了 JBoss AS 中可用的一种自定义部署方式。

