- fmt: "Let’s walk through the elements of the `config.xml` file. In the case of the\
    \ example for Lucene, the `listeners` element contains one listener that logs\
    \ the current build status to the file `status.txt`.\n\n```\n<listeners>\n  <currentbuildstatuslistener\
    \ file=\"logs/jakarta-lucene/status.txt\"/>\n</listeners>\n```\n\nNext, the `modificationset`\
    \ element specifies where CruiseControl should check to determine if a build should\
    \ be triggered. In the case of the example, CruiseControl will check the local\
    \ working copy of the project for changes. The attribute `quietperiod` determines\
    \ the time in seconds that CruiseControl will wait for it to determine that there\
    \ are no check-ins occurring on the project. Set this parameter based on the habits\
    \ of your team. For example I like to set this parameter to about 120 seconds,\
    \ since I like to take my time with the check-in comments.\n\n```\n<modificationset\
    \ quietperiod=\"60\">\n  <cvs localworkingcopy=\"checkout/jakarta-lucene\"/>\n\
    </modificationset>\n```\n\nThe `interval` attribute of the `schedule` element\
    \ determines how often CruiseControl will check the modification set to determine\
    \ whether to run the build. Set this attribute based on the number of projects\
    \ on your build machine and the priority and frequency of change of those projects.\n\
    \nThe `ant` element is one of the possible actions to perform when a build is\
    \ deemed necessary.\n\nIn here we are invoking the delegate buildfile created\
    \ for the Lucene project.\n\n```\n<schedule interval=\"60\" >\n  <ant\n    buildfile=\"\
    build-jakarta-lucene.xml\"\n    target=\"test\"\n    uselogger=\"true\"\n    usedebug=\"\
    false\"\n  />\n</schedule>\n```\n\nFinally, the `log` element determines the directory\
    \ for the CruiseControl logs. The `merge` element tells CruiseControl to “merge”\
    \ the JUnitReport XML files produced during the build of the Lucene project. In\
    \ the case of the Lucene project those files are located in the `build/test` directory.\
    \ You’ll determine this by examining the `build.xml` or simply running the build\
    \ and searching for the reports.\n\n```\n<log dir=\"logs/jakarta-lucene\">\n \
    \ <merge dir=\"checkout/jakarta-lucene/build/test/\" />\n</log>\n```\n\nWith everything\
    \ now set, let’s fire up CruiseControl and watch it build the Lucene project.\n\
    \nAs done previously, change directories to the CruiseControl working directory\
    \ and execute the `cruisecontrol.sh` script. In the output, you should see the\
    \ project sources being retrieved from CVS and the build executing.\n\nRefreshing\
    \ the CruiseControl reporting Web application should reveal the Lucene project\
    \ as shown in Figure 9-4.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00015.png)\n\n![](images/00109.png)\n\nSam-Bodden_596-3 C09.fm Page\
    \ 355 Thursday, February 16, 2006 3:35 PM\n\nC H A P T E R 9 ■ C O N T I N U O\
    \ U S I N T E G R A T I O N\n\n**355**\n\n**Figure 9-4.** *A project under CruiseControl*\n\
    \nThe CruiseControl reporting application provides information about the time\
    \ of the last build and whether it was successful or not. If we drill down further\
    \ by clicking on the project’s name link, we are presented with a page that provides\
    \ five tabs: Build Results, Test Results, XML Log File, Metrics, and a JMX Control\
    \ Panel.\n\nIn the Build Results page you will find information about errors and\
    \ warnings produced during the build, general information about the result of\
    \ running the test suite, and a summary of any modifications since the last successful\
    \ build. Figure 9-5 shows the Unit Tests summary for the Lucene project.\n\n**Figure\
    \ 9-5.** *Unit Tests summary under the Build Results page* The Test Results page\
    \ gives you a more detailed view of each test executed, including timings. Figure\
    \ 9-6 shows the Test Results page for the Lucene project.\n\nThe metrics page\
    \ provides a historical graph showing the distribution in time of good versus\
    \ bad builds as well as a pie chart showing the percentage of good and bad builds.\
    \ This view is a favorite of programming managers.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00057.png)\n\nSam-Bodden_596-3 C09.fm Page 356 Thursday, February\
    \ 16, 2006 3:35 PM\n\n**356**\n\nC H A P T E R 9 ■ C O N T I N U O U S I N T E\
    \ G R A T I O N"
