- fmt: '# General Application Requirements


    To manage the information needs of a technology conference, a software system
    is needed that will provide an interactive information channel that manages the
    needs of the different stakeholders. There is a business drive mandating the creation
    of the systems to serve as the basis for a new line of products tailored to the
    organization, execution, and maintenance of technology conferences. These products
    are to be sold as a collection of components or subsystems that can be adapted
    to the particular needs of a customer.


    The separation of roles and functionality needs to be clear in order to have a
    system that can be easily customized and enhanced. It’s important for the system
    to account for the fact that attendees and presenters are geographically dispersed.
    There should be no need (or as little need as possible) for users to install or
    configure any software.


    This section outlines the general business requirements that the system must meet.
    Based on the general software distribution and configuration requirements, the
    primary medium chosen for the application is the Internet, in particular the Web.
    The Web provides the advantage of nearly zero cost for distribution and configuration.
    As the design process gets under way, refinements based on real-world constraints
    will be factored in. The following requirements have been organized by stakeholders
    to facilitate the separation of functionality at the design stages.


    ## Attendees


    Attendees are the primary focus of the system, and greater priority is placed
    on the functionality that affects them. The requirements of attendees form the
    basis of the majority of the functionality of the system.


    - **General information:** Prospective attendees (members of the public) need
    an easy and intuitive way to learn about the details of the conference. The application
    must be easy to navigate, and the addition of common website functionality such
    as news and printable views of content must be easily accomplished.

    - **Registration:** Attendees should be able to securely register for the conference
    and receive confirmation via email. The system should accommodate both individual
    and group registrations.

    - **Session browsing and selection:** The system should provide intuitive and
    powerful search capabilities to assist users in the selection of sessions to attend.

    - **Session evaluations:** Presenters should be able to review session evaluations
    online.

    - **Scheduling:** The system should provide users with the ability to easily view
    and manage their schedules. The scheduled data should be available in a variety
    of formats that target different mediums and devices (for example, the Web, personal
    digital assistants [PDAs], and emails on demand).

    - **Notification and reminders:** The system should provide users with the ability
    to subscribe to a conference notification service. These notices can include mailing
    lists, schedule-related reminders, and session-related news.

    - **Accommodation assistance:** The system should provide a way for attendees
    to find area maps, venue maps, hotel directions, locations of interest, restaurants,
    and other information to enhance their experience at the conference.


    ## Presenters


    Properly assisting and serving presenters will result in a higher quality of content
    for the conference. This in turn benefits the primary stakeholders, the attendees.


    - **Registration:** Presenters should be able to securely register for the conference
    and receive confirmation via email.

    - **Profile information:** Presenters should be able to enter contact information
    and biographical information, upload a picture, and provide other information
    of interest.'
