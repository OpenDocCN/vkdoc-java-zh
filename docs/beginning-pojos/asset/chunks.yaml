- fmt: "`ConferenceBorder`模板的最后一部分是页面左侧的站点导航菜单。对于每个菜单项，我们需要创建一个指向`Tapestry`页面的链接。`PageLink`组件用于创建指向当前应用程序中`Tapestry`页面的超链接。清单7-25展示了使用`PageLink`组件创建导航菜单的HTML模板部分。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C07.fm\
    \ Page 280 Thursday, February 23, 2006 4:22 PM\n\n**280**\n\n第7章 ■ TAPESTRY\n\n\
    **清单7-25.** *使用PageLink组件的导航菜单*\n\n```html\n<table border=\"0\" cellspacing=\"\
    0\" cellpadding=\"0\" width=\"165\" id=\"navigation\">\n...\n<tr><td width=\"\
    165\">\n<a href=\"#\" jwcid=\"@PageLink\"\npage=\"conference/Summary\" class=\"\
    navText\">home</a>\n</td></tr>\n<tr><td width=\"165\">\n<a href=\"#\" jwcid=\"\
    @PageLink\" page=\"conference/Keynote\"\nclass=\"navText\">keynotes</a>\n</td></tr>\n\
    <tr><td width=\"165\">\n<a href=\"#\" jwcid=\"@PageLink\" page=\"conference/Sessions\"\
    \nclass=\"navText\">sessions</a>\n</td></tr>\n<tr><td width=\"165\">\n<a href=\"\
    #\" jwcid=\"@PageLink\" page=\"conference/Speakers\"\nclass=\"navText\">speakers</a>\n\
    </td></tr>\n<tr><td width=\"165\">\n<a href=\"#\" jwcid=\"@PageLink\" page=\"\
    conference/Blogs\"\nclass=\"navText\">blogs</a>\n</td></tr>\n<tr><td width=\"\
    165\">\n<a href=\"#\" jwcid=\"@PageLink\" page=\"conference/Books\"\nclass=\"\
    navText\">book store</a>\n</td></tr>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nSam-Bodden_596-3 C07.fm Page 281 Thursday, February 23, 2006 4:22 PM\n\n第7章\
    \ ■ TAPESTRY\n\n**281**\n\n```html\n<span jwcid=\"displayLoggedInLinks\">\n<tr><td\
    \ width=\"165\">\n<a href=\"#\" jwcid=\"@ExternalLink\" page=\"attendee/ConfSessions\"\
    \nclass=\"navText\">my schedule</a>\n</td></tr>\n</span>\n</table>\n```\n\n`ConferenceBorder`组件的最后一个元素是处理登录和注销逻辑的Java代码。`ConferenceBorder`类包含`login`方法，该方法使用应用状态对象`LoggedInUser`来存储由注入的EJB3\
