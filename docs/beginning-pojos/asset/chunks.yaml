    引言


    **J**ava 的历史是曲折而复杂的。它起源于 Sun 公司（以其硬件而非软件更为知名），最初是一个针对消费设备的秘密项目。随着万维网的出现，Java 提供了唯一一种能够实现接近丰富动画效果的方式。


    在 HotJava 浏览器上运行、展示着跳舞的 Duke 的小程序，是我 1995 年“哦，这太酷了”的时刻。于是我们开始编写运行缓慢的巨大小程序，然后浏览器大战开始了，你只能猜测它是否能运行，或者你的用户会在他们的浏览器上看到一个巨大的灰色框。如今，小程序仍有其用武之地，主要是在最意想不到的地方，比如润滑油更换车间的电脑，或配送中心的传送带控制应用程序。


    但 Java 仍然是新来者。在 90 年代末，Web 应用程序是基于 CGI 平台和大量脚本语言构建的。那时，Java 凭借 Servlet API 和当时被视为金锤子的
    EJB 规范崭露头角。那时，我已经被分布式组件对象模型（DCOM）和公共对象请求代理体系结构（CORBA）的复杂性所困扰，所以套用 Bruce Tate 的话说，我吞下了大象，而且味道不错！好吧，你猜怎么着？到我们进入
    21 世纪时，大象已经成为大型企业 IT 部门的首选动物，但它开始在野外面临激烈的竞争。它必须与珍珠（Pearls）赛跑，与蟒蛇（Pythons）搏斗，最近还试图避开隧道尽头的红灯（那是
    Ruby on Rails 吗？）。


    幸运的是，对于我们来说，大象通过远离太阳（Sun）而节食了 ;-)。今天，我们可以构建具有与脚本语言阵营所展示的类似敏捷性的 Java 应用程序。POJO
    不是一项新技术或技巧，而是一种“回归基础”的理念，在这种理念中，我们更专注于业务功能，而不是构建健壮应用程序所需的管道工程。这种简化和反思我们开发实践的运动主要由开源社区推动，该社区已经产生了各种敏捷、轻量级的框架。没有开源，Java
    就会成为你只在工作中使用、因为老板告诉你这是你唯一选择的野兽。在本书中，你将了解我在日常工作中使用、并且不仅需要而且乐于使用的轻量级框架和工具。


    **本书读者对象**


    本书面向初、中级 Java 开发人员，他们希望使用开源 Java 社区的最新成果来构建企业级 Web 应用程序。在本书中，你将通过循序渐进的方法探索构建 Java
    Web 应用程序的不同途径。


    **xvii**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 FRONT.fm 第 xviii 页 2006 年 2 月 24 日，星期五，上午 9:59


    **xviii**


    ■ 引 言


    **本书结构**


    本书的章节围绕应用层的概念以及用于构建该层的工具或框架展开。你可以独立阅读每一章，因为我在大多数章节中都提供了一个简单的入门示例，随后是在本书贯穿始终的示例应用程序上下文中对该工具的更深入使用。


    • **第 1 章，引言：** 本章将为我们在本书过程中将构建和重建的应用程序奠定基础。你将了解一些最终促成示例应用程序创建设计和架构决策。


    • **第 2 章，Eclipse：** 本章介绍我首选的开发环境——Eclipse IDE，以及一些能让你的开发更轻松、更愉快的插件。


    • **第 3 章，使用 Ant 构建：** 本章着手创建一个基于 Ant 的可靠构建系统，该系统将在本书其余部分中使用。本章提供了“最佳实践”和一系列基于
    Ant 的工具，可以改进你的构建。


    • **第 4 章，使用 Hibernate 进行对象关系映射：** 本章向你介绍有时令人沮丧的对象到关系数据库映射艺术。你将学习如何使用最流行、最强大的
    ORM 工具——Hibernate。


    • **第 5 章，使用 JBoss 的业务服务：** 本章着手使用 JBoss 应用服务器上的 EJB3 技术构建示例应用程序的业务层。本章通过展示处理应用程序不同层的替代方法，为后续章节奠定基础。


    • **第 6 章，Spring 框架：** 本章通过使用 Spring Bean 服务构建第 5 章中构建的同一组服务，展示了 Spring 框架的敏捷方法。


    • **第 7 章，Tapestry：** 本章展示了 Java Web 应用程序框架中的隐藏瑰宝。你将使用 Tapestry 构建示例应用程序的用户界面。


    • **第 8 章，测试：** 本章通过重新审视 JUnit 并介绍 TestNG、DbUnit 和 EasyMock，对 Java EE 应用程序的测试进行了简洁而务实的探讨。


    • **第 9 章，持续集成：** 本章深入探讨了使用 CruiseControl 构建调度器进行持续集成的实践。


    • **第 10 章，其他主题：** 本章介绍了一些用于完善真实世界应用程序功能的工具，例如使用 AspectJ 进行面向切面编程，以及使用 Informa
    库添加 RSS 源。


    **先决条件**


    本书中的代码使用了 Java 5 的特性，例如注解以及一些较新的语法和结构。

