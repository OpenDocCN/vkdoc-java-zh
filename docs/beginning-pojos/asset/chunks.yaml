    The final element of the ConferenceBorder component is the Java code that handles
    the login and logout logic. The ConferenceBorder class contains the login method,
    which uses the application state object LoggedInUser to store the UserSummary
    DTO returned by the injected EJB3 UserService if the username and password supplied
    to the UserService login method pass authentication. The logout method simply
    sets the user information to null in the LoggedInUser object. Listing 7-26 shows
    the implementation of ConferenceBorder.


