    • **并行对象层次结构：** 正如 Hibernate 项目的 Gavin King 所指出的，维护一个并行的类层次结构是“有坏味道的”。我们认为这表明领域模型已被
    Web 层需求或底层数据模型的影响所扁平化。尽管领域对象与 DTO 之间会存在明显的相似之处，但我们相信，一个设计良好的领域模型在结构和内容上都应与 DTO
    模型有较大差异。请记住，领域模型应在处理同一问题域的不同应用程序之间可重用。


    • **代码维护：** 我们发现，维护这些转换和传输对象会给项目增加相当多的开销。我们认为这个问题类似于维护自定义对象关系映射层的问题。


    **DynaDTO**


    对于 TechConf DTO 层的实现，我使用了 DynaDTO (https://dynadto.dev.java.net/)，这是一个解决屏幕与领域映射问题的方案，类似于
    Hibernate 解决对象关系映射问题。DynaDTO 项目提供了一个库，使您能够动态生成实现给定 Java 接口的 DTO。


    DynaDTO 旨在减轻手动编写 DTO 的负担，它有助于在应用程序领域模型和用户界面之间强制实施关注点分离，减少了实现该模式所需的代码量，并提供了一种一致的方式来声明性地定义领域模型与用户界面模型（即您的
    DTO）之间的简单和复杂映射。


    DynaDTO 通过一个 XML 文件进行配置，该文件为给定的 DTO 配置 DTO 构建器工厂。DTO 构建器工厂提供 DTO 构建器，这些构建器可以从一个或多个领域对象（任何
    JavaBean 或 POJO）构造给定类型的 DTO。DynaDTO 配置文件使用简单的属性映射（DTO 也可以使用 Java 进行内联配置）、嵌套属性以及使用
    Jakarta Commons Java 表达式语言（JEXL，位于 http://jakarta.apache.org/commons/jexl/）的表达式。


