  raw: 'The path datatype can also make use of nested pathelements, as shown in the
    definition of the all.source.path path structure. It uses the pathelement datatype
    to reference the locations defined by src-java and src-generated properties.


    Path is a typical Ant pathlike structure. When dealing with paths or classpaths,
    Ant’s task makes use of pathlike structures to perform its function. In the previous
    example, you can see that the two pathelements defined at the top of the buildfile
    are then used by reference in the context of the javac task. The class.path path
    is passed to the classpathref attribute of javac to determine the classpath for
    compilation and the all.source.path is used by creating a new pathelement, which
    is nested inside the src nested element of the javac task.


    As a build’s complexity increases so do the patterns for selecting files. Pathlike
    structures enable the reuse of path information and help keep the growth of buildfiles
    under control.


    ■**Note** One of the criteria used in choosing many of the tools in this chapter
    was whether the tool provided an Ant task.


    **Case Study: Building TechConf with Ant**


    To set the stage for the development throughout the rest of the book, you need
    to first create a suitable directory structure (see Figure 3-5) as well as an
    initial Ant buildfile for the TechConf system.


    **Figure 3-5.** *Sample directory structure for the TechConf project* The project’s
    root directory is TechConf. Under this directory you’ll place the project’s main
    buildfile, named build.xml. The subdirectories under TechConf are organized as
    follows:


    • **lib:** Contains any libraries required at runtime by the application(s)


    • **ant:** Contains Ant macrodef in a single file, macros.xml


    • **src:** The root directory for all non-generated sources


    • **src/java:** The root directory for all non-J2EE Java sources


    • **src/test:** The root directory for all test classes


    • **src/j2ee:** The root directory for all J2EE source files


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 66 Wednesday, February 22, 2006 6:05 AM


    **66**


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    Now that you have a suitable directory structure, your next step should be to
    start putting together the TechConf buildfile. The project element contains the
    name of your project and a nested description element.


    ■**Best Practice** Use the description element, which allows you to enter a detailed
    description of the project. This description is shown on the console when invoking
    Ant with the -projecthelp or -p command-line option.


    The default target will be the all target, which you’ll develop later in the chapter.
    The basedir is set to be the directory where the buildfile resides, which in this
    case is the TechConf directory.


    <?xml version="1.0"?>


    <project name="TechConf" default="all" basedir=".">


    <description>


    This build script was developed to be a generic enterprise development build script
    using ANT 1.6.5 (ant.apache.org). To customize it or use it for other projects
    modify the build.properties file.


    </description>


    ...


    Next, properties are defined for the created directories. Notice that you can
    define properties using other properties as with the lib-dev property. Properties
    that represent a directory are defined using the location attribute instead of
    the value attribute. The location attribute gets resolved to the full path relative
    to the basedir specified in the project element.


    ■**Best Practice** Making al paths relative to the project’s basedir directory
    and avoiding the use of absolute paths guarantees that your buildfile will work
    anywhere. If your build depends on a resource whose location might change from
    environment to environment, you should place the location of said resource in
    a properties file or use environment variables such as ${os.name}.


    The build directory is the root directory for all products of the build process,
    such as the classes directory, where the results of compiling the classes under
    src/java will be placed.


    <property file="build.properties"/>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 67 Wednesday, February 22, 2006 6:05 AM


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    **67**


    <property name="build" location="build" />


    <property name="lib" location="lib" />


    <property name="src" location="src" />


    <property name="src-java" location="${src}/java" />


    <property name="src-test" location="${src}/test" />


    <property name="src-j2ee" location="${src}/j2ee" />


    <property name="docs" location="docs" />


    <property name="docs-api" location="${docs}/api" />


    <property name="docs-html-source" location="${docs}/source" />


    <property name="docs-test" location="${docs}/tests" />


    <property name="src-web" location="web" /> Paths representing all the JAR files
    under the lib directory (class.path) and all class files under the classes directory
    are created.


    ■**Best Practice** A common practice in Ant buildfiles is to have an init task
    that all other tasks depend on.


    I advocate not using the init task for setting up properties, loading properties
    files, paths, patternsets, or taskdefs. Instead, just place them before the first
    target, and they will be added to the implicit target. As mentioned earlier, the
    contents of the implicit target always get called and you don’t have to remember
    making all other targets dependent on an init target.


    A patternset is also used to filter a directory for non-source files. In the case
    where resources are part of the source directory such as property files or images,
    a patternset can be used to copy them to the location of the compiled classes
    which will require said resources.


    <path id="class.path">


    <fileset dir="${lib}">


    <include name="*.jar"/>


    </fileset>


    </path>


    <path id="app.class.path">


    <pathelement location="${classes}"/>


    <path refid="class.path"/>


    </path>


    <patternset id="non.source.set">


    <exclude name="**/*.java"/>


    ...


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 68 Wednesday, February 22, 2006 6:05 AM


    **68**


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    <exclude name="**/read-me.txt"/>


    <exclude name="**/package.html"/>


    </patternset>


    **Compiling**


    Now it’s time to add the first target to the buildfile, the compile target. This
    target will make use of the javac task, which is a wrapper to the javac command.
    In Listing 3-6, notice that before the javac task is invoked, all files under
    the ${src-java} directory that match the patternset non.source.set are copied
    to the ${classes} directory. This is done so that any resources such as Java properties
    files, images, and others are available to the compiled code under the classes
    directory. This is a common practice for many IDEs.


    **Listing 3-6.** *Compile Target*


    <target


    name="compile"


    depends="compile-init"


    description="Compiles all classes (JDK1.5)">


    <javac


    destdir="${classes}"


    classpathref="class.path"


    debug="on"


    deprecation="on"


    optimize="off"


    >


    <src>


    <path refid="all.source.path" />


    </src>


    </javac>


    </target>


    <target name="compile-init">


    <target-banner target="compile"/>


    <mkdir dir="${classes}"/>


    <copy todir="${classes}">


    <fileset dir="${src-java}">


    <patternset refid="non.source.set" />


    </fileset>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 69 Wednesday, February 22, 2006 6:05 AM


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    **69**


    <fileset dir="dd">


    <include name="*.properties"/>


    </fileset>


    </copy>


    </target>


    <target name="compile-clean">


    <delete includeemptydirs="true">


    <fileset dir="${classes}" includes="**/*"/>


    </delete>


    </target>


    Notice that we’ve added two more targets other than compile. These are compile-init
    and compile-clean. The compile-init target simply creates the classes directory
    by making use of the mkdir task. The compile-clean target uses the delete task
    to remove the directory and all of its contents.'
