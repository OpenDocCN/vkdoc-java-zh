    public aspect HibernateExceptionConverterAspect {


    pointcut daoClasses() :


    call(* com.integrallis.techconf.ejb.dao.hibernate.*DAO*.*(..)); pointcut testClasses()
    :


    call(* com.integrallis.techconf.dao.hibernate.*Test.*(..)); Object around() :
