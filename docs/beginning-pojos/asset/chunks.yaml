    The aspect defines two pointcuts, the daoClasses and the testClasses pointcuts.
    The daoClasses pointcut defines all the classes in the DAO packages, while the
    testClasses pointcut is used to cover testing classes. In this aspect we use the
    around advice, which is used to wrap the implementation of the advised methods
    in a try-catch block used to trap the Hibernate Exceptions and throw the equivalent
    DAO custom exception as determined by the convertAndThrow method.


