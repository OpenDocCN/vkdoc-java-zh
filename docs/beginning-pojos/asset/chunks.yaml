    **Cleaning Up**


    The build process produces many files and directories. Getting the project directory
    to the same state as when the source was checked out of a repository is important
    for determining what has changed. Many Ant users recommend having a “clean” target
    that can remove all the products of the build process.


    The problem with this approach is that for large builds it’s easy to accidentally
    delete files that are needed, and it’s also easy to miss files or directories
    that need to be deleted. For this reason you should include a clean sub target
    for each main target in the buildfile. By doing this you’ll easily be able to
    determine what needs to be clean at the target level. Then for the global clean
    target you can simply invoke all individual clean sub targets by invoking them
    using the antcall task (or by listing them as dependencies), as shown in Listing
    3-14.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


