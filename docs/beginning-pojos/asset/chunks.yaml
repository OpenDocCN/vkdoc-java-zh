    ## Building the TechConf UI with Tapestry


    The TechConf application user interface is a dynamic Web application. In Chapter
    6 we built portions of the TechConf Web application using the Spring MVC Web framework
    with a middle tier consisting of Spring bean services. In this chapter we’ll approach
    the same problem using a different technology stack. Instead of Spring MVC we’ll
    use Tapestry, and instead of Spring bean services we’ll use EJB3 stateless session
    bean services developed in Chapter 5, and we’ll inject them into our Tapestry
    pages using HiveMind. In the Tapestry implementation we will also implement more
    of the TechConf Web tier than we did in Chapter 6. In order to better understand
    the TechConf user interface, Figure 7-11 shows a website map for the TechConf
    application. We won’t develop every single page shown in Figure 7-11 but we will
    tackle a significant and representative set of functionality.


