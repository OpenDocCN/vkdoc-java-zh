    根据对象模型的复杂性，大多数面向对象应用程序开发的头痛问题从这里开始，即当你决定将其连接到关系数据库的那一刻。


    对于相对简单的对象模型和简单的查询需求，使用直接 SQL 的 Java 应用程序可以轻松移植，尤其是当你已将查询外部化时。但现实是，大多数应用程序要么有复杂的对象到表映射需求，要么有复杂的查询需求，或者最坏的情况下两者都有。此外，使用直接
    SQL 时，我们有时会使用特定于数据库供应商的功能，这可能会将你牢牢绑定到该特定供应商。


    幸运的是，开源社区再次给了我们一个选择。`Hibernate`是一个 ORM 工具，被描述为用于惯用 Java 的关系持久化服务，可以翻译为“Java 的面向对象透明持久化机制”。这里的透明性意味着被持久化的对象没有任何代码暴露其持久化能力，这与例如实体
    EJB 不同，在实体 EJB 中，持久化能力在其组件结构、关系及其环境（EJB 容器）中被显式标记。


    `Hibernate`提供了持久化和对象查询能力，允许你以细粒度的方式处理丰富的对象模型。它提供了一个面向对象的声明式编程模型，不依赖于代码生成或构建时的字节码修改，尽管它使用反射和通过代码生成库（`cglib`）的运行时代码增强。`Hibernate`不强制你实现任何特殊接口或扩展任何特定类；你可以使用干净简单的
    POJO。


    在`Hibernate`中，对象和表之间的映射可以在 XML 文档中定义，也可以在 Java 代码中以编程方式定义，或通过 JSR-220 持久化注解定义。此外，像`XDoclet`这样的项目允许你使用
    Javadoc 注释来注解 Java 标准版 1.5 之前的应用程序，这些注释用于生成 XML 映射。`Hibernate`在独立应用程序或托管环境（如 J2EE
    服务器）中都能很好地工作。


    `Hibernate`项目由 Gavin King 于 2001 年底启动，源于他早期使用 CMP EJB 的经验。`Hibernate`易于使用的类似 SQL
    的查询语言，使习惯于编写 SQL 的开发人员更容易从容器管理持久化（CMP）EJB 或直接 JDBC 过渡。该项目已成为开源项目的一个成功范例，因为它提供了大量清晰的文档，并且拥有非常响应迅速的社区支持。2003
    年底，`Hibernate`成为 JBoss 项目的一部分，目前被用作 JBoss 的 CMP EJB3 引擎的基础，并对 EJB3 规范产生了巨大影响。`Hibernate`提供了一个单一、简单的
    API，力求熟悉（对 SQL 而言）而非符合标准。图 4-1 显示了`Hibernate`架构的简化视图。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


