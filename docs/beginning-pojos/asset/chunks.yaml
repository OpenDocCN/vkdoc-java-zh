    让我们分解一下本例中使用的不同元素。除了之前使用的名为“time”的 Insert 组件外，我们现在还有一个 Form 组件，定义如下：


    <form jwcid="@Form" listener="listener:formSubmit">


    ...


    </form>


    Form 组件封装并扩展了 HTML 表单的功能。就像 HTML 表单一样，它包含其他组件，并处理表单的提交，在 Tapestry 术语中称为“回绕”表单。与
    HTML 表单不同的是，Form 组件通过处理所有生成的 HTML 表单以及每个包含组件的命名，使得处理表单提交变得非常简单。

