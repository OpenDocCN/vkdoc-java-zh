    开发者之间的关注点分离；经验更丰富的开发者通常负责编写大部分控制代码，而资历较浅的开发者则处理 JSP。随着越来越多的 Model 2 应用程序被构建，许多开发者注意到了不同应用程序之间重复劳动的问题。典型的问题变成了：我们如何避免一次又一次地重复造轮子？大多数开发者的结论最终促成了框架的诞生，这些框架提供了处理
    MVC 应用程序的统一方式，并消除了编写管道代码的需求。


    如今，我们有许多基于 MVC 模式的框架，它们提供了大量你无需再从头创建的功能。它们也在一定程度上标准化了 Java 世界中的 Web 开发。不同的框架都以略微不同的方式实现
    MVC。有些框架为视图生成选择了一种技术，例如 JSP 或某种模板引擎（如 Velocity），而其他框架则允许可插拔的视图实现。它们大多数的一个共同点是，尽管构建在
    Servlet API 之上，但它们仍然遵循请求/响应范式的相同底层原理，这使得你的开发和最终代码非常过程化。许多技术专家的感受是，这些框架帮助我们处理 Web
    作为应用程序平台的问题，但它们也扁平化并削弱了 Java 提供的面向对象的部分能力。


