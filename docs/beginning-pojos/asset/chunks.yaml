    Bean 类中任何方法上的注解，以将其视为生命周期回调方法。在 EJB3 中，容器会自动调用这些被注解的方法。EJB3 中可用的注解在表 5-1 中进行了描述。


    **表 5-1.** *EJB3 生命周期回调注解* **注解**


