- fmt: '# The Home Page and Component Creation


    The home page is a fairly simple page. For the rest of the application we have
    more complex requirements and a fair amount of common elements amongst the pages.
    Similarly to what you can do with Tiles (as seen in Chapter 6) we can create a
    custom Tapestry component to serve as a border for the rest of the pages in the
    application. This custom component will also be responsible for handling user
    logins and logouts.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00007.png)


    Sam-Bodden_596-3 C07.fm Page 270 Thursday, February 23, 2006 4:22 PM


    **270**


    ## CHAPTER 7 ■ TAPESTRY


    In Tapestry, creating your own components is very similar to creating pages. After
    all, pages are themselves Tapestry components. Components can be assembled in
    two different ways depending on how the resulting HTML is produced. If you are
    generating the HTML for your component in code, your component Java class should
    be inherited from the Tapestry class `org.apache.tapestry.AbstractComponent`.
    On the other hand, if you want to use an HTML template as the foundation of your
    component’s output, then you’ll need to inherit from the class `org.apache.tapestry.BaseComponent`.
    Figure 7-15 shows the component and page core hierarchy.


    **Figure 7-15.** *Tapestry component and page hierarchy*


    ### The Component HTML Template


    To create the component that will serve as a frame for all the conference pages,
    we’ll start with the HTML template. The template is shown in Figure 7-16.


    The `ConferenceBorder.html` template is divided into four clearly demarcated areas
    as shown in Figure 7-17.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00016.png)


    Sam-Bodden_596-3 C07.fm Page 271 Thursday, February 23, 2006 4:22 PM


    **271**


    **Figure 7-16.** *Preview of the Conference border HTML template*


    **Figure 7-17.** *Structure of the Conference border template*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm Page 272 Thursday, February 23, 2006 4:22 PM


    **272**


    At the top of the template we have an area that will display the conference title,
    date range, and location. On the left side we have a typical navigation menu that
    will take the user to the other available pages in the site. On the right-hand
    side there is a common login box, a logout button, a placeholder to display the
    name of the logged in user, and a button that will take the user to the conference
    registration page. Listing 7-18 shows the relevant HTML.


    **Listing 7-18.** *ConferenceBorder.html Template*


    ```

    <html jwcid="@Shell" title="ognl:title" stylesheet="asset:stylesheet">

    <head>

    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />

    ...

    <span jwcid="$remove$">

    <link rel="stylesheet" type="text/css" href="../css/techconf.css"/>

    </span>

    </head>

    <body jwcid="@Body">

    ...

    <span class="bodyText" jwcid="@RenderBody">Page specific content goes here.</span>

    ...

    </body>

    </html>

    ```


    As you can see the template is a normal HTML page. In the `html` root element
    we add a `Shell` component which, as its name indicates, constructs the outer
    shell of an HTML page.


    In the `html` element we are also inserting the title of the page dynamically
    and setting the CSS style sheet for the page to the value of the asset with an
    id equal to `stylesheet`. Inside the `head` element we include a reference to
    the relative location of the CSS style sheet used by the page in order to provide
    an accurate preview of the page. This reference will be removed when the page
    is rendered.


    In the `body` element the `Body` component is used which serves as the coordinator
    of any JavaScript contributions by any components included in the body of the
    page. Since we don’t know what components might be included in the page, it is
    recommended that you always use the `Body` component with the `body` element of
    your pages.'
  raw: 'The home page is a fairly simple page. For the rest of the application we
    have more complex requirements and a fair amount of common elements amongst the
    pages. Similarly to what you can do with Tiles (as seen in Chapter 6) we can create
    a custom Tapestry component to server as a border for the rest of the pages in
    the application. This custom component will also be responsible for handling user
    logins and logouts.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00007.png)


    Sam-Bodden_596-3 C07.fm Page 270 Thursday, February 23, 2006 4:22 PM


    **270**


    C H A P T E R 7 ■ T A P E S T R Y


    In Tapestry, creating your own components is very similar to creating pages. After
    all, pages are themselves Tapestry components. Components can be assembled in
    two different ways depending on how the resulting HTML is produced. If you are
    generating the HTML for your component in code, your component Java class should
    be inherited from the Tapestry class org.apache.tapestry.AbstractComponent. On
    the other hand, if you want to use an HTML template as the foundation of your
    component’s output, then you’ll need to inherit from the class org.


    apache.tapestry.BaseComponent. Figure 7-15 shows the component and page core hierarchy.


    **Figure 7-15.** *Tapestry component and page hierarchy* The Component HTML Template


    To create the component that will serve as a frame for all the conference pages,
    we’ll start with the HTML template. The template is shown in Figure 7-16.


    The ConferenceBorder.html template is divided into four clearly demarcated areas
    as shown in Figure 7-17.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00016.png)


    Sam-Bodden_596-3 C07.fm Page 271 Thursday, February 23, 2006 4:22 PM


    C H A P T E R 7 ■ T A P E S T R Y


    **271**


    **Figure 7-16.** *Preview of the Conference border HTML template* **Figure 7-17.**
    *Structure of the Conference border template*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm Page 272 Thursday, February 23, 2006 4:22 PM


    **272**


    C H A P T E R 7 ■ T A P E S T R Y


    At the top of the template we have an area that will display the conference title,
    date range, and location. On the left side we have a typical navigation menu that
    will take the user to the other available pages in the site. On the right-hand
    side there is a common login box, a logout button, a placeholder to display the
    name of the logged in user, and a button that will take the user to the conference
    registration page. Listing 7-18 shows the relevant HTML.


    **Listing 7-18.** *ConferenceBorder.html Template*


    <html jwcid="@Shell" title="ognl:title" stylesheet="asset:stylesheet">


    <head>


    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />


    ...


    <span jwcid="$remove$">


    <link rel="stylesheet" type="text/css" href="../css/techconf.css"/>


    </span>


    </head>


    <body jwcid="@Body">


    ...


    <span class="bodyText" jwcid="@RenderBody">Page specific content goes here.</span>


    ...


    </body>


    </html>


    As you can see the template is a normal HTML page. In the html root element we
    add a Shell component which, as its name indicates, constructs the outer shell
    of an HTML page.


    In the html element we are also inserting the title of the page dynamically and
    setting the CSS


    style sheet for the page to the value of the asset with an id equal to stylesheet.
    Inside the head element we include a reference to the relative location of the
    CSS style sheet used by the page in order to provide an accurate preview of the
    page. This reference will be removed when the page is rendered.


    In the body element the Body component is used which serves as the coordinator
    of any JavaScript contributions by any components included in the body of the
    page. Since we don’t know what components might be included in the page, it is
    recommended that you always use the Body component with the body element of your
    pages.'
