    In the Contents section, select “Create new project in workspace”, which will
    create a directory for the project in the Eclipse workspace directory you selected
    during the installation.


    As mentioned before, we will be using JDK 1.5; therefore in the JDK Compliance
    section select “Use a project specific compliance” and select 5.0 from the pop-up
    menu. Finally, in the “Project layout” section, it is a good practice to separate
    the Java source files from the compiled class files by selecting “Create separate
    source and output folders”. Clicking Next will bring up the Java Settings tabbed
    dialog as shown in Figure 2-6.


    **Figure 2-6.** *Java Settings dialog*


    The four tabs in this dialog allow you to customize several build-path settings,
    including


    - **Source:** In this tab you can specify which resources in a source folder will
    be available to the compiler via inclusion and exclusion filters.

    - **Projects:** In Eclipse you can create project dependencies by making the classes
    in another project available to the current project. See the Order and Export
    item below to determine what is visible to other projects linked to a project.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


