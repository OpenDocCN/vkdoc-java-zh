    '
- fmt: "- 会议接受潜在演讲者提交摘要的日期\n- 会议主题\n- 特邀演讲者名单\n- 会议新闻列表中的新闻标题\n- 演讲者博客的博客标题\n\n图 7-19\
    \ 显示了摘要页面的 HTML 模板预览。\n\n要使用`ConferenceBorder`组件作为摘要页面的模板，我们只需在页面模板的`html`元素中声明该组件，如下所示：\n\
    \n```\n<html jwcid=\"@ConferenceBorder\" title=\"Conference Summary\">\n...\n\
    </html>\n```\n\n**图 7-19.** *会议摘要页面模板*\n\n`ActiveConferencePage`类继承自`Tapestry\
    \ BasePage`。`ActiveConferencePage`将作为所有会议页面的基类，如果未找到`ConferenceSummary`，它会处理重定向到主页的操作。该类还展示了如何使用注解来注入应用状态对象、Tapestry\
    \ 页面和服务，分别使用了`@InjectState`、`@InjectPage`和`@InjectObject`注解。注解提供了一种替代页面和组件规范的方式，用于将依赖项注入到页面和组件中。\n\
    \n**清单 7-27.** *所有会议特定页面的基类 (`ActiveConferencePage`)*\n\n```java\npackage com.integrallis.techconf.web.tapestry.pages.common;\n\
    \nimport org.apache.tapestry.PageRedirectException;\nimport org.apache.tapestry.annotations.InjectObject;\n\
    import org.apache.tapestry.annotations.InjectPage;\nimport org.apache.tapestry.annotations.InjectState;\n\
    import org.apache.tapestry.event.PageBeginRenderListener;\nimport org.apache.tapestry.event.PageEvent;\n\
    import org.apache.tapestry.html.BasePage;\n\nimport com.integrallis.techconf.dto.ConferenceSummary;\n\
    import com.integrallis.techconf.service.ConferenceService;\nimport com.integrallis.techconf.web.tapestry.domain.LoggedInUser;\n\
    import com.integrallis.techconf.web.tapestry.pages.Home;\n\npublic abstract class\
    \ ActiveConferencePage extends BasePage implements PageBeginRenderListener {\n\
    \n    /**\n     * 检查是否始终加载了有效的会议。\n     * 如果没有，则重定向到网站主页。\n     */\n    public\
    \ void pageBeginRender(PageEvent event) {\n        ConferenceSummary summary =\
    \ getUserInformation().getConferenceSummary();\n        if (summary == null) {\n\
    \            // 如果为空，则没有有效的会议\n            // 转发到主页\n            // 该异常将强制页面跳转到主页。\n\
    \            throw new PageRedirectException(getHomePage());\n        }\n    }\n\
    \n    /**\n     * 获取会议 ID。\n     * @return int 当前会议的 ID\n     */\n    protected\
    \ int getConferenceId() {\n        return getUserInformation().getConferenceSummary().getConferenceId();\n\
    \    }\n\n    // 获取并存储用户信息\n    @InjectState(\"logged-in-user-data\")\n    public\
    \ abstract LoggedInUser getUserInformation();\n\n    public abstract void setUserInformation(LoggedInUser\
    \ u);\n\n    @InjectPage(\"Home\")\n    public abstract Home getHomePage();\n\n\
    \    // 所有会议页面都需要会议服务\n    @InjectObject(\"service:app.ConferenceService\")\n\
    \    public abstract ConferenceService getConferenceService();\n}\n```\n\n摘要页面是任何给定会议的入口页面。因此，我们希望能够使用固定的\
    \ URL 从外部访问该页面，以便用户可以在浏览器中为其添加书签。这还允许在 Web 服务器上设置子域，为每个会议提供唯一且易于记忆的 URL。\n\n要创建可被外部引用的\
    \ Tapestry 页面，页面类必须实现`IExternalPage`接口。`IExternalPage`接口只包含一个方法`activateExternalPage`，该方法接受一个对象数组和当前请求周期作为参数。\n\
    \n清单 7-28 显示了摘要页面的实现，它继承了`ActiveConferencePage`基类并实现了`IExternalPage`接口。在`activeExternalPage`方法的实现中，我们检索所请求会议的\
    \ ID。\n\n该 ID 用于调用`retrieveConferenceSummary`方法，该方法检索填充摘要页面所需的所有值。这些值包含在由 EJB3\
    \ `ConferenceService`的`getConferenceSummary`方法返回的`ConferenceSummary` DTO 中。\n\n\
    为了避免在给定会议下的每个页面都检索会议摘要信息，检索到的`ConferenceSummary`对象也会存储在应用状态对象`LoggedInUser`中，`ConferenceBorder`组件会在此处查找`ConferenceSummary`对象。\n\
    \n**清单 7-28.** *摘要页面 Java 实现*\n\n```java\npackage com.integrallis.techconf.web.tapestry.pages.conference;\n\
    \nimport java.util.List;\n\nimport org.apache.tapestry.IExternalPage;\nimport\
    \ org.apache.tapestry.IRequestCycle;\n\nimport com.integrallis.techconf.dto.BlogEntry;\n\
    import com.integrallis.techconf.dto.ConferenceSummary;\nimport com.integrallis.techconf.dto.PresenterSummary;\n\
    import com.integrallis.techconf.web.tapestry.domain.LoggedInUser;\nimport com.integrallis.techconf.web.tapestry.pages.common.ActiveConferencePage;\n\
    \npublic abstract class Summary extends ActiveConferencePage implements IExternalPage\
    \ {\n\n    private static final int BLOG_ENTRIES = 2;\n    private static final\
    \ int FEATURED_PRESENTERS = 3;\n\n    /**\n     * 当从外部页面激活时使用此方法。\n     * 这将根据传递的会议\
    \ ID 加载会议，\n     * 并将其设置在状态对象上。\n     */\n    public void activateExternalPage(java.lang.Object[]\
    \ parameters, IRequestCycle cycle) {\n        // 获取请求的会议 ID\n        Integer conferenceId\
    \ = (Integer)parameters[0];\n        // 检索会议摘要并将其存储到用户信息中\n        ConferenceSummary\
    \ summary = retrieveConferenceSummary(conferenceId);\n        // 在用户对象上设置摘要对象\n\
    \        LoggedInUser user = getUserInformation();\n        user.setConferenceSummary(summary);\n\
    \    }\n\n    private ConferenceSummary retrieveConferenceSummary(Integer id)\
    \ {\n        // 获取特定会议的摘要\n        ConferenceSummary summary = getConferenceService().getConferenceSummary(id);\n\
    \        // 获取特邀演讲者\n        summary.setFeaturedSpeakers(\n            getConferenceService().getFeaturedPresenters(id,\
    \ FEATURED_PRESENTERS)\n        );\n        // 获取新闻\n        summary.setNews(getConferenceService().getNews(id));\n\
    \        // 同时检索博客\n        try {\n            List<BlogEntry> blogEntries = getConferenceService()\n\
    \                .getBlogEntries(id, BLOG_ENTRIES);\n            setBlogEntries(blogEntries);\n\
    \        } catch(Exception e) {\n            // 不执行任何操作，这允许在没有互联网访问的机器上进行开发\n\
    \        }\n        return summary;\n    }\n\n    /**\n     * 返回演讲者图像的相对 URL，使用演讲者\
    \ ID。\n     * @return String 指向演讲者图像的相对 URL\n     */\n    public String getSpeakerImage()\
    \ {\n        return \"../speakerImages/\" + getSpeaker()\n            .getPresenterId().toString()\
    \ + \".jpg\";\n    }\n\n    public abstract PresenterSummary getSpeaker();\n \
    \   public abstract void setBlogEntries(List<BlogEntry> blogs);\n}\n```"
