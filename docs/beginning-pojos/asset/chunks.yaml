    **Summary**


    In this chapter we have learned how to implement and wire together a fairly complex,
    database-driven Web application using the Spring Framework. Spring lets your code
    use POJOs and POJIs and allows you to declaratively mix and match beans to create
    complete applications.


    Using the simple yet powerful concept of Inversion of Control, the Spring Framework
    simplifies and reduces the amount of plumbing code required in an enterprise application.


    We briefly looked at the Spring MVC framework, which should make for an easy transition
    from Struts (the most popular MVC framework to date). Like Struts, Spring MVC
    rides on top of the servlet API semantics. This chapter was intended as a light
    introduction to this new choice in Java Web development. To learn about Spring
    MVC’s more advanced options, I recommend the wonderful *Pro Spring* by Rob Harrop
    and Jan Machacek (Apress, 2005).


    Coupled with a great deal of functionality needed for most enterprise applications,
    Spring has become the leading application framework for Java that doesn’t rely
    on specifications or committees but on the working experience of the Java community.
    If you are building Web applications, Spring can significantly improve the experience
    and the quality of your applications.


