    **16**


    C H A P T E R 1 ■ I N T R O D U C T I O N


    **Use Case Modeling**


    The main goal of use case modeling is to understand user needs and to enable you
    to view a system from the customer’s point of view. Use cases describe how actors
    interact with the system in order to achieve some business purpose. They are procedural
    descriptions of the process of functional decomposition.


    Even though use cases aren’t object-oriented in nature, this doesn’t mean that
    use cases have no value in object-oriented analysis and design (OOAD). On the
    contrary, they are good vehicles for understanding user requirements and for planning
    deliverable milestones in a system.


    Of course, it’s important to use caution when modeling with use cases because
    they could lead to the definition of procedures without a proper understanding
    of the problem domain.


    This can lead to the creation of many “artificial” classes to support a specific
    use case that taints and distorts the essence of the domain being modeled. As
    long as you understand this, you should have no problem with use cases.'
