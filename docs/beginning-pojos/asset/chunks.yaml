    **JBoss 中的 DynaDTO**


    DynaDTO 项目通过其 DDTO 部署器和 DynaDTO 服务提供了与 JBoss 的集成。通过 DynaDTO 服务，你可以让一个 DynaDTO
    `BuilderFactory` 对象绑定到 JNDI。DDTO 部署器是一个专门的 JBoss 部署器，它会扫描扩展名为 `.ddto` 的 JAR 归档文件，并根据找到的任何
    DynaDTO 映射（`.dto.xml` 文件）创建一个 `BuilderFactory`。


    HAR 应包含 Hibernate 映射、被映射的类文件以及一个 JBoss 服务描述符。图 5-11 展示了 DDTO 归档文件的结构和内容。


    **图 5-11.** *JBoss DynaDTO DDTO 归档文件的结构* 清单 5-14 展示了 TechConf 应用程序的一个典型的 `dynadto-service.xml`
    文件。


    **清单 5-14.** *通过 Dynadto-service.xml 进行 DDTO 部署配置*


    `<mbean code="org.dynadto.jboss.deployment.DynaDTOService"`


    `name="org.dynadto:service=DynaDTOService">`


    `<attribute name="BuilderFactoryName">java:dynadto/BuilderFactory</attribute>`


    `<attribute name="TestMappings">false</attribute>`


    `</mbean>`


    在 `dynadto-service.xml` 中，你需要指定用于绑定 DynaDTO `BuilderFactory` 对象的 JNDI 名称。出于 TechConf
    应用程序的目的，我在项目根目录下的 `dd/ddto` 目录中为 DDTO 创建了一个骨架目录。该目录将用于创建 DDTO 归档文件，使用的 Ant 目标如清单
    5-15 所示，该清单扩展了第 3 章中开始的 TechConf 构建文件。


