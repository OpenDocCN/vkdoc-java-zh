- fmt: "# Tapestry Features\n\n- **Integration:** The ability to inject both `HiveMind`\
    \ and `Spring` (see Chapter 6) service objects into Tapestry pages and components\n\
    - **Validation:** Complete overhaul of input validation, enabling complex validations\
    \ using custom extensions, and providing many built-in validations\n- **Annotations:**\
    \ Support for Java 5.0 annotations for specifying in code certain configuration,\
    \ customization, and operations that would otherwise be specified in the page\
    \ or component specification\n- **Error Reporting:** Line-precise error reporting\
    \ that can display and highlight the exact contents of the files containing errors\n\
    - **Advanced Form Handling:** The ability to cancel forms, therefore bypassing\
    \ client-side validation logic, and the ability to invoke an alternate \"cancellation\"\
    \ listener on the server side\n- **Server-side State:** In contrast to objects\
    \ holding application state being limited to the old `Global` and `Visit` objects,\
    \ a removal of the limit to the number of application state objects\n\n## Downloading\
    \ and Configuring Tapestry\n\nTapestry is distributed as a ZIP file or a TAR file\
    \ containing both the source and binaries from `http://jakarta.apache.org/tapestry/downloads.html`.\
    \ Tapestry consists of four JAR files: `tapestry-4.0.jar`, `tapestry-contrib-4.0.jar`,\
    \ `tapestry-annotations-4.0.jar`, and `tapestry-portlet-4.0.jar`.\n\nTapestry\
    \ depends on several third-party libraries. The easiest way to obtain all the\
    \ dependencies is to go to `http://jakarta.apache.org/tapestry/dependencies.html`\
    \ and follow the links to download the required JARs from `ibiblio.org`. Table\
    \ 7-1 shows the Tapestry 4 JARs as well as the dependencies. Alternatively, you\
    \ can use the Tapestry Ant build script, which will automatically download the\
    \ dependencies from `ibiblio.org`.\n\nFor those developers wanting to build Tapestry\
    \ from scratch, instructions on how to build Tapestry can be found in the Tapestry\
    \ Wiki located at `http://wiki.apache.org/jakarta-tapestry/BuildingTapestry` (which\
    \ requires `HiveMind 1.1`, `Ant 1.6.2`, and `Java 1.5`).\n\n## Your First Tapestry\
    \ Application\n\nNothing helps when working with a new Web framework as actually\
    \ building a functioning Web application. Like any other Java servlet or JSP-based\
    \ framework, the deployable unit for a Tapestry application is a WAR file. Let's\
    \ take a step-by-step approach at building our first Tapestry application. This\
    \ application would start as a very simple single page application producing some\
    \ content dynamically.\n\nDynamic content is what differentiates a Web application\
    \ from a static website, and it means only that the information your website or\
    \ application displays varies based on some conditions. Examples of dynamic content\
    \ include news sites, product catalogs where entries change and users can accumulate\
    \ a shopping cart of items, and online polls and statistics.\n\nBefore we get\
    \ started, let's create a directory structure for the application. Figure 7-1\
    \ shows the directory structure for the `tapestry-time` application.\n\n**Figure\
    \ 7-1.** *Directory structure for simple Tapestry application*\n\n### Configuring\
    \ Tapestry\n\nTo run Tapestry in a Web container you need to make the Tapestry\
    \ classes and its dependencies available to the Tapestry applications. There are\
    \ two ways to accomplish this. If you are running multiple Tapestry applications\
    \ in the same Web container, you can place the JARs in a shared location that\
    \ your Web container will make available to all deployed applications. In Tomcat\
    \ 5.X, for example, this shared location is `$TOMCAT_HOME/shared/lib`.\n\nThe\
    \ other option is to place the required JARs in the `WEB-INF/lib` directory, which\
    \ guarantees that you can deploy the JAR to any compliant Web container without\
    \ any special configuration.\n\nFor this chapter we'll use the `WEB-INF/lib` location\
    \ for the Tapestry dependencies. Table 7-1 shows the required JARs.\n\n**Table\
    \ 7-1.** *Tapestry JARs and Dependencies*\n\n| File | Description |\n|------|-------------|\n\
    | `tapestry-4.0.jar` | Tapestry Core |\n| `tapestry-annotations-4.0.jar` | Java\
    \ 5 annotation support |\n| `tapestry-contrib-4.0.jar` | Community contributed\
    \ components |\n| `hivemind-1.1.jar` | Services and configuration microkernel\
