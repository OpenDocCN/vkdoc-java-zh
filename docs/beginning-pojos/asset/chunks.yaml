  trans: '

    迄今为止，已经开发了许多应用程序、工具和框架，用于标准化、自动化和简化单元测试与功能测试的流程。无论你使用何种工具，我发现下一节中展示的简单实践，能够将软件测试置于其应有的、至关重要的地位。你的软件将更准确地实现其预期功能。


    **测试最佳实践**


    TDD（测试驱动开发）倡导一种编程实践：先编写测试，再编写代码使测试通过，然后进行重构以优化代码和应用程序的整体设计，同时确保不破坏已有测试。显然，这会产生一套全面的测试套件，覆盖了代码的功能，因为它本身就是待构建内容的契约。以下列表反映了我对测试的理念：


    **1. 先编写测试：** 首先编写展示给定类典型用法（加上一些边界或极端情况）的测试。然后编写足够的代码来通过这些测试。贯穿本书的面向接口编程思想，有助于实现“测试先行”的方法。


    **2. 编写意图清晰的代码：** 遵循良好的面向对象实践，创建让他人一目了然的代码。保持类的小型化，并使用良好的命名规范。为已知意图的组件编写测试更容易，尤其是考虑到将来可能由其他人编写或增强这些测试。如果你选择采用实践
    1，那么这项实践会变得更容易。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C08.fm 第 308 页 2006 年 2 月 23 日，星期四，下午 4:23


    **308**


    第 8 章 ■ 测试


    **3. 测试所有内容：** 如果可能出错，就测试它。如果可能产生接口不明确的副作用或输出，就测试它。即使是简单的组件，如果其意图或功能不明确，也可能在其他组件中引发错误。我将软件中的测试等同于数学中的形式证明。除非有一套全面的测试，否则任何对组件质量的保证都只是幻觉。


    **4. 在开发早期建立测试框架：** 将测试作为构建过程的一部分，如果可能，使用与你的开发工具集成良好的测试框架；在项目早期这样做，将确保整个团队拥抱测试，并使其成为阻力最小的路径。


    **5. 编写刚好能通过单元测试的代码：** 当单元测试完成时，任务才算完成。就像代码未经编译就不应检入版本控制系统一样，代码除非附带一套全面的单元测试并且这些测试通过，否则也不应检入。


    **6. 将测试映射到用例、用户故事或功能：** 无论你使用何种需求收集技术，都要将这些需求映射到一组明确定义的测试。


    **7. 启用持续集成：** 正如你将在第 9 章中学到的，持续集成依赖于开发者在代码检入前运行单元测试。此外，所有单元测试应至少在构建服务器上每天执行一次（每小时作为构建间隔似乎效果不错），或者在每次代码检入后执行。


    **8. 不要过度测试：** 测试要足以覆盖功能。当缺陷出现时，再添加新的测试。使用等价类划分和边界值分析等技术来最小化所需的测试数量。对测试进行分组、分类和组织，可以确保你不会编写冗余的测试，并且测试能覆盖给定组件的功能范围和场景。


    **工具**


    得益于开源社区创建的工具，上一节中提到的最佳实践在实践中是可行的。在本章中，我们将介绍其中一些工具，但在深入代码之前，理解可用的不同类别的测试工具非常重要：


    • **测试框架：** 诸如 JUnit 和 TestNG 等框架，其灵感来源于 xUnit 系列的单元/回归测试框架，它们提供了创建、运行和报告测试结果的基本能力。


    • **容器内测试工具：** 这些工具使你能够测试依赖于容器的组件的功能，通常使它们看起来像是简单的 Java 对象。


    • **Web 测试工具：** 这些工具通常扩展现有的测试框架，以支持基于 HTTP 协议的测试，并且是容器内测试工具的一个子集。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C08.fm 第 309 页 2006 年 2 月 23 日，星期四，下午 4:23


    第 8 章 ■ 测试


    **309**


    • **测试覆盖率工具：** 这些工具使你能够确定应用程序被测试覆盖的程度。


    • **模拟对象框架：** 模拟对象框架提供了动态创建对象的能力，这些对象可用于模拟功能测试中所需的协作对象。


    **JUnit**


    多年来，单元测试一直由 `System.out.println()` 函数或类 main 方法中的测试代码组成。尽管这种测试形式可能有效，但它是一种被动措施，存在一些缺点：它需要人工干预和解读，会污染生产代码并部署测试代码，而且结果的可重复性不高。最著名的测试框架是
    JUnit，它至今仍是测试领域的庞然大物，并且已被其他项目扩展，以提供软件开发许多领域的测试支持。


    JUnit 是将测试重新带回聚光灯下的开创性框架。JUnit 托管在 www.junit.org，是一个基于 Java 内省机制以及测试方法、测试类和测试套件概念的简单框架。该框架包含用于创建测试的可扩展类，以及用于运行测试并呈现结果的测试运行器。


    `junit.framework` 包包含了用于开发单元测试的接口和类。


    `Test` 接口是一个用于定义测试的简单接口。大多数用户并非直接实现 `Test` 接口，而是扩展抽象基类 `junit.framework.TestCase`
    或具体类 `junit.framework.TestSuite`。一个 `TestCase` 包含针对单个单元的测试，而一个 `TestSuite` 是 `Test`
    类的集合。


    在 Java 中，一个单元就是一个类。因此，一个 `TestCase` 通常包含针对单个类的所有测试。一个测试测试一个类的单个方法或单个工作单元。测试有三种可能的结果：通过、失败或错误。如果测试通过，则表明该方法或工作单元按预期实现了所有功能。当期望值不等于实际值时，就会发生失败。例如，可能会编写一个测试来检查当向集合中添加对象时，大小是否增加。断言用于将实际值与期望值进行比较。


    未捕获的异常是导致错误的原因。测试运行器可用于执行 `TestCase` 并报告结果。有许多可用的测试运行器。

