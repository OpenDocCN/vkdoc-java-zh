    ## C H A P T E R 5 ■ B U S I N E S S S E R V I C E S W I T H J B O S S


    **173**


    Listing 5-9 shows the DynaDTO configuration file `ConferenceSummary.dto.xml`,
    which is needed to dynamically create an instance of an object implementing the
    `ConferenceSummary` interface given an instance of a `Conference` domain object.


    **Listing 5-9.** *ConferenceSummary DTO Configuration File*


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>


    <dtos>


    <dto target="com.integrallis.techconf.dto.ConferenceSummary" useProxy="yes">


    <sources>


    <source type="com.integrallis.techconf.domain.Conference">


    <alias source="venue" name="venue" />


    <mapping from="id" to="conferenceId" />


    <mapping from="name" to="conferenceTitle" />


    <mapping from="description" to="conferenceSubtitle" />


    <mapping property="startDate" />


    <mapping property="endDate" />


    <mapping property="abstractSubmissionStartDate" />


    <mapping property="abstractSubmissionEndDate" />


    <mapping from="venue.name" to="venueName" />


    <mapping from="venue.phone" to="venuePhone" />


    <mapping from="venue.address.streetAddress"


    to="venueAddressLine1" />


    <mapping-collection


    action="list"


    collection-property="tracks"


    target="tracks"


    target-type="com.integrallis.techconf.dto.TrackSummary"


    />


    </source>


    </sources>


    <expressions>


    <expression target="VenueAddressLine2"


    value="venue.getAddress().getCity() + '','' +


    util.space() + venue.getAddress().getState() +


    util.space() + venue.getAddress().getZipCode()" />


    </expressions>


    <comparator useSuper="false" useReflection="false">


    <compare property="conferenceId" />


    </comparator>


    </dto>


    </dtos>

    ```


    Notice that the `.dto.xml` root element is `<dtos>`, which can contain one or
    more `<dto>`. The `<dto>` element defines the recipe of how one or more domain
    objects can be used to populate a POJO or a dynamic proxy instance of a POJI (as
    is the case with `ConferenceSummary` DTO). Although you can have more than one
    `<dto>` element, I recommend that, except for small applications with very few
    DTOs, you stick with one `<dto>` element per file and name your DTO configuration
    files after the interface or class that they map. The `useProxy` attribute denotes
    that DynaDTO should create a dynamic proxy instance of the DTO interface.


    Let’s explore some of the details of the mapping. The `<mapping>` element provides
    several ways to take information from one object to another. First notice that
    when mapping two properties with an identical name, you can simply use the `property`
    attribute as shown in the mapping of the `startDate` property (`<mapping property="startDate"
    />`). For different named properties you can use the `from` and `to` attributes
    as shown in the mapping from `Conference.name` to `ConferenceSummary.conferenceTitle`
    (`<mapping from="name" to="conferenceTitle" />`). For nested objects you can use
    dot notation to access a property value as shown in the mapping of the `venueAddressLine1`
    (`<mapping from="venue.address.streetAddress" to="venueAddressLine1" />`). For
    more complex mappings, DynaDTO provides the ability to use expressions using JEXL.
    Expressions are declared inside of the `<expressions>` element of the `<dto>`
    element. The `<expressions>` element can contain one or more `<expression>` elements,
    which take a `target` and `value` attributes. For example, in the mapping of the
    `venueAddressLine2` property, the target is `VenueAddressLine2`, and the values
    is `venue.getAddress().getCity() + '','' + util.space() + venue.getAddress().getState()
    + util.space() + venue.getAddress().getZipCode()`. DynaDTO provides an object
    named `util`, which is available inside of your expressions, to do simple things
    like adding spaces via `util.space(int)`, where the integer parameter denotes
    the number of spaces. DynaDTO has other utilities. There is also an object named
    `self`, which provides you with access to the DTO being built. DynaDTO will handle
    nested DTOs by attempting to find a configuration for the nested DTO that matches
    the source object.


    The last feature worth mentioning is DynaDTO’s ability to manipulate collections
    via the `<mapping-collection>` element. For example, in the `ConferenceSummary`
    mapping there is a collection mapping that reads the property `tracks` of the
    `Conference` instance and for each element in it creates a DTO of type `TrackSummary`.
    The resulting `TrackSummary` collection is stored in the `tracks` property of
    the `TrackSummary` instance as shown in Listing 5-10.


