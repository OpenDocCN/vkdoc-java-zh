    第 1 章


    ■ ■ ■


    引言


    **无**论您是 Java 平台企业版（Java EE）的新手，还是已经使用多年，您的体验可能与我相似——仅凭规范提供的内容来使用该平台，很快就会让您抓狂！Java
    EE 规范没有预见到，在向开发者释放强大能力的同时，它也带来了大量问题。这些问题更多地与设计、构建和维护分布式应用程序的过程相关，而非实际的 API。这正是开源发挥作用的地方。本书中展示的项目旨在简化、支持、加速并增强
    Java EE 应用程序的构建。


    本书主要探讨如何利用您（开发者）可获取的大量开源资源。尤其是在 Java EE 平台方面，开源正引领潮流，并通过提供商业产品中未曾出现的技术创新，以及为企业级应用提供坚实稳定的基础设施，超越了规范的界限。近年来，Java
    EE 规范的某些部分受到了许多行业专家的批评，这导致了许多轻量级框架和容器的出现，以及大量填补规范空白的支持工具。


    如今，大多数开发者纠结的问题是，他们是否真的需要一个 Java EE 应用服务器。现实情况是，大多数可用的轻量级框架并不试图取代应用服务器提供的每一项功能，而是提供了访问应用服务器资源的替代方式。大多数专家抱怨的是，当应用程序只需要一个
    Web 容器时，却使用了 Enterprise JavaBeans (EJB) 容器，在 EJB3 规范最终确定之前，我完全同意他们的观点。


    正如您将在第 5 章中看到的，EJB3 规范将支持构建真正基于 POJO 的分布式多层应用程序，这些应用程序可以根据需求轻松扩展。


    我们还将探索轻量级框架的世界，并比较和对比不同的方法如何适应不同的应用需求和不同的开发团队。


    **Java EE 市场**


    要完全理解 Java EE 世界变革背后的一些驱动力，需要快速回顾一下市场的演变。Java EE 市场发展迅速，首先经历了整合阶段，现在进入了商品化阶段。这第二阶段很大程度上是由这样一个事实驱动的：为了展示价值，应用服务器供应商不能再仅仅依赖其核心应用服务器。这创造了一个增值服务的市场，特别是在开发工具和开发效率领域。本书中展示的许多开源工具和框架都属于这一类。


    **1**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C01.fm 第 2 页 2006 年 2 月 22 日星期三 上午 6:01


    **2**


    第 1 章 ■ 引 言


    开源也在改变世界各地大学学习编程的方式；新一代离开学术界进入职场的程序员，要么使用过开源，要么为其做出过贡献。如今的学生可以通过研究汇集了世界各地众多贡献的企业级软件来学习。


    在全球的企业 IT 部门，程序员们正团结在 Ant、JUnit、Apache Tomcat、Spring Framework 和 JBoss 等开源项目周围。开源被接受的过程主要是在程序员和中层管理人员层面进行的。然而，鉴于
    Linux 最近对企业的影响，高层管理人员也开始看到开源的诸多优势，尤其是在企业 Java 领域。


    寻求降低软件开发成本的组织发现，与商业产品相比，开源软件（OSS）提供了更低的拥有成本，这主要是因为开源软件在价格和限制方面都是免费的。


    开源社区如此多产的原因之一是，除了最琐碎的软件之外，所有软件的开发都既困难又昂贵，而商业产品提供的现成解决方案往往无法提供完整的解决方案。构建软件系统的复杂性是现实世界业务问题本质的直接结果，这些问题由不断变化的需求、快速发展的技术、多个数据源、服务级别协议、互操作性、上市时间、投资回报率以及许多其他因素驱动。无法应对和平衡所有这些力量会导致项目超出预算、延期，并且在大多数情况下无法满足功能期望。由于无法应对复杂性和变化，这些项目会迅速失控。


    即使这样的系统在特定的业务功能领域有所交付，其整体业务价值也会因维护成本而降低。这些恐怖故事并不罕见；相反，它们是常态。一项调查发现，84%¹ 的企业软件系统被认为是失败的。这种失败率是困扰行业的“软件危机”的典型特征。项目失败是由于糟糕的工程和管理选择的结合。卡内基梅隆大学软件工程研究所（SEI）2002
    年的一项研究列出了软件项目失败的十大原因：


    • 员工经验不足

    • 缺乏团队凝聚力和经验

    • 缺乏对使用现代软件工程实践的重视

    • 缺乏流程或对流程应用的重点不正确

    • 项目管理方法不充分

    • 需求不明确、被误解和未被发现

    • 规模（项目越大，失败的可能性越大）

    • 缺乏规划和估算

    • 在流程中过晚考虑系统特定和技术相关的问题

    • 新技术和未预见的问题


    1\. 根据 Standish Group 的一项调查，该调查研究了 1995 年美国约 8,000 个软件项目。

