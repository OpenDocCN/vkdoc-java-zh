    \ *Making `greetingService` a Prototype Bean*\n\n```xml\n<bean id=\"greetingService\"\
    \n      class=\"com.integrallis.spring.basic.GreetingServiceImpl\"\n      singleton=\"\
    false\">\n```\n\nA prototype bean is useful when you are instantiating an object\
    \ that might be a collaborator to another object that will carry or hold state\
    \ information for the collaborator or that is configured based on the state of\
    \ the collaborator object. In Spring, beans are deployed as singletons by default.\
    \ Prototype beans are completely non-managed since Spring simply instantiates\
    \ the object and hands it over to the client.\n\n## A Simple Spring Web Application\n\
    \nIn the previous section you’ve learned how to use the Spring Framework for its\
    \ basic dependency injection features (available via a `BeanFactory`) to:\n\n\
    - Decouple a simple service interface from its implementation\n- Configure a service\
    \ declaratively via an XML file\n- Easily switch the service from being a singleton\
    \ or getting a new instance each time\n\nA `BeanFactory` is a very powerful construct\
    \ that provides DI and basic service management, but for most applications (especially\
    \ Web applications) you’ll likely need to move up to using a Spring `ApplicationContext`.\
    \ An `ApplicationContext` is a subinterface of `BeanFactory` and provides all\
