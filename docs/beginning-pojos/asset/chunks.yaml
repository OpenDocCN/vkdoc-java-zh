- fmt: "# To run the TestNG tests from the exiting TechConf Ant buildfile\n\nI’ve\
    \ added the `test-run` Ant macrodef to the `macros.xml` file created in Chapter\
    \ 3. Listing 8-13 shows the macrodef definition, which uses the `testng` task.\
    \ Assuming that the TestNG JAR is in the `lib/testng` directory, we create the\
    \ Ant path `testng`, which is used as the classpath for loading the task via the\
    \ `taskdef`.\n\n**Listing 8-13.** *TestNG Ant Macrodef*\n\n```\n<path id=\"testng.class.path\"\
    >\n  <fileset dir=\"lib/testng\">\n    <include name=\"*.jar\"/>\n  </fileset>\n\
    </path>\n\n<taskdef\n  resource=\"testngtasks\"\n  classpathref=\"testng.class.path\"\
    \n/>\n\n<macrodef name=\"test-run\">\n  <attribute name=\"classpathref\" />\n\
    \  <attribute name=\"output\" />\n  <sequential>\n    <testng\n      classpathref=\"\
    @{classpathref}\"\n      outputDir=\"@{output}\"\n      target=\"1.5\"\n    >\n\
    \      <sysproperty key=\"ant.basedir\" value=\"${basedir}\"/>\n      <xmlfileset\
    \ dir=\"${basedir}\" includes=\"testng.xml\"/>\n    </testng>\n  </sequential>\n\
    </macrodef>\n```\n\nTo use the `test-run` TestNG macrodef, we simply provide the\
    \ classpath containing the test classes and an output directory to store the generated\
    \ reports as shown in Listing 8-14.\n\n**Listing 8-14.** *Using the TestNG Ant\
    \ Macrodef in the TechConf Build*\n\n```\n<target name=\"test\" depends=\"compile,test-clean\"\
    \n        description=\"Runs all tests\">\n  <target-banner target=\"tests\"/>\n\
    \  <test-run\n    classpathref=\"app.class.path\"\n    output=\"${docs-test}\"\
    \n  />\n</target>\n```\n\n## Testing Against the Database\n\nIn the TechConf application\
    \ the first layer of code that interacts with the database is that consisting\
    \ of the Hibernate-mapped POJOs in the domain package. In Chapter 4 we learned\
    \ how to map the TechConf POJOs to the database.\n\nIn this section we will look\
    \ at ways to test the Hibernate ORM mappings by performing simple CRUD tests on\
    \ the mapped POJOs using TestNG. There are several ways we can go about testing\
    \ the Hibernate-mapped POJOs (or any other database code), but most techniques\
    \ for this type of integration test have to account for the following:\n\n- **Database\
    \ Instance:** Do you use a per-developer instance of a database that matches the\
    \ target database? Do you use an in-memory embedded database?\n- **Testing Data:**\
    \ How do you provide the testing data? In the Java code? Or via some sort of external\
    \ configuration?\n- **Set Up/Tear Down:** How do you set up data that is a precondition\
    \ for a test, and how do you clean up afterwards?\n\nThe simplest scenario is\
    \ to have a base class for the Hibernate tests that can provide the ability to\
    \ create a Hibernate `SessionFactory` from configuration data (`hibernate.cfg.xml`)\
    \ and the properties for the current user’s test database. Listing 8-15 shows\
    \ the class `BaseHibernateTestCase`, which serves as the parent class for all\
    \ Hibernate tests:\n\n**Listing 8-15.** *BaseHibernateTestCase*\n\n```\npackage\
    \ com.integrallis.techconf.domain;\n\n...\n\nimport org.apache.commons.logging.Log;\n\
    import org.apache.commons.logging.LogFactory;\nimport org.hibernate.Criteria;\n\
    import org.hibernate.HibernateException;\nimport org.hibernate.Session;\nimport\
    \ org.hibernate.SessionFactory;\nimport org.hibernate.Transaction;\nimport org.hibernate.cfg.Configuration;\n\
    import com.integrallis.techconf.test.util.Paths;\n\npublic abstract class BaseHibernateTestCase\
    \ {\n\n    // logger\n    protected static Log logger = LogFactory.getLog(BaseHibernateTestCase.class);\n\
    \n    // hibernate session factory\n    protected SessionFactory factory;\n\n\
    \    // persistent classes to be used in the test(s)\n    protected List<Class>\
    \ persistentClasses = new ArrayList<Class>();\n\n    @org.testng.annotations.Configuration(beforeTestClass\
    \ = true)\n    protected void setUp() throws FileNotFoundException, IOException\
    \ {\n```"
