    **未决问题与假设**


    企业开发的动态特性迫使您基于以往经验做出假设，并将系统的某些方面推迟到开发后期再处理。


    **假设**


    部分假设源于从利益相关者会议中收集的隐含需求，以及对系统未来使用情况的预测。这些假设包括：


    • 并发需求预计会随时间增长。


    • 大部分参会者精通技术。


    • 应用程序将通过互联网使用基于浏览器的界面进行远程访问。


    • 会议内部网络将受到 HTTP 防火墙的保护。


    • 大部分参会者携带支持网络的 PDA 或其他移动计算设备。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


