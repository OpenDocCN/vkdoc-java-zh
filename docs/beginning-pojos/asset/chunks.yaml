    will check the local working copy of the project for changes. The attribute quietperiod
    determines the time in seconds that CruiseControl will wait for it to determine
    that there are no check-ins occurring on the project. Set this parameter based
    on the habits of your team. For example I like to set this parameter to about
    120 seconds, since I like to take my time with the check-in comments.


    <modificationset quietperiod="60">


    <cvs localworkingcopy="checkout/jakarta-lucene"/>


    </modificationset>


    The interval attribute of the schedule element determines how often CruiseControl
    will check the modification set to determine whether to run the build. Set this
    attribute based on the number of projects on your build machine and the priority
    and frequency of change of those projects.


    The ant element is one of the possible actions to perform when a build is deemed
    necessary.


    In here we are invoking the delegate buildfile created for the Lucene project.


    <schedule interval="60" >


    <ant


    buildfile="build-jakarta-lucene.xml"


    target="test"


    uselogger="true"


    usedebug="false"


    />


    </schedule>


    Finally, the log element determines the directory for the CruiseControl logs.
    The merge element tells CruiseControl to “merge” the JUnitReport XML files produced
    during the build of the Lucene project. In the case of the Lucene project those
    files are located in the build/test directory. You’ll determine this by examining
    the build.xml or simply running the build and searching for the reports.


    <log dir="logs/jakarta-lucene">


    <merge dir="checkout/jakarta-lucene/build/test/" />


    </log>


    With everything now set, let’s fire up CruiseControl and watch it build the Lucene
    project.


    As done previously, change directories to the CruiseControl working directory
    and execute the cruisecontrol.sh script. In the output, you should see the project
    sources being retrieved from CVS and the build executing.


    Refreshing the CruiseControl reporting Web application should reveal the Lucene
    project as shown in Figure 9-4.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


