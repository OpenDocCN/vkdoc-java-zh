    **Testing Against the Database**


    In the TechConf application the first layer of code that interacts with the database
    is that consisting of the Hibernate-mapped POJOs in the domain package. In Chapter
    4 we learned how to map the TechConf POJOs to the database.


    In this section we will look at ways to test the Hibernate ORM mappings by performing
    simple CRUD tests on the mapped POJOs using TestNG. There are several ways we
    can go about testing the Hibernate-mapped POJOs (or any other database code),
    but most techniques for this type of integration test have to account for the
    following:


    • **Database Instance:** Do you use a per-developer instance of a database that
    matches the target database? Do you use an in-memory embedded database?


    • **Testing Data:** How do you provide the testing data? In the Java code? Or
    via some sort of external configuration?


    • **Set Up/Tear Down:** How do you set up data that is a precondition for a test,
    and how do you clean up afterwards?


