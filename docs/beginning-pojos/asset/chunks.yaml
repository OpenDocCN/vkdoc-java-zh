    让我们逐一解析 config.xml 文件中的元素。以 Lucene 的示例为例，`listeners` 元素包含一个监听器，用于将当前构建状态记录到 `status.txt`
    文件中。


    <listeners>


    <currentbuildstatuslistener file="logs/jakarta-lucene/status.txt"/>


    </listeners>


    接下来，`modificationset` 元素指定了 CruiseControl 应检查何处以确定是否触发构建。在该示例中，CruiseControl 将检查项目的本地工作副本是否有变更。`quietperiod`
    属性决定了 CruiseControl 等待确认项目无新提交的时间（以秒为单位）。请根据团队习惯设置此参数。例如，我喜欢将此参数设为约 120 秒，因为我习惯花时间撰写提交注释。


    <modificationset quietperiod="60">


    <cvs localworkingcopy="checkout/jakarta-lucene"/>


    </modificationset>


    `schedule` 元素的 `interval` 属性决定了 CruiseControl 检查修改集以确定是否运行构建的频率。请根据构建机器上的项目数量以及这些项目的优先级和变更频率来设置此属性。


    `ant` 元素是在判定需要构建时可能执行的操作之一。


    此处我们调用了为 Lucene 项目创建的委托构建文件。


    <schedule interval="60" >


    <ant


    buildfile="build-jakarta-lucene.xml"


    target="test"


    uselogger="true"


    usedebug="false"


    />


    </schedule>


    最后，`log` 元素指定了 CruiseControl 日志的存放目录。`merge` 元素告诉 CruiseControl “合并” Lucene 项目构建过程中生成的
    JUnitReport XML 文件。对于 Lucene 项目，这些文件位于 `build/test` 目录下。你可以通过检查 `build.xml` 或直接运行构建并搜索报告来确定这一点。


    <log dir="logs/jakarta-lucene">


    <merge dir="checkout/jakarta-lucene/build/test/" />


    </log>


    一切设置就绪后，让我们启动 CruiseControl 并观察它构建 Lucene 项目。


