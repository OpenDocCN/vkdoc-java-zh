- fmt: 'Using mock objects is not rocket science, but with powerful framework like
    `EasyMock` we can use mock objects to truly isolate a class under test by creating
    an environment of simulated collaborators with predetermined behaviors for the
    context of a test. The same techniques applied to testing an `EJB` can be applied
    to any object that depends on another object to perform its work. Frameworks that
    promote coding to interfaces such as the `Spring` framework are the perfect candidates
    for mock object testing with a tool such as `EasyMock`.


    ## Summary


    In this chapter you’ve learned the importance of setting a test harness for your
    Web application early in the development process. By taking a layered approach
    to testing, you can make sure that your application testing needs are covered.
    Using testing frameworks like `JUnit` and `TestNG` and the myriad of supporting
    tools and frameworks, testing is no longer a dreadful process left for the end
    of your projects but an active and primary part of the iterative development process.


