    **关于目标的更多内容**


    目标旨在表示构建过程中的一个离散步骤。目标使用任务、数据类型和属性声明来完成其工作。目标必须具有 `name` 属性，以及一个可选的、以逗号分隔的依赖目标列表。


    ■**最佳实践** 使用简单的动作动词来命名目标，例如“build”、“test”或“deploy”。


    一个典型的构建文件由几个主要目标组成：那些旨在由用户直接调用的目标，以及子目标——即为主要目标提供功能的目标。


    ■**最佳实践** 为构建的主要目标添加 `description` 属性。包含描述的目标会显示在自动项目帮助中，当使用 `-p` 或 `-projecthelp`
    命令行选项调用 Ant 时会显示该帮助。对于子目标，请在名称前加上连字符，以便于与主要目标区分。


    目标可以有条件地执行，为此 Ant 支持 `if` 和 `unless` 属性。使用其中任一属性或两者都使用的目标被称为条件目标。`if` 和 `unless`
    都将属性名称作为值，这是对属性存在性的测试。如果您修改示例构建文件中的 Target A，并添加一个值为 `do_a` 的 `if` 属性，如清单 3-2
    所示，就可以看到这样一个示例。


    **清单 3-2.** *条件 Ant 目标*


    <target name="Target A" description="执行步骤 A" if="do_a">


    <echo>执行步骤 A</echo>


    </target>


