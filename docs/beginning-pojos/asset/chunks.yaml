- fmt: 'The page specification file is an XML file with the extension `page`. Remember,
    pages are a special type of Tapestry component, and this is the configuration
    file for the Home page component of our application. Pages can contain components,
    and in this case our page contains one component of type `Insert`. The `Insert`
    component is one of many built-in Tapestry components. `Insert` gives you the
    ability to insert text dynamically in the HTML response with the option of filtering
    special characters or formatting by using a `java.text.Format` instance.


    Listing 7-3 shows the contents of the `Home.page` file.


    **Listing 7-3.** *The Page Specification XML File (Home.page)*


    ```

    <?xml version="1.0"?>


    <!DOCTYPE page-specification PUBLIC


    "-//Apache Software Foundation//Tapestry Specification 4.0//EN"


    "http://jakarta.apache.org/tapestry/dtd/Tapestry_4_0.dtd">


    <page-specification class="com.integrallis.time.Home">


    <component id="time" type="Insert">


    <binding name="value" value="ognl:time"/>


    </component>


    </page-specification>

    ```


    The DTD located at `http://jakarta.apache.org/tapestry/dtd/Tapestry_4_0.dtd` gives
    us a clue as to what types of elements can be configured via XML in Tapestry.
    Figure 7-4 shows a graphical depiction of the `page-specification` element showing
    the detail of the `component` element.


    **Figure 7-4.** *DTD definition for the page-specification element*


    The `Home.page` file specifies that:


    - This is the page specification for a Home page as deduced by the name of the
    file `Home.page`, the associated `Home.html` template, and the class `com.integrallis.time.Home`
    as defined in the `class` attribute of the `page-specification` element.

    - It defines one component with an `id` of `time` which is of type `Insert`.

    - The component `time` binds the value of the expression `ognl:time` to the value
    of the component.


    ## Web Deployment Descriptor


    As with any Java Web application, you will need a Web deployment descriptor (`web.xml`)
    in the `WEB-INF` directory. As with most Web frameworks, the entry point into
    the framework is a servlet. In the case of Tapestry, it is `org.apache.tapestry.ApplicationServlet`.
    In a Tapestry application you’ll name the `ApplicationServlet` after your application;
    in our case as shown in Listing 7-4, the `servlet-name` element values is `tapestry-time`.


    The first `servlet-mapping` maps to the URL pattern `/app` to Tapestry application
    servlet. The purpose of the rest of the mappings will become apparent as we work
    through the example. Finally, at the end of the descriptor we have the `welcome-file`
    element in which we are declaring the file `Home.html` as a welcome file. Notice
    that there is also a servlet mapping that maps `*.html` to the Tapestry application
    servlet.


    **Listing 7-4.** *Web Deployment Descriptor*


    ```

    <?xml version="1.0" encoding="ISO-8859-1"?>


    <web-app


    xsi:schemaLocation="http://java.sun.com/xml/ns/j2ee web-app_2_4.xsd"


    version="2.4">


    <display-name>tapestry-time</display-name>


    <servlet>


    <servlet-name>tapestry-time</servlet-name>


    <servlet-class>org.apache.tapestry.ApplicationServlet</servlet-class>


    <load-on-startup>1</load-on-startup>


    </servlet>


    <servlet-mapping>


    <servlet-name>tapestry-time</servlet-name>


    <url-pattern>/app</url-pattern>


    </servlet-mapping>


    <servlet-mapping>


    <servlet-name>tapestry-time</servlet-name>


    <url-pattern>*.html</url-pattern>


    </servlet-mapping>


    <servlet-mapping>


    <servlet-name>tapestry-time</servlet-name>


    <url-pattern>*.external</url-pattern>


    </servlet-mapping>


    <servlet-mapping>


    <servlet-name>tapestry-time</servlet-name>


    <url-pattern>*.direct</url-pattern>


    </servlet-mapping>


    <servlet-mapping>


    <servlet-name>tapestry-time</servlet-name>


    <url-pattern>*.sdirect</url-pattern>


    </servlet-mapping>


    <servlet-mapping>


    <servlet-name>tapestry-time</servlet-name>

    ```'
