    ## AJDT


    The `LoggingAndTracing` aspect shows the basic functionality that can be achieved
    with AspectJ by modularizing a concern. But to do anything complex with AOP, you
    need good tool support. Understanding the effects of aspects on your program is
    indispensable when working with AOP. The AspectJ Development Tools (AJDT) are
    a collection of Eclipse plug-ins that provides tool support for editing, building,
    and debugging AspectJ applications.


    The easiest way to install the AJDT plug-in is to use the Eclipse software updates
    feature. To do this select Help ➤ Software Updates ➤ Find and Install. Select
    "Search for new features to install" and click Next. Add a new remote update site
    by selecting New Remote Site. In the dialog enter "AJDT" for the name and `http://download.eclipse.org/technology/ajdt/31/update`
    for the location.


    AJDT adds decorations related to AspectJ to the Eclipse gutter. For example, in
    Figure 10-3 we can see the decoration (a curved arrow pointing to the left) related
    to the before advice of the `LoggingAndTracing` aspect. If you hover over the
    decoration you can see a pop-up balloon indicating the number of AspectJ markers.


    **Figure 10-3.** *AJDT gutter decorations*


    Right-clicking on the gutter decoration will reveal a context menu from which
    you can see the methods being advised by this particular advice as shown on Figure
    10-4.


