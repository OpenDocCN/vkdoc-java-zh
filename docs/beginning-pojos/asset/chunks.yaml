    <a href="displayConference.htm?id=${conference.conferenceId}"> ${conference.conferenceTitle}


    </a>


    </li>


    </c:forEach>


    </ul>


    在 `conferenceList.jsp` 页面中，我们使用核心 JSTL `forEach` 标签来遍历 `ConferenceSummary` DTO
    列表（通过 `${conferences}` 访问）。对于每个对象，我们创建一个指向 `displayConference.html` 页面的链接，显示 `conferenceTitle`，并将
    `conferenceId` 字段作为参数 `id` 传递。


