    **163**


    让我们先看看 TechConf 应用程序的 ConferenceDAO 接口。如清单 5-4 所示，该接口提供了一些 CRUD 方法，以及一些针对 Conference
    和 Room 对象的特定查找方法。


    **清单 5-4.** *ConferenceDAO 接口*


    package com.integrallis.techconf.dao;


    import java.util.Date;


    import java.util.List;


    import com.integrallis.techconf.domain.Conference;


    import com.integrallis.techconf.domain.Room;


    public interface ConferenceDAO {


    Conference getConference(int conferenceId);


    Conference getConferenceByName(String name);


    List<Conference> getActiveConferences(Date beginDate, Date endDate); List<Conference>
    getActiveConferences(Date date);


    List<Conference> getAllConferences();


    List<Room> getRooms(int venueId);


    void save(Conference conference);


    void update(Conference conference);


    void delete(Conference conference);


    void delete(int conferenceId);


    }


    清单 5-5 显示了 BaseAbstractDAO 类，它将作为所有特定于 Hibernate 的 DAO SLSB 的基类。该类提供了针对 Hibernate
    Session 对象的简化方法，并隐藏了更复杂的 Hibernate API（如 Criteria API）的某些细节。


    由于 Hibernate DAO 依赖于 Hibernate SessionFactory，我们通过 @Resource 注解 (javax.annotation.Resource)
    注入 Hibernate SessionFactory 对象。它还提供了在启用 JTA 的环境（如 JBoss AS）中通过 getCurrentSession()
    方法获取 Session 对象的能力，或在非 JTA 环境中通过 openSession() 方法获取 Session 对象的能力。


    提供了包装 Criteria API 使用的方法，用于 findAll()、findFiltered()、findUnique() 和 findUniqueFiltered()。这些方法使经验较少的
    Hibernate 开发人员能够快速创建 DAO 实现。由于 TechConf 应用程序使用非常无状态的架构，DAO 层不必处理延迟事务问题或分离的领域对象，否则会使实现稍微复杂一些。


    另请注意，我们使用了 getCurrentSession() 方法，该方法应避免每次操作都使用新的 Hibernate Session。这可能导致性能不佳。SESSION_RETRIEVAL_STRATEGY_CREATE_NEW
    策略主要用于应用程序的单元测试中。


