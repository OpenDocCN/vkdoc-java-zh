    <antcall target="generate-docs-clean" />


    <antcall target="test-clean" />


    ...


    </target>


    **All 目标**


    最后，一种常见的做法是将构建文件的默认目标命名为“all”，其依赖项中列出了代表系统完整构建的目标列表。如果你的构建过程中有一些非关键但需要相当长时间生成的目标，你可以创建新的目标，这些目标除了执行额外的工作外，还会执行
    all 目标所做的所有事情。例如，一个执行“all”操作并同时生成文档的目标可以命名为“all-with-docs”。


    关键在于，你希望最小化构建应用程序所需的时间，以便开发人员的工作流程不会受到明显的干扰。一个典型的 all 目标如清单 3-15 所示。


    **清单 3-15.** *All 目标*


    <target


    name="all"


    depends="compile,..."


    description="生成、编译、打包和部署。"


    />


    **Eclipse 集成**


    在第 2 章中，我们学习了如何安装和配置 Eclipse IDE。现在我们有了一个 Ant 构建文件，如果能在命令行和 IDE 之间实现和谐，那将是理想的。幸运的是，Eclipse
    自带了强大的 Ant 集成功能。Eclipse 提供了一个出色的 Ant XML 编辑器，具有语法高亮、代码补全、Ant 元素的悬停评估，以及关于构建文件有效性的即时视觉反馈。


    为了使 TechConf 应用程序无缝运行，你可以创建一个 Ant Builder，这是 Eclipse 外部工具框架为 Ant 集成提供的一个功能。Ant
    Builder 可以配置为在特定时间运行。例如，在我的环境中，我将 Ant 构建配置为在手动构建被调用或选择项目“Clean”选项时运行。


