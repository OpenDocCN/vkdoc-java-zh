- fmt: "■**Best Practice** For each main target in the buildfile, add a `target-init`\
    \ and a `target-clean`, where `target` is the name of the main target. This makes\
    \ it fairly straightforward to determine the resources needed and created by a\
    \ target and also makes it easier to maintain large buildfiles. For simple buildfiles\
    \ a single `clean` target will usually suffice.\n\n**Buildfile Reuse with Macros**\n\
    \nIf you paid close attention to the `compile-init` target shown previously, you’ve\
    \ notice that the first line is:\n\n```\n<target-banner target=\"compile\"/>\n\
    ```\n\nThe element `target-banner` is not a standard Ant task or a third-party\
    \ task; it is a macro definition contained in a separate XML named `macros.xml`.\
    \ Macro definitions, a feature introduced in Ant 1.6, help you avoid the tedious\
    \ copy-paste reuse and enable you to modularize your builds. Macros can be invoked\
    \ anywhere in the buildfile, and the macro definitions can be parameterized. In\
    \ order to enable our build to use the macros, we use the `import` task as shown\
    \ next:\n\n```\n<import file=\"ant/macros.xml\"/>\n```\n\nLet’s take a look at\
    \ the file `macros.xml`, which is located in the `ant` directory at the root of\
    \ the TechConf project and shown in Listing 3-7.\n\n**Listing 3-7.** *Ant Macros\
    \ File*\n\n```\n<?xml version=\"1.0\"?>\n\n<project name=\"techconf-ant-macros\"\
    \ default=\"test-macros\" basedir=\"..\">\n\n    <macrodef name=\"target-banner\"\
    >\n        <attribute name=\"target\"/>\n        <attribute name=\"message\" default=\"\
    \" />\n        <sequential>\n            <echo>===========================================================</echo>\n\
    \            <echo>Executing Target @{target}</echo>\n            <echo>@{message}</echo>\n\
    \            <echo>===========================================================</echo>\n\
    \        </sequential>\n    </macrodef>\n\n    <target name=\"test-macros\">\n\
    \        <target-banner target=\"Compile\"/>\n        <target-banner target=\"\
    Testing\" message=\"This is a sample message\"/>\n    </target>\n\n    ...\n\n\
    </project>\n```\n\nIn `macros.xml` we define the `target-banner` macrodef. Ant\
    \ macrodefs can take attributes; in this case there are two attributes, `target`\
    \ and `message`. As you can guess from the snippet shown, the `target-banner`\
    \ macrodef uses the `echo` task to print a banner to the console that informs\
    \ the user of the current target being executed and also prints an optional message.\
    \ The attributes are defined using the `attribute` element. The `target` attribute\
    \ is required, but the `message` attribute is optional since it has a default\
    \ value. Macro attributes are mutable and are expanded via `@{attrname}`.\n\n\
    ■**Note** Macro attributes `@{attr}` are expanded before Ant properties `${property}`.\
    \ This is important if you are using properties in your macros.\n\nOn its own,\
    \ the `macros.xml` file behaves just like any other Ant buildfile. If we execute\
    \ the `macros.xml` file using Ant as follows:\n\n```\nant -f macros.xml\n```\n\
    \nThe default target `test-macros` will execute, producing the following output:\n\
    \n```\nBuildfile: macros.xml\n\ntest-macros:\n     [echo] ===================================================================\n\
    \     [echo] Executing Target Compile\n     [echo] ===================================================================\n\
    \     [echo] ===================================================================\n\
    \     [echo] Executing Target Testing\n     [echo] This is a sample message\n\
    \     [echo] ===================================================================\n\
    \nBUILD SUCCESSFUL\nTotal time: 1 second\n```\n\nAs you can see, `macrodef` in\
    \ combination with the `import` task can help you create reusable, modularized\
    \ Ant functionality that will help you keep your buildfiles simple. For the TechConf\
    \ project we will use the `macros.xml` file to house most of the tasks peripheral\
    \ to the build process.\n\nIn the remainder of this chapter we will continue to\
    \ enhance both the `build.xml` file and the `macros.xml` file to create a J2EE\
    \ build system that’s modular and reusable.\n\n**Javadoc Generation**\n\nFor proper\
    \ team communication and for enabling code reuse you must have a consistent, up-to-date\
    \ set of API documentation. The Javadoc tool has existed for as long as Java has\
    \ been around, and all developers are well acquainted with it. The problem has\
    \ been that developers feel that they can run Javadoc only after they are finished\
    \ with the code (which might be never).\n\nRunning Javadoc at the end of a project\
    \ provides very little help to others in the team and moves documentation to the\
    \ end of process, when it isn’t as helpful (waterfall).\n\nWith Ant you can ensure\
    \ that Javadoc is generated as part of the daily build and that you don’t hide\
    \ the documentation process until the “end” of the development phase. The Ant\
    \ Javadoc task provides a convenient way to generate Javadoc from within Ant.\n\
    \nTo incorporate Javadoc generation into the TechConf build we will enhance the\
    \ `macros.xml` file with a generic `macrodef` that defaults most of the common\
    \ settings used with the Javadoc task. There are four required attributes—`source.path`,\
    \ `class.path`, `dest`, `year`—and the optional `company` attribute, as shown\
    \ in Listing 3-8.\n\n**Listing 3-8.** *Javadoc Macrodef*\n\n```\n<macrodef name=\"\
    generate-javadoc\" description=\"Generate JavaDocs.\">\n    <attribute name=\"\
    company\" default=\"Integrallis Software, LLC.\"/>\n    <attribute name=\"source.path\"\
    />\n    <attribute name=\"class.path\"/>\n    <attribute name=\"year\"/>\n   \
    \ <attribute name=\"dest\"/>\n    <sequential>\n        <javadoc\n           \
    \ destdir=\"@{dest}\"\n            author=\"true\"\n            version=\"true\"\
    \n            use=\"true\"\n            windowtitle=\"${ant.project.name}\"\n\
    \            sourcepathref=\"@{source.path}\"\n            classpathref=\"@{class.path}\"\
    \n            packagenames=\"*.*\"\n            Verbose=\"false\">\n         \
    \   <doctitle><![CDATA[<h1>${ant.project.name}</h1>]]></doctitle>\n          \
    \  <bottom>\n                <![CDATA[<i>Copyright © @{year} @{company} All Rights\
    \ Reserved.</i>]]>\n            </bottom>\n            <tag name=\"todo\" scope=\"\
    all\" description=\"To do:\" />\n        </javadoc>\n    </sequential>\n</macrodef>\n\
    ```\n\nNotice that the `doctitle` and the `bottom` nested elements make use of\
    \ the XML character data (CDATA) section in order to be able to use HTML markup\
    \ and not have it interfere with the markup of the buildfile.\n\nTo use the `generate-javadoc`\
    \ macrodef in the TechConf buildfile we can create a target in our `build.xml`\
    \ as shown in Listing 3-9.\n\n**Listing 3-9.** *Generate-docs Target*\n\n```\n\
    <target name=\"generate-docs\" description=\"Generates all documentation\">\n\
    \    <target-banner target=\"generate-docs\"/>\n    <generate-javadoc\n      \
    \  class.path=\"class.path\"\n        dest=\"${docs-api}\"\n        source.path=\"\
    all.source.path\"\n        year=\"2005\"\n    />\n</target>\n\n<target name=\"\
    generate-docs-clean\">\n    <delete dir=\"${docs}\" />\n</target>\n```\n\nIt is\
    \ easy to see how much cleaner your main buildfile can become by using macrodefs\
    \ effectively. For the rest of the chapter we will use the same technique to continue\
    \ enhancing the build with other functionality.\n\n**Checking Code Conventions\
    \ with Checkstyle**\n\nEven if you’re using a formatting tool either at build\
    \ time or with your favorite IDE, there are still style checks beyond the realm\
    \ of formatting. Checkstyle is a tool that enables code to be checked against\
    \ a convention. Checkstyle supports the Sun convention by default, although it\
    \ can check for more than just simple formatting. For example, it can check for\
    \ illegal regular expressions in the code, inline conditionals, double-checked\
    \ locking, and other idioms or patterns that might be considered unsafe or problematic."
  raw: '■**Best Practice** For each main target in the buildfile, add a target-init
    and a target-clean, where target is the name of the main target. This makes it
    fairly straightforward to determine the resources needed and created by a target
    and also makes it easier to maintain large buildfiles. For simple buildfiles a
    single clean target will usually suffice.


    **Buildfile Reuse with Macros**


    If you paid close attention to the compile-init target shown previously, you’ve
    notice that the first line is:


    <target-banner target="compile"/>


    The element target-banner is not a standard Ant task or a third-party task; it
    is a macro definition contained in a separate XML named macros.xml. Macro definitions,
    a feature introduced in Ant 1.6, help you avoid the tedious copy-paster reuse
    and enable you to modularize your builds. Macros can be invoked anywhere in the
    buildfile, and the macro definitions can be parameterized. In order to enable
    our build to use the macros, we use the import task as shown next:


    <import file="ant/macros.xml"/>


    Let’s take a look at the file macros.xml, which is located in the ant directory
    at the root of the TechConf project and shown in Listing 3-7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 70 Wednesday, February 22, 2006 6:05 AM


    **70**


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    **Listing 3-7.** *Ant Macros File*


    <?xml version="1.0"?>


    <project name="techconf-ant-macros" default="test-macros" basedir="..">


    <macrodef name="target-banner">


    <attribute name="target"/>


    <attribute name="message" default="" />


    <sequential>


    <echo>===========================================================</echo>


    <echo>Executing Target @{target}</echo>


    <echo>@{message}</echo>


    <echo>===========================================================</echo>


    </sequential>


    </macrodef>


    <target name="test-macros">


    <target-banner target="Compile"/>


    <target-banner target="Testing" message="This is a sample message"/>


    </target>


    ...


    </project>


    In macros.xml we define the target-banner macrodef. Ant macrodefs can take attributes;
    in this case there are two attributes, target and message. As you can guess from
    the snippet shown, the target-banner macrodef uses the echo task to print a banner
    to the console that informs the user of the current target being executed and
    also prints an optional message. The attributes are defined using the attribute
    element. The target attribute is required, but the message attribute is optional
    since it has a default value. Macro attributes are mutable and are expanded via
    @{attrname}.


    ■**Note** Macro attributes @{attr} are expanded before Ant properties ${property}.
    This is important if you are using properties in your macros.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 71 Wednesday, February 22, 2006 6:05 AM


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    **71**


    On its own, the macros.xml file behaves just like any other Ant buildfile. If
    we execute the macros.xml file using Ant as follows:


    ant -f macros.xml


    The default target test-macros will execute, producing the following output: Buildfile:
    macros.xml


    test-macros:


    [echo] ===================================================================


    [echo] Executing Target Compile


    [echo] ===================================================================


    [echo] ===================================================================


    [echo] Executing Target Testing


    [echo] This is a sample message


    [echo] ===================================================================


    BUILD SUCCESSFUL


    Total time: 1 second


    As you can see, macrodef in combination with the import task can help you create
    reusable, modularized Ant functionality that will help you keep your buildfiles
    simple. For the TechConf project we will use the macros.xml file to house most
    of the tasks peripheral to the build process.


    In the remainder of this chapter we will continue to enhance both the build.xml
    file and the macros.xml file to create a J2EE build system that’s modular and
    reusable.


    **Javadoc Generation**


    For proper team communication and for enabling code reuse you must have a consistent,
    up-to-date set of API documentation. The Javadoc tool has existed for as long
    as Java has been around, and all developers are well acquainted with it. The problem
    has been that developers feel that they can run Javadoc only after they are finished
    with the code (which might be never).


    Running Javadoc at the end of a project provides very little help to others in
    the team and moves documentation to the end of process, when it isn’t as helpful
    (waterfall).


    With Ant you can ensure that Javadoc is generated as part of the daily build and
    that you don’t hide the documentation process until the “end” of the development
    phase. The Ant Javadoc task provides a convenient way to generate Javadoc from
    within Ant.


    To incorporate Javadoc generation into the TechConf build we will enhance the
    macros.xml file with a generic macrodef that defaults most of the common settings
    used with the Javadoc task. There are four required attributes—source.path, class.path,
    dest, year—and the optional company attribute, as shown in Listing 3-8.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 72 Wednesday, February 22, 2006 6:05 AM


    **72**


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    **Listing 3-8.** *Javadoc Macrodef*


    <macrodef name="generate-javadoc" description="Generate JavaDocs.">


    <attribute name="company" default="Integrallis Software, LLC."/>


    <attribute name="source.path"/>


    <attribute name="class.path"/>


    <attribute name="year"/>


    <attribute name="dest"/>


    <sequential>


    <javadoc


    destdir="@{dest}"


    author="true"


    version="true"


    use="true"


    windowtitle="${ant.project.name}"


    sourcepathref="@{source.path}"


    classpathref="@{class.path}"


    packagenames="*.*"


    Verbose="false">


    <doctitle><![CDATA[<h1>${ant.project.name}</h1>]]></doctitle>


    <bottom>


    <![CDATA[<i>Copyright © @{year} @{company} All Rights Reserved.</i>]]>


    </bottom>


    <tag name="todo" scope="all" description="To do:" />


    </javadoc>


    </sequential>


    </macrodef>


    Notice that the doctitle and the bottom nested elements make use of the XML character
    data (CDATA) section in order to be able to use HTML markup and not have it interfere
    with the markup of the buildfile.


    To use the generate-javadoc macrodef in the TechConf buildfile we can create a
    target in our build.xml as shown in Listing 3-9.


    **Listing 3-9.** *Generate-docs Target*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 73 Wednesday, February 22, 2006 6:05 AM


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    **73**


    <target name="generate-docs" description="Generates all documentation">


    <target-banner target="generate-docs"/>


    <generate-javadoc


    class.path="class.path"


    dest="${docs-api}"


    source.path="all.source.path"


    year="2005"


    />


    </target>


    <target name="generate-docs-clean">


    <delete dir="${docs}" />


    </target>


    It is easy to see how much cleaner your main buildfile can become by using macrodefs
    effectively. For the rest of the chapter we will use the same technique to continue
    enhancing the build with other functionality.


    **Checking Code Conventions with Checkstyle**


    Even if you’re using a formatting tool either at build time or with your favorite
    IDE, there are still style checks beyond the realm of formatting. Checkstyle is
    a tool that enables code to be checked against a convention. Checkstyle supports
    the Sun convention by default, although it can check for more than just simple
    formatting. For example, it can check for illegal regular expressions in the code,
    inline conditionals, double-checked locking, and other idioms or patterns that
    might be considered unsafe or problematic.'
  trans: '

    ■**最佳实践** 对于构建文件中的每个主要目标，添加一个`target-init`和一个`target-clean`，其中`target`是主要目标的名称。这使得确定目标所需和创建的资源变得相当直接，也更容易维护大型构建文件。对于简单的构建文件，单个`clean`目标通常就足够了。


    **通过宏实现构建文件复用**


    如果你仔细留意了之前展示的`compile-init`目标，你会注意到第一行是：


    <target-banner target="compile"/>


    元素`target-banner`并非标准的 Ant 任务或第三方任务；它是一个宏定义，包含在一个名为`macros.xml`的独立 XML 文件中。宏定义是
    Ant 1.6 引入的功能，它帮助你避免繁琐的复制粘贴复用，并使你能够将构建模块化。宏可以在构建文件中的任何位置调用，并且宏定义可以参数化。为了使我们的构建能够使用这些宏，我们使用`import`任务，如下所示：


    <import file="ant/macros.xml"/>


    让我们看一下`macros.xml`文件，它位于 TechConf 项目根目录下的`ant`目录中，如清单 3-7 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 70 Wednesday, February 22, 2006 6:05 AM


    **70**


    第 3 章 ■ 使用 ANT 构建


    **清单 3-7.** *Ant 宏文件*


    <?xml version="1.0"?>


    <project name="techconf-ant-macros" default="test-macros" basedir="..">


    <macrodef name="target-banner">


    <attribute name="target"/>


    <attribute name="message" default="" />


    <sequential>


    <echo>===========================================================</echo>


    <echo>Executing Target @{target}</echo>


    <echo>@{message}</echo>


    <echo>===========================================================</echo>


    </sequential>


    </macrodef>


    <target name="test-macros">


    <target-banner target="Compile"/>


    <target-banner target="Testing" message="This is a sample message"/>


    </target>


    ...


    </project>


    在`macros.xml`中，我们定义了`target-banner`宏定义。Ant 宏定义可以接受属性；在这种情况下，有两个属性：`target`和`message`。从显示的代码片段中你可以猜到，`target-banner`宏定义使用`echo`任务在控制台打印一个横幅，告知用户当前正在执行的目标，并打印一条可选消息。属性使用`attribute`元素定义。`target`属性是必需的，但`message`属性是可选的，因为它有一个默认值。宏属性是可变的，并通过`@{attrname}`进行扩展。


    ■**注意** 宏属性`@{attr}`在 Ant 属性`${property}`之前展开。如果你在宏中使用属性，这一点很重要。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 71 Wednesday, February 22, 2006 6:05 AM


    第 3 章 ■ 使用 ANT 构建


    **71**


    就其本身而言，`macros.xml`文件的行为与任何其他 Ant 构建文件一样。如果我们使用 Ant 执行`macros.xml`文件，如下所示：


    ant -f macros.xml


    默认目标`test-macros`将执行，产生以下输出： Buildfile: macros.xml


    test-macros:


    [echo] ===================================================================


    [echo] Executing Target Compile


    [echo] ===================================================================


    [echo] ===================================================================


    [echo] Executing Target Testing


    [echo] This is a sample message


    [echo] ===================================================================


    BUILD SUCCESSFUL


    Total time: 1 second


    如你所见，`macrodef`与`import`任务结合使用，可以帮助你创建可复用、模块化的 Ant 功能，这将帮助你保持构建文件的简洁。对于 TechConf
    项目，我们将使用`macros.xml`文件来存放大部分与构建过程外围相关的任务。


    在本章的剩余部分，我们将继续增强`build.xml`文件和`macros.xml`文件，以创建一个模块化且可复用的 J2EE 构建系统。


    **生成 Javadoc**


    为了进行良好的团队沟通并实现代码复用，你必须拥有一套一致且最新的 API 文档。Javadoc 工具自 Java 诞生以来就已存在，所有开发人员都对其非常熟悉。问题在于，开发人员认为他们只能在完成代码后才能运行
    Javadoc（这可能永远不会发生）。


    在项目结束时运行 Javadoc 对团队中的其他人帮助甚微，并将文档工作推迟到流程末尾，而此时它已不那么有用（瀑布模型）。


    使用 Ant，你可以确保 Javadoc 作为每日构建的一部分生成，并且你不会将文档过程隐藏到开发阶段的“末尾”。Ant Javadoc 任务提供了一种从
    Ant 内部生成 Javadoc 的便捷方式。


    为了将 Javadoc 生成集成到 TechConf 构建中，我们将使用一个通用的`macrodef`来增强`macros.xml`文件，该宏定义为 Javadoc
    任务中使用的常见设置提供了默认值。有四个必需的属性——`source.path`、`class.path`、`dest`、`year`——以及可选的`company`属性，如清单
    3-8 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 72 Wednesday, February 22, 2006 6:05 AM


    **72**


    第 3 章 ■ 使用 ANT 构建


    **清单 3-8.** *Javadoc 宏定义*


    <macrodef name="generate-javadoc" description="Generate JavaDocs.">


    <attribute name="company" default="Integrallis Software, LLC."/>


    <attribute name="source.path"/>


    <attribute name="class.path"/>


    <attribute name="year"/>


    <attribute name="dest"/>


    <sequential>


    <javadoc


    destdir="@{dest}"


    author="true"


    version="true"


    use="true"


    windowtitle="${ant.project.name}"


    sourcepathref="@{source.path}"


    classpathref="@{class.path}"


    packagenames="*.*"


    Verbose="false">


    <doctitle><![CDATA[<h1>${ant.project.name}</h1>]]></doctitle>


    <bottom>


    <![CDATA[<i>Copyright © @{year} @{company} All Rights Reserved.</i>]]>


    </bottom>


    <tag name="todo" scope="all" description="To do:" />


    </javadoc>


    </sequential>


    </macrodef>


    请注意，`doctitle`和`bottom`嵌套元素使用了 XML 字符数据（CDATA）部分，以便能够使用 HTML 标记，并且不会干扰构建文件的标记。


    要在 TechConf 构建文件中使用`generate-javadoc`宏定义，我们可以在`build.xml`中创建一个目标，如清单 3-9 所示。


    **清单 3-9.** *Generate-docs 目标*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 73 Wednesday, February 22, 2006 6:05 AM


    第 3 章 ■ 使用 ANT 构建


    **73**


    <target name="generate-docs" description="Generates all documentation">


    <target-banner target="generate-docs"/>


    <generate-javadoc


    class.path="class.path"


    dest="${docs-api}"


    source.path="all.source.path"


    year="2005"


    />


    </target>


    <target name="generate-docs-clean">


    <delete dir="${docs}" />


    </target>


    很容易看出，通过有效使用宏定义，你的主构建文件可以变得多么简洁。在本章的其余部分，我们将使用相同的技术，继续用其他功能增强构建。


    **使用 Checkstyle 检查代码规范**


    即使你在构建时或使用你最喜欢的 IDE 时使用了格式化工具，仍然存在格式化领域之外的风格检查。Checkstyle 是一种能够根据规范检查代码的工具。Checkstyle
    默认支持 Sun 规范，尽管它可以检查的不仅仅是简单的格式化。例如，它可以检查代码中的非法正则表达式、内联条件语句、双重检查锁定以及其他可能被认为不安全或有问题的惯用法或模式。

    '
- fmt: "You can download `Checkstyle` from [http://checkstyle.sourceforge.net](http://checkstyle.sourceforge.net).\
    \ At the root of the `Checkstyle` distribution you’ll find the `checkstyle-all-4.0.jar`\
    \ file. Place this file in a directory named `checkstyle` under the `lib` directory\
    \ of the `TechConf` project directory. The file containing the XML configuration\
    \ representing the Sun convention is named `sun_checks.xml`, and it’s located\
    \ under the `docs` directory of the distribution directory. Copy this file to\
    \ the `lib/checkstyle` directory also.\n\n`Checkstyle` writes its output to the\
    \ standard out by default or to a file in plain text or XML format. The `Checkstyle`\
    \ distribution also provides several Extensible Stylesheet Language (XSL) stylesheets\
    \ that can be used to convert the XML reports to HTML format for easier viewing.\
    \ You can find these stylesheets in the `Checkstyle` distribution under the `contrib`\
    \ directory. Copy the `checkstyle-noframes-sorted.xsl` file to the `lib/checkstyle`\
    \ directory.\n\nTo use `Checkstyle` from within `Ant`, you first need to load\
    \ the `checkstyle` task. As with the `Javadoc` task we will incorporate the `checkstyle`\
    \ task in a `macrodef` contained in the `macros.xml` file. First we need to make\
    \ the `checkstyle` task available to the `macros.xml` file by defining a `taskdef`\
    \ for it:\n\n```\n<path id=\"checkstyle.class.path\">\n  <fileset dir=\"lib/checkstyle\"\
    >\n    <include name=\"*.jar\"/>\n  </fileset>\n</path>\n```\n\n```\n<taskdef\n\
    \  resource=\"checkstyletask.properties\"\n  classpathref=\"checkstyle.class.path\"\
    \n/>\n```\n\nThe `macrodef` `generate-checkstyle` takes two required attributes:\
    \ `src` to determine the directory containing the source files to check and `checkstyle-reports`\
    \ for the location to place the generated reports. The rest of the attributes—`checkstyle-checks-file`,\
    \ `checkstyle-xml-report-file`, `checkstyle-html-report-file` and `checkstyle-stylesheet`—are\
    \ all optional. Notice that some of the default values for the optional attributes\
    \ are generated from the values of the required attributes.\n\nThe `checkstyle`\
    \ `macrodef` uses the `checkstyle` task to check the code under the `@{src}` directory\
    \ against the conventions specified by the file `@{checkstyle-checks-file}` and\
    \ uses a formatter of type `XML` to generate the report referred to in `@{checkstyle-xml-report-file}`.\
    \ The `failureProperty` attribute is the property that’s set if there are any\
    \ errors encountered during the checking process. You can use this value to determine\
    \ if any action is to be taken in the case of an error, such as emailing the report.\
    \ The second part of the target uses the `style` task to transform the generated\
    \ XML into an HTML report. The `generate-checkstyle` `macrodef` is shown in Listing\
    \ 3-10.\n\n**Listing 3-10.** *Generate-checkstyle Macrodef*\n\n```\n<macrodef\
    \ name=\"generate-checkstyle\"\n  description=\"Generates Code Convention Violations\
    \ Report.\">\n  <attribute name=\"src\" />\n  <attribute name=\"checkstyle-reports\"\
    \ />\n  <attribute name=\"checkstyle-checks-file\"\n    default=\"lib/checkstyle/sun_checks.xml\"\
    />\n  <attribute name=\"checkstyle-xml-report-file\"\n    default=\"@{checkstyle-reports}/checkstyle-report.xml\"\
    />\n  <attribute name=\"checkstyle-html-report-file\"\n    default=\"@{checkstyle-reports}/checkstyle-report.html\"\
    />\n  <attribute name=\"checkstyle-stylesheet\"\n    default=\"lib/checkstyle/checkstyle-noframes-sorted.xsl\"\
    />\n  <sequential>\n    <mkdir dir=\"@{checkstyle-reports}\" />\n    <checkstyle\n\
    \      config=\"@{checkstyle-checks-file}\"\n      failureProperty=\"checkstyle.failure\"\
    \n      failOnViolation=\"false\"\n    >\n      <formatter type=\"xml\" tofile=\"\
    @{checkstyle-xml-report-file}\"/>\n      <fileset dir=\"@{src}\" includes=\"**/*.java\"\
    />\n    </checkstyle>\n    <style\n      in=\"@{checkstyle-xml-report-file}\"\n\
    \      out=\"@{checkstyle-html-report-file}\"\n      style=\"@{checkstyle-stylesheet}\"\
    \n    />\n  </sequential>\n</macrodef>\n```\n\nA sample `Checkstyle` report is\
    \ shown in Figure 3-6.\n\n**Figure 3-6.** *Checkstyle HTML report*"
