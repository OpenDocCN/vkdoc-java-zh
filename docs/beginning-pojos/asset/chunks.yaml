    **196**


    C H A P T E R 6 ■ T H E S P R I N G F R A M E W O R K


    from the rest of the specification, especially from the real gems of the specification—in
    my humble opinion, JNDI and JMS. Those developers who took the path of least resistance
    ended up with so-called components that were not truly reusable, were hard to
    test, and contained more plumbing code that actual application code of value to
    the business.


    Frameworks like Spring emerged from the philosophy of using the best parts of
    the specification, masking those parts that are cumbersome, and simplifying the
    APIs, all the while making good, object-oriented design priority number one. As
    you’ll soon learn, Spring lets you approach the design of your application using
    interfaces in a loosely coupled way without compromising good, object-oriented
    principles.


    ## Dependency Injection


    Spring is primarily known as a Dependency Injection container. Dependency Injection
    is the more appropriate term coined by Martin Fowler, Rod Johnson, and the PicoContainer
    team in late 2003 for what was once known as “Inversion of Control.” An alternative
    view is that DI is a strategy or flavor of IoC. Most explanations of DI also referred
    to it as the Hollywood Principle:


    “Don’t call us, we’ll call you.”


    Early in my forays into DI containers and the Spring Framework, I found some of
    the explanations of IoC/DI overly complex. The best explanation I can give for
    DI is that it is a technique by which you externalize the choice of which implementation
    of a given interface you’ll use at runtime. In Spring, a system is designed using
    interfaces, and the Spring framework plugs or injects the right implementations
    at runtime. In Spring you typically inject specific implementations of an interface
    into other beans via an XML configuration file referred to as an application context.


    Therefore in a Spring application your POJOs or beans do not have their dependencies
    explicitly constructed in the code. Instead, dependencies are “injected” by the
    container at runtime. For example, in a typical Spring Web application using the
    DAO pattern, you’ll have interfaces defining the DAOs and interfaces defining
    the services. In the implementation of a service, a property for a DAO is defined
    (using the interface) along with a setter or a constructor that takes the DAO
    as a parameter. The Spring application context XML configuration contains a definition
    of the specific implementation of the DAO interface that will be injected into
    the service class (using the setter or the constructor provided). At runtime,
    the Spring container using the application context will correctly wire the beans
    and the collaborators needed to fulfill its functions. This is contrary to the
    lookup-based approached of EJB 2.X, in which the service locator pattern along
    with factories and straight object construction is used to wire all collaborators
    in a system. In a typical EJB 2.X system, a service locator is used as a way to
    pull the dependencies (typically from JNDI) into a component (all this is done
    programmatically from within the component itself). This doesn’t mean that JNDI
    isn’t a powerful abstraction for resource management, but the implementation in
    EJB 2.X forced this “pull” usage of JNDI and a dependence on the JNDI API (making
    it harder to test without having JNDI available and therefore in most cases a
    container) and requiring a lot of code to perform lookups. As we saw in Chapter
    5, the EJB3 specification allows for JNDI-bound resources to be injected into
    a component in a loosely coupled fashion via Java annotations. Similarly, Spring
    allows for the injection of JNDI-bound resources. Figure 6-1 depicts the dependency
    injection pattern as supported by the Spring Framework.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C06.fm Page 197 Wednesday, February 22, 2006 1:20 PM


    C H A P T E R 6 ■ T H E S P R I N G F R A M E W O R K


    **197**


    **Figure 6-1.** *Dependency Injection in Spring*


    Dependency Injection moves the responsibility of configuring application objects
    and resource lookups to the container in a declarative fashion. The main advantages
    of DI are that it removes the requirement of business objects to implement any
    container-specific interfaces and eliminates redundant lookup code or the need
    for service locator implementations. By removing container-specific dependencies,
    objects can be tested without a container, and legacy code can also be easily
    adapted to work in new environments.


    I mentioned before that the implementations to be injected with a resource need
    to provide either a setter or a constructor that is used by the container to inject
    the given resource. This brings us to the different types of dependency injection:
    constructor-based injection and setter-based injection. Both methods provide advantages
    and disadvantages. Renowned technologist Martin Fowler provides the explanation
    of IoC/DI in an online article at `www.martinfowler.com/articles/injection.html`.


    In this book and in the Spring implementation of the TechConf application, I used
    setter-based DI, mostly because it makes it easier in the scenarios when multiple
    resources are being injected and prevents the proliferation of too many constructors,
    which I found is the result of trying to account for the possible combinations
    or required parameters. Of course, by providing constructors that take the required
    resources (and without a no-arguments constructor) you effectively guarantee that
    the object being constructed will be in a valid state upon creation.'
