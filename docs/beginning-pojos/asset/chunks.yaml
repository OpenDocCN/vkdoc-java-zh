- fmt: '# Additional Topics


    In this chapter we’ll explore some of the tools and technologies that fill in
    the gaps when developing Java Web applications. Although we won’t cover all the
    details of each technology, this chapter should help you get started with some
    of the many tools available in the open source ecosystem and what you need to
    do to integrate them into your development.


    ## AOP with AspectJ


    One technology that has greatly simplified the way we develop software is aspect-oriented
    programming (AOP), which offers extension mechanisms to OOP for decomposing a
    solution to a problem domain into encapsulated entities. AOP techniques allow
    us to apply certain behaviors to several parts of an application or completely
    change or enhance the behavior of certain parts of an application in a declarative
    and unobtrusive way.


    The principles of procedural and object-oriented programming all hinge on the
    concept of modularization. But there are aspects of a software system that are
    inherently hard to modularize. This is especially true of aspects that touch many
    areas of a system. For example, logging and tracing is the quintessential example
    of an aspect of a software application that crosses many boundaries, a cross-cutting
    aspect. Although we can somewhat modularize logging by encapsulating all logging
    functionality in logging libraries, the usage of the logging libraries itself
    is dispersed all over the code base. AOP techniques can help us cope with the
    cost of redundant and tangled code. In the case of logging we see the same fragment
    of code in many places, which causes many problems. The biggest problem is that
    the logging statements, although they help us diagnose problems, make the code
    less legible than it could be. Logging is a non-business requirement of the application
    that ends up obscuring the business-related code, making it harder to understand.
    The next problem is maintenance; with the code dispersed all over the code base
    it becomes difficult to apply changes consistently to the way the logging is being
    used.


    AOP is about creating recipes that can be applied to a code base without changing
    the code itself at development time. In the logging and tracing scenario, this
    might equate to a rule like,


    “for all methods in packages A and B, execute this code before any method call,”
    or “for any exception thrown in any method with a name that starts with save,
    output a logging statement.”


    In AOP parlance an aspect is the implementation of a cross-cutting concern encapsulated
    into a unit of functionality. An aspect is the code that implements the functionality
    you want to be applied to one or more places in your code. How an aspect interacts
    with your code is defined by the join point model (JPM). In AOP a join point defines
    the places or events in your code where an aspect can be applied such as the constructor
    of a class, before, around, or after the execution of a method, before the value
    of a class member is modified or when an exception is thrown or handled. In an
    aspect definition, you declare which join points to apply the aspect.


    These join point declarations are called pointcuts which are a way to express
    one or more join points using patterns or regular expressions. The actual code
    that is applied to a join point is called an advice. The act of applying an advice
    to a join point is called weaving. Weaving can occur statically at compile time,
    or it can happen dynamically at runtime.


    > **Note** While an AOP advice provides for a dynamic way to apply an aspect in
    a systemwide manner, an introduction offers a way to modify or augment a class
    statically. I will not cover introductions in this chapter, but it is a feature
    that you will most likely use as you delve deeper into the capabilities of AspectJ.'
