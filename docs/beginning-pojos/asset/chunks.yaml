    **353**


    **Listing 9-2.** *CruiseControl XML Configuration File*


    <cruisecontrol>


    <project name="jakarta-lucene" buildafterfailed="true">


    <listeners>


    <currentbuildstatuslistener file="logs/jakarta-lucene/status.txt"/>


    </listeners>


    <modificationset quietperiod="60">


    <cvs localworkingcopy="checkout/jakarta-lucene"/>


    </modificationset>


    <schedule interval="60" >


    <ant


    buildfile="build-jakarta-lucene.xml"


    target="test"


    uselogger="true"


    usedebug="false"


    />


    </schedule>


    <log dir="logs/jakarta-lucene">


    <merge dir="checkout/jakarta-lucene/build/test/" />


    </log>


    </project>


    </cruisecontrol>


    The CruiseControl file can contain zero or more projects. In each project element
    you can define the delegate build script to execute, how often to check the repository
    for changes and how to report the results of a build attempt.


