- fmt: '# Object Relational Mapping with Hibernate


    As a Java developer it’s very likely that you’ll find yourself retrieving data
    from a relational database and that you’ll want to look at ways to move that data
    to and from your objects and components. The question is how to approach the problem
    of storing your objects’ state in an RDBMS.


    Like most software developers using a relational database to store objects, I
    find that this process is one that seems to consume a lot of my time. Some things
    are now clear to me about this process, and with each new project I find that
    how we go about hooking up a database to our object-oriented applications depends
    on several factors, including the following:


    - How closely related the database schema is to the object model

    - Whether the schema predates the application

    - Whether the schema is a legacy schema with natural keys and compound primary
    keys

    - What the degree of normalization is in the schema

    - How much influence the schema had on the design of the object model and the
    user interface (and vice versa)


    Object-oriented design and development is all about the trade-offs. An object-oriented
    purist view of the world might argue that the design of a domain model should
    not be influenced by an “implementation” detail such as where the state of the
    objects in that model will be stored when they are not in memory. On the other
    side of the spectrum, a relational data modeler might argue that the data will
    very likely outlive the application and that the design of the database schema
    should concentrate only on efficiently storing and accessing of the data.


    My view (and that of most of my colleagues) is that such broad statements are
    one-sided and only lead to problems down the line.


    In a real-world application, with the sort of timelines we work against nowadays,
    agility is of the essence. In most enterprise environments you will have control
    of the object model and at best have influence on the design of the database schema.
    I find that the process of mapping your objects to databases is easier in places
    where there is the most cooperation between object modelers and data modelers.
    Designing the object model and the data model with the involvement of both parties
    will bring in compromises that will produce applications that reflect well the
    problem domain while ensuring the integrity, reusability, and efficient use of
    the data.


    All of my previous remarks are based on the notion of having a domain model that
    represents the problem domain that your application is targeting. But domain modeling
    is just one approach to solving a problem. A lot of the typical Internet applications
    we use on a daily basis have a more data-driven, relational/procedural flavor
    to them and are better suited to be constructed in a way that exploits those characteristics,
    that is using a language that can take advantage of the relational model. Yes,
    you guessed it right, `SQL`. For very simple applications with very simple CRUD
    (create, read, update, and delete) interactions with the database and where performance
    is the number-one priority, raw `SQL` might still be the right choice.


    That being said, it is important to foresee the evolution of an application to
    determine whether you should start with an object-relational mapping (ORM) tool
    from the onset, plain `SQL` or whether you will intermix both approaches in a
    single application.


    ## Object-Relational Mapping


    Object-relational mapping (ORM) is the name given to the technologies, tools,
    and techniques used to bridge the divide between objects and relational databases.
    ORM tools allow you to declaratively map data objects to data and relations in
    a relational database, allowing programmers to work with information from a relational
    database in the form of Java objects. This breed of tools generates all of the
    `SQL` code needed to interact with the database. Developers work at the object
    level, and the concept of queries and transactions are applied to the objects
    rather than database objects. Although they’re under the same umbrella, the tools
    can vary greatly in the way they work, from the level of “transparency” to whether
    they work by generating code, modifying bytecode, or using runtime inspection.


    The concept of transparency as applied to ORM tools is still very vague in the
    industry. Persistence transparency or orthogonality implies that objects are treated
    without any implicit notion of persistence. Most of the existing tools aren’t
    truly transparent, yet they provide a good separation of concerns by isolating
    the persistence of objects behind very simple object-oriented constructs. In Hibernate
    for example, transparency means that the Plain Old Java Objects (POJOs) being
    mapped have no notion that they are persistent objects.


    Also worthy of consideration is how to fit the way a certain tool works with the
    rest of your development process. With some tools, you start with an object model
    and derive a relational persistence model; with others, you start with a relational
    model and derive an object model. Most of the time you’ll find that you have both
    an existing object model and a relational model, in which case most tools fall
    short of expectations and most of the mapping work is manual. Sometimes it is
    impossible to avoid the situation when trade-offs need to be made between your
    object model and the database schema. It’s important that both models are developed
    in cooperation. An ORM tool can help this collaborative work, but it’s the human
    factor that plays the larger role.


    Object persistence is, like most hard problems, all about the trade-offs. The
    theme with Java persistence is about choices, as with many things in Java. No
    tool is perfect for every persistence scenario. Some tools trade transparency
    for performance or simplicity for capabilities. Some of the questions that arise
    during the selection (or creation) of an object-relational tool include the following:


    - How to convert column values to Java objects and primitives. For example, a
    Java `Date` object can be mapped to many database types.'
