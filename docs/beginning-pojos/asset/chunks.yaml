    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    Another important piece of information about Hibernate’s functioning is that Hibernate
    interacts with the database in a transparent write-behind fashion. That means
    that you might not see SQL statements being executed against the database the
    moment the persist method is executed but possibly sometime after. This is a common
    technique employed by ORM tools to allow for runtime optimizations in the interaction
    with the database. For example, the actions in your code might result in several
    back-to-back identical SQL UPDATE statements which the ORM tool might combine
    into a single SQL UPDATE. In Hibernate, the moment when the **Session** is synchronized
    with the database is referred to as flushing. The Hibernate **Session** class
    also provides an explicit flush method which you can invoke. Typically you don’t
    need to manually flush the Session, but in complex scenarios it might be useful
    for debugging purposes.


    Finally, notice that in Listing 4-5 we wrapped the block of code saving the Address
    object in a try-catch-finally. In the finally clause we ensure that we invoke
    the close method of the Session. This ensures that any resources (like database
    connections) are released.


    In the catch clause the Hibernate transaction is rolled back in the case of an
    exception to ensure the integrity of the operation. Note that the usage of the
    Hibernate transaction is not required, but it is recommended that you always use
    it since it insulates you from having to deal with the underlying JDBC connection
    (you could call the commit method of the JDBC


    connection associated with the Session).


    The Hibernate transaction API is a very simple wrapper to whatever the underlying
    transaction mechanism might be for the environment your code is operating under.
    In the simple example above, the Transaction object represents the underlying
    JDBC transaction, while the same code running on a JTA-enabled environment would
    use the container JTA user transaction available in the context of the method.
    The end result is that you have consistent code that works in all environments,
    allowing you to test your POJOs outside of a container.


    Listing 4-6 shows the complete listing for the example.


    **Listing 4-6.** *Simple Hibernate Test for Saving an Address* public static void
    main(String[] args) {


    Configuration config = new Configuration().


    setProperty("hibernate.dialect", "org.hibernate.dialect.MySQLDialect").


    setProperty("hibernate.connection.driver_class", "com.mysql.jdbc.Driver").


    setProperty("hibernate.connection.url", "jdbc:mysql://localhost/test").


    setProperty("hibernate.connection.username", "root").


    setProperty("hibernate.connection.password", "valencia").


    setProperty("hibernate.show_sql", "true"); config.addClass(Address.class);


    SessionFactory factory = config.buildSessionFactory();


    Address address = new Address();


    address.setStreetAddress("1835 73rd Ave NE");


    address.setCity("Medina");


    address.setState("WA");


    address.setZipCode("98039");


