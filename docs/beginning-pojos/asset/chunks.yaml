- fmt: "# Hibernate ORM 核心概念与操作\n\n## `saveOrUpdate` 方法的行为\n\n对于`saveOrUpdate`方法，如果设置了主键，则操作会变为：若对象存在则执行\
    \ SQL `UPDATE`，若不存在则执行 SQL `INSERT`。而对于`persist`、`save`和`update`方法，其语义是明确界定的：调用`persist`或`save`始终会执行\
    \ SQL `INSERT`，而调用`update`则会执行 SQL `UPDATE`。\n\n## Hibernate 的透明写入机制\n\n关于 Hibernate\
    \ 运作的另一个重要信息是：Hibernate 以透明写入（write-behind）方式与数据库交互。这意味着，当`persist`方法执行时，你可能不会立即看到针对数据库执行的\
    \ SQL 语句，而是可能在稍后的某个时间点看到。这是 ORM 工具常用的一种技术，用于在数据库交互过程中实现运行时优化。例如，代码中的操作可能会产生多个连续的相同\
    \ SQL `UPDATE` 语句，ORM 工具可以将它们合并为单个 SQL `UPDATE`。\n\n在 Hibernate 中，**Session**与数据库同步的时刻被称为**刷新（flushing）**。Hibernate\
    \ 的`Session`类还提供了一个显式的`flush`方法供你调用。通常你不需要手动刷新`Session`，但在复杂场景下，它可能对调试有用。\n\n\
    ## 资源管理与事务处理\n\n最后，请注意在清单 4-5 中，我们将保存`Address`对象的代码块包裹在`try-catch-finally`结构中。在`finally`子句中，我们确保调用了`Session`的`close`方法。这确保了任何资源（如数据库连接）都能被释放。\n\
    \n在`catch`子句中，如果发生异常，Hibernate 事务会被回滚，以确保操作的完整性。请注意，Hibernate 事务的使用并非强制要求，但建议始终使用它，因为它使你无需处理底层的\
    \ JDBC 连接（你可以调用与`Session`关联的 JDBC 连接的`commit`方法）。\n\nHibernate 事务 API 是一个非常简单的包装器，它封装了代码运行环境中的底层事务机制。在上述简单示例中，`Transaction`对象代表底层的\
    \ JDBC 事务；而在支持 JTA 的环境中运行相同的代码时，它会使用方法上下文中的容器 JTA 用户事务。最终结果是，你拥有在所有环境中都能工作的一致代码，从而允许你在容器外部测试你的\
    \ POJO。\n\n## 完整示例：保存 Address 对象\n\n清单 4-6 展示了该示例的完整代码。\n\n**清单 4-6.** *用于保存 Address\
