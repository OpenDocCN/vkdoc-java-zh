    第 4 章 ■ 使用 Hibernate 进行对象关系映射


    **案例研究：映射 TechConf 领域模型**


    现在你已经了解了如何将一个简单的 POJO 映射到数据库表，并以面向对象的方式与数据进行交互，接下来我们将继续开发示例应用程序。在实际应用中，不仅会有大量简单的映射，还会涉及许多更复杂的情况，需要用到更高级的
    ORM 概念。在本节中，我们将着手开发 TechConf 应用程序用于检索和存储数据的方法。在逐步完善每个方法的过程中，我们将审视所涉及的 POJO、HBM
    映射文件，以及相关的表及其列。


    我们在本节中编写的大部分持久化代码最终将用于 TechConf 应用程序的 DAO 层。在构建 TechConf 应用程序的业务层时，我们将非常详细地介绍这一重要模式。


    **会议主页**


    TechConf 系统的入口将是一个页面，公众可以在该页面上查看可用会议的列表。图 4-13 展示了一个类图，其中包含了 Conference 类及其相关关联。


    **图 4-13.** *Conference 类及其关联*

    从图 4-13 可以看出，一个会议可以有一个或多个轨道（例如，一个 Java 会议可以有 JSE、JEE 和 JME 轨道）以及一个场地。清单 4-14 展示了创建
    CONFERENCE、VENUE 和 TRACK 表所需的 SQL 语句。


