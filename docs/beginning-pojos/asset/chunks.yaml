- fmt: 'environments and production systems. Most build tools have some sort of configuration
    or script that describes the build process in discrete, atomic steps.


    A typical build process also covers aspects of both the production and the development
    stages of an application. For example, in a database-driven application, individual
    developers might need to initialize a database with sample data needed for testing,
    while in a production environment such a step would not be required.


    Although integrated development environments (IDEs) have always provided a level
    of support for the building process, this support usually falls short of developers’
    needs and expectations. Most of these build solutions aren’t portable across environments;
    it’s hard enough to get one developer’s IDE project file to work on any environment
    except for its creator’s. Not only are these facilities IDE-independent, but they’re
    also very different from the work that an application assembler or deployer has
    to do for a production application. Common sense should tell you that the closer
    your development environment is to the production environment, the fewer problems
    you’ll have going into production. By having a build process that is consistent
    across development and production environments (and any other environments in
    between), you can eradicate many development maladies that come from using multiple
    IDEs, operating systems, and Java versions.


    As the build process is automated and becomes transparent to programmers, other
    issues such as testing and documentation generation find their way into the build
    process. Most developers find that they begin with a build system that evolves
    to accomplish more than simply “building.” From testing to document generation,
    a finely crafted build process eventually becomes a reflection of a team’s development
    process.


    In J2EE, a consistent build system brings together the roles of the application
    developer, assembler, and deployer. As part of the J2EE specification, Sun defined
    several roles in its definition of the J2EE platform. Newcomers to J2EE might
    quickly put themselves in one of these categories and disregard the details of
    the other roles. But the reality is that unless you have an understanding of every
    role’s responsibility, your understanding of the J2EE platform will not be complete.
    In particular, the roles of the application assembler and the application deployer
    are reflected in the build process, and unless your developers can duplicate what
    happens in production you’re likely to experience a painful transition from development
    into production.


    ## Introduction to Ant


    A project with a few files and very few dependencies makes the process of building
    almost not a process at all. By simply using the Java compiler and maybe the `JAR`
    command-line utility, you can build simple Java applications.


    Before Ant, developers typically started with a set of simple batch files or shell
    scripts as an initial step towards automation. But as the number of files, components,
    target platforms, and virtual machine (VM) versions increases so does the build
    time, the complexity of the build, and the likelihood that human errors will contribute
    to irreproducible and inconsistent builds.


    After a while, you end up realizing that maintaining a non-portable, platform-dependent
    homemade solution is cumbersome and error-prone.


    For the few teams in which developers actually agree on the choice of an IDE,
    the first choice is usually the build functionality provided by the IDE. Most
    IDEs provide wizards that build simple applications. These wizards cover only
    part of the equation, and they tie your team to the particular IDE.


    Besides the aforementioned problems, both approaches treat development and production
    environments as being conceptually separate. What’s needed is a low-level tool
    that can unify the build process across multiple IDEs, stages of development,
    platforms, and so on.


    For many years, UNIX programmers have had a way to build their applications via
    the `make` utility and all of its variants (GNU Make, `nmake`, and so on). Like
    `make`, Ant is at its core a build tool, but as the Ant website states, Ant “is
    kind of like Make, but without Make’s wrinkles” (http://ant.apache.org/).


    Ant’s simplicity has contributed to its rapid adoption and made it the de facto
    standard for building applications in the Java world. Ant, together with the Concurrent
    Versions System (CVS), has played an important role in fostering open source by
    providing a universal way for individuals to obtain, build, and contribute to
    the open source community. Ant has also become an indispensable tool for most
    Java developers, especially those developing J2EE applications.


    Ant has made life easier for Java developers worldwide. Although far from perfect,
    it has demonstrated that it can cover what a Java developer needs, from gaining
    control over the build process to cutting the umbilical cord from proprietary
    build systems.


    The most relevant reasons to choose Ant are as follows:


    - **Platform independence:** A typical corporate Java environment includes development
    teams that work on Wintel machines and deploy to UNIX machines for production.
    Ant, being a pure Java tool, makes it possible to have a consistent build process
    regardless of the platform, thereby making the development, staging, integration,
    and production environments closer to each other. Ant also has built-in capabilities
    that handle platform differences. Your Java code is portable; your build should
    be too!!

    - **Adoption:** Ant is everywhere! Yes, by itself this is a poor reason to favor
    a technology, but the strengths that ubiquity brings to the table are many, including
    hiring, training, and marketability of skills. Ant also has been integrated into
    many of the leading IDEs, thereby making it the one consistent factor between
    developers. This is partly due to the choice, for good and bad reasons, of XML
    as its language.

    - **Functionality and flexibility:** For the majority of Java projects, Ant is
    extensible and highly configurable; it provides the required functionality right
    out of the box. For Java developers, any class can easily become an Ant task,
    although in our experience we seldom have to write our own tasks (because someone
    in the open source community always seems to beat you to the punch). If desired,
    you can plug scripting engines and run platform-specific commands.

    - **Syntax:** Like it or not, XML has become a globally recognized data format.
    Most Java developers have worked with XML, and J2EE developers deal with XML on
    a daily basis. XML makes Ant buzzword-compliant. But XML also has some advantages.
    XML is ideal for representing structured data because of its hierarchical nature.
    The abundance of commercial and open source parsers, and the ability to easily
    check an XML file for being well-formed and valid has made the use of XML pervasive
    in the industry.


    Ant’s architecture is similar to the `make` utility in that it’s based on the
    concept of a target. In Ant a target is a modular unit of execution that uses
    tasks to accomplish its work. An Ant target has dependencies and can be conditionally
    executed. A build is usually composed of some main targets that will accomplish
    some coarse-grained process related to an application’s build, such as compiling
    the code or packaging a component. These main targets might make use of other
    subtargets (usually via dependencies) to accomplish their job.'
