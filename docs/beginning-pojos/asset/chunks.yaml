- fmt: '# Modeling Best Practices


    Model-driven development is a practice that takes time to master, but the results
    are well worth the effort. I’ve compiled a list of best practices taken from the
    literature and from my experiences to help you get started.


    - Keep models simple. Don’t overmodel.

    - Use color in your models. Color greatly enhances your ability to quickly grasp
    both the static and dynamic elements of a model.

    - Choose model element names carefully. A model name can greatly influence the
    person who has to turn it into code.

    - Avoid design or implementation-specific constructs in the analysis model.

    - Keep models and source code synchronized. Incremental changes are easier to
    incorporate.

    - In modeling, no single view is sufficient. Approach a complex system with a
    small set of independent views.

    - The best models are connected to reality, and reality is all about trade-offs.
    Flexibility and performance are sometimes at odds when modeling a system.

    - There will be a point in a model’s life when the level of detail can be expressed
    only in code. Make sure that you don’t get stuck trying to graphically model something
    that can be easily coded. UML notes are a great way to address some of these issues
    at the model level.


    # The Open Source Tools


    The choice of tools used to build the TechConf project comes from my experience
    building Java EE applications and the collective knowledge of many colleagues,
    readers, speakers, and authors in the Java community. The choices presented here
    are not a one-size-fits-all collection of projects (although some are a must for
    most Java applications, like `Ant`) but they are what I have found to cover the
    current requirements and inject a level of agility that I haven’t been able to
    achieve with a purely commercial solution. I’m not advocating that you take a
    one-sided approach and try to build everything solely on open source. In most
    of my professional engagements my clients have already settled on a commercial
    solution but are looking to open source to complement their commercial purchase.
    In general I find that the mix of open source projects I used in each assignment
    is built around:


    - Filling a gap in a commercial solution

    - Standardizing on a known, proven approach

    - Avoiding vendor lock-in

    - Improving the productivity of a team

    - Easing the maintenance of the product


    Figure 1-6 shows a map of the projects and tools used to build TechConf and how
    they relate to each other and to the different tiers and functional concerns of
    the application.


    **Figure 1-6.** *Some of the open source tools used in TechConf*


    # Useful Open Source Resources


    There are many sites on the Internet dedicated to managing open source projects
    and providing news concerning open source.


    - `apache.org`:

    - `jakarta.apache.org`: The Jakarta project (`jakarta.apache.org`) is a collection
    of Java projects referred to as subprojects. Many of the subprojects are frameworks
    that can be incorporated into applications. For example, regular expressions are
    covered by the Jakarta Commons project. Other subprojects are intended for web
    development, and some are development tools. As projects mature and become mainstream,
    they might be promoted to top-level projects such as `Ant`, which is at `ant.apache.org`.

    - `xml.apache.org`: The XML projects are a collection of subprojects for creating,
    parsing, and transforming XML documents.

    - `sourceforge.net`: SourceForge.net is the world’s largest repository of open
    source projects.'
