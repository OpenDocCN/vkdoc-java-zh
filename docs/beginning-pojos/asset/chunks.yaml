    for the Table-Per-Class-Hierarchy strategy, and it is left as an exercise for
    you.


    **Summary**


    In this chapter you have learned the foundations of object-relational mapping
    using Hibernate, the prevalent and by far richest mapping service available. Now
    that you know how to map simple classes and collections and how to deal with inheritance,
    you’ll be ready to tackle the development of the TechConf application Data Access
    Objects (DAO) in subsequent chapters.


    We will continue to learn about Hibernate features, including more advanced features
    such as caching and other facilities that will come into play when we transition
    into the world of J2EE by having our Hibernate-mapped POJOs working inside an
    EJB container. Also, in the Testing chapter, you’ll learn how to apply some of
    the techniques of unit and integration testing to the testing of Hibernate-mapped
    POJOs and Hibernate-powered DAOs.


