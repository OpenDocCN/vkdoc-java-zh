    \ Date());\nconference.setDescription(\"A Test Conference\");\nconference.setEndDate(new\
    \ Date());\nconference.setName(\"TestConf 2005\");\nconference.setStartDate(new\
    \ Date());\n\n// create some tracks\nTrack jseTrack = new Track();\njseTrack.setDescription(\"\
    Learn how to build powerful Java desktop applications\");\njseTrack.setSubtitle(\"\
    Java Standard Edition\");\njseTrack.setTitle(\"JSE\");\n\nTrack jeeTrack = new\
    \ Track();\njeeTrack.setDescription(\"Learn how to build powerful Enterprise applications\"\
    );\njeeTrack.setSubtitle(\"Java Enterprise Edition\");\njeeTrack.setTitle(\"JEE\"\
    );\n\nTrack jmeTrack = new Track();\njmeTrack.setTitle(\"JME\");\njmeTrack.setDescription(\"\
    Learn how to bring cellphone and PDAs alive with Java\");\njmeTrack.setSubtitle(\"\
    Java Micro Edition\");\n\n// add the tracks to the conference\nconference.addTrack(jseTrack);\n\
    conference.addTrack(jeeTrack);\nconference.addTrack(jmeTrack);\n\n// persist the\
    \ conference\nsession = factory.openSession();\ntx = session.beginTransaction();\n\
    session.persist(conference);\ntx.commit();\n} catch (Exception e) {\nif (tx !=\
    \ null) {\ntx.rollback();\n}\n} finally {\nsession.close();\n}\n```\n\nThe code\
    \ in Listing 4-22 will produce output similar to that shown here:\n```\nHibernate:\
    \ insert into conference (AbstractSubmissionStartDate, Name, Description, AbstractSubmissionEndDate,\
    \ EndDate, StartDate, FK_VENUE_ID) values (?, ?, ?, ?, ?, ?, ?)\nHibernate: insert\
    \ into track (TITLE, SUBTITLE, DESCRIPTION, FK_CONFERENCE_ID) values (?, ?, ?,\
    \ ?)\nHibernate: insert into track (TITLE, SUBTITLE, DESCRIPTION, FK_CONFERENCE_ID)\
    \ values (?, ?, ?, ?)\nHibernate: insert into track (TITLE, SUBTITLE, DESCRIPTION,\
    \ FK_CONFERENCE_ID) values (?, ?, ?, ?)\n```\n\nAs you can see from the sample\
    \ output, Hibernate produced four SQL INSERTS, one for the `Conference` object\
    \ and three for the `Track` objects. If you take a look back at the mapping shown\
    \ in Listing 4-17 you’ll notice that there is an attribute named `\"cascade\"\
    ` with a value of `\"all\"`. In Hibernate every association can have a cascading\
    \ style. The cascading style tells Hibernate how to treat associated objects in\
    \ the scope of persistence operations. For example, if you set the cascading style\
    \ to `\"save-update\"` in a one-to-many association, Hibernate will determine\
    \ if any of the associated objects are \"dirty\" and generate SQL UPDATES for\
    \ those objects, and similarly it will generate SQL INSERTS for new objects. The\
    \ values for the `cascade` attribute are `\"none\"`, `\"persist\"`, `\"merge\"\
    `, `\"delete\"`, `\"save-update\"`, `\"evict\"`, `\"replicate\"`, `\"lock\"`,\
    \ `\"refresh\"`, `\"delete-orphan\"`, and `\"all\"`. These values can be combined\
    \ in a comma-separated list and correspond closely to the operations available\
    \ on the `Session` class. Consult the Hibernate online reference for an in-depth\
    \ coverage of cascading behavior and transitive persistence.\n\nIf you inspect\
    \ the `CONFERENCE` and `TRACK` tables you should output results similar to that\
    \ shown next.\n\n```\nmysql> select PK_ID, NAME from CONFERENCE;\n+-------+---------------+\n\
    | PK_ID | NAME          |\n+-------+---------------+\n|     1 | TestConf 2005\
    \ |\n+-------+---------------+\n1 row in set (0.00 sec)\n\nmysql> select PK_ID,\
    \ TITLE, SUBTITLE from TRACK;\n+-------+-------+-------------------------+\n|\
    \ PK_ID | TITLE | SUBTITLE                |\n+-------+-------+-------------------------+\n\
    |     1 | JSE   | Java Standard Edition   |\n|     2 | JEE   | Java Enterprise\
    \ Edition |\n|     3 | JME   | Java Micro Edition      |\n+-------+-------+-------------------------+\n\
    3 rows in set (0.00 sec)\n```\n\n## Many-to-One: Conferences and Venues\n\nIn\
    \ the previous example we had a relationship where one or more tracks belonged\
    \ to a conference, which is an owner parent-child relationship since we don’t\
    \ want the tracks to exist without an owning conference. In the case of a conference\
    \ and a venue, we have an association where a venue can exist in the database\
    \ without an associated conference and the same applies to a conference (since\
    \ a site admin might create all the conference content in advance before choosing\
    \ a suitable venue), and obviously many conferences can share the same venue (most\
    \ likely not at the same time).\n\nTo satisfy this relationship we can use a many-to-one\
    \ mapping in `conference.hbm.xml` as shown in Listing 4-23.\n\n**Listing 4-23.**\
    \ *Many-to-One Mapping Between Conference and Venue*\n\n```xml\n<many-to-one\n\
    \    class=\"Venue\"\n    name=\"Venue\"\n    not-null=\"true\"\n    cascade=\"\
    persist,save-update\"\n>\n    <column name=\"FK_VENUE_ID\" />\n</many-to-one>\n\
    ```\n\nSince we don’t want venues to be deleted when a conference is deleted,\
    \ but we do want the venue information to be updated or inserted in the database\
    \ when we update or create a conference, we set the `cascade` attribute to `\"\
    persist,save-update\"`. Therefore on any calls to `persist`, `save` or `update`\
    \ against a `Conference` object, Hibernate will determine whether the associated\
    \ `Venue` object needs to be saved or updated.\n\n## Inheritance\n\nOf all of\
    \ the differences between a database schema and an object graph, inheritance brings\
    \ the most interesting challenges. The problem boils down to mapping \"is a\"\
    \ relationships while retaining the power of the object-oriented language (polymorphism)\
    \ and having the data stored in an efficient way that can be used not only by\
    \ your object-oriented application but also by other (possibly procedural) applications\
    \ (such as reports or ad-hoc queries). Hibernate supports three different approaches\
    \ to mapping an inheritance hierarchy, which are outlined next.\n\n### Table-Per-Concrete-Class\n\
    \nIn the Table-Per-Concrete-Class strategy you have a table per each class in\
    \ the system. In this strategy, each class is mapped to a table that includes\
    \ both the attributes of the implemented class as well as the attributes inherited\
    \ from the parent class. This strategy basically discards polymorphism (polymorphic\
    \ queries require you to query over all child classes), but it is very efficient\
    \ in terms of storage space and record insertion (one SQL statement).\n\n### Table-Per-Class-Hierarchy\n\
    \nIn the Table-Per-Class-Hierarchy strategy a single table is used to store all\
    \ of the objects belonging to the class hierarchy. It uses a \"type discriminator\"\
    \ column that specifies which specific subclass a row maps to. This strategy makes\
    \ regular and polymorphic queries very simple and performant. The few drawbacks\
    \ include maintenance, since each class you add to the inheritance hierarchy requires\
    \ modifications to the table, and the requirement that all subclass columns be\
    \ declared as nullable in the schema.\n\n### Table-Per-Subclass\n\nIn the Table-Per-Subclass\
    \ strategy each subclass, interface, and abstract class have their own table containing\
    \ only the properties for that particular class. In the tables, all associations\
