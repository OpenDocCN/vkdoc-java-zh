    ## CHAPTER 5 ■ BUSINESS SERVICES WITH JBOSS


    **153**


    The runtime management of the JBoss server is currently performed via the JBoss
    JMX Management Console shown in Figure 5-6.


    **Figure 5-6.** *JBoss JMX Management Console*


    The JBoss services are exposed as MBeans, which you can inspect with the console.
    The console provides a listing of all JBoss services (JMX agent view). From this
    list of services you can drill down to an individual view of the service to the
    MBean view in order to perform an operation on a particular MBean.


    For example, to view the contents of the JNDI tree, select the `service=JNDIView`
    hyperlink under the "jboss" heading, which will take you to the MBean view for
    the JNDIView service.


    MBean operations are exposed in the raw in the JBoss console as method signatures
    that you can click to execute. On this page you''ll see a list of MBean operations;
    select the `list()` operation. The `list()` operation will give you a listing
    of the items in the JNDI tree. Notice that you''re able to select the value of
    the Boolean parameter. If you wonder about the meaning of the parameter, check
    the Javadoc documentation for the `org.jboss.naming.JNDIView` class and you''ll
    find that the parameter is a verbose flag.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


