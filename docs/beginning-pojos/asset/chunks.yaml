    第 6 章 ■ SPRING 框架


    **面向切面编程**


    Spring 框架提供的另一个功能，也是 Spring 自身构建其大量内部功能的基础，就是其 AOP 栈。尽管 Spring 没有提供完整的语言级 AOP
    实现，但它提供了必要的 AOP 特性来处理企业应用中遇到的常见问题。


    正如你将在第 10 章深入学习的那样，AOP 提供了以声明方式处理应用程序横切关注点的能力。切面是应用程序所需的行为或功能，但它们不一定属于业务应用程序代码。通过定义切入点（在哪里应用切面），AOP
    技术提供了一种干净的方式来处理常见服务，例如日志记录、持久化、事务以及任何其他会污染应用程序代码的非功能性切面。


    Spring AOP 的设计考虑到了在 Java EE 环境中的可用性。Spring 提供了一个基于动态代理的粗粒度 AOP 实现，该实现使用运行时生成的代理来添加关注点。遵循
    Spring 的主流主题，任何 Spring bean 都可以以声明方式进行增强。Spring 本身使用多个预定义的切面来处理事务、安全性、跟踪、日志记录、争用管理以及与
    EJB 和 JMS 等技术的集成。因此，如果你今天正在使用 Spring，那么你已经在（也许在不知不觉中）使用 AOP 了。在第 10 章中，我们将探讨 AOP
    技术，因为它们适用于 TechConf 应用程序的开发。


    **功能完备的应用程序框架**


    Spring 框架不仅仅是一个轻量级的 IoC/AOP 容器。Spring 是一个非常非侵入性的框架，它允许你按需使用，但不会过度使用。通过提供基于开源领域最佳成果构建的全面且一致的功能集，它提供了一个完整、功能丰富的应用程序框架，专注于解决常见的
    Java EE 问题。


    Spring 提供了抽象，以简单的方式处理诸如事务管理、对象关系映射、与 MVC 框架集成等关注点。对常见服务的抽象使得 Spring 应用程序可以完全跨应用服务器或
    Web 容器移植，并提供了一种一致的方式来处理资源管理和异常处理。图 6-2 展示了 Spring 框架的范围以及它在统一框架下无缝集成的众多工具和项目。


    **图 6-2.** *Spring 框架概览*


