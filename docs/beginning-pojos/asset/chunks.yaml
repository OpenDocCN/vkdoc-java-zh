    为满足技术会议的信息管理需求，需要一套软件系统来提供交互式信息渠道，以管理不同利益相关方的需求。业务驱动因素要求创建该系统，作为面向技术会议的组织、执行和维护而定制的新产品线的基础。这些产品将以组件或子系统的集合形式销售，可根据客户的特定需求进行适配。


    角色与功能的划分必须清晰，以便系统能够轻松定制和增强。系统需要考虑到参会者和演讲者地理位置分散这一事实。用户应无需（或尽可能少地）安装或配置任何软件。


