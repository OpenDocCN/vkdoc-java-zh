    @Resource(name = "java:/dynadto/BuilderFactory") protected BuilderFactory builderFactory;


    // DAOs


    @EJB protected ZipcodeDAO zipcodeDAO;


    // DynaDTO Builders


    protected Builder locationBuilder;


    @PostConstruct


    public void initialization() {


    locationBuilder = builderFactory.getBuilder(Location.class);


    }


    @SuppressWarnings("unchecked")


    public List<Location> searchLocations(String zipCode) {


    List<Zipcode> entities = zipcodeDAO.find(zipCode);


    return locationBuilder.buildList(entities);


    }


    public Location getLocationByZipCode(String zipCode) {


    Integer id = Integer.parseInt(zipCode);


    Zipcode zip = zipcodeDAO.getById(id);


    Location location = null;


    if (zip != null) {


    location = (Location) locationBuilder.build(zip);


    }


    return location;


    }


    public void setZipcodeDAO(ZipcodeDAO zipcodeDAO) {


    this.zipcodeDAO = zipcodeDAO;


    }


    public void setBuilderFactory(BuilderFactory builderFactory) {


    this.builderFactory = builderFactory;


    }


    }

    ```


    Without a database present, we need to create a mock for the `ZipcodeDAO` collaborator.
    To create a proxy class that can be treated as the required DAO, we can use the
    following snippet of code:


    ```

    ZipcodeDAO mock = createMock(ZipcodeDAO.class);

    ```


    To make the `createMock` static method available to your test class, you need
    to use a static import (which allows unqualified access to static members) as
    shown next:


    ```

    import static org.easymock.EasyMock.createMock;

    ```


    The created instance of `ZipcodeDAO` possesses no behavior. If we attempt to invoke
    any of the methods in the `ZipcodeDAO` interface, the mock will throw an exception.
    The power of the mock object comes in the way we can programmatically “record”
    expectations. The recording of expectations entails specifying the sequence of
    events and responses that the mock object will respond to in the context of the
    test at hand.'
