    **无状态会话 Bean**


    对于大多数 Java EE 应用程序而言，无状态会话 Bean（SLSB）已成为暴露中间层服务的标准方式。结合会话外观、数据传输对象（DTO）、命令模式和数据访问对象（DAO）的设计/实现模式，是定义应用程序功能的一种方式。


    在 EJB 规范的早期版本中，我们有太多可移动的部件，以至于开始项目变成了一项乏味的练习。幸运的是，在 EJB 3.0 中，选择了阻力最小的路径，要创建一个
    SLSB，我们只需拥有一个实现（至少一个）描述所提供服务的 POJI 的 POJO 即可。


    您可以简单地拥有一个业务接口 Business.java 和一个 Bean 实现 BusinessBean.java。


    ■**注意** Bean 类可以实现也可以不实现业务接口，尽管我建议您使用接口来定义应用程序层和组件之间的契约。如果您选择不实现任何业务接口，则会使用所有公共方法动态生成一个业务接口。


    如果只有某些方法应该在业务接口中暴露，则所有这些方法都可以用 @BusinessMethod 注解标记。


    一旦我们有了这个契约，我们需要做的就是使用 EJB3 注解 @Stateless 来注解 POJO 类。这将把此类标记为 SLSB，以便在部署时，JBoss
    EJB3 容器可以为我们的简单类提供所有企业服务。但是，为了保持我们的接口不包含任何特定于 EJB 的注解，我们可以继承业务接口，以提供特定的接口作为远程和本地接口。为此，我们可以创建两个接口，分别命名为
    BusinessRemote.java 和 BusinessLocal.java，并用 @javax.ejb.Remote 和 @javax.ejb.Local
    分别注解它们。

