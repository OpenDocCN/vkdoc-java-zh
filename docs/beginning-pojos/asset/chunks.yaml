    **使用 Spring 实现 DAO 模式**


    正如我们在第 5 章中学到的，我们可以通过将 Hibernate `SessionFactory` 注入到 DAO 中，并使用 `SessionFactory`
    的 `openSession` 方法创建会话，并在 DAO 的生命周期内重用该会话，从而轻松创建 DAO 实现，这样就避免了“每次操作新建会话”的反模式。


    Spring 提供了 `HibernateTemplate` 工具类，用于在当前线程的上下文中管理 Hibernate `Session` 实例（类似于 `SessionFactory`
    的 `getCurrentSession` 方法在 JTA 环境中所做的），并将粒度较细的 Hibernate 异常层次结构转换为更易于管理（从应用程序的角度来看）的
    Spring DAO 异常层次结构。


    `HibernateTemplate` 实现了 Hibernate `Session` 接口，包装了线程绑定的 Hibernate `Session`，或在必要时创建一个新的。Spring
    的 `HibernateTemplate` 是 IoC 的一个应用，用于简化与 Hibernate 的交互。使用 Spring 模板对象将减少 DAO 中所需的代码量（特别是与使用
    Hibernate 2.X 的典型 DAO 实现相比），因为它消除了关闭会话和捕获（通常是致命的）数据访问异常的需要。


