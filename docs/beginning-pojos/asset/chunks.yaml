    \ see, for a simple buildfile the XML format makes it easier to discern targets\
    \ from one another.\n\n## Project\n\nThe `project` element can have three attributes:\
    \ `name`, `default`, and `basedir`. Only the `default` attribute is required,\
    \ but I recommend that you use the `name` attribute especially because many IDE\
    \ Ant editors use this attribute for display purposes. The `name` attribute comes\
    \ in handy when dealing with more than one buildfile.\n\n**Best Practice** For\
    \ a project with a single buildfile (`build.xml`) I recommend that you use the\
    \ name of the project for the `name` attribute of the `project` element. For projects\
    \ with multiple buildfiles I recommend that you name each one according to its\
    \ intended functionality and that the `name` attribute should be the same as the\
    \ filename without the `.xml` extension.\n\nThe `default` attribute determines\
    \ the default target to be executed for the buildfile. Finally, the `basedir`\
    \ attribute determines the base directory for all file-related operations during\
    \ the course of a build. In the previous example it’s simply the current directory\
    \ where the buildfile resides, and since this is the default value, the attribute\
    \ could have been omitted. This setting is important especially if you’re using\
    \ multiple buildfiles in different subdirectories of an application directory\
    \ structure and you want a uniform way to refer to paths across all buildfiles.\n\
    \n**Best Practice** Make the `basedir` directory the root directory of your project.\
    \ This is a common convention, and it will make your buildfiles easy to understand.\n\
