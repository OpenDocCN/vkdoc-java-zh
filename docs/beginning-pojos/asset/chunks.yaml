    在本章中，您已经了解了拥有一个稳固构建系统的重要性以及 Ant 构建工具的基础知识。我们通过使用多个开源 Ant 任务，精心打造了一个可复用的 Ant 构建脚本，用于自动化
    TechConf 系统的构建过程。最终的基础构建脚本反映了我构建众多 Java 和 J2EE 应用程序的经验。您可以将本系统中使用的大部分思路应用于您现有和未来的项目。在本书的后续章节中，我们将继续增强此构建脚本，以创建构成示例应用程序的
    J2EE 组件和工件。


    当我们把本章学到的构建模块与单元测试（第 8 章）和持续集成（第 9 章）的强大功能结合起来时，一个精心设计的构建脚本的强大之处将变得更加明显。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm 第 86 页 2006 年 2 月 22 日，星期三，上午 6:05


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm 第 87 页 2006 年 2 月 22 日，星期三，下午 2:16


    第 4 章


    ■ ■ ■


    使用 Hibernate 进行对象关系映射


    **作**为一名 Java 开发者，您很可能会发现自己需要从关系数据库中检索数据，并且希望找到将数据在您的对象和组件之间进行转换的方法。问题在于如何解决将对象状态存储到关系数据库管理系统（RDBMS）中这一难题。


    与大多数使用关系数据库存储对象的软件开发者一样，我发现这个过程似乎非常耗时。关于这个过程，我现在有了一些清晰的认识，并且在每个新项目中，我都发现我们如何将数据库连接到面向对象的应用程序，取决于以下几个因素：


    • 数据库模式与对象模型的关联程度

    • 模式是否先于应用程序存在

    • 模式是否是包含自然键和复合主键的遗留模式

    • 模式的规范化程度

    • 模式对对象模型和用户界面设计的影响程度（反之亦然）


    面向对象的设计和开发完全关乎权衡。纯粹的面向对象观点可能会认为，领域模型的设计不应受到“实现”细节的影响，例如模型中对象在不在内存中时其状态存储在哪里。而另一方面，关系数据建模者可能会认为，数据很可能比应用程序更长寿，数据库模式的设计应只专注于高效地存储和访问数据。


    我的观点（以及大多数同事的观点）是，这种笼统的说法是片面的，只会导致后续问题。


    在现实世界的应用程序中，考虑到我们如今面临的时间线，敏捷性至关重要。在大多数企业环境中，您可以控制对象模型，最多能对数据库模式的设计产生影响。我发现，在对象建模者和数据建模者合作最紧密的地方，将对象映射到数据库的过程会更容易。让双方共同参与设计对象模型和数据模型，将会带来折衷方案，从而产生既能很好地反映问题领域，又能确保数据完整性、可重用性和高效利用的应用程序。


    **87**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm 第 88 页 2006 年 2 月 22 日，星期三，下午 2:16


    **88**


    第 4 章 ■ 使用 Hibernate 进行对象关系映射


    我以上所有的评论都基于这样一个概念：拥有一个代表应用程序所针对问题领域的领域模型。但领域建模只是解决问题的一种方法。我们日常使用的许多典型互联网应用程序更具数据驱动、关系/过程化的特点，更适合以利用这些特性的方式构建，即使用一种能够利用关系模型的语言。是的，您猜对了，就是
    SQL。对于与数据库进行非常简单的 CRUD（创建、读取、更新和删除）交互且性能是首要任务的应用程序，纯 SQL 可能仍然是正确的选择。


    话虽如此，预见应用程序的演变以确定您应该从一开始就使用对象关系映射（ORM）工具、纯 SQL，还是在单个应用程序中混合使用这两种方法，这一点非常重要。


    **对象关系映射**


    对象关系映射（ORM）是用于弥合对象与关系数据库之间鸿沟的技术、工具和方法的统称。ORM 工具允许您以声明方式将数据对象映射到关系数据库中的数据和关系，使程序员能够以
    Java 对象的形式处理来自关系数据库的信息。这类工具会生成与数据库交互所需的所有 SQL 代码。开发人员在对象层面工作，查询和事务的概念应用于对象而非数据库对象。尽管它们同属一个范畴，但这些工具在工作方式上可能存在巨大差异，从“透明”程度，到是通过生成代码、修改字节码还是使用运行时检查来工作。


    在行业中，应用于 ORM 工具的透明性概念仍然非常模糊。持久性透明性或正交性意味着对象被处理时没有任何隐含的持久性概念。大多数现有工具并非真正透明，但它们通过将对象的持久性隔离在非常简单的面向对象构造之后，提供了良好的关注点分离。例如，在
    Hibernate 中，透明性意味着被映射的普通 Java 对象（POJO）并不知道自己是持久化对象。


    同样值得考虑的是，如何将特定工具的工作方式与您的其余开发流程相融合。使用某些工具，您从对象模型开始，然后推导出关系持久化模型；使用其他工具，您从关系模型开始，然后推导出对象模型。大多数情况下，您会发现您同时拥有现有的对象模型和关系模型，在这种情况下，大多数工具都达不到预期，大部分映射工作都是手动的。有时，无法避免在对象模型和数据库模式之间进行权衡的情况。重要的是，两个模型应协同开发。ORM
    工具可以帮助这种协作工作，但发挥更大作用的是人的因素。


    与大多数难题一样，对象持久化完全关乎权衡。Java 持久化的主题是关于选择的，就像 Java 中的许多事情一样。没有一种工具适用于所有持久化场景。有些工具为了性能而牺牲透明性，或者为了功能而牺牲简单性。在选择（或创建）对象关系工具时出现的一些问题包括：


