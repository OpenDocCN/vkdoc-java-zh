    最后，为了插入单个页面的内容，我们使用 `RenderBody` 组件，它会渲染所使用的任何组件或页面的主体。`RenderBody` 组件通常用于我们希望通过
    `ConferenceBorder` 组件提供的模板类型。在你的组件模板中，应该恰好有一个 `RenderBody` 组件。


    **组件规范**


    与页面使用的页面规范 XML 文件（`.page`）类似，每个组件都有一个组件规范 XML 文件（`.jwc`）。组件规范定义了组件的 Java 类、组件接受的参数，以及组件使用的任何其他协作者，例如其他组件、状态持有对象或
    HiveMind 服务。


    图 7-18 展示了组件规范 XML 文件的结构。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00108.png)


    Sam-Bodden_596-3 C07.fm 第 273 页 2006 年 2 月 23 日，星期四，下午 4:22


