    Hibernate Session 体现了持久化服务（或持久化管理器）的概念，可用于对 Hibernate 映射的类实例执行查询、插入、更新和删除操作。在
    ORM 工具中，你使用面向对象的语义来执行所有这些交互；也就是说，你不再引用表和列，而是使用 Java 类和对象属性。顾名思义，Session 是一个短生命周期的轻量级对象，在应用程序与数据库之间的会话中充当桥梁。Session
    封装了底层的 JDBC 连接或 J2EE 数据源，并作为绑定到它的持久化对象的一级缓存。


    Session 工厂


    Hibernate 要求你提供连接应用程序所使用的每个数据库所需的信息，以及哪些类映射到给定数据库。


    每个特定于数据库的配置文件，连同相关的类映射，都由 SessionFactory 编译和缓存，SessionFactory 用于获取 Hibernate Session。


    SessionFactory 是一个重量级对象，理想情况下应只创建一次（因为这是一个昂贵且缓慢的操作），并使其可用于需要执行持久化操作的应用程序代码。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00026.png)


    Sam-Bodden_596-3 C04.fm Page 93 Wednesday, February 22, 2006 2:16 PM


    第 4 章 ■ 使用 Hibernate 进行对象关系映射


    **93**


    每个 SessionFactory 通过使用提供的 Hibernate 方言之一，配置为与特定的数据库平台协同工作。如果你正在构建应用程序原型，你可能会从一种易于在自己的机器上安装和运行的数据库系统开始。就我而言，这通常是
    MySQL、PostgreSQL 或纯嵌入式开源 Java 数据库（如 HSQLDB）的某个变种。我们大多数人最终都必须将模式迁移到“企业级”关系数据库管理系统，例如
    Oracle、Sybase 或 DB2。凭借其可插拔的数据库架构，Hibernate 可以使应用程序在数据库之间移植变得像更改 XML 文件中的几个参数一样简单。当涉及到使用特定于数据库的功能（如原生主键生成方案或
    Session 锁定）时，Hibernate 方言的选择非常重要。在撰写本文时，Hibernate（版本 3.1）支持 22 种数据库方言。每种方言的实现都在
    `org.hibernate.dialect` 包中。图 4-3 显示了可用的方言。


    **图 4-3.** *Hibernate 方言*


    Hibernate 对象映射


    Hibernate 通过 XML 配置文件指定如何检索和存储每个对象状态到数据库中。Hibernate 映射在启动时加载并缓存在 SessionFactory
    中。


    每个映射都指定了与映射类实例的持久化生命周期相关的各种参数，例如：


    *   主键映射和生成方案

    *   对象字段到表列的映射

    *   关联/集合

    *   缓存设置

    *   自定义 SQL、存储过程调用、过滤器、参数化查询等


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 94 Wednesday, February 22, 2006 2:16 PM


    **94**


    第 4 章 ■ 使用 Hibernate 进行对象关系映射


    持久化生命周期


    我希望在我早期使用 Hibernate 的工作中能更早获得的一条信息是理解对象在 Hibernate 上下文中的生命周期。一个 Hibernate 映射对象存在三种可能的状态。在处理更复杂的
    Hibernate 问题时，理解这些状态以及导致状态转换的操作将变得非常重要。图 4-4 展示了 Hibernate Session 提供的不同方法如何使映射对象在状态之间转换。


    **图 4-4.** *持久化生命周期*


    在瞬时状态下，对象不与数据库表关联。也就是说，其状态尚未保存到表中，并且该对象没有关联的数据库标识（未分配主键）。瞬时状态的对象是非事务性的，这意味着它们不参与绑定到
    Hibernate Session 的任何事务的范围。成功调用 `save` 或 `saveOrUpdate` 方法后，对象不再处于瞬时状态，而变为持久状态。Session
    的 `delete` 方法（或删除查询）会产生相反的效果，使持久化对象变为瞬时状态。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 95 Wednesday, February 22, 2006 2:16 PM


    第 4 章 ■ 使用 Hibernate 进行对象关系映射


    **95**


    持久化对象是具有数据库标识的对象。（如果它们已被分配了主键但尚未保存到数据库，则称它们处于“新建”状态）。持久化对象是事务性的，这意味着它们参与与 Session
    关联的事务（在事务结束时，对象状态将与数据库同步）。


    不再位于 Session 缓存中（与 **Session** 关联）的持久化对象成为游离对象。这发生在事务完成之后，当 Session 被关闭、清除，或者对象被显式地从
    Session 缓存中逐出时。鉴于 Hibernate 在向对象提供持久化服务方面的透明性，处于游离状态的对象可以有效地成为跨层传输对象，并且在某些应用程序架构中，可以替代对
    DTO（数据传输对象）的需求。有关此模式的完整讨论，请参阅第 5 章。


    **流程**


    那么，如何开始使用 Hibernate 呢？除了明显需要获取 Hibernate 并将其配置为与你的环境协同工作之外，你还需要为将要存储在数据库中的每个类创建映射。除了手动创建
    POJO、数据库模式和 HBM（Hibernate 映射）文件之外，还有三种方法可以创建完整的 ORM 领域模型。


    **POJO 驱动方法**


    在 POJO 驱动方法中，你从对象/领域模型开始，并使用 JSR-220 注解或 Javadoc 元数据注释来定义类中的每个字段如何映射到数据库列。在运行时，Hibernate
    使用注解动态创建映射。然后，利用 Hibernate 的 `hbm2ddl` 自动特性，你可以在运行时生成数据库模式。对于 JSE 1.5 之前的应用程序，你将使用代码/元数据生成器（如
    XDoclet）来生成 HBM 文件，然后将 HBM 文件提供给诸如 Hibernate 自己的 `hbm2ddl` 之类的工具，为你选择的关系数据库生成模式。这种方法对于尚未设计或创建数据模型的新应用程序非常有效。


    图 4-5 说明了 POJO 驱动方法。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 96 Wednesday, February 22, 2006 2:16 PM


    **96**


    第 4 章 ■ 使用 Hibernate 进行对象关系映射


    **图 4-5.** *POJO 驱动方法*


    **数据模型驱动方法**


    在模型驱动方法中，你从所选数据库系统的数据库模式开始，并使用像 Middlegen 或 Hibernate Synchronizer 这样的工具，为每个被映射的表生成映射和
    POJO。这种方法为开发提供了快速的启动时间，但可能会使你得到一个 Martin Fowler 所说的贫血领域模型，其中缺乏你在领域模型中期望找到的丰富语义。

