- fmt: "注册页面的 HTML 模板如清单 7-30 所示。与其他会议页面一样，它使用了之前创建的 `ConferenceBorder` 组件。在模板的最顶部，我们放置了一个上一节创建的\
    \ `ErrorDisplay` 组件实例。\n\n**清单 7-30.** 注册页面 HTML 模板\n\n```html\n<html jwcid=\"\
    @ConferenceBorder\" title=\"Register\">\n  <span jwcid=\"@ErrorDisplay\" delegate=\"\
    bean:delegate\"/>\n  <form jwcid=\"@tacos:AjaxForm\"\n        delegate=\"bean:delegate\"\
    \n        listener=\"ognl:listeners.add\">\n    ...\n  </form>\n</html>\n```\n\
    \n在之前的提交用户信息的示例中，我们使用了 Tapestry 的 `Form` 组件。Tacos 提供了自己的表单组件，名为 `AjaxForm`，它支持\
    \ AJAX 和 DHTML 效果。`AjaxForm` 继承自 Tapestry 的 `Form`，因此它们的使用方式几乎相同。`delegate` 属性指向负责表单验证的对象。该委托是一个实现了\
    \ `IValidationDelegate` 接口的类。\n\n验证委托会跟踪用户输入，并负责装饰表单字段和字段标签。`listener` 属性决定了表单提交时将调用的监听器方法。\n\
    \n清单 7-31 展示了注册页面表单中的输入字段和字段标签示例。\n\n**清单 7-31.** 注册页面 HTML 模板\n\n```html\n<table\
    \ width=\"100%\" border=\"0\" summary=\"register\">\n  <tr>\n    <td><span jwcid=\"\
    firstNameLabel\"><label>First Name</label></span></td>\n    <td><span jwcid=\"\
    firstName\"><input type=\"text\" alt=\"First Name\" /></span></td>\n  </tr>\n\
