    **图 7-23.** *与会者注册页面 (register.html)* AJAX 特性


    我们希望在注册页面上实现的 AJAX 特性之一是使用自动补全效果，允许用户部分输入邮政编码，并在下拉菜单中显示匹配列表。一旦用户选择了邮政编码，与所选邮政编码对应的城市和州应显示在各自的字段中。


