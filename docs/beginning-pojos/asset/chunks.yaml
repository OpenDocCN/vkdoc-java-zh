- fmt: 'Before we test the first page of the TechConf Spring application, we need
    to configure the Web deployment descriptor `web.xml`. This `web.xml` descriptor
    will be a little more involved than the previous one created for a simple introductory
    example. As mentioned previously and outlined in Figure 6-5, the Spring application
    context for the TechConf application has been modularized into three separate
    XML files, one per application tier. Listing 6-33 shows the Web deployment descriptor
    for the TechConf application. The `contextConfigLocation` property is the location
    of the Spring beans application context files. By default, Spring loads the application
    context `techconf-servlet.xml`; therefore we only need to load the two remaining
    application contexts for the data and service tiers.


    **Listing 6-33.** *Web Deployment Descriptor for TechConf Spring Application*


    ```

    <?xml version="1.0" encoding="ISO-8859-1"?>


    <web-app


    xsi:schemaLocation="http://java.sun.com/xml/ns/j2ee web-app_2_4.xsd"


    version="2.4">


    <context-param>


    <param-name>contextConfigLocation</param-name>


    <param-value>


    /WEB-INF/techconf-service.xml,/WEB-INF/techconf-data.xml


    </param-value>


    </context-param>


    <context-param>


    <param-name>log4jConfigLocation</param-name>


    <param-value>/WEB-INF/log4j.properties</param-value>


    </context-param>


    <listener>


    <listener-class>


    org.springframework.web.util.Log4jConfigListener


    </listener-class>


    </listener>


    <listener>


    <listener-class>


    org.springframework.web.context.ContextLoaderListener


    </listener-class>


    </listener>


    <servlet>


    <servlet-name>techconf</servlet-name>


    <servlet-class>org.springframework.web.servlet.DispatcherServlet</servlet-class>


    <load-on-startup>1</load-on-startup>


    </servlet>


    <servlet-mapping>


    <servlet-name>techconf</servlet-name>


    <url-pattern>*.htm</url-pattern>


    </servlet-mapping>


    </web-app>

    ```


    In the Web deployment descriptor we are also configuring Log4J. The `log4jConfigLocation`
    is one of the parameters used to configure the `Log4jWebConfigurer`, which is
    a utility class that enables Log4J initialization in a Web container, keeping
    log files within the Web application (for expanded WAR deployments) and the ability
    to check for live changes to the logging configuration. For the TechConf application
    the configuration file `log4j.properties` is located under the `WEB-INF` directory
    (to use Log4J you’ll also need the Log4J JARs).


    ## Mapping URLs to Controllers


    Listing 6-34 shows the `urlMapping` bean in the Spring application context for
    the Web tier. To expose your application pages using a simple HTML extension,
    we map simple `.htm` files to our controllers.


    **Listing 6-34.** *URL Mappings in Application Context for the Web Tier*


    ```

    <bean id="urlMapping"


    class="org.springframework.web.servlet.handler.SimpleUrlHandlerMapping">


    <property name="mappings">


    <props>


    <prop key="/displayConference.htm">


    displayConferenceController


    </prop>


    <prop key="/listConferences.htm">listConferencesController</prop>


    ...


    </props>


    </property>


    ...


    </bean>

    ```


    After building and deploying the application you can access the first page by
    using the URL `http://localhost:8080/techconf-spring/listConferences.htm`. The
    output should resemble that shown in Figure 6-6.


    ![](images/00071.png)


    **Figure 6-6.** *The listConferences page of the Spring TechConf application*


    The resulting HTML for the `listConference` page is shown in Listing 6-35.


    **Listing 6-35.** *HTML Generated for the listConferences Page*


    ```

    <html>


