    </fileset>


    <fileset dir="${some-lib}">


    <include name="*.jar"/>


    </fileset>


    </path>


    <path id="all.source.path">


    <pathelement path="${src-java}"/>


    <pathelement path="${src-test}"/>


    </path>


    ...


    <target name="compile" description="Compiles all sources.">


    ...


    <javac


    destdir="${classes}"


    classpathref="class.path"


    debug="on"


    deprecation="on"


    optimize="off">


    <src>


    <path refid="all.source.path"/>


    </src>


    </javac>


    </target>


    `class.path` 路径结构使用了 `fileset` 数据类型的两个实例，将 `lib` 和 `struts-lib` 属性所引用的目录中包含的所有
    JAR 文件分组到一个公共类路径下。`pathelement` 是一个不可或缺的数据类型示例，它使你能够在构建中重用路径信息。`fileset` 数据类型是
    Ant 类路径结构的一个典型示例。它封装了一组通过嵌套的 `patternset` 结构定义的文件。


    例如，要创建一个包含 `${lib}` 目录下所有 JAR 文件的文件集，你可以使用以下 `fileset` 定义：


    <fileset dir="${lib}">


    <patternset>


    <include name="*.jar"/>


    </patternset>


    </fileset>


    `fileset` 数据类型包含一个隐式的 `patternset` 结构，这意味着你可以使用简写形式将 `fileset` 定义重写如下：


    <fileset dir="${lib}">


    <include name="*.jar"/>


    </fileset>


    我们还可以通过将 `include` 用作属性而不是嵌套元素来进一步压缩 `fileset` 定义：


    <fileset dir="${lib}" include="*.jar" />


