    测试


    **当**一个软件增长到超过几百行代码时，您如何知道它是否出了问题？您如何知道它是否按预期工作？您如何知道是否存在某种情况（可能是由用户输入驱动的）会导致整个应用程序崩溃？常识告诉我们，您需要开发一套测试来测试应用程序的所有独立部分、组件或模块，以及覆盖这些组件与外部实体（如用户和其他系统）之间所有可能交互场景的测试。


    让我们通过软件工程中可能最被滥用的类比——建造房屋——来说明关于测试的一些要点。不同的人（参与其建造和使用）可以从许多不同的角度来看待一所房子。房子可以被看作是各个独立组件（如砖块、木梁、门、钉子等）的集合。这是对房子最简化的组件视图。从这个角度来看，我们得出结论：如果每个组件都通过了制造商某种形式的质量控制，那么剩下的就只是测试这些组件之间的交互了。

