    **Retrieving a Collection of Objects**


    Retrieving a single object is fairly easy, and you’ll find yourself doing that
    frequently in a common Web application. Yet, in most cases you’ll be getting a
    list of objects before you decide to retrieve the particular details of a single
    entity (since most likely you won’t have previous knowledge of the database identifiers).


    Hibernate provides a myriad of ways to retrieve a collection of persistent objects
    from the database. This flexibility can be a source of confusion for new users
    of Hibernate. In this section I will attempt to give you an overview of the available
    APIs in Hibernate used for querying your application persistent object space.


    Finding Objects Using HQL


    Hibernate provides an object query language known as HQL (Hibernate Query Language),
    which is a powerful query language similar in syntax to SQL but with classes and
    object properties at its heart rather than tables and columns. The similarity
    to SQL makes for a smoother transition from straight-JDBC applications to a Hibernate
    application. Hibernate also allows you to issue native SQL queries if necessary,
    but I recommend that you stick with HQL queries whenever possible. In my experience
    there are very few situations that might force you to use a native SQL query,
    and if one of those situations presents itself, you can also avoid such queries
    in your applications by using a custom query in your HBM mappings. For more information
    on using custom SQL queries in your HBMs, consult the Hibernate online reference
    documentation.


    Listing 4-8 shows a simple HQL query to load all instances of the Address class
    from the database.


    **Listing 4-8.** *Simple HQL Query to Retrieve All Instances of the Address Class*
    List<Address> addresses = session.createQuery("from Address").list(); for (Iterator<Address>
    i = addresses.iterator(); i.hasNext();) {


    Address address = (Address) i.next();


    System.out.println(address);


    }


    As you can see, this query is completely expressed in the object terms, and the
    Hibernate team was kind enough to gives us a shorthand notation by allowing us
    to drop the “select”


    keyword. Notice that there is no intrusive result set class as an intermediary.
    The result is provided in a java.util.List, enabling us to do HQL work with familiar
    Java collections API.


    In an HQL query you can have a FROM clause to narrow down the returned entity
    list, just like with SQL. The snippet in Listing 4-9 shows how you can select
    an Address object matching certain information.


