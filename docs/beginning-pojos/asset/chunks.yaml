    Spring 框架


    **Spring**框架是一个开源的依赖注入（DI）和面向切面编程（AOP）轻量级容器及全栈 Java EE 应用框架，在使企业级 Java 开发更简单、更快速、更不易出错且更令人愉悦的运动中处于领先地位。Spring
    帮助你以声明方式将组件组装成一个可工作的系统。


    Spring 基于这样一个原则：良好的面向对象设计应该放在首位，并且不应因所选择的技术而受到阻碍。Spring 源于由 Rod Johnson 领导的一支经验丰富且敬业的开发团队的经验，他们每天处理实际应用程序，并寻求一种跨应用层以一致方式满足端到端应用程序需求的方法。Spring
    框架恢复了一些在早期版本的 Java EE 平台中缺失的良好面向对象特性，例如使用 POJO、通过接口进行契约式编程以及清晰的分层架构。


    Spring 消除了处理大多数中间件粘合代码的需要，这与 EJB 2.X 等重量级组件模型不同，它允许你构建真正可移植的、面向对象的 Java SE 和 Java
    EE 应用程序。Spring 框架根据 Apache 许可证 2.0 版条款进行许可。


    **面向接口编程**


    你会注意到的 Spring 框架的第一个方面是，它通过推广面向接口编程（面向对象编程中众所周知的一种实践）使你的 Java 代码更清晰、更易于测试。公开一个公共契约（接口）并能够提供该接口的合适实现，对大多数
    Java 程序员来说似乎是理所当然的，但不幸的是，早期版本的 Java EE 框架，特别是 EJB，由于其沉重且臃肿的容器契约，使得这一点变得非常困难。


    3.0 之前的 EJB API 的副作用是，尽管它们提倡组件导向的开发风格，但其特定的实现却忽视了良好的面向对象实践。

