- fmt: "Luckily for us, the Spring folks provide a starter Web application along with\
    \ the Spring distribution. This application provides a skeleton for a Spring MVC\
    \ Web application along with an Ant buildfile. We will modify this application\
    \ slightly to create our version of a simple Spring Web application.\n\nLet’s\
    \ begin by making a copy of the `samples/webapp-minimal` directory. This minimal\
    \ Spring Web application has a directory structure like that shown in Figure 6-3.\
    \ As explained in the `readme.txt` located at the root of the Web application,\
    \ the directories have the following purpose:\n\n- **src:** All Java source code\
    \ that will be compiled into class files that will be available in the target\
    \ WAR file `WEB-INF/classes` directory\n- **war:** Contains the Web application\
    \ documents (JSP and HTML pages) along with the Web deployment descriptors and\
    \ Spring application context in the `WEB-INF`\n- **lib:** Contains the JAR files\
    \ to be included in the WAR archive `WEB-INF/lib` directory\n- **dist:** Directory\
    \ to be created by the build script which will contain the WAR deployment archive\n\
    \n**Figure 6-3.** Minimal Spring Web application\n\n## JAR Dependencies\n\nOnce\
    \ again you’ll need a few JARs required for our application. Copy the following\
    \ JARs into the `lib` directory of the Web application:\n\n- `spring.jar` (found\
    \ in the `dist` directory)\n- `commons-logging.jar` (found in `lib/jakarta-commons`\
    \ directory)\n- `servlet-api.jar` (found in `lib/j2ee`, only needed for compilation)\n\
    \n## Java Code\n\nNext let’s copy the Java files created in our stand-alone greeter\
    \ service example to the `src` directory of the Web application, maintaining the\
    \ package structure.\n\nModify the file `ExampleController.java` in the `example`\
    \ package to look like Listing 6-7.\n\n**Listing 6-7.** Simple Spring MVC Controller\n\
    \n```\n...\npublic ModelAndView handleRequest(\n    HttpServletRequest request,\n\
    \    HttpServletResponse response) throws ServletException, IOException {\n  \
    \  String greeting = greetingService.greet();\n    return new ModelAndView(\"\
    /test.jsp\", \"greeting\", greeting);\n}\n...\nprivate GreetingService greetingService;\n\
    \n// Used for dependency injection\npublic void setGreetingService(GreetingService\
    \ greetingService) {\n    this.greetingService = greetingService;\n}\n...\n```\n\
    \nWe would go into greater detail about the Spring MVC framework later in this\
    \ chapter. For the time being the important facts about the `ExampleController`\
    \ class is that it is the code that will be used to respond to an HTTP request\
    \ for a simple application and that it is the bridge between the presentation\
    \ tier (the Web tier) and our service tier (the Spring-managed `greetingService`\
    \ singleton).\n\nListing 6-7 shows that the controller class provides the setter\
    \ `setGreetingService` for the `GreetingService` property that we will use to\
    \ wire the `greetingService` bean to the controller class.\n\n## Configuring the\
    \ Spring Application Context\n\nThe Spring application context distributed with\
    \ the starter Web application is named `example-servlet.xml` and is located in\
    \ the `war/WEB-INF` directory. Modify the `example-servlet.xml` to look like Listing\
    \ 6-8.\n\n**Listing 6-8.** Spring Application Context for Simple Web Application\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE beans PUBLIC \"-//SPRING//DTD\
    \ BEAN//EN\"\n    \"http://www.springframework.org/dtd/spring-beans.dtd\">\n<beans>\n\
    \    <bean id=\"greetingService\"\n        class=\"com.integrallis.spring.basic.GreetingServiceImpl\"\
    >\n        <property name=\"greeting\">\n            <value>Hello!</value>\n \
    \       </property>\n    </bean>\n    <bean name=\"/test\" class=\"example.ExampleController\"\
    >\n```"
