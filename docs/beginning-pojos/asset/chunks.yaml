    模拟对象（Mock objects）不仅仅是桩（stubs），因为它们不仅仅是数据的简单持有者。模拟对象模拟协作者的部分行为，并提供了一种验证行为的方式。模拟对象可以用作桩，但其真正的威力在于测试类与其协作者之间的交互。单元测试是关于隔离测试系统中的单元，但在大多数情况下，单元的行为只能在其与协作对象交互的上下文中进行测试。模拟对象提供了一种方法，可以在测试时替代协作对象所提供的某个行为方面。


    TechConf 系统中的大多数 EJB 服务都依赖 DAO 从数据库中检索数据。为了模拟这些 DAO 协作者，我们将使用 EasyMock 2 库，这是一个模拟对象库，可以动态地为给定接口生成模拟对象。


    EasyMock 2 可以从 www.easymock.org 下载。要使用 EasyMock，只需将 `easymock.jar` 文件添加到你的类路径中。


    作为如何测试 EJB3 SLSB 的示例，我们将使用 `LocationLookupServiceBean`，它使用 `ZipcodeDAO` 接口的实例作为协作者从数据库中检索数据。该
    EJB 还使用 DynaDTO 库创建 DTO 以返回给 EJB 客户端。清单 8-26 展示了 `LocationLookupServiceBean`。


