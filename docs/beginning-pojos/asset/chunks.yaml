    The power of Hibernate’s handling of inheritance lies in the ability to issue
    polymorphic queries. Before we jump into some examples, I will introduce you to
    the use of a tool that has saved me countless hours of coding and debugging when
    working with complex Hibernate queries. That tool is the Hibernate Console, which
    is a part of the collection of Eclipse plug-ins that encompasses the Hibernate
    Tools Project.


    The Hibernate Console is an Eclipse perspective that gives several views to work
    with your mapped objects. The Hibernate Tools plug-ins can be obtained as part
    of the JBoss Eclipse IDE set of plug-ins or in a stand-alone distribution. For
    detailed information on how to obtain and install the Hibernate Tools, see the
    Hibernate Tools website at `www.hibernate.org/255.html`.


    Once you have successfully installed the Hibernate Tools plug-ins, you are ready
    to work with your persistence objects without having to write a single line of
    Java code. Using any existing Eclipse project containing Hibernate mapped POJOs,
    you can select the Hibernate Console perspective for the Perspective toolbar.
    The Console is shown in Figure 4-15.


