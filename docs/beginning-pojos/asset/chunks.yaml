    **总结**


    Java 已成为企业计算领域的头号语言和环境，并且也成为开源社区中使用最广泛的语言之一。在撰写本文时，SourceForge 上已有超过 10,000 个
    Java 开源项目——仅次于 C++。尽管并非每个 Java 开源项目都适用于创建企业应用，但你仍会发现大量尚未充分利用的 Java EE 资源。本章还介绍了技术会议管理系统，该系统提出了一个相当复杂且具有代表性的问题，涵盖了企业开发的多个领域。


    本书的其余部分将指导您完成设计和开发构成案例研究的应用程序的过程。该案例研究将各章节所学的知识融合在一起。通过以增量迭代的方式逐层处理软件开发过程，本书将为您提供有关软件开发生命周期各个阶段所涉及规划的深刻见解。通过使用开源的
    Java EE 产品和支持工具，您将能够构建一个基本但完整的企业系统。随后的每一章都致力于应用程序的一个层级以及软件开发过程的一个或多个阶段（或活动）。在必要时，将针对特定问题演示多种解决方案，以便让您深入了解在开发企业
    Java 应用程序时遇到的典型决策。


