  raw: 'The DbUnit project, created by Manuel Laflamme, can be found at www.dbunit.org.
    DbUnit provides the functionality to load test data and verify the state of the
    database after a test. DbUnit uses XML files to provide test data. To load the
    data, you must initially format the data into DbUnit’s specific XML dataset format.
    The easiest way is to export the data from an existing database in the desired
    state. DbUnit includes an export utility and Ant task for performing this activity.
    Listing 8-19 shows an Ant macrodef that uses the DbUnit export subtask to export
    the data in a database to a file named dataExport.xml in the setup/data/dbunit
    directory (the name and the location can be overridden). This macrodef is to be
    added to the macros.xml file created in Chapter 3 and provides a good starting
    point to create data sets for your DbUnit tests. The generated XML file can be
    renamed and edited for a specific state. I like to use names that tie the file
    to a specific test like beforeAddressTest.xml and afterAddressTest.xml, for example.


    The macrodef takes as parameters the JDBC information and the destination and
    name of the DbUnit XML file to be generated.


    **Listing 8-19.** *DbUnit Ant Macrodef for Data Export*


    <path id="dbunit.class.path">


    <fileset dir="lib/dbunit">


    <include name="*.jar"/>


    </fileset>


    </path>


    <taskdef


    name="dbunit"


    classname="org.dbunit.ant.DbUnitTask"


    classpathref="dbunit.class.path"


    />


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C08.fm Page 333 Thursday, February 23, 2006 4:23 PM


    C H A P T E R 8 ■ T E S T I N G


    **333**


    <macrodef name="export-data">


    <attribute name="driver" />


    <attribute name="url" />


    <attribute name="username" />


    <attribute name="password" />


    <attribute name="target-dest" default="setup/data/dbunit" />


    <attribute name="filename" default="dataExport" />


    <sequential>


    <dbunit


    driver="@{driver}"


    url="@{url}"


    userid="@{username}"


    password="@{password}">


    <export dest="@{target-dest}/@{filename}.xml" format="xml" />


    <classpath>


    <path refid="dbunit.class.path" />


    </classpath>


    </dbunit>


    </sequential>


    </macrodef>


    To create a sample dataset you can either populate the database by hand (by writing
    SQL


    INSERT statements), or you can use the Hibernate-mapped POJOs to set the database’s
    initial state. Once you have the database in the desired state, execute the macro,
    and the XML file will capture the state of the database. Listing 8-20 shows a
    target using the macrodef previously defined.


    **Listing 8-20.** *Ant Target Using the DbUnit Macrodef*


    <target name="export-db" description="Exports the content of the test database">


    <target-banner target="export-db"/>


    <export-data


    driver="${test.db.driver}"


    url="${test.db.url}"


    username="${test.db.username}"


    password="${test.db.password}"


    />


    </target>


    For example, if we load some data in the address table and run the Ant target,
    the resulting DbUnit XML data set will resemble the output shown in Listing 8-21.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


