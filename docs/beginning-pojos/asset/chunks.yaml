    **50**


    第 3 章 ■ 使用 Ant 进行构建


    Ant 的架构与 make 工具类似，都基于目标（target）的概念。在 Ant 中，目标是一个模块化的执行单元，它使用任务（task）来完成其工作。Ant
    目标具有依赖关系，并且可以有条件地执行。一个构建通常由一些主要目标组成，这些目标将完成与应用程序构建相关的某些粗粒度过程，例如编译代码或打包组件。这些主要目标可能会利用其他子目标（通常通过依赖关系）来完成其工作。

