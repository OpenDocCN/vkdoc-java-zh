    • gjt.org**:** Giant Java Tree is a collection of unrelated Java packages.


    • objectweb.org**:** ObjectWeb.org hosts open source middleware projects and adaptable
    components.


    **Summary**


    Java has emerged as the number one language and environment for enterprise computing,
    and it has also become one of the most widely used languages in the open source
    community. At the time of this writing there are upward of 10,000 Java open source
    projects on SourceForge—


    second only to C++. Though not every Java open source project is applicable to
    the creation of enterprise applications, you’ll nevertheless find a largely untapped
    set of resources for Java EE. This chapter also introduced the Technology Conference
    Management System, which presents a fairly complex and representative problem
    that encompasses several areas of enterprise development.


    The rest of the book will guide you through the process of designing and developing
    the applications that make up the case study. The case study weaves together the
    knowledge gained in the individual chapters. By tackling the software development
    process one layer at a time in an incremental and iterative fashion, this book
    will provide you with insight about the planning involved at various stages of
    the software-development life cycle. By using open source Java EE offerings and
    supporting tools, you’ll be able to build a basic yet complete enterprise system.
    Each subsequent chapter is devoted to a tier of the application and to one or
    more stages (or activities) of the software-development process. Wherever necessary,
    multiple solutions to a particular problem will be demonstrated to provide you
    with some insight into the typical decisions encountered while developing an enterprise
    Java application.


