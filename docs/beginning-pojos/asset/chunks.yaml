    **Implementing DTO Pattern with DynaDTO**


    Another pattern that we typically find in an enterprise Java application is the
    Data Transfer Object pattern (DTO), which is also known as the value object pattern.
    DTOs are used when clients of the middle tier need to exchange data (traditionally
    with an EJB-based service layer).


    **Background**


    DTOs are typically lightweight objects that are used for intertier communications.
    Generally, in object-oriented, distributed, and middleware-driven Web applications
    there are three well-known tiers connected by what I define as two transformation
    layers. The three tiers are usually known as the *integration* tier (and/or the
    data tier), the *business* tier (where the business/domain objects reside) and
    the *presentation* tier (for a Web application this is the Web tier). Between
    these three tiers we typically encounter two transformation layers:


    • **O/R Transformation Layer:** Between a relational database and the middleware-hosted
    domain objects (collectively referred to as the domain model)


    • **DTO Transformation Layer:** Between the domain model and the user model. We
    define the user model as the collection of objects that the Web tier manipulates
    to interact with the middle tier.


    The need for the DTO pattern became apparent to architects and developers based
    on the problems that arise for the multitier, distributed characteristics of many
    enterprise Java applications, including the following:


    • **Coarse-Grained Entities:** Coarse-grained technologies like Entity EJBs are
    not meant to be manipulated directly by the Web tier, since every access can potentially
    become a remote call. Depending on temporal topology of an application (like collocation
    or vendor-specific optimizations), it can lead to portability problems and a brittle
    architecture.


    • **Fine-Grained Entities:** A well-designed domain model reflects more about
    the problem domain than is normally exposed to a client. A domain model should
    represent a subset of the knowledge about the problem/solution domain. Martin
    Fowler coined the term Anemic Domain Model to refer to the anti-pattern where
    a domain model lacks behavior.


    We see a lot “tainted” domain models, tainted either by the data tier or by the
    presentation tier. Separation of concerns is usually disregarded in order to accelerate
    development.


    In other words, the user interface should deal with objects that are designed
    for the user interface to handle. You should not compromise the integrity of a
    domain model to satisfy the needs of the user interface.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C05.fm Page 170 Wednesday, February 22, 2006 6:13 AM


    **170**


    C H A P T E R 5 ■ B U S I N E S S S E R V I C E S W I T H J B O S S


    • **Bulk-transfers:** Distribution brings a plethora of problems, including the
    need to minimize network traffic by using bulk transfers of data. Other typical
    issues affected by the granularity of the data exchanged between tiers include
    pagination schemes and caching.


    These problems lead us to the forces behind the implementation of the DTO pattern:


    • Potential remote calls when accessing a field of a remote object using coarse-grained
    technologies like entity EJBs.


    • Web applications are typically read-mostly and save-update-occasionally.


    • Viewing requirements per page are typically composed of multiple attributes
    from multiple domain objects. Transferring all domain objects needed to satisfy
    these requirements can result in a large object graph being serialized across
    tiers.


    • Hand-coded DTO means that code needs to be developed to instantiate a DTO at
    runtime and populate its values from one or more sources.


    Developers typically end up creating objects that are lightweight counterparts
    to the domain entities. They create transfer objects to encapsulate business data.
    For most use cases these translate to one DTO per use case that encapsulates the
    needs of the user interface. The traditional implementations of the DTO pattern
    still have some undesirable side effects, including:'
