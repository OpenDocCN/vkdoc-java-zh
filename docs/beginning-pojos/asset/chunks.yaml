    显然，随着对象图变得越来越复杂，工具必须更加“智能”。我见过无数公司从一个非常简单的系统开始，从头编写自己的持久化层。我们将此等同于编写自己的应用服务器。迟早你会遇到一些前人已经思考过的技术问题，并发现你大部分时间都在“微调”你的持久化框架。ORM
    工具消除了将内存中的类映射到数据库的复杂性。它们提供了自动选择、插入、更新和删除数据库表的接口，以反映对对象模型所做的更改。


    因此，我的建议是尽早选择映射工具，而不是等到应用程序中的“临时”持久化逻辑开始看起来像一个自制框架。使用 ORM 层已被证明可以提高生产力，因为它将开发人员的注意力从弄清楚如何存储对象（非功能性关注点）转移到解决真正的业务问题上。使用
    ORM 工具的另一个积极副作用是，像 JDBC 一样，它通过提供数据库的对象化视图，在数据库和应用程序之间提供了一个隔离层。在更好的情况下，它完全使持久化变得“透明”，而无需编写和维护直接的
    JDBC 代码的复杂性。


    ORM 工具也有缺点，包括性能、可移植性（该工具是否实现了任何已知标准？）以及初始学习曲线。如果性能在您的应用程序中至关重要，请隔离应用程序的关键组件，并用大量数据对其进行测试。


