    如今在软件开发领域，“单元测试”这一术语通常指代这样一种测试类型：它隔离一个单元，并测试其内部功能以及外部契约。如果你将测试视为开发的第一阶段，那么单元测试就变成了对尚未编写的代码进行测试。测试优先的理念是测试驱动开发（TDD）的核心，并且已被证明能够提升代码质量并控制项目范围。在房屋的例子里，制造商的测试可被视为单元测试。Java
    中的单元测试将 Java 类视为功能的基本原子单元，并混合了白盒测试与黑盒测试。例如，如果一个类 `MyClass` 有一个名为 `doSomething`
    的公有方法，该方法依赖于一个私有方法 `performCommonOperation`，那么作为 `MyClass` 测试的一部分，假设在 `MyClassTest`
    类中，我们将有一个 `performCommonOperationTest` 方法（白盒测试）和一个 `doSomethingTest` 方法（黑盒测试）。一个软件测试具有特定的前置条件，而实际测试则是针对给定的前置条件，检查后置条件是否与预期状态相符。


    **单元测试还是功能测试？**


    我之前提到过，Java 中的单元测试由白盒测试和黑盒测试组成。白盒测试是测试类的内部实现，比如私有方法和受保护方法，并考虑其实现细节。黑盒测试则是测试其他类可能使用公有方法的不同方式，包括可能被视为错误的使用方式。黑盒测试有时被称为功能测试或具体测试，在某些圈子里，Java
    中需要类本身之外的任何资源的单元测试**不被**视为单元测试。特别是，在 Java 社区中流传的单元测试的纯粹定义是：任何与另一个系统（如数据库、文件系统或
    Web 服务）通信的测试，或者依赖于其他测试执行、或无法与其他测试并发执行的测试，都不被视为单元测试，而是功能测试。


    这种激进的单元测试定义有利于提高生产力，因为它确保测试可以在任何环境中、以任何顺序执行，并且执行速度快。这些特性使得自动化以及持续集成实践（见第 9 章）更加可行。


    鉴于大多数 Java 测试框架都被标记为“单元测试”框架（包括对 Java 世界影响最大的测试框架 JUnit），很容易理解人们可能会将上述单元测试定义奉为圭臬，最终得到一个相当快速但相当浅层的测试工具集。单元测试无法解决集成错误或任何其他系统范围的问题。TestNG
    框架的创建者 Cedric Beust 准确地指出，根据上述定义，在单元测试框架下编写的大多数测试并非单元测试，而是功能测试，并且单元测试与非单元测试之间的界限并不清晰。


    回到我们房屋的类比，用单元测试的狭义定义来限制你的测试工具集，就像假设因为房屋的所有组件都经过了各自制造商的测试，它们就能恰当地协同工作，并且会按预期方式被使用一样。任何建造过房屋的人都可以证明，无论材料质量如何，也无论制造商进行了多少质量控制，房屋中的大多数问题都是由某些材料的使用方式引起的。


    在房屋的类比中，房屋的其他视角也浮现出来。例如，对房主来说，房屋可能被视为一系列房间的集合，而从他们的角度来看，测试可能涉及诸如自然采光量、房间是否符合家庭日常活动路线等标准。关键在于，房屋就像软件一样是分层建造的，并涉及横切关注点，如承重墙、电路和管道。成功测试一个应用程序，关键在于根据应用程序的不同抽象层次来组织测试，并专注于覆盖某一层次中的单元以及单元之间的交互。


    在本章中，我们将通过创建测试组来为 TechConf 示例应用程序构建一个测试工具集，这些测试组将处理应用程序中不同层次的抽象，从 ORM 层的底层细节，到服务层的高层测试，以及用于实现这些服务目标的设计与实现模式之间的相互作用。本着本书的精神，我们将使用
    TestNG 框架，它代表了 Java 测试框架发展的下一步。


    **开发周期中的测试**


    过去 10 年间，软件开发和管理方法论已经极大地演进，以应对企业级 Web 应用程序日益缩短的周转时间和不断提高的质量要求。从极限编程（XP）、特性驱动开发（FDD）和
    Scrum 中，我们了解到增量式、周期性的技术最适合应对软件的可塑性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C08.fm Page 307 Thursday, February 23, 2006 4:23 PM


    C H A P T E R 8 ■ T E S T I N G


    **307**


    ■**提示** 到目前为止，大多数开发者都接触过极限编程的概念（www.extremeprogramming.org/），但如果你尚未了解 FDD，我推荐阅读
    Jeff De Luca 的 Nebulon 网站（www.nebulon.com）上的文章部分，以及 Palmer 和 Felsing 合著的《A Practical
    Guide to Feature-Driven Development》（Prentice Hall，2002）。如果你想学习如何管理你的项目，更重要的是如何管理你的团队，请花时间了解
    Scrum（www.scrumalliance.org）。


    在过去五年中，测试领域经历了一次复兴。开发团队已经认识到，他们不能再仅仅依赖 QA 团队来测试应用程序。测试是每个人的工作。我们还认识到，将应用程序的测试留到项目结束是一个坏主意。为什么？一个原因与测试什么的问题有关。在编写代码的同时（或作为构建代码的驱动力）增量地创建测试，不仅能带来更好的测试覆盖率，更重要的是，增量式测试创建通过验证、反驳或仅仅质疑设计和开发过程中所做的假设，来塑造正在构建的软件。增量式测试不仅带来更好的软件，而且当与持续集成实践相结合时，还能提高生产力。持续集成自动化了测试过程，以便几乎立即发现项目代码库中因变更而引入的任何不良副作用。这样，你的团队处理的就不是一组随时间累积、可能相互纠缠的复杂问题，而是（希望是局部化的）细粒度变更所带来的影响。


    这对我们大多数人来说当然是有道理的，但在软件开发中，我们并不总是去做那些有道理的事情。当完成项目的压力增大时，首先被牺牲的往往是测试。为什么？因为有时测试可能很繁琐。因此，我们需要让测试不再是开发的副产品，而是其背后的主要驱动力，首先让测试贯穿整个开发过程，并使其成为阻力最小的路径。

