    **Web Deployment Descriptor**


    As with any Java Web application, you will need a Web deployment descriptor (web.xml)
    in the WEB-INF directory. As with most Web frameworks, the entry point into the
    framework is a servlet. In the case of Tapestry, it is org.apache.tapestry.ApplicationServlet.
    In a Tapestry application you’ll name the ApplicationServlet after your application;
    in our case as shown in Listing 7-4, the servlet-name element values is “tapestry-time”.


    The first servlet-mapping maps to the URL pattern /app to Tapestry application
    servlet.


    The purpose of the rest of the mappings will become apparent as we work through
    the example.


    Finally, at the end of the descriptor we have the welcome-file element in which
    we are declaring the file Home.html as a welcome file. Notice that there is also
    a servlet mapping that maps


    *.html to the Tapestry application servlet.


