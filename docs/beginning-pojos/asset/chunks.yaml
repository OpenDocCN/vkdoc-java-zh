    C H A P T E R 1 ■ I N T R O D U C T I O N


    **21**


    As you prepare for a journey into the Java EE world, it’s important to remember
    that sound design practices—not technology—should drive the development of enterprise
    applications.


    Although at specific points you might have to make an implementation decision
    that’s driven by the shortcomings of a particular technology, you should always
    keep in mind the greater picture of a solid design based on the problem space
    rather than the solution space. In this era of agile methodologies and techniques,
    many are quick to dismiss software modeling. But as Scott Ambler (www.agilemodeling.com)
    and others have demonstrated, software modeling can be just another weapon in
    your arsenal of agile methods.


    In this chapter you’ve learned a solid set of techniques and with the help of
    open source modeling tools you can make your models more robust and resilient
    to requirements and technology changes.


