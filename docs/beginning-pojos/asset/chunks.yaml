    Luckily for Tapestry users, AJAX-enabled components are available via the Tacos
    component library. Taco is a small but robust framework for building AJAX-enabled
    Tapestry components as well as a complete library of ready-to-use Ajaxian Tapestry
    components. Tacos was created by Viktor Szathmary and is actively maintained by
    Jesse Kuhnert. The Tacos project is hosted at SourceForge (http://tacos.sourceforge.net/)
    and distributed under the Apache open source license.


    Tacos provides all the power of AJAX without the complications of dealing with
