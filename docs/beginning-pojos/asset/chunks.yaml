    Pricing rules are applied at registration time when a conference attendee pays
    to attend the conference. The PricingRule hierarchy is composed of the interface
    PricingRule and the classes GroupPricingRule and RegistrationDatePricingRule,
    which implement the PricingRule interface. The PricingRule hierarchy is shown
    in Figure 4-24.


    **Figure 4-24.** *PricingRule class hierarchy*


    The three corresponding tables are shown in Listing 4-28\. Notice that tables
    holding the subclasses data, GROUPPRICINGRULE and REGISTRATIONDATEPRICINGRULE,
    both have foreign key constraints referencing the PRICINGRULE table (the root
    of the class hierarchy).


    **Listing 4-28.** *Pricing Rules Tables*


    CREATE TABLE PRICINGRULE (


    PK_ID INTEGER NOT NULL PRIMARY KEY AUTO_INCREMENT,


    NAME VARCHAR(16) NOT NULL,


    PRIORITY INTEGER,


    ACTIVE BOOLEAN,


    FK_CONFERENCE_ID INTEGER NOT NULL,


    CONSTRAINT PRICINGRULE_CONFERENCE_FK FOREIGN KEY(FK_CONFERENCE_ID) REFERENCES
    CONFERENCE(PK_ID),


    CONSTRAINT UNIQUE_PRICINGRULE_NAME UNIQUE(NAME)


    );


