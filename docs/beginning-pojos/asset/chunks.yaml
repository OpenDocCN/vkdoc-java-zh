    ## Additional Topics


    ### RSS with Informa


    Today, one of the features that seem prevalent in most websites is the addition
    of syndicated materials from blogs, news sites, and any other newslike feed. The
    RSS (Rich Site Summary/RDF Site Summary) and Atom protocols specify how to format
    XML documents for syndicating and aggregating list-oriented information. Using
    RSS you can create a data feed of headline, article, or blog entries summaries
    for a website, and you can also consume other sites’ feeds to enhance the content
    of your website or application. The XML syndication protocols allow systems to
    process, transform, or format the information from a feed in a consistent manner.
    (Remember the old days of HTML screen scrapping?)


    A website feed or channel is available via HTTP just like any other resource on
    a Web server. The feed provides metadata about several aspects of the data such
    as update frequency. The Informa RSS library is a pure Java open source API for
    producing and handling RSS and Atom feeds. Informa emerged as the result of the
    merging of the underlying libraries of two Java RSS aggregator programs.


    One of the problems posed by feed producers and consumers is the different protocols
    available. With RSS we have three different flavors: RSS 0.9x, RSS 1.0, and RSS
    2.0. Informa aims at providing a unified object model for a feed channel object
    model regardless of the format of the feed. Informa can be used to create a feed
    in any of the supported formats by using the Informa object model. Informa can
    also be used to aggregate feeds from different sources efficiently. Informa’s
    object model can be persisted via Hibernate, and integration with the Lucene search
    engine is provided for efficient full-text searching of a feed’s content.


    Figure 10-7 shows a partial view of Informa’s object model showing the `FeedManager`,
    which is used to serve instances of the `FeedIF` interface, which in turn is used
    to create instances of `ChannelIF` interface. From a `ChannelIF`, you can get
    the objects representing the feed items that are instances of the interface `ItemIF`.
    Figure 10-7 also shows some of the classes involved in the caching and refreshing
    of a feed.


