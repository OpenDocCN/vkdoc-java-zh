    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    Depending on the complexity of your object model, this is when most of the headaches
    of developing an object-oriented application begin, the moment when you decide
    to hook it up to a relational database.


    With relatively simple object models and simple querying requirements, a Java
    application that uses straight SQL can be easily ported, especially if you have
    externalized your queries. But the reality is that most applications will have
    either complex object-to-table mapping requirements, querying requirements, or
    in the worst case both. Also, with straight SQL we sometimes end up using a database
    vendor-specific feature, which can pretty much tie you up to that particular vendor.


    Fortunately for us, the open source community has once again given us a choice.
    Hibernate is an ORM tool billed as a relational persistence service for idiomatic
    Java, which can be translated as a way of saying “object-oriented transparent
    persistence mechanism for Java.” The transparency part here means that the objects
    being persisted don’t have any code in them that exposes their ability to be persisted,
    as opposed to say, something like Entity EJBs, where the persistence capabilities
    are explicitly marked in the structure and relationships of the component in its
    environment, the EJB container.


    Hibernate provides both persistence and object-querying capabilities that allow
    you to work in a fine-grained fashion with rich object models. It provides an
    object-oriented declarative programming model that doesn’t depend on code generation
    or build-time bytecode modification, although it uses reflection and runtime code
    enhancement via Code Generation Library (cglib). Hibernate does not force you
    to implement any special interfaces or extend any particular class; you can work
    with clean and simple POJOs.


    In Hibernate, the mappings between object and tables can be defined in XML documents,
    programmatically in Java code or via JSR-220 persistence annotations. Also, projects
    like XDoclet enable you to annotate pre-Java Standard Edition 1.5 applications
    with Javadoc comments which are used to generate the XML mappings. Hibernate works
    equally well in stand-alone applications or in managed environments such as a
    J2EE server.


    The Hibernate project got started by Gavin King in late 2001 as the result of
    his experiences working with the earlier versions of CMP EJBs. Hibernate’s easy-to-use
    SQL-like query language makes it easier for developers who are accustomed to writing
    SQL to make the transition from either Container-Managed Persistence (CMP) EJBs
    or straight JDBC. This project has become a successful example of an open source
    project, because it provides a large, clean amount of documentation and has very
    responsive community support. In late 2003, Hibernate became part of the JBoss
    project and is currently being used as the foundation for JBoss’ CMP EJB3


    engine and a great source of influence on the EJB3 specification. Hibernate provides
    a single, simple API that strives for familiarity (to SQL) rather than standards
    compliance. Figure 4-1


    shows a simplified view of Hibernate’s architecture.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


