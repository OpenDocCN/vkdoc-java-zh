    属性与 Java 代码关联，本例中该属性指向 `com.integrallis.techconf.web.tapestry.pages` 包中的 `ConferenceBorder`
    类。`allow-body` 属性告诉 Tapestry 该组件将渲染其主体的内容。Tapestry 中的许多组件在渲染时会替换主体的内容。这就是为什么在某些模板中，我们可以简单地向元素主体添加示例内容用于预览，而在其他模板中，我们使用
    `$remove$` 指令来明确告诉 Tapestry 移除示例内容。


    `parameter` 元素用于为你的组件定义参数。类似地，你可以通过使用 `reserved-parameter` 元素来阻止组件用户传递特定的非正式参数。


