- fmt: '# 7


    ## Call for papers


    Potential presenters should be able to submit abstracts for a session. The system
    should allow the presenter to select the target audience, the session track (session
    category), and the room requirements for a session.


    ## Speaker availability


    Presenters should be able to schedule the “office” hours during which they can
    be available to assist attendees with questions or problems related to a session.


    ## Books by a presenter


    Presenters who are published authors can select one or more books from a list
    of their published books and associate them with a session. The list of books
    will be presented as part of the session information. The list of books and the
    detailed information for each book is obtained from an external provider at runtime.


    # Sponsors


    Sponsors make a financial investment in a conference. Their interest is based
    on the rewards of public exposure and an improved industry image. It gives them
    an opportunity to connect with the community and provides them with a forum to
    present their products and services.


    The presence of high-profile industry players as sponsors legitimizes a technology
    conference.


    Ensuring that it’s easy for sponsors to participate in the conference is of the
    utmost importance to the success of the event.


    - **Registration:** The system should allow sponsors to register and select a
    level of sponsorship.

    - **Booth selection:** The system should allow sponsors to select a conference
    booth. Booths are allocated based on sponsorship level.


    # Administrators


    Managing the complex interactions of a conference is a challenging process. One
    of the goals of the system is to ease the tasks of management and reduce the amount
    of personnel needed.


    - **Check-in and registration:** Administrators need to check in attendees as
    they arrive at the conference and provide them with badges and other materials.

    - **Speaker evaluations:** The system should provide administrators with the ability
    to create and view the results of speaker evaluations.

    - **News:** Administrators should have an easy interface to update conference-related
    news.

    - **Booth assignment:** Administrators should have the ability to select a booth
    for a sponsor based on sponsorship level and physical requirements.

    - **Conference closing:** An interface must be provided for conference administrators
    to easily transition the selected content into a static site. Specific data now
    becomes legacy data and must be relocated or archived appropriately.

    - **Dashboard:** Utilities must be provided for conference administrators to gather
    statistics and performance indicators for the conference. These tools should be
    able to provide a snapshot view of the overall health and success indicators of
    the conference.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C01.fm Page 8 Wednesday, February 22, 2006 6:01 AM


    # 8


    C H A P T E R 1 ■ I N T R O D U C T I O N


    # Architectural Requirements


    Architectural requirements refer to the infrastructure needs that must be present
    for the system to achieve the desired business goal. A multitude of factors are
    involved in determining these requirements, such as the technologists’ experience
    with similar systems, operational constraints, existing physical infrastructure,
    and application services needed across multiple systems (cross-cutting concerns).
    These requirements are useful in performing a gap analysis of infrastructure features
    when selecting a product or set of products on which to build enterprise applications.
    It’s the architect’s job to then make the build vs. buy decisions.


    A set of general architectural requirements can be listed from the general application
    requirements previously outlined and the experience gained while building similar
    systems.


    - **Data management and persistence:** Data must be easy to store, retrieve, search,
    and modify. Data integrity shouldn’t be compromised in the face of multiple sources
    attempting to modify the same data.'
