    a property of type GreetingService (or sometimes even disregard the interface
    and directly expose an instance of GreetingServiceImpl). You would then either
    use the constructor that takes the greeting property or the no-arguments constructor
    along with the setGreeting method to configure the instance before usage.


    The problems with this type of tight coupling become painfully obvious when it
    comes to testing, and the specific implementation of a resource depends on external
    factors such as a database, a JNDI context, or a remote Web service. Of course
    after seeing this pattern repeat itself many times, you might choose to implement
    some of your own plumbing using property files or some other way of externalizing
    the system variant parameters.


