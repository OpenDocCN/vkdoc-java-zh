    **16**


    第 1 章 ■ 引言


    **用例建模**


    用例建模的主要目标是理解用户需求，并使你能够从客户的角度审视系统。用例描述了参与者如何与系统交互以实现某些业务目的。它们是功能分解过程的程序化描述。


    尽管用例本质上并非面向对象，但这并不意味着用例在面向对象分析与设计（OOAD）中没有价值。相反，它们是理解用户需求和规划系统中可交付里程碑的良好工具。


    当然，在使用用例进行建模时必须谨慎，因为它们可能导致在没有正确理解问题领域的情况下定义过程。这可能会创建许多“人为的”类来支持特定的用例，从而污染和扭曲了所建模领域的本质。只要你理解这一点，使用用例就不会有问题。

