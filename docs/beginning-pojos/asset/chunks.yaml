    第 1 章 ■ 引言


    当然，在开发应用程序的过程中，我们会发现更多候选类，并可能移除或合并一些先前发现的类。图 1-5 所示的模型是遵循 Peter Coad 的领域中性组件（DNC）技术进行迭代过程的结果。在中间模型中，我选择将动词（或动作短语）所体现的动作建模为领域模型中的对象。这些对象后来成为系统中服务类的基础。根据斯坦福大学对并行面向对象编程语言的研究²，得出结论：诸如预订或购买机票等实时任务应建模为封装（外观模式）任务复杂性并简化参与对象之间关联的对象。


    关于先建模结构还是先建模行为的问题，是许多初、中级建模者在每个新项目中都会遇到的。我们建议两者同时进行，因为建模行为可以验证模型的结构完整性，而反映领域的定义良好的实体在建模行为时会自然就位。


    ■**提示** 不要过度分析名词和动词的探索。专注于寻找主要候选对象；其他候选对象会在你精炼分析和设计的过程中浮现出来。


    有了这个初步的名词列表，你将开始构建一个静态模型，领域模型的行为部分也将开始显现。我想强调的是，这是一个迭代过程，生成的模型将随着系统的构建而演进。此外，某些假设会得到验证，而另一些则会被推翻。请记住，对系统的分析有助于你更深入地理解它，但这并不能阻止你基于天真的先入为主的观念推导出可能错误的知识。


    在重复这一发现和精炼过程（以及在开发过程中的进一步发现）之后，你应该会得到一个类似于图 1-5 所示的领域模型。


