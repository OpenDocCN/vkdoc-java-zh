    Signature signature = thisJoinPointStaticPart.getSignature(); traceMethodWithMessage(signature,
    "Entering");


    }


    after() returning : traceMethods() {


    Signature signature = thisJoinPointStaticPart.getSignature(); traceMethodWithMessage(signature,
    "Exiting");


    }


    after() throwing(Throwable t) : traceMethods() {


    Signature signature = thisJoinPointStaticPart.getSignature(); traceMethodWithMessage(signature,
    "Exception", t);


    }


