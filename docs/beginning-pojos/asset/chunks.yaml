    ## Refining Use Cases with Sequence Diagrams


    The UML sequence diagram models the dynamic behavior of a system by depicting
    object interactions over time. These interactions are expressed as a series of
    messages between objects.


    UML sequence diagrams are ideal for elaborating a use case execution in terms
    of objects from your domain model. One sequence diagram is typically used to represent
    a single use case scenario or flow of events. The message flow of a sequence diagram
    matches the narrative of the corresponding use case.


    Sequence diagrams are an excellent way to document use case scenarios and refine
    and synchronize a use case diagram with respect to a domain model. A sequence
    diagram typically shows a user or actor and the object and components they interact
    with in the context of a use case execution.


    Whenever necessary, I use sequence diagrams in the book to refine and validate
    a use case against the application’s domain model.


    > **Tip** Don’t assign operations to a class without first refining complex use
    cases with sequence or interaction diagrams.'
