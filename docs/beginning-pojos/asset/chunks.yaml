    # 第 2 章


    ■ ■ ■


    # Eclipse


    当 JavaBeans 规范出现时，组件市场的想法在每个人的脑海中浮现，类似于像 ActiveX 这样的技术丰富的组件生态系统。好吧，那个白日梦从未成为现实，而且现在很明显，EJB
    技术也犯了同样的错误。一些人归咎于规范（这可能是部分正确的），但迄今为止我得到的最多的回应都指向一个明显的领域——是工具的问题，笨蛋！


    早期的成功 Java 开发环境大多是商业和专有的封闭系统，只有少数选定的商业合作伙伴才能扩展和构建环境。像 Borland JBuilder 这样的工具提供了一种插件框架的假象，但从未有任何一个工具获得大规模采用（无论供应商的市场宣传资料会告诉您什么）。尽管许多
    Java 开发人员使用各种工具和命令行实用程序有效地工作，但许多开发人员喜欢在一个有凝聚力的集成开发环境（IDE）中工作。


    在 Sun 的 NetBeans IDE 出现之前，Java 开源 IDE 市场确实很薄弱，尽管 NetBeans 取得了成功，但它未能获得许多商业供应商或开源社区的广泛支持。第二次创建
    Java IDE 的主要开源努力发生在 2001 年底。令人惊讶的是，Eclipse IDE（`www.eclipse.org`）是一个功能相当全面的产品，即使在
    1.0 版本时，它也已经准备好帮助大量新旧 Java 开发人员提高生产力。Eclipse 代表了一种商业供应商开展业务的新方式，因为 Eclipse 项目背后的母公司
    IBM 捐赠了大约 4000 万美元用于其开发。


    Eclipse 源自 IBM 收购著名的工具制造商 Object Technologies International（OTI），该公司是 VisualAge
    产品线的创建者，并以其 Smalltalk 工具而闻名。


    Eclipse 项目不仅仅是一个开源的 Java IDE；Eclipse 是一个工具集成平台，更重要的是，它是一个由项目和想法组成的社区。


    本章旨在将 Eclipse 引入您的开发环境，并用各种开源插件来补充 Eclipse，这些插件可以使开发更加愉快和敏捷。本章绝不是对 Eclipse 的详尽介绍，但它应该能帮助您开始使用这个强大且流行的
    IDE。


