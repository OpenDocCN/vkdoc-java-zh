    **总结**


    在本章中，你学习了 AOP 以及它如何简化并减少非功能性方面对应用程序业务逻辑的干扰。虽然只是一个简单的介绍，但我展示了 AOP 的两种用途，使你能够以非侵入的方式将系统级策略应用于系统。AOP
    也可以用于解决功能性或业务需求，随着你对 AOP 框架的深入使用，你将开始找到将这项强大技术应用于应用程序的新方法。


    在本章的后半部分，我们通过使用 Informa 库将作者源添加到 TechConf 网站，探索了 Java 中 RSS 源的世界。RSS 源是当今许多成功网站的常见功能，而
