    • **核心（Core）：** 核心任务包括构建过程中所需的基本基础工具，例如文件操作、文件依赖、目录操作、源代码编译、API 文档生成、归档与打包、XML
    文件操作、SQL 执行等。


    • **可选（Optional）：** 这包括针对某些商业产品（如 EJB/J2EE 服务器和第三方版本控制系统）的任务，以及非构建特定任务，如单元测试、XML
    验证等。


    **属性（Properties）**


    Ant 允许项目拥有一组属性。属性是简单的字符串，你可以使用 `${propertyName}` 表示法来访问它们。无论你是需要多次指定某个必要库的位置，还是指定
    CVS 仓库的名称，属性都为你提供了灵活性，可以将一组在构建中使用的值推迟到运行时再确定。


    设置属性有多种方式。你可以通过 `D` 命令行选项（见表 3-1）单独为 Ant 构建文件设置属性，也可以通过 `propertyfile` 选项从标准的
    Java 属性文件中批量设置。


    还有一些任务专门处理属性。`property` 任务允许按名称设置属性。所有属性任务都是幂等的，这意味着一旦某个属性的值被设置，它在构建的剩余部分中将保持不变。Ant
    中属性的不可变性常常是混淆的根源，因为作为开发者，你通常习惯于使用变量进行思考。


    ■**注意** `<ant>` 和 `<antcall>` 任务都通过调用另一个构建文件来启动一个新的构建。`<ant>` 任务调用一个外部的构建文件，而
    `<antcall>` 任务则调用当前构建文件中的一个目标。自 1.6 版本起，Ant 提供了 `<macro-def>`、`<import>` 和 `<subant>`
    任务，这些任务在大多数情况下消除了使用 `<ant>` 的需求。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


