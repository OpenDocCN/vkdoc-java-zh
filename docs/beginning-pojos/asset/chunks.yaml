    public class ListConferencesController extends AbstractController {


    protected ModelAndView handleRequestInternal(HttpServletRequest request, HttpServletResponse
    response) throws Exception {


    List<ConferenceSummary> conferences = conferenceService


    .getAllConferences();


    return new ModelAndView("conferenceList", "conferences", conferences);


    }


    private ConferenceService conferenceService;


    public void setConferenceService(ConferenceService conferenceService) {


    this.conferenceService = conferenceService;


    }


    }


    This class extends Spring’s AbstractController, which in turn implements the Controller
    interface. A controller implementation is responsible for handling, in a thread-safe
    manner, an HttpServletRequest and ultimately return a ModelAndView object. A ModelAndView
    object is a construct that groups the model and view together so that a controller
    can return them as a single return value. AbstractController provides caching,
    session synchronization, and method filters and is a convenient base class for
    your controller implementations. Spring provided other controller implementations
    such as the ParameterizedViewController, FileNameViewController and MultiActionController.


    The bulk of the controller implementation lies in the development of the handleRequestInternal
    method, which follows servlet semantics by taking an HttpServletRequest and HttpServletResponse
    objects as parameters. The implementation of the ListConferencesController uses
    an instance of the ConferenceService to retrieve a list of ConferenceSummary DTOs
    using the method getAllConferences. The list of DTOs is passed to the constructor
    of the ModelAndView class under the identifier “conferences” as seen in the second
    and third parameters of the constructor call.


    To be able to use ConferenceService we need to provide a field to hold an instance
    of the previously configured service and a setter that we will use to inject the
    service via the application context. Listing 6-28 shows the definition of listConferencesController
    that is implemented by class ListConferencesController shown in Listing 6-27 and
    for which we are injecting the previously created conferenceService bean.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


