    **Implementing the DAO Pattern with Hibernate**


    Enterprise Java developers have been using the DAO pattern for quite some time
    now in order to abstract and encapsulate all access to one or more sources of
    data for an application. In an application dealing with multiple sources of data,
    the DAO pattern can make all the different sources seem the same to the application
    code by providing a unified and consistent interface for all data-related operations.
    A well-designed DAO layer should hide all of the technology-specific details of
    the underlying data-access mechanism whether it is a full-fledged ORM tool like
    Hibernate, simple JDBC, or something more esoteric like an object database or
    a prevalence system like Prevayler (www.prevayler.org).


    The simple EJB3-based DAO implementation for the TechConf application is based
    on a very few simple principles:


    • **Code to Interfaces:** DAOs are defined as interfaces. This provides the flexibility
    to plug in different implementations at runtime and simplifies testing by allowing
    the use of mock testing objects in the absence of a database.


    • **EJB3 Component Model:** In EJB3, annotated components are POJOs, and being
    a component in an EJB3 environment enables your POJO to use the available container
    services. In particular, the ability to wire the application declaratively via
    annotations will come in handy when implementing the EJB3 TechConf DAOs.


    • **Small Runtime Exception Hierarchy:** Most data-access exceptions are unrecoverable,
    and most data-access tools throw too many exceptions. Since we are striving for
    simplicity on the design of the DAO layer, a simple and meaningful exception hierarchy,
    rooted at RuntimeException, will be used.


    • **Small Number of DAOs:** Having a single DAO per persistent entity can produce
    a parallel hierarchy that can quickly get out of control. I prefer to have a more
    cohesive DAO that covers a particular area of functionality for a related set
    of persistent entities.


    • **Strongly Typed Methods:** I believe that (especially in large teams) using
    strongly typed methods in your DAOs can make the code more readable and minimize
    early usage errors.


    Figure 5-9 shows the different DAO interfaces used in the TechConf application.
    As you can see, the TechConf application requires a small number of DAOs as compared
    to the number of persistent entities.


