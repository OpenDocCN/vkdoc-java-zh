    第 5 章 ■ 使用 JBoss 的业务服务


    幸运的是，Java 社区就早期 J2EE 规范所造成的发展状况表达了意见。开发人员开始注意到他们无法使用 EJB 来表达丰富的业务对象模型，并且他们对部署一个简单的服务组件或使一个领域实体持久化所需的步骤数量感到沮丧。框架和技术开始出现以应对
    API 的繁琐性。大多数敏捷、轻量级的 Java 框架都围绕着使用 POJO（Plain Old Java Objects，普通 Java 对象）、POJI（Plain
    Old Java Interfaces，普通 Java 接口）、最小化配置量、控制反转（IoC；也称为依赖注入或 DI）以及动态而非静态地提供容器服务等概念。


    像 XDoclet 这样的工具成为任何希望高效使用 API 的开发团队的必备工具。这些工具是应对规范中明显缺陷的拐杖。像 Spring 这样的框架展示了回归基础的可能性，它不是强迫你的代码遵循环境（J2EE
    容器）的规则，而是让你的代码在不受平台提供的众多服务阻碍的情况下工作，同时能够以透明的方式随意使用它们。对我们来说幸运的是，这些抱怨最终通过 Java 社区流程（JCP）以许多
    JSR 的形式进入了规范，这些 JSR 受到了 Java EE 世界中存在的问题和缺失内容的影响。


    主要信息是编写 Java EE 应用程序必须变得更容易。JSR 220：Enterprise JavaBeans 3.0 旨在“从开发人员的角度通过降低其复杂性来改进
    EJB 架构”。在本章中，我们将探索使用 Java EE 1.4 技术栈中的前沿技术进行开发的新世界，特别是 JBoss 应用服务器提供的 EJB3 规范，这是对未来
    Java EE 服务器样子的真正革命性的愿景。


    在本章中，我们将专注于从 TechConf 系统的设计中提取基本服务和流程，并将它们转化为一个组件和模式实现系统，该系统为系统的面向用户区域提供业务服务，同时允许我们维护一个可以演进来满足未来需求的丰富领域模型。


    **JBoss**


    JBoss 应用服务器始于 1999 年 3 月的 EJBoss 项目。由前 Sun Microsystems 工程师 Marc Fleury 和一群热衷于拥抱当时新兴的
    EJB 规范的程序员领导，它已发展成为市场上最受欢迎的开源应用服务器，并且是 BEA WebLogic 和 IBM WebSphere（市场上的两个商业领导者）的有力竞争者。


    JBoss 在 GNU 宽通用公共许可证（LGPL）下分发，是一个 100%兼容的净室实现，提供全套 Java EE 服务。它构建在一个可插拔的架构之上，该架构利用了
    JMX 规范（Java 管理扩展）以及软件工程方面的进步，如面向方面编程（AOP）和（DI）/IoC 技术。JBoss 也是最早为开发人员量身定制的应用服务器之一，具有动态功能，如热部署和即时灵活性，例如，在运行时加载和卸载库的能力，以及容器存根和骨架的动态生成。其中许多功能在一些商业产品中仍然找不到。


