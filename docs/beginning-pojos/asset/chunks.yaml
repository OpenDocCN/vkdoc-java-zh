    CruiseControl 包含一个免费的 Java 开源构建调度器以及多个用于通知和报告的实用程序。你可以将 CruiseControl 视为 Ant 的
    Cron 版本。CruiseControl 与 Ant、Maven 或任何可从命令行调用的工具等构建工具无缝集成。CruiseControl 可与许多最流行的版本控制系统配合使用，例如
    CVS、Subversion、Visual SourceSafe、PVCS 和 ClearCase 等。


    CruiseControl 以二进制和源代码两种形式分发。（在撰写本文时，最新版本是 2.3.1。）


    CruiseControl 由两个子系统组成：


    • **构建循环（Build Loop）：** 一个设计为作为守护进程运行的应用程序，用于监视源代码仓库的变更。如果检测到任何变更，它会运行构建并发送关于构建状态的报告。


    • **构建结果 JSP（Build Results JSP）：** 一个 Web 应用程序，用于格式化和显示 CruiseControl 构建循环的结果和状态，以及之前构建的结果。它显示诸如编译错误、测试结果和源代码仓库变更等信息。


    通常，你会将 CruiseControl 设置在“构建服务器”上，该服务器应是一台高可用性机器。构建服务器也称为持续集成服务器。


    图 9-1 显示了一个典型的设置。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


