    环境和生产系统。大多数构建工具都包含某种配置或脚本，用于以离散、原子化的步骤描述构建过程。


    一个典型的构建过程还涵盖了应用程序的生产和开发阶段。例如，在数据库驱动的应用程序中，个别开发者可能需要用测试所需的样本数据初始化数据库，而在生产环境中则不需要此步骤。


    尽管集成开发环境（IDE）一直为构建过程提供一定程度的支持，但这种支持通常无法满足开发者的需求和期望。大多数此类构建解决方案无法跨环境移植；要让某个开发者的
    IDE 项目文件在其创建者之外的任何环境中正常工作都相当困难。这些工具不仅依赖于特定 IDE，而且与应用程序组装者或部署者为生产应用所做的工作也大相径庭。常识告诉我们，开发环境越接近生产环境，进入生产阶段时遇到的问题就越少。通过建立一个在开发环境、生产环境（以及两者之间的任何其他环境）中保持一致的构建过程，你可以消除因使用多种
    IDE、操作系统和 Java 版本而带来的许多开发难题。


    随着构建过程实现自动化并对程序员透明化，测试和文档生成等其他问题也融入了构建过程。大多数开发者发现，他们最初使用的构建系统会逐渐演变，最终完成的任务远不止“构建”本身。从测试到文档生成，一个精心设计的构建过程最终会成为团队开发流程的体现。


    在 J2EE 中，一个一致的构建系统将应用程序开发者、组装者和部署者的角色整合在一起。作为 J2EE 规范的一部分，Sun 在其 J2EE 平台定义中明确了几个角色。J2EE
    新手可能会很快将自己归入其中某一类，而忽略其他角色的细节。但现实是，除非你了解每个角色的职责，否则你对 J2EE 平台的理解将是不完整的。特别是，应用程序组装者和应用程序部署者的角色会体现在构建过程中，除非你的开发者能够复现生产环境中的情况，否则你很可能会经历从开发到生产的痛苦过渡。


    **Ant 简介**


    一个包含少量文件和极少依赖关系的项目，其构建过程几乎算不上一个过程。只需使用 Java 编译器和 JAR 命令行工具，就可以构建简单的 Java 应用程序。


    在 Ant 出现之前，开发者通常从一组简单的批处理文件或 shell 脚本开始，作为迈向自动化的第一步。但随着文件数量、组件、目标平台和虚拟机（VM）版本的增长，构建时间、构建复杂性以及人为错误导致构建不可重现和不一致的可能性也随之增加。


    过了一段时间，你最终会意识到，维护一个不可移植、依赖平台的自行解决方案既繁琐又容易出错。


