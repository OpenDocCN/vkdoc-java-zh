- fmt: '两个 DTO 接口的 `DynaDTO` 构建器在初始化方法中构造，该方法使用 `@PostConstruct` 注解标记，会在实例化后立即被调用。


    服务实现中的方法通过 DAO 查找 Hibernate 映射的领域对象，执行特定的业务逻辑，最后返回 DTO。如您所见，使用 DAO 和 DTO 模式（借助
    `DynaDTO`）使服务实现主要处理业务逻辑，同时最大限度地减少了所需的样板代码。


    ## 消息驱动 POJO


    在典型的基于 Web 的应用程序中，绝大多数操作都是同步的，但在某些情况下需要以异步方式执行操作，特别是当该操作可能耗时超过典型 Web 用户可接受的等待时间（最多几秒）时。


    异步操作的一个典型例子是从服务方法发送电子邮件。例如，在 Web 应用程序中提供典型的“忘记密码页面”时需要此功能。


    在 TechConf 应用程序中，我们通过 `UserService` 的 `sendPassword` 方法提供此功能，如下所示：


    `void sendPassword(String email) throws ServiceException;`


    显然，我们可以通过使用消息驱动 Bean（MDB）或直接使用 JMS 来实现邮件服务所需的异步功能。但这需要我们就消息格式和生产者与消费者之间使用的目标达成一致，这正是使用灵活、松散耦合的消息传递系统的本质。


    幸运的是，JBoss 服务器通过支持“消息驱动 POJO”提供了一个非常强大的扩展来实现消息驱动的远程过程调用（RPC）。消息驱动 POJO 的工作方式与
    SLSB 类似，区别在于所有方法调用都通过 JMS 消息队列进行调度。


    实现消息驱动 POJO 的第一步是使用 `@Producer` 注解标记业务接口，如清单 5-24 所示。


    ■**注意** 使用 `@Producer` 注解标记的方法必须具有 `void` 返回类型，因为调用者不会阻塞等待响应。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `Sam-Bodden_596-3 C05.fm Page 190 Wednesday, February 22, 2006 6:13 AM`


    **190**


    第 5 章 ■ 使用 JBoss 的业务服务


    **清单 5-24.** *使用 @Producer 注解的 MailService 业务接口*

    ```java

    package com.integrallis.techconf.service;


    import java.util.List;


    import org.jboss.annotation.ejb.Producer;


    import com.integrallis.techconf.service.exception.ServiceException;


    @Producer


    public interface MailService {


    void sendEmail(String to, String from,


    String subject, String text) throws ServiceException;


    void sendEmail(List<String> recipients, String from, String subject, String text)
    throws ServiceException;


    }

    ```


    清单 5-25 显示了 `MailServiceBean`，它是 `MailService` 的消息驱动 POJO 实现。`MailServiceBean`
    使用 JavaMail API（通过 `@Resource` 注解注入 `java:/Mail` 处的 JavaMail Session）实现了两个 `sendEmail`
    方法。


    为了满足消息驱动 POJO 契约的其余部分，实现类使用 `@Consumer` 注解进行标记。`@Consumer` 注解指定了要使用的消息队列名称，如果未定义，则在部署时自动创建。


    **清单 5-25.** *MailServiceBean 消息驱动 POJO 实现*

    ```java

    package com.integrallis.techconf.ejb;


    import java.util.Iterator;


    import java.util.List;


    import javax.annotation.Resource;


    import javax.ejb.ActivationConfigProperty;


    import javax.mail.Message;


    import javax.mail.MessagingException;


    import javax.mail.Session;


    import javax.mail.Transport;


    import javax.mail.Message.RecipientType;


    import javax.mail.internet.InternetAddress;


    import javax.mail.internet.MimeMessage;


    import org.jboss.annotation.ejb.Consumer;


    import com.integrallis.techconf.service.MailService;

    ```'
  raw: 'The DynaDTO builders for the two DTO interfaces are constructed in the initialization
    method, which is marked with the annotation @PostConstruct, which is called right
    after instantiation.


    The methods in the service implementation look up Hibernate-mapped domain objects
    using the DAOs, perform certain business logic, and finally return DTOs. As you
    can see, using the DAO and DTO patterns (with the help of DynaDTO) makes the service
    implementation deal mainly with business logic while minimizing the amount of
    plumbing code required.


    **Message-Driven POJOs**


    The vast majority of operations in a typical Web-based application will be synchronous,
    but there are cases in which there is a need to perform an operation in an asynchronous
    way, especially if that operation can take longer than what is considered acceptable
    for a typical Web user to wait (a few seconds at most).


    A typical case of an asynchronous operation is sending email from a service method.
    This is needed for example to provide the typical “forgotten password page” in
    a Web application.


    In the TechConf application we provide this functionality via the sendPassword
    method of the User Service as shown here:


    void sendPassword(String email) throws ServiceException;


    Obviously we could implement the asynchronous functionality needed from the Mail
    Service by using Message Driven Beans (MDBs) or straight JMS. But this would require
    us to agree on a message format and a destination to use between the producer
    of the message and the consumer, which is the nature of working with a flexible,
    loosely coupled messaging system.


    Luckily for us, the JBoss server provides a very powerful extension to do message-driven
    remote procedure calls (RPCs) by supporting “message-driven POJOs.” A message-driven
    POJO works in similar fashion to an SLSB with the exception that all method calls
    are dispatched via a JMS message queue.


    The first step for implementing a message-driven POJO is to annotate the business
    interface with the @Producer annotation as shown in Listing 5-24.


    ■**Note** Methods annotated with the @Producer annotation must have a return type
    of void since the caller will not block to receive a response.


