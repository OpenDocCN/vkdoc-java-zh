    \ actualTable);`\n\n## Testing the DTO Layer\n\nTesting the DTO layer implemented\
    \ with DynaDTO in Chapter 5 becomes very simple with TestNG. Listing 8-25 shows\
    \ a TestNG class with two methods. In the `setUp` method the DynaDTO configuration\
    \ is loaded using the `DynaDTO ConfigurationLoader` class.\n\nIn the `testNewsItemCreation`\
    \ method a `News` domain object is created, and then, using the `DynaDTO Builder`,\
    \ a dynamic DTO is created. The rest of the method uses the `TestNG Assert` class\
    \ to compare every field of the domain object against the DTO. (In this case the\
    \ DTO is a mirror image of the domain object.)\n\n### Listing 8-25. A TestNG Test\
    \ for a DynaDTO DTO\n\n```\npackage com.integrallis.techconf.dto;\n\nimport java.io.File;\n\
    import java.util.Date;\nimport org.dynadto.Builder;\nimport org.dynadto.BuilderFactory;\n\
    import org.dynadto.ConfigurationLoader;\nimport org.dynadto.exception.ConfigurationException;\n\
    import org.testng.Assert;\nimport org.testng.annotations.Configuration;\nimport\
    \ org.testng.annotations.Test;\nimport com.integrallis.techconf.domain.News;\n\
    import com.integrallis.techconf.test.util.Paths;\n\npublic class NewsItemTest\
    \ {\n\n    @Configuration(beforeTestClass = true)\n    protected void setUp()\
    \ throws ConfigurationException {\n        ConfigurationLoader.loadMapping(\n\
