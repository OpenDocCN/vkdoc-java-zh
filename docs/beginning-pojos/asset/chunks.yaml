    使用模拟对象并非高深莫测的技术，但借助像 EasyMock 这样强大的框架，我们可以通过为测试场景创建具有预定行为的模拟协作者环境，来真正隔离被测试的类。应用于测试
    EJB 的相同技术，也可以应用于任何依赖其他对象来完成其工作的对象。像 Spring 框架这样提倡面向接口编程的框架，是使用 EasyMock 等工具进行模拟对象测试的理想选择。


    **总结**


    在本章中，您已经了解了在开发过程早期为 Web 应用程序设置测试框架的重要性。通过采用分层测试方法，您可以确保应用程序的测试需求得到满足。使用像 JUnit
    和 TestNG 这样的测试框架，以及众多支持工具和框架，测试不再是项目末期令人畏惧的过程，而是迭代开发过程中活跃且主要的部分。


