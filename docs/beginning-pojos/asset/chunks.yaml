    '
- fmt: "# Using DynaDTO in a JSE Environment\n\nOnce you have the DTO interfaces and\
    \ the DynaDTO configurations in place, all you need to do to use them in a JSE\
    \ environment is to use the `DynaDTO ConfigurationLoader` to load the required\
    \ mappings. When working in a JSE environment, DynaDTO caches the DTO mappings\
    \ statically and then makes DTO builders available via the `BuilderFactory` class.\
    \ Using a particular builder returned from the factory, you can simply invoke\
    \ the `build` method passing an instance of the domain object in order to get\
    \ a fully populated DTO as shown in Listing 5-13.\n\n**Listing 5-13.** *Using\
    \ DynaDTO in a JSE Environment*\n\n```\nConfigurationLoader.loadMapping(new File(\"\
    ConferenceSummary.dto.xml\"));\nConfigurationLoader.loadMapping(new File(\"TrackSummary.dto.xml\"\
    ));\nConference conference = new Conference();\n\n// ... set object values\n\n\
    Builder builder = BuilderFactory.getInstance().getBuilder(ConferenceSummary.class);\n\
    ConferenceSummary conferenceSummary =\n(ConferenceSummary) builder.build(conference);\n\
    ```\n\n# DynaDTO in JBoss\n\nThe DynaDTO project provides for JBoss integration\
    \ via its DDTO deployer and DynaDTO Service. Via the DynaDTO Service you can have\
    \ a `DynaDTO BuilderFactory` object bound to JNDI. The DDTO deployer is a specialized\
    \ JBoss deployer that will scan a JAR archive with the extension `.ddto` and create\
    \ a `BuilderFactory` with any DynaDTO mappings found (`.dto.xml` files).\n\nThe\
    \ HAR should contain the Hibernate mappings, the class files being mapped, and\
    \ a JBoss service descriptor. Figure 5-11 shows the structure and contents of\
    \ the DDTO archive.\n\n**Figure 5-11.** *Structure of a JBoss DynaDTO DDTO archive*\n\
    \nListing 5-14 shows a typical `dynadto-service.xml` file for the TechConf application.\n\
    \n**Listing 5-14.** *DDTO Deployment Configuration via Dynadto-service.xml*\n\n\
    ```\n<mbean code=\"org.dynadto.jboss.deployment.DynaDTOService\"\n      name=\"\
    org.dynadto:service=DynaDTOService\">\n  <attribute name=\"BuilderFactoryName\"\
    >java:dynadto/BuilderFactory</attribute>\n  <attribute name=\"TestMappings\">false</attribute>\n\
    </mbean>\n```\n\nIn `dynadto-service.xml`, you’ll need to specify the JNDI name\
    \ used to bind the `DynaDTO BuilderFactory` object. For the purposes of the TechConf\
    \ application I created a skeleton directory for the DDTO under the directory\
    \ `dd/ddto` at the root of the project directory. This directory will be used\
    \ to create the DDTO archive with the Ant target shown in Listing 5-15, which\
    \ expands on the TechConf buildfile started in Chapter 3.\n\n**Listing 5-15.**\
    \ *Ant Buildfile Targets to Package DDTO Archive*\n\n```\n<property file=\"build.properties\"\
    />\n<property name=\"har-filename\" value=\"${app.name}.har\" />\n<property name=\"\
    har-file\" value=\"${dist}/${har-filename}\" />\n<property name=\"dd\" location=\"\
    dd\" />\n<property name=\"dd-dynadto\" location=\"${dd}/dynadto\" />\n<property\
    \ name=\"dd-ddto\" location=\"${dd}/ddto\" />\n\n<target name=\"package-ddto\"\
    \ depends=\"compile\"\n        description=\"Package the JBoss DynaDTO Archive\
    \ (DDTO)\">\n  <target-banner target=\"package-ddto\"/>\n  <jar jarfile=\"${ddto-file}\"\
    >\n    <fileset dir=\"${classes}\">\n      <include name=\"**/dto/*.class\"/>\n\
    \    </fileset>\n    <fileset dir=\"${dd-ddto}\">\n      <include name=\"**/*.xml\"\
    />\n    </fileset>\n    <fileset dir=\"${dd-dynadto}\">\n      <include name=\"\
    **/*.dto.xml\"/>\n    </fileset>\n  </jar>\n</target>\n\n<target name=\"package-ddto-clean\"\
    >\n  <delete file=\"${ddto-file}\"/>\n</target>\n```\n\nWith the Ant buildfile\
    \ modified, you can now execute the `package-ddto` to get the deployable archive\
    \ `techconf.ddto`. The DDTO archive can be deployed stand-alone or as part of\
    \ an EAR deployment. During deployment you will see messages similar to the ones\
    \ shown next. You should see all the mappings being processed.\n\n```\n00:23:12,859\
    \ INFO  [DynaDTOService] Creating DynaDTO Service\n00:23:12,859 INFO  [DynaDTODeployer]\
    \ Deploying .ddto; create; org.jboss.\ndeployment.DeploymentInfo@8ff608c3 { url=file:/C:/java/jboss-4.0.3RC1/server/\n\
    default/tmp/deploy/tmp33273techconf.ear-contents/techconf.ddto }\n00:23:18,671\
    \ INFO  [DynaDTOService] Starting DynaDTO Service org.dynadto.jboss.\ndeployment.DynaDTOService@1376afa\n\
    00:23:18,671 INFO  [DynaDTOService] Building BuilderFactory; org.dynadto.jboss.deployment.DynaDTOService@1376afa\n\
    00:23:18,687 INFO  [Configuration] Searching for mapping documents in jar: techconf.ddto\n\
    00:23:18,687 INFO  [Configuration] Found mapping documents in jar: AddressInfo.dto.xml\n\
    00:23:18,812 INFO  [Configuration] Found mapping documents in jar: AnswerInfo.dto.xml\n\
    00:23:18,828 INFO  [Configuration] Found mapping documents in jar: AttendeeInfo.dto.xml\n\
    00:23:18,828 INFO  [Configuration] Found mapping documents in jar: BlogEntry.dto.xml\n\
    00:23:18,843 INFO  [Configuration] Found mapping documents in jar: ConferenceSummary.dto.xml\n\
    ...\n00:23:18,921 INFO  [Configuration] Found mapping documents in jar: TrackSummary.dto.xml\n\
    00:23:18,921 INFO  [Configuration] Found mapping documents in jar: UserSummary.dto.xml\n\
    00:23:18,921 INFO  [DynaDTOService] Bound Dynadto Builder Factory to java:dynadto/\n\
    BuilderFactory\n00:23:18,921 INFO  [DynaDTOService] BuilderFactory successfully\
    \ built and bound into JNDI [java:dynadto/BuilderFactory]\n```\n\nTo access the\
    \ `BuilderFactory` you will again use the EJB3 annotation-based dependency injection\
    \ facility via the `@Resource` annotation. For example, to inject the `DynaDTO\
    \ BuilderFactory` object bound to `java:/dynadto/BuilderFactory`, we could use\
    \ code like that shown in Listing 5-16 from within an EJB3 SLSB.\n\n**Listing\
    \ 5-16.** *EJB3 Dependency Injection of a JNDI-bound DynaDTO BuilderFactory*\n\
    \n```\npackage com.integrallis.techconf.ejb;\n\nimport javax.annotation.Resource;\n\
    import javax.ejb.Stateless;\nimport org.dynadto.BuilderFactory;\n\n@Stateless\n\
    public class ConferenceServiceBean implements\n    ConferenceServiceLocal, ConferenceServiceRemote\
    \ {\n\n  @Resource(name = \"java:/dynadto/BuilderFactory\")\n  protected BuilderFactory\
    \ builderFactory;\n\n  ...\n```\n\n# Implementing Service Layer for TechConf\n\
    \nIn this section we will see how to put together TechConf service implementations\
    \ using EJB3-based DAOs and using a JNDI-bound DynaDTO builder factory. Let’s\
    \ take the Schedule Service as an example. The Schedule Service provides methods\
    \ to schedule/unschedule a conference session for a given user as well as create\
    \ email remainders which will be sent at a specified time before a scheduled session\
    \ start time. Listing 5-17 shows the `ScheduleService` Business Interface.\n\n\
    **Listing 5-17.** *Schedule Service Business Interface*\n\n```\npackage com.integrallis.techconf.service;\n\
    \nimport java.util.Date;\nimport java.util.List;\n\nimport com.integrallis.techconf.dto.ReminderInfo;\n\
    import com.integrallis.techconf.dto.ScheduleEntryInfo;\n\npublic interface ScheduleService\
    \ {\n  ScheduleEntryInfo scheduleSessionForUser(Integer userId, Integer sessionId);\n\
    \  void unscheduleSessionForUser(Integer scheduleEntryID);\n  List<ScheduleEntryInfo>\
    \ getScheduleForUser(Integer userId);\n  ReminderInfo createReminder(Integer scheduleEntry,\
    \ Date dateTime, String message);\n}\n```"
