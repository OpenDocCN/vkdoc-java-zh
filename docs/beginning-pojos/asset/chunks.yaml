    Pointcuts can be named (as in the example) or they can be anonymous. By naming
    a pointcut, you have the ability to reuse the pointcut in several advices, while
    an anonymous pointcut is used inline in the advice itself.


    The execution operator used in the first two elements of the pointcut captures
    the body of a method. A similar operator, the call operator, can also be used,
    which captures the execution point of a method before the call to method but after
    its arguments are evaluated.


    The within operator is used here to exclude the actual aspect from being adviced.
    This brings to attention two important concepts in an AOP implementation: advice
    precedence and the application of aspects against other aspects. These concepts
    are out of the scope of this chapter but should be kept in mind when developing
    more-advanced aspects.


    Finally the three cflow operators are used to exclude any code in the control
    flow of the execution of any hashCode, equals, and toString methods. The cflow
    operator is a control flow–


    based pointcut operator that is used to match join points in the execution flow
    or dynamic context of another join point, including the join point itself (to
    exclude the join point, use cflowbelow). The control flow operators are powerful
    since they give you the ability to follow the code as if you had control over
    a dynamic sequence diagram.


    With the pointcut defined, we can move to the implementation of the advice. AspectJ
    provides three kinds of advice: before advice, after advice, and around advice.
    The before and after advice types allow you to insert functionality before and
    after the execution of a join point. In the case of the LoggingAndTracing aspect
    advice, we’ll use the before and after advices to log statements reporting the
    beginning and end of a method’s execution. The code for the before and after advice
    is shown next:


