    Notice that we are not wrapping the DAO methods to catch any of the Hibernate-specific
    runtime exceptions (rooted at org.hibernate.HibernateException). In the advanced
    topics chapter, you’ll learn how to use aspect-oriented techniques to cleanly
    transform from the highly detailed Hibernate exception hierarchy to the TechConf
    data-access exception hierarchy.


    Figure 5-10 shows the simple exception hierarchy for the TechConf application.


    Inspired by the Spring framework, I’m using unchecked exceptions since most data-access
    exceptions are unrecoverable and with a clean exception hierarchy is necessary
    only to catch the specific exception of interest while disregarding the base exception
    class (which you cannot do with a checked exception hierarchy). An unchecked exception
    hierarchy also prevents the dreaded anti-pattern of catching-logging-rethrowing
    or the even worse pattern of caching-swallowing exceptions.


