    **63**


    **Datatypes**


    Ant’s datatypes are primitive constructs that provide frequently required information
    in the processing of a buildfile. Their purpose is to simplify a task by encapsulating
    some information required and providing a simple way to manipulate it.


    Several of Ant’s built-in datatypes provide a structure that encapsulates information
    about a set of related resources such as files, environment variables, or even
    complex mappings between input and output files. Knowing how to properly use the
    Ant’s datatypes will help you keep your buildfiles simple and efficient.


    Datatypes and Properties in Action: A Simple Example


    Many of Ant’s tasks need to manipulate a file or groups of files. A typical need
    in a build is to specify a set of JAR files to be included in the classpath for
    certain tasks. Imagine that you’re building a simple application with a directory
    structure, as shown in Figure 3-4.


    **Figure 3-4.** *Sample directory structure for datatypes and properties* The
    sample buildfile in Listing 3-5 shows a build for which two path structures (datatypes)
    are defined, one with an id of class.path and the other with and id of all.source.path.
    These two datatypes are then used in the target named “compile”, which uses the
    javac task to compile the classes referenced by the path reference by the id all.source.path.


    **Listing 3-5.** *Simple Ant Buildfile Showing Datatypes*


    <?xml version="1.0"?>


    <project name="My Project" default="all" basedir=".">


    ...


    <property name="lib" location="lib"/>


    <property name="src" location="src"/>


    <property name="classes" location="classes"/>


    <property name="build" location="build"/>


    <property name="src-java" location="${src}/java"/>


    <property name="src-test" location="${src}/test"/>


    <property name="some-lib" location="${lib}/some-lib"/>


    ...


    <path id="class.path">


    <fileset dir="${lib}">


    <include name="*.jar"/>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C03.fm Page 64 Wednesday, February 22, 2006 6:05 AM


    **64**


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    </fileset>


    <fileset dir="${some-lib}">


    <include name="*.jar"/>


    </fileset>


    </path>


    <path id="all.source.path">


    <pathelement path="${src-java}"/>


    <pathelement path="${src-test}"/>


    </path>


    ...


    <target name="compile" description="Compiles all sources.">


    ...


    <javac


    destdir="${classes}"


    classpathref="class.path"


    debug="on"


    deprecation="on"


    optimize="off">


    <src>


    <path refid="all.source.path"/>


    </src>


    </javac>


    </target>


    The class.path path structure uses two instances of the fileset datatype to group
    under a common classpath all the JAR files included in the directories referenced
    by the lib and struts-lib properties. The pathelement is an example of an indispensable
    datatype that enables you to reuse path information in your builds. The fileset
    datatype is a typical example of Ant’s pathlike structures. It encapsulates a
    group of files defined via nested patternset structures.


    For example, to create a fileset that includes all JAR files under the ${lib}
    directory, you can use the following fileset definition:


    <fileset dir="${lib}">


    <patternset>


    <include name="*.jar"/>


    </patternset>


    </fileset>


    The fileset datatype contains an implicit patternset structure, which means that
    you can use shorthand to rewrite the fileset definition as follows:


    <fileset dir="${lib}">


    <include name="*.jar"/>


    </fileset>


    We can further compact the fileset definition by using the include as a property
    rather than as a nested element:


    <fileset dir="${lib}" include="*.jar" />


