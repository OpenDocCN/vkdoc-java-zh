- fmt: "# Chapter 5: Business Services with JBoss\n\n**Listing 5-6.** `ConferenceDAOImpl`,\
    \ a Hibernate-specific Concrete DAO Implementation\n\n```java\npackage com.integrallis.techconf.dao.hibernate;\n\
    \nimport java.util.Date;\nimport java.util.List;\nimport javax.ejb.Stateless;\n\
    import org.hibernate.Criteria;\nimport org.hibernate.criterion.Restrictions;\n\
    import com.integrallis.techconf.dao.ConferenceDAO;\nimport com.integrallis.techconf.domain.Conference;\n\
    import com.integrallis.techconf.domain.Room;\n\n@Stateless\npublic class ConferenceDAOImpl\
    \ extends BaseAbstractDAO implements ConferenceDAO {\n\n    public ConferenceDAOImpl(SessionFactory\
    \ sessionFactory) {\n        super(sessionFactory);\n    }\n\n    public Conference\
    \ getConference(int conferenceId) {\n        return (Conference) getEntityById(Conference.class,\
    \ conferenceId);\n    }\n\n    public Conference getConferenceByName(String name)\
    \ {\n        return (Conference) findUniqueFiltered(Conference.class,\n      \
    \          Conference.PROP_NAME, name);\n    }\n\n    @SuppressWarnings(\"unchecked\"\
    )\n    public List<Conference> getActiveConferences(Date beginDate, Date endDate)\
    \ {\n        Criteria criteria = createCriteria(Conference.class)\n          \
    \      .add(Restrictions.between(Conference.PROP_START_DATE,\n               \
    \         beginDate, endDate))\n                .add(Restrictions.between(Conference.PROP_END_DATE,\n\
    \                        beginDate, endDate));\n        return criteria.list();\n\
    \    }\n\n    @SuppressWarnings(\"unchecked\")\n    public List<Conference> getActiveConferences(Date\
    \ date) {\n        Criteria criteria = createCriteria(Conference.class)\n    \
    \            .add(Restrictions.le(Conference.PROP_START_DATE, date))\n       \
    \         .add(Restrictions.ge(Conference.PROP_END_DATE, date));\n        return\
    \ criteria.list();\n    }\n\n    public void save(Conference conference) {\n \
    \       saveEntity(conference);\n    }\n\n    public void update(Conference conference)\
    \ {\n        updateEntity(conference);\n    }\n\n    public void delete(Conference\
    \ conference) {\n        deleteEntity(conference);\n    }\n\n    public void delete(int\
    \ conferenceId) {\n        deleteEntityById(Conference.class, conferenceId);\n\
    \    }\n\n    @SuppressWarnings(\"unchecked\")\n    public List<Conference> getAllConferences()\
    \ {\n        return findAll(Conference.class);\n    }\n\n    @SuppressWarnings(\"\
    unchecked\")\n    public List<Room> getRooms(int venueId) {\n        return findFiltered(Room.class,\
    \ \"Venue.Id\", venueId);\n    }\n}\n```\n\nNotice that we are not wrapping the\
    \ DAO methods to catch any of the Hibernate-specific runtime exceptions (rooted\
    \ at `org.hibernate.HibernateException`). In the advanced topics chapter, you’ll\
    \ learn how to use aspect-oriented techniques to cleanly transform from the highly\
    \ detailed Hibernate exception hierarchy to the TechConf data-access exception\
    \ hierarchy.\n\nFigure 5-10 shows the simple exception hierarchy for the TechConf\
    \ application.\n\nInspired by the Spring framework, I’m using unchecked exceptions\
    \ since most data-access exceptions are unrecoverable and with a clean exception\
    \ hierarchy is necessary only to catch the specific exception of interest while\
    \ disregarding the base exception class (which you cannot do with a checked exception\
    \ hierarchy). An unchecked exception hierarchy also prevents the dreaded anti-pattern\
    \ of catching-logging-rethrowing or the even worse pattern of caching-swallowing\
    \ exceptions.\n\n![Figure 5-10](images/00091.png)\n\n**Figure 5-10.** TechConf\
    \ DAO exception hierarchy\n\n## Implementing DTO Pattern with DynaDTO\n\nAnother\
    \ pattern that we typically find in an enterprise Java application is the Data\
    \ Transfer Object pattern (DTO), which is also known as the value object pattern.\
    \ DTOs are used when clients of the middle tier need to exchange data (traditionally\
    \ with an EJB-based service layer).\n\n### Background\n\nDTOs are typically lightweight\
    \ objects that are used for intertier communications. Generally, in object-oriented,\
    \ distributed, and middleware-driven Web applications there are three well-known\
    \ tiers connected by what I define as two transformation layers. The three tiers\
    \ are usually known as the *integration* tier (and/or the data tier), the *business*\
    \ tier (where the business/domain objects reside) and the *presentation* tier\
    \ (for a Web application this is the Web tier). Between these three tiers we typically\
    \ encounter two transformation layers:\n\n- **O/R Transformation Layer:** Between\
    \ a relational database and the middleware-hosted domain objects (collectively\
    \ referred to as the domain model)\n- **DTO Transformation Layer:** Between the\
    \ domain model and the user model. We define the user model as the collection\
    \ of objects that the Web tier manipulates to interact with the middle tier.\n\
    \nThe need for the DTO pattern became apparent to architects and developers based\
    \ on the problems that arise for the multitier, distributed characteristics of\
    \ many enterprise Java applications, including the following:\n\n- **Coarse-Grained\
    \ Entities:** Coarse-grained technologies like Entity EJBs are not meant to be\
    \ manipulated directly by the Web tier, since every access can potentially become\
    \ a remote call. Depending on temporal topology of an application (like collocation\
    \ or vendor-specific optimizations), it can lead to portability problems and a\
    \ brittle architecture.\n- **Fine-Grained Entities:** A well-designed domain model\
    \ reflects more about the problem domain than is normally exposed to a client.\
    \ A domain model should represent a subset of the knowledge about the problem/solution\
