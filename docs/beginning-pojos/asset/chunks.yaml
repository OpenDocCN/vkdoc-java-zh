    第 5 章


    ■ ■ ■


    使用 JBoss 的业务服务


    **在**过去的十年中，Java 在企业计算的服务器端一直占据主导地位。


    在当代企业开发中，J2EE 应用服务器处于核心位置，并已取代操作系统成为创建企业应用和服务的新抽象层。J2EE 架构代表了中间件技术的最高水平，它汲取了事务处理监控器（TP
    监控器）、对象请求代理（ORB）、组件技术、分布式计算以及关系数据库和对象数据库等领域的经验教训。Java 进入企业领域始于 Servlet API 的引入，随后是
    JavaServer Pages、早期的 EJB 组件模型以及大量的 Model-View-Controller 实现。


    这些技术帮助 Java 在 Web 应用领域赢得了竞争，但真正让企业客户接受的是 Java EE（原 J2EE）规范的更宏大愿景。Java EE 提供了一种统一的方式来处理企业面临的大局问题，例如目录服务、分布式事务、消息传递、可伸缩性和集成。作为企业计算技术栈的规范，Java
    EE 提供了一份广泛且令人印象深刻的技术清单，这些技术松散耦合却又紧密集成。

    '
- fmt: 'Like any technology that is mass-adopted, the shortcomings of the specification
    became apparent to those building database-driven web applications (which became
    the *raison d’etre* for the platform). These shortcomings were especially apparent
    in the areas of productivity and testability. `J2EE` was supposed to be about
    making simple things simple and the hard things possible, but it took some time
    for the specification to reach a level of maturity to realize that dream. `Java
    EE` was and still is a by-committee specification, and like any such entity, it
    moves at a snail’s pace. One of the problems with a rich platform like `Java EE`
    is that it offers too many tools and possibilities. Architects and developers
    alike started building simple applications using the then heavyweight `EJB` technology.
    In the early version of the `Java EE`, there were a few well-defined reasons to
    use `EJB`, such as distributed transactions and the need for remoteness. If you
    were using `EJB`s and your application didn’t meet those requirements, you were
    putting yourself and your team through a lot of unnecessary pain. Also, the component
    model proposed by `EJB` was too simplistic to create truly rich, object-oriented
    applications. While curtailing object-oriented expressiveness, previous incarnations
    of the `Enterprise JavaBeans` specification were too difficult and cumbersome
    to work. Besides the creation of the numerous deployment descriptors, they required
    the creation of many other “glue” files. The creation, maintenance, and synchronization
    of these files required a significant amount of overhead. Some applications servers
    even required platform-specific pre-compiling and packaging steps. All these factors
    added to a very steep learning curve for developers accustomed to working with
    rich, `POJO`-based `Java SE` applications or the simple `HTTP` wrappers provided
    by the `servlet` API or `JavaServer Pages`.


    Fortunately, the Java community voiced its opinion about the state of development
    created by the early `J2EE` specification. Developers started to notice that they
    could not express a rich business object model with `EJB`s, and they grew frustrated
    by the amount of steps required to deploy a simple service component or to make
    a domain entity persistent. Frameworks and techniques started to appear to deal
    with the cumbersomeness of the API. Most of the agile, lightweight Java frameworks
    revolved around the notion of working with `POJO`s, Plain Old Java Interfaces
    (`POJI`s), minimizing the amount of configuration, inversion of control (`IoC`;
    also known as dependency injection or `DI`), and dynamic rather than static provision
    of container services.


    Tools like `XDoclet` became a must-have for any development team looking to become
    productive with the API. These tools were crutches to deal with what was an apparent
    set of flaws in the specification. Frameworks like `Spring` showed what was possible
    by going back to basics, and rather than forcing your code to live by the rules
    of the environment (the `J2EE` container), you could have your code working unencumbered
    by the many services provided by the platform but with the ability to use them
    at will in a transparent way. Luckily for us, the complaints eventually made it
    into the specification via the `Java Community Process` (`JCP`) in the form of
    many `JSR`s influenced by what was wrong and what was missing in the world of
    `Java EE`.


    The main message is that writing `Java EE` applications had to be easier. The
    `JSR 220: Enterprise JavaBeans 3.0` sets out to “improve the `EJB` architecture
    by reducing its complexity from the developer’s point of view.” In this chapter
    we will explore the new world of development using the bleeding-edge technologies
    in the `Java EE 1.4` stack, specifically the `EJB3` specification as provided
    by the `JBoss Application Server`, a truly revolutionary vision of what the `Java
    EE` server of the future will be like.


    In this chapter we will focus on extracting the essential services and processes
    from the design of the `TechConf` system and translating them into a system of
    components and pattern implementations that provide business services to the user-facing
    areas of the system while allowing us to maintain a rich domain model that can
    evolve to meet future needs.


    ## JBoss


    The `JBoss Application Server` started life as the `EJBoss` project back in March
    of 1999. Spear-headed by Marc Fleury, a former Sun Microsystems engineer, and
    an enthusiastic group of programmers ready to embrace the then-new `EJB` specification,
    it has grown to be the most popular open source application server in the market
    and a worthy contender to the likes of `BEA WebLogic` and `IBM WebSphere` (the
    two commercial leaders in the market).


    Distributed under the `GNU Lesser General Public License` (`LGPL`), `JBoss` is
    a 100-percent compliant clean-room implementation that provides the full gamut
    of `Java EE` services. It is built on a pluggable architecture that leverages
    the `JMX` specification (`Java Management Extensions`) and advances in software
    engineering such as aspect-oriented programming (`AOP`) and (`DI`)/`IoC` techniques.
    `JBoss` was also one of the first application servers tailored to developers,
    with dynamic features like hot deployment and on-the-fly flexibility, for example,
    the ability to load and unload libraries at runtime and dynamic generation of
    container stubs and skeletons. Many of these features are still not found in some
    commercial offerings.


    ### JBoss JEMS


    `JBoss` is more than an application server, it is a full-featured platform for
    enterprise development providing the full `Java EE` stack of services under the
    umbrella of the `JBoss Enterprise Middleware System` (`JEMS`) brand. Positioned
    as a professionally supported choice for enterprises looking to implement a truly
    “service-oriented architecture” (`SOA`) built upon a foundation of reliable, battle-tested
    middleware components.


    The `JEMS` products comprise an impressive list of offerings, including the following:


    - **JBoss AS:** `JBoss Application Server`

    - **Apache Tomcat:** `Apache Tomcat` Web container

    - **Hibernate:** Object-relational persistence and query service

    - **JBoss Portal:** Portal platform providing content aggregation and personalization
    based on the `Porlet Specification` (`JSR-168`). It evolved from the `JBoss Nukes`
    project

    - **JBoss jBPM:** A powerful workflow and business process management engine

    - **JBoss Rules:** Business rules engine based on the `Drools Rule Engine`

    - **JBoss Cache:** Clustered, distributed object cache

    - **JBoss Eclipse IDE:** A set of `Eclipse` plug-ins to develop `JBoss Java EE
    1.4` applications


    ### JBoss AS Architecture


    `JBoss AS` is built on a foundation that uses the `JMX` API to deliver a lightweight
    microkernel layer that provides an `MBean`-based component model that enables
    the lifecycle management of `MBean`-based services and provides an advanced and
    flexible class loading scheme.


    The `JMX` specification allows the control and configuration of managed beans,
    or `MBeans`.'
