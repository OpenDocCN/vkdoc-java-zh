    Sam-Bodden_596-3 C01.fm Page 2 Wednesday, February 22, 2006 6:01 AM


    **2**


    C H A P T E R 1 ■ I N T R O D U C T I O N


    Open source is also changing the way programming is being studied in universities
    around the world; new generations of programmers leaving academia and entering
    the workplace have either used or contributed to open source. Students nowadays
    can learn by examining enterprise-level software that displays contributions from
    many sources from around the world.


    At corporate IT departments worldwide, programmers are rallying behind open source
    projects like `Ant`, `JUnit`, `Apache Tomcat`, `Spring Framework`, and `JBoss`.
    The battle for the acceptance of open source has been largely fought at the level
    of the programmer and middle management. However, upper management, given the
    recent impact of Linux on corporations, is beginning to see the many advantages
    of open source, especially in the area of enterprise Java.


    Organizations seeking to reduce software development expenses have found that
    open source software (OSS) provides a lower cost of ownership when compared to
    commercial offerings, primarily because open source software is free, both in
    price and restrictions.


    One of the reasons the open source community is so prolific is because all but
    the most trivial software is difficult and expensive to produce, and the canned
    solutions provided by commercial products often fail to provide a complete solution.
    The complexity of building software systems is a direct consequence of the nature
    of real-world business problems, which are driven by changing requirements, rapidly
    evolving technologies, multiple data sources, service-level agreements, interoperability,
    time to market, return on investment, and many other factors. The inability to
    cope with and balance all these forces results in projects that go over budget,
    are late, and in most cases fail to meet functionality expectations. These projects
    quickly spiral out of control due to their inability to cope with complexity and
    change.


    Even if such systems deliver in a specific area of business functionality, their
    overall business value is diminished by their maintenance costs. These horror
    stories aren’t rare; on the contrary, they’re the norm. One survey found that
    84 percent1 of all enterprise software systems are considered failures. This failure
    rate is a characteristic signature of the “software crisis” that’s plaguing the
    industry. Projects fail due to a combination of poor engineering and management
    choices. A 2002 study by the Carnegie Mellon Software Engineering Institute (SEI)
    lists the following top 10 reasons why software projects fail:


    • Inexperienced staff


    • Lack of team cohesion and experience


    • Lack of emphasis in using modern software-engineering practices


    • Lack of a process or incorrect emphasis in the application of a process


    • Inadequate project management methodology


    • Unclear, misunderstood, and undiscovered requirements


    • Size (the larger the projects the more likely they are to fail)


    • Lack of planning and estimating


    • System-specific and technology-related issues being considered too late in the
    process


    • New technologies and unforeseen problems


    1\. According to a Standish Group survey, which studied about 8,000 software projects
    in the US in 1995.'
