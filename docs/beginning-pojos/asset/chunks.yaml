    第 9 章 ■ 持续集成


    **图 9-1.** *持续集成的典型设置* **配置构建服务器**


    要设置 TechConf 构建服务器，我们需要一台配置了 Java、CruiseControl、一个 Web 容器（例如 Tomcat 或 Jetty）以及
    Ant 构建工具的机器。


    在本章中，我使用的是一台配置了 Fedora Linux Core 4 的机器。安装说明针对该平台进行了定制，但应与其他平台类似。


    第一步是下载 CruiseControl 的二进制发行版，并将文件解压到合适的位置。对于 Linux 系统，我建议将 CruiseControl 放在 opt
    目录下。对于版本 2.3.1，路径为 /opt/cruisecontrol-2.3.1。我发现创建一个指向该目录的符号链接并将其命名为 /opt/cruisecontrol
    会很方便。通常，如果你有某个产品的多个版本，就会这样做，从而使符号链接指向你希望在系统中使用的最新或默认版本。


    **CruiseControl 工作目录**


    下一步是创建 CruiseControl 工作目录。对于示例 Linux 系统，我使用了 /opt/cc-working-dir。在工作目录下，创建以下目录：


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00062.png)


    Sam-Bodden_596-3 C09.fm Page 349 Thursday, February 16, 2006 3:35 PM


    第 9 章 ■ 持续集成


    **349**


    • **checkout：** 此目录将包含正在构建的项目的源代码（要构建的源文件）

    • **logs：** 此目录是 CruiseControl 存储关于正在构建的应用程序的日志和报告的地方（关于每次构建的详细信息）

    • **artifacts：** 此目录用于保存构建产生的任何输出文件（构建产物，如 JAR、WAR 和 EAR）


    在工作目录的根目录下，创建一个名为 config.xml 的文件，内容如下：


    <cruisecontrol></cruisecontrol>


    要在 Linux 下成功运行 CruiseControl，请遵循以下步骤： **1.** 在工作目录中，创建 CruiseControl 目录下 webapps
    目录的符号链接。


    **2.** 编辑 CruiseControl 目录下的 shell 脚本 cruisecontrol.sh，并将变量 CC_DIR 的值更改为 /opt/cruisecontrol（或你解压
    CruiseControl 存档的位置）。


    **3.** 将 CruiseControl 目录添加到系统的执行路径中。你可以通过运行 shell 命令 `export PATH=/opt/cruisecontrol:$PATH`
    来实现。


    **4.** 确保系统已定义 `JAVA_HOME` 环境变量，并且 Java 可执行文件位于系统的执行路径中。


    **5.** 为 shell 脚本 cruisecontrol.sh 设置可执行权限。


    CruiseControl 工作目录应如图 9-2 所示。


    **图 9-2.** *CruiseControl 工作目录*


    要测试安装，请切换到工作目录并执行 cruisecontrol.sh 脚本。输出应类似于以下内容：


