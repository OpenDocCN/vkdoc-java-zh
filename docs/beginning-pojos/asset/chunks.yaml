    the exact contents of the files containing errors


    • **Advanced Form Handling:** The ability to cancel forms, therefore bypassing
    client-side validation logic, and the ability to invoke an alternate “cancellation”
    listener on the server side


    • **Server-side State:** In contrast to objects holding application state being
    limited to the old Global and Visit objects, a removal of the limit to the number
    of application state objects


