    **62**


    第 3 章 ■ 使用 ANT 进行构建


    设置属性值最简单的方法是使用 `property` 任务。例如，要设置一个名为 `src` 的属性（稍后可通过 `${src}` 访问），你可以按如下方式使用
    `property` 任务：


    <property name="src" location="src" /> `src` 属性将是一个绝对路径，指向相对于 `basedir` 目录的 `src`
    目录位置。


    ■**最佳实践** 应谨慎使用属性。属性的两个主要用途是：用于那些值可能在每次构建之间发生变化的项，或者用于那些在构建过程中被计算并多次使用的项。


    许多 Ant 属性也是隐式可用的，它们由系统属性组成，例如 `${java.version}`。


    对于任何非最简单的项目，你可以使用 `property` 任务的 `file` 属性加载一个属性文件，从而考虑到用户配置的差异，如下所示：


    <property file="build.properties"/>


    其他直接处理属性的任务包括：


    • **LoadProperties：** 将文件内容作为属性加载（等同于为 `property` 任务使用 `file` 属性）。

    • **LoadFile：** 将文本文件加载到单个属性中。

    • **XMLProperty：** 从 XML 文件加载属性。有关 XML 文件的具体格式，请参阅 Ant 文档。

    • **EchoProperties：** 显示项目中所有可用的属性。


    许多其他任务使用属性作为传入或传出参数的方式。例如，一种常见做法是，任务有一个属性，该属性接受一个尚不存在的属性名称，以便在特定事件（例如任务可能失败）发生时设置该属性。


    ■**最佳实践** 我建议使用名为 `build.properties` 的属性文件来存储任何被覆盖的默认值。此属性文件不应保存在源代码仓库中，而应添加一个名为
    `build.properties.sample` 的示例属性文件，并附上如何配置个人 `build.properties` 文件的说明。


