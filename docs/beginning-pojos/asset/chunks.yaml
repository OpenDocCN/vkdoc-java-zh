    **7**


    • **征稿启事：** 潜在演讲者应能够为某个分会场提交摘要。


    系统应允许演讲者选择目标受众、分会场主题（分会场类别）以及分会场的场地需求。


    • **演讲者空闲时间：** 演讲者应能够安排“办公”时间，在此期间他们可以解答与会者关于分会场的问题或疑惑。


    • **演讲者著作：** 已出版书籍的演讲者可以从其已出版著作列表中选择一本或多本书籍，并将其与某个分会场关联。该书籍列表将作为分会场信息的一部分呈现。书籍列表及每本书的详细信息将在运行时从外部提供商获取。


    **赞助商**


    赞助商为会议提供资金支持。他们的兴趣源于公众曝光度的回报和行业形象的提升。这为他们提供了与社区建立联系的机会，并搭建了展示其产品和服务的平台。


    知名行业参与者作为赞助商的加入，能够提升技术会议的权威性。


    确保赞助商能够轻松参与会议，对会议的成功至关重要。


    • **注册：** 系统应允许赞助商注册并选择赞助级别。


    • **展位选择：** 系统应允许赞助商选择会议展位。展位根据赞助级别进行分配。


    **管理员**


    管理会议中复杂的互动是一项具有挑战性的工作。系统的目标之一是简化管理任务并减少所需人员数量。


    • **签到与注册：** 管理员需要在与会者到达会议现场时为其办理签到，并发放胸牌及其他材料。


    • **演讲者评估：** 系统应为管理员提供创建和查看演讲者评估结果的功能。


    • **新闻：** 管理员应拥有便捷的界面来更新会议相关新闻。


    • **展位分配：** 管理员应能够根据赞助级别和物理需求为赞助商选择展位。


    • **会议闭幕：** 必须为会议管理员提供一个界面，以便轻松将选定内容转换为静态网站。特定数据将成为历史数据，必须进行适当迁移或归档。


    • **仪表盘：** 必须为会议管理员提供工具，用于收集会议的统计数据和绩效指标。这些工具应能提供会议整体健康状况和成功指标的概览视图。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C01.fm Page 8 Wednesday, February 22, 2006 6:01 AM


    **8**


    第 1 章 ■ 引言


    **架构需求**


    架构需求指的是系统为实现预期业务目标所必须具备的基础设施需求。确定这些需求涉及多种因素，例如技术人员在类似系统上的经验、运营约束、现有物理基础设施以及跨多个系统所需的应用程序服务（横切关注点）。在选择用于构建企业应用程序的产品或产品集时，这些需求有助于进行基础设施功能差距分析。架构师的工作是随后做出“自建”与“购买”的决策。


    根据前述通用应用需求以及构建类似系统时积累的经验，可以列出一组通用的架构需求。


    • **数据管理与持久化：** 数据必须易于存储、检索、搜索和修改。当多个数据源试图修改同一数据时，数据完整性不应受到损害。

