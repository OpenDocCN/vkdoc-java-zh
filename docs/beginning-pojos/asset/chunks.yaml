    **Figure 4-1.** *Hibernate architecture*


    As you can see from Figure 4-1, how much of Hibernate you use depends on your
    needs.


    At its simplest level Hibernate provides a lightweight architecture that deals
    only with ORM.


    Full-blown usage of Hibernate fully abstracts most aspects of persistence, such
    as transaction, entity/query caching, and connection pooling. To learn more about
    Hibernate’s architecture go to www.hibernate.org/hib_docs/v3/reference/en/html/architecture.html.


    **How Hibernate Works**


    Hibernate’s success lies in the simplicity of its core concepts. At the heart
    of every interaction between your code and the database lies the Hibernate Session.
    Figure 4-2 provides an overview of how Hibernate works.


