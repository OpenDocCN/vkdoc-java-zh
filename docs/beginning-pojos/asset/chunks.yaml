    C H A P T E R 1


    ■ ■ ■


    Introduction


    Whether you are new to the Java Platform, Enterprise Edition (Java EE) or have
    been at it for a few years now, your experience may be like mine— working with
    the platform with just what the specifications provide will quickly drive you
    insane! The Java EE specification did not foresee that with the power that it
    was unleashing unto developers it was also adding a plethora of problems. These
    problems are more related to the process of designing, building, and maintaining
    a distributed application than with the actual APIs. That’s where open source
    comes into play. The projects showcased in this book have been created to ease,
    support, speed up, and enhance the building of Java EE applications.


    This book is primarily about tapping into the large set of open source resources
    available to you, the developer. Particularly when it comes to the Java EE platform,
    open source is leading the pack and going beyond the confines of the specifications
    by providing technical innovations not seen in commercial products, as well as
    a solid and stable infrastructure for enterprise-level applications. In recent
    years parts of the Java EE specification have come under fire from many industry
    experts, and this has resulted in the emergence of many lightweight frameworks
    and containers as well as an abundance of supporting tools that fill in the gaps
    in the specifications.


    The question that most developers are stuck with nowadays is whether they need
    a Java EE application server altogether. The reality is that most of the lightweight
    frameworks available do not attempt to replace every function that an application
    server provides, but they provide alternative ways to tap into the application
    server resources. Most experts complain about applications using an Enterprise
    JavaBeans (EJB) container when they simply need a Web container, and I fully agree
    with them on this point, until the EJB3 specification has been finalized.


    As you’ll see in Chapter 5, the EJB3 specification will enable the building of
    truly POJO-based distributed, multitier applications that can easily grow based
    on demand.


    We will also explore the world of lightweight frameworks, and compare and contrast
    how the different approaches can fit different application needs and different
    development teams.


    **The Java EE Market**


    To fully understand some of the forces behind the changes in the Java EE world,
    a quick look at the market evolution is needed. The Java EE market has evolved
    swiftly, first by going through a phase of consolidation and now by entering a
    phase of commoditization. This second phase has been driven largely by the fact
    that in order to show value, application server vendors can no longer rely on
    their core application server. This has created a market of value-added offerings,
    particularly in the area of development tools and development productivity. Many
    of the open source tools and frameworks showcased in this book are in this category.


    **1**


