- fmt: "```java\npublic String add(IRequestCycle cycle) {\n    IValidationDelegate\
    \ delegate = (IValidationDelegate) getBeans().getBean(\"delegate\");\n    if (delegate.getHasErrors())\
    \ return null;\n    // if it passes validation then register them\n    setUser(getUserService().registerAttendee(getUser()));\n\
    \    // back to the page\n    return \"attendee/Register\";\n}\n\npublic abstract\
    \ void setUser(AttendeeInfo i);\npublic abstract AttendeeInfo getUser();\npublic\
    \ abstract UserService getUserService();\npublic abstract BuilderFactory getBuilderFactory();\n\
    ```\n\nThe `add` method processes the form submission. It first checks the form\
    \ for errors using the validation delegate, and if there are no errors, it uses\
    \ the `UserService` to invoke the `registerAttendee` method passing the `AttendeeInfo`\
    \ DTO populated with the form data.\n\n## Page Specification\n\nThe `Register`\
    \ page will use the `UserService` EJB3 service to attempt to register a new user\
    \ and the `DynaDTO` builder to create the instance of the `AttendeeInfo` DTO (and\
    \ the enclosed `AddressInfo` DTO). Therefore we need to make the service available\
    \ to the page by injecting it in the page specification as shown next:\n\n```\n\
    <inject property=\"userService\" object=\"service:app.UserService\"/>\n```\n\n\
    To inject the `DynaDTO` builder factory, we need to first define it in the `hivemodule.xml`\
    \ file as follows:\n\n```\n<service-point id=\"DynaBuilderFactory\" interface=\"\
    org.dynadto.BuilderFactory\">\n    <invoke-factory service-id=\"app.JndiLookupFactory\"\
    >\n        <construct resource=\"java:/dynadto/BuilderFactory\" />\n    </invoke-factory>\n\
    </service-point>\n```\n\nThe service point `app.JndiLookupFactory` is another\
    \ custom HiveMind service created for the TechConf application that, similar to\
    \ the `EJB3Factory`, does a simple JNDI lookup to return an object. Since the\
    \ `DynaDTO` builder factory is available in the JNDI tree as shown in Chapter\
    \ 5, we can use this HiveMind service to locate it. In the `Register` page definition\
    \ we inject the `builderFactory` property as follows:\n\n```\n<inject property=\"\
    builderFactory\"\n    object=\"service:app.DynaBuilderFactory\"/>\n```\n\nIn the\
    \ page definition for the `Register` page, we define the components for the fields\
    \ and labels used in the HTML template and any validation required. The simplest\
    \ type of validator is the required validation which is shown in Listing 7-33.\n\
    \n**Listing 7-33.** *Simple Field Validation in the Register Page Specification*\n\
    \n```\n<component id=\"firstName\" type=\"TextField\">\n    <binding name=\"value\"\
    \ value=\"ognl:user.firstName\"/>\n    <binding name=\"validators\" value=\"validators:required\"\
    />\n    <binding name=\"displayName\" value=\"literal:First Name\"/>\n</component>\n\
    <component id=\"firstNameLabel\" type=\"FieldLabel\">\n    <binding name=\"field\"\
    \ value=\"component:firstName\"/>\n</component>\n```\n\nTapestry includes other\
    \ specific validators such an email validator. Listing 7-34 shows the component\
    \ definition for the email field of the form. The email validator takes as a parameter\
    \ a message that will be displayed (by the validation delegate). Validator messages\
    \ are enclosed in square brackets.\n\n**Listing 7-34.** *Format and Length Field\
    \ Validation in the Register Page Specification*\n\n```\n<component id=\"email\"\
    \ type=\"TextField\">\n    <binding name=\"value\" value=\"ognl:user.email\"/>\n\
    \    <binding name=\"validators\"\n        value=\"validators:required,email[You\
    \ must enter a valid email]\"/>\n    <binding name=\"displayName\" value=\"literal:Email\"\
    />\n</component>\n...\n<component id=\"password\" type=\"TextField\">\n    <binding\
    \ name=\"value\" value=\"ognl:user.password\"/>\n    <binding name=\"validators\"\
    \n        value=\"validators:required,maxLength=16[You must enter a password no\
    \ longer than 16 characters]\"/>\n    <binding name=\"displayName\" value=\"literal:Password\"\
    />\n    <binding name=\"hidden\" value=\"true\"/>\n</component>\n```\n\nFinally,\
    \ in the page specification we need to declare the bean with id `delegate` used\
    \ in the `AjaxForm` delegate attribute. The default validation delegate class\
    \ is `org.apache.tapestry.valid.ValidationDelegate`. See Listing 7-35.\n\n**Listing\
    \ 7-35.** *Format and Length Field Validation in the Register Page Specification*\n\
    \n```\n<bean name=\"delegate\"\n    class=\"org.apache.tapestry.valid.ValidationDelegate\"\
    \ property=\"delegate\"/>\n```\n\nFigure 7-24 shows the result of pressing Enter\
    \ in the First Name input field. In this case the form gets submitted using an\
    \ AJAX request, and the error message is displayed dynamically using the “yellow\
    \ fade effect”, which is a popular technique for letting users know that something\
    \ has changed on a page.\n\n**Figure 7-24.** *AJAX field validation in action*\n\
    \nThe field validation messages appear from top to bottom, one at a time. As you\
    \ correct an error, the error disappears with a fade effect, and the next error\
    \ from top to bottom is displayed (if there are any errors remaining on the form).\n\
    \nSubmitting the form by clicking the Submit button uses the `ErrorDisplay` component\
    \ to display the error messages. The validation delegate also decorates the fields\
    \ in error by changing the color of the field labels and adding two asterisks\
    \ next to the field. Figure 7-25 shows the result of submitting the form with\
    \ only the First Name and Last Name fields completed and an error in the syntax\
    \ of the email field (two @ signs back).\n\n**Figure 7-25.** *Tapestry validation\
    \ and ErrorDisplay component*\n\n## ZIP Code, City, and State Auto-completion\n\
    \nThe next AJAX function we’ll tackle is the auto-complete function, popular for\
    \ decades with fat, rich-client applications and made popular on the Web by Google.\
    \ In the case of the `Register` page, we want to show a drop-down of possible\
    \ matches for a ZIP code as the user enters information. After the user selects\
    \ a particular ZIP code we want to drop the values for the city and the state\
    \ in their respective fields.\n\nOn the server side, we’ll use the EJB3 service\
    \ location lookup service that can retrieve a list of locations given a partial\
    \ ZIP code, as shown in Listing 7-36.\n\n**Listing 7-36.** *LocationLookupService\
    \ Interface*\n\n```java\npublic interface LocationLookupService {\n    List<Location>\
    \ searchLocations(String zipCode);\n    ...\n}\n```\n\nTo get started, we need\
    \ to inject the location lookup service to the Service page configuration as shown\
    \ here:\n\n```\n<inject property=\"locationLookupService\"\n    object=\"service:app.LocationLookupService\"\
    />\n```\n\nTo implement auto-completion on the ZIP code, we use the Tacos `Autocompleter`\
    \ component. Behind the scenes, the `Autocompleter` component uses the `script.aculo.us`\
    \ library `Autocompleter` functionality, which is a class that allows for auto-complete\
    \ pull-down behavior driven by a remote request. Table 7-4 shows the parameters\
    \ of the `Autocompleter` component.\n\n**Table 7-4.** *Tacos Autocompleter Parameters*\n\
    \n| Parameter | Description |\n| --- | --- |\n| `displayName` | The text for the\
    \ associated field label |\n| `value` | The object property this value is bound\
    \ to |\n| `listSource` | The list that provides the values for the drop-down |\n\
    | `listener` | The method that will respond to user input |\n| `listItemRenderer`\
    \ | The class responsible of rendering the elements of the drop-down |\n| `direct`\
    \ | Whether or not to do a direct service call for component |\n| `frequency`\
    \ | Time lapse in milliseconds before the component will submit |\n| `afterUpdateElement`\
    \ | (Not described in the original text) |"
