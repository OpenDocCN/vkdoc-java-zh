    \n```java\npackage com.integrallis.techconf.ejb.dao.hibernate;\n\nimport java.io.Serializable;\n\
    import java.util.List;\nimport javax.annotation.Resource;\nimport org.hibernate.Criteria;\n\
    import org.hibernate.Query;\nimport org.hibernate.Session;\nimport org.hibernate.SessionFactory;\n\
    import org.hibernate.criterion.Expression;\nimport org.hibernate.criterion.Order;\n\
    \n/**\n * Wraps some basic Hibernate methods to simplify the concrete\n * DAO\
    \ implementations\n */\npublic abstract class BaseAbstractDAO {\n\n    public\
    \ static final int SESSION_RETRIEVAL_STRATEGY_USE_CURRENT = 0;\n    public static\
    \ final int SESSION_RETRIEVAL_STRATEGY_CREATE_NEW = 1;\n\n    @Resource(name =\
    \ \"java:/hibernate/SessionFactory\")\n    protected SessionFactory sessionFactory;\n\
    \n    public BaseAbstractDAO() {}\n\n    public BaseAbstractDAO(int sessionRetrievalStrategy)\
    \ {\n        this.sessionRetrievalStrategy = sessionRetrievalStrategy;\n    }\n\
    \n    public void setSessionRetrievalStrategy(int sessionRetrievalStrategy) {\n\
    \        this.sessionRetrievalStrategy = sessionRetrievalStrategy;\n    }\n\n\
    \    protected void setSessionFactory(SessionFactory sessionFactory) {\n     \
    \   this.sessionFactory = sessionFactory;\n    }\n\n    protected Session getSession()\
    \ {\n        return sessionFactory.getCurrentSession();\n    }\n\n    protected\
    \ Criteria createCriteria(Class clazz) {\n        return getSession().createCriteria(clazz);\n\
    \    }\n\n    protected Query createQuery(String query) {\n        return getSession().createQuery(query);\n\
    \    }\n\n    protected Object getEntityById(Class clazz, Serializable id) {\n\
    \        return getSession().get(clazz, id);\n    }\n\n    protected void saveEntity(Object\
    \ entity) {\n        getSession().persist(entity);\n    }\n\n    protected void\
    \ saveOrUpdateEntity(Object entity) {\n        getSession().saveOrUpdate(entity);\n\
    \    }\n\n    protected void updateEntity(Object entity) {\n        getSession().update(entity);\n\
    \    }\n\n    protected void deleteEntity(Object entity) {\n        getSession().delete(entity);\n\
    \    }\n\n    protected void deleteEntityById(Class clazz, Serializable id) {\n\
    \        Object entity = getEntityById(clazz, id);\n        if (entity != null)\
    \ {\n            deleteEntity(entity);\n        }\n    }\n\n    protected List\
    \ findAll(Class clazz) {\n        return getSession().createCriteria(clazz).list();\n\
    \    }\n\n    protected List findAll(Class clazz, String orderBy) {\n        return\
    \ getSession()\n                .createCriteria(clazz)\n                .addOrder(Order.asc(orderBy))\n\
    \                .list();\n    }\n\n    protected List findFiltered(Class clazz,\
    \ String property, Object filter) {\n        return getSession()\n           \
    \     .createCriteria(clazz)\n                .add(Expression.eq(property, filter))\n\
    \                .list();\n    }\n\n    protected List findFiltered(Class clazz,\
    \ String property, Object filter, String orderBy) {\n        return getSession()\n\
    \                .createCriteria(clazz)\n                .add(Expression.eq(property,\
    \ filter))\n                .addOrder(Order.asc(orderBy))\n                .list();\n\
    \    }\n\n    protected Object findUniqueFiltered(Class clazz, String property,\
    \ Object filter) {\n        return getSession()\n                .createCriteria(clazz)\n\
    \                .add(Expression.eq(property, filter))\n                .uniqueResult();\n\
    \    }\n\n    protected Object findUniqueFiltered(Class clazz, String property,\
    \ Object filter, String orderBy) {\n        return getSession()\n            \
    \    .createCriteria(clazz)\n                .add(Expression.eq(property, filter))\n\
    \                .addOrder(Order.asc(orderBy))\n                .uniqueResult();\n\
    \    }\n}\n```\n\n`Listing 5-6` shows the class `ConferenceDAOImpl`, which is\
    \ a Hibernate-specific EJB3 SLSB implementation of the `ConferenceDAO` interface.\
    \ By making the DAO implementation SLSBs, we gain the ability to inject the `SessionFactory`\
    \ into the DAO implementations using annotations (as well as the ability to inject\
    \ the DAO implementations into the service implementations), and also we get pooling,\
    \ which in most application servers can be controlled declaratively in a per-deployment\
    \ fashion to (most likely) match the pooling characteristics of the SLSBs that\
    \ will be using the DAO beans."
