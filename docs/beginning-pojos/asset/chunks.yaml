    \ how simple it is to map a simple POJO to a database table and interact with\
    \ your data in an object-oriented fashion, it is time to move on to the development\
    \ of the sample application. In a real application there will be not only a lot\
    \ of simple mappings but also a lot of more complex situations involving more\
    \ advanced ORM concepts. In this section we will tackle the development of the\
    \ methods used by the TechConf application to retrieve and store data. As we flesh\
    \ out each method, we will take a look at the POJOs involved, the HBM mappings,\
    \ and the associated tables and its columns.\n\nMost of the persistence code that\
    \ we will develop in this section will eventually be used in the DAO layer of\
    \ the TechConf application. We will cover in great detail this important pattern\
    \ when we build the business tier of the TechConf application.\n\n## Conferences\
    \ Home Page\n\nThe entry point into the TechConf system will be a page where the\
    \ public can see the list of available conferences. A class diagram showing the\
    \ `Conference` class and its relevant associations is shown in Figure 4-13.\n\n\
    **Figure 4-13.** *Conference class and its associations*\n\nAs you can see from\
    \ Figure 4-13, a conference can have one or more tracks (for example, a Java conference\
    \ could have a JSE, JEE, and JME tracks) and a venue. Listing 4-14 shows the SQL\
    \ statements needed to create the `CONFERENCE`, `VENUE`, and `TRACK` tables.\n\
    \n**Listing 4-14.** *SQL Create Statements for Tables ADDRESS, VENUE, CONFERENCE,\
    \ and TRACK*\n\n```sql\nCREATE TABLE ADDRESS (\n    PK_ID INTEGER NOT NULL PRIMARY\
    \ KEY AUTO_INCREMENT,\n    STREETADDRESS VARCHAR(64),\n    APTNUMBER VARCHAR(32),\n\
    \    CITY VARCHAR(32),\n    STATE CHAR(2),\n    ZIPCODE VARCHAR(10)\n);\n\nCREATE\
    \ TABLE VENUE (\n    PK_ID INTEGER NOT NULL PRIMARY KEY AUTO_INCREMENT,\n    NAME\
    \ VARCHAR(32),\n    PHONE VARCHAR(12),\n    FAX VARCHAR(12),\n    FK_ADDRESS_ID\
    \ INTEGER NOT NULL,\n    CONSTRAINT VENUE_ADDRESS_FK FOREIGN KEY(FK_ADDRESS_ID)\
    \ REFERENCES ADDRESS(PK_ID),\n    CONSTRAINT UNIQUE_VENUE_NAME UNIQUE(NAME)\n\
    );\n\nCREATE TABLE CONFERENCE (\n    PK_ID INTEGER NOT NULL PRIMARY KEY AUTO_INCREMENT,\n\
    \    NAME VARCHAR(64) NOT NULL,\n    DESCRIPTION LONGTEXT NOT NULL,\n    STARTDATE\
    \ DATETIME NOT NULL,\n    ENDDATE DATETIME NOT NULL,\n    ABSTRACTSUBMISSIONSTARTDATE\
    \ DATETIME NOT NULL,\n    ABSTRACTSUBMISSIONENDDATE DATETIME NOT NULL,\n    FK_VENUE_ID\
    \ INTEGER,\n    CONSTRAINT CONFERENCE_VENUE_FK FOREIGN KEY(FK_VENUE_ID) REFERENCES\
    \ VENUE(PK_ID),\n    CONSTRAINT UNIQUE_CONFERENCE_NAME UNIQUE(NAME)\n);\n\nCREATE\
    \ TABLE TRACK (\n    PK_ID INTEGER NOT NULL PRIMARY KEY AUTO_INCREMENT,\n    TITLE\
    \ VARCHAR(32) NOT NULL,\n    SUBTITLE VARCHAR(32),\n    DESCRIPTION LONGTEXT,\n\
    \    FK_CONFERENCE_ID INTEGER NOT NULL,\n    CONSTRAINT TRACK_CONFERENCE_FK FOREIGN\
    \ KEY(FK_CONFERENCE_ID) REFERENCES CONFERENCE(PK_ID),\n    CONSTRAINT UNIQUE_TRACK_TITLE\
    \ UNIQUE(TITLE)\n);\n```\n\nLet's start by creating the `Conference` POJO as shown\
    \ in Listing 4-15. As you can see the `Conference` class has a typed `java.util.Set`\
