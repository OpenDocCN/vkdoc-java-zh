    **使用 Tacos 实现 AJAX**


    不，我们不是在谈论 Taco Bell 可能推出的致命新混合物。术语 AJAX 是当今的热门流行词，代表异步 JavaScript 和 XML，由旧金山设计和用户体验咨询公司
    Adaptive Path 的 Jesse James Garrett 于 2005 年初提出。AJAX 包含一套用于创建丰富的、


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm 第 289 页 2006 年 2 月 23 日星期四 下午 4:22


    第 7 章 ■ TAPESTRY


    **289**


    交互式 Web 应用程序的 Web 开发技术。即使在您阅读本文时，AJAX 仍在被定义中。这些技术的组合过去被称为 DHTML 和远程脚本。许多人声称 AJAX
    是对过去近 10 年已有事物的新命名，而另一些人则指出，这些技术的演进和协同使用才是新的。甚至更新的术语 Web 2.0 被用来指代 AJAX 和其他将 Web
    用户体验和能力提升到新水平的技术。


    像 Google Maps、Google Suggest、Gmail、Flickr、Amazon 的 A9 以及它们成功催生的众多衍生品和克隆网站的影响，正被用作定义
    AJAX 的基础。在其原始文章中，Garrett 将 AJAX 定义为：


    • 使用 XHTML 和 CSS 进行基于标准的呈现

    • 使用文档对象模型（DOM）进行动态显示和交互

    • 使用 XML 和 XSLT 进行数据交换和操作

    • 使用 XMLHttpRequest 进行异步数据检索

    • 用 JavaScript 将所有内容绑定在一起


    过去，我们都使用过这样的网站：页面具有某些不需要重新加载页面的动态元素，例如通过悬停在特定图像或文本上来折叠和展开信息。那些早期的支持 JavaScript
    的网站与 AJAX 网站之间的区别在于，前者的数据是完整预加载并简单隐藏起来的。而使用 AJAX，UI 是动态的，用户界面背后的数据也是动态的。在典型的 AJAX
    交互中，用户操作会导致使用 JavaScript XMLHttpRequest 对象向服务器发出异步 HTTP 请求，这些请求返回 HTML、XML、纯文本甚至
    JavaScript。从服务器返回的信息用于动态修改当前页面的 DOM 树，而无需重新加载页面。


    其优势全部体现在用户体验上，因为它接近标准桌面应用程序的丰富性。通过精心规划，用户不再受限于传统的请求-响应模式。与网站的交互变成了一系列动态的、幕后的异步请求，仅受少数几次完整的服务器往返限制。典型的副作用包括开发复杂性的增加（需要客户端和服务器之间更紧密的集成），以及一系列其他技术难题，包括：


    • 浏览器不兼容性

    • 可访问性和国际化问题

    • 测试和调试的复杂性

    • 应用程序域外的异步请求（沙箱限制）

    • 安全性及移动代码的影响

    • 网络吞吐量和流量问题


    其中一些问题正通过将解决方案和常见使用模式封装到框架中来解决。推动 AJAX 从简单的客户端脚本发展到当今热门项目的技术粘合剂，是诸如 Dojo (www.dojotoolkit.org/)、script.aculo.us
    (http://script.aculo.us/)、Prototype (http://prototype.conio.net/)、Rico (http://openrico.org/)
    和 DWR (http://getahead.ltd.uk/dwr) 等项目的演进。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm 第 290 页 2006 年 2 月 23 日星期四 下午 4:22


    **290**


    第 7 章 ■ TAPESTRY


    幸运的是，对于 Tapestry 用户来说，支持 AJAX 的组件可以通过 Tacos 组件库获得。Taco 是一个小巧但健壮的框架，用于构建支持 AJAX
    的 Tapestry 组件，同时也提供了一个完整的即用型 Ajaxian Tapestry 组件库。Tacos 由 Viktor Szathmary 创建，并由
    Jesse Kuhnert 积极维护。Tacos 项目托管在 SourceForge (http://tacos.sourceforge.net/) 上，并根据
    Apache 开源许可证分发。


    Tacos 提供了 AJAX 的所有强大功能，而无需处理像 XMLHttpRequest 和复杂 JavaScript 这样的构造。Tacos 利用了现有最成熟的
    JavaScript AJAX 库。它主要依赖于 Dojo，但对于某些组件也依赖于 Prototype 和 script.aculo.us。


    正如您将在本节中的 TechConf Tacos 示例中看到的那样，您很少需要直接与 JavaScript 交互。Tacos 还提供了一个内置的日志记录和调试控制台，简化了丰富
    Web 应用程序的开发。


    **在您的 Tapestry 应用程序中使用 Tacos**


    Tacos 以源代码和二进制形式分发。文档和示例也单独分发。表 7-3 显示了 Tacos 的分发文件。


