    至今仍是一个闭源的专有系统，直到最近其高昂的价格标签仍使其超出了大多数开发者的承受范围。WebObjects 是一个符合 J2EE 标准的 Web 开发框架，提供的不仅仅是
    Web 开发——它还包括一套工具、高级 ORM、可扩展性和性能特性。例如，运行在 WebObjects 上最大的应用程序之一是苹果公司的 iTunes Music
    Store。


    对我们大多数人来说幸运的是，开源社区在 Jakarta Tapestry Web 应用框架中提供了一个与 WebObjects 一样强大且灵活的替代方案。


    Tapestry 始于 2000 年的一个 SourceForge 项目，其工作方式大致基于 WebObjects。它获得了足够的公众认可，于 2003 年成为
    Apache Jakarta 项目。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


