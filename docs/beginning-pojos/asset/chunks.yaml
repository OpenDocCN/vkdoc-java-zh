    **依赖方法**


    TestNG 还提供了一种机制，用于声明测试方法之间的依赖关系，并避免被 Beust 所称的 JUnit 中的“失败级联创伤”所困扰——即 JUnit 会同时报告所有依赖测试的失败以及根本失败。`@Test`
    注解可以接受一个 `dependsOnMethods` 参数，该参数接受一个以逗号分隔的方法列表。


    类似地，你可以通过 `dependsOnGroups` 参数声明方法对某个组的依赖，该参数接受一个以逗号分隔的组列表。TestNG 将保证在运行该方法之前，依赖组中的所有方法都已执行完毕。


