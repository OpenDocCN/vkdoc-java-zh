    这种方法的问题在于，对于大型构建，很容易意外删除需要的文件，也容易遗漏需要删除的文件或目录。因此，你应该为构建文件中的每个主要目标包含一个 clean 子目标。这样做，你将能够轻松地在目标级别确定需要清理的内容。然后，对于全局的
    clean 目标，你可以通过使用 antcall 任务（或将其列为依赖项）来调用所有单独的 clean 子目标，如清单 3-14 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


