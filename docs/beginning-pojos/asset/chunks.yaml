    **为持续集成设置项目**


    现在我们有了设置 CI 的基础设施，可以将要构建的项目检出到 checkout 目录中。让我们通过从一个公开可用的 CVS 仓库中检出一个知名项目，并配置
    CruiseControl 来构建它，从而开始探索 CruiseControl。


    对于这个例子，我选择了 Apache 基金会托管在 http://lucene.apache.org 的热门项目 Lucene。我选择 Lucene 是因为它是一个非常活跃的项目，并且拥有全面的测试套件。要检出一份
    Lucene 副本，请切换到 cc-work-dir/checkout 目录并输入：


    cvs -d :pserver:anoncvs@cvs.apache.org:/home/cvspublic login 这是 CVS 客户端命令，用于匿名登录到
    java.net CVS 服务器。控制台将提示你输入密码，如下所示。匿名登录的密码是 anonymous。


    Logging in to :pserver:anoncvs@cvs.apache.org:2401/home/cvspublic CVS password:


    现在要检出项目，请输入：


    cvs -d :pserver:anoncvs@cvs.apache.org:/home/cvspublic checkout jakarta-lucene
    现在，你应该会在控制台上看到大量输出，因为 CVS 客户端正在将 Lucene 项目的一份副本检出到 checkout 目录下。检出完成后，我们可以通过切换到
    checkout 目录下新创建的 jakarta-lucene 目录并输入以下命令来探索和测试构建：


    ant –p


    这应该会显示 Lucene 构建文件中可用的目标，如下所示。


    Buildfile: build.xml


    Main targets:


    clean Removes contents of build and dist directories compile-core Compiles core
    classes


    generate-test-reports Generates test reports


    jar-core Generates the Jar file

