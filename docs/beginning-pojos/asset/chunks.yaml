- fmt: "# Ant’s Command-Line Options\n\nAnt is typically used from the command line\
    \ by running one of the scripts in the `bin` directory.\n\nAnt’s command line\
    \ can take a set of options (prefixed with a dash) and any number of targets to\
    \ be executed, as follows:\n\n`ant [options] [target target2 ... targetN]`\n\n\
    Table 3-1 shows the options available from the command line. You can access them\
    \ by typing `ant -help`. By default, Ant will search for a file named `build.xml`\
    \ unless a different file is specified via the `buildfile` option.\n\n**Table\
    \ 3-1.** *Ant Command-Line Options*\n\n| Option | Purpose |\n| --- | --- |\n|\
    \ `help` \\| `h` | Prints the help message showing all available options |\n|\
    \ `projecthelp` \\| `p` | Displays all targets for which the `description` attribute\
    \ has been set |\n| `version` | Prints the version of Ant |\n| `diagnostics` |\
    \ Prints a diagnostics report that shows information like file sizes and compilation\
    \ dates; useful for reporting bugs |\n| `quiet` \\| `q` | Minimizes the amount\
    \ of console output produced by Ant |\n| `verbose` \\| `v` | Maximizes the amount\
    \ of console output produced by Ant |\n| `debug` \\| `d` | Prints debugging information\
    \ to the console |\n| `emacs` \\| `e` | Removes all indentation and decorations\
    \ from the console output |\n| `lib <path>` | Configures a file system path to\
    \ search for JARs and Java classes |\n| `logfile` \\| `l <file>` | Redirects all\
    \ console output to the specified log file |\n| `logger <classname>` | Uses the\
    \ specified class for logging (it must implement `org.apache.tools.ant.BuildLogger`)\
    \ |\n| `listener <classname>` | Adds an instance of a class that can receive logging\
    \ events from the build (it must implement `org.apache.tools.ant.BuildListener`)\
    \ |\n| `noinput` | Prevents interactive input from blocking the build process\
    \ |\n| `buildfile` \\| `file` \\| `f <file>` | Specifies the buildfile to be processed\
    \ |\n| `D <property>=<value>` | Passes a property to the build |\n| `keep-going`\
    \ \\| `k` | Tells Ant to execute all targets whose dependencies succeed |\n| `propertyfile\
    \ <filename>` | Loads all properties in a properties file; properties passed with\
    \ the `D` option take precedence |\n| `inputhandler <class>` | Specifies a class\
    \ to handle input request; by default input requests are handled via the standard\
    \ in (`stdin`) |\n| `find` \\| `s <file>` | Tells Ant to search for the given\
    \ filename by traversing upwards from the current directory until it finds the\
    \ file |\n| `nice (1..10)` | Specifies a niceness value for the main thread; 1\
    \ (lowest) to 10 (highest); 5 is the default |\n| `nouserlib` | Tells Ant not\
    \ to load any JAR files in the user’s `${user.home}/.ant/lib` directory |\n| `noclasspath`\
    \ | Tells Ant to run without using the System’s `CLASSPATH` |\n\n## A Simple Ant\
    \ Example\n\nFigure 3-1 shows a simplified view of what a simple Ant build entails.\
    \ The root of an Ant build is the `project` element, which contains one or more\
    \ targets and at least one default target. In this case the simple build contains\
    \ three targets named Target A, Target B, and Target C, with Target C being the\
    \ default target. As shown in the zoomed view of Target B, a target can contain\
    \ zero or more tasks.\n\n**Figure 3-1.** *A simplified view of an Ant build*\n\
    \nAnt controls the build process with a description file. In Ant the description\
    \ file is typically referred to as a buildfile or build script. The Ant buildfile\
    \ is an XML file whose root is the `project` element that contains child nodes\
    \ that represent the targets. An Ant buildfile representing a build similar to\
    \ the one depicted in Figure 3-1 would look like Listing 3-1.\n\n**Listing 3-1.**\
    \ *Simple Ant Buildfile*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <project basedir=\".\" default=\"Target C\" name=\"MyProject\">\n  <target name=\"\
    Target A\" description=\"Performs Step A\">\n    <echo>Performing Step A</echo>\n\
    \  </target>\n</project>\n```"
