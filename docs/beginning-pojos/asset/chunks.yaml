    **Eclipse 插件**


    使 Eclipse 对 Java 开发人员极具吸引力的原因是其丰富的插件，无论是商业插件还是开源插件，它们都使开发的各个方面更加敏捷和愉快。本章的其余部分将重点介绍一些我认为在开发企业级
    Java 应用程序时最有用的插件。本书中用于开发 TechConf 示例应用程序的许多开源工具都通过插件提供了与 Eclipse 平台的集成。


    ■**注意** 本书中讨论的 TechConf 项目主要使用 Eclipse 开发（尽管您应该能够使用您喜欢的 IDE 或简单的独立工具（如 VI、Emacs
    和命令行）来处理代码）。正如您将在第 3 章学习 Ant 构建工具时看到的，您的应用程序完全独立于您选择的 IDE 非常重要。


