- fmt: '# 许多（但并非全部）项目都是基于 Java 的。许多托管项目是稳定、生产质量的项目，但更多的项目仍处于规划或早期开发阶段。


    - `java.net`：该网站是 Sun Microsystems 公司一群多元化的工程师、研究人员、技术专家和布道者愿景的实现，旨在为与 Java 技术相关的有趣对话和创新开发项目提供一个公共区域。社区持续发展，行业协会、软件供应商、大学以及个人开发者和爱好者每天都在加入。当他们见面、分享想法并使用网站的协作工具时，他们形成的社区将发现协同效应，并创造出使
    Java 技术更有价值的新解决方案。


    - `codehaus.org`：`Codehaus` 是一个开源社区，服务于那些不在“GPL 或其他对商业不友好的许可证”下的项目。诸如 `Middlegen`、`XDoclet2`
    和 `Drools` 等项目正在将 `Codehaus` 作为它们的家园。


    - `tigris.org`：该网站是一个中等规模的开源社区，专注于为协作软件开发构建更好的工具。


    - `gjt.org`：`Giant Java Tree` 是一个不相关的 Java 包的集合。


    - `objectweb.org`：`ObjectWeb.org` 托管开源中间件项目和可适配组件。


    ## 总结


    Java 已成为企业计算的头号语言和环境，并且它也成为开源社区中使用最广泛的语言之一。在撰写本文时，`SourceForge` 上有超过 10,000 个
    Java 开源项目——仅次于 C++。尽管并非每个 Java 开源项目都适用于创建企业应用程序，但你仍然会为 Java EE 找到大量尚未开发的资源。本章还介绍了技术会议管理系统，该系统提出了一个相当复杂且具有代表性的问题，涵盖了企业开发的多个领域。


    本书的其余部分将指导您完成设计和开发构成案例研究的应用程序的过程。案例研究将各章节中获得的知识融合在一起。通过以增量和迭代的方式一次一层地处理软件开发过程，本书将为您提供有关软件开发生命周期各个阶段所涉及规划的见解。通过使用开源
    Java EE 产品和支持工具，您将能够构建一个基本但完整的企业系统。随后的每一章都致力于应用程序的一个层以及软件开发过程的一个或多个阶段（或活动）。在必要时，将演示针对特定问题的多种解决方案，以便让您深入了解在开发企业
    Java 应用程序时遇到的典型决策。


