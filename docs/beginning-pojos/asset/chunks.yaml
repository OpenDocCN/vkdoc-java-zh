    <property name="City" />


    <property name="AptNumber" />


    </class>


    </hibernate-mapping>


    让我们详细分析一下 address 的 HBM 文件。Hibernate 映射是 XML 文档，其根元素是 hibernate-mapping。它们通常以所映射的类命名，后跟
    .hbm 和 .xml 扩展名。对于 Address 类，文件名将是 Address.hbm.xml。


    ■**注意** 你可以在一个 HBM 文件中包含多个类映射，但我建议每个类使用一个 HBM 文件。这种做法将简化维护，并允许多个开发人员处理不同的映射而不会相互干扰。


