- fmt: '# JSP/Servlet Model 2 与 Tapestry 框架


    ## JSP/Servlet Model 2 的演进


    `JSP/Servlet Model 2`在可维护性和开发时间方面代表了巨大的飞跃。它允许在 HTML 设计师和 Java 开发人员之间，以及不同技能的 Java
    开发人员之间进行关注点分离；经验更丰富的开发人员通常最终编写大部分控制代码，而较初级的开发人员则处理 JSP。随着越来越多的 `Model 2` 应用程序被构建，许多开发人员注意到不同应用程序之间重复劳动的问题。典型的问题变成了：我们如何避免一次又一次地重复造轮子？大多数开发人员的结论最终归结为创建框架，以提供处理
    MVC 应用程序的统一方式，并消除对管道代码的需求。


    如今，我们有许多基于 MVC 模式的框架，它们提供了大量你无需从头开始创建的功能。它们也在一定程度上标准化了 Java 世界中的 Web 开发。不同的框架都以略微不同的方式实现
    MVC。有些框架选择了一种用于视图生成的技术，例如 JSP 或某种模板引擎（如 `Velocity`），而其他框架则允许可插拔的视图实现。大多数框架的一个共同点是，尽管它们构建在
    `Servlet API` 之上，但它们仍然遵循请求/响应范式的相同底层原则，这使得你的开发和生成的代码非常过程化。许多技术专家的感受是，这些框架帮助我们处理
    Web 作为应用程序平台的问题，但它们也扁平化并削弱了 Java 提供的面向对象的部分能力。


    与此同时，一个鲜为人知的框架已经提供了一个基于 MVC 模式的 Web 开发框架，但其组件在核心上拥抱了面向对象。这个框架就是 `NeXT WebObjects`，它于
    1996 年出现，后来成为苹果的 `WebObjects`。`WebObjects` 背后有巨大的兴趣，并吸引了大量寻求构建大规模 Web 应用程序的稳健平台的大型企业。`WebObjects`
    至今仍是一个闭源的专有系统，直到最近，它的价格标签仍使其超出了大多数开发者的能力范围。`WebObjects` 是一个符合 `J2EE` 标准的 Web 开发框架，提供的不仅仅是
    Web 开发——它是一套工具、高级 ORM、可扩展性和性能特性的集合。例如，运行在 `WebObjects` 上的最大应用程序之一是苹果的 `iTunes
    Music Store`。


    对我们大多数人来说幸运的是，开源社区在 `Jakarta Tapestry` Web 应用程序框架中提供了一个与 `WebObjects` 一样强大和灵活的替代方案。


    `Tapestry` 于 2000 年作为一个 `SourceForge` 项目开始，松散地基于 `WebObjects` 的工作方式。它获得了足够的公众认可，于
    2003 年成为 `Apache Jakarta` 项目。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


