    前面展示的技术对于使用少量表的测试效果很好。如果你的领域对象相互交织得相当紧密，那么只加载少数映射就会变得困难，因为 Hibernate 会要求你加载所有关联的映射。这将导致
    setUp 方法的初始化时间增加。在这种情况下，我建议你从 hibernate.cfg.xml 一次性加载所有映射，并将 SessionFactory 保持为一个静态单例，供所有测试类使用。


    **DbUnit**


    前一种方法的另一个明显问题是，需要用大量冗余代码来用测试数据填充数据库。虽然你可以使用 SQL 脚本来设置测试数据，但你仍然需要面对测试后检查数据库状态的任务。在前一种方法中，我们通过
    Hibernate 映射的 POJO 间接测试了数据库结果。另一种方法是加载一些测试数据，对这些数据执行测试，检查数据库前后的状态，然后进行清理。

    '
- fmt: "# DbUnit 项目简介\n\n`DbUnit`项目由 Manuel Laflamme 创建，可在`www.dbunit.org`找到。`DbUnit`提供了加载测试数据和验证测试后数据库状态的功能。`DbUnit`使用\
    \ XML 文件提供测试数据。要加载数据，您必须首先将数据格式化为`DbUnit`特定的 XML 数据集格式。最简单的方法是从现有数据库中导出所需状态的数据。`DbUnit`包含一个导出工具和\
    \ Ant 任务来执行此操作。清单 8-19 展示了一个 Ant `macrodef`，它使用`DbUnit`导出子任务将数据库中的数据导出到`setup/data/dbunit`目录下的`dataExport.xml`文件中（名称和位置可覆盖）。此`macrodef`应添加到第\
    \ 3 章创建的`macros.xml`文件中，并为创建`DbUnit`测试的数据集提供了一个良好的起点。生成的 XML 文件可以重命名并编辑以表示特定状态。例如，我喜欢使用将文件与特定测试关联起来的名称，如`beforeAddressTest.xml`和`afterAddressTest.xml`。\n\
    \n该`macrodef`将 JDBC 信息以及要生成的`DbUnit` XML 文件的目标路径和名称作为参数。\n\n**清单 8-19.** *用于数据导出的\
    \ DbUnit Ant Macrodef*\n\n```xml\n<path id=\"dbunit.class.path\">\n  <fileset\
    \ dir=\"lib/dbunit\">\n    <include name=\"*.jar\"/>\n  </fileset>\n</path>\n\n\
    <taskdef\n  name=\"dbunit\"\n  classname=\"org.dbunit.ant.DbUnitTask\"\n  classpathref=\"\
    dbunit.class.path\"\n/>\n\n<macrodef name=\"export-data\">\n  <attribute name=\"\
    driver\" />\n  <attribute name=\"url\" />\n  <attribute name=\"username\" />\n\
    \  <attribute name=\"password\" />\n  <attribute name=\"target-dest\" default=\"\
    setup/data/dbunit\" />\n  <attribute name=\"filename\" default=\"dataExport\"\
    \ />\n  <sequential>\n    <dbunit\n      driver=\"@{driver}\"\n      url=\"@{url}\"\
    \n      userid=\"@{username}\"\n      password=\"@{password}\">\n      <export\
    \ dest=\"@{target-dest}/@{filename}.xml\" format=\"xml\" />\n      <classpath>\n\
    \        <path refid=\"dbunit.class.path\" />\n      </classpath>\n    </dbunit>\n\
    \  </sequential>\n</macrodef>\n```\n\n要创建示例数据集，您可以手动填充数据库（通过编写 SQL `INSERT`语句），或者使用\
    \ Hibernate 映射的 POJO 来设置数据库的初始状态。一旦数据库处于所需状态，执行该`macrodef`，XML 文件将捕获数据库的状态。清单\
    \ 8-20 展示了一个使用前面定义的`macrodef`的 Ant 目标。\n\n**清单 8-20.** *使用 DbUnit Macrodef 的 Ant\
    \ 目标*\n\n```xml\n<target name=\"export-db\" description=\"Exports the content\
    \ of the test database\">\n  <target-banner target=\"export-db\"/>\n  <export-data\n\
    \    driver=\"${test.db.driver}\"\n    url=\"${test.db.url}\"\n    username=\"\
    ${test.db.username}\"\n    password=\"${test.db.password}\"\n  />\n</target>\n\
    ```\n\n例如，如果我们在`address`表中加载一些数据并运行 Ant 目标，生成的`DbUnit` XML 数据集将类似于清单 8-21 所示的输出。\n\
    \n**清单 8-21.** *表 ADDRESS 的 DbUnit XML 数据集*\n\n```xml\n<?xml version='1.0' encoding='UTF-8'?>\n\
    <dataset>\n  <table name=\"address\">\n    <column>PK_ID</column>\n    <column>STREETADDRESS</column>\n\
    \    <column>APTNUMBER</column>\n    <column>CITY</column>\n    <column>STATE</column>\n\
    \    <column>ZIPCODE</column>\n    <row>\n      <value>2</value>\n      <value><![CDATA[204\
    \ Bluestone Court]]></value>\n      <value>N/A</value>\n      <value>Westerville</value>\n\
    \      <value>OH</value>\n      <value>43081</value>\n    </row>\n  </table>\n\
