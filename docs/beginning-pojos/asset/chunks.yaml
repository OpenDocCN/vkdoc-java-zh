- fmt: "# The Page Definition File for the Summary Page\n\nThe page definition file\
    \ for the Summary page is responsible for declaring and formatting the components\
    \ used in the HTML template. It uses `For`, `Insert`, and `If` components. It\
    \ also uses the `Any` component. The `Any` component is a very versatile component\
    \ that can emulate any HTML element. In the following example, the value of the\
    \ OGNL expression `speakerImage` is bound to the attribute `src` of the surrounding\
    \ tag.\n\n```\n<component id=\"speakerPicture\" type=\"Any\">\n  <binding name=\"\
    src\" value=\"ognl:speakerImage\"/>\n</component>\n```\n\nThe HTML snippet shown\
    \ next uses an `img` tag with the `speakerPicture` component.\n\nAt runtime, the\
    \ `src` attribute will be replaced with the value of the `speakerImage` expression.\n\
    \n```\n<img jwcid=\"speakerPicture\" border=\"0\" src=\"../speakerImages/1.jpg\"\
    />\n```\n\nFigure 7-20 shows the Conference Summary page on the running application\
    \ showing the conference with `id` equals to 1, which corresponds to the URL `localhost:8080/TechConf/app?page=conference%2FSummary&service=external&sp=1`.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00111.png)\n\n\
