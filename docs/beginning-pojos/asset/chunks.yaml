    第 2 章 ■ E C L I P S E


    **37**


    **并发版本系统**


    拥有多个开发人员的项目需要一个共享的源代码仓库。由于开源项目有许多贡献者，它们绝对需要一个中央仓库。通常，这些贡献者分布在世界各地，仅通过互联网连接。


    开源版本控制的事实标准是并发版本系统（CVS）。CVS 本身是一个开源项目，它通过 TCP/IP 网络（包括互联网）提供安全的多用户版本控制访问。本节并非旨在全面介绍
    CVS 及其功能；相反，目的是概述 CVS，以便能够访问开源 Java 项目的当前源代码。很多时候这是必要的，因为最新版本的源代码仅在 CVS 中，而没有以任何其他形式发布。一些管理良好的项目每晚都会将最新源代码作为
    ZIP 文件发布。


    **理解 CVS**


    CVS 服务器是一个基于 TCP/IP 的应用程序，它通过互联网提供对 CVS 仓库的访问。仓库是服务器机器上的一个目录。仓库内包含多个模块。每个模块通常是一个单独的应用程序或项目。


    连接到 CVS 仓库需要一个格式正确的 CVSROOT 连接字符串。格式如下：


    `:pserver:[[user][:password]@]host[:[port]]/pathToRepository` 字符串中的 `:pserver:`
    部分表示连接使用的是 pserver 协议。pserver 协议用于通过密码认证服务器进行远程连接，并且是远程访问 CVS 仓库最常用的方式。另一种连接方式是通过
    ext 协议，该协议可用于通过安全外壳（SSH）运行 CVS，以便在开放的互联网上安全地访问源代码。CVSROOT 可以可选地包含用户和密码信息。如果未提供，CVS
    客户端将提示您输入它们。host 是服务器的域名或 IP 地址。如果 CVS 服务器未在标准的 2401 端口上监听，则可以包含一个可选端口。CVSROOT
    以服务器上 CVS 仓库的目录结束。


    在开发人员的本地工作空间中，CVS 目录用于跟踪版本控制的文件和仓库。CVS 目录包含以下三个文件：


    • **Entries:** 包含版本控制文件、其版本、日期和类型的列表


    • **Repository:** 包含仓库中对应的目录


    • **Root:** 包含 CVSROOT


    **CVS 概念**


    CVS 通过向开发人员提供对仓库中所有文件的访问权限来促进协作。每个开发人员将仓库的一个副本检出到本地工作空间。所有更改都在工作空间中进行并进行单元测试。当更改应用到仓库时，文件版本会增加。版本历史得以维护。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C02.fm 第 38 页 2006 年 2 月 22 日星期三 上午 6:03


    **38**


    第 2 章 ■ E C L I P S E


    CVS 不要求锁定文件才能更改它们。它允许多个开发人员在其本地工作空间中处理同一个文件。当多个开发人员对同一个文件进行更改时，CVS 会处理这些文件的合并。


    CVS 命令


    理解用于身份验证、检出、提交、更新和比较的基本 CVS 命令对于任何 CVS 客户端应用程序的基本使用都是至关重要的。


    CVS 仓库是知识产权的集合，需要限制访问。对于开源项目，仓库可供任何人查看。但是，安全性用于确定谁有权直接对仓库进行更改。CVS 登录命令用于通过用户名和密码验证来认证用户。


    ■**注意** CVS 身份验证不能保护文件在通过互联网传输期间不被查看。应使用 SSH 来保护敏感仓库中的文件传输。


    检出命令可能是所有 CVS 命令中最令人困惑的，因为它的含义与其他版本控制软件（VCS）应用程序中的含义不同。在 CVS 中，检出命令用于从 CVS 仓库获取模块的初始本地副本。一些其他
    VCS 程序要求锁定文件，并将此过程称为“检出”，这导致了混淆。


    在本地源代码副本被修改并进行单元测试后，必须将其提交回仓库。提交命令用于将本地更改或新文件应用到仓库。提交命令还应附带对更改的简短说明。该说明将与版本更改相关联，用于审计和沟通目的。

