    available) that enables you to run test classes and methods similarly to the native
    JUnit Eclipse plug-in (with a similar streetlight analogy). The Eclipse plug-in
    enables easy selection of groups and test suite files for a TestNG test run. Like
    the built-in JUnit plug-in, the TestNG plug-in is tightly integrated with the
    Java Development Tools (JDT). Also, if you are migrating from JUnit, the plug-in
    offers a wizard to convert JUnit tests into TestNG tests which use the class JUnitConverter,
    which converts JUnit test classes into TestNG by annotating them.


