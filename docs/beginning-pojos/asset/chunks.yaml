  raw: 'Notice that the addTrack method maintains both ends of the relationship by
    adding the passed Track object to the set of Tracks in the Conference object and
    also by setting the conference property in the Track being added. Encapsulating
    the maintenance of the relationship in a simple method will make the usage of
    both classes simpler.


    The “lazy” attribute in the mapping is telling Hibernate to load the associated
    Track objects at the same time it loads the data for the Conference object. In
    the case of the Track association I’ve chosen to set the lazy attribute to false
    since our domain objects will be used from the middle tier to populate data transfer
    objects (DTOs) to be served to the Web tier. The decision on when to use lazy
    loading is an important one. In the previous case the factors influencing the
    decision were the architecture of the application (using DTOs versus using domain
    objects directly in the Web tier) and the number and size of the Track objects
    (which are few and fairly small).


    ■**Note** In Hibernate 3.X the default is for all associations to be lazy. If
    you are migrating an application from Hibernate 2.X to Hibernate 3.X, this can
    result in many Lazy Instantiation Exceptions, especially if you are using the
    Data Transfer Object pattern.


    In the Conference class we created an association to the Track class in the form
    of a Set.


    To complete the other side of the association between conferences and tracks,
    we need to add an association to the Track class that will allow us to retrieve
    the associated conference object. The associated conference object’s identity
    should match the value of the column FK_CONFERENCE_ID. We can use the many-to-one
    element to provide such a link as shown in Listing 4-18.


    **Listing 4-18.** *Many-to-One Element Mapping Conference to a Track*


