  raw: 'For the login and logout functionality we need to handle two states with their
    corresponding changes to the user interface. When there is no user logged in,
    the form with the fields for the username and password need to be shown, as well
    as the Register button. Upon a successful login, the login form and Register button
    should be hidden, and instead a user greeting and the Logout button should be
    shown. To handle the conditional HTML sections, we define two components. The
    ifLoggedIn component is a Tapestry If component which will render the content
    of its body if the value of the condition attribute evaluates to true (for a non-boolean
    object value true equates to not null). The complement of the ifLoggedIn component
    is the elseNotLoggedIn component which is a Tapestry Else component. The Else
    component renders the contents of its body if the previous If component condition
    evaluates to false. Listing 7-23


    shows the login and logout functionality.


    **Listing 7-23.** *Login and Logout Functionality in Component Specification*


    <component-specification


    class="com.integrallis.techconf.web.tapestry.pages.ConferenceBorder"


    allow-body="yes" allow-informal-parameters="no">


    ...


    <property name="login"/>


    <property name="password"/>


    <component id="ifLoggedIn" type="If">


    <binding name="condition" value="ognl:userInformation.userSummary"/>


    </component>


    <component id="elseNotLoggedIn" type="Else"/>


    <component id="displayLoggedInLinks" type="If">


    <binding name="condition" value="ognl:userInformation.userSummary"/>


    </component>


    <component id="login" type="TextField">


    <binding name="value" value="ognl:login"/>


    <binding name="displayName" value="literal:Email Login"/>


    </component>


    <component id="loginLabel" type="FieldLabel">


    <binding name="field" value="component:login"/>


    </component>


