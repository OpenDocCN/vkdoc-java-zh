    HBM 文件，你最终将得到一个既能满足应用需求又能确保数据长期性的领域模型和数据库模式。这是迄今为止将领域模型映射到数据库最繁琐的方法，主要是因为它在很大程度上是一个手动过程。当然，根据你的对象模型和模式的复杂程度，你可以结合所概述的不同方法来最大化你的生产力，例如，对大部分领域对象映射使用两种自动化方法之一，而对少数特殊情况则采用手动创建的映射。图
