    ---


    In my experience use cases are of great value to the implementation of test cases,
    and they promote a test-driven (test-first approach) process. In this sense, the
    completion of a use case becomes a tangible deliverable that can provide instant
    feedback to the system’s stakeholders.


    With the current emphasis on service-driven architectures, use cases are a good
    vehicle to define the goals of services and are useful in the definition of service-oriented
    components like session façades.


    ## Use Cases and the DNC


    Applying the DNC makes for a great prelude to modeling use cases because it helps
    prevent one of the cardinal sins of use case modeling: use cases dictating an
    object-model’s structure.


    When use cases drive a model’s shape, the model effectively becomes a slave of
    the current functionality being addressed and no longer is a true representation
    of the business. This means that although a use case might give you a clear understanding
    of a single interaction between an actor and the system, it doesn’t give you an
    understanding of the problem domain (as the domain model does), which can lead
    to design tunnel vision.


    To an extent, you can equate the moment-interval classes with either a use case,
    part of a use case, or an encapsulation of one or more use cases. Use cases are
    typically documented as short but concise textual descriptions or scenarios similar
    to how Extreme Programming (XP) creates user stories, descriptions of how a system
    is supposed to solve a problem.


    Table 1-2 shows the partial list of business use cases, showing the actors involved
    as well as any use cases extended or included.


