    ## Building the Home Page


    Let’s start by building the opening page of the TechConf application, which shows
    the list of available conferences. We’ll work from the outside in, starting with
    the HTML template. In the HTML template for the application’s home page we want
    to list the available conferences and create hyperlinks that will take the user
    to each individual conference page where detailed information about the particular
    conference is shown.


    Figure 7-12 shows the template for the TechConf home page `Home.html`.


    **Figure 7-12.** *TechConf application home page template*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm Page 263 Thursday, February 23, 2006 4:22 PM


    C H A P T E R 7 ■ T A P E S T R Y


    **263**


    In the HTML template, we will make use of the `For` component to loop over a collection
    of `ConferenceSummary` DTOs. The `For` component allows you to iterate over a
    collection of values.


    Listing 7-12 shows the snippet of HTML that makes up the navigation bar shown
    on the left of the template in Figure 7-12.


    **Listing 7-12.** *Relevant Portions of the HTML Template Home.html*


    ```

    <tr jwcid="@For" element="tr"

    source="ognl:conferences" value="ognl:conference">

    <td width="165">

    <span jwcid="@ExternalLink" page="conference/Summary"

    parameters="ognl:conference.conferenceId" class="navText">

    <span jwcid="@Insert" value="ognl:conference.conferenceTitle" />

    </span>

    </tr>

    <span jwcid="$remove$">

    <tr>

    <td width="165">

    <a href="#" class="navText">A Conference</a>

    </td>

    </tr>

    </span>

    ```


    In Listing 7-12 the `For` component is being used to loop over the collection
    provided by the OGNL expression `"ognl:conferences"` as declared in the `source`
    attribute. The `value` attribute indicates that we can access the current value
    that we’re iterating over using the expression `"ognl:conference"`. The value
    of the `element` attribute tells Tapestry to wrap the content with the specified
    HTML element. Informal parameters (those parameters not formally defined in the
    component specification) become attributes of the HTML element. Tapestry allows
    for this pass-through of informal parameters which allows you to still use common
    HTML syntax to configure resulting HTML markup.


    Notice that right below the `tr` element, we have a `tr` element wrapped in a
    `span` tag with attribute `jwcid="$remove$"`. The `tr` element is shown in the
    template as a preview of how an item on the navigation menu will appear. The `"$remove$"`
    value tells Tapestry to remove this `span` tag (and its contents) when rendering
    the page. This is another example of how Tapestry allows designers to work with
    pure HTML that can be easily maintained without the need of any Java knowledge.


    To provide the values required by the HTML template, a Tapestry page specification
    file serves as a bridge or binding between the HTML template and any underlying
    Java code or HiveMind services.


    Listing 7-13 shows the `Home.page` file showing how to inject a HiveMind service
    using the `inject` element. The `property` attribute is the name under which the
    property will be exposed, and the `object` attribute is the identifier used to
    locate the value. In the template we’re also defining the property `conference`,
    which serves as the placeholder for the individual element of the collection being
    iterated over in Listing 7-12.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm Page 264 Thursday, February 23, 2006 4:22 PM


    **264**


    C H A P T E R 7 ■ T A P E S T R Y


