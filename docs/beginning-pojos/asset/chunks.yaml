    \ This includes tasks for some commercial products (like EJB/J2EE servers and\
    \ third-party Version Control Systems) as well as nonbuild-specific tasks like\
    \ unit testing, XML validation, and others.\n\n## Properties\n\nAnt provides the\
    \ ability for a project to have a set of properties. Properties are simple strings\
    \ that you can access using the `${propertyName}` notation. Whether you need to\
    \ specify the location of a needed library many times or the name of a CVS repository,\
    \ properties give you the flexibility to defer until runtime a set of values to\
    \ be used in the build.\n\nThere are several ways to set a property. You can set\
    \ it individually to the Ant buildfile via the `-D` command-line option (see Table\
    \ 3-1), or in bulk, from standard Java properties files by using the `propertyfile`\
    \ option.\n\nThere are also several tasks that deal with properties. The `property`\
    \ task enables the setting of a property by name. All property tasks are idempotent,\
    \ which means that once a property’s value has been set it will remain unchanged\
    \ for the remainder of the build. The immutability of properties in Ant is often\
    \ a source of confusion, because as developers you’re often used to thinking with\
    \ the use of variables.\n\n> **Note** The `<ant>` and `<antcall>` tasks both span\
    \ a new build by calling another buildfile. The `<ant>` task calls an external\
    \ buildfile, and the `<antcall>` tasks calls a target on the current buildfile.\
    \ Since version 1.6, Ant provides the `<macro-def>`, `<import>`, and `<subant>`\
    \ tasks, which eliminate the need for using `<ant>` in most cases.\n\nThe simplest\
    \ way to set a property’s value is to use the `property` task. For example, to\
    \ set a property named `src`, which could be later accessed using `${src}`, you\
    \ would use the `property` task as follows:\n\n```xml\n<property name=\"src\"\
    \ location=\"src\" />\n```\n\nThe `src` property would be an absolute path that\
    \ refers to the location of the `src` directory relative to the `basedir` directory.\n\
    \n> **Best Practice** Properties should be used with care. The two main uses of\
    \ properties are for items whose value might change from build to build or for\
    \ items whose value is calculated and used more than once during the build.\n\n\
    Many Ant properties are also available implicitly and are composed from the system\
    \ properties, such as `${java.version}`.\n\nFor any but the simplest project you\
    \ can load a property file using the `file` attribute of the `property` task,\
    \ thereby taking into account differences in user configurations, as follows:\n\
    \n```xml\n<property file=\"build.properties\"/>\n```\n\nOther tasks that deal\
    \ directly with properties include the following:\n\n- **LoadProperties:** Loads\
    \ the contents of a file as properties (equivalent to using the `file` attribute\
    \ for the `property` task).\n- **LoadFile:** Load a text file into a single property.\n\
    - **XMLProperty:** Loads properties from an XML file. See the Ant documentation\
    \ for the specific format of the XML file.\n- **EchoProperties:** Displays all\
    \ available properties in the project.\n\nMany other tasks use properties as a\
    \ way to take parameters in or out. For example, a common practice is for a task\
    \ to have an attribute that takes the name of an inexistent property to be set\
    \ in case of a specific event such as the possibility of the task failing.\n\n\
    > **Best Practice** I recommend using a properties file named `build.properties`\
    \ to store any overridden default values. This property file shouldn’t be kept\
    \ in the source-code repository but instead should add a sample properties file\
    \ named `build.properties.sample` along with instructions on how to configure\
    \ an individual `build.properties` file.\n\n## Datatypes\n\nAnt’s datatypes are\
    \ primitive constructs that provide frequently required information in the processing\
    \ of a buildfile. Their purpose is to simplify a task by encapsulating some information\
    \ required and providing a simple way to manipulate it.\n\nSeveral of Ant’s built-in\
    \ datatypes provide a structure that encapsulates information about a set of related\
    \ resources such as files, environment variables, or even complex mappings between\
    \ input and output files. Knowing how to properly use the Ant’s datatypes will\
    \ help you keep your buildfiles simple and efficient.\n\n### Datatypes and Properties\
    \ in Action: A Simple Example\n\nMany of Ant’s tasks need to manipulate a file\
    \ or groups of files. A typical need in a build is to specify a set of JAR files\
    \ to be included in the classpath for certain tasks. Imagine that you’re building\
    \ a simple application with a directory structure, as shown in Figure 3-4.\n\n\
    **Figure 3-4.** *Sample directory structure for datatypes and properties*\n\n\
    The sample buildfile in Listing 3-5 shows a build for which two path structures\
    \ (datatypes) are defined, one with an `id` of `class.path` and the other with\
    \ an `id` of `all.source.path`. These two datatypes are then used in the target\
    \ named `\"compile\"`, which uses the `javac` task to compile the classes referenced\
    \ by the path reference by the `id` `all.source.path`.\n\n**Listing 3-5.** *Simple\
    \ Ant Buildfile Showing Datatypes*\n\n```xml\n<?xml version=\"1.0\"?>\n\n<project\
    \ name=\"My Project\" default=\"all\" basedir=\".\">\n\n  ...\n\n  <property name=\"\
    lib\" location=\"lib\"/>\n  <property name=\"src\" location=\"src\"/>\n  <property\
    \ name=\"classes\" location=\"classes\"/>\n  <property name=\"build\" location=\"\
    build\"/>\n  <property name=\"src-java\" location=\"${src}/java\"/>\n  <property\
    \ name=\"src-test\" location=\"${src}/test\"/>\n  <property name=\"some-lib\"\
    \ location=\"${lib}/some-lib\"/>\n\n  ...\n\n  <path id=\"class.path\">\n    <fileset\
    \ dir=\"${lib}\">\n      <include name=\"*.jar\"/>\n    </fileset>\n    <fileset\
    \ dir=\"${some-lib}\">\n      <include name=\"*.jar\"/>\n    </fileset>\n  </path>\n\
    \n  <path id=\"all.source.path\">\n    <pathelement path=\"${src-java}\"/>\n \
    \   <pathelement path=\"${src-test}\"/>\n  </path>\n\n  ...\n\n  <target name=\"\
    compile\" description=\"Compiles all sources.\">\n    ...\n    <javac\n      destdir=\"\
    ${classes}\"\n      classpathref=\"class.path\"\n      debug=\"on\"\n      deprecation=\"\
    on\"\n      optimize=\"off\">\n      <src>\n        <path refid=\"all.source.path\"\
    />\n      </src>\n    </javac>\n  </target>\n```\n\nThe `class.path` path structure\
    \ uses two instances of the `fileset` datatype to group under a common classpath\
    \ all the JAR files included in the directories referenced by the `lib` and `struts-lib`\
    \ properties. The `pathelement` is an example of an indispensable datatype that\
    \ enables you to reuse path information in your builds. The `fileset` datatype\
    \ is a typical example of Ant’s pathlike structures. It encapsulates a group of\
    \ files defined via nested `patternset` structures.\n\nFor example, to create\
    \ a `fileset` that includes all JAR files under the `${lib}` directory, you can\
    \ use the following `fileset` definition:\n\n```xml\n<fileset dir=\"${lib}\">\n\
    \  <patternset>\n    <include name=\"*.jar\"/>\n  </patternset>\n</fileset>\n\
    ```\n\nThe `fileset` datatype contains an implicit `patternset` structure, which\
    \ means that you can use shorthand to rewrite the `fileset` definition as follows:\n\
    \n```xml\n<fileset dir=\"${lib}\">\n  <include name=\"*.jar\"/>\n</fileset>\n\
    ```\n\nWe can further compact the `fileset` definition by using the `include`\
    \ as a property rather than as a nested element:\n\n```xml\n<fileset dir=\"${lib}\"\
    \ include=\"*.jar\" />\n```"
