    **生成源代码度量指标**


    虽然我不主张将代码行数、类或方法的数量作为衡量项目成功的标准，但静态代码分析可以帮助你定位一些不必要的复杂区域，这些区域可能导致发现潜在的错误或高维护成本的代码。


    JavaNCSS 是一个用于 Java 的简单源码度量工具，它提供以下基本分析类型：


    • **NCSS：** 非注释源代码语句，提供代码许多特征的计数，例如代码行数、声明、方法、语句、构造函数等。


    • **CCN：** 圈复杂度数（McCabe 度量）。McCabe 的圈复杂度度量将程序的控制流图作为其复杂度的衡量标准。


