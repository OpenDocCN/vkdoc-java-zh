    ## Finding and Refining Candidate Domain Model Elements


    Based on the TechConf requirements discussion and high-level architectural blueprints
    introduced earlier, you can compile a list of candidate domain models. For this
    one you could use Class-Responsibility-Collaboration (CRC) cards or simply (as
    performed here) create a list of nouns and verbs by manually scanning the source
    documents. This process isn’t merely a manual process, because it entails analyzing
    the understanding of the system and eliminating and discovering new candidate
    classes and new operations that weren’t present in the source documents. This
    newly discovered domain knowledge can then be added to the source documents to
    ensure that it isn’t lost.


    The resulting filtered list of nouns is obtained by deleting synonyms and nonentities
    (candidates that might be properties or modifiers, or may represent a state of
    an object). After analysis, the resulting list shrinks in size. Now the structural
    relationships between the candidate objects can be modeled. This process will
    further refine the candidate objects and will resolve many ambiguities about the
    understanding of the problem domain that haven’t been previously encountered.
    After this initial analysis of the problem we arrive at the list of nouns representing
    candidate entities as shown in Table 1-1.


    **Table 1-1.** *TechConf Candidate Entities (Nouns)*


    | Noun | Description |

    | --- | --- |

    | Sponsor | An individual or company sponsoring a conference |

    | Conference | An individual with privileged access to conference-related functions
    administrator |

    | Presenter | An individual who presents one or more sessions |

    | Attendee | A registered user who is attending a conference |

    | Organization | A non-individual legal entity |

    | Conference | An event that consists of one or more sessions |

    | Conference Track | A high-level classification of the topics covered in a conference
    |

    | Presentation | A collection of materials and information to be conveyed to an
    audience in a predetermined amount of time |

    | Session | A scheduled presentation |

    | Schedule | A list of events that an attendee or a presenter will attend during
    a conference |

    | Venue | A physical location where a conference takes place |

    | Booth | A temporary structure where sponsors can showcase their products during
    a conference |

    | Room | A room that is part of a venue |

    | Abstract | A document that briefly explains the intent of a given presentation
    |


    Of course as we develop the application we will find more candidate classes and
    possibly remove or merge some of the previously discovered classes. The model
    shown in Figure 1-5 is the result of an iterative process following Peter Coad’s
    Domain Neutral Component (DNC) technique. In the intermediate models, I chose
    to model the actions embodied in the verbs (or action phrases) gathered as objects
    in the domain model. Later these objects become the basis for the service classes
    in the system. Based on research into parallel object-oriented programming languages
    conducted at Stanford University2 it was concluded that real-time tasks such as
    making a reservation or purchasing an airplane ticket should be modeled as objects
    that encapsulate (façade) the complexity of the task and simplify the associations
    between participating objects.


    The question of whether to model the structure or behavior first is one that many
    beginning and intermediate modelers deal with during every new project. We recommend
    doing both simultaneously because modeling behavior validates the structural integrity
    of the model, and well-defined entities that reflect a domain naturally fall into
    place when modeling behavior.


    > **Tip** Don’t overanalyze with the noun and verb exploration. Concentrate on
    finding the principal candidates; others will emerge as you refine the analysis
    and design.


    With this preliminary list of nouns, you’ll begin to construct a static model,
    and the behavioral part of the domain model will begin to emerge. I want to emphasize
    that this is an iterative process and that the models produced will evolve as
    the system is constructed. In addition, certain assumptions made are validated
    while others are refuted. Remember, the analysis of the system helps you gain
    a deeper understanding of it, but it doesn’t prevent you from deducing knowledge
    that might be erroneous and based on naive, preconceived notions.


    After repeating this discovery and refinement process (and after further discovery
    during development), you should end up with a domain model that should resemble
    that shown in Figure 1-5.


    2. R. Chandra, A. Gupta, and J. L. Hennessy, *Integrating concurrency and data
    abstraction in the COOL parallel programming language* Technical Report CSL-TR-92-511,
    Computer Systems Lab, Stanford University, February 1992.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


