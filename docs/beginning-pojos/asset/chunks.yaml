    该切面定义了两个切入点：daoClasses 和 testClasses 切入点。daoClasses 切入点定义了 DAO 包中的所有类，而 testClasses
    切入点用于覆盖测试类。在此切面中，我们使用了环绕通知，该通知用于将通知方法的实现包装在 try-catch 块中，用于捕获 Hibernate 异常，并根据
