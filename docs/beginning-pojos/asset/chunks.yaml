- fmt: "### **Listing 7-10.** *A More Elaborate `Home.java`*\n\n```java\npublic abstract\
    \ class Home extends BasePage implements PageBeginRenderListener {\n\n    private\
    \ static String[] FORMAT_STRINGS =\n        new String[] { \"h:mm a\",\n     \
    \                  \"EEE, MMM d, ''yy\",\n                       \"hh 'o''clock'\
    \ a, zzzz\",\n                       \"K:mm a, z\"};\n\n    public static final\
    \ IPropertySelectionModel FORMAT_MODEL =\n        new StringPropertySelectionModel(FORMAT_STRINGS);\n\
    \n    private Format timeFormat;\n\n    public void pageBeginRender(PageEvent\
    \ event) {\n        if (getFormatString() == null) {\n            setFormatString(FORMAT_STRINGS[0]);\n\
    \        }\n    }\n\n    public Format getTimeFormat() {\n        timeFormat =\
    \ new SimpleDateFormat(getFormatString());\n        return timeFormat;\n    }\n\
    \n    public Date getTime() {\n        return new Date();\n    }\n\n    public\
    \ abstract String getFormatString();\n    public abstract void setFormatString(String\
    \ formatString);\n\n    public void formSubmit(IRequestCycle cycle) {\n      \
    \  System.out.println(\"The form has been submitted!\");\n    }\n}\n```\n\nLet’s\
    \ start with definition of the `FORMAT_MODEL`, for which we will use the simple\
    \ `StringPropertySelectionModel`, which enables a string array to be used as the\
    \ source of the labels in the drop-down and uses a simple integer index as the\
    \ value. A `String[]` containing several format strings that can be used with\
    \ a `java.text.SimpleDateFormat` instance is created and is then used in the constructor\
    \ of the `StringPropertySelectionModel`.\n\nThe `getFormatString` method will\
    \ return the value of the selected format string after a form submission. This\
    \ value is used in the `getTimeFormat` method to return a `Format` object. The\
    \ `formSubmit` method returns `void` and has an empty implementation. Returning\
    \ `void` signifies that the page to be rendered after the submission is the current\
    \ page and the method body is empty of any functionality since the value of the\
    \ drop-down selection has already been assigned to the `formatString` property.\n\
    \nYou might notice that the `getFormatString` and `setFormatString` are abstract\
    \ methods.\n\nAt runtime Tapestry will create a concrete implementation of the\
    \ `Home` class and will provide implementations for all abstract getter and setter\
    \ methods as well as a field to hold the value of the property. Developers new\
    \ to Tapestry and who haven’t encountered this clever usage of abstract classes\
    \ might feel a bit apprehensive about coding to abstract classes. But this is\
    \ one of the greatest strengths of Tapestry, and it shows the best possible way\
    \ to intermix concrete user provided code while still exploiting the dynamic features\
    \ of the environment.\n\nFinally, we need to assign a value to the format string\
    \ when the page is being rendered, not as the result of a form submission. To\
    \ accomplish this we need to be aware of the Page life cycle. Tapestry pages produce\
    \ several different events which can be listened to by implementing the right\
    \ listener interface. In this case we implement the `org.apache.tapestry.event.PageBeginRenderListener`,\
    \ which is used to determine when a page is about to be rendered.\n\nThe implementation\
    \ of the `void pageBeginRender(PageEvent event)` method checks if the `formatString`\
    \ is `null`, and if so it assigns the first value in the array.\n\nThe running\
    \ application is shown in Figure 7-10. Selecting a format string from the dropdown\
    \ and clicking the Submit button should result in the displayed string changing\
    \ to the selected format.\n\n![Figure 7-10](images/00081.png)\n\n**Figure 7-10.**\
    \ *Tapestry Time application handling user input*\n\nTo understand the amount\
    \ of work that Tapestry is doing behind the scenes, one can simply inspect the\
    \ generated HTML sent to the browser as shown in Listing 7-11.\n\n### **Listing\
    \ 7-11.** *HTML Rendered by the Browser*\n\n```html\n<html>\n<body>\n<h1>Tapestry\
    \ Time</h1>\n<p>The current time is 12:33 AM!</p>\n<form method=\"post\" action=\"\
    /tapestry-time/app\" name=\"Form\" id=\"Form\">\n<div style=\"display:none;\"\
    >\n```"
