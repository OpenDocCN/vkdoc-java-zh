- fmt: "# Building with Ant\n\nThe target should be executed only if the Ant property\
    \ by the name `do_a` exists in the context of the build. Executing the buildfile\
    \ produces the following result:\n\n```\nBuildfile: build.xml\n\nTarget A:\n\n\
    Target B:\n\n[echo] Performing Step B\n[echo] Echo is one of many Core Tasks\n\
    \nTarget C:\n\n[echo] Performing Step C\n\nBUILD SUCCESSFUL\nTotal time: 1 second\n\
    ```\n\nNotice that the output shows the banner for Target A but that the `echo`\
    \ tasks contained within were never executed. You can run the buildfile again\
    \ using the `-D` option to pass the property `do_a` to the build as shown:\n\n\
    ```\nant -D \"do_a=\"\n```\n\nThe output now shows that Target A is being executed.\
    \ You add the double quotes around the name-value pairs for the command-line argument\
    \ parser so you can recognize the end of the argument. Any value could have been\
    \ passed and the results would have been the same.\n\nRemember with `if` and `unless`,\
    \ the value of the property is irrelevant; what matters is whether or not the\
    \ property has been defined.\n\n## Target Dependencies\n\nFrom the simple buildfile\
    \ shown previously you can see that targets can depend on other targets. This\
    \ example shows a very simple and linear dependency chain in which Target C depends\
    \ on Target B, which in turn depends on Target A.\n\nAnt will resolve any circular\
    \ dependencies and will consequently fail the build. For example, you can modify\
    \ the sample script to add Target C as a dependency of Target A as shown in Listing\
    \ 3-3.\n\n**Listing 3-3.** *Ant Target Dependencies*\n\n```\n<target name=\"Target\
    \ A\" depends=\"Target C\" description=\"Performs Step A\">\n  <echo>Performing\
    \ Step A</echo>\n</target>\n```\n\nThe resulting execution of the script will\
    \ produce output similar to the following:\n\n```\nBuildfile: build.xml\n\nBUILD\
    \ FAILED\nCircular dependency: Target C <- Target A <- Target B <- Target C\n\
    Total time: 1 second\n```\n\nDependencies are resolved recursively using a topological\
    \ sorting algorithm. The resulting build sequence ensures that a target in the\
    \ dependency chain will only get executed once. You can see a great example of\
    \ this in the Ant online manual, which shows a build with dependencies as shown\
    \ in Figure 3-2.\n\n**Figure 3-2.** *Script dependencies*\n\nA buildfile for the\
    \ build in Figure 3-2 would look like Listing 3-4.\n\n**Listing 3-4.** *Simple\
    \ Ant Buildfile Showing Dependencies*\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<project basedir=\".\" default=\"D\" name=\"dependencies\">\n  <target\
    \ name=\"A\"/>\n  <target name=\"B\" depends=\"A\"/>\n  <target name=\"C\" depends=\"\
    B,A\"/>\n  <target name=\"D\" depends=\"C,B,A\"/>\n</project>\n```\n\nUnderstanding\
    \ how dependencies work is very important as your build process grows in complexity.\
    \ Figure 3-3 shows a depiction of the dependency resolution process.\n\n**Figure\
    \ 3-3.** *Dependency resolution in Ant*\n\nTo test the dependencies example, save\
    \ the buildfile as `dependencies.xml` and run it using Ant's `-f` parameter in\
    \ order to indicate the buildfile as follows:\n\n```\nant -f dependencies.xml\
    \ -v\n```\n\nThe output should look like this:\n\n```\n...\nBuildfile: dependencies.xml\n\
    ...\nBuild sequence for target 'D' is [A, B, C, D]\nComplete build sequence is\
    \ [A, B, C, D]\n\nA:\nB:\nC:\nD:\n\nBUILD SUCCESSFUL\nTotal time: 1 second\n```\n\
    \n> **Best Practice** Keep a build's dependencies as simple and linear as possible.\n\
    \n## Tasks\n\nTasks are used within a target to achieve certain functionality.\
    \ Think of a task element as a way to invoke a Java class's functionality. Ant\
    \ provides a plethora of tasks that are divided in the following two categories:"
