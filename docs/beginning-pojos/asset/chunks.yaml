    **319**


    TestNG grouping provides much more flexibility than JUnit since there is no need
    to recompile any code. TestNG also provides the ability to create groups of methods
    and, as mentioned previously, groups of groups.


    **Dependent Methods**


    TestNG also provides a mechanism for declaring dependencies amongst test methods
    and avoiding being overwhelmed by what Beust refers to as the “failure cascade
    trauma” in JUnit when it reports all the failures of dependent tests as well as
    the root failure. The Test annotation can take a parameter of dependsOnMethods,
    which takes a comma-separated list of methods.


    Similarly, you can declare method dependencies on a group via the dependsOnGroups
    parameter, which takes a comma-separated list of groups. TestNG will guarantee
    that all of the methods in a dependent group are executed before the method.


    **Parameters**


    TestNG allows test parameters to be passed from the testng.xml file or via the
    Parameters and DataProvider annotations. The org.testng.annotations.Parameters
    annotation applies to the org.testng.annotations.Test and org.testng.annotations.Configuration
    parameters.


    For example, if you wanted to have a set of database-specific tests, you could
    define the database parameters in the textng.xml file as shown in Listing 8-11.


    **Listing 8-11.** *TestNG Parameterized Configuration*


    <!DOCTYPE suite SYSTEM "http://beust.com/testng/testng-1.0.dtd" >


    <suite name="Test Suite"


    <parameter name="url" value="jdbc:mysql://localhost/test" />


    <parameter name="driver" value="com.mysql.jdbc.Driver" />


    <parameter name="username" value="user" />


    <parameter name="password" value="pass" />


    <test name="DBTest">


    ...


    </test>


    </suite>'
