    项目


    project 元素可以有三个属性：name、default 和 basedir。只有 default 属性是必需的，但我建议你使用 name 属性，尤其是因为许多
    IDE 的 Ant 编辑器会利用该属性进行显示。当处理多个构建文件时，name 属性会非常有用。


