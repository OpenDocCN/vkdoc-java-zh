    **Case Study: Mapping the TechConf Domain Model**


    Now that you have seen how simple it is to map a simple POJO to a database table
    and interact with your data in an object-oriented fashion, it is time to move
    on to the development of the sample application. In a real application there will
    be not only a lot of simple mappings but also a lot of more complex situations
    involving more advanced ORM concepts. In this section we will tackle the development
    of the methods used by the TechConf application to retrieve and store data. As
    we flesh out each method, we will take a look at the POJOs involved, the HBM


    mappings, and the associated tables and its columns.


    Most of the persistence code that we will develop in this section will eventually
    be used in the DAO layer of the TechConf application. We will cover in great detail
    this important pattern when we build the business tier of the TechConf application.


    **Conferences Home Page**


    The entry point into the TechConf system will be a page where the public can see
    the list of available conferences. A class diagram showing the Conference class
    and its relevant associations is shown in Figure 4-13.


    **Figure 4-13.** *Conference class and its associations* As you can see from Figure
    4-13, a conference can have one or more tracks (for example, a Java conference
    could have a JSE, JEE, and JME tracks) and a venue. Listing 4-14 shows the SQL
    statements needed to create the CONFERENCE, VENUE, and TRACK.


