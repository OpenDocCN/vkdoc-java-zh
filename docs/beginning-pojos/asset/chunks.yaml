    **通知机制**


    CruiseControl 提供了多个发布器，可在构建完成后生成特定类型的输出。示例 config.xml 中使用的监听器会将最新的构建结果通知给 CruiseControl
    报告 Web 应用程序。通常在大多数开发团队中，开发人员在通过更直接的方式（如电子邮件）收到构建失败通知后，会使用该 Web 应用程序来解决问题。


    电子邮件是用于发布构建结果的典型渠道之一。CruiseControl 提供了两种类型的电子邮件发布器。简单的电子邮件发布器可以生成纯文本电子邮件，而更流行的
    htmlemail 则可以生成包含指向报告 Web 应用程序超链接的电子邮件。HTML 电子邮件是通过一组 XSLT 模板生成的。您可以通过提供自己的 XSLT
    文件来转换原始 XML，从而自定义生成的 HTML 电子邮件。


    清单 9-3 展示了 HTML 电子邮件发布器的典型配置。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


