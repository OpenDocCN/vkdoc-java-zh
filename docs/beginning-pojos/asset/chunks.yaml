    A good practice is to separate your life cycle methods in a separate class. To
    do this you’ll need to annotate the bean class with the `@CallbackListener` tag
    that specifies the class to be used as a listener to the life cycle calls.


    ## Roads to Persistence


    There are several ways to fulfill the persistence needs of a Java EE application,
    but the two obvious choices when using JBoss are using Hibernate, as shown in
    Chapter 4, or using EJB3 persistence service. Under the covers, JBoss uses Hibernate
    to power the EJB3 persistence engine. Hibernate implements the EJB 3.0/JSR-220
    persistence via its annotations and `EntityManager` implementations. Moving from
    Hibernate to EJB3 is a relatively simple process (if you need your application
    to use EJB3 persistence). In this chapter we will make use of the persistence-mapped
    POJOs developed in Chapter 4 since Hibernate, based on its popularity and pervasiveness
    in the industry, can also be considered a standard. Not to mention that JBoss
    AS offers the best integration with Hibernate of any application server.


    ## Hibernate in JBoss


    The JBoss AS provides for strong Hibernate integration via its HAR Deployer and
    Hibernate Service. Via the Hibernate Service you can have a Hibernate `SessionFactory`
    object bound to JNDI. The HAR Deployer is a specialized JBoss deployer that will
    scan the contents of a JAR archive with the extension `.har` and create a `SessionFactory`
    with any Hibernate mappings found (`.hbm.xml` files). HAR stands for Hibernate
    Archive, and it represents a custom deployment available in JBoss AS.'
