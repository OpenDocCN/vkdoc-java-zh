    **Figure 1-2.** *Architectural requirements diagram*


    Based on the architectural requirements outlined in the previous section, you
    should begin to see a clearer vision of the system’s architecture. It should accommodate
    both the functional requirements (business and application requirements) and nonfunctional
    requirements (architectural requirements). The architecture diagram for the TechConf
    website is divided into tiers of functionality, which can represent a logical
    or physical partitioning of the system.


    The architecture consists of the following tiers (following the well-known partitioning
    of the Java EE platform):


    - **Client tier:** represents client-facing portions of the system

    - **Presentation tier:** represents subsystems responsible for the generation
    of the user interface presentation-handling logic

    - **Business tier:** represents subsystems responsible for the handling of business
    logic

    - **Integration tier:** represents subsystems responsible for integrating external
    sources and destinations of information, including any legacy systems


    Figure 1-3 shows the application tiers and how messages are exchanged between
    them.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


