    The Summary page is the entry point page for any given conference. Therefore we
    wish to be able to access the page externally using a fixed URL that a user should
    be able to bookmark in their browser. This can also allow for the setting of subdomains
    on a Web server to provide each conference with a unique, easy-to-remember URL.


    To create a Tapestry page that can be referenced externally, the page class must
    implement the IExternalPage interface. The IExternalPage interface contains only
    one method, activateExternalPage, which takes as parameters an Object array and
    the current request cycle.


    Listing 7-28 shows the implementation of the Summary page, which extends the ActiveConferencePage
    base class and implements the IExternalPage interface. In the implementation of
    the activeExternalPage method, we retrieve the id of the conference being requested.


    The id is used to invoke the retrieveConferenceSummary method, which retrieves
    all the values needed to populate the Summary page. Those values are contained
    in the ConferenceSummary DTO


    returned by the getConferenceSummary method of the EJB3 ConferenceService.


    To avoid retrieving the conference summary information for every page under a
