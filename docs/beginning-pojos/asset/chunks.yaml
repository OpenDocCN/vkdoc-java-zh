    C H A P T E R 6 ■ T H E S P R I N G F R A M E W O R K


    **227**


    **Listing 6-28.** *ListConferencesController Bean Definition*


    <bean id="listConferencesController"


    class="com.integrallis.techconf.spring.web.ListConferencesController">


    <property name="conferenceService"><ref bean="conferenceService"/></property>


    </bean>


    **Creating a JSP View**


    With the controller configured, we can turn our attention to the view. The first
    parameter on the constructor call for ModelAndView is the name of the view, which
    will be resolved by the framework’s view resolver. Alternatively, the ModelAndView
    can also be constructed with a reference to a view object. The conferenceList
    view is represented by the conferenceList.jsp page shown in Listing 6-29\. All
    JSP pages are stored in a directory named jsp under the WEB-INF Web application
    directory.


    **Listing 6-29.** *JSP View conferenceList.jsp*


    <%@ page contentType="text/html; charset=UTF-8" %>


    <%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>


    <p>Currently Available Conferences</p>


    <ul>


    <c:forEach var="conference" items="${conferences}">


    <li>


    <a href="displayConference.htm?id=${conference.conferenceId}"> ${conference.conferenceTitle}


    </a>


    </li>


    </c:forEach>


    </ul>


    In the conferenceList.jsp page we use core JSTL forEach tag to iterate over the
    list of ConferenceSummary DTOs (accessed as ${conferences}). For each object we
    are creating a link that points to the displayConference.html page, displays the
    conferenceTitle, and passes the conferenceId field as the parameter id.


    **Using Tiles**


    For the TechConf application we will configure the view resolution using the Tiles
    framework.


    In a typical website you’ll have common elements to every page such as the header,
    footer, and navigation menu. Tiles is a framework that enables the usage of template
    layouts and reusability of common elements for JSP-based Web applications. Spring
    MVC integrates with the Tiles seamlessly. In Listing 6-30 shows the configuration
    elements in the application context needed to configure and use Tiles.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C06.fm Page 228 Wednesday, February 22, 2006 1:20 PM


    **228**


    C H A P T E R 6 ■ T H E S P R I N G F R A M E W O R K


    **Listing 6-30.** *View Resolution Strategy Using Tiles*


    <bean id="tilesConfigurer"


    class="org.springframework.web.servlet.view.tiles.TilesConfigurer">


    <property name="definitions">


    <list>


    <value>/WEB-INF/tiles-defs.xml</value>


    </list>


    </property>


    </bean>


    <bean id="viewResolver"


    class="org.springframework.web.servlet.view.InternalResourceViewResolver">


    <property name="viewClass">


    <value>org.springframework.web.servlet.view.tiles.TilesView</value>


    </property>


    </bean>


    The tilesConfigurer bean backed by an instance of TilesConfigurer is used to configure
    objects representing one or more Tiles views. In Listing 6-30 we load a tiles
    definition contained in the file tiles-defs.xml, which is located in the WEB-INF
    directory of the Web application.


    Before we take a look a the tiles configuration, let’s create a simple template
    in the form of a JSP. The simple template, template.jsp, is shown in Listing 6-31.


    **Listing 6-31.** *A Simple Tiles JSP Template*


    <%@ taglib uri="/WEB-INF/struts-tiles.tld" prefix="tiles" %>


    <html>


    <head>


    <title>TechConf - <tiles:getAsString name="pageTitle"/></title>


    <link rel="stylesheet" type="text/css" href="css/style.css"/>


    </head>


    <body>


    <h1><a href="index.html" style="color: #E9601A">TechConf</a></h1>


    <p id="titleblock" style="font-size: larger;">


    <tiles:getAsString name="pageTitle"/>


    </p>


    <tiles:insert attribute="body"/>


    </body>


    </html>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C06.fm Page 229 Wednesday, February 22, 2006 1:20 PM


    C H A P T E R 6 ■ T H E S P R I N G F R A M E W O R K


    **229**


    As shown in Listing 6-31, a Tiles JSP uses Tiles tags to insert attributes into
    the template page. The tiles-defs.xml file shown in Listing 6-32 contains a single
    definition for the view conferenceList, which uses the template (template.jsp)
    as the frame for the page. Inside the definition element we define the value to
    be inserted for the property pageTitle and more importantly the value to be used
    for the body property defined in the template, which corresponds to the conferenceList.jsp
    page previously created.


    **Listing 6-32.** *Tiles Definition File*


    <!DOCTYPE tiles-definitions PUBLIC


    "-//Apache Software Foundation//DTD Tiles Configuration 1.1//EN"


    "http://jakarta.apache.org/struts/dtds/tiles-config_1_1.dtd">


    <tiles-definitions>


    <definition name="conferenceList" page="/WEB-INF/jsp/template.jsp">


    <put name="pageTitle" value="Conferences" />


    <put name="body" value="/WEB-INF/jsp/conferenceList.jsp" />


    </definition>


    ...


    </tiles-definitions>


    The second bean shown in Listing 6-30 is the viewResolver bean, which tells Spring
    MVC


    to use a TilesView, which is a view implementation corresponding to a Tiles definition.
    This resolution strategy takes the URL as the name of the Tiles definition. The
    viewResolver bean depends implicitly on the Tiles DefinitionsFactory object which
    was also implicitly created via the tilesConfigurer bean.


