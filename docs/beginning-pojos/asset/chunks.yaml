    MBeans 是封装网络实体（如其他组件、应用程序和硬件设备）的组件。MBeans 与 EJB 类似，存在于遵循 JMX 服务器标准的容器中，即 MBean
    服务器。MBean 服务器是一个轻量级进程，类似于通用对象请求代理架构（CORBA）的 ORB，充当 MBeans 的存储库或注册中心。JBoss 中的 JMX
    服务器是系统的中枢，MBeans 在此插入并与其他 MBeans 交互。JMX 被设计为其他网络管理系统的桥梁和整合点，就像 Java 消息服务（JMS）和
    JDBC 分别用于企业消息传递和数据库连接领域一样。


    MBeans 专为管理而设计，它们通过向 MBean 注册，使客户端能够接收相关管理事件的通知。JBoss 基于 JMX 的灵活架构允许您选择在运行服务器中所需的组件（或服务）。只要存在符合规范的
    JMX MBean，JBoss 就允许开发者混合搭配特定 J2EE 服务的不同实现。MBeans 使用 MLets 进行注册和实例化。MLets 是管理小程序；MBean
    服务器提供一个 MLet 服务，用于加载一个文本文件，该文件指定了要加载的 MBeans 的信息。通过创建 MBean 服务，可以对 JBoss 进行扩展和定制。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


