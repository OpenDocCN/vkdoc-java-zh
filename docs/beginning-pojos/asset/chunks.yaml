    \n在表单内部，我们有两个组件。第一个组件是`PropertySelection`组件，它提供了一个下拉列表：\n\n```html\n<span jwcid=\"\
    @PropertySelection\"\n      model=\"ognl:@com.integrallis.time.Home@FORMAT_MODEL\"\
    \n      value=\"ognl:formatString\">\n  <select>\n    <option value=\"0\" selected=\"\
    selected\">h:mm a</option>\n    <option value=\"1\">EEE, MMM d, ''yy</option>\n\
    \  </select>\n</span>\n```\n\n与Swing组件类似，`PropertySelection`组件有一个关联的选择模型，该模型是`IPropertySelectionModel`接口的实现。该模型为下拉列表提供要填充的值，并用于确定用户选择的值。\n\
    \n拥有模型确实改变了Web开发的动态性。它们提供了灵活性，使您能够决定如何存储和检索填充组件的数据。模型还提供了一个集中的数据结构，可以在不同实体之间共享，从而避免重复，并且根据其上下文，它们可以有多个监听器，模型中的更改可以传播到这些监听器。这在处理异步JavaScript技术（AJAX）时尤其有用。\n\
    \n`PropertySelection`组件也是隐式定义的。`model`属性告诉组件从哪里获取数据，我们在`Home`类中将其定义为`FORMAT_MODEL`属性。`value`属性告诉Tapestry在表单提交期间将用户选择放置在哪里，我们在`Home`页面类中将其定义为`formatString`属性。\n\
    \n`PropertySelection`组件主体内部的`select`元素只是纯HTML，它在设计时为我们提供了下拉列表的预览。如果您查阅该组件的文档，您会发现它指出主体的内容将在渲染时被移除（文档中显示为“Body:\
    \ removed”）。这是一个非常强大的构造，是Tapestry“HTML就是HTML”理念的核心。\n\n最后，我们需要一种提交表单的方式。虽然我们可以使用一个简单的按钮来提交表单，但我们选择使用图像按钮来展示Tapestry如何处理资源。\n\
    \n`ImageSubmit`组件用于生成用于表单提交的图像按钮。它扩展了更简单的`Submit`组件，如下所示：\n\n```html\n<img jwcid=\"\
    @ImageSubmit\"\n     image=\"asset:btn_submit\"\n     alt=\"Submit\"\n     src=\"\
    images/submitButton.png\" />\n```\n\nTapestry组件库丰富的面向对象特性的另一个副作用是高度的可重用性；可以通过扩展或聚合更简单的组件来创建复杂的组件。在`ImageSubmit`组件中，我们声明图像将由Tapestry资源管理器提供，并且资源的名称为`btn_submit`。此外，还提供了替代文本，以防用户浏览器禁用了图像。最后，为了实现准确的HTML静态页面，使用`src`属性呈现了实际的图像。正如您将学到的，资源消除了在包含多个页面和多个目录的站点中通常遇到的查找资源（如图像和其他媒体）的混乱。\n\
    \n要为`submitButton.png`图像创建资源，请向`Home.page`定义文件添加一个`asset`元素，如下所示（假设图像位于上下文目录下的`images`目录中）。\n\
    \n```xml\n<asset name=\"btn_submit\" path=\"images/submitButton.png\" />\n```\n\
    \n完成HTML模板修改后，我们需要更新`Home`类以满足模板中的组件要求。清单7-10显示了修改后的`Home`类。"
  raw: 'For the Home.html template, we define the Form component implicitly by using
    the @ sign in the jwcid attribute. To handle the form submission we need to declare
    a listener method. In this case it is the formSubmit method that we will add to
    the Home.java class.


    Inside the form we have two components. The first component is a PropertySelection
    component, which provides a drop-down list:


    <span jwcid="@PropertySelection"


    model="ognl:@com.integrallis.time.Home@FORMAT_MODEL"


    value="ognl:formatString">


    <select>


    <option value="0" selected="selected">h:mm a</option>


    <option value="1">EEE, MMM d, ''''yy</option>


    </select>


    </span>


    Similar to a Swing component, the PropertySelection component has an associated
    selection model which is an implementation of the IPropertySelectionModel interface.
    The model provides the values for the drop-down to be populated and also serves
    to determine the value selected by the user.


    Having models really changes the dynamics of Web development. They give you flexibility
    regarding how the data that populates a component is stored and retrieved. Models
    also provide a centralized data structure that can be shared between different
    entities, avoiding replication, and depending on their context, they can have
    multiple listeners to which changes in the model can be propagated. This is especially
    useful when dealing with Asynchronous JavaScript Technology and XML (AJAX) techniques.


    The PropertySelection component is also defined implicitly. The model property
    tells the component where to get its data, which we define as the FORMAT_MODEL
    property in the Home class. The value attribute tells Tapestry where to place
    the user selection during the form submission, which we define as the formatString
    property, also in the Home page class.


    The select element inside the body of the PropertySelection component is just
    plain HTML that gives us a preview of the drop-down at design time. If you explore
    the documentation for the component, you’ll find out that it states that the contents
    of the body will be removed at rendering time (shown in the documentation as “Body:
    removed”). This is a very powerful construct that’s at the core of Tapestry philosophy
    that HTML should be HTML.


    Finally we need a way for the form to be submitted. Although we could have used
    a simple button for the form submission, we’ve chosen to use an image button to
    show how assets are


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm Page 258 Thursday, February 23, 2006 4:22 PM


    **258**


    C H A P T E R 7 ■ T A P E S T R Y


    handled in Tapestry. The ImageSubmit component is used to generate the image button
    to be used for a form submission. It extends the much simpler Submit component
    as shown:


    <img jwcid="@ImageSubmit"


    image="asset:btn_submit"


    alt="Submit"


    src="images/submitButton.png" />


    Another side effect of the rich object-oriented nature of the Tapestry component
    library is the amount of reuse; complex components can be created by extending
    or aggregating simpler components. In the ImageSubmit component we are declaring
    that the image will be provided by the Tapestry asset manager and that the name
    of the asset is btn_submit. Also, alternate text is provided in the case that
    the user browser has images disabled. Finally, to enable an accurate HTML static
    page, the actual image is presented using the src attribute. As you’ll learn,
    assets eliminate the confusion of finding assets (resources such as images and
    other media) typically encountered in sites with multiple pages in multiple directories.


    To create an asset for the submitButton.png image, add an asset element to the
    Home.page definition file as shown next (which assumes that the image is in the
    images directory under the context directory).


    <asset name="btn_submit" path="images/submitButton.png" /> With the HTML template
    modifications in place, we need to update the Home class to satisfy the components
    in the template. Listing 7-10 shows the modified Home class.'
