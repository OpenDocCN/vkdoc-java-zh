- fmt: '# Aspect Oriented Programming


    Another facility provided by the Spring framework and one on which Spring itself
    builds a lot of its internal functionality upon its AOP stack. Although Spring’s
    doesn’t provide a complete language-level AOP implementation, it provides the
    necessary AOP features to deal with common problems encountered in enterprise
    applications.


    As you’ll learn in depth in Chapter 10, AOP provides the ability to deal with
    cross-cutting concerns of an application in a declarative fashion. Aspects are
    behaviors or functionality that are required by the application but that might
    not necessarily belong alongside business application code. By defining pointcuts
    (where to apply an aspect) AOP techniques provide a clean way to deal with common
    services such as logging, persistence, transactions, and any other non-functional
    aspect that will otherwise litter your application code.


    Spring AOP was designed with usability in a Java EE environment in mind. Spring
    provides a coarse-grained dynamic proxy based AOP implementation that uses runtime-generated
    proxies to add concerns. Following the prevailing theme in Spring, any Spring
    bean can be advised in a declarative fashion. Spring itself uses several predefined
    aspects to handle transactions, security, tracing, logging, contention management,
    and integration with technologies like EJB and JMS. So if you are using Spring
    today, you are already (and perhaps unknowingly) using AOP. In Chapter 10 we will
    explore AOP techniques as they apply to the development of the TechConf application.


    # Full-featured Application Framework


    The Spring framework is much more than just another IoC/AOP lightweight container.
    Spring is a very non-invasive framework that will let you use as much as you need
    but not more. By providing a comprehensive and consistent feature set built upon
    the best offerings available in the open source arena, it provides a complete,
    feature-rich application framework that focuses of solving common Java EE problems.


    Spring provides abstractions to deal in a simple way with such concerns as transaction
    management, object-relational mapping, integration with MVC frameworks, and others.
    The abstraction of common services makes Spring applications completely portable
    across application servers or Web containers and provides a consistent way to
    deal with resource management and exception handling. Figure 6-2 depicts the extent
    of the Spring Framework and the myriad of tools and projects that it seamlessly
    integrates under a single roof.


    **Figure 6-2.** *Overview of the Spring Framework*


    As seen in Figure 6-2, Spring consists of 12 modules in the main distribution
    and 5 subprojects. The main Spring modules are:


    - **Spring Core:** Commons classes and interfaces not specific to any part of
    the framework, including exception handling and JDK and collections utilities

    - **Spring Beans:** Utilities to manipulate Java beans and the core implementation
    of the Inversion of Control container

    - **Spring AOP:** Spring AOP implementation (AOP alliance compliant); tightly
    integrated with Spring application context

    - **Spring Context:** Provides utilities for consistent resource lookup and sharing
    (including-JNDI bound resources, EJBs, email, internationalization, validation,
    and scheduling); also provides support for message sources, data binding, validation
    and the Observer design pattern

    - **Spring Support:** Provides support for JMX, JCA, scheduling, mail, and caching

    - **Spring Mock:** Provides mock testing classes for JNDI, servlet API, and general
    JUnit integration

    - **Spring JDBC:** Provides an abstraction over JDBC by providing template and
    callback interfaces, thread-safe classes for JDBC operations, and other utilities
    such as large database object-handling classes

    - **Spring ORM:** Provides support for various ORM technologies, including iBATIS
    SQL maps, Apache OJB, TopLink, and JDO

    - **Spring DAO:** Provides a clean, unchecked exception hierarchy for DAO implementations
    independent of the underlying data access technology

    - **Spring Hibernate:** Provides ORM support for Hibernate version 2.X and 3.X

    - **Spring Web:** Provides integration with many popular Web technologies, including
    Struts, Velocity, and JSF; also provides a multipart file upload framework and
    other Web utilities

    - **Spring MVC:** A full-featured MVC Web framework implementation that can be
    integrated with numerous view technologies including JSP, Velocity, Tiles, iText,
    and POI


    The five current Spring subprojects are:


    - **Spring Security:** Provides a comprehensive set of security services to the
    Spring framework, including support for single sign-on (SSO)

    - **Spring Web Flow:** Spring Web Flow (SWF) provides facilities to define and
    orchestrate page flow in Web applications

    - **Spring Rich Client:** Principles of the Spring Framework applied to the creation
    of professional Swing applications

    - **Spring BeanDoc:** A tool for documenting in a graphical way the structure
    of a Spring Bean Factory

    - **Spring IDE for Eclipse:** A collection of Eclipse plug-ins to work with Spring
    configuration files


    Spring also integrates with most Web application frameworks including the Apache
    Struts project, JSF, Tapestry, and most recently Wicket.


    # Installing and Configuring Spring


    The Spring Framework is distributed as a ZIP file containing source, prepackaged
    JAR files, and supporting files available at `www.springframework.org/download`.
    There are two available download types, one including all third-party (open source)
    dependencies and one without.


    I recommend that you download the one containing all dependencies. At the time
    of this writing the archive is `spring-framework-1.2.5-with-dependencies.zip`.
    Inside the archive you’ll find eight folders:


    - **dist:** Spring Framework distribution files

    - **docs:** Reference and API documentation and a Spring MVC tutorial

    - **lib:** All third-party dependencies, organized by project/product

    - **mock:** Web and JNDI mock objects

    - **samples:** Several sample applications

    - **src:** The complete source code base for the Spring Framework

    - **test:** Comprehensive set of JUnit tests

    - **tiger:** JSE 5.0 specific features, including annotation support for certain
    features like transactions and Hibernate 3.0 annotations


    The focus of this book is building Web applications; therefore you’ll need a Web
    container such as Tomcat or Jetty supporting the servlet API. As before, we will
    be using JSE 5.0 for all examples.


    # Working with Spring Bean Factories


    Spring Bean Factories are implementations of the factory design pattern that serve
    beans or objects of a specific type and configure them using metadata provided
    in the form of property files or XML documents. By far the most used part of Spring
    Bean Factory is the `XMLBeanFactory`, which can instantiate an implementation
    of an interface from an XML definition that describes which concrete class to
    use and how to configure it.'
