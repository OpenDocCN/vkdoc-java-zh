    **未决问题**


    预计随着系统的设计和开发，您对支配其行为的动态机制的理解将逐渐凝聚。新的关系和接口将被发现，之前未识别的使用场景也会出现。通过在设计中注入灵活性来为这些发现做好准备，是任何以可控方式演进的系统的关键。


    一些预期的未决问题如下：


    • 未识别的利益相关者


    • 由于应用程序服务于多个渠道，需要找到一种方法来生成特定渠道的内容


    • 需要创建几个系统级组件，用于身份验证、注册和支付处理


    • 可用的实现选择众多


    • 未识别的替代使用场景


    • 未识别的需求


    **设计路线图**


    为了应对 TechConf 系统持续的设计过程，您应遵循一个简单的设计路线图，该路线图将指导您创建模型，并随后生成代码，将这些模型具体化为一个可工作的软件系统。该路线图包含几个步骤或活动，其中许多可以并行完成，如下所示：


    • **创建分析对象模型（领域模型）：** 对领域的理解以静态模型（类模型）的形式记录下来，该模型将在需求分析和设计模型创建期间提供指导。此步骤提供了一个高层基础，从中更容易看出相关对象和组件的子系统是如何涌现的。领域模型还用于验证关于领域的任何假设或先入为主的观念，并巩固和集中关于问题领域的知识。


    • **需求分析：** 从分析和架构文档中定义参与者。为用户与系统的主要高层交互创建用户用例。然后，如有必要，将用户用例分解为系统级用例。系统级用例描述了系统中特定组件为完成用户用例所需的任务而采取的行动。对系统级用例的复用性进行快速评估。高优先级的用例会被详细编写，以降低主要风险（详细并不意味着实现层面的细节）。只要项目或产品存在，需求分析就会持续迭代进行。


    • **迭代规划：** 基于一组用例来规划迭代。执行集成规划以确定集成点，并对集成过程的整体自动化进行修改或增强。在本书中，每一章都被设定为一个迭代，旨在完成一定数量的用例。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C01.fm Page 12 Wednesday, February 22, 2006 6:01 AM


    **12**


    第 1 章 ■ 引言


    • **迭代执行：** 为用例（包括用户用例和系统用例）添加细节。为每个特性编写测试，并创建或增强集成代码或脚本。创建详细的动态模型（详细到足以实现，并且详细到足以最大限度地利用可用
    CASE 工具的任何正向工程特性）。定义所创建的任何子系统的类图，并更新整体模型图以反映迭代结果。必要时，创建组件图和子系统图，从而展示组件接口及其与对象模型的关系。

