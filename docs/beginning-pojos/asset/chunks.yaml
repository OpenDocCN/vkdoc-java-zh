    该类继承了 Spring 的 `AbstractController`，而 `AbstractController` 又实现了 `Controller` 接口。控制器实现负责以线程安全的方式处理
    `HttpServletRequest`，并最终返回一个 `ModelAndView` 对象。`ModelAndView` 对象是一种将模型和视图组合在一起的构造，使得控制器可以将它们作为一个返回值返回。`AbstractController`
    提供了缓存、会话同步和方法过滤器，是控制器实现的一个便捷基类。Spring 还提供了其他控制器实现，例如 `ParameterizedViewController`、`FileNameViewController`
    和 `MultiActionController`。


    控制器实现的主体在于 `handleRequestInternal` 方法的开发，该方法遵循 Servlet 语义，将 `HttpServletRequest`
    和 `HttpServletResponse` 对象作为参数。`ListConferencesController` 的实现使用 `ConferenceService`
    的实例，通过 `getAllConferences` 方法检索 `ConferenceSummary` DTO 列表。DTO 列表以标识符 `"conferences"`
    传递给 `ModelAndView` 类的构造函数，如构造函数调用的第二和第三个参数所示。


    为了能够使用 `ConferenceService`，我们需要提供一个字段来保存先前配置的服务实例，以及一个 setter 方法，用于通过应用上下文注入该服务。清单
    6-28 显示了 `listConferencesController` 的定义，该控制器由清单 6-27 中所示的 `ListConferencesController`
    类实现，并且我们正在为其注入先前创建的 `conferenceService` bean。


