- fmt: '# 排版后的内容


    Underneath the covers, tasks are plain Java classes that extend the `org.apache.tools.ant.Task`
    class, although any class that exposes a method with the signature `void execute()`
    can become an Ant task. One of Ant’s great advantages is its extensibility. Ant
    tasks are pluggable plain Java classes. To write a task all you need to do is
    extend the `Task` class and add some code to the `execute` method. Ant comes loaded
    with myriad tasks to accomplish many of the things needed during a typical build.
    These tasks are referred to as the core tasks and the optional tasks. There are
    also a countless number of third-party tasks, whether they’re commercial, freeware,
    or open source.


    The scope of Ant’s contribution to Java development isn’t obvious at first, especially
    on small projects. But once complexity begins to creep in and you have multiple
    developers, you’ll find that Ant becomes the glue that can help your team work
    in synchronization. It can basically remove the need for a full-time build “engineer.”
    This is largely the case with most open source Java projects, and their success
    should be a testament to the effectiveness of the integration power of using Ant.


    Ant isn’t without its critics, however. Many have failed to understand that Ant
    was never meant to be a full-fledged scripting language but a Java-friendly way
    to automate the build process in a simple declarative, goal-oriented fashion.
    Since its inception, many scriptinglike features have been added to Ant in the
    form of custom tasks, and the arguments between camps that want a full scripting
    language and ones that want a simple, dependency-driven build system continue
    to this day. In my opinion there is no right answer; scripting is programming,
    and you know the issues that arise with that. On the other hand, Ant’s simple
    declarative ways make it hard to do write-once and reuse builds across different
    projects. Ant’s reusability is at the task level. In his essay “Ant in Anger”
    (http://ant.apache.org/ant_in_anger.html), Steve Loughran recommends that to achieve
    the level of complexity that most developers turn to scripting to achieve, Ant
    builds can be dynamically generated on a per-project basis using something like
    eXtensible Stylesheet Language Transformations (XSLT).


    Fortunately, Ant version 1.6 provides new features that make Ant build reuse a
    reality.


    We will cover some of the relevant features that enable reuse later in this chapter.


    ## Obtaining and Installing Ant


    Ant can be obtained from http://ant.apache.org in binary and source distributions,
    or you can obtain the source code through CVS. Ant is a pure Java application.
    Therefore, the only requirement to run it is that you have a compliant JDK installed
    and a parser compliant with Java API for XML Processing (JAXP). Ant ships with
    the latest Apache Xerces2 parser. Ant is distributed as a compressed archive (.zip,
    tar.gz, and tar.bz2). Once the archive has been uncompressed to a directory (this
    directory is referred to as `ANT_HOME`), it’s recommended that you add the environment
    variable `ANT_HOME` to your system and the `bin` directory under the `ANT_HOME`
    directory to your system’s executable path. The `bin` directory contains scripts
    in many different formats for the most popular platforms. These scripts facilitate
    the execution of Ant and include DOS batch, UNIX shell, and Perl and Python scripts.
    Ant also relies on the `JAVA_HOME` environment variable to determine the JDK to
    be used.


    > **Caution** If you have only the JRE installed (a rare case for most Java developers)
    many of Ant’s tasks will not work properly.


    To verify that Ant is installed correctly, at the command prompt type: `ant -version`


    If the installation was successful you should see a message showing the version
    of Ant and the compilation date:


    ```

    Apache Ant version 1.6.5 compiled on June 2 2005

    ```'
