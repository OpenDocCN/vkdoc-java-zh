  raw: 'For example, if we examine the searchLocations method in Listing 8-26 we can
    see that the DAO instance is used to invoke the find method as zipcodeDAO.find(zipCode),
    which is expected to return a typed list of Zipcode domain objects. To train our
    mock object to respond correctly for the purposes of testing the searchLocation
    method, we can create some stub data objects to be used to set the expected response
    for our mock. The snippet of code that follows creates a Zipcode domain object
    and a List to contain the object.


    // data stub


    Zipcode stub = new Zipcode();


    stub.setZip(43081);


    stub.setCity("Westerville");


    stub.setState("OH");


    List<Zipcode> stubList = new ArrayList<Zipcode>(); stubList.add(stub);


    With the sample data we can now proceed to set the expectations of the mock object.
    EasyMock provides static methods that allow you to record the expected method
    call on the mock object and the return value of the call. In the code shown next
    we train the mock object to expect a call to the method find with the parameter
    “43081” and to return the list containing the stub Zipcode object previously created.


    expect(mock.find("43081")).andReturn(stubList); replay(mock);


    The call to replay the mock object activates it by stopping the recording phase.
    After the call to replay, the object will now behave like an instance of ZipcodeDAO
    in the context of the find method.


    Now we can use the mock object just as if it were a real implementation of ZipCodeDAO.


    Listing 8-27 shows the complete implementation of the test using TestNG and also
    passing an instance of the DynaDTO builder factory dynamically to replace the
    one that is injected dynamically from JNDI by the EJB container.


