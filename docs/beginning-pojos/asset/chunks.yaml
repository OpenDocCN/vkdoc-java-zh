    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    **117**


    Finding Objects by Criteria


    The final query API we will discuss is the criteria API, which provides a very
    sophisticated and object-oriented way to construct queries. HQL is a great step
    forward from SQL since it lets us talk to a relational database as if it were
    an object database, but it is still a query language that is not Java. Therefore
    the same issues that we faced as Java developers when doing direct JDBC


    using straight SQL apply. Simply not all of us are experts when it comes to SQL.
    Furthermore, when it comes to multiple database platforms, SQL can vary widely,
    especially when you get to the boundaries of the specifications and into the world
    of vendor-specific extensions.


    The Hibernate criteria API provides a way to create queries by chaining simple
    methods and simple objects that act as filters for a result set without using
    a specific query language.


    Listing 4-13 shows some examples of criteria queries.


    **Listing 4-13.** *Query by Criteria*


    // retrieve all addresses


    List<Address> allAddresses = session.createCriteria(Address.class).list();


    // retrieve all addresses for the state of ohio


    List<Address> addressesInOH = session


    .createCriteria(Address.class)


    .add(Expression.eq("State", "OH"))


    .list();


    // retrieve the first 23 addresses where the city is like


    // ''Columbus'' and the street address is like ''main'' and


    // order them by state


    List<Address> addresses = session


    .createCriteria(Address.class)


    .add(Expression.like("StreetAddress", "main"))


    .add(Expression.like("City", "Columbus"))


    .addOrder(Order.asc("State"))


    .setFirstResult(0)


    .setMaxResults(25)


    .list();


    As you can see, the QBC and QBE facilities in Hibernate can make your code much
    less cryptic and much more maintainable by eliminating convoluted non-Java SQL
    and SQL-like code in your application. When we implement the DAO pattern in the
    middle/integration tier of the TechConf application, we will make extensive use
    of the Hibernate criteria API.


    ■**Note** If you use HQL extensively in your applications, it is recommended that
    you externalize your queries by placing them in the HBM files. Hibernate can locate
    named queries at runtime, which will make your code cleaner and less complex,
    avoids copy and paste reuse, and provides centralized control for your queries.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


