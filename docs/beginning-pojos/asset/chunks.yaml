    按示例查找对象


    Hibernate 还提供了按示例查询（QBE）功能。按示例查询是 Hibernate 条件 API 的一部分。QBE 提供了一种便捷的方式，通过使用部分填充的
    POJO 作为示例来查找持久化实体，如清单 4-12 所示。


    **清单 4-12.** *按示例查询*


    // example pojo


    Address exampleAddress = new Address();


    exampleAddress.setCity("Columbus");


    exampleAddress.setStreetAddress("main");


    // create and configure the example object


    Example example = Example.create(exampleAddress)


    .excludeZeroes()


    .ignoreCase()


    .enableLike();


    List<Address> addresses = session


    .createCriteria(Address.class)


    .add(example)


    .list();


    清单 4-12 中的查询将生成类似如下的 SQL 查询：select * from Address a


    where (lower(a.StreetAddress) like ? and lower(a.City) like ?) 该查询将查找所有街道地址包含单词“main”且城市包含单词“Columbus”的地址，且不区分大小写。excludeZeroes
    方法会排除所有零值（null 或 0）属性出现在查询中。


