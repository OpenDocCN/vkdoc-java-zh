    C H A P T E R 2


    ■ ■ ■


    Eclipse


    **W**hen the JavaBeans specification surfaced, the idea of a component marketplace
    was on everyone’s mind, akin to the rich component ecosystem for technologies
    like ActiveX. Well, that pipe dream never came to be a reality, and by now it
    is obvious that the same mistakes occurred with the EJB technologies. Some blame
    the specifications (and that might be partially true), but by far the largest
    set of responses I’ve gotten point to one obvious area—it’s the tools, stupid!


    Early successful Java development environments were mostly commercial and proprietary
    closed systems in which only a selected few commercial partners could extend and
    build the environment. Some tools like Borland JBuilder provided a semblance of
    a plug-in framework, but none of them ever attained mass adoption (regardless
    of what the vendors’ marketing literature would tell you). Even though a lot of
    Java developers work effectively with a smorgasbord of tools and command-line
    utilities, many developers like to work in a cohesive integrated development environment
    (IDE).


    The Java open source IDE market was really weak before the emergence of Sun’s
    NetBeans IDE, which although successful, failed to gain widespread support from
    many commercial vendors or the open source community. The second major open source
    effort to create a Java IDE followed in late 2001\. The Eclipse IDE (www.eclipse.org),
    amazingly, was a fairly full-featured product that was (even at version 1.0) ready
    to help the masses of new and old Java developers be more productive. Eclipse
    represented a new way for a commercial vendor to do business, in that IBM, the
    parent company behind the Eclipse project, donated an estimated $40 million for
    its development.


    Eclipse came from IBM’s acquisition of renowned tools maker Object Technologies
    International (OTI), creator of the VisualAge line of products and well-known
    for its Smalltalk tools.


    The Eclipse project is more than just an open source Java IDE; Eclipse is a tool
    integration platform and, more importantly, a community of projects and ideas.


    This chapter is about introducing Eclipse into your development environment and
    complementing Eclipse with a variety of open source plug-ins that can make development
    more enjoyable and agile. This chapter by no means provides an exhaustive coverage
    of Eclipse, but it should help you get started with this powerful and popular
    IDE.


