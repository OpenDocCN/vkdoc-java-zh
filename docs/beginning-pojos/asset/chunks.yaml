    The previous query selects the first 25 addresses for the states of Ohio and Kentucky,
    and it will order the resulting list by city in reverse alphabetical order.


    Finding Objects by Example


    Hibernate also provides a Query by Example (QBE) feature. Query by Example is
    part of the Hibernate criteria API. QBE provides a convenient way to find persistent
    entities by using a partially populated POJO as an example as shown in Listing
    4-12.


    **Listing 4-12.** *Query by Example*


    // example pojo


    Address exampleAddress = new Address();


    exampleAddress.setCity("Columbus");


    exampleAddress.setStreetAddress("main");


    // create and configure the example object


    Example example = Example.create(exampleAddress)


    .excludeZeroes()


    .ignoreCase()


    .enableLike();


    List<Address> addresses = session


    .createCriteria(Address.class)


    .add(example)


    .list();


    The query in Listing 4-12 will result is a SQL query similar to: select * from
    Address a


    where (lower(a.StreetAddress) like ? and lower(a.City) like ?) which would find
    all addresses where the street address contains the word “main” and the city contains
    the word “Columbus” regardless of case. The excludeZeroes method excludes any
    zeroed (null or zero) properties from appearing in the query.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


