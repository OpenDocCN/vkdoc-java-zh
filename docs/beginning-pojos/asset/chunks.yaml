    C H A P T E R 1 0 ■ A D D I T I O N A L T O P I C S


    In AOP parlance an aspect is the implementation of a cross-cutting concern encapsulated
    into a unit of functionality. An aspect is the code that implements the functionality
    you want to be applied to one or more places in your code. How an aspect interacts
    with your code is defined by the join point model (JPM). In AOP a join point defines
    the places or events in your code where an aspect can be applied such as the constructor
    of a class, before, around, or after the execution of a method, before the value
    of a class member is modified or when an exception is thrown or handled. In an
    aspect definition, you declare which join points to apply the aspect.


    These join point declarations are called pointcuts which are a way to express
    one or more join points using patterns or regular expressions. The actual code
    that is applied to a join point is called an advice. The act of applying an advice
    to a join point is called weaving. Weaving can occur statically at compile time,
    or it can happen dynamically at runtime.


    ■**Note** While an AOP advice provides for a dynamic way to apply an aspect in
    a systemwide manner, an introduction offers a way to modify or augment a class
    statically. I will not cover introductions in this chapter, but it is a feature
    that you will most likely use as you delve deeper into the capabilities of AspectJ.'
  trans: '

    在本章中，我们将探讨一些用于填补 Java Web 应用开发空白的工具和技术。虽然不会涵盖每种技术的所有细节，但本章将帮助你入门开源生态系统中众多可用工具，并了解如何将它们集成到你的开发中。


    **使用 AspectJ 实现 AOP**


    一项极大简化软件开发方式的技术是面向切面编程（AOP），它为面向对象编程（OOP）提供了扩展机制，用于将问题域的解决方案分解为封装实体。AOP 技术允许我们以声明式且不引人注目的方式，将某些行为应用于应用程序的多个部分，或者完全改变或增强应用程序某些部分的行为。


    过程式编程和面向对象编程的原则都依赖于模块化的概念。但软件系统中有些方面天生难以模块化，尤其是那些触及系统多个领域的方面。例如，日志记录和跟踪就是软件应用中跨越多个边界的典型示例，即横切关注点。虽然我们可以通过将所有日志功能封装在日志库中来实现一定程度的模块化，但日志库的使用本身却分散在整个代码库中。AOP
    技术可以帮助我们应对冗余和混乱代码带来的成本。以日志记录为例，我们在许多地方看到相同的代码片段，这会导致许多问题。最大的问题是，日志语句虽然有助于诊断问题，却使代码的可读性降低。日志记录是应用程序的非业务需求，最终会掩盖业务相关代码，使其更难理解。下一个问题是维护；由于代码分散在整个代码库中，很难一致地对日志使用方式进行更改。


    AOP 的核心在于创建可在不修改代码本身的情况下应用于代码库的“配方”。在日志记录和跟踪场景中，这可能等同于一条规则，例如：


    “对于包 A 和 B 中的所有方法，在任何方法调用之前执行此代码”，或者“对于任何名称以 save 开头的方法中抛出的异常，输出一条日志语句。”


    **363**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C10.fm Page 364 Wednesday, February 22, 2006 1:23 PM


    **364**


    第 10 章 ■ 其他主题


    在 AOP 术语中，切面是将横切关注点封装成一个功能单元的实现。切面是实现你想要应用于代码中一个或多个位置的功能的代码。切面如何与代码交互由连接点模型（JPM）定义。在
    AOP 中，连接点定义了代码中可应用切面的位置或事件，例如类的构造函数、方法执行之前、环绕或之后、类成员值被修改之前，或者当异常被抛出或处理时。在切面定义中，你声明要应用切面的连接点。


    这些连接点声明被称为切入点，它是一种使用模式或正则表达式来表达一个或多个连接点的方式。实际应用于连接点的代码被称为通知。将通知应用于连接点的行为被称为织入。织入可以在编译时静态发生，也可以在运行时动态发生。


    ■**注意** 虽然 AOP 通知提供了一种以系统范围方式动态应用切面的方法，但引入提供了一种静态修改或增强类的方式。本章不会涵盖引入，但当你更深入地探索
    AspectJ 的功能时，你很可能会用到这个特性。'
- fmt: "# AOP-like Techniques and AspectJ\n\nAOP-like techniques have been used for\
    \ years, but not until recently have extensions to a language been created to\
    \ support AOP. Most open source implementations are based on dynamic proxies and\
    \ reflection. `AspectJ` is the pioneering aspect-oriented extension to the Java\
    \ programming language, and it’s partially the brainchild of `Gregor Kiczales`\
    \ and colleagues, who produced some of the earliest works on AOP in the mid-’90s.\
    \ `AspectJ` began life as a Xerox PARC project partially funded by NIST ATP (National\
    \ Institute of Standards and Technology Advanced Technology Program) and DARPA\
    \ (Defense Advanced Research Projects Agency). The framework originated from the\
    \ ideas and conclusions of research into several areas of software engineering,\
    \ particularly meta-object protocols and reflective and adaptive programming.\
    \ The `AspectJ` project was donated to the Eclipse Foundation’s project in December\
    \ 2002. `AspectJ`’s home on the Web can be found at `http://eclipse.org/aspectj`.\n\
    \n`AspectJ` is a collection of tools to extend the Java language with support\
    \ for AOP constructs.\n\nAt the heart of the system is the `AspectJ` compiler\
    \ (`ajc`), which extends the functionality of the `javac` compiler with the ability\
    \ to compile aspects and weave them statically into the code.\n\n`AspectJ`-enhanced\
    \ bytecode can run on any compliant standard Java VM.\n\n## Obtaining and Installing\
    \ AspectJ\n\n`AspectJ` is distributed as a JAR-based installer. At the time of\
    \ this writing the file is `aspectj-1.5.0.jar`.\n\nTo run the installer simply\
    \ type:\n\n```\njava -jar aspectj-1.5.0.jar\n```\n\nThe Java-based installer will\
    \ attempt to determine the location of the JDK on your machine, and then it will\
    \ create the installation for the `AspectJ` tools and documentation as shown in\
    \ Figure 10-1.\n\nFollow the prompts and select a location for the `AspectJ` installation.\
    \ After the installation is complete, a directory like that shown in Figure 10-2\
    \ will be created in the location of your choice.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00096.png)\n\n![](images/00127.png)\n\nSam-Bodden_596-3 C10.fm Page\
    \ 365 Wednesday, February 22, 2006 1:23 PM\n\nC H A P T E R 1 0 ■ A D D I T I\
    \ O N A L T O P I C S\n\n**365**\n\n**Figure 10-1.** *AspectJ graphical installer*\n\
    \n**Figure 10-2.** *AspectJ installation directory*\n\nThe `lib` directory contains\
    \ the JAR files needed to use `AspectJ`. Add the `aspectjrt.jar` file located\
    \ in the `lib` directory to your Java classpath. The `bin` directory contains\
    \ convenient UNIX shell and Windows batch scripts. To simplify running the `AspectJ`\
    \ tools add the `bin` directory to your system’s executable path.\n\n`AspectJ`\
    \ provides a graphical tool called the `AspectJ` browser that enables you to build\
    \ and run `AspectJ`-enhanced Java programs. Although useful, we will not cover\
    \ it here and instead will cover the usage of `AspectJ` from within an Ant buildfile\
    \ and also from within the Eclipse IDE via the AJDT plug-in. For more information\
    \ on using the `AspectJ` browser, see `http://www.eclipse.org/aspectj/doc/released/devguide/ajbrowser.html`.\n\
    \n## AspectJ and Ant\n\nLet’s start by modifying the Ant build script created\
    \ in Chapter 3 to use the `AspectJ` `ajc` compiler rather than `javac`. First\
    \ we’ll add the JAR files contained in the `AspectJ` `lib` directory under the\
    \ directory `lib/aspectj` of the TechConf application. The required JARs are:\n\
    \n- `aspectjlib.jar`\n- `aspectjrt.jar`\n- `aspectjtools.jar`\n- `aspectjweaver.jar`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C10.fm\
    \ Page 366 Wednesday, February 22, 2006 1:23 PM\n\n**366**\n\nC H A P T E R 1\
    \ 0 ■ A D D I T I O N A L T O P I C S\n\nTo add the JARs to the classpath we can\
    \ create a path element and add it to the project’s classpath as shown next:\n\
    \n```\n<path id=\"aspectj.class.path\">\n    <fileset dir=\"${aspectj-lib}\">\n\
    \        <include name=\"*.jar\"/>\n    </fileset>\n</path>\n\n<path id=\"class.path\"\
    >\n    ...\n    <path refid=\"aspectj.class.path\"/>\n</path>\n```\n\nWe will\
    \ keep all `AspectJ` aspect code (`.aj`) in its own source directory named `aspects`\
    \ under the `src` directory and add it to the global path of code to be compiled\
    \ as shown next:\n\n```\n...\n```"
  raw: 'AOP-like techniques have been used for years, but not until recently have
    extensions to a language been created to support AOP. Most open source implementations
    are based on dynamic proxies and reflection. AspectJ is the pioneering aspect-oriented
    extension to the Java programming language, and it’s partially the brainchild
    of Gregor Kiczales and colleagues, who produced some of the earliest works on
    AOP in the mid-’90s. AspectJ began life as a Xerox PARC project partially funded
    by NIST ATP (National Institute of Standards and Technology Advanced Technology
    Program) and DARPA (Defense Advanced Research Projects Agency). The framework
    originated from the ideas and conclusions of research into several areas of software
    engineering, particularly meta-object protocols and reflective and adaptive programming.
    The AspectJ project was donated to the Eclipse Foundation’s project in December
    2002\. AspectJ’s home on the Web can be found at http://eclipse.org/aspectj.


    AspectJ is a collection of tools to extend the Java language with support for
    AOP constructs.


    At the heart of the system is the AspectJ compiler (ajc), which extends the functionality
    of the javac compiler with the ability to compile aspects and weave them statically
    into the code.


    AspectJ-enhanced bytecode can run on any compliant standard Java VM.


    **Obtaining and Installing AspectJ**


    AspectJ is distributed as a JAR-based installer. At the time of this writing the
    file is aspectj-1.5.0.jar.


    To run the installer simply type


    java -jar aspectj-1.5.0.jar


    The Java-based installer will attempt to determine the location of the JDK on
    your machine, and then it will create the installation for the AspectJ tools and
    documentation as shown in Figure 10-1.


    Follow the prompts and select a location for the AspectJ installation. After the
