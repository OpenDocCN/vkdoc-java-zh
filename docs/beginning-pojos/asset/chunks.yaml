    第 5 章 ■ 使用 JBoss 的业务服务


    **147**


    **JBoss JEMS**


    JBoss 不仅仅是一个应用服务器，它是一个功能齐全的企业开发平台，在 JBoss 企业中间件系统（JEMS）品牌下提供完整的 Java EE 服务栈。它被定位为寻求构建真正“面向服务架构”（SOA）的企业的一个专业支持的选择，该架构建立在可靠、经过实战考验的中间件组件之上。


    JEMS 产品包括一系列令人印象深刻的产品，包括以下内容：


    *   **JBoss AS：** JBoss 应用服务器

    *   **Apache Tomcat：** Apache Tomcat Web 容器

    *   **Hibernate：** 对象关系持久化和查询服务

    *   **JBoss Portal：** 基于 Portlet 规范（JSR-168）提供内容聚合和个性化的门户平台。它由 JBoss Nukes 项目演变而来

    *   **JBoss jBPM：** 一个强大的工作流和业务流程管理引擎

    *   **JBoss Rules：** 基于 Drools 规则引擎的业务规则引擎

    *   **JBoss Cache：** 集群、分布式对象缓存

    *   **JBoss Eclipse IDE：** 一套用于开发 JBoss Java EE 1.4 应用程序的 Eclipse 插件


    **JBoss AS 架构**


    JBoss AS 构建在一个使用 JMX API 提供轻量级微内核层的基础之上，该微内核层提供了一个基于 MBean 的组件模型，该模型支持基于 MBean
    的服务的生命周期管理，并提供了一个高级且灵活的类加载方案。


    JMX 规范允许控制和管理托管 Bean（MBeans）。

    '
- fmt: 'MBeans are components that wrap the network entities such as other components,
    applications, and hardware devices. MBeans, just like EJBs, live in a container
    that abides by the JMX server standard, the `MBean` server. The `MBean` server
    is a lightweight process, similar to a Common Object Request Broker Architecture
    (CORBA) ORB, which serves as a repository or registry for MBeans. The JMX server
    in JBoss is the spinal cord of the system where MBeans plug in and interact with
    other MBeans. JMX was designed as a bridge and a consolidation point for other
    network management systems, just like Java Message Service (JMS) and JDBC are
    for the areas of enterprise messaging and database connectivity.


    MBeans are designed for management, and they provide clients with the ability
    to receive notifications of relevant management events by registering with the
    MBean. JBoss’ JMX-based flexible architecture allows you to select which components
    (or services) you want in a running server. JBoss enables developers to mix and
    match different implementations of specific J2EE services as long as there is
    a compliant JMX MBean. MBeans are registered and instantiated using MLets. MLets
    are management applets; the MBeans server provides a `MLet` service that loads
    a text file which specifies the information on the MBeans to be loaded. JBoss
    can be extended and customized by creating MBean services.


    Out of the box, JBoss has a service layer that provides a set of services that
    implements the Java EE 1.4 stack. Later in this chapter you’ll see how to use
    and manage the available JBoss services and how to add third-party services to
    fulfill the needs of your applications. The set of services that compose the Java
    EE 1.4 technology stack are provided by the following pre-packaged services available
    in the JBoss AS:


    - **JBossServer:** An advanced EJB container and JMX “bus”

    - **JBossMQ:** A JMS provider (to be replaced by JBoss Messaging)

    - **JBossTX:** For JTA/JTS transactions

    - **JBossCMP:** Container-Managed Persistence Engine

    - **JBossSX:** For JAAS-based security

    - **JBossCX:** For Java Connector Architecture (JCA) connectivity

    - **JBossMail:** Java mail provider

    - **JBossWeb:** An integrated Apache Tomcat container


    Overseeing the deployment and inter-service messages is an aspect layer composed
    of pipelines of interceptors that decorate certain aspects of the functionality
    of a service and its interaction with other services. For example, in the JBoss
    EJB container is a pipeline of interceptors providing a myriad of services such
    as persistence and security, among others.


    At the top of the hierarchy lies the application layer where your applications
    live. JBoss applications have the flexibility to use the services provided by
    the container either programmatically, via the use of deployment descriptors,
    or via Java SE version 1.5 metadata (JSR-175).


    The Java metadata facility was introduced with Java SE version 1.5 in the form
    of annotations which are built in language constructs that can be applied at the
    class, property, or method level to provide meta information directly in a Java
    class. Annotations are preceded by the `@` sign and can optionally take parameters.
    In Java EE they help to eliminate many glue classes, container contract classes,
    and many redundant XML deployment descriptors. Whenever possible and if adequate
    I will use annotations in code rather than external configuration files.


    Figure 5-1 shows an architectural diagram of the JBoss AS.


    Readers interested in finding out more on the inner workings of JBoss AS should
    start by exploring the JMX API, Java’s Dynamic Proxy API, and Rickard Oeberg’s
    “Interceptor Stack,” the pattern at the heart of the JBoss containers. To learn
    more about the JBoss server architecture, see the JBoss Application Server Guide
    located at `http://docs.jboss.org/jbossas/jboss4guide/r4/html`.


    **Figure 5-1.** *JBoss AS architecture*


    ## Installing and Configuring JBoss


    JBoss AS is distributed as a single zip/tar file or as a convenient visual installer
    (also available via Java Web Start) and is hosted on `www.sourceforge.net`. Go
    to `www.jboss.com/products/jbossas/downloads` and follow the instructions to obtain
    a distribution.


    I recommend that you use the visual installer since it simplifies the installation
    greatly. The version of JBoss used in this book is JBoss AS 4.0.3. If you’re using
    the graphical installer, select the full product installation containing the EJB3
    functionality.


    The visual installer is distributed as an executable JAR file; for version 4.0.3
    this file is `jboss-4.0.3-installer.jar`. To start the installation double-click
    the JAR file (in Windows XP) or on a command shell type:


    ```

    java –jar jboss-4.0.3-installer.jar

    ```


    The installation will present a step-by-step wizard that will allow you to select
    an installation directory, the language of the installation, and the type of installation.
    Figure 5-2 shows the installation type selection screen. As previously mentioned,
    for the examples in this book you’ll need to select the “all” installation.


    **Figure 5-2.** *JBoss AS installation type selection*


    Another installation option of importance is shown in Figure 5-3. You need to
    choose between the available class loading schemes and whether to restrict calls
    between in-container components to use call-by-value semantics versus the default
    call-by-reference (which is much more efficient).


    **Figure 5-3.** *JBoss AS installation class loading and invocation mode selection*


    The final installation step of importance, as shown in Figure 5-4, allows for
    the JMX administrative interfaces to the application server to be secured. This
    is important if you are setting up a production environment; for a development
    installation you can choose to bypass this step.


    **Figure 5-4.** *JBoss AS installation JMX security settings*


    Once the installation process has completed you can start the application server
    by changing directories to the `bin` directory under the JBoss AS installation
    directory and running the `run.bat` Windows batch file or the UNIX shell script
    `run.sh`. The console output should resemble the following:


    ```

    ===============================================================================

    .

    JBoss Bootstrap Environment

    .

    JBOSS_HOME: C:\java\jboss-4.0.3RC1\bin\\..

    .

    JAVA: C:\jdk1.5.0_04\bin\java

    .

    JAVA_OPTS: -Dprogram.name=run.bat -Xms128m -Xmx512m

    .

    CLASSPATH: C:\jdk1.5.0_04\lib\tools.jar;C:\java\jboss-4.0.3RC1\bin\\run.jar

    .

    ===============================================================================

    .

    23:24:43,375 INFO [Server] Starting JBoss (MX MicroKernel)...

    23:24:43,375 INFO [Server] Release ID: JBoss [Zion] 4.0.3RC1 (build: CVSTag=JBoss_4_0_3_RC1
    date=200506260220)

    23:24:43,375 INFO [Server] Home Dir: C:\java\jboss-4.0.3RC1

    23:24:43,375 INFO [Server] Home URL: file:/C:/java/jboss-4.0.3RC1/

    ...

    ```'
