    <binding name="format" value="ognl:dateEndFormater"/>


    </component>

    ```


    除了组件特定的功能外，组件规范文件还可以处理资产、服务和对象注入，就像我们之前学习页面规范时那样。


    **管理状态**


    `ConferenceBorder` 还负责登录和注销功能。为了处理保持已登录用户的状态，我们在 HiveMind 配置中声明了一个状态对象贡献。


    该状态对象是一个简单的 POJO，可以通过 ID `logged-in-user-data` 引用，并映射到 `com.integrallis.techconf.web.tapestry.domain`
    包中的 Java 类 `LoggedInUser`。该对象的作用域是会话，这正好符合用户登录的生命周期。此贡献的配置 ID 为 `tapestry.state.ApplicationObjects`。这里的“贡献”一词意味着
    HiveMind 正在向 Tapestry 特定的配置做出贡献，在本例中是 Tapestry 应用程序对象，如清单 7-21 所示。


    **清单 7-21.** *使用 HiveMind 配置应用程序状态对象*


    ```xml

    <?xml version="1.0"?>


    <module id="app" version="1.0.0" package="com.integrallis.techconf">


    ...


    <contribution configuration-id="tapestry.state.ApplicationObjects">


    <state-object name="logged-in-user-data" scope="session">


    <create-instance


    class="com.integrallis.techconf.web.tapestry.domain.LoggedInUser"


    />


    </state-object>


    ...


    </contribution>


    ...


    </module>

    ```


    清单 7-22 展示了 `LoggedInUser` POJO，它是一个简单的包装器，用于保存 `UserSummary` 和 `ConferenceSummary`
    DTO。


    **清单 7-22.** *简单的 LoggedInUser 应用程序状态 POJO*


    ```java

    public class LoggedInUser implements Serializable {


    private UserSummary userSummary;


    private ConferenceSummary conferenceSummary;


    public ConferenceSummary getConferenceSummary() {


    return conferenceSummary;


    }


    public void setConferenceSummary(ConferenceSummary conferenceSummary) {


    this.conferenceSummary = conferenceSummary;


    }


    public UserSummary getUserSummary() {


    return userSummary;


    }


    public void setUserSummary(UserSummary userSummary) {


    this.userSummary = userSummary;


    }


    }

    ```


