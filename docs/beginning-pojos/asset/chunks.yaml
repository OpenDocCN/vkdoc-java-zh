    \ extra information:\n\n```\nApache Ant version 1.6.5 compiled on June 2 2005\n\
    \nBuildfile: build.xml\n\n...\n\nBuild sequence for target 'Target C' is [Target\
    \ A, Target B, Target C]\n\nComplete build sequence is [Target A, Target B, Target\
    \ C]\n\n...\n\nBUILD SUCCESSFUL\n\nTotal time: 1 second\n```\n\nFirst, notice\
    \ that the output shows that the intended target is `Target C`, which was defined\
    \ as the build’s default target. Ant resolved the default target dependencies\
    \ to arrive at the build sequence `[Target A, Target B, Target C]` as shown at\
    \ the top of the console output.\n\nThe text enclosed in the `echo` elements in\
    \ each of the targets is shown on the console as each target is executed. The\
    \ `echo` task is one of many built-in tasks provided by Ant. For example, a quick\
    \ browse of the online documentation shows that the `echo` task sends the text\
    \ enclosed to an Ant logger. By default Ant uses the `DefaultLogger`, which is\
    \ a class that “listens” to the build and outputs to the standard out. Specific\
    \ loggers can be selected on the command line by using the `-logger` option. Further\
    \ examination shows that the `echo` task is well integrated with the logging system\
    \ and that it can be provided with a `level` attribute to control the level at\
    \ which the message is reported.\n\n> **Note:** I decided against regurgitating\
    \ the contents of the online documentation; therefore I’ll explain some of Ant’s\
    \ tasks in context as you set out to build the tiers of the TechConf system. The\
    \ best place to learn about all the available Ant tasks is from the online manual\
    \ located at [http://ant.apache.org/manual/index.html](http://ant.apache.org/manual/index.html).\n\
    \nThe previous run of the sample script assumed that you wanted to run the default\
    \ target. To run a specific target you can indicate the target in the command\
    \ line as follows:\n\n```\nant \"Target A\"\n```\n\nNotice that target names are\
    \ case sensitive and that double quotes are required for any target names that\
    \ contain spaces. The resulting output should look like this:\n\n```\nBuildfile:\
    \ build.xml\n\nTarget A:\n\n[echo] Performing Step A\n\nBUILD SUCCESSFUL\n\nTotal\
    \ time: 1 second\n```\n\n## More on Targets\n\nTargets are meant to represent\
    \ a discrete step in the build process. Targets use tasks, datatypes, and property\
    \ declarations to accomplish their work. Targets are required to have a `name`\
    \ attribute and an optional comma-separated list of dependent targets.\n\n> **Best\
    \ Practice:** Use simple action verbs to name your targets, such as “build,” “test,”\
    \ or “deploy.”\n\nA typical buildfile is composed of several main targets: those\
    \ that are meant to be called directly by the user and subtargets, which are targets\
    \ that provide functionality to a main target.\n\n> **Best Practice:** Add a `description`\
    \ attribute to a build’s main targets. Targets containing a description are shown\
    \ in the automatic project help, which is displayed when Ant is invoked with the\
    \ `-p` or `-projecthelp` command-line options. For subtargets, prefix the name\
    \ with a hyphen to make it easy to differentiate them from main targets.\n\nTargets\
    \ can be conditionally executed, and for this purpose Ant supports the `if` and\
    \ `unless` attributes. Targets using either or both of these are said to be conditional\
    \ targets. Both `if` and `unless` take the name of a property as a value, which\
    \ is a test for existence. You can see an example of this if you modify `Target\
    \ A` from the sample buildfile and add an `if` attribute with a value of `do_a`\
    \ as shown in Listing 3-2.\n\n**Listing 3-2.** *Conditional Ant Target*\n\n```xml\n\
    <target name=\"Target A\" description=\"Performs Step A\" if=\"do_a\">\n    <echo>Performing\
    \ Step A</echo>\n</target>\n```"
