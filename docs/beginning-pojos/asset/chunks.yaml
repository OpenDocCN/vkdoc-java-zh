  raw: 'As you can see in Listing 5-22, the DAO implementation becomes fairly simple
    by using the utility methods provided in the abstract DAO base class. Notice that
    in the methods that take the name of any property of a POJO, I’ve added utility
    final static String fields to the POJOs in order to minimize the possibility of
    errors as shown in the getScheduledEntryForUser, getRemindersForScheduleEntry,
    and getRemindersForUser methods.


    Now that we have all the constituents in place, we can assemble the ScheduleService
    implementation as shown in Listing 5-23\. The DynaDTO builder factory is injected
    as shown before using the @Resource annotation, and the DAOs are injected using
    the @EJB annotation.


    The @EJB annotation is used to inject EJB stubs. It replaces the cumbersome lookup
    code previously needed with EJB 2.X. In the ScheduleServiceBean class I decided
    to use EJB stub injection using a class field, but like most dependency-injection
    facilities, it can also be applied to setter methods. For example, the field scheduleDAO
    is of type ScheduleDAO, which happens to be the local interface of the ScheduleDAOBean.
    At runtime the container will look up the stub for the ScheduleDAOBean and inject
    it into the ScheduleServiceBean.


    ■**Note** In situations when there are multiple bean implementations of a service
    interface, the @EJB


    annotation can take attributes to specify how the EJB container locates the specific
    bean instance.


    **Listing 5-23.** *ScheduleServiceBean: An EJB3 SLSB Service* package com.integrallis.techconf.ejb;


    ...


    @Stateless


    public class ScheduleServiceBean implements ScheduleService {


    @Resource(name = "java:/dynadto/BuilderFactory") protected BuilderFactory builderFactory;


    @PostConstruct


    public void initialization() {


    // constructs the DynaDTO builders


    scheduleEntryInfoBuilder = builderFactory


    .getBuilder(ScheduleEntryInfo.class);


    reminderInfoBuilder = builderFactory.getBuilder(ReminderInfo.class);


    }


    // DAOs


    @EJB protected ScheduleDAO scheduleDAO;


    @EJB protected PresentationDAO presentationDAO;


    @EJB protected UserDAO userDAO;


