    \n# AJAX with Tacos\n\nNo, we are not talking about a potentially deadly new concoction\
    \ at Taco Bell. The term AJAX is today’s hot buzzword and stands for Asynchronous\
    \ JavaScript and XML and was coined in early 2005 by Jesse James Garrett of Adaptive\
    \ Path, a design and user experience consulting firm in San Francisco. AJAX encompasses\
    \ a set of Web development techniques for creating rich, interactive Web applications.\
    \ AJAX is being defined even as you read this text. The combination of these technologies\
    \ has been referred to as DHTML and remote scripting in the past. Many claim that\
    \ AJAX is a new name for old things that have been around for almost the last\
    \ 10 years, while others point out that it is the evolution and the synergistic\
    \ usage of these technologies that is new. The even newer term Web 2.0 is being\
    \ used to refer to AJAX and other technologies that are taking the Web user experience\
    \ and capabilities to a new level.\n\nThe impact of websites like Google Maps,\
    \ Google Suggest, Gmail, Flickr, Amazon’s A9, and the many spin-offs and clones\
    \ that their success have created are being used as the foundation to define AJAX.\
    \ In his original article Garrett defines AJAX as:\n\n- Standards-based presentation\
    \ using XHTML and CSS\n- Dynamic display and interaction using the Document Object\
    \ Model (DOM)\n- Data interchange and manipulation using XML and XSLT\n- Asynchronous\
    \ data retrieval using `XMLHttpRequest`\n- JavaScript binding everything together\n\
    \nIn the past we all have used websites where a page had certain dynamic elements\
    \ that did not require a page reload such as a folding and expanding of information\
    \ triggered by hovering over a particular image or text. The difference between\
    \ those earlier JavaScript-enabled sites and an AJAX website is that in the former\
    \ case the data was preloaded in its entirety and simply hidden from view. With\
    \ AJAX the UI is dynamic, and the data behind the user interface is also dynamic.\
    \ In a typical AJAX interaction a user action results in asynchronous HTTP requests\
    \ to the server using the JavaScript `XMLHttpRequest` object that results in HTML,\
    \ XML, plain text or even JavaScript returned from the server. The information\
    \ returned from the server is used to modify the DOM tree of the current page\
    \ dynamically without a page reload.\n\nThe gains are all in the user experience\
    \ as it approaches the richness of standard desktop applications. With careful\
    \ planning, users are no longer tied to the traditional request-response dance.\
    \ The interaction with a website becomes a chain of dynamic, behind-the-scenes\
    \ asynchronous requests, bound by few full round trips to the server. The typical\
    \ side effects include the added complexity to development with a need for tighter\
    \ integration between the client and the server and a slew of other technical\
    \ hurdles including:\n\n- Browser incompatibilities\n- Accessibility and internationalization\
    \ concerns\n- Testing and debugging complexity\n- Asynchronous requests outside\
    \ of the application domain (sandboxing)\n- Security and the implication of mobile\
    \ code\n- Network throughput and traffic concerns\n\nSome of these concerns are\
    \ being addressed by encapsulating solutions and common patterns of usage in frameworks.\
    \ The technology glue that has advanced AJAX from simple client-side scripting\
    \ to the hot item of the day is the evolution of projects like Dojo ([www.dojotoolkit.org/](http://www.dojotoolkit.org/)),\
    \ script.aculo.us ([http://script.aculo.us/](http://script.aculo.us/)), Prototype\
    \ ([http://prototype.conio.net/](http://prototype.conio.net/)), Rico ([http://openrico.org/](http://openrico.org/)),\
    \ and DWR ([http://getahead.ltd.uk/dwr](http://getahead.ltd.uk/dwr)).\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nSam-Bodden_596-3 C07.fm Page 290 Thursday, February 23, 2006 4:22 PM\n\n**290**\
    \ C H A P T E R 7 ■ T A P E S T R Y\n\nLuckily for Tapestry users, AJAX-enabled\
    \ components are available via the Tacos component library. Taco is a small but\
    \ robust framework for building AJAX-enabled Tapestry components as well as a\
    \ complete library of ready-to-use Ajaxian Tapestry components. Tacos was created\
    \ by Viktor Szathmary and is actively maintained by Jesse Kuhnert. The Tacos project\
    \ is hosted at SourceForge ([http://tacos.sourceforge.net/](http://tacos.sourceforge.net/))\
    \ and distributed under the Apache open source license.\n\nTacos provides all\
    \ the power of AJAX without the complications of dealing with constructs like\
    \ `XMLHttpRequest` and complex JavaScript. Tacos takes advantages of the most\
    \ mature JavaScript AJAX libraries available. It depends primarily on Dojo, but\
    \ it also relies on Prototype and script.aculo.us for certain components.\n\n\
    As you will see in the TechConf Tacos example in this section, you rarely need\
    \ to interact directly with JavaScript. Tacos also provides a built-in logging\
    \ and debugging console that simplifies the development of rich Web applications.\n\
    \n# Using Tacos in Your Tapestry Application\n\nTacos is distributed in source\
    \ and binary form. Documentation and samples are also distributed separately.\
    \ Table 7-3 shows the Tacos distribution files.\n\n**Table 7-3.** *Tacos Distribution\
    \ Files*\n\n| File | Description |\n|------|-------------|\n| `tacos-alpha-7-lib.zip`\
    \ | Includes the core JAR file (`tacos-alpha-7-lib.jar`) and JavaScript libraries\
    \ |\n| `tacos-alpha-7-src.jar` | Source distribution, including demos source code\
    \ |\n| `tacos-alpha-7-docs.zip` | Javadoc and User Guide documents (complete content\
    \ of Tacos site) |\n| `tacos-alpha-7-demo.war` | Deployable Web archive containing\
    \ examples of every Tacos component |\n\nBy far the easiest way to get started\
    \ with Tacos is to use the demo WAR file as a skeleton for your WAR archive. Figure\
    \ 7-21 shows the location of the different Tacos elements in the TechConf `tapestry-web`\
    \ directory (the template directory for the WAR file). Figure 7-21 also shows\
    \ the structure and location of the Tapestry page and component specification,\
    \ as well as the HTML templates.\n\nTo get acquainted with Tacos, I recommend\
    \ test-driving the Demo application. You can access the demo application online,\
    \ or better yet, you can simply deploy the demo WAR file in Tomcat or JBoss. Figure\
    \ 7-22 shows the Tacos demo application running under Tomcat.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00086.png)\n\n![](images/00008.png)\n\nSam-Bodden_596-3 C07.fm Page\
    \ 291 Thursday, February 23, 2006 4:22 PM\n\n**291** C H A P T E R 7 ■ T A P E\
    \ S T R Y\n\n**Figure 7-21.** *Tacos in TechConf*\n\n**Figure 7-22.** *Tacos demo\
    \ application running under Tomcat*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
