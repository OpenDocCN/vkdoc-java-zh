    **第 2 章 ■ Eclipse**


    ## 安装 Eclipse


    Eclipse 以单个压缩归档文件的形式分发，可用于 Windows 平台、Solaris、AIX、HP-UX、Mac OS X 以及几种现有的 Linux
    架构。Eclipse 要求您拥有 Java 运行时环境（JRE）1.4 或更高版本。为了完成本书的练习（以及依赖于 Java 注解等技术，如 EJB3），您将需要
    JRE 1.5 或更高版本，如命令 `java -version` 的输出所示。


    ```

    java version "1.5.0_05"

    ```'
