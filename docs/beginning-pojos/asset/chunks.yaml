    当您准备进入 Java EE 世界时，重要的是要记住，良好的设计实践——而非技术——应该驱动企业应用程序的开发。尽管在特定时刻，您可能不得不做出由特定技术的缺点驱动的实现决策，但您应该始终牢记基于问题空间而非解决方案空间的坚实设计的全局。在这个敏捷方法论和技术的时代，许多人很快地否定了软件建模。但正如
    Scott Ambler（`www.agilemodeling.com`）和其他人所证明的那样，软件建模可以只是您敏捷方法武器库中的另一件武器。


    在本章中，您已经学到了一套扎实的技术，并且借助开源建模工具，您可以使您的模型更加健壮，更能适应需求和技术的变化。


