    \n`CruiseControl` provides several publishers that can generate specific types\
    \ of output after a build has been performed. The listener used in the sample\
    \ `config.xml` notifies the `CruiseControl` reporting Web application about the\
    \ latest build results. Typically in most development teams, developers use the\
    \ Web application for problem resolution after they have been notified of the\
    \ build failure via a more direct way such as email.\n\nEmail is one of the typical\
    \ channels used for publishing the results of a build. `CruiseControl` provides\
    \ two types of email publishers. The simple email publisher can generate a plain\
    \ text email, while the more popular `htmlemail` can generate an email with hyperlinks\
    \ to the reporting Web application. The HTML email is generated via a set of XSLT\
    \ templates. The generated HTML email can be customized by providing your own\
    \ XSLT files to transform the raw XML.\n\n`Listing 9-3` shows a typical configuration\
    \ of the HTML email publisher.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
