    Developers had to go through hoops implementing their own frameworks to test their
    components in isolation outside of the J2EE container. Most developers who came
    from building good object-oriented applications, when thrown under the wheels
    of the EJB bus, decided to take the path of *most* resistance, using EJB in an
    inverted fashion by first building robust, interface-driven


    “by contract”, object-oriented applications and using EJB as a layer to leverage
    multithreading, object pooling, and other container services. After all, there
    is much more to J2EE than just EJB, but unfortunately, the previous ill-designed
    versions of the EJB specification took the limelight **195**


