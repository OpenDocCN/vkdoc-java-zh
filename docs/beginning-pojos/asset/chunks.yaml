    **3**


    IT 行业一直推崇多种方法来应对设计、构建和维护软件密集型企业系统所固有的复杂性。面向对象、基于组件的分布式系统代表了当前最先进的企业级系统技术。本书从实践层面探讨了当交给信息技术专家的“银弹”是
    Java（特别是 Java EE）时，构建企业应用程序所面临的一些问题。Java EE 前景广阔，尤其对于缺乏经验的技术人员而言，因为它堪称完美的技术银弹。然而，现实经验远非软件乌托邦，正如
    Seybold Group 最近的一项研究表明，管理层对 Java EE 的期望与实际达成的结果之间存在差距。造成这种差距的原因之一是缺乏覆盖 Java EE
    开发诸多方面的工具。正是在这一领域，开源企业 Java 工具和框架应运而生，有助于弥合这一差距。


    学习如何结合使用开源框架和工具来构建企业应用程序，能够提供一个低成本、低风险、理想的原型开发环境，从而掌握分布式计算技术。开源通过提供传统专有产品之外的选择，降低了进入
    Java 和 Java EE 世界的门槛。


    本章的其余部分将介绍一个真实世界的示例，使 Java EE 技术的应用更加清晰。该示例引入了一个现实的业务问题，作为使用开源技术设计、构建和部署企业 Java
    系统学习过程的背景。我们将从需求入手，为本书后续章节探讨的设计、架构和实现方法奠定基础。


    **案例研究：TechConf 网站**


    本章介绍的 TechConf 网站案例研究是一个技术会议管理系统，包含一系列用于宣传、筹备和支持一个或多个技术会议的系统及实用程序。技术会议是在预定时间段内举办的活动，由一个或多个环节（演讲、主题演讲等）组成。


    作为技术会议的常客演讲者和参与者，我认为该领域非常适合本书的写作目的。主要利益相关者，即与系统有切身利益关系的人，都是像你我一样的技术人员，这使得我们更容易理解用户的需求，从而使需求收集、分析和设计过程更加清晰。


    从技术上讲，由于信息需求的动态性以及举办此类活动所涉及的物流问题，技术会议在分布式计算和企业开发领域提出了一些独特的挑战。


    如果你和我以及大多数其他程序员一样，你会想直接跳到代码部分，并且可能认为越早开始编码，就能越早完成项目。然而，对于除了最琐碎的应用程序之外的所有项目，事实并非如此；在编写一行代码之前，必须进行一定程度的规划。你可以随心所欲地进行原型开发，但如果没有设计，就很难实现稳定、正确且可维护的解决方案。所以，请耐心阅读接下来的几页。它们可能会对你下一个项目有所帮助。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C01.fm 第 4 页 2006 年 2 月 22 日星期三 上午 6:01


    **4**


    第 1 章 ■ 引言


    **定义利益相关者**


    要理解系统的动态性，确定利益相关者是谁以及他们的个人信息需求如何随时间变化至关重要。在技术会议背景下需要考虑的主要利益相关者如下：


    • **参会者：** 参加会议的个人

    • **演讲者：** 在会议上进行一个或多个环节演讲的个人

    • **赞助商：** 赞助和推广会议的组织

    • **管理员：** 组织和管理会议的个人或团队


    为了清晰描绘利益相关者不断变化的需求，将会议视为三个独立的时间段会很有帮助：会前、会中和会后。毕竟，活动管理就是关于时间线的。图 1-1 展示了会议的三个阶段。


    会前


    在会前阶段，数据被收集、评估和创建。收集的数据包括征文通知、摘要以及不同演讲的提纲等文档。根据收集到的文档，必须创建内容，并在源文档发生变化时进行维护。除了文档管理需求外，还必须提供设施供参会者注册并管理他们计划参加的活动日程。此时，及时提供信息以使注册和到达会议的过程更加便捷也至关重要。一些提升体验的实用工具包括获取驾车路线或关于旅行和酒店住宿的会议特别优惠信息。


    会中


    会议期间的信息需求对会议的成功至关重要。满意的参会者更有可能在第二年再次参加。能够过滤噪音、锁定兴趣领域并选择要参加的环节，是提升参会者体验的重要因素。提供互动性和持续反馈可确保参会者始终与会议的脉搏保持同步。会议开始时，需要为参会者办理签到并发放会议胸牌。任何环节或演讲的变更或更新都需要有效传达，以便参会者管理他们的日程。


    会后


    会议结束后，仍有大量工作要做。参会者现在成为了校友，因此他们是未来会议的主要目标受众。提供连续性感对于技术会议的校友和未来参会者都很重要。应该建立一座桥梁，将以往会议的主题和内容与正在进行的和未来的会议连接起来。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


