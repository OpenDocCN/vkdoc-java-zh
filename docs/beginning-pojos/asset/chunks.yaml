    ## Web Development Plug-ins


    There are many plug-ins, both commercial and open source, to accelerate and ease
    the development of J2EE Web applications. The Eclipse project has three subprojects
    dedicated to the creation of tools for the J2EE environment. Table 2-1 shows the
    Eclipse subprojects for J2EE and Web development.


    **Table 2-1.** *Eclipse Tool Subprojects*


    | Project | Description | URL |

    |---------|-------------|-----|

    | Eclipse WST | Web standard tools | http://eclipse.org/webtools/wst/main.html
    |

    | Eclipse JST | J2EE standard tools | http://eclipse.org/webtools/jst/main.html
    |

    | Eclipse JSF | JavaServer Faces (JSF) tools | http://eclipse.org/webtools/jsf/index.html
    |


    For good coverage of the JST tools, an excellent reference is *Pro Eclipse JST*
    by Judd and Shittu (Apress, 2005). Another plug-in worth mentioning is the open
    source Lomboz plug-in, which supports the creation of EJB, servlets, Web services
    and other J2EE components. The Lomboz plug-in can be found at http://lomboz.objectweb.org.


    ## Summary


    In this chapter you learned the basics of using the Eclipse IDE to develop Java
    applications with ease. With the ever-growing ecosystem of Eclipse plug-ins, it
    is easy to turn Eclipse into your own personalized IDE. Eclipse has become in
    a relatively short time the number-one platform for the development of Java applications,
    and with the right combination of open source plug-ins, you can improve and streamline
    the development of J2EE Web applications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 3


    ## Building with Ant


