    **148**


    第 5 章 ■ 使用 JBoss 的业务服务


    开箱即用，JBoss 有一个服务层，提供了一组实现 Java EE 1.4 技术栈的服务。在本章后面，您将看到如何使用和管理可用的 JBoss 服务，以及如何添加第三方服务来满足应用程序的需求。构成
    Java EE 1.4 技术栈的服务集由 JBoss AS 中以下预打包的服务提供：


    • **JBossServer：** 一个高级 EJB 容器和 JMX “总线”

    • **JBossMQ：** 一个 JMS 提供者（将被 JBoss Messaging 取代）

    • **JBossTX：** 用于 JTA/JTS 事务

    • **JBossCMP：** 容器管理持久化引擎

    • **JBossSX：** 用于基于 JAAS 的安全性

    • **JBossCX：** 用于 Java 连接器架构（JCA）连接

    • **JBossMail：** Java 邮件提供者

    • **JBossWeb：** 一个集成的 Apache Tomcat 容器


    监督部署和服务间消息的是一个由拦截器管道组成的切面层，这些拦截器装饰了服务的某些功能方面及其与其他服务的交互。例如，在 JBoss EJB 容器中，有一个拦截器管道提供了诸如持久化和安全性等众多服务。


    在层次结构的顶部是应用层，您的应用程序就位于此处。JBoss 应用程序可以灵活地使用容器提供的服务，可以通过编程方式、使用部署描述符，或者通过 Java SE
    1.5 元数据（JSR-175）来实现。


    ■Java 元数据功能是在 Java SE 1.5 中以注解的形式引入的，注解是内置于语言中的结构，可以应用于类、属性或方法级别，直接在 Java 类中提供元信息。注解以
    @ 符号开头，并且可以选择性地接受参数。


    在 Java EE 中，它们有助于消除许多胶水类、容器契约类以及许多冗余的 XML 部署描述符。只要可能且合适，我会在代码中使用注解而不是外部配置文件。


    图 5-1 展示了 JBoss AS 的架构图。


    有兴趣了解更多 JBoss AS 内部工作原理的读者，应该从探索 JMX API、Java 动态代理 API 以及 Rickard Oeberg 的“拦截器栈”开始，后者是
    JBoss 容器的核心模式。要了解更多关于 JBoss 服务器架构的信息，请参阅位于 http://docs.jboss.org/jbossas/jboss4guide/r4/html
    的 JBoss 应用服务器指南。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


