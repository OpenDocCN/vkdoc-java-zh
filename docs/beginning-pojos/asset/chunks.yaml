    ### Service Objects


    The last few years have seen the emergence of lightweight containers in combination
    with agile techniques as the new standard to strive for in Java enterprise development.
    But what does it mean to be doing "lightweight" Java? I see lightweight Java as
    the marriage of simplified programming models based on rich object-oriented models
    using POJOs and POJIs with responsive, intrusive, yet robust and full-featured
    component containers.


    The accepted notion of a lightweight container such as those provided by the Spring
    framework, PicoContainer and NanoContainer, is for them to have a small memory
    footprint, fast start-up times, and the ability to hot-deploy components and applications
    without having to restart the server. Do you have to have a traditional lightweight
    container to be doing lightweight Java? In my opinion, lightweight Java is more
    about the programming model and the ability to shorten the code-compile-deploy-test
    cycle than the memory footprint or start-up times of a server as long as they
    are within reasonable boundaries. In that case, the main feature of lightweight
    Java contributing to increased developer productivity is a programming model that
    doesn''t force your business and domain objects to conform to any specific component
    model, that allows you to use long-accepted best practices like that of programming
    to interfaces, and that has the ability to provide container services in a transparent
    way to the components living in the container without crippling their usability
    or testability outside of the container.


    The EJB3 specification is an amalgamation of the lessons learned by the movement
    to make Java more lightweight and agile by reducing the unnecessary complexities
    introduced in previous specifications. In combination with the JSR-175 metadata
    facility and the use of techniques like IoC/DI and AOP, it makes JBoss AS a platform
    for lightweight and agile development.


    In EJB3 development, components are POJOs, and POJOs are components. By using
    metadata in the form of annotations, any POJO can enjoy the benefits that a traditional
    managed service object has such as loose coupling, network independence, and the
    ability to have resource pooling transparently available.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C05.fm Page 155 Wednesday, February 22, 2006 6:13 AM


    ## CHAPTER 5 ■ BUSINESS SERVICES WITH JBOSS


    **155**


    ### Stateless Session Beans


    For most Java EE applications, stateless session beans (SLSBs) have become the
    standard way to expose services provided by the middle tier. In combination with
    the Session Façade, Data Transfer Object (DTO), Command Pattern, and Data Access
    Object (DAO) design/implementation, patterns are one of the ways to define the
    functionality that our applications provide.


    In previous incarnations of the EJB specification we had so many moving parts
    that getting started with our projects became an exercise in drudgery. Luckily
    for us, in EJB 3.0 the path of least resistance has been chosen, and all we have
    to do to create an SLSB is to have a POJO that implements (at least one) POJI
    describing the services being provided.


    You could simply have a business interface `Business.java` and a bean implementation
    `BusinessBean.java`.


    > **Note** The bean class may or may not implement a business interface although
    I recommend that you use interfaces to define the contracts between your application
    tiers and components. If you choose to not implement any business interfaces,
    a business interface will be dynamically generated using all the public methods.


    If only certain methods should be exposed in the business interface, all of those
    methods can be marked with the `@BusinessMethod` annotation.


    Once we have this contract in place, all we need to do is annotate the POJO class
    with the EJB3 annotation `@Stateless`. This will flag this class as an SLSB so
    that at deployment time the JBoss EJB3 container can provide our simple class
    with all the enterprise services. But in order to keep our interfaces free from
    any EJB-specific annotations, we can subclass the business interface in order
    to provide specific interfaces to serve as remote and local interfaces. To do
    this we can create two interfaces, named `BusinessRemote.java` and `BusinessLocal.java`,
    and annotate them with `@javax.ejb.Remote` and `@javax.ejb.Local` respectively.'
