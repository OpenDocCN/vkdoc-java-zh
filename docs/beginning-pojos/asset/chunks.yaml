    **242**


    ## 第 7 章 ■ TAPESTRY


    `Tapestry` 处理了 Web 开发人员面临的所有平凡和不那么平凡的任务，例如 URL 构建、简化和分发、客户端和服务器端状态管理、表单输入验证、本地化、国际化以及异常处理和报告。


    `Tapestry` 的版本 4 为一个已经功能丰富的框架带来了更多特性，包括以下内容：


    - **友好的 URL：** 更依赖于路径信息而非查询参数的 URL，这使得 URL 看起来更简洁，并且更容易与基于路径的工具（如 `J2EE` 安全）进行配置

    - **监听器方法：** 更简单的配置和语法

    - **消息目录：** 组件消息目录和全局消息目录，如果在组件级别未找到消息，则会搜索全局目录

    - **Portlet 支持：** 对开发 `JSR-168` portlet 的完整原生支持

    - **性能：** 减少对反射和 `ONGL` 的依赖，更多地依赖约定和智能配置'
  raw: 'JSP/Servlet Model 2 represented a huge leap forward in terms of maintainability
    and development time. It allowed for separation of concerns between HTML designers
    and Java developers as well as between Java developers of varied skills; more-seasoned
    developers usually ended up writing most of the controlling code while more-junior
    developers deal with the JSPs. As more and more Model 2 applications were being
    built, many developers noticed the repetition of effort from application to application.
    The typical question became, how do we avoid recreating the wheel over and over
    again? And most developers’ conclusion culminated with the creation of frameworks
    to provide uniform ways to deal with MVC applications and removing the need for
    the plumbing code.


    Today we have many frameworks based on the MVC pattern, and they provided a great
    deal of functionality that you no longer have to create from scratch. They also
    standardized Web development in the Java world to an extent. The different frameworks
    all implement MVC


    in slightly different ways. Some have one chosen technology for view generation
    such as JSPs or some sort of template engine as Velocity, while others allow pluggable
    view implementations. One thing that most have in common is that although they
    are built on top of the servlet API, they still work under the same underlying
    principle of the request/response paradigm that makes your development and the
    resulting code very procedural. Many technologists’ feelings were these frameworks
    help us deal with the Web as an application platform, but they have also flattened
    and taken away some of the power of object orientation provided by Java.


    Meanwhile, a little-known framework was already providing a framework for Web
    development based on the MVC pattern but with components that embraced object-orientation
    at its core. That framework was NeXT WebObjects, which appeared in 1996 and later
    became Apple’s WebObjects. WebObjects had a great deal of interest behind it and
    attracted a significant number of large players looking for a robust platform
    on which to build large-scale Web applications. WebObjects today remains a closed
    source proprietary system that until just recently had a price tag that placed
    it out of most developers’ hands. WebObjects is a J2EE-compliant Web development
    framework providing more than just Web development—a suite of tools, advanced
    ORM, scalability, and performance features. For example, one of the largest applications
    running on WebObjects is Apple’s iTunes Music Store.


    Fortunately for most of us, an alternative as powerful and flexible as WebObjects
    is available from the open source community in the Jakarta Tapestry Web application
    framework.


    Tapestry began life as a SourceForge project in 2000 loosely based on the way
    WebObjects worked. It gained enough public acceptance to become an Apache Jakarta
    project in 2003.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm Page 241 Thursday, February 23, 2006 4:22 PM


    C H A P T E R 7 ■ T A P E S T R Y


    **241**


    **What Is Tapestry?**


    Tapestry is an open source Java Web application framework created by Howard Lewis-Ship
    and a talented group of contributors. Tapestry is distributed under the Apache
    Software License version 2.0\. In Tapestry, as opposed to other frameworks like
    Struts, you deal with components and pages (which are themselves components),
    and interactivity is provided via listeners which interpret the user’s actions
    associated with a component.


    A Tapestry application is made of pages. Each page consists of a template and
    a number of components. The templates are standard HTML pages decorated with span
    tags declaring the Tapestry components.


    Tapestry is built on top of the servlet API, but unlike other frameworks, it completely
    abstracts the procedural request-response nature of the Web by allowing you to
    work with pages and components in a similar way that a Java Swing developer works
    with forms and components. As with many Web frameworks, Tapestry takes the drudgery
    out of common tasks and functionality like state management, input validation,
    localization and internationalization, and error reporting. But instead of dealing
    with URLs, HTTP requests, and responses, you work at a higher level of abstraction
    dealing with user interaction with the pages and components in an object-oriented
    way. As in a Swing application, components and pages know how to respond to events
    which are mapped from the HTML component view representation to the Java implementation.


    One of the greatest strengths of Tapestry for a Web development team lies in its
    strong separation of concerns between Web designers and Java developers. It also
    brings true object-oriented development to Web applications. As a former Delphi
    and Swing developer, I was initially attracted to experiment with Tapestry by
    this factor. In Tapestry you create plain HTML


    pages, and using span tags or any other HTML tags, you embed Tapestry components.
    Tapestry allows you to use static markup in the location of the components to
    accurately represent the look and feel of the page at design time. These static
    placeholders (for example, a drop-down field) are replaced at runtime with a live
    Tapestry component. This allows HTML designers to work with the actual templates
    used by the application, guaranteeing that the responsibility for the application
    look stays with the designers and functionality stays with the application developers.


    The components view in the HTML and any possible actions taken by a user on a
    component are glued together with small amounts of Java code and optionally with
    very simple XML


    configuration files. Tapestry uses the HiveMind IoC framework/microkernel under
    the covers to deal with resource and service configuration. We will learn more
    about HiveMind as we work to integrate a Tapestry Web application with an EJB3
    back end. Tapestry also comes with a large collection of prepackaged components,
    provides good support for JavaScript (for client-side validation and interaction)
    and has several third-party libraries that provide AJAX-enabled components. Tapestry
    is a battle-tested Web framework that can be used to create scalable and robust
    Web applications.


    **Tapestry 4 Features**


    I ran into Tapestry late in its life. When I started using Tapestry, version 3.0
    had just been released.


    At that point it was obvious to me that Tapestry was a robust, fully-featured
    Web framework.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm Page 242 Thursday, February 23, 2006 4:22 PM


    **242**


    C H A P T E R 7 ■ T A P E S T R Y


    Tapestry takes care of all the mundane and not-so-mundane tasks that Web developers
    face, such as URL construction, simplification and dispatching, client- and server-side
    state management, form input validation, localization, internationalization, and
    exception handling and reporting.


    Version 4 of Tapestry brings even more features to an already feature-rich framework,
    including the following:


    • **Friendly URLs:** URLs that depend more on path information and less on query
    parameters, which makes for cleaner-looking URLs and for easier configuration
    with path-based utilities like J2EE security


    • **Listener Methods:** Easier configuration and syntax


    • **Message Catalogs:** Component message catalogs and a global message catalog,
    which will be searched if a message is not found at the component level


    • **Portlet Support:** Full, native support for developing JSR-168 portlets


    • **Performance:** Less reliance on reflection and ONGL and more on conventions
    and smart configuration'
