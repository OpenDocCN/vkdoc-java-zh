    **339**


    **测试 EJB3 无状态会话 Bean**


    EJB3 作为 POJO 的优势之一在于，测试它们几乎与测试任何其他 Java 类一样简单。为了演示如何测试 EJB3 SLSB，我们将使用模拟对象。


    模拟对象是面向测试的对象，用作协作对象或被测单元的替身。这项技术已经存在了一段时间，但由 Tim Mackinnon、Steve Freeman 和 Philip
    Craig 在 2000 年的一次极限编程会议上发表的一篇论文中将其正式化。

    '
- fmt: 'Mock objects are more than stubs in that they are more than a simple holder
    of data. Mock objects simulate part of the behavior of a collaborator and also
    provide for a way to verify the behavior. Mock objects can be used as stubs, but
    their real power lies in testing the interactions between a class and its collaborators.
    Unit testing is about testing the units of a system in isolation, but in most
    cases a unit’s behavior can be tested only in the context of its interactions
    with collaborating objects. Mock objects provide a way to provide a testing-time
    replacement for a facet of the behavior provided by a collaborating object.


    Most of the EJB services in the TechConf system depend on DAOs to retrieve data
    from the database. In order to mock these DAO collaborators we’ll use the EasyMock
    2 library, which is a mock-objects library that can dynamically generate a mock
    object for a given interface.


    EasyMock 2 can be downloaded from `www.easymock.org`. To use EasyMock, simply
    add the `easymock.jar` file to your classpath.


    As an example of how to test an EJB3 SLSB, we’ll use the `LocationLookupServiceBean`,
    which uses an instance of the `ZipcodeDAO` interface as a collaborator to retrieve
    data from the database. The EJB also uses the DynaDTO library to create DTOs to
    be returned to the EJB clients. Listing 8-26 shows the `LocationLookupServiceBean`.


    **Listing 8-26.** *The LocationLookupServiceBean EJB*


    ```

    package com.integrallis.techconf.ejb;


    import java.util.List;


    import javax.annotation.EJB;


    import javax.annotation.Resource;


    import javax.ejb.PostConstruct;


    import javax.ejb.Stateless;


    import org.dynadto.Builder;


    import org.dynadto.BuilderFactory;


    import com.integrallis.techconf.dao.ZipcodeDAO;


    import com.integrallis.techconf.domain.Zipcode;


    import com.integrallis.techconf.dto.Location;


    import com.integrallis.techconf.service.LocationLookupService;


    @Stateless


    public class LocationLookupServiceBean implements LocationLookupService {


