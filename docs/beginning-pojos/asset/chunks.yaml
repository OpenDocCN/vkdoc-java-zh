    # Chapter 9


    ## Continuous Integration


    We have all heard the figures of how many software projects fail. The statistics
    tell us that the larger the project, the more likely it is to fail. In my own
    experience, I’ve seen projects that on the surface appear to be marching along
    until that dreaded day when you have to give your customers a demo. As you check
    down the features list and talk to the developers responsible, you learn that
    some of the features are working but have not yet been integrated. Everybody checked
    their code in, and one poor soul, probably the one labeled QA engineer, attempts
    to build the application. The anticipation fills the air as you see a barrage
    of errors on the QA machine. What happened? It worked for every developer individually.
    So, who do you blame?


    From these lessons, we arrived at the nightly build, which typically creates a
    deliverable of some sort that a QA person can test in the morning. This practice,
    although good, still doesn’t solve the problem. At the root of the problem there’s
    an issue of culture. Programmers grew accustomed to getting a copy of the source
    code that they would work on until they deemed it worthy of being integrated into
    the main code base.


    One modern software development practice that’s been embraced and promoted by
    many methodologies, particularly by the Extreme Programming (XP) movement, is
    the practice of continuous integration (CI). This practice might be one the most
    important lessons you’ll ever learn from the XP and agile movements (although
    it’s not a new concept, it has now been formalized and championed by these movements).
    The main idea is that developers working on a project should integrate changes
    to their code at least on a daily basis. With a powerful set of unit tests and
    a system that enables those tests to be performed in a continuous and automated
    fashion, you can ensure that any problem introduced into the system will be discovered
    in the next build. So, CI is about developer discipline and tools that make the
    desired behaviors the path of least resistance.


    Continuous integration, coupled with a strong set of tests, prevents problems
    from going unnoticed. It localizes in time problems introduced into the code base
    and the knowledge of the existence of those problems, enabling you to react as
    they occur. A well-configured CI system is like having a heart monitor on the
    pulse of your application that makes developers accountable for the code they
    check into the project.


    CI is more that just building the code often. Its success depends on many factors.
    Some of them are fortunately common practice nowadays, but others require a bit
    of forethought, including the following:


    - **Version Control:** There should be a single, versioned repository where all
    developers can get access to the latest version of the application code as well
    as previous versions.

    - **Build Automation:** It should be relatively simple for developers to build
    the application. Typically, a single command and a minimum amount of configuration
    should be required.

    - **Test Automation:** The application’s test suite should be easy to execute,
    and adding new tests should be very simple.


    In Chapter 8, you learned how to create unit tests for your applications. The
    build created in Chapter 3 and enhanced throughout the book should set the stage
    for making CI a reality in your next project and keep your project’s health in
    check. With the foundations in place, the basic steps to accomplish continuous
    integration are simple:


    - **Integrate:** Changes are checked into a central repository. (Code that adds
    new features requires new test cases that must also be checked in.)

    - **Test:** All tests are performed. A successful integration is bound by a 100
    percent success rate of the testing stage. If any tests fail, the offending code
    is rolled back, and code is refactored until it passes the tests.

    - **Repeat:** With the help of automation, you can run this process at well-defined
    intervals (ideally a minimum of once a day) and every time a change is introduced
    into the code base. This ensures that the system code base remains fully tested
    at all times and that bugs and missing features are addressed as soon as possible.


    CI as championed by XP and agile-methodology proponents is one of those concepts
    that most developers agree with but few teams ever implement. You should build
    only what’s necessary, and it should be tested for compliance with the requirements
    as often as possible and as soon as it is introduced into the code base. You also
    should understand that making lots of changes at once leads to hours of “big-bang”
    integration testing later on.


    By never holding on to changes in the code for more than a day, a team can minimize
    the chances that the code will become fragmented. What can produce hard-to-find
    bugs and countless hours of integration effort are these “unofficial forks” to
    a code base that occur when a developer never integrates changes to the code base
    and is effectively working on an older version in their development environment.


    By adopting a test-driven approach to development in combination with build-process
    automation, a team can achieve continuous integration and build only what’s needed
    when it’s needed, and build it right. CI increases the team’s knowledge about
    the system being built, thereby boosting its reaction time to feedback from the
    system and the system’s stakeholders. CI reduces the overall cost of developing
    software by making it easier to find, diagnose, and fix problems.


    CI takes some preparation, coordination, and buy-in from your team. In my experience,
    CI works best in conjunction with test-driven development on newer code bases.
    If you have inherited a code base with little or no tests, the first step is to
    understand the code by writing tests before you can implement a CI solution.


    > **Tip** One of the best essays on CI was written by Martin Fowler and can be
    read on his website at [www.martinfowler.com/articles/continuousIntegration.html](http://www.martinfowler.com/articles/continuousIntegration.html).


    ## Cruise Control


    To enable CI for the TechConf system, we will use the `CruiseControl` continuous
    integration framework which is hosted at the SourceForge under [http://cruisecontrol.sourceforge.net](http://cruisecontrol.sourceforge.net).'
