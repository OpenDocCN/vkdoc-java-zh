    **格式化输出**


    在组件规范中，我们将 DTO `ConferenceSummary` 中包含的许多值绑定并格式化到 `Insert` 组件中。Tapestry 格式化能力的一个例子是对会议开始和结束日期的格式化，这些日期将显示在会议标题下方。清单
    7-20 展示了如何将一个格式化器对象定义为属性，然后将其作为格式化器应用于 `Insert` 组件的内容。


    **清单 7-20.** *格式化 Insert 组件的内容*


    ```xml

    <property name="dateEndFormater"


    initial-value="new java.text.SimpleDateFormat(''EEE, d MMM yyyy'')"/>


    <component id="endDate" type="Insert">


