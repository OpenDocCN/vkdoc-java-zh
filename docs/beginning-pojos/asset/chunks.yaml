    第 3 章 ■ 使用 Ant 构建


    **51**


    你将环境变量 `ANT_HOME` 添加到系统中，并将 `ANT_HOME` 目录下的 `bin` 目录添加到系统的可执行路径中。`bin` 目录包含针对最流行平台的多种不同格式的脚本。这些脚本便于执行
    Ant，包括 DOS 批处理、UNIX shell、Perl 和 Python 脚本。Ant 还依赖 `JAVA_HOME` 环境变量来确定要使用的 JDK。


    ■**警告** 如果你只安装了 JRE（对于大多数 Java 开发者来说很少见），Ant 的许多任务将无法正常工作。


    要验证 Ant 是否正确安装，请在命令提示符下输入：`ant -version`


    如果安装成功，你应该会看到一条消息，显示 Ant 的版本和编译日期：


    `Apache Ant version 1.6.5 compiled on June 2 2005`

