    请注意，`addTrack` 方法通过将传入的 Track 对象添加到 Conference 对象的 Track 集合中，同时设置被添加 Track 对象的
    conference 属性，从而维护了关系的两端。将这种关系维护封装在一个简单的方法中，将使两个类的使用更加简便。


    映射中的“lazy”属性告诉 Hibernate，在加载 Conference 对象数据的同时，加载关联的 Track 对象。对于 Track 关联，我选择将
    lazy 属性设置为 false，因为我们的领域对象将从中间层用于填充数据传输对象（DTO），以提供给 Web 层。何时使用延迟加载是一个重要的决策。在上述案例中，影响决策的因素包括应用程序的架构（在
    Web 层直接使用 DTO 还是领域对象）以及 Track 对象的数量和大小（数量少且规模较小）。


    ■**注意** 在 Hibernate 3.X 中，默认所有关联都是延迟加载的。如果你正在将应用程序从 Hibernate 2.X 迁移到 Hibernate
    3.X，这可能会导致许多延迟实例化异常，尤其是在使用数据传输对象模式时。


    在 Conference 类中，我们以 Set 的形式创建了与 Track 类的关联。


    为了完成会议与轨道之间关联的另一端，我们需要向 Track 类添加一个关联，以便能够检索关联的会议对象。关联的会议对象的标识应与列 FK_CONFERENCE_ID
    的值匹配。我们可以使用 many-to-one 元素来提供这样的链接，如清单 4-18 所示。


