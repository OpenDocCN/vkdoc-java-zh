    \  </htmlemail>\n</publishers>\n```\n\nMost of the attributes in the `htmlemail`\
    \ element are related to the SMTP configuration or to the formatting of the outgoing\
    \ email. The elements of interest are the three sub-elements `always`, `failure`,\
    \ and `success`. The `always` element specifies that `bigboss@integrallis.com`\
    \ will always get an email regardless of whether the build was a success or a\
