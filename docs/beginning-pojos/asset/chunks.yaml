    \nSam-Bodden_596-3 C06.fm Page 204 Wednesday, February 22, 2006 1:20 PM\n\n**204**\
    \ CHAPTER 6 ■ THE SPRING FRAMEWORK\n\nAnother thing to notice about how Spring\
    \ is managing your beans based on the simple XML file shown is that the `greetingService`\
    \ bean is in fact a singleton. All bean definitions in a Spring XML file are singletons\
    \ by default, which is typically the type of behavior you would need for stateless\
