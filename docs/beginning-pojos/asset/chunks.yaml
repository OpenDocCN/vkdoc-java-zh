    Nothing helps when working with a new Web framework as actually building a functioning
    Web application. Like any other Java servlet or JSP-based framework, the deployable
    unit for a Tapestry application is a WAR file. Let’s take a step-by-step approach
    at building our first Tapestry application. This application would start as a
    very simple single page application producing some content dynamically.


    Dynamic content is what differentiates a Web application from a static website,
    and it means only that the information your website or application displays varies
    based on some conditions. Examples of dynamic content include news sites, product
    catalogs where entries change and users can accumulate a shopping cart of items,
    and online polls and statistics.


