    Notice that the table has all of the fields required to store every element of
    the User-Attendee-Presenter class hierarchy. Also notice that all of the fields
    for the subclasses are nullable. The column USERTYPE—a VARCHAR(3)—will serve as
    the discriminator column that Hibernate will use to determine the type of object
    that’s stored in a given row.


    Now let’s take a look at the HBM mapping file for the user class hierarchy shown
    in Listing 4-25.


