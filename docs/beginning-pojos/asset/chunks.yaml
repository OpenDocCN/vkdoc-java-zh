- fmt: '# Unit Testing in Java


    Today in software development, the term “unit testing” is commonly used to refer
    to the type of testing that isolates a unit and tests its internal functionality
    as well as its external contracts. If you approach testing as the first stage
    of development, unit testing becomes testing of code that you are yet to write.
    The test-first philosophy is at the core of test-driven development (TDD) and
    has been proven to improve code quality and control the scope of a project. In
    the house example, the manufacturer testing would be considered unit testing.
    Unit testing in Java treats a Java class as the atomic unit of functionality and
    mixes white-box and black-box testing. For example, if a class `MyClass` has a
    public method called `doSomething` that depends on a private method `performCommonOperation`,
    then as part of the tests for `MyClass`, let’s say in class `MyClassTest`, we
    will have a method `performCommonOperationTest` (a white-box test) and a `doSomethingTest`
    (black-box test). A software test has certain preconditions, and the actual test
    is checking the post-conditions against the expected state for the given preconditions.


    ## Unit Test or Functional Test?


    I mentioned previously that unit testing in Java is composed of white-box testing
    and black-box testing. White-box testing is testing the internals of the class,
    like private and protected methods, and accounting for their implementation. Black-box
    testing is testing the different ways the public methods might be used by other
    classes, including usage that might be considered erroneous. Black-box testing
    is sometimes referred to as functional or concrete testing, and in certain circles
    unit testing in Java that requires any resource outside of the class itself is
    not considered unit testing. Particularly, the purist definition of a unit test
    making its rounds in the Java community is that any test that talks to another
    system (such as a database, the file system, or a web service) or a test that
    depends on other tests executing or that can’t be executed concurrently with other
    tests is not considered a unit test but a functional test.


    The radical definition of a unit test is good for productivity since it ensures
    that tests can be executed in any environment, in any order, and that they execute
    fast. These characteristics make automation and the practice of continuous integration
    (see Chapter 9) more viable.


    Given that most testing frameworks for Java are labeled “unit testing” frameworks
    (including `JUnit`, the testing framework with the most influence in the Java
    world), it is easy to see where one could take the previous definition of a unit
    test to heart and end with a fairly fast but fairly shallow test harness. Unit
    testing will not address integration errors or any other systemwide issues. Cedric
    Beust, creator of the `TestNG` framework, accurately points that most tests written
    under a unit testing framework are not unit tests by the previous definition but
    are functional tests and that the line between what is considered a unit test
    and what is not is not clearly marked.


    Going back to our house analogy, restricting your test harness by the narrow definition
    of a unit test is like assuming that because all components of a house are tested
    by their respective manufacturers, they will work together appropriately and that
    they will be used as intended.


    Anyone who has built a home can attest that regardless of the quality of the materials
    and the amount of quality control from the manufacturer, most problems in a house
    are caused by how certain materials are used.


    In the house analogy, other views of the house emerge. For example, to the home
    owners the house might be viewed as a collection of rooms, and a test from their
    point of view might entail criteria like how much natural light is allowed in
    and whether the rooms fit the typical traffic pattern of the family. The point
    is that a house is built in layers just like software, with cross-cutting concerns
    such as load-bearing walls, electrical circuits, and plumbing. Successfully testing
    an application is about organizing the tests based on the different levels of
    abstraction of an application and concentrating on covering the units and interactions
    between the units involved in a layer.


    In this chapter we will create a test harness for the TechConf sample application
    by creating groups of tests that tackle the different levels of abstraction in
    the application, from the low-level details of the ORM layer to the high-level
    testing of services and the interplay of design and implementation patterns used
    to fulfill those services goals. In the spirit of the book, we will use the `TestNG`
    framework, which represents the next step in the evolution of testing frameworks
    in Java.


    ## Testing in the Development Cycle


    Software development and management methodologies have greatly evolved in the
    last 10 years to cope with ever-increasing turnaround times and quality levels
    required of enterprise Web applications. From Extreme Programming (XP), Feature-Driven
    Development (FDD), and Scrum we have learned that incremental, cyclical techniques
    are best suited to deal with the malleability of software.


    > **Tip:** By now, most developers have stumbled upon Extreme Programming concepts
    (www.extremeprogramming.org/), but if you haven’t yet encountered FDD, I recommend
    the Articles section at Jeff De Luca’s Nebulon website (www.nebulon.com) and *A
    Practical Guide to Feature-Driven Development* by Palmer and Felsing (Prentice
    Hall, 2002). If you want to learn how to manage your project and more important
    your team, take the time to learn about Scrum (www.scrumalliance.org).


    In the last five years there has been a rebirth in the area of testing. Development
    teams have learned that they can no longer rely on just a QA team to test an application.
    Testing is everybody’s job. We also have learned that leaving the testing of an
    application for the end of the project is a bad idea. Why? One reason has to do
    with the question of what to test. Incrementally creating tests as the code is
    being built (or as the driving force behind what to build) results in better test
    coverage, but more importantly, incremental test creation shapes the software
    being built by validating, repudiating, or simply questioning the assumptions
    made during design and development. Incremental testing leads not only to better
    software but also to better productivity when combined with the practice of continuous
    integration, which automates the testing to discover almost immediately any unwanted
    side effect introduced by changes in a project’s code base. So instead of dealing
    with a convoluted set of problems which have accumulated over time and which might
    have effects that are now intertwined, your team instead deals with the (hopefully
    localized) effects of fine-grained changes.


    This of course makes sense to most of us, but we do not always do the things that
    make sense in software development. When pressure to finish a project increases,
    the first thing that tends to go is testing. Why? Because sometimes testing can
    be tedious. Therefore we need to make testing not a side effect of development
    but a primary force behind it by first making it pervasive throughout the development
    process and by making it the path of least resistance.'
