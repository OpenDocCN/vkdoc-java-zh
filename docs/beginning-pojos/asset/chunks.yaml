    • How to optimize the resulting SQL calls.


    • How to take advantage of proprietary database features such as updatable views
    and stored procedures.


    • How to guarantee referential integrity without limiting the behavioral expressiveness
    of the object model.


    • How to deal with transactions when the database is accessed concurrently from
    multiple sources. From a relational point of view, an object is nothing but an
    in-memory cache of the database data that must be invalidated and refreshed when
    appropriate.


    • How to deal with expensive operations like loading many child objects in a one-to-many
    relationship (lazy loading, proxy objects, or caching).


    Obviously, as the object graphs get more complex, the tools have to be more “intelligent.”
    I’ve seen countless companies that start with a very simple system for which they
    write their own persistence layer from the ground up. We equate this to writing
    your own application server. Sooner or later you’ll run into some of technical
    questions pondered previously by others and discover that you’re spending most
    of your time “fine-tuning” your persistence framework. ORM tools take away the
    complexity of mapping classes in memory to databases. They provide interfaces
    that automatically select, insert, update, and delete tables in the database in
    order to reflect changes made to an object model.


    Therefore my recommendation is that you choose a mapping tool earlier rather than
    later, before any


    “temporary” persistence logic in your application starts to look like a homemade
    framework. Using an ORM


    layer has proven to increase productivity by moving developer focus away from
    figuring out how to store objects (a nonfunctional concern) to solving the real
    business problems. Another positive side effect of using an ORM tool is that,
    like JDBC, it provides an isolating layer between the database and the application
    by providing an objectified view of the database. In a better case, it completely
    makes persistence “transparent,”


    without the complexity of writing and maintaining straight JDBC code.


    ORM tools also have drawbacks, including performance, portability (does the tool
    implement any of the known standards?), and the initial learning curve. If performance
    is of paramount importance in your application, isolate the key components of
    your application and test them against a significant amount of data.


    **Introduction to Hibernate**


    So you have a working object model! Your application has finally reached the state
    when a database is necessary. JUnit and mock unit tests have given you the confidence
    to declare your object model ready to be synchronized with some sort of data storage.


