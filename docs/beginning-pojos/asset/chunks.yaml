    DynaDTO）使得服务实现主要处理业务逻辑，同时最大程度减少了所需的样板代码量。


    **消息驱动 POJO**


    在典型的基于 Web 的应用程序中，绝大多数操作都是同步的，但有些情况下需要以异步方式执行操作，尤其是当该操作可能耗时超过典型 Web 用户可接受的等待时间（最多几秒）时。


    异步操作的一个典型例子是从服务方法发送电子邮件。例如，在 Web 应用程序中提供典型的“忘记密码页面”时就需要此功能。


    在 TechConf 应用程序中，我们通过 User Service 的 `sendPassword` 方法提供此功能，如下所示：


    void sendPassword(String email) throws ServiceException;


    显然，我们可以通过使用消息驱动 Bean（MDB）或直接使用 JMS 来实现 Mail Service 所需的异步功能。但这要求我们在消息的生产者和消费者之间就消息格式和使用的目标达成一致，而这正是使用灵活、松散耦合的消息传递系统的本质。


    幸运的是，JBoss 服务器通过支持“消息驱动 POJO”提供了一种非常强大的扩展来实现消息驱动的远程过程调用（RPC）。消息驱动 POJO 的工作方式与
    SLSB 类似，区别在于所有方法调用都通过 JMS 消息队列进行调度。


    实现消息驱动 POJO 的第一步是使用 `@Producer` 注解标记业务接口，如清单 5-24 所示。


    ■**注意** 使用 `@Producer` 注解标记的方法必须具有 `void` 返回类型，因为调用者不会阻塞等待响应。


