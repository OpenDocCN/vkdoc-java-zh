    \ for the examples in this chapter to work you’ll have to add the Hibernate JARs\
    \ to the `TechConf` project build path.\n\nTo do so, go to the Project Properties\
    \ page by selecting the project node in the Eclipse Package Explorer or Navigator,\
    \ select Properties (by right-clicking on the node or via the main menu under\
    \ Project ➤ Properties) and select `Java Build Path`. Click the `Add Jars` button\
    \ to navigate to the `lib` directory and select the JARs shown in Figure 4-11.\n\
    \n**Figure 4-11.** *Adding Hibernate JARs to the Eclipse project*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nSam-Bodden_596-3 C04.fm Page 102 Wednesday, February 22, 2006 2:16 PM\n\n**102**\n\
    \n## CHAPTER 4 ■ OBJECT RELATIONAL MAPPING WITH HIBERNATE\n\n### Database Setup\n\
    \nFor the simple examples in this chapter you’ll need to set up a MySQL instance.\
    \ I used version 4.1.7-nt on a Windows XP machine. There are several tutorials\
    \ online and plenty of books that can help you setup MySQL, including *The Definitive\
    \ Guide to MySQL 5* by Michael Kofler (Apress, 2005) and *Pro MySQL* by Michael\
    \ Kruckenberg and Jay Pipes (Apress, 2005). For JDBC connectivity I used the MySQL\
    \ Connector/J 3.X JDBC Driver that is available from the MySQL website at http://dev.mysql.com.\n\
    \n### Quick Start\n\nWe will create our first POJO, Hibernate mapping, and database\
    \ table completely by hand so that you get an idea of what it takes to map an\
    \ object to a table. In subsequent examples you might be able to use tools suited\
    \ for your development style to streamline the process.\n\n#### POJO Sample Code\n\
    \nThe simple `Address` POJO follows the basic well-known JavaBean conventions,\
    \ private fields exposed via getters and setters. That’s the easy part; of paramount\
    \ importance to how Hibernate manipulates persistent objects is the implementation\
    \ of the `equals` and `hashCode` methods. The implementation of these methods\
    \ is not a Hibernate-specific requirement, but it should be part of any Java business\
    \ object. In their book *Hibernate in Action* (Manning, 2005), Bauer and King\
    \ go the distance explaining the difference between object equality, object identity,\
    \ and database identity. They promote the use of business key equality when implementing\
    \ the `equals` method by using a business property or set of properties that are\
    \ unique to a table row.\n\nIn the case of the `Address` POJO the combination\
    \ of `StreetAddress`, `State`, `ZipCode`, `City` and `AptNumber` fields identify\
    \ a unique address as shown in Listing 4-1.\n\n**Listing 4-1.** *Address POJO*\n\
    \n```\npackage com.integrallis.TechConf.domain;\n\n…\n\nimport org.apache.commons.lang.builder.EqualsBuilder;\n\
    \nimport org.apache.commons.lang.builder.HashCodeBuilder;\n\nimport org.apache.commons.lang.builder.ToStringBuilder;\n\
    \n…\n\npublic class Address implements Serializable {\n\n    // primary key\n\
    \    private Integer id;\n\n    // fields\n    private String streetAddress;\n\
    \    private String state;\n    private String zipCode;\n    private String city;\n\
    \    private String aptNumber;\n\n    // constructors\n    public Address () {}\n\
    \n    // …getters and setters\n\n    /* Implementation of equals using Business\
    \ Key Equality\n     *\n     * (non-Javadoc)\n     * @see java.lang.Object#equals(java.lang.Object)\n\
    \     */\n    public boolean equals (Object object) {\n        // short circuits\n\
    \        if (object == null) return false;\n        if (this == object) return\
    \ true;\n        if (!(object instanceof Address)) return false;\n        final\
    \ Address address = (Address) object;\n        //NOTE always use getters on the\
    \ passed object since it\n        // might be a Hibernate Proxy\n        return\
    \ new EqualsBuilder().\n            append(streetAddress, address.getStreetAddress()).\n\
    \            append(aptNumber, address.getAptNumber()).\n            append(city,\
    \ address.getCity()).\n            append(state, address.getState()).\n      \
    \      append(zipCode, address.getZipCode()).\n            isEquals();\n    }\n\
    \n    public int hashCode () {\n        // pick a hard-coded, randomly chosen,\
    \ non-zero, odd number\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nSam-Bodden_596-3 C04.fm Page 103 Wednesday, February 22, 2006 2:16 PM\n\n**103**"
