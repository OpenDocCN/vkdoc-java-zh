    `execution` 元素所示。请注意，通配符可以用于以语法方式指示方法返回值、包名和形式参数。表达式可以通过逻辑与 `&&`、逻辑或 `||` 和逻辑非
    `!` 运算符进行组合。


    切点可以命名（如示例所示），也可以是匿名的。通过命名切点，你可以在多个通知中重用该切点，而匿名切点则直接在通知内部内联使用。


    切点前两个元素中使用的 `execution` 运算符用于捕获方法体。另一个类似的运算符 `call` 也可使用，它用于捕获方法调用前的执行点，但此时方法的参数已被求值。


