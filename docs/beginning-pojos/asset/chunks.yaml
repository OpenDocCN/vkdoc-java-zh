    根据我的经验，用例对测试用例的实现具有重要价值，并且它们推动了测试驱动（测试优先）的流程。从这个意义上说，一个用例的完成就变成了一个切实可交付的成果，能够为系统的利益相关者提供即时反馈。


    在当前强调服务驱动架构的背景下，用例是定义服务目标的良好载体，并且有助于定义诸如会话外观之类的面向服务组件。


    用例与领域无关组件（DNC）


    在建模用例之前应用领域无关组件（DNC）是一个很好的铺垫，因为它有助于防止用例建模中的一个主要错误：即用例决定对象模型的结构。


    当用例驱动模型的形态时，该模型实际上就变成了当前所处理功能的奴隶，而不再是业务的真实体现。这意味着，尽管一个用例可能让你清晰地理解参与者和系统之间的单一交互，但它并不能让你理解问题域（就像领域模型那样），这可能导致设计上的视野狭窄。


    在某种程度上，你可以将时刻-间隔类等同于一个用例、用例的一部分，或者一个或多个用例的封装。用例通常被记录为简短但精炼的文本描述或场景，类似于极限编程（XP）创建用户故事的方式，即描述系统应如何解决某个问题。


