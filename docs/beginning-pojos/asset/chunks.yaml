    第 9 章


    ■ ■ ■


    持续集成


    **我**们都听说过有多少软件项目失败的统计数据。统计数据告诉我们，项目越大，失败的可能性就越大。根据我自己的经验，我见过一些项目表面上进展顺利，直到那个可怕的日子——你必须向客户进行演示。当你逐项检查功能列表并与负责的开发者交谈时，你发现有些功能可以工作，但尚未集成。每个人都提交了他们的代码，然后某个可怜的人，可能是被标记为
    QA 工程师的人，尝试构建应用程序。当你在 QA 机器上看到一连串的错误时，空气中充满了焦虑。发生了什么？每个开发者单独运行时都是正常的。那么，你该责怪谁？


    从这些教训中，我们得出了每日构建的做法，它通常会生成某种可交付物，供 QA 人员在早上进行测试。这种做法虽然好，但仍然没有解决问题。问题的根源在于文化问题。程序员们习惯于获取一份源代码副本，然后在其上工作，直到他们认为代码值得集成到主代码库中。


    一种被许多方法论，特别是极限编程（XP）运动所接受和推广的现代软件开发实践，就是持续集成（CI）实践。这种实践可能是你从 XP 和敏捷运动中学到的最重要的教训之一（尽管它不是一个新概念，但现在已被这些运动正式化并大力倡导）。其主要思想是，从事项目的开发者应该至少每天集成一次他们对代码的更改。借助一套强大的单元测试和一个能够以持续、自动化的方式执行这些测试的系统，你可以确保引入系统的任何问题都能在下一次构建中被发现。因此，CI
    关乎开发者的纪律以及那些能让期望行为成为阻力最小路径的工具。


    持续集成，结合强大的测试集，可以防止问题被忽视。它将引入代码库的问题及其存在的信息在时间上本地化，使你能够在问题发生时立即做出反应。一个配置良好的 CI 系统就像给你的应用程序脉搏装上了心脏监测器，让开发者对他们提交到项目中的代码负责。


    **345**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C09.fm Page 346 Thursday, February 16, 2006 3:35 PM


    **346**


    第 9 章 ■ 持续集成


    CI 不仅仅是频繁构建代码。它的成功取决于许多因素。其中一些因素幸运地已成为当今的常见实践，但其他因素则需要一些预先考虑，包括以下内容：


    • **版本控制：** 应该有一个单一的、版本化的仓库，所有开发者都可以从中获取应用程序代码的最新版本以及以前的版本。


    • **构建自动化：** 对于开发者来说，构建应用程序应该相对简单。通常，只需要一个命令和最少的配置。


    • **测试自动化：** 应用程序的测试套件应该易于执行，并且添加新测试应该非常简单。


    在第 8 章中，您学习了如何为应用程序创建单元测试。在第 3 章中创建并在全书过程中增强的构建，应该为在您的下一个项目中实现 CI 奠定基础，并保持项目健康状况。有了这些基础，实现持续集成的基本步骤很简单：


    • **集成：** 将更改检入到中央仓库。（添加新功能的代码需要新的测试用例，这些用例也必须被检入。）


    • **测试：** 执行所有测试。成功的集成以测试阶段 100% 的成功率为前提。如果任何测试失败，有问题的代码将被回滚，并重构代码直到通过测试。


    • **重复：** 借助自动化，您可以在明确定义的时间间隔（理想情况下至少每天一次）以及每次将更改引入代码库时运行此过程。这确保了系统代码库始终保持完全测试状态，并且错误和缺失的功能能尽快得到处理。


    由 XP 和敏捷方法论倡导者所推崇的 CI，是大多数开发者认同但很少有团队真正实施的概念之一。你应该只构建必要的内容，并且一旦引入代码库，就应尽可能频繁地测试其是否符合需求。你还应该理解，一次性进行大量更改会导致后来数小时的“大爆炸”式集成测试。


    通过不让代码更改在手中停留超过一天，团队可以最大限度地降低代码碎片化的风险。当开发者从不将更改集成到代码库中，实际上是在其开发环境中使用旧版本工作时，就会产生这些“非官方分支”，从而导致难以发现的错误和无数小时的集成工作。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C09.fm Page 347 Thursday, February 16, 2006 3:35 PM


    第 9 章 ■ 持续集成


    **347**


    通过采用测试驱动开发方法并结合构建过程自动化，团队可以实现持续集成，并且只在需要时构建所需的内容，并正确地构建它。CI 增加了团队对正在构建的系统的了解，从而提高了对系统及其利益相关者反馈的反应时间。


    CI 通过使查找、诊断和修复问题变得更加容易，从而降低了软件开发的总成本。


    CI 需要一些准备、协调和团队的支持。根据我的经验，CI 在较新的代码库上与测试驱动开发结合使用时效果最佳。如果你继承了一个几乎没有测试的代码库，第一步是在实施
    CI 解决方案之前，通过编写测试来理解代码。


    ■**提示** 关于 CI 的最佳文章之一由 Martin Fowler 撰写，可以在他的网站 www.martinfowler.com/articles/continuousIntegration.html
    上阅读。


    **CruiseControl**


    为了为 TechConf 系统启用 CI，我们将使用 CruiseControl 持续集成框架，该框架托管在 SourceForge 上，地址为 http://cruisecontrol.sourceforge.net。

    '
- fmt: 'CruiseControl encompasses a free Java open source build scheduler and several
    utilities for notification and reporting. You can think of CruiseControl as Cron
    for Ant. CruiseControl integrates seamlessly with build tools like Ant, Maven,
    or any tool that can be invoked from a command line. CruiseControl works with
    many of the most popular version control systems like CVS, Subversion, Visual
    SourceSafe, PVCS, and ClearCase among many.


    CruiseControl is distributed in both a binary and source distribution. (At the
    time of this writing the latest version is 2.3.1.)


    CruiseControl consists of two subsystems:


    - **Build Loop:** An application designed to run as a daemon that watches your
    source control repository for changes. If it encounters any changes, it runs the
    build and sends reports about the status of the build.

    - **Build Results JSP:** A Web application that formats and displays the results
    and status of the CruiseControl build loop as well as results from previous builds.
    It displays information such as compilation errors, test results, and source repository
    changes.


    Typically you’ll setup CruiseControl on your “build server,” which should be a
    high-availability machine. The build server is also referred to as the Continuous
    Integration server.


    Figure 9-1 shows a typical setup.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C09.fm Page 348 Thursday, February 16, 2006 3:35 PM


    **348**


    C H A P T E R 9 ■ C O N T I N U O U S I N T E G R A T I O N


    **Figure 9-1.** *Typical setup for Continuous Integration* **Configuring the Build
    Server**


    To setup the TechConf build server we’ll need a machine configured with Java,
    CruiseControl, a Web container (such as Tomcat or Jetty), and the Ant build tool.


    For this chapter I’m working with a machine configured with Fedora Linux Core
    4. The installation instructions are tailored for that platform but should be
    similar for other platforms.


    The first step is to download the binary distribution of CruiseControl and unzip
    the file to a suitable location. For a Linux system, I recommend that you keep
    CruiseControl under the `opt` directory. For version 2.3.1 this would be `/opt/cruisecontrol-2.3.1`.
    I find it convenient to create a symbolic link to that directory and name it `/opt/cruisecontrol`.
    This is typically done if you have multiple versions of one product, therefore
    making the symbolic link point to the latest or default version that you want
    to use in your system.


    **CruiseControl Working Directory**


    The next step is to create the CruiseControl working directory. For the sample
    Linux system I used `/opt/cc-working-dir`. Under the working directory create
    the following directories:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00062.png)


    Sam-Bodden_596-3 C09.fm Page 349 Thursday, February 16, 2006 3:35 PM


    C H A P T E R 9 ■ C O N T I N U O U S I N T E G R A T I O N


    **349**


    - **checkout:** This directory will contain the source code of the projects being
    built (the source to build)

    - **logs:** This directory is where CruiseControl will store logs and reports
    about the applications being built (the details about each build)

    - **artifacts:** This directory is where any output files resulting from the builds
    are kept (build products like JARs, WARs, and EARs)


    At the root of the working directory, create a file name `config.xml` with the
    following contents:


    ```

    <cruisecontrol></cruisecontrol>

    ```


    To get CruiseControl running successfully under Linux follow these steps:

    1. In the working directory, create a symbolic link of the `webapps` directory
    located in the CruiseControl directory.

    2. Edit the shell script `cruisecontrol.sh` under the CruiseControl directory
    and change the value of the variable `CC_DIR=/opt/cruisecontrol` (or the location
    where you unzipped the CruiseControl archive).

    3. Add the CruiseControl directory to the system’s execution path. You can accomplish
    this by running the shell commands `export PATH=/opt/cruisecontrol:$PATH`.

    4. Make sure that your system’s `JAVA_HOME` environment variable is defined and
    that the Java executables are in the system’s execution path.

    5. Set executable permissions on the shell script `cruisecontrol.sh`.


    The CruiseControl working directory should look like Figure 9-2.


    **Figure 9-2.** *CruiseControl working directory*


    To test the installation, change directories to the working directory and execute
    the `cruisecontrol.sh` script. The output should resemble the following:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00093.png)


    Sam-Bodden_596-3 C09.fm Page 350 Thursday, February 16, 2006 3:35 PM


    **350**


    C H A P T E R 9 ■ C O N T I N U O U S I N T E G R A T I O N


    ```

    [cc]Dec-05 23:14:04 Main - CruiseControl Version 2.3.1 Compiled on October 10
    2005 0917

    [cc]Dec-05 23:14:06 HttpServer - Version Jetty/5.1.3

    [cc]Dec-05 23:14:07 Credential - Checking Resource aliases

    [cc]Dec-05 23:14:07 trolController- no projects found in config file

    [cc]Dec-05 23:14:08 BuildQueue - BuildQueue started

    [cc]Dec-05 23:14:12 Container - Started

    org.mortbay.jetty.servlet.WebApplicationHandler@1b09468

    [cc]Dec-05 23:14:13 Container - Started

    WebApplicationContext[/cruisecontrol,CruiseControl Reporting App]

    [cc]Dec-05 23:14:13 SocketListener- Started SocketListener on 0.0.0.0:8080

    [cc]Dec-05 23:14:13 Container - Started org.mortbay.jetty.Server@dd87b2

    ```


    The build queue should be started now, and the build results Web application should
    be running under the embedded Jetty Web container running by default on port 8080.
    Point your browser to the build server machine at the URL `http://ccserver:8080/cruisecontrol`
    (where “ccserver” is the name or IP of your machine). You should see the CruiseControl
    status page of the reporting Web application as shown in Figure 9-3.


    **Figure 9-3.** *Testing the CruiseControl installation*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C09.fm Page 351 Thursday, February 16, 2006 3:35 PM


    C H A P T E R 9 ■ C O N T I N U O U S I N T E G R A T I O N


    **351**


    **Setting Up a Project for Continuous Integration**


    Now that we have the infrastructure to set up CI, we can check out projects to
    be built into the `checkout` directory. Let’s start our exploration of CruiseControl
    by simply checking out a well-known project from a publicly available CVS repository
    and configuring CruiseControl to build it.


    For the example, I have chosen the popular project Lucene hosted by the Apache
    foundation at `http://lucene.apache.org`. I’ve chosen Lucene since it is a pretty
    active project and has a comprehensive test suite. To check out a copy of Lucene
    change directory to the `cc-work-dir/checkout` and type:


    ```

    cvs -d :pserver:anoncvs@cvs.apache.org:/home/cvspublic login

    ```


    This is the CVS client command to log in anonymously to the java.net CVS server.
    The console will prompt you for a password as shown next. The password for anonymous
    login is `anonymous`.


    ```

    Logging in to :pserver:anoncvs@cvs.apache.org:2401/home/cvspublic

    CVS password:

    ```


    To checkout the project now type:


    ```

    cvs -d :pserver:anoncvs@cvs.apache.org:/home/cvspublic checkout jakarta-lucene

    ```


    You should now see a lot of output on the console as the CVS client checks out
    a copy of the Lucene project under the `checkout` directory. After the checkout
    is complete, we can explore and test the build by changing directories to the
    newly created `jakarta-lucene` directory under the `checkout` directory and type:


    ```

    ant –p

    ```


    This should reveal the targets available in the Lucene buildfile as shown next.


    ```

    Buildfile: build.xml


    Main targets:


    clean Removes contents of build and dist directories

    compile-core Compiles core classes

    generate-test-reports Generates test reports

    jar-core Generates the Jar file

    ```'
