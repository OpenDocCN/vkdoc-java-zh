- fmt: '- **Maintainability and extensibility:** The system must be easy to maintain
    and extend. Pieces of functionality should be easily added or removed, or turned
    on or off, depending on the operational characteristics applicable to a specific
    deployment.

    - **Security:** Data must be stored and retrieved in a secure and efficient fashion.
    Users of the system must have access to functionality according to their roles
    or security levels.

    - **Scalability and reliability:** Multiple users should be able to interact with
    the system. The performance characteristics of the system shouldn’t change dramatically
    with an increase in the concurrent user base.

    - **Personalization and customization:** The user interface should have a customizable
    look and feel, allowing for branding and dynamic changes based on the identity
    of the user.

    - **Document and content management:** The system should provide the ability to
    manage the variety of documents used and also allow for the manipulation, classification,
    editing, and transformation of document-based information.

    - **Administration:** The system should provide a framework to easily add management
    capabilities to individual components. Administrative functions should be relatively
    easy to create and customize.

    - **Messaging:** Asynchronous communication facilities are expected to be required
    between certain subsystems. The architecture must provide a messaging framework
    or the ability to seamlessly integrate one.

    - **Integration with legacy and external resources:** The system should facilitate
    the acquisition of data from external and legacy sources, as well as the ability
    to publish data to external entities in an industry-standard fashion.


    Figure 1-2 diagrams the architectural requirements.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


