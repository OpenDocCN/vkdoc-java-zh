    当您准备踏上 Java EE 世界的旅程时，重要的是要记住：驱动企业应用开发的应该是良好的设计实践，而不是技术。


    尽管在某些特定时刻，您可能不得不根据特定技术的缺陷做出实现决策，但您应始终牢记大局：基于问题空间而非解决方案空间进行稳健的设计。在这个敏捷方法论和技术盛行的时代，许多人轻易地否定了软件建模。但正如
    Scott Ambler (www.agilemodeling.com) 等人所证明的那样，软件建模可以成为您敏捷方法武器库中的又一件利器。


    在本章中，您已经学到了一套扎实的技术，借助开源建模工具，您可以使您的模型更加健壮，更能适应需求和技术的变化。


