    **Listing 5-4.** *ConferenceDAO Interface*


    package com.integrallis.techconf.dao;


    import java.util.Date;


    import java.util.List;


    import com.integrallis.techconf.domain.Conference;


    import com.integrallis.techconf.domain.Room;


    public interface ConferenceDAO {


    Conference getConference(int conferenceId);


    Conference getConferenceByName(String name);


    List<Conference> getActiveConferences(Date beginDate, Date endDate); List<Conference>
    getActiveConferences(Date date);


    List<Conference> getAllConferences();


    List<Room> getRooms(int venueId);


    void save(Conference conference);


    void update(Conference conference);


    void delete(Conference conference);


    void delete(int conferenceId);


    }


    Listing 5-5 shows the BaseAbstractDAO class, which will serve as the base class
    for all of the Hibernate-specific DAO SLSBs. This class provides simplified methods
    against the Hibernate Session object and hides certain details of more complex
    Hibernate APIs like the Criteria API.


    Since the Hibernate DAOs depend on a Hibernate SessionFactory, we inject the Hibernate
    SessionFactory object via the @Resource annotation (javax.annotation.Resource).
    It also provides the ability to retrieve the Session object via the getCurrentSession()
    when working in a JTA-enabled environment like the JBoss AS or via the openSession()
    method when working in a non-JTA environment.


    Methods wrapping the usage of the Criteria API are provided to findAll(), findFiltered(),
    findUnique(), and findUniqueFiltered(). These methods enable developers less experienced
    with Hibernate to quickly create DAO implementations. Since the TechConf application
    is using a very stateless architecture, the DAO layer doesn’t have to deal with
    lazy transaction issues or detached domain objects, which would make the implementation
    slightly more complex.


    Also notice that we use the getCurrentSession() method, which should avoid using
    a new Hibernate Session per operation. That can lead to poor performance. The
    SESSION_RETRIEVAL_


    STRATEGY_CREATE_NEW strategy is used mostly in the application’s unit tests.


