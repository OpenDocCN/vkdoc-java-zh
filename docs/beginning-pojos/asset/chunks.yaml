- fmt: "方法`testC1`属于测试组`GroupY`，而`testC2`同时属于`GroupX`和`GroupZ`。\n\n例如，如果我们希望运行所有属于`GroupX`的测试，可以使用如清单8-9所示的`testng.xml`文件。\n\
    \n**清单8-9.** *用于运行GroupX中测试的TestNG配置*\n\n```xml\n<!DOCTYPE suite SYSTEM \"http://beust.com/testng/testng-1.0.dtd\"\
    \ >\n<suite name=\"Some Tests\" verbose=\"1\">\n  <test name=\"Group Test\">\n\
    \    <groups>\n      <run>\n        <include name=\"GroupX\"/>\n      </run>\n\
    \    </groups>\n    <classes>\n      <class name=\"package1.TestA\"/>\n      <class\
    \ name=\"package2.TestB\"/>\n      <class name=\"package3.TestC\"/>\n    </classes>\n\
    \  </test>\n</suite>\n```\n\n`testng.xml`文件还指定了要包含在测试中的类。运行测试将产生类似于以下的输出：\n\n\
    ```\ntestA1\ntestB1\ntestC2\n===============================================\n\
    Some Tests\nTotal tests run: 3, Failures: 0, Skips: 0\n===============================================\n\
    ```\n\nTestNG不仅允许你将测试方法分组到一个或多个组中，还允许创建组的组。强大的过滤功能使你能够使用正则表达式包含和排除组。例如，要运行`GroupX`和`GroupY`中的测试，我们可以使用正则表达式`Group[XY]`，如清单8-10所示。\n\
    \n**清单8-10.** *用于运行GroupX和GroupY中测试的TestNG配置*\n\n```xml\n<!DOCTYPE suite SYSTEM\
    \ \"http://beust.com/testng/testng-1.0.dtd\" >\n<suite name=\"Some Tests\" verbose=\"\
    1\">\n  <test name=\"Group Test\">\n    <groups>\n      <run>\n        <include\
    \ name=\"Group[XY]\"/>\n      </run>\n    </groups>\n    <packages>\n      <package\
    \ name=\"package1\"/>\n      <package name=\"package2\"/>\n      <package name=\"\
    package3\"/>\n    </packages>\n  </test>\n</suite>\n```\n\n另外请注意，我们不再声明TestNG要查找哪些类，而是声明了包。运行清单8-10中的示例应产生类似于以下的输出：\n\
    \n```\ntestA2\ntestA1\ntestB1\ntestC2\ntestC1\n===============================================\n\
    Some Tests\nTotal tests run: 5, Failures: 0, Skips: 0\n===============================================\n\
    ```\n\nTestNG的分组功能比JUnit提供了更大的灵活性，因为无需重新编译任何代码。TestNG还提供了创建方法组以及如前所述的组中组的能力。\n\
    \n## 依赖方法\n\nTestNG还提供了一种机制，用于声明测试方法之间的依赖关系，并避免Beust所说的JUnit中“级联失败创伤”——即JUnit会同时报告所有依赖测试的失败以及根本失败。`@Test`注解可以接受一个`dependsOnMethods`参数，该参数接受一个以逗号分隔的方法列表。\n\
    \n类似地，你可以通过`dependsOnGroups`参数声明方法对组的依赖关系，该参数接受一个以逗号分隔的组列表。TestNG将保证依赖组中的所有方法在该方法之前执行。\n\
    \n## 参数\n\nTestNG允许从`testng.xml`文件或通过`@Parameters`和`@DataProvider`注解传递测试参数。`org.testng.annotations.Parameters`注解适用于`org.testng.annotations.Test`和`org.testng.annotations.Configuration`参数。\n\
    \n例如，如果你希望有一组特定于数据库的测试，可以在`testng.xml`文件中定义数据库参数，如清单8-11所示。\n\n**清单8-11.** *TestNG参数化配置*\n\
    \n```xml\n<!DOCTYPE suite SYSTEM \"http://beust.com/testng/testng-1.0.dtd\" >\n\
    <suite name=\"Test Suite\">\n  <parameter name=\"url\" value=\"jdbc:mysql://localhost/test\"\
    \ />\n  <parameter name=\"driver\" value=\"com.mysql.jdbc.Driver\" />\n  <parameter\
    \ name=\"username\" value=\"user\" />\n  <parameter name=\"password\" value=\"\
    pass\" />\n  <test name=\"DBTest\">\n    ...\n  </test>\n</suite>\n```"
