    如清单 5-22 所示，通过使用抽象 DAO 基类中提供的实用方法，DAO 的实现变得相当简单。请注意，在那些接收 POJO 任意属性名称的方法中，我向 POJO
    添加了实用性的`final static String`字段，以尽可能减少错误发生的可能性，具体可参见`getScheduledEntryForUser`、`getRemindersForScheduleEntry`和`getRemindersForUser`方法。


    现在所有组成部分都已就位，我们可以组装`ScheduleService`的实现，如清单 5-23 所示。`DynaDTO`构建器工厂按照之前的方式通过`@Resource`注解注入，而
    DAO 则通过`@EJB`注解注入。


    `@EJB`注解用于注入 EJB 存根。它取代了 EJB 2.X 中之前所需的繁琐查找代码。在`ScheduleServiceBean`类中，我决定使用类字段进行
    EJB 存根注入，但像大多数依赖注入机制一样，它也可以应用于 setter 方法。例如，字段`scheduleDAO`的类型是`ScheduleDAO`，它恰好是`ScheduleDAOBean`的本地接口。在运行时，容器会查找`ScheduleDAOBean`的存根并将其注入到`ScheduleServiceBean`中。


    ■**注意** 当某个服务接口存在多个 bean 实现时，`@EJB`注解可以包含属性来指定 EJB 容器如何定位特定的 bean 实例。


