- fmt: '# The `update` Command


    The `update` command is used to synchronize the local copy with the current version
    in the repository. This means that files committed to CVS by other members of
    the development team will replace the local files. Files that have been modified
    locally will be noted as modified and may require merging. It’s a good idea to
    update on a daily basis and prior to running a final unit test and commit. Some
    clients have a query update that identifies the differences between the local
    copy and the remote server version.


    CVS provides the `diff` command to compare files. You can use the `diff` command
    to compare local files with those in the repository. You can also use it to identify
    differences between versions of the same file.


    ## CVS in Eclipse


    Like many of the Eclipse features, CVS integration is implemented as a perspective.
    To display the CVS perspective, select **Window** ➤ **Open Perspective** ➤ **Other**,
    which will bring up the **Select Perspective** dialog from where you can select
    the **CVS Repository Exploring** perspective as shown in Figure 2-19.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00068.png)


    ![](images/00089.png)


    Sam-Bodden_596-3 C02.fm Page 39 Wednesday, February 22, 2006 6:03 AM


    C H A P T E R 2 ■ E C L I P S E


    **39**


    **Figure 2-19.** *Switching perspectives*


    The companion project to the book, the TechConf application, is hosted in the
    java.net community site under `http://techconf.dev.java.net`. To gain guest access
    to the code we first need to add the java.net CVS repository. Instructions on
    how to connect are available at `http://techconf.dev.java.net/servlets/ProjectSource`.
    To add a CVS repository, right-click on the **CVS Repositories** view and select
    **New** ➤ **Repository Location**, which will bring up the **Add CVS Repository**
    dialog as shown in Figure 2-20.


    **Figure 2-20.** *Adding a CVS repository*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C02.fm Page 40 Wednesday, February 22, 2006 6:03 AM


    **40**


    C H A P T E R 2 ■ E C L I P S E


    The CVS server or host for java.net is `cvs.dev.java.net`, the repository path
    is `/cvs`. For anonymous access, the user is `guest` with a blank password. Like
    most CVS servers, the connection type is `pserver` using the default port.


    After entering all the required connection information as shown in Figure 2-20,
    click **Finish**. The new CVS repository should now be available under the **CVS
    Repositories** view.


    Expanding the new repository node reveals **Branches**, **HEAD**, and **Versions**
    nodes. Next, expand the **HEAD** node and locate the `techconf` module.


    You can use the **HEAD** node to check out and create a new Eclipse project. After
    you expand the **HEAD** node and locate the desired module from the list of available
    modules, right-clicking the module reveals the **Check Out as Project** and the
    **Check Out As** options. The **Check Out as Project** option automatically checks
    the module out to the Eclipse workspace. If an alternative location is required,
    use the **Check Out As** option. Either option will copy the files from the CVS
    repository, create a project, and add the project to the **Navigator**.


    To check out the module as a project in the Eclipse workspace, right-click on
    the node and select **Check Out As**, which will bring up the **Check Out As**
    dialog. Select **Check out as a project in the workspace** and click **Finish**.
    Once the project is added to the **Navigator**, the CVS commands are available
    as a submenu on the **Team** context menu. You can update the project by right-clicking
    the project in the **Navigator** and choosing **Team** ➤ **Update**.


    After all the files in the repository have been retrieved, you should have your
    own local copy of the TechConf project. To gain read/write access to the project,
    as with most projects, it is expected that you submit patches first, and based
    on merit the project’s leads will grant you a developer role.


    Having access to a project’s source code is one of the most compelling reasons
    for using open source. Although most projects provide source bundles in either
    ZIP or TAR formats, you can gain insight into the project’s direction and allow
    for contribution if you have access to the current source code. If you’re familiar
    with a CVS client, then you know that commands and architecture are necessary
    for interacting with CVS repositories. Although CVS is the prevailing version
    control system, there are other very popular systems available. In the open source
    category, a system that’s winning many converts is Subversion, which is touted
    as the most likely replacement for CVS on most large open source projects. There
    are plug-ins for Subversion, and for most of the other open source and commercial
    version control systems, and most are modeled after CVS plug-ins, which should
    make for an easy transition.


    ## Database Plug-ins


    A great portion of the time testing a database-driven Web application is spent
    checking the contents of a relational database. While most databases provide tools
    to work with the data, it is convenient to be able to create, query, modify, and
    delete database tables from within an IDE. There are several open source database
    plug-ins for Eclipse.


    ### SQL Explorer


    SQL Explorer is an open source Eclipse plug-in that is a fork of the JFaceDbc
    plug-in, which became a commercial product. SQLExplorer is available from SourceForge
    at `http://sourceforge.net/projects/eclipsesql`. SQLExplorer features the ability
    to interact with any JDBC-compliant database and provides support for pluggable
    functionality for specific database platform needs and tools like Hibernate.


