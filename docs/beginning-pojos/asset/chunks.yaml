    \ Notice that the `basedir` property is set to the directory of the project we\
    \ are trying to build. Name this buildfile `build-jakarta-lucene` and place it\
    \ in the `cc-work-dir` directory. In this example buildfile, I’ve chosen to update\
    \ only the existing code base from CVS rather than deleting the `jakarta-lucene`\
