    **HiveMind 服务**

    '
- fmt: 'Tapestry uses `HiveMind`, which is a services and configuration microkernel.
    Similarly to Spring, `HiveMind` provides a framework for IoC which can be used
    to configure services and the collaborations among those services and components
    using simple XML configuration files. `HiveMind` services are defined in terms
    of interfaces or simple POJOs. As an IoC container, `HiveMind` instantiates and
    wires together services. As a configuration framework, `HiveMind` enables you
    to wire and manage highly complex systems composed of multiple services. `HiveMind`
    uses the concept of modules, which are a collection of services packaged as JARs,
    each with its own XML configuration. Tapestry itself uses `HiveMind` to configure
    a large number of modules that work in conjunction to provide Tapestry’s runtime
    capabilities.


    In Tapestry, services are added to the `HiveMind` registry by specifying them
    in the `hivemodule.xml` configuration file (located in the `WEB-INF` directory
    for the TechConf application).


    In Tapestry you can have any number of objects whose state can be maintained.
    Those objects are also declared in the `HiveMind` configuration file. Tapestry
    bootstraps `HiveMind` on start-up and initializes the `HiveMind` registry.


    To make the “conferences” object available to the page we need a way to wrap the
    EJB3 service implementing the `ConferenceService` interface as a `HiveMind` service
    which will be then injected into the page as using the `inject` property as shown
    in Listing 7-13.


    `HiveMind` includes a service that creates proxy objects to work with EJB 2.X.
    The `EJBProxyFactory` service is used to create a proxy object to wrap an EJB
    stateless session bean. This wrapper takes care of doing JNDI lookup and invocation
    of the `create` method on the returned home interface to obtain an instance of
    the bean. Since we are using EJB 3.0, we have created a simple service to retrieve
    our EJB3 stateless session bean instances using JNDI. Listing 7-15 shows how simple
    it is to create a `HiveMind` service by implementing the `ServiceImplementationFactory`
    interface and returning the desired object in the `createCoreServiceImplementation`
    method.


    **Listing 7-15.** *HiveMind EJB3Factory*


    ```java

    package com.integrallis.techconf.web.tapestry.hivemind;


    import javax.naming.InitialContext;


    import org.apache.commons.logging.Log;


    import org.apache.commons.logging.LogFactory;


    import org.apache.hivemind.ApplicationRuntimeException;


    import org.apache.hivemind.ServiceImplementationFactory;


    import org.apache.hivemind.ServiceImplementationFactoryParameters; import org.apache.hivemind.internal.Module;


    /**


    * An implementation of {@link org.apache.hivemind.ServiceImplementationFactory}


    * that retrieved a stateless session EJB via JNDI.


    */


    public class EJB3Factory implements ServiceImplementationFactory {


    private static Log log = LogFactory.getLog(EJB3Factory.class); public Object createCoreServiceImplementation(


    ServiceImplementationFactoryParameters factoryParameters) {


    EJB3FactoryParameters proxyParameters =


    (EJB3FactoryParameters) factoryParameters.getParameters().get(0); String remoteInterfaceClass
    = proxyParameters.getRemoteInterface(); Module module = factoryParameters.getInvokingModule();


    Class remoteInterface = module.resolveType(remoteInterfaceClass); Object result
    = null;


    try {


    InitialContext context = new InitialContext();


    result = context.lookup(remoteInterface.getName());


    } catch (Exception ex) {


    log.error("Could not retrieve service", ex);


    throw new ApplicationRuntimeException(ex);


    }


    return result;


    }


    }

    ```


    In the body of the `createCoreServiceImplementation` method we use the parameter
    `remoteInterface` of type `Class` and use the full class name as the JNDI lookup
    string to retrieve the stateless session bean. Notice that the method takes a
    parameter of type `ServiceImplementationFactoryParameters`. Luckily you don’t
    have to implement this interface since `HiveMind` will take any simple POJO and
    create an instance of `ServiceImplementationFactoryParameters` that includes the
    contents of the POJO. Listing 7-16 shows the simple POJO used to hold the configuration
    parameters for the `EJB3Factory`.


    **Listing 7-16.** *EJB3FactoryParameters*


    ```java

    public class EJB3FactoryParameters {


    private String remoteInterface;


    public String getRemoteInterface() {


    return remoteInterface;


    }


    public void setRemoteInterface(String remoteInterface) {


    this.remoteInterface = remoteInterface;


    }


    }

    ```


    The next step is to make our service available by declaring it in the `HiveMind`
    configuration. The `HiveMind` configuration is a simple XML file akin to the Spring
    application context in which you can define services and wire collaborators. Listing
    7-17 shows the service point definition for the `EJB3Factory` and the `ConferenceService`
    which uses the `EJB3Factory`.


    **Listing 7-17.** *EJB3FactoryParameters in HiveMind Configuration (hivemodule.xml)*


    ```xml

    <?xml version="1.0"?>


    <module id="app" version="1.0.0" package="com.integrallis.techconf">


    ...


    <service-point id="EJB3Factory"


    interface="org.apache.hivemind.ServiceImplementationFactory">


    <parameters-schema>


    <element name="construct">


    <attribute name="remote-interface" required="true" />


    <conversion


    class="com.integrallis.techconf.web.tapestry.hivemind.EJB3FactoryParameters">


    <map attribute="remote-interface" property="remoteInterface"/>


    </conversion>


    </element>


    </parameters-schema>


    <invoke-factory model="singleton">


    <construct


    class="com.integrallis.techconf.web.tapestry.hivemind.EJB3Factory"


    />


    </invoke-factory>


    </service-point>


    <service-point id="ConferenceService" interface="service.ConferenceService">


    <invoke-factory service-id="app.EJB3Factory">


    <construct remote-interface="service.ConferenceService"/>


    </invoke-factory>


    </service-point>


    ...


    </module>

    ```


    At the highest level, the `hivemodule.xml` file defines a module which defines
    an `id` prefix for all services and a default package prefix. Factory services
    can be defined as singletons or as pooled instances.


    `HiveMind` is a very powerful IoC framework that enables the creation of service-driven
    frameworks and applications by providing decentralized configuration. Looking
    deeper into `HiveMind` is outside of the scope of this chapter, but I highly recommend
    that you explore this powerful framework that is becoming one of the tools of
    choice of the toolmakers.


    ## Testing the Home Page


    The Tapestry WAR file for the TechConf application will be packaged as part of
    the EAR deployment created in Chapter 5. Figure 7-13 shows the location of the
    files that make up the home page in the `tapestry-web` directory under the TechConf
    project directory.


    **Figure 7-13.** *Location of home page files under the TechConf project directory*


    Figure 7-14 shows the TechConf application’s home page at `http://localhost:8080/TechConf/`
    displaying the available conferences loaded in the database.


    **Figure 7-14.** *The TechConf home page*


