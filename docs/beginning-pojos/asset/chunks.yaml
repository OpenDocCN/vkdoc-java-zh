- fmt: "With the DTO mapped to the domain object we can now move to the other end\
    \ of the spectrum and look at how the `ScheduleEntry` POJO is mapped to the database\
    \ via a HBM file as shown in Listing 5-21.\n\n**Listing 5-21.** *ScheduleEntry\
    \ Hibernate Mapping*\n\n```xml\n<?xml version=\"1.0\"?>\n\n<!DOCTYPE hibernate-mapping\
    \ PUBLIC\n\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\n\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n\n<hibernate-mapping package=\"com.integrallis.techconf.domain\">\n    <class\
    \ name=\"ScheduleEntry\" table=\"scheduleentry\">\n        <id\n            column=\"\
    PK_ID\"\n            name=\"Id\"\n            type=\"integer\"\n        >\n  \
    \          <generator class=\"identity\" />\n        </id>\n        <property\n\
    \            length=\"64\"\n            name=\"Name\"\n        />\n        <property\n\
    \            length=\"32\"\n            name=\"Description\"\n        />\n   \
    \     <many-to-one\n            class=\"User\"\n            name=\"User\"\n  \
    \      >\n            <column name=\"FK_USER_ID\" />\n        </many-to-one>\n\
    \        <many-to-one\n            class=\"Session\"\n            name=\"Session\"\
    \n        >\n            <column name=\"FK_SESSION_ID\" />\n        </many-to-one>\n\
    \        <set inverse=\"true\" name=\"Reminders\">\n            <key column=\"\
    FK_SCHEDULEENTRY_ID\" />\n            <one-to-many class=\"Reminder\" />\n   \
    \     </set>\n    </class>\n</hibernate-mapping>\n```\n\nNow we can move to the\
    \ implementation of the required DAOs. The Schedule Service needs three DAOs to\
    \ accomplish its work; the `ScheduleDAO`, `PresentationDAO`, and `UserDAO`.\n\n\
    The `ScheduleDAO` implementation is shown in Listing 5-22.\n\n**Listing 5-22.**\
    \ *ScheduleDAOBean: An EJB3-Hibernate DAO Implementation*\n\n```java\npackage\
    \ com.integrallis.techconf.ejb.dao.hibernate;\n\nimport java.util.List;\n\nimport\
    \ javax.ejb.Stateless;\n\nimport com.integrallis.techconf.dao.ScheduleDAO;\nimport\
    \ com.integrallis.techconf.domain.Reminder;\nimport com.integrallis.techconf.domain.ScheduleEntry;\n\
    import com.integrallis.techconf.domain.User;\n\n@Stateless\npublic class ScheduleDAOBean\
    \ extends BaseAbstractDAO implements ScheduleDAO {\n\n    public ScheduleDAOBean()\
    \ {}\n\n    public ScheduleEntry saveScheduleEntry(ScheduleEntry scheduleEntry)\
    \ {\n        saveEntity(scheduleEntry);\n        return scheduleEntry;\n    }\n\
    \n    public ScheduleEntry updateScheduleEntry(ScheduleEntry scheduleEntry) {\n\
    \        updateEntity(scheduleEntry);\n        return scheduleEntry;\n    }\n\n\
    \    public void deleteScheduleEntry(ScheduleEntry scheduleEntry) {\n        deleteEntity(scheduleEntry);\n\
    \    }\n\n    public void deleteScheduleEntry(int scheduleEntryId) {\n       \
    \ deleteEntityById(ScheduleEntry.class, scheduleEntryId);\n    }\n\n    @SuppressWarnings(\"\
    unchecked\")\n    public List<ScheduleEntry> getScheduleEntriesForUser(int userId)\
    \ {\n        return findFiltered(ScheduleEntry.class, ScheduleEntry.PROP_USER,\
    \ new User(userId));\n    }\n\n    public ScheduleEntry getScheduleEntryById(int\
    \ scheduleEntryId) {\n        return (ScheduleEntry) getEntityById(ScheduleEntry.class,\
    \ scheduleEntryId);\n    }\n\n    public Reminder saveReminder(Reminder reminder)\
    \ {\n        saveEntity(reminder);\n        return reminder;\n    }\n\n    public\
    \ Reminder updateReminder(Reminder reminder) {\n        updateEntity(reminder);\n\
    \        return reminder;\n    }\n\n    public void deleteReminder(Reminder reminder)\
    \ {\n        deleteEntity(reminder);\n    }\n\n    public void deleteReminder(int\
    \ reminderId) {\n        deleteEntityById(Reminder.class, reminderId);\n    }\n\
    \n    @SuppressWarnings(\"unchecked\")\n    public List<Reminder> getRemindersForScheduleEntry(int\
    \ scheduleEntryId) {\n        return findFiltered(Reminder.class, Reminder.PROP_SCHEDULE_ENTRY,\
    \ new ScheduleEntry(scheduleEntryId));\n    }\n\n    @SuppressWarnings(\"unchecked\"\
    )\n    public List<Reminder> getRemindersForUser(int userId) {\n        return\
    \ findFiltered(Reminder.class, Reminder.PROP_USER, new User(userId));\n    }\n\
    }\n```"
