    ## CHAPTER 2 ■ ECLIPSE


    **29**


    - **Libraries:** In this tab you can make items available to a project’s classpath
    by adding JAR files relative to the project directory or external JARs located
    in the file system. Internal Eclipse JARs are also available as well as predefined
    libraries which can contain one or more JARs grouped under a library name like
