    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    Choosing the right identity-generation strategy depends on many factors, including
    performance and portability. Native database strategies are usually more robust
    and perform better than the equivalent Java-based approach. In most cases I prefer
    to use simple integers for my primary keys in conjunction with the native database
    integer key generator.


    **Saving an Object**


    Now we need to tell Hibernate how to connect to the database and load the Address.hbm.xml
    class mapping in the SessionFactory. For this simple example we will do this directly
    in the Java code. Subsequent examples will use the preferred XML configuration
    file.


    Listing 4-4 shows how to create a Hibernate configuration object in code, add
    a Hibernate mapped class, and retrieve an instance of the SessionFactory from
    the configuration. When you invoke the addClass method of the Configuration class,
    passing the class object for the Address class (Address.class), Hibernate will
    look for a HBM file named “Address.hbm.xml” in the class path. So the simplest
    way to ensure that Hibernate will find your mappings is to place them in the same
    location as the class they map. Once you have a SessionFactory, working with your
    persistent objects is as simple as obtaining a Session and invoking methods on
    it.


    Replace the user name and password with that required for your database.


    **Listing 4-4.** *Configuring Hibernate in Code*


    Configuration config = new Configuration().


    setProperty("hibernate.dialect", "org.hibernate.dialect.MySQLDialect").


    setProperty("hibernate.connection.driver_class", "com.mysql.jdbc.Driver").


    setProperty("hibernate.connection.url", "jdbc:mysql://localhost/techconf").


    setProperty("hibernate.connection.username", "mydbuser").


    setProperty("hibernate.connection.password", "mydbpassword").


    setProperty("hibernate.show_sql", "true"); config.addClass(Address.class);


    SessionFactory factory = config.buildSessionFactory();


    For example to create an Address object and save it to the database we take the
    following steps, reflected in Listing 4-5:


    **1.** POJO is created and values are set.


    **2.** SessionFactory is used to create a **Session**.


    **3.** A Hibernate Transaction bound to the Session is started.


    **4.** The object is saved using the Session persist method.


    **5.** The Transaction is committed.


    **6.** The Session is closed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 109 Wednesday, February 22, 2006 2:16 PM


    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    **109**


    **Listing 4-5.** *Saving an Address*


    Address address = new Address();


    ...


    Session session = null;


    Transaction tx = null;


    try {


    session = factory.openSession();


    tx = session.beginTransaction();


    session.persist(address);


    tx.commit();


    } catch (Exception e) {


    if (tx != null) tx.rollback();


    } finally {


    session.close();


    }


    The code in Listing 4-5 follows the pattern you’ll use when interacting with Hibernate
    mapped objects in a simple J2SE application. Behind the scenes the Hibernate Session
    just opened is given a JDBC connection for the database set in the SessionFactory
    configuration (this connection might be a new connection or might come from a
    pool of existing connections available to Hibernate). Once the **Session** is
    opened it acts as cache for mapped object entities, that is, any object you retrieve
    or save via the opened **Session** will now be in the **Session** cache.


    So, if you were to load the same object twice, in the first call Hibernate will
    issue a SQL statement to load the state of the object, but in any subsequent calls
    using the same **Session**, the object would be retrieved from the **Session**’s
    internal cache and no database access would occur.


    If the code in Listing 4-5 executes successfully, the Address instance that was
    passed to the persist method will now have its Id field populated with the identifier
    generated by the database and there will be a new row in the ADDRESS table. Hibernate’s
    **Session** object provides several methods that persist the state of an object
    to the database, including persist, save, update, and saveOrUpdate. If an object’s
    primary key attribute isn’t set, Hibernate will detect this and automatically
    generate a primary key for the object based on the strategy selected on the id
    element. This will make the underlying operation a SQL INSERT.


    ■**Note** Hibernate detects that an object hasn’t been saved by checking the primary
    key value for null, which is the default of the unsaved-value attribute. If your
    class required a value other than null, set this value in the unsaved-value attribute.'
  trans: '

    ■**最佳实践** 在为新建表选择主键时，尤其是当你知道该表将在面向对象系统中被 ORM 工具使用时，应尽可能使用代理主键。代理主键是小型、简单的键，没有业务含义，通常不会被最终用户更新甚至看到。它们提供了审计追踪，生成较小的索引，使连接更易编写且执行更快，对业务变更更具弹性（因为它们没有业务含义），并且使参照完整性更易维护。一个将业务键用作主键的危险示例是使用电话号码作为账户标识符。由于电话号码可能会且确实会发生变化，当客户的电话号码变更时，就需要进行维护或某种映射；在我看来，更糟糕的是使用复合业务/自然主键，即组合使用多个此类字段作为主键。问题在于这些字段通常不可为空，因此没有简单的方法（无需执行
    SELECT 来检查行是否存在）来确定该对象是否已在数据库中。


    表 4-2 展示了 Hibernate 提供的生成器策略的快速总结。


    **表 4-2.** *Hibernate 的标识符生成策略* **策略**


    **描述**


    increment


    使用内存方案生成整数类型的标识符（long、short 和 int）。不推荐用于集群环境。


    identity


    对支持数据库标识列功能的数据库使用该列。与整数类型的对象属性配合使用。


    sequence


    对支持数据库序列或内部数据库生成器的数据库使用这些功能。


    hilo


    基于给定表中的列，使用算法确定下一个值。在原生数据库序列不受支持且仅在非 JTA 环境或使用用户提供的连接时使用。


    seqhilo


    使用命名的数据库序列和 hilo 算法。


    uuid


    使用算法生成 128 位 UUID（通用唯一标识符）的字符串表示形式。返回的字符串是十六进制编码的。


    guid


    利用某些数据库（Microsoft SQL Server 和 MySQL）生成全局唯一标识符（GUID）的能力。


    foreign


    使用关联对象的标识符。


    native


    智能地选择合适的策略。这是实现最大可移植性的推荐策略。


    select


    使用数据库触发器或通过对唯一键表执行 SELECT 来生成。


    assigned


    用于使用提供的业务唯一键的应用程序。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 108 Wednesday, February 22, 2006 2:16 PM


    **108**


    第 4 章 ■ 使用 HIBERNATE 进行对象关系映射


    选择合适的标识符生成策略取决于许多因素，包括性能和可移植性。原生数据库策略通常比等效的基于 Java 的方法更健壮且性能更好。在大多数情况下，我倾向于将简单整数与原生数据库整数键生成器结合使用作为主键。


    **保存对象**


    现在我们需要告诉 Hibernate 如何连接到数据库，并在 SessionFactory 中加载 Address.hbm.xml 类映射。对于这个简单示例，我们将直接在
    Java 代码中完成。后续示例将使用首选的 XML 配置文件。


    清单 4-4 展示了如何在代码中创建 Hibernate 配置对象、添加 Hibernate 映射类以及从配置中检索 SessionFactory 实例。当你调用
    Configuration 类的 addClass 方法，并传入 Address 类的类对象（Address.class）时，Hibernate 会在类路径中查找名为“Address.hbm.xml”的
    HBM 文件。因此，确保 Hibernate 能找到映射的最简单方法是将它们放在与所映射类相同的位置。一旦拥有了 SessionFactory，使用持久化对象就变得非常简单，只需获取一个
    Session 并调用其方法即可。


    将用户名和密码替换为你的数据库所需的值。


    **清单 4-4.** *在代码中配置 Hibernate*


    Configuration config = new Configuration().


    setProperty("hibernate.dialect", "org.hibernate.dialect.MySQLDialect").


    setProperty("hibernate.connection.driver_class", "com.mysql.jdbc.Driver").


    setProperty("hibernate.connection.url", "jdbc:mysql://localhost/techconf").


    setProperty("hibernate.connection.username", "mydbuser").


    setProperty("hibernate.connection.password", "mydbpassword").


    setProperty("hibernate.show_sql", "true"); config.addClass(Address.class);


    SessionFactory factory = config.buildSessionFactory();


    例如，要创建一个 Address 对象并将其保存到数据库，我们采取以下步骤，如清单 4-5 所示：


    **1.** 创建 POJO 并设置值。


    **2.** 使用 SessionFactory 创建一个 **Session**。


    **3.** 启动一个绑定到该 Session 的 Hibernate 事务。


    **4.** 使用 Session 的 persist 方法保存对象。


    **5.** 提交事务。


    **6.** 关闭 Session。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 109 Wednesday, February 22, 2006 2:16 PM


    第 4 章 ■ 使用 HIBERNATE 进行对象关系映射


    **109**


    **清单 4-5.** *保存一个 Address 对象*


    Address address = new Address();


    ...


    Session session = null;


    Transaction tx = null;


    try {


    session = factory.openSession();


    tx = session.beginTransaction();


    session.persist(address);


    tx.commit();


    } catch (Exception e) {


    if (tx != null) tx.rollback();


    } finally {


    session.close();


    }


    清单 4-5 中的代码遵循了在简单 J2SE 应用程序中与 Hibernate 映射对象交互时使用的模式。在幕后，刚刚打开的 Hibernate Session
    会获得一个用于 SessionFactory 配置中设置的数据库的 JDBC 连接（这个连接可能是新连接，也可能来自 Hibernate 可用的现有连接池）。一旦
    **Session** 被打开，它就会充当映射对象实体的缓存，也就是说，任何通过该打开的 **Session** 检索或保存的对象现在都将位于 **Session**
    缓存中。


    因此，如果你两次加载同一个对象，在第一次调用时，Hibernate 会发出 SQL 语句来加载对象的状态，但在后续使用同一个 **Session** 的任何调用中，该对象将从
    **Session** 的内部缓存中检索，而不会发生数据库访问。


    如果清单 4-5 中的代码成功执行，则传递给 persist 方法的 Address 实例的 Id 字段现在将填充由数据库生成的标识符，并且 ADDRESS
    表中将出现一个新行。Hibernate 的 **Session** 对象提供了多种将对象状态持久化到数据库的方法，包括 persist、save、update
    和 saveOrUpdate。如果对象的**主键**属性未设置，Hibernate 将检测到这一点，并根据 id 元素上选择的策略自动为对象生成主键。这将使底层操作变为
    SQL INSERT。


    ■**注意** Hibernate 通过检查主键值是否为 null（这是 unsaved-value 属性的默认值）来检测对象是否尚未保存。如果你的类需要
    null 以外的值，请在 unsaved-value 属性中设置该值。

