    Tapestry


    **I**n no other place is the diversity of the Java landscape more apparent than
    in the arena of Web development frameworks. The rise of the Internet as an application
    platform coupled with the stateless nature of the HTTP protocol gave rise to the
    servlet API as the workhorse API used to bring Java to the Web.


    The servlet API helped formalize the usage of HTTP in Java and provide some simple
    constructs for dealing with the need to maintain state as required by dynamic
    applications.


    Servlets provided an initial avenue for Java on the Web. We built many pure servlet
    Web applications at it was soon apparent that for any application with more than
    a few pages and with medium to complex user interface requirements, servlets did
    not provide a high enough abstraction as separation of concerns between the business
    logic, presentation logic, and the actual view composed of HTML.


    With servlet development, developers often received mocked-up HTML pages from
    Web designers. Form that point, developers had to extract the HTML and place it
    in the servlet code using println statements and escaping common HTML characters
    like double quotes. Development time was also painfully slow with servlets since
    code changes could not be quickly tested without complete recompilation and redeployment.


    The shortcomings of the servlet API and inspiration from some of the early commercial
    and open source Web frameworks led to the creation of JavaServer Pages (JSP).
    This was a definitive improvement, especially in the area of productivity. JSPs
    changed the way Web applications were developed in Java. Instead of embedding
    HTML markup in Java, the metaphor flipped to embedding Java code in the HTML.
    Productivity increased because there was no longer a need to manually recompile
    and redeploy since JSPs are dynamically compiled into servlets on demand after
    a modification. Initially, JSPs seemed to solve a lot of the problems with servlet
    development, allowing Web designers to make ongoing changes to the HTML during
    the development process. Unfortunately, no good deed goes unpunished, and JSP-based
    applications, with their ability to embed Java code in the HTML via scriptlets,
    led to poor Web development practices such as placing heavy business logic in
    the presentation tier. In addition, JSPs didn’t provide any good means of reusing
    the code placed in scriptlets which led to duplication of code and all of the
    headaches associated with copy-and-paste reuse. This is what most people refer
    to as JSP Model 1, in which JSP pages serve both as controllers or dispatchers
    and the model is accessed via beans used to communicate with back-end technologies
    such as EJBs. Model 1 coupled view and the dispatcher and effectively created
    many controllers. The problems with this approach became apparent in larger applications
    as the controller code grew out of proportion, rendering the almost-like-HTML
    JSPs to look more like **239**


