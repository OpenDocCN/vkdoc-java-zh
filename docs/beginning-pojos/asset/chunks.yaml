    上。请访问 www.jboss.com/products/jbossas/downloads 并按照说明获取发行版。


    我建议您使用可视化安装程序，因为它大大简化了安装过程。


    本书使用的 JBoss 版本是 JBoss AS 4.0.3。如果您使用图形化安装程序，请选择包含 EJB3 功能的完整产品安装。


    可视化安装程序以可执行的 JAR 文件形式分发；对于 4.0.3 版本，该文件是 jboss-4.0.3-installer.jar。要开始安装，请双击 JAR
    文件（在 Windows XP 中）或在命令 shell 中键入：


    java –jar jboss-4.0.3-installer.jar


