- fmt: '# Chapter 1: Introduction


    The IT industry has championed several approaches for dealing with the inherent
    complexity of designing, building, and maintaining software-intensive enterprise
    systems. Object-oriented, component-based, distributed systems represent state-of-the-art,
    enterprise-level systems technology. This book deals with some of the issues of
    building enterprise applications at a practical level when the “silver bullet”
    that has been handed to the information technologist is Java, specifically Java
    EE. Java EE is promising, especially for the inexperienced technologist because
    it makes a perfect technological silver bullet. The real-world experiences are
    far from software utopia, as a recent study by the Seybold Group suggests that
    there is a gap between management’s expectations of Java EE and the achieved results.
    One of the reasons for this is the lack of tools that cover the many aspects of
    Java EE development. It is in this area that open source enterprise Java tools
    and frameworks are emerging to help bridge the gap.


    Learning how to build enterprise applications with a combination of open source
    frameworks and tools provides a low-cost, low-risk, ideal prototyping environment
    in which to master distributed computing technologies. Open source lowers the
    entry barrier into the Java and Java EE worlds by providing choices besides the
    traditional proprietary offerings.


    The rest of this chapter introduces a real-world example that puts the application
    of Java EE technologies into clearer perspective. It introduces a realistic business
    problem to be used as the backdrop for the learning process of designing, building,
    and deploying an enterprise Java system using open source technologies. We will
    start with the requirements which will set the stage for design, architectural,
    and implementation approaches explored in the rest of the book.


    ## Case Study: The TechConf Website


    The TechConf website case study presented in this chapter is a technology-conference
    management system encompassing a collection of systems and utilities used to advertise,
    prepare, and support one or more technology conferences. A technology conference
    is an event that spans a predetermined period of time and consists of one or more
    sessions (presentations, keynotes, and so on).


    As a frequent speaker and attendee of technology conferences, I thought the domain
    was well-suited for the purposes of this book. The main stakeholders, that is,
    the people who have a vested interest in the system, are technologists, just like
    you and me, which makes it easier to relate to the needs of the user, and consequently,
    make the gathering of requirements, analysis, and design processes clearer.


    Technically, a technology conference presents some unique challenges in the fields
    of distributed computing and enterprise development due to the dynamic nature
    of the information requirements and the logistics involved in running such an
    event.


    If you are like me and most other programmers, you’ll want to jump right into
    the code, and you might think that the sooner you start coding the sooner you’ll
    finish your project. Well, for all but the most trivial of applications this is
    not true; a certain amount of planning has to happen before you write a single
    line of code. Feel free to prototype to your heart’s content, but without design,
    a stable, correct and maintainable solution is rarely achieved. So bear with me
    for the next few pages. They might help you in your next project.


    ## Defining the Stakeholders


    To understand the dynamics of the system, it’s important to determine who the
    stakeholders are and how their individual information needs to change over time.
    The main stakeholders to be considered in the context of a technology conference
    are as follows:


    - **Attendees:** individuals attending the conference

    - **Presenters:** individuals presenting one or more sessions at a conference

    - **Sponsors:** organizations sponsoring and promoting the conference

    - **Administrators:** the person or persons organizing and running the conference


    To create a clear picture of the changing needs of the stakeholders, it’s useful
    to view the conference as three separate periods of time: the preconference, the
    conference, and the postconference periods. After all, event management is all
    about timelines. Figure 1-1 illustrates the three stages of the conference.


    ### Preconference


    During the preconference period, data is collected, evaluated, and created. Collected
    data includes documents such as calls for papers, abstracts, and outlines for
    the different presentations. From the collected documents, content must be created
    and also maintained as the source documents change. Aside from the document management
    needs, facilities must be provided for attendees to register and manage the schedule
    of events they plan to attend. At this time it’s also crucial to provide information
    in a timely manner to make the process of registering and getting to the conference
    easier. Among the experience-enhancing utilities are items that allow you to obtain
    driving directions or information about special conference rates for travel and
    hotel accommodations.


    ### Conference


    The information needs at conference time are crucial to the success of the conference.
    Satisfied attendees are more likely to return the following year. Being able to
    cut through the noise, pinpoint areas of interest, and choose sessions to attend
    are factors of great importance to improving an attendee’s experience. Providing
    interactivity and constant feedback ensures that attendees are always in tune
    with the heartbeat of the conference. At the beginning of the conference, attendees
    need to be checked in and given conference badges. Changes or updates to any sessions
    or presentations need to be communicated effectively in order for attendees to
    manage their schedules.


    ### Postconference


    Once the conference has closed its doors, a large amount of work remains to be
    performed. Attendees are now alumni, and as such they’re a prime target audience
    for future conferences. Providing a sense of continuity is important to alumni
    and future attendees of a technology conference. There should be a bridge from
    the topics and content of previous conferences to ongoing and future conferences.


    In the realm of document management, these requirements translate to the management
    of the transition of dynamic documents into static documents or archives. The
    numerous documents such as presentation slides, notes, follow-up discussions,
    and supporting materials related to different presentations or sessions must now
    be made available to the conference alumni and possibly to the general public.
    For the organizers of the conference, information such as the number of attendees,
    the popularity of topics and other statistical information is a crucial business
    indicator that will determine the future changes and enhancements made to the
    conference.


    **Figure 1-1.** *Stakeholders’ requirements timeline*


    ## The Business Problem'
