    页面规范文件是一种扩展名为“page”的 XML 文件。请记住，页面是 Tapestry 组件的一种特殊类型，而此文件是我们应用程序中 Home 页面组件的配置文件。页面可以包含组件，在本例中，我们的页面包含一个类型为
    Insert 的组件。Insert 组件是 Tapestry 众多内置组件之一。Insert 允许你动态地在 HTML 响应中插入文本，并可以选择通过使用`java.text.Format`实例来过滤特殊字符或进行格式化。


    清单 7-3 展示了 Home.page 文件的内容。


    **清单 7-3.** *页面规范 XML 文件 (Home.page)*


    <?xml version="1.0"?>


    <!DOCTYPE page-specification PUBLIC


    "-//Apache Software Foundation//Tapestry Specification 4.0//EN"


    "http://jakarta.apache.org/tapestry/dtd/Tapestry_4_0.dtd">


    <page-specification class="com.integrallis.time.Home">


    <component id="time" type="Insert">


    <binding name="value" value="ognl:time"/>


    </component>


    </page-specification>


