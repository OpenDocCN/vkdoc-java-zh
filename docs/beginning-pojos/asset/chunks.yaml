    ### How This Book Is Structured


    The chapters in this book are centered on the concept of an application tier and
    the tools or frameworks used to build that tier. You can read each chapter independently
    of the others, since I provide a simple introductory example in most chapters,
    which is followed by a more involved use of the tool in the context of the example
    application used throughout the book.


    - **Chapter 1, Introduction:** This chapter will set the stage for the application
    that we will build and rebuild during the course of the book. You’ll learn some
    of the design and architecture decisions that culminated in the creation of the
    sample application.

    - **Chapter 2, Eclipse:** This chapter introduces my development environment of
    choice, the Eclipse IDE, and a few plug-ins that will make your development easier
    and more enjoyable.

    - **Chapter 3, Building with Ant:** This chapter sets out to create a solid Ant-based
    build system that will be used in the rest of the book. This chapter offers “best
    practices” and a collection of Ant-based tools that can improve your builds.

    - **Chapter 4, Object Relational Mapping with Hibernate:** This chapter gives
    you an introduction to the sometimes frustrating art of mapping objects to relational
    databases. You’ll learn how to use Hibernate, the most popular and powerful ORM
    tool.

    - **Chapter 5, Business Services with JBoss:** This chapter sets out to build
    the business tier of the example application using EJB3 technologies on the JBoss
    application server. This chapter sets the stage for subsequent chapters by showing
    alternative ways to tackle different tiers of the application.

    - **Chapter 6, The Spring Framework:** This chapter showcases the Spring Framework
    agile approach by building the same set of services built in Chapter 5 using Spring
    Bean Services.

    - **Chapter 7, Tapestry:** This chapter shows the hidden gem of the Java Web application
    frameworks. You’ll use Tapestry to build the user interface of the sample application.

    - **Chapter 8, Testing:** This chapter offers a concise and pragmatic look at
    testing Java EE applications by revisiting JUnit and introducing TestNG, DbUnit,
    and EasyMock.

    - **Chapter 9, Continuous Integration:** This chapter delves into the practice
    of Continuous Integration using the CruiseControl build scheduler.

    - **Chapter 10, Additional Topics:** This chapter serves as an introduction of
    some of the tools that complete the features of a real-world application, such
    as AOP with AspectJ and adding RSS feeds with the Informa library.


    ### Prerequisites


    The code in this book uses Java 5 features such as annotations and some of the
    newer syntax and constructs.'
