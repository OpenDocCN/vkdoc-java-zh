    第 6 章 ■ SPRING 框架


    **199**


    如图 6-2 所示，Spring 在主发行版中包含 12 个模块和 5 个子项目。主要的 Spring 模块有：


    • **Spring Core：** 不特定于框架任何部分的通用类和接口，包括异常处理以及 JDK 和集合工具类

    • **Spring Beans：** 用于操作 Java Bean 的工具以及控制反转容器的核心实现

    • **Spring AOP：** Spring AOP 实现（符合 AOP 联盟标准）；与 Spring 应用上下文紧密集成

    • **Spring Context：** 提供用于一致资源查找和共享的工具（包括 JNDI 绑定的资源、EJB、电子邮件、国际化、验证和调度）；还提供对消息源、数据绑定、验证和观察者设计模式的支持

    • **Spring Support：** 提供对 JMX、JCA、调度、邮件和缓存的支持

    • **Spring Mock：** 提供用于 JNDI、Servlet API 和通用 JUnit 集成的模拟测试类

    • **Spring JDBC：** 通过提供模板和回调接口、用于 JDBC 操作的线程安全类以及其他工具（如大型数据库对象处理类）来提供对 JDBC 的抽象

    • **Spring ORM：** 提供对各种 ORM 技术的支持，包括 iBATIS SQL 映射、Apache OJB、TopLink 和 JDO

    • **Spring DAO：** 为 DAO 实现提供清晰、非受检的异常层次结构，独立于底层数据访问技术

    • **Spring Hibernate：** 提供对 Hibernate 2.X 和 3.X 版本的 ORM 支持

    • **Spring Web：** 提供与许多流行 Web 技术的集成，包括 Struts、Velocity 和 JSF；还提供多部分文件上传框架和其他 Web
    工具

    • **Spring MVC：** 一个功能完备的 MVC Web 框架实现，可以与多种视图技术集成，包括 JSP、Velocity、Tiles、iText
    和 POI


    当前的五个 Spring 子项目是：


    • **Spring Security：** 为 Spring 框架提供一套全面的安全服务，包括对单点登录（SSO）的支持

    • **Spring Web Flow：** Spring Web Flow（SWF）提供了在 Web 应用程序中定义和编排页面流程的功能

    • **Spring Rich Client：** 将 Spring 框架的原则应用于创建专业的 Swing 应用程序


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C06.fm 第 200 页 2006 年 2 月 22 日星期三 下午 1:20


    **200**


    第 6 章 ■ SPRING 框架


    • **Spring BeanDoc：** 一种以图形方式记录 Spring Bean 工厂结构的工具

    • **Spring IDE for Eclipse：** 一组用于处理 Spring 配置文件的 Eclipse 插件


    Spring 还与大多数 Web 应用程序框架集成，包括 Apache Struts 项目、JSF、Tapestry 以及最近的 Wicket。


    **安装和配置 Spring**


    Spring 框架以 ZIP 文件形式分发，其中包含源代码、预打包的 JAR 文件和支持文件，可在 www.springframework.org/download
    获取。有两种可用的下载类型，一种包含所有第三方（开源）依赖项，另一种不包含。


    我建议你下载包含所有依赖项的版本。在撰写本文时，该归档文件为 spring-framework-1.2.5-with-dependencies.zip。在该归档文件中，你会找到八个文件夹：


    • **dist：** Spring 框架分发文件

    • **docs：** 参考和 API 文档以及 Spring MVC 教程

    • **lib：** 所有第三方依赖项，按项目/产品组织

    • **mock：** Web 和 JNDI 模拟对象

    • **samples：** 几个示例应用程序

    • **src：** Spring 框架的完整源代码库

    • **test：** 全面的 JUnit 测试集

    • **tiger：** JSE 5.0 特定功能，包括对某些功能（如事务和 Hibernate 3.0 注解）的注解支持


    本书的重点是构建 Web 应用程序；因此，你需要一个支持 Servlet API 的 Web 容器，例如 Tomcat 或 Jetty。和之前一样，我们将在所有示例中使用
    JSE 5.0。


    **使用 Spring Bean 工厂**


    Spring Bean 工厂是工厂设计模式的实现，它们提供特定类型的 Bean 或对象，并使用以属性文件或 XML 文档形式提供的元数据来配置它们。迄今为止，Spring
    Bean 工厂中使用最广泛的部分是 XMLBeanFactory，它可以根据描述要使用哪个具体类以及如何配置它的 XML 定义来实例化一个接口的实现。

