    evolve to meet future needs.


    **JBoss**


    The JBoss Application Server started life as the EJBoss project back in March
    of 1999\. Spear-headed by Marc Fleury, a former Sun Microsystems engineer, and
    an enthusiastic group of programmers ready to embrace the then-new EJB specification,
    it has grown to be the most popular open source application server in the market
    and a worthy contender to the likes of BEA WebLogic and IBM WebSphere (the two
    commercial leaders in the market).


    Distributed under the GNU Lesser General Public License (LGPL), JBoss is a 100-percent
    compliant clean-room implementation that provides the full gamut of Java EE services.
    It is built on a pluggable architecture that leverages the JMX specification (Java
    Management Extensions) and advances in software engineering such as aspect-oriented
    programming (AOP) and (DI)/IoC techniques. JBoss was also one of the first application
    servers tailored to developers, with dynamic features like hot deployment and
    on-the-fly flexibility, for example, the ability to load and unload libraries
    at runtime and dynamic generation of container stubs and skeletons. Many of these
    features are still not found in some commercial offerings.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C05.fm Page 147 Wednesday, February 22, 2006 6:13 AM


    C H A P T E R 5 ■ B U S I N E S S S E R V I C E S W I T H J B O S S


    **147**


    **JBoss JEMS**


    JBoss is more than an application server, it is a full-featured platform for enterprise
    development providing the full Java EE stack of services under the umbrella of
    the JBoss Enterprise Middleware System (JEMS) brand. Positioned as a professionally
    supported choice for enterprises looking to implement a truly “service-oriented
    architecture” (SOA) built upon a foundation of reliable, battle-tested middleware
    components.


    The JEMS products comprise an impressive list of offerings, including the following:


    • **JBoss AS:** JBoss Application Server


    • **Apache Tomcat:** Apache Tomcat Web container


    • **Hibernate:** Object-relational persistence and query service


    • **JBoss Portal:** Portal platform providing content aggregation and personalization
    based on the Porlet Specification (JSR-168). It evolved from the JBoss Nukes project


    • **JBoss jBPM:** A powerful workflow and business process management engine


    • **JBoss Rules:** Business rules engine based on the Drools Rule Engine


    • **JBoss Cache:** Clustered, distributed object cache


    • **JBoss Eclipse** **IDE:** A set of Eclipse plug-ins to develop JBoss Java EE
    1.4 applications **JBoss AS Architecture**


    JBoss AS is built on a foundation that uses the JMX API to deliver a lightweight
    microkernel layer that provides an MBean-based component model that enables the
    lifecycle management of MBean-based services and provides an advanced and flexible
    class loading scheme.


    The JMX specification allows the control and configuration of managed beans, or
    MBeans.'
