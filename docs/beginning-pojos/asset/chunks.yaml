    **376**


    第 10 章 ■ 其他主题


    **使用 Informa 处理 RSS**


    如今，大多数网站普遍具备的一个功能是添加来自博客、新闻站点以及任何其他类似新闻源的聚合内容。RSS（丰富站点摘要/RDF 站点摘要）和 Atom 协议规定了如何格式化
    XML 文档，以便对列表导向的信息进行聚合和汇总。使用 RSS，你可以为网站创建标题、文章或博客条目的摘要数据源，也可以消费其他站点的数据源来丰富你的网站或应用内容。XML
    聚合协议允许系统以一致的方式处理、转换或格式化来自数据源的信息。（还记得过去那种 HTML 屏幕抓取的方式吗？）


    网站的数据源或频道可以通过 HTTP 访问，就像 Web 服务器上的任何其他资源一样。数据源提供了关于数据多个方面的元数据，例如更新频率。Informa RSS
    库是一个纯 Java 开源 API，用于生成和处理 RSS 及 Atom 数据源。Informa 是由两个 Java RSS 聚合程序的基础库合并而成的。


    数据源生产者和消费者面临的一个问题是存在不同的协议。对于 RSS，我们有三种不同的版本：RSS 0.9x、RSS 1.0 和 RSS 2.0。Informa
    旨在为频道对象模型提供一个统一的对象模型，无论数据源的格式如何。通过使用 Informa 对象模型，可以创建任何支持格式的数据源。Informa 还可以有效地聚合来自不同来源的数据源。Informa
    的对象模型可以通过 Hibernate 持久化，并且提供了与 Lucene 搜索引擎的集成，以便对数据源内容进行高效的全文本搜索。


    图 10-7 展示了 Informa 对象模型的部分视图，其中显示了 FeedManager，它用于提供 FeedIF 接口的实例，而 FeedIF 接口又用于创建
    ChannelIF 接口的实例。通过 ChannelIF，你可以获取代表数据源条目的对象，这些对象是 ItemIF 接口的实例。图 10-7 还展示了数据源缓存和刷新所涉及的一些类。


    **图 10-7.** *Informa 对象模型的部分视图*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


