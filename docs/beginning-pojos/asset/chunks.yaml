    主页是一个相当简单的页面。对于应用程序的其余部分，我们有更复杂的需求，并且各页面之间有许多共同元素。与使用 Tiles（如第 6 章所示）类似，我们可以创建一个自定义的
    Tapestry 组件，作为应用程序中其余页面的边框。这个自定义组件还将负责处理用户的登录和注销。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00007.png)


    Sam-Bodden_596-3 C07.fm 第 270 页 2006 年 2 月 23 日，星期四，下午 4:22


    **270**


    第 7 章 ■ TAPESTRY


    在 Tapestry 中，创建自己的组件与创建页面非常相似。毕竟，页面本身就是 Tapestry 组件。组件的组装方式有两种，具体取决于最终 HTML 的生成方式。如果你在代码中为组件生成
    HTML，那么你的组件 Java 类应该继承自 Tapestry 类 `org.apache.tapestry.AbstractComponent`。另一方面，如果你想使用
    HTML 模板作为组件输出的基础，那么你需要继承自类 `org.apache.tapestry.BaseComponent`。图 7-15 展示了组件和页面的核心层次结构。


    **图 7-15.** *Tapestry 组件和页面层次结构* 组件 HTML 模板


    为了创建将作为所有会议页面框架的组件，我们将从 HTML 模板开始。该模板如图 7-16 所示。


    ConferenceBorder.html 模板被划分为四个清晰界定的区域，如图 7-17 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00016.png)


    Sam-Bodden_596-3 C07.fm 第 271 页 2006 年 2 月 23 日，星期四，下午 4:22


    第 7 章 ■ TAPESTRY


    **271**


    **图 7-16.** *会议边框 HTML 模板预览* **图 7-17.** *会议边框模板的结构*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm 第 272 页 2006 年 2 月 23 日，星期四，下午 4:22


    **272**


    第 7 章 ■ TAPESTRY


    在模板的顶部，有一个区域将显示会议标题、日期范围和地点。左侧是一个典型的导航菜单，用户可以通过它访问网站上的其他可用页面。右侧是一个通用的登录框、一个注销按钮、一个用于显示已登录用户名称的占位符，以及一个将用户带到会议注册页面的按钮。清单
    7-18 显示了相关的 HTML。


    **清单 7-18.** *ConferenceBorder.html 模板*


    <html jwcid="@Shell" title="ognl:title" stylesheet="asset:stylesheet">


    <head>


    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />


    ...


    <span jwcid="$remove$">


    <link rel="stylesheet" type="text/css" href="../css/techconf.css"/>


    </span>


    </head>


    <body jwcid="@Body">


    ...


    <span class="bodyText" jwcid="@RenderBody">页面特定内容放在此处。</span>


    ...


    </body>


    </html>


    如你所见，该模板是一个普通的 HTML 页面。在 html 根元素中，我们添加了一个 Shell 组件，顾名思义，它构建了 HTML 页面的外部框架。在 html
    元素中，我们还动态插入了页面标题，并将页面的 CSS 样式表设置为 id 等于 `stylesheet` 的资产的值。在 head 元素内部，我们包含了一个指向页面所用
    CSS 样式表相对位置的引用，以便提供准确的页面预览。当页面被渲染时，这个引用将被移除。


    在 body 元素中，使用了 Body 组件，它负责协调页面主体中包含的任何组件所贡献的 JavaScript。由于我们不知道页面中可能包含哪些组件，因此建议你始终在页面的
    body 元素中使用 Body 组件。

