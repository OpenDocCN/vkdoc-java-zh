    CREATE TABLE GROUPPRICINGRULE (


    PK_ID INTEGER NOT NULL PRIMARY KEY,


    MINIMUMATTENDEES INTEGER,


    MAXIMUMATTENDEES INTEGER,


    DISCOUNTRATE DOUBLE,


    CONSTRAINT GROUPPRICINGRULE_PRICINGRULE_FK


    FOREIGN KEY(PK_ID) REFERENCES PRICINGRULE(PK_ID)


    );


    CREATE TABLE REGISTRATIONDATEPRICINGRULE (


    PK_ID INTEGER NOT NULL PRIMARY KEY,


    STARTDATE DATETIME NOT NULL,


    ENDDATE DATETIME NOT NULL,


    PRICE DOUBLE NOT NULL,


    CONSTRAINT REGISTRATIONDATEPRICINGRULE_PRICINGRULE_FK


    FOREIGN KEY(PK_ID) REFERENCES PRICINGRULE(PK_ID)


    );


    In this strategy the data model mirrors the object model. Hibernate will rely
    on matching the primary keys to find all the data belonging to a particular subclass
    and will use it to perform joins when querying the PricingRule hierarchy.


    To map these three tables to the object model, we use joined-subclass element
    in the HBM


    file as shown in Listing 4-29\. The id element mapped to the column PK_ID is the
    primary key of the parent table, while the key elements inside each joined-subclass
    mapping provide the linkage between the parent table and the subclass tables.


    **Listing 4-29.** *Table-Per-Subclass Mapping for Pricing Rules Hierarchy*


    <?xml version="1.0"?>


    <!DOCTYPE hibernate-mapping PUBLIC


    "-//Hibernate/Hibernate Mapping DTD 3.0//EN"


    "http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd">


    <hibernate-mapping package="com.integrallis.techconf.domain">


    <class name="PricingRule" table="pricingrule">


    <id


    column="PK_ID"


    name="Id"


    type="integer"


    >


    <generator class="identity" />


    </id>


    <property name="Name" not-null="true" />


    ...


