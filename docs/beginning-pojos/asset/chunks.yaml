    C H A P T E R 5 ■ B U S I N E S S S E R V I C E S W I T H J B O S S


    **Figure 5-7.** *EJB3 high-level features*


    You might be wondering where all the different methods that were needed in the
    implementation of a version 2.X EJB have gone in version 3. Methods such as the
    callbacks provided for bean life cycle management. In EJB3 most of these methods
    are replaced with annotations applied to any method in the bean class in order
    to treat it as a life cycle callback method. In EJB3 the container automatically
    calls the annotated methods. The available annotations in EJB3 are described in
    Table 5-1.


    **Table 5-1.** *EJB3 Lifecycle Callback Annotations*


    | **Annotation** | **Description** | **Applicable Bean Type** |

    | --- | --- | --- |

    | `@PostConstruct` | Called right after instantiation | Stateful/Stateless Session
    Beans |

    | `@PreDestroy` | Called before removal from the bean pool | Stateful/Stateless
    Session Beans |

    | `@PrePassivate` | Called before passivation | Stateful/Stateless Session Beans
    |

    | `@PostActivate` | Called right after activation when the instance is ready |
    Stateful Session Beans |

    | `@Init` | Called right after instantiation but before `PostConstruct` | Stateful
    Session Beans |

    | `@Remove` | Used on a particular method to indicate that the method should be
    invoked before the bean instance is removed | Stateful Session Beans |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00078.png)


