    \ key=\"hibernate.cglib.use_reflection_optimizer\">true</prop>\n</props>\n</property>\n\
    </bean>\n```\n\nFinally, we configure other Hibernate properties via the `hibernateProperties`\
    \ property, which allows us to pass arbitrary name-value pairs of properties to\
    \ the underlying `SessionFactory`.\n\nIn this case the properties `hibernate.dialect`\
    \ and `hibernate.show_sql` are defined in the `jdbc.properties` file for convenience.\
    \ We now have a Hibernate `SessionFactory` available to any bean in our Spring\
    \ application.\n\n## Implementing the DAO Pattern with Spring\n\nAs we learned\
    \ in Chapter 5, we could have easily created our DAO implementations by injecting\
    \ the Hibernate `SessionFactory` into the DAOs and creating a session using the\
    \ `openSession` method of the `SessionFactory` and reusing the session for the\
    \ life of the DAO, thus avoiding the new-session-per-operation antipattern.\n\n\
    Spring provides the `HibernateTemplate` utility class to deal with the managing\
    \ of Hibernate `Session` instances in the context of the current thread (similar\
    \ to what `SessionFactory` method `getCurrentSession` does in a JTA environment)\
    \ and handling conversion of the fairly fine-grained Hibernate exception hierarchy\
    \ to the more manageable (from an application’s point of view) Spring DAO exception\
    \ hierarchy.\n\nThe `HibernateTemplate` implements the Hibernate `Session` interface\
    \ wrapping the thread-bound Hibernate `Session` or creating one when necessary.\
    \ Spring’s `HibernateTemplate` is an application of IoC to simplify interaction\
    \ with Hibernate. Using Spring template objects will reduce the amount of code\
    \ required in your DAOs (especially if compared to the typical DAO implementation\
    \ using Hibernate 2.X) since it removes the need to close the session and catch\
    \ the (typically fatal) data access exceptions.\n\nTo configure a `HibernateTemplate`\
    \ bean we inject the previously configured `SessionFactory` as shown in Listing\
    \ 6-14.\n\n**Listing 6-14.** *Configuring the Spring HibernateTemplate*\n\n```xml\n\
    <bean id=\"hibernateTemplate\"\n      class=\"org.springframework.orm.hibernate3.HibernateTemplate\"\
    >\n    <property name=\"sessionFactory\"><ref bean=\"sessionFactory\"/></property>\n\
    </bean>\n```\n\nThe `HibernateTemplate` will be injected into the DAO implementations,\
    \ which will extend the `HibernateDAOSupport` base class that provides convenience\
    \ methods for Hibernate-based DAOs. As we did in Chapter 5, I’m using a base abstract\
    \ DAO class to simplify the concrete implementations of the DAO interfaces. The\
    \ TechConf Spring-Hibernate `BaseAbstractDAO` as shown in Listing 6-15 shows the\
    \ usage of the `HibernateTemplate` available within the `HibernateDAOSupport`\
    \ base class.\n\n**Listing 6-15.** *Spring-Hibernate BaseAbstractDAO*\n\n```java\n\
    package com.integrallis.techconf.spring.dao;\n\nimport java.io.Serializable;\n\
    import java.util.List;\n\nimport org.hibernate.criterion.DetachedCriteria;\nimport\
    \ org.hibernate.criterion.Expression;\nimport org.hibernate.criterion.Order;\n\
    import org.springframework.dao.support.DataAccessUtils;\nimport org.springframework.orm.hibernate3.support.HibernateDaoSupport;\n\
    \npublic class BaseAbstractDAO extends HibernateDaoSupport {\n\n    protected\
    \ Object getEntityById(Class clazz, Serializable id) {\n        return getHibernateTemplate().get(clazz,\
    \ id);\n    }\n\n    protected void saveEntity(Object entity) {\n        getHibernateTemplate().persist(entity);\n\
    \    }\n\n    protected void saveOrUpdateEntity(Object entity) {\n        getHibernateTemplate().saveOrUpdate(entity);\n\
    \    }\n\n    protected void updateEntity(Object entity) {\n        getHibernateTemplate().update(entity);\n\
    \    }\n\n    protected void deleteEntity(Object entity) {\n        getHibernateTemplate().delete(entity);\n\
    \    }\n\n    protected void deleteEntityById(Class clazz, Serializable id) {\n\
    \        Object entity = getEntityById(clazz, id);\n    }\n}\n```"
