    第 3 章 ■ 使用 Ant 构建


    **69**


    <fileset dir="dd">


    <include name="*.properties"/>


    </fileset>


    </copy>


    </target>


    <target name="compile-clean">


    <delete includeemptydirs="true">


    <fileset dir="${classes}" includes="**/*"/>


    </delete>


    </target>


    请注意，除了 compile 之外，我们还添加了两个目标。它们是 compile-init 和 compile-clean。compile-init 目标通过使用
    mkdir 任务简单地创建 classes 目录。compile-clean 目标使用 delete 任务来删除该目录及其所有内容。

