    **Retrieving a Single Object**


    The Hibernate Session provides several convenient methods to retrieve an object
    via its primary key. No longer do you have to issue a full SQL statement to retrieve
    an object’s data from the database. The Hibernate Session provides the load and
    get methods to retrieve an object by id.


    The main difference between these two methods is that load assumes that the object
    you are looking for exists while get can be equated with a find since you can
    check its result for null to test if a row exists in the database. The load method
    can throw an org.hibernate.ObjectNotFoundException if the entity does not exist
    in the database (this might not happen at all since load will attempt to return
    a proxy whenever possible). Both methods will check first in the Session cache
    to see if the entity has already been loaded, therefore preventing unnecessary
    database hits.'
