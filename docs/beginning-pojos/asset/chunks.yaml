    **服务对象**


    在过去几年中，轻量级容器与敏捷技术的结合已成为 Java 企业开发中追求的新标准。但“轻量级”Java 意味着什么呢？我认为轻量级 Java 是将基于 POJO
    和 POJI 的丰富面向对象模型的简化编程模型，与响应式、侵入式但健壮且功能齐全的组件容器相结合。


    对于诸如 Spring 框架、PicoContainer 和 NanoContainer 提供的轻量级容器，公认的概念是它们具有较小的内存占用、快速的启动时间，以及无需重启服务器即可热部署组件和应用程序的能力。要实践轻量级
    Java，是否必须使用传统的轻量级容器？在我看来，只要服务器的内存占用或启动时间在合理范围内，轻量级 Java 更关乎编程模型以及缩短代码-编译-部署-测试周期的能力，而非内存占用或启动时间。在这种情况下，轻量级
    Java 有助于提高开发人员生产力的主要特性是：一种不强制您的业务和领域对象遵循任何特定组件模型的编程模型，允许您使用诸如面向接口编程等长期公认的最佳实践，并且能够以透明的方式为容器中的组件提供容器服务，同时不损害它们在容器外的可用性或可测试性。


    EJB3 规范是吸取了通过减少先前规范中引入的不必要复杂性来使 Java 更轻量、更敏捷这一运动的经验教训的产物。结合 JSR-175 元数据工具以及 IoC/DI
    和 AOP 等技术，它使 JBoss AS 成为一个支持轻量级和敏捷开发的平台。


    在 EJB3 开发中，组件就是 POJO，POJO 就是组件。通过使用注解形式的元数据，任何 POJO 都可以享受传统托管服务对象所具有的优势，例如松散耦合、网络独立性以及透明地使用资源池的能力。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


