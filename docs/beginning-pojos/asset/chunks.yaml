    <target name="clean-all" description="Removes all build artifacts">


    <antcall target="compile-clean" />


    <antcall target="generate-docs-clean" />


    <antcall target="test-clean" />


    ...


    </target>


    **The All Target**


    Finally, it’s a common practice to make the buildfile default target a target
    named “all”, which has in its dependencies a list of the targets that represented
    a full build of the system. If your build process has any non-critical targets
    that take a fair amount of time to generate, you can create new targets that will
    do whatever the all target does in addition to any extra work. For example a target
    that does “all” and also generates documentation can be called “all-with-docs”.


    The point is that you want to minimize the amount of time that it takes to build
    the application so that developers don’t have noticeable interruptions in the
    flow of their work. A typical all target looks like that shown in Listing 3-15.


    **Listing 3-15.** *The All Target*


    <target


    name="all"


    depends="compile,..."


    description="Generates, compiles, packages and deploys."


    />


    **Eclipse Integration**


    In Chapter 2 we learned how to get the Eclipse IDE installed and configured. Now
    that we have an Ant buildfile it will be ideal if we can achieve harmony between
    the command line and the IDE. Luckily for us, Eclipse ships with powerful Ant
    integration. Eclipse provides a great Ant XML editor with syntax highlighting,
    code completion, flyover evaluation of Ant elements, as well as immediate visual
    feedback about the validity of your buildfile.


    For the TechConf application to work seamlessly, you can create an Ant Builder,
    which is a facility provided by Eclipse''s external tools framework for Ant integration.
    An Ant Builder can be configured to run at specific times. For example, in my
    environment I configured the Ant build to run when a manual build is invoked or
    when the project “Clean” option is selected.


