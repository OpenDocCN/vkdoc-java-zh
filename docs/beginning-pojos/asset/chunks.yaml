- fmt: "表达式`ognl:time`告诉Tapestry将分号后的内容作为OGNL表达式进行求值。OGNL代表对象图导航语言（Object-Graph Navigational\
    \ Language），是一种用于获取和设置Java对象属性的表达式语言。在页面文件中，我们在`page-specification`元素下将`class`属性定义为`com.integrallis.time.Home`。这会导致表达式求值时调用`com.integrallis.time.Home`的`getTime`方法，以获取要显示的值。在将网页返回给浏览器之前，Tapestry会将清单7-1中所示的组件HTML代码转换为类似于清单7-6中所示的标记。\n\
    \n**清单7-6.** *Tapestry发送给Web浏览器的HTML*\n\n```html\n<html>\n<body>\n<h1>Tapestry\
    \ Time</h1>\nThe current time is Wed Dec 14 08:44:22 EST 2005!\n</body>\n</html>\n\
    ```\n\n图7-6展示了在这个简单示例的上下文中，Tapestry中不同组件之间的交互。\n\n**图7-6.** *全景图*\n\n**组件的威力**\n\
    \n拥有一个可靠的组件库的好处在于，对应用程序用户界面和用户体验的大部分更改只需要对组件的配置进行简单修改，而无需花费数小时的Java编码。这就是用组件构建的美妙之处。它们是一些功能性的小黑盒，你可以将它们组合在一起创建应用程序。\n\
    \n到目前为止，在我们的示例中，我们使用了最简单的Tapestry组件之一——`Insert`组件。Tapestry提供了一个在线组件参考，位于`http://jakarta.apache.org/tapestry/tapestry/ComponentReference`。如果我们查阅`Insert`组件，会发现它提供的功能不仅仅是输出文本。\n\
