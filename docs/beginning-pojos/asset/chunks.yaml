    <property name="conferenceService"><ref bean="conferenceService"/></property>


    </bean>


    **创建 JSP 视图**


    配置好控制器后，我们可以将注意力转向视图。`ModelAndView` 构造函数调用的第一个参数是视图的名称，该名称将由框架的视图解析器解析。或者，`ModelAndView`
    也可以通过引用视图对象来构造。`conferenceList` 视图由清单 6-29 中所示的 `conferenceList.jsp` 页面表示。所有 JSP
    页面都存储在 Web 应用程序 `WEB-INF` 目录下名为 `jsp` 的目录中。


    **清单 6-29.** *JSP 视图 conferenceList.jsp*


