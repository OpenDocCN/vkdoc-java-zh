    C H A P T E R 9 ■ C O N T I N U O U S I N T E G R A T I O N


    As you can see, the Lucene project provides targets for compiling and for testing
    the application. Test the build manually by typing ant test. If the build works
    correctly from the command line, it should also work when invoked by the CruiseControl
    build loop.


    Next we will create a small Ant build script that CruiseControl will use. This
    delegating build script shown in Listing 9-1 will invoke the Lucene project’s
    build after it obtains the latest copy of the code base from the CVS repository.
    Notice that the basedir property is set to the directory of the project we are
    trying to build. Name this buildfile build-jakarta-lucene and place it in the
    cc-work-dir directory. In this example buildfile, I’ve chosen to update only the
    existing code base from CVS rather than deleting the jakarta-lucene directory
    and checking out the project from scratch. Many experts recommend that you do
    so, since otherwise you are depending on the build having the ability to reset
    or clean any artifacts of a previous build run. See Chapter 3


    regarding the importance of a good Ant clean target.


    **Listing 9-1.** *Delegate Buildfile for CruiseControl Automation*


    <project name="cc-lucene-build" default="test" basedir="checkout/jakarta-lucene">


    <target name="cvs">


    <cvs command="up –d –P"/>


    <ant antfile="build.xml" target="clean" />


    </target>


    <target name="test" depends="cvs">


    <ant antfile="build.xml" target="test" />


    </target>


    </project>


    You can test the script by changing directories to the cc-work-dir and typing
    ant -f build-jakarta-lucene


    With the delegate build script in place, we can proceed to enhance the empty XML
    configuration we previously created. CruiseControl uses the XML configuration
    to determine what projects to build and what reporting and alerting features to
    enable for any given project.


    The configuration file is named config.xml by default, although you can use any
    other name and use the configfile command-line argument when running the CruiseControl
    script (cruisecontrol.sh or cruisecontrol.bat). The config XML file is shown in
    Listing 9-2 and its format is formally documented at http://cruisecontrol.sourceforge.net/main/configxml.html.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


