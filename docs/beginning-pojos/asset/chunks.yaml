    ## Introduction


    **J**ava’s history is a thorny and convoluted one. From its origins at Sun, better
    known for its hardware than its software, Java was born as a stealth project targeting
    consumer devices. Along came the Web, and Java provided the only way to do anything
    remotely close to rich animation.


    Applets running on the HotJava Browser showcasing a dancing Duke was my “oh, now
    that’s cool” moment of 1995. So we set out to write enormously large applets that
    were slow to run and then the browser wars began and you could only guess whether
    it was going to run or your user would see a big gray box on their browsers. Today
    applets still have their niche, mostly in the least-expected places, like the
    computer in an oil lube bay or a conveyor-controlling application in a distribution
    center.


    But Java was still the new kid on the block. In the late ’90s, Web applications
    were being built on the CGI platform and a trove of scripting languages. At that
    point Java came into its own with the servlet API and what was viewed as the golden
    hammer of its time, the EJB specification. At that point I was already tainted
    by the complexity of the Distributed Component Object Model (DCOM) and Common
    Object Request Broker Architecture (CORBA), so to para-phrase Bruce Tate, I ate
    the elephant and it was good! Well, guess what? By the time we entered the 21st
    century the elephant already was the animal of choice in large corporate IT departments,
    it started to face fierce competition in the wild. It had to run on Pearls, fight
    Pythons and lately tried to avoid the red light at the end of the tunnel (is that
    a Ruby on Rails?).


    Fortunately for us the elephant went on a diet by staying away from the Sun ;-).
    Today we can build Java applications with a similar level of agility as that showcased
    by the scripting language camps. POJOs are not a new technology or technique but
    are a “going back to the basis” philosophy in which we concentrate more on the
    business functionality and less on the plumbing required to build robust applications.
    This movement to simplify and rethink our development practices has been driven
    primarily by the open source community, which has produced a variety of agile,
    lightweight frameworks. Without open source, Java would be the beast that you
    use only at work because your boss tells you it’s your only choice. In this book
    you’ll learn about the lightweight frameworks and tools that I use in my day-to-day
    work and that I only not need but enjoy using.


    ### Who This Book Is For


    This book targets beginning to intermediate Java developers looking to build enterprise
    Web applications with the latest offerings from the open source Java community.
    In this book you’ll explore different approaches to building a Java Web application
    using a step-by-step approach.


