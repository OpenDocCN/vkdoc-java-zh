    \ of Hibernate in the view of a Web application via Spring-Hibernate DAOs, Spring\
    \ provides a solution to the possible problem of accessing a persistent object\
    \ that has only been partially loaded—the dreaded lazy loading and closed session\
    \ exceptions that can baffle developers new to Hibernate and Spring. This is not\
    \ a concern for the TechConf application since we are using completely detached\
    \ DTOs between the Web and service tiers. For those choosing to expose domain\
    \ objects with lazy loading of associations in the view, Spring provides an implementation\
    \ of the \"Open Session In View\" strategy proposed by the Hibernate Team which\
    \ basically enables a session to be opened to retrieved associated objects lazily.\
    \ This strategy is based on servlet filters and AOP interception. Spring provides\
    \ a servlet filter in the class `OpenSessionInViewFilter`, which is of course\
    \ configured in the Web deployment descriptor and the `OpenSessionInViewInterceptor`,\
    \ which can be configured from within a Spring application context. Both serve\
    \ the same function, as they open a Hibernate Session during the request, binding\
    \ the Session to the current thread.\n\nWith the DAO layer completed, now we can\
    \ move to wire the rest of the collaborators required by the TechConf services.\
