- fmt: 'In such cases I sometimes like to think of the resulting model as more of
    a data-access model which will in turn be used by a richer domain model. Of course
    the issues of where the persistence interaction lies in your code become a hotly
    debated topic. Do you have your real domain objects peppered with persistence
    code in order to manipulate the data-driven table wrappers generated? Or do you
    take the more behavior/data separation model that most J2EE applications follow,
    where use cases are mapped to say a stateless session bean method which in terms
    manipulates the data mapper objects generated? Figure 4-6 illustrates the data
    model–driven approach.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 97 Wednesday, February 22, 2006 2:16 PM


    **CHAPTER 4 ■ OBJECT RELATIONAL MAPPING WITH HIBERNATE**


    **97**


    **Figure 4-6.** *Data model–driven approach*


    ## HBM-Driven Approach


    The two previous approaches, taking either a domain-model or data-model approach,
    typically result in HBM mappings that are not quite complete. Every time I use
    either of the approaches above in a moderately complex application, I find myself
    fine-tuning the HBM files to either get more accurate POJOs (in the data-driven
    approach) or more efficient, manageable database schema (in the POJO-driven approach).
    The third approach suggested here takes the stand that object-relational mapping
    is an inescapable, necessary evil that should be taken into consideration early
    and in a head-first fashion in the development of your application. By creating
    detailed, accurate HBM files you will end up with both a domain model and a database
    schema that meets your application needs and ensures the longevity of the data.
    This is by far the most tedious approach to map your domain model to a database,
    basically because it is a mostly manual process. Of course, based on the complexity
    of your object model and schema, you might be able to combine the different approaches
    outlined to maximize your productivity, therefore using one of the two automated
    approaches for most of your domain object mappings and resorting to manually created
    mappings for a few exceptional cases. Figure 4-7 illustrates the HBM-driven approach.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 98 Wednesday, February 22, 2006 2:16 PM


    **98**


    **CHAPTER 4 ■ OBJECT RELATIONAL MAPPING WITH HIBERNATE**


    **Figure 4-7.** *HBM-driven approach*


    ## The Tools


    There is a great variety of tools for Hibernate, both open source and commercial,
    that support the different approaches previously outlined. Figure 4-8 shows the
    available open source offerings and how they apply to the different development
    approaches.


    Also, as with most Java development tools, some tools are command line–driven,
    some are IDE-specific and some support both environments. Some IDE-centric tools
    are one-time-shot type of tools that will generate skeleton code and configurations
    for you to get started, while others are meant to be part of a repeatable build
    process.


    **Figure 4-8.** *Map of Hibernate-related tools*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 99 Wednesday, February 22, 2006 2:16 PM


    **99**


    **CHAPTER 4 ■ OBJECT RELATIONAL MAPPING WITH HIBERNATE**


    ## Road Map


    For the persistence needs of the TechConf application, we will use the HBM-driven
    method and work on developing a detailed set of HBM files, a domain model, and
    a database schema.


    After configuring Hibernate to work with the local TechConf instance of MySQL,
    we will work on implementing some of the use cases of the TechConf system which
    will show the steps in creating Hibernate mappings and in generating POJO classes
    and a database schema as shown in Figure 4-9.


    The order in which the use cases are implemented is based on the level of difficulty
    involved in creating the mappings and the different ORM concepts covered.


    **Figure 4-9.** *Road map for the Hibernate-related development of the TechConf
    application*


    ## Hibernate in J2SE


    One of the advantages of a POJO-centric ORM tool like Hibernate is that it really
    helps you separate concerns, when it comes to development, by enabling you to
    work in the world of POJOs without worrying too much about the complexities introduced
    by the future needs of your application (such as distribution, clustering, and
    tier partitioning). As you will soon see with Hibernate, we can concentrate on
    developing a solid POJO domain model and design and test the persistence needs
    of the model before we plunge into the details of making a J2EE application.


