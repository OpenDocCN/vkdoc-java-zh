- fmt: "# TestNG\n\nJUnit is a great framework that completely changed the way we\
    \ approached testing, but like all pioneering technologies, it is not without\
    \ its flaws. TestNG is a new framework created by Cedric Beust to address some\
    \ of the shortcomings of JUnit and to take advantage of the new features and trends\
    \ in Java development.\n\nTestNG uses JSE 5.0 annotations or Javadoc comments\
    \ to enable simple POJOs to act as a testing class, as opposed to JUnit’s more\
    \ traditional approach of using inheritance and abstract classes. TestNG supports\
    \ data-driven testing, acknowledging the fact that a large percentage of tests\
    \ performed functional and integration tests while only a small percentage are\
    \ pure unit tests. TestNG also provides an XML-based runtime configuration which,\
    \ mixed with the ability to classify tests using groups, provides a powerful execution\
    \ model which eliminates the need to use constructs like JUnit’s `TestSuite`.\n\
    \nTestNG is hosted at [www.testng.org](http://www.testng.org) and is distributed\
    \ as a single ZIP file. At the time of this writing, version 4.3 is available\
    \ (`testng-4.3.zip`). At the root of the archive you’ll find JAR files for JDK\
    \ 1.4 and JDK 1.5. For the TechConf application and the purposes of this chapter,\
    \ we will use the JDK 1.5 version (`testng-4.3-jdk15.jar`). This JAR needs to\
    \ be in your classpath for the exercises in this chapter to work.\n\nLet’s start\
    \ first with a simple class to test the `Greeter` class previously created. In\
    \ TestNG any simple Java class can become a test class by using metadata annotations.\
    \ Listing 8-4 shows the TestNG version of the `GreeterTest` class.\n\n**Listing\
    \ 8-4.** *TestNG Annotated POJO*\n\n```\nimport org.testng.Assert;\nimport org.testng.annotations.Configuration;\n\
    import org.testng.annotations.Test;\n\npublic class GreeterTest {\n\n    private\
    \ Greeter greeter;\n\n    @Configuration(beforeTestClass = true)\n    private\
    \ void init() {\n        greeter = new Greeter();\n    }\n\n    @Test\n    public\
    \ void testGreet() {\n        assert \"Hello World\".equals(greeter.greet());\n\
    \    }\n\n    @Test\n    public void testGreetString() {\n        String name\
    \ = \"Michael\";\n        Assert.assertEquals(\"Hello \" + name, greeter.greet(name));\n\
    \    }\n}\n```\n\nThe first thing to notice is that our test class doesn’t have\
    \ to extend any base class or implement any interfaces. The two test methods are\
    \ annotated with the `org.testng.annotations.Test`, and instead of having the\
    \ `Greeter` class instantiate in each method we now have a private instance which\
    \ is initialized in the `init` method. The `init` method is annotated with the\
    \ `org.testng.annotations.Configuration` annotation, which enables us to control\
    \ what happens before and after a test method, class, test, or suite. In the case\
    \ of the `init` method we are instructing TestNG to execute that method once before\
    \ it executes the test methods. This is in contrast to JUnit’s behavior in which\
    \ the class is instantiated for each execution of a test method, therefore making\
    \ it hard to keep any state between method invocations. Equally inconvenient is\
    \ the behavior of JUnit setup and teardown methods which are invoked before and\
    \ after each test method.\n\nIn the `testGreet` method we use the Java `assert`\
    \ keyword while in the `testGreetString` we use one of the assertion static methods\
    \ provided in the `org.testng.Assert` class. To execute the test on the command\
    \ line, you’ll need to specify the location of your compiled test classes and\
    \ the TestNG library as shown next (in the following case the compiled classes\
    \ are in the `bin` directory and the TestNG library is located in `lib/testng`\
    \ directory):\n\n```\njava –ea -cp bin;lib/testng/testng-4.3-jdk15.jar org.testng.TestNG\
    \ -testclass GreeterTest\n```\n\nAlso notice that we have enabled assertions by\
    \ using the `–ea` flag. The output should resemble:\n\n```\n===============================================\n\
    ```"
