    **Properties**


    Ant provides the ability for a project to have a set of properties. Properties
    are simple strings that you can access using the ${propertyName} notation. Whether
    you need to specify the location of a needed library many times or the name of
    a CVS repository, properties give you the flexibility to defer until runtime a
    set of values to be used in the build.


    There are several ways to set a property. You can set it individually to the Ant
    buildfile via the D command-line option (see Table 3-1), or in bulk, from standard
    Java properties files by using the propertyfile option.


    There are also several tasks that deal with properties. The property task enables
    the setting of a property by name. All property tasks are idempotent, which means
    that once a property’s value has been set it will remain unchanged for the remainder
    of the build. The immutability of properties in Ant is often a source of confusion,
    because as developers you’re often used to thinking with the use of variables.


    ■**Note** The <ant> and <antcall> tasks both span a new build by calling another
    buildfile. The <ant> task calls an external buildfile, and the <antcall> tasks
    calls a target on the current buildfile. Since version 1.6, Ant provides the <macro-def>,
    <import>, and <subant> tasks, which eliminate the need for using <ant> in most
    cases.


