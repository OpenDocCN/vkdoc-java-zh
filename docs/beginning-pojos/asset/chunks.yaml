    Tapestry


    **J**ava 领域的多样性，在 Web 开发框架领域体现得最为淋漓尽致。互联网作为应用平台的兴起，加上 HTTP 协议的无状态特性，催生了 Servlet
    API，使其成为将 Java 引入 Web 的主力 API。


    Servlet API 帮助规范了 Java 中 HTTP 的使用，并提供了一些简单的结构来处理动态应用程序所需的状态维护需求。


    Servlet 为 Java 在 Web 上的应用提供了最初的途径。我们构建了许多纯 Servlet 的 Web 应用程序，但很快发现，对于任何超过几个页面且具有中等至复杂用户界面需求的应用程序来说，Servlet
    并没有提供足够高的抽象层次，无法在业务逻辑、表示逻辑和由 HTML 组成的实际视图之间实现关注点分离。


    在 Servlet 开发中，开发人员经常从 Web 设计师那里收到模拟的 HTML 页面。从那时起，开发人员必须提取 HTML 并将其放入 Servlet
    代码中，使用 println 语句并转义常见的 HTML 字符（如双引号）。Servlet 的开发时间也极其缓慢，因为代码更改无法在不完全重新编译和重新部署的情况下快速测试。


    Servlet API 的缺点以及早期一些商业和开源 Web 框架的启发，促成了 JavaServer Pages（JSP）的诞生。这是一个决定性的改进，尤其是在生产力方面。JSP
    改变了 Java Web 应用程序的开发方式。其隐喻从在 Java 中嵌入 HTML 标记，转变为在 HTML 中嵌入 Java 代码。生产力提高了，因为不再需要手动重新编译和重新部署，JSP
    在修改后会按需动态编译成 Servlet。最初，JSP 似乎解决了 Servlet 开发的许多问题，允许 Web 设计师在开发过程中持续修改 HTML。不幸的是，好事多磨，基于
    JSP 的应用程序，由于能够通过脚本小程序在 HTML 中嵌入 Java 代码，导致了不良的 Web 开发实践，例如将繁重的业务逻辑放在表示层。此外，JSP
    没有提供任何良好的机制来重用脚本小程序中的代码，这导致了代码重复以及复制粘贴式重用带来的所有麻烦。这就是大多数人所说的 JSP Model 1，其中 JSP
    页面既充当控制器或调度器，又通过用于与后端技术（如 EJB）通信的 Bean 来访问模型。Model 1 将视图和调度器耦合在一起，实际上创建了许多控制器。这种方法的缺点在大型应用程序中变得明显，因为控制器代码过度膨胀，使得原本接近
    HTML 的 JSP 看起来更像是被 HTML 包围的纯 Java 代码。**239**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C07.fm 第 240 页 2006 年 2 月 23 日星期四 下午 4:22


    **240**


    第 7 章 ■ TAPESTRY


    这种耦合对 Java 开发人员和 HTML 设计师都造成了问题。


    最终，开发人员意识到，一个久经考验的架构模式——模型-视图-控制器（MVC）——是解决 Web 应用程序扩展和维护问题的方案。


    MVC 模式将数据（模型）与表示（视图）和工作流（控制器）分离开来。在 Model 2 架构中，JSP 和 Servlet 结合使用，并充分利用了它们各自的优势。Servlet
    用于调度视图并粘合（或许还有转换）来自后端（如数据库或 EJB）的数据。这是 MVC 模式中的控制器部分，为视图生成技术（JSP 页面）提供应用程序流程、服务以及资源发现和分配。

