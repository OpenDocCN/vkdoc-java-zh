- fmt: "Finally, to insert the content of the individual page we use the `RenderBody`\
    \ component, which renders the body of any component or page used. The `RenderBody`\
    \ component is typically used for the type of templating that we are looking to\
    \ provide with the `ConferenceBorder` component. You should have exactly one `RenderBody`\
    \ component in your component template.\n\n## The Component Specification\n\n\
    Similar to the page specification XML file (`.page`) used with pages, every component\
    \ has a component specification XML file (`.jwc`). The component specification\
    \ defines the Java class for the component, the parameter that the components\
    \ takes, and any other collaborators used by the component such as other components,\
    \ state holding objects, or HiveMind services.\n\nFigure 7-18 shows the structure\
    \ of the component specification XML file.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00108.png)\n\n**Figure 7-18.** *DTD definition for the component-specification\
    \ element*\n\nListing 7-19 shows the component specification for the `ConferenceBorder`\
    \ component. In the `component-specification` element the component is linked\
    \ to the Java code using the `class` attribute, which in this case points to the\
    \ class `ConferenceBorder` in the package `com.integrallis.techconf.web.tapestry.pages`.\
    \ The `allow-body` attribute tells Tapestry that this component will render the\
    \ contents of its body. Many components in Tapestry replace the contents of the\
    \ body at rendering time. That’s why in some templates we can simply add sample\
    \ content to the body of an element for previewing purposes, while in others we\
    \ use `$remove$` directive to explicitly tell Tapestry to remove the sample content.\n\
    \nThe `parameter` element is used to define parameters for your component. Similarly\
    \ you can prevent users of your component from passing a specific informal parameter\
    \ by using the `reserved-parameter` element.\n\n**Listing 7-19.** *ConferenceBorder\
    \ Component Specification (.jwc)*\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n\n<!DOCTYPE component-specification\n  PUBLIC \"-//Apache Software Foundation//Tapestry\
    \ Specification 4.0//EN\"\n  \"http://jakarta.apache.org/tapestry/dtd/Tapestry_4_0.dtd\"\
    >\n\n<component-specification\n  class=\"com.integrallis.techconf.web.tapestry.pages.ConferenceBorder\"\
    \n  allow-body=\"yes\"\n  allow-informal-parameters=\"no\"\n>\n  <inject property=\"\
    webRequest\" object=\"infrastructure:request\"/>\n  <inject property=\"userService\"\
    \n    object=\"service:app.UserService\"/>\n\n  <inject property=\"userInformation\"\
    \ type=\"state\" object=\"logged-in-user-data\"/>\n\n  <parameter name=\"title\"\
    \ required=\"yes\"/>\n\n  <property name=\"baseURL\" initial-value=\"webRequest.contextPath\"\
    \ />\n  <property name=\"dateStartFormater\"\n    initial-value=\"new java.text.SimpleDateFormat('EEE,\
    \ d MMM')\"/>\n  <property name=\"dateEndFormater\"\n    initial-value=\"new java.text.SimpleDateFormat('EEE,\
    \ d MMM yyyy')\"/>\n\n  <component id=\"conferenceTitle\" type=\"Insert\">\n \
    \   <binding name=\"value\"\n      value=\"ognl:userInformation.conferenceSummary.conferenceTitle\"\
    />\n  </component>\n\n  <component id=\"startDate\" type=\"Insert\">\n    <binding\
    \ name=\"value\"\n      value=\"ognl:userInformation.conferenceSummary.startDate\"\
    />\n    <binding name=\"format\" value=\"ognl:dateStartFormater\"/>\n  </component>\n\
    \n  <component id=\"endDate\" type=\"Insert\">\n    <binding name=\"value\"\n\
    \      value=\"ognl:userInformation.conferenceSummary.endDate\"/>\n    <binding\
    \ name=\"format\" value=\"ognl:dateEndFormater\"/>\n  </component>\n\n  <component\
    \ id=\"venueName\" type=\"Insert\">\n    <binding name=\"value\"\n      value=\"\
    ognl:userInformation.conferenceSummary.venueName\"/>\n  </component>\n\n  <component\
    \ id=\"venueAddressLine1\" type=\"Insert\">\n    <binding name=\"value\"\n   \
    \   value=\"ognl:userInformation.conferenceSummary.venueAddressLine1\"/>\n  </component>\n\
    \n  <component id=\"venueAddressLine2\" type=\"Insert\">\n    <binding name=\"\
    value\"\n      value=\"ognl:userInformation.conferenceSummary.venueAddressLine2\"\
    />\n  </component>\n\n  ...\n</component-specification>\n```\n\nIn the component\
    \ specification file we also inject the EJB3 service `UserService` as we learned\
    \ previously. The `UserService` will be used to handle the login, logout, and\
    \ registration functions.\n\n## Formatting Output\n\nIn the component specification\
    \ we bind and format a lot of the values contained in the DTO `ConferenceSummary`\
    \ to `Insert` components. An example of Tapestry’s formatting capabilities is\
    \ the formatting of the conference start and end dates which will be displayed\
    \ below the conference title. Listing 7-20 shows how a formatter object is defined\
    \ as a property and then applied as a formatter to the contents of an `Insert`\
    \ component.\n\n**Listing 7-20.** *Formatting the Contents of an Insert Component*\n\
    \n```\n<property name=\"dateEndFormater\"\n  initial-value=\"new java.text.SimpleDateFormat('EEE,\
    \ d MMM yyyy')\"/>\n\n<component id=\"endDate\" type=\"Insert\">\n  <binding name=\"\
    value\"\n    value=\"ognl:userInformation.conferenceSummary.endDate\"/>\n  <binding\
    \ name=\"format\" value=\"ognl:dateEndFormater\"/>\n</component>\n```\n\nAside\
    \ from the component-specific features, the component specification file can handle\
    \ assets, services, and object injection just as we learned earlier with the page\
    \ specification.\n\n## Managing State\n\nThe `ConferenceBorder` is also responsible\
    \ for login and logout functionality. To handle keeping the state of the logged\
    \ in user we declare a state object contribution in the HiveMind configuration.\n\
    \nThe state object is a simple POJO that can be reference by the id `logged-in-user-data`\
    \ and is mapped to the Java class `LoggedInUser` located in the package `com.integrallis.techconf.web.tapestry.domain`.\
    \ This object is scoped to the session, which is exactly what the lifetime of\
    \ a user login should be. This contribution has a `configuration-id` of `tapestry.state.ApplicationObjects`.\
    \ The term “contribution” here implies that HiveMind is making a contribution\
    \ to the Tapestry-specific configuration, in this case the Tapestry application\
    \ objects, as shown in Listing 7-21.\n\n**Listing 7-21.** *Configuring an Application\
    \ State Object Using HiveMind*\n\n```\n<?xml version=\"1.0\"?>\n<module id=\"\
    app\" version=\"1.0.0\" package=\"com.integrallis.techconf\">\n  ...\n  <contribution\
    \ configuration-id=\"tapestry.state.ApplicationObjects\">\n    <state-object name=\"\
    logged-in-user-data\" scope=\"session\">\n      <create-instance\n        class=\"\
    com.integrallis.techconf.web.tapestry.domain.LoggedInUser\"\n      />\n    </state-object>\n\
    \    ...\n  </contribution>\n  ...\n</module>\n```\n\nListing 7-22 shows the `LoggedInUser`\
    \ POJO, which is a simple wrapper to hold both the `UserSummary` and the `ConferenceSummary`\
    \ DTOs.\n\n**Listing 7-22.** *Simple LoggedInUser Application State POJO*\n\n\
    ```\npublic class LoggedInUser implements Serializable {\n  private UserSummary\
    \ userSummary;\n  private ConferenceSummary conferenceSummary;\n\n  public ConferenceSummary\
    \ getConferenceSummary() {\n    return conferenceSummary;\n  }\n\n  public void\
    \ setConferenceSummary(ConferenceSummary conferenceSummary) {\n    this.conferenceSummary\
    \ = conferenceSummary;\n  }\n\n  public UserSummary getUserSummary() {\n    return\
    \ userSummary;\n  }\n\n  public void setUserSummary(UserSummary userSummary) {\n\
    \    this.userSummary = userSummary;\n  }\n}\n```"
