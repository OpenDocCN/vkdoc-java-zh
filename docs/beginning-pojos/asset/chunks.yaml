    Sam-Bodden_596-3 C03.fm Page 50 Wednesday, February 22, 2006 6:05 AM


    **50**


    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    Ant’s architecture is similar to the make utility in that it’s based on the concept
    of a target.


    In Ant a target is a modular unit of execution that uses tasks to accomplish its
    work. An Ant target has dependencies and can be conditionally executed. A build
    is usually composed of some main targets that will accomplish some coarse-grained
    process related to an application’s build, such as compiling the code or packaging
    a component. These main targets might make use of other subtargets (usually via
    dependencies) to accomplish their job.'
