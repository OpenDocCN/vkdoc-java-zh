    **Figure 7-4.** *DTD definition for the page-specification element* The Home.page
    file specifies that:


    • This is the page specification for a Home page as deduced by the name of the
    file Home.page, the associated Home.html template, and the class com.integrallis.


    time.Home as defined in the class attribute of the page-specification element.


    • It defines one component with an id of “time” which is of type Insert.


    • The component time binds the value of the expression ognl:time to the value
