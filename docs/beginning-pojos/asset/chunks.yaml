    dependencies available to the Tapestry applications. There are two ways to accomplish
    this. If you are running multiple Tapestry applications in the same Web container,
    you can place the JARs in a shared location that your Web container will make
    available to all deployed applications. In Tomcat 5.X, for example, this shared
    location is $TOMCAT_HOME/shared/lib.


