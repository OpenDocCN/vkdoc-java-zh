    选择之前概述的策略之一，取决于你要持久化的继承图的复杂性、每个类的复杂性、这些类在应用程序中的使用方式，以及数据是否会在应用程序外部被使用。


    如果你不需要多态查询，最简单的方法是采用“每个具体类一张表”策略。如果你需要多态查询，且子类主要在行为上而非数据上有所差异，请使用“每个类层次一张表”策略。另一方面，如果你的类主要在数据上有所差异，那么“每个子类一张表”策略可能是一个可行的选择。


    在大多数情况下，我使用“每个类层次一张表”策略，因为它在复杂性和性能之间提供了最佳平衡。当然，这些选择都意味着你对数据库模式有控制权，并且你是在自上而下的方式下工作。


