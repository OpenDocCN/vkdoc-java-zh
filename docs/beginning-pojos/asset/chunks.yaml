- fmt: '# The Hibernate Session


    The `Session` embodies the concept of a persistence service (or persistence manager)
    that can be used to query and perform insert, update, and delete operations on
    instances of a class mapped by Hibernate. In an ORM tool you perform all of these
    interactions using object-oriented semantics; that is, you no longer are referring
    to tables and columns, but you use Java classes and object properties. As its
    name implies, the `Session` is a short-lived, lightweight object used as a bridge
    during a conversation between the application and the database. The `Session`
    wraps the underlying JDBC connection or J2EE data source, and it serves as a first-level
    cache for persistent objects bound to it.


    ## The Session Factory


    Hibernate requires that you provide it with the information required to connect
    to each database being used by an application as well as which classes are mapped
    to a given database.


    Each one of these database-specific configuration files, along with the associated
    class mappings, are compiled and cached by the `SessionFactory`, which is used
    to retrieve Hibernate `Session`s.


    The `SessionFactory` is a heavyweight object that should ideally be created only
    once (since it is an expensive and slow operation) and made available to the application
    code that needs to perform persistence operations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00026.png)


    Sam-Bodden_596-3 C04.fm Page 93 Wednesday, February 22, 2006 2:16 PM


    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    **93**


    Each `SessionFactory` is configured to work with a certain database platform by
    using one of the provided Hibernate dialects. If you are prototyping an application
    you’ll likely start with a database system you can easily install and run on your
    own machine. In my case this is usually MySQL, PostgreSQL or one of the flavors
    of pure embedded open source Java databases like HSQLDB. Most of us eventually
    have to migrate our schemas to an “enterprise” RDBMS such as Oracle, Sybase, or
    DB2. With its pluggable database architecture, Hibernate can make porting your
    application from database to database as simple as changing a few parameters in
    an XML file. The choice of Hibernate dialect is important when it comes to using
    database-specific features like native primary key generation schemes or Session
    locking. At the time of this writing Hibernate (version 3.1) supports 22 database
    dialects. Each of the dialect implementations are in the package `org.hibernate.dialect`.
    Figure 4-3 shows the available dialects.


    **Figure 4-3.** *Hibernate dialects*


    ## The Hibernate Object Mappings


    Hibernate specifies how each object state is retrieved and stored in the database
    via an XML configuration file. Hibernate mappings are loaded at startup and are
    cached in the `SessionFactory`.


    Each mapping specifies a variety of parameters related to the persistence lifecycle
    of instances of the mapped class such as:


    - Primary key mapping and generation scheme

    - Object-field-to-table-column mappings

    - Associations/Collections

    - Caching settings

    - Custom SQL, store procedure calls, filters, parameterized queries, and more


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 94 Wednesday, February 22, 2006 2:16 PM


    **94**


    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    ## Persistence Lifecycle


    The last piece of information that I wish I had obtained earlier in my work with
    Hibernate is an understanding of the Lifecycle of an object as it pertains to
    Hibernate. There are three possible states for a Hibernate mapped object. Understanding
    these states and the actions that cause state transitions will become very important
    when dealing with the more complex Hibernate problems. Figure 4-4 shows how different
    methods provided by the Hibernate `Session` transition a mapped object from state
    to state.


    **Figure 4-4.** *Persistence Lifecycle*


    In the transient state, the object is not associated with a database table. That
    is, its state has not been saved to a table, and the object has no associated
    database identity (no primary key has been assigned). Objects in the transient
    state are non-transactional, meaning that they do not participate in the scope
    of any transaction bound to a Hibernate `Session`. After a successful invocation
    of the `save` or `saveOrUpdate` methods an object ceases to be transient and becomes
    persistent. The `Session` `delete` method (or a delete query) produces the inverse
    effect making a persistent object transient.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 95 Wednesday, February 22, 2006 2:16 PM


    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    **95**


    Persistent objects are objects with database identity. (If they have been assigned
    a primary key but have not yet been saved to the database, they are referred to
    as being in the “new” state). Persistent objects are transactional, which means
    that they participate in transactions associated with the `Session` (at the end
    of the transaction the object state will be synchronized with the database).


    A persistent object that is no longer in the `Session` cache (associated with
    the `Session`) becomes a detached object. This happens after a transaction completes,
    when the `Session` is closed, cleared, or if the object is explicitly evicted
    from the `Session` cache. Given Hibernate transparency when it comes to providing
    persistent services to an object, objects in the detached state can effectively
    become intertier transfer objects and in certain application architectures can
    replace the need to have DTOs (Data Transfer Objects). For a complete discussion
    of this pattern refer to Chapter 5.


    ## The Process


    So, how do you get started with Hibernate? Besides the obvious need to obtain
    and configure Hibernate to work with your environment, you need to create the
    mappings for each one of the classes that will be stored in the database. Aside
    from manually creating the POJOs, database schema, and HBM (HiBernate Mapping)
    files, there are three approaches to creating a complete ORM domain model.


    ### POJO-Driven Approach


    In the POJO-driven approach you start with an object/domain model, and using JSR-220
    annotation or Javadoc metadata comments, you define how each field in a class
    maps to a database column. At runtime, Hibernate uses the annotations to dynamically
    create the mappings. Then using Hibernate’s `hbm2dll` automatic feature, you can
    generate the database schema at runtime. In the case of pre-JSE1.5 applications
    you will use a code/metadata generator such as XDoclet to generate the HBM files
    and subsequently feed the HBM files to a tool such as Hibernate’s own `hbm2ddl`
    and generate a schema for the relational database of your liking. This approach
    works very well for new applications for which a data model has not yet been designed
    or created.


    Figure 4-5 illustrates the POJO-driven approach.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 96 Wednesday, February 22, 2006 2:16 PM


    **96**


    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    **Figure 4-5.** *POJO-driven approach*


    ### Data Model–Driven Approach


    In the model-driven approach you start with a database schema for the chosen database
    system, and using a tool like Middlegen or Hibernate Synchronizer, you generate
    mappings and POJOs for each table being mapped. This approach provides a fast
    start-up time for development but can potentially leave you with what Martin Fowler
    refers to as an anemic domain model with very little of the rich semantic that
    you would expect to find in a domain model.'
