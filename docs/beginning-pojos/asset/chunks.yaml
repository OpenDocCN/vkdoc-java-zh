    ## Using Eclipse


    Once you close the Welcome view, you’ll be presented with the Workbench showing
    the default Java perspective as shown in Figure 2-3. The Workbench is the top-level
    component of Eclipse; it is the main window and shows one perspective at a time.
    A perspective is a window divided into several sections used for viewing and editing
    a resource in your workspace.


    The Eclipse Java perspective is where we will spend most of your time as a Java
    developer.


    Eclipse provides several built-in perspectives tailored for Java development,
    debugging, version control with CVS, resource management and plug-in development
    among others. Based on certain operations (like running a Java class in debug
    mode) Eclipse will automatically switch perspectives for you. You can also switch
    perspectives by selecting Window ➤ Open Perspective and selecting a perspective.
    As you can see from Figure 2-3, a perspective is composed of one or more views
    and an editor pane. In Figure 2-3 we have the Package Explorer view on the left
    side, which gives you a Java Package-centric view of your projects; to the right
    we have the empty editor pane, and on the far right there’s the Outline view.
    On the lower half of the right side, the Problems view is displayed.


