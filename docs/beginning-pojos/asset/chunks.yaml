    C H A P T E R 3 ■ B U I L D I N G W I T H A N T


    The simplest way to set a property’s value is to use the property task. For example,
    to set a property named src, which could be later accessed using ${src}, you would
    use the property task as follows:


    <property name="src" location="src" /> The src property would be an absolute path
    that refers to the location of the src directory relative to the basedir directory.


    ■**Best Practice** Properties should be used with care. The two main uses of properties
    are for items whose value might change from build to build or for items whose
    value is calculated and used more than once during the build.


    Many Ant properties are also available implicitly and are composed from the system
    properties, such as ${java.version}.


    For any but the simplest project you can load a property file using the file attribute
    of the property task, thereby taking into account differences in user configurations,
    as follows:


    <property file="build.properties"/>


    Other tasks that deal directly with properties include the following:


    • **LoadProperties:** Loads the contents of a file as properties (equivalent to
    using the file attribute for the property task).


    • **LoadFile:** Load a text file into a single property.


    • **XMLProperty:** Loads properties from an XML file. See the Ant documentation
    for the specific format of the XML file.


    • **EchoProperties:** Displays all available properties in the project.


    Many other tasks use properties as a way to take parameters in or out. For example,
    a common practice is for a task to have an attribute that takes the name of an
    inexistent property to be set in case of a specific event such as the possibility
    of the task failing.


    ■**Best Practice** I recommend using a properties file named build.properties
    to store any overridden default values. This property file shouldn’t be kept in
    the source-code repository but instead should add a sample properties file named
    build.properties.sample along with instructions on how to configure an individual
    build.properties file.


