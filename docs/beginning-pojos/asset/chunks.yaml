    第 1 章 ■ 引言


    **通用应用需求**


    本节概述系统必须满足的通用业务需求。基于通用的软件分发和配置需求，为应用程序选择的主要媒介是互联网，特别是 Web。Web 提供了近乎零分发和配置成本的优势。随着设计过程的推进，将根据实际约束条件进行优化。以下需求按利益相关方进行组织，以便在设计阶段实现功能的分离。


    **参会者**


    参会者是系统的核心关注点，影响他们的功能具有更高优先级。参会者的需求构成了系统大部分功能的基础。


    • **通用信息：** 潜在参会者（公众成员）需要一种简单直观的方式来了解会议的详细信息。应用程序必须易于导航，并且必须能够轻松实现常见网站功能，如新闻和内容的可打印视图。


    • **注册：** 参会者应能够安全地注册会议，并通过电子邮件接收确认。系统应支持个人和团体注册。


    • **会议浏览与选择：** 系统应提供直观且强大的搜索功能，以帮助用户选择要参加的会议。


    • **会议评估：** 演讲者应能够在线查看会议评估结果。


    • **日程安排：** 系统应为用户提供轻松查看和管理日程的能力。日程数据应以针对不同媒介和设备的多种格式提供（例如，Web、个人数字助理


    [PDA]和按需电子邮件）。


    • **通知与提醒：** 系统应为用户提供订阅会议通知服务的能力。这些通知可包括邮件列表、与日程相关的提醒以及与会议相关的新闻。


    • **住宿协助：** 系统应提供一种方式，让参会者能够查找区域地图、场地地图、酒店路线、兴趣点、餐厅及其他信息，以提升他们在会议期间的体验。


    **演讲者**


    妥善协助和服务演讲者将提高会议内容的质量。这反过来又惠及主要利益相关方——参会者。


    • **注册：** 演讲者应能够安全地注册会议，并通过电子邮件接收确认。


    • **个人信息：** 演讲者应能够输入联系信息和传记信息、上传照片，并提供其他感兴趣的信息。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


