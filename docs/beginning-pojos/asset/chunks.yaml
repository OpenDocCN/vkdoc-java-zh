- fmt: "```xml\n<cvs command=\"up -d -P\"/>\n\n</target>\n\n<target name=\"test\"\
    \ depends=\"cvs\">\n\n<ant antfile=\"build.xml\" target=\"all-clean-first\" />\n\
    \n</target>\n\n</project>\n\nIn the CruiseControl `config.xml` file we incorporate\
    \ the project by adding a new `project` element as shown in Listing 9-5.\n\n**Listing\
    \ 9-5.** *Project Element for the TechConf Application*\n\n```xml\n<project name=\"\
    techconf\" buildafterfailed=\"true\">\n  <listeners>\n    <currentbuildstatuslistener\
    \ file=\"logs/techconf/status.txt\"/>\n  </listeners>\n  <modificationset quietperiod=\"\
    25\">\n    <cvs localworkingcopy=\"checkout/techconf\"/>\n  </modificationset>\n\
    \  <schedule interval=\"60\" >\n    <ant\n      antscript=\"/opt/cruisecontrol/apache-ant-1.6.3/bin/ant\"\
    \n      buildfile=\"build-techconf.xml\"\n      target=\"test\"\n      uselogger=\"\
    true\"\n      usedebug=\"false\"\n    />\n  </schedule>\n  <log dir=\"logs/techconf\"\
    >\n    <merge dir=\"checkout/techconf/docs/tests/\" />\n  </log>\n</project>\n\
    ```\n\nThe crucial element for CruiseControl to work with TestNG is to correctly\
    \ specify the location where the TestNG-generated XML files reside, which corresponds\
    \ to the value of the attribute `outputDir` in the TestNG Ant task. In Chapter\
    \ 8 we set that value to the `docs/tests` directory. In the `log` element in Listing\
    \ 9-5 we set the `merge` directory property to the value of the `outputDir` relative\
    \ to the root of the `cc-work-dir`.\n\nSince we own the TechConf project, we can\
    \ purposely introduce an error and check the CruiseControl results. In one of\
    \ the TechConf methods, we can add an assertion that will fail such as `Assert.assertEquals(true,\
    \ false)`. Figure 9-8 shows the result of the build in the CruiseControl Web application.\n\
    \nIn Figure 9-8 we added the failed assertion to the method `testNewsItemsCreation`\
    \ in the class `BlogEntryTest`. CruiseControl will show you the errors in the\
    \ build (with a full stack trace) as well as the changes introduced in the last\
    \ check-in.\n\n![Figure 9-8](images/00085.png)\n\n**Figure 9-8.** *Breaking the\
    \ TechConf build*\n\n## Metrics\n\nA view that can communicate a lot about the\
    \ state and history of a project is the metrics view in the CruiseControl Web\
    \ application. Figure 9-9 shows the metrics for the TechConf application (before\
    \ we introduced the error in the previous section).\n\n![Figure 9-9](images/00031.png)\n\
    \n**Figure 9-9.** *CruiseControl Metrics view*\n\n## Summary\n\nIn this chapter\
    \ you’ve learned the value of Continuous Integration. If one thing is clear, it\
    \ is that the success of CI depends heavily on making developers embrace the concept\
    \ of not holding on to changes for longer than a day and that a test-first approach\
    \ is the easiest way to have a measurement of when to check code back in. Tools\
    \ like CruiseControl replace the hodgepodge of ad hoc tools and shell scripts\
    \ that developers cobbled together in the past to accomplish CI.\n\nAutomation\
    \ in the case of CI is the key to adoption. The hours spent setting up a build\
    \ server will save you and your team countless hours of productivity loss in the\
    \ future.\n\n---\n\n# Chapter 10: Additional Topics\n\nTo build a feature complete\
    \ J2EE Web application, you’ll need more than what an application server or any\
    \ framework can provide by itself, including technologies that enable you to write\
    \ less and cleaner code to tools that provide searching capabilities and RSS feeds\
    \ to your Web application.\n```"
