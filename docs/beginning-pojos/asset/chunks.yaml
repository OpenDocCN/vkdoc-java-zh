    第 3 章 ■ 使用 Ant 构建


    <exclude name="**/read-me.txt"/>


    <exclude name="**/package.html"/>


    </patternset>


    **编译**


    现在是时候向构建文件添加第一个目标了，即 compile 目标。此目标将使用 javac 任务，它是 javac 命令的一个包装器。在清单 3-6 中，请注意，在调用
    javac 任务之前，${src-java} 目录下所有与模式集 non.source.set 匹配的文件都会被复制到 ${classes} 目录。这样做是为了使编译后的代码在
    classes 目录下能够访问到诸如 Java 属性文件、图像等资源。这是许多 IDE 的常见做法。


    **清单 3-6.** *编译目标*


    <target


    name="compile"


    depends="compile-init"


    description="编译所有类 (JDK1.5)">


    <javac


    destdir="${classes}"


    classpathref="class.path"


    debug="on"


    deprecation="on"


    optimize="off"


    >


    <src>


    <path refid="all.source.path" />


    </src>


    </javac>


    </target>


    <target name="compile-init">


    <target-banner target="compile"/>


    <mkdir dir="${classes}"/>


    <copy todir="${classes}">


    <fileset dir="${src-java}">


    <patternset refid="non.source.set" />


    </fileset>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


