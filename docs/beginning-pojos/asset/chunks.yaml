    has been created for that class. If you select **Run** ➤ **Run** from the main
    menu, you’ll see the details about the run configuration as shown in Figure 2-16.


    **Figure 2-16.** *Run configuration for the `GreeterImpl` class*


    ## Debugging a Java Class


    To debug a Java class in Eclipse is as simple as running a Java class. First,
    let’s add a breakpoint to the `GreeterImpl` class `String greet(String)` method
    by right-clicking on the left hand-side gutter and selecting **Toggle Breakpoint**,
    which will result in a small blue circle on the gutter representing the breakpoint
    as shown in Figure 2-17.


    **Figure 2-17.** *Breakpoint toggling*


    Like most elements in the Eclipse UI, you can right-click on the breakpoint icon
    and inspect the breakpoint properties. To run the class in debug mode, in the
    Package Explorer right-click on the `GreeterImpl.java` node and select **Debug
    As** ➤ **Java Application**. Eclipse will automatically switch to the Debug perspective
    as shown in Figure 2-18. Pressing `F6` will step over code and reveal the values
    of the parameter `name` as shown in the Variables view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00006.png)


    **Figure 2-18.** *Eclipse Debug perspective*


    ## Eclipse Plug-ins


    What makes Eclipse very appealing to a Java developer is the wealth of plug-ins,
    both commercial and open source, that exist to make every aspect of development
    more agile and enjoyable. The rest of the chapter will concentrate on showing
    some of the plug-ins that I’ve found to be the most useful when trying to develop
    an enterprise Java application. Many of the open source tools used in this book
    to develop the TechConf sample application provide for integration with the Eclipse
    platform via plug-ins.


    > **Note:** The TechConf project discussed in this book was developed mainly using
    Eclipse (although you should be able to work with the code with your favorite
    IDE or with simple stand-alone tools such as VI, Emacs and the command line).
    As you’ll see in Chapter 3 when we learn about the Ant build tool, it is important
    that your applications be completely independent of your choice of IDE.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Concurrent Versions System


    Projects with multiple developers require a shared source-code repository. Because
    open source projects have many contributors, they definitely require a central
    repository. Typically, these contributors are distributed throughout the world
    and connected only via the Internet.


    The de facto standard for open source version control is the Concurrent Versions
    System (CVS). CVS, an open source project itself, provides secure, multiuser version-control
    access over TCP/IP networks, including the Internet. This section isn’t intended
    to be a comprehensive introduction to CVS and its features; instead the intention
    is to provide an overview of CVS for the purpose of gaining access to the current
    source code of open source Java projects. A lot of times this is needed because
    the latest version of the source code is only in CVS and isn’t released in any
    other form. Some well-managed projects release the latest source code every night
    as ZIP files.


    ### Understanding CVS


    The CVS server is a TCP/IP-based application that provides access over the Internet
    to a CVS repository. The repository is a directory on the server machine. Contained
    within the repository are multiple modules. Each module is often a separate application
    or project.


    Connecting to a CVS repository requires a properly formatted `CVSROOT` connection
    string. The format is as follows:


    ```

    :pserver:[[user][:password]@]host[:[port]]/pathToRepository

    ```


    The `:pserver:` part of the string indicates that the `pserver` protocol is being
    used for the connection. The `pserver` protocol is used for remote connections
    via the password-authenticating server, and it’s the most commonly used way to
    remotely access a CVS repository. Another way to connect is via the `ext` protocol,
    which can be useful for running CVS through secure shell (SSH) for secure access
    to sources over the open Internet. The `CVSROOT` can optionally contain user and
    password information. If they aren’t provided, the CVS client will prompt you
    to enter them. The `host` is the domain name or IP address of the server. If the
    CVS server isn’t listening on the standard 2401 port, an optional port can be
    included. The `CVSROOT` is completed with the directory of the CVS repository
    on the server.


    In the developer’s local workspace, `CVS` directories are used to keep track of
    version-controlled files and the repository. The `CVS` directory contains the
    following three files:


    - **Entries:** Contains a list of version-controlled files, their version, date,
    and type

    - **Repository:** Contains the corresponding directory in the repository

    - **Root:** Contains `CVSROOT`


    ### CVS Concepts


    CVS attempts to foster collaboration by providing developers access to all files
    in the repository. Each developer checks out a copy of the repository to a local
    workspace. All changes are made and unit-tested in the workspace. When changes
    are applied to the repository, the file version is incremented. A version history
    is maintained.


    CVS doesn’t require files to be locked in order to change them. It allows multiple
    developers to work on the same file in their local workspace. When multiple developers
    make changes to the same file, CVS handles the merging of those files.


    ### CVS Commands


    Understanding the basic CVS commands for authentication, checking out, committing,
    updating, and comparing is fundamental to the basic usage of any CVS client application.


    A CVS repository is a collection of intellectual property that requires restricted
    access. In the case of open source projects, the repository is available for anyone
    to view. However, security is used to determine who is authorized to make changes
    directly to the repository. The `cvs login` command is used to authenticate users
    through username and password verification.


    > **Note:** CVS authentication doesn’t protect files from being viewed during
    file transfers over the Internet. SSH should be used to protect file transfers
    in sensitive repositories.


    The `checkout` command may be the most confusing of all CVS commands because it
    doesn’t have the same meaning as it does in other version-control software (VCS)
    applications. In CVS, the `checkout` command is used to get an initial local copy
    of the module from the CVS repository. Some other VCS programs require files to
    be locked and refer to this process as “checking out,” which causes the confusion.


    After the local copy of the source has been modified and unit-tested, it must
    be submitted back to the repository. The `commit` command is used to apply the
    local changes or new files to the repository. The `commit` command should also
    be accompanied by a short explanation of the change. The explanation becomes associated
    with the version change for auditing and communication purposes.'
