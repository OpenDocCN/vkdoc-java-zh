    **Implementing the DAO Pattern with Spring**


    As we learned in Chapter 5, we could have easily created our DAO implementations
    by injecting the Hibernate SessionFactory into the DAOs and creating a session
    using the openSession method of the SessionFactory and reusing the session for
    the life of the DAO, thus avoiding the new-session-per-operation antipattern.


    Spring provides the HibernateTemplate utility class to deal with the managing
    of Hibernate Session instances in the context of the current thread (similar to
    what SessionFactory method getCurrentSession does in a JTA environment) and handling
    conversion of the fairly fine-grained Hibernate exception hierarchy to the more
    manageable (from an application’s point of view) Spring DAO exception hierarchy.


    The HibernateTemplate implements the Hibernate Session interface wrapping the
    thread-bound Hibernate Session or creating one when necessary. Spring’s HibernateTemplate
    is an application of IoC to simplify interaction with Hibernate. Using Spring
    template objects will reduce the amount of code required in your DAOs (especially
    if compared to the typical DAO


