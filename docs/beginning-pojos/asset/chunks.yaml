    **Many-to-One: Conferences and Venues**


    In the previous example we had a relationship where one or more tracks belonged
    to a conference, which is an owner parent-child relationship since we don’t want
    the tracks to exist without an owning conference. In the case of a conference
    and a venue, we have an association where a venue can exist in the database without
    an associated conference and the same applies to a conference (since a site admin
    might create all the conference content in advance before choosing a suitable
    venue), and obviously many conferences can share the same venue (most likely not
    at the same time).


    To satisfy this relationship we can use a many-to-one mapping in conference.hbm.xml
    as shown in Listing 4-23.


    **Listing 4-23.** *Many-to-One Mapping Between Conference and Venue*


    <many-to-one


    class="Venue"


    name="Venue"


    not-null="true"


    cascade="persist,save-update"


    >


    <column name="FK_VENUE_ID" />


    </many-to-one>


    Since we don’t want venues to be deleted when a conference is deleted, but we
    do want the venue information to be updated or inserted in the database when we
    update or create a conference, we set the cascade attribute to “persist,save-update”.
    Therefore on any calls to persist, save or update against a Conference object,
    Hibernate will determine whether the associated Venue object needs to be saved
    or updated.


    **Inheritance**


    Of all of the differences between a database schema and an object graph, inheritance
    brings the most interesting challenges. The problem boils down to mapping “is
    a” relationships while retaining the power of the object-oriented language (polymorphism)
    and having the data stored in an efficient way that can be used not only by your
    object-oriented application but also by other (possibly procedural) applications
    (such as reports or ad-hoc queries). Hibernate supports three different approaches
    to mapping an inheritance hierarchy, which are outlined next.


    Table-Per-Concrete-Class


    In the Table-Per-Concrete-Class strategy you have a table per each class in the
    system. In this strategy, each class is mapped to a table that includes both the
    attributes of the implemented class as well as the attributes inherited from the
    parent class. This strategy basically discards polymorphism (polymorphic queries
    require you to query over all child classes), but it is very efficient in terms
    of storage space and record insertion (one SQL statement).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Sam-Bodden_596-3 C04.fm Page 130 Wednesday, February 22, 2006 2:16 PM


    **130**


    C H A P T E R 4 ■ O B J E C T R E L A T I O N A L M A P P I N G W I T H H I B
    E R N A T E


    Table-Per-Class-Hierarchy


    In the Table-Per-Class-Hierarchy strategy a single table is used to store all
    of the objects belonging to the class hierarchy. It uses a “type discriminator”
    column that specifies which specific subclass a row maps to. This strategy makes
    regular and polymorphic queries very simple and performant. The few drawbacks
    include maintenance, since each class you add to the inheritance hierarchy requires
    modifications to the table, and the requirement that all subclass columns be declared
    as nullable in the schema.


    Table-Per-Subclass


    In the Table-Per-Subclass strategy each subclass, interface, and abstract class
    have their own table containing only the properties for that particular class.
    In the tables, all associations are represented as foreign key constraints. To
    enable polymorphic queries, Hibernate uses the same primary key for all constituent
    parts of an object instance. From the standpoint of data storage, this strategy
    provides a completely normalized schema, and adding an object does not imply modification
    to existing tables but simply the addition of a new table. Major drawbacks are
    that it requires multiple SQL queries for saving and updating, and SQL join queries
    for data retrieval.


    Choosing an Inheritance Mapping Strategy'
