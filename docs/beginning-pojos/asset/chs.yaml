  \ Hibernate 在持久化操作范围内如何处理关联对象。例如，如果在一对多关联中将级联风格设置为“save-update”，Hibernate 将判断是否有任何关联对象是“脏”的，并为这些对象生成\
  \ SQL UPDATE 语句，同样也会为新对象生成 SQL INSERT 语句。cascade 属性的值包括“none”、“persist”、“merge”、“delete”、“save-update”、“evict”、“replicate”、“lock”、“refresh”、“delete-orphan”和“all”。这些值可以用逗号分隔组合，并且与\
  \ Session 类上可用的操作紧密对应。有关级联行为和传递性持久化的深入介绍，请查阅 Hibernate 在线参考文档。\n\n如果你检查 CONFERENCE\
