  \ C03.fm 第 48 页 2006 年 2 月 22 日星期三 上午 6:05\n\n**48**\n\n第 3 章 ■ 使用 Ant 构建\n\n构建过程需要的不仅仅是一个专门的开发团队。没有自动化，即使是一个只有少数开发人员的小项目也可能迅速失控。\n\
  \n通过使用自动化构建工具，开发人员可以定义构建软件过程中的步骤，并在不同的环境和情况下可靠地执行这些步骤。通常，此类工具会考虑到开发人员之间的个别配置差异。\n\
  \n\n\n环境和生产系统。大多数构建工具都包含某种配置或脚本，用于以离散、原子化的步骤描述构建过程。\n\n一个典型的构建过程还涵盖了应用程序的生产和开发阶段。例如，在数据库驱动的应用程序中，个别开发者可能需要用测试所需的样本数据初始化数据库，而在生产环境中则不需要此步骤。\n\
  \n尽管集成开发环境（IDE）一直为构建过程提供一定程度的支持，但这种支持通常无法满足开发者的需求和期望。大多数此类构建解决方案无法跨环境移植；要让某个开发者的\
  \ IDE 项目文件在其创建者之外的任何环境中正常工作都相当困难。这些工具不仅依赖于特定 IDE，而且与应用程序组装者或部署者为生产应用所做的工作也大相径庭。常识告诉我们，开发环境越接近生产环境，进入生产阶段时遇到的问题就越少。通过建立一个在开发环境、生产环境（以及两者之间的任何其他环境）中保持一致的构建过程，你可以消除因使用多种\
  \ IDE、操作系统和 Java 版本而带来的许多开发难题。\n\n随着构建过程实现自动化并对程序员透明化，测试和文档生成等其他问题也融入了构建过程。大多数开发者发现，他们最初使用的构建系统会逐渐演变，最终完成的任务远不止“构建”本身。从测试到文档生成，一个精心设计的构建过程最终会成为团队开发流程的体现。\n\
  \n在 J2EE 中，一个一致的构建系统将应用程序开发者、组装者和部署者的角色整合在一起。作为 J2EE 规范的一部分，Sun 在其 J2EE 平台定义中明确了几个角色。J2EE\
  \ 新手可能会很快将自己归入其中某一类，而忽略其他角色的细节。但现实是，除非你了解每个角色的职责，否则你对 J2EE 平台的理解将是不完整的。特别是，应用程序组装者和应用程序部署者的角色会体现在构建过程中，除非你的开发者能够复现生产环境中的情况，否则你很可能会经历从开发到生产的痛苦过渡。\n\
  \n**Ant 简介**\n\n一个包含少量文件和极少依赖关系的项目，其构建过程几乎算不上一个过程。只需使用 Java 编译器和 JAR 命令行工具，就可以构建简单的\
  \ Java 应用程序。\n\n在 Ant 出现之前，开发者通常从一组简单的批处理文件或 shell 脚本开始，作为迈向自动化的第一步。但随着文件数量、组件、目标平台和虚拟机（VM）版本的增长，构建时间、构建复杂性以及人为错误导致构建不可重现和不一致的可能性也随之增加。\n\
  \n过了一段时间，你最终会意识到，维护一个不可移植、依赖平台的自行解决方案既繁琐又容易出错。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C03.fm 第 49 页 2006 年 2 月 22 日星期三 上午 6:05\n\n第 3 章 ■ 使用 Ant 进行构建\n\
  \n**49**\n\n对于少数开发者能就 IDE 选择达成一致的团队来说，首选通常是 IDE 提供的构建功能。大多数 IDE 都提供了构建简单应用程序的向导。这些向导只覆盖了部分问题，并且将你的团队束缚在特定的\
  \ IDE 上。\n\n除了上述问题，这两种方法都将开发环境和生产环境视为概念上分离的。我们需要的是一个低层级的工具，能够跨多种 IDE、开发阶段、平台等统一构建过程。\n\
  \n多年来，UNIX 程序员一直通过 make 工具及其各种变体（GNU Make、nmake 等）来构建应用程序。与 make 类似，Ant 的核心是一个构建工具，但正如\
  \ Ant 网站所述，Ant“有点像 Make，但没有 Make 的缺点”（http://ant.apache.org/）。\n\nAnt 的简洁性促成了它的快速普及，并使其成为\
  \ Java 世界中构建应用程序的事实标准。Ant 与并发版本系统（CVS）一起，通过提供一种通用的方式让个人获取、构建并为开源社区做出贡献，在促进开源方面发挥了重要作用。Ant\
  \ 也已成为大多数 Java 开发者（尤其是开发 J2EE 应用程序的开发者）不可或缺的工具。\n\nAnt 让全球 Java 开发者的生活变得更加轻松。尽管远非完美，但它已证明能够满足\
  \ Java 开发者的需求，从掌控构建过程到摆脱专有构建系统的束缚。\n\n选择 Ant 最相关的理由如下：\n\n*   **平台独立性：** 典型的企业级\
  \ Java 环境包括在 Wintel 机器上工作并部署到 UNIX 机器进行生产的开发团队。Ant 作为纯 Java 工具，使得无论平台如何，都能拥有一个一致的构建过程，从而使开发、预发布、集成和生产环境更加接近。Ant\
  \ 还具有处理平台差异的内置功能。你的 Java 代码是可移植的；你的构建也应该是可移植的！！\n*   **普及度：** Ant 无处不在！是的，这本身并不是支持某项技术的充分理由，但普及性带来的优势很多，包括招聘、培训和技能的市场价值。Ant\
  \ 也已集成到许多主流 IDE 中，从而成为开发者之间一致的因素。这在一定程度上是由于（无论出于好坏原因）选择 XML 作为其语言。\n*   **功能性和灵活性：**\
  \ 对于大多数 Java 项目而言，Ant 是可扩展且高度可配置的；它开箱即用地提供了所需的功能。对于 Java 开发者来说，任何类都可以轻松成为 Ant 任务，尽管根据我们的经验，我们很少需要编写自己的任务（因为开源社区中似乎总有人抢先一步）。如果需要，你可以插入脚本引擎并运行特定于平台的命令。\n\
  *   **语法：** 无论你喜欢与否，XML 已成为全球公认的数据格式。大多数 Java 开发者都使用过 XML，而 J2EE 开发者更是每天都要处理 XML。XML\
  \ 使 Ant 符合流行术语。但 XML 也有一些优势。XML 因其层次结构特性，非常适合表示结构化数据。大量商业和开源解析器的存在，以及轻松检查 XML 文件格式是否正确和有效的能力，使得\
  \ XML 在行业中得到了广泛应用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C03.fm 第 50 页 2006 年 2 月 22 日星期三 上午 6:05\n\n**50**\n\n第 3 章 ■ 使用 Ant 进行构建\n\n\
  Ant 的架构与 make 工具类似，都基于目标（target）的概念。在 Ant 中，目标是一个模块化的执行单元，它使用任务（task）来完成其工作。Ant\
  \ 目标具有依赖关系，并且可以有条件地执行。一个构建通常由一些主要目标组成，这些目标将完成与应用程序构建相关的某些粗粒度过程，例如编译代码或打包组件。这些主要目标可能会利用其他子目标（通常通过依赖关系）来完成其工作。\n\
  \n\n\n在底层，任务（tasks）是继承自 `org.apache.tools.ant.Task` 类的普通 Java 类，不过任何公开了签名为 `void\
  \ execute()` 方法的类都可以成为 Ant 任务。Ant 的一大优势在于其可扩展性。Ant 任务是可插拔的普通 Java 类。要编写一个任务，你只需继承\
  \ `Task` 类，并在 `execute` 方法中添加一些代码即可。Ant 内置了大量任务，用于完成典型构建过程中的许多需求。这些任务被称为核心任务和可选任务。此外，还有无数第三方任务，无论是商业、免费还是开源的。\n\
  \nAnt 对 Java 开发的贡献范围起初并不明显，尤其是在小型项目中。但随着复杂性的增加以及多个开发者的加入，你会发现 Ant 成为了帮助团队同步协作的粘合剂。它基本上可以消除对全职构建“工程师”的需求。大多数开源\
  \ Java 项目的情况正是如此，它们的成功也证明了使用 Ant 进行集成的有效性。\n\n然而，Ant 也并非没有批评者。许多人未能理解，Ant 从来就不是一个功能完备的脚本语言，而是一种以简单声明式、面向目标的方式自动化构建过程的、对\
  \ Java 友好的工具。自其诞生以来，许多类似脚本的特性已通过自定义任务的形式添加到 Ant 中，而希望拥有完整脚本语言的阵营与希望拥有简单、依赖驱动构建系统的阵营之间的争论至今仍在继续。在我看来，没有正确答案；脚本就是编程，而你也知道随之而来的问题。另一方面，Ant\
  \ 简单的声明式方式使得编写一次并在不同项目间复用构建变得困难。Ant 的可复用性体现在任务级别。在史蒂夫·洛夫伦（Steve Loughran）的文章《愤怒中的\
  \ Ant》（http://ant.apache.org/ant_in_anger.html）中，他建议，为了达到大多数开发者转而使用脚本才能实现的复杂程度，可以使用可扩展样式表语言转换（XSLT）等技术，为每个项目动态生成\
  \ Ant 构建。\n\n幸运的是，Ant 1.6 版本提供了新特性，使得 Ant 构建的复用成为现实。\n\n我们将在本章后面介绍一些支持复用的相关特性。\n\
  \n**获取与安装 Ant**\n\n可以从 http://ant.apache.org 获取 Ant 的二进制和源代码发行版，或者通过 CVS 获取源代码。Ant\
  \ 是一个纯 Java 应用程序。因此，运行它的唯一要求是安装了兼容的 JDK 以及一个兼容 Java API for XML Processing（JAXP）的解析器。Ant\
  \ 自带最新的 Apache Xerces2 解析器。Ant 以压缩归档文件（.zip、tar.gz 和 tar.bz2）的形式分发。将归档文件解压到一个目录（此目录称为\
  \ ANT_HOME）后，建议\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C03.fm 第 51 页 2006 年 2 月 22 日星期三 上午 6:05\n\n第 3 章 ■ 使用 Ant 构建\n\n**51**\n\n你将环境变量\
  \ `ANT_HOME` 添加到系统中，并将 `ANT_HOME` 目录下的 `bin` 目录添加到系统的可执行路径中。`bin` 目录包含针对最流行平台的多种不同格式的脚本。这些脚本便于执行\
  \ Ant，包括 DOS 批处理、UNIX shell、Perl 和 Python 脚本。Ant 还依赖 `JAVA_HOME` 环境变量来确定要使用的 JDK。\n\
