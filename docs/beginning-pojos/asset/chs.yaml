  \ 注解）的注解支持\n\n本书的重点是构建 Web 应用程序；因此，你需要一个支持 Servlet API 的 Web 容器，例如 Tomcat 或 Jetty。和之前一样，我们将在所有示例中使用\
  \ JSE 5.0。\n\n**使用 Spring Bean 工厂**\n\nSpring Bean 工厂是工厂设计模式的实现，它们提供特定类型的 Bean 或对象，并使用以属性文件或\
  \ XML 文档形式提供的元数据来配置它们。迄今为止，Spring Bean 工厂中使用最广泛的部分是 XMLBeanFactory，它可以根据描述要使用哪个具体类以及如何配置它的\
  \ XML 定义来实例化一个接口的实现。\n\n\n\n在清单 6-1 中，我们定义了一个名为`GreetingService`的 Java 接口，该接口描述了一个简单的服务。\n\
