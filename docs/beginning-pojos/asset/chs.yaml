  Eclipse\n\n**当** JavaBeans 规范浮出水面时，组件市场的想法便萦绕在每个人心头，类似于 ActiveX 等技术所拥有的丰富组件生态系统。然而，这个白日梦从未成为现实，而且现在很明显，EJB\
  \ 技术也犯了同样的错误。有人归咎于规范（这或许部分正确），但迄今为止我收到的最多反馈都指向一个明显的领域——是工具的问题，笨蛋！\n\n早期的成功 Java\
  \ 开发环境大多是商业化和专有的封闭系统，只有少数选定的商业合作伙伴才能扩展和构建该环境。像 Borland JBuilder 这样的工具提供了一些插件框架的雏形，但从未获得广泛采用（无论供应商的市场宣传资料如何告诉您）。尽管许多\
  \ Java 开发人员使用各种工具和命令行工具组合也能高效工作，但许多开发人员更喜欢在一个内聚的集成开发环境（IDE）中工作。\n\n在 Sun 的 NetBeans\
  \ IDE 出现之前，Java 开源 IDE 市场确实很薄弱。NetBeans 虽然成功，但未能获得许多商业供应商或开源社区的广泛支持。第二次创建 Java IDE\
  \ 的重大开源努力始于 2001 年底。令人惊讶的是，Eclipse IDE (www.eclipse.org) 是一个功能相当全面的产品，即使在 1.0 版本时，它也已准备好帮助大量新老\
  \ Java 开发人员提高生产力。Eclipse 代表了一种商业供应商开展业务的新方式，因为 Eclipse 项目背后的母公司 IBM 为其开发捐赠了大约 4000\
  \ 万美元。\n\nEclipse 源于 IBM 收购著名的工具制造商 Object Technologies International (OTI)，该公司是\
  \ VisualAge 产品线的创造者，并以其 Smalltalk 工具而闻名。\n\nEclipse 项目不仅仅是一个开源的 Java IDE；Eclipse\
  \ 是一个工具集成平台，更重要的是，它是一个由项目和思想组成的社区。\n\n本章旨在将 Eclipse 引入您的开发环境，并用各种开源插件对其进行补充，这些插件可以使开发更加愉快和敏捷。本章绝非对\
  \ Eclipse 的详尽介绍，但它应该能帮助您开始使用这个强大而流行的 IDE。\n\n**23**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
