  \ HTML 页面* 在 Home.html 模板中，我们使用了一个带有 jwcid 属性的 span 标签，该属性代表 Java Web 组件 ID。在 HTML\
  \ 模板中声明 Tapestry 组件有两种方式：如示例中所示的显式声明，或者通过在组件名称前加上 @ 进行隐式声明。隐式声明类似于 Java 中的匿名内部类；您是在当场声明并使用一个组件。由于我们使用的是显式声明，组件的核心内容必须在其他地方定义，以便我们可以通过名称引用它。\n\
  \n**Java 代码**\n\n为组件提供支持的代码包含在文件 Home.java 中。Home 类提供了一个名为 getTime 的简单方法，该方法返回一个新的\
  \ java.util.Date 对象，如清单 7-2 所示。\n\n**清单 7-2.** *扩展 BasePage（实现 IPage）的 Java 类* package\
  \ com.integrallis.time;\n\nimport java.util.Date;\n\nimport org.apache.tapestry.html.BasePage;\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00001.png)\n\nSam-Bodden_596-3\
  \ C07.fm Page 246 Thursday, February 23, 2006 4:22 PM\n\n**246**\n\n第 7 章 ■ T A\
  \ P E S T R Y\n\npublic abstract class Home extends BasePage {\n\npublic Date getTime()\
  \ {\n\nreturn new Date();\n\n}\n\n}\n\n这个抽象类扩展了 Tapestry 的 BasePage 抽象类，而 BasePage\
  \ 又实现了 IPage 接口。我们将在处理示例的过程中进一步了解这两个类和接口。图 7-3 显示了 BasePage 类的部分类层次结构。请记住，在 Tapestry\
  \ 中，一切都是组件，包括页面。\n\n**图 7-3.** *BasePage 类层次结构*\n\n**页面 XML 描述符**\n\n\n\n页面规范文件是一种扩展名为“page”的\
  \ XML 文件。请记住，页面是 Tapestry 组件的一种特殊类型，而此文件是我们应用程序中 Home 页面组件的配置文件。页面可以包含组件，在本例中，我们的页面包含一个类型为\
  \ Insert 的组件。Insert 组件是 Tapestry 众多内置组件之一。Insert 允许你动态地在 HTML 响应中插入文本，并可以选择通过使用`java.text.Format`实例来过滤特殊字符或进行格式化。\n\
  \n清单 7-3 展示了 Home.page 文件的内容。\n\n**清单 7-3.** *页面规范 XML 文件 (Home.page)*\n\n<?xml\
  \ version=\"1.0\"?>\n\n<!DOCTYPE page-specification PUBLIC\n\n\"-//Apache Software\
  \ Foundation//Tapestry Specification 4.0//EN\"\n\n\"http://jakarta.apache.org/tapestry/dtd/Tapestry_4_0.dtd\"\
  >\n\n<page-specification class=\"com.integrallis.time.Home\">\n\n<component id=\"\
  time\" type=\"Insert\">\n\n<binding name=\"value\" value=\"ognl:time\"/>\n\n</component>\n\
  \n</page-specification>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
