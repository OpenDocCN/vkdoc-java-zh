  \naction=\"list\"\n\ncollection-property=\"tracks\"\n\ntarget=\"tracks\"\n\ntarget-type=\"\
  com.integrallis.techconf.dto.TrackSummary\"\n\n/>\n\n用于嵌套 TrackSummary 对象的 TrackSummary.dto.xml\
