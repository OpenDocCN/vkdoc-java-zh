  \n**65**\n\n\n\npath 数据类型也可以利用嵌套的 pathelement，这在 all.source.path 路径结构的定义中有所体现。它使用\
  \ pathelement 数据类型来引用由 src-java 和 src-generated 属性定义的位置。\n\nPath 是一种典型的 Ant 路径式结构。在处理路径或类路径时，Ant\
  \ 的任务会利用路径式结构来执行其功能。在前面的示例中，你可以看到，在构建文件顶部定义的两个 pathelement 随后在 javac 任务的上下文中通过引用被使用。class.path\
  \ 路径被传递给 javac 的 classpathref 属性，以确定编译时的类路径；而 all.source.path 则通过创建一个新的 pathelement\
  \ 来使用，该 pathelement 嵌套在 javac 任务的 src 嵌套元素内部。\n\n随着构建复杂性的增加，用于选择文件的模式也会随之增加。路径式结构能够重用路径信息，并有助于控制构建文件的增长。\n\
