  \ TestNG 类*\n\npackage package1;\n\nimport org.testng.annotations.Test;\n\npublic\
  \ class TestA {\n\n@Test(groups = {\"GroupX\"})\n\npublic void testA1() {\n\nSystem.out.println(\"\
  testA1\");\n\nassert true;\n\n}\n\n@Test(groups = {\"GroupY\"})\n\npublic void testA2()\
  \ {\n\nSystem.out.println(\"testA2\");\n\nassert true;\n\n}\n\n}\n\nTestA 属于 package1，包含测试方法\
  \ testA1 和 testA2。方法 testA1 属于测试组 GroupX，而 testA2 属于 GroupY，这反映在 Test 注解的参数中。\n\n\
  **清单 8-7.** *TestB TestNG 类*\n\npackage package2;\n\nimport org.testng.annotations.Test;\n\
  \npublic class TestB {\n\n@Test(groups = {\"GroupX\",\"GroupY\"})\n\npublic void\
  \ testB1() {\n\nSystem.out.println(\"testB1\");\n\nassert true;\n\n}\n\n@Test(groups\
  \ = {\"GroupZ\"})\n\npublic void testB2() {\n\nSystem.out.println(\"testB2\");\n\
  \nassert true;\n\n}\n\n}\n\nTestB 属于 package2，包含测试方法 testB1 和 testB2。方法 testB1 属于测试组\
  \ GroupY，而 testB2 同时属于 GroupX 和 GroupY（groups 参数接受一个以逗号分隔的组列表）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
