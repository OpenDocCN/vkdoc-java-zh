  在 Tapestry 中，创建自己的组件与创建页面非常相似。毕竟，页面本身就是 Tapestry 组件。组件的组装方式有两种，具体取决于最终 HTML 的生成方式。如果你在代码中为组件生成\
  \ HTML，那么你的组件 Java 类应该继承自 Tapestry 类 `org.apache.tapestry.AbstractComponent`。另一方面，如果你想使用\
  \ HTML 模板作为组件输出的基础，那么你需要继承自类 `org.apache.tapestry.BaseComponent`。图 7-15 展示了组件和页面的核心层次结构。\n\
  \n**图 7-15.** *Tapestry 组件和页面层次结构* 组件 HTML 模板\n\n为了创建将作为所有会议页面框架的组件，我们将从 HTML 模板开始。该模板如图\
  \ 7-16 所示。\n\nConferenceBorder.html 模板被划分为四个清晰界定的区域，如图 7-17 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
