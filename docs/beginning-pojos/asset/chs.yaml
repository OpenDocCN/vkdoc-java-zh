  \ C01.fm 第 13 页 2006 年 2 月 22 日星期三 上午 6:01\n\n第 1 章 ■ 引言\n\n**13**\n\n**发现并精炼候选领域模型元素**\n\
  \n基于前述 TechConf 需求讨论和高层架构蓝图，你可以整理出一份候选领域模型列表。对于这项工作，你可以使用类-职责-协作（CRC）卡片，或者（如本例所示）通过手动扫描源文档来创建名词和动词列表。这个过程并非单纯的机械操作，因为它需要分析对系统的理解，并剔除和发现源文档中未出现的新候选类和新操作。这些新发现的领域知识随后可被添加到源文档中，以确保其不被遗漏。\n\
  \n通过删除同义词和非实体（即可能是属性、修饰符或表示对象状态的候选词），得到最终过滤后的名词列表。经过分析，列表规模会缩小。此时，可以开始对候选对象之间的结构关系进行建模。这一过程将进一步精炼候选对象，并解决许多此前未曾遇到的对问题领域理解上的歧义。在对问题进行初步分析后，我们得到了代表候选实体的名词列表，如表\
