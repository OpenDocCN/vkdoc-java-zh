  \ MVC，并使用在第 5 章中开发的 EJB3 无状态会话 Bean 服务替代 Spring Bean 服务，然后通过 HiveMind 将它们注入到我们的\
  \ Tapestry 页面中。在 Tapestry 实现中，我们还将实现比第 6 章更多的 TechConf Web 层功能。为了更好地理解 TechConf\
