  **123**\n\n我们希望使 Conference 和 Track 之间的一对多关系成为双向的。\n\n在 POJO 中，这通过关系“一”方的 java.util.Set\
  \ “tracks” 和“多”方的单个 Conference 属性来表示。这种类型的双向关联非常方便，它允许我们给定一个 track，通过其 getConference\
  \ getter 方法访问 Conference 对象，从而确定该 track 属于哪个会议。set 元素中显示的 inverse 属性告诉 Hibernate，这是一个反向或双向关系。\n\
  \n请注意，在 Conference 类的实现中，我包含了一个便捷方法 addTrack，用于向给定的会议添加 track，如清单 4-15 所示。\n\n\n\
  \n请注意，`addTrack` 方法通过将传入的 Track 对象添加到 Conference 对象的 Track 集合中，同时设置被添加 Track 对象的\
  \ conference 属性，从而维护了关系的两端。将这种关系维护封装在一个简单的方法中，将使两个类的使用更加简便。\n\n映射中的“lazy”属性告诉 Hibernate，在加载\
  \ Conference 对象数据的同时，加载关联的 Track 对象。对于 Track 关联，我选择将 lazy 属性设置为 false，因为我们的领域对象将从中间层用于填充数据传输对象（DTO），以提供给\
  \ Web 层。何时使用延迟加载是一个重要的决策。在上述案例中，影响决策的因素包括应用程序的架构（在 Web 层直接使用 DTO 还是领域对象）以及 Track\
  \ 对象的数量和大小（数量少且规模较小）。\n\n■**注意** 在 Hibernate 3.X 中，默认所有关联都是延迟加载的。如果你正在将应用程序从 Hibernate\
