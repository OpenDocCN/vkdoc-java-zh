  \n赞助商\n\n无\n\n无\n\nUC-22\n\n请求展位\n\n赞助商\n\nUC-21\n\n无\n\n使用序列图细化用例\n\nUML 序列图通过描绘对象随时间推移的交互来对系统的动态行为进行建模。这些交互被表示为对象之间的一系列消息。\n\
  \nUML 序列图非常适合根据领域模型中的对象来详细阐述用例的执行过程。通常，一个序列图用于表示单个用例场景或事件流。序列图的消息流与相应用例的叙述相匹配。\n\
  \n序列图是记录用例场景、细化用例图并使其与领域模型同步的绝佳方式。序列图通常显示一个用户或参与者，以及他们在用例执行上下文中与之交互的对象和组件。\n\n在必要时，我会在本书中使用序列图来针对应用程序的领域模型细化并验证用例。\n\
