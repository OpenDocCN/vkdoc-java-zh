  \n**277**\n\n\n\n对于登录和注销功能，我们需要处理两种状态及其对应的用户界面变化。当没有用户登录时，需要显示包含用户名和密码字段的表单，以及注册按钮。成功登录后，登录表单和注册按钮应被隐藏，取而代之的是显示用户问候语和注销按钮。为了处理条件性的\
  \ HTML 部分，我们定义了两个组件。`ifLoggedIn` 组件是一个 Tapestry 的 `If` 组件，当 `condition` 属性的值评估为\
  \ `true` 时（对于非布尔对象，`true` 等同于非 `null`），它将渲染其主体内容。与 `ifLoggedIn` 组件互补的是 `elseNotLoggedIn`\
  \ 组件，它是一个 Tapestry 的 `Else` 组件。如果前一个 `If` 组件的条件评估为 `false`，`Else` 组件将渲染其主体内容。清单\
