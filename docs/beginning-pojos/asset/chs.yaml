  \ 319 Thursday, February 23, 2006 4:23 PM\n\n第 8 章 ■ 测试\n\n**319**\n\nTestNG 的分组功能比\
  \ JUnit 提供了更大的灵活性，因为无需重新编译任何代码。TestNG 还提供了创建方法组的能力，并且如前所述，还可以创建组的组。\n\n**依赖方法**\n\
  \nTestNG 还提供了一种机制，用于声明测试方法之间的依赖关系，并避免被 Beust 所称的 JUnit 中的“失败级联创伤”所困扰——即 JUnit 会同时报告所有依赖测试的失败以及根本失败。`@Test`\
  \ 注解可以接受一个 `dependsOnMethods` 参数，该参数接受一个以逗号分隔的方法列表。\n\n类似地，你可以通过 `dependsOnGroups`\
  \ 参数声明方法对某个组的依赖，该参数接受一个以逗号分隔的组列表。TestNG 将保证在运行该方法之前，依赖组中的所有方法都已执行完毕。\n\n**参数**\n\
  \nTestNG 允许从 `testng.xml` 文件或通过 `@Parameters` 和 `@DataProvider` 注解传递测试参数。`org.testng.annotations.Parameters`\
  \ 注解适用于 `org.testng.annotations.Test` 和 `org.testng.annotations.Configuration` 参数。\n\
  \n例如，如果你想要一组特定于数据库的测试，可以在 `testng.xml` 文件中定义数据库参数，如清单 8-11 所示。\n\n**清单 8-11.** *TestNG\
  \ 参数化配置*\n\n<!DOCTYPE suite SYSTEM \"http://beust.com/testng/testng-1.0.dtd\" >\n\
  \n<suite name=\"Test Suite\"\n\n<parameter name=\"url\" value=\"jdbc:mysql://localhost/test\"\
  \ />\n\n<parameter name=\"driver\" value=\"com.mysql.jdbc.Driver\" />\n\n<parameter\
  \ name=\"username\" value=\"user\" />\n\n<parameter name=\"password\" value=\"pass\"\
  \ />\n\n<test name=\"DBTest\">\n\n...\n\n</test>\n\n</suite>\n\n\n\n要在测试代码中使用参数，只需像清单\
  \ 8-12 所示那样使用`parameters`注解。\n\n**清单 8-12.** *在代码中使用 TestNG 参数*\n\nConnection connection\
  \ = null;\n\n@Parameters({ \"url\", \"driver\", \"username\", \"password\" })\n\n\
  @Configuration(beforeTestClass = true)\n\nprivate void initializeDB(String url,\
  \ String driver,\n\nString username, String password) {\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
