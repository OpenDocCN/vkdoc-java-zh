  \n**总结**\n\n在本章中，您已经了解了在开发过程早期为 Web 应用程序设置测试框架的重要性。通过采用分层测试方法，您可以确保应用程序的测试需求得到满足。使用像\
  \ JUnit 和 TestNG 这样的测试框架，以及众多支持工具和框架，测试不再是项目末期令人畏惧的过程，而是迭代开发过程中活跃且主要的部分。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
