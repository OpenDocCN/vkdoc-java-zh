  \ 组件的最后一个元素是处理登录和注销逻辑的 Java 代码。`ConferenceBorder` 类包含 `login` 方法，该方法使用应用状态对象 `LoggedInUser`\
  \ 来存储由注入的 EJB3 `UserService` 返回的 `UserSummary` DTO，前提是提供给 `UserService` 登录方法的用户名和密码通过了身份验证。`logout`\
  \ 方法仅将 `LoggedInUser` 对象中的用户信息设置为 null。清单 7-26 展示了 `ConferenceBorder` 的实现。\n\n**清单\
  \ 7-26.** *ConferenceBorder Java 实现* package com.integrallis.techconf.web.tapestry.pages;\n\
  \nimport org.apache.tapestry.BaseComponent;\n\nimport org.apache.tapestry.IRequestCycle;\n\
  \nimport com.integrallis.techconf.dto.UserSummary;\n\nimport com.integrallis.techconf.service.UserService;\n\
  \nimport com.integrallis.techconf.web.tapestry.domain.LoggedInUser; public abstract\
  \ class ConferenceBorder extends BaseComponent {\n\n/**\n\n* 处理用户登录\n\n* @param\
  \ cycle\n\n*/\n\npublic void login(IRequestCycle cycle) {\n\nLoggedInUser user =\
  \ getUserInformation();\n\n// 尝试登录，返回 null 表示登录失败 UserSummary userSummary = getUserService()\n\
  \n.login(getLogin(), getPassword());\n\nuser.setUserSummary(userSummary);\n\nsetUserInformation(user);\n\
  \n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C07.fm\
  \ 第 282 页 2006 年 2 月 23 日，星期四，下午 4:22\n\n**282**\n\n第 7 章 ■ T A P E S T R Y\n\n\
  /**\n\n* 处理用户注销\n\n* @param cycle\n\n*/\n\npublic void logout(IRequestCycle cycle)\
  \ {\n\nLoggedInUser user = getUserInformation();\n\nuser.setUserSummary(null);\n\
  \nsetUserInformation(user);\n\n}\n\n// 登录对象\n\npublic abstract void setLogin(String\
  \ s);\n\npublic abstract String getLogin();\n\npublic abstract void setPassword(String\
  \ s);\n\npublic abstract String getPassword();\n\n// 获取并存储用户信息\n\npublic abstract\
  \ LoggedInUser getUserInformation();\n\npublic abstract void setUserInformation(LoggedInUser\
  \ u);\n\n// 页面服务\n\npublic abstract UserService getUserService();\n\n}\n\n**会议摘要页面**\n\
