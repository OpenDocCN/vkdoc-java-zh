  \n**图 7-7.** *在 Insert 组件上使用 format 参数的结果*\n\n**简化简单示例**\n\n我之前提到过，你可以在 HTML 模板中使用语法“@Type”隐式声明\
  \ Tapestry 组件，其中 type 是具体的组件类型。页面文件提供了一层间接性，使你能够灵活地最小化对 HTML 模板的更改。但是，如果页面文件中的大多数绑定都像示例中那样简单，那么你可能会得到大量页面文件，从而让项目变得杂乱。\n\
  \n清单 7-7 展示了使用隐式组件的 Home.html 页面 HTML 模板的一个版本。\n\n**清单 7-7.** *使用隐式组件的 HTML 模板*\n\
  \n<html>\n\n<body>\n\n<h1>Tapestry Time</h1>\n\n当前时间是 <span jwcid=\"@Insert\" value=\"\
  ognl:time\" >正午</span>!\n\n\n\n</body>\n\n</html>\n\n完成这些添加后，你现在可以删除 Home.page 文件。不过，你需要一种方法来告诉\
  \ Tapestry 模板解析器以及随后的 OGNL 表达式求值器，在哪里可以找到 `getTime` 方法。Tapestry 为你的应用程序使用一个全局配置文件，该文件应使用与\
  \ Servlet 映射名称相同的名称，并以 `.application` 扩展名结尾。以 `tapestry-time` 应用程序为例，配置文件名为 `tapestry-time.application`，应位于\
  \ `WEB-INF` 目录中。应用程序 XML 文件格式也在 `Tapestry_4_0.dtd` 中定义。该文件用于声明类、组件和第三方组件库的全局位置。清单\
  \ 7-8 展示了 `tapestry-time` 应用程序的一个最小化应用程序 XML 文件，其中包含一个 `meta` 元素，为属性 `org.apache.tapestry.page-class-packages`\
  \ 定义了包（`com.integrallis.time`），这告诉 Tapestry 在哪里查找页面组件的 Java 代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
