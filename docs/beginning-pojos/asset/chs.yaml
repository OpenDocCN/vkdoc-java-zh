  \ SessionFactory 类型的属性，并使用 @Resource 注解（该注解将正在查找的资源的 JNDI 名称作为参数）对其进行标注，您现在就可以在代码中使用\
  \ SessionFactory 实例来构建 Session 对象。\n\n**使用 Hibernate 实现 DAO 模式**\n\n企业级 Java 开发人员使用\
  \ DAO 模式已有相当长的时间，目的是抽象和封装对应用程序一个或多个数据源的所有访问。在处理多个数据源的应用程序中，DAO 模式可以通过为所有与数据相关的操作提供统一且一致的接口，使所有不同的数据源对应用程序代码而言看起来相同。一个设计良好的\
  \ DAO 层应隐藏底层数据访问机制的所有技术特定细节，无论它是像 Hibernate 这样成熟的 ORM 工具、简单的 JDBC，还是更小众的技术，如对象数据库或像\
  \ Prevayler (www.prevayler.org) 这样的持久化系统。\n\nTechConf 应用程序基于 EJB3 的简单 DAO 实现基于以下几个简单的原则：\n\
  \n• **面向接口编程：** DAO 被定义为接口。这提供了在运行时插入不同实现的灵活性，并通过允许在没有数据库的情况下使用模拟测试对象来简化测试。\n\n\
  • **EJB3 组件模型：** 在 EJB3 中，带注解的组件是 POJO，作为 EJB3 环境中的组件，使您的 POJO 能够使用可用的容器服务。特别是，在实现\
  \ EJB3 TechConf DAO 时，通过注解声明式地连接应用程序的能力将派上用场。\n\n• **小型运行时异常层次结构：** 大多数数据访问异常是不可恢复的，并且大多数数据访问工具会抛出太多异常。由于我们力求\
  \ DAO 层设计的简单性，将使用一个以 RuntimeException 为根的简单且有意义的异常层次结构。\n\n• **少量 DAO：** 每个持久化实体对应一个\
  \ DAO 可能会产生一个并行的层次结构，该结构可能很快失控。我更喜欢使用一个更具内聚性的 DAO，它涵盖一组相关持久化实体的特定功能领域。\n\n• **强类型方法：**\
  \ 我相信（尤其是在大型团队中）在 DAO 中使用强类型方法可以使代码更具可读性，并最大限度地减少早期使用错误。\n\n图 5-9 显示了 TechConf 应用程序中使用的不同\
  \ DAO 接口。如您所见，与持久化实体的数量相比，TechConf 应用程序只需要少量的 DAO。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
