  \ Hibernate 会要求你加载所有关联的映射。这将导致 setUp 方法的初始化时间增加。在这种情况下，我建议你从 hibernate.cfg.xml 一次性加载所有映射，并将\
  \ SessionFactory 保持为一个静态单例，供所有测试类使用。\n\n**DbUnit**\n\n前一种方法的另一个明显问题是，需要用大量冗余代码来用测试数据填充数据库。虽然你可以使用\
  \ SQL 脚本来设置测试数据，但你仍然需要面对测试后检查数据库状态的任务。在前一种方法中，我们通过 Hibernate 映射的 POJO 间接测试了数据库结果。另一种方法是加载一些测试数据，对这些数据执行测试，检查数据库前后的状态，然后进行清理。\n\
  \n\n\n由 Manuel Laflamme 创建的 DbUnit 项目可在 www.dbunit.org 找到。DbUnit 提供了加载测试数据并在测试后验证数据库状态的功能。DbUnit\
  \ 使用 XML 文件提供测试数据。要加载数据，您必须首先将数据格式化为 DbUnit 特定的 XML 数据集格式。最简单的方法是从处于所需状态的现有数据库中导出数据。DbUnit\
  \ 包含一个导出实用程序和 Ant 任务来执行此操作。清单 8-19 展示了一个 Ant `macrodef`，它使用 DbUnit 导出子任务将数据库中的数据导出到\
  \ `setup/data/dbunit` 目录下名为 `dataExport.xml` 的文件中（名称和位置可覆盖）。此 `macrodef` 将被添加到第\
  \ 3 章创建的 `macros.xml` 文件中，并为创建 DbUnit 测试的数据集提供了一个良好的起点。生成的 XML 文件可以重命名并编辑以对应特定状态。例如，我喜欢使用将文件与特定测试关联起来的名称，比如\
  \ `beforeAddressTest.xml` 和 `afterAddressTest.xml`。\n\n该 `macrodef` 将 JDBC 信息以及要生成的\
  \ DbUnit XML 文件的目标路径和名称作为参数。\n\n**清单 8-19.** *用于数据导出的 DbUnit Ant Macrodef*\n\n<path\
