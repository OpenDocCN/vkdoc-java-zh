  Compiles all sources.\">\n\n...\n\n<javac\n\ndestdir=\"${classes}\"\n\nclasspathref=\"\
  class.path\"\n\ndebug=\"on\"\n\ndeprecation=\"on\"\n\noptimize=\"off\">\n\n<src>\n\
