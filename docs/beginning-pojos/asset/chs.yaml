  \n**数据库设置**\n\n对于本章中的简单示例，你需要设置一个 MySQL 实例。我在 Windows XP 机器上使用了版本 4.1.7-nt。网上有许多教程和大量书籍可以帮助你设置\
  \ MySQL，包括 Michael Kofler 所著的 *The Definitive Guide to MySQL 5*（Apress，2005 年）以及\
  \ Michael Kruckenberg 和 Jay Pipes 合著的 *Pro MySQL*（Apress，2005 年）。对于 JDBC 连接，我使用了\
  \ MySQL Connector/J 3.X JDBC 驱动程序，该驱动程序可从 MySQL 网站 http://dev.mysql.com 获取。\n\n\
  **快速入门**\n\n我们将完全手动创建第一个 POJO、Hibernate 映射文件和数据库表，以便让你了解将对象映射到表需要做哪些工作。在后续的示例中，你或许可以使用适合你开发风格的工具来简化这一过程。\n\
  \n**POJO 示例代码**\n\n简单的 Address POJO 遵循了基本且广为人知的 JavaBean 约定：通过 getter 和 setter 方法暴露私有字段。这部分很简单；对于\
  \ Hibernate 如何操作持久化对象而言，至关重要的是 equals 和 hashCode 方法的实现。这些方法的实现并非 Hibernate 特有的要求，但应该是任何\
  \ Java 业务对象的一部分。在 Bauer 和 King 合著的 *Hibernate in Action*（Manning，2005 年）一书中，他们详细解释了对象相等性、对象同一性和数据库同一性之间的区别。他们提倡在实现\
  \ equals 方法时，使用业务键相等性，即利用对表行具有唯一性的一个业务属性或一组业务属性。\n\n对于 Address POJO 而言，StreetAddress、State、ZipCode、City\
  \ 和 AptNumber 字段的组合标识了一个唯一的地址，如清单 4-1 所示。\n\n**清单 4-1.** *Address POJO*\n\npackage\
  \ com.integrallis.TechConf.domain;\n\n…\n\nimport org.apache.commons.lang.builder.EqualsBuilder;\n\
  \nimport org.apache.commons.lang.builder.HashCodeBuilder;\n\nimport org.apache.commons.lang.builder.ToStringBuilder;\n\
  \n…\n\npublic class Address implements Serializable {\n\n// 主键\n\nprivate Integer\
  \ id;\n\n// 字段\n\nprivate String streetAddress;\n\nprivate String state;\n\nprivate\
  \ String zipCode;\n\nprivate String city;\n\nprivate String aptNumber;\n\n// 构造方法\n\
  \npublic Address () {}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C04.fm Page 103 Wednesday, February 22, 2006 2:16 PM\n\n第 4 章 ■ 使用 Hibernate 进行对象关系映射\n\
  \n**103**\n\n// …getter 和 setter 方法\n\n/* 使用业务键相等性实现 equals 方法\n\n*\n\n* (non-Javadoc)\n\
  \n* @see java.lang.Object#equals(java.lang.Object)\n\n*/\n\npublic boolean equals\
  \ (Object object) {\n\n// 短路判断\n\nif (object == null) return false;\n\nif (this\
  \ == object) return true;\n\nif (!(object instanceof Address)) return false;\n\n\
  final Address address = (Address) object;\n\n//注意：始终对传入的对象使用 getter 方法，因为它可能是一个\
  \ Hibernate 代理\n\nreturn new EqualsBuilder().\n\nappend(streetAddress, address.getStreetAddress()).\n\
  \nappend(aptNumber, address.getAptNumber()).\n\nappend(city, address.getCity()).\n\
  \nappend(state, address.getState()).\n\nappend(zipCode, address.getZipCode()).\n\
  \nisEquals();\n\n}\n\npublic int hashCode () {\n\n// 选择一个硬编码的、随机选择的、非零的奇数\n\n\n\n\
  // 理想情况下，每个类都不同\n\nreturn new HashCodeBuilder(17, 37).\n\nappend(streetAddress).\n\
  \nappend(aptNumber).\n\nappend(city).\n\nappend(state).\n\nappend(zipCode).\n\n\
  toHashCode();\n\n}\n\npublic String toString () {\n\nreturn new ToStringBuilder(this).\n\
  \nappend(\"streetAddress\", streetAddress).\n\nappend(\"aptNumber\", aptNumber).\n\
  \nappend(\"city\", city).\n\nappend(\"state\", state).\n\nappend(\"zipCode\", zipCode).\n\
  \ntoString();\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
