  \ 377 Wednesday, February 22, 2006 1:23 PM\n\n第 10 章 ■ 其他主题\n\n**377**\n\n在 TechConf\
  \ 系统中，会议演讲者的博客条目可以显示在会议网站上。为了实现这一点，我们在 TechConf 应用中使用了一个简单的工具类，该类使用了 Informa API。RSSFeedManager\
  \ 类维护了一个静态的单例 FeedManager 实例。FeedManager 用于管理数据源。数据源通过 addFeed 方法添加到管理器中。使用 getFeed\
  \ 或 addFeed 请求检索数据源时，如果数据源是最新的，则会返回缓存副本；否则，将直接从源中检索。\n\n清单 10-4 展示了 RSSFeedManager\
  \ 类的完整代码。\n\n**清单 10-4.** *基于 Informa 的 RSSFeedManager*\n\npackage com.integrallis.techconf.rss;\n\
  \nimport java.util.ArrayList;\n\nimport java.util.Collection;\n\nimport java.util.Collections;\n\
