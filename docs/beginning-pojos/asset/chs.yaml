  \n**总结**\n\n在本章中，您了解了持续集成的价值。如果有一件事是明确的，那就是 CI 的成功在很大程度上取决于让开发者接受这样一个概念：不要将更改保留超过一天，并且测试优先的方法是衡量何时将代码签回的最简单方式。像\
  \ CruiseControl 这样的工具取代了过去开发者为了完成 CI 而拼凑的各种临时工具和 shell 脚本。\n\n在 CI 的情况下，自动化是采用的关键。花费在设置构建服务器上的时间将在未来为您和您的团队节省无数因生产力损失而浪费的时间。\n\
