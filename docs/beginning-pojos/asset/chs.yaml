  \ encoding=\"ISO-8859-1\" ?>\n\n<dtos>\n\n<dto target=\"com.integrallis.techconf.dto.TrackSummary\"\
  \ useProxy=\"yes\">\n\n<sources>\n\n<source type=\"com.integrallis.techconf.domain.Track\"\
