  **97**\n\n**图 4-6.** *数据模型驱动方法*\n\n**HBM 驱动方法**\n\n前两种方法，即采用领域模型或数据模型的方法，通常会导致生成的\
  \ HBM 映射不够完整。每次我在一个中等复杂度的应用中使用上述任何一种方法时，我都发现自己需要微调 HBM 文件，要么是为了获得更精确的 POJO（在数据驱动方法中），要么是为了获得更高效、更易管理的数据库模式（在\
  \ POJO 驱动方法中）。这里提出的第三种方法认为，对象关系映射是一个不可避免的、必要的“恶”，应该在应用程序开发的早期就以一种“迎头而上”的方式加以考虑。通过创建详细、准确的\
  \ HBM 文件，你最终将得到一个既能满足应用需求又能确保数据长期性的领域模型和数据库模式。这是迄今为止将领域模型映射到数据库最繁琐的方法，主要是因为它在很大程度上是一个手动过程。当然，根据你的对象模型和模式的复杂程度，你可以结合所概述的不同方法来最大化你的生产力，例如，对大部分领域对象映射使用两种自动化方法之一，而对少数特殊情况则采用手动创建的映射。图\
  \ 4-7 展示了 HBM 驱动方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
