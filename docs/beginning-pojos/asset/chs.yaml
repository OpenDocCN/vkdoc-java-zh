  \n@SuppressWarnings(\"unchecked\")\n\npublic List<ItemIF> getChannelItems(String\
  \ feedUri) {\n\nreturn new ArrayList<ItemIF>(getChannelForFeed(feedUri).getItems());\n\
  \n}\n\n@SuppressWarnings(\"unchecked\")\n\npublic List<ItemIF> getChannelItems(String\
  \ feedUri, int numberOfItems) {\n\nCollection items = getChannelForFeed(feedUri).getItems();\
  \ Collection<ItemIF> selected = Collections.EMPTY_LIST; if (items.size() <= numberOfItems)\
  \ {\n\nselected = items;\n\n}\n\nelse {\n\nselected = new ArrayList(numberOfItems);\n\
  \nfor (Iterator<ItemIF> i = items.iterator();\n\ni.hasNext() && (selected.size()\
  \ < numberOfItems);) {\n\nselected.add(i.next());\n\n}\n\n}\n\nreturn new ArrayList<ItemIF>(selected);\n\
  \n}\n\n}\n\n`RSSFeedManager` 类在 `ConferenceServiceBean` 中被用于检索整个会议（所有演讲者的所有博客条目）或特定演讲者的博客条目。遵循第\
