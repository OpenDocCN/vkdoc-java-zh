  \n第 3 章 ■ 使用 ANT 进行构建\n\n**63**\n\n**数据类型（Datatypes）**\n\nAnt 的数据类型是原始构造块，它们在处理构建文件时提供经常需要的信息。它们的目的是通过封装某些所需信息并提供一种简单的操作方式来简化任务。\n\
  \nAnt 的几个内置数据类型提供了一种结构，用于封装关于一组相关资源的信息，例如文件、环境变量，甚至是输入和输出文件之间的复杂映射。了解如何正确使用 Ant\
  \ 的数据类型将帮助你保持构建文件的简洁和高效。\n\n数据类型和属性实战：一个简单示例\n\n许多 Ant 任务需要操作一个文件或一组文件。构建中的一个典型需求是指定一组\
  \ JAR 文件，以便将其包含在某些任务的类路径中。假设你正在构建一个具有如图 3-4 所示目录结构的简单应用程序。\n\n**图 3-4.** *数据类型和属性的示例目录结构*\
  \ 清单 3-5 中的示例构建文件展示了一个构建，其中定义了两个路径结构（数据类型），一个的 id 为 `class.path`，另一个的 id 为 `all.source.path`。这两个数据类型随后在名为“compile”的目标中使用，该目标使用\
  \ `javac` 任务来编译由 id 为 `all.source.path` 的路径引用所引用的类。\n\n**清单 3-5.** *展示数据类型的简单 Ant\
  \ 构建文件*\n\n<?xml version=\"1.0\"?>\n\n<project name=\"My Project\" default=\"all\"\
  \ basedir=\".\">\n\n...\n\n<property name=\"lib\" location=\"lib\"/>\n\n<property\
  \ name=\"src\" location=\"src\"/>\n\n<property name=\"classes\" location=\"classes\"\
  />\n\n<property name=\"build\" location=\"build\"/>\n\n<property name=\"src-java\"\
  \ location=\"${src}/java\"/>\n\n<property name=\"src-test\" location=\"${src}/test\"\
  />\n\n<property name=\"some-lib\" location=\"${lib}/some-lib\"/>\n\n...\n\n<path\
  \ id=\"class.path\">\n\n<fileset dir=\"${lib}\">\n\n<include name=\"*.jar\"/>\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C03.fm 第 64\
