  \n现在我们有了设置 CI 的基础设施，可以将要构建的项目检出到 checkout 目录中。让我们通过从一个公开可用的 CVS 仓库中检出一个知名项目，并配置\
  \ CruiseControl 来构建它，从而开始探索 CruiseControl。\n\n对于这个例子，我选择了 Apache 基金会托管在 http://lucene.apache.org\
  \ 的热门项目 Lucene。我选择 Lucene 是因为它是一个非常活跃的项目，并且拥有全面的测试套件。要检出一份 Lucene 副本，请切换到 cc-work-dir/checkout\
  \ 目录并输入：\n\ncvs -d :pserver:anoncvs@cvs.apache.org:/home/cvspublic login 这是 CVS\
  \ 客户端命令，用于匿名登录到 java.net CVS 服务器。控制台将提示你输入密码，如下所示。匿名登录的密码是 anonymous。\n\nLogging\
  \ in to :pserver:anoncvs@cvs.apache.org:2401/home/cvspublic CVS password:\n\n现在要检出项目，请输入：\n\
  \ncvs -d :pserver:anoncvs@cvs.apache.org:/home/cvspublic checkout jakarta-lucene\
  \ 现在，你应该会在控制台上看到大量输出，因为 CVS 客户端正在将 Lucene 项目的一份副本检出到 checkout 目录下。检出完成后，我们可以通过切换到\
  \ checkout 目录下新创建的 jakarta-lucene 目录并输入以下命令来探索和测试构建：\n\nant –p\n\n这应该会显示 Lucene\
  \ 构建文件中可用的目标，如下所示。\n\nBuildfile: build.xml\n\nMain targets:\n\nclean Removes contents\
  \ of build and dist directories compile-core Compiles core classes\n\ngenerate-test-reports\
  \ Generates test reports\n\njar-core Generates the Jar file\n\n\n\npackage-all-binary\
  \ --> 生成 .tar.gz 和 .zip 格式的发行包\npackage-all-src --> 生成 .tar.gz 和 .zip 格式的源码发行包\n\
  package-tgz --> 生成 Lucene 的 .tar.gz 格式发行包\npackage-tgz-src --> 生成 Lucene 的 .tar.gz\
  \ 格式源码包\npackage-zip --> 生成 Lucene 的 .zip 格式发行包\npackage-zip-src --> 生成 Lucene 的\
  \ .zip 格式源码包\ntest 运行单元测试\n\ntest-deprecated 运行已弃用的单元测试\n\n默认目标：default\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C09.fm Page 352 Thursday, February 16, 2006 3:35 PM\n\n**352**\n\
  \n第 9 章 ■ 持续集成\n\n如您所见，Lucene 项目提供了用于编译和测试应用程序的目标。通过输入 `ant test` 手动测试构建。如果构建在命令行中能正确运行，那么当由\
  \ CruiseControl 构建循环调用时，它也应该能正常工作。\n\n接下来，我们将创建一个 CruiseControl 将使用的小型 Ant 构建脚本。这个委托构建脚本（如清单\
  \ 9-1 所示）将在从 CVS 仓库获取最新代码库副本后，调用 Lucene 项目的构建。请注意，`basedir` 属性被设置为我们要构建的项目目录。将此构建文件命名为\
  \ `build-jakarta-lucene`，并将其放置在 `cc-work-dir` 目录中。在此示例构建文件中，我选择仅从 CVS 更新现有代码库，而不是删除\
  \ `jakarta-lucene` 目录并从头检出项目。许多专家建议这样做，因为否则你将依赖构建具有重置或清理先前构建运行产生的任何工件的能力。关于良好 Ant\
  \ 清理目标的重要性，请参见第 3 章。\n\n**清单 9-1.** *用于 CruiseControl 自动化的委托构建文件*\n\n<project name=\"\
  cc-lucene-build\" default=\"test\" basedir=\"checkout/jakarta-lucene\">\n\n<target\
  \ name=\"cvs\">\n\n<cvs command=\"up –d –P\"/>\n\n<ant antfile=\"build.xml\" target=\"\
  clean\" />\n\n</target>\n\n<target name=\"test\" depends=\"cvs\">\n\n<ant antfile=\"\
  build.xml\" target=\"test\" />\n\n</target>\n\n</project>\n\n您可以通过将目录更改为 `cc-work-dir`\
  \ 并输入 `ant -f build-jakarta-lucene` 来测试该脚本。\n\n有了委托构建脚本后，我们可以继续增强之前创建的空 XML 配置。CruiseControl\
  \ 使用 XML 配置来确定要构建哪些项目，以及为任何给定项目启用哪些报告和警报功能。\n\n配置文件默认名为 `config.xml`，尽管您可以使用任何其他名称，并在运行\
  \ CruiseControl 脚本（`cruisecontrol.sh` 或 `cruisecontrol.bat`）时使用 `configfile` 命令行参数。配置\
  \ XML 文件如清单 9-2 所示，其格式在 http://cruisecontrol.sourceforge.net/main/configxml.html\
  \ 有正式文档说明。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C09.fm Page 353 Thursday, February 16, 2006 3:35 PM\n\n第 9 章 ■ 持续集成\n\n**353**\n\
  \n**清单 9-2.** *CruiseControl XML 配置文件*\n\n<cruisecontrol>\n\n<project name=\"jakarta-lucene\"\
  \ buildafterfailed=\"true\">\n\n<listeners>\n\n<currentbuildstatuslistener file=\"\
  logs/jakarta-lucene/status.txt\"/>\n\n</listeners>\n\n<modificationset quietperiod=\"\
  60\">\n\n<cvs localworkingcopy=\"checkout/jakarta-lucene\"/>\n\n</modificationset>\n\
  \n<schedule interval=\"60\" >\n\n<ant\n\nbuildfile=\"build-jakarta-lucene.xml\"\n\
  \ntarget=\"test\"\n\nuselogger=\"true\"\n\nusedebug=\"false\"\n\n/>\n\n</schedule>\n\
  \n<log dir=\"logs/jakarta-lucene\">\n\n<merge dir=\"checkout/jakarta-lucene/build/test/\"\
  \ />\n\n</log>\n\n</project>\n\n</cruisecontrol>\n\nCruiseControl 文件可以包含零个或多个项目。在每个项目元素中，您可以定义要执行的委托构建脚本、检查仓库变更的频率以及如何报告构建尝试的结果。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C09.fm Page\
  \ 354 Thursday, February 16, 2006 3:35 PM\n\n**354**\n\n第 9 章 ■ 持续集成\n\n\n\n让我们逐一解析\
  \ config.xml 文件中的元素。以 Lucene 的示例为例，`listeners` 元素包含一个监听器，用于将当前构建状态记录到 `status.txt`\
  \ 文件中。\n\n<listeners>\n\n<currentbuildstatuslistener file=\"logs/jakarta-lucene/status.txt\"\
  />\n\n</listeners>\n\n接下来，`modificationset` 元素指定了 CruiseControl 应检查何处以确定是否触发构建。在该示例中，CruiseControl\
  \ 将检查项目的本地工作副本是否有变更。`quietperiod` 属性决定了 CruiseControl 等待确认项目无新提交的时间（以秒为单位）。请根据团队习惯设置此参数。例如，我喜欢将此参数设为约\
  \ 120 秒，因为我习惯花时间撰写提交注释。\n\n<modificationset quietperiod=\"60\">\n\n<cvs localworkingcopy=\"\
  checkout/jakarta-lucene\"/>\n\n</modificationset>\n\n`schedule` 元素的 `interval` 属性决定了\
  \ CruiseControl 检查修改集以确定是否运行构建的频率。请根据构建机器上的项目数量以及这些项目的优先级和变更频率来设置此属性。\n\n`ant` 元素是在判定需要构建时可能执行的操作之一。\n\
  \n此处我们调用了为 Lucene 项目创建的委托构建文件。\n\n<schedule interval=\"60\" >\n\n<ant\n\nbuildfile=\"\
  build-jakarta-lucene.xml\"\n\ntarget=\"test\"\n\nuselogger=\"true\"\n\nusedebug=\"\
  false\"\n\n/>\n\n</schedule>\n\n最后，`log` 元素指定了 CruiseControl 日志的存放目录。`merge` 元素告诉\
  \ CruiseControl “合并” Lucene 项目构建过程中生成的 JUnitReport XML 文件。对于 Lucene 项目，这些文件位于 `build/test`\
  \ 目录下。你可以通过检查 `build.xml` 或直接运行构建并搜索报告来确定这一点。\n\n<log dir=\"logs/jakarta-lucene\"\
  >\n\n<merge dir=\"checkout/jakarta-lucene/build/test/\" />\n\n</log>\n\n一切设置就绪后，让我们启动\
  \ CruiseControl 并观察它构建 Lucene 项目。\n\n与之前一样，切换到 CruiseControl 工作目录并执行 `cruisecontrol.sh`\
  \ 脚本。在输出中，你应该能看到从 CVS 获取项目源码以及构建执行的过程。\n\n刷新 CruiseControl 报告 Web 应用程序，应该会显示 Lucene\
  \ 项目，如图 9-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00015.png)\n\
  \n![](img/00109.png)\n\nSam-Bodden_596-3 C09.fm Page 355 Thursday, February 16,\
  \ 2006 3:35 PM\n\n第 9 章 ■ 持续集成\n\n**355**\n\n**图 9-4.** *CruiseControl 下的一个项目*\n\
  \nCruiseControl 报告应用程序提供了关于上次构建时间以及构建是否成功的信息。如果我们进一步点击项目名称链接深入查看，会看到一个包含五个选项卡的页面：构建结果、测试结果、XML\
  \ 日志文件、指标和 JMX 控制面板。\n\n在“构建结果”页面中，你可以找到构建过程中产生的错误和警告信息、运行测试套件结果的常规信息，以及自上次成功构建以来的所有修改摘要。图\
  \ 9-5 显示了 Lucene 项目的单元测试摘要。\n\n**图 9-5.** *构建结果页面下的单元测试摘要* “测试结果”页面提供了每个已执行测试的更详细视图，包括执行时间。图\
  \ 9-6 显示了 Lucene 项目的测试结果页面。\n\n“指标”页面提供了一个历史图表，显示成功与失败构建随时间分布的对比，以及一个显示成功与失败构建百分比的饼图。这个视图是编程经理们的最爱。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00057.png)\n\nSam-Bodden_596-3\
  \ C09.fm Page 356 Thursday, February 16, 2006 3:35 PM\n\n**356**\n\n第 9 章 ■ 持续集成\n\
  \n\n\n**图 9-6.** *单元测试详情*\n\n**通知机制**\n\nCruiseControl 提供了多个发布器，可在构建完成后生成特定类型的输出。示例\
  \ config.xml 中使用的监听器会将最新的构建结果通知给 CruiseControl 报告 Web 应用程序。通常在大多数开发团队中，开发人员在通过更直接的方式（如电子邮件）收到构建失败通知后，会使用该\
  \ Web 应用程序来解决问题。\n\n电子邮件是用于发布构建结果的典型渠道之一。CruiseControl 提供了两种类型的电子邮件发布器。简单的电子邮件发布器可以生成纯文本电子邮件，而更流行的\
  \ htmlemail 则可以生成包含指向报告 Web 应用程序超链接的电子邮件。HTML 电子邮件是通过一组 XSLT 模板生成的。您可以通过提供自己的 XSLT\
  \ 文件来转换原始 XML，从而自定义生成的 HTML 电子邮件。\n\n清单 9-3 展示了 HTML 电子邮件发布器的典型配置。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
