  \ 引言\n\n**建模最佳实践**\n\n模型驱动开发是一项需要时间才能掌握的实践，但其成果绝对值得付出努力。我根据文献资料和自身经验整理了一份最佳实践清单，希望能帮助你入门。\n\
  \n• 保持模型简洁。不要过度建模。\n\n• 在模型中使用颜色。颜色能极大地提升你快速把握模型静态和动态元素的能力。\n\n• 谨慎选择模型元素名称。模型名称会对后续将其转化为代码的人产生重大影响。\n\
  \n• 在分析模型中避免使用设计或实现特定的结构。\n\n• 保持模型与源代码同步。增量式的变更更容易整合。\n\n• 在建模中，单一视图是不够的。应使用一组相互独立的视图来处理复杂系统。\n\
  \n• 最好的模型与现实相连，而现实总是充满权衡。在建模系统时，灵活性和性能有时会相互冲突。\n\n• 在模型的生命周期中，总会有某个阶段，细节的详细程度只能通过代码来表达。确保不要陷入试图用图形化方式建模那些本可以轻松编码的内容。UML\
  \ 注释是在模型层面解决部分此类问题的绝佳方式。\n\n**开源工具**\n\n构建 TechConf 项目所选择的工具，源于我构建 Java EE 应用程序的经验，以及\
  \ Java 社区中众多同事、读者、演讲者和作者积累的集体知识。这里列出的选择并非一套放之四海而皆准的项目集合（尽管有些工具，如 Ant，对大多数 Java 应用来说是必备的），而是我发现能够满足当前需求，并注入一定敏捷性的工具组合，这是我仅靠纯商业解决方案无法实现的。我并非主张你采取片面的方法，试图完全依赖开源来构建一切。在我大多数专业项目中，我的客户已经选定了商业解决方案，但他们希望借助开源来补充其商业采购。总的来说，我发现我在每个任务中使用的开源项目组合，其构建目的通常围绕以下几点：\n\
  \n• 填补商业解决方案的空白\n\n• 基于已知且经过验证的方法进行标准化\n\n• 避免供应商锁定\n\n• 提高团队生产力\n\n• 简化产品维护\n\n\
