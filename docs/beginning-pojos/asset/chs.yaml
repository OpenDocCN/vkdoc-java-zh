  ISO-8859-1\"?>\n\n<web-app\n\nxsi:schemaLocation=\"http://java.sun.com/xml/ns/j2ee\
  \ web-app_2_4.xsd\"\n\nversion=\"2.4\">\n\n<display-name>tapestry-time</display-name>\n\
  \n<servlet>\n\n<servlet-name>tapestry-time</servlet-name>\n\n<servlet-class>org.apache.tapestry.ApplicationServlet</servlet-class>\n\
