  <fileset dir=\"${some-lib}\">\n\n<include name=\"*.jar\"/>\n\n</fileset>\n\n</path>\n\
  \n<path id=\"all.source.path\">\n\n<pathelement path=\"${src-java}\"/>\n\n<pathelement\
