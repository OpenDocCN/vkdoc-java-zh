  \ 元素，并显示了 component 元素的详细信息。\n\n**图 7-4.** *page-specification 元素的 DTD 定义* Home.page\
  \ 文件指定了以下内容：\n\n• 这是 Home 页面的页面规范，这可以从文件名 Home.page、关联的 Home.html 模板以及 page-specification\
  \ 元素的 class 属性中定义的类 com.integrallis.time.Home 推断出来。\n\n• 它定义了一个 id 为“time”的组件，该组件类型为\
  \ Insert。\n\n• time 组件将表达式 ognl:time 的值绑定到组件的 value 属性上。\n\n**Web 部署描述符**\n\n与任何\
  \ Java Web 应用程序一样，你需要在 WEB-INF 目录中放置一个 Web 部署描述符（web.xml）。与大多数 Web 框架一样，框架的入口点是一个\
  \ Servlet。在 Tapestry 中，这个 Servlet 是 org.apache.tapestry.ApplicationServlet。在 Tapestry\
  \ 应用程序中，你需要以应用程序的名称来命名 ApplicationServlet；在我们的例子中，如清单 7-4 所示，servlet-name 元素的值是“tapestry-time”。\n\
  \n第一个 servlet-mapping 将 URL 模式/app 映射到 Tapestry 应用程序 Servlet。\n\n其余映射的用途将在我们逐步完成示例时变得清晰。\n\
  \n最后，在描述符的末尾，我们有 welcome-file 元素，其中我们将文件 Home.html 声明为欢迎文件。请注意，还有一个 servlet 映射将*.html\
  \ 映射到 Tapestry 应用程序 Servlet。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
