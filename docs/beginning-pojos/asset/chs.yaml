  \n**169**\n\n**图 5-10.** *TechConf DAO 异常层次结构*\n\n**使用 DynaDTO 实现 DTO 模式**\n\n在企业级\
  \ Java 应用程序中，我们通常还会遇到另一种模式：数据传输对象模式（DTO），也称为值对象模式。当中间层的客户端需要交换数据时（传统上通过基于 EJB 的服务层），就会使用\
  \ DTO。\n\n**背景**\n\nDTO 通常是用于层间通信的轻量级对象。通常，在面向对象、分布式且由中间件驱动的 Web 应用程序中，存在三个众所周知的层，它们由我定义为两个转换层的部分连接。这三个层通常被称为*集成*层（和/或数据层）、*业务*层（业务/领域对象所在之处）和*表示*层（对于\
  \ Web 应用程序，即 Web 层）。在这三个层之间，我们通常会遇到两个转换层：\n\n• **O/R 转换层：** 位于关系数据库和中间件托管的领域对象（统称为领域模型）之间\n\
  • **DTO 转换层：** 位于领域模型和用户模型之间。我们将用户模型定义为 Web 层为与中间层交互而操作的对象集合。\n\n基于许多企业级 Java 应用程序的多层、分布式特性所引发的问题，架构师和开发人员逐渐认识到\
  \ DTO 模式的必要性，这些问题包括：\n\n• **粗粒度实体：** 像实体 EJB 这样的粗粒度技术不应由 Web 层直接操作，因为每次访问都可能成为远程调用。根据应用程序的时间拓扑结构（如共置或特定于供应商的优化），这可能导致可移植性问题和不稳定的架构。\n\
  \n• **细粒度实体：** 一个设计良好的领域模型所反映的问题域信息，通常比暴露给客户端的信息更多。领域模型应代表问题/解决方案域知识的一个子集。Martin\
  \ Fowler 创造了“贫血领域模型”一词，用来指代领域模型缺乏行为的反模式。\n\n我们经常看到许多“被污染”的领域模型，它们要么被数据层污染，要么被表示层污染。为了加速开发，关注点分离通常被忽视。\n\
  \n换句话说，用户界面应该处理那些为便于用户界面操作而设计的对象。你不应为了满足用户界面的需求而损害领域模型的完整性。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C05.fm Page 170 Wednesday, February 22, 2006 6:13 AM\n\n**170**\n\
  \n第 5 章 ■ 使用 JBoss 的业务服务\n\n• **批量传输：** 分布式带来了大量问题，包括需要通过批量数据传输来最小化网络流量。受层间交换数据粒度影响的其他典型问题还包括分页方案和缓存。\n\
  \n这些问题引导我们走向实现 DTO 模式背后的驱动力：\n\n• 使用粗粒度技术（如实体 EJB）访问远程对象的字段时，存在潜在的远程调用。\n• Web 应用程序通常是“以读取为主，偶尔保存更新”。\n\
  • 每页的查看需求通常由来自多个领域对象的多个属性组成。传输满足这些需求所需的所有领域对象，可能导致跨层序列化一个庞大的对象图。\n• 手工编码的 DTO 意味着需要编写代码来在运行时实例化\
  \ DTO，并从单个或多个来源填充其值。\n\n开发人员通常最终会创建与领域实体相对应的轻量级对象。他们创建传输对象来封装业务数据。对于大多数用例，这转化为每个用例对应一个\
  \ DTO，该 DTO 封装了用户界面的需求。DTO 模式的传统实现仍然存在一些不良副作用，包括：\n\n\n\n• **并行对象层次结构：** 正如 Hibernate\
  \ 项目的 Gavin King 所指出的，维护一个并行的类层次结构是“有坏味道的”。我们认为这表明领域模型已被 Web 层需求或底层数据模型的影响所扁平化。尽管领域对象与\
  \ DTO 之间会存在明显的相似之处，但我们相信，一个设计良好的领域模型在结构和内容上都应与 DTO 模型有较大差异。请记住，领域模型应在处理同一问题域的不同应用程序之间可重用。\n\
  \n• **代码维护：** 我们发现，维护这些转换和传输对象会给项目增加相当多的开销。我们认为这个问题类似于维护自定义对象关系映射层的问题。\n\n**DynaDTO**\n\
  \n对于 TechConf DTO 层的实现，我使用了 DynaDTO (https://dynadto.dev.java.net/)，这是一个解决屏幕与领域映射问题的方案，类似于\
  \ Hibernate 解决对象关系映射问题。DynaDTO 项目提供了一个库，使您能够动态生成实现给定 Java 接口的 DTO。\n\nDynaDTO 旨在减轻手动编写\
  \ DTO 的负担，它有助于在应用程序领域模型和用户界面之间强制实施关注点分离，减少了实现该模式所需的代码量，并提供了一种一致的方式来声明性地定义领域模型与用户界面模型（即您的\
  \ DTO）之间的简单和复杂映射。\n\nDynaDTO 通过一个 XML 文件进行配置，该文件为给定的 DTO 配置 DTO 构建器工厂。DTO 构建器工厂提供\
  \ DTO 构建器，这些构建器可以从一个或多个领域对象（任何 JavaBean 或 POJO）构造给定类型的 DTO。DynaDTO 配置文件使用简单的属性映射（DTO\
  \ 也可以使用 Java 进行内联配置）、嵌套属性以及使用 Jakarta Commons Java 表达式语言（JEXL，位于 http://jakarta.apache.org/commons/jexl/）的表达式。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C05.fm Page\
  \ 171 Wednesday, February 22, 2006 6:13 AM\n\n第 5 章 ■ 使用 JBoss 的业务服务\n\n**171**\n\
