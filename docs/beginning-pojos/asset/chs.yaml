  \ ■ 使用 JBOSS 的业务服务\n\npublic java.lang.String list(boolean verbose)\n\nJavadoc 还揭示了该方法的目的：“列出已部署应用程序的\
  \ java:comp 命名空间、java:namespace 以及全局 InitialContext JNDI 命名空间。”\n\n■**提示** 将 JBoss\
  \ Javadoc API 加入书签会很有用，因为 JMX 控制台不提供 MBean 方法的详细信息。\n\n**服务对象**\n\n在过去几年中，轻量级容器与敏捷技术的结合已成为\
  \ Java 企业开发中追求的新标准。但“轻量级”Java 意味着什么呢？我认为轻量级 Java 是将基于 POJO 和 POJI 的丰富面向对象模型的简化编程模型，与响应式、侵入式但健壮且功能齐全的组件容器相结合。\n\
  \n对于诸如 Spring 框架、PicoContainer 和 NanoContainer 提供的轻量级容器，公认的概念是它们具有较小的内存占用、快速的启动时间，以及无需重启服务器即可热部署组件和应用程序的能力。要实践轻量级\
  \ Java，是否必须使用传统的轻量级容器？在我看来，只要服务器的内存占用或启动时间在合理范围内，轻量级 Java 更关乎编程模型以及缩短代码-编译-部署-测试周期的能力，而非内存占用或启动时间。在这种情况下，轻量级\
  \ Java 有助于提高开发人员生产力的主要特性是：一种不强制您的业务和领域对象遵循任何特定组件模型的编程模型，允许您使用诸如面向接口编程等长期公认的最佳实践，并且能够以透明的方式为容器中的组件提供容器服务，同时不损害它们在容器外的可用性或可测试性。\n\
  \nEJB3 规范是吸取了通过减少先前规范中引入的不必要复杂性来使 Java 更轻量、更敏捷这一运动的经验教训的产物。结合 JSR-175 元数据工具以及 IoC/DI\
  \ 和 AOP 等技术，它使 JBoss AS 成为一个支持轻量级和敏捷开发的平台。\n\n在 EJB3 开发中，组件就是 POJO，POJO 就是组件。通过使用注解形式的元数据，任何\
  \ POJO 都可以享受传统托管服务对象所具有的优势，例如松散耦合、网络独立性以及透明地使用资源池的能力。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C05.fm 第 155 页 2006 年 2 月 22 日星期三 上午 6:13\n\n第 5 章 ■ 使用 JBOSS\
  \ 的业务服务\n\n**155**\n\n**无状态会话 Bean**\n\n对于大多数 Java EE 应用程序而言，无状态会话 Bean（SLSB）已成为暴露中间层服务的标准方式。结合会话外观、数据传输对象（DTO）、命令模式和数据访问对象（DAO）的设计/实现模式，是定义应用程序功能的一种方式。\n\
  \n在 EJB 规范的早期版本中，我们有太多可移动的部件，以至于开始项目变成了一项乏味的练习。幸运的是，在 EJB 3.0 中，选择了阻力最小的路径，要创建一个\
  \ SLSB，我们只需拥有一个实现（至少一个）描述所提供服务的 POJI 的 POJO 即可。\n\n您可以简单地拥有一个业务接口 Business.java\
  \ 和一个 Bean 实现 BusinessBean.java。\n\n■**注意** Bean 类可以实现也可以不实现业务接口，尽管我建议您使用接口来定义应用程序层和组件之间的契约。如果您选择不实现任何业务接口，则会使用所有公共方法动态生成一个业务接口。\n\
  \n如果只有某些方法应该在业务接口中暴露，则所有这些方法都可以用 @BusinessMethod 注解标记。\n\n一旦我们有了这个契约，我们需要做的就是使用\
  \ EJB3 注解 @Stateless 来注解 POJO 类。这将把此类标记为 SLSB，以便在部署时，JBoss EJB3 容器可以为我们的简单类提供所有企业服务。但是，为了保持我们的接口不包含任何特定于\
  \ EJB 的注解，我们可以继承业务接口，以提供特定的接口作为远程和本地接口。为此，我们可以创建两个接口，分别命名为 BusinessRemote.java 和\
  \ BusinessLocal.java，并用 @javax.ejb.Remote 和 @javax.ejb.Local 分别注解它们。\n\n\n\n遵循“约定优于配置”的趋势，JBoss\
  \ 默认会使用接口的全限定名作为 JNDI 名称，将 Bean 绑定到 JNDI。这使得代码更加健壮和简单，因为 JNDI 查找只需对给定接口使用 Class\
  \ 对象的 `getName()` 方法即可，例如：`BusinessRemote.class.getName();`。\n\n为了使我们的会话 Bean 能被正确处理，必须首先将其部署。在\
  \ JBoss 4 中，EJB3 非持久化组件被打包在扩展名为 `.ejb3` 的常见 JAR 归档中。构建时无需预编译步骤；所有增强工作都在部署时由 JBoss\
  \ EJB3 部署器处理。图 5-7 展示了 EJB3 规范的结构和特性的高级视图。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00037.png)\n\nSam-Bodden_596-3 C05.fm 第 156 页 2006 年 2 月 22 日星期三 上午 6:13\n\
  \n**156**\n\n第 5 章 ■ 使用 JBOSS 的业务服务\n\n**图 5-7.** *EJB3 高级特性*\n\n您可能会好奇，在 2.X 版\
  \ EJB 实现中所需的各种不同方法（例如为 Bean 生命周期管理提供的回调方法）在 3 版中去了哪里。在 EJB3 中，这些方法大部分被替换为应用于 Bean\
  \ 类中任何方法上的注解，以将其视为生命周期回调方法。在 EJB3 中，容器会自动调用这些被注解的方法。EJB3 中可用的注解在表 5-1 中进行了描述。\n\n\
