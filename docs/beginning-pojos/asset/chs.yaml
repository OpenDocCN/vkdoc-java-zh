  \ 方法会排除所有零值（null 或 0）属性出现在查询中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C04.fm Page 117 Wednesday, February 22, 2006 2:16 PM\n\n第 4 章\
  \ ■ 使用 Hibernate 进行对象关系映射\n\n**117**\n\n按条件查找对象\n\n我们将讨论的最后一个查询 API 是条件 API，它提供了一种非常复杂且面向对象的方式来构建查询。HQL\
  \ 相比 SQL 是一个巨大的进步，因为它让我们能够像操作对象数据库一样与关系数据库交互，但它仍然是一种非 Java 的查询语言。因此，作为 Java 开发人员，在使用直接\
  \ JDBC 和纯 SQL 时遇到的同样问题依然存在。并非我们所有人都是 SQL 专家。此外，当涉及多个数据库平台时，SQL 的差异可能很大，尤其是在触及规范边界并进入特定于供应商的扩展领域时。\n\
  \nHibernate 条件 API 提供了一种无需使用特定查询语言，通过链式调用简单方法和充当结果集过滤器的简单对象来创建查询的方式。清单 4-13 展示了一些条件查询的示例。\n\
  \n**清单 4-13.** *按条件查询*\n\n// retrieve all addresses\n\nList<Address> allAddresses\
  \ = session.createCriteria(Address.class).list();\n\n// retrieve all addresses for\
  \ the state of ohio\n\nList<Address> addressesInOH = session\n\n.createCriteria(Address.class)\n\
  \n.add(Expression.eq(\"State\", \"OH\"))\n\n.list();\n\n// retrieve the first 23\
  \ addresses where the city is like\n\n// 'Columbus' and the street address is like\
  \ 'main' and\n\n// order them by state\n\nList<Address> addresses = session\n\n\
  .createCriteria(Address.class)\n\n.add(Expression.like(\"StreetAddress\", \"main\"\
  ))\n\n.add(Expression.like(\"City\", \"Columbus\"))\n\n.addOrder(Order.asc(\"State\"\
  ))\n\n.setFirstResult(0)\n\n.setMaxResults(25)\n\n.list();\n\n如您所见，Hibernate 中的\
  \ QBC 和 QBE 功能可以通过消除应用程序中复杂的非 Java SQL 和类似 SQL 的代码，使您的代码更清晰、更易于维护。在实现 TechConf 应用程序中间/集成层的\
  \ DAO 模式时，我们将广泛使用 Hibernate 条件 API。\n\n■**注意** 如果您在应用程序中大量使用 HQL，建议您将查询外部化，放在 HBM\
  \ 文件中。Hibernate 可以在运行时定位命名查询，这将使您的代码更简洁、更不复杂，避免复制粘贴式的重用，并为您的查询提供集中控制。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
