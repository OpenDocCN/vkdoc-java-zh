  \ 以及最近的 Wicket。\n\n**安装和配置 Spring**\n\nSpring 框架以 ZIP 文件形式分发，其中包含源代码、预打包的 JAR 文件和支持文件，可在\
  \ www.springframework.org/download 获取。有两种可用的下载类型，一种包含所有第三方（开源）依赖项，另一种不包含。\n\n我建议你下载包含所有依赖项的版本。在撰写本文时，该归档文件为\
  \ spring-framework-1.2.5-with-dependencies.zip。在该归档文件中，你会找到八个文件夹：\n\n• **dist：**\
  \ Spring 框架分发文件\n• **docs：** 参考和 API 文档以及 Spring MVC 教程\n• **lib：** 所有第三方依赖项，按项目/产品组织\n\
