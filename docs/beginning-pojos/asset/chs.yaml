  \n}\n\nprivate String greeting;\n\n}\n\n在传统的紧密耦合 Java 应用中，开发者通常会声明一个`GreetingService`类型的属性（有时甚至忽略接口，直接暴露`GreetingServiceImpl`的实例）。然后，要么使用接受`greeting`属性的构造函数，要么使用无参构造函数配合`setGreeting`方法，在使用前配置好该实例。\n\
  \n这种紧密耦合的问题在测试时会变得尤为突出，特别是当某个资源的具体实现依赖于外部因素（如数据库、JNDI 上下文或远程 Web 服务）时。当然，在多次目睹这种模式重复出现后，你可能会选择使用属性文件或其他外部化系统可变参数的方式，来实现自己的底层连接机制。\n\
  \n在最底层，这是 Spring 框架最简单的功能，只不过 Spring 框架的创建者已经经历了所有演化步骤，将一个简单的工具变成了一个应用框架。例如，在清单\
  \ 6-3 中，我们有一个简单的 Spring XML 配置文件。根元素是`beans`，它包含一个或多个`bean`元素。在这个简单文件中，单个`bean`元素定义了一个\
  \ id 为`greetingService`的 bean，由`GreetingServiceImpl`类实现，并通过`setGreeting`设置方法将`greeting`属性的值设为“Hello”。\n\
  \n**清单 6-3.** *简单的 Spring 配置*\n\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\n\
