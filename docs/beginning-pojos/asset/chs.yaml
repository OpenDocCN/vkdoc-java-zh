  \n</bean>\n\n**创建 JSP 视图**\n\n配置好控制器后，我们可以将注意力转向视图。`ModelAndView` 构造函数调用的第一个参数是视图的名称，该名称将由框架的视图解析器解析。或者，`ModelAndView`\
  \ 也可以通过引用视图对象来构造。`conferenceList` 视图由清单 6-29 中所示的 `conferenceList.jsp` 页面表示。所有 JSP\
  \ 页面都存储在 Web 应用程序 `WEB-INF` 目录下名为 `jsp` 的目录中。\n\n**清单 6-29.** *JSP 视图 conferenceList.jsp*\n\
  \n<%@ page contentType=\"text/html; charset=UTF-8\" %>\n\n<%@ taglib uri=\"http://java.sun.com/jsp/jstl/core\"\
  \ prefix=\"c\" %>\n\n<p>当前可用的会议</p>\n\n<ul>\n\n<c:forEach var=\"conference\" items=\"\
  ${conferences}\">\n\n<li>\n\n<a href=\"displayConference.htm?id=${conference.conferenceId}\"\
  > ${conference.conferenceTitle}\n\n</a>\n\n</li>\n\n</c:forEach>\n\n</ul>\n\n在 `conferenceList.jsp`\
  \ 页面中，我们使用核心 JSTL `forEach` 标签来遍历 `ConferenceSummary` DTO 列表（通过 `${conferences}`\
  \ 访问）。对于每个对象，我们创建一个指向 `displayConference.html` 页面的链接，显示 `conferenceTitle`，并将 `conferenceId`\
  \ 字段作为参数 `id` 传递。\n\n**使用 Tiles**\n\n对于 TechConf 应用程序，我们将使用 Tiles 框架配置视图解析。\n\n\
  在典型的网站中，每个页面都会有共同的元素，例如页眉、页脚和导航菜单。Tiles 是一个框架，它支持在基于 JSP 的 Web 应用程序中使用模板布局和重用公共元素。Spring\
  \ MVC 与 Tiles 无缝集成。清单 6-30 显示了在应用上下文中配置和使用 Tiles 所需的配置元素。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
