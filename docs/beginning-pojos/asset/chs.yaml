  \ http://beust.com/testng/testng-1.0.dtd 的 DTD 所定义的 XML 文件结构。\n\n**图 8-3.** *TestNG\
  \ DTD*\n\n针对前述测试的最简单的 testng.xml 如清单 8-5 所示。该 XML 文件定义了名为“My Suite”的套件，其中包含一个名为“Simple\
  \ Test”的测试，该测试又包含一个待测试的类。TestNG 将扫描列出的类以查找注解。\n\n**清单 8-5.** *TestNG XML 配置*\n\n\
  <!DOCTYPE suite SYSTEM \"http://beust.com/testng/testng-1.0.dtd\" >\n\n<suite name=\"\
  My Suite\">\n\n<test name=\"Simple Test\">\n\n<classes>\n\n<class name=\"GreeterTest\"\
  \ />\n\n</classes>\n\n</test>\n\n</suite>\n\n要使用 testng.xml 运行测试，请使用如下所示的简单命令行：java\
  \ –ea -cp bin;lib/testng/testng-4.3-jdk15.jar org.testng.TestNG testng.xml **分组**\n\
  \nTestNG 配置的强大之处在于分组的概念。一个测试方法可以被声明为属于一个或多个分组。让我们看一个涉及三个类的示例，如清单 8-6、8-7 和 8-8 所示。\n\
