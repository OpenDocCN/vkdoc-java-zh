  \n**管理状态**\n\n`ConferenceBorder` 还负责登录和注销功能。为了处理保持已登录用户的状态，我们在 HiveMind 配置中声明了一个状态对象贡献。\n\
  \n该状态对象是一个简单的 POJO，可以通过 ID `logged-in-user-data` 引用，并映射到 `com.integrallis.techconf.web.tapestry.domain`\
  \ 包中的 Java 类 `LoggedInUser`。该对象的作用域是会话，这正好符合用户登录的生命周期。此贡献的配置 ID 为 `tapestry.state.ApplicationObjects`。这里的“贡献”一词意味着\
  \ HiveMind 正在向 Tapestry 特定的配置做出贡献，在本例中是 Tapestry 应用程序对象，如清单 7-21 所示。\n\n**清单 7-21.**\
  \ *使用 HiveMind 配置应用程序状态对象*\n\n```xml\n<?xml version=\"1.0\"?>\n\n<module id=\"app\"\
  \ version=\"1.0.0\" package=\"com.integrallis.techconf\">\n\n...\n\n<contribution\
  \ configuration-id=\"tapestry.state.ApplicationObjects\">\n\n<state-object name=\"\
  logged-in-user-data\" scope=\"session\">\n\n<create-instance\n\nclass=\"com.integrallis.techconf.web.tapestry.domain.LoggedInUser\"\
  \n\n/>\n\n</state-object>\n\n...\n\n</contribution>\n\n...\n\n</module>\n```\n\n\
  清单 7-22 展示了 `LoggedInUser` POJO，它是一个简单的包装器，用于保存 `UserSummary` 和 `ConferenceSummary`\
  \ DTO。\n\n**清单 7-22.** *简单的 LoggedInUser 应用程序状态 POJO*\n\n```java\npublic class LoggedInUser\
  \ implements Serializable {\n\nprivate UserSummary userSummary;\n\nprivate ConferenceSummary\
  \ conferenceSummary;\n\npublic ConferenceSummary getConferenceSummary() {\n\nreturn\
