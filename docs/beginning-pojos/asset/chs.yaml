  \n...\n\n使用 update 方法更新现有对象，以及使用 delete 方法从数据库中删除对象同样简单。有关 Hibernate 中 Session 功能的更多信息，请查阅\
  \ Hibernate 的 Javadoc (http://hibernate.org/hib_docs/v3/api/)，其中展示了 Session 暴露的所有不同方法。处理\
  \ Hibernate 时的复杂性与常规基于 SQL 的应用程序类似，其精髓在于高效查询数据库的艺术。正如你将在接下来的几节中看到的，Hibernate 提供了非常高级的查询功能。\n\
  \n**检索对象集合**\n\n检索单个对象相当容易，在常见的 Web 应用程序中你会经常这样做。然而，在大多数情况下，你会先获取一个对象列表，然后再决定检索单个实体的特定详细信息（因为你很可能事先不知道数据库标识符）。\n\
  \nHibernate 提供了多种从数据库中检索持久化对象集合的方法。这种灵活性可能会给 Hibernate 的新用户带来困惑。在本节中，我将尝试为你概述 Hibernate\
  \ 中用于查询应用程序持久化对象空间的可用 API。\n\n使用 HQL 查找对象\n\nHibernate 提供了一种称为 HQL（Hibernate 查询语言）的对象查询语言，它是一种强大的查询语言，语法类似于\
  \ SQL，但其核心是类和对象属性，而不是表和列。与 SQL 的相似性使得从纯 JDBC 应用程序到 Hibernate 应用程序的过渡更加平滑。如果需要，Hibernate\
  \ 也允许你发出原生 SQL 查询，但我建议你尽可能坚持使用 HQL 查询。根据我的经验，很少有情况会迫使你使用原生 SQL 查询，如果遇到这种情况，你也可以通过在\
  \ HBM 映射中使用自定义查询来避免在应用程序中使用此类查询。有关在 HBM 中使用自定义 SQL 查询的更多信息，请查阅 Hibernate 在线参考文档。\n\
  \n清单 4-8 展示了一个简单的 HQL 查询，用于从数据库加载 Address 类的所有实例。\n\n**清单 4-8.** *检索 Address 类所有实例的简单\
  \ HQL 查询* List<Address> addresses = session.createQuery(\"from Address\").list();\
  \ for (Iterator<Address> i = addresses.iterator(); i.hasNext();) {\n\nAddress address\
  \ = (Address) i.next();\n\nSystem.out.println(address);\n\n}\n\n如你所见，这个查询完全以对象术语表达，Hibernate\
  \ 团队很贴心地为我们提供了一种简写符号，允许我们省略“select”关键字。注意，没有侵入性的结果集类作为中介。结果以 java.util.List 的形式提供，使我们能够使用熟悉的\
  \ Java 集合 API 进行 HQL 操作。\n\n在 HQL 查询中，你可以像使用 SQL 一样使用 FROM 子句来缩小返回的实体列表。清单 4-9 中的代码片段展示了如何选择匹配特定信息的\
  \ Address 对象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
