  \ Spring 如何基于所示的简单 XML 文件管理 Bean，另一个需要注意的地方是：`greetingService` Bean 实际上是一个单例（singleton）。默认情况下，Spring\
  \ XML 文件中的所有 Bean 定义都是单例的，这通常是无状态服务所需的行为类型。因此，如果我们尝试实例化 `greetingService` Bean 的另一个实例，你会发现所有实例实际上都是同一个实例。\n\
  \n如果我们像清单 6-6 所示那样修改之前的 XML 声明，你会发现现在每次调用 `getBean` 方法都会获得一个独立的实例。这种类型的 Bean 被称为原型（prototype）Bean。\n\
  \n**清单 6-6.** *将 greetingService 设为原型 Bean*\n\n<bean id=\"greetingService\"\n\n\
  class=\"com.integrallis.spring.basic.GreetingServiceImpl\"\n\nsingleton=\"false\"\
  >\n\n当你实例化的对象可能是另一个对象的协作者，并且该协作者需要携带或保存状态信息，或者其配置基于协作者对象的状态时，原型 Bean 非常有用。在 Spring\
  \ 中，Bean 默认以单例形式部署。原型 Bean 是完全非托管的，因为 Spring 只是实例化对象并将其交给客户端。\n\n**一个简单的 Spring\
  \ Web 应用**\n\n在上一节中，你已经学习了如何使用 Spring 框架的基本依赖注入功能（通过 `BeanFactory` 提供）来：\n\n• 将简单的服务接口与其实现解耦\n\
  \n• 通过 XML 文件声明式地配置服务\n\n• 轻松地将服务从单例切换为每次获取新实例\n\n`BeanFactory` 是一个非常强大的构造，它提供了依赖注入和基本的服务管理，但对于大多数应用程序（尤其是\
  \ Web 应用），你可能需要升级到使用 Spring 的 `ApplicationContext`。`ApplicationContext` 是 `BeanFactory`\
  \ 的子接口，它提供了 `BeanFactory` 的所有功能，以及全功能应用通常需要的许多特性，例如文本消息解析、国际化、资源加载，以及更完整的对象生命周期管理和通知。\n\
