  \nTotal tests run: 3, Failures: 0, Skips: 0\n\n===============================================\n\
  \nTestNG 不仅允许你将测试方法分组到一个或多个组中，还允许你创建组的组。强大的过滤功能使你能够使用正则表达式包含和排除组。例如，要运行 GroupX 和\
  \ GroupY 中的测试，我们可以使用正则表达式 “Group[XY]”，如清单 8-10 所示。\n\n**清单 8-10.** *用于运行 GroupX\
  \ 和 GroupY 中测试的 TestNG 配置*\n\n<!DOCTYPE suite SYSTEM \"http://beust.com/testng/testng-1.0.dtd\"\
  \ >\n\n<suite name=\"Some Tests\" verbose=\"1\">\n\n<test name=\"Group Test\">\n\
  \n<groups>\n\n<run>\n\n<include name=\"Group[XY]\"/>\n\n</run>\n\n</groups>\n\n\
  <packages>\n\n<package name=\"package1\"/>\n\n<package name=\"package2\"/>\n\n<package\
  \ name=\"package3\"/>\n\n</packages>\n\n</test>\n\n</suite>\n\n另外请注意，我们声明的是包，而不是声明\
  \ TestNG 应该查找哪些类中的测试。运行清单 8-10 中的示例应该会产生类似于以下的输出：\n\ntestA2\n\ntestA1\n\ntestB1\n\
  \ntestC2\n\ntestC1\n\n===============================================\n\nSome Tests\n\
  \nTotal tests run: 5, Failures: 0, Skips: 0\n\n===============================================\n\
