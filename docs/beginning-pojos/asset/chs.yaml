  \ 包中的 `ConferenceBorder` 类。`allow-body` 属性告诉 Tapestry 该组件将渲染其主体的内容。Tapestry 中的许多组件在渲染时会替换主体的内容。这就是为什么在某些模板中，我们可以简单地向元素主体添加示例内容用于预览，而在其他模板中，我们使用\
