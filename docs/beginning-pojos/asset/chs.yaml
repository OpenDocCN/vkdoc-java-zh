  false\">\n\n<compare property=\"conferenceId\" />\n\n</comparator>\n\n</dto>\n\n\
  </dtos>\n\n请注意，.dto.xml 的根元素是 `<dtos>`，它可以包含一个或多个 `<dto>`。`<dto>` 元素定义了如何将一个或多个领域对象用于填充\
  \ POJO 或 POJI 的动态代理实例（正如 ConferenceSummary DTO 的情况）的配方。\n\n虽然您可以拥有多个 `<dto>` 元素，但我建议，除了\
  \ DTO 数量很少的小型应用程序外，每个文件只使用一个 `<dto>` 元素，并根据 DTO 配置文件所映射的接口或类来命名。`useProxy` 属性表示\
  \ DynaDTO 应为 DTO 接口创建一个动态代理实例。\n\n让我们探讨一下映射的一些细节。`<mapping>` 元素提供了多种将信息从一个对象传递到另一个对象的方法。首先请注意，当映射两个名称相同的属性时，您可以简单地使用\
  \ `property` 属性，如 `startDate` 属性的映射所示（`<mapping property=\"startDate\" />`）。对于名称不同的属性，您可以使用\
  \ `from` 和 `to` 属性，如从 `Conference.name` 映射到 `ConferenceSummary.conferenceTitle`\
  \ 所示（`<mapping from=\"name\" to=\"conferenceTitle\" />`）。对于嵌套对象，您可以使用点符号来访问属性值，如\
  \ `venueAddressLine1` 的映射所示（`<mapping from=\"venue.address.streetAddress\" to=\"\
  venueAddressLine1\" />`）。对于更复杂的映射，DynaDTO 提供了使用 JEXL 表达式的能力。表达式在 `<dto>` 元素的 `<expressions>`\
  \ 元素内部声明。`<expressions>` 元素可以包含一个或多个 `<expression>` 元素，这些元素接受 `target` 和 `value`\
  \ 属性。例如，在 `venueAddressLine2` 属性的映射中，`target` 是 `VenueAddressLine2`，`value` 是 `venue.getAddress().getCity()\
  \ + ',' + util.space() + venue.getAddress().getState() + util.space() + venue.getAddress().getZipCode()`。DynaDTO\
  \ 提供了一个名为 `util` 的对象，该对象可在您的表达式中使用，用于执行简单的操作，例如通过 `util.space(int)` 添加空格，其中整数参数表示空格数量。DynaDTO\
  \ 还有其他实用工具。还有一个名为 `self` 的对象，它允许您访问正在构建的 DTO。DynaDTO 会尝试为嵌套的 DTO 查找与源对象匹配的配置，从而处理嵌套的\
  \ DTO。\n\n最后一个值得一提的特性是 DynaDTO 通过 `<mapping-collection>` 元素操作集合的能力。例如，在 ConferenceSummary\
  \ 映射中，有一个集合映射，它读取 Conference 实例的 `tracks` 属性，并为其每个元素创建一个 `TrackSummary` 类型的 DTO。生成的\
  \ `TrackSummary` 集合存储在 `TrackSummary` 实例的 `tracks` 属性中，如清单 5-10 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
