  **107**\n\n\n\n■**最佳实践** 在为新建表选择主键时，尤其是当你知道该表将在面向对象系统中被 ORM 工具使用时，应尽可能使用代理主键。代理主键是小型、简单的键，没有业务含义，通常不会被最终用户更新甚至看到。它们提供了审计追踪，生成较小的索引，使连接更易编写且执行更快，对业务变更更具弹性（因为它们没有业务含义），并且使参照完整性更易维护。一个将业务键用作主键的危险示例是使用电话号码作为账户标识符。由于电话号码可能会且确实会发生变化，当客户的电话号码变更时，就需要进行维护或某种映射；在我看来，更糟糕的是使用复合业务/自然主键，即组合使用多个此类字段作为主键。问题在于这些字段通常不可为空，因此没有简单的方法（无需执行\
  \ SELECT 来检查行是否存在）来确定该对象是否已在数据库中。\n\n表 4-2 展示了 Hibernate 提供的生成器策略的快速总结。\n\n**表 4-2.**\
  \ *Hibernate 的标识符生成策略* **策略**\n\n**描述**\n\nincrement\n\n使用内存方案生成整数类型的标识符（long、short\
  \ 和 int）。不推荐用于集群环境。\n\nidentity\n\n对支持数据库标识列功能的数据库使用该列。与整数类型的对象属性配合使用。\n\nsequence\n\
  \n对支持数据库序列或内部数据库生成器的数据库使用这些功能。\n\nhilo\n\n基于给定表中的列，使用算法确定下一个值。在原生数据库序列不受支持且仅在非 JTA\
  \ 环境或使用用户提供的连接时使用。\n\nseqhilo\n\n使用命名的数据库序列和 hilo 算法。\n\nuuid\n\n使用算法生成 128 位 UUID（通用唯一标识符）的字符串表示形式。返回的字符串是十六进制编码的。\n\
  \nguid\n\n利用某些数据库（Microsoft SQL Server 和 MySQL）生成全局唯一标识符（GUID）的能力。\n\nforeign\n\n\
  使用关联对象的标识符。\n\nnative\n\n智能地选择合适的策略。这是实现最大可移植性的推荐策略。\n\nselect\n\n使用数据库触发器或通过对唯一键表执行\
  \ SELECT 来生成。\n\nassigned\n\n用于使用提供的业务唯一键的应用程序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
