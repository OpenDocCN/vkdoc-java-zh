  \nSpring 框架与许多框架都能很好地集成，包括简单的 Servlet 和 JSP、Struts、JSF、WebWork、Tapestry，以及它自己的 MVC\
  \ 实现 Spring MVC。Spring MVC 是一种更简单的 MVC 实现，它提供了一种插入多种视图技术的方法，例如 Struts、WebWork、Tapestry\
  \ 或简单的 JSP，如本章前面的简单示例所示。\n\n在 Spring 提供的 MVC 实现中，模型不像 Struts 及其 ActionForm 那样被抽象化，它可以是任何简单的\
  \ POJO（一个 DTO 或领域对象）。\n\n所有模型对象都存储在一个简单的映射结构中。控制器准备模型映射，供视图从中提取数据，并形成支持对象以修改模型中的数据。\n\
  \n**创建 MVC 控制器**\n\n让我们从创建 Techconf 系统的入口页面开始，我们将在其中列出可用的会议。首先，我们实现控制器类 `ListConferenceController`，如清单\
  \ 6-27 所示。\n\n**清单 6-27.** *ListConferencesController 类*\n\npackage com.integrallis.techconf.spring.web;\n\
  \nimport java.util.List;\n\nimport javax.servlet.http.HttpServletRequest;\n\nimport\
  \ javax.servlet.http.HttpServletResponse;\n\nimport org.springframework.web.servlet.ModelAndView;\n\
  \n\n\nimport org.springframework.web.servlet.mvc.AbstractController; import com.integrallis.techconf.dto.ConferenceSummary;\n\
  \nimport com.integrallis.techconf.service.ConferenceService;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C06.fm Page 226 Wednesday, February 22, 2006 1:20 PM\n\n**226**\n\
  \n第 6 章 ■ **S**PRING **F**RAMEWORK\n\npublic class ListConferencesController extends\
  \ AbstractController {\n\nprotected ModelAndView handleRequestInternal(HttpServletRequest\
  \ request, HttpServletResponse response) throws Exception {\n\nList<ConferenceSummary>\
  \ conferences = conferenceService\n\n.getAllConferences();\n\nreturn new ModelAndView(\"\
  conferenceList\", \"conferences\", conferences);\n\n}\n\nprivate ConferenceService\
  \ conferenceService;\n\npublic void setConferenceService(ConferenceService conferenceService)\
  \ {\n\nthis.conferenceService = conferenceService;\n\n}\n\n}\n\n该类继承了 Spring 的 `AbstractController`，而\
  \ `AbstractController` 又实现了 `Controller` 接口。控制器实现负责以线程安全的方式处理 `HttpServletRequest`，并最终返回一个\
  \ `ModelAndView` 对象。`ModelAndView` 对象是一种将模型和视图组合在一起的构造，使得控制器可以将它们作为一个返回值返回。`AbstractController`\
  \ 提供了缓存、会话同步和方法过滤器，是控制器实现的一个便捷基类。Spring 还提供了其他控制器实现，例如 `ParameterizedViewController`、`FileNameViewController`\
  \ 和 `MultiActionController`。\n\n控制器实现的主体在于 `handleRequestInternal` 方法的开发，该方法遵循 Servlet\
  \ 语义，将 `HttpServletRequest` 和 `HttpServletResponse` 对象作为参数。`ListConferencesController`\
  \ 的实现使用 `ConferenceService` 的实例，通过 `getAllConferences` 方法检索 `ConferenceSummary`\
  \ DTO 列表。DTO 列表以标识符 `\"conferences\"` 传递给 `ModelAndView` 类的构造函数，如构造函数调用的第二和第三个参数所示。\n\
  \n为了能够使用 `ConferenceService`，我们需要提供一个字段来保存先前配置的服务实例，以及一个 setter 方法，用于通过应用上下文注入该服务。清单\
  \ 6-28 显示了 `listConferencesController` 的定义，该控制器由清单 6-27 中所示的 `ListConferencesController`\
  \ 类实现，并且我们正在为其注入先前创建的 `conferenceService` bean。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
