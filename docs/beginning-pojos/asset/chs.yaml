  \nwriter.end(\"table\");\n\n}\n\n}\n\n}\n\nHTML 模板\n\n\n\n注册页面的 HTML 模板如清单 7-30\
  \ 所示。与其他会议页面类似，它使用了之前创建的`ConferenceBorder`组件。在模板的最顶部，我们放置了上一节创建的`ErrorDisplay`组件实例。\n\
  \n**清单 7-30.** *注册页面 HTML 模板*\n\n<html jwcid=\"@ConferenceBorder\" title=\"Register\"\
  >\n\n<span jwcid=\"@ErrorDisplay\" delegate=\"bean:delegate\"/>\n\n<form jwcid=\"\
  @tacos:AjaxForm\"\n\ndelegate=\"bean:delegate\"\n\nlistener=\"ognl:listeners.add\"\
  >\n\n...\n\n</form>\n\n</html>\n\n在之前的用户信息提交示例中，我们使用了 Tapestry 的`Form`组件。\n\nTacos\
