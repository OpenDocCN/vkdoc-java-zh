  \n</bean>\n\n■**提示** 对于通过 Spring-Hibernate DAO 在 Web 应用视图中使用 Hibernate 的应用程序，Spring\
  \ 提供了一种解决方案，用于处理访问仅部分加载的持久化对象时可能出现的问题——即那些可能让刚接触 Hibernate 和 Spring 的开发人员感到困惑的懒加载和会话关闭异常。这对\
  \ TechConf 应用来说不是问题，因为我们在 Web 层和服务层之间使用了完全分离的 DTO。对于那些选择在视图中暴露具有懒加载关联的领域对象的用户，Spring\
  \ 提供了 Hibernate 团队提出的“在视图中打开会话”策略的实现，该策略基本上允许打开一个会话来懒加载检索关联对象。此策略基于 Servlet 过滤器和\
  \ AOP 拦截。Spring 在 `OpenSessionInViewFilter` 类中提供了一个 Servlet 过滤器（当然是在 Web 部署描述符中配置），以及\
  \ `OpenSessionInViewInterceptor`（可以在 Spring 应用上下文中配置）。两者功能相同，它们会在请求期间打开一个 Hibernate\
  \ 会话，并将该会话绑定到当前线程。\n\n完成 DAO 层后，现在我们可以继续配置 TechConf 服务所需的其他协作者。Hibernate 提供了一个强大的\
