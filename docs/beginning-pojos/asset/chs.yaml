  \n1 row in set (0.00 sec)\n\n**检索单个对象**\n\nHibernate Session 提供了几个便捷的方法来通过主键检索对象。你不再需要发出完整的\
  \ SQL 语句来从数据库中检索对象的数据。Hibernate Session 提供了 `load` 和 `get` 方法来通过 id 检索对象。\n\n这两个方法的主要区别在于，`load`\
  \ 假定你正在查找的对象存在，而 `get` 可以等同于查找（find），因为你可以检查其结果是否为 `null` 来测试数据库中是否存在某行。如果实体在数据库中不存在，`load`\
  \ 方法可能会抛出 `org.hibernate.ObjectNotFoundException`（但这可能根本不会发生，因为 `load` 会尽可能尝试返回一个代理）。这两个方法都会首先检查\
  \ Session 缓存，看该实体是否已被加载，从而避免不必要的数据库访问。\n\n\n\n我倾向于在代码中使用 get 方法并检查 null，因为这更符合常见的\
  \ Java 语义。由于 load 方法假定实体存在，因此抛出的异常被视为不可恢复的异常，就像大多数数据访问异常一样。\n\n■**注意** 在 Hibernate\
  \ 的早期版本中，Hibernate 的根异常（org.hibernate.HibernateException）是一个受检异常。从 3.0 版本开始，它变成了一个运行时异常，这更符合大多数数据访问异常是不可恢复异常这一事实。这一直是\
  \ Hibernate 中一个受欢迎的改动，因为它通过移除不必要的异常包装代码，确实简化了代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
