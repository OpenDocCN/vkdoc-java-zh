  \ TechConf 项目的本地副本。要获得项目的读写权限，与大多数项目一样，你需要先提交补丁，然后根据贡献，项目负责人会授予你开发者角色。\n\n能够访问项目的源代码是使用开源软件最吸引人的原因之一。尽管大多数项目以\
  \ ZIP 或 TAR 格式提供源代码包，但如果你能访问当前源代码，就可以深入了解项目方向并做出贡献。如果你熟悉 CVS 客户端，那么你会知道命令和架构是与 CVS\
  \ 仓库交互所必需的。尽管 CVS 是主流的版本控制系统，但还有其他非常流行的系统可用。在开源类别中，一个赢得众多用户青睐的系统是 Subversion，它被吹捧为最有可能取代\
  \ CVS 的系统，用于大多数大型开源项目。有适用于 Subversion 的插件，也适用于大多数其他开源和商业版本控制系统，而且大多数都模仿了 CVS 插件，这应该会使过渡变得容易。\n\
  \n**数据库插件**\n\n测试数据库驱动的 Web 应用程序时，很大一部分时间花在检查关系数据库的内容上。虽然大多数数据库都提供了处理数据的工具，但能够在\
