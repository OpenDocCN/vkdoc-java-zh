  \ 章 ■ TAPESTRY\n\n\n\n表达式 `ognl:time` 告诉 Tapestry 将分号后的内容作为 OGNL 表达式进行求值。OGNL 全称为对象图导航语言（Object-Graph\
  \ Navigational Language），是一种用于获取和设置 Java 对象属性的表达式语言。在页面文件中，我们在 `page-specification`\
  \ 元素下将 `class` 属性定义为 `com.integrallis.time.Home`。这会导致表达式求值时调用 `com.integrallis.time.Home`\
  \ 的 `getTime` 方法，以获取要显示的值。在将网页返回给浏览器之前，Tapestry 会将清单 7-1 中所示的组件 HTML 代码转换为类似于清单\
  \ 7-6 所示的标记。\n\n**清单 7-6.** *Tapestry 发送给 Web 浏览器的 HTML*\n\n<html>\n\n<body>\n\n\
