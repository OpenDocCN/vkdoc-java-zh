  \n**177**\n\n**JBoss 中的 DynaDTO**\n\nDynaDTO 项目通过其 DDTO 部署器和 DynaDTO 服务提供了与 JBoss\
  \ 的集成。通过 DynaDTO 服务，你可以让一个 DynaDTO `BuilderFactory` 对象绑定到 JNDI。DDTO 部署器是一个专门的 JBoss\
  \ 部署器，它会扫描扩展名为 `.ddto` 的 JAR 归档文件，并根据找到的任何 DynaDTO 映射（`.dto.xml` 文件）创建一个 `BuilderFactory`。\n\
  \nHAR 应包含 Hibernate 映射、被映射的类文件以及一个 JBoss 服务描述符。图 5-11 展示了 DDTO 归档文件的结构和内容。\n\n**图\
