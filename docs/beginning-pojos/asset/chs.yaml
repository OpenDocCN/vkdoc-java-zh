  \ name=\"目标 C\" depends=\"目标 B\" description=\"执行步骤 C\">\n\n<echo>正在执行步骤 C</echo>\n\
  \n</target>\n\n</project>\n\n如你所见，对于简单的构建文件，XML 格式使得区分各个目标变得更加容易。\n\n项目\n\nproject\
  \ 元素可以有三个属性：name、default 和 basedir。只有 default 属性是必需的，但我建议你使用 name 属性，尤其是因为许多 IDE\
  \ 的 Ant 编辑器会利用该属性进行显示。当处理多个构建文件时，name 属性会非常有用。\n\n■**最佳实践** 对于只有一个构建文件（build.xml）的项目，我建议你将项目名称用作\
  \ project 元素的 name 属性。对于有多个构建文件的项目，我建议你根据每个文件的预期功能来命名，并且 name 属性应与文件名相同（不含.xml 扩展名）。\n\
  \ndefault 属性决定了构建文件要执行的默认目标。最后，basedir 属性决定了构建过程中所有文件相关操作的基础目录。在前面的示例中，它只是构建文件所在的当前目录，由于这是默认值，因此该属性可以省略。这个设置很重要，尤其是当你在应用程序目录结构的不同子目录中使用多个构建文件，并且希望有一种统一的方式来引用所有构建文件中的路径时。\n\
  \n■**最佳实践** 将 basedir 目录设置为项目的根目录。这是一个常见的约定，它会使你的构建文件易于理解。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
