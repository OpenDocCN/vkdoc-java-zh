  \ 服务。property 属性是属性暴露的名称，object 属性是用于定位值的标识符。在模板中，我们还定义了属性 conference，它充当清单 7-12\
  \ 中正在迭代的集合中单个元素的占位符。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C07.fm Page 264 Thursday, February 23, 2006 4:22 PM\n\n**264**\n\n第 7 章 ■ Tapestry\n\
  \n**清单 7-13.** *首页 Tapestry 页面规范*\n\n<?xml version=\"1.0\"?>\n\n<!DOCTYPE page-specification\
  \ PUBLIC\n\n\"-//Apache Software Foundation//Tapestry Specification 4.0//EN\"\n\n\
  \"http://jakarta.apache.org/tapestry/dtd/Tapestry_4_0.dtd\">\n\n<page-specification>\n\
  \n<inject property=\"conferenceService\"\n\nobject=\"service:app.ConferenceService\"\
  />\n\n<property name=\"conference\"/>\n\n<asset name=\"stylesheet\" path=\"css/techconf.css\"\
  />\n\n<asset name=\"spacer\" path=\"images/spacer.gif\" />\n\n<asset name=\"arrow\"\
  \ path=\"images/arrow.gif\" />\n\n</page-specification>\n\n首页的 Java 代码需要提供访问会议集合的方法。为此，它还需要一个\
  \ ConferenceService 的实例（该实例在清单 7-13 所示的页面规范中被注入）。清单 7-14 显示了首页的代码。\n\n**清单 7-14.**\
  \ *首页页面类*\n\npackage com.integrallis.techconf.web.tapestry.pages;\n\nimport java.util.List;\n\
  \nimport org.apache.tapestry.event.PageBeginRenderListener; import org.apache.tapestry.event.PageEvent;\n\
  \nimport org.apache.tapestry.html.BasePage;\n\nimport com.integrallis.techconf.dto.ConferenceSummary;\n\
  \nimport com.integrallis.techconf.service.ConferenceService; public abstract class\
  \ Home extends BasePage implements PageBeginRenderListener {\n\npublic void pageBeginRender(PageEvent\
  \ event) {\n\nsetConferences(getConferenceService().getAllConferences());\n\n}\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C07.fm Page\
  \ 265 Thursday, February 23, 2006 4:22 PM\n\n第 7 章 ■ Tapestry\n\n**265**\n\npublic\
  \ abstract ConferenceService getConferenceService(); public abstract void setConferences(List<ConferenceSummary>\
  \ s); public abstract List<ConferenceSummary> getConferences();\n\n}\n\n与大多数 Tapestry\
  \ 页面一样，Home 类扩展了 Tapestry 的 BasePage 并实现了 PageBeginRenderListener。在 pageBeginRender\
  \ 方法中，我们使用 getAllConferences 方法从会议服务中检索会议集合，并将返回的集合分配给由 Tapestry 隐式创建的会议列表，以支持 setConferences\
  \ 和 getConferences 方法。\n\n**HiveMind 服务**\n\n\n\nTapestry 使用了 HiveMind，这是一个服务和配置的微内核。与\
  \ Spring 类似，HiveMind 提供了一个 IoC 框架，可用于配置服务以及这些服务与组件之间的协作，只需使用简单的 XML 配置文件即可。HiveMind\
  \ 服务是根据接口或简单的 POJO 来定义的。作为一个 IoC 容器，HiveMind 负责实例化服务并将它们连接在一起。作为一个配置框架，HiveMind\
  \ 使您能够连接和管理由多个服务组成的、高度复杂的系统。HiveMind 使用了模块的概念，模块是打包成 JAR 的服务集合，每个模块都有自己的 XML 配置文件。\n\
  \nTapestry 本身使用 HiveMind 来配置大量模块，这些模块协同工作以提供 Tapestry 的运行时能力。\n\n在 Tapestry 中，通过在\
  \ `hivemodule.xml` 配置文件（对于 TechConf 应用，该文件位于 `WEB-INF` 目录下）中指定服务，可以将服务添加到 HiveMind\
  \ 注册表中。\n\n在 Tapestry 中，您可以拥有任意数量的、其状态可以被维护的对象。这些对象也在 HiveMind 配置文件中声明。Tapestry\
  \ 在启动时引导 HiveMind 并初始化 HiveMind 注册表。\n\n为了使“conferences”对象对页面可用，我们需要一种方法，将实现 `ConferenceService`\
  \ 接口的 EJB3 服务包装成一个 HiveMind 服务，然后通过 `inject` 属性将其注入到页面中，如清单 7-13 所示。\n\nHiveMind\
  \ 包含一个用于创建代理对象以处理 EJB 2.X 的服务。`EJBProxyFactory` 服务用于创建一个代理对象来包装 EJB 无状态会话 Bean。这个包装器负责执行\
  \ JNDI 查找，并在返回的 Home 接口上调用 `create` 方法以获取 Bean 的实例。由于我们使用的是 EJB 3.0，我们创建了一个简单的服务，通过\
  \ JNDI 来检索我们的 EJB3 无状态会话 Bean 实例。清单 7-15 展示了通过实现 `ServiceImplementationFactory`\
  \ 接口并在 `createCoreServiceImplementation` 方法中返回所需对象来创建 HiveMind 服务是多么简单。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C07.fm Page 266 Thursday, February 23, 2006 4:22 PM\n\n**266**\n\
  \n第 7 章 ■ TAPESTRY\n\n**清单 7-15.** *HiveMind EJB3Factory*\n\n```java\npackage com.integrallis.techconf.web.tapestry.hivemind;\n\
  \nimport javax.naming.InitialContext;\n\nimport org.apache.commons.logging.Log;\n\
  \nimport org.apache.commons.logging.LogFactory;\n\nimport org.apache.hivemind.ApplicationRuntimeException;\n\
  \nimport org.apache.hivemind.ServiceImplementationFactory;\n\nimport org.apache.hivemind.ServiceImplementationFactoryParameters;\
  \ import org.apache.hivemind.internal.Module;\n\n/**\n * An implementation of {@link\
  \ org.apache.hivemind.ServiceImplementationFactory}\n * that retrieved a stateless\
  \ session EJB via JNDI.\n */\npublic class EJB3Factory implements ServiceImplementationFactory\
  \ {\n\n    private static Log log = LogFactory.getLog(EJB3Factory.class); \n   \
  \ public Object createCoreServiceImplementation(\n        ServiceImplementationFactoryParameters\
  \ factoryParameters) {\n\n        EJB3FactoryParameters proxyParameters =\n    \
  \        (EJB3FactoryParameters) factoryParameters.getParameters().get(0); \n  \
  \      String remoteInterfaceClass = proxyParameters.getRemoteInterface(); \n  \
  \      Module module = factoryParameters.getInvokingModule();\n\n        Class remoteInterface\
  \ = module.resolveType(remoteInterfaceClass); \n        Object result = null;\n\n\
  \        try {\n            InitialContext context = new InitialContext();\n   \
  \         result = context.lookup(remoteInterface.getName());\n        } catch (Exception\
  \ ex) {\n            log.error(\"Could not retrieve service\", ex);\n          \
  \  throw new ApplicationRuntimeException(ex);\n        }\n\n        return result;\n\
  \    }\n}\n```\n\n在 `createCoreServiceImplementation` 方法体中，我们使用了类型为 `Class` 的参数\
  \ `remoteInterface`，并将完整的类名作为 JNDI 查找字符串来检索无状态会话 Bean。请注意，该方法接受一个类型为 `ServiceImplementationFactoryParameters`\
  \ 的参数。幸运的是，您不必实现这个接口，因为 HiveMind 会接受任何简单的 POJO 并创建一个包含该 POJO 内容的 `ServiceImplementationFactoryParameters`\
  \ 实例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C07.fm\
  \ Page 267 Thursday, February 23, 2006 4:22 PM\n\n第 7 章 ■ TAPESTRY\n\n**267**\n\n\
  清单 7-16 展示了用于保存 `EJB3Factory` 配置参数的简单 POJO。\n\n**清单 7-16.** *EJB3FactoryParameters*\n\
  \n```java\npublic class EJB3FactoryParameters {\n\n    private String remoteInterface;\n\
  \n    public String getRemoteInterface() {\n        return remoteInterface;\n  \
  \  }\n\n    public void setRemoteInterface(String remoteInterface) {\n        this.remoteInterface\
  \ = remoteInterface;\n    }\n}\n```\n\n下一步是通过在 HiveMind 配置中声明我们的服务来使其可用。HiveMind\
  \ 配置是一个简单的 XML 文件，类似于 Spring 的应用上下文，您可以在其中定义服务并连接协作者。清单 7-17 展示了 `EJB3Factory` 以及使用\
  \ `EJB3Factory` 的 `ConferenceService` 的服务点定义。\n\n**清单 7-17.** *HiveMind 配置中的 EJB3FactoryParameters\
  \ (hivemodule.xml)*\n\n```xml\n<?xml version=\"1.0\"?>\n<module id=\"app\" version=\"\
  1.0.0\" package=\"com.integrallis.techconf\">\n    ...\n    <service-point id=\"\
  EJB3Factory\"\n        interface=\"org.apache.hivemind.ServiceImplementationFactory\"\
  >\n        <parameters-schema>\n            <element name=\"construct\">\n     \
  \           <attribute name=\"remote-interface\" required=\"true\" />\n        \
  \        <conversion\n                    class=\"com.integrallis.techconf.web.tapestry.hivemind.EJB3FactoryParameters\"\
  >\n                    <map attribute=\"remote-interface\" property=\"remoteInterface\"\
  />\n                </conversion>\n            </element>\n        </parameters-schema>\n\
  \        <invoke-factory model=\"singleton\">\n            <construct\n        \
  \        class=\"com.integrallis.techconf.web.tapestry.hivemind.EJB3Factory\"\n\
  \            />\n        </invoke-factory>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00117.png)\n\nSam-Bodden_596-3 C07.fm Page 268 Thursday, February 23,\
  \ 2006 4:22 PM\n\n**268**\n\n第 7 章 ■ TAPESTRY\n\n```xml\n    </service-point>\n\n\
  \    <service-point id=\"ConferenceService\" interface=\"service.ConferenceService\"\
  >\n        <invoke-factory service-id=\"app.EJB3Factory\">\n            <construct\
  \ remote-interface=\"service.ConferenceService\"/>\n        </invoke-factory>\n\
  \    </service-point>\n    ...\n</module>\n```\n\n在最高层面上，`hivemodule.xml` 文件定义了一个模块，该模块为所有服务定义了一个\
  \ id 前缀和一个默认的包前缀。工厂服务可以被定义为单例或池化实例。\n\nHiveMind 是一个非常强大的 IoC 框架，它通过提供分散的配置，使得创建服务驱动的框架和应用程序成为可能。深入研究\
  \ HiveMind 超出了本章的范围，但我强烈建议您探索这个强大的框架，它正逐渐成为工具制造者的首选工具之一。\n\n**测试主页**\n\nTechConf\
