  \ 章 ■ 测试\n\n**针对数据库进行测试**\n\n在 TechConf 应用程序中，与数据库交互的第一层代码由 domain 包中经过 Hibernate\
  \ 映射的 POJO 组成。在第 4 章中，我们学习了如何将 TechConf POJO 映射到数据库。\n\n在本节中，我们将探讨如何通过使用 TestNG\
  \ 对映射后的 POJO 执行简单的 CRUD 测试，来测试 Hibernate ORM 映射。有几种方法可以测试 Hibernate 映射的 POJO（或任何其他数据库代码），但大多数此类集成测试的技术都必须考虑以下几点：\n\
