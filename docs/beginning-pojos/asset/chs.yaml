  \ return;\n\nwriter.begin(\"table\");\n\nwriter.attribute(\"class\", \"red\");\n\
  \nwriter.begin(\"tr\");\n\nwriter.attribute(\"valign\", \"top\");\n\nwriter.begin(\"\
