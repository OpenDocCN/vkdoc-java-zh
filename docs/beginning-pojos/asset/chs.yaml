  \ C09.fm Page 349 Thursday, February 16, 2006 3:35 PM\n\n第 9 章 ■ 持续集成\n\n**349**\n\
  \n• **checkout：** 此目录将包含正在构建的项目的源代码（要构建的源文件）\n• **logs：** 此目录是 CruiseControl 存储关于正在构建的应用程序的日志和报告的地方（关于每次构建的详细信息）\n\
  • **artifacts：** 此目录用于保存构建产生的任何输出文件（构建产物，如 JAR、WAR 和 EAR）\n\n在工作目录的根目录下，创建一个名为 config.xml\
  \ 的文件，内容如下：\n\n<cruisecontrol></cruisecontrol>\n\n要在 Linux 下成功运行 CruiseControl，请遵循以下步骤：\
  \ **1.** 在工作目录中，创建 CruiseControl 目录下 webapps 目录的符号链接。\n\n**2.** 编辑 CruiseControl\
  \ 目录下的 shell 脚本 cruisecontrol.sh，并将变量 CC_DIR 的值更改为 /opt/cruisecontrol（或你解压 CruiseControl\
  \ 存档的位置）。\n\n**3.** 将 CruiseControl 目录添加到系统的执行路径中。你可以通过运行 shell 命令 `export PATH=/opt/cruisecontrol:$PATH`\
  \ 来实现。\n\n**4.** 确保系统已定义 `JAVA_HOME` 环境变量，并且 Java 可执行文件位于系统的执行路径中。\n\n**5.** 为 shell\
  \ 脚本 cruisecontrol.sh 设置可执行权限。\n\nCruiseControl 工作目录应如图 9-2 所示。\n\n**图 9-2.** *CruiseControl\
