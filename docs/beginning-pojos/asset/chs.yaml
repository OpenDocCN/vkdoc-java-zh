  \n图 7-6 展示了在这个简单示例的上下文中，Tapestry 中不同组件之间的交互。\n\n**图 7-6.** *全景图*\n\n**组件的威力**\n\n\
  拥有一个可靠的组件库的妙处在于，对应用程序用户界面和用户体验的大部分更改，只需对组件的配置进行简单修改，而无需花费数小时进行 Java 编码。这就是用组件构建的美妙之处。它们是一些功能性的黑盒子，你可以将它们组合在一起创建应用程序。\n\
  \n到目前为止，在我们的示例中，我们使用了最简单的 Tapestry 组件之一——Insert 组件。Tapestry 提供了一个在线组件参考，位于 http://jakarta.apache.org/tapestry/tapestry/ComponentReference。如果我们查阅\
  \ Insert 组件，会发现它提供的功能不仅仅是输出文本。\n\n表 7-2 显示了 Insert 组件中可用的参数。\n\n**表 7-2.** *Insert\
  \ 组件参数*\n\n**名称**\n\n**类型**\n\n**方向**\n\n**必需**\n\n**默认值**\n\n**描述**\n\nvalue\n\n\
  Object\n\nin\n\n否\n\n要插入的值。对非字符串对象使用 `toString()` 方法。\n\nformat\n\nFormat\n\nin\n\
  \n否\n\n用于格式化值的 Format 对象（java.text.Format）。\n\nclass\n\nString\n\nin\n\n否\n\n使用传入的\
  \ CSS 类将输出包裹在 span 标签中。\n\nraw\n\nboolean\n\nin\n\n否\n\nfalse\n\n忽略（不尝试修复）干扰标记的文本。\n\
  \n例如，要格式化 Insert 组件使用的 Date 对象，我们可以像下面这样修改页面规范：\n\n<component id=\"time\" type=\"\
  Insert\">\n\n<binding name=\"value\" value=\"ognl:time\" />\n\n<binding name=\"\
  format\" value=\"ognl:timeFormat\" />\n\n</component>\n\n现在，我们需要提供一个 `java.text.Format`\
  \ 类型的对象，如下面 Home.java 的补充所示：\n\nprivate Format timeFormat;\n\npublic Format getTimeFormat()\
  \ {\n\nif (timeFormat == null) {\n\ntimeFormat = new SimpleDateFormat(\"h:mm a\"\
  );\n\n}\n\nreturn timeFormat;\n\n}\n\n输出现在应该反映应用程序的名称，并根据格式字符串返回时间字符串，如图 7-7 所示。\n\
