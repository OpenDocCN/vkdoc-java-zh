  \ 文件。\n\n**清单 5-14.** *通过 Dynadto-service.xml 进行 DDTO 部署配置*\n\n`<mbean code=\"org.dynadto.jboss.deployment.DynaDTOService\"\
  `\n\n`name=\"org.dynadto:service=DynaDTOService\">`\n\n`<attribute name=\"BuilderFactoryName\"\
  >java:dynadto/BuilderFactory</attribute>`\n\n`<attribute name=\"TestMappings\">false</attribute>`\n\
  \n`</mbean>`\n\n在 `dynadto-service.xml` 中，你需要指定用于绑定 DynaDTO `BuilderFactory` 对象的\
