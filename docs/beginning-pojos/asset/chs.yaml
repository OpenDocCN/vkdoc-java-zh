  \nTestSuite suite = new TestSuite(\"All Tests\");\n\n// add tests\n\nsuite.addTestSuite(GreeterTest.class);\n\
  \n...\n\nreturn suite;\n\n}\n\n}\n\n\n\n**TestNG**\n\nJUnit 是一个伟大的框架，它彻底改变了我们进行测试的方式，但如同所有开创性技术一样，它并非没有缺陷。TestNG\
  \ 是一个由\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C08.fm\
  \ 第 313 页 2006 年 2 月 23 日星期四 下午 4:23\n\n第 8 章 ■ 测试\n\n**313**\n\nCedric Beust 创建的新框架，旨在解决\
  \ JUnit 的一些缺点，并利用 Java 开发中的新特性和趋势。\n\nTestNG 使用 JSE 5.0 注解或 Javadoc 注释，使简单的 POJO\
  \ 能够充当测试类，这与 JUnit 使用继承和抽象类的传统方法形成对比。TestNG 支持数据驱动测试，承认了这样一个事实：大部分测试执行的是功能测试和集成测试，而只有一小部分是纯单元测试。TestNG\
  \ 还提供基于 XML 的运行时配置，结合使用分组对测试进行分类的能力，提供了一个强大的执行模型，从而消除了使用 JUnit 的 TestSuite 等构造的需要。\n\
  \nTestNG 托管在 www.testng.org，并以单个 ZIP 文件的形式分发。在撰写本文时，可用的版本是 4.3（testng-4.3.zip）。在归档文件的根目录下，您可以找到用于\
  \ JDK 1.4 和 JDK 1.5 的 JAR 文件。对于 TechConf 应用程序以及本章的目的，我们将使用 JDK 1.5 版本（testng-4.3-jdk15.jar）。要使本章的练习能够运行，需要将此\
  \ JAR 文件添加到您的类路径中。\n\n让我们首先从一个简单的类开始，测试之前创建的 Greeter 类。在 TestNG 中，任何简单的 Java 类都可以通过使用元数据注解成为测试类。清单\
  \ 8-4 展示了 GreeterTest 类的 TestNG 版本。\n\n**清单 8-4.** *TestNG 注解的 POJO*\n\nimport org.testng.Assert;\n\
  \nimport org.testng.annotations.Configuration;\n\nimport org.testng.annotations.Test;\n\
  \npublic class GreeterTest {\n\nprivate Greeter greeter;\n\n@Configuration(beforeTestClass\
  \ = true)\n\nprivate void init() {\n\ngreeter = new Greeter();\n\n}\n\n@Test\n\n\
  public void testGreet() {\n\nassert \"Hello World\".equals(greeter.greet());\n\n\
  }\n\n@Test\n\npublic void testGreetString() {\n\nString name = \"Michael\";\n\n\
  Assert.assertEquals(\"Hello \" + name, greeter.greet(name));\n\n}\n\n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C08.fm 第 314 页 2006 年 2 月 23 日星期四 下午 4:23\n\n**314**\n\n第 8 章\
  \ ■ 测试\n\n首先要注意的是，我们的测试类不必继承任何基类或实现任何接口。两个测试方法都使用 `org.testng.annotations.Test`\
  \ 进行了注解，并且我们没有在每个方法中实例化 Greeter 类，而是拥有一个在 `init` 方法中初始化的私有实例。`init` 方法使用 `org.testng.annotations.Configuration`\
  \ 注解进行了注解，这使我们能够控制在测试方法、类、测试或套件之前和之后发生的事情。对于 `init` 方法，我们指示 TestNG 在执行测试方法之前执行该方法一次。这与\
  \ JUnit 的行为形成对比，在 JUnit 中，类会在每次执行测试方法时被实例化，因此很难在方法调用之间保持任何状态。同样不方便的是 JUnit 的 `setup`\
  \ 和 `teardown` 方法的行为，它们在每个测试方法之前和之后被调用。\n\n在 `testGreet` 方法中，我们使用了 Java 的 `assert`\
  \ 关键字，而在 `testGreetString` 中，我们使用了 `org.testng.Assert` 类中提供的断言静态方法之一。要在命令行上执行测试，您需要指定编译后的测试类的位置和\
  \ TestNG 库，如下所示（在以下情况下，编译后的类位于 `bin` 目录中，TestNG 库位于 `lib/testng` 目录中）：`java –ea\
  \ -cp bin;lib/testng/testng-4.3-jdk15.jar org.testng.TestNG -testclass GreeterTest`\n\
  \n另请注意，我们通过使用 `–ea` 标志启用了断言。输出应类似于：\n\n===============================================\n\
  \n\n\n命令行测试套件\n\n总运行测试数：2，失败：0，跳过：0\n\n===============================================\n\
  \n如果我们像之前 JUnit 示例那样，将 testGreet 方法中的预期输出改为“Hola”，则输出结果应变为：\n\n===============================================\n\
  \n命令行测试套件\n\n总运行测试数：2，失败：1，跳过：0\n\n===============================================\n\
  \n到目前为止，您可以看到 TestNG 提供了与 JUnit 相同的简单测试支持，但其结构更简洁，使得代码更清晰、更紧凑。TestNG 的真正强大之处在于其强大的\
  \ XML 配置机制。TestNG 通过一个通常命名为 testng.xml 的 XML 文件进行配置。该 XML 文件定义了测试套件，并允许指定测试内容。在此文件中，您可以定义在测试运行中要包含或排除的类和方法，以及其他执行参数，例如测试运行中要使用的线程数。\n\
