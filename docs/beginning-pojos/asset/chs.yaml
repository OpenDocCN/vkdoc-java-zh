  **109**\n\n**清单 4-5.** *保存一个 Address 对象*\n\nAddress address = new Address();\n\n\
  ...\n\nSession session = null;\n\nTransaction tx = null;\n\ntry {\n\nsession = factory.openSession();\n\
  \ntx = session.beginTransaction();\n\nsession.persist(address);\n\ntx.commit();\n\
  \n} catch (Exception e) {\n\nif (tx != null) tx.rollback();\n\n} finally {\n\nsession.close();\n\
  \n}\n\n清单 4-5 中的代码遵循了在简单 J2SE 应用程序中与 Hibernate 映射对象交互时使用的模式。在幕后，刚刚打开的 Hibernate\
  \ Session 会获得一个用于 SessionFactory 配置中设置的数据库的 JDBC 连接（这个连接可能是新连接，也可能来自 Hibernate 可用的现有连接池）。一旦\
  \ **Session** 被打开，它就会充当映射对象实体的缓存，也就是说，任何通过该打开的 **Session** 检索或保存的对象现在都将位于 **Session**\
  \ 缓存中。\n\n因此，如果你两次加载同一个对象，在第一次调用时，Hibernate 会发出 SQL 语句来加载对象的状态，但在后续使用同一个 **Session**\
  \ 的任何调用中，该对象将从 **Session** 的内部缓存中检索，而不会发生数据库访问。\n\n如果清单 4-5 中的代码成功执行，则传递给 persist\
  \ 方法的 Address 实例的 Id 字段现在将填充由数据库生成的标识符，并且 ADDRESS 表中将出现一个新行。Hibernate 的 **Session**\
  \ 对象提供了多种将对象状态持久化到数据库的方法，包括 persist、save、update 和 saveOrUpdate。如果对象的**主键**属性未设置，Hibernate\
  \ 将检测到这一点，并根据 id 元素上选择的策略自动为对象生成主键。这将使底层操作变为 SQL INSERT。\n\n■**注意** Hibernate 通过检查主键值是否为\
  \ null（这是 unsaved-value 属性的默认值）来检测对象是否尚未保存。如果你的类需要 null 以外的值，请在 unsaved-value 属性中设置该值。\n\
  \n\n\n对于 `saveOrUpdate` 方法，如果设置了主键，则当对象存在时操作会变成 SQL UPDATE，而不会执行 SQL INSERT；而对于\
  \ `persist`、`save` 和 `update` 方法，其语义是明确界定的：调用 `persist` 或 `save` 始终会执行 SQL INSERT，而调用\
  \ `update` 则会执行 SQL UPDATE。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
