  \ 3-1.** *Ant 构建的简化视图*\n\nAnt 通过一个描述文件来控制构建过程。在 Ant 中，描述文件通常被称为构建文件或构建脚本。Ant 构建文件是一个\
  \ XML 文件，其根元素是 `project`，它包含代表目标的子节点。一个表示与图 3-1 所示类似构建的 Ant 构建文件，将如清单 3-1 所示。\n\n\
  **清单 3-1.** *简单的 Ant 构建文件*\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
  \n<project basedir=\".\" default=\"Target C\" name=\"MyProject\">\n\n    <target\
  \ name=\"Target A\" description=\"Performs Step A\">\n\n        <echo>Performing\
  \ Step A</echo>\n\n    </target>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
