  tilesConfigurer\"\n\nclass=\"org.springframework.web.servlet.view.tiles.TilesConfigurer\"\
  >\n\n<property name=\"definitions\">\n\n<list>\n\n<value>/WEB-INF/tiles-defs.xml</value>\n\
