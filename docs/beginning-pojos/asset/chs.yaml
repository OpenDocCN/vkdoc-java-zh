  \n**24**\n\n第 2 章 ■ E C L I P S E\n\n**安装 Eclipse**\n\nEclipse 以单个压缩归档文件的形式分发，适用于\
  \ Windows 平台、Solaris、AIX、HP-UX、Mac OS X 以及几种现有的 Linux 架构。Eclipse 要求您拥有 Java 运行时环境\
  \ (JRE) 1.4 或更高版本。为了完成本书的练习（以及为了像依赖 Java 注解的 EJB3 等技术），您将需要 JRE 1.5 或更高版本，如命令 java\
  \ -version 的输出所示。\n\njava version \"1.5.0_05\"\n\n\n\nJava(TM) 2 运行时环境，标准版（内部版本号\
  \ 1.5.0_05-b05） Java HotSpot(TM) 客户端虚拟机（内部版本号 1.5.0_05-b05，混合模式，共享） Eclipse 并未提供花哨的向导式安装程序。相反，你首先需要将压缩包解压到一个合适的位置，例如\
  \ `c:\\eclipse`。我将此目录称为 ECLIPSE_HOME 目录。在 ECLIPSE_HOME 目录中，你会找到可执行文件 `eclipse.exe`。首次运行\
  \ Eclipse 时，只需执行 `eclipse.exe` 文件即可。我建议你在桌面、开始菜单或 Windows 任务栏的快速启动栏中创建一个快捷方式。首次运行时，Eclipse\
  \ 会提示你选择一个目录来存放所有用户文件，该目录被称为工作空间，如图 2-1 所示。如果你使用的是共享计算机，我建议你选择用户目录下的某个位置。\n\n**图\
