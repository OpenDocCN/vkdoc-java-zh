  >\n\n<property name=\"viewClass\">\n\n<value>org.springframework.web.servlet.view.tiles.TilesView</value>\n\
  \n</property>\n\n</bean>\n\n由 `TilesConfigurer` 实例支持的 `tilesConfigurer` bean 用于配置代表一个或多个\
