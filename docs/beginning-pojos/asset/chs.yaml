  \nSam-Bodden_596-3 C04.fm 第 87 页 2006 年 2 月 22 日，星期三，下午 2:16\n\n第 4 章\n\n■ ■ ■\n\
  \n使用 Hibernate 进行对象关系映射\n\n**作**为一名 Java 开发者，您很可能会发现自己需要从关系数据库中检索数据，并且希望找到将数据在您的对象和组件之间进行转换的方法。问题在于如何解决将对象状态存储到关系数据库管理系统（RDBMS）中这一难题。\n\
  \n与大多数使用关系数据库存储对象的软件开发者一样，我发现这个过程似乎非常耗时。关于这个过程，我现在有了一些清晰的认识，并且在每个新项目中，我都发现我们如何将数据库连接到面向对象的应用程序，取决于以下几个因素：\n\
  \n• 数据库模式与对象模型的关联程度\n• 模式是否先于应用程序存在\n• 模式是否是包含自然键和复合主键的遗留模式\n• 模式的规范化程度\n• 模式对对象模型和用户界面设计的影响程度（反之亦然）\n\
  \n面向对象的设计和开发完全关乎权衡。纯粹的面向对象观点可能会认为，领域模型的设计不应受到“实现”细节的影响，例如模型中对象在不在内存中时其状态存储在哪里。而另一方面，关系数据建模者可能会认为，数据很可能比应用程序更长寿，数据库模式的设计应只专注于高效地存储和访问数据。\n\
  \n我的观点（以及大多数同事的观点）是，这种笼统的说法是片面的，只会导致后续问题。\n\n在现实世界的应用程序中，考虑到我们如今面临的时间线，敏捷性至关重要。在大多数企业环境中，您可以控制对象模型，最多能对数据库模式的设计产生影响。我发现，在对象建模者和数据建模者合作最紧密的地方，将对象映射到数据库的过程会更容易。让双方共同参与设计对象模型和数据模型，将会带来折衷方案，从而产生既能很好地反映问题领域，又能确保数据完整性、可重用性和高效利用的应用程序。\n\
  \n**87**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C04.fm 第 88 页 2006 年 2 月 22 日，星期三，下午 2:16\n\n**88**\n\n第 4 章 ■ 使用 Hibernate 进行对象关系映射\n\
  \n我以上所有的评论都基于这样一个概念：拥有一个代表应用程序所针对问题领域的领域模型。但领域建模只是解决问题的一种方法。我们日常使用的许多典型互联网应用程序更具数据驱动、关系/过程化的特点，更适合以利用这些特性的方式构建，即使用一种能够利用关系模型的语言。是的，您猜对了，就是\
  \ SQL。对于与数据库进行非常简单的 CRUD（创建、读取、更新和删除）交互且性能是首要任务的应用程序，纯 SQL 可能仍然是正确的选择。\n\n话虽如此，预见应用程序的演变以确定您应该从一开始就使用对象关系映射（ORM）工具、纯\
  \ SQL，还是在单个应用程序中混合使用这两种方法，这一点非常重要。\n\n**对象关系映射**\n\n对象关系映射（ORM）是用于弥合对象与关系数据库之间鸿沟的技术、工具和方法的统称。ORM\
  \ 工具允许您以声明方式将数据对象映射到关系数据库中的数据和关系，使程序员能够以 Java 对象的形式处理来自关系数据库的信息。这类工具会生成与数据库交互所需的所有\
  \ SQL 代码。开发人员在对象层面工作，查询和事务的概念应用于对象而非数据库对象。尽管它们同属一个范畴，但这些工具在工作方式上可能存在巨大差异，从“透明”程度，到是通过生成代码、修改字节码还是使用运行时检查来工作。\n\
  \n在行业中，应用于 ORM 工具的透明性概念仍然非常模糊。持久性透明性或正交性意味着对象被处理时没有任何隐含的持久性概念。大多数现有工具并非真正透明，但它们通过将对象的持久性隔离在非常简单的面向对象构造之后，提供了良好的关注点分离。例如，在\
  \ Hibernate 中，透明性意味着被映射的普通 Java 对象（POJO）并不知道自己是持久化对象。\n\n同样值得考虑的是，如何将特定工具的工作方式与您的其余开发流程相融合。使用某些工具，您从对象模型开始，然后推导出关系持久化模型；使用其他工具，您从关系模型开始，然后推导出对象模型。大多数情况下，您会发现您同时拥有现有的对象模型和关系模型，在这种情况下，大多数工具都达不到预期，大部分映射工作都是手动的。有时，无法避免在对象模型和数据库模式之间进行权衡的情况。重要的是，两个模型应协同开发。ORM\
  \ 工具可以帮助这种协作工作，但发挥更大作用的是人的因素。\n\n与大多数难题一样，对象持久化完全关乎权衡。Java 持久化的主题是关于选择的，就像 Java\
  \ 中的许多事情一样。没有一种工具适用于所有持久化场景。有些工具为了性能而牺牲透明性，或者为了功能而牺牲简单性。在选择（或创建）对象关系工具时出现的一些问题包括：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C04.fm 第\
  \ 89 页 2006 年 2 月 22 日，星期三，下午 2:16\n\n第 4 章 ■ 使用 Hibernate 进行对象关系映射\n\n**89**\n\n\
  • 如何将列值转换为 Java 对象和基本类型。例如，一个 Java Date 对象可以映射到多种数据库类型。\n\n\n\n• 如何在数据库模式中建模对象关系（如继承、聚合和组合），或者如何在对象或对象组中建模表之间的关系。\n\
  • 如何处理数据库键和对象标识（这些可能在对象模型中不存在）。\n• 如何优化生成的 SQL 调用。\n• 如何利用专有数据库特性，例如可更新视图和存储过程。\n\
  • 如何在不限制对象模型行为表现力的前提下保证引用完整性。\n• 当数据库被多个来源并发访问时，如何处理事务。从关系型角度来看，对象不过是数据库数据的内存缓存，必须在适当的时候使其失效并刷新。\n\
  • 如何处理代价高昂的操作，例如在一对多关系中加载许多子对象（延迟加载、代理对象或缓存）。\n\n显然，随着对象图变得越来越复杂，工具也必须更加“智能”。我见过无数公司从非常简单的系统起步，从头开始编写自己的持久化层。我们将此等同于编写自己的应用服务器。迟早你会遇到一些前人已经思考过的技术问题，并发现自己大部分时间都在“微调”持久化框架。ORM\
  \ 工具消除了将内存中的类映射到数据库的复杂性。它们提供了自动选择、插入、更新和删除数据库表的接口，以反映对对象模型所做的更改。\n\n因此，我建议你尽早选择映射工具，而不是等到应用程序中的任何“临时”持久化逻辑开始看起来像一个自制框架时再行动。使用\
  \ ORM 层已被证明可以提高生产力，因为它将开发人员的注意力从弄清楚如何存储对象（一个非功能性关注点）转移到解决真正的业务问题上。使用 ORM 工具的另一个积极副作用是，像\
  \ JDBC 一样，它通过提供数据库的对象化视图，在数据库和应用程序之间提供了一个隔离层。在更好的情况下，它完全使持久化变得“透明”，而无需编写和维护直接的 JDBC\
  \ 代码的复杂性。\n\nORM 工具也有缺点，包括性能、可移植性（该工具是否实现了任何已知标准？）以及初始学习曲线。如果性能在你的应用程序中至关重要，请隔离应用程序的关键组件，并用大量数据对其进行测试。\n\
  \n**Hibernate 简介**\n\n所以你已经有了一个可用的对象模型！你的应用程序终于达到了需要数据库的阶段。JUnit 和模拟单元测试让你有信心声明你的对象模型已准备好与某种数据存储同步。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C04.fm Page\
  \ 90 Wednesday, February 22, 2006 2:16 PM\n\n**90**\n\n第 4 章 ■ 使用 Hibernate 进行对象关系映射\n\
  \n根据对象模型的复杂程度，这正是开发面向对象应用程序时大多数头痛问题的开始，也就是当你决定将其连接到关系数据库的那一刻。\n\n对于相对简单的对象模型和简单的查询需求，使用直接\
  \ SQL 的 Java 应用程序可以轻松移植，尤其是当你已将查询外部化时。但现实是，大多数应用程序要么有复杂的对象到表映射需求，要么有复杂的查询需求，或者最坏的情况下两者兼有。此外，使用直接\
  \ SQL 时，我们有时会使用特定于数据库供应商的功能，这可能会将你牢牢绑定到该特定供应商。\n\n幸运的是，开源社区再次给了我们一个选择。Hibernate\
  \ 是一个 ORM 工具，被描述为一种用于惯用 Java 的关系持久化服务，可以翻译为“Java 的面向对象透明持久化机制”。这里的透明性意味着被持久化的对象中没有任何代码暴露其持久化能力，这与例如\
  \ Entity EJB 不同，在 Entity EJB 中，持久化能力在其组件结构、关系以及其环境（EJB 容器）中被显式标记。\n\nHibernate 提供了持久化和对象查询功能，允许你以细粒度的方式处理丰富的对象模型。它提供了一种面向对象的声明式编程模型，不依赖于代码生成或构建时的字节码修改，尽管它通过代码生成库（cglib）使用反射和运行时代码增强。Hibernate\
  \ 不强制你实现任何特殊接口或扩展任何特定类；你可以使用干净简单的 POJO。\n\n在 Hibernate 中，对象和表之间的映射可以在 XML 文档中定义，也可以在\
  \ Java 代码中以编程方式定义，或者通过 JSR-220 持久化注解定义。此外，像 XDoclet 这样的项目允许你在 Java 标准版 1.5 之前的应用程序中使用\
  \ Javadoc 注释进行注解，这些注释用于生成 XML 映射。Hibernate 在独立应用程序或托管环境（如 J2EE 服务器）中都能同样出色地工作。\n\
  \nHibernate 项目由 Gavin King 于 2001 年底启动，源于他使用早期版本 CMP EJB 的经验。Hibernate 易于使用的类 SQL\
  \ 查询语言使习惯于编写 SQL 的开发人员更容易从容器管理持久化（CMP）EJB 或直接 JDBC 过渡。该项目已成为开源项目的一个成功典范，因为它提供了大量清晰的文档，并且拥有非常响应迅速的社区支持。2003\
  \ 年底，Hibernate 成为 JBoss 项目的一部分，目前被用作 JBoss CMP EJB3 引擎的基础，并对 EJB3 规范产生了巨大影响。Hibernate\
  \ 提供了一个单一、简单的 API，力求熟悉（类似于 SQL）而非符合标准。图 4-1 显示了 Hibernate 架构的简化视图。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C04.fm Page 91 Wednesday, February 22, 2006 2:16 PM\n\n第 4 章\
  \ ■ 使用 Hibernate 进行对象关系映射\n\n**91**\n\n**图 4-1.** *Hibernate 架构*\n\n从图 4-1 可以看出，你使用\
  \ Hibernate 的多少取决于你的需求。在最简单的层面上，Hibernate 提供了一个仅处理 ORM 的轻量级架构。全面使用 Hibernate 可以完全抽象持久化的大部分方面，例如事务、实体/查询缓存和连接池。要了解更多关于\
  \ Hibernate 架构的信息，请访问 www.hibernate.org/hib_docs/v3/reference/en/html/architecture.html。\n\
  \n**Hibernate 的工作原理**\n\nHibernate 的成功在于其核心概念的简单性。在你的代码与数据库之间的每次交互的核心是 Hibernate\
  \ Session。图 4-2 概述了 Hibernate 的工作原理。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
