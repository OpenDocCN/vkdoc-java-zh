  \ 引言\n\n**用例建模**\n\n用例建模的主要目标是理解用户需求，并使你能够从客户的角度审视系统。用例描述了参与者如何与系统交互以实现某些业务目的。它们是功能分解过程的程序化描述。\n\
  \n尽管用例本质上并非面向对象，但这并不意味着用例在面向对象分析与设计（OOAD）中没有价值。相反，它们是理解用户需求和规划系统中可交付里程碑的良好工具。\n\n\
  当然，在使用用例进行建模时必须谨慎，因为它们可能导致在没有正确理解问题领域的情况下定义过程。这可能会创建许多“人为的”类来支持特定的用例，从而污染和扭曲了所建模领域的本质。只要你理解这一点，使用用例就不会有问题。\n\
  \n\n\n根据我的经验，用例对测试用例的实现具有重要价值，并且它们推动了测试驱动（测试优先）的流程。从这个意义上说，一个用例的完成就变成了一个切实可交付的成果，能够为系统的利益相关者提供即时反馈。\n\
  \n在当前强调服务驱动架构的背景下，用例是定义服务目标的良好载体，并且有助于定义诸如会话外观之类的面向服务组件。\n\n用例与领域无关组件（DNC）\n\n在建模用例之前应用领域无关组件（DNC）是一个很好的铺垫，因为它有助于防止用例建模中的一个主要错误：即用例决定对象模型的结构。\n\
  \n当用例驱动模型的形态时，该模型实际上就变成了当前所处理功能的奴隶，而不再是业务的真实体现。这意味着，尽管一个用例可能让你清晰地理解参与者和系统之间的单一交互，但它并不能让你理解问题域（就像领域模型那样），这可能导致设计上的视野狭窄。\n\
  \n在某种程度上，你可以将时刻-间隔类等同于一个用例、用例的一部分，或者一个或多个用例的封装。用例通常被记录为简短但精炼的文本描述或场景，类似于极限编程（XP）创建用户故事的方式，即描述系统应如何解决某个问题。\n\
  \n表 1-2 显示了业务用例的部分列表，其中列出了所涉及的参与者以及任何扩展或包含的用例。\n\n**表 1-2.** *TechConf 初步用例列表* **用例\
