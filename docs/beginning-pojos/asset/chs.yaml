  \n■ ■ ■\n\n持续集成\n\n**我**们都听说过有多少软件项目失败的统计数据。统计数据告诉我们，项目越大，失败的可能性就越大。根据我自己的经验，我见过一些项目表面上进展顺利，直到那个可怕的日子——你必须向客户进行演示。当你逐项检查功能列表并与负责的开发者交谈时，你发现有些功能可以工作，但尚未集成。每个人都提交了他们的代码，然后某个可怜的人，可能是被标记为\
  \ QA 工程师的人，尝试构建应用程序。当你在 QA 机器上看到一连串的错误时，空气中充满了焦虑。发生了什么？每个开发者单独运行时都是正常的。那么，你该责怪谁？\n\
  \n从这些教训中，我们得出了每日构建的做法，它通常会生成某种可交付物，供 QA 人员在早上进行测试。这种做法虽然好，但仍然没有解决问题。问题的根源在于文化问题。程序员们习惯于获取一份源代码副本，然后在其上工作，直到他们认为代码值得集成到主代码库中。\n\
  \n一种被许多方法论，特别是极限编程（XP）运动所接受和推广的现代软件开发实践，就是持续集成（CI）实践。这种实践可能是你从 XP 和敏捷运动中学到的最重要的教训之一（尽管它不是一个新概念，但现在已被这些运动正式化并大力倡导）。其主要思想是，从事项目的开发者应该至少每天集成一次他们对代码的更改。借助一套强大的单元测试和一个能够以持续、自动化的方式执行这些测试的系统，你可以确保引入系统的任何问题都能在下一次构建中被发现。因此，CI\
  \ 关乎开发者的纪律以及那些能让期望行为成为阻力最小路径的工具。\n\n持续集成，结合强大的测试集，可以防止问题被忽视。它将引入代码库的问题及其存在的信息在时间上本地化，使你能够在问题发生时立即做出反应。一个配置良好的\
  \ CI 系统就像给你的应用程序脉搏装上了心脏监测器，让开发者对他们提交到项目中的代码负责。\n\n**345**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C09.fm Page 346 Thursday, February 16, 2006 3:35 PM\n\n**346**\n\
  \n第 9 章 ■ 持续集成\n\nCI 不仅仅是频繁构建代码。它的成功取决于许多因素。其中一些因素幸运地已成为当今的常见实践，但其他因素则需要一些预先考虑，包括以下内容：\n\
  \n• **版本控制：** 应该有一个单一的、版本化的仓库，所有开发者都可以从中获取应用程序代码的最新版本以及以前的版本。\n\n• **构建自动化：** 对于开发者来说，构建应用程序应该相对简单。通常，只需要一个命令和最少的配置。\n\
  \n• **测试自动化：** 应用程序的测试套件应该易于执行，并且添加新测试应该非常简单。\n\n在第 8 章中，您学习了如何为应用程序创建单元测试。在第 3\
  \ 章中创建并在全书过程中增强的构建，应该为在您的下一个项目中实现 CI 奠定基础，并保持项目健康状况。有了这些基础，实现持续集成的基本步骤很简单：\n\n•\
  \ **集成：** 将更改检入到中央仓库。（添加新功能的代码需要新的测试用例，这些用例也必须被检入。）\n\n• **测试：** 执行所有测试。成功的集成以测试阶段\
  \ 100% 的成功率为前提。如果任何测试失败，有问题的代码将被回滚，并重构代码直到通过测试。\n\n• **重复：** 借助自动化，您可以在明确定义的时间间隔（理想情况下至少每天一次）以及每次将更改引入代码库时运行此过程。这确保了系统代码库始终保持完全测试状态，并且错误和缺失的功能能尽快得到处理。\n\
  \n由 XP 和敏捷方法论倡导者所推崇的 CI，是大多数开发者认同但很少有团队真正实施的概念之一。你应该只构建必要的内容，并且一旦引入代码库，就应尽可能频繁地测试其是否符合需求。你还应该理解，一次性进行大量更改会导致后来数小时的“大爆炸”式集成测试。\n\
  \n通过不让代码更改在手中停留超过一天，团队可以最大限度地降低代码碎片化的风险。当开发者从不将更改集成到代码库中，实际上是在其开发环境中使用旧版本工作时，就会产生这些“非官方分支”，从而导致难以发现的错误和无数小时的集成工作。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C09.fm Page\
  \ 347 Thursday, February 16, 2006 3:35 PM\n\n第 9 章 ■ 持续集成\n\n**347**\n\n通过采用测试驱动开发方法并结合构建过程自动化，团队可以实现持续集成，并且只在需要时构建所需的内容，并正确地构建它。CI\
  \ 增加了团队对正在构建的系统的了解，从而提高了对系统及其利益相关者反馈的反应时间。\n\nCI 通过使查找、诊断和修复问题变得更加容易，从而降低了软件开发的总成本。\n\
  \nCI 需要一些准备、协调和团队的支持。根据我的经验，CI 在较新的代码库上与测试驱动开发结合使用时效果最佳。如果你继承了一个几乎没有测试的代码库，第一步是在实施\
  \ CI 解决方案之前，通过编写测试来理解代码。\n\n■**提示** 关于 CI 的最佳文章之一由 Martin Fowler 撰写，可以在他的网站 www.martinfowler.com/articles/continuousIntegration.html\
  \ 上阅读。\n\n**CruiseControl**\n\n为了为 TechConf 系统启用 CI，我们将使用 CruiseControl 持续集成框架，该框架托管在\
  \ SourceForge 上，地址为 http://cruisecontrol.sourceforge.net。\n\n\n\nCruiseControl 包含一个免费的\
  \ Java 开源构建调度器以及多个用于通知和报告的实用程序。你可以将 CruiseControl 视为 Ant 的 Cron 版本。CruiseControl\
  \ 与 Ant、Maven 或任何可从命令行调用的工具等构建工具无缝集成。CruiseControl 可与许多最流行的版本控制系统配合使用，例如 CVS、Subversion、Visual\
  \ SourceSafe、PVCS 和 ClearCase 等。\n\nCruiseControl 以二进制和源代码两种形式分发。（在撰写本文时，最新版本是 2.3.1。）\n\
  \nCruiseControl 由两个子系统组成：\n\n• **构建循环（Build Loop）：** 一个设计为作为守护进程运行的应用程序，用于监视源代码仓库的变更。如果检测到任何变更，它会运行构建并发送关于构建状态的报告。\n\
  \n• **构建结果 JSP（Build Results JSP）：** 一个 Web 应用程序，用于格式化和显示 CruiseControl 构建循环的结果和状态，以及之前构建的结果。它显示诸如编译错误、测试结果和源代码仓库变更等信息。\n\
  \n通常，你会将 CruiseControl 设置在“构建服务器”上，该服务器应是一台高可用性机器。构建服务器也称为持续集成服务器。\n\n图 9-1 显示了一个典型的设置。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C09.fm Page\
  \ 348 Thursday, February 16, 2006 3:35 PM\n\n**348**\n\n第 9 章 ■ 持续集成\n\n**图 9-1.**\
  \ *持续集成的典型设置* **配置构建服务器**\n\n要设置 TechConf 构建服务器，我们需要一台配置了 Java、CruiseControl、一个\
  \ Web 容器（例如 Tomcat 或 Jetty）以及 Ant 构建工具的机器。\n\n在本章中，我使用的是一台配置了 Fedora Linux Core\
  \ 4 的机器。安装说明针对该平台进行了定制，但应与其他平台类似。\n\n第一步是下载 CruiseControl 的二进制发行版，并将文件解压到合适的位置。对于\
  \ Linux 系统，我建议将 CruiseControl 放在 opt 目录下。对于版本 2.3.1，路径为 /opt/cruisecontrol-2.3.1。我发现创建一个指向该目录的符号链接并将其命名为\
  \ /opt/cruisecontrol 会很方便。通常，如果你有某个产品的多个版本，就会这样做，从而使符号链接指向你希望在系统中使用的最新或默认版本。\n\n\
  **CruiseControl 工作目录**\n\n下一步是创建 CruiseControl 工作目录。对于示例 Linux 系统，我使用了 /opt/cc-working-dir。在工作目录下，创建以下目录：\n\
