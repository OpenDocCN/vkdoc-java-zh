  \ntapestry-4.0.jar\n\nTapestry 核心\n\ntapestry-annotations-4.0.jar\n\nJava 5 注解支持\n\
  \ntapestry-contrib-4.0.jar\n\n社区贡献的组件\n\nhivemind-1.1.jar\n\n服务和配置微内核核心\n\nhivemind-lib-1.1.jar\n\
  \n通用 HiveMind 功能\n\ncommons-codec-1.3.jar\n\n编码器实现\n\ncommons-fileupload-1.0.jar\n\
  \n文件上传和多部分支持\n\ncommons-logging-1.0.4.jar\n\n日志包\n\njavassist-3.0.jar\n\n反射和字节码操作\n\
  \nognl-2.6.7.jar\n\n对象图导航语言\n\noro-2.0.8.jar\n\n正则表达式包\n\n**HTML 页面**\n\n让我们首先为我们的应用程序创建一个简单的\
  \ HTML 页面。Tapestry 页面模板是常规的 HTML 文档，其中装饰有 Tapestry 在运行时动态替换的标签和属性。\n\n我们简单应用程序的初始模板如清单\
  \ 7-1 所示。\n\n**清单 7-1.** *Tapestry Time HTML 模板 (Home.html)*\n\n<html>\n\n<body>\n\
  \n<h1>Tapestry Time</h1>\n\n当前时间是 <span jwcid=\"time\">正午</span>!\n\n</body>\n\n\
  </html>\n\n将此页面模板保存为上下文目录中的 Home.html。像任何优秀的框架一样，Tapestry 遵循“约定优于配置”的理念。在启动时，Tapestry\
  \ 会查找名为“Home”的页面并渲染它。（您可以覆盖此默认行为，但这是一个易于遵循的约定，并且大多数 Tapestry 应用程序都这样做，以便轻松找到应用程序的主页面。）\n\
  \n这个 HTML 文档看起来与任何其他 HTML 文档一样。它在任何兼容的 Web 浏览器中都是可用的，更重要的是，可以在任何所见即所得的 HTML 编辑器（如\
  \ HomeSite 或 Macromedia 的 Dreamweaver）中进行编辑，如图 7-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
