  \n■ ■ ■\n\n测试\n\n**当**一个软件增长到超过几百行代码时，您如何知道它是否出了问题？您如何知道它是否按预期工作？您如何知道是否存在某种情况（可能是由用户输入驱动的）会导致整个应用程序崩溃？常识告诉我们，您需要开发一套测试来测试应用程序的所有独立部分、组件或模块，以及覆盖这些组件与外部实体（如用户和其他系统）之间所有可能交互场景的测试。\n\
  \n让我们通过软件工程中可能最被滥用的类比——建造房屋——来说明关于测试的一些要点。不同的人（参与其建造和使用）可以从许多不同的角度来看待一所房子。房子可以被看作是各个独立组件（如砖块、木梁、门、钉子等）的集合。这是对房子最简化的组件视图。从这个角度来看，我们得出结论：如果每个组件都通过了制造商某种形式的质量控制，那么剩下的就只是测试这些组件之间的交互了。\n\
  \n\n\n如今在软件开发领域，“单元测试”这一术语通常指代这样一种测试类型：它隔离一个单元，并测试其内部功能以及外部契约。如果你将测试视为开发的第一阶段，那么单元测试就变成了对尚未编写的代码进行测试。测试优先的理念是测试驱动开发（TDD）的核心，并且已被证明能够提升代码质量并控制项目范围。在房屋的例子里，制造商的测试可被视为单元测试。Java\
  \ 中的单元测试将 Java 类视为功能的基本原子单元，并混合了白盒测试与黑盒测试。例如，如果一个类 `MyClass` 有一个名为 `doSomething`\
  \ 的公有方法，该方法依赖于一个私有方法 `performCommonOperation`，那么作为 `MyClass` 测试的一部分，假设在 `MyClassTest`\
  \ 类中，我们将有一个 `performCommonOperationTest` 方法（白盒测试）和一个 `doSomethingTest` 方法（黑盒测试）。一个软件测试具有特定的前置条件，而实际测试则是针对给定的前置条件，检查后置条件是否与预期状态相符。\n\
  \n**单元测试还是功能测试？**\n\n我之前提到过，Java 中的单元测试由白盒测试和黑盒测试组成。白盒测试是测试类的内部实现，比如私有方法和受保护方法，并考虑其实现细节。黑盒测试则是测试其他类可能使用公有方法的不同方式，包括可能被视为错误的使用方式。黑盒测试有时被称为功能测试或具体测试，在某些圈子里，Java\
  \ 中需要类本身之外的任何资源的单元测试**不被**视为单元测试。特别是，在 Java 社区中流传的单元测试的纯粹定义是：任何与另一个系统（如数据库、文件系统或\
  \ Web 服务）通信的测试，或者依赖于其他测试执行、或无法与其他测试并发执行的测试，都不被视为单元测试，而是功能测试。\n\n这种激进的单元测试定义有利于提高生产力，因为它确保测试可以在任何环境中、以任何顺序执行，并且执行速度快。这些特性使得自动化以及持续集成实践（见第\
  \ 9 章）更加可行。\n\n鉴于大多数 Java 测试框架都被标记为“单元测试”框架（包括对 Java 世界影响最大的测试框架 JUnit），很容易理解人们可能会将上述单元测试定义奉为圭臬，最终得到一个相当快速但相当浅层的测试工具集。单元测试无法解决集成错误或任何其他系统范围的问题。TestNG\
  \ 框架的创建者 Cedric Beust 准确地指出，根据上述定义，在单元测试框架下编写的大多数测试并非单元测试，而是功能测试，并且单元测试与非单元测试之间的界限并不清晰。\n\
  \n回到我们房屋的类比，用单元测试的狭义定义来限制你的测试工具集，就像假设因为房屋的所有组件都经过了各自制造商的测试，它们就能恰当地协同工作，并且会按预期方式被使用一样。任何建造过房屋的人都可以证明，无论材料质量如何，也无论制造商进行了多少质量控制，房屋中的大多数问题都是由某些材料的使用方式引起的。\n\
  \n在房屋的类比中，房屋的其他视角也浮现出来。例如，对房主来说，房屋可能被视为一系列房间的集合，而从他们的角度来看，测试可能涉及诸如自然采光量、房间是否符合家庭日常活动路线等标准。关键在于，房屋就像软件一样是分层建造的，并涉及横切关注点，如承重墙、电路和管道。成功测试一个应用程序，关键在于根据应用程序的不同抽象层次来组织测试，并专注于覆盖某一层次中的单元以及单元之间的交互。\n\
  \n在本章中，我们将通过创建测试组来为 TechConf 示例应用程序构建一个测试工具集，这些测试组将处理应用程序中不同层次的抽象，从 ORM 层的底层细节，到服务层的高层测试，以及用于实现这些服务目标的设计与实现模式之间的相互作用。本着本书的精神，我们将使用\
  \ TestNG 框架，它代表了 Java 测试框架发展的下一步。\n\n**开发周期中的测试**\n\n过去 10 年间，软件开发和管理方法论已经极大地演进，以应对企业级\
  \ Web 应用程序日益缩短的周转时间和不断提高的质量要求。从极限编程（XP）、特性驱动开发（FDD）和 Scrum 中，我们了解到增量式、周期性的技术最适合应对软件的可塑性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C08.fm Page\
  \ 307 Thursday, February 23, 2006 4:23 PM\n\nC H A P T E R 8 ■ T E S T I N G\n\n\
  **307**\n\n■**提示** 到目前为止，大多数开发者都接触过极限编程的概念（www.extremeprogramming.org/），但如果你尚未了解\
  \ FDD，我推荐阅读 Jeff De Luca 的 Nebulon 网站（www.nebulon.com）上的文章部分，以及 Palmer 和 Felsing\
  \ 合著的《A Practical Guide to Feature-Driven Development》（Prentice Hall，2002）。如果你想学习如何管理你的项目，更重要的是如何管理你的团队，请花时间了解\
  \ Scrum（www.scrumalliance.org）。\n\n在过去五年中，测试领域经历了一次复兴。开发团队已经认识到，他们不能再仅仅依赖 QA 团队来测试应用程序。测试是每个人的工作。我们还认识到，将应用程序的测试留到项目结束是一个坏主意。为什么？一个原因与测试什么的问题有关。在编写代码的同时（或作为构建代码的驱动力）增量地创建测试，不仅能带来更好的测试覆盖率，更重要的是，增量式测试创建通过验证、反驳或仅仅质疑设计和开发过程中所做的假设，来塑造正在构建的软件。增量式测试不仅带来更好的软件，而且当与持续集成实践相结合时，还能提高生产力。持续集成自动化了测试过程，以便几乎立即发现项目代码库中因变更而引入的任何不良副作用。这样，你的团队处理的就不是一组随时间累积、可能相互纠缠的复杂问题，而是（希望是局部化的）细粒度变更所带来的影响。\n\
  \n这对我们大多数人来说当然是有道理的，但在软件开发中，我们并不总是去做那些有道理的事情。当完成项目的压力增大时，首先被牺牲的往往是测试。为什么？因为有时测试可能很繁琐。因此，我们需要让测试不再是开发的副产品，而是其背后的主要驱动力，首先让测试贯穿整个开发过程，并使其成为阻力最小的路径。\n\
  \n\n\n迄今为止，已经开发了许多应用程序、工具和框架，用于标准化、自动化和简化单元测试与功能测试的流程。无论你使用何种工具，我发现下一节中展示的简单实践，能够将软件测试置于其应有的、至关重要的地位。你的软件将更准确地实现其预期功能。\n\
  \n**测试最佳实践**\n\nTDD（测试驱动开发）倡导一种编程实践：先编写测试，再编写代码使测试通过，然后进行重构以优化代码和应用程序的整体设计，同时确保不破坏已有测试。显然，这会产生一套全面的测试套件，覆盖了代码的功能，因为它本身就是待构建内容的契约。以下列表反映了我对测试的理念：\n\
  \n**1. 先编写测试：** 首先编写展示给定类典型用法（加上一些边界或极端情况）的测试。然后编写足够的代码来通过这些测试。贯穿本书的面向接口编程思想，有助于实现“测试先行”的方法。\n\
  \n**2. 编写意图清晰的代码：** 遵循良好的面向对象实践，创建让他人一目了然的代码。保持类的小型化，并使用良好的命名规范。为已知意图的组件编写测试更容易，尤其是考虑到将来可能由其他人编写或增强这些测试。如果你选择采用实践\
  \ 1，那么这项实践会变得更容易。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C08.fm 第 308 页 2006 年 2 月 23 日，星期四，下午 4:23\n\n**308**\n\n第 8 章 ■ 测试\n\n**3. 测试所有内容：**\
  \ 如果可能出错，就测试它。如果可能产生接口不明确的副作用或输出，就测试它。即使是简单的组件，如果其意图或功能不明确，也可能在其他组件中引发错误。我将软件中的测试等同于数学中的形式证明。除非有一套全面的测试，否则任何对组件质量的保证都只是幻觉。\n\
  \n**4. 在开发早期建立测试框架：** 将测试作为构建过程的一部分，如果可能，使用与你的开发工具集成良好的测试框架；在项目早期这样做，将确保整个团队拥抱测试，并使其成为阻力最小的路径。\n\
  \n**5. 编写刚好能通过单元测试的代码：** 当单元测试完成时，任务才算完成。就像代码未经编译就不应检入版本控制系统一样，代码除非附带一套全面的单元测试并且这些测试通过，否则也不应检入。\n\
  \n**6. 将测试映射到用例、用户故事或功能：** 无论你使用何种需求收集技术，都要将这些需求映射到一组明确定义的测试。\n\n**7. 启用持续集成：**\
  \ 正如你将在第 9 章中学到的，持续集成依赖于开发者在代码检入前运行单元测试。此外，所有单元测试应至少在构建服务器上每天执行一次（每小时作为构建间隔似乎效果不错），或者在每次代码检入后执行。\n\
  \n**8. 不要过度测试：** 测试要足以覆盖功能。当缺陷出现时，再添加新的测试。使用等价类划分和边界值分析等技术来最小化所需的测试数量。对测试进行分组、分类和组织，可以确保你不会编写冗余的测试，并且测试能覆盖给定组件的功能范围和场景。\n\
  \n**工具**\n\n得益于开源社区创建的工具，上一节中提到的最佳实践在实践中是可行的。在本章中，我们将介绍其中一些工具，但在深入代码之前，理解可用的不同类别的测试工具非常重要：\n\
  \n• **测试框架：** 诸如 JUnit 和 TestNG 等框架，其灵感来源于 xUnit 系列的单元/回归测试框架，它们提供了创建、运行和报告测试结果的基本能力。\n\
  \n• **容器内测试工具：** 这些工具使你能够测试依赖于容器的组件的功能，通常使它们看起来像是简单的 Java 对象。\n\n• **Web 测试工具：**\
  \ 这些工具通常扩展现有的测试框架，以支持基于 HTTP 协议的测试，并且是容器内测试工具的一个子集。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C08.fm 第 309 页 2006 年 2 月 23 日，星期四，下午 4:23\n\n第 8 章 ■ 测试\n\n\
  **309**\n\n• **测试覆盖率工具：** 这些工具使你能够确定应用程序被测试覆盖的程度。\n\n• **模拟对象框架：** 模拟对象框架提供了动态创建对象的能力，这些对象可用于模拟功能测试中所需的协作对象。\n\
  \n**JUnit**\n\n多年来，单元测试一直由 `System.out.println()` 函数或类 main 方法中的测试代码组成。尽管这种测试形式可能有效，但它是一种被动措施，存在一些缺点：它需要人工干预和解读，会污染生产代码并部署测试代码，而且结果的可重复性不高。最著名的测试框架是\
  \ JUnit，它至今仍是测试领域的庞然大物，并且已被其他项目扩展，以提供软件开发许多领域的测试支持。\n\nJUnit 是将测试重新带回聚光灯下的开创性框架。JUnit\
  \ 托管在 www.junit.org，是一个基于 Java 内省机制以及测试方法、测试类和测试套件概念的简单框架。该框架包含用于创建测试的可扩展类，以及用于运行测试并呈现结果的测试运行器。\n\
  \n`junit.framework` 包包含了用于开发单元测试的接口和类。\n\n`Test` 接口是一个用于定义测试的简单接口。大多数用户并非直接实现 `Test`\
  \ 接口，而是扩展抽象基类 `junit.framework.TestCase` 或具体类 `junit.framework.TestSuite`。一个 `TestCase`\
  \ 包含针对单个单元的测试，而一个 `TestSuite` 是 `Test` 类的集合。\n\n在 Java 中，一个单元就是一个类。因此，一个 `TestCase`\
  \ 通常包含针对单个类的所有测试。一个测试测试一个类的单个方法或单个工作单元。测试有三种可能的结果：通过、失败或错误。如果测试通过，则表明该方法或工作单元按预期实现了所有功能。当期望值不等于实际值时，就会发生失败。例如，可能会编写一个测试来检查当向集合中添加对象时，大小是否增加。断言用于将实际值与期望值进行比较。\n\
  \n未捕获的异常是导致错误的原因。测试运行器可用于执行 `TestCase` 并报告结果。有许多可用的测试运行器。\n\n\n\n要定义一个测试，需要继承 `junit.framework.TestCase`\
  \ 类，并添加类似清单 8-2 中所示的相应测试方法。测试是一个没有返回值、没有参数、且名称以 testXXXX 开头的方法。在测试方法中，使用 `Assert`\
  \ 类的静态方法来判断测试的实际结果值是否等于预期值。`Assert` 类包含许多静态的 assert 方法。除了预期值和实际值参数外，大多数方法还有一个可选的\
  \ `message` 参数，用于描述失败原因。一个例子是重载的 `assertEquals` 方法，用于比较几乎所有已定义的数据类型。除了 `assertEquals`，还有\
  \ `assertNotNull`、`assertFalse`、`assertNotSame`、`assertNull` 和 `assertTrue`。`Assert`\
  \ 类还包含一个 `fail` 方法，用于解释失败原因。`TestCase` 类继承了 `Assert`，因此在 `TestCase` 中无需直接使用 `Assert`\
  \ 类。测试类还可以选择性地重写 `setUp` 和 `tearDown` 方法，以准备和清理测试的状态。`setUp` 方法会在每次执行测试方法之前被调用，而\
  \ `tearDown` 方法会在每次执行之后立即被调用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C08.fm Page 310 Thursday, February 23, 2006 4:23 PM\n\n**310**\n\
