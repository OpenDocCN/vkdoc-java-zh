  \n■ ■ ■\n\n使用 JBoss 的业务服务\n\n**在**过去的十年中，Java 在企业计算的服务器端一直占据主导地位。\n\n在当代企业开发中，J2EE\
  \ 应用服务器处于核心位置，并已取代操作系统成为创建企业应用和服务的新抽象层。J2EE 架构代表了中间件技术的最高水平，它汲取了事务处理监控器（TP 监控器）、对象请求代理（ORB）、组件技术、分布式计算以及关系数据库和对象数据库等领域的经验教训。Java\
  \ 进入企业领域始于 Servlet API 的引入，随后是 JavaServer Pages、早期的 EJB 组件模型以及大量的 Model-View-Controller\
  \ 实现。\n\n这些技术帮助 Java 在 Web 应用领域赢得了竞争，但真正让企业客户接受的是 Java EE（原 J2EE）规范的更宏大愿景。Java EE\
  \ 提供了一种统一的方式来处理企业面临的大局问题，例如目录服务、分布式事务、消息传递、可伸缩性和集成。作为企业计算技术栈的规范，Java EE 提供了一份广泛且令人印象深刻的技术清单，这些技术松散耦合却又紧密集成。\n\
  \n\n\n与任何被大规模采用的技术一样，该规范的缺点对于那些构建数据库驱动型 Web 应用程序（这已成为该平台的*存在理由*）的人来说变得显而易见。这些缺点在生产效率和可测试性方面尤为突出。J2EE\
  \ 本应让简单的事情变得简单，让困难的事情成为可能，但该规范需要一段时间才能成熟到实现这一梦想。Java EE 过去是，现在仍然是一个由委员会制定的规范，像任何此类实体一样，其进展缓慢如蜗牛。像\
  \ Java EE 这样丰富的平台的一个问题是它提供了过多的工具和可能性。架构师和开发人员都开始使用当时重量级的 EJB 技术来构建简单的应用程序。在 Java\
  \ EE 的早期版本中，使用 EJB 有几个明确定义的理由，例如分布式事务和远程访问的需求。如果你使用了 EJB，但你的应用程序并不满足这些需求，那么你就是在让你自己和你的团队承受许多不必要的痛苦。此外，EJB\
  \ 提出的组件模型过于简单，无法创建真正丰富的面向对象应用程序。在限制面向对象表达能力的同时，早期版本的 Enterprise JavaBeans 规范使用起来过于困难和繁琐。除了创建大量的部署描述符之外，它们还需要创建许多其他“胶水”文件。这些文件的创建、维护和同步需要大量的开销。一些应用服务器甚至需要特定于平台的预编译和打包步骤。所有这些因素使得习惯于使用基于\
  \ POJO 的丰富 Java SE 应用程序或 Servlet API 或 JavaServer Pages 提供的简单 HTTP 包装器的开发人员面临非常陡峭的学习曲线。\n\
  \n**145**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C05.fm Page 146 Wednesday, February 22, 2006 6:13 AM\n\n**146**\n\n第 5 章 ■ 使用\
  \ JBoss 的业务服务\n\n幸运的是，Java 社区就早期 J2EE 规范所造成的发展状况表达了意见。开发人员开始注意到他们无法使用 EJB 来表达丰富的业务对象模型，并且他们对部署一个简单的服务组件或使一个领域实体持久化所需的步骤数量感到沮丧。框架和技术开始出现以应对\
  \ API 的繁琐性。大多数敏捷、轻量级的 Java 框架都围绕着使用 POJO（Plain Old Java Objects，普通 Java 对象）、POJI（Plain\
  \ Old Java Interfaces，普通 Java 接口）、最小化配置量、控制反转（IoC；也称为依赖注入或 DI）以及动态而非静态地提供容器服务等概念。\n\
  \n像 XDoclet 这样的工具成为任何希望高效使用 API 的开发团队的必备工具。这些工具是应对规范中明显缺陷的拐杖。像 Spring 这样的框架展示了回归基础的可能性，它不是强迫你的代码遵循环境（J2EE\
  \ 容器）的规则，而是让你的代码在不受平台提供的众多服务阻碍的情况下工作，同时能够以透明的方式随意使用它们。对我们来说幸运的是，这些抱怨最终通过 Java 社区流程（JCP）以许多\
  \ JSR 的形式进入了规范，这些 JSR 受到了 Java EE 世界中存在的问题和缺失内容的影响。\n\n主要信息是编写 Java EE 应用程序必须变得更容易。JSR\
  \ 220：Enterprise JavaBeans 3.0 旨在“从开发人员的角度通过降低其复杂性来改进 EJB 架构”。在本章中，我们将探索使用 Java\
  \ EE 1.4 技术栈中的前沿技术进行开发的新世界，特别是 JBoss 应用服务器提供的 EJB3 规范，这是对未来 Java EE 服务器样子的真正革命性的愿景。\n\
  \n在本章中，我们将专注于从 TechConf 系统的设计中提取基本服务和流程，并将它们转化为一个组件和模式实现系统，该系统为系统的面向用户区域提供业务服务，同时允许我们维护一个可以演进来满足未来需求的丰富领域模型。\n\
  \n**JBoss**\n\nJBoss 应用服务器始于 1999 年 3 月的 EJBoss 项目。由前 Sun Microsystems 工程师 Marc\
  \ Fleury 和一群热衷于拥抱当时新兴的 EJB 规范的程序员领导，它已发展成为市场上最受欢迎的开源应用服务器，并且是 BEA WebLogic 和 IBM\
  \ WebSphere（市场上的两个商业领导者）的有力竞争者。\n\nJBoss 在 GNU 宽通用公共许可证（LGPL）下分发，是一个 100%兼容的净室实现，提供全套\
  \ Java EE 服务。它构建在一个可插拔的架构之上，该架构利用了 JMX 规范（Java 管理扩展）以及软件工程方面的进步，如面向方面编程（AOP）和（DI）/IoC\
  \ 技术。JBoss 也是最早为开发人员量身定制的应用服务器之一，具有动态功能，如热部署和即时灵活性，例如，在运行时加载和卸载库的能力，以及容器存根和骨架的动态生成。其中许多功能在一些商业产品中仍然找不到。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C05.fm Page\
  \ 147 Wednesday, February 22, 2006 6:13 AM\n\n第 5 章 ■ 使用 JBoss 的业务服务\n\n**147**\n\
  \n**JBoss JEMS**\n\nJBoss 不仅仅是一个应用服务器，它是一个功能齐全的企业开发平台，在 JBoss 企业中间件系统（JEMS）品牌下提供完整的\
  \ Java EE 服务栈。它被定位为寻求构建真正“面向服务架构”（SOA）的企业的一个专业支持的选择，该架构建立在可靠、经过实战考验的中间件组件之上。\n\n\
  JEMS 产品包括一系列令人印象深刻的产品，包括以下内容：\n\n*   **JBoss AS：** JBoss 应用服务器\n*   **Apache Tomcat：**\
  \ Apache Tomcat Web 容器\n*   **Hibernate：** 对象关系持久化和查询服务\n*   **JBoss Portal：** 基于\
  \ Portlet 规范（JSR-168）提供内容聚合和个性化的门户平台。它由 JBoss Nukes 项目演变而来\n*   **JBoss jBPM：**\
  \ 一个强大的工作流和业务流程管理引擎\n*   **JBoss Rules：** 基于 Drools 规则引擎的业务规则引擎\n*   **JBoss Cache：**\
  \ 集群、分布式对象缓存\n*   **JBoss Eclipse IDE：** 一套用于开发 JBoss Java EE 1.4 应用程序的 Eclipse\
  \ 插件\n\n**JBoss AS 架构**\n\nJBoss AS 构建在一个使用 JMX API 提供轻量级微内核层的基础之上，该微内核层提供了一个基于\
  \ MBean 的组件模型，该模型支持基于 MBean 的服务的生命周期管理，并提供了一个高级且灵活的类加载方案。\n\nJMX 规范允许控制和管理托管 Bean（MBeans）。\n\
  \n\n\nMBeans 是封装网络实体（如其他组件、应用程序和硬件设备）的组件。MBeans 与 EJB 类似，存在于遵循 JMX 服务器标准的容器中，即 MBean\
  \ 服务器。MBean 服务器是一个轻量级进程，类似于通用对象请求代理架构（CORBA）的 ORB，充当 MBeans 的存储库或注册中心。JBoss 中的 JMX\
  \ 服务器是系统的中枢，MBeans 在此插入并与其他 MBeans 交互。JMX 被设计为其他网络管理系统的桥梁和整合点，就像 Java 消息服务（JMS）和\
  \ JDBC 分别用于企业消息传递和数据库连接领域一样。\n\nMBeans 专为管理而设计，它们通过向 MBean 注册，使客户端能够接收相关管理事件的通知。JBoss\
  \ 基于 JMX 的灵活架构允许您选择在运行服务器中所需的组件（或服务）。只要存在符合规范的 JMX MBean，JBoss 就允许开发者混合搭配特定 J2EE\
  \ 服务的不同实现。MBeans 使用 MLets 进行注册和实例化。MLets 是管理小程序；MBean 服务器提供一个 MLet 服务，用于加载一个文本文件，该文件指定了要加载的\
  \ MBeans 的信息。通过创建 MBean 服务，可以对 JBoss 进行扩展和定制。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C05.fm 第 148 页 2006 年 2 月 22 日星期三 上午 6:13\n\n**148**\n\n第 5 章\
  \ ■ 使用 JBoss 的业务服务\n\n开箱即用，JBoss 有一个服务层，提供了一组实现 Java EE 1.4 技术栈的服务。在本章后面，您将看到如何使用和管理可用的\
  \ JBoss 服务，以及如何添加第三方服务来满足应用程序的需求。构成 Java EE 1.4 技术栈的服务集由 JBoss AS 中以下预打包的服务提供：\n\
  \n• **JBossServer：** 一个高级 EJB 容器和 JMX “总线”\n• **JBossMQ：** 一个 JMS 提供者（将被 JBoss Messaging\
  \ 取代）\n• **JBossTX：** 用于 JTA/JTS 事务\n• **JBossCMP：** 容器管理持久化引擎\n• **JBossSX：** 用于基于\
  \ JAAS 的安全性\n• **JBossCX：** 用于 Java 连接器架构（JCA）连接\n• **JBossMail：** Java 邮件提供者\n\
  • **JBossWeb：** 一个集成的 Apache Tomcat 容器\n\n监督部署和服务间消息的是一个由拦截器管道组成的切面层，这些拦截器装饰了服务的某些功能方面及其与其他服务的交互。例如，在\
  \ JBoss EJB 容器中，有一个拦截器管道提供了诸如持久化和安全性等众多服务。\n\n在层次结构的顶部是应用层，您的应用程序就位于此处。JBoss 应用程序可以灵活地使用容器提供的服务，可以通过编程方式、使用部署描述符，或者通过\
  \ Java SE 1.5 元数据（JSR-175）来实现。\n\n■Java 元数据功能是在 Java SE 1.5 中以注解的形式引入的，注解是内置于语言中的结构，可以应用于类、属性或方法级别，直接在\
  \ Java 类中提供元信息。注解以 @ 符号开头，并且可以选择性地接受参数。\n\n在 Java EE 中，它们有助于消除许多胶水类、容器契约类以及许多冗余的\
  \ XML 部署描述符。只要可能且合适，我会在代码中使用注解而不是外部配置文件。\n\n图 5-1 展示了 JBoss AS 的架构图。\n\n有兴趣了解更多\
  \ JBoss AS 内部工作原理的读者，应该从探索 JMX API、Java 动态代理 API 以及 Rickard Oeberg 的“拦截器栈”开始，后者是\
  \ JBoss 容器的核心模式。要了解更多关于 JBoss 服务器架构的信息，请参阅位于 http://docs.jboss.org/jbossas/jboss4guide/r4/html\
  \ 的 JBoss 应用服务器指南。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
