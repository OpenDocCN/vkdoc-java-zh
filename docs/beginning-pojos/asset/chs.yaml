  \n清单 5-9 展示了 DynaDTO 配置文件 ConferenceSummary.dto.xml，该文件用于在给定 Conference 领域对象实例的情况下，动态创建实现\
  \ ConferenceSummary 接口的对象实例。\n\n**清单 5-9.** *ConferenceSummary DTO 配置文件*\n\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n\n<dtos>\n\n<dto target=\"com.integrallis.techconf.dto.ConferenceSummary\"\
  \ useProxy=\"yes\">\n\n<sources>\n\n<source type=\"com.integrallis.techconf.domain.Conference\"\
  >\n\n<alias source=\"venue\" name=\"venue\" />\n\n<mapping from=\"id\" to=\"conferenceId\"\
  \ />\n\n<mapping from=\"name\" to=\"conferenceTitle\" />\n\n<mapping from=\"description\"\
  \ to=\"conferenceSubtitle\" />\n\n<mapping property=\"startDate\" />\n\n<mapping\
  \ property=\"endDate\" />\n\n<mapping property=\"abstractSubmissionStartDate\" />\n\
  \n<mapping property=\"abstractSubmissionEndDate\" />\n\n<mapping from=\"venue.name\"\
