  \ DAO 方法中包装任何特定于 Hibernate 的运行时异常（根源于`org.hibernate.HibernateException`）。在高级主题章节中，你将学习如何使用面向切面技术，将高度细化的\
  \ Hibernate 异常层次结构干净地转换为 TechConf 数据访问异常层次结构。\n\n图 5-10 展示了 TechConf 应用程序的简单异常层次结构。\n\
  \n受 Spring 框架的启发，我使用了非检查型异常，因为大多数数据访问异常都是不可恢复的，并且通过清晰的异常层次结构，只需捕获感兴趣的特定异常，而忽略基础异常类（这在检查型异常层次结构中是无法做到的）。非检查型异常层次结构还能避免可怕的“捕获-记录-重新抛出”反模式，或者更糟糕的“捕获-吞没”异常模式。\n\
