  \n**通过宏实现构建文件复用**\n\n如果你仔细留意了之前展示的`compile-init`目标，你会注意到第一行是：\n\n<target-banner\
  \ target=\"compile\"/>\n\n元素`target-banner`并非标准的 Ant 任务或第三方任务；它是一个宏定义，包含在一个名为`macros.xml`的独立\
  \ XML 文件中。宏定义是 Ant 1.6 引入的功能，它帮助你避免繁琐的复制粘贴复用，并使你能够将构建模块化。宏可以在构建文件中的任何位置调用，并且宏定义可以参数化。为了使我们的构建能够使用这些宏，我们使用`import`任务，如下所示：\n\
  \n<import file=\"ant/macros.xml\"/>\n\n让我们看一下`macros.xml`文件，它位于 TechConf 项目根目录下的`ant`目录中，如清单\
  \ 3-7 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C03.fm Page 70 Wednesday, February 22, 2006 6:05 AM\n\n**70**\n\n第 3 章 ■ 使用 ANT\
  \ 构建\n\n**清单 3-7.** *Ant 宏文件*\n\n<?xml version=\"1.0\"?>\n\n<project name=\"techconf-ant-macros\"\
  \ default=\"test-macros\" basedir=\"..\">\n\n<macrodef name=\"target-banner\">\n\
  \n<attribute name=\"target\"/>\n\n<attribute name=\"message\" default=\"\" />\n\n\
  <sequential>\n\n<echo>===========================================================</echo>\n\
  \n<echo>Executing Target @{target}</echo>\n\n<echo>@{message}</echo>\n\n<echo>===========================================================</echo>\n\
  \n</sequential>\n\n</macrodef>\n\n<target name=\"test-macros\">\n\n<target-banner\
  \ target=\"Compile\"/>\n\n<target-banner target=\"Testing\" message=\"This is a\
  \ sample message\"/>\n\n</target>\n\n...\n\n</project>\n\n在`macros.xml`中，我们定义了`target-banner`宏定义。Ant\
  \ 宏定义可以接受属性；在这种情况下，有两个属性：`target`和`message`。从显示的代码片段中你可以猜到，`target-banner`宏定义使用`echo`任务在控制台打印一个横幅，告知用户当前正在执行的目标，并打印一条可选消息。属性使用`attribute`元素定义。`target`属性是必需的，但`message`属性是可选的，因为它有一个默认值。宏属性是可变的，并通过`@{attrname}`进行扩展。\n\
  \n■**注意** 宏属性`@{attr}`在 Ant 属性`${property}`之前展开。如果你在宏中使用属性，这一点很重要。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C03.fm Page 71 Wednesday, February 22, 2006 6:05 AM\n\n第 3 章\
  \ ■ 使用 ANT 构建\n\n**71**\n\n就其本身而言，`macros.xml`文件的行为与任何其他 Ant 构建文件一样。如果我们使用 Ant 执行`macros.xml`文件，如下所示：\n\
  \nant -f macros.xml\n\n默认目标`test-macros`将执行，产生以下输出： Buildfile: macros.xml\n\ntest-macros:\n\
  \n[echo] ===================================================================\n\n\
  [echo] Executing Target Compile\n\n[echo] ===================================================================\n\
  \n[echo] ===================================================================\n\n\
  [echo] Executing Target Testing\n\n[echo] This is a sample message\n\n[echo] ===================================================================\n\
  \nBUILD SUCCESSFUL\n\nTotal time: 1 second\n\n如你所见，`macrodef`与`import`任务结合使用，可以帮助你创建可复用、模块化的\
  \ Ant 功能，这将帮助你保持构建文件的简洁。对于 TechConf 项目，我们将使用`macros.xml`文件来存放大部分与构建过程外围相关的任务。\n\n\
  在本章的剩余部分，我们将继续增强`build.xml`文件和`macros.xml`文件，以创建一个模块化且可复用的 J2EE 构建系统。\n\n**生成 Javadoc**\n\
  \n为了进行良好的团队沟通并实现代码复用，你必须拥有一套一致且最新的 API 文档。Javadoc 工具自 Java 诞生以来就已存在，所有开发人员都对其非常熟悉。问题在于，开发人员认为他们只能在完成代码后才能运行\
  \ Javadoc（这可能永远不会发生）。\n\n在项目结束时运行 Javadoc 对团队中的其他人帮助甚微，并将文档工作推迟到流程末尾，而此时它已不那么有用（瀑布模型）。\n\
  \n使用 Ant，你可以确保 Javadoc 作为每日构建的一部分生成，并且你不会将文档过程隐藏到开发阶段的“末尾”。Ant Javadoc 任务提供了一种从\
  \ Ant 内部生成 Javadoc 的便捷方式。\n\n为了将 Javadoc 生成集成到 TechConf 构建中，我们将使用一个通用的`macrodef`来增强`macros.xml`文件，该宏定义为\
  \ Javadoc 任务中使用的常见设置提供了默认值。有四个必需的属性——`source.path`、`class.path`、`dest`、`year`——以及可选的`company`属性，如清单\
  \ 3-8 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C03.fm Page 72 Wednesday, February 22, 2006 6:05 AM\n\n**72**\n\n第 3 章 ■ 使用 ANT\
  \ 构建\n\n**清单 3-8.** *Javadoc 宏定义*\n\n<macrodef name=\"generate-javadoc\" description=\"\
  Generate JavaDocs.\">\n\n<attribute name=\"company\" default=\"Integrallis Software,\
  \ LLC.\"/>\n\n<attribute name=\"source.path\"/>\n\n<attribute name=\"class.path\"\
  />\n\n<attribute name=\"year\"/>\n\n<attribute name=\"dest\"/>\n\n<sequential>\n\
  \n<javadoc\n\ndestdir=\"@{dest}\"\n\nauthor=\"true\"\n\nversion=\"true\"\n\nuse=\"\
  true\"\n\nwindowtitle=\"${ant.project.name}\"\n\nsourcepathref=\"@{source.path}\"\
  \n\nclasspathref=\"@{class.path}\"\n\npackagenames=\"*.*\"\n\nVerbose=\"false\"\
  >\n\n<doctitle><![CDATA[<h1>${ant.project.name}</h1>]]></doctitle>\n\n<bottom>\n\
  \n<![CDATA[<i>Copyright © @{year} @{company} All Rights Reserved.</i>]]>\n\n</bottom>\n\
  \n<tag name=\"todo\" scope=\"all\" description=\"To do:\" />\n\n</javadoc>\n\n</sequential>\n\
  \n</macrodef>\n\n请注意，`doctitle`和`bottom`嵌套元素使用了 XML 字符数据（CDATA）部分，以便能够使用 HTML 标记，并且不会干扰构建文件的标记。\n\
  \n要在 TechConf 构建文件中使用`generate-javadoc`宏定义，我们可以在`build.xml`中创建一个目标，如清单 3-9 所示。\n\
  \n**清单 3-9.** *Generate-docs 目标*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C03.fm Page 73 Wednesday, February 22, 2006 6:05 AM\n\n第 3 章\
  \ ■ 使用 ANT 构建\n\n**73**\n\n<target name=\"generate-docs\" description=\"Generates\
  \ all documentation\">\n\n<target-banner target=\"generate-docs\"/>\n\n<generate-javadoc\n\
  \nclass.path=\"class.path\"\n\ndest=\"${docs-api}\"\n\nsource.path=\"all.source.path\"\
  \n\nyear=\"2005\"\n\n/>\n\n</target>\n\n<target name=\"generate-docs-clean\">\n\n\
  <delete dir=\"${docs}\" />\n\n</target>\n\n很容易看出，通过有效使用宏定义，你的主构建文件可以变得多么简洁。在本章的其余部分，我们将使用相同的技术，继续用其他功能增强构建。\n\
  \n**使用 Checkstyle 检查代码规范**\n\n即使你在构建时或使用你最喜欢的 IDE 时使用了格式化工具，仍然存在格式化领域之外的风格检查。Checkstyle\
  \ 是一种能够根据规范检查代码的工具。Checkstyle 默认支持 Sun 规范，尽管它可以检查的不仅仅是简单的格式化。例如，它可以检查代码中的非法正则表达式、内联条件语句、双重检查锁定以及其他可能被认为不安全或有问题的惯用法或模式。\n\
  \n\n\n你可以从 http://checkstyle.sourceforge.net 下载 Checkstyle。在 Checkstyle 发行版的根目录下，你会找到\
  \ `checkstyle-all-4.0.jar` 文件。请将此文件放置在 TechConf 项目目录下 `lib` 目录中名为 `checkstyle` 的子目录里。包含\
  \ Sun 编码规范 XML 配置的文件名为 `sun_checks.xml`，它位于发行版目录下的 `docs` 目录中。也请将此文件复制到 `lib/checkstyle`\
  \ 目录下。\n\n默认情况下，Checkstyle 将其输出写入标准输出，或者以纯文本或 XML 格式写入文件。Checkstyle 发行版还提供了多个可扩展样式表语言（XSL）样式表，可用于将\
  \ XML 报告转换为 HTML 格式以便于查看。你可以在 Checkstyle 发行版的 `contrib` 目录下找到这些样式表。请将 `checkstyle-noframes-sorted.xsl`\
  \ 文件复制到 `lib/checkstyle` 目录下。\n\n要在 Ant 中使用 Checkstyle，你首先需要加载 Checkstyle 任务。与 Javadoc\
  \ 任务类似，我们将把 Checkstyle 任务整合到 `macros.xml` 文件中的一个 `macrodef` 中。首先，我们需要通过为 Checkstyle\
  \ 定义一个 `taskdef`，使其对 `macros.xml` 文件可用：\n\n<path id=\"checkstyle.class.path\">\n\
  \n<fileset dir=\"lib/checkstyle\">\n\n<include name=\"*.jar\"/>\n\n</fileset>\n\n\
  </path>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C03.fm Page 74 Wednesday, February 22, 2006 6:05 AM\n\n**74**\n\n第 3 章 ■ 使用 Ant\
  \ 构建\n\n<taskdef\n\nresource=\"checkstyletask.properties\"\n\nclasspathref=\"checkstyle.class.path\"\
  \n\n/>\n\n`macrodef generate-checkstyle` 接受两个必需属性：`src` 用于确定包含待检查源文件的目录，`checkstyle-reports`\
  \ 用于指定生成报告的位置。其余属性——`checkstyle-checks-file`、`checkstyle-xml-report-file`、`checkstyle-html-report-file`\
  \ 和 `checkstyle-stylesheet`——都是可选的。请注意，某些可选属性的默认值是根据必需属性的值生成的。\n\n该 `checkstyle`\
  \ 宏定义使用 `checkstyle` 任务来检查 `@{src}` 目录下的代码是否符合 `@{checkstyle-checks-file}` 文件指定的规范，并使用类型为\
  \ `XML` 的格式化器生成 `@{checkstyle-xml-report-file}` 中引用的报告。`failureProperty` 属性是一个属性，如果在检查过程中遇到任何错误，该属性将被设置。你可以使用此值来决定在出错时是否采取任何操作，例如通过电子邮件发送报告。目标的第二部分使用\
  \ `style` 任务将生成的 XML 转换为 HTML 报告。`generate-checkstyle` 宏定义如清单 3-10 所示。\n\n**清单 3-10.**\
  \ *Generate-checkstyle 宏定义*\n\n<macrodef name=\"generate-checkstyle\"\n\ndescription=\"\
  生成代码规范违规报告。\">\n\n<attribute name=\"src\" />\n\n<attribute name=\"checkstyle-reports\"\
  \ />\n\n<attribute name=\"checkstyle-checks-file\"\n\ndefault=\"lib/checkstyle/sun_checks.xml\"\
  />\n\n<attribute name=\"checkstyle-xml-report-file\"\n\ndefault=\"@{checkstyle-reports}/checkstyle-report.xml\"\
  />\n\n<attribute name=\"checkstyle-html-report-file\"\n\ndefault=\"@{checkstyle-reports}/checkstyle-report.html\"\
  />\n\n<attribute name=\"checkstyle-stylesheet\"\n\ndefault=\"lib/checkstyle/checkstyle-noframes-sorted.xsl\"\
  />\n\n<sequential>\n\n<mkdir dir=\"@{checkstyle-reports}\" />\n\n<checkstyle\n\n\
  config=\"@{checkstyle-checks-file}\"\n\nfailureProperty=\"checkstyle.failure\"\n\
  \nfailOnViolation=\"false\"\n\n>\n\n<formatter type=\"xml\" tofile=\"@{checkstyle-xml-report-file}\"\
  />\n\n<fileset dir=\"@{src}\" includes=\"**/*.java\"/>\n\n</checkstyle>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00009.png)\n\nSam-Bodden_596-3 C03.fm Page 75 Wednesday, February 22,\
  \ 2006 6:05 AM\n\n第 3 章 ■ 使用 Ant 构建\n\n**75**\n\n<style\n\nin=\"@{checkstyle-xml-report-file}\"\
  \n\nout=\"@{checkstyle-html-report-file}\"\n\nstyle=\"@{checkstyle-stylesheet}\"\
  \n\n/>\n\n</sequential>\n\n</macrodef>\n\n一个示例 Checkstyle 报告如图 3-6 所示。\n\n**图 3-6.**\
  \ *Checkstyle HTML 报告*\n\n\n\n**生成源代码度量指标**\n\n虽然我不主张将代码行数、类或方法的数量作为衡量项目成功的标准，但静态代码分析可以帮助你定位一些不必要的复杂区域，这些区域可能导致发现潜在的错误或高维护成本的代码。\n\
  \nJavaNCSS 是一个用于 Java 的简单源码度量工具，它提供以下基本分析类型：\n\n• **NCSS：** 非注释源代码语句，提供代码许多特征的计数，例如代码行数、声明、方法、语句、构造函数等。\n\
  \n• **CCN：** 圈复杂度数（McCabe 度量）。McCabe 的圈复杂度度量将程序的控制流图作为其复杂度的衡量标准。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C03.fm 第 76 页 2006 年 2 月 22 日，星期三，上午 6:05\n\n**76**\n\n第 3 章\
  \ ■ 使用 Ant 构建\n\n你可以从 www.kclee.de/clemens/java/javancss/ 下载 JavaNCSS，它是一个简单的 ZIP\
  \ 文件，其中包含一个 Ant 任务。将发行版 `lib` 目录下的所有 JAR 文件放置到 TechConf 项目 `lib` 目录下名为 `javancss`\
  \ 的目录中。接下来，在 `lib/javancss` 下创建一个名为 `xslt` 的目录，并将 JavaNCSS 发行版目录下 `xslt` 目录的内容复制进去。\n\
  \n为了使 JavaNCSS Ant 任务在 `macros.xml` 文件中可用，我们添加以下路径和 `taskdef` 定义：\n\n<path id=\"\
  javancss.class.path\">\n\n<fileset dir=\"lib/javancss\">\n\n<include name=\"*.jar\"\
  />\n\n</fileset>\n\n</path>\n\n<taskdef\n\nname=\"javancss\"\n\nclassname=\"javancss.JavancssAntTask\"\
  \n\nclasspathref=\"javancss.class.path\"\n\n/>\n\n该 Ant 任务可以生成纯文本或 XML 格式的报告。与 checkstyle\
  \ 的 `macrodef` 类似，你将使用 `style` 任务将报告转换为 HTML，如清单 3-11 所示。\n\n**清单 3-11.** *Generate-metrics\
  \ Macrodef*\n\n<macrodef name=\"generate-metrics\">\n\n<attribute name=\"src\" />\n\
  \n<attribute name=\"report-name\" />\n\n<attribute name=\"report-dir\" default=\"\
  .\" />\n\n<attribute name=\"xml-report\" default=\"@{report-dir}/@{report-name}.xml\"\
  \ />\n\n<attribute name=\"html-report\" default=\"@{report-dir}/@{report-name}.html\"\
  \ />\n\n<attribute name=\"stylesheet\" default=\"lib/javancss/xslt/javancss2html.xsl\"\
  \ />\n\n<sequential>\n\n<mkdir dir=\"@{report-dir}\" />\n\n<javancss\n\nsrcdir=\"\
  @{src}\"\n\nincludes=\"**/*.java\"\n\ngenerateReport=\"true\"\n\noutputfile=\"@{xml-report}\"\
  \n\nformat=\"xml\"\n\nfunctionMetrics=\"false\"\n\n/>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00065.png)\n\nSam-Bodden_596-3 C03.fm 第 77 页 2006 年 2 月 22 日，星期三，上午 6:05\n\
  \n第 3 章 ■ 使用 Ant 构建\n\n**77**\n\n<style\n\nin=\"@{xml-report}\"\n\nout=\"@{html-report}\"\
  \n\nstyle=\"@{stylesheet}\"\n\n/>\n\n</sequential>\n\n</macrodef>\n\n生成的 HTML 报告类似于图\
  \ 3-7 所示。\n\n**图 3-7.** *JavaNCSS HTML 报告*\n\n**生成可浏览的源代码**\n\n一个有助于分享项目知识的有用功能是能够生成代码的可浏览版本，以便在线查看。许多开源项目使用这种方式，允许其他人查看特定类的源代码，而无需下载源码发行版或使用\
  \ CVS。Java2Html 是一个工具，它允许你获取一个 Java 类或一段 Java 代码，并生成该代码的语法高亮 HTML 版本。\n\nJava2Html\
  \ 工具可以从 www.java2html.de 获取，它是一个包含一个 JAR 文件（`java2html.jar`）的 ZIP 文件。与其他第三方 Ant\
  \ 任务一样，将该 JAR 文件放置到 TechConf `lib` 目录下名为 `java2html` 的目录中。\n\n如前所述，你应该使用 `taskdef`\
  \ 任务加载该任务。首先，我们将路径和 `taskdef` 添加到 `macros.xml` 文件中，如下所示：\n\n<path id=\"java2html.class.path\"\
  >\n\n<fileset dir=\"lib/java2html\">\n\n<include name=\"*.jar\"/>\n\n</fileset>\n\
  \n</path>\n\n<taskdef\n\nname=\"java2html\"\n\nclassname=\"de.java2html.anttasks.Java2HtmlTask\"\
  \n\n\n\nclasspathref=\"java2html.class.path\"\n\n/>\n\n生成的 HTML 源码将放置在由属性 `${browseable-source}`\
  \ 所指向的位置，如清单 3-12 所示。\n\n**清单 3-12.** *Generate-html Macrodef*\n\n<macrodef name=\"\
  generate-html\"\n\ndescription=\"生成源代码的可浏览 HTML 版本。\" >\n\n<attribute name=\"src\"\
  />\n\n<attribute name=\"dest\"/>\n\n<sequential>\n\n<mkdir dir=\"@{dest}\" />\n\n\
  <java2html\n\nsrcdir=\"@{src}\"\n\ndestdir=\"@{dest}\"\n\nincludes=\"**/*.java\"\
  \n\noutputFormat=\"html\"\n\ntabs=\"4\"\n\nstyle=\"eclipse\"\n\nshowLineNumbers=\"\
  true\"\n\nshowFileName=\"true\"\n\nshowTableBorder=\"true\"\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00048.png)\n\nSam-Bodden_596-3 C03.fm Page 79 Wednesday, February 22,\
  \ 2006 6:05 AM\n\n第 3 章 ■ 使用 ANT 构建\n\n**79**\n\nincludeDocumentHeader=\"true\"\n\
  \nincludeDocumentFooter=\"true\"\n\naddLineAnchors=\"true\"\n\nlineAnchorPrefix=\"\
  fff\"\n\n/>\n\n</sequential>\n\n</macrodef>\n\n图 3-8 展示了一个由 Java2Html 生成的 HTML 页面示例。\n\
  \n**图 3-8.** *由 Java2Html 生成的 HTML 页面* **文档生成**\n\n最后，我们可以将所有文档生成任务归入 build.xml\
  \ 文件中的一个单一目标，如清单 3-13 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  Sam-Bodden_596-3 C03.fm Page 80 Wednesday, February 22, 2006 6:05 AM\n\n**80**\n\
  \n第 3 章 ■ 使用 ANT 构建\n\n**清单 3-13.** *Generate-docs 目标*\n\n<target name=\"generate-docs\"\
  \n\ndescription=\"生成所有文档\">\n\n<target-banner target=\"generate-docs\"/>\n\n<generate-javadoc\n\
  \nclass.path=\"class.path\"\n\ndest=\"${docs-api}\"\n\nsource.path=\"all.source.path\"\
  \n\nyear=\"2005\"\n\n/>\n\n<generate-html\n\nsrc=\"${src}\"\n\ndest=\"${docs-html-source}\"\
  \n\n/>\n\n<generate-checkstyle\n\nsrc=\"${src}\"\n\ncheckstyle-reports=\"${checkstyle-reports}\"\
  \n\n/>\n\n<generate-metrics\n\nsrc=\"${src}\"\n\nreport-dir=\"${metrics-reports}\"\
  \n\nreport-name=\"${ant.project.name}\"\n\n/>\n\n</target>\n\n这个单一的文档生成目标使得构建文件更加简洁。使用\
  \ macrodef 使得主构建文件不那么冗长。我决定将所有文档生成任务分组，这样构建的用户只需处理一个单一的、简单的目标即可完成所有文档生成任务。\n\n**清理**\n\
  \n构建过程会产生许多文件和目录。将项目目录恢复到与从仓库检出源码时相同的状态，对于确定哪些内容已更改非常重要。许多 Ant 用户建议使用一个“clean”目标来移除构建过程产生的所有产物。\n\
  \n这种方法的问题在于，对于大型构建，很容易意外删除需要的文件，也容易遗漏需要删除的文件或目录。因此，你应该为构建文件中的每个主要目标包含一个 clean 子目标。这样做，你将能够轻松地在目标级别确定需要清理的内容。然后，对于全局的\
  \ clean 目标，你可以通过使用 antcall 任务（或将其列为依赖项）来调用所有单独的 clean 子目标，如清单 3-14 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C03.fm Page 81 Wednesday, February 22, 2006 6:05 AM\n\n第 3 章\
  \ ■ 使用 ANT 构建\n\n**81**\n\n**清单 3-14.** *Clean-all 目标*\n\n<target name=\"clean-all\"\
  \ description=\"移除所有构建产物\">\n\n<antcall target=\"compile-clean\" />\n\n<antcall\
  \ target=\"generate-docs-clean\" />\n\n<antcall target=\"test-clean\" />\n\n...\n\
  \n</target>\n\n**All 目标**\n\n最后，一种常见的做法是将构建文件的默认目标命名为“all”，其依赖项中列出了代表系统完整构建的目标列表。如果你的构建过程中有一些非关键但需要相当长时间生成的目标，你可以创建新的目标，这些目标除了执行额外的工作外，还会执行\
  \ all 目标所做的所有事情。例如，一个执行“all”操作并同时生成文档的目标可以命名为“all-with-docs”。\n\n关键在于，你希望最小化构建应用程序所需的时间，以便开发人员的工作流程不会受到明显的干扰。一个典型的\
  \ all 目标如清单 3-15 所示。\n\n**清单 3-15.** *All 目标*\n\n<target\n\nname=\"all\"\n\ndepends=\"\
  compile,...\"\n\ndescription=\"生成、编译、打包和部署。\"\n\n/>\n\n**Eclipse 集成**\n\n在第 2 章中，我们学习了如何安装和配置\
  \ Eclipse IDE。现在我们有了一个 Ant 构建文件，如果能在命令行和 IDE 之间实现和谐，那将是理想的。幸运的是，Eclipse 自带了强大的 Ant\
  \ 集成功能。Eclipse 提供了一个出色的 Ant XML 编辑器，具有语法高亮、代码补全、Ant 元素的悬停评估，以及关于构建文件有效性的即时视觉反馈。\n\
  \n为了使 TechConf 应用程序无缝运行，你可以创建一个 Ant Builder，这是 Eclipse 外部工具框架为 Ant 集成提供的一个功能。Ant\
  \ Builder 可以配置为在特定时间运行。例如，在我的环境中，我将 Ant 构建配置为在手动构建被调用或选择项目“Clean”选项时运行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
