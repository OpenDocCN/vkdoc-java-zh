  DynaDTO 还为动态生成的 DTO 提供了其他功能，例如内置的 `toString()` 实现、检查自 DTO 创建以来哪些属性已更改的功能，以及创建比较器的功能（如前面的配置所示）。\n\
  \n**JSE 环境中的 DynaDTO**\n\n\n\n一旦你拥有了 DTO 接口和 DynaDTO 配置，在 JSE 环境中使用它们只需通过 DynaDTO\
  \ 的 `ConfigurationLoader` 加载所需的映射即可。在 JSE 环境中工作时，DynaDTO 会静态缓存 DTO 映射，然后通过 `BuilderFactory`\
  \ 类提供 DTO 构建器。使用工厂返回的特定构建器，你可以简单地调用 `build` 方法，并传入一个领域对象实例，从而获得一个完全填充的 DTO，如清单 5-13\
  \ 所示。\n\n**清单 5-13.** *在 JSE 环境中使用 DynaDTO* `ConfigurationLoader.loadMapping(new\
