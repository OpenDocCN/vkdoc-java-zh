  \ `ZipcodeDAO` 协作者创建一个模拟对象。要创建一个可被视为所需 DAO 的代理类，我们可以使用以下代码片段：\n\n```java\nZipcodeDAO\
  \ mock = createMock(ZipcodeDAO.class);\n```\n\n要使 `createMock` 静态方法在你的测试类中可用，你需要使用静态导入（允许对静态成员进行非限定访问），如下所示：\n\
