  \n第 4 章 ■ 使用 HIBERNATE 进行对象关系映射\n\n选择合适的标识符生成策略取决于许多因素，包括性能和可移植性。原生数据库策略通常比等效的基于\
  \ Java 的方法更健壮且性能更好。在大多数情况下，我倾向于将简单整数与原生数据库整数键生成器结合使用作为主键。\n\n**保存对象**\n\n现在我们需要告诉\
  \ Hibernate 如何连接到数据库，并在 SessionFactory 中加载 Address.hbm.xml 类映射。对于这个简单示例，我们将直接在 Java\
  \ 代码中完成。后续示例将使用首选的 XML 配置文件。\n\n清单 4-4 展示了如何在代码中创建 Hibernate 配置对象、添加 Hibernate 映射类以及从配置中检索\
  \ SessionFactory 实例。当你调用 Configuration 类的 addClass 方法，并传入 Address 类的类对象（Address.class）时，Hibernate\
  \ 会在类路径中查找名为“Address.hbm.xml”的 HBM 文件。因此，确保 Hibernate 能找到映射的最简单方法是将它们放在与所映射类相同的位置。一旦拥有了\
  \ SessionFactory，使用持久化对象就变得非常简单，只需获取一个 Session 并调用其方法即可。\n\n将用户名和密码替换为你的数据库所需的值。\n\
