  \ {\n\nList<BlogLink> links = blogDAO.getAllBlogLinks(conferenceId); List<ItemIF>\
  \ items = new ArrayList<ItemIF>(); for (Iterator<BlogLink> i = links.iterator();\
  \ i.hasNext();) {\n\nBlogLink link = i.next();\n\nRSSFeedManager feedManager = new\
  \ RSSFeedManager();\n\nitems.addAll(feedManager.getChannelItems(link.getFeedURL()));\n\
  \n}\n\nreturn blogEntryBuilder.buildList(items);\n\n}\n\n...\n\n**总结**\n\n在本章中，你学习了\
  \ AOP 以及它如何简化并减少非功能性方面对应用程序业务逻辑的干扰。虽然只是一个简单的介绍，但我展示了 AOP 的两种用途，使你能够以非侵入的方式将系统级策略应用于系统。AOP\
  \ 也可以用于解决功能性或业务需求，随着你对 AOP 框架的深入使用，你将开始找到将这项强大技术应用于应用程序的新方法。\n\n在本章的后半部分，我们通过使用\
  \ Informa 库将作者源添加到 TechConf 网站，探索了 Java 中 RSS 源的世界。RSS 源是当今许多成功网站的常见功能，而 Informa\
  \ 提供了一种灵活的解决方案来处理多种可用的格式。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
