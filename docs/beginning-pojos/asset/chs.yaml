  **清单 6-23.** *使用 Spring 装配 conferenceService Bean*\n\n<bean\n\nid=\"conferenceService\"\
  \n\nclass=\"org.springframework.transaction.interceptor.TransactionProxyFactoryBean\"\
  \n\n>\n\n<property name=\"transactionManager\"><ref bean=\"transactionManager\"\
  /></property>\n\n<property name=\"target\"><ref bean=\"conferenceServiceTarget\"\
  /></property>\n\n<property name=\"transactionAttributes\">\n\n<props>\n\n<prop key=\"\
  get*\">PROPAGATION_REQUIRED,readOnly</prop>\n\n<prop key=\"submit*\">PROPAGATION_REQUIRED</prop>\n\
  \n</props>\n\n</property>\n\n</bean>\n\n在清单 6-23 中，conferenceService 这个 bean 是一个示例，展示了如何以声明方式将事务边界应用于你的\
  \ bean 方法。尽管 Spring 同时提供了编程式和声明式的事务管理能力，但建议你使用声明式事务以获得最大的灵活性和更简洁的代码。对于 conferenceService\
  \ 这个 bean，我们规定所有名称以“get”开头的方法将应用“readOnly”语义，这为底层事务管理器提供了一个“提示”，从而可能带来运行时优化。我们将传播行为（即是否使用、支持/加入或创建新事务）定义为\
  \ PROPAGATION_REQUIRED，这意味着该方法将支持当前事务，如果上下文中没有事务，则创建一个新事务。PROPAGATION_REQUIRED 是最常用的行为，为你的事务提供了一个相当可移植的默认选择。\n\
  \n还有更高级的特性可以应用于你的事务，例如超时设置以及是否基于特定异常回滚事务。这些特性超出了本章的讨论范围，但你应该去研究一下，特别是当你的应用程序具有复杂的事务需求时，比如多个分布式数据源，或者对有时会出错的第三方网络服务有要求。\n\
  \ntransactionManager 属性指向一个具有相同 id 的 bean。Spring 提供了多种事务管理器可供选择，包括简单的 JDBC、JTA，以及对于\
  \ TechConf 应用程序而言，清单 6-24 的 bean 配置中所示的 HibernateTransactionManager（从包名可以看出，适用于\
  \ Hibernate 3 版本）。\n\n**清单 6-24.** *声明事务管理器*\n\n<bean id=\"transactionManager\"\n\
  \nclass=\"org.springframework.orm.hibernate3.HibernateTransactionManager\">\n\n\
  <property name=\"sessionFactory\"><ref local=\"sessionFactory\"/></property>\n\n\
  </bean>\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
