  **317**\n\n**清单 8-8.** *TestC TestNG 类*\n\npackage package3;\n\nimport org.testng.annotations.Test;\n\
  \npublic class TestC {\n\n@Test(groups = {\"GroupY\"})\n\npublic void testC1() {\n\
  \nSystem.out.println(\"testC1\");\n\nassert true;\n\n}\n\n@Test(groups = {\"GroupX\"\
  ,\"GroupZ\"})\n\npublic void testC2() {\n\nSystem.out.println(\"testC2\");\n\nassert\
  \ true;\n\n}\n\n}\n\n最后，类 TestC 属于 package3，包含测试方法 testC1 和 testC2。\n\n\n\n方法 `testC1`\
  \ 属于测试组 GroupY，而 `testC2` 同时属于 GroupX 和 GroupZ。\n\n例如，如果我们想要运行所有属于 GroupX 的测试，可以使用如清单\
  \ 8-9 所示的 `testng.xml` 文件。\n\n**清单 8-9.** *用于运行 GroupX 中测试的 TestNG 配置*\n\n<!DOCTYPE\
  \ suite SYSTEM \"http://beust.com/testng/testng-1.0.dtd\" >\n\n<suite name=\"Some\
  \ Tests\" verbose=\"1\">\n\n<test name=\"Group Test\">\n\n<groups>\n\n<run>\n\n\
  <include name=\"GroupX\"/>\n\n</run>\n\n</groups>\n\n<classes>\n\n<class name=\"\
  package1.TestA\"/>\n\n<class name=\"package2.TestB\"/>\n\n<class name=\"package3.TestC\"\
  />\n\n</classes>\n\n</test>\n\n</suite>\n\n`testng.xml` 文件还指定了要包含在测试中的类。运行该测试将产生类似于以下的输出：\n\
