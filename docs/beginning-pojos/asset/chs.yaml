  \ ■ 使用 Hibernate 进行对象关系映射\n\n**129**\n\n**多对一：会议与场地**\n\n在前面的例子中，我们有一个关系，其中一个或多个主题属于一个会议，这是一种拥有者-子关系，因为我们不希望主题在没有所属会议的情况下存在。在会议和场地的情况下，我们有一个关联，其中场地可以在没有关联会议的情况下存在于数据库中，会议也是如此（因为站点管理员可能会在选择合适场地之前预先创建所有会议内容），并且显然多个会议可以共享同一个场地（很可能不是同时）。\n\
  \n为了满足这种关系，我们可以在 conference.hbm.xml 中使用多对一映射，如清单 4-23 所示。\n\n**清单 4-23.** *会议与场地之间的多对一映射*\n\
  \n<many-to-one\n\nclass=\"Venue\"\n\nname=\"Venue\"\n\nnot-null=\"true\"\n\ncascade=\"\
  persist,save-update\"\n\n>\n\n<column name=\"FK_VENUE_ID\" />\n\n</many-to-one>\n\
  \n由于我们不希望在删除会议时也删除场地，但希望在更新或创建会议时，场地信息能够被更新或插入到数据库中，因此我们将 cascade 属性设置为“persist,save-update”。因此，在对\
  \ Conference 对象调用 persist、save 或 update 时，Hibernate 将判断关联的 Venue 对象是否需要保存或更新。\n\n\
  **继承**\n\n在数据库模式与对象图之间的所有差异中，继承带来了最有趣的挑战。问题归结为如何在保留面向对象语言能力（多态性）的同时映射“is a”关系，并以一种高效的方式存储数据，使其不仅能够被面向对象的应用程序使用，还能被其他（可能是过程式的）应用程序（如报表或即席查询）使用。Hibernate\
  \ 支持三种不同的方法来映射继承层次结构，下面将进行概述。\n\n每个具体类一张表\n\n在“每个具体类一张表”策略中，系统中的每个类都对应一张表。在这种策略中，每个类都被映射到一张表，该表既包含实现类的属性，也包含从父类继承的属性。这种策略基本上放弃了多态性（多态查询需要你查询所有子类），但在存储空间和记录插入方面非常高效（一条\
  \ SQL 语句）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C04.fm Page 130 Wednesday, February 22, 2006 2:16 PM\n\n**130**\n\n第 4 章 ■ 使用\
  \ Hibernate 进行对象关系映射\n\n每个类层次一张表\n\n在“每个类层次一张表”策略中，使用一张表来存储属于该类层次结构的所有对象。它使用一个“类型鉴别器”列来指定一行映射到哪个具体的子类。这种策略使得常规查询和多态查询非常简单且性能良好。少数缺点包括维护问题，因为每向继承层次结构中添加一个类，都需要修改表，并且要求模式中所有子类的列都必须声明为可为空。\n\
  \n每个子类一张表\n\n在“每个子类一张表”策略中，每个子类、接口和抽象类都有自己的表，只包含该特定类的属性。在这些表中，所有关联都表示为外键约束。为了实现多态查询，Hibernate\
  \ 对对象实例的所有组成部分使用相同的主键。从数据存储的角度来看，这种策略提供了完全规范化的模式，添加一个对象并不意味着修改现有表，而只是添加一个新表。主要缺点是保存和更新需要多条\
  \ SQL 查询，并且数据检索需要 SQL 连接查询。\n\n选择继承映射策略\n\n\n\n选择之前概述的策略之一，取决于你要持久化的继承图的复杂性、每个类的复杂性、这些类在应用程序中的使用方式，以及数据是否会在应用程序外部被使用。\n\
  \n如果你不需要多态查询，最简单的方法是采用“每个具体类一张表”策略。如果你需要多态查询，且子类主要在行为上而非数据上有所差异，请使用“每个类层次一张表”策略。另一方面，如果你的类主要在数据上有所差异，那么“每个子类一张表”策略可能是一个可行的选择。\n\
  \n在大多数情况下，我使用“每个类层次一张表”策略，因为它在复杂性和性能之间提供了最佳平衡。当然，这些选择都意味着你对数据库模式有控制权，并且你是在自上而下的方式下工作。\n\
  \n**继承：每个类层次一张表**\n\n现在是将一些关于映射继承的概念付诸实践的时候了。在 TechConf 系统的第一个示例中，我们将映射 User、Attendee\
