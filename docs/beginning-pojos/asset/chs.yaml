  import static org.easymock.EasyMock.createMock;\n```\n\n创建的 `ZipcodeDAO` 实例不具备任何行为。如果我们尝试调用\
  \ `ZipcodeDAO` 接口中的任何方法，模拟对象将抛出异常。模拟对象的强大之处在于我们可以通过编程方式“记录”预期行为。记录预期行为需要指定模拟对象在当前测试上下文中将响应的事件序列和响应结果。\n\
  \n\n\n例如，如果我们检查清单 8-26 中的`searchLocations`方法，可以看到 DAO 实例被用来调用`find`方法，即`zipcodeDAO.find(zipCode)`，该方法预期返回一个类型化的`Zipcode`领域对象列表。为了训练我们的模拟对象在测试`searchLocation`方法时做出正确响应，我们可以创建一些桩数据对象，用于设置模拟对象的预期响应。下面的代码片段创建了一个`Zipcode`领域对象和一个包含该对象的`List`。\n\
  \n// 数据桩\n\nZipcode stub = new Zipcode();\n\nstub.setZip(43081);\n\nstub.setCity(\"\
  Westerville\");\n\nstub.setState(\"OH\");\n\nList<Zipcode> stubList = new ArrayList<Zipcode>();\
  \ stubList.add(stub);\n\n有了样本数据，我们现在可以继续设置模拟对象的预期行为。EasyMock 提供了静态方法，允许你记录对模拟对象的预期方法调用以及调用的返回值。在接下来的代码中，我们训练模拟对象预期接收一个参数为“43081”的`find`方法调用，并返回包含之前创建的桩`Zipcode`对象的列表。\n\
  \nexpect(mock.find(\"43081\")).andReturn(stubList); replay(mock);\n\n调用`replay`会激活模拟对象，停止记录阶段。调用`replay`之后，该对象在`find`方法的上下文中将表现得像`ZipcodeDAO`的一个实例。\n\
  \n现在，我们可以像使用`ZipCodeDAO`的真实实现一样使用这个模拟对象。\n\n清单 8-27 展示了使用 TestNG 的完整测试实现，并且动态传递了一个`DynaDTO`构建器工厂实例，以替换由\
