  \ 362 Thursday, February 16, 2006 3:35 PM\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C10.fm Page 363 Wednesday, February 22, 2006 1:23 PM\n\n第 10\
  \ 章\n\n■ ■ ■\n\n其他主题\n\n**要**构建一个功能完备的 J2EE Web 应用程序，您需要的不仅仅是应用服务器或任何框架本身所能提供的，还包括那些能让您编写更少、更简洁代码的技术，以及为您的\
  \ Web 应用程序提供搜索功能和 RSS 提要的工具。\n\n\n\n在本章中，我们将探讨一些用于填补 Java Web 应用开发空白的工具和技术。虽然不会涵盖每种技术的所有细节，但本章将帮助你入门开源生态系统中众多可用工具，并了解如何将它们集成到你的开发中。\n\
  \n**使用 AspectJ 实现 AOP**\n\n一项极大简化软件开发方式的技术是面向切面编程（AOP），它为面向对象编程（OOP）提供了扩展机制，用于将问题域的解决方案分解为封装实体。AOP\
  \ 技术允许我们以声明式且不引人注目的方式，将某些行为应用于应用程序的多个部分，或者完全改变或增强应用程序某些部分的行为。\n\n过程式编程和面向对象编程的原则都依赖于模块化的概念。但软件系统中有些方面天生难以模块化，尤其是那些触及系统多个领域的方面。例如，日志记录和跟踪就是软件应用中跨越多个边界的典型示例，即横切关注点。虽然我们可以通过将所有日志功能封装在日志库中来实现一定程度的模块化，但日志库的使用本身却分散在整个代码库中。AOP\
  \ 技术可以帮助我们应对冗余和混乱代码带来的成本。以日志记录为例，我们在许多地方看到相同的代码片段，这会导致许多问题。最大的问题是，日志语句虽然有助于诊断问题，却使代码的可读性降低。日志记录是应用程序的非业务需求，最终会掩盖业务相关代码，使其更难理解。下一个问题是维护；由于代码分散在整个代码库中，很难一致地对日志使用方式进行更改。\n\
  \nAOP 的核心在于创建可在不修改代码本身的情况下应用于代码库的“配方”。在日志记录和跟踪场景中，这可能等同于一条规则，例如：\n\n“对于包 A 和 B 中的所有方法，在任何方法调用之前执行此代码”，或者“对于任何名称以\
  \ save 开头的方法中抛出的异常，输出一条日志语句。”\n\n**363**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C10.fm Page 364 Wednesday, February 22, 2006 1:23 PM\n\n**364**\n\
  \n第 10 章 ■ 其他主题\n\n在 AOP 术语中，切面是将横切关注点封装成一个功能单元的实现。切面是实现你想要应用于代码中一个或多个位置的功能的代码。切面如何与代码交互由连接点模型（JPM）定义。在\
  \ AOP 中，连接点定义了代码中可应用切面的位置或事件，例如类的构造函数、方法执行之前、环绕或之后、类成员值被修改之前，或者当异常被抛出或处理时。在切面定义中，你声明要应用切面的连接点。\n\
  \n这些连接点声明被称为切入点，它是一种使用模式或正则表达式来表达一个或多个连接点的方式。实际应用于连接点的代码被称为通知。将通知应用于连接点的行为被称为织入。织入可以在编译时静态发生，也可以在运行时动态发生。\n\
  \n■**注意** 虽然 AOP 通知提供了一种以系统范围方式动态应用切面的方法，但引入提供了一种静态修改或增强类的方式。本章不会涵盖引入，但当你更深入地探索\
  \ AspectJ 的功能时，你很可能会用到这个特性。\n\n\n类似 AOP 的技术已应用多年，但直到最近才出现支持 AOP 的语言扩展。大多数开源实现都基于动态代理和反射。AspectJ\
  \ 是 Java 编程语言中开创性的面向切面扩展，部分归功于 Gregor Kiczales 及其同事，他们在 90 年代中期完成了 AOP 领域最早期的研究工作。AspectJ\
  \ 最初是施乐帕克研究中心的一个项目，部分资金来自 NIST ATP（美国国家标准与技术研究院先进技术计划）和 DARPA（美国国防高级研究计划局）。该框架源于对软件工程多个领域（特别是元对象协议、反射式编程和自适应编程）的研究成果与结论。AspectJ\
  \ 项目于 2002 年 12 月捐赠给 Eclipse 基金会。AspectJ 的官方网站地址为 http://eclipse.org/aspectj。\n\n\
  AspectJ 是一套工具集合，用于扩展 Java 语言以支持 AOP 结构。\n\n该系统的核心是 AspectJ 编译器（ajc），它在 javac 编译器功能基础上扩展了编译切面并将其静态织入代码的能力。\n\
  \n经过 AspectJ 增强的字节码可在任何符合标准的 Java 虚拟机上运行。\n\n**获取与安装 AspectJ**\n\nAspectJ 以基于 JAR\
  \ 的安装程序形式分发。在撰写本文时，安装文件为 aspectj-1.5.0.jar。\n\n运行安装程序只需输入：\n\njava -jar aspectj-1.5.0.jar\n\
  \n基于 Java 的安装程序将尝试确定您机器上 JDK 的位置，然后为 AspectJ 工具和文档创建安装目录，如图 10-1 所示。\n\n按照提示操作，选择\
  \ AspectJ 的安装位置。安装完成后，您选择的目录下将生成如图 10-2 所示的文件夹结构。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00096.png)\n\n![](img/00127.png)\n\nSam-Bodden_596-3 C10.fm 第 365 页 2006\
  \ 年 2 月 22 日星期三 下午 1:23\n\n第 10 章 ■ 附加主题\n\n**365**\n\n**图 10-1.** *AspectJ 图形化安装程序*\n\
  \n**图 10-2.** *AspectJ 安装目录*\n\nlib 目录包含使用 AspectJ 所需的 JAR 文件。将位于 lib 目录中的 aspectjrt.jar\
  \ 文件添加到您的 Java 类路径中。bin 目录包含便捷的 UNIX shell 脚本和 Windows 批处理脚本。为简化 AspectJ 工具的运行，请将\
  \ bin 目录添加到系统的可执行路径中。\n\nAspectJ 提供了一个名为 AspectJ 浏览器的图形化工具，使您能够构建和运行经过 AspectJ 增强的\
  \ Java 程序。虽然该工具很有用，但我们在此不进行介绍，而是将重点放在如何从 Ant 构建文件和 Eclipse IDE（通过 AJDT 插件）中使用 AspectJ。有关使用\
  \ AspectJ 浏览器的更多信息，请访问 http://www.eclipse.org/aspectj/doc/released/devguide/ajbrowser.html。\n\
  \n**AspectJ 与 Ant**\n\n首先，我们修改第 3 章创建的 Ant 构建脚本，使其使用 AspectJ 的 ajc 编译器而非 javac。首先，将\
  \ AspectJ lib 目录中的 JAR 文件添加到 TechConf 应用程序的 lib/aspectj 目录下。所需的 JAR 文件包括：\n\n• aspectjlib.jar\n\
  • aspectjrt.jar\n• aspectjtools.jar\n• aspectjweaver.jar\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C10.fm 第 366 页 2006 年 2 月 22 日星期三 下午 1:23\n\n**366**\n\n第 10\
  \ 章 ■ 附加主题\n\n要将这些 JAR 文件添加到类路径，我们可以创建一个路径元素并将其添加到项目的类路径中，如下所示：\n\n<path id=\"aspectj.class.path\"\
  >\n    <fileset dir=\"${aspectj-lib}\">\n        <include name=\"*.jar\"/>\n   \
  \ </fileset>\n</path>\n\n<path id=\"class.path\">\n    ...\n    <path refid=\"aspectj.class.path\"\
  />\n</path>\n\n我们将所有 AspectJ 切面代码（.aj）保存在 src 目录下名为 aspects 的独立源代码目录中，并将其添加到待编译代码的全局路径中，如下所示：\n\
  \n...\n\n\n\n<property name=\"src-aspects\" location=\"${src}/aspects\" />\n\n<path\
  \ id=\"all.source.path\">\n\n...\n\n<pathelement path=\"${src-aspects}\"/>\n\n</path>\n\
  \n要使用 AspectJ 的 ajc 编译器，我们需要通过一个`taskdef`元素来导入相关任务，如下所示：\n\n<taskdef\n\nresource=\"\
  org/aspectj/tools/ant/taskdefs/aspectjTaskdefs.properties\"\n\nclasspathref=\"aspectj.class.path\"\
  \n\n/>\n\n最后，我们可以修改编译目标，使其使用`iajc`任务，如下所示：\n\n<target name=\"compile\" depends=\"\
  compile-init\"\n\ndescription=\"编译所有类（JDK1.5）\">\n\n<iajc source=\"1.5\"\n\ndestdir=\"\
  ${classes}\"\n\nclasspathref=\"class.path\"\n\ndebug=\"on\"\n\nshowWeaveInfo=\"\
  ${aspectj.showWeaveInfo}\">\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C10.fm Page 367 Wednesday, February 22, 2006 1:23 PM\n\n第 10\
  \ 章 ■ 其他主题\n\n**367**\n\n<sourceroots>\n\n<path refid=\"all.source.path\" />\n\n\
  </sourceroots>\n\n</iajc>\n\n</target>\n\n该目标中唯一新增的属性是`aspectj.showWeaveInfo`，你可以在`build.properties`文件中将其初始值定义为`\"\
  false\"`。现在，构建文件已修改为使用 AspectJ，我们可以着手创建第一个 AspectJ 切面了。此时，构建过程应与之前完全相同。由于尚未定义任何切面，编译生成的字节码将与使用`javac`编译器生成的字节码一致。\n\
  \n为了运行经过 AspectJ 增强的代码，你还需要在 JBoss 或 Tomcat 的可部署归档文件中包含`aspectjrt.jar`文件。\n\n在下一节中，我们将学习如何使用\
  \ AspectJ 来处理 TechConf Web 应用程序中的多个横切关注点。本节并非对 AOP 或 AspectJ 的详尽介绍，而是在实际应用背景下的一次实用入门。\n\
  \n**使用 AspectJ 进行日志记录与跟踪**\n\n日志记录与跟踪切面将允许我们捕获来自特定包的方法调用，并生成日志语句，而无需用日志语句污染应用程序代码。对于实际的日志记录，我们将使用\
  \ Jakarta Commons Logging 包（http://jakarta.apache.org/commons/logging/），该包为包括 Log4J\
  \ 和 JSE Logging 在内的最常用日志包提供了有用的抽象。\n\n在 AspectJ 中，切面是使用 Java 语言扩展语法定义的。除了 AspectJ\
  \ 提供的特殊构造外，任何其他有效的 Java 代码在 AspectJ 文件中默认也是有效代码。我们可以在 AspectJ 中创建的最简单的空切面是：`public\
  \ aspect LoggingAndTracingAspect {}`\n\n如你所见，关键字`aspect`是 Java 语言的一个扩展。当然，前面定义的切面实际上什么也不做。首先，让我们添加代码来确定切面将应用于何处。用\
  \ AOP 术语来说，我们将定义切入点（pointcuts），AspectJ 编译器将使用这些切入点来决定在哪些连接点（join points）应用该切面。连接点是动态调用图中的点。在\
  \ AspectJ 中，有几种类型的连接点：\n\n• 方法和构造函数的调用\n• 方法和构造函数的执行\n• 字段的获取和设置\n• 异常处理程序的执行\n\
  • 静态和动态初始化\n• 通知的执行\n\n切面切入点的定义是决定何时使用该切面的标准，它通过丰富的切入点表达式语言（以及 Java 1.5 注解和基于 XML\
  \ 的语法）来提供。让我们从定义一个名为`traceMethods`的切入点开始，该切入点：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C10.fm Page 368 Wednesday, February 22, 2006 1:23 PM\n\n**368**\n\
  \n第 10 章 ■ 其他主题\n\n• 包含任何名称以`DAO`结尾的类中所有方法的执行\n• 包含`service`包中所有方法的执行\n• 排除当前切面\n\
  • 排除对`toString`、`equals`和`hashCode`方法的任何调用\n\n使用 AspectJ 切入点表达式语言，我们可以按如下方式定义所需的切入点：\n\
  \npointcut traceMethods() :\n\nexecution(* com.integrallis.techconf.dao.*DAO.*(..))\n\
  \n|| execution(* com.integrallis.techconf.service.*.*(..))\n\n\n\n&& !within(LoggingAndTracingAspect)\n\
  \n&& !cflow(execution(int *.hashCode()))\n\n&& !cflow(execution(boolean *.equals(..)))\n\
  \n&& !cflow(execution(String *.toString()));\n\n在 AspectJ 中，切点使用 `pointcut` 关键字声明。我喜欢将连接点视为数据，而将切点视为查询。如你所见，AspectJ\
  \ 切点表达式语言允许使用通配符，如前两个 `execution` 元素所示。请注意，通配符可以用于以语法方式指示方法返回值、包名和形式参数。表达式可以通过逻辑与\
  \ `&&`、逻辑或 `||` 和逻辑非 `!` 运算符进行组合。\n\n切点可以命名（如示例所示），也可以是匿名的。通过命名切点，你可以在多个通知中重用该切点，而匿名切点则直接在通知内部内联使用。\n\
  \n切点前两个元素中使用的 `execution` 运算符用于捕获方法体。另一个类似的运算符 `call` 也可使用，它用于捕获方法调用前的执行点，但此时方法的参数已被求值。\n\
  \n此处使用 `within` 运算符来排除切面本身，使其不被通知。这引出了 AOP 实现中的两个重要概念：通知优先级以及切面对其他切面的应用。这些概念超出了本章的讨论范围，但在开发更高级的切面时应牢记。\n\
  \n最后，三个 `cflow` 运算符用于排除任何 `hashCode`、`equals` 和 `toString` 方法执行控制流中的代码。`cflow` 运算符是一种基于控制流的切点运算符，用于匹配另一个连接点的执行流或动态上下文中的连接点，包括该连接点本身（若要排除该连接点，请使用\
  \ `cflowbelow`）。控制流运算符功能强大，因为它们使你能够跟踪代码，仿佛你掌控着一个动态序列图。\n\n定义好切点后，我们可以进入通知的实现。AspectJ\
  \ 提供了三种通知：前置通知、后置通知和环绕通知。前置通知和后置通知类型允许你在连接点执行之前和之后插入功能。对于 `LoggingAndTracing` 切面的通知，我们将使用前置通知和后置通知来记录方法执行开始和结束的日志语句。前置通知和后置通知的代码如下所示：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C10.fm Page\
  \ 369 Wednesday, February 22, 2006 1:23 PM\n\n第 10 章 ■ 附加主题\n\n**369**\n\nbefore()\
  \ : traceMethods() {\n\nSignature signature = thisJoinPointStaticPart.getSignature();\
  \ traceMethodWithMessage(signature, \"Entering\");\n\n}\n\nafter() returning : traceMethods()\
  \ {\n\nSignature signature = thisJoinPointStaticPart.getSignature(); traceMethodWithMessage(signature,\
  \ \"Exiting\");\n\n}\n\n请注意，通知类型后面跟着冒号，然后是它所应用的切点。`traceMethods` 上的前置通知非常简单；在通知体中，我们使用了\
  \ `thisJoinPointStaticPart` 字段，它使我们能够访问被通知方法的签名。AspectJ 提供了多种访问当前通知上下文的方式。\n\n然后，方法的签名与消息字符串参数\
  \ `\"Entering\"` 一起传递给自定义方法 `traceMethodWithMessage`。\n\n后置通知可以根据方法调用的不同结果来定义。它可以在方法调用成功返回后、抛出异常后，或者在两种情况下都适用。在我们的例子中，我们希望通知在方法调用成功后应用，如关键字\
  \ `\"returning\"` 所示。\n\n如果我们想要记录抛出异常的方法，可以使用如下后置通知：\n\nafter() throwing(Throwable\
  \ t) : traceMethods() {\n\n\n\n`Signature signature = thisJoinPointStaticPart.getSignature();\
  \ traceMethodWithMessage(signature, \"Exception\", t);`\n\n}\n\n`traceMethodWithMessage`\
  \ 方法利用 Jakarta Commons Logging 包来执行实际的日志记录，如下所示：\n\n`private void traceMethodWithMessage(Signature\
