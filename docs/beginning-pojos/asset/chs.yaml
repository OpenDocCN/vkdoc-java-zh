  \ C06.fm 第 195 页 2006 年 2 月 22 日星期三 下午 1:20\n\n第 6 章\n\n■ ■ ■\n\nSpring 框架\n\n**Spring**框架是一个开源的依赖注入（DI）和面向切面编程（AOP）轻量级容器及全栈\
  \ Java EE 应用框架，在使企业级 Java 开发更简单、更快速、更不易出错且更令人愉悦的运动中处于领先地位。Spring 帮助你以声明方式将组件组装成一个可工作的系统。\n\
  \nSpring 基于这样一个原则：良好的面向对象设计应该放在首位，并且不应因所选择的技术而受到阻碍。Spring 源于由 Rod Johnson 领导的一支经验丰富且敬业的开发团队的经验，他们每天处理实际应用程序，并寻求一种跨应用层以一致方式满足端到端应用程序需求的方法。Spring\
  \ 框架恢复了一些在早期版本的 Java EE 平台中缺失的良好面向对象特性，例如使用 POJO、通过接口进行契约式编程以及清晰的分层架构。\n\nSpring\
  \ 消除了处理大多数中间件粘合代码的需要，这与 EJB 2.X 等重量级组件模型不同，它允许你构建真正可移植的、面向对象的 Java SE 和 Java EE\
  \ 应用程序。Spring 框架根据 Apache 许可证 2.0 版条款进行许可。\n\n**面向接口编程**\n\n你会注意到的 Spring 框架的第一个方面是，它通过推广面向接口编程（面向对象编程中众所周知的一种实践）使你的\
  \ Java 代码更清晰、更易于测试。公开一个公共契约（接口）并能够提供该接口的合适实现，对大多数 Java 程序员来说似乎是理所当然的，但不幸的是，早期版本的\
  \ Java EE 框架，特别是 EJB，由于其沉重且臃肿的容器契约，使得这一点变得非常困难。\n\n3.0 之前的 EJB API 的副作用是，尽管它们提倡组件导向的开发风格，但其特定的实现却忽视了良好的面向对象实践。\n\
  \n\n\n开发者们不得不费尽周折，自行实现框架，以便在 J2EE 容器之外独立测试其组件。大多数曾构建过优秀面向对象应用的开发者，在被卷入 EJB 这辆战车后，选择了*阻力最大*的道路，以一种反向的方式使用\
  \ EJB：首先构建健壮的、基于接口驱动、“按契约”设计的面向对象应用，然后将 EJB 作为一层来利用多线程、对象池及其他容器服务。毕竟，J2EE 远不止 EJB，但不幸的是，先前设计糟糕的\
  \ EJB 规范版本抢占了风头，**195**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  Sam-Bodden_596-3 C06.fm 第 196 页 2006 年 2 月 22 日星期三 下午 1:20\n\n**196**\n\n第 6 章 ■\
  \ SPRING 框架\n\n掩盖了规范中其他部分的光芒，尤其是那些真正的精华——依我愚见，即 JNDI 和 JMS。那些选择阻力最小道路的开发者，最终得到的所谓组件既不可真正重用，也难以测试，并且包含了比实际对业务有价值的应用代码更多的管道代码。\n\
  \n像 Spring 这样的框架，其哲学是使用规范中最好的部分，掩盖那些繁琐的部分，并简化 API，同时始终将良好的面向对象设计作为首要优先级。你很快就会了解到，Spring\
  \ 让你能够以松散耦合的方式，使用接口来设计你的应用，而不会损害良好的面向对象原则。\n\n**依赖注入**\n\nSpring 主要被视为一个依赖注入容器。依赖注入是\
  \ Martin Fowler、Rod Johnson 和 PicoContainer 团队在 2003 年底提出的一个更恰当的术语，用于指代曾经被称为“控制反转”的概念。另一种观点是，DI\
  \ 是 IoC 的一种策略或变体。大多数对 DI 的解释也将其称为好莱坞原则：\n\n“别找我们，我们会找你。”\n\n在我早期涉足 DI 容器和 Spring\
  \ 框架时，我发现一些对 IoC/DI 的解释过于复杂。我能给出的关于 DI 的最佳解释是：它是一种技术，通过它，你将运行时使用哪个给定接口实现的选择权外部化。在\
  \ Spring 中，系统使用接口进行设计，而 Spring 框架在运行时插入或注入正确的实现。在 Spring 中，你通常通过一个称为应用上下文的 XML 配置文件，将接口的特定实现注入到其他\
  \ bean 中。\n\n因此，在 Spring 应用中，你的 POJO 或 bean 不会在代码中显式地构造其依赖关系。相反，依赖关系由容器在运行时“注入”。例如，在一个使用\
  \ DAO 模式的典型 Spring Web 应用中，你会定义 DAO 的接口和服务的接口。在服务的实现中，会定义一个 DAO 的属性（使用接口），以及一个接受\
  \ DAO 作为参数的 setter 方法或构造函数。Spring 应用上下文 XML 配置包含了 DAO 接口的特定实现的定义，该实现将被注入到服务类中（使用提供的\
  \ setter 或构造函数）。在运行时，使用应用上下文的 Spring 容器将正确地装配 bean 以及完成其功能所需的协作者。这与 EJB 2.X 基于查找的方法相反，在\
  \ EJB 2.X 中，使用服务定位器模式以及工厂和直接的对象构造来装配系统中的所有协作者。在一个典型的 EJB 2.X 系统中，服务定位器被用作一种将依赖关系（通常来自\
  \ JNDI）拉入组件的方式（所有这些都是在组件内部通过编程方式完成的）。这并不意味着 JNDI 不是一种强大的资源管理抽象，但 EJB 2.X 中的实现强制了这种对\
  \ JNDI 的“拉取”使用以及对 JNDI API 的依赖（使得在没有 JNDI 可用的情况下测试更加困难，因此在大多数情况下需要容器），并且需要大量代码来执行查找。正如我们在第\
  \ 5 章中看到的，EJB3 规范允许通过 Java 注解以松散耦合的方式将 JNDI 绑定的资源注入到组件中。类似地，Spring 也允许注入 JNDI 绑定的资源。图\
  \ 6-1 描绘了 Spring 框架支持的依赖注入模式。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C06.fm 第 197 页 2006 年 2 月 22 日星期三 下午 1:20\n\n第 6 章 ■ SPRING 框架\n\
  \n**197**\n\n**图 6-1.** *Spring 中的依赖注入*\n\n依赖注入以声明式的方式，将配置应用对象和资源查找的责任转移给了容器。DI\
  \ 的主要优点在于，它消除了业务对象实现任何容器特定接口的要求，并消除了冗余的查找代码或服务定位器实现的需求。通过移除容器特定的依赖关系，对象可以在没有容器的情况下进行测试，并且遗留代码也可以轻松地适应新环境。\n\
  \n我之前提到，需要被注入资源的实现必须提供一个 setter 方法或构造函数，供容器用来注入给定的资源。这引出了不同类型的依赖注入：基于构造函数的注入和基于\
  \ setter 的注入。两种方法各有优缺点。著名技术专家 Martin Fowler 在 www.martinfowler.com/articles/injection.html\
  \ 上的一篇在线文章中提供了对 IoC/DI 的解释。\n\n在本书以及 TechConf 应用的 Spring 实现中，我使用了基于 setter 的 DI，这主要是因为当多个资源被注入时，它更容易处理，并且防止了过多构造函数的泛滥——我发现，试图考虑所有可能的参数组合或必需参数时，就会导致构造函数过多。当然，通过提供接受必需资源的构造函数（并且没有无参构造函数），你可以有效地保证被构造的对象在创建时处于有效状态。\n\
  \n\n\n结合面向接口编程的实践，依赖注入提供了一个非常易于测试的环境，使得采用测试优先的开发方法更加容易，从而减少了开发工作量，并提高了测试覆盖率和整体质量。例如，在测试过程中使用不同的应用上下文，可以注入某些协作者的模拟实现，以隔离测试组件。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C06.fm 第\
  \ 198 页 2006 年 2 月 22 日星期三 下午 1:20\n\n**198**\n\n第 6 章 ■ SPRING 框架\n\n**面向切面编程**\n\
  \nSpring 框架提供的另一个功能，也是 Spring 自身构建其大量内部功能的基础，就是其 AOP 栈。尽管 Spring 没有提供完整的语言级 AOP\
  \ 实现，但它提供了必要的 AOP 特性来处理企业应用中遇到的常见问题。\n\n正如你将在第 10 章深入学习的那样，AOP 提供了以声明方式处理应用程序横切关注点的能力。切面是应用程序所需的行为或功能，但它们不一定属于业务应用程序代码。通过定义切入点（在哪里应用切面），AOP\
  \ 技术提供了一种干净的方式来处理常见服务，例如日志记录、持久化、事务以及任何其他会污染应用程序代码的非功能性切面。\n\nSpring AOP 的设计考虑到了在\
  \ Java EE 环境中的可用性。Spring 提供了一个基于动态代理的粗粒度 AOP 实现，该实现使用运行时生成的代理来添加关注点。遵循 Spring 的主流主题，任何\
  \ Spring bean 都可以以声明方式进行增强。Spring 本身使用多个预定义的切面来处理事务、安全性、跟踪、日志记录、争用管理以及与 EJB 和 JMS\
  \ 等技术的集成。因此，如果你今天正在使用 Spring，那么你已经在（也许在不知不觉中）使用 AOP 了。在第 10 章中，我们将探讨 AOP 技术，因为它们适用于\
  \ TechConf 应用程序的开发。\n\n**功能完备的应用程序框架**\n\nSpring 框架不仅仅是一个轻量级的 IoC/AOP 容器。Spring\
  \ 是一个非常非侵入性的框架，它允许你按需使用，但不会过度使用。通过提供基于开源领域最佳成果构建的全面且一致的功能集，它提供了一个完整、功能丰富的应用程序框架，专注于解决常见的\
  \ Java EE 问题。\n\nSpring 提供了抽象，以简单的方式处理诸如事务管理、对象关系映射、与 MVC 框架集成等关注点。对常见服务的抽象使得 Spring\
  \ 应用程序可以完全跨应用服务器或 Web 容器移植，并提供了一种一致的方式来处理资源管理和异常处理。图 6-2 展示了 Spring 框架的范围以及它在统一框架下无缝集成的众多工具和项目。\n\
