  \n在本章中，我们学习了如何使用 Spring 框架实现并组装一个相当复杂的、数据库驱动的 Web 应用程序。Spring 允许你的代码使用 POJO 和 POJI，并允许你声明式地混合搭配\
  \ Bean 来创建完整的应用程序。\n\n通过使用简单而强大的控制反转（IoC）概念，Spring 框架简化并减少了企业应用程序中所需的样板代码量。\n\n\
  我们简要地了解了 Spring MVC 框架，这应该有助于从 Struts（目前最流行的 MVC 框架）轻松过渡。与 Struts 一样，Spring MVC\
  \ 建立在 Servlet API 语义之上。本章旨在作为 Java Web 开发中这一新选择的轻量级介绍。要了解 Spring MVC 更高级的选项，我推荐\
  \ Rob Harrop 和 Jan Machacek 合著的优秀书籍 *Pro Spring*（Apress，2005）。\n\n结合大多数企业应用程序所需的大量功能，Spring\
  \ 已成为 Java 领域领先的应用程序框架，它不依赖于规范或委员会，而是依赖于 Java 社区的实际工作经验。如果你正在构建 Web 应用程序，Spring\
  \ 可以显著改善你的开发体验和应用程序的质量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  Sam-Bodden_596-3 C06.fm 第 238 页 2006 年 2 月 22 日星期三 下午 1:20\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C07.fm 第 239 页 2006 年 2 月 23 日星期四 下午 4:22\n\n第 7 章\n\n■ ■ ■\n\
  \nTapestry\n\n**J**ava 领域的多样性，在 Web 开发框架领域体现得最为淋漓尽致。互联网作为应用平台的兴起，加上 HTTP 协议的无状态特性，催生了\
  \ Servlet API，使其成为将 Java 引入 Web 的主力 API。\n\nServlet API 帮助规范了 Java 中 HTTP 的使用，并提供了一些简单的结构来处理动态应用程序所需的状态维护需求。\n\
  \nServlet 为 Java 在 Web 上的应用提供了最初的途径。我们构建了许多纯 Servlet 的 Web 应用程序，但很快发现，对于任何超过几个页面且具有中等至复杂用户界面需求的应用程序来说，Servlet\
  \ 并没有提供足够高的抽象层次，无法在业务逻辑、表示逻辑和由 HTML 组成的实际视图之间实现关注点分离。\n\n在 Servlet 开发中，开发人员经常从 Web\
  \ 设计师那里收到模拟的 HTML 页面。从那时起，开发人员必须提取 HTML 并将其放入 Servlet 代码中，使用 println 语句并转义常见的 HTML\
  \ 字符（如双引号）。Servlet 的开发时间也极其缓慢，因为代码更改无法在不完全重新编译和重新部署的情况下快速测试。\n\nServlet API 的缺点以及早期一些商业和开源\
  \ Web 框架的启发，促成了 JavaServer Pages（JSP）的诞生。这是一个决定性的改进，尤其是在生产力方面。JSP 改变了 Java Web 应用程序的开发方式。其隐喻从在\
  \ Java 中嵌入 HTML 标记，转变为在 HTML 中嵌入 Java 代码。生产力提高了，因为不再需要手动重新编译和重新部署，JSP 在修改后会按需动态编译成\
  \ Servlet。最初，JSP 似乎解决了 Servlet 开发的许多问题，允许 Web 设计师在开发过程中持续修改 HTML。不幸的是，好事多磨，基于 JSP\
  \ 的应用程序，由于能够通过脚本小程序在 HTML 中嵌入 Java 代码，导致了不良的 Web 开发实践，例如将繁重的业务逻辑放在表示层。此外，JSP 没有提供任何良好的机制来重用脚本小程序中的代码，这导致了代码重复以及复制粘贴式重用带来的所有麻烦。这就是大多数人所说的\
  \ JSP Model 1，其中 JSP 页面既充当控制器或调度器，又通过用于与后端技术（如 EJB）通信的 Bean 来访问模型。Model 1 将视图和调度器耦合在一起，实际上创建了许多控制器。这种方法的缺点在大型应用程序中变得明显，因为控制器代码过度膨胀，使得原本接近\
  \ HTML 的 JSP 看起来更像是被 HTML 包围的纯 Java 代码。**239**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C07.fm 第 240 页 2006 年 2 月 23 日星期四 下午 4:22\n\n**240**\n\n第 7 章\
  \ ■ TAPESTRY\n\n这种耦合对 Java 开发人员和 HTML 设计师都造成了问题。\n\n最终，开发人员意识到，一个久经考验的架构模式——模型-视图-控制器（MVC）——是解决\
  \ Web 应用程序扩展和维护问题的方案。\n\nMVC 模式将数据（模型）与表示（视图）和工作流（控制器）分离开来。在 Model 2 架构中，JSP 和 Servlet\
  \ 结合使用，并充分利用了它们各自的优势。Servlet 用于调度视图并粘合（或许还有转换）来自后端（如数据库或 EJB）的数据。这是 MVC 模式中的控制器部分，为视图生成技术（JSP\
  \ 页面）提供应用程序流程、服务以及资源发现和分配。\n\n\n\nJSP/Servlet Model 2 在可维护性和开发时间方面代表了巨大的飞跃。它实现了\
  \ HTML 设计师与 Java 开发者之间，以及不同技能水平的 Java 开发者之间的关注点分离；经验更丰富的开发者通常负责编写大部分控制代码，而资历较浅的开发者则处理\
  \ JSP。随着越来越多的 Model 2 应用程序被构建，许多开发者注意到了不同应用程序之间重复劳动的问题。典型的问题变成了：我们如何避免一次又一次地重复造轮子？大多数开发者的结论最终促成了框架的诞生，这些框架提供了处理\
  \ MVC 应用程序的统一方式，并消除了编写管道代码的需求。\n\n如今，我们有许多基于 MVC 模式的框架，它们提供了大量你无需再从头创建的功能。它们也在一定程度上标准化了\
  \ Java 世界中的 Web 开发。不同的框架都以略微不同的方式实现 MVC。有些框架为视图生成选择了一种技术，例如 JSP 或某种模板引擎（如 Velocity），而其他框架则允许可插拔的视图实现。它们大多数的一个共同点是，尽管构建在\
  \ Servlet API 之上，但它们仍然遵循请求/响应范式的相同底层原理，这使得你的开发和最终代码非常过程化。许多技术专家的感受是，这些框架帮助我们处理 Web\
  \ 作为应用程序平台的问题，但它们也扁平化并削弱了 Java 提供的面向对象的部分能力。\n\n与此同时，一个鲜为人知的框架已经提供了一个基于 MVC 模式的\
  \ Web 开发框架，但其核心组件拥抱了面向对象。这个框架就是 NeXT WebObjects，它于 1996 年出现，后来成为苹果公司的 WebObjects。WebObjects\
  \ 背后有巨大的兴趣，并吸引了大量寻求构建大规模 Web 应用稳健平台的大型企业。WebObjects 至今仍是一个闭源的专有系统，直到最近其高昂的价格标签仍使其超出了大多数开发者的承受范围。WebObjects\
  \ 是一个符合 J2EE 标准的 Web 开发框架，提供的不仅仅是 Web 开发——它还包括一套工具、高级 ORM、可扩展性和性能特性。例如，运行在 WebObjects\
  \ 上最大的应用程序之一是苹果公司的 iTunes Music Store。\n\n对我们大多数人来说幸运的是，开源社区在 Jakarta Tapestry Web\
  \ 应用框架中提供了一个与 WebObjects 一样强大且灵活的替代方案。\n\nTapestry 始于 2000 年的一个 SourceForge 项目，其工作方式大致基于\
  \ WebObjects。它获得了足够的公众认可，于 2003 年成为 Apache Jakarta 项目。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C07.fm Page 241 Thursday, February 23, 2006 4:22 PM\n\n第 7 章\
  \ ■ T A P E S T R Y\n\n**241**\n\n**什么是 Tapestry？**\n\nTapestry 是一个开源的 Java Web\
  \ 应用框架，由 Howard Lewis-Ship 和一群才华横溢的贡献者创建。Tapestry 根据 Apache 软件许可证 2.0 版分发。在 Tapestry\
  \ 中，与 Struts 等其他框架不同，你处理的是组件和页面（页面本身也是组件），交互性通过监听器提供，这些监听器解释与组件关联的用户操作。\n\n一个 Tapestry\
  \ 应用程序由页面组成。每个页面包含一个模板和许多组件。模板是标准的 HTML 页面，其中用声明 Tapestry 组件的 span 标签进行装饰。\n\nTapestry\
  \ 构建在 Servlet API 之上，但与其他框架不同，它通过允许你以类似于 Java Swing 开发者处理表单和组件的方式处理页面和组件，完全抽象了 Web\
  \ 的过程性请求-响应特性。与许多 Web 框架一样，Tapestry 将常见任务和功能（如状态管理、输入验证、本地化和国际化以及错误报告）中的苦差事变得简单。但你不是处理\
  \ URL、HTTP 请求和响应，而是在一个更高的抽象层次上工作，以面向对象的方式处理用户与页面和组件的交互。就像在 Swing 应用程序中一样，组件和页面知道如何响应从\
  \ HTML 组件视图表示映射到 Java 实现的事件。\n\n对于 Web 开发团队来说，Tapestry 最大的优势之一在于它在 Web 设计师和 Java\
  \ 开发者之间实现了强有力的关注点分离。它还将真正的面向对象开发带到了 Web 应用程序中。作为一名前 Delphi 和 Swing 开发者，我最初正是因为这个因素而被吸引去尝试\
  \ Tapestry。在 Tapestry 中，你创建纯 HTML 页面，并使用 span 标签或任何其他 HTML 标签来嵌入 Tapestry 组件。Tapestry\
  \ 允许你在组件位置使用静态标记，以在设计时准确表示页面的外观和感觉。这些静态占位符（例如，一个下拉字段）在运行时会被替换为活动的 Tapestry 组件。这使得\
  \ HTML 设计师能够使用应用程序实际使用的模板，从而保证应用程序外观的责任由设计师承担，而功能的责任由应用程序开发者承担。\n\nHTML 中的组件视图以及用户在组件上可能采取的任何操作，都通过少量的\
  \ Java 代码以及可选的非常简单的 XML 配置文件连接在一起。Tapestry 在底层使用 HiveMind IoC 框架/微内核来处理资源和服务的配置。当我们整合一个\
  \ Tapestry Web 应用程序与 EJB3 后端时，我们将了解更多关于 HiveMind 的知识。Tapestry 还附带大量预打包的组件，对 JavaScript（用于客户端验证和交互）提供了良好的支持，并拥有几个提供支持\
  \ AJAX 的组件的第三方库。Tapestry 是一个久经考验的 Web 框架，可用于创建可扩展且稳健的 Web 应用程序。\n\n**Tapestry 4\
  \ 特性**\n\n我是在 Tapestry 生命周期的后期才接触到它的。当我开始使用 Tapestry 时，3.0 版本刚刚发布。那时对我来说很明显，Tapestry\
  \ 是一个稳健、功能齐全的 Web 框架。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C07.fm Page 242 Thursday, February 23, 2006 4:22 PM\n\n**242**\n\n第 7 章 ■ T A\
  \ P E S T R Y\n\nTapestry 处理了 Web 开发者面临的所有平凡和不那么平凡的任务，例如 URL 构建、简化和分发、客户端和服务器端状态管理、表单输入验证、本地化、国际化以及异常处理和报告。\n\
  \nTapestry 的第 4 版为一个已经功能丰富的框架带来了更多特性，包括以下内容：\n\n*   **友好的 URL：** 更依赖于路径信息而非查询参数的\
  \ URL，这使得 URL 看起来更简洁，并且更容易与基于路径的工具（如 J2EE 安全）进行配置\n*   **监听器方法：** 更简单的配置和语法\n* \
  \  **消息目录：** 组件消息目录和一个全局消息目录，如果在组件级别未找到消息，则会搜索全局目录\n*   **Portlet 支持：** 对开发 JSR-168\
  \ portlet 的完整原生支持\n*   **性能：** 减少对反射和 ONGL 的依赖，更多地依赖约定和智能配置\n\n\n\n• **集成：** 能够将\
  \ HiveMind 和 Spring（参见第 6 章）的服务对象注入到 Tapestry 页面和组件中\n\n• **验证：** 对输入验证进行了彻底改造，支持使用自定义扩展进行复杂验证，并提供了许多内置验证\n\
  \n• **注解：** 支持 Java 5.0 注解，用于在代码中指定某些配置、自定义和操作，否则这些内容需要在页面或组件规范中指定\n\n• **错误报告：**\
  \ 精确到行的错误报告，能够显示并高亮包含错误的文件中的确切内容\n\n• **高级表单处理：** 能够取消表单，从而绕过客户端验证逻辑，并能够在服务器端调用备用的“取消”监听器\n\
  \n• **服务器端状态：** 与将应用程序状态限制在旧的 Global 和 Visit 对象中不同，移除了对应用程序状态对象数量的限制\n\n**下载和配置\
  \ Tapestry**\n\nTapestry 以 ZIP 文件或 TAR 文件的形式分发，其中包含源代码和二进制文件，可从 http://jakarta.apache.org/tapestry/downloads.html\
  \ 获取。Tapestry 由四个 JAR 文件组成：tapestry-4.0.jar、tapestry-contrib-4.0.jar、tapestry-annotations-4.0.jar\
  \ 和 tapestry-portlet-4.0.jar。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00083.png)\n\nSam-Bodden_596-3 C07.fm Page 243 Thursday, February 23,\
  \ 2006 4:22 PM\n\n第 7 章 ■ T A P E S T R Y\n\n**243**\n\nTapestry 依赖于多个第三方库。获取所有依赖项最简单的方法是访问\
  \ http://jakarta.apache.org/tapestry/dependencies.html，并按照链接从 ibiblio.org 下载所需的\
  \ JAR 文件。表 7-1 显示了 Tapestry 4 的 JAR 文件及其依赖项。或者，您可以使用 Tapestry Ant 构建脚本，该脚本将自动从 ibiblio.org\
  \ 下载依赖项。\n\n对于那些希望从头开始构建 Tapestry 的开发人员，可以在 Tapestry Wiki 中找到如何构建 Tapestry 的说明，地址为\
  \ http://wiki.apache.org/jakarta-tapestry/BuildingTapestry（需要 HiveMind 1.1、Ant 1.6.2\
  \ 和 Java 1.5）。\n\n**您的第一个 Tapestry 应用程序**\n\n在处理新的 Web 框架时，没有什么比实际构建一个可运行的 Web 应用程序更有帮助的了。与任何其他基于\
  \ Java Servlet 或 JSP 的框架一样，Tapestry 应用程序的可部署单元是 WAR 文件。让我们逐步构建我们的第一个 Tapestry 应用程序。这个应用程序最初将是一个非常简单的单页应用程序，用于动态生成一些内容。\n\
  \n动态内容是 Web 应用程序与静态网站的区别所在，它仅意味着您的网站或应用程序显示的信息会根据某些条件而变化。动态内容的示例包括新闻网站、条目会变化且用户可以累积购物车商品的产品目录，以及在线投票和统计。\n\
  \n在开始之前，让我们为应用程序创建一个目录结构。图 7-1 显示了 tapestry-time 应用程序的目录结构。\n\n**图 7-1.** *简单 Tapestry\
  \ 应用程序的目录结构* **配置 Tapestry**\n\n要在 Web 容器中运行 Tapestry，您需要使 Tapestry 类及其依赖项对 Tapestry\
  \ 应用程序可用。有两种方法可以实现这一点。如果您在同一个 Web 容器中运行多个 Tapestry 应用程序，您可以将 JAR 文件放在一个共享位置，您的 Web\
  \ 容器将使该位置对所有已部署的应用程序可用。例如，在 Tomcat 5.X 中，这个共享位置是 $TOMCAT_HOME/shared/lib。\n\n另一种选择是将所需的\
  \ JAR 文件放在 WEB-INF/lib 目录中，这保证了您可以将 JAR 部署到任何兼容的 Web 容器中，而无需任何特殊配置。\n\n在本章中，我们将使用\
  \ WEB-INF/lib 位置来存放 Tapestry 依赖项。表 7-1 显示了所需的 JAR 文件。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
