  \n**199**\n\n如图 6-2 所示，Spring 在主发行版中包含 12 个模块和 5 个子项目。主要的 Spring 模块有：\n\n• **Spring\
  \ Core：** 不特定于框架任何部分的通用类和接口，包括异常处理以及 JDK 和集合工具类\n• **Spring Beans：** 用于操作 Java Bean\
  \ 的工具以及控制反转容器的核心实现\n• **Spring AOP：** Spring AOP 实现（符合 AOP 联盟标准）；与 Spring 应用上下文紧密集成\n\
  • **Spring Context：** 提供用于一致资源查找和共享的工具（包括 JNDI 绑定的资源、EJB、电子邮件、国际化、验证和调度）；还提供对消息源、数据绑定、验证和观察者设计模式的支持\n\
  • **Spring Support：** 提供对 JMX、JCA、调度、邮件和缓存的支持\n• **Spring Mock：** 提供用于 JNDI、Servlet\
  \ API 和通用 JUnit 集成的模拟测试类\n• **Spring JDBC：** 通过提供模板和回调接口、用于 JDBC 操作的线程安全类以及其他工具（如大型数据库对象处理类）来提供对\
  \ JDBC 的抽象\n• **Spring ORM：** 提供对各种 ORM 技术的支持，包括 iBATIS SQL 映射、Apache OJB、TopLink\
  \ 和 JDO\n• **Spring DAO：** 为 DAO 实现提供清晰、非受检的异常层次结构，独立于底层数据访问技术\n• **Spring Hibernate：**\
  \ 提供对 Hibernate 2.X 和 3.X 版本的 ORM 支持\n• **Spring Web：** 提供与许多流行 Web 技术的集成，包括 Struts、Velocity\
  \ 和 JSF；还提供多部分文件上传框架和其他 Web 工具\n• **Spring MVC：** 一个功能完备的 MVC Web 框架实现，可以与多种视图技术集成，包括\
  \ JSP、Velocity、Tiles、iText 和 POI\n\n当前的五个 Spring 子项目是：\n\n• **Spring Security：**\
  \ 为 Spring 框架提供一套全面的安全服务，包括对单点登录（SSO）的支持\n• **Spring Web Flow：** Spring Web Flow（SWF）提供了在\
  \ Web 应用程序中定义和编排页面流程的功能\n• **Spring Rich Client：** 将 Spring 框架的原则应用于创建专业的 Swing\
  \ 应用程序\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C06.fm\
