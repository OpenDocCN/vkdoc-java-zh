  \n第 7 章 ■ TAPESTRY\n\n**271**\n\n**图 7-16.** *会议边框 HTML 模板预览* **图 7-17.** *会议边框模板的结构*\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C07.fm 第\
  \ 272 页 2006 年 2 月 23 日，星期四，下午 4:22\n\n**272**\n\n第 7 章 ■ TAPESTRY\n\n在模板的顶部，有一个区域将显示会议标题、日期范围和地点。左侧是一个典型的导航菜单，用户可以通过它访问网站上的其他可用页面。右侧是一个通用的登录框、一个注销按钮、一个用于显示已登录用户名称的占位符，以及一个将用户带到会议注册页面的按钮。清单\
