  \nSam-Bodden_596-3 C01.fm 第 1 页 2006 年 2 月 22 日星期三 上午 6:01\n\n第 1 章\n\n■ ■ ■\n\n\
  引言\n\n**无**论您是 Java 平台企业版（Java EE）的新手，还是已经使用多年，您的体验可能与我相似——仅凭规范提供的内容来使用该平台，很快就会让您抓狂！Java\
  \ EE 规范没有预见到，在向开发者释放强大能力的同时，它也带来了大量问题。这些问题更多地与设计、构建和维护分布式应用程序的过程相关，而非实际的 API。这正是开源发挥作用的地方。本书中展示的项目旨在简化、支持、加速并增强\
  \ Java EE 应用程序的构建。\n\n本书主要探讨如何利用您（开发者）可获取的大量开源资源。尤其是在 Java EE 平台方面，开源正引领潮流，并通过提供商业产品中未曾出现的技术创新，以及为企业级应用提供坚实稳定的基础设施，超越了规范的界限。近年来，Java\
  \ EE 规范的某些部分受到了许多行业专家的批评，这导致了许多轻量级框架和容器的出现，以及大量填补规范空白的支持工具。\n\n如今，大多数开发者纠结的问题是，他们是否真的需要一个\
  \ Java EE 应用服务器。现实情况是，大多数可用的轻量级框架并不试图取代应用服务器提供的每一项功能，而是提供了访问应用服务器资源的替代方式。大多数专家抱怨的是，当应用程序只需要一个\
  \ Web 容器时，却使用了 Enterprise JavaBeans (EJB) 容器，在 EJB3 规范最终确定之前，我完全同意他们的观点。\n\n正如您将在第\
  \ 5 章中看到的，EJB3 规范将支持构建真正基于 POJO 的分布式多层应用程序，这些应用程序可以根据需求轻松扩展。\n\n我们还将探索轻量级框架的世界，并比较和对比不同的方法如何适应不同的应用需求和不同的开发团队。\n\
  \n**Java EE 市场**\n\n要完全理解 Java EE 世界变革背后的一些驱动力，需要快速回顾一下市场的演变。Java EE 市场发展迅速，首先经历了整合阶段，现在进入了商品化阶段。这第二阶段很大程度上是由这样一个事实驱动的：为了展示价值，应用服务器供应商不能再仅仅依赖其核心应用服务器。这创造了一个增值服务的市场，特别是在开发工具和开发效率领域。本书中展示的许多开源工具和框架都属于这一类。\n\
  \n**1**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C01.fm 第 2 页 2006 年 2 月 22 日星期三 上午 6:01\n\n**2**\n\n第 1 章 ■ 引 言\n\n开源也在改变世界各地大学学习编程的方式；新一代离开学术界进入职场的程序员，要么使用过开源，要么为其做出过贡献。如今的学生可以通过研究汇集了世界各地众多贡献的企业级软件来学习。\n\
  \n在全球的企业 IT 部门，程序员们正团结在 Ant、JUnit、Apache Tomcat、Spring Framework 和 JBoss 等开源项目周围。开源被接受的过程主要是在程序员和中层管理人员层面进行的。然而，鉴于\
  \ Linux 最近对企业的影响，高层管理人员也开始看到开源的诸多优势，尤其是在企业 Java 领域。\n\n寻求降低软件开发成本的组织发现，与商业产品相比，开源软件（OSS）提供了更低的拥有成本，这主要是因为开源软件在价格和限制方面都是免费的。\n\
  \n开源社区如此多产的原因之一是，除了最琐碎的软件之外，所有软件的开发都既困难又昂贵，而商业产品提供的现成解决方案往往无法提供完整的解决方案。构建软件系统的复杂性是现实世界业务问题本质的直接结果，这些问题由不断变化的需求、快速发展的技术、多个数据源、服务级别协议、互操作性、上市时间、投资回报率以及许多其他因素驱动。无法应对和平衡所有这些力量会导致项目超出预算、延期，并且在大多数情况下无法满足功能期望。由于无法应对复杂性和变化，这些项目会迅速失控。\n\
  \n即使这样的系统在特定的业务功能领域有所交付，其整体业务价值也会因维护成本而降低。这些恐怖故事并不罕见；相反，它们是常态。一项调查发现，84%¹ 的企业软件系统被认为是失败的。这种失败率是困扰行业的“软件危机”的典型特征。项目失败是由于糟糕的工程和管理选择的结合。卡内基梅隆大学软件工程研究所（SEI）2002\
  \ 年的一项研究列出了软件项目失败的十大原因：\n\n• 员工经验不足\n• 缺乏团队凝聚力和经验\n• 缺乏对使用现代软件工程实践的重视\n• 缺乏流程或对流程应用的重点不正确\n\
  • 项目管理方法不充分\n• 需求不明确、被误解和未被发现\n• 规模（项目越大，失败的可能性越大）\n• 缺乏规划和估算\n• 在流程中过晚考虑系统特定和技术相关的问题\n\
  • 新技术和未预见的问题\n\n1\\. 根据 Standish Group 的一项调查，该调查研究了 1995 年美国约 8,000 个软件项目。\n\n\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm 第\
  \ 3 页 2006 年 2 月 22 日星期三 上午 6:01\n\n第 1 章 ■ 引言\n\n**3**\n\nIT 行业一直推崇多种方法来应对设计、构建和维护软件密集型企业系统所固有的复杂性。面向对象、基于组件的分布式系统代表了当前最先进的企业级系统技术。本书从实践层面探讨了当交给信息技术专家的“银弹”是\
  \ Java（特别是 Java EE）时，构建企业应用程序所面临的一些问题。Java EE 前景广阔，尤其对于缺乏经验的技术人员而言，因为它堪称完美的技术银弹。然而，现实经验远非软件乌托邦，正如\
  \ Seybold Group 最近的一项研究表明，管理层对 Java EE 的期望与实际达成的结果之间存在差距。造成这种差距的原因之一是缺乏覆盖 Java EE\
  \ 开发诸多方面的工具。正是在这一领域，开源企业 Java 工具和框架应运而生，有助于弥合这一差距。\n\n学习如何结合使用开源框架和工具来构建企业应用程序，能够提供一个低成本、低风险、理想的原型开发环境，从而掌握分布式计算技术。开源通过提供传统专有产品之外的选择，降低了进入\
  \ Java 和 Java EE 世界的门槛。\n\n本章的其余部分将介绍一个真实世界的示例，使 Java EE 技术的应用更加清晰。该示例引入了一个现实的业务问题，作为使用开源技术设计、构建和部署企业\
  \ Java 系统学习过程的背景。我们将从需求入手，为本书后续章节探讨的设计、架构和实现方法奠定基础。\n\n**案例研究：TechConf 网站**\n\n\
  本章介绍的 TechConf 网站案例研究是一个技术会议管理系统，包含一系列用于宣传、筹备和支持一个或多个技术会议的系统及实用程序。技术会议是在预定时间段内举办的活动，由一个或多个环节（演讲、主题演讲等）组成。\n\
  \n作为技术会议的常客演讲者和参与者，我认为该领域非常适合本书的写作目的。主要利益相关者，即与系统有切身利益关系的人，都是像你我一样的技术人员，这使得我们更容易理解用户的需求，从而使需求收集、分析和设计过程更加清晰。\n\
  \n从技术上讲，由于信息需求的动态性以及举办此类活动所涉及的物流问题，技术会议在分布式计算和企业开发领域提出了一些独特的挑战。\n\n如果你和我以及大多数其他程序员一样，你会想直接跳到代码部分，并且可能认为越早开始编码，就能越早完成项目。然而，对于除了最琐碎的应用程序之外的所有项目，事实并非如此；在编写一行代码之前，必须进行一定程度的规划。你可以随心所欲地进行原型开发，但如果没有设计，就很难实现稳定、正确且可维护的解决方案。所以，请耐心阅读接下来的几页。它们可能会对你下一个项目有所帮助。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm 第\
  \ 4 页 2006 年 2 月 22 日星期三 上午 6:01\n\n**4**\n\n第 1 章 ■ 引言\n\n**定义利益相关者**\n\n要理解系统的动态性，确定利益相关者是谁以及他们的个人信息需求如何随时间变化至关重要。在技术会议背景下需要考虑的主要利益相关者如下：\n\
  \n• **参会者：** 参加会议的个人\n• **演讲者：** 在会议上进行一个或多个环节演讲的个人\n• **赞助商：** 赞助和推广会议的组织\n• **管理员：**\
  \ 组织和管理会议的个人或团队\n\n为了清晰描绘利益相关者不断变化的需求，将会议视为三个独立的时间段会很有帮助：会前、会中和会后。毕竟，活动管理就是关于时间线的。图\
  \ 1-1 展示了会议的三个阶段。\n\n会前\n\n在会前阶段，数据被收集、评估和创建。收集的数据包括征文通知、摘要以及不同演讲的提纲等文档。根据收集到的文档，必须创建内容，并在源文档发生变化时进行维护。除了文档管理需求外，还必须提供设施供参会者注册并管理他们计划参加的活动日程。此时，及时提供信息以使注册和到达会议的过程更加便捷也至关重要。一些提升体验的实用工具包括获取驾车路线或关于旅行和酒店住宿的会议特别优惠信息。\n\
  \n会中\n\n会议期间的信息需求对会议的成功至关重要。满意的参会者更有可能在第二年再次参加。能够过滤噪音、锁定兴趣领域并选择要参加的环节，是提升参会者体验的重要因素。提供互动性和持续反馈可确保参会者始终与会议的脉搏保持同步。会议开始时，需要为参会者办理签到并发放会议胸牌。任何环节或演讲的变更或更新都需要有效传达，以便参会者管理他们的日程。\n\
  \n会后\n\n会议结束后，仍有大量工作要做。参会者现在成为了校友，因此他们是未来会议的主要目标受众。提供连续性感对于技术会议的校友和未来参会者都很重要。应该建立一座桥梁，将以往会议的主题和内容与正在进行的和未来的会议连接起来。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm 第\
  \ 5 页 2006 年 2 月 22 日星期三 上午 6:01\n\n第 1 章 ■ 引言\n\n**5**\n\n在文档管理领域，这些需求转化为管理动态文档向静态文档或档案的过渡。现在必须将与不同演讲或环节相关的众多文档（如演示幻灯片、笔记、后续讨论和支持材料）提供给会议校友，并可能向公众开放。对于会议组织者而言，参会人数、主题受欢迎程度以及其他统计信息等数据是关键的商业指标，将决定未来对会议进行的更改和改进。\n\
  \n**图 1-1.** *利益相关者需求时间线* **业务问题**\n\n\n\n为满足技术会议的信息管理需求，需要一套软件系统来提供交互式信息渠道，以管理不同利益相关方的需求。业务驱动因素要求创建该系统，作为面向技术会议的组织、执行和维护而定制的新产品线的基础。这些产品将以组件或子系统的集合形式销售，可根据客户的特定需求进行适配。\n\
  \n角色与功能的划分必须清晰，以便系统能够轻松定制和增强。系统需要考虑到参会者和演讲者地理位置分散这一事实。用户应无需（或尽可能少地）安装或配置任何软件。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm 第 6\
  \ 页 2006 年 2 月 22 日星期三 上午 6:01\n\n**6**\n\n第 1 章 ■ 引言\n\n**通用应用需求**\n\n本节概述系统必须满足的通用业务需求。基于通用的软件分发和配置需求，为应用程序选择的主要媒介是互联网，特别是\
  \ Web。Web 提供了近乎零分发和配置成本的优势。随着设计过程的推进，将根据实际约束条件进行优化。以下需求按利益相关方进行组织，以便在设计阶段实现功能的分离。\n\
  \n**参会者**\n\n参会者是系统的核心关注点，影响他们的功能具有更高优先级。参会者的需求构成了系统大部分功能的基础。\n\n• **通用信息：** 潜在参会者（公众成员）需要一种简单直观的方式来了解会议的详细信息。应用程序必须易于导航，并且必须能够轻松实现常见网站功能，如新闻和内容的可打印视图。\n\
  \n• **注册：** 参会者应能够安全地注册会议，并通过电子邮件接收确认。系统应支持个人和团体注册。\n\n• **会议浏览与选择：** 系统应提供直观且强大的搜索功能，以帮助用户选择要参加的会议。\n\
  \n• **会议评估：** 演讲者应能够在线查看会议评估结果。\n\n• **日程安排：** 系统应为用户提供轻松查看和管理日程的能力。日程数据应以针对不同媒介和设备的多种格式提供（例如，Web、个人数字助理\n\
  \n[PDA]和按需电子邮件）。\n\n• **通知与提醒：** 系统应为用户提供订阅会议通知服务的能力。这些通知可包括邮件列表、与日程相关的提醒以及与会议相关的新闻。\n\
  \n• **住宿协助：** 系统应提供一种方式，让参会者能够查找区域地图、场地地图、酒店路线、兴趣点、餐厅及其他信息，以提升他们在会议期间的体验。\n\n**演讲者**\n\
  \n妥善协助和服务演讲者将提高会议内容的质量。这反过来又惠及主要利益相关方——参会者。\n\n• **注册：** 演讲者应能够安全地注册会议，并通过电子邮件接收确认。\n\
  \n• **个人信息：** 演讲者应能够输入联系信息和传记信息、上传照片，并提供其他感兴趣的信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C01.fm 第 7 页 2006 年 2 月 22 日星期三 上午 6:01\n\n第 1 章 ■ 引言\n\n\n\n\
  **7**\n\n• **征稿启事：** 潜在演讲者应能够为某个分会场提交摘要。\n\n系统应允许演讲者选择目标受众、分会场主题（分会场类别）以及分会场的场地需求。\n\
  \n• **演讲者空闲时间：** 演讲者应能够安排“办公”时间，在此期间他们可以解答与会者关于分会场的问题或疑惑。\n\n• **演讲者著作：** 已出版书籍的演讲者可以从其已出版著作列表中选择一本或多本书籍，并将其与某个分会场关联。该书籍列表将作为分会场信息的一部分呈现。书籍列表及每本书的详细信息将在运行时从外部提供商获取。\n\
  \n**赞助商**\n\n赞助商为会议提供资金支持。他们的兴趣源于公众曝光度的回报和行业形象的提升。这为他们提供了与社区建立联系的机会，并搭建了展示其产品和服务的平台。\n\
  \n知名行业参与者作为赞助商的加入，能够提升技术会议的权威性。\n\n确保赞助商能够轻松参与会议，对会议的成功至关重要。\n\n• **注册：** 系统应允许赞助商注册并选择赞助级别。\n\
  \n• **展位选择：** 系统应允许赞助商选择会议展位。展位根据赞助级别进行分配。\n\n**管理员**\n\n管理会议中复杂的互动是一项具有挑战性的工作。系统的目标之一是简化管理任务并减少所需人员数量。\n\
  \n• **签到与注册：** 管理员需要在与会者到达会议现场时为其办理签到，并发放胸牌及其他材料。\n\n• **演讲者评估：** 系统应为管理员提供创建和查看演讲者评估结果的功能。\n\
  \n• **新闻：** 管理员应拥有便捷的界面来更新会议相关新闻。\n\n• **展位分配：** 管理员应能够根据赞助级别和物理需求为赞助商选择展位。\n\n\
  • **会议闭幕：** 必须为会议管理员提供一个界面，以便轻松将选定内容转换为静态网站。特定数据将成为历史数据，必须进行适当迁移或归档。\n\n• **仪表盘：**\
  \ 必须为会议管理员提供工具，用于收集会议的统计数据和绩效指标。这些工具应能提供会议整体健康状况和成功指标的概览视图。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C01.fm Page 8 Wednesday, February 22, 2006 6:01 AM\n\n**8**\n\
  \n第 1 章 ■ 引言\n\n**架构需求**\n\n架构需求指的是系统为实现预期业务目标所必须具备的基础设施需求。确定这些需求涉及多种因素，例如技术人员在类似系统上的经验、运营约束、现有物理基础设施以及跨多个系统所需的应用程序服务（横切关注点）。在选择用于构建企业应用程序的产品或产品集时，这些需求有助于进行基础设施功能差距分析。架构师的工作是随后做出“自建”与“购买”的决策。\n\
  \n根据前述通用应用需求以及构建类似系统时积累的经验，可以列出一组通用的架构需求。\n\n• **数据管理与持久化：** 数据必须易于存储、检索、搜索和修改。当多个数据源试图修改同一数据时，数据完整性不应受到损害。\n\
  \n\n\n• **可维护性与可扩展性：** 系统必须易于维护和扩展。\n\n功能模块应能根据特定部署的运营特性，轻松地添加、移除、启用或禁用。\n\n• **安全性：**\
  \ 数据必须以安全高效的方式存储和检索。系统用户必须能够根据其角色或安全级别访问相应功能。\n\n• **可伸缩性与可靠性：** 应允许多个用户与系统交互。系统的性能特征不应随着并发用户数量的增加而发生显著变化。\n\
  \n• **个性化与定制化：** 用户界面应具有可定制的观感，允许根据用户身份进行品牌化设置和动态更改。\n\n• **文档与内容管理：** 系统应提供管理各类文档的能力，并允许对基于文档的信息进行操作、分类、编辑和转换。\n\
  \n• **管理：** 系统应提供一个框架，以便轻松地向各个组件添加管理功能。管理功能应相对易于创建和定制。\n\n• **消息传递：** 某些子系统之间预计需要异步通信设施。架构必须提供一个消息传递框架，或能够无缝集成一个此类框架。\n\
  \n• **与遗留系统和外部资源的集成：** 系统应便于从外部和遗留数据源获取数据，并能够以行业标准的方式向外部实体发布数据。\n\n图 1-2 展示了架构需求。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm Page\
  \ 9 Wednesday, February 22, 2006 6:01 AM\n\n第 1 章 ■ 引言\n\n**9**\n\n**图 1-2.** *架构需求图*\
  \ 基于上一节概述的架构需求，您应该开始对系统架构有一个更清晰的认识。它应同时满足功能需求（业务和应用需求）和非功能需求（架构需求）。TechConf 网站的架构图按功能层级划分，这些层级可以代表系统的逻辑或物理分区。\n\
  \n该架构包含以下层级（遵循 Java EE 平台广为人知的分区方式）：\n\n• **客户端层：** 代表面向客户端的系统部分\n\n• **表示层：** 代表负责生成用户界面表示处理逻辑的子系统\n\
  \n• **业务层：** 代表负责处理业务逻辑的子系统\n\n• **集成层：** 代表负责集成外部信息源和目标（包括任何遗留系统）的子系统 图 1-3 展示了应用层级以及它们之间如何交换消息。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm Page\
  \ 10 Wednesday, February 22, 2006 6:01 AM\n\n**10**\n\n第 1 章 ■ 引言\n\n**图 1-3.**\
  \ *应用层级*\n\n**未决问题与假设**\n\n企业开发的动态特性迫使您基于以往经验做出假设，并将系统的某些方面推迟到开发后期再处理。\n\n**假设**\n\
  \n部分假设源于从利益相关者会议中收集的隐含需求，以及对系统未来使用情况的预测。这些假设包括：\n\n• 并发需求预计会随时间增长。\n\n• 大部分参会者精通技术。\n\
  \n• 应用程序将通过互联网使用基于浏览器的界面进行远程访问。\n\n• 会议内部网络将受到 HTTP 防火墙的保护。\n\n• 大部分参会者携带支持网络的 PDA\
  \ 或其他移动计算设备。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
  \ C01.fm Page 11 Wednesday, February 22, 2006 6:01 AM\n\n第 1 章 ■ 引言\n\n**11**\n\n\
  **未决问题**\n\n预计随着系统的设计和开发，您对支配其行为的动态机制的理解将逐渐凝聚。新的关系和接口将被发现，之前未识别的使用场景也会出现。通过在设计中注入灵活性来为这些发现做好准备，是任何以可控方式演进的系统的关键。\n\
  \n一些预期的未决问题如下：\n\n• 未识别的利益相关者\n\n• 由于应用程序服务于多个渠道，需要找到一种方法来生成特定渠道的内容\n\n• 需要创建几个系统级组件，用于身份验证、注册和支付处理\n\
  \n• 可用的实现选择众多\n\n• 未识别的替代使用场景\n\n• 未识别的需求\n\n**设计路线图**\n\n为了应对 TechConf 系统持续的设计过程，您应遵循一个简单的设计路线图，该路线图将指导您创建模型，并随后生成代码，将这些模型具体化为一个可工作的软件系统。该路线图包含几个步骤或活动，其中许多可以并行完成，如下所示：\n\
  \n• **创建分析对象模型（领域模型）：** 对领域的理解以静态模型（类模型）的形式记录下来，该模型将在需求分析和设计模型创建期间提供指导。此步骤提供了一个高层基础，从中更容易看出相关对象和组件的子系统是如何涌现的。领域模型还用于验证关于领域的任何假设或先入为主的观念，并巩固和集中关于问题领域的知识。\n\
  \n• **需求分析：** 从分析和架构文档中定义参与者。为用户与系统的主要高层交互创建用户用例。然后，如有必要，将用户用例分解为系统级用例。系统级用例描述了系统中特定组件为完成用户用例所需的任务而采取的行动。对系统级用例的复用性进行快速评估。高优先级的用例会被详细编写，以降低主要风险（详细并不意味着实现层面的细节）。只要项目或产品存在，需求分析就会持续迭代进行。\n\
  \n• **迭代规划：** 基于一组用例来规划迭代。执行集成规划以确定集成点，并对集成过程的整体自动化进行修改或增强。在本书中，每一章都被设定为一个迭代，旨在完成一定数量的用例。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm Page\
