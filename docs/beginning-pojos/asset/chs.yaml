  \ 页 2006 年 2 月 22 日星期三 上午 6:01\n\n第 1 章 ■ 引言\n\n**19**\n\n图 1-6 展示了用于构建 TechConf\
  \ 的项目和工具地图，以及它们之间、它们与应用程序不同层级和功能关注点之间的关系。\n\n**图 1-6.** *TechConf 中使用的一些开源工具* **有用的开源资源**\n\
  \n互联网上有很多专门管理开源项目并提供开源相关新闻的网站。\n\n• apache.org**：**\n\n• jakarta.apache.org**：**\
  \ Jakarta 项目（jakarta.apache.org）是一个 Java 项目的集合，这些项目被称为子项目。许多子项目是可以集成到应用程序中的框架。例如，正则表达式由\
  \ Jakarta Commons 项目涵盖。其他子项目则用于 Web 开发，还有一些是开发工具。随着项目成熟并成为主流，它们可能会被提升为顶级项目，例如位于\
  \ ant.apache.org 的 Ant。\n\n• xml.apache.org**：** XML 项目是一组用于创建、解析和转换 XML 文档的子项目集合。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3 C01.fm 第\
  \ 20 页 2006 年 2 月 22 日星期三 上午 6:01\n\n**20**\n\n第 1 章 ■ 引言\n\n• sourceforge.net**：**\
  \ SourceForge.net 是世界上最大的开源项目仓库。\n\n\n\n这些项目虽不全是基于 Java 的，但多数如此。其中许多托管项目是稳定且达到生产质量的项目，但更多的项目仍处于规划或早期开发阶段。\n\
  \n• java.net**：** 该网站是 Sun 微系统公司一群多元化的工程师、研究人员、技术专家和布道者愿景的体现，旨在为与 Java 技术相关的有趣讨论和创新开发项目提供一个公共区域。随着行业协会、软件供应商、大学以及个人开发者和爱好者不断加入，这个社区持续壮大。当他们相聚、分享想法并使用该网站的协作工具时，所形成的社区将发掘协同效应，并创造出使\
  \ Java 技术更具价值的新解决方案。\n\n• codehaus.org**：** Codehaus 是一个开源社区，专门服务于那些不采用“GPL 或其他对商业不友好的许可证”的项目。诸如\
  \ Middlegen、XDoclet2 和 Drools 等项目都将 Codehaus 作为其家园。\n\n• tigris.org**：** 该网站是一个中等规模的开源社区，专注于为协作软件开发构建更好的工具。\n\
  \n• gjt.org**：** Giant Java Tree 是一个由不相关的 Java 包组成的集合。\n\n• objectweb.org**：** ObjectWeb.org\
  \ 托管着开源中间件项目和可适配组件。\n\n**总结**\n\nJava 已成为企业计算领域的头号语言和环境，并且也成为开源社区中使用最广泛的语言之一。在撰写本文时，SourceForge\
  \ 上已有超过 10,000 个 Java 开源项目——仅次于 C++。尽管并非每个 Java 开源项目都适用于创建企业应用，但你仍会发现大量尚未充分利用的 Java\
  \ EE 资源。本章还介绍了技术会议管理系统，该系统提出了一个相当复杂且具有代表性的问题，涵盖了企业开发的多个领域。\n\n本书的其余部分将指导您完成设计和开发构成案例研究的应用程序的过程。该案例研究将各章节所学的知识融合在一起。通过以增量迭代的方式逐层处理软件开发过程，本书将为您提供有关软件开发生命周期各个阶段所涉及规划的深刻见解。通过使用开源的\
  \ Java EE 产品和支持工具，您将能够构建一个基本但完整的企业系统。随后的每一章都致力于应用程序的一个层级以及软件开发过程的一个或多个阶段（或活动）。在必要时，将针对特定问题演示多种解决方案，以便让您深入了解在开发企业\
  \ Java 应用程序时遇到的典型决策。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nSam-Bodden_596-3\
