  \n第 4 章 ■ 使用 Hibernate 进行对象关系映射\n\n■**提示** 我使用 Jakarta Commons Lang 工具来实现 equals、hashCode\
  \ 和 toString 方法。\n\n除了让许多繁琐的编码变得更简单之外，它们还提供了一种干净且（大多数情况下）高效的方式来处理 Object 类的这三个重要方法。这些构建器分别是\
  \ EqualsBuilder、HashCodeBuilder 和 ToStringBuilder，它们位于 org.apache.commons.lang.builder\
  \ 包中。Jakarta Commons 库可以在 http://jakarta.apache.org/commons/ 找到。关于这些可用库的完整介绍，我推荐\
  \ Harshad Oak 的《Pro Jakarta Commons》（Apress, 2004）。\n\n从技术上讲，如果你的 POJO 将用作复合主键类的一部分，或者需要在不同会话中加载的该类实例进行比较（无论是直接比较还是通过有序集合进行比较），你只需要为\
  \ POJO 实现 equals 和 hashCode 方法。\n\n**映射（HBM）文件**\n\n对于我们的第一个映射，我选择了 Address 实体领域，因为它是一个没有关联关系的直接对象到表的映射。清单\
  \ 4-2 展示了一个映射 com.integrallis.TechConf.domain.Address 类的 HBM 文件。\n\n**清单 4-2.**\
  \ *Address 实体的 HBM 文件 (Address.hbm.xml)*\n\n<hibernate-mapping\n\npackage=\"com.integrallis.TechConf.domain\"\
  >\n\n<class name=\"Address\">\n\n<id name=\"Id\" column=\"PK_ID\" type=\"integer\"\
  >\n\n<generator class=\"identity\" />\n\n</id>\n\n<property name=\"StreetAddress\"\
  \ />\n\n<property name=\"State\" />\n\n<property name=\"ZipCode\" />\n\n<property\
  \ name=\"City\" />\n\n<property name=\"AptNumber\" />\n\n</class>\n\n</hibernate-mapping>\n\
  \n让我们详细分析一下 address 的 HBM 文件。Hibernate 映射是 XML 文档，其根元素是 hibernate-mapping。它们通常以所映射的类命名，后跟\
  \ .hbm 和 .xml 扩展名。对于 Address 类，文件名将是 Address.hbm.xml。\n\n■**注意** 你可以在一个 HBM 文件中包含多个类映射，但我建议每个类使用一个\
  \ HBM 文件。这种做法将简化维护，并允许多个开发人员处理不同的映射而不会相互干扰。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C04.fm Page 105 Wednesday, February 22, 2006 2:16 PM\n\n第 4 章\
  \ ■ 使用 Hibernate 进行对象关系映射\n\n**105**\n\npackage 属性指定了在运行时在类路径中查找 address POJO 的位置。class\
  \ 元素表示一个类映射。在这种情况下，我们正在映射 Address 类，如 name 属性所示。由于我们没有包含 table 属性，Hibernate 会假设我们映射\
  \ Address 类的表也名为 Address。\n\nid 元素表示将数据库标识属性映射到目标表中的主键列。在这种情况下，我们将 Integer 类型的 Id\
  \ 字段映射到数据库列 PK_ID，并告诉 Hibernate 使用“identity”策略，在每次向数据库插入新行时为 PK 生成一个新值。\n\n■**注意**\
  \ Hibernate 使用智能默认值来最小化映射中所需的信息量。这使得 Hibernate 映射比等效的 EJB CMP 2.X 部署描述符或许多其他现有的\
  \ ORM 工具简洁得多。\n\nproperty 元素将 POJO 属性 StreetAddress、State、ZipCode、City 和 AptNumber\
  \ 分别映射到同名的列。Hibernate 会猜测 POJO 中的属性是 String 类型，数据库中的列是 VARCHAR 类型。你可以在映射中更精确地指定特定类的具体长度和数据类型。\n\
  \n**创建表**\n\n现在我们有了一个简单的 Address POJO 类和相应的映射，我们只需要在数据库中创建一个新的 ADDRESS 表。清单 4-3\
  \ 显示了创建 ADDRESS 表的 SQL 语句。\n\n**清单 4-3.** *创建表 ADDRESS 的 SQL 语句*\n\nCREATE TABLE\
  \ ADDRESS (\n\nPK_ID INTEGER NOT NULL PRIMARY KEY AUTO_INCREMENT,\n\nSTREETADDRESS\
  \ VARCHAR(64),\n\nAPTNUMBER VARCHAR(32),\n\nCITY VARCHAR(32),\n\nSTATE CHAR(2),\n\
  \nZIPCODE VARCHAR(10)\n\n);\n\n图 4-12 显示了 MySQL 命令行客户端，其中列出了创建 TechConf 数据库实例和 Address\
  \ 表所需的命令。请注意，我们可以选择通过 Hibernate 配置来配置 hbm2ddl 工具，让 Hibernate 在应用程序启动时创建表。hbm2ddl\
  \ 工具根据加载的 HBM 文件生成模式，Hibernate 将使用该模式在必要时创建或更新数据库。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00039.png)\n\nSam-Bodden_596-3 C04.fm Page 106 Wednesday, February 22,\
  \ 2006 2:16 PM\n\n**106**\n\n第 4 章 ■ 使用 Hibernate 进行对象关系映射\n\n**图 4-12.** *MySQL\
  \ 命令行客户端*\n\n**主键生成**\n\n请注意，我们选择将主键字段设置为 MySQL 的 AUTO_INCREMENT 字段。\n\n这是一种映射情况，其中对象属性是可选的，但表列是必需的。请记住，Hibernate\
  \ 映射是以类为中心的。但对于数据库标识符，你可以选择不在 POJO 类中反映数据库标识。尽管拥有数据库 ID 字段看起来像是关注点的泄漏，但强烈建议你拥有一个，因为\
  \ Hibernate 的许多高级特性，例如使用“分离”对象的能力以及 Session 对象有用的 saveOrUpdate 和 merge 方法，都依赖于在\
  \ POJO 中反映数据库标识。你可以通过明智地使用适当的 Java 类成员可见性来声明标识字段，从而最小化对 POJO 设计的影响。\n\n在 ORM 工具中，了解对象的持久化状态非常重要。拥有一个可为空、非基本类型的主键，使得判断对象是需要保存还是更新变得更加容易。因此，在所有示例中，我们通常会使用一个代理整数主键，并且只要可能，我们将依赖数据库为新对象生成新值。\n\
