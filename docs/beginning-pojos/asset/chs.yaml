  \n**AJDT**\n\nLoggingAndTracing 切面展示了通过模块化关注点，使用 AspectJ 可以实现的基本功能。但要使用 AOP 处理复杂任务，就需要良好的工具支持。在使用\
  \ AOP 时，理解切面对程序的影响是必不可少的。AspectJ 开发工具（AJDT）是一组 Eclipse 插件，为编辑、构建和调试 AspectJ 应用程序提供工具支持。\n\
  \n安装 AJDT 插件最简单的方法是使用 Eclipse 的软件更新功能。为此，请选择“帮助”➤“软件更新”➤“查找并安装”。选择“搜索要安装的新功能”，然后点击“下一步”。通过选择“新建远程站点”来添加一个新的远程更新站点。在对话框中，名称输入“AJDT”，位置输入`http://download.eclipse.org/technology/ajdt/31/update`。\n\
  \nAJDT 会在 Eclipse 的装订线区域添加与 AspectJ 相关的装饰。例如，在图 10-3 中，我们可以看到与 LoggingAndTracing\
  \ 切面的前置通知相关的装饰（一个指向左侧的弯曲箭头）。如果将鼠标悬停在该装饰上，会弹出一个气泡提示，显示 AspectJ 标记的数量。\n\n**图 10-3.**\
