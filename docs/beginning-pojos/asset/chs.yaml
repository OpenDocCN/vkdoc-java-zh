  \n第 4 章 ■ 使用 HIBERNATE 进行对象关系映射\n\n关于 Hibernate 运作方式的另一个重要信息是，Hibernate 以透明写后（write-behind）的方式与数据库交互。这意味着，你可能不会在\
  \ `persist` 方法执行的那一刻就看到针对数据库执行的 SQL 语句，而是可能在稍后的某个时间点才看到。这是 ORM 工具常用的一种技术，用于在与数据库交互时进行运行时优化。例如，你的代码中的操作可能会产生多个连续的相同\
  \ SQL UPDATE 语句，而 ORM 工具可能会将它们合并为单个 SQL UPDATE。在 Hibernate 中，**Session** 与数据库同步的时刻被称为刷新（flushing）。Hibernate\
  \ **Session** 类还提供了一个显式的 `flush` 方法供你调用。通常你不需要手动刷新 Session，但在复杂场景下，它可能有助于调试。\n\n\
  最后，请注意在清单 4-5 中，我们将保存 Address 对象的代码块包裹在 `try-catch-finally` 中。在 `finally` 子句中，我们确保调用了\
  \ Session 的 `close` 方法。这确保了任何资源（如数据库连接）都能被释放。\n\n在 `catch` 子句中，如果发生异常，Hibernate\
  \ 事务会被回滚，以确保操作的完整性。请注意，Hibernate 事务并非必需，但建议始终使用它，因为它使你无需处理底层的 JDBC 连接（你可以调用与 Session\
  \ 关联的 JDBC 连接的 `commit` 方法）。\n\nHibernate 事务 API 是对代码运行环境底层事务机制的非常简单的封装。在上述简单示例中，`Transaction`\
  \ 对象代表底层的 JDBC 事务，而在支持 JTA 的环境中运行的相同代码，则会使用方法上下文中的容器 JTA 用户事务。最终结果是，你拥有在所有环境中都能工作的一致代码，从而允许你在容器外部测试你的\
