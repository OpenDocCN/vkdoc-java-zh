  \n...\n\n@ComponentClass(allowBody = false, allowInformalParameters = false) public\
  \ abstract class ErrorDisplay extends AbstractComponent {\n\n@Parameter(required\
  \ = true)\n\npublic abstract IValidationDelegate getDelegate();\n\n@SuppressWarnings(\"\
