  .list();\n\n// 命名参数\n\naddresses = session\n\n.createQuery(\"from Address as a where\
  \ a.State = :mystate\")\n\n.setString(\"mystate\", \"OH\")\n\n.list();\n\nHQL 还为你提供了\
