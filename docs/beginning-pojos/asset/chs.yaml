  \n第 7 章 ■ TAPESTRY\n\n**255**\n\n**清单 7-8.** *Tapestry 应用程序配置文件*\n\n<!DOCTYPE application\
  \ PUBLIC\n\n\"-//Apache Software Foundation//Tapestry Specification 4.0//EN\"\n\n\
  \"http://jakarta.apache.org/tapestry/dtd/Tapestry_4_0.dtd\">\n\n<application name=\"\
  Tapestry Demo\">\n\n<meta\n\nkey=\"org.apache.tapestry.page-class-packages\"\n\n\
  value=\"com.integrallis.time\"\n\n/>\n\n</application>\n\n图 7-8 展示了 `application`\
  \ 元素的图形化描述。\n\n**图 7-8.** *application 元素的 DTD 定义* 随着我们为应用程序添加更多功能，我们将在本章中继续增强 `tapestry-time.application`\
  \ 文件。\n\n**用户输入**\n\n如果一个 Web 应用程序无法接收用户的输入，那它几乎毫无用处。Tapestry 提供了大量内置的组件集合来处理用户输入。首先，我们将通过允许用户从下拉选项中选择页面上日期的格式来增强应用程序。\n\
  \n首先，让我们从修改页面模板开始，如清单 7-9 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00105.png)\n\nSam-Bodden_596-3 C07.fm 第 256 页 2006 年 2 月 23 日，星期四，下午 4:22\n\
  \n**256**\n\n第 7 章 ■ TAPESTRY\n\n**清单 7-9.** *一个更复杂的 Home.html*\n\n<html>\n\n<body>\n\
  \n<h1>Tapestry Time</h1>\n\n<p>当前时间是 <span jwcid=\"time\">正午</span>!</p>\n\n<form\
  \ jwcid=\"@Form\" listener=\"listener:formSubmit\">\n\n<h2>选择格式:</h2>\n\n<p>\n\n\
  <span jwcid=\"@PropertySelection\"\n\nmodel=\"ognl:@com.integrallis.time.Home@FORMAT_MODEL\"\
  \n\nvalue=\"ognl:formatString\">\n\n<select>\n\n<option value=\"0\" selected=\"\
  selected\">h:mm a</option>\n\n<option value=\"1\">EEE, MMM d, ''yy</option>\n\n\
  </select>\n\n</span>\n\n</p>\n\n<p>\n\n<img jwcid=\"@ImageSubmit\" image=\"asset:btn_submit\"\
  \n\nalt=\"提交\" src=\"images/submitButton.png\" />\n\n</p>\n\n</form>\n\n</body>\n\
  \n</html>\n\n这个模板虽然包含了更多组件，但仍然只是简单的 HTML，它可以在任何兼容的浏览器或 HTML 编辑器中正确渲染，如图 7-9 所示。希望你已经开始看到\
  \ Tapestry 在分离关注点方面的强大之处。\n\n**图 7-9.** *用于处理用户输入的增强版 Home.html*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C07.fm 第 257 页 2006 年 2 月 23 日，星期四，下午 4:22\n\n第 7 章 ■ TAPESTRY\n\
  \n**257**\n\n让我们分解一下本例中使用的不同元素。除了之前使用的名为“time”的 Insert 组件外，我们现在还有一个 Form 组件，定义如下：\n\
  \n<form jwcid=\"@Form\" listener=\"listener:formSubmit\">\n\n...\n\n</form>\n\n\
  Form 组件封装并扩展了 HTML 表单的功能。就像 HTML 表单一样，它包含其他组件，并处理表单的提交，在 Tapestry 术语中称为“回绕”表单。与\
  \ HTML 表单不同的是，Form 组件通过处理所有生成的 HTML 表单以及每个包含组件的命名，使得处理表单提交变得非常简单。\n\n\n\n对于 Home.html\
  \ 模板，我们通过在 `jwcid` 属性中使用 `@` 符号来隐式定义 Form 组件。为了处理表单提交，我们需要声明一个监听器方法。在本例中，我们将向 Home.java\
  \ 类中添加 `formSubmit` 方法。\n\n在表单内部，我们有两个组件。第一个组件是 PropertySelection 组件，它提供了一个下拉列表：\n\
  \n<span jwcid=\"@PropertySelection\"\n\nmodel=\"ognl:@com.integrallis.time.Home@FORMAT_MODEL\"\
  \n\nvalue=\"ognl:formatString\">\n\n<select>\n\n<option value=\"0\" selected=\"\
  selected\">h:mm a</option>\n\n<option value=\"1\">EEE, MMM d, ''yy</option>\n\n\
  </select>\n\n</span>\n\n与 Swing 组件类似，PropertySelection 组件有一个关联的选择模型，该模型是 `IPropertySelectionModel`\
  \ 接口的实现。该模型为下拉列表提供要填充的值，同时也用于确定用户选择的值。\n\n拥有模型确实改变了 Web 开发的动态性。它们为你提供了灵活性，让你可以决定如何存储和检索填充组件的数据。模型还提供了一个集中的数据结构，可以在不同实体之间共享，从而避免数据重复，并且根据其上下文，它们可以有多个监听器，模型中的更改可以传播到这些监听器。这在处理异步\
  \ JavaScript 技术和 XML（AJAX）技术时尤其有用。\n\nPropertySelection 组件也是隐式定义的。`model` 属性告诉组件从哪里获取数据，我们在\
  \ Home 类中将其定义为 `FORMAT_MODEL` 属性。`value` 属性告诉 Tapestry 在表单提交时将用户选择的值放在哪里，我们在 Home\
  \ 页面类中将其定义为 `formatString` 属性。\n\nPropertySelection 组件主体内部的 `select` 元素只是纯 HTML，它让我们在设计时能够预览下拉列表。如果你查阅该组件的文档，你会发现它指出主体内容在渲染时会被移除（文档中显示为“Body:\
  \ removed”）。这是一个非常强大的构造，也是 Tapestry 哲学的核心——HTML 就应该是 HTML。\n\n最后，我们需要一种提交表单的方式。虽然我们可以使用一个简单的按钮来提交表单，但我们选择使用图像按钮来展示资产在\
  \ Tapestry 中是如何处理的。ImageSubmit 组件用于生成用于表单提交的图像按钮。它扩展了更简单的 Submit 组件，如下所示：\n\n<img\
  \ jwcid=\"@ImageSubmit\"\n\nimage=\"asset:btn_submit\"\n\nalt=\"提交\"\n\nsrc=\"images/submitButton.png\"\
  \ />\n\nTapestry 组件库丰富的面向对象特性的另一个副作用是高度的可重用性；可以通过扩展或聚合更简单的组件来创建复杂的组件。在 ImageSubmit\
  \ 组件中，我们声明图像将由 Tapestry 资产管理器提供，并且资产的名称为 `btn_submit`。此外，还提供了替代文本，以防用户浏览器禁用了图像显示。最后，为了生成准确的\
  \ HTML 静态页面，使用 `src` 属性呈现了实际的图像。正如你将了解到的，资产消除了在包含多个目录中多个页面的网站中通常遇到的查找资产（如图像和其他媒体等资源）的混乱情况。\n\
  \n要为 `submitButton.png` 图像创建资产，请向 Home.page 定义文件中添加一个 `asset` 元素，如下所示（假设图像位于上下文目录下的\
  \ `images` 目录中）。\n\n<asset name=\"btn_submit\" path=\"images/submitButton.png\"\
  \ /> 完成 HTML 模板的修改后，我们需要更新 Home 类以满足模板中组件的需求。清单 7-10 显示了修改后的 Home 类。\n\n\n\n**清单\
  \ 7-10.** *一个更复杂的 Home.java*\n\npublic abstract class Home extends BasePage implements\
  \ PageBeginRenderListener {\n\nprivate static String[] FORMAT_STRINGS =\n\nnew String[]\
  \ { \"h:mm a\",\n\n\"EEE, MMM d, ''yy\",\n\n\"hh 'o''clock' a, zzzz\",\n\n\"K:mm\
  \ a, z\"};\n\npublic static final IPropertySelectionModel FORMAT_MODEL =\n\nnew\
  \ StringPropertySelectionModel(FORMAT_STRINGS);\n\nprivate Format timeFormat;\n\n\
  public void pageBeginRender(PageEvent event) {\n\nif (getFormatString() == null)\
  \ {\n\nsetFormatString(FORMAT_STRINGS[0]);\n\n}\n\n}\n\npublic Format getTimeFormat()\
  \ {\n\ntimeFormat = new SimpleDateFormat(getFormatString());\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \nSam-Bodden_596-3 C07.fm Page 259 Thursday, February 23, 2006 4:22 PM\n\nC H A\
  \ P T E R 7 ■ T A P E S T R Y\n\n**259**\n\nreturn timeFormat;\n\n}\n\npublic Date\
  \ getTime() {\n\nreturn new Date();\n\n}\n\npublic abstract String getFormatString();\n\
  \npublic abstract void setFormatString(String formatString); public void formSubmit(IRequestCycle\
  \ cycle) {\n\nSystem.out.println(\"The form has been submitted!\");\n\n}\n\n}\n\n\
  让我们从 FORMAT_MODEL 的定义开始，我们将使用简单的 StringPropertySelectionModel，它允许将字符串数组用作下拉菜单中标签的来源，并使用简单的整数索引作为值。创建了一个包含多个格式字符串的\
  \ String[]，这些字符串可与 java.text.SimpleDateFormat 实例一起使用，然后将其用于 StringPropertySelectionModel\
  \ 的构造函数中。\n\ngetFormatString 方法将在表单提交后返回所选格式字符串的值。该值在 getTimeFormat 方法中用于返回一个 Format\
  \ 对象。formSubmit 方法返回 void 且实现为空。返回 void 表示提交后要渲染的页面是当前页面，并且方法体没有任何功能，因为下拉选择的值已经分配给了\
  \ formatString 属性。\n\n你可能会注意到 getFormatString 和 setFormatString 是抽象方法。\n\n在运行时，Tapestry\
  \ 会创建 Home 类的具体实现，并为所有抽象的 getter 和 setter 方法提供实现，同时提供一个字段来保存属性的值。刚接触 Tapestry 且未遇到过这种巧妙使用抽象类的开发者，可能会对针对抽象类进行编码感到有些不安。但这是\
  \ Tapestry 最大的优势之一，它展示了在利用环境动态特性的同时，将用户提供的具体代码进行混合的最佳方式。\n\n最后，我们需要在页面渲染时（而非表单提交的结果）为格式字符串赋值。为此，我们需要了解页面的生命周期。Tapestry\
  \ 页面会产生多个不同的事件，可以通过实现相应的监听器接口来监听这些事件。在本例中，我们实现了 org.apache.tapestry.event.PageBeginRenderListener，该接口用于确定页面何时即将被渲染。\n\
  \nvoid pageBeginRender(PageEvent event) 方法的实现会检查 formatString 是否为空，如果为空，则分配数组中的第一个值。\n\
