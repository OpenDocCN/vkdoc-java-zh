  \ 和 org.apache.tapestry.annotations.Parameter 注解分别定义组件及其参数。\n\nrenderComponent 方法负责渲染组件的主体。为了创建\
  \ HTML，我们使用 IMarkupWriter 的实例，该实例作为参数传递给该方法。\n\n清单 7-29 展示了 ErrorDisplay 组件的实现。\n\
