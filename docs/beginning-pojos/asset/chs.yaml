  \n第 8 章 ■ 测试\n\nEclipse 也以视图形式提供了 JUnit 集成。图 8-2 展示了嵌入式的 Eclipse JUnit 视图。\n\n**图\
  \ 8-2.** *JUnit Eclipse 视图*\n\n尽管可以单独运行一个 `TestCase`，但通常一次运行一整套测试更为有利。JUnit 支持使用\
  \ `TestSuite` 类对一组测试用例进行分组。测试套件有助于组织测试，以便它们可以作为一个组来执行。清单 8-3 展示了如何创建一个测试套件。`AllTests`\
  \ 类在静态方法 `suite` 中创建了一个 `TestSuite`，并使用 `addTestSuite()` 方法向其中添加测试用例。\n\n**清单 8-3.**\
