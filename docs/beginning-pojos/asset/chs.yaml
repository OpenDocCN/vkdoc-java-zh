  \n例如，要创建一个 Address 对象并将其保存到数据库，我们采取以下步骤，如清单 4-5 所示：\n\n**1.** 创建 POJO 并设置值。\n\n\
  **2.** 使用 SessionFactory 创建一个 **Session**。\n\n**3.** 启动一个绑定到该 Session 的 Hibernate\
  \ 事务。\n\n**4.** 使用 Session 的 persist 方法保存对象。\n\n**5.** 提交事务。\n\n**6.** 关闭 Session。\n\
