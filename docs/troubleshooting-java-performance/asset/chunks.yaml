  trans: "\n## JMeter 沙盒\n\n本节及下一节所需的 JMeter .jmx 文件位于 jpt 仓库的以下路径：\n\n```\nsampleJMeterScripts/jpt_ch07_sandbox.jmx\n\
    ```\n\n你是否对掌握负载生成技巧有些犹豫？这很正常——它确实需要下功夫。但幸运的是，学习 JMeter 比其他负载生成工具更容易，因为你可以在自己的小沙盒中测试几乎每个测试元件，而无需受被测系统（SUT）复杂性的干扰。所以，关掉\
    \ Wi-Fi（别真关），让我们开始吧：\n\n借助这个小沙盒技术，你可以：\n\n1.  创建带有大量逼真波浪线的图表，甚至可以在同一张图表上展示不同指标（如响应时间和吞吐量）。\n\
    2.  处理文本，例如创建一个“输出-输入”脚本变量，这是我在第 4 章关于负载脚本优先级中提到的极其重要的技术。\n3.  从 `.csv` 文件中读取数据到\
    \ JMeter 脚本变量。\n4.  使用“If-then”逻辑控制脚本流程，或者通过逻辑控制器重复执行几个步骤。\n5.  ……还有很多很多。\n\n\
    一旦我们完成了沙盒测试列表中的第 1 和第 2 项，你就可以准备好（是的，准备好）将第 3、4、5 项作为家庭作业来玩了。这真的很有趣。沙盒的工作原理如下：关闭你正在处理的任何脚本，添加一个线程组和一个子元件\
    \ [`jp@gc - Dummy Sampler`](http://jmeter-plugins.org/wiki/DummySampler/) ( [`https://jmeter-plugins.org/wiki/DummySampler/`](https://jmeter-plugins.org/wiki/DummySampler/)\
    \ )。具体步骤如下：\n\n1.  右键点击测试计划，选择 添加 ➤ 线程（用户） ➤ 线程组。\n2.  配置测试持续时间。\n3.  勾选“永远”以让测试无限期运行（运行\
    \ ➤ 停止，或按 Ctrl/Cmd+逗号停止测试）。\n\n    ![A449023_1_En_7_Figf_HTML.jpg](img/A449023_1_En_7_Figf_HTML.jpg)\n\
    \n4.  或者取消勾选“永远”，并在旁边的文本框中输入 1，让 Dummy Sampler 只运行一次——用于只运行一次脚本，例如在测试/调试时。\n5.\
    \  在屏幕左侧的树中，右键点击新添加的线程组，选择 添加 ➤ 取样器 ➤ jp@gc - Dummy Sampler。\n6.  选中新添加的 Dummy\
    \ Sampler，使用快捷键 Ctrl+Shift+C 复制它。\n7.  看到我如何在取样器名称后添加 - 01 和 - 02 了吗？JMeter 树位于屏幕左侧。在右侧找到名称输入框（在“注释”文字上方）。你可以在这里添加\
    \ - 01 或 - 02 来更改名称。\n\n完成这些操作后，你将看到如图 7-19 所示的界面。\n\n![A449023_1_En_7_Fig19_HTML.jpg](img/A449023_1_En_7_Fig19_HTML.jpg)\n\
    \n图 7-19.\n\n基础沙盒。这是 JMeter 沙盒游戏环境的基础。注意延迟和响应时间的默认值。这些解析为随机数的变量在测试驱动图表时增添了一些趣味。\n\
    \n## 带单个图表的 JMeter 沙盒\n\n本节所需的 JMeter .jmx 文件与上一节相同：\n\n```\nsampleJMeterScripts/jpt_ch07_sandbox.jmx\n\
    ```\n\n有了沙盒基础，只需添加你想要尝试的几十个测试元件中的一个即可！在图 7-20 中，我添加了 [jp@gc Response Times Over\
    \ Time](http://jmeter-plugins.org/wiki/ResponseTimesOverTime/) ( [`https://jmeter-plugins.org/wiki/ResponseTimesOverTime/`](https://jmeter-plugins.org/wiki/ResponseTimesOverTime/)\
    \ ) 并启动了测试（Ctrl+R 或 Cmd+R），瞧，出现了逼真的图表。使用 Ctrl+逗号或 Cmd+逗号停止。\n\n![A449023_1_En_7_Fig20_HTML.jpg](img/A449023_1_En_7_Fig20_HTML.jpg)\n\
    \n图 7-20.\n\n使用 JMeter 沙盒快速演示图表\n\n## JMeter 沙盒 / 同一图表上的多个指标\n\n本节展示如何将两个或多个指标放在单个\
    \ JMeterPlugins 图表上。\n\n要亲自查看效果，请在 jpt 仓库中查找此 .jmx 文件。在 JMeter 中打开它：\n\n```\n\
    sampleJMeterScripts/jpt_ch07_multipleMetricsOnOneGraph.jmx\n```\n\n当然，进行猜测（有根据的猜测）是性能故障排查的关键部分。但如果猜测无法得到数据支持，我们都需要有足够的胸怀承认错误，并公开否定未经证实的断言。事实上，在第\
    \ 3 章中，我将指标称为猜测的解毒剂。因此，我认为开发人员需要稍微磨练一下查找、收集和高效呈现性能数据的技能，以便我们能够证实更多的猜测，或者干净利落地放弃它们。\n\
    \n为了观察一个指标对另一个指标的影响，我认为将两个不同的指标放在完全相同的图表上非常重要。在第 6 章关于可扩展性标尺的内容中，我向你们展示了一个例子。还记得我们必须检查需要多少负载线程才能将\
    \ SUT CPU 推高到 25% 吗？这两个指标是 CPU 和 JMeter 负载线程数。在这种情况下，负载线程数的增加影响了另外两个指标：CPU 和吞吐量都受到了影响——它们都增加了。\n\
    \n实际上，我最喜欢的四个起始指标是 CPU、响应时间、吞吐量和负载生成器线程数。\n\n为了帮助你快速掌握如何自己显示这样的图表，图 7-21 展示了我仍然使用\
    \ jp@gc - Dummy Sampler 沙盒的测试计划，将两个指标放在同一张图表上：jp@gc - Response Times Over Time\
    \ 和 jp@gc - Transactions per Second。\n\n![A449023_1_En_7_Fig21_HTML.jpg](img/A449023_1_En_7_Fig21_HTML.jpg)\n\
    \n图 7-21.\n\n在同一张图表上获取多条线所需的测试计划\n\n一旦你按照图 7-21 所示将它们添加到负载计划树中，你需要告诉新的 jp@gc -\
    \ Composite Graph 要显示哪些指标。因此，我选中了 jp@gc - Composite Graph 并点击了“图表”选项卡。哎呀，但那里什么也没有，如图\
    \ 7-22 所示。\n\n![A449023_1_En_7_Fig22_HTML.jpg](img/A449023_1_En_7_Fig22_HTML.jpg)\n\
    \n图 7-22.\n\n一个可用性问题：“可用来源”框中未填充我想要在图表中显示的指标。解决方案见图 7-23。\n\n要解决这个小问题，你只需运行测试几秒钟然后停止测试。这将填充“可用来源”框，以便你可以选择想要查看的指标（图\
    \ 7-23）。\n\n![A449023_1_En_7_Fig23_HTML.jpg](img/A449023_1_En_7_Fig23_HTML.jpg)\n\
    \n图 7-23.\n\n图 7-22 中问题的解决方案。要让你的指标选择显示在“可用来源”框中，只需运行测试。然后停止测试，并双击“可用来源”中的选择项，将它们移动到“复合图表”部分。\n\
    \n一旦“可用来源”框被填充，你就可以双击想要移动到“复合图表”框中的指标。\n"
- fmt: '# JMeter Sandbox for Testing Correlation Variables


    The JMeter `.jmx` files for the next two examples are located in the `jpt` repo
    in this location:


    ```

    sampleJMeterScripts/ folder for jpt_ch07_correlationVariables.jmx

    ```


    In Chapter 4, I showed a number of circumstances where the load generator script
    has to step in and do small data movement chores that in a live situation are
    done by your SUT’s JavaScript in the browser. But in that chapter, I tried to
    show everything in a load-generator–agnostic way. This section jumps into the
    JMeter specifics on how to implement this.


    Sometimes with the right SUT functionality, a unique ID generated on the server
    SUT gets recorded into your load script. Adding the right script variable, one
    that I’m calling an “Output-Input” variable, will retrieve the freshly generated
    value, instead of relying on the single, static value that was initially recorded
    into the script. That way, the generated ID can be submitted somehow (you have
    to figure that part out) in a subsequent request, perhaps as a query parameter
    or somewhere in the body of an HTTP POST.


    But before sticking a generated ID like this into a script variable, your JMeter
    script first has to find that particular ID from its location embedded hopefully
    a predictable place in lots of text in the output HTML stream.


    ## Fishing Expedition—Step One, Find the Data Item


    Two popular ways of finding a data item in the output HTML are with a regular
    expression or an XPath expression. Choose whichever way you feel most comfortable
    with, but here is a regular expression example.


    Step One is simply to perfect the regular expression to find your data item in
    the XML or HTML.


    Using the JMeter sandbox approach, start by creating a little sandbox test plan
    like the one shown in Figure 7-24. The goal is to simply embed the HTML that you
    expect your SUT to return into the Dummy Sampler and then use JMeter to play around
    with various regular expressions to identify the one that will correctly identify
    the data.


    ![A449023_1_En_7_Fig24_HTML.jpg](A449023_1_En_7_Fig24_HTML.jpg)


    **Figure 7-24.** Simple JMeter sandbox plan that returns some hard-coded XML (starting
    with `<CATALOG>`) that contains the text to be placed into the Output-Input variable.


    Here is our goal: to find the regular expression that will locate the following
    text:


    | The `bobDylan-01.txt` is the value we want to place in the Output-Input script
    variable. | `<CD name="file" value="bobDylan-01.txt">` |

    | This regular expression used to identify `bobDylan-01.txt` | `name="file" value="(.+?)">`
    |


    Before running this test:


    1. Make sure the Thread Group is configured to execute the Dummy Sampler one time
    (hint—make sure the Forever box is unchecked); you don’t need 5235 executions
    to debug this—you need just one.

    2. In the View Results Tree (Figure 7-25), make sure the Errors and Successes
    boxes are unchecked. (Learn more about these checkboxes [here](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree):
    `http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree`.)
    This will make sure none of the results are hidden or filtered out.


    ![A449023_1_En_7_Fig25_HTML.jpg](A449023_1_En_7_Fig25_HTML.jpg)


    **Figure 7-25.** JMeter [View Results Tree](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree)
    (`http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree`)—use
    this to test whether your regular expression works.


    Run the test (Run ➤ Start or Cmd/Ctrl+R) just once. Each bulleted number below
    corresponds to the number in Figure 7-25.


    1. Click on the View Results Tree to see the result of the single Dummy Sampler
    execution.

    2. Change the combo box to RegExp Tester from the default value of Text. This
    basically reconfigures the UI so we can test the hard coded XML result against
    the regular expression.

    3. Do you see the green triangle with the check mark inside it, next to `jp@gc
    - Dummy Sampler - 01`? Select this—it is the result of the single run of the Dummy
    Sampler.

    4. Finally, we get down to business. Type in the value of the regular expression
    you want to test, and then click the Test button.

    5. This shows that our regular expression worked, because it isolated `bobDylan-01.txt`
    from the rest of the XML.


    ## Fishing Expedition—Step Two


    Now it is time to put your perfected XPath or RegEx expression into place. Right-click
    `jp@gc - Dummy Sampler` (or the real HTTP Request that will produce the HTML or
    XML responses that you are fishing through). Choose Add ➤ Post Processor ➤ RegEx
    Extractor (or XPath Extractor). The JMeter doc for the Extractor you’re using
    will also show you how to specify the name of the JMeter script variable the fished
    out value should be stored in. Your JMeter test plan should look like Figure 7-26.


    ![A449023_1_En_7_Fig30_HTML.jpg](A449023_1_En_7_Fig30_HTML.jpg)


    **Figure 7-30.** The Request Data field at the bottom of this figure simulates
    POST data for an HTTP Request. The `${MY_FILE_g1}` variable is a Correlation Variable
    being passed back into the SUT.


    ![A449023_1_En_7_Fig29_HTML.jpg](A449023_1_En_7_Fig29_HTML.jpg)


    **Figure 7-29.** This View Results Tree output shows how the Debug Sampler has
    dumped the values of all JMeter variables for debugging purposes.


    ![A449023_1_En_7_Fig28_HTML.jpg](A449023_1_En_7_Fig28_HTML.jpg)


    **Figure 7-28.** The JMeter Regular Expression Extractor. The Regular Expression
    field is used to search the HTTP response for a string of text used in a Correlation
    Variable.


    ![A449023_1_En_7_Fig27_HTML.jpg](A449023_1_En_7_Fig27_HTML.jpg)


    **Figure 7-27.** The JMeter Debug Sampler and `jp@gc—Dummy Samplers` have very
    similar names. The Debug Sampler acts as a simple request to show all JMeter variables
    in the View Results Tree, as shown in Figure 7-29.


    ![A449023_1_En_7_Fig26_HTML.jpg](A449023_1_En_7_Fig26_HTML.jpg)


    **Figure 7-26.** When creating a Correlation variable in JMeter in the sandbox,
    the load plan tree should look like this.


    When this runs, JMeter will attempt to find the value you’re looking for. It will
    then place that value into a script variable. To see whether JMeter has done this
    as you were expecting, you need to add a Debug Sampler as shown in Figure 7-27.
    The actual debug information will show up in the View Results Tree at the top
    of Figure 7-27.


    Figure 7-28 shows how to specify exactly what you want to find from the HTTP response.
    It is helpful to choose a default value that will indicate when something has
    likely gone wrong.


    To find the debug information to troubleshoot problems with the correlation variable,
    click on the View Results Tree on the test plan (left side of the screen) and
    select the Debug Sampler as shown in Figure 7-29.


    Finally, it is time to use the variable extracted from the response of the previous
    Sampler. Note in Figure 7-30 how the variable name (`MY_FILE_g1`) is wrapped in
    curly braces. The “dollar curly” syntax is used to evaluate the variable.'
