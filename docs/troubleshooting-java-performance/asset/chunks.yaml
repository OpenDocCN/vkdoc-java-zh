  trans: '

    ## PerfMon


    在第 3 章中，我讨论了指标如何回答我们的三个基本问题：


    1.  我们的硬件资源利用率如何？

    2.  哪个组件是特定性能问题的罪魁祸首？

    3.  最终用户是否受益？哪项代码变更表现更好？


    负载生成器是专门为回答第三个问题（关于满足性能要求）而设计的。jmeter-plugins.org 的 PerfMon 组件也为第一个问题提供了高层次的答案。我所说的“高层次”，指的是
    CPU、RAM 和网络消耗，以及[比这更多一点的内容](http://jmeter-plugins.org/wiki/PerfMonMetrics/)（[`https://jmeter-plugins.org/wiki/PerfMonMetrics/`](https://jmeter-plugins.org/wiki/PerfMonMetrics/)）。其工作原理如下。


    首先，运行 `startAgent.bat`（清单 7-1）不需要管理员或 root 权限。此进程消耗的资源非常少，因此可以安全地启动该进程，并在数天或数月内无需再关注它。


    ```

    # ./startAgent.sh

    INFO  2016-02-21 14:03:05.061 [kg.apc.p] (): Binding UDP to 4444

    INFO  2016-02-21 14:03:06.064 [kg.apc.p] (): Binding TCP to 4444

    INFO  2016-02-21 14:03:06.069 [kg.apc.p] (): JP@GC Agent v2.2.0 started

    清单 7-1.

    serverAgent 的启动横幅，它为 JMeter 提供硬件利用率数据

    ```


    图 7-1 展示了如何添加一个连接到 serverAgent 并显示 CPU 图的 JMeter 图表。


    ![A449023_1_En_7_Fig1_HTML.jpg](img/A449023_1_En_7_Fig1_HTML.jpg)


    图 7-1.


    要捕获出色的 CPU、RAM 和其他硬件指标，只需将 PerfMon 指向您已解压并启动 serverAgent 的主机和端口（默认端口为 4444）即可。


    因此，JMeter 帮助回答了三个指标问题中的两个。你甚至可以论证它回答了剩下的那个问题：哪个组件是特定性能问题的罪魁祸首。如何做到？请查看这些可以在 JMeter
    中绘制成图表的其他可用指标。


    JMXMon 插件在 JMeter 中绘制 JMX 指标图表：


    [`https://jmeter-plugins.org/wiki/JMXMon/`](https://jmeter-plugins.org/wiki/JMXMon/)


    不幸的是，JMeter 负载计划文件扩展名 (.jmx) 与 Java 管理扩展 (JMX)（一个监控 API）的缩写恰好是相同的三个字母。监控 API JMX
    目前并不十分流行，但 Spring Boot 的 Actuator 却很流行。它通过 json-over-http 消息提供出色的 JVM 健康指标。以下页面展示了如何通过向
    Maven 的 pom.xml Spring Boot 文件添加一个简单的依赖项来在 Spring Boot 中启用 Actuator：


    [`http://www.baeldung.com/spring-boot-actuators`](http://www.baeldung.com/spring-boot-actuators)


    然后，您可以使用以下 JMeterPlugin 在 JMeter 中绘制 Actuator 数据图表：


    [`https://jmeter-plugins.org/wiki/PageDataExtractor/`](https://jmeter-plugins.org/wiki/PageDataExtractor/)


    JMX 和 Actuator 数据可以指向 JVM 内部的许多问题，从而帮助回答“哪个组件是罪魁祸首”的问题。因此，JMeter 和 JMeterPlugins
    有助于提供所有三种类型的指标。令人印象深刻。


    ## JMeter user.properties 是你的朋友


    我时常会发现一些以特定方式调整 JMeter 默认配置的 JMeter 属性。为了避免这些属性调整在 `JMETER_HOME/bin/jmeter.properties`
    中其他 45KB（截至 JMeter 2.13 版本）的属性中丢失，我将它们分离到 `JMETER_HOME/bin/user.properties` 中，该文件中的属性会覆盖
    `jmeter.properties` 中的属性。


    将它们分开存放，使我能够轻松地将我的 `user.properties` 文件复制到新的 JMeter 安装中，从而获得更一致的安装体验。


    清单 7-2 展示了我个人的 `user.properties` 文件，其中包含我推荐给所有人的一组我最喜欢的 JMeter 自定义设置。


    ```

    #添加此项以避免在“查看结果树”中截断 HTTP 及其他响应

    view.results.tree.max_size=0

    #添加此项以便“活动线程数随时间变化”监听器

    #能够从您的 .jtl 文件中渲染数据

    jmeter.save.saveservice.thread_counts=true

    #添加此项以使用 csv 格式（而非 XML）作为 jtl 输出文件。

    #这可以减小 jtl 文件大小，降低测试期间 JMeter 的 CPU 消耗

    jmeter.save.saveservice.output_format=csv

    #这些 csv 字段名称使得读取/理解 .jtl 文件更加容易。

    jmeter.save.saveservice.print_field_names=true

    清单 7-2.

    user.properties 文件中我最喜欢的一些 JMeter 属性，该文件会覆盖 jmeter.properties；两个文件都位于 JMETER_HOME/bin
    目录下

    ```


    当你与朋友分享你的 .jmx 文件时，你可能也想分享像上面这样的属性。但你可能更想使用上面的 pom-load.xml 文件来指定你希望朋友使用的任何属性。请查看上面的
    pom-load.xml 文件，了解清单 7-3 中的语法，其作用与在 JMeter 的 `user.properties` 文件中设置 `summariser.interval=5`
    相同。


    ```


    清单 7-3.

    在 jmeter-maven-plugin 中指定的 JMeter 属性

    ```


    你可以使用清单 7-3 中的技术来指定任何 JMeter 属性。以下是所有 JMeter 属性的参考文档：


    [`http://jmeter.apache.org/usermanual/properties_reference.html`](http://jmeter.apache.org/usermanual/properties_reference.html)

    '
- fmt: '# JMeter Introduction


    When I was starting out with JMeter, I wish I’d had a screenshot like Figure [7-2](#A449023_1_En_7_Chapter.html#Fig2).
    An upscale framed copy on your wall is a bit overkill, but how about a photocopy
    taped to the bottom edge of one of your massive 42 inch monitors? The text I added
    to the screenshots shows basic load generation functionality, and the arrows point
    to the JMeter Test Element you will need to implement it. The first screenshot
    in Figure [7-2](#A449023_1_En_7_Chapter.html#Fig2) is the blank slate you get
    when you start JMeter. To set up JMeter as you see in the second screenshot, you
    right-click on `Test Plan` and start adding things.


    ![A449023_1_En_7_Fig2_HTML.gif](A449023_1_En_7_Fig2_HTML.gif)


    Figure 7-2. How to get things done with JMeter Test Plan Tree. The first screenshot
    is a blank slate. Second screenshot is after right-clicking, adding many Test
    Plan Elements.


    I must concede that the JMeter load plan tree, that tree-like structure on the
    left side of the main window, is a tough usability hurdle for new users. Users
    generally know the end result they’re after. For example, “apply 5 threads of
    load to two different SOA services over HTTP for 5 minutes, need response time
    and throughput time series graphs.” But to accomplish this seemingly straightforward
    goal, JMeter forces the uninitiated into an ugly little trial-and-error game that
    I call “Right-Clicking Education.” Intermediate users navigate this easily, but
    not beginners. In that left pane of the UI, you assemble a tree structure with
    funny named building blocks called Test Elements (`Thread Group`, `Dummy Sampler`,
    `View Results Tree`, and so on). Each Test Element in the tree has a type, and
    it has to be precisely positioned according to a set of rules that a beginner
    knows nothing about. The Test Elements and the types (I work mostly with these
    types: `Thread Group`, `Sampler`, `Listener`, `Assertion`) and all of the individual
    Test Elements are [documented here](http://jmeter.apache.org/usermanual/component_reference.html#introduction):


    [`http://jmeter.apache.org/usermanual/component_reference.html#introduction`](http://jmeter.apache.org/usermanual/component_reference.html%23introduction)


    There is some nice high level documentation here:


    [`http://jmeter.apache.org/usermanual/test_plan.html`](http://jmeter.apache.org/usermanual/test_plan.html)


    Table 7-1. Frequently Used Components in a JMeter Load Plan


    | Name | Description | Example |

    | --- | --- | --- |

    | `Listener` | Graphs and other ways to display results |  |

    | `Thread Group` | Configure how many threads of load are applied. Configure test
    duration. | [`Stepping Thread Group`](http://jmeter-plugins.org/wiki/SteppingThreadGroup/)
    ([`https://jmeter-plugins.org/wiki/SteppingThreadGroup/`](https://jmeter-plugins.org/wiki/SteppingThreadGroup/))
    or the clunky default [`Thread Group`](http://jmeter.apache.org/usermanual/component_reference.html%23Thread_Group)
    ([`http://jmeter.apache.org/usermanual/component_reference.html#Thread_Group`](http://jmeter.apache.org/usermanual/component_reference.html%23Thread_Group))
    |

    | `Sampler` | The doer. Do an HTTP request. Do a JMS request. Execute java code.
    |  |

    | `Controller` | Controls the flow of your samplers, including “If” logic and
    looping logic |  |

    | `Assertion` | Allows you to configure how JMeter decides whether one run of
    a `Sampler` succeeded or failed. |  |


    If you right-click on a particular Test Element, you’ll see what kind of child
    Test Elements you can legally add from that spot. So if your right-clicker has
    enough gusto on that day, you can right-click every node on the tree (sometimes
    there are dozens or hundreds of blocks) and deduce and commit to memory the whole
    set of rules—which Test Element types can/should be the parents/children of other
    Test Element types. That’s a lot of right-clicking fun. Or not.


    My point here is not to dish out a black eye to “the one I love.” Instead, it
    is to encourage you to avoid the pain of the Right-clicking Education. At first,
    start by relying on the help of others to structure your load plan tree. Specifically,
    you can use the screenshot in Figure [7-2](#A449023_1_En_7_Chapter.html#Fig1)
    as a guide, or perhaps use the relatively new JMeter Template feature to start
    with a ready-made load plan tree, or just have a friend share their load plan
    (a `.jmx`[²](#A449023_1_En_7_Chapter.html#Fn2) file of a proprietary `.xml` grammar).
    To use the Template feature, start JMeter with an empty load plan tree, and then
    choose `File ➤ Templates`. Even with a lot of experience, I still rely on the
    `Record` template to record a new HTTP load script, because the tree structure
    is a little unique. You will soon become comfortable with which Test Elements
    go where, and you can then branch out (ha) and get more creative with your load
    plan tree structure.'
