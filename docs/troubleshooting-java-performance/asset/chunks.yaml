    ## Wrong Workload Issues


    The section delves into a little more detail on the Performance Anti-Pattern Number
    3:


    *   Overprocessing: The system is doing unnecessary work and removing that work
    provides measurable performance benefit. One example is retrieving too much data,
    where most of the data is discarded. Another example is including in your load
    test the wrong resource-hungry use case—one that is seldom used in production.


    I am very thankful for developers who take the time to create both data and tests
    for an application’s complicated edge cases. Thank you. We need exactly these
    kinds of tests, these reminders, to show the functionality we expect from the
    system.


    All that said, it is a waste of time to pummel your system with edge cases (and
    try to tune them) if just a slow trickle of such cases will ever traverse your
    production system. Often, these edge cases rear their heads unexpectedly. Once,
    after performance on a system degraded unexpectedly and severely, I scoured the
    source code control system for any unexpected code or other changes. No obvious
    problems there.


    After ten painfully unfruitful days of troubleshooting, we re-evaluated the load
    generation scripts for some of these pesky edge cases and we discovered one anomaly.
    The problem was not with the functionality we included in our load generation
    script (which is indeed something to watch out for), it was with the data.


    What we found was that the average number of bytes for one of the HTTP responses
    (as shown by the load generator) was about 10 times larger than the rest. Why
    was one so much larger than the others? It turned out that a setting on our backend
    SUT was inadvertently changed and it started returning HTTP inquiry results for
    many hundreds of inactive (and unexpected) accounts, as well as the expected active
    ones. Oops. Sanity-checking the average sizes (in bytes) of the various parts
    of your load script is important for finding inefficiencies, so I also mentioned
    this in the chapter on Metrics—there is a nice screenshot there (Figure [3-1](#A449023_1_En_3_Chapter.html#Fig1))
    if you need some detail to get the full picture.


    The moral of the story is that edge cases show up not just in the functionality
    you choose to include in your load script, but also in your system’s data and
    in other places. For example, performance almost always suffers when too much
    logging (like log4j) is turned on, and having so much logging could also be considered
    one of these edge cases. Sometimes the problem is you. You find performance defects,
    you deploy code, and you run some load tests and then run even more load tests
    until you have run the “add widget” use case 100 million times. If these repeated
    load tests make the count of records in the database very unrealistically high,
    then you, the load generator, are the problem. Problems can come from the funniest
    places.


    So, take some time to understand the various types of traffic in your production
    workload. If you are not really sure about the load of each business process,
    how will you know what functionality should be in your load test? For example,
    if fewer than 1% of your account deposit traffic includes more than 10 items (checks,
    cash), it is a waste of time to hammer the system with deposits with thousands
    of checks from that one remaining pizza joint in town that still accepts checks.
    I bet they listen to 8-track tapes, as well.


    There are a few angles here:


    *   Don’t waste time tuning use cases that are seldom used.

    *   Validate that the main use cases in production are also in your load script.
    If you think you know which use cases are there, what data do you have to convince
    others?'
