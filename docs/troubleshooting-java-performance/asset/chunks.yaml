- fmt: '### Load Script Stage 4


    As more tuning happens, the SUT becomes a formidable data-producing beast, and
    repeated load tests INSERT massive amounts of data into SUT tables. Don’t forget
    to keep an eye on growing row counts, for reasons you might not expect:


    - Yes, unrealistically large table counts are bad, but undersized table counts
    are bad, too. If your load test, which lasted 300 seconds, created 10 orders per
    second, there should be some concrete proof somewhere in that database. Shouldn’t
    there be roughly 3000 (300x10) somethings INSERTed, that you can easily verify
    with `SELECT COUNT(*)` queries? As I mentioned earlier, invite skepticism in your
    load scripts, and capture table counts before and after your tests to prove that
    real work has been completed.

    - Make sure table counts do not grow unreasonably large, causing performance to
    degrade unnecessarily. Spend the time to work with business analysts (the ones
    that have the most experience with your customer’s data as well as regulatory
    requirements) and agree on retention requirements and how they impact table counts.
    If your live, primary database must keep ten years of transaction history, calculate
    how many records that translates into.

    - Have a plan for keeping your tables trimmed to the right sizes. When tables
    get unreasonably large, we have generally restored a backup to a known state/size,
    but that takes time/management/discipline to acquire disk space for the backup
    file(s), time to actually create a backup (and keep it up-to-date). Ad-hoc `DELETE`s
    are simpler, but can be very slow because rarely is time spent to get indexes
    for ad-hoc queries in place, plus anything ad-hoc just sounds bad—it seems like
    you are unnecessarily introducing variance and risk. Yes, `TRUNCATE` is faster,
    but we are here to validate performance with realistic table counts. Zero is not
    realistic.


    ### Invite Skepticism


    I’d like to leave you with a small warning: invite skepticism from yourself and
    your coworkers as to whether the load generated by your scripts resembles that
    in production. Perhaps even block out some time on your team’s calendar for a
    “load script skepticism” meeting. Of course this requires a lot of transparency,
    communication, and sharing of performance test data. Let me explain why this is
    important. The propeller on my colorful propeller-head beanie gets all excited
    and spins gleefully when watching a load script exercise the SUT. Look at all
    the load generator threads, like happy, little robots, navigating the pages of
    my big web application! How fun! The outward appearance is impressive. A freshly
    recorded load script, with dozens of captured URLs/parameters, appears to be impressive.
    Watching the script apply load for the first time also appears to be impressive,
    with busy log files and throughput and CPU metrics that really seem to be impressive.


    But do not be fooled. Temper your excitement. Check for errors. Make a skeptical,
    sober assessment of whether all of that “activity” really approximates production-like
    workload. If your load script cranks out individual little results, perhaps a
    row in a database table to represent a single completed internet shopping order
    placed, then enhance your script to validate that final result. Even if free of
    errors and exceptions, your script might still not be returning the right data,
    say account balances for an account inquiry.


    If your application is already in production, perhaps compare some production
    metrics (like hit counts per URL) to those captured during a load test.


    ### Project Lifecycle Hints


    The obstacles to getting started performance testing can be formidable. So many
    things take a lot of time: hardware purchase and setup, installation of the SUT,
    installation of monitoring tools, creation of the JMeter or other load scripts,
    creation of test users for the SUT, enhancing the data in the database to look
    more like production (especially the row counts), and so on. Just typing that
    list wore me out, but bear with me because I can show you some nice opportunities
    that most people miss.


    Unfortunately, most of the previous prep work is required for a thorough performance
    vetting before you usher your SUT into production. But please understand that
    you must not wait for the perfect, unicorn-like performance environment to get
    started tuning. With the traffic of just a single lucky user (you), you can actually
    get started right now finding beefy and meaningful performance defects, ones that
    degrade performance in production. Here is one of those opportunities I mentioned:
    start using the P. and A. items on the P.A.t.h. Checklist (P=Persistence, A=Alien
    systems) in any “no-load” environment you can find, where just a few people are
    leisurely traversing the SUT. So if you are ready to make things faster without
    having to invest time creating load scripts, jump right now to Chapters [9](#A449023_1_En_9_Chapter.html)
    and [10](#A449023_1_En_10_Chapter.html).


    This is the sole reason the P and A are in uppercase in P.A.t.h., and the t.h.
    are in lowercase. The lower case ones are for load testing only—specifically,
    they are of no real use in a no-load environment. When under load, they can help
    tune synchronization, find the exact location of heavy CPU consumers, identify
    inefficient garbage collection, and the list goes on. The uppercase ones are for
    both load and no-load environments. Typographically, the mixed case is not attractive,
    but perhaps it will be a subtle reminder to get started now finding performance
    defects with the P. and the A.


    The overly simplified schedule in Table [4-2](#A449023_1_En_4_Chapter.html#Tab2)
    shows how two developers could both be productive at the same time, working on
    performance. Java Developer 1 gets started tuning right away, while Java Developer
    2 creates the load scripts.


    **Table 4-2.** Rough Sketch of a 9-Day Schedule for the Start of a Performance
    Tuning Project


    | Days | Java Developer 1 / Tasks | Java Developer 2 / Tasks |

    | --- | --- | --- |

    | 1-3 | Explore performance issues with “no-load” using the P. and A. parts of
    the P.A.t.h. checklist | Load Script / V1: record, parameterize and test it. |

    | 4-6 | Load Script / V2: record, parameterize, and test it. | Load Script / V1:
    apply load with it, locate defects using P.A.t.h. checklist. |

    | 7-9 | Load Script / V1: apply load with it, locate defects using P.A.t.h. checklist.
    | Fix and deploy performance defects. |


    ### Don’t Forget


    The rationale for deciding which script enhancements get first priority and which
    get second is pretty straightforward. Because there is neither time nor money
    to performance test and tune all business processes, performance problems will
    happen in production, even if you do everything “right.” As a fall-back position,
    you should therefore first aim to tune the overall architecture, so that the dozen
    or so business processes that do get a thorough performance vetting become blueprints
    of how to write a component that both functions and performs.


    Many ask whether tuning during development is even worth it, considering that
    the code base will have to be performance tested again after more code changes.
    I agree this is a small problem. A much more important question is ask, though,
    is whether our current architecture will crash and burn under the projected load
    in production. That’s the often-forgotten question I want answered, and the “First
    Priority” script in the chapter is exactly the tool you need to answer it.


    Furthermore, fixing one architecture-wide defect affects most business processes,
    which helps to maximize the performance impact of your fixes. The other side of
    the coin is, of course, that some script enhancements that are second priority
    might be necessary to stabilize the performance functionally critical business
    processes. You will have to use your own judgment here. Perhaps your most critical
    business processes deserve both first and second priority enhancements at the
    outset.'
