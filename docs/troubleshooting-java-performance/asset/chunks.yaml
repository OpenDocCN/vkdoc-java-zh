    The chapters in Part III are about performance troubleshooting. They detail the
    tools and techniques used to identify the root causes of Java server-side performance
    issues.


    Chapter [8](#A449023_1_En_8_Chapter.html) provides the overview to that P.A.t.h.
    Checklist and provides an architectural overview of the two sample applications
    that you can run on your own machine. Downloadable from `github.com`, these sample
    applications provide a hands-on experience for collecting the right performance
    data and locating the root cause of the problem.


    The items in the P.A.t.h. Checklist were described above so I won’t repeat the
    descriptions, but here are the chapters for each one:


