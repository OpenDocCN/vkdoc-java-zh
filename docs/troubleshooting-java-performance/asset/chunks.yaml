  trans: "\n## 主要反模式 #4：大型处理挑战\n\n这种反模式描述了 I/O 和其他硬件限制所导致的重大性能挑战，例如在数十亿行数据中进行查找，或通过极慢的网络反复传输数兆字节的数据。企业级软件开发中很少遇到这类大型、棘手的挑战。但当你确实遇到时，我建议在设计和测试上投入更多精力，保持敬畏之心，并带有一丝谨慎。优化其他所有事情几乎都是小菜一碟。\n\
    \n“大型处理挑战”是四个主要反模式中的最后一个。正如我所提到的，反模式 1 出现得最频繁，而反模式 4 出现得最少。如果你身处技术前沿，不断尝试新事物，并且经常遇到这些大型挑战，那么你可以将自己视为例外。恭喜你。但对于我们这些编写企业级\
    \ Web 应用程序的其他人来说，很少有能引发这种恐惧感的大型处理挑战。以下是这些大型挑战的几个例子：\n\n*   在一个包含 2 亿条记录的表中仅查找几条记录。\n\
    *   在慢速网络上（尤其是长距离）反复传输大量数据（例如超过 1 兆字节）。\n*   多线程性能很难做到完美，但有许多现成的 API 和解决方案，其中别人已经实现了良好的性能。\n\
    \n你如何判断哪些处理挑战是“大型”的？这类挑战如此巨大，以至于它们会无视以下因素而出现：\n\n*   语言（Java、C#、C++……）\n*   操作系统\n\
    *   API 的选择（例如用于 XML 解析的 StAX 与 SAX）\n*   代码访问 API 所使用的惯用方式，例如用于 XSLT 转换的 Xalan\
    \ 与 Saxon\n\n为这些大型挑战做准备需要付出巨大的努力，以至于准备工作似乎应该在创建设计文档时就开始了。如果你真的担心某个大型处理挑战，请尽早投入时间在项目中测试其可行性；也许硬件专家可以在此提供帮助。\n\
    \n开发人员常常会将偶然的数据激增误认为是大型处理挑战。例如，当查询过去 2 年的数据就能表现良好，并且业务方也乐于只保留一年的数据时，何必忍受查询过去 10\
    \ 年历史数据所带来的缓慢响应呢？\n\n本书中介绍的故障排除技术无疑能够识别出大型处理挑战（无论是真实的还是想象中的）所导致的性能问题。然而，我必须承认，为大型挑战创建解决方案超出了本书的范围，主要是因为这类真正的问题很少见。\n\
    \n### 评估处理挑战的规模\n\n大型处理挑战（主要反模式 4）会出现在某种突出显示性能问题的性能雷达上，这完全合情合理，尤其是在对在线 Java 服务器端系统（本书的主要主题）进行故障排除时。\n\
    \n由于解决此类大型处理挑战需要付出艰苦努力，开发团队应预见到额外的工作量，并在排期中提高性能调优工作的优先级。然而，当较小的性能挑战出现在性能雷达上时，它们会干扰其他优先事项，例如调优大型性能挑战。它们还会从开发生命周期的其他部分（设计、开发、QA\
    \ 等）窃取时间。\n\n调优小型性能挑战本质上是一种麻烦；根据我的经验，小型性能挑战中的性能下降在所有性能缺陷中占据了出乎意料的大比例。\n\n因此，在查看任何可能表明性能下降的数据时，请执行以下操作：\n\
    \n*   在心中粗略评估当前的处理是大型、中型还是小型挑战。\n\n这里有一个重要提示，可以帮助你找到需要调优的小型挑战：通常，当任务需要编写类似 SOA\
    \ 服务或 Web 请求的代码时，会有一个主要任务需要处理。例如，必须下单；必须返回查询结果；必须开始关店。几乎可以定义地说，在“主要任务”之前或之后发生的处理是一个小型挑战，任何相应的性能下降都是需要消除的麻烦。同样，所谓的“横切关注点”，如日志记录、审计、安全甚至监控本身，都可能是小型处理挑战的候选对象。\n\
    \n此外：\n\n*   当一个看起来缓慢的小型处理挑战涉及一个公开可用的 API 时，该 API 的用户社区极有可能已经遇到过类似的性能下降问题，你可以从中学习。\n\
    \n花点时间去寻找这些性能经验——在文档页面、互联网搜索等任何地方。只需在你的搜索条件中将“performance”这个词附加到 API 名称后面，然后进行搜索。在用户论坛中提问。另外，当我说“公开可用的\
    \ API”时，当然，任何来自 github.com 和 mvnrepository.com 的内容都属于这一类。在我十年的调优经验中，我见过大量的性能缺陷，而互联网上的好人似乎总是能抢先一步。当处理挑战的规模很小且使用的\
    \ API 是公开可用时，其他人已经记录了这些问题并发现了合理的解决方法。\n\n## 使用主要性能反模式\n\n以下是关于如何应用这些反模式的逐步说明。\n\
    \n1.  首先，使用 P.A.t.h. 清单收集数据，该清单从第 8 章开始。在所有 P.A.t.h. 数据中，选择看起来问题最大的测量/结果，修复它将对性能产生最积极的影响。\
    \  \n2.  询问这个“问题最大”的测量结果是否看起来像主要反模式 1。\n    *   它是否涉及静态数据，或者至少不涉及动态数据？\n    *\
    \   静态数据是否针对每个系统请求都重新处理？\n    *   每次重新处理静态数据时，是否涉及少量的 I/O？\n    *   ……等等\n3. \
    \ 如果数据似乎符合主要反模式 1，那么恭喜你，你已经为问题建立了一个不错的假设。要测试这个假设，请对你的系统应用一个修复，然后重新测试并重新评估性能。这就是为性能缺陷“构建案例”的方法。\
    \  \n4.  如果“问题最大”的测量数据似乎不符合反模式 1，那么继续评估主要反模式 2。  \n5.  继续评估所有四个主要反模式。它们一个都不符合的可能性极低。\n"
- fmt: '# Don’t Forget


    A large portion of today’s server-side performance problems are generally caused
    by a handful of trivially small processing tasks whose performance could and should
    be good, but in actuality is not. These “trivially small processing tasks” mostly
    show up in Main Performance Anti-Patterns 1 and 2, “Unnecessary Initialization”
    and “Inefficient Algorithm/Strategy.” Actually, anti-pattern 1 is a special case
    of 2.


    Keep in mind that an inefficient algorithm is a lot easier to refactor or replace
    than a strategy, whose details are scattered throughout the code base. The most
    typical example is a really chatty database strategy that executes dozens of SQL
    statements for each request: it performs poorly and is very costly to refactor.


    Although seen less frequently, the other two Main Performance Anti-Patterns (3
    and 4) are “Overprocessing” and “Large Processing Challenge.” Large processing
    challenges should be identified (and feared) in design. As you start to find parts
    of the system that might be slow, don’t forget to ask whether “overprocessing”
    is the cause. This is when you apply unrealistically large amounts of load to
    an infrequently used business process, or when your code casts a wide net and
    processes a large amount of data, only to discard a large portion of it.


    Throughout the rest of this book, we will continually refer back to these Main
    Performance Anti-Patterns as a quick way to communicate and understand the root
    of cause of the various problems that really drag down server-side Java performance.


    # What’s Next


    Having trouble finding the right environment to performance test in? The next
    chapter is just for you. The code examples that come with this book (not discussed
    in detail until Chapter [8](#A449023_1_En_8_Chapter.html)) demonstrate more than
    a dozen very commonly found write-once-run-anywhere (WORA) performance problems.
    Chapter [2](#A449023_1_En_2_Chapter.html), coming up next, will show you how to
    create an inexpensive, modest-sized tuning environment where you can get started
    right away finding these and other performance defects, ones that would likely
    cause problems in production.


    # 2. A Modest-sized Tuning Environment


    This chapter shows how you can spend less time tuning in a larger performance
    environment by first tuning in a modest-sized, smaller environment. In this smaller
    environment, you can complete more fix-test cycles per day, which greatly accelerates
    the overall tuning process.


    The objectives of this chapter are:


    - Learn how to design load tests that will run in a very small computing environment
    (like your desktop), effectively turning it into an economical performance tuning
    lab.

    - Learn how to graph CPU/RAM consumption of individual processes over time.

    - Learn how to replace back-end systems with a stub server that returns prerecorded
    responses.


    Scheduling the performance-tuning phase of a project in the rough vicinity of
    a code freeze is a bad idea, but that is precisely where we schedule it. The code
    freezers say, “No more changes” and the tuners reply back, grunting “must fix
    code.” The argument ends in a slap fight outside on the playground next to the
    slide. This is productivity, SDLC-style. Even after witnessing this entire kerfuffle,
    management can’t seem to figure out why system performance ends up being so awful.
    The perennial conflict between “code freeze” and “code change” goes unnoticed,
    again.


    This chapter explores a set of techniques that will enable you to use a small,
    developer tuning environment to boost performance early and throughout the SDLC.
    A final performance vetting in a large, production-like environment will likely
    still be required, but the early vetting will keep it from devolving into a more
    traditional, angst-ridden rush-job crammed into the closing moments before production.


    ## Rapid Tuning


    Many will rightfully object that a small tuning environment with just a few CPUs
    is too small to meet final performance goals for a high-throughput system. That
    is a fair objection. But reaching maximum throughput is not the immediate goal.
    Instead, the small environment provides an easy-to-access and easy-to-monitor
    system where we can complete many fix-test cycles, perhaps as many as 10 a day.


    In a single fix-cycle, you run a load test for a few minutes, use monitoring tools
    to identify the biggest performance issue, code and deploy a code fix, validate
    the improvement, and then repeat.


    Traditionally, after the code is finished and Quality Assurance has tested all
    the code, performance testing is tightly crammed into the schedule right before
    production. This is particularly challenging for a number reasons. First, there
    is so little time to create the expensive, large computing environment that most
    feel is required for tuning. Second, for stability’s sake, it makes sense to institute
    a code freeze as production draws near. However, the culture of the code freeze
    makes it particularly difficult for performance engineers to test and deploy the
    changes required to make the system perform. Lastly, there is little time to retreat
    from poorly performing technical approaches that were tightly baked into the product
    from day 1. This is a last minute rush-job.


    To contrast, this “rapid tuning” approach helps keep tuning from consuming your
    budget and helps avoid a last-minute performance rush-job. With the bulk of the
    performance defects addressed early on, demonstrating the full throughput goal
    in the full environment is a smaller, more manageable task.'
