  trans: '

    ## 运行示例


    由于性能问题可能以多种方式出现，P.A.t.h 系统将问题分解为四个更易于理解的类别。其组织方式有助于把握这个庞大的性能问题领域。本书附带的大多数在线示例仅突出四个领域之一中的一个性能问题。一次只关注一个问题的简单性，对于集中精力解决那些经常未被发现的性能问题以及用于检测这些问题的工具非常有帮助。


    本书附带两个不同的 github.com 项目。第一个我将其称为 jpt，代表 Java 性能故障排除。它附带大约 12 对示例。在每一对中，其中一个存在性能问题，而另一个则没有——我已经为您修复了它。这两个测试分别标记为
    a 测试和 b 测试。第 2 章的表 2-1 列出了全部 12 对测试。


    然而，我为您修复这些问题，并且一次只训练您关注一个问题——这有点不切实际。更不切实际的是，我提前告诉您问题是 P、A、t 还是 h 问题。如果我告诉您某个特定测试是
    P 问题，那么您就知道要连接我为类似 P 问题规定的监控/可观测性工具。这非常直接，但不现实。在现实世界中，问题通常一开始只是表现为糟糕/缓慢，而发现问题潜伏在四个领域中的哪一个，是您的责任。


    这意味着您通常必须使用 P.A.t.h. 清单中所有四个项目的工具来全面了解情况，我试图在测试 09a 中模拟这种情况。这是一个许多问题混合在一起的示例。没有测试
    09b。


    ## Java 性能故障排除 (jpt) 示例应用


    有一些小型脚本用于启动应用程序的各个部分。按照惯例，每当我提到以 .sh 结尾的 Bash 脚本时，您都会找到相应的以 .cmd 结尾的 MS-Windows
    脚本（位于同一文件夹中）。


    图 8-1 展示了 jpt 应用程序的粗略架构。


    ![A449023_1_En_8_Fig1_HTML.gif](img/A449023_1_En_8_Fig1_HTML.gif)


    图 8-1.


    jpt 示例的架构。三角形表示必须从三个独立的终端窗口启动的三个脚本。前两个脚本之后的参数表明这是测试 01a。


    下载和说明可在此处获取：


    [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)


    下面包含了安装和运行示例的概述。如果您遇到任何问题，请务必查阅文档的在线版本。


    表 8-1 显示运行一个 jpt 测试需要三个脚本。在运行任何测试之前，必须先执行 init.sh 脚本。它会创建一个 H2 数据库并用超过 200 万行数据填充它。在我的
    2012 款 MacBook 上，init.sh 脚本需要运行 10 到 15 分钟。您可以重新运行 init.sh 脚本，它将从头开始重新创建数据库。


    表 8-1.


    运行每个 Jpt 示例需要三个终端窗口（也称为命令提示符）。


    | 1 | `# cd db` `# db/startDb.sh` | 启动 H2 数据库 |

    | 2 | `# ./startWar.sh 01a` | 启动 Web 应用程序。注意 01a 参数用于运行测试 01a 的 Web 服务器配置。请注意，上面描述的
    glowroot 和 wiremock 都随此脚本启动。 |

    | 3 | `# ./load.sh` `01a` | 从命令行启动 JMeter。注意 01a 参数用于运行负载测试 01a。 |


    此表显示了运行示例 01a 所需的命令。必须按指定顺序启动这些命令。应使用 Ctrl+C 停止每个命令。在运行这些命令之前，init.sh 脚本必须仅运行一次。


    以下是启动测试的一些注意事项。


    请注意，在运行 `.startWar.sh` 之后，您应该等待看到此 `startWar.sh` 消息后再启动 `./load.sh`：


    ```

    Started PerformanceSandboxApp in 11.692 seconds (JVM running for 19.683)

    ```


    要停止运行一个测试并开始运行另一个不同的测试，请使用 Ctrl+C 停止 `./startWar.sh` 和 `load.sh` 脚本。然后使用所需的测试
    ID 重新启动相同的脚本。`startDb.sh` 脚本可以根据需要保持运行状态。


    您将使用表 8-2 中的端口号来帮助您在 jpt 示例中进行性能故障排除。


