    ### 第二个问题：对静态数据的未缓存 SELECT 查询


    测试结果：


    *   测试 03a：每分钟 14,000 个请求

    *   测试 07b：每分钟 10,400 个请求


    你需要关注的指标：


    *   每条 SQL 语句的总耗时和执行次数。

    *   提供这些数据的几个工具：Glowroot、JavaMelody、JDBC Performance Logger


    负载测试 03b 比负载测试 03a 慢得多，但原因何在？要了解更多信息，请查看图 9-7 中 03b 的 Glowroot 查询页面。


    ![A449023_1_En_9_Fig7_HTML.jpg](img/A449023_1_En_9_Fig7_HTML.jpg)


    图 9-7.


    测试 03b 的 Glowroot 查询面板


    与测试 07 中的 SELECT N+1 问题一样，在“每次执行时间”列中并没有像测试 05（缺少索引）中那样明显的性能下降。5.1 毫秒、0.18 毫秒和
    3.1 毫秒的响应时间与未索引查询的 358.5 毫秒相比都非常快。这意味着 DBA 们完成了他们的工作，单个查询没有问题——这是问题的第一个头。


    表面上看，这与 SELECT N+1 非常相似，但有一个关键区别——之前示例中的 ACCOUNTS 和 HISTORY 表保存的是可能随时变化的实时数据，而
    BRANCHES 表则不是。理论上，该表保存的是静态数据，变化频率低于每天一次——很可能低于每周一次。以下是分支表可能包含的数据类型：分支名称、街道地址、城市、州、邮政编码等。由于这些数据极少变化，将其缓存在
    RAM 中可以显著提升性能。


    我能理解对使用缓存犹豫不决的合理原因，因为使用缓存中略微过时的数据可能会引发问题。假设需要立即将一名心怀不满的员工锁定在系统之外。你肯定不希望过时的用户权限缓存错误地允许其进入。但我们可以两全其美。我们可以使用缓存来提高这些用户权限的性能，同时在需要确保缓存数据最新时，按需驱逐这些缓存。以下链接展示了一个示例：


    [`http://blog.trifork.com/2015/02/09/active-cache-eviction-with-ehcache-and-spring-framework/`](http://blog.trifork.com/2015/02/09/active-cache-eviction-with-ehcache-and-spring-framework/)


    为了避免过多的执行次数，快速测试（a 测试）中的分支查找代码只是偶尔承担一次数据库往返的开销——仅仅是偶尔。其余时间，它从内存中一个类似哈希表的单例——缓存——中获取结果，该缓存由
    [`http://www.ehcache.org/`](http://www.ehcache.org/) 提供。


    在位于 [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)
    的 jpt 仓库中，查找以下配置文件：


    ```

    warProject/src/main/resources/ehcache.xml.

    ```


    该文件控制缓存被清空（即驱逐）的频率，从而偶尔强制你的代码通过一次完整的数据库往返来获取最新结果。相比之下，慢速测试中的代码为每一个请求都承担了数据库往返的开销。花点时间查看
    jpt 仓库中此包内代码的慢速和快速版本：


    ```

    com.github.eostermueller.perfSandbox.cache

    ```


    来自 03a 测试的图 9-8 展示了实际效果。现在缓存已经就位，看看与其他三个查询相比，对 BRANCHES 表的查询数量是多么少？2 分钟内仅有 25
    次，而其他查询的调用次数约为 35,000 次。


    ![A449023_1_En_9_Fig8_HTML.jpg](img/A449023_1_En_9_Fig8_HTML.jpg)


    图 9-8.


    EHCache 已将 BRANCH 表的查询次数降至最低。看，2 分钟内仅 25 次！


    我能理解你可能会认为，在这些示例中吞吐量如此之高，以至于任何经验教训都不适用于较小的负载。这几乎算是一个合理的批评；我认为我示例中人为加快的查询响应时间弥补了这一点。在生产环境中，面对更真实、更慢的数据库查询，本章中强调的所有问题都会严重得多。


    ## JPA 和 Hibernate


    JPA（Java 持久化 API 标准）以及像 Hibernate (hibernate.org) 和 MyBatis (mybatis.org) 这样广泛使用的实现，如今已普遍使用。JDBC
    仍在底层执行，但 JDBC 的细节以及将 ResultSet 数据移动到 Java 对象中的繁琐工作已大大简化。


    JPA 超出了这本小书的讨论范围。如果你想了解更多关于 JPA 性能的信息，可以考虑 Vlad Mihalcea 在 2016 年出版的《High Performance
    Java Persistence》（自出版）。


    但一个简短的建议可能会有所帮助：


    *   花时间确保你的 JPA 代码遵守 Martin Fowler 的规则：“对于单个服务端请求，永远不要对同一张表执行重复查询。”


    JPA 提供了一种非常有用的方式，可以在大型代码库中应用通用的 JDBC 访问方法。这是一件好事。然而，我通常发现使用 JPA 的开发人员与底层执行的 SQL
    查询的大小、形状和数量过于脱节，导致性能受损。Hibernate 非常容易扩散 SELECT N+1 反模式；请务必在下次代码审查中将其标记为问题——或许可以使用
    glowroot.org。


    以下文章将帮助你做到这一点，特别是关于避免 Hibernate 的“Batch-size=N”获取策略的部分。


    [`https://www.mkyong.com/hibernate/hibernate-fetching-strategies-examples/`](https://www.mkyong.com/hibernate/hibernate-fetching-strategies-examples/)


    ## 别忘了


    从高层次来看，似乎缺乏像 Glowroot 这样优秀且免费的 SQL 性能工具，导致“数据库调用过多”这个问题一直未被解决——这就是为什么它是持久化恶龙的第二个头，而
    Java 开发者似乎总是忽略它。即使是非常快速的查询，如果你的代码执行次数过多，也会拖累性能。


    还有其他有前途的开源工具可用，例如 Glowroot.org，它们提供类似的 JDBC 指标：


    [`https://github.com/sylvainlaurent/JDBC-Performance-Logger`](https://github.com/sylvainlaurent/JDBC-Performance-Logger)


    [`https://github.com/javamelody/javamelody/wiki`](https://github.com/javamelody/javamelody/wiki)


    [`http://www.stagemonitor.org/`](http://www.stagemonitor.org/)


    十多年来，我们一直在编写“话痨式”的代码。或许这些更成熟的监控选项带来的新可见性，将使实现性能显著更好的“粗粒度”数据库访问策略变得更加容易。当一个应用程序长期存在数据库调用过多的问题时，改变这种文化真的很难。在项目早期就设定良好的标准似乎是一个有希望的开端。在没有良好指标的情况下试图保持低
    SQL 计数似乎是不可能的。努力让团队广泛采用一个好的 SQL 指标工具。


    值得再次提及的是，“粗粒度”与“话痨式”测试的结果存在偏差，因为我的数据库速度极快。在现实世界中，“话痨式”策略加上糟糕的单个查询响应时间，是一场即将发生的完美风暴。


    ## 下一步


    本章涵盖了 P.A.t.h. 检查清单中的第一项。第 10 章将探讨如何排查你的 JVM 所连接的所有后端系统（称为外部系统）的性能问题。其中讨论了一个几乎所有系统都需要的优化——本章通过一个很好的测试展示了它能带来多大的好处，但也强调了在实施此优化时经常被忽视的重要安全问题：数据压缩。

    '
- fmt: '# 10. Alien Systems, the “A” in P.A.t.h.


    I generally start performance troubleshooting by walking through the P.A.t.h.
    Checklist for a single JVM. If there are no obvious issues, then I will move on
    to an “Alien” system—one connected to the first JVM. With a more sophisticated
    toolset, like an Application Performance Monitoring solution, data from multiple
    systems collects in a single location and application, making the process a lot
    easier, although licensing can get pretty expensive.


    The objectives for this chapter are:


    * Learn how to use a thread dump to detect slow network transmissions and which
    Java code invokes them.

    * Understand how compression dramatically speeds up transmissions over ‘slow’
    network connections, but must be carefully implemented to avoid creating some
    very specific security vulnerabilities.

    * Learn how to use Wireshark to inspect the payload of a transmission to see whether
    it is “clear text”, which is one indicator that compression will help.


    With the exception of glowroot.org, the basic tools in this book (`jstack`, `jstat`,
    `jcmd`, and so on) provide visibility into slow or inefficient activity in a single
    JVM. The easiest way to use these tools is to sign on to the machine running the
    JVM you want to observer. The RMI server `jstatd` (https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstatd.html)
    can be used to enable remote access for many of these tools.


    The point of this small chapter is to remind you to assess performance of all
    the components in a system, whether they are strung together serially, one calling
    the next, or lined up behind a load balancer as identical, parallel nodes in a
    cluster.


    ## Lowering Response Time over Long Distances


    One of the first things I do when assessing a system I’m not familiar with is
    to check to see whether compression is enabled for connections between data centers
    or over a leased line or the Internet. I have run some tests with and without
    compression to make this advice a little more compelling.


    ### Compression Makes Things Go Faster


    Tests 10a and 10b were both run with the configuration shown in Figure 10-1. Note
    that there is about 1700 miles between the JMeter load generator in Little Rock,
    AR and the jpt example application deployed in Portland, OR. Both tests contain
    six different HTTP requests with different response sizes: 20K, 60K, 100K, 200K,
    600K, and 1MB. By default, the jpt server returns a compressed response, but only
    if the HTTP request specifies the `"Accept-Encoding: gzip"` HTTP Header parameter.
    I configured the 10a test to include this header, but the 10b test did not. My
    goal was to see the speed benefit in the 10a test using compression.


    ![A449023_1_En_10_Fig1_HTML.gif](A449023_1_En_10_Fig1_HTML.gif)


    Figure 10-1. JMeter and the littleMock application were separated by about 1700
    miles. The tests compared results of compressed and uncompressed payloads returning
    from the littleMock server which was running Tomcat under Spring Boot.


    To see exactly how much of a benefit you are passing up by not using compression,
    I installed the Java Performance Troubleshooting (JPT) examples on an Amazon Lightsail
    Linux box located in the far Northwest corner of the United States: in the state
    of Oregon. I ran the JPT `init.sh` to install and then reconfigured the app (in
    the `application.properties`) to take traffic from the outside world on port 443,
    instead of the default 8675. I then used Lightsail to expose that port over the
    Internet and started test 01a like this:


    ```

    db/startDb.sh

    ```


    in one window and


    ```

    ./startWar.sh 01a

    ```


    in a separate terminal window. Then, from roughly 1,700 miles away in Little Rock,
    Arkansas, I changed both `src/test/jmeter/10a.jmx` and `10b.jmx` to point to the
    IP address of the AWS Lightsail machine. I did this by changing the value of the
    `HOST` JMeter script variable. I then ran JMeter with `10a.jmx` for several minutes.
    I stopped the test and then ran `10b.jmx` for about the same time. The response
    time results of these two tests are graphed in Figure 10-2, with 10a in red and
    10b in blue. The 10a/red test had compression enabled.


    ![A449023_1_En_10_Fig2_HTML.gif](A449023_1_En_10_Fig2_HTML.gif)


    Figure 10-2. The red bars (Test 10a) are dramatically lower than the blue bars
    (Test 10b), showing how much faster network requests are when compressed. The
    larger the payload (right most bars), the bigger the benefit. The sizes on the
    horizontal axis labels (like ∼20KB_002_ACCTS) are the blue/uncompressed sizes.


    When HTTPS responses are about 200K, compressing that response speeds up the request
    by 1500ms (2273ms in red is almost 1500ms faster than 3721 in blue). That’s a
    serious improvement. I used the following URL parameter (values 2, 6, 10, 20,
    60, 100) to increase the size of the HTTP response for the tests with and without
    compression.


    `https://my_aws_server.com/randomInquiry?numAccounts=100`


    It was a lucky coincidence that each account produced about 10K of response data
    (uncompressed), making it easier to remember the sizes. For example, with two
    accounts: 2x10k=20k of data, 100 accounts, 100x10k=1mb of response data.


    Here are the required Spring changes to enable compression in `application.properties`:


    ```

    server.compression.mime-types=application/xml

    server.compression.enabled=true

    ```


    Additionally, your HTTP request must have the header `Accept-Encoding: gzip`,
    and only JMeter script `10a.jmx` included this HTTP header.


    ### Security Warning for Compression with HTTPS


    But before you get all excited about these results (as I did), you must acquaint
    yourself with the security concerns of using HTTPS and compression together (my
    exact configuration).


    Without the right implementation, combining HTTPS and compression can enable hackers
    to view private data (like credit card numbers) that your users type into your
    web page.


    I am not a security expert, so you will have to educate yourself on the risks,
    with the two types of vulnerabilities called Crime and Breach. Here are a few
    links to get your research started. It pains me to actually type these words,
    but security is probably a bit more important than performance. But don’t fear,
    security folks have recommended ways of getting around these attacks so we can
    keep our compression! Read on.


    * http://breachattack.com/#mitigations

    * http://www.infoworld.com/article/2611658/data-security/how-to-defend-your-web-apps-against-the-new-breach-attack.html

    * https://blog.qualys.com/ssllabs/2013/08/07/defending-against-the-breach-attack'
