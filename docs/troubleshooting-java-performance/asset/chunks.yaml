    #### 优化年轻代 GC


    清单 12-3 和 12-4 展示了调优前后的 `gctime` GC 指标。调优前，年轻代 GC 健康状态为黄色，因为 dYGCT（左列）的开销为 4%-5%。调优后，年轻代
    GC 健康状态变为绿色，GC 开销约为 1%。（输出来自 `gctime.sh`。）


    ```

    dYGCT  dFGCT

    -----  -----

    0.047  0.000

    0.052  0.000

    0.054  0.000

    0.047  0.000

    0.052  0.000

    0.042  0.000

    0.043  0.000

    0.054  0.000

    0.07   0.000

    0.048  0.000

    清单 12-3.

    来自 gctime.sh 的数据。调优前的 GC 指标

    ```


    ```

    dYGCT  dFGCT

    -----  -----

    0.010  0.000

    0.005  0.000

    0.011  0.000

    0.006  0.000

    0.010  0.000

    0.012  0.000

    0.005  0.000

    0.012  0.000

    0.005  0.000

    0.009  0.000

    清单 12-4.

    来自 gctime.sh 的数据。调优后的 GC 指标

    ```


    清单 12-3（其中新 GC 健康状态为黄色）是通过使用一个模拟了基本无状态活动（几乎没有或完全没有长期缓存）的 littleMock 测试键捕获的。该场景基本上是一个没有会话管理的
    SOA 系统。请注意，B65535 表示每次请求期间有 64K 次分配，这些分配在每次请求后被丢弃——这无疑是年轻代收集过程的工作。以下是所使用的性能键：


    ```

    X2,J25,K25,L0,Q,R,S,A10,B65535,C0,D10

    ```


    `NewSize` 和 `MaxNewSize` 的值最初都设为 512MB。将它们都提升到 750MB 后，4%–5% 的开销降到了 3.5%（未显示）。进一步将新生代空间增加到
    1.5GB 后，新 GC 开销降至略低于 2%，GC 健康状态正式变为绿色（也未显示）。但只是为了好玩，我将新生代空间一路增加到 3GB（清单 12-5），从而将开销降低到
    1%，如清单 12-4 所示。所有这些配置的老年代空间均为 512MB。


    ```

    -Xmx3g -XX:NewSize=2500m -XX:MaxNewSize=2500m -XX:+UseConcMarkSweepGC -XX:ConcGCThreads
    =4

    清单 12-5.

    产生清单 12-4 中改进结果的 GC 设置

    ```


    #### 优化老年代 GC


    接下来的场景从老年代 GC 健康状态为红色开始。它模拟了一个约 500 MB 的大型缓存，该缓存未设计为过期——就像将 500MB 塞入一个单例中，但无意中未在
    JVM 参数中为其分配足够的老年代空间。具有类似内存配置的场景是内存泄漏非常缓慢。请注意，在清单 12-6 中，dFGCT（右列）的开销大于 100%。`jstat`，这怎么可能？然后，在清单
    12-7 中，清单 12-6 中异常高的 dFGCT 指标降为了零，仅需向老年代添加 256MB。


    ```

    dYGCT  dFGCT

    -----  -----

    0.000  0.000

    0.000  1.413

    0.000  0.000

    0.000  1.932

    0.000  0.000

    0.004  1.604

    0.014  0.034

    0.050  0.034

    0.000  1.758

    0.000  0.000

    清单 12-6.

    来自 gctime.sh 的数据。调优前：老年代 GC 健康状态为红色

    ```


    ```

    dYGCT  dFGCT

    -----  -----

    0.010  0.000

    0.008  0.000

    0.010  0.000

    0.009  0.000

    0.010  0.000

    0.009  0.000

    0.010  0.000

    0.008  0.000

    0.010  0.000

    0.008  0.000

    清单 12-7.

    来自 gctime.sh 的数据。调优后：健康状态为绿色

    ```


    清单 12-6 中的数据是通过首先运行一个测试键捕获的，该测试键添加了在很长时间内（一小时，超过了我小测试的持续时间）不会过期的垃圾。C 和 D 参数设置了保留对象的时间长度——我将其设置为超过一小时（一小时为
    3600 秒，再加上三个零转换为毫秒，得到 C3600000 和 D3600001）。


    为了像前面描述的那样填满 512MB 的老年代空间，littleMock 使用以下性能键运行了几分钟：


    ```

    X2,J25,K25,L0,Q,R,S,A4096,B100,C3600000,D3600001

    ```


    在运行此键时，我密切观察 Glowroot 的 JVM Gauge 功能（图 12-1），以确定堆的老年代部分何时被填满。


    ![A449023_1_En_12_Fig1_HTML.jpg](img/A449023_1_En_12_Fig1_HTML.jpg)


    图 12-1.


    Glowroot 的 Gauges 部分显示了 CMS 老年代已使用的字节数。这里我们创建了约 500 MB 来模拟某个东西的内存缓存及其对 GC 的影响。此图显示我的老年代大于
    512MB。这并不十分相关，但我仍然想知道这是怎么发生的。


    当老年代达到约 500MB 时（图 12-1 中晚上 10:49 到 10:50 之间），我应用了 A0 设置（图 12-2），可能就在可怜的 littleMock
    开始抛出内存不足错误之前。


    ![A449023_1_En_12_Fig2_HTML.jpg](img/A449023_1_En_12_Fig2_HTML.jpg)


    图 12-2.


    littleMock 的 A0=0 设置，用于关闭额外垃圾收集


    一旦应用了 A0=0，并且不断上升的 GC 立即并突然趋于平稳，我捕获了清单 12-6 中的开销指标，这些指标异常高，开销超过 100%。亲爱的 `jstat`，一秒钟的持续时间（在命令行中指定）怎么可能包含超过一秒的老年代活动，比如清单
    12-6 中 dFGCT 列的 1.x 数字？我想，知道这些数字很糟糕并且需要改进就足够了。


    最终，在 littleMock 的 `pom.xml` 中，我向老年代添加了 256MB，重新启动了 littleMock，小心地将大约 500MB 的缓存放回原位，并使用
    A0 关闭了额外垃圾收集，使堆达到稳定状态。来自 `gctime.sh` 的异常高指标降为了零，因此老年代获得了绿色 GC 健康状态；详情请参见清单 12-7。


    这里的一个教训是，要再三检查你的老年代是否有足够的空间来处理你的大分配，比如这个 500MB 的缓存。如果你是房间里最后一个发现身后座位上坐着一头大象的人，难道不会感到有点尴尬吗？这是同样的事情。还要记住，当可用堆空间缩小时，性能会下降。

