    calls inside a sync block.


    There is nothing wrong with having the synchronization in your code. The problem
    is when multiple threads try to access the block at the same time, and the JVM
    has to make other threads wait while the owner of the lock executes. This is when
    the BLOCKED thread shows up, and when it happens it is called a contended sync
    block.


    Also, I have yet to mention there are a number of GUI tools designed to visualize
    and highlight multi-threading problems. Jack Shirazi wrote the first great Java
    performance book, Java Performance Tuning (O’Reilly,), and this link to his website
    contains a list to a number of programs the help you visualize thread dumps. Personally,
    I like the IBM Thread Dump Analyzer and ThreadLogic, which lets you configure
    the tool with patterns of text that should raise red flags or concern. You’ll
    find it at


    [`http://www.fasterj.com/tools/threadanalysers.shtml`](http://www.fasterj.com/tools/threadanalysers.shtml)


    To repeat myself a little bit, this little section has some helpful but still
    garden-variety thoughts on synchronization. The next section starts with some
    basics—it shows how threads created in some simple code actually look inside a
    thread dump. Then, I talk about navigating thread dumps. This doesn’t sound earth-shattering,
    but it is really key to understanding what code is running and who called it and
    why.


    After that, we will get into the more controversial part, where we use thread
    dumps very much like we use a Java profiler . To fully understand what’s going
    on here, you really need to run the examples on your own machine; just reading
    this chapter is not enough. Be sure to start up the littleMock application for
    the section “Interactive Thread Dump Reading Exercise.” The littleMock sample
    application will be used, and it just takes a few minutes to download, install
    and launch.


    ## Threads and Thread Dumps


    Listing [11-1](#A449023_1_En_11_Chapter.html#Par19) is a very simple program that
    launches three threads that each sleep for 1 minute, before quitting. Let’s run
    it and capture a thread dump so we can see one stack trace for each thread.


    Note that at start-up time, this program calls `java.lang.Thead#setName()`, thereby
    giving each thread a name used to identify each thread in the actual thread dump.
    The names here start with the prefix `jpt`-. We will talk about why this name
    is so important in a little bit.


    ```

    package com.jpt;

    public class MyThreadStarter {

    public static void main( String[] args ) {

    new MyThread("jpt-first" ).start();

    new MyThread("jpt-second" ).start();

    new MyThread("jpt-third" ).start();

    }

    }

    class MyThread extends Thread {

    public MyThread(String name) {

    setName(name);

    }

    private void mySleep() {

    try { Thread.sleep(60000); } catch(Exception e) {}

    }

    public void run() {

    mySleep();

    }

    }

    Listing 11-1.

    A Java Program That Starts Three Named Threads, Which We Will Look for in a Thread
    Dump

    ```


