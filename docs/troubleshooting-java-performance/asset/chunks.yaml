    \ pretty confusing.\n\nBut it gets worse—a lot worse. In the new gen tuning we\
    \ did for Listings [12-3](#A449023_1_En_12_Chapter.html#Par77) and [12-4](#A449023_1_En_12_Chapter.html#Par78),\
    \ we shrank the old space to be pretty small compared to the size of the entire\
    \ heap. In fact, the old space was just 1/7th of the entire heap when performance\
    \ was at its best.\n\nMy point is that shrinking your old size to be less than\
    \ 50% of your heap is a completely valid and often desirable approach, especially\
    \ with stateless SOA systems, but unfortunately there are no valid values for\
    \ `-XX:NewRatio` that let you do this, as shown in Table [12-1](#A449023_1_En_12_Chapter.html#Tab1).\
    \ For these reasons, I suggest avoiding `-XX:NewRatio` altogether.\n\nTable 12-1.\n\
    \nOld Gen Percentages for Various `NewRatio` Settings\n\n| NewRatio | Old size\
    \ % (implicit) |\n| --- | --- |\n| 1 | 50% |\n| 2 | 67% |\n| 3 | 75% |\n| 4 |\
    \ 80% |\n\nI have wondered why `NewRatio` is so limiting, and perhaps there are\
    \ outdated, historical performance concerns might be at fault?\n\nSome heap tuning\
    \ tips have a short shelf-life. What’s valid in one version of Java might very\
    \ well be counter-productive in the next one. Old hands at Java will know this\
    \ already, but newbies may tend to believe the advice they recently studied is\
    \ going to be good for J8, J9, and so on.\n\nI’d like to close this section with\
    \ comments from Oracle tuning experts Charlie Hunt and Tony Printezis, who also\
    \ stress the importance of the new generation:\n\n> “You should try to maximize\
    \ the number of objects reclaimed in the young generation. This is probably the\
    \ most important piece of advice when sizing a heap and/or tuning the young generation.”\
    \ [`http://www.oracle.com/technetwork/server-storage/ts-4887-159080.pdf`](http://www.oracle.com/technetwork/server-storage/ts-4887-159080.pdf)\n\
    \n### Blindly Increasing -Xmx\n\nA lazy way to try to fix a heap efficiency problem\
    \ is by simply increasing the `-Xmx` value without understanding which GC space\
    \ is having the problem. For example, consider test 12a in the javaPerformanceTroubleshooting\
    \ tests .\n\nIf you search for 12a in `pom-startWar.xml`, you’ll find this:\n\n\
    ```\n12a \n-Xmx512m       \n```\n\nIf you quadruple the size of the `-Xmx` value\
    \ (to 2048MB), you get a little improvement but are still left with 10-15% New\
    \ GC Overhead %. Try it. This happens because the space with the high overhead\
    \ that is dragging down performance, the new space, never gets more RAM, because\
    \ the shoebox divider was not adjusted when increasing the `-Xmx`—all the space\
    \ goes to the old gen, and the stateless activity test 12a doesn’t use the old\
    \ gen.\n\n## Reclaiming Unused RAM\n\nThe previous section showed how under-allocation\
    \ of RAM caused GC overhead that limited throughput by about 25%. Over-allocation\
    \ may or may not cause performance problems, but it is a waste of RAM either way.\n\
    \nHere is a plug-it-in-now approach to detecting when you have allocated lots\
    \ of RAM that your system never uses.\n\nThe `jpt` tests 06a and 06b get the same\
    \ throughput, same response time, same CPU consumption. If all these metrics are\
    \ the same, why do we care? The answer is that the a test achieves exactly the\
    \ same throughput and response time as b, but it does so with less RAM, and the\
    \ following data from JAVA_HOME/bin/`jstat` tells the story. `jstat` provides\
    \ two metrics that are very helpful, `OGCMX` and `OGC`. As described at this URL:\n\
    \n[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html)\n\
    \nthese values stand for “Maximum old generation capacity (kB)” and “Current old\
    \ generation capacity (kB),” respectively.\n\nThe underlined data on the right\
    \ in Listing [12-8](#A449023_1_En_12_Chapter.html#Par138) shows metrics that can\
    \ help you discover RAM that is allocated but never used. The first data is from\
    \ test 06a, and the second is from 06b of the javaPerformanceTroubleshooting examples.\n\
    \nListing 12-8\\. `jstat` Metrics (Underlined) Help Discover Allocated but Unused\
    \ RAM\n\n![A449023_1_En_12_Figa_HTML.jpg](A449023_1_En_12_Figa_HTML.jpg)\n\nUsing\
    \ the test data in Listing [12-8](#A449023_1_En_12_Chapter.html#Par138) from the\
    \ command-line tool `jstat`, Figure [12-8](#A449023_1_En_12_Chapter.html#Fig8)\
    \ shows that test b wastefully allocates about 1GB of RAM that is never used,\
    \ and its performance is no better than that of test a.\n\n![A449023_1_En_12_Fig8_HTML.gif](A449023_1_En_12_Fig8_HTML.gif)\n\
    \nFigure 12-8.\n\nHistogram of data from Listing [12-8](#A449023_1_En_12_Chapter.html#Par138).\
    \ The tall blue bar shows RAM that is allocated but unused.\n\nUltimately, it\
    \ is up to you to determine how much RAM is considered wastefully allocated. But\
    \ be careful here. If your performance tests somehow do not reproduce some condition\
    \ where a great deal of memory is used in production, you could accidentally deallocate\
    \ too much memory and run into an out-of-memory condition. But you can safely\
    \ use `jstat` in production to gather these same metrics to help avoid this problem.\n\
    \nAlso, the utility [`http://gceasy.io`](http://gceasy.io) does a great job of\
    \ providing charts that show this same thing—allocated but unused heap space,\
    \ but it is not a plug-it-in-now tool. If you need to add JVM parameters for verbose\
    \ GC collection, you need to add them and restart your JVM. Once verbose GC has\
    \ been enabled, you will need to rerun your load test and then upload your verbose\
    \ GC data file to someone’s third-party website for the analysis. The `jstat`\
    \ approach gets around all of these hassles !"
  trans: "\n### 谨慎使用 NewRatio\n\n我提出的“鞋盒”比喻方法通过使用 `-XX:NewSize` 设置绝对的字节大小，明确设定了老年代和新生代空间之间的比例。经验丰富的\
    \ GC 调优专家知道，还有一种替代方案是使用比例而非指定整数大小。这个替代方案就是 `-XX:NewRatio` JVM 参数。\n\n> “设置 `-XX:NewRatio=3`\
    \ 意味着老年代与新生代的比例为 1:3，Eden 区和 Survivor 区的总大小将是整个堆大小的四分之一……” [`https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html)\n\
    \nJVM 的设计初衷是使用 `NewRatio` 或 `NewSize`/`MaxNewSize` 来调整老年代/新生代空间的大小，但不能同时使用两者。我进行了一项测试，如果同时提供了\
    \ `NewRatio` 和 `NewSize`/`MaxNewSize`，`NewRatio` 会被忽略，这可能会让人相当困惑。\n\n但情况还会更糟——糟糕得多。在我们为清单\
    \ 12-3 和 12-4 进行的新生代调优中，我们将老年代空间缩小到相对于整个堆大小而言非常小的程度。事实上，当性能达到最佳时，老年代仅占整个堆的 1/7。\n\
    \n我的观点是，将老年代大小缩小到堆的 50% 以下是一种完全有效且通常可取的方法，尤其是在无状态 SOA 系统中，但不幸的是，`-XX:NewRatio`\
    \ 没有有效的值可以让你做到这一点，如表 12-1 所示。基于这些原因，我建议完全避免使用 `-XX:NewRatio`。\n\n表 12-1.\n\n不同\
    \ `NewRatio` 设置下的老年代百分比\n\n| NewRatio | 老年代大小 %（隐含） |\n| --- | --- |\n| 1 | 50%\
    \ |\n| 2 | 67% |\n| 3 | 75% |\n| 4 | 80% |\n\n我一直好奇为什么 `NewRatio` 如此受限，也许是一些过时的、历史性的性能考量在作祟？\n\
    \n一些堆调优技巧的保质期很短。在某个 Java 版本中有效的方法，在下一个版本中可能适得其反。Java 老手们可能已经知道这一点，但新手们往往倾向于相信他们最近学到的建议在\
    \ J8、J9 等版本中仍然适用。\n\n我想用 Oracle 调优专家 Charlie Hunt 和 Tony Printezis 的评论来结束本节，他们也强调了新生代的重要性：\n\
    \n> “你应该尝试最大化在新生代中回收的对象数量。这可能是调整堆大小和/或调优新生代时最重要的一条建议。” [`http://www.oracle.com/technetwork/server-storage/ts-4887-159080.pdf`](http://www.oracle.com/technetwork/server-storage/ts-4887-159080.pdf)\n\
    \n### 盲目增加 -Xmx\n\n尝试解决堆效率问题的一种懒惰方法是，在不了解哪个 GC 空间出现问题的情况下，简单地增加 `-Xmx` 值。例如，考虑\
    \ javaPerformanceTroubleshooting 测试中的 test 12a。\n\n如果你在 `pom-startWar.xml` 中搜索\
    \ 12a，你会找到这个：\n\n```\n12a \n-Xmx512m       \n```\n\n如果你将 `-Xmx` 的值增加四倍（到 2048MB），你会得到一点改进，但新生代\
    \ GC 开销百分比仍然有 10-15%。试试看。发生这种情况是因为导致性能下降的高开销空间——新生代——从未获得更多内存，因为在增加 `-Xmx` 时没有调整“鞋盒”分隔器——所有空间都分配给了老年代，而无状态活动测试\
    \ 12a 并不使用老年代。\n\n## 回收未使用的 RAM\n\n上一节展示了 RAM 分配不足如何导致 GC 开销，从而将吞吐量限制在约 25%。过度分配可能会或可能不会导致性能问题，但无论如何都是对\
    \ RAM 的浪费。\n\n这里有一种“即插即用”的方法，用于检测何时分配了大量系统从未使用的 RAM。\n\n`jpt` 测试 06a 和 06b 获得了相同的吞吐量、相同的响应时间、相同的\
    \ CPU 消耗。如果所有这些指标都相同，我们为什么还要关心呢？答案是，测试 a 实现了与测试 b 完全相同的吞吐量和响应时间，但它使用的 RAM 更少，以下来自\
    \ JAVA_HOME/bin/`jstat` 的数据说明了这一点。`jstat` 提供了两个非常有用的指标：`OGCMX` 和 `OGC`。如以下网址所述：\n\
    \n[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html)\n\
    \n这些值分别代表“最大老年代容量（kB）”和“当前老年代容量（kB）”。\n\n清单 12-8 中右侧带下划线的数据显示了可以帮助你发现已分配但未使用的\
    \ RAM 的指标。第一个数据来自 javaPerformanceTroubleshooting 示例中的测试 06a，第二个来自测试 06b。\n\n清单\
    \ 12-8\\. `jstat` 指标（带下划线）有助于发现已分配但未使用的 RAM\n\n![A449023_1_En_12_Figa_HTML.jpg](img/A449023_1_En_12_Figa_HTML.jpg)\n\
    \n使用来自命令行工具 `jstat` 的清单 12-8 中的测试数据，图 12-8 显示测试 b 浪费地分配了大约 1GB 从未使用的 RAM，而其性能并不比测试\
    \ a 好。\n\n![A449023_1_En_12_Fig8_HTML.gif](img/A449023_1_En_12_Fig8_HTML.gif)\n\
    \n图 12-8.\n\n来自清单 12-8 的数据直方图。高的蓝色条表示已分配但未使用的 RAM。\n\n最终，由你来决定多少 RAM 被认为是浪费分配。但这里要小心。如果你的性能测试不知何故没有重现生产环境中大量使用内存的某些情况，你可能会意外地释放过多内存，并遇到内存不足的情况。但你可以在生产环境中安全地使用\
    \ `jstat` 来收集这些相同的指标，以帮助避免此问题。\n\n此外，工具 [`http://gceasy.io`](http://gceasy.io)\
    \ 在提供显示相同内容（已分配但未使用的堆空间）的图表方面做得很好，但它不是一个“即插即用”的工具。如果你需要添加 JVM 参数来启用详细 GC 收集，你需要添加它们并重启\
    \ JVM。一旦启用了详细 GC，你需要重新运行负载测试，然后将你的详细 GC 数据文件上传到某个第三方网站进行分析。而 `jstat` 方法则绕过了所有这些麻烦！\n"
- fmt: "# Memory Leaks\n\nThe most common kind of memory leak is an ever-growing singleton\
    \ of some kind, and these kinds of leaks often take hours, days, or longer to\
    \ amass enough memory in the singleton to start causing problems. Imagine a singleton\
    \ with a `java.util.Map` or a `java.util.List`, where memory continually grows\
    \ over time as `.put()` or `.add()` is called until all of the allocated heap\
    \ (the `-Xmx` JVM parameter) is used up. Fast leaks are less common, but are more\
    \ dangerous, because they can lock up a JVM in seconds without warning. These\
    \ happen when a defenseless piece of code is forced to process much more data\
    \ than it was expecting, like mistakenly returning all the rows in a multi-million-row\
    \ table to the end user.\n\nDiagnostic data for troubleshooting memory leaks comes\
    \ in a few layers that get increasingly more detailed:\n\n1. The \"Heap Trending\"\
    \ section earlier in this chapter will help you learn how quickly the heap fills\
    \ before throwing out of memory exceptions. This is based on verbose GC data.\
    \ This is great, but no class names are mentioned in this data, so it makes it\
    \ tough to identify which class is leaking.\n2. Identifying specific classes that\
    \ have the largest instance counts and largest amounts of \"referenced\" memory,\
    \ as there were at a single point in time. `JAVA_HOME/bin/jmap -histo` is one\
    \ common source of this data. Glowroot provides this as well.\n3. Understanding\
    \ trends in the monitored data. For instance, which classes have instance counts\
    \ that grow perpetually over time? Manual work can be done to compare `jmap -histo`\
    \ output (histograms). A tool called `heapSpank` will do some of this processing\
    \ for you.\n4. Tracking ownership of proliferating objects back to the parents\
    \ that store/reference them. Sometimes you know which objects are littering the\
    \ heap, but you don't know how they got there nor why the GC hasn't already discarded\
    \ them. Locating exactly where the objects reside in the heap helps identify how\
    \ they got there in the first place. Heap dumps and heap analysis tools like Eclipse\
    \ MAT fill this role.\n\nKeep in mind that capturing a heap dump is an expensive\
    \ operation. It can shut down (basically pause) all activity in a JVM for dozens\
    \ of seconds or more.\n\n## Troubleshooting Memory Leaks\n\nTroubleshooting can\
    \ be done using class histograms.\n\nThe JDK has a great plug-it-in-now approach\
    \ to getting point-in-time instance counts of all classes loaded in the JVM. Just\
    \ invoke `JAVA_HOME/bin/jmap -histo <myPid>` and redirect the stdout to a text\
    \ file. Here is the doc:\n\n[`https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/tooldescr014.html#BABJIIHH`](https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/tooldescr014.html#BABJIIHH)\n\
    \nIf you have 2,000 classes loaded, the `jmap -histo` output will have one line\
    \ for each class, showing instance counts of that class and also memory by class.\
    \ This is the bulk of the output, and because a full heap dump dwarfs a histogram\
    \ in size and complexity, capturing a heap dump causes much more overhead. That\
    \ said, I have even seen `jmap -histo` pause a JVM for dozens of seconds. Sometimes\
    \ important troubleshooting data is worth the temporary pause.\n\nI suggest grepping\
    \ the `jmap -histo` output for your package space. Keep in mind that Java primitives\
    \ (arrays, int, long) and other types show up with the odd `[I` syntax shown in\
    \ Listing [12-9](#A449023_1_En_12_Chapter.html#Par154). Generally knowing these\
    \ primitive counts is only a little helpful, because there are no indicators in\
    \ this data of what allocated the primitives. When class and package names show\
    \ up, whether in your own package or a dependency's package, that provides some\
    \ context to answer questions like, \"Where might there be a singleton that would\
    \ be amassing objects?\" and \"What user data would be collecting over time?\"\
    \ If you saw class names/packages dealing with session data, it would be worth\
    \ your time checking whether HTTP session expiration was working as expected.\n\
    \n```\n$ jmap -histo 29620\nnum  #instances  #bytes class name\n\n1:   1414  \
    \ 6013016 [I\n2:    793   482888 [B\n3:   2502   334928 \n4:    280   274976 \n\
    5:    324   227152 [D\n6:   2502   200896 \n7:   2094   187496 [C\nListing 12-9.\n\
    Very Top Lines of jmap Output\n```\n\nThe main limitation with `jmap -histo` is\
    \ that it provides only point-in-time data. Capturing and reviewing `jmap -histo`\
    \ multiple times can be helpful, but it is easy to drown in the data when you\
    \ are looking for increases in object counts over multiple `jmap -histo` output\
    \ files.\n\nTo get a better understanding of how class counts and memory consumption\
    \ trends over time, I wrote `heapSpank`, available at heapSpank.org. This is a\
    \ command-line tool that shows the percentage of time that byte counts are on\
    \ the rise for the 15 classes most likely to be leaking.\n\nI ran a littleMock\
    \ test with this key to produce the memory leak:\n\n```\nX2,J25,K25,L0,Q,R,S,A4096,B65535,C120000,D240000\n\
    ```\n\nFigure [12-9](#A449023_1_En_12_Chapter.html#Fig9) shows how `heapSpank`\
    \ identified the leak class, but not the parent container; this is a nice head\
    \ start.\n\n![A449023_1_En_12_Fig9_HTML.jpg](A449023_1_En_12_Fig9_HTML.jpg)\n\n\
    Figure 12-9.\n\n`heapSpank` from `heapSpank`.org has detected the littleMock memory\
    \ leak. See how the MyMemoryLeak class bubbles to the top of the display?\n\n\
    ## Heap Dump Analysis\n\nEarly in the chapter, I mentioned the layers of metrics\
    \ that are available. `jstat` provides instantaneous metrics to assess health.\
    \ The verbose GC logs and the trending tools like GCViewer help show trends over\
    \ time. These indicate whether you have a slow leak building over time. `jmap`\
    \ provides counts of classes, and then `heapSpank` helps understand overtime whether\
    \ those specific class counts and byte counts continue to rise over time.\n\n\
    All that data is very helpful, but sometimes even all of this is not enough information\
    \ to fix a memory leak. Let me explain. Just because instances of one or a few\
    \ objects grow over time doesn't point you to the exact spot where they are accumulating\
    \ or even why they are accumulating. Always with chagrin we ask why the Garbage\
    \ Collector hasn't already recycled a particular set of objects highlighted by\
    \ `jmap`, `heapSpank`, or Eclipse MAT.\n\nAnalyzing a heap dump helps answer these\
    \ questions.\n\n### Capturing a Heap Dump\n\nEspecially with a heap filled to\
    \ capacity with leaky objects, capturing a heap dump can be a high-overhead operation.\
    \ It can halt JVM activity for seconds or even minutes. That said, some problems\
    \ just have to be fixed. So I never capture a heap dump unless the `jstat` and\
    \ verbose GC data indicate there is an upward trend of byte counts and/or instance\
    \ counts. If there have already been out-of-memory errors, forget about the overhead\
    \ and capture the dump.\n\nI simulated a memory leak using this littleMock key—the\
    \ same one used in the previous section.\n\n```\nX2,J25,K25,L0,Q,R,S,A4096,B65535,C120000,D240000\n\
    ```\n\nI let this test run for just a few minutes. Then I captured a heap dump\
    \ using the command shown in Listing [12-10](#A449023_1_En_12_Chapter.html#Par167).\n\
    \n```\njcmd  GC.heap_dump /path/to/myDump8.dat\nListing 12-10.\nOne of Many Ways\
    \ to Capture a Heap Dump\n```\n\nDon't forget to use these among the JVM start-up\
    \ arguments for your application that will automatically capture a heap dump when\
    \ an out-of-memory error occurs:\n\n```\n-XX:+HeapDumpOnOutOfMemoryError and -XX:HeapDumpPath=/some/path/\
    \ in/production\n```"
