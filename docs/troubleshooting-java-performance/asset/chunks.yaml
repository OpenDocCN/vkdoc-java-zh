- fmt: '# Test 05: Performance Issues with One SQL


    Test Results, captured from Glowroot:


    - Test 05a: 3,500 requests per minute; 50ms response time.

    - Test 05b: 14 requests per minute; 13,500ms response time


    Metrics that you will need:


    - Response time and throughput for all SQL statements executed

    - A few tools that provide this data: Glowroot, JavaMelody, JDBC Performance Logger


    With response time of more than 13 seconds, Test 05b is horribly slow, and throughput
    is very low. In fact, throughput is 250 times less than 05a, but why?


    In the real world you will also need to check for issues in the other P.A.t.h.
    items as well, but since this is the Persistence chapter, let’s jump right into
    the SQL metrics to see what’s causing this 13.5 second response time. The first
    task is to identify the queries with the slowest response time, especially ones
    that get executed a lot. Then, we will see whether any obvious improvements can
    be made.


    Figure [9-1](#A449023_1_En_9_Chapter.html#Fig1) shows the one query whose performance
    is much slower than the other two:


    ![A449023_1_En_9_Fig1_HTML.jpg](A449023_1_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    For test 05a, throughput and response time for all SQL, provided by `glowroot.org`.
    The slowest query on the top row (358.5ms average) also happens to be the one
    with the most Total Time.


    ```

    SELECT hid from history WHERE aid = ?

    ```


    Because we’re trying to remedy 13.5 second response time, and because this query’s
    response time (358.5ms average, top row below) is more than 10 times slower than
    the other two queries, it is worth some time to investigate this query further.
    Even being just a few times slower would merit some investigation.


    In this query, there are no JOINS to other tables, the list of fields selected
    is very short (just the `Hid` column), and the WHERE criteria of `WHERE aid =
    ?` is trivial. The entire query is very basic. In fact, the other queries are
    pretty basic as well, and even for the same reasons. So why does the performance
    of these “basic” queries vary so greatly?


    In many development shops, SQL tuning falls mainly on the (hopefully) capable
    shoulders of the DBA, and that’s an OK thing. But even if this is the case, and
    developers have little or no responsibility for performance of individual queries,
    I think developers need at least some rudimentary understanding of what’s required
    to make basic queries perform well, including basic queries in this example. More
    specifically, developers need to:


    - Notify the DBA when all changes to SQL are made, so the DBA can review it for
    performance in general, but specifically to assess whether any indexes must be
    added, changed, or removed to get your query to perform well.

    - Know how to find out whether a SQL statement is using indexes. This is done
    by asking the database for the “execution plan” for the query. If the plan shows
    a “table scan,” then it’s likely your query isn’t using the right indexes and
    will have performance problems.


    Of course, there are other problems that can cause performance issues, but all
    developers should know these basics. And as you might have guessed, Test 05b is
    so incredibly slow because that one slow query identified by Glowroot is querying
    a column in the `HISTORY` table that doesn’t have an index. Ouch. The 05a test
    (Figure [9-2](#A449023_1_En_9_Chapter.html#Fig2)) fixes that. This test uses a
    different version of the same database that includes the right index. Query response
    time improved from 358.5ms without the index


    ![A449023_1_En_9_Fig2_HTML.jpg](A449023_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    With all db indexes now in place, response time for all queries is faster than
    1ms


    This blog page shows all the steps necessary for troubleshooting and fixing a
    performance problem with a missing H2 database index:


    [`http://ostermueller.blogspot.com/2017/05/is-my-h2-query-slow-because-of-missing.html`](http://ostermueller.blogspot.com/2017/05/is-my-h2-query-slow-because-of-missing.html)


    Retrieving and analyzing the execution plan is a similar process for other databases,
    but you’ll need to get help from your DBA or from the DB doc on the specifics.
    Is your DBA responsible for detecting problems, or does the DBA rely on dev to
    set tuning priorities? These are important things to decide, and good JDBC performance
    like those from `glowroot.org` are great for setting priorities for the dba.


    Query response time is really composed of two parts that we don’t discuss often
    enough when troubleshooting: execution and optionally, result-set iteration. Indexing
    issues like the problem in Figure [9-2](#A449023_1_En_9_Chapter.html#Fig2) cause
    slowdowns in the first part—execution.


    I just glanced back at the list of jpt performance results, Table [2-1](#A449023_1_En_2_Chapter.html#Tab1)
    in Chapter [2](#A449023_1_En_2_Chapter.html). It shows that jpt test 04a includes
    an example of slow result-set iteration. If you run this example and capture some
    thread dumps, you will see the `java.sql.ResultSet#next()` method show up repeatedly,
    but it won’t show up repeatedly in other tests. This is how you detect problems
    with the second part of query performance—result-set iteration.


    Thus far, we have focused on how the performance of individual queries can cause
    problems. The rest of this chapter is dedicated to the performance problems caused
    by multiple SQL statements acting in concert (bad acting in concert?), as part
    of a single database strategy.


    ## Performance Issues with Multiple SQL Statements


    Near the beginning of Java Performance: The Definitive Guide (O’Reilly, 2104),
    Scott Oaks has a peculiar little section that is aptly named “Look Elsewhere:
    The Database Is Always the Bottleneck.” It is really just a page or two that cautions
    against blaming Java for all your performance woes, because database performance
    issues, regardless of the programming language, will very likely eclipse any vanilla
    Java performance issues. I generally agree; this is why most of the 12 jpt load
    tests that come with this book include database activity.


    From the developer’s perspective, I see database performance as an effort to tame
    a two headed sea serpent:


    - First head of the serpent: performance of individual queries, as shown by our
    missing index example.

    - Second head of serpent: cumulative performance overhead of executing a group
    of SQL statements, like all SQL executed for one business process.


    Many teams struggle to find and retain DBAs (or perhaps other staff) who can,
    in concert with the development team, keep the performance of individual queries
    under control. This is the first head of the serpent.


    The second head is managing the performance of groups of queries from a single
    component, more simply described as the problem of “too many database calls.”
    This problem has gone largely unchecked by development teams, but a small, vocal
    group have warned about this problem for more than a decade. It still inflicts
    much pain, today. The blog post URL at the beginning of this chapter shows how
    long we have been living with this problem.


    There are two main anti-patterns behind this “too many database calls” problem.
    Let’s look at the first, which is called the SELECT N+1 issue; it could easily
    have been called “SELECTs in a loop.”'
