  trans: '

    ### 重现糟糕的性能


    如前所述，100% CPU 标志位对于展示可扩展性至关重要。其他三个标志位（25%、50%、75%）则作为小型断点测试，适用于那些性能不如图 6-4 中 SUT
    的应用程序——这意味着大多数应用程序。CPU 标志位精确地显示了重现性能问题所需施加的负载量。例如，假设在前两个负载增量（25% 和 50% CPU）时，你得到了清晰规整的阶梯状步骤，但在第三个负载增量时，吞吐量不再攀升，CPU
    仅达到 55%。恭喜。你已经重现了问题，这是“看清”问题的第一步。“看清”问题的第二步也是最后一步，是使用正确的监控工具查看正确的性能数据，正如从第 8 章开始的
    P.A.t.h. 章节所述。


    当一个看似强大的对手被一个较弱的挑战者击败时，头条新闻会迅速赞扬黑马，并羞辱被拉下王座的前冠军。同样，如果一个看似健壮的 SUT 在极少的负载线程下就暴露出巨大的性能问题，那么这确实是一个关键问题。重现性能缺陷所需的负载量越小，问题就越关键。因此，在
    25% CPU 时重现的问题，比在更高 CPU 百分比下出现的同一问题要严重得多。不要忘记，你在缺陷跟踪系统中为问题指定的优先级和/或严重性，应该以某种方式反映这一点。此外，不必要的高负载量常常会引入其他问题（例如第
    5 章关于无效负载测试中讨论的并发上限问题），这会使本已困难的故障排除过程更加复杂。这里的教训是：只施加重现问题所需的负载量——任何多余的负载都会不必要地使问题复杂化。


    一旦可扩展性标尺确定了从规整阶梯过渡到混乱状态所需的最小吞吐量，从而展示出性能问题，那么将标尺负载计划切换为稳态负载计划会很有帮助。然后你可以更改负载计划以延长测试持续时间——目标是提供充足的时间来审查
    P.A.t.h. 检查清单，并开始从监控和追踪工具中捕获数据。


    一旦问题被识别并部署了修复方案，重新运行稳态测试可以为你的团队提供极佳的前后对比和令人信服的故事。如果系统变更使我们更接近性能目标（更高的吞吐量和/或更低的响应时间和/或更低的
    CPU 消耗），则保留该变更，并通过重新运行标尺来查看下一个问题所在，从而开始新的循环。请记住，修复方案已经改变了性能格局，你可能需要通过重新运行标尺校准测试来重新校准标尺。


    我们使用可扩展性标尺有两个目的：测量最佳吞吐量和重现性能缺陷。当“检测-重现-修复”循环都在单台机器/环境中进行时，单线程工作流会变得极其缓慢：开发人员被迫排队等待，以便在“黄金”环境上运行另一个测试，从而获得关于提议代码修复的反馈。因此，比较多个代码选项的性能变得不可行，因为对繁忙的黄金环境的访问需求很高。为了解决这个问题，最优秀的性能工程师擅长让开发人员能够独立工作，自行重现性能缺陷，也许是在他们自己的桌面上，甚至可能比较多种设计方法的性能。这是第
    2 章中讨论的适度调优环境的另一个好处。


    ## 好的 CPU 消耗与坏的 CPU 消耗


    并非所有的高 CPU 消耗都是坏事，尤其是在可扩展性很重要的时候。事实上，如果构建可扩展系统是我们目标的一部分，那么我们应该积极推动系统实现吞吐量的飞跃，同时充分利用
    100% 的 CPU，至少在测试环境中是这样。当然，不贡献于吞吐量的 CPU 是坏的。例如，考虑在应用服务器启动时，没有施加任何负载，CPU 就达到了 100%。这就是坏的
    CPU 消耗。


    看待糟糕性能的一种方式是，它是由 CPU 消耗过少或过多引起的。第一种，“CPU 过少”，表现如下：无论施加多少负载线程，SUT 的吞吐量都不会大幅提升，即使有大量可用的
    CPU。SUT 仿佛被一张难以想象的沉重毯子——比你在胸部 X 光检查时用来保护身体的铅围裙还要重许多倍——盖在了脆弱的吞吐量和 CPU 线上，压制着它们，使它们无法做出可扩展系统中应有的响应式吞吐量飞跃。


    因此，当那张沉重的毯子压在 SUT 上时，使用更快的 CPU 只会带来微乎其微的好处。增加更多同类型的 CPU 只会让你的钱包受损。


    我将誓死捍卫将 CPU 消耗推高至 100% 背后的逻辑，尤其是在吞吐量正在突破天花板的时候。


    为什么？如果这不能证明可扩展性，那它肯定是可扩展性的一个必要属性。像这样与 100% CPU 调情是可以理解的，但如果 CPU 已经达到 100%，再施加更多负载就没有意义了。作为负面测试的一部分，这可能有所帮助，但当你寻求更高吞吐量时，这只会是一条死胡同。


    即使面对非常低的吞吐量，技术人员有时也会吹嘘他们 SUT 的低 CPU 消耗。需要费些功夫才能帮助他们明白，在这种情况下，低 CPU 消耗是坏的，而不是好的。另一方面，当比较两个各方面性能（尤其是吞吐量）都相似，但其中一个
    CPU 消耗更低的测试时，低 CPU 消耗就是好的。


    对于第二种糟糕性能，“CPU 过多”，SUT 消耗了过多的 CPU，以至于你需要一整群忙碌的 CPU 来产生足够的吞吐量以满足需求，而一个调优得更好的 SUT
    可能只需要几个 CPU 就能慢悠悠地完成任务。这就是为什么引入一个限制硬件花费金额的性能要求会很有帮助。


    “CPU 过多”应引导我们优化那些既非必要又消耗 CPU 的代码。用于指出哪些代码消耗 CPU 的工具在关于线程的 P.A.t.h. 检查清单（第 11 章）中讨论。而代码是否必要当然是主观的，但在同一第
    11 章中，有一些很好的、具体的非必要代码示例。“CPU 过少”表明争用、I/O 或其他响应时间问题阻碍了系统产生足够的吞吐量。解决这些问题的指导分散在从第
    8 章开始的四个涵盖 P.A.t.h. 检查清单的章节中。

    '
- fmt: '# Chapter 2 on Modest Tuning Environments


    Chapter [2](#A449023_1_En_2_Chapter.html) on Modest Tuning Environments encourages
    us to run more fix-test cycles every day, with the expectation that improvements
    will ensue. That means the performance landscape is fluid and needs to be re-evaluated
    between optimizations. Just an optimization or two can easily turn a “too much
    CPU” system into a “too little CPU” system. For instance, suppose a number of
    systems with complex security requirements query a database for hundreds of permissions
    for each user, and let’s further say that a review of the entire P.A.t.h. Checklist
    shows this is the worst problem in the system. Once you add caching to this CPU-intensive
    approach, you will discover the next worst problem in the system, which very well
    might be contention (discussed in Chapter [11](#A449023_1_En_11_Chapter.html)),
    which leaves us with a “too little CPU” system.


    Be careful how others perceive your attempts to push CPU to 100%, as with the
    Scalability Yardstick. Rightfully, data center owners require plenty of assurances
    that production applications will meet throughput requirements while consuming
    modest portions of the allotted CPU. Ask them how much consumption they feel comfortable
    with. The risk of running out of CPU is too great, especially when human error
    and other operational blunders can unexpectedly drive up CPU consumption. Sometimes
    business processes get inadvertently left out of the tuning process altogether,
    and their CPU-hungry nature ambushes you in production. Sneak attack.


    ## Don’t Forget


    I am not a carpenter, but even I know that you measure twice and cut once to fashion
    a board to the right dimensions. With software, we generally measure scalability
    zero times before checking into source code control. Zero times.


    Once the clay has been baked, the sculptor is done. If you wanted that malformed
    mug to instead be a fancified chalice, you are out of luck. If that clay bust
    of your benefactor looks more like a sci-fi monster with three noses, sorry. The
    development process is our golden window of opportunity to sculpt and reshape
    the code, and we currently let that opportunity sail right on by without ever
    checking in on our progress towards our scalability goal. Does it have the right
    number of noses? Does it still look like a monster? Why do we never ask these
    obvious questions until it is way too late?


    The Scalability Yardstick is quick and easy to use; it enables us to measure performance
    progress frequently during the development process, while our window of opportunity
    is open to set things right, before the clay is baked.


    When our system scales, the load generator pushes the SUT to produce clean, chiseled
    leaps/steps of throughput. Instead of the squared and chiseled throughput (and
    other) metrics, poor performing SUTs have jagged, impotent and weighted down throughput
    because the code is littered with contention, as shown by the jagged variability
    in individual metrics.


    I have mentioned that applying an unrealistically large amount of load is a common
    mistake, perhaps even an anti-pattern. `3t0tt` helps address this problem—it is
    a nice, safe way to keep pretentious performance engineers like myself from lecturing
    about unrealistically high load. `3t0tt` is a fantastic starting point, but it
    doesn’t tell you whether your system scales—you need the Scalability Yardstick
    for that.


    ## What’s Next


    This chapter focused on the interplay between throughput, CPU and the amount of
    load applied. Seeing these three metrics on the same graph was helpful to running
    the Scalability Yardstick test. In Chapter [7](#A449023_1_En_7_Chapter.html),
    coming up next, we will see how to put all these metrics on the exact same JMeter
    graph. Chapter [7](#A449023_1_En_7_Chapter.html) is a deep dive into the JMeter
    basics that deserve being repeated, and into important JMeter features and foibles
    that seem underdocumented.


    # 7. JMeter Must-Know Features


    Because you can find a lot of documentation on the Internet about JMeter, the
    load generator, I have tried to limit this chapter to include either features
    with little documentation available, or features that newcomers rarely seem to
    pick up, even if they are well documented.


    The objectives for this chapter are:


    - Get comfortable using JMeter by creating small test scripts in a tiny sandbox
    environment using just your desktop.

    - Understand that learning a few particular JMeter features can quickly advance
    you from a beginner to an intermediate/advanced user.

    - Understand that once JMeter is installed, extra plugins from `jmeter-plugins.org`
    and other places are required to make it really useful.


    I see a lot of people start to use JMeter and not get very far with it, and that
    is frustrating for me because I have seen what a capable load generator it is.
    To address this, the guided tours in this chapter will propel beginning JMeter
    users into the realm of intermediate and advanced users.


    But wait, there is more.


    “Hello World!” programming experiments are great for getting started learning
    a technology, and JMeter has exactly this kind of sandbox that you can use to
    try out its features. If you know about this sandbox (most don’t), it takes just
    20 seconds (I’m not exaggerating here) to create a little test in the sandbox
    and learn (and even perfect) your approach to answering these and many other JMeter
    questions:


    - How do you increase load?

    - How do you graph throughput?

    - How do you conditionally execute something based on a value in a script variable?

    - How do you read data (like SUT user names/passwords) from a `.csv` text file
    into JMeter script variables?


    So keep an eye out for the sandbox later in the chapter.


    This is a JMeter-only chapter, so if you are already sold on your own load generator,
    then by all means, proceed to the next chapter. But before you leave, please read
    my “love letter to JMeter” and see if your load generator has all of these features,
    ones that I rely on for tackling difficult performance problems. It is tough for
    me to imagine how other load generators (and other software developers) make do
    without this fantastically broad set of features, all open source. I sure hope
    the commercial (and other) load generator competition takes note of this high
    bar. For reference, here are some other popular load generators; the last three
    are commercial ones.


    - Faban

    - The Grinder

    - Gatling

    - Tsung

    - jmh

    - HP Performance Center (aka ‘Load Runner’)

    - Load UI

    - Silk Performer


    Since a single chapter does not a training plan make, I recommend using this chapter
    to supplement other JMeter training you might find at `jmeter.apache.org` or in
    JMeter books (*Performance Testing with JMeter*, by Bayo Erinle (Packt Books,
    2015; ISBN-13 = 978-1787285774) or *JMeter Cookbook*, by Bayo Erinle (Packt Books,
    2014; ISBN-13 = 978-1783988280). The good citizens of the Internet, God bless
    them, also have their own compendium of training material, which is an irrefutable
    sign that JMeter is a vital organ in the body of the performance discipline at
    large.'
