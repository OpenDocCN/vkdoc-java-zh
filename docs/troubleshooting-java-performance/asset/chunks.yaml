    \ “At which of these 10 steps will the SUT CPU consumption reach 25%?”\n\n![A449023_1_En_6_Fig1_HTML.jpg](A449023_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1.\n\nJMeter load plan used to see how many threads of load it takes\
    \ to push the application server CPU to 25%\n\nHere are some brief instructions\
    \ for doing this:\n\n1.  Install JMeter from jmeter.apache.org.  \n2.  Install\
