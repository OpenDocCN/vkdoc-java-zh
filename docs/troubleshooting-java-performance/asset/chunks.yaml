- fmt: '### Code First


    Most performance engineers would love to have massive amounts of hardware for
    the software tuning process. Personally, I can’t stand it. Having countless CPUs
    and unlimited RAM sounds nice, but in reality, once you have lots of hardware,
    you can’t escape Big Environment Paralysis (my term), which includes:


    - Reduced monitoring/visibility because of heightened security that limits access
    to machines.

    - Infrequent test runs due to slower ops processes. Initial environment build
    is complex and takes weeks. Code redeploys take multiple hours. Cluster-wide restarts
    take 20-30 minutes. System backups and maintenance cause hours of downtime. Most
    individual load tests run > 60 minutes.

    - Large environments have a ton of extra components with questionable performance:
    load balancers, firewalls, content switches, clusters, application server configuration,
    and so on.

    - Larger staffing costs to babysit the extra infrastructure.


    All of these things keep me from getting excited about large environments. I’m
    a little surprised anyone chooses to work like this because progress is excruciatingly
    slow. Ultimately, what really gets me excited is more tuning in less time.


    What if we could get 5-10 fix-test tuning cycles completed a day, instead of the
    traditional 2-3? That would be a faster and more impressive way to tackle poor
    performance.


    What if we could carefully design a tuning environment that minimized the Big
    Environment Paralysis? This would enable us developers to shift focus away from
    managing an environment and towards the performance of our deliverable, the Java
    code itself. I call this the Code First approach to tuning, and it’s important
    because it’s the fastest way to tune a system.


    Chapter [2](#A449023_1_En_2_Chapter.html) lays out a very detailed design for
    such a tuning environment, one with a very special mystery feature that really
    minimizes Big Environment Paralysis. But aside from all of this, one particular
    requirement for this environment is key: when tuning here, we must be able to
    reproduce most of the defects that we’d normally find in production. The environment
    would be worthless without it. So to concretely demonstrate that production-like
    performance defects can be found (and fixed) in this environment, I have coded
    two sets of server-side Java code examples that demonstrate these performance
    defects (under load) and their fixes.


    ### Write Once Run Anywhere (WORA) Performance Defects


    When Java was first released in the mid 1990s, compiling and running a `C` program
    on multiple operating systems (OSs) was a royal pain. In response, the Java platform
    went to great lengths to ensure that Java code written on one OS could easily
    compile and run on all other OSs where Java was available. Sun Microsystems called
    this Write Once Run Anywhere (WORA).


    But it just so happens that WORA has an undesirable and little-known side-effect:
    if there is a performance defect in your code, then that defect manifests itself
    not only on multiple platforms, but also in environments of different sizes, large
    and small.


    Of course there are exceptions, but this has proven out repeatedly in my ten years
    as a Java performance engineer. Since I expect this will be hard for most readers
    to believe, I have coded more than a dozen performance defects to prove the point.
    Chapter [2](#A449023_1_En_2_Chapter.html) provides a quick overview of the performance
    results of these load tests. Chapter [8](#A449023_1_En_8_Chapter.html) details
    the architecture of the tests and describes how to run these examples on your
    own machine, with whatever capacity it might have.


    Because most performance defects are reproducible in both large and small environments,
    we have a critical choice to make of where we do our performance tuning. This
    part is very important: Why tune in a big environment and suffer through all the
    ‘Big Environment Paralysis’ problems, when we could be much more productive and
    get 5-10 fix test cycles a day in a small environment?


    Keep in mind that even though most tuning is done in a small environment for expediency,
    a larger environment is often required to demonstrate the full throughput and
    other performance requirements. What are performance requirements? We’ll get to
    that real soon.


    ### Three Threads of Load, Zero Think Time (3t0tt)


    Part of my day job is training developers to tune their code. One of the most
    frequent mistakes I see is people stressing out their Java server-side systems
    with unrealistically large amounts of load. There are so many guys in this field,
    perhaps this is a testosterone thing?


    Both sets of code that come with this book execute small load tests that apply
    stress to a server-side system. Each one of these tests is configured to launch
    exactly three Java threads that are simultaneously and perpetually submitting
    HTTP network requests. No ‘think time’ is configured between the HTTP requests.
    I call this amount of load `3t0tt`, because it is 3 threads of load with zero
    think time. This is pronounced ‘three tot.’ It is used as a quantity of load,
    like this: How much load are you applying? `3t0tt`.


    This particular level of load is designed to have small enough CPU and RAM consumption
    to run on just about any workstation, but large enough to reproduce most multithreaded
    / synchronization problems. Even though this small amount of load is rarely enough
    stress to cause a system to go berserk, throughout this book, the reader is encouraged
    to evaluate a few specific parts of the system and determine which one is causing
    the largest slowdown. This is called ‘the lowest hanging fruit.’ After identifying
    the issue, a fix is deployed and re-tested. If performance improves, the next
    lowest hanging-fruit issue is investigated and the process repeats.


    Choosing the right amount of load to apply is tough for newcomers to performance.
    `3t0tt` provides a very easy starting point to a difficult training problem. In
    Chapter [6](#A449023_1_En_6_Chapter.html), you will learn the next lesson in this
    realm, which is determining how much load to apply to quickly assess scalability.'
