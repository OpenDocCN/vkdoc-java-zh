- fmt: '# 4. Load Generation Overview


    We have all seen brief glimpses of concern during meetings and other discussions
    about whether your product will be able to handle a production workload. This
    is performance angst. It’s like a big, red bubble of uncertainty that hovers over
    the team of an unreleased server-side software product.


    Validating whether the architecture of a system performs well is a great way to
    pop the big, red bubble, and this chapter helps you get started doing that early
    in the software development life cycle (SDLC).


    This chapter presents a two-part plan for creating load scripts, which are essential
    for understanding how your application behaves under stress. The first part of
    the plan helps you create your first script quickly, so you can understand the
    performance of your architecture.


    The objectives of this chapter are:


    - Understand that load testing the architecture of the system can be done with
    a very basic, no-frills load script with just a few business processes.

    - Understand how tuning architecture-wide performance problems can provide quick
    performance boost to all business processes.

    - Understand the load gen script enhancements required to more realistically model
    production business processes.


    As if developing and testing software weren’t hard enough already, learning how
    to generate load for a load test takes extra work. Here are just a few of the
    tasks involved in load testing:


    - Creating and maintaining scripts for a load generator that apply stress to the
    system under test (SUT).

    - Creating and maintaining a production-sized data set for your database.

    - Creating and maintaining user IDs and passwords that your load test will use
    to sign on to the SUT.


    Because of all this and other work, load testing 100% of the SUT’s business processes
    is rarely, if ever done. It just is not cost-effective. My fall-back approach
    is to first load test the basic architecture with a simple First Priority script,
    and then later enhance the script to cover the most critical processes (the Second
    Priority script). Tuning your system with these two scripts educates you on the
    techniques required to make the other SUT business processes perform, as long
    as those processes are underpinned by roughly the same architecture, libraries,
    container, logging, the same authentication and authorization mechanisms, and
    so on.


    This chapter provides an overview of the enhancements required to create First
    and Second Priority load scripts for your SUT. The First Priority script helps
    you quickly discover architecture-wide performance defects. The Second Priority
    script provides a little more workload realism. But first, there are some basic
    skills you will need for enhancing load scripts. We will cover those skills in
    the next section, which also includes a brief introduction to the load generator.


    ## The Load Generator


    In Chapter [2](#A449023_1_En_2_Chapter.html) when we talked about the modest tuning
    environment, we said that a load generator is basically a network traffic generator
    used to see whether your SUT can handle the stress of a production-like load.
    It is possible to assemble a script manually, but they are normally created by
    a “record-and-playback” process. This section talks about all the enhancement
    you’ll normally need to make after that initial recording has been done and it
    is tested.


    Performance problems can be fixed in code or in data or in configuration, but
    there are also many things that need to be corrected inside a load script to best
    approximate your production workload.


    ### Correlation Variables


    Of all enhancements you make to a load script, creating correlation variables
    is used more frequently than any of the others, so everyone should be familiar
    with it. We create these variables in the load generator’s scripting language.
    Then, you use the variable to hold a particular piece of data from the output
    of an HTTP request, so it can later be presented as an input parameter or perhaps
    in the POST body for a subsequent request.


    Here is a quick example: let’s say you used your browser to create a new customer
    in a web app, and the web app generated a new customer ID (`custId=2360` in this
    case). Then you chose to update the customer details with a new street address.
    The “customer update” URL looked like this:


    `http://mybox.com/startCustUpdate?custId=2360`


    If you were recording this with your load generator, this URL would be recorded
    and saved into your script, verbatim. Days and weeks later when you run this script
    again, use of this particular `custId` of 2360 will be quite inappropriate as
    new `custId` values are created. As such, we don’t want hard coded values like
    this encoded in the script files.


    So, we carefully replace a hard-coded value with a correlation variable. You are
    responsible for updating the script to locate `custId=2360` in the response, storing
    it in the correlation variable, and then using that variable on some subsequent
    request(s).


    I went over that pretty quickly, so Table [4-1](#A449023_1_En_4_Chapter.html#Tab1)
    summarizes the required changes.


    **Table 4-1.** Enhancements Required to Convert a Hard-Coded ID from Your System
    with a Correlation Variable


    | Order | Load Script Behavior, as initially recorded | Enhancement required to
    add a Correlation Variable |

    | --- | --- | --- |

    | 1 | The load script calls some URL to create a new customer. | No changes. |

    | 2 | The response to the previous request is returned to the load generator,
    and somewhere inside the response is the newly generated customer ID 2360. | Enhance
    the load script to locate/grab the newly created unique customer ID from inside
    the HTTP response. Store the value in a load script variable; `CUST_ID` would
    be a good name. With JMeter, you can accomplish this with a Regular Expression
    Extractor. |

    | 3 | The load script submits a URL to update the customer details; the recorded
    cust ID 2360 is passed as a URL parameter: `http://mybox.com/startCustUpdate?custId=2360`.
    | Instead of passing the hard-coded cust ID of 2360, enhance the script to pass
    the number stored in the `CUST_ID` variable. |


    This correlation variable technique can and should be used in much more complicated
    load scripts, especially ones that are recorded. The trick for you, a troubleshooting
    trick, is to find exactly where in the scripts the technique needs to be applied.
    At a minimum, you should carefully consider applying this technique at least in
    these places in your scripts:'
  raw: '# 4. Load Generation Overview


    We have all seen brief glimpses of concern during meetings and other discussions
    about whether your product will be able to handle a production workload. This
    is performance angst. It’s like a big, red bubble of uncertainty that hovers over
    the team of an unreleased server-side software product .


    Validating whether the architecture of a system performs well is a great way to
    pop the big, red bubble, and this chapter helps you get started doing that early
    in the software development life cycle (SDLC) .


    This chapter presents a two-part plan for creating load scripts, which are essential
    for understanding how your application behaves under stress. The first part of
    the plan helps you create your first script quickly, so you can understand the
    performance of your architecture.


    The objectives of this chapter are:


    *   Understand that load testing the architecture of the system can be done with
    a very basic, no-frills load script with just a few business processes.

    *   Understand how tuning architecture-wide performance problems can provide quick
    performance boost to all business processes.

    *   Understand the load gen script enhancements required to more realistically
    model production business processes.


    As if developing and testing software weren’t hard enough already, learning how
    to generate load for a load test takes extra work. Here are just a few of the
    tasks involved in load testing:


    *   Creating and maintaining scripts for a load generator that apply stress to
    the system under test (SUT) .

    *   Creating and maintaining a production-sized data set for your database.

    *   Creating and maintaining user IDs and passwords that your load test will use
    to sign on to the SUT.


    Because of all this and other work, load testing 100% of the SUT’s business processes
    is rarely, if ever done. It just is not cost-effective. My fall-back approach
    is to first load test the basic architecture with a simple First Priority script,
    and then later enhance the script to cover the most critical processes (the Second
    Priority script). Tuning your system with these two scripts educates you on the
    techniques required to make the other SUT business processes perform, as long
    as those processes are underpinned by roughly the same architecture, libraries,
    container, logging, the same authentication and authorization mechanisms, and
    so on.


    This chapter provides an overview of the enhancements required to create First
    and Second Priority load scripts for your SUT. The First Priority script helps
    you quickly discover architecture-wide performance defects. The Second Priority
