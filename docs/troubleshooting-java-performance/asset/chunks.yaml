  raw: 'Figure [5-2](#A449023_1_En_5_Chapter.html#Fig2) talks about concurrency values
    roughly from 0 to 200, but the vertical axis shows just 0 to 20, why the discrepancy?
    The roundtangle in the upper left shows that the actual value of maxThreads is
    200\. Glowroot “auto-scaled” the vertical axis and ended up with 0-20.


    Avoiding this cap problem in the test on the right would have been simple, had
    I followed the recommendation to “raise caps before tuning, lower them before
    production.” Since the SUT is littleMock, which runs under Spring Boot and Tomcat,
    I could have easily added this property:


    ```

    server.tomcat.max-threads=1999

    ```


    to the application.properties file, as documented here:


    [`https://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html`](https://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html)


    Don’t forget to do the same for JDBC connection pool settings. Most importantly,
    before you move the app into production, you need to lower the caps to avoid the
    seizing/haywire case I mentioned earlier. How much lower? Lower them to a point
    that is about 25% above the number of threads or connections you will use in production.
    For example, if your load tests show (using the metrics in Figure [5-2](#A449023_1_En_5_Chapter.html#Fig2))
    that you will use no more than 240 threads in production, set the cap to 300 (1.25×240).


    So load tests that bump into resource caps are invalid tests, but now you know
    how to easily avoid this problem: raise resource caps before tuning and lower
    them before production.


    ## Insufficient Warmup


    Performance engineers could argue without end about the right amount of time required
    to warm up a system before running a steady-state load test. 5 minutes? 15 minutes?
    For me, every system is different. I warm up a system until its metrics stabilize
    for a few minutes. If metrics never stabilize, then the length of the warmup is
    irrelevant. In that case, one thing I do is simplify the load scripts to isolate
    which part of the workload contributes most to the chaos.


    So, if you are making performance assessments before metrics like response time
    and throughput stabilize, you are looking at an invalid test.


    ## Maxed-Out Hardware Resources


    It should go without saying that it is your job to make sure there is enough CPU/RAM
    on your systems when you test. Keep in mind that it is easy to forget to check.
    It is also helpful to look at the two main subdivisions of CPU. Kernel CPU (aka
    system CPU) is the percentage of CPU used by the operating system. User CPU is
    the percentage of CPU used by our Java and other applications, including the database.
    Some people think that 0% kernel CPU is achievable. That would be grand, but I
    sure don’t know how to make that happen. Generally, if kernel CPU is 10% or less
    than the user CPU, there are no issues. So if user CPU is 75%, then 7.5% or less
    of kernel does not raise any red flags. When kernel CPU is much more than this,
    it’s time to get a system admin involved—because this load test is probably invalid.
    When working in virtualized environments, sometimes adding a CPU or two can fix
    this.


    Capturing metrics from remote systems is much easier these days. Having those
    metrics graphed right there in your load generator is a great gentle reminder
    to pay attention to them. PerfMon will do that for you. It is the tool we used
    in Chapter [2](#A449023_1_En_2_Chapter.html) to graph CPU of individual PIDs.
    Here is the link again:


    [`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMon/)


    The JMeter plugin Composite Graph will even display CPU (and other environment
    metrics) on the exact same graph as JMeter metrics, like response time and throughput.


    [`https://jmeter-plugins.org/wiki/CompositeGraph/`](https://jmeter-plugins.org/wiki/CompositeGraph/)


    When your test eats up all the CPU/RAM, you have a few choices. Either add more
    CPU/RAM, or use the P.A.t.h. Checklist to lower consumption. That discussion begins
    in Chapter [8](#A449023_1_En_8_Chapter.html).


    By now, you have probably figured out there is some overlap in my approaches.
    In Chapter [3](#A449023_1_En_3_Chapter.html), of the three types of metrics, one
    type is for understanding resource consumption. In this chapter, I’m saying too
    much consumption makes a test invalid. There are no subtle differences between
    these two—just two reminders to have your eye on consumption.


    The same thing goes for functional errors in load tests. I mentioned these in
    Chapter [4](#A449023_1_En_4_Chapter.html) on load scripts and again here, when
    talking about invalid tests. I believe the message is warranted in both places,
    but I wanted to make sure you know these are two references to the same issue.'
