    problem, the four items in the checklist will show you what components are to
    blame for the performance problems. Of course, you might find problems in more
    than one of the checklist items while you are running a single test. If so, you
    will have to triage the problems and decide which one(s) to fix first.


    In this triage process, you will have to make decisions like, “Which should we
    tune first, the slowest query in the system that is taking 1.5 seconds, or repeated
    BLOCKED threads in our XML processing?”


    Remember the P.A.t.h. acronym. Persistence, Alien systems , Threads, and Heap.
    I mentioned this first in the chapter on load scripting priorities, but keep in
    mind that the first two checklist items, persistence and alien systems, highlight
    many tuning opportunities without load generation—in other words, when a single
    user traverses the system. If your performance environment is not yet built or
    if your load scripts are not yet created, you can still get started on improving
    performance.'
  trans: '

    ## 运用 P.A.t.h. 检查清单


    在完成了这些略显枯燥的基础工作之后，舞台已经准备就绪，让我们敲响开场鼓。接下来的四个章节将最终展示如何识别、定位并最终修复 SUT 中导致性能问题的特定组件。


    为了给自己留出时间，通过这四种不同的“透镜”来审视问题，你需要手动重新配置你的负载计划：从原先的增量负载四步骤，改为在“干净、方正的吞吐量阶梯”消失后的第一个层级上，进行单次稳态测试。或许可以将测试时长设置为
    20-30 分钟，同时要知道，一旦这些性能透镜显示出可操作的情报，你就会立即停止测试。


    例如，假设你的“可扩展性标尺”测试在每个负载级别都使用两个线程运行，并且每个级别持续 2 分钟。如果你在约 25% CPU（两个线程）和 50% CPU（四个线程）时得到了干净、棱角分明的阶梯，但之后没有出现棱角分明的跃升，那么用于“复现
    Bug”的稳态测试就需要在六个线程下运行整个时长（20-30 分钟）。


    当存在性能问题的负载测试以稳态运行时，你将使用检查清单中的四个项目来审视 SUT。你所遇到的问题（或问题们）将会在一个或多个透镜中显现出来。那么，通过透镜观察意味着什么呢？


    正如你将在接下来的章节中看到的，四个检查清单项目中的每一个都有其自己的一套监控和追踪工具（免费可用），我将描述如何捕获和解释来自每个工具的数据，并为每个检查清单项目给出“有问题”或“无问题”的评估。目标当然是定位问题。找出系统中导致性能问题的特定组件，然后构思出一个修复方案。


    正如后续章节将向你展示的，四个检查清单项目会指出一些问题。你需要主观地选择其中一个问题作为首要攻击目标——选择那个能带来最大性价比的问题。换句话说，你通常希望攻击那个能以最小努力带来最大性能提升的缺陷，这可能是一个代码变更、配置变更、数据变更，甚至是负载脚本变更。


    以下是 P.A.t.h. 检查清单中的四个项目：


    *   P    Persistence（持久化）：慢速的 JDBC 调用以及过度调用某个 SQL。

    *   A    Alien systems（外部系统）：对主 JVM 外部系统的网络调用。

    *   t    Threads（线程）：CPU 过度消耗和线程阻塞。

    *   h    Heap（堆）：垃圾回收效率低下和内存泄漏。


    但这四个特定领域有什么特别之处呢？首先，这只是对当今最常见的服务端性能问题位置进行分类的一种便捷方式，同时也是为了将这些位置与其各自的可观测性工具配对。但更实际地说，P
    代表持久化，即数据库，并且业界广泛认为数据库的性能问题比其他任何领域都多。我们将重点讨论 JDBC 系统，但 P 章节中关于 JDBC 性能的相同问题也同样适用于
    NoSQL 数据库；所有这些都将在第 9 章中介绍。我创造了“Alien systems”（外部系统）这个术语——它有点像是一个占位符，用于指代我们的 JVM
    通过网络通信的任何系统所出现的性能问题。这将在第 10 章中讨论。


    所以，P 和 A 是我们集成的系统。而 t 和 h 则不同。我们的每一行 Java 代码都是由操作系统线程执行的，因此 t（Threads，线程）用于探索线程效率。是否存在阻塞的线程？（稍后会详细介绍。）是否存在不必要地消耗大量
    CPU 的小型处理挑战？最后，PATH 中的 h 代表堆（Heap）的健康状况。糟糕的垃圾回收效率会严重影响性能和稳定性。我一直犹豫是否要涉足理解 GC 算法这片复杂的水域。除此之外，h
    章节会特意展示，要改善性能，你对 GC 的了解竟然可以少得惊人。t 和 h 将分别在第 11 章和第 12 章中讨论。


    我之前提到过，P.A.t.h. 中的 P 和 A 用大写字母拼写出来，是因为它们很特殊：大多数情况下，你只需通过单个用户的流量就能检测到这些领域的问题。之所以如此，其中一个原因是，对一个大型、无索引的表执行一次孤立的查询通常会很慢，比如慢于
    1 秒。同样地，执行 100 个 SQL/NoSQL 请求，无论用户数量多少（哪怕只有一个），也可能会很慢（超过 1 秒）。


    由于不需要负载，并且捕获 P 和 A 活动的单次样本更容易，你就能获得巨大的好处：无需负载脚本（例如 JMeter 脚本）和负载环境，就能检测并修复性能问题——任何环境对于
    P 和 A 来说都足够了。对一个大型表进行无索引查询就是一个很好的例子，降低响应时间将带来更高的吞吐量。


    不幸的是，同样的方法对 P.A.t.h. 中的 t 和 h 并不适用。为什么？因为需要不止一个线程才能导致与 `synchronized` 关键字相关的性能问题。同样，需要大量的流量才能加剧内存泄漏或配置不当的垃圾回收（Garbage
    Collection）问题。


    当你运行“可扩展性标尺”测试来复现性能问题时，检查清单中的四个项目会告诉你哪些组件是性能问题的罪魁祸首。当然，在运行单个测试时，你可能会在多个检查清单项目中发现多个问题。如果是这样，你将需要对这些问题进行优先级排序，并决定首先修复哪一个。


    在这个优先级排序过程中，你将需要做出类似这样的决定：“我们应该先调优哪个？是系统中耗时 1.5 秒的最慢查询，还是 XML 处理中反复出现的 BLOCKED
    线程？”


    记住 P.A.t.h. 这个缩写词：持久化（Persistence）、外部系统（Alien systems）、线程（Threads）和堆（Heap）。我在关于负载脚本优先级的章节中首次提到过这一点，但请记住，前两个检查清单项目——持久化和外部系统——无需生成负载就能凸显出许多调优机会；换句话说，当单个用户遍历系统时即可发现。如果你的性能环境尚未搭建，或者你的负载脚本尚未创建，你仍然可以开始着手改善性能。

    '
- fmt: '## Running the Examples


    Because performance can go wrong in so many ways, the P.A.t.h system breaks problems
    down into four easier-to-understand categories. Its organization helps to grasp
    this large universe of performance problems. Most of the online examples that
    come with this book highlight just one performance problem in one of the four
    areas. The simplicity of looking at just a single problem at a time is really
    helpful to zero in and focus on performance problems that regularly go undetected,
    and the tools used to detect them.


    There are two different `github.com` projects that come with this book. The first
    one I’ll refer to as `jpt`, which stands for Java Performance Troubleshooting.
    It comes with about 12 pairs of examples. In each pair, one of the two has a performance
    problem, and the other one does not—I’ve already fixed it for you. The two tests
    are labeled as the `a` test and the `b` test. Table [2-1](#A449023_1_En_2_Chapter.html#Tab1)
    in Chapter [2](#A449023_1_En_2_Chapter.html) has a full listing of the 12 pairs
    of tests.


    However, the fact that I’m fixing these problems for you, and that I am training
    your eyes on just a single problem at a time—this is a bit unrealistic. It is
    even more unrealistic that I tell you in advance whether the problem is a P.,
    A., t. or h. problem. If I tell you that a particular test is a P problem, then
    you know to hook up the monitoring/observability tools I have prescribed for P-like
    problems. This is very straightforward, but it is unrealistic. In the real world,
    problems generally just start out as bad/slow, and it’s your burden to discover
    in which of the four areas the problem lurks.


    This means that you generally must use the tools from all four items in the P.A.t.h.
    Checklist to fully understand the situation, a situation I have tried to model
    in the test `09a`. This is an example of many problems all mixed together. There
    is no test `09b`.


    ## Java Performance Troubleshooting (`jpt`) Sample App


    There are small scripts to launch various parts of the application. As a convention,
    any time I mention a Bash script that ends in `.sh`, you will find a corresponding
    MS-Windows script (in the same folder) that ends in `.cmd`.


    Figure [8-1](#A449023_1_En_8_Chapter.html#Fig1) shows the rough architecture of
    the `jpt` application.


    ![A449023_1_En_8_Fig1_HTML.gif](A449023_1_En_8_Fig1_HTML.gif)


    Figure 8-1. Architecture of the `jpt` examples. The triangles indicate the three
    scripts that must be launched from three separate terminal windows. The parameters
    after the first two scripts indicate that this is test `01a`.


    The download and instructions are available here:


    [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)


    An overview of the installation and running of the examples is included below.
    If you run into any issues, be sure to consult the online version of the doc.


    Table [8-1](#A449023_1_En_8_Chapter.html#Tab1) shows that it takes three scripts
    to run one of the `jpt` tests. Prior to running any of the tests, the `init.sh`
    script must be executed. It creates and populates an H2 database with more than
    2 million rows of data. On my 2012 MacBook, the `init.sh` script takes 10 to 15
    minutes to run. You can re-run the `init.sh` script and it will recreate the db
    from scratch.


    Table 8-1. Three Terminal Windows (Aka Command Prompts) Are Required to Run Each
    Jpt Example.


    | 1 | `# cd db` `# db/startDb.sh` | Launches the H2 Database |

    | 2 | `# ./startWar.sh 01a` | Launches the web application. Note the `01a` parameter
    to run web server configuration for test `01a`. Note that both `glowroot` and
    `wiremock`, depicted above, launch with this script. |

    | 3 | `# ./load.sh` `01a` | Launches JMeter from the command line. Note the `01a`
    parameter to run the load test `01a`. |


    This table shows the commands required to run example `01a`. The commands must
    be launched in the specified order. `Ctrl+C` should be used to stop each of these.
    Prior to running any of these, the `init.sh` script must be run just once.


    Here are a few notes for launching the tests.


    Note that after running `.startWar.sh`, you should wait to start `./load.sh` until
    you see this `startWar.sh` message:


    ```

    Started PerformanceSandboxApp in 11.692 seconds (JVM running for 19.683)

    ```


    To stop running one test and start running a different one, use `Ctrl+C` to stop
    both the `./startWar.sh` and the `load.sh` scripts. Then restart the same scripts
    with the desired test ID. The `startDb.sh` script can stay running for as long
    as you like.


    You will use the port numbers in Table [8-2](#A449023_1_En_8_Chapter.html#Tab2)
    to help with your performance troubleshooting in the `jpt` examples.


    Table 8-2. TCP ports Used by the `jpt` Examples


    | Description | Value |

    | --- | --- |

    | Using JMeter, HTTPS load is applied on this TCP port | 8675 |

    | `javaPerformanceTroubleshooting.war` runs under [Spring Boot](https://projects.spring.io/spring-boot/)
    ( [`https://projects.spring.io/spring-boot/`](https://projects.spring.io/spring-boot/)
    ). It connects over HTTP to a backend system that listens on this TCP port. |
    8676 |

    | [glowroot](http://glowroot.org/) ( [`https://glowroot.org/`](https://glowroot.org/)
    ) Monitoring | `http://localhost:4000` |

    | [h2](http://h2database.com/) ( [`http://h2database.com/html/main.html`](http://h2database.com/html/main.html)
    ) TCP Server | `tcp://localhost:9092` (only local connections) |

    | [h2](http://h2database.com/) PGServer | `pg://localhost:5435` (only local connections)
    |

    | [h2](http://h2database.com/) Web/Console Server. You can execute ad-hoc SQL
    on this web page. | `http://localhost:8082` (only local connections). There is
    no username and no password. |'
