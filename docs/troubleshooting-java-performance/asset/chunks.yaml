    are insensitive to performance concerns. All of this nasty I/O can be avoided
    by an alternative idiom to consuming the API. Lots of room for optimization here.
    So, try these suggestions. You can find the code for these on my `eostermueller`
    repo on `github.com`—it’s named crazyFastXml:


    [`https://github.com/eostermueller/crazyFastXml`](https://github.com/eostermueller/crazyFastXml)


    *   For XSLT, cache and reuse the output of `javax.xml.transform.TransformerFactory.newTransformer()`

    *   For SAX parsing, cache and reuse the output of `javax.xml.parsers.SAXParserFactory.newSAXParser()`

    *   For StAX parsing, cache and reuse the output of `javax.xml.stream.XMLInputFactory.newInstance()`
    and `javax.xml.stream.XMLOutputFactory.newInstance()`

    *   For XPath, instead of using `javax.xml.xpath.XPathFactory.newXPath()`, use
    `org.apache.xpath.CachedXPathAPI`.


    We will talk more about how to detect and fix these issues, especially in Chapter
    [11](#A449023_1_En_11_Chapter.html).


    Caching the right objects helps avoid this first anti-pattern (Unnecessary Initialization).
    Exactly the same thing applies to networking: caching and reusing a network connection
    (aka TCP socket) is many times more efficient than shutting down and re-creating
    it for every request. For example:'
  trans: '

    # 第一部分

    性能调优入门


    # 1. 性能反模式


    在深入探讨性能故障排查与调优的细节之前，首先从宏观层面理解性能缺陷是如何潜入代码中的，会大有裨益。本章介绍的四种反模式，将阐明你在 Java 服务端软件中会遇到的主要缺陷类型。在本书后续章节中，我们会反复引用本章所描述的性能反模式。


    本章的目标如下：


    *   学习如何从性能监控工具中那些看似陌生的原始数据入手，围绕它构建一个故事（即假设），用以描述代码为何变得如此缓慢。

    *   识别大多数性能缺陷之间惊人的相似之处。

    *   牢记四种主要性能反模式的名称，或者自行定义你的反模式。

    *   学习如何评估一个给定的缺陷是处理上的大挑战还是小挑战。


    当你初次着手调查一个性能问题时，你掌握的信息非常有限——也许只有本书后面四个 P.A.t.h. 章节中提到的某个监控工具提供的一两段可疑数据——但并没有确凿证据，也没有现成的修复方案。问题在于：你手头只有一张关于性能下降的粗略草图，而你需要一幅详细的画面来找出罪魁祸首。


    为了填补这些细节，更好地理解缺陷背后的完整故事，本章提供了四种最常见性能缺陷的档案——我称之为“主要性能反模式”。


    ## 主要性能反模式


    以下是主要性能反模式。在调查性能问题时，请问自己，你的缺陷最接近以下哪种反模式。


    1.  **不必要的初始化**：在初始化某个较大进程时，系统频繁地重新处理一个已经处理过的小结果。多次执行的累积效应导致了额外的 CPU/内存消耗和/或更慢的执行速度，而这些本都可以避免。缓存这个小结果是主要的应对方法。

    2.  **策略/算法低效**：配置不当或选择不佳的算法或编码策略导致了性能问题。策略是贯穿整个代码库使用的技术，而算法是用于实现单个组件的方案。

    3.  **过度处理**：系统在执行不必要的工作。移除这些工作能带来可衡量的性能提升。一个例子是检索了过多的数据，而其中大部分数据都被丢弃了。另一个例子是在负载测试中包含了错误的、资源消耗大的用例——该用例在生产环境中很少使用。

    4.  **大规模处理挑战**：试图处理并征服海量数据。很少有应用真正有这种需求，但它们确实存在。例如，查询 40 亿行数据，或通过慢速网络反复传输 10MB
    数据等。


    不幸的是，这些主要反模式之间存在重叠，一个性能缺陷可能同时符合两个或更多不同的主要反模式。为了解决这个分类模糊的问题，我根据（我个人的）经验，将这四种问题按从最常见到最不常见的顺序进行了排序。这样，你可以按顺序逐一排查，并选择第一个与当前问题最匹配的反模式。


    ## 主要反模式 #1：不必要的初始化


    这种反模式经常出现在初始化阶段，即在真正开始执行某些操作之前。这是一种低效、CPU 和 I/O 密集型的编码方式，其中某些已经处理过的任务被不必要地反复处理（常常是令人厌烦地重复），导致了不必要的开销。例如，每次进行
    Schema 验证时都重新读取和重新解析 XML Schema 的 `.xsd` 文件是不必要的，因为 `.xsd` 文件中的数据很少改变。与其重新读取/重新解析
    `.xsd` 文件，不如存储并使用一个已经解析好的缓存版本。


    嗯，`.xslt` 文件也是静态的，它们与 `.xsd` 文件存在同样的问题——在转换开始之前，必须从文件系统（或网络）读取并解析它们，但大多数系统在每次转换时都会承受重新读取和重新解析的开销。


    事实证明，像 `.xsd` 和 `.xslt` 文件这样的静态数据无处不在，而重新读取或重新解析所有这些数据会带来性能损失。以下是存在同样问题的应用级数据示例：


    *   **授权数据**：哪个用户被授予了哪些角色，哪些角色对哪些资源拥有权限？如果你决定缓存这些数据以获得良好的性能提升，那么可以按需轻松地使缓存失效，以适应对时间敏感的安全变更，比如撤销某个心怀不满的前雇员的权限。

    *   **产品数据**：是的，对于沃尔玛和亚马逊来说，将其庞大的产品目录放入 RAM 是很困难的，但对于许多产品目录可以轻松放入 512 MB RAM 的组织来说，通过在系统启动时将产品配置加载到内存中，可以提升性能。

    *   **组织数据**，例如物理工厂位置、世界各国列表、美国各州等。

    *   **处理配置数据**，例如在银行系统中编排借贷流程的各种交易代码。


    反复重新加载任何这类静态应用数据都会导致可衡量的、有问题的开销。然而，这些改进并不仅限于应用数据，因为还有一些更低层次的对象，反复重新加载它们的代价也很高昂。例如，许多
    XML 处理 API 看起来似乎 100% 的处理都在内存中完成，直到你发现其中包含了大量文件系统读取、JAR 文件解压和同步操作。部分问题在于，互联网上大多数
    XML 操作指南都提倡对性能问题不敏感的编码习惯。所有这些令人讨厌的 I/O 操作都可以通过使用另一种 API 消费习惯来避免。这里有很大的优化空间。所以，试试这些建议。你可以在我的
    `github.com` 上的 `eostermueller` 仓库中找到相关代码——它被命名为 `crazyFastXml`：


    [`https://github.com/eostermueller/crazyFastXml`](https://github.com/eostermueller/crazyFastXml)


    *   对于 XSLT，缓存并重用 `javax.xml.transform.TransformerFactory.newTransformer()` 的输出

    *   对于 SAX 解析，缓存并重用 `javax.xml.parsers.SAXParserFactory.newSAXParser()` 的输出

    *   对于 StAX 解析，缓存并重用 `javax.xml.stream.XMLInputFactory.newInstance()` 和 `javax.xml.stream.XMLOutputFactory.newInstance()`
    的输出

    *   对于 XPath，不要使用 `javax.xml.xpath.XPathFactory.newXPath()`，而是使用 `org.apache.xpath.CachedXPathAPI`。


    我们将在第 11 章中更详细地讨论如何检测和修复这些问题。


    缓存正确的对象有助于避免第一种反模式（不必要的初始化）。同样的情况也适用于网络：缓存并重用网络连接（即 TCP 套接字）比每次请求都关闭并重新创建它要高效得多。例如：

