- fmt: "# Main Anti-Pattern #4: Large Processing Challenge\n\nThis anti-pattern describes\
    \ I/O and other hardware limitations to big performance challenges, like lookups\
    \ on a few billion rows of data or repeatedly pushing several megabytes over a\
    \ really slow network. Enterprise software development has very few of these large,\
    \ difficult challenges. But when you do encounter one, I recommend extra design\
    \ and testing care, respect, and a healthy dose of trepidation. Optimizing everything\
    \ else is almost trivial.\n\n`Large Processing Challenge` is the last of the four\
    \ Main Anti-Patterns. As I mentioned, anti-pattern 1 shows up the most, and anti-pattern\
    \ 4 shows up the least. You can count yourself as an exception if you are on the\
    \ bleeding edge and trying new things, and regularly encounter many of these big\
    \ challenges. Congratulations. But for the rest of us writing enterprise web applications,\
    \ there are very few big processing challenges that inspire this kind of fear.\
    \ Here are a few examples of these large challenges:\n\n*   Lookups on just a\
    \ few records in a table with 200 million records.\n*   Transferring a lot of\
    \ data (say more than a megabyte) repeatedly over a slow network, especially over\
    \ long distances.\n*   Multi-threaded performance is tough to get right, but there\
    \ are many readily available APIs and solutions, where someone else already got\
    \ performance right.\n\nHow will you know which processing challenges are `Large`?\
    \ These kinds of challenges are so enormous, they will show up regardless of:\n\
    \n*   Language (`Java`, `C#`, `C++`, …)\n*   Operating System\n*   Selection of\
    \ API (like `StAX` vs `SAX` for XML parsing)\n*   Idiom your code uses to access\
    \ the API, like `Xalan` vs. `Saxon` for XSLT transformation\n\nPreparing for these\
    \ large challenges takes so much work, it seems that preparations should begin\
    \ back when the design document is created. If you truly fear a large processing\
    \ challenge, invest the time to test its feasibility early in the project; perhaps\
    \ hardware experts could contribute here.\n\nIt's common for developers to mistake\
    \ an inadvertent glut of data for a large processing challenge. For example, why\
    \ suffer slow responses from queries through 10 years of historical data when\
    \ queries through 2 years of data would perform quite nicely, and the business\
    \ side would be happy retaining a single year of data?\n\nThe troubleshooting\
    \ techniques in this book will certainly identify performance issues with large\
    \ processing challenges, both real and imagined. However, I must admit that creating\
    \ solutions for large challenges is out of scope for this book, mostly because\
    \ genuine issues of this type are rare.\n\n## Assessing the Size of a Processing\
    \ Challenge\n\nIt makes perfect sense why large processing challenges (Main Anti-Pattern\
    \ 4) show up on some kind of a performance radar that highlights performance problems,\
    \ especially when troubleshooting online, Java server-side systems—the main topic\
    \ of this book.\n\nBecause of the hard work it takes to tackle large processing\
    \ challenges like this, development teams should anticipate the extra work and,\
    \ in scheduling, increase the priority of the performance tuning effort. However,\
    \ when smaller performance challenges show up on performance radar, they get in\
    \ the way of other priorities like tuning large performance challenges. They steal\
    \ time from other parts of the development lifecycle as well: design, development,\
    \ QA, and so on.\n\nTuning small performance challenges is essentially a nuisance;\
    \ in my experience, slowdowns in small performance challenges make up an unexpectedly\
    \ large portion of the pool of all performance defects.\n\nSo when looking at\
    \ any piece of data that might indicate a slowdown, do this:\n\n*   Make a rough,\
    \ mental assessment of whether the processing at hand is a large, medium, or small\
    \ processing challenge.\n\nHere is an important hint to help find small challenges\
    \ to tune: generally, when tasked to code something like an SOA service or a web\
    \ request, there is one main task to be processed. An order must be placed; the\
    \ query results must be returned; the store closing must commence. Almost by definition,\
    \ processing that happens before or after the `main task` is a small challenge,\
    \ and any corresponding slowdown is a nuisance to be eradicated. Likewise, so\
    \ called `cross-cutting concerns` like logging, auditing, and security and even\
    \ monitoring itself are likely candidates for small processing challenges.\n\n\
    Furthermore:\n\n*   When a slow-looking, small processing challenge involves a\
    \ publicly available API, that API's user community is highly likely to have experience\
    \ with the slowdown for you to learn from.\n\nTake the time to seek out this performance\
    \ experience—on doc pages, Internet searches, wherever. Just tack the word `performance`\
    \ to the name of the API in your search criteria and search away. Ask questions\
    \ in user forums. Also, when I say `publicly available API`, certainly anything\
    \ available from `github.com` and `mvnrepository.com` falls in this category.\
    \ I have seen a great many performance defects in my ten years of tuning experience,\
    \ and the good people of the Internet always seem to beat me to the punch. When\
    \ the size of the processing challenge is small and the API in use is publicly\
    \ available, others have already documented the issues and discovered reasonable\
    \ workarounds.\n\n## Using the Main Performance Anti-Patterns\n\nHere is walkthrough\
    \ of how to put these anti-patterns to work.\n\n1.  Start by collecting data using\
    \ the `P.A.t.h.` Checklist, which begins in Chapter [8](#A449023_1_En_8_Chapter.html).\
    \ Of all the `P.A.t.h.` data, choose the measurement/result that looks the most\
    \ problematic, whose fix would make the most positive impact on performance.\n\
    2.  Ask whether this `most problematic` measurement looks like main anti-pattern\
    \ 1.\n    *   Does it deal with static data, or at least no dynamic data?\n  \
    \  *   Is the static data reprocessed for every system request?\n    *   Is a\
    \ small amount of I/O involved each time the static data is reprocessed?\n   \
    \ *   …and so on\n3.  If the data seems to fit main anti-pattern 1, then congratulations,\
    \ you have built a nice hypothesis for the problem. To test the hypothesis, apply\
    \ a fix to your system and retest and reassess performance. This is how to `build\
    \ a case` for a performance defect.\n4.  If the `most problematic` measurement\
    \ data does not seem to fit 1, then move on to main anti-pattern 2.\n5.  Continue\
    \ to evaluate all four main anti-patterns. It's highly unlikely that none of them\
    \ will fit."
