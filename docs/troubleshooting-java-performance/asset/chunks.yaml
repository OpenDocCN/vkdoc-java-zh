- fmt: '### Reproducing Bad Performance


    As mentioned, the 100% CPU landmark is important for demonstrating scalability.
    The other three landmarks (25%, 50%, 75%) serve as little breakpoint tests for
    all those applications that do not perform as well as the SUT in Figure [6-4](#A449023_1_En_6_Chapter.html#Fig4)—which
    means most applications. The CPU landmarks show exactly how much load you need
    to apply to reproduce a performance problem. For example, let us say that you
    have nice chiseled and squared steps at the first two load increments (25% and
    50% CPU), but throughput will not climb and the CPU will only push to, say, 55%
    in the third load increment. Bingo. You have reproduced the problem, which is
    the first part of “seeing” the problem. The second and last part of “seeing” the
    problem is to look at the right performance data using the right monitoring tools,
    as described in P.A.t.h. chapters, starting in Chapter [8](#A449023_1_En_8_Chapter.html).


    When a seemingly formidable opponent is taken down by a lesser challenger, headlines
    are quick to hail the underdog and disgrace the dethroned champion. Likewise,
    if a seemingly robust SUT exhibits a monumental performance problem with very
    few threads of load, this is a critical problem, indeed. The smaller the amount
    of load required to reproduce a performance defect, the more critical the problem.
    As such, reproducing a problem at 25% CPU shows a much more critical problem than
    that same issue produced at a higher CPU percentage. Don’t forget that the priority
    and/or criticality that you designate for an issue in a defect tracking system
    should somehow reflect this. Additionally, an unnecessarily high amount of load
    often introduces others issues (like the concurrency cap issues discussed in Chapter
    [5](#A449023_1_En_5_Chapter.html) on invalid load tests), that complicate an already
    difficult troubleshooting process. The lesson here is to apply only as much load
    as it takes to reproduce the problem—any more load than that unnecessarily complicates
    matters.


    Once the Scalability Yardstick establishes the smallest amount of throughput required
    to transition from chiseled steps into erratic chaos and thus demonstrate a performance
    problem, it is helpful to switch from the Yardstick load plan to a steady-state
    load plan. You can then change the load plan to extend the duration of the test—the
    goal is to provide ample time to review the P.A.t.h. Checklist and start capturing
    data from the monitoring and tracing tools.


    Once the problem has been identified and a fix deployed, a rerun of the steady-state
    test provides a great before-after comparison and a compelling story for your
    team. If the system change brings us closer to our performance goals (higher throughput
    and/or lower response time and/or lower CPU consumption), then the change is kept
    and the cycle begins again by rerunning the Yardstick to see where the next problem
    lies. Remember that the fix has changed the performance landscape and you will
    likely need to recalibrate the Yardstick by rerunning the Yardstick Calibration
    test.


    We use the Scalability Yardstick for two purposes: measure the best throughput
    and reproduce performance defects. When the detect-reproduce-fix cycle all happens
    on a single machine/environment, the single-threaded workflow drags to a slow
    crawl: developers are forced to stand in line to run another test on the “golden”
    environment to get feedback on proposed code fixes. Comparing the performance
    of multiple code options is thus rendered infeasible, because access to the busy
    golden environment is in high demand. To get around this, the best performance
    engineers are skilled at enabling developers to work independently, to reproduce
    performance defects themselves, perhaps on their own desktops, and perhaps even
    comparing the performance of multiple design approaches. This is yet another benefit
    of the Modest Tuning Environment discussed back in Chapter [2](#A449023_1_En_2_Chapter.html).


    ### Good and Bad CPU Consumption


    Not all high CPU consumption is bad, especially when scalability is important.
    In fact, if building scalable systems is part of our goal, then we should actively
    drive systems to make leaps in throughput, while using all 100% of the CPU, at
    least in test environments. Of course, CPU that does not contribute to throughput
    is bad. For example, consider the case when the CPU hits 100% during application
    server start up when no load is applied. This is bad CPU.


    One way to look at bad performance is that it is caused by either too little or
    too much CPU consumption. The first kind, “too little CPU,” behaves like this:
    no matter how many threads of load are applied, the SUT throughput will not climb
    much, even though there is plenty of available CPU. The SUT acts as if an unimaginably
    heavy blanket, one that is many times heavier than the lead apron you wear to
    protect your body during a chest x-ray, has been cast on top of the frail throughput
    and CPU lines, holding them down, keeping them from making the responsive throughput
    leaps found in scalable systems.


    As such, when that heavy blanket camps out on top of your SUT, using faster CPUs
    will provide only marginal benefits. Adding more of the same kind of CPU will
    just damage your pocketbook.


    I will defend to the death the reasoning behind driving CPU consumption up to
    100%, especially when throughput is bursting through the ceiling.


    Why? If it is not proof of scalability, it is certainly a required attribute thereof.
    Flirting with 100% CPU like this is understandable, but there is no sense in applying
    more load if the CPU is already at 100%. As part of a negative test, this might
    be helpful, but it is a dead end when you are looking for more throughput.


    Even when faced with really low throughput, technicians sometimes boast about
    their SUT’s low CPU consumption. It takes work to help them figure out that, in
    this light, low CPU consumption is bad and not good. On the other hand, low CPU
    consumption is good when you are comparing two tests whose performance is alike
    in every way (especially throughput), except that CPU is lower on one.


    With the second kind of poor performance, “too much CPU,” the SUT burns through
    so much CPU that you would need an entire farm of busily grazing CPUs to generate
    enough throughput to meet requirements, when a better-tuned SUT would just require
    a few CPUs, slowly chewing cud. This is why its helpful to introduce a performance
    requirement that caps the amount of money spent on hardware.


    “Too much CPU” should guide us to optimize code that is both unnecessary and CPU
    hungry. The tools to point out which code is CPU hungry are discussed in the P.A.t.h.
    Checklist for threads, Chapter [11](#A449023_1_En_11_Chapter.html). And whether
    code is unnecessary is of course subjective, but there are some great, concrete
    examples of unnecessary code in that same Chapter [11](#A449023_1_En_11_Chapter.html).
    “Too little CPU” indicates that contention or I/O or other response time issues
    are holding back the system from generating enough throughput. Guidance for addressing
    these problems is scattered throughout four chapters covering the P.A.t.h. Checklist,
    starting in Chapter [8](#A449023_1_En_8_Chapter.html).'
