  raw: "## Quick Review\n\nThe first three chapters set the stage for what to expect\
    \ when performance tuning.\n\n*   Chapter [1](#A449023_1_En_1_Chapter.html): I\
    \ presented the Main Performance Anti-Patterns early on so you have a rough idea\
    \ what to look for when hunting for performance defects. Start with the first\
    \ anti-pattern, and ask whether it matches the problem that you’re seeing. If\
    \ you find a match, generally you can stop; otherwise check out the second, third,\
    \ and fourth ones in order.\n    1.  Unnecessary Initialization : Small processing\
    \ challenges that mostly happen prior to and during the initialization for the\
    \ main (larger) processing event in your request, they often have a small amount\
    \ of I/O but are repeated many times.  \n    2.  Strategy / Algorithm Inefficiency\
    \ : A misconfigured or poorly chosen algorithm or coding strategy is causing performance\
    \ problems. A strategy is a technique used throughout a code base, and an algorithm\
    \ is a plan used to implement a single component.  \n    3.  Overprocessing :\
    \ The system is doing unnecessary work. Removing that work provides measurable\
    \ performance benefit. One example is retrieving too much data, where most of\
    \ the data is discarded. Another example is including in your load test the wrong\
    \ resource-hungry use case—one that is seldom used in production.  \n    4.  Large\
    \ Processing Challenge : Attempting to process and conquer a massive amount of\
    \ data. Very few applications legitimately have such a need, but these do exist.\
    \ Other examples would be querying 4 billion rows of data, transferring 10MB of\
    \ data repeatedly over a slow network, and the like.  \n*   Chapter [2](#A449023_1_En_2_Chapter.html):\
    \ A Modest Tuning Environment : This chapter showed how most performance defects\
    \ can be found in both large and small environments. It showed a few techniques\
    \ (stub servers, graphing CPU by PID) that are very helpful for tuning in a smaller\
    \ environment, where tuning can be especially productive, with as many as 10 fix-test\
    \ cycles in a single day.\n*   Chapter [3](#A449023_1_En_3_Chapter.html) on metrics\
    \ is a life preserver to keep you from drowning in a vast sea of confusion deciding\
    \ which performance metrics to use:\n    *   Load generator metrics , for the\
    \ most part, assess whether performance requirements have been met. Enough throughput?\
    \ Fast enough response time?\n    *   Resource consumption metrics show when you\
    \ have run out of hardware, CPU or RAM, meaning you’ll either need more hardware\
    \ or you need to tune the system to consume less.\n    *   Lastly, “Blame metrics”\
    \ point to which component in the SUT is causing the slowdown or high CPU consumption;\
    \ this is the part we are about to get to. The P.A.t.h. Checklist in the next\
    \ four chapters provides these ‘blame’ metrics.\n\nBut before you can reproduce\
    \ and solve performance troubleshooting problems, you must first master the basics\
    \ of load generation, as I have detailed in the load generation Chapters [4](#A449023_1_En_4_Chapter.html),\
    \ [5](#A449023_1_En_5_Chapter.html), [6](#A449023_1_En_6_Chapter.html) and [7](#A449023_1_En_7_Chapter.html).\
    \ Let’s cement those basics in your head with a quick overview before moving on\
    \ to the part where we cast blame upon slow or otherwise problematic SUT components.\n\
    \n*   Chapter [4](#A449023_1_En_4_Chapter.html) on load scripting priorities discussed\
    \ how load scripts must be recorded and enhanced to produce a realistic load.\
    \ Don’t forget how we broke down the various script enhancements into First Priority\
    \ and Second Priority. The First Priority script enhancements are enough to stress\
    \ out the SUT’s basic architecture, where fixing a single performance defect can\
    \ improve performance for many business processes across the entire architecture.\
    \ The Second Priority script enhancements aim for that added touch of “system\
    \ realism” on individual business processes. Fixing these kinds of defects might\
    \ be critical, but their impact is limited to individual business process.\n*\
    \   Chapter [5](#A449023_1_En_5_Chapter.html) on Invalid Load Tests details a\
    \ few circumstances (seen all too frequently) that make a given load test so unlike\
    \ production that the results should be discarded. This is your chance to learn\
    \ from the many mistakes that I and others have made. Don’t generate load over\
    \ a WAN. Raise resource caps before tuning and lower them before deploying into\
    \ production. Triple check that the business processes (and the data) in your\
    \ load script pretty much match those used in production. Enhance your load script\
    \ to make sure there are no errors and the right data is getting returned. Be\
    \ vigilant in using Brendan Gregg’s USE method: [`http://www.brendangregg.com/usemethod.html`](http://www.brendangregg.com/usemethod.html)\
    \ to always watch resource consumption. Don’t waste time tuning edge cases.\n\
    *   Chapter [6](#A449023_1_En_6_Chapter.html) on the Scalability Yardstick provides\
    \ marching orders for what tests to run and how much load to apply on a day-to-day\
    \ basis. A doctor will assess the health of your sprained ankle by manipulating\
    \ it and increasing pressure on it until you show signs of pain. Likewise, the\
    \ Scalability Yardstick load test directs you to increase the load until the SUT\
    \ shows signs, from load generator metrics, of “bad performance.” Remember the\
    \ clean, squared, leaps of throughput? You start by putting your SUT (and its\
    \ performance problem) under the microscope. You do this by reproducing the performance\
    \ problems using the Scalability Yardstick load test. Do you remember how this\
    \ works? You run an incremental load test with four steps of load, the first of\
    \ which pushes the app server CPU to 25%. Then you see at which of the four steps\
    \ the nice, squared steps of throughput disintegrate into jagged and jumpy chaos—and\
    \ you have reproduced the problem.\n*   Chapter [7](#A449023_1_En_7_Chapter.html)\
    \ showed how anything in JMete r can be tested out in a small sandbox environment\
    \ before live HTTP requests are sent across the wire. It showed the high-level\
    \ tree structure of a load test, as well as how to capture and display extra metrics\
    \ like CPU consumption from your SUT. Calibrating the Scalability Yardstick test\
    \ was a lot easier because we saw on a single JMeter graph exactly how many threads\
    \ it took to push the app server CPU to 25%."
  trans: "\n## 快速回顾\n\n前三章为性能调优的预期奠定了基础。\n\n*   第 1 章：我提前介绍了主要的性能反模式，以便你在排查性能缺陷时对需要关注的内容有个大致概念。从第一个反模式开始，判断它是否与你遇到的问题相符。如果匹配，通常可以就此打住；否则，请依次检查第二、第三和第四个反模式。\n\
    \    1.  **不必要的初始化**：主要发生在请求的主（较大）处理事件之前和期间的小型处理挑战，通常涉及少量 I/O 但会重复多次。\n    2.\
    \  **策略/算法低效**：配置不当或选择不佳的算法或编码策略导致了性能问题。策略是贯穿整个代码库使用的技术，而算法是用于实现单个组件的方案。\n   \
    \ 3.  **过度处理**：系统正在执行不必要的工作。移除这些工作能带来可衡量的性能提升。一个例子是检索了过多数据，其中大部分数据被丢弃。另一个例子是在负载测试中包含了错误的、资源消耗大的用例——该用例在生产环境中很少使用。\n\
    \    4.  **大型处理挑战**：尝试处理并征服海量数据。很少有应用真正有这种需求，但确实存在。其他例子包括查询 40 亿行数据、在慢速网络上重复传输\
    \ 10MB 数据等。\n*   第 2 章：适度的调优环境：本章展示了大多数性能缺陷如何在大型和小型环境中都能被发现。它介绍了一些在较小环境中非常有用的技术（如存根服务器、按\
    \ PID 绘制 CPU 图表），在这些环境中调优效率尤其高，一天内可完成多达 10 个修复-测试周期。\n*   第 3 章关于指标，它就像一件救生衣，防止你在决定使用哪些性能指标时陷入一片混乱的海洋中：\n\
    \    *   **负载生成器指标**，在很大程度上，用于评估性能要求是否已满足。吞吐量足够吗？响应时间够快吗？\n    *   **资源消耗指标**显示硬件、CPU\
    \ 或 RAM 何时耗尽，这意味着你需要更多硬件，或者需要调优系统以减少消耗。\n    *   最后，**“责任指标”**指向被测系统（SUT）中导致速度变慢或\
    \ CPU 高消耗的组件；这正是我们接下来要处理的部分。接下来四章中的 P.A.t.h. 检查清单提供了这些“责任”指标。\n\n但在你能重现并解决性能故障排除问题之前，你必须首先掌握负载生成的基础知识，正如我在负载生成章节第\
    \ 4 章、第 5 章、第 6 章和第 7 章中详述的那样。在进入将责任归咎于缓慢或有问题的 SUT 组件的部分之前，让我们通过一个快速概览将这些基础知识牢牢印在你的脑海中。\n\
    \n*   第 4 章关于负载脚本优先级，讨论了如何录制和增强负载脚本以产生真实的负载。别忘了我们如何将各种脚本增强分解为**第一优先级**和**第二优先级**。第一优先级的脚本增强足以对\
    \ SUT 的基本架构施加压力，修复单个性能缺陷可以改善整个架构中许多业务流程的性能。第二优先级的脚本增强旨在为单个业务流程增加“系统真实性”的触感。修复这类缺陷可能至关重要，但其影响仅限于单个业务流程。\n\
    *   第 5 章关于无效负载测试，详细说明了一些（屡见不鲜的）情况，这些情况使得给定的负载测试与生产环境如此不同，以至于结果应该被丢弃。这是你从我和其他人犯过的众多错误中学习的机会。不要通过广域网生成负载。在调优前提高资源上限，在部署到生产环境前降低它们。再三检查负载脚本中的业务流程（和数据）是否与生产环境中使用的基本匹配。增强你的负载脚本，确保没有错误并且返回了正确的数据。警惕地使用\
    \ Brendan Gregg 的 USE 方法：[`http://www.brendangregg.com/usemethod.html`](http://www.brendangregg.com/usemethod.html)\
    \ 来持续监控资源消耗。不要浪费时间调优边缘情况。\n*   第 6 章关于可扩展性标尺，提供了日常运行哪些测试以及施加多少负载的明确指令。医生会通过扭动你扭伤的脚踝并逐渐增加压力，直到你表现出疼痛迹象来评估其健康状况。同样，可扩展性标尺负载测试指导你增加负载，直到\
    \ SUT 从负载生成器指标中显示出“性能不佳”的迹象。还记得那干净、整齐的吞吐量阶梯吗？你首先将 SUT（及其性能问题）置于显微镜下。通过使用可扩展性标尺负载测试重现性能问题来实现这一点。你还记得这是如何工作的吗？你运行一个包含四个负载步骤的增量负载测试，第一步将应用服务器\
    \ CPU 推高到 25%。然后观察在四个步骤中的哪一步，整齐的吞吐量阶梯会瓦解成锯齿状、跳跃的混乱状态——这样你就重现了问题。\n*   第 7 章展示了在通过线路发送实时\
    \ HTTP 请求之前，如何在小型沙盒环境中测试 JMeter 中的任何内容。它展示了负载测试的高级树形结构，以及如何捕获和显示来自 SUT 的额外指标，如\
    \ CPU 消耗。校准可扩展性标尺测试变得容易得多，因为我们在单个 JMeter 图表上就能精确看到需要多少个线程才能将应用服务器 CPU 推高到 25%。\n"
- fmt: '# Working the P.A.t.h. Checklist


    With all of this slightly mundane groundwork behind us, the stage is set, and
    let the drum roll begin. The next four chapters finally show how to identify and
    blame and ultimately fix specific components of the SUT for performance problems.


    To give yourself time to inspect the problem using the four different lenses,
    you need to manually reconfigure your load plan from four steps of incremental
    load to be a single steady-state test at the first level after the clean, squared
    throughput step disappeared. Perhaps set the duration to 20-30 minutes, knowing
    that you’ll stop the test as soon as these performance lenses show you some actionable
    intelligence.


    For example, say your Scalability Yardstick test ran with two threads at each
    level of load, and each level lasted for 2 minutes. If you got clean, chiseled
    steps at about 25% CPU (two threads) and 50% CPU (four threads) but no chiseled
    leaps after that, then the steady state “let’s reproduce the bug” test needs to
    run at six threads for the duration (20-30 minutes).


    While the load test with the performance problems is running at steady state,
    you will look at the SUT using each of the four items in the checklist. The problem
    (or problems) you are experiencing will show up in one or more of the lenses.
    So what does this mean, to look through a lens?


    As you will see in the coming chapters, each of the four checklist items has its
    own set of monitoring and tracing tools (freely available), and I will describe
    how to capture and interpret the data from each, giving a “problem” or “no problem”
    assessment for each checklist item. The goal, of course is blame. To blame one
    particular component of the system for the performance problem(s) and then dream
    up a fix.


    As the chapters ahead will show you, the four checklist items will point out a
    few problems. Somewhat subjectively, you need to pick one of these issues to attack
    first—whichever issue provides the most bang for the buck. In other words, you
    generally want to attack the defect that provides the biggest performance boost
    with the smallest effort, which may be a code change, configuration change, data
    change, or even a load script change.


    Here are the four items in the P.A.t.h. checklist:


    *   P    Persistence : slow JDBC invocations and calling any one SQL too much.

    *   A    Alien systems (network calls to a system outside your main JVM)

    *   t    Threads (CPU overconsumption and blocked threads)

    *   h    Heap (garbage collection inefficiencies and memory leaks)


    But what is so special about these four particular areas? For starters, this is
    simply a convenient way to categorize the locations of today’s most common server
    side performance problems, but also to pair up those locations with their own
    set of observability tools. But more practically, the P for persistence represents
    the database, and there is wide agreement that database has more performance problems
    than any other area. We will focus on JDBC systems, but the same issues with JDBC
    performance in the P chapter also apply to NoSQL databases, as well; all this
    is covered in Chapter [9](#A449023_1_En_9_Chapter.html). I made up the term “Alien
    systems ”—it is kind of a placeholder for performance issues with any system our
    JVMs talks to over a network. That is Chapter [10](#A449023_1_En_10_Chapter.html).


    So the P and the A are systems we integrate with. The t and the h are different.
    Every bit of our Java code is run in by an operating system thread, so the t for
    Threads explores thread efficiency. Are there blocked threads? (More on this later.)
    Are there small processing challenges that are unnecessarily eating a lot of CPU?
    Lastly, the h in PATH stands for the health of the Heap. Poor garbage collection
    efficiency can really hurt performance, as well as stability. I was always hesitant
    to wade into the complex waters of understanding GC algorithms . Among other things,
    this h chapter goes out of its way to show how surprisingly little you have to
    know about GC to improve performance. The t and the h are in Chapters [11](#A449023_1_En_11_Chapter.html)
    and [12](#A449023_1_En_12_Chapter.html), respectively.


    I mentioned earlier that the P and the A in P.A.t.h. are spelled out with capital
    letters because they are special: most of the time, you can detect problems in
    those areas with just a single user’s traffic. One of the reasons this is true
    is because a single, lonely query to a large, unindexed table is often real slow,
    like slower than 1 second. Likewise, executing 100 SQL/NoSQL requests will likely
    be slow (more than 1 second) with any number of users, including just one.


    Since no load required is required and it’s easier to capture a one-time sample
    of P and A activity, you get the great benefit of being able to detect and fix
    performance problems without a load script (like a JMeter one) and without a load
    environment—any environment will suffice with P and A. An unindexed query to a
    large table is a good example of this, where lowering response time will yield
    higher throughput.


    Unfortunately, the same thing does not work with the t. and the h. in P.A.t.h.
    Why? Because it takes more than one thread to cause a performance problem with
    the `synchronized` keyword. Likewise, it takes a good deal of traffic to exacerbate
    a memory leak or misconfigured Garbage Collection .


    While you are running a Scalability Yardstick test to reproduce a performance
    problem, the four items in the checklist will show you what components are to
    blame for the performance problems. Of course, you might find problems in more
    than one of the checklist items while you are running a single test. If so, you
    will have to triage the problems and decide which one(s) to fix first.


    In this triage process, you will have to make decisions like, “Which should we
    tune first, the slowest query in the system that is taking 1.5 seconds, or repeated
    BLOCKED threads in our XML processing?”


    Remember the P.A.t.h. acronym. Persistence, Alien systems , Threads, and Heap.
    I mentioned this first in the chapter on load scripting priorities, but keep in
    mind that the first two checklist items, persistence and alien systems, highlight
    many tuning opportunities without load generation—in other words, when a single
    user traverses the system. If your performance environment is not yet built or
    if your load scripts are not yet created, you can still get started on improving
    performance.'
