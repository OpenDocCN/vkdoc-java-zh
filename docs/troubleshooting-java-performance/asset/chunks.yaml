  trans: '

    ## 调试 HTTP 录制


    使用 XML Schema 验证器可能非常令人头疼。验证错误信息晦涩难懂，简直不像英语。这让我想起与英语作为第二语言（ESL）班级里最笨的学生进行技术支持通话的情景。³
    但比使用严格管控的 XML Schema 更糟糕的，是系统根本没有 schema，没有任何关于正确/错误输入的明确规则。


    这恰恰类似于负载生成器正确组装 HTTP GET 请求以传递给 Web 应用程序的任务。HTTP GET 请求需要哪些 URL 参数？使用了哪种 Web 认证方式？是否需要
    CSRF 令牌或 JSESSIONID？还有其他 Cookie 吗？被测系统（SUT）的浏览器代码从前一个 HTML 响应中提取了哪些 HTML“隐藏”变量，并用于构建后续页面的
    HTTP GET 参数？所有这些不确定性让我渴望某种能清晰阐明需求的、严格管控的 schema。事实上，回答错任何一个问题通常都会导致不完整的 HTML 响应和/或服务器端异常，而出现此类错误很可能表明你的
    `.jmx` 负载脚本已损坏——或许与 SUT 的需求不同步了。


    处理这种不确定性的一种方法是，保留初始录制时的详细 HTTP 日志备份，以及最初录制的负载脚本本身。这就创建了一个包含所有必需数据项的小型“保险库”；它虽然不是
    schema，但也足够接近了。但随后负载脚本的维护工作就开始了。在按照第 4 章所述增强脚本时，很容易在后期引入错误。还记得吗？这些更改是为了让你的负载更接近实际生产负载。


    当负载脚本出现错误时，你可以通过对原始详细 HTTP 日志和包含该错误的测试运行日志进行详细的文本文件“差异比较”，来检查是否拥有所有必需的数据项。以下 JMeter
    指令展示了如何捕获这些详细的 HTTP 日志。


    当你查看这些日志之间的差异时，最常发现的是你并未完全理解 HTTP GET 的需求（上文两段所述）。或者，你可能部署了不同版本的 SUT，其对 HTTP GET
    有不同的需求。


    重申一下，你需要进行的“差异比较”是在两个不同的日志之间：一个是业务流程的 HTTP 录制日志，另一个是回放脚本时产生的日志。我使用 JMeter 的“查看结果树”来创建这些日志。用于录制的日志必须位于工作台（Workbench）下（见图
    7-18）。用于回放的日志必须配置为像第一个日志一样以 XML 格式记录，但它必须是测试计划（Test Plan）的直接子节点，并使用不同的输出文件名（显然）。你可以使用
    JMeter 的复制/粘贴功能，将工作台中创建的日志（按照以下说明）复制到测试计划中。


    ![A449023_1_En_7_Fig18_HTML.jpg](img/A449023_1_En_7_Fig18_HTML.jpg)


    图 7-18.


    JMeter 录制模板（文件 ➤ 模板 ➤ 录制 ➤ 创建），用于录制完整的请求/响应以及 HTTP 录制过程的其他详细信息


    要捕获 HTTP 录制的详细日志，请执行以下操作：


    1.  启动一个新的测试计划用于录制：文件 ➤ 模板 ➤ 录制 ➤ 创建。  

    2.  选择工作台（WorkBench）下的“查看结果树”，如图 7-18 所示。  

    3.  指定要创建的日志的路径/文件。  

    4.  确保“错误”复选框未被勾选。这将确保所有内容都被记录下来。  

    5.  单击“配置”按钮，并按照前面图 7-13 所示设置勾选标记。  

    6.  按照 JMeter 文档所示开始录制：（ [`http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf`](http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf)
    ）。


    ## 直接对 Java 进行负载测试与调试


    曾几何时，我对一个贷款系统的报表部分进行负载测试。当用户请求一个 1K 的小报表时，系统必须从特定的字节偏移量处，从一个定期从后端系统下载的、单个数兆字节的文件中提取数据。该组件在负载下的响应时间慢至
    5 秒；服务器端并发度约为五个线程。


    不幸的是，系统因数据库维护而停机，因此无法进一步调查环境。我无法访问源代码，于是反编译了源代码（使用 jad.exe）进行查看。代码使用 `java.io.FileInputStream`
    的 read() 方法一次一个字节段地读取文件，这种方法无法跳过任何字节或跳转到文件中的特定位置。所以，如果我的 1K 报表位于 10MB 捆绑报表的末尾，代码就必须读取并丢弃
    9MB 以上的数据。真是浪费！顺便提一下，这是主要反模式 3——过度处理的一个例子。


    因此，我需要测试我的新代码实现，它使用 `java.io.RandomAccessFile` 直接“定位”到指定的偏移量并返回 1K 报表。当我用单个线程连续运行测试
    100 次时，新实现更快。但我必须说服我的老板，在五个线程负载下的响应时间会比之前看到的 5 秒更好。


    我知道如何启动我的代码的五个独立线程，但我认为从这些独立线程收集结果需要花费太多时间编码，然后我还得用某种方式将数据绘制成图表。因此，我没有自己启动这五个线程，而是让
    JMeter 替我完成。


    事后看来，我本可以使用 JDK 自带的 `jmh`：


    [`http://openjdk.java.net/projects/code-tools/jmh/`](http://openjdk.java.net/projects/code-tools/jmh/)


    下面展示了我如何让 JMeter 启动五个线程，全部运行我的 RandomAccessFile 报表代码实现；总共花了大约 15 分钟才全部搞定。最终我得到了
    JMeter 图表，比较了两种实现的性能，RandomAccessFile 方法快得多——在五个线程负载、零思考时间下，响应时间约为 100-400 毫秒。


    1.  将你想要进行性能测试的代码放入一个新类中，该类实现 [`org.apache.jmeter.protocol.java.sampler.JavaSamplerClient`](https://jmeter.apache.org/api/org/apache/jmeter/protocol/java/sampler/JavaSamplerClient.html)
    。继承以下类之一也可能有帮助：`org.apache.jmeter.protocol.java.sampler.AbstractJavaSamplerClient`
    `org.apache.jmeter.protocol.java.test.JavaTest`  

    2.  创建一个新的 jar 文件，其中包含你的类及其依赖的类文件，但无需将文件打包到 JMeter 的包空间中。  

    3.  将你的 `.jar` 文件以及任何依赖的第三方 jar 文件添加到 `JMETER_HOME/lib/ext` 文件夹中。  

    4.  创建一个新的 JMeter `.jmx` 计划。添加一个线程组并配置五个负载线程。  

    5.  作为该线程组的子节点，添加一个新的 Java 请求采样器：[`http://jmeter.apache.org/usermanual/component_reference.html#Java_Request`](http://jmeter.apache.org/usermanual/component_reference.html#Java_Request)
    。  

    6.  重启 JMeter。  

    7.  选择 Java 请求采样器。在“类名”组合框中，选择你在步骤 1 中编写的类名。  

    8.  要启用调试，请在启动 jmeter.sh 或 jmeter.cmd 之前添加以下环境变量：`JVM_ARGS=-agentlib:jdwp=transport=dt_socket,server=y,address=8000`
     

    9.  在 Eclipse 中，启动一个监听端口 8000 的远程调试会话。在你的源代码中设置断点，然后从 JMeter 菜单（运行 ➤ 启动）启动 JMeter
    脚本以触发断点。

    '
- fmt: "# JMeter Sandbox\n\nThe JMeter `.jmx` file for this section and the next section\
    \ is located in the `jpt` repo in this location:\n\n```\nsampleJMeterScripts/jpt_ch07_sandbox.jmx\n\
    ```\n\nAre you a little hesitant about mastering the art of load generation? You\
    \ should be—it takes work. But fortunately, learning JMeter is easier than other\
    \ load generators, because you can test just about every Test Element in its own\
    \ little sandbox without the complexity of your SUT. So turn off the Wi-Fi (don’t\
    \ do that) and let’s get started:\n\nWith this little sandbox technique, you can:\n\
    \n1. Create graphs with lots of live-looking squiggly lines, even ones with different\
    \ metrics (like response time and throughput) on the same graph.\n2. Process text,\
    \ like creating an “output-input” script variable, that ever-so-important technique\
    \ I mentioned in Chapter [4](#A449023_1_En_4_Chapter.html) on load scripting priorities.\n\
    3. Read data from a `.csv` file into JMeter script variables.\n4. Control script\
    \ flow using “If-then” logic or perhaps repeating a few steps with a Logic Controller.\n\
    5. …much, much more.\n\nOnce we cover items 1 and 2 from this list of sandbox\
    \ tests, you will be primed and ready to play (yes play) with 3, 4, and 5 for\
    \ homework. It is just plain fun. Here is how the sandbox works: close out any\
    \ script you’re working on and add a Thread Group and a child [`jp@gc - Dummy\
    \ Sampler`](http://jmeter-plugins.org/wiki/DummySampler/) ( [`https://jmeter-plugins.org/wiki/DummySampler/`](https://jmeter-plugins.org/wiki/DummySampler/)\
    \ ). Here are the steps:\n\n1. Right-click on the Test Plan and choose Add ➤ Threads\
    \ (Users) ➤ Thread Group.\n2. Configure test duration.\n3. Check Forever to keep\
    \ the test running indefinitely (Run ➤ Shutdown, or Ctrl/Cmd+Comma to stop the\
    \ test).\n\n   ![A449023_1_En_7_Figf_HTML.jpg](A449023_1_En_7_Figf_HTML.jpg)\n\
    \n4. Or leave Forever unchecked and put a 1 in the adjacent text box to run the\
    \ Dummy Sampler just one time—used to run your script just one time, as when testing/debugging.\n\
    5. In the tree on the left side of the screen, right-click on the new Thread Group\
    \ and select Add ➤ Sampler ➤ `jp@gc - Dummy Sampler`.\n6. Select the newly added\
    \ Dummy Sampler and duplicate it using the hotkey Ctrl+Shift+C.\n7. See how I\
    \ added `- 01` and `- 02` to the sampler names? The JMeter tree is on the left\
    \ side of the screen. Look on the right side for the Name input box (above the\
    \ word Comments). You can add the `- 01` or `- 02` to change the name here.\n\n\
    This will leave you with the screen shown in Figure [7-19](#A449023_1_En_7_Chapter.html#Fig19).\n\
    \n![A449023_1_En_7_Fig19_HTML.jpg](A449023_1_En_7_Fig19_HTML.jpg)\n\nFigure 7-19.\n\
    \nThe Basic Sandbox. This is the foundation of JMeter’s sandbox play environment.\
    \ Note the default values for Latency and Response Time. These variables that\
    \ resolve to random numbers add a little interest when taking a graph for a test\
    \ drive.\n\n## JMeter Sandbox with One Graph\n\nThe JMeter `.jmx` file for this\
    \ section is the same file used in the previous section:\n\n```\nsampleJMeterScripts/jpt_ch07_sandbox.jmx\n\
    ```\n\nWith the sandbox foundation in place, just add one of the dozens of Test\
    \ Elements you want to play with! In Figure [7-20](#A449023_1_En_7_Chapter.html#Fig20),\
    \ I added [`jp@gc Response Times Over Time`](http://jmeter-plugins.org/wiki/ResponseTimesOverTime/)\
    \ ( [`https://jmeter-plugins.org/wiki/ResponseTimesOverTime/`](https://jmeter-plugins.org/wiki/ResponseTimesOverTime/)\
    \ ) and started the test (Ctrl+R or Cmd+R) and voila, live-looking graphs. Use\
    \ Ctrl+Comma or Cmd+Comma to stop.\n\n![A449023_1_En_7_Fig20_HTML.jpg](A449023_1_En_7_Fig20_HTML.jpg)\n\
    \nFigure 7-20.\n\nUsing the JMeter sandbox to get a quick demonstration of a graph\n\
    \n## JMeter Sandbox / Multiple Metrics on Same Graph\n\nThis section shows how\
    \ to put two or more metrics on a single JMeterPlugins graph.\n\nTo see this in\
    \ action yourself, look in the `jpt` repository for this `.jmx` file. Open it\
    \ in JMeter:\n\n```\nsampleJMeterScripts/jpt_ch07_multipleMetricsOnOneGraph.jmx\n\
    ```\n\nOf course taking guesses, educated ones, is a key part of performance troubleshooting.\
    \ But if a guess cannot be supported by data, we all need to be big enough to\
    \ fall on our swords and verbally disown the unproven assertion. In fact, in Chapter\
    \ [3](#A449023_1_En_3_Chapter.html) I called metrics the antidote to guesswork.\
    \ So, I think developers need to hone their skills a little bit at finding, collecting\
    \ and efficiently presenting performance data so we can substantiate more of our\
    \ guesses or cleanly divorce them.\n\nTo see the impact of one metric on another,\
    \ I think it’s important to put two different metrics on the exact same graph.\
    \ In Chapter [6](#A449023_1_En_6_Chapter.html), on the Scalability Yardstick,\
    \ I showed you one example of that. Remember that we had to check to see how many\
    \ thread of load were required to push the SUT CPU to 25%? The two metrics were\
    \ CPU and count of JMeter threads of load. In this case, the increase in threads\
    \ of load impacted two other metrics: both CPU and throughput were impacted—they\
    \ both increased.\n\nActually, my favorite four metrics for a single start are\
    \ CPU, response time, throughput, and load generator thread count.\n\nTo help\
    \ you get up-to-speed on displaying graphs like this yourself, Figure [7-21](#A449023_1_En_7_Chapter.html#Fig21)\
    \ shows my test plan, still using the `jp@gc - Dummy Sampler` sandbox, to put\
    \ two metrics on the same graph: `jp@gc - Response Times Over Time` and `jp@gc\
    \ - Transactions per Second`.\n\n![A449023_1_En_7_Fig21_HTML.jpg](A449023_1_En_7_Fig21_HTML.jpg)\n\
    \nFigure 7-21.\n\nThe test plan required to get multiple lines of the same graph\n\
    \nOnce you have added them to your load plan tree as shown in Figure [7-21](#A449023_1_En_7_Chapter.html#Fig21),\
    \ you need to tell the new `jp@gc - Composite Graph` which metrics to display.\
    \ So I selected the `jp@gc - Composite Graph` and clicked the Graphs tab. Whoops,\
    \ but there was nothing there, as shown in Figure [7-22](#A449023_1_En_7_Chapter.html#Fig22).\n\
    \n![A449023_1_En_7_Fig22_HTML.jpg](A449023_1_En_7_Fig22_HTML.jpg)\n\nFigure 7-22.\n\
    \nA usability quirk: The Available Sources box is not populated with the metrics\
    \ I want to display in the graph. See Figure [7-23](#A449023_1_En_7_Chapter.html#Fig23)\
    \ for a solution.\n\nTo fix this little problem, you just need to run the test\
    \ for a few seconds and stop the test. This will populate the Available Sources\
    \ box so you can select the metrics you want to see (Figure [7-23](#A449023_1_En_7_Chapter.html#Fig23)).\n\
    \n![A449023_1_En_7_Fig23_HTML.jpg](A449023_1_En_7_Fig23_HTML.jpg)\n\nFigure 7-23.\n\
    \nSolution to the problem in Figure [7-22](#A449023_1_En_7_Chapter.html#Fig22).\
    \ To get your metric selections to show up in the Available Sources box, just\
    \ run the test. Then stop the test and double-click your selections in Available\
    \ Sources to move them into the Composite Graph section.\n\nOnce the Available\
    \ Sources box is populated, you can double-click the metrics you want to move\
    \ to the Composed Graph box."
