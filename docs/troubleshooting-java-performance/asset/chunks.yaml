  trans: '

    ## 备用方案：利用负载生成器指标进行间接性能评估


    P.A.t.h. 章节展示了如何直接评估并找出系统中哪些部分最慢，而第 1 章中的四个性能反模式则帮助你构想出哪些更改可能提升性能。部署更改后，如果负载生成器的响应时间和吞吐量指标（以及资源消耗）显示出足够的改进，那么你就保留该更改；否则就回滚（我就是这么做的）。然后你回到
    P.A.t.h. 检查清单，在你做出出色的更改后重新评估性能状况（因为状况会以有趣的方式发生变化，不妨检查一下），接着再部署另一个更改并重复此过程。调优大致就是这样运作的。


    在我熟练运用 P.A.t.h. 检查清单和适度的调优环境之前，发现根本原因要困难一些。我曾设法从负载生成器指标中挖掘出额外的线索和提示。这些“间接”技术如今仍然有用，但当你能通过
    P.A.t.h. 直接观察性能问题时，它们就没那么必要了。


    不过，我仍会在此分享其中一些技术，因为有时你无法快速访问系统来运行 P.A.t.h.，比如当你查看别人的负载生成器报告时。同样，有时需要来自不同指标的第二个佐证，才能让团队充分信服某个特定的优化方案，而说服团队在整个过程中占据了相当大的比重。


    ### 大型负载是一个危险信号


    逻辑上审视负载测试中负载最大的请求，问问自己所有这些字节是否真的必要？例如，请看图 3-1。


    ![A449023_1_En_3_Fig1_HTML.jpg](img/A449023_1_En_3_Fig1_HTML.jpg)


    图 3-1.


    最右侧的“平均字节数”列显示了每个进程（最左侧列）的 HTTP 响应大小。该列中的大型异常值（此图中没有）将是性能问题的首要嫌疑对象。数据来自 JMeter
    摘要报告。


    “平均字节数”列中字节数最多的请求是 newAccount.shtml，平均为 6253.7 字节。这个数字并不让我担心，尤其是与表中其他行的“平均字节数”数值相比。但如果某个“平均字节数”值比其他值大几倍或更多——那就值得调查了。至少，额外的字节会花费更多传输时间，但情况可能会更糟。如果系统花费宝贵的时间来组装这个大型页面呢？有一次我遇到这种情况，大量被禁用的账户（没有客户想看到）被意外启用，并从后端一直传输到浏览器，浪费了大量时间/资源。另一次，不仅客户端反复请求本可以在服务器上缓存的数据，而且
    XML 格式不必要地庞大，且没有人足够关心以确保负载被压缩。压缩文本文件通常能将文件缩小 90%。利用这一点来最小化传输的字节数。如果你的应用程序来自 1999
    年，那么大的尺寸可能是由于所有数据都被塞进单个页面，而没有良好的“第一页/下一页/最后一页”支持。


    ### 变异性是一个危险信号


    响应时间指标中一个较为明显的可修复性能问题迹象是变异性。在大多数情况下，响应时间抖动得越厉害，性能就越差。因此，要关注标准偏差（Std. Dev 列）最高的
    HTTP 请求，它们显示出高度变化的响应时间。当然，高度变化的响应时间可能归因于某些良性因素，比如偶尔复杂的数据或其他处理。


    图 3-2 中的三行显示了略微不同的 XSLT 进程处理完全相同的 .xslt 文件和相同的 .xml 文件——你可以通过每行“平均字节数”（最右侧列）的完全相同数值来判断。数据来自三次不同的测试，每次都是
    60 秒的稳态运行，带有 8 个负载线程，并且每次显示出截然不同的性能。


    ![A449023_1_En_3_Fig2_HTML.jpg](img/A449023_1_En_3_Fig2_HTML.jpg)


    图 3-2.


    三种 XSLT 处理实现的负载测试结果。数据来自 jmeter-plugins.org 的合成报告。


    请注意，响应时间（平均值）和标准偏差（Std. Dev.）大致成正比。吞吐量与这两者成反比。换句话说，当响应时间和变异性都较低时，性能/吞吐量表现良好。


    如果 0.51 的极低标准偏差加上 400% 以上的吞吐量提升（1273.3 而非 5325.8）还不足以让你信服，那么图 3-3 中相同数据的时间序列图可能会说服你。


    ![A449023_1_En_3_Fig3_HTML.jpg](img/A449023_1_En_3_Fig3_HTML.jpg)


    图 3-3.


    从上到下依次是使用三种不同 XSLT API 惯用法的良好、更好和最佳 XSLT 响应时间。测试速度越快，锯齿状的变异性就越小。


    响应时间中额外的变异性（如此处图表所示）可以帮助你指出哪些系统请求可能需要优化。其他指标（如吞吐量和 CPU 消耗）中的变异性也有助于指出问题。


    ## 创造性地设定调优方向


    是的，负载生成器指标应该主导方向，并决定保留哪些优化措施。但也要记住，这里有很大的创意空间。本节提供了一些创造性地重构测试和测试计划以提供性能洞察的示例。


    本书中有两章帮助你运行模拟（即模仿）常规生产负载的负载测试。第 4 章描述了如何将负载脚本从僵化、死板的单用户流量录制演变为动态的工作负载模拟。第 5 章帮助你检测无效负载测试的一些性能特征，这可以帮助你避免基于无效的负载生成器数据做出错误的调优决策。


    这里的要点是，让负载测试更真实是一件好事。然而，尽管听起来可能有些荒谬，但通过让你的负载测试不那么真实，也能获得大量绝佳的洞察。让我通过两个例子来解释这种看似疯狂的做法。


    ### 创意测试计划 1


    曾几何时，我参与一个调优项目，果然，我在某些“黑暗环境”中漫无目的地徘徊。我缺乏安全访问权限或许可证（天知道，可能是任何东西）来使用所有我喜欢的监控工具。没有指标，我该如何调优？这是一个中间层系统，我试图弄清楚所有时间是否都花在了调用非
    Java 后端系统上，还是花在了 Java 层本身。为了查明 Java 端的速度，我决定注释掉所有对数据库和后端系统的调用，留下一个完全被阉割的系统，只保留进入和退出
    Java 架构的部分。它应该相当快，因为大部分实际工作都被注释掉了，对吧？


    被阉割系统的负载测试响应时间为 100 毫秒。这算快还是慢？作为与这 100 毫秒的对比点，前一章中的“什么都不做”示例仅用了大约 1 毫秒。我有两个做基本相同事情（什么都不做）的不同系统，其中一个却慢得多。最终，这帮助我们找到并修复了一些遍及架构各个部分的大型瓶颈。这就是创意测试。

    '
- fmt: '### Creative Test Plan 2


    Here is another example where we remove part of the workload of a test plan (seemingly
    a setback) to make some forward progress. Figure [3-4](#A449023_1_En_3_Chapter.html#Fig4)
    shows a test in which four different SOA services are called sequentially: `First`,
    `Second`, `Third` and `Fourth`. The response time of `First` is so much slower
    than the other three requests that the fast services spend most of the test literally
    waiting for the `First` service to finish executing. All this waiting around severely
    limits throughput (not shown), and we are robbed of the chance to see how the
    services perform at the higher throughput.


    ![A449023_1_En_3_Fig4_HTML.jpg](A449023_1_En_3_Fig4_HTML.jpg)


    Figure 3-4. The three fast services in this test mostly wait around for the slower
    service


    To get around this problem, we need to divide and conquer and enlist the help
    of another technician. One developer works on improving the performance of the
    slow service (`First`) by itself in one environment, while the three fast services
    are tested by themselves with a different load script in a different environment.
    Without this approach, the three fast services would miss out on testing at much
    higher throughput. When just about any environment can be a tuning environment,
    this is much easier. Having a single monolithic tuning environment makes this
    standard “divide and conquer” approach very difficult.


    ## Tracking Performance Progress


    Load generator response time and throughput metrics are so important, a weeks-
    or months-long tuning effort should march to their beat. Chapter [2](#A449023_1_En_2_Chapter.html)
    on Modest-sized Tuning Environments encourages us to complete more fix-test cycles
    every day, by using smaller, easier to manage and more accessible computing environments.
    As that testing happens, on each day of tuning you will have many more results,
    good and bad, and both the results and the test configurations become easy to
    forget because there are so many. To remember which changes/tests make the most
    performance impact, put the results of each test on a wiki page in a nice, clean
    table (such as in Table [3-2](#A449023_1_En_3_Chapter.html#Tab2)) to share with
    your team. Some wiki tables even allow you to paste a little thumbnail image (expandable,
    of course) of a performance graph right in a table cell. Put the most recent tests
    at the top, for convenience.


    Table 3-2. Example of Load Test Results That Document Which Changes Had the Biggest
    Impact


    | Test ID | Start / Duration | Purpose | Results | RPS | RT (ms) | CPU |

    | --- | --- | --- | --- | --- | --- | --- |

    | 3 | July 4, 6:25pm, 10 min | Added DB index | Huge boost! | 105 | 440 | 68%
    |

    | 2 | July 4, 11:30am, 10min | Test perf change to `AccountMgr.java` | performance
    improved | 63 | 1000 | 49% |

    | 1 | July 4, 9am, 10 min | Baseline | | 53 | 1420 | 40% |


    Remember that the role of the project manager of a performance tuning project
    is to be the four year old kid in the back of the family car, pestering us with
    the question, “Are we there yet?” Have we met our performance targets? A table
    like this one mollifies them, but it is for you too. I am not sure why, but wallowing
    in a performance crisis makes it very easy to forget the list of changes that
    need to migrate to production. Keeping the table regularly updated takes discipline,
    but the table documents and justifies (or not) money spent on better performance.
    It is essential.


    At first, it seems like the rows of the table should compare results from one,
    unchanged load plan, applying exactly the same amount of load. Is this what we
    mean by an apples-to-apples comparison? Not quite. Instead, the table captures
    the best throughput to date for a particular set of business processes, regardless
    of the load plan, although this would be a great place to document changes in
    that load plan. Once your tuning efforts produce more throughput, you will need
    to dial in to your load plan more threads of load to get closer to your throughput
    goals.


    To create a compelling performance tuning narrative, convert the requests per
    second (`RPS`) and date columns of this table into a “throughput improvements
    over time graph.” This quickly communicates the ups and downs of your hard tuning
    work (Figure [3-5](#A449023_1_En_3_Chapter.html#Fig5)).


    ![A449023_1_En_3_Fig5_HTML.gif](A449023_1_En_3_Fig5_HTML.gif)


    Figure 3-5. Use graphs like this to help communicate performance progress


    ## Don’t Forget


    If you are stuck trying to fix a performance problem from the outside of the system
    using just resource consumption metrics and load generator metrics, it can become
    frustrating because there isn’t enough information to identify which parts of
    the system need to be changed to fix the performance issues. This is where “Blame”
    metrics come into play. The `P.A.t.h.` Checklist, which we begin to use in Chapter
    [8](#A449023_1_En_8_Chapter.html), is specifically designed to fill this gap.


    Also remember that one of the main purposes of modest-sized tuning environments
    is to get more fix-test cycles run in a single day, helping you make more performance
    progress. But more tests mean more results, and more results are easy to lose
    track of, so spend some time to find a nice wiki-like solution for documenting
    performance test results with your team, especially the project manager. To address
    all those issues surfaced in your performance tests, it helps to triage the problems
    so your team knows what to focus on.


    There are 3 ‘parts’ in this book and you’ve just finished the first one about
    getting started with performance tuning. Chapters [4](#A449023_1_En_4_Chapter.html),
    [5](#A449023_1_En_5_Chapter.html), [6](#A449023_1_En_6_Chapter.html) and [7](#A449023_1_En_7_Chapter.html)
    make up the next part, which is all about load generation—how to stress out your
    system in a test environment, as if it were undergoing the real stress of a production
    load.


    ## What’s Next


    Getting started quickly tuning your system is a lot easier knowing that you can
    find real performance defects in just about any environment. Perhaps the next
    biggest impediment to getting started is the need to create load scripts.


    The first part of the next chapter is a road map for getting up and going quickly
    with your first load script. The second part details how to enhance the first
    script to create/model a load that better resembles production.


    # Part II

    Creating Load Scripts and Load Testing'
