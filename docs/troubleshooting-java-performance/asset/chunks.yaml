  trans: '

    ## 别忘了


    当今服务器端的大部分性能问题，通常都是由少数几个微不足道的小处理任务引起的。这些任务的性能本可以且应该表现良好，但实际上却并非如此。这些“微不足道的小处理任务”大多出现在主要性能反模式
    1 和 2 中，即“不必要的初始化”和“低效的算法/策略”。实际上，反模式 1 是反模式 2 的一个特例。


    请记住，与策略相比，低效的算法更容易重构或替换，因为策略的细节分散在整个代码库中。最典型的例子是一种非常“啰嗦”的数据库策略，它为每个请求执行数十条 SQL
    语句：这种策略性能低下，且重构成本极高。


    虽然不太常见，但另外两个主要性能反模式（3 和 4）是“过度处理”和“大规模处理挑战”。大规模处理挑战应在设计阶段就被识别出来（并引起警惕）。当你开始发现系统中可能变慢的部分时，别忘了问问是否是“过度处理”导致的。这种情况发生在你对一个不常用的业务流程施加了不切实际的大量负载时，或者当你的代码“广撒网”处理了大量数据，最终却丢弃了其中很大一部分时。


    在本书的其余部分，我们将不断回顾这些主要性能反模式，以此作为一种快速沟通和理解各种严重拖累服务器端 Java 性能问题的根本原因的方式。


    ## 下一步


    在寻找合适的性能测试环境时遇到困难了吗？下一章正是为你准备的。本书附带的代码示例（直到第 8 章才会详细讨论）演示了十几种非常常见的“一次编写，到处运行”（WORA）性能问题。接下来的一章，即第
    2 章，将向你展示如何创建一个成本低廉、规模适中的调优环境，让你能够立即开始发现这些以及其他可能在生产环境中引发问题的性能缺陷。


    # 2. 一个规模适中的调优环境


    本章展示了如何通过首先在一个规模适中的、较小的环境中进行调优，从而在更大的性能环境中花费更少的时间。在这个较小的环境中，你每天可以完成更多的“修复-测试”循环，这极大地加速了整个调优过程。


    本章的目标是：


    *   学习如何设计负载测试，使其能在非常小的计算环境（例如你的桌面电脑）中运行，从而有效地将其转变为一个经济高效的性能调优实验室。

    *   学习如何绘制单个进程随时间变化的 CPU/内存消耗图。

    *   学习如何用返回预录响应的存根服务器替换后端系统。


    将项目的性能调优阶段安排在代码冻结前后是一个非常糟糕的主意，但这恰恰是我们通常安排它的时间点。代码冻结者说“不能再改了”，而调优者则咕哝着回应“必须修复代码”。这场争论最终以在操场滑梯旁的斗殴告终。这就是
    SDLC 风格的“生产力”。即使目睹了这场混乱，管理层似乎也无法理解为什么系统性能最终会如此糟糕。“代码冻结”与“代码变更”之间长期存在的冲突再次被忽视。


    本章探讨了一系列技术，使你能够利用一个小型的开发者调优环境，在 SDLC 的早期及整个过程中提升性能。最终可能仍然需要在大型、类生产环境中进行性能验证，但早期的验证将防止其退化为更传统的、充满焦虑的、在投产前最后时刻仓促完成的工作。


    ## 快速调优


    许多人会合理地反对说，一个只有几个 CPU 的小型调优环境对于达到高吞吐量系统的最终性能目标来说太小了。这是一个合理的反对意见。但达到最大吞吐量并非直接目标。相反，小型环境提供了一个易于访问和监控的系统，我们可以在其中完成许多“修复-测试”循环，也许每天多达
    10 个。


    在一个单一的“修复-测试”循环中，你运行几分钟的负载测试，使用监控工具识别最大的性能问题，编写并部署代码修复，验证改进效果，然后重复。


    传统上，在代码完成且质量保证部门测试完所有代码后，性能测试被紧紧地塞进投产前的日程中。这由于多种原因尤其具有挑战性。首先，几乎没有时间来创建大多数人认为调优所需的昂贵的大型计算环境。其次，为了稳定性起见，随着投产日期的临近，实施代码冻结是合理的。然而，代码冻结的文化使得性能工程师特别难以测试和部署使系统正常运行所需的更改。最后，几乎没有时间从第一天起就紧密融入产品中的、性能不佳的技术方案中抽身。这是一项最后一刻的仓促工作。


    相比之下，这种“快速调优”方法有助于防止调优消耗你的预算，并有助于避免最后一刻的性能冲刺。通过在早期解决大部分性能缺陷，在完整环境中展示完整的吞吐量目标就变成了一项更小、更易于管理的任务。

    '
- fmt: '# Write-Once-Run-Anywhere Performance Defects


    The code samples that accompany this book are available in these two github repositories:


    [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)


    [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)


    I’ll refer to the first one as “jpt” and the second one as “littleMock.” This
    section briefly enumerates the performance defects in the first set of examples—jpt.
    There is more detail on both sets of examples in Chapter [8](#A449023_1_En_8_Chapter.html).
    Chapters [1](#A449023_1_En_1_Chapter.html), [2](#A449023_1_En_2_Chapter.html),
    and [3](#A449023_1_En_3_Chapter.html) are introductory in nature, so I can understand
    why the hard performance data from load tests in Table [2-1](#A449023_1_En_2_Chapter.html#Tab1)
    seems out of place. I have included this data to provide tangible proof that commonly
    found performance defects can be easily detected in a modest-sized tuning environment,
    like a workstation.


    **Table 2-1.** Throughput results from jpt Sample Performance Defects That You
    Can Run on Your Own Machine. RPM = Requests per Minute, as measured by Glowroot.org.


    | Test # | A Test RPM | B Test RPM | Performance Defect | Comments |

    | --- | --- | --- | --- | --- |

    | 01 | 119 | 394 | Slow HTTP back-end | |

    | 02 | 2973 | 14000 | Multiple reads to 1MB data file | |

    | 03 | 15269 | 10596 | Uncached queries to static data | |

    | 04 | 6390 | 15313 | Slow result set iteration | |

    | 05 | 3801 | 12 | Missing database index | |

    | 06 | 10573 | 10101 | Over-allocation of RAM on heap | No significant throughput
    difference, but essential for avoiding waste. |

    | 07 | 18150 | 26784 | SELECT N+1 | |

    | 08 | 354 | 354 | Runaway thread with heavy CPU | Extra CPU consumption did not
    impact throughput. |

    | 09 | N/A | N/A | Multiple Issues | `09b.jmx` does not exist. Try this yourself.
    |

    | 10 | N/A | N/A | Uncompressed HTTPS response over WAN | Results only interesting
    when tested over a WAN. |

    | 11 | N/A | N/A | Memory leak | `11a` throughput degrades, but only after the
    slow leak fills the heap. |

    | 12 | 7157 | 9001 | Undersized Young Generation | |


    Each row in Table [2-1](#A449023_1_En_2_Chapter.html#Tab1) details two tests—one
    with and the other without a particular performance defect. From row-to-row, it
    varies on whether the A or the B test has the defect. The test with the higher
    RPM has the better performance, although there are a few exceptions where other
    factors besides RPM determine best performance.


    Like this set of examples, most performance defects are “Write-Once-Run-Anywhere”
    (WORA) defects, because regardless of whether you run them on a massive, clustered
    environment or a small laptop, the defect will still be there and it will be detectable.


    I don’t expect others to reproduce the exact numbers that I’ve included in this
    table. Rather, the main idea is to understand that there are concrete and repeatable
    performance differences between the a and b tests for any test number, like `05a`
    and `05b`.


    I selected this particular set of defects based on my experience as a full-time
    Java server-side performance engineer over the last ten years. In the fifteen
    years prior to that as a developer, team lead, and architect, I saw basically
    the same issues.


    Whether this list will exactly match what you see is up for debate; your mileage
    will vary. But I’m fairly confident these defects will be pretty familiar to server-side
    Java developers. More importantly, the tools and techniques that uncover the causes
    of these problems are even more universal than this listing of defects. This toolset
    will help detect a great many issues absent from this list.


    Again, the 12 examples just shown are part of the first set of examples—jpt. We’ll
    talk about the second set of examples (littleMock) in Chapter [8](#A449023_1_En_8_Chapter.html).
    Stay tuned.


    ## Tuning Environment for Developers


    Because these defects can be detected on both large and small environments, we
    no longer have to wait for a large environment to tune our systems. We can tune
    in just about any environment we want. This means we have choices, attractive
    ones, when we brainstorm what our tuning environment looks like. So what would
    be on your wish list for a great tuning environment? These things are at the top
    of my list:


    *   Lots of RAM.

    *   Having root or administrative access (or at least really good security access)
    to the system. In Linux, `sudo` can be used to grant access to some root commands
    and not others. This makes everything easier—monitoring, deploying code, viewing
    log files, and so on.

    *   The ability to quickly change/compile/build/package and redeploy the code.


    After that, I need a good project manager to keep my schedule clear. But outside
    of this, surprisingly little is needed. With this simple list of things and the
    tuning approach presented in this book, you can make great progress tuning your
    system.


    Most large, production-sized environments (Figure [2-1](#A449023_1_En_2_Chapter.html#Fig1))
    are missing important things from this wish-list: code redeploys are slow (they
    take hours or days and lots of red tape). Then, the people tuning the system rarely
    get enough security access to allow a thorough but quick inspection of the key
    system components. This is the Big Environment Paralysis that we talked about
    in the Introduction.


    ![A449023_1_En_2_Fig1_HTML.gif](A449023_1_En_2_Fig1_HTML.gif)


    **Figure 2-1.** Traditional full-sized performance tuning environment


    The environment shown here probably has redundancy and tons of CPU; those are
    great things, but I will happily sacrifice them for a tiny environment that I
    have full access to, like my laptop or desktop. Figure [2-2](#A449023_1_En_2_Chapter.html#Fig2)
    shows one way to collapse almost everything in Figure [2-1](#A449023_1_En_2_Chapter.html#Fig1)
    onto just two machines.


    ![A449023_1_En_2_Fig2_HTML.gif](A449023_1_En_2_Fig2_HTML.gif)


    **Figure 2-2.** Modest performance tuning environment with just two machines


    At first glance, it looks like concessions have been made in the design of this
    small environment. The live mainframe and live cloud services are gone. Redundancy
    is gone. Furthermore, since we are collapsing multiple components (load generator,
    web server, app server and stubs) on a single machine, running out of RAM is a
    big concern. These are all concerns, but calling them concessions is like faulting
    a baby for learning to crawl before learning to walk. This small developer tuning
    environment is where we get our footing, where we understand how to make a system
    perform, so we can avoid building the rest of the system on a shaky foundation,
    the one we are all too familiar with.


    To bring this dreamy goal down to earth, the twelve “run-on-your-own-machine”
    performance defects distributed with this book will help to make all this tangible.
    Each of the example load tests is actually a pair of tests—one with the performance
    defect and then a refactored version with measurably better performance.


    But we have yet to talk about all the back-end systems that we integrate with—the
    mainframes, the systems from third parties, there are many. The effort to make
    those real systems available in our modest tuning environment is so great that
    it isn’t cost effective. So how can we tune without those systems?


    In a modest tuning environment, those back-end systems are replaced with simple
    “stand-in” programs that accept real requests from your system. But instead of
    actually processing the input, these stand-ins simply return prerecorded or preconfigured
    responses.


    In the remaining parts of this chapter, you will find an overview of some very
    nice toolsets that help quickly create these stand-in programs, a process we call
    “stubbing out” your back-ends.'
