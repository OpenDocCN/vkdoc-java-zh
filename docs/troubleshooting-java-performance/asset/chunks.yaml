  trans: '

    #### 聚焦于负载下的线程


    Java 开发者有时会因为线程活动数量惊人而对线程转储望而却步。对我来说也同样令人眼花缭乱，因此我帮你省去了所有这些细节。具体来说，我通过让程序保持非常简短来帮你省事，并且在线程转储中，我只展示了程序启动的三个线程，而不是
    JVM 启动的所有其他线程（超出了本书的范围）。


    因此，要理解线程转储，你需要一些策略来剔除所有无关紧要的线程，从而专注于最可能导致问题的那些线程。以下是你的第一条建议：


    *   负载下的线程正是导致性能问题的那些线程。


    这听起来有点含糊其辞、没什么帮助，甚至令人怀疑。所以这并非绝对规则，但它至少应该成为你进行性能调查的首要切入点之一。你应该问问，在负载下的线程中是否存在任何明显的问题。确定哪些线程处于负载之下实际上相当直接。


    首先问问自己正在施加什么负载。是生产用户通过 HTTP/S 访问，还是你刚刚启动了一个同样使用 HTTP/S 的测试负载脚本（比如 JMeter）？是一个批处理作业从文件或数据库中读取“工作”然后进行处理（即施加负载）？或者，这也许是一个后端
    JMS（Java 消息服务）正在接收来自某个未知消息生产者的流量？


    然后，在线程转储中找到那些满足以下条件的线程：


    *   其入口标记大致看起来像是来自正在施加的负载。

    *   其线程名称也与正在施加的负载相匹配。

    *   显示了来自你包空间的 Java 方法调用/活动。

    *   其线程状态既不是 `WAITING` 也不是 `TIME_WAITING`。


    让我们逐一看看这四点。


    清单 11-6 是一个运行在 Spring Boot 下的 Tomcat HTTP SOA 应用的线程转储片段。让我们看看清单 11-7 中的线程是否与所有这些条件相符。可能所有入口标记都以
    `Thread.run()` 开头——或者 Thread 的某个子类的 `run()` 方法；前面清单 11-5 和清单 11-6 中的例子也不例外。第 87
    行的 `Thread.run()` 基本上是入口标记的标志。其上的三行包含了 `tomcat` 包中的类，所以看起来我们仍然找对了方向。最后，在第 78 行，文本
    “http11.Http11Processor” 表明这是 HTTP 活动。所以第一点建议表明我们走在正确的轨道上。为了便于阅读，清单 11-6 最右侧的部分被截断了。


    ```

    78     at org.apache.coyote.http11.Http11Processor.service

    79     at org.apache.coyote.AbstractProcessorLight.process

    80     at org.apache.coyote.AbstractProtocol$ConnectionHan

    81     at org.apache.tomcat.util.net.NioEndpoint$SocketPro

    82     at org.apache.tomcat.util.net.SocketProcessorBase.r

    83     - locked  (a org.apache.tomcat.

    84     at java.util.concurrent.ThreadPoolExecutor.runWorke

    85     at java.util.concurrent.ThreadPoolExecutor$Worker.r

    86     at org.apache.tomcat.util.threads.TaskThread$Wrappi

    87     at java.lang.Thread.run (Thread.java:745)

    清单 11-6.

    一个堆栈跟踪，显示（第 78 行）它是由 Tomcat 的 HTTP 引擎启动的

    ```


    第二点建议指出线程名称必须与正在施加的负载相匹配。我的 Tomcat 线程名称是 `http-nio-8080-exec-9`，这与表 11-2 一致。该线程名称位于下面
    11-7 的第一行。


    第三点建议只是提醒你，通常你要寻找的是来自你自己包空间的代码。在本书中，这主要是 `com.github.eostermueller`——我们稍后会有很多这样的例子。


    第四点建议指出，负载下的线程处于既不是 `WAITING` 也不是 `TIMED_WAITING` 的线程状态。嗯，通常情况下是这样，但在我的几个例子中，我在示例代码中使用
    `java.lang.Thread.sleep()` 来模拟一段慢速代码，这属于规则的例外——它们会显示为 `TIME_WAITING`，即使负载正在施加。


    清单 11-7 中的第二行显示了一个处于负载下的线程，其线程状态为 `RUNNABLE`。


    ```

    "http-nio-8080-exec-9" #56 daemon prio=5 os_prio=31

    java.lang.Thread.State: RUNNABLE

    at java.io.FileInputStream.readBytes(Native

    at java.io.FileInputStream.read(FileInputStr

    at sun.security.provider.NativePRNG$RandomIO

    at sun.security.provider.NativePRNG$RandomIO

    清单 11-7.

    处于负载下的线程，线程状态为 RUNNABLE

    ```


    因此，一旦你验证了这四点，你就能够梳理线程转储中的所有线程，并找出当前处于负载下的那些线程。作为最后的合理性检查，你还可以检查机器上的 CPU 消耗。可以肯定的是，零
    CPU 消耗加上偶尔的峰值不足以构成负载（即使按照本章宽松的定义也是如此）。


    ## 手动线程转储分析（MTDP）


    既然你现在能够识别线程转储中处于负载下的线程，你终于可以准备好使用 MTDP 在任何环境中查找性能问题了。


    以下是操作说明：


    1.  在施加负载时，获取大约四个线程转储，每个转储之间间隔几秒钟。

    2.  如果在两个或更多处于负载下的线程的转储中出现了你可以修复的问题，那么它就值得修复。


    尽管这些说明是为 Java 调整过的，但 Mike Dunlavey 是第一个在他的著作《构建更好的应用程序》（Van Nostrand Reinhold,
    1994）中记录此技术（针对 C 程序）的人。

    '
- fmt: '### Example 1


    This example shows how thread dumps point you to a performance defect, even one
    without Java synchronization issues. Start by following the instructions at [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)
    to download and start a Spring Boot server, and then apply three threads of load.
    If Maven and Java 8 (or greater) are already installed, this should take five
    minutes or so. The general idea is to download the zip file or do a `git clone`.
    In one terminal window, launch `./startWar.sh`. In a separate window, launch `./load.sh`.
    Then do the following:


    1. Open `http://localhost:8080/ui` in a browser.

    2. We want the Sleep Time parameter to 50ms. In the browser at the above URL,
    clear out all the text in the Performance Key text box. Then enter `L50` and click
    Update. If you open Glowroot at `http://localhost:4000`, the added sleep time
    will show up as shown in Figure [11-1](#A449023_1_En_11_Chapter.html#Fig1).


    ![A449023_1_En_11_Fig1_HTML.jpg](A449023_1_En_11_Fig1_HTML.jpg)


    **Figure 11-1.** Response time metrics from Glowroot (glowroot.org) show sleep
    time of 50ms was introduced halfway through the littleMock Spring Boot test


    The red line shows that 99% of all requests finished in about 58 ms or faster,
    until we added 50 additional ms at 8:04am, where response time jumped to about
    110ms for the same 99% metric. This is a nice result—we added 50ms of sleep, and
    response time increased by just about the same amount (110–50 = ∼58ms). But the
    question is this: If your client complains that response time more than doubled
    (like this), how would you find the root cause? If you explore the Glowroot interface,
    there is a good chance it will point to the `Thread.sleep()`, which is great.
    But finding the bug in any environment is the goal here, so we will use `jstack`,
    which comes with every JDK.


    I invoked `jstack` four times (Figure [11-2](#A449023_1_En_11_Chapter.html#Fig2))
    to get four text files, each with a thread dump. Then, I used the techniques in
    the previous section to find which threads in the dump were under load: each thread
    dump text file had exactly three threads with code in the `com.github.eostermueller`
    package space, and each of those had a Tomcat HTTP-looking entry mark, along with
    an HTTP-like thread name, such as `http-nio-8080-exec-10`.


    ![A449023_1_En_11_Fig2_HTML.jpg](A449023_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2.** Depiction of the four thread dumps taken earlier, one tall blue
    rectangle per thread dump. Each gray box is a single stack trace, aka thread.
    The smiley faces point to the only stack traces executing code in the `com.github.eostermueller`
    package space.


    This finding is critical, so I will repeat it: Three threads of load are being
    applied, and there are exactly that number of threads (three) from my `com.github.eostermueller`
    package space in each one of the four thread dumps captured. This is what happens
    when there is zero load gen think time and load is generated locally, not from
    across a network.


    I mentioned earlier that to be considered “under load,” a thread state must be
    running. Well, this is one exception, because my scenario uses `Thread.sleep()`
    to slow down the code, and that means the RUNNING state changes to `TIMED_WAITING`
    while inside `Thread.sleep()`.


    It is no coincidence that each thread dump had three threads under load, because
    the JMeter load script in use (`load.sh` invokes `src/test/jmeter/littleMock.jmx`)
    has three threads of load configured in it. If you launch the JMeter GUI with
    `loadGui.sh` (it is in same folder as `load.sh`) and point to the aforementioned
    `.jmx` file, you can confirm this number three in the JMeter Thread Group.


    Had I added think time to the `.jmx` or ran JMeter from a slow network (over the
    Internet, or from a different data center) instead of running it locally on the
    same box, the number of threads under load in each dump (aka “JVM concurrency”)
    would vary between zero and three.


    So we have four thread dumps, each with three threads under load, for a total
    of 3x4=12 “sample” threads. Thus, we have 12 smiley faces in Figure [11-2](#A449023_1_En_11_Chapter.html#Fig2).
    Let’s get back to finding the code that caused this slowdown. The instructions
    for Manual Thread Dump Profiling (MTDP) say this:


    * “If something that you could fix shows up in the dumps for two or more threads
    that are under load, it is worth fixing.”


    Of the twelve threads in the sample (the ones under load), eight of them were
    sitting on the `Thread.sleep()` that we introduced using the Sleep Time parameter
    on `http://localhost:8080/ui`. Listing [11-8](#A449023_1_En_11_Chapter.html#Par73)
    shows one of them.


    ```

    29 "http-nio-8080-exec-10" #54 daemon prio=5 os_prio=31 tid=0x00007f90611d3800
    nid=0x8603 waiting

    30  java.lang.Thread.State: TIMED_WAITING (sleeping)

    31     at java.lang.Thread.sleep(Native Method)

    32     at com.github.eostermueller.littlemock.Controller.simulateSlowCode(Controller.java:73)

    33     at com.github.eostermueller.littlemock.Controller.home(Controller.java:60)

    34     at sun.reflect.GeneratedMethodAccessor58.invoke(Unknown Source)

    ```


    **Listing 11-8.** Stacktrace of `Thread.sleep()`


    Furthermore, the instructions earlier tell us that seeing the same code show up
    just twice in 12 thread dumps is enough to cause concern. My test yielded four
    times that many—eight.


    ### Sample Size and Healthy Skepticism


    In the preceding example, we found that 8 out of 12 threads sampled were in `Thread.sleep()`,
    and we felt confident enough to claim we had found the culprit. Is 12 really a
    large enough sample to base real development/tuning changes on? What if I captured
    a new set of four additional thread dumps and `Thread.sleep()` only showed in
    one or none of them? This is a fair point, one that I asked myself for many months
    when I first started using this technique.


    The short answer is that it is extremely rare for relatively fast methods to show
    up as the Current mark in a thread dump. For instance, trivial getters and setters
    never show up. If one ever did, it would be years before you saw it again. The
    slower the execution time, the more a method will show up in the stack trace.
    Think of MTDP as an exclusive club for the slow, which is completely different
    than having equal probability that any single line of code executed will be positioned
    at the Current mark. This equal probability situation never happens.


    For a slightly longer answer, I ran one test for almost 20 minutes and took one
    thread dump every second (1151 thread dumps to be precise). The average number
    of times that my `Controller.simulateSlowCode()` showed up in a single thread
    dump file? 1.94787 times out of three possible threads. So my measurement of 8/12
    (2/3) only fractionally overstated the average captured from a more robust sample
    size.


    If you are looking for a more complete justification for why it is safe to make
    development changes based on such small sample sizes, here are two math-based
    opinions on that matter. For full disclosure, one of the justifications is written
    by Mike Dunlavey, the guy who first published this technique:


    [`http://ostermueller.blogspot.com/2017/04/the-math-behind-manual-thread-dump.html`](http://ostermueller.blogspot.com/2017/04/the-math-behind-manual-thread-dump.html)


    Personally, I use this technique not because the math is convincing, but because
    it works. The next section shows the results from one such tuning success story,
    and you can have a close look at all the optimizations discovered by this technique,
    a technique you can finally take into any environment in the enterprise.


    The example above showed how MTDP can detect a 50ms response time increase, where
    the response time was doubled. Regardless of whether you think that is a large
    or a small slowdown, the next section shows how MTDP is capable of detecting response
    time problems much smaller than 50ms.'
