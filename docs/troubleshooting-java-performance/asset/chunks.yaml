  trans: '

    # 12. 堆，P.A.t.h. 中的“h”


    这是 P.A.t.h. 检查清单四章中的最后一章。请记住，在找到问题的根源之前，你需要检查清单的所有四个部分。本章从一个非常基础的垃圾回收健康检查开始——只需几分钟即可捕获数据并做出健康/不健康的评估。


    但到本章结束时，我将引导你完成更复杂的任务，例如翻查堆转储文件，以找出本书示例应用程序附带的内存泄漏的根本原因。


    本章的目标是：


    *   学习如何快速评估任何 JVM 中的 GC 健康状况。无需额外配置，也无需重启 JVM。

    *   理解排查堆性能问题的高级方法。

    *   通过首先了解是哪个堆空间（老年代还是新生代）导致了你的问题，来修复最常见的 GC 低效问题。

    *   通过发现内存消耗高的类名，并了解单个类随时间的消耗趋势，来精确定位内存泄漏的原因。

    *   初步了解如何使用堆分析工具来发现内存泄漏的根本原因。


    本章中的快速 GC 健康检查将 GC 性能归结为两个易于捕获的指标，这些指标可以直接从 JDK 中的工具获得。无需配置额外的 JVM 参数，也无需重启 JVM。这些是即插即用的指标，在你需要时即可使用。我将提供我自己关于哪些数值代表“健康”或不健康的阈值；你可以根据自己的经验进行调整。


    除了这项健康检查，本章还回顾了许多其他 GC/堆分析技术。最终，我将把它们整合成一套简洁的步骤，指导你解决遇到的大多数 GC/堆性能问题。


    本章的目标之一是展示，即使对 GC 算法知之甚少，也可以完成大量的 GC/堆调优工作。


    ## 快速 GC 健康检查


    要了解一个看起来特别慢的 GC 指标（实际上任何看起来慢的指标）能有多大改进空间，是有点挑战性的。因此，在评估 GC 健康状况时，我采用一种简单的红-黄-绿方法来简化工作。


    它从一个简单的“GC 开销”指标开始，该指标是在一段时间内用于垃圾回收的时间。因此，如果最近 1000 毫秒中有 150 毫秒（0.150 秒）用于 GC，那么
    GC 开销就是 15%。1000 毫秒中有 20 毫秒（0.02 秒）就是 2% 的开销。


    以下是我如何使用 GC 开销指标来分类堆性能问题：


    *   **红色**：如果持续的 GC 开销大于 8%，那么应优先考虑改进 GC 性能。

    *   **黄色**：如果持续的 GC 开销大于 2%（但小于 8%），那么开始研究改进方案，但无需急于实施 GC 变更。从绿色变为黄色通常是内存泄漏的早期预警信号。

    *   **绿色**：当持续的 GC 开销小于 2% 时，GC 性能被认为是健康的，无需进行 GC 调优。然而，对于需要更快响应时间（可能小于 25 毫秒）的系统，如果进一步调优
    GC（可能降至 0.5%），仍然会看到收益。


    “持续的 GC 开销”大致意味着持续 5 分钟或更长时间。如果你不喜欢我分配给红-黄-绿的百分比，我保证如果你根据自身经验调整它们，我也不会介意。关键在于，开发和运维团队需要一种一致的方法来确定何时应采取纠正措施。


    即使总开销很低，偶尔的峰值也可能令人担忧。考虑使用类似的分级标准，例如：


    *   **红色**：每小时出现超过五次 3 秒的暂停

    *   **黄色**：每小时出现两到五次 3 秒的暂停

    *   **绿色**：每小时出现一次或更少 3 秒的暂停


    请记住，G1 垃圾回收器算法旨在最小化这些峰值。


    我们将讨论可用于捕获此 GC 开销指标的工具，但首先让我们看看捕获 GC 指标的传统方法/工具。


    ### GC 指标的传统方法


    要使用最新、最强大的 GC 性能分析程序，你需要启用 JVM 来捕获详细的 GC 文件，然后分析该文件。首先，在你的 JVM 启动参数中添加几个参数：


    ```

    -Xloggc:gc.log

    -verbose:gc

    ```


    然后重启 JVM 并重现问题。接着，你将 `gc.log` 文件传输回你的桌面，下载并安装一个能将 GC 数据绘制成图表的分析程序。


    这工作量很大，而且通常还需要像下面这样的额外 JVM 设置才能全面了解问题：


    ```

    -XX:+PrintGCDetails

    -XX:+PrintGCDateStamps

    -XX:+PrintGCTimeStamps

    -XX:+PrintTenuringDistribution

    -XX:+PrintClassHistogram

    -XX:+PrintGCApplicationStoppedTime

    -XX:+PrintPromotionFailure

    -verbose:sizes

    ```


    我常常不确定自己是否知道当前用于全面验证 GC 性能的完整参数列表，甚至不确定这个完整列表是否存在。此外，为了操作和谐并避免用大量性能数据填满硬盘，这些参数也是必不可少的：


    ```

    -XX:+UseGCLogFileRotation

    -XX:NumberOfGCLogFiles=5

    -XX:GCLogFileSize=10m

    ```


    要收集详细的 GC 指标，需要一个异常耐心的“耍蛇人”，需要处理众多且各异的 JVM 参数以及必要的 JVM 重启。确保所有正确的参数在所有环境中都保持不变，似乎即使不是不可能，也是非常困难的，而真正的性能分析却要等到
    JVM “耍蛇人”完成他们的工作后才能进行。当危机期间性能分析停滞不前时，焦虑和沮丧情绪就会上升。


    对于运行 OpenJDK 项目的优秀人士，我认为要求所有开箱即用的 JVM 默认捕获这些低开销指标，并提供参数以便在必要时进行调整或关闭，是合理的。作为默认设置，我们能否为数据文件设置一个适度的
    10MB 最大占用空间？


    每年都有新的开源且免费可用的图表和分析工具出现，它们能更好地理解详细的 GC 数据。这是一个良好、开放且不断发展的工具生态系统，即使捕获数据需要“耍蛇”技巧。如果这些图表工具能够显示数据的实时视图，而不是当前这种从文件进行批处理的模式，那就更好了。


    实时的、已绘制成图表的 GC 数据可以从另一套工具集中获取：JDK 自带的 JVisualVM 的 Visual GC 和 gcViewer 插件。JConsole
    也提供指标。但这些工具缺少一些重要的指标，它们不够成熟，而且增强功能也不频繁。


    以下是捕获 GC 性能数据的四种主要工具：


    *   详细 GC

    *   `JAVA_HOME/bin/jvisualvm` 和 `JAVA_HOME/bin/jconsole`

    *   `JAVA_HOME/bin/jstat`

    *   第三方工具，如应用程序性能管理（APM）工具、Dynatrace、AppDynamics 等


    最终，第三个选项 `jstat` 将是我们用来捕获红-黄-绿方法所需指标的工具。但在深入探讨之前，让我们在下一节快速回顾一些关于 GC 的高级概念。

    '
- fmt: '### Garbage Collector Overview


    Of all the many JVM heap parameters, the `-Xmx` parameter plays the main role
    in heap performance. For example, `-Xmx2048m` defines a fixed 2GB of RAM, called
    the heap, that is at your Java program’s disposal. Note that unlike many GC parameters,
    this one uses no equal sign (`=`) — it’s a bit of an oddball that way. Never set
    this value higher than your available RAM. `OutOfMemory` errors show up when your
    program allocates more than your `-Xmx` heap max value. Additional RAM outside
    of the heap can also be used, as it is by implementers of JSR-107:


    [`https://www.jcp.org/en/jsr/detail?id=107`](https://www.jcp.org/en/jsr/detail?id=107)


    However, that is out of scope for this small book.


    The JVM’s garbage collector (GC) is really just a recycler. Once your Java program
    is finished using a variable, the GC discards it by making the underlying memory
    available for subsequent variable declarations. It takes work for the GC to identify
    variables (and memory) still in-use by your application to ensure that they are
    not discarded. When I say “work,” I mean it’s going to eat CPU and it will cause
    some processing slowdowns.


    GC algorithms, which are heavily configurable, rely on various carefully sized
    compartments of memory to pull off this recycling process efficiently. When certain
    of these compartments aren’t sized right, end-user slowdowns ensue.


    There are a number of different GC algorithms that can be used, and JVM start-up
    parameters decide which one is in use for a given Java process. Even though descriptions
    for the GC algorithms are available everywhere, somehow that doesn’t translate
    into being able to quickly assess whether GC performance is healthy or not, and
    whether an inefficiency lies in the “old” or the “new” generation, which are two
    of the main heap compartments that I mentioned earlier. All modern GC algorithms
    split the heap into old and new generations and have different approaches to managing
    each one.


    This document from Oracle provides detail on all the GC algorithms:


    [`http://www.oracle.com/technetwork/java/javase/tech/index-jsp-140228.html`](http://www.oracle.com/technetwork/java/javase/tech/index-jsp-140228.html)


    ### Plug-It-in-Now GC Metrics with `jstat`


    I have mentioned elsewhere that if metrics aren’t easy to capture, then performance
    problems often go unfixed. That’s why I rely on `JAVA_HOME/bin/jstat -gc` to capture
    metrics from any running JVM — no need to add JVM GC parameters, no need to restart
    the JVM and reproduce the problem. Just pass in the PID of the Java process and
    review the data. The tool summarizes all its metrics for the time interval you
    give it. I told `jstat` to use an interval of 1 second (1s), like this:


    ```

    # jstat -gc  1s

    ```


    Yes, this data is more convenient to retrieve, but there is nothing attractive
    about the presentation of Listing [12-1](#A449023_1_En_12_Chapter.html#Par53),
    and there are very few tools that create graphs from this format. Looks like a
    lot of data already, but there is more! I trimmed five columns out of the left
    side of this image.


    ```

    YGCT   FGCT

    -----  -----

    1.719  1.028

    1.721  1.028

    1.724  1.028

    1.728  1.028

    1.734  1.028

    1.738  1.028

    1.744  1.028

    1.748  1.028

    Listing 12-1.

    Data from JAVA_HOME/bin/jstat, one new line of data every 1 second

    ```


    Ultimately, we need to somehow get the GC overhead metric out of this data for
    the RED-YELLOW-GREEN scale discussed earlier, and we’ll need it for both the young
    gen and the new gen. Fortunately, there is one column each for young and new gen:
    these are `YGCT` and `FGCT`, and they are documented here:


    [`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html)


    But there is one last headache to deal with: each row in these two columns shows
    the accumulated GC time since you started `jstat`. Instead, we need GC time that
    happened in each 1 second interval, and that will allow us to easily calculate
    an average.


    I created a four-line `awk` script to get around these headaches. The script selects
    only the two columns we care about (the ones highlighted in Listing [12-1](#A449023_1_En_12_Chapter.html#Par53)),
    and it also calculates the differences between each row.


    The `readme.txt` at this link has all the details on the `gctime` script:


    [`https://github.com/eostermueller/littleMock/tree/master/gctime`](https://github.com/eostermueller/littleMock/tree/master/gctime)


    As a point of interest, let’s say that all you have is stdout from `jstat` with
    a 1-second interval, as you might get from an operations team. You can get the
    right `gctime` output by post-processing the stdout file with the (almost trivial)
    `awk` script at the link.


    Let’s do some tuning using `gctime`. Both of the following examples started out
    with the GC parameters in Listing [12-2](#A449023_1_En_12_Chapter.html#Par62),
    which means that the heap is split right down the center: 512MB old gen, 512MB
    young gen. For brevity, I have not shown the `<argument>` XML tags that surround
    each parameter in the `pom.xml` file. Results for this configuration are in Listing
    [12-3](#A449023_1_En_12_Chapter.html#Par77), following.


    ```

    -Xmx1g -XX:NewSize=512m -XX:MaxNewSize=512m -XX:+UseConcMarkSweepGC -XX:ConcGCThreads=4

    Listing 12-2.

    GC parameters dialed into littleMock’s pom.xml for this example

    ```


    These parameters are kept toward the end of littleMock’s `pom.xml` (and they’re
    all wrapped in XML `<argument>` tags).


    #### Configuring littleMock Performance with Test Keys


    We have two sets of performance examples, right? `jpt` and littleMock. With `jpt`,
    when you launch `./startWar.sh 05b` and `./load.sh 05b`, you see performance of
    a really slow query without an index. When you instead run with `05a`, you get
    the same test but with the index in place (and better performance). The test ID
    passed into `startWar.sh` and `load.sh` determines performance.


    The littleMock `startWar.sh` and `load.sh` are different — they don’t take any
    parameters. To “dial in” a particular performance problem or optimization, you
    instead change the ‘performance key’ or other options on the littleMock web page:


    ```

    http://localhost:8080/ui

    ```


    With `jpt`, we are limited to 12 pairs of tests. littleMock performance keys enable
    countless permutations of performance test scenarios that can be shared and explored
    together so we can discuss the best tools and performance remedies to use for
    very specific performance scenarios.


    Don’t forget that Glowroot is enabled — just browse to `http://localhost:4000`.
    When the `./load.sh` script is running, you can see interactively how performance
    changes as you click options in the littleMock web page.'
