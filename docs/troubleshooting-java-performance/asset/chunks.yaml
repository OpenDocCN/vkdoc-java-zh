- fmt: 'The trigger in the first stack trace calls `XpathImpl.evaluate()`; the second
    calls `DocumentBuilderImpl.parse()`. Obviously, the bulk of the processing is
    happening in these 5+5 threads doing XPath evaluation and XML parsing, but there
    are no obvious optimizations, here—no low-hanging fruit.


    But the third stack trace, which showed up just once out of 12 threads, is certainly
    suspect, and I will show you exactly why.


    Listing [11-10](#A449023_1_En_11_Chapter.html#Par120) shows that the trigger is
    on line 22 of `XPathWrapper.java`. The stack trace shows that line 22 should be
    a call to `XPathFactory.newInstance()`.


    ```

    at javax.xml.xpath.XPathFactory.newInstance(XPathFactory.java:96)

    at com.github.eostermueller.littlemock.XPathWrapper.matches(XPathWrapper.java:22)

    Listing 11-10.

    A small excerpt from the third stack trace in Listing 11-9

    ```


    …and sure enough, when we look at the source code, line 22 contains exactly what
    we expected, a call to `newInstance()`:


    ```

    19 boolean matches(Document document) throws XPathExpressionException {


    21    XPath xpath = null;

    22    XPathFactory factory = XPathFactory.newInstance();

    23    xpath = factory.newXPath();


    25    Object xpathResult = xpath.evaluate(this.getXPath(),

    document, XPathConstants.BOOLEAN);


    28    Boolean b = (Boolean)xpathResult;

    28    return b.booleanValue();

    29 }

    ```


    This code was taken from the following link:


    [`https://github.com/eostermueller/littleMock/blob/1206673fc57b09effd2152c0c4e1414fd1911508/src/main/java/com/github/eostermueller/littlemock/XPathWrapper.java#L19-L29`](https://github.com/eostermueller/littleMock/blob/1206673fc57b09effd2152c0c4e1414fd1911508/src/main/java/com/github/eostermueller/littlemock/XPathWrapper.java#L19-L29)


    Furthermore, the third stack trace’s trigger (line 22) clearly comes before the
    main processing of this request, right there in the same method in Listing [11-10](#A449023_1_En_11_Chapter.html#Par120),
    line 25.


    The very important point is this:


    * Slow initialization code begs for optimization.


    We know this code is slow because it shows up in the “exclusive club for the slow”—MTDP.


    We know that the slow code, the call to `XPathFactory.newInstance()` on line 22,
    is initialization code because it comes before the main processing—the `XpathImpl.evaluate()`
    on line 25.


    Why does slow code beg for optimization? I went over this in the “Leveraging the
    Four Anti-Patterns” section earlier, but the general idea is this: it takes a
    lot of work to get large processing challenges to perform well, but initialization
    tasks often have static data that can be processed and cached one time at start-up,
    or there isn’t that much data to process at all—processing small amounts of data
    is generally fast.


    ## How to Make Code Faster


    Once you have found some slow code to focus on, unless you have some bright ideas
    on how to optimize, it’s time put this in the good hands of the Internet. If you
    factor out environment-specific factors like “processing too much data,” “misconfigured
    virtual machine,” or “faulty network cable,” your answer lies on the Internet.
    I’m telling you, you are not the first one to run into a performance problem with
    a commonly used API. My search for “`XPathFactory.newInstance()` performance,”
    for example, yielded a handful of discussions that led me to the fix in Listing
    [11-11](#A449023_1_En_11_Chapter.html#Par132). Actually, both the third thread
    and the fourth thread (the two that showed up in a single stack trace each) have
    similar problems, and both of them are addressed with the change shown here.


    ```

    -Dcom.sun.org.apache.xml.internal.dtm.DTMManager=

    com.sun.org.apache.xml.internal.dtm.ref.DTMManagerDefault

    -Djavax.xml.parsers.DocumentBuilderFactory=

    com.sun.org.apache.xerces.internal.jaxp.DocumentBuilderFactoryImpl

    -Djavax.xml.xpath.XPathFactory:http://java.sun.com/jaxp/xpath/dom=

    com.sun.org.apache.xpath.internal.jaxp.XPathFactoryImpl

    Listing 11-11.

    In pom.xml (same folder as startWar.sh/cmd), Make Sure This Text Is Commented
    In, for a Performance Improvement.

    ```


    You should probably beat me up a bit because I broke my own rule. Earlier, I said
    this about MTDP:


    * If you see a particular something that you could fix that shows up in the dumps
    on two or more threads that are under load, it is worth fixing.


    and the thread dumps didn’t meet this criteria, yet I plodded ahead with the optimization
    and got roughly a 20% throughput boost. Early in this chapter, we added the `Thread.sleep()`
    to littleMock UI and easily found the `Thread.sleep()` in the thread dumps. That
    was an obvious problem, but this one, not so much. The thread dumps showed the
    problem in both cases (Figure [11-4](#A449023_1_En_11_Chapter.html#Fig4)).


    ![A449023_1_En_11_Fig4_HTML.jpg](A449023_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. Roughly 20% throughput boost (right test) from adding optimizations.


    ## Limitations


    There is a reason why MTDP isn’t in a book by itself—because there are a number
    of blind spots, when you use it alone; other tools are required to fill in the
    gaps. For example, the garbage collector only runs while `jstack` is not running.
    That means `jstack` can’t see or diagnose GC performance problems.


    Likewise, the Chatty SELECT N+1 issues are part of a strategy unto themselves,
    and it really helps to visualize them in a SQL Sequence Diagram to fully understand
    the problem.


    There are other blind spots, as well. Consider a container’s Web Container Max
    setting—the setting the limits the number of threads processing HTTP requests.
    If that number gets maxed out, then thread dumps will do very little to show the
    problem. To get around this, it might just be helpful to follow the “Raise caps
    before production and lower them before production” idea.


    ### How Much Load?


    I mentioned elsewhere that the P and the A in P.A.t.h. are spelled out with capital
    letters because they are special: most of the time, you have the luxury of being
    able to detect problems in those areas with just a single user’s traffic, and
    thus avoid the hassle of creating a load script and finding a performance environment.
    Well, here we are in the “t” part of the checklist and load is required here.
    The sampling techniques only make sense when constant load is applied, and understanding
    cumulative impact of all the processing is key.


    But how much load should be applied? Frankly, I am undecided on which of these
    to recommend to you:


    * The Scalability Yardstick: “Run an incremental load test with four equal steps
    of load, the first of which pushes the app server CPU to about 25%.”

    * 3t0tt, which means “Run three threads of load with zero think time.”


    …but since the second idea is easier, perhaps that is the best place to start.


    In fact, I think all components as big as an SOA service should undergo the torment
    of three threads of load with zero think time, and thread dumps should be captured
    during this test.'
