- fmt: "# littleMock Sample Application\n\n对于上述的`jpt` GitHub项目，要决定运行哪种测试，你需要将测试ID（如`01a`、`01b`、`02a`、`02b`等）同时传入`startWar.sh`和`load.sh`脚本。如果传入不同的测试ID，你会得到不同的行为，具体参见第2章的[表2-1](#A449023_1_En_2_Chapter.html#Tab1)。\n\
    \n`littleMock` GitHub项目则不同。启动脚本没有用于确定配置的参数。相反，配置是通过一个位于`http://localhost:8080/ui`的小型网页完成的。如果你想制造一点小麻烦，`littleMock`的网页正合你意。你是否想通过大量RAM分配来撑爆堆，仅仅为了观察GC响应时间变差？或者你想在无意义的循环中（几乎）无限迭代？使用`littleMock`，你甚至可以用极其缓慢但非常常用的XPath和XSLT惯用法让系统陷入停滞。`littleMock`网页将权力交到你手中。\n\
    \n只需点击几个按钮，性能变化就会立即生效。如果你愿意，也可以关闭该变化。不，别那样做。相反，通过使用“性能键”（Performance Key）——一个可以同时应用的多个配置的逗号分隔列表——同时配置半打噩梦来制造一场完美风暴。雅典娜和阿瑞斯，小心了。\n\
    \n只需输入一个性能键，如图[8-2](#A449023_1_En_8_Chapter.html#Fig2)所示，然后点击“更新”。后续章节将提供各种性能键，以便你学习如何排查某些性能问题。或者，你也可以点击键下方的单个设置（未显示）来查看它们如何影响性能。你所做的每一个单独更改都会立即反映在性能键中，反之亦然。\n\
    \n![A449023_1_En_8_Fig2_HTML.gif](A449023_1_En_8_Fig2_HTML.gif)\n\n图8-2. `littleMock`的网页和逗号分隔的性能键，使您能够一次性拨入多个性能设置。单个设置（逗号之间的部分）在键下方的页面中进一步描述。\n\
    \n`littleMock`网页允许您进行即时调优更改，其影响可以立即在`glowroot`监控中看到，该监控位于`http://localhost:4000`，就像在`jpt`中一样。图[8-3](#A449023_1_En_8_Chapter.html#Fig3)展示了其架构。\n\
    \n![A449023_1_En_8_Fig3_HTML.gif](A449023_1_En_8_Fig3_HTML.gif)\n\n图8-3. `littleMock`应用程序的架构。请注意，`load.sh`和`startWar.sh`不接受任何参数。要更改`littleMock`的性能，请使用小型UI网页：`http://localhost:8080/ui`\n\
    \n## 别忘了\n\n在自己的机器上运行`jpt`和`littleMock`应用程序将提供仅靠阅读无法获得的动手实践经验，因此我鼓励你现在就下载这些应用程序。以下是URL，再列一次：\n\
    \n[`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)\n\
    \n[`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)\n\
    \n一旦这些示例启动并运行，你将能够演示一次编写、随处运行的性能缺陷，这些缺陷可以在小型和大型环境中复现。\n\n## 下一步\n\n在你使用`jpt`项目运行`init.sh`脚本后，你的机器上将拥有一个包含超过200万行数据的数据库——而创建所有这些数据只需10-15分钟。下一章关于持久化（Persistence）的“P”，将帮助你诊断单个查询的常见问题，同时也会展示如何检测作为单个服务器端请求一部分执行的多个查询的低效策略。\n\
    \n# 9. 持久化，P.A.t.h.中的“P”\n\n本章涵盖P.A.t.h.检查清单中的第一项，即代表持久化的“P”，并展示如何评估性能健康状况以及如何解释所得数据以改进系统性能。\n\
    \n本章的目标是：\n\n*   了解Java服务器端软件中最大的性能问题以及导致该问题的两种最常见的反模式。\n*   学习如何诊断由以下原因引起的应用程序性能问题：\n\
    \    *   单个JDBC SQL查询\n    *   多个JDBC SQL查询，无论单个查询运行得多快\n*   了解小型开发数据库如何导致性能安全的虚假安全感。\n\
    \n我相信，众多性能专家广泛认同“数据库调用过多”是Java服务器端软件中最严重的性能缺陷，但我们仍然看到存在此问题的系统，而且修复该问题的成本几乎高得令人望而却步（重构所有SQL）。\n\
    \n为了巩固这一观点，我持续更新以下博客文章，其中包含关于此问题的各种观点：\n\n[`http://ostermueller.blogspot.com/2014/11/the-worst-server-side-performance.html`](http://ostermueller.blogspot.com/2014/11/the-worst-server-side-performance.html)\n\
    \n本章展示了如何在运行中的系统（一个可以在你自己机器上运行的系统）中检测“数据库调用过多”问题。它还展示了如何仅通过查看源代码，寻找几种不同的性能反模式来发现问题。最后，它量化了通过修复问题所能获得的巨大性能提升。\n\
    \n前一章描述了本书附带的两个可在自己机器上运行的性能示例集。`littleMock`示例不使用数据库，因此本章的示例来自另一组——`jpt`——它附带一个H2数据库（`h2database.com`）。`jpt`的`init.sh/init.cmd`脚本用超过200万行数据填充数据库，以便更真实地审视这些问题。"
  raw: "## littleMock Sample Application\n\nFor the jpt github.com project above,\
    \ to decide what kind of test you want to run, you need to pass the test ID (01a,\
    \ 01b, 02a, 02b, and so on) into both the startWar.sh and the load.sh scripts\
    \ . If you pass in a different test ID, you get different behavior, based on Table\
    \ [2-1](#A449023_1_En_2_Chapter.html#Tab1) in Chapter [2](#A449023_1_En_2_Chapter.html).\n\
    \nThe littleMock github.com project is different. There are no parameters for\
    \ the startup scripts to determine configuration. Instead, the configuration is\
    \ done via a small web page that is available via `http://localhost:8080/ui`.\
    \ If you’re ever in the mood stir up a little trouble, littleMock’s web page is\
    \ just for you. Would you like to overrun the heap with large RAM allocations,\
    \ just to see GC response time suffer? Perhaps you’d like to iterate endlessly\
    \ (almost) through meanlingless loops? With littleMock, you can even grind the\
    \ system to a halt with pathetically slow (but very commnly used) XPath and XSLT\
    \ idoms. The littleMock web page puts the power in your hands.\n\nJust click a\
    \ few buttons and the performance change is implemented immediately. Toggle the\
    \ change off, if you’d like. No, don’t do that. Instead, brew up a perfect storm\
    \ by configuring half a dozen nightmares simultaneously using a “Performance Key”,\
    \ a comma-separated list of multiple configurations that can be applied at the\
    \ same time. Athena and Ares, look out.\n\nJust enter a Performance Key as shown\
    \ in Figure [8-2](#A449023_1_En_8_Chapter.html#Fig2)   and click ‘Update.’ Subsequent\
    \ chapters will provide various Performance Keys so you can learn how to troubleshoot\
    \ certain performance problems. Alternatively, you can click on the individual\
    \ settings below the Key (not shown) to see how they impact performance. Every\
    \ individual change you make is immediately reflected in the Performance Key,\
    \ and vice versa.\n\n![A449023_1_En_8_Fig2_HTML.gif](A449023_1_En_8_Fig2_HTML.gif)\n\
    \nFigure 8-2.\n\nlittleMock’s web page and the command-separate Performance Key\
    \ that enables you to dial in multiple performance settings at a single time.\
    \ Individual settings (between the commas) are described further down the page,\
    \ below the Key.\n\nThe littleMock web page lets you make on-the-fly tuning changes\
    \ whose impact can be immediately seen in the glowroot monitoring , which is available\
    \ at http://localhost:4000, just as it is in jpt. Figure [8-3](#A449023_1_En_8_Chapter.html#Fig3)\
    \ shows the architecture.\n\n![A449023_1_En_8_Fig3_HTML.gif](A449023_1_En_8_Fig3_HTML.gif)\n\
    \nFigure 8-3.\n\nArchitecture of the littleMock application. Note that the load.sh\
    \ and the startWar.sh do not accept any parameters. To alter performance of littleMock,\
    \ use the small UI web page: `http:/localhost:8080/ui`\n\n## Don’t Forget\n\n\
    Running the jpt and littleMock applications on your own machines will provide\
    \ a hands-on-experience that you can’t get from just reading along, so I encourage\
    \ you to download the applications now. Here are the URLs , one more time:\n\n\
    [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)\n\
    \n[`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)\n\
    \nOnce these examples are up and running, you will be able to demonstrate write-once-run-anywhere\
    \ performance defects that can be reproduced in small and large environments,\
    \ alike.\n\n## What’s Next\n\nAfter you run the init.sh script with the jpt project,\
    \ you will have a database on your machine with more than 2 million rows—and it\
    \ takes just 10-15 minutes to create all that data. The next chapter on P for\
    \ Persistence, will help you diagnose garden-variety problems with individual\
    \ queries, but also it will show how to detect inefficient strategies around multiple\
    \ queries that execute as part of a single server-side request.\n\n# 9. Persistence,\
    \ the “P” in P.A.t.h.\n\nThis chapter covers the first item in the P.A.t.h. checklist,\
    \ “P” for Persistence, and it shows how to assess performance health and how to\
    \ interpret the resulting data to improve system performance.\n\nThe objectives\
    \ of this chapter are:\n\n*   Know the biggest performance problem in Java server-side\
    \ software and the two most common anti-patterns that cause it.\n*   Learn how\
    \ to diagnose application performance problems caused by:\n    *   Individual\
    \ JDBC SQL queries\n    *   Multiple JDBC SQL queries, regardless of how fast\
    \ the individual queries run\n*   Learn how a small development database can lead\
    \ to a false sense of performance security.\n\nI believe there is wide agreement\
    \ among a variety of performance experts that “too many database calls” is the\
    \ worst performance defect in Java server-side software, but we continue to see\
    \ systems with this problem, one that is almost prohibitively costly to fix (refactor\
    \ all the SQL).\n\nTo help cement this opinion, I keep the following blog post\
    \ up-to-date with various opinions on the matter:\n\n[`http://ostermueller.blogspot.com/2014/11/the-worst-server-side-performance.html`](http://ostermueller.blogspot.com/2014/11/the-worst-server-side-performance.html)\n\
    \nThis chapter shows how to detect the “too many database calls” problem in a\
    \ running system—a system you can run on your own machine. It also shows how to\
    \ find the problem just by looking at the source code, by looking for a few different\
    \ performance anti-patterns. Finally, it quantifies the great performance boost\
    \ you can get by fixing the problem.\n\nThe previous chapter described the two\
    \ sets of run-on-your-own-machine performance examples that come with this book.\
    \ The littleMock examples do not use a database, so this chapter’s examples come\
    \ from the other set—jpt—which come with an H2 database (h2database.com). The\
    \ jpt `init.sh/init.cmd` script populates the database with more than 2 million\
    \ rows of data for a more realistic look at these issues."
