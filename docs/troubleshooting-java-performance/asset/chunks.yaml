- fmt: '# Part I

    Getting Started with Performance Tuning


    # 1. Performance Anti-Patterns


    Before getting into the details of performance troubleshooting and tuning, it
    is helpful to have a high-level understanding of how performance defects make
    it into code in the first place. The four anti-patterns presented in this chapter
    illustrate the main kinds of defects you will encounter in Java server-side software.
    Throughout the book, we will refer back to the performance anti-patterns described
    in this chapter.


    The objectives of this chapter are:


    - Learn how to start with unfamiliar-looking, raw data from a performance monitoring
    tool and create a story (aka hypothesis) around it that describes how the code
    got to be so slow.

    - Recognize the striking similarities between most performance defects.

    - Commit to memory the names of the four Main Performance Anti-Patterns, or perhaps
    define your own anti-patterns.

    - Learn how to assess whether a given defect is a large or small processing challenge.


    When you first start investigating a performance problem, you know very little—perhaps
    you have a scrap or two of suspicious-looking data from one of the monitoring
    tools mentioned in the four P.A.t.h. chapters later in this book—but there is
    no smoking gun, no fix-in-the-waiting. This is the problem: you are stuck with
    just a sketch of the slowdown and you need a detailed picture to identify the
    culprit.


    To fill in those details and to better understand the full story behind your defect,
    this chapter provides dossiers on the four most common types of performance defects—I
    call them the Main Performance Anti-Patterns.


    ## Main Performance Anti-Patterns


    Here are the Main Performance Anti-Patterns. As you are investigating a performance
    problem, ask yourself which of these anti-patterns your defect most closely resembles.


    1. Unnecessary Initialization: While initializing some larger process, the system
    frequently reprocesses a small result that has already been processed. The accumulated
    effect of the many executions is extra CPU/RAM consumption and/or slower execution
    that can all be avoided. Caching the small result is the main antidote.

    2. Strategy/Algorithm Inefficiency: A misconfigured or poorly chosen algorithm
    or coding strategy is causing performance problems. A strategy is a technique
    used throughout a code base and an algorithm is a plan used to implement a single
    component.

    3. Overprocessing: The system is doing unnecessary work. Removing that work provides
    measurable performance benefit. One example is retrieving too much data, where
    most of the data is discarded. Another example is including in your load test
    the wrong resource-hungry use case—one that is seldom used in production.

    4. Large Processing Challenge: Attempting to process and conquer a massive amount
    of data. Very few applications legitimately have such a need, but they do exist.
    Querying 4 billion rows of data. Transferring 10MB of data repeatedly over a slow
    network, and so on.


    Unfortunately, there is overlap between these main anti-patterns, where one performance
    defect might fit two or more different main anti-patterns. To get around this
    fuzzy categorization issue, I have sorted these four issues from the most to least
    common (based on my own experience). This enables you to walk down the list in
    order and choose the first one that has the best fit to the problem you are faced
    with.


    ## Main Anti-Pattern #1: Unnecessary Initialization


    This anti-pattern frequently shows up in initialization, prior to actually doing
    something. This is a type of inefficient, CPU- and I/O-intensive coding in which
    certain tasks that have already been processed are unnecessarily reprocessed,
    often ad nauseum, causing unnecessary overhead. For example, rereading and reparsing
    an XML Schema `.xsd` file for every schema validation is unnecessary because the
    data in the `.xsd` file rarely changes. Instead of rereading/reparsing the `.xsd`,
    store and use a cached version that is already parsed.


    Well, `.xslt` files are static too, and they have the same issue as `.xsd` files—they
    must be read from the file system (or network) and parsed before the transformation
    party begins, but most systems incur the reread and reparse overhead for every
    single transformation.


    It turns out that static data, like `.xsd` and `.xslt` files, is everywhere, and
    there is a performance penalty to rereading or reparsing all that data. Here are
    examples of application-level data with this same problem:


    - Authorization data. Which user has been granted which roles, and which roles
    have permissions to which resources? If you decide to cache this data to get a
    nice performance boost, the cache can easily be evicted-on-demand to accommodate
    time-sensitive security changes, like revoking privileges from your favorite disgruntled
    ex-employee.

    - Product data. Yes, it would be tough for Wal-Mart and Amazon to fit their modest
    product offerings in RAM, but many organizations whose product offerings can fit
    nicely into a half gigabyte of RAM can boost performance by loading product configuration
    into memory at system startup.

    - Organizational data, like physical plant locations, lists of countries of the
    world, states in the USA, and so on.

    - Processing configuration data, like various transaction codes that orchestrate
    the flow of debits and credits in a banking system.


    Repeatedly reloading any of those kinds of static application data causes measurable
    and problematic overhead. However, these improvements are not limited to application
    data, because there are even lower-level objects that are costly to repeatedly
    reload, as well. For example, many XML processing APIs sure seem like 100% of
    their processing is done in-memory, until you discover large, heaping portions
    of file system reads, jar-file-unzipping, and synchronization. Part of the problem
    is that the majority of Internet XML how-to articles advocate coding idioms that
    are insensitive to performance concerns. All of this nasty I/O can be avoided
    by an alternative idiom to consuming the API. Lots of room for optimization here.
    So, try these suggestions. You can find the code for these on my `eostermueller`
    repo on `github.com`—it’s named `crazyFastXml`:


    [`https://github.com/eostermueller/crazyFastXml`](https://github.com/eostermueller/crazyFastXml)


    - For XSLT, cache and reuse the output of `javax.xml.transform.TransformerFactory.newTransformer()`

    - For SAX parsing, cache and reuse the output of `javax.xml.parsers.SAXParserFactory.newSAXParser()`

    - For StAX parsing, cache and reuse the output of `javax.xml.stream.XMLInputFactory.newInstance()`
    and `javax.xml.stream.XMLOutputFactory.newInstance()`

    - For XPath, instead of using `javax.xml.xpath.XPathFactory.newXPath()`, use `org.apache.xpath.CachedXPathAPI`.


    We will talk more about how to detect and fix these issues, especially in Chapter
    [11](#A449023_1_En_11_Chapter.html).


    Caching the right objects helps avoid this first anti-pattern (Unnecessary Initialization).
    Exactly the same thing applies to networking: caching and reusing a network connection
    (aka TCP socket) is many times more efficient than shutting down and re-creating
    it for every request. For example:'
