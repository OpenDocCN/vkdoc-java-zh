    The application under load that we’ve been using since the beginning of this chapter
    is littleMock. It is a tiny little HTTP stub server that I modeled after wiremock.org.
    A stub server is basically a test double, used in a test environment as a stand-in
    for some other system that was too expensive or too troublesome to install. If
    the XML-over-HTTP input (from load.sh/JMeter) matches one of five XPath expressions
    configured in littleMock’s `application.properties`, it returns a preconfigured
    response XML that mimics a response from the stubbed-out system.


    As such, XPath evaluation and XML parsing (of the HTTP input requests) are the
    main processing of this application, and this is our first task—to assess whether
    these four stack traces occurred before, during, or after the main processing.'
  trans: '

    ### 利用四种反模式


    诚然，第 1 章讨论的性能反模式有些过于笼统。但既然我们已经掌握了“入口”、“触发点”和“当前点”这些术语，情况就完全不同了；我们可以更具体地进行分析。


    回答“在请求时间线的哪个位置捕获了特定的堆栈跟踪”这个问题，对于描绘这个缺陷是如何产生的故事至关重要。让我们快速回顾一下：


    1.  不必要的初始化

    2.  策略/算法效率低下

    3.  过度处理

    4.  大规模处理挑战


    如果触发点标记出现在“主要”处理之前，请检查这是否是第 1 种问题——不必要的初始化。相当多的性能缺陷都发生在这里。如果有大量数据需要初始化（例如从数据库加载
    500MB 的产品描述），那么可以考虑在启动时（或当第一个请求到来时）一次性处理这些数据，然后将结果缓存起来以便后续快速访问。


    如果该过程没有加载 500MB 的产品描述或其他类似的大数据任务，那么你应该问自己，为什么处理少量数据需要这么长时间（记住，MTDP 是慢速处理的专属俱乐部）。如果数据量很小，那么也许需要重新考虑触发代码到达当前点所走的路径。大多数
    API 都有多种使用模式，也许你的代码所采用的模式并非最优。当触发代码首次调用并最终到达当前点时，它向你表明了触发点选择了哪种模式（或至少是模式的一部分）。


    如果堆栈跟踪是主要处理过程的一部分，那么请检查你是否遇到了第 2 种问题——策略/算法效率低下。单个缓慢的数据库查询属于此类，由 SELECT N+1 问题导致的“话多”数据库策略，或者仅仅是总体上数据库调用过多也属于此类。也就是说，使用
    P.A.t.h.检查清单中“P”代表“持久化”部分所介绍的工具集和方法，可以更容易地识别这些罪魁祸首。


    第三种反模式很容易检查。根据类名和方法名，甚至入口点标记，判断这是否属于负载测试中的业务过程。例如，也许 JMeter 负载测试中的样本数据使用了 QA 部门那个特殊的测试客户，该客户的账户数量是普通客户的一百倍（这得怪
    QA！）。如果是这样，请修复负载脚本，减少对此业务过程的调用。


    对于反模式 4，即大规模处理挑战，与反模式 3 一样，检查通向触发点的调用，以评估正在执行的是哪个业务过程。大规模处理挑战规模巨大，你应该在开发期间就了解它们并开始规划（例如，安装额外的磁盘空间、编写大数据加载和备份脚本等）。


    ### 交互式线程转储阅读练习


    接下来，示例将变得详细，你最好在自己的桌面上实际操作一下。


    开始调优时，首先要克服的障碍之一是决定针对哪个特定的堆栈跟踪进行改进。本示例将引导你完成这样一个案例。


    以此性能键作为本示例的起点。


    X0,J25,K25,Q1,R1,S1


    在`load.sh/cmd`启动并运行后，我运行了`jcmd`来查找 littleMock 的 PID，并使用`jstack`捕获了四个线程转储。我使用了之前讨论的标准来找出哪些线程处于负载之下。正如我们之前所见，每个线程转储中有三个线程处于负载之下，乘以四个转储，总共
    12 个堆栈跟踪。


    清单 11-9 显示了这 12 个处于负载下的线程的关键部分。前两个线程各出现了五次，后两个线程各出现了一次。5+5+1+1 = 12。我鼓励你在自己的机器上亲自尝试这个示例，看看是否得到比例相似的堆栈跟踪；我相信你会得到。


    ```

    at com.sun.org.apache.xpath.internal.jaxp.XpathImpl.getResultAsType(XPathImpl.java:317)

    at com.sun.org.apache.xpath.internal.jaxp.XpathImpl.evaluate(XPathImpl.java:274)

    at com.github.eostermueller.littlemock.XPathWrapper.matches(XPathWrapper.java:25)

    at com.github.eostermueller.littlemock.PlaybackRepository.getConfigByXPath(PlaybackRepository.java:144)

    at com.github.eostermueller.littlemock.PlaybackRepository.locateConfig_noCaching(PlaybackRepository.java:96)

    at com.sun.org.apache.xerces.internal.parsers.XMLParser.parse(XMLParser.java:141)

    at com.sun.org.apache.xerces.internal.parsers.DOMParser.parse(DOMParser.java:243)

    at com.sun.org.apache.xerces.internal.jaxp.DocumentBuilderImpl.parse(DocumentBuilderImpl.java:339)

    at com.github.eostermueller.littlemock.PlaybackRepository.getConfigByXPath(PlaybackRepository.java:143)

    at com.github.eostermueller.littlemock.PlaybackRepository.locateConfig_noCaching(PlaybackRepository.java:96)

    at javax.xml.xpath.XPathFactoryFinder.newFactory(XPathFactoryFinder.java:138)

    at javax.xml.xpath.XPathFactory.newInstance(XPathFactory.java:190)

    at javax.xml.xpath.XPathFactory.newInstance(XPathFactory.java:96)

    at com.github.eostermueller.littlemock.XPathWrapper.matches(XPathWrapper.java:22)

    at com.github.eostermueller.littlemock.PlaybackRepository.getConfigByXPath(PlaybackRepository.java:144)

    at java.security.AccessController.doPrivileged(Native Method)

    at javax.xml.parsers.FactoryFinder.findServiceProvider(FactoryFinder.java:289)

    at javax.xml.parsers.FactoryFinder.find(FactoryFinder.java:267)

    at javax.xml.parsers.DocumentBuilderFactory.newInstance(DocumentBuilderFactory.java:120)

    at com.github.eostermueller.littlemock.PlaybackRepository.getDocBuilder(PlaybackRepository.java:167)

    清单 11-9. 四个线程转储中处于负载下的四个唯一堆栈跟踪

    ```


    我们从本章开始就一直使用的处于负载下的应用程序是 littleMock。它是一个微小的 HTTP 存根服务器，我仿照 wiremock.org 构建的。存根服务器基本上是一个测试替身，在测试环境中用作其他系统的替代品，这些系统安装成本过高或过于麻烦。如果（来自
    load.sh/JMeter 的）基于 XML 的 HTTP 输入与 littleMock 的`application.properties`中配置的五个
    XPath 表达式之一匹配，它就会返回一个预配置的响应 XML，模拟被存根系统的响应。


    因此，XPath 评估和 XML 解析（针对 HTTP 输入请求）是此应用程序的主要处理过程，这也是我们的首要任务——评估这四个堆栈跟踪是发生在主要处理过程之前、期间还是之后。

