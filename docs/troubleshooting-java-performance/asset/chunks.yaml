- fmt: "### Load Scripts and SUT Logons\n\nThe third performance anti-pattern discussed\
    \ in Chapter [1](#A449023_1_En_1_Chapter.html) is “Overprocessing.” It says, in\
    \ part, that trying to load-test and tune a seldom-used business process is a\
    \ waste of time. Instead, we should focus on the most important and frequently\
    \ used processes.\n\nWhen first creating a load script, it is very easy to run\
    \ into this exact situation, and have your users log in and out of the system\
    \ much more frequently than would happen in production.\n\nSo, the main goal of\
    \ a First Priority load script is to make sure the SUT logon activity in your\
    \ script is somewhat realistic, especially for SUTs with processing-intensive\
    \ logons.\n\nThe intensive activity I’m talking about includes things like creating\
    \ resources for a user session, single sign-on, authorization of hundreds of permissions,\
    \ password authentication, and more. The more complex the logon process, the more\
    \ care that needs to be put into getting your load script to emulate realistic\
    \ logon scenarios. Why? Because it is a waste of time to tune something that isn’t\
    \ executed that often.\n\nIf you don’t have good data from production to understand\
    \ logon frequency (for example, that says how many logons happen system-wide in\
    \ an hour as compared to other business processes), you will have to make a judgement\
    \ call. In most systems, real users do not logon, perform two business processes,\
    \ and then log off—a 1 to 2 ratio. Instead, they do more work before logging out.\
    \ Perhaps users do 1 logon for every 10 other business processes is a more reasonable\
    \ ratio. My numbers are completely rough here—in the end you need to make the\
    \ call.\n\nUsing JMeter, one easy way to implement a roughly 1-to-10 ratio of\
    \ logon to other business processes would be to use a `Loop Controller` (mentioned\
    \ earlier) like this:\n\n1.  User logs on.\n2.  JMeter `Loop Controller` repeats\
    \ five times.\n    1.  Business process 1 (often requires a handful of HTTP requests).\n\
    \    2.  Business process 2 (often requires a handful of HTTP requests).\n3. \
    \ Logoff.\n\nOnce your script has a somewhat realistic number of SUT logons as\
    \ compared to other business processes, it is time to start applying load and\
    \ using the P.A.t.h. Checklist to find defects.\n\n### Using the Same SUT User\
    \ in Multiple Threads\n\nThe suggestions in this section can be done either the\
    \ First or Second Priority load script—your choice. I have included them here\
    \ because they are also logon issues, akin to the ones discussed earlier.\n\n\
    If your SUT disallows the same user to be logged in from two different browsers\
    \ at the same time, you get logon failures when logging on two or more concurrent\
    \ users in your load test.\n\nTo avoid this problem, you can read your user IDs\
    \ and passwords from a text file, instead of hardcoding a single user ID in the\
    \ load script. Picture a `.csv` file with one user ID and password per line. Here\
    \ is Jmeter’s component for reading from the file:\n\n[`http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config`](http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config)\n\
    \nMost load generators, including JMeter, have features to keep two threads from\
    \ using the same user (really just a line of text) at the same time. Default behavior\
    \ normally wraps to the beginning of the `.csv` file after that last record is\
    \ read/used. You could create the `.csv` file by hand in a text editor, or you\
    \ could manually export the results of a SQL statement like `SELECT MY_USER_NAME\
    \ FROM MY_USER_TABLE`.\n\nThere are other motivations to use a more realistic\
    \ number of users. Let’s talk straight about this. Memory leaks and multi-threaded\
    \ defects keep performance engineers very well employed, and generally, session\
    \ management code is imbued with plenty of each type of defect. Load testing with\
    \ one solitary SUT user ID, as with a freshly recorded and mostly unmodified load\
    \ script, will not sufficiently stress your SUT’s session management.[¹](#A449023_1_En_4_Chapter.html#Fn1)\n\
    \nLet’s say your scripts are still logging on the same user repeatedly. If the\
    \ SUT cached this user’s permissions, your hit/miss ratio would be unusually large\
    \ (one miss at app server startup followed by hit hit hit hit…), because that\
    \ same user would always remain in cache while a load test was running. This means\
    \ your SUT would always be taking the fast code path, loading the user’s permissions\
    \ from fast cache instead of the database (slower), and thereby underestimating\
    \ the actual amount of processing.\n\nWhen testing with just a single user, you\
    \ also miss out on understanding how much memory is required to keep a large number\
    \ of users in session. So, be sure to take a stab at how many users will be logged\
    \ on at any one time, and include that many users in your load testing.\n\nLastly,\
    \ while we are on the subject of users and session memory, don’t forget to validate\
    \ that your system’s auto logout functionality works. You may want to make a one-off\
    \ version of your load test and comment out all logoff activity. Run the test,\
    \ wait 30 minutes or so (or however long it takes your SUT to auto-logout users)\
    \ and verify that the session count drops down to zero.\n\n## Second Priority\n\
    \nTo fully and accurately model business processes and workloads, you need a full-featured\
    \ load generator like JMeter. However, as I said earlier, most performance defects\
    \ can be found using the small subset of functionality I’ve detailed in the “First\
    \ Priority” section. Of course there are critical bugs to be discovered with the\
    \ “Second Priority” enhancements, but there tend to be fewer of them. Those defects\
    \ also tend to be part of a single business process, instead of the SUT architecture\
    \ as a whole.\n\nThe following various load script stages show a typical progression\
    \ of enhancements that are made to scripts. Each stage shows enhancements you\
    \ can make.\n\n### Load Script Stage 1\n\nWhen you are at Load Script Stage 1,\
    \ you have recently recorded a load script of yourself using a web browser to\
    \ traverse the latest/greatest version of the SUT. Instead of being recorded,\
    \ of course, perhaps you are working with a manually collected set of requests\
    \ to an SOA. You have added to the scripts some processes that validate that all\
    \ HTTP/S responses are error free and contain a few key bits of response text.\
    \ A few correlation variables have been added to the script that will ferry a\
    \ single data item (like a generated new customer ID or a shipping confirmation\
    \ number) from the output of one HTML response to some needy web page in a subsequent\
    \ part of the script’s business workflow. Aside from that, few other modifications\
    \ have been made.\n\n#### Details\n\nLoad generation is a record-and-playback\
    \ technology and it is a little bit fragile, like most things code generated.\
    \ So keep a backup of the full, detailed HTTP log of the most recent record process;\
    \ perhaps keep the most recent recorded log and load script in source code control.\
    \ The log must include all the HTTP request URLs, any POST data, HTTP response\
    \ codes, and for sure the HTTP response text. When subsequent “refinements” to\
    \ the scripts break something, you can return to your pristine, pseudo-canonical\
    \ original log of the entire conversation to figure out what went wrong.\n\nIn\
    \ fact, with the right load generator, a simple but very careful text file diff/comparison\
    \ between the canonical and the broken HTTP log will guide you to your directly\
    \ to your functional script problems. There is an example of how to do this in\
    \ JMeter in Chapter [7](#A449023_1_En_7_Chapter.html). Look for the section “Debugging\
    \ an HTTP Recording.”"
