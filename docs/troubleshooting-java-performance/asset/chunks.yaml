    yet widely accepted test structures inserted into the development process to achieve
    strategic purposes. This small developer tuning environment design is our technology
    offering to address long standing, industry-wide performance issues.


    There will be skeptics that say that a small environment can never provide a close
    enough approximation of a production workload. These are generally the same people
    that feel that performance problems are only rarely reproducible. To this group
    I would say that the modest tuning environment is a reference environment that
    we use to demonstrate how to make our systems perform. We won’t fix everything,
    but we have to begin to demonstrate our resilience somewhere and somehow.'
  trans: '

    ## 按 PID 查看 CPU 消耗


    如果团队中只有一个人关心性能，那将是一场艰苦的上坡战。但当你有几个（或所有）同事共同关注问题、确保报告结果、研究性能解决方案等时，性能管理就会变得容易得多。


    因此，为了吸引（并保持）其他人的参与和兴趣，需要一定程度的性能透明度，以便更好地让其他人了解最新情况。例如，每个人都知道如何使用 `top` 和任务管理器来监控
    CPU 消耗。但你是否在整个测试期间都盯着它看，还是在查看大量其他指标时移开了视线？在故障排查时，我们都应该成为彼此优秀的怀疑论者，而一张测试期间的 CPU
    基本消耗图，确实能在这些问题被提出之前就帮助回答它们。


    但是，当你要在多台机器上监控 CPU，或者像我们这样，要区分单台机器上众多进程中哪个 CPU 占用高/波动大时，监控 CPU 的任务就变得更加繁重。我的观点是，定期创建并分享易于理解的图表和指标是值得花时间的。此外，在
    CPU 消耗这个特定问题上，目前缺乏能够按单个进程 ID（PID）绘制 CPU 随时间消耗图的开源/免费工具。


    我想快速介绍一个能做到这一点的工具，而且它恰好不仅能与 JMeter 配合使用，其结果还能与任何其他 JMeter 指标显示在同一张图表上。这个工具叫做 PerfMon，来自
    jmeter-plugins.org，网址是 [`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMon/)（见图
    2-7）。


    ![A449023_1_En_2_Fig7_HTML.jpg](img/A449023_1_En_2_Fig7_HTML.jpg)


    图 2-7. jmeter-plugins.org 的 PerfMon 允许你监控 CPU 和许多其他指标


    以下是一些说明：


    *   由于本次测试使用的 i7 处理器有八个核心，如果单条线达到 800，就意味着系统已 100% 消耗。对于六个核心，最大值是 600。在这张图中，我们有两条线，240
    和 40。240+40=280，280/800 = 35% CPU。

    *   在顶部的窗格中，我已将 PerfMon 配置为捕获六个不同 Java 进程的 CPU 指标。不幸的是，我不得不在我的 MacBook 上使用 `top`
    来确认哪个进程使用了约 240，哪个使用了约 40。

    *   有时会有许多低 CPU 消耗的线条造成干扰。图 2-3 中的“隐藏噪音”标签展示了一种临时移除那些消耗极低、使图表显得杂乱的线条的方法。自动缩放、颜色选择、隐藏线条以及其他出色的图表优化功能都记录在此处：[`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)


    我主要使用这些图表来确认负载生成器和任何存根服务器的 CPU 保持相对较低，可能低于 20%。JMeter 的读数大约为 40，所以 40/800=5% CPU，低于
    20%，因此 JMeter 的 CPU 消耗足够低。


    PerfMon 几乎可以在所有可用平台上运行。以下是另外两个也能按 PID 绘制资源消耗图的工具。它们都不原生支持 Windows，但你可以尝试在 Linux/Docker
    容器中运行它们：


    *   [`https://nmonvisualizer.github.io/nmonvisualizer/`](https://nmonvisualizer.github.io/nmonvisualizer/)

    *   [`https://github.com/google/cadvisor`](https://github.com/google/cadvisor)


    无论你使用哪种工具，拥有显示 CPU 和其他资源消耗的 PID 级别指标，对于了解在你适度的调优环境中是否存在行为异常的进程至关重要。在报告结果时，请记得指出来自测试基础设施（负载生成器和存根服务器）的消耗部分。


    ## 对比指标


    几年前，我在一个部署在 Tomcat 上且与 JMeter 位于同一台机器上的“空操作”Java Servlet 上运行了一个 JMeter 测试。如果我当时看到每秒
    1000 个请求，我想我会印象深刻。但在我更新版本的测试中，我看到了每秒超过 2800 个请求，CPU 消耗约为 35%。并且 99% 的请求在不到 1.3
    毫秒内完成（在 Servlet 端由 glowroot.org 测量）。


    这些结果好得惊人，以至于我至今还记得。我找不到我的车钥匙，但我记得我那台用了四年的笔记本电脑能产生多大的吞吐量，我建议你也这样做。为什么？这些数字非常强大，因为它们让我不再认为
    Java 天生就慢。它们也有助于消除关于 Tomcat、JMeter、TCP 甚至我的 MacBook 是否天生就慢的类似误解。


    最后，这些结果（图 2-8）让我觉得，即使在这个小型开发者调优环境的单台机器上，也能取得巨大的进步。


    ![A449023_1_En_2_Fig8_HTML.gif](img/A449023_1_En_2_Fig8_HTML.gif)


    图 2-8. 一个“空操作”Java Servlet 的响应时间和吞吐量指标。指标来自 Glowroot.org。Intel(R) Core(TM) i7-3615QM
    CPU @ 2.30GHz，Java 1.8.0_92-b14。


    ## 别忘了


    图 2-1 和图 2-2 中的环境截然不同！本章讨论了在开发者适度调优环境（图 2-1）设计中排除的所有内容。我们正在缩小范围，以便能够审查我们开发者负责的那部分系统——即代码——的性能。因此，有了“代码优先”的口号。


    我理解我提出的这个小型开发者调优环境看起来可能非常规，以至于你可能会怀疑它是否能复现足够真实的条件，使调优有价值。简而言之，这种环境设计的外观看起来非常人为。


    对此，我的回应是，这种特定的环境设计满足了一个长期存在的特定战略需求，有助于避免最后一刻仓促进行的性能调优工作，这些工作曾使我们的系统，甚至可能使我们的行业，变得有些不稳定。适度的调优环境还有助于我们在软件开发生命周期（SDLC）的早期识别并放弃性能不佳的设计方法。


    很少有人质疑风洞用于验证空气动力学或比例模型桥梁用于评估稳定性的有效性。风洞和模型桥梁虽然非常人为，但却是被广泛接受的、插入到开发过程中以实现战略目的的测试结构。这种小型开发者调优环境设计是我们为解决长期存在的、全行业范围的性能问题而提供的技术方案。


    会有怀疑论者说，小型环境永远无法足够接近地模拟生产工作负载。这些人通常也是那些认为性能问题几乎无法重现的人。对于这群人，我想说，适度的调优环境是一个参考环境，我们用它来演示如何让我们的系统表现出色。我们无法解决所有问题，但我们必须以某种方式、在某个地方开始展示我们的韧性。

    '
- fmt: '# What’s Next


    In the Introduction, I talked about how performance defects thrive in Dark Environments.
    Well, not all environments are Dark. Sometimes there is an unending sea of metrics
    and it’s tough to know which to use to achieve performance goals. The next chapter
    breaks down metrics into a few high-level categories and talks about how to use
    each to achieve performance goals. There are also a few creative solutions to
    restructuring your load tests that can help avoid wandering around lost in a completely
    Dark Environment.


    Footnotes [1](#A449023_1_En_2_Chapter.html#Fn1_source)


    If you’d like more detail, there are more service virtualization tools. See [`http://blog.trafficparrot.com/2015/05/service-virtualization-and-stubbing.html`](http://blog.trafficparrot.com/2015/05/service-virtualization-and-stubbing.html)


    And this book: [`http://www.growing-object-oriented-software.com/`](http://www.growing-object-oriented-software.com/).


    # 3. Metrics: The Antidote to Guesswork


    The Introduction talked about the concept of Dark Environments, the problem where
    the right monitoring is rarely available when and where you need it. This is indeed
    a problem that we as an industry are long overdue to talk about and address, but
    there are two sides to this story. If we forget about all the practical problems
    (security, access, licensing, overhead, training, and so on) of getting the right
    tool plugged into the right environment, the tables are completely turned around.
    For some, instead of being starved for data with too few metrics, many are frightened
    by the vast sea of all possible metrics, and how easily one could be duped by
    selecting the wrong one.


    The objectives of this chapter are:


    *   Understand which types of metrics should be used to determine whether to keep
    or discard tuning changes.

    *   Understand which types of metrics are used to identify components responsible
    for a particular slowdown.

    *   Remember that tracking, graphing, and sharing your system’s tuning progress
    over time helps people on your team care more about performance.


    This chapter breaks down this vast sea of metrics into three loose categories
    and shows how to put each category to work to accomplish key performance goals.


    ## Which Metric?


    When wrestling with performance issues, we spend a lot of time asking these three
    questions:


    *   The Resource Question: How much of the hardware resources is the system using
    (CPU, RAM, network, disk)? 35%? 98%?

    *   The Blame Question: What components of the system-under-test (SUT) are to
    blame for a particular performance problem? A “component” needs to be something
    specific that we can investigate, like a single Java method in a specific source
    code file, or perhaps a single DB query or other network request.

    *   The User Benefit Question: Will the end users notice the response time impact
    of a particular tuning enhancement? And which code or configuration change performs
    better?


    On a good day tuning a system, I am capable of doing the right thing, “following
    the data” instead of guessing at the answers to these three all-important questions.
    That means taking the time to capture certain metrics from carefully planned load
    tests. But when firefighting a really stressful production problem, or perhaps
    just on a bad day when my socks don’t match, all bets are off and my explanations
    for things are a nasty tangle of unsubstantiated guesswork. The Dark Environments
    issue makes this even harder because conjecture rules when the right metrics aren’t
    available, which unfortunately is pretty frequently.


    As such, this chapter aims to make it easier to find a helpful metric by first
    focusing on answering these key questions with metrics. In short, Table [3-1](#A449023_1_En_3_Chapter.html#Tab1)
    shows the metrics I suggest for answering each of our questions.


    Table 3-1. Metrics for Common Performance Questions


    |   | Performance Question | Answered by: |

    | --- | --- | --- |

    | 1 | Are resources (CPU/RAM/etc…) available? | The basics: `PerfMon`, `TypePerf`,
    `ActivityMonitor`, `top`/`htop`/`topas`/`nmon`/`sar`, and so on |

    | 2 | Which component is to blame for slowing things down? | Server-side data
    like thread dumps, Profiler data, verbose GC data, SQL throughput/response time,
    and so on |

    | 3 | Does the end user benefit? Which code change performs better? | Response
    time and throughput metrics from the load generator. |


    Some metrics help answer more than one of these questions. For example, questions
    2 and 3 both deal with response times, to some extent. My point is not to forge
    tight metric classifications without overlap, but to give you a reasonably good
    starting point for what metrics to use to answer each of these key questions.


    Later in the book, the four chapters on the P.A.t.h. Checklist answer question
    2 (what is to blame?). Question 1 (are there available resources?) uses metrics
    from tools everyone is familiar with, right? `Top`, `PerfMon`, `nmon`, and so
    on. Brendan Gregg’s USE method is a great way to avoid forgetting to watch resource
    consumption. Here is the link:


    [`http://www.brendangregg.com/usemethod.html`](http://www.brendangregg.com/usemethod.html)


    If a machine is part of your load test and you don’t have access to resource consumption
    metrics, beware of blaming it for any of your problems.


    I really think that learning the troubleshooting techniques in the four P.A.t.h.
    chapters is a do-able thing. It might be more of a challenge to stay abreast of
    all three of these metrics questions for the duration of the tuning process—forgetting
    just one of them is so easy.


    The rest of this chapter is devoted to answering question 3, determining whether
    your end users will benefit from various proposed performance changes.


    ## Setting Direction for Tuning


    Deciding which tuning enhancements to keep sets a lot of the direction for the
    tuning process. Generally, faster response time and higher throughput metrics
    from your load generator should provide the final say on whether to keep a particular
    change. Lower resource (CPU/RAM) consumption is also key, but normally it is a
    secondary factor.


    All of this advice sounds a bit trivial, so let me zero in on this point: only
    decide to keep a performance tuning change once the load generator tests show
    it will benefit the end user or reduce resource consumption. Just because a code
    or config change benefitted some other environment doesn’t mean it will benefit
    your environment. Furthermore, unsubstantiated guessing deflates confidence in
    a tuning project. Avoid it when you can.


    Consider this example: a code change that buys you a 10ms response time improvement
    can do magical, transformational things to a system with 30ms response time, but
    the likelihood of making a big performance splash is pretty low if you apply that
    same 10ms-improvement-change to a system with 3000ms response time. Let the load
    generator metrics drive the bus; let them guide which code/config changes to keep.


    But tuning guidance doesn’t come solely from load generator metrics, because tuning
    conspicuously high CPU consumption out of the system is pretty important, too.
    CPU plays an even larger role than getting rid of CPU-heavy routines—it provides
    us with a handy yardstick, of sorts, that we can use to determine whether a system
    will scale. Chapter [6](#A449023_1_En_6_Chapter.html) provides very specific guidance
    on the matter, stay tuned.


    Many different metrics, like those to be discussed in the P.A.t.h. chapters, contribute
    to deciding what change to keep: server-side verbose GC metrics, SQL response
    time metrics, micro-benchmark results. But ultimately, these changes should only
    be kept in the code base if the load generator results show benefit for the end
    user. Remember: load generator metrics drive the bus. CPU and RAM consumption
    metrics are important too—they ride shotgun.'
