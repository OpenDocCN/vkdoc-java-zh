    *   如前所述，服务器端代码生成唯一 ID 的任何位置。

    *   在脚本录制过程中，你输入数据或选择某些选项的任何位置。

    *   应用程序中存储 HTML 隐藏变量的所有部分。

    *   任何其他位置，例如使用隐藏变量时，JavaScript 将数据从一个服务器端请求的输出移动到另一个服务器端请求的输入。

    *   所有使用 CSRF 令牌（ [`https://stackoverflow.com/questions/5207160/what-is-a-csrf-token-what-is-its-importance-and-how-does-it-work`](https://stackoverflow.com/questions/5207160/what-is-a-csrf-token-what-is-its-importance-and-how-does-it-work)
    ）的地方。这些不可猜测的令牌是动态生成的，并存储在 URL 参数中。它们使得恶意网页难以在你浏览器的一个标签页中，向另一个标签页中的其他站点（例如你的银行）执行请求。

    *   使用 JMeter 时，关联变量对于 JSESSIONID 支持并非必需。相反，只需确保你的 JMeter 脚本有一个 Cookie 管理器。


    重申一下，你需要负责找出需要添加关联变量的位置。从上面的列表开始，之后你的任务将变得繁琐：仔细评估每个 HTTP 请求是否返回了正确的数据，并在必要时添加此技术。另一种在脚本中定位关联变量位置的方法是，思考你在浏览器中输入的所有数据项：搜索特定的客户名称、选择要购买的特定商品、选择你想在单身酒吧看到的那只特别的海牛。


    无论使用哪种负载生成器，关联变量对于应用真实的生产负载都至关重要。但如果你使用的是 JMeter，第 7 章将提供一个基于本书 github.com 仓库中的示例
    JMeter .jmx 计划，创建关联变量的分步指南。请查找 `jpt_ch07_correlationVariables.jmx`。


    ### 在负载脚本中对步骤进行排序


    当你录制负载脚本时，你会登录到被测系统（SUT），浏览几个网页执行业务流程（例如前面详述的“创建客户”），然后注销。


    负载生成器允许你选择将录制的脚本播放一次、重复播放特定次数，或重复播放特定时长。在 JMeter 中，这些选项可以在一个名为线程组的东西中找到，你还可以在此处设置同时重放脚本的线程数。JMeter
    自带的默认线程组对于基本任务来说已经足够，但我非常喜欢 Blaze Meter 的并发线程组。它有一个很好的可视化显示，展示你的线程将如何快速增加到满负载。你可以从
    jmeter-plugins.org 下载它。


    通常，你需要两组（或更多）用户同时执行不同的业务流程。编写这种脚本的一个不那么显而易见的方法是，为每个任务分别录制两个脚本，然后将这两个脚本合并为一个。要在
    JMeter 中实现这一点，请在一个新的/空白的 JMeter 脚本中创建两个独立的线程组，并可以将它们命名为 A 和 B。


    然后分别录制并测试这两个负载脚本，并将一个脚本中的所有活动复制到 A 线程组，另一个复制到 B 线程组。


    这种组织方式有一些非常令人信服的理由。例如，它允许你为一个线程组设置更高的线程数（更多负载），而为另一个线程组设置更低的线程数，这使你能够（大致）反映最终用户在生产环境中使用的实际负载量。


    此外，这有助于你模拟一个帮助两组不同人员协调活动的 Web 应用程序的行为。例如，假设一组人员创建小部件的订单，而另一组人员批准每个订单。实现一个重复创建订单的线程组相当直接。要实现另一个包含订单批准活动的线程组，首先编写一个重复检查新订单的脚本。包括
    JMeter 在内的负载生成器，允许你添加条件测试，这些测试会在响应 HTML 中检查指示是否有新订单创建的标签或属性。一旦检测到新订单，你就可以添加录制的步骤来批准该订单。有关详细信息，请参阅
    JMeter 的 If 控制器和 While 控制器。循环控制器以及设置和拆卸线程组也会很有帮助。


    掌握了这些负载生成器基础知识后，接下来的两个部分将阐述一个两步计划：“第一优先级”和“第二优先级”，这有助于你平衡快速创建负载脚本与创建能够相对真实地施加负载的脚本之间的冲突需求。


    ## 第一优先级脚本


    性能焦虑是真实存在的；思考这些难以回答的问题：在达到性能目标之前，我们必须修复多少个缺陷？这需要多长时间？我们是否投资了错误的 Java 架构，一个永远无法良好运行的架构？用这些充满焦虑且无法回答的问题来戏弄项目规划者有点有趣，不妨找个时间试试。


    第一优先级脚本有助于你快速上手，迅速修复一些最明显的性能缺陷，并缓解部分性能焦虑。本节提供了一个“必须具备”的负载脚本增强功能的最低检查清单，这些功能是让你和你的团队相信负载测试有效性所必需的。但同时，也要将“第一优先级”版本视为一个上限：一旦添加了这些第一优先级的增强功能，就停下来。专注于解决第
    8 章中 P.A.t.h.检查清单所揭示的主要性能缺陷。一旦你控制住了最大的问题，就可以跳到本章后面的第二优先级负载脚本增强功能，以完成工作，并提供出色的性能。

