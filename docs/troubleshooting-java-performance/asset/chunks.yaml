  trans: '

    ## JMeter 简介


    在我刚开始接触 JMeter 时，真希望手边能有一张像图 7-2 那样的截图。在墙上挂一幅装裱好的大图可能有点夸张，但把复印件贴在 42 英寸大屏幕显示器下沿如何？我在截图上添加的文字展示了基本的负载生成功能，箭头则指向实现这些功能所需的
    JMeter 测试元件。图 7-2 中的第一张截图是启动 JMeter 时看到的空白界面。要设置成第二张截图的样子，你需要右键点击“测试计划”并开始添加内容。


    ![A449023_1_En_7_Fig2_HTML.gif](img/A449023_1_En_7_Fig2_HTML.gif)


    图 7-2.


    如何通过 JMeter 测试计划树完成任务。第一张截图是空白界面。第二张截图是右键点击并添加多个测试计划元件后的结果。


    我必须承认，JMeter 的负载计划树（主窗口左侧的树状结构）对新用户来说是一个难以逾越的可用性障碍。用户通常清楚自己最终想要什么结果。例如，“在 5 分钟内，通过
    HTTP 对两个不同的 SOA 服务施加 5 个线程的负载，需要响应时间和吞吐量的时序图。”但为了实现这个看似简单的目标，JMeter 却迫使新手陷入一场丑陋的试错游戏，我称之为“右键点击教育”。有经验的用户能轻松应对，但初学者不行。在
    UI 的左侧窗格中，你需要用一些名称古怪的构建块（称为测试元件）来组装一个树状结构（例如：线程组、虚拟采样器、查看结果树等）。树中的每个测试元件都有其类型，并且必须根据一套初学者一无所知的规则精确定位。测试元件及其类型（我主要使用这些类型：线程组、采样器、监听器、断言）以及所有具体的测试元件都在[此处有文档说明](http://jmeter.apache.org/usermanual/component_reference.html#introduction)：


    [`http://jmeter.apache.org/usermanual/component_reference.html#introduction`](http://jmeter.apache.org/usermanual/component_reference.html%23introduction)


    这里还有一些不错的顶层文档：


    [`http://jmeter.apache.org/usermanual/test_plan.html`](http://jmeter.apache.org/usermanual/test_plan.html)


    表 7-1.


    JMeter 负载计划中常用组件


    | 名称 | 描述 | 示例 |

    | --- | --- | --- |

    | 监听器 | 图表及其他显示结果的方式 |   |

    | 线程组 | 配置施加负载的线程数量。配置测试持续时间。 | [阶梯线程组](http://jmeter-plugins.org/wiki/SteppingThreadGroup/)
    ( [`https://jmeter-plugins.org/wiki/SteppingThreadGroup/`](https://jmeter-plugins.org/wiki/SteppingThreadGroup/)
    ) 或笨重的默认[线程组](http://jmeter.apache.org/usermanual/component_reference.html%23Thread_Group)
    ( [`http://jmeter.apache.org/usermanual/component_reference.html#Thread_Group`](http://jmeter.apache.org/usermanual/component_reference.html%23Thread_Group)
    ) |

    | 采样器 | 执行者。执行 HTTP 请求。执行 JMS 请求。执行 Java 代码。 |   |

    | 控制器 | 控制采样器的流程，包括“If”逻辑和循环逻辑 |   |

    | 断言 | 允许你配置 JMeter 如何判断一次采样器运行是成功还是失败。 |   |


    如果你右键点击某个特定的测试元件，就会看到从该位置可以合法添加哪些类型的子测试元件。所以，如果那天你的右键点击兴致足够高，你可以右键点击树上的每一个节点（有时可能有几十甚至上百个块），然后推断并记住整套规则——哪些测试元件类型可以/应该作为其他测试元件类型的父/子节点。这可真是“右键点击其乐无穷”。或者，并非如此。


    我在这里并非要给我“心爱之物”泼冷水。相反，我是想鼓励你避免“右键点击教育”的痛苦。一开始，请先依靠他人的帮助来构建你的负载计划树。具体来说，你可以将图 7-2
    中的截图作为指南，或者使用相对较新的 JMeter 模板功能，从一个现成的负载计划树开始，再或者让朋友分享他们的负载计划（一个 `.jmx`² 文件，采用专有的
    `.xml` 语法）。要使用模板功能，请以空负载计划树启动 JMeter，然后选择“文件 ➤ 模板”。即使经验丰富，我仍然依赖“录制模板”来录制新的 HTTP
    负载脚本，因为其树结构有点特殊。你很快就能熟悉哪些测试元件该放在哪里，然后就可以（哈）扩展思路，在负载计划树结构上发挥更多创意。

    '
- fmt: "# UI Features for Working Quickly\n\nThe quiverful of big red arrows in Figure\
    \ [7-2](#A449023_1_En_7_Chapter.html#Fig2) all point to individual items, the\
    \ Test Elements. Navigating, nay surfing, around all of those Test Elements is\
    \ a breeze by simply using the arrow keys on your keyboard. Each Test Element\
    \ has a particular Test Element type. All graphs, for example, are of the Test\
    \ Element type Listener. Test Elements for submitting HTTP requests are called\
    \ Samplers. To make them easy to find, I stick all my graphs at the highest level\
    \ (as children of Test Plan, the root). But let’s say I have inadvertently placed\
    \ some graphs further down into the tree. There are a number of features you could\
    \ use to quickly relocate them, and do other things as well:\n\n- **Drag and drop.**\
    \ The drag and drop implementation is surprisingly easy to use. Try it out for\
    \ yourself, dragging a test element to either change the order of siblings or\
    \ to change parentage altogether.\n- **Cut/Copy/Paste.** Bill Gates’ familiar\
    \ keyboard shortcuts (`Ctrl+X`, `Ctrl+C`, `Ctrl+V`) work very well. All three\
    \ of these operate on both the selected node and on all its children.\n- **Multi-select.**\
    \ `Shift+click` (selecting adjacent Test Elements) and `Ctrl+click` (selecting\
    \ non-adjacent Test Elements) work as you would expect.\n- **Duplicate the current\
    \ Test Element.** Need another test element just like the selected one? `Ctrl+Shift+C`\
    \ adds a copy just below the current. This even works if you copy a parent test\
    \ element that has many children.\n- You can also quickly disable a single Test\
    \ Element and all its children with the Enable/Disable/Toggle functionality, `Ctrl+T`.\n\
    - If you launch two completely different instances of the JMeter UI, you can effortlessly\
    \ cut/copy/paste between the two trees.\n\nAll of this cut/copy/paste functionality\
    \ is great for:\n\n- **Combining two load scripts.** Start two instances of the\
    \ JMeter GUI at the same time. Copy all the HTTP Request samplers from one instance\
    \ to the other. I can’t overestimate how important this technique is. Here are\
    \ three examples:\n    - The Load Generation overview in Chapter [4](#A449023_1_En_4_Chapter.html)\
    \ showed a First Priority and Second Priority scripts. You can record First and\
    \ Second Priority stuff in separate scripts, and then use this technique to append\
    \ the HTTP Samplers (and other stuff) in the Second Priority to the script for\
    \ the First.\n    - Every developer records their own business process, and this\
    \ technique is later used to combine them all into a single script.\n    - When\
    \ make code changes to a web page (like adding new required data entry), that\
    \ often makes the `.jmx` file out of date. To update the script, record the new\
    \ version of the web page in a separate, stand-alone `.jmx` file. Then carefully\
    \ delete the outdated portion of the old script, and use this technique to copy/paste\
    \ the new script into the old script.\n- **Rearranging components in the Test\
    \ Plan.** So that they are easy to see/find, I like to put all my graphs at the\
    \ highest level (as children of Test Plan). If graphs get scattered around, I\
    \ can easily use the arrow keys to surf around the load test plan, `Ctrl+Click`\
    \ to multi-select the ones I want to move, then `Ctrl+V` them to the new location.\n\
    - **Easily duplicate the currently selected node.** Let’s say you have configured\
    \ one Java Sampler and you want to create five others right long side it, as siblings.\
    \ Just select your Java sampler, and hit `Ctrl+Shift+C` five times. Voila.\n-\
    \ **I use the Toggle/Ctrl+T feature heavily.** Let’s say I want to compare the\
    \ performance of the code at two different URLs. I will create an HTTP Request\
    \ sampler for each, and then run them one at a time, using `Ctrl+T` to switch\
    \ the one that is enabled. If you avoid clearing out the results between runs,\
    \ you’ll have a nice graph like this: (TODO: Need graph of two different samplers,\
    \ run one at a time w/o clearing out results between runs).\n\n# Functional Validation\
    \ During Load Test Using JMeter Assertions\n\nThe `.jmx` script for this example\
    \ is in the jpt github.com repo in this location:\n\n```\nsampleJMeterScripts/jpt_ch07_functionalValidation.jmx\n\
    ```\n\nIn Chapter [5](#A449023_1_En_5_Chapter.html), I mentioned a half dozen\
    \ situations where you should bite the bullet and discard the results of a test\
    \ and rerun the entire thing. One of those potential reasons was lots of SUT errors.\
    \ You’ll have to decide for yourself exactly what percentage of errors triggers\
    \ a redo.\n\nBut if your SUT fails silently or important client data is quietly\
    \ omitted from an SUT web page, you might end up basing all kinds of decisions\
    \ on really faulty data. To avoid that situation, please take the time to tell\
    \ JMeter what constitutes a successful HTML response by adding JMeter Assertions\
    \ to check the HTML responses for key pieces of text, like the title of a web\
    \ page, or perhaps HTML text labels for a few key fields. Figure [7-3](#A449023_1_En_7_Chapter.html#Fig3)\
    \ shows how to add an Assertion.\n\n![A449023_1_En_7_Fig3_HTML.jpg](A449023_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3.\n\nAdding an Assertion. If the text in this Assertion is not found\
    \ in the parent Sampler’s response, then JMeter will tally an error in the “Summary\
    \ Report” and/or “Synthesis Report”.\n\nFigure [7-4](#A449023_1_En_7_Chapter.html#Fig4)\
    \ shows how to enter the text to be verified. Before entering the text, you’ll\
    \ need to first click the ‘Add’ button—bottom, center. If JMeter finds that the\
    \ text you enter is missing from the corresponding HTTP response, it will tally\
    \ an error. If your entire business process culminates in an “Order Submitted”\
    \ message, this is your chance to validate that the system coughs up this all-important\
    \ message. Don’t miss this chance.\n\n![A449023_1_En_7_Fig4_HTML.jpg](A449023_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4.\n\nA JMeter ‘Response’ Assertion. If you click ‘Add’ multiple times\
    \ and add text on each line, JMeter will flag this sampler as having errored out\
    \ if any of the lines of text are missing from the parent Sampler’s response.\n\
    \nIt would be bittersweet, to say the least, if your application displayed “Order\
    \ Submitted” immediately followed by “Fatal Exception / Your code failed.” You\
    \ can add a second Assertion as shown in Figure [7-5](#A449023_1_En_7_Chapter.html#Fig5)\
    \ that flips the logic. Just mark the ‘Not’ flag and JMeter will tally an error\
    \ if the given text, like ‘Fatal Exception’ is present.\n\n![A449023_1_En_7_Fig5_HTML.jpg](A449023_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5.\n\nA JMeter Response Assertion like in the previous Figure, but\
    \ with ‘Not’ checked. This tallies an error if the given text, like and error\
    \ message, is found in the Sampler’s response.\n\nI have prematurely claimed performance\
    \ victory before, only to later discover that 100% of the requests failed. Its\
    \ pretty embarrassing; I don't recommend it.\n\nNot only should you take the time\
    \ to add Assertions, you also need to watch for error counts/percentages, where\
    \ all Assertion failures and other errors (like HTTP errors) are recorded. Here\
    \ are three components (there are probably others) that will help you track errors:\n\
    \n- `jp@gc` - Transactions per Second (from JMeter Plugins)\n- Summary Report\
    \ (Error % column)\n- Synthesis Report (Error % column and from JMeter Plugins)\n\
    \nThe Assertion discussed here (Figures [7-4](#A449023_1_En_7_Chapter.html#Fig5)\
    \ and [7-5](#A449023_1_En_7_Chapter.html#Fig5)) only checks for preordained list\
    \ of strings. There are a number of other more sophisticated Assertions detailed\
    \ here: [`http://jmeter.apache.org/usermanual/component_reference.html#assertions`](http://jmeter.apache.org/usermanual/component_reference.html%23assertions)\n\
    \nFor example, the JSR223 Assertion lets you write code to validate any Sampler\
    \ response."
  raw: "## UI Features for Working Quickly\n\nThe quiverful of big red arrows in Figure\
    \ [7-2](#A449023_1_En_7_Chapter.html#Fig2) all point to individual items, the\
    \ Test Elements. Navigating, nay surfing, around all of those Test Elements is\
    \ a breeze by simply using the arrow keys on your keyboard. Each Test Element\
    \ has a particular Test Element type. All graphs, for example, are of the Test\
    \ Element type Listener. Test Elements for submitting HTTP requests are called\
    \ Samplers . To make them easy to find, I stick all my graphs at the highest level\
    \ (as children of Test Plan, the root). But let’s say I have inadvertently placed\
    \ some graphs further down into the tree. There are a number of features you could\
    \ use to quickly relocate them, and do other things as well:\n\n*   Drag and drop.\
    \ The drag and drop implementation is surprisingly easy to use. Try it out for\
    \ yourself, dragging a test element to either change the order of siblings or\
    \ to change parentage altogether.\n*   Cut/Copy/Paste. Bill Gates’ familiar keyboard\
    \ shortcuts (Ctrl+X, Ctrl+C, Ctrl+V) work very well. All three of these operate\
    \ on both the selected node and on all its children.\n*   Multi-select. Shift+click\
    \ (selecting adjacent Test Elements) and Ctrl+click (selecting non-adjacent Test\
    \ Elements) work as you would expect.\n*   Duplicate the current Test Element.\
    \ Need another test element just like the selected one? Ctrl+Shift+C adds a copy\
    \ just below the current. This even works if you copy a parent test element that\
    \ has many children.\n*   You can also quickly disable a single Test Element and\
    \ all its children with the Enable/Disable/Toggle functionality, Ctrl+T.\n*  \
    \ If you launch two completely different instances of the JMeter UI, you can effortlessly\
    \ cut/copy/paste between the two trees.\n\nAll of this cut/copy/paste functionality\
    \ is great for:\n\n*   Combining two load scripts. Start two instances of the\
    \ JMeter GUI at the same time. Copy all the HTTP Request samplers from one instance\
    \ to the other. I can’t overestimate how important this technique is. Here are\
    \ three examples:\n    *   The Load Generation overview in Chapter [4](#A449023_1_En_4_Chapter.html)\
    \ showed a First Priority and Second Priority scripts. You can record First and\
    \ Second Priority stuff in separate scripts, and then use this technique to append\
    \ the HTTP Samplers (and other stuff) in the Second Priority to the script for\
    \ the First.\n    *   Every developer records their own business process, and\
    \ this technique is later used to combine them all into a single script.\n   \
    \ *   When make code changes to a web page (like adding new required data entry),\
    \ that often makes the .jmx file out of date. To update the script, record the\
    \ new version of the web page in a separate, stand-alone .jmx file. Then carefully\
    \ delete the outdated portion of the old script, and use this technique to copy/paste\
    \ the new script into the old script.\n*   Rearranging components in the Test\
    \ Plan. So that they are easy to see/find, I like to put all my graphs at the\
    \ highest level (as children of Test Plan). If graphs get scattered around, I\
    \ can easily use the arrow keys to surf around the load test plan, Ctrl+Click\
    \ to multi-select the ones I want to move, then Ctrl+V them to the new location.\n\
    *   Easily duplicate the currently selected node. Let’s say you have configured\
    \ one Java Sampler and you want to create five others right long side it, as siblings.\
    \ Just select your Java sampler, and hit Ctrl+Shift+C five times. Voila.\n*  \
    \ I use the Toggle/Ctrl+T feature heavily. Let’s say I want to compare the performance\
    \ of the code at two different URLs. I will create an HTTP Request sampler for\
    \ each, and then run them one at a time, using Ctrl+T to switch the one that is\
    \ enabled. If you avoid clearing out the results between runs, you’ll have a nice\
    \ graph like this: (TODO: Need graph of two different samplers, run one at a time\
    \ w/o clearing out results between runs).\n\n## Functional Validation During Load\
    \ Test Using JMeter Assertions\n\nThe .jmx script for this example is in the jpt\
    \ github.com repo in this location:\n\n```\nsampleJMeterScripts/jpt_ch07_functionalValidation.jmx\n\
    ```\n\nIn Chapter [5](#A449023_1_En_5_Chapter.html), I mentioned a half dozen\
    \ situations where you should bite the bullet and discard the results of a test\
    \ and rerun the entire thing. One of those potential reasons was lots of SUT errors.\
    \ You’ll have to decide for yourself exactly what percentage of errors triggers\
    \ a redo.\n\nBut if your SUT fails silently or important client data is quietly\
    \ omitted from an SUT web page, you might end up basing all kinds of decisions\
    \ on really faulty data. To avoid that situation, please take the time to tell\
    \ JMeter what constitutes a successful HTML response by adding JMeter Assertions\
    \ to check the HTML responses for key pieces of text, like the title of a web\
    \ page, or perhaps HTML text labels for a few key fields. Figure [7-3](#A449023_1_En_7_Chapter.html#Fig3)\
    \ shows how to add an Assertion.\n\n![A449023_1_En_7_Fig3_HTML.jpg](A449023_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3.\n\nAdding an Assertion. If the text in this Assertion is not found\
    \ in the parent Sampler’s response, then JMeter will tally an error in the “Summary\
    \ Report” and/or “Synthesis Report”.\n\nFigure [7-4](#A449023_1_En_7_Chapter.html#Fig4)\
    \ shows how to enter the text to be verified. Before entering the text, you’ll\
    \ need to first click the ‘Add’ button—bottom, center. If JMeter finds that the\
    \ text you enter is missing from the corresponding HTTP response, it will tally\
    \ an error. If your entire business process culminates in an “Order Submitted”\
    \ message, this is your chance to validate that the system coughs up this all-important\
    \ message. Don’t miss this chance.\n\n![A449023_1_En_7_Fig4_HTML.jpg](A449023_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4.\n\nA JMeter ‘Response’ Assertion. If you click ‘Add’ multiple times\
    \ and add text on each line, JMeter will flag this sampler as having errored out\
    \ if any of the lines of text are missing from the parent Sampler’s response.\n\
    \nIt would be bittersweet, to say the least, if your application displayed “Order\
    \ Submitted” immediately followed by “Fatal Exception / Your code failed.” You\
    \ can add a second Assertion as shown in Figure [7-5](#A449023_1_En_7_Chapter.html#Fig5)\
    \ that flips the logic. Just mark the ‘Not’ flag and JMeter will tally an error\
    \ if the given text, like ‘Fatal Exception’ is present.\n\n![A449023_1_En_7_Fig5_HTML.jpg](A449023_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5.\n\nA JMeter Response Assertion like in the previous Figure, but\
    \ with ‘Not’ checked. This tallies an error if the given text, like and error\
    \ message, is found in the Sampler’s response.\n\nI have prematurely claimed performance\
    \ victory before, only to later discover that 100% of the requests failed. Its\
    \ pretty embarrassing; I don't recommend it.\n\nNot only should you take the time\
    \ to add Assertions, you also need to watch for error counts/percentages, where\
    \ all Assertion failures and other errors (like HTTP errors) are recorded. Here\
    \ are three components (there are probably others) that will help you track errors:\n\
    \n*   jp@gc - Transactions per Second (from JMeter Plugins)\n*   Summary Report\
    \ (Error % column)\n*   Synthesis Report (Error % column and from JMeter Plugins)\n\
    \nThe Assertion discussed here (Figures [7-4](#A449023_1_En_7_Chapter.html#Fig5)\
    \ and [7-5](#A449023_1_En_7_Chapter.html#Fig5)) only checks for preordained list\
    \ of strings. There are a number of other more sophisticated Assertions detailed\
    \ here: [`http://jmeter.apache.org/usermanual/component_reference.html#assertions`](http://jmeter.apache.org/usermanual/component_reference.html%23assertions)\n\
    \nFor example, the JSR223 Assertion lets you write code to validate any Sampler\
    \ response."
  trans: "\n## 提升工作效率的 UI 功能\n\n图 7-2 中那一簇大红箭头都指向了各个独立的项目，即测试元素。只需使用键盘上的方向键，就能轻松地在所有这些测试元素之间导航，甚至可以说是冲浪。每个测试元素都有特定的测试元素类型。例如，所有图形都属于监听器类型的测试元素。用于提交\
    \ HTTP 请求的测试元素称为取样器。为了方便查找，我将所有图形都放在最高层级（作为根节点测试计划的子节点）。但假设我不小心将一些图形放到了树形结构的更深处。你可以使用多种功能来快速重新定位它们，并执行其他操作：\n\
    \n*   **拖放**。拖放功能的实现出乎意料地易于使用。你可以亲自尝试一下，拖动一个测试元素来改变同级元素的顺序，或者完全改变其父级关系。\n*   **剪切/复制/粘贴**。比尔·盖茨那套熟悉的键盘快捷键（Ctrl+X、Ctrl+C、Ctrl+V）在这里同样适用。这三个操作都作用于选中的节点及其所有子节点。\n\
    *   **多选**。Shift+点击（选择相邻的测试元素）和 Ctrl+点击（选择不相邻的测试元素）的操作方式符合你的预期。\n*   **复制当前测试元素**。需要另一个与所选元素相同的测试元素吗？按\
    \ Ctrl+Shift+C 即可在当前元素下方添加一个副本。即使你复制的是一个包含许多子节点的父测试元素，此功能也同样有效。\n*   你还可以使用启用/禁用/切换功能（Ctrl+T）快速禁用单个测试元素及其所有子节点。\n\
    *   如果你启动了两个完全独立的 JMeter UI 实例，可以轻松地在两个树形结构之间进行剪切/复制/粘贴。\n\n所有这些剪切/复制/粘贴功能对于以下场景非常有用：\n\
    \n*   **合并两个负载脚本**。同时启动两个 JMeter GUI 实例。将所有 HTTP 请求取样器从一个实例复制到另一个实例。我怎么强调这项技术的重要性都不为过。以下是三个示例：\n\
    \    *   第 4 章的负载生成概述中展示了“第一优先级”和“第二优先级”脚本。你可以将第一优先级和第二优先级的内容分别录制到不同的脚本中，然后使用此技术将第二优先级脚本中的\
    \ HTTP 取样器（及其他内容）追加到第一优先级脚本中。\n    *   每位开发人员录制自己的业务流程，之后使用此技术将所有脚本合并成一个单一的脚本。\n\
    \    *   当对网页进行代码更改（例如添加新的必填数据项）时，这通常会导致 .jmx 文件过时。要更新脚本，请将新版本的网页录制到一个独立的 .jmx\
    \ 文件中。然后仔细删除旧脚本中过时的部分，并使用此技术将新脚本复制/粘贴到旧脚本中。\n*   **重新排列测试计划中的组件**。为了方便查看/查找，我喜欢将所有图形放在最高层级（作为测试计划的子节点）。如果图形分散在各处，我可以轻松地使用方向键在负载测试计划中浏览，Ctrl+点击多选要移动的图形，然后按\
    \ Ctrl+V 将它们粘贴到新位置。\n*   **轻松复制当前选中的节点**。假设你已经配置了一个 Java 取样器，并且想在其旁边再创建五个相同的取样器作为同级元素。只需选中你的\
    \ Java 取样器，然后按五次 Ctrl+Shift+C 即可。瞧，大功告成。\n*   **我大量使用切换/Ctrl+T 功能**。假设我想比较两个不同\
    \ URL 下的代码性能。我会为每个 URL 创建一个 HTTP 请求取样器，然后使用 Ctrl+T 切换启用的取样器，一次只运行一个。如果你避免在两次运行之间清除结果，你将得到类似这样的漂亮图表：（待办事项：需要两个不同取样器的图表，一次运行一个，且不在运行之间清除结果）。\n\
    \n## 使用 JMeter 断言在负载测试期间进行功能验证\n\n此示例的 .jmx 脚本位于 jpt github.com 仓库的以下位置：\n\n```\n\
    sampleJMeterScripts/jpt_ch07_functionalValidation.jmx\n```\n\n在第 5 章中，我提到了六种情况，在这些情况下你应该咬紧牙关，放弃测试结果并重新运行整个测试。其中一个潜在原因是大量的被测系统错误。你需要自行决定触发重新测试的确切错误百分比。\n\
    \n但是，如果你的被测系统静默失败，或者重要的客户端数据被悄悄地从被测系统网页中遗漏，你最终可能会基于完全错误的数据做出各种决策。为避免这种情况，请花点时间告诉\
    \ JMeter 什么构成成功的 HTML 响应，方法是添加 JMeter 断言来检查 HTML 响应中的关键文本片段，例如网页的标题，或者几个关键字段的\
    \ HTML 文本标签。图 7-3 展示了如何添加断言。\n\n![A449023_1_En_7_Fig3_HTML.jpg](img/A449023_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3.\n\n添加断言。如果在父级取样器的响应中未找到此断言中的文本，则 JMeter 将在“汇总报告”和/或“综合报告”中统计一个错误。\n\n\
    图 7-4 展示了如何输入要验证的文本。在输入文本之前，你需要先点击底部的“添加”按钮。如果 JMeter 发现你输入的文本在相应的 HTTP 响应中缺失，它将统计一个错误。如果你的整个业务流程最终以“订单已提交”消息结束，那么这就是你验证系统是否吐出这个至关重要消息的机会。不要错过这个机会。\n\
    \n![A449023_1_En_7_Fig4_HTML.jpg](img/A449023_1_En_7_Fig4_HTML.jpg)\n\n图 7-4.\n\
    \n一个 JMeter“响应”断言。如果你多次点击“添加”并在每一行输入文本，那么如果父级取样器的响应中缺少任何一行文本，JMeter 都会将此取样器标记为出错。\n\
    \n如果你的应用程序显示“订单已提交”后紧接着显示“致命异常 / 你的代码失败”，这至少可以说是苦乐参半。你可以添加第二个断言，如图 7-5 所示，来翻转逻辑。只需勾选“非”标志，如果给定的文本（例如“致命异常”）存在，JMeter\
    \ 就会统计一个错误。\n\n![A449023_1_En_7_Fig5_HTML.jpg](img/A449023_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5.\n\n一个与上图类似的 JMeter 响应断言，但勾选了“非”。如果在取样器的响应中找到了给定的文本（例如错误消息），则会统计一个错误。\n\
    \n我以前曾过早地宣称性能胜利，结果后来发现 100% 的请求都失败了。这相当尴尬；我不推荐这样做。\n\n你不仅应该花时间添加断言，还需要关注错误计数/百分比，所有断言失败和其他错误（如\
    \ HTTP 错误）都会被记录在这里。以下是三个（可能还有其他）有助于你跟踪错误的组件：\n\n*   jp@gc - 每秒事务数（来自 JMeter 插件）\n\
    *   汇总报告（错误 % 列）\n*   综合报告（错误 % 列，来自 JMeter 插件）\n\n这里讨论的断言（图 7-4 和 7-5）仅检查预定义的字符串列表。这里还详细介绍了许多其他更复杂的断言：[`http://jmeter.apache.org/usermanual/component_reference.html#assertions`](http://jmeter.apache.org/usermanual/component_reference.html%23assertions)\n\
    \n例如，JSR223 断言允许你编写代码来验证任何取样器的响应。\n"
- fmt: "Figure [7-6](#A449023_1_En_7_Chapter.html#Fig6) shows a “Synthesis Report”\
    \ with failed Assertions. The Synthesis Report from JMeter Plugins performs much\
    \ better than JMeter’s “Summary Report”, which lacks a few key columns like “90%\
    \ response time.” The Summary Report has less functionality and worse performance.\n\
    \n![A449023_1_En_7_Fig6_HTML.jpg](A449023_1_En_7_Fig6_HTML.jpg)\n\nFigure 7-6.\
    \ A JMeter “Synthesis Report” showing errors tallied by Assertions in `jpt_ch07_functionalValidation.jmx`\
    \ that comes with the jpt examples on `github.com`\n\n## Script Variables\n\n\
    Almost every script I create has a few script variables, making it easier to run\
    \ the script in different hardware environments. The `MY_DIR` variable shown in\
    \ Figure [7-7](#A449023_1_En_7_Chapter.html#Fig7) will be used in the following\
    \ examples to indicate where to store JMeter output files on the machine where\
    \ JMeter is running.\n\n![A449023_1_En_7_Fig7_HTML.jpg](A449023_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7. Use a `MY_DIR` variable to store JMeter output files in the following\
    \ examples\n\nFigure [7-8](#A449023_1_En_7_Chapter.html#Fig8) shows how to reference\
    \ a variable. Practically all input boxes in JMeter, for either numeric or text\
    \ data, like the one displayed here, will correctly resolve the value of a script\
    \ variable—just don’t forget to wrap the variable name in the `${}` syntax.\n\n\
    ![A449023_1_En_7_Fig8_HTML.jpg](A449023_1_En_7_Fig8_HTML.jpg)\n\nFigure 7-8. When\
    \ referencing a variable like `MY_DIR`, you must wrap the name in special syntax:\
    \ `${MY_DIR}`. You can reference variables in just about any place where you can\
    \ enter text data\n\n## Saving Performance Results to Disk\n\nYou can save/persist\
    \ JMeter results (response time, throughput, and so on) to disk in a few different\
    \ ways. You will need this for many reasons, like comparing current performance\
    \ to that of the last release, documenting performance defects, or showing throughput\
    \ process to your peeps.\n\n*   Copy screenshots from the UI, which is quick.\
    \ Keep in mind that with just a `.png` image of a graph, you lose ability to add\
    \ other metrics, reset sampling granularity, rescale to zoom in, change colors,\
    \ and so on.\n*   Save raw results to a text file—by convention JMeter uses a\
    \ `.jtl` file extension. This is a bit more complicated (see details below), but\
    \ you get great flexibility to re-envision your graph on the raw data. This flexibility\
    \ is especially helpful if you don’t review your results until long after the\
    \ tests have run. I often generate load on a headless machine. After the test,\
    \ I’ll just copy the raw `.jtl` files back to my desktop to render in the JMeter\
    \ UI. From a headless machine, you can even [generate `.png` files](http://jmeter-plugins.org/wiki/GraphsGeneratorListener/)\
    \ ( [`https://jmeter-plugins.org/wiki/GraphsGeneratorListener/`](https://jmeter-plugins.org/wiki/GraphsGeneratorListener/)\
    \ ).\n*   Save results to central database ( [`http://jmeter.apache.org/usermanual/realtime-results.html`](http://jmeter.apache.org/usermanual/realtime-results.html)\
    \ , or [`http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/`](http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/)\
    \ ). Great approach to allow multiple users to view metrics during a live test,\
    \ or for comparing results for multiple SUT releases (to keep all results in one\
    \ place), or perhaps for an enterprise repository of all results. This is a relatively\
    \ new approach, and I do not have any experience with it.\n*   When running headlessly,\
    \ JMeter displays to `stdout` (and perhaps to `JMETER_HOME/bin/jmeter.log`) a\
    \ small and rudimentary set of (non-configurable) performance metrics every 30\
    \ seconds—very helpful for short, quick tests. The [Console Status Logger](http://jmeter-plugins.org/wiki/ConsoleStatusLogger/)\
    \ ( [`https://jmeter-plugins.org/wiki/ConsoleStatusLogger/`](https://jmeter-plugins.org/wiki/ConsoleStatusLogger/)\
    \ ) JMeter-plugin is no longer needed, because more recent versions of JMeter\
    \ (certainly 2.13 and higher) display this data without even asking for it. There\
    \ are a number of reasons why you’d want to run JMeter headlessly:\n    *   Run\
    \ headlessly because JMeter says so. When starting JMeter GUI, this message displays\
    \ to the console window: “Don't use the GUI for load testing” (Figure [2-6](#A449023_1_En_2_Chapter.html#Fig6)).\
    \ This is likely because GUI overhead might impact load test results. In my experience,\
    \ load testing with the GUI and 10 requests per second or fewer has sufficiently\
    \ low overhead.\n    *   Run headlessly on the SUT so you can avoid network performance\
    \ issues discussed in Chapter [2](#A449023_1_En_2_Chapter.html) on the Modest\
    \ Tuning Environment. Avoid bandwidth limiters. Avoid multiple firewalls that\
    \ might cause performance degradation. Avoid load balancers whose concurrency\
    \ and other configuration has not yet been vetted for performance.\n    *   Run\
    \ headlessly so you can apply load to a headless SUT that has no TCP ports available\
    \ to the outside world.\n\nTo save JMeter UI graphs to `.png` files, start by\
    \ adding a graph to the test plan tree, as shown in Figure [7-9](#A449023_1_En_7_Chapter.html#Fig9).\
    \ For a nice “response time over time” graph, right-click on the root test plan\
    \ and choose Add ➤ Listener ➤ `jp@gc - Response Times Over Time`. After you run\
    \ the test, you can just right-click to copy the image of the graph to the Clipboard\
    \ or to the file system.\n\n![A449023_1_En_7_Fig9_HTML.jpg](A449023_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9. Just right-click on a JMeter-Plugin graph to save the image to the\
    \ Clipboard or to the disk"
  raw: "Figure [7-6](#A449023_1_En_7_Chapter.html#Fig6) shows a “Synthesis Report”\
    \ with failed Assertions. The Synthesis Report from JMeter Plugins performs much\
    \ better JMeter’s “Summary Report”, which lacks a few key columns like “like 90%\
    \ response time.” The Sumary Report has less functionality and worse performance.\n\
    \n![A449023_1_En_7_Fig6_HTML.jpg](A449023_1_En_7_Fig6_HTML.jpg)\n\nFigure 7-6.\n\
    \nA JMeter “Synthesis Report” showing errors tallied by Assertions in jpt_ch07_functionalValidation.jmx\
    \ that comes with the jpt examples on github.com\n\n## Script Variables\n\nAlmost\
    \ every script I create has a few script variables, making it easier to run the\
    \ script in different hardware environments. The MY_DIR variable shown in Figure\
    \ [7-7](#A449023_1_En_7_Chapter.html#Fig7) will be used in the following examples\
    \ to indicate where to store JMeter output files on the machine where JMeter is\
    \ running.\n\n![A449023_1_En_7_Fig7_HTML.jpg](A449023_1_En_7_Fig7_HTML.jpg)\n\n\
    Figure 7-7.\n\nUse a MY_DIR variable to store JMeter output files in the following\
    \ examples\n\nFigure [7-8](#A449023_1_En_7_Chapter.html#Fig8) shows how to reference\
    \ a variable. Practically all input boxes in JMeter, for either numeric or text\
    \ data, like the one displayed here, will correctly resolve the value of a script\
    \ variable—just don’t forget to wrap the variable name in the ${} syntax.\n\n\
    ![A449023_1_En_7_Fig8_HTML.jpg](A449023_1_En_7_Fig8_HTML.jpg)\n\nFigure 7-8.\n\
    \nWhen referencing a variable like MY_DIR, you must wrap the name in special syntax:\
    \ ${MY_DIR}. You can reference variables in just about any place where you can\
    \ enter text data\n\n## Saving Performance Results to Disk\n\nYou can save/persist\
    \ JMeter results (response time, throughput, and so on) to disk in a few different\
    \ ways. You will need this for many reasons, like comparing current performance\
    \ to that of the last release, documenting performance defects, or showing throughput\
    \ process to your peeps.\n\n*   Copy screenshots from the UI, which is quick.\
    \ Keep in mind that with just a .png image of a graph, you lose ability to add\
    \ other metrics, reset sampling granularity, rescale to zoom in, change colors,\
    \ and so on.\n*   Save raw results to a text file—by convention JMeter uses a\
    \ .jtl file extension. This is a bit more complicated (see details below), but\
    \ you get great flexibility to re-envision your graph on the raw data. This flexibility\
    \ is especially helpful if you don’t review your results until long after the\
    \ tests have run. I often generate load on a headless machine. After the test,\
    \ I’ll just copy the raw .jtl files back to my desktop to render in the JMeter\
    \ UI. From a headless machine, you can even [generate .​png files](http://jmeter-plugins.org/wiki/GraphsGeneratorListener/)\
    \ ( [`https://jmeter-plugins.org/wiki/GraphsGeneratorListener/`](https://jmeter-plugins.org/wiki/GraphsGeneratorListener/)\
    \ ).\n*   Save results to central database ( [`http://jmeter.apache.org/usermanual/realtime-results.html`](http://jmeter.apache.org/usermanual/realtime-results.html)\
    \ , or [`http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/`](http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/)\
    \ ). Great approach to allow multiple users to view metrics during a live test,\
    \ or for comparing results for multiple SUT releases (to keep all results in one\
    \ place), or perhaps for an enterprise repository of all results. This is a relatively\
    \ new approach, and I do not have any experience with it.\n*   When running headlessly,\
    \ JMeter displays to stdout (and perhaps to `JMETER_HOME/bin/jmeter.log`) a small\
    \ and rudimentary set of (non-configurable) performance metrics every 30 seconds—very\
    \ helpful for short, quick tests. The [Console Status Logger](http://jmeter-plugins.org/wiki/ConsoleStatusLogger/)\
    \ ( [`https://jmeter-plugins.org/wiki/ConsoleStatusLogger/`](https://jmeter-plugins.org/wiki/ConsoleStatusLogger/)\
    \ ) JMeter-plugin is no longer needed, because more recent versions of JMeter\
    \ (certainly 2.13 and higher) display this data without even asking for it. There\
    \ are a number of reasons why you’d want to run JMeter headlessly:\n    *   Run\
    \ headlessly because JMeter says so. When starting JMeter GUI, this message displays\
    \ to the console window: “Don't use the GUI for load testing” (Figure [2-6](#A449023_1_En_2_Chapter.html#Fig6)).\
    \ This is likely because GUI overhead might impact load test results. In my experience,\
    \ load testing with the GUI and 10 requests per second or fewer has sufficiently\
    \ low overhead.\n    *   Run headlessly on the SUT so you can avoid network performance\
    \ issues discussed in Chapter [2](#A449023_1_En_2_Chapter.html) on the Modest\
    \ Tuning Environment. Avoid bandwidth limiters. Avoid multiple firewalls that\
    \ might cause performance degradation. Avoid load balancers whose concurrency\
    \ and other configuration has not yet been vetted for performance.\n    *   Run\
    \ headlessly so you can apply load to a headless SUT that has no TCP ports available\
    \ to the outside world.\n\nTo save JMeter UI graphs to .png files, start by adding\
    \ a graph to the test plan tree, as shown in Figure [7-9](#A449023_1_En_7_Chapter.html#Fig9).\
    \ For a nice “response time over time” graph, right-click on the root test plan\
    \ and choose Add ➤ Listener ➤ jp@gc - Response Times Over Time. After you run\
    \ the test, you can just right-click to copy the image of the graph to the Clipboard\
    \ or to the file system.\n\n![A449023_1_En_7_Fig9_HTML.jpg](A449023_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9.\n\nJust right-click on a JMeter-Plugin graph to save the image to\
    \ the Clipboard or to the disk"
  trans: "\n图 7-6 展示了一个包含失败断言的“综合报告”。JMeter 插件生成的综合报告比 JMeter 自带的“汇总报告”性能更好，后者缺少一些关键列，例如“90%\
    \ 响应时间”。汇总报告功能更少，性能也更差。\n\n![A449023_1_En_7_Fig6_HTML.jpg](img/A449023_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6.\n\nJMeter “综合报告”，显示了来自 github.com 上 jpt 示例中的 jpt_ch07_functionalValidation.jmx\
    \ 文件里，由断言统计的错误。\n\n## 脚本变量\n\n我创建的几乎每个脚本都包含几个脚本变量，这使得在不同硬件环境中运行脚本更加容易。图 7-7 中显示的\
    \ MY_DIR 变量将在以下示例中用于指示在运行 JMeter 的机器上存储 JMeter 输出文件的位置。\n\n![A449023_1_En_7_Fig7_HTML.jpg](img/A449023_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7.\n\n在以下示例中使用 MY_DIR 变量来存储 JMeter 输出文件\n\n图 7-8 展示了如何引用变量。实际上，JMeter 中几乎所有用于输入数字或文本数据的输入框（如下所示）都能正确解析脚本变量的值——只需记住使用\
    \ `${}` 语法将变量名包裹起来即可。\n\n![A449023_1_En_7_Fig8_HTML.jpg](img/A449023_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8.\n\n当引用像 MY_DIR 这样的变量时，必须使用特殊语法将名称包裹起来：`${MY_DIR}`。你几乎可以在任何可以输入文本数据的地方引用变量。\n\
    \n## 将性能结果保存到磁盘\n\n你可以通过几种不同的方式将 JMeter 结果（响应时间、吞吐量等）保存/持久化到磁盘。出于多种原因，你都需要这样做，例如比较当前性能与上次发布的性能、记录性能缺陷，或向同事展示吞吐量过程。\n\
    \n*   从 UI 复制屏幕截图，这很快。但请记住，仅凭一张图表的 .png 图片，你将无法添加其他指标、重置采样粒度、重新缩放以放大、更改颜色等。\n\
    *   将原始结果保存到文本文件——按照惯例，JMeter 使用 .jtl 文件扩展名。这稍微复杂一些（详见下文），但你可以获得极大的灵活性，以便基于原始数据重新构想你的图表。如果你在测试运行很久之后才审查结果，这种灵活性尤其有用。我经常在无头机器上生成负载。测试结束后，我只需将原始的\
    \ .jtl 文件复制回我的桌面，然后在 JMeter UI 中渲染。在无头机器上，你甚至可以[生成 .​png 文件](http://jmeter-plugins.org/wiki/GraphsGeneratorListener/)（\
    \ [`https://jmeter-plugins.org/wiki/GraphsGeneratorListener/`](https://jmeter-plugins.org/wiki/GraphsGeneratorListener/)\
    \ ）。\n*   将结果保存到中央数据库（ [`http://jmeter.apache.org/usermanual/realtime-results.html`](http://jmeter.apache.org/usermanual/realtime-results.html)\
    \ ，或 [`http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/`](http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/)\
    \ ）。这是一种很好的方法，允许多个用户在实时测试期间查看指标，或比较多个 SUT 版本的结果（将所有结果保存在一个地方），或者作为所有结果的企业级存储库。这是一种相对较新的方法，我对此没有任何经验。\n\
    *   在无头运行时，JMeter 每 30 秒会向标准输出（可能还有 `JMETER_HOME/bin/jmeter.log`）显示一组小型且基本的（不可配置的）性能指标——这对于短时间、快速的测试非常有用。[控制台状态记录器](http://jmeter-plugins.org/wiki/ConsoleStatusLogger/)（\
    \ [`https://jmeter-plugins.org/wiki/ConsoleStatusLogger/`](https://jmeter-plugins.org/wiki/ConsoleStatusLogger/)\
    \ ）JMeter 插件已不再需要，因为较新版本的 JMeter（至少 2.13 及更高版本）无需请求即可显示这些数据。你希望无头运行 JMeter 的原因有很多：\n\
    \    *   因为 JMeter 建议如此而选择无头运行。启动 JMeter GUI 时，控制台窗口会显示以下消息：“不要使用 GUI 进行负载测试”（图\
    \ 2-6）。这很可能是因为 GUI 开销可能会影响负载测试结果。根据我的经验，使用 GUI 进行负载测试，且每秒请求数不超过 10 个时，其开销足够低。\n\
    \    *   在 SUT 上无头运行，以便避免第 2 章“适度调优环境”中讨论的网络性能问题。避免带宽限制器。避免可能导致性能下降的多个防火墙。避免并发性及其他配置尚未经过性能审查的负载均衡器。\n\
    \    *   无头运行，以便你可以对没有对外部世界开放 TCP 端口的无头 SUT 施加负载。\n\n要将 JMeter UI 图表保存为 .png 文件，首先将图表添加到测试计划树中，如图\
    \ 7-9 所示。要获得漂亮的“响应时间随时间变化”图表，请右键单击根测试计划，然后选择“添加” ➤ “监听器” ➤ “jp@gc - 响应时间随时间变化”。运行测试后，你可以直接右键单击，将图表图像复制到剪贴板或文件系统。\n\
    \n![A449023_1_En_7_Fig9_HTML.jpg](img/A449023_1_En_7_Fig9_HTML.jpg)\n\n图 7-9.\n\
    \n只需右键单击 JMeter 插件图表，即可将图像保存到剪贴板或磁盘\n"
- fmt: '保存测试结果的第二种方式是让 JMeter 将原始数据保存到磁盘。`.jtl` 文件扩展名是一个很好的约定，尽管它并非强制要求。要将数据保存到 `.jtl`
    文件，你可以使用与图 [7-9](#A449023_1_En_7_Chapter.html#Fig9) 相同的图形，并按图 [7-10](#A449023_1_En_7_Chapter.html#Fig10)
    所示进行指定。所有图形都是类型为 `Listener` 的测试元素，并且每个元素都有此面板。


    ![A449023_1_En_7_Fig10_HTML.jpg](A449023_1_En_7_Fig10_HTML.jpg)


    图 7-10.


    重启 JMeter 后，如果你想将指标从已填充的 `.jtl` 文件重新加载到图形中，请确保指定了 `.jtl` 文件名，将 UI 焦点设置在此文本框中，然后按
    Enter 键。


    是的，图 [7-8](#A449023_1_En_7_Chapter.html#Fig8) 和图 [7-10](#A449023_1_En_7_Chapter.html#Fig10)
    中的截图完全相同，但这只是因为这是重要的功能。尽管 UI 明确写着“将结果写入文件 / 从文件读取”，但包括我在内的大多数人都很难看出此框用于从 `.jtl`
    文件渲染图形。


    请注意，运行 ➤ 全部清除（`Ctrl+E`）将清除 UI 中所有图形和大多数测试元素的结果，但它既不会删除也不会将 `.jtl` 结果文件清零。它会追加数据。你必须手动删除
    `.jtl` 文件才能从头开始。当你开始一个你认为的新测试，但实际上是在向昨天同一时间运行的测试追加数据时，这可能会很麻烦。如果你尝试将 `.jtl` 中的数据渲染到图形（例如吞吐量图形），你会在左侧看到昨天测试的吞吐量，中间有一个巨大的
    24 小时空白间隔，然后是右侧今天的吞吐量。这不是你期望的结果。因此，请记住在重启时清除 `.jtl` 文件，以避免出现这种巨大的间隔。


    为了避免玩“文件系统捉迷藏”来查找输出文件，我强烈建议在文件名输入框中指定完整路径；前面显示的图 [7-7](#A449023_1_En_7_Chapter.html#Fig7)
    展示了如何使用脚本变量来指定文件将存放的文件夹。


    以上展示了如何写入 `.jtl` 文件。要读取 `.jtl` 文件并显示图形（例如，当你重启 JMeter UI 时），你需要逐个加载每个 `Listener`
    测试元素。这里有一个有趣的可用性问题，可以让 JMeter 读取 `.jtl` 文件：确保 `.jtl` 文件名已就位。然后将焦点放在输入框上或保持焦点，并按
    Enter 键。这将启动从 `.jtl` 文件中的文本数据绘制图形的过程。或者，使用浏览按钮选择文件将根据 `.jtl` 数据绘制图形。


    ### 如何避免巨大文件的冗余副本


    图 [7-11](#A449023_1_En_7_Chapter.html#Fig11) 中的配置在我看来完全合理。看起来我们正在尝试为响应时间数据创建一个输出文件，为吞吐量数据创建另一个输出文件。


    ![A449023_1_En_7_Fig11_HTML.jpg](A449023_1_En_7_Fig11_HTML.jpg)


    图 7-11.


    看似完全合理的配置却会产生非常意想不到的后果。另外，`.jtl` 文件的路径未指定，因此不清楚这些文件将落在文件系统的哪个位置。


    看起来响应时间数据将落在一个文件中，吞吐量数据将落在另一个单独的文件中。但是，JMeter 并非如此工作。相反，它会创建两个相同的输出文件。对于时间更长、吞吐量更高的测试，这会浪费数
    GB 的磁盘空间。因此，请遵循我的建议：对于每个 JMeter `.jmx` 脚本，只需任意选择一个 `Listener`，并仅为该 `Listener`
    指定 `.jtl` 文件的路径/名称。因此，你可以推断出一条规则：整个 `.jmx` 文件中应该只有一个 `Listener`（图 [7-1](#A449023_1_En_7_Chapter.html#Fig1)
    中的两个组件都是 `Listener`）配置了输出文件。我将此称为“每个 `.jmx` 文件仅一个输出文件”规则。该规则适用于其他 `Listener`，我称之为“基本监听器”，例如“活动线程数随时间变化”、“响应时间百分位”、“摘要报告”等，但有两个例外。


    “每个 `.jmx` 文件仅一个输出文件”规则的第一个例外是 `PerfMon Listener`（用于收集 CPU 消耗和其他操作系统数据）和 `JMXMon
    Listener`（用于从远程系统捕获 JMX 数据）。它们都来自 `jmeter-plugins`。与所有其他 `Listener` 不同，它们各自需要自己的输出文件。`PerfMon`
    和 `JMXMon` 都不会从其他 `Listener` 的 `.jtl` 文件中读取数据。同样，其他 `Listener` 也不会从 `PerfMon`
    和 `JMXMon` 的 `.jtl` 文件中读取数据。


    以下是避免“什么数据写入哪里”这种混淆的总结：


    1.  在你的 `.jmx` 中选择任意一个 `Listener`（`PerfMon` 和 `JMXMon` 除外），并指定要写入的 `.jtl` 文件的完整路径/文件名。

    2.  此外，如果你有 `PerfMon` 或 `JMXMon`，每个都应该有自己的 `.jtl` 文件。

    3.  如果你从命令行（无用户界面）运行 JMeter，你可以使用 `-l` 命令行参数指定你的 `.jtl` 文件名。请记住，即使指定了 `-l`，在你的
    `.jmx` 文件中指定的任何 `.jtl` 文件也会被写入。有关所有命令行参数的文档，请参见[第 2.4.8 节](http://jmeter.apache.org/usermanual/get-started.html)（位于
    `http://jmeter.apache.org/usermanual/get-started.html`）。'
  raw: 'The second way to save your test results is to have JMeter save the raw data
    to the disk. The .jtl file extension is a nice convention, although it is not
    enforced. For saving data to .jtl files, you can use the same graph as Figure
    [7-9](#A449023_1_En_7_Chapter.html#Fig9) by specifying it as shown in Figure [7-10](#A449023_1_En_7_Chapter.html#Fig10).
    All of the graphs are Test Elements with the type Listener, and they each have
    this panel.


    ![A449023_1_En_7_Fig10_HTML.jpg](A449023_1_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    After restarting JMeter, if you want to reload metrics into a graph from a populated
    .jtl file, make sure the .jtl file name is specified, set UI focus in this text
    box, and press Enter


    Yes, the screenshots in Figures [7-8](#A449023_1_En_7_Chapter.html#Fig8) and [7-10](#A449023_1_En_7_Chapter.html#Fig10)
    are identical, but only because this is important functionality. Even though the
    UI plainly says, “Write results to file / Read from file,” most people, including
    me, have trouble seeing that this box is used to render a graph from a .jtl file.


    Note that Run ➤ Clear All (Ctrl+E) will clear out all the results in graphs and
    most Test Elements in the UI, but it will neither delete nor zero out the .jtl
    results file. It appends data. You have to manually delete the .jtl file to start
    from scratch. This can be a pain when you start what you thought was a new test,
    but you were really appending data to the test you ran yesterday at the same time
    of day. If you try to render the data in the .jtl to a graph, say a throughput
    graph, you will see throughput from yesterday’s test on the left, a huge, vacuous
    24 hour gap in the middle, followed by today’s throughput on the right. Not what
    you expected. So, remember to clear out your .jtl files when restarting to avoid
    this huge gap.


    To avoid playing “file system hide-and-seek” to find your output files, I strongly
    recommend specifying a full path with the Filename input box; Figure [7-7](#A449023_1_En_7_Chapter.html#Fig7)
    shown earlier shows how to use a script variable to say which folder the file
    will land in.


    That shows how to write the .jtl files. To read a .jtl file and display the graph,
    for example when you restart the JMeter UI, you need to load each Listener Test
    Element one at a time. There is an interesting usability quirk here to get JMeter
    to read the .jtl file: make sure the .jtl file name is in place. Then put or keep
    focus on the input box, and press the Enter key. That starts the process to paint
    the graph from text data in the .jtl file. Alternatively, using the Browse button
    to select the file will paint the graph based on the .jtl data.


    ### How to Avoid Redundant Copies of Huge Files


    The configuration in Figure [7-11](#A449023_1_En_7_Chapter.html#Fig11) looks perfectly
    reasonable to me. It looks like we are trying to create one output file for response
    time data and one output file for throughput data.


    ![A449023_1_En_7_Fig11_HTML.jpg](A449023_1_En_7_Fig11_HTML.jpg)


    Figure 7-11.


    Perfectly reasonable-looking configuration that has very unexpected consequences.
    On a separate note, the path to the .jtl files is not specified, leaving in question
    where these files will land on the file system.


    It looks like response time data will land in one file and throughput data will
    land in a separate file. But, JMeter does not work this way. Instead, it creates
    two identical output files. This wastes gigabytes of disk space with longer, high-throughput
    tests. So follow my lead with this: for each JMeter .jmx script, just pick a single
    one of your Listeners, arbitrarily, and specify the path/name of a .jtl file for
    just that one. As such, it seems like you could infer a rule that just one Listener
    (both of the components in Figure [7-1](#A449023_1_En_7_Chapter.html#Fig1) are
    Listeners) for the entire .jmx file should be configured with an output file.
    I will call this the only-one-output-file-per-jmx rule. The rule holds true with
    other Listeners, ones that I call the “Basic Listeners,” like Active Threads Over
    Time, Response Time Percentile, Summary Report and others, but there are two exceptions.


    The first exception to the only-one-output-file-per-jmx rule is for the PerfMon
    Listener (which collects CPU consumption and other OS data) and JMXMon Listener
    (captures JMX data from a remote system). They are both from jmeter-plugins. Unlike
    all other Listeners, they each require their own output file. Neither PerfMon
    nor JMXMon will read data from other Listener’s .jtl files. Likewise, other Listeners
    will not read data from PerfMon and JMXMon .jtl files.


    Here is a summary of how to avoid this confusion of what-data-gets-written-to-where:


    1.  Choose any single Listener in your .jmx, one other than PerfMon and JMXMon,
    and specify a full path/file name to the .jtl to be written.  

    2.  In addition, if you have PerfMon or JMXMon, each should have its own .jtl
    file .  

    3.  If you are running JMeter from the command line (without the user interface),
    you may specify your .jtl file name with the `-l` command-line parameter. Keep
    in mind that any .jtl files specified in your .jmx file will also be written,
    even if `-l` is specified. See [section 2.​4.​8 at](http://jmeter.apache.org/usermanual/get-started.html)
    [`http://jmeter.apache.org/usermanual/get-started.html`](http://jmeter.apache.org/usermanual/get-started.html)
    ) for documentation of all command-line parameters.'
  trans: '

    保存测试结果的第二种方法是让 JMeter 将原始数据保存到磁盘。使用 `.jtl` 文件扩展名是一种良好的惯例，尽管并非强制要求。要将数据保存到 `.jtl`
    文件，你可以使用与图 7-9 相同的图表，只需按图 7-10 所示进行指定即可。所有图表都是类型为监听器的测试元素，并且每个都包含此面板。


    ![A449023_1_En_7_Fig10_HTML.jpg](img/A449023_1_En_7_Fig10_HTML.jpg)


    图 7-10.


    重启 JMeter 后，如果你想将指标从已填充的 `.jtl` 文件重新加载到图表中，请确保指定了 `.jtl` 文件名，将 UI 焦点设置在此文本框中，然后按
    Enter 键。


    是的，图 7-8 和图 7-10 中的截图完全相同，但这只是因为这是一个重要的功能。尽管 UI 上明确写着“将结果写入文件 / 从文件读取”，但包括我在内的大多数人都很难看出这个框是用来从
    `.jtl` 文件渲染图表的。


    请注意，运行 ➤ 清除全部 (Ctrl+E) 会清除图表中的所有结果以及 UI 中的大多数测试元素，但它既不会删除也不会将 `.jtl` 结果文件清零。它会追加数据。你必须手动删除
    `.jtl` 文件才能从头开始。当你开始一个你认为的新测试，但实际上是在向昨天同一时间运行的测试追加数据时，这可能会很麻烦。如果你尝试将 `.jtl` 中的数据渲染到图表中，比如吞吐量图表，你会看到左侧是昨天测试的吞吐量，中间是巨大的
    24 小时空白间隙，右侧是今天的吞吐量。这并非你所期望的结果。因此，请记住在重启时清除你的 `.jtl` 文件，以避免出现这种巨大的间隙。


    为了避免玩“文件系统捉迷藏”来寻找输出文件，我强烈建议在文件名输入框中指定完整路径；前面显示的图 7-7 展示了如何使用脚本变量来指定文件将存放的文件夹。


    以上展示了如何写入 `.jtl` 文件。要读取 `.jtl` 文件并显示图表，例如当你重启 JMeter UI 时，你需要逐个加载每个监听器测试元素。这里有一个有趣的可用性小技巧，可以让
    JMeter 读取 `.jtl` 文件：确保 `.jtl` 文件名已就位。然后将焦点放在输入框上（或保持焦点），并按 Enter 键。这将启动从 `.jtl`
    文件中的文本数据绘制图表的过程。或者，使用浏览按钮选择文件，也会根据 `.jtl` 数据绘制图表。


    ### 如何避免大文件的冗余副本


    图 7-11 中的配置在我看来完全合理。看起来我们正在尝试为响应时间数据创建一个输出文件，并为吞吐量数据创建另一个输出文件。


    ![A449023_1_En_7_Fig11_HTML.jpg](img/A449023_1_En_7_Fig11_HTML.jpg)


    图 7-11.


    看似完全合理的配置却会产生非常意想不到的后果。另外，`.jtl` 文件的路径未指定，因此不清楚这些文件将存放在文件系统的哪个位置。


    看起来响应时间数据会存放在一个文件中，而吞吐量数据会存放在另一个单独的文件中。但是，JMeter 并非如此工作。相反，它会创建两个相同的输出文件。对于时间更长、吞吐量更高的测试，这会浪费数
    GB 的磁盘空间。所以，请按照我的建议操作：对于每个 JMeter `.jmx` 脚本，随意选择一个监听器，并仅为该监听器指定一个 `.jtl` 文件的路径/名称。因此，你可以推断出一条规则：整个
    `.jmx` 文件应该只配置一个监听器（图 7-1 中的两个组件都是监听器）带有输出文件。我将此称为“每个 jmx 仅一个输出文件”规则。该规则也适用于其他监听器，我称之为“基础监听器”，例如活动线程数随时间变化、响应时间百分位、汇总报告等，但有两个例外。


    “每个 jmx 仅一个输出文件”规则的第一个例外是 PerfMon 监听器（用于收集 CPU 消耗和其他操作系统数据）和 JMXMon 监听器（用于从远程系统捕获
    JMX 数据）。它们都来自 jmeter-plugins。与所有其他监听器不同，它们各自需要自己的输出文件。PerfMon 和 JMXMon 都不会从其他监听器的
    `.jtl` 文件中读取数据。同样，其他监听器也不会从 PerfMon 和 JMXMon 的 `.jtl` 文件中读取数据。


    以下是避免混淆“什么数据写入哪里”的总结：


    1.  在你的 `.jmx` 中选择任意一个监听器（PerfMon 和 JMXMon 除外），并指定要写入的 `.jtl` 文件的完整路径/文件名。

    2.  此外，如果你有 PerfMon 或 JMXMon，每个都应该有自己的 `.jtl` 文件。

    3.  如果你从命令行（无用户界面）运行 JMeter，你可以使用 `-l` 命令行参数指定你的 `.jtl` 文件名。请记住，即使指定了 `-l`，在你的
    `.jmx` 文件中指定的任何 `.jtl` 文件也会被写入。所有命令行参数的文档请参见[第 2.4.8 节](http://jmeter.apache.org/usermanual/get-started.html)
    [`http://jmeter.apache.org/usermanual/get-started.html`](http://jmeter.apache.org/usermanual/get-started.html)。

