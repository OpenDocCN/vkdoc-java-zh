- fmt: "### Right-Sizing Output Files for Heavy Debugging or High Throughput\n\nHere\
    \ is the second exception to the only-one-output-file-per-`jmx` rule, and it doubles\
    \ as a fantastic feature that you need to use to avoid data overload on your load\
    \ generator. Load generators are highly configurable beasts, and it is easy to\
    \ misconfigure them to graph, process, calculate, and store so much data, that\
    \ load generator performance suffers and test results reflect more of the load\
    \ generator’s problems and less of the SUT’s performance.\n\nHowever, collecting\
    \ copious amounts of data (HTTP URL, response codes, input and output XML, cookies,\
    \ script variables, and so on) is critical for troubleshooting in two different\
    \ scenarios:\n\n- Debugging a load script, for both errors and successful requests.\n\
    - During a load test, troubleshooting errors from the SUT.\n\nJMeter satisfies\
    \ this use case by allowing you to keep two Basic output files, one in the `.csv`\
    \ format and the other in XML. The larger footprint of the XML file, along with\
    \ its higher CPU consumption, is only used for sampler failures, which will only\
    \ happen infrequently. In the separate csv-formatted `.jtl` file, JMeter will\
    \ keep a smaller and more streamlined but high-volume record of all activity,\
    \ success or failure.\n\nHere is how you accomplish this:\n\n1. In `JMETER_HOME/bin/user.properties`,\
    \ add the following property to default `.jtl` files to the csv format, instead\
    \ of the more CPU-intensive, verbose, and larger XML format: `jmeter.save.saveservice.output_format=csv`\n\
    2. Add some other Listener, perhaps a nice `jp@gc - Synthesis Report (filtered)`,\
    \ which is a more full featured version of the vanilla Summary Report. Specify\
    \ a `.jtl` file name (and do not forget to include the path to the `.jtl`, of\
    \ course, as I recommended above to avoid protracted hide-and-seek).\n3. Add a\
    \ View Results Tree Listener to the load plan tree. Specify a different `.jtl`\
    \ file name than the one used in step 2. For me, it is helpful to use the same\
    \ path for all `.jtl` files.\n4. For just this one Listener:\n   1. Put a check\
    \ in the Errors check box. Somewhat confusingly, this tells JMeter to only log\
    \ errors and avoid the huge overhead of detailed logging for successful Sampler\
    \ requests. Do not forget this check mark when applying load; we will discuss\
    \ why in the next section.\n   2. Override the csv file format in the View Results\
    \ Tree by clicking on the Configure button, as shown in Figure 7-12.\n\n     \
    \ ![A449023_1_En_7_Fig12_HTML.jpg](A449023_1_En_7_Fig12_HTML.jpg)\n\n      Figure\
    \ 7-12. The “Configure” button that allows you to enable/disable XML format of\
    \ the output file\n\n   3. To override the csv file format with the XML file format\
    \ for just this one Listener, put checks in the boxes as shown in Figure 7-13.\n\
    \n      ![A449023_1_En_7_Fig13_HTML.jpg](A449023_1_En_7_Fig13_HTML.jpg)\n\n  \
    \    Figure 7-13. The checkboxes required to specify XML format for the output\
    \ log file\n\n## Recording an HTTP Script\n\nThese instructions show how to record\
    \ an HTTP script:\n\n[http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf](http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf)\n\
    \nRather than duplicate the instructions, I think it is important to highlight\
    \ a few key steps in the recording process.\n\nConfiguring a `.jmx` file just\
    \ right for recording used to be very difficult. Now, there is an easy way to\
    \ create it: start with `.jmx` configuration from a JMeter Template.\n\nChoose\
    \ the **File ➤ Templates** menu option. Then choose the Recording template in\
    \ the combo box at the top center. Finally, click **Create**, as shown in Figure\
    \ 7-14.\n\n![A449023_1_En_7_Fig14_HTML.jpg](A449023_1_En_7_Fig14_HTML.jpg)\n\n\
    Figure 7-14. JMeter screen to select a Template that specifies the detailed configuration\
    \ required to record your browser’s network traffic to a `.jmx` file.\n\nOnce\
    \ the Recording template is selected, the JMeter plan tree should look like Figure\
    \ 7-15.\n\n![A449023_1_En_7_Fig15_HTML.jpg](A449023_1_En_7_Fig15_HTML.jpg)\n\n\
    Figure 7-15. The JMeter Plan Tree after the Recording template has been selected\n\
    \nFigure 7-16 details a critical part of the process: your browser’s HTTP proxy\
    \ configuration. With no HTTP proxy configured, your browser makes requests directly\
    \ to the Internet. With a proxy configured, all requests are forwarded to a specific\
    \ host (labeled as Address) and port specified as shown.\n\n![A449023_1_En_7_Fig16_HTML.jpg](A449023_1_En_7_Fig16_HTML.jpg)\n\
    \nFigure 7-16. Internet Explorer HTTP proxy configuration and the JMeter HTTP\
    \ Proxy server. See how IE is configured to make all requests on port 8888 of\
    \ localhost, and JMeter is configured to listen for all requests on this exact\
    \ same port? Many JMeter users do not get this configuration correct.\n\nNote\
    \ that the IE Address input box on the left must point to the local machine and\
    \ the port number in IE (left) and the port number on the JMeter panel (right)\
    \ must match. The value in Figure 7-16 is 8888. Also note the JMeter Start button\
    \ is disabled, meaning that it has already been clicked to start the JMeter HTTP\
    \ proxy program.\n\nWhen the IE proxy is correctly configured and you click the\
    \ big **Start** button on the HTTP(S) Test Script Recorder, all browser network\
    \ traffic will be forwarded to the JMeter HTTP proxy, and JMeter proxy will immediately\
    \ forward all traffic to the SUT. JMeter will record all traffic as you navigate\
    \ the SUT.\n\nPaste your SUT’s URL into the browser and start navigating the business\
    \ processes you want to record. When finished navigating, log out of the SUT and\
    \ click **Stop** on the JMeter’s HTTP(S) JMeter Test Script Recorder on the right\
    \ of Figure 7-16.\n\nJMeter will display all the recorded traffic in the Recording\
    \ Controller, as shown in Figure 7-17.\n\n![A449023_1_En_7_Fig17_HTML.jpg](A449023_1_En_7_Fig17_HTML.jpg)\n\
    \nFigure 7-17. JMeter’s Recording Controller has captured network traffic as a\
    \ user navigated the SUT in the browser"
