- fmt: '为了帮助您及时了解这些临时程序（我将它们称为存根服务器）的资源消耗情况，能够绘制机器上进程的实时 CPU 和 RAM 消耗图表会很有帮助。我们将讨论用于绘制图表的工具集，但在下一节中，我们将讨论在适度负载测试环境中使用任何网段所涉及的风险。我个人不会容忍任何一个存根服务器的资源消耗（无论是
    RAM 还是 CPU）超过 10–15%。


    ## 网络


    我本可以用一台机器来绘制图 [2-2](#A449023_1_En_2_Chapter.html#Fig2)，但我认为很难找到一台拥有足够 RAM 来容纳所有组件的机器。因此，如果你有足够的
    RAM，我建议将所有组件放在一台机器上，以进一步推进“代码优先”的调优方法。


    本节展示了将较大环境中的多个组件整合到一台或两台机器上的一些好处。


    假设你测试的每个部分都在同一个数据中心——服务器、数据库、测试机器等等。如果你将负载生成器机器（例如，一个运行着`JMeter`的小型虚拟机客户机）迁移到另一个数据中心（通常网络速度较慢），并运行完全相同的负载测试，响应时间将急剧上升，吞吐量将直线下降。即使负载生成在同一个数据中心，通过网络生成负载也会让你面临风险，因为你是在别人的地盘上操作。在那个地盘上，网络性能由其他人掌控。想想维护网络性能所涉及的所有组件：


    *   防火墙

    *   作为安全措施运行的带宽限制软件（如`NetLimiter`）

    *   HTTP 代理服务器（如果访问互联网）

    *   硬件——路由器、内容交换机、CAT5 等

    *   负载均衡器，尤其是其管理并发性的配置


    当我的老板为了确保我的代码性能而紧盯着我时，这些网络组件的所有者没有一个能随时为我提供帮助。所以，可以说，我把它们从脚本中剔除了。只要可能，我就设计我的负载测试来避免网络。一种方法是在与
    Java 容器相同的机器上运行更多进程。


    我承认将这些组件放在同一台机器上有点不合常规，就像你的朋友看到你离开辅助轮就不会骑自行车而嘲笑你一样。当服务于一个战略目的时，我乐于采用像使用辅助轮这样谨慎的策略：解决非常真实的性能焦虑。让我们使用辅助轮来专注于调优代码，并在应用程序中建立一点信心。


    一旦你的团队在开发者调优环境中对性能建立了更多信心，就取下辅助轮，开始在更接近生产环境的网络配置中进行负载测试和调优。但一开始，我们可以通过避免在调优环境中使用网络来愉快地消除大量风险，从而推进我们的“代码优先”策略。


    ## 对后端系统进行存根处理


    如果你个人已准备好开始调优，但你的某个后端系统无法用于负载测试，那么在创建环境时你会有点卡住。但有一些选择。简单地注释掉代码中对不可用系统的网络调用，并用硬编码的响应替换它，可能会非常有帮助。由此看到的系统其余部分的性能视图会很有帮助，但这种方法有点
    hacky。为什么？因为更改硬编码响应的内容需要重启。此外，由于你注释掉了调用，网络 API 在负载下得不到验证。同时，任何针对后端网络调用的监控也将得不到测试。


    我建议不要使用硬编码，而是运行一个虚拟程序，我称之为网络存根服务器。这种通用做法也被称为服务虚拟化。[¹](#A449023_1_En_2_Chapter.html#Fn1)
    存根服务器程序充当不可用系统的替身，接受网络请求并返回预先录制（或可能只是预先配置）的响应。


    你配置网络存根，使其根据输入请求中的内容返回特定的响应消息。例如，“如果向存根服务器发送了一个 HTTP 请求，并且 URL 路径以`/backend/fraudCheck`结尾，则返回一个特定的
    JSON 或 XML 响应。”


    如果系统中有许多（可能有几十或几百个）请求-响应对，可以使用网络录制和回放方法来捕获配置所需的大部分数据。


    在评估要使用哪个网络存根服务器时，请务必寻找具有以下特性的：


    *   允许你在不重启网络存根程序的情况下重新配置请求/响应。

    *   允许你配置响应时间延迟，以模拟响应时间与你自己的后端相似的后端。

    *   允许自定义 Java 代码来定制响应。例如，调用存根的系统可能需要在响应中包含当前时间戳或生成的唯一 ID。

    *   允许你根据输入 URL 和/或 POST 数据中的内容配置特定的响应。

    *   提供录制和回放功能。

    *   与录制和回放类似，能够查找最近的请求-响应对也很好。

    *   网络存根程序可以从单元测试或作为独立程序启动。

    *   可以配置为监听任何 TCP 端口。


    如果你的后端系统有 HTTP/S 入口点，那你很幸运，因为有许多成熟的、为 HTTP 设计的开源网络存根服务器：


    *   `Wiremock`：`wiremock.org`

    *   `Hoverfly`：[`https://hoverfly.io/`](https://hoverfly.io/)

    *   `Mock Server`：[`http://www.mock-server.com/`](http://www.mock-server.com/)

    *   `Betamax`：[`http://betamax.software/`](http://betamax.software/)


    但对于其他协议，如 RMI、JMS、IRC、SMS、WebSockets 和普通套接字，目前还没有同样成熟度的存根服务器。因此，对于这些协议，尤其是专有协议和消息格式，你可能不得不求助于老办法：注释掉对后端系统的调用并编写硬编码响应。但这里还有一个最后的选择：你可以考虑编写自己的、针对你的协议和专有消息格式定制的存根服务器。在认为这项工作过于庞大而放弃之前，请快速浏览一下这三个成熟的开源网络
    API：


    *   `Netty`：[`https://netty.io/`](https://netty.io/)

    *   `Grizzly`：[`https://grizzly.java.net/`](https://grizzly.java.net/)

    *   `Mina`：[`https://mina.apache.org/`](https://mina.apache.org/)


    这三个库都是专门为快速构建网络应用程序而设计的。事实上，这里有一个演示，展示了如何使用`Netty`在不到 250 行 Java 代码中构建一个自定义的 TCP
    套接字服务器：


    [`http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html`](http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html)


    这可能是为你使用专有消息格式的内部 TCP 套接字服务器构建存根服务器的一个很好的起点。'
  raw: 'To help stay abreast of whether these stand-in programs (I’ll start calling
    them stub servers) have modest resource consumption, it’s helpful to be able to
    graph the live CPU and RAM consumption of the processes on your machine. We will
    discuss a toolset for that graphing, but in the next section we will talk about
    the risks involved with any network segment you use in your modest load test environment.
    I personally wouldn’t tolerate any more than about 10–15% of consumption (either
    RAM or CPU) from any one of these stub servers.


    ## Network


    I would have drawn Figure [2-2](#A449023_1_En_2_Chapter.html#Fig2) with just a
    single machine, but I thought it might be difficult to find a machine with enough
    RAM to hold all components. So if you have enough RAM, I recommend putting all
    components on a single machine to further the Code First approach to tuning.


    This section shows some of the benefits of collapsing multiple components in a
    larger environment into a single machine or two.


    Let''s say that every part of your test is in a single data center—server, database,
    testing machines, everything. If you relocate the load generator machine (like
    a little VM guest with JMeter on it) to a different data center (invariably over
    a slower network) and run exactly the same load test, the response time will skyrocket
    and throughput will plummet. Even when the load generation is in the same data
    center, generating load over the network exposes you to risk, because you are
    playing on someone else''s turf. And on that turf, someone else owns the performance
    of the network. Think of all the components involved in maintaining the performance
    of a network:


    *   Firewalls

    *   Bandwidth limitation software (like NetLimiter) that runs as a security measure

    *   The HTTP proxy server, if accessing the Internet

    *   The hardware—routers, content switches, CAT5, and so on

    *   Load balancers, especially their configuration that manages concurrency


    When my boss is breathing down my neck to make sure my code performs, none of
    the owners of these network components are readily available on the clock to help
    me out. So, I write them out of the script, so to speak. Whenever possible, I
    design my load tests to avoid network. One way of doing this is to run more processes
    on the same machine as the Java Container.


    I concede that co-locating these components on the same machine is a bit nonstandard,
    like when your friends laughed at you when they saw you couldn''t ride a bike
    without training wheels. I embrace chickenhearted strategies, like using training
    wheels, when it serves a strategic purpose: addressing performance angst, which
    is very real. Let''s use training wheels to focus on tuning the code and build
    a little confidence in the application.


    Once your team builds a little more confidence in performance in a developer tuning
    environment, take off the training wheels and start load-testing and tuning in
    more production-like network configurations. But to start out, there is a ton
    of risk we can happily eliminate by avoiding the network in our tuning environments,
    thus furthering our Code First strategy.


    ## Stubbing Out Back-end Systems


    If you are personally ready to start tuning, but one of your back-end systems
    isn’t available for a load test, you are a bit stuck creating your environment.
    But there are options. Simply commenting out a network call in your code to the
    unavailable system and replacing it with a hard-coded response can be very helpful.
    The resulting view of how the rest of the system performs will be helpful, but
    the approach is a bit of a hack. Why? Because altering the content of the hard-coded
    response would require a restart. Additionally, none of network API gets vetted
    under load because you commented out the call. Also, any monitoring in place for
    the back-end’s network calls will also go untested.


    Instead of hard-coding, I recommend running a dummy program, which I’ll refer
    to as a network stub server. This general practice also goes by the name of service
    virtualization . [¹](#A449023_1_En_2_Chapter.html#Fn1) The stub server program
    acts as a stand-in for the unavailable system, accepting network requests and
    returning prerecorded (or perhaps just preconfigured) responses.


    You configure the network stub to return a particular response message based on
    what’s in the input request. For example, “If the stub server is sent an HTTP
    request, and the URL path ends with /backend/fraudCheck then return a particular
    json or XML response.”


    If there are many (perhaps dozens or hundreds) request-response pairs in the system,
    network record and playback approaches can be used to capture most of the data
    required to configure everything.


    When you are evaluating which network stub server to use, be sure to look for
    one with these features:


    *   Lets you reconfigure requests/responses without restarting the network stub
    program.

    *   Lets you configure response time delay, in order to simulate a back-end with
    response time similar to your own back-end.

    *   Allows custom java code to customize responses. For instance, perhaps the
    system calling the stub requires a current timestamp or a generated unique ID
    in a response.

    *   Allows you to configure a particular response based on what’s in the input
    URL and/or POST data.

    *   Offers record and playback.

    *   Similar to record and playback, it is also nice to be able to do a lookup
    of recent request-response pairs.

    *   Network stub program can be launched from a unit test or as a stand-alone
    program.

    *   Can be configured to listen on any TCP port.


    If your back-end system has an HTTP/S entry point, you’re in luck because there
    are a number of mature open-source network stub servers designed to work with
    HTTP:


    *   Wiremock: `wiremock.org`

    *   Hoverfly: [`https://hoverfly.io/`](https://hoverfly.io/)

    *   Mock Server: [`http://www.mock-server.com/`](http://www.mock-server.com/)

    *   Betamax: [`http://betamax.software/`](http://betamax.software/)


    But similar stub servers of the same maturity are not yet available for other
    protocols, such as RMI, JMS, IRC, SMS, WebSockets and plain-old-sockets. As such,
    for these and especially proprietary protocols and message formats, you might
    have to resort to the old hack of just commenting out the call to the back-end
    system and coding up a hard-coded response. But here is one last option: you could
    consider writing your own stub server, customized for your protocol and proprietary
    message format. Before dismissing this as too large an effort, take a quick look
    at these three mature , open source networking APIs:


    *   Netty: [`https://netty.io/`](https://netty.io/)

    *   Grizzly: [`https://grizzly.java.net/`](https://grizzly.java.net/)

    *   Mina: [`https://mina.apache.org/`](https://mina.apache.org/)


    All three were specifically designed to build networking applications quickly.
    In fact, here is one demo of how to build a custom TCP socket server using Netty
    in less than 250 lines of Java:


    [`http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html`](http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html)


    This could be a great start to building a stub server for your in-house TCP socket
    server that uses proprietary message format.'
  trans: '

    为了实时掌握这些临时程序（我将其称为**存根服务器**）的资源消耗是否合理，能够绘制出机器上各进程的实时 CPU 和内存消耗图表会很有帮助。我们将在下文讨论用于绘制图表的工具集，但下一节会先探讨在轻量级负载测试环境中使用任何网段所涉及的风险。就我个人而言，任何一个存根服务器的资源消耗（无论是内存还是
    CPU）都不能超过 10%–15%。


    ## 网络


    我本可以将图 2-2 画成只有一台机器，但考虑到要找到一台内存足够容纳所有组件的机器可能比较困难。所以，如果你的内存足够，我建议将所有组件部署在一台机器上，以进一步贯彻**代码优先**的调优方法。


    本节将展示将大型环境中的多个组件整合到一两台机器上的一些好处。


    假设你测试的所有部分——服务器、数据库、测试机器等——都在同一个数据中心。如果你将负载生成机器（比如一台运行 JMeter 的小型虚拟机）迁移到另一个数据中心（通常网络速度会更慢），然后运行完全相同的负载测试，响应时间会急剧上升，吞吐量则会骤降。即使负载生成在同一数据中心，通过网络生成负载也会让你面临风险，因为你是在别人的地盘上操作。而在那个地盘上，网络性能由他人掌控。想想维护网络性能所涉及的所有组件：


    *   防火墙

    *   作为安全措施运行的带宽限制软件（如 NetLimiter）

    *   HTTP 代理服务器（如果访问互联网）

    *   硬件——路由器、内容交换机、CAT5 线缆等

    *   负载均衡器，尤其是其管理并发的配置


    当我的老板紧盯着我，确保我的代码性能达标时，这些网络组件的所有者没有一个能随时为我提供帮助。所以，可以说，我把它们从脚本中剔除了。只要可能，我都会设计负载测试来避免网络依赖。一种方法是在与
    Java 容器相同的机器上运行更多进程。


    我承认，将这些组件部署在同一台机器上有点不符合常规，就像你的朋友看到你离开辅助轮就不会骑自行车时嘲笑你一样。当服务于一个战略目的——解决非常真实的性能焦虑时，我乐于采用像使用辅助轮这样看似胆小的策略。让我们借助辅助轮，专注于代码调优，并为应用程序建立一点信心。


    一旦你的团队在开发者调优环境中对性能建立了更多信心，就可以卸下辅助轮，开始在更接近生产环境的网络配置下进行负载测试和调优。但在起步阶段，通过在调优环境中避免网络依赖，我们可以愉快地消除大量风险，从而推进我们的**代码优先**策略。


    ## 对后端系统进行存根处理


    如果你个人已准备好开始调优，但某个后端系统无法用于负载测试，那么在搭建环境时就会遇到一些困难。不过还是有办法的。简单地注释掉代码中对该不可用系统的网络调用，并用硬编码的响应来替代，这会非常有帮助。这样可以看到系统其余部分的性能表现，但这种方法有点
    hack 的味道。为什么？因为修改硬编码响应的内容需要重启。此外，由于你注释掉了调用，网络 API 在负载下得不到验证。同时，任何针对后端网络调用的监控措施也将无法得到测试。


    我建议不要使用硬编码，而是运行一个虚拟程序，我称之为**网络存根服务器**。这种通用做法也被称为**服务虚拟化**。¹ 存根服务器程序充当不可用系统的替身，接收网络请求并返回预先录制（或仅仅是预先配置）的响应。


    你可以配置网络存根，使其根据输入请求的内容返回特定的响应消息。例如：“如果存根服务器收到一个 HTTP 请求，且 URL 路径以 `/backend/fraudCheck`
    结尾，则返回特定的 JSON 或 XML 响应。”


    如果系统中有许多（可能是几十或几百个）请求-响应对，可以使用网络录制和回放方法来捕获配置所需的大部分数据。


    在评估使用哪个网络存根服务器时，请务必寻找具备以下特性的：


    *   允许你在不重启网络存根程序的情况下重新配置请求/响应。

    *   允许你配置响应时间延迟，以模拟响应时间与你后端系统相似的后端。

    *   允许自定义 Java 代码来定制响应。例如，调用存根的系统可能需要在响应中包含当前时间戳或生成的唯一 ID。

    *   允许你根据输入 URL 和/或 POST 数据的内容来配置特定的响应。

    *   提供录制和回放功能。

    *   与录制和回放类似，能够查询最近的请求-响应对也很不错。

    *   网络存根程序可以从单元测试中启动，也可以作为独立程序运行。

    *   可以配置为监听任何 TCP 端口。


    如果你的后端系统有 HTTP/S 入口点，那你很幸运，因为有许多成熟的、专为 HTTP 设计的开源网络存根服务器：


    *   Wiremock：`wiremock.org`

    *   Hoverfly：[`https://hoverfly.io/`](https://hoverfly.io/)

    *   Mock Server：[`http://www.mock-server.com/`](http://www.mock-server.com/)

    *   Betamax：[`http://betamax.software/`](http://betamax.software/)


    但对于其他协议，如 RMI、JMS、IRC、SMS、WebSockets 和普通套接字，目前还没有同等成熟度的存根服务器。因此，对于这些协议，尤其是专有协议和消息格式，你可能不得不采用老办法：直接注释掉对后端系统的调用，并编写硬编码的响应。但这里还有一个最后的选择：你可以考虑编写自己的、针对你的协议和专有消息格式定制的存根服务器。在认为这项工作过于庞大而放弃之前，请快速浏览一下这三个成熟的开源网络
    API：


    *   Netty：[`https://netty.io/`](https://netty.io/)

    *   Grizzly：[`https://grizzly.java.net/`](https://grizzly.java.net/)

    *   Mina：[`https://mina.apache.org/`](https://mina.apache.org/)


    这三个 API 都是专门为快速构建网络应用程序而设计的。事实上，这里有一个演示，展示了如何使用 Netty 在不到 250 行 Java 代码中构建一个自定义的
    TCP 套接字服务器：


    [`http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html`](http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html)


    这可以成为为你内部使用专有消息格式的 TCP 套接字服务器构建存根服务器的一个良好开端。

    '
- fmt: '### Stubbing Out HTTP Back-ends with Wiremock


    Figures [2-3](#A449023_1_En_2_Chapter.html#Fig3) and [2-4](#A449023_1_En_2_Chapter.html#Fig4)
    show a quick example of how to launch, configure, and submit a request to Wiremock,
    my favorite HTTP stub server.


    ![A449023_1_En_2_Fig4_HTML.gif](A449023_1_En_2_Fig4_HTML.gif)


    Figure 2-4. The json body of an HTTP POST used to configure wiremock to return
    a predetermined HTTP response


    ![A449023_1_En_2_Fig3_HTML.jpg](A449023_1_En_2_Fig3_HTML.jpg)


    Figure 2-3. Startup banner running the wiremock.org stub server with the `java
    -jar` option


    It is incredibly easy to launch Wiremock with a simple `java -jar` approach: Just
    execute `java -jar wiremock.jar`, and it starts right up listening for HTTP requests
    on port 8080 (which is configurable).


    Once it is started, you can make HTTP/json calls to configure the request-response
    pairs to mimic your back-end. You POST the json to `http://<host>:<port>/__admin/mappings/new`.
    Then you can save those calls in a SOAP UI, Chrome Postman, or JMeter script and
    execute them right before the load test. In Figure [2-4](#A449023_1_En_2_Chapter.html#Fig4)
    json says, "If Wiremock receives a `GET` to `/some/thing`, then return ''Hello
    world!'' as the response, but only after waiting 5 seconds."


    Once you have POSTed the preceding code to `http://localhost:8080/__admin/mappings/new`,
    you should try out the new stub as shown in Figure [2-5](#A449023_1_En_2_Chapter.html#Fig5).


    ![A449023_1_En_2_Fig5_HTML.jpg](A449023_1_En_2_Fig5_HTML.jpg)


    Figure 2-5. Using Chrome to test the newly created wiremock configuration (Figure
    [2-4](#A449023_1_En_2_Chapter.html#Fig4))


    … and sure enough, the browser doesn''t paint "Hello world!" until Wiremock waits
    the 5000 milliseconds that we asked for using the `fixedDelayMilliseconds` attribute
    in the json.


    That wasn''t too difficult, right? To summarize, download the Wiremock jar and
    run it as `java -jar`. Then submit Wiremock json-over-HTTP configuration messages
    to essentially teach Wiremock which responses to return for each HTTP request
    supported by your back-end. Lastly, start your app and watch it submit requests
    to Wiremock, and Wiremock will return the responses that you configured. That''s
    it.


    ## Local Load Generation


    With the Code First approach in mind, the heart of the two-machine developer tuning
    environment (Figure [2-2](#A449023_1_En_2_Chapter.html#Fig2)) is your code—a single
    JVM for the web tier that makes calls to a single JVM for the application tier.


    Here are the other parts we are concerned with.


    First are the stub servers we just talked about. They replace the mainframe and
    the cloud services. Vetting the actual systems for performance will have to wait
    for later, probably in an integration testing environment.


    Ultimately, some monitoring will be sprinkled in, but the last component to go
    into the developer tuning environment is the load generator, the topic of this
    section.


    ### Quick Overview of Load Generation


    A load generator is a network traffic generator. We use it to stress a network-enabled
    software application, like a SOA or the server-side portion of a web-application,
    to see if the responses are fast enough and to make sure it doesn''t crash.


    Of course, it wouldn''t be helpful to sling random traffic at a web application—we''d
    need to submit the exact kind of web requests the web app was designed to process.
    For this purpose, most load generators, like JMeter, use a record-and-playback
    approach to get the traffic just right. It works like this: on an otherwise idle
    system, you manually traverse your application using a web browser while a special
    tool (which comes with a load generator) records the network requests made by
    your browser.


    The output of that recording is a tool-specific script that can replay, verbatim,
    that single user''s traffic, thus stressing out the SUT a little bit. Then, to
    model a dynamic workload and move away from the verbatim recording, you enhance
    the script to log on a (data-driven) variety of users and operate on a (data-driven)
    variety of "things" in the SUT—whatever things the SUT deals in—shopping for kayaks,
    a dating service for manatees, delivering news stories, whatever. Hardware permitting,
    load generators can spin up as many threads as you like to simulate a larger number
    of users.


    ### Load Generator Responsibilities


    A load generator has these main responsibilities:


    1. To record network traffic as you traverse a system, and save the navigation
    details to a script.

    2. To allow you to edit/debug/enhance the script, so that it more closely resembles
    a production load.

    3. To run the script in a single thread, and to enable multiple threads to run
    the same script concurrently, thus applying load to your system. This is "load
    generation."

    4. To display the response time, throughput and other test results via live graphs/displays
    and/or via post-test reports.


    The "Load Generator" in Figure [2-2](#A449023_1_En_2_Chapter.html#Fig2) specifically
    refers to responsibility 3, load generation. You can take care of responsibilities
    1, 2 and 4 wherever and however you need to.


    In fact, the startup banner for the JMeter load generator addresses this very
    concern (Figure [2-6](#A449023_1_En_2_Chapter.html#Fig6)).


    ![A449023_1_En_2_Fig6_HTML.jpg](A449023_1_En_2_Fig6_HTML.jpg)


    Figure 2-6. Warning from JMeter not to use the GUI during a load test


    The idea is to create, record, and refine your load script using JMeter GUI Mode.
    Running a small amount of load, perhaps less than ten requests per second is acceptable,
    too. Do all of this with the JMeter GUI Mode. But when it comes to running more
    than 10RPS, your safest best to avoiding performance problems in the load generator
    itself is by running JMeter in NON GUI Mode, aka from the command line, or headless.
    The JMeter startup banner in Figure [2-6](#A449023_1_En_2_Chapter.html#Fig6) even
    shows how to do this. Here is an example:


    1. First start the JMeter GUI and create your load plan and save it to `myLoadPlan.jmx`.

    2. Copy the `myLoadPlan.jmx` file to your developer tuning environment, where
    JMeter needs to be installed.

    3. Run this command:


    ```

    $JMETER_HOME/bin/jmeter -n -t myLoadPlan.jmx -l test001.jtl -e -o dirTest001

    ```


    where `test001.jtl` is a text data file in which JMeter will write results from
    the test and `dirTest001` is a folder that JMeter will create and use to hold
    a performance report after the test finishes.


    As long as RAM and CPU consumption for the JMeter process stay relatively low,
    perhaps below 20% for both, then I have had no problems running JMeter on the
    same machine as the SUT. If you are still skeptical, see if performance dramatically
    improves by moving the load generation to another box on the same subnet.'
