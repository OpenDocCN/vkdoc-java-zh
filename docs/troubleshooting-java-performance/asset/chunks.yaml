    ## 识别可从压缩中受益的明文负载


    图 10-2 显示，压缩一个 1MB 的文件会产生一个 200K 或更小的压缩文件。数据大小减少 80% 的效果令人印象深刻，这也是为什么在广域网上进行压缩能带来如此巨大的性能提升。这里遗留的问题是，你使用的系统是否真的利用了这种优化，并在慢速链路（即广域网）上压缩了数据。


    要查明这一点，你需要仔细检查实际通过网络传输的消息中的数据。`tcpdump`、`windump` 和 `wireshark` 是优秀的网络可观测性工具，但它们没有简单的方法来聚合或汇总非常繁忙的系统上的响应时间数据。为了亲眼看到实际的消息，这些工具是首选，我将尽力帮助你解决使用它们时常见的一些困扰。


    你可以在发送或接收数据的机器上运行以下命令。找到服务器正在监听的端口。对于 jpt，你会在 `warProject/src/main/resources/application.properties`
    中找到“server.port = 8675”。请注意，`01a.jmx` 和 `01b.jmx` 也指定了这个端口号。当 JMeter 向 jpt 施加负载时，启动另一个终端窗口，并使用如下所示的
    tcpdump 捕获跟踪信息。


    ```

    tcpdump -X -i any -s 0 "port 8675 and greater 100"

    ```


    请注意，文本“greater 100”会隐藏小于 100 字节的小型 TCP 数据包。这些小数据包不携带任何数据，并且会使显示变得混乱。简而言之，如果你的
    ASCII（我猜是 UTF-8）网络消息在 tcpdump 数据的最右侧列中可见，那么你的消息就没有被压缩。下面的第一个示例是未压缩的。我对第二个示例暂不判断——这些数据是压缩了，还是仅仅加密了？有点令人惊讶的是，并非所有加密数据都被压缩了（[`https://www.belshe.com/2010/11/18/ssl-compression-and-you/`](https://www.belshe.com/2010/11/18/ssl-compression-and-you/)
    `)`，如下所示：


    ```

    0x0090: 3a20 4a65 7474 7928 392e 322e 7a2d 534e :.Jetty(9.2.z-SN

    0x00a0: 4150 5348 4f54 290d 0a0d 0a33 4537 0d0a APSHOT)....3E7..

    0x00b0: 4865 6c6c 6f57 6f72 6c64 4672 6f6d 5065 HelloWorldFromPe

    0x00c0: 7266 6f72 6d61 6e63 6553 616e 6442 6f78 rformanceSandBox

    0x00d0: 4261 636b 656e 6453 6572 7665 7220 4845 BackendServer.HE

    0x00e0: 4c4c 4f20 4845 4c4c 4f20 4845 4c4c 4f20 LLO.HELLO.HELLO.

    0x00f0: 4845 4c4c 4f20 4845 4c4c 4f20 4845 4c4c HELLO.HELLO.HELL

    0x0100: 4f20 4845 4c4c 4f20 4845 4c4c 4f20 4845 O.HELLO.HELLO.HE

    0x0110: 4c4c 4f20 4845 4c4c 4f20 4845 4c4c 4f20 LLO.HELLO.HELLO.

    ```


    上面数据最右侧列显示了十六进制数据的 ASCII 表示形式“HELLO”。结论：这些数据没有被压缩。


    ```

    0x0410: b64c 3fa1 386c a9cf 0f67 ca5b 803c d06b .L?.8l...g..<.k

    0x0420: 58c1 9c74 83f2 d5b3 9074 17d6 d49c edfd X..t.....t......

    0x0430: db8f 0e5c c312 afb7 9b0c 0001 4903 0017 ...\........I...

    0x0440: 4104 609c b859 1283 4746 de7b d3c9 d3dc A.`..Y..GF.{....

    0x0450: eb18 2ef0 2287 c68f fdcb fd17 df46 c959 ...."........F.Y

    0x0460: 8e19 8731 91d2 48f2 3336 6237 f402 8fca ...1..H.36b7....

    0x0470: dd0e 4048 2fda e4a5 6948 6b8a 036b f351 ..@H/...iHk..k.Q

    0x0480: 0cf4 0601 0100 287b c742 a426 3332 d192 ......({.B.&32..

    0x0490: 8e39 8edd 271a d0e0 2e67 2eba 37aa e3fb .9..''....g..7...

    0x04a0: 7311 075e 31d6 bd3f 7767 468c 0476 445a s..¹..?wgF..vDZ

    ```


    我原本期望在这个文本中看到 XML 消息，但数据是通过 HTTPS 发送的。结论：没有足够的信息来判断数据是否被压缩。


    ## 别忘了


    `jstack` 是一个很棒的即插即用工具，可以快速告诉你系统是否正在等待来自“外部”系统的响应。只需在线程转储中查找以下方法调用：


    ```

    java.net.SocketInputStream.socketRead0()

    ```


    无论你的系统是发出 HTTP 还是 HTTPS 请求、JDBC 请求，还是通过任何其他协议通信，你都会看到这个方法。此外，无论使用何种协议，较小的消息在长距离传输中速度明显更快，而压缩是使负载变小的好方法。但请记住，有很多方法可以缩小负载。一种方法是重构客户端代码，以减少所需的数据量。第二种方法是更改消息格式——例如通过缩小
    XML 标签的大小。如果数据是静态的且变化不大，可以考虑缓存请求，而不是反复通过网络发送。


    别忘了，正如第 [9 章所述，大块优于闲聊。这适用于对外部系统的网络请求，而不仅仅是 JDBC。


    然而，最重要的问题是，压缩 HTTPS 存在一些风险。本章简要提及了一些可能由 HTTPS 压缩引起的安全漏洞——忽视这些漏洞是非常愚蠢的。


    ## 下一步


    你可以找到许多书籍和博客，它们展示了如何诊断线程转储中的 BLOCKED 线程。同样，也有关于如何在线程转储中找到单个失控线程（例如，像应用服务器启动线程那样疯狂消耗大量
    CPU 的线程）的指南。不幸的是，这两种用例发生的频率相当低。关于如何使用线程转储来查找常见的慢速线程和常见的过度消耗问题的指导则完全缺失。第 11 章正是针对这一领域，旨在使用线程转储提供类似
    Java 分析器的诊断功能，精确定位慢速线程中正在执行的代码。这种新颖的技术对于揭示滋生众多性能缺陷的黑暗环境至关重要。


    # 11. 线程，P.A.t.h. 中的“t”


    在负载测试中应该施加多大的负载，这个问题长期以来一直没有明确的答案。可扩展性衡量标准（第 6 章）最终用一个易于遵循的测试公式回答了这个问题，该公式还提供了一种非常便捷的评估可扩展性的方法。该测试本身只是对非常常用的增量负载测试的一个小小的渐进式改进。


    因此，可扩展性衡量标准声称对现有技术进行了小幅改进。这很好。本章旨在超越这一点，声称使用长期以来值得信赖但严重未充分利用的 JDK 简单工具，可以以极低的开销实现根本性的性能可见性提升。


    本章的目标是：


    *   理解线程转储目前的使用范围非常有限；它们只能解决很小一部分问题。

    *   学习新颖的技术，极大地扩展线程转储的作用，使其成为一种通用的、低开销的、即插即用的诊断工具。

    *   学习如何使用线程转储来识别在任何环境中导致性能问题的类和方法名称。


    需要明确的是，我写本章的目的不是为了分享和回顾一种常用的性能技术。相反，我试图将一种只有极少数注重性能的工程师使用的强大技术清晰地记录下来，以便它能够被广泛采用，以解决长期存在的可见性缺口——我称之为黑暗环境的那些缺口。


    我准备好坐下来与对此持怀疑态度的人交流。任何被广泛采用的东西都需要经过良好的审查。我理解这一点。我只是希望读者能对这个提议给予比匆匆一瞥、漫不经心更多的关注。

    '
- fmt: '## Current use of Thread Dumps


    Today, thread dumps are mostly used for investigating `BLOCKED` threads and related
    multi-threaded problems. A quick Internet search for "thread dump Java" will confirm
    that. Because the topic has such great coverage on the Internet, I chose not to
    waste the space on it in this book. A lot of smart people have shown how to use
    thread dumps to diagnose and fix these problems.


    But before moving on to using thread dumps in other areas besides multi-threaded
    problem detection, I do have a few quick comments about multithread coding. Firstly,
    any time the `synchronized` keyword is used in Java, a simple load test with three
    threads of load should applied with zero think time, and four or more thread dumps
    should be taken.


    In the thread dumps from the previous test, you should verify that `BLOCKED` threads
    show up infrequently, perhaps in 1 out of 20 stack traces you see. `BLOCKED` threads
    show up when synchronization methods or blocks wrap slow code, and every kind
    of I/O—disk, network and display—must be considered slow. I will grant exemptions
    to the expert writers of specialized libraries (like logging or caching frameworks)
    who regularly load test their code. My comments are for us application developers.
    Remember, don''t put any I/O in a sync block—and that means no `JDBC` or other
    database calls inside a sync block.


    There is nothing wrong with having the synchronization in your code. The problem
    is when multiple threads try to access the block at the same time, and the `JVM`
    has to make other threads wait while the owner of the lock executes. This is when
    the `BLOCKED` thread shows up, and when it happens it is called a contended sync
    block.


    Also, I have yet to mention there are a number of GUI tools designed to visualize
    and highlight multi-threading problems. Jack Shirazi wrote the first great Java
    performance book, *Java Performance Tuning* (O''Reilly), and this link to his
    website contains a list to a number of programs that help you visualize thread
    dumps. Personally, I like the IBM Thread Dump Analyzer and `ThreadLogic`, which
    lets you configure the tool with patterns of text that should raise red flags
    or concern. You''ll find it at


    [`http://www.fasterj.com/tools/threadanalysers.shtml`](http://www.fasterj.com/tools/threadanalysers.shtml)


    To repeat myself a little bit, this little section has some helpful but still
    garden-variety thoughts on synchronization. The next section starts with some
    basics—it shows how threads created in some simple code actually look inside a
    thread dump. Then, I talk about navigating thread dumps. This doesn''t sound earth-shattering,
    but it is really key to understanding what code is running and who called it and
    why.


    After that, we will get into the more controversial part, where we use thread
    dumps very much like we use a Java profiler. To fully understand what''s going
    on here, you really need to run the examples on your own machine; just reading
    this chapter is not enough. Be sure to start up the `littleMock` application for
    the section "Interactive Thread Dump Reading Exercise." The `littleMock` sample
    application will be used, and it just takes a few minutes to download, install
    and launch.


    ## Threads and Thread Dumps


    Listing [11-1](#A449023_1_En_11_Chapter.html#Par19) is a very simple program that
    launches three threads that each sleep for 1 minute, before quitting. Let''s run
    it and capture a thread dump so we can see one stack trace for each thread.


    Note that at start-up time, this program calls `java.lang.Thead#setName()`, thereby
    giving each thread a name used to identify each thread in the actual thread dump.
    The names here start with the prefix `jpt-`. We will talk about why this name
    is so important in a little bit.


    ```

    package com.jpt;

    public class MyThreadStarter {

    public static void main( String[] args ) {

    new MyThread("jpt-first" ).start();

    new MyThread("jpt-second" ).start();

    new MyThread("jpt-third" ).start();

    }

    }

    class MyThread extends Thread {

    public MyThread(String name) {

    setName(name);

    }

    private void mySleep() {

    try { Thread.sleep(60000); } catch(Exception e) {}

    }

    public void run() {

    mySleep();

    }

    }

    Listing 11-1.

    A Java Program That Starts Three Named Threads, Which We Will Look for in a Thread
    Dump

    ```


    Place this text into `MyThreadStarter.java` located in one folder. From a prompt
    in that same folder, run the commands in Listing [11-2](#A449023_1_En_11_Chapter.html#Par21)
    to compile and run the program.


    ```

    # mkdir classes

    # javac -d classes MyThreadStarter.java

    # java -cp classes com.jpt.MyThreadStarter

    Listing 11-2.

    Compiling an running MyThreadStarter.java, a little program that ties stack trace
    activity in a thread dump (from jstack) back to line numbers in source code

    ```


    Now that the program is running, the terminal window will appear to be hung.


    ### Navigating Thread Dumps


    After the 60 second `Thread.sleep()` calls, the "hung" program will return control
    back to the prompt, so you have 60 seconds to open another prompt, find the process
    id (PID) using the JDK''s `jcmd` utility, and capture a thread dump using the
    JDK''s `jstack`.


    In the new prompt that you open, get the PID using the JDK''s `jcmd` program (8341
    in Listing [11-3](#A449023_1_En_11_Chapter.html#Par25)), which is passed to `jstack`,
    and then the `jstack` output (the text of the thread dump) is redirected into
    the file `myThreadDump.txt`. Note that the JDK''s `jps` command could also be
    used, but it requires a few extra command-line parameters (which I''m too lazy
    to type) to display the name of the Java class running. The 60 second sleep time
    in the program means the program will finish after 60 seconds, so don''t waste
    any time. The last line shows that the PID we care about is 8341.


    ```

    #∼/jpt_threads: jcmd

    6817 org.h2.tools.Server -tcp -web -baseDir ./data

    8342 sun.tools.jcmd.JCmd

    6839 warProject/target/performanceGolf.war

    8341 com.jpt.MyThreadStarter <<<< 8341 is the PID we just started

    Listing 11-3.

    Using the JDK''s jcmd to find the PID of the program launched in Listing 11-2

    ```


    Now that we know the PID of the process that of the program launched in Listing
    [11-2](#A449023_1_En_11_Chapter.html#Par21), the JDK comes with a number of plug-it-in-now
    tools we could use to learn more about the process: `jstat`, `jmap`, `jinfo`,
    and `jdb`. Listing [11-4](#A449023_1_En_11_Chapter.html#Par27) shows how we''ll
    pass the PID to `jstack` to capture a thread dump. The syntax `> myThreadDump.txt`
    is used to redirect the thread dump text to the `.txt` file instead of displaying
    it in the command-line window.


    ```

    #∼/jpt_threads: jstack 8341 > myThreadDump .txt

    Listing 11-4.

    Using the JDK''s jstack to Take a Thread Dump of the PID We Found in Listing 11-3

    ```'
