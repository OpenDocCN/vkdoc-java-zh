    for an incremental load plan. Remember when I mentioned the two approaches to
    installing this? I talked about installation using the Plugin Manager or by unzipping
    jar files for a single plugin into `JMETER_HOME/lib/ext`.


    Here are two other installation approaches that I think are just as important
    as the first two:


    *   Use the “old style” releases. First surf to [`https://jmeter-plugins.org/downloads/old/`](https://jmeter-plugins.org/downloads/old/)
    . Then download both `JMeterPlugins-Standard-N.N.N.zip` and `JMeterPlugins-Extras-N.N.N.zip`
    and unzip them into JMETER_HOME. The jar files in the zip must end up in the same
    folders (/lib or /lib/ext) as specified in the .zip files.

    *   Use Maven. Not only does this approach install jmeter-plugins, it does a full
    JMeter install too! Look in the littleMock repository for `pom-load.xml`. Instead
    of launching JMeter with `JMETER_HOME/bin/jmeter.bat`, you use my trivial little
    loadGui.cmd / .sh (also in the littleMock repo). I borrowed most of `pom-load.xml`
    from some kind soul on the Internet. The maven plugin used is very well named:
    `jmeter-maven-plugin`. Thank you, Internet. You’ll find `pom-load.xml` in the
    root folder of [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)
    `.`


    Please use the first technique (“old style”) to install JMeterPlugins on your
    own workstation to view the .jmx scripts for this chapter. Those .jmx files are
    in the sampleJMeterScripts/ folder of this repo:


    [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)


    I refer to this as the jpt repo.


    Consider this everyday problem: Let’s say you create a JMeter load script (a .jmx
    file) that uses a few jmeter-plugins. When your cube neighbor who does not have
    JMeter-Plugins installed tries to run your .jmx file, they will get cryptic errors
    that do very little to highlight the missing dependency.


    The two install approaches above help with this. Maven is not always easy to use,
    but the above `pom-load.xml` is wonderful—it will download, on the fly, any dependent
    JMeter-Plugins specified as a `<dependency>` in the `pom-load.xml` file.


    The moral of this story is that sharing your .jmx file, alone, is prone to cryptic
    dependency issues. Sharing both your .jmx file and your customized `pom-load.xml`
    file fixes all of that. But another way to discover JMeter is to use the JMeter
    Plugins Plugin Manager, one of the install techniques mentioned in Chapter [6](#A449023_1_En_6_Chapter.html).
    Here is the URL for quick reference:


    [`https://jmeter-plugins.org/wiki/PluginsManager/`](https://jmeter-plugins.org/wiki/PluginsManager/)


    If you have the PluginsManager installed (see above), it will prompt you with
    “Your test plan requires the following plugins” when it discovers a .jmx file
    that references a JMeter Plugin you don’t have installed. Then, it will give you
    the option to actually install in or abort.


    The load-pom.xml mentioned above does a full JMeter install and also let’s you
    specify the dependent Plugins in use. Alternatively, you can also use this script
    to install all plugins in a specific plan file:


    `PluginsManagerCMD install-for-jmx/home/username/jmx/testPlan.jmx`


    This is really helpful for automated, lights-out perf testing, but keep in mind
    that even the PluginsManagerCMD has its own install process here: [`https://jmeter-plugins.org/wiki/PluginsManagerAutomated/`](https://jmeter-plugins.org/wiki/PluginsManagerAutomated/)


    In Chapter [2](#A449023_1_En_2_Chapter.html), I showed you how to graph the CPU
    consumption of individual PIDs. To do that, download and install this plugin—this
    part enables just the graphs, not the collecting of CPU data:


    [`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMonAgent/#Download)


    Then use the ServerAgent to collect data that will display on the graphs: Download
    ServerAgent-N.N.N.zip from


    [`https://jmeter-plugins.org/wiki/PerfMonAgent/#Download`](https://jmeter-plugins.org/wiki/PerfMonAgent/#Download)


    Unzip it onto any machine (any platform) from which you want to collect metrics.
    When you start the `startAgent.sh` (or `startAgent.bat`), it listens for a connection
    on port 4444 from the JMeter GUI (or headless) process on your desktop. It is
    extremely well behaved, cross platform and easy to use.


    The StartAgent captures RAM , network and other metrics—not just CPU. There are
    a number of other JMeterPlugins, detailed next.'
  trans: '

    ## 使用 jmeter-plugins.org 是必须的


    坦白说，如果没有 Andrey Pohilko ¹ 那套令人惊叹的 jmeter-plugins.org（一套可直接插入 JMeter 的附加工具、图表等），我早就放弃
    JMeter 了。我想我可能有点偏见，因为我自己也贡献了几百行代码。


    该项目早在 2009 年就启动了，因此相当稳定。第 6 章关于可扩展性基准的内容，就大量依赖 JMeter Plugins。CPU 消耗来自 JMeter
    Plugins，那些为增量负载计划绘制漂亮阶梯图的线程组也是如此。还记得我提到过两种安装方法吗？我讲过使用插件管理器安装，或者将单个插件的 jar 文件解压到
    `JMETER_HOME/lib/ext` 目录下。


    以下是另外两种我认为与前两种同样重要的安装方法：


    *   使用“旧版”发布包。首先访问 [`https://jmeter-plugins.org/downloads/old/`](https://jmeter-plugins.org/downloads/old/)。然后下载
    `JMeterPlugins-Standard-N.N.N.zip` 和 `JMeterPlugins-Extras-N.N.N.zip`，并将它们解压到
    JMETER_HOME 目录下。压缩包中的 jar 文件必须最终放置在 .zip 文件中指定的相同文件夹（/lib 或 /lib/ext）中。

    *   使用 Maven。这种方法不仅能安装 jmeter-plugins，还能完整安装 JMeter！在 littleMock 仓库中查找 `pom-load.xml`。不要使用
    `JMETER_HOME/bin/jmeter.bat` 启动 JMeter，而是使用我那个简单的小工具 loadGui.cmd / .sh（也在 littleMock
    仓库中）。`pom-load.xml` 的大部分内容是我从互联网上某位好心人那里借鉴来的。使用的 Maven 插件名字起得很好：`jmeter-maven-plugin`。感谢互联网。你可以在
    [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)
    的根目录下找到 `pom-load.xml`。


    请在您自己的工作电脑上使用第一种技术（“旧版”）安装 JMeterPlugins，以便查看本章的 .jmx 脚本。这些 .jmx 文件位于该仓库的 sampleJMeterScripts/
    文件夹中：


    [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)


    我将其称为 jpt 仓库。


    考虑这个日常问题：假设您创建了一个使用了几个 jmeter-plugins 的 JMeter 负载脚本（.jmx 文件）。当您那位没有安装 JMeter-Plugins
    的邻座同事尝试运行您的 .jmx 文件时，他们会遇到一些难以理解的错误，这些错误几乎不会明确指出缺失的依赖项。


    上述两种安装方法有助于解决这个问题。Maven 并不总是易于使用，但上面的 `pom-load.xml` 非常棒——它会即时下载 `pom-load.xml`
    文件中指定为 `<dependency>` 的任何依赖的 JMeter-Plugins。


    这个故事的寓意是，仅共享您的 .jmx 文件很容易导致难以理解的依赖问题。同时共享您的 .jmx 文件和自定义的 `pom-load.xml` 文件可以完全解决这个问题。但另一种发现
    JMeter 的方法是使用 JMeter Plugins 插件管理器，这是第 6 章中提到的安装技术之一。以下是快速参考的 URL：


    [`https://jmeter-plugins.org/wiki/PluginsManager/`](https://jmeter-plugins.org/wiki/PluginsManager/)


    如果您安装了 PluginsManager（见上文），当它发现一个引用了您尚未安装的 JMeter Plugin 的 .jmx 文件时，它会提示您“您的测试计划需要以下插件”。然后，它会为您提供实际安装或中止的选项。


    上面提到的 load-pom.xml 会完整安装 JMeter，并允许您指定正在使用的依赖插件。或者，您也可以使用此脚本安装特定计划文件中的所有插件：


    `PluginsManagerCMD install-for-jmx/home/username/jmx/testPlan.jmx`


    这对于自动化的、无人值守的性能测试非常有帮助，但请记住，即使是 PluginsManagerCMD 也有自己的安装过程，详见此处：[`https://jmeter-plugins.org/wiki/PluginsManagerAutomated/`](https://jmeter-plugins.org/wiki/PluginsManagerAutomated/)


    在第 2 章中，我向您展示了如何绘制单个 PID 的 CPU 消耗图。为此，请下载并安装此插件——这部分仅启用图表，不收集 CPU 数据：


    [`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMonAgent/#Download)


    然后使用 ServerAgent 收集将在图表上显示的数据：从以下地址下载 ServerAgent-N.N.N.zip


    [`https://jmeter-plugins.org/wiki/PerfMonAgent/#Download`](https://jmeter-plugins.org/wiki/PerfMonAgent/#Download)


    将其解压到您想要收集指标的任何机器（任何平台）上。当您启动 `startAgent.sh`（或 `startAgent.bat`）时，它会监听来自您桌面上的
    JMeter GUI（或无头）进程在端口 4444 上的连接。它非常稳定、跨平台且易于使用。


    StartAgent 捕获 RAM、网络和其他指标——不仅仅是 CPU。还有许多其他 JMeterPlugins，将在下文详细介绍。

    '
- fmt: '# PerfMon


    In Chapter [3](#A449023_1_En_3_Chapter.html) I talked about how metrics answer
    three basic questions for us:


    1. How utilized are our hardware resources?

    2. Which component is to blame for a particular performance problem?

    3. Does the end user benefit? Which code change performs better?


    Load generators were specifically designed to answer the third question about
    meeting performance requirements. The `jmeter-plugins.org` `PerfMon` component
    also provides high-level answers to the first question. When I say high-level,
    I mean CPU, RAM, and network consumption and [a little more than that](http://jmeter-plugins.org/wiki/PerfMonMetrics/)
    (`https://jmeter-plugins.org/wiki/PerfMonMetrics/`). Here is how it works.


    For starters, no administrative or root permissions are required to run `startAgent.bat`
    (Listing [7-1](#A449023_1_En_7_Chapter.html#Par70)). This process consumes very
    few resources, so it is safe to launch this process and forget about it for days
    or months.


    ```

    # ./startAgent.sh

    INFO  2016-02-21 14:03:05.061 [kg.apc.p] (): Binding UDP to 4444

    INFO  2016-02-21 14:03:06.064 [kg.apc.p] (): Binding TCP to 4444

    INFO  2016-02-21 14:03:06.069 [kg.apc.p] (): JP@GC Agent v2.2.0 started

    Listing 7-1.

    Startup banner for serverAgent, which provides hardware utilization data for JMeter

    ```


    Figure [7-1](#A449023_1_En_7_Chapter.html#Fig1) shows how to add a JMeter graph
    that connects to the `serverAgent` and display a CPU graph.


    ![A449023_1_En_7_Fig1_HTML.jpg](A449023_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    To capture great CPU, RAM, and other hardware metrics, just point `PerfMon` to
    the host and port (default port is 4444) where you have unzipped and started the
    `serverAgent`.


    So, JMeter helps answer two out of three of the metric questions. You can even
    make a case that it answers the remaining question, about which component is to
    blame for a particular performance problem. How? Check out these other metrics
    available that you can graph in JMeter.


    The `JMXMon` plugin graphs JMX metrics in JMeter:


    `https://jmeter-plugins.org/wiki/JMXMon/`


    It is an unfortunate coincidence that the file extension for the JMeter load plan
    (`.jmx`) is the same three letters as the abbreviation for Java Management Extensions
    (JMX), a monitoring API. JMX the monitoring API isn’t very popular right now,
    but Spring Boot’s Actuator is. It delivers great JVM health metrics in json-over-http
    messages. The following page shows how you can enable Actuator in Spring Boot
    by adding a simple dependency to your Maven `pom.xml` Spring Boot file:


    `http://www.baeldung.com/spring-boot-actuators`


    Then, you can use the following JMeterPlugin to graph Actuator data in JMeter:


    `https://jmeter-plugins.org/wiki/PageDataExtractor/`


    JMX and Actuator data can point to a number of problems inside your JVM, thus
    helping answer the “which component is to blame” question. So JMeter and JMeterPlugins
    help provide all three kinds of metrics. Impressive.


    ## JMeter `user.properties` Is Your Friend


    From time to time, I discover JMeter properties that tweak JMeter’s default configuration
    in some particular way. So that these property tweaks don’t get lost in the 45KB
    (as of JMeter version 2.13) of other properties in `JMETER_HOME/bin/jmeter.properties`,
    I segregate them into `JMETER_HOME/bin/user.properties`, where they override those
    in `jmeter.properties`.


    Having them separate allows me to easily copy my `user.properties` file to new
    JMeter installations, giving me a more consistent installation.


    Listing [7-2](#A449023_1_En_7_Chapter.html#Par83) shows my personal `user.properties`
    file with my favorite set of JMeter customizations that I recommend for all.


    ```

    #Add this to avoid truncated HTTP & other responses in View Results Tree

    view.results.tree.max_size=0

    #Add this so the Active Threads over Time Listener will

    #render from your .jtl file

    jmeter.save.saveservice.thread_counts=true

    #Add this to use the csv format (instead of XML) for jtl output files.

    #This lowers jtl size, lowers JMeter CPU consumption during test

    jmeter.save.saveservice.output_format=csv

    #These csv field names make it much easier to read/understand .jtl files.

    jmeter.save.saveservice.print_field_names=true

    Listing 7-2.

    A few of my favorite JMeter properties in a user.properties file that overrides
    jmeter.properties; both files reside in JMETER_HOME/bin

    ```


    When you share your `.jmx` files with your friends, you also might want to share
    properties like the ones above. But you might instead want to use the `pom-load.xml`
    file, above, to specify any properties you want your friends to use. Check out
    the above `pom-load.xml` file for the syntax in Listing [7-3](#A449023_1_En_7_Chapter.html#Par85),
    which does the same thing as setting `summariser.interval=5` in JMeter’s `user.properties`
    file.


    ```


    Listing 7-3.

    A JMeter property that is specified in the jmeter-maven-plugin

    ```


    You can use the technique in Listing [7-3](#A449023_1_En_7_Chapter.html#Par85)
    to specify any JMeter property. Here is a reference to all of JMeter’s properties:


    `http://jmeter.apache.org/usermanual/properties_reference.html`'
