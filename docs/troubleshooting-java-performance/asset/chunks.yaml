  trans: '

    ### 消息大小


    每次压缩文本文件时，我都会会心一笑。文件大小通常能缩减 80%，这让我感到无比惊奇。同样的情况也适用于 HTTP 流的压缩。但性能提升并非直接源于复杂的压缩算法，而仅仅是因为消息大小的改变。更小的消息传输更快，尤其是在距离增加的情况下。


    我这么说，是希望你不要将自己局限于使用单一工具（压缩）来进行优化。实际上，有各种各样的策略可以用来减小消息大小。


    我曾与一个团队合作，仅通过简单更改 XML 格式，就将 250K 的传输数据缩减到了 10K。你还可以确保只发送会被使用的数据，并考虑添加缓存方案。


    图 10-3 精确展示了图 10-2 中每项改进所需的大小缩减量（以字节为单位）。


    ![A449023_1_En_10_Fig3_HTML.gif](img/A449023_1_En_10_Fig3_HTML.gif)


    图 10-3.


    此图展示了每个有效负载在 GZIP 压缩前后的大小。同一 HTTP 响应消息的字节数，包括压缩后（红色）和未压缩（蓝色）的版本。


    ## 使用线程转储检测网络请求


    为了查明网络请求是否拖慢了系统速度，我在 JPT 示例中准备了示例 01a 和 01b。这两个示例共享相同的架构，如图 10-4 所示。


    ![A449023_1_En_10_Fig4_HTML.gif](img/A449023_1_En_10_Fig4_HTML.gif)


    图 10-4.


    Java JPT 示例 01a 和 01b 的流程图。`/randomInquiry` 和 `/perfSandboxBackend` 都是 HTTP 请求，并且
    JMeter 和服务器（Spring Boot）都部署在同一台机器的 localhost 上。


    请注意，Wiremock 与 `Controller.java` 运行在同一个 JVM 中，这有点不太真实。


    测试 01a 和测试 01b 被配置为在 Wiremock 中“休眠”两个不同的时间。哪个测试更慢，01a 还是 01b？


    一旦你启动并运行了这些示例，请按如下方式获取 war 进程的线程转储。


    首先，找到 war 文件的进程 ID：


    ```

    # jcmd

    15893 warProject/target/performanceGolf.war

    ```


    为简洁起见，我删减了部分输出——请务必查找 war 文件。


    然后，像这样将该 PID（上面的 15893）传递给 `stack`，并将输出重定向到一个文本文件：


    ```

    # jstack 15893 > myThreadDump.txt

    ```


    在测试计划 01a.jmx 和 01b.jmx 中，你会发现 JMeter 被配置为应用 3t0tt 负载，即三个线程的负载，零思考时间。同样，当你查看线程转储时，你会发现三个线程的堆栈跟踪与图
    10-5 中显示的几乎完全相同。


    ![A449023_1_En_10_Fig5_HTML.gif](img/A449023_1_En_10_Fig5_HTML.gif)


    图 10-5.


    测试 01a 的线程转储中三个线程之一的堆栈跟踪。测试 01b 的看起来会完全相同。


    你看到的顶部方法，是所有类型的网络请求（不仅仅是 HTTP）中都会出现的方法：


    ```

    at java.net.SocketInputStream.socketRead0(Native Method)

    ```


    如果你从上一章中关于慢速数据库索引的示例中捕获线程转储，你会发现完全相同的 `socketRead0()` 方法，但这次是由 H2 数据库驱动程序使用，用于等待
    H2 数据库的响应，而该数据库由于缺少索引而响应缓慢。


    这里的关键点是，始终将 `socketRead0()` 方法视为代码正在等待网络响应的一个指标，无论使用的是何种协议。


    ## 量化响应时间


    刚才展示的线程转储方法经常帮助我判断来自外部系统的响应时间是否是最大的性能问题之一——即备受青睐的“低垂的果实”。这是一个非常有用的技术，但不幸的是，如果能精确量化在后端系统中花费了多少时间，那将会更有帮助。


    为了找出确切的响应时间，我配置了 Glowroot 与 JPT 和 littleMock 示例一起运行。只需将浏览器指向 `http://localhost:4000`（图
    10-6）。


    ![A449023_1_En_10_Fig6_HTML.jpg](img/A449023_1_En_10_Fig6_HTML.jpg)


    图 10-6.


    Glowroot 数据显示测试 01a 中 `/randomInquiry` URL 的响应时间。


    所以，`jstack` 为我们提供了一个“即插即用”的指示，表明我们正在等待网络请求。但不幸的是，01a 和 01b 的线程转储看起来几乎完全相同。安装 Glowroot
    需要你添加一个指向 Glowroot jar 文件的 `javaagent` 参数，并且需要重启——在我看来，这并非“即插即用”，但它确实能很好地量化这些测试的响应时间。如果你查看测试
    01b 的相同 Glowroot 指标，你会发现响应时间是 500 毫秒。

    '
- fmt: '# Identifying Clear Text Payloads That Could Benefit from Compression


    Figure [10-2](#A449023_1_En_10_Chapter.html#Fig2) showed that compressing a 1MB
    file yields a 200K or smaller zipped file. 80% reduction in data size is impressive,
    and this is why compression over a WAN (Wide Area Network) provides such a great
    performance boost. The lingering question here is whether the systems you work
    with actually leverage this optimization and compress their data over the slow
    wire (aka WAN).


    To find out, you need to eyeball the data in the actual message going over the
    wire. `tcpdump`, `windump`, and `wireshark` are great network observability tools,
    but they have no easy way to aggregate or summarize response time data on a very
    busy system. For laying your eyes on the actually message, these tools are the
    way to go, and I will try to help with some common frustrations that come with
    them.


    You can run the following command on either the machine sending or the one receiving
    the data. Find the port that the server is listening on. For `jpt`, you will find
    `server.port = 8675` in `warProject/src/main/resources/application.properties`.
    Note that `01a.jmx` and `01b.jmx` specify this port number, as well. While JMeter
    is applying load to `jpt`, start a separate terminal window and capture a trace
    using `tcpdump` as shown here.


    ```

    tcpdump -X -i any -s 0 "port 8675 and greater 100"

    ```


    Note that the text `greater 100` hides small TCP packets less than 100 bytes.
    These small packets don’t carry any data and they clutter up the display. In short,
    if your ASCII (and I guess UTF-8) network message is visible in the rightmost
    column of the `tcpdump` data, then your message is not compressed. The first example
    below is uncompressed. I will reserve judgement on the second sample—is this data
    compressed, or is it merely encrypted? Somewhat surprisingly, not all encrypted
    data is compressed ( [`https://www.belshe.com/2010/11/18/ssl-compression-and-you/`](https://www.belshe.com/2010/11/18/ssl-compression-and-you/)
    ), as shown here:


    ```

    0x0090: 3a20 4a65 7474 7928 392e 322e 7a2d 534e :.Jetty(9.2.z-SN

    0x00a0: 4150 5348 4f54 290d 0a0d 0a33 4537 0d0a APSHOT)....3E7..

    0x00b0: 4865 6c6c 6f57 6f72 6c64 4672 6f6d 5065 HelloWorldFromPe

    0x00c0: 7266 6f72 6d61 6e63 6553 616e 6442 6f78 rformanceSandBox

    0x00d0: 4261 636b 656e 6453 6572 7665 7220 4845 BackendServer.HE

    0x00e0: 4c4c 4f20 4845 4c4c 4f20 4845 4c4c 4f20 LLO.HELLO.HELLO.

    0x00f0: 4845 4c4c 4f20 4845 4c4c 4f20 4845 4c4c HELLO.HELLO.HELL

    0x0100: 4f20 4845 4c4c 4f20 4845 4c4c 4f20 4845 O.HELLO.HELLO.HE

    0x0110: 4c4c 4f20 4845 4c4c 4f20 4845 4c4c 4f20 LLO.HELLO.HELLO.

    ```


    The rightmost column of data above shows `HELLO` ASCII representation of hex data.
    Conclusion: this data is not compressed.


    ```

    0x0410: b64c 3fa1 386c a9cf 0f67 ca5b 803c d06b .L?.8l...g.[.<.k

    0x0420: 58c1 9c74 83f2 d5b3 9074 17d6 d49c edfd X..t.....t......

    0x0430: db8f 0e5c c312 afb7 9b0c 0001 4903 0017 ...\........I...

    0x0440: 4104 609c b859 1283 4746 de7b d3c9 d3dc A.`..Y..GF.{....

    0x0450: eb18 2ef0 2287 c68f fdcb fd17 df46 c959 ...."........F.Y

    0x0460: 8e19 8731 91d2 48f2 3336 6237 f402 8fca ...1..H.36b7....

    0x0470: dd0e 4048 2fda e4a5 6948 6b8a 036b f351 ..@H/...iHk..k.Q

    0x0480: 0cf4 0601 0100 287b c742 a426 3332 d192 ......({.B.&32..

    0x0490: 8e39 8edd 271a d0e0 2e67 2eba 37aa e3fb .9..''....g..7...

    0x04a0: 7311 075e 31d6 bd3f 7767 468c 0476 445a s..^1..?wgF..vDZ

    ```


    I was expecting to see an XML message in this text, but HTTPS was used to send
    the data. Conclusion: Not enough info to know whether data is compressed.


    ## Don’t Forget


    `jstack` is a great plug-it-in-now tool that can tell you quickly whether your
    system is waiting for response from “Alien” systems. Just look for the following
    method call in your thread dump:


    ```

    java.net.SocketInputStream.socketRead0()

    ```


    Whether your system is making HTTP or HTTPS requests, JDBC requests, or talking
    over any other protocol, this is the method you will see. Furthermore, regardless
    of the protocol that is used, smaller messages travel significantly faster over
    long distances, and compression is a great way to make your payload smaller. But
    keep in mind, there are many ways to shrink a payload. One way is to refactor
    the client code so less data is needed. A second way is to change the message
    format—like by shrinking the size of XML tags. If the data is static and doesn’t
    change much, consider caching the request instead of repeatedly sending it over
    the wire.


    Don’t forget, as mentioned in Chapter [9](#A449023_1_En_9_Chapter.html), chunky
    outperforms chatty. This applies to network requests to Alien systems, not just
    to JDBC.


    The most important issue, though, is that compressing HTTPS carries some risk.
    This chapter briefly mentioned some security vulnerabilities that can be caused
    by HTTPS compression—these would be very foolish to ignore.


    ## What’s Next


    You can find many books and blogs that show you how to diagnose BLOCKED threads
    in a thread dump. The same goes for finding a single runaway thread in a thread
    dump that uses a lot of CPU like an application server startup thread gone crazy.
    Unfortunately, these two use cases happen pretty infrequently. Guidance for using
    thread dumps to find garden-variety slow threads and garden variety over-consumption
    is altogether absent. Chapter [11](#A449023_1_En_11_Chapter.html) aims precisely
    in this space, to use thread dumps to provide Java-profiler like diagnostics that
    point to the exact code executing in slow threads. This novel technique is essential
    for shedding light on the dark environments where so many performance defects
    breed.


    # 11. Threads, the “t” in P.A.t.h.


    Knowing how much load to apply in a load test has long been a question without
    a well-defined answer. The Scalability Yardstick (Chapter [6](#A449023_1_En_6_Chapter.html))
    finally answers that question with an easy-to-follow test formula, which also
    provides an uncommonly convenient way to assess scalability. The test itself is
    just a small, evolutionary improvement to the very commonly used incremental load
    test.


    So, the Scalability Yardstick claims to make small improvements on existing techniques.
    That’s nice. This chapter intends to go way beyond that, with the claim that radically
    more performance visibility is possible with extremely low overhead using simple
    tools that have long been a trusted, but severely underused part of the JDK.


    The objectives for this chapter are:


    *   Understand that thread dumps are currently used in a very limited role; they
    solve a very small set of problems.

    *   Learn novel techniques that greatly expand the role of thread dumps into a
    general-purpose, low-overhead, plug-it-in-now diagnostic tool.

    *   Learn how to use thread dumps to identify the class and method name(s) causing
    performance problems in any environment.


    To be clear, my purpose in writing this chapter is not to share and review a commonly
    used performance technique. Instead, I am trying to take a powerful technique
    used by a pitifully small fraction of performance-minded engineers and document
    it clearly so that it can be widely adopted to address longstanding gaps in visibility—the
    gaps I’ve referred to as Dark Environments.


    I am ready to sit down and visit with those who are skeptical about this. Anything
    that gets wide adoption needs a good vetting. I understand that. I just want to
    make sure the reader gives a little more than a passing, ho-hum look at this proposal.'
  raw: '## Identifying Clear Text Payloads That Could Benefit from Compression


    Figure [10-2](#A449023_1_En_10_Chapter.html#Fig2) showed that compressing a 1MB
    file yields a 200K or smaller zipped file. 80% reduction in data size is impressive,
    and this is why compression over a WAN (Wide Area Network) provides such a great
    performance boost. The lingering question here is whether the systems you work
    with actually leverage this optimization and compress their data over the slow
    wire (aka WAN).


    To find out, you need to eyeball the data in the actual message going over the
    wire. `tcpdump`, `windump`, and `wireshark` are great network observability tools,
    but they have no easy way to aggregate or summarize response time data on a very
    busy system. For laying your eyes on the actually message, these tools are the
    way to go, and I will try to help with some common frustrations that come with
    them.


    You can run the following command on either the machine sending or the one receiving
    the data. Find the port that the server is listening on. For jpt, you will find
    “server.port = 8675” in warProject/src/main/resources/application.properties.
    Note that 01a.jmx and 01b.jmx specify this port number, was well. While JMeter
    is applying load to jpt, start a separate terminal window and capture a trace
    using tcpdump as shown here.


    ```

    tcpdump -X -i any -s 0 "port 8675 and greater 100"

    ```


    Note that the text ‘greater 100’ hides small tcp packets less then 100 bytes.
    These small packets don’t carry any data and they clutter up the display. In short,
    if your ASCII (and I guess UTF-8) network message is visible in the rightmost
    column of the tcpdump data, then your message is not compressed. The first example
    below is uncompressed. I will reserve judgement on the second sample—is this data
    compressed, or is it merely encrypted? Somewhat surprisingly, not all encrypted
    data is compressed ( [`https://www.belshe.com/2010/11/18/ssl-compression-and-you/`](https://www.belshe.com/2010/11/18/ssl-compression-and-you/)
    `)`, as shown here:


    ```

    0x0090: 3a20 4a65 7474 7928 392e 322e 7a2d 534e :.Jetty(9.2.z-SN

    0x00a0: 4150 5348 4f54 290d 0a0d 0a33 4537 0d0a APSHOT)....3E7..

    0x00b0: 4865 6c6c 6f57 6f72 6c64 4672 6f6d 5065 HelloWorldFromPe

    0x00c0: 7266 6f72 6d61 6e63 6553 616e 6442 6f78 rformanceSandBox

    0x00d0: 4261 636b 656e 6453 6572 7665 7220 4845 BackendServer.HE

    0x00e0: 4c4c 4f20 4845 4c4c 4f20 4845 4c4c 4f20 LLO.HELLO.HELLO.

    0x00f0: 4845 4c4c 4f20 4845 4c4c 4f20 4845 4c4c HELLO.HELLO.HELL

    0x0100: 4f20 4845 4c4c 4f20 4845 4c4c 4f20 4845 O.HELLO.HELLO.HE

    0x0110: 4c4c 4f20 4845 4c4c 4f20 4845 4c4c 4f20 LLO.HELLO.HELLO.

    ```


    The rightmost column of data above shows “HELLO” ASCII representation of hex data.
    Conclusion: this data is not compressed.


    ```

    0x0410: b64c 3fa1 386c a9cf 0f67 ca5b 803c d06b .L?.8l...g.[.<.k

    0x0420: 58c1 9c74 83f2 d5b3 9074 17d6 d49c edfd X..t.....t......

    0x0430: db8f 0e5c c312 afb7 9b0c 0001 4903 0017 ...\........I...

    0x0440: 4104 609c b859 1283 4746 de7b d3c9 d3dc A.`..Y..GF.{....

    0x0450: eb18 2ef0 2287 c68f fdcb fd17 df46 c959 ...."........F.Y

    0x0460: 8e19 8731 91d2 48f2 3336 6237 f402 8fca ...1..H.36b7....

    0x0470: dd0e 4048 2fda e4a5 6948 6b8a 036b f351 ..@H/...iHk..k.Q

    0x0480: 0cf4 0601 0100 287b c742 a426 3332 d192 ......({.B.&32..

    0x0490: 8e39 8edd 271a d0e0 2e67 2eba 37aa e3fb .9..''....g..7...

    0x04a0: 7311 075e 31d6 bd3f 7767 468c 0476 445a s..^1..?wgF..vDZ

    ```


    I was expecting to see an XML message in this text, but HTTPS was used to send
    the data. Conclusion: Not enough info to know whether data is compressed.


    ## Don’t Forget


    `jstack` is a great plug-it-in-now tool that can tell you quickly whether your
    system is waiting for response from “Alien” systems. Just look for the following
    method call in your thread dump:


    ```

    java.net.SocketInputStream.socketRead0()

    ```


    Whether your system is making HTTP or HTTPS requests, JDBC requests, or talking
    over any other protocol, this is the method you will see. Furthermore, regardless
    of the protocol that is use, smaller messages travel significantly faster of long
    distances, and compression is a great way to make your payload smaller. But keep
    in mind, there are many ways to shrink a payload. One way is to refactor the client
    code so less data is needed. A second way is to change the message format—like
    by shrinking the size of XML tags. If the data is static and doesn’t change much,
    consider caching the request instead of repeatedly sending it over the wire.


    Don’t forget, as mentioned in Chapter [9](#A449023_1_En_9_Chapter.html), chunky
    outperforms chatty. This applies to network requests to Alien systems, not just
    to JDBC.


    The most important issue, though, is that compressing HTTPS carries some risk.
    This chapter briefly mentioned some security vulnerabilities that can be caused
    by HTTPS compression—these would be very foolish to ignore.


    ## What’s Next


    You can find many books and blogs that show you how to diagnose BLOCKED threads
    in a thread dump. The same goes for finding a single runaway thread in a thread
    dump that uses a lot of CPU like an application server startup thread gone crazy.
    Unfortunately, these two use cases happen pretty infrequently. Guidance for using
    thread dumps to find garden-variety slow threads and garden variety over-consumption
    is altogether absent. Chapter [11](#A449023_1_En_11_Chapter.html) aims precisely
    in this space, to use thread dumps to provide Java-profiler like diagnostics that
    point to the exact code executing in slow threads. This novel technique is essential
    for shedding light on the dark environments where so many performance defects
    breed.


    # 11. Threads, the “t” in P.A.t.h.


    Knowing how much load to apply in a load test has long been a question without
    a well-defined answer. The Scalability Yardstick (Chapter [6](#A449023_1_En_6_Chapter.html))
    finally answers that question with an easy-to-follow test formula, which also
    provides an uncommonly convenient way to assess scalability. The test itself is
    just a small, evolutionary improvement to the very commonly used incremental load
    test.


    So, the Scalability Yardstick claims to make small improvements on existing techniques.
    That’s nice. This chapter intends to go way beyond that, with the claim that radically
    more performance visibility is possible with extremely low overhead using simple
    tools that have long been a trusted, but severely underused part of the JDK.


    The objectives for this chapter are:


    *   Understand that thread dumps are currently used in a very limited role; they
    solve a very small set of problems.

    *   Learn novel techniques that greatly expand the role of thread dumps into a
    general-purpose, low-overhead, plug-it-in-now diagnostic tool.

    *   Learn how to use thread dumps to identify the class and method name(s) causing
    performance problems in any environment.


    To be clear, my purpose in writing this chapter is not to share and review a commonly
    used performance technique. Instead, I am trying to take a powerful technique
    used by a pitifully small fraction of performance-minded engineers and document
    it clearly so that it can be widely adopted to address longstanding gaps in visibility—the
    gaps I’ve referred to as Dark Environments.


    I am ready to sit down and visit with those who are skeptical about this. Anything
    that gets wide adoption needs a good vetting. I understand that. I just want to
    make sure the reader gives a little more than a passing, ho-hum look at this proposal.'
