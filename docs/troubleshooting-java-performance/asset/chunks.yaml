  trans: "\n### 内存泄漏的类型\n\nEclipse MAT 在发现常见的内存泄漏方面表现出色，例如前面展示的 MyMemoryLeak。这部分是因为该泄漏锚定在一个单例对象——即\
    \ GC 根上。想象一个无状态的小进程，它查询了一个包含数百万行记录的数据库表中的所有行。在这种情况下，不存在 GC 根。因此，我为你创建了一个这样的场景供你实验。\n\
    \n通过从数据库表中选择数百万行记录，调用以下 URL 基本上会使任何 `jpt` JVM 崩溃：\n\n`https://localhost:8675/crashJvmWithMonsterResultSet`\n\
    \n也许可以通过尝试在此场景创建的堆转储中找到泄漏来改进 MAT。也许只是我错过了它。\n\n元空间泄漏同样难以解决，但我可以为你提供一些故障排查的入门知识。以下命令将显示元空间容量，以查看你是否接近填满该空间：\n\
    \n```\njstat -gcmetacapacity  1s\n```\n\n但你需要参考 `jstat` 文档来理解所有字段名称：\n\n[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html)\n\
    \n要找出你最初分配了多少空间，请在 JVM 参数中查找此参数：\n\n```\n-XX:MaxMetaspaceSize=1g\n```\n\n最后，要找出哪个类可能正在泄漏，请使用以下说明启用详细的类加载信息：\n\
    \n[`https://dzone.com/articles/how-use-verbose-options-java`](https://dzone.com/articles/how-use-verbose-options-java)\n\
    \n通常，在系统预热之后，类加载应该几乎停止。如果详细的类加载信息持续显示活动，特别是每秒加载几个或更多类，那么你就遇到了元空间泄漏。\n\n到目前为止我们讨论的泄漏是\
    \ Java 程序使用的堆的一部分。早在 Java 7 之前，我们在 C 程序（我认为）中看到了许多内存泄漏，也就是 JVM 本身。这被称为本机内存泄漏，并且不容易调试；它远远超出了这本小书的范围。\n\
    \n## 堆故障排查，逐步进行\n\n我通常通过首先检查是否存在简单的解决方案来排查堆问题。只有当这些简单的解决方案不成功时，我才会继续探索内存泄漏等问题。以下大纲描述了这种粗略的故障排查过程。\n\
    \n首先遵守这些通用规则：\n\n*   `-Xmx` 不得超过可用 RAM。\n*   避免使用 `NewRatio`。\n*   从一而终：坚持使用你最喜欢的\
    \ GC 算法（串行 GC 除外）。如果你使用的是 IBM J9，则只使用 gencon（默认）或新的 Balanced，这是一种“区域”算法，类似于 G1。\n\
    \n基本的 GC 故障排查步骤如下：\n\n1.  从一个不太大的堆开始，大小在 512MB（可能用于微服务）到 4GB 之间。  \n2.  在负载下，评估\
    \ GC 分代开销。使用 `jstat` 和 `gctime.sh` 或 `gctime.cmd`。  \n3.  如果其中一个或两个分代持续出现红色和/或黄色开销，请为该分代配置额外的\
    \ RAM 块（也许是 256MB？）；然后重新启动并重新测试。重复此过程，直到 GC 开销百分比结果达到所需范围。  \n4.  如果不频繁但长时间的老年代暂停（慢于\
    \ 5 秒）是不可接受的，请考虑切换到以下选项之一：\n    1.  Hotspot / G1，因为老年代收集被分解为更小的收集，从而产生更短的暂停。这里是详细的\
    \ G1 调优文档：[`http://www.oracle.com/technetwork/articles/java/g1gc-1984535.html`](http://www.oracle.com/technetwork/articles/java/g1gc-1984535.html)\
    \  \n    2.  对于 IBM J9，请使用 Balanced 收集器，其“区域”方法与 G1 非常相似。  \n\n高级 GC 故障排查步骤如下：\n\
    \n1.  如果老年代持续出现黄色、红色或内存不足错误，请检查内存泄漏。\n    1.  使用 `jmap -histo` 和/或 `heapSpank`\
    \ 来评估是否存在一个或多个类的字节数或实例数持续增长。  \n    2.  使用 PMAT 或 GCViewer 检查详细的 GC 日志。检查这些工具中的图表，查看老年代内存消耗的上升趋势。考虑图表显示填满堆所需的时间。如果堆在几秒或几分钟内被填满，我认为这是一个快速泄漏，并查找分配大量数据的单个请求。一个巨大的\
    \ JDBC 结果集就是一个例子。相反，如果需要数小时或数天才能填满堆，请查找少量对象，这些对象聚集在一个由单例持有的 `java.util` 集合中。  \n\
    \    3.  如果 `heapSpank` 没有提供足够的数据来查找泄漏原因，请捕获堆转储，尝试以下方法之一：\n        1.  MAT 泄漏嫌疑人。\
    \  \n        2.  直方图。  \n        3.  使用 MAT 查找 GC 根。    \n2.  元空间泄漏。从 `jstat -gc\
    \ <myPid> 1000` 的输出中查找“MC”、“MU”、“CCSC”和“CCSU”。  \n3.  有时，单次巨大的内存分配可能会填满堆并使你的 JVM\
    \ 崩溃。要了解如何排查这种情况，请在任意 `jpt` 测试期间从任意浏览器调用以下 URL：`https://localhost:8675/crashJvmWithMonsterResultSet`\
    \ 这会执行一个返回巨大结果集的 JDBC 查询。浏览器将挂起，JVM 将产生“java.lang.OutOfMemoryError: Java heap\
    \ space”错误。使用 `jcmd <myPid> GC.heap_dump myDump.bin` 创建堆转储。使用 MAT 检测泄漏。  \n4.\
    \  在详细的 GC 日志中查找失败消息。通常，我使用 PMAT 或 GCViewer 来“查看”我的日志。但是，当我处理一个真正棘手且无法解释的 GC 问题时，我会拿出文本编辑器，浏览日志以查找类似“ParNew\
    \ (promotion failed)”的错误。请务必在互联网上搜索类似的错误。\n\n## 别忘了\n\n微服务的世界即将到来，届时将有更多的 JVM\
    \ 在单个操作系统实例上运行。在一台机器上，可能不再是 4-8 个 JVM，而是 10 到 30 个。所有这些都需要更严格的内存管理、发现堆过度分配，并监控更多进程的性能健康状况。\n\
    \n出于这些原因，学习本章中的一些堆故障排查技术将是明智之举。在本章前面，我提到用于排查堆问题的诊断数据分为几个层次，这些层次越来越详细。了解这些层次有助于你理解可能遗漏的故障排查数据。例如，来自\
    \ `gcstat` 的即插即用 GC 数据非常适合即时查看，但 PMAT 和 GCViewer 更适合捕捉趋势，而这些趋势表明你遇到的是快速还是缓慢的内存泄漏。\n\
    \n这就是 P.A.t.h. 检查清单的结尾。接下来是获得实际练习，学习如何将黑暗环境转变为具有良好可见性的环境，并教会你的同事如何使用这些即插即用技术来实现这一目标。\n\
    \n脚注 [1\n\n此链接（ [`https://docs.oracle.com/cd/E19900-01/819-4742/abeik/index.html`](https://docs.oracle.com/cd/E19900-01/819-4742/abeik/index.html)\
    \ ）说明：`NewSize` 和 `MaxNewSize` 参数控制新生代的最小和最大大小。\n"
- fmt: '# 13. Conclusion


    Other disciplines take more of a walk-before-you-run approach to engineering and
    the validation of production readiness. For example, airplane aerodynamics are
    vetted in a wind tunnel before the first test flight. Before the full-sized bridge
    is built, a scale model is fabricated to assess load-bearing capacity.


    Yet even today, we continue to write software that is unprepared to handle a production
    load, as if onesie-twosie functional testing nearly approximated a production
    workload. It doesn’t. Our deliverables include the part about handling a production
    load.


    To address this gap, you need to first understand a common misperception, one
    that I encourage you to discuss with your friends and coworkers. Don’t be shy
    about it.


    Here is the misperception: Getting performance right is nearly impossible, because
    you must have a massive computing environment and expensive monitoring to solve
    problems that only performance experts can fix. We also think of many environment
    as having little monitoring—the Dark Environments. That Dark Environments exist
    is another misperception, because as this book has shown, there are lots of plug-it-in-now
    tools available in every JDK in every Dark Environment.


    But really, like the code samples in this book, the majority of performance defects
    can be reproduced and detected in just about any environment using open source
    or freely available monitoring tools. It just takes a little guidance from a methodical
    approach (like the P.A.t.h. Checklist) to help you locate the most common and
    pernicious defects.


    Ultimately, before going into production, system performance must be vetted in
    a full-sized environment under the full production workload. But attempting to
    tune everything at once in a large environment normally results in a half-baked
    performance rush-job. It is an expensive and horrifically slow endeavor, because
    of the lack of access and high maintenance required, like code redeployments that
    take half a day or longer.


    Contrast that to the easy access of a small environment where you can get perhaps
    ten fix-test tuning cycles in a single day. Finally, the early feedback you can
    get in a small environment helps avoid costly retreats from approaches with unacceptable
    performance.


    ## Steps for Getting Started


    Getting started now to tune your system is pretty straightforward. Follow these
    steps:


    1. Create a Modest Tuning Environment (Chapter [2](#A449023_1_En_2_Chapter.html))
    using existing hardware. A massive amount of fast, expensive performance hardware
    is not required.

    2. Let’s fix the problem of undersized databases in development. Whether you rent
    it or buy it, make a modest investment in extra hard disks for the various Modest
    Tuning Environments in development. The cost of ten single terabyte drives is
    small. The lack of a production-sized dataset is an obstacle to locating performance
    defects. It often takes a lot of data from a large disk to exacerbate GC and other
    problems. You’ll also need to give the team 40–80 hours to work on a repeatable
    solution to generate a production-sized database. This is a modest ask for a huge
    benefit.

    3. Ensure good performance visibility in every single environment. The plug-it-in-now
    tools demonstrated in this book go a long way here. Sure, SQL performance metrics
    are still required, but you can easily use the open source Glowroot or similar
    for that.

    4. Apply load to your code on a regular basis to identify obvious issues. Remember,
    the “under load” thing is part of our deliverable. Most of the examples in this
    book were able to demonstrate performance issues with just three threads of load
    and zero think time. I call this “3t0tt.” Chapters [4](#A449023_1_En_4_Chapter.html),
    [5](#A449023_1_En_5_Chapter.html), [6](#A449023_1_En_6_Chapter.html) and [7](#A449023_1_En_7_Chapter.html)
    focus on load generation.

    5. Use the P.A.t.h. Checklist as a reminder of where to look to find the most
    common defects. See Chapters [9](#A449023_1_En_9_Chapter.html), [10](#A449023_1_En_10_Chapter.html),
    [11](#A449023_1_En_11_Chapter.html) and [12](#A449023_1_En_12_Chapter.html). Chapter
    [1](#A449023_1_En_1_Chapter.html) on the Main Performance Anti-Patterns will also
    help. Whether you are fighting performance fires in production or you have other
    development priorities, there is only so much time to troubleshoot performance.
    To minimize troubleshooting time, you can easily make one pass at P.A.t.h. Checklist
    in 30 minutes or less.


    ## Using this Book with Large Monitoring Tools


    For all of my talk about small, free monitoring tools, I have nothing against
    sophisticated monitoring tools— not even commercial ones. Java profilers, APM
    tools, network trace tools, and so on. They’re a mainstay in my day job as a performance
    engineer; I occasionally use one tool that has a $75k license. New, open source
    APM tools like Glowroot are maturing and there are a few good commercial ones,
    too. I’m OK with large tools that work.


    But these tools are absent from perhaps half or more of all environments, and
    this happens because of high license cost, fear of high overhead, and other reasons.


    I hope the plug-it-in-now, small-tool tuning techniques presented in this book
    can shed enough light on these issues in Dark Environments to keep the performance
    technical debt at bay.


    But the load generation techniques, the Main Performance Anti-Patterns, the P.A.t.h.
    Checklist and other tuning approaches in this book can provide value with any
    monitoring toolset in any environment, Dark or not.


    For example, if stack traces in a Java Profiler or APM tool indicate during a
    load test that some slowdown is caused by a rarely executed business process,
    you’ll know to remove that process from the load test, because it’s not a challenge
    that will be encountered (at any significant load) in production. That’s Main
    Anti-Pattern 3, Overprocessing.


    Here is a second example. Quality APM tools are capable of serving up the vast
    sea of metrics that I outlined in Chapter [3](#A449023_1_En_3_Chapter.html) where
    I talked about the three reasons for metrics (checking whether we’ve met our performance
    requirements, assessing whether our resources are all used up, and identifying
    the component responsible for a slowdown). This vast sea of metrics can be overwhelming,
    knowing which ones to focus on. Well that’s easy. As a starting point, make sure
    you have some focus on each of the items in the P.A.t.h. Checklist. To get a little
    more specific, the P.A.t.h. Checklist should guide decisions on which metrics
    to place on APM “dashboards.” A dashboard is a user-arranged screenful of performance
    graphs/metrics.


    The plug-it-in-now tool mentality is certainly lacking one big thing: a repository.
    When you are there troubleshooting a system, plug-it-in-now is a great approach.
    But systems go bump in the night, and it’s great to have an APM tool with a repository
    that captures great data while you’re not there. This lack of a repository is
    perhaps the Achilles heel of the plug-it-in-now toolset. That said, the plug-it-in-now
    is always there as a last resort for Dark Environments.


    Finally, remember that Chapters [4](#A449023_1_En_4_Chapter.html), [5](#A449023_1_En_5_Chapter.html),
    [6](#A449023_1_En_6_Chapter.html), and [7](#A449023_1_En_7_Chapter.html) are on
    load generation, which is required regardless of the server-side monitoring tools
    that you use. So, when you care enough about scalability to actually test to see
    if your product has it, the Scalability Yardstick is the test for you.'
