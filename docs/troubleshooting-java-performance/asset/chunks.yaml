    # 10.  Alien 系统——P.A.t.h. 中的“A”


    我通常通过为单个 JVM 执行 P.A.t.h. 检查清单来开始性能故障排查。如果没有明显问题，那么我会转向一个“Alien”系统——即与第一个 JVM 相连的系统。借助更复杂的工具集，例如应用性能监控解决方案，来自多个系统的数据会收集到单个位置和应用程序中，从而使整个过程变得容易得多，尽管许可费用可能相当昂贵。


    本章的目标是：


    *   学习如何使用线程转储来检测缓慢的网络传输，以及是哪些 Java 代码调用了这些传输。

    *   理解压缩如何显著加快“慢速”网络连接上的传输速度，但必须谨慎实施，以避免产生一些非常特定的安全漏洞。

    *   学习如何使用 Wireshark 检查传输的有效载荷，以查看其是否为“明文”，这是压缩将有所帮助的一个指标。


    除了 glowroot.org 之外，本书中的基本工具（`jstack`、`jstat`、`jcmd` 等）能够提供单个 JVM 中缓慢或低效活动的可见性。使用这些工具最简单的方法是登录到运行你想要观察的
    JVM 的机器。RMI 服务器 `jstatd`（[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstatd.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstatd.html)）可用于为其中许多工具启用远程访问。


    这个简短章节的重点是提醒你评估系统中所有组件的性能，无论它们是串行连接、一个调用下一个，还是作为集群中相同的并行节点排列在负载均衡器后面。


    ## 降低长距离响应时间


    在评估一个我不熟悉的系统时，我做的第一件事就是检查数据中心之间、租用线路上或互联网上的连接是否启用了压缩。我进行了一些有压缩和无压缩的测试，以使这个建议更具说服力。


    ### 压缩让事情变得更快


    测试 10a 和 10b 均使用图 10-1 所示的配置运行。请注意，位于阿肯色州小石城的 JMeter 负载生成器与部署在俄勒冈州波特兰的 jpt 示例应用程序之间相距约
    1700 英里。两个测试都包含六个不同的 HTTP 请求，响应大小分别为：20K、60K、100K、200K、600K 和 1MB。默认情况下，jpt 服务器会返回压缩后的响应，但前提是
    HTTP 请求指定了“`Accept-Encoding: gzip`”HTTP 标头参数。我将 10a 测试配置为包含此标头，但 10b 测试没有。我的目标是观察
    10a 测试中使用压缩带来的速度优势。


    ![A449023_1_En_10_Fig1_HTML.gif](img/A449023_1_En_10_Fig1_HTML.gif)


    图 10-1.


    JMeter 和 littleMock 应用程序相距约 1700 英里。这些测试比较了从 littleMock 服务器（该服务器在 Spring Boot
    下运行 Tomcat）返回的压缩和未压缩有效载荷的结果。


    为了准确了解不使用压缩会错失多少好处，我在位于美国西北角（俄勒冈州）的一台 Amazon Lightsail Linux 机器上安装了 Java 性能故障排查（JPT）示例。我运行了
    JPT 的 init.sh 进行安装，然后重新配置了应用程序（在 application.properties 中），使其通过端口 443（而非默认的 8675）接收来自外部的流量。接着，我使用
    Lightsail 将该端口暴露到互联网上，并像这样启动了测试 01a：


    ```

    db/startDb.sh

    ```


    在一个窗口中，并在另一个终端窗口中执行：


    ```

    ./startWar.sh 01a

    ```


    然后，从大约 1700 英里外的阿肯色州小石城，我将 src/test/jmeter/10a.jmx 和 10b.jmx 都指向了 AWS Lightsail
    机器的 IP 地址。我通过更改 HOST JMeter 脚本变量的值来实现这一点。接着，我使用 10a.jmx 运行了 JMeter 几分钟。我停止了测试，然后使用
    10b.jmx 运行了大约相同的时间。这两个测试的响应时间结果绘制在图 10-2 中，其中 10a 为红色，10b 为蓝色。10a/红色测试启用了压缩。


    ![A449023_1_En_10_Fig2_HTML.gif](img/A449023_1_En_10_Fig2_HTML.gif)


    图 10-2.


    红色柱状图（测试 10a）明显低于蓝色柱状图（测试 10b），显示了压缩后网络请求的速度提升有多大。有效载荷越大（最右侧的柱状图），收益就越大。水平轴标签上的大小（如
    ∼20KB_002_ACCTS）是蓝色/未压缩的大小。


    当 HTTPS 响应约为 200K 时，压缩该响应可使请求速度提升 1500 毫秒（红色的 2273 毫秒比蓝色的 3721 毫秒快了近 1500 毫秒）。这是一个显著的改进。我使用了以下
    URL 参数（值为 2、6、10、20、60、100）来增加有压缩和无压缩测试中 HTTP 响应的大小。


    `https://my_aws_server.com/randomInquiry?numAccounts=100`


    每个账户大约产生 10K 的响应数据（未压缩），这是一个幸运的巧合，使得记住大小更容易。例如，两个账户：2x10k=20k 数据，100 个账户：100x10k=1mb
    响应数据。


    以下是在 application.properties 中启用压缩所需的 Spring 更改：


    ```

    server.compression.mime-types=application/xml

    server.compression.enabled=true

    ```


    此外，你的 HTTP 请求必须包含标头 `Accept-Encoding: gzip`，并且只有 JMeter 脚本 10a.jmx 包含了此 HTTP 标头。


    ### 关于 HTTPS 与压缩的安全警告


    但在你（像我一样）对这些结果感到兴奋之前，你必须了解同时使用 HTTPS 和压缩（我的确切配置）的安全问题。


    如果没有正确的实现，将 HTTPS 和压缩结合使用可能会使黑客能够查看用户在你的网页上输入的私人数据（如信用卡号）。


    我不是安全专家，因此你需要自行了解相关风险，这两种漏洞类型被称为 Crime 和 Breach。以下是一些链接，可供你开始研究。实际上打出这些字让我感到痛苦，但安全可能比性能更重要一些。不过别担心，安全专家已经推荐了规避这些攻击的方法，这样我们就可以继续使用压缩了！请继续阅读。


    *   [`http://breachattack.com/#mitigations`](http://breachattack.com/#mitigations)

    *   [`http://www.infoworld.com/article/2611658/data-security/how-to-defend-your-web-apps-against-the-new-breach-attack.html`](http://www.infoworld.com/article/2611658/data-security/how-to-defend-your-web-apps-against-the-new-breach-attack.html)

    *   [`https://blog.qualys.com/ssllabs/2013/08/07/defending-against-the-breach-attack`](https://blog.qualys.com/ssllabs/2013/08/07/defending-against-the-breach-attack)

    '
- fmt: '### Message Size


    I grin every time I zip a text file. It just blows my mind that you can regularly
    get 80% reduction of the original file. Well, the same thing is true for compression
    of an HTTP stream. But the performance improvement is not a direct result of the
    sophisticated zipping algorithms—it is simply a matter of message size. Smaller
    messages are faster, especially as distances increase.


    I say this so you will not limit yourself to using a single tool (compression)
    for optimization. There are all kinds of strategies for decreasing message size.


    I worked with one group where a simple change in the XML format brought a 250K
    transmission down to 10K. You could also make sure you only send data that gets
    used, and consider adding a caching solution as well.


    Figure [10-3](#A449023_1_En_10_Chapter.html#Fig3) shows exactly how much size
    reduction (in bytes) was required for each improvement in Figure [10-2](#A449023_1_En_10_Chapter.html#Fig2).


    ![A449023_1_En_10_Fig3_HTML.gif](A449023_1_En_10_Fig3_HTML.gif)


    Figure 10-3.


    This graph shows the sizes of each payload before and after GZIP compression.
    The count of bytes for the same HTTP response message, both compressed (red) and
    uncompressed (blue).


    ### Using Thread Dumps to Detect Network Requests


    To find out whether a network request is slowing down your system, I put together
    examples 01a and 01b in the JPT examples. Both of these examples share the same
    architecture, as shown in Figure [10-4](#A449023_1_En_10_Chapter.html#Fig4).


    ![A449023_1_En_10_Fig4_HTML.gif](A449023_1_En_10_Fig4_HTML.gif)


    Figure 10-4.


    Flow java JPT example 01a and 01b. Both `/randomInquiry` and `/perfSandboxBackend`
    are both HTTP requests and both JMeter and the server (Spring Boot) are deployed
    on localhost of the same machine.


    Note that Wiremock runs in the same JVM as the `Controller.java`, which is slightly
    artificial.


    Tests 01a and test 01b are configured to “sleep” in Wiremock for two different
    times. Which test is slower, 01a or 01b?


    Once you have these examples up and going, take a thread dump of the war process,
    as follows.


    Start by finding the process ID of the war file:


    ```

    # jcmd

    15893 warProject/target/performanceGolf.war

    ```


    I trimmed out a bit of the output for brevity—be sure to look for the war file.


    Then pass that PID (15893 from above) to stack like this, redirecting the output
    to a text file:


    ```

    # jstack 15893 > myThreadDump.txt

    ```


    In both test plans `01a.jmx` and `01b.jmx`, you will find that JMeter is configured
    to apply 3t0tt load, which is three threads of load with zero think time. Likewise,
    when you look at the thread dump, you will find three threads that are nearly
    identical to the stack trace shown in Figure [10-5](#A449023_1_En_10_Chapter.html#Fig5).


    ![A449023_1_En_10_Fig5_HTML.gif](A449023_1_En_10_Fig5_HTML.gif)


    Figure 10-5.


    stack trace from one of three threads in a thread dump for test 01a. Test 01b
    will look identical.


    The method you see at the top is one that you will see for all kinds of network
    request, not just HTTP:


    ```

    at java.net.SocketInputStream.socketRead0(Native Method)

    ```


    If you capture thread dumps from the slow database index example in the previous
    chapter, you will find this exact same `socketRead0()` method, but used by the
    H2 database driver to wait for a response from the H2 database, which is responding
    slowly because of the missing index.


    The takeaway here is to always look for this `socketRead0()` method as an indicator
    that your code is waiting for a network response, regardless of the protocol that
    is being used.


    ### Quantifying Response Time


    The thread dump approach just shown frequently helps me figure out whether response
    time from an Alien system is one of the largest performance issues—the beloved
    “lowest hanging fruit.” This is a very useful technique, but unfortunately, it
    would be much more helpful to quantify exactly how much time is being spent in
    the back-end system.


    To find out the exact response time, I have configured Glowroot to run with both
    the JPT and the littleMock examples. Just point a browser to `http://localhost:4000`
    (Figure [10-6](#A449023_1_En_10_Chapter.html#Fig6)).


    ![A449023_1_En_10_Fig6_HTML.jpg](A449023_1_En_10_Fig6_HTML.jpg)


    Figure 10-6.


    Glowroot data showing response time of the `/randomInquiry` URL for test 01a.


    So `jstack` provides us with a plug-it-in-now indication that we are waiting for
    a network request. But unfortunately, thread dumps for 01a and 01b will look nearly
    identical. Glowroot installation requires that you add a `javaagent` parameter
    pointing to the Glowroot jar file, and it requires a restart—this is not plug-it-in-now,
    in my book, but it is nice to quantify the response time for these tests. If you
    look at the same Glowroot metrics for test 01b, you’ll find that response time
    is 500ms.'
