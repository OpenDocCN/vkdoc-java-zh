- fmt: "### Leveraging the Four Anti-Patterns\n\nThe performance anti-patterns discussed\
    \ in Chapter [1](#A449023_1_En_1_Chapter.html), admittedly, are a bit over-generalized.\
    \ But that all changes, now that we have the `Entry`, `Trigger`, and `Current`\
    \ vocabulary in hand; we can get a little more specific.\n\nThe answer to the\
    \ question about where in the timeline of a request was a particular stack trace\
    \ captured, makes all the difference in painting a story around how this defect\
    \ came to be. Let’s do a quick review:\n\n1.  Unnecessary Initialization  \n2.\
    \  Strategy/Algorithm Inefficiency  \n3.  Overprocessing  \n4.  Large Processing\
    \ Challenge  \n\nIf the trigger mark comes before the “main” processing, check\
    \ to see whether this is an Unnecessary Initialization problem—number 1. An unsettling\
    \ number of performance defects happen here. If there is a lot of data to initialize\
    \ (like 500MB of product descriptions loading from a database), then consider\
    \ processing the data once at start-up (or when the first request comes thru)\
    \ and then cache the result for quick access later.\n\nIf the process doesn’t\
    \ have 500MB of product description loading or other similar large data tasks,\
    \ then you should ask yourself why it’s taking so long (remember, the MTDP is\
    \ the exclusive club for the slow) to process just a small amount of data. If\
    \ the amount of data is small, then perhaps the path the trigger code takes to\
    \ get to the current mark needs to be rethought. Most APIs have multiple usage\
    \ idioms, and perhaps the one your code took is not optimal. When the trigger\
    \ code makes its first call that leads to the current mark, it is broadcasting\
    \ to you which idiom (or at least part of the idiom) was selected by the trigger.\n\
    \nIf the stack trace is part of the main process, then check to see whether you’re\
    \ looking at number 2—Strategy/Algorithm inefficiency. A slow individual database\
    \ query falls into this category, as well as a chatty database strategy caused\
    \ by a `SELECT N+1` issue, or perhaps just too many database calls in general.\
    \ That said, these culprits can be more easily recognized using the toolset and\
    \ approach in the `P` for `Persistent` part of the `P.A.t.h.` checklist.\n\nThe\
    \ third anti-pattern is pretty easy to check for. Judging by the class and method\
    \ names and even the entry mark, determine whether this is a business process\
    \ that belongs in the load test. For example, perhaps sample data in the `JMeter`\
    \ load test use that one special test customer from QA with a hundred times as\
    \ many accounts as a regular customer (it was QA’s fault!). If so, fix the load\
    \ script to call less off this business process.\n\nFor anti-pattern 4, the Large\
    \ Processing Challenge, just as with anti-pattern 3, check the calls leading up\
    \ to the trigger to assess which business process is executing. Large Processing\
    \ Challenges are so large that you should know about them and start planning for\
    \ them (installing extra disk space, scripting a large data load and backup, and\
    \ so on) during development.\n\n### Interactive Thread Dump Reading Exercise\n\
    \nThis is where the examples get detailed and you will really want to run this\
    \ on your own desktop.\n\nOne of the first hurdles to get over when you start\
    \ tuning is to decide on one particular stack trace to target for improvement.\
    \ This example provides a walkthrough of one such example.\n\nUse the following\
    \ performance key as the starting point for this example.\n\n`X0,J25,K25,Q1,R1,S1`\n\
    \nOnce the `load.sh/cmd` was up and running, I ran `jcmd` to find the PID of `littleMock`\
    \ and captured four thread dumps using `jstack`. I used the criteria discussed\
    \ earlier to find which threads were under load. As we saw before, there were\
    \ three threads under load in each thread dump, times four dumps, or 12 stack\
    \ traces total.\n\nListing [11-9](#A449023_1_En_11_Chapter.html#Par114) shows\
    \ key parts from the 12 threads under load. The first two threads showed up in\
    \ five threads each, and the last two threads show up one time each. `5+5+1+1\
    \ = 12`. I encourage you to try this example yourself on your own machine to see\
    \ whether you get stack traces in similar proportions; I think you will.\n\n```\n\
    at com.sun.org.apache.xpath.internal.jaxp.XpathImpl.getResultAsType(XPathImpl.java:317)\n\
    at com.sun.org.apache.xpath.internal.jaxp.XpathImpl.evaluate(XPathImpl.java:274)\n\
    at com.github.eostermueller.littlemock.XPathWrapper.matches(XPathWrapper.java:25)\n\
    at com.github.eostermueller.littlemock.PlaybackRepository.getConfigByXPath(PlaybackRepository.java:144)\n\
    at com.github.eostermueller.littlemock.PlaybackRepository.locateConfig_noCaching(PlaybackRepository.java:96)\n\
    at com.sun.org.apache.xerces.internal.parsers.XMLParser.parse(XMLParser.java:141)\n\
    at com.sun.org.apache.xerces.internal.parsers.DOMParser.parse(DOMParser.java:243)\n\
    at com.sun.org.apache.xerces.internal.jaxp.DocumentBuilderImpl.parse(DocumentBuilderImpl.java:339)\n\
    at com.github.eostermueller.littlemock.PlaybackRepository.getConfigByXPath(PlaybackRepository.java:143)\n\
    at com.github.eostermueller.littlemock.PlaybackRepository.locateConfig_noCaching(PlaybackRepository.java:96)\n\
    at javax.xml.xpath.XPathFactoryFinder.newFactory(XPathFactoryFinder.java:138)\n\
    at javax.xml.xpath.XPathFactory.newInstance(XPathFactory.java:190)\nat javax.xml.xpath.XPathFactory.newInstance(XPathFactory.java:96)\n\
    at com.github.eostermueller.littlemock.XPathWrapper.matches(XPathWrapper.java:22)\n\
    at com.github.eostermueller.littlemock.PlaybackRepository.getConfigByXPath(PlaybackRepository.java:144)\n\
    at java.security.AccessController.doPrivileged(Native Method)\nat javax.xml.parsers.FactoryFinder.findServiceProvider(FactoryFinder.java:289)\n\
    at javax.xml.parsers.FactoryFinder.find(FactoryFinder.java:267)\nat javax.xml.parsers.DocumentBuilderFactory.newInstance(DocumentBuilderFactory.java:120)\n\
    at com.github.eostermueller.littlemock.PlaybackRepository.getDocBuilder(PlaybackRepository.java:167)\n\
    Listing 11-9.\nThe four unique stack traces under load in the four thread dumps\n\
    ```\n\nThe application under load that we’ve been using since the beginning of\
    \ this chapter is `littleMock`. It is a tiny little HTTP stub server that I modeled\
    \ after `wiremock.org`. A stub server is basically a test double, used in a test\
    \ environment as a stand-in for some other system that was too expensive or too\
    \ troublesome to install. If the XML-over-HTTP input (from `load.sh/JMeter`) matches\
    \ one of five XPath expressions configured in `littleMock`'s `application.properties`,\
    \ it returns a preconfigured response XML that mimics a response from the stubbed-out\
    \ system.\n\nAs such, XPath evaluation and XML parsing (of the HTTP input requests)\
    \ are the main processing of this application, and this is our first task—to assess\
    \ whether these four stack traces occurred before, during, or after the main processing."
