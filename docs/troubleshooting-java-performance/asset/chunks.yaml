  trans: '

    #### 验证 HTTP 响应


    验证 HTTP 响应是否包含“正确”的响应数据至关重要。累积起来，我浪费了数周又数周的时间去分析和信任那些响应中充满错误（而我却毫不知情）的测试。因此，我恳请你花些时间来增强你的脚本，以便在缺少正确的
    HTTP 响应时记录一个错误。此外，你还应该检查是否出现了错误的响应（例如异常、错误消息等）。


    关于 JMeter 的第 7 章展示了一个实现此功能的功能，称为断言。有各种各样的 JMeter 报告和图表可以显示错误计数。当你的 JMeter 断言标记出一个问题时，这些
    JMeter 报告会反映出这些错误。如果没有这种基本的可见性，你也可能像我一样浪费数周的时间。


    ### 负载脚本阶段 2


    负载脚本在单个测试中记录多个不同用户的登录，而不是反复使用同一个用户。硬编码的主机名或 IP 地址以及 TCP 端口号被替换为变量，当你在不同环境中使用脚本时，可以更改变量的值。该脚本以生产环境中大致相同的比例执行业务流程。


    #### 详细信息


    此脚本处理工作负载比例。为了获得更接近生产环境的工作负载，你需要增强负载脚本，以更真实的比例执行各种业务流程。从非常高的层面来看，对于许多目的而言，业务流程的划分是
    70% 的查询，30% 的更新/插入/删除。我们的比例常常不切实际，因为我们没有花时间从生产环境中收集高质量数据来了解每种类型的业务流程执行的频率。


    但是，在全身心投入寻找生产环境中哪些服务使用最多/最少（并调整你的负载脚本以按这些比例施加负载）之前，我建议首先关注一个更不完美的方法，即你向所有服务施加三个或更多线程的负载（零思考时间）。这就是引言中提到的
    3t0tt。当然，我们这样做是为了从那个旧宿舍的沙发里抖出多线程的 bug。追求更精确和完善的负载比例能为你带来两方面的好处。其一，你避免了在永远不会使用的工作负载上浪费时间进行故障排除；其二，你发现了与首选的生产工作负载相关的兼容性/争用问题。当然，这两点都很重要，但根据我的经验，它们出现的频率明显低于多线程
    bug，而即使使用不精确的负载比例，也能从那张可爱的沙发里赶走这些 bug。目标是正确的工作负载比例和负载脚本思考时间，但要从至少三个线程的零思考时间负载开始。


    使用 JMeter，你可以通过为不同的脚本分配不同数量的线程来实现工作负载比例/百分比。例如，如果你想模拟前面详述的 70%/30% 的分割，你可以先录制两个独立的脚本，一个用于账户查询，另一个用于账户更新。对于这样一个简单的脚本，所有
    HTTP 请求都存储在一个 JMeter 线程组下——你可以在其中指定要施加的负载线程数和测试持续时间。


    因此，要实现 70/30 的工作负载比例，你可以从一个包含两个空白线程组的空白脚本开始，这两个线程组在 JMeter 树形配置中是同级关系。在第一个线程组中，你可以分配七个线程，另一个线程组分配三个线程。然后，你将账户查询的所有
    HTTP 请求复制/粘贴到有七个线程的线程组中，并将账户更新的 HTTP 请求复制/粘贴到另一个线程组中。


    这篇博文详细介绍了三种替代的 JMeter 方法来正确设置工作负载比例：


    [`https://www.blazemeter.com/blog/running-jmeter-samplers-defined-percentage-probability`](https://www.blazemeter.com/blog/running-jmeter-samplers-defined-percentage-probability)


    ### 负载脚本阶段 3


    负载脚本不再查询或修改录制脚本时使用的确切客户或账户，而是增强为从数据文件中读取账户/客户/其他标识符，然后将这些标识符输入到被测系统。


    #### 详细信息


    在这个阶段，负载脚本从读取 .csv 文件中的用户 ID 扩展到读取 .csv 文件中的其他重要数据，例如客户和账户数据。但仔细想想，何必这么麻烦呢？我们很可能是在操之过急。在我们花时间增强负载脚本以使用
    .csv 或数据驱动的样本施加流量之前，这些客户、账户和其他表中必须实际存在足够规模的数据。


    是的，本章是关于负载脚本的，但我忍不住要提醒大家，如果行数足够少，我的狗都有能力设计出性能出色的数据库。你几乎能想到的任何查询，在记录数少于大约一万条时都会表现得非常好。因此，当行数很少时，“性能自满”情绪会很高。


    为了克服这种自满情绪，使用负载生成器脚本来驱动被测系统增长大表的行数似乎是个好主意。但不幸的是，在调优过程的这个阶段，被测系统通常非常慢，以至于即使让它运行很多小时，在它添加足够的数据之前，你可能都开始领退休金了。


    如果是这种情况，可以考虑使用 JMeter 作为快速的 RDBMS 数据填充器。创建一个单独的脚本，使用 JMeter JDBC 采样器（图 4-1）：


    ![A449023_1_En_4_Fig1_HTML.jpg](img/A449023_1_En_4_Fig1_HTML.jpg)


    图 4-1.


    JMeter 可以使用你的 JDBC 驱动程序执行 SQL。在我的 2012 年款 MacBook 上，这个文件用于在远不到 10 分钟的时间内填充了超过
    200 万行数据。这个文件 `loadDb-01.jmx` 可以在 jpt 示例的 `src/test/jmeter` 文件夹中找到。


    [`http://jmeter.apache.org/usermanual/component_reference.html#JDBC_Request`](http://jmeter.apache.org/usermanual/component_reference.html#JDBC_Request)


    它应该启动多个线程，执行大量的 INSERT 语句（仔细排序以符合外键依赖关系），其 VALUES 取自随机变量：


    [`http://jmeter.apache.org/usermanual/component_reference.html#Random_Variable`](http://jmeter.apache.org/usermanual/component_reference.html#Random_Variable)


    或者取自 .csv 文本文件：


    [`http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config`](http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config)


    关于如何快速获得生产规模表计数的这个小插曲就到此为止。让我们回到最初的讨论，即初始录制的负载脚本查询或修改来自一个或几个特定客户或账户的数据。你在脚本录制中使用的任何数据都硬编码在负载脚本文件中。查询客户
    101。更新账户 393900 的余额。“101”和“393900”存储在脚本文件中。


    现在你的表计数已经足够庞大了，你可以增强你的负载脚本，例如，基于 .csv 文件中找到的账号进行账户查询。因此，负载脚本文件中不再有 101 和 393900，这些值改为存储在
    .csv 文件中。


    一个很好的起点是使用一个包含数万个不同账号的文本文件，文本文件中每行一个账号。这是负载生成器最常见的输入文件格式。但不要只停留在 .csv 文件中只有一列；这里有一些唾手可得的好处。如果你在
    .csv 文件中添加第二列，包含相应的账户余额，你就可以轻松地增强负载生成器脚本，以验证被测系统是否为每次查询返回了正确的余额。

