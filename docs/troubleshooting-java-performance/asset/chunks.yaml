    \ the `jmap -histo` output for your package space. Keep in mind that Java primitives\
    \ (arrays, int, long) and other types show up with the odd `[I` syntax shown in\
    \ Listing [12-9](#A449023_1_En_12_Chapter.html#Par154). Generally knowing these\
    \ primitive counts is only a little helpful, because there are no indicators in\
    \ this data of what allocated the primitives. When class and package names show\
    \ up, whether in your own package or a dependency’s package, that provides some\
    \ context to answer questions like, “Where might there be a singleton that would\
    \ be amassing objects?” and “What user data would be collecting over time?” If\
    \ you saw class names/packages dealing with session data, it would be worth your\
    \ time checking whether HTTP session expiration was working as expected.\n\n```\n\
    $ jmap -histo 29620\nnum  #instances  #bytes class name\n\n1:   1414   6013016\
    \ [I\n2:    793   482888 [B\n3:   2502   334928 \n4:    280   274976 \n5:    324\
    \   227152 [D\n6:   2502   200896 \n7:   2094   187496 [C\nListing 12-9.\nVery\
    \ Top Lines of jmap Output\n```\n\nThe main limitation with `jmap -histo` is that\
    \ it provides only point-in-time data. Capturing and reviewing `jmap -histo` multiple\
    \ times can be helpful, but it is easy to drown in the data when you are looking\
    \ for increases in object counts over multiple `jmap -histo` output files.\n\n\
    To get a better understanding of how class counts and memory consumption trends\
    \ over time, I wrote `heapSpank`, available at heapSpank.org. This is a command-line\
    \ tool that shows the percentage of time that byte counts are on the rise for\
    \ the 15 classes most likely to be leaking.\n\nI ran a littleMock test with this\
    \ key to produce the memory leak:\n\n```\nX2,J25,K25,L0,Q,R,S,A4096,B65535,C120000,D240000\n\
    ```\n\nFigure [12-9](#A449023_1_En_12_Chapter.html#Fig9) shows how `heapSpank`\
    \ identified the leak class, but not the parent container; this is a nice head\
    \ start.\n\n![A449023_1_En_12_Fig9_HTML.jpg](A449023_1_En_12_Fig9_HTML.jpg)\n\n\
    Figure 12-9.\n\n`heapSpank` from `heapSpank`.org has detected the littleMock memory\
    \ leak. See how the MyMemoryLeak class bubbles to the top of the display?\n\n\
    ## Heap Dump Analysis\n\nEarly in the chapter, I mentioned the layers of metrics\
    \ that are available. `jstat` provides instantaneous metrics to assess health.\
    \ The verbose GC logs and the trending tools like GCViewer help show trends over\
    \ time. These indicate whether you have a slow leak building over time. `jmap`\
    \ provides counts of classes, and then `heapSpank` helps understand overtime whether\
    \ those specific class counts and byte counts continue to rise over time.\n\n\
    All that data is very helpful , but sometimes even all of this is not enough information\
    \ to fix a memory leak. Let me explain. Just because instances of one or a few\
    \ objects grow over time doesn’t point you to the exact spot where they are accumulating\
    \ or even why they are accumulating. Always with chagrin we ask why the Garbage\
    \ Collector hasn’t already recycled a particular set of objects highlighted by\
    \ `jmap`, `heapSpank`, or Eclipse MAT.\n\nAnalyzing a heap dump helps answer these\
    \ questions.\n\n### Capturing a Heap Dump\n\nEspecially with a heap filled to\
    \ capacity with leaky objects, capturing a heap dump can be a high-overhead operation.\
    \ It can halt JVM activity for seconds or even minutes. That said, some problems\
    \ just have to be fixed. So I never capture a heap dump unless the `jstat` and\
    \ verbose GC data indicate there is an upward trend of byte counts and/or instance\
    \ counts. If there have already been out-of-memory errors, forget about the overhead\
    \ and capture the dump.\n\nI simulated a memory leak using this littleMock key—the\
    \ same one used in the previous section.\n\n```\nX2,J25,K25,L0,Q,R,S,A4096,B65535,C120000,D240000\n\
    ```\n\nI let this test run for just a few minutes. Then I captured a heap dump\
    \ using the command shown in Listing [12-10](#A449023_1_En_12_Chapter.html#Par167).\n\
    \n```\njcmd  GC.heap_dump /path/to/myDump8.dat\nListing 12-10.\nOne of Many Ways\
    \ to Capture a Heap Dump\n```\n\nDon’t forget to use these among the JVM start-up\
    \ arguments for your application that will automatically capture a heap dump when\
    \ an out-of-memory error occurs:\n\n```\n-XX:+HeapDumpOnOutOfMemoryError and -XX:HeapDumpPath=/some/path/\
    \ in/production\n```"
  trans: "\n## 内存泄漏\n\n最常见的内存泄漏是某种不断增长的单例，这类泄漏通常需要数小时、数天甚至更长时间才能在单例中积累足够的内存，从而开始引发问题。想象一个包含\
    \ `java.util.Map` 或 `java.util.List` 的单例，随着不断调用 `.put()` 或 `.add()`，内存会持续增长，直到耗尽所有分配的堆内存（即\
    \ `-Xmx` JVM 参数）。快速泄漏不太常见，但更危险，因为它们可能在数秒内毫无征兆地锁死 JVM。这种情况发生在某段毫无防备的代码被迫处理远超预期的数据量时，例如错误地将一个数百万行表中的所有行返回给最终用户。\n\
    \n用于排查内存泄漏的诊断数据分为几个层次，详细程度逐层递增：\n\n1.  本章前面的“堆趋势”部分将帮助你了解堆在抛出内存溢出异常之前填充的速度。这基于详细的\
    \ GC 数据。这很好，但这些数据中未提及类名，因此很难识别是哪个类在泄漏。\n2.  识别在某个时间点上实例计数最大和“引用”内存最多的特定类。`JAVA_HOME/bin/jmap\
    \ -histo` 是获取此类数据的常见来源之一。Glowroot 也提供了此功能。\n3.  理解监控数据的趋势。例如，哪些类的实例计数会随时间持续增长？可以通过手动工作来比较\
    \ `jmap -histo` 的输出（直方图）。一个名为 `heapSpank` 的工具可以为你完成部分处理工作。\n4.  追踪不断增长的对象的所有权，回溯到存储/引用它们的父对象。有时你知道哪些对象在堆中泛滥，但不知道它们是如何到达那里的，也不知道为什么\
    \ GC 还没有丢弃它们。精确定位这些对象在堆中的位置有助于识别它们最初是如何到达那里的。堆转储和像 Eclipse MAT 这样的堆分析工具可以满足这一需求。\n\
    \n请记住，捕获堆转储是一项开销很大的操作。它可能会关闭（基本上是暂停）JVM 中的所有活动数十秒甚至更长时间。\n\n## 排查内存泄漏\n\n可以使用类直方图进行排查。\n\
    \nJDK 提供了一种很好的即插即用方法，可以获取 JVM 中加载的所有类在某个时间点的实例计数。只需调用 `JAVA_HOME/bin/jmap -histo\
    \ <myPid>` 并将标准输出重定向到一个文本文件。以下是文档：\n\n[`https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/tooldescr014.html#BABJIIHH`](https://docs.oracle.com/javase/8/docs/technotes/guides/troubleshoot/tooldescr014.html#BABJIIHH)\n\
    \n如果你加载了 2000 个类，`jmap -histo` 的输出将为每个类显示一行，显示该类的实例计数以及按类划分的内存。这是输出的大部分内容，并且由于完整的堆转储在大小和复杂性上都远超直方图，因此捕获堆转储会导致更大的开销。话虽如此，我甚至见过\
    \ `jmap -histo` 暂停 JVM 数十秒。有时，重要的排查数据值得短暂的暂停。\n\n我建议在 `jmap -histo` 的输出中 grep\
    \ 你的包空间。请记住，Java 基本类型（数组、int、long）和其他类型会以清单 12-9 中所示的奇怪的 `I` 语法出现。通常，了解这些基本类型的计数只有一点帮助，因为这些数据中没有指示符表明是什么分配了这些基本类型。当类和包名出现时，无论是在你自己的包中还是在依赖项的包中，这都为回答诸如“哪里可能存在一个会积累对象的单例？”和“哪些用户数据会随时间收集？”等问题提供了一些上下文。如果你看到处理会话数据的类名/包名，那么检查\
    \ HTTP 会话过期是否按预期工作将是值得的。\n\n```\n$ jmap -histo 29620\nnum  #instances  #bytes\
    \ class name\n\n1:   1414   6013016 [I\n2:    793   482888 [B\n3:   2502   334928\
    \ \n4:    280   274976 \n5:    324   227152 [D\n6:   2502   200896 \n7:   2094\
    \   187496 [C\n清单 12-9.\njmap 输出的最顶部几行\n```\n\n`jmap -histo` 的主要限制在于它只提供某个时间点的数据。多次捕获和审查\
    \ `jmap -histo` 可能会有帮助，但在多个 `jmap -histo` 输出文件中查找对象计数的增长时，很容易被数据淹没。\n\n为了更好地理解类计数和内存消耗随时间变化的趋势，我编写了\
    \ `heapSpank`，可在 heapSpank.org 获取。这是一个命令行工具，可以显示最可能泄漏的 15 个类的字节计数上升的时间百分比。\n\n\
    我使用以下密钥运行了一个 littleMock 测试来产生内存泄漏：\n\n```\nX2,J25,K25,L0,Q,R,S,A4096,B65535,C120000,D240000\n\
    ```\n\n图 [12-9 显示了 `heapSpank` 如何识别出泄漏类，但未识别出父容器；这是一个很好的开端。\n\n![A449023_1_En_12_Fig9_HTML.jpg](img/A449023_1_En_12_Fig9_HTML.jpg)\n\
    \n图 12-9.\n\n来自 `heapSpank`.org 的 `heapSpank` 检测到了 littleMock 内存泄漏。看到 MyMemoryLeak\
    \ 类如何冒泡到显示顶部了吗？\n\n## 堆转储分析\n\n在本章开头，我提到了可用的指标层次。`jstat` 提供瞬时指标来评估健康状况。详细的 GC\
    \ 日志和像 GCViewer 这样的趋势工具有助于显示随时间变化的趋势。这些可以指示你是否存在随时间累积的缓慢泄漏。`jmap` 提供类的计数，然后 `heapSpank`\
    \ 有助于了解这些特定类的计数和字节计数是否随时间持续上升。\n\n所有这些数据都非常有用，但有时即使所有这些信息也不足以修复内存泄漏。让我解释一下。仅仅因为一个或几个对象的实例随时间增长，并不能指出它们具体在哪里累积，甚至不能说明它们为什么累积。我们总是懊恼地问，为什么垃圾收集器还没有回收由\
    \ `jmap`、`heapSpank` 或 Eclipse MAT 突出显示的特定对象集。\n\n分析堆转储有助于回答这些问题。\n\n### 捕获堆转储\n\
    \n尤其是在堆被泄漏对象填满的情况下，捕获堆转储可能是一项高开销操作。它可能会使 JVM 活动暂停数秒甚至数分钟。话虽如此，有些问题必须解决。因此，除非 `jstat`\
    \ 和详细的 GC 数据表明字节计数和/或实例计数呈上升趋势，否则我从不捕获堆转储。如果已经发生了内存溢出错误，则忽略开销，直接捕获转储。\n\n我使用以下\
    \ littleMock 密钥模拟了内存泄漏——与上一节中使用的相同。\n\n```\nX2,J25,K25,L0,Q,R,S,A4096,B65535,C120000,D240000\n\
    ```\n\n我让这个测试运行了几分钟。然后，我使用清单 12-10 中所示的命令捕获了堆转储。\n\n```\njcmd  GC.heap_dump /path/to/myDump8.dat\n\
    清单 12-10.\n捕获堆转储的多种方法之一\n```\n\n不要忘记在你的应用程序的 JVM 启动参数中使用以下参数，这些参数会在发生内存溢出错误时自动捕获堆转储：\n\
    \n```\n-XX:+HeapDumpOnOutOfMemoryError 和 -XX:HeapDumpPath=/some/path/ in/production\n\
    ```\n"
- fmt: '### Using Eclipse MAT to Find Memory Leaks


    Generally if you are going to fix a leak, code changes will have to be made. The
    goal is to find all the leaks that won’t be collected by the garbage collector,
    but mainly to figure out why the objects are not being collected. Invariably,
    the answer lies in the object hierarchy—which classes own and hold instances of
    the classes littering the heap. This is essentially a search for parentage—who
    owns whom.


    This section will use Eclipse MAT to find the source of a leak. The IBM Heap Analyzer
    is an OK alternative. It sometimes has better auto-leak detection, but the Swing
    GUI is slower and the navigation around the object graph is more difficult and
    displays less information than MAT, which is coded in Eclipse RCP/SWT. Let’s get
    back to MAT.


    Download and install MAT from this URL: [`http://www.eclipse.org/mat/`](http://www.eclipse.org/mat/).
    I then chose the File → Open Heap Dump menu option and pointed to `myDump8.dat`
    that I captured in Listing [12-10](#A449023_1_En_12_Chapter.html#Par167).


    Running MAT on your desktop takes a lot of heavy processing, especially with heaps
    larger than 1GB. I suggest getting 32GB RAM on your desktop and allocating perhaps
    half of that to MAT in the `-Xmx` parameter in MAT’s `MemoryAnalyzer.ini`.


    ### Eclipse MAT Automatic Leak Detection


    MAT has three reports that basically do automatic leak detection. Don’t ignore
    these reports. They are:


    - Heap Dump Overview

    - Top Components

    - Leak Suspects


    I will say there is significant overlap between their functionality and purpose.


    When Eclipse opens your heap dump, it asks if you want to create a Leak Suspects
    report. I chose that option, and MAT displayed Figure [12-10](#A449023_1_En_12_Chapter.html#Fig10).
    The Leak Suspects view is not a very interactive pie chart, but the Details hyperlinks
    in the bottom do allow you to explore the object graph of the heap.


    ![A449023_1_En_12_Fig10_HTML.jpg](A449023_1_En_12_Fig10_HTML.jpg)


    **Figure 12-10.** Eclipse MAT Leak Suspects looking at a heapDump from littleMock.
    In perhaps a third to a half of the heap dumps I have seen, this screen points
    reasonably close to the leaky instances and/or the object containing them.


    In fact, this screenshot in Figure [12-10](#A449023_1_En_12_Chapter.html#Fig10)
    has already found the container holding all the leaked objects. See the `OldGeneratioRepo`
    at the bottom? littleMock stores all the `MyMemoryLeak` objects in this object,
    and the exact collection is in Listing [12-11](#A449023_1_En_12_Chapter.html#Par182).
    This queue is the object storing all the leaked objects, taken from source code
    of `OldGenerationRepo.java` in the littleMock github repo.


    ```

    Queue allOldGenData = new LinkedBlockingQueue();

    ```


    **Listing 12-11.** The `OldGenerationData` Queue


    ### Exploring in Eclipse MAT


    Right under the name of your dump file is a nice set of icons that I rely on heavily
    (Figure [12-11](#A449023_1_En_12_Chapter.html#Fig11)).


    ![A449023_1_En_12_Fig11_HTML.jpg](A449023_1_En_12_Fig11_HTML.jpg)


    **Figure 12-11.** The usability of Eclipse MAT is OK. I normally rely on the icons
    here to help me find my way around.


    Table [12-2](#A449023_1_En_12_Chapter.html#Tab2) details the location, name and
    purpose of each icon in Figure [12-11](#A449023_1_En_12_Chapter.html#Fig11).


    **Table 12-2.** Eclipse MAT Icons Displayed in Figure [12-11](#A449023_1_En_12_Chapter.html#Fig11)


    | Location on toolbar | Name of Report | Description |

    | --- | --- | --- |

    | Leftmost icon | Overview | Shows a pie-chart with biggest consuming classes/packages.
    |

    | Icon second from the left | Histogram | Right-click to drill down into incoming
    and outgoing references. |

    | Icon third from the left | Dominator Tree | Very much like histogram but with
    left-click drill down. |

    | Icon fourth from the left | Object Query Language | SQL-like language that lets
    you query the object ownership tree. |

    | Icon fifth from the left | Double Gears / Thread Overview | Basically includes
    a fancy thread dump that also shows allocations in thread and thread local storage.
    Very helpful for finding the stack trace in progress of creating a fast memory
    leak. |

    | Icon sixth from the left | Reports | Leak Suspects and other reports. |

    | Icon seventh from the left | Database Can / Query Browser | Provides the same
    right-click drill down options available in Histogram view. |

    | Icon eighth from the left | Search / Magnifying Glass | Find objects by hex
    object address. |


    The Histogram in Figure [12-12](#A449023_1_En_12_Chapter.html#Fig12) looks very
    similar to `jmap` output, but it is very interactive. For instance, the MAT GUI
    does an excellent job of managing massive lists of objects. It displays a single
    screenful and allows you to Click for More. But Figure [12-12](#A449023_1_En_12_Chapter.html#Fig12)
    uses a different feature to manage the massive quantity of objects—a simple filter.
    See at the top-left, where I entered a regular expression to find all objects
    matching `*stermueller*`?


    ![A449023_1_En_12_Fig12_HTML.jpg](A449023_1_En_12_Fig12_HTML.jpg)


    **Figure 12-12.** Eclipse MAT Histogram that shows counts and byte counts of all
    instances. Note that the `MyMemoryLeak` class shows up right at the top. This
    is very much like `jmap`, but interactive. You can sort it in various ways and
    easily right click and drill down to see all the objects this class points to,
    and all the objects that point to the selected class.


    That is a very handy feature. In this screenshot, MAT has already detected the
    2-3MB of data in my package space that is causing the leak. This is an indispensable
    tool.


    In Figure [12-13](#A449023_1_En_12_Chapter.html#Fig13), I am right-clicking and
    drilling down to see what “container” class might be holding references to me,
    keeping “me” from getting collected. This is called looking for GC roots. In my
    simple example, we already know the answer to this question. But perhaps half
    the time I am looking at very unfamiliar code and need this feature very much.


    ![A449023_1_En_12_Fig13_HTML.jpg](A449023_1_En_12_Fig13_HTML.jpg)


    **Figure 12-13.** I right-clicked a leaky object to find the “roots”—what object
    is keeping this from getting collected


    The result is this very nice tree view in Figure [12-14](#A449023_1_En_12_Chapter.html#Fig14),
    where we finally see the gory detail of the object parentage that we have been
    seeking.


    ![A449023_1_En_12_Fig14_HTML.jpg](A449023_1_En_12_Fig14_HTML.jpg)


    **Figure 12-14.** The ‘Merge Shortest Path to GC Roots’ screen from Eclipse'
