    As this chapter demonstrates, load tests take some time to prepare and run, so
    I’m always hesitant to scrap the results of a test. But sometimes, the results
    are so wrong, the there is no other option. The next chapter is your detailed
    guide on when to acquiesce and scrap the results of a test.


    Footnotes [1](#A449023_1_En_4_Chapter.html#Fn1_source)


    The kind of session management I am talking about uses these interfaces:


    [`http://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpServletRequestWrapper.html#getSession`](http://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpServletRequestWrapper.html%23getSession)
    – [`https://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpSession.html`](https://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpSession.html)


    # 5. Invalid Load Tests


    Performance tuning can get pretty complex; just think about all the various places
    in an environment that could have performance problems:


    - The configuration of your container (WebSphere or Spring Boot or whatever)

    - The network

    - The operating system

    - The hardware

    - The load generator


    Don’t let all of this overwhelm you. To minimize the complexity of it all, we
    developers should first focus on the performance of the part we’re responsible
    for—the code. This is the Code First approach. A healthy percentage of performance
    defects are write-once-run-anywhere issues that will thrive, regardless of the
    environment.


    The objective of this chapter is:


    - Learn about a half dozen things to check to make sure your load test is generating
    a healthy, production-like load.


    This chapter highlights environmental and other performance problems that invalidate
    the results of the load test you’ve worked so hard to create. Getting around some
    of these invalid tests (which are often caused by environment issues) requires
    a bit of creativity; let’s have a look.


    ## Network Issues


    In chapter [2](#A449023_1_En_2_Chapter.html), I gave you this list of things that
    contribute to network performance:


    - Firewalls

    - Bandwidth limitation software (like NetLimiter) that runs as a security measure

    - The HTTP proxy server, if accessing the Internet.

    - The hardware—routers, content switches, CAT5, and so on

    - Load balancers, especially their configuration to manage concurrency


    Any time one or more of these cause a performance problem, your load test is invalid
    and the results need to be thrown away. Rarely do we have the tools, access or
    expertise to troubleshoot network problems, so why do we bother in the first place?
    I recommend designing tests to eliminate network hops, when possible. Integration
    tests and other larger environments are fine places to finally learn about full
    network performance.


    Sometimes I get painted into a corner and I’m forced to use a particular network
    segment that I suspect of having problems. If like me you don’t have the tools
    or expertise (or access) to solve a network performance there is one option: indirect
    measurement. Say you suspect a particular network segment to have issues. If you
    apply load to a static web page, one known to be fast, and the response time end
    up being really poor, then you have an issue.


    ## Container Issues


    One of the reasons I am qualified to write a book on performance is that I have
    wasted so many hours of my life messing up the configuration for JDBC connection
    pools and web container thread pools.


    One upside of these pools, and there really are many upsides, is that they can
    keep the OS or database from seizing up if your Java app goes haywire for some
    reason. The pool does this by capping the count of threads or connections to the
    max value set in the configuration. But if the caps are configured too low, the
    pools will limit performance. Knowing whether the caps are set too low should
    be an ongoing concern for you.


    Keeping your eye on the right monitoring will show whether the caps have sprung
    into action at an inopportune time, robbing your system of precious throughput.
    But believe me I know, that takes a ton of work and steals your attention away
    from the primary focus (Code First). A simple guideline helps avoid all of this:


    - “Raise resource caps before tuning and lower them before production.”


    Yes, I’m a bit jealous that way back in 2006, Steven Haines first suggested this
    idea of raising all the caps in his book Pro Java EE 5 Performance Management
    and Optimization (Apress, 2006):


    [`https://www.amazon.com/Pro-Java-Performance-Management-Optimization/dp/1590596102`](https://www.amazon.com/Pro-Java-Performance-Management-Optimization/dp/1590596102)


    You can also find this suggestion in this online article of his:


    [`https://www.infoq.com/articles/Wait-Based-Tuning-Steven-Haines`](https://www.infoq.com/articles/Wait-Based-Tuning-Steven-Haines)


    But I think I’ve phrased it more succinctly, so you’ll be more likely to remember
    it.


    When I say raise these caps, I mean raise them very high, like a value of 1999
    for both max threads and max connections in the JDBC connection pool.


    An example will help here, I think.


    The graph in Figure [5-1](#A449023_1_En_5_Chapter.html#Fig1) shows the number
    of concurrent users, over time, that will run in a JMeter load test against the
    `littleMock` server configured with an 8-second sleep time. `littleMock` is a
    small Java server-side test application that we will talk more about in Chapter
    [8](#A449023_1_En_8_Chapter.html). Here is the URL: [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)


    ![A449023_1_En_5_Fig1_HTML.jpg](A449023_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. Configuration for an incremental load test that shows the plan for
    applying load in a test. This thread group is a plugin for JMeter, downloadable
    from [`https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/`](https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/).


    The stair-stepped “ramp up” is the hallmark of an incremental load test, a test
    performance engineers have been using for many years. Each “step” adds 40 threads
    of load. At the one minute and 30 seconds into the test, all 160 users will be
    up and running. Got it?


    Figure [5-1](#A449023_1_En_5_Chapter.html#Fig1) shows what is referred to as a
    load plan, and I ran it two times. The first time, I used the configuration shown
    here. Just seconds after the first test finished, I changed the Target Concurrency
    from 160 to 240 and ran it again. So instead of 160/4=40 threads per step, the
    second test had 240/4=60 threads per step.


    All that configuration is on the load generator side, aka the client side. To
    check out the number of threads on the server-side (the count of active threads
    is called the concurrency), in Figure [5-2](#A449023_1_En_5_Chapter.html#Fig2)
    I used Glowroot, an open source APM tool from glowroot.org.


    ![A449023_1_En_5_Fig2_HTML.jpg](A449023_1_En_5_Fig2_HTML.jpg)


    Figure 5-2. Server-side concurrency during two back-to-back incremental load tests.
    In the test on the left, the load generator ran 160 threads and all 160 show up
    here. The test on the right ran 240 threads, but a little before 9:33am, the `tomcat`
    max threads setting in Spring Boot capped concurrency to 200. Note'
