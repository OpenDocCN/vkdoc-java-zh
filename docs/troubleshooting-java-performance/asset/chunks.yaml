    management”即可找到相关资源。

    *   某些服务器端 JDBC 应用仍然会为每个 SQL 请求使用`javax.sql.DriverManager.getConnection()`来重新创建数据库连接的
    TCP 套接字，从而产生开销。相反，应考虑使用`Hikari`、`C3P0`或由您的容器（无论是`JBoss`、`WebSphere`、`Jetty`、`Tomcat`还是其他容器）提供的
    JDBC 连接池。


    现在，我们已经对几个罪魁祸首有了清晰的认识，接下来让我们谈谈另外一些常见特征，这些特征将帮助您在查看性能数据时识别出这种“不必要的初始化”反模式：


    *   **大量小型 I/O 操作**。这些示例并非指大型 I/O 操作（例如 50 毫秒或更长），而是指由少数子系统（应用程序初始化、XML 处理、HTTP
    请求等）频繁执行的大量小型 I/O 操作（可能每次仅几毫秒），每次往返都会产生开销。

    *   **性能不敏感的惯用法**。XML API 的四个问题表明，使用错误的惯用法来消费特定 API 可能导致不必要的初始化。在四个 XML 案例中，互联网上一些最流行的惯用法恰好充满了性能问题。这是一个问题。


    作为一条性能建议，“避免不必要的 I/O”听起来老生常谈，但它恰恰是这类大量性能缺陷的根本原因。哎。让我们更加关注“避免不必要的 I/O”这条建议，并尽量减少对磁盘和网络的请求。


    ## 主要反模式 #2：策略/算法低效


    这种主要反模式涉及选择性能不佳的算法或策略。同时，它也包含选择了正确的算法但使用了错误的算法配置/参数化的情况。使用“大 O”表示法比较算法的复杂性超出了这本小书的范围。


    这里并非要推崇您最喜欢的排序算法，或使用“大 O”表示法来比较最坏情况下的复杂度。为什么？因为大多数企业软件的复杂度要低得多。它更多是关于将数据从 A 点移动到
    B 点。本书关注的是，在尝试处理更复杂的事情（如算法）之前，我们经常陷入的各种性能问题。


    这种反模式涉及算法（处理某些数据的结构化攻击计划），也涉及策略，例如数据访问策略，即应用程序构建 SQL 语句以检索/更新数据的方法。算法的实现通常位于单个位置。而另一方面，策略的调整和/或替换要困难得多，因为其代码分散在整个系统中。


    您可以在开发周期早期使用性能测试，以避免投资于一个性能不佳、替换成本高昂的代码策略。例如，您可以尽早发现执行大量（例如超过 25 个）数据库或其他后端请求是否能够良好运行（答案是不能）。


    在关于持久化的第 [9](#A449023_1_En_9_Chapter.html) 章中，我将讨论服务器端软件中的“最大的性能问题”。这个问题非常严重，以至于它延伸到了反模式
    1 和 2。敬请期待——它确实很大，而且您很可能已经见过它。您能猜到是什么吗？


    ## 主要反模式 #3：过度处理


    这种反模式涉及对资源密集型用例的错误尝试，这些用例的合理性仅勉强成立。一个常见的例子是，处理的数据量超过了单个最终用户在一屏或一个网页信息中可能使用的量。换句话说，期望在一个
    HTML 表格中加载 50 页数据并在 100 毫秒内完成是不可能的。但加载 3 页数据并提供一个“下一页”按钮，性能则可以相当不错。另一个例子是，期望一个特别复杂的用例在高吞吐量下也能良好运行，尽管它在生产环境中只会经历较低的吞吐量。


    虽然评估这种反模式需要一些技术专长，但它更多地依赖于业务专长。您特别需要知道哪些业务流程正在或将在生产环境中使用，并且了解每个流程的大致百分比会很有帮助。


    为了方便开发人员和 QA 人员，测试数据库通常包含一些配置好的“超级客户”，用于展示大量令人眼花缭乱的业务功能，尽管客户在生产环境中从未变得如此庞大或复杂。在负载测试中出现这样的数据，是导致“过度处理”反模式的常见原因。


    以下是不幸场景的一种可能表现：您创建了一个给系统带来压力的负载测试（第 [4](#A449023_1_En_4_Chapter.html) 章）。本书 P.A.t.h.
    部分的四个章节将引导您连接监控工具，并找到代码中最慢的部分和 CPU 消耗最高的部分。这一切都很好——这里没有反模式。问题在于，如果您过于急切，花费大量时间调优用户很少访问的特定代码段，而这段代码恰好被无意中包含了您的负载测试中。这就是浪费时间。


    另一个例子是，考虑一个无意中过大的 RDBMS 结果集，它需要额外的时间来处理。`SELECT`语句中过于宽泛的`WHERE`子句可能导致这种情况，例如一个放错位置的通配符，检索出所有匹配任何条件的客户。但数据库中意外和无效的数据也可能是罪魁祸首。并且不要忘记前面提到的典型示例：您的系统浪费资源将大量数据塞进单个网页，这些数据量远超单个用户所能消化。


    所以请记住：性能调优既关乎雕琢代码使其运行更快，也关乎做出明智的选择，决定对哪些业务流程进行负载测试。它还涉及性能与用户界面设计之间的权衡——例如保持网页大小以兼顾性能。


    这意味着，当您埋头于系统内部，审视一个大型结果集带来的可疑性能问题时，您必须重新调整思路，考虑更抽象的事情，比如性能/可用性权衡以及业务的吞吐量需求。这种人类上下文的切换并不容易，但请考虑它有多么有用：一些调优挑战完全可以避免，因为底层的用例是如此不切实际，以至于它一开始就不应该被包含在负载测试中。'
  raw: '*   Consider using the pooling in the Apache HTTP Client to avoid the overhead
    of re-creating the TCP Socket. An Internet search for “apache client connection
    management” will get you to the right place.

    *   Some server-side JDBC apps still incur the overhead of using `javax.sql.DriverManager.getConnection()`
    to re-create the TCP socket for the database connection for every SQL request.
    Instead, consider using Hikari, C3P0 or a JDBC connection pool provided by your
    container, whether it is JBoss, WebSphere, Jetty, Tomcat or some other container.


    Now that we have a good picture of several of the culprits, let’s talk about a
    few more of the common traits that will help you recognize this Unnecessary Initialization
    anti-pattern when you are looking at performance data:


    *   Many small I/O hits. These examples are not about large I/O hits (say, 50ms
    or longer) but many small I/O hits (perhaps a few ms each) executed frequently
    by a handful of subsystems (application initialization, XML processing, HTTP requests,
    and so on), incurring overhead for every round trip.

    *   Performance Insensitive Idiom. The four problems with the XML APIs show that
    Unnecessary Initialization can be caused by using the wrong idiom to consume a
    particular API. Some of the most popular idioms available on the Internet, in
    the four XML cases, just happen to be fraught with performance problems. This
    is a problem.


    As a performance recommendation , “avoid unnecessary I/O” is a cliché and banal,
    but it also happens to be the root cause of this bountiful class of performance
    defects. Ouch. Let’s pay closer attention to the “avoid unnecessary I/O” recommendation
    and minimize requests to the disk and over the network.


    ## Main Anti-Pattern #2: Strategy/Algorithm Inefficiency


    This Main Anti-Pattern is about choosing an algorithm or strategy that doesn’t
    perform well. Also included, though, is choosing the right algorithm with the
    wrong algorithm configuration/parameterization. Comparing the complexity of algorithms
    (using “Big O” notation) is out of scope for this small book.


    It is not about fawning over your favorite sorting algorithms or using “Big O”
    notation to compare worst-case complexity. Why not? Because most enterprise software
    is considerably less complex. It is more about moving data from point A to point
    B. This book is about all the performance trouble that we regularly get ourselves
    into before even attempting to tackle more complex things, like algorithms.


    This anti-pattern is about algorithms (structured plans of attack for processing
    some data), but also strategies, like a data access strategy that is an application’s
    approach to sculpting SQL statements to retrieve/update data. An algorithm’s implementation
    is normally in a single place. A strategy, on the other hand, is much more difficult
    to tune and/or replace because its code is scattered throughout the system.


    You can use performance testing early in the development cycle to avoid investing
    in an ill-performing code strategy that is cost-prohibitive to replace. For example,
    you could discover early on whether executing a lot (say more than 25) of database
    or other back-end requests will perform well (it won’t).


    In Chapter [9](#A449023_1_En_9_Chapter.html) on Persistence, I will talk about
    the “Biggest Performance Problem Ever” in server-side software. This problem is
    so big that it stretches into anti-patterns 1 and 2\. Stay tuned—it’s really big
    and there is a good chance you have seen this already. Can you guess what it is?


    ## Main Anti-Pattern #3: Overprocessing


    This anti-pattern is about misguided attempts to embrace resource-intensive use
    cases, ones that are only marginally valid. One common example is where more data
    is processed than a single end user could possibly make use of in a single screen-full
    or webpage of information. In other words, expecting 50 pages of data in a single
    HTML table to load in 100ms is not going to happen. But 3 pages of data with a
    “next page” button could perform quite nicely. Another example is expecting a
    particularly complex use case to perform well under high throughput, even though
    it will see only light throughput in production.


    While assessing this anti-pattern requires some technical expertise, it falls
    more so on business expertise. You specifically need to know which business processes
    are, or will be, used in production, and it would be helpful to know the rough
    percentages of each.


    As a convenience to both developers and QA, often test databases contain a few
    “super customers” configured to demonstrate a large, dizzying array of business
    functionality, even though customers never get that large or complicated in production.
    Data like this in a load test is a frequent cause of the Overprocessing anti-pattern.


    Here is one way this unfortunate scenario will play out: you create a load test
    that stresses out your system (Chapter [4](#A449023_1_En_4_Chapter.html)). The
    four chapters in the P.A.t.h. section of this book will then walk you through
    hooking up monitoring tools and finding the slowest parts of your code and the
    highest CPU consumers. This is all good and well—no anti-pattern here. The problem
    happens if you get eager and spend lots of time tuning a particular section of
    code that users rarely traverse, but just happens to be inadvertently included
    in your load tests. This is time wasted.


    Here is another example. Consider an inadvertently oversized RDBMS result set
    that takes extra time to process. An overly-broad WHERE clause in a SELECT could
    cause this, like a misplaced wild card that retrieves all customers matching anything.
    But unexpected and invalid data in the database could be at fault, too. And do
    not forget about the quintessential example mentioned earlier, where your system
    wastes resources cramming huge amounts of data into a single web page, more data
    than a single user will be able to digest.


    So remember: performance tuning is as much about sculpting code to go faster as
    it is about making smart choices about which business processes to load-test.
    It is also about trade-offs between performance and user interface design—like
    keeping web page sizes small to accommodate performance concerns.


    This means that when your head is stuck under the hood of your system looking
    at questionable performance from a large result set, you have to reorient your
    thinking and consider more abstract things, like performance/usability trade-offs
    and the throughput needs of the business. This human context switching is not
    easy , but consider how helpful it is: some tuning challenges can be avoided altogether
    because the underlying use case was so unrealistic that it shouldn’t have been
    included in the load test in the first place.'
