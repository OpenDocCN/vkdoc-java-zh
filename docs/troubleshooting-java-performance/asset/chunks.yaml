  trans: "\n*   “使用 JMeter 进行负载测试：第 1 部分 - 入门指南”，（[`https://lincolnloop.com/blog/load-testing-jmeter-part-1-getting-started/`](https://lincolnloop.com/blog/load-testing-jmeter-part-1-getting-started/)）\n\
    *   “从零开始学习 JMETER -（性能+负载）测试”（[`https://www.udemy.com/learn-jmeter-from-scratch-performance-load-testing-tool/`](https://www.udemy.com/learn-jmeter-from-scratch-performance-load-testing-tool/)）\n\
    *   “JMeter 简介”（[`https://www.guru99.com/introduction-to-jmeter.html`](https://www.guru99.com/introduction-to-jmeter.html)）\n\
    *   “JMeter - 快速指南”（[`http://www.tutorialspoint.com/jmeter/jmeter_quick_guide.htm`](http://www.tutorialspoint.com/jmeter/jmeter_quick_guide.htm)）\n\
    *   “JMeter 入门”（[`https://www.youtube.com/watch?v=KI6u5pclYIw`](https://www.youtube.com/watch?v=KI6u5pclYIw)）\n\
    *   “JMeter 入门指南”（[`https://www.youtube.com/watch?v=dJw8sBk_wSo`](https://www.youtube.com/watch?v=dJw8sBk_wSo)）\n\
    *   “如何使用 Apache JMeter 对 Web 服务器执行负载测试”（[`https://www.digitalocean.com/community/tutorials/how-to-use-apache-jmeter-to-perform-load-testing-on-a-web-server`](https://www.digitalocean.com/community/tutorials/how-to-use-apache-jmeter-to-perform-load-testing-on-a-web-server)）\n\
    *   “JMeter 快速设置指南”（[`http://zacster.blogspot.com/2008/03/quick-howto-to-setup-jmeter.html`](http://zacster.blogspot.com/2008/03/quick-howto-to-setup-jmeter.html)）\n\
    \n## 致 JMeter 的情书\n\n你的负载生成器可能具备以下一两个特性，但 JMeter 是唯一一个集所有特性于一身的工具，其功能集足够强大，可供\
    \ QA 和开发人员共享。要向你展示所有这些内容需要大量篇幅，因此本章仅展示列表中几个较为重要的特性。\n\n*   除了标准的负载生成指标（响应时间、吞吐量等）之外，JMeter\
    \ 还可以绘制各种其他指标的图表：\n    *   来自被测系统的 JMX 指标（[`https://jmeter-plugins.org/wiki/JMXMon/`](https://jmeter-plugins.org/wiki/JMXMon/)）。例如，这将显示你的\
    \ Web 容器线程是否已达到上限，详见第 4 章关于负载反模式的内容。\n    *   来自所有主流操作系统的 CPU、内存、网络、磁盘指标（使用[PerfMon](http://jmeter-plugins.org/wiki/PerfMon/)（[`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMon/)）和[SIGAR](https://sourceforge.net/projects/sigar/)）。\n\
    \    *   SIGAR 还允许你绘制每个 PID（操作系统进程 ID）的 CPU 消耗图表。如果一台机器上有多个 Java 进程，这将显示哪个进程占用了所有\
    \ CPU。\n*   对任何你想要的内容进行负载测试：简单的 Java 程序、HTTP/S 应用程序、JMS 应用程序、大量 SQL 语句、TCP Socket\
    \ 服务器以及[许多其他内容](http://jmeter.apache.org/usermanual/component_reference.html)（[`http://jmeter.apache.org/usermanual/component_reference.html`](http://jmeter.apache.org/usermanual/component_reference.html)）。在\
    \ JMeter 中，知道如何测试这些内容的 JMeter 测试元素被称为采样器。\n*   WS-Security。如果你的客户端必须加密你的 WS-Security\
    \ 消息，那么你的负载生成器也必须这样做（[`https://github.com/tilln/jmeter-wssecurity`](https://github.com/tilln/jmeter-wssecurity)）\n\
    *   高级图表功能：\n    *   将任意两个（或更多）指标放在同一张图表上（[`https://jmeter-plugins.org/wiki/CompositeGraph/`](https://jmeter-plugins.org/wiki/CompositeGraph/)）。三个具有不同度量单位且自动缩放的指标？没问题。这有助于识别一个指标如何影响另一个指标。你甚至可以将来自两个不同测试的指标放在同一张图表上（[`https://jmeter-plugins.org/wiki/MergeResults/`](https://jmeter-plugins.org/wiki/MergeResults/)），以呈现令人信服的前后对比可视化效果。例如，如果你的吞吐量因\
    \ CPU 耗尽而达到上限，你可以得到一张图表，其中清晰地显示了在 CPU 达到 100%的精确时刻，吞吐量出现了难看的瓶颈。这是一张非常有说服力的图表！\n\
    \    *   你不信任平均值吗？你应该如此。你可以使用[频率分布](http://jmeter-plugins.org/wiki/RespTimesDistribution/)（[`https://jmeter-plugins.org/wiki/RespTimesDistribution/`](https://jmeter-plugins.org/wiki/RespTimesDistribution/)）和[百分位图](http://jmeter-plugins.org/wiki/RespTimePercentiles/)（[`https://jmeter-plugins.org/wiki/RespTimePercentiles/`](https://jmeter-plugins.org/wiki/RespTimePercentiles/)）来展示响应时间指标，从而避免“平均值的谎言”。\n\
    \    *   在设置面板（[`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)）上，你可以调整图表的[粒度、坐标轴刻度、颜色等](http://jmeter-plugins.org/wiki/SettingsPanel/)。\n\
    *   从任何安装了 JVM 的操作系统生成负载。\n*   将 JMeter 测试结果本地记录到文本文件或[集中式数据库](http://jmeter.apache.org/usermanual/realtime-results.html)（[`http://jmeter.apache.org/usermanual/realtime-results.html`](http://jmeter.apache.org/usermanual/realtime-results.html)）。\n\
    *   以下自动化性能测试平台集成了 JMeter 和报告功能：\n    *   [Jenkins](https://wiki.jenkins-ci.org/display/JENKINS/Performance+Plugin)（[`https://wiki.jenkins.io/display/JENKINS/Performance+Plugin`](https://wiki.jenkins.io/display/JENKINS/Performance+Plugin)）\n\
    \    *   [Taurus](http://gettaurus.org/)（[`http://gettaurus.org/`](http://gettaurus.org/)）\n\
    \    *   [Sonar](http://testersinaction.blogspot.com/2013/05/v-behaviorurldefaultvmlo_24.html)（[`http://testersinaction.blogspot.com/2013/05/v-behaviorurldefaultvmlo_24.html`](http://testersinaction.blogspot.com/2013/05/v-behaviorurldefaultvmlo_24.html)）\n\
    *   多种部署负载生成器的方式：\n    *   单机部署：\n        *   快速简便的默认方法：使用 Java UI 创建负载脚本，然后生成负载并查看图表。\n\
    \        *   在无头机器上[生成负载](http://jmeter.apache.org/usermanual/get-started.html#non_gui)（[`http://jmeter.apache.org/usermanual/get-started.html#non_gui`](http://jmeter.apache.org/usermanual/get-started.html#non_gui)），使用预先制作好的测试计划。将原始结果传回桌面进行分析，或者直接在无头模式下生成图表的.png\
    \ 图像供后续分析。\n    *   [分布式测试](http://jmeter.apache.org/usermanual/jmeter_distributed_testing_step_by_step.pdf)（[`http://jmeter.apache.org/usermanual/jmeter_distributed_testing_step_by_step.pdf`](http://jmeter.apache.org/usermanual/jmeter_distributed_testing_step_by_step.pdf)）。使用多台机器，通过一个中央\
    \ JMeter 控制器进行。对于单个生成器来说，超过几千 TPS 的负载可能过高。\n"
- fmt: '# Using jmeter-plugins.org Is a Must


    To be frank about it, I would have ditched JMeter long ago without Andrey Pohilko’s
    incredible `jmeter-plugins.org`, which is a set of additional tools and graphs
    and things that plug right into JMeter. I suppose I’m a little biased; I contributed
    a few hundred lines of code, myself.


    The project started way back in 2009, so it’s pretty stable. Chapter 6, on the
    Scalability Yardstick, relied heavily on JMeter Plugins. The CPU consumption was
    from JMeter Plugins, as well as the thread groups that draw the nice stair-steps
    for an incremental load plan. Remember when I mentioned the two approaches to
    installing this? I talked about installation using the Plugin Manager or by unzipping
    jar files for a single plugin into `JMETER_HOME/lib/ext`.


    Here are two other installation approaches that I think are just as important
    as the first two:


    - Use the “old style” releases. First surf to `https://jmeter-plugins.org/downloads/old/`.
    Then download both `JMeterPlugins-Standard-N.N.N.zip` and `JMeterPlugins-Extras-N.N.N.zip`
    and unzip them into `JMETER_HOME`. The jar files in the zip must end up in the
    same folders (`/lib` or `/lib/ext`) as specified in the `.zip` files.

    - Use Maven. Not only does this approach install `jmeter-plugins`, it does a full
    JMeter install too! Look in the `littleMock` repository for `pom-load.xml`. Instead
    of launching JMeter with `JMETER_HOME/bin/jmeter.bat`, you use my trivial little
    `loadGui.cmd` / `.sh` (also in the `littleMock` repo). I borrowed most of `pom-load.xml`
    from some kind soul on the Internet. The maven plugin used is very well named:
    `jmeter-maven-plugin`. Thank you, Internet. You’ll find `pom-load.xml` in the
    root folder of `https://github.com/eostermueller/littleMock`.


    Please use the first technique (“old style”) to install JMeterPlugins on your
    own workstation to view the `.jmx` scripts for this chapter. Those `.jmx` files
    are in the `sampleJMeterScripts/` folder of this repo:


    `https://github.com/eostermueller/javaPerformanceTroubleshooting`


    I refer to this as the `jpt` repo.


    Consider this everyday problem: Let’s say you create a JMeter load script (a `.jmx`
    file) that uses a few `jmeter-plugins`. When your cube neighbor who does not have
    JMeter-Plugins installed tries to run your `.jmx` file, they will get cryptic
    errors that do very little to highlight the missing dependency.


    The two install approaches above help with this. Maven is not always easy to use,
    but the above `pom-load.xml` is wonderful—it will download, on the fly, any dependent
    JMeter-Plugins specified as a `<dependency>` in the `pom-load.xml` file.


    The moral of this story is that sharing your `.jmx` file, alone, is prone to cryptic
    dependency issues. Sharing both your `.jmx` file and your customized `pom-load.xml`
    file fixes all of that. But another way to discover JMeter is to use the JMeter
    Plugins Plugin Manager, one of the install techniques mentioned in Chapter 6.
    Here is the URL for quick reference:


    `https://jmeter-plugins.org/wiki/PluginsManager/`


    If you have the PluginsManager installed (see above), it will prompt you with
    “Your test plan requires the following plugins” when it discovers a `.jmx` file
    that references a JMeter Plugin you don’t have installed. Then, it will give you
    the option to actually install in or abort.


    The `load-pom.xml` mentioned above does a full JMeter install and also lets you
    specify the dependent Plugins in use. Alternatively, you can also use this script
    to install all plugins in a specific plan file:


    `PluginsManagerCMD install-for-jmx/home/username/jmx/testPlan.jmx`


    This is really helpful for automated, lights-out perf testing, but keep in mind
    that even the `PluginsManagerCMD` has its own install process here: `https://jmeter-plugins.org/wiki/PluginsManagerAutomated/`


    In Chapter 2, I showed you how to graph the CPU consumption of individual PIDs.
    To do that, download and install this plugin—this part enables just the graphs,
    not the collecting of CPU data:


    `https://jmeter-plugins.org/wiki/PerfMon/`


    Then use the ServerAgent to collect data that will display on the graphs: Download
    `ServerAgent-N.N.N.zip` from


    `https://jmeter-plugins.org/wiki/PerfMonAgent/#Download`


    Unzip it onto any machine (any platform) from which you want to collect metrics.
    When you start the `startAgent.sh` (or `startAgent.bat`), it listens for a connection
    on port 4444 from the JMeter GUI (or headless) process on your desktop. It is
    extremely well behaved, cross platform and easy to use.


    The StartAgent captures RAM, network and other metrics—not just CPU. There are
    a number of other JMeterPlugins, detailed next.'
