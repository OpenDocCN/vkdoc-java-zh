- fmt: '### The Discipline of Performance Engineering


    This book is more of a troubleshooting guide than a guide to the entire discipline
    of performance tuning. This little section provides a brief look at how the performance
    process should work and how to know when you’re done tuning a system.


    If we’re building a software system, the specs that define precisely what we’re
    going to code are called the ‘functional requirements.’ They detail the items
    of data entry on each screen and the results that should be displayed when the
    user hits the ‘submit’ button. When all functionality in the requirements has
    been delivered, the application is functionally complete.


    Performance requirements, on the other hand, define how quickly the application
    must respond, and how many business processes the system must handle in a particular
    time interval (like in an hour) in order to satisfy client needs. These are called,
    respectively, response time and throughput requirements. A performance requirements
    document starts by listing all/most of the business processes (from the function
    requirements) and then assigning response time and throughput requirements to
    each.


    For example, if the response time requirement for your funds transfer is 2 seconds
    and its throughput requirement is 3,600 an hour, then a steady state load test
    (see Chapters [4](#A449023_1_En_4_Chapter.html), [5](#A449023_1_En_5_Chapter.html),
    [6](#A449023_1_En_6_Chapter.html), and [7](#A449023_1_En_7_Chapter.html) for details
    on load testing) must demonstrate that 90% of funds transfer response times are
    less than 2 seconds and that at least 3,600 of them were successfully executed
    in 60 minutes.


    Sometimes performance requirements even place a cap on how much money can be spent
    on hardware. If five nodes in a cluster were required to meet the above goals,
    and the performance requirements said we could buy at most four nodes, then more
    tuning would need to be done (probably to lower CPU consumption) so that the response
    time and throughput goals could be met with just four nodes.


    It is also common to stipulate that all performance requirements must be met while
    keeping CPU consumption below X, where X is whatever the operations folks feel
    comfortable with in production.


    One of the most common mistakes in this area is not having any performance requirements
    at all. Of course these requirements are imprecise and imperfect. Start with something
    and refine them over time to best approximate client performance and stability
    needs without wasting time over-tuning the system.


    Here is an example of the kind of refinement I’m talking about. Time should be
    spent understanding how closely the performance requirements match up to response
    time and throughput data gathered from production. If production data shows that
    the system processes 7,200 funds transfers on the busiest hour of the busiest
    day of the year, and the throughput requirement is less than that, then the throughput
    requirement should be raised to at least this number (7,200) and probably a little
    (perhaps 25%) higher, just to be safe.


    For a more detailed look at the process, there is a great 20 page pdf whitepaper
    on the topic by Walter Kuketz on the [`www.cgi.com`](http://www.cgi.com) website.
    Walter actually helped me develop the above little section. To find his whitepaper,
    do an internet search using these search criteria:


    “Walter Kuketz” “Guidebook for the Systems Development Life Cycle”


    ### Draw the Line


    Whose responsibility is it to make the system perform? The developers who coded
    it, or a performance engineer? If the performance engineer is your answer, then
    who is going to keep the developer from littering other code bases with the same
    kind of performance defects that caused the first system to tank? Keep in mind
    that laziness that drives automation is good. Laziness that avoids accountability
    for performance is bad.


    This turns developers into performance defect progenitors, and the small cadre
    performance engineers don’t have a chance of keeping up with such a huge number
    of defects.


    Finally, if a performance engineer is brought in at the end of the development
    cycle to discover/fix performance issues, then there isn’t time to tune, much
    less replace, a poorly performing technical approach that was months or years
    in the making.


    ## Organization of Chapters


    This book is divided into three parts.


    ### Part I: Getting Started with Performance Tuning


    The three chapters in Part I set the stage for performance testing:


    Chapter [1](#A449023_1_En_1_Chapter.html) details four performance anti-patterns
    that lie at the heart of most performance defects. Understanding these anti-patterns
    makes the defects much easier to recognize when we’re looking at raw performance
    metrics.


    Chapter [2](#A449023_1_En_2_Chapter.html) makes the case that a very small computing
    environment, like a developer workstation, is the most productive place to tune
    a Java server-side system. It also details all the steps necessary to essentially
    collapse all the parts of a larger system into the smaller one.


    Chapter [3](#A449023_1_En_3_Chapter.html) is about the vast sea of performance
    metrics and how to choose the right ones. If you’ve ever been confused about which
    metrics to use during performance testing, this chapter is for you.


    ### Part II: Creating Load Scripts and Load Testing


    Part II of this book is about creating load scripts and load testing in general:


    Chapter [4](#A449023_1_En_4_Chapter.html) details both a “First Priority” and
    a “Second Priority” approach to creating network load scripts, ones that simulate
    a production load. The First Priority gets you up and testing quickly. The Second
    Priority shows how to enhance your scripts to more closely model the production
    load of real users.


    Chapter [5](#A449023_1_En_5_Chapter.html) details all the right criteria you need
    to evaluate objectively whether the script you built in Chapter [4](#A449023_1_En_4_Chapter.html)
    simulates a “valid” test or not. This chapter helps you understand quickly whether
    you messed up your load test and the results must be discarded. No one wants to
    make big tuning/development decisions based on invalid results.


    Chapter [6](#A449023_1_En_6_Chapter.html) details the fastest approach ever to
    assessing scalability. It describes a test called the Scalability Yardstick. If
    scalability is important to you, you should run this test once a week or more
    to help steer your app’s performance in the right direction.


    Chapter [7](#A449023_1_En_7_Chapter.html) is my love letter to the JMeter, the
    open-source load generator. `jmeter-plugins.org` is important, too! Commercial
    load generators can’t keep up with all of JMeter’s great features.'
