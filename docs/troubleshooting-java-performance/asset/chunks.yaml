- fmt: '# MTDP Demonstration


    I am expecting, almost hoping, that you will be skeptical that performance defects
    can accurately be identified with the small number of samples discussed in the
    preceding section. I’m not really seeking out disagreement; instead I just want
    to say “welcome.” The world of performance assessment needs the skeptics.


    This section provides an overview of a small tuning effort, with basic before-and-after
    performance results. To give you a rough idea of how `littleMock` works, there
    is no detailed review of thread dumps in this first example—just an overview.
    All the defects on this adventure were discovered using the Manual Thread Dump
    Profiling (MTDP) technique described earlier. But instead of just replacing slow
    code with the fast as in a normal tuning effort, we will use the `littleMock`
    web page that allows us to live-toggle between the slow and the fast code. You
    just click a button to toggle between slow and fast, and the `Glowroot` (point
    your browser to `http://localhost:4000`) throughput measurement leaps, like resuscitating
    a dead patient. You should try it.


    Since this is a run-on-your-own-machine demo, when a “slow” option is enabled,
    you get to see each defect rear its ugly little head in the thread dumps (the
    exclusive club for the slow). When you click to toggle on the “fast” option, you
    can take more thread dumps to insure that same defect vanishes and that there
    is a corresponding boost in performance.


    The application is the same one used earlier, but the `Sleep Time` option is not
    used. Here is the link again for the install:


    [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)


    I ran the `littleMock` UI with the some slower options for almost 10 minutes.
    Then, just before 5pm in Figure [11-3](#A449023_1_En_11_Chapter.html#Fig3), I
    used the GUI to apply some more efficient settings, where you can see a dramatic
    spike.


    ![A449023_1_En_11_Fig3_HTML.jpg](A449023_1_En_11_Fig3_HTML.jpg)


    Figure 11-3.


    The big boost in performance right around 5pm happened when I applied a different
    performance key. The `load.sh` script was running for the duration of the test.


    As you can read from Figure [11-3](#A449023_1_En_11_Chapter.html#Fig3), the tuning
    fixes boosted throughput by a factor of 13; throughput started out at fewer than
    10K requests per minute and ended up at more than 130K per minute. For response
    time, 99% of all responses started out around about 53ms or faster, and ended
    up faster than 2ms.


    Here are the performance keys to the slow and fast tests shown above in Figure
    [11-3](#A449023_1_En_11_Chapter.html#Fig3).


    Slow: `X0,J100,K100,Q0,R0,S0`


    Fast: `X2,J25,K25,Q1,R1,S1`


    But what code is making such drastic changes between these two different performance
    keys? The `littleMock` web page, below the performance key, details all the options.
    It even provides web links to github source code that shows what changes are made
    when you choose a slightly different option.


    For example, to understand the difference between the `X0` and the `X2` settings,
    look for the `[X0]` text as you scroll down the `littleMock` web page. If you
    click on the ‘Source Link’ to the right of `[X0]`, it will take you to the `github.com`
    code.


    ## Navigating Unfamiliar Code


    Finding the entry, trigger, and current marks is the first step to getting your
    bearings when looking at a stack trace. Unfamiliar code is everywhere, because
    our applications now rely on so many different libraries. It took a while, as
    a performance engineer, to get comfortable making assessments of code I’d never
    seen before. It is just part of the job I had to get used to.


    My first reaction to looking at a stack trace from unfamiliar code used to be
    one of these:


    1. Fear.

    2. I can only tune something I’ve got the source code to, and if it’s not in one
    of our company’s package spaces, forget it.


    I still feel like this on a bad day, but there is one simple question that disarms
    all of this fear for me: When in the logical timeline of the request was this
    stack trace taken?


    1. Was it in the beginning, when the code is reading the input from the caller
    and figuring out what processing to tackle?

    2. Or was it in the middle, when the beef of the main process is well underway,
    like an `INSERT` into a massive database table of orders?

    3. Or was the code toward the end of the request, closing resources and preparing
    the result (like marshaling a result to json or HTML rendering) for the caller?


    The easiest way for me pinpoint the location on the timeline is this: the stack
    trace includes the line number of the trigger mark—this is the last method called
    in your package space before the current mark executes. Open the source code to
    the line number specified in the trigger mark. If you don’t have the source code,
    consider getting the `.class` file and using an open-source Java decompiler to
    get the source. I have had good luck with `JD-GUI` ([`http://jd.benow.ca/`](http://jd.benow.ca/))
    and `jad.exe` ([`https://sourceforge.net/projects/originaljavadecompiler/`](https://sourceforge.net/projects/originaljavadecompiler/)).


    Once you have the source code in front of you, assess whether the trigger code
    executes before, during, or after the “main” processing for this request—you’ll
    have to be the judge of this “main” event. Is it a request to a back-end system?
    Calculation of some result? You make the call. I’ll refer to this timeline exercise
    as “plotting the request’s timeline.”


    When I look at unfamiliar class names on the current landmark in a stack trace
    that repeatedly shows up in MTDP analysis, I’m inclined to say “not my problem.”
    But if I instead ask “Where in the stack trace do I have any control?” or “At
    what point in the stack trace could I have done anything different?” there is
    hope, because normally a trigger landmark exists, one that my code executed, and
    that is where I need to reevaluate.'
  raw: '## MTDP Demonstration


    I am expecting, almost hoping, that you will be skeptical that performance defects
    can accurately be identified with the small number of samples discussed in the
    preceding section. I’m not really seeking out disagreement; instead I just want
    to say “welcome.” The world of performance assessment needs the skeptics.


    This section provides an overview of a small tuning effort, with basic before-and-after
    performance results. To give you a rough idea of how littleMock works, there is
    no detailed review of thread dumps in this first example—just an overview. All
    the defects on this adventure were discovered using the Manual Thread Dump Profiling
    (MTDP) technique described earlier. But instead of just replacing slow code with
    the fast as in a normal tuning effort, we will use the littleMock web page that
    allows us to live-toggle between the slow and the fast code. You just click a
    button to toggle between slow and fast, and the Glowroot (point your browser to
    `http://localhost:4000`) throughput measurement leaps, like resuscitating a dead
    patient. You should try it.


    Since this is a run-on-your-own-machine demo, when a “slow” option is enabled,
    you get to see each defect rear its ugly little head in the thread dumps (the
    exclusive club for the slow). When you click to toggle on the “fast” option, you
    can take more thread dumps to insure that same defect vanishes and that there
    is a corresponding boost in performance.


    The application is the same one used earlier, but the Sleep Time option is not
    used. Here is the link again for the install:


    [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)


    I ran the littleMock UI with the some slower options for almost 10 minutes. Then,
    just before 5pm in Figure [11-3](#A449023_1_En_11_Chapter.html#Fig3), I used the
    GUI to apply some more efficient settings, where you can see a dramatic spike.


    ![A449023_1_En_11_Fig3_HTML.jpg](A449023_1_En_11_Fig3_HTML.jpg)


    Figure 11-3.


    The big boost in performance right around 5pm happened when I applied a different
    performance key. The load.sh script was running for the duration of the test.


    As you can read from Figure [11-3](#A449023_1_En_11_Chapter.html#Fig3) , the tuning
    fixes boosted throughput by a factor of 13; throughput started out at fewer than
    10K requests per minute and ended up at more than 130K per minute. For response
    time, 99% of all responses started out around about 53ms or faster, and ended
    up faster than 2ms.


    Here are the performance keys to the slow and fast tests shown above in Figure
    [11-3](#A449023_1_En_11_Chapter.html#Fig3).


    Slow: X0,J100,K100,Q0,R0,S0


    Fast: X2,J25,K25,Q1,R1,S1


    But what code is making such dratic changes between these two different performance
    keys? The littleMock web page, below the performance key, details all the options.
    It even provides web links to github source code that shows what changes are made
    when you choose a slightly different option.


    For example, to understand the difference between the X0 and the X2 settings,
    look for the [X0] text as you scroll down the littleMock web page. If you click
    on the ‘Source Link’ to the right of [X0], it will take you to the github.com
    code.


