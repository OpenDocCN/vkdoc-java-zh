    \ )\n\n## Love Letter to JMeter\n\nYour load generator might have one or two of\
    \ the following features, but JMeter is the only one that has them all, touting\
    \ a feature set robust enough to be shared by QA and developers. It would take\
    \ many volumes to show you all of this material, so this chapter will showcase\
    \ just a few of the more important ones in this list.\n\n*   Right alongside standard\
    \ load gen metrics (response time, throughput, and so on), JMeter can graph all\
    \ kinds of other metrics:\n    *   JMX metrics from your SUT ( `https://jmeter-plugins.org/wiki/JMXMon/`\
    \ ). For example, this will show you whether you are maxed on out your web container\
    \ threads, as detailed in Chapter 4 on load anti-patterns.\n    *   CPU, RAM,\
    \ network, disk metrics from all popular OSes (using `PerfMon` ( `https://jmeter-plugins.org/wiki/PerfMon/`\
    \ ) and `SIGAR` ( `https://sourceforge.net/projects/sigar/` )).\n    *   `SIGAR`\
    \ also enables you to graph CPU consumption per PID (operating system process\
    \ ID). If you have more than one Java process on a machine, this will show which\
    \ one is eating all the CPU.\n*   Load-test anything you want: simple Java programs,\
    \ HTTP/S applications, JMS apps, a ton of SQL statements, TCP Socket servers,\
    \ and many others ( `http://jmeter.apache.org/usermanual/component_reference.html`\
    \ ). The JMeter term for the JMeter Test Element that knows how to test to each\
    \ of these is a `Sampler`.\n*   WS-Security. If your client has to encrypt your\
    \ WS-Security message, then your load generator must also ( `https://github.com/tilln/jmeter-wssecurity`\
    \ )\n*   Advanced Graphing :\n    *   Put any two (or more) metrics together on\
    \ a single graph ( `https://jmeter-plugins.org/wiki/CompositeGraph/` ). Three\
    \ metrics with three different units of measure with auto-scaling? No problem.\
    \ This helps identify how one metric impacts another. You can even take metrics\
    \ from two different tests and put them onto the same graph ( `https://jmeter-plugins.org/wiki/MergeResults/`\
    \ ) for compelling before-after visualizations. For example if your throughput\
    \ maxes out because you are out of CPU, you can get a single graph that contains\
    \ the ugly throughput cap at the exact time the CPU hits 100%. That is a very\
    \ compelling graph!\n    *   Do you distrust averages? You should. You can use\
    \ `Frequency distributions` ( `https://jmeter-plugins.org/wiki/RespTimesDistribution/`\
    \ ) and `percentile graphs` ( `https://jmeter-plugins.org/wiki/RespTimePercentiles/`\
    \ ) to show response time metrics without “average lies.”\n    *   On the `Settings\
    \ panel` ( `https://jmeter-plugins.org/wiki/SettingsPanel/` ), you can tweak graph\
    \ granularity, axis scale, colors, and more ( `http://jmeter-plugins.org/wiki/SettingsPanel/`\
    \ ).\n*   Generate load from any OS with a JVM.\n*   Record JMeter test results\
    \ locally to a text file or to a centralized database ( `http://jmeter.apache.org/usermanual/realtime-results.html`\
    \ ).\n*   The following automated performance test platforms have JMeter integration\
    \ and reporting:\n    *   `Jenkins` ( `https://wiki.jenkins.io/display/JENKINS/Performance+Plugin`\
    \ )\n    *   `Taurus` ( `http://gettaurus.org/` )\n    *   `Sonar` ( `http://testersinaction.blogspot.com/2013/05/v-behaviorurldefaultvmlo_24.html`\
    \ )\n*   A variety of ways to deploy load generators :\n    *   From a single\
    \ machine:\n        *   Quick and easy, default approach: Create a load script\
    \ with Java UI and then generate load and view graphs.\n        *   Generate load\
    \ ( `http://jmeter.apache.org/usermanual/get-started.html#non_gui` ) on a headless\
    \ machine, using a premade test plan. Transfer the raw results back to your desktop\
    \ for analysis, or just generate the `.png` images of the graphs headlessly for\
    \ later analysis.\n    *   Distributed Testing ( `http://jmeter.apache.org/usermanual/jmeter_distributed_testing_step_by_step.pdf`\
    \ ). From multiple machines, with a central JMeter controller. Load over a few\
    \ thousand TPS might be too much for a single generator."
