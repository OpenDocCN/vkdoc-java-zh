- fmt: '# Virtualization Issues


    I love the idea of virtualization—being able to create a new “guest” machine (for
    load testing, of course) whenever I need one. But the performance metrics for
    the “parent” VM that runs the whole show are often off-limits for mere mortals
    like me. How can you know whether the guest is healthy if you don’t have access
    to the metrics?


    Gil Tene of Azul Systems (`https://www.azul.com/`) has the answer. He wrote a
    little Java utility called `jHiccup`. The tool is based on an interesting question:
    If you schedule a thread to sleep for a specific number of milliseconds, will
    that thread wake up on time if the entire operating system is experiencing pauses
    or hiccups? The answer is no, the thread will not wake up on time, and `jHiccup`
    measures the differences between expected and actual wake times for threads.


    Look at this URL for the latest releases of `jHiccup`:


    `https://github.com/giltene/jHiccup/releases`


    and the home page is here:


    `https://github.com/giltene/jHiccup`


    Download and unzip the release zip file to a new folder. Then `cd` to the same
    folder as `jHiccup.jar` and execute the following:


    ```

    java -javaagent:jHiccup.jar="-d 4000" org.jhiccup.Idle -t 30000

    ```


    The console will appear to hang for 30 seconds (the `-t` parameter). When it finishes,
    it will have created a file like Figure 5-3; this will be located in the current
    folder and named like this: `hiccup.170709.1303.20680.hlog`.


    ![A449023_1_En_5_Fig3_HTML.jpg](A449023_1_En_5_Fig3_HTML.jpg)


    **Figure 5-3.** Output from `jHiccup`. The third column, `Interval_Max` shows
    the maximum time in milliseconds over the last 5 second interval (second column)
    that your OS was paused. The last measurement of `0.573ms` is the largest pause
    in 30 seconds.


    In the Introduction, I mentioned the need for “plug-it-in-now” tools so we can
    more quickly diagnose and fix performance issues. `jHiccup` is a great example
    of that. Yes, you do have to download a jar file, but outside of that it is easy.
    You don’t need security/access for the parent VM. You don’t need to restart any
    programs to capture the metrics.


    Getting more detailed metrics, like actual pause times instead of just the `Interval_Max`
    ones, takes a bit more work (using `jHiccupLogProcessor`). But that work is only
    necessary if the max times show concern. Personally, I’d be concerned if the parent
    VM regularly paused my guest for more than 2% of the time. So if any of those
    `Interval_Max` times regularly move from the current `0.573` in Figure 5-3 to
    100 or more, then I’d be concerned (100ms / 5000 interval = 2%) and I’d do two
    things:


    1. Research how to use `jHiccupLogProcessor` to get and graph the detailed data
    instead of just the max values above.

    2. Pass along my findings to the administrator of the VM parent, the one who has
    access to all the performance metrics.


    `jHiccup` measurements are also sensitive to garbage collection (GC) pauses. Chapter
    12 will talk more about the tools used for assessing GC health, but if you need
    a second opinion that GC pauses are slowing things down, `jHiccup` is your tool.
    My example, above, plugs `jHiccup` into a do-nothing program named `org.jhiccup.Idle`.
    You will need to seek out the alternate syntax for to plug `jHiccup` into the
    JVM whose metrics you’re questioning.


    The point of this story is that unhealthy virtualization infrastructure is yet
    another cause of an invalid load test, whose results really need to be discarded.


    Generally, I would only spend the time collecting `jHiccup` data if no explanations
    on the table (or in the P.A.t.h. Checklist) could explain a particular performance
    problem.


    # Wrong Workload Issues


    The section delves into a little more detail on the Performance Anti-Pattern Number
    3:


    * **Overprocessing:** The system is doing unnecessary work and removing that work
    provides measurable performance benefit. One example is retrieving too much data,
    where most of the data is discarded. Another example is including in your load
    test the wrong resource-hungry use case—one that is seldom used in production.


    I am very thankful for developers who take the time to create both data and tests
    for an application’s complicated edge cases. Thank you. We need exactly these
    kinds of tests, these reminders, to show the functionality we expect from the
    system.


    All that said, it is a waste of time to pummel your system with edge cases (and
    try to tune them) if just a slow trickle of such cases will ever traverse your
    production system. Often, these edge cases rear their heads unexpectedly. Once,
    after performance on a system degraded unexpectedly and severely, I scoured the
    source code control system for any unexpected code or other changes. No obvious
    problems there.


    After ten painfully unfruitful days of troubleshooting, we re-evaluated the load
    generation scripts for some of these pesky edge cases and we discovered one anomaly.
    The problem was not with the functionality we included in our load generation
    script (which is indeed something to watch out for), it was with the data.


    What we found was that the average number of bytes for one of the HTTP responses
    (as shown by the load generator) was about 10 times larger than the rest. Why
    was one so much larger than the others? It turned out that a setting on our backend
    SUT was inadvertently changed and it started returning HTTP inquiry results for
    many hundreds of inactive (and unexpected) accounts, as well as the expected active
    ones. Oops. Sanity-checking the average sizes (in bytes) of the various parts
    of your load script is important for finding inefficiencies, so I also mentioned
    this in the chapter on Metrics—there is a nice screenshot there (Figure 3-1) if
    you need some detail to get the full picture.


    The moral of the story is that edge cases show up not just in the functionality
    you choose to include in your load script, but also in your system’s data and
    in other places. For example, performance almost always suffers when too much
    logging (like `log4j`) is turned on, and having so much logging could also be
    considered one of these edge cases. Sometimes the problem is you. You find performance
    defects, you deploy code, and you run some load tests and then run even more load
    tests until you have run the “add widget” use case 100 million times. If these
    repeated load tests make the count of records in the database very unrealistically
    high, then you, the load generator, are the problem. Problems can come from the
    funniest places.


    So, take some time to understand the various types of traffic in your production
    workload. If you are not really sure about the load of each business process,
    how will you know what functionality should be in your load test? For example,
    if fewer than 1% of your account deposit traffic includes more than 10 items (checks,
    cash), it is a waste of time to hammer the system with deposits with thousands
    of checks from that one remaining pizza joint in town that still accepts checks.
    I bet they listen to 8-track tapes, as well.


    There are a few angles here:


    * Don’t waste time tuning use cases that are seldom used.

    * Validate that the main use cases in production are also in your load script.
    If you think you know which use cases are there, what data do you have to convince
    others?'
