- fmt: '# Performance Testing and Load Script Errors


    A large percentage of performance defects that you would normally find in production
    can be found even when running a single business process with a few threads of
    load (like `3t0tt`), without any of the other business processes in the system.
    So I consider a “single business process” load to be a “valid” test, even though
    it does not contain all the business processes in the production workload.


    Of course there will be occasional issues where you can only reproduce a performance
    defect when two particular business processes run in the same workload—consider
    two processes that read/write to the same rows in a RDBMS table, like “Check order
    status” and “Update order status.” Many applications use tables to monitor the
    state of a process in a workflow. These situations must also be load-tested together.


    Lastly, I’d like to close this section on “Wrong Workload Issues” by mentioning
    a few other types of processing to watch out for. Sometimes when you are load-testing
    on a machine, that machine is not 100% “yours.” Automated installs run in the
    background, backup jobs kick off unexpectedly, and who knows when virus scanners
    kick in.


    If you suspect any of these, don’t settle for traditional CPU metrics that show
    just CPU or CPU-Core level CPU consumption. Instead, take the time to find and
    graph the CPU consumption of each PID using `PerfMon`, as we did in Chapter [2](#A449023_1_En_2_Chapter.html)
    for the modest tuning environment.


    [`https://jmeter-plugins.org/wiki/PerfMonMetrics/#Per-Process`](https://jmeter-plugins.org/wiki/PerfMonMetrics/#Per-Process)


    ## Load Script Errors


    When performance tuning, you are always rubbing shoulders with some interesting
    problems (my wife says that I am an interesting problem). Why is performance worse
    when nothing (seems to have) changed? Why do these two metrics contradict each
    other? Likewise, you have got to pack a lunch when trying to find the cause of
    a full catastrophic failure, when a JVM process dies—so that is kind of fun too.
    Jumping onto a sweaty wrestling mat with these kinds of problems is my kind of
    fun. But it is much less enjoyable to be bogged down with mundane, functional
    failures.


    In fact, there is so little joy that ignoring functional errors, unfortunately,
    comes second nature to me. I often say to myself, “I didn’t see any errors when
    recording the load generation script, so how could there be a problem when I’m
    replaying that same script?”


    Several years ago, we were struggling to find out why performance was so horrible.
    I was refactoring a load script to read usernames and passwords (they were test
    passwords. honest, they really were) from a `.csv` file so that my load generator
    script would not log on to the SUT with the exact same user for every thread.
    We wanted to know whether the SQL caching code was working (and performing well).
    After I refactored the script, the load test successfully logged on hundreds of
    users (or so I thought) and response time was blazingly fast and throughput doubled
    (or did it triple?). I announced the great results to the team and a celebration
    ensued.


    But what actually happened was that I forgot to put the right two-character prefix
    on the users’ IDs in my newly-created `.csv` data file, so zero of my users even
    logged on successfully, and zero of the business processes I had scripted were
    getting put through their paces. When I corrected the user names in the data file
    (duh), our original crappy performance was fully restored. Yeah! Performance testing
    is littered with bittersweet, dubious victories like this. As such, I had been
    load testing a lot of SUT failure, which is certainly not a priority in our Grand
    Focus.


    So please learn from my mistakes, spend the time to enhance your load scripts
    to not only check for functional errors in each HTTP or other SUT response, but
    also make sure that the correct response is present. I will repeat this because
    it is very important: Your load script must check for the absence of common errors,
    (“exception” and “error” and other error message text) as well as the presence
    of the expected results, like an account balance on an inquiry, or a generated
    unique ID when creating an order. Richard Feynman once said “The first principle
    is that you must not fool yourself—and you are the easiest person to fool.”


    Make skepticism in the performance results a team sport that will build team confidence
    in the whole tuning process. Error counts should get first-class billing, right
    alongside throughput and other metrics.


    A reviewer once wrote the following about the Pixar animated movie “Wall-E”:


    “These robots, beings not usually considered to have emotions … must convince
    the audience of their souls and personalities.”


    As performance engineers, it is our job to convince our audience (our dev/QA team
    and our client) that the load test is real, that the load test inflicts stress
    on the SUT very much like the stress in production. Why? So the team will be motivated
    to fix any performance problems that arise. Sometimes, I am so skeptical of load
    test results (really, just afraid of all the embarrassment) that I will count
    the rows in important SUT RDBMS tables. Generally, I pick the largest ones that
    change the most. I will then make sure that before-test and after-test table counts
    jibe with the throughput results from the load generator. For example, say that
    the load generator reported that ten “Create new account” processes executed every
    second of a 300 second test. After the test, I would then make darn well sure
    that the account table contained about 3,000 more records than it did before the
    test started.


    You might think that these kinds of errors from the SUT can be detected and managed
    by getting the load generator to log the full HTTP request and response for all
    threads. I know I did, at one time. Chapter [7](#A449023_1_En_7_Chapter.html)
    shows that too much load generator logging kills load generator performance and
    skews the results of the entire test. This much verbosity is invaluable for troubleshooting
    problems with playback of a single thread, but gets in the way otherwise.


    When your load generator is tallying test results, separating the wheat from the
    chaff, the success from the failure, most load generators provide a way for us
    specify what SUT responses indicate an error. I strongly encourage use of both
    techniques to flag errors. Chapter [7](#A449023_1_En_7_Chapter.html) will show
    you how to:


    - Flag errors because an important part of an HTML response (like an account balance
    on a balance inquiry) is missing.

    - Flag errors when text for an exception shows up in an HTML response.

    - Provide high-level overview of how many errors show up and when.


    How much validation to add is up to you. I hope the earlier vignette shows the
    problems with too little validation that happen all too frequently. But adding
    too much validation takes up time that could be spent optimizing code. Too much
    validation can also cause load generator performance to degrade. For instance,
    validating 20 different data items on a single page is probably overkill for a
    performance test (but reasonable for a functional test). I’ve had no problems
    with load generator overhead while validating 3-5 data items per HTTP response
    while running 1,000 requests per second, generating load from a single, modern
    desktop-class machine. If you have overwhelmed the CPU/RAM of a load generator
    at this volume, then that is a problem worth your time to fix.


    When a load test applies `3t0tt`, it is applying three threads of load with zero
    think time. In my experience, this is more than enough load to flush out most
    errors in multi-threaded code. The classic signature of this kind of a problem
    is a small but steady flow of errors. If your tests have regularly have garden
    variety functional errors, your ability to detect multi-threaded errors will be
    diminished or gone altogether. Aim for zero errors in your load tests.'
