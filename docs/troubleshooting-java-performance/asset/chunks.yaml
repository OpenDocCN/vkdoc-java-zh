  trans: '

    ### 解读结果


    校准测试已完成，现在你知道需要多少负载线程才能将被测系统（SUT）的 CPU 消耗推至约 25%。我从校准测试中取出了结果“2”，并将其放入负载计划中，创建了一个步进为
    2-4-6-8 的可扩展性标尺测试。每分钟增加两个负载线程；在 4 分钟测试的最后一分钟，有八个线程在运行。当你的负载脚本单次迭代耗时（例如）少于 10 秒且思考时间为零时，在每个负载级别停留
    1 分钟是可行的。这是一个非常粗略的指导原则，旨在确保你的脚本在每个负载步骤中至少重复数次（本例中为六次）。


    图 6-4 显示了测试结果。这部分需要稍加思考，请做好准备：图例（截图顶部）中的 x100 意味着黑色线条上的数值 200、400、600 和 800 实际上代表
    2、4、6 和 8 个负载生成器线程。这是由 jmeter-plugins.org 的自动缩放功能导致的。更多详情请阅读此处：


    ![A449023_1_En_6_Fig4_HTML.jpg](img/A449023_1_En_6_Fig4_HTML.jpg)


    图 6-4.


    蓝色线条显示了由可扩展性标尺生成的、呈方形阶梯状的吞吐量，这意味着该系统具备可扩展性。为了生成此图，吞吐量指标被添加到了图 6-3 中使用的同一个图形组件中。


    [`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)


    可扩展性标尺旨在找出被测系统在 CPU 消耗为 25%、50%、75% 和 100% 时的吞吐量，图 6-4 展示了这一点。蓝色线条显示这四个吞吐量里程碑（大致）为每秒
    1800、3300、4200 和 5100 个请求。由于四个步骤中的每一步都生成了一个漂亮的方形吞吐量块，因此这个特定的被测系统调优得非常好。


    相比之下，图 6-5 展示了一个存在性能缺陷的被测系统。看到原本方形的阶梯状负载是如何被软弱无力的、摇摇欲坠的吞吐量所取代的吗？


    ![A449023_1_En_6_Fig5_HTML.jpg](img/A449023_1_En_6_Fig5_HTML.jpg)


    图 6-5.


    这里使用了与图 6-4 相同的图形配置，但我引入了一个性能缺陷（我认为是较高的 GC 时间），使得方形的阶梯状消失了。这就是系统不具备可扩展性时的表现。


    对于那些对将 CPU 推至 100% 犹豫不决的人，如果不这样做，我们又如何能发现系统在额外 CPU 可用时是否能够利用它呢？我们知道将 CPU 推至 100%
    不会损坏机器，因为杀毒软件对桌面工作站 CPU 这样做已经十年了。


    以下是其他几位 Java 性能领域作者的一些引述，表明这种方法走在正确的轨道上，尤其是关于将 CPU 推至 100% 的部分：


    > “目标通常是让处理器保持完全利用。” ——《Java 并发编程实战》，Brian Goetz 等（Addison-Wesley, 2006），第 240
    页

    > “对于一个行为良好的系统，吞吐量最初会随着并发用户数的增加而增加，同时请求的响应时间保持相对平稳。” ——《Java 性能》，Charlie Hunt,
    Binu John（Addison-Wesley, 2011），第 369 页


    由图 6-4 中的黑色线条驱动，标尺中的四个步骤中的每一个都相当于要求被测系统进行跳跃。蓝色吞吐量线中的四个阶梯表明，被测系统对每个负载步骤都做出了跳跃响应。请务必注意，每一步都需要一个漂亮的方形
    CPU 消耗（黄色）阶梯/跳跃。当负载生成器发出跳跃指令时，被测系统就跳跃了，只有经过良好调优且可扩展的被测系统才会如此跳跃。


    在可扩展性标尺的四个 CPU 里程碑中，我们最关心的是 100% 这个里程碑。我们最终想知道的是，当负载生成器施加额外的吞吐量步骤时，被测系统是否能够利用这个
    CPU 的 100% 以及随后添加的所有 CPU 的 100%，以产生越来越多的吞吐量跳跃。这就是可扩展性。


    让我们快速看一个如何使用这些数字的例子。假设我们的客户正在从别人的系统升级到我们的系统。他们之前系统在高峰时段的数据显示，客户需要达到每秒 6000 个请求（RPS）。


    让我们使用图 6-4 中可扩展性标尺测试的图表。它显示我们遇到了麻烦——图中的 5100 RPS 有点不够，因为在达到客户 6000 RPS 的目标之前，我们的
    CPU 已经用完了。该怎么办？我们需要做不可能的事——将 CPU 消耗从 100% 推到 101% 甚至更高。这就像有人希望他们汽车收音机的音量旋钮能超过最大刻度
    10，达到 11 一样。


    要达到 6000 RPS，我们必须添加更多机器来分担负载（形成集群），并使用负载均衡器在机器之间分配负载。或者，我们可以为原始机器添加额外的 CPU。这是经典且强大的可扩展性概念。


    当单台机器上的应用程序能够逐步将 CPU 的每一个比特转化为可观的吞吐量时，很容易看出，一旦提供了额外的 CPU，它也能够利用它们。


    图 6-5 描绘了没有方形阶梯状步骤的系统——这是一个不具备可扩展性的系统。如果没有进一步的调优，它就没有扩展的希望，因为无论施加多少负载线程，吞吐量都无法接近
    6000。


    如果增加更多用户无法带来额外的吞吐量，那么系统就无法扩展。这就是这里的教训。


    ## 不完美但至关重要


    我永远不会忘记这个关于调优的痛苦故事。在经历了 12 周艰苦卓绝、长时间的工作，试图为一个要求特别苛刻的客户达到前所未有的吞吐量之后，我们被打败了，筋疲力尽。拥挤且空气污浊的会议室里一片寂静，你甚至可能不知道我们实际上在庆祝，但我们确实在庆祝——只是太累了，兴奋不起来。系统终于扩展了，或者至少我们认为是这样。硬件翻倍使吞吐量翻倍——这很好。硬件增加三倍使吞吐量增加了三倍，但可扩展性到此为止，之后安静的会议室又忙碌起来。没有人预测到这个问题，因为这个问题本身就无法预测。


    可扩展性标尺测试，像所有预测工具一样，是不完美的；它无法预测未经测试的情况，就像这个（基本真实的）小轶事一样。但尽管可扩展性测试不完美，它们仍然至关重要。标尺衡量了所有可扩展系统的关键方面：在所有
    CPU 消耗水平下产生均匀吞吐量阶梯的能力。没有这样的工具，我们就会在软件开发生命周期（SDLC）阶段及之后盲目摸索，对我们追求的目标——可扩展性——的进展一无所知。


    回到那个拥挤的会议室，当时是有进展的。负载均衡器上配置的一个并发上限阻止了额外节点产生更多吞吐量。修复配置后，在我们的系统中添加第四个节点使吞吐量翻了两番，推动我们超越了艰难的目标，并展示了出色的可扩展性。

