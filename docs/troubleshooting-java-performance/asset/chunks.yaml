    The Histogram in Figure [12-12](#A449023_1_En_12_Chapter.html#Fig12) looks very
    similar to `jmap` output, but it is very interactive. For instance, the MAT GUI
    does an excellent job of managing massive lists of objects. It displays a single
    screenful and allows you to Click for More. But Figure [12-12](#A449023_1_En_12_Chapter.html#Fig12)
    uses a different feature to manage the massive quantity of objects—a simple filter.
    See at the top-left, where I entered a regular expression to find all objects
    matching `*stermueller*`?


    ![A449023_1_En_12_Fig12_HTML.jpg](A449023_1_En_12_Fig12_HTML.jpg)


    Figure 12-12.


    Eclipse MAT Histogram that shows counts and byte counts of all instances. Note
    that the MyMemoryLeak class shows up right at the top. This is very much like
    `jmap`, but interactive. You can sort it in various ways and easily right click
    and drill down to see all the objects this class points to, and all the objects
    that point to the selected class.


    That is a very handy feature. In this screenshot, MAT has already detected the
    2-3MB of data in my package space that is causing the leak. This is an indispensable
    tool.


    In Figure [12-13](#A449023_1_En_12_Chapter.html#Fig13), I am right-clicking and
    drilling down to see what “container” class might be holding references to me,
    keeping “me” from getting collected. This is called looking for GC roots. In my
    simple example, we already know the answer to this question. But perhaps half
    the time I am looking at very unfamiliar code and need this feature very much.


    ![A449023_1_En_12_Fig13_HTML.jpg](A449023_1_En_12_Fig13_HTML.jpg)


    Figure 12-13.


    I right-clicked a leaky object to find the “roots”—what object is keeping this
    from getting collected


    The result is this very nice tree view in Figure [12-14](#A449023_1_En_12_Chapter.html#Fig14),
    where we finally see the gory detail of the object parentage that we have been
    seeking.


    ![A449023_1_En_12_Fig14_HTML.jpg](A449023_1_En_12_Fig14_HTML.jpg)


    Figure 12-14.


    The ‘Merge Shortest Path to GC Roots’ screen from Eclipse'
  trans: '

    ### 使用 Eclipse MAT 查找内存泄漏


    通常，如果你要修复内存泄漏，就必须修改代码。目标是找出所有不会被垃圾回收器回收的泄漏对象，但主要是要弄清楚为什么这些对象没有被回收。答案往往在于对象层级结构——哪些类拥有并持有那些充斥堆内存的类的实例。这本质上是在寻找父级关系——谁拥有谁。


    本节将使用 Eclipse MAT 来查找泄漏源。IBM Heap Analyzer 是一个不错的替代品。它有时具有更好的自动泄漏检测功能，但其 Swing
    GUI 速度较慢，在对象图中导航更困难，显示的信息也比用 Eclipse RCP/SWT 编写的 MAT 少。让我们回到 MAT。


    从以下网址下载并安装 MAT：[`http://www.eclipse.org/mat/`](http://www.eclipse.org/mat/)。然后，我选择了“文件
    -> 打开堆转储”菜单选项，并指向我在清单 12-10 中捕获的 `myDump8.dat`。


    在你的桌面上运行 MAT 需要大量的处理能力，尤其是当堆大小超过 1GB 时。


    我建议在你的桌面上配备 32GB 内存，并在 MAT 的 `MemoryAnalyzer.ini` 文件的 `-Xmx` 参数中，将大约一半的内存分配给 MAT。


    ### Eclipse MAT 自动泄漏检测


    MAT 提供了三个基本上能进行自动泄漏检测的报告。不要忽略这些报告。它们是：


    *   堆转储概览

    *   主要组件

    *   泄漏嫌疑人


    我要说的是，它们的功能和目的之间存在显著的重叠。


    当 Eclipse 打开你的堆转储时，它会询问你是否要创建一份“泄漏嫌疑人”报告。我选择了该选项，MAT 显示了图 12-10。“泄漏嫌疑人”视图不是一个交互性很强的饼图，但底部的“详细信息”超链接确实允许你探索堆的对象图。


    ![A449023_1_En_12_Fig10_HTML.jpg](img/A449023_1_En_12_Fig10_HTML.jpg)


    图 12-10.


    Eclipse MAT 的“泄漏嫌疑人”视图正在查看来自 littleMock 的堆转储。在我见过的大约三分之一到一半的堆转储中，此屏幕会相当准确地指向泄漏实例和/或包含它们的对象。


    事实上，图 12-10 中的这个截图已经找到了包含所有泄漏对象的容器。看到底部的 `OldGeneratioRepo` 了吗？littleMock 将所有
    `MyMemoryLeak` 对象存储在这个对象中，具体的集合在清单 12-11 中。这个队列是存储所有泄漏对象的对象，取自 littleMock github
    仓库中 `OldGenerationRepo.java` 的源代码。


    ```

    Queue allOldGenData = new LinkedBlockingQueue();

    清单 12-11.

    OldGenerationData 队列

    ```


    ### 在 Eclipse MAT 中探索


    在转储文件名的正下方，有一组我非常依赖的实用图标（图 12-11）。


    ![A449023_1_En_12_Fig11_HTML.jpg](img/A449023_1_En_12_Fig11_HTML.jpg)


    图 12-11.


    Eclipse MAT 的可用性还不错。我通常依赖这里的图标来帮助我导航。


    表 12-2 详细说明了图 12-11 中每个图标的位置、名称和用途。


    表 12-2.


    图 12-11 中显示的 Eclipse MAT 图标


    | 工具栏上的位置 | 报告名称 | 描述 |

    | --- | --- | --- |

    | 最左侧图标 | 概览 | 显示一个饼图，其中包含消耗最大的类/包。 |

    | 左起第二个图标 | 直方图 | 右键单击可向下钻取传入和传出的引用。 |

    | 左起第三个图标 | 支配树 | 与直方图非常相似，但通过左键单击向下钻取。 |

    | 左起第四个图标 | 对象查询语言 | 类似 SQL 的语言，允许你查询对象所有权树。 |

    | 左起第五个图标 | 双齿轮 / 线程概览 | 基本上包含一个高级线程转储，还显示线程和线程本地存储中的分配。对于查找正在创建快速内存泄漏的堆栈跟踪非常有帮助。
    |

    | 左起第六个图标 | 报告 | 泄漏嫌疑人和其他报告。 |

    | 左起第七个图标 | 数据库罐 / 查询浏览器 | 提供与直方图视图中相同的右键单击向下钻取选项。 |

    | 左起第八个图标 | 搜索 / 放大镜 | 通过十六进制对象地址查找对象。 |


    图 12-12 中的直方图看起来与 `jmap` 输出非常相似，但它的交互性很强。例如，MAT GUI 在处理大量对象列表方面做得非常出色。它一次显示一屏内容，并允许你“点击查看更多”。但图
    12-12 使用了不同的功能来管理海量对象——一个简单的过滤器。看到左上角了吗？我在那里输入了一个正则表达式来查找所有匹配 `*stermueller*`
    的对象。


    ![A449023_1_En_12_Fig12_HTML.jpg](img/A449023_1_En_12_Fig12_HTML.jpg)


    图 12-12.


    Eclipse MAT 直方图，显示所有实例的计数和字节数。请注意，`MyMemoryLeak` 类直接显示在顶部。这与 `jmap` 非常相似，但它是交互式的。你可以通过各种方式对其进行排序，并轻松地右键单击并向下钻取，以查看此类指向的所有对象，以及指向所选类的所有对象。


    这是一个非常方便的功能。在此截图中，MAT 已经检测到我的包空间中导致泄漏的 2-3MB 数据。这是一个不可或缺的工具。


    在图 12-13 中，我右键单击并向下钻取，以查看哪个“容器”类可能持有对我的引用，从而阻止“我”被回收。这被称为查找 GC 根。在我的简单示例中，我们已经知道这个问题的答案。但大约有一半的时间，我在查看非常不熟悉的代码，非常需要这个功能。


    ![A449023_1_En_12_Fig13_HTML.jpg](img/A449023_1_En_12_Fig13_HTML.jpg)


    图 12-13.


    我右键单击了一个泄漏对象来查找“根”——是哪个对象阻止了它被回收


    结果就是图 12-14 中这个非常漂亮的树状视图，我们终于看到了我们一直在寻找的对象父级关系的详细细节。


    ![A449023_1_En_12_Fig14_HTML.jpg](img/A449023_1_En_12_Fig14_HTML.jpg)


    图 12-14.


    来自 Eclipse 的“合并到 GC 根的最短路径”屏幕

