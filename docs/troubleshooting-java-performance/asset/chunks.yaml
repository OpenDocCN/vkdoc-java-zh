  trans: "\n## 前置条件\n\n在结束本章之前，我将列出一份你应该掌握的事项清单：\n\n*   录制 JMeter 负载脚本。录制过程中，将每一个字节都保存到日志文件中，以备将来参考。\n\
    *   将登录脚本标记为“仅运行一次”。\n*   以无头模式运行 JMeter。\n*   调试 JMeter 负载脚本。\n*   配置负载脚本以使用\
    \ `.csv` 数据文件中的数据。该文件应包含要登录的用户列表、要查询的账户和客户列表。\n*   创建断言以验证某些操作确实发生了，即你的被测系统（SUT）确实在正常工作。\n\
    *   使用关联变量，捕获一个请求的输出并将其提交给另一个请求的输入。\n*   创建负载递增和递减的负载计划。\n*   创建一个根据生产环境中业务流程百分比来分配负载的负载计划。\n\
    *   创建并使用 JMeter 变量，或许可以从命令行读取变量。\n\n负载生成特性：\n\n*   使用多种网络协议：HTTP/S、JMS、Sockets、JDBC。\n\
    *   以无头模式运行；也可以在与 SUT 相同的机器上运行。\n*   使用 JMeter 便捷的复制/粘贴功能。\n\n图表特性：\n\n*   复合图表\n\
    *   CPU/资源消耗\n*   JMX\n*   Grafana/InfluxDB 集成\n\n必须了解：\n\n*   避免过多的日志记录。\n* \
    \  `.jtl` 文件\n    *   读取\n    *   写入\n    *   输出文件数量？1、2 或 3 个\n    *   合并\n \
    \   *   清除 UI 结果不会清除数据文件。\n*   使用 JDBC 取样器创建数据。\n*   使用“查看结果树”保存初始录制内容。\n*   管理颜色。\n\
    *   Maven、ANT、Jenkins 集成。\n*   线程组：分离取样器（SOA）或组合取样器（Web）。\n*   调试技巧：\n    *  \
    \ 在将测试计划连接到真实的 HTTP 系统之前，使用虚拟取样器指定示例 HTML 响应。BSF 后置处理器：`var myVariable = vars.get(\"\
    MY_VARIABLE\");` `OUT.println('MY_VARIABLE 的值是 [' + myVariable + ']' )`\n*   断言。配置断言，当出现错误文本时触发警告。\n\
    *   监听器应放置的位置。\n\n## 别忘了\n\n本章介绍了 JMeter 的一些功能，这些功能很少（如果有的话）被记录在案，以及其他虽有文档记录但仍给许多我教过的技术人员带来麻烦的功能。\n\
    \n别忘了，如果你无法弄清楚如何让某个 JMeter 功能正常工作，可以创建一个小的“Hello World”沙盒式 `.jmx` 脚本来试验该功能。将一段\
    \ HTML（或 json、XML 等）代码片段复制粘贴到虚拟取样器中，以便你的测试计划可以对其进行操作。几乎每一个 JMeter 测试元素都可以这样测试。你可以试验日志记录、负载计划、关联变量、JMeter\
    \ 断言、复合图表（同一图表上的多个指标），应有尽有。\n\n## 下一步\n\n下一章将概述本书附带的两个示例应用程序。这些应用程序重现了“一次编写，到处运行”（WORA）的性能缺陷，这些缺陷在大型和小型环境中均可检测到。这些示例将为你提供动手经验，让你在可用的情况下连接“即插即用”的性能和可观测性工具，帮助你快速发现并修复性能缺陷。\n\
    \n脚注 1\n\n[`http://jmeter-plugins.org/wiki/Contributors/`](http://jmeter-plugins.org/wiki/Contributors/)\n\
    \n  2\n\n[`http://jmeter.apache.org/usermanual/get-started.html#template`](http://jmeter.apache.org/usermanual/get-started.html#template)\n\
    \n  3\n\n我本人从未在 ESL 课堂上垫底，但在堪萨斯大学攻读计算机学位之前，我确实在俄语课程中不及格。\n\n# 第三部分\nP.A.t.h. 检查清单与性能故障排除\n\
    \n# 8. P.A.t.h. 检查清单简介\n\n在引言中，我曾问过你能否在短短 30 分钟内接近性能问题的根本原因。这大约就是捕获和审查 P.A.t.h.\
    \ 检查清单中四项数据所需的时间。\n\n但在深入探讨检查清单的技术细节之前，本章将快速回顾前几章的内容。然后，它将描述在故障排除时如何使用检查清单，最后简要介绍两组代码示例。\n\
    \n本章的目标是：\n\n*   理解使用 P.A.t.h. 检查清单识别和修复性能问题的基本原则。\n*   理解如何运行 javaPerformanceTroubleshooting\
    \ 和 littleMock 代码示例。\n*   理解 javaPerformanceTroubleshooting 和 littleMock 代码示例的架构。\n\
    \nP.A.t.h. 检查清单中的前两项，即数据库持久化（P）和与其他（外部=A）系统的网络连接，是历史上常见的导致性能问题的集成点。JDBC 是持久化工作的重点，但这些概念几乎适用于任何数据库。最后两项，t.\
    \ 和 h.，则检查执行代码的线程（t）和内存消耗（h.，即堆），以及其内存回收过程——垃圾回收器。因此，P.A.t.h. 检查清单更深入地审视了几个关键集成点的性能健康状况，以及支撑所有处理的线程和内存管理。是的，本书的重点是最常见的问题，但所使用的工具集能够发现几乎任何问题。\n\
    \n对于真实世界的系统，你需要查看 P.A.t.h. 检查清单中所有四项的数据。你需要判断哪一项看起来最不健康，然后专注于调优该部分。但在接下来的四个 P.A.t.h.\
    \ 章节中，我会直接告诉你哪个检查清单项（提示：看章节标题）是导致拖累性能的主要单一性能问题，从而让你更轻松。\n"
- fmt: "# Quick Review\n\nThe first three chapters set the stage for what to expect\
    \ when performance tuning.\n\n- Chapter [1](#A449023_1_En_1_Chapter.html): I presented\
    \ the Main Performance Anti-Patterns early on so you have a rough idea what to\
    \ look for when hunting for performance defects. Start with the first anti-pattern,\
    \ and ask whether it matches the problem that you’re seeing. If you find a match,\
    \ generally you can stop; otherwise check out the second, third, and fourth ones\
    \ in order.\n    1.  Unnecessary Initialization: Small processing challenges that\
    \ mostly happen prior to and during the initialization for the main (larger) processing\
    \ event in your request, they often have a small amount of I/O but are repeated\
    \ many times.\n    2.  Strategy / Algorithm Inefficiency: A misconfigured or poorly\
    \ chosen algorithm or coding strategy is causing performance problems. A strategy\
    \ is a technique used throughout a code base, and an algorithm is a plan used\
    \ to implement a single component.\n    3.  Overprocessing: The system is doing\
    \ unnecessary work. Removing that work provides measurable performance benefit.\
    \ One example is retrieving too much data, where most of the data is discarded.\
    \ Another example is including in your load test the wrong resource-hungry use\
    \ case—one that is seldom used in production.\n    4.  Large Processing Challenge:\
    \ Attempting to process and conquer a massive amount of data. Very few applications\
    \ legitimately have such a need, but these do exist. Other examples would be querying\
    \ 4 billion rows of data, transferring 10MB of data repeatedly over a slow network,\
    \ and the like.\n- Chapter [2](#A449023_1_En_2_Chapter.html): A Modest Tuning\
    \ Environment: This chapter showed how most performance defects can be found in\
    \ both large and small environments. It showed a few techniques (stub servers,\
    \ graphing CPU by PID) that are very helpful for tuning in a smaller environment,\
    \ where tuning can be especially productive, with as many as 10 fix-test cycles\
    \ in a single day.\n- Chapter [3](#A449023_1_En_3_Chapter.html) on metrics is\
    \ a life preserver to keep you from drowning in a vast sea of confusion deciding\
    \ which performance metrics to use:\n    - Load generator metrics, for the most\
    \ part, assess whether performance requirements have been met. Enough throughput?\
    \ Fast enough response time?\n    - Resource consumption metrics show when you\
    \ have run out of hardware, CPU or RAM, meaning you’ll either need more hardware\
    \ or you need to tune the system to consume less.\n    - Lastly, “Blame metrics”\
    \ point to which component in the SUT is causing the slowdown or high CPU consumption;\
    \ this is the part we are about to get to. The P.A.t.h. Checklist in the next\
    \ four chapters provides these ‘blame’ metrics.\n\nBut before you can reproduce\
    \ and solve performance troubleshooting problems, you must first master the basics\
    \ of load generation, as I have detailed in the load generation Chapters [4](#A449023_1_En_4_Chapter.html),\
    \ [5](#A449023_1_En_5_Chapter.html), [6](#A449023_1_En_6_Chapter.html) and [7](#A449023_1_En_7_Chapter.html).\
    \ Let’s cement those basics in your head with a quick overview before moving on\
    \ to the part where we cast blame upon slow or otherwise problematic SUT components.\n\
    \n- Chapter [4](#A449023_1_En_4_Chapter.html) on load scripting priorities discussed\
    \ how load scripts must be recorded and enhanced to produce a realistic load.\
    \ Don’t forget how we broke down the various script enhancements into First Priority\
    \ and Second Priority. The First Priority script enhancements are enough to stress\
    \ out the SUT’s basic architecture, where fixing a single performance defect can\
    \ improve performance for many business processes across the entire architecture.\
    \ The Second Priority script enhancements aim for that added touch of “system\
    \ realism” on individual business processes. Fixing these kinds of defects might\
    \ be critical, but their impact is limited to individual business process.\n-\
    \ Chapter [5](#A449023_1_En_5_Chapter.html) on Invalid Load Tests details a few\
    \ circumstances (seen all too frequently) that make a given load test so unlike\
    \ production that the results should be discarded. This is your chance to learn\
