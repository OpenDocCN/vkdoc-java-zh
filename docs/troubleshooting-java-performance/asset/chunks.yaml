    angst. This section provides a minimum check-list of “must have” load script enhancements,
    the ones required to convince you and your team of the validity of your load test.
    But also, look at the “First Priority” version as a cap: Once you have added these
    First Priority enhancements, stop. Focus on addressing the main performance defects
    uncovered by the P.A.t.h. Checklist in Chapter [8](#A449023_1_En_8_Chapter.html).
    Once you have the biggest issues under control, then you can jump to the Second
    Priority load scripting enhancements, later in this chapter, to finish off the
    job, and deliver some great performance.'
