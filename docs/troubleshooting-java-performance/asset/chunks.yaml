  trans: '

    ## 测试 05：单条 SQL 的性能问题


    从 Glowroot 捕获的测试结果：


    *   测试 05a：每分钟 3,500 个请求；响应时间 50 毫秒。

    *   测试 05b：每分钟 14 个请求；响应时间 13,500 毫秒


    你需要关注的指标：


    *   所有已执行 SQL 语句的响应时间和吞吐量

    *   提供这些数据的几个工具：Glowroot、JavaMelody、JDBC Performance Logger


    测试 05b 的响应时间超过 13 秒，速度极其缓慢，吞吐量也非常低。事实上，其吞吐量比 05a 低 250 倍，但原因何在？


    在现实世界中，你还需要检查其他 P.A.t.h. 项目是否存在问题，但由于本章是关于持久化的，让我们直接深入 SQL 指标，看看是什么导致了这 13.5 秒的响应时间。首要任务是找出响应时间最慢的查询，尤其是那些执行频率很高的查询。然后，我们将看看是否可以进行一些明显的改进。


    图 9-1 展示了一个性能远比其他两个查询慢的查询：


    ![A449023_1_En_9_Fig1_HTML.jpg](img/A449023_1_En_9_Fig1_HTML.jpg)


    图 9-1.


    对于测试 05a，由 glowroot.org 提供的所有 SQL 的吞吐量和响应时间。最上面一行最慢的查询（平均 358.5 毫秒）恰好也是总耗时最多的那个。


    ```

    SELECT hid from history WHERE aid = ?

    ```


    因为我们正试图解决 13.5 秒的响应时间问题，并且这个查询的响应时间（平均 358.5 毫秒，见下方最上面一行）比其他两个查询慢 10 倍以上，所以值得花些时间进一步调查这个查询。即使只是慢几倍，也值得调查。


    在这个查询中，没有与其他表的 JOIN 操作，选择的字段列表非常短（只有 Hid 列），并且 `WHERE aid = ?` 的条件也很简单。整个查询非常基础。事实上，其他查询也同样基础，原因也类似。那么，为什么这些“基础”查询的性能差异如此之大呢？


    在许多开发团队中，SQL 调优主要落在（希望是）能力足够的 DBA 肩上，这没问题。但即便如此，即使开发人员对单个查询的性能几乎不负责或完全没有责任，我认为开发人员至少需要对如何让基础查询（包括本例中的基础查询）良好运行有一些基本的理解。更具体地说，开发人员需要：


    *   在对 SQL 进行任何更改时通知 DBA，以便 DBA 可以全面审查其性能，特别是评估是否需要添加、更改或删除索引以使查询良好运行。

    *   知道如何判断一条 SQL 语句是否使用了索引。这可以通过向数据库请求查询的“执行计划”来完成。如果计划显示“表扫描”，那么很可能你的查询没有使用正确的索引，并且会出现性能问题。


    当然，还有其他问题可能导致性能问题，但所有开发人员都应该了解这些基础知识。正如你可能已经猜到的，测试 05b 之所以如此缓慢，是因为 Glowroot 识别出的那个慢查询正在查询
    HISTORY 表中一个没有索引的列。哎呀。测试 05a（图 9-2）修复了这个问题。该测试使用了同一数据库的另一个版本，其中包含了正确的索引。查询响应时间从没有索引时的
    358.5 毫秒得到了改善。


    ![A449023_1_En_9_Fig2_HTML.jpg](img/A449023_1_En_9_Fig2_HTML.jpg)


    图 9-2.


    现在所有数据库索引都已就位，所有查询的响应时间都快于 1 毫秒。


    此博客页面展示了排查和修复因缺少 H2 数据库索引而导致性能问题的所有必要步骤：


    [`http://ostermueller.blogspot.com/2017/05/is-my-h2-query-slow-because-of-missing.html`](http://ostermueller.blogspot.com/2017/05/is-my-h2-query-slow-because-of-missing.html)


    对于其他数据库，检索和分析执行计划的过程类似，但你需要向 DBA 或数据库文档寻求具体细节的帮助。是 DBA 负责检测问题，还是 DBA 依赖开发人员设定调优优先级？这些都是需要决定的重要事项，而像
    glowroot.org 提供的良好 JDBC 性能数据对于为 DBA 设定优先级非常有帮助。


    查询响应时间实际上由两部分组成，我们在故障排查时往往不常讨论：执行和可选的**结果集迭代**。像图 9-2 中的问题那样的索引问题会导致第一部分——执行——变慢。


    我刚刚回顾了一下第 2 章中表 2-1 的 jpt 性能结果列表。它显示 jpt 测试 04a 包含一个结果集迭代缓慢的示例。如果你运行这个示例并捕获一些线程转储，你会看到
    `java.sql.ResultSet#next()` 方法反复出现，但在其他测试中不会反复出现。这就是你如何检测查询性能第二部分——结果集迭代——问题的方法。


    到目前为止，我们主要关注单个查询的性能如何导致问题。本章的其余部分将专门讨论作为单一数据库策略的一部分，多个 SQL 语句协同作用（还是不良协同作用？）所导致的性能问题。


    ## 多条 SQL 语句的性能问题


    在《Java 性能权威指南》（O''Reilly，2014）的开头部分，Scott Oaks 有一个奇特的小章节，恰如其分地命名为“另寻他处：数据库永远是瓶颈”。这实际上只有一两页，警告不要将所有性能问题都归咎于
    Java，因为无论使用何种编程语言，数据库性能问题都很可能掩盖任何普通的 Java 性能问题。我大体上同意这一点；这就是为什么本书附带的 12 个 jpt
    负载测试中，大部分都包含数据库活动的原因。


    从开发人员的角度来看，我认为数据库性能就像是在驯服一头双头海蛇：


    *   蛇的第一个头：单个查询的性能，正如我们缺少索引的例子所示。

    *   蛇的第二个头：执行一组 SQL 语句的累积性能开销，例如为一个业务流程执行的所有 SQL。


    许多团队都在努力寻找并留住能够与开发团队协作、控制单个查询性能的 DBA（或其他人员）。这是蛇的第一个头。


    第二个头是管理来自单个组件的一组查询的性能，更简单地描述为“数据库调用过多”的问题。这个问题在很大程度上未被开发团队重视，但一小部分直言不讳的人十多年来一直在警告这个问题。时至今日，它仍然造成很多痛苦。本章开头的博客文章
    URL 显示了我们与这个问题共存了多久。


    “数据库调用过多”问题背后有两个主要的反模式。让我们看看第一个，称为 SELECT N+1 问题；它本可以很容易地被命名为“循环中的 SELECT”。

    '
- fmt: '### The First Issue: SELECT N+1


    Recognizing the `SELECT N+1` in code is pretty straightforward. Just look for
    any `SELECT` executed in a loop, especially when the loop iterates through the
    result set of a different `SELECT`. In the example shown in Listing [9-1](#A449023_1_En_9_Chapter.html#Par43),
    for each iteration through the outer result set, one `SELECT` is executed.


    ```

    ps = con.prepareStatement(

    "SELECT hid from history "

    +"WHERE aid = " + accountId);      // outer SELECT

    rs = ps.executeQuery();

    while(rs.next()) {               // start of loop

    long hID = rs.getLong(1)

    ps = connection.prepareStatement(

    "SELECT tid, hid tid, hid, "

    +"bid, aid, mtime from"     // SELECT executed

    +"HISTORY WHERE hid = ?");   // inside loop

    ps.setLong(1, hID);

    histRs = ps.executeQuery();

    short count = 0;

    Listing 9-1. Partial source code example of SELECT N+1 anti-pattern. For each
    row in the set of N items in the outer result set, an additional 1 query is executed.
    One way to refactor this is to join the outer and the inner table. Yes, the join
    is faster than the chatty behavior.

    ```


    In this example, both the outer and the inner query hit the `HISTORY` table, but
    most times the outer and inner `SELECT`s hit different tables that should probably
    be joined together.


    But what does `SELECT N+1` mean? Jeremy Bentch, a software architect from Portland,
    OR, described it to me this way: given a collection of `N` rows in a result set,
    do 1 additional query for each. `N+1`.


    Here is another angle, aside from "Look for `SELECT`s in a loop." Martin Fowler
    has written two books on the "Most Influential Book Every Programmer Should Read"
    list on `stackoverflow.com`; he is certainly an important voice. Way back in 2003,
    he wrote:


    > "Try to pull back multiple rows at once. In particular, never do repeated queries
    on the same table to get multiple rows."


    [`http://www.informit.com/articles/article.aspx?p=30661`](http://www.informit.com/articles/article.aspx?p=30661)


    This is a great, succinct way to address this problem. But unfortunately, it still
    doesn''t quantify how bad the performance problem is.


    #### Five Variations of SELECT N+1 Load Tests


    So to quantify the performance problem, I coded up five different variants of
    a `SELECT N+1` issue and found that there was a dramatic performance difference
    between the five strategies, as shown in Figure [9-3](#A449023_1_En_9_Chapter.html#Fig3).


    ![A449023_1_En_9_Fig3_HTML.gif](A449023_1_En_9_Fig3_HTML.gif)


    Figure 9-3. Chunky outperforms chatty. Strategy 5, the chattiest of the five,
    has the worst performance in this test. All the queries were very fast (∼20ms
    or less). Slower queries would certainly exaggerate this problem.


    In Figure [9-3](#A449023_1_En_9_Chapter.html#Fig3), strategy 2 had the best performance
    and strategy 5 had the worst—it has the most SQL executions. The fastest test,
    strategy 2, had the fewest SQL executions, with the exception of strategy 1, which
    I will come back to in a minute. Each strategy provides a different implementation
    of the exact same SOA service with this use case:


    *   Given 10 bank account numbers, return transaction history and balance info
    for all accounts. All five strategies must build the response data using exactly
    the same POJOs and the same XML serialization code.


    The RDBMS schema in the `H2` database is based on the [performance-testing schema
    from Postgres](https://www.postgresql.org/docs/9.6/static/pgbench.html):


    [`https://www.postgresql.org/docs/9.6/static/pgbench.html`](https://www.postgresql.org/docs/9.6/static/pgbench.html)


    There is a simple one-to-many relationship utilized, in which each row in `ACCOUNTS`
    has a list of many records in the `HISTORY` table.


    To make it easier to understand the strategies, I created a visualization that
    I call a "SQL Sequence Diagram." As an introduction, Figure [9-4](#A449023_1_En_9_Chapter.html#Fig4)
    shows just part of one of the strategies. The `S` in the top row represents the
    first `SELECT` statement executed. It pulls data from one table—the `ACCOUNTS`
    table. The row below it represents the second `SELECT` statement which pulls data
    from the `HISTORY` table. Actually, each row just shows `FROM` clause tables.
    The `SELECT` list (of column names) is not represented at all.


    ![A449023_1_En_9_Fig4_HTML.jpg](A449023_1_En_9_Fig4_HTML.jpg)


    Figure 9-4. A SQL Sequence diagram that helps understand whether the code has
    repeatedly queried the same table. Per Martin Fowler, a single request should
    access each table no more than once.


    Figure [9-4](#A449023_1_En_9_Chapter.html#Fig4) shows the `FROM` clauses from
    the first two `SELECT`s for strategy 4. There is a `SELECT` to the `ACCOUNTS`
    table, then a `SELECT` to the `HISTORY` table.


    When I ran the code, I submitted 10 accounts for inquiry, and sure enough, the
    same two `SELECT` statements in this little diagram are executed 10 times each.


    Figure [9-5](#A449023_1_En_9_Chapter.html#Fig5) shows the full list (where possible—strategy
    5 didn''t fit) of `SELECT` statements for each strategy. Note that we can easily
    see how many times each strategy has gone back to the same table; data represents
    all SQL executed during a single round trip to the server.


    ![A449023_1_En_9_Fig5_HTML.jpg](A449023_1_En_9_Fig5_HTML.jpg)


    Figure 9-5. A single SQL sequence diagram for each of the five database strategies.
    Strategy 5 is the chattiest and performs the worst, per data in Figure [9-3](#A449023_1_En_9_Chapter.html#Fig3).
    Per the same data, strategy 2 performs the best. Strategy 1 is the chunkiest,
    but doesn''t perform well because the join results in more rows/results than necessary.


    Strategies 1 and 2 abide by Fowler''s direction—they never do repeated queries
    on the same table—they access each table just one time. Strategy 3, on the other
    hand, follows Fowler''s advice for the `ACCOUNTS` table, but not for the `HISTORY`
    table. Strategies 4 and 5 are super chatty, revisiting both tables multiple times—Fowler
    is unhappy.


    Table [9-1](#A449023_1_En_9_Chapter.html#Tab1) shows my rough characterization
    of each strategy. See if you can match each characterization in the table with
    each strategy''s depiction in Figure [9-5](#A449023_1_En_9_Chapter.html#Fig5).
    Also think about which strategy most resembles your coding style.


    **Table 9-1.** The Five Database Strategies


    | Strategy | Characterization | Count of SELECT statements |

    | --- | --- | --- |

    | 1 | With a single execution of a query, `SELECT` all rows from `ACCOUNTS`, joined
    to the `HISTORY` table. | 1 |

    | 2 | `SELECT` all 10 accounts in a single `SELECT` to the `ACCOUNTS` table and
    `SELECT` all 200 `HISTORY` records from a single `SELECT` to the `history` table.
    | 2 |

    | 3 | `SELECT` all 10 accounts in a single `SELECT` to the `ACCOUNTS` table, just
    as in strategy 2. But make 10 separate queries, each gathering `HISTORY` data
    for a single account. | 11 |

    | 4 | For a single account, make two `SELECT`s: one for account data, and one
    for `HISTORY` records. Repeat for the remaining nine accounts. | 20 |

    | 5 | For each account, make a single `SELECT` to retrieve `ACCOUNTS` data and
    make 11 queries to get `HISTORY` data. | 120 |


    Of all five strategies, which do you think most resembles what developers use
    most? My personal bet is strategy 4, because that is just the style of coding
    that I have been around, where one account component retrieves all data for that
    account, history data included. When data for multiple accounts is required, a
    "reuse" victory is tallied, and the component is invoked an additional time for
    each subsequent account. Well, the reuse victory is bittersweet, at best, if performance
    suffers because of an increased number of database calls, as is the case of strategies
    3, 4, and 5 in Figure [9-4](#A449023_1_En_9_Chapter.html#Fig4).'
  raw: '### The First Issue: SELECT N+1


    Recognizing the SELECT N+1 in code is pretty straightforward. Just look for any
    SELECT executed in a loop, especially when the loop iterates through the result
    set of a different SELECT. In the example shown in Listing [9-1](#A449023_1_En_9_Chapter.html#Par43),
    for each iteration through the outer result set, one SELECT is executed.


    ```

    ps = con.prepareStatement(

    "SELECT hid from history "

    +"WHERE aid = " + accountId);      // outer SELECT

    rs = ps.executeQuery();

    while(rs.next()) {               // start of loop

    long hID = rs.getLong(1)

    ps = connection.prepareStatement(

    "SELECT tid, hid tid, hid, "

    +"bid, aid, mtime from"     // SELECT executed

    +"HISTORY WHERE hid = ?");   // inside loop

    ps.setLong(1, hID);

    histRs = ps.executeQuery();

    short count = 0;

    Listing 9-1. Partial source code example of SELECT N+1 anti-pattern. For each
    row in the set of N items in the outer result set, an additional 1 query is executed.
    One way to refactor this is to join the outer and the inner table. Yes, the join
    is faster than the chatty behavior.

    ```


    In this example, both the outer and the inner query hit the HISTORY table, but
    most times the outer and inner SELECTs hit different tables that should probably
    be joined together.


    But what does SELECT N+1 mean? Jeremy Bentch, a software architect from Portland,
    OR, described it to me this way: given a collection of N rows in a result set,
    do 1 additional query for each. N+1.


    Here is another angle, aside from “Look for SELECTs in a loop.” Martin Fowler
    has written two books on the "Most Influential Book Every Programmer Should Read"
    list on stackoverflow.com; he is certainly an important voice. Way back in 2003,
    he wrote


    > "Try to pull back multiple rows at once. In particular, never do repeated queries
    on the same table to get multiple rows."


    [`http://www.informit.com/articles/article.aspx?p=30661`](http://www.informit.com/articles/article.aspx?p=30661)


    This is a great, succinct way to address this problem. But unfortunately, it still
    doesn’t quantify how bad the performance problem is.


    #### Five Variations of SELECT N+1 Load Tests


    So to quantify the performance problem, I coded up five different variants of
    a SELECT N+1 issue and found that there was a dramatic performance difference
    between the five strategies, as shown in Figure [9-3](#A449023_1_En_9_Chapter.html#Fig3).


    ![A449023_1_En_9_Fig3_HTML.gif](A449023_1_En_9_Fig3_HTML.gif)


    Figure 9-3.


    Chunky outperforms chatty. Strategy 5, the chattiest of the five, has the worst
    performance in this test. All the queries were very fast (∼20ms or less). Slower
    queries would certainly exaggerate this problem.


    In Figure [9-3](#A449023_1_En_9_Chapter.html#Fig3), strategy 2 had the best performance
    and strategy 5 had the worst—it has the most SQL executions. The fastest test,
    strategy 2, had the fewest SQL executions, with the exception of strategy 1, which
    I will come back to in a minute. Each strategy provides a different implementation
    of the exact same SOA service with this use case:


    *   Given 10 bank account numbers, return transaction history and balance info
    for all accounts. All five strategies must build the response data using exactly
    the same POJOs and the same XML serialization code.


    The RDBMS schema in the H2 database is based on the [performance-testing schema
    from Postgres](https://www.postgresql.org/docs/9.6/static/pgbench.html) :


    [`https://www.postgresql.org/docs/9.6/static/pgbench.html`](https://www.postgresql.org/docs/9.6/static/pgbench.html)


    There is a simple one-to-many relationship utilized, in which each row in ACCOUNTS
    has a list of many records in the HISTORY table.


    To make it easier to understand the strategies, I created a visualization that
    I call a “SQL Sequence Diagram.” As an introduction, Figure [9-4](#A449023_1_En_9_Chapter.html#Fig4)
    shows just part of one of the strategies. The S in the top row represents the
    first SELECT statement executed. It p ulls data from one table—the ACCOU NTS table.
    The row below it represents the second SELECT statement which pulls data from
    the HISTORY table. Actually, each row just shows FROM clause tables. The SELECT
    list (of column names) is not represented at all.


    ![A449023_1_En_9_Fig4_HTML.jpg](A449023_1_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    A SQL Sequence diagram that helps understand whether the code has repeatedly queried
    the same table. Per Martin Fowler, a single request should access each table no
    more than once.


    Figure [9-4](#A449023_1_En_9_Chapter.html#Fig4) shows the FROM clauses from the
    first two SELECTs for strategy 4\. There is a SELECT to the ACCOUNTS table, then
    a SELECT to the HISTORY table.


    When I ran the code, I submitted 10 accounts for inquiry, and sure enough, the
    same two SELECT statements in this little diagram are executed 10 times each.


    Figure [9-5](#A449023_1_En_9_Chapter.html#Fig5) shows the full list (where possible—strategy
    5 didn’t fit) of SELECT statements for each strategy. Note that we can easily
    see how many times each strategy has gone back to the same table; data represents
    all SQL executed during a single round trip to the server.


    ![A449023_1_En_9_Fig5_HTML.jpg](A449023_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    A single SQL sequence diagram for each of the five database strategies. Strategy
    5 is the chattiest and performs the worst, per data in Figure [9-3](#A449023_1_En_9_Chapter.html#Fig3).
    Per the same data, strategy 2 performs the best. Strategy 1 is the chunkiest,
    but doesn’t perform well because the join results in more rows/results than necessary.


    Strategies 1 and 2 abide by Fowler’s direction—they never do repeated queries
    on the same table—they access each table just one time. Strategy 3, on the other
    hand, follows Fowler''s advice for the ACCCOUNTS table, but not for the HISTORY
    table. Strategies 4 and 5 are super chatty, revisiting both tables multiple times—Fowler
    is unhappy.


    Table [9-1](#A449023_1_En_9_Chapter.html#Tab1) shows my rough characterization
    of each strategy. See if you can match each characterization in the table with
    each strategy’s depiction in Figure [9-5](#A449023_1_En_9_Chapter.html#Fig5).
    Also think about which strategy most resembles your coding style.


    Table 9-1.


    The Five Database Strategies


    | Strategy | Characterization | Count of SELECT statements |

    | --- | --- | --- |

    | 1 | With a single execution of a query, SELECT all rows from ACCOUNTS, joined
    to the HISTORY table. | 1 |

    | 2 | SELECT all 10 accounts in a single SELECT to the ACCOUNTS table and SELECT
    all 200 HISTORY records from a single SELECT to the history table. | 2 |

    | 3 | SELECT all 10 accounts in a single SELECT to the ACCOUNTS table, just as
    in strategy 2\. But make 10 separate queries, each gathering HISTORY data for
    a single account. | 11 |

    | 4 | For a single account, make two SELECTs: one for account data, and one for
    HISTORY records. Repeat for the remaining nine accounts. | 20 |

    | 5 | For each account, make a single SELECT to retrieve ACCOUNTS data and make
    11 queries to get HISTORY data. | 120 |


    Of all five strategies, which do you think most resembles what developers use
    most? My personal bet is strategy 4, because that is just the style of coding
    that I have been around, where one account component retrieves all data for that
    account, history data included. When data for multiple accounts is required, a
    “reuse” victory is tallied, and the component is invoked an additional time for
    each subsequent account. Well, the reuse victory is bittersweet, at best, if performance
    suffers because of an increased number of database calls, as is the case of strategies
    3, 4, and 5 in Figure [9-4](#A449023_1_En_9_Chapter.html#Fig4).'
  trans: '

    ### 第一个问题：SELECT N+1


    识别代码中的 SELECT N+1 问题相当直接。只需查找在循环中执行的任何 SELECT 语句，特别是当循环遍历另一个 SELECT 的结果集时。在清单
    9-1 所示的示例中，外层结果集的每次迭代都会执行一次 SELECT。


    ```

    ps = con.prepareStatement(

    "SELECT hid from history "

    +"WHERE aid = " + accountId);      // 外层 SELECT

    rs = ps.executeQuery();

    while(rs.next()) {               // 循环开始

    long hID = rs.getLong(1)

    ps = connection.prepareStatement(

    "SELECT tid, hid tid, hid, "

    +"bid, aid, mtime from"     // 在循环内部

    +"HISTORY WHERE hid = ?");   // 执行的 SELECT

    ps.setLong(1, hID);

    histRs = ps.executeQuery();

    short count = 0;

    清单 9-1. SELECT N+1 反模式的源代码片段示例。对于外层结果集中 N 个项目的每一行，都会额外执行 1 次查询。重构此代码的一种方法是将外层和内层表进行连接。没错，连接比这种“多话”的行为更快。

    ```


    在这个例子中，外层和内层查询都访问了 HISTORY 表，但大多数情况下，外层和内层的 SELECT 访问的是不同的表，而这些表本应被连接在一起。


    但 SELECT N+1 到底是什么意思呢？来自俄勒冈州波特兰市的软件架构师 Jeremy Bentch 是这样向我描述的：给定一个结果集中的 N 行数据，对每一行额外执行
    1 次查询。这就是 N+1。


    除了“在循环中查找 SELECT”之外，还有另一个角度。Martin Fowler 在 stackoverflow.com 上的“每个程序员都应该读的最具影响力书籍”榜单中写了两本书；他无疑是一位重要的声音。早在
    2003 年，他就写道：


    > “尝试一次拉取多行数据。特别是，永远不要对同一张表重复执行查询来获取多行数据。”


    [`http://www.informit.com/articles/article.aspx?p=30661`](http://www.informit.com/articles/article.aspx?p=30661)


    这是一个解决此问题的绝佳且简洁的方法。但不幸的是，它仍然没有量化性能问题的严重程度。


    #### SELECT N+1 负载测试的五种变体


    为了量化性能问题，我编写了 SELECT N+1 问题的五种不同变体，并发现这五种策略之间存在显著的性能差异，如图 9-3 所示。


    ![A449023_1_En_9_Fig3_HTML.gif](img/A449023_1_En_9_Fig3_HTML.gif)


    图 9-3.


    “大块”优于“多话”。策略 5 是五种策略中“话最多”的，在此测试中性能最差。所有查询都非常快（约 20 毫秒或更少）。较慢的查询无疑会加剧这个问题。


    在图 9-3 中，策略 2 的性能最佳，而策略 5 的性能最差——它执行的 SQL 次数最多。最快的测试，策略 2，执行的 SQL 次数最少，策略 1 除外，我稍后会再提到它。每种策略都针对同一个
    SOA 服务提供了不同的实现，用例相同：


    *   给定 10 个银行账号，返回所有账户的交易历史和余额信息。所有五种策略都必须使用完全相同的 POJO 和相同的 XML 序列化代码来构建响应数据。


    H2 数据库中的 RDBMS 模式基于 [Postgres 的性能测试模式](https://www.postgresql.org/docs/9.6/static/pgbench.html)：


    [`https://www.postgresql.org/docs/9.6/static/pgbench.html`](https://www.postgresql.org/docs/9.6/static/pgbench.html)


    这里使用了一个简单的一对多关系，其中 ACCOUNTS 表中的每一行在 HISTORY 表中都对应一个包含多条记录的列表。


    为了更容易理解这些策略，我创建了一个我称之为“SQL 序列图”的可视化工具。作为介绍，图 9-4 仅展示了其中一种策略的一部分。顶行的 S 代表执行的第一条
    SELECT 语句。它从一个表——ACCOUNTS 表中提取数据。它下面的行代表第二条 SELECT 语句，该语句从 HISTORY 表中提取数据。实际上，每一行只显示了
    FROM 子句中的表。SELECT 列表（列名）完全没有表示出来。


    ![A449023_1_En_9_Fig4_HTML.jpg](img/A449023_1_En_9_Fig4_HTML.jpg)


    图 9-4.


    一个 SQL 序列图，有助于理解代码是否重复查询了同一张表。根据 Martin Fowler 的说法，单个请求对每个表的访问不应超过一次。


    图 9-4 显示了策略 4 的前两个 SELECT 的 FROM 子句。首先是对 ACCOUNTS 表的一次 SELECT，然后是对 HISTORY 表的一次
    SELECT。


    当我运行代码时，我提交了 10 个账户进行查询，果然，这个小图中的两个 SELECT 语句各自被执行了 10 次。


    图 9-5 显示了每种策略的 SELECT 语句完整列表（在可能的情况下——策略 5 无法完全展示）。请注意，我们可以轻松地看到每种策略返回同一张表的次数；数据代表在单次服务器往返过程中执行的所有
    SQL。


    ![A449023_1_En_9_Fig5_HTML.jpg](img/A449023_1_En_9_Fig5_HTML.jpg)


    图 9-5.


    五种数据库策略各自的单个 SQL 序列图。根据图 9-3 中的数据，策略 5 是“话最多”的，性能也最差。根据相同的数据，策略 2 性能最佳。策略 1 是“块最大”的，但性能不佳，因为连接导致了比必要更多的行/结果。


    策略 1 和 2 遵循了 Fowler 的指导——它们从不重复查询同一张表——每张表只访问一次。另一方面，策略 3 对 ACCOUNTS 表遵循了 Fowler
    的建议，但对 HISTORY 表却没有。策略 4 和 5 是超级“多话”的，多次重复访问两个表——Fowler 对此很不满意。


    表 9-1 显示了我对每种策略的粗略特征描述。看看你是否能将表中的每个特征描述与图 9-5 中每种策略的图示匹配起来。同时思考一下哪种策略最像你的编码风格。


    表 9-1.


    五种数据库策略


    | 策略 | 特征描述 | SELECT 语句数量 |

    | --- | --- | --- |

    | 1 | 通过单次查询执行，SELECT 出 ACCOUNTS 表中所有行，并与 HISTORY 表连接。 | 1 |

    | 2 | 通过一次对 ACCOUNTS 表的 SELECT 获取所有 10 个账户，并通过一次对 history 表的 SELECT 获取所有 200 条
    HISTORY 记录。 | 2 |

    | 3 | 与策略 2 一样，通过一次对 ACCOUNTS 表的 SELECT 获取所有 10 个账户。但执行 10 次单独的查询，每次收集单个账户的 HISTORY
    数据。 | 11 |

    | 4 | 对于单个账户，执行两次 SELECT：一次获取账户数据，一次获取 HISTORY 记录。对剩余的九个账户重复此操作。 | 20 |

    | 5 | 对于每个账户，执行一次 SELECT 来检索 ACCOUNTS 数据，并执行 11 次查询来获取 HISTORY 数据。 | 120 |


    在这五种策略中，你认为哪一种最像开发者最常使用的？我个人猜测是策略 4，因为这是我常见到的编码风格：一个账户组件检索该账户的所有数据，包括历史数据。当需要多个账户的数据时，就会获得一次“重用”的胜利，并且对于后续的每个账户，该组件会被额外调用一次。好吧，如果像图
    9-4 中的策略 3、4 和 5 那样，由于数据库调用次数增加而导致性能下降，那么这种重用胜利充其量也只能算是苦乐参半。

    '
- fmt: '#### Chunky Outperforms Chatty


    Ultimately, the two extremes are “chatty” and “chunky.” Chatty has many executions
    and small result sets—often just a single record. The “Chunky” approach has fewer
    executions and bigger result sets. But just to be clear, this thing about “large
    results sets are OK” does not mean you can cavalierly pull back more data than
    necessary and discard the rest (anti-pattern #3 from Chapter [1](#A449023_1_En_1_Chapter.html),
    Overprocessing). For example, it would be really inefficient to retrieve 1000
    rows and return only the first (or second or fifth) page of 100 to the end user
    and discard the rest. So, craft your `WHERE` clause to retrieve just what you
    need.


    If you would like a more detailed look at the code to better understand the strategies,
    see the `com.github.eostermueller.perfSandbox.dataaccess` packages here:


    [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)


    Remember, chunky outperforms chatty, and not just with executing SQL statements.
    Chatty anti-patterns often cause problems with NoSQL databases, flat file reads,
    and even with HTTP or other network requests to backend systems.


    #### Chunky Doesn’t Always Perform Well


    When I first coded these examples, strategy 1 had the best throughput, not strategy
    2. But then I wondered whether adding a handful of columns to the `ACCOUNTS` table
    to model a more fully fleshed out master `ACCOUNTS` record would hurt performance.
    It did. The low throughput of strategy 1 was caused when I added 20 columns, 84
    bytes each to the `ACCOUNTS` table. Don’t forget that because the tables are joined,
    all `SELECT`ed `ACCOUNTS` columns will get repeated (bad → big inefficiency) for
    each row in the `HISTORY` table.


    #### Detecting SELECT N+1


    Test results:


    *   Test 07a: ∼18,000 requests per minute (strategy 4).

    *   Test 07b: ∼26,000 requests per minute (strategy 2)


    HINT: To explore how the other three strategies (1, 3 and 5) perform, open `src/test/jmeter/07a.jmx`
    in JMeter, change the `SCENARIO_NUM` JMeter variable to 1, 2, 3, 4 or 5, and then
    re-run test 07a.


    Metrics that you will need:


    *   Total Time and Execution count for each SQL statement

    *   A few tools that provide this data: Glowroot, JavaMelody, JDBC Performance
    Logger


    When troubleshooting the missing index at the beginning of this chapter, we saw
    that the problem query’s response time was more than 10 times slower than the
    other queries that were of similar complexity. That “10 times slower” is a bit
    of a smoking gun. If not a smoking gun, it was at least “lowest hanging fruit”
    that directs and motivates your research.


    Take a look at the Glowroot Queries data for load test 07a in Figure [9-6](#A449023_1_En_9_Chapter.html#Fig6).
    Do you see any smoking gun? This screenshot shows two minutes of data after the
    throughput had leveled out—my version of warmup.


    ![A449023_1_En_9_Fig6_HTML.jpg](A449023_1_En_9_Fig6_HTML.jpg)


    Figure 9-6. Glowroot Queries tab for test 07a. Individual executions seems fast.
    Execution count seems high, but how high is a problem?


    Average time per execution is very fast—less than 1ms for both queries (0.43 and
    0.23), so no obvious problem there.


    The Execution Count and the Total Time values seem high, but how high is too high
    for these values? If you run the 07b test (strategy 2) and look at the same screen,
    the execution count and the Total time are lower, but there is still no guidance
    on what measurements/thresholds indicate a problem. The Total Time (ms) metric
    is roughly the “average time per SQL” multiplied by the count of invocations—it’s
    how long the JVM has spent executing this query.


    As such, I recommend the following:


    1.  Take a close look at the 2–3 queries with the highest total time and the highest
    execution count.

    2.  Find out what code executes these queries and look for the `SELECT N+1` issue
    as well as the other performance issue with multiple SQL statements that we’ll
    cover in the next section.

    3.  It is also helpful to compare the Glowroot Execution Count in Figure [9-6](#A449023_1_En_9_Chapter.html#Fig6)
    to the load generator throughput for the same time period. This is a much more
    meaningful comparison when you disable all business processes in your load script
    except the one with questionable SQL performance. Use Fowler''s rule as a guide.

    4.  Fix and retest.'
