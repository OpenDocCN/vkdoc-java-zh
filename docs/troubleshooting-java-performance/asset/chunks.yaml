  trans: "\n## 用于测试关联变量的 JMeter 沙箱\n\n接下来两个示例的 JMeter .jmx 文件位于 jpt 仓库的以下位置：\n\n```\n\
    sampleJMeterScripts/ 文件夹中的 jpt_ch07_correlationVariables.jmx\n```\n\n在第 4 章中，我展示了许多情况下，负载生成器脚本需要介入并执行一些小的数据移动任务，这些任务在真实环境中是由被测系统的浏览器端\
    \ JavaScript 完成的。但在那一章中，我试图以与负载生成器无关的方式来展示所有内容。本节将深入探讨 JMeter 的具体实现方法。\n\n有时，借助正确的被测系统功能，服务器端被测系统生成的唯一\
    \ ID 会被记录到你的负载脚本中。添加一个正确的脚本变量（我称之为“输出-输入”变量）将检索到新生成的值，而不是依赖最初记录到脚本中的单个静态值。这样，生成的\
    \ ID 就可以在后续请求中以某种方式提交（你需要自行解决这部分），例如作为查询参数或位于 HTTP POST 请求体的某个位置。\n\n但在将这样的生成\
    \ ID 存入脚本变量之前，你的 JMeter 脚本首先必须从输出 HTML 流中大量文本中可能可预测的位置，找到那个特定的 ID。\n\n### 探索之旅——第一步，找到数据项\n\
    \n在输出 HTML 中查找数据项的两种流行方法是使用正则表达式或 XPath 表达式。选择你觉得最舒服的方式，但这里提供一个正则表达式的示例。\n\n第一步就是完善正则表达式，以便在\
    \ XML 或 HTML 中找到你的数据项。\n\n使用 JMeter 沙箱方法，首先创建一个如图 7-24 所示的小型沙箱测试计划。目标是简单地将你期望被测系统返回的\
    \ HTML 嵌入到 Dummy Sampler 中，然后使用 JMeter 尝试各种正则表达式，以确定能够正确识别数据的那个表达式。\n\n![A449023_1_En_7_Fig24_HTML.jpg](img/A449023_1_En_7_Fig24_HTML.jpg)\n\
    \n图 7-24.\n\n一个简单的 JMeter 沙箱计划，它返回一些硬编码的 XML（以 <CATALOG> 开头），其中包含要放入输出-输入变量的文本。\n\
    \n我们的目标是：找到能够定位以下文本的正则表达式：\n\n| `bobDylan-01.txt` 是我们想要放入输出-输入脚本变量的值。 | `<CD name=\"\
    file\" value=\"bobDylan-01.txt\">` |\n| 用于识别 `bobDylan-01.txt` 的正则表达式 | `name=\"\
    file\" value=\"(.+?)\">` |\n\n在运行此测试之前，\n\n1.  确保线程组配置为只执行 Dummy Sampler 一次（提示——确保“永远”复选框未被选中）；你不需要\
    \ 5235 次执行来调试这个——你只需要一次。\n2.  在“查看结果树”（图 7-25）中，确保“错误”和“成功”复选框未被选中。（在此处了解更多关于这些复选框的信息：[`http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree`](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree)\
    \ 。）这将确保没有任何结果被隐藏或过滤掉。\n\n    ![A449023_1_En_7_Fig25_HTML.jpg](img/A449023_1_En_7_Fig25_HTML.jpg)\n\
    \n    图 7-25.\n\n    JMeter [查看结果树](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree)（[`http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree`](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree)）——使用它来测试你的正则表达式是否有效。\n\
    \n只运行一次测试（运行 ➤ 启动 或 Cmd/Ctrl+R）。下面每个带编号的要点对应图 7-25 中的编号。\n\n1.  点击“查看结果树”以查看单次\
    \ Dummy Sampler 执行的结果。\n2.  将组合框从默认的“文本”更改为“RegExp 测试器”。这基本上重新配置了用户界面，以便我们可以针对正则表达式测试硬编码的\
    \ XML 结果。\n3.  你看到 `jp@gc - Dummy Sampler - 01` 旁边带有对勾的绿色三角形了吗？选择它——这是 Dummy Sampler\
    \ 单次运行的结果。\n4.  最后，我们开始干正事。输入你想要测试的正则表达式的值，然后点击“测试”按钮。\n5.  这表明我们的正则表达式有效，因为它从\
    \ XML 的其余部分中分离出了 `bobDylan-01.txt`。\n\n### 探索之旅——第二步\n\n现在是时候将你完善好的 XPath 或正则表达式放入适当位置了。右键点击\
    \ `jp@gc - Dummy Sampler`（或者实际产生你正在搜索的 HTML 或 XML 响应的 HTTP 请求）。选择 添加 ➤ 后置处理器 ➤\
    \ 正则表达式提取器（或 XPath 提取器）。你正在使用的提取器的 JMeter 文档也会告诉你如何指定用于存储提取出的值的 JMeter 脚本变量名称。你的\
    \ JMeter 测试计划应该如图 7-26 所示。\n\n![A449023_1_En_7_Fig30_HTML.jpg](img/A449023_1_En_7_Fig30_HTML.jpg)\n\
    \n图 7-30.\n\n此图底部的“请求数据”字段模拟了 HTTP 请求的 POST 数据。`${MY_FILE_g1}` 变量是一个被传回被测系统的关联变量。\n\
    \n![A449023_1_En_7_Fig29_HTML.jpg](img/A449023_1_En_7_Fig29_HTML.jpg)\n\n图 7-29.\n\
    \n此“查看结果树”输出显示了 Debug Sampler 如何转储所有 JMeter 变量的值以用于调试目的。\n\n![A449023_1_En_7_Fig28_HTML.jpg](img/A449023_1_En_7_Fig28_HTML.jpg)\n\
    \n图 7-28.\n\nJMeter 正则表达式提取器。“正则表达式”字段用于在 HTTP 响应中搜索用于关联变量的文本字符串。\n\n![A449023_1_En_7_Fig27_HTML.jpg](img/A449023_1_En_7_Fig27_HTML.jpg)\n\
    \n图 7-27.\n\nJMeter Debug Sampler 和 `jp@gc—Dummy Samplers` 的名称非常相似。Debug Sampler\
    \ 作为一个简单的请求，用于在“查看结果树”中显示所有 JMeter 变量，如图 7-29 所示。\n\n![A449023_1_En_7_Fig26_HTML.jpg](img/A449023_1_En_7_Fig26_HTML.jpg)\n\
    \n图 7-26.\n\n在沙箱中创建 JMeter 关联变量时，负载计划树应如下所示\n\n当此操作运行时，JMeter 将尝试查找你正在寻找的值。然后它会将该值放入一个脚本变量中。要查看\
    \ JMeter 是否按预期完成了此操作，你需要添加一个 Debug Sampler，如图 7-27 所示。实际的调试信息将显示在图 7-27 顶部的“查看结果树”中。\n\
    \n图 7-28 展示了如何精确指定你想从 HTTP 响应中找到的内容。选择一个默认值很有帮助，该值可以指示何时可能出了问题。\n\n要查找调试信息以排查关联变量的问题，请点击测试计划（屏幕左侧）上的“查看结果树”，然后选择\
    \ Debug Sampler，如图 7-29 所示。\n\n最后，是时候使用从前一个采样器的响应中提取出的变量了。请注意图 7-30 中变量名（`MY_FILE_g1`）是如何用花括号包裹的。使用“美元花括号”语法来对变量进行求值。\n"
- fmt: "## Prerequisites\n\nTo conclude this chapter, I’ll present a to-do list of\
    \ things you should know how to do:\n\n- Record a JMeter load script. During the\
    \ recording, save every last byte to a log file for future reference.\n- Flag\
    \ a logon script as “run once.”\n- Run JMeter headlessly.\n- Debug JMeter load\
    \ script.\n- Configure load script to use data from a `.csv` data file. The file\
    \ should contain a list of users to log on, lists of accounts and customers to\
    \ query.\n- Create assertions to validate that something actually happened, that\
    \ your SUT is actually doing its job.\n- Using a correlation variable, capture\
    \ the output of one request and submit to the input of another.\n- Create ramp\
    \ up, ramp down load plans.\n- Create a load plan that distributes load by the\
    \ percentages of business processes seen in production.\n- Create and use JMeter\
    \ variables, perhaps reading a variable from the command line.\n\nLoad gen features:\n\
    \n- Use multiple network protocols: HTTP/S, JMS, Sockets, JDBC.\n- Run headless;\
    \ also, run from the same machine as the SUT.\n- Use JMeter’s nice copy/paste.\n\
    \nGraphing features:\n\n- Composite graphs\n- CPU/Resource Consumption\n- JMX\n\
    - Grafana/InfluxDB integration\n\nMust know:\n\n- Avoid heavy logging.\n- `.jtl`\
    \ files\n    - Reading\n    - Writing\n    - How many output files? 1, 2 or 3\n\
    \    - Merging\n    - Clearing UI results does not clear data file.\n- Use JDBC\
    \ sampler for data creation.\n- Save the initial Recording using View Results\
    \ Tree.\n- Managing colors.\n- Maven, ANT, Jenkins integration.\n- Thread groups:\
    \ separate samplers (SOA), or combined (Web).\n- Debugging tips:\n    - Use a\
    \ Dummy Sampler to specify sample HTML responses, before hooking your test plan\
    \ up to a live HTTP system. BSF PostProcessor: `var myVariable = vars.get(\"MY_VARIABLE\"\
    );` `OUT.println('The value of MY_VARIABLE is [' + myVariable + ']' )`\n- Assertions.\
    \ Configure an Assertion to raise a red flag when text from an error is present.\n\
    - Where to stick the Listeners.\n\n## Don’t Forget\n\nThis chapter provided a\
    \ tour of some JMeter functionality that is rarely if ever documented, and other\
    \ functionality that is documented but still causes trouble for the many technicians\
    \ that I have taught JMeter to.\n\nDon’t forget that if you can’t figure out how\
    \ to get some JMeter feature to work, create a little “Hello World” sandbox-like\
    \ `.jmx` script to experiment with the feature. Copy and paste a snippet of HTML\
    \ (or JSON or XML or whatever) into the Dummy Sampler so that your test plan can\
    \ operate on it. Just about every single JMeter Test Element can be tested like\
    \ this. You can experiment with logging, load plans, Correlation Variables, JMeter\
    \ Assertions, Composite Graphs (multiple metrics on the same graph), you name\
    \ it.\n\n## What’s Next\n\nThe next chapter provides an overview of the two sample\
    \ applications that come with this book. These applications reproduce the write-once-run-anywhere\
    \ (WORA) performance defects that are detectable in both large environments and\
    \ small ones. These examples will give you hands-on experiences hooking up plug-it-in-now\
    \ performance and observability tools, where available, that will help you find\
    \ and fix performance defects quickly.\n\nFootnotes [1](#A449023_1_En_7_Chapter.html#Fn1_source)\n\
    \n[`http://jmeter-plugins.org/wiki/Contributors/`](http://jmeter-plugins.org/wiki/Contributors/)\n\
    \n[2](#A449023_1_En_7_Chapter.html#Fn2_source)\n\n[`http://jmeter.apache.org/usermanual/get-started.html#template`](http://jmeter.apache.org/usermanual/get-started.html#template)\n\
    \n[3](#A449023_1_En_7_Chapter.html#Fn3_source)\n\nI was never the dunce of an\
    \ ESL class myself, but I did flunk out of the Russian language program at the\
    \ University of Kansas before going on to get my computer degree.\n\n# Part III\
    \  \nThe P.A.t.h. Checklist and Performance Troubleshooting\n\n# 8. Introduction\
    \ to the P.A.t.h. Checklist\n\nIn the Introduction, I asked how close you could\
    \ come to the root cause of a performance problem in just 30 minutes. That is\
    \ about how long it should take to capture and review data from the four items\
    \ in the P.A.t.h. Checklist.\n\nBut before getting into the technical details\
    \ of the Checklist, this chapter provides a quick review of previous chapters.\
    \ Then it describes how to use the Checklist when troubleshooting, and finally\
    \ it provides a brief introduction to the two sets of code examples.\n\nThe objectives\
    \ of this chapter are:\n\n- Understand the basic principles of using the P.A.t.h.\
    \ Checklist to identify and fix performance problems.\n- Understand how to run\
    \ the `javaPerformanceTroubleshooting` and `littleMock` code examples.\n- Understand\
    \ the architecture of the `javaPerformanceTroubleshooting` and `littleMock` code\
    \ examples.\n\nThe first two items in the P.A.t.h. Checklist, database persistence\
    \ (P) and network connections to other (Alien=A) systems, are common integration\
    \ points that historically have caused performance problems. JDBC is the focus\
    \ of the Persistence work, but the concepts apply to almost any database. The\
    \ last two, t. and h., examine the threads (t) that execute code and memory consumption\
    \ (h., the heap), along with its memory recycling process—the Garbage Collector.\
    \ So, the P.A.t.h. checklist takes a closer look at the performance health of\
    \ a few key integration points and the thread and memory management that underpins\
    \ all processing. Yes, the focus of this book is the most common problems, but\
    \ the toolset is capable of finding virtually any problem.\n\nWith real-world\
    \ systems, you look at the data from all four of the items in the P.A.t.h. checklist.\
    \ You decide which one looks the least healthy and then focus on tuning that part.\
    \ But in the four P.A.t.h. chapters, I will make it easier on you by telling you\
    \ straight up which Checklist item (hint: look at the chapter title) is causing\
    \ the main, single performance problem that is dragging down the performance."
