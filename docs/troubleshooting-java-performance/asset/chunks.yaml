    ## 下一步


    在引言中，我谈到了性能缺陷如何在黑暗环境中滋生。并非所有环境都是黑暗的。有时，你会面对一片无边的指标海洋，很难知道该用哪些指标来实现性能目标。下一章将指标分为几个高级类别，并讨论如何利用每个类别来实现性能目标。此外，还有一些创造性的解决方案可以重构你的负载测试，帮助避免在完全黑暗的环境中迷失方向。


    脚注 1


    如果你想要更多细节，这里还有一些服务虚拟化工具。请参阅 [`http://blog.trafficparrot.com/2015/05/service-virtualization-and-stubbing.html`](http://blog.trafficparrot.com/2015/05/service-virtualization-and-stubbing.html)


    以及这本书`:` [`http://www.growing-object-oriented-software.com/`](http://www.growing-object-oriented-software.com/)
    。


    # 3. 指标：消除猜测的良方


    引言中讨论了黑暗环境的概念，即在你需要的时候和地点，合适的监控往往不可用。这确实是我们行业早就应该讨论和解决的问题，但这个问题也有两面性。如果我们抛开所有实际难题（如安全、访问、许可、开销、培训等），将合适的工具接入合适的环境，情况就会完全逆转。对某些人来说，并非因指标太少而数据匮乏，而是被所有可能指标的广阔海洋所吓倒，并且很容易因选错指标而受骗。


    本章的目标是：


    *   理解应使用哪些类型的指标来决定是否保留或丢弃调优变更。

    *   理解哪些类型的指标用于识别导致特定性能问题的组件。

    *   记住，跟踪、绘制图表并分享系统随时间的调优进展，有助于让团队中的成员更关注性能。


    本章将这片广阔的指标海洋分为三个松散的类别，并展示如何利用每个类别来实现关键性能目标。


    ## 哪个指标？


    在处理性能问题时，我们花大量时间问这三个问题：


    *   资源问题：系统使用了多少硬件资源（CPU、RAM、网络、磁盘）？35%？98%？

    *   责任问题：被测系统（SUT）中的哪些组件应对特定的性能问题负责？“组件”需要是我们能够调查的具体对象，比如特定源代码文件中的单个 Java 方法，或者单个数据库查询或其他网络请求。

    *   用户收益问题：最终用户能否感受到特定调优改进带来的响应时间影响？哪个代码或配置变更表现更好？


    在调优系统的顺利日子里，我能够做正确的事，“遵循数据”而不是猜测这三个至关重要问题的答案。这意味着要花时间从精心规划的负载测试中捕获某些指标。但在应对压力巨大的生产问题时，或者仅仅是在袜子不配对的倒霉日子里，一切都不确定了，我对问题的解释变成了毫无根据的胡乱猜测。黑暗环境问题使这变得更加困难，因为当合适的指标不可用时（不幸的是，这种情况相当频繁），臆测就会占据主导。


    因此，本章旨在通过首先专注于用指标回答这些关键问题，来帮助你更容易地找到有用的指标。简而言之，表 3-1 显示了我建议用于回答每个问题的指标。


    表 3-1.


    常见性能问题的指标


    |   | 性能问题 | 由以下指标回答 |

    | --- | --- | --- |

    | 1 | 资源（CPU/RAM 等）是否可用？ | 基础指标：PerfMon、TypePerf、ActivityMonitor、top/htop/topas/nmon/sar
    等 |

    | 2 | 哪个组件导致了性能下降？ | 服务器端数据，如线程转储、分析器数据、详细的 GC 数据、SQL 吞吐量/响应时间等 |

    | 3 | 最终用户是否受益？哪个代码变更表现更好？ | 来自负载生成器的响应时间和吞吐量指标。 |


    有些指标有助于回答多个问题。例如，问题 2 和问题 3 都在一定程度上涉及响应时间。我的目的不是要建立严格无重叠的指标分类，而是为你提供一个相当好的起点，了解使用哪些指标来回答每个关键问题。


    在本书的后续部分，关于 P.A.t.h. 检查清单的四章将回答问题 2（责任在谁？）。问题 1（是否有可用资源？）使用的指标来自大家熟悉的工具，对吧？Top、PerfMon、nmon
    等。Brendan Gregg 的 USE 方法是避免忘记监控资源消耗的好方法。这里是链接：


    [`http://www.brendangregg.com/usemethod.html`](http://www.brendangregg.com/usemethod.html)


    如果一台机器是你的负载测试的一部分，但你无法访问其资源消耗指标，请小心不要将其归咎于你的任何问题。


    我真心认为，学习 P.A.t.h. 四章中的故障排除技巧是可行的。但在整个调优过程中，同时关注这三个指标问题可能更具挑战性——很容易忘记其中任何一个。


    本章的其余部分将致力于回答问题 3，即确定你的最终用户是否会从各种提议的性能变更中受益。


    ## 设定调优方向


    决定保留哪些调优改进，在很大程度上设定了调优过程的方向。通常，来自负载生成器的更快响应时间和更高吞吐量指标，应该对是否保留特定变更拥有最终决定权。更低的资源（CPU/RAM）消耗也很关键，但通常是次要因素。


    所有这些建议听起来有点简单，所以让我聚焦于这一点：只有在负载生成器测试显示变更将使最终用户受益或减少资源消耗时，才决定保留性能调优变更。仅仅因为某个代码或配置变更使其他环境受益，并不意味着它会使你的环境受益。此外，毫无根据的猜测会削弱对调优项目的信心。尽可能避免这种情况。


    考虑这个例子：一个能为你带来 10ms 响应时间改进的代码变更，可以对一个响应时间为 30ms 的系统产生神奇、变革性的效果，但如果你将同样的 10ms 改进变更应用到一个响应时间为
    3000ms 的系统上，产生重大性能提升的可能性就非常低。让负载生成器指标来驱动决策；让它们指导保留哪些代码/配置变更。


    但调优指导并非仅来自负载生成器指标，因为从系统中调优掉明显的高 CPU 消耗也非常重要。CPU 的作用甚至比消除高 CPU 消耗的例程更大——它为我们提供了一个方便的衡量标准，可以用来判断系统是否能够扩展。第
    6 章将就此提供非常具体的指导，敬请期待。


    许多不同的指标，例如将在 P.A.t.h. 章节中讨论的那些，都有助于决定保留什么变更：服务器端详细的 GC 指标、SQL 响应时间指标、微基准测试结果。但最终，只有当负载生成器结果显示对最终用户有益时，这些变更才应保留在代码库中。记住：负载生成器指标驱动决策。CPU
    和 RAM 消耗指标也很重要——它们扮演着辅助角色。

    '
- fmt: '# The Backup Plan: Indirect Performance Assessment with Load Generator Metrics


    The `P.A.t.h.` chapters show how to directly assess and single out what parts
    of the system are the slowest, and the four performance anti-patterns in Chapter
    [1](#A449023_1_En_1_Chapter.html) help you conjure up what changes are likely
    to improve performance. After deploying a change, if the load generator response
    time and throughput metrics (and resource consumption) show sufficient improvement,
    then you keep the change; otherwise you revert it (I do). You return to the `P.A.t.h.`
    Checklist to reassess the performance landscape after your brilliant change (because
    the landscape changes in interesting ways; check it out) and then you deploy another
    change and repeat. That’s how tuning works. Mostly.


    Before I got into a groove of using the `P.A.t.h.` Checklist and a modest tuning
    environment, discovering root cause was a bit tougher. I sought out ways to dislodge
    extra hints and clues from the load generator metrics. These “indirect” techniques
    are still helpful today, but they’re much less necessary when you can directly
    observe performance problems with `P.A.t.h.`


    But I will share some of these techniques here, because sometimes you don’t have
    access to the system for a quick run through `P.A.t.h.`, like when you’re looking
    at someone else’s load generator report. Likewise, sometimes it takes a second
    supporting opinion from a different metric to make the case for a particular optimization
    sufficiently compelling to the team, and convincing the team is a surprisingly
    large part of it all.


    ## Large Payloads are a Red Flag


    Logically interrogate the requests in your load test with the largest payloads,
    asking whether all of those bytes are really necessary? For example, have a look
    at Figure [3-1](#A449023_1_En_3_Chapter.html#Fig1).


    ![A449023_1_En_3_Fig1_HTML.jpg](A449023_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    The rightmost column, `Avg. Bytes`, shows the size of HTTP responses for each
    process (leftmost column). Large outliers in this column (there are none in this
    figure) would be prime suspects for performance issues. Data from `JMeter` Summary
    Report.


    The request with the most bytes in the `Avg. Bytes` column is `newAccount.shtml`,
    which has 6253.7 bytes on average. This number does not scare me, especially in
    relation to the `Avg. Bytes` numbers for the other rows in the table. But if one
    `Avg. Bytes` value is a few times bigger or more than the others—that’s something
    to investigate. At a minimum, the extra bytes will take extra time to transfer,
    but it can get a lot worse. What if the system spent precious time assembling
    this large page? One time I saw this, a flood of disabled accounts (that no client
    wanted to see) were accidentally enabled and plumbed all the way from backend
    to browser, wasting a ton of time/resources. A separate time, not only was the
    client repeatedly requesting data that could have been cached on the server, but
    the XML format was needlessly large and no one cared enough to insure the payload
    was compressed. Zipping text files often shrinks a file by 90%. Use this to minimize
    the bytes transferred. If you application hails from 1999, perhaps the large size
    is from all the data being crammed onto a single page instead of having nice “first
    page / next page / last page” support.


    ## Variability Is a Red Flag


    One semi-obvious sign of a fixable performance problem in response time metrics
    is variability. In most cases, the more jittery the response time, the worse the
    performance. So, pay attention to the HTTP requests with the highest standard
    deviation (the `Std. Dev` column), showing highly variable response time. Of course,
    highly variable response time could be attributed to certain benign things, like
    occasionally complex data or other processing.


    The three rows in Figure [3-2](#A449023_1_En_3_Chapter.html#Fig2) show slightly
    different XSLT process transforming the exact same `.xslt` files with the same
    `.xml` files—you can tell by the exact same values for `Avg. Bytes` (the rightmost
    column) for each row. The data is from three different tests, each a 60 second
    steady state run with 8 threads of load, and each shows dramatically different
    performance.


    ![A449023_1_En_3_Fig2_HTML.jpg](A449023_1_En_3_Fig2_HTML.jpg)


    Figure 3-2.


    Results from load tests with three implementations of XLST processing. Data from
    `jmeter-plugins.org` Synthesis Report.


    Note that response time (`Average`) and standard deviation (`Std. Dev.`) are roughly
    proportional to each other. Throughput is inversely proportional to both of these.
    In other words, performance/throughput is great when both response time and variability
    are low.


    If the very low `.51` standard deviation with 400+% throughput improvement (1273.3
    instead of 5325.8) is not compelling for you, perhaps the time series graphs of
    the same data in Figure [3-3](#A449023_1_En_3_Chapter.html#Fig3) will convince
    you.


    ![A449023_1_En_3_Fig3_HTML.jpg](A449023_1_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    From top to bottom, good, better, and best XSLT response time with 3 different
    XSLT API idioms. The faster the test, the less zig-zaggy variability.


    Extra variability in response time, as shown in the graphs here, can help point
    you to which system request could use some optimization. Variability in other
    metrics, like throughput and CPU consumption can help point out issues.


    ## Creatively Setting Direction for Tuning


    Yes, the load generator metrics should drive the bus and call the shots on what
    optimizations to keep. But also keep in mind there is much room for creativity
    here. This section provides a few examples of creatively restructuring tests and
    test plans to provide performance insights.


    Two chapters in this book help you run load tests that model (aka imitate) a regular
    production load. Chapter [4](#A449023_1_En_4_Chapter.html) describes how to evolve
    a load script from an inflexible, stiff recording of a single user’s traffic into
    a dynamic workload simulation. Chapter [5](#A449023_1_En_5_Chapter.html) helps
    you detect some performance characteristics of an invalid load test, which can
    help you avoid making bad tuning decisions based on invalid load generator data.


    The gist, here, is that making the load test more real is a good thing. As preposterous
    as it might sound, though, there are a lot of fantastic insights to be gained
    by making your load test less real. Let me explain this insanity by way of two
    examples.


    ### Creative Test Plan 1


    Once upon a time I was on a tuning project and sure enough, I was wandering aimlessly
    in some Dark Environments. I was lacking security access or licenses (geez, it
    could have been anything) to all my favorite monitoring tools. How was I supposed
    to tune without metrics? This was a middle tier system, and I was trying to figure
    out whether all the time was being spent calling non-Java back-end systems or
    perhaps within the Java tier itself. To find out how fast the Java side was, I
    decided to comment out all calls to databases and back-end systems, leaving a
    fully neutered system except for entry into and exit from the Java architecture.
    It should have been pretty quick, since most of the real work was commented out,
    right?


    Response time in a load test of the neutered system was 100ms. Is that fast or
    slow? For a point of comparison to this 100ms, the “do nothing” example in the
    previous chapter took just about a single millisecond. I had two different systems
    that did about the same thing (nothing), and one was dramatically slower. Ultimately,
    this helped us find and fix some big bottlenecks that pervaded every part of the
    architecture. That’s some creative testing.'
