    \ we just talked about. They replace the mainframe and the cloud services. Vetting\
    \ the actual systems for performance will have to wait for later, probably in\
    \ an integration testing environment.\n\nUltimately, some monitoring will be sprinkled\
    \ in, but the last component to go into the developer tuning environment is the\
    \ load generator, the topic of this section.\n\n### Quick Overview of Load Generation\n\
    \nA load generator is a network traffic generator. We use it to stress a network-enabled\
    \ software application, like a SOA or the server-side portion of a web-application,\
    \ to see if the responses are fast enough and to make sure it doesn’t crash.\n\
    \nOf course, it wouldn’t be helpful to sling random traffic at a web application—we’d\
    \ need to submit the exact kind of web requests the web app was designed to process.\
    \ For this purpose, most load generators, like JMeter, use a record-and-playback\
    \ approach to get the traffic just right. It works like this: on an otherwise\
    \ idle system, you manually traverse your application using a web browser while\
    \ a special tool (which comes with a load generator) records the network requests\
    \ made by your browser.\n\nThe output of that recording is a tool-specific script\
    \ that can replay, verbatim, that single user’s traffic, thus stressing out the\
    \ SUT a little bit. Then, to model a dynamic workload and move away from the verbatim\
    \ recording, you enhance the script to log on a (data-driven) variety of users\
    \ and operate on a (data-driven) variety of “things” in the SUT—whatever things\
    \ the SUT deals in—shopping for kayaks, a dating service for manatees, delivering\
    \ news stories, whatever. Hardware permitting, load generators can spin up as\
    \ many threads as you like to simulate a larger number of users.\n\n### Load Generator\
    \ Responsibilities\n\nA load generator has these main responsibilities :\n\n1.\
    \  To record network traffic as you traverse a system, and save the navigation\
    \ details to a script.  \n2.  To allow you to edit/debug/enhance the script, so\
    \ that it more closely resembles a production load.  \n3.  To run the script in\
    \ a single thread, and to enable multiple threads to run the same script concurrently,\
    \ thus applying load to your system. This is “load generation.”  \n4.  To display\
    \ the response time, throughput and other test results via live graphs/displays\
    \ and/or via post-test reports.  \n\nThe “Load Generator” in Figure [2-2](#A449023_1_En_2_Chapter.html#Fig2)\
    \ specifically refers to responsibility 3, load generation. You can take care\
    \ of responsibilities 1, 2 and 4 wherever and however you need to.\n\nIn fact,\
    \ the startup banner for the JMeter load generator addresses this very concern\
    \ (Figure [2-6](#A449023_1_En_2_Chapter.html#Fig6)).\n\n![A449023_1_En_2_Fig6_HTML.jpg](A449023_1_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6.\n\nWarning from JMeter not to use the GUI during a load test\n\n\
    The idea is to create, record, and refine your load script using JMeter GUI Mode.\
    \ Running a small amount of load, perhaps less than ten requests per second is\
    \ acceptable, too. Do all of this with the JMeter GUI Mode. But when it comes\
    \ to running more than 10RPS, your safest best to avoiding performance problems\
    \ in the load generator itself is by running JMeter in NON GUI Mode, aka from\
    \ the command line, or headless. The JMeter startup banner in Figure [2-6](#A449023_1_En_2_Chapter.html#Fig6)\
    \ even shows how to do this. Here is an example:\n\n1.  First start the JMeter\
    \ GUI and create your load plan and save it to `myLoadPlan.jmx`.  \n2.  Copy the\
    \ `myLoadPlan.jmx` file to your developer tuning environment, where JMeter needs\
    \ to be installed.  \n3.  Run this command:\n\n    ```\n    $JMETER_HOME/bin/jmeter\
    \ -n -t myLoadPlan.jmx -l test001.jtl -e -o dirTest001\n    ```\n\n    where `test001.jtl`\
    \ is a text data file in which JMeter will write results from the test and `dirTest001`\
    \ is a folder that JMeter will create and use to hold a performance report after\
    \ the test finishes.  \n\nAs long as RAM and CPU consumption for the JMeter process\
    \ stay relatively low, perhaps below 20% for both, then I have had no problems\
    \ running JMeter on the same machine as the SUT. If you are still skeptical, see\
    \ if performance dramatically improves by moving the load generation to another\
    \ box on the same subnet."
  trans: "\n### 使用 Wiremock 模拟 HTTP 后端\n\n图 2-3 和图 2-4 展示了一个快速示例，说明如何启动、配置并向 Wiremock（我最喜欢的\
    \ HTTP 模拟服务器）提交请求。\n\n![A449023_1_En_2_Fig4_HTML.gif](img/A449023_1_En_2_Fig4_HTML.gif)\n\
    \n图 2-4.\n\n用于配置 Wiremock 返回预定 HTTP 响应的 HTTP POST 请求的 JSON 主体\n\n![A449023_1_En_2_Fig3_HTML.jpg](img/A449023_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3.\n\n使用 `java -jar` 选项运行 wiremock.org 模拟服务器的启动横幅\n\n使用简单的 `java -jar` 方法启动\
    \ Wiremock 非常容易：只需执行 `java -jar wiremock.jar`，它就会立即启动，监听 8080 端口上的 HTTP 请求（该端口可配置）。\n\
    \n启动后，您可以调用 HTTP/json 来配置请求-响应对，以模拟您的后端。您将 JSON 数据 POST 到 `http://<host>:<port>/__admin/mappings/new`。然后，您可以将这些调用保存在\
    \ SOAP UI、Chrome Postman 或 JMeter 脚本中，并在负载测试前直接执行它们。在图 2-4 中，JSON 表示：“如果 Wiremock\
    \ 收到一个对 `/some/thing` 的 `GET` 请求，那么等待 5 秒后，返回 ‘Hello world!’ 作为响应。”\n\n一旦您将上述代码\
    \ POST 到 `http://localhost:8080/__admin/mappings/new`，您应该尝试测试新的模拟桩，如图 2-5 所示。\n\
    \n![A449023_1_En_2_Fig5_HTML.jpg](img/A449023_1_En_2_Fig5_HTML.jpg)\n\n图 2-5.\n\
    \n使用 Chrome 测试新创建的 Wiremock 配置（图 2-4）\n\n……果然，浏览器直到 Wiremock 等待了我们通过 JSON 中的 `fixedDelayMilliseconds`\
    \ 属性要求的 5000 毫秒后，才显示出 “Hello world!”。\n\n这并不太难，对吧？总结一下，下载 Wiremock jar 包并以 `java\
    \ -jar` 方式运行。然后提交 Wiremock 的 JSON-over-HTTP 配置消息，基本上就是教会 Wiremock 针对您的后端支持的每个\
    \ HTTP 请求返回哪个响应。最后，启动您的应用程序，让它向 Wiremock 发送请求，Wiremock 将返回您配置好的响应。就是这样。\n\n##\
    \ 本地负载生成\n\n秉持“代码优先”的理念，双机开发者调优环境（图 2-2）的核心是您的代码——一个用于 Web 层的单个 JVM，它向一个用于应用层的单个\
    \ JVM 发起调用。\n\n以下是我们要关注的其他部分。\n\n首先是刚刚讨论过的模拟服务器。它们替代了大型机和云服务。对实际系统进行性能审查需要等到以后，可能是在集成测试环境中。\n\
    \n最终，我们会加入一些监控，但进入开发者调优环境的最后一个组件是负载生成器，这也是本节的主题。\n\n### 负载生成快速概览\n\n负载生成器是一种网络流量生成器。我们用它来对支持网络的软件应用（如\
    \ SOA 或 Web 应用的服务器端部分）施加压力，以查看响应是否足够快，并确保其不会崩溃。\n\n当然，向 Web 应用发送随机流量是没有帮助的——我们需要提交\
    \ Web 应用设计用来处理的确切类型的 Web 请求。为此，大多数负载生成器（如 JMeter）使用录制-回放的方法来精确生成流量。其工作原理如下：在一个空闲的系统上，您使用\
    \ Web 浏览器手动浏览您的应用程序，同时一个特殊工具（随负载生成器提供）会记录您的浏览器发出的网络请求。\n\n该录制的输出是一个特定于工具的脚本，它可以逐字回放单个用户的流量，从而对被测系统施加一点压力。然后，为了模拟动态工作负载并摆脱逐字回放，您需要增强脚本，使其能够登录（数据驱动的）各种用户，并对被测系统中的各种“事物”（无论被测系统处理的是什么——比如购买皮划艇、海牛约会服务、发布新闻故事等）进行操作。在硬件允许的情况下，负载生成器可以根据需要启动任意数量的线程来模拟大量用户。\n\
    \n### 负载生成器的职责\n\n负载生成器主要有以下职责：\n\n1.  在您浏览系统时记录网络流量，并将导航细节保存到脚本中。\n2.  允许您编辑/调试/增强脚本，使其更接近生产负载。\n\
    3.  在单个线程中运行脚本，并允许多个线程同时运行同一个脚本，从而对您的系统施加负载。这就是“负载生成”。\n4.  通过实时图表/显示和/或测试后报告来显示响应时间、吞吐量和其他测试结果。\n\
    \n图 2-2 中的“负载生成器”特指职责 3，即负载生成。您可以根据需要在任何地方以任何方式处理职责 1、2 和 4。\n\n事实上，JMeter 负载生成器的启动横幅就提到了这一点（图\
    \ 2-6）。\n\n![A449023_1_En_2_Fig6_HTML.jpg](img/A449023_1_En_2_Fig6_HTML.jpg)\n\
    \n图 2-6.\n\nJMeter 发出的警告：不要在负载测试期间使用 GUI\n\n思路是使用 JMeter GUI 模式来创建、录制和完善您的负载脚本。运行少量负载（可能每秒少于十个请求）也是可以接受的。所有这些操作都可以在\
    \ JMeter GUI 模式下完成。但是，当需要运行超过 10 RPS 的负载时，为了避免负载生成器本身出现性能问题，最安全的方法是在非 GUI 模式下运行\
    \ JMeter，也就是从命令行运行，或者无头运行。图 2-6 中的 JMeter 启动横幅甚至展示了如何做到这一点。示例如下：\n\n1.  首先启动 JMeter\
    \ GUI，创建您的负载计划并保存为 `myLoadPlan.jmx`。\n2.  将 `myLoadPlan.jmx` 文件复制到您的开发者调优环境中，该环境需要安装\
    \ JMeter。\n3.  运行以下命令：\n\n    ```\n    $JMETER_HOME/bin/jmeter -n -t myLoadPlan.jmx\
    \ -l test001.jtl -e -o dirTest001\n    ```\n\n    其中 `test001.jtl` 是一个文本数据文件，JMeter\
    \ 会将测试结果写入其中；`dirTest001` 是一个文件夹，JMeter 会创建它并在测试结束后用于存放性能报告。\n\n只要 JMeter 进程的\
    \ RAM 和 CPU 消耗保持相对较低（可能两者都低于 20%），那么我在同一台机器上同时运行 JMeter 和被测系统就没有遇到过问题。如果您仍然怀疑，可以尝试将负载生成器移到同一子网的另一台机器上，看看性能是否有显著提升。\n"
- fmt: '# CPU Consumption by PID


    Having just a single person on a team care about performance is a tough, uphill
    battle. But when you have a few (or all) coworkers watching out for problems,
    making sure results are reported, researching performance solutions, and so on,
    then performance is much more manageable.


    So to get (and keep) others on-board and interested, a certain amount of performance
    transparency is required to better keep others up-to-date. For example, everyone
    knows how to use `top` and `TaskMgr` to watch for CPU consumption. But did you
    watch it for the duration of the test, or did you take your eyes off it while
    looking at the flood of other metrics? We should all be good skeptics for each
    other when troubleshooting, and a basic CPU consumption graph for the duration
    of the test really helps answer these questions before they’re asked.


    But the task of watching CPU is more work when you’re trying to watch it on multiple
    machines, or as well in our case, trying to distinguish which of the many processes
    on a single machine has high/spiky CPU. My point here is that it is worth the
    time to regularly create and share easy-to-understand graphs and metrics, and
    furthermore in the special case of CPU consumption, there is a void of open-source/free
    tools that will graph CPU consumption over time for individual process IDs (PIDs).


    I would like to quickly highlight one of the few tools that can do this, and it
    just so happens that this tool not only works with JMeter, but its results can
    be displayed on the same graph as any other JMeter metrics. The tool is called
    `PerfMon` and it comes from `jmeter-plugins.org` at [`https://jmetr-plugins.org/wiki/PerfMon/`](https://jmetr-plugins.org/wiki/PerfMon/)
    (see Figure [2-7](#A449023_1_En_2_Chapter.html#Fig7)).


    ![A449023_1_En_2_Fig7_HTML.jpg](A449023_1_En_2_Fig7_HTML.jpg)


    Figure 2-7. PerfMon from jmeter-plugins.org allows you to monitor CPU and many
    other metrics


    Here are a few notes:


    - Because the i7 processor for this test has eight cores, if a single line reached
    800, that would mean the system is 100% consumed. For six cores, 600 is the max.
    In this graph, we have two lines, 240 and 40. 240+40=280, and 280/800 = 35% CPU.

    - In the pane at the top, I have configured `PerfMon` to capture CPU metrics for
    six different Java processes. Unfortunately, I had to use `top` on my MacBook
    to confirm which process was using ~240 and which was ~40.

    - Sometimes there are many lines with low CPU consumption that get in the way.
    The “hide noise” label in Figure [2-3](#A449023_1_En_2_Chapter.html#Fig3) shows
    one way to temporarily remove lines with very low consumption that make the graph
    noisy. Auto scaling, color selection, hiding lines, and other great graph refinement
    features are documented here: [`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)


    I use these graphs mainly to confirm that CPU remains relatively low, perhaps
    below 20%, for the load generator and any stub servers. The JMeter line reads
    at about 40, so 40/800=5% CPU, which is less than 20%, so JMeter CPU consumption
    is sufficiently low.


    `PerfMon` works on just about every platform available. Here are two other tools
    that also graph resource consumption by PID. Neither of them have native Windows
    support, although you could try to run them in a Linux/Docker container:


    - [`https://nmonvisualizer.github.io/nmonvisualizer/`](https://nmonvisualizer.github.io/nmonvisualizer/)

    - [`https://github.com/google/cadvisor`](https://github.com/google/cadvisor)


    Regardless of the tool you use, having PID-level metrics to show CPU and other
    resource consumption is critical to understanding whether you have misbehaving
    processes in your modest tuning environment. When reporting on your results, remember
    to point out the portion of consumption that comes from test infrastructure—the
    load generator and the stub server(s).


    ## Comparison Metrics


    A few years ago, I ran a JMeter test on a do-nothing Java servlet that was deployed
    to Tomcat and was on the same machine as JMeter. Had I seen 1,000 requests-per-second,
    I think I would have been impressed. But in my updated version of this test, I
    saw more than 2,800 requests per second with about 35% CPU consumption. And 99%
    of the requests completed in less than 1.3 ms (milliseconds), as measured at the
    servlet (by `glowroot.org`).


    These results were so astoundingly good that I actually remember them. I can’t
    find my car keys, but I remember how much throughput my four-year-old laptop can
    crank out, and I recommend that you do the same. Why? These numbers are incredibly
    powerful, because they keep me from thinking that Java is inherently slow. They
    can also help with similar misunderstandings about whether Tomcat, JMeter, TCP
    or even my MacBook are inherently slow.


    Lastly, these results (Figure [2-8](#A449023_1_En_2_Chapter.html#Fig8)) make me
    think that even on a single machine in this small developer tuning environment,
    there is a ton of progress that can be made.


    ![A449023_1_En_2_Fig8_HTML.gif](A449023_1_En_2_Fig8_HTML.gif)


    Figure 2-8. Response time and throughput metrics for a do-nothing Java servlet.
    Metrics from Glowroot.org. Intel(R) Core(TM) i7-3615QM CPU @ 2.30GHz, Java 1.8.0_92-b14.


    ## Don’t Forget


    The environments in Figure [2-1](#A449023_1_En_2_Chapter.html#Fig1) and Figure
    [2-2](#A449023_1_En_2_Chapter.html#Fig2) are substantially different! This chapter
    has discussed all the things that were excluded from the design of the developer
    modest tuning environment (Figure [2-1](#A449023_1_En_2_Chapter.html#Fig1)). We
    are cutting scope so we can vet the performance of the part of the system that
    we developers are responsible for—the code. Hence the Code First mantra.


    I can appreciate that the small developer tuning environment I’m proposing looks
    unconventional, so much so that you might wonder whether it reproduces realistic
    enough conditions to make tuning worthwhile. In short, the appearances of this
    environment design seem wildly artificial.


    In response, I will say that this particular environment design addresses a longstanding
    specific strategic need that helps avoid last-minute rush-job performance tuning
    efforts that have left our systems, and perhaps even our industry, a bit unstable.
    The modest tuning environment also helps us identify and abandon poorly performing
    design approaches earlier in the SDLC.


    Few question the efficacy of a wind tunnel to vet aerodynamics or a scale-model
    bridge to assess stability. The wind tunnel and the model bridge are wildly artificial,
    yet widely accepted test structures inserted into the development process to achieve
    strategic purposes. This small developer tuning environment design is our technology
    offering to address long standing, industry-wide performance issues.


    There will be skeptics that say that a small environment can never provide a close
    enough approximation of a production workload. These are generally the same people
    that feel that performance problems are only rarely reproducible. To this group
    I would say that the modest tuning environment is a reference environment that
    we use to demonstrate how to make our systems perform. We won’t fix everything,
    but we have to begin to demonstrate our resilience somewhere and somehow.'
