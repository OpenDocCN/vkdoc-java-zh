  trans: "\n## 区分高吞吐量与慢速堆栈跟踪\n\n在使用 MTDP 时，我大部分时间都在寻找某些极其缓慢的处理过程的根因。在线程转储中，我预期会看到相同的堆栈跟踪出现在超过\
    \ 50% 的堆栈中。假设从 4 个线程转储的 12 个跟踪中，有 6 个包含完全相同的方法。\n\n对同一数据的另一种解读是，这个特定的业务流程之所以更频繁地出现，并非因为响应时间慢，而是因为它具有更高的吞吐量——它被执行得更频繁，因此出现得更频繁。这听起来是一种可能性，但有一种简单的方法可以验证。\n\
    \n之前我们说过，线程转储是在某个时间点捕获的，任何一个转储都是在主要处理事件之前、期间或之后捕获的。仔细看看那个出现在 12 个线程转储中 6 个里的方法。如果在这\
    \ 6 个堆栈跟踪中，“当前”标记有时在主要处理事件之前、有时在中间、有时在之后波动，那么我承认高吞吐量是频繁出现的原因。\n\n另一方面，如果所讨论的堆栈跟踪具有完全相同的当前、触发和入口点，那么这就是一个慢速请求。\n\
    \n## MTDP 与其他示例\n\n将此性能键输入到 littleMock 中：\n\nX2,J25,K25,L0,Q1,R1,S1,T1\n\n如果你获取一些线程转储，你会发现这两个方法都会出现：\n\
    \njavax.xml.transform.TransformerFactory.newInstance ()\n\ncom.sun.org.apache.xalan.internal.xsltc.trax.TransformerFactoryImpl.newTransformer()\n\
    \n现在，将上述键中的 T1 改为 T2 并应用新键。性能会显著提升。T2 是如何处理如此高的吞吐量的？在 littleMock 网页上搜索 T2 并点击“源代码链接”来寻找答案。\n\
    \n让我们切换回另一组示例——jpt。MTDP 可以诊断 jpt 测试中的许多问题。为了方便你，这里再次提供 URL：\n\n[`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)\n\
    \n考虑以下示例：\n\n*   `jpt` 测试 01a 对后端有非常慢的请求。运行 `jpt` 测试 01a，捕获一些线程转储，并查找 `SocketInputStream.socketread0()`。\n\
    *   `jpt` 测试 02a 对一个 1MB 的数据文件进行了多次读取。线程转储会显示多个包含此方法的线程：\n*   `com.github.eostermueller.perfSandbox.filesystem.FileSystemReader.readFile()`\n\
    *   `jpt` 测试 04a。此测试使用了一个有问题的表连接，导致结果集迭代缓慢。我不得不获取 5 或 6 个线程转储，但结果集迭代在这里确实很明显：\n\
    \n    ```\n    org.h2.result.ResultRemote.next(ResultRemote.java:133)\n    org.h2.jdbc.JdbcResultSet.nextRow(JdbcResultSet.java:3240)\n\
    \    org.h2.jdbc.JdbcResultSet.next(JdbcResultSet.java:123)\n    com.zaxxer.hikari.pool.HikariProxyResultSet.next(HikariProxyResultSet.java)\n\
    \    com.github.eostermueller.perfSandbox.dataaccess_1.AccountMgr1.getAccounts(AccountMgr1.java:76)\n\
    \    ```\n\n*   `jpt` 测试 05b。线程转储在这里显示了两件有趣的事情：\n    *   如前所述，网络活动会在线程转储中出现在此方法下：`java.net.SocketInputStream.socketRead0()`\
    \ 在此示例中，它出现是因为一个非常慢的查询缺少数据库索引。\n    *   看到下面的 `executeQuery()` 调用了吗？如果你找到调用 `executeQuery()`\
    \ 的方法，就能找到 SQL 语句。我已经高亮显示了调用 `executeQuery()` 的方法，你将在那里找到 SQL 语句的文本：\n\n     \
    \   ```\n        com.zaxxer.hikari.pool.HikariProxyPreparedStatement.executeQuery()\n\
    \        com.github.eostermueller.perfSandbox.dataaccess_1.AccountMgr1.getAccounts(AccountMgr1.java:73)\n\
    \        com.github.eostermueller.perfSandbox.Controller.internalInquiry2(Controller.java:353)\n\
    \        ```\n\n所以你可以从这些示例中看到，线程转储非常强大，能够揭示所有这些与 BLOCKED 线程无关的问题。\n\nJava 分析器显然可以找到\
    \ MTDP 能发现的所有这些问题，甚至更多。那么，何时以及应该使用哪种工具呢？简而言之，当你无法使用 Java 分析器或 APM 工具时，请使用 MTDP。总之，使用其中一种，或者两者都用，只要使用它们就行，哪种对你来说最有效/最快就用哪种。\n\
    \n## 别忘了\n\n我们在本章中涵盖了很多内容。我们了解了如何获取线程转储并识别入口点、触发点和当前标记，还学习了如何检测特定线程是否正在承受负载。我们还介绍了手动线程转储分析（MTDP）的说明，并提到在承受负载的线程转储中，线程很少是快速类/方法——相反，MTDP\
    \ 基本上是一个专属于慢速操作的俱乐部。\n\n然后，我们讨论了如何绘制用户活动的时间线，并确定堆栈跟踪是在主要处理之前、期间还是之后捕获的。了解这一点至关重要，因为如果一个堆栈跟踪看起来速度很慢，并且出现在主要处理之前，那么恭喜你，你发现了主要反模式\
    \ 1——不必要的初始化。\n\n此外，在一个示例中，我们插入了一个 50ms 的 `Thread.sleep()`，并且能够在线程转储中轻松检测到它。MTDP\
    \ 能够发现如此微小的问题，令人印象深刻。但 XML 优化的示例更令人印象深刻。我没有展示响应时间指标，但该示例的响应时间改进不到 5ms。这表明 MTDP\
    \ 不仅有效，而且非常敏感，能够发现大大小小的问题。\n\n所以你看，线程转储的意义远不止查看阻塞线程。你实际上可以像使用一个微型 Java 分析器一样使用\
    \ MTDP。有了这样一个强大且低开销的工具，你可以在现实世界的黑暗环境中发现各种各样的问题。\n\n与任何测量一样，会存在变异性，尤其是在中低吞吐量环境中运行时。你放入低吞吐量环境的任何工具都会产生可变的结果。这是任何测量都会关心的问题。但就像大多数其他分析器一样，MTDP\
    \ 不会显示你的环境中是否存在垃圾回收导致的性能下降。\n\n## 下一步\n\n由于 MTDP 和一般的 Java 分析器没有垃圾回收的指标，下一章将提供一种非常快速的方法来评估\
    \ GC 健康状况。还有一个关于检测内存泄漏原因的精彩部分，敬请期待。\n"
- fmt: '# 12. Heap, the “h” in P.A.t.h.


    This is the last of the four P.A.t.h. Checklist chapters. Remember that until
    the root of the problem is found, you need to check all four parts of the Checklist.
    This chapter starts out with a very basic Garbage Collection health check—it should
    take just a few minutes to capture the data and make a healthy/not-healthy assessment.


    But by the end of the chapter, I will have you doing more involved tasks, like
    rummaging through heap dumps to find the root cause of memory leaks that come
    with this book’s sample applications.


    The objectives for this chapter are:


    - Learn how to quickly assess GC Health in any JVM. No extra configuration is
    required, no need to restart the JVM.

    - Understand the high-level approach to troubleshooting performance issues with
    the heap.

    - Fix the most common GC inefficiencies by first understanding which heap space
    is causing your problem, the old space or the new space.

    - Pinpoint the cause of a memory leak by discovering the names of classes with
    high memory consumption, but also understand how consumption for individual classes
    trends over time.

    - Take a first look at using a heap analysis tool to discover the root cause of
    a memory leak.


    The Quick GC Health Check in this chapter boils down GC performance into two easy-to-capture
    metrics that are available from tools right there in the JDK. There are no extra
    JVM parameters to configure, no JVM restart is required. These are plug-it-in-now
    metrics, available right when you want them. I’ll provide my own thresholds on
    what numbers translate into “healthy” or not; you can adjust them based on your
    own experience.


    Along with this health check, this chapter provides a review of a number of other
    GC/heap analysis techniques. Ultimately I will roll them up into a nice little
    set of steps that will guide you through fixing the majority of all the GC/heap
    performance problems you encounter.


    One of my goals for this chapter this to show that a great amount of GC/heap tuning
    can be done without knowing much at all about GC algorithms.


    ## Quick GC Health Check


    Understanding how much improvement can be made on a particular slow-looking GC
    metric, or any slow-looking metric actually, is a bit challenging. So when it
    comes to assessing GC health, I make it easy on myself with a simple RED-YELLOW-GREEN
    approach.


    It starts with a simple “GC overhead” metric, which is the amount of time spent
    garbage collecting measured over an elapsed time. So if 150ms (0.150 seconds)
    of the last 1000ms have been spent in GC, then that’s 15% GC overhead. 20ms (0.02
    seconds) out of 1000ms is 2% overhead.


    Here is how I use the GC overhead metric to triage performance problems with the
    heap:


    - **RED**: If sustained GC overhead is greater than 8%, then high priority should
    be given to improving GC performance.

    - **YELLOW**: If sustained GC overhead is greater than 2% (but less than 8%),
    then start researching improvements, but there is no rush to implement a GC change.
    Moving from GREEN to YELLOW will often be an early warning sign of a memory leak.

    - **GREEN**: when sustained GC overhead less than 2% GC performance is considered
    healthy, and no GC tuning is required. However, systems that require faster response
    times (perhaps less than 25ms) will still see benefit if GC is tuned more, perhaps
    down to 0.5%.


    The phrase “sustained GC overhead” roughly means sustained for 5 minutes or more.
    If you don’t like the percentages I’ve assigned to RED-YELLOW-GREEN, I promise
    I won’t be offended if you alter them to accommodate your experience. The point
    is that development and operations teams need a consistent approach for determining
    when corrective action should be taken.


    Even if aggregate overhead is low, occasional spikes can be worrisome. Consider
    using a similar grading scale, like this:


    - **RED**: More than five 3-second pauses an hour

    - **YELLOW**: Between two and five 3-second pauses an hour

    - **GREEN**: one or fewer 3-second pauses an hour


    Keep in mind that the G1 garbage collector algorithm was designed to minimize
    these spikes.


    We will discuss the tools you can use to capture this GC overhead metric, but
    first let’s look at the traditional approach/tooling to capturing GC metrics.


    ### The Traditional Approach to GC Metrics


    To use the latest and greatest GC performance analysis programs, you need to enable
    your JVM to capture a verbose GC file and then analyze the file. First add a few
    parameters to your JVM start up:


    ```

    -Xloggc:gc.log

    -verbose:gc

    ```


    Then restart the JVM and reproduce the problem. Then you transfer the `gc.log`
    file back to your desktop, and download and install an analysis program that graphs
    the GC data.


    That is a lot of work, but often, additional JVM settings like the following are
    required to get the full picture of the problem:


    ```

    -XX:+PrintGCDetails

    -XX:+PrintGCDateStamps

    -XX:+PrintGCTimeStamps

    -XX:+PrintTenuringDistribution

    -XX:+PrintClassHistogram

    -XX:+PrintGCApplicationStoppedTime

    -XX:+PrintPromotionFailure

    -verbose:sizes

    ```


    I’m often unsure whether I know the current, full list of parameters to fully
    vet GC performance or whether the full list even exists. Furthermore, for operational
    harmony and to avoid filling the hard disk with great performance data, these
    parameters are essential:


    ```

    -XX:+UseGCLogFileRotation

    -XX:NumberOfGCLogFiles=5

    -XX:GCLogFileSize=10m

    ```


    It takes an unusually patient snake charmer to collect verbose GC metrics, with
    the many and varied JVM parameters and the requisite JVM restarts. Making sure
    all the right parameters stay in place across all environments seems difficult
    at best, even though real performance analysis stalls until the JVM snake charmers
    have done their work. When performance analysis stalls during a crisis, angst
    and frustration rise.


    To the good people who run the OpenJdk project, I think it is reasonable to ask
    that all out-of-the-box JVMs capture these low-overhead metrics by default, with
    parameters to tweak or turn them off as necessary. How about as a default, we
    could have a modest 10MB max footprint for the data files?


    New open source and freely available graphing and analysis tools show up every
    year that provide better understanding of verbose GC data. This is a nice, open
    and growing tool ecosystem, even if snake charming is required to capture data.
    It would be nice if the graphing tools displayed a live view of the data, instead
    of the current batched approach, processing from a file.


    Live GC data, graphed, can be retrieved from a different toolset: the Visual GC
    and gcViewer plug-ins for JVisualVM that comes with the JDK. JConsole provides
    metrics, too. But these facilities lack a number of important metrics, they are
    less mature, and enhancements are infrequent.


    Here are four main facilities for capturing GC performance data:


    - Verbose GC

    - `JAVA_HOME/bin/jvisualvm` and `JAVA_HOME/bin/jconsole`

    - `JAVA_HOME/bin/jstat`

    - Third-party tools like Application Performance Management (APM) tools, Dynatrace,
    AppDynamics, and so on


    Ultimately, this third option, `jstat`, will be the tool we use to capture metrics
    for the RED-YELLOW-GREEN approach. But before we jump into that, let’s quickly
    review a few high-level things in the next section about the GC.'
