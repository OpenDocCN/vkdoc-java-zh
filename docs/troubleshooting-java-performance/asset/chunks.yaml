- fmt: "# Don’t Forget\n\nImagine a college entrance exam that was printed in a font\
    \ so small that the test takers, even with young eyes, were squinting at their\
    \ desks for the duration and could not really read the tiny print. We would call\
    \ that an invalid test, and no one in their right mind would even look at the\
    \ students’ results, much less make life-changing college entrance decisions based\
    \ on them. The lesson here is this: discard the results of invalid tests.\n\n\
    Likewise, before making decisions based on the results of a load test, you must\
    \ first assess whether a test is valid, whether it approximates the conditions\
    \ in your production environment closely enough. This chapter explored a number\
    \ of criteria that, in my experience, make a test invalid. The validity of every\
    \ single performance test should be carefully assessed before acting upon its\
    \ results.\n\n# What’s Next\n\nDoes your system scale? When was the last time\
    \ you checked? Chapter [6](#A449023_1_En_6_Chapter.html) provides a specific and\
    \ novel formula for testing scalability. It is so easy to follow, you can measure\
    \ for scalability every day of the week, to help keep performance angst at bay.\
    \ The test is called the Scalability Yardstick.\n\n# 6. A Scalability Yardstick\n\
    \nFew systems achieve scalability these days, because scalability tests are run\
    \ so infrequently. This chapter shows how to run a scalability test that is so\
    \ quick-and-easy, you can run it every day of the week, providing much needed\
    \ guidance to finally steer your SUT toward scalability.\n\nThe objectives of\
    \ this chapter are:\n\n- Learn a formula to determine exactly how many threads\
    \ or load to apply so you can easily see how close your system is to scaling.\n\
    - Learn how to recognize when test data shows you have reproduced a performance\
    \ problem that is an impediment to scalability.\n\nTrying to fix a defect that\
    \ you can’t reproduce is daunting, and performance defects are no exception. This\
    \ chapter walks you through a methodical approach to reproducing defects that\
    \ keep your system from scaling. Chapter [8](#A449023_1_En_8_Chapter.html) is\
    \ where we start using the P.A.t.h. Checklist to diagnose and fix the problems.\n\
    \nThe Scalability Yardstick is a variant of the good old incremental load plan,\
    \ often lost in the annals of performance best practices. This variation is built\
    \ to show us exactly how much load to apply and how to recognize when we have\
    \ reproduced a problem, an impediment to scalability.\n\nScalability is a system’s\
    \ ability to increase throughput as more hardware resources are added. This definition\
    \ is accurate and concise, but it is also painfully unhelpful, especially if,\
    \ like most technicians, you are looking for concrete direction on how to make\
    \ your system scale.\n\nTo fill this void and provide a little direction, I use\
    \ the following load test that I call the Scalability Yardstick:\n\n1. Run an\
    \ incremental load test with four equal steps of load, the first of which pushes\
    \ the app server CPU to about 25%.\n2. When this test produces four squared, chiseled\
    \ steps of throughput, the last of which pushes the CPU to 100%, the SUT is scalable.\n\
    \nLet’s start by seeing how to use the load generator to create a load plan for\
    \ the Yardstick, and then we will talk about how scalability actually works. It\
    \ takes a little bit to explain this approach, but it becomes second nature after\
    \ you do it a few times.\n\n## Creating a Scalability Yardstick Load Plan\n\n\
    The Scalability Yardstick says that your first step of load needs to push the\
    \ SUT to consume about 25% of the CPU. How many threads of load will it take to\
    \ reach 25%? You need to run a quick test to find out. This essentially calibrates\
    \ the Yardstick to the SUT and this environment.\n\nThe JMeter test plan shown\
    \ in Figure [6-1](#A449023_1_En_6_Chapter.html#Fig1) asks the question, “At which\
    \ of these 10 steps will the SUT CPU consumption reach 25%?”\n\n![A449023_1_En_6_Fig1_HTML.jpg](A449023_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1. JMeter load plan used to see how many threads of load it takes to\
    \ push the application server CPU to 25%\n\nHere are some brief instructions for\
    \ doing this:\n\n1. Install JMeter from `jmeter.apache.org`.\n2. Install the Concurrency\
    \ Thread Group using one of these two options:\n   1. Install the Plugin Manager\
    \ into JMeter by downloading a jar from here: [`https://jmeter-plugins.org/install/Install/`](https://jmeter-plugins.org/install/Install/)\
    \ into the `JMETER/home/ext` directory. Restart JMeter and then select Custom\
    \ Thread Groups from the Options / Plugins menu.\n   2. Download the zip file\
    \ directly from here: [`https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/`](https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/)\
    \ …and unzip the contents into `JMETER_HOME/lib` and `lib/ext` folders, as they\
    \ are in the zip file.\n3. Restart JMeter.\n4. Add the Concurrency Thread Group\
    \ using the menu options in Figure [6-2](#A449023_1_En_6_Chapter.html#Fig2).\n\
    \n   ![A449023_1_En_6_Fig2_HTML.jpg](A449023_1_En_6_Fig2_HTML.jpg)\n\n   Figure\
    \ 6-2. Adding the Concurrency Thread Group to a new JMeter load plan.\n5. Dial\
    \ in the 10-10-10-1 options in Figure [6-1](#A449023_1_En_6_Chapter.html#Fig1).\n\
    \nFigure [6-3](#A449023_1_En_6_Chapter.html#Fig3) shows the results of this short\
    \ little calibration test, or at least the very first part of it. By the time\
    \ the test reached just the second of 10 steps, I had seen enough, so I stopped\
    \ it.\n\n![A449023_1_En_6_Fig3_HTML.jpg](A449023_1_En_6_Fig3_HTML.jpg)\n\nFigure\
    \ 6-3. Discovering how many threads it takes to push the CPU to 25%. This graph\
    \ with two different metrics (CPU and active threads) was made possible by Composite\
    \ Graph and PerfMon, both from `jmeter-plugins.org`. Learn how to use them in\
    \ Chapter [7](#A449023_1_En_7_Chapter.html) on JMeter.\n\nThe load plan in Figure\
    \ [6-1](#A449023_1_En_6_Chapter.html#Fig1) shows that each step of load should\
    \ have lasted about 60 seconds, and it did. We know this because the black line\
    \ (below Active Threads Over Time) travels at a Y axis value of 10 for 60 seconds,\
    \ then at 20 for the rest of the test. The autoscaling on this graph is a big\
    \ confusing. The `(x10)` that is displayed in the legend means the 10 and the\
    \ 20 are magnified by 10 on the graph, and are actual values of 1 and 2 instead\
    \ of 10 and 20.\n\nThe yellow line in Figure [6-3](#A449023_1_En_6_Chapter.html#Fig3)\
    \ shows that the first thread of load pushed the CPU to about 15% and the second\
    \ thread (at the 60 second mark) pushed the CPU to about 28%. The whole purpose\
    \ of the test was to push the SUT to at least 25%, so I stopped the load generator\
    \ after the step that first hit 25%. The calibration is complete.\n\nThe Yardstick\
    \ says we need “four equal steps of load, the first of which pushes the CPU to\
    \ about 25%.” Since two threads pushed the SUT to about 25% CPU, 2 is the size\
    \ of each of the four equal steps in the Yardstick. We now know enough to create\
    \ our Yardstick load plan."
