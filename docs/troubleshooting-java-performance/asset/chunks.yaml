  trans: "\n### 为重度调试或高吞吐量合理调整输出文件大小\n\n这是“每个 jmx 文件仅一个输出文件”规则的第二条例外情况，同时它也是一个极好的特性，你需要使用它来避免负载生成器上的数据过载。负载生成器是高度可配置的“猛兽”，很容易错误配置它们，导致其处理、计算和存储大量数据，从而影响负载生成器性能，并使测试结果更多地反映负载生成器自身的问题，而非被测系统的性能。\n\
    \n然而，在两种不同场景下，收集大量数据（HTTP URL、响应码、输入输出 XML、Cookie、脚本变量等）对于故障排查至关重要：\n\n*   调试负载脚本，包括错误和成功的请求。\n\
    *   在负载测试期间，排查来自被测系统的错误。\n\nJMeter 通过允许你保留两个基本输出文件来满足这一用例，一个采用.csv 格式，另一个采用 XML\
    \ 格式。XML 文件占用空间更大，CPU 消耗也更高，但仅用于采样器失败的情况，这种情况通常不常发生。在单独的 csv 格式的.jtl 文件中，JMeter\
    \ 将保留所有活动（无论成功或失败）的更小、更精简但高容量的记录。\n\n以下是实现方法：\n\n1.  在 `JMETER_HOME/bin/user.properties`\
    \ 中，添加以下属性，将默认的.jtl 文件格式设置为 csv，而不是更耗 CPU、更冗长且体积更大的 XML 格式：`jmeter.save.saveservice.output_format=csv`\n\
    2.  添加其他监听器，例如一个不错的 `jp@gc - Synthesis Report (filtered)`，它是普通摘要报告的功能更全面的版本。指定一个.jtl\
    \ 文件名（当然，别忘了包含.jtl 文件的路径，正如我之前建议的，以避免漫长的“捉迷藏”）。\n3.  在负载计划树中添加一个“查看结果树”监听器。指定一个与步骤\
    \ 2 中使用的不同的.jtl 文件名。对我来说，为所有.jtl 文件使用相同的路径很有帮助。\n4.  仅针对这一个监听器：\n    1.  勾选“错误”复选框。这有点令人困惑，但它告诉\
    \ JMeter 仅记录错误，并避免为成功的采样器请求记录详细日志带来的巨大开销。在施加负载时不要忘记这个勾选；我们将在下一节讨论原因。\n    2. \
    \ 通过单击“配置”按钮，覆盖“查看结果树”中的 csv 文件格式，如图 7-12 所示。\n\n        ![A449023_1_En_7_Fig12_HTML.jpg](img/A449023_1_En_7_Fig12_HTML.jpg)\n\
    \n        图 7-12.\n\n        “配置”按钮，允许你启用/禁用输出文件的 XML 格式\n    3.  要仅针对这一个监听器将\
    \ csv 文件格式覆盖为 XML 文件格式，请按图 7-13 所示勾选复选框。\n\n        ![A449023_1_En_7_Fig13_HTML.jpg](img/A449023_1_En_7_Fig13_HTML.jpg)\n\
    \n        图 7-13.\n\n        指定输出日志文件 XML 格式所需的复选框\n\n## 录制 HTTP 脚本\n\n以下说明介绍了如何录制\
    \ HTTP 脚本：\n\n[`http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf`](http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf)\n\
    \n与其重复这些说明，我认为强调录制过程中的几个关键步骤更为重要。\n\n过去，正确配置.jmx 文件以进行录制非常困难。现在，有一种简单的方法可以创建它：从\
    \ JMeter 模板开始配置.jmx。\n\n选择“文件” ➤ “模板”菜单选项。然后在顶部中央的组合框中选择“录制”模板。最后，单击“创建”，如图 7-14\
    \ 所示。\n\n![A449023_1_En_7_Fig14_HTML.jpg](img/A449023_1_En_7_Fig14_HTML.jpg)\n\
    \n图 7-14.\n\nJMeter 屏幕，用于选择指定将浏览器网络流量录制到.jmx 文件所需详细配置的模板。\n\n选择“录制”模板后，JMeter\
    \ 计划树应如图 7-15 所示。\n\n![A449023_1_En_7_Fig15_HTML.jpg](img/A449023_1_En_7_Fig15_HTML.jpg)\n\
    \n图 7-15.\n\n选择“录制”模板后的 JMeter 计划树\n\n图 7-16 详细说明了该过程的一个关键部分：浏览器的 HTTP 代理配置。如果没有配置\
    \ HTTP 代理，浏览器会直接向互联网发送请求。配置代理后，所有请求都会被转发到指定的主机（标记为“地址”）和端口。\n\n![A449023_1_En_7_Fig16_HTML.jpg](img/A449023_1_En_7_Fig16_HTML.jpg)\n\
    \n图 7-16.\n\nInternet Explorer HTTP 代理配置和 JMeter HTTP 代理服务器。看到 IE 如何配置为将所有请求发送到本地主机的\
    \ 8888 端口，而 JMeter 如何配置为监听完全相同的端口上的所有请求了吗？许多 JMeter 用户未能正确配置此项。\n\n请注意，左侧的 IE\
    \ 地址输入框必须指向本地机器，并且 IE 中的端口号（左侧）和 JMeter 面板上的端口号（右侧）必须匹配。图 7-16 中的值是 8888。还要注意\
    \ JMeter 的“启动”按钮已禁用，这意味着它已被点击以启动 JMeter HTTP 代理程序。\n\n当 IE 代理配置正确，并且你单击 HTTP(S)测试脚本录制器上的大“启动”按钮时，所有浏览器网络流量都将被转发到\
    \ JMeter HTTP 代理，JMeter 代理将立即将所有流量转发到被测系统。当你浏览被测系统时，JMeter 将录制所有流量。\n\n将你的被测系统\
    \ URL 粘贴到浏览器中，并开始导航你想要录制的业务流程。导航完成后，退出被测系统，并单击图 7-16 右侧 JMeter 的 HTTP(S)测试脚本录制器上的“停止”按钮。\n\
    \nJMeter 将在“录制控制器”中显示所有录制的流量，如图 7-17 所示。\n\n![A449023_1_En_7_Fig17_HTML.jpg](img/A449023_1_En_7_Fig17_HTML.jpg)\n\
    \n图 7-17.\n\nJMeter 的“录制控制器”捕获了用户在浏览器中导航被测系统时的网络流量\n"
- fmt: '# Debugging an HTTP Recording


    Working with XML Schema validators can be a pain. The validation errors are so
    cryptic, so not-quite-English. It reminds me of being on a technical support call
    with the dunce of the English-as-a-second-language (ESL) class. But the only thing
    worse than working with a tightly governed XML Schema is a system without any
    schema at all, where there are no good rules for right/wrong input.


    This is exactly like the load generator''s task of properly assembling the HTTP
    GET to pass to a web application. What URL parameters are required on the HTTP
    GET? What kind of web authentication is used? Are CSRF tokens or `JSESSIONID`
    required? Any other cookies? What HTML "hidden" variables are pulled from the
    previous HTML response by the SUT''s browser code and used to build the HTTP GET
    parameters for a subsequent page? All this uncertainty makes me pine for some
    kind of tightly governed schema that would plainly spell out the requirements.
    In fact, answering any of these questions wrong generally results in an incomplete
    HTML response and/or an exception on the server side, and getting this kind of
    an error is a likely sign that your `.jmx` load script is broken—perhaps out of
    sync with SUT requirements.


    One way of dealing with this uncertainty is to keep a backup of the verbose HTTP
    log of the initial recording, along with the initially recorded load script itself.
    This creates a tidy little vault of all the required data items; it isn''t a schema,
    but it is close enough. But then load script maintenance happens. Bugs are easily
    introduced later on when enhancing the script as detailed in Chapter 4. Remember?
    These are the changes required to make your load resemble the actual production
    load.


    When a load script bug shows, you can find whether you have all the required data
    items by performing a detailed text file "diff" between the original verbose HTTP
    log and the one from the test run with the bug. The following JMeter instructions
    show how to capture those verbose HTTP logs.


    When you look at the differences between those logs, you most often find that
    you did not fully understand the HTTP GET requirements (two paragraphs above).
    Alternatively, perhaps you have deployed a different version of the SUT with different
    requirements for an HTTP GET.


    To repeat, the "diff" you will need to perform is between two different logs:
    one of the HTTP recording of the business process and the other from playing back
    the script. I use the JMeter View Results Tree to create these logs. The one for
    the recording must be under the Workbench (see Figure 7-18). The one for the playback
    must be configured to record in XML format like the first one, but instead it
    must be an immediate child of Test Plan, with a different output file name (obviously).
    You can use the JMeter copy/paste to copy the one created in the Workbench (as
    in the following instructions) to the Test Plan.


    ![A449023_1_En_7_Fig18_HTML.jpg](A449023_1_En_7_Fig18_HTML.jpg)


    Figure 7-18. The JMeter Recording template (File ➤ Templates ➤ Recording ➤ Create)
    used to record full request/response and other detail of the HTTP recording process


    To capture that very detailed log of the HTTP recording, do the following:


    1. Start a new test plan for recording: File ➤ Templates ➤ Recording ➤ Create.

    2. Select the View Results Tree that is a grandchild of the WorkBench, as shown
    in Figure 7-18.

    3. Specify the path/file for the log to be created.

    4. Make sure there is no checkmark in the Errors checkbox. This will insure that
    everything gets recorded.

    5. Click the Configure button and set the check marks as shown in Figure 7-13
    earlier.

    6. Start the recording, as shown in the JMeter doc: (`http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf`).


    ## Load Testing Java Directly and Debugging


    Once upon a time I was load-testing the reporting section of a loan system. When
    a user requested a small 1K report, it had to be extracted from specific byte
    offset into a single multi-megabyte file that was periodically downloaded from
    a back-end system. Response time under load for this component got as slow as
    5 seconds; server-side concurrency was about five threads.


    Unfortunately, the system was down for database maintenance, so the environment
    wasn''t available for further investigation. I didn''t have access to the source
    code, so I decompiled the source code (using `jad.exe`) to have a look. The code
    used `java.io.FileInputStream` to `read()` through the file one segment of bytes
    at a time, which provides no option to skip any bytes or jump to a particular
    location in the file. So if my 1K report was located at the end of the 10MB bundled
    report, the code would have to read through 9+ MB of data that was discarded.
    What a waste! By the way, this is an example of the Main Anti-Pattern 3—Overprocessing.


    So I needed to test my new implementation of the code, which used the `java.io.RandomAccessFile`
    to "seek" directly to the specified offset and return the 1K report. When I ran
    my test 100 times in a row from a single thread, the new implementation was faster.
    But I had to convince my boss that response time at five threads of load would
    be better than the 5 seconds seen previously.


    I knew how to launch my code five separate threads, but I thought collecting the
    results from those separate threads would take too much time to code, and then
    I''d have to graph the data somehow. So instead of launching the five threads
    myself, I had JMeter do it for me.


    In hindsight, I also could have used `jmh`, which comes with the JDK:


    `http://openjdk.java.net/projects/code-tools/jmh/`


    The following shows how I got JMeter to launch five threads, all running my `RandomAccessFile`
    implementation of the reporting code; it took about 15 minutes to figure it all
    out. I actually ended up with JMeter graphs that compared the performance of both
    implementations, and the `RandomAccessFile` approach was tons faster—about 100-400ms
    for 5 threads of load, zero think time.


    1. Put the code that you want to performance test into a new class that implements
    `org.apache.jmeter.protocol.java.sampler.JavaSamplerClient`. Extending one of
    these classes could be helpful too: `org.apache.jmeter.protocol.java.sampler.AbstractJavaSamplerClient`,
    `org.apache.jmeter.protocol.java.test.JavaTest`.

    2. Create a new jar file with your class and dependent class files in it, although
    there is no need to package files in the JMeter package space.

    3. Add your `.jar` file and any dependent third-party jar files in the `JMETER_HOME/lib/ext`
    folder.

    4. Create a new JMeter `.jmx` plan. Add a Thread Group and configure the five
    threads of load.

    5. As a child of that Thread Group, add a new Java Request Sampler: `http://jmeter.apache.org/usermanual/component_reference.html#Java_Request`.

    6. Restart JMeter.

    7. Select the Java Request Sampler. In the Classname combo box, select the class
    name you coded in step 1.

    8. To enabled debugging, add the following environment variable before launching
    `jmeter.sh` or `jmeter.cmd`: `JVM_ARGS=-agentlib:jdwp=transport=dt_socket,server=y,address=8000`

    9. In Eclipse, start a remote debugging session listening on port 8000. Set breakpoints
    in your source and then launch the JMeter script from the JMeter menu (Run ➤ Start)
    to trigger the breakpoint.'
