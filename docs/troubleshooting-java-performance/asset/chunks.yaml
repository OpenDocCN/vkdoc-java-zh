    你在生产环境中常见的大部分性能缺陷，即使只运行一个业务进程并施加少量线程负载（例如 3t0tt），且系统中不包含任何其他业务进程时，也能被发现。因此，我认为“单一业务进程”负载是一种“有效”的测试，即使它并不包含生产工作负载中的所有业务进程。


    当然，偶尔也会出现这样的情况：只有当两个特定的业务进程在同一工作负载中运行时，你才能复现某个性能缺陷——比如两个进程对关系型数据库表中同一行数据进行读写操作，例如“查询订单状态”和“更新订单状态”。许多应用程序使用表来监控工作流中某个进程的状态。这些情况也必须一起进行负载测试。


    最后，我想通过提及一些其他需要注意的处理类型来结束本节关于“错误工作负载问题”的讨论。有时，当你在某台机器上进行负载测试时，那台机器并非 100% “属于你”。自动安装程序在后台运行，备份任务意外启动，谁知道病毒扫描程序何时会介入。


    如果你怀疑存在任何这些问题，不要满足于仅显示 CPU 或 CPU 核心级别 CPU 消耗的传统 CPU 指标。相反，请花点时间，像我们在第 2 章中对适度调优环境所做的那样，使用
    PerfMon 查找并绘制每个 PID 的 CPU 消耗图。


    [`https://jmeter-plugins.org/wiki/PerfMonMetrics/#Per-Process`](https://jmeter-plugins.org/wiki/PerfMonMetrics/#Per-Process)


    ## 负载脚本错误


    在进行性能调优时，你总会遇到一些有趣的问题（我妻子说我本人就是一个有趣的问题）。为什么在（似乎）什么都没改变的情况下，性能反而变差了？为什么这两个指标相互矛盾？同样，当你试图找出导致
    JVM 进程死亡的全面灾难性故障的原因时，你得像准备一顿丰盛的午餐一样做好充分准备——这其实也挺有趣的。与这类问题“搏斗”正是我的乐趣所在。但是，被平凡的功能性故障拖累，就没那么愉快了。


    事实上，由于乐趣太少，忽略功能性错误不幸地成了我的第二天性。我经常对自己说：“我在录制负载生成脚本时没有看到任何错误，那么当我重放同一个脚本时，怎么可能会有问题呢？”


    几年前，我们曾苦苦寻找性能如此糟糕的原因。我当时正在重构一个负载脚本，让它从一个 .csv 文件中读取用户名和密码（它们是测试密码，真的，千真万确），这样我的负载生成器脚本就不会让每个线程都使用完全相同的用户登录被测系统。我们想知道
    SQL 缓存代码是否在工作（并且性能良好）。重构脚本后，负载测试成功登录了数百个用户（至少我是这么认为的），响应时间快得惊人，吞吐量翻了一番（或者翻了三倍？）。我向团队宣布了这个好消息，随后大家庆祝了一番。


    但实际情况是，我忘记在我新创建的 .csv 数据文件中为用户 ID 添加正确的两个字符前缀，结果没有一个用户成功登录，我编写的所有业务进程也都没有得到实际执行。当我纠正了数据文件中的用户名后（唉），我们原来糟糕的性能又完全恢复了。没错！性能测试中充满了这种苦乐参半、令人怀疑的“胜利”。因此，我实际上一直在对大量的系统故障进行负载测试，这当然不是我们核心关注点的优先事项。


    所以，请从我的错误中吸取教训，花时间增强你的负载脚本，不仅要检查每个 HTTP 或其他被测系统响应中的功能性错误，还要确保出现了正确的响应。我会重复这一点，因为它非常重要：你的负载脚本必须检查常见错误（如“exception”、“error”及其他错误消息文本）的缺失，同时也要检查预期结果的存在，例如查询时的账户余额，或创建订单时生成的唯一
    ID。理查德·费曼曾说过：“首要原则是你不能欺骗自己——而你自己是最容易被欺骗的人。”


    让对性能结果的怀疑精神成为一项团队活动，这将建立团队在整个调优过程中的信心。错误计数应该获得与吞吐量和其他指标同等的首要关注。


    一位评论员曾这样评价皮克斯动画电影《机器人总动员》：


    “这些机器人，通常被认为没有情感的生物……必须说服观众它们拥有灵魂和个性。”


    作为性能工程师，我们的工作是说服我们的听众（我们的开发/QA 团队和我们的客户）相信负载测试是真实的，相信负载测试对被测系统施加的压力与生产环境中的压力非常相似。为什么？这样团队才会有动力去修复出现的任何性能问题。有时，我对负载测试结果非常怀疑（实际上，只是害怕所有可能的尴尬），以至于我会去清点被测系统重要关系型数据库表中的行数。通常，我会选择那些变化最大、最大的表。然后，我会确保测试前后的表计数与负载生成器报告的吞吐量结果一致。例如，假设负载生成器报告在一个
    300 秒的测试中，每秒执行了 10 个“创建新账户”进程。测试结束后，我会确保账户表中的记录比测试开始前多了大约 3000 条。


    你可能会认为，通过让负载生成器记录所有线程的完整 HTTP 请求和响应，可以检测和管理来自被测系统的这类错误。我知道我曾经也这么认为。第 7 章将展示，过多的负载生成器日志记录会扼杀负载生成器的性能，并扭曲整个测试的结果。这种程度的详细日志对于排查单个线程回放的问题非常宝贵，但在其他情况下则会碍事。


    当你的负载生成器统计测试结果、区分良莠、甄别成功与失败时，大多数负载生成器都提供了一种方法，让我们可以指定哪些被测系统响应表示错误。我强烈建议同时使用这两种技术来标记错误。第
    7 章将向你展示如何：


    *   因为 HTML 响应中缺少重要部分（如余额查询中的账户余额）而标记错误。

    *   当 HTML 响应中出现异常文本时标记错误。

    *   提供错误出现次数和时间的概览。


    要添加多少验证取决于你。我希望前面的小故事能说明验证不足的问题是多么频繁地发生。但是，添加过多的验证会占用本可用于优化代码的时间。过多的验证也可能导致负载生成器性能下降。例如，在单个页面上验证
    20 个不同的数据项对于性能测试来说可能过于冗余（但对于功能测试来说是合理的）。我在使用一台现代桌面级机器，每秒处理 1000 个请求时，对每个 HTTP
    响应验证 3-5 个数据项，从未遇到过负载生成器开销方面的问题。如果你在这种负载量下已经压垮了负载生成器的 CPU/内存，那么这个问题就值得你花时间去解决。


    当负载测试应用 3t0tt 时，它是在施加三个线程的负载且零思考时间。根据我的经验，这足以暴露多线程代码中的大部分错误。这类问题的典型特征是出现少量但持续不断的错误。如果你的测试经常出现各种功能性错误，那么你检测多线程错误的能力就会减弱或完全丧失。目标是让你的负载测试中零错误。

