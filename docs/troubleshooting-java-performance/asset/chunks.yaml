  trans: "\n## 别忘了\n\n想象一下，一场高考的试卷字体小到连年轻考生都全程在桌上眯着眼，根本无法看清那些微小的印刷字。我们会说这是一场无效的考试，任何头脑正常的人都不会去看学生的成绩，更不会据此做出改变人生的大学录取决定。这里的教训是：丢弃无效测试的结果。\n\
    \n同样，在根据负载测试结果做决定之前，你必须先评估测试是否有效，是否足够接近生产环境中的条件。本章探讨了若干标准，根据我的经验，这些标准会导致测试无效。在依据任何性能测试的结果采取行动之前，都应仔细评估其有效性。\n\
    \n## 下一步\n\n你的系统能扩展吗？你上次检查是什么时候？第 6 章提供了一个具体且新颖的公式来测试可扩展性。它非常易于遵循，你可以每周每天都测量可扩展性，从而帮助缓解性能焦虑。这个测试被称为“可扩展性标尺”。\n\
    \n# 6. 可扩展性标尺\n\n如今很少有系统能实现可扩展性，因为可扩展性测试运行得太不频繁了。本章展示了如何运行一个既快速又简单的可扩展性测试，你可以每周每天都运行它，为最终引导你的被测系统（SUT）走向可扩展性提供急需的指导。\n\
    \n本章的目标是：\n\n*   学习一个公式，以精确确定需要施加多少线程或负载，从而轻松看出你的系统离可扩展还有多远。\n*   学习如何识别测试数据何时表明你已复现了一个阻碍可扩展性的性能问题。\n\
    \n试图修复一个无法复现的缺陷是令人望而生畏的，性能缺陷也不例外。本章将引导你采用一种系统性的方法来复现那些阻碍系统扩展的缺陷。第 8 章我们将开始使用 P.A.t.h.\
    \ 检查清单来诊断和修复问题。\n\n可扩展性标尺是经典增量负载计划的一个变体，这个经典方法常常在性能最佳实践的记录中被遗忘。这个变体旨在精确地向我们展示需要施加多少负载，以及如何识别何时复现了一个问题——一个阻碍可扩展性的问题。\n\
    \n可扩展性是指系统在增加更多硬件资源时提升吞吐量的能力。这个定义准确而简洁，但同样令人痛苦地缺乏实用性，尤其是当你像大多数技术人员一样，正在寻找如何让系统实现扩展的具体指导时。\n\
    \n为了填补这一空白并提供一些方向，我使用了以下我称之为“可扩展性标尺”的负载测试：\n\n1.  运行一个增量负载测试，包含四个相等的负载阶梯，第一个阶梯将应用服务器\
    \ CPU 推至约 25%。\n2.  当这个测试产生四个方正、棱角分明的吞吐量阶梯，且最后一个阶梯将 CPU 推至 100% 时，被测系统（SUT）就是可扩展的。\n\
    \n让我们先看看如何使用负载生成器为标尺创建一个负载计划，然后我们将讨论可扩展性实际上是如何工作的。解释这种方法需要一点时间，但做过几次之后，它就会变成你的第二天性。\n\
    \n## 创建可扩展性标尺负载计划\n\n可扩展性标尺指出，你的第一个负载阶梯需要让被测系统（SUT）消耗约 25% 的 CPU。需要多少线程的负载才能达到\
    \ 25%？你需要运行一个快速测试来找出答案。这本质上是在将标尺校准到被测系统（SUT）和当前环境。\n\n图 6-1 所示的 JMeter 测试计划提出了一个问题：“在这\
    \ 10 个阶梯中，被测系统（SUT）的 CPU 消耗会在哪一个达到 25%？”\n\n![A449023_1_En_6_Fig1_HTML.jpg](img/A449023_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1.\n\n用于查看需要多少线程负载才能将应用服务器 CPU 推至 25% 的 JMeter 负载计划\n\n以下是执行此操作的一些简要说明：\n\
    \n1.  从 jmeter.apache.org 安装 JMeter。\n2.  使用以下两种选项之一安装并发线程组：\n    1.  通过从 [`https://jmeter-plugins.org/install/Install/`](https://jmeter-plugins.org/install/Install/)\
    \ 下载一个 jar 文件到 JMETER_HOME/ext 目录，将插件管理器安装到 JMeter 中。重启 JMeter，然后从“选项/插件”菜单中选择“自定义线程组”。\n\
    \    2.  直接从 [`https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/`](https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/)\
    \ 下载 zip 文件……并将内容解压到 JMETER_HOME/lib 和 lib/ext 文件夹中，保持 zip 文件中的目录结构。\n3.  重启 JMeter。\n\
    4.  使用图 6-2 中的菜单选项添加并发线程组。\n\n    ![A449023_1_En_6_Fig2_HTML.jpg](img/A449023_1_En_6_Fig2_HTML.jpg)\n\
    \n    图 6-2.\n\n    将并发线程组添加到新的 JMeter 负载计划中。\n5.  在图 6-1 中设置 10-10-10-1 选项。\n\
    \n图 6-3 显示了这次简短校准测试的结果，或者至少是它的最开始部分。当测试进行到 10 个阶梯中的第二个时，我已经看到了足够的信息，于是停止了它。\n\n\
    ![A449023_1_En_6_Fig3_HTML.jpg](img/A449023_1_En_6_Fig3_HTML.jpg)\n\n图 6-3.\n\n\
    发现需要多少线程才能将 CPU 推至 25%。这个包含两个不同指标（CPU 和活跃线程）的图表是通过 Composite Graph 和 PerfMon 实现的，这两个工具都来自\
    \ jmeter-plugins.org。学习如何在关于 JMeter 的第 7 章中使用它们。\n\n图 6-1 中的负载计划显示，每个负载阶梯应持续约\
    \ 60 秒，事实也确实如此。我们之所以知道这一点，是因为黑线（位于“随时间变化的活跃线程”下方）在 Y 轴上的值为 10 并持续了 60 秒，然后在测试的剩余时间里值为\
    \ 20。此图表的自动缩放功能有点令人困惑。图例中显示的 (x10) 意味着图表上的 10 和 20 被放大了 10 倍，实际值是 1 和 2，而不是 10\
    \ 和 20。\n\n图 6-3 中的黄线显示，第一个负载线程将 CPU 推至约 15%，第二个线程（在 60 秒标记处）将 CPU 推至约 28%。测试的全部目的是将被测系统（SUT）推至至少\
    \ 25%，因此我在首次达到 25% 的那个阶梯之后停止了负载生成器。校准完成。\n\n标尺要求“四个相等的负载阶梯，第一个阶梯将 CPU 推至约 25%”。由于两个线程将被测系统（SUT）推至约\
    \ 25% 的 CPU，因此 2 就是标尺中四个相等阶梯中每个阶梯的大小。我们现在掌握了足够的信息来创建我们的标尺负载计划。\n"
- fmt: '### Interpreting Results


    The calibration test is complete, and you know about how many threads of load
    it takes to push the SUT to about 25% CPU consumption. I took the result of 2
    from the Calibration Test and put it into my load plan to create a Scalability
    Yardstick test with steps of 2-4-6-8. Every minute, two threads of load are added;
    for the last minute of the 4-minute test, eight threads are running. Staying at
    a single level of load for 1 minute works when a single iteration of your load
    script lasts, say, less than 10 seconds with zero think time. This is a very rough
    guideline to make sure your script repeats at least several times (six in this
    case) for each step of load.


    Figure [6-4](#A449023_1_En_6_Chapter.html#Fig4) shows the results of the test.
    This part takes a little thinking, so get ready for this: the `x100` in the legend
    (top of screenshot) mean the black line values of 200, 400, 600 and 800 really
    mean 2, 4, 6, and 8 load generator threads. The `jmeter-plugins.org` auto-scale
    feature caused this. Read here for more details:


    ![A449023_1_En_6_Fig4_HTML.jpg](A449023_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    The blue line shows squared, chiseled steps of throughput created by the Scalability
    Yardstick, meaning that this system will scale. To produce this graph, the Throughput
    metric was added to the same graph component used in Figure [6-3](#A449023_1_En_6_Chapter.html#Fig3).


    [`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)


    The Scalability Yardstick aims to find the SUT’s throughput at 25%, 50%, 75% and
    100% CPU consumption, and Figure [6-4](#A449023_1_En_6_Chapter.html#Fig4) shows
    that. The blue line shows these four throughput landmarks are (roughly) 1800,
    3300, 4200 and 5100 requests per second. Because each of the four steps generates
    a nicely squared chunk of throughput, this particular SUT is very well tuned.


    By contrast, Figure [6-5](#A449023_1_En_6_Chapter.html#Fig5) shows an SUT with
    a performance defect. See how the squared, chiseled steps of load have been replaced
    by limp, faltering throughput?


    ![A449023_1_En_6_Fig5_HTML.jpg](A449023_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    The same graph configuration of Figure [6-4](#A449023_1_En_6_Chapter.html#Fig4)
    was used here, but I induced a performance defect (high GC times I think) to make
    the squared, chiseled steps go away. This is how systems perform when they don’t
    scale.


    To those who are hesitant to push the CPU to 100%, how else will we discover whether
    the system is capable of using an additional CPU, should one become available?
    We know that pushing the CPU to 100% is not going to hurt the machine, because
    anti-virus software has been doing that to desktop workstation CPUs for a decade.


    Here are a few quotes from other Java performance authors that show that this
    approach is on the right track, especially the part about pushing to 100% CPU:


    > “The goal is to usually keep the processors fully utilized.” *Java Concurrency
    in Practice*, Brian Goetz, et al. (Addison-Wesley, 2006) p. 240 “For a well-behaved
    system, the throughput initially increases as the number of concurrent users increases
    while the response times of the requests stay relatively flat.” *Java Performance*,
    Charlie Hunt, Binu John (Addison-Wesley, 2011), p. 369


    Driven by the black line in Figure [6-4](#A449023_1_En_6_Chapter.html#Fig4), each
    of the four steps in the Yardstick acts as a request for the SUT to leap. The
    four steps in the blue throughput line shows that the SUT responded with a leap
    for each load step. Take the utmost care in noticing that a nice square, step/leap
    of additional CPU consumption (yellow) was required at each step. When the load
    generator said to leap, the SUT leapt, and only a well-tuned and scalable SUT
    will leap like this.


    Of the four CPU landmarks in the Scalability Yardstick, we care the most about
    the 100% landmark. We ultimately want to know whether the SUT can utilize 100%
    of this CPU and 100% of all the subsequently added CPUs to produce more and more
    throughput leaps when the load generator applies additional steps of throughput.
    This is scalability.


    Let’s walk through a quick example of how to use these numbers. Let’s say that
    our client is upgrading from someone else’s system to our system. Data from peak
    hours of their previous system shows the client needs to reach 6,000 requests
    per second (RPS).


    Let’s use the graph from the Scalability Yardstick test in Figure [6-4](#A449023_1_En_6_Chapter.html#Fig4).
    It shows that we are in trouble—the 5,100 RPS in the graph falls a bit short because
    we ran out of CPU before getting to the client’s 6,000 RPS target. What is to
    be done? We need to do the impossible—to push from 100% to 101% CPU consumption
    and beyond. It is as if someone wanted the volume nob on their car radio to go
    past the max of 10 and on to 11.


    To get to the 6,000 RPS, we have to add more machines to share the burden (to
    form a cluster), using a load balancer to distribute the load between the machines.
    Alternatively, we can add additional CPUs to the original machine. This is the
    classic and powerful concept of scalability.


    When an application on a single machine can incrementally turn every bit of the
    CPU into a decent amount of throughput, it is straightforward to see how it would
    also be capable of using additional CPUs, once they were made available.


    Figure [6-5](#A449023_1_En_6_Chapter.html#Fig5) depicts the system without the
    squared, chiseled steps—it’s the one that did not scale. Without more tuning,
    it has no hope of scaling, because the throughput won’t approach 6000, no matter
    how many threads of load are applied.


    If adding additional users won’t buy extra throughput, the system will not scale.
    That is the lesson here.


    ## Imperfect and Essential


    I will never forget this painful story about tuning. We were beaten down and exhausted
    after 12 weeks of gruelling, long hours trying to reach an unprecedented amount
    of throughput for an especially demanding client. The crowded and stale conference
    room was so quiet, you might not have known we were actually celebrating, but
    we were—just too exhausted to get excited. The system finally scaled, or at least
    we thought it did. Doubling the hardware had doubled the throughput—that much
    was good. Tripling the hardware tripled the throughput, but that was the end of
    the scalability, and after that the quiet room got busy again. No one predicted
    this problem because the problem was not predictable.


    The Scalability Yardstick test, like all forecasting tools, is imperfect; it cannot
    predict what has not been tested, just as in this little (and mostly true) anecdote.
    But even though scalability tests are imperfect, they are still essential. The
    Yardstick measures a key facet of all scalable systems: the ability to produce
    even steps of throughput at all levels of CPU consumption. Without such a tool,
    we stumble blindly through the development SDLC phase and beyond, knowing nothing
    of our progress towards the very goal we seek: scalability.


    Back in the crowded conference room, there was progress. A concurrency cap, configured
    on the load balancer, had kept additional nodes from producing any more throughput.
    After fixing the configuration, adding a fourth node in our system quadrupled
    the throughput, pushing us past our difficult goal, and demonstrating great scalability.'
