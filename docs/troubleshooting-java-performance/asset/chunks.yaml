- fmt: "### Kinds of Leaks\n\n`Eclipse MAT` does a great job at finding garden-variety\
    \ leaks, like the `MyMemoryLeak` shown earlier. This is in part because that leak\
    \ is anchored to a singleton—the GC root. Imagine a small, stateless process that\
    \ queries all the rows in a multi-million-row database table. There are no GC\
    \ roots in this case. So I have created one of these for you to experiment with.\n\
    \nInvoking this URL will essentially crash any `jpt` JVM by selecting millions\
    \ of rows from a database table:\n\n`https://localhost:8675/crashJvmWithMonsterResultSet`\n\
    \nPerhaps `MAT` could be improved by trying to find the leak in the heap dump\
    \ created by this scenario. Perhaps I just missed it.\n\nMeta-space leaks are\
    \ also difficult to solve, but I can provide you with a little head start in the\
    \ troubleshooting. The following command will show meta-space capacity, to see\
    \ if you are close to filling up the space or not:\n\n```\njstat -gcmetacapacity\
    \  1s\n```\n\nBut you will have to use the `jstat` reference to understand all\
    \ the field names:\n\n[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html)\n\
    \nTo find out how much you allocated in the first place, look for this parameter\
    \ in your JVM arguments:\n\n```\n-XX:MaxMetaspaceSize=1g\n```\n\nFinally, to find\
    \ out what class might be leaking, use these instructions to turn on verbose class\
    \ loading:\n\n[`https://dzone.com/articles/how-use-verbose-options-java`](https://dzone.com/articles/how-use-verbose-options-java)\n\
    \nGenerally after a system has been warmed up, class loading should come to a\
    \ near halt. If the verbose class loading continues to show activity, especially\
    \ loading a few classes or more a second, you have a meta-space leak.\n\nLeaks\
    \ we have discussed so far are part of the heap used by our Java programs. Back\
    \ before Java 7, we saw a number of memory leaks in the C program (I think) that\
    \ is the JVM. This is called a native memory leak and is not easy to debug; it\
    \ is well beyond the scope of this small book.\n\n## Heap Troubleshooting, Step-by-Step\n\
    \nI generally troubleshoot heap issues by first checking to see if there are easy\
    \ solutions. Only when those easy solutions are not successful do I go on to explore\
    \ things like memory leaks. The following outline describes this rough, troubleshooting\
    \ progression.\n\nStart by abiding by these general rules:\n\n*   `-Xmx` must\
    \ not exceed available RAM.\n*   Avoid `NewRatio`.\n*   Love the one you’re with:\
    \ stick with your favorite GC algorithm (except serial). If you’re on IBM J9,\
    \ then only use gencon (default) or the new Balanced, which is a ‘regional’ algorithm,\
    \ similar to G1.\n\nBasic GC troubleshooting steps follow:\n\n1.  Start out with\
    \ a not-huge heap, something between 512MB (perhaps for micro-services) and 4GB.\n\
    2.  While under load, assess GC generational overhead. Use `jstat` and `gctime.sh`\
    \ or `gctime.cmd`.\n3.  If one or both of the generations have sustained red and/or\
    \ yellow overhead, configure an additional chunk of RAM (perhaps 256MB?) for that\
    \ generation; then restart and retest. Repeat until GC overhead percentage results\
    \ are in the desired range.\n4.  If infrequent but long old gen pauses (slower\
    \ than 5 seconds) are unacceptable, consider moving to one of the following:\n\
    \    1.  Hotspot / G1, because old gen collections are broken up into smaller\
    \ collections yielding smaller pauses. Here is the detailed G1 tuning doc: [`http://www.oracle.com/technetwork/articles/java/g1gc-1984535.html`](http://www.oracle.com/technetwork/articles/java/g1gc-1984535.html)\n\
    \    2.  For IBM J9, use the Balanced collector, whose “regional” approach is\
    \ very similar to G1.\n\nAdvanced GC troubleshooting steps follow:\n\n1.  If old\
    \ gen continues to have yellow or red or out-of-memory errors, check for memory\
    \ leaks.\n    1.  Use `jmap -histo` and/or `heapSpank` to assess whether there\
    \ are one or more classes whose byte counts or instance counts are continually\
    \ on the rise.\n    2.  Use `PMAT` or `GCViewer` to check verbose GC. Check the\
    \ graphs in these tools for upward trends in old gen memory consumption. Consider\
    \ the amount of time the graphs show that it takes to fill the heap. If the heap\
    \ fills in a matter of seconds or minutes, I consider that a fast leak and look\
    \ for individual requests that allocate massive amounts of data. A massive JDBC\
    \ result set is one example. If instead, it takes hours or days to fill the heap,\
    \ look for a small number of objects that collect in a `java.util` collection\
    \ that is held in memory by a singleton.\n    3.  If `heapSpank` doesn’t provide\
    \ enough data to find cause of the leak, capture heap dump, try one of the following:\n\
    \        1.  `MAT` leak suspects.\n        2.  Histogram.\n        3.  Use `MAT`\
    \ to find GC Roots.\n2.  Metaspace leaks. Look for “MC”, “MU”, “CCSC”, and “CCSU”\
    \ from the output of `jstat -gc <myPid> 1000`.\n3.  Sometimes, a single huge allocation\
    \ of memory can fill the heap and crash your JVM. To learn how to troubleshoot\
    \ this situation, invoke the following URL from any browser during any `jpt` test:\
    \ `https://localhost:8675/crashJvmWithMonsterResultSet` This executes a JDBC query\
    \ that returns a massive result set. The browser will hang and the JVM will produce\
    \ `java.lang.OutOfMemoryError: Java heap space` errors. Create a heap dump using\
    \ `jcmd <myPid> GC.heap_dump myDump.bin`. Use `MAT` to detect the leak.\n4.  Look\
    \ for failure messages in the verbose GC logs. Normally, I use `PMAT` or `GCViewer`\
    \ to ‘look’ at my logs. But when I’m working on a real tough GC problem that defies\
    \ explanation, I get out my text editor and look through the logs for errors like\
    \ `[ParNew (promotion failed)`. Be sure to do an internet search for similar errors.\n\
    \n## Don’t Forget\n\nThe world of micro-services is coming, where many more JVMs\
    \ will run on a single operating systems instance. Instead of 4-8 JVMs on a single\
    \ machine, perhaps there will be 10 to 30. All of this will require tighter memory\
    \ management, discovering heap over-allocations, and watching the performance\
    \ health of many more processes.\n\nFor these reasons it would be prudent to learn\
    \ some of the heap troubleshooting techniques in this chapter. Earlier in this\
    \ chapter I said that diagnostic data for troubleshooting heap issues comes in\
    \ a few layers that get increasingly more detailed. Being cognizant of these layers\
    \ helps you understand troubleshooting data you have missed. For example, plug-it-in-now\
    \ GC data from `gcstat` is great for immediacy, but `PMAT` and `GCViewer` are\
    \ better for capturing trends, and those trends indicate whether you have a fast\
    \ or a slow memory leak.\n\nThat is the end of the P.A.t.h. Checklist. What’s\
    \ next is getting real-world practice learning how to turn Dark Environments into\
    \ environments with good visibility, and to teach your co-workers how to use these\
    \ plug-it-in-now techniques to make that happen.\n\nFootnotes [1](#A449023_1_En_12_Chapter.html#Fn1_source)\n\
    \nThis link ( [`https://docs.oracle.com/cd/E19900-01/819-4742/abeik/index.html`](https://docs.oracle.com/cd/E19900-01/819-4742/abeik/index.html)\
    \ ) says: The `NewSize` and `MaxNewSize` parameters control the new generation’s\
    \ minimum and maximum size."
