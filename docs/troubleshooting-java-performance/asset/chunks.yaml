- fmt: '# Heap Trending


    Having immediate access to GC performance with `jstat` is important. For example,
    if GC health is GREEN for `gctime.sh`’s old and new metrics, then you can move
    on to the next item in the P.A.t.h check list. But knowing the history of GC performance
    provides key troubleshooting details that can help solve problems.


    For example, if GC performance was fine for days but abruptly degraded, then your
    search for a slow memory leak should be put on hold, because an abrupt change
    like this is more likely to be caused by a one-time event, perhaps a single “poison-pill”
    request that led to an open-ended query with massive result set that used all
    available memory.


    Heap trending can also be helpful during development to see if any memory leaks
    have sneaked into the code base. For instance, before the code is released, you
    could run a load test and make sure that the Used Tenured Heap metrics more resembles
    the sawtooth in Figure [12-3](#A449023_1_En_12_Chapter.html#Fig3) than the memory
    leak in Figure [12-4](#A449023_1_En_12_Chapter.html#Fig4). These figures show
    verbose GC data (see the second section of this chapter) graphed by the GCViewer,
    which is available from [`https://github.com/chewiebug/GCViewer`](https://github.com/chewiebug/GCViewer).


    ![A449023_1_En_12_Fig4_HTML.jpg](A449023_1_En_12_Fig4_HTML.jpg)


    Figure 12-4.


    When the Used Tenured Heap metric is missing a sawtooth, it generally looks like
    this, which is most likely a memory leak. Screenshot from GCViewer.


    ![A449023_1_En_12_Fig3_HTML.jpg](A449023_1_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    This sawtooth pattern in GCViewer is a healthy sign that the system-under-load
    does not have any memory leaks


    The GC metrics available at [`http://gceasy.io`](http://gceasy.io) are very helpful,
    but I’m not crazy about the “upload your GC data to our site or pay for your own
    server” business model. GarbageCat is another great option:


    [`https://github.com/mgm3746/garbagecat`](https://github.com/mgm3746/garbagecat)


    # Using JVM Parameters to Size the Heap


    In the world of micro-services, many more JVMs have to compete on a single machine
    for a fixed amount of RAM, which makes sizing the heap with the `-Xmx` parameter
    a critical task. Allocate too little RAM and starve yourself. If you allocate
    too much, you starve others.


    I like to keep the min and max heap size parameters, `-Xmx` and `-Xms`, identical.
    For example, `-Xmx1g -Xms1g` is good, and I shy away from `-Xmx1g -Xms512m`. This
    makes things a bit simpler so I do not have to comprehend a heap that is perpetually
    expanding/contracting. Also, at JVM start-up time, keeping these two parameters
    the same makes an “early claim” to the operating system for every last drop of
    RAM that tests showed was needed.


    This keeps other processes from staking a claim to RAM ultimately required by
    this JVM process. When more micro-service JVMs are playing in the same sandbox,
    someone is more likely to get sand in their eyes.


    In my head, I use a shoebox metaphor to understand how to use JVM parameters to
    grow and shrink the old and new spaces. The `-Xmx` determines the size of the
    shoebox, and the shoebox has a cardboard divider that separates the old and new
    spaces. As shown in Figure [12-5](#A449023_1_En_12_Chapter.html#Fig5), if I explicitly
    set the new size to a particular value, then the old space gets all of the remaining
    RAM, just as moving the divider to one side of the shoe box increases the size
    of the other side.


    ![A449023_1_En_12_Fig5_HTML.jpg](A449023_1_En_12_Fig5_HTML.jpg)


    Figure 12-5.


    The vertical line is like a divider in a shoe box


    Consider the parameters `-Xmx512m -XX:NewSize=412m` depicted in Figure [12-6](#A449023_1_En_12_Chapter.html#Fig6).
    For starters, note that the `-Xmx` parameter does not use an equal sign and `-XX:NewSize`
    does—an important syntactical difference. Outside of that small detail, these
    parameters define a 512MB total heap and allocate most of it (412MB) as the minimum
    size of the new space. The JVM automatically allocates the remaining 100MB to
    the old space, as shown in the figure. This is my shoebox metaphor, and the line
    separating the two spaces is my cardboard divider.


    ![A449023_1_En_12_Fig6_HTML.jpg](A449023_1_En_12_Fig6_HTML.jpg)


    Figure 12-6.


    Depiction of larger NewSize with JVM settings `-Xmx512m -XX:NewSize=412m`


    Changing the value of the `-XX:NewSize` parameter moves the divider inside the
    shoe box (Figure [12-7](#A449023_1_En_12_Chapter.html#Fig7)), but leaves the overall
    box size unchanged, like this: `-Xmx512m -XX:NewSize=100m`.


    ![A449023_1_En_12_Fig7_HTML.jpg](A449023_1_En_12_Fig7_HTML.jpg)


    Figure 12-7.


    Depiction of larger old size, with JVM settings `-Xmx512m -XX:NewSize=100m`. Changes
    to the `-XX:NewSize` parameter only move the shoe box cardboard divider. They
    do not change overall size of the heap.


    If I accidently (or mistakenly) ask for a `-XX:NewSize` larger than the entire
    heap (larger than the `-Xmx`), leaving no room for the old space, then the JVM
    will give you a not-so-helpful error message:


    ```

    Invalid maximum heap size: -Xmx=512m

    ```


    This basically says it is impossible to move the shoebox divider outside of the
    shoebox. Your shoebox divider, the `-XX:NewSize` parameter, must leave some room
    for both the old and new spaces.


    So remember: the `-Xmx` parameter sets the size of the shoe box and the `NewSize`
    and `MaxNewSize` parameters are the divider, which in effect determine the sizes
    of both the young and the new generation.


    Before finishing up this section I would like to quickly mention that the `-XX:NewSize`
    parameter is actually the minimum size for the new space.[¹](#A449023_1_En_12_Chapter.html#Fn1)
    To help keep the complexity down and to avoid twisting my brain into a knot, I
    like to set the `-XX:MaxNewSize` to the same value as `-XX:NewSize`. The `-XX:MaxNewSize`
    also provides a sanity check for invalid parameters. The 1.8 JDK allows the following,
    even though it doesn’t make sense to have a new space that is twice the size of
    the entire heap it’s supposed to be contained in.


    ```

    java -Xmx512m -XX:NewSize=1024m Test

    ```


    But if you add the `MaxNewSize` parameter, like this:


    ```

    java -Xmx512m -XX:NewSize=1024m -XX:MaxNewSize=1024m Test

    ```


    You get a warning telling you about the problem:


    ```

    Java HotSpot(TM) 64-Bit Server VM warning: MaxNewSize (1048576k) is equal to or
    greater than the entire heap (524288k). A new max generation size of 523776k will
    be used.

    ```'
  raw: '## Heap Trending


    Having immediate access to GC performance with `jstat` is important. For example,
    if GC health is GREEN for `gctime.sh`’s old and new metrics, then you can move
    on to the next item in the P.A.t.h check list. But knowing the history of GC performance
    provides key troubleshooting details that can help solve problems.


    For example, if GC performance was fine for days but abruptly degraded, then your
    search for a slow memory leak should be put on hold, because an abrupt change
    like this is more likely to be caused by a one-time event, perhaps a single “poison-pill”
    request that led to an open-ended query with massive result set that used all
    available memory.


    Heap trending can also be helpful during development to see if any memory leaks
    have sneaked into the code base. For instance, before the code is released, you
    could run a load test and make sure that the Used Tenured Heap metrics more resembles
    the sawtooth in Figure [12-3](#A449023_1_En_12_Chapter.html#Fig3) than the memory
    leak in Figure [12-4](#A449023_1_En_12_Chapter.html#Fig4). These figures show
    verbose GC data (see the second section of this chapter) graphed by the GCViewer,
    which is available from [`https://github.com/chewiebug/GCViewer`](https://github.com/chewiebug/GCViewer)
    .


    ![A449023_1_En_12_Fig4_HTML.jpg](A449023_1_En_12_Fig4_HTML.jpg)


    Figure 12-4.


    When the Used Tenured Heap metric is missing a sawtooth, it generally looks like
    this, which is most likely a memory leak. Screenshot from GCViewer.


    ![A449023_1_En_12_Fig3_HTML.jpg](A449023_1_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    This sawtooth pattern in GCViewer is a healthy sign that the system-under-load
    does not have any memory leaks


    The GC metrics available at [`http://gceasy.io`](http://gceasy.io) are very helpful,
    but I’m not crazy about the “upload your GC data to our site or pay for your own
    server” business model. GarbageCat is another great option:


    [`https://github.com/mgm3746/garbagecat`](https://github.com/mgm3746/garbagecat)


    ## Using JVM Parameters to Size the Heap


    In the world of micro-services, many more JVMs have to compete on a single machine
    for a fixed amount of RAM, which makes sizing the heap with the `-Xmx` parameter
    a critical task. Allocate too little RAM and starve yourself. If you allocate
    too much, you starve others.


    I like to keep the min and max heap size parameters, `-Xmx` and `-Xms`, identical.
    For example, -`Xmx1g -Xms1g` is good, and I shy away from -`Xmx1g -Xms512m`. This
    makes things a bit simpler so I do not have to comprehend a heap that is perpetually
    expanding/contracting. Also, at JVM start-up time, keeping these two parameters
    the same makes an “early claim” to the operating system for every last drop of
    RAM that tests showed was needed.


    This keeps other processes from staking a claim to RAM ultimately required by
    this JVM process. When more micro-service JVMs are playing in the same sandbox,
    someone is more likely to get sand in their eyes.


    In my head, I use a shoebox metaphor to understand how to use JVM parameters to
    grow and shrink the old and new spaces. The `-Xmx` determines the size of the
    shoebox, and the shoebox has a cardboard divider that separates the old and new
    spaces. As shown in Figure [12-5](#A449023_1_En_12_Chapter.html#Fig5), if I explicitly
    set the new size to a particular value, then the old space gets all of the remaining
    RAM, just as moving the divider to one side of the shoe box increases the size
    of the other side.


    ![A449023_1_En_12_Fig5_HTML.jpg](A449023_1_En_12_Fig5_HTML.jpg)


    Figure 12-5.


    The vertical line is like a divider in a shoe box


    Consider the parameters `-Xmx512m -XX:NewSize=412m` depicted in Figure [12-6](#A449023_1_En_12_Chapter.html#Fig6).
    For starters, note that the `-Xmx` parameter does not use an equal sign and -XX:NewSize
    does—an important syntactical difference. Outside of that small detail, these
    parameters define a 512MB total heap and allocate most of it (412MB) as the minimum
    size of the new space. The JVM automatically allocates the remaining 100MB to
    the old space, as shown in the figure. This is my shoebox metaphor, and the line
    separating the two spaces is my cardboard divider.


    ![A449023_1_En_12_Fig6_HTML.jpg](A449023_1_En_12_Fig6_HTML.jpg)


    Figure 12-6.


    Depiction of larger NewSize with JVM settings `-Xmx512m -XX:NewSize=412m`


    Changing the value of the `-XX:NewSize parameter` moves the divider inside the
    shoe box (Figure [12-7](#A449023_1_En_12_Chapter.html#Fig7)), but leaves the overall
    box size unchanged, like this: `-Xmx512m -XX:NewSize=100m`.


    ![A449023_1_En_12_Fig7_HTML.jpg](A449023_1_En_12_Fig7_HTML.jpg)


    Figure 12-7.


    Depiction of larger old size, with JVM settings `-Xmx512m -XX:NewSize=100m`. Changes
    to the `-XX:NewSize` parameter only move the shoe box cardboard divider. They
    do not change overall size of the heap.


    If I accidently (or mistakenly) ask for a `-XX:NewSize` larger than the entire
    heap (larger than the `-Xmx`), leaving no room for the old space, then the JVM
    will give you a not-so-helpful error message:


    ```

    Invalid maximum heap size: -Xmx=512m

    ```


    This basically says it is impossible to move the shoebox divider outside of the
    shoebox. Your shoebox divider, the `-XX:NewSize` parameter, must leave some room
    for both the old and new spaces.


    So remember: the `-Xmx` parameter sets the size of the shoe box and the `NewSize`
    and `MaxNewSize` parameters are the divider , which in effect determine the sizes
    of both the young and the new generation.


    Before finishing up this section I would like to quickly mention that the `-XX:NewSize`
    parameter is actually the minimum size for the new space.[¹](#A449023_1_En_12_Chapter.html#Fn1)
    To help keep the complexity down and to avoid twisting my brain into a knot, I
    like to set the `-XX:MaxNewSize` to the same value as `-XX:NewSize`. The `-XX:MaxNewSize`
    also provides a sanity check for invalid parameters. The 1.8 JDK allows the following,
    even though it doesn’t make sense to have a new space that is twice the size of
    the entire heap it’s supposed to be contained in.


    ```

    java -Xmx512m -XX:NewSize=1024m Test

    ```


    But if you add the `MaxNewSize` parameter, like this:


    ```

    java -Xmx512m -XX:NewSize=1024m -XX:MaxNewSize=1024m Test

    ```


    You get a warning telling you about the problem:


    ```

    Java HotSpot(TM) 64-Bit Server VM warning: MaxNewSize (1048576k) is equal to or
    greater than the entire heap (524288k). A new max generation size of 523776k will
    be used.

    ```'
  trans: '

    ## 堆趋势分析


    通过 `jstat` 即时获取 GC 性能数据非常重要。例如，如果 `gctime.sh` 的旧生代和新生代指标显示 GC 健康状态为绿色（GREEN），那么你就可以继续检查
    P.A.t.h 清单中的下一项。但了解 GC 性能的历史记录能提供关键故障排查细节，有助于解决问题。


    例如，如果 GC 性能连续数天正常但突然恶化，那么你应该暂停对缓慢内存泄漏的排查，因为这种突然变化更可能是由一次性事件引起的，比如某个“毒丸”请求导致了一个开放式查询，返回了海量结果集，从而耗尽了所有可用内存。


    在开发过程中，堆趋势分析也有助于发现代码库中是否潜入了内存泄漏。例如，在代码发布前，你可以运行一次负载测试，确保已使用的老年代堆（Used Tenured
    Heap）指标更接近图 12-3 中的锯齿状，而不是图 12-4 中的内存泄漏形态。这些图表展示了由 GCViewer 绘制的详细 GC 数据（参见本章第二节），GCViewer
    可从 [`https://github.com/chewiebug/GCViewer`](https://github.com/chewiebug/GCViewer)
    获取。


    ![A449023_1_En_12_Fig4_HTML.jpg](img/A449023_1_En_12_Fig4_HTML.jpg)


    图 12-4.


    当已使用的老年代堆指标缺少锯齿状时，通常呈现这种形态，这极有可能是内存泄漏。截图来自 GCViewer。


    ![A449023_1_En_12_Fig3_HTML.jpg](img/A449023_1_En_12_Fig3_HTML.jpg)


    图 12-3.


    GCViewer 中的这种锯齿状模式是健康信号，表明负载系统不存在任何内存泄漏


    [`http://gceasy.io`](http://gceasy.io) 提供的 GC 指标非常有用，但我不太喜欢“将你的 GC 数据上传到我们的网站，或者付费使用自己的服务器”这种商业模式。GarbageCat
    是另一个不错的选择：


    [`https://github.com/mgm3746/garbagecat`](https://github.com/mgm3746/garbagecat)


    ## 使用 JVM 参数调整堆大小


    在微服务世界中，更多 JVM 需要在单台机器上竞争固定数量的 RAM，这使得使用 `-Xmx` 参数调整堆大小成为一项关键任务。分配过少的 RAM 会导致自身资源不足；分配过多则会挤占其他进程。


    我喜欢将最小和最大堆大小参数 `-Xmx` 和 `-Xms` 设置为相同值。例如，`-Xmx1g -Xms1g` 是好的做法，而我避免使用 `-Xmx1g
    -Xms512m`。这能让事情更简单，我不必理解一个不断扩展/收缩的堆。此外，在 JVM 启动时，将这两个参数保持一致，相当于向操作系统“提前声明”了测试表明所需的每一滴
    RAM。


    这可以防止其他进程抢占该 JVM 进程最终所需的 RAM。当更多微服务 JVM 在同一个“沙盒”中运行时，有人更可能“眼里进沙”。


    在我的脑海中，我使用一个鞋盒比喻来理解如何使用 JVM 参数来增长和缩小老年代和新生代空间。`-Xmx` 决定了鞋盒的大小，而鞋盒内有一个纸板隔板将老年代和新生代分开。如图
    12-5 所示，如果我明确将新生代大小设置为某个特定值，那么老年代将获得所有剩余 RAM，就像将隔板移向鞋盒一侧会增加另一侧的大小一样。


    ![A449023_1_En_12_Fig5_HTML.jpg](img/A449023_1_En_12_Fig5_HTML.jpg)


    图 12-5.


    垂直线就像鞋盒里的隔板


    考虑图 12-6 中描绘的参数 `-Xmx512m -XX:NewSize=412m`。首先，注意 `-Xmx` 参数不使用等号，而 `-XX:NewSize`
    使用等号——这是一个重要的语法差异。除了这个细节之外，这些参数定义了一个 512MB 的总堆，并将其大部分（412MB）分配为新生代的最小大小。JVM 自动将剩余的
    100MB 分配给老年代，如图所示。这就是我的鞋盒比喻，分隔两个空间的线就是我的纸板隔板。


    ![A449023_1_En_12_Fig6_HTML.jpg](img/A449023_1_En_12_Fig6_HTML.jpg)


    图 12-6.


    使用 JVM 设置 `-Xmx512m -XX:NewSize=412m` 时，较大新生代大小的示意图


    更改 `-XX:NewSize` 参数的值会移动鞋盒内的隔板（图 12-7），但保持鞋盒整体大小不变，如下所示：`-Xmx512m -XX:NewSize=100m`。


    ![A449023_1_En_12_Fig7_HTML.jpg](img/A449023_1_En_12_Fig7_HTML.jpg)


    图 12-7.


    使用 JVM 设置 `-Xmx512m -XX:NewSize=100m` 时，较大老年代大小的示意图。更改 `-XX:NewSize` 参数只会移动鞋盒纸板隔板，不会改变堆的整体大小。


    如果我意外（或错误地）将 `-XX:NewSize` 设置为大于整个堆（大于 `-Xmx`），导致老年代没有空间，那么 JVM 会给出一个不太有用的错误信息：


    ```

    Invalid maximum heap size: -Xmx=512m

    ```


    这基本上是说，不可能将鞋盒隔板移到鞋盒外面。你的鞋盒隔板，即 `-XX:NewSize` 参数，必须为老年代和新生代都留出一些空间。


    所以请记住：`-Xmx` 参数设置鞋盒的大小，而 `NewSize` 和 `MaxNewSize` 参数是隔板，它们实际上决定了新生代和老年代的大小。


    在结束本节之前，我想快速提一下，`-XX:NewSize` 参数实际上是新生代的最小大小。¹ 为了降低复杂性并避免让我的大脑打结，我喜欢将 `-XX:MaxNewSize`
    设置为与 `-XX:NewSize` 相同的值。`-XX:MaxNewSize` 还为无效参数提供了一次合理性检查。JDK 1.8 允许以下设置，尽管让新生代大小是其应包含的整个堆大小的两倍是没有意义的。


    ```

    java -Xmx512m -XX:NewSize=1024m Test

    ```


    但如果你添加了 `MaxNewSize` 参数，如下所示：


    ```

    java -Xmx512m -XX:NewSize=1024m -XX:MaxNewSize=1024m Test

    ```


    你会收到一个警告，告诉你问题所在：


    ```

    Java HotSpot(TM) 64-Bit Server VM warning: MaxNewSize (1048576k) is equal to or
    greater than the entire heap (524288k). A new max generation size of 523776k will
    be used.

    ```

    '
- fmt: "### Caution Using `NewRatio`\n\nMy shoebox metaphor approach explicitly sets\
    \ a ratio between the old and the new spaces by setting absolute byte sizes with\
    \ `-XX:NewSize`. The experienced GC tuner knows there is an alternative where\
    \ the ratio is use instead of specifying integer sizes. That alternative is the\
    \ `-XX:NewRatio` JVM parameter.\n\n> “Setting `-XX:NewRatio=3` means that the\
    \ ratio between the old and young generation is 1:3, the combined size of eden\
    \ and the survivor spaces will be one-fourth of the total heap size…” [`https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/vm/gctuning/sizing.html)\n\
    \nThe JVM was designed to use either `NewRatio` or `NewSize`/`MaxNewSize` to size\
    \ your old/new spaces, but not both at the same time. I ran a test, and `NewRatio`\
    \ is ignored if it is supplied along with `NewSize`/`MaxNewSize`, which can be\
    \ pretty confusing.\n\nBut it gets worse—a lot worse. In the new gen tuning we\
    \ did for Listings [12-3](#A449023_1_En_12_Chapter.html#Par77) and [12-4](#A449023_1_En_12_Chapter.html#Par78),\
    \ we shrank the old space to be pretty small compared to the size of the entire\
    \ heap. In fact, the old space was just 1/7th of the entire heap when performance\
    \ was at its best.\n\nMy point is that shrinking your old size to be less than\
    \ 50% of your heap is a completely valid and often desirable approach, especially\
    \ with stateless SOA systems, but unfortunately there are no valid values for\
    \ `-XX:NewRatio` that let you do this, as shown in Table [12-1](#A449023_1_En_12_Chapter.html#Tab1).\
    \ For these reasons, I suggest avoiding `-XX:NewRatio` altogether.\n\n**Table\
    \ 12-1.** Old Gen Percentages for Various `NewRatio` Settings\n\n| `NewRatio`\
    \ | Old size % (implicit) |\n| --- | --- |\n| 1 | 50% |\n| 2 | 67% |\n| 3 | 75%\
    \ |\n| 4 | 80% |\n\nI have wondered why `NewRatio` is so limiting, and perhaps\
    \ there are outdated, historical performance concerns might be at fault?\n\nSome\
    \ heap tuning tips have a short shelf-life. What’s valid in one version of Java\
    \ might very well be counter-productive in the next one. Old hands at Java will\
    \ know this already, but newbies may tend to believe the advice they recently\
    \ studied is going to be good for J8, J9, and so on.\n\nI’d like to close this\
    \ section with comments from Oracle tuning experts Charlie Hunt and Tony Printezis,\
    \ who also stress the importance of the new generation:\n\n> “You should try to\
    \ maximize the number of objects reclaimed in the young generation. This is probably\
    \ the most important piece of advice when sizing a heap and/or tuning the young\
    \ generation.” [`http://www.oracle.com/technetwork/server-storage/ts-4887-159080.pdf`](http://www.oracle.com/technetwork/server-storage/ts-4887-159080.pdf)\n\
    \n### Blindly Increasing `-Xmx`\n\nA lazy way to try to fix a heap efficiency\
    \ problem is by simply increasing the `-Xmx` value without understanding which\
    \ GC space is having the problem. For example, consider test 12a in the `javaPerformanceTroubleshooting`\
    \ tests.\n\nIf you search for 12a in `pom-startWar.xml`, you’ll find this:\n\n\
    ```\n12a \n-Xmx512m       \n```\n\nIf you quadruple the size of the `-Xmx` value\
    \ (to 2048MB), you get a little improvement but are still left with 10-15% New\
    \ GC Overhead %. Try it. This happens because the space with the high overhead\
    \ that is dragging down performance, the new space, never gets more RAM, because\
    \ the shoebox divider was not adjusted when increasing the `-Xmx`—all the space\
    \ goes to the old gen, and the stateless activity test 12a doesn’t use the old\
    \ gen.\n\n## Reclaiming Unused RAM\n\nThe previous section showed how under-allocation\
    \ of RAM caused GC overhead that limited throughput by about 25%. Over-allocation\
    \ may or may not cause performance problems, but it is a waste of RAM either way.\n\
    \nHere is a plug-it-in-now approach to detecting when you have allocated lots\
    \ of RAM that your system never uses.\n\nThe `jpt` tests 06a and 06b get the same\
    \ throughput, same response time, same CPU consumption. If all these metrics are\
    \ the same, why do we care? The answer is that the a test achieves exactly the\
    \ same throughput and response time as b, but it does so with less RAM, and the\
    \ following data from `JAVA_HOME/bin/jstat` tells the story. `jstat` provides\
    \ two metrics that are very helpful, `OGCMX` and `OGC`. As described at this URL:\n\
    \n[`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html)\n\
    \nthese values stand for “Maximum old generation capacity (kB)” and “Current old\
    \ generation capacity (kB),” respectively.\n\nThe underlined data on the right\
    \ in Listing [12-8](#A449023_1_En_12_Chapter.html#Par138) shows metrics that can\
    \ help you discover RAM that is allocated but never used. The first data is from\
    \ test 06a, and the second is from 06b of the `javaPerformanceTroubleshooting`\
    \ examples.\n\n**Listing 12-8.** `jstat` Metrics (Underlined) Help Discover Allocated\
    \ but Unused RAM\n\n![A449023_1_En_12_Figa_HTML.jpg](A449023_1_En_12_Figa_HTML.jpg)\n\
    \nUsing the test data in Listing [12-8](#A449023_1_En_12_Chapter.html#Par138)\
    \ from the command-line tool `jstat`, Figure [12-8](#A449023_1_En_12_Chapter.html#Fig8)\
    \ shows that test b wastefully allocates about 1GB of RAM that is never used,\
    \ and its performance is no better than that of test a.\n\n![A449023_1_En_12_Fig8_HTML.gif](A449023_1_En_12_Fig8_HTML.gif)\n\
    \n**Figure 12-8.** Histogram of data from Listing [12-8](#A449023_1_En_12_Chapter.html#Par138).\
    \ The tall blue bar shows RAM that is allocated but unused.\n\nUltimately, it\
    \ is up to you to determine how much RAM is considered wastefully allocated. But\
    \ be careful here. If your performance tests somehow do not reproduce some condition\
    \ where a great deal of memory is used in production, you could accidentally deallocate\
    \ too much memory and run into an out-of-memory condition. But you can safely\
    \ use `jstat` in production to gather these same metrics to help avoid this problem.\n\
    \nAlso, the utility [`http://gceasy.io`](http://gceasy.io) does a great job of\
    \ providing charts that show this same thing—allocated but unused heap space,\
    \ but it is not a plug-it-in-now tool. If you need to add JVM parameters for verbose\
    \ GC collection, you need to add them and restart your JVM. Once verbose GC has\
    \ been enabled, you will need to rerun your load test and then upload your verbose\
    \ GC data file to someone’s third-party website for the analysis. The `jstat`\
    \ approach gets around all of these hassles!"
