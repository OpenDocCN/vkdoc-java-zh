    09     at java.lang.Thread.sleep(Native Method)

    10     at com.jpt.MyThread.mySleep(MyThreadStarter.java:18)

    11     at com.jpt.MyThread.run(MyThreadStarter.java:21)


    13 "jpt-first" #10 prio=5 os_prio=31 tid=0x00007fd8b6853000 nid=0x5403 waiting
    on condition [0x0000700004e2b000]

    14  java.lang.Thread.State: TIMED_WAITING (sleeping)

    15     at java.lang.Thread.sleep(Native Method)

    16     at com.jpt.MyThread.mySleep(MyThreadStarter.java:18)

    17     at com.jpt.MyThread.run(MyThreadStarter .java:21)

    清单 11-5.

    在编辑器中显示 myThreadDump.txt 中的选定行

    ```


    当查看一张大城市的地图时，找到“您在此处”的地标来确定方位至关重要。处理堆栈跟踪也是如此。为了在单个线程的堆栈跟踪中找到方向，表 11-1 定义了几个用于回答某些关键性能问题的“地标”。


    表 11-1.

    堆栈跟踪的地标，以清单 11-5 为例


    | 地标名称 | 问题 | 来自清单 11-5 的代码 | 来自清单 11-5 的代码行 |

    | --- | --- | --- | --- |

    | 当前 | 当调用 `jstack` 时，该线程正在执行哪一行代码？这就是“您在此处”标记。 | `Thread.sleep()` | 3,9,15 |

    | 触发 | 我的哪段代码触发了当前行的执行？ | `MyThread.mySleep()` | 4,10,16 |

    | 入口 | 是什么启动了该线程？ | `MyThread.run()` | 5,11,17 |


    因此，当你对一个处于负载下的繁忙 HTTP Web 容器（如 Tomcat）进行线程转储时，来自 Web 的每个流量线程看起来都像这样：


    1.  入口标记是 Tomcat 收到 HTTP 请求并将其交给其中一个线程处理的位置。这是每个线程底部（即堆栈跟踪）的第一行。

    2.  Tomcat 代码调用你 Java 包中的 Servlet 代码。“触发”是你包空间中的一行特定代码——你的代码在导致当前执行代码之前的最后一次调用就是触发点。例如，如果当前标记位于
    JDBC 驱动程序包空间中等待 JDBC 响应，那么触发点就是执行查询的那行应用程序代码。该行代码触发了执行查询并等待响应的操作。

    3.  当前标记是堆栈跟踪的最顶部行——它是 `jstack` 捕获转储时正在执行的行。


    这个“入口-触发-当前”的顺序就是时间序列，有点像一条装配线。本章的其余部分依赖于对“入口-触发-当前”的理解，所以请务必知道每个名称对应堆栈跟踪的哪个部分。线程转储中的每个
    Web 容器线程在给定时刻可能位于装配线上的任何位置。从某种程度上说，系统中执行的任何一行代码出现在当前标记位置的概率似乎是相等的。在我进行任何性能调优之前，我大致也是这么想的。


    #### 线程名称很有帮助


    你是否注意到，在 MyThreadStarter 示例中，我们为每个线程的名称添加了一个前缀（`jpt`）？这是我为测试程序命名的方案。Web/应用服务器有自己的命名方案来命名处理传入
    HTTP 流量和其他流量的线程。表 11-2 展示了一些 HTTP/S 的示例。了解这些容器如何命名其线程有助于理解哪些线程处于负载之下。


    表 11-2.

    流行容器如何命名其线程的示例


    | 容器 | 线程名称示例 |

    | --- | --- |

    | WebSphere | `WebContainer : 5` |

    | Spring Boot / Tomcat | `http-nio-8080-exec-7` |

    | Spring Boot / Jetty | `qtp266500815-40` |

    | Wildfly Servlet 11.0 | `default task-127` |

    '
- fmt: '#### Focus on the Threads under Load


    Java developers sometimes shy away from thread dumps because of the dizzying amount
    of thread activity. It is dizzying for me, too, and I saved you from all that
    detail. Specifically, I saved you by keeping my program very short, and in the
    thread dump, I showed you just the three threads started by my program, not all
    the other threads (beyond the scope of this book) started by the JVM.


    So to make sense of thread dumps, you need strategies to weed out all threads
    that don’t matter, so you can focus on the ones most likely to be causing the
    problem. Here is your first tip:


    *   The threads under load are the ones causing the performance problem.


    This sounds a bit evasive, unhelpful, and questionable at best. So it is not an
    absolute rule, but it should at least be one of your first lines of performance
    inquiry. You should ask whether there are there any obvious problems in the threads
    that are under load. Determining which threads are the ones under load is actually
    pretty straightforward.


    First ask yourself what load is being applied. Are there production users coming
    over HTTP/S, or did you just kick off a test load script (like JMeter) that is
    also using HTTP/S? Is a batch job reading “work” from a file or database and then
    processing (that is, applying load)? Or perhaps this is a back-end JMS (Java Messaging
    Server) taking traffic from some unknown message producer?


    Then, you find the threads in the thread dump that:


    *   Have an Entry mark roughly looks like it’s coming from the load that is being
    applied.

    *   Have a thread name that also matches the load being applied.

    *   Show Java method calls/activity from your package space.

    *   Have a Thread status that is neither `WAITING` nor `TIME_WAITING`.


    Let’s look at these four, one at a time.


    Listing [11-6](#A449023_1_En_11_Chapter.html#Par49) is a snippet from a thread
    dump from a Tomcat HTTP SOA app running under Spring Boot. Let’s see if the thread
    in Listing [11-7](#A449023_1_En_11_Chapter.html#Par54), shortly, is consistent
    with all of that. Probably all Entry marks start with `Thread.run()`—or the `run()`
    method of some subclass of `Thread`; the examples in Listing [11-5](#A449023_1_En_11_Chapter.html#Par27)
    earlier and Listing [11-6](#A449023_1_En_11_Chapter.html#Par49) are no exception.
    `Thread.run()` on line 87 is essentially the emblem of the Entry mark. Three of
    the lines above that include classes in the `tomcat` package, so it sounds like
    we’re still in the right place. Lastly, on Line 78, the text `http11.Http11Processor`
    shows that this is HTTP activity. So the first bullet point suggests we are on
    the right track. The rightmost portion of Listing [11-6](#A449023_1_En_11_Chapter.html#Par27)
    is truncated for readability.


    ```

    78     at org.apache.coyote.http11.Http11Processor.service

    79     at org.apache.coyote.AbstractProcessorLight.process

    80     at org.apache.coyote.AbstractProtocol$ConnectionHan

    81     at org.apache.tomcat.util.net.NioEndpoint$SocketPro

    82     at org.apache.tomcat.util.net.SocketProcessorBase.r

    83     - locked  (a org.apache.tomcat.

    84     at java.util.concurrent.ThreadPoolExecutor.runWorke

    85     at java.util.concurrent.ThreadPoolExecutor$Worker.r

    86     at org.apache.tomcat.util.threads.TaskThread$Wrappi

    87     at java.lang.Thread.run (Thread.java:745)

    Listing 11-6.

    A Stack Trace That Shows (Line 78) That It Was Launched by Tomcat’s HTTP Engine

    ```


    The second bullet point says that the thread name has to match the load being
    applied. My Tomcat thread name is `http-nio-8080-exec-9` and that is consistent
    with Table [11-2](#A449023_1_En_11_Chapter.html#Tab2). The thread name is in the
    first line of 11-7, below.


    The third bullet point is just a reminder that normally you are looking for code
    from your own package space. In this book, that will mostly be `com.github.eostermueller`—and
    we’ll have plenty examples of this later.


    The fourth bullet point says that threads under load are in a thread state other
    than `WAITING` and other than `TIMED_WAITING`. Well, that is normally the case,
    but in a few of my examples, my use of `java.lang.Thread.sleep()` in sample code
    to simulate a slow piece of code are an exception to the rule—they’ll show up
    as `TIME_WAITING`, even though load is applied.


    The second line in Listing [11-7](#A449023_1_En_11_Chapter.html#Par54) shows a
    thread under load, with thread state of `RUNNABLE`.


    ```

    "http-nio-8080-exec-9" #56 daemon prio=5 os_prio=31

    java.lang.Thread.State: RUNNABLE

    at java.io.FileInputStream.readBytes(Native

    at java.io.FileInputStream.read(FileInputStr

    at sun.security.provider.NativePRNG$RandomIO

    at sun.security.provider.NativePRNG$RandomIO

    Listing 11-7.

    Thread Under Load with thread state RUNNABLE

    ```


    So once you have verified these four things, you will be able to wade through
    all the threads in a thread dump and figure out which ones are currently under
    load. As one last sanity check, you could also check the CPU consumption on the
    machine. For sure, zero CPU consumption with occasional spikes will not suffice
    for load (even by this chapter’s loose definition).


    ## Manual Thread Dump Profiling (MTDP)


    Now that you can identify threads under load in a thread dump, you are finally
    ready to use MTDP to find performance issues in any environment.


    Here are the instructions:


    1.  Take four or so thread dumps as load is applied with a few seconds between
    each dump.  

    2.  If something that you could fix shows up in the dumps for two or more threads
    that are under load, it is worth fixing.  


    Although these instructions are adjusted to work with Java, Mike Dunlavey was
    the first to document this technique (for C programs) in his book *Building Better
    Applications* (Van Nostrand Reinhold, 1994).'
