    When looking at a map of say, a large city, finding the “you are here” landmark
    to get your bearings is critical. Working with stack traces is no different. To
    find my bearings in a single thread’s stack trace, Table [11-1](#A449023_1_En_11_Chapter.html#Tab1)
    defines a few “landmarks” used to answer certain key performance questions.


    **Table 11-1.** Landmarks of a Stack Trace, Using Listing [11-5](#A449023_1_En_11_Chapter.html#Par29)
    as an Example


    | Landmark Name | Question | Code from Listing [11-5](#A449023_1_En_11_Chapter.html#Par29)
    | Lines of Code from Listing [11-5](#A449023_1_En_11_Chapter.html#Par29) |

    | --- | --- | --- | --- |

    | Current | What line of code in this thread was executing when `jstack` was invoked?
    This is the “You are here” mark. | `Thread.sleep()` | 3,9,15 |

    | Trigger | What code of mine triggered the Current line to execute? | `MyThread.mySleep()`
    | 4,10,16 |

    | Entry | What started this thread? | `MyThread.run()` | 5,11,17 |


    So when you take a thread dump of a busy HTTP web container (like Tomcat) under
    load, each thread of traffic from the web looks like this:


    1. The Entry mark is where Tomcat got an HTTP request and gave it to one of its
    threads to process. This is the first line at the bottom of each thread (aka stack
    trace).

    2. Tomcat code calls your servlet code in your Java package. The “trigger” is
    one specific line of code in your package space—the last call your code makes
    that leads up to the currently executing code is the trigger. For example, if
    the current mark was in the JDBC driver package space waiting for a JDBC response,
    then the trigger would be the line of application code that executed the query.
    That line triggered the code to execute a query and wait for a response.

    3. The Current mark is the topmost line of the stack trace—it’s the line that
    was executing when `jstack` captured the dump.


    This “entry-trigger-current”, in that order, is the time sequence, kind of like
    an assembly line. The rest of this chapter relies on understanding “entry-trigger-current”,
    so be sure to know which name points to which part of a stack trace. Each web
    container thread in a thread dump might be at any point in the assembly line at
    a given moment. In a way, it seems there might be equal probability that any single
    line of code executed in the system was positioned at the Current mark. That’s
    pretty much what I thought before I ever did any performance tuning.


    ### Thread Names are Helpful


    Did you notice that in the `MyThreadStarter` example, we added a prefix (`jpt`)
    to the name of each thread? That is my naming scheme for my test program. Web/app
    servers have their own naming schemes for naming the threads that process incoming
    HTTP traffic and other traffic as well. Table [11-2](#A449023_1_En_11_Chapter.html#Tab2)
    shows some examples for HTTP/S. Understanding how these containers name their
    threads helps understand which threads are under load.


    **Table 11-2.** Examples of How Popular Containers Name Their Threads


    | Container | Example of thread name |

    | --- | --- |

    | WebSphere | `WebContainer : 5` |

    | Spring Boot / Tomcat | `http-nio-8080-exec-7` |

    | Spring Boot / Jetty | `qtp266500815-40` |

    | Wildfly Servlet 11.0 | `default task-127` |'
