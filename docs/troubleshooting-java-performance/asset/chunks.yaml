  trans: '

    # 4. 负载生成概述


    在会议和其他讨论中，我们都曾短暂地担忧过你的产品能否处理生产工作负载。这就是性能焦虑。它就像一个巨大的、红色的不确定性气泡，笼罩在未发布的服务器端软件产品团队之上。


    验证系统架构是否性能良好，是戳破这个巨大红色气泡的好方法，而本章将帮助你在软件开发生命周期（SDLC）的早期阶段就开始着手。


    本章提出了一个包含两部分计划的负载脚本创建方案，这对于理解你的应用程序在压力下的表现至关重要。计划的第一部分帮助你快速创建第一个脚本，以便你了解架构的性能。


    本章的目标是：


    *   理解：可以使用一个非常基础、简洁、仅包含少量业务流程的负载脚本，来对系统架构进行负载测试。

    *   理解：调整架构级别的性能问题，可以如何为所有业务流程带来快速的性能提升。

    *   理解：为了更真实地模拟生产业务流程，需要对负载生成脚本进行哪些增强。


    似乎开发和测试软件本身已经够难了，学习如何为负载测试生成负载还需要额外的工作。以下是负载测试中涉及的一些任务：


    *   为负载生成器创建和维护脚本，以对被测系统施加压力。

    *   为你的数据库创建和维护生产规模的数据集。

    *   创建和维护负载测试用于登录被测系统的用户 ID 和密码。


    由于所有这些以及其他工作，对被测系统 100%的业务流程进行负载测试很少（如果有的话）能够实现。这根本不划算。我的备用方法是首先使用一个简单的**优先脚本**对基本架构进行负载测试，然后增强脚本以覆盖最关键的业务流程（**次要脚本**）。使用这两个脚本调整你的系统，能让你了解使被测系统其他业务流程达到性能要求所需的技术，只要这些流程基于大致相同的架构、库、容器、日志记录、相同的身份验证和授权机制等。


    本章概述了为你的被测系统创建优先脚本和次要脚本所需的增强功能。优先脚本帮助你快速发现架构级别的性能缺陷。次要脚本则提供了更接近真实工作负载的模拟。但首先，你需要掌握一些增强负载脚本的基本技能。我们将在下一节中介绍这些技能，其中还包括对负载生成器的简要介绍。


    ## 负载生成器


    在第 2 章讨论适度的调优环境时，我们提到负载生成器基本上是一个网络流量生成器，用于查看你的被测系统能否承受类似生产环境的负载压力。可以手动组装脚本，但它们通常是通过“录制-回放”过程创建的。本节将讨论在初始录制和测试完成后，你通常需要做的所有增强工作。


    性能问题可以在代码、数据或配置中修复，但负载脚本内部也有很多需要修正的地方，以便最好地模拟你的生产工作负载。


    ### 关联变量


    在你对负载脚本所做的所有增强中，创建关联变量的使用频率最高，因此每个人都应该熟悉它。我们在负载生成器的脚本语言中创建这些变量。然后，你使用该变量来保存来自
    HTTP 请求输出的特定数据片段，以便它随后可以作为输入参数或后续请求的 POST 正文内容被提交。


    这里有一个简单的例子：假设你使用浏览器在一个 Web 应用中创建了一个新客户，并且该 Web 应用生成了一个新客户 ID（本例中为`custId=2360`）。然后你选择用一个新的街道地址来更新客户详细信息。“客户更新”URL
    看起来像这样：


    [`http://mybox.com/startCustUpdate?custId=2360`](http://mybox.com/startCustUpdate?custId=2360)


    如果你使用负载生成器录制此过程，这个 URL 会被逐字录制并保存到你的脚本中。几天或几周后，当你再次运行此脚本时，使用这个特定的 custId 2360 将非常不合适，因为新的`custId`值已经被创建了。因此，我们不希望像这样硬编码的值被编码在脚本文件中。


    所以，我们小心地用关联变量替换硬编码的值。你需要负责更新脚本，以便在响应中找到 custId=2360，将其存储在关联变量中，然后在后续的一个或多个请求中使用该变量。


    我讲得比较快，所以表 4-1 总结了所需的更改。


    **表 4-1. 将系统中的硬编码 ID 转换为关联变量所需的增强**


    | 顺序 | 负载脚本行为（初始录制时） | 添加关联变量所需的增强 |

    | --- | --- | --- |

    | 1 | 负载脚本调用某个 URL 来创建新客户。 | 无需更改。 |

    | 2 | 前一个请求的响应返回给负载生成器，响应中的某处包含新生成的客户 ID 2360。 | 增强负载脚本，使其能够从 HTTP 响应中定位/抓取新创建的唯一客户
    ID。将该值存储在负载脚本变量中；`CUST_ID` 是个好名字。使用 JMeter，你可以通过正则表达式提取器来实现。 |

    | 3 | 负载脚本提交一个 URL 来更新客户详细信息；录制的客户 ID 2360 作为 URL 参数传递： [`http://mybox.com/startCustUpdate?custId=2360`](http://mybox.com/startCustUpdate?custId=2360)
    `.` | 增强脚本，使其不再传递硬编码的客户 ID 2360，而是传递存储在`CUST_ID`变量中的数字。 |


    这种关联变量技术可以而且应该用于更复杂的负载脚本，尤其是那些录制生成的脚本。对你来说，一个故障排除的技巧是，要精确找到脚本中需要应用该技术的位置。至少，你应该仔细考虑在脚本中的以下位置应用此技术：

    '
- fmt: '# 排版后的内容


    As shown earlier, anywhere the server-side code generates a unique ID.


    Anywhere you typed in data or selected some option during the script recording.


    All parts of the application that store HTML hidden variables.


    Any other place, as with hidden variables, where JavaScript will move data from
    the output of one server-side request to the input of another.


    All places where CSRF tokens (`https://stackoverflow.com/questions/5207160/what-is-a-csrf-token-what-is-its-importance-and-how-does-it-work`)
    are used. These unguessable tokens are generated on the fly and stored in URL
    parameters. They make it tough for malicious web pages in one tab on your browser
    to execute requests to other sites (like your bank) in a different tab on your
    browser.


    When using JMeter, correlation variables are not required for `JSESSIONID` support.
    Instead, just make sure your JMeter script has one Cookie Manager.


    To repeat, you are on the hook for finding where correlation variables need to
    be added. Start with the previous list and then yours is an ugly task after that:
    carefully assess whether each HTTP request is returning the right data, and add
    this technique as necessary. Another way to find the locations in the script for
    Correlation Variables is to think about all the data items you typed into the
    browser: searching for particular customer name, selecting a particular item to
    purchase, selecting that special manatee that you’d like to see in a singles bar.


    Regardless of which load generator is used, correlation variables are critical
    to applying real production load. But if you’re using JMeter, Chapter [7](#A449023_1_En_7_Chapter.html)
    provides a step-by-step guide to creating correlation variables based on an example
    JMeter `.jmx` plan in the `github.com` repo for this book. Look for `jpt_ch07_correlationVariables.jmx`.


    ## Sequencing Steps in a Load Script


    When you record a load script, you log on to the SUT, navigate around a handful
    of web pages executing business processes (like the “create customer” detailed
    earlier) and then you log off.


    Load generators let you choose to play a recorded script once, or repeat the script
    a specific number of times, or repeat it for a particular duration of time. These
    options are available in JMeter in something called a thread group, which is also
    where you dial in the number of threads that should be replaying the script at
    a time. The default one that comes with JMeter is fine for basic tasks, but I
    really like the Concurrency Thread Group from Blaze Meter. It has a nice visual
    display of how quickly your threads will ramp up to full load. You can download
    it from `jmeter-plugins.org`.


    Often, you want two (or more) sets of users executing different business processes
    at the same time. The not-so-obvious approach to scripting this is to make two
    separate recordings, one for each task, and then combine the two scripts into
    one. To do this in JMeter, create two separate thread groups in a new/blank/empty
    JMeter script, and perhaps name them A and B.


    Then record and test the two load scripts separately, and copy all the activity
    in one into the A thread group and the other into the B.


    There are some very compelling reasons for this organization. It lets you dial
    in, for example, a higher count of threads (more load) with one thread group and
    a lower volume with the other, which enables you reflect the actual volumes (roughly)
    used by your end users in production.


    Furthermore, this helps you to model the activity of a web application that helps
    two different groups of people coordinate activity. Say, for example, one group
    creates orders for widgets while the other approves each order. It’s pretty straightforward
    to implement one thread group that repeatedly creates orders. To implement the
    other thread group with the order approval activity, start by writing a script
    that repeatedly checks for new orders. Load generators, JMeter included, allow
    you to add conditional tests that would check in the response HTML for tags or
    attributes that indicate whether any new orders were created. Once a new order
    is detected, you can add the recorded steps to approve the order. See the JMeter
    If Controller and While Controller for details. The Loop Controller can be helpful,
    as well as the Setup and Teardown thread groups.


    With these load generator basics under your belt, the next two sections lay out
    a two-step plan, “First Priority” and “Second Priority,” that helps you balance
    the conflicting concerns of creating a load script quickly and creating a script
    that applies load somewhat realistically.


    ## The First Priority Script


    Performance angst is a real; consider these tough-to-answer questions: How many
    defects must we fix before our performance goals are met? How long will that take?
    Have we invested in the wrong Java architecture, one that will never perform well
    enough? Taunting project planners with these kinds of angst-ridden and unanswerable
    questions is a bit fun, try it some time.


    The First Priority script helps you get up and going quickly to fix some of the
    most obvious performance defects quickly and to curtail some of this performance
    angst. This section provides a minimum check-list of “must have” load script enhancements,
    the ones required to convince you and your team of the validity of your load test.
    But also, look at the “First Priority” version as a cap: Once you have added these
    First Priority enhancements, stop. Focus on addressing the main performance defects
    uncovered by the P.A.t.h. Checklist in Chapter [8](#A449023_1_En_8_Chapter.html).
    Once you have the biggest issues under control, then you can jump to the Second
    Priority load scripting enhancements, later in this chapter, to finish off the
    job, and deliver some great performance.'
