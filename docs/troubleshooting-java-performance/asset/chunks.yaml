    ### 第三部分：P.A.t.h. 检查清单与性能故障排查


    第三部分的章节主要关于性能故障排查。它们详细介绍了用于识别 Java 服务端性能问题根本原因的工具和技术。


    第 8 章概述了 P.A.t.h. 检查清单，并提供了两个示例应用的架构概览，你可以在自己的机器上运行它们。这些示例应用可从 github.com 下载，旨在为你提供收集正确性能数据并定位问题根本原因的实践体验。


    P.A.t.h. 检查清单中的各项内容已在前面描述过，因此此处不再重复，但以下是每个项目对应的章节：


    *   **P**：持久化（Persistence）。第 9 章

    *   **A**：外部系统（Alien systems）。第 10 章

    *   **t**：线程（threads）。第 11 章

    *   **h**：堆（heap）。第 12 章


    致谢


    感谢 Apress 信任我这位首次写书的作者；你们的支持对我来说意味着一切。


    Apache 基金会的 Shawn McKinney 是第一个认为我能写书的人。Shawn，你早期的鼓励和对那些疯狂想法的坦诚反馈是无价的，而且你总是第一个对任何新代码提供反馈。谢谢你。Mike
    Scheuter 是我认识的最聪明的人之一；他是我在 FIS 的长期朋友、导师和同事，是他最初教会我热爱堆栈跟踪以及许多其他与工作相关或无关的事情。感谢我的雇主
    FIS 和我们的 PerfCoE 团队。FIS 在整个企业范围内对卓越性能的持续高管级支持在业内是独一无二的。为此表示感谢。


    阿肯色大学小石城分校信息科学系主任 Liz Pierce 博士，策划了我于 2017 年 6 月初举办的一个 8 小时的 Java 性能研讨会。感谢 Liz
    博士的支持，也感谢大约 15 位学生、教职员工和其他人，他们牺牲了两个周六下午的时间来钻研性能问题。我非常喜欢。多伦多的 CMG Canada 小组也在一两个月前慷慨地审核了其中的一些想法。谢谢。


