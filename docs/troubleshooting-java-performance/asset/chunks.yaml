    ## 预热不足


    性能工程师可能会无休止地争论在运行稳态负载测试之前，预热系统所需的合适时间。5 分钟？15 分钟？对我来说，每个系统都是不同的。我会预热系统，直到其指标稳定几分钟。如果指标从未稳定，那么预热的时间长度就无关紧要了。在这种情况下，我会做的一件事是简化负载脚本，以隔离工作负载中导致混乱的部分。


