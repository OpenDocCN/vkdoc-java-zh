  trans: "\n### 加载脚本与 SUT 登录\n\n第 1 章讨论的第三个性能反模式是“过度处理”。其中提到，试图对很少使用的业务流程进行负载测试和调优是浪费时间。相反，我们应该专注于最重要和最常用的流程。\n\
    \n在初次创建负载脚本时，很容易陷入这种情况：用户登录和退出系统的频率远高于生产环境中的实际情况。\n\n因此，**首要优先级**负载脚本的主要目标是确保脚本中的\
    \ SUT 登录活动在一定程度上符合实际，尤其是对于登录过程处理密集型的 SUT。\n\n我所说的密集型活动包括为用户会话创建资源、单点登录、授权数百个权限、密码认证等。登录过程越复杂，就越需要精心设计负载脚本来模拟真实的登录场景。为什么？因为调优一个不常执行的功能是浪费时间。\n\
    \n如果你没有来自生产环境的良好数据来了解登录频率（例如，与其他业务流程相比，系统范围内每小时发生多少次登录），你就需要做出判断。在大多数系统中，真实用户不会以\
    \ 1:2 的比例登录、执行两个业务流程然后注销。相反，他们在注销前会做更多工作。也许用户每执行 10 个其他业务流程才登录 1 次，这是一个更合理的比例。我这里的数据完全是粗略的——最终需要你来决定。\n\
    \n使用 JMeter，实现登录与其他业务流程大约 1:10 比例的一个简单方法是使用循环控制器（前面提到过），如下所示：\n\n1.  用户登录。\n2.\
    \  JMeter 循环控制器重复五次。\n    1.  业务流程 1（通常需要少量 HTTP 请求）。\n    2.  业务流程 2（通常需要少量 HTTP\
    \ 请求）。\n3.  注销。\n\n一旦你的脚本中 SUT 登录次数与其他业务流程相比大致符合实际，就可以开始施加负载，并使用 P.A.t.h.检查清单来发现缺陷。\n\
    \n### 在多个线程中使用同一个 SUT 用户\n\n本节中的建议可以在**首要优先级**或**次要优先级**负载脚本中实现——由你选择。我将它们放在这里，是因为它们也属于登录问题，与前面讨论的类似。\n\
    \n如果你的 SUT 不允许同一用户同时在两个不同的浏览器中登录，那么在负载测试中同时登录两个或更多并发用户时，就会导致登录失败。\n\n为避免此问题，你可以从文本文件中读取用户\
    \ ID 和密码，而不是在负载脚本中硬编码单个用户 ID。想象一个每行包含一个用户 ID 和密码的.csv 文件。以下是 JMeter 用于读取该文件的组件：\n\
    \n[`http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config`](http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config)\n\
    \n大多数负载生成器（包括 JMeter）都具有防止两个线程同时使用同一用户（实际上就是一行文本）的功能。默认行为通常是在读取/使用最后一条记录后，回到.csv\
    \ 文件的开头。你可以使用文本编辑器手动创建.csv 文件，也可以手动导出 SQL 语句（如`SELECT MY_USER_NAME FROM MY_USER_TABLE`）的结果。\n\
    \n使用更符合实际数量的用户还有其他动机。我们直说吧。内存泄漏和多线程缺陷让性能工程师们忙得不可开交，而会话管理代码通常充斥着这两种缺陷。使用单一的 SUT\
    \ 用户 ID 进行负载测试（就像刚录制且基本未修改的负载脚本那样），无法充分测试 SUT 的会话管理压力。¹\n\n假设你的脚本仍然反复登录同一个用户。如果\
    \ SUT 缓存了该用户的权限，你的命中/未命中比率会异常高（应用服务器启动时一次未命中，随后全是命中……），因为在负载测试运行时，同一个用户会始终留在缓存中。这意味着你的\
    \ SUT 将始终走快速代码路径，从快速缓存（而非较慢的数据库）加载用户权限，从而低估了实际的处理量。\n\n仅使用单个用户进行测试时，你还会错过了解维持大量用户会话所需内存量的机会。因此，务必估算一下任意时刻会有多少用户登录，并在负载测试中包含这么多用户。\n\
    \n最后，既然我们谈到了用户和会话内存，别忘了验证系统的自动注销功能是否正常。你可能需要制作一个负载测试的临时版本，并注释掉所有注销活动。运行测试，等待 30\
    \ 分钟左右（或 SUT 自动注销用户所需的时间），然后验证会话计数是否降至零。\n\n## 次要优先级\n\n为了全面准确地模拟业务流程和工作负载，你需要一个功能齐全的负载生成器，例如\
    \ JMeter。然而，正如我之前所说，大多数性能缺陷都可以使用我在“首要优先级”部分详述的少量功能子集来发现。当然，通过“次要优先级”的增强功能可以发现一些关键错误，但这类错误往往较少。这些缺陷也往往属于单个业务流程的一部分，而非整个\
    \ SUT 架构。\n\n以下各个负载脚本阶段展示了脚本增强的典型演进过程。每个阶段都列出了你可以进行的增强。\n\n### 负载脚本阶段 1\n\n在负载脚本阶段\
    \ 1，你刚刚录制了一个使用 Web 浏览器遍历 SUT 最新/最佳版本的负载脚本。当然，也可能是你正在处理一组手动收集的 SOA 请求。你已在脚本中添加了一些验证过程，以确保所有\
    \ HTTP/S 响应无错误，并包含一些关键的响应文本片段。脚本中还添加了一些关联变量，用于将单个数据项（例如生成的新客户 ID 或发货确认号）从一个 HTML\
    \ 响应的输出传递到脚本后续业务流程中某个需要它的网页。除此之外，几乎没有其他修改。\n\n#### 细节\n\n负载生成是一种录制-回放技术，它有点脆弱，就像大多数代码生成的东西一样。因此，请保留最近录制过程的完整、详细\
    \ HTTP 日志的备份；也许可以将最近的录制日志和负载脚本保存在源代码控制中。日志必须包含所有 HTTP 请求 URL、任何 POST 数据、HTTP 响应代码，当然还有\
    \ HTTP 响应文本。当后续对脚本的“优化”导致某些功能失效时，你可以回到原始、准规范的完整对话日志，找出问题所在。\n\n事实上，使用合适的负载生成器，对规范日志和出错的\
    \ HTTP 日志进行简单但非常仔细的文本文件差异/比较，就能直接引导你找到功能脚本的问题。第 7 章中有一个如何在 JMeter 中执行此操作的示例。请查找“调试\
    \ HTTP 录制”部分。\n"
- fmt: '#### Validating HTTP Responses


    Validating that HTTP responses contain the "right" response data is critical.
    Cumulatively, I have wasted weeks and weeks of time analyzing and trusting tests
    whose responses were, unbeknownst to me, riddled with errors. So I implore you
    to please take some time to enhance your scripts to tally an error if the right
    HTTP response is absent. In addition, you should also check to see if the wrong
    response (exceptions, error messages, and so on) is present.


    Chapter [7](#A449023_1_En_7_Chapter.html) on JMeter shows a feature that does
    this, called an Assertion. There are all kinds of JMeter reports and graphs that
    show error counts. When your JMeter Assertion flags an issue, those JMeter reports
    reflect those errors. Without this essential visibility, you, too, could waste
    weeks of time as I have.


    ### Load Script Stage 2


    Load scripts log many different users on in a single test, instead of the same
    user over and over. Hard-coded hostnames or IP addresses and TCP port numbers
    are replaced with variables, whose value you will change when using the scripts
    in a different environment. The script executes the business processes in the
    rough proportions seen in production.


    #### Details


    This script deals with workload proportions. To get a more production-like workload,
    you need to enhance your load scripts to execute various business processes in
    more realistic proportions. At a very high level, for many purposes, the breakdown
    of business processes is 70% inquiry, 30% update/insert/delete. All too seldom,
    our proportions are unrealistic, because we don''t take the time to collect quality
    data from production to learn how often each type of BP is executed.


    But before jumping head-first into finding which services are used the most/least
    in production (and tweaking your load scripts to apply load in those proportions),
    I recommend, first, to focus on a more imperfect approach, where you apply three
    or more threads of load (with zero think time) to all services. This is the `3t0tt`
    mentioned in the introduction. Of course, we do this to shake the multithreaded
    bugs out of that old dormitory room couch. Getting more persnickety and perfecting
    realistic load proportions buys you two different things. One, you avoid wasting
    time troubleshooting problems with a never-to-be-used workload, and two, you find
    compatibility/contention problems with the go-to, production workload. Of course
    these are both important concerns, but in my experience, their incidence is noticeably
    eclipsed by that of the multithreaded bugs, which can be evicted from that lovely
    couch even with imprecise load proportions. Aim for the right workload proportions
    and load script think times, but start out with at least three threads of load
    with zero think time.


    With JMeter, you implement your workload proportions/percentages by assigning
    different numbers of threads to your various scripts. For instance, if you wanted
    to model the 70%/30% split detailed earlier, you would start by recording two
    separate scripts, one for account inquiry and the other for account update. With
    a single simple script like this, all the HTTP requests are stored under a single
    JMeter Thread Group—the place where you specify the number of threads of load
    to apply, and the duration of the test.


    So to implement the 70/30 workload proportions, you might start with a blank script
    with two blank Thread Groups that are siblings in the JMeter tree configuration.
    In the first Thread Group, you might assign seven threads, and the other three
    threads. Then you would copy/paste all the HTTP requests from the account inquiry
    into the Thread Group with the seven threads, and the account update HTTP requests
    into the other Thread Group.


    This blog post details three alternative JMeter approaches to getting workload
    proportions right:


    [`https://www.blazemeter.com/blog/running-jmeter-samplers-defined-percentage-probability`](https://www.blazemeter.com/blog/running-jmeter-samplers-defined-percentage-probability)


    ### Load Script Stage 3


    Instead of inquiring upon or modifying the exact customer or accounts used to
    record the script, the load scripts are enhanced to read account/customer/other
    identifiers from a data file and then input those to the SUT.


    #### Details


    In this stage, the load scripts move beyond reading user IDs from `.csv` files
    and on to reading other important data from `.csv` files, like customer and account
    data. But come to think about it, why bother? We are most certainly getting ahead
    of ourselves. Beefy-sized data must actually exist in these customer, account,
    and other tables before we spend the time to enhance our load scripts to apply
    traffic with `.csv` or data-driven samples.


    Yes, this chapter is about load scripts, but I cannot keep myself from reminding
    everyone that my dog has the skills to design a great-performing database, if
    the row counts are low enough. Just about any query you can dream up will perform
    very well with fewer than about ten thousand records. So, "performance complacency"
    is high when row counts are low.


    To get around this complacency, it seems like a nice idea to use the load generator
    scripts to drive the SUT to grow the table counts of your big tables. But unfortunately,
    the SUT, at this point in the tuning process, is generally so slow that you will
    start collecting retirement checks before the SUT adds enough data, even if left
    to run for many hours.


    If this is the case, consider using JMeter as a quick RDBMS data-populator. Create
    a separate script that uses the JMeter JDBC Sampler (Figure [4-1](#A449023_1_En_4_Chapter.html#Fig1)):


    ![A449023_1_En_4_Fig1_HTML.jpg](A449023_1_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    JMeter can execute SQL using your JDBC driver. This file was used to populate
    more than 2 million rows in well under 10 minutes on my 2012 MacBook. This file,
    `loadDb-01.jmx`, is available in the `src/test/jmeter` folder in the jpt examples.


    [`http://jmeter.apache.org/usermanual/component_reference.html#JDBC_Request`](http://jmeter.apache.org/usermanual/component_reference.html#JDBC_Request)


    It should fire multiple threads that execute massive numbers of INSERTs (carefully
    ordered to align with foreign key dependencies), with VALUES taken from either
    random variables:


    [`http://jmeter.apache.org/usermanual/component_reference.html#Random_Variable`](http://jmeter.apache.org/usermanual/component_reference.html#Random_Variable)


    Or from `.csv` text files:


    [`http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config`](http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config)


    And that concludes my little detour discussion of how to quickly get production-sized
    table counts. Let''s get back to the original discussion, where the initial recorded
    load script inquires upon or modifies data from one or a few particular customers
    or accounts. Whatever data you used in the script recording is hard-coded in the
    load script file. Inquire on customer 101. Update the balance of account number
    393900. The "101" and "393900" are stored in the script file.


    Now that your table counts are sufficiently beefed up, you can enhance your load
    scripts to, for example, do account inquiries based on account numbers found in
    a `.csv` file. So instead of having 101 and 393900 in the load script file, those
    values are instead stored in the `.csv` file.


    A great place to start is with a text file containing tens of thousands of different
    account numbers, one account number per line in the text file. This is the most
    common format of input file for load generators. But do not stop there with just
    a single column in your `.csv` file; there is some great low-hanging fruit here.
    If you add a second column in your `.csv` file with corresponding account balances,
    you can easily enhance the load generator script to validate that the SUT is returning
    the right balance for each inquiry.'
