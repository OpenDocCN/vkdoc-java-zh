- fmt: "# Distinguishing High Throughput and Slow Stack Traces\n\nMuch of the time\
    \ when I use `MTDP`, I am looking for the cause of some really slow processing.\
    \ In the thread dumps I would expect to see the same stack trace show up in perhaps\
    \ more than 50% of the stack traces. Let’s say 6 out of 12 traces from 4 thread\
    \ dumps have the exact same method.\n\nAn alternate reading of this same data\
    \ is that instead of slow response time, this particular business process shows\
    \ up more frequently simply because has higher throughput—it’s executed more frequently\
    \ so it shows up more frequently. That sounds like a possibility, but there is\
    \ an easy way to check it.\n\nEarlier, we said that thread dumps are taken at\
    \ a point at time, and any give one was captured either before, during, or after\
    \ the main processing event. Have a closer look at the method that showed up in\
    \ 6 of the 12 thread dumps. If the “current” mark fluctuates in these 6 stack\
    \ traces is sometimes before, sometimes in the middle, or sometimes after the\
    \ main processing event, I concede that high throughput is the cause of frequent\
    \ occurrences.\n\nOn the other hand, if the stack trace in question has the exact\
    \ same current, trigger, and entry, then this is a slow request.\n\n# MTDP and\
    \ Other Examples\n\nDial this performance key into `littleMock`:\n\n`X2,J25,K25,L0,Q1,R1,S1,T1`\n\
    \nIf you take some thread dumps, you will find both of these methods showing up:\n\
    \n`javax.xml.transform.TransformerFactory.newInstance()`\n\n`com.sun.org.apache.xalan.internal.xsltc.trax.TransformerFactoryImpl.newTransformer()`\n\
    \nNow, take the above key and change `T1` to `T2` and apply the new key. Performance\
    \ improves dramatically. How does `T2` process so much more throughput? Search\
    \ the `litteMock` web page for `T2` and click the ‘source link.’ to find the answer.\n\
    \nLet’s shift gears back to the other set of examples—`jpt`. `MTDP` can diagnose\
    \ a number of problems with the `jpt` tests. Here is the URL again for your convenience:\n\
    \n[`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)\n\
    \nConsider these examples:\n\n*   `jpt` test `01a` has really slow requests to\
    \ a back-end. Run `jpt` test `01a`, capture some thread dumps, and look for `SocketInputStream.socketread0()`.\n\
    *   `jpt` test `02a` has many reads to a 1MB data file. The thread dumps will\
    \ show a number of thread that include this method:\n*   `com.github.eostermueller.perfSandbox.filesystem.FileSystemReader.readFile()`\n\
    *   `jpt` test `04a`. This test uses a questionable table join and ends up with\
    \ slow result set iteration. I had to take 5 or 6 thread dumps, but the result\
    \ set iteration really shows up here:\n\n    ```\n    org.h2.result.ResultRemote.next(ResultRemote.java:133)\n\
    \    org.h2.jdbc.JdbcResultSet.nextRow(JdbcResultSet.java:3240)\n    org.h2.jdbc.JdbcResultSet.next(JdbcResultSet.java:123)\n\
    \    com.zaxxer.hikari.pool.HikariProxyResultSet.next(HikariProxyResultSet.java)\n\
    \    com.github.eostermueller.perfSandbox.dataaccess_1.AccountMgr1.getAccounts(AccountMgr1.java:76)\n\
    \    ```\n\n*   `jpt` test `05b`. Thread dumps show two interesting things here:\n\
    \    *   As stated earlier, network activity will show up in a thread dump under\
    \ this method: `java.net.SocketInputStream.socketRead0()` In this example, it’s\
    \ here because of a very slow query that is missing a database index.\n    * \
    \  See the `executeQuery()` call below? If you find the method that calls `executeQuery()`,\
    \ you can find the SQL statement. I’ve highlighted the method that calls `executeQuery()`,\
    \ and that’s where you’ll find the text of the SQL statement:\n\n        ```\n\
    \        com.zaxxer.hikari.pool.HikariProxyPreparedStatement.executeQuery()\n\
    \        com.github.eostermueller.perfSandbox.dataaccess_1.AccountMgr1.getAccounts(AccountMgr1.java:73)\n\
    \        com.github.eostermueller.perfSandbox.Controller.internalInquiry2(Controller.java:353)\n\
    \        ```\n\nSo you can see from these examples the thread dumps are very powerful,\
    \ shedding light on all of these problems, none of which have anything to do with\
    \ `BLOCKED` threads.\n\nJava Profilers can obviously find all these same problems\
    \ that `MTDP` can find, and then some. So when should each tool be used and when?\
    \ In short, use `MTDP` when you don’t have access to a Java profiler or APM tool.\
    \ In summary, use either, use both, just use them, whatever works best/fastest\
    \ for you.\n\n# Don’t Forget\n\nWe have covered a lot of ground in this chapter.\
    \ We saw how to take thread dumps and identify the Entry, Trigger, and Current\
    \ landmarks, and we also learned how to detect whether load is being applied to\
    \ a particular thread or not. We also went over instructions for Manual Thread\
    \ Dump Profiling (`MTDP`), and mentioned that the threads under load in thread\
    \ dumps are rarely ever class/methods that are fast—instead, `MTDP` is an basically\
    \ the exclusive club for the slow.\n\nThen, we discussed how to plot the timeline\
    \ of user activity, and determine whether the stack trace was captured before,\
    \ during or after the main processing. Knowing this is essential, because if a\
    \ stack trace appears slow and showed up prior to the main processing, then congratulations,\
    \ you have found Main Anti-Pattern 1—Unnecessary Initialization.\n\nAlso, for\
    \ one example, we inserted a 50ms `Thread.sleep()` and were easily able to detect\
    \ that in thread dumps. `MTDP` is pretty impressive that it’s capable of finding\
    \ an issue so small. But the example with the XML optimizations was even more\
    \ impressive. I didn’t show the response time metrics, but the response time improvement\
    \ for that example was less than 5ms. This shows that `MTDP` is not only effective,\
    \ but it is very sensitive and can find issues both large and small.\n\nSo you\
    \ see, there is much, much more to thread dumps than looking at blocked threads.\
    \ You can actually use `MTDP` like it was a mini Java profiler. With such a powerful,\
    \ low-overhead tool, there are all kinds of problems that you can discover in\
    \ the Dark environments of this world.\n\nLike any measurements, there will be\
    \ variability, especially if you are operating in a medium to low throughput environment.\
    \ Any tool you stick into an environment with low throughput will end up with\
    \ variable results. That is a concern with any measurement. But just like most\
    \ other profilers, `MTDP` does not show whether there are Garbage Collection slowdowns\
    \ in your environment.\n\n# What’s Next\n\nSince `MTDP` and Java profilers in\
    \ general don’t have metrics for Garbage Collection, the next chapter provides\
    \ a very quick way to assess GC health. There is also a great section on detecting\
    \ the cause of memory leaks, so stay tuned for that."
