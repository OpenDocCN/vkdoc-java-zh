  trans: '

    ### 垃圾回收器概述


    在所有 JVM 堆参数中，`-Xmx` 参数对堆性能起着主要作用。例如，`-Xmx2048m` 定义了一个固定的 2GB 内存（称为堆），供你的 Java
    程序使用。请注意，与许多 GC 参数不同，这个参数不使用等号（=）——它在这一点上有点另类。切勿将此值设置得高于你可用的 RAM。当你的程序分配的内存超过
    `-Xmx` 堆最大值时，就会出现内存溢出错误。堆外部的额外 RAM 也可以被使用，正如 JSR-107 的实现者所做的那样：


    [`https://www.jcp.org/en/jsr/detail?id=107`](https://www.jcp.org/en/jsr/detail?id=107)


    然而，这超出了这本小书的讨论范围。


    JVM 的垃圾回收器实际上只是一个回收器。一旦你的 Java 程序使用完一个变量，GC 就会通过使底层内存可用于后续变量声明来丢弃它。GC 需要花费工作来识别你的应用程序仍在使用的变量（和内存），以确保它们不被丢弃。当我说“工作”时，我的意思是它会消耗
    CPU 并导致一些处理速度变慢。


    GC 算法是可高度配置的，它们依赖于各种精心调整大小的内存分区来高效地完成此回收过程。当某些分区大小不合适时，就会导致最终用户感受到速度变慢。


    有许多不同的 GC 算法可供使用，JVM 启动参数决定了给定 Java 进程使用哪一种。尽管 GC 算法的描述随处可见，但这 somehow 并不能转化为快速评估
    GC 性能是否健康，以及低效问题是否出在我之前提到的两个主要堆分区——“老年代”或“新生代”的能力。所有现代 GC 算法都将堆分为老年代和新生代，并对每个代采用不同的管理方法。


    Oracle 的这份文档提供了所有 GC 算法的详细信息：


    [`http://www.oracle.com/technetwork/java/javase/tech/index-jsp-140228.html`](http://www.oracle.com/technetwork/java/javase/tech/index-jsp-140228.html)


    ### 使用 jstat 即插即用的 GC 指标


    我在其他地方提到过，如果指标不容易获取，那么性能问题往往得不到解决。这就是为什么我依赖 `JAVA_HOME/bin/jstat -gc` 从任何正在运行的
    JVM 中捕获指标——无需添加 JVM GC 参数，无需重启 JVM 并重现问题。只需传入 Java 进程的 PID 并查看数据即可。该工具会汇总你在指定时间间隔内的所有指标。我告诉
    `jstat` 使用 1 秒（1s）的间隔，如下所示：


    ```

    # jstat -gc  1s

    ```


    是的，这些数据更容易检索，但清单 12-1 的呈现方式并不吸引人，而且很少有工具能根据这种格式创建图表。看起来数据已经很多了，但还有更多！我从这张图片的左侧裁剪掉了五列。


    ```

    YGCT   FGCT

    -----  -----

    1.719  1.028

    1.721  1.028

    1.724  1.028

    1.728  1.028

    1.734  1.028

    1.738  1.028

    1.744  1.028

    1.748  1.028

    清单 12-1.

    来自 JAVA_HOME/bin/jstat 的数据，每秒新增一行数据

    ```


    最终，我们需要以某种方式从这些数据中提取出 GC 开销指标，用于前面讨论的红-黄-绿标度，并且我们需要同时针对新生代和老年代的数据。幸运的是，新生代和老年代各有一列：分别是
    YGCT 和 FGCT，它们的文档在这里：


    [`https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html`](https://docs.oracle.com/javase/8/docs/technotes/tools/unix/jstat.html)


    但还有一个难题需要处理：这两列中的每一行都显示自你启动 `jstat` 以来累积的 GC 时间。相反，我们需要的是每个 1 秒间隔内发生的 GC 时间，这将使我们能够轻松计算平均值。


    我编写了一个四行的 awk 脚本来解决这些难题。该脚本只选择我们关心的两列（清单 12-1 中高亮显示的那些），并且它还计算了每一行之间的差值。


    此链接中的 readme.txt 文件包含了关于 `gctime` 脚本的所有详细信息：


    [`https://github.com/eostermueller/littleMock/tree/master/gctime`](https://github.com/eostermueller/littleMock/tree/master/gctime)


    有趣的是，假设你只有来自 `jstat` 的、间隔为 1 秒的标准输出，就像你可能从运维团队那里得到的那样。你可以通过使用该链接中的（几乎微不足道的）awk
    脚本对标准输出文件进行后处理，来获得正确的 `gctime` 输出。


    让我们使用 `gctime` 进行一些调优。以下两个示例都从清单 12-2 中的 GC 参数开始，这意味着堆被平均分成两半：512MB 老年代，512MB
    新生代。为简洁起见，我没有显示 `pom.xml` 文件中包围每个参数的 `<argument>` XML 标签。此配置的结果如下面的清单 12-3 所示。


    ```

    -Xmx1g -XX:NewSize=512m -XX:MaxNewSize=512m -XX:+UseConcMarkSweepGC -XX:ConcGCThreads=4

    清单 12-2.

    为此示例在 littleMock 的 pom.xml 中设置的 GC 参数

    ```


    这些参数位于 littleMock 的 `pom.xml` 文件末尾附近（并且它们都被包裹在 XML 的 `<argument>` 标签中）。


    #### 使用测试键配置 littleMock 性能


    我们有两组性能示例，对吧？`jpt` 和 littleMock。使用 `jpt`，当你启动 `./startWar.sh 05b` 和 `./load.sh
    05b` 时，你会看到一个没有索引的非常慢的查询的性能。当你改用 05a 运行时，你会得到相同的测试，但索引已就位（性能更好）。传递给 `startWar.sh`
    和 `load.sh` 的测试 ID 决定了性能。


    littleMock 的 `startWar.sh` 和 `load.sh` 是不同的——它们不接受任何参数。要“拨入”特定的性能问题或优化，你需要在 littleMock
    网页上更改“性能键”或其他选项：


    ```

    http://localhost:8080/ui

    ```


    使用 `jpt`，我们仅限于 12 对测试。littleMock 性能键可以实现无数种性能测试场景的组合，这些场景可以一起共享和探索，以便我们针对非常具体的性能场景讨论最佳工具和性能补救措施。


    别忘了 Glowroot 是启用的——只需浏览到 `http://localhost:4000`。当 `./load.sh` 脚本正在运行时，你可以交互式地看到当你在
    littleMock 网页上点击选项时性能如何变化。

    '
- fmt: '### Optimizing Young Gen GC


    Listings [12-3](#A449023_1_En_12_Chapter.html#Par77) and [12-4](#A449023_1_En_12_Chapter.html#Par78)
    show `gctime` GC metrics before and after tuning. Before tuning, the young gen
    GC health is YELLOW because `dYGCT` (the left column) has 4%-5% overhead. After
    tuning, the young GC health is GREEN; about 1% GC overhead. (Output from `gctime.sh`.)


    ```

    dYGCT  dFGCT

    -----  -----

    0.047  0.000

    0.052  0.000

    0.054  0.000

    0.047  0.000

    0.052  0.000

    0.042  0.000

    0.043  0.000

    0.054  0.000

    0.07   0.000

    0.048  0.000

    Listing 12-3.

    Data from gctime.sh. GC Metrics Before Tuning

    ```


    ```

    dYGCT  dFGCT

    -----  -----

    0.010  0.000

    0.005  0.000

    0.011  0.000

    0.006  0.000

    0.010  0.000

    0.012  0.000

    0.005  0.000

    0.012  0.000

    0.005  0.000

    0.009  0.000

    Listing 12-4.

    Data from gctime.sh. GC Metrics after Tuning

    ```


    Listing [12-3](#A449023_1_En_12_Chapter.html#Par77), with New GC Health = YELLOW,
    was captured using a `littleMock` test key that simulates mostly stateless activity
    with little or no long-term cache. The scenario is basically an SOA system with
    no session management. Note that the `B65535` means that there are 64K allocations
    during each request, which are then discarded after each request—definitely work
    for the young gen collection process. Here is the performance key that was used:


    ```

    X2,J25,K25,L0,Q,R,S,A10,B65535,C0,D10

    ```


    The `NewSize` and `MaxNewSize` values both started out at 512MB. Bumping them
    both to 750MB brought this 4%–5% down to 3.5% (not shown). After further increases
    to 1.5GB of new space, I got just below 2% new GC overhead and GC Health was officially
    GREEN (also not shown). But just for grins, I increased the new space all the
    way to 3GB (Listing [12-5](#A449023_1_En_12_Chapter.html#Par82)) to lower overhead
    to 1%, as shown in Listing [12-4](#A449023_1_En_12_Chapter.html#Par78). All of
    these configurations had 512MB of old gen space.


    ```

    -Xmx3g -XX:NewSize=2500m -XX:MaxNewSize=2500m -XX:+UseConcMarkSweepGC -XX:ConcGCThreads
    =4

    Listing 12-5.

    GC Settings That Produced the Improved Results in Listing 12-4

    ```


    ### Optimizing Old Gen GC


    This next scenario starts with old gen GC health of RED. It simulates a large,
    ~500 MB cache that was not designed to expire—like sticking 500MB into a singleton,
    but inadvertently not allocating enough old gen in the JVM parameters for it.
    A scenario with a similar memory configuration is a very slow memory leak. Notice
    in Listing [12-6](#A449023_1_En_12_Chapter.html#Par84) that `dFGCT` (the right
    column) has greater than 100% overhead. `jstat`, how is this possible? Then, in
    Listing [12-7](#A449023_1_En_12_Chapter.html#Par85), the off-the-charts `dFGCT`
    metrics from Listing [12-6](#A449023_1_En_12_Chapter.html#Par84) came down to
    zeroes, with just 256MB added to the old gen.


    ```

    dYGCT  dFGCT

    -----  -----

    0.000  0.000

    0.000  1.413

    0.000  0.000

    0.000  1.932

    0.000  0.000

    0.004  1.604

    0.014  0.034

    0.050  0.034

    0.000  1.758

    0.000  0.000

    Listing 12-6.

    Data from gctime.sh. Before: Old Gen GC Health Is RED

    ```


    ```

    dYGCT  dFGCT

    -----  -----

    0.010  0.000

    0.008  0.000

    0.010  0.000

    0.009  0.000

    0.010  0.000

    0.009  0.000

    0.010  0.000

    0.008  0.000

    0.010  0.000

    0.008  0.000

    Listing 12-7.

    Data from gctime.sh. After: Health Is GREEN

    ```


    The data in Listing [12-6](#A449023_1_En_12_Chapter.html#Par84) was captured by
    first running with one test key that added garbage that would not expire for a
    long time—an hour, past the duration of my little test. The `C` and `D` parameters
    set the duration of how long to keep the objects around—and I set it to be more
    than an hour (3600 seconds in an hour, and tack on three zeros to convert to milliseconds
    to get `C3600000` and `D3600001`).


    To fill up 512MB of old gen space as described earlier, it took `littleMock` a
    few minutes of runtime with this performance key:


    ```

    X2,J25,K25,L0,Q,R,S,A4096,B100,C3600000,D3600001

    ```


    As I was running this key, I closely watched Glowroot’s JVM Gauge feature (Figure
    [12-1](#A449023_1_En_12_Chapter.html#Fig1)) to determine when the old gen part
    of the heap filled up.


    ![A449023_1_En_12_Fig1_HTML.jpg](A449023_1_En_12_Fig1_HTML.jpg)


    Figure 12-1.


    The Gauges part of Glowroot displays CMS old gen bytes used. Here we create ~500
    MB to simulate an in-memory cache of something and its effects on GC. This graph
    shows that my old gen is larger than 512MB. It isn’t very germane, but I still
    wonder how that happened.


    When the old gen got to about 500MB (between 10:49pm and 10:50pm in Figure [12-1](#A449023_1_En_12_Chapter.html#Fig1)),
    I applied the `A0` setting (Figure [12-2](#A449023_1_En_12_Chapter.html#Fig2)),
    probably right before poor `littleMock` started throwing out-of-memory errors.


    ![A449023_1_En_12_Fig2_HTML.jpg](A449023_1_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    `littleMock`’s `A0=0` setting that turns off Extra Garbage Collection


    Once `A0=0` was applied and the rising GC immediately and abruptly leveled out,
    I captured the overhead metrics in Listing [12-6](#A449023_1_En_12_Chapter.html#Par84),
    which are off the charts, with overhead that is over 100%. Dear `jstat`, how can
    one second duration (specified on the command line) contain more than a second
    of old gen activity, like the 1.x numbers in the `dFGCT` column of Listing [12-6](#A449023_1_En_12_Chapter.html#Par84)?
    I suppose it’s enough to know that the numbers are bad and need improvement.


    Ultimately, in `littleMock`’s `pom.xml` I added 256MB to the old gen, restarted
    `littleMock`, carefully put the roughly 500MB cache back in place, and used `A0`
    to turn off Extra Garbage Collection to bring the heap to steady state. The off-the-chart
    metrics from `gctime.sh` came down to zeroes, so we got GREEN GC health for the
    old gen; see Listing [12-7](#A449023_1_En_12_Chapter.html#Par87) for details.


    One moral of the story here is to triple check that your old gen has enough space
    to handle your big allocations, like this 500MB cache. Wouldn’t you be a little
    embarrassed if you were the last one in the room to find out there was a huge
    elephant sitting in the seat right behind you? This is the same thing. Also keep
    in mind that performance degrades when available heap space shrinks.'
