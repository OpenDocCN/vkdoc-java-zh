- fmt: '### The Second Issue: Uncached SELECTS to Static Data


    Test results:


    - Test 03a: 14,000 requests per minute

    - Test 07b: 10,400 requests per minute


    Metrics that you will need:


    - Total Time and Execution count for each SQL statement.

    - A few tools that provide this data: `Glowroot`, `JavaMelody`, `JDBC Performance
    Logger`


    Load test 03b is a lot slower than load test 03a, but why? To find out more, look
    at the `Glowroot` Queries page for 03b in Figure [9-7](#A449023_1_En_9_Chapter.html#Fig7).


    ![A449023_1_En_9_Fig7_HTML.jpg](A449023_1_En_9_Fig7_HTML.jpg)


    Figure 9-7. `Glowroot` query panel for test 03b


    Just as with the SELECT N+1 issue in test 07, there are no obvious slowdowns in
    the Time per Execution column, as there were in test 05 with the missing index.
    The response times of 5.1, 0.18, and 3.1ms are all very quick compared to the
    358.5ms for the unindexed query. So this means the DBAs did their job and there
    are no issues with individual queries—the first head of the serpent.


    On the surface, this looks very similar to the SELECT N+1, but there is one key
    difference—the `ACCOUNTS` and `HISTORY` tables from previous examples hold live
    data that could change at any second, and the `BRANCHES` table does not. Theoretically,
    that data holds static data that changes less than once a day—probably less than
    once a week. Here are the types of things that a branch table might hold: Branch
    Name and Street address, City, State, Postal Code, and so on. Since this data
    changes so rarely, caching it in RAM could really boost performance.


    I can imagine good reasons to be hesitant about using a cache, because operating
    on slightly stale data from a cache might cause problems. Say that a disgruntled
    employee needs to be immediately locked out of your system. You don’t want an
    out-of-date cache of user permissions to mistakenly allow entry. But we can have
    our cake and eat it too. We can use caches to make these user permissions perform
    better and we can also evict those caches on demand when it is critical that they
    are up-to-date. This link shows one example:


    [`http://blog.trifork.com/2015/02/09/active-cache-eviction-with-ehcache-and-spring-framework/`](http://blog.trifork.com/2015/02/09/active-cache-eviction-with-ehcache-and-spring-framework/)


    To avoid so many executions, the branch lookup code in the fast test (the a test)
    only occasionally incurs the overhead of the round trip to the database—just occasionally.
    The rest of the time, it pulls the results from an in-memory, hash table-like
    singleton—a cache—provided by [`http://www.ehcache.org/`](http://www.ehcache.org/).


    In the `jpt` repository at [`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting),
    look for this configuration file:


    ```

    warProject/src/main/resources/ehcache.xml.

    ```


    This controls how frequently the cache is emptied (aka, evicted), thus occasionally
    forcing your code to get fresh results using a full database round trip. By contrast,
    the code in the slow test incurs the overhead of the round trip for every single
    request. Take a minute to look at the slow and fast versions of the code in this
    package in the `jpt` repository:


    ```

    com.github.eostermueller.perfSandbox.cache

    ```


    Figure [9-8](#A449023_1_En_9_Chapter.html#Fig8), from the 03a test, shows the
    proof in the pudding. Now that the cache is in place, see how few queries there
    are to the `BRANCHES` table, as compared to the other three queries? There are
    just 25 in 2 minutes, compared to 35k-ish invocations of the other queries.


    ![A449023_1_En_9_Fig8_HTML.jpg](A449023_1_En_9_Fig8_HTML.jpg)


    Figure 9-8. `EHCache` has minimized the count of queries to the `BRANCH` table.
    See, just 25 in 2 minutes!


    I can understand why you might think the throughput is so high in some of these
    examples that any lessons learned would not apply to smaller loads. That is almost
    a fair criticism; I think that the artificially fast query response times in my
    examples make up for that. With more realistic, slower DB queries seen in production
    environments, all the problems I’ve highlighted in this chapter are significantly
    worse.


    ## JPA and Hibernate


    `JPA`, the Java Persistence API standard, and widely used implementations like
    `Hibernate` (`hibernate.org`) and `MyBatis` (`mybatis.org`) are in common use
    today. `JDBC` still executes under the covers, but the minutiae of `JDBC` and
    the drudgery of moving `ResultSet` data into Java objects is much easier.


    `JPA` is out of scope for this small book. If you’d like to learn more about `JPA`
    performance, consider the 2016 book *High Performance Java Persistence* by Vlad
    Mihalcea (self-published).


    But a brief suggestion can be helpful:


    - Spend the time to make sure your `JPA` code abides by Martin Fowler’s rule:
    “never do repeated queries on the same table” for a single server-side request.


    `JPA` provides a very helpful way to apply common approaches to `JDBC` access
    across a large code base. That is a good thing. However, I generally find the
    developers using `JPA` are so abstracted from knowing this size, shape, and count
    of SQL queries that execute under the covers, that performance suffers. `Hibernate`
    is very capable of proliferating the SELECT N+1 anti-pattern; be sure to flag
    it as a problem at your next code review—perhaps using `glowroot.org`.


    The following post will help you do that, especially the part about avoiding `Hibernate`’s
    “Batch-size=N” fetching strategy.


    [`https://www.mkyong.com/hibernate/hibernate-fetching-strategies-examples/`](https://www.mkyong.com/hibernate/hibernate-fetching-strategies-examples/)


    ## Don’t Forget


    From a high level, it seems that the lack of good, freely available SQL performance
    tools like `Glowroot` has kept this “too many database calls” problem from being
    addressed—that’s why this is the second head of the nasty persistence dragon,
    which Java developers always seem to miss. Even super-fast queries can drag down
    performance if your code executes them enough times.


    There are other promising open source tools available, like `Glowroot.org`, that
    provide similar `JDBC` metrics:


    [`https://github.com/sylvainlaurent/JDBC-Performance-Logger`](https://github.com/sylvainlaurent/JDBC-Performance-Logger)


    [`https://github.com/javamelody/javamelody/wiki`](https://github.com/javamelody/javamelody/wiki)


    [`http://www.stagemonitor.org/`](http://www.stagemonitor.org/)


    We have been writing chatty code for more than a decade. Perhaps the new visibility
    provided by these more mature monitoring options will make it easier to implement
    chunky database access strategies that perform significantly better. When an application
    has a long history of too many db calls, it''s really tough to change the culture.
    Setting good standards early on in a project seems like a promising start. Trying
    to keep SQL counts low without good metrics seems impossible. Work towards getting
    team-wide adoption of a good tool for SQL metrics.


    It is worth mentioning one more time that the results of the chunky vs. chatty
    tests are skewed because of my smoking fast database. In the real world, chatty
    strategies coupled with poor individual query response time are a perfect storm
    waiting to happen.


    ## What’s Next


    This chapter covered the first item in the P.A.t.h. checklist. Chapter [10](#A449023_1_En_10_Chapter.html)
    looks at troubleshooting the performance of all the back-end systems that your
    JVM connects to, referred to as Alien Systems. There is one important optimization
    discussed that almost every system needs—the chapter has a nice test on how much
    benefit it can provide, but it also highlights important security concerns that
    are frequently overlooked when implementing this optimization: data compression.'
