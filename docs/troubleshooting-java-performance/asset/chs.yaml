- '# 第二部分

  创建负载脚本与负载测试




  '
- "# 4. 负载生成概述\n\n在会议和其他讨论中，我们都曾短暂地担忧过你的产品能否处理生产工作负载。这就是性能焦虑。它就像一个巨大的、红色的不确定性气泡，笼罩在未发布的服务器端软件产品团队之上。\n\
  \n验证系统架构是否性能良好，是戳破这个巨大红色气泡的好方法，而本章将帮助你在软件开发生命周期（SDLC）的早期阶段就开始着手。\n\n本章提出了一个包含两部分计划的负载脚本创建方案，这对于理解你的应用程序在压力下的表现至关重要。计划的第一部分帮助你快速创建第一个脚本，以便你了解架构的性能。\n\
  \n本章的目标是：\n\n*   理解：可以使用一个非常基础、简洁、仅包含少量业务流程的负载脚本，来对系统架构进行负载测试。\n*   理解：调整架构级别的性能问题，可以如何为所有业务流程带来快速的性能提升。\n\
  *   理解：为了更真实地模拟生产业务流程，需要对负载生成脚本进行哪些增强。\n\n似乎开发和测试软件本身已经够难了，学习如何为负载测试生成负载还需要额外的工作。以下是负载测试中涉及的一些任务：\n\
  \n*   为负载生成器创建和维护脚本，以对被测系统施加压力。\n*   为你的数据库创建和维护生产规模的数据集。\n*   创建和维护负载测试用于登录被测系统的用户\
  \ ID 和密码。\n\n由于所有这些以及其他工作，对被测系统 100%的业务流程进行负载测试很少（如果有的话）能够实现。这根本不划算。我的备用方法是首先使用一个简单的**优先脚本**对基本架构进行负载测试，然后增强脚本以覆盖最关键的业务流程（**次要脚本**）。使用这两个脚本调整你的系统，能让你了解使被测系统其他业务流程达到性能要求所需的技术，只要这些流程基于大致相同的架构、库、容器、日志记录、相同的身份验证和授权机制等。\n\
  \n本章概述了为你的被测系统创建优先脚本和次要脚本所需的增强功能。优先脚本帮助你快速发现架构级别的性能缺陷。次要脚本则提供了更接近真实工作负载的模拟。但首先，你需要掌握一些增强负载脚本的基本技能。我们将在下一节中介绍这些技能，其中还包括对负载生成器的简要介绍。\n\
  \n## 负载生成器\n\n在第 2 章讨论适度的调优环境时，我们提到负载生成器基本上是一个网络流量生成器，用于查看你的被测系统能否承受类似生产环境的负载压力。可以手动组装脚本，但它们通常是通过“录制-回放”过程创建的。本节将讨论在初始录制和测试完成后，你通常需要做的所有增强工作。\n\
  \n性能问题可以在代码、数据或配置中修复，但负载脚本内部也有很多需要修正的地方，以便最好地模拟你的生产工作负载。\n\n### 关联变量\n\n在你对负载脚本所做的所有增强中，创建关联变量的使用频率最高，因此每个人都应该熟悉它。我们在负载生成器的脚本语言中创建这些变量。然后，你使用该变量来保存来自\
  \ HTTP 请求输出的特定数据片段，以便它随后可以作为输入参数或后续请求的 POST 正文内容被提交。\n\n这里有一个简单的例子：假设你使用浏览器在一个 Web\
  \ 应用中创建了一个新客户，并且该 Web 应用生成了一个新客户 ID（本例中为`custId=2360`）。然后你选择用一个新的街道地址来更新客户详细信息。“客户更新”URL\
  \ 看起来像这样：\n\n[`http://mybox.com/startCustUpdate?custId=2360`](http://mybox.com/startCustUpdate?custId=2360)\n\
  \n如果你使用负载生成器录制此过程，这个 URL 会被逐字录制并保存到你的脚本中。几天或几周后，当你再次运行此脚本时，使用这个特定的 custId 2360 将非常不合适，因为新的`custId`值已经被创建了。因此，我们不希望像这样硬编码的值被编码在脚本文件中。\n\
  \n所以，我们小心地用关联变量替换硬编码的值。你需要负责更新脚本，以便在响应中找到 custId=2360，将其存储在关联变量中，然后在后续的一个或多个请求中使用该变量。\n\
  \n我讲得比较快，所以表 4-1 总结了所需的更改。\n\n**表 4-1. 将系统中的硬编码 ID 转换为关联变量所需的增强**\n\n| 顺序 | 负载脚本行为（初始录制时）\
  \ | 添加关联变量所需的增强 |\n| --- | --- | --- |\n| 1 | 负载脚本调用某个 URL 来创建新客户。 | 无需更改。 |\n|\
  \ 2 | 前一个请求的响应返回给负载生成器，响应中的某处包含新生成的客户 ID 2360。 | 增强负载脚本，使其能够从 HTTP 响应中定位/抓取新创建的唯一客户\
  \ ID。将该值存储在负载脚本变量中；`CUST_ID` 是个好名字。使用 JMeter，你可以通过正则表达式提取器来实现。 |\n| 3 | 负载脚本提交一个\
  \ URL 来更新客户详细信息；录制的客户 ID 2360 作为 URL 参数传递： [`http://mybox.com/startCustUpdate?custId=2360`](http://mybox.com/startCustUpdate?custId=2360)\
  \ `.` | 增强脚本，使其不再传递硬编码的客户 ID 2360，而是传递存储在`CUST_ID`变量中的数字。 |\n\n这种关联变量技术可以而且应该用于更复杂的负载脚本，尤其是那些录制生成的脚本。对你来说，一个故障排除的技巧是，要精确找到脚本中需要应用该技术的位置。至少，你应该仔细考虑在脚本中的以下位置应用此技术：\n\
  \n\n\n*   如前所述，服务器端代码生成唯一 ID 的任何位置。\n*   在脚本录制过程中，你输入数据或选择某些选项的任何位置。\n*   应用程序中存储\
  \ HTML 隐藏变量的所有部分。\n*   任何其他位置，例如使用隐藏变量时，JavaScript 将数据从一个服务器端请求的输出移动到另一个服务器端请求的输入。\n\
  *   所有使用 CSRF 令牌（ [`https://stackoverflow.com/questions/5207160/what-is-a-csrf-token-what-is-its-importance-and-how-does-it-work`](https://stackoverflow.com/questions/5207160/what-is-a-csrf-token-what-is-its-importance-and-how-does-it-work)\
  \ ）的地方。这些不可猜测的令牌是动态生成的，并存储在 URL 参数中。它们使得恶意网页难以在你浏览器的一个标签页中，向另一个标签页中的其他站点（例如你的银行）执行请求。\n\
  *   使用 JMeter 时，关联变量对于 JSESSIONID 支持并非必需。相反，只需确保你的 JMeter 脚本有一个 Cookie 管理器。\n\n\
  重申一下，你需要负责找出需要添加关联变量的位置。从上面的列表开始，之后你的任务将变得繁琐：仔细评估每个 HTTP 请求是否返回了正确的数据，并在必要时添加此技术。另一种在脚本中定位关联变量位置的方法是，思考你在浏览器中输入的所有数据项：搜索特定的客户名称、选择要购买的特定商品、选择你想在单身酒吧看到的那只特别的海牛。\n\
  \n无论使用哪种负载生成器，关联变量对于应用真实的生产负载都至关重要。但如果你使用的是 JMeter，第 7 章将提供一个基于本书 github.com 仓库中的示例\
  \ JMeter .jmx 计划，创建关联变量的分步指南。请查找 `jpt_ch07_correlationVariables.jmx`。\n\n### 在负载脚本中对步骤进行排序\n\
  \n当你录制负载脚本时，你会登录到被测系统（SUT），浏览几个网页执行业务流程（例如前面详述的“创建客户”），然后注销。\n\n负载生成器允许你选择将录制的脚本播放一次、重复播放特定次数，或重复播放特定时长。在\
  \ JMeter 中，这些选项可以在一个名为线程组的东西中找到，你还可以在此处设置同时重放脚本的线程数。JMeter 自带的默认线程组对于基本任务来说已经足够，但我非常喜欢\
  \ Blaze Meter 的并发线程组。它有一个很好的可视化显示，展示你的线程将如何快速增加到满负载。你可以从 jmeter-plugins.org 下载它。\n\
  \n通常，你需要两组（或更多）用户同时执行不同的业务流程。编写这种脚本的一个不那么显而易见的方法是，为每个任务分别录制两个脚本，然后将这两个脚本合并为一个。要在\
  \ JMeter 中实现这一点，请在一个新的/空白的 JMeter 脚本中创建两个独立的线程组，并可以将它们命名为 A 和 B。\n\n然后分别录制并测试这两个负载脚本，并将一个脚本中的所有活动复制到\
  \ A 线程组，另一个复制到 B 线程组。\n\n这种组织方式有一些非常令人信服的理由。例如，它允许你为一个线程组设置更高的线程数（更多负载），而为另一个线程组设置更低的线程数，这使你能够（大致）反映最终用户在生产环境中使用的实际负载量。\n\
  \n此外，这有助于你模拟一个帮助两组不同人员协调活动的 Web 应用程序的行为。例如，假设一组人员创建小部件的订单，而另一组人员批准每个订单。实现一个重复创建订单的线程组相当直接。要实现另一个包含订单批准活动的线程组，首先编写一个重复检查新订单的脚本。包括\
  \ JMeter 在内的负载生成器，允许你添加条件测试，这些测试会在响应 HTML 中检查指示是否有新订单创建的标签或属性。一旦检测到新订单，你就可以添加录制的步骤来批准该订单。有关详细信息，请参阅\
  \ JMeter 的 If 控制器和 While 控制器。循环控制器以及设置和拆卸线程组也会很有帮助。\n\n掌握了这些负载生成器基础知识后，接下来的两个部分将阐述一个两步计划：“第一优先级”和“第二优先级”，这有助于你平衡快速创建负载脚本与创建能够相对真实地施加负载的脚本之间的冲突需求。\n\
  \n## 第一优先级脚本\n\n性能焦虑是真实存在的；思考这些难以回答的问题：在达到性能目标之前，我们必须修复多少个缺陷？这需要多长时间？我们是否投资了错误的\
  \ Java 架构，一个永远无法良好运行的架构？用这些充满焦虑且无法回答的问题来戏弄项目规划者有点有趣，不妨找个时间试试。\n\n第一优先级脚本有助于你快速上手，迅速修复一些最明显的性能缺陷，并缓解部分性能焦虑。本节提供了一个“必须具备”的负载脚本增强功能的最低检查清单，这些功能是让你和你的团队相信负载测试有效性所必需的。但同时，也要将“第一优先级”版本视为一个上限：一旦添加了这些第一优先级的增强功能，就停下来。专注于解决第\
  \ 8 章中 P.A.t.h.检查清单所揭示的主要性能缺陷。一旦你控制住了最大的问题，就可以跳到本章后面的第二优先级负载脚本增强功能，以完成工作，并提供出色的性能。\n\
  \n\n\n### 加载脚本与 SUT 登录\n\n第 1 章讨论的第三个性能反模式是“过度处理”。其中提到，试图对很少使用的业务流程进行负载测试和调优是浪费时间。相反，我们应该专注于最重要和最常用的流程。\n\
  \n在初次创建负载脚本时，很容易陷入这种情况：用户登录和退出系统的频率远高于生产环境中的实际情况。\n\n因此，**首要优先级**负载脚本的主要目标是确保脚本中的\
  \ SUT 登录活动在一定程度上符合实际，尤其是对于登录过程处理密集型的 SUT。\n\n我所说的密集型活动包括为用户会话创建资源、单点登录、授权数百个权限、密码认证等。登录过程越复杂，就越需要精心设计负载脚本来模拟真实的登录场景。为什么？因为调优一个不常执行的功能是浪费时间。\n\
  \n如果你没有来自生产环境的良好数据来了解登录频率（例如，与其他业务流程相比，系统范围内每小时发生多少次登录），你就需要做出判断。在大多数系统中，真实用户不会以\
  \ 1:2 的比例登录、执行两个业务流程然后注销。相反，他们在注销前会做更多工作。也许用户每执行 10 个其他业务流程才登录 1 次，这是一个更合理的比例。我这里的数据完全是粗略的——最终需要你来决定。\n\
  \n使用 JMeter，实现登录与其他业务流程大约 1:10 比例的一个简单方法是使用循环控制器（前面提到过），如下所示：\n\n1.  用户登录。\n2. \
  \ JMeter 循环控制器重复五次。\n    1.  业务流程 1（通常需要少量 HTTP 请求）。\n    2.  业务流程 2（通常需要少量 HTTP\
  \ 请求）。\n3.  注销。\n\n一旦你的脚本中 SUT 登录次数与其他业务流程相比大致符合实际，就可以开始施加负载，并使用 P.A.t.h.检查清单来发现缺陷。\n\
  \n### 在多个线程中使用同一个 SUT 用户\n\n本节中的建议可以在**首要优先级**或**次要优先级**负载脚本中实现——由你选择。我将它们放在这里，是因为它们也属于登录问题，与前面讨论的类似。\n\
  \n如果你的 SUT 不允许同一用户同时在两个不同的浏览器中登录，那么在负载测试中同时登录两个或更多并发用户时，就会导致登录失败。\n\n为避免此问题，你可以从文本文件中读取用户\
  \ ID 和密码，而不是在负载脚本中硬编码单个用户 ID。想象一个每行包含一个用户 ID 和密码的.csv 文件。以下是 JMeter 用于读取该文件的组件：\n\
  \n[`http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config`](http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config)\n\
  \n大多数负载生成器（包括 JMeter）都具有防止两个线程同时使用同一用户（实际上就是一行文本）的功能。默认行为通常是在读取/使用最后一条记录后，回到.csv\
  \ 文件的开头。你可以使用文本编辑器手动创建.csv 文件，也可以手动导出 SQL 语句（如`SELECT MY_USER_NAME FROM MY_USER_TABLE`）的结果。\n\
  \n使用更符合实际数量的用户还有其他动机。我们直说吧。内存泄漏和多线程缺陷让性能工程师们忙得不可开交，而会话管理代码通常充斥着这两种缺陷。使用单一的 SUT 用户\
  \ ID 进行负载测试（就像刚录制且基本未修改的负载脚本那样），无法充分测试 SUT 的会话管理压力。¹\n\n假设你的脚本仍然反复登录同一个用户。如果 SUT\
  \ 缓存了该用户的权限，你的命中/未命中比率会异常高（应用服务器启动时一次未命中，随后全是命中……），因为在负载测试运行时，同一个用户会始终留在缓存中。这意味着你的\
  \ SUT 将始终走快速代码路径，从快速缓存（而非较慢的数据库）加载用户权限，从而低估了实际的处理量。\n\n仅使用单个用户进行测试时，你还会错过了解维持大量用户会话所需内存量的机会。因此，务必估算一下任意时刻会有多少用户登录，并在负载测试中包含这么多用户。\n\
  \n最后，既然我们谈到了用户和会话内存，别忘了验证系统的自动注销功能是否正常。你可能需要制作一个负载测试的临时版本，并注释掉所有注销活动。运行测试，等待 30\
  \ 分钟左右（或 SUT 自动注销用户所需的时间），然后验证会话计数是否降至零。\n\n## 次要优先级\n\n为了全面准确地模拟业务流程和工作负载，你需要一个功能齐全的负载生成器，例如\
  \ JMeter。然而，正如我之前所说，大多数性能缺陷都可以使用我在“首要优先级”部分详述的少量功能子集来发现。当然，通过“次要优先级”的增强功能可以发现一些关键错误，但这类错误往往较少。这些缺陷也往往属于单个业务流程的一部分，而非整个\
  \ SUT 架构。\n\n以下各个负载脚本阶段展示了脚本增强的典型演进过程。每个阶段都列出了你可以进行的增强。\n\n### 负载脚本阶段 1\n\n在负载脚本阶段\
  \ 1，你刚刚录制了一个使用 Web 浏览器遍历 SUT 最新/最佳版本的负载脚本。当然，也可能是你正在处理一组手动收集的 SOA 请求。你已在脚本中添加了一些验证过程，以确保所有\
  \ HTTP/S 响应无错误，并包含一些关键的响应文本片段。脚本中还添加了一些关联变量，用于将单个数据项（例如生成的新客户 ID 或发货确认号）从一个 HTML\
  \ 响应的输出传递到脚本后续业务流程中某个需要它的网页。除此之外，几乎没有其他修改。\n\n#### 细节\n\n负载生成是一种录制-回放技术，它有点脆弱，就像大多数代码生成的东西一样。因此，请保留最近录制过程的完整、详细\
  \ HTTP 日志的备份；也许可以将最近的录制日志和负载脚本保存在源代码控制中。日志必须包含所有 HTTP 请求 URL、任何 POST 数据、HTTP 响应代码，当然还有\
  \ HTTP 响应文本。当后续对脚本的“优化”导致某些功能失效时，你可以回到原始、准规范的完整对话日志，找出问题所在。\n\n事实上，使用合适的负载生成器，对规范日志和出错的\
  \ HTTP 日志进行简单但非常仔细的文本文件差异/比较，就能直接引导你找到功能脚本的问题。第 7 章中有一个如何在 JMeter 中执行此操作的示例。请查找“调试\
  \ HTTP 录制”部分。\n\n\n\n#### 验证 HTTP 响应\n\n验证 HTTP 响应是否包含“正确”的响应数据至关重要。累积起来，我浪费了数周又数周的时间去分析和信任那些响应中充满错误（而我却毫不知情）的测试。因此，我恳请你花些时间来增强你的脚本，以便在缺少正确的\
  \ HTTP 响应时记录一个错误。此外，你还应该检查是否出现了错误的响应（例如异常、错误消息等）。\n\n关于 JMeter 的第 7 章展示了一个实现此功能的功能，称为断言。有各种各样的\
  \ JMeter 报告和图表可以显示错误计数。当你的 JMeter 断言标记出一个问题时，这些 JMeter 报告会反映出这些错误。如果没有这种基本的可见性，你也可能像我一样浪费数周的时间。\n\
  \n### 负载脚本阶段 2\n\n负载脚本在单个测试中记录多个不同用户的登录，而不是反复使用同一个用户。硬编码的主机名或 IP 地址以及 TCP 端口号被替换为变量，当你在不同环境中使用脚本时，可以更改变量的值。该脚本以生产环境中大致相同的比例执行业务流程。\n\
  \n#### 详细信息\n\n此脚本处理工作负载比例。为了获得更接近生产环境的工作负载，你需要增强负载脚本，以更真实的比例执行各种业务流程。从非常高的层面来看，对于许多目的而言，业务流程的划分是\
  \ 70% 的查询，30% 的更新/插入/删除。我们的比例常常不切实际，因为我们没有花时间从生产环境中收集高质量数据来了解每种类型的业务流程执行的频率。\n\n\
  但是，在全身心投入寻找生产环境中哪些服务使用最多/最少（并调整你的负载脚本以按这些比例施加负载）之前，我建议首先关注一个更不完美的方法，即你向所有服务施加三个或更多线程的负载（零思考时间）。这就是引言中提到的\
  \ 3t0tt。当然，我们这样做是为了从那个旧宿舍的沙发里抖出多线程的 bug。追求更精确和完善的负载比例能为你带来两方面的好处。其一，你避免了在永远不会使用的工作负载上浪费时间进行故障排除；其二，你发现了与首选的生产工作负载相关的兼容性/争用问题。当然，这两点都很重要，但根据我的经验，它们出现的频率明显低于多线程\
  \ bug，而即使使用不精确的负载比例，也能从那张可爱的沙发里赶走这些 bug。目标是正确的工作负载比例和负载脚本思考时间，但要从至少三个线程的零思考时间负载开始。\n\
  \n使用 JMeter，你可以通过为不同的脚本分配不同数量的线程来实现工作负载比例/百分比。例如，如果你想模拟前面详述的 70%/30% 的分割，你可以先录制两个独立的脚本，一个用于账户查询，另一个用于账户更新。对于这样一个简单的脚本，所有\
  \ HTTP 请求都存储在一个 JMeter 线程组下——你可以在其中指定要施加的负载线程数和测试持续时间。\n\n因此，要实现 70/30 的工作负载比例，你可以从一个包含两个空白线程组的空白脚本开始，这两个线程组在\
  \ JMeter 树形配置中是同级关系。在第一个线程组中，你可以分配七个线程，另一个线程组分配三个线程。然后，你将账户查询的所有 HTTP 请求复制/粘贴到有七个线程的线程组中，并将账户更新的\
  \ HTTP 请求复制/粘贴到另一个线程组中。\n\n这篇博文详细介绍了三种替代的 JMeter 方法来正确设置工作负载比例：\n\n[`https://www.blazemeter.com/blog/running-jmeter-samplers-defined-percentage-probability`](https://www.blazemeter.com/blog/running-jmeter-samplers-defined-percentage-probability)\n\
  \n### 负载脚本阶段 3\n\n负载脚本不再查询或修改录制脚本时使用的确切客户或账户，而是增强为从数据文件中读取账户/客户/其他标识符，然后将这些标识符输入到被测系统。\n\
  \n#### 详细信息\n\n在这个阶段，负载脚本从读取 .csv 文件中的用户 ID 扩展到读取 .csv 文件中的其他重要数据，例如客户和账户数据。但仔细想想，何必这么麻烦呢？我们很可能是在操之过急。在我们花时间增强负载脚本以使用\
  \ .csv 或数据驱动的样本施加流量之前，这些客户、账户和其他表中必须实际存在足够规模的数据。\n\n是的，本章是关于负载脚本的，但我忍不住要提醒大家，如果行数足够少，我的狗都有能力设计出性能出色的数据库。你几乎能想到的任何查询，在记录数少于大约一万条时都会表现得非常好。因此，当行数很少时，“性能自满”情绪会很高。\n\
  \n为了克服这种自满情绪，使用负载生成器脚本来驱动被测系统增长大表的行数似乎是个好主意。但不幸的是，在调优过程的这个阶段，被测系统通常非常慢，以至于即使让它运行很多小时，在它添加足够的数据之前，你可能都开始领退休金了。\n\
  \n如果是这种情况，可以考虑使用 JMeter 作为快速的 RDBMS 数据填充器。创建一个单独的脚本，使用 JMeter JDBC 采样器（图 4-1）：\n\
  \n![A449023_1_En_4_Fig1_HTML.jpg](img/A449023_1_En_4_Fig1_HTML.jpg)\n\n图 4-1.\n\n\
  JMeter 可以使用你的 JDBC 驱动程序执行 SQL。在我的 2012 年款 MacBook 上，这个文件用于在远不到 10 分钟的时间内填充了超过 200\
  \ 万行数据。这个文件 `loadDb-01.jmx` 可以在 jpt 示例的 `src/test/jmeter` 文件夹中找到。\n\n[`http://jmeter.apache.org/usermanual/component_reference.html#JDBC_Request`](http://jmeter.apache.org/usermanual/component_reference.html#JDBC_Request)\n\
  \n它应该启动多个线程，执行大量的 INSERT 语句（仔细排序以符合外键依赖关系），其 VALUES 取自随机变量：\n\n[`http://jmeter.apache.org/usermanual/component_reference.html#Random_Variable`](http://jmeter.apache.org/usermanual/component_reference.html#Random_Variable)\n\
  \n或者取自 .csv 文本文件：\n\n[`http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config`](http://jmeter.apache.org/usermanual/component_reference.html#CSV_Data_Set_Config)\n\
  \n关于如何快速获得生产规模表计数的这个小插曲就到此为止。让我们回到最初的讨论，即初始录制的负载脚本查询或修改来自一个或几个特定客户或账户的数据。你在脚本录制中使用的任何数据都硬编码在负载脚本文件中。查询客户\
  \ 101。更新账户 393900 的余额。“101”和“393900”存储在脚本文件中。\n\n现在你的表计数已经足够庞大了，你可以增强你的负载脚本，例如，基于\
  \ .csv 文件中找到的账号进行账户查询。因此，负载脚本文件中不再有 101 和 393900，这些值改为存储在 .csv 文件中。\n\n一个很好的起点是使用一个包含数万个不同账号的文本文件，文本文件中每行一个账号。这是负载生成器最常见的输入文件格式。但不要只停留在\
  \ .csv 文件中只有一列；这里有一些唾手可得的好处。如果你在 .csv 文件中添加第二列，包含相应的账户余额，你就可以轻松地增强负载生成器脚本，以验证被测系统是否为每次查询返回了正确的余额。\n\
  \n\n\n### 加载脚本阶段 4\n\n随着调优的深入，被测系统（SUT）会变成一个强大的数据生成器，重复的负载测试会向 SUT 的表中插入海量数据。别忘了密切关注不断增长的行数，原因可能出乎你的意料：\n\
  \n*   是的，不切实际的大表数量很糟糕，但表数量不足也同样糟糕。如果你的负载测试持续了 300 秒，每秒创建了 10 个订单，那么数据库中应该存在一些具体的证据。难道不应该有大约\
  \ 3000（300x10）条记录被插入，并且你可以通过 `SELECT COUNT(*)` 查询轻松验证吗？正如我之前提到的，请对你的加载脚本保持怀疑态度，并在测试前后捕获表计数，以证明实际工作已经完成。\n\
  *   确保表计数不会不合理地增长过大，导致性能不必要地下降。花时间与业务分析师（那些对客户数据和法规要求最有经验的人）合作，就数据保留要求及其对表计数的影响达成一致。如果你的实时主数据库必须保留十年的交易历史，请计算这相当于多少条记录。\n\
  *   制定一个计划，将表的大小保持在合适的范围内。当表变得不合理地大时，我们通常会恢复备份到已知的状态/大小，但这需要时间/管理/纪律来为备份文件获取磁盘空间，以及实际创建备份（并保持其更新）的时间。临时性的\
  \ `DELETE` 操作更简单，但可能非常慢，因为很少花时间为临时查询建立索引，而且任何临时性的操作听起来都不太好——这似乎是在不必要地引入变化和风险。是的，`TRUNCATE`\
  \ 更快，但我们在这里是为了用真实的表计数来验证性能。零是不现实的。\n\n## 保持怀疑态度\n\n我想给你一个小小的警告：请对自己和同事保持怀疑态度，质疑你的脚本生成的负载是否与生产环境中的负载相似。甚至可以在团队日程上留出一些时间，召开一次“加载脚本怀疑论”会议。当然，这需要大量的透明度、沟通和性能测试数据的共享。让我解释一下为什么这很重要。当我看到加载脚本在\
  \ SUT 上运行时，我那顶彩色螺旋桨帽上的螺旋桨会兴奋地、欢快地旋转起来。看看那些加载生成器线程，就像快乐的小机器人，在我的大型 Web 应用程序的页面间导航！多么有趣！外表看起来令人印象深刻。一个刚刚录制的加载脚本，包含数十个捕获的\
  \ URL/参数，看起来令人印象深刻。第一次看到脚本施加负载也令人印象深刻，繁忙的日志文件、吞吐量和 CPU 指标看起来确实令人印象深刻。\n\n但不要被愚弄。克制你的兴奋。检查错误。做一个持怀疑态度的、清醒的评估，判断所有这些“活动”是否真的接近生产环境的工作负载。如果你的加载脚本产生了单个的小结果，比如在数据库表中插入一行来表示一个完成的在线购物订单，那么请增强你的脚本以验证最终结果。即使没有错误和异常，你的脚本可能仍然没有返回正确的数据，例如账户查询的账户余额。\n\
  \n如果你的应用程序已经投入生产，也许可以将一些生产指标（如每个 URL 的点击次数）与负载测试期间捕获的指标进行比较。\n\n## 项目生命周期提示\n\n\
  开始性能测试的障碍可能很大。很多事情都需要大量时间：硬件采购和设置、SUT 的安装、监控工具的安装、JMeter 或其他加载脚本的创建、为 SUT 创建测试用户、增强数据库中的数据使其更像生产环境（尤其是行数），等等。仅仅列出这些就让我筋疲力尽，但请耐心听我说，因为我可以向你展示一些大多数人错过的绝佳机会。\n\
  \n不幸的是，在将 SUT 引入生产环境之前，进行全面的性能审查需要完成上述大部分准备工作。但请理解，你绝不能等到完美的、独角兽般的性能环境出现才开始调优。只需一个幸运用户（你）的流量，你就可以立即开始发现重大且有意义的性能缺陷，这些缺陷会降低生产环境的性能。这是我提到的其中一个机会：在任何你能找到的“无负载”环境中开始使用\
  \ P.A.t.h. 检查清单中的 P. 和 A. 项（P=持久化，A=外部系统），在这种环境中，只有少数人在悠闲地使用 SUT。所以，如果你准备好在不投入时间创建加载脚本的情况下让事情变得更快，请立即跳到第\
  \ 9 章和第 10 章。\n\n这就是 P.A.t.h. 中 P 和 A 大写，而 t.h. 小写的唯一原因。小写的部分仅用于负载测试——具体来说，它们在无负载环境中没有实际用处。在负载下，它们可以帮助调整同步，找到高\
  \ CPU 消耗者的确切位置，识别低效的垃圾回收，等等。大写的部分则同时适用于负载和无负载环境。从排版上看，大小写混合并不美观，但这或许能成为一个微妙的提醒：现在就开始使用\
  \ P. 和 A. 来发现性能缺陷。\n\n表 4-2 中过于简化的时间表展示了两位开发人员如何同时高效地处理性能问题。Java 开发人员 1 立即开始调优，而\
  \ Java 开发人员 2 则创建加载脚本。\n\n表 4-2.\n性能调优项目启动的 9 天粗略时间表\n\n| 天数 | Java 开发人员 1 / 任务\
  \ | Java 开发人员 2 / 任务 |\n| --- | --- | --- |\n| 1-3 | 使用 P.A.t.h. 检查清单中的 P. 和 A.\
  \ 部分，在“无负载”环境下探索性能问题 | 加载脚本 / V1：录制、参数化并测试。 |\n| 4-6 | 加载脚本 / V2：录制、参数化并测试。 | 加载脚本\
  \ / V1：使用它施加负载，使用 P.A.t.h. 检查清单定位缺陷。 |\n| 7-9 | 加载脚本 / V1：使用它施加负载，使用 P.A.t.h. 检查清单定位缺陷。\
  \ | 修复并部署性能缺陷。 |\n\n## 别忘了\n\n决定哪些脚本增强项获得最高优先级、哪些获得次优先级的理由相当直接。由于没有时间和金钱对所有业务流程进行性能测试和调优，即使你做了所有“正确”的事情，生产环境中仍然会出现性能问题。因此，作为后备方案，你应首先致力于调优整体架构，以便那十几个经过全面性能审查的业务流程成为如何编写既功能正常又性能良好的组件的蓝图。\n\
  \n许多人会问，考虑到代码库在更多代码变更后还需要再次进行性能测试，开发期间的调优是否值得。我同意这是一个小问题。然而，一个更重要的问题是：我们当前的架构是否会在预期的生产负载下崩溃和烧毁？这才是我希望得到答案的、经常被遗忘的问题，而本章中的“最高优先级”脚本正是回答这个问题所需的工具。\n\
  \n此外，修复一个架构层面的缺陷会影响大多数业务流程，这有助于最大化你的修复对性能的影响。当然，硬币的另一面是，某些属于次优先级的脚本增强项，对于稳定功能关键的业务流程的性能可能是必要的。你需要自行判断。也许你最关键的业务流程从一开始就应该同时获得最高优先级和次优先级的增强。\n\
  \n\n\n## 下一步\n\n正如本章所示，负载测试需要花费一些时间来准备和运行，因此我总是不太愿意放弃测试结果。但有时，结果错得离谱，别无选择。下一章将为你提供详细指南，说明何时应该接受并放弃测试结果。\n\
  \n脚注 1\n\n我所讨论的这种会话管理使用了以下接口：\n\n[`http://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpServletRequestWrapper.html#getSession`](http://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpServletRequestWrapper.html%23getSession)\
  \ `--` [`https://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpSession.html`](https://docs.oracle.com/javaee/7/api/javax/servlet/http/HttpSession.html)\n\
  \n"
- '# 5. 无效的负载测试


  性能调优可能变得相当复杂；只需想想环境中可能产生性能问题的各种位置：


  *   容器的配置（WebSphere 或 Spring Boot 等）

  *   网络

  *   操作系统

  *   硬件

  *   负载生成器


  不要让这些让你不知所措。为了最大限度地降低复杂性，我们开发人员应首先关注我们负责的部分——代码的性能。这就是“代码优先”方法。相当大比例的性能缺陷是“一次编写，到处运行”的问题，无论环境如何，这些问题都会存在。


  本章的目标是：


  *   了解大约六项检查内容，以确保你的负载测试生成的是健康、类似生产环境的负载。


  本章重点介绍那些会使你辛苦创建的负载测试结果无效的环境和其他性能问题。要绕过其中一些无效测试（通常由环境问题引起），需要一点创造力；让我们来看看。


  ## 网络问题


  在第 2 章中，我列出了影响网络性能的因素：


  *   防火墙

  *   作为安全措施运行的带宽限制软件（如 NetLimiter）

  *   HTTP 代理服务器（如果访问互联网）

  *   硬件——路由器、内容交换机、CAT5 等

  *   负载均衡器，尤其是其管理并发的配置


  每当其中一个或多个因素导致性能问题时，你的负载测试就是无效的，结果需要丢弃。我们很少拥有排查网络问题的工具、权限或专业知识，那么为什么一开始要费心呢？我建议在可能的情况下，设计测试以消除网络跳数。集成测试和其他更大的环境是最终了解完整网络性能的好地方。


  有时我会陷入困境，被迫使用某个我怀疑有问题的特定网段。如果你和我一样，没有解决网络性能问题的工具、专业知识（或权限），那么有一个选择：间接测量。假设你怀疑某个特定网段有问题。如果你对一个已知速度很快的静态网页施加负载，而响应时间却非常糟糕，那么你就遇到了问题。


  ## 容器问题


  我有资格写一本关于性能的书的原因之一，是我浪费了生命中无数小时来搞砸 JDBC 连接池和 Web 容器线程池的配置。


  这些池的一个好处（实际上有很多好处）是，如果你的 Java 应用因某种原因出现异常，它们可以防止操作系统或数据库卡死。池通过将线程或连接的数量限制在配置中设置的最大值来实现这一点。但如果上限配置得太低，池就会限制性能。了解上限是否设置得太低，应该是你持续关注的问题。


  关注正确的监控指标，会显示上限是否在不恰当的时候被触发，从而剥夺了系统宝贵的吞吐量。但请相信我，我知道这需要大量的工作，并且会分散你对主要关注点（代码优先）的注意力。一个简单的指导原则有助于避免所有这些情况：


  *   “在调优之前提高资源上限，在生产环境之前降低它们。”


  是的，我有点嫉妒早在 2006 年，Steven Haines 就在他的书《Pro Java EE 5 Performance Management and Optimization》（Apress,
  2006）中首次提出了提高所有上限的想法：


  [`https://www.amazon.com/Pro-Java-Performance-Management-Optimization/dp/1590596102`](https://www.amazon.com/Pro-Java-Performance-Management-Optimization/dp/1590596102)


  你也可以在他这篇在线文章中找到这个建议：


  [`https://www.infoq.com/articles/Wait-Based-Tuning-Steven-Haines`](https://www.infoq.com/articles/Wait-Based-Tuning-Steven-Haines)


  但我认为我的表述更简洁，所以你更有可能记住它。


  当我说提高这些上限时，我的意思是把它们提得很高，比如将 JDBC 连接池中的最大线程数和最大连接数都设置为 1999。


  我认为这里用一个例子会有所帮助。


  图 5-1 中的图表显示了随时间变化的并发用户数，这些用户将在针对配置了 8 秒休眠时间的 littleMock 服务器运行的 JMeter 负载测试中执行。littleMock
  是一个小型 Java 服务器端测试应用程序，我们将在第 8 章中进一步讨论。这是它的 URL：[`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)


  ![A449023_1_En_5_Fig1_HTML.jpg](img/A449023_1_En_5_Fig1_HTML.jpg)


  图 5-1.


  增量负载测试的配置，显示了在测试中施加负载的计划。这个线程组是 JMeter 的一个插件，可从 [`https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/`](https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/)
  下载。


  阶梯式的“爬坡”是增量负载测试的标志，性能工程师已经使用这种测试很多年了。每个“台阶”增加 40 个负载线程。在测试进行到 1 分 30 秒时，所有 160 个用户都将启动并运行。明白了吗？


  图 5-1 显示的是所谓的负载计划，我运行了两次。第一次，我使用了这里显示的配置。第一次测试结束后仅几秒钟，我将目标并发数从 160 改为 240，然后再次运行。因此，第二次测试不是每步
  160/4=40 个线程，而是每步 240/4=60 个线程。


  所有这些配置都在负载生成器端，也就是客户端。为了查看服务器端的线程数（活动线程数称为并发数），在图 5-2 中，我使用了 Glowroot，这是一个来自 glowroot.org
  的开源 APM 工具。


  ![A449023_1_En_5_Fig2_HTML.jpg](img/A449023_1_En_5_Fig2_HTML.jpg)


  图 5-2.


  两次背靠背增量负载测试期间的服务器端并发数。在左侧的测试中，负载生成器运行了 160 个线程，这里全部显示出来。右侧的测试运行了 240 个线程，但在上午 9:33
  之前不久，Spring Boot 中的 tomcat 最大线程设置将并发数限制为 200。注意




  图 5-2 显示的并发值大致在 0 到 200 之间，但纵轴只显示了 0 到 20，为什么会有这种差异？左上角的圆角矩形显示 maxThreads 的实际值是
  200。Glowroot 对纵轴进行了“自动缩放”，结果变成了 0-20。


  如果在右侧的测试中避免这个上限问题，其实很简单，只要遵循“调优前提高上限，上线前降低上限”的建议即可。由于被测系统（SUT）是 littleMock，它运行在
  Spring Boot 和 Tomcat 环境下，我只需轻松添加以下属性：


  ```

  server.tomcat.max-threads=1999

  ```


  到 `application.properties` 文件中，具体文档可参考：


  [`https://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html`](https://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html)


  别忘了对 JDBC 连接池设置也做同样的操作。最重要的是，在将应用部署到生产环境之前，你需要降低这些上限，以避免我之前提到的系统卡死或失控的情况。降低多少呢？降低到比生产环境中实际使用的线程数或连接数高出约
  25% 的水平。例如，如果负载测试显示（使用图 5-2 中的指标）你在生产环境中不会使用超过 240 个线程，那么将上限设置为 300（1.25×240）。


  因此，触碰到资源上限的负载测试是无效的测试，但现在你知道了如何轻松避免这个问题：调优前提高资源上限，上线前降低资源上限。


  ## 预热不足


  性能工程师们可能会无休止地争论，在进行稳态负载测试之前，系统需要预热多长时间才合适。5 分钟？15 分钟？对我来说，每个系统都不同。我会预热系统，直到其指标稳定几分钟。如果指标从未稳定，那么预热时间的长短就无关紧要了。在这种情况下，我会做的一件事是简化负载脚本，以隔离工作负载中导致混乱的那部分。


  所以，如果你在响应时间和吞吐量等指标稳定之前就进行性能评估，那么你看到的将是一个无效的测试。


  ## 硬件资源耗尽


  不言而喻，你的职责是确保在测试时系统有足够的 CPU/内存。请记住，人们很容易忘记检查这一点。同时，关注 CPU 的两个主要细分部分也很有帮助。内核 CPU（也称为系统
  CPU）是操作系统使用的 CPU 百分比。用户 CPU 是我们的 Java 和其他应用程序（包括数据库）使用的 CPU 百分比。有些人认为 0% 的内核 CPU
  是可以实现的。那当然很好，但我确实不知道如何实现。通常，如果内核 CPU 不超过用户 CPU 的 10%，就没有问题。所以，如果用户 CPU 是 75%，那么
  7.5% 或更低的内核 CPU 不会引发任何警报。当内核 CPU 远高于此比例时，就该请系统管理员介入了——因为这次负载测试很可能是无效的。在虚拟化环境中工作时，有时增加一两个
  CPU 可以解决这个问题。


  如今，从远程系统捕获指标要容易得多。将这些指标以图表形式直接显示在你的负载生成器中，是一个很好的温和提醒，让你关注它们。PerfMon 可以为你做到这一点。我们在第
  2 章中使用它来绘制单个进程 ID（PID）的 CPU 图表。以下是链接：


  [`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMon/)


  JMeter 插件 Composite Graph 甚至可以将 CPU（以及其他环境指标）与 JMeter 指标（如响应时间和吞吐量）显示在完全相同的图表上。


  [`https://jmeter-plugins.org/wiki/CompositeGraph/`](https://jmeter-plugins.org/wiki/CompositeGraph/)


  当你的测试耗尽了所有 CPU/内存时，你有几个选择。要么增加更多的 CPU/内存，要么使用 P.A.t.h. 检查清单来降低消耗。这个讨论从第 8 章开始。


  到现在为止，你可能已经发现我的方法之间存在一些重叠。在第 3 章中，三种类型的指标中，有一种是用来理解资源消耗的。在本章中，我指出过多的消耗会使测试无效。这两者之间没有细微差别——只是两次提醒你要关注资源消耗。


  负载测试中的功能错误也是如此。我在第 4 章关于负载脚本的部分提到过，这里在讨论无效测试时再次提及。我相信这个信息在两个地方都值得强调，但我想确保你知道这是对同一问题的两次引用。




  ## 虚拟化问题


  我喜欢虚拟化的理念——只要需要，就能创建一台新的“客户”机（当然，是为了负载测试）。但掌控全局的“父”虚拟机的性能指标，对我们这样的凡夫俗子来说，往往是禁区。如果无法获取这些指标，你又如何知道客户机是否健康呢？


  来自 Azul Systems 的 Gil Tene（[`https://www.azul.com/`](https://www.azul.com/)）给出了答案。他编写了一个名为
  jHiccup 的 Java 小工具。该工具基于一个有趣的问题：如果你让一个线程休眠特定的毫秒数，那么当整个操作系统经历暂停或卡顿（hiccups）时，这个线程会准时醒来吗？答案是否定的，线程不会准时醒来，而
  jHiccup 正是用来测量线程预期唤醒时间与实际唤醒时间之间的差异。


  请查看此链接以获取 jHiccup 的最新版本：


  [`https://github.com/giltene/jHiccup/releases`](https://github.com/giltene/jHiccup/releases)


  其主页在此：


  [`https://github.com/giltene/jHiccup`](https://github.com/giltene/jHiccup)


  下载并将发布的 zip 文件解压到一个新文件夹。然后 `cd` 到与 jHiccup.jar 相同的文件夹，并执行以下命令：


  ```

  java -javaagent:jHiccup.jar="-d 4000" org.jhiccup.Idle -t 30000

  ```


  控制台会看似挂起 30 秒（`-t` 参数）。完成后，它会创建一个类似图 5-3 的文件；该文件将位于当前文件夹，并命名为类似 `hiccup.170709.1303.20680.hlog`
  的格式。


  ![A449023_1_En_5_Fig3_HTML.jpg](img/A449023_1_En_5_Fig3_HTML.jpg)


  图 5-3.


  jHiccup 的输出。第三列 Interval_Max 显示在过去 5 秒间隔（第二列）内，你的操作系统被暂停的最大时间（毫秒）。最后测量的 0.573ms
  是 30 秒内的最长暂停时间。


  在引言中，我提到了对“即插即用”工具的需求，以便我们能更快地诊断和修复性能问题。jHiccup 就是一个很好的例子。是的，你确实需要下载一个 jar 文件，但除此之外，它非常简单易用。你不需要父虚拟机的安全/访问权限。你也不需要重启任何程序来捕获指标。


  要获取更详细的指标，比如实际的暂停时间而不仅仅是 Interval_Max 值，则需要更多工作（使用 jHiccupLogProcessor）。但只有当最大时间显示出问题时，才需要进行这项工作。就我个人而言，如果父虚拟机定期暂停我的客户机的时间超过
  2%，我就会担心。因此，如果图 5-3 中那些 Interval_Max 时间从当前的 0.573ms 经常性地增加到 100ms 或更多，那么我就会担心（100ms
  / 5000ms 间隔 = 2%），并会做两件事：


  1.  研究如何使用 jHiccupLogProcessor 来获取并绘制详细数据，而不仅仅是上述的最大值。  

  2.  将我的发现转告给有权访问所有性能指标的父虚拟机管理员。  


  jHiccup 的测量结果也对垃圾回收（GC）暂停很敏感。第 12 章将详细讨论用于评估 GC 健康状况的工具，但如果你需要另一个证据来证明 GC 暂停拖慢了速度，jHiccup
  就是你的工具。我上面的例子将 jHiccup 插入到一个名为 org.jhiccup.Idle 的空转程序中。你需要寻找另一种语法，将 jHiccup 插入到你正在调查其指标的
  JVM 中。


  这个故事的重点是，不健康的虚拟化基础设施是导致负载测试无效的另一个原因，其测试结果确实应该被丢弃。


  通常，只有当现有解释（或 P.A.t.h. 检查清单）无法解释特定性能问题时，我才会花时间收集 jHiccup 数据。


  ## 错误的工作负载问题


  本节将更详细地探讨性能反模式第 3 条：


  *   过度处理：系统正在执行不必要的工作，移除这些工作能带来可衡量的性能提升。一个例子是检索了过多的数据，而其中大部分数据都被丢弃了。另一个例子是在负载测试中包含了错误的、资源密集型的用例——一个在生产环境中很少使用的用例。


  我非常感谢那些花时间为应用程序复杂的边界情况创建数据和测试的开发人员。谢谢你们。我们确实需要这类测试和提醒，来展示我们对系统所期望的功能。


  话虽如此，如果只有少量此类边界情况会经过你的生产系统，那么用这些边界情况来猛攻你的系统（并试图调优它们）就是浪费时间。通常，这些边界情况会出人意料地突然出现。有一次，在一个系统的性能意外且严重下降后，我仔细检查了源代码控制系统，寻找任何意外的代码或其他更改。没有发现明显的问题。


  经过十天痛苦且毫无成果的故障排除后，我们重新评估了针对其中一些恼人边界情况的负载生成脚本，并发现了一个异常。问题不在于我们包含在负载生成脚本中的功能（这确实是需要注意的），而在于数据。


  我们发现，其中一个 HTTP 响应的平均字节数（如负载生成器所示）大约是其他响应的 10 倍。为什么这一个会比其他大这么多？结果发现，我们后端被测系统（SUT）上的一个设置被无意中更改了，它开始返回数百个非活动（且意外的）账户以及预期的活动账户的
  HTTP 查询结果。哎呀。对负载脚本各个部分的平均大小（以字节为单位）进行合理性检查对于发现低效问题非常重要，所以我在关于指标的章节中也提到了这一点——那里有一个很好的截图（图
  3-1），如果你需要一些细节来了解全貌的话。


  这个故事的寓意是，边界情况不仅出现在你选择包含在负载脚本中的功能里，也出现在系统的数据和其他地方。例如，当开启过多的日志记录（如 log4j）时，性能几乎总是会受到影响，而记录如此多的日志也可以被视为这些边界情况之一。有时问题就出在你身上。你发现了性能缺陷，部署了代码，运行了一些负载测试，然后又运行了更多的负载测试，直到你运行了“添加小部件”用例一亿次。如果这些重复的负载测试使得数据库中的记录数量高得极不真实，那么问题就出在你——负载生成器——身上。问题可能来自最意想不到的地方。


  所以，花点时间了解生产工作负载中的各种流量类型。如果你不确定每个业务流程的负载情况，你怎么知道负载测试中应该包含哪些功能？例如，如果你的账户存款流量中只有不到
  1% 包含超过 10 个项目（支票、现金），那么用来自镇上那家唯一还接受支票的披萨店的数千张支票来猛攻系统进行存款测试，就是浪费时间。我打赌他们还在听八轨磁带。


  这里有几点需要注意：


  *   不要浪费时间调优很少使用的用例。

  *   验证生产环境中的主要用例也包含在你的负载脚本中。如果你认为自己知道有哪些用例，你有什么数据可以说服别人？




  你在生产环境中常见的大部分性能缺陷，即使只运行一个业务进程并施加少量线程负载（例如 3t0tt），且系统中不包含任何其他业务进程时，也能被发现。因此，我认为“单一业务进程”负载是一种“有效”的测试，即使它并不包含生产工作负载中的所有业务进程。


  当然，偶尔也会出现这样的情况：只有当两个特定的业务进程在同一工作负载中运行时，你才能复现某个性能缺陷——比如两个进程对关系型数据库表中同一行数据进行读写操作，例如“查询订单状态”和“更新订单状态”。许多应用程序使用表来监控工作流中某个进程的状态。这些情况也必须一起进行负载测试。


  最后，我想通过提及一些其他需要注意的处理类型来结束本节关于“错误工作负载问题”的讨论。有时，当你在某台机器上进行负载测试时，那台机器并非 100% “属于你”。自动安装程序在后台运行，备份任务意外启动，谁知道病毒扫描程序何时会介入。


  如果你怀疑存在任何这些问题，不要满足于仅显示 CPU 或 CPU 核心级别 CPU 消耗的传统 CPU 指标。相反，请花点时间，像我们在第 2 章中对适度调优环境所做的那样，使用
  PerfMon 查找并绘制每个 PID 的 CPU 消耗图。


  [`https://jmeter-plugins.org/wiki/PerfMonMetrics/#Per-Process`](https://jmeter-plugins.org/wiki/PerfMonMetrics/#Per-Process)


  ## 负载脚本错误


  在进行性能调优时，你总会遇到一些有趣的问题（我妻子说我本人就是一个有趣的问题）。为什么在（似乎）什么都没改变的情况下，性能反而变差了？为什么这两个指标相互矛盾？同样，当你试图找出导致
  JVM 进程死亡的全面灾难性故障的原因时，你得像准备一顿丰盛的午餐一样做好充分准备——这其实也挺有趣的。与这类问题“搏斗”正是我的乐趣所在。但是，被平凡的功能性故障拖累，就没那么愉快了。


  事实上，由于乐趣太少，忽略功能性错误不幸地成了我的第二天性。我经常对自己说：“我在录制负载生成脚本时没有看到任何错误，那么当我重放同一个脚本时，怎么可能会有问题呢？”


  几年前，我们曾苦苦寻找性能如此糟糕的原因。我当时正在重构一个负载脚本，让它从一个 .csv 文件中读取用户名和密码（它们是测试密码，真的，千真万确），这样我的负载生成器脚本就不会让每个线程都使用完全相同的用户登录被测系统。我们想知道
  SQL 缓存代码是否在工作（并且性能良好）。重构脚本后，负载测试成功登录了数百个用户（至少我是这么认为的），响应时间快得惊人，吞吐量翻了一番（或者翻了三倍？）。我向团队宣布了这个好消息，随后大家庆祝了一番。


  但实际情况是，我忘记在我新创建的 .csv 数据文件中为用户 ID 添加正确的两个字符前缀，结果没有一个用户成功登录，我编写的所有业务进程也都没有得到实际执行。当我纠正了数据文件中的用户名后（唉），我们原来糟糕的性能又完全恢复了。没错！性能测试中充满了这种苦乐参半、令人怀疑的“胜利”。因此，我实际上一直在对大量的系统故障进行负载测试，这当然不是我们核心关注点的优先事项。


  所以，请从我的错误中吸取教训，花时间增强你的负载脚本，不仅要检查每个 HTTP 或其他被测系统响应中的功能性错误，还要确保出现了正确的响应。我会重复这一点，因为它非常重要：你的负载脚本必须检查常见错误（如“exception”、“error”及其他错误消息文本）的缺失，同时也要检查预期结果的存在，例如查询时的账户余额，或创建订单时生成的唯一
  ID。理查德·费曼曾说过：“首要原则是你不能欺骗自己——而你自己是最容易被欺骗的人。”


  让对性能结果的怀疑精神成为一项团队活动，这将建立团队在整个调优过程中的信心。错误计数应该获得与吞吐量和其他指标同等的首要关注。


  一位评论员曾这样评价皮克斯动画电影《机器人总动员》：


  “这些机器人，通常被认为没有情感的生物……必须说服观众它们拥有灵魂和个性。”


  作为性能工程师，我们的工作是说服我们的听众（我们的开发/QA 团队和我们的客户）相信负载测试是真实的，相信负载测试对被测系统施加的压力与生产环境中的压力非常相似。为什么？这样团队才会有动力去修复出现的任何性能问题。有时，我对负载测试结果非常怀疑（实际上，只是害怕所有可能的尴尬），以至于我会去清点被测系统重要关系型数据库表中的行数。通常，我会选择那些变化最大、最大的表。然后，我会确保测试前后的表计数与负载生成器报告的吞吐量结果一致。例如，假设负载生成器报告在一个
  300 秒的测试中，每秒执行了 10 个“创建新账户”进程。测试结束后，我会确保账户表中的记录比测试开始前多了大约 3000 条。


  你可能会认为，通过让负载生成器记录所有线程的完整 HTTP 请求和响应，可以检测和管理来自被测系统的这类错误。我知道我曾经也这么认为。第 7 章将展示，过多的负载生成器日志记录会扼杀负载生成器的性能，并扭曲整个测试的结果。这种程度的详细日志对于排查单个线程回放的问题非常宝贵，但在其他情况下则会碍事。


  当你的负载生成器统计测试结果、区分良莠、甄别成功与失败时，大多数负载生成器都提供了一种方法，让我们可以指定哪些被测系统响应表示错误。我强烈建议同时使用这两种技术来标记错误。第
  7 章将向你展示如何：


  *   因为 HTML 响应中缺少重要部分（如余额查询中的账户余额）而标记错误。

  *   当 HTML 响应中出现异常文本时标记错误。

  *   提供错误出现次数和时间的概览。


  要添加多少验证取决于你。我希望前面的小故事能说明验证不足的问题是多么频繁地发生。但是，添加过多的验证会占用本可用于优化代码的时间。过多的验证也可能导致负载生成器性能下降。例如，在单个页面上验证
  20 个不同的数据项对于性能测试来说可能过于冗余（但对于功能测试来说是合理的）。我在使用一台现代桌面级机器，每秒处理 1000 个请求时，对每个 HTTP 响应验证
  3-5 个数据项，从未遇到过负载生成器开销方面的问题。如果你在这种负载量下已经压垮了负载生成器的 CPU/内存，那么这个问题就值得你花时间去解决。


  当负载测试应用 3t0tt 时，它是在施加三个线程的负载且零思考时间。根据我的经验，这足以暴露多线程代码中的大部分错误。这类问题的典型特征是出现少量但持续不断的错误。如果你的测试经常出现各种功能性错误，那么你检测多线程错误的能力就会减弱或完全丧失。目标是让你的负载测试中零错误。




  ## 别忘了


  想象一下，一场高考的试卷字体小到连年轻考生都全程在桌上眯着眼，根本无法看清那些微小的印刷字。我们会说这是一场无效的考试，任何头脑正常的人都不会去看学生的成绩，更不会据此做出改变人生的大学录取决定。这里的教训是：丢弃无效测试的结果。


  同样，在根据负载测试结果做决定之前，你必须先评估测试是否有效，是否足够接近生产环境中的条件。本章探讨了若干标准，根据我的经验，这些标准会导致测试无效。在依据任何性能测试的结果采取行动之前，都应仔细评估其有效性。


  ## 下一步


  你的系统能扩展吗？你上次检查是什么时候？第 6 章提供了一个具体且新颖的公式来测试可扩展性。它非常易于遵循，你可以每周每天都测量可扩展性，从而帮助缓解性能焦虑。这个测试被称为“可扩展性标尺”。


  '
- "# 6. 可扩展性标尺\n\n如今很少有系统能实现可扩展性，因为可扩展性测试运行得太不频繁了。本章展示了如何运行一个既快速又简单的可扩展性测试，你可以每周每天都运行它，为最终引导你的被测系统（SUT）走向可扩展性提供急需的指导。\n\
  \n本章的目标是：\n\n*   学习一个公式，以精确确定需要施加多少线程或负载，从而轻松看出你的系统离可扩展还有多远。\n*   学习如何识别测试数据何时表明你已复现了一个阻碍可扩展性的性能问题。\n\
  \n试图修复一个无法复现的缺陷是令人望而生畏的，性能缺陷也不例外。本章将引导你采用一种系统性的方法来复现那些阻碍系统扩展的缺陷。第 8 章我们将开始使用 P.A.t.h.\
  \ 检查清单来诊断和修复问题。\n\n可扩展性标尺是经典增量负载计划的一个变体，这个经典方法常常在性能最佳实践的记录中被遗忘。这个变体旨在精确地向我们展示需要施加多少负载，以及如何识别何时复现了一个问题——一个阻碍可扩展性的问题。\n\
  \n可扩展性是指系统在增加更多硬件资源时提升吞吐量的能力。这个定义准确而简洁，但同样令人痛苦地缺乏实用性，尤其是当你像大多数技术人员一样，正在寻找如何让系统实现扩展的具体指导时。\n\
  \n为了填补这一空白并提供一些方向，我使用了以下我称之为“可扩展性标尺”的负载测试：\n\n1.  运行一个增量负载测试，包含四个相等的负载阶梯，第一个阶梯将应用服务器\
  \ CPU 推至约 25%。\n2.  当这个测试产生四个方正、棱角分明的吞吐量阶梯，且最后一个阶梯将 CPU 推至 100% 时，被测系统（SUT）就是可扩展的。\n\
  \n让我们先看看如何使用负载生成器为标尺创建一个负载计划，然后我们将讨论可扩展性实际上是如何工作的。解释这种方法需要一点时间，但做过几次之后，它就会变成你的第二天性。\n\
  \n## 创建可扩展性标尺负载计划\n\n可扩展性标尺指出，你的第一个负载阶梯需要让被测系统（SUT）消耗约 25% 的 CPU。需要多少线程的负载才能达到 25%？你需要运行一个快速测试来找出答案。这本质上是在将标尺校准到被测系统（SUT）和当前环境。\n\
  \n图 6-1 所示的 JMeter 测试计划提出了一个问题：“在这 10 个阶梯中，被测系统（SUT）的 CPU 消耗会在哪一个达到 25%？”\n\n![A449023_1_En_6_Fig1_HTML.jpg](img/A449023_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1.\n\n用于查看需要多少线程负载才能将应用服务器 CPU 推至 25% 的 JMeter 负载计划\n\n以下是执行此操作的一些简要说明：\n\n\
  1.  从 jmeter.apache.org 安装 JMeter。\n2.  使用以下两种选项之一安装并发线程组：\n    1.  通过从 [`https://jmeter-plugins.org/install/Install/`](https://jmeter-plugins.org/install/Install/)\
  \ 下载一个 jar 文件到 JMETER_HOME/ext 目录，将插件管理器安装到 JMeter 中。重启 JMeter，然后从“选项/插件”菜单中选择“自定义线程组”。\n\
  \    2.  直接从 [`https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/`](https://jmeter-plugins.org/wiki/ConcurrencyThreadGroup/)\
  \ 下载 zip 文件……并将内容解压到 JMETER_HOME/lib 和 lib/ext 文件夹中，保持 zip 文件中的目录结构。\n3.  重启 JMeter。\n\
  4.  使用图 6-2 中的菜单选项添加并发线程组。\n\n    ![A449023_1_En_6_Fig2_HTML.jpg](img/A449023_1_En_6_Fig2_HTML.jpg)\n\
  \n    图 6-2.\n\n    将并发线程组添加到新的 JMeter 负载计划中。\n5.  在图 6-1 中设置 10-10-10-1 选项。\n\n\
  图 6-3 显示了这次简短校准测试的结果，或者至少是它的最开始部分。当测试进行到 10 个阶梯中的第二个时，我已经看到了足够的信息，于是停止了它。\n\n![A449023_1_En_6_Fig3_HTML.jpg](img/A449023_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3.\n\n发现需要多少线程才能将 CPU 推至 25%。这个包含两个不同指标（CPU 和活跃线程）的图表是通过 Composite Graph 和\
  \ PerfMon 实现的，这两个工具都来自 jmeter-plugins.org。学习如何在关于 JMeter 的第 7 章中使用它们。\n\n图 6-1 中的负载计划显示，每个负载阶梯应持续约\
  \ 60 秒，事实也确实如此。我们之所以知道这一点，是因为黑线（位于“随时间变化的活跃线程”下方）在 Y 轴上的值为 10 并持续了 60 秒，然后在测试的剩余时间里值为\
  \ 20。此图表的自动缩放功能有点令人困惑。图例中显示的 (x10) 意味着图表上的 10 和 20 被放大了 10 倍，实际值是 1 和 2，而不是 10 和\
  \ 20。\n\n图 6-3 中的黄线显示，第一个负载线程将 CPU 推至约 15%，第二个线程（在 60 秒标记处）将 CPU 推至约 28%。测试的全部目的是将被测系统（SUT）推至至少\
  \ 25%，因此我在首次达到 25% 的那个阶梯之后停止了负载生成器。校准完成。\n\n标尺要求“四个相等的负载阶梯，第一个阶梯将 CPU 推至约 25%”。由于两个线程将被测系统（SUT）推至约\
  \ 25% 的 CPU，因此 2 就是标尺中四个相等阶梯中每个阶梯的大小。我们现在掌握了足够的信息来创建我们的标尺负载计划。\n\n\n\n### 解读结果\n\
  \n校准测试已完成，现在你知道需要多少负载线程才能将被测系统（SUT）的 CPU 消耗推至约 25%。我从校准测试中取出了结果“2”，并将其放入负载计划中，创建了一个步进为\
  \ 2-4-6-8 的可扩展性标尺测试。每分钟增加两个负载线程；在 4 分钟测试的最后一分钟，有八个线程在运行。当你的负载脚本单次迭代耗时（例如）少于 10 秒且思考时间为零时，在每个负载级别停留\
  \ 1 分钟是可行的。这是一个非常粗略的指导原则，旨在确保你的脚本在每个负载步骤中至少重复数次（本例中为六次）。\n\n图 6-4 显示了测试结果。这部分需要稍加思考，请做好准备：图例（截图顶部）中的\
  \ x100 意味着黑色线条上的数值 200、400、600 和 800 实际上代表 2、4、6 和 8 个负载生成器线程。这是由 jmeter-plugins.org\
  \ 的自动缩放功能导致的。更多详情请阅读此处：\n\n![A449023_1_En_6_Fig4_HTML.jpg](img/A449023_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4.\n\n蓝色线条显示了由可扩展性标尺生成的、呈方形阶梯状的吞吐量，这意味着该系统具备可扩展性。为了生成此图，吞吐量指标被添加到了图 6-3 中使用的同一个图形组件中。\n\
  \n[`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)\n\
  \n可扩展性标尺旨在找出被测系统在 CPU 消耗为 25%、50%、75% 和 100% 时的吞吐量，图 6-4 展示了这一点。蓝色线条显示这四个吞吐量里程碑（大致）为每秒\
  \ 1800、3300、4200 和 5100 个请求。由于四个步骤中的每一步都生成了一个漂亮的方形吞吐量块，因此这个特定的被测系统调优得非常好。\n\n相比之下，图\
  \ 6-5 展示了一个存在性能缺陷的被测系统。看到原本方形的阶梯状负载是如何被软弱无力的、摇摇欲坠的吞吐量所取代的吗？\n\n![A449023_1_En_6_Fig5_HTML.jpg](img/A449023_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5.\n\n这里使用了与图 6-4 相同的图形配置，但我引入了一个性能缺陷（我认为是较高的 GC 时间），使得方形的阶梯状消失了。这就是系统不具备可扩展性时的表现。\n\
  \n对于那些对将 CPU 推至 100% 犹豫不决的人，如果不这样做，我们又如何能发现系统在额外 CPU 可用时是否能够利用它呢？我们知道将 CPU 推至 100%\
  \ 不会损坏机器，因为杀毒软件对桌面工作站 CPU 这样做已经十年了。\n\n以下是其他几位 Java 性能领域作者的一些引述，表明这种方法走在正确的轨道上，尤其是关于将\
  \ CPU 推至 100% 的部分：\n\n> “目标通常是让处理器保持完全利用。” ——《Java 并发编程实战》，Brian Goetz 等（Addison-Wesley,\
  \ 2006），第 240 页\n> “对于一个行为良好的系统，吞吐量最初会随着并发用户数的增加而增加，同时请求的响应时间保持相对平稳。” ——《Java 性能》，Charlie\
  \ Hunt, Binu John（Addison-Wesley, 2011），第 369 页\n\n由图 6-4 中的黑色线条驱动，标尺中的四个步骤中的每一个都相当于要求被测系统进行跳跃。蓝色吞吐量线中的四个阶梯表明，被测系统对每个负载步骤都做出了跳跃响应。请务必注意，每一步都需要一个漂亮的方形\
  \ CPU 消耗（黄色）阶梯/跳跃。当负载生成器发出跳跃指令时，被测系统就跳跃了，只有经过良好调优且可扩展的被测系统才会如此跳跃。\n\n在可扩展性标尺的四个\
  \ CPU 里程碑中，我们最关心的是 100% 这个里程碑。我们最终想知道的是，当负载生成器施加额外的吞吐量步骤时，被测系统是否能够利用这个 CPU 的 100%\
  \ 以及随后添加的所有 CPU 的 100%，以产生越来越多的吞吐量跳跃。这就是可扩展性。\n\n让我们快速看一个如何使用这些数字的例子。假设我们的客户正在从别人的系统升级到我们的系统。他们之前系统在高峰时段的数据显示，客户需要达到每秒\
  \ 6000 个请求（RPS）。\n\n让我们使用图 6-4 中可扩展性标尺测试的图表。它显示我们遇到了麻烦——图中的 5100 RPS 有点不够，因为在达到客户\
  \ 6000 RPS 的目标之前，我们的 CPU 已经用完了。该怎么办？我们需要做不可能的事——将 CPU 消耗从 100% 推到 101% 甚至更高。这就像有人希望他们汽车收音机的音量旋钮能超过最大刻度\
  \ 10，达到 11 一样。\n\n要达到 6000 RPS，我们必须添加更多机器来分担负载（形成集群），并使用负载均衡器在机器之间分配负载。或者，我们可以为原始机器添加额外的\
  \ CPU。这是经典且强大的可扩展性概念。\n\n当单台机器上的应用程序能够逐步将 CPU 的每一个比特转化为可观的吞吐量时，很容易看出，一旦提供了额外的 CPU，它也能够利用它们。\n\
  \n图 6-5 描绘了没有方形阶梯状步骤的系统——这是一个不具备可扩展性的系统。如果没有进一步的调优，它就没有扩展的希望，因为无论施加多少负载线程，吞吐量都无法接近\
  \ 6000。\n\n如果增加更多用户无法带来额外的吞吐量，那么系统就无法扩展。这就是这里的教训。\n\n## 不完美但至关重要\n\n我永远不会忘记这个关于调优的痛苦故事。在经历了\
  \ 12 周艰苦卓绝、长时间的工作，试图为一个要求特别苛刻的客户达到前所未有的吞吐量之后，我们被打败了，筋疲力尽。拥挤且空气污浊的会议室里一片寂静，你甚至可能不知道我们实际上在庆祝，但我们确实在庆祝——只是太累了，兴奋不起来。系统终于扩展了，或者至少我们认为是这样。硬件翻倍使吞吐量翻倍——这很好。硬件增加三倍使吞吐量增加了三倍，但可扩展性到此为止，之后安静的会议室又忙碌起来。没有人预测到这个问题，因为这个问题本身就无法预测。\n\
  \n可扩展性标尺测试，像所有预测工具一样，是不完美的；它无法预测未经测试的情况，就像这个（基本真实的）小轶事一样。但尽管可扩展性测试不完美，它们仍然至关重要。标尺衡量了所有可扩展系统的关键方面：在所有\
  \ CPU 消耗水平下产生均匀吞吐量阶梯的能力。没有这样的工具，我们就会在软件开发生命周期（SDLC）阶段及之后盲目摸索，对我们追求的目标——可扩展性——的进展一无所知。\n\
  \n回到那个拥挤的会议室，当时是有进展的。负载均衡器上配置的一个并发上限阻止了额外节点产生更多吞吐量。修复配置后，在我们的系统中添加第四个节点使吞吐量翻了两番，推动我们超越了艰难的目标，并展示了出色的可扩展性。\n\
  \n\n\n### 重现糟糕的性能\n\n如前所述，100% CPU 标志位对于展示可扩展性至关重要。其他三个标志位（25%、50%、75%）则作为小型断点测试，适用于那些性能不如图\
  \ 6-4 中 SUT 的应用程序——这意味着大多数应用程序。CPU 标志位精确地显示了重现性能问题所需施加的负载量。例如，假设在前两个负载增量（25% 和 50%\
  \ CPU）时，你得到了清晰规整的阶梯状步骤，但在第三个负载增量时，吞吐量不再攀升，CPU 仅达到 55%。恭喜。你已经重现了问题，这是“看清”问题的第一步。“看清”问题的第二步也是最后一步，是使用正确的监控工具查看正确的性能数据，正如从第\
  \ 8 章开始的 P.A.t.h. 章节所述。\n\n当一个看似强大的对手被一个较弱的挑战者击败时，头条新闻会迅速赞扬黑马，并羞辱被拉下王座的前冠军。同样，如果一个看似健壮的\
  \ SUT 在极少的负载线程下就暴露出巨大的性能问题，那么这确实是一个关键问题。重现性能缺陷所需的负载量越小，问题就越关键。因此，在 25% CPU 时重现的问题，比在更高\
  \ CPU 百分比下出现的同一问题要严重得多。不要忘记，你在缺陷跟踪系统中为问题指定的优先级和/或严重性，应该以某种方式反映这一点。此外，不必要的高负载量常常会引入其他问题（例如第\
  \ 5 章关于无效负载测试中讨论的并发上限问题），这会使本已困难的故障排除过程更加复杂。这里的教训是：只施加重现问题所需的负载量——任何多余的负载都会不必要地使问题复杂化。\n\
  \n一旦可扩展性标尺确定了从规整阶梯过渡到混乱状态所需的最小吞吐量，从而展示出性能问题，那么将标尺负载计划切换为稳态负载计划会很有帮助。然后你可以更改负载计划以延长测试持续时间——目标是提供充足的时间来审查\
  \ P.A.t.h. 检查清单，并开始从监控和追踪工具中捕获数据。\n\n一旦问题被识别并部署了修复方案，重新运行稳态测试可以为你的团队提供极佳的前后对比和令人信服的故事。如果系统变更使我们更接近性能目标（更高的吞吐量和/或更低的响应时间和/或更低的\
  \ CPU 消耗），则保留该变更，并通过重新运行标尺来查看下一个问题所在，从而开始新的循环。请记住，修复方案已经改变了性能格局，你可能需要通过重新运行标尺校准测试来重新校准标尺。\n\
  \n我们使用可扩展性标尺有两个目的：测量最佳吞吐量和重现性能缺陷。当“检测-重现-修复”循环都在单台机器/环境中进行时，单线程工作流会变得极其缓慢：开发人员被迫排队等待，以便在“黄金”环境上运行另一个测试，从而获得关于提议代码修复的反馈。因此，比较多个代码选项的性能变得不可行，因为对繁忙的黄金环境的访问需求很高。为了解决这个问题，最优秀的性能工程师擅长让开发人员能够独立工作，自行重现性能缺陷，也许是在他们自己的桌面上，甚至可能比较多种设计方法的性能。这是第\
  \ 2 章中讨论的适度调优环境的另一个好处。\n\n## 好的 CPU 消耗与坏的 CPU 消耗\n\n并非所有的高 CPU 消耗都是坏事，尤其是在可扩展性很重要的时候。事实上，如果构建可扩展系统是我们目标的一部分，那么我们应该积极推动系统实现吞吐量的飞跃，同时充分利用\
  \ 100% 的 CPU，至少在测试环境中是这样。当然，不贡献于吞吐量的 CPU 是坏的。例如，考虑在应用服务器启动时，没有施加任何负载，CPU 就达到了 100%。这就是坏的\
  \ CPU 消耗。\n\n看待糟糕性能的一种方式是，它是由 CPU 消耗过少或过多引起的。第一种，“CPU 过少”，表现如下：无论施加多少负载线程，SUT 的吞吐量都不会大幅提升，即使有大量可用的\
  \ CPU。SUT 仿佛被一张难以想象的沉重毯子——比你在胸部 X 光检查时用来保护身体的铅围裙还要重许多倍——盖在了脆弱的吞吐量和 CPU 线上，压制着它们，使它们无法做出可扩展系统中应有的响应式吞吐量飞跃。\n\
  \n因此，当那张沉重的毯子压在 SUT 上时，使用更快的 CPU 只会带来微乎其微的好处。增加更多同类型的 CPU 只会让你的钱包受损。\n\n我将誓死捍卫将\
  \ CPU 消耗推高至 100% 背后的逻辑，尤其是在吞吐量正在突破天花板的时候。\n\n为什么？如果这不能证明可扩展性，那它肯定是可扩展性的一个必要属性。像这样与\
  \ 100% CPU 调情是可以理解的，但如果 CPU 已经达到 100%，再施加更多负载就没有意义了。作为负面测试的一部分，这可能有所帮助，但当你寻求更高吞吐量时，这只会是一条死胡同。\n\
  \n即使面对非常低的吞吐量，技术人员有时也会吹嘘他们 SUT 的低 CPU 消耗。需要费些功夫才能帮助他们明白，在这种情况下，低 CPU 消耗是坏的，而不是好的。另一方面，当比较两个各方面性能（尤其是吞吐量）都相似，但其中一个\
  \ CPU 消耗更低的测试时，低 CPU 消耗就是好的。\n\n对于第二种糟糕性能，“CPU 过多”，SUT 消耗了过多的 CPU，以至于你需要一整群忙碌的 CPU\
  \ 来产生足够的吞吐量以满足需求，而一个调优得更好的 SUT 可能只需要几个 CPU 就能慢悠悠地完成任务。这就是为什么引入一个限制硬件花费金额的性能要求会很有帮助。\n\
  \n“CPU 过多”应引导我们优化那些既非必要又消耗 CPU 的代码。用于指出哪些代码消耗 CPU 的工具在关于线程的 P.A.t.h. 检查清单（第 11 章）中讨论。而代码是否必要当然是主观的，但在同一第\
  \ 11 章中，有一些很好的、具体的非必要代码示例。“CPU 过少”表明争用、I/O 或其他响应时间问题阻碍了系统产生足够的吞吐量。解决这些问题的指导分散在从第\
  \ 8 章开始的四个涵盖 P.A.t.h. 检查清单的章节中。\n\n\n\n第二章《适度调优环境》鼓励我们每天运行更多修复-测试循环，并期望由此带来改进。这意味着性能表现是动态变化的，需要在优化之间重新评估。仅仅一两次优化就可能轻易将“CPU\
  \ 过载”系统转变为“CPU 空闲”系统。例如，假设许多具有复杂安全要求的系统会为每个用户查询数据库中数百个权限，再假设对整个 P.A.t.h. 检查清单的审查表明这是系统中最严重的问题。一旦你为这种\
  \ CPU 密集型方法添加缓存，就会发现系统中下一个最严重的问题，这很可能是资源争用（详见第十一章），从而让我们得到一个“CPU 空闲”系统。\n\n请注意他人如何看待你试图将\
  \ CPU 使用率推至 100% 的做法，就像使用可扩展性标尺时一样。理所当然地，数据中心所有者需要充分的保证，即生产应用程序在消耗分配 CPU 的适度部分的同时，能够满足吞吐量要求。问问他们觉得多少消耗量是合适的。CPU\
  \ 耗尽的风险太大了，尤其是当人为错误和其他操作失误可能意外推高 CPU 消耗时。有时，业务流程会无意中被完全排除在调优过程之外，它们对 CPU 的贪婪本性会在生产环境中给你来个突然袭击。偷袭。\n\
  \n## 别忘了\n\n我不是木匠，但连我都知道“量两次，切一次”才能把木板加工成合适的尺寸。对于软件，我们在检入源代码控制之前，通常测量零次可扩展性。零次。\n\
  \n一旦陶土被烧制，雕塑家的工作就结束了。如果你想把那个畸形的杯子变成一个华丽的圣杯，那你就运气不好了。如果你的恩人的陶土半身像看起来更像一个长着三个鼻子的科幻怪物，抱歉。开发过程是我们塑造和重塑代码的黄金机会窗口，而我们目前却让这个机会白白溜走，从未检查我们在实现可扩展性目标方面的进展。它的鼻子数量对吗？它看起来还像怪物吗？为什么我们从不问这些显而易见的问题，直到为时已晚？\n\
  \n可扩展性标尺使用起来快速简便；它使我们能够在开发过程中频繁地衡量性能进展，趁我们的机会窗口还开着，在陶土烧制之前把事情纠正过来。\n\n当我们的系统扩展时，负载生成器会推动被测系统产生清晰、轮廓分明的吞吐量跃升/阶梯。与规整的吞吐量（及其他）指标相反，性能不佳的被测系统具有锯齿状、无力且沉重的吞吐量，因为代码中充斥着资源争用，这体现在各个指标的锯齿状变化中。\n\
  \n我提到过，施加不切实际的大量负载是一个常见错误，甚至可能是一种反模式。3t0tt 有助于解决这个问题——它是一种很好、安全的方式，可以防止像我这样自命不凡的性能工程师就过高的负载进行说教。3t0tt\
  \ 是一个绝佳的起点，但它不能告诉你系统是否可扩展——你需要可扩展性标尺来实现这一点。\n\n## 下一步\n\n本章重点讨论了吞吐量、CPU 和施加负载量之间的相互作用。在同一张图表上看到这三个指标有助于运行可扩展性标尺测试。在接下来的第七章中，我们将看到如何将所有这三个指标放在完全相同的\
  \ JMeter 图表上。第七章将深入探讨值得重复的 JMeter 基础知识，以及那些似乎文档不足的重要 JMeter 特性和缺陷。\n\n"
- "# 7. JMeter 必知特性\n\n由于你可以在互联网上找到大量关于负载生成器 JMeter 的文档，我尽量将本章内容限制在那些文档较少的特性，或者即使是文档完善但新手似乎很少掌握的特性上。\n\
  \n本章的目标是：\n\n*   通过仅在你的桌面上使用一个小型沙盒环境创建小型测试脚本，来熟练使用 JMeter。\n*   理解学习几个特定的 JMeter\
  \ 特性可以让你快速从初学者进阶为中级/高级用户。\n*   理解一旦安装了 JMeter，还需要从 jmeter-plugins.org 和其他地方安装额外的插件才能使其真正有用。\n\
  \n我看到很多人开始使用 JMeter 但进展不大，这让我感到沮丧，因为我见过它是一个多么强大的负载生成器。为了解决这个问题，本章的导览将推动 JMeter 初学者进入中级和高级用户的领域。\n\
  \n但是等等，还有更多。\n\n“Hello World！”编程实验是开始学习一项技术的绝佳方式，而 JMeter 恰好拥有这种沙盒，你可以用它来尝试其特性。如果你知道这个沙盒（大多数人不知道），只需\
  \ 20 秒（我在这里没有夸张）就可以在沙盒中创建一个小测试，并学习（甚至完善）你回答这些以及许多其他 JMeter 问题的方法：\n\n*   如何增加负载？\n\
  *   如何绘制吞吐量图表？\n*   如何根据脚本变量中的值有条件地执行某些操作？\n*   如何从 .csv 文本文件中读取数据（如被测系统用户名/密码）到\
  \ JMeter 脚本变量中？\n\n所以请留意本章后面的沙盒部分。\n\n这是纯 JMeter 的一章，所以如果你已经对你自己的负载生成器很满意，那么请随意跳到下一章。但在你离开之前，请阅读我的“致\
  \ JMeter 的情书”，看看你的负载生成器是否具备所有这些特性——这些是我用来解决棘手性能问题所依赖的特性。我很难想象其他负载生成器（以及其他软件开发人员）是如何在没有这套极其广泛且全部开源的特性集的情况下勉强度日的。我当然希望商业（及其他）负载生成器竞争对手能注意到这个高标准。作为参考，以下是一些其他流行的负载生成器；最后三个是商业产品。\n\
  \nFaban\n\nThe Grinder\n\nGatling\n\nTsung\n\njmh\n\nHP Performance Center（又名 'Load\
  \ Runner'）\n\nLoad UI\n\nSilk Performer\n\n由于单一章节并不能构成完整的培训计划，我建议使用本章来补充你可能会在 jmeter.apache.org\
  \ 或 JMeter 书籍中找到的其他 JMeter 培训资料（《Performance Testing with JMeter》，作者 Bayo Erinle，Packt\
  \ Books，2015 年；ISBN-13 = 978-1787285774；或《JMeter Cookbook》，作者 Bayo Erinle，Packt\
  \ Books，2014 年；ISBN-13 = 978-1783988280）。互联网上的善良公民们，愿上帝保佑他们，也有他们自己的培训材料汇编，这无可辩驳地证明了\
  \ JMeter 是整个性能学科体系中的一个重要器官：\n\n\n\n*   “使用 JMeter 进行负载测试：第 1 部分 - 入门指南”，（[`https://lincolnloop.com/blog/load-testing-jmeter-part-1-getting-started/`](https://lincolnloop.com/blog/load-testing-jmeter-part-1-getting-started/)）\n\
  *   “从零开始学习 JMETER -（性能+负载）测试”（[`https://www.udemy.com/learn-jmeter-from-scratch-performance-load-testing-tool/`](https://www.udemy.com/learn-jmeter-from-scratch-performance-load-testing-tool/)）\n\
  *   “JMeter 简介”（[`https://www.guru99.com/introduction-to-jmeter.html`](https://www.guru99.com/introduction-to-jmeter.html)）\n\
  *   “JMeter - 快速指南”（[`http://www.tutorialspoint.com/jmeter/jmeter_quick_guide.htm`](http://www.tutorialspoint.com/jmeter/jmeter_quick_guide.htm)）\n\
  *   “JMeter 入门”（[`https://www.youtube.com/watch?v=KI6u5pclYIw`](https://www.youtube.com/watch?v=KI6u5pclYIw)）\n\
  *   “JMeter 入门指南”（[`https://www.youtube.com/watch?v=dJw8sBk_wSo`](https://www.youtube.com/watch?v=dJw8sBk_wSo)）\n\
  *   “如何使用 Apache JMeter 对 Web 服务器执行负载测试”（[`https://www.digitalocean.com/community/tutorials/how-to-use-apache-jmeter-to-perform-load-testing-on-a-web-server`](https://www.digitalocean.com/community/tutorials/how-to-use-apache-jmeter-to-perform-load-testing-on-a-web-server)）\n\
  *   “JMeter 快速设置指南”（[`http://zacster.blogspot.com/2008/03/quick-howto-to-setup-jmeter.html`](http://zacster.blogspot.com/2008/03/quick-howto-to-setup-jmeter.html)）\n\
  \n## 致 JMeter 的情书\n\n你的负载生成器可能具备以下一两个特性，但 JMeter 是唯一一个集所有特性于一身的工具，其功能集足够强大，可供 QA\
  \ 和开发人员共享。要向你展示所有这些内容需要大量篇幅，因此本章仅展示列表中几个较为重要的特性。\n\n*   除了标准的负载生成指标（响应时间、吞吐量等）之外，JMeter\
  \ 还可以绘制各种其他指标的图表：\n    *   来自被测系统的 JMX 指标（[`https://jmeter-plugins.org/wiki/JMXMon/`](https://jmeter-plugins.org/wiki/JMXMon/)）。例如，这将显示你的\
  \ Web 容器线程是否已达到上限，详见第 4 章关于负载反模式的内容。\n    *   来自所有主流操作系统的 CPU、内存、网络、磁盘指标（使用[PerfMon](http://jmeter-plugins.org/wiki/PerfMon/)（[`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMon/)）和[SIGAR](https://sourceforge.net/projects/sigar/)）。\n\
  \    *   SIGAR 还允许你绘制每个 PID（操作系统进程 ID）的 CPU 消耗图表。如果一台机器上有多个 Java 进程，这将显示哪个进程占用了所有\
  \ CPU。\n*   对任何你想要的内容进行负载测试：简单的 Java 程序、HTTP/S 应用程序、JMS 应用程序、大量 SQL 语句、TCP Socket\
  \ 服务器以及[许多其他内容](http://jmeter.apache.org/usermanual/component_reference.html)（[`http://jmeter.apache.org/usermanual/component_reference.html`](http://jmeter.apache.org/usermanual/component_reference.html)）。在\
  \ JMeter 中，知道如何测试这些内容的 JMeter 测试元素被称为采样器。\n*   WS-Security。如果你的客户端必须加密你的 WS-Security\
  \ 消息，那么你的负载生成器也必须这样做（[`https://github.com/tilln/jmeter-wssecurity`](https://github.com/tilln/jmeter-wssecurity)）\n\
  *   高级图表功能：\n    *   将任意两个（或更多）指标放在同一张图表上（[`https://jmeter-plugins.org/wiki/CompositeGraph/`](https://jmeter-plugins.org/wiki/CompositeGraph/)）。三个具有不同度量单位且自动缩放的指标？没问题。这有助于识别一个指标如何影响另一个指标。你甚至可以将来自两个不同测试的指标放在同一张图表上（[`https://jmeter-plugins.org/wiki/MergeResults/`](https://jmeter-plugins.org/wiki/MergeResults/)），以呈现令人信服的前后对比可视化效果。例如，如果你的吞吐量因\
  \ CPU 耗尽而达到上限，你可以得到一张图表，其中清晰地显示了在 CPU 达到 100%的精确时刻，吞吐量出现了难看的瓶颈。这是一张非常有说服力的图表！\n\
  \    *   你不信任平均值吗？你应该如此。你可以使用[频率分布](http://jmeter-plugins.org/wiki/RespTimesDistribution/)（[`https://jmeter-plugins.org/wiki/RespTimesDistribution/`](https://jmeter-plugins.org/wiki/RespTimesDistribution/)）和[百分位图](http://jmeter-plugins.org/wiki/RespTimePercentiles/)（[`https://jmeter-plugins.org/wiki/RespTimePercentiles/`](https://jmeter-plugins.org/wiki/RespTimePercentiles/)）来展示响应时间指标，从而避免“平均值的谎言”。\n\
  \    *   在设置面板（[`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)）上，你可以调整图表的[粒度、坐标轴刻度、颜色等](http://jmeter-plugins.org/wiki/SettingsPanel/)。\n\
  *   从任何安装了 JVM 的操作系统生成负载。\n*   将 JMeter 测试结果本地记录到文本文件或[集中式数据库](http://jmeter.apache.org/usermanual/realtime-results.html)（[`http://jmeter.apache.org/usermanual/realtime-results.html`](http://jmeter.apache.org/usermanual/realtime-results.html)）。\n\
  *   以下自动化性能测试平台集成了 JMeter 和报告功能：\n    *   [Jenkins](https://wiki.jenkins-ci.org/display/JENKINS/Performance+Plugin)（[`https://wiki.jenkins.io/display/JENKINS/Performance+Plugin`](https://wiki.jenkins.io/display/JENKINS/Performance+Plugin)）\n\
  \    *   [Taurus](http://gettaurus.org/)（[`http://gettaurus.org/`](http://gettaurus.org/)）\n\
  \    *   [Sonar](http://testersinaction.blogspot.com/2013/05/v-behaviorurldefaultvmlo_24.html)（[`http://testersinaction.blogspot.com/2013/05/v-behaviorurldefaultvmlo_24.html`](http://testersinaction.blogspot.com/2013/05/v-behaviorurldefaultvmlo_24.html)）\n\
  *   多种部署负载生成器的方式：\n    *   单机部署：\n        *   快速简便的默认方法：使用 Java UI 创建负载脚本，然后生成负载并查看图表。\n\
  \        *   在无头机器上[生成负载](http://jmeter.apache.org/usermanual/get-started.html#non_gui)（[`http://jmeter.apache.org/usermanual/get-started.html#non_gui`](http://jmeter.apache.org/usermanual/get-started.html#non_gui)），使用预先制作好的测试计划。将原始结果传回桌面进行分析，或者直接在无头模式下生成图表的.png\
  \ 图像供后续分析。\n    *   [分布式测试](http://jmeter.apache.org/usermanual/jmeter_distributed_testing_step_by_step.pdf)（[`http://jmeter.apache.org/usermanual/jmeter_distributed_testing_step_by_step.pdf`](http://jmeter.apache.org/usermanual/jmeter_distributed_testing_step_by_step.pdf)）。使用多台机器，通过一个中央\
  \ JMeter 控制器进行。对于单个生成器来说，超过几千 TPS 的负载可能过高。\n\n\n\n## 使用 jmeter-plugins.org 是必须的\n\
  \n坦白说，如果没有 Andrey Pohilko ¹ 那套令人惊叹的 jmeter-plugins.org（一套可直接插入 JMeter 的附加工具、图表等），我早就放弃\
  \ JMeter 了。我想我可能有点偏见，因为我自己也贡献了几百行代码。\n\n该项目早在 2009 年就启动了，因此相当稳定。第 6 章关于可扩展性基准的内容，就大量依赖\
  \ JMeter Plugins。CPU 消耗来自 JMeter Plugins，那些为增量负载计划绘制漂亮阶梯图的线程组也是如此。还记得我提到过两种安装方法吗？我讲过使用插件管理器安装，或者将单个插件的\
  \ jar 文件解压到 `JMETER_HOME/lib/ext` 目录下。\n\n以下是另外两种我认为与前两种同样重要的安装方法：\n\n*   使用“旧版”发布包。首先访问\
  \ [`https://jmeter-plugins.org/downloads/old/`](https://jmeter-plugins.org/downloads/old/)。然后下载\
  \ `JMeterPlugins-Standard-N.N.N.zip` 和 `JMeterPlugins-Extras-N.N.N.zip`，并将它们解压到\
  \ JMETER_HOME 目录下。压缩包中的 jar 文件必须最终放置在 .zip 文件中指定的相同文件夹（/lib 或 /lib/ext）中。\n*   使用\
  \ Maven。这种方法不仅能安装 jmeter-plugins，还能完整安装 JMeter！在 littleMock 仓库中查找 `pom-load.xml`。不要使用\
  \ `JMETER_HOME/bin/jmeter.bat` 启动 JMeter，而是使用我那个简单的小工具 loadGui.cmd / .sh（也在 littleMock\
  \ 仓库中）。`pom-load.xml` 的大部分内容是我从互联网上某位好心人那里借鉴来的。使用的 Maven 插件名字起得很好：`jmeter-maven-plugin`。感谢互联网。你可以在\
  \ [`https://github.com/eostermueller/littleMock`](https://github.com/eostermueller/littleMock)\
  \ 的根目录下找到 `pom-load.xml`。\n\n请在您自己的工作电脑上使用第一种技术（“旧版”）安装 JMeterPlugins，以便查看本章的 .jmx\
  \ 脚本。这些 .jmx 文件位于该仓库的 sampleJMeterScripts/ 文件夹中：\n\n[`https://github.com/eostermueller/javaPerformanceTroubleshooting`](https://github.com/eostermueller/javaPerformanceTroubleshooting)\n\
  \n我将其称为 jpt 仓库。\n\n考虑这个日常问题：假设您创建了一个使用了几个 jmeter-plugins 的 JMeter 负载脚本（.jmx 文件）。当您那位没有安装\
  \ JMeter-Plugins 的邻座同事尝试运行您的 .jmx 文件时，他们会遇到一些难以理解的错误，这些错误几乎不会明确指出缺失的依赖项。\n\n上述两种安装方法有助于解决这个问题。Maven\
  \ 并不总是易于使用，但上面的 `pom-load.xml` 非常棒——它会即时下载 `pom-load.xml` 文件中指定为 `<dependency>`\
  \ 的任何依赖的 JMeter-Plugins。\n\n这个故事的寓意是，仅共享您的 .jmx 文件很容易导致难以理解的依赖问题。同时共享您的 .jmx 文件和自定义的\
  \ `pom-load.xml` 文件可以完全解决这个问题。但另一种发现 JMeter 的方法是使用 JMeter Plugins 插件管理器，这是第 6 章中提到的安装技术之一。以下是快速参考的\
  \ URL：\n\n[`https://jmeter-plugins.org/wiki/PluginsManager/`](https://jmeter-plugins.org/wiki/PluginsManager/)\n\
  \n如果您安装了 PluginsManager（见上文），当它发现一个引用了您尚未安装的 JMeter Plugin 的 .jmx 文件时，它会提示您“您的测试计划需要以下插件”。然后，它会为您提供实际安装或中止的选项。\n\
  \n上面提到的 load-pom.xml 会完整安装 JMeter，并允许您指定正在使用的依赖插件。或者，您也可以使用此脚本安装特定计划文件中的所有插件：\n\n\
  `PluginsManagerCMD install-for-jmx/home/username/jmx/testPlan.jmx`\n\n这对于自动化的、无人值守的性能测试非常有帮助，但请记住，即使是\
  \ PluginsManagerCMD 也有自己的安装过程，详见此处：[`https://jmeter-plugins.org/wiki/PluginsManagerAutomated/`](https://jmeter-plugins.org/wiki/PluginsManagerAutomated/)\n\
  \n在第 2 章中，我向您展示了如何绘制单个 PID 的 CPU 消耗图。为此，请下载并安装此插件——这部分仅启用图表，不收集 CPU 数据：\n\n[`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMonAgent/#Download)\n\
  \n然后使用 ServerAgent 收集将在图表上显示的数据：从以下地址下载 ServerAgent-N.N.N.zip\n\n[`https://jmeter-plugins.org/wiki/PerfMonAgent/#Download`](https://jmeter-plugins.org/wiki/PerfMonAgent/#Download)\n\
  \n将其解压到您想要收集指标的任何机器（任何平台）上。当您启动 `startAgent.sh`（或 `startAgent.bat`）时，它会监听来自您桌面上的\
  \ JMeter GUI（或无头）进程在端口 4444 上的连接。它非常稳定、跨平台且易于使用。\n\nStartAgent 捕获 RAM、网络和其他指标——不仅仅是\
  \ CPU。还有许多其他 JMeterPlugins，将在下文详细介绍。\n\n\n\n## PerfMon\n\n在第 3 章中，我讨论了指标如何回答我们的三个基本问题：\n\
  \n1.  我们的硬件资源利用率如何？\n2.  哪个组件是特定性能问题的罪魁祸首？\n3.  最终用户是否受益？哪项代码变更表现更好？\n\n负载生成器是专门为回答第三个问题（关于满足性能要求）而设计的。jmeter-plugins.org\
  \ 的 PerfMon 组件也为第一个问题提供了高层次的答案。我所说的“高层次”，指的是 CPU、RAM 和网络消耗，以及[比这更多一点的内容](http://jmeter-plugins.org/wiki/PerfMonMetrics/)（[`https://jmeter-plugins.org/wiki/PerfMonMetrics/`](https://jmeter-plugins.org/wiki/PerfMonMetrics/)）。其工作原理如下。\n\
  \n首先，运行 `startAgent.bat`（清单 7-1）不需要管理员或 root 权限。此进程消耗的资源非常少，因此可以安全地启动该进程，并在数天或数月内无需再关注它。\n\
  \n```\n# ./startAgent.sh\nINFO  2016-02-21 14:03:05.061 [kg.apc.p] (): Binding UDP\
  \ to 4444\nINFO  2016-02-21 14:03:06.064 [kg.apc.p] (): Binding TCP to 4444\nINFO\
  \  2016-02-21 14:03:06.069 [kg.apc.p] (): JP@GC Agent v2.2.0 started\n清单 7-1.\n\
  serverAgent 的启动横幅，它为 JMeter 提供硬件利用率数据\n```\n\n图 7-1 展示了如何添加一个连接到 serverAgent 并显示\
  \ CPU 图的 JMeter 图表。\n\n![A449023_1_En_7_Fig1_HTML.jpg](img/A449023_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1.\n\n要捕获出色的 CPU、RAM 和其他硬件指标，只需将 PerfMon 指向您已解压并启动 serverAgent 的主机和端口（默认端口为\
  \ 4444）即可。\n\n因此，JMeter 帮助回答了三个指标问题中的两个。你甚至可以论证它回答了剩下的那个问题：哪个组件是特定性能问题的罪魁祸首。如何做到？请查看这些可以在\
  \ JMeter 中绘制成图表的其他可用指标。\n\nJMXMon 插件在 JMeter 中绘制 JMX 指标图表：\n\n[`https://jmeter-plugins.org/wiki/JMXMon/`](https://jmeter-plugins.org/wiki/JMXMon/)\n\
  \n不幸的是，JMeter 负载计划文件扩展名 (.jmx) 与 Java 管理扩展 (JMX)（一个监控 API）的缩写恰好是相同的三个字母。监控 API JMX\
  \ 目前并不十分流行，但 Spring Boot 的 Actuator 却很流行。它通过 json-over-http 消息提供出色的 JVM 健康指标。以下页面展示了如何通过向\
  \ Maven 的 pom.xml Spring Boot 文件添加一个简单的依赖项来在 Spring Boot 中启用 Actuator：\n\n[`http://www.baeldung.com/spring-boot-actuators`](http://www.baeldung.com/spring-boot-actuators)\n\
  \n然后，您可以使用以下 JMeterPlugin 在 JMeter 中绘制 Actuator 数据图表：\n\n[`https://jmeter-plugins.org/wiki/PageDataExtractor/`](https://jmeter-plugins.org/wiki/PageDataExtractor/)\n\
  \nJMX 和 Actuator 数据可以指向 JVM 内部的许多问题，从而帮助回答“哪个组件是罪魁祸首”的问题。因此，JMeter 和 JMeterPlugins\
  \ 有助于提供所有三种类型的指标。令人印象深刻。\n\n## JMeter user.properties 是你的朋友\n\n我时常会发现一些以特定方式调整 JMeter\
  \ 默认配置的 JMeter 属性。为了避免这些属性调整在 `JMETER_HOME/bin/jmeter.properties` 中其他 45KB（截至 JMeter\
  \ 2.13 版本）的属性中丢失，我将它们分离到 `JMETER_HOME/bin/user.properties` 中，该文件中的属性会覆盖 `jmeter.properties`\
  \ 中的属性。\n\n将它们分开存放，使我能够轻松地将我的 `user.properties` 文件复制到新的 JMeter 安装中，从而获得更一致的安装体验。\n\
  \n清单 7-2 展示了我个人的 `user.properties` 文件，其中包含我推荐给所有人的一组我最喜欢的 JMeter 自定义设置。\n\n```\n\
  #添加此项以避免在“查看结果树”中截断 HTTP 及其他响应\nview.results.tree.max_size=0\n#添加此项以便“活动线程数随时间变化”监听器\n\
  #能够从您的 .jtl 文件中渲染数据\njmeter.save.saveservice.thread_counts=true\n#添加此项以使用 csv 格式（而非\
  \ XML）作为 jtl 输出文件。\n#这可以减小 jtl 文件大小，降低测试期间 JMeter 的 CPU 消耗\njmeter.save.saveservice.output_format=csv\n\
  #这些 csv 字段名称使得读取/理解 .jtl 文件更加容易。\njmeter.save.saveservice.print_field_names=true\n\
  清单 7-2.\nuser.properties 文件中我最喜欢的一些 JMeter 属性，该文件会覆盖 jmeter.properties；两个文件都位于 JMETER_HOME/bin\
  \ 目录下\n```\n\n当你与朋友分享你的 .jmx 文件时，你可能也想分享像上面这样的属性。但你可能更想使用上面的 pom-load.xml 文件来指定你希望朋友使用的任何属性。请查看上面的\
  \ pom-load.xml 文件，了解清单 7-3 中的语法，其作用与在 JMeter 的 `user.properties` 文件中设置 `summariser.interval=5`\
  \ 相同。\n\n```\n\n清单 7-3.\n在 jmeter-maven-plugin 中指定的 JMeter 属性\n```\n\n你可以使用清单 7-3\
  \ 中的技术来指定任何 JMeter 属性。以下是所有 JMeter 属性的参考文档：\n\n[`http://jmeter.apache.org/usermanual/properties_reference.html`](http://jmeter.apache.org/usermanual/properties_reference.html)\n\
  \n\n\n## JMeter 简介\n\n在我刚开始接触 JMeter 时，真希望手边能有一张像图 7-2 那样的截图。在墙上挂一幅装裱好的大图可能有点夸张，但把复印件贴在\
  \ 42 英寸大屏幕显示器下沿如何？我在截图上添加的文字展示了基本的负载生成功能，箭头则指向实现这些功能所需的 JMeter 测试元件。图 7-2 中的第一张截图是启动\
  \ JMeter 时看到的空白界面。要设置成第二张截图的样子，你需要右键点击“测试计划”并开始添加内容。\n\n![A449023_1_En_7_Fig2_HTML.gif](img/A449023_1_En_7_Fig2_HTML.gif)\n\
  \n图 7-2.\n\n如何通过 JMeter 测试计划树完成任务。第一张截图是空白界面。第二张截图是右键点击并添加多个测试计划元件后的结果。\n\n我必须承认，JMeter\
  \ 的负载计划树（主窗口左侧的树状结构）对新用户来说是一个难以逾越的可用性障碍。用户通常清楚自己最终想要什么结果。例如，“在 5 分钟内，通过 HTTP 对两个不同的\
  \ SOA 服务施加 5 个线程的负载，需要响应时间和吞吐量的时序图。”但为了实现这个看似简单的目标，JMeter 却迫使新手陷入一场丑陋的试错游戏，我称之为“右键点击教育”。有经验的用户能轻松应对，但初学者不行。在\
  \ UI 的左侧窗格中，你需要用一些名称古怪的构建块（称为测试元件）来组装一个树状结构（例如：线程组、虚拟采样器、查看结果树等）。树中的每个测试元件都有其类型，并且必须根据一套初学者一无所知的规则精确定位。测试元件及其类型（我主要使用这些类型：线程组、采样器、监听器、断言）以及所有具体的测试元件都在[此处有文档说明](http://jmeter.apache.org/usermanual/component_reference.html#introduction)：\n\
  \n[`http://jmeter.apache.org/usermanual/component_reference.html#introduction`](http://jmeter.apache.org/usermanual/component_reference.html%23introduction)\n\
  \n这里还有一些不错的顶层文档：\n\n[`http://jmeter.apache.org/usermanual/test_plan.html`](http://jmeter.apache.org/usermanual/test_plan.html)\n\
  \n表 7-1.\n\nJMeter 负载计划中常用组件\n\n| 名称 | 描述 | 示例 |\n| --- | --- | --- |\n| 监听器 | 图表及其他显示结果的方式\
  \ |   |\n| 线程组 | 配置施加负载的线程数量。配置测试持续时间。 | [阶梯线程组](http://jmeter-plugins.org/wiki/SteppingThreadGroup/)\
  \ ( [`https://jmeter-plugins.org/wiki/SteppingThreadGroup/`](https://jmeter-plugins.org/wiki/SteppingThreadGroup/)\
  \ ) 或笨重的默认[线程组](http://jmeter.apache.org/usermanual/component_reference.html%23Thread_Group)\
  \ ( [`http://jmeter.apache.org/usermanual/component_reference.html#Thread_Group`](http://jmeter.apache.org/usermanual/component_reference.html%23Thread_Group)\
  \ ) |\n| 采样器 | 执行者。执行 HTTP 请求。执行 JMS 请求。执行 Java 代码。 |   |\n| 控制器 | 控制采样器的流程，包括“If”逻辑和循环逻辑\
  \ |   |\n| 断言 | 允许你配置 JMeter 如何判断一次采样器运行是成功还是失败。 |   |\n\n如果你右键点击某个特定的测试元件，就会看到从该位置可以合法添加哪些类型的子测试元件。所以，如果那天你的右键点击兴致足够高，你可以右键点击树上的每一个节点（有时可能有几十甚至上百个块），然后推断并记住整套规则——哪些测试元件类型可以/应该作为其他测试元件类型的父/子节点。这可真是“右键点击其乐无穷”。或者，并非如此。\n\
  \n我在这里并非要给我“心爱之物”泼冷水。相反，我是想鼓励你避免“右键点击教育”的痛苦。一开始，请先依靠他人的帮助来构建你的负载计划树。具体来说，你可以将图 7-2\
  \ 中的截图作为指南，或者使用相对较新的 JMeter 模板功能，从一个现成的负载计划树开始，再或者让朋友分享他们的负载计划（一个 `.jmx`² 文件，采用专有的\
  \ `.xml` 语法）。要使用模板功能，请以空负载计划树启动 JMeter，然后选择“文件 ➤ 模板”。即使经验丰富，我仍然依赖“录制模板”来录制新的 HTTP\
  \ 负载脚本，因为其树结构有点特殊。你很快就能熟悉哪些测试元件该放在哪里，然后就可以（哈）扩展思路，在负载计划树结构上发挥更多创意。\n\n\n\n## 提升工作效率的\
  \ UI 功能\n\n图 7-2 中那一簇大红箭头都指向了各个独立的项目，即测试元素。只需使用键盘上的方向键，就能轻松地在所有这些测试元素之间导航，甚至可以说是冲浪。每个测试元素都有特定的测试元素类型。例如，所有图形都属于监听器类型的测试元素。用于提交\
  \ HTTP 请求的测试元素称为取样器。为了方便查找，我将所有图形都放在最高层级（作为根节点测试计划的子节点）。但假设我不小心将一些图形放到了树形结构的更深处。你可以使用多种功能来快速重新定位它们，并执行其他操作：\n\
  \n*   **拖放**。拖放功能的实现出乎意料地易于使用。你可以亲自尝试一下，拖动一个测试元素来改变同级元素的顺序，或者完全改变其父级关系。\n*   **剪切/复制/粘贴**。比尔·盖茨那套熟悉的键盘快捷键（Ctrl+X、Ctrl+C、Ctrl+V）在这里同样适用。这三个操作都作用于选中的节点及其所有子节点。\n\
  *   **多选**。Shift+点击（选择相邻的测试元素）和 Ctrl+点击（选择不相邻的测试元素）的操作方式符合你的预期。\n*   **复制当前测试元素**。需要另一个与所选元素相同的测试元素吗？按\
  \ Ctrl+Shift+C 即可在当前元素下方添加一个副本。即使你复制的是一个包含许多子节点的父测试元素，此功能也同样有效。\n*   你还可以使用启用/禁用/切换功能（Ctrl+T）快速禁用单个测试元素及其所有子节点。\n\
  *   如果你启动了两个完全独立的 JMeter UI 实例，可以轻松地在两个树形结构之间进行剪切/复制/粘贴。\n\n所有这些剪切/复制/粘贴功能对于以下场景非常有用：\n\
  \n*   **合并两个负载脚本**。同时启动两个 JMeter GUI 实例。将所有 HTTP 请求取样器从一个实例复制到另一个实例。我怎么强调这项技术的重要性都不为过。以下是三个示例：\n\
  \    *   第 4 章的负载生成概述中展示了“第一优先级”和“第二优先级”脚本。你可以将第一优先级和第二优先级的内容分别录制到不同的脚本中，然后使用此技术将第二优先级脚本中的\
  \ HTTP 取样器（及其他内容）追加到第一优先级脚本中。\n    *   每位开发人员录制自己的业务流程，之后使用此技术将所有脚本合并成一个单一的脚本。\n\
  \    *   当对网页进行代码更改（例如添加新的必填数据项）时，这通常会导致 .jmx 文件过时。要更新脚本，请将新版本的网页录制到一个独立的 .jmx 文件中。然后仔细删除旧脚本中过时的部分，并使用此技术将新脚本复制/粘贴到旧脚本中。\n\
  *   **重新排列测试计划中的组件**。为了方便查看/查找，我喜欢将所有图形放在最高层级（作为测试计划的子节点）。如果图形分散在各处，我可以轻松地使用方向键在负载测试计划中浏览，Ctrl+点击多选要移动的图形，然后按\
  \ Ctrl+V 将它们粘贴到新位置。\n*   **轻松复制当前选中的节点**。假设你已经配置了一个 Java 取样器，并且想在其旁边再创建五个相同的取样器作为同级元素。只需选中你的\
  \ Java 取样器，然后按五次 Ctrl+Shift+C 即可。瞧，大功告成。\n*   **我大量使用切换/Ctrl+T 功能**。假设我想比较两个不同 URL\
  \ 下的代码性能。我会为每个 URL 创建一个 HTTP 请求取样器，然后使用 Ctrl+T 切换启用的取样器，一次只运行一个。如果你避免在两次运行之间清除结果，你将得到类似这样的漂亮图表：（待办事项：需要两个不同取样器的图表，一次运行一个，且不在运行之间清除结果）。\n\
  \n## 使用 JMeter 断言在负载测试期间进行功能验证\n\n此示例的 .jmx 脚本位于 jpt github.com 仓库的以下位置：\n\n```\n\
  sampleJMeterScripts/jpt_ch07_functionalValidation.jmx\n```\n\n在第 5 章中，我提到了六种情况，在这些情况下你应该咬紧牙关，放弃测试结果并重新运行整个测试。其中一个潜在原因是大量的被测系统错误。你需要自行决定触发重新测试的确切错误百分比。\n\
  \n但是，如果你的被测系统静默失败，或者重要的客户端数据被悄悄地从被测系统网页中遗漏，你最终可能会基于完全错误的数据做出各种决策。为避免这种情况，请花点时间告诉\
  \ JMeter 什么构成成功的 HTML 响应，方法是添加 JMeter 断言来检查 HTML 响应中的关键文本片段，例如网页的标题，或者几个关键字段的 HTML\
  \ 文本标签。图 7-3 展示了如何添加断言。\n\n![A449023_1_En_7_Fig3_HTML.jpg](img/A449023_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3.\n\n添加断言。如果在父级取样器的响应中未找到此断言中的文本，则 JMeter 将在“汇总报告”和/或“综合报告”中统计一个错误。\n\n图\
  \ 7-4 展示了如何输入要验证的文本。在输入文本之前，你需要先点击底部的“添加”按钮。如果 JMeter 发现你输入的文本在相应的 HTTP 响应中缺失，它将统计一个错误。如果你的整个业务流程最终以“订单已提交”消息结束，那么这就是你验证系统是否吐出这个至关重要消息的机会。不要错过这个机会。\n\
  \n![A449023_1_En_7_Fig4_HTML.jpg](img/A449023_1_En_7_Fig4_HTML.jpg)\n\n图 7-4.\n\n\
  一个 JMeter“响应”断言。如果你多次点击“添加”并在每一行输入文本，那么如果父级取样器的响应中缺少任何一行文本，JMeter 都会将此取样器标记为出错。\n\
  \n如果你的应用程序显示“订单已提交”后紧接着显示“致命异常 / 你的代码失败”，这至少可以说是苦乐参半。你可以添加第二个断言，如图 7-5 所示，来翻转逻辑。只需勾选“非”标志，如果给定的文本（例如“致命异常”）存在，JMeter\
  \ 就会统计一个错误。\n\n![A449023_1_En_7_Fig5_HTML.jpg](img/A449023_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5.\n\n一个与上图类似的 JMeter 响应断言，但勾选了“非”。如果在取样器的响应中找到了给定的文本（例如错误消息），则会统计一个错误。\n\n\
  我以前曾过早地宣称性能胜利，结果后来发现 100% 的请求都失败了。这相当尴尬；我不推荐这样做。\n\n你不仅应该花时间添加断言，还需要关注错误计数/百分比，所有断言失败和其他错误（如\
  \ HTTP 错误）都会被记录在这里。以下是三个（可能还有其他）有助于你跟踪错误的组件：\n\n*   jp@gc - 每秒事务数（来自 JMeter 插件）\n\
  *   汇总报告（错误 % 列）\n*   综合报告（错误 % 列，来自 JMeter 插件）\n\n这里讨论的断言（图 7-4 和 7-5）仅检查预定义的字符串列表。这里还详细介绍了许多其他更复杂的断言：[`http://jmeter.apache.org/usermanual/component_reference.html#assertions`](http://jmeter.apache.org/usermanual/component_reference.html%23assertions)\n\
  \n例如，JSR223 断言允许你编写代码来验证任何取样器的响应。\n\n\n\n图 7-6 展示了一个包含失败断言的“综合报告”。JMeter 插件生成的综合报告比\
  \ JMeter 自带的“汇总报告”性能更好，后者缺少一些关键列，例如“90% 响应时间”。汇总报告功能更少，性能也更差。\n\n![A449023_1_En_7_Fig6_HTML.jpg](img/A449023_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6.\n\nJMeter “综合报告”，显示了来自 github.com 上 jpt 示例中的 jpt_ch07_functionalValidation.jmx\
  \ 文件里，由断言统计的错误。\n\n## 脚本变量\n\n我创建的几乎每个脚本都包含几个脚本变量，这使得在不同硬件环境中运行脚本更加容易。图 7-7 中显示的\
  \ MY_DIR 变量将在以下示例中用于指示在运行 JMeter 的机器上存储 JMeter 输出文件的位置。\n\n![A449023_1_En_7_Fig7_HTML.jpg](img/A449023_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7.\n\n在以下示例中使用 MY_DIR 变量来存储 JMeter 输出文件\n\n图 7-8 展示了如何引用变量。实际上，JMeter 中几乎所有用于输入数字或文本数据的输入框（如下所示）都能正确解析脚本变量的值——只需记住使用\
  \ `${}` 语法将变量名包裹起来即可。\n\n![A449023_1_En_7_Fig8_HTML.jpg](img/A449023_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8.\n\n当引用像 MY_DIR 这样的变量时，必须使用特殊语法将名称包裹起来：`${MY_DIR}`。你几乎可以在任何可以输入文本数据的地方引用变量。\n\
  \n## 将性能结果保存到磁盘\n\n你可以通过几种不同的方式将 JMeter 结果（响应时间、吞吐量等）保存/持久化到磁盘。出于多种原因，你都需要这样做，例如比较当前性能与上次发布的性能、记录性能缺陷，或向同事展示吞吐量过程。\n\
  \n*   从 UI 复制屏幕截图，这很快。但请记住，仅凭一张图表的 .png 图片，你将无法添加其他指标、重置采样粒度、重新缩放以放大、更改颜色等。\n* \
  \  将原始结果保存到文本文件——按照惯例，JMeter 使用 .jtl 文件扩展名。这稍微复杂一些（详见下文），但你可以获得极大的灵活性，以便基于原始数据重新构想你的图表。如果你在测试运行很久之后才审查结果，这种灵活性尤其有用。我经常在无头机器上生成负载。测试结束后，我只需将原始的\
  \ .jtl 文件复制回我的桌面，然后在 JMeter UI 中渲染。在无头机器上，你甚至可以[生成 .​png 文件](http://jmeter-plugins.org/wiki/GraphsGeneratorListener/)（\
  \ [`https://jmeter-plugins.org/wiki/GraphsGeneratorListener/`](https://jmeter-plugins.org/wiki/GraphsGeneratorListener/)\
  \ ）。\n*   将结果保存到中央数据库（ [`http://jmeter.apache.org/usermanual/realtime-results.html`](http://jmeter.apache.org/usermanual/realtime-results.html)\
  \ ，或 [`http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/`](http://www.testautomationguru.com/jmeter-real-time-results-influxdb-grafana/)\
  \ ）。这是一种很好的方法，允许多个用户在实时测试期间查看指标，或比较多个 SUT 版本的结果（将所有结果保存在一个地方），或者作为所有结果的企业级存储库。这是一种相对较新的方法，我对此没有任何经验。\n\
  *   在无头运行时，JMeter 每 30 秒会向标准输出（可能还有 `JMETER_HOME/bin/jmeter.log`）显示一组小型且基本的（不可配置的）性能指标——这对于短时间、快速的测试非常有用。[控制台状态记录器](http://jmeter-plugins.org/wiki/ConsoleStatusLogger/)（\
  \ [`https://jmeter-plugins.org/wiki/ConsoleStatusLogger/`](https://jmeter-plugins.org/wiki/ConsoleStatusLogger/)\
  \ ）JMeter 插件已不再需要，因为较新版本的 JMeter（至少 2.13 及更高版本）无需请求即可显示这些数据。你希望无头运行 JMeter 的原因有很多：\n\
  \    *   因为 JMeter 建议如此而选择无头运行。启动 JMeter GUI 时，控制台窗口会显示以下消息：“不要使用 GUI 进行负载测试”（图\
  \ 2-6）。这很可能是因为 GUI 开销可能会影响负载测试结果。根据我的经验，使用 GUI 进行负载测试，且每秒请求数不超过 10 个时，其开销足够低。\n\
  \    *   在 SUT 上无头运行，以便避免第 2 章“适度调优环境”中讨论的网络性能问题。避免带宽限制器。避免可能导致性能下降的多个防火墙。避免并发性及其他配置尚未经过性能审查的负载均衡器。\n\
  \    *   无头运行，以便你可以对没有对外部世界开放 TCP 端口的无头 SUT 施加负载。\n\n要将 JMeter UI 图表保存为 .png 文件，首先将图表添加到测试计划树中，如图\
  \ 7-9 所示。要获得漂亮的“响应时间随时间变化”图表，请右键单击根测试计划，然后选择“添加” ➤ “监听器” ➤ “jp@gc - 响应时间随时间变化”。运行测试后，你可以直接右键单击，将图表图像复制到剪贴板或文件系统。\n\
  \n![A449023_1_En_7_Fig9_HTML.jpg](img/A449023_1_En_7_Fig9_HTML.jpg)\n\n图 7-9.\n\n\
  只需右键单击 JMeter 插件图表，即可将图像保存到剪贴板或磁盘\n\n\n\n保存测试结果的第二种方法是让 JMeter 将原始数据保存到磁盘。使用 `.jtl`\
  \ 文件扩展名是一种良好的惯例，尽管并非强制要求。要将数据保存到 `.jtl` 文件，你可以使用与图 7-9 相同的图表，只需按图 7-10 所示进行指定即可。所有图表都是类型为监听器的测试元素，并且每个都包含此面板。\n\
  \n![A449023_1_En_7_Fig10_HTML.jpg](img/A449023_1_En_7_Fig10_HTML.jpg)\n\n图 7-10.\n\
  \n重启 JMeter 后，如果你想将指标从已填充的 `.jtl` 文件重新加载到图表中，请确保指定了 `.jtl` 文件名，将 UI 焦点设置在此文本框中，然后按\
  \ Enter 键。\n\n是的，图 7-8 和图 7-10 中的截图完全相同，但这只是因为这是一个重要的功能。尽管 UI 上明确写着“将结果写入文件 / 从文件读取”，但包括我在内的大多数人都很难看出这个框是用来从\
  \ `.jtl` 文件渲染图表的。\n\n请注意，运行 ➤ 清除全部 (Ctrl+E) 会清除图表中的所有结果以及 UI 中的大多数测试元素，但它既不会删除也不会将\
  \ `.jtl` 结果文件清零。它会追加数据。你必须手动删除 `.jtl` 文件才能从头开始。当你开始一个你认为的新测试，但实际上是在向昨天同一时间运行的测试追加数据时，这可能会很麻烦。如果你尝试将\
  \ `.jtl` 中的数据渲染到图表中，比如吞吐量图表，你会看到左侧是昨天测试的吞吐量，中间是巨大的 24 小时空白间隙，右侧是今天的吞吐量。这并非你所期望的结果。因此，请记住在重启时清除你的\
  \ `.jtl` 文件，以避免出现这种巨大的间隙。\n\n为了避免玩“文件系统捉迷藏”来寻找输出文件，我强烈建议在文件名输入框中指定完整路径；前面显示的图 7-7\
  \ 展示了如何使用脚本变量来指定文件将存放的文件夹。\n\n以上展示了如何写入 `.jtl` 文件。要读取 `.jtl` 文件并显示图表，例如当你重启 JMeter\
  \ UI 时，你需要逐个加载每个监听器测试元素。这里有一个有趣的可用性小技巧，可以让 JMeter 读取 `.jtl` 文件：确保 `.jtl` 文件名已就位。然后将焦点放在输入框上（或保持焦点），并按\
  \ Enter 键。这将启动从 `.jtl` 文件中的文本数据绘制图表的过程。或者，使用浏览按钮选择文件，也会根据 `.jtl` 数据绘制图表。\n\n###\
  \ 如何避免大文件的冗余副本\n\n图 7-11 中的配置在我看来完全合理。看起来我们正在尝试为响应时间数据创建一个输出文件，并为吞吐量数据创建另一个输出文件。\n\
  \n![A449023_1_En_7_Fig11_HTML.jpg](img/A449023_1_En_7_Fig11_HTML.jpg)\n\n图 7-11.\n\
  \n看似完全合理的配置却会产生非常意想不到的后果。另外，`.jtl` 文件的路径未指定，因此不清楚这些文件将存放在文件系统的哪个位置。\n\n看起来响应时间数据会存放在一个文件中，而吞吐量数据会存放在另一个单独的文件中。但是，JMeter\
  \ 并非如此工作。相反，它会创建两个相同的输出文件。对于时间更长、吞吐量更高的测试，这会浪费数 GB 的磁盘空间。所以，请按照我的建议操作：对于每个 JMeter\
  \ `.jmx` 脚本，随意选择一个监听器，并仅为该监听器指定一个 `.jtl` 文件的路径/名称。因此，你可以推断出一条规则：整个 `.jmx` 文件应该只配置一个监听器（图\
  \ 7-1 中的两个组件都是监听器）带有输出文件。我将此称为“每个 jmx 仅一个输出文件”规则。该规则也适用于其他监听器，我称之为“基础监听器”，例如活动线程数随时间变化、响应时间百分位、汇总报告等，但有两个例外。\n\
  \n“每个 jmx 仅一个输出文件”规则的第一个例外是 PerfMon 监听器（用于收集 CPU 消耗和其他操作系统数据）和 JMXMon 监听器（用于从远程系统捕获\
  \ JMX 数据）。它们都来自 jmeter-plugins。与所有其他监听器不同，它们各自需要自己的输出文件。PerfMon 和 JMXMon 都不会从其他监听器的\
  \ `.jtl` 文件中读取数据。同样，其他监听器也不会从 PerfMon 和 JMXMon 的 `.jtl` 文件中读取数据。\n\n以下是避免混淆“什么数据写入哪里”的总结：\n\
  \n1.  在你的 `.jmx` 中选择任意一个监听器（PerfMon 和 JMXMon 除外），并指定要写入的 `.jtl` 文件的完整路径/文件名。\n2.\
  \  此外，如果你有 PerfMon 或 JMXMon，每个都应该有自己的 `.jtl` 文件。\n3.  如果你从命令行（无用户界面）运行 JMeter，你可以使用\
  \ `-l` 命令行参数指定你的 `.jtl` 文件名。请记住，即使指定了 `-l`，在你的 `.jmx` 文件中指定的任何 `.jtl` 文件也会被写入。所有命令行参数的文档请参见[第\
  \ 2.4.8 节](http://jmeter.apache.org/usermanual/get-started.html) [`http://jmeter.apache.org/usermanual/get-started.html`](http://jmeter.apache.org/usermanual/get-started.html)。\n\
  \n\n\n### 为重度调试或高吞吐量合理调整输出文件大小\n\n这是“每个 jmx 文件仅一个输出文件”规则的第二条例外情况，同时它也是一个极好的特性，你需要使用它来避免负载生成器上的数据过载。负载生成器是高度可配置的“猛兽”，很容易错误配置它们，导致其处理、计算和存储大量数据，从而影响负载生成器性能，并使测试结果更多地反映负载生成器自身的问题，而非被测系统的性能。\n\
  \n然而，在两种不同场景下，收集大量数据（HTTP URL、响应码、输入输出 XML、Cookie、脚本变量等）对于故障排查至关重要：\n\n*   调试负载脚本，包括错误和成功的请求。\n\
  *   在负载测试期间，排查来自被测系统的错误。\n\nJMeter 通过允许你保留两个基本输出文件来满足这一用例，一个采用.csv 格式，另一个采用 XML\
  \ 格式。XML 文件占用空间更大，CPU 消耗也更高，但仅用于采样器失败的情况，这种情况通常不常发生。在单独的 csv 格式的.jtl 文件中，JMeter\
  \ 将保留所有活动（无论成功或失败）的更小、更精简但高容量的记录。\n\n以下是实现方法：\n\n1.  在 `JMETER_HOME/bin/user.properties`\
  \ 中，添加以下属性，将默认的.jtl 文件格式设置为 csv，而不是更耗 CPU、更冗长且体积更大的 XML 格式：`jmeter.save.saveservice.output_format=csv`\n\
  2.  添加其他监听器，例如一个不错的 `jp@gc - Synthesis Report (filtered)`，它是普通摘要报告的功能更全面的版本。指定一个.jtl\
  \ 文件名（当然，别忘了包含.jtl 文件的路径，正如我之前建议的，以避免漫长的“捉迷藏”）。\n3.  在负载计划树中添加一个“查看结果树”监听器。指定一个与步骤\
  \ 2 中使用的不同的.jtl 文件名。对我来说，为所有.jtl 文件使用相同的路径很有帮助。\n4.  仅针对这一个监听器：\n    1.  勾选“错误”复选框。这有点令人困惑，但它告诉\
  \ JMeter 仅记录错误，并避免为成功的采样器请求记录详细日志带来的巨大开销。在施加负载时不要忘记这个勾选；我们将在下一节讨论原因。\n    2.  通过单击“配置”按钮，覆盖“查看结果树”中的\
  \ csv 文件格式，如图 7-12 所示。\n\n        ![A449023_1_En_7_Fig12_HTML.jpg](img/A449023_1_En_7_Fig12_HTML.jpg)\n\
  \n        图 7-12.\n\n        “配置”按钮，允许你启用/禁用输出文件的 XML 格式\n    3.  要仅针对这一个监听器将 csv\
  \ 文件格式覆盖为 XML 文件格式，请按图 7-13 所示勾选复选框。\n\n        ![A449023_1_En_7_Fig13_HTML.jpg](img/A449023_1_En_7_Fig13_HTML.jpg)\n\
  \n        图 7-13.\n\n        指定输出日志文件 XML 格式所需的复选框\n\n## 录制 HTTP 脚本\n\n以下说明介绍了如何录制\
  \ HTTP 脚本：\n\n[`http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf`](http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf)\n\
  \n与其重复这些说明，我认为强调录制过程中的几个关键步骤更为重要。\n\n过去，正确配置.jmx 文件以进行录制非常困难。现在，有一种简单的方法可以创建它：从\
  \ JMeter 模板开始配置.jmx。\n\n选择“文件” ➤ “模板”菜单选项。然后在顶部中央的组合框中选择“录制”模板。最后，单击“创建”，如图 7-14\
  \ 所示。\n\n![A449023_1_En_7_Fig14_HTML.jpg](img/A449023_1_En_7_Fig14_HTML.jpg)\n\n\
  图 7-14.\n\nJMeter 屏幕，用于选择指定将浏览器网络流量录制到.jmx 文件所需详细配置的模板。\n\n选择“录制”模板后，JMeter 计划树应如图\
  \ 7-15 所示。\n\n![A449023_1_En_7_Fig15_HTML.jpg](img/A449023_1_En_7_Fig15_HTML.jpg)\n\
  \n图 7-15.\n\n选择“录制”模板后的 JMeter 计划树\n\n图 7-16 详细说明了该过程的一个关键部分：浏览器的 HTTP 代理配置。如果没有配置\
  \ HTTP 代理，浏览器会直接向互联网发送请求。配置代理后，所有请求都会被转发到指定的主机（标记为“地址”）和端口。\n\n![A449023_1_En_7_Fig16_HTML.jpg](img/A449023_1_En_7_Fig16_HTML.jpg)\n\
  \n图 7-16.\n\nInternet Explorer HTTP 代理配置和 JMeter HTTP 代理服务器。看到 IE 如何配置为将所有请求发送到本地主机的\
  \ 8888 端口，而 JMeter 如何配置为监听完全相同的端口上的所有请求了吗？许多 JMeter 用户未能正确配置此项。\n\n请注意，左侧的 IE 地址输入框必须指向本地机器，并且\
  \ IE 中的端口号（左侧）和 JMeter 面板上的端口号（右侧）必须匹配。图 7-16 中的值是 8888。还要注意 JMeter 的“启动”按钮已禁用，这意味着它已被点击以启动\
  \ JMeter HTTP 代理程序。\n\n当 IE 代理配置正确，并且你单击 HTTP(S)测试脚本录制器上的大“启动”按钮时，所有浏览器网络流量都将被转发到\
  \ JMeter HTTP 代理，JMeter 代理将立即将所有流量转发到被测系统。当你浏览被测系统时，JMeter 将录制所有流量。\n\n将你的被测系统 URL\
  \ 粘贴到浏览器中，并开始导航你想要录制的业务流程。导航完成后，退出被测系统，并单击图 7-16 右侧 JMeter 的 HTTP(S)测试脚本录制器上的“停止”按钮。\n\
  \nJMeter 将在“录制控制器”中显示所有录制的流量，如图 7-17 所示。\n\n![A449023_1_En_7_Fig17_HTML.jpg](img/A449023_1_En_7_Fig17_HTML.jpg)\n\
  \n图 7-17.\n\nJMeter 的“录制控制器”捕获了用户在浏览器中导航被测系统时的网络流量\n\n\n\n## 调试 HTTP 录制\n\n使用 XML\
  \ Schema 验证器可能非常令人头疼。验证错误信息晦涩难懂，简直不像英语。这让我想起与英语作为第二语言（ESL）班级里最笨的学生进行技术支持通话的情景。³\
  \ 但比使用严格管控的 XML Schema 更糟糕的，是系统根本没有 schema，没有任何关于正确/错误输入的明确规则。\n\n这恰恰类似于负载生成器正确组装\
  \ HTTP GET 请求以传递给 Web 应用程序的任务。HTTP GET 请求需要哪些 URL 参数？使用了哪种 Web 认证方式？是否需要 CSRF 令牌或\
  \ JSESSIONID？还有其他 Cookie 吗？被测系统（SUT）的浏览器代码从前一个 HTML 响应中提取了哪些 HTML“隐藏”变量，并用于构建后续页面的\
  \ HTTP GET 参数？所有这些不确定性让我渴望某种能清晰阐明需求的、严格管控的 schema。事实上，回答错任何一个问题通常都会导致不完整的 HTML 响应和/或服务器端异常，而出现此类错误很可能表明你的\
  \ `.jmx` 负载脚本已损坏——或许与 SUT 的需求不同步了。\n\n处理这种不确定性的一种方法是，保留初始录制时的详细 HTTP 日志备份，以及最初录制的负载脚本本身。这就创建了一个包含所有必需数据项的小型“保险库”；它虽然不是\
  \ schema，但也足够接近了。但随后负载脚本的维护工作就开始了。在按照第 4 章所述增强脚本时，很容易在后期引入错误。还记得吗？这些更改是为了让你的负载更接近实际生产负载。\n\
  \n当负载脚本出现错误时，你可以通过对原始详细 HTTP 日志和包含该错误的测试运行日志进行详细的文本文件“差异比较”，来检查是否拥有所有必需的数据项。以下 JMeter\
  \ 指令展示了如何捕获这些详细的 HTTP 日志。\n\n当你查看这些日志之间的差异时，最常发现的是你并未完全理解 HTTP GET 的需求（上文两段所述）。或者，你可能部署了不同版本的\
  \ SUT，其对 HTTP GET 有不同的需求。\n\n重申一下，你需要进行的“差异比较”是在两个不同的日志之间：一个是业务流程的 HTTP 录制日志，另一个是回放脚本时产生的日志。我使用\
  \ JMeter 的“查看结果树”来创建这些日志。用于录制的日志必须位于工作台（Workbench）下（见图 7-18）。用于回放的日志必须配置为像第一个日志一样以\
  \ XML 格式记录，但它必须是测试计划（Test Plan）的直接子节点，并使用不同的输出文件名（显然）。你可以使用 JMeter 的复制/粘贴功能，将工作台中创建的日志（按照以下说明）复制到测试计划中。\n\
  \n![A449023_1_En_7_Fig18_HTML.jpg](img/A449023_1_En_7_Fig18_HTML.jpg)\n\n图 7-18.\n\
  \nJMeter 录制模板（文件 ➤ 模板 ➤ 录制 ➤ 创建），用于录制完整的请求/响应以及 HTTP 录制过程的其他详细信息\n\n要捕获 HTTP 录制的详细日志，请执行以下操作：\n\
  \n1.  启动一个新的测试计划用于录制：文件 ➤ 模板 ➤ 录制 ➤ 创建。  \n2.  选择工作台（WorkBench）下的“查看结果树”，如图 7-18\
  \ 所示。  \n3.  指定要创建的日志的路径/文件。  \n4.  确保“错误”复选框未被勾选。这将确保所有内容都被记录下来。  \n5.  单击“配置”按钮，并按照前面图\
  \ 7-13 所示设置勾选标记。  \n6.  按照 JMeter 文档所示开始录制：（ [`http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf`](http://jmeter.apache.org/usermanual/jmeter_proxy_step_by_step.pdf)\
  \ ）。\n\n## 直接对 Java 进行负载测试与调试\n\n曾几何时，我对一个贷款系统的报表部分进行负载测试。当用户请求一个 1K 的小报表时，系统必须从特定的字节偏移量处，从一个定期从后端系统下载的、单个数兆字节的文件中提取数据。该组件在负载下的响应时间慢至\
  \ 5 秒；服务器端并发度约为五个线程。\n\n不幸的是，系统因数据库维护而停机，因此无法进一步调查环境。我无法访问源代码，于是反编译了源代码（使用 jad.exe）进行查看。代码使用\
  \ `java.io.FileInputStream` 的 read() 方法一次一个字节段地读取文件，这种方法无法跳过任何字节或跳转到文件中的特定位置。所以，如果我的\
  \ 1K 报表位于 10MB 捆绑报表的末尾，代码就必须读取并丢弃 9MB 以上的数据。真是浪费！顺便提一下，这是主要反模式 3——过度处理的一个例子。\n\n\
  因此，我需要测试我的新代码实现，它使用 `java.io.RandomAccessFile` 直接“定位”到指定的偏移量并返回 1K 报表。当我用单个线程连续运行测试\
  \ 100 次时，新实现更快。但我必须说服我的老板，在五个线程负载下的响应时间会比之前看到的 5 秒更好。\n\n我知道如何启动我的代码的五个独立线程，但我认为从这些独立线程收集结果需要花费太多时间编码，然后我还得用某种方式将数据绘制成图表。因此，我没有自己启动这五个线程，而是让\
  \ JMeter 替我完成。\n\n事后看来，我本可以使用 JDK 自带的 `jmh`：\n\n[`http://openjdk.java.net/projects/code-tools/jmh/`](http://openjdk.java.net/projects/code-tools/jmh/)\n\
  \n下面展示了我如何让 JMeter 启动五个线程，全部运行我的 RandomAccessFile 报表代码实现；总共花了大约 15 分钟才全部搞定。最终我得到了\
  \ JMeter 图表，比较了两种实现的性能，RandomAccessFile 方法快得多——在五个线程负载、零思考时间下，响应时间约为 100-400 毫秒。\n\
  \n1.  将你想要进行性能测试的代码放入一个新类中，该类实现 [`org.apache.jmeter.protocol.java.sampler.JavaSamplerClient`](https://jmeter.apache.org/api/org/apache/jmeter/protocol/java/sampler/JavaSamplerClient.html)\
  \ 。继承以下类之一也可能有帮助：`org.apache.jmeter.protocol.java.sampler.AbstractJavaSamplerClient`\
  \ `org.apache.jmeter.protocol.java.test.JavaTest`  \n2.  创建一个新的 jar 文件，其中包含你的类及其依赖的类文件，但无需将文件打包到\
  \ JMeter 的包空间中。  \n3.  将你的 `.jar` 文件以及任何依赖的第三方 jar 文件添加到 `JMETER_HOME/lib/ext` 文件夹中。\
  \  \n4.  创建一个新的 JMeter `.jmx` 计划。添加一个线程组并配置五个负载线程。  \n5.  作为该线程组的子节点，添加一个新的 Java\
  \ 请求采样器：[`http://jmeter.apache.org/usermanual/component_reference.html#Java_Request`](http://jmeter.apache.org/usermanual/component_reference.html#Java_Request)\
  \ 。  \n6.  重启 JMeter。  \n7.  选择 Java 请求采样器。在“类名”组合框中，选择你在步骤 1 中编写的类名。  \n8.  要启用调试，请在启动\
  \ jmeter.sh 或 jmeter.cmd 之前添加以下环境变量：`JVM_ARGS=-agentlib:jdwp=transport=dt_socket,server=y,address=8000`\
  \  \n9.  在 Eclipse 中，启动一个监听端口 8000 的远程调试会话。在你的源代码中设置断点，然后从 JMeter 菜单（运行 ➤ 启动）启动\
  \ JMeter 脚本以触发断点。\n\n\n\n## JMeter 沙盒\n\n本节及下一节所需的 JMeter .jmx 文件位于 jpt 仓库的以下路径：\n\
  \n```\nsampleJMeterScripts/jpt_ch07_sandbox.jmx\n```\n\n你是否对掌握负载生成技巧有些犹豫？这很正常——它确实需要下功夫。但幸运的是，学习\
  \ JMeter 比其他负载生成工具更容易，因为你可以在自己的小沙盒中测试几乎每个测试元件，而无需受被测系统（SUT）复杂性的干扰。所以，关掉 Wi-Fi（别真关），让我们开始吧：\n\
  \n借助这个小沙盒技术，你可以：\n\n1.  创建带有大量逼真波浪线的图表，甚至可以在同一张图表上展示不同指标（如响应时间和吞吐量）。\n2.  处理文本，例如创建一个“输出-输入”脚本变量，这是我在第\
  \ 4 章关于负载脚本优先级中提到的极其重要的技术。\n3.  从 `.csv` 文件中读取数据到 JMeter 脚本变量。\n4.  使用“If-then”逻辑控制脚本流程，或者通过逻辑控制器重复执行几个步骤。\n\
  5.  ……还有很多很多。\n\n一旦我们完成了沙盒测试列表中的第 1 和第 2 项，你就可以准备好（是的，准备好）将第 3、4、5 项作为家庭作业来玩了。这真的很有趣。沙盒的工作原理如下：关闭你正在处理的任何脚本，添加一个线程组和一个子元件\
  \ [`jp@gc - Dummy Sampler`](http://jmeter-plugins.org/wiki/DummySampler/) ( [`https://jmeter-plugins.org/wiki/DummySampler/`](https://jmeter-plugins.org/wiki/DummySampler/)\
  \ )。具体步骤如下：\n\n1.  右键点击测试计划，选择 添加 ➤ 线程（用户） ➤ 线程组。\n2.  配置测试持续时间。\n3.  勾选“永远”以让测试无限期运行（运行\
  \ ➤ 停止，或按 Ctrl/Cmd+逗号停止测试）。\n\n    ![A449023_1_En_7_Figf_HTML.jpg](img/A449023_1_En_7_Figf_HTML.jpg)\n\
  \n4.  或者取消勾选“永远”，并在旁边的文本框中输入 1，让 Dummy Sampler 只运行一次——用于只运行一次脚本，例如在测试/调试时。\n5. \
  \ 在屏幕左侧的树中，右键点击新添加的线程组，选择 添加 ➤ 取样器 ➤ jp@gc - Dummy Sampler。\n6.  选中新添加的 Dummy Sampler，使用快捷键\
  \ Ctrl+Shift+C 复制它。\n7.  看到我如何在取样器名称后添加 - 01 和 - 02 了吗？JMeter 树位于屏幕左侧。在右侧找到名称输入框（在“注释”文字上方）。你可以在这里添加\
  \ - 01 或 - 02 来更改名称。\n\n完成这些操作后，你将看到如图 7-19 所示的界面。\n\n![A449023_1_En_7_Fig19_HTML.jpg](img/A449023_1_En_7_Fig19_HTML.jpg)\n\
  \n图 7-19.\n\n基础沙盒。这是 JMeter 沙盒游戏环境的基础。注意延迟和响应时间的默认值。这些解析为随机数的变量在测试驱动图表时增添了一些趣味。\n\
  \n## 带单个图表的 JMeter 沙盒\n\n本节所需的 JMeter .jmx 文件与上一节相同：\n\n```\nsampleJMeterScripts/jpt_ch07_sandbox.jmx\n\
  ```\n\n有了沙盒基础，只需添加你想要尝试的几十个测试元件中的一个即可！在图 7-20 中，我添加了 [jp@gc Response Times Over\
  \ Time](http://jmeter-plugins.org/wiki/ResponseTimesOverTime/) ( [`https://jmeter-plugins.org/wiki/ResponseTimesOverTime/`](https://jmeter-plugins.org/wiki/ResponseTimesOverTime/)\
  \ ) 并启动了测试（Ctrl+R 或 Cmd+R），瞧，出现了逼真的图表。使用 Ctrl+逗号或 Cmd+逗号停止。\n\n![A449023_1_En_7_Fig20_HTML.jpg](img/A449023_1_En_7_Fig20_HTML.jpg)\n\
  \n图 7-20.\n\n使用 JMeter 沙盒快速演示图表\n\n## JMeter 沙盒 / 同一图表上的多个指标\n\n本节展示如何将两个或多个指标放在单个\
  \ JMeterPlugins 图表上。\n\n要亲自查看效果，请在 jpt 仓库中查找此 .jmx 文件。在 JMeter 中打开它：\n\n```\nsampleJMeterScripts/jpt_ch07_multipleMetricsOnOneGraph.jmx\n\
  ```\n\n当然，进行猜测（有根据的猜测）是性能故障排查的关键部分。但如果猜测无法得到数据支持，我们都需要有足够的胸怀承认错误，并公开否定未经证实的断言。事实上，在第\
  \ 3 章中，我将指标称为猜测的解毒剂。因此，我认为开发人员需要稍微磨练一下查找、收集和高效呈现性能数据的技能，以便我们能够证实更多的猜测，或者干净利落地放弃它们。\n\
  \n为了观察一个指标对另一个指标的影响，我认为将两个不同的指标放在完全相同的图表上非常重要。在第 6 章关于可扩展性标尺的内容中，我向你们展示了一个例子。还记得我们必须检查需要多少负载线程才能将\
  \ SUT CPU 推高到 25% 吗？这两个指标是 CPU 和 JMeter 负载线程数。在这种情况下，负载线程数的增加影响了另外两个指标：CPU 和吞吐量都受到了影响——它们都增加了。\n\
  \n实际上，我最喜欢的四个起始指标是 CPU、响应时间、吞吐量和负载生成器线程数。\n\n为了帮助你快速掌握如何自己显示这样的图表，图 7-21 展示了我仍然使用\
  \ jp@gc - Dummy Sampler 沙盒的测试计划，将两个指标放在同一张图表上：jp@gc - Response Times Over Time 和\
  \ jp@gc - Transactions per Second。\n\n![A449023_1_En_7_Fig21_HTML.jpg](img/A449023_1_En_7_Fig21_HTML.jpg)\n\
  \n图 7-21.\n\n在同一张图表上获取多条线所需的测试计划\n\n一旦你按照图 7-21 所示将它们添加到负载计划树中，你需要告诉新的 jp@gc - Composite\
  \ Graph 要显示哪些指标。因此，我选中了 jp@gc - Composite Graph 并点击了“图表”选项卡。哎呀，但那里什么也没有，如图 7-22\
  \ 所示。\n\n![A449023_1_En_7_Fig22_HTML.jpg](img/A449023_1_En_7_Fig22_HTML.jpg)\n\n\
  图 7-22.\n\n一个可用性问题：“可用来源”框中未填充我想要在图表中显示的指标。解决方案见图 7-23。\n\n要解决这个小问题，你只需运行测试几秒钟然后停止测试。这将填充“可用来源”框，以便你可以选择想要查看的指标（图\
  \ 7-23）。\n\n![A449023_1_En_7_Fig23_HTML.jpg](img/A449023_1_En_7_Fig23_HTML.jpg)\n\
  \n图 7-23.\n\n图 7-22 中问题的解决方案。要让你的指标选择显示在“可用来源”框中，只需运行测试。然后停止测试，并双击“可用来源”中的选择项，将它们移动到“复合图表”部分。\n\
  \n一旦“可用来源”框被填充，你就可以双击想要移动到“复合图表”框中的指标。\n\n\n\n## 用于测试关联变量的 JMeter 沙箱\n\n接下来两个示例的\
  \ JMeter .jmx 文件位于 jpt 仓库的以下位置：\n\n```\nsampleJMeterScripts/ 文件夹中的 jpt_ch07_correlationVariables.jmx\n\
  ```\n\n在第 4 章中，我展示了许多情况下，负载生成器脚本需要介入并执行一些小的数据移动任务，这些任务在真实环境中是由被测系统的浏览器端 JavaScript\
  \ 完成的。但在那一章中，我试图以与负载生成器无关的方式来展示所有内容。本节将深入探讨 JMeter 的具体实现方法。\n\n有时，借助正确的被测系统功能，服务器端被测系统生成的唯一\
  \ ID 会被记录到你的负载脚本中。添加一个正确的脚本变量（我称之为“输出-输入”变量）将检索到新生成的值，而不是依赖最初记录到脚本中的单个静态值。这样，生成的\
  \ ID 就可以在后续请求中以某种方式提交（你需要自行解决这部分），例如作为查询参数或位于 HTTP POST 请求体的某个位置。\n\n但在将这样的生成 ID\
  \ 存入脚本变量之前，你的 JMeter 脚本首先必须从输出 HTML 流中大量文本中可能可预测的位置，找到那个特定的 ID。\n\n### 探索之旅——第一步，找到数据项\n\
  \n在输出 HTML 中查找数据项的两种流行方法是使用正则表达式或 XPath 表达式。选择你觉得最舒服的方式，但这里提供一个正则表达式的示例。\n\n第一步就是完善正则表达式，以便在\
  \ XML 或 HTML 中找到你的数据项。\n\n使用 JMeter 沙箱方法，首先创建一个如图 7-24 所示的小型沙箱测试计划。目标是简单地将你期望被测系统返回的\
  \ HTML 嵌入到 Dummy Sampler 中，然后使用 JMeter 尝试各种正则表达式，以确定能够正确识别数据的那个表达式。\n\n![A449023_1_En_7_Fig24_HTML.jpg](img/A449023_1_En_7_Fig24_HTML.jpg)\n\
  \n图 7-24.\n\n一个简单的 JMeter 沙箱计划，它返回一些硬编码的 XML（以 <CATALOG> 开头），其中包含要放入输出-输入变量的文本。\n\
  \n我们的目标是：找到能够定位以下文本的正则表达式：\n\n| `bobDylan-01.txt` 是我们想要放入输出-输入脚本变量的值。 | `<CD name=\"\
  file\" value=\"bobDylan-01.txt\">` |\n| 用于识别 `bobDylan-01.txt` 的正则表达式 | `name=\"\
  file\" value=\"(.+?)\">` |\n\n在运行此测试之前，\n\n1.  确保线程组配置为只执行 Dummy Sampler 一次（提示——确保“永远”复选框未被选中）；你不需要\
  \ 5235 次执行来调试这个——你只需要一次。\n2.  在“查看结果树”（图 7-25）中，确保“错误”和“成功”复选框未被选中。（在此处了解更多关于这些复选框的信息：[`http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree`](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree)\
  \ 。）这将确保没有任何结果被隐藏或过滤掉。\n\n    ![A449023_1_En_7_Fig25_HTML.jpg](img/A449023_1_En_7_Fig25_HTML.jpg)\n\
  \n    图 7-25.\n\n    JMeter [查看结果树](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree)（[`http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree`](http://jmeter.apache.org/usermanual/component_reference.html#View_Results_Tree)）——使用它来测试你的正则表达式是否有效。\n\
  \n只运行一次测试（运行 ➤ 启动 或 Cmd/Ctrl+R）。下面每个带编号的要点对应图 7-25 中的编号。\n\n1.  点击“查看结果树”以查看单次 Dummy\
  \ Sampler 执行的结果。\n2.  将组合框从默认的“文本”更改为“RegExp 测试器”。这基本上重新配置了用户界面，以便我们可以针对正则表达式测试硬编码的\
  \ XML 结果。\n3.  你看到 `jp@gc - Dummy Sampler - 01` 旁边带有对勾的绿色三角形了吗？选择它——这是 Dummy Sampler\
  \ 单次运行的结果。\n4.  最后，我们开始干正事。输入你想要测试的正则表达式的值，然后点击“测试”按钮。\n5.  这表明我们的正则表达式有效，因为它从 XML\
  \ 的其余部分中分离出了 `bobDylan-01.txt`。\n\n### 探索之旅——第二步\n\n现在是时候将你完善好的 XPath 或正则表达式放入适当位置了。右键点击\
  \ `jp@gc - Dummy Sampler`（或者实际产生你正在搜索的 HTML 或 XML 响应的 HTTP 请求）。选择 添加 ➤ 后置处理器 ➤ 正则表达式提取器（或\
  \ XPath 提取器）。你正在使用的提取器的 JMeter 文档也会告诉你如何指定用于存储提取出的值的 JMeter 脚本变量名称。你的 JMeter 测试计划应该如图\
  \ 7-26 所示。\n\n![A449023_1_En_7_Fig30_HTML.jpg](img/A449023_1_En_7_Fig30_HTML.jpg)\n\
  \n图 7-30.\n\n此图底部的“请求数据”字段模拟了 HTTP 请求的 POST 数据。`${MY_FILE_g1}` 变量是一个被传回被测系统的关联变量。\n\
  \n![A449023_1_En_7_Fig29_HTML.jpg](img/A449023_1_En_7_Fig29_HTML.jpg)\n\n图 7-29.\n\
  \n此“查看结果树”输出显示了 Debug Sampler 如何转储所有 JMeter 变量的值以用于调试目的。\n\n![A449023_1_En_7_Fig28_HTML.jpg](img/A449023_1_En_7_Fig28_HTML.jpg)\n\
  \n图 7-28.\n\nJMeter 正则表达式提取器。“正则表达式”字段用于在 HTTP 响应中搜索用于关联变量的文本字符串。\n\n![A449023_1_En_7_Fig27_HTML.jpg](img/A449023_1_En_7_Fig27_HTML.jpg)\n\
  \n图 7-27.\n\nJMeter Debug Sampler 和 `jp@gc—Dummy Samplers` 的名称非常相似。Debug Sampler\
  \ 作为一个简单的请求，用于在“查看结果树”中显示所有 JMeter 变量，如图 7-29 所示。\n\n![A449023_1_En_7_Fig26_HTML.jpg](img/A449023_1_En_7_Fig26_HTML.jpg)\n\
  \n图 7-26.\n\n在沙箱中创建 JMeter 关联变量时，负载计划树应如下所示\n\n当此操作运行时，JMeter 将尝试查找你正在寻找的值。然后它会将该值放入一个脚本变量中。要查看\
  \ JMeter 是否按预期完成了此操作，你需要添加一个 Debug Sampler，如图 7-27 所示。实际的调试信息将显示在图 7-27 顶部的“查看结果树”中。\n\
  \n图 7-28 展示了如何精确指定你想从 HTTP 响应中找到的内容。选择一个默认值很有帮助，该值可以指示何时可能出了问题。\n\n要查找调试信息以排查关联变量的问题，请点击测试计划（屏幕左侧）上的“查看结果树”，然后选择\
  \ Debug Sampler，如图 7-29 所示。\n\n最后，是时候使用从前一个采样器的响应中提取出的变量了。请注意图 7-30 中变量名（`MY_FILE_g1`）是如何用花括号包裹的。使用“美元花括号”语法来对变量进行求值。\n\
  \n\n\n## 前置条件\n\n在结束本章之前，我将列出一份你应该掌握的事项清单：\n\n*   录制 JMeter 负载脚本。录制过程中，将每一个字节都保存到日志文件中，以备将来参考。\n\
  *   将登录脚本标记为“仅运行一次”。\n*   以无头模式运行 JMeter。\n*   调试 JMeter 负载脚本。\n*   配置负载脚本以使用 `.csv`\
  \ 数据文件中的数据。该文件应包含要登录的用户列表、要查询的账户和客户列表。\n*   创建断言以验证某些操作确实发生了，即你的被测系统（SUT）确实在正常工作。\n\
  *   使用关联变量，捕获一个请求的输出并将其提交给另一个请求的输入。\n*   创建负载递增和递减的负载计划。\n*   创建一个根据生产环境中业务流程百分比来分配负载的负载计划。\n\
  *   创建并使用 JMeter 变量，或许可以从命令行读取变量。\n\n负载生成特性：\n\n*   使用多种网络协议：HTTP/S、JMS、Sockets、JDBC。\n\
  *   以无头模式运行；也可以在与 SUT 相同的机器上运行。\n*   使用 JMeter 便捷的复制/粘贴功能。\n\n图表特性：\n\n*   复合图表\n\
  *   CPU/资源消耗\n*   JMX\n*   Grafana/InfluxDB 集成\n\n必须了解：\n\n*   避免过多的日志记录。\n*   `.jtl`\
  \ 文件\n    *   读取\n    *   写入\n    *   输出文件数量？1、2 或 3 个\n    *   合并\n    *   清除 UI\
  \ 结果不会清除数据文件。\n*   使用 JDBC 取样器创建数据。\n*   使用“查看结果树”保存初始录制内容。\n*   管理颜色。\n*   Maven、ANT、Jenkins\
  \ 集成。\n*   线程组：分离取样器（SOA）或组合取样器（Web）。\n*   调试技巧：\n    *   在将测试计划连接到真实的 HTTP 系统之前，使用虚拟取样器指定示例\
  \ HTML 响应。BSF 后置处理器：`var myVariable = vars.get(\"MY_VARIABLE\");` `OUT.println('MY_VARIABLE\
  \ 的值是 [' + myVariable + ']' )`\n*   断言。配置断言，当出现错误文本时触发警告。\n*   监听器应放置的位置。\n\n##\
  \ 别忘了\n\n本章介绍了 JMeter 的一些功能，这些功能很少（如果有的话）被记录在案，以及其他虽有文档记录但仍给许多我教过的技术人员带来麻烦的功能。\n\
  \n别忘了，如果你无法弄清楚如何让某个 JMeter 功能正常工作，可以创建一个小的“Hello World”沙盒式 `.jmx` 脚本来试验该功能。将一段 HTML（或\
  \ json、XML 等）代码片段复制粘贴到虚拟取样器中，以便你的测试计划可以对其进行操作。几乎每一个 JMeter 测试元素都可以这样测试。你可以试验日志记录、负载计划、关联变量、JMeter\
  \ 断言、复合图表（同一图表上的多个指标），应有尽有。\n\n## 下一步\n\n下一章将概述本书附带的两个示例应用程序。这些应用程序重现了“一次编写，到处运行”（WORA）的性能缺陷，这些缺陷在大型和小型环境中均可检测到。这些示例将为你提供动手经验，让你在可用的情况下连接“即插即用”的性能和可观测性工具，帮助你快速发现并修复性能缺陷。\n\
  \n脚注 1\n\n[`http://jmeter-plugins.org/wiki/Contributors/`](http://jmeter-plugins.org/wiki/Contributors/)\n\
  \n  2\n\n[`http://jmeter.apache.org/usermanual/get-started.html#template`](http://jmeter.apache.org/usermanual/get-started.html#template)\n\
  \n  3\n\n我本人从未在 ESL 课堂上垫底，但在堪萨斯大学攻读计算机学位之前，我确实在俄语课程中不及格。\n\n"
- '# 第三部分

  P.A.t.h. 检查清单与性能故障排除


  '
- "# 8. P.A.t.h. 检查清单简介\n\n在引言中，我曾问过你能否在短短 30 分钟内接近性能问题的根本原因。这大约就是捕获和审查 P.A.t.h. 检查清单中四项数据所需的时间。\n\
  \n但在深入探讨检查清单的技术细节之前，本章将快速回顾前几章的内容。然后，它将描述在故障排除时如何使用检查清单，最后简要介绍两组代码示例。\n\n本章的目标是：\n\
  \n*   理解使用 P.A.t.h. 检查清单识别和修复性能问题的基本原则。\n*   理解如何运行 javaPerformanceTroubleshooting\
  \ 和 littleMock 代码示例。\n*   理解 javaPerformanceTroubleshooting 和 littleMock 代码示例的架构。\n\
  \nP.A.t.h. 检查清单中的前两项，即数据库持久化（P）和与其他（外部=A）系统的网络连接，是历史上常见的导致性能问题的集成点。JDBC 是持久化工作的重点，但这些概念几乎适用于任何数据库。最后两项，t.\
  \ 和 h.，则检查执行代码的线程（t）和内存消耗（h.，即堆），以及其内存回收过程——垃圾回收器。因此，P.A.t.h. 检查清单更深入地审视了几个关键集成点的性能健康状况，以及支撑所有处理的线程和内存管理。是的，本书的重点是最常见的问题，但所使用的工具集能够发现几乎任何问题。\n\
  \n对于真实世界的系统，你需要查看 P.A.t.h. 检查清单中所有四项的数据。你需要判断哪一项看起来最不健康，然后专注于调优该部分。但在接下来的四个 P.A.t.h.\
  \ 章节中，我会直接告诉你哪个检查清单项（提示：看章节标题）是导致拖累性能的主要单一性能问题，从而让你更轻松。\n\n\n\n## 快速回顾\n\n前三章为性能调优的预期奠定了基础。\n\
  \n*   第 1 章：我提前介绍了主要的性能反模式，以便你在排查性能缺陷时对需要关注的内容有个大致概念。从第一个反模式开始，判断它是否与你遇到的问题相符。如果匹配，通常可以就此打住；否则，请依次检查第二、第三和第四个反模式。\n\
  \    1.  **不必要的初始化**：主要发生在请求的主（较大）处理事件之前和期间的小型处理挑战，通常涉及少量 I/O 但会重复多次。\n    2.  **策略/算法低效**：配置不当或选择不佳的算法或编码策略导致了性能问题。策略是贯穿整个代码库使用的技术，而算法是用于实现单个组件的方案。\n\
  \    3.  **过度处理**：系统正在执行不必要的工作。移除这些工作能带来可衡量的性能提升。一个例子是检索了过多数据，其中大部分数据被丢弃。另一个例子是在负载测试中包含了错误的、资源消耗大的用例——该用例在生产环境中很少使用。\n\
  \    4.  **大型处理挑战**：尝试处理并征服海量数据。很少有应用真正有这种需求，但确实存在。其他例子包括查询 40 亿行数据、在慢速网络上重复传输 10MB\
  \ 数据等。\n*   第 2 章：适度的调优环境：本章展示了大多数性能缺陷如何在大型和小型环境中都能被发现。它介绍了一些在较小环境中非常有用的技术（如存根服务器、按\
  \ PID 绘制 CPU 图表），在这些环境中调优效率尤其高，一天内可完成多达 10 个修复-测试周期。\n*   第 3 章关于指标，它就像一件救生衣，防止你在决定使用哪些性能指标时陷入一片混乱的海洋中：\n\
  \    *   **负载生成器指标**，在很大程度上，用于评估性能要求是否已满足。吞吐量足够吗？响应时间够快吗？\n    *   **资源消耗指标**显示硬件、CPU\
  \ 或 RAM 何时耗尽，这意味着你需要更多硬件，或者需要调优系统以减少消耗。\n    *   最后，**“责任指标”**指向被测系统（SUT）中导致速度变慢或\
  \ CPU 高消耗的组件；这正是我们接下来要处理的部分。接下来四章中的 P.A.t.h. 检查清单提供了这些“责任”指标。\n\n但在你能重现并解决性能故障排除问题之前，你必须首先掌握负载生成的基础知识，正如我在负载生成章节第\
  \ 4 章、第 5 章、第 6 章和第 7 章中详述的那样。在进入将责任归咎于缓慢或有问题的 SUT 组件的部分之前，让我们通过一个快速概览将这些基础知识牢牢印在你的脑海中。\n\
  \n*   第 4 章关于负载脚本优先级，讨论了如何录制和增强负载脚本以产生真实的负载。别忘了我们如何将各种脚本增强分解为**第一优先级**和**第二优先级**。第一优先级的脚本增强足以对\
  \ SUT 的基本架构施加压力，修复单个性能缺陷可以改善整个架构中许多业务流程的性能。第二优先级的脚本增强旨在为单个业务流程增加“系统真实性”的触感。修复这类缺陷可能至关重要，但其影响仅限于单个业务流程。\n\
  *   第 5 章关于无效负载测试，详细说明了一些（屡见不鲜的）情况，这些情况使得给定的负载测试与生产环境如此不同，以至于结果应该被丢弃。这是你从我和其他人犯过的众多错误中学习的机会。不要通过广域网生成负载。在调优前提高资源上限，在部署到生产环境前降低它们。再三检查负载脚本中的业务流程（和数据）是否与生产环境中使用的基本匹配。增强你的负载脚本，确保没有错误并且返回了正确的数据。警惕地使用\
  \ Brendan Gregg 的 USE 方法：[`http://www.brendangregg.com/usemethod.html`](http://www.brendangregg.com/usemethod.html)\
  \ 来持续监控资源消耗。不要浪费时间调优边缘情况。\n*   第 6 章关于可扩展性标尺，提供了日常运行哪些测试以及施加多少负载的明确指令。医生会通过扭动你扭伤的脚踝并逐渐增加压力，直到你表现出疼痛迹象来评估其健康状况。同样，可扩展性标尺负载测试指导你增加负载，直到\
  \ SUT 从负载生成器指标中显示出“性能不佳”的迹象。还记得那干净、整齐的吞吐量阶梯吗？你首先将 SUT（及其性能问题）置于显微镜下。通过使用可扩展性标尺负载测试重现性能问题来实现这一点。你还记得这是如何工作的吗？你运行一个包含四个负载步骤的增量负载测试，第一步将应用服务器\
  \ CPU 推高到 25%。然后观察在四个步骤中的哪一步，整齐的吞吐量阶梯会瓦解成锯齿状、跳跃的混乱状态——这样你就重现了问题。\n*   第 7 章展示了在通过线路发送实时\
  \ HTTP 请求之前，如何在小型沙盒环境中测试 JMeter 中的任何内容。它展示了负载测试的高级树形结构，以及如何捕获和显示来自 SUT 的额外指标，如 CPU\
  \ 消耗。校准可扩展性标尺测试变得容易得多，因为我们在单个 JMeter 图表上就能精确看到需要多少个线程才能将应用服务器 CPU 推高到 25%。\n\n\n\
  \n## 运用 P.A.t.h. 检查清单\n\n在完成了这些略显枯燥的基础工作之后，舞台已经准备就绪，让我们敲响开场鼓。接下来的四个章节将最终展示如何识别、定位并最终修复\
  \ SUT 中导致性能问题的特定组件。\n\n为了给自己留出时间，通过这四种不同的“透镜”来审视问题，你需要手动重新配置你的负载计划：从原先的增量负载四步骤，改为在“干净、方正的吞吐量阶梯”消失后的第一个层级上，进行单次稳态测试。或许可以将测试时长设置为\
  \ 20-30 分钟，同时要知道，一旦这些性能透镜显示出可操作的情报，你就会立即停止测试。\n\n例如，假设你的“可扩展性标尺”测试在每个负载级别都使用两个线程运行，并且每个级别持续\
  \ 2 分钟。如果你在约 25% CPU（两个线程）和 50% CPU（四个线程）时得到了干净、棱角分明的阶梯，但之后没有出现棱角分明的跃升，那么用于“复现 Bug”的稳态测试就需要在六个线程下运行整个时长（20-30\
  \ 分钟）。\n\n当存在性能问题的负载测试以稳态运行时，你将使用检查清单中的四个项目来审视 SUT。你所遇到的问题（或问题们）将会在一个或多个透镜中显现出来。那么，通过透镜观察意味着什么呢？\n\
  \n正如你将在接下来的章节中看到的，四个检查清单项目中的每一个都有其自己的一套监控和追踪工具（免费可用），我将描述如何捕获和解释来自每个工具的数据，并为每个检查清单项目给出“有问题”或“无问题”的评估。目标当然是定位问题。找出系统中导致性能问题的特定组件，然后构思出一个修复方案。\n\
  \n正如后续章节将向你展示的，四个检查清单项目会指出一些问题。你需要主观地选择其中一个问题作为首要攻击目标——选择那个能带来最大性价比的问题。换句话说，你通常希望攻击那个能以最小努力带来最大性能提升的缺陷，这可能是一个代码变更、配置变更、数据变更，甚至是负载脚本变更。\n\
  \n以下是 P.A.t.h. 检查清单中的四个项目：\n\n*   P    Persistence（持久化）：慢速的 JDBC 调用以及过度调用某个 SQL。\n\
  *   A    Alien systems（外部系统）：对主 JVM 外部系统的网络调用。\n*   t    Threads（线程）：CPU 过度消耗和线程阻塞。\n\
  *   h    Heap（堆）：垃圾回收效率低下和内存泄漏。\n\n但这四个特定领域有什么特别之处呢？首先，这只是对当今最常见的服务端性能问题位置进行分类的一种便捷方式，同时也是为了将这些位置与其各自的可观测性工具配对。但更实际地说，P\
  \ 代表持久化，即数据库，并且业界广泛认为数据库的性能问题比其他任何领域都多。我们将重点讨论 JDBC 系统，但 P 章节中关于 JDBC 性能的相同问题也同样适用于\
  \ NoSQL 数据库；所有这些都将在第 9 章中介绍。我创造了“Alien systems”（外部系统）这个术语——它有点像是一个占位符，用于指代我们的 JVM\
  \ 通过网络通信的任何系统所出现的性能问题。这将在第 10 章中讨论。\n\n所以，P 和 A 是我们集成的系统。而 t 和 h 则不同。我们的每一行 Java\
  \ 代码都是由操作系统线程执行的，因此 t（Threads，线程）用于探索线程效率。是否存在阻塞的线程？（稍后会详细介绍。）是否存在不必要地消耗大量 CPU 的小型处理挑战？最后，PATH\
  \ 中的 h 代表堆（Heap）的健康状况。糟糕的垃圾回收效率会严重影响性能和稳定性。我一直犹豫是否要涉足理解 GC 算法这片复杂的水域。除此之外，h 章节会特意展示，要改善性能，你对\
  \ GC 的了解竟然可以少得惊人。t 和 h 将分别在第 11 章和第 12 章中讨论。\n\n我之前提到过，P.A.t.h. 中的 P 和 A 用大写字母拼写出来，是因为它们很特殊：大多数情况下，你只需通过单个用户的流量就能检测到这些领域的问题。之所以如此，其中一个原因是，对一个大型、无索引的表执行一次孤立的查询通常会很慢，比如慢于\
  \ 1 秒。同样地，执行 100 个 SQL/NoSQL 请求，无论用户数量多少（哪怕只有一个），也可能会很慢（超过 1 秒）。\n\n由于不需要负载，并且捕获\
  \ P 和 A 活动的单次样本更容易，你就能获得巨大的好处：无需负载脚本（例如 JMeter 脚本）和负载环境，就能检测并修复性能问题——任何环境对于 P 和\
  \ A 来说都足够了。对一个大型表进行无索引查询就是一个很好的例子，降低响应时间将带来更高的吞吐量。\n\n不幸的是，同样的方法对 P.A.t.h. 中的 t\
  \ 和 h 并不适用。为什么？因为需要不止一个线程才能导致与 `synchronized` 关键字相关的性能问题。同样，需要大量的流量才能加剧内存泄漏或配置不当的垃圾回收（Garbage\
  \ Collection）问题。\n\n当你运行“可扩展性标尺”测试来复现性能问题时，检查清单中的四个项目会告诉你哪些组件是性能问题的罪魁祸首。当然，在运行单个测试时，你可能会在多个检查清单项目中发现多个问题。如果是这样，你将需要对这些问题进行优先级排序，并决定首先修复哪一个。\n\
  \n在这个优先级排序过程中，你将需要做出类似这样的决定：“我们应该先调优哪个？是系统中耗时 1.5 秒的最慢查询，还是 XML 处理中反复出现的 BLOCKED\
  \ 线程？”\n\n记住 P.A.t.h. 这个缩写词：持久化（Persistence）、外部系统（Alien systems）、线程（Threads）和堆（Heap）。我在关于负载脚本优先级的章节中首次提到过这一点，但请记住，前两个检查清单项目——持久化和外部系统——无需生成负载就能凸显出许多调优机会；换句话说，当单个用户遍历系统时即可发现。如果你的性能环境尚未搭建，或者你的负载脚本尚未创建，你仍然可以开始着手改善性能。\n\
  \n\n\n## 运行示例\n\n由于性能问题可能以多种方式出现，P.A.t.h 系统将问题分解为四个更易于理解的类别。其组织方式有助于把握这个庞大的性能问题领域。本书附带的大多数在线示例仅突出四个领域之一中的一个性能问题。一次只关注一个问题的简单性，对于集中精力解决那些经常未被发现的性能问题以及用于检测这些问题的工具非常有帮助。\n\
  \n本书附带两个不同的 github.com 项目。第一个我将其称为 jpt，代表 Java 性能故障排除。它附带大约 12 对示例。在每一对中，其中一个存在性能问题，而另一个则没有——我已经为您修复了它。这两个测试分别标记为\
  \ a 测试和 b 测试。第 2 章的表 2-1 列出了全部 12 对测试。\n\n然而，我为您修复这些问题，并且一次只训练您关注一个问题——这有点不切实际。更不切实际的是，我提前告诉您问题是\
  \ P、A、t 还是 h 问题。如果我告诉您某个特定测试是 P 问题，那么您就知道要连接我为类似 P 问题规定的监控/可观测性工具。这非常直接，但不现实。在现实世界中，问题通常一开始只是表现为糟糕/缓慢，而发现问题潜伏在四个领域中的哪一个，是您的责任。\n\
  \n这意味着您通常必须使用 P.A.t.h. 清单中所有四个项目的工具来全面了解情况，我试图在测试 09a 中模拟这种情况。这是一个许多问题混合在一起的示例。没有测试\
  \ 09b。\n\n## Java 性能故障排除 (jpt) 示例应用\n\n有一些小型脚本用于启动应用程序的各个部分。按照惯例，每当我提到以 .sh 结尾的\
  \ Bash 脚本时，您都会找到相应的以 .cmd 结尾的 MS-Windows 脚本（位于同一文件夹中）。\n\n图 8-1 展示了 jpt 应用程序的粗略架构。\n\
