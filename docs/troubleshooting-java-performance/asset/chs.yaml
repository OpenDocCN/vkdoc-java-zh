  \n### 如何让代码更快\n\n一旦你找到需要关注的慢速代码，除非你有优化方面的好主意，否则就该求助于互联网了。如果你排除了环境特定因素，比如“处理过多数据”、“虚拟机配置错误”或“网线故障”，答案就在互联网上。我告诉你，你不是第一个在使用常用\
  \ API 时遇到性能问题的人。例如，我搜索“XPathFactory.newInstance() performance”时，找到了若干讨论，这些讨论引导我找到了清单\
  \ 11-11 中的修复方法。实际上，第三个线程和第四个线程（各自仅出现在一个堆栈跟踪中的那两个）都有类似的问题，并且都通过此处展示的更改得到了解决。\n\n\
