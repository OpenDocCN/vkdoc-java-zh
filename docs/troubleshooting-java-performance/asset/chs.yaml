  \ 吞吐量下降，但仅在慢速泄漏填满堆之后。 |\n| 12 | 7157 | 9001 | 年轻代过小 |   |\n\n表 2-1 中的每一行都详细说明了两个测试——一个包含特定性能缺陷，另一个则不包含。在不同行之间，A\
  \ 测试或 B 测试哪个包含缺陷是变化的。具有较高 RPM 的测试性能更好，尽管存在少数例外情况，其中除 RPM 之外的其他因素决定了最佳性能。\n\n与这组示例类似，大多数性能缺陷都是“一次编写，随处运行”（WORA）缺陷，因为无论您是在大型集群环境还是小型笔记本电脑上运行它们，该缺陷都会存在并且可以被检测到。\n\
  \n我不期望其他人能复现我在该表中包含的精确数字。相反，主要思想是要理解，对于任何测试编号（例如 05a 和 05b），a 测试和 b 测试之间都存在具体且可重复的性能差异。\n\
  \n我根据过去十年作为全职 Java 服务器端性能工程师的经验选择了这组特定的缺陷。在此之前的十五年里，作为一名开发人员、团队负责人和架构师，我基本上看到了同样的问题。\n\
  \n这个列表是否与您所见完全吻合尚有争议；您的情况可能会有所不同。但我相当确信，这些缺陷对于服务器端 Java 开发人员来说会非常熟悉。更重要的是，揭示这些问题原因的工具和技术比这个缺陷列表本身更具通用性。这套工具将有助于检测此列表中未包含的大量问题。\n\
  \n再次说明，刚刚展示的 12 个示例是第一组示例（jpt）的一部分。我们将在第 8 章讨论第二组示例（littleMock）。敬请期待。\n\n## 面向开发者的调优环境\n\
  \n由于这些缺陷在大型和小型环境中都可以被检测到，我们不再需要等待大型环境来调优我们的系统。我们几乎可以在任何我们想要的环境中进行调优。这意味着，当我们集思广益，思考我们的调优环境应该是什么样子时，我们有了选择，而且是很有吸引力的选择。那么，对于一个优秀的调优环境，您的愿望清单上会有什么呢？以下是我清单上的首要事项：\n\
  \n*   大量的 RAM。\n*   拥有系统的 root 或管理员权限（或者至少是非常好的安全访问权限）。在 Linux 中，可以使用 `sudo` 来授予对某些\
  \ root 命令的访问权限，而不授予其他命令。这使一切变得更容易——监控、部署代码、查看日志文件等等。\n*   能够快速更改/编译/构建/打包和重新部署代码。\n\
  \n除此之外，我需要一个好的项目经理来保持我的日程安排清晰。但除此之外，令人惊讶的是，所需的东西很少。有了这个简单的清单和本书中介绍的调优方法，您就可以在系统调优方面取得巨大进展。\n\
  \n大多数大型生产级环境（图 2-1）都缺少这个愿望清单中的重要事项：代码重新部署很慢（需要数小时或数天，并且涉及大量繁琐流程）。然后，调优系统的人员很少获得足够的安全访问权限，无法对关键系统组件进行彻底而快速的检查。这就是我们在引言中讨论过的“大型环境瘫痪症”。\n\
  \n![A449023_1_En_2_Fig1_HTML.gif](img/A449023_1_En_2_Fig1_HTML.gif)\n\n图 2-1.\n\n\
  传统全尺寸性能调优环境\n\n这里展示的环境可能具有冗余和大量的 CPU；这些都是很棒的东西，但我愿意为了一个我可以完全访问的小型环境（比如我的笔记本电脑或台式机）而牺牲它们。图\
  \ 2-2 展示了一种将图 2-1 中几乎所有内容压缩到仅两台机器上的方法。\n\n![A449023_1_En_2_Fig2_HTML.gif](img/A449023_1_En_2_Fig2_HTML.gif)\n\
  \n图 2-2.\n\n仅使用两台机器的适中性能调优环境\n\n乍一看，这个小型环境的设计似乎做出了妥协。实时大型机和实时云服务消失了。冗余消失了。此外，由于我们将多个组件（负载生成器、Web\
  \ 服务器、应用服务器和桩模块）压缩到一台机器上，RAM 耗尽是一个大问题。这些都是值得关注的问题，但称它们为妥协，就像指责婴儿在学会走路之前先学会爬行一样。这个小型开发者调优环境是我们站稳脚跟的地方，是我们理解如何让系统表现良好的地方，这样我们就可以避免在摇摇欲坠的基础上构建系统的其余部分——那个我们太过熟悉的基础。\n\
  \n为了让这个理想化的目标落到实处，本书附带的十二个“可在您自己的机器上运行”的性能缺陷示例将有助于使这一切变得具体。每个示例负载测试实际上都是一对测试——一个包含性能缺陷，另一个是重构版本，具有可衡量的更好性能。\n\
  \n但我们还没有谈到我们集成的所有后端系统——大型机、第三方系统，有很多。让这些真实系统在我们的适中调优环境中可用，其工作量巨大，以至于成本效益不高。那么，没有这些系统我们如何进行调优呢？\n\
  \n在适中的调优环境中，这些后端系统被简单的“替身”程序所取代，这些程序接受来自您系统的真实请求。但是，这些替身程序并不实际处理输入，而是简单地返回预先录制或预先配置的响应。\n\
  \n在本章的剩余部分，您将看到一些非常优秀的工具集的概述，这些工具集有助于快速创建这些替身程序，我们将这个过程称为“对后端进行桩化”。\n\n\n\n为了实时掌握这些临时程序（我将其称为**存根服务器**）的资源消耗是否合理，能够绘制出机器上各进程的实时\
  \ CPU 和内存消耗图表会很有帮助。我们将在下文讨论用于绘制图表的工具集，但下一节会先探讨在轻量级负载测试环境中使用任何网段所涉及的风险。就我个人而言，任何一个存根服务器的资源消耗（无论是内存还是\
  \ CPU）都不能超过 10%–15%。\n\n## 网络\n\n我本可以将图 2-2 画成只有一台机器，但考虑到要找到一台内存足够容纳所有组件的机器可能比较困难。所以，如果你的内存足够，我建议将所有组件部署在一台机器上，以进一步贯彻**代码优先**的调优方法。\n\
  \n本节将展示将大型环境中的多个组件整合到一两台机器上的一些好处。\n\n假设你测试的所有部分——服务器、数据库、测试机器等——都在同一个数据中心。如果你将负载生成机器（比如一台运行\
  \ JMeter 的小型虚拟机）迁移到另一个数据中心（通常网络速度会更慢），然后运行完全相同的负载测试，响应时间会急剧上升，吞吐量则会骤降。即使负载生成在同一数据中心，通过网络生成负载也会让你面临风险，因为你是在别人的地盘上操作。而在那个地盘上，网络性能由他人掌控。想想维护网络性能所涉及的所有组件：\n\
  \n*   防火墙\n*   作为安全措施运行的带宽限制软件（如 NetLimiter）\n*   HTTP 代理服务器（如果访问互联网）\n*   硬件——路由器、内容交换机、CAT5\
  \ 线缆等\n*   负载均衡器，尤其是其管理并发的配置\n\n当我的老板紧盯着我，确保我的代码性能达标时，这些网络组件的所有者没有一个能随时为我提供帮助。所以，可以说，我把它们从脚本中剔除了。只要可能，我都会设计负载测试来避免网络依赖。一种方法是在与\
  \ Java 容器相同的机器上运行更多进程。\n\n我承认，将这些组件部署在同一台机器上有点不符合常规，就像你的朋友看到你离开辅助轮就不会骑自行车时嘲笑你一样。当服务于一个战略目的——解决非常真实的性能焦虑时，我乐于采用像使用辅助轮这样看似胆小的策略。让我们借助辅助轮，专注于代码调优，并为应用程序建立一点信心。\n\
  \n一旦你的团队在开发者调优环境中对性能建立了更多信心，就可以卸下辅助轮，开始在更接近生产环境的网络配置下进行负载测试和调优。但在起步阶段，通过在调优环境中避免网络依赖，我们可以愉快地消除大量风险，从而推进我们的**代码优先**策略。\n\
  \n## 对后端系统进行存根处理\n\n如果你个人已准备好开始调优，但某个后端系统无法用于负载测试，那么在搭建环境时就会遇到一些困难。不过还是有办法的。简单地注释掉代码中对该不可用系统的网络调用，并用硬编码的响应来替代，这会非常有帮助。这样可以看到系统其余部分的性能表现，但这种方法有点\
  \ hack 的味道。为什么？因为修改硬编码响应的内容需要重启。此外，由于你注释掉了调用，网络 API 在负载下得不到验证。同时，任何针对后端网络调用的监控措施也将无法得到测试。\n\
  \n我建议不要使用硬编码，而是运行一个虚拟程序，我称之为**网络存根服务器**。这种通用做法也被称为**服务虚拟化**。¹ 存根服务器程序充当不可用系统的替身，接收网络请求并返回预先录制（或仅仅是预先配置）的响应。\n\
  \n你可以配置网络存根，使其根据输入请求的内容返回特定的响应消息。例如：“如果存根服务器收到一个 HTTP 请求，且 URL 路径以 `/backend/fraudCheck`\
  \ 结尾，则返回特定的 JSON 或 XML 响应。”\n\n如果系统中有许多（可能是几十或几百个）请求-响应对，可以使用网络录制和回放方法来捕获配置所需的大部分数据。\n\
  \n在评估使用哪个网络存根服务器时，请务必寻找具备以下特性的：\n\n*   允许你在不重启网络存根程序的情况下重新配置请求/响应。\n*   允许你配置响应时间延迟，以模拟响应时间与你后端系统相似的后端。\n\
  *   允许自定义 Java 代码来定制响应。例如，调用存根的系统可能需要在响应中包含当前时间戳或生成的唯一 ID。\n*   允许你根据输入 URL 和/或\
  \ POST 数据的内容来配置特定的响应。\n*   提供录制和回放功能。\n*   与录制和回放类似，能够查询最近的请求-响应对也很不错。\n*   网络存根程序可以从单元测试中启动，也可以作为独立程序运行。\n\
  *   可以配置为监听任何 TCP 端口。\n\n如果你的后端系统有 HTTP/S 入口点，那你很幸运，因为有许多成熟的、专为 HTTP 设计的开源网络存根服务器：\n\
  \n*   Wiremock：`wiremock.org`\n*   Hoverfly：[`https://hoverfly.io/`](https://hoverfly.io/)\n\
  *   Mock Server：[`http://www.mock-server.com/`](http://www.mock-server.com/)\n*\
  \   Betamax：[`http://betamax.software/`](http://betamax.software/)\n\n但对于其他协议，如\
  \ RMI、JMS、IRC、SMS、WebSockets 和普通套接字，目前还没有同等成熟度的存根服务器。因此，对于这些协议，尤其是专有协议和消息格式，你可能不得不采用老办法：直接注释掉对后端系统的调用，并编写硬编码的响应。但这里还有一个最后的选择：你可以考虑编写自己的、针对你的协议和专有消息格式定制的存根服务器。在认为这项工作过于庞大而放弃之前，请快速浏览一下这三个成熟的开源网络\
  \ API：\n\n*   Netty：[`https://netty.io/`](https://netty.io/)\n*   Grizzly：[`https://grizzly.java.net/`](https://grizzly.java.net/)\n\
  *   Mina：[`https://mina.apache.org/`](https://mina.apache.org/)\n\n这三个 API 都是专门为快速构建网络应用程序而设计的。事实上，这里有一个演示，展示了如何使用\
  \ Netty 在不到 250 行 Java 代码中构建一个自定义的 TCP 套接字服务器：\n\n[`http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html`](http://shengwangi.blogspot.com/2016/03/netty-tutorial-hello-world-example.html)\n\
  \n这可以成为为你内部使用专有消息格式的 TCP 套接字服务器构建存根服务器的一个良好开端。\n\n\n\n### 使用 Wiremock 模拟 HTTP 后端\n\
  \n图 2-3 和图 2-4 展示了一个快速示例，说明如何启动、配置并向 Wiremock（我最喜欢的 HTTP 模拟服务器）提交请求。\n\n![A449023_1_En_2_Fig4_HTML.gif](img/A449023_1_En_2_Fig4_HTML.gif)\n\
  \n图 2-4.\n\n用于配置 Wiremock 返回预定 HTTP 响应的 HTTP POST 请求的 JSON 主体\n\n![A449023_1_En_2_Fig3_HTML.jpg](img/A449023_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3.\n\n使用 `java -jar` 选项运行 wiremock.org 模拟服务器的启动横幅\n\n使用简单的 `java -jar` 方法启动\
  \ Wiremock 非常容易：只需执行 `java -jar wiremock.jar`，它就会立即启动，监听 8080 端口上的 HTTP 请求（该端口可配置）。\n\
  \n启动后，您可以调用 HTTP/json 来配置请求-响应对，以模拟您的后端。您将 JSON 数据 POST 到 `http://<host>:<port>/__admin/mappings/new`。然后，您可以将这些调用保存在\
  \ SOAP UI、Chrome Postman 或 JMeter 脚本中，并在负载测试前直接执行它们。在图 2-4 中，JSON 表示：“如果 Wiremock\
  \ 收到一个对 `/some/thing` 的 `GET` 请求，那么等待 5 秒后，返回 ‘Hello world!’ 作为响应。”\n\n一旦您将上述代码\
  \ POST 到 `http://localhost:8080/__admin/mappings/new`，您应该尝试测试新的模拟桩，如图 2-5 所示。\n\n\
  ![A449023_1_En_2_Fig5_HTML.jpg](img/A449023_1_En_2_Fig5_HTML.jpg)\n\n图 2-5.\n\n\
  使用 Chrome 测试新创建的 Wiremock 配置（图 2-4）\n\n……果然，浏览器直到 Wiremock 等待了我们通过 JSON 中的 `fixedDelayMilliseconds`\
  \ 属性要求的 5000 毫秒后，才显示出 “Hello world!”。\n\n这并不太难，对吧？总结一下，下载 Wiremock jar 包并以 `java\
  \ -jar` 方式运行。然后提交 Wiremock 的 JSON-over-HTTP 配置消息，基本上就是教会 Wiremock 针对您的后端支持的每个 HTTP\
  \ 请求返回哪个响应。最后，启动您的应用程序，让它向 Wiremock 发送请求，Wiremock 将返回您配置好的响应。就是这样。\n\n## 本地负载生成\n\
  \n秉持“代码优先”的理念，双机开发者调优环境（图 2-2）的核心是您的代码——一个用于 Web 层的单个 JVM，它向一个用于应用层的单个 JVM 发起调用。\n\
  \n以下是我们要关注的其他部分。\n\n首先是刚刚讨论过的模拟服务器。它们替代了大型机和云服务。对实际系统进行性能审查需要等到以后，可能是在集成测试环境中。\n\
  \n最终，我们会加入一些监控，但进入开发者调优环境的最后一个组件是负载生成器，这也是本节的主题。\n\n### 负载生成快速概览\n\n负载生成器是一种网络流量生成器。我们用它来对支持网络的软件应用（如\
  \ SOA 或 Web 应用的服务器端部分）施加压力，以查看响应是否足够快，并确保其不会崩溃。\n\n当然，向 Web 应用发送随机流量是没有帮助的——我们需要提交\
  \ Web 应用设计用来处理的确切类型的 Web 请求。为此，大多数负载生成器（如 JMeter）使用录制-回放的方法来精确生成流量。其工作原理如下：在一个空闲的系统上，您使用\
  \ Web 浏览器手动浏览您的应用程序，同时一个特殊工具（随负载生成器提供）会记录您的浏览器发出的网络请求。\n\n该录制的输出是一个特定于工具的脚本，它可以逐字回放单个用户的流量，从而对被测系统施加一点压力。然后，为了模拟动态工作负载并摆脱逐字回放，您需要增强脚本，使其能够登录（数据驱动的）各种用户，并对被测系统中的各种“事物”（无论被测系统处理的是什么——比如购买皮划艇、海牛约会服务、发布新闻故事等）进行操作。在硬件允许的情况下，负载生成器可以根据需要启动任意数量的线程来模拟大量用户。\n\
  \n### 负载生成器的职责\n\n负载生成器主要有以下职责：\n\n1.  在您浏览系统时记录网络流量，并将导航细节保存到脚本中。\n2.  允许您编辑/调试/增强脚本，使其更接近生产负载。\n\
  3.  在单个线程中运行脚本，并允许多个线程同时运行同一个脚本，从而对您的系统施加负载。这就是“负载生成”。\n4.  通过实时图表/显示和/或测试后报告来显示响应时间、吞吐量和其他测试结果。\n\
  \n图 2-2 中的“负载生成器”特指职责 3，即负载生成。您可以根据需要在任何地方以任何方式处理职责 1、2 和 4。\n\n事实上，JMeter 负载生成器的启动横幅就提到了这一点（图\
  \ 2-6）。\n\n![A449023_1_En_2_Fig6_HTML.jpg](img/A449023_1_En_2_Fig6_HTML.jpg)\n\n\
  图 2-6.\n\nJMeter 发出的警告：不要在负载测试期间使用 GUI\n\n思路是使用 JMeter GUI 模式来创建、录制和完善您的负载脚本。运行少量负载（可能每秒少于十个请求）也是可以接受的。所有这些操作都可以在\
  \ JMeter GUI 模式下完成。但是，当需要运行超过 10 RPS 的负载时，为了避免负载生成器本身出现性能问题，最安全的方法是在非 GUI 模式下运行\
  \ JMeter，也就是从命令行运行，或者无头运行。图 2-6 中的 JMeter 启动横幅甚至展示了如何做到这一点。示例如下：\n\n1.  首先启动 JMeter\
  \ GUI，创建您的负载计划并保存为 `myLoadPlan.jmx`。\n2.  将 `myLoadPlan.jmx` 文件复制到您的开发者调优环境中，该环境需要安装\
  \ JMeter。\n3.  运行以下命令：\n\n    ```\n    $JMETER_HOME/bin/jmeter -n -t myLoadPlan.jmx\
  \ -l test001.jtl -e -o dirTest001\n    ```\n\n    其中 `test001.jtl` 是一个文本数据文件，JMeter\
  \ 会将测试结果写入其中；`dirTest001` 是一个文件夹，JMeter 会创建它并在测试结束后用于存放性能报告。\n\n只要 JMeter 进程的 RAM\
  \ 和 CPU 消耗保持相对较低（可能两者都低于 20%），那么我在同一台机器上同时运行 JMeter 和被测系统就没有遇到过问题。如果您仍然怀疑，可以尝试将负载生成器移到同一子网的另一台机器上，看看性能是否有显著提升。\n\
  \n\n\n## 按 PID 查看 CPU 消耗\n\n如果团队中只有一个人关心性能，那将是一场艰苦的上坡战。但当你有几个（或所有）同事共同关注问题、确保报告结果、研究性能解决方案等时，性能管理就会变得容易得多。\n\
  \n因此，为了吸引（并保持）其他人的参与和兴趣，需要一定程度的性能透明度，以便更好地让其他人了解最新情况。例如，每个人都知道如何使用 `top` 和任务管理器来监控\
  \ CPU 消耗。但你是否在整个测试期间都盯着它看，还是在查看大量其他指标时移开了视线？在故障排查时，我们都应该成为彼此优秀的怀疑论者，而一张测试期间的 CPU\
  \ 基本消耗图，确实能在这些问题被提出之前就帮助回答它们。\n\n但是，当你要在多台机器上监控 CPU，或者像我们这样，要区分单台机器上众多进程中哪个 CPU\
  \ 占用高/波动大时，监控 CPU 的任务就变得更加繁重。我的观点是，定期创建并分享易于理解的图表和指标是值得花时间的。此外，在 CPU 消耗这个特定问题上，目前缺乏能够按单个进程\
  \ ID（PID）绘制 CPU 随时间消耗图的开源/免费工具。\n\n我想快速介绍一个能做到这一点的工具，而且它恰好不仅能与 JMeter 配合使用，其结果还能与任何其他\
  \ JMeter 指标显示在同一张图表上。这个工具叫做 PerfMon，来自 jmeter-plugins.org，网址是 [`https://jmeter-plugins.org/wiki/PerfMon/`](https://jmeter-plugins.org/wiki/PerfMon/)（见图\
  \ 2-7）。\n\n![A449023_1_En_2_Fig7_HTML.jpg](img/A449023_1_En_2_Fig7_HTML.jpg)\n\n\
  图 2-7. jmeter-plugins.org 的 PerfMon 允许你监控 CPU 和许多其他指标\n\n以下是一些说明：\n\n*   由于本次测试使用的\
  \ i7 处理器有八个核心，如果单条线达到 800，就意味着系统已 100% 消耗。对于六个核心，最大值是 600。在这张图中，我们有两条线，240 和 40。240+40=280，280/800\
  \ = 35% CPU。\n*   在顶部的窗格中，我已将 PerfMon 配置为捕获六个不同 Java 进程的 CPU 指标。不幸的是，我不得不在我的 MacBook\
  \ 上使用 `top` 来确认哪个进程使用了约 240，哪个使用了约 40。\n*   有时会有许多低 CPU 消耗的线条造成干扰。图 2-3 中的“隐藏噪音”标签展示了一种临时移除那些消耗极低、使图表显得杂乱的线条的方法。自动缩放、颜色选择、隐藏线条以及其他出色的图表优化功能都记录在此处：[`https://jmeter-plugins.org/wiki/SettingsPanel/`](https://jmeter-plugins.org/wiki/SettingsPanel/)\n\
  \n我主要使用这些图表来确认负载生成器和任何存根服务器的 CPU 保持相对较低，可能低于 20%。JMeter 的读数大约为 40，所以 40/800=5% CPU，低于\
  \ 20%，因此 JMeter 的 CPU 消耗足够低。\n\nPerfMon 几乎可以在所有可用平台上运行。以下是另外两个也能按 PID 绘制资源消耗图的工具。它们都不原生支持\
  \ Windows，但你可以尝试在 Linux/Docker 容器中运行它们：\n\n*   [`https://nmonvisualizer.github.io/nmonvisualizer/`](https://nmonvisualizer.github.io/nmonvisualizer/)\n\
  *   [`https://github.com/google/cadvisor`](https://github.com/google/cadvisor)\n\
  \n无论你使用哪种工具，拥有显示 CPU 和其他资源消耗的 PID 级别指标，对于了解在你适度的调优环境中是否存在行为异常的进程至关重要。在报告结果时，请记得指出来自测试基础设施（负载生成器和存根服务器）的消耗部分。\n\
  \n## 对比指标\n\n几年前，我在一个部署在 Tomcat 上且与 JMeter 位于同一台机器上的“空操作”Java Servlet 上运行了一个 JMeter\
  \ 测试。如果我当时看到每秒 1000 个请求，我想我会印象深刻。但在我更新版本的测试中，我看到了每秒超过 2800 个请求，CPU 消耗约为 35%。并且 99%\
  \ 的请求在不到 1.3 毫秒内完成（在 Servlet 端由 glowroot.org 测量）。\n\n这些结果好得惊人，以至于我至今还记得。我找不到我的车钥匙，但我记得我那台用了四年的笔记本电脑能产生多大的吞吐量，我建议你也这样做。为什么？这些数字非常强大，因为它们让我不再认为\
  \ Java 天生就慢。它们也有助于消除关于 Tomcat、JMeter、TCP 甚至我的 MacBook 是否天生就慢的类似误解。\n\n最后，这些结果（图\
  \ 2-8）让我觉得，即使在这个小型开发者调优环境的单台机器上，也能取得巨大的进步。\n\n![A449023_1_En_2_Fig8_HTML.gif](img/A449023_1_En_2_Fig8_HTML.gif)\n\
  \n图 2-8. 一个“空操作”Java Servlet 的响应时间和吞吐量指标。指标来自 Glowroot.org。Intel(R) Core(TM) i7-3615QM\
  \ CPU @ 2.30GHz，Java 1.8.0_92-b14。\n\n## 别忘了\n\n图 2-1 和图 2-2 中的环境截然不同！本章讨论了在开发者适度调优环境（图\
  \ 2-1）设计中排除的所有内容。我们正在缩小范围，以便能够审查我们开发者负责的那部分系统——即代码——的性能。因此，有了“代码优先”的口号。\n\n我理解我提出的这个小型开发者调优环境看起来可能非常规，以至于你可能会怀疑它是否能复现足够真实的条件，使调优有价值。简而言之，这种环境设计的外观看起来非常人为。\n\
  \n对此，我的回应是，这种特定的环境设计满足了一个长期存在的特定战略需求，有助于避免最后一刻仓促进行的性能调优工作，这些工作曾使我们的系统，甚至可能使我们的行业，变得有些不稳定。适度的调优环境还有助于我们在软件开发生命周期（SDLC）的早期识别并放弃性能不佳的设计方法。\n\
  \n很少有人质疑风洞用于验证空气动力学或比例模型桥梁用于评估稳定性的有效性。风洞和模型桥梁虽然非常人为，但却是被广泛接受的、插入到开发过程中以实现战略目的的测试结构。这种小型开发者调优环境设计是我们为解决长期存在的、全行业范围的性能问题而提供的技术方案。\n\
  \n会有怀疑论者说，小型环境永远无法足够接近地模拟生产工作负载。这些人通常也是那些认为性能问题几乎无法重现的人。对于这群人，我想说，适度的调优环境是一个参考环境，我们用它来演示如何让我们的系统表现出色。我们无法解决所有问题，但我们必须以某种方式、在某个地方开始展示我们的韧性。\n\
  \n\n\n## 下一步\n\n在引言中，我谈到了性能缺陷如何在黑暗环境中滋生。并非所有环境都是黑暗的。有时，你会面对一片无边的指标海洋，很难知道该用哪些指标来实现性能目标。下一章将指标分为几个高级类别，并讨论如何利用每个类别来实现性能目标。此外，还有一些创造性的解决方案可以重构你的负载测试，帮助避免在完全黑暗的环境中迷失方向。\n\
  \n脚注 1\n\n如果你想要更多细节，这里还有一些服务虚拟化工具。请参阅 [`http://blog.trafficparrot.com/2015/05/service-virtualization-and-stubbing.html`](http://blog.trafficparrot.com/2015/05/service-virtualization-and-stubbing.html)\n\
  \n以及这本书`:` [`http://www.growing-object-oriented-software.com/`](http://www.growing-object-oriented-software.com/)\
  \ 。\n\n"
- '# 3. 指标：消除猜测的良方


  引言中讨论了黑暗环境的概念，即在你需要的时候和地点，合适的监控往往不可用。这确实是我们行业早就应该讨论和解决的问题，但这个问题也有两面性。如果我们抛开所有实际难题（如安全、访问、许可、开销、培训等），将合适的工具接入合适的环境，情况就会完全逆转。对某些人来说，并非因指标太少而数据匮乏，而是被所有可能指标的广阔海洋所吓倒，并且很容易因选错指标而受骗。


  本章的目标是：


  *   理解应使用哪些类型的指标来决定是否保留或丢弃调优变更。

  *   理解哪些类型的指标用于识别导致特定性能问题的组件。

  *   记住，跟踪、绘制图表并分享系统随时间的调优进展，有助于让团队中的成员更关注性能。


  本章将这片广阔的指标海洋分为三个松散的类别，并展示如何利用每个类别来实现关键性能目标。


  ## 哪个指标？


  在处理性能问题时，我们花大量时间问这三个问题：


  *   资源问题：系统使用了多少硬件资源（CPU、RAM、网络、磁盘）？35%？98%？

  *   责任问题：被测系统（SUT）中的哪些组件应对特定的性能问题负责？“组件”需要是我们能够调查的具体对象，比如特定源代码文件中的单个 Java 方法，或者单个数据库查询或其他网络请求。

  *   用户收益问题：最终用户能否感受到特定调优改进带来的响应时间影响？哪个代码或配置变更表现更好？


  在调优系统的顺利日子里，我能够做正确的事，“遵循数据”而不是猜测这三个至关重要问题的答案。这意味着要花时间从精心规划的负载测试中捕获某些指标。但在应对压力巨大的生产问题时，或者仅仅是在袜子不配对的倒霉日子里，一切都不确定了，我对问题的解释变成了毫无根据的胡乱猜测。黑暗环境问题使这变得更加困难，因为当合适的指标不可用时（不幸的是，这种情况相当频繁），臆测就会占据主导。


  因此，本章旨在通过首先专注于用指标回答这些关键问题，来帮助你更容易地找到有用的指标。简而言之，表 3-1 显示了我建议用于回答每个问题的指标。


  表 3-1.


  常见性能问题的指标


  |   | 性能问题 | 由以下指标回答 |

  | --- | --- | --- |

  | 1 | 资源（CPU/RAM 等）是否可用？ | 基础指标：PerfMon、TypePerf、ActivityMonitor、top/htop/topas/nmon/sar
  等 |

  | 2 | 哪个组件导致了性能下降？ | 服务器端数据，如线程转储、分析器数据、详细的 GC 数据、SQL 吞吐量/响应时间等 |

  | 3 | 最终用户是否受益？哪个代码变更表现更好？ | 来自负载生成器的响应时间和吞吐量指标。 |


  有些指标有助于回答多个问题。例如，问题 2 和问题 3 都在一定程度上涉及响应时间。我的目的不是要建立严格无重叠的指标分类，而是为你提供一个相当好的起点，了解使用哪些指标来回答每个关键问题。


  在本书的后续部分，关于 P.A.t.h. 检查清单的四章将回答问题 2（责任在谁？）。问题 1（是否有可用资源？）使用的指标来自大家熟悉的工具，对吧？Top、PerfMon、nmon
  等。Brendan Gregg 的 USE 方法是避免忘记监控资源消耗的好方法。这里是链接：


  [`http://www.brendangregg.com/usemethod.html`](http://www.brendangregg.com/usemethod.html)


  如果一台机器是你的负载测试的一部分，但你无法访问其资源消耗指标，请小心不要将其归咎于你的任何问题。


  我真心认为，学习 P.A.t.h. 四章中的故障排除技巧是可行的。但在整个调优过程中，同时关注这三个指标问题可能更具挑战性——很容易忘记其中任何一个。


  本章的其余部分将致力于回答问题 3，即确定你的最终用户是否会从各种提议的性能变更中受益。


  ## 设定调优方向


  决定保留哪些调优改进，在很大程度上设定了调优过程的方向。通常，来自负载生成器的更快响应时间和更高吞吐量指标，应该对是否保留特定变更拥有最终决定权。更低的资源（CPU/RAM）消耗也很关键，但通常是次要因素。


  所有这些建议听起来有点简单，所以让我聚焦于这一点：只有在负载生成器测试显示变更将使最终用户受益或减少资源消耗时，才决定保留性能调优变更。仅仅因为某个代码或配置变更使其他环境受益，并不意味着它会使你的环境受益。此外，毫无根据的猜测会削弱对调优项目的信心。尽可能避免这种情况。


  考虑这个例子：一个能为你带来 10ms 响应时间改进的代码变更，可以对一个响应时间为 30ms 的系统产生神奇、变革性的效果，但如果你将同样的 10ms 改进变更应用到一个响应时间为
  3000ms 的系统上，产生重大性能提升的可能性就非常低。让负载生成器指标来驱动决策；让它们指导保留哪些代码/配置变更。


  但调优指导并非仅来自负载生成器指标，因为从系统中调优掉明显的高 CPU 消耗也非常重要。CPU 的作用甚至比消除高 CPU 消耗的例程更大——它为我们提供了一个方便的衡量标准，可以用来判断系统是否能够扩展。第
  6 章将就此提供非常具体的指导，敬请期待。


  许多不同的指标，例如将在 P.A.t.h. 章节中讨论的那些，都有助于决定保留什么变更：服务器端详细的 GC 指标、SQL 响应时间指标、微基准测试结果。但最终，只有当负载生成器结果显示对最终用户有益时，这些变更才应保留在代码库中。记住：负载生成器指标驱动决策。CPU
  和 RAM 消耗指标也很重要——它们扮演着辅助角色。




  ## 备用方案：利用负载生成器指标进行间接性能评估


  P.A.t.h. 章节展示了如何直接评估并找出系统中哪些部分最慢，而第 1 章中的四个性能反模式则帮助你构想出哪些更改可能提升性能。部署更改后，如果负载生成器的响应时间和吞吐量指标（以及资源消耗）显示出足够的改进，那么你就保留该更改；否则就回滚（我就是这么做的）。然后你回到
  P.A.t.h. 检查清单，在你做出出色的更改后重新评估性能状况（因为状况会以有趣的方式发生变化，不妨检查一下），接着再部署另一个更改并重复此过程。调优大致就是这样运作的。


  在我熟练运用 P.A.t.h. 检查清单和适度的调优环境之前，发现根本原因要困难一些。我曾设法从负载生成器指标中挖掘出额外的线索和提示。这些“间接”技术如今仍然有用，但当你能通过
  P.A.t.h. 直接观察性能问题时，它们就没那么必要了。


  不过，我仍会在此分享其中一些技术，因为有时你无法快速访问系统来运行 P.A.t.h.，比如当你查看别人的负载生成器报告时。同样，有时需要来自不同指标的第二个佐证，才能让团队充分信服某个特定的优化方案，而说服团队在整个过程中占据了相当大的比重。


  ### 大型负载是一个危险信号


  逻辑上审视负载测试中负载最大的请求，问问自己所有这些字节是否真的必要？例如，请看图 3-1。


  ![A449023_1_En_3_Fig1_HTML.jpg](img/A449023_1_En_3_Fig1_HTML.jpg)


  图 3-1.


  最右侧的“平均字节数”列显示了每个进程（最左侧列）的 HTTP 响应大小。该列中的大型异常值（此图中没有）将是性能问题的首要嫌疑对象。数据来自 JMeter 摘要报告。


  “平均字节数”列中字节数最多的请求是 newAccount.shtml，平均为 6253.7 字节。这个数字并不让我担心，尤其是与表中其他行的“平均字节数”数值相比。但如果某个“平均字节数”值比其他值大几倍或更多——那就值得调查了。至少，额外的字节会花费更多传输时间，但情况可能会更糟。如果系统花费宝贵的时间来组装这个大型页面呢？有一次我遇到这种情况，大量被禁用的账户（没有客户想看到）被意外启用，并从后端一直传输到浏览器，浪费了大量时间/资源。另一次，不仅客户端反复请求本可以在服务器上缓存的数据，而且
  XML 格式不必要地庞大，且没有人足够关心以确保负载被压缩。压缩文本文件通常能将文件缩小 90%。利用这一点来最小化传输的字节数。如果你的应用程序来自 1999
  年，那么大的尺寸可能是由于所有数据都被塞进单个页面，而没有良好的“第一页/下一页/最后一页”支持。


  ### 变异性是一个危险信号


  响应时间指标中一个较为明显的可修复性能问题迹象是变异性。在大多数情况下，响应时间抖动得越厉害，性能就越差。因此，要关注标准偏差（Std. Dev 列）最高的 HTTP
  请求，它们显示出高度变化的响应时间。当然，高度变化的响应时间可能归因于某些良性因素，比如偶尔复杂的数据或其他处理。


  图 3-2 中的三行显示了略微不同的 XSLT 进程处理完全相同的 .xslt 文件和相同的 .xml 文件——你可以通过每行“平均字节数”（最右侧列）的完全相同数值来判断。数据来自三次不同的测试，每次都是
  60 秒的稳态运行，带有 8 个负载线程，并且每次显示出截然不同的性能。


  ![A449023_1_En_3_Fig2_HTML.jpg](img/A449023_1_En_3_Fig2_HTML.jpg)


  图 3-2.


  三种 XSLT 处理实现的负载测试结果。数据来自 jmeter-plugins.org 的合成报告。


  请注意，响应时间（平均值）和标准偏差（Std. Dev.）大致成正比。吞吐量与这两者成反比。换句话说，当响应时间和变异性都较低时，性能/吞吐量表现良好。


  如果 0.51 的极低标准偏差加上 400% 以上的吞吐量提升（1273.3 而非 5325.8）还不足以让你信服，那么图 3-3 中相同数据的时间序列图可能会说服你。


  ![A449023_1_En_3_Fig3_HTML.jpg](img/A449023_1_En_3_Fig3_HTML.jpg)


  图 3-3.


  从上到下依次是使用三种不同 XSLT API 惯用法的良好、更好和最佳 XSLT 响应时间。测试速度越快，锯齿状的变异性就越小。


  响应时间中额外的变异性（如此处图表所示）可以帮助你指出哪些系统请求可能需要优化。其他指标（如吞吐量和 CPU 消耗）中的变异性也有助于指出问题。


  ## 创造性地设定调优方向


  是的，负载生成器指标应该主导方向，并决定保留哪些优化措施。但也要记住，这里有很大的创意空间。本节提供了一些创造性地重构测试和测试计划以提供性能洞察的示例。


  本书中有两章帮助你运行模拟（即模仿）常规生产负载的负载测试。第 4 章描述了如何将负载脚本从僵化、死板的单用户流量录制演变为动态的工作负载模拟。第 5 章帮助你检测无效负载测试的一些性能特征，这可以帮助你避免基于无效的负载生成器数据做出错误的调优决策。


  这里的要点是，让负载测试更真实是一件好事。然而，尽管听起来可能有些荒谬，但通过让你的负载测试不那么真实，也能获得大量绝佳的洞察。让我通过两个例子来解释这种看似疯狂的做法。


  ### 创意测试计划 1


  曾几何时，我参与一个调优项目，果然，我在某些“黑暗环境”中漫无目的地徘徊。我缺乏安全访问权限或许可证（天知道，可能是任何东西）来使用所有我喜欢的监控工具。没有指标，我该如何调优？这是一个中间层系统，我试图弄清楚所有时间是否都花在了调用非
  Java 后端系统上，还是花在了 Java 层本身。为了查明 Java 端的速度，我决定注释掉所有对数据库和后端系统的调用，留下一个完全被阉割的系统，只保留进入和退出
  Java 架构的部分。它应该相当快，因为大部分实际工作都被注释掉了，对吧？


  被阉割系统的负载测试响应时间为 100 毫秒。这算快还是慢？作为与这 100 毫秒的对比点，前一章中的“什么都不做”示例仅用了大约 1 毫秒。我有两个做基本相同事情（什么都不做）的不同系统，其中一个却慢得多。最终，这帮助我们找到并修复了一些遍及架构各个部分的大型瓶颈。这就是创意测试。




  ### 创意测试计划 2


  以下是另一个示例，我们通过移除测试计划中的部分工作负载（看似是一种倒退）来取得进展。图 3-4 展示了一个测试，其中依次调用了四个不同的 SOA 服务：服务一、服务二、服务三和服务四。服务一的响应时间远慢于其他三个请求，导致快速服务在测试的大部分时间里实际上都在等待服务一执行完毕。这种等待严重限制了吞吐量（未在图中显示），使我们失去了观察服务在更高吞吐量下表现的机会。


  ![A449023_1_En_3_Fig4_HTML.jpg](img/A449023_1_En_3_Fig4_HTML.jpg)


  图 3-4.


  该测试中的三个快速服务大部分时间都在等待较慢的服务


  为了解决这个问题，我们需要分而治之，并寻求另一位技术人员的帮助。一位开发人员在一个环境中独立负责改进慢速服务（服务一）的性能，而另外三个快速服务则在另一个环境中使用不同的负载脚本进行独立测试。如果不采用这种方法，这三个快速服务将无法在更高的吞吐量下进行测试。当几乎任何环境都可以作为调优环境时，这就会变得容易得多。而拥有一个单一的大型调优环境会使这种标准的“分而治之”方法变得非常困难。


  ## 跟踪性能进展


  负载生成器的响应时间和吞吐量指标至关重要，持续数周或数月的调优工作应以此为导向。关于适度规模调优环境的第 2 章鼓励我们通过使用更小、更易于管理和访问的计算环境，每天完成更多的修复-测试循环。随着测试的进行，在调优的每一天你都会得到更多或好或坏的结果，而由于结果和测试配置数量众多，它们很容易被遗忘。为了记住哪些更改/测试对性能影响最大，请将每次测试的结果以清晰整洁的表格形式（例如表
  3-2）发布到 wiki 页面上，与团队共享。有些 wiki 表格甚至允许你在表格单元格中直接粘贴性能图的小缩略图（当然可以放大）。为了方便起见，请将最近的测试放在最前面。


  表 3-2.


  记录哪些更改影响最大的负载测试结果示例


  | 测试 ID | 开始时间/持续时间 | 目的 | 结果 | RPS | RT (毫秒) | CPU |

  | --- | --- | --- | --- | --- | --- | --- |

  | 3 | 7 月 4 日，下午 6:25，10 分钟 | 添加数据库索引 | 大幅提升！ | 105 | 440 | 68% |

  | 2 | 7 月 4 日，上午 11:30，10 分钟 | 测试对 AccountMgr.java 的性能更改 | 性能提升 | 63 | 1000 | 49%
  |

  | 1 | 7 月 4 日，上午 9:00，10 分钟 | 基准测试 |   | 53 | 1420 | 40% |


  请记住，性能调优项目的项目经理的角色就像家庭轿车后座上的四岁小孩，不停地用“我们到了吗？”这个问题来烦扰我们。我们达到性能目标了吗？像这样的表格可以安抚他们，但这也是为你自己准备的。我不确定为什么，但陷入性能危机很容易让人忘记需要迁移到生产环境的一系列更改。保持表格定期更新需要自律，但该表格记录并证明了（或未证明）为获得更好性能所投入的资金是否合理。这至关重要。


  起初，表格中的行似乎应该比较来自同一个、未更改的负载计划的结果，并施加完全相同的负载量。这是我们所说的“苹果对苹果”的比较吗？不完全是。相反，该表格记录了针对特定业务流程集迄今为止的最佳吞吐量，无论负载计划如何，尽管这将是记录该负载计划变化的绝佳位置。一旦你的调优工作产生了更高的吞吐量，你将需要为负载计划增加更多的负载线程，以更接近你的吞吐量目标。


  为了创建一个引人入胜的性能调优叙事，请将此表格中的每秒请求数（RPS）和日期列转换为“吞吐量随时间改进图”。这能快速传达你艰苦调优工作的起伏（图 3-5）。


  ![A449023_1_En_3_Fig5_HTML.gif](img/A449023_1_En_3_Fig5_HTML.gif)


  图 3-5.


  使用此类图表有助于沟通性能进展


  ## 别忘了


  如果你仅从系统外部使用资源消耗指标和负载生成器指标来尝试解决性能问题，可能会变得沮丧，因为没有足够的信息来确定需要更改系统的哪些部分来解决性能问题。这就是“责任”指标发挥作用的地方。我们从第
  8 章开始使用的 P.A.t.h. 检查清单，正是为了填补这一空白而设计的。


  同时请记住，适度规模调优环境的主要目的之一是在一天内运行更多的修复-测试循环，帮助你取得更多性能进展。但更多的测试意味着更多的结果，而更多的结果很容易被遗忘，所以花点时间与你的团队（尤其是项目经理）一起寻找一个类似
  wiki 的解决方案来记录性能测试结果。为了处理性能测试中暴露出的所有问题，对问题进行优先级排序会有所帮助，这样你的团队就知道该关注什么了。


  本书共有 3 个“部分”，你刚刚完成了第一部分，即性能调优入门。第 4、5、6 和 7 章构成了下一部分，内容全部关于负载生成——如何在测试环境中对系统施加压力，就像它正在承受生产负载的真实压力一样。


  ## 下一步


  知道几乎在任何环境中都能发现真实的性能缺陷，这让你能更轻松地快速开始调优你的系统。也许开始调优的另一个最大障碍是创建负载脚本的需求。


  下一章的第一部分是一个路线图，指导你如何快速上手并创建第一个负载脚本。第二部分则详细介绍了如何增强第一个脚本，以创建/模拟更接近生产环境的负载。


