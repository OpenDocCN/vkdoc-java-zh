  \ 的 PID，并使用`jstack`捕获了四个线程转储。我使用了之前讨论的标准来找出哪些线程处于负载之下。正如我们之前所见，每个线程转储中有三个线程处于负载之下，乘以四个转储，总共\
  \ 12 个堆栈跟踪。\n\n清单 11-9 显示了这 12 个处于负载下的线程的关键部分。前两个线程各出现了五次，后两个线程各出现了一次。5+5+1+1 =\
