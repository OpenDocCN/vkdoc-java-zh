  | 03 | 15269 | 10596 | 对静态数据的未缓存查询 |   |\n| 04 | 6390 | 15313 | 慢速结果集迭代 |   |\n\
  | 05 | 3801 | 12 | 缺少数据库索引 |   |\n| 06 | 10573 | 10101 | 堆上 RAM 过度分配 | 吞吐量无显著差异，但对于避免浪费至关重要。\
