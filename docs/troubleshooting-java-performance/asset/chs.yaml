  Scheuter 是我认识的最聪明的人之一；他是我在 FIS 的长期朋友、导师和同事，是他最初教会我热爱堆栈跟踪以及许多其他与工作相关或无关的事情。感谢我的雇主
  FIS 和我们的 PerfCoE 团队。FIS 在整个企业范围内对卓越性能的持续高管级支持在业内是独一无二的。为此表示感谢。


  阿肯色大学小石城分校信息科学系主任 Liz Pierce 博士，策划了我于 2017 年 6 月初举办的一个 8 小时的 Java 性能研讨会。感谢 Liz 博士的支持，也感谢大约
  15 位学生、教职员工和其他人，他们牺牲了两个周六下午的时间来钻研性能问题。我非常喜欢。多伦多的 CMG Canada 小组也在一两个月前慷慨地审核了其中的一些想法。谢谢。


  2011 年，我在 cmg.org 的一次国际性能会议上获得了最佳论文和最佳演讲者奖。著名的美国计算机科学家 Jeff Buzen 领导了评选委员会，他本人对排队论领域做出了许多贡献。CMG
  当时（以及在其他方面）的支持给了我多年后出版这本书所需的信心。谢谢你 Jeff，谢谢你 CMG。


  还有许多以各种方式提供过帮助的人：Joyce Fletcher 和 Rod Rowley，他们在 2006 年给了我第一份调优工作。感谢 Mike Dunlavey、Nick
  Seward、Stellus Pereira、David Humphrey、Dan Sobkoviak 和 Mike McMillan 的支持。感谢我的父亲 Ralph
  Ostermueller，感谢你数月来持续的关注和支持，也感谢我的母亲。


  我还想快速提一下我每天受益的少数几个特定的开源项目。感谢 Glowroot.org 的 Trask 在最后一刻的修复，感谢 JMeter 和 JMeter-Plugins。你们都很棒。


  感谢 Walter Kuketz、Jeremiah Bentch、Erik Nilsson 和 Juan Carlos Terrazas 阅读本书的后期草稿。Erik，你在早期章节中对清晰度的要求一直萦绕在我心头。你的意见迫使我提高了一些标准；希望这能体现出来，谢谢。Jeremiah，你关于
  SELECT N+1、JPA 和其他问题的资深评论帮助我填补了巨大的空白。谢谢。最后，感谢 Walter：你数十年的性能/SDLC 经验，言简意赅地传授给我，确实帮助我避免了在最后阶段偏离轨道。谢谢。


  感谢我的技术审阅者 Rick Wagner：Rick，与你合作我最喜欢的一点，除了你广泛的 Java/RedHat 经验以及你审阅众多技术书籍的独特经历之外，是你能够经常引导我为读者描绘一幅更完整的软件性能图景，而不是我最初开始画的那半幅画。谢谢。


  最后，感谢我的家人。我的大儿子 Owen 的编辑技巧在引言、第 1 章、第 8 章以及其他地方都得到了充分展现。他 20 岁，对编程一无所知，但却给了我关于如何逐步构建复杂思想的精妙课程。谁能想到呢。在你写下一本书之前，先联系他。我的小儿子
  John 帮助测试了代码示例，并忍受了许多次头脑风暴会议，最终才让我想出了正确的点子。John 的编辑技巧在于润色单个句子。事实证明，这里有一个模式。我出色的妻子
  Joan Dudley，她在大学教授文学，是这本书和她的学生们的宏观编辑。Joan 的编辑贡献是“每个段落都很重要”和“清晰度不亚于任何人”。Joan，你做出了许多牺牲，在我忙于这个疯狂的长篇项目时，你撑起了整个家。我爱你，感谢你鼓励我去尝试伟大的事情。


