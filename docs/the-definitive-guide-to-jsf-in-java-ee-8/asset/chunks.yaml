    ### @ViewScoped


    视图作用域托管 Bean 与 JSF 视图状态的生命周期绑定。JSF 视图状态在第 3 章的“视图状态”一节中有详细阐述。简而言之，只要最终用户在同一个 JSF
    视图上执行回发请求，并且所调用的操作方法持续返回 null 或 void，视图作用域托管 Bean 就会一直存在。一旦操作方法返回非 null 值（即使是空字符串或代表同一视图），视图作用域就会结束。视图作用域托管
    Bean 在同一浏览器会话的不同标签页之间不共享，每个标签页都有自己唯一的实例。实际上，它们是通过 JSF 表单生成的 HTML 表示中的 `javax.faces.ViewState`
    隐藏输入字段间接标识的。


    然而，视图作用域托管 Bean 并不存储在 JSF 视图状态中，即使启用了客户端状态保存也是如此。无论采用何种 JSF 状态保存方法，它们实际上都存储在 HTTP
    会话中。当最终用户通过链接或书签执行 GET 请求、在浏览器地址栏中编辑 URL 或关闭浏览器标签页来卸载网页时，它们不会立即被销毁。它们会一直保留在 HTTP
    会话中，直到 HTTP 会话过期才会被销毁。


    由于最终用户理论上可以在同一会话中生成无限数量的浏览器标签页，从而也生成同样多的 JSF 视图状态和视图作用域托管 Bean，因此对于存储在 HTTP 会话中的
    JSF 视图状态和视图作用域托管 Bean 的数量，存在一个可配置的最大限制。一旦达到此限制，最近最少使用的 JSF 视图状态和视图作用域托管 Bean 将过期并被销毁。当最终用户实际返回到最初引用现已过期的
    JSF 视图状态的标签页，并对其执行回发请求时，JSF 将抛出 `ViewExpiredException`。JSF 视图状态数量的限制取决于所使用的 JSF
    实现。在 Mojarra 中，此限制可通过 `web.xml` 中的 `com.sun.faces.numberOfLogicalViews` 上下文参数进行配置，其默认值为
    15。⁸


    ```

    <context-param>

        <param-name>com.sun.faces.numberOfLogicalViews</param-name>

        <param-value>25</param-value>

    </context-param>

    ```


    但是，如果您的 Web 应用程序（例如讨论论坛或问答网站）允许用户在更多浏览器标签页中打开，那么最好切换到客户端状态保存。这样，JSF 视图状态将不再存储在
    HTTP 会话中，因此也永远不会过期。然而，关联的视图作用域托管 Bean 仍然存储在 HTTP 会话中，并且可能过期。当最终用户实际返回到最初引用现已过期的视图作用域托管
    Bean 的标签页，并对其执行回发请求时，JSF 不会抛出 `ViewExpiredException`，而是会从头开始创建一个新的 Bean，从而丢失对原始托管
    Bean 实例的所有状态更改。视图作用域托管 Bean 数量的限制也取决于所使用的 JSF 实现。在 Mojarra 中，此限制尚不能通过 `web.xml`
    上下文参数配置。只能通过显式设置名称为 `com.sun.faces.application.view.activeViewMapsSize` 的会话属性来配置，其默认值为
    25。这可以通过一个应用程序作用域的托管 Bean 来实现，如下所示，该 Bean 会观察会话作用域的初始化。


    ```

    @ApplicationScoped

    public class Config {


    public void sessionCreated

            (@Observes @Initialized(SessionScoped.class) HttpSession session)

        {

            session.setAttribute

                ("com.sun.faces.application.view.activeViewMapsSize", 15);

        }

    }

    ```


    此配置实际上将默认值降低到与会话中 JSF 视图状态的默认最大数量相等。当您使用服务器端状态保存，并且所有 JSF 视图实际上只引用一个视图作用域托管 Bean
    实例时，这样做是可以的。然而，在一个经过良好开发和重构的 JSF Web 应用程序中，平均每个 JSF 页面通常会引用多个视图作用域托管 Bean。例如，如果每个
    JSF 视图最多有三个不同的视图作用域托管 Bean，那么最好将限制设置为 `com.sun.faces.numberOfLogicalViews` 值的三倍。您只需要考虑可能的内存消耗。当视图作用域托管
    Bean 本身持有相对大量的数据时，内存消耗会迅速失控。


    视图作用域托管 Bean 对于在同一个 JSF 视图上基于 Ajax 的回发之间保持状态非常有用，特别是当这些回发导致任何 `UIComponent` 的
    `rendered` 属性、`UIInput` 组件的 `disabled` 或 `readonly` 属性，或同一 JSF 视图中任何 `UICommand`
    组件的 `disabled` 属性值发生变化时。也就是说，在后续的回发中，JSF 作为防止篡改请求的安全措施的一部分，会在实际处理组件之前重新检查这些属性。如果保存状态的托管
    Bean 是请求作用域而不是视图作用域，那么这些条件的变化将在后续回发中丢失，并且回发将无法按预期直观地处理。换句话说，视图作用域托管 Bean 在动态表单中特别有用。


    一个例子是下拉菜单，当选择“其他”选项时，它会条件性地渲染一个自由文本字段。


    ```

    <f:metadata>

        <f:importConstants type="com.example.project.model.Title" />

    </f:metadata>

    ...

    <h:form>

        <h:selectOneMenu value="#{bean.customer.title}">

            <f:selectItems value="#{Title}" />

            <f:ajax render="other" />

        </h:selectOneMenu>

        <h:panelGroup id="other">

            <h:inputText rendered="#{bean.customer.title eq ''OTHER''}"

                value="#{bean.customer.titleOther}" required="true" />

        </h:panelGroup>

        ...

        <h:commandButton value="Save" action="#{bean.save}" />

    </h:form>

    ```


    当托管 Bean 是请求作用域并且因此在每个请求上重新创建时，此构造将无法工作。当下拉菜单更改时，它会创建一个新的请求作用域 Bean 实例，在其中设置标题，渲染自由文本字段，最后请求作用域
    Bean 实例被销毁。当表单提交时，它会创建一个新的请求作用域 Bean 实例，因此没有客户标题，当 JSF 在自由文本字段的应用请求值阶段（第二阶段）检查
    `rendered` 属性并发现它为 false 时，最终它将根本不会处理该自由文本字段。只有当托管 Bean 是视图作用域时它才能工作，因为在下拉菜单更改期间设置的客户标题在表单提交的应用请求值阶段（第二阶段）仍然可用。


    然而，有一种变通方法。您可以让 `rendered` 属性检查 HTTP 请求参数而不是模型值。如第 4 章所述，HTTP 请求参数名称由组件的客户端 ID
    指定。您可以将下拉菜单组件绑定到视图，然后使用其客户端 ID 来获取 HTTP 请求参数值。


    ```

    <h:selectOneMenu binding="#{title}" value="#{bean.customer.title}">

        <f:selectItems value="#{Title}" />

        <f:ajax render="other" />

    </h:selectOneMenu>

    <h:panelGroup id="other">

        <h:inputText rendered="#{param[title.clientId] eq ''OTHER''}"

            value="#{bean.customer.titleOther}" required="true" />

    </h:panelGroup>

    ```

    '
- fmt: "This way, when JSF checks the `rendered` attribute during the apply request\
    \ values phase (second phase) of the form submit, it will notice it’s true and\
    \ continue processing the free text field, even when the managed bean is request\
    \ scoped and thus `#{bean.customer.title}` is still null at that point. Note that\
    \ the `binding` attribute doesn’t reference a managed bean property. This is unnecessary\
    \ as it wouldn’t be used over there. All of this is also applicable on the `readonly`\
    \ attribute of any `UIInput` component and the `disabled` attribute of any `UIInput`\
    \ and `UICommand` component.\n\nThere may also be cases wherein a request-scoped\
    \ managed bean will work just fine but imposes a risk of a corrupted state as\
    \ compared to a view-scoped managed bean, certainly when relying on data coming\
    \ from a shared database which could be mutated by other users. This affects primarily\
    \ use cases whereby `UIInput` or `UICommand` components are nested in an iterating\
    \ component such as `<h:dataTable>`, `<ui:repeat>` and `<c:forEach>` which iterates\
    \ over a model coming from the database. This was explained previously in Chapter\
    \ [6](#A454457_1_En_6_Chapter.xhtml), but for the sake of refreshment, we will\
    \ explain it once more. Imagine a table of products with a delete button in a\
    \ column.\n\n```\n<f:form id=\"list\">\n    <h:dataTable id=\"products\" value=\"\
    #{products.list}\" var=\"product\">\n        ...\n        <h:column>\n       \
    \     <h:commandButton id=\"delete\" value=\"Delete\"\n                action=\"\
    #{products.delete(product)}\">\n                <f:ajax render=\"@namingcontainer\"\
    \ />\n            </h:commandButton>\n        </h:column>\n    </h:dataTable>\n\
    </f:form>\n```\n\nWith this backing bean:\n\n```\n@Named @ViewScoped\npublic class\
    \ Products implements Serializable {\n\nprivate List<Product> list;\n\n@Inject\n\
    \    private ProductService productService;\n\n@PostConstruct\n    public void\
    \ init() {\n        list = productService.list();\n    }\n\npublic void delete(Product\
    \ product) {\n        productService.delete(product);\n        list.remove(product);\n\
    \    }\n\npublic List<Product> getList() {\n        return list;\n    }\n}\n```\n\
    \nThe submitted button is under the hood identified by the iteration index. When\
    \ JSF is about to process the form submit, and a product has been added or removed\
    \ or even reordered in the meanwhile, causing the iteration index to be changed,\
    \ then the invoked action would possibly be performed against the wrong item currently\
    \ at the initially known index. This is dangerous for the integrity of the model.\
    \ In such a case the value of the iteration component must refer a view-scoped\
    \ model.\n\nAlso here, there is a work-around. Instead of relying on the iteration\
    \ index, you can also rely on the unique identifier of the iterated object which\
    \ must be passed as an HTTP request parameter instead of as an EL method argument.\n\
    \n```\n<f:form id=\"list\">\n    <h:dataTable id=\"products\" value=\"#{products.list}\"\
    \ var=\"product\">\n        ...\n        <h:column>\n            <h:commandButton\
    \ id=\"delete\" value=\"Delete\"\n                action=\"#{products.delete}\"\
    >\n                <f:param name=\"id\" value=\"#{product.id}\" />\n         \
    \       <f:ajax render=\"@namingcontainer\" />\n            </h:commandButton>\n\
    \        </h:column>\n    </h:dataTable>\n</f:form>\n```\n\nWhereby the backing\
    \ bean is adjusted as follows:\n\n```\n@Named @RequestScoped\npublic class Products\
    \ {\n\nprivate List<Product> list;\n\n@Inject @ManagedProperty(\"#{param.id}\"\
    )\n    private Long id;\n\n@Inject\n    private ProductService productService;\n\
    \n@PostConstruct\n    public void init() {\n        list = productService.list();\n\
    \    }\n\npublic void delete() {\n        productService.delete(id);\n       \
    \ list.removeIf(product -> product.getId().equals(id));\n    }\n\npublic List<Product>\
    \ getList() {\n        return list;\n    }\n}\n```\n\nNo, the `action=\"#{products.delete(product.id)}\"\
    ` instead of using `<f:param>` won’t work. The technical reason is that `<f:param>`\
    \ is executed immediately during the render response phase of the form, long before\
    \ the end user presses the delete button. Thus, at the moment the end user presses\
    \ the delete button, it’s guaranteed to have the correct value. The EL method\
    \ argument, on the contrary, is only evaluated after the end user has pressed\
    \ the delete button. When the model has changed in the meanwhile, it would thus\
    \ evaluate to the wrong ID when the iteration index of the particular product\
    \ has changed.\n\nAs explained in the beginning of this section, the standard\
    \ JSF view-scoped bean management facility has thus two major disadvantages: first,\
    \ the instances don’t immediately expire when the end user unloads the web page\
    \ and stick around in the HTTP session; second, even with client-side state saving\
    \ enabled they are stored in the HTTP session. Those problems are currently not\
    \ yet solved in the standard JSF API.\n\nFor now, the JSF utility library OmniFaces\
    \ offers an enhanced `@ViewScoped` annotation which solves those two disadvantages.[⁹](#A454457_1_En_8_Chapter.xhtml#Fn9)\
    \ View-scoped managed beans annotated with `@org.omnifaces.cdi.ViewScoped` will\
    \ actually get destroyed when the end user unloads the page. This is under the\
    \ hood done with help of `Navigator.sendBeacon` API[^(10)](#A454457_1_En_8_Chapter.xhtml#Fn10)\
    \ in JavaScript, and a specialized `ViewHandler` implementation provided by OmniFaces\
    \ which listens on those unload requests. There have been production applications\
    \ making heavy use of view-scoped managed beans whereby the memory usage has reduced\
    \ for up to 80% after switching from standard JSF `@ViewScoped` to OmniFaces `@ViewScoped`.\
    \ This makes the destroy-on-unload feature a major candidate to be added to the\
    \ future version of the standard JSF API.\n\nIn order to save the physical view-scoped\
    \ managed bean in the JSF view state when client-side state saving is enabled,\
    \ the `saveInViewState` attribute of the OmniFaces `@ViewScoped` annotation must\
    \ be set to `true`. You only need to keep in mind that those beans will never\
    \ expire, not even when the page gets unloaded, or when the HTTP session expires.\
    \ In fact, the entire bean has physically become part of the generated HTML output,\
    \ in the `javax.faces.ViewState` hidden input field. There have been community\
    \ requests to make JSF state management more flexible, such as toggling between\
    \ client- and server-side state saving on a per-view (per `UIViewRoot`) or even\
    \ per-form (per `UIForm`) basis, and being able to store view-scoped managed beans\
    \ in the actual view state instead of in the HTTP session. This may also be reconsidered\
    \ in a future version of the standard JSF API."
  raw: 'This way, when JSF checks the rendered attribute during the apply request
    values phase (second phase) of the form submit, it will notice it’s true and continue
    processing the free text field, even when the managed bean is request scoped and
    thus #{bean.customer.title} is still null at that point. Note that the binding
    attribute doesn’t reference a managed bean property. This is unnecessary as it
    wouldn’t be used over there. All of this is also applicable on the readonly attribute
    of any UIInput component and the disabled attribute of any UIInput and UICommand
    component.


    There may also be cases wherein a request-scoped managed bean will work just fine
    but imposes a risk of a corrupted state as compared to a view-scoped managed bean,
    certainly when relying on data coming from a shared database which could be mutated
    by other users. This affects primarily use cases whereby UIInput or UICommand
    components are nested in an iterating component such as <h:dataTable>, <ui:repeat>
    and <c:forEach> which iterates over a model coming from the database. This was
    explained previously in Chapter [6](#A454457_1_En_6_Chapter.xhtml), but for the
    sake of refreshment, we will explain it once more. Imagine a table of products
    with a delete button in a column.


    ```

    <f:form id="list">

        <h:dataTable id="products" value="#{products.list}" var="product">

            ...

            <h:column>

                <h:commandButton id="delete" value="Delete"

                    action="#{products.delete(product)}">

                    <f:ajax render="@namingcontainer" />

                </h:commandButton>

            </h:column>

        </h:dataTable>

    </h:form>

    ```


    With this backing bean:


    ```

    @Named @ViewScoped

    public class Products implements Serializable {


    private List<Product> list;


    @Inject

        private ProductService productService;


    @PostConstruct

        public void init() {

            list = productService.list();

        }


    public void delete(Product product) {

            productService.delete(product);

            list.remove(product);

        }


    public List<Product> getList() {

            return list;

        }

    }

    ```


    The submitted button is under the hood identified by the iteration index. When
    JSF is about to process the form submit, and a product has been added or removed
    or even reordered in the meanwhile, causing the iteration index to be changed,
    then the invoked action would possibly be performed against the wrong item currently
    at the initially known index. This is dangerous for the integrity of the model
    . In such a case the value of the iteration component must refer a view-scoped
    model.


    Also here, there is a work-around. Instead of relying on the iteration index,
    you can also rely on the unique identifier of the iterated object which must be
    passed as an HTTP request parameter instead of as an EL method argument.


    ```

    <f:form id="list">

        <h:dataTable id="products" value="#{products.list}" var="product">

            ...

            <h:column>

                <h:commandButton id="delete" value="Delete"

                    action="#{products.delete}">

                    <f:param name="id" value="#{product.id}" />

                    <f:ajax render="@namingcontainer" />

                </h:commandButton>

            </h:column>

        </h:dataTable>

    </h:form>

    ```


    Whereby the backing bean is adjusted as follows:


    ```

    @Named @RequestScoped

    public class Products {


    private List<Product> list;


    @Inject @ManagedProperty("#{param.id}")

        private Long id;


    @Inject

        private ProductService productService;


    @PostConstruct

        public void init() {

            list = productService.list();

        }


    public void delete() {

            productService.delete(id);

            list.removeIf(product -> product.getId().equals(id));

        }


    public List<Product> getList() {

            return list;

        }

    }

    ```


    No, the action="#{products.delete(product.id)}" instead of using <f:param> won’t
    work. The technical reason is that <f:param> is executed immediately during the
    render response phase of the form, long before the end user presses the delete
    button. Thus, at the moment the end user presses the delete button, it’s guaranteed
    to have the correct value. The EL method argument, on the contrary, is only evaluated
    after the end user has pressed the delete button. When the model has changed in
    the meanwhile, it would thus evaluate to the wrong ID when the iteration index
    of the particular product has changed.


    As explained in the beginning of this section, the standard JSF view-scoped bean
    management facility has thus two major disadvantages: first, the instances don’t
    immediately expire when the end user unloads the web page and stick around in
    the HTTP session; second, even with client-side state saving enabled they are
    stored in the HTTP session. Those problems are currently not yet solved in the
    standard JSF API.


    For now, the JSF utility library OmniFaces offers an enhanced @ViewScoped annotation
    which solves those two disadvantages.[⁹](#A454457_1_En_8_Chapter.xhtml#Fn9) View-scoped
    managed beans annotated with @org.omnifaces.cdi.ViewScoped will actually get destroyed
    when the end user unloads the page. This is under the hood done with help of Navigator.sendBeacon
    API[^(10)](#A454457_1_En_8_Chapter.xhtml#Fn10) in JavaScript, and a specialized
    ViewHandler implementation provided by OmniFaces which listens on those unload
    requests. There have been production applications making heavy use of view-scoped
    managed beans whereby the memory usage has reduced for up to 80% after switching
    from standard JSF @ViewScoped to OmniFaces @ViewScoped. This makes the destroy-on-unload
    feature a major candidate to be added to the future version of the standard JSF
    API.


    In order to save the physical view-scoped managed bean in the JSF view state when
    client-side state saving is enabled, the saveInViewState attribute of the OmniFaces
    @ViewScoped annotation must be set to true. You only need to keep in mind that
    those beans will never expire, not even when the page gets unloaded, or when the
    HTTP session expires. In fact, the entire bean has physically become part of the
    generated HTML output, in the javax.faces.ViewState hidden input field. There
    have been community requests to make JSF state management more flexible, such
    as toggling between client- and server-side state saving on a per-view (per UIViewRoot)
    or even per-form (per UIForm) basis, and being able to store view-scoped managed
    beans in the actual view state instead of in the HTTP session. This may also be
    reconsidered in a future version of the standard JSF API.'
  trans: '

    这样一来，当 JSF 在表单提交的“应用请求值”阶段（第二阶段）检查 `rendered` 属性时，它会发现该属性为 true，并继续处理自由文本字段，即使托管
    bean 是请求作用域的，因此此时 `#{bean.customer.title}` 仍然为 null。请注意，`binding` 属性并不引用托管 bean
    的属性。这是不必要的，因为在那里不会用到它。所有这些同样适用于任何 `UIInput` 组件的 `readonly` 属性以及任何 `UIInput` 和
    `UICommand` 组件的 `disabled` 属性。


    在某些情况下，请求作用域的托管 bean 也能正常工作，但与视图作用域的托管 bean 相比，它存在状态损坏的风险，尤其是在依赖来自共享数据库（可能被其他用户修改）的数据时。这主要影响那些
    `UIInput` 或 `UICommand` 组件嵌套在迭代组件（如 `<h:dataTable>`、`<ui:repeat>` 和 `<c:forEach>`）中的用例，这些迭代组件会遍历来自数据库的模型。这一点在第
    6 章中已经解释过，但为了温故知新，我们将再次说明。想象一个产品表格，其中一列包含删除按钮。


    ```

    <f:form id="list">

        <h:dataTable id="products" value="#{products.list}" var="product">

            ...

            <h:column>

                <h:commandButton id="delete" value="Delete"

                    action="#{products.delete(product)}">

                    <f:ajax render="@namingcontainer" />

                </h:commandButton>

            </h:column>

        </h:dataTable>

    </h:form>

    ```


    对应的后台 bean 如下：


    ```

    @Named @ViewScoped

    public class Products implements Serializable {


    private List<Product> list;


    @Inject

        private ProductService productService;


    @PostConstruct

        public void init() {

            list = productService.list();

        }


    public void delete(Product product) {

            productService.delete(product);

            list.remove(product);

        }


    public List<Product> getList() {

            return list;

        }

    }

    ```


    提交的按钮在底层是通过迭代索引来标识的。当 JSF 准备处理表单提交时，如果在此期间有产品被添加、删除甚至重新排序，导致迭代索引发生变化，那么被调用的操作可能会针对当前位于最初已知索引处的错误项目执行。这对模型的完整性是危险的。在这种情况下，迭代组件的
    `value` 必须引用一个视图作用域的模型。


    同样，这里也有一种变通方法。与其依赖迭代索引，不如依赖被迭代对象的唯一标识符，该标识符必须作为 HTTP 请求参数传递，而不是作为 EL 方法参数传递。


    ```

    <f:form id="list">

        <h:dataTable id="products" value="#{products.list}" var="product">

            ...

            <h:column>

                <h:commandButton id="delete" value="Delete"

                    action="#{products.delete}">

                    <f:param name="id" value="#{product.id}" />

                    <f:ajax render="@namingcontainer" />

                </h:commandButton>

            </h:column>

        </h:dataTable>

    </h:form>

    ```


    后台 bean 相应调整如下：


    ```

    @Named @RequestScoped

    public class Products {


    private List<Product> list;


    @Inject @ManagedProperty("#{param.id}")

        private Long id;


    @Inject

        private ProductService productService;


    @PostConstruct

        public void init() {

            list = productService.list();

        }


    public void delete() {

            productService.delete(id);

            list.removeIf(product -> product.getId().equals(id));

        }


    public List<Product> getList() {

            return list;

        }

    }

    ```


    不，使用 `action="#{products.delete(product.id)}"` 而不是 `<f:param>` 是行不通的。技术原因是，`<f:param>`
    在表单的“渲染响应”阶段（远在最终用户按下删除按钮之前）就会立即执行。因此，在最终用户按下删除按钮的那一刻，它能保证拥有正确的值。相反，EL 方法参数只有在最终用户按下删除按钮之后才会被评估。如果在此期间模型发生了变化，那么当特定产品的迭代索引改变时，它就会评估出错误的
    ID。


    正如本节开头所述，标准的 JSF 视图作用域 bean 管理机制有两个主要缺点：首先，当最终用户卸载网页时，实例不会立即过期，而是会滞留在 HTTP 会话中；其次，即使启用了客户端状态保存，它们也会存储在
    HTTP 会话中。这些问题目前尚未在标准 JSF API 中得到解决。


    目前，JSF 实用工具库 OmniFaces 提供了一个增强的 `@ViewScoped` 注解，解决了这两个缺点。⁹ 使用 `@org.omnifaces.cdi.ViewScoped`
    注解的视图作用域托管 bean 在最终用户卸载页面时实际上会被销毁。这底层是通过 JavaScript 中的 `Navigator.sendBeacon`
    API¹⁰ 以及 OmniFaces 提供的、监听这些卸载请求的专用 `ViewHandler` 实现来完成的。已有生产级应用程序大量使用视图作用域托管 bean，在从标准
    JSF `@ViewScoped` 切换到 OmniFaces `@ViewScoped` 后，内存使用量减少了高达 80%。这使得“卸载时销毁”功能成为未来版本标准
    JSF API 中一个重要的候选特性。


    为了在启用客户端状态保存时将物理的视图作用域托管 bean 保存到 JSF 视图状态中，必须将 OmniFaces `@ViewScoped` 注解的 `saveInViewState`
    属性设置为 true。你只需要记住，这些 bean 永远不会过期，即使页面被卸载或 HTTP 会话过期也不会。实际上，整个 bean 在物理上已经成为生成的
    HTML 输出的一部分，位于 `javax.faces.ViewState` 隐藏输入字段中。社区一直有请求让 JSF 状态管理更加灵活，例如在逐个视图（每个
    `UIViewRoot`）甚至逐个表单（每个 `UIForm`）的基础上切换客户端和服务器端状态保存，并且能够将视图作用域的托管 bean 存储在实际的视图状态中，而不是
    HTTP 会话中。这可能会在标准 JSF API 的未来版本中重新考虑。

    '
- fmt: '### `@RequestScoped`


    A request-scoped managed bean is among others tied to the lifetime of the HTTP
    request, which is for JSF the most important case. Other cases include the lifetimes
    of a call to an EJB asynchronous method invocation (method annotated by `@Asynchronous`),
    an EJB timer timeout method, or when a message-driven bean (MDB) processes a message.
    Note that an Ajax request also counts as a single HTTP request.


    When the client sends an HTTP request to the server, the servlet container will
    create `HttpServletRequest` and `HttpServletResponse` instances representing the
    HTTP request and response, and pass them through the authentication modules, filters,
    and servlets. They will be destroyed immediately after all authentication modules,
    filters, and servlets are finished processing the request and response. In other
    words, every HTTP request creates a new instance of a request-scoped managed bean
    which is available only during that request and not in other requests.


    Request-scoped managed beans are useful for simple and static forms which don’t
    have any dynamic Ajax-based updates, for which you would rather use a view-scoped
    managed bean. Think of a login form or a contact form.


    ```

    @Named @RequestScoped

    public class Login {


    private String username;

        private String password;


    // ...

    }

    ```


    Sure, those forms can be tied to a view-scoped managed bean as well without problems,
    but that’s a waste of memory space. Note that you should absolutely not make the
    JPA entity itself a managed bean. In other words, the following approach is factually
    wrong:


    ```

    @Named @RequestScoped

    @Entity

    public class Product {

        // ...

    }

    ```


    Not only does this violate the Law of Demeter,[^(11)](#A454457_1_En_8_Chapter.xhtml#Fn11)
    but it also risks that JPA won’t be able to persist it, because CDI actually wraps
    the managed bean in a proxy class and JPA would then not be able to obtain the
    entity information from it when you’re about to pass an injected instance to JPA.
    Hibernate would in such case throw “Unknown entity: `com.example.Entity$Proxy$_$$_WeldClientProxy`”,
    which thus actually represents the CDI proxy class.


    You might at this point wonder how exactly CDI actually works. First, it will
    during the web application’s startup collect all classes that are annotated with
    a CDI-compatible scope annotation. Then, it will generate proxy classes for all
    of them. Ultimately instances of those proxy classes are being injected. Given
    an example bean class `com.example.Bean`, the generated CDI proxy class may look
    as follows:


    ```

    public class Bean$Proxy$_$$_CDI extends Bean implements Serializable {


    public String getSomeProperty() {

            Bean actualInstance = CDI.resolveItSomehow();

            return actualInstance.getSomeProperty();

        }


    public void setSomeProperty(String someProperty) {

            Bean actualInstance = CDI.resolveItSomehow();

            actualInstance.setSomeProperty(someProperty);

        }

    }

    ```


    You see, it extends the bean class, makes it serializable, and uses an “impossible
    to clash” class name and lets all methods delegate to the actual instance obtained
    from the CDI context. You’ll probably also immediately understand why the CDI
    bean management facility requires the bean classes to be public and have a public
    default constructor. You’ll also see that when such a proxy class is created and
    injected, the underlying actual instance is not necessarily created. It’s only
    automatically created when the fictive `CDI.resolveItSomehow()` method is invoked.
    Under the hood, it will obtain the context from a thread local variable, exactly
    how `FacesContext#getCurrentInstance()` works.


    By the way, EJB also works with serializable proxies this way. That’s why it could
    seemingly magically perform all the heavy lifting of starting or joining a transaction
    and use pooled instances. The legacy JSF `@ManagedBean` facility, however, did
    not use proxies at all. That’s exactly why it was impossible to inject a JSF managed
    bean of a narrower scope in a JSF managed bean of a broader scope. With CDI bean
    management facility this is just possible.


    Note that CDI has also a `@javax.enterprise.inject.Model` stereotype annotation
    which basically bundles both `@Named` and `@RequestScoped` into a single annotation.
    This is in no way different from a request-scoped managed bean. Unfortunately,
    it does not represent a non-proxy instance; otherwise it would be nice to put
    it on an `@Entity`. The `@Model` annotation exists just for convenience.


    ### `@Dependent`


    A dependent-scoped managed bean is tied to the lifetime of the scope wherein it’s
    being created for the first time. So, if you inject it into an `@ApplicationScoped`,
    then it will become application scoped too. And if you inject it into a `@ViewScoped`,
    it will become view scoped too. And so on. This is the default CDI scope.


    This has, however, a caveat. When you forget to declare the CDI scope annotation
    on your backing bean, or import a scope with exactly the same name from the wrong
    package, e.g., `javax.faces.bean.RequestScoped` instead of `javax.enterprise.context.RequestScoped`,
    and you reference it directly in EL, as in `#{dependentScopedBean}`, instead of
    referencing it via another managed bean, as in `#{requestScopedBean.dependentScopedBean}`,
    then every EL evaluation will basically create a brand-new instance which exists
    only within that EL context. In other words, imagine a JSF form with two input
    fields and a submit button, each bound to a dependent-scoped managed bean, then
    you will effectively end up with three separate instances. One wherein the first
    input field is set, one wherein the second input field is set, and one wherein
    the action method is invoked. So, if you ever observe odd behavior of null submitted
    values in the action method even though the required validation has passed, the
    first thing to check is the actually used CDI managed bean scope.


    The major technical difference with other scopes is that dependent-scoped managed
    beans are not proxied. In other words, what’s being injected is the actual instance.


    ```

    @Dependent

    public class Entities {


        @Produces

        public Product getProduct() {

            return new Product();

        }

    }


    @Named @RequestScoped

    public class Products {


        @Inject

        private Product product;


        @Inject

        Private ProductService productService;


        public void add() {

            productService.create(product);

        }


        public Product getProduct() {

            return product;

        }

    }

    ```


    Note that you still can’t use `<h:inputText value="#{product.name}">`, because
    it would get its own instance. You still need to use `#{products.product.name}`.
    For exactly this reason, the producer isn’t `@Named`. Also note that in case of
    a view-scoped managed bean, you’d need to force JSF to restart the view scope
    by returning a non-null outcome from action method; otherwise the injected `Product`
    instance would be reused for the next view.'
