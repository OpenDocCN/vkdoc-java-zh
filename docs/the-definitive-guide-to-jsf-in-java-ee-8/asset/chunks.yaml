  trans: '

    ## 无状态表单


    在动态操作的表单中，状态保存尤其有用，这类表单使用 Ajax 有条件地渲染部分内容，例如级联下拉菜单和辅助输入字段。JSF 会在同一视图的 Ajax 回传过程中记住表单状态。通常，正是这些表单需要你绝对使用视图作用域的管理
    Bean，而不是请求作用域的管理 Bean。


    当你的网站包含“公共”和“私有”部分时，你希望尽可能推迟 HTTP 会话的创建，直到最终用户实际登录。这样，爬虫就不会触发不必要的 HTTP 会话创建。然而，如果你在公共部分有一个标准的
    JSF 登录表单，仅仅访问该页面就会创建 HTTP 会话。如果该表单本身基本没有动态状态，并且绑定到一个请求作用域的管理 Bean，那么这在服务器内存方面就是一种不必要的开销。你可以考虑改用客户端状态保存，但这会影响整个网站，并且会带来网络带宽和
    CPU（中央处理器）性能方面的开销。诚然，如果你拥有最先进的硬件，这种开销可以忽略不计，但如果你有大量访问者和/或硬件相对较差，这种开销就不可忽视了。


    对于绑定到请求作用域 Bean 的静态表单，例如一个简单的双字段登录表单（理论上可以在每次回传时安全地完全清空），则不一定需要保存视图状态。这可以通过将 `<f:view>`
    的 `transient` 属性设置为 `true` 来实现。


    ```

    <f:view transient="true">

        <h:form id="login">

            ...

        </h:form>

    </f:view>

    ```


    这样，JSF 就不会创建任何视图状态，并且 `javax.faces.ViewState` 隐藏输入字段将收到一个固定值“stateless”。请注意，这会影响整个视图，并且无法仅为特定表单切换此设置。JSF
    目前不支持按表单配置状态保存方法。此外，无状态还有一个额外的缺点：如果存在开放的 XSS 漏洞，理论上更容易执行 CSRF（跨站请求伪造）攻击。（另请参阅第
    13 章的“跨站请求伪造保护”一节。）幸运的是，使用 JSF 时，意外引入 XSS 漏洞已经非常困难。获得 XSS 漏洞的唯一方法是使用 `<h:outputText
    escape="false">` 来重新显示用户控制的数据。


