  trans: "\n## 自定义搜索关键字\n\nJSF 2.3 引入的组件搜索表达式框架还附带了一个 API，允许我们创建自定义搜索关键字。假设你有一个包含多个\
    \ `<h:message>` 组件的表单，并且希望在提交表单时重新渲染所有这些组件。那么你可能会倾向于在 `<f:ajax>` 的 `render` 属性中使用\
    \ `@form`。\n\n```\n<h:form>                \n    <h:outputLabel for=\"input1\"\
    \ ... />\n    <h:inputText id=\"input1\" ... />\n    <h:message for=\"input1\"\
    \ />\n\n<h:outputLabel for=\"input2\" ... />\n    <h:inputText id=\"input2\" ...\
    \ />\n    <h:message for=\"input2\" />\n\n<h:outputLabel for=\"input3\" ... />\n\
        <h:inputText id=\"input3\" ... />\n    <h:message for=\"input3\" />\n\n<h:commandButton\
    \ value=\"提交\" ...>\n        <f:ajax execute=\"@form\" render=\"@form\" />\n    </h:commandButton>\n\
    </h:form> \n```\n\n但这种方法效率并不高。实际上，它还会不必要地重新渲染同一表单内的所有标签、输入组件以及任何其他在 Ajax 回发请求期间根本不会改变的静态内容。这会造成资源浪费。理想情况下，我们应该有一个类似\
    \ `@messages` 的搜索关键字，它可以引用同一表单内的所有消息组件。\n\n```\n<h:form>\n    <h:outputLabel for=\"\
    input1\" ... />\n    <h:inputText id=\"input1\" ... />\n    <h:message id=\"m_input1\"\
    \ for=\"input1\" />\n\n<h:outputLabel for=\"input2\" ... />\n    <h:inputText\
    \ id=\"input2\" ... />\n    <h:message id=\"m_input2\" for=\"input2\" />\n\n<h:outputLabel\
    \ for=\"input3\" ... />\n    <h:inputText id=\"input3\" ... />\n    <h:message\
    \ id=\"m_input3\" for=\"input3\" />\n\n<h:commandButton value=\"提交\" ...>\n        <f:ajax\
    \ execute=\"@form\" render=\"@messages\" />\n    </h:commandButton>\n</h:form>\n\
    ```\n\n请注意，每个 `<h:message>` 组件都设置了显式 ID，因为如果没有显式 ID，它们默认不会向 HTML 输出渲染任何内容，那么 JSF\
    \ Ajax API 的 JavaScript 将无法找到它们，从而无法根据 Ajax 响应更新其内容。\n\n为了让 JSF 识别新的搜索关键字 `@messages`，首先需要按如下方式扩展\
    \ `javax.faces.component.search.SearchKeywordResolver` ¹⁰：\n\n```\npublic class\
    \ MessagesKeywordResolver extends SearchKeywordResolver {\n\n@Override\n    public\
    \ boolean isResolverForKeyword\n        (SearchExpressionContext context, String\
    \ keyword)\n    {\n        return \"messages\".equals(keyword);\n    }\n\n@Override\n\
        public void resolve\n        (SearchKeywordContext context, UIComponent base,\
    \ String keyword)\n    {\n        UIComponent form = base.getNamingContainer();\n\
            while (!(form instanceof UIForm) && form != null) {\n            form\
    \ = form.getNamingContainer();\n        }\n\nif (form != null) {\n            Set<String>\
    \ messageClientIds = new HashSet<>();\n            VisitContext visitContext =\
    \ VisitContext.createVisitContext\n                (context.getSearchExpressionContext().getFacesContext());\n\
    \nform.visitTree(visitContext, (visit, child) -> {\n                if (child\
    \ instanceof UIMessage) {\n                    messageClientIds.add(child.getClientId());\n\
                    }\n                return VisitResult.ACCEPT;\n            });\n\
    \nif (!messageClientIds.isEmpty()) {\n                context.invokeContextCallback(new\
    \ UIMessage() {\n                    @Override\n                    public String\
    \ getClientId(FacesContext context) {\n                        return String.join(\"\
    \ \", messageClientIds);\n                    }\n                });\n            }\n\
            }\n\ncontext.setKeywordResolved(true);\n    }\n}\n```\n\n需要注意的是，这种方法已经有些取巧了。也就是说，`SearchKeywordResolver`\
    \ 的意图是将一个关键字解析为恰好一个组件，该组件的客户端 ID 随后将用于替换关键字。然后这个组件会被传递给 `SearchKeywordContext#invokeContextCallback()`。在上述方法中，我们改为收集父级\
    \ `UIForm` 内所有 `UIMessage` 组件的客户端 ID，然后向 `invokeContextCallback()` 提供一个假的 `UIMessage`\
    \ 组件，该组件会调用假 `UIMessage` 组件的 `getClientId()`，而后者实际上返回的是所需的客户端 ID 集合。\n\n还应注意，这里使用的是\
    \ `UIComponent#visitTree()` ¹¹ 而不是递归遍历 `UIComponent#getChildren()` 来收集任何 `UIMessage`\
    \ 组件的客户端 ID。也就是说，当简单地遍历子组件时，你迟早会遇到一个迭代器组件，例如 `<h:dataTable>` 或 `<ui:repeat>`，如果它恰好只嵌套了一个\
    \ `UIMessage` 组件，那么你最终只会得到一个客户端 ID，即不带迭代索引的那个。`UIComponent#visitTree()` 不会这样做；路径中的任何迭代器组件都会实际遍历其模型值，并返回多个\
    \ `UIMessage` 组件，每个组件都带有包含迭代索引的正确客户端 ID。\n\n最后，必须调用 `SearchKeywordContext#setKeywordResolved(true)`\
    \ 来通知搜索上下文关键字已成功解析，即使它实际上没有解析到任何内容。如果忘记这一步，实际上不会造成任何损害，但如果不这样标记搜索关键字已解析，搜索上下文将继续咨询所有其他搜索关键字解析器，这可能会导致效率降低。\n\
    \n最后，为了让新的 `MessagesKeywordResolver` 运行，需要在 `faces-config.xml` 中按如下方式注册它：\n\n\
    ```\n<application>\n    <search-keyword-resolver>\n        com.example.project.MessagesKeywordResolver\n\
        </search-keyword-resolver>\n</application>\n```\n\n或者，在 `@WebListener` 中以编程方式注册，如下所示：\n\
    \n```\n@WebListener\npublic class ApplicationConfig implements ServletContextListener\
    \ {\n\n@Override\n    public void contextInitialized(ServletContextEvent event)\
    \ {\n        FacesContext.getCurrentInstance().getApplication()\n            .addSearchKeywordResolver(new\
    \ MessagesKeywordResolver());\n    }\n}\n```\n\n请注意，此时 `FacesContext` 必须可用，因此\
    \ `ServletContainerInitializer` 不一定能正常工作；并且 `FacesServlet` 可能尚未处理过请求，因此在某些受管 bean\
    \ 中注册也不一定能正常工作。\n"
