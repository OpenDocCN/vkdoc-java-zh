- fmt: "# Setting the Identity Store\n\nAfter having declared the security constraints\
    \ and setting the mechanism that we’d like to use to authenticate, there’s one\
    \ final piece of the puzzle remaining: setting the artifact that contains the\
    \ caller’s data, such as credentials, name, and roles. In Java EE Security this\
    \ artifact is called an identity store.\n\nJava EE provides two of these out of\
    \ the box; one to connect to a database and one to connect to LDAP (Lightweight\
    \ Directory Access Protocol). The Java EE Security RI (Soteria) additionally ships\
    \ with an embedded identity store. Most application servers provide additional\
    \ ones of their own, which are often configured outside the application (e.g.,\
    \ via an admin console, CLI, or XML configuration file that’s stored inside the\
    \ server).\n\nSetting and configuring the Java EE Security-provided identity stores\
    \ and the one provided by the RI happens in a similar fashion as the authentication\
    \ mechanisms: via an `IdentityStoreAnnotation`. Just like the authentication mechanism\
    \ version, this will cause the container to add an enabled CDI bean to the system,\
    \ this time one implementing the `IdentityStore` interface.\n\nThe following shows\
    \ an example together with our earlier definition of the authentication mechanism:\n\
    \n```\n@CustomFormAuthenticationMechanismDefinition(\n    loginToContinue = @LoginToContinue(\n\
    \        loginPage = \"/login.xhtml\",\n        useForwardToLogin = false,\n \
    \       errorPage = \"\"\n    )\n)\n@EmbeddedIdentityStoreDefinition({\n    @Credentials(\n\
    \        callerName = \"admin@example.com\",\n        password = \"secret1\",\n\
    \        groups = { \"VIEW_USER_PAGES\", \"VIEW_ADMIN_PAGES\" }\n    ),\n    @Credentials(\n\
    \        callerName = \"user@example.com\",\n        password = \"secret2\",\n\
    \        groups = { \"VIEW_USER_PAGES\" })\n    )\n})\n@FacesConfig @ApplicationScoped\n\
    public class ApplicationConfig {\n    // ...\n}\n```\n\nThe above causes an embedded\
    \ (in-memory) store to be created, with two callers (users), the first one being\
    \ in the groups `VIEW_USER_PAGES` and `VIEW_ADMIN_PAGES` and the second one only\
    \ in the group `VIEW_USER_PAGES`. The authentication mechanism will use this identity\
    \ store to validate that the credentials (caller name and password) match and,\
    \ if they do, to get the correct groups from the identity store.\n\nThe observant\
    \ reader may notice that the terminology has changed. Before we were talking about\
    \ “roles,” while all of a sudden this has changed to “groups.” Is this a mistake?\
    \ Well, not really. Groups and roles are subtly different. Both are just opaque\
    \ strings to the container, but groups can be optionally mapped to roles. We won’t\
    \ elaborate on this process further here, but suffice it to say that by default,\
    \ Java EE mandates a so-called 1:1 group-to-role mapping, which simply means groups\
    \ and roles are the same.\n\nTo better understand identity stores we’ll give two\
    \ more examples here. For the first example we’ll look at one of the identity\
    \ stores that’s provided by the Java EE Security API—the database identity store.\
    \ This store is activated and configured using the `@DatabaseIdentityStoreDefinition`\
    \ annotation. The three most important attributes to configure are the data source\
    \ (which represents the SQL data base), the SQL query to obtain the (hashed!)\
    \ password given a caller name, and the SQL query to identify which groups a caller\
    \ is in given the caller name. The following gives an example:\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
    \    loginToContinue = @LoginToContinue(\n        loginPage = \"/login.xhtml\"\
    ,\n        errorPage = \"\"\n    )\n)\n@DatabaseIdentityStoreDefinition(\n   \
    \ dataSourceLookup = \"java:app/MyDataSource\",\n    callerQuery = \"SELECT password\
    \ FROM caller WHERE name = ?\",\n    groupsQuery = \"SELECT name FROM groups WHERE\
    \ caller_name = ?\"\n)\n@DataSourceDefinition(\n    name = \"java:app/MyDataSource\"\
    ,\n    className = \"org.h2.jdbcx.JdbcDataSource\",\n    url=\"jdbc:h2:~/test;DB_CLOSE_ON_EXIT=FALSE\"\
    \n)\n@FacesConfig @ApplicationScoped\npublic class ApplicationConfig {\n    //\
    \ ...\n}\n```\n\nIn this example, a data source is defined for the H2 database\
    \ using the `org.h2.jdbcx.JdbcDataSource` driver. Naturally this can be done in\
    \ a similar way for any other database that has a JDBC driver. Alternatively,\
    \ the data source can be defined externally to the application. The caller query\
    \ that we used is `SELECT password FROM caller WHERE name = ?`, which means we\
    \ assume a table with at least two columns—one holding the caller name, and the\
    \ other the hashed password. Such table could be created by, for example, the\
    \ following SQL statement:\n\n```\nCREATE TABLE caller(\n    name VARCHAR(32)\
    \ PRIMARY KEY,\n    password VARCHAR(255)\n)\n```\n\nThe query that we used for\
    \ the groups is `SELECT name FROM groups WHERE caller_name = ?`, which assumes\
    \ a table with at least two columns—the caller name, and the group name, with\
    \ one row for each group the caller is in. Such a table could be created by, for\
    \ example, the following SQL statement:\n\n```\nCREATE TABLE caller_groups(\n\
    \    caller_name VARCHAR(32),\n    name VARCHAR(32)\n)\n```\n\nWhen populating\
    \ the `caller` table, it must be noted that a default hash algorithm is assumed\
    \ for the password column, namely, `PBKDF2WithHmacSHA256`. This algorithm can\
    \ (should) be customized by setting the number of iterations, the key size, and\
    \ the salt size.\n\nInstead of using an identity store that's provided by the\
    \ Java EE Security API we also have the option of providing our own custom one.\
    \ A common use case for that is using the application's own services to load the\
    \ application-specific user data.\n\nThe following shows an example of such an\
    \ identity store:\n\n```\n@ApplicationScoped\npublic class UserServiceIdentityStore\
    \ implements IdentityStore {\n\n@Inject\n    private UserService userService;\n\
    \n@Override\n    public CredentialValidationResult validate(Credential credential)\
    \ {\n        UsernamePasswordCredential login =\n            (UserNamePasswordCredential)\
    \ credential;\n        String email = login.getCaller();\n        String password\
    \ = login.getPasswordAsString();\n\nOptional<User> optionalUser =\n          \
    \  userService.findByEmailAndPassword(email, password);\n\nif (optionalUser.isPresent())\
    \ {\n            User user = optionalUser.get();\n            return new CredentialValidationResult(\n\
    \                user.getEmail(),\n                user.getRolesAsStrings()\n\
    \            );\n        }\n        else {\n            return CredentialValidationResult.INVALID_RESULT;\n\
    \        }\n    }\n}\n```\n\nThere is no specific registration needed; the above\
    \ given class simply needs to be present in the application (be on its classpath).\
    \ With such custom identity store present the `ApplicationConfig` class therefore\
    \ doesn’t need any config for the identity store.\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
    \    loginToContinue = @LoginToContinue(\n        loginPage = \"/login.xhtml\"\
    ,\n        errorPage = \"\"\n    )\n)\n@FacesConfig @ApplicationScoped\npublic\
    \ class ApplicationConfig {\n    // ...\n}\n```\n\nThe `UserServiceIdentityStore`\
    \ as given above delegates most of the work to a `UserService`, which would be\
    \ responsible for handling `User` entities in the application. Fully discussing\
    \ such service is outside the scope of this book, but we can imagine it could\
    \ use, for example, JPA to persist and load `User` entities. Our custom identity\
    \ store uses the service to try to find a `User` based on the user name and the\
    \ password that's being passed in via the credentials. If a `User` instance is\
    \ returned, it means the name referred to an existing user, and the password was\
    \ the correct one. In that case the identity store in turn returns `CredentialValidationResult`\
    \ which does two things: it indicates that authentication was successful, and\
    \ it provides the container with the data that will eventually be used to set\
    \ the authenticated identity for the current request. If the service couldn’t\
    \ find the user, then either the name or the password was wrong. In that case\
    \ the store returns `INVALID_RESULT` to indicate that authentication was not successful."
  raw: '## Setting the Identity Store


    After having declared the security constraints and setting the mechanism that
    we’d like to use to authenticate, there’s one final piece of the puzzle remaining:
    setting the artifact that contains the caller’s data, such as credentials, name,
    and roles. In Java EE Security this artifact is called an identity store .


    Java EE provides two of these out of the box; one to connect to a database and
    one to connect to LDAP (Lightweight Directory Access Protocol). The Java EE Security
    RI (Soteria) additionally ships with an embedded identity store. Most application
    servers provide additional ones of their own, which are often configured outside
    the application (e.g., via an admin console, CLI, or XML configuration file that’s
    stored inside the server).


    Setting and configuring the Java EE Security-provided identity stores and the
    one provided by the RI happens in a similar fashion as the authentication mechanisms:
    via an IdentityStoreAnnotation. Just like the authentication mechanism version,
    this will cause the container to add an enabled CDI bean to the system, this time
    one implementing the IdentityStore interface.


    The following shows an example together with our earlier definition of the authentication
    mechanism :


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            useForwardToLogin = false,

            errorPage = ""

        )

    )

    @EmbeddedIdentityStoreDefinition({

        @Credentials(

            callerName = "admin@example.com",

            password = "secret1",

            groups = { "VIEW_USER_PAGES", "VIEW_ADMIN_PAGES" }

        ),

        @Credentials(

            callerName = "user@example.com",

            password = "secret2",

            groups = { "VIEW_USER_PAGES" })

        )

    })

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    The above causes an embedded (in-memory) store to be created, with two callers
    (users), the first one being in the groups “VIEW_USER_PAGES” and “VIEW_ADMIN_PAGES”
    and the second one only in the group “VIEW_USER_PAGES”. The authentication mechanism
    will use this identity store to validate that the credentials (caller name and
    password) match and, if they do, to get the correct groups from the identity store.


    The observant reader may notice that the terminology has changed. Before we were
    talking about “roles,” while all of a sudden this has changed to “groups.” Is
    this a mistake? Well, not really. Groups and roles are subtly different. Both
    are just opaque strings to the container, but groups can be optionally mapped
    to roles. We won’t elaborate on this process further here, but suffice it to say
    that by default, Java EE mandates a so-called 1:1 group-to-role mapping, which
    simply means groups and roles are the same.


    To better understand identity stores we’ll give two more examples here. For the
    first example we’ll look at one of the identity stores that’s provided by the
    Java EE Security API—the database identity store . This store is activated and
    configured using the @DatabaseIdentityStoreDefinition annotation*.* The three
    most important attributes to configure are the data source (which represents the
    SQL data base), the SQL query to obtain the (hashed!) password given a caller
    name, and the SQL query to identify which groups a caller is in given the caller
    name. The following gives an example:


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            errorPage = ""

        )

    )

    @DatabaseIdentityStoreDefinition(

        dataSourceLookup = "java:app/MyDataSource",

        callerQuery = "SELECT password FROM caller WHERE name = ?",

        groupsQuery = "SELECT name FROM groups WHERE caller_name = ?"

    )

    @DataSourceDefinition(

        name = "java:app/MyDataSource",

        className = "org.h2.jdbcx.JdbcDataSource",

        url="jdbc:h2:~/test;DB_CLOSE_ON_EXIT=FALSE"

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    In this example, a data source is defined for the H2 database using the org.h2.jdbcx.JdbcDataSource
    driver. Naturally this can be done in a similar way for any other database that
    has a JDBC driver. Alternatively, the data source can be defined externally to
    the application. The caller query that we used is “select password from caller
    where name = ?”, which means we assume a table with at least two columns—one holding
    the caller name, and the other the hashed password. Such table could be created
    by, for example, the following SQL statement:


    ```

    CREATE TABLE caller(

        name VARCHAR(32) PRIMARY KEY,

        password VARCHAR(255)

    )

    ```


    The query that we used for the groups is “select name from groups where caller_name
    = ?”, which assumes a table with at least two columns—the caller name, and the
    group name, with one row for each group the caller is in. Such a table could be
    created by, for example, the following SQL statement :


    ```

    CREATE TABLE caller_groups(

        caller_name VARCHAR(32),

        name VARCHAR(32)

    )

    ```


    When populating the caller table, it must be noted that a default hash algorithm
    is assumed for the password column, namely, PBKDF2WithHmacSHA256. This algorithm
    can (should) be customized by setting the number of iterations, the key size,
    and the salt size.


    Instead of using an identity store that''s provided by the Java EE Security API
    we also have the option of providing our own custom one. A common use case for
    that is using the application''s own services to load the application-specific
    user data .


    The following shows an example of such an identity store:


    ```

    @ApplicationScoped

    public class UserServiceIdentityStore implements IdentityStore {


    @Inject

        private UserService userService;


    @Override

        public CredentialValidationResult validate(Credential credential) {

            UsernamePasswordCredential login =

                (UserNamePasswordCredential) credential;

            String email = login.getCaller();

            String password = login.getPasswordAsString();


    Optional<User> optionalUser =

                userService.findByEmailAndPassword(email, password);


    if (optionalUser.isPresent()) {

                User user = optionalUser.get();

                return new CredentialValidationResult(

                    user.getEmail(),

                    user.getRolesAsStrings()

                );

            }

            else {

                return CredentialValidationResult.INVALID_RESULT;

            }

        }

    }

    ```


    There is no specific registration needed; the above given class simply needs to
    be present in the application (be on its classpath). With such custom identity
    store present the ApplicationConfig class therefore doesn’t need any config for
    the identity store.


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    The UserServiceIdentityStore as given above delegates most of the work to a UserService,
    which would be responsible for handling User entities in the application. Fully
    discussing such service is outside the scope of this book, but we can imagine
    it could use, for example, JPA to persist and load User entities. Our custom identity
    store uses the service to try to find a User based on the user name and the password
    that''s being passed in via the credentials. If a User instance is returned, it
    means the name referred to an existing user, and the password was the correct
    one. In that case the identity store in turn returns CredentialValidationResult
    which does two things: it indicates that authentication was successful, and it
    provides the container with the data that will eventually be used to set the authenticated
    identity for the current request. If the service couldn’t find the user, then
    either the name or the password was wrong. In that case the store returns INVALID_RESULT
    to indicate that authentication was not successful.'
  trans: '

    ## 设置身份存储


    在声明了安全约束并设置了用于身份验证的机制后，还剩下最后一个难题：设置包含调用者数据（如凭证、姓名和角色）的工件。在 Java EE Security 中，这个工件被称为身份存储（identity
    store）。


    Java EE 提供了两种开箱即用的身份存储：一种用于连接数据库，另一种用于连接 LDAP（轻量级目录访问协议）。Java EE Security 参考实现（Soteria）还额外附带了一个嵌入式身份存储。大多数应用服务器都提供自己的额外身份存储，这些存储通常配置在应用程序外部（例如，通过管理控制台、CLI
    或存储在服务器内部的 XML 配置文件）。


    设置和配置 Java EE Security 提供的身份存储以及 RI 提供的身份存储，其方式与身份验证机制类似：通过 `IdentityStoreAnnotation`。就像身份验证机制的版本一样，这将导致容器向系统添加一个启用的
    CDI bean，这次是实现 `IdentityStore` 接口的 bean。


    下面展示了一个示例，以及我们之前对身份验证机制的定义：


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            useForwardToLogin = false,

            errorPage = ""

        )

    )

    @EmbeddedIdentityStoreDefinition({

        @Credentials(

            callerName = "admin@example.com",

            password = "secret1",

            groups = { "VIEW_USER_PAGES", "VIEW_ADMIN_PAGES" }

        ),

        @Credentials(

            callerName = "user@example.com",

            password = "secret2",

            groups = { "VIEW_USER_PAGES" })

        )

    })

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    上述代码会创建一个嵌入式（内存中）存储，其中包含两个调用者（用户），第一个用户属于“VIEW_USER_PAGES”和“VIEW_ADMIN_PAGES”组，第二个用户仅属于“VIEW_USER_PAGES”组。身份验证机制将使用此身份存储来验证凭证（调用者名称和密码）是否匹配，如果匹配，则从身份存储中获取正确的组。


    细心的读者可能会注意到术语发生了变化。之前我们谈论的是“角色”，而突然间变成了“组”。这是错误吗？嗯，并非如此。组和角色有细微差别。对于容器来说，两者都只是不透明的字符串，但组可以选择性地映射到角色。我们在此不进一步详述此过程，但只需说明，默认情况下，Java
    EE 强制要求所谓的 1:1 组到角色映射，这简单意味着组和角色是相同的。


    为了更好地理解身份存储，我们在此再举两个例子。第一个例子，我们将查看 Java EE Security API 提供的身份存储之一——数据库身份存储。此存储使用
    `@DatabaseIdentityStoreDefinition` 注解激活和配置。需要配置的三个最重要的属性是：数据源（代表 SQL 数据库）、根据调用者名称获取（已哈希！）密码的
    SQL 查询，以及根据调用者名称识别调用者所属组的 SQL 查询。下面给出一个示例：


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            errorPage = ""

        )

    )

    @DatabaseIdentityStoreDefinition(

        dataSourceLookup = "java:app/MyDataSource",

        callerQuery = "SELECT password FROM caller WHERE name = ?",

        groupsQuery = "SELECT name FROM groups WHERE caller_name = ?"

    )

    @DataSourceDefinition(

        name = "java:app/MyDataSource",

        className = "org.h2.jdbcx.JdbcDataSource",

        url="jdbc:h2:~/test;DB_CLOSE_ON_EXIT=FALSE"

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    在此示例中，使用 `org.h2.jdbcx.JdbcDataSource` 驱动程序为 H2 数据库定义了一个数据源。自然，对于任何拥有 JDBC 驱动程序的数据库，都可以类似地完成此操作。或者，数据源可以在应用程序外部定义。我们使用的调用者查询是“select
    password from caller where name = ?”，这意味着我们假设一个表至少包含两列——一列保存调用者名称，另一列保存哈希后的密码。例如，可以通过以下
    SQL 语句创建这样的表：


    ```

    CREATE TABLE caller(

        name VARCHAR(32) PRIMARY KEY,

        password VARCHAR(255)

    )

    ```


    我们用于组的查询是“select name from groups where caller_name = ?”，这假设一个表至少包含两列——调用者名称和组名称，调用者所属的每个组对应一行。例如，可以通过以下
    SQL 语句创建这样的表：


    ```

    CREATE TABLE caller_groups(

        caller_name VARCHAR(32),

        name VARCHAR(32)

    )

    ```


    在填充调用者表时，必须注意密码列默认使用哈希算法，即 `PBKDF2WithHmacSHA256`。可以通过设置迭代次数、密钥大小和盐值大小来（应该）自定义此算法。


    除了使用 Java EE Security API 提供的身份存储，我们还可以选择提供自己的自定义身份存储。一个常见的用例是使用应用程序自身的服务来加载特定于应用程序的用户数据。


    下面展示了这样一个身份存储的示例：


    ```

    @ApplicationScoped

    public class UserServiceIdentityStore implements IdentityStore {


    @Inject

        private UserService userService;


    @Override

        public CredentialValidationResult validate(Credential credential) {

            UsernamePasswordCredential login =

                (UserNamePasswordCredential) credential;

            String email = login.getCaller();

            String password = login.getPasswordAsString();


    Optional<User> optionalUser =

                userService.findByEmailAndPassword(email, password);


    if (optionalUser.isPresent()) {

                User user = optionalUser.get();

                return new CredentialValidationResult(

                    user.getEmail(),

                    user.getRolesAsStrings()

                );

            }

            else {

                return CredentialValidationResult.INVALID_RESULT;

            }

        }

    }

    ```


    无需特定的注册；上述类只需存在于应用程序中（在其类路径上）。有了这样的自定义身份存储，`ApplicationConfig` 类就不需要任何身份存储的配置了。


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    public class ApplicationConfig {

        // ...

    }

    ```


    上面给出的 `UserServiceIdentityStore` 将大部分工作委托给 `UserService`，后者负责处理应用程序中的 `User` 实体。全面讨论此类服务超出了本书的范围，但我们可以想象它可以使用，例如，JPA
    来持久化和加载 `User` 实体。我们的自定义身份存储使用该服务，尝试根据通过凭证传入的用户名和密码来查找 `User`。如果返回了 `User` 实例，则意味着该名称对应一个现有用户，并且密码正确。在这种情况下，身份存储会返回
    `CredentialValidationResult`，它执行两项操作：指示身份验证成功，并向容器提供最终用于为当前请求设置已验证身份的数据。如果服务找不到该用户，则说明用户名或密码错误。在这种情况下，存储返回
    `INVALID_RESULT` 以指示身份验证未成功。

