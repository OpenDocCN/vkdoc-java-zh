    部分时，它会引用自身而不是父复合组件。因此，导致了无限循环。


    理论上，你可以通过将 `#{cc}` 替换为 `#{cc.parent}`（它返回 `UIComponent#getParent()`）来解决这个问题。


    ```

    <c:forEach items="#{cc.attrs.value.replies}" varStatus="loop">

        ...

        <t:message value="#{cc.parent.attrs.value.replies[loop.index]}" />

        ...

    </c:forEach>

