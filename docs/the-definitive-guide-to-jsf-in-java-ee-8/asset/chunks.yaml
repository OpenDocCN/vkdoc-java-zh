- fmt: "This is usually unnecessary as the JSF components depending on this script,\
    \ such as `<h:commandLink>`, `<f:ajax>`, and `<f:websocket>` already automatically\
    \ include it. Here’s another example which explicitly includes the `jquery.js`\
    \ file from PrimeFaces library —this works of course only if you have PrimeFaces\
    \ installed.\n\n```\n<h:head>\n    ...\n    <h:outputScript library=\"primefaces\"\
    \ name=\"jquery/jquery.js\" />\n</h:head>\n```\n\nThis can be useful when you’d\
    \ like to reuse the PrimeFaces-provided jQuery library on a page that doesn’t\
    \ necessarily contain PrimeFaces components. That is, this script won’t be automatically\
    \ included when the page doesn’t contain any PrimeFaces component, but you might\
    \ happen to have some web project-specific scripts which in turn depend on jQuery.\
    \ JSF resource management will already make sure that both automatically included\
    \ and explicitly included JavaScript and CSS resources don’t get duplicated in\
    \ the generated HTML output. In other words, the above line which explicitly includes\
    \ jQuery can safely be used on a page that does contain a PrimeFaces component\
    \ .\n\nNote that there are currently a relatively large number of poor-quality\
    \ JSF tutorials on the Internet which don’t correctly use the `library` attribute.\
    \ Instead, those tutorials incorrectly demonstrate the `library` attribute to\
    \ represent the subfolder within the `src/main/webapp/resources` folder—something\
    \ like the following:\n\n```\n<h:graphicImage library=\"images\" name=\"some.svg\"\
    \ />\n<h:outputScript library=\"scripts\" name=\"some.js\" />\n<h:outputStylesheet\
    \ library=\"styles\" name=\"some.css\" />\n```\n\nThis is outright wrong. It doesn’t\
    \ offer any custom resource handler to distinguish library-specific resources\
    \ from each other. In the above example, you’d basically need to check three different\
    \ resource libraries even though all those resources belong to the very same library—the\
    \ web project itself.\n\nTalking about custom resource handlers, imagine that\
    \ you want to compel the web browser to forcibly reload the image, JavaScript,\
    \ and/or CSS resource when it has changed in the server side instead. This can\
    \ be achieved by adding a query string parameter to the resource URL whose value\
    \ represents the version of the resource. This is also called “cache busting .”\
    \ In JSF, this can be achieved with a custom `ResourceHandler` which decorates\
    \ the `Resource` to return its last modified timestamp as a query string parameter.\n\
    \n```\npublic class VersionResourceHandler extends ResourceHandlerWrapper {\n\n\
    public VersionResourceHandler(ResourceHandler wrapped) {\n        super(wrapped);\
    \                                                          \n    }\n\n@Override\n\
        public Resource createResource(String name, String library) {\n        Resource\
    \ resource = super.createResource(name, library);\n\nif (resource == null || library\
    \ != null) {\n            return resource;\n        }\n\nreturn new ResourceWrapper(resource)\
    \ {\n            @Override\n            public String getRequestPath() {\n                String\
    \ url = super.getRequestPath();\n                return url\n                    +\
    \ (url.contains(\"?\") ? \"&\" : \"?\")\n                    + \"v=\" + getLastModified();\n\
                }\n\nprivate long getLastModified() {\n                try {\n                    return\
    \ getWrapped().getURL()\n                        .openConnection().getLastModified();\n\
                    }\n                catch (IOException ignore) {\n                    return\
    \ 0;\n                }\n            }\n        };\n    }\n}\n```\n\nIn order\
    \ to activate it, register it in the `faces-config.xml` as follows:\n\n```\n<application>\n\
        <resource-handler>\n        com.example.project.resourcehandler.VersionResourceHandler\n\
        </resource-handler>                                                    \n\
    </application>\n```\n\nNote that the `createResource()` method returns the created\
    \ resource unmodified when it’s null or when the library is not null. The resource\
    \ itself is null when the name is unknown. The library is null when it’s unspecified\
    \ and thus specific to the web project. You could of course also apply this logic\
    \ to all resources of other libraries, but they usually already have their own\
    \ version of a resource handler.\n\nComing back to the resource components, you\
    \ can place `<h:graphicImage>` only inside the body, which can be both the plain\
    \ HTML `<body>` or the JSF `<h:body>`. Obviously, in an HTML document, you can\
    \ have an `<img>` element only inside the document body. You can place `<h:outputScript>`\
    \ and `<h:outputStylesheet>` basically anywhere in the JSF page. The `<h:outputScript>`\
    \ will by default generate the HTML `<script>` element at exactly the declared\
    \ location, regardless of being in the head or the body of the document. `<h:outputStylesheet>`,\
    \ however, will by default be moved to the end of `<h:head>` when declared inside\
    \ `<h:body>`. That is, in HTML it’s illegal to have a `<link rel=\"stylesheet\"\
    >` outside `<head>`. The `<h:outputScript>` can also be automatically moved to\
    \ end of document head when declared inside `<h:body>` with the `target` attribute\
    \ set to `head`. When the `target` attribute of `<h:outputScript>` is set to `body`,\
    \ then it will be automatically moved to end of the document body. `<h:outputStylesheet>`\
    \ doesn’t support it. In other words, the following test Facelet,\n\n```\n<h:head>\n\
        <title>Resource component relocation demo.</title>\n    <h:outputStylesheet\
    \ name=\"style1.css\" />\n    <h:outputScript name=\"script1.js\" />\n    <h:outputScript\
    \ name=\"script2.js\" target=\"head\" />\n    <h:outputScript name=\"script3.js\"\
    \ target=\"body\" />\n</h:head>\n<h:body>\n    <p>Paragraph 1</p>\n    <h:outputStylesheet\
    \ name=\"style2.css\" />\n    <h:outputScript name=\"script4.js\" />\n    <h:outputScript\
    \ name=\"script5.js\" target=\"head\" />\n    <h:outputScript name=\"script6.js\"\
    \ target=\"body\" />\n    <p>Paragraph 2</p>\n</h:body>\n```\n\nwill basically\
    \ generate the following HTML output (URLs simplified for brevity).\n\n```\n<head>\n\
        <title>Resource component relocation demo.</title>\n    <script type=\"text/javascript\"\
    \ src=\"script1.js\"></script>\n    <link type=\"text/css\" rel=\"stylesheet\"\
    \ href=\"style1.css\" />\n    <script type=\"text/javascript\" src=\"script2.js\"\
    ></script>\n    <link type=\"text/css\" rel=\"stylesheet\" href=\"style2.css\"\
    \ />\n    <script type=\"text/javascript\" src=\"script5.js\"></script>\n</head>\n\
    <body>\n    <p>Paragraph 1</p>\n    <script type=\"text/javascript\" src=\"script4.js\"\
    ></script>\n    <p>Paragraph 2</p>\n    <script type=\"text/javascript\" src=\"\
    script3.js\"></script>\n    <script type=\"text/javascript\" src=\"script6.js\"\
    ></script>\n</body>\n```\n\nIn other words, the resource rendering order in the\
    \ document head is:\n\n1.  `<h:outputScript>` from `<h:head>` without `target`.\n\
    2.  `<h:outputStylesheet>` from `<h:head>`.\n3.  `<h:outputScript>` from `<h:head>`\
    \ with `target=\"head\"`.\n4.  `<h:outputStylesheet>` from `<h:body>`.\n5.  `<h:outputScript>`\
    \ from `<h:body>` with `target=\"head\"`.\n\nNote that `<h:outputStylesheet>`\
    \ implicitly infers `target=\"head\"` and is therefore rendered *after* `<h:outputScript>`\
    \ without any `target`. All JavaScript and CSS resources which are automatically\
    \ included via the `@ResourceDependency` annotation of components will end up\
    \ between the resources declared in `<h:head>` and those declared in `<h:body>`.\
    \ So if you happen to use a JSF library which automatically includes a bunch of\
    \ CSS resources, and you’d like to override some of them, you’d best put such\
    \ `<h:outputStylesheet>` in `<h:body>` so that you can guarantee that it’s loaded\
    \ *after* the library’s.\n\nBeware though, some JSF libraries will automatically\
    \ override the default renderer of `<h:head>` which may mess up the default resource\
    \ ordering. In such a case, you’d best consult the documentation of the JSF library\
    \ in question for new ordering rules, or to restore the default renderer of `<h:head>`\
    \ via the web project’s `faces-config.xml`."
  raw: "This is usually unnecessary as the JSF components depending on this script,\
    \ such as <h:commandLink>, <f:ajax>, and <f:websocket> already automatically include\
    \ it. Here’s another example which explicitly includes the jquery.js file from\
    \ PrimeFaces library —this works of course only if you have PrimeFaces installed.\n\
    \n```\n<h:head>\n    ...\n    <h:outputScript library=\"primefaces\" name=\"jquery/jquery.js\"\
    \ />\n</h:head>\n```\n\nThis can be useful when you’d like to reuse the PrimeFaces-provided\
    \ jQuery library on a page that doesn’t necessarily contain PrimeFaces components.\
    \ That is, this script won’t be automatically included when the page doesn’t contain\
    \ any PrimeFaces component, but you might happen to have some web project-specific\
    \ scripts which in turn depend on jQuery. JSF resource management will already\
    \ make sure that both automatically included and explicitly included JavaScript\
    \ and CSS resources don’t get duplicated in the generated HTML output. In other\
    \ words, the above line which explicitly includes jQuery can safely be used on\
    \ a page that does contain a PrimeFaces component .\n\nNote that there are currently\
    \ a relatively large number of poor-quality JSF tutorials on the Internet which\
    \ don’t correctly use the library attribute. Instead, those tutorials incorrectly\
    \ demonstrate the library attribute to represent the subfolder within the src/main/webapp/resources\
    \ folder—something like the following:\n\n```\n<h:graphicImage library=\"images\"\
    \ name=\"some.svg\" />\n<h:outputScript library=\"scripts\" name=\"some.js\" />\n\
    <h:outputStylesheet library=\"styles\" name=\"some.css\" />\n```\n\nThis is outright\
    \ wrong. It doesn’t offer any custom resource handler to distinguish library-specific\
    \ resources from each other. In the above example, you’d basically need to check\
    \ three different resource libraries even though all those resources belong to\
    \ the very same library—the web project itself.\n\nTalking about custom resource\
    \ handlers, imagine that you want to compel the web browser to forcibly reload\
    \ the image, JavaScript, and/or CSS resource when it has changed in the server\
    \ side instead. This can be achieved by adding a query string parameter to the\
    \ resource URL whose value represents the version of the resource. This is also\
    \ called “cache busting .” In JSF, this can be achieved with a custom ResourceHandler\
    \ which decorates the Resource to return its last modified timestamp as a query\
    \ string parameter.\n\n```\npublic class VersionResourceHandler extends ResourceHandlerWrapper\
    \ {\n\npublic VersionResourceHandler(ResourceHandler wrapped) {\n        super(wrapped);\
    \                                                          \n    }\n\n@Override\n\
        public Resource createResource(String name, String library) {\n        Resource\
    \ resource = super.createResource(name, library);\n\nif (resource == null || library\
    \ != null) {\n            return resource;\n        }\n\nreturn new ResourceWrapper(resource)\
    \ {\n            @Override\n            public String getRequestPath() {\n                String\
    \ url = super.getRequestPath();\n                return url\n                    +\
    \ (url.contains(\"?\") ? \"&\" : \"?\")\n                    + \"v=\" + getLastModified();\n\
                }\n\nprivate long getLastModified() {\n                try {\n                    return\
    \ getWrapped().getURL()\n                        .openConnection().getLastModified();\n\
                    }\n                catch (IOException ignore) {\n                    return\
    \ 0;\n                }\n            }\n        };\n    }\n}\n```\n\nIn order\
    \ to activate it, register it in the faces-config.xml as follows:\n\n```\n<application>\n\
        <resource-handler>\n        com.example.project.resourcehandler.VersionResourceHandler\n\
        </resource-handler>                                                    \n\
    </application>\n```\n\nNote that the createResource() method returns the created\
    \ resource unmodified when it’s null or when the library is not null. The resource\
    \ itself is null when the name is unknown. The library is null when it’s unspecified\
    \ and thus specific to the web project. You could of course also apply this logic\
    \ to all resources of other libraries, but they usually already have their own\
    \ version of a resource handler.\n\nComing back to the resource components, you\
    \ can place <h:graphicImage> only inside the body, which can be both the plain\
    \ HTML <body> or the JSF <h:body>. Obviously, in an HTML document, you can have\
    \ an <img> element only inside the document body. You can place <h:outputScript>\
    \ and <h:outputStylesheet> basically anywhere in the JSF page. The <h:outputScript>\
    \ will by default generate the HTML <script> element at exactly the declared location,\
    \ regardless of being in the head or the body of the document. <h:outputStylesheet>,\
    \ however, will by default be moved to the end of <h:head> when declared inside\
    \ <h:body>. That is, in HTML it’s illegal to have a <link rel=\"stylesheet\">\
    \ outside <head>. The <h: outputScript> can also be automatically moved to end\
    \ of document head when declared inside <h:body> with the target attribute set\
    \ to head. When the target attribute of <h:outputScript> is set to body, then\
    \ it will be automatically moved to end of the document body. <h:outputStylesheet>\
    \ doesn’t support it. In other words, the following test Facelet,\n\n```\n<h:head>\n\
        <title>Resource component relocation demo.</title>\n    <h:outputStylesheet\
    \ name=\"style1.css\" />\n    <h:outputScript name=\"script1.js\" />\n    <h:outputScript\
    \ name=\"script2.js\" target=\"head\" />\n    <h:outputScript name=\"script3.js\"\
    \ target=\"body\" />\n</h:head>\n<h:body>\n    <p>Paragraph 1</p>\n    <h:outputStylesheet\
    \ name=\"style2.css\" />\n    <h:outputScript name=\"script4.js\" />\n    <h:outputScript\
    \ name=\"script5.js\" target=\"head\" />\n    <h:outputScript name=\"script6.js\"\
    \ target=\"body\" />\n    <p>Paragraph 2</p>\n</h:body>\n```\n\nwill basically\
    \ generate the following HTML output (URLs simplified for brevity).\n\n```\n<head>\n\
        <title>Resource component relocation demo.</title>\n    <script type=\"text/javascript\"\
    \ src=\"script1.js\"></script>\n    <link type=\"text/css\" rel=\"stylesheet\"\
    \ href=\"style1.css\" />\n    <script type=\"text/javascript\" src=\"script2.js\"\
    ></script>\n    <link type=\"text/css\" rel=\"stylesheet\" href=\"style2.css\"\
    \ />\n    <script type=\"text/javascript\" src=\"script5.js\"></script>\n</head>\n\
    <body>\n    <p>Paragraph 1</p>\n    <script type=\"text/javascript\" src=\"script4.js\"\
    ></script>\n    <p>Paragraph 2</p>\n    <script type=\"text/javascript\" src=\"\
    script3.js\"></script>\n    <script type=\"text/javascript\" src=\"script6.js\"\
    ></script>\n</body>\n```\n\nIn other words, the resource rendering order in the\
    \ document head is:\n\n1.  1\\. <h:outputScript> from <h:head> without target.\n\
    \n2.  2\\. <h:outputStylesheet> from <h:head>.\n\n3.  3\\. <h:outputScript> from\
    \ <h:head> with target=\"head\".\n\n4.  4\\. <h:outputStylesheet> from <h:body>.\n\
    \n5.  5\\. <h:outputScript> from <h:body> with target=\"head\".\n\nNote that <h:outputStylesheet>\
    \ implicitly infers target=\"head\" and is therefore rendered *after* <h:outputScript>\
    \ without any target. All JavaScript and CSS resources which are automatically\
    \ included via the @ResourceDependency annotation of components will end up between\
    \ the resources declared in <h:head> and those declared in <h:body>. So if you\
    \ happen to use a JSF library which automatically includes a bunch of CSS resources,\
    \ and you’d like to override some of them, you’d best put such <h:outputStylesheet>\
    \ in <h:body> so that you can guarantee that it’s loaded *after* the library’s.\n\
    \nBeware though, some JSF libraries will automatically override the default renderer\
    \ of <h:head> which may mess up the default resource ordering. In such a case,\
    \ you’d best consult the documentation of the JSF library in question for new\
    \ ordering rules, or to restore the default renderer of <h:head> via the web project’s\
    \ faces-config.xml."
  trans: "\n通常情况下，这并非必要，因为依赖此脚本的 JSF 组件（例如 `<h:commandLink>`、`<f:ajax>` 和 `<f:websocket>`）已经自动包含了它。以下是另一个显式包含\
    \ PrimeFaces 库中 `jquery.js` 文件的示例——当然，这仅在您已安装 PrimeFaces 的情况下有效。\n\n```\n<h:head>\n\
        ...\n    <h:outputScript library=\"primefaces\" name=\"jquery/jquery.js\"\
    \ />\n</h:head>\n```\n\n当您希望在不一定包含 PrimeFaces 组件的页面上重用 PrimeFaces 提供的 jQuery 库时，这会很有用。也就是说，当页面不包含任何\
    \ PrimeFaces 组件时，此脚本不会自动包含，但您可能恰好有一些依赖于 jQuery 的 Web 项目特定脚本。JSF 资源管理将确保自动包含和显式包含的\
    \ JavaScript 及 CSS 资源不会在生成的 HTML 输出中重复。换句话说，上述显式包含 jQuery 的行可以安全地用于包含 PrimeFaces\
    \ 组件的页面。\n\n请注意，目前互联网上有大量质量低劣的 JSF 教程，它们没有正确使用 `library` 属性。相反，这些教程错误地将 `library`\
    \ 属性演示为表示 `src/main/webapp/resources` 文件夹内的子文件夹——类似于以下内容：\n\n```\n<h:graphicImage\
    \ library=\"images\" name=\"some.svg\" />\n<h:outputScript library=\"scripts\"\
    \ name=\"some.js\" />\n<h:outputStylesheet library=\"styles\" name=\"some.css\"\
    \ />\n```\n\n这完全是错误的。它没有提供任何自定义资源处理器来区分不同库的资源。在上述示例中，您基本上需要检查三个不同的资源库，即使所有这些资源都属于同一个库——即\
    \ Web 项目本身。\n\n谈到自定义资源处理器，假设您希望强制 Web 浏览器在服务器端资源发生更改时重新加载图像、JavaScript 和/或 CSS\
    \ 资源。这可以通过向资源 URL 添加一个查询字符串参数来实现，该参数的值代表资源的版本。这也被称为“缓存破坏”。在 JSF 中，可以通过自定义 `ResourceHandler`\
    \ 来实现，该处理器装饰 `Resource` 以将其最后修改时间戳作为查询字符串参数返回。\n\n```\npublic class VersionResourceHandler\
    \ extends ResourceHandlerWrapper {\n\npublic VersionResourceHandler(ResourceHandler\
    \ wrapped) {\n        super(wrapped);                                        \
    \                  \n    }\n\n@Override\n    public Resource createResource(String\
    \ name, String library) {\n        Resource resource = super.createResource(name,\
    \ library);\n\nif (resource == null || library != null) {\n            return\
    \ resource;\n        }\n\nreturn new ResourceWrapper(resource) {\n            @Override\n\
                public String getRequestPath() {\n                String url = super.getRequestPath();\n\
                    return url\n                    + (url.contains(\"?\") ? \"&\"\
    \ : \"?\")\n                    + \"v=\" + getLastModified();\n            }\n\
    \nprivate long getLastModified() {\n                try {\n                    return\
    \ getWrapped().getURL()\n                        .openConnection().getLastModified();\n\
                    }\n                catch (IOException ignore) {\n                    return\
    \ 0;\n                }\n            }\n        };\n    }\n}\n```\n\n为了激活它，需要在\
    \ `faces-config.xml` 中按如下方式注册：\n\n```\n<application>\n    <resource-handler>\n\
            com.example.project.resourcehandler.VersionResourceHandler\n    </resource-handler>\
    \                                                    \n</application>\n```\n\n\
    请注意，当 `createResource()` 方法返回的资源为 `null` 或 `library` 不为 `null` 时，它会原样返回创建的资源。当名称未知时，资源本身为\
    \ `null`。当 `library` 未指定时，它为 `null`，因此特定于 Web 项目。当然，您也可以将此逻辑应用于其他库的所有资源，但它们通常已经有自己的资源处理器版本。\n\
    \n回到资源组件，您只能将 `<h:graphicImage>` 放置在 body 内部，body 可以是纯 HTML `<body>` 或 JSF `<h:body>`。显然，在\
    \ HTML 文档中，`<img>` 元素只能位于文档 body 内。您基本上可以将 `<h:outputScript>` 和 `<h:outputStylesheet>`\
    \ 放置在 JSF 页面的任何位置。默认情况下，`<h:outputScript>` 会在声明的位置精确生成 HTML `<script>` 元素，无论该位置是在文档的\
    \ head 还是 body 中。然而，`<h:outputStylesheet>` 在 `<h:body>` 内声明时，默认会被移动到 `<h:head>`\
    \ 的末尾。也就是说，在 HTML 中，将 `<link rel=\"stylesheet\">` 放在 `<head>` 之外是非法的。当 `<h:outputScript>`\
    \ 在 `<h:body>` 内声明且 `target` 属性设置为 `head` 时，它也可以自动移动到文档 head 的末尾。当 `<h:outputScript>`\
    \ 的 `target` 属性设置为 `body` 时，它将被自动移动到文档 body 的末尾。`<h:outputStylesheet>` 不支持此功能。换句话说，以下测试\
    \ Facelet：\n\n```\n<h:head>\n    <title>资源组件重定位演示。</title>\n    <h:outputStylesheet\
    \ name=\"style1.css\" />\n    <h:outputScript name=\"script1.js\" />\n    <h:outputScript\
    \ name=\"script2.js\" target=\"head\" />\n    <h:outputScript name=\"script3.js\"\
    \ target=\"body\" />\n</h:head>\n<h:body>\n    <p>段落 1</p>\n    <h:outputStylesheet\
    \ name=\"style2.css\" />\n    <h:outputScript name=\"script4.js\" />\n    <h:outputScript\
    \ name=\"script5.js\" target=\"head\" />\n    <h:outputScript name=\"script6.js\"\
    \ target=\"body\" />\n    <p>段落 2</p>\n</h:body>\n```\n\n将基本生成以下 HTML 输出（为简洁起见，URL\
    \ 已简化）。\n\n```\n<head>\n    <title>资源组件重定位演示。</title>\n    <script type=\"text/javascript\"\
    \ src=\"script1.js\"></script>\n    <link type=\"text/css\" rel=\"stylesheet\"\
    \ href=\"style1.css\" />\n    <script type=\"text/javascript\" src=\"script2.js\"\
    ></script>\n    <link type=\"text/css\" rel=\"stylesheet\" href=\"style2.css\"\
    \ />\n    <script type=\"text/javascript\" src=\"script5.js\"></script>\n</head>\n\
    <body>\n    <p>段落 1</p>\n    <script type=\"text/javascript\" src=\"script4.js\"\
    ></script>\n    <p>段落 2</p>\n    <script type=\"text/javascript\" src=\"script3.js\"\
    ></script>\n    <script type=\"text/javascript\" src=\"script6.js\"></script>\n\
    </body>\n```\n\n换句话说，文档 head 中的资源渲染顺序是：\n\n1.  1. 来自 `<h:head>` 且没有 `target` 的\
    \ `<h:outputScript>`。\n2.  2. 来自 `<h:head>` 的 `<h:outputStylesheet>`。\n3.  3.\
    \ 来自 `<h:head>` 且 `target=\"head\"` 的 `<h:outputScript>`。\n4.  4. 来自 `<h:body>`\
    \ 的 `<h:outputStylesheet>`。\n5.  5. 来自 `<h:body>` 且 `target=\"head\"` 的 `<h:outputScript>`。\n\
    \n请注意，`<h:outputStylesheet>` 隐式推断 `target=\"head\"`，因此会在没有 `target` 的 `<h:outputScript>`\
    \ *之后*渲染。所有通过组件的 `@ResourceDependency` 注解自动包含的 JavaScript 和 CSS 资源，最终会位于 `<h:head>`\
    \ 中声明的资源和 `<h:body>` 中声明的资源之间。因此，如果您恰好使用了一个自动包含大量 CSS 资源的 JSF 库，并且希望覆盖其中一些资源，最好将此类\
    \ `<h:outputStylesheet>` 放在 `<h:body>` 中，以确保它在该库的资源*之后*加载。\n\n不过请注意，某些 JSF 库会自动覆盖\
    \ `<h:head>` 的默认渲染器，这可能会打乱默认的资源排序。在这种情况下，您最好查阅相关 JSF 库的文档以了解新的排序规则，或者通过 Web 项目的\
    \ `faces-config.xml` 恢复 `<h:head>` 的默认渲染器。\n"
- fmt: "```xml\n<render-kit>\n    <renderer>\n        <component-family>javax.faces.Output</component-family>\n\
    \        <renderer-type>javax.faces.Head</renderer-type>\n        <renderer-class>\n\
    \            com.sun.faces.renderkit.html_basic.HeadRenderer\n        </renderer-class>\n\
    \    </renderer>\n</render-kit>\n```\n\nIn case you’re using MyFaces instead of\
    \ Mojarra as JSF implementation, use `org.apache.myfaces.renderkit.html.HtmlHeadRenderer`\
    \ instead as the renderer class.\n\nIn case you intend to develop such a JSF library\
    \ which automatically includes specific resources, keep in mind to use `@ResourceDependency`\
    \ or `UIViewRoot#addComponentResource()` instead of replacing the default renderer\
    \ of `<h:head>` for the purpose. As annotations don’t allow specifying dynamic\
    \ values, any dynamic resources can best be added during the `PostAddToView` event\
    \ of `<h:head>`. This can be achieved application-wide with a `SystemEventListener`\
    \ as follows assuming that the JSF library’s resource library name is `\"foo\"\
    `:\n\n```\npublic class DynamicResourceListener implements SystemEventListener\
    \ {\n\n    private static final String LIBRARY = \"foo\";\n\n    @Override\n \
    \   public boolean isListenerForSource(Object source) {\n        UIOutput output\
    \ = (UIOutput) source;\n        return \"javax.faces.Head\".equals(output.getRendererType());\n\
    \    }\n\n    @Override\n    public void processEvent(SystemEvent event) {\n \
    \       FacesContext context = event.getFacesContext();\n\n        String scriptName\
    \ = \"foo.js\"; // Can be dynamic.\n        addResource(context, scriptName);\n\
    \n        String stylesheetName = \"foo.css\"; // Can be dynamic.\n        addResource(context,\
    \ stylesheetName);\n    }\n\n    private void addResource(FacesContext context,\
    \ String name) {\n        UIComponent resource = new UIOutput();\n        resource.getAttributes().put(\"\
    library\", LIBRARY);\n        resource.getAttributes().put(\"name\", name);\n\
    \        resource.setRendererType(context.getApplication()\n            .getResourceHandler().getRendererTypeForResourceName(name));\n\
    \        context.getViewRoot()\n            .addComponentResource(context, resource,\
    \ \"head\");\n    }\n}\n```\n\nwhich is registered in `faces-config.xml` as follows:\n\
    \n```\n<system-event-listener>                                               \
    \     \n    <system-event-listener-class>\n        com.example.project.listener.DynamicResourceListener\n\
    \    </system-event-listener-class>\n    <system-event-class>\n        javax.faces.event.PostAddToViewEvent\n\
    \    </system-event-class>\n    <source-class>javax.faces.component.UIOutput</source-class>\n\
    </system-event-listener>\n```\n\nNote that `<source-class>` could better have\
    \ been a `javax.faces.component.html.HtmlHead`, but this doesn’t necessarily work\
    \ across all JSF implementations. In, for example, Mojarra, `<h:head>` implicitly\
    \ creates an instance of `UIOutput` instead of `HtmlHead`.\n\nOnce installed,\
    \ this `DynamicResourceListener` will result in the following HTML output for\
    \ exactly the last shown test Facelet with `style1.css`, `script1.js`, `script2.js`,\
    \ etc. (also here, URLs are simplified for brevity).\n\n```\n<head>\n    <title>Resource\
    \ component relocation demo.</title>\n    <script type=\"text/javascript\" src=\"\
    script1.js\"></script>\n    <script type=\"text/javascript\" src=\"foo.js\"></script>\n\
    \    <link type=\"text/css\" rel=\"stylesheet\" href=\"foo.css\" />\n    <link\
    \ type=\"text/css\" rel=\"stylesheet\" href=\"style1.css\" />\n    <script type=\"\
    text/javascript\" src=\"script2.js\"></script>\n    <link type=\"text/css\" rel=\"\
    stylesheet\" href=\"style2.css\" />\n    <script type=\"text/javascript\" src=\"\
    script5.js\"></script>\n</head>\n<body>\n    <p>Paragraph 1</p>\n    <script type=\"\
    text/javascript\" src=\"script4.js\"></script>\n    <p>Paragraph 2</p>\n    <script\
    \ type=\"text/javascript\" src=\"script3.js\"></script>\n    <script type=\"text/javascript\"\
    \ src=\"script6.js\"></script>\n</body>\n```\n\nThe resource rendering order in\
    \ the document head is thus:\n\n1. `<h:outputScript>` from `<h:head>` without\
