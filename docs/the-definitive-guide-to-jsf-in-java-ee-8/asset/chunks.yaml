    ```


    It only does that quite verbosely. Essentially, you’re here reinventing the job
    of Facelets. There’s really nothing which is impossible using XML and only possible
    in Java. As long as you understand how you can use JSTL for this:


    ```

    <h:form id="dynamicFormId">

        <c:forEach items="#{dynamicForm.fields}" var="field">

            <t:field type="#{field.type}"

                id="#{field.name}" label="#{field.label}"

                value="#{dynamicForm.values[field.name]}">

            </t:field>

        </c:forEach>

    </h:form>

    ```


    wherein the #{dynamicForm} instead looks something like the following:


    ```

    @Named @RequestScoped

    public class DynamicForm {


    private List<Field> fields;

        private Map<String, Object> values = new HashMap<>();


    @Inject

        public FieldService fieldService;


    public List<Field> getFields() {

            if (fields = null) {

                FacesContext context = FacesContext.getCurrentInstance();

                UIComponent form = UIComponent.getCurrentComponent(context);

                fields = fieldService.list(form.getId());

            }

            return fields;

        }


    public Map<String, Object> getValues() {

            return values;

        }

    }

    ```


    You see, there is no need to mess with manually creating and populating UIComponent
    instances. Facelets does that all for you based on simple XML. The <t:field> can
    be found in the section “Tag Files” in Chapter [7](#A454457_1_En_7_Chapter.xhtml).


