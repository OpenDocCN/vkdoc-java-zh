    \ }\n}\n```\n\n其中，抽象类 `Field` 代表你自定义的表单字段模型，至少包含 `type`、`name` 和 `label` 属性，而\
    \ `TextField#populate()` 的具体实现大致如下：\n\n```\npublic void populate(DynamicFormBean\
    \ form) {\n    form.createOutputLabel(this);\n    form.createInputText(this);\n\
    \    form.createMessage(this);\n}\n```\n\n请注意具体 UIComponent 类的命名模式。对于 HTML 组件，它们严格遵循\
    \ `“Html[TagName]”` 的约定。例如，`<h:inputText>` 对应 `HtmlInputText`，以此类推。上述 Java 示例将基本生成以下\
    \ XML 表示：\n\n```\n<h:outputLabel id=\"name_l\" for=\"name\" value=\"Label\" />\n\
    <h:inputText id=\"name\" value=\"#{dynamicForm.values['name']}\" />\n<h:message\
    \ id=\"name_m\" for=\"name\" />\n```\n\n它只是相当冗长地完成了这项工作。本质上，你是在重新发明 Facelets 的工作。使用\
    \ XML 并非不可能，而仅用 Java 也能实现。只要你理解如何为此使用 JSTL：\n\n```\n<h:form id=\"dynamicFormId\"\
    >\n    <c:forEach items=\"#{dynamicForm.fields}\" var=\"field\">\n        <t:field\
    \ type=\"#{field.type}\"\n            id=\"#{field.name}\" label=\"#{field.label}\"\
    \n            value=\"#{dynamicForm.values[field.name]}\">\n        </t:field>\n\
    \    </c:forEach>\n</h:form>\n```\n\n其中，`#{dynamicForm}` 看起来大致如下：\n\n```\n@Named\
    \ @RequestScoped\npublic class DynamicForm {\n\nprivate List<Field> fields;\n\
    \    private Map<String, Object> values = new HashMap<>();\n\n@Inject\n    public\
    \ FieldService fieldService;\n\npublic List<Field> getFields() {\n        if (fields\
    \ = null) {\n            FacesContext context = FacesContext.getCurrentInstance();\n\
    \            UIComponent form = UIComponent.getCurrentComponent(context);\n  \
    \          fields = fieldService.list(form.getId());\n        }\n        return\
    \ fields;\n    }\n\npublic Map<String, Object> getValues() {\n        return values;\n\
    \    }\n}\n```\n\n你看，无需手动创建和填充 UIComponent 实例。Facelets 会基于简单的 XML 为你完成所有工作。`<t:field>`\
    \ 可在第 7 章的“标签文件”部分找到。\n\n# 脚注\n\n1 [`javaee.github.io/javaee-spec/javadocs/javax/faces/event/AbortProcessingException.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/event/AbortProcessingException.html)\
    \ .\n\n2 [`javaee.github.io/javaee-spec/javadocs/javax/faces/component/EditableValueHolder.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/component/EditableValueHolder.html)\
    \ .\n\n3 [`javaee.github.io/javaee-spec/javadocs/javax/faces/event/PhaseListener.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/event/PhaseListener.html)\
    \ .\n\n4 [`javaee.github.io/javaee-spec/javadocs/javax/faces/event/PhaseId.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/event/PhaseId.html)\
    \ .\n\n5 [`javaee.github.io/javaee-spec/javadocs/javax/faces/lifecycle/Lifecycle.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/lifecycle/Lifecycle.html)\
    \ .\n\n6 [`javaee.github.io/javaee-spec/javadocs/javax/faces/event/ComponentSystemEvent.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/event/ComponentSystemEvent.html)\
    \ .\n\n7 [`javaee.github.io/javaee-spec/javadocs/javax/faces/event/ComponentSystemEventListener.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/event/ComponentSystemEventListener.html)\
    \ .\n\n8 [`javaserverfaces.github.io/docs/2.3/vdldocs/facelets/c/tld-summary.html`](https://javaserverfaces.github.io/docs/2.3/vdldocs/facelets/c/tld-summary.html)\
    \ .\n\n9 [`javaee.github.io/javaee-spec/javadocs/javax/faces/component/UIComponent.html`](https://javaee.github.io/javaee-spec/javadocs/javax/faces/component/UIComponent.html)\
    \ .\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java\
    \ EE 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_4`\n\n# 4. 表单组件\n\nBauke Scholtz^(1 )\
    \ 和 Arjan Tijms²\n\n(1) 库拉索岛威廉斯塔德\n\n(2) 荷兰北荷兰省阿姆斯特丹\n\n这些是标准 JSF（JavaServer Faces）组件集中最重要的组件。没有它们，JSF\
    \ 一开始就不会非常有用。当使用纯 HTML 元素而不是 JSF 组件时，你最终会用代码污染控制器，以手动应用、转换和验证提交的值；用这些值更新模型；并找出要调用的操作方法。这正是\
    \ JSF 作为基于 HTML 表单的 Web 应用程序的组件化 MVC（模型-视图-控制器）框架，应该为你分担的繁重工作。\n\n## 输入、选择和命令组件\n\
    \n所有输入组件都继承自 `UIInput` 超类。所有选择组件都继承自其子类，可以是 `UISelectBoolean`、`UISelectOne` 或\
    \ `UISelectMany`。（有关标准 JSF 组件的完整列表，请参见第 3 章的表 3-1。）所有输入和选择组件都实现了 `EditableValueHolder`\
    \ 接口，该接口允许附加 `Converter`、`Validator` 和 `ValueChangeListener`。所有命令组件都继承自 `UICommand`\
    \ 超类，并实现 `ActionSource` 接口，该接口允许定义一个或多个应在调用应用程序阶段（第五阶段）调用的托管 bean 方法。它们只能有一个“action”方法和多个“action\
    \ listener”方法。\n\nHTML 要求所有输入、选择和命令元素都嵌套在表单元素中。标准 JSF 组件集只提供一个这样的组件，即 `<h:form>`，它来自\
    \ `UIForm` 超类。你也可以使用纯 HTML `<form>` 元素，但它不会自动在表单中包含表示 JSF 视图状态的强制性 `javax.faces.ViewState`\
    \ 隐藏输入字段。`<h:form>` 的渲染器负责自动将其包含在生成的每个 JSF 表单的 HTML 表示中。没有它，JSF 将无法识别该请求为有效的回发请求。换句话说，`FacesContext.getCurrentInstance().isPostback()`\
    \ 将返回 `false`，然后 JSF 甚至不会处理提交的值，更不用说调用操作方法了。JSF 页面中的纯 HTML `<form>` 元素仅对结合 `<f:viewParam>`\
    \ 标签的 GET 请求有用，这些标签应负责处理提交的输入值。这将在后面的“GET 表单”部分详细说明。\n\n所有命令组件都有一个 `action` 属性，可以绑定到托管\
    \ bean 方法。只要没有转换或验证错误，此方法将在调用应用程序阶段（第五阶段）被调用。转换和验证将在第 5 章中介绍，因此我们在此跳过详细说明此步骤。\n"
- fmt: "# Text-Based Input Components\n\nAll text-based input components have a `value`\
    \ attribute which can be bound to a managed bean property. The getter of this\
    \ property will, during the view render time, be consulted to retrieve and display\
    \ any preset value. And, the setter of this property will, during the update model\
    \ values phase (fourth phase) of the postback request, be invoked with the submitted\
    \ and already converted and validated value, if applicable. Following is a basic\
    \ usage example which demonstrates all text-based input components.\n\nFacelets\
    \ file `/test.xhtml`:\n\n```\n<h:form>\n    <h:inputText value=\"#{bean.text}\"\
    \ />\n    <h:inputSecret value=\"#{bean.password}\" />\n    <h:inputTextarea value=\"\
    #{bean.message}\" />\n    <h:inputHidden value=\"#{bean.hidden}\" />\n    <h:commandButton\
    \ value=\"Submit\" action=\"#{bean.submit}\" />\n</h:form>\n```\n\nBacking bean\
    \ class `com.example.project.view.Bean`:\n\n```\n@Named @RequestScoped\npublic\
    \ class Bean {\n\n    private String text;\n    private String password;\n   \
    \ private String message;\n    private String hidden;\n\n    public void submit()\
    \ {\n        System.out.println(\"Form has been submitted!\");\n        System.out.println(\"\
    text: \" + text);\n        System.out.println(\"password: \" + password);\n  \
    \      System.out.println(\"message: \" + message);\n        System.out.println(\"\
    hidden: \" + hidden);\n    }\n\n    // Add/generate getters and setters for every\
    \ property here.\n}\n```\n\nGenerated HTML output:\n\n```\n<form id=\"j_idt4\"\
    \ name=\"j_idt4\" method=\"post\"\n    action=\"/project/test.xhtml\"\n    enctype=\"\
    application/x-www-form-urlencoded\">\n    <input type=\"hidden\" name=\"j_idt4\"\
    \ value=\"j_idt4\" />\n    <input type=\"text\" name=\"j_idt4:j_idt5\" />\n  \
    \  <input type=\"password\" name=\"j_idt4:j_idt6\" />\n    <textarea name=\"j_idt4:j_idt7\"\
    ></textarea>\n    <input type=\"hidden\" name=\"j_idt4:j_idt8\" />\n    <input\
    \ type=\"submit\" name=\"j_idt4:j_idt9\" value=\"Submit\" />\n    <input type=\"\
    hidden\" name=\"javax.faces.ViewState\"\n        id=\"j_id1:javax.faces.ViewState:0\"\
    \n        value=\"-4091383829147627416:3884402765892734278\"\n        autocomplete=\"\
    off\" />\n</form>\n```\n\nRendering in Chrome browser (with newlines added):\n\
    \n![A454457_1_En_4_Figa_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figa_HTML.jpg)\n\
    \nYou’ll notice several things in the generated HTML output. Undoubtedly the first\
    \ thing noticeable is that JSF has also automatically generated `id` and `name`\
    \ attributes of the HTML elements, all with a `j_id` prefix which is defined by\
    \ the public API (application programming interface) constant `UIViewRoot.UNIQUE_ID_PREFIX`.\
    \ The “t” basically stands for “tree” and the number basically represents the\
    \ position of the component in the component tree. This is thus prone to be changed\
    \ whenever you add, remove, or move around components in the Facelets file. This\
    \ is thus also subject to headaches when QA (quality assurance) needs to write\
    \ integration tests for the web application wherein more than often the HTML element\
    \ IDs need to be used.\n\nJSF will use an autogenerated ID when it’s mandatory\
    \ for the functionality in order to have an `id` and/or a `name` attribute in\
    \ the generated HTML output. The `id` attribute is mandatory in order to be able\
    \ to find the HTML element by any JavaScript code which can also be autogenerated\
    \ by JSF, such as functions responsible for the Ajax works. As this makes the\
    \ generated HTML code rather hard to read and, frankly, ugly, we’d like to just\
    \ explicitly specify the `id` attribute of any JSF form, input, select, and command\
    \ component. This way JSF will just use it for the `id` and `name` attributes\
    \ of the HTML elements instead of autogenerating one. Now, let’s rewrite the Facelets\
    \ file `/test.xhtml` for that. A good practice is to let the ID attribute of the\
    \ input component match exactly the bean property name, and the ID attribute of\
    \ the command component match exactly the bean method name. This would end up\
    \ in more self-documenting code and generated HTML output.\n\n```\n<h:form id=\"\
    form\">\n    <h:inputText id=\"text\" value=\"#{bean.text}\" />\n    <h:inputSecret\
    \ id=\"password\" value=\"#{bean.password}\" />\n    <h:inputTextarea id=\"message\"\
    \ value=\"#{bean.message}\" />\n    <h:inputHidden id=\"hidden\" value=\"#{bean.hidden}\"\
    \ />\n    <h:commandButton id=\"submit\" value=\"Submit\"\n        action=\"#{bean.submit}\"\
    \ />\n</h:form>\n```\n\nNow, the generated HTML output looks as follows:\n\n```\n\
    <form id=\"form\" name=\"form\" method=\"post\" action=\"/project/test.xhtml\"\
    \n    enctype=\"application/x-www-form-urlencoded\">\n    <input type=\"hidden\"\
    \ name=\"form\" value=\"form\" />\n    <input id=\"form:text\" type=\"text\" name=\"\
    form:text\" />\n    <input id=\"form:password\" type=\"password\" name=\"form:password\"\
    \ />\n    <textarea id=\"form:message\" name=\"form:message\"></textarea>\n  \
    \  <input id=\"form:hidden\" type=\"hidden\" name=\"form:hidden\" />\n    <input\
    \ id=\"form:submit\" type=\"submit\" name=\"form:submit\"\n        value=\"Submit\"\
    \ />\n    <input type=\"hidden\" name=\"javax.faces.ViewState\"\n        id=\"\
    j_id1:javax.faces.ViewState:0\"\n        value=\"-7192066430460949081:-3987350607752016894\"\
    \n        autocomplete=\"off\" />\n</form>\n```\n\nThat’s already clearer. Note\
    \ that when you explicitly set a component ID, it will always end up in the generated\
    \ HTML output. The generated HTML element ID, then, represents the “client ID”\
    \ which may be different from the component ID, depending on its parents. If the\
    \ component has any parent which is an instance of `NamingContainer` interface,\
    \ then the ID of the `NamingContainer` parent will be prepended to the client\
    \ ID of the component. From the standard JSF HTML component set, only the `<h:form>`\
    \ and `<h:dataTable>` are instances of `NamingContainer`. Others are `<ui:repeat>`\
    \ and `<f:subview>`.\n\nIf you look closer at the generated HTML output, there’s\
    \ only one generated ID left. It’s the one of the view state hidden input field,\
    \ which is always `j_id1`. It represents the ID of the `UIViewRoot` instance,\
    \ which by default cannot be set from a Facelets file on. When using JSF in Portlet-based\
    \ web applications instead of Servlet-based web applications, it is overridable\
    \ and would represent the unique name of the Portlet. In a Portlet-based web application\
    \ it is possible to have multiple Portlet views in a single JSF page. In other\
    \ words, a single JSF page in a Portlet-based web application can have multiple\
    \ `UIViewRoot` instances.\n\nComing back to the generated HTML output, the `name`\
    \ attribute of the HTML input element is mandatory for HTML in order to be able\
    \ to send the submitted values as request parameters via HTTP. It will become\
    \ the request parameter name. In any decent web browser you can inspect the request\
    \ parameters in the “Network” section of the web developer’s toolset, which is\
    \ accessible by pressing F12 in the web browser. Figure [4-1](#A454457_1_En_4_Chapter.xhtml#Fig1)\
    \ shows how Chrome presents the postback request after submitting the form with\
    \ some values filled out, as you can see in the “Form Data” section of the figure.\n\
    \n![A454457_1_En_4_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_4_Fig1_HTML.jpg)"
