- fmt: "# Providing Our Custom JSF Code\n\nIn the sections above, we first defined\
    \ our security constraints (which views are protected), then we set up the authentication\
    \ mechanism (how do our callers interact with our application in order to authenticate),\
    \ and finally we set up the identity store (where the caller data resides).\n\n\
    It’s now time to plug our own custom code into the authentication process. This\
    \ primarily happens by providing the view that the authentication mechanism directs\
    \ to when it needs to collect the caller’s credentials (e-mail and password in\
    \ this case).\n\nThe login page can be kept relative simple—a standard form page,\
    \ with two inputs bound to our backing bean, and a button to submit.\n\n```\n\
    <!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n    <h:head>\n        <title>Log\
    \ In</title>\n    </h:head>\n    <h:body>\n        <h1>Log In</h1>\n        <h:form>\n\
    \            <h:outputLabel for=\"email\" value=\"Email\" />\n            <h:inputText\
    \ id=\"email\" value=\"#{login.email}\" />\n            <br />\n            <h:outputLabel\
    \ for=\"password\" value=\"Password\" />\n            <h:inputSecret id=\"password\"\
    \ value=\"#{login.password}\" />\n            <br />\n            <h:commandButton\
    \ value=\"Login\" action=\"#{login.submit}\" />\n            <h:messages />\n\
    \        </h:form>\n    </h:body>\n</html>\n```\n\nThe page above is a totally\
    \ normal JSF view. This specifically means that contrary to classical HTML `<form\
    \ method=\"post\" action=\"j_security_check\">` of FORM authentication the authentication\
    \ mechanism does not monitor the postback URL in any way and therefore there aren’t\
    \ any constraints being placed on the input elements that collect the credentials.\n\
    \nInstead, the JSF backing bean has to collect these credentials and then programmatically\
    \ pass these along and signal the authentication mechanism to continue the dialog.\
    \ Before passing the credentials along, JSF is free to do its own validation and\
    \ engage in its own dialog with the caller without the authentication mechanism\
    \ having to be involved with this. Note that the command button explicitly doesn’t\
    \ use Ajax to submit. You can do so, but then the average web browser won’t suggest\
    \ the end user to remember the login credentials on its behalf.\n\nThe following\
    \ shows a full example of the backing bean handling the login call. We’ll discuss\
    \ the parts individually below.\n\n```\n@Named @RequestScoped\npublic class Login\
    \ {\n\n@NotNull\n    @Email\n    private String email;\n\n@NotNull\n    @Size(min\
    \ = 8, message = \"Password must be at least 8 characters\")\n    private String\
    \ password;\n\n@Inject\n    private SecurityContext securityContext;\n\n@Inject\n\
    \    private ExternalContext externalContext;\n\n@Inject\n    private FacesContext\
    \ facesContext;\n\npublic void submit() {\n        switch (continueAuthentication())\
    \ {\n            case SEND_CONTINUE:\n                facesContext.responseComplete();\n\
    \                break;\n\ncase SEND_FAILURE:\n                facesContext.addMessage(null,\
    \ new FacesMessage(\n                    FacesMessage.SEVERITY_ERROR, \"Login\
    \ failed\", null));\n                break;\n\ncase SUCCESS:\n               \
    \ facesContext.addMessage(null, new FacesMessage(\n                    FacesMessage.SEVERITY_INFO,\
    \ \"Login succeed\", null));\n                break;\n\ncase NOT_DONE:\n     \
    \           // Doesn’t happen here\n        }\n    }\n\nprivate AuthenticationStatus\
    \ continueAuthentication() {\n        return securityContext.authenticate(\n \
    \           (HttpServletRequest) externalContext.getRequest(),\n            (HttpServletResponse)\
    \ externalContext.getResponse(),\n            AuthenticationParameters.withParams().credential(\n\
    \                new UsernamePasswordCredential(email, password))\n        );\n\
    \    }\n\npublic String getEmail() {\n        return email;\n    }\n\npublic void\
    \ setEmail(String email) {\n        this.email = email;\n    }\n\npublic String\
    \ getPassword() {\n        return password;\n    }\n\npublic void setPassword(String\
    \ password) {\n        this.password = password;\n    }\n}\n```\n\nWe start the\
    \ backing bean with two instance variables corresponding with the credentials\
    \ we collect.\n\n```\n@NotNull\n@Email\nprivate String email;\n\n@NotNull\n@Size(min\
    \ = 8, message = \"Password must be at least 8 characters\")\nprivate String password;\n\
    ```\n\nThis clearly shows the advantage over the FORM authentication mechanism\
    \ in that we can easily pre-validate the user’s input using bean validation. Because\
    \ of JSF’s built-in integration with bean validation a standard faces message\
    \ will be made available for rendering should the input not pass validation.\n\
    \nNext, we defined injecting the contextual objects it needs. These are\n\n```\n\
    @Inject\nprivate SecurityContext securityContext;\n\n@Inject\nprivate ExternalContext\
    \ externalContext;\n\n@Inject\nprivate FacesContext facesContext;\n```\n\nThe\
    \ observant reader will recognize `ExternalContext` and `FacesContext` as being\
    \ two well-known native JSF classes, with the `SecurityContext` being the odd\
    \ one out. This class is from Java EE Security and we’ll use that here to communicate\
    \ with the authentication mechanism.\n\nContinuing the dialog happens in the `continueAuthentication()`\
    \ method as follows:\n\n```\nprivate AuthenticationStatus continueAuthentication()\
    \ {\n    return securityContext.authenticate(\n        (HttpServletRequest) externalContext.getRequest(),\n\
    \        (HttpServletResponse) externalContext.getResponse(),\n        AuthenticationParameters.withParams().credential(\n\
    \           new UsernamePasswordCredential(email, password))\n    );\n}\n```\n\
    \nThe call to `SecurityContext#authenticate()` will trigger the authentication\
    \ mechanism again. Since that mechanism will be a state where it waits for credentials\
    \ to be passed, it will indeed look for the credentials we pass in, and use those\
    \ to continue. As we’ll later see, we can also request that any potentially existing\
    \ state is discarded and a new dialog is started. Note that we have to cast the\
    \ request and response objects to `HttpServletRequest` and `HttpServletResponse`.\
    \ Unfortunately, this is needed since `ExternalContext` abstracts over Servlet\
    \ and Portlet requests and only returns `Object` for those two.\n\nThe `SecurityContext#authenticate()`\
    \ method returns a status that indicates in broad lines what the authentication\
    \ mechanism did. The action method of our JSF backing bean has to handle the following:\n\
    \n```\nswitch (continueAuthentication()) {\n    case SEND_CONTINUE:\n        facesContext.responseComplete();\n\
    \        break;\n\ncase SEND_FAILURE:\n        facesContext.addMessage(null, new\
    \ FacesMessage(\n            FacesMessage.SEVERITY_ERROR, \"Login failed\", null));\n\
    \        break;\n\ncase SUCCESS:\n        facesContext.addMessage(null, new FacesMessage(\n\
    \            FacesMessage.SEVERITY_INFO, \"Login succeed\", null));\n        break;\n\
    \ncase NOT_DONE:\n        // Doesn't happen here\n}\n```\n\nAs can be seen, there\
    \ are four possible outcomes.\n\nThe first one is `SEND_CONTINUE`, which basically\
    \ means “authentication in progress.” The authentication mechanism returned that\
    \ status when it took over the dialog again (e.g., by rendering its own response\
    \ or, more likely, by redirecting the caller to a new location). A JSF backing\
    \ bean should make sure the JSF life cycle is ended by calling `FacesContext#responseComplete()`\
    \ and furthermore refrain from interacting with the response itself in any way.\n\
    \nThe second one is `SEND_FAILURE`, which basically means “authentication failed.”\
    \ This status is returned when the authentication mechanism wasn’t able to validate\
    \ the credentials that were provided. In most cases this is when the caller provided\
    \ the wrong credentials. A JSF backing bean can respond to this by setting a faces\
    \ message and re-display the login form."
  raw: '## Providing Our Custom JSF Code


    In the sections above, we first defined our security constraints (which views
    are protected), then we set up the authentication mechanism (how do our callers
    interact with our application in order to authenticate), and finally we set up
    the identity store (where the caller data resides).


    It’s now time to plug our own custom code into the authentication process. This
    primarily happens by providing the view that the authentication mechanism directs
    to when it needs to collect the caller’s credentials (e-mail and password in this
    case).


    The login page can be kept relative simple—a standard form page, with two inputs
    bound to our backing bean, and a button to submit.


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>Log In</title>

        </h:head>

        <h:body>

            <h1>Log In</h1>

            <h:form>

                <h:outputLabel for="email" value="Email" />

                <h:inputText id="email" value="#{login.email}" />

                <br />

                <h:outputLabel for="password" value="Password" />

                <h:inputSecret id="password" value="#{login.password}" />

                <br />

                <h:commandButton value="Login" action="#{login.submit}" />

                <h:messages />

            </h:form>

        </h:body>

    </html>

    ```


    The page above is a totally normal JSF view. This specifically means that contrary
    to classical HTML <form method="post" action="j_security_check"> of FORM authentication
    the authentication mechanism does not monitor the postback URL in any way and
    therefore there aren’t any constraints being placed on the input elements that
    collect the credentials.


    Instead, the JSF backing bean has to collect these credentials and then programmatically
    pass these along and signal the authentication mechanism to continue the dialog.
    Before passing the credentials along, JSF is free to do its own validation and
    engage in its own dialog with the caller without the authentication mechanism
    having to be involved with this. Note that the command button explicitly doesn’t
    use Ajax to submit. You can do so, but then the average web browser won’t suggest
    the end user to remember the login credentials on its behalf.


    The following shows a full example of the backing bean handling the login call.
    We’ll discuss the parts individually below.


    ```

    @Named @RequestScoped

    public class Login {


    @NotNull

        @Email

        private String email;


    @NotNull

        @Size(min = 8, message = "Password must be at least 8 characters")

        private String password;


    @Inject

        private SecurityContext securityContext;


    @Inject

        private ExternalContext externalContext;


    @Inject

        private FacesContext facesContext;


    public void submit() {

            switch (continueAuthentication()) {

                case SEND_CONTINUE:

                    facesContext.responseComplete();

                    break;


    case SEND_FAILURE:

                    facesContext.addMessage(null, new FacesMessage(

                        FacesMessage.SEVERITY_ERROR, "Login failed", null));

                    break;


    case SUCCESS:

                    facesContext.addMessage(null, new FacesMessage(

                        FacesMessage.SEVERITY_INFO, "Login succeed", null));

                    break;


    case NOT_DONE:

                    // Doesn’t happen here

            }

        }


    private AuthenticationStatus continueAuthentication() {

            return securityContext.authenticate(

                (HttpServletRequest) externalContext.getRequest(),

                (HttpServletResponse) externalContext.getResponse(),

                AuthenticationParameters.withParams().credential(

                    new UsernamePasswordCredential(email, password))

            );

        }


    public String getEmail() {

            return email;

        }


    public void setEmail(String email) {

            this.email = email;

        }


    public String getPassword() {

            return password;

        }


    public void setPassword(String password) {

            this.password = password;

        }

    }

    ```


    We start the backing bean with two instance variables corresponding with the credentials
    we collect.


    ```

    @NotNull

    @Email

    private String email;


    @NotNull

    @Size(min = 8, message = "Password must be at least 8 characters")

    private String password;

    ```


    This clearly shows the advantage over the FORM authentication mechanism in that
    we can easily pre-validate the user’s input using bean validation. Because of
    JSF’s built-in integration with bean validation a standard faces message will
    be made available for rendering should the input not pass validation.


    Next, we defined injecting the contextual objects it needs. These are


    ```

    @Inject

    private SecurityContext securityContext;


    @Inject

    private ExternalContext externalContext;


    @Inject

    private FacesContext facesContext;

    ```


    The observant reader will recognize ExternalContext and FacesContext as being
    two well-known native JSF classes, with the SecurityContext being the odd one
    out. This class is from Java EE Security and we’ll use that here to communicate
    with the authentication mechanism.


    Continuing the dialog happens in the continueAuthentication() method as follows:


    ```

    private AuthenticationStatus continueAuthentication() {

        return securityContext.authenticate(

            (HttpServletRequest) externalContext.getRequest(),

            (HttpServletResponse) externalContext.getResponse(),

            AuthenticationParameters.withParams().credential(

               new UsernamePasswordCredential(email, password))

        );

    }

    ```


    The call to SecurityContext#authenticate() will trigger the authentication mechanism
    again. Since that mechanism will be a state where it waits for credentials to
    be passed, it will indeed look for the credentials we pass in, and use those to
    continue. As we’ll later see, we can also request that any potentially existing
    state is discarded and a new dialog is started. Note that we have to cast the
    request and response objects to HttpServletRequest and HttpServletResponse. Unfortunately,
    this is needed since ExternalContext abstracts over Servlet and Portlet requests
    and only returns Object for those two.


    The SecurityContext#authenticate() method returns a status that indicates in broad
    lines what the authentication mechanism did. The action method of our JSF backing
    bean has to handle the following:


    ```

    switch (continueAuthentication()) {

        case SEND_CONTINUE:

            facesContext.responseComplete();

            break;


    case SEND_FAILURE:

            facesContext.addMessage(null, new FacesMessage(

                FacesMessage.SEVERITY_ERROR, "Login failed", null));

            break;


    case SUCCESS:

            facesContext.addMessage(null, new FacesMessage(

                FacesMessage.SEVERITY_INFO, "Login succeed", null));

            break;


    case NOT_DONE:

            // Doesn''t happen here

    }

    ```


    As can be seen, there are four possible outcomes.


    The first one is SEND_ CONTINUE, which basically means “authentication in progress.”
    The authentication mechanism returned that status when it took over the dialog
    again (e.g., by rendering its own response or, more likely, by redirecting the
    caller to a new location). A JSF backing bean should make sure the JSF life cycle
    is ended by calling FacesContext#responseComplete() and furthermore refrain from
    interacting with the response itself in any way.


    The second one is SEND_FAILURE, which basically means “authentication failed.”
    This status is returned when the authentication mechanism wasn’t able to validate
    the credentials that were provided. In most cases this is when the caller provided
    the wrong credentials. A JSF backing bean can respond to this by setting a faces
    message and re-display the login form.'
  trans: '

    ## 提供自定义 JSF 代码


    在前面的章节中，我们首先定义了安全约束（哪些视图受保护），然后设置了认证机制（调用者如何与我们的应用交互以进行认证），最后设置了身份存储（调用者数据存放的位置）。


    现在，我们需要将自定义代码接入认证流程。这主要通过提供认证机制在需要收集调用者凭证（本例中为电子邮件和密码）时指向的视图来实现。


    登录页面可以保持相对简单——一个标准表单页面，包含两个绑定到后台 Bean 的输入字段，以及一个提交按钮。


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>登录</title>

        </h:head>

        <h:body>

            <h1>登录</h1>

            <h:form>

                <h:outputLabel for="email" value="电子邮件" />

                <h:inputText id="email" value="#{login.email}" />

                <br />

                <h:outputLabel for="password" value="密码" />

                <h:inputSecret id="password" value="#{login.password}" />

                <br />

                <h:commandButton value="登录" action="#{login.submit}" />

                <h:messages />

            </h:form>

        </h:body>

    </html>

    ```


    上面的页面是一个完全正常的 JSF 视图。这特别意味着，与 FORM 认证中经典的 HTML `<form method="post" action="j_security_check">`
    不同，认证机制不会以任何方式监控回发 URL，因此对收集凭证的输入元素没有任何限制。


    相反，JSF 后台 Bean 必须收集这些凭证，然后以编程方式传递它们，并通知认证机制继续对话。在传递凭证之前，JSF 可以自由地进行自己的验证，并与调用者进行自己的对话，而无需认证机制参与其中。请注意，命令按钮明确不使用
    Ajax 提交。你也可以这样做，但那样的话，普通浏览器就不会提示最终用户代表它记住登录凭证。


    下面展示了一个处理登录调用的后台 Bean 的完整示例。我们将在下文逐一讨论各个部分。


    ```

    @Named @RequestScoped

    public class Login {


    @NotNull

        @Email

        private String email;


    @NotNull

        @Size(min = 8, message = "密码长度至少为 8 个字符")

        private String password;


    @Inject

        private SecurityContext securityContext;


    @Inject

        private ExternalContext externalContext;


    @Inject

        private FacesContext facesContext;


    public void submit() {

            switch (continueAuthentication()) {

                case SEND_CONTINUE:

                    facesContext.responseComplete();

                    break;


    case SEND_FAILURE:

                    facesContext.addMessage(null, new FacesMessage(

                        FacesMessage.SEVERITY_ERROR, "登录失败", null));

                    break;


    case SUCCESS:

                    facesContext.addMessage(null, new FacesMessage(

                        FacesMessage.SEVERITY_INFO, "登录成功", null));

                    break;


    case NOT_DONE:

                    // 此处不会发生

            }

        }


    private AuthenticationStatus continueAuthentication() {

            return securityContext.authenticate(

                (HttpServletRequest) externalContext.getRequest(),

                (HttpServletResponse) externalContext.getResponse(),

                AuthenticationParameters.withParams().credential(

                    new UsernamePasswordCredential(email, password))

            );

        }


    public String getEmail() {

            return email;

        }


    public void setEmail(String email) {

            this.email = email;

        }


    public String getPassword() {

            return password;

        }


    public void setPassword(String password) {

            this.password = password;

        }

    }

    ```


    我们以两个与所收集凭证对应的实例变量开始后台 Bean。


    ```

    @NotNull

    @Email

    private String email;


    @NotNull

    @Size(min = 8, message = "密码长度至少为 8 个字符")

    private String password;

    ```


    这清楚地展示了相对于 FORM 认证机制的优势，即我们可以使用 Bean 验证轻松地预先验证用户的输入。由于 JSF 内置了与 Bean 验证的集成，如果输入未通过验证，将提供一个标准的
    faces 消息用于渲染。


    接下来，我们定义了注入所需的上下文对象。这些对象是：


    ```

    @Inject

    private SecurityContext securityContext;


    @Inject

    private ExternalContext externalContext;


    @Inject

    private FacesContext facesContext;

    ```


    细心的读者会认出 `ExternalContext` 和 `FacesContext` 是两个众所周知的 JSF 原生类，而 `SecurityContext`
    则是例外。这个类来自 Java EE Security，我们将在这里使用它与认证机制进行通信。


    继续对话的过程发生在 `continueAuthentication()` 方法中，如下所示：


    ```

    private AuthenticationStatus continueAuthentication() {

        return securityContext.authenticate(

            (HttpServletRequest) externalContext.getRequest(),

            (HttpServletResponse) externalContext.getResponse(),

            AuthenticationParameters.withParams().credential(

               new UsernamePasswordCredential(email, password))

        );

    }

    ```


    调用 `SecurityContext#authenticate()` 将再次触发认证机制。由于该机制将处于等待传递凭证的状态，它确实会查找我们传入的凭证，并使用它们继续。正如我们稍后将看到的，我们也可以请求丢弃任何可能存在的状态并开始新的对话。请注意，我们必须将请求和响应对象转换为
    `HttpServletRequest` 和 `HttpServletResponse`。不幸的是，这是必需的，因为 `ExternalContext` 抽象了
    Servlet 和 Portlet 请求，并且对于这两个对象只返回 `Object`。


    `SecurityContext#authenticate()` 方法返回一个状态，该状态大致指示了认证机制所执行的操作。我们 JSF 后台 Bean 的动作方法必须处理以下情况：


    ```

    switch (continueAuthentication()) {

        case SEND_CONTINUE:

            facesContext.responseComplete();

            break;


    case SEND_FAILURE:

            facesContext.addMessage(null, new FacesMessage(

                FacesMessage.SEVERITY_ERROR, "登录失败", null));

            break;


    case SUCCESS:

            facesContext.addMessage(null, new FacesMessage(

                FacesMessage.SEVERITY_INFO, "登录成功", null));

            break;


    case NOT_DONE:

            // 此处不会发生

    }

    ```


    可以看出，有四种可能的结果。


    第一种是 `SEND_CONTINUE`，基本上意味着“认证进行中”。当认证机制重新接管对话时（例如，通过渲染自己的响应，或者更可能的是，通过将调用者重定向到新位置），它会返回此状态。JSF
    后台 Bean 应通过调用 `FacesContext#responseComplete()` 确保 JSF 生命周期结束，并且不再以任何方式与响应本身交互。


    第二种是 `SEND_FAILURE`，基本上意味着“认证失败”。当认证机制无法验证所提供的凭证时，会返回此状态。在大多数情况下，这是因为调用者提供了错误的凭证。JSF
    后台 Bean 可以通过设置 faces 消息并重新显示登录表单来响应此情况。

