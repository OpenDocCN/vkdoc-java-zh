    ## 本地化枚举


    本地化枚举最简洁的方式是直接将其自身标识作为资源包键。这能使枚举类避免混入硬编码资源包键等潜在的 UI 特定杂乱内容。通常，枚举的简单名称与枚举值的组合足以构成站点范围内的唯一标识符。以下是一个表示用户组的
    `com.example.project.model.Group` 枚举：


    ```

    public enum Group {

        USER,

        MANAGER,

        ADMINISTRATOR,

        DEVELOPER;

    }

    ```


    以及 `text.properties` 中的以下资源包条目：


    ```

    Group.USER = 用户

    Group.MANAGER = 管理员

    Group.ADMINISTRATOR = 系统管理员

    Group.DEVELOPER = 开发者

    ```


    你可以通过以下方式轻松实现本地化：


    ```

    <f:metadata>

        <f:importConstants type="com.example.project.model.Group" />

    </f:metadata>

    ...

    <h:selectManyCheckbox value="#{editUserBacking.user.groups}">

        <f:selectItems value="#{Group.values()}" var="group"

            itemLabel="#{text[''Group.'' += group]}" />

    </h:selectManyCheckbox>

    ```


    请注意，`<f:importConstants>` 是 JSF 2.3 新增的功能。它必须放置在 `<f:metadata>` 内部。其 `type` 属性必须指定枚举的完全限定名，或任何包含
    `public static final` 字段形式公共常量的类或接口。`<f:importConstants>` 会自动将这些常量以 `Map<String,
    Object>` 的形式导入 EL 作用域，其中映射键代表常量名称的字符串形式，映射值代表常量的实际值。


    通过 `#{Group.values()}` 你可以获取所有常量值的集合，然后每个值在 `itemLabel` 中被本地化。另请注意，`itemValue`
    被省略了，因为它默认使用 `var` 属性的值，这已经足够了。


    ## 参数化资源包值


    你还可以使用 `java.text.MessageFormat` API 的 `{0}` 占位符来参数化资源包条目。⁸ 在 JSF 端，只能通过 `<h:outputFormat>`
    进行替换，参数以 `<f:param>` 子元素的形式提供，顺序与占位符一致。给定以下条目：


    ```

    page_products.table.header = 产品表头：{0, choice, 0#没有产品

                                                 | 1#有 1 个产品

                                                 | 1<有{0}个产品}。

    ```


    可以使用 `<h:outputFormat>` 进行替换，如下所示：


    ```

    <h:outputFormat value="#{text[''page_products.table.header'']}">

        <f:param value="#{bean.products.size()}" />

    </h:outputFormat>

    ```


    ## 基于数据库的 ResourceBundle


    JSF 还支持将自定义的 `ResourceBundle` 实现指定为 `<base-name>`。这允许你以编程方式填充和提供所需的资源包，例如从多个资源包文件甚至从数据库中获取。在本例中，我们将默认的基于属性文件的资源包替换为从数据库加载条目的资源包。这使我们在组织资源包键方面更进一步。通过这种方式，你甚至可以通过基于
    Web 的界面来编辑它们。以下是 JPA 实体的样子：


    ```

    @Entity

    @Table(uniqueConstraints = {

        @UniqueConstraint(columnNames = { "locale", "key" })

    })

    public class Translation {


    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)

        private Long id;


    @Column(length = 5, nullable = false)

        private @NotNull Locale locale;


    @Column(length = 255, nullable = false)

        private @NotNull String key;


    @Lob @Column(nullable = false)

        private @NotNull String value;


    // 在此处添加/生成 getter 和 setter 方法。

    }

    ```


    请注意，JPA（Java 持久化 API）注解提供了足够的提示，说明表的 DDL（数据定义语言）应该是什么样子。当在 `persistence.xml` 中将
    `javax.persistence.schema-generation.database.action` 属性设置为 `create` 或 `drop-and-create`
    时，它将自动生成适当的 DDL。为完整起见，以下是 HSQL/pgSQL 风格的 DDL。


    ```

    CREATE TABLE Translation (

        id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

        locale VARCHAR(5) NOT NULL,

        key VARCHAR(255) NOT NULL,

        value CLOB NOT NULL

    );


    ALTER TABLE Translation

        ADD CONSTRAINT UK_Translation_locale_key

        UNIQUE (locale, key);

    ```


    以下是 EJB（企业 JavaBeans）服务的样子。


    ```

    @Stateless

    public class TranslationService {


    @PersistenceContext

        private EntityManager entityManager;


    @TransactionAttribute(value = REQUIRES_NEW)

        @SuppressWarnings("unchecked")

        public Object[][] getContent

            (Locale locale, Locale fallback)

        {

            List<Object[]> resultList = entityManager.createQuery(

                "SELECT t1.key, COALESCE(t2.value, t1.value)"

                    + " FROM Translation t1"

                    + " LEFT OUTER JOIN Translation t2"

                        + " ON t2.key = t1.key"

                        + " AND t2.locale = :locale"

                    + " WHERE t1.locale = :fallback")

                .setParameter("locale", locale)

                .setParameter("fallback", fallback)

                .getResultList();

            return resultList.toArray(new Object[resultList.size()][]);

        }

    }

    ```


    对于 JPA，我们只需要一个额外的转换器，用于在模型中的 `java.util.Locale` 和数据库中的 `VARCHAR`（由 `java.lang.String`
    表示）之间进行转换。你可以为此使用 JPA 2.0 的 `AttributeConverter`。它很像 JSF 转换器，但用于 JPA 实体。它相对简单，无需额外配置。请参见以下内容：


    ```

    public class LocaleConverter

        implements AttributeConverter<Locale, String>

    {

        @Override

        public String convertToDatabaseColumn(Locale locale) {

            return locale.toLanguageTag();

        }


    @Override

        public Locale convertToEntityAttribute(String languageTag) {

            return Locale.forLanguageTag(languageTag);

        }

    }

    ```


    现在我们有了自定义的 `ResourceBundle`；它被称为 `DatabaseResourceBundle`。将其放在包 `com.example.project.i18n`
    中。


    ```

    public class DatabaseResourceBundle extends ResourceBundle {


    private static final Control CONTROL = new DatabaseControl();


    @Override

        public Object handleGetObject(String key) {

            return getCurrentInstance().getObject(key);

        }


    @Override

        public Enumeration<String> getKeys() {

            return getCurrentInstance().getKeys();

        }

