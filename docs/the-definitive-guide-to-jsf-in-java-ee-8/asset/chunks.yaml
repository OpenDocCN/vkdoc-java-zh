  raw: 'They will be rendered in the same order as they are declared in the view.
    Only when you use an unordered Map implementation as value, such as HashMap, the
    order of items provided by <f:selectItems> will be undefined. It’s therefore better
    to use an ordered Map implementation, such as TreeMap or LinkedHashMap. When populating
    the available items as a Map, keep in mind that the map key represents the item
    label and the map value represents the item value. You’d perhaps intuitively expect
    it to be the other way around, but this was a technical limitation. That is, on
    the Java side, the map key enforces uniqueness while the map value doesn’t. And
    on the HTML side, the option label is supposed to be unique while the option value
    doesn’t need to be. Following is how you can populate such a map:


    ```

    private Map<String, String> availableItems;


    @PostConstruct

    public void init() {

        availableItems = new LinkedHashMap<>();

        availableItems.put("First item", "one");

        availableItems.put("Second item", "two");

        availableItems.put("Third item", "three");

    }


    // Add/generate getter. Note that a setter is unnecessary.

    ```


    As said, you can also use a TreeMap or HashMap, but then the item labels will
    become, respectively, sorted or unsorted, regardless of the insertion order.


    In case you’d really like to swap the map keys and values around on the view side,
    you can always do so by manually assigning the map entry value as an item label
    and the map entry key as an item value. You can do that with help of the var attribute
    of the <f:selectItems> by which you can declare the EL variable name of the currently
    iterated item. This can, in turn, be accessed in the itemValue and itemLabel attributes
    of the same tag. When you pass Map#entrySet() to the value attribute of the <f:selectItems>,
    then each iterated item will represent a Map.Entry instance. This has, in turn,
    getKey() and getValue() methods which are thus perfectly usable as EL properties
    .


    ```

    <f:selectItems value="#{bean.availableItems.entrySet()}" var="entry"

        itemValue="#{entry.key}" itemLabel="#{entry.value}">

    </f:selectItems>

    ```


    This also works when using a Collection or array as available items. You don’t
    explicitly need to first convert it to a Set (more specifically, Iterable), as
    demonstrated above. This is particularly useful when you have a Collection or
    an array of complex objects as available items, such as model entities .


    Model entity representing a “country”:


    ```

    public class Country {


    private Long id;

        private String code;

        private String name;


    // Add/generate getters and setters.

    }

    ```


    Backing bean:


    ```

    @Named @RequestScoped

    public class Bean {


    private String countryCode;

        private List<Country> availableCountries;


    @Inject

        private CountryService countryService;


    @PostConstruct

        public void init() {

            availableCountries = countryService.getAll();

        }


    // Add/generate getters and setters.

        // Note that a setter is unnecessary for availableCountries.

    }

    ```


    View:


    ```

    <h:selectOneMenu id="countryCode" value="#{bean.countryCode}">

        <f:selectItem itemValue="#{null}" itemLabel="-- select one --" />

        <f:selectItems value="#{bean.availableCountries}" var="country">

            itemValue="#{country.code}" itemLabel="#{country.name}"

        </f:selectItems>

    </h:selectOneMenu>

    ```


    Note that any persistence framework-specific annotations , such as JPA’s @Entity
    and @Id, and the actual implementation of CountryService, are omitted for clarity.
    Those are irrelevant to any front-end framework, such as JSF.


    With the above construct, the value as obtained from Country#getCode() will end
    up as value of the generated HTML <option> element. Now, when the form is submitted,
    it will become the submitted value of the selection component, which will in turn
    invoke the setter method behind the #{bean.countryCode} property with exactly
    that value. Of course, you can also use the whole Country object as the property
    value of the selection component, but that would require a converter which can
    convert between the complex object and a unique string suitable to be embedded
    in HTML output and sent as an HTTP request parameter. You can read more in Chapter
    [5](#A454457_1_En_5_Chapter.xhtml).


    ## SelectItemGroup


    In case you’d like to group a bunch of options under a common label, you can use
    the javax.faces.model.SelectItemGroup, which you in turn reference in the value
    attribute of the <f:selectItems>. Unfortunately, this cannot be done declaratively
    in the Facelets file on a custom nested model. You really have to map your model
    into the JSF-provided javax.faces.model.SelectItem for this. Following is a kickoff
    example:


    ```

    private List<SelectItem> availableItems;


    @PostConstruct

    public void init() {

        SelectItemGroup group1 = new SelectItemGroup("Group 1");

        group1.setSelectItems(new SelectItem[] {

            new SelectItem("Group 1 Value 1", "Group 1 Label 1"),

            new SelectItem("Group 1 Value 2", "Group 1 Label 2"),

            new SelectItem("Group 1 Value 3", "Group 1 Label 3")

        });

        SelectItemGroup group2 = new SelectItemGroup("Group 2");

        group2.setSelectItems(new SelectItem[] {

            new SelectItem("Group 2 Value 1", "Group 2 Label 1"),

            new SelectItem("Group 2 Value 2", "Group 2 Label 2"),

            new SelectItem("Group 2 Value 3", "Group 2 Label 3")

        });

        availableItems = Arrays.asList(group1, group2);


        // Add/generate getter for availableItems.

        // Note that a setter is unnecessary.

    }

    ```


    Noted that both model APIs have basically not changed since JSF 1.0 (2004) and
    that’s why you still see a SelectItemGroup#setSelectItems() method taking a SelectItem[]
    array instead of a SelectItem… varargs argument . This will certainly be worked
    on for JSF.next. When referencing it as <f:selectItems value="#{bean.availableItems}"
    /> in any selection component, below is how it would look for each of them.


    The <h:selectOneMenu> will render each group as HTML <optgroup>:


    ![A454457_1_En_4_Figf_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figf_HTML.jpg)


    The <h:selectOneRadio layout="pageDirection"> will render it as a nested table:


    ![A454457_1_En_4_Figg_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figg_HTML.jpg)


    The <h:selectManyListbox> will render each group as HTML <optgroup>:


    ![A454457_1_En_4_Figh_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figh_HTML.jpg)


    The <h:selectManyCheckbox layout="pageDirection"> will render it as a nested table
    :


    ![A454457_1_En_4_Figi_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figi_HTML.jpg)


    Note the importance of the layout="pageDirection" attribute in <h:selectOneRadio>
    and <h:selectManyCheckbox>. This will look much better than the default of layout="lineDirection"
    which would render everything in a big single table row.'
