    \n# 4. 表单组件\n\nBauke Scholtz¹ 和 Arjan Tijms²\n\n(1) 威廉斯塔德，库拉索\n(2) 阿姆斯特丹，北荷兰省，荷兰\n\
    \n这些是标准JSF（JavaServer Faces）组件集中最重要的组件。没有它们，JSF一开始就不会非常有用。如果使用纯HTML元素而不是JSF组件，你将不得不在控制器中编写代码来手动应用、转换和验证提交的值；用这些值更新模型；并找出要调用的操作方法。这正是JSF作为基于组件的MVC（模型-视图-控制器）框架，为基于HTML表单的Web应用程序所应承担的繁重工作。\n\
    \n## 输入、选择和命令组件\n\n所有输入组件都继承自`UIInput`超类。所有选择组件都继承自其子类，可以是`UISelectBoolean`、`UISelectOne`或`UISelectMany`。（有关标准JSF组件的完整列表，请参见第[3](#A454457_1_En_3_Chapter.xhtml)章的表[3-1](#A454457_1_En_3_Chapter.xhtml#Tab1)。）所有输入和选择组件都实现了`EditableValueHolder`接口，该接口允许附加`Converter`、`Validator`和`ValueChangeListener`。所有命令组件都继承自`UICommand`超类，并实现`ActionSource`接口，该接口允许定义一个或多个应在调用应用程序阶段（第五阶段）调用的受管Bean方法。它们只能有一个“动作”方法和多个“动作监听器”方法。\n\
    \nHTML要求所有输入、选择和命令元素都嵌套在表单元素中。标准JSF组件集只提供一个这样的组件，即`<h:form>`，它继承自`UIForm`超类。你也可以使用纯HTML的`<form>`元素，但它不会自动包含表单中表示JSF视图状态的必填隐藏输入字段`javax.faces.ViewState`。`<h:form>`的渲染器负责在生成的每个JSF表单的HTML表示中自动包含它。没有它，JSF将无法识别该请求为有效的回发请求。换句话说，`FacesContext.getCurrentInstance().isPostback()`将返回`false`，然后JSF甚至不会处理提交的值，更不用说调用操作方法了。JSF页面中的纯HTML`<form>`元素仅对结合`<f:viewParam>`标签的GET请求有用，这些标签负责处理提交的输入值。这将在后面的“GET表单”部分详细说明。\n\
    \n所有命令组件都有一个`action`属性，可以绑定到受管Bean的方法。只要没有转换或验证错误，该方法将在调用应用程序阶段（第五阶段）被调用。转换和验证将在第[5](#A454457_1_En_5_Chapter.xhtml)章中介绍，因此我们在此跳过详细说明。"
