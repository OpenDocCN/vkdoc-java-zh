- fmt: "关键点在于`ValueExpression#getType()`调用。该方法返回与组件`value`属性关联的EL表达式背后属性的实际类型。对于`<f:viewParam\
    \ value=\"#{editProduct.product}\">`，它将返回`Product.class`，这符合`Class<? extends BaseEntity>`。\n\
    \n回到自定义转换器（扩展标准转换器）这一不太常见的用例，假设你有一个在Web应用程序中重复出现的`<f:convertDateTime>`配置：\n\n\
    ```\n<f:convertDateTime type=\"localDate\" pattern=\"yyyy-MM-dd\" />\n```\n\n\
    并且你希望用类似以下内容替换它：\n\n```\n<t:convertLocalDate />\n```\n\n那么一种方法是直接扩展它，在构造函数中设置默认值，在`*.taglib.xml`文件中注册它，这样就完成了。以下是这样一个`LocalDateConverter`可能的样子：\n\
    \n```\n@FacesConverter(\"project.ConvertLocalDate\")\npublic class LocalDateConverter\
    \ extends DateTimeConverter {\n\npublic LocalDateConverter() {\n        setType(\"\
    localDate\");\n        setPattern(\"yyyy-MM-dd\");\n    }\n}\n```\n\n以下是`/WEB-INF/example.taglib.xml`条目：\n\
    \n```\n<tag>\n    <tag-name>convertLocalDate</tag-name>\n    <converter>\n   \
    \     <converter-id>project.ConvertLocalDate</converter-id>\n    </converter>\n\
    </tag>\n```\n\n或者，你也可以通过去掉转换器ID并将其设为`forClass`转换器，使其成为隐式转换器：\n\n```\n@FacesConverter(forClass=LocalDate.class)\n\
    ```\n\n这样你甚至不需要任何`<t:convertLocalDate>`标签。别忘了删除`example.taglib.xml`中的`<tag>`条目。它们不能同时使用。如果你需要这种情况，例如，因为你希望能够更改`LocalDate`模式，请创建另一个子类。\n\
    \n你甚至可以拥有针对`java.lang.String`类型属性的`forClass`转换器。当你希望有一个自动的应用程序范围的字符串修剪策略，以防止用户提交的值中的前导或尾随空格污染模型时，这非常有用。以下是这样一个转换器可能的样子：\n\
    \n```\n@FacesConverter(forClass=String.class)\npublic class TrimConverter implements\
    \ Converter<String> {\n\n@Override\n    public String getAsString\n        (FacesContext\
    \ context, UIComponent component, String modelValue)\n    {\n        return modelValue\
    \ == null ? \"\" : modelValue;\n    }\n\n@Override\n    public String getAsObject(FacesContext\
    \ context,\n        UIComponent component, String submittedValue)\n    {\n   \
    \     if (submittedValue == null || submittedValue.isEmpty()) {\n            return\
    \ null;\n        }\n\nString trimmed = submittedValue.trim();\n        return\
    \ trimmed.isEmpty() ? null : trimmed;\n    }\n}\n```\n\n最后但同样重要的是，当你需要将整个实体作为选择组件的`SelectItem`值提供时（另请参见第[4](#A454457_1_En_4_Chapter.xhtml)章），以及为`Country.class`提供自定义转换器：\n\
    \n```\n<h:selectOneMenu value=\"#{bean.country}\">\n    <f:selectItem itemValue=\"\
    #{null}\" itemLabel=\"-- select one --\" />\n    <f:selectItems value=\"#{bean.availableCountries}\"\
    \ var=\"country\">\n        itemValue=\"#{country}\" itemLabel=\"#{country.name}\"\
    \n    </f:selectItems>\n</h:selectOneMenu>\n```\n\n其中相关的支持bean属性声明如下：\n\n```\n\
    private Country country;\nprivate List<Country> availableCountries;\n```\n\n那么你需要记住，实体必须正确实现其`equals()`和`hashCode()`方法。否则，JSF在提交表单时可能会抛出令人困惑的验证错误。\n\
    \n> *Validation Error: Value is not valid*\n\n当bean是请求作用域而不是视图作用域，因此在每次回发时重新创建可用国家列表时，可能会发生这种情况。作为防止篡改请求的保护措施的一部分，JSF将重新遍历可用选项，以验证所选选项是否确实在其中。JSF将使用`Object#equals()`方法将所选选项与每个可用选项进行测试。如果对于任何可用选项，该方法都没有返回`true`，则会抛出上述验证错误。\n\
    \n继续以`BaseEntity`为例，以下是最好地实现其`equals()`和`hashCode()`方法的方式：\n\n```\n@Override\n\
    public boolean equals(Object other) {\n    if (getId() != null\n        && getClass().isInstance(other)\n\
    \        && other.getClass().isInstance(this))\n    {\n        return getId().equals(((BaseEntity)\
    \ other).getId());\n    }\n    else {\n        return (other == this);\n    }\n\
    }\n\n@Override\npublic int hashCode() {\n    if (getId() != null) {\n        return\
    \ Objects.hash(getId());\n    }\n    else {\n        return super.hashCode();\n\
    \    }\n}\n```\n\n注意`equals()`方法中的双向`Class#isInstance()`测试。这样做是为了代替`getClass()\
    \ == other.getClass()`，因为当你的持久化框架使用代理（例如Hibernate）时，后者会返回`false`。"
  raw: 'The key here is thus the ValueExpression#getType() call. This returns the
    actual type of the property behind the EL expression associated with the component’s
    value attribute. In case of <f:viewParam value="#{editProduct.product}"> this
    would thus return Product.class, which fits Class<? extends BaseEntity>.


    Coming back to the less common use case of a custom converter, extending a standard
    converter, imagine that you have a <f:convertDateTime> configuration which is
    repeated everywhere in your web application :


    ```

    <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

    ```


    And you’d like to replace it with something like the following:


    ```

    <t:convertLocalDate />

    ```


    Then one way is to just extend it, set the defaults in the constructor, register
    it in the *.taglib.xml file, and that’s it. Following is what such a LocalDateConverter
    can look like:


    ```

    @FacesConverter("project.ConvertLocalDate")

    public class LocalDateConverter extends DateTimeConverter {


    public LocalDateConverter() {

            setType("localDate");

            setPattern("yyyy-MM-dd");

        }

    }

    ```


    And here’s the /WEB-INF/example.taglib.xml entry.


    ```

    <tag>

        <tag-name>convertLocalDate</tag-name>

        <converter>

            <converter-id>project.ConvertLocalDate</converter-id>

        </converter>

    </tag>

    ```


    Alternatively, you can also make it an implicit converter by getting rid of the
    converter ID and making it a forClass converter.


    ```

    @FacesConverter(forClass=LocalDate.class)

    ```


    This way you don’t even need any <t:convertLocalDate> tag. Don’t forget to remove
    the <tag> entry in example.taglib.xml. They cannot be used simultaneously. If
    you need such case, for example, because you want to able to change the LocalDate
    pattern, create another subclass.


    You can even have a forClass converter for java.lang.String typed properties .
    This is very useful when you want have an automatic application-wide string-trimming
    strategy which should prevent the model from being polluted with leading or trailing
    whitespace on user-submitted values. Following is what such a converter can look
    like:


    ```

    @FacesConverter(forClass=String.class)

    public class TrimConverter implements Converter<String> {


    @Override

        public String getAsString

            (FacesContext context, UIComponent component, String modelValue)

        {

            return modelValue == null ? "" : modelValue;

        }


    @Override

        public String getAsObject(FacesContext context,

            UIComponent component, String submittedValue)

        {

            if (submittedValue == null || submittedValue.isEmpty()) {

                return null;

            }


    String trimmed = submittedValue.trim();

            return trimmed.isEmpty() ? null : trimmed;

        }

    }

    ```


    Last but not least, when you need to provide whole entities as SelectItem values
    of a selection component as below (see also Chapter [4](#A454457_1_En_4_Chapter.xhtml)),
    along with a custom converter for Country.class:


    ```

    <h:selectOneMenu value="#{bean.country}">

        <f:selectItem itemValue="#{null}" itemLabel="-- select one --" />

        <f:selectItems value="#{bean.availableCountries}" var="country">

            itemValue="#{country}" itemLabel="#{country.name}"

        </f:selectItems>

    </h:selectOneMenu>

    ```


    where the associated backing bean properties are declared as follows:


    ```

    private Country country;

    private List<Country> availableCountries;

    ```


    then you need to keep in mind that the entity has its equals() and hashCode()
    properly implemented. Otherwise JSF may throw a confusing validation error when
    submitting the form.


    > *Validation Error: Value is not valid*


    This may happen when the bean is request scoped instead of view scoped and thus
    recreates the list of available countries during every postback. As part of safeguard
    against tampered requests, JSF will reiterate over the available options in order
    to validate if the selected option is indeed among them. JSF will use the Object#equals()
    method to test the selected option against each available option. If this hasn’t
    returned true for any of the available options, then the above-mentioned validation
    error will be thrown.


    Continuing with the BaseEntity example, here’s how you’d best implement its equals()
    and hashCode() methods .


    ```

    @Override

    public boolean equals(Object other) {

        if (getId() != null

            && getClass().isInstance(other)

            && other.getClass().isInstance(this))

        {

            return getId().equals(((BaseEntity) other).getId());

        }

        else {

            return (other == this);

        }

    }


    @Override

    public int hashCode() {

        if (getId() != null) {

            return Objects.hash(getId());

        }

        else {

            return super.hashCode();

        }

    }

    ```


    Note the bidirectional Class#isInstance() test in the equals() method . This is
    done instead of getClass() == other.getClass(), because that would return false
    when your persistence framework uses proxies, such as Hibernate.'
