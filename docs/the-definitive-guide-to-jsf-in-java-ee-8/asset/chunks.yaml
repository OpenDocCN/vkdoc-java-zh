    ```\n\nThe default page is defined in @ PostConstruct . Otherwise, the user might\
    \ face an error page with the message “Invalid path : /WEB-INF/includes/spa/.xhtml”."
  trans: "\n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n>\n    <nav>\n        <ul>\n            <li><h:link outcome=\"/terms-of-service\"\
    \n                        value=\"服务条款\" /></li>\n            <li><h:link outcome=\"\
    /privacy-policy\"\n                        value=\"隐私政策\" /></li>\n            <li><h:link\
    \ outcome=\"/cookie-policy\"\n                        value=\"Cookie 政策\" /></li>\n\
            </ul>\n    </nav>\n    <small>© 示例公司</small>                         \
    \                                             \n</ui:composition>\n```\n\n最后，模板客户端（例如\
    \ `/home.xhtml`）的代码示例如下：\n\n```\n<ui:composition template=\"/WEB-INF/templates/layout.xhtml\"\
    \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n>\n    <ui:param name=\"\
    title\" value=\"欢迎！\" />\n\n<ui:define name=\"content\">\n        <h1>欢迎来到示例公司！</h1>\n\
            <p>Lorem ipsum dolor sit amet.</p>\n    </ui:define>\n</ui:composition>\n\
    ```\n\n请注意 `<ui:composition>` 中的 `template` 属性。该属性必须指向主模板的服务器端路径，最好使用绝对路径，即以“/”开头。\n\
    \n在模板客户端中，`<ui:param>` 允许你定义专用于主模板的简单参数。基本上，你可以使用任何参数名称，只要该参数被主模板支持，并且不与现有的受管\
    \ bean 名称冲突。在此特定示例中，EL 变量 `#{title}` 的值被指定为“欢迎！”。该值最终会出现在主模板的 `<title>` 元素中。\n\
    \n而 `<ui:define>` 允许你定义专用于主模板的标记块。该标记块最终会出现在主模板中声明了同名 `<ui:insert>` 的位置。图 7-1\
    \ 清晰地展示了所有这些元素是如何组合在一起的。\n\n![A454457_1_En_7_Fig1_HTML.jpg](img/A454457_1_En_7_Fig1_HTML.jpg)\n\
    \n###### 图 7-1 主模板 layout.xhtml、包含文件 header.xhtml 和 footer.xhtml，以及模板客户端 home.xhtml\
    \ 之间的关系。请注意，为简洁起见，省略了模板文件路径和部分标签属性。实际编码请参考前面展示的代码片段。\n\n最后，打开 `/home.xhtml` 应生成最终的\
    \ HTML 输出，你可以通过在普通浏览器中右键单击*查看页面源代码*来检查该输出。\n\n## 单页应用\n\n最近的一个趋势是所谓的单页应用（SPA）。这个概念本身并不新鲜；事实上，它比\
    \ JSF 本身还要古老，但在“Web 2.0”时代，随着基于 JavaScript 的框架（如 Angular）的出现而广泛流行。基本上，SPA 通过在不同页面间导航时使用\
    \ Ajax 请求动态更改主要内容，而不是通过 GET 请求加载整个页面，从而使 Web 应用表现得像桌面应用一样。Gmail 就是 SPA 的一个知名例子。\n\
    \n这种 SPA 也可以通过 JSF 实现，只需使用 `<ui:include>`，并通过 Ajax 动态更新其 `src` 属性即可。以下示例使用了与上一节相同的主模板\
    \ `/spa.xhtml`：\n\n```\n<ui:composition template=\"/WEB-INF/templates/layout.xhtml\"\
    \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:jsf=\"http://xmlns.jcp.org/jsf\"\
    \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n>\n    <ui:param name=\"\
    title\" value=\"单页应用\" />\n\n<ui:define name=\"content\">\n        <aside>\n            <nav>\n\
                    <h:form>\n                    <f:ajax render=\":content\">\n                        <ul>\n\
                                <li><h:commandLink value=\"页面 1\"\n                                action=\"\
    #{spa.set('page1')}\" /></li>\n                            <li><h:commandLink\
    \ value=\"页面 2\"\n                                action=\"#{spa.set('page2')}\"\
    \ /></li>\n                            <li><h:commandLink value=\"页面 3\"\n                                action=\"\
    #{spa.set('page3')}\" /></li>\n                        </ul>\n                    </f:ajax>\n\
                    </h:form>\n            </nav>\n        </aside>\n        <article\
    \ jsf:id=\"content\" data-page=\"#{spa.page}\">\n            <ui:include src=\"\
    /WEB-INF/includes/spa/#{spa.page}.xhtml\" />\n        </article>\n    </ui:define>\n\
    </ui:composition>\n```\n\n请注意，`<article>` 元素通过显式指定 JSF 标识符 `jsf:id=\"…\"` 被声明为所谓的透传元素。此功能是在\
    \ JSF 2.2 中引入的。在底层，当以这种方式将没有对应 JSF 组件的 HTML 元素（例如 `<header>`、`<footer>`、`<main>`、`<article>`、`<section>`\
    \ 等）声明为透传元素时，它会被转换为 `UIPanel` 组件，并在 JSF 组件树中像 `<h:panelGroup>` 一样被处理。这样，你既可以干净地继续使用语义化的\
    \ HTML5 标记，又能像引用 JSF 组件一样引用它，从而能够通过 Ajax 更新它。\n\n正如你可能从上面的 `/spa.xhtml` 示例中解读出的那样，有一个侧边导航菜单，它设置由\
    \ `#{spa}` 标识的受管 bean 中的当前页面，并通过 Ajax 更新由 `id=\"content\"` 标识的组件，而该组件又包含一个动态包含。上述示例期望在\
    \ `/WEB-INF/includes/spa` 文件夹中存在以下包含文件：`page1.xhtml`、`page2.xhtml` 和 `page3.xhtml`。每个文件都是一个简单的包含文件，内容如下：\n\
    \n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n>\n    <h1>第一页</h1>\n    <p>Lorem ipsum dolor sit amet.</p>\n</ui:composition>\n\
    ```\n\n与 `#{spa}` 受管 bean 关联的后台 bean 相当简单，如下所示：\n\n```\n@Named @ViewScoped\npublic\
    \ class Spa implements Serializable {\n\nprivate String page;\n\n@PostConstruct\n\
        public void init() {\n        page = \"page1\";\n    }\n\npublic void set(String\
    \ page) {\n        this.page = page;\n    }\n\npublic String getPage() {\n        return\
    \ page;\n    }\n}\n```\n\n默认页面在 `@PostConstruct` 中定义。否则，用户可能会看到一个错误页面，其中包含消息“无效路径：/WEB-INF/includes/spa/.xhtml”。\n"
- fmt: "注意，支持 bean 被声明为 `@ViewScoped`。这一点很重要，以便在多次回传（postback）中记住当前打开的是哪个页面。如果它是 `@RequestScoped`，并且用户导航到例如\
    \ `page2` 并提交其中的表单，这会创建一个新的 HTTP 请求，那么 `@RequestScoped` 托管 bean 将被重新创建，其 `page`\
    \ 值仍为 `page1` 而不是 `page2`。这会导致当 JSF 在回传请求期间解码任何输入组件以处理表单提交时，`<ui:include>` 不会引用\
    \ `page2.xhtml`，因此 JSF 将无法找到在 `page2.xhtml` 中声明的输入组件。`@ViewScoped` bean 的生命周期与用户回传到同一个视图（本例中为\
    \ `/spa.xhtml`）的时间相同，因此它能正确记住当前选中的页面。\n\n在尝试这个 SPA 示例时，您可能已经注意到一个缺点：页面无法添加书签。这是因为页面不是通过幂等的\
    \ GET 请求打开的。您可以通过使用 HTML5 `history.pushState` API 来解决这个问题。[⁴](#A454457_1_En_7_Chapter.xhtml#Fn4)\
    \ 基本上，在 Ajax 请求完成后，您应该将预期的 URL 推送到浏览器历史记录中，这将反映在浏览器的地址栏中。并且，您应该修改 `Spa` 支持 bean，以检查是否打开了任何特定页面，并相应地准备\
    \ `page` 变量。\n\n以下是一个入门示例，它只是附加了 `?page=xxx` 查询字符串参数。首先调整 `spa.xhtml` 中的 `<f:ajax>`，指定\
    \ `onevent` 属性，如下所示：\n\n```\n<f:ajax ... onevent=\"pageChangeListener\">\n```\n\
    \n并创建以下 JavaScript 函数：\n\n```\nfunction pageChangeListener(event) {\n    if (event.status\
    \ == \"success\") {\n        var page = document.getElementById(\"content\").dataset.page;\n\
    \        var url = location.pathname + \"?page=\" + page;\n        history.pushState(null,\
    \ document.title, url);\n    }\n}\n```\n\n最后，按如下方式调整 `Spa` 支持 bean：\n\n```\n@Inject\
    \ @ManagedProperty(\"#{param.page}\")\nPrivate String page;\n\npublic void init()\
    \ {\n    if (page == null) {\n        page = \"page1\";\n    }\n}\n```\n\n######\
    \ 注意\n\n`@ManagedProperty` 目前有两种形式：已弃用的 `javax.faces.bean` 包中的版本，以及 JSF 2.3 引入的\
    \ `javax.faces.annotation` 包中的版本。\n\n您需要后者。另外，请注意您可能想要验证提供的 `page` 参数。顺便说一句，黑客的路径探测是无害的，因为\
    \ JSF 已经不允许遍历到父路径，例如 `/spa.xhtml?page=../../templates/layout`。\n\n## 模板装饰\n\n\
    如果您希望拥有一个可重用的包含文件，该文件能够插入模板定义，就像使用 `<ui:include>` 来引用一个包含一个或多个 `<ui:insert>` 部分的包含文件一样，那么您可以使用\
    \ `<ui:decorate>`。以下是这样一个示例，`/WEB-INF/decorations/contact.xhtml`：\n\n```\n<ui:composition\n\
    \    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n>\n    <section class=\"contact\">\n        <header><ui:insert /></header>\n\
    \        <nav>\n            <ul>\n                <li>✆ <a href=\"tel:+31612345678\"\
    \n                    title=\"Phone\">+31 (0)6 1234 5678</a></li>\n          \
    \      <li>✉ <a href=\"mailto:info@example.com\"\n                    title=\"\
    Email\">info@example.com</a></li>\n            </ul>\n        </nav>\n    </section>\n\
    </ui:composition>\n```\n\n以下是它的使用方法，您可以将 `<ui:decorate>` 放在模板客户端的任何位置，就像 `<ui:include>`\
    \ 一样：\n\n```\n<ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\">\n\
    \    <h2>Questions? Contact us!</h2>\n</ui:decorate>\n```\n\n请注意，`contact.xhtml`\
    \ 只有一个 `<ui:insert>`，并且它没有名称。这会将整个 `<ui:decorate>` 标签体插入到 `<ui:insert>` 声明的位置。当然，您可以指定一个名称，但那样您就需要显式地使用\
    \ `<ui:define>` 并为其指定一个名称。只有当您有多个插入部分时，这才有用。\n\n如有必要，您可以使用 `<ui:param>` 来传递参数。其工作方式与\
    \ `<ui:composition template>` 相同。以下示例将 `/WEB-INF/decorations/contact.xhtml` 中的电子邮件用户名参数化，默认值为\
    \ `\"info\"`。\n\n```\n...\n<li>✉ <a href=\"mailto: #{empty mailto ? 'info' : mailto}@example.com\"\
    \n    title=\"Email\">#{empty mailto ? 'info' : mailto}@example.com</a></li>\n\
    ...\n```\n\n然后可以这样使用：\n\n```\n<ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\"\
    >\n    <ui:param name=\"mailto\" value=\"press\" />\n    <h3>Contact us</h3>\n\
    \    <p>\n        For press inquiries you can contact us by the below\n      \
    \  phone number and email address.\n    </p>\n</ui:decorate>\n```\n\n## 标签文件\n\
    \n与 `<ui:composition template>` 和 `<ui:decorate>` 一样，您也可以在 `<ui:include>` 中使用\
    \ `<ui:param>`。但是，请注意不要过度使用。\n\n```\n<ui:include src=\"/WEB-INF/includes/field.xhtml\"\
    >\n    <ui:param name=\"id\" value=\"firstName\" />\n    <ui:param name=\"label\"\
    \ value=\"First Name\" />\n    <ui:param name=\"value\" value=\"#{profile.user.firstName}\"\
    \ />\n</ui:include>\n```\n\n其中 `/WEB-INF/includes/field.xhtml` 的内容大致如下：\n\n```\n\
    <ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:jsf=\"\
    http://xmlns.jcp.org/jsf \"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n \
    \   xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:a=\"http://xmlns.jcp.org/jsf/passthrough\"\
    \n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n>\n    <div class=\"field\"\
    \ jsf:rendered=\"#{rendered ne false}\">\n        <h:outputLabel id=\"#{id}_l\"\
    \ for=\"#{id}\" value=\"#{label}\" />\n        <c:choose>\n            <c:when\
    \ test=\"#{type eq 'password'}\">\n                <h:inputSecret id=\"#{id}\"\
    \ label=\"#{label}\"\n                    value=\"#{value}\">\n              \
    \  </h:inputSecret>\n            </c:when>\n            <c:when test=\"#{type\
    \ eq 'textarea'}\">\n                <h:inputTextarea id=\"#{id}\" label=\"#{label}\"\
    \n                    value=\"#{value}\">\n                </h:inputTextarea>\
    \                                                                            \
    \            \n            </c:when>\n            <!-- More types can be added\
    \ as c:when here -->\n            <c:otherwise>\n                <h:inputText\
    \ id=\"#{id}\" label=\"#{label}\"\n                    value=\"#{value}\" a:type=\"\
    #{type}\">\n                </h:inputText>\n            </c:otherwise>\n     \
    \   </c:choose>\n        <h:messages id=\"#{id}_m\" for=\"#{id}\" styleClass=\"\
    messages\" />\n    </div>\n</ui:composition>\n```\n\n在这种情况下，您可能更希望使用更简洁的写法，如下所示：\n\
    \n```\n<t:field id=\"firstName\" label=\"First Name\"\n    value=\"#{profile.user.firstName}\"\
    >\n</t:field>\n```\n\n当 `<ui:include>` 带有两个或更多 `<ui:param>` 时，这是一个强烈的信号，表明该包含文件最好注册为标签文件，以便在\
    \ Facelet 中使用更少的样板代码。\n\n首先将包含文件移动到不同的子文件夹 `/WEB-INF/tags/field.xhtml`。这不是技术上的要求。无论您将其放在哪里，它都能正常工作，但我们只是希望清晰地组织文件。主模板文件放在\
    \ `/WEB-INF/templates`，包含文件放在 `/WEB-INF/includes`，装饰文件放在 `/WEB-INF/decorations`，标签文件放在\
    \ `/WEB-INF/tags`。\n\n然后，创建以下 `/WEB-INF/example.taglib.xml`：\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n\
    \    <short-name>t</short-name>\n```"
  raw: "Note that the backing bean is declared @ViewScoped. This is important in order\
    \ to remember across postbacks which page is currently being opened. If it were\
    \ @RequestScoped, and the user navigates to, e.g., page2 and submits a form therein,\
    \ which creates a new HTTP request, then the @RequestScoped managed bean would\
    \ be recreated again, with page1 as page value and thus not page2\\. This has\
    \ the consequence that <ui:include> won’t reference page2.xhtml when JSF is about\
    \ to decode any input components in order to process the form submit during the\
    \ postback request, and therefore JSF would fail to find the input components\
    \ declared in page2.xhtml. A @ViewScoped bean lives as long as the user postbacks\
    \ to the very same view, in this case /spa.xhtml, and therefore correctly remembers\
    \ the currently selected page.\n\nWhen playing around with this SPA example, you\
    \ might have noticed one disadvantage: the pages are not bookmarkable. This is\
    \ caused by the fact that the pages are not opened by an idempotent GET request.\
    \ You can solve that by utilizing the HTML5 history.pushState API.[⁴](#A454457_1_En_7_Chapter.xhtml#Fn4)\
    \ Basically, on completion of the Ajax request you should push the intended URL\
    \ to the browser history, which will be reflected in the browser’s address bar.\
    \ And, you should modify the Spa backing bean to check if any specific page has\
    \ been opened and then prepare the page variable accordingly.\n\nFollowing is\
    \ a kickoff example which just appends the ?page=xxx query string parameter. First\
    \ adjust the <f:ajax> of the spa.xhtml to specify the onevent attribute as follows:\n\
    \n```\n<f:ajax ... onevent=\"pageChangeListener\">\n```\n\nAnd create the following\
    \ JavaScript function:\n\n```\nfunction pageChangeListener(event) {\n    if (event.status\
    \ == \"success\") {\n        var page = document.getElementById(\"content\").dataset.page;\n\
            var url = location.pathname + \"?page=\" + page;\n        history.pushState(null,\
    \ document.title, url);\n    }\n}\n```\n\nAnd, finally, adjust the Spa backing\
    \ bean as follows:\n\n```\n@Inject @ManagedProperty(\"#{param.page}\")\nPrivate\
    \ String page;\n\npublic void init() {\n    if (page == null) {\n        page\
    \ = \"page1\";\n    }\n}\n```\n\n###### Note\n\nThe @ManagedProperty is currently\
    \ available in two flavors: the deprecated one from the javax.faces.bean package\
    \ and the JSF 2.3 introduced one from the javax.faces.annotation package.\n\n\
    You need the latter one. Also, note that you might want to validate the provided\
    \ page parameter . Path probing by hackers is innocent, by the way, as JSF already\
    \ doesn’t allow traversing into the parent path as in /spa.xhtml?page=../../templates/layout.\n\
    \n## Template Decorations\n\nIn case you would like to have a reusable include\
    \ file which is capable of inserting template definitions as if you would be using\
    \ <ui:include> to reference an include file with one or more <ui:insert> sections,\
    \ then you can use <ui:decorate>. Following is one such example, the /WEB-INF/decorations/contact.xhtml:\n\
    \n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:ui=\"\
    http://xmlns.jcp.org/jsf/facelets\"\n>\n    <section class=\"contact\">\n        <header><ui:insert\
    \ /></header>\n        <nav>\n            <ul>\n                <li>✆ <a href=\"\
    tel:+31612345678\"\n                    title=\"Phone\">+31 (0)6 1234 5678</a></li>\n\
                    <li>✉ <a href=\"mailto:info@example.com\"\n                    title=\"\
    Email\">info@example.com</a></li>\n            </ul>\n        </nav>\n    </section>\n\
    </ui:composition>\n```\n\nHere is how it can be used, you can put the <ui:decorate>\
    \ anywhere in your template client, as a <ui:include>:\n\n```\n<ui:decorate template=\"\
    /WEB-INF/decorations/contact.xhtml\">\n    <h2>Questions? Contact us!</h2>\n</ui:decorate>\n\
    ```\n\nNote that the contact.xhtml has only one <ui:insert> and that it has no\
    \ name. This will insert the entire <ui:decorate> tag body at the declared place\
    \ of <ui:insert>. You can, of course, specify a name, but then you would need\
    \ to explicitly specify <ui:define> with a name for that. That would be only useful\
    \ if you have more than one insert sections.\n\nYou can, if necessary, use <ui:param>\
    \ to pass parameters. This works the same way as with <ui:composition template>.\
    \ The following example parameterizes the e-mail user name /WEB-INF/decorations/contact.xhtml\
    \ with a default value of “info.”\n\n```\n...\n<li>✉ <a href=\"mailto: #{empty\
    \ mailto ? 'info' : mailto}@example.com\"\n    title=\"Email\">#{empty mailto\
    \ ? 'info' : mailto}@example.com</a></li>\n...\n```\n\nThis can then be used as\
    \ follows:\n\n```\n<ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\"\
    >\n    <ui:param name=\"mailto\" value=\"press\" />\n    <h3>Contact us</h3>\n\
        <p>\n        For press inquiries you can contact us by the below\n        phone\
    \ number and email address.\n    </p>\n</ui:decorate>\n```\n\n## Tag Files\n\n\
    As with <ui:composition template> and <ui:decorate>, you can also use <ui: param>\
    \ in <ui:include>. However, watch out that you don’t go overboard.\n\n```\n<ui:include\
    \ src=\"/WEB-INF/includes/field.xhtml\">\n    <ui:param name=\"id\" value=\"firstName\"\
    \ />\n    <ui:param name=\"label\" value=\"First Name\" />\n    <ui:param name=\"\
    value\" value=\"#{profile.user.firstName}\" />\n</ui:include>\n```\n\nWherein\
    \ the /WEB-INF/includes/field.xhtml looks something like the following:\n\n```\n\
    <ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:jsf=\"\
    http://xmlns.jcp.org/jsf \"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"\
    http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:a=\"http://xmlns.jcp.org/jsf/passthrough\"\
    \n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n>\n    <div class=\"field\"\
    \ jsf:rendered=\"#{rendered ne false}\">\n        <h:outputLabel id=\"#{id}_l\"\
    \ for=\"#{id}\" value=\"#{label}\" />\n        <c:choose>\n            <c:when\
    \ test=\"#{type eq 'password'}\">\n                <h:inputSecret id=\"#{id}\"\
    \ label=\"#{label}\"\n                    value=\"#{value}\">\n                </h:inputSecret>\n\
                </c:when>\n            <c:when test=\"#{type eq 'textarea'}\">\n                <h:inputTextarea\
    \ id=\"#{id}\" label=\"#{label}\"\n                    value=\"#{value}\">\n                </h:inputTextarea>\
    \                                                                            \
    \            \n            </c:when>\n            <!-- More types can be added\
    \ as c:when here -->\n            <c:otherwise>\n                <h:inputText\
    \ id=\"#{id}\" label=\"#{label}\"\n                    value=\"#{value}\" a:type=\"\
    #{type}\">\n                </h:inputText>\n            </c:otherwise>\n        </c:choose>\n\
            <h:messages id=\"#{id}_m\" for=\"#{id}\" styleClass=\"messages\" />\n\
        </div>\n</ui:composition>\n```\n\nIn such a case, you would prefer to have\
    \ something more concise, like the following, instead:\n\n```\n<t:field id=\"\
    firstName\" label=\"First Name\"\n    value=\"#{profile.user.firstName}\">\n</t:field>\n\
    ```\n\nHaving <ui:include> with two or more <ui: param> is a strong sign that\
    \ the include file can better be registered as a tag file so that it can be used\
    \ with less boilerplate code in the Facelet.\n\nFirst move the include file into\
    \ a different subfolder, /WEB-INF/tags/field.xhtml. This is not a technical requirement.\
    \ It will work just fine wherever you put it, but we just want to organize the\
    \ files clearly. Master template files go in /WEB-INF/templates, include files\
    \ go there in /WEB-INF/includes, decorate files go in /WEB-INF/decorations, and\
    \ tag files go in /WEB-INF/tags.\n\nThen, create the following /WEB-INF/example.taglib.xml:\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"\
    http://xmlns.jcp.org/xml/ns/javaee\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n\
        <short-name>t</short-name>"
  trans: "\n请注意，后台 Bean 声明为 `@ViewScoped`。这一点很重要，因为它需要在回传过程中记住当前打开的是哪个页面。如果它是 `@RequestScoped`，当用户导航到例如\
    \ page2 并提交其中的表单时，会创建一个新的 HTTP 请求，那么 `@RequestScoped` 管理的 Bean 将被重新创建，其页面值仍为 page1\
    \ 而非 page2。这会导致当 JSF 准备解码任何输入组件以处理回传请求中的表单提交时，`<ui:include>` 不会引用 page2.xhtml，因此\
    \ JSF 将无法找到在 page2.xhtml 中声明的输入组件。`@ViewScoped` Bean 的生命周期与用户回传到同一视图（本例中为 /spa.xhtml）的时间相同，因此它能正确记住当前选中的页面。\n\
    \n在尝试这个 SPA 示例时，您可能已经注意到一个缺点：页面无法添加书签。这是因为页面不是通过幂等的 GET 请求打开的。您可以通过使用 HTML5 的\
    \ `history.pushState` API 来解决这个问题。⁴ 基本上，在 Ajax 请求完成后，您应该将目标 URL 推送到浏览器历史记录中，这将会反映在浏览器的地址栏中。并且，您应该修改\
    \ Spa 后台 Bean，使其检查是否有特定页面被打开，并相应地准备 `page` 变量。\n\n以下是一个入门示例，它仅附加了 `?page=xxx`\
    \ 查询字符串参数。首先，调整 spa.xhtml 中的 `<f:ajax>`，指定 `onevent` 属性如下：\n\n```\n<f:ajax ...\
    \ onevent=\"pageChangeListener\">\n```\n\n然后创建以下 JavaScript 函数：\n\n```\nfunction\
    \ pageChangeListener(event) {\n    if (event.status == \"success\") {\n        var\
    \ page = document.getElementById(\"content\").dataset.page;\n        var url =\
    \ location.pathname + \"?page=\" + page;\n        history.pushState(null, document.title,\
    \ url);\n    }\n}\n```\n\n最后，按如下方式调整 Spa 后台 Bean：\n\n```\n@Inject @ManagedProperty(\"\
    #{param.page}\")\nPrivate String page;\n\npublic void init() {\n    if (page ==\
    \ null) {\n        page = \"page1\";\n    }\n}\n```\n\n###### 注意\n\n`@ManagedProperty`\
    \ 目前有两种形式：已弃用的来自 `javax.faces.bean` 包的形式，以及 JSF 2.3 引入的来自 `javax.faces.annotation`\
    \ 包的形式。\n\n您需要后者。另外，请注意您可能想要验证提供的 `page` 参数。顺便说一句，黑客的路径探测是无害的，因为 JSF 本身已经不允许遍历到父路径，例如\
    \ `/spa.xhtml?page=../../templates/layout`。\n\n## 模板装饰\n\n如果您希望拥有一个可重用的包含文件，它能够插入模板定义，就像使用\
    \ `<ui:include>` 来引用一个包含一个或多个 `<ui:insert>` 部分的包含文件一样，那么您可以使用 `<ui:decorate>`。以下是一个示例，即\
    \ `/WEB-INF/decorations/contact.xhtml`：\n\n```\n<ui:composition\n    xmlns:=\"\
    http://www.w3.org/1999/xhtml\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n>\n    <section class=\"contact\">\n        <header><ui:insert /></header>\n\
            <nav>\n            <ul>\n                <li>✆ <a href=\"tel:+31612345678\"\
    \n                    title=\"Phone\">+31 (0)6 1234 5678</a></li>\n                <li>✉\
    \ <a href=\"mailto:info@example.com\"\n                    title=\"Email\">info@example.com</a></li>\n\
                </ul>\n        </nav>\n    </section>\n</ui:composition>\n```\n\n\
    以下是它的使用方法，您可以将 `<ui:decorate>` 像 `<ui:include>` 一样放在模板客户端的任何位置：\n\n```\n<ui:decorate\
    \ template=\"/WEB-INF/decorations/contact.xhtml\">\n    <h2>有问题？联系我们！</h2>\n</ui:decorate>\n\
    ```\n\n请注意，contact.xhtml 只有一个 `<ui:insert>`，并且它没有名称。这会将整个 `<ui:decorate>` 标签体插入到\
    \ `<ui:insert>` 声明的位置。当然，您可以指定一个名称，但那样您就需要显式地使用 `<ui:define>` 并为其指定一个名称。只有当您有多个插入部分时，这才有用。\n\
    \n如有必要，您可以使用 `<ui:param>` 来传递参数。其工作方式与 `<ui:composition template>` 相同。以下示例将电子邮件用户名的\
    \ `/WEB-INF/decorations/contact.xhtml` 参数化，默认值为 \"info\"。\n\n```\n...\n<li>✉ <a\
    \ href=\"mailto: #{empty mailto ? 'info' : mailto}@example.com\"\n    title=\"\
    Email\">#{empty mailto ? 'info' : mailto}@example.com</a></li>\n...\n```\n\n然后可以这样使用：\n\
    \n```\n<ui:decorate template=\"/WEB-INF/decorations/contact.xhtml\">\n    <ui:param\
    \ name=\"mailto\" value=\"press\" />\n    <h3>联系我们</h3>\n    <p>\n        如有媒体垂询，您可以通过以下电话号码和电子邮件地址联系我们。\n\
        </p>\n</ui:decorate>\n```\n\n## 标签文件\n\n与 `<ui:composition template>` 和 `<ui:decorate>`\
    \ 一样，您也可以在 `<ui:include>` 中使用 `<ui:param>`。但是，请注意不要过度使用。\n\n```\n<ui:include src=\"\
    /WEB-INF/includes/field.xhtml\">\n    <ui:param name=\"id\" value=\"firstName\"\
    \ />\n    <ui:param name=\"label\" value=\"名字\" />\n    <ui:param name=\"value\"\
    \ value=\"#{profile.user.firstName}\" />\n</ui:include>\n```\n\n其中 `/WEB-INF/includes/field.xhtml`\
    \ 的内容大致如下：\n\n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n    xmlns:jsf=\"http://xmlns.jcp.org/jsf \"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:a=\"http://xmlns.jcp.org/jsf/passthrough\"\
    \n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n>\n    <div class=\"field\"\
    \ jsf:rendered=\"#{rendered ne false}\">\n        <h:outputLabel id=\"#{id}_l\"\
    \ for=\"#{id}\" value=\"#{label}\" />\n        <c:choose>\n            <c:when\
    \ test=\"#{type eq 'password'}\">\n                <h:inputSecret id=\"#{id}\"\
    \ label=\"#{label}\"\n                    value=\"#{value}\">\n                </h:inputSecret>\n\
                </c:when>\n            <c:when test=\"#{type eq 'textarea'}\">\n                <h:inputTextarea\
    \ id=\"#{id}\" label=\"#{label}\"\n                    value=\"#{value}\">\n                </h:inputTextarea>\
    \                                                                            \
    \            \n            </c:when>\n            <!-- 更多类型可以在此处作为 c:when 添加 -->\n\
                <c:otherwise>\n                <h:inputText id=\"#{id}\" label=\"\
    #{label}\"\n                    value=\"#{value}\" a:type=\"#{type}\">\n                </h:inputText>\n\
                </c:otherwise>\n        </c:choose>\n        <h:messages id=\"#{id}_m\"\
    \ for=\"#{id}\" styleClass=\"messages\" />\n    </div>\n</ui:composition>\n```\n\
    \n在这种情况下，您可能更希望使用更简洁的方式，如下所示：\n\n```\n<t:field id=\"firstName\" label=\"名字\"\n\
        value=\"#{profile.user.firstName}\">\n</t:field>\n```\n\n如果 `<ui:include>`\
    \ 带有两个或更多 `<ui:param>`，这强烈表明该包含文件最好注册为标签文件，以便在 Facelet 中使用更少的样板代码。\n\n首先，将包含文件移动到不同的子文件夹\
    \ `/WEB-INF/tags/field.xhtml`。这不是技术上的要求。无论您将其放在哪里，它都能正常工作，但我们只是希望清晰地组织文件。主模板文件放在\
    \ `/WEB-INF/templates`，包含文件放在 `/WEB-INF/includes`，装饰文件放在 `/WEB-INF/decorations`，标签文件放在\
    \ `/WEB-INF/tags`。\n\n然后，创建以下 `/WEB-INF/example.taglib.xml`：\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n\
        <short-name>t</short-name>\n"
- fmt: "```xml\n<tag>\n    <description>Renders label + input + message field.</description>\n\
    \    <tag-name>field</tag-name>\n    <source>tags/field.xhtml</source>\n    <attribute>\n\
    \        <description>The type of the input component.</description>\n       \
    \ <name>type</name>\n        <required>false</required>\n        <type>java.lang.String</type>\n\
    \    </attribute>\n    <attribute>\n        <description>The ID of the input component.</description>\n\
    \        <name>id</name>\n        <required>true</required>\n        <type>java.lang.String</type>\n\
    \    </attribute>\n    <attribute>\n        <description>The label of the input\
    \ component.</description>\n        <name>label</name>\n        <required>true</required>\n\
    \        <type>java.lang.String</type>\n    </attribute>\n    <attribute>\n  \
    \      <description>The value of the input component.</description>\n        <name>value</name>\n\
    \        <required>false</required>\n        <type>java.lang.Object</type>\n \
    \   </attribute>\n    <attribute>\n        <description>Whether the field is rendered.</description>\n\
    \        <name>rendered</name>\n        <required>false</required>\n        <type>boolean</type>\n\
    \    </attribute>\n</tag>\n```\n\nThat’s admittedly quite some boilerplate code.\
    \ It is good to know that the `<attribute>` elements aren’t mandatory for the\
    \ technical functioning of the tag file. You could even omit them altogether.\
    \ But then the IDE won’t be able to load them into autosuggest boxes while attempting\
    \ to autocomplete the custom tag. This is not really developer-friendly. So you’d\
    \ better keep them in. The `<required>` property of the tag attribute, by the\
    \ way, only results in a runtime error when the JSF project stage is set to `Development`.\
    \ In other JSF project stages, it’s ignored. And the average IDE will immediately\
    \ prompt those required attributes during autocompleting the tag.\n\nThe file\
    \ name, `example.taglib.xml`, is free to your choice. In order for JSF to automatically\
    \ pick up a taglib file during the application’s startup, there are only two requirements:\
    \ it must have a `.taglib.xml` extension and it must be placed in `/WEB-INF` folder\
    \ (or in case of a JAR file which ends up in `/WEB-INF/lib`, then in `/META-INF`\
    \ folder of that JAR file). Unfortunately, placing the file in `/WEB-INF` doesn’t\
    \ always work quite well in some servers, such as GlassFish/Payara. In that case,\
    \ you’d have to explicitly register it via the following context parameter in\
    \ `web.xml` whose value represents the full path to the `*.taglib.xml` file from\
    \ the web root on.\n\n```\n<context-param>\n    <param-name>javax.faces.FACELETS_LIBRARIES</param-name>\n\
    \    <param-value>/WEB-INF/example.taglib.xml</param-value>\n</context-param>\n\
    ```\n\nIn order to use any tag defined in the `*.taglib.xml`, you first have to\
    \ declare exactly the `<namespace>` URI of the taglib in your Facelet, along with\
    \ an arbitrary XML namespace prefix. For better maintainability of the code it’s\
    \ recommended to pick the taglib’s preferred XML namespace prefix as specified\
    \ in its `<short-name>`, which is `\"t\"` in case of our `example.taglib.xml`.\n\
    \n```\n<ui:composition template=\"/WEB-INF/templates/layout.xhtml\"\n    xmlns:=\"\
    http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n\
    \    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:t=\"http://example.com/tags\"\
    \n>\n    <ui:param name=\"title\" value=\"Log In\" />\n\n<ui:define name=\"content\"\
    >\n        <h:form>\n            <fieldset>\n                <header>\n      \
    \              <h1>Log In</h1>\n                </header>\n                <t:field\
    \ type=\"email\" id=\"email\" label=\"Email\"\n                    value=\"#{login.email}\"\
    >\n                </t:field>\n                <t:field type=\"password\" id=\"\
    password\" label=\"Password\"\n                    value=\"#{login.password}\"\
    >\n                </t:field>\n                <footer>\n                    <t:button\
    \ id=\"submit\" label=\"Log In\"\n                         action=\"#{login.submit()}\"\
    >\n                    </t:button>\n                </footer>\n            </fieldset>\n\
    \        </h:form>\n    </ui:define>\n</ui:composition>\n```\n\nDo note that the\
    \ `type=\"email\"` of the e-mail field thus ends up in `<c:otherwise>` of the\
    \ tag file implementation wherein it gets passed through the `a:type=\"#{type}\"\
    ` attribute of `<h:inputText>`. This allows you to easily use HTML5 input fields,\
    \ such as `type=\"email\"`, `type=\"number\"`, `type=\"tel\"`, etc. The `type`\
    \ attribute being defined as a pass-through attribute `a:type` is mandatory, because\
    \ the `<h:inputText>` by default ignores any custom `type` attribute and stubbornly\
    \ renders `type=\"text\"`.\n\nYou might also have noticed another custom tag,\
    \ `<t:button>`. Here’s how it is implemented in `/WEB-INF/tags/button.xhtml`.\n\
    \n```\n<ui:composition\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:jsf=\"\
    http://xmlns.jcp.org/jsf\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n  \
    \  xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n>\n    <div class=\"button\" jsf:rendered=\"#{rendered ne false}\">\n      \
    \  <h:commandButton id=\"#{id}\" value=\"#{label}\">\n            <f:actionListener\
    \ binding=\"#{action}\" />\n            <f:ajax execute=\"@form\" render=\"@form\"\
    \ />\n        </h:commandButton>\n        <h:messages id=\"#{id}_m\" globalOnly=\"\
    true\" redisplay=\"false\" />\n    </div>\n</ui:composition>\n```\n\nIt’s registered\
    \ in `example.taglib.xml` nearly the same way as `<t:field>`, with one exception\
    \ for the `action` attribute. Technically, you need to specify a `<method-signature>`\
    \ instead of a (property) `<type>`:\n\n```\n<attribute>\n    <description>\n \
    \       Action method of the button.\n        NOTE: must include method parenthesis.\n\
    \    </description>\n    <name>action</name>\n    <required>true</required>\n\
    \    <method-signature>void action()</method-signature>\n</attribute>\n```\n\n\
    You might have noticed that the actual tag implementation uses `<f:actionListener\
    \ binding=\"#{action}\">` instead of `action=\"#{action}\"`. This is actually\
    \ a necessary trick in order to get it to properly invoke the method. That is,\
    \ the `<method-signature>` was initially intended for UI components, not for tag\
    \ files. It’s ignored in tag files. This may be worked on for JSF.next. For now,\
    \ you can get away with the `<f:actionListener binding>` trick. This has only\
    \ one additional requirement: you need to explicitly include the method parenthesis\
    \ in the tag file client as in `<t:button action=\"#{login.submit()}\">`. `<t:button\
    \ action=\"{login.submit}\">` will otherwise fail with `javax.el.PropertyNotFoundException:\
    \ The class ‘com.example.project.view.Login’ does not have the property ‘submit’`.\n\
    \nIn case you would like to customize tag files from the tag file client side\
    \ on, e.g., by adding more specific input attributes, or nesting core tags, or\
    \ by prepending or appending content to the label or message, then you can use\
    \ `<ui:define>` and `<ui:insert>` the same way you’re used to doing with master\
    \ template files and decorate files. The following example demonstrates how you\
    \ can enhance the `/WEB-INF/tags/field.xhtml` on this with a bunch of new `<ui:insert>`\
    \ tags:"
