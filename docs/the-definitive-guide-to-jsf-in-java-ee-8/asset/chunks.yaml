  trans: '

    ### 安装 JBoss Tools 插件


    当前版本的 Eclipse Java EE 标准版不支持任何 CDI 工具。它没有用于创建 CDI 托管 Bean 的向导，也没有用于 JSF 页面中 CDI
    托管 Bean 的自动补全和超链接功能。JBoss Tools 插件是一个功能丰富的插件，其中就提供了 CDI 工具。² 这在开发 Java EE Web
    应用程序时非常有用。


    要安装它，请转到 *帮助 ➤ Eclipse Marketplace*。在搜索字段中输入“JBoss Tools”，然后点击 *Go*。在结果中向下滚动，直到看到
    JBoss Tools Final，然后点击 *Install*（见图 2-2）。


    ![A454457_1_En_2_Fig2_HTML.jpg](img/A454457_1_En_2_Fig2_HTML.jpg)


    ###### 图 2-2 Eclipse Marketplace 中的 JBoss Tools


    在下一步中，您将看到一个相当长的列表，列出了所有 JBoss Tools 的组件。我们并不需要全部安装。该列表确实也包含一些与 JSF 相关的工具，但它们并不是特别有用。可视化页面编辑器则完全没有用处。通过拖拽来组装
    JSF 页面并不能让您成为一名优秀的 JSF 开发者。只有亲自编写代码才能做到这一点。此外，安装并隐式启用了太多未使用的功能可能会使 Eclipse 变得极其缓慢。您选择的功能越少，IDE
    行为发生意外变化的可能性就越小。因此，取消选中顶部的复选框，然后仅选中“Context and Dependency Injection Tools”（上下文和依赖注入工具）复选框（见图
    2-3）。


    ![A454457_1_En_2_Fig3_HTML.jpg](img/A454457_1_En_2_Fig3_HTML.jpg)


    ###### 图 2-3 暂时只选择 CDI 工具


    接下来，接受许可协议的条款，并完成向导，直到 Eclipse 重新启动。


    ### 在 Eclipse 中集成新服务器


    我们需要让 Eclipse 熟悉任何已安装的应用服务器，以便 Eclipse 能够无缝地将其 Java EE API 库链接到项目的构建路径中（即：项目的编译时类路径）。这是为了能够在您的项目中导入
    Java EE API 中的类所必需的。您知道，应用服务器本身代表了抽象 Java EE API 的具体实现。


    为了在 Eclipse 中集成一个新的应用服务器，首先检查工作台底部区域，那里有多个选项卡代表不同的*视图*（您可以通过 *窗口 ➤ 显示视图* 添加新的视图）。点击
    *服务器* 选项卡以打开服务器视图（见图 2-4）。点击显示“没有可用的服务器。点击此链接创建一个新服务器...”的链接。


    ![A454457_1_En_2_Fig4_HTML.jpg](img/A454457_1_En_2_Fig4_HTML.jpg)


    ###### 图 2-4 Eclipse 工作台的服务器视图


    从可用服务器工具列表中，选择 *Oracle ➤ GlassFish Tools*（见图 2-5）。


    ![A454457_1_En_2_Fig5_HTML.jpg](img/A454457_1_En_2_Fig5_HTML.jpg)


    ###### 图 2-5 在新建服务器向导中选择 GlassFish Tools


    首次点击 *下一步* 后，它将在后台下载插件，并要求您在安装插件前接受许可协议。此插件是必需的，以便能够从工作台内部管理任何基于 GlassFish 的服务器——包括将
    Eclipse 项目添加到部署文件夹或从中移除、启动和停止服务器，以及以调试模式运行服务器。安装完成后，它会要求您重新启动 Eclipse。请相应地进行操作。


    返回工作区后，再次点击 *服务器* 视图中的相同链接。您现在将看到一个 *GlassFish* ➤ *GlassFish* 选项。选择此项，并将 *服务器名称*
    字段设置为“Payara”（见图 2-6）。


    ![A454457_1_En_2_Fig6_HTML.jpg](img/A454457_1_En_2_Fig6_HTML.jpg)


    ###### 图 2-6 在新建服务器向导中选择 GlassFish 服务器并将其命名为 Payara


    进入下一步。在这里，您应该将 *GlassFish 位置* 字段指向 Payara 安装目录下的 glassfish 子文件夹，即您下载后解压缩的位置（见图
    2-7）。


    ![A454457_1_En_2_Fig7_HTML.jpg](img/A454457_1_En_2_Fig7_HTML.jpg)


    ###### 图 2-7 在新建服务器向导中指定 GlassFish 位置


    使用默认设置完成 *新建服务器* 向导的其余部分。您无需编辑任何其他字段。新添加的服务器现在将出现在 *服务器* 视图中（见图 2-8）。


    ![A454457_1_En_2_Fig8_HTML.jpg](img/A454457_1_En_2_Fig8_HTML.jpg)


    ###### 图 2-8 服务器视图中的 Payara 服务器


    ## 在 Eclipse 中创建新项目


    我们现在准备好在 Eclipse 中为我们的 JSF 应用程序创建一个新项目。这可以通过工作台的左侧区域完成，该区域默认只显示一个代表*项目资源管理器*视图的选项卡（同样，您可以通过
    *窗口 ➤ 显示视图* 添加新视图）。在此视图中的任意位置右键单击，然后选择 *新建 ➤ 项目*。它将显示 *新建项目* 向导，其中可能包含过多的选项。


    Eclipse 作为一个适用于多种不同项目任务的 IDE，提供了令人眼花缭乱的各种项目类型供您选择。对于将要部署为简单 WAR 文件的基于 Java EE
    的应用程序，我们基本上有两种项目类型可供选择：*Web ➤ 动态 Web 项目* 和 *Maven ➤ Maven 项目*。


    区别在于，前者是 Eclipse 原生项目，实际上只能在 Eclipse 上工作；而后者是一种通用项目类型，可以由任何 IDE 构建，也可以轻松地在命令行以及各种
    CI 服务器（如 Travis 和 Jenkins）上构建。因此，Maven 项目类型实际上是唯一可行的选择（见图 2-9）。


    ![A454457_1_En_2_Fig9_HTML.jpg](img/A454457_1_En_2_Fig9_HTML.jpg)


    ###### 图 2-9 在新建项目向导中选择 Maven 项目（注意动态 Web 项目是另一个但不可行的选项）


    在下一步中，确保选中 *创建一个简单项目（跳过原型选择）* 选项（见图 2-10）。这将让我们从一个真正空的 Maven 项目开始，以便我们自己配置和填充它。当然，您也可以选择一个原型，这基本上是一个包含几个已准备好的文件和配置的模板项目。但目前我们不需要任何原型。


    ![A454457_1_En_2_Fig10_HTML.jpg](img/A454457_1_En_2_Fig10_HTML.jpg)


    ###### 图 2-10 在新建 Maven 项目向导中勾选“创建一个简单项目”


    在下一步中，我们可以指定我们自己的项目 Maven 坐标。Maven 坐标包括 *Group Id*、*Artifact Id* 和 *Version*，在
    Maven 世界中也被称为 GAV。*Group Id* 通常与您将要使用的根包名匹配，例如 com.example。*Artifact Id* 通常代表您将要使用的项目名称。为简单起见并为了与本书其余部分保持一致，我们将使用
    project。*Version* 可以保持默认的 0.0.1-SNAPSHOT。最后，*Packaging* 应设置为 war。


    ![A454457_1_En_2_Fig11_HTML.jpg](img/A454457_1_En_2_Fig11_HTML.jpg)


    ###### 图 2-11 在新建 Maven 项目向导中填写 Maven GAV


    完成 *新建 Maven 项目* 向导的其余部分（见图 2-11）。您无需编辑任何其他字段。完成向导后，您将在 *项目资源管理器* 视图中看到项目结构（见图
    2-12）。


    ![A454457_1_En_2_Fig12_HTML.jpg](img/A454457_1_En_2_Fig12_HTML.jpg)

