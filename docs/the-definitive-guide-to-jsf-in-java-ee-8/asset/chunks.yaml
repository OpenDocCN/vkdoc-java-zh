    ###### 图 4-1 Chrome 开发者工具——网络——标头——表单数据


    这个隐藏的输入字段，其名称代表 `<h:form>` 的 ID，将向 JSF 指示在回发请求期间具体提交的是哪个表单。也就是说，单个 HTML 文档可以包含多个表单元素。通过这种方式，JSF
    可以在应用请求值阶段（第二阶段）确定当前表单组件是否确实被提交。这将导致表单组件的 `UIForm#isSubmitted()` 方法返回 `true`。名称为
    `javax.faces.ViewState` 的隐藏输入字段代表一个唯一标识符，它指向存储在会话中的序列化视图状态对象。这两个隐藏输入字段都是由与 `UIForm`
    组件关联的渲染器自动包含的。顺便提一下，视图状态隐藏输入字段上的 `autocomplete="off"` 并非技术上的要求，而只是一种变通方法，用于防止某些浏览器在按下后退按钮时用最后已知的值覆盖它，而这个值本身可能是不正确的。


    我们示例中的隐藏输入字段的值为空。在这个表单中，它实际上毫无用处。这样的隐藏输入字段通常只有在它的值由某些你想在托管 bean 中捕获的 JavaScript
    代码设置时才有用。通常，使用隐藏输入字段将托管 bean 属性从一个请求“传递”到下一个请求是没有意义的。相反，这些属性应该分配给一个声明为具有比请求作用域更广作用域（例如视图、流程或会话作用域）的托管
    bean。这样可以省去处理隐藏输入字段的麻烦。Bean 作用域将在第 8 章中详细说明。


    如果你熟悉基本的 HTML，其他请求参数应该不言自明。它们代表所涉及的输入元素的名称/值对。你应该能够确定在提交之前在表单中实际输入了哪些值。JSF 也能够做到同样的事情。它将遍历组件树，并使用组件的“客户端
    ID”作为请求参数名称，从请求参数映射中获取值。基本上，在应用请求值阶段（第二阶段），以下代码会在幕后为每个输入组件执行。这发生在 `UIInput#decode()`
    方法中。


    ```

    FacesContext context = FacesContext.getCurrentInstance();

    ExternalContext externalContext = context.getExternalContext();

    Map<String, String> formData = externalContext.getRequestParameterMap();


    String clientId = component.getClientId(context);

    String submittedValue = formData.get(clientId);

    component.setSubmittedValue(submittedValue);

    ```


    并且，在同一阶段，对于每个命令组件，在与该组件关联的渲染器的 `decode` 方法中，基本上会执行以下代码：


    ```

    if (formData.get(clientId) != null) {

        component.queueEvent(new ActionEvent(context, component));

    }

    ```


    在处理验证阶段（第三阶段），JSF 会在执行必要的转换和验证（如果任何转换器或验证器已注册到组件或关联的 bean 属性上，并且执行无误）之后，将每个相关输入组件的提交值设置为“本地值”。这发生在
    `UIInput#validate()` 方法中，其核心逻辑以下面的简化（非常简化！）代码形式展示：


    ```

    String submittedValue = component.getSubmittedValue();

    try {

        Converter converter = component.getConverter();

        Object newValue = component.getConvertedValue(submittedValue);

        for (Validator validator : component.getValidators()) {

            validator.validate(context, component, newValue);

        }

        component.setValue(newValue);

        component.setSubmittedValue(null);

    }

    catch (ConverterException | ValidatorException e) {

        context.addMessage(clientId, e.getFacesMessage());

        context.validationFailed(); // 跳过阶段 4 和 5。

        component.setValid(false);

    }

    ```


    当没有验证错误，并且 `FacesContext#isValidationFailed()` 因此返回 `false` 时，JSF 将前进到更新模型值阶段（第四阶段）。在此阶段，输入组件的“本地值”最终将被设置为与输入组件的
    `value` 属性关联的托管 bean 属性。这将发生在 `UIInput#updateModel()` 方法中，该方法简化如下：


    ```

    ValueExpression el = component.getValueExpression("value");

    if (el != null) {

        el.setValue(context.getELContext(), component.getValue());

        component.setValue(null);

    }

    ```


    `el` 变量基本上代表了在 `value` 属性中定义的表达式语言（EL）语句，在我们的 `<h:inputText>` 示例中，就是 `#{bean.text}`。`ValueExpression#setValue()`
    将基本上触发此表达式背后的 setter 方法，并将组件的值作为参数传入。因此，实际上它将执行 `bean.setText(component.getValue())`。


    一旦所有模型值都已更新，JSF 将前进到调用应用程序阶段（第五阶段）。在应用请求值阶段（第二阶段）排队到命令组件中的任何 `ActionEvent` 都将被广播。它最终将调用与该命令组件关联的所有方法。在我们的
    `<h:commandButton>` 示例中，其 `action` 属性定义为 `#{bean.submit}`，它将调用 `Bean#submit()`
    方法。最后，JSF 将前进到最后一个阶段，即渲染响应阶段（第六阶段），生成 HTML 输出，并在此过程中调用 getter 方法以获取要嵌入到 HTML 输出中的模型值。

