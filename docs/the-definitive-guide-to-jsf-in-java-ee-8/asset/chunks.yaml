  trans: "\n但如果该组件在后台 bean 的其他地方未被使用，这种做法就毫无用处。此外，当受管 bean 的作用域大于请求作用域时（另请参阅第 3 章“视图构建时间”一节），这种做法是危险的。最好不要将组件实例绑定到后台\
    \ bean；这可能表明是一种不良实践。在 JSF 2.x 中，唯一合理的实际用例是将复合组件子项绑定到后台组件（另请参阅第 7 章“复合组件”一节）。\n\
    \n如果你在类似 `List<String>` 这样的对象上使用 `<ui:repeat>` 或 `<c:forEach>` 而不是 `<h:dataTable>`，那么你可以通过\
    \ `varStatus` 属性以更简单的方式获取迭代索引。\n\n```\n<h:form>\n    <ui:repeat value=\"#{bean.strings}\"\
    \ var=\"string\" varStatus=\"loop\">\n        <h:inputText value=\"#{bean.strings[loop.index]}\"\
    \ /><br/>\n    </ui:repeat>\n    <h:commandButton value=\"保存\" action=\"#{bean.save}\"\
    >\n        <f:ajax execute=\"@form\" />\n    </h:commandButton>\n</h:form>\n```\n\
    \n### 在 `<h:dataTable>` 中添加/删除行\n\n回到包含 `List<Product>` 的 `<h:dataTable>`，有时你可能希望能够在同一视图中添加或删除项目，通常是在某种管理页面中。为了添加新产品，我们需要在受管\
    \ bean 中准备一个新实例，在单独的表单中填写它，持久化它，然后刷新表格。\n\n```\n<h:form id=\"list\">\n    <h:dataTable\
    \ id=\"products\" value=\"#{products.list}\" ...>\n        ...\n    </h:dataTable>\n\
    </h:form>\n<h:form id=\"add\">\n    <h:outputLabel for=\"name\" value=\"名称\" />\n\
        <h:inputText id=\"name\" value=\"#{products.product.name}\" />\n    <h:message\
    \ for=\"name\" />\n\n    <h:outputLabel for=\"description\" value=\"描述\" />\n\
        <h:inputTextarea id=\"description\"\n        value=\"#{products.product.description}\"\
    >\n    </h:inputTextarea>\n    <h:message for=\"description\" />\n\n    <h:commandButton\
    \ id=\"add\" value=\"添加\" action=\"#{products.add}\">\n        <f:ajax execute=\"\
    @form\" render=\"@form :list:products\" />\n    </h:commandButton>           \
    \                                                                            \
    \                     \n</h:form>\n```\n\n其中相关的后台 bean 代码如下所示：\n\n```\nprivate\
    \ List<Product> list; // +getter\nprivate Product product = new Product(); //\
    \ +getter\n\n@PostConstruct\npublic void init() {\n    list = productService.list();\n\
    }\n\npublic void add() {\n    productService.create(product);\n    list.add(0,\
    \ product);\n    product = new Product();\n}\n```\n\n服务类中的 `create()` 方法如下：\n\n\
    ```\n@TransactionAttribute(REQUIRED);\npublic Long create(Product product) {\n\
        entityManager.persist(product);\n    return product.getId();\n}\n```\n\n删除可以通过多种方式完成。无论如何，你可能需要一个额外的列来容纳提交按钮、单选按钮或复选框。最简单的方法是使用一个包含命令按钮的列，该按钮删除当前迭代的项目，然后刷新表格。\n\
    \n```\n<h:form id=\"list\">\n    <h:dataTable id=\"products\" value=\"#{products.list}\"\
    \ var=\"product\">\n        ...\n        <h:column>\n            <h:commandButton\
    \ id=\"delete\" value=\"删除\"\n                action=\"#{products.delete(product)}\"\
    >\n                <f:ajax render=\"@namingcontainer\" />\n            </h:commandButton>\n\
            </h:column>\n    </h:dataTable>\n</h:form>\n```\n\n在 `@ViewScoped` 后台\
    \ bean 类中的 `delete(Product)` 方法如下：\n\n```\npublic void delete(Product product)\
    \ {\n    productService.delete(product);\n    list.remove(product);\n}\n```\n\n\
    服务类中的 `delete()` 方法如下：\n\n```\n@TransactionAttribute(REQUIRED)\npublic void delete(Product\
    \ product) {\n    if (entityManager.contains(product)) {\n        entityManager.remove(product);\n\
        }\n    else {\n        Product managedProduct = getById(product.getId());\n\
    \n        if (managedProduct != null) {\n            entityManager.remove(managedProduct);\n\
            }\n    }\n}\n```\n\n请注意 `<f:ajax>` 的 `render` 属性。它指定了 `@namingcontainer`，这基本上引用了最近的父级\
    \ `NamingContainer` 组件。在标准 JSF HTML 组件集中，只有 `<h:form>` 和 `<h:dataTable>` 是 `NamingContainer`\
    \ 的实例。在这种特定结构中，`@namingcontainer` 因此引用了 `<h:dataTable>`。你也可以使用 `<f:ajax render=\"\
    :list:products\">` 代替；只是稍微冗长一些。`<f:ajax render=\"products\">` 将不起作用，因为它会尝试在当前迭代行的上下文中找到它，而该上下文基本上位于所有\
    \ `<h:column>` 组件内部。\n\n### 在 `<h:dataTable>` 中选择行\n\n自 JSF 2.3 起，由于 `<h:selectOneRadio>`\
    \ 新增了 `group` 属性（另请参阅第 4 章“选择组件”一节），在 `<h:dataTable>` 中拥有单选按钮列成为原生支持的功能。\n\n```\n\
    <h:form id=\"list\">\n    <h:dataTable id=\"products\" value=\"#{products.list}\"\
    \ var=\"product\">\n        <h:column>\n            <h:selectOneRadio id=\"selected\"\
    \ group=\"selected\"\n                value=\"#{products.selected}\">\n                <f:selectItem\
    \ itemValue=\"#{product}\" />\n            </h:selectOneRadio>\n        </h:column>\n\
            ...\n    </h:dataTable>\n    <h:commandButton id=\"deleteSelected\" value=\"\
    删除所选产品\"\n         action=\"#{products.deleteSelected}\">\n         <f:ajax execute=\"\
    @form\" render=\"products\" />\n    </h:commandButton>\n</h:form>\n```\n\n在 `@ViewScoped`\
    \ 后台 bean 类中的 `deleteSelected()` 方法如下：\n\n```\nprivate Product selected; // +getter\
    \ +setter\n\npublic void deleteSelected() {\n    productService.delete(selected);\n\
        list.remove(selected);\n}\n```\n\n请注意，这里你还需要一个 `ProductConverter` 或 `BaseEntityConverter`。这些在第\
    \ 5 章“自定义转换器”一节中有详细说明。\n\n复选框选择稍微复杂一些。你直观上会想到使用 `<h:selectManyCheckbox>`，但它还不像\
    \ `<h:selectOneRadio>` 那样支持 `group` 属性。你需要退而求其次，使用 `<h:selectBooleanCheckbox>`\
    \ 配合 `Map<Product, Boolean>`，其中 map 的键代表当前迭代的产品，map 的值代表复选框的值。\n\n```\n<h:form\
    \ id=\"list\">\n    <h:dataTable id=\"products\" value=\"#{products.list}\" var=\"\
    product\">\n        <h:column>\n            <h:selectBooleanCheckbox id=\"selection\"\
    \n                value=\"#{products.selection[product]}\">\n            </h:selectBooleanCheckbox>\n\
            </h:column>\n        ...\n    </h:dataTable>\n    <h:commandButton id=\"\
    deleteSelected\" value=\"删除所选产品\"\n         action=\"#{products.deleteSelected}\"\
    >\n         <f:ajax execute=\"@form\" render=\"products\" />\n    </h:commandButton>\n\
    </h:form>\n```\n\n`@ViewScoped` 后台 bean 中修改后的 `deleteSelected()` 方法如下所示：\n\n```\n\
    private Map<Product, Boolean> selection = new HashMap<>(); // +getter\n\npublic\
    \ void deleteSelected() {\n    List<Product> selected = selection.entrySet().stream()\n\
            .filter(Entry::getValue)\n        .map(Entry::getKey)\n        .collect(Collectors.toList());\n\
        productService.delete(selected);\n    selected.forEach(list::remove);\n    selection.clear();\n\
    }\n```\n\n重载的 `ProductService#delete(Iterable)` 方法如下所示：\n\n```\n@TransactionAttribute(REQUIRED)\n\
    public void delete(Iterable<Product> products) {\n    products.forEach(this::delete);\n\
    } \n```\n"
- fmt: "### Dynamic Columns in `<h:dataTable>`\n\nWith `<h:dataTable>`, with the help\
    \ of JSTL `<c:forEach>`, it is also possible to dynamically create multiple `<h:column>`\
    \ instances based on a Java model which is at least view scoped. A request-scoped\
    \ model can also, but this doesn’t guarantee that during a postback request it\
    \ is exactly the same as it was during the preceding request, and therefore there\
    \ is a risk of the dynamic `<h:column>` composition being off.\n\nThe value of\
    \ the `<c:forEach>` should reference a collection including at least the entity\
    \ property names or even map keys. You can then use the brace notation in EL as\
    \ in `#{entity[propertyName]}` or `#{map[key]}` to reference the actual value.\
    \ This works for both `UIOutput` and `UIInput` components. The following example\
    \ illustrates how you could achieve this for a `List<Product>`.\n\nBacking bean:\n\
    \n```\n@Named @RequestScoped\npublic class Products {\n\n    private List<Product>\
    \ list;\n    private List<String> properties;\n\n    @Inject\n    private ProductService\
    \ productService;\n\n    @PostConstruct\n    public void init() {\n        list\
    \ = productService.list();\n        properties = Arrays.asList(\"id\", \"name\"\
    , \"description\");\n    }\n\n    // Add/generate getters (setters not needed\
    \ here).\n}\n```\n\nFacelets file:\n\n```\n<h:dataTable value=\"#{products.list}\"\
    \ var=\"product\">\n    <c:forEach items=\"#{products.properties}\" var=\"property\"\
    >\n        <h:column>#{product[property]}</h:column>\n    </c:forEach>\n</h:dataTable>\n\
    ```\n\nYou could even generalize this further for other entities of a common superclass,\
    \ such as `BaseEntity`, whereby you obtain the relevant property names from the\
    \ entity service.\n\n## Resource Components\n\nJSF offers three resource components,\
    \ `<h:graphicImage>`, `<h:outputScript>`, and `<h:outputStylesheet>`, for image\
    \ resources, JavaScript resources, and CSS resources, respectively. They can reference\
    \ physical resource files as well as dynamic resource files. The physical resource\
    \ files themselves must be placed in the `/resources` subfolder of the main web\
    \ folder. The dynamic resource files can be handled with a custom `ResourceHandler`\
    \ which intercepts on a specific library name and/or resource name. Given the\
    \ following folder structure in a Maven WAR project in Eclipse,\n\n![A454457_1_En_6_Fige_HTML.jpg](OEBPS/Images/A454457_1_En_6_Fige_HTML.jpg)\n\
    \nthe resources are referenceable as follows:\n\n```\n<h:graphicImage name=\"\
    images/some.svg\" />\n<h:outputScript name=\"scripts/some.js\" />\n<h:outputStylesheet\
    \ name=\"styles/some.css\" />\n```\n\nThe generated HTML output looks as follows,\
    \ provided that `/project` is the context path of the web application:\n\n```\n\
    <img src=\"/project/javax.faces.resource/images/some.svg.xhtml\" />\n<script type=\"\
    text/javascript\"\n    src=\"/project/javax.faces.resource/scripts/some.js.xhtml\"\
    ></script>\n<link type=\"text/css\" rel=\"stylesheet\"\n    href=\"/project/javax.faces.resource/styles/some.css.xhtml\"\
    \ />\n```\n\nYou’ll see that it’s prefixed with `/javax.faces.resource` path and\
    \ suffixed with the currently active URL pattern of the `FacesServlet`. The `/javax.faces.resource`\
    \ is represented by the constant `ResourceHandler#RESOURCE_IDENTIFIER`. That the\
    \ resource URL matches the URL pattern of the `FacesServlet` ensures that it will\
    \ actually invoke the `FacesServlet` which in turn knows how to handle the resource.\
    \ It will first invoke `ResourceHandler#isResourceRequest()`, which by default\
    \ determines if the URL prefix starts with the known `RESOURCE_IDENTIFIER` constant,\
    \ and if so then delegates to `ResourceHandler#handleResourceRequest()` instead\
    \ of going through the JSF life cycle.\n\nAlso note that the web resources are\
    \ not placed in the `src/main/resources` folder but in the `src/main/webapp/resources`\
    \ folder. The `src/main/resources` folder is only for non-class resources which\
    \ must end up in the classpath, such as resource bundle files. These classpath\
    \ resources are then obtainable by `ClassLoader#getResource()`. `src/main/webapp/resources`\
    \ doesn’t end up in the classpath; instead, it ends up in the web content. These\
    \ web resources are then obtainable by `ExternalContext#getResource()`, which\
    \ delegates under the hood to `ServletContext#getResource()`.\n\nThe `name` attribute\
    \ thus basically represents the path to the resource relative to the `src/main/webapp/resources`\
    \ folder. These components also support a `library` attribute. The `library` attribute\
    \ must represent the unique resource library name of a JSF library. For standard\
    \ JSF, the resource library name is `\"javax.faces\"`, for PrimeFaces, the resource\
    \ library name is `\"primefaces\"`, for OmniFaces, the resource library name is\
    \ `\"omnifaces\"`, for BootsFaces, the resource library name is `\"bsf\"`, and\
    \ so on. Normally, these library-specific resources are already automatically\
    \ included by the JSF library in question, usually declaratively via the `@ResourceDependency`\
    \ annotation on the `UIComponent` or `Renderer` class, and sometimes programmatically\
    \ via `UIViewRoot#addComponentResource()`. This is elaborated in the section “Resource\
    \ Dependencies” in Chapter 11. Those resources can if necessary be referenced\
    \ using a resource component whereby you thus explicitly specify the `library`\
    \ attribute.\n\nThe following example explicitly includes the standard JSF `jsf.js`\
    \ file:\n\n```\n<h:head>\n    ...\n    <h:outputScript library=\"javax.faces\"\
    \ name=\"jsf.js\" />\n</h:head>\n```"
  raw: '### Dynamic Columns in <h:dataTable>


    With <h:dataTable>, with the help of JSTL <c:forEach>, it is also possible to
    dynamically create multiple <h:column> instances based on a Java model which is
    at least view scoped. A request-scoped model can also, but this doesn’t guarantee
    that during a postback request it is exactly the same as it was during the preceding
    request, and therefore there is a risk of the dynamic <h:column> composition being
    off.


    The value of the <c:forEach> should reference a collection including at least
    the entity property names or even map keys. You can then use the brace notation
    in EL as in #{entity[propertyName]} or #{map[key]} to reference the actual value.
    This works for both UIOutput and UIInput components. The following example illustrates
    how you could achieve this for a List<Product>.


    Backing bean:


    ```

    @Named @RequestScoped

    public class Products {


        private List<Product> list;

        private List<String> properties;


        @Inject

        private ProductService productService;


        @PostConstruct

        public void init() {

            list = productService.list();

            properties = Arrays.asList("id", "name", "description");

        }


        // Add/generate getters (setters not needed here).

    }

    ```


    Facelets file:


    ```

    <h:dataTable value="#{products.list}" var="product">

        <c:forEach items="#{products.properties}" var="property">

            <h:column>#{product[property]}</h:column>

        </c:forEach>

    </h:dataTable>

    ```


    You could even generalize this further for other entities of a common superclass
    , such as BaseEntity, whereby you obtain the relevant property names from the
    entity service.


    ## Resource Components


    JSF offers three resource components , <h:graphicImage>, <h:outputScript>, and
    <h:outputStylesheet>, for image resources, JavaScript resources, and CSS resources,
    respectively. They can reference physical resource files as well as dynamic resource
    files. The physical resource files themselves must be placed in the /resources
    subfolder of the main web folder. The dynamic resource files can be handled with
    a custom ResourceHandler which intercepts on a specific library name and/or resource
    name. Given the following folder structure in a Maven WAR project in Eclipse,


    ![A454457_1_En_6_Fige_HTML.jpg](OEBPS/Images/A454457_1_En_6_Fige_HTML.jpg)


    the resources are referenceable as follows:


    ```

    <h:graphicImage name="images/some.svg" />

    <h:outputScript name="scripts/some.js" />

    <h:outputStylesheet name="styles/some.css" />

    ```


    The generated HTML output looks as follows, provided that /project is the context
    path of the web application :


    ```

    <img src="/project/javax.faces.resource/images/some.svg.xhtml" />

    <script type="text/javascript"

        src="/project/javax.faces.resource/scripts/some.js.xhtml"></script>

    <link type="text/css" rel="stylesheet"

        href="/project/javax.faces.resource/styles/some.css.xhtml" />

    ```


    You’ll see that it’s prefixed with /javax.faces.resource path and suffixed with
    the currently active URL pattern of the FacesServlet. The /javax.faces.resource
    is represented by the constant ResourceHandler#RESOURCE_IDENTIFIER.[^(12)](#A454457_1_En_6_Chapter.xhtml#Fn12)
    That the resource URL matches the URL pattern of the FacesServlet ensures that
    it will actually invoke the FacesServlet which in turn knows how to handle the
    resource. It will first invoke ResourceHandler#isResourceRequest(), which by default
    determines if the URL prefix starts with the known RESOURCE_IDENTIFIER constant,
    and if so then delegates to ResourceHandler#handleResourceRequest() instead of
    going through the JSF life cycle.


    Also note that the web resources are not placed in the src/main/resources folder
    but in the src/main/webapp/resources folder. The src/main/resources folder is
    only for non-class resources which must end up in the classpath, such as resource
    bundle files. These classpath resources are then obtainable by ClassLoader#getResource().[^(13)](#A454457_1_En_6_Chapter.xhtml#Fn13)
    src/main/webapp/resources doesn’t end up in the classpath; instead, it ends up
    in the web content. These web resources are then obtainable by ExternalContext#getResource(),[^(14)](#A454457_1_En_6_Chapter.xhtml#Fn14)
    which delegates under the hood to ServletContext#getResource().[^(15)](#A454457_1_En_6_Chapter.xhtml#Fn15)


    The name attribute thus basically represents the path to the resource relative
    to the src/main/webapp/resources folder. These components also support a library
    attribute. The library attribute must represent the unique resource library name
    of a JSF library. For standard JSF, the resource library name is “javax.faces”,
    for PrimeFaces,[^(16)](#A454457_1_En_6_Chapter.xhtml#Fn16) the resource library
    name is “ primefaces”, for OmniFaces,[^(17)](#A454457_1_En_6_Chapter.xhtml#Fn17)
    the resource library name is “ omnifaces”, for BootsFaces,[^(18)](#A454457_1_En_6_Chapter.xhtml#Fn18)
    the resource library name is “ bsf”, and so on. Normally, these library-specific
    resources are already automatically included by the JSF library in question, usually
    declaratively via the @ResourceDependency annotation on the UIComponent or Renderer
    class, and sometimes programmatically via UIViewRoot#addComponentResource(). This
    is elaborated in the section “Resource Dependencies” in Chapter [11](#A454457_1_En_11_Chapter.xhtml).
    Those resources can if necessary be referenced using a resource component whereby
    you thus explicitly specify the library attribute.


    The following example explicitly includes the standard JSF jsf.js file:


    ```

    <h:head>

        ...

        <h:outputScript library="javax.faces" name="jsf.js" />

    </h:head>

    ```'
