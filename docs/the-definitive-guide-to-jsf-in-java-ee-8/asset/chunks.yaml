    ## Navigation


    Sometimes, you’d like to navigate to a different JSF page when a certain form
    has been successfully submitted—for example, from the login page to the user home
    page, as demonstrated in the section “Label and Message Components,” or from the
    detail page back to the master page.


    Historically, navigation targets must be defined separately in <navigation-rule>
    entries in the faces-config.xml which then does the job based on the String return
    value from the action method of UICommand components. This approach turns out
    to be quite cumbersome in the long term, and not terribly useful for HTML-based
    web applications. This idea was more or less derived from desktop-oriented applications.
    Hence, JSF 2.0 introduced the “Implicit navigation ” feature, which allows you
    to define the navigation target directly in the String return value itself. In
    other words, instead of the following action method:


    ```

    public String someActionMethod() {

        // ...

        return "someOutcome";

    }

    ```


    And the following faces-config.xml entry:


    ```

    <navigation-rule>

        <navigation-case>

            <from-outcome>someOutcome</from-outcome>

            <to-view-id>/otherview.xhtml</to-view-id>

        </navigation-case>

    </navigation-rule>

    ```


    you could just do as follows in the action method:


    ```

    public String someActionMethod() {

        // ...

        return "/otherview.xhtml";

    }

    ```


    You could even leave out the default suffix of the view technology you’re using.


    ```

    public String someActionMethod() {

        // ...

        return "/otherview";

    }

    ```


    You can force a redirect by appending a faces-redirect=true query parameter.


    ```

    public String someActionMethod() {

        // ...

        return "/otherview?faces-redirect=true";

    }

    ```


    Returning null would return to the very same view from where the form was submitted.
    In other words, the end user would stay in the same page. It is cleaner, however,
    to declare the action method as void.


    ```

    public void someActionMethod() {

        // ...

    }

    ```


    Coming back to the redirect approach, this is also known as “Post-Redirect-Get”
    pattern [²](#A454457_1_En_4_Chapter.xhtml#Fn2) and makes a major difference with
    regard to bookmarkability and avoiding double submits. Without a redirect after
    a POST request on a JSF form, the URL (uniform resource locator) in the web browser’s
    address bar wouldn’t change to the URL of the target page but would just stay
    the same. That’s caused by the nature of the “postback”: submitting the form back
    to the very same URL from which the page with the form was served. When JSF is
    instructed to navigate to a different view without a redirect, then it will basically
    build and render the target page directly to the response of the current postback
    request.


    This approach has disadvantages. One is that refreshing the page in the web browser
    would cause the POST request to be re-executed, and thus perform a so-called double
    submit . This would potentially pollute the data store in the back end with duplicate
    entries, particularly if the involved relational table doesn’t have proper unique
    constraints defined. Another disadvantage is that the target page isn’t bookmarkable.
    The URL currently in the browser’s address bar basically represents the previous
    page. You won’t get the target page back by bookmarking, copy/pasting, and/or
    sharing the URL and then opening it in a new browser window.


    When JSF is instead instructed to navigate to a different view with a redirect,
    then it will basically return a very small HTTP response with a status of 302
    and a Location header with the URL of the target page therein. When the web browser
    retrieves such a response, it will immediately fire a brand-new GET request on
    the URL specified in the Location header. This URL is reflected in the web browser’s
    address bar and is thus bookmarkable . Also, refreshing the page would only refresh
    the GET request and therefore not cause a double submit.'
