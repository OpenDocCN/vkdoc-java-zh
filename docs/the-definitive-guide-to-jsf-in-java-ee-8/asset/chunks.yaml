- fmt: "# About the Authors and About the Technical Reviewer\n\n## About the Authors\n\
    \n![A454457_1_En_BookFrontmatter_Figb_HTML.jpg](OEBPS/Images/A454457_1_En_BookFrontmatter_Figb_HTML.jpg)\n\
    \nBauke Scholtz is an Oracle Java Champion, a member of the JSF 2.3 Expert Group,\
    \ and the main creator of the JSF helper library OmniFaces. On the Internet, he\
    \ is more commonly known as BalusC, who is among the top users and contributors\
    \ on Stack Overflow. Bauke has integrated several OmniFaces solutions into JSF\
    \ 2.3. He is a web application specialist and consults or has consulted for Mercury1\
    \ Limited, MyTutor, Nava Finance, LinkPizza, ZEEF, M4N/Zanox, ITCA, RDC, and more\
    \ clients from fintech, affiliate marketing, social media, and more as part of\
    \ his 17 years of experience. This book offers Bauke the opportunity to go into\
    \ depth to answer most frequently asked questions and correctly solve most commonly\
    \ encountered problems while using JSF.\n\n![A454457_1_En_BookFrontmatter_Figc_HTML.jpg](OEBPS/Images/A454457_1_En_BookFrontmatter_Figc_HTML.jpg)\n\
    \nArjan Tijms works for Payara Services Ltd and is a JSF (JSR 372) and Security\
    \ API (JSR 375) Expert Group member. He is the co-creator of the popular OmniFaces\
    \ library for JSF, which was a 2015 Duke’s Choice Award winner, and is the main\
    \ creator of a set of tests for the Java EE authentication SPI (JASPIC) used by\
    \ various Java EE vendors. Arjan holds an MSc degree in Computer Science from\
    \ the University of Leiden, The Netherlands. Writing about this topic was a natural\
    \ choice for Arjan; He has already written much about it on his blog and wanted\
    \ to expand that by contributing to a book.\n\n## About the Technical Reviewer\n\
    \n![A454457_1_En_BookFrontmatter_Figd_HTML.jpg](OEBPS/Images/A454457_1_En_BookFrontmatter_Figd_HTML.jpg)\n\
    \nChád (“Shod”) Darby is an author, instructor, and speaker in the Java development\
    \ world. As a recognized authority on Java applications and architectures, he\
    \ has presented technical sessions at software development conferences worldwide\
    \ (in the United States, UK, India, Russia, and Australia). In his 15 years as\
    \ a professional software architect, he’s had the opportunity to work for Blue\
    \ Cross/Blue Shield, Merck, Boeing, Red Hat, and a handful of startup companies.\n\
    \nChád is a contributing author to several Java books, including *Professional\
    \ Java E-Commerce* (Wrox Press), *Beginning Java Networking* (Wrox Press), and\
    \ *XML and Web Services Unleashed* (Sams Publishing). Chád has Java certifications\
    \ from Sun Microsystems and IBM. He holds a BS in computer science from Carnegie\
    \ Mellon University. You can visit Chád’s blog at [www.luv2code.com](http://www.luv2code.com)\
    \ to view his free video tutorials on Java. You can also follow him on Twitter\
    \ at @darbyluvs2code.\n\n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz and\
    \ Arjan Tijms, The Definitive Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_1](#A454457_1_En_1_Chapter.xhtml)\n\
    \n# 1. History\n\nBauke Scholtz^(1) and Arjan Tijms²\n\n(1)Willemstad, Curaçao\n\
    \n(2)Amsterdam, Noord-Holland, The Netherlands\n\nThis chapter describes the history\
    \ of JSF, starting from its early conception and ending where we are today at\
    \ the moment of writing. We’ll discuss how the JSF API (application programming\
    \ interface) itself evolved, which important events took place during that evolution,\
    \ and who some of the people were that were involved in all of this.\n\nThis is\
    \ in no way a complete description of the history and the reader should take notice\
    \ of the fact that many more events took place and many more people were involved\
    \ than we were able to mention here.\n\n## In the Beginning . . .\n\nJSF goes\
    \ back a long time. Its initial JSR, JSR 127, started in 2001. At that time the\
    \ Struts web framework was wildly popular, although it wasn’t that long ago that\
    \ it was released itself (around 2000). Despite Struts’ popularity, a large number\
    \ of other web frameworks were in use in the Java space, and new ones were popping\
    \ up all the time. JavaServer Faces (JSF) was conceived as an attempt to bring\
    \ a standardized MVC (model-view-controller) web framework base into the overall\
    \ Java EE platform.\n\nControversies are quite common in the web framework space,\
    \ and JSF is no exception here. Right at the start of its inception there was\
    \ a big controversy where Apache opposed the creation of JSF on the bases that\
    \ Apache Struts already existed and a closed source alternative would have little\
    \ value. Apache therefore voted against the creation of JSF with the following\
    \ comment:\n\n> *This JSR conflicts with the Apache open source project Struts.\
    \ Considering Sun’s current position that JSRs may not be independently implemented\
    \ under an open source license, we see little value in recreating a technology\
    \ in a closed environment that is already available in an open environment.*\n\
    > \n> *To the extent that this JSR extends beyond Struts today, we would encourage\
    \ the Sun developers proposing this JSR to join the Sun developers already leading\
    \ Struts to create an open solution at Apache, something which when finished would\
    \ be assured of being able to be implemented as open source.*\n\nEventually the\
    \ conflict was resolved when after about a year into the process spec lead Amy\
    \ Fowler (from Swing fame) was replaced by Craig McClanahan, the very father of\
    \ the Struts project that JSF was said to be competing with. The open source restriction\
    \ was lifted as well, and the open source JSF implementation, called MyFaces,\
    \ was developed in parallel with the (then nameless) RI and hence the specification\
    \ itself. MyFaces initially started as an LGPL licensed project at sourceforge.net\
    \ in December 2002 and had an initial 0.1 release conforming to what was then\
    \ called an “Early Access Specification” in January 2003.\n\nOpen source implementations\
    \ are the most common implementations in Java EE 8, and there’s barely any EE\
    \ specification at the time of this writing (2018) that’s still implemented as\
    \ closed source. In 2001, however, this was not just uncommon; it was actually\
    \ not allowed for new JSRs. Allowing for an open source implementation was therefore\
    \ quite a change, and the honor fell to JSF to be the first of its kind for which\
    \ this was allowed.\n\nDespite the open source implementation being allowed, the\
    \ actual development of the spec was still done in secret and behind closed doors.\
    \ There was no public mailing list, and no tracker (e.g., a JIRA instance) for\
    \ the public to create issues or express wishes. Occasionally interviews were\
    \ being done, and in the fall of 2002 by then former spec lead Amy Fowler did\
    \ reveal quite a few details about JSF, but largely the project was shrouded in\
    \ mystery for the general public.\n\nThe team behind JSF was, however, hard at\
    \ work. The first e-mail to the internal JSR-127 list was sent on August 17, 2001.\
    \ As with most projects, the team spent the initial months on gathering requirements\
    \ and looking at the existing competing products. A package name was chosen as\
    \ well. The initial placeholder package, which was `javax.servlet.ui`, now `javax.faces`,\
    \ was chosen as the package to use. The very first technical architecture to be\
    \ considered was the component model. For a component-based MVC framework this\
    \ is obviously one of the most important aspects. During the last month of 2001\
    \ and the first two months of 2002 the team looked at what is now known as the\
    \ Managed Bean (called `Object Manager` then). Managed beans with their scopes,\
    \ names, and dependency injection are clearly another cornerstone of the JSF framework.\
    \ Events and the model behind it were being looked at as well during that time\
    \ frame."
