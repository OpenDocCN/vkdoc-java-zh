  trans: '

    ### @RequestScoped


    请求作用域的托管 Bean 与 HTTP 请求的生命周期绑定，这对 JSF 来说是最重要的情况。其他情况包括 EJB 异步方法调用（使用 `@Asynchronous`
    注解的方法）、EJB 定时器超时方法或消息驱动 Bean（MDB）处理消息时的生命周期。请注意，Ajax 请求也计为一次单独的 HTTP 请求。


    当客户端向服务器发送 HTTP 请求时，Servlet 容器会创建代表 HTTP 请求和响应的 `HttpServletRequest` 和 `HttpServletResponse`
    实例，并将它们传递给认证模块、过滤器和 Servlet。在所有认证模块、过滤器和 Servlet 完成请求和响应的处理后，这些实例会立即被销毁。换句话说，每个
    HTTP 请求都会创建一个新的请求作用域托管 Bean 实例，该实例仅在该请求期间可用，而不会在其他请求中共享。


    请求作用域的托管 Bean 适用于简单且静态的表单，这些表单没有任何基于 Ajax 的动态更新，对于这种情况，你更倾向于使用视图作用域的托管 Bean。可以想象一个登录表单或联系表单。


    ```

    @Named @RequestScoped

    public class Login {


    private String username;

        private String password;


    // ...

    }

    ```


    当然，这些表单也可以绑定到视图作用域的托管 Bean 而不会出现问题，但这会浪费内存空间。请注意，你绝对不应该将 JPA 实体本身作为托管 Bean。换句话说，以下方法实际上是错误的：


    ```

    @Named @RequestScoped

    @Entity

    public class Product {

        // ...

    }

    ```


    这不仅违反了迪米特法则，¹¹ 而且存在 JPA 无法持久化它的风险，因为 CDI 实际上将托管 Bean 包装在一个代理类中，当你试图将注入的实例传递给 JPA
    时，JPA 将无法从中获取实体信息。在这种情况下，Hibernate 会抛出“Unknown entity: com.example.Entity$Proxy$_$$_WeldClientProxy”，这实际上代表的是
    CDI 代理类。


    此时你可能会好奇 CDI 究竟是如何工作的。首先，在 Web 应用程序启动期间，它会收集所有带有 CDI 兼容作用域注解的类。然后，它会为所有这些类生成代理类。最终，这些代理类的实例会被注入。给定一个示例
    Bean 类 `com.example.Bean`，生成的 CDI 代理类可能如下所示：


    ```

    public class Bean$Proxy$_$$_CDI extends Bean implements Serializable {


    public String getSomeProperty() {

            Bean actualInstance = CDI.resolveItSomehow();

            return actualInstance.getSomeProperty();

        }


    public void setSomeProperty(String someProperty) {

            Bean actualInstance = CDI.resolveItSomehow();

            actualInstance.setSomeProperty(someProperty);

        }

    }

    ```


    你看，它继承了 Bean 类，使其可序列化，并使用了一个“不可能冲突”的类名，并让所有方法委托给从 CDI 上下文中获取的实际实例。你可能也会立刻明白为什么
    CDI Bean 管理设施要求 Bean 类必须是公共的，并且拥有一个公共的默认构造函数。你还会看到，当创建并注入这样一个代理类时，底层的实际实例不一定会被创建。它只会在虚构的
    `CDI.resolveItSomehow()` 方法被调用时自动创建。在底层，它会从一个线程局部变量中获取上下文，这与 `FacesContext#getCurrentInstance()`
    的工作方式完全相同。


    顺便提一下，EJB 也以这种方式使用可序列化的代理。这就是为什么它能够看似神奇地完成启动或加入事务以及使用池化实例等所有繁重工作。然而，传统的 JSF `@ManagedBean`
    设施根本不使用代理。这正是为什么无法在更广作用域的 JSF 托管 Bean 中注入更窄作用域的 JSF 托管 Bean 的原因。而使用 CDI Bean 管理设施，这是可以做到的。


    请注意，CDI 还有一个 `@javax.enterprise.inject.Model` 原型注解，它基本上将 `@Named` 和 `@RequestScoped`
    捆绑到一个注解中。这与请求作用域的托管 Bean 没有任何区别。不幸的是，它并不代表一个非代理实例；否则，将其放在 `@Entity` 上会很好。`@Model`
    注解的存在只是为了方便。


    ### @Dependent


    依赖作用域的托管 Bean 与其首次被创建时所在的作用域的生命周期绑定。因此，如果你将其注入到 `@ApplicationScoped` 中，它也会变成应用程序作用域。如果你将其注入到
    `@ViewScoped` 中，它也会变成视图作用域，以此类推。这是 CDI 的默认作用域。


    然而，这有一个陷阱。当你忘记在支持 Bean 上声明 CDI 作用域注解，或者从错误的包中导入了名称完全相同的作用域（例如，`javax.faces.bean.RequestScoped`
    而不是 `javax.enterprise.context.RequestScoped`），并且你在 EL 中直接引用它（如 `#{dependentScopedBean}`），而不是通过另一个托管
    Bean 引用它（如 `#{requestScopedBean.dependentScopedBean}`），那么每次 EL 求值都会创建一个全新的实例，该实例仅存在于该
    EL 上下文中。换句话说，想象一个包含两个输入字段和一个提交按钮的 JSF 表单，每个都绑定到一个依赖作用域的托管 Bean，那么你最终会得到三个独立的实例。一个用于设置第一个输入字段，一个用于设置第二个输入字段，一个用于调用动作方法。因此，如果你曾经观察到动作方法中提交的值为
    null 的奇怪行为，即使必填验证已经通过，首先要检查的是实际使用的 CDI 托管 Bean 作用域。


    与其他作用域的主要技术区别在于，依赖作用域的托管 Bean 不会被代理。换句话说，被注入的是实际实例。


    ```

    @Dependent

    public class Entities {


        @Produces

        public Product getProduct() {

            return new Product();

        }

    }


    @Named @RequestScoped

    public class Products {


        @Inject

        private Product product;


        @Inject

        Private ProductService productService;


        public void add() {

            productService.create(product);

        }


        public Product getProduct() {

            return product;

        }

    }

    ```


    请注意，你仍然不能使用 `<h:inputText value="#{product.name}">`，因为它会获取自己的实例。你仍然需要使用 `#{products.product.name}`。正是由于这个原因，生产者没有使用
    `@Named`。另外请注意，如果是视图作用域的托管 Bean，你需要通过从动作方法返回一个非 null 的结果来强制 JSF 重新启动视图作用域；否则，注入的
    `Product` 实例将在下一个视图中被重用。

