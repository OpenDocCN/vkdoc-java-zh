    ## SelectItem Tags


    Providing available items for UISelectOne and UISelectMany components can be done
    in several ways. As demonstrated in the previous section, you can use the <f:selectItems>
    and <f:selectItem> tags nested in the selection component for this. You can use
    the <f:selectItem> tag to define the available items entirely on the view side.
    Following is an example using <h:selectOneMenu> , but you can use it the same
    way in any other UISelectOne and UISelectMany component:


    ```

    <h:selectOneMenu id="selectedItem" value="#{bean.selectedItem}">

        <f:selectItem itemValue="#{null}" itemLabel="-- select one --" />

        <f:selectItem itemValue="one" itemLabel="First item" />

        <f:selectItem itemValue="two" itemLabel="Second item" />

        <f:selectItem itemValue="three" itemLabel="Third item" />

    </h:selectOneMenu>

    ```


    Note that a select item with value of #{null} can be used to present the default
    selection in case the bean property associated with selection component’s value
    attribute is null. If you have consulted the tag documentation of <f:selectItem>,
    then you’ll perhaps have noticed the noSelectionOption attribute and have thought
    that it was intended to represent a “no selection option.” Actually, this isn’t
    true. Many starters indeed think so, as you can see in many forums, Q&A sites,
    and poor-quality tutorials on the Internet. In spite of the misleading attribute
    name, it does not represent a “no selection option.” A better attribute name would
    have been hideWhenOtherOptionIsSelected, and even then it works only when the
    parent selection component has explicitly a hideNoSelectionOption="true" attribute
    set like the one that follows:


    ```

    <h:selectOneMenu id="selectedItem" value="#{bean.selectedItem}"

        hideNoSelectionOption="true">

        <f:selectItem itemValue="#{null}" itemLabel="-- select one --"

            noSelectionOption="true" />

        <f:selectItem itemValue="one" itemLabel="First item" />

        <f:selectItem itemValue="two" itemLabel="Second item" />

        <f:selectItem itemValue="three" itemLabel="Third item" />

    </h:selectOneMenu>

    ```


    So, hideWhenOtherOptionIsSelectedAndHideNoSelectionOptionIsTrue would ultimately
    have been the most self-explanatory attribute name. Unfortunately, this wasn’t
    very well thought out when the noSelectionOption was implemented in JSF 1.2\.
    Requiring two attributes for this attribute to function shouldn’t have been necessary.
    The primary purpose of this attribute pair is to prevent the web site user from
    being able to re-select the “no selection option” when the component has already
    a non-null value—for example, by having it prepared in a @PostConstruct method,
    or by re-rendering the component after a form submit with a non-null value.


    That said, the itemValue attribute of the <f:selectItem> represents the value
    that will be set as bean property when the form is submitted, and the value that
    will be preselected from any non-null bean property when the HTML output is to
    be generated. The itemLabel attribute represents the label that will be displayed
    to the web site user. When the itemLabel attribute is absent, JSF will default
    to itemValue. Note that the label is in no way submitted back to the server. That
    is, in the generated HTML output, the <option> label is not part of the <option>
    value.


    You can use the <f:selectItems> tag to reference a Collection, Map, or array of
    available items in the backing bean. You can even mix this with <f:selectItem>
    tags .


    ```

    <h:selectOneMenu id="selectedItem" value="#{bean.selectedItem}">

        <f:selectItem itemValue="#{null}" itemLabel="-- select one --" />

        <f:selectItems value="#{bean.availableItems}" />

    </h:selectOneMenu>

    ```'
