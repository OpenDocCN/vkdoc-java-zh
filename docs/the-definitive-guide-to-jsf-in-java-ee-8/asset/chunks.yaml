    \ master template. Figure [7-1](#A454457_1_En_7_Chapter.xhtml#Fig1) gives a clear\
    \ overview of how this all fits together.\n\n![A454457_1_En_7_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_7_Fig1_HTML.jpg)\n\
    \n###### Figure 7-1 The relationship between the master template `layout.xhtml`,\
