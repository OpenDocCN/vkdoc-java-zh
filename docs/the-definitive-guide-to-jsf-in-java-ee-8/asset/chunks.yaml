    \ to get started. Following is a concrete example of such a `ProductConverter`:\n\
    \n```\n@FacesConverter(forClass=Product.class, managed=true)\npublic class ProductConverter\
    \ implements Converter<Product> {\n\n@Inject\n    private ProductService productService;\n\
    \n@Override\n    public String getAsString\n        (FacesContext context, UIComponent\
    \ component, Product product)\n    {\n        if (product == null) {\n       \
    \     return \"\";\n        }\n\nif (product.getId() != null) {\n            return\
    \ product.getId().toString();\n        }\n        else {\n            throw new\
    \ ConverterException(\n                new FacesMessage(\"Invalid product ID\"\
    ), e);\n        }\n    }\n\n@Override\n    public Product getAsObject\n      \
    \   (FacesContext context, UIComponent component, String id)\n    {\n        if\
    \ (id == null || id.isEmpty()) {\n            return null;\n        }\n\ntry {\n\
    \            return productService.getById(Long.valueOf(id));\n        }\n   \
    \     catch (NumberFormatException e) {\n            throw new ConverterException(\n\
    \                new FacesMessage(\"Invalid product ID\"), e);\n        }\n  \
    \  }\n}\n```"
