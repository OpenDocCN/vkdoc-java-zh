- fmt: "# Cross-Site Scripting Protection\n\nCross-site scripting or XSS is an attack\
    \ that has a couple of variations, but practically it boils down to a web application\
    \ rendering data that it got from (other) users directly as part of the markup\
    \ sent to the client. If this data itself contains scripting code (typically JavaScript),\
    \ the browser may execute it blindly, allowing the attacker to read, for example,\
    \ cookie data and to send that over to a server controlled by the attacker.\n\n\
    JSF provides protection against this type of attack by having contextual output\
    \ escaping enabled for many common contexts. The most common context is writing\
    \ out HTML, where all JSF’s output writers by default XML escape their output.\n\
    \nTo demonstrate, consider the following backing bean:\n\n```\n@Named @RequestScoped\n\
    public class Bean {\n\nprivate String value = \"<script>alert('hi')</script>\"\
    ;\n\npublic String getValue() {\n        return value;\n    }\n}\n```\n\nThe `value`\
    \ instance variable contains a script that we don’t want the browser to execute.\
    \ In this example it’s hard-coded, but in practice it could come from stored data\
    \ in, for example, a database.\n\nNow we’ll render this value using two simple\
    \ default constructs of JSF: a direct expression language expression on a Facelet\
    \ and the `<h:outputText>` component.\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\
    \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n>\n    <h:head />\n    <h:body>\n\
    \        <p>#{bean.value}</p>\n        <p><h:outputText value=\"#{bean.value}\"\
    \ /></p>\n    </h:body>\n</html>\n```\n\nWhen requesting this view and looking\
    \ at the HTML source, we’ll see that both times the value has been rendered as\
    \ “`<script>alert('hi')</script>`” (i.e., in an escaped form that the browser\
    \ won’t execute).\n\nIn case we explicitly don’t want this escaping to be done,\
    \ the `escape` attribute of `<h:outputText>` can be set to `false`. For example,\n\
    \n```\n<h:outputText value=\"#{bean.value}\" escape=\"false\" />\n```\n\nRequesting\
    \ the view again with the above component on it will cause a JavaScript alert\
    \ to appear to be saying “hi.” Had this been malicious code being input by an\
    \ attacker, the security of the client’s system would have been compromised. The\
    \ `escape` attribute should therefore only be used with the utmost care.\n\nOutput\
    \ for usage in URLs is escaped as well, but there it’s escaped differently, since\
    \ it’s a different context. To demonstrate, consider adding the following component\
    \ to the view:\n\n```\n<h:link outcome=\"/foo\">\n    Go to foo\n    <f:param\
    \ name=\"param\" value=\"#{bean.value}\" />\n</h:link>\n```\n\nAfter requesting\
    \ this view, we’ll see the link has been rendered as\n\n```\n<a href=\"/project/foo.xhtml?param=%3Cscript%3Ealert%28%27hi%27%29%3C%2Fscript%3E\"\
    >\n    Go to foo\n</a>\n```\n\nWhat has happened here is that our original value\
    \ has been escaped for usage as a URL parameter using URL encoding, which as can\
    \ be seen is different from XML escaping, hence the term \"contextual output escaping.\"\
    \n\nRelated to XSS protection, sensitive cookies that the application uses should\
    \ be set to `HttpOnly`, meaning they’ll be sent to the server with each request\
    \ but can’t be read by scripts on the client. For the session ID cookie this can\
    \ be done in `web.xml` as follows:\n\n```\n<session-config>\n    <cookie-config>\n\
    \        <http-only>true</http-only>\n        <secure>true</secure>\n    </cookie-config>\n\
    </session-config>\n```\n\nNote that the cookie is set to `secure` as well here.\
    \ This is not related to XSS, but sets that the cookie is to be sent only when\
    \ HTTPS/SSL is used. This protects the cookie from being eavesdropped (e.g., on\
    \ a shared WiFi network). Since development often happens over HTTP using localhost,\
    \ such a setting may be problematic for development purposes. If this is the case,\
    \ then alternatively the cookie can be set to secure or not using `ServletContext#getSessionCookieConfig()`\
    \ in a `ServletContextListener`:\n\n```\n@WebListener\npublic class ApplicationConfig\
    \ implements ServletContextListener {\n\n@Override\n    public void contextInitialized(ServletContextEvent\
    \ event) {\n        if (...) {\n            event.getServletContext()\n      \
    \          .getSessionCookieConfig()\n                .setSecure(false);\n   \
    \     }\n    }\n}\n```\n\nwhere “`...`” is an application-specific check to see\
    \ if it’s running in “dev mode.” You could even use JSF’s own `Application#getProjectStage()`\
    \ for this."
  raw: '## Cross-Site Scripting Protection


    Cross-site scripting or XSS is an attack that has a couple of variations, but
    practically it boils down to a web application rendering data that it got from
    (other) users directly as part of the markup sent to the client. If this data
    itself contains scripting code (typically JavaScript), the browser may execute
    it blindly, allowing the attacker to read, for example, cookie data and to send
    that over to a server controlled by the attacker.


    JSF provides protection against this type of attack by having contextual output
    escaping enabled for many common contexts. The most common context is writing
    out HTML, where all JSF’s output writers by default XML escape their output.


    To demonstrate, consider the following backing bean :


    ```

    @Named @RequestScoped

    public class Bean {


    private String value = "<script>alert(''hi'')</script>";


    public String getValue() {

            return value;

        }

    }

    ```


    The value instance variable contains a script that we don’t want the browser to
    execute. In this example it’s hard-coded, but in practice it could come from stored
    data in, for example, a database.


    Now we’ll render this value using two simple default constructs of JSF: a direct
    expression language expression on a Facelet and the <h: outputText> component
    .


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

    >

        <h:head />

        <h:body>

            <p>#{bean.value}</p>

            <p><h:outputText value="#{bean.value}" /></p>

        </h:body>

    </html>

    ```


    When requesting this view and looking at the HTML source, we’ll see that both
    times the value has been rendered as “<script>alert(''hi'')</script>” (i.e., in
    an escaped form that the browser won’t execute).


    In case we explicitly don’t want this escaping to be done, the escape attribute
    of <h:outputText> can be set to false. For example,


    ```

    <h:outputText value="#{bean.value}" escape="false" />

    ```


    Requesting the view again with the above component on it will cause a JavaScript
    alert to appear to be saying “hi.” Had this been malicious code being input by
    an attacker, the security of the client’s system would have been compromised.
    The escape attribute should therefore only be used with the utmost care.


    Output for usage in URLs is escaped as well, but there it’s escaped differently,
    since it’s a different context. To demonstrate, consider adding the following
    component to the view:


    ```

    <h:link outcome="/foo">

        Go to foo

        <f:param name="param" value="#{bean.value}" />

    </h:link>

    ```


    After requesting this view, we’ll see the link has been rendered as


    ```

    <a href="/project/foo.xhtml?param=%3Cscript%3Ealert%28%27hi%27%29%3C%2Fscript%3E">

        Go to foo

    </a>

    ```


    What has happened here is that our original value has been escaped for usage as
    a URL parameter using URL encoding, which as can be seen is different from XML
    escaping, hence the term "contextual output escaping."


    Related to XSS protection, sensitive cookies that the application uses should
    be set to HttpOnly, meaning they’ll be sent to the server with each request but
    can’t be read by scripts on the client. For the session ID cookie this can be
    done in web.xml as follows:


    ```

    <session-config>

        <cookie-config>

            <http-only>true</http-only>

            <secure>true</secure>

        </cookie-config>

    </session-config>

    ```


    Note that the cookie is set to "secure" as well here. This is not related to XSS,
    but sets that the cookie is to be sent only when HTTPS/SSL is used. This protects
    the cookie from being eavesdropped (e.g., on a shared WiFi network). Since development
    often happens over HTTP using localhost, such a setting may be problematic for
    development purposes. If this is the case, then alternatively the cookie can be
    set to secure or not using ServletContext#getSessionCookieConfig() in a ServletContextListener


    ```

    @WebListener

    public class ApplicationConfig implements ServletContextListener {


    @Override

        public void contextInitialized(ServletContextEvent event) {

            if (...) {

                event.getServletContext()

                    .getSessionCookieConfig()

                    .setSecure(false);

            }

        }

    }

    ```


    where “...” is an application-specific check to see if it’s running in “dev mode.”
    You could even use JSF’s own Application#getProjectStage() for this.'
  trans: '

    ## 跨站脚本攻击防护


    跨站脚本攻击（XSS）有多种变体，但本质上都是指 Web 应用程序将来自（其他）用户的数据直接作为标记的一部分渲染并发送给客户端。如果这些数据本身包含脚本代码（通常是
    JavaScript），浏览器可能会盲目执行它，从而使攻击者能够读取（例如）Cookie 数据并将其发送到攻击者控制的服务器。


    JSF 通过为许多常见上下文启用上下文相关的输出转义来提供针对此类攻击的保护。最常见的上下文是输出 HTML，默认情况下，JSF 的所有输出写入器都会对其输出进行
    XML 转义。


    为了演示，请考虑以下后台 Bean：


    ```

    @Named @RequestScoped

    public class Bean {


    private String value = "<script>alert(''hi'')</script>";


    public String getValue() {

            return value;

        }

    }

    ```


    `value` 实例变量包含一个我们不希望浏览器执行的脚本。在此示例中，它是硬编码的，但在实践中，它可能来自存储的数据，例如数据库。


    现在，我们将使用 JSF 的两个简单的默认构造来渲染此值：Facelet 上的直接表达式语言表达式和 `<h:outputText>` 组件。


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

    >

        <h:head />

        <h:body>

            <p>#{bean.value}</p>

            <p><h:outputText value="#{bean.value}" /></p>

        </h:body>

    </html>

    ```


    当请求此视图并查看 HTML 源代码时，我们会看到该值两次都被渲染为“`<script>alert(''hi'')</script>`”（即，以浏览器不会执行的转义形式）。


    如果我们明确不希望进行此转义，则可以将 `<h:outputText>` 的 `escape` 属性设置为 `false`。例如：


    ```

    <h:outputText value="#{bean.value}" escape="false" />

    ```


    再次请求包含上述组件的视图将导致出现一个 JavaScript 警告框，显示“hi”。如果这是攻击者输入的恶意代码，则客户端系统的安全性将受到损害。因此，应极其谨慎地使用
    `escape` 属性。


    用于 URL 的输出也会被转义，但转义方式不同，因为它是不同的上下文。为了演示，请考虑将以下组件添加到视图中：


    ```

    <h:link outcome="/foo">

        Go to foo

        <f:param name="param" value="#{bean.value}" />

    </h:link>

    ```


    请求此视图后，我们会看到链接已被渲染为：


    ```

    <a href="/project/foo.xhtml?param=%3Cscript%3Ealert%28%27hi%27%29%3C%2Fscript%3E">

        Go to foo

    </a>

    ```


    这里发生的情况是，我们的原始值已使用 URL 编码被转义以用作 URL 参数，可以看出这与 XML 转义不同，因此称为“上下文相关的输出转义”。


    与 XSS 防护相关，应用程序使用的敏感 Cookie 应设置为 HttpOnly，这意味着它们将随每个请求发送到服务器，但无法被客户端的脚本读取。对于会话
    ID Cookie，可以在 `web.xml` 中按如下方式完成：


    ```

    <session-config>

        <cookie-config>

            <http-only>true</http-only>

            <secure>true</secure>

        </cookie-config>

    </session-config>

    ```


    请注意，此处 Cookie 也被设置为“secure”。这与 XSS 无关，而是设置 Cookie 仅在使用 HTTPS/SSL 时发送。这可以保护 Cookie
    免遭窃听（例如，在共享 WiFi 网络上）。由于开发通常通过 HTTP 使用 localhost 进行，因此此类设置可能会给开发带来问题。如果是这种情况，则可以在
    `ServletContextListener` 中使用 `ServletContext#getSessionCookieConfig()` 来将 Cookie
    设置为安全或不安全：


    ```

    @WebListener

    public class ApplicationConfig implements ServletContextListener {


    @Override

        public void contextInitialized(ServletContextEvent event) {

            if (...) {

                event.getServletContext()

                    .getSessionCookieConfig()

                    .setSecure(false);

            }

        }

    }

    ```


    其中“...”是一个特定于应用程序的检查，用于判断是否在“开发模式”下运行。您甚至可以使用 JSF 自身的 `Application#getProjectStage()`
    来实现此目的。

