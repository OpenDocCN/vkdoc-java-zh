- fmt: "# View State\n\n如“视图构建时间”一节所述，代表组件树的`UIComponent`实例本质上是请求作用域的。它们在视图构建期间创建，并在渲染响应阶段（第六阶段）结束后立即销毁。任何对`UIComponent`实例属性的更改，如果这些属性未被EL（表达式语言）表达式引用，且与默认值不同，都将被保存为“视图状态”。换句话说，“视图状态”绝对不等同于“组件树”。此外，如果整个组件树本身被保存在视图状态中，这不仅会导致视图状态不必要地臃肿，还会导致不良的应用程序行为，因为`UIComponent`实例本质上不是线程安全的，因此绝对不能跨多个HTTP请求共享。\n\
    \n保存视图状态发生在视图渲染期间。在此过程中，JSF会将视图状态写入每个JSF表单生成的HTML表示中的一个`javax.faces.ViewState`隐藏输入字段。当JSF状态保存方法设置为默认的“服务器”时，隐藏输入值代表一个唯一标识符，该标识符引用存储在HTTP会话中的序列化视图状态对象。当使用以下`web.xml`上下文参数将JSF状态保存方法显式设置为“客户端”时，隐藏输入值本身代表序列化视图状态对象的加密形式。\n\
    \n```\n<context-param>\n    <param-name>javax.faces.STATE_SAVING_METHOD</param-name>\n\
    \    <param-value>client</param-value>\n</context-param>\n<env-entry>\n    <env-entry-name>jsf/ClientSideSecretKey</env-entry-name>\n\
    \    <env-entry-type>java.lang.String</env-entry-type>\n    <env-entry-value>[AES\
    \ key in Base64 format]</env-entry-value>\n</env-entry>\n```\n\n请注意，如果您在服务器集群（“云”）上运行JSF应用程序，或者希望视图状态在服务器重启后仍然有效，则必须显式指定带有固定AES（高级加密标准）密钥的`jsf/ClientSideSecretKey`环境条目。您可以使用以下纯Java代码片段自行生成Base64编码的AES密钥：\n\
    \n```\nKeyGenerator keyGen = KeyGenerator.getInstance(\"AES\");\nkeyGen.init(256);\
    \ // 如果没有JCE，则使用128\nbyte[] rawKey = keyGen.generateKey().getEncoded();\nString\
    \ key = Base64.getEncoder().encodeToString(rawKey);\nSystem.out.println(key);\
    \ // 打印Base64格式的AES密钥\n```\n\n标准的JSF表单（由`<h:form>`表示）默认使用POST方法提交到与包含该表单的JSF页面被请求时完全相同的URI。换句话说，当您通过`http://example.com/project/page.xhtml`请求一个JSF页面时，它将提交到完全相同的`http://example.com/project/page.xhtml`\
    \ URI。这在Web开发术语中称为“回发”。当JSF需要处理传入的回发请求时，恢复视图阶段（第一阶段）将在视图构建时间之后，从`javax.faces.ViewState`参数中提取视图状态，并将所有已更改的属性恢复到当前请求中新创建的`UIComponent`实例中，以便组件树最终反映出与上一个请求的视图渲染期间完全相同的状态。\n\
    \n在一般的JSF Web应用程序中，保存的视图状态大部分由实现`javax.faces.component.EditableValueHolder`接口的`UIComponent`实例的内部属性表示，该接口涵盖了所有`UIInput`组件，例如`<h:inputText>`。当提交JSF表单因转换或验证错误而失败时，所有涉及的`UIInput`组件的已更改的“是否有效？”状态和“本地值”状态（可以是提交的字符串值，也可以是已转换和验证的值）都将保存在视图状态中。这有一个主要优点，即开发人员无需担心手动跟踪它们，以便在保持模型（托管Bean属性）完全不受这些值影响的同时，向网站用户重新呈现包含所有有效和无效值的已提交表单。这对JSF开发人员和网站用户来说都是一个主要的可用性优势。\n\
    \n保存的视图状态中较少的部分由对组件树层次结构或组件属性的程序化更改表示。其中，对`readonly`、`disabled`和`rendered`属性的任何程序化更改都会被跟踪在视图状态中，这样黑客就没有机会以导致这些属性翻转到错误一侧的方式伪造请求，从而可能执行潜在的危险操作。这是一个主要的安全优势。\n\
    \n# View Scope\n\nJSF所基于的Servlet API提供了三个定义明确的作用域：请求作用域、会话作用域和应用程序作用域。基本上，请求作用域是通过将感兴趣的对象存储为`HttpServletRequest`的属性来建立的。同样，会话作用域是通过将感兴趣的对象存储为`HttpSession`的属性来建立的，而应用程序作用域是通过将感兴趣的对象存储为`ServletContext`的属性来建立的。\n\
    \nJSF在此基础上增加了一个作用域，即视图作用域。这绝不能与组件树本身混淆。组件树（物理上的`UIViewRoot`实例）在同一个HTTP请求期间创建和销毁，因此显然是请求作用域的。这也绝不能与视图状态混淆，尽管它们密切相关。\n\
    \n当最终用户在JSF表单上触发回发请求，并且应用程序不执行任何类型的导航（即，操作方法返回`null`或`void`）时，视图状态标识符将保持不变，并且视图作用域将延长到下一个回发请求，直到应用程序执行显式导航，或HTTP会话过期。您可以通过将感兴趣的对象存储为`UIViewRoot#getViewMap()`的一个条目来建立视图作用域。这正是JSF存储其`@ViewScoped`托管Bean的地方。不，这个映射不会反过来存储在视图状态中，即使JSF状态保存方法被显式设置为“客户端”。视图作用域存储在HTTP会话中，与视图状态分开。只有视图作用域标识符存储在视图状态中。只有`UIViewRoot`实例的已更改属性存储在视图状态中。"
  raw: '## View State


    As explained in the section “View Build Time,” the UIComponent instances resembling
    the component tree are inherently request scoped. They are created during the
    view build time and they are destroyed right after the render response phase (sixth
    phase). Any changes to properties of the UIComponent instances, which are not
    referenced by an EL (Expression Language) expression, and are different from the
    default values, will be saved as “view state .” In other words, the “view state”
    is very definitely not the same as the “component tree.” Moreover, if the entire
    component tree itself would be saved in the view state, then this would result
    in not only an unnecessarily bloated view state but also bad application behavior
    as UIComponent instances are inherently not thread safe and may therefore absolutely
    not be shared across multiple HTTP requests.


    Saving the view state happens during the view render time. Therein JSF will write
    out the view state to a javax.faces.ViewState hidden input field of the generated
    HTML representation of every JSF form. When the JSF state saving method has the
    default setting “server,” then the hidden input value represents a unique identifier
    referring the serialized view state object which is stored in the HTTP session.
    When the JSF state saving method is explicitly set to “client” using the following
    web.xml context parameter, then the hidden input value itself represents the encrypted
    form of the serialized view state object.


    ```

    <context-param>

        <param-name>javax.faces.STATE_SAVING_METHOD</param-name>

        <param-value>client</param-value>

    </context-param>

    <env-entry>

        <env-entry-name>jsf/ClientSideSecretKey</env-entry-name>

        <env-entry-type>java.lang.String</env-entry-type>

        <env-entry-value>[AES key in Base64 format]</env-entry-value>

    </env-entry>

    ```


    Note that explicitly specifying the jsf/ClientSideSecretKey environment entry
    with a fixed AES (Advanced Encryption Standard) key is mandatory in case you’re
    running the JSF application on a cluster of servers (“cloud”), or when you’d like
    the view state still to be valid after a server restart. You can generate a Base64-encoded
    AES key yourself using the following plain Java snippet:


    ```

    KeyGenerator keyGen = KeyGenerator.getInstance("AES");

    keyGen.init(256); // Or 128 in case you don''t have JCE.

    byte[] rawKey = keyGen.generateKey().getEncoded();

    String key = Base64.getEncoder().encodeToString(rawKey);

    System.out.println(key); // Prints AES key in Base64 format.

    ```


    The standard JSF form, as represented by <h:form>, submits by default using the
    POST method to the very same requested URI as where the JSF page containing the
    form is being requested. In other words, when you request a JSF page by [http://example.com/project/page.xhtml](http://example.com/project/page.xhtml)
    , then it will submit to the very same [http://example.com/project/page.xhtml](http://example.com/project/page.xhtml)
    URI. This is in web development terms known as “postback.” When JSF needs to process
    an incoming postback request, then the restore view phase (first phase) will,
    after the view build time, extract the view state from the javax.faces.ViewState
    parameter and restore all changed properties into the newly created UIComponent
    instances of the current request so that the component tree ultimately reflects
    exactly the same state as it had during the view render time of the previous request.


    On an average JSF web application, the majority of the saved view state is represented
    by internal properties of UIComponent instances implementing the javax.faces.component.EditableValueHolder
    interface,[²](#A454457_1_En_3_Chapter.xhtml#Fn2) which covers all UIInput components
    such as <h:inputText>. When submitting a JSF form fails with a conversion or validation
    error, then all changed “is valid?” states and “local value” states, which can
    be either the submitted string value or the already converted and validated value,
    will for all involved UIInput components be saved in the view state. This has
    the major advantage that that the developer doesn’t need to worry about manually
    keeping track of them in order to re-present the submitted form with all valid
    and invalid values preserved to the web site user while keeping the model (the
    managed bean properties) completely free of those values. This is a major usability
    advantage for both the JSF developer and the web site user.


    The minority of the saved view state is represented by programmatic changes to
    the component tree hierarchy, or to component attributes. Among others, any programmatic
    changes to readonly, disabled, and rendered attributes are tracked in the view
    state so that a hacker doesn’t have any chance to spoof the request in such way
    that those attributes flip to the wrong side so that the hacker could do potentially
    hazardous things. This is a major security advantage.


    ## View Scope


    The Servlet API, which JSF, among others, is built on top of, offers three well-defined
    scopes: the request scope, the session scope, and the application scope. Basically,
    the request scope is established by storing the object of interest as an attribute
    of the HttpServletRequest. Equivalently, the session scope is established by storing
    the object of interest as an attribute of the HttpSession and the application
    scope is established by storing the object of interest as an attribute of the
    ServletContext.


    JSF adds one more scope to this, the view scope . This must not be confused with
    the component tree itself. The component tree (the physical UIViewRoot instance)
    is created and destroyed during the very same HTTP request and is therefore clearly
    request scoped. This must also not be confused with the view state, although they
    are closely related.


    When the end user fires a postback request on a JSF form, and the application
    doesn’t perform any kind of navigation (i.e., the action method returns null or
    void), then the view state identifier will stay the same and the view scope will
    be prolonged to the next postback request, until the application performs an explicit
    navigation, or when the HTTP session expires. You can establish the view scope
    by storing the object of interest as an entry of UIViewRoot#getViewMap(). This
    is exactly where JSF stores its @ViewScoped managed beans. No, this map is not
    in turn stored in the view state, not even when the JSF state saving method is
    explicitly set to “client.” The view scope is stored in the HTTP session, separate
    from the view state. Only the view scope identifier is stored in the view state.
    Only the changed attributes of the UIViewRoot instance are stored in the view
    state.'
  trans: '

    ## 视图状态


    正如“视图构建时间”一节所述，构成组件树的 `UIComponent` 实例本质上是请求作用域的。它们在视图构建期间被创建，并在渲染响应阶段（第六阶段）结束后立即被销毁。任何对
    `UIComponent` 实例属性的更改，如果这些属性未被 EL（表达式语言）表达式引用，且与默认值不同，都将被保存为“视图状态”。换句话说，“视图状态”与“组件树”绝非同一概念。此外，如果整个组件树本身被保存在视图状态中，那么这不仅会导致视图状态不必要的臃肿，还会导致不良的应用程序行为，因为
    `UIComponent` 实例本质上不是线程安全的，因此绝对不能跨多个 HTTP 请求共享。


    视图状态的保存发生在视图渲染期间。在此过程中，JSF 会将视图状态写入一个 `javax.faces.ViewState` 隐藏输入字段，该字段位于生成的每个
    JSF 表单的 HTML 表示中。当 JSF 状态保存方法设置为默认的“server”时，该隐藏输入的值代表一个唯一标识符，指向存储在 HTTP 会话中的序列化视图状态对象。当使用以下
    `web.xml` 上下文参数将 JSF 状态保存方法显式设置为“client”时，该隐藏输入的值本身代表序列化视图状态对象的加密形式。


    ```

    <context-param>

        <param-name>javax.faces.STATE_SAVING_METHOD</param-name>

        <param-value>client</param-value>

    </context-param>

    <env-entry>

        <env-entry-name>jsf/ClientSideSecretKey</env-entry-name>

        <env-entry-type>java.lang.String</env-entry-type>

        <env-entry-value>[Base64 格式的 AES 密钥]</env-entry-value>

    </env-entry>

    ```


    请注意，如果你在服务器集群（“云”）上运行 JSF 应用程序，或者希望视图状态在服务器重启后仍然有效，则必须使用固定的 AES（高级加密标准）密钥显式指定
    `jsf/ClientSideSecretKey` 环境条目。你可以使用以下简单的 Java 代码片段自行生成 Base64 编码的 AES 密钥：


    ```

    KeyGenerator keyGen = KeyGenerator.getInstance("AES");

    keyGen.init(256); // 如果没有 JCE，则使用 128

    byte[] rawKey = keyGen.generateKey().getEncoded();

    String key = Base64.getEncoder().encodeToString(rawKey);

    System.out.println(key); // 打印 Base64 格式的 AES 密钥

    ```


    标准的 JSF 表单（由 `<h:form>` 表示）默认使用 POST 方法提交到与包含该表单的 JSF 页面被请求时完全相同的 URI。换句话说，当你通过
    [`example.com/project/page.xhtml`](http://example.com/project/page.xhtml) 请求一个
    JSF 页面时，它将提交到完全相同的 [`example.com/project/page.xhtml`](http://example.com/project/page.xhtml)
    URI。这在 Web 开发术语中被称为“回传”。当 JSF 需要处理一个传入的回传请求时，恢复视图阶段（第一阶段）将在视图构建时间之后，从 `javax.faces.ViewState`
    参数中提取视图状态，并将所有已更改的属性恢复到当前请求新创建的 `UIComponent` 实例中，从而使组件树最终反映出与上一次请求的视图渲染期间完全相同的状态。


    在一般的 JSF Web 应用程序中，保存的视图状态大部分由实现 `javax.faces.component.EditableValueHolder` 接口²
    的 `UIComponent` 实例的内部属性表示，该接口涵盖了所有 `UIInput` 组件，例如 `<h:inputText>`。当提交 JSF 表单因转换或验证错误而失败时，所有涉及的
    `UIInput` 组件的已更改的“是否有效？”状态和“本地值”状态（可以是提交的字符串值，也可以是已转换和验证的值）都将保存在视图状态中。这样做的一个主要优点是，开发人员无需担心手动跟踪这些状态，以便在保持模型（托管
    Bean 属性）完全不受这些值影响的同时，向网站用户重新呈现包含所有有效和无效值的已提交表单。这对于 JSF 开发人员和网站用户来说都是一个主要的可用性优势。


    保存的视图状态中较少的一部分由对组件树层次结构或组件属性的程序化更改表示。其中，对 `readonly`、`disabled` 和 `rendered` 属性的任何程序化更改都会被跟踪在视图状态中，这样黑客就没有机会以某种方式伪造请求，使这些属性翻转到错误的一侧，从而可能执行危险的操作。这是一个主要的安全优势。


    ## 视图作用域


    JSF 所基于的 Servlet API 提供了三个定义明确的作用域：请求作用域、会话作用域和应用作用域。基本上，请求作用域是通过将感兴趣的对象存储为 `HttpServletRequest`
    的属性来建立的。类似地，会话作用域是通过将感兴趣的对象存储为 `HttpSession` 的属性来建立的，而应用作用域是通过将感兴趣的对象存储为 `ServletContext`
    的属性来建立的。


    JSF 在此基础上增加了一个作用域，即视图作用域。这绝不能与组件树本身混淆。组件树（物理的 `UIViewRoot` 实例）在同一个 HTTP 请求期间被创建和销毁，因此显然是请求作用域的。这也绝不能与视图状态混淆，尽管它们密切相关。


    当最终用户在 JSF 表单上触发回传请求，并且应用程序不执行任何类型的导航（即，操作方法返回 `null` 或 `void`）时，视图状态标识符将保持不变，并且视图作用域将延长到下一个回传请求，直到应用程序执行显式导航，或者
    HTTP 会话过期。你可以通过将感兴趣的对象存储为 `UIViewRoot#getViewMap()` 的一个条目来建立视图作用域。这正是 JSF 存储其
    `@ViewScoped` 托管 Bean 的地方。不，这个映射并不会反过来存储在视图状态中，即使 JSF 状态保存方法被显式设置为“client”也是如此。视图作用域存储在
    HTTP 会话中，与视图状态分开。只有视图作用域标识符存储在视图状态中。只有 `UIViewRoot` 实例的已更改属性存储在视图状态中。

