- fmt: "### `@ViewScoped`\n\nA view-scoped managed bean is tied to the lifetime of\
    \ the JSF view state. The JSF view state is elaborated in the section “View State”\
    \ in Chapter [3](#A454457_1_En_3_Chapter.xhtml). In a nutshell, a view-scoped\
    \ managed bean lives as long as the end user is performing postback requests on\
    \ the very same JSF view and the invoked action methods keep returning `null`\
    \ or `void`. Once the action method returns non-null, even if it’s an empty string\
    \ or represents the same view, then the view scope will end. View-scoped managed\
    \ beans are not shared across browser tabs within the same browser session. Each\
    \ one gets its own unique instance. Effectively, they are indirectly identified\
    \ by the `javax.faces.ViewState` hidden input field in the generated HTML representation\
    \ of a JSF form.\n\nHowever, view-scoped managed beans are not stored in the JSF\
    \ view state, not even when client-side state saving is enabled. They are actually\
    \ stored in the HTTP session, regardless of the JSF state saving method. They\
    \ are not immediately destroyed when the end user unloads the web page either\
    \ by performing a GET request via a link or bookmark or editing the URL in browser’s\
    \ address bar, or by closing the browser tab. They will stick around in the HTTP\
    \ session and only get destroyed when the HTTP session expires.\n\nAs an end user\
    \ can in theory spawn an unlimited amount of browser tabs within the same session,\
    \ and thus also as many JSF view states and view-scoped managed beans, there’s\
    \ a configurable maximum limit on the amount of JSF view states and view-scoped\
    \ managed beans which will be stored in the HTTP session. Once this limit is reached,\
    \ the least recently used JSF view state and view-scoped managed bean will be\
    \ expired and destroyed. When the end user actually goes back to the tab that\
    \ originally referenced the now expired JSF view state, and performs a postback\
    \ request on it, JSF will throw a `ViewExpiredException`. The limit on the amount\
    \ of JSF view states is dependent on the JSF implementation used. In Mojarra,\
    \ this limit is configurable by the `com.sun.faces.numberOfLogicalViews` context\
    \ parameter in `web.xml` whose default value is 15.[⁸](#A454457_1_En_8_Chapter.xhtml#Fn8)\n\
    \n```\n<context-param>\n    <param-name>com.sun.faces.numberOfLogicalViews</param-name>\n\
    \    <param-value>25</param-value>\n</context-param>\n```\n\nIf your web application,\
    \ however, invites being opened in many more browser tabs, such as a discussion\
    \ forum or a Q&A site, then you’d better switch to client-side state saving. This\
    \ way the JSF view states are no longer stored in the HTTP session and will therefore\
    \ also never expire. However, the associated view-scoped managed beans are still\
    \ stored in the HTTP session and expirable. When the end user actually goes back\
    \ to the tab that originally referenced the now expired view scoped-managed bean,\
    \ and performs a postback request on it, JSF will not throw a `ViewExpiredException`\
    \ but instead will create a new one from scratch, thereby losing all the state\
    \ changes to the original managed bean instance. The limit on the amount of view-scoped\
    \ managed beans is also dependent on the JSF implementation used. In Mojarra,\
    \ this limit is not yet configurable by a `web.xml` context parameter. It’s only\
    \ configurable by explicitly setting the session attribute with the name `com.sun.faces.application.view.activeViewMapsSize`\
    \ whose default value is 25. This can be achieved with an application-scoped managed\
    \ bean as follows, which observes the initialization of the session scope.\n\n\
    ```\n@ApplicationScoped\npublic class Config {\n\npublic void sessionCreated\n\
    \        (@Observes @Initialized(SessionScoped.class) HttpSession session)\n \
    \   {\n        session.setAttribute\n            (\"com.sun.faces.application.view.activeViewMapsSize\"\
    , 15);\n    }\n}\n```\n\nThis configuration actually decreases the default value\
    \ to be equal to default maximum amount of JSF view states in session. This is\
    \ fine when you’re using server-side state saving and all your JSF views effectively\
    \ reference only one view-scoped managed bean instance. However, in a decently\
    \ developed and refactored JSF web application, the average JSF page usually references\
    \ multiple view-scoped managed beans. If you have, for example, a maximum amount\
    \ of three different view-scoped managed beans per JSF view, then you’d best set\
    \ the limit to three times the value of `com.sun.faces.numberOfLogicalViews`.\
    \ You only need to take into account the possible memory consumption. It will\
    \ quickly go overboard when the view-scoped managed beans in turn hold, relatively,\
    \ a lot of data.\n\nView-scoped managed beans are very useful for retaining state\
    \ across Ajax-based postbacks on the same JSF view, particularly if those postbacks\
    \ result in changes in the value of the `rendered` attribute of any `UIComponent`,\
    \ or the `disabled` or `readonly` attribute of an `UIInput` component, or the\
    \ `disabled` attribute of any `UICommand` component within the same JSF view.\
    \ That is, on a subsequent postback, JSF will, as part of a safeguard against\
    \ a tampered request, recheck them before actually processing the component. If\
    \ the managed bean holding the state was request scoped instead of view scoped,\
    \ then those changes in the conditions would get lost in a subsequent postback\
    \ and the postback wouldn’t get processed as intuitively expected. In other words,\
    \ view-scoped managed beans are particularly useful in dynamic forms.\n\nOne example\
    \ is a drop-down which conditionally renders a free text field when the “other”\
    \ option is chosen.\n\n```\n<f:metadata>\n    <f:importConstants type=\"com.example.project.model.Title\"\
    \ />\n</f:metadata>\n...\n<h:form>\n    <h:selectOneMenu value=\"#{bean.customer.title}\"\
    >\n        <f:selectItems value=\"#{Title}\" />\n        <f:ajax render=\"other\"\
    \ />\n    </h:selectOneMenu>\n    <h:panelGroup id=\"other\">\n        <h:inputText\
    \ rendered=\"#{bean.customer.title eq 'OTHER'}\"\n            value=\"#{bean.customer.titleOther}\"\
    \ required=\"true\" />\n    </h:panelGroup>\n    ...\n    <h:commandButton value=\"\
    Save\" action=\"#{bean.save}\" />\n</h:form>\n```\n\nThis construct won’t work\
    \ when the managed bean is request scoped and is thus recreated on every request.\
    \ When the drop-down changes, it creates a new instance of the request-scoped\
    \ bean, sets the title there, and renders the free text field and finally the\
    \ request-scoped bean instance gets destroyed. When the form submits, it creates\
    \ a new instance of the request-scoped bean, thus without the customer title,\
    \ and when JSF checks the `rendered` attribute during the apply request values\
    \ phase (second phase) of the free text field and notices it’s `false`, ultimately\
    \ it won’t process the free text field at all. It will only work when the managed\
    \ bean is view scoped because the customer title set during the drop-down change\
    \ is still available during the apply request values phase (second phase) of the\
    \ form submit.\n\nThere is, however, a work-around. You could let the `rendered`\
    \ attribute check the HTTP request parameter instead of the model value. As explained\
    \ in Chapter [4](#A454457_1_En_4_Chapter.xhtml), the HTTP request parameter name\
    \ is specified by the component’s client ID. You could bind the drop-down component\
    \ to the view and then use its client ID to obtain the HTTP request parameter\
    \ value.\n\n```\n<h:selectOneMenu binding=\"#{title}\" value=\"#{bean.customer.title}\"\
    >\n    <f:selectItems value=\"#{Title}\" />\n    <f:ajax render=\"other\" />\n\
    </h:selectOneMenu>\n<h:panelGroup id=\"other\">\n    <h:inputText rendered=\"\
    #{param[title.clientId] eq 'OTHER'}\"\n        value=\"#{bean.customer.titleOther}\"\
    \ required=\"true\" />\n</h:panelGroup>\n```"
  raw: '### @ViewScoped


    A view-scoped managed bean is tied to the lifetime of the JSF view state. The
    JSF view state is elaborated in the section “View State” in Chapter [3](#A454457_1_En_3_Chapter.xhtml).
    In a nutshell, a view-scoped managed bean lives as long as the end user is performing
    postback requests on the very same JSF view and the invoked action methods keep
    returning null or void. Once the action method returns non-null, even if it’s
    an empty string or represents the same view, then the view scope will end. View-scoped
    managed beans are not shared across browser tabs within the same browser session.
    Each one gets its own unique instance. Effectively, they are indirectly identified
    by the javax.faces.ViewState hidden input field in the generated HTML representation
    of a JSF form.


    However, view-scoped managed beans are not stored in the JSF view state, not even
    when client-side state saving is enabled. They are actually stored in the HTTP
    session, regardless of the JSF state saving method. They are not immediately destroyed
    when the end user unloads the web page either by performing a GET request via
    a link or bookmark or editing the URL in browser’s address bar, or by closing
    the browser tab. They will stick around in the HTTP session and only get destroyed
    when the HTTP session expires.


    As an end user can in theory spawn an unlimited amount of browser tabs within
    the same session, and thus also as many JSF view states and view-scoped managed
    beans, there’s a configurable maximum limit on the amount of JSF view states and
    view-scoped managed beans which will be stored in the HTTP session. Once this
    limit is reached, the least recently used JSF view state and view-scoped managed
    bean will be expired and destroyed. When the end user actually goes back to the
    tab that originally referenced the now expired JSF view state, and performs a
    postback request on it, JSF will throw a ViewExpiredException. The limit on the
    amount of JSF view states is dependent on the JSF implementation used. In Mojarra,
    this limit is configurable by the com.sun.faces.numberOfLogicalViews context parameter
    in web.xml whose default value is 15.[⁸](#A454457_1_En_8_Chapter.xhtml#Fn8)


    ```

    <context-param>

        <param-name>com.sun.faces.numberOfLogicalViews</param-name>

        <param-value>25</param-value>

    </context-param>

    ```


    If your web application, however, invites being opened in many more browser tabs,
    such as a discussion forum or a Q&A site, then you’d better switch to client-side
    state saving. This way the JSF view states are no longer stored in the HTTP session
    and will therefore also never expire. However, the associated view-scoped managed
    beans are still stored in the HTTP session and expirable. When the end user actually
    goes back to the tab that originally referenced the now expired view scoped-managed
    bean, and performs a postback request on it, JSF will not throw a ViewExpiredException
    but instead will create a new one from scratch, thereby losing all the state changes
    to the original managed bean instance. The limit on the amount of view-scoped
    managed beans is also dependent on the JSF implementation used. In Mojarra, this
    limit is not yet configurable by a web.xml context parameter. It’s only configurable
    by explicitly setting the session attribute with the name com.sun.faces.application.view.activeViewMapsSize
    whose default value is 25\. This can be achieved with an application-scoped managed
    bean as follows, which observes the initialization of the session scope.


    ```

    @ApplicationScoped

    public class Config {


    public void sessionCreated

            (@Observes @Initialized(SessionScoped.class) HttpSession session)

        {

            session.setAttribute

                ("com.sun.faces.application.view.activeViewMapsSize", 15);

        }

    }

    ```


    This configuration actually decreases the default value to be equal to default
    maximum amount of JSF view states in session. This is fine when you’re using server-side
    state saving and all your JSF views effectively reference only one view-scoped
    managed bean instance. However, in a decently developed and refactored JSF web
    application, the average JSF page usually references multiple view-scoped managed
    beans. If you have, for example, a maximum amount of three different view-scoped
    managed beans per JSF view, then you’d best set the limit to three times the value
    of com.sun.faces.numberOfLogicalViews. You only need to take into account the
    possible memory consumption. It will quickly go overboard when the view-scoped
    managed beans in turn hold, relatively, a lot of data.


    View-scoped managed beans are very useful for retaining state across Ajax-based
    postbacks on the same JSF view, particularly if those postbacks result in changes
    in the value of the rendered attribute of any UIComponent, or the disabled or
    readonly attribute of an UIInput component, or the disabled attribute of any UICommand
    component within the same JSF view. That is, on a subsequent postback, JSF will,
    as part of a safeguard against a tampered request, recheck them before actually
    processing the component. If the managed bean holding the state was request scoped
    instead of view scoped, then those changes in the conditions would get lost in
    a subsequent postback and the postback wouldn’t get processed as intuitively expected.
    In other words, view-scoped managed beans are particularly useful in dynamic forms
    .


    One example is a drop-down which conditionally renders a free text field when
    the “other” option is chosen.


    ```

    <f:metadata>

        <f:importConstants type="com.example.project.model.Title" />

    </f:metadata>

    ...

    <h:form>

        <h:selectOneMenu value="#{bean.customer.title}">

            <f:selectItems value="#{Title}" />

            <f:ajax render="other" />

        </h:selectOneMenu>

        <h:panelGroup id="other">

            <h:inputText rendered="#{bean.customer.title eq ''OTHER''}"

                value="#{bean.customer.titleOther}" required="true" />

        </h:panelGroup>

        ...

        <h:commandButton value="Save" action="#{bean.save}" />

    </h:form>

    ```


    This construct won’t work when the managed bean is request scoped and is thus
    recreated on every request. When the drop-down changes, it creates a new instance
    of the request-scoped bean, sets the title there, and renders the free text field
    and finally the request-scoped bean instance gets destroyed. When the form submits,
    it creates a new instance of the request-scoped bean, thus without the customer
    title, and when JSF checks the rendered attribute during the apply request values
    phase (second phase) of the free text field and notices it’s false, ultimately
    it won’t process the free text field at all. It will only work when the managed
    bean is view scoped because the customer title set during the drop-down change
    is still available during the apply request values phase (second phase) of the
    form submit.


    There is, however, a work-around. You could let the rendered attribute check the
    HTTP request parameter instead of the model value. As explained in Chapter [4](#A454457_1_En_4_Chapter.xhtml),
    the HTTP request parameter name is specified by the component’s client ID. You
    could bind the drop-down component to the view and then use its client ID to obtain
    the HTTP request parameter value .


    ```

    <h:selectOneMenu binding="#{title}" value="#{bean.customer.title}">

        <f:selectItems value="#{Title}" />

        <f:ajax render="other" />

    </h:selectOneMenu>

    <h:panelGroup id="other">

        <h:inputText rendered="#{param[title.clientId] eq ''OTHER''}"

            value="#{bean.customer.titleOther}" required="true" />

    </h:panelGroup>

    ```'
