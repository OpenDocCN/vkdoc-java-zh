    ## 局部扩展与包装


    在某些情况下，我们并不希望全局覆盖（例如）视图处理器，而仅希望在组件中某个方法的局部调用中生效。JSF 通过传递 `FacesContext` 来实现这一点，组件将其作为获取几乎所有其他内容的主要入口点。对于
    JSF 2.3 而言，组件并非 CDI 制品，也无法通过其他方式注入，因此 CDI 方法目前不适用于它们。


    局部扩展可以通过包装 faces 上下文并将包装后的上下文传递给下一层来实现。请注意，Servlet 规范使用了相同的模式：`HttpServletRequest`
    和 `HttpServletResponse` 可以被过滤器包装，然后传递给下一个过滤器，该过滤器可以再次包装并传递给下一个过滤器，依此类推。


    为了说明这一点，假设对于某个特定组件，我们希望增强表单组件等所使用的操作 URL 生成方式，使得 `"?foo=bar"` 被添加到该 URL 中。如果我们通过全局覆盖视图处理器来实现，所有使用该视图处理器的组件和其他代码都会看到这个
    URL，而我们只希望这个特定组件拥有此行为。


    为了实现这一点，我们使用包装技术，如下面的组件所示：


    ```

    @FacesComponent(createTag = true)

    public class CustomForm extends HtmlForm {


    @Override

        public void encodeBegin(FacesContext context) throws IOException {

            super.encodeBegin(new ActionURLDecorator(context));

        }

    }

    ```


    如果没有 JSF 的支持，实现包装器至少可以说是一项相当繁琐的任务，因为从 `FacesContext` 到 `ViewHandler` 的路径需要多次调用，并且涉及的类拥有大量方法。幸运的是，JSF
    通过为其大部分重要制品提供包装器，并附带易于使用的构造函数，极大地简化了这项任务。


    这里使用的模式是：顶层类（上例中的 `ActionURLDecorator`）继承自 `FacesContextWrapper`，并将原始 faces 上下文传递给其超类。然后，通过覆盖链中的初始方法（此处为
    `getApplication()`），并返回该方法返回类型的包装器（将超类版本传递给其构造函数），来实现中间对象的路径。这个包装器随后对链中的下一个方法执行相同操作，直到到达需要自定义行为的最终方法。


    以下是一个示例：


    ```

    public class ActionURLDecorator extends FacesContextWrapper {


    public ActionURLDecorator(FacesContext context) {

            super(context);

        }


    @Override

        public Application getApplication() {

            return new ApplicationWrapper(super.getApplication()) {

                @Override

                public ViewHandler getViewHandler() {

                    return new ViewHandlerWrapper(super.getViewHandler()) {

                        @Override

                        public String getActionURL

                            (FacesContext context, String viewId)

                        {

                            String url = super.getActionURL(context, viewId);

                            return url + "?foo=bar";

                        }

                    };

                }

            };

        }

    }

    ```


    在 JSF 应用程序中引入这两个类后，现在考虑以下使用我们自定义表单组件的 Facelet：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:test="http://xmlns.jcp.org/jsf/component"

    >

        <h:head />

        <h:body>

            <test:customForm action="index">

                <h:commandButton action="index" value="Go Index" />

            </test:customForm>

        </h:body>

    </html>

    ```


    请记住，当自定义组件使用 `@FacesComponent(createTag=true)` 注解时，无需进行 XML 注册，其 XML 命名空间默认为 [`xmlns.jcp.org/jsf/component`](http://xmlns.jcp.org/jsf/component)，组件标签名称默认为简单的类名。（另请参见第
    11 章。）


    如果我们请求与此 Facelet 对应的视图并按下按钮，我们确实会看到 `"?foo=bar"` 出现在 URL 之后，这意味着我们通过包装器链对视图处理器进行的局部扩展已正确生效。

