- fmt: "# CSRF Protection and Web Parameter Tampering\n\nAssuming our first application\
    \ with the CSRF-protected `bar.xhtml` is deployed to `http://localhost:8080/project`,\
    \ clicking the output link from this second application will cause the `javax.faces.application.ProtectedViewException`\
    \ to be thrown again in the first application. Note that the referer is an optional\
    \ check that’s only done when the referer header is actually present, as is the\
    \ case with the link in the second application.\n\nIf we enter `http://localhost:8080/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr`\
    \ directly into the address bar of a browser, or request it directly via a command-line\
    \ utility such as `wget` or `curl`, there won’t be a referer and the request will\
    \ be accepted.\n\nIn practice, a GET request has less value of being protected\
    \ against CSRF attacks since these actually *should* be idempotent (should not\
    \ have side effects and should only display data). Instead of shielding GET requests\
    \ with CSRF protection tokens, it’s probably a far better idea to refactor an\
    \ application to not have non-idempotent GET requests.\n\nFor postbacks the CSRF\
    \ protection token works in much the same way though. To demonstrate, consider\
    \ changing the `/bar.xhtml` view into the following:\n\n```\n<!DOCTYPE html>\n\
    <html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n>\n    <h:head />\n    <h:body>\n        <h:form>\n\
    \            <h:commandButton value=\"Test\" action=\"#{bar.submit}\" />\n   \
    \     </h:form>\n    </h:body>\n</html>\n```\n\nRendering this page will result\
    \ in the form target URL having the CSRF protection token applied to it in the\
    \ same way as we saw for the GET requests—for example,\n\n```\n<form method=\"\
    post\"\n    action=\"/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr\"\
    \ ...>\n```\n\nThis is thus another difference with the implicit `javax.faces.ViewState`\
    \ token, which is always a POST parameter.\n\n## Web Parameter Tampering Protection\n\
    \nWeb parameter tampering is an attack against an application where an attacker\
    \ modifies parameter values that are sent (back) to the server hosting the application.\
    \ If the application doesn’t validate those values correctly, an attacker could\
    \ gain more benefits than entitled to, or may get the opportunity to carry out\
    \ additional attacks.\n\nFor example, suppose a web application renders a list\
    \ of roles that can be assigned to another user, say “user,” “manager,” and “sales.”\
    \ An attacker could attempt to modify the data posted back and change the selection\
    \ of “user” into “admin.” If the server blindly accepts the input and “admin”\
    \ is an existing value, this allows the attacker to give another user the “admin”\
    \ role, even when the attacker is not privileged to do that.\n\nJSF has an implicit\
    \ protection against a subset of this attack; namely, against values being posted\
    \ back from a selection (specifically, from `UISelectOne`- and `UISelectMany`-based\
    \ components). This works by JSF either restoring the view from `javax.faces.ViewState`\
    \ after a postback (when full state saving is used) or re-creating it (when partial\
    \ state saving is used). Only values that were also rendered are accepted. The\
    \ usual caveat applies though, and that’s that with partial state saving, the\
    \ data bound to the component needs to be identical before and after the postback.\
    \ This, however, can easily be accomplished by using the view scope.\n\nTo demonstrate,\
    \ consider the following view:\n\n```\n<!DOCTYPE html>\n<html lang=\"en\"\n  \
    \  xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n>\n    <h:head />\n    <h:body>\n\
    \        <h:form>\n            <h:selectOneMenu value=\"#{bean.selected}\">\n\
    \                <f:selectItems value=\"#{bean.available}\" />\n            </h:selectOneMenu>\n\
    \            <h:commandButton value=\"Select\" />\n        </h:form>\n       \
    \ <p>Chosen value: #{bean.selected}</p>\n    </h:body>\n</html>\n```\n\nAnd the\
    \ following backing bean:\n\n```\n@Named @RequestScoped\npublic class Bean {\n\
    \n    private List<String> available = Arrays.asList(\"foo\", \"bar\", \"kaz\"\
    );\n    private String selected;\n\n    public List<String> getAvailable() {\n\
    \        return available;\n    }\n\n    public String getSelected() {\n     \
    \   return selected;\n    }\n    public void setSelected (String selected) {\n\
    \        this.selected = selected;\n    }\n}\n```\n\nChoosing, for example, “bar”\
    \ and clicking “select” will render “Chosen value: bar,” as expected. Changing\
    \ the value being sent can be done in various ways, for instance via an intercepting\
    \ proxy like Burp Proxy or by editing the live source via the developer tools\
    \ from a browser such as Chrome.\n\n![A454457_1_En_13_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_13_Fig1_HTML.jpg)\n\
    \n###### Figure 13-1 Tampering the selected value in HTML source code\n\nSelecting\
    \ the “foo” entry after the change as shown in Figure [13-1](#A454457_1_En_13_Chapter.xhtml#Fig1)\
    \ and clicking the select button again will cause the “foox” value to be sent\
    \ to the application. This value will be rejected by JSF and as a result “Chosen\
    \ value:” will be rendered, indicating that our tampered value indeed has not\
    \ been accepted."
