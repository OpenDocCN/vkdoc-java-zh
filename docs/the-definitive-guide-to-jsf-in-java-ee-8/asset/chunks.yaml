  raw: '###### Figure 2-17 The JBoss Tools-provided New CDI Bean wizard in Eclipse


    The class editor will now open with the newly created backing bean class . We’ll
    modify it to get rid of the useless constructor; add two properties, input and
    output; and accompany the input property with a getter and setter pair, the output
    property with only a getter, and a submit() action method which prepares the output
    property based on the input property. As a hint, in Eclipse after entering the
    properties, you can right-click anywhere in the class editor and choose *Source
    ➤ Generate Getters and Setters* to have the IDE to generate them. In its entirety,
    the edited backing bean class should look as follows:


    ```

    package com.example.project.view;


    import javax.enterprise.context.RequestScoped;

    import javax.inject.Named;


    @Named @RequestScoped

    public class HelloWorld {


        private String input;

        private String output;


        public void submit() {

            output = "Hello World! You have typed: " + input;

        }


        public String getInput() {

            return input;

        }


        public void setInput(String input) {

            this.input = input;

        }


        public String getOutput() {

            return output;

        }

    }

    ```


    We''ll briefly go through the annotations that are used here.


    *   **@Named**—gives the bean a name, which is primarily used to reference it
    via EL. Without any attributes this name defaults to the simple class name with
    the first letter in lowercase, thus "helloWorld" here. It will be available by
    #{helloWorld} in EL . This can be used in JSF pages.


    *   **@RequestScoped**—gives the bean a scope, which means the same instance of
    the bean is used within a given lifespan. In this case that lifespan is the duration
    of an HTTP request. When the scope ends, the bean is automatically destroyed.
    You can read more about scopes in Chapter [8](#A454457_1_En_8_Chapter.xhtml).


    ### Creating the Facelets File


    Next, we''ll create the View part of MVC. It’s basically just a XHTML file which
    is by JSF interpreted as a *Facelets file* or just *Facelet*. This Facelets file
    will ultimately generate the HTML markup that is sent to the browser in response
    to a request. With help of EL, it can reference a bean property and invoke a bean
    action.


    Right-click the webapp folder of the project and choose *New ➤ XHTML Page* (see
    Figure [2-18](#A454457_1_En_2_Chapter.xhtml#Fig18)). The *New XHTML Page* wizard
    which appears now is also part of the JBoss Tools plug-in. In this wizard, set
    the *File name* to hello.xhtml and finish the wizard.


    ![A454457_1_En_2_Fig18_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig18_HTML.jpg)


    ###### Figure 2-18 The JBoss Tools-provided New XHTML Page wizard in Eclipse


    The XHTML editor will now open with the newly created Facelets file. You’ll also
    notice that the *Palette* view shows up in bottom box . This is essentially not
    useful for JSF-based web development. So let’s close it. Coming back to the newly
    created Facelets file, it’s initially empty. Fill it with the following content:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>Hello World</title>

        </h:head>

        <h:body>

            <h1>Hello World</h1>

            <h:form>

                <h:outputLabel for="input" value="Input" />

                <h:inputText id="input" value="#{helloWorld.input}" />

                <h:commandButton value="Submit"

                    action="#{helloWorld.submit}">

                    <f:ajax execute="@form" render=":output" />

                </h:commandButton>

            </h:form>

            <h:outputText id="output" value="#{helloWorld.output}" />

        </h:body>

    </html>

    ```


    We''ll briefly go through the JSF-specific XHTML tags that are used here.


    *   **<h:head>**—generates the HTML <head>. It gives JSF the opportunity to automatically
    include any necessary JavaScript files, such as the one containing the necessary
    logic for <f:ajax>.


    *   **<h:body>**—generates the HTML <body>. You can also use a plain HTML <body>
    in this specific Facelet, but then it doesn’t give any other JSF tag the opportunity
    to automatically include any necessary JavaScript in the end of the HTML <body>.


    *   **<h:form>**—generates the HTML <form>. JSF will automatically include the
    view state in a hidden input field.


    *   **<h:outputLabel>**—generates the HTML <label>. You can also use a plain HTML
    <label> in this specific Facelet, but then you’d have to manually take care of
    figuring out the actual ID of the target input element.


    *   **<h:inputText>**—generates the HTML <input type="text">. JSF will automatically
    get and set the value in the bean property specified in the value attribute.


    *   **<h:commandButton>**—generates the HTML <input type="submit">. JSF will automatically
    invoke the bean method specified in the action attribute.


    *   **<f:ajax>**—generates the necessary JavaScript code for Ajax behavior. You
    can also do as well without it, but then the form submit won’t be performed asynchronously.
    The execute attribute indicates that the entire <h:form> must be processed on
    submit and the render attribute indicates that the tag identified by id="output"
    must be updated on complete of the Ajax submit.


    *   **<h:outputText>**—generates the HTML <span>. This is the one being updated
    on completion of the Ajax submit. It will merely print the bean property specified
    in the value attribute.


    Those JSF-specific XHTML tags are also called *JSF Components*. There will be
    more on Facelets files and JSF components in the upcoming chapters. Note that
    you can also perfectly embed plain vanilla HTML in a Facelets file. JSF components
    should only be used when the functionality requires so, or is easily achievable
    with them.


    ### Deploying the Project


    In the *Servers* view, first start the Payara server. You can do so by selecting
    it and then clicking the green arrow icon whose tool tip says “Start the server.”
    You can, of course, also use the bug icon whose tool tip says “Start the server
    in debug mode.” The *Console* view will briefly show the server startup log. Wait
    until the server starts up and has, in the *Servers* view, gained the status *Started*
    (see Figure [2-19](#A454457_1_En_2_Chapter.xhtml#Fig19)).


    ![A454457_1_En_2_Fig19_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig19_HTML.jpg)


    ###### Figure 2-19 The Payara server in Servers view with the status Started (note
    that the Console view is highlighted as it has unread server logs)


    Now right-click the Payara server entry and choose *Add and Remove*. It will show
    the *Add and Remove* wizard (see Figure [2-20](#A454457_1_En_2_Chapter.xhtml#Fig20))
    which gives you the opportunity to add and remove WAR projects to the server.
    Do so for our newly created project and finish the wizard.


    ![A454457_1_En_2_Fig20_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig20_HTML.jpg)


    ###### Figure 2-20 The Add and Remove wizard wherein the project has been deployed
    to the server by moving it to the right


    It must be explicitly mentioned that in case of Payara and GlassFish servers this
    is best to be done while the server is already started. When removing a project
    while the server is shut down, it may still linger around in the server’s deployment
    folder. That’s just GlassFish’s own quirk. For example, in the case of WildFly
    and Tomcat servers, this is not necessary.


    Now, open a tab in your favorite web browser (see Figure [2-21](#A454457_1_En_2_Chapter.xhtml#Fig21))
    and enter the address http://localhost:8080/project/hello.xhtml in order to open
    the newly created JSF page.


