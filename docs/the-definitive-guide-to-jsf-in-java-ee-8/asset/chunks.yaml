- fmt: "That’s already something better, but still boilerplate-ish. If necessary,\
    \ you can also programmatically add Ajax render IDs from a backing bean on. You\
    \ can use the `PartialViewContext#getRenderIds()` [⁶](#A454457_1_En_12_Chapter.xhtml#Fn6)\
    \ for this. The returned collection is, namely, mutable and only consulted during\
    \ the render response phase (sixth phase). You also need to specify an absolute\
    \ hierarchical ID here, but with only one important difference: it cannot start\
    \ with the naming container separator character. In other words, `:form:table:0:column2`\
    \ isn’t going to work; you need to specify `form:table:0:column2` instead. It’s\
    \ always resolved relative to `UIViewRoot`.\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
    PartialViewContext ajaxContext = context.getPartialViewContext();\najaxContext.getRenderIds().add(\"\
    form:table:0:column2\");\n```\n\nAs a tip, in case you’re having a hard time figuring\
    \ out the absolute hierarchical ID and/or memorizing which components exactly\
    \ are naming containers, then you can always look in the generated HTML output.\
    \ Open the JSF page in your favorite web browser, do a *View Page Source*, locate\
    \ the HTML element representation of the JSF component of interest, take the value\
    \ of its ID attribute, and finally prefix it with the naming container separator\
    \ character.\n\nAlso, in case you encounter an autogenerated ID prefixed with\
    \ `j_id`, then you absolutely need to give the associated JSF component a fixed\
    \ ID; otherwise its value would be off when the component’s position in the component\
    \ tree is subject to be changed because of, for example, a conditionally included\
    \ component somewhere before the position of the component of interest. (See also\
    \ the section “Text-Based Input Components” in Chapter [4](#A454457_1_En_4_Chapter.xhtml).)\n\
    \nLike relative local IDs, absolute hierarchical IDs can be programmatically resolved\
    \ using the algorithm as described in the `UIComponent#findComponent()` API.[⁷](#A454457_1_En_12_Chapter.xhtml#Fn7)\
    \ The following example demonstrates how to get hold of the `UIData` component\
    \ representing `<h:form id=\"form\"><h:dataTable id=\"table\">`.\n\n```\nUIViewRoot\
    \ root = FacesContext.getCurrentInstance().getViewRoot();\nUIData table = (UIData)\
    \ root.findComponent(\"form:table\");\n```\n\n## Standard Search Keywords\n\n\
    JSF provides a set of more abstract search expressions, known as “search keywords.”\
    \ They all start with the `@` character. They can be used to substitute a fixed\
    \ component ID in the search expression. Table [12-1](#A454457_1_En_12_Chapter.xhtml#Tab1)\
    \ provides an overview of them.\n\n###### Table 12-1 Standard Search Keywords\
    \ Provided by JSF\n\n| Keyword | Resolves to | Since |\n| --- | --- | --- |\n\
    | `@this` | `UIComponent#getCurrentComponent()` | 2.0 |\n| `@form` | `UIComponent#getNamingContainer()`\
    \ until an `UIForm` is encountered | 2.0 |\n| `@all` | Everything | 2.0 |\n| `@none`\
    \ | Nothing | 2.0 |\n| `@parent` | `UIComponent#getParent()` | 2.3 |\n| `@child(index)`\
    \ | `UIComponent#getChildren()` at given index | 2.3 |\n| `@next` | `UIComponent#getParent()`\
    \ and then `UIComponent#getChildren()` at next index | 2.3 |\n| `@previous` |\
    \ `UIComponent#getParent()` and then `UIComponent#getChildren()` at previous index\
    \ | 2.3 |\n| `@namingcontainer` | `UIComponent#getNamingContainer()` | 2.3 |\n\
    | `@composite` | `UIComponent#getCompositeComponentParent()` | 2.3 |\n| `@id(id)`\
    \ | `UIComponent#findComponent()` with given ID | 2.3 |\n| `@root` | `FacesContext#getViewRoot()`\
    \ | 2.3 |\n\nIn a standard JSF component set, all search keywords, including custom\
    \ ones, can be used in the following component attributes:\n\n*   `<f:ajax execute>`—Specifies\
    \ components which must be processed during the apply request values, process\
    \ validations, update model values, and invoke application phases (second, third,\
    \ fourth, and fifth phases) of the Ajax postback request. Defaults to `@this`.\n\
    \n*   `<f:ajax render>`—Specifies components which must be processed during the\
    \ render response phase (sixth phase) of the Ajax postback request. Defaults to\
    \ `@none`.\n\n*   `<h:outputLabel for>`—Specifies the target component of the\
    \ generated HTML `<label>` element. Defaults to `@none`.\n\n*   `<h:message for>`—Specifies\
    \ the target component for which the first faces message must be rendered. Defaults\
    \ to `@none`.\n\n*   `<h:messages for>`—Specifies the target component for which\
    \ all faces messages must be rendered. Defaults to `@none`.\n\nNote that using\
    \ search keywords is, for the `for` attribute of `<h:outputLabel>`, `<h:message>`,\
    \ and `<h:messages>`, has only been possible since JSF 2.3. In older versions,\
    \ only relative and absolute IDs were supported.\n\nThe most commonly used search\
    \ keyword is undoubtedly `@form`. You have basically no other choice when using\
    \ `<f:ajax>` in a `UICommand` component which is supposed to process the entire\
    \ form.\n\n```\n<h:form>              \n    ...\n    <h:commandButton value=\"\
    Submit\" ...>\n        <f:ajax execute=\"@form\" />\n    </h:commandButton>\n\
    </h:form> \n```\n\nAlso new since JSF 2.3 is that search keywords can be chained\
    \ with regular component IDs. Following is an example which expands on the example\
    \ given before in the section “Absolute Hierarchical IDs.”\n\n```\n<h:form>\n\
        <h:outputLabel id=\"l_time\" for=\"time:hour\" value=\"Time\" />\n    <t:inputLocalTime\
    \ id=\"time\" value=\"#{schedule.time}\" required=\"true\">\n        <f:ajax render=\"\
    @form:m_time\" />\n    <h:message id=\"m_time\" for=\"time\" />\n</h:form>\n```\n\
    \nAnd following is an example that updates the entire table when a row is deleted.\n\
    \n```\n<h:form>\n    <h:dataTable value=\"#{products.list}\" var=\"product\">\n\
            ...\n        <h:column>\n            <h:commandButton id=\"delete\" value=\"\
    Delete\"\n                action=\"#{products.delete(product)}\">\n                <f:ajax\
    \ render=\"@namingcontainer\" />\n            </h:commandButton>\n        </h:column>\n\
        </h:dataTable>\n</h:form>\n```\n\nNote particularly that it thus references\
    \ the closest component implementing the `NamingContainer` interface, which, in\
    \ this context, is `<h:dataTable>` and thus not `<h:form>`.\n\nAs to programmatic\
    \ resolution, search expressions with keywords cannot be programmatically resolved\
    \ using `UIComponent#findComponent()`. For that, you need `SearchExpressionHandler#resolveComponent()`\
    \ or `resolveComponents()` [⁸](#A454457_1_En_12_Chapter.xhtml#Fn8) instead. `SearchExpressionHandler`\
    \ is in turn available by `Application#getSearchExpressionHandler()`. You also\
    \ need to create `SearchExpressionContext` [⁹](#A454457_1_En_12_Chapter.xhtml#Fn9)\
    \ beforehand which wraps the component to start searching from.\n\n```\nFacesContext\
    \ context = FacesContext.getCurrentInstance();\nUIComponent base = context.getViewRoot();\
    \ // Can be any component.\nString expression = \"@namingcontainer\";\n\nSearchExpressionContext\
    \ searchContext = SearchExpressionContext\n    .createSearchExpressionContext(context,\
    \ base);\nSearchExpressionHandler searchHandler = context.getApplication()\n    .getSearchExpressionHandler();\n\
    handler.resolveComponent(searchContext, expression, (ctx, found) -> {\n    System.out.println(found);\n\
    });\n```\n\nFrankly, it’s quite verbose, but it’s JSF API’s own. Fortunately,\
    \ utility libraries such as OmniFaces exist."
