    CSS 资源中的第一个 EL 表达式似乎不起作用，最好重启 Web 应用程序。CSS 资源中的 EL 解析功能实际上非常有用。如果 SCSS（Sassy CSS）对你来说过于复杂，那么你可以使用
    EL 来参数化一些重复的 CSS 属性，例如颜色。


    ```

    .color-gray {

