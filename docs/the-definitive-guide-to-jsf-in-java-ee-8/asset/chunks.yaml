    ## 自定义 Principal


    我们可以从安全上下文中获取的默认 principal 除了名称，或者更准确地说，调用方 principal 名称（也称为用户 principal 名称）之外，包含的信息非常少。这通常是一个唯一名称，并且通常是（但不一定是）调用方用于身份验证的名称。


    在实践中，Web 应用程序几乎总是需要比这个名称更多的信息，并且通常需要一个更丰富的、特定于应用程序的模型对象来表示用户。此模型对象的生命周期需要与 principal
    的生命周期紧密耦合。例如，如果调用方在请求中途登出，关联的模型对象必须立即消失；如果调用方紧接着（可能仍在同一个请求中）再次登录，则必须有一个新的模型对象可用。


