    © Bauke Scholtz, Arjan Tijms 2018


    Bauke Scholtz and Arjan Tijms, The Definitive Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_4](#A454457_1_En_4_Chapter.xhtml)


    # 4. Form Components


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    These are the most important components of the standard JSF (JavaServer Faces)
    component set. Without them, JSF wouldn’t have been very useful in the first place.
    When using plain HTML elements instead of JSF components, you’d end up polluting
    the controller with code to manually apply, convert, and validate submitted values;
    to update the model with those values; and to figure out the action method to
    be invoked. That’s exactly the hard work JSF should take off your hands as being
    a component-based MVC (Model-View-Controller) framework for HTML form-based web
    applications.


    ## Input, Select, and Command Components


    All input components extend from the UIInput superclass. All selection components
    extend from a subclass thereof, which can be UISelectBoolean, UISelectOne, or
    UISelectMany. (See Chapter [3](#A454457_1_En_3_Chapter.xhtml), Table [3-1](#A454457_1_En_3_Chapter.xhtml#Tab1),
    for a comprehensive list of standard JSF components.) All input and select components
    implement the EditableValueHolder interface which allows attaching a Converter,
    Validator, and ValueChangeListener. All command components extend from the UICommand
    superclass and implement the ActionSource interface which allows defining one
    or more managed bean methods which should be invoked during the invoke application
    phase (fifth phase). They can have only one “action” method and multiple “action
    listener” methods.


    HTML requires all input, select, and command elements to be nested in a form element.
    The standard JSF component set offers only one such component, the <h:form>, which
    is from the UIForm superclass. You could also use a plain HTML <form> element,
    but that wouldn’t automatically include the mandatory javax.faces.ViewState hidden
    input field in the form which represents the JSF view state. The renderer of the
    <h:form> is the one responsible for automatically including it in every generated
    HTML representation of the JSF form. Without it, JSF won’t recognize the request
    as a valid postback request. In other words, the FacesContext.getCurrentInstance().isPostback()
    would return false and then JSF wouldn’t even process the submitted values, let
    alone invoke the action method. A plain HTML <form> element in a JSF page is only
    useful for GET requests in combination with <f:viewParam> tags which should take
    care of processing the submitted input values. This will be detailed later in
    the section “GET Forms.”


    All command components have an action attribute which can be bound to a managed
    bean method. This method will be invoked during the invoke application phase (fifth
    phase), as long as there’s no conversion or validation error. Conversion and validation
    are covered in Chapter [5](#A454457_1_En_5_Chapter.xhtml), so we’ll skip detailing
    this step here.'
