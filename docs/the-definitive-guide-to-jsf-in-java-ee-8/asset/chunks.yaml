    \ header with the request parameter name, a `Content Type` header with the content\
    \ type of the value, and two newlines. It is very inefficient compared to the\
    \ default encoding wherein the URL-encoded request parameter name/value pairs\
    \ are just concatenated by the `&` character, but it’s actually the only reliable\
    \ way to be able to embed files in a HTTP POST request without inducing ambiguity,\
    \ particularly when uploading text files whose content coincidentally resembles\
