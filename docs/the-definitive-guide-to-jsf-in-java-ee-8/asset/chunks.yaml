    \ and a method `submit()`, and submit the above shown login page without filling\
    \ out the e-mail input field, then you’ll face a validation error in the following\
    \ format:\n\n```\nlogin:email: Validation Error: Value is required.\n```\n\nWhen\
    \ you switch the language to Portuguese and resubmit the empty form, then you’ll\
    \ see that it’s also localized. However, when you switch the language further\
    \ to Hindi, then you’ll notice that there’s no standard Hindi message bundle in\
    \ the standard JSF implementation. You’d need to provide your own. There are several\
    \ ways to achieve this.\n\nFirst, JSF input and select components support three\
    \ attributes to override the default message : `requiredMessage`, `validatorMessage`,\
    \ and `converterMessage`. The following example shows how to override the default\
    \ required message:\n\n```\n<h:inputText ... requiredMessage=\"#{text['message.required']}\"\
    \ />\n```\n\nThis is arguably the easiest approach. The major caveat is that you\
    \ have to copy/paste it everywhere in case you haven’t wrapped it in a reusable\
    \ tag file like `<my:inputText>`. This is not DRY.[⁶](#A454457_1_En_14_Chapter.xhtml#Fn6)\n\
    \nAnother way is to supply a custom message bundle which overrides all predefined\
    \ bundle keys specific for JSF conversion/validation messages and register it\
    \ as `<message-bundle>` in `faces-config.xml`. You can find the predefined bundle\
    \ keys in chapter 2.5.2.4 “Localized Application Messages” of the JSF specification.[⁷](#A454457_1_En_14_Chapter.xhtml#Fn7)\
    \ The bundle key of the default required message “Validation Error: Value is Required”\
    \ is thus `javax.faces.component.UIInput.REQUIRED`. We can adjust it in new message\
    \ bundle files as follows:\n\n```\nmain/java/resources/com/example/project/i18n/messages.properties\n\
    javax.faces.component.UIInput.REQUIRED = {0} is required.\nmain/java/resources/com/example/project/i18n/messages_pt_BR.properties\n\
    javax.faces.component.UIInput.REQUIRED = {0} é obrigatório.\nmain/java/resources/com/example/project/i18n/messages_hi.properties\n\
    ```\n\n![A454457_1_En_14_Figc_HTML.gif](OEBPS/Images/A454457_1_En_14_Figc_HTML.gif)\n\
    \nFinally, configure it in the `<application>` element of the `faces-config.xml`\
    \ file:\n\n```\n<application>\n    ...\n    <message-bundle>com.example.project.i18n.messages</message-bundle>\n\
    </application>\n```\n\nYou’ll perhaps have noticed the `{0}` placeholders in the\
    \ messages. They represent the labels of the associated input and select components.\
    \ The labels default to the component’s client ID, which is basically the ID of\
    \ the JSF-generated HTML element as you can find in the browser’s page source.\
    \ You can override it by explicitly setting the `label` attribute of the component.\n\
    \n```\n<h:inputText id=\"email\" ... label=\"#{text['label.email']}\" />\n<h:inputSecret\
    \ id=\"password\" ... label=\"#{text['label.password']}\" />\n```\n\nNote that\
    \ putting the message bundle in a different file than the resource bundle is not\
    \ strictly necessary. You can also just put the message bundle entries in `text.properties`\
    \ files and adjust the `<message-bundle>` entry to point to the same FQN as `<resource-bundle>`.\n\
    \n## Obtaining Localized Message in a Custom Converter/Validator\n\nThe value\
