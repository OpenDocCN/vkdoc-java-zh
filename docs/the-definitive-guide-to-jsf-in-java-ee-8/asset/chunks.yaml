  trans: "\n实际上，这也实现了 `javax.faces.event.ComponentSystemEventListener`。对于标签处理器来说，这并不是严格必需的；在这个特定示例中只是为了代码方便而这样做。重写的\
    \ `apply()` 方法用于 `TagHandler`，而重写的 `processEvent()` 方法用于 `ComponentSystemEventListener`。在\
    \ `apply()` 方法中，我们有机会在父组件被添加到组件树之前，以编程方式对其进行操作。\n\n我们可以通过调用 `UIComponent#subscribeToEvent()`\
    \ 来以编程方式实现与 `<f:event>` 相同的行为，传入感兴趣的组件系统事件类型和监听器实例。感兴趣的监听器实例恰好就是当前的标签处理器实例。当应用程序发布了感兴趣的组件系统事件时，监听器实例的\
    \ `processEvent()` 方法将被调用。\n\n我们在 `processEvent()` 中做的第一件事是取消订阅该监听器实例。这是有意为之，因为组件系统事件监听器被认为是有状态的，因此本质上会被保存在\
    \ JSF 视图状态中。观察这一点的一个简单方法是，重新配置 JSF，通过在 `web.xml` 中显式地将 `javax.faces.STATE_SAVING_METHOD`\
    \ 上下文参数设置为 `client`，将视图状态保存在客户端，然后检查任何 JSF 表单生成的 HTML 输出中 `javax.faces.ViewState`\
    \ 隐藏输入字段的大小。每次你添加 `<f:event>`，或者在 `ComponentSystemEventListener` 完成其工作后没有取消订阅它，JSF\
    \ 视图状态的大小都会随着监听器实例的序列化形式而增长。在这个监听器只应在非回发期间运行的特定用例中，这是不必要的；因此需要显式取消订阅。\n\n现在，为了让它运行起来，在\
    \ `/WEB-INF/example.taglib.xml` 中按如下方式注册它：\n\n```\n<tag>\n    <tag-name>viewParamValidationFailed</tag-name>\n\
        <handler-class>\n        com.example.project.taghandler.ViewParamValidationFailed\n\
        </handler-class>                                                    \n</tag>\n\
    ```\n\n## 打包成可分发的 JAR\n\n如果你开发了一堆可复用的组件、渲染器、标签处理器、标签文件、复合组件等等，并且希望将它们打包成一个 JAR\
    \ 文件，以便包含在 Web 应用程序的 `/WEB-INF/lib` 目录中，那么你需要创建一个所谓的 Web 片段项目。基本上，所有面向 JSF 的组件和实用库，如\
    \ OmniFaces、PrimeFaces、OptimusFaces、BootsFaces、ButterFaces 和 DeltaSpike，都是这样构建的。从\
    \ Maven 的角度来看，它只是一个 JAR 项目。关键是将通常放在 Maven WAR 项目的 `src/main/webapp` 文件夹中的文件，放到\
    \ Maven JAR 项目的 `src/main/resources/META-INF/resources/[libraryName]` 文件夹中。有一个主要的例外：所有通常放在\
    \ `src/main/webapp/WEB-INF` 中的部署描述符文件，例如 `web.xml`、`faces-config.xml`、`*.taglib.xml`\
    \ 和 `beans.xml`，都直接放在 `src/main/resources/META-INF` 文件夹中。另一个例外是，`web.xml` 文件需要被\
    \ `web-fragment.xml` 替代。\n\nresources 文件夹中的 `[libraryName]` 子文件夹代表“库名称”，它通常是项目名称的\
    \ URL 友好形式。例如，“omnifaces”、“primefaces”、“optimusfaces”、“bsf”、“butterfaces”等。这个库名称正好可以在资源组件（如\
    \ `<h:outputScript>`、`<h:outputStylesheet>` 和 `<h:graphicImage>`）的 `library` 属性中使用。下面是在\
    \ Eclipse 中，这样一个 Maven JAR 项目按照“Web 片段”规则组织后的样子。请特别注意 `src/main/resources` 文件夹的结构。当然，任何\
    \ Java 类都可以像往常一样放在 `src/main/java` 文件夹中。\n\n![A454457_1_En_11_Figa_HTML.jpg](img/A454457_1_En_11_Figa_HTML.jpg)\n\
    \n其中，`common.taglib.xml` 看起来如下所示，复合库名称设置为相对于 `src/main/resources/META-INF/resources`\
    \ 的路径，标签文件源设置为相对于 `*.taglib.xml` 文件本身位置的路径。\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\n\
        xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/common</namespace>\n\
        <short-name>common</short-name>\n    <composite-library-name>common/components</composite-library-name>\n\
    \n<tag>\n        <tag-name>someTag</tag-name>\n        <source>resources/common/tags/someTag.xhtml</source>\n\
        </tag>\n</facelet-taglib>\n```\n\n并且，`web-fragment.xml` 看起来如下所示，与 `web.xml`\
    \ 几乎相同，只是根元素不同，使用 `<web-fragment>` 而不是 `<web-app>`。\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<web-fragment\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-fragment_4_0.xsd\"\
    \n    version=\"4.0\"\n>\n    <name>common</name>\n</web-fragment>\n```\n\n一旦这样的\
    \ Web 片段项目被构建为 JAR 文件并包含在主 Web 应用程序项目的 `/WEB-INF/lib` 中，那么该 JAR 中的资源就可以通过库名称“common”在主\
    \ Web 应用程序项目的 Facelets 文件中使用，如下所示：\n\n```\n<ui:composition template=\"/common/templates/some.xhtml\"\
    \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:common=\"http://example.com/common\"\
    \n>\n    <ui:define name=\"content\">\n        <common:someComposite />\n        <h:graphicImage\
    \ library=\"common\" name=\"js/some.svg\" />\n        <ui:include src=\"/common/includes/some.xhtml\"\
    \ />\n        <h:outputScript library=\"common\" name=\"scripts/some.js\" />\n\
            <h:outputStylesheet library=\"common\" name=\"styles/some.css\" />\n        <common:someTag\
    \ />\n    </ui:define>                                                    \n</ui:composition>\n\
    ```\n\n## 资源依赖\n\n在某些情况下，你的自定义组件或渲染器可能依赖于特定的 JavaScript 或样式表资源，而你希望避免最终用户通过 `<h:outputScript>`\
    \ 或 `<h:outputStylesheet>` 手动包含它。在这种情况下，你可能会发现 `@javax.faces.application.ResourceDependency`\
    \ 注解¹² 很有用。假设你想自动将 `common:scripts/some.js` 和 `common:styles/some.css` 与某个特定的自定义组件一起包含进来；那么你可以这样做：\n\
    \n```\n@ResourceDependency(library=\"common\", name=\"some.css\", target=\"head\"\
    )\n@ResourceDependency(library=\"common\", name=\"some.js\", target=\"head\")\n\
    public class SomeCustomComponent extends UIComponent {\n    // ...\n}\n```\n\n\
    当然，你也可以在必要时包含 JSF 自己的 `javax.faces:jsf.js`，例如，当你的自定义组件恰好依赖于 `jsf.ajax.request()`\
    \ 或标准 JSF JavaScript API 提供的其他函数时。`javax.faces:jsf.js` 可以按如下方式包含，脚本库和名称作为 `ResourceHandler`\
    \ 的常量可用。\n\n```\n@ResourceDependency(\n    library=ResourceHandler.JSF_SCRIPT_LIBRARY_NAME,\n\
        name=ResourceHandler.JSF_SCRIPT_RESOURCE_NAME,\n    target=\"head\")\npublic\
    \ class SomeCustomComponent extends UIComponent {\n    // ...\n}\n```\n"
