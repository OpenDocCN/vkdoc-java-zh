    All text-based input components have a value attribute which can be bound to a
    managed bean property. The getter of this property will, during the view render
    time, be consulted to retrieve and display any preset value. And, the setter of
    this property will, during the update model values phase (fourth phase) of the
    postback request, be invoked with the submitted and already converted and validated
    value, if applicable. Following is a basic usage example which demonstrates all
    text-based input components .


    Facelets file /test.xhtml:


    ```

    <h:form>

        <h:inputText value="#{bean.text}" />

        <h:inputSecret value="#{bean.password}" />

        <h:inputTextarea value="#{bean.message}" />

        <h:inputHidden value="#{bean.hidden}" />

        <h:commandButton value="Submit" action="#{bean.submit}" />

    </h:form>

    ```


    Backing bean class com.example.project.view.Bean:


    ```

    @Named @RequestScoped

    public class Bean {


    private String text;

        private String password;

        private String message;

        private String hidden;


    public void submit() {

            System.out.println("Form has been submitted!");

            System.out.println("text: " + text);

            System.out.println("password: " + password);

            System.out.println("message: " + message);

            System.out.println("hidden: " + hidden);

        }


    // Add/generate getters and setters for every property here.

    }

    ```


    Generated HTML output:


    ```

    <form id="j_idt4" name="j_idt4" method="post"

        action="/project/test.xhtml"

        enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="j_idt4" value="j_idt4" />

        <input type="text" name="j_idt4:j_idt5" />

        <input type="password" name="j_idt4:j_idt6" />

        <textarea name="j_idt4:j_idt7"></textarea>

        <input type="hidden" name="j_idt4:j_idt8" />

        <input type="submit" name="j_idt4:j_idt9" value="Submit" />

        <input type="hidden" name="javax.faces.ViewState"

            id="j_id1:javax.faces.ViewState:0"

            value="-4091383829147627416:3884402765892734278"

            autocomplete="off" />

    </form>

    ```


    Rendering in Chrome browser (with newlines added):


    ![A454457_1_En_4_Figa_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figa_HTML.jpg)


    You’ll notice several things in the generated HTML output. Undoubtedly the first
    thing noticeable is that JSF has also automatically generated id and name attributes
    of the HTML elements, all with a j_id prefix which is defined by the public API
    (application programming interface) constant UIViewRoot.UNIQUE_ID_PREFIX. The
    “t” basically stands for “tree” and the number basically represents the position
    of the component in the component tree . This is thus prone to be changed whenever
    you add, remove, or move around components in the Facelets file. This is thus
    also subject to headaches when QA (quality assurance) needs to write integration
    tests for the web application wherein more than often the HTML element IDs need
    to be used.


    JSF will use an autogenerated ID when it’s mandatory for the functionality in
    order to have an id and/or a name attribute in the generated HTML output. The
    id attribute is mandatory in order to be able to find the HTML element by any
    JavaScript code which can also be autogenerated by JSF, such as functions responsible
    for the Ajax works. As this makes the generated HTML code rather hard to read
    and, frankly, ugly, we’d like to just explicitly specify the id attribute of any
    JSF form, input, select, and command component. This way JSF will just use it
    for the id and name attributes of the HTML elements instead of autogenerating
    one. Now, let’s rewrite the Facelets file /test.xhtml for that. A good practice
    is to let the ID attribute of the input component match exactly the bean property
    name, and the ID attribute of the command component match exactly the bean method
    name. This would end up in more self-documenting code and generated HTML output.


    ```

    <h:form id="form">

        <h:inputText id="text" value="#{bean.text}" />

        <h:inputSecret id="password" value="#{bean.password}" />

        <h:inputTextarea id="message" value="#{bean.message}" />

        <h:inputHidden id="hidden" value="#{bean.hidden}" />

        <h:commandButton id="submit" value="Submit"

            action="#{bean.submit}" />

    </h:form>

    ```


    Now, the generated HTML output looks as follows:


    ```

    <form id="form" name="form" method="post" action="/project/test.xhtml"

        enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="form" value="form" />

        <input id="form:text" type="text" name="form:text" />

        <input id="form:password" type="password" name="form:password" />

        <textarea id="form:message" name="form:message"></textarea>

        <input id="form:hidden" type="hidden" name="form:hidden" />

        <input id="form:submit" type="submit" name="form:submit"

            value="Submit" />

        <input type="hidden" name="javax.faces.ViewState"

            id="j_id1:javax.faces.ViewState:0"

            value="-7192066430460949081:-3987350607752016894"

            autocomplete="off" />

    </form>

    ```


    That’s already clearer. Note that when you explicitly set a component ID , it
    will always end up in the generated HTML output. The generated HTML element ID,
    then, represents the “client ID” which may be different from the component ID,
    depending on its parents. If the component has any parent which is an instance
    of NamingContainer interface, then the ID of the NamingContainer parent will be
    prepended to the client ID of the component. From the standard JSF HTML component
    set, only the <h:form> and <h:dataTable> are instances of NamingContainer. Others
    are <ui:repeat> and <f:subview>.


    If you look closer at the generated HTML output, there’s only one generated ID
    left. It’s the one of the view state hidden input field, which is always j_id1\.
    It represents the ID of the UIViewRoot instance, which by default cannot be set
    from a Facelets file on. When using JSF in Portlet-based web applications instead
    of Servlet-based web applications, it is overridable and would represent the unique
    name of the Portlet. In a Portlet-based web application it is possible to have
    multiple Portlet views in a single JSF page. In other words, a single JSF page
    in a Portlet-based web application can have multiple UIViewRoot instances.


    Coming back to the generated HTML output, the name attribute of the HTML input
    element is mandatory for HTML in order to be able to send the submitted values
    as request parameters via HTTP. It will become the request parameter name. In
    any decent web browser you can inspect the request parameters in the “Network”
    section of the web developer’s toolset, which is accessible by pressing F12 in
    the web browser. Figure [4-1](#A454457_1_En_4_Chapter.xhtml#Fig1) shows how Chrome
    presents the postback request after submitting the form with some values filled
    out, as you can see in the “Form Data” section of the figure.


    ![A454457_1_En_4_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_4_Fig1_HTML.jpg)'
