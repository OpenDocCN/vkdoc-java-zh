    @form\" />\n        </h:commandButton>\n    </ui:fragment>\n    <ui:fragment rendered=\"\
    #{not empty payment.url}\">\n        <iframe src=\"#{payment.url}\"></iframe>\n\
        </ui:fragment>\n</h:form>\n```\n\nhere’s what the associated conversation-scoped\
    \ bean behind #{payment} looks like:\n\n```\n@Named @ConversationScoped\npublic\
    \ class Payment implements Serializable {\n\nprivate Order order;\n    private\
    \ String url;\n\n@Inject\n    private Cart cart;\n\n@Inject\n    private OrderService\
    \ orderService;\n\n@Inject\n    private Conversation conversation;\n\npublic void\
    \ checkout() {\n        conversation.begin();\n        order = orderService.lockProductsAndPrepareOrder(cart);\n\
            url = \"http://third.party.com/pay?returnurl=\"\n            + URLEncoder.encode(\"\
    http://my.site.com/paid?cid=\"\n            + conversation.getId(), \"UTF-8\"\
    );\n    }\n\npublic void confirm() {                                         \
    \                                             \n        orderService.saveOrderAndCreateInvoice(order);\n\
            conversation.end();\n    }\n\n@PreDestroy\n    public void destroy() {\n\
            orderService.unlockProductsIfNecessary(order);\n    }\n\npublic String\
    \ getUrl() {\n        return url;\n    }\n}\n```\n\nBasically, the checkout button\
    \ is only rendered when there’s no payment URL set. Once the button is pressed,\
    \ all products of the shopping cart are locked and the order is prepared. Also,\
    \ depending on the third-party payment service, the URL referring it must be prepared\
    \ whereby you include the return URL as some query parameter in the URL of the\
    \ payment service. The return URL should in turn include the “cid” request parameter\
    \ representing the conversation ID. In the redirected page which will actually\
    \ be loaded in the <iframe>, you can just mark the conversation complete with\
    \ <f:viewAction>.\n\n```\n<f:metadata>\n    <f:viewAction action=\"#{payment.confirm}\"\
    \ />\n</f:metadata>\n```\n\nOf course, the average third-party payment service\
    \ should have a more elaborate Java or even JavaScript API instead of <iframe>;\
    \ also, it should be possible to provide different return pages for each payment\
    \ outcome such as payment failed and payment aborted. The above example is just\
    \ to give the general idea."
  trans: "\n### @ConversationScoped\n\n处于会话作用域的托管 Bean 的生命周期与注入的 `javax.enterprise.context.Conversation`\
    \ 实例绑定，该实例提供了 `begin()` 和 `end()` 方法，必须由 Web 应用程序代码显式调用，以指示会话作用域的开始和结束。会话作用域由一个预定义的\
    \ HTTP 请求参数表示，其默认名称为“cid”（“会话 ID”），该参数的值代表会话 ID。会话 ID 又引用了当前 HTTP 会话中的一个隔离映射，会话作用域的托管\
    \ Bean 实例将存储在该映射中。\n\n只要会话作用域尚未开始，会话作用域的托管 Bean 的行为就类似于请求作用域的托管 Bean。当应用程序代码显式调用\
    \ `Conversation#begin()` 时，会话作用域将开始，并且由 CDI 实现提供的自定义 `javax.faces.application.ViewHandler`\
    \ 将确保其所有 `getXxxURL()` 方法（例如 `getActionURL()` 和 `getBookmarkableURL()`）返回包含会话\
    \ ID 参数的 URL（统一资源定位符）。以 Weld 为例，该 ViewHandler 是 `ConversationAwareViewHandler`。⁶\
    \ 所有 JSF 的 `UIForm` 和 `UIOutcomeTarget` 组件都从 ViewHandler 的这些方法派生其操作和目标 URL。因此，这些组件生成的\
    \ HTML 输出最终将在目标 URL 中包含会话 ID。\n\n在传入的 HTTP 请求中，当请求中存在会话 ID 参数且该参数仍然有效时，CDI 实现将从\
    \ HTTP 会话中获取关联的会话作用域，并确保所有会话作用域的托管 Bean 都从该由会话 ID 标识的会话作用域中获取。这适用于 GET 和 POST\
    \ 请求。任何表单提交或指向包含会话 ID 的 URL 的链接/导航，只要该会话作用域仍然有效，都将提供对同一个会话作用域的访问。当应用程序代码显式调用 `Conversation#end()`\
    \ 时，会话作用域结束。当最终用户稍后重用“cid”请求参数，或将其值修改为在其自身浏览器会话中未启动的值，或当底层 `HttpSession` 实例被销毁时，CDI\
    \ 将抛出 `javax.enterprise.context.NonexistentConversationException`。\n\n会话作用域的托管\
    \ Bean 特别有用，可以在同一浏览器会话中被重定向到别处后，能够返回到特定的有状态页面。一个经典的例子是第三方 Web 服务，它被包含在 HTML `<iframe>`\
    \ 中，或在新浏览器标签页中打开，甚至作为纯 HTML `<form>` 的 `action` 属性的目标，并且可以通过特定的请求参数配置为在完成服务后重定向回您的\
    \ Web 应用程序。当您在重定向 URL 中包含会话 ID 时，您将能够在重定向后的页面中，恢复使用与重定向之前完全相同的会话作用域托管 Bean 实例。这使您有机会完成并解锁任何待处理的事务，当然，也可以结束会话。\n\
    \n假设有一个如下所示的结账按钮：\n\n```\n<h:form>\n    ...\n    <ui:fragment rendered=\"#{empty\
    \ payment.url}\">\n        ...\n        <h:commandButton value=\"结账\" action=\"\
    #{payment.checkout}\">\n            <f:ajax render=\"@form\" />\n        </h:commandButton>\n\
        </ui:fragment>\n    <ui:fragment rendered=\"#{not empty payment.url}\">\n\
            <iframe src=\"#{payment.url}\"></iframe>\n    </ui:fragment>\n</h:form>\n\
    ```\n\n以下是 `#{payment}` 背后关联的会话作用域 Bean 的样子：\n\n```\n@Named @ConversationScoped\n\
    public class Payment implements Serializable {\n\nprivate Order order;\n    private\
    \ String url;\n\n@Inject\n    private Cart cart;\n\n@Inject\n    private OrderService\
    \ orderService;\n\n@Inject\n    private Conversation conversation;\n\npublic void\
    \ checkout() {\n        conversation.begin();\n        order = orderService.lockProductsAndPrepareOrder(cart);\n\
            url = \"http://third.party.com/pay?returnurl=\"\n            + URLEncoder.encode(\"\
    http://my.site.com/paid?cid=\"\n            + conversation.getId(), \"UTF-8\"\
    );\n    }\n\npublic void confirm() {                                         \
    \                                             \n        orderService.saveOrderAndCreateInvoice(order);\n\
            conversation.end();\n    }\n\n@PreDestroy\n    public void destroy() {\n\
            orderService.unlockProductsIfNecessary(order);\n    }\n\npublic String\
    \ getUrl() {\n        return url;\n    }\n}\n```\n\n基本上，结账按钮仅在未设置支付 URL 时渲染。一旦按下该按钮，购物车中的所有产品都会被锁定，并准备好订单。同时，根据第三方支付服务，需要准备引用该服务的\
    \ URL，其中将返回 URL 作为支付服务 URL 中的某个查询参数包含在内。返回 URL 又应包含代表会话 ID 的“cid”请求参数。在 `<iframe>`\
    \ 中实际加载的重定向页面中，您可以使用 `<f:viewAction>` 标记会话完成。\n\n```\n<f:metadata>\n    <f:viewAction\
    \ action=\"#{payment.confirm}\" />\n</f:metadata>\n```\n\n当然，一般的第三方支付服务应该提供更完善的\
    \ Java 甚至 JavaScript API，而不是 `<iframe>`；此外，应该能够为每种支付结果（例如支付失败和支付中止）提供不同的返回页面。以上示例仅用于说明总体思路。\n"
- fmt: '### `@FlowScoped`


    A flow-scoped managed bean is tied to the lifetime of a JSF flow. It uses the
    same principle as conversation scope, only the conversation is further narrowed
    down to a specific set of JSF views in an isolated subfolder. Once the end user
    clicks a JSF link or button component which navigates to a specific entry page
    of a JSF flow, then the flow scope will automatically start. The flow scope cannot
    be started when you open the entry page without navigating via a JSF component.
    That is, JSF will, with help of the `ViewHandler`, automatically append the predefined
    HTTP request parameter `"jfwid"` (`"javax.faces Window ID"`) to the outcome URL
    whose value represents the JSF client window ID. The JSF client window ID in turn
    references an isolated mapping in the current HTTP session where the flow-scoped
    managed beans are stored.


    Additionally, particularly when using a `UIOutcomeTarget` component instead of
    a `UICommand` component to navigate, the query string may be accompanied with
    `"jffi"` (`javax.faces Flow ID`) and `"jftfdi"` (`javax.faces To Flow Document
    ID`) request parameters. Those are actually only mandatory for starting a JSF
    flow using a GET request. Technically, for the rest of the JSF flow, `"jfwid"`
    is sufficient. As long as the `"jfwid"` parameter is present, and is still valid,
    then the JSF flow is idempotent and can be resumed using a GET request. When you
    open a new browser tab and navigate into the JSF flow, then actually a new flow
    scope will be started, independent of the JSF flow in other tab. Once a postback
    request within the JSF flow navigates to a page outside the JSF flow, then the
    flow scope will automatically end. When the end user reuses the `"jfwid"` request
    parameter later, or manipulates its value to one which isn’t started in its own
    browser session, or enters the flow directly, or when the underlying `HttpSession`
    instance is destroyed, then CDI will throw a `javax.enterprise.context.ContextNotActiveException`.


    The major difference between the flow scope and the conversation scope is thus
    that the pages within a JSF flow cannot be entered directly. They will automatically
    start when the end user navigates to the entry page of the JSF flow and they will
    automatically end when a postback navigates outside the JSF flow. Flow-scoped
    managed beans are useful in order to isolate a conversation to a specific set
    of JSF pages. A classic real-world example is a booking application which is spread
    over multiple forms in physically different pages.


    There are various ways to define a JSF flow. One way is by convention, another
    way is by declarative configuration in the `/[flowId]/[flowId]-flow.xml` file,
    and yet another way is by programmatic configuration using `javax.faces.flow.FlowBuilder`
    API.[⁷](#A454457_1_En_8_Chapter.xhtml#Fn7) In this book we’ll restrict ourselves
    to convention over configuration. First, create the following folder structure:


    ![A454457_1_En_8_Figa_HTML.jpg](OEBPS/Images/A454457_1_En_8_Figa_HTML.jpg)


    The first convention is that the flow entry page must have exactly the same name
    as the subfolder it is sitting in. In this case, that’s `"booking"`. This is considered
    the Flow ID. The second convention is that there must be a `*-flow.xml` file in
    the subfolder whose name is prefixed with the Flow ID, i.e., `booking-flow.xml`.
    This XML configuration file can be kept empty for now. It’s only useful when you
    want to fine-grain the JSF flow configuration, e.g., by specifying a different
    entry page. Without this file, the JSF flow scope won’t be activated. One disadvantage
    of at least one activated JSF flow in the web application, however, is that the
    JSF client Window ID parameter `"jfwid"` will be appended to every single navigation
    URL, even when it doesn’t target a JSF flow. This URL pollution may for some developers
    be the main reason to not use the JSF flow scope at all.


    The navigation component in order to enter a JSF flow must be placed in a JSF
    page outside the flow subfolder. The navigation outcome must reference the subfolder
    name, which is the Flow ID. Here’s an example in `/home.xhtml`.


    ```

    <h:button value="Start booking" outcome="booking" />

    ```


    Of course, this can be substituted with `<h:link>`. It’s recommended to use GET
    just for this so that the booking page’s URL reflects in the browser’s address
    bar. Then, in all pages within the subfolder, you can reference a flow-scoped
    managed bean which will be shared across all these pages. You can navigate back
    and forth between these pages as well while retaining the flow-scoped managed
    bean instance. We recommend that you use Ajax with redirect for this. The Ajax
    submits will improve the user experience. The redirects will make sure that the
    individual pages are still bookmarkable.


    `/booking/booking.xhtml`:


    ```

    <h:form>

        <h:inputText value="#{booking.startDate}" />

        ...

        <h:commandButton value="Next" action="persons?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    `/booking/persons.xhtml`:


    ```

    <h:form>

        <ui:repeat value="#{booking.persons}" var="person">

            <h:inputText value="#{person.name}" />

            ...

        </ui:repeat>

        ...

        <h:commandButton value="Back" action="booking?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

        <h:commandButton value="Next" action="confirm?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    `/booking/confirm.xhtml`:


    ```

    <h:form>

        <h:outputText value="#{booking.startDate}" />

        ...

        <h:commandButton value="Back" action="persons?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

        <h:commandButton value="Next" action="payment?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    `/booking/payment.xhtml`:


    ```

    <h:form>

        <h:selectOneMenu value="#{booking.paymentMethod}">

            ...

        </h:selectOneMenu

        ...

        <h:commandButton value="Back" action="confirm?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

        <h:commandButton value="Submit" actionListener="#{booking.submit()}"

           action="/home?faces-redirect=true">

           <f:ajax execute="@form" render="@form" />

        </h:commandButton>

    </h:form>

    ```


    And, finally, the flow-scoped bean behind `#{booking}`:


    ```

    @Named @FlowScoped("booking")

    public class Booking implements Serializable {


    private LocalDate startDate;

        private List<Person> persons;

        private PaymentMethod paymentMethod;

        // ...


    public void submit() {

            // ...

        }

    }

    ```


    You see, the most of navigation task is done by the `action` attribute of the
    command components. `?faces-redirect=true` is a special request parameter which
    is internally recognized by JSF as an instruction to perform a redirect after
    postback and of course strip off from the target URL before performing the actual
    redirect. Once the postback leaves the flow, the flow-scoped managed bean is destroyed
    and the previously presented page URLs are not reusable anymore.'
