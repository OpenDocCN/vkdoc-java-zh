    ### `<h:dataTable>` 中的动态列


    借助 JSTL 的 `<c:forEach>`，`<h:dataTable>` 也可以基于至少是视图作用域的 Java 模型动态创建多个 `<h:column>`
    实例。请求作用域的模型也可以，但这无法保证在回发请求期间它与前一个请求完全相同，因此存在动态 `<h:column>` 组合出错的风险。


    `<c:forEach>` 的值应引用一个集合，该集合至少包含实体属性名称，甚至可以是映射键。然后，你可以在 EL 中使用花括号表示法，如 `#{entity[propertyName]}`
    或 `#{map[key]}` 来引用实际值。这适用于 `UIOutput` 和 `UIInput` 组件。以下示例说明了如何为 `List<Product>`
    实现这一点。


    支持 bean：


    ```

    @Named @RequestScoped

    public class Products {


        private List<Product> list;

        private List<String> properties;


        @Inject

        private ProductService productService;


        @PostConstruct

        public void init() {

            list = productService.list();

            properties = Arrays.asList("id", "name", "description");

        }


        // 添加/生成 getter 方法（此处不需要 setter）。

    }

    ```


    Facelets 文件：


    ```

    <h:dataTable value="#{products.list}" var="product">

        <c:forEach items="#{products.properties}" var="property">

            <h:column>#{product[property]}</h:column>

        </c:forEach>

    </h:dataTable>

    ```


    你甚至可以进一步将其泛化，用于公共超类（例如 `BaseEntity`）的其他实体，从而从实体服务中获取相关的属性名称。


    ## 资源组件


    JSF 提供了三个资源组件：`<h:graphicImage>`、`<h:outputScript>` 和 `<h:outputStylesheet>`，分别用于图像资源、JavaScript
    资源和 CSS 资源。它们可以引用物理资源文件以及动态资源文件。物理资源文件本身必须放置在 Web 主文件夹的 `/resources` 子文件夹中。动态资源文件可以通过自定义的
    `ResourceHandler` 来处理，该处理器会拦截特定的库名称和/或资源名称。假设在 Eclipse 的 Maven WAR 项目中有以下文件夹结构，


    ![A454457_1_En_6_Fige_HTML.jpg](img/A454457_1_En_6_Fige_HTML.jpg)


    则资源可以按如下方式引用：


    ```

    <h:graphicImage name="images/some.svg" />

    <h:outputScript name="scripts/some.js" />

    <h:outputStylesheet name="styles/some.css" />

    ```


    生成的 HTML 输出如下所示，假设 `/project` 是 Web 应用程序的上下文路径：


    ```

    <img src="/project/javax.faces.resource/images/some.svg.xhtml" />

    <script type="text/javascript"

        src="/project/javax.faces.resource/scripts/some.js.xhtml"></script>

    <link type="text/css" rel="stylesheet"

        href="/project/javax.faces.resource/styles/some.css.xhtml" />

    ```


    你会看到它以前缀 `/javax.faces.resource` 路径开头，并以当前活动的 `FacesServlet` URL 模式结尾。`/javax.faces.resource`
    由常量 `ResourceHandler#RESOURCE_IDENTIFIER` 表示。¹² 资源 URL 与 `FacesServlet` 的 URL
    模式匹配，这确保了它实际上会调用 `FacesServlet`，而 `FacesServlet` 又知道如何处理该资源。它首先会调用 `ResourceHandler#isResourceRequest()`，该方法默认会判断
    URL 前缀是否以已知的 `RESOURCE_IDENTIFIER` 常量开头，如果是，则委托给 `ResourceHandler#handleResourceRequest()`
    处理，而不是经过 JSF 生命周期。


    另请注意，Web 资源并非放置在 `src/main/resources` 文件夹中，而是放置在 `src/main/webapp/resources` 文件夹中。`src/main/resources`
    文件夹仅用于那些最终必须位于类路径中的非类资源，例如资源包文件。这些类路径资源可以通过 `ClassLoader#getResource()` 获取。¹³
    `src/main/webapp/resources` 不会进入类路径；相反，它会进入 Web 内容。这些 Web 资源可以通过 `ExternalContext#getResource()`
    获取，¹⁴ 该方法在底层委托给 `ServletContext#getResource()`。¹⁵


    因此，`name` 属性基本上表示相对于 `src/main/webapp/resources` 文件夹的资源路径。这些组件还支持一个 `library`
    属性。`library` 属性必须表示 JSF 库的唯一资源库名称。对于标准 JSF，资源库名称是“javax.faces”；对于 PrimeFaces，¹⁶
    资源库名称是“primefaces”；对于 OmniFaces，¹⁷ 资源库名称是“omnifaces”；对于 BootsFaces，¹⁸ 资源库名称是“bsf”，等等。通常，这些特定于库的资源已经由相关的
    JSF 库自动包含，通常是通过 `UIComponent` 或 `Renderer` 类上的 `@ResourceDependency` 注解声明式地包含，有时也通过
    `UIViewRoot#addComponentResource()` 以编程方式包含。这将在第 11 章的“资源依赖”部分详细说明。如有必要，可以使用资源组件引用这些资源，此时你需要显式指定
    `library` 属性。


    以下示例显式包含了标准 JSF 的 `jsf.js` 文件：


    ```

    <h:head>

        ...

        <h:outputScript library="javax.faces" name="jsf.js" />

    </h:head>

    ```

