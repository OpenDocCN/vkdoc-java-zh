    请求处理生命周期与基于文本的输入组件相同，除了应用请求值阶段（第二阶段）。不是在 `UIInput#decode()` 方法中将提交的文件作为请求参数提取，而是在与文件输入组件关联的渲染器中将提交的文件作为请求部分提取。默认实现基本上如下所示：


