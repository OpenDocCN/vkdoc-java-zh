    ```

    <h:outputScript>var config = #{configuration.script};</h:outputScript>

    <h:outputScript name="scripts/some.js" />

    ```


    其中 `#{configuration.script}` 只是从你的受管 bean 返回一个 JSON 对象字符串。或者，你可以让 EL 将其作为 HTML
    元素的数据属性输出：


    ```

    <html lang="en" data-baseuri="#{request.contextPath}/">

        ...

    </html>

    ```


    然后在 JS 中按如下方式访问：


    ```

    var baseuri = document.documentElement.dataset.baseuri;

    ```


    或者，如果你是 jQuery 爱好者：


    ```

    var baseuri = $   ("html").data("baseuri");

    ```


    话虽如此，当你在 Java 端创建受管 bean，或在 Facelets 端声明自定义 EL 变量（例如 `<h:dataTable var="foo">`、`<ui:repeat
    var="foo">` 或 `<c:set var="foo">`）时，你必须绝对确保不会显式或隐式地选择一个与前面列出的隐式 EL 对象冲突的受管 bean
    名称或 EL 变量名称，因为隐式 EL 对象在 EL 解析中的优先级高于用户定义的名称。因此，例如，以下构造可能无法按预期工作：


    ```

    <ui:repeat value="#{bean.parameters}" var="param">

        #{param}<br />

    </ui:repeat>

