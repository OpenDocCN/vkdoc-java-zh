  raw: '## Conditionally Rendering Based on Access


    In web applications one often wants to render parts of a view differently based
    on whether a caller is authenticated or not, and if so based on what roles this
    caller is in.


    JSF component tags don’t really need special attributes for this, as the existing
    implicit objects combined with expression language are powerful enough to do most
    of the checks needed for this.


    One of the most common checks is determining whether the user is authenticated.
    This was briefly shown in the index.xhtml view above:


    ```

    <c:if test="#{not empty request.userPrincipal}">

        <p>Logged-in as #{request.userPrincipal}</p>

    </c:if>

    ```


    You can, of course, also use the rendered attribute of any JSF component here.


    ```

    <ui:fragment rendered="#{not empty request.userPrincipal}">

        <p>Logged-in as #{request.userPrincipal}</p>

    </ui:fragment>

    ```


    However, as you learned in the section “JSTL Core Tags” in Chapter [3](#A454457_1_En_3_Chapter.xhtml),
    this will only end up in a slightly more verbose component tree. Moreover, the
    rendered attribute checks will be done throughout the JSF life cycle over and
    over while JSTL tags are executed only once during view build time.


    Note that we’re using the implicit object #{request} here instead of the more
    general SecurityContext*.* This is because in Java EE 8 there’s no implicit EL
    object available corresponding to this SecurityContext. In Java EE Security, as
    well as in the Servlet API (from which the request, which is of type HttpServletRequest
    originates) it’s defined that a null return from getUserPrincipal() means the
    user is not authenticated. A better alignment between Java EE Security and Expression
    Language is planned for a future version of Java EE.


    Another common check as mentioned is to test for the caller being in a specific
    role. Here too we can use the implicit object #{request} , as shown in the following:


    ```

    <c:if test="#{request.isUserInRole(''foo'')}">

        <!-- foo specific things here -->

    </c:if>

    ```


    It’s good to remember that as explained in the beginning of this chapter, the
    role “foo” doesn’t have to be something that we would call a role in our normal
    usage of the word. That its, it doesn’t have to be something like “admin”, or
    “manager”. In fact, for such very local usage as in a fragment on a view it’s
    often preferred to use a finer-grained name (e.g., “CAN_UPDATE_SALARY”). A common
    technique is to map fine-grained roles to more coarse-grained roles, such as,
    indeed, “ADMIN”. Via this technique a user is given these more coarse-grained
    roles, and the data store that stores the authentication data then only contains
    these coarse-grained roles as well. When an identity store such as we saw above
    retrieves this authentication data for a certain caller and sees “ADMIN” it would
    return a collection of roles to which “ADMIN” is mapped (e.g., {"CAN_UPDATE_SALARY",
    "CAN_ADJUST_MARGINS", ...}).


    A special role that we can test for is the “**” role which is an alternative for
    the #{not empty request.userPrincipal} check. This role is implicitly assigned
    to any authenticated caller, but with the caveat that the application has not
    declared this in any way. If it has done so, “**” loses its special meaning and
    is just another opaque string for which the security system explicitly tests.
    Using the “**” check, the first fragment that we showed in this section looks
    as follows:


    ```

    <c:if test="#{request.isUserInRole(''**'')}">

        <p>Logged-in as #{request.userPrincipal}</p>

    </c:if>

    ```


    In the standard Java EE programmatic APIs there are no methods available to test
    whether the caller is in any of two or more roles, or in all of two or more roles.
    If this is required, utility methods such as shown in the following code can be
    used:


    ```

    public static boolean isInAnyRole(HttpServletRequest request, String... roles)
    {

        for (String roles : roles) {

            if (request.isUserInRole(role)) {

                return true;

            }

        }

        return false;

    }

    public static boolean isInAllRoles(HttpServletRequest request, String... roles)
    {

        for (String roles : roles) {

            if (!request.isUserInRole(role)) {

                return false;

            }

        }

        return true;

    }

    ```


    Sometimes it’s necessary not only to render content on a view differently, depending
    on what roles a caller is in, but also to take into account what other views (web
    resources) a caller is allowed to access. This comes into play, for instance,
    when rendering navigation menus (omitting the entries for views a caller does
    not have access to), or rendering links or buttons that navigate to views to which
    the caller does not have access in a special way (e.g., in red or with a lock
    icon next to it).


    A traditional way to implement this is to test for the roles that the programmer
    knows give access to the given view. While this may seem to work well, it’s often
    brittle in practice as it lets the code work under the assumption of a specific
    role/view relationship without any strong guarantees that this relationship actually
    holds.


    A more stable way to test whether a caller has access to a given view is quite
    simply to test directly for exactly that; does the caller have access to this
    view (web resource). The SecurityContext has a method that can be used for almost
    exactly this: SecurityContext#hasAccessToWebResource(). Since the SecurityContext
    is not a named bean or implicit object, we have to create a small helper bean
    in order to use this in EL. This is shown as follows:


    ```

    @Named @ApplicationScoped

    public class Security {


    @Inject

        private SecurityContext securityContext;


    public boolean hasAccessToWebResource(String resource) {

            return securityContext.hasAccessToWebResource(resource, "GET");

        }

    }

    ```


    There are two things to be aware of here.


    First, the hasAccessToWebResource() method takes a web resource pattern, which
    is the same pattern as used for the url-pattern in the web.xml fragment we looked
    at earlier. This is close to, but not exactly the same as, the JSF view. The JSF
    view is often specified in a mapping independent way (e.g., /foo instead of /faces/foo
    or /foo.xhtml). The web resource pattern, however, has to be the URL itself, with
    the mapping included.


    Second, hasAccessToWebResource() requires us to specify the HTTP method for which
    we test the access . This is required since in Java EE Security constraints actually
    apply per URL and per HTTP method. For instance, a caller can have access to POST
    to /foo.xhtml but not to GET /foo.xhtml. As we’re going to use our utility method
    for navigation tests, GET is typically the right HTTP method to use, but we should
    be aware that sometimes we may need to test for another HTTP method.


    With the helper bean in place, we can now easily check for access to a target
    resource on a view and alter the rendering based on that. To demonstrate this,
    we’ll first define three new web resource constraints in web.xml .'
  trans: '

    ## 基于访问权限的条件渲染


    在 Web 应用中，我们经常需要根据调用者是否已通过身份验证，以及（如果已通过验证）其所属的角色，来差异化渲染视图的某些部分。


    JSF 组件标签实际上并不需要为此设置特殊属性，因为现有的隐式对象结合表达式语言已经足够强大，能够完成所需的大部分检查。


    最常见的检查之一是判断用户是否已通过身份验证。这在上述 `index.xhtml` 视图中已有简要展示：


    ```

    <c:if test="#{not empty request.userPrincipal}">

        <p>已登录为 #{request.userPrincipal}</p>

    </c:if>

    ```


    当然，你也可以在此处使用任何 JSF 组件的 `rendered` 属性。


    ```

    <ui:fragment rendered="#{not empty request.userPrincipal}">

        <p>已登录为 #{request.userPrincipal}</p>

    </ui:fragment>

    ```


    然而，正如你在第 3 章的“JSTL 核心标签”部分所学，这只会导致组件树略微冗长。此外，`rendered` 属性的检查会在 JSF 生命周期中反复执行，而
    JSTL 标签仅在视图构建期间执行一次。


    请注意，我们在这里使用的是隐式对象 `#{request}`，而不是更通用的 `SecurityContext`。这是因为在 Java EE 8 中，没有与
    `SecurityContext` 对应的隐式 EL 对象可用。在 Java EE Security 以及 Servlet API（`request` 对象源自该
    API，其类型为 `HttpServletRequest`）中，规定 `getUserPrincipal()` 返回 `null` 表示用户未通过身份验证。Java
    EE Security 与表达式语言之间更好的对齐计划在未来的 Java EE 版本中实现。


    如前所述，另一个常见的检查是测试调用者是否属于特定角色。这里我们同样可以使用隐式对象 `#{request}`，如下所示：


    ```

    <c:if test="#{request.isUserInRole(''foo'')}">

        <!-- 此处放置 foo 特有的内容 -->

    </c:if>

    ```


    需要记住的是，正如本章开头所解释的，角色“foo”不必是我们通常意义上所说的“角色”。也就是说，它不必是像“admin”或“manager”这样的名称。实际上，对于视图中某个片段这种非常局部的使用场景，通常更倾向于使用粒度更细的名称（例如，“CAN_UPDATE_SALARY”）。一种常见的技术是将细粒度的角色映射到更粗粒度的角色，例如“ADMIN”。通过这种技术，用户被赋予这些粗粒度角色，而存储身份验证数据的数据库也只包含这些粗粒度角色。当像我们之前看到的身份存储为某个调用者检索此身份验证数据并看到“ADMIN”时，它会返回一个“ADMIN”所映射到的角色集合（例如，`{"CAN_UPDATE_SALARY",
    "CAN_ADJUST_MARGINS", ...}`）。


    一个我们可以测试的特殊角色是“**”角色，它是 `#{not empty request.userPrincipal}` 检查的替代方案。该角色被隐式分配给任何已通过身份验证的调用者，但前提是应用程序没有以任何方式声明过它。如果应用程序声明了，“**”就会失去其特殊含义，而仅仅成为安全系统显式测试的另一个不透明字符串。使用“**”检查，我们在本节中展示的第一个片段如下所示：


    ```

    <c:if test="#{request.isUserInRole(''**'')}">

        <p>已登录为 #{request.userPrincipal}</p>

    </c:if>

    ```


    在标准的 Java EE 编程式 API 中，没有可用的方法来测试调用者是否属于两个或多个角色中的任何一个，或者是否属于所有两个或多个角色。如果需要，可以使用如下代码所示的工具方法：


    ```

    public static boolean isInAnyRole(HttpServletRequest request, String... roles)
    {

        for (String roles : roles) {

            if (request.isUserInRole(role)) {

                return true;

            }

        }

        return false;

    }

    public static boolean isInAllRoles(HttpServletRequest request, String... roles)
    {

        for (String roles : roles) {

            if (!request.isUserInRole(role)) {

                return false;

            }

        }

        return true;

    }

    ```


    有时，我们不仅需要根据调用者的角色来差异化渲染视图内容，还需要考虑调用者被允许访问哪些其他视图（Web 资源）。例如，在渲染导航菜单时（省略调用者无权访问的视图条目），或者以特殊方式（例如，用红色显示或旁边带有锁图标）渲染导航到调用者无权访问的视图的链接或按钮时，就会用到这一点。


    实现此目的的传统方法是测试程序员已知的、能授予对给定视图访问权限的角色。虽然这看起来可能有效，但在实践中通常很脆弱，因为它让代码在假设存在特定角色/视图关系的情况下工作，而没有任何强有力的保证来确保这种关系确实成立。


    一种更稳定的测试调用者是否有权访问给定视图的方法，就是直接测试这一点：调用者是否有权访问此视图（Web 资源）。`SecurityContext` 有一个方法几乎可以完全用于此目的：`SecurityContext#hasAccessToWebResource()`。由于
    `SecurityContext` 既不是命名 bean 也不是隐式对象，我们必须创建一个小的辅助 bean 才能在 EL 中使用它。如下所示：


    ```

    @Named @ApplicationScoped

    public class Security {


    @Inject

        private SecurityContext securityContext;


    public boolean hasAccessToWebResource(String resource) {

            return securityContext.hasAccessToWebResource(resource, "GET");

        }

    }

    ```


    这里需要注意两点。


    首先，`hasAccessToWebResource()` 方法接受一个 Web 资源模式，该模式与我们之前看到的 `web.xml` 片段中用于 `url-pattern`
    的模式相同。这接近于 JSF 视图，但并不完全相同。JSF 视图通常以与映射无关的方式指定（例如，`/foo` 而不是 `/faces/foo` 或 `/foo.xhtml`）。然而，Web
    资源模式必须是 URL 本身，并包含映射。


    其次，`hasAccessToWebResource()` 要求我们指定要测试访问权限的 HTTP 方法。这是必需的，因为在 Java EE Security
    中，约束实际上适用于每个 URL 和每个 HTTP 方法。例如，调用者可能有权 POST 到 `/foo.xhtml`，但无权 GET `/foo.xhtml`。由于我们将使用工具方法进行导航测试，`GET`
    通常是正确的 HTTP 方法，但我们应该意识到有时可能需要测试其他 HTTP 方法。


    有了辅助 bean，我们现在可以轻松地检查对视图上目标资源的访问权限，并据此改变渲染效果。为了演示这一点，我们首先在 `web.xml` 中定义三个新的 Web
    资源约束。

    '
- fmt: '```xml

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>Bar</web-resource-name>

            <url-pattern>/bar.xhtml</url-pattern>

        </web-resource-collection>

        <auth-constraint>

            <role-name>bar</role-name>

        </auth-constraint>

    </security-constraint>

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>Foo</web-resource-name>

            <url-pattern>/foo.xhtml</url-pattern>

        </web-resource-collection>

        <auth-constraint>

            <role-name>foo</role-name>

        </auth-constraint>

    </security-constraint>

    <security-constraint>

        <web-resource-collection>

            <web-resource-name>Baz</web-resource-name>

            <url-pattern>/baz.xhtml</url-pattern>

        </web-resource-collection>

        <auth-constraint>

            <role-name>baz</role-name>

        </auth-constraint>

    </security-constraint>

    ```


    After these constraints have been defined we can render links to them with access
    checks on the enabled attribute.


    ```xml

    <h:link value="Go to Bar" outcome="/bar"

        disabled="#{not security.hasAccessToWebResource(''/bar.xhtml'')}" />

    <h:link value="Go to Foo" outcome="/foo"

        disabled="#{not security.hasAccessToWebResource(''/foo.xhtml'')}" />

    <h:link value="Go to Baz" outcome="/baz"

        disabled="#{not security.hasAccessToWebResource(''/baz.xhtml'')}" />

    ```


    Authenticating with a caller having, for instance, the roles `bar` and `foo`,
    but not `baz`, will result in the link to `/baz` being rendered as disabled.


    ## Cross-Site Request Forgery Protection


    Cross-site request forgery (CSRF) is an attack that lets users without their consent
    or even knowledge do a request to a site where they may possibly be logged in.
    Such request then has some side effect that in some particular way may be beneficial
    to the attacker.


    For instance, suppose your bank has a URL of the form `https:/example.com/transferAmount=4000&targetAccount=7836`
    which means “transfer 4000 euros from my account to the account with ID 7836.”
    In this statement the “my account” is being determined via the logged-in session
    (typically a cookie) that you have with your bank. Now an attacker might not be
    able to capture your session cookie, but that’s not necessary in this example
    if only your browser can be tricked into sending the `https:/example.com/transferAmount=4000&targetAccount=7836`
    request from any other web site that you visit while you’re logged in to your
    bank in another tab or window, with the `targetAccount` parameter set to an ID
    of an account that the attacker controls. Note that in practice a `GET` request
    and request parameters would not likely be used, but `POST` and `POST` parameters
    would be used instead. However, for both the same basic vulnerability holds.


    If we want to protect our application against receiving such malicious requests,
    then one of the ways to do so is including “something” (i.e., a token) in the
    request that is:


    1.  Specific to a certain caller.

    2.  Expires after some time.

    3.  Can’t be easily guessed.


    As it happens JSF already has something that fulfills all these three requirements,
    and that’s the `javax.faces.ViewState` hidden parameter that one finds within
    JSF forms.


    ###### Caution


    There’s a caveat though, and that’s that this parameter only fully fulfills those
    requirements when using postbacks, state saving on server is used, and the view
    in question is not stateless. Only in that case is the value of `javax.faces.ViewState`
    effectively a token. Since this is the default, JSF is relatively safe out of
    the box here, but this protection is compromised as soon as we deviate from these
    defaults, for instance, by using stateless views. See also the section “Stateless
    Forms” in Chapter [4](#A454457_1_En_4_Chapter.xhtml).


    Next to this implicit CSRF protection, JSF also has explicit CSRF protection.
    This explicit CSRF protection adds a token for all cases, and additionally adds
    checks for the `referer` and `origin` HTTP headers. Note that HTTP headers should
    normally not be trusted for incoming requests, as they can be very easily spoofed.
    However, for this particular attack we’re not trying to defend against just any
    random HTTP request but specifically against requests sent from a trusted browser.
    The header checks are also in addition to the token check, and the token check
    must always pass first.


    Defining which views should be protected by a CSRF token and the additional header
    checks happens in a way that’s somewhat similar to how we defined roles for views—a
    collection of URL patterns in a deployment descriptor. This time the deployment
    descriptor is `faces-config.xml` instead of `web.xml` though. The following gives
    an example for these entries in `faces-config.xml`:


    ```xml

    <protected-views>

        <url-pattern>/bar.xhtml</url-pattern>

        <url-pattern>/foo.xhtml</url-pattern>

        <url-pattern>/baz.xhtml</url-pattern>

    </protected-views>

    ```


    Note that the `url-pattern` here is the exact same pattern that is used in `web.xml`.
    One thing to be aware of here is that despite `faces-config.xml` being a JSF-specific
    deployment descriptor, the `url-pattern` here is again for the full URL relative
    to the application root which means it has to include all mappings used such as
    `/faces/` and `.xhtml`.


    Adding a `faces-config.xml` with the above shown `protected-views` fragment to
    the example application code we’ve been working on in this chapter will render
    the link on `index.xhtml` to, for example, `/bar.xhtml` in the following way:


    ```

    /bar.xhtml?javax.faces.Token=gdMoNbfOycv2v80gr

    ```


    As can be seen, the `javax.faces.Token` request parameter has been added by JSF.
    The token is tied to the user’s HTTP session, so if the HTTP session expires,
    the token also expires. The token is cryptographically strong, meaning that it
    fulfills all three requirements for a CSRF protection token as stated above.


    If the token is tampered (e.g., we use `xxMoNbfOycv2v80gr` instead of `gdMoNbfOycv2v80gr`),
    or is missing altogether (i.e., we request `/bar.xhtml`) JSF will throw a `javax.faces.application.ProtectedViewException`.
    In case the link originated from a stateless page, JSF applications can handle
    this exception by notifying the user and allowing to re-render the original page
    again. In the example above that would mean re-rendering `index.xhtml`. The genuine
    user would get a new CSRF protection token then, while an attacker will not get
    the expected side effect from the original request.


    As mentioned, there’s a `referer` and `origin` header check as well. For this
    check, JSF checks whether the `referer` header, if available, is set to a URL
    that originates from the same application. To demonstrate this, consider a second
    JSF application with only an empty `faces-config.xml` and the following view:


    ```xml

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <h:outputLink value="http://localhost:8080/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr">

                test

            </h:outputLink>

        </h:body>

    </html>

    ```'
