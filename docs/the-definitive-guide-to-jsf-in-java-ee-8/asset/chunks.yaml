- fmt: '###### Figure 14-1 Changing the active locale


    The `#{activeLocale.languageTag}` property delegates internally to the current
    `java.util.Locale` instance. This is basically done for convenience so that we
    don’t necessarily need to add a converter for `#{activeLocale.current}` in case
    we want to use it in `<h:selectOneMenu>`.


    `<f:ajax listener>` basically performs a full page reload with the help of a piece
    of JavaScript which is executed on completion of the Ajax request. This is done
    by adding a script to the `PartialViewContext#getEvalScripts()` method, which
    is new since JSF 2.3. Any added script will end up ordered in the `<eval>` section
    of the JSF Ajax response, which in turn gets executed after JSF Ajax engine has
    updated the HTML DOM (Document Object Model) tree.


    The script itself, `location.replace(location)`, basically instructs JavaScript
    to reload the current document without keeping the previous document in history.
    This means that the back button won’t redisplay the same page. You can also use
    `location.reload(true)` instead, but this won’t work nicely if a synchronous (non-Ajax)
    POST request has been fired on the same document beforehand. It would be re-executed
    and cause a double submit. And, it unnecessarily remembers the previous page in
    the history. This may end up in confusing behavior, because the back button would
    then seem to have no effect as it would redisplay exactly the same page as the
    active locale is stored in the session, not in the request.


    Alternatively, instead of invoking `<f:ajax listener>`, you can in this specific
    use case also use just `<f:ajax render="@all">` without any listener. It has at
    least one disadvantage: the document’s title won’t be updated. In any case, using
    `@all` is generally considered a bad practice. There’s only one legitimate real-world
    use case for it: displaying a full error page on an Ajax request.


    As a completely different alternative, you could make the active locale request
    scoped instead of session scoped by including the language tag in the URL as in
    `http://example.com/en/page.xhtml`, `http://example.com/pt/page.xhtml`, `http://example.com/hi/page.xhtml`.
    This way you can change the active locale by simply following a link. This only
    involves a servlet filter which extracts the `java.util.Locale` instance from
    the URL and forwards it to the desired JSF page, and a custom view handler which
    includes the language tag in the generated URL of any `<h:form>`, `<h:link>`,
    and `<h:button>` component. You can find a kickoff example in the Java EE Kickoff
    Application.[⁵](#A454457_1_En_14_Chapter.xhtml#Fn5)


    ## Organizing Bundle Keys


    When the web application grows, you may notice that bundle files start to become
    unmaintainable. The key is to organize the bundle keys following a very strict
    convention. Reusable site-wide entries, usually those used as input labels, button
    labels, link labels, table header labels, etc., should be keyed using a general
    prefix (e.g., `"label.save=Save"`). Page-specific entries should be keyed using
    a page-specific prefix (e.g., `"foldername_pagename.title=Some Page Title"`).
    Following is an elaborate example of a localized Facelets template, `/WEB-INF/templates/page.xhtml`:


    ```

    <!DOCTYPE html>

    <html lang="#{activeLocale.language}"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

        xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"

        xmlns:fn="http://xmlns.jcp.org/jsp/jstl/functions"

    >

        <c:set var="page" value="page#{fn:replace(

            fn:split(view.viewId, ''.'')[0], ''/'', ''_'')}" scope="view" />

        <f:view locale="#{activeLocale.current}">

            <h:head>

                <title>#{text[page += ''.title'']}</title>

                <meta name="description"

                    content="#{text[page += ''.meta.description'']}" />

            </h:head>

            <h:body id="#{page}">

                <header>

                    <nav>

                        <h:link outcome="/home"

                            value="#{text[''label.home'']}" />

                        <h:link outcome="/login"

                            value="#{text[''label.login'']}" />

                        <h:link outcome="/signup"

                            value="#{text[''label.signup'']}" />

                    </nav>

                    <h:form>

                        <h:selectOneMenu

                                value="#{activeLocale.languageTag}">

                            <f:selectItems

                                value="#{activeLocale.available}" var="l"

                                itemValue="#{l.toLanguageTag()}"

                                itemLabel="#{l.getDisplayLanguage(l)}">

                            </f:selectItems>

                            <f:ajax listener="#{activeLocale.reload()}" />

                        </h:selectOneMenu>

                    </h:form>

                </header>

                <main>

                    <h1>#{text[page += ''.title'']}</h1>

                    <ui:insert name="content" />

                </main>

                <footer>

                    © #{text[''page_home.title'']}

                </footer>

            </h:body>

        </f:view>

    </html>

    ```


    The JSTL `<c:set>` basically converts the `UIViewRoot#getViewId()` to a string
    which is suitable as a page-specific prefix. The JSF view ID basically represents
    the absolute server-side path to the physical file representing the JSF page (e.g.,
    `/user/account.xhtml`). This needs to be manipulated to a format suitable as a
    resource bundle key. The `fn:split()` call extracts the part `/user/account` from
    it and the `fn:replace()` call converts the forward slash to underscore so that
    it becomes `_user_account`. Finally, `<c:set>` stores it as `page_user_account`
    in the view scope under the name `page` so that it’s available as `#{page}` elsewhere
    in the same view.


    You’ll notice that `#{page}` is in turn being used as, among others, the ID of
    `<h:body>`. This makes it easier to select a specific page from a general CSS
    (Cascading Style Sheets) file just in case that’s needed. `#{page}` is also being
    used in several resource bundle references, such as `#{text[page += ''.title'']}`
    which ultimately references in case of `/home.xhtml` the key `page_home.title`.
    With such a template you can have the following page-specific resource bundle
    entries:


    ```

    page_home.title = My Website

    page_home.meta.description = A Hello World JSF application.


    page_login.title = Log In

    page_login.meta.description = Log in to My Website.


    page_signup.title = Sign Up

    page_signup.meta.description = Sign up to My Website.

    ```'
