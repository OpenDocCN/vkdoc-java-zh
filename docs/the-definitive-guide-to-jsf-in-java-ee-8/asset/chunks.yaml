  raw: '## Extension Types


    There are a couple of different ways by which to use the various extension points
    in JSF. A major distinction is between the “classical” approach and the “CDI-centric
    approach .”


    In the latter approach there’s very little to nothing that JSF has to explicitly
    support extensibillity, as CDI has a number of mechanisms built in to support
    extending or replacing CDI artifacts. This is the planned future for JSF (making
    most if not everything a CDI artifact), but for the moment JSF 2.3 is in an early
    transitional phase and only a few artifacts are vended via CDI. Table [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1)
    in Chapter [8](#A454457_1_En_8_Chapter.xhtml) showed these artifacts.


    ## Extending CDI Artifacts


    One of the ways CDI augments or replaces a type fully is to provide an alternative
    producer. We already saw this technique being used in Chapter [13](#A454457_1_En_13_Chapter.xhtml),
    albeit for a slightly different use case.


    The easiest way is if you need to fully replace the type. If augmenting is needed,
    some code is necessary to obtain the previous type, which with the current version
    of CDI (2.0) is slightly verbose.


    The following shows an example where we replace the request parameter map with
    a new map that has all the values of the original map , plus an additional value
    that we add ourselves:


    ```

    @Dependent @Alternative @Priority(APPLICATION)

    public class RequestParameterMapProducer {


        @Produces @RequestScoped @RequestParameterMap

        public Map<String, String> producer(BeanManager beanManager) {

            Map<String, String> previousMap = getPreviousMap(beanManager);

            Map<String, String> newMap = new HashMap<>(previousMap);

            newMap.put("test", "myTestValue");

            return newMap;

        }

    }

    ```


    The getPreviousMap() method is, as mentioned, somewhat verbose . It’s defined
    as follows:


    ```

    private Map<String, String> getPreviousMap(BeanManager beanManager) {

        class RequestParameterMapAnnotationLiteral

            extends AnnotationLiteral<RequestParameterMap>

            implements RequestParameterMap

        {

            private static final long serialVersionUID = 1L;

        }


        Type MAP_TYPE = new ParameterizedType() {

            @Override

            public Type getRawType() {

                return Map.class;

            }

            @Override

            public Type[] getActualTypeArguments() {

                return new Type[] {String.class, String.class};

            }

            @Override

            public Type getOwnerType() {

                return null;

            }

        };


        return (Map<String, String>) beanManager

            .getReference(beanManager

            .resolve(beanManager

            .getBeans(MAP_TYPE, new RequestParameterMapAnnotationLiteral())

            .stream()

            .filter(bean -> bean

                .getBeanClass() != RequestParameterMapProducer.class)

            .collect(Collectors.toSet())),

                MAP_TYPE,

                beanManager.createCreationalContext(null));

        }

    }

    ```


    It’s expected that the task of obtaining this “previous” or “original” type will
    be made easier in a future revision of any of the specs involved. For instance,
    a future version of JSF will likely introduce ready-to-use annotation literals
    for its (CDI) annotations, such as the RequestParameterMapAnnotationLiteral shown
    here.


    In order to test that this alternative producer works, consider the following
    backing bean :


    ```

    @Named @RequestScoped

    public class TestBean {


        @Inject @RequestParameterMap

        private Map<String, String> requestParameterMap;


        public String getTest() {

            return requestParameterMap.get("test");

        }


        public String getFoo() {

            return requestParameterMap.get("foo");

        }

    }

    ```


    And the following Facelet:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head/>

        <h:body>

            <p>Test: #{testBean.test}</p>

            <p>Foo: #{testBean.foo}</p>

        </h:body>

    </html>

    ```


    Deploying an application containing these artifacts with a request parameter of,
    say, “foo=bar”, will reveal that the new map indeed contains the original request
    parameters as well as the value that we added ourselves.


    ## Extending Classical Artifacts


    The classical approach to augment or fully replace a type in JSF is by installing
    a factory for that type. The basic way such a factory works is in broad lines
    identical to the CDI approach demonstrated above; the factory returns an implementation
    of the requested type and obtains a reference to the “previous” or “original”
    type.


    Being classical in Java EE typically means XML, and indeed the classical factory
    involves XML. Specifically, registering a factory entails using the <factory>
    element in faces-config.xml and a specific element per type for which a factory
    is to be provided. As of JSF 2.3 the following factories are supported:


    *   <application-factory>


    *   <exception-handler-factory>


    *   <external-context-factory>


    *   <faces-context-factory>


    *   <facelet-cache-factory>


    *   <partial-view-context-factory>


    *   <lifecycle-factory>


    *   <view-declaration-language-factory>


    *   <tag-handler-delegate-factory>


    *   <render-kit-factory>


    *   <visit-context-factory>


    *   <flash-factory>


    *   <flow-handler-factory>


    *   <client-window-factory>


    *   <search-expression-context-factory>


    Next to these, there are another number of artifacts that can be replaced/augmented
    in a somewhat similar but still different way; here there’s no factory returning
    the type, but an implementation of the type is specified directly. This variant
    is specified using the <application> element in faces-config.xml. As of JSF 2.3
    the following types can be replaced/augmented directly:


    *   <navigation-handler>


    *   <view-handler>


    *   <resource-handler>


    *   <search-expression-handler>


    *   <flow-handler>


    *   <state-manager>


    *   <action-listener>


    Note that all of these are singletons. From the JSF runtime point of view there’s
    only one of each, but multiple implementations each adding something are supported
    by means of wrapping, which therefore forms a chain (implementation A wrapping
    implementation B, wrapping implementation C, etc.).


    The above specific elements used for each type immediately highlight an issue
    with the classical approach; JSF *has* to provide explicit support for each specific
    type to be replaced/augmented in this way. By contrast, the CDI approach allows
    us to pretty much replace/augment any type without requiring any special support
    from JSF other than that JSF uses CDI for that artifact.


    On the bright side, the factory implementation is currently somewhat simpler compared
    to the CDI version, as the “previous” or “original” type is simply being passed
    to it in its constructor instead of having to be looked up using verbose code.


    As an example, we’ll show how to augment the external context factory . For this
    we start with the mentioned registration in faces-config.xml.


    ```

    <factory>

        <external-context-factory>

            com.example.project.ExternalContextProducer

        </external-context-factory>

    </factory>

    ```


    The implementation then looks as follows:


    ```

    public class ExternalContextProducer extends ExternalContextFactory {

        public ExternalContextProducer(ExternalContextFactory wrapped) {

            super(wrapped);

        }


    @Override

        public ExternalContext getExternalContext

            (Object context, Object request, Object response)

        {

            ExternalContext previousExternalContext =

                getWrapped().getExternalContext(context, request, response);

            ExternalContext newExternalContext =

                new ExternalContextWrapper(previousExternalContext) {

                    @Override

                    public String getAuthType() {

                        return "OurOwnAuthType";

                    }

                };

            return newExternalContext;

        }

    }

    ```'
  trans: '

    ## 扩展类型


    在 JSF 中使用各种扩展点有几种不同的方式。主要区别在于“经典”方法和“以 CDI 为中心的方法”。


    在后一种方法中，JSF 几乎不需要显式支持可扩展性，因为 CDI 内置了许多机制来支持扩展或替换 CDI 工件。这是 JSF 的未来规划（使几乎所有内容都成为
    CDI 工件），但目前 JSF 2.3 仍处于早期的过渡阶段，只有少数工件通过 CDI 提供。第 8 章的表格 8-1 展示了这些工件。


    ## 扩展 CDI 工件


    CDI 完全增强或替换类型的一种方式是提供替代生产者。我们已经在第 13 章中看到了这种技术的使用，尽管其用例略有不同。


    最简单的方式是当你需要完全替换该类型时。如果需要增强，则需要一些代码来获取之前的类型，这在当前版本的 CDI (2.0) 中略显冗长。


    以下示例展示了我们将请求参数映射替换为一个新映射，该映射包含原始映射的所有值，以及我们自己添加的一个额外值：


    ```

    @Dependent @Alternative @Priority(APPLICATION)

    public class RequestParameterMapProducer {


        @Produces @RequestScoped @RequestParameterMap

        public Map<String, String> producer(BeanManager beanManager) {

            Map<String, String> previousMap = getPreviousMap(beanManager);

            Map<String, String> newMap = new HashMap<>(previousMap);

            newMap.put("test", "myTestValue");

            return newMap;

        }

    }

    ```


    如前所述，`getPreviousMap()` 方法略显冗长。其定义如下：


    ```

    private Map<String, String> getPreviousMap(BeanManager beanManager) {

        class RequestParameterMapAnnotationLiteral

            extends AnnotationLiteral<RequestParameterMap>

            implements RequestParameterMap

        {

            private static final long serialVersionUID = 1L;

        }


        Type MAP_TYPE = new ParameterizedType() {

            @Override

            public Type getRawType() {

                return Map.class;

            }

            @Override

            public Type[] getActualTypeArguments() {

                return new Type[] {String.class, String.class};

            }

            @Override

            public Type getOwnerType() {

                return null;

            }

        };


        return (Map<String, String>) beanManager

            .getReference(beanManager

            .resolve(beanManager

            .getBeans(MAP_TYPE, new RequestParameterMapAnnotationLiteral())

            .stream()

            .filter(bean -> bean

                .getBeanClass() != RequestParameterMapProducer.class)

            .collect(Collectors.toSet())),

                MAP_TYPE,

                beanManager.createCreationalContext(null));

        }

    }

    ```


    预计在相关规范的未来修订版中，获取此“先前”或“原始”类型的任务将变得更加容易。例如，未来版本的 JSF 可能会为其（CDI）注解引入即用型注解字面量，例如此处展示的
    `RequestParameterMapAnnotationLiteral`。


    为了测试此替代生产者是否有效，请考虑以下支持 bean：


    ```

    @Named @RequestScoped

    public class TestBean {


        @Inject @RequestParameterMap

        private Map<String, String> requestParameterMap;


        public String getTest() {

            return requestParameterMap.get("test");

        }


        public String getFoo() {

            return requestParameterMap.get("foo");

        }

    }

    ```


    以及以下 Facelet：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head/>

        <h:body>

            <p>Test: #{testBean.test}</p>

            <p>Foo: #{testBean.foo}</p>

        </h:body>

    </html>

    ```


    部署一个包含这些工件且带有请求参数（例如“foo=bar”）的应用程序，将会显示新映射确实包含了原始请求参数以及我们自己添加的值。


    ## 扩展经典工件


    在 JSF 中增强或完全替换类型的经典方法是为该类型安装一个工厂。这种工厂的基本工作方式与上面演示的 CDI 方法大致相同；工厂返回所请求类型的实现，并获取对“先前”或“原始”类型的引用。


    在 Java EE 中，“经典”通常意味着 XML，而经典的工厂确实涉及 XML。具体来说，注册工厂需要在 `faces-config.xml` 中使用 `<factory>`
    元素，并为每个需要提供工厂的类型使用特定的元素。从 JSF 2.3 开始，支持以下工厂：


    *   `<application-factory>`

    *   `<exception-handler-factory>`

    *   `<external-context-factory>`

    *   `<faces-context-factory>`

    *   `<facelet-cache-factory>`

    *   `<partial-view-context-factory>`

    *   `<lifecycle-factory>`

    *   `<view-declaration-language-factory>`

    *   `<tag-handler-delegate-factory>`

    *   `<render-kit-factory>`

    *   `<visit-context-factory>`

    *   `<flash-factory>`

    *   `<flow-handler-factory>`

    *   `<client-window-factory>`

    *   `<search-expression-context-factory>`


    除此之外，还有另外一些工件可以通过类似但不同的方式进行替换/增强；这里没有返回类型的工厂，而是直接指定了该类型的实现。这种变体使用 `faces-config.xml`
    中的 `<application>` 元素来指定。从 JSF 2.3 开始，以下类型可以直接替换/增强：


    *   `<navigation-handler>`

    *   `<view-handler>`

    *   `<resource-handler>`

    *   `<search-expression-handler>`

    *   `<flow-handler>`

    *   `<state-manager>`

    *   `<action-listener>`


    请注意，所有这些都是单例。从 JSF 运行时的角度来看，每种类型只有一个实例，但通过包装支持多个实现各自添加功能，从而形成一个链（实现 A 包装实现 B，包装实现
    C，等等）。


    上述用于每种类型的特定元素立即凸显了经典方法的一个问题；JSF *必须* 为每种要以这种方式替换/增强的特定类型提供显式支持。相比之下，CDI 方法允许我们替换/增强几乎任何类型，而无需
    JSF 提供任何特殊支持，只要 JSF 对该工件使用 CDI 即可。


    好的一面是，目前工厂实现比 CDI 版本稍微简单一些，因为“先前”或“原始”类型只是通过构造函数传递给它，而无需使用冗长的代码进行查找。


    作为示例，我们将展示如何增强外部上下文工厂。为此，我们首先在 `faces-config.xml` 中进行上述注册。


    ```

    <factory>

        <external-context-factory>

            com.example.project.ExternalContextProducer

        </external-context-factory>

    </factory>

    ```


    然后实现如下所示：


    ```

    public class ExternalContextProducer extends ExternalContextFactory {

        public ExternalContextProducer(ExternalContextFactory wrapped) {

            super(wrapped);

        }


    @Override

        public ExternalContext getExternalContext

            (Object context, Object request, Object response)

        {

            ExternalContext previousExternalContext =

                getWrapped().getExternalContext(context, request, response);

            ExternalContext newExternalContext =

                new ExternalContextWrapper(previousExternalContext) {

                    @Override

                    public String getAuthType() {

                        return "OurOwnAuthType";

                    }

                };

            return newExternalContext;

        }

    }

    ```

    '
- fmt: 'There are a few things to observe here. First of all, every factory of this
    kind has to inherit from a pre-described parent factory, which in this case is
    `ExternalContextFactory`. Second, there’s an implicit contract that must be followed,
    and that’s implementing the constructor exactly as shown in the example. That
    is, add a public constructor with a single parameter the exact same type as the
    superclass, and pass this parameter on to the super constructor. This instance
    is then available in other methods using the `getWrapped()` method.


    Testing that this indeed works is relatively easy. We use a similar backing bean
    as with the CDI version:


    ```

    @Named @RequestScoped

    public class TestBean {


    @Inject

        private ExternalContext externalContext;


    public String getAuth() {

            return externalContext.getAuthType();

        }

    }

    ```


    And the following Facelet:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <p>Test: #{testBean.auth}</p>

        </h:body>

    </html>

    ```


    As the external context is also a type that’s injectable via CDI, the observant
    reader may wonder what happens when both a CDI alternative producer and a classic
    factory are provided for that type. The answer is that this is strictly speaking
    not specified (thus undefined behavior), yet in practice it’s strongly implied
    that the classic factory is used as the source to ultimately get the external
    context from. This means that an alternative producer for `ExternalContext` will
    only affect the direct injection of `ExternalContext`, and not any situation when
    this type is obtained in any other way, for instance, by calling `FacesContext#getExternalContext()`.
    This is something users should clearly be aware of. The expectation is, though,
    that a future revision of the spec will make a CDI producer the initial source.


    ## Plug-ins


    A different type of extending that JSF offers next to the alternative producers
    and factories is what’s essentially a plug-in. Here, no core JSF type is replaced
    or augmented, but an additional functionality is added to some part of the runtime.
    Most of these additions, therefore, have to declare in some way what it is they
    are exactly adding, which is different from the factories which just provided
    an implementation of type X or Y.


    Plug-ins are added as elements of the `<application>` element in `faces-config.xml`,
    just as some of the factory-like types mentioned above. The following are supported:


    *   `<el-resolver>`

    *   `<property-resolver>` (deprecated)

    *   `<variable-resolver>` (deprecated)

    *   `<search-keyword-resolver>`


    We already saw an example of the Search Keyword Resolver in the section “Custom
    Search Keywords” in Chapter [12](#A454457_1_En_12_Chapter.xhtml). Characteristic
    for that one being a plug-in was the method `isResolverForKeyWord()`, by which
    the plug-in could indicate for which keyword, or keyword pattern, it would operate.


    We’ll take a look at one other example here, namely, the EL resolver. The property
    resolver and variable resolver are both deprecated and have been replaced by the
    EL resolver. The EL resolver itself is not a JSF-specific type but originates
    from the Expression Language (EL) spec. This spec does, however, have important
    parts of its origins in JSF.


    The EL resolver allows us to interpret the so-called base and property of an expression
    in a custom way. Considering the expression `#{foo.bar.kaz}`, then “foo” is the
    base and “bar” is the property when resolving “bar”, while “bar” is the base and
    “kaz” is the property when resolving “kaz”. Perhaps somewhat surprising at first
    is that when “foo” is being resolved, the base is null and “foo” is the property.


    In practice, adding a custom EL resolver is not often needed, and we can often
    get by with simply defining a named CDI bean that does what we require. Custom
    EL resolvers could come into play when JSF is integrated in a completely different
    environment though, one where we’d like expressions to resolve to a completely
    different (managed) bean system. Even so, a CDI-to-other-beans-bridge might be
    a better option even there, but it’s perhaps good to know a custom EL resolver
    is one other tool we have in our arsenal.


    Anyway, to demonstrate what an EL resolver can do we’ll show an example where
    the base of an EL expression is interpreted as a pattern, something we can’t do
    directly with a named CDI bean.


    The following shows an example EL resolver:


    ```

    public class CustomELResolver extends ELResolver {


    protected boolean isResolverFor(Object base, Object property) {

            return base == null

                && property instanceof String

                && ((String) property).startsWith("dev");

        }


    @Override

        public Object getValue

            (ELContext context, Object base, Object property)

        {

            if (isResolverFor(base, property)) {

                context.setPropertyResolved(true);

                return property.toString().substring(3);

            }

            return null;

        }


    @Override

        public Class<?> getType

            (ELContext context, Object base, Object property)

        {

            if (isResolverFor(base, property)) {

                context.setPropertyResolved(true);

                return String.class;

            }

            return null;

        }


    @Override

        public Class<?> getCommonPropertyType

            (ELContext context, Object base)

        {

            return base == null ? getType(context, base, null) : null;

        }


    @Override

        public boolean isReadOnly

            (ELContext context, Object base, Object property)

        {

            return true;

        }


    @Override

        public void setValue

            (ELContext context, Object base, Object property, Object value)

        {

            // NOOP;

        }


    @Override

        public Iterator<FeatureDescriptor> getFeatureDescriptors

            (ELContext context, Object base)

        {

            return null;

        }

    }

    ```


    If we now use the following Facelet:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <p>Test: #{devThisIsDev}</p>

        </h:body>

    </html>

    ```


    we’ll see “Test: ThisIsDev” being printed when requesting it. What’s happening
    here is that the custom EL resolver handles every name that starts with “dev.”


    ## Dynamic Extensions


    The previous examples were mostly about registering the extensions that we needed
    statically, e.g., by registering a factory or the type directly in `faces-config.xml`.
    Factories give us an opportunity for some dynamic behavior. That is, at the point
    the factory is called we can decide what new type (if any) to return.


    For even more dynamic behavior it’s frequently required to be able to dynamically
    add the factories, or in CDI to dynamically add the producers. CDI has an elaborate
    SPI (server provider interface) for this (simply called “CDI Extensions”) which
    are, however, somewhat outside the scope of this book.


    For classic factories and actually everything that’s in `faces-config.xml`, there’s
    a somewhat low-level method to add these dynamically: the Application Configuration
    Populator, which we’ll discuss next.'
  raw: 'There are a few things to observe here. First of all, every factory of this
    kind has to inherit from a pre-described parent factory, which in this case is
    ExternalContextFactory. Second, there’s an implicit contract that must be followed,
    and that’s implementing the constructor exactly as shown in the example. That
    is, add a public constructor with a single parameter the exact same type as the
    superclass, and pass this parameter on to the super constructor. This instance
    is then available in other methods using the getWrapped() method.


    Testing that this indeed works is relatively easy. We use a similar backing bean
    as with the CDI version :


    ```

    @Named @RequestScoped

    public class TestBean {


    @Inject

        private ExternalContext externalContext;


    public String getAuth() {

            return externalContext.getAuthType();

        }

    }

    ```


    And the following Facelet :


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <p>Test: #{testBean.auth}</p>

        </h:body>

    </html>

    ```


    As the external context is also a type that’s injectable via CDI, the observant
    reader may wonder what happens when both a CDI alternative producer and a classic
    factory are provided for that type. The answer is that this is strictly speaking
    not specified (thus undefined behavior), yet in practice it’s strongly implied
    that the classic factory is used as the source to ultimately get the external
    context from. This means that an alternative producer for ExternalContext will
    only affect the direct injection of ExternalContext, and not any situation when
    this type is obtained in any other way, for instance, by calling FacesContext#getExternalContext()*.*
    This is something users should clearly be aware of. The expectation is, though,
    that a future revision of the spec will make a CDI producer the initial source.


    ## Plug-ins


    A different type of extending that JSF offers next to the alternative producers
    and factories is what’s essentially a plug-in. Here, no core JSF type is replaced
    or augmented, but an additional functionality is added to some part of the runtime.
    Most of these additions, therefore, have to declare in some way what it is they
    are exactly adding, which is different from the factories which just provided
    an implementation of type X or Y.


    Plug-ins are added as elements of the <application> element in faces-config.xml,
    just as some of the factory-like types mentioned above. The following are supported:


    *   <el-resolver>


    *   <property-resolver> (deprecated)


    *   <variable-resolver> (deprecated)


    *   <search-keyword-resolver>


    We already saw an example of the Search Keyword Resolver in the section “Custom
    Search Keywords” in Chapter [12](#A454457_1_En_12_Chapter.xhtml). Characteristic
    for that one being a plug-in was the method isResolverForKeyWord(), by which the
    plug-in could indicate for which keyword, or keyword pattern, it would operate.


    We’ll take a look at one other example here, namely, the EL resolver. The property
    resolver and variable resolver are both deprecated and have been replaced by the
    EL resolver. The EL resolver itself is not a JSF-specific type but originates
    from the Expression Language (EL) spec. This spec does, however, have important
    parts of its origins in JSF.


    The EL resolver allows us to interpret the so-called base and property of an expression
    in a custom way. Considering the expression #{foo.bar.kaz}, then “foo” is the
    base and “bar” is the property when resolving “bar”, while “bar” is the base and
    “kaz” is the property when resolving “kaz”. Perhaps somewhat surprising at first
    is that when “foo” is being resolved, the base is null and “foo” is the property.


    In practice, adding a custom EL resolver is not often needed, and we can often
    get by with simply defining a named CDI bean that does what we require. Custom
    EL resolvers could come into play when JSF is integrated in a completely different
    environment though, one where we’d like expressions to resolve to a completely
    different (managed) bean system. Even so, a CDI-to-other-beans-bridge might be
    a better option even there, but it’s perhaps good to know a custom EL resolver
    is one other tool we have in our arsenal.


    Anyway, to demonstrate what an EL resolver can do we’ll show an example where
    the base of an EL expression is interpreted as a pattern, something we can’t do
    directly with a named CDI bean.


    The following shows an example EL resolver :


    ```

    public class CustomELResolver extends ELResolver {


    protected boolean isResolverFor(Object base, Object property) {

            return base == null

                && property instanceof String

                && ((String) property).startsWith("dev");

        }


    @Override

        public Object getValue

            (ELContext context, Object base, Object property)

        {

            if (isResolverFor(base, property)) {

                context.setPropertyResolved(true);

                return property.toString().substring(3);

            }

            return null;

        }


    @Override

        public Class<?> getType

            (ELContext context, Object base, Object property)

        {

            if (isResolverFor(base, property)) {

                context.setPropertyResolved(true);

                return String.class;

            }

            return null;

        }


    @Override

        public Class<?> getCommonPropertyType

            (ELContext context, Object base)

        {

            return base == null ? getType(context, base, null) : null;

        }


    @Override

        public boolean isReadOnly

            (ELContext context, Object base, Object property)

        {

            return true;

        }


    @Override

        public void setValue

            (ELContext context, Object base, Object property, Object value)

        {

            // NOOP;

        }


    @Override

        public Iterator<FeatureDescriptor> getFeatureDescriptors

            (ELContext context, Object base)

        {

            return null;

        }

    }

