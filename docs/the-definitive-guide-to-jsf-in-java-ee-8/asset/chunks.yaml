- fmt: "# Label and Message Components\n\nIn an average well-designed form, input\
    \ elements are usually accompanied with a `label` element and a `message` element\
    \ targeting the input field. In HTML, labels are represented by the `<label>`\
    \ element. In JSF, you can use the `<h:outputLabel>` component to generate an\
    \ HTML `<label>` element. HTML does not have a dedicated element to represent\
    \ a message. In JSF, the `<h:message>` component generates a HTML `<span>` element\
    \ and the `<h:messages>` component generates either a `<ul>` element or a `<table>`\
    \ element, depending on the value of the `layout` attribute.\n\nThe `label` element\
    \ has various SEO (search engine optimization) and usability advantages. It tells\
    \ in text about the associated input element. Screen readers, like those used\
    \ by people with visual disabilities, will find the `label` and tell its contents\
    \ by sound. Search bots will find the `label` and index the associated input element\
    \ as such. And, the `label` will focus and activate the associated input element\
    \ when being clicked itself. Text-based input elements will then show the text\
    \ cursor. Check box and radio input elements will then be toggled. List box and\
    \ drop-down input elements will then be focused. File input elements will then\
    \ open the browse dialog. Submit buttons will then be invoked.\n\nThe `message`\
    \ element is usually to be used to display conversion and validation error messages\
    \ coming from the server side. This way, the end user is informed about the state\
    \ of the form and can act accordingly, usually by correcting the input values.\
    \ You can also use it to display warning or informal messages.\n\nIn JSF, the\
    \ `<h:outputLabel>`, `<h:message>` and `<h:messages>` components have a `for`\
    \ attribute wherein you normally define the ID of the associated `UIInput` component.\
    \ Following is an example in the flavor of a login form:\n\n```html\n<h:form id=\"\
    login\">\n    <fieldset>\n        <legend>Login</legend>\n        <section>\n\
    \            <h:outputLabel for=\"email\" value=\"Email address\" />\n       \
    \     <h:inputText id=\"email\" value=\"#{login.email}\"\n                required=\"\
    true\" />\n            <h:message id=\"m_email\" for=\"email\" />\n        </section>\n\
    \        <section>\n            <h:outputLabel for=\"password\" value=\"Password\"\
    \ />\n            <h:inputSecret id=\"password\" value=\"#{login.password}\"\n\
    \                required=\"true\" />\n            <h:message id=\"m_password\"\
    \ for=\"password\" />\n        </section>\n        <footer>\n            <h:commandButton\
    \ id=\"submit\" value=\"Login\"\n                action=\"#{login.submit}\" />\n\
    \        </footer>\n    </fieldset>\n</h:form>\n```\n\nYou can actually use any\
    \ arbitrary component search expression in the `for` attribute. For the `<h:outputLabel>`\
    \ component, this doesn’t make much sense. For the `<h:message>` and `<h:messages>`\
    \ components, referring the ID of a non-`UIInput` component would only make sense\
    \ when you want to programmatically add a faces message from the managed bean\
    \ on. But you would then need to know the client ID of the target component.\n\
    \n```html\n<h:form id=\"login\">\n    ...\n            <h:commandButton id=\"\
    submit\" value=\"Login\"\n                action=\"#{login.submit}\" />\n    \
    \        <h:message id=\"m_submit\" for=\"submit\" />\n    ...\n</h:form>\n```\n\
    \nThe above `<h:commandButton>` will generate a client ID of `\"login:submit\"\
    ` in the HTML output. You can then programmatically add a faces message as follows:\n\
    \n```java\npublic String submit() {\n    try {\n        yourAuthenticator.authenticate(email,\
    \ password);\n        return \"/user/home.xhtml?faces-redirect=true\";\n    }\n\
    \    catch (YourAuthenticationException e) {\n        FacesContext context = FacesContext.getCurrentInstance();\n\
    \        FacesMessage message = new FacesMessage(\"Authentication failed\");\n\
    \        context.addMessage(\"login:submit\", message);\n        return null;\n\
    \    }\n}\n```\n\nA better practice, however, is to add the faces message as a\
    \ global message by passing `null` as the client ID.\n\n```java\n        context.addMessage(null,\
    \ message);\n```\n\nSuch a message will then only end up in a `<h:messages globalOnly=\"\
    true\">`.\n\n```html\n            <h:commandButton id=\"submit\" value=\"Login\"\
    \n                action=\"#{login.submit}\" />\n            <h:messages id=\"\
    messages\" globalOnly=\"true\"\n                rendered=\"#{component.namingContainer.submitted}\"\
    \ />\n```\n\nNote the logic in the `rendered` attribute of the messages component.\
    \ It will thus only be rendered when the `submitted` property of the `NamingContainer`\
    \ parent evaluates to `true`. In this specific case, it’s consulting the `UIForm#isSubmitted()`.\
    \ This is very useful in case you have multiple non-Ajax forms each with its own\
    \ global messages component and/or a “catch-all” `<h:messages redisplay=\"false\"\
    >` component somewhere near the bottom of the JSF page, which is then using CSS\
    \ fixed positioned on top. Otherwise the global message would unintentionally\
    \ show up over there as well.\n\nThis message-rendering logic is not necessary\
    \ in Ajax forms as you could just fine-tune the message rendering by simply explicitly\
    \ specifying the message(s) component(s) in the `render` attribute of `<f:ajax>`.\
    \ Moreover, the `UIForm#isSubmitted()` would unexpectedly return `false` when\
    \ the `execute` attribute of the `<f:ajax>` does not explicitly target the form\
    \ as in `execute=\"@form\"`."
  raw: '## Label and Message Components


    In an average well-designed form, input elements are usually accompanied with
    a label element and a message element targeting the input field. In HTML, labels
    are represented by the <label> element. In JSF, you can use the <h:outputLabel>
    component to generate an HTML <label> element. HTML does not have a dedicated
    element to represent a message. In JSF, the <h:message> component generates a
    HTML <span> element and the <h:messages> component generates either a <ul> element
    or a <table> element, depending on the value of the layout attribute.


    The label element has various SEO (search engine optimization) and usability advantages.
    It tells in text about the associated input element. Screen readers, like those
    used by people with visual disabilities, will find the label and tell its contents
    by sound. Search bots will find the label and index the associated input element
    as such. And, the label will focus and activate the associated input element when
    being clicked itself. Text-based input elements will then show the text cursor.
    Check box and radio input elements will then be toggled. List box and drop-down
    input elements will then be focused. File input elements will then open the browse
    dialog. Submit buttons will then be invoked.


    The message element is usually to be used to display conversion and validation
    error messages coming from the server side. This way, the end user is informed
    about the state of the form and can act accordingly, usually by correcting the
    input values. You can also use it to display warning or informal messages.


    In JSF, the <h:outputLabel>, <h:message> and <h:messages> components have a for
    attribute wherein you normally define the ID of the associated UIInput component.
    Following is an example in the flavor of a login form:


    ```

    <h:form id="login">

        <fieldset>

            <legend>Login</legend>

            <section>

                <h:outputLabel for="email" value="Email address" />

                <h:inputText id="email" value="#{login.email}"

                    required="true" />

                <h:message id="m_email" for="email" />

            </section>

            <section>

                <h:outputLabel for="password" value="Password" />

                <h:inputSecret id="password" value="#{login.password}"

                    required="true" />

                <h:message id="m_password" for="password" />

            </section>

            <footer>

                <h:commandButton id="submit" value="Login"

                    action="#{login.submit}" />

            </footer>

        </fieldset>

    </h:form>

    ```


    You can actually use any arbitrary component search expression in the for attribute.
    For the <h:outputLabel> component, this doesn’t make much sense. For the <h:message>
    and <h:messages> components, referring the ID of a non-UIInput component would
    only make sense when you want to programmatically add a faces message from the
    managed bean on. But you would then need to know the client ID of the target component.


    ```

    <h:form id="login">

        ...

                <h:commandButton id="submit" value="Login"

                    action="#{login.submit}" />

                <h:message id="m_submit" for="submit" />

        ...

    </h:form>

    ```


    The above <h:commandButton> will generate a client ID of "login:submit" in the
    HTML output. You can then programmatically add a faces message as follows:


    ```

    public String submit() {

        try {

            yourAuthenticator.authenticate(email, password);

            return "/user/home.xhtml?faces-redirect=true";

        }

        catch (YourAuthenticationException e) {

            FacesContext context = FacesContext.getCurrentInstance();

            FacesMessage message = new FacesMessage("Authentication failed");

            context.addMessage("login:submit", message);

            return null;

        }

    }

    ```


    A better practice, however, is to add the faces message as a global message by
    passing null as the client ID.


    ```

            context.addMessage(null, message);

    ```


    Such a message will then only end up in a <h:messages globalOnly="true">.


    ```

                <h:commandButton id="submit" value="Login"

                    action="#{login.submit}" />

                <h:messages id="messages" globalOnly="true"

                    rendered="#{component.namingContainer.submitted}" />

    ```


    Note the logic in the rendered attribute of the messages component. It will thus
    only be rendered when the submitted property of the NamingContainer parent evaluates
    to true. In this specific case, it’s consulting the UIForm#isSubmitted(). This
    is very useful in case you have multiple non-Ajax forms each with its own global
    messages component and/or a “catch-all” <h:messages redisplay="false"> component
    somewhere near the bottom of the JSF page, which is then using CSS fixed positioned
    on top. Otherwise the global message would unintentionally show up over there
    as well.


    This message-rendering logic is not necessary in Ajax forms as you could just
    fine-tune the message rendering by simply explicitly specifying the message(s)
    component(s) in the render attribute of <f:ajax>. Moreover, the UIForm#isSubmitted()
    would unexpectedly return false when the execute attribute of the <f:ajax> does
    not explicitly target the form as in execute="@form".'
