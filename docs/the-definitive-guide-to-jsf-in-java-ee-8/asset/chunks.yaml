- fmt: "Once again, the JSF bean management facility is officially deprecated since\
    \ JSF 2.3. You should absolutely not use it any more in new JSF applications.\
    \ It will still be there in the JSF API for backward compatibility, but chances\
    \ are that the `javax.faces.bean` package will be removed altogether in a future\
    \ JSF version. Existing JSF applications should be migrated to CDI as soon as\
    \ possible. CDI is natively available in normal Java EE application servers and\
    \ relatively easy to install in barebones servlet containers. For example, JBoss\
    \ Weld, one of the CDI implementations, can already be installed in Tomcat by\
    \ simply adding the single dependency `org.jboss.weld.servlet:weld-servlet-shaded`\
    \ to the project[⁴](#A454457_1_En_8_Chapter.xhtml#Fn4) without any further effort.\n\
    \n## Scopes\n\nThe managed bean scope basically represents the lifetime of the\
    \ managed bean. As hinted in the previous section, in plain JSP/Servlet perspective\
    \ the scopes are represented by the object being put as an attribute of the `ServletContext`,\
    \ `HttpSession`, or `ServletRequest`. Those objects will then become application\
    \ scoped, session scoped, and request scoped, respectively. This is still how\
    \ it works with CDI and all; it only adds an extra abstract layer over it so that\
    \ you don’t any more need to manually create and put the objects in a certain\
    \ scope.\n\nIn standard JSF, the following CDI managed bean scopes are available\
    \ for JSF backing beans, ordered from the longest living to the shortest living.\n\
    \n1. `@javax.enterprise.context.ApplicationScoped`\n2. `@javax.enterprise.context.SessionScoped`\n\
    3. `@javax.enterprise.context.ConversationScoped`\n4. `@javax.faces.flow.FlowScoped`\n\
    5. `@javax.faces.view.ViewScoped`\n6. `@javax.enterprise.context.RequestScoped`\n\
    7. `@javax.enterprise.context.Dependent`\n\nNote that the `javax.faces.bean` package\
    \ also defines a set of scopes, but they are only applicable on the beans managed\
    \ by JSF’s `@ManagedBean`, not on beans managed by CDI. Moreover, the `javax.faces.bean`\
    \ package is deprecated since JSF 2.3 in favor of CDI.\n\n### `@ApplicationScoped`\n\
    \nAn application-scoped managed bean instance is tied to the lifetime of the web\
    \ application itself. It’s under the hood represented as an attribute of the `ServletContext`\
    \ which is created on the web application’s deployment and destroyed on the web\
    \ application’s undeployment. Note that this is not equal to the server’s startup\
    \ and shutdown. Web applications can be deployed and undeployed on a running server.\n\
    \nIn other words, there’s only one instance of an application-scoped managed bean\
    \ throughout the web application’s lifetime which is shared across all requests\
    \ and sessions. You could argue that it behaves like a singleton. However, it\
    \ doesn’t actually follow the singleton design pattern. It follows the “just create\
    \ one” design pattern.[⁵](#A454457_1_En_8_Chapter.xhtml#Fn5) A real singleton\
    \ doesn’t have any public constructor but only a static method which returns a\
    \ statically initialized lazy loaded instance. A real JavaBean, on the other hand,\
    \ requires the presence of a default constructor.\n\nBy default, an application-scoped\
    \ bean managed instance is created for the first time when the web application’s\
    \ code accesses it for the first time during the web application’s lifetime. It’s\
    \ thus not, per definition, immediately created when the `ServletContext` instance\
    \ is created. It is, however, guaranteed when the `ServletContext` instance is\
    \ destroyed.\n\nApplication-scoped managed beans are useful for application-wide\
    \ data which needs to be initialized only once in the application’s lifetime,\
    \ or needs to provide non-static getters which delegate to static variables, or\
    \ needs to provide functions for usage in EL. The following example makes sure\
    \ that application settings stored in the database are loaded only once and provided\
    \ as a `Map` by `#{settings}` during the rest of the application’s lifetime.\n\
    \n```java\n@ApplicationScoped\npublic class ApplicationSettingsProducer {\n\n\
    \    private Map<String, String> settings;\n\n    @Inject\n    private ApplicationSettingsService\
    \ applicationSettingsService;\n\n    @PostConstruct\n    public void init() {\n\
    \        settings = applicationSettingsService.getAll();\n    }\n\n    @Produces\
    \ @Named\n    public Map<String, String> getSettings() {\n        return settings;\n\
    \    }\n}\n```\n\nNote that the `@Named` annotation is placed on the getter, which\
    \ implies a managed bean name matching the property name: `#{settings}`. Also\
    \ note that the getter in turn needs the `@Produces` annotation in order to be\
    \ recognized as a managed bean producer. Following is another example which offers\
    \ text formatting functions.\n\n```java\n@Named @ApplicationScoped\npublic class\
    \ Format {\n\n    public String date(LocalDate localDate) {\n        if (localDate\
    \ != null) {\n            return localDate.format(DateTimeFormatter.ISO_LOCAL_DATE);\n\
    \        }\n        else {\n            return \"n/a\";\n        }\n    }\n\n\
    \    public String currency(BigDecimal amount) {\n        if (amount != null)\
    \ {\n            return NumberFormat.getCurrencyInstance(Locale.US)\n        \
    \        .format(amount);\n        }\n        else {\n            return \"n/a\"\
    ;\n        }\n    }\n}\n```\n\nThis could be useful in, for example, a data table\
    \ to keep the Facelets code terse.\n\n```xml\n<h:dataTable value=\"#{cart.products}\"\
    \ var=\"product\">\n    <h:column>#{format.date(product.lastModified)}</h:column>\n\
    \    <h:column>#{format.currency(product.discount)}</h:column>\n</h:dataTable>\n\
    ```\n\nIt’s also useful in case you need a formatted value in an attribute which\
    \ doesn’t allow a nested `<h:outputText><f:convertXxx>`.\n\n```xml\n<h:commandLink\
    \ ... title=\"Last visited #{format.date(user.lastVisited)}\">\n```"
  raw: 'Once again, the JSF bean management facility is officially deprecated since
    JSF 2.3\. You should absolutely not use it any more in new JSF applications. It
    will still be there in the JSF API for backward compatibility, but chances are
    that the javax.faces.bean package will be removed altogether in a future JSF version.
    Existing JSF applications should be migrated to CDI as soon as possible. CDI is
    natively available in normal Java EE application servers and relatively easy to
    install in barebones servlet containers. For example, JBoss Weld, one of the CDI
    implementations, can already be installed in Tomcat by simply adding the single
    dependency org.jboss.weld.servlet:weld-servlet-shaded to the project[⁴](#A454457_1_En_8_Chapter.xhtml#Fn4)
    without any further effort .


    ## Scopes


    The managed bean scope basically represents the lifetime of the managed bean.
    As hinted in the previous section, in plain JSP/Servlet perspective the scopes
    are represented by the object being put as an attribute of the ServletContext,
    HttpSession, or ServletRequest. Those objects will then become application scoped,
    session scoped, and request scoped, respectively. This is still how it works with
    CDI and all; it only adds an extra abstract layer over it so that you don’t any
    more need to manually create and put the objects in a certain scope.


    In standard JSF, the following CDI managed bean scopes are available for JSF backing
    beans, ordered from the longest living to the shortest living.


    1.  @javax.enterprise.context.ApplicationScoped


    2.  @javax.enterprise.context.SessionScoped


    3.  @javax.enterprise.context.ConversationScoped


    4.  @javax.faces.flow.FlowScoped


    5.  @javax.faces.view.ViewScoped


    6.  @javax.enterprise.context.RequestScoped


    7.  @javax.enterprise.context.Dependent


    Note that the javax.faces.bean package also defines a set of scopes, but they
    are only applicable on the beans managed by JSF’s @ManagedBean, not on beans managed
    by CDI. Moreover, the javax.faces.bean package is deprecated since JSF 2.3 in
    favor of CDI.


    ### @ApplicationScoped


    An application-scoped managed bean instance is tied to the lifetime of the web
    application itself. It’s under the hood represented as an attribute of the ServletContext
    which is created on the web application’s deployment and destroyed on the web
    application’s undeployment. Note that this is not equal to the server’s startup
    and shutdown. Web applications can be deployed and undeployed on a running server.


    In other words, there’s only one instance of an application-scoped managed bean
    throughout the web application’s lifetime which is shared across all requests
    and sessions. You could argue that it behaves like a singleton. However, it doesn’t
    actually follow the singleton design pattern. It follows the “just create one”
    design pattern.[⁵](#A454457_1_En_8_Chapter.xhtml#Fn5) A real singleton doesn’t
    have any public constructor but only a static method which returns a statically
    initialized lazy loaded instance. A real JavaBean, on the other hand, requires
    the presence of a default constructor.


    By default, an application-scoped bean managed instance is created for the first
    time when the web application’s code accesses it for the first time during the
    web application’s lifetime. It’s thus not, per definition, immediately created
    when the ServletContext instance is created. It is, however, guaranteed when the
    ServletContext instance is destroyed.


    Application-scoped managed beans are useful for application-wide data which needs
    to be initialized only once in the application’s lifetime, or needs to provide
    non-static getters which delegate to static variables, or needs to provide functions
    for usage in EL. The following example makes sure that application settings stored
    in the database are loaded only once and provided as a Map by #{settings} during
    the rest of the application’s lifetime .


    ```

    @ApplicationScoped

    public class ApplicationSettingsProducer {


        private Map<String, String> settings;


        @Inject

        private ApplicationSettingsService applicationSettingsService;


        @PostConstruct

        public void init() {

            settings = applicationSettingsService.getAll();

        }


        @Produces @Named

        public Map<String, String> getSettings() {

            return settings;

        }

    }

    ```


    Note that the @Named annotation is placed on the getter, which implies a managed
    bean name matching the property name: #{settings}. Also note that the getter in
    turn needs the @Produces annotation in order to be recognized as a managed bean
    producer. Following is another example which offers text formatting functions
    .


    ```

    @Named @ApplicationScoped

    public class Format {


        public String date(LocalDate localDate) {

            if (localDate != null) {

                return localDate.format(DateTimeFormatter.ISO_LOCAL_DATE);

            }

            else {

                return "n/a";

            }

        }


        public String currency(BigDecimal amount) {

            if (amount != null) {

                return NumberFormat.getCurrencyInstance(Locale.US)

                    .format(amount);

            }

            else {

                return "n/a";

            }

        }

    }

    ```


    This could be useful in, for example, a data table to keep the Facelets code terse.


    ```

    <h:dataTable value="#{cart.products}" var="product">

        <h:column>#{format.date(product.lastModified)}</h:column>

        <h:column>#{format.currency(product.discount)}</h:column>

    </h:dataTable>

    ```


    It’s also useful in case you need a formatted value in an attribute which doesn’t
    allow a nested <h:outputText><f:convertXxx>.


    ```

    <h:commandLink ... title="Last visited #{format.date(user.lastVisited)}">

    ```'
  trans: "\n再次强调，自 JSF 2.3 起，JSF 的 Bean 管理功能已正式弃用。在新的 JSF 应用程序中，你绝对不应再使用它。出于向后兼容的考虑，它仍会保留在\
    \ JSF API 中，但 `javax.faces.bean` 包很可能会在未来的某个 JSF 版本中被完全移除。现有的 JSF 应用程序应尽快迁移到 CDI。CDI\
    \ 在普通的 Java EE 应用服务器中原生可用，并且在功能精简的 Servlet 容器中也相对容易安装。例如，作为 CDI 实现之一的 JBoss Weld，只需在项目中添加一个依赖\
    \ `org.jboss.weld.servlet:weld-servlet-shaded` 即可安装在 Tomcat 中⁴，无需额外操作。\n\n## 作用域\n\
    \n受管 Bean 的作用域基本上代表了受管 Bean 的生命周期。如前一节所述，从纯 JSP/Servlet 的角度来看，作用域由作为 `ServletContext`、`HttpSession`\
    \ 或 `ServletRequest` 属性放入的对象来表示。这些对象将分别成为应用程序作用域、会话作用域和请求作用域。这也是 CDI 等技术的运作方式；它只是在其上增加了一个额外的抽象层，这样你就不再需要手动创建对象并将其放入特定的作用域中。\n\
    \n在标准 JSF 中，以下 CDI 受管 Bean 作用域可用于 JSF 的后台 Bean，按生命周期从长到短排列。\n\n1.  `@javax.enterprise.context.ApplicationScoped`\n\
    2.  `@javax.enterprise.context.SessionScoped`\n3.  `@javax.enterprise.context.ConversationScoped`\n\
    4.  `@javax.faces.flow.FlowScoped`\n5.  `@javax.faces.view.ViewScoped`\n6.  `@javax.enterprise.context.RequestScoped`\n\
    7.  `@javax.enterprise.context.Dependent`\n\n请注意，`javax.faces.bean` 包也定义了一组作用域，但它们仅适用于由\
    \ JSF 的 `@ManagedBean` 管理的 Bean，不适用于由 CDI 管理的 Bean。此外，自 JSF 2.3 起，`javax.faces.bean`\
    \ 包已被弃用，转而推荐使用 CDI。\n\n### @ApplicationScoped\n\n应用程序作用域的受管 Bean 实例与 Web 应用程序本身的生命周期绑定。它在底层表示为\
    \ `ServletContext` 的一个属性，该属性在 Web 应用程序部署时创建，在 Web 应用程序取消部署时销毁。请注意，这不等同于服务器的启动和关闭。Web\
    \ 应用程序可以在正在运行的服务器上进行部署和取消部署。\n\n换句话说，在整个 Web 应用程序的生命周期内，只有一个应用程序作用域的受管 Bean 实例，该实例在所有请求和会话之间共享。你可以认为它的行为类似于单例。然而，它实际上并未遵循单例设计模式。它遵循的是“仅创建一个”设计模式。⁵\
    \ 真正的单例没有任何公共构造函数，只有一个静态方法，该方法返回一个静态初始化的延迟加载实例。另一方面，一个真正的 JavaBean 需要一个默认构造函数的存在。\n\
    \n默认情况下，应用程序作用域的受管 Bean 实例是在 Web 应用程序的生命周期内，当 Web 应用程序的代码首次访问它时创建的。因此，它并非在 `ServletContext`\
    \ 实例创建时立即创建。但是，可以保证在 `ServletContext` 实例销毁时它会被销毁。\n\n应用程序作用域的受管 Bean 对于需要在应用程序生命周期内仅初始化一次的应用程序范围数据非常有用，或者需要提供委托给静态变量的非静态\
    \ getter 方法，或者需要提供用于 EL 表达式的函数。以下示例确保存储在数据库中的应用程序设置仅加载一次，并在应用程序的其余生命周期内通过 `#{settings}`\
    \ 以 `Map` 形式提供。\n\n```\n@ApplicationScoped\npublic class ApplicationSettingsProducer\
    \ {\n\n    private Map<String, String> settings;\n\n    @Inject\n    private ApplicationSettingsService\
    \ applicationSettingsService;\n\n    @PostConstruct\n    public void init() {\n\
    \        settings = applicationSettingsService.getAll();\n    }\n\n    @Produces\
    \ @Named\n    public Map<String, String> getSettings() {\n        return settings;\n\
    \    }\n}\n```\n\n请注意，`@Named` 注解放在 getter 方法上，这意味着受管 Bean 的名称与属性名称匹配：`#{settings}`。同时请注意，getter\
    \ 方法本身需要 `@Produces` 注解才能被识别为受管 Bean 生产者。以下是另一个提供文本格式化函数的示例。\n\n```\n@Named @ApplicationScoped\n\
    public class Format {\n\n    public String date(LocalDate localDate) {\n     \
    \   if (localDate != null) {\n            return localDate.format(DateTimeFormatter.ISO_LOCAL_DATE);\n\
    \        }\n        else {\n            return \"n/a\";\n        }\n    }\n\n\
    \    public String currency(BigDecimal amount) {\n        if (amount != null)\
    \ {\n            return NumberFormat.getCurrencyInstance(Locale.US)\n        \
    \        .format(amount);\n        }\n        else {\n            return \"n/a\"\
    ;\n        }\n    }\n}\n```\n\n这在例如数据表中保持 Facelets 代码简洁时非常有用。\n\n```\n<h:dataTable\
    \ value=\"#{cart.products}\" var=\"product\">\n    <h:column>#{format.date(product.lastModified)}</h:column>\n\
    \    <h:column>#{format.currency(product.discount)}</h:column>\n</h:dataTable>\n\
    ```\n\n当你需要在不允许嵌套 `<h:outputText><f:convertXxx>` 的属性中使用格式化值时，它也非常有用。\n\n```\n\
    <h:commandLink ... title=\"Last visited #{format.date(user.lastVisited)}\">\n\
    ```\n"
- fmt: "### `@SessionScoped`\n\n一个会话作用域的托管 Bean 实例与已建立的 HTTP 会话的生命周期绑定。在底层，它表示为 `HttpSession`\
    \ 的一个属性，该属性为每个唯一客户端按需创建，由 Web 应用程序的代码触发。当 Web 应用程序的代码第一次直接或间接通过 `HttpServletRequest#getSession()`\
    \ 访问 `HttpSession` 时，Servlet 容器会创建一个新的 `HttpSession` 实例，生成一个长且唯一的 ID，并将其存储在服务器内存中。Servlet\
    \ 容器还会在 HTTP 响应上设置一个会话 Cookie，其 Cookie 名称为 `JSESSIONID`，Cookie 值为唯一的会话 ID。“会话\
    \ Cookie”通过缺少“最大年龄”属性来识别。\n\n根据 HTTP Cookie 规范，只要 Cookie 有效，客户端（Web 浏览器）就需要在后续请求的标头中将其发送回来。在任何主流的\
    \ Web 浏览器中，你都可以在 Web 开发者工具集的“网络”部分检查请求和响应标头，该工具集可通过在浏览器中按 `F12` 访问。Servlet 容器会检查每个传入的\
    \ HTTP 请求，查找名称为 `JSESSIONID` 的 Cookie，并使用其值（会话 ID）从服务器内存中获取关联的 `HttpSession` 实例。\n\
    \n在服务器端，`HttpSession` 实例会一直保持活动状态，直到超过 `web.xml` 中 `<session-timeout>` 设置指定的超时时间（大多数\
    \ Servlet 容器默认为 30 分钟）未被访问。因此，当客户端访问 Web 应用程序的时间超过指定时间时，Servlet 容器将销毁 `HttpSession`\
    \ 实例。随后的每个 HTTP 请求，即使带有指定的 Cookie，也无法再访问该 `HttpSession` 实例；Servlet 容器会创建一个新的 `HttpSession`\
    \ 实例，并用新的会话 ID 覆盖 Cookie 值。\n\n在客户端，默认情况下，所有会话 Cookie 在浏览器实例运行期间保持有效。因此，当客户端关闭浏览器实例时，所有会话\
    \ Cookie 都会在客户端被销毁。在新的浏览器实例中，之前浏览器会话的会话 Cookie 不再可用，因此浏览器不会发送任何 `JSESSIONID` Cookie。服务器会将其解释为一个全新的会话。与之前浏览器会话关联的\
    \ `HttpSession` 实例将在服务器端静默过期。\n\n默认情况下，会话作用域的托管 Bean 实例在 HTTP 会话生命周期内，当 Web 应用程序代码第一次访问它时被创建。因此，它并不一定在\
    \ `HttpSession` 实例创建时立即创建。然而，可以保证的是，当 `HttpSession` 实例被销毁时，它也会被销毁。会话作用域的托管 Bean\
    \ 在同一浏览器会话内的所有浏览器标签页之间有效共享。\n\n会话作用域的托管 Bean 对于跟踪客户端特定数据非常有用，例如表示当前登录用户的实体、所选语言以及其他与用户相关的偏好设置。以下示例计算当前区域设置，并为其提供\
    \ getter/setter，以便在视图中获取它，并通过 `UIInput` 组件进行修改。\n\n```java\n@Named @SessionScoped\n\
    public class ActiveLocale implements Serializable {\n\n    private Locale current;\n\
    \n    @PostConstruct\n    public void init() {\n        FacesContext context =\
    \ FacesContext.getCurrentInstance();\n        current = context.getApplication()\n\
    \            .getViewHandler().calculateLocale(context);\n    }\n\n    // Getter+setter.\n\
    }\n```\n\n更详细的示例可以在第 [14](#A454457_1_En_14_Chapter.xhtml) 章的“更改活动区域设置”部分找到。请注意，会话作用域的托管\
    \ Bean 必须实现 `Serializable`，因为存储这些 Bean 的 `HttpSession` 实例本身在服务器重启时可能会被写入磁盘，甚至在具有可分发会话的服务器集群配置中，可能会通过网络传输到不同的服务器。\n\
    \n另一个经典示例是“购物车”。\n\n```java\n@Named @SessionScoped\npublic class Cart implements\
    \ Serializable {\n\n    private List<Product> products = new ArrayList<>();\n\n\
    \    public void addProduct(Product product) {\n        products.add(product);\n\
    \    }\n\n    // ...\n}\n```"
  raw: '### @SessionScoped


    A session-scoped managed bean instance is tied to the lifetime of the established
    HTTP session. It’s under the hood represented as an attribute of the HttpSession
    which is created for every unique client on demand of the web application’s code.
    When the web application’s code directly or indirectly pokes the HttpSession for
    the first time via HttpServletRequest#getSession(),the servlet container will
    create a new HttpSession instance, generate a long and unique ID, and store it
    in server’s memory. The servlet container will also set a session cookie on the
    HTTP response with “JSESSIONID” as the cookie name and the unique session ID as
    the cookie value. A “session cookie” is identified by the absence of the “maximum
    age” attribute.


    As per the HTTP cookie specification, the client (the web browser) is required
    to send this cookie back in the header of the subsequent requests as long as the
    cookie is valid. In any decent web browser you can inspect the request and response
    headers in the “Network” section of the web developer’s toolset which is accessible
    by pressing F12 in the web browser. The servlet container will check every incoming
    HTTP request for the presence of the cookie with the name “JSESSIONID” and use
    its value (the session ID) to get the associated HttpSession instance from server’s
    memory.


    On the server side, the HttpSession instance stays alive until it has not been
    accessed for more than the timeout value as specified in the <session-timeout>
    setting of web.xml, which defaults to 30 minutes on most if not all servlet containers.
    So, when the client doesn’t visit the web application for longer than the time
    specified, the servlet container will destroy the HttpSession instance. Every
    subsequent HTTP request, even with the cookie specified, will not have access
    to the HttpSession instance anymore; the servlet container will create a new HttpSession
    instance and overwrite the cookie value with the new session ID.


    On the client side, by default, all session cookies stay alive for as long as
    the browser instance is running. So, when the client shut downs the browser instance,
    all session cookies are destroyed on the client side. In a new browser instance,
    the session cookies from a previous browser session are not available any more,
    so the browser won’t send any JSESSIONID cookie. The server will then interpret
    it as a brand-new session. The HttpSession instance associated with the previous
    browser session will silently expire on the server side.


    By default, a session-scoped managed bean instance is created for the first time
    when the web application’s code accesses it for the first time during the HTTP
    session’s lifetime. It’s thus not, per definition, immediately created when the
    HttpSession instance is created. It is, however, guaranteed to be destroyed when
    the HttpSession instance is destroyed. Session-scoped managed beans are effectively
    shared across all browser tabs within the same browser session .


    Session-scoped managed beans are useful for keeping track of client-specific data,
    such as the entity representing the currently logged-in user, the selected language,
    and other user-related preferences. The following example calculates the current
    locale and provides a getter/setter for it so that it can be obtained in the view
    and modified by an UIInput component.


    ```

    @Named @SessionScoped

    public class ActiveLocale implements Serializable {


    private Locale current;


    @PostConstruct

        public void init() {

            FacesContext context = FacesContext.getCurrentInstance();

            current = context.getApplication()

                .getViewHandler().calculateLocale(context);

        }


    // Getter+setter.

    }

    ```


    A more elaborate example can be found in the section “Changing the Active Locale”
    in Chapter [14](#A454457_1_En_14_Chapter.xhtml). Do note that session-scoped managed
    beans must implement Serializable because the HttpSession instance itself, where
    those beans are being stored, is subject to being written to disk in case of a
    server restart or even to being transferred over the network to a different server
    in case of a server cluster configuration with a distributable session .


    Another classic example is a “shopping cart.”


    ```

    @Named @SessionScoped

    public class Cart implements Serializable {


    private List<Product> products = new ArrayList<>();


    public void addProduct(Product product) {

            products.add(product);

        }


    // ...

    }

    ```'
