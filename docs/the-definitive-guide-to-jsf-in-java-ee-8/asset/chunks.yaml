    “组件超类”列指定了该组件所继承的最重要的 UIComponent 超类。您必须将指定的类理解为来自 `javax.faces.component` 包。


    “值类型”列指定了组件 `value` 属性背后模型值所支持的类型（如果存在）。如果值类型是 `String`，则意味着只有模型值的 `toString()`
    结果会被用作组件的值，通常用于将其渲染为某种标签的组件。如果是 `Object`，则意味着它支持任何类型的值，通常用于将其渲染为文本或将其解析为输入值的组件，必要时可借助隐式或显式转换器。如果值类型是
    `Object[]`，则意味着它需要一个对象数组或集合作为模型值，通常用于数据和多选输入组件，必要时可借助隐式或显式转换器。


    有两个专门的输入组件：`<h:inputFile>` 将上传的文件绑定到 `javax.servlet.http.Part` 属性，并且出于安全原因不支持输出该文件；`<h:selectBooleanCheckbox>`
    将选中值绑定到一个布尔属性。这两个输入组件不支持转换器，因此也不支持任何其他模型值类型。


    “HTML 输出”列指定了生成的最小 HTML 输出。如果 HTML 输出显示“如有必要”，则意味着仅当组件指定了任何需要作为 HTML 元素属性输出的属性（例如
    `id`、`styleClass`、`onclick` 等）时，才会发出指定的 HTML 元素。也就是说，组件可以具有完全不会出现在生成的 HTML 输出中的属性，例如
    `binding`、`rendered`、`converter` 等。如果一个组件可以有多种 HTML 元素表示形式，那么通常由 `layout` 属性控制，正如您在
    `<h:messages>` 和 `<h:panelGroup>` 中看到的那样。如果 HTML 输出包含“*”（星号），则意味着该组件可能会发出零个或多个指定的嵌套
    HTML 元素。


    “起始版本”列指示该 HTML 组件首次可用的 JSF 版本。在撰写本书时，可用的 JSF 版本如下：1.0（2004 年 3 月）、1.1（2004 年
    5 月）、1.2（2006 年 5 月）、2.0（2009 年 7 月）、2.1（2010 年 11 月）、2.2（2013 年 3 月）和 2.3（2017
    年 3 月）。


    各个 HTML 组件的详细信息将在第 4 章和第 6 章中介绍。


    ## 标准核心标签


    除了标准 HTML 组件之外，JSF 还提供了一组“核心”标签。这些本质上是“辅助”标签，允许您通过嵌套在目标 HTML 组件中或包裹它们来声明式地配置一个或多个目标
    HTML 组件。这些核心标签可在 XML 命名空间 URI `http://xmlns.jcp.org/jsf/core` 下找到，该 URI 应分配给 XML
    命名空间前缀 `"f"`。


    ```

    xmlns:f="http://xmlns.jcp.org/jsf/core"

    ```


    从技术上讲，这些标签旨在可重用于非 HTML 组件。JSF 提供了将不同的渲染工具包附加到组件树的可能性，该工具包不生成 HTML 输出，而是生成不同的标记——因此使用了不同的
    XML 命名空间。表 3-2 提供了一个概览。

    '
