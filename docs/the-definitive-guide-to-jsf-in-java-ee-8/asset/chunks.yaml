- fmt: '### What About Java EE?


    Note that you do **not** need to download and install Java EE from Oracle.com
    even though JSF itself is part of Java EE. Java EE is basically an abstract specification
    of which the so-called application servers represent the concrete implementations.
    Examples of those application servers are Payara, WildFly, TomEE, GlassFish, and
    Liberty. It is exactly those application servers that actually provide among others
    JSF (JavaServer Faces), EL (Expression Language), CDI (Contexts and Dependency
    Injection), EJB (Enterprise JavaBeans), JPA (Java Persistence API), Servlet, WebSocket,
    and JSON-P (JavaScript Object Notation Processing), APIs (application programming
    interfaces) out of the box.


    There also exist so-called servlet containers which provide basically only the
    Servlet, JASPIC (Java Authentication Service Provider Interface for Containers),
    JSP (JavaServer Pages), EL, and WebSocket APIs out of the box, such as Tomcat
    and Jetty. However, it would require some work to manually install and configure,
    among others, JSF, JSTL (JSP Standard Tag Library), CDI, EJB, and JPA on such
    a servlet container. It is not even trivial in the case of EJB as it requires
    modifying the servlet container’s internals. That is, by the way, exactly why
    TomEE exists. It’s a Java EE application server built on top of the barebones
    Tomcat servlet container engine.


    Coming back to the Java EE download at Oracle.com, it would give you basically
    the GlassFish server, along with a bunch of documentation and optionally the Netbeans
    IDE. We do not need it as we are already using Payara as the Java EE application
    server, and are targeting Eclipse as IDE. Therefore, the Java SE JDK is sufficient.


    ## Installing Payara


    Payara is an open source Java EE application server which is in 2014 forked from
    GlassFish. It is basically a response to Oracle’s announcement to stop its commercial
    support for GlassFish, so companies previously using GlassFish commercially could
    effortlessly switch to Payara and continue enjoying commercial support. Thanks
    to commercial support for business customers previously using GlassFish, the Payara
    application server software can continuously be bug-fixed and improved.


    The first Payara version with JSF 2.3 integrated is 5. You can download it from
    [https://payara.fish](https://payara.fish). Make sure you choose either the “Payara
    Server Full” or “Payara Server Web Profile” download and not, for example, the
    “Payara Micro” or “Payara Embedded,” as they have other purposes. Installing is
    basically a matter of unzipping the downloaded file and putting it somewhere in
    your home folder. We’ll leave it there until we have Eclipse up and running, so
    that we can then integrate Payara in Eclipse and let it manage the server.


    ### How About Other Servers?


    The choice for Payara in this book is primarily because it is at time of this
    writing one of the very few available Java EE application servers with JSF 2.3
    integrated. The other one is GlassFish, but we would rather not advocate it as
    it would basically offer no commercial support or bug fixes. GlassFish must be
    seen as a true reference implementation for other application server vendors so
    they can, if necessary, build their application server implementation by example.


    WildFly, TomEE, and Liberty did not, at the time of writing, have a version available
    with JSF 2.3 integrated.


    ## Installing Eclipse


    Eclipse is an open source IDE written in Java. It is basically like notepad but
    with thousands if not millions of extra features, such as automatically compiling
    class files, building a WAR file with them, and deploying it to an application
    server without the need to manually fiddle around with `javac` in a command console.


    Eclipse is available in a lot of flavors. As we’re going to develop with Java
    EE, we need the one saying “Eclipse IDE for Java EE developers.” It’s usually
    the top-ranked download link at [http://eclipse.org/downloads/eclipse-packages/](http://eclipse.org/downloads/eclipse-packages/).
    Also here, installing is basically a matter of unzipping the downloaded file and
    putting it somewhere in your home folder.


    In Windows and Linux you’ll find the `eclipse.ini` configuration file in the unzipped
    folder. In Mac OS this configuration file is located in `Eclipse.app/Contents/Eclipse`.
    Open this file for editing. We want to increase the allocated memory for Eclipse.
    At the bottom of `eclipse.ini`, you’ll find the following lines:


    ```

    -Xms256m

    -Xmx1024m

    ```


    This sets, respectively, the initial and maximum memory size pool which Eclipse
    may use. This is a bit too low when you want to develop a bit of a decent Java
    EE application. Let’s at least double both the values.


    ```

    -Xms512m

    -Xmx2g

    ```


    Watch out that you don’t declare more than the available physical memory. When
    the actual memory usage exceeds the available physical memory, it will continue
    into virtual memory, usually in a swap file on disk. This will greatly decrease
    performance and result in major hiccups and slowdowns.


    Now you can start Eclipse by executing the `eclipse` executable in the unzipped
    folder. You will be asked to select a directory as workspace. This is the directory
    where Eclipse will save all workspace projects and metadata.


    After that, Eclipse will show a welcome screen. This is not interesting for now.
    You can click the *Workbench* button on the right top to close the welcome screen.
    Untick if necessary “Always show Welcome at start up” on the bottom right. After
    that, you will enter the workbench. By default, it looks like the screenshot in
    Figure [2-1](#A454457_1_En_2_Chapter.xhtml#Fig1).


    ![A454457_1_En_2_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig1_HTML.jpg)


    ###### Figure 2-1 Eclipse workbench


    ### Configuring Eclipse


    Before we can start writing code, we would like to fine-tune Eclipse a bit so
    that we don’t eventually end up in trouble or with annoyances. Eclipse has an
    enormous amount of settings, and some of its default values should not have been
    the default values. You can verify and configure the settings via *Window ➤ Preferences*.


    *   *General ➤ Workspace ➤ Text file encoding* must be set to **UTF-8**. Particularly
    in Windows this might otherwise default to the proprietary encoding CP-1252 which
    does not support any characters beyond the Latin range. When reading and saving
    Unicode files with CP-1252, you risk seeing unintelligible sequences of characters.
    This is also called “mojibake.”.[¹](#A454457_1_En_2_Chapter.xhtml#Fn1)


    *   *General ➤ Workspace ➤ New text file line delimiter* must be set to **Unix**.
    It works just fine on Windows as well. This will particularly keep version control
    systems happy. Otherwise, developers pulling code on different operating systems
    might face confusing conflicts or diffs caused by different line endings.


    *   *General ➤ Editors ➤ Text editors ➤ Spelling* should preferably be **disabled**.
    This will save you from a potentially big annoyance, because it unnecessarily
    also spellchecks XML configuration files such as `faces-config.xml` and `web.xml`,
    causing confusing errors and warnings in those files.


    *   *Java ➤ Compiler ➤ Compiler compliance level* must be set to **1.8**. This
    is the minimum required Java version for Java EE 8.


    *   *Java ➤ Installed JREs* must be set to the **JDK**, not to the JRE. This setting
    will normally also be used to execute the integrated application server which
    usually requires the JDK.'
