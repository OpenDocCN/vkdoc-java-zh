  trans: '

    ###### 图 14-1 更改活动区域设置


    `#{activeLocale.languageTag}` 属性在内部委托给当前的 `java.util.Locale` 实例。这主要是为了方便，这样当我们想在
    `<h:selectOneMenu>` 中使用 `#{activeLocale.current}` 时，就不必为其添加转换器了。


    `<f:ajax listener>` 基本上是在 Ajax 请求完成后，借助一段 JavaScript 代码来执行完整的页面重新加载。这是通过向 `PartialViewContext#getEvalScripts()`
    方法添加脚本来实现的，该方法是 JSF 2.3 中新增的。任何添加的脚本最终都会按顺序出现在 JSF Ajax 响应的 `<eval>` 部分，并在 JSF
    Ajax 引擎更新了 HTML DOM（文档对象模型）树之后执行。


    脚本本身 `location.replace(location)` 基本上指示 JavaScript 重新加载当前文档，而不在历史记录中保留前一个文档。这意味着后退按钮不会重新显示同一页面。你也可以使用
    `location.reload(true)` 代替，但如果之前在同一文档上触发了同步（非 Ajax）POST 请求，这种方法就无法很好地工作。它会重新执行该请求并导致重复提交。而且，它还会不必要地在历史记录中记住前一页面。这可能会导致令人困惑的行为，因为后退按钮似乎没有效果——它会重新显示完全相同的页面，因为活动区域设置存储在会话中，而不是请求中。


    或者，在这种特定用例中，你也可以不使用 `<f:ajax listener>`，而仅使用 `<f:ajax render="@all">`，无需任何监听器。它至少有一个缺点：文档的标题不会被更新。无论如何，使用
    `@all` 通常被认为是一种不好的做法。它只有一个合法的实际用例：在 Ajax 请求上显示完整的错误页面。


    作为另一种完全不同的替代方案，你可以将活动区域设置设为请求作用域而非会话作用域，方法是将语言标签包含在 URL 中，例如 [`example.com/en/page.xhtml`](http://example.com/en/page.xhtml)、[`example.com/pt/page.xhtml`](http://example.com/pt/page.xhtml)、[`example.com/hi/page.xhtml`](http://example.com/hi/page.xhtml)。这样，你只需点击链接即可更改活动区域设置。这只需要一个
    Servlet 过滤器，从 URL 中提取 `java.util.Locale` 实例并将其转发到所需的 JSF 页面，以及一个自定义视图处理器，将语言标签包含在任何
    `<h:form>`、`<h:link>` 和 `<h:button>` 组件生成的 URL 中。你可以在 Java EE Kickoff 应用程序中找到入门示例。⁵


    ## 组织资源包键


    当 Web 应用程序增长时，你可能会注意到资源包文件开始变得难以维护。关键在于遵循非常严格的约定来组织资源包键。可重用的站点级条目（通常用作输入标签、按钮标签、链接标签、表头标签等）应使用通用前缀作为键（例如，“label.save=保存”）。特定于页面的条目应使用页面特定的前缀作为键（例如，“foldername_pagename.title=某个页面标题”）。以下是一个本地化
    Facelets 模板的详细示例，`/WEB-INF/templates/page.xhtml`：


    ```

    <!DOCTYPE html>

    <html lang="#{activeLocale.language}"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

        xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"

        xmlns:fn="http://xmlns.jcp.org/jsp/jstl/functions"

    >

        <c:set var="page" value="page#{fn:replace(

            fn:split(view.viewId, ''.'')[0], ''/'', ''_'')}" scope="view" />

        <f:view locale="#{activeLocale.current}">

            <h:head>

                <title>#{text[page += ''.title'']}</title>

                <meta name="description"

                    content="#{text[page += ''.meta.description'']}" />

            </h:head>

            <h:body id="#{page}">

                <header>

                    <nav>

                        <h:link outcome="/home"

                            value="#{text[''label.home'']}" />

                        <h:link outcome="/login"

                            value="#{text[''label.login'']}" />

                        <h:link outcome="/signup"

                            value="#{text[''label.signup'']}" />

                    </nav>

                    <h:form>

                        <h:selectOneMenu

                                value="#{activeLocale.languageTag}">

                            <f:selectItems

                                value="#{activeLocale.available}" var="l"

                                itemValue="#{l.toLanguageTag()}"

                                itemLabel="#{l.getDisplayLanguage(l)}">

                            </f:selectItems>

                            <f:ajax listener="#{activeLocale.reload()}" />

                        </h:selectOneMenu>

                    </h:form>

                </header>

                <main>

                    <h1>#{text[page += ''.title'']}</h1>

                    <ui:insert name="content" />

                </main>

                <footer>

                    © #{text[''page_home.title'']}

                </footer>

            </h:body>

        </f:view>

    </html>

    ```


    JSTL 的 `<c:set>` 基本上将 `UIViewRoot#getViewId()` 转换为一个适合用作页面特定前缀的字符串。JSF 视图 ID 基本上代表了表示
    JSF 页面的物理文件的绝对服务器端路径（例如，“/user/account.xhtml”）。这需要被处理成适合作为资源包键的格式。`fn:split()`
    调用从中提取出 “/user/account” 部分，而 `fn:replace()` 调用将正斜杠转换为下划线，使其变成 “_user_account”。最后，`<c:set>`
    将其以 “page_user_account” 的形式存储在视图作用域中，名称为 “page”，以便在同一视图的其他地方可以作为 `#{page}` 使用。


    你会注意到 `#{page}` 又被用作 `<h:body>` 的 ID 等。这使得在需要时，可以更容易地从通用的 CSS（层叠样式表）文件中选中特定页面。`#{page}`
    还被用于多个资源包引用中，例如 `#{text[page += ''.title'']}`，在 “/home.xhtml” 的情况下，它最终引用了键 “page_home.title”。使用这样的模板，你可以拥有以下特定于页面的资源包条目：


    ```

    page_home.title = 我的网站

    page_home.meta.description = 一个 Hello World JSF 应用程序。


    page_login.title = 登录

    page_login.meta.description = 登录到我的网站。


    page_signup.title = 注册

    page_signup.meta.description = 注册到我的网站。

    ```

