    }

    ```


    In hindsight, it’s relatively simple. We’re delegating as much as possible of
    the hard work to the JSF-provided UIData superclass. In the encodeBegin() you
    start the <ul> element when the data model is not empty. This is to be checked
    by examining the result of UIData#getRowCount(). Its Javadoc[¹](#A454457_1_En_11_Chapter.xhtml#Fn1)
    basically says:


    > *Return the number of rows in the underlying data model. If the number of available
    rows is unknown, return -1.*


    The term “rows” is indeed strongly related to tables. This is also what this superclass
    is originally designed for: <h:dataTable>. The term “item” would have been more
    general, but it is what it is.


    Then, in the encodeChildren() method , we set the current row index via the UIData#setRowIndex()
    method, start the <li> element, encode all children as is via UIComponent#encodeAll()
    on each of them, and finally end the <li> element. Once the loop is done, we explicitly
    make it clear to the UIData superclass by invoking UIData#setRowIndex() with a
    value of -1\. Its Javadoc[²](#A454457_1_En_11_Chapter.xhtml#Fn2) says:


    > *If the new rowIndex value is -1: If the var property is not null, remove the
    corresponding request scope attribute (if any). Reset the state information for
    all descendant components.*


    It thus clears out any state related to the iteration. This is very important;z
    otherwise it might cause side effects further down in the component tree or even
    cause a corrupted view state when it by itself needs to traverse the data model.
    Finally, in the encodeEnd() method , it will end the <ul> element based on same
    conditions as in encodeBegin().


    The UIData#setRowIndex() call in the encodeChildren() method will under the hood
    extract the data model from the value attribute and wrap it in a suitable implementation
    of the javax.faces.model.DataModel abstract class.[³](#A454457_1_En_11_Chapter.xhtml#Fn3)
    So far, as per the Javadoc of UIData#getValue(),[⁴](#A454457_1_En_11_Chapter.xhtml#Fn4)
    the following types of the object behind the value attribute are supported, in
    this scanning order:


    1.  java.util.List (since 1.0)


    2.  Arrays (since 1.0)


    3.  java.sql.ResultSet (since 1.0)


    4.  javax.servlet.jsp.jstl.sql.Result (since 1.0)


    5.  java.util.Collection (since 2.2)


    6.  java.lang.Iterable (since 2.3)


    7.  java.util.Map (since 2.3)


    8.  Types for which a suitable DataModel has been registered via @FacesDataModel
    (since 2.3)


    9.  All other types will be adapted using the ScalarDataModel class, which will
    treat the object as a single row of data (since 1.0)


    You would indeed not expect to see anyone passing around a plain java.sql.ResultSet
    in a modern Java EE application, let alone see JSP pages with JSTL <sql:xxx> tags.
    But this all is for backward compatibility . Remember, JSF was introduced in 2004\.
    Backward compatibility was one of its strongest keys in surviving up to today.
    They’re certainly candidates to be removed, but not now.


    And, there’s indeed an overlap between some types; List and Collection could easily
    be covered by Iterable as they both implement this interface. But this has a performance
    reason. For a List, the items are accessed directly by index by the ListDataModel;
    for a Collection, the items are extracted first via Collection#toArray() and then
    accessed by index by the CollectionDataModel; and for an Iterable, the items are
    simply iterated and collected into a new List first by the IterableDataModel.
    It may make a difference.


    You’ll also see that JSF 2.3 has not only added two new data models but even introduces
    a new annotation to register a custom one. Previously, you’d need to manually
    wrap the custom collection in the custom data model every time before passing
    to a UIData component. The DataModel abstract class has the disadvantage of not
    being Serializable itself which more or less forces you to make a @ViewScoped
    bean holding such a data model to have a lazy loading getter on a transient data
    model property as follows:


    ```

    private YourCollection yourCollection;

    private transient YourDataModel dataModel;


    public DataModel getDataModel() {

        if (dataModel == null) {

            dataModel = new YourDataModel(yourCollection);

        }

        return dataModel;

    }

    ```


    Ideally, the UIData should by itself recognize YourCollection type and automatically
    wrap it in a YourDataModel. The new @FacesDataModel annotation does exactly that.


    ```

    @FacesDataModel(forClass=YourCollection.class)

    public class YourDataModel<E> extends DataModel<E> {}

    ```


    Coming back to the custom renderer, there’s one method left unexplained: the getRendersChildren().
    It’s been overridden to explicitly return true. You’ll probably ask yourself,
    why was it initially false? Why not just let it be the default behavior of encodeChildren()
    and rely on any overridden encodeChildren() method whether it wants to invoke
    encodeAll() on the children? This was actually an historic oversight in the specification.
    Originally, the encodeAll() method didn’t exist. It was only added in JSF 1.2
    and it basically made the getRendersChildren() obsolete. But for backward compatibility
    this complexity was introduced.


    In a nutshell, always let getRendersChildren() return true if you have overridden
    the encodeChildren() method. Otherwise the children won’t be encoded at all.


    Last but not least, you’ll probably also wonder why we don’t “simply” override
    the encodeBegin(), encodeChildren(), (and getRendersChildren()), and encodeEnd()
    of the DataList component but instead create a “whole” renderer implementation.
    The main reason is: simplicity and extensibility. Those methods are on UIComponent
    specified to do more than only rendering. They also check if the UIComponent#isRendered()
    returns true. encodeBegin() also fires PreRenderComponentEvent and pushes the
    current component into the EL (Expression Language ) scope as #{component}. encodeEnd()
    pops #{component} out of the EL scope. And they also check if there’s a renderer
    attached and, if so, delegate to it. That’s all specified in their Javadoc. You’d
    need to manually take care of them yourself when you override those methods. That’s
    unnecessarily repeated work. And, when someone in the future wants to adjust the
    rendering of the component, they won’t be able to plug a custom renderer if your
    component doesn’t check for it.'
