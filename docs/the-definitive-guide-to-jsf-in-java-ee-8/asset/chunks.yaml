- fmt: "# File-Based Input Component\n\nYes, there is only one file-based input component.\
    \ That’s the `<h:inputFile>`. It has only one additional requirement on the `<h:form>`\
    \ it is being placed in, its `enctype` attribute has to be explicitly set to `multipart/form-data`\
