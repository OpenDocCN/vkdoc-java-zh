    | Validator class | Validator ID | Validator tag | Value type | Since |

    | --- | --- | --- | --- | --- |

    | LongRangeValidator | javax.faces.LongRange | <f:validateLongRange> | java.lang.Number
    | 1.0 |

    | DoubleRangeValidator | javax.faces.DoubleRange | <f:validateDoubleRange> | java.lang.Number
    | 1.0 |

    | LengthValidator | javax.faces.Length | <f:validateLength> | java.lang.Object
    | 1.0 |

    | RegexValidator | javax.faces.RegularExpression | <f:validateRegex> | java.lang.String
    | 2.0 |

    | RequiredValidator | javax.faces.Required | <f:validateRequired> | java.lang.Object
    | 2.0 |

    | BeanValidator | javax.faces.Bean | <f:validateBean> | java.lang.Object | 2.0
    |

    | n/a | n/a | <f:validateWholeBean> | java.lang.Object | 2.3 |


    The “Validator ID” column basically specifies the validator identifier as you
    could specify in the validator attribute of any EditableValueHolder component,
    or the validatorId attribute of any nested <f:validator> tag in order to activate
    the specific validator. Contrary to the converter, a single EditableValueHolder
    component can have multiple validators attached. They will all be executed regardless
    of each other’s outcome.


    ### <f:validateLongRange>/<f:validateDoubleRange>


    These validators allow you to specify a minimum and/or maximum allowed number
    value for an input component tied to a java.lang.Number-based property. Those
    can be specified with the minimum and maximum attributes .


    ```

    <h:inputText value="#{bean.quantity}">

        <f:validateLongRange minimum="1" maximum="10" />

    </h:inputText>

    ```


    This is, via pass-through attributes, also combinable with the HTML5 input types
    “number” (spinner) and “range” (slider), which in turn require min, max, and optionally
    step as pass-through attributes. In this example, #{bean.quantity} is just an
    Integer and #{bean.volume} is a BigDecimal.


    ```

    <h:inputText value="#{bean.quantity}"

        a:type="number" a:min="1" a:max="10">

        <f:validateLongRange minimum="1" maximum="10" />

    </h:inputText>

    <h:inputText value="#{bean.volume}"

        a:type="range" a:min="1" a:max="10" a:step="0.1">

        <f:validateLongRange minimum="1" maximum="10" />

    </h:inputText>

    ```


    Do note that you can just use <f:validateLongRange> on a BigDecimal property.
    It doesn’t care about the actual java.lang.Number type of the property being a
    Long or not, but only the specified minimum and maximum attributes being a Long.
    In case you want to specify a fractional-based number as minimum and/or maximum
    , then use <f:validateDoubleRange> instead.


    ```

    <h:inputText value="#{bean.volume}"

        a:type="range" a:min="0.1" a:max="10.0" a:step="0.1">

        <f:validateDoubleRange minimum="0.1" maximum="10.0" />

    </h:inputText>

    ```


    ### <f:validateLength>/<f:validateRegex>


    These validators are primarily designed for java.lang.String-based properties.
    <f:validateLength> will first convert the submitted value to string by calling
    Object#toString() on it and then validate the String#length() result based on
    the specified minimum and/or maximum attributes. <f:validateRegex> will cast the
    submitted value to String and then check if String#matches() returns true for
    the specified pattern attribute. In other words, it doesn’t accept any other property
    type than java.lang.String. Imagine that you want to validate a value to be always
    three digits; thus there are three possible ways:


    ```

    <h:inputText value="#{bean.someStringOrInteger}" maxlength="3">

        <f:validateLength minimum="3" maximum="3" />

    </h:inputText>


    <h:inputText value="#{bean.someString}" maxlength="3">

        <f:validateRegex pattern="[0-9]{3}" />

    </h:inputText>


    <h:inputText value="#{bean.someInteger}" maxlength="3">

        <f:validateLongRange minimum="100" maximum="999" />

    </h:inputText>

    ```


    The maxlength="3" attribute is just there so that the end user can’t enter more
    than three characters on the client side anyway. Storing numbers as strings is
    plain nonsense, so the second way is scratched. That leaves us with the first
    or third way. Technically it does not really matter which one you pick. The first
    way is arguably more self-documenting because you actually want to validate the
    length, not the range.


    Coming back to <f:validateRegex>, the pattern attribute follows exactly the same
    regular expression rules as specified in java.util.regex.Pattern.[^(17)](#A454457_1_En_5_Chapter.xhtml#Fn17)
    However, there’s one potential caveat: the necessary amount of escape backslashes
    depends on the currently used EL implementation. In Oracle’s EL implementation
    (com.sun.el.*), you need two backslashes, exactly as in a regular Java String,
    but in Apache’s EL implementation (org.apache.el.*), you must use one backslash,
    otherwise it will error out or it won’t match as you’d expect. As of now, Payara,
    WildFly, Liberty, and WebLogic use Oracle’s EL implementation, and TomEE and Tomcat
    use Apache’s EL implementation. In other words, the following example will work
    on servers using Oracle EL but won’t work on servers using Apache EL.


    ```

    <h:inputText value="#{bean.someString}" maxlength="3">

        <f:validateRegex pattern="\\d{3}" />

    </h:inputText>

    ```


    When using Apache EL, you need pattern="\d{3}" instead. On the other hand, the
    regular expression pattern \d actually means “any digit” and thus matches not
    only the Latin digits but also the Hebrew, Cyrillic, Arabic, Chinese, etc. If
    that was not your intent, you’d better use the [0-9] pattern.


    ### <f:validateRequired>


    This is a slightly odd beast. That is, all UIInput components already have a required
    attribute offering exactly the desired functionality. Why would you then use a
    whole <f:validateRequired> tag instead? It was added in JSF 2.0 specifically for
    “Composite Components” (more on this later, in Chapter [7](#A454457_1_En_7_Chapter.xhtml)).
    More to the point, in some composite component compositions the template client
    is given the opportunity to attach converters and validators to a specific EditableValueHolder
    interface exposed by the composite component, which in turn references one or
    more UIInput components enclosed in the composite component implementation. Following
    is an example of such a composite component:


    ```

    <cc:interface>

        ...

        <cc:editableValueHolder

            name="inputs" targets="input1 input3">

        </cc:editableValueHolder>

    </cc:interface>

    <cc:implementation>

        ...

        <h:inputText id="input1" ... />

        <h:inputText id="input2" ... />

        <h:inputText id="input3" ... />

        ...

    </cc:implementation>

    ```


    And following is an example of the template client:


    ```

    <my:compositeComponent ...>

        <f:validateRequired for="inputs" />

    </my:compositeComponent>

    ```


    As you might have guessed, the for attribute must exactly match the name attribute
    of exposed <cc:editableValueHolder> and this validator will basically target the
    enclosed input components identified by input1 and input3 (and thus not input2)
    and thus effectively make them required="true". This for attribute is, by the
    way, also present on all other converter and validator tags .'
  trans: '

    ###### 表 5-3 JSF 提供的标准验证器


    | 验证器类 | 验证器 ID | 验证器标签 | 值类型 | 起始版本 |

    | --- | --- | --- | --- | --- |

    | LongRangeValidator | javax.faces.LongRange | <f:validateLongRange> | java.lang.Number
    | 1.0 |

    | DoubleRangeValidator | javax.faces.DoubleRange | <f:validateDoubleRange> | java.lang.Number
    | 1.0 |

    | LengthValidator | javax.faces.Length | <f:validateLength> | java.lang.Object
    | 1.0 |

    | RegexValidator | javax.faces.RegularExpression | <f:validateRegex> | java.lang.String
    | 2.0 |

    | RequiredValidator | javax.faces.Required | <f:validateRequired> | java.lang.Object
    | 2.0 |

    | BeanValidator | javax.faces.Bean | <f:validateBean> | java.lang.Object | 2.0
    |

    | 不适用 | 不适用 | <f:validateWholeBean> | java.lang.Object | 2.3 |


    “验证器 ID”列基本上指定了验证器标识符，你可以将其指定在任何 `EditableValueHolder` 组件的 `validator` 属性中，或任何嵌套的
    `<f:validator>` 标签的 `validatorId` 属性中，以激活特定的验证器。与转换器相反，单个 `EditableValueHolder`
    组件可以附加多个验证器。无论彼此的结果如何，它们都将被执行。


    ### <f:validateLongRange>/<f:validateDoubleRange>


    这些验证器允许你为绑定到基于 `java.lang.Number` 属性的输入组件指定最小和/或最大允许数值。这些值可以通过 `minimum` 和 `maximum`
    属性来指定。


    ```

    <h:inputText value="#{bean.quantity}">

        <f:validateLongRange minimum="1" maximum="10" />

    </h:inputText>

    ```


    通过传递属性，这也可以与 HTML5 输入类型“number”（数字微调器）和“range”（滑块）结合使用，后者需要 `min`、`max` 以及可选的
    `step` 作为传递属性。在此示例中，`#{bean.quantity}` 只是一个 `Integer`，而 `#{bean.volume}` 是一个 `BigDecimal`。


    ```

    <h:inputText value="#{bean.quantity}"

        a:type="number" a:min="1" a:max="10">

        <f:validateLongRange minimum="1" maximum="10" />

    </h:inputText>

    <h:inputText value="#{bean.volume}"

        a:type="range" a:min="1" a:max="10" a:step="0.1">

        <f:validateLongRange minimum="1" maximum="10" />

    </h:inputText>

    ```


    请注意，你可以直接在 `BigDecimal` 属性上使用 `<f:validateLongRange>`。它不关心属性的实际 `java.lang.Number`
    类型是否为 `Long`，只关心指定的 `minimum` 和 `maximum` 属性是否为 `Long`。如果你想指定一个基于小数的数字作为 `minimum`
    和/或 `maximum`，那么请改用 `<f:validateDoubleRange>`。


    ```

    <h:inputText value="#{bean.volume}"

        a:type="range" a:min="0.1" a:max="10.0" a:step="0.1">

        <f:validateDoubleRange minimum="0.1" maximum="10.0" />

    </h:inputText>

    ```


    ### <f:validateLength>/<f:validateRegex>


    这些验证器主要设计用于基于 `java.lang.String` 的属性。`<f:validateLength>` 会首先通过调用 `Object#toString()`
    将提交的值转换为字符串，然后根据指定的 `minimum` 和/或 `maximum` 属性验证 `String#length()` 的结果。`<f:validateRegex>`
    会将提交的值转换为 `String`，然后检查 `String#matches()` 对于指定的 `pattern` 属性是否返回 `true`。换句话说，它不接受除
    `java.lang.String` 之外的任何其他属性类型。假设你想验证一个值始终为三位数字；那么有三种可能的方式：


    ```

    <h:inputText value="#{bean.someStringOrInteger}" maxlength="3">

        <f:validateLength minimum="3" maximum="3" />

    </h:inputText>


    <h:inputText value="#{bean.someString}" maxlength="3">

        <f:validateRegex pattern="[0-9]{3}" />

    </h:inputText>


    <h:inputText value="#{bean.someInteger}" maxlength="3">

        <f:validateLongRange minimum="100" maximum="999" />

    </h:inputText>

    ```


    `maxlength="3"` 属性只是为了让最终用户在客户端无法输入超过三个字符。将数字存储为字符串毫无意义，因此第二种方式被排除。这给我们留下了第一种或第三种方式。从技术上讲，选择哪一种并不重要。第一种方式可以说更具自文档性，因为你实际上想要验证的是长度，而不是范围。


    回到 `<f:validateRegex>`，`pattern` 属性遵循与 `java.util.regex.Pattern` 中指定的完全相同的正则表达式规则。¹⁷
    然而，有一个潜在的陷阱：所需的转义反斜杠数量取决于当前使用的 EL 实现。在 Oracle 的 EL 实现（`com.sun.el.*`）中，你需要两个反斜杠，就像在常规的
    Java 字符串中一样；但在 Apache 的 EL 实现（`org.apache.el.*`）中，你必须使用一个反斜杠，否则会出错或无法按预期匹配。截至目前，Payara、WildFly、Liberty
    和 WebLogic 使用 Oracle 的 EL 实现，而 TomEE 和 Tomcat 使用 Apache 的 EL 实现。换句话说，以下示例在使用 Oracle
    EL 的服务器上可以工作，但在使用 Apache EL 的服务器上无法工作。


    ```

    <h:inputText value="#{bean.someString}" maxlength="3">

        <f:validateRegex pattern="\\d{3}" />

    </h:inputText>

    ```


    当使用 Apache EL 时，你需要改用 `pattern="\d{3}"`。另一方面，正则表达式模式 `\d` 实际上表示“任何数字”，因此不仅匹配拉丁数字，还匹配希伯来语、西里尔语、阿拉伯语、中文等数字。如果这不是你的意图，你最好使用
    `[0-9]` 模式。


    ### <f:validateRequired>


    这是一个有点奇怪的家伙。也就是说，所有 `UIInput` 组件都已经有一个 `required` 属性，提供了完全相同的功能。那你为什么还要使用整个 `<f:validateRequired>`
    标签呢？它是在 JSF 2.0 中专门为“复合组件”（更多内容将在第 7 章中介绍）添加的。更确切地说，在某些复合组件组合中，模板客户端有机会将转换器和验证器附加到复合组件暴露的特定
    `EditableValueHolder` 接口，该接口又引用复合组件实现中包含的一个或多个 `UIInput` 组件。以下是此类复合组件的示例：


    ```

    <cc:interface>

        ...

        <cc:editableValueHolder

            name="inputs" targets="input1 input3">

        </cc:editableValueHolder>

    </cc:interface>

    <cc:implementation>

        ...

        <h:inputText id="input1" ... />

        <h:inputText id="input2" ... />

        <h:inputText id="input3" ... />

        ...

    </cc:implementation>

    ```


    以下是模板客户端的示例：


    ```

    <my:compositeComponent ...>

        <f:validateRequired for="inputs" />

    </my:compositeComponent>

    ```


    你可能已经猜到，`for` 属性必须与暴露的 `<cc:editableValueHolder>` 的 `name` 属性完全匹配，并且此验证器将基本上针对由
    `input1` 和 `input3` 标识的封闭输入组件（因此不包括 `input2`），从而有效地使它们成为 `required="true"`。顺便说一下，这个
    `for` 属性也存在于所有其他转换器和验证器标签上。

