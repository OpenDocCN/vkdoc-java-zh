    2012 年，JSF 2.2 的规范制定工作也正如火如荼地进行。JSF 2.2 最终于次年 5 月 21 日发布。JSF 2.2 特别提出了 Facelets
    可运行的替代模式的正式版本：不再在视图上放置组件标签，而是放置纯 HTML，并通过一个特殊的 ID 将标签链接到组件。一般来说，这种模式对 JSF 开发者的吸引力稍弱，但特别受网页设计师的青睐，因为他们可以更轻松地使用纯
    HTML 工具来处理此类视图。JSF 2.2 还引入了与 CDI 兼容的 `@ViewScoped` 注解，这消除了在 JSF 2.1 中仍需使用 JSF
    托管 Bean 机制的最后一个理由，即在该版本中，`@ViewScoped` 仅适用于那些 Bean。JSF 2.2 还引入了两个重要的新特性：Faces
    Flow 和 Resource Contracts，但这些特性在实际中似乎很少被采用。


    就在 JSF 2.3 启动之前，2014 年 7 月 20 日，RichFaces 负责人 Brian Leathem 在其博客上宣布，下一代版本的 RichFaces
    5 将被取消。相反，RichFaces 将“追求稳定而非创新”，这意味着 JBoss 将使 RichFaces 4.x 与 JSF 2.2 兼容，并回溯移植一些原本为
    RichFaces 5 开发的功能。虽然这篇博文有些乐观，但看起来 RichFaces 的结局已定。


    2014 年 8 月 26 日，JSF 2.3 的规范制定工作启动。引入了一位新的联合规范负责人——Manfred Riem，他此前主要致力于 Mojarra
    的实现方面，例如将数百个 JSF 著名的测试从古老且已退役的 Cactus 框架迁移到更现代的基于 Maven 的框架，并确保将大量未解决的 Mojarra
    问题减少到可控数量。JSF 2.3 的开端或许有些引人注目，因为 Oracle 表示只有少量资源可用。在规范制定过程中，这些少量资源减少到了几乎无人能预料到的数字——绝对为零。基本上，在
    JavaOne 2015 之后，几乎所有规范负责人都消失了，导致大多数规范工作突然停滞。Josh Juneau 在其著名的研究报告《Java EE 8，当前状态如何：自
    2015 年底以来已完成工作的案例研究》中报道了此事，该报告通过展示电子邮件、提交和已解决问题的图表，无可辩驳地表明 Oracle 已经撒手不管了。


    幸运的是，JSF 及其参考实现 Mojarra 的开放性使得规范制定工作及其在 Mojarra 中的实现很大程度上可以由其他 EG 成员继续进行，事实也确实如此。


    与此同时，2016 年 2 月 12 日，Red Hat 宣布 RichFaces 将于同年晚些时候（即 2016 年 6 月）停止服务（EOL）。这个曾一度是最受欢迎的
    JSF 组件库之一，常被称为“三大巨头之一”的项目，实际上已不复存在。2016 年 6 月 20 日，项目完成了最后一次实质性提交：“RF-14279: update
    JSDoc”。两天后，Red Hat 发布了 RichFaces 4.5.17，并将 GitHub 仓库设置为归档（只读）模式。仍是 JSF 2.3 EG
    成员的 Brian Leathem 在几天后的 2 月 18 日宣布，他将不再从事任何与 JSF 相关的工作。


    ## 复兴


    2016 年底，JSF 规范负责人短暂回归，但带来的消息是规范必须在短短几周内完成，以便启动（有些）冗长的最终确定流程。2017 年 3 月 28 日，JSF
    2.3 最终发布，它带来了用 CDI 版本替换 JSF 原生工件的开端，并最终实现了本应多年前就完成的事情：弃用 JSF 托管 Bean 机制，转而使用 CDI
    Bean。其他特性包括：使用由 OmniFaces 捐赠的 Java EE WebSocket API 支持 WebSocket、系统中可用视图资源的自省，以及由
    PrimeFaces 捐赠的搜索表达式框架。


    继 JSF 2.3 规范有些动荡的开发过程之后，Oracle 在 2017 年宣布了更为动荡的消息：Java EE（因此也包括 JSF）将移交给 Eclipse
    基金会。Oracle 将停止领导其之前拥有的规范，这同样包括 JSF。这意味着 Mojarra 将被重新授权，JSF 将通过一个新的流程来发展，并且很可能由不同的负责人领导。在撰写本文时，这一移交工作正在全面进行中。


    © Bauke Scholtz, Arjan Tijms 2018


    Bauke Scholtz 和 Arjan Tijms，《Java EE 8 中 JSF 的权威指南》，`doi.org/10.1007/978-1-4842-3387-0_2`


    # 2. 从零开始到 Hello World


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1) 库拉索岛威廉斯塔德


    (2) 荷兰北荷兰省阿姆斯特丹


    在本章中，你将学习如何从零开始，使用 Eclipse IDE（集成开发环境）、Payara 应用服务器和 H2 数据库搭建一个 JSF（JavaServer
    Faces）开发环境。


    ## 安装 Java SE JDK


    你可能已经知道，Java SE 以 JRE 形式提供给最终用户，以 JDK 形式提供给软件开发人员。Eclipse 本身并不严格要求 JDK，因为它有自己的编译器。JSF
    作为一个软件库，运行也不需要 JDK。然而，Payara 确实需要 JDK 才能运行，主要是为了能够编译 JSP 文件，尽管自 JSF 2.0 以来，JSP
    已作为 JSF 视图技术被弃用。


    因此，你需要确保已按照 Oracle 的说明安装了 JDK。当前的 Java SE 版本是 9，但由于 Java EE 8 是为目前更成熟的 Java SE
    8 设计的，因此推荐使用 JDK 8：[`docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html)。


    最重要的部分是：PATH 环境变量应包含存放 Java 可执行文件的 /bin 文件夹（例如，“/path/to/jdk/bin”），并且 JAVA_HOME
    环境变量应设置为 JDK 根文件夹（例如，“/path/to/jdk”）。JSF 本身并不严格要求这些，但 Eclipse 和 Payara 需要它们。Eclipse
    需要 PATH 来查找 Java 可执行文件。Payara 需要 JAVA_HOME 来查找 JDK 工具。

