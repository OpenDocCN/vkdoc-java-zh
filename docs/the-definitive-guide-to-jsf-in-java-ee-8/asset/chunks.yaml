    ## 命令组件


    在前文关于输入和选择组件的章节中，您可能已经注意到了 `<h:commandButton>` 的示例。它会生成一个 HTML `<input type="submit">`
    元素，这是 HTML 中将所在 `<form>` 元素的所有输入值发送到服务器的方式。在服务器端，该组件还能够调用一个或多个 Java 方法，这些方法通常定义在
    `action` 或 `actionListener` 属性中，或者通过嵌套在命令组件中的 `<f:actionListener>` 标签来定义。您还会了解到，动作监听器方法总是在与
    `action` 属性关联的方法之前运行。


    您可以使用 `<f:actionListener>` 标签在同一个命令组件上注册一个或多个额外的动作监听器。所有这些动作监听器会按照它们在视图中声明并附加到组件上的顺序被调用。目标方法可以通过三种方式在
    `<f:actionListener>` 标签上声明。一种方式是通过 `type` 属性，另外两种方式是通过 `binding` 属性。


    ```

    <h:commandButton ...>

        <f:actionListener type="com.example.project.SomeActionListener" />

        <f:actionListener binding="#{beanImplementingActionListener}" />

        <f:actionListener binding="#{bean.someActionListenerMethod()}" />

    <h:commandButton>

    ```


    第一种方式中的 `type` 属性必须表示实现 `ActionListener` 接口的类的完全限定名。


    ```

    package com.example.project;


    import javax.faces.event.ActionListener;

    import javax.faces.event.ActionEvent;


    public class SomeActionListener implements ActionListener {


    @Override

        public void processAction(ActionEvent event) {

            // ...

        }

    }

    ```


    第二种方式中的 `binding` 属性必须引用一个实现了 `ActionListener` 接口的受管 bean 实例。


    ```

    @Named @RequestScoped

    public class BeanImplementingActionListener implements ActionListener {


    @Override

        public void processAction(ActionEvent event) {

            // ...

        }

    }

    ```


    而第三种方式中的 `binding` 属性可以引用任何声明为 `void` 的任意受管 bean 方法。


    ```

    @Named @RequestScoped

    public class Bean {


    public void someActionListenerMethod() {

            // ...

        }

    }

    ```


    请注意，第三种方式或多或少是未记录的。它仅在 EL 2.2（2009 年）引入后才成为可能，开发者可以通过简单地添加括号（必要时带参数）来显式声明方法表达式。巧合的是，`<f:actionListener>`
    的 `binding` 属性能够处理它们。在底层，`binding` 属性被视为一个 `ValueExpression`，并且逻辑期望在调用 `ValueExpression#getValue()`
    时获得一个实现 `ActionListener` 接口的受管 bean 实例。然而，这里调用的是一个 `void` 方法而不是 getter 方法，它返回了
    `null`，这被解释为 `null`。因此，逻辑会静默地继续执行，就好像根本没有可用的 bean 实例一样。


    动作监听器在 `action` 属性之上还有一个额外的特性。当从动作监听器中显式抛出 `javax.faces.event.AbortProcessingException`
    时，JSF 将吞掉该异常并中止处理调用应用程序阶段（第五阶段），然后立即前进到渲染响应阶段（第六阶段）。所有剩余的动作监听器和动作方法（如果有的话）都将被跳过。被吞掉的异常不会导致任何错误响应。鉴于这一事实，以及动作监听器总是在动作方法之前被调用的事实，您可以（滥）用它来在动作方法被调用之前，基于已更新的模型值执行一些转换和验证。


    ```

    public void someActionListenerMethod() {

        try {

            convertOrValidate(this);

        } catch (SomeConversionOrValidationException e) {

            FacesContext context = FacesContext.getCurrentInstance()

            context.addMessage(null, new FacesMessage(e.getMessage()));

            throw new AbortProcessingException(e);

        }

    }


    public void someActionMethod() {

        // 当抛出 AbortProcessingException 时，此方法将不会被调用。

    }

    ```


    我说“（滥）用”是因为执行此类任务本质上是普通 `Converter` 或 `Validator` 实现的责任，这样模型值就不会被无效值污染。然而，在 JSF
    中很长一段时间内，都无法基于多个字段执行转换或验证。因此开发者开始使用动作（监听器）方法，这本质上违反了 JSF 的生命周期。


    直到 JSF 2.3 才引入了一个新的 `<f:validateWholeBean>` 标签来对多个字段执行验证。您可以在第 5 章中阅读更多相关信息。因此，这为动作监听器方法只留下了一个合理的实际用例：基于一个或多个模型值执行转换。在“选择组件”一节中已经演示了一个示例（在
    `<ui:repeat>` 中使用多个 `<h:selectBooleanCheckbox>` 来规避 `<h:selectManyCheckbox>` 生成
    HTML 表格的问题）。另一个示例是使用提供的模型值调用外部 Web 服务，并将其结果作为“转换后”的值获取。动作方法仍应用于执行业务服务逻辑。当动作方法抛出异常时，请求将以
    HTTP 500 错误响应结束。您可以在第 9 章中找到更多相关信息。


    除了 `<h:commandButton>` 之外，JSF 还提供了另外两个命令组件：`<h:commandLink>` 和 `<h:commandScript>`。`<h:commandLink>`
    的生命周期与 `<h:commandButton>` 基本相同，不同之处在于它生成一个 HTML `<a>` 元素，该元素借助 JavaScript 提交其所在的表单。在任何使用
    `<h:commandButton>` 的地方，都可以用 `<h:commandLink>` 替代。


    ```

    <h:form id="form">

        ...

        <h:commandLink id="submit" value="提交" action="#{bean.submit}" />

    </h:form>

    ```


    生成的 HTML 输出如下所示：


    ```

    <form id="form" name="form" method="post" action="/project/test.xhtml"

        enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="form" value="form" />

        ...

        <script type="text/javascript"

            src="/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces">

        </script>

        <a id="form:submit" href="#" onclick="

            mojarra.jsfcljs(

                document.getElementById(''form''),

                {''form:submit'':''form:submit''},

                ''''

            ); return false;">提交</a>

        <input type="hidden" name="javax.faces.ViewState"

            id="j_id1:javax.faces.ViewState:0"

            value="-6936791897896630173:-5064219023156239099"

            autocomplete="off" />

    </form>

    ```


    在 Chrome 浏览器中的渲染效果：


    ![A454457_1_En_4_Figj_HTML.jpg](img/A454457_1_En_4_Figj_HTML.jpg)


    在生成的 HTML 输出中，您会注意到它自动包含了 `jsf.js` JavaScript 文件。该文件包含 `jsf` 对象以及 JSF 实现特定的辅助函数，在
    Mojarra 实现的情况下，这些函数被放置在 `mojarra` 对象中。在纯 HTML 中，无法使用 `<a>` 元素提交 `<form>`。因此，必须引入一些
    JavaScript 来实现。

