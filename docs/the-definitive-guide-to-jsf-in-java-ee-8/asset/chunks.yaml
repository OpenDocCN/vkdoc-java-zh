    ## Installing H2


    H2[⁴](#A454457_1_En_2_Chapter.xhtml#Fn4) is an in-memory SQL database . It’s an
    embedded database useful for quickly modeling and testing JPA entities, certainly
    in combination with autogenerated SQL tables based on JPA entities. Adding H2
    to your web application project is a matter of adding the following dependency
    to the <dependencies> section of the pom.xml:


    ```

    <dependency>

        <groupId>com.h2database</groupId>

        <artifactId>h2</artifactId>

        <version>1.4.196</version>

    </dependency>

    ```


    That’s basically it. The JDBC (Java Database Connectivity) driver is already built
    in.


    ### Configuring DataSource


    In order to be able to interact with a SQL database, we need to configure a so-called
    data source in the web application project. This can be done by adding the following
    section to the web.xml:


    ```

    <data-source>

        <name>java:global/DataSourceName</name>

        <class-name>org.h2.jdbcx.JdbcDataSource</class-name>

        <url>jdbc:h2:mem:test;DB_CLOSE_DELAY=-1</url>

    </data-source>

    ```


    The data source name represents the JNDI (Java Naming and Directory Interface
    ) name. The class name represents the fully qualified name of the javax.sql.DataSource
    implementation of the JDBC driver being used. The URL represents the JDBC driver-specific
    URL format. The syntax is dependent on the JDBC driver being used. For an in-memory
    H2 database with a database name of “test,” that’s thus jdbc:h2:mem:test. The
    H2-specific DB_CLOSE_DELAY=-1 path parameter basically instructs its JDBC driver
    not to automatically shut down the database when it hasn’t been accessed for some
    time, even though the application server is still running.


    A concrete instance of the DataSource can now be injected in any servlet container
    managed artifact such as a servlet or filter as follows:


    ```

    @Resource

    private DataSource dataSource;

    ```


    You could get a SQL connection from it via DataSource#getConnection() for the
    plain old JDBC work. However, as we’re going to use Java EE, it’s better to use
    Java EE’s own JPA for this instead.


    ### Configuring JPA


    In order to familiarize JPA with the newly added data source, we need to add a
    new persistence unit to the persistence.xml which uses the data source as a JTA
    data source.


    ```

    <persistence-unit name="PersistenceUnitName" transaction-type="JTA">

        <jta-data-source>java:global/DataSourceName</jta-data-source>


        <properties>

            <property

                name="javax.persistence.schema-generation.database.action"

                value="drop-and-create" />

        </properties>

    </persistence-unit>

    ```


    You see, the data source is identified by its JNDI name. You’ll also notice a
    JPA-specific javax.persistence.schema-generation.database.action property with
    a value of “drop-and-create” which basically means that the web application should
    automatically drop and create all SQL tables based on JPA entities. This is, of
    course, only useful for prototyping purposes, as we’re going to do with this project
    in the rest of the book. For real-world applications, you’d better pick either
    “create” or “none” (which is the default). The transaction type being set to “JTA”
    basically means that the application server should automatically manage database
    transactions. This way every method invocation on an EJB from its client (usually,
    a JSF backing bean) transparently starts a new transaction and when the EJB method
    returns to the client (usually, the calling backing bean), the transaction is
    automatically committed and flushed. And, any runtime exception from an EJB method
    automatically rolls back the transaction.


    ### Creating the JPA Entity


    Now we’re going to create a JPA entityc. Basically, it’s a JavaBean class which
    represents a single record of a database table. Each bean property is mapped to
    a particular column of the database table. Normally, JPA entities are modeled
    against existing database tables. But, as you’ve read in the previous section,
    “Configuring JPA,” about the persistence.xml, it’s also possible to do it the
    other way round: database tables are generated based on JPA entities.


    Right-click the src/main/java folder of the project and choose *New ➤ JPA Entity*.
    In the wizard, set the *Package* to com.example.project.model and set the *Name*
    to Message. The rest of the fields can be kept default or empty (see Figure [2-24](#A454457_1_En_2_Chapter.xhtml#Fig24)).


    ![A454457_1_En_2_Fig24_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig24_HTML.jpg)'
