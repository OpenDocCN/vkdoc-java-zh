    The “Component superclass” column specifies the most important UIComponent superclass
    the component extends from. You must interpret the specified class to be from
    the javax.faces.component package.


    The “Value type” column specifies the supported type of the model value behind
    the component’s value attribute, if it has any. If the value type is String, it
    means that only the model value’s toString() outcome will be used as value of
    the component, generally in components which would render it as some sort of label.
    If it’s Object, it means that it supports any kind of value, generally in components
    which would render it as text or parse it as input value, if necessary with help
    of an implicit or explicit Converter. If the value type is Object[],it means that
    it requires an array or collection of objects as model value, generally in data
    and multi-selection input components, if necessary with an implicit or explicit
    Converter.


    There are two specialized input components . The <h:inputFile> binds the uploaded
    file to a javax.servlet.http.Part property and doesn’t support outputting it—for
    security reasons—and the <h:selectBooleanCheckbox> which binds the checked value
    to a boolean property. Those two input components don’t support a Converter and
    therefore don’t support any other model value type.


    The “HTML output” column specifies the minimum generated HTML output. If the HTML
    output says “if necessary,” then it means that the specified HTML element is only
    emitted when the component has any attribute specified that requires being outputted
    as a HTML element attribute, such as id, styleClass, onclick, etc. That is, a
    component can have attributes that don’t end up in the generated HTML output at
    all, such as binding, rendered, converter, etc. If a component can have multiple
    HTML element representations, then that’s usually controlled by the layout attribute
    as you can see with <h:messages> and <h:panelGroup>. If the HTML output contains
    “*” (an asterisk), then it means that the component may emit zero or more of the
    specified nested HTML elements.


    The “Since” column indicates the first JSF version the HTML component was available
    in. At the time this book was written, the following JSF versions were available:
    1.0 (March 2004), 1.1 (May 2004), 1.2 (May 2006), 2.0 (July 2009), 2.1 (November
    2010), 2.2 (March 2013), and 2.3 (March 2017).


    The individual HTML components are detailed in Chapters [4](#A454457_1_En_4_Chapter.xhtml)
    and [6](#A454457_1_En_6_Chapter.xhtml).


    ## Standard Core Tags


    Next to the standard HTML components , JSF also provides a set of “core” tags.
    Those are essentially “helper” tags which allow you to declaratively configure
    one or more target HTML components by either nesting in them or wrapping around
    them. Those core tags are available under the [http://xmlns.jcp.org/jsf/core](http://xmlns.jcp.org/jsf/core)
    XML namespace URI which should be assigned to the "f" XML namespace prefix.


    ```

    xmlns:f="http://xmlns.jcp.org/jsf/core"

    ```


    Technically, those tags are intended to be reusable on non-HTML components. JSF
    offers the possibility of attaching a different render kit to the component tree
    which doesn’t generate HTML output but a different markup—hence the different
    XML namespace. Table [3-2](#A454457_1_En_3_Chapter.xhtml#Tab2) provides an overview.'
