  raw: 'The bean instance that is returned from the BeanManager#getReference() is
    almost certainly a proxy; CustomFormAuthenticationMechanism is specified to be
    application scoped, and it implicitly makes use of an interceptor. Due to the
    technical difficulty of proxying an existing proxy (think of generated proxies
    often being final and proxy caches being used) CDI 2.0 imposes a limitation on
    what types of objects it can create an intercepted instance from. To work around
    this limitation, we have little choice but to insert an extra manually created
    “pass-through wrapper” HttpAuthenticationMechanismWrapper instance as shown in
    the code above. The code of this wrapper is as follows:


    ```

    public class HttpAuthenticationMechanismWrapper

        implements HttpAuthenticationMechanism

    {

        private HttpAuthenticationMechanism wrapped;


    public HttpAuthenticationMechanismWrapper() {

            //

        }


    public HttpAuthenticationMechanismWrapper

            (HttpAuthenticationMechanism httpAuthenticationMechanism)

        {

            this.wrapped = httpAuthenticationMechanism;

        }


    public HttpAuthenticationMechanism getWrapped() {

            return wrapped;

        }


    @Override

        public AuthenticationStatus validateRequest(

            HttpServletRequest request,

            HttpServletResponse response,

            HttpMessageContext context) throws AuthenticationException

        {

            return getWrapped().validateRequest(request, response, context);

        }


    @Override

        public AuthenticationStatus secureResponse(

            HttpServletRequest request,

            HttpServletResponse response,

            HttpMessageContext context) throws AuthenticationException

        {

            return getWrapped().secureResponse(request, response, context);

        }

        @Override

        public void cleanSubject(

            HttpServletRequest request,

            HttpServletResponse response,

            HttpMessageContext context)

        {

            getWrapped().cleanSubject(request, response, context);

        }

    }

    ```


    Outlook: it’s expected that a convenience method for the above task will be added
    to a future version of Java EE Security, thereby greatly simplifying this task.


    ## Logging Out


    Regardless of which method to login has been used, at some point the caller may
    wish to explicitly log out. A normal login (authentication) in Java EE is always
    primarily valid per request only, but various authentication mechanisms or the
    services they’re using (such as @AutoApplySession and @RememberMe) may keep the
    state beyond a single request and automatically re-authenticate the caller at
    every next request.


    This state may be kept at various places: in cookies, in the HTTP session, in
    client storage, etc. In order to log out we have to make sure all this state is
    cleared. In JSF we can do this simply by calling the HttpServletRequest#logout()
    method. This will immediately remove the authenticated identity from the current
    request and call the cleanSubject() method of the authentication mechanism, which
    in turn will remove any session data, cookies, etc., that it used.


    The following gives an example:


    ```

    @Named @RequestScoped

    public class Logout {


        @Inject

        private HttpServletRequest request;


        public void submit() throws ServletException {

            request.logout();

            request.getSession().invalidate();

        }

    }

    ```


    Note that for a full logout it''s typically good practice to invalidate the session
    as well. The call to HttpServletRequest#logout() should only remove the session
    state used by the authentication mechanism (if any), while after a full logout
    we often don’t want any other session state lingering around either. Depending
    on the application design it''s typical to redirect the caller to the home page
    of the application after a logout as well.


    ## Custom Principals


    The default principal that we can obtain from the security context contains very
    little other than just the name or, more exactly, the caller principal name (also
    known as the user principal name). This is typically a unique name and often,
    but not necessarily, the name the caller used to authenticate with.


    In practice, a web application almost always needs more information than just
    this name, and a richer application-specific model object representing the user
    is often desired. The lifetime of this model object does need to be very tightly
    coupled to that of the principal. For example, if the caller is logged out mid-request,
    the associated model object must disappear right away, and if the caller is logged
    in again right after (possibly still in the same request) a new model object must
    become available.


    There are various patterns to realize this, some of them including Servlet filters
    and others containing CDI producers. The pattern we''re going to show here, though,
    involves a custom principal.


    A custom principal means that a specific Principal type is returned from the identity
    store, instead of just providing a String and letting the container decide the
    type. This specific Principal type can then either *contain* our model object
    (aggregation) or *be* the model object (inheritance). We''ll give an example of
    the aggregation approach here.


    First consider the following custom Principal:


    ```

    public class UserPrincipal extends CallerPrincipal {


        private final User user;


        public UserPrincipal(User user) {

            super(user.getEmail());

            this.user = user;

        }


        public User getUser() {

            return user;

        }

    }

    ```


    This principal extends from javax.security.enterprise.CallerPrincipal which is
    the Java EE Security API-specific caller principal representation.


    With this Principal implementation we can now adjust the identity store that we
    presented earlier to return our custom principal instead.


    ```

    @ApplicationScoped

    public class UserServiceIdentityStore implements IdentityStore {


        @Inject

        private UserService userService;


        @Override

        public CredentialValidationResult validate(Credential credential) {

            UsernamePasswordCredential login =

                (UserNamePasswordCredential) credential;

            String email = login.getCaller();

            String password = login.getPasswordAsString();


            Optional<User> optionalUser =

                userService.findByEmailAndPassword(email, password);


            if (optionalUser.isPresent()) {

                User user = optionalUser.get();

                return new CredentialValidationResult(

                    new UserPrincipal(user), // Principal instead of String.

                    user.getRolesAsStrings()

                );

            }

            else {

                return CredentialValidationResult.INVALID_RESULT;

            }

        }

    }

    ```


    Subsequently, we can access our model object again from an injected security context
    .


    ```

    @Inject

    private SecurityContext securityContext;

    [...]

    Optional<User> OptionalUser =

                securityContext.getPrincipalsByType(UserPrincipal.class)

                                         .stream()

                                         .map(e -> e.getUser())

                                         .findAny();

    ```'
