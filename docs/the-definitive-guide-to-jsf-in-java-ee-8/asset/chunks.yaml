- fmt: "# 3. Components\n\nBauke Scholtz^(1) and Arjan Tijms²\n\n(1)Willemstad, Curaçao\n\
    \n(2)Amsterdam, Noord-Holland, The Netherlands\n\nJSF (JavaServer Faces) is a\
    \ component-based MVC (Model-View-Controller) framework. In essence, JSF parses\
    \ the view definition into a “component tree.” The root of this tree is represented\
    \ by the “view root” instance associated with the current instance of the faces\
    \ context.\n\n```\nUIComponent tree = FacesContext.getCurrentInstance().getViewRoot();\n\
    ```\n\nThe view is usually defined using XHTML+XML markup in a Facelets file.\
    \ XML is a markup language which is very suitable for defining a tree hierarchy\
    \ using a minimum of code. The component tree can also be created and manipulated\
    \ using Java code in a Java class, but this generally ends up in very verbose\
    \ code in order to declare value or method expressions and to correlate parents\
    \ and children with each other. Frequently, developers who do so aren’t aware\
    \ of how tag handlers such as JSTL (JavaServer Pages Standard Tag Library) can\
    \ be used to manipulate the component tree using just XML.\n\nThe component tree\
    \ basically defines how JSF should consume the HTTP request in order to apply\
    \ request values coming from input components, convert and validate them, update\
    \ the managed bean model values, and invoke the managed bean action. It also defines\
    \ how JSF should produce the HTTP response by generating the necessary HTML output\
    \ using renderers tied to the components whose attributes can in turn reference\
    \ managed bean properties. In other words, the component tree defines how the\
    \ phases of the JSF life cycle should be processed. The diagram in Figure [3-1](#A454457_1_En_3_Chapter.xhtml#Fig1)\
    \ shows how a HTTP postback request is usually being processed by JSF.\n\n![A454457_1_En_3_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_3_Fig1_HTML.jpg)\n\
    \n###### Figure 3-1 How JSF processes the HTTP postback request within the MVC\
    \ architecture (the numbers represent the ordering)\n\nFollowing is a brief description\
    \ of each step:\n\n1.  End user sends a HTTP request which matches the mapping\
    \ of the `FacesServlet` and thus invokes it.\n\n2.  The `FacesServlet` will build\
    \ the component tree based on the Facelet file identified by the HTTP request\
    \ path.\n\n3.  The component tree will if necessary get the current model values\
    \ from the backing bean during building the view. Any attribute of a Facelets\
    \ template tag and a JSTL core tag and only the `id` and `binding` attributes\
    \ of a JSF component will get executed.\n\n4.  The `FacesServlet` will restore\
    \ the JSF view state on the component tree.\n\n5.  The `FacesServlet` will let\
    \ the component tree apply the HTTP request parameters and input components will\
    \ store them as “submitted value.”\n\n6.  The input and command components will\
    \ if necessary get the current model values from the backing bean during consulting\
    \ the `rendered`, `disabled`, and `readonly` attributes in order to check whether\
    \ they are allowed to apply the request parameters.\n\n7.  The command components\
    \ will queue the `ActionEvent` when it detects, based on HTTP request parameters,\
    \ that it was being invoked in the client side.\n\n8.  The `FacesServlet` will\
    \ let the component tree process all registered converters and validators on the\
    \ submitted values and input components will store the newly converted and validated\
    \ value as “local value.”\n\n9.  The input components will get the old model value\
    \ from the backing bean and compare them with the new value.\n\n10. If the new\
    \ value is different from the old model value, then the input component will queue\
    \ the `ValueChangeEvent`.\n\n11. When all conversion and validation are finished,\
    \ the `FacesServlet` will invoke the listener methods of any queued `ValueChangeEvent`\
    \ on the backing bean.\n\n12. The `FacesServlet` will let the component tree update\
    \ all model values.\n\n13. The input components will set the new model values\
    \ in the backing bean.\n\n14. The `FacesServlet` will invoke the listener methods\
    \ of any queued `ActionEvent` on the backing bean.\n\n15. The final action method\
    \ of the backing bean will if necessary return a non-null `String` outcome referring\
    \ the target view.\n\n16. The `FacesServlet` will let the component tree render\
    \ the response.\n\n17. The component tree will if necessary get the current model\
    \ values from the backing bean during generating the HTML output. Practically\
