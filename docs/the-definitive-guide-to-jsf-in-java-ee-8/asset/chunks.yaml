    ###### 警告


    **不**建议将其更改为其他字符，例如连字符“-”或下划线“_”。⁴


    从长远来看，这样做会造成混淆且脆弱，因为这些字符在 ID 属性本身中也是允许的。JSF 不会根据当前配置的命名容器分隔符字符来验证组件 ID，因此它很容易被忽略，并在搜索表达式中引用此类组件时引发问题。


    回到从 `<h:outputLabel>` 引用命名容器内特定 `UIInput` 组件的问题，在示例复合组件 `<t:inputLocalTime>`（如第
    7 章“复合组件”一节所示）中，小时下拉组件的 ID 为“hour”。因此，对于 `<h:outputLabel>`，当使用默认的命名容器分隔符时，复合组件内小时下拉菜单的相对本地
    ID 是“time:hour”。


    ```

    <h:outputLabel id="l_time" for="time:hour" value="Time" />

    <t:inputLocalTime id="time" value="#{schedule.time}" required="true" />

    <h:message id="m_time" for="time" />

    ```


    请注意，这对于 `<h:message>` 并非必需，因为 faces 消息在底层已经使用复合组件本身的客户端 ID 添加到 faces 上下文中。


    使用相对本地 ID 在 `<h:dataTable>` 的 `<h:column>` 上下文中也同样有效。它会在当前迭代行的上下文中进行解析，即使目标组件位于另一列中。以下示例说明了这一点：


    ```

    <h:dataTable id="users" value="#{admin.users}" var="user">

        ...

        <h:column>

            <f:facet name="header">Country</f:facet>

            <h:selectOneMenu id="country" value="#{user.address.country}">

                <f:selectItems value="#{data.countries}" />

                <f:ajax render="city" />

            </h:selectOneMenu>

        </h:column>

        <h:column>

            <f:facet name="header">City</f:facet>

            <h:selectOneMenu id="city" value="#{user.address.city}">

                <f:selectItems value="#{user.address.country.cities}" />

            </h:selectOneMenu>

        </h:column>

        ...

    </h:dataTable>

    ```


    在底层，相对本地 ID 是使用 `UIComponent#findComponent()` API 中描述的算法来解析的。⁵ 这意味着你也可以通过编程方式解析它们。你只需确保
    `findComponent()` 方法是在正确的基组件上调用，而不是在例如 `UIViewRoot` 上调用。


    ## 绝对分层 ID


    如果目标组件与当前组件不在同一个命名容器父级中，那么你需要使用绝对分层 ID 而不是本地相对 ID。关键区别在于，绝对分层 ID 以命名容器分隔符字符开头。然后它会从
    `UIViewRoot` 开始搜索目标组件。这种结构通常用在 `<f:ajax>` 的 `render` 属性中，当它需要引用一个不在同一表单内的组件时。


    ```

    <h:form id="search">

        ...

        <h:commandButton id="submit" ...>

            <f:ajax execute="@form" render=":results" />

        </h:commandButton>

    </h:form>

    <h:panelGroup id="results" layout="block">

        ...

    </h:panelGroup>

    ```


    一个不太常见的需要使用绝对分层 ID 的用例是，当你需要引用一个嵌套在另一个命名容器中的组件时——例如，当你想在复合组件内部的 `<cc:clientBehavior>`
    事件期间更新与复合组件关联的 `<h:message>`。


    ```

    <h:form id="form">

        <h:outputLabel id="l_time" for="time:hour" value="Time" />

        <t:inputLocalTime id="time" value="#{schedule.time}" required="true">

            <f:ajax render=":form:m_time" />

        <h:message id="m_time" for="time" />

    </h:form>

    ```


    你可以认为这是 JSF 规范中的一个错误或疏忽。这确实如此，应该在 JSF 的下一个版本中加以解决。另一个不太常见的用例是，当你需要更新迭代组件（如 `<h:dataTable>`
    和 `<ui:repeat>`）的特定迭代轮次时。


    ```

    <h:form id="form">

        <h:dataTable id="table" value="#{bean.items}" var="item">

            <h:column>

                <h:panelGroup id="column1" layout="block">

                    ...

                </h:panelGroup>

            </h:column>

            <h:column>

                <h:panelGroup id="column2" layout="block">

                    ...

                </h:panelGroup>

            </h:column>

        </h:dataTable>

        <h:commandButton value="Update second row">

            <f:ajax render=":form:table:1:column1

                            :form:table:1:column2">

            </f:ajax>

        </h:commandButton>

    </h:form>

    ```


    请注意，迭代索引是从零开始的，与普通的 Java 集合和数组一样。还要注意，你基本上需要将单元格的内容包装在另一个组件中，以便正确引用单元格的内容，并且你需要显式指定每一列才能更新整行，如上所示。更新整个列也是可能的，但不太方便，因为你基本上需要为每一行指定搜索表达式。幸运的是，`render`
    属性可以接受 EL（表达式语言）表达式，并且 EL 流 API 可用于根据表中的项目数量，以 `:form:table:[i]:column` 格式连接一组字符串。


    ```

    <h:commandButton value="Update second column">

        <f:ajax render="#{bean.items.stream()

            .map(i -> '' :form:list:'' += bean.items.indexOf(i) += '':column2'')

            .reduce((l, r) -> (l += r)).get()}">

        </f:ajax>

    </h:commandButton>

    ```


    诚然，这不是最优雅的方法。你最好委托给应用程序作用域 bean 中的自定义函数。它可能看起来像下面这样：


    ```

    <h:commandButton value="Update second column">

        <f:ajax

            render="#{ajax.columnIds(bean.items, '':form:table::column2'')}"

        </f:ajax>

    </h:commandButton>

    ```


    其中 `#{ajax}` 应用程序作用域 bean 看起来像下面这样：


    ```

    @Named @ApplicationScoped

    public class Ajax {


    public String columnIds(List<?> list, String idTemplate) {

            return IntStream.range(0, list.size()).boxed()

                .map(i -> idTemplate.replace("::", ":" + i + ":"))

                .collect(Collectors.joining(" "));

        }

    }

    ```

