    ```


    然而，这种做法并不优雅。如果我们能在 `encodeEnd()` 方法中捕获所有 `writeText()` 调用，并透明地委托给 `write()` 方法，那会好得多。你可以通过包装
    `ResponseWriter`，将其设置到 faces 上下文中，并传递给父类来实现这一点。JSF API 中几乎每个公开的构件都有对应的 `XxxWrapper`
    类。你可以在 `javax.faces.FacesWrapper` Javadoc 的“所有已知实现类”部分找到它们。¹¹ 所有这些包装类使得 JSF 非常易于定制和扩展。它们都有一个接受待包装类的构造函数，你基本上只需要选择要装饰的一个或多个方法即可。


    总而言之，下面展示了如何扩展 `MessageRenderer`，以将 `encodeEnd()` 方法期间的所有 `writeText()` 调用委托给
    `write()`。


    ```

    public class EscapableMessageRenderer extends MessageRenderer {


    @Override

        public void encodeEnd

            (FacesContext context, UIComponent component)

                throws IOException

        {

            ResponseWriter writer = context.getResponseWriter();


    try {

                context.setResponseWriter(new ResponseWriterWrapper(writer) {

                    @Override

                    public void writeText

                        (Object text, UIComponent component, String property)

                            throws IOException

                    {

                        String string = text.toString();

                        Object escape = component.getAttributes()

                            .get("escape");

                        if (escape == null

                            || Boolean.parseBoolean(escape.toString()))

                        {

                            super.writeText(string, component, property);

                        }

                        else {

                            super.write(string);

                        }

                    }

                });


    super.encodeEnd(context, component);

            }

            finally {

                context.setResponseWriter(writer);

            }

        }

    }

    ```


    请注意，在使用了包装后的响应写入器的 try 块的 finally 中恢复原始响应写入器非常重要。为了使其运行，请在 `faces-config.xml`
    中按如下方式注册，关联到 `<h:message>` 组件的组件族和渲染器类型：


    ```

    <render-kit>

        <renderer>

            <component-family>javax.faces.Message</component-family>

            <renderer-type>javax.faces.Message</renderer-type>

            <renderer-class>

                com.example.project.renderer.EscapableMessageRenderer

            </renderer-class>

        </renderer>

    </render-kit>

    ```


    不，你不能为此使用 `@FacesRenderer` 注解。在扩展现有渲染器时，这不起作用。原始渲染器本身已经在某个 XML 文件中注册到了完全相同的组件族和渲染器类型上。而且你知道，当同时发现基于
    XML 的配置和基于注解的配置时，前者总是具有更高的优先级。


    现在，你只需将现有 `<h:message>` 组件的 `escape` 属性设置为 `false`，即可让扩展后的渲染器执行其工作。


    ```

    <h:message ... escape="false" />

    ```


    请注意，不要在显示在此处的任何 faces 消息中嵌入用户控制的输入，否则你将打开一个潜在的 XSS 攻击漏洞。


    ## 自定义标签处理器


    在第 3 章中，你了解了视图构建时间和视图渲染时间之间的区别，以及诸如 JSTL 之类的标签处理器在构建 JSF 组件树时运行，而 JSF 组件在处理 HTTP
    请求和响应的 JSF 生命周期中运行。不仅 JSF 组件可以定制，标签处理器也可以。当你想控制 JSF 组件树的构建而不是处理 HTTP 请求和响应时，这尤其有用。


    `<f:viewParam>` 在主从页面中很有用。从主页面，你可以链接到以实体 ID 作为参数的详情页面。在详情页面，你可以通过 `<f:viewParam>`
    按 ID 加载实体。具体如下：


    ```

    <f:metadata>

        <f:viewParam name="id" value="#{editItem.item}"

            converter="project.ItemConverter" converterMessage="未知项目"

            required="true" requiredMessage="错误请求">

        </f:viewParam>

    </f:metadata>

    ```


    当转换或验证失败时，一条 faces 消息将被添加到当前页面的 faces 上下文中。然而，更多时候你只想直接将用户重定向回主页面。使用 `<f:event>`
    处理 `PostValidateEvent` 来实现这一点相对简单。不，`<f:viewAction>` 不起作用，因为当存在转换或验证错误时，它首先就不会被调用。


    ```

    <f:metadata>

        ...

        <f:event type="postValidate" listener="#{editItem.onload()}" />

    </f:metadata>

    ```


    其中 `onload()` 方法如下所示：


    ```

    public void onload() throws IOException {

        FacesContext context = FacesContext.getCurrentInstance();

        if (context.isValidationFailed()) {

            ExternalContext ec = context.getExternalContext();

            ec.redirect(ec.getRequestContextPath() + "/items.xhtml");

        }

    }

    ```


    好吧，这可行，但当你拥有更多此类页面时，这会导致样板代码。理想情况下，你希望能够以声明方式在 `<f:viewParam>` 本身上注册一个事件监听器，如下所示，这样你就可以保持后端
    bean 代码中不包含手动请求-响应处理逻辑。


    ```

    <f:metadata>

        <f:viewParam ...>

            <t:viewParamValidationFailed redirect="/items.xhtml" />

        </f:viewParam>

    </f:metadata>

    ```


    这可以通过一个标签处理器来实现，该处理器在由 `<f:viewParam>` 标签表示的 `UIViewParameter` 组件上注册一个新的系统事件监听器。标签处理器类必须扩展
    `javax.faces.view.facelets.TagHandler`。


    ```

    public class ViewParamValidationFailed extends TagHandler

        implements ComponentSystemEventListener

    {

        private String redirect;


    public ViewParamValidationFailed(TagConfig config) {

            super(config);

            redirect = getRequiredAttribute("redirect").getValue();

        }


    @Override

        public void apply(FaceletContext context, UIComponent parent)

            throws IOException

        {

            if (parent instanceof UIViewParameter

                && !context.getFacesContext().isPostback())

            {

                parent.subscribeToEvent(PostValidateEvent.class, this);

            }

        }


    @Override

        public void processEvent(ComponentSystemEvent event)

            throws AbortProcessingException

        {

            UIComponent parent = event.getComponent();

            parent.unsubscribeFromEvent(PostValidateEvent.class, this);

            FacesContext context = event.getFacesContext();


    if (context.isValidationFailed()) {

                try {

                    ExternalContext ec = context.getExternalContext();

                    ec.redirect(ec.getRequestContextPath() + redirect);

                }

                catch (IOException e) {

                    throw new AbortProcessingException(e);

                }

            }

        }

    }

    ```

