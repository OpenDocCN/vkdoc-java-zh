- fmt: '# Local Extension and Wrapping


    In some cases, we don’t want to override, say, a view handler globally, but only
    for a local invocation of, typically, a method in a component. JSF gathers for
    this by passing on the `FacesContext`, which components to use as the main entry
    point from which to get pretty much all other things. Components are for JSF 2.3
    not CDI artifacts or otherwise injectable, so the CDI approach for the moment
    doesn’t hold for them.


    Local extension can then be done by wrapping the faces context and passing that
    wrapped context to the next layer. Note that the Servlet spec uses the same pattern
    where the `HttpServletRequest` and `HttpServletResponse` can be wrapped by a filter
    and passed on to the next filter, which can wrap it again and pass it to its next
    filter, etc.


    To illustrate this, suppose that for a certain component we’d like to augment
    the action URL generation used by, among others, form components in such a way
    that `?foo=bar` is added to this URL. If we do this by globally overriding the
    view handler all components and other code using the view handler would get to
    see this URL, while here we’d only want this for this very specific component.


    To achieve just this, we use wrapping here as illustrated in the following component:


    ```

    @FacesComponent(createTag = true)

    public class CustomForm extends HtmlForm {


    @Override

        public void encodeBegin(FacesContext context) throws IOException {

            super.encodeBegin(new ActionURLDecorator(context));

        }

    }

    ```


    Implementing the wrapper without support from JSF would be a somewhat tedious
    task, to say the least, as the path from `FacesContext` to `ViewHandler` is a
    few calls deep and the classes involved have a large amount of methods. Luckily
    JSF greatly eases this task by providing wrappers for most of its important artifacts,
    with an easy-to-use constructor.


    The pattern used here is that the top-level class (`ActionURLDecorator` from the
    example above) inherits from `FacesContextWrapper` and pushes the original faces
    context to its superclass. Then the path of intermediate objects is implemented
    by overriding the initial method in the chain (`getApplication()` here), and returning
    a wrapper for the return type of that method, with the super version of it passed
    into its constructor. This wrapper then does the same thing for the next method
    in the chain, until the final method is reached for which custom behavior is required.


    The following gives an example of this:


    ```

    public class ActionURLDecorator extends FacesContextWrapper {


    public ActionURLDecorator(FacesContext context) {

            super(context);

        }


    @Override

        public Application getApplication() {

            return new ApplicationWrapper(super.getApplication()) {

                @Override

                public ViewHandler getViewHandler() {

                    return new ViewHandlerWrapper(super.getViewHandler()) {

                        @Override

                        public String getActionURL

                            (FacesContext context, String viewId)

                        {

                            String url = super.getActionURL(context, viewId);

                            return url + "?foo=bar";

                        }

                    };

                }

            };

        }

    }

    ```


    With these two classes present in the JSF application, now consider the following
    Facelet that makes use of our custom form component:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:test="http://xmlns.jcp.org/jsf/component"

    >

        <h:head />

        <h:body>

            <test:customForm action="index">

                <h:commandButton action="index" value="Go Index" />

            </test:customForm>

        </h:body>

    </html>

    ```


    Remember that no XML registration is needed for the custom component when it’s
    annotated with `@FacesComponent(createTag=true)`, and that its XML namespace defaults
    to `http://xmlns.jcp.org/jsf/component` and its component tag name to the simple
    class name. (See also Chapter 11.)


    If we request the view corresponding to this Facelet and press the button, we’d
    indeed see `?foo=bar` appearing after the URL, meaning that our local extension
    of the view handler via a chain of wrappers has worked correctly.'
