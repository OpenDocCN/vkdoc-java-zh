- fmt: "# Introspection\n\nAn important aspect of being able to extend a framework\
    \ correctly is not only to be able to utilize extension points but also to be\
    \ able to introspect the framework and query it for what artifacts or resources\
    \ it has available.\n\nOne of the places where JSF provides support for introspection\
    \ is its ability to reveal which view resources are present in the system. Remember\
    \ that in JSF, views like, for example, Facelets are abstracted behind the view\
    \ handler, which in turn manages one or more view declaration language (VDL) instances.\
    \ A VDL, also called a templating engine, has the ability to read its views via\
    \ the resource handler. As we’ve seen in this chapter, all these things can be\
    \ augmented or even fully replaced.\n\nThis specifically means that views can\
    \ come from anywhere (e.g., from the filesystem (most typical)) but can also be\
    \ generated in memory, be loaded from a database or fetched over the network,\
    \ and much more. Also, the simple physical file to logically view name mapping\
    \ such as that used by Facelets doesn’t have to hold for other view declaration\
    \ languages at all.\n\nTogether this means that without an explicit introspection\
    \ mechanism where the view handler, VDL, and resource handler can be asked which\
    \ views/resources they have available, we would not be able to reliably obtain\
    \ a full list of views.\n\nSuch list of views is needed, for example, when we\
    \ want to utilize so-called extensionless URLs, which are URLs without any extension\
    \ such as `.xhtml` or `.jsf`, and without any extra path mapping present such\
    \ as `/faces/**`. Lacking any hint inside the URL itself, the Servlet container\
    \ on top of which JSF works has to have some other way of knowing that a certain\
    \ request has to be routed to the faces servlet.\n\nA particularly elegant way\
    \ to do this is by utilizing Servlet’s “exact mapping” feature, which is a variant\
    \ of URL mapping where an exact name instead of a pattern is mapped to a given\
    \ servlet, which in this case would be the faces servlet. Since the Servlet spec\
    \ has an API for dynamically adding Servlet mappings, and JSF has an API to dynamical\
    \ introspect which views are available, we pretty much only have to combine these\
    \ two to implement extensionless URLs.\n\nThe following shows an example of how\
    \ to do this:\n\n```\n@WebListener\npublic class ExtensionLessURLs implements\
    \ ServletContextListener {\n    @Override\n    public void contextInitialized(ServletContextEvent\
    \ event) {\n        FacesContext facesContext = FacesContext.getCurrentInstance();\n\
    \        event.getServletContext()\n            .getServletRegistrations()\n \
    \           .values()\n            .stream()\n            .filter(servlet -> servlet\n\
    \                .getClassName().equals(FacesServlet.class.getName()))\n     \
    \       .findAny()\n            .ifPresent(facesServlet -> facesContext\n    \
    \            .getApplication()\n                .getViewHandler()\n          \
    \      .getViews(facesContext, \"/\",\n                    ViewVisitOption.RETURN_AS_MINIMAL_IMPLICIT_OUTCOME)\n\
    \                .forEach(view -> facesServlet.addMapping(view)));\n    }\n}\n\
    ```\n\nWhat happens here is that we first try to find the faces servlet, which\
    \ incidentally is another example of introspection, this time in the Servlet spec.\
    \ If found, we ask the view handler for all views. As mentioned above, this will\
    \ internally introspect all the available view declaration instances, which in\
    \ turn may introspect the resource handler. The `RETURN_AS_MINIMAL_IMPLICIT_OUTCOME`\
    \ parameter is used to make sure all views are returned in their minimal form\
    \ without any file extensions or other markers appended. This is the same form\
    \ that can be returned from, for example, action methods or used with the `action`\
    \ attribute of command components.\n\nHaving obtained the stream of views in the\
    \ right format, we directly add each of them as exact mapping to the faces servlet\
    \ that we found earlier.\n\nFor example, suppose we have a Facelet view in the\
    \ web root in a folder `/foo` named `bar.xhtml`. Then `getViews()` will return\
    \ a stream with the string `/foo/bar`. When the faces servlet is mapped to this\
    \ `/foo/bar`, and assuming the JSF application is deployed to the context path\
    \ `/test` on domain `localhost` port `8080`, we can request `http://localhost:8080/test/foo/bar`\
    \ to see the rendered response of that Facelet.\n\nNote that even though it’s\
    \ relatively simple to achieve extensionless URLs in JSF this way, it’s still\
    \ somewhat tedious to have to do this for every application. It’s expected that\
    \ a next revision of JSF will support this via a single setting.\n\n# Index\n\n\
    # A\n\n1. Action listener method\n2. ADF Faces\n3. Ajax\n    1. `action`\n   \
    \ 2. apply request values phase\n    3. behavior listener methods\n    4. `ClientBehaviorHolder`\n\
    \    5. `execute` and `render` attributes\n    6. `<f:ajax>` tag\n    7. `@form`\
    \ keyword\n    8. `<h:form>`\n    9. implementing class\n    10. invoke application\
    \ phase\n    11. `javax.faces.ViewState`\n    12. JSF life cycle\n    13. life\
    \ cycle\n    14. message component\n    15. navigation in\n    16. `on[event]`\
    \ attributes\n    17. render response phase\n    18. supporting event types\n\
    \    19. `valueChange`\n4. Ajax exception handling\n    1. Ajax request\n    2.\
    \ application-wide customizations\n    3. business logic\n    4. `ExceptionHandler`\n\
    \    5. `handleAjaxException()`\n    6. HTTP response\n    7. JavaScript alert\n\
    \    8. Production stage\n    9. `UIViewRoot` instance\n    10. unhandled exception\
    \ events\n5. Alexander Smirnov’s Telamon framework\n6. Application programming\
    \ interface (API)\n7. Application servers\n8. Authentication mechanism\n    1.\
    \ `AuthenticationMechanismDefinition` annotation\n    2. caller-initiated authentication\n\
    \        See Caller-initiated authentication\n    3. Custom FORM\n    4. `@CustomFormAuthenticationMechanismDefinition`\
    \ annotation\n    5. `@FacesConfig` annotation\n    6. FORM\n    7. custom JSF\
    \ code\n        1. action method\n        2. backing bean\n        3. `continueAuthentication()`\
    \ method\n        4. login page\n    8. `loginToContinue` attribute\n\n# B\n\n\
    1. Backing beans\n    1. class\n        1. editing\n        2. JBoss Tools plug-in\n\
    \    2. JSF vended types, injecting\n    3. layers\n    4. managed bean\n    \
    \    See Managed beans\n    5. MVC framework\n    6. naming conventions\n2. `BeanManager#fireEvent()`\
    \ method\n3. Bean Validation API\n    1. comma separated string\n    2. context\
    \ parameter\n    3. custom constraint annotation\n    4. custom messages\n   \
    \ 5. `groups` attribute\n    6. in Java code\n    7. JPA-managed\n    8. `NotNull.class`\n\
    \    9. `UIInput` components\n    10. validation error\n    11. `validationGroups`\
    \ attribute\n    12. `web.xml`\n4. Binding attribute\n5. By role security constraints"
