- fmt: "But this is fairly useless if it isn’t used anywhere else in the backing bean.\
    \ Moreover, this is dangerous when the managed bean scope is wider than request\
    \ (see also the section “View Build Time” in Chapter [3](#A454457_1_En_3_Chapter.xhtml)).\
    \ It is better not to bind component instances to a backing bean at all; it might\
    \ indicate a poor practice. The only reasonable real-world use case in JSF 2.x\
    \ is binding composite component children to a backing component (see also the\
    \ section “Composite Components” in Chapter [7](#A454457_1_En_7_Chapter.xhtml)).\n\
    \nIn case you’re using `<ui:repeat>` or `<c:forEach>` instead of `<h:dataTable>`\
    \ on something like a `List<String>`, then you can obtain the iteration index\
    \ in a much simpler way, via the `varStatus` attribute.\n\n```\n<h:form>\n   \
    \ <ui:repeat value=\"#{bean.strings}\" var=\"string\" varStatus=\"loop\">\n  \
    \      <h:inputText value=\"#{bean.strings[loop.index]}\" /><br/>\n    </ui:repeat>\n\
    \    <h:commandButton value=\"Save\" action=\"#{bean.save}\">\n        <f:ajax\
    \ execute=\"@form\" />\n    </h:commandButton>\n</h:form>\n```\n\n### Add/Remove\
    \ Rows in `<h:dataTable>`\n\nComing back to the `<h:dataTable>` with `List<Product>`,\
    \ there may be cases in which you’d like to be able to add or remove items while\
    \ staying in the same view, usually in some sort of an admin page. In order to\
    \ add a new `Product`, we need to prepare a new instance in the managed bean,\
    \ fill it in a separate form, persist it, and then refresh the table.\n\n```\n\
    <h:form id=\"list\">\n    <h:dataTable id=\"products\" value=\"#{products.list}\"\
    \ ...>\n        ...\n    </h:dataTable>\n</h:form>\n<h:form id=\"add\">\n    <h:outputLabel\
    \ for=\"name\" value=\"Name\" />\n    <h:inputText id=\"name\" value=\"#{products.product.name}\"\
    \ />\n    <h:message for=\"name\" />\n\n    <h:outputLabel for=\"description\"\
    \ value=\"Description\" />\n    <h:inputTextarea id=\"description\"\n        value=\"\
    #{products.product.description}\">\n    </h:inputTextarea>\n    <h:message for=\"\
    description\" />\n\n    <h:commandButton id=\"add\" value=\"Add\" action=\"#{products.add}\"\
    >\n        <f:ajax execute=\"@form\" render=\"@form :list:products\" />\n    </h:commandButton>\
    \                                                                            \
    \                                \n</h:form>\n```\n\nWhereby the relevant backing\
    \ bean code looks as follows:\n\n```\nprivate List<Product> list; // +getter\n\
    private Product product = new Product(); // +getter\n\n@PostConstruct\npublic\
    \ void init() {\n    list = productService.list();\n}\n\npublic void add() {\n\
    \    productService.create(product);\n    list.add(0, product);\n    product =\
    \ new Product();\n}\n```\n\nWith this `create()` method in service class:\n\n\
    ```\n@TransactionAttribute(REQUIRED);\npublic Long create(Product product) {\n\
    \    entityManager.persist(product);\n    return product.getId();\n}\n```\n\n\
    Removing could be done in several ways. In any case, you may need an additional\
    \ column to hold the submit buttons or radio buttons or check boxes. The easiest\
    \ way is a column with a command button which deletes the currently iterated item\
    \ and then refreshes the table.\n\n```\n<h:form id=\"list\">\n    <h:dataTable\
    \ id=\"products\" value=\"#{products.list}\" var=\"product\">\n        ...\n \
    \       <h:column>\n            <h:commandButton id=\"delete\" value=\"Delete\"\
    \n                action=\"#{products.delete(product)}\">\n                <f:ajax\
    \ render=\"@namingcontainer\" />\n            </h:commandButton>\n        </h:column>\n\
    \    </h:dataTable>\n</h:form>\n```\n\nWith this `delete(Product)` method in a\
    \ `@ViewScoped` backing bean class:\n\n```\npublic void delete(Product product)\
    \ {\n    productService.delete(product);\n    list.remove(product);\n}\n```\n\n\
    And this `delete()` method in service class:\n\n```\n@TransactionAttribute(REQUIRED)\n\
    public void delete(Product product) {\n    if (entityManager.contains(product))\
    \ {\n        entityManager.remove(product);\n    }\n    else {\n        Product\
    \ managedProduct = getById(product.getId());\n\n        if (managedProduct !=\
    \ null) {\n            entityManager.remove(managedProduct);\n        }\n    }\n\
    }\n```\n\nNote the `render` attribute of `<f:ajax>`. It specifies `@namingcontainer`,\
    \ which basically references the closest parent `NamingContainer` component. From\
    \ the standard JSF HTML component set, only `<h:form>` and `<h:dataTable>` are\
    \ instances of `NamingContainer`. In this specific construct, `@namingcontainer`\
    \ thus references the `<h:dataTable>`. You could also have used `<f:ajax render=\"\
    :list:products\">` instead; it’s only slightly verbose. The `<f:ajax render=\"\
    products\">` wouldn’t work, because it will try to find it within the context\
    \ of the currently iterated row, which is basically within all `<h:column>` components.\n\
    \n### Select Rows in `<h:dataTable>`\n\nHaving a radio button column in a `<h:dataTable>`\
    \ is natively possible since JSF 2.3 thanks to the new `group` attribute of the\
    \ `<h:selectOneRadio>` (see also the section “Selection Components” in Chapter\
    \ [4](#A454457_1_En_4_Chapter.xhtml)).\n\n```\n<h:form id=\"list\">\n    <h:dataTable\
    \ id=\"products\" value=\"#{products.list}\" var=\"product\">\n        <h:column>\n\
    \            <h:selectOneRadio id=\"selected\" group=\"selected\"\n          \
    \      value=\"#{products.selected}\">\n                <f:selectItem itemValue=\"\
    #{product}\" />\n            </h:selectOneRadio>\n        </h:column>\n      \
    \  ...\n    </h:dataTable>\n    <h:commandButton id=\"deleteSelected\" value=\"\
    Delete selected product\"\n         action=\"#{products.deleteSelected}\">\n \
    \        <f:ajax execute=\"@form\" render=\"products\" />\n    </h:commandButton>\n\
    </h:form>\n```\n\nWith this `deleteSelected()` method in a `@ViewScoped` backing\
    \ bean class:\n\n```\nprivate Product selected; // +getter +setter\n\npublic void\
    \ deleteSelected() {\n    productService.delete(selected);\n    list.remove(selected);\n\
    }\n```\n\nNote that you need a `ProductConverter` or `BaseEntityConverter` here\
    \ as well. Those are elaborated in the section “Custom Converters” in Chapter\
    \ [5](#A454457_1_En_5_Chapter.xhtml).\n\nThe check box selection is a little more\
    \ convoluted. You’d intuitively grab `<h:selectManyCheckbox>`, but this doesn’t\
    \ yet support the `group` attribute as `<h:selectOneRadio>` does. You’d need to\
    \ fall back to `<h:selectBooleanCheckbox>` with a `Map<Product, Boolean>` whereby\
    \ the map key represents the currently iterated product and the map value represents\
    \ the check box value.\n\n```\n<h:form id=\"list\">\n    <h:dataTable id=\"products\"\
    \ value=\"#{products.list}\" var=\"product\">\n        <h:column>\n          \
    \  <h:selectBooleanCheckbox id=\"selection\"\n                value=\"#{products.selection[product]}\"\
    >\n            </h:selectBooleanCheckbox>\n        </h:column>\n        ...\n\
    \    </h:dataTable>\n    <h:commandButton id=\"deleteSelected\" value=\"Delete\
    \ selected products\"\n         action=\"#{products.deleteSelected}\">\n     \
    \    <f:ajax execute=\"@form\" render=\"products\" />\n    </h:commandButton>\n\
    </h:form>\n```\n\nThe modified `deleteSelected()` method in the `@ViewScoped`\
    \ backing bean looks as follows:\n\n```\nprivate Map<Product, Boolean> selection\
    \ = new HashMap<>(); // +getter\n\npublic void deleteSelected() {\n    List<Product>\
    \ selected = selection.entrySet().stream()\n        .filter(Entry::getValue)\n\
    \        .map(Entry::getKey)\n        .collect(Collectors.toList());\n    productService.delete(selected);\n\
    \    selected.forEach(list::remove);\n    selection.clear();\n}\n```\n\nThe overloaded\
    \ `ProductService#delete(Iterable)` method looks as follows:\n\n```\n@TransactionAttribute(REQUIRED)\n\
    public void delete(Iterable<Product> products) {\n    products.forEach(this::delete);\n\
    } \n```"
