    >\n    </script>\n    <span id=\"form:submit\">\n        <script type=\"text/javascript\"\
    >\n            var invokeBeanSubmit = function(o) {\n                var o = (typeof\
    \ o==='object') && o ? o : {};\n                mojarra.ab('form:submit',null,'action',0,0,{'params':o});\n\
    \            }\n        </script>\n    </span>\n    <input type=\"hidden\" name=\"\
    javax.faces.ViewState\"\n        id=\"j_id1:javax.faces.ViewState:0\"\n      \
