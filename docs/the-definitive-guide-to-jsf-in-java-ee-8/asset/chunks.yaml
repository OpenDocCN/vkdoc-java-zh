- fmt: '### Apply Request Values Phase (Second Phase)


    `UIComponent#processDecodes()` will be invoked on `UIViewRoot`. The `processDecodes()`
    method will first invoke `processDecodes()` on each child and facet and then invoke
    `UIComponent#decode()` on itself. Finally, invoke `UIViewRoot#broadCastEvents()`
    to fire any `FacesEvent` queued for the current phase. The default JSF API (application
    programming interface) doesn’t offer such events, but developers can create and
    queue their own.


    The default implementation of the `decode()` method will delegate to the `Renderer#decode()`
    method. In the `decode()` method of either the component or the renderer, the
    implementation has the opportunity to extract the submitted value from the request
    parameter and set it as an internal property. From the standard HTML component
    set, the only components that do that are the HTML form-based components deriving
    from `UIForm`, `UIInput`, and `UICommand`. The `UIForm` component will invoke
    `UIForm#setSubmitted()` with `true`. The `UIInput` component will invoke `UIInput#setSubmittedValue()`
    with the request parameter value. The `UICommand` component will queue the `ActionEvent`
    for the invoke application phase (fifth phase).


    ### Process Validations Phase (Third Phase)


    `UIComponent#processValidators()` will be invoked on `UIViewRoot`. The `processValidators()`
    method will basically first fire `PreValidateEvent` for the current component,
    then invoke `processValidators()` on each child and facet, and then invoke `PostValidateEvent`
    for the current component. Finally, it will invoke `UIViewRoot#broadCastEvents()`
    to fire any `FacesEvent` queued for the current phase, which is usually an instance
    of `ValueChangeEvent`.


    From the standard HTML component set, only `UIInput` components behave differently
    here. Right before calling `processValidators()` on each child and facet, they
    will first invoke `UIInput#validate()` on itself. If there’s a submitted value
    set during the apply request values phase (second phase), then they will first
    invoke `Converter#getAsObject()` on any attached `Converter`. When it doesn’t
    throw `ConverterException`, then they will invoke `Validator#validate()` on all
    attached `Validator` instances, regardless of whether any of them has thrown `ValidatorException`.


    When no `ConverterException` or `ValidatorException` was thrown, then `UIInput#setValue()`
    will be invoked with the converted and validated value and the `UIInput#isLocalValueSet()`
    flag will return `true` and `UIInput#setSubmittedValue()` will be invoked with
    `null`.


    When any `ConverterException` or `ValidatorException` was thrown, then `UIInput#setValid()`
    will be invoked with `false` and the message of the exception will be added to
    the faces context via `FacesContext#addMessage()`. Finally, when `UIInput#isValid()`
    returns `false`, then `FacesContext#setValidationFailed()` will be invoked with
    `true`.


    By the end of the phase, when `FacesContext#isValidationFailed()` returns `true`,
    immediately advance to the render response phase (sixth phase), thereby skipping
    any phase in between.


    ### Update Model Values Phase (Fourth Phase)


    `UIComponent#processUpdates()` will be invoked on `UIViewRoot`. The `processUpdates()`
    method will in turn invoke the `processUpdates()` method on each child and facet.
    Finally, it will invoke `UIViewRoot#broadCastEvents()` to fire any `FacesEvent`
    queued for the current phase. The default JSF API doesn’t offer such events, but
    developers can create and queue their own.


    Also during this phase, from the standard HTML component set, only `UIInput` components
    have a hook here. After calling `processUpdates()` on each child and facet, they
    will invoke `UIInput#updateModel()` on itself. When both the `UIInput#isValid()`
    and `UIInput#isLocalValueSet()` return `true`, they will invoke the setter method
    behind the value attribute with `getLocalValue()` as argument and immediately
    invoke `UIInput#setValue()` with `null` and clear out the `UIInput#isLocalValueSet()`
    flag.


    When a `RuntimeException` is thrown here, usually caused by a bug in the setter
    method itself, it will invoke `UIInput#setValid()` with `false` and queue the
    `UpdateModelException` and immediately advance to the render response phase (sixth
    phase), thereby skipping any phase in between.


    ### Invoke Application Phase (Fifth Phase)


    `UIViewRoot#processApplication()` will be invoked. This method will in turn invoke
    the `UIViewRoot#broadCastEvents()` to fire any `FacesEvent` queued for the current
    phase, which is usually an instance of `AjaxBehaviorEvent` or `ActionEvent`. Note
    that the `processApplication()` method is only defined on the `UIViewRoot` class
    and does not traverse the component tree.


    ### Render Response Phase (Sixth Phase)


    When the component tree is still empty, i.e., when the request is not a postback
    request, or when the view has no `<f:metadata>` with children, or when the developer
    has in the meanwhile explicitly invoked `FacesContext#setViewRoot()` with its
    own instance, then build the full component tree based on the view definition.
    When the component tree is present, first fire the `PreRenderViewEvent` for the
    `UIViewRoot`, then invoke `UIComponent#encodeAll()` on the `UIViewRoot`, and then
    invoke `PostRenderViewEvent` for the `UIViewRoot`.


    The `UIComponent#encodeAll()` method will basically first invoke `encodeBegin()`
    on itself, then if `UIComponent#getRendersChildren()` returns `true`, it will
    invoke `encodeChildren()` on itself, or else invoke `UIComponent#encodeAll()`
    on each child, and then invoke `encodeEnd()` on itself. This all happens only
    if `UIComponent#isRendered()` returns `true`—that is, when the `rendered` attribute
    of the component tag doesn’t evaluate to `false`.


    The default implementation of the `encodeBegin()` method will first fire the `PreRenderComponentEvent`
    for the current component and then delegate to `Renderer#encodeBegin()`. The default
    implementation of the `encodeChildren()` method will delegate to `Renderer#encodeChildren()`.
    The default implementation of the `encodeEnd()` method will delegate to `Renderer#encodeEnd()`.
    If the component has no renderer attached, that is, when `UIComponent#getRendererType()`
    returns `null`, then no HTML output will be rendered to the response.


    In the `encodeBegin()` method, the component or the renderer implementation has
    the opportunity to write the opening HTML element and all of its attributes to
    the response. In the `encodeChildren()` method the component or the renderer implementation
    has the opportunity to decorate or override the rendering of the children if necessary.
    In the `encodeEnd()` method the component or the renderer implementation has the
    opportunity to write the closing HTML tag. Writing to the response happens with
    the response writer as available by `FacesContext#getResponseWriter()`.


    For any mentioned `XxxEvent` class which has been fired in any phase, if any listener
    method throws `javax.faces.event.AbortProcessingException`, then the currently
    running phase will be immediately aborted and the life cycle will immediately
    advance to the render response phase (sixth phase), thereby skipping any phase
    in between.'
