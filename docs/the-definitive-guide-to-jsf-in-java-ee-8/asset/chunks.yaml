- fmt: "# Authentication Statuses\n\nThe third status is `SUCCESS`, which means “authentication\
    \ succeeded.” This is returned when the authentication mechanism successfully\
    \ validated the credentials provided. It’s only after this status is returned\
    \ that `HttpServletRequest#getUserPrincipal()`, `SecurityContext#getCallerPrincipal()`,\
    \ etc., return non-null values to indicate the current caller is authenticated.\
    \ A JSF backing bean can respond to this in various ways (e.g., by setting a faces\
    \ message and continuing to render the view, or issuing a redirect of itself).\n\
    \nThe fourth and final status is `NOT_DONE`, which is returned when the authentication\
    \ mechanism chooses to not authenticate at all. This happens, for instance, when\
    \ the authentication mechanism is pre-emptively called but authentication appeared\
    \ not to be necessary. Typically, a JSF backing bean would not need to take any\
    \ special action here.\n\n## Caller-Initiated Authentication\n\nThe previous code\
    \ discussed the situation where an unauthenticated caller tries to access a protected\
    \ resource (URL/page) and the authentication dialog is automatically started.\
    \ Since this authentication dialog is started by the container, we call this “container-initiated\
    \ authentication.”\n\nAnother case is where a caller explicitly starts the authentication\
    \ dialog (e.g., by clicking on a “login” button). Because the caller starts this\
    \ dialog we call it “caller-initiated authentication.”\n\nIn case of caller-initiated\
    \ authentication, the core authentication mechanism is effectively directly invoked\
    \ and the platform-provided login-to-continue functionality is skipped. This means\
    \ that if an authentication mechanism depends on login-to-continue to redirect\
    \ to a login page and after authentication to redirect back to the protected resource,\
    \ neither of these two actions will happen when the application programmatically\
    \ triggers authentication.\n\nThe `CustomFormAuthenticationMechanism` that we\
    \ defined earlier via an annotation is indeed a mechanism that uses the platform’s\
    \ login-to-continue service, so we’ll start the authentication dialog by directing\
    \ to the same login view we used before. To indicate this is a new login, an extra\
    \ request parameter is provided. The view from which we start looks as follows:\n\
    \n```\n<!DOCTYPE html>\n<html lang=\"en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\"\n>\n    <h:head>\n      \
    \  <title>Welcome</title>\n    <h:head>\n    <h:body>\n        <c:if test=\"#{not\
    \ empty request.userPrincipal}\">\n            <p>Logged-in as #{request.userPrincipal}</p>\n\
    \        </c:if>\n        <c:if test=\"#{empty request.userPrincipal}\">\n   \
    \         <h:form>\n                <h:button value=\"Login\" outcome=\"/login\"\
    >\n                    <f:param name=\"new\" value=\"true\" />\n             \
    \   </h:button>\n            </h:form>\n        </c:if>\n    </h:body>\n</html>\n\
    ```\n\nIn the backing bean we’ll inject two additional objects: an instance to\
    \ obtain and store the mentioned request parameter and a reference to the `Flash`,\
    \ which we’ll use later.\n\n```\n@Inject\nprivate Flash flash;\n\n@Inject @ManagedProperty(\"\
    #{param.new}\")\nprivate boolean isNew;\n```\n\nThe managed bean’s scope needs\
    \ to be changed to `@ViewScoped`, so we can retain the value of the `isNew` instance\
    \ variable after the login form’s postback.\n\nAn important addition is to the\
    \ `SecurityContext#authenticate()` method where we’ll now provide an extra parameter:\
    \ `newAuthentication`. The authentication mechanism does not strictly need this\
    \ though, and it’s just smart enough to distinguish between an initial new authentication\
    \ and continuing an authentication dialog that’s in progress. However, things\
    \ get more difficult when a caller is in the midst of an authentication dialog\
    \ and then navigates away, only to explicitly click a login button later. If the\
    \ state associated with said dialog hasn’t expired at that point, the authentication\
    \ mechanism doesn’t know a new authentication is required and will likely continue\
    \ the aborted but still valid dialog.\n\nTo prevent this, we can force a new authentication\
    \ by setting `newAuthentication` to `true`. This will discard all existing states.\
    \ The modified `continueAuthentication()` method looks as follows:\n\n```\nprivate\
    \ AuthenticationStatus continueAuthentication() {\n    return securityContext.authenticate(\n\
    \        (HttpServletRequest) externalContext.getRequest(),\n        (HttpServletResponse)\
    \ externalContext.getResponse(),\n        AuthenticationParameters.withParams()\n\
    \           .newAuthentication(isNew).credential(\n               new UsernamePasswordCredential(email,\
    \ password))\n    );\n}\n```\n\nNote that this version can be used for the case\
    \ where we continue the dialog as well as to start a new one. When we continue\
    \ the dialog, `isNew` will simply be `false`, which also happens to be the default\
    \ when the parameter is not specified at all.\n\nWhen using the `CustomFormAuthenticationMechanism`\
    \ we know there will not be any redirects or other writes to the response after\
    \ we provide the credentials in caller-initiated authentication, so that gives\
    \ us a convenient location to handle the redirect to a landing page after the\
    \ caller authenticates: the `SUCCESS` case.\n\n```\ncase SUCCESS:\n    flash.setKeepMessages(true);\n\
    \    facesContext.addMessage(null, new FacesMessage(\n        FacesMessage.SEVERITY_INFO,\
    \ \"Login succeed\", null));\n    externalContext.redirect(\n        externalContext.getRequestContextPath()\
    \ + \"/index.xhtml\");\n    break;\n```\n\nWe’re redirecting the caller here to\
    \ the `index.xhtml` landing page. Note that this is also the view where the caller\
    \ initiated the authentication dialog, but that’s just a coincidence in this example.\
    \ In general, the view or even URL where we redirect the caller to is completely\
    \ free for the application developer to choose. Typically, a landing page of some\
    \ sort is chosen, which could be the index of the application or a dashboard corresponding\
    \ to the main role the caller is in. As we mentioned above, when `SUCCESS` is\
    \ returned the caller is fully authenticated. This means we can query the caller’s\
    \ roles and use these in our decision where to redirect to.\n\n**Outlook:** a\
    \ future version of Java EE Security may introduce a hybrid option where caller-initiated\
    \ authentication can still start with the same redirect as container-initiated\
    \ authentication and allows for the redirect-back URL to be provided by the application."
