    ambitious and promised not only to fix many of the issues that people had been
    complaining about but also to introduce quite a bunch of new features. Mentioned
    among the many goals in the JSR was a particularly interesting one when looking
    at the bigger picture—extracting the managed bean facility from JSF and making
    it available for the entire platform.


    During the fall of 2007 the community was polled for a name for the JSF RI. Four
    names rose to the top, but as is often the case none of these names could be approved
    by Sun’s legal department. Eventually Mojarra was proposed, and perhaps to the
    surprise of some this one did pass legal’s scrutiny. Ryan Lubke, one of the main
    JSF committers then, made the official announcement on December 5, 2007.


    A little under a year later, on October 29, 2008, Çağatay Çivici started a new
    library, PrimeFaces . The name derives from Çağatay’s nickname, which is Optimus
    Prime, the courageous leader of the heroic autobots in the fictional Transformers
    universe. Çağatay had been involved with JSF development for a long time and had
    worked on the YUI4JSF JSF component library before. PrimeFaces was initially based
    on JSF 1.x, but with JSF 2.x looming and the project still young it would soon
    after switch to JSF 2.x.


    On July 1, 2009, the long-awaited JSF 2.0 finally arrived. JSF 2.0 indeed fixed
    nearly every problem that the industry had with JSF; finally, Facelets was included
    as the default view templating language. JSP was effectively deprecated. The state
    saving concerns that Hookom and Winer brought forward more than three years earlier
    were addressed as well; from then on JSF only saved delta state (state changes),
    and in restore view the component tree was reloaded from the template, instead
    of actually restored.


    Another big concern brought forward by the JSF community over the years, JSF’s
    over-the-top emphasis on postbacks, was addressed too; GET requests became a first-class
    citizen in JSF 2.0\. A well-known usability problem with JSF, sometimes called
    “The Trap ,” was that for a number of operations the data involved needed to be
    the same during both the original request and the postback. This is not entirely
    trivial to guarantee in JSF 1.x. JSF 2.0 introduced the so-called view scope for
    this, which elegantly solved the problem. The creation of custom components, yet
    another problem area of JSF 1.x, was made much simpler as well. JSF 2.0 also introduced
    core support for AJAX, modeled after the way Ajax4Jsf worked, a resource API,
    system events, and quite a few other things.


    One of JSF 2.0’s goals, making its managed bean facility usable outside JSF, was
    implicitly reached by the CDI spec, which was introduced together with JSF 2.0
    in Java EE 6. The CDI spec itself has a long history too, but one of its defining
    characteristics is that CDI Beans are strongly based on JSF Managed Beans and
    are essentially a super set of those.


    Altogether the impact of all those fixes and new features was such that it split
    the community essentially in two; those who had used JSF 1.x and never looked
    at it again and those who switched to JSF 2.x or, specifically, the ones who started
    using JSF with 2.0 and never saw 1.x. This often led to heated debates, with the
    1.x side arguing that JSF is horrible, and the 2.x side not understanding at all
    why that would be the case. Even at the time of this writing, which is almost
    nine years after JSF 2.0 was released, and a longer period than JSF 1.x ever existed,
    these sentiments still remain to some degree.


    Despite the many things that JSF 2.0 did right, there was one missed opportunity;
    even though CDI was now available and superseded JSF’s Managed Beans, JSF chose
    not to deprecate its managed bean facility right away. Even worse, it introduced
    an annotation-based alternative to the XML-based system JSF 1.x used to define
    managed beans. With CDI already out there having annotations like javax.enterprise.context.RequestScoped,
    simultaneously introducing a javax.faces.bean.RequestScoped annotation that did
    exactly the same thing seems debatable as best. The EG seemed to be aware of this
    conflict, as a warning was put in place that these new annotations would possibly
    be superseded by platform functionality before long.


    On December 23, Cay Horstmann raised his concerns about this very unwanted situation
    in an article titled “Is @javax.faces.bean.ManagedBean Dead on Arrival? ” The
    response was quite clear; people, including Java EE book writer Antonio Goncalves,
    asked for this huge mistake that JSF 2.0 had made to be corrected as soon as possible
    and to deprecate javax.faces.bean.ManagedBean right away in the upcoming JSF 2.1
    maintenance release which was called for, among other things, to rectify another
    mistake (namely, the problem JSF 2.0 introduced that in addition to a custom ResourceResolver
    it was also necessary to provide a custom ExternalContext, which was very unclear).
    Why javax.faces.bean.ManagedBean indeed wasn’t deprecated in the JSF 2.1 MR remains
    a mystery to this day.


    While applications written against the JSF 1.x APIs would mostly run unchanged
    on JSF 2.0, or only needed a few small changes, the component libraries had a
    much harder time. Specifically, the platform-provided AJAX support meant that
    the existing component libraries would have to forego their own AJAX implementations
    and rebase on the standard APIs. Clearly that was no small feat, and it took a
    long time for component libraries to migrate, with some never really making the
    switch at all.


    Here PrimeFaces was clearly at an advantage. Being a relatively new library without
    much legacy, it made the switch relative easy. Be it a coincidence or not, PrimeFaces’
    ascension in popularity seemed to start right after JSF 2.0 was released, which
    was also the exact same time that both ICEfaces and RichFaces seemed to become
    less popular. Although it must be noted that hard statistics are difficult to
    obtain and contain many facets (downloads, deployments, book, questions asked,
    available jobs, taking different industries into account, etc.), somewhere around
    2012 PrimeFaces had seemingly become the more popular JSF component library.


    In the beginning of that same year, February 19, 2012, Arjan Tijms and Bauke Scholtz
    (by coincidence also the authors of this book) started the OmniFaces library for
    JSF. The goal of OmniFaces was to be a utility library for JSF, essentially what
    Apache Commons and Google Guava are to Java SE. Tijms and Scholtz had worked on
    a JSF-based web site together and found that they both had a collection of private
    JSF utilities that they reused for different projects, and also that a great number
    of similar utilities were essentially rewritten again and again for many JSF projects
    and were partially floating around in places like forum messages and blog posts.
    OmniFaces was set up in particular not to not compete component libraries like
    PrimeFaces but to work together with those. Hence, visual-oriented components
    were largely out of scope for OmniFaces.'
  trans: '

    ## 迈向成熟


    2007 年 5 月 22 日，JSF 2.0 的规范制定工作正式启动。其范围雄心勃勃，不仅承诺修复人们长期抱怨的诸多问题，还将引入大量新特性。在 JSR
    中提到的众多目标里，有一个从宏观角度来看尤为引人注目——将托管 Bean 设施从 JSF 中剥离出来，使其可供整个平台使用。


    2007 年秋季，社区为 JSF 参考实现（RI）的名称进行了投票。四个名字脱颖而出，但如同常见情况，这些名字均未通过 Sun 公司法律部门的批准。最终，“Mojarra”被提出，或许令一些人意外的是，这个名字通过了法律审查。时任
    JSF 主要提交者之一的 Ryan Lubke 于 2007 年 12 月 5 日正式宣布了这一消息。


    大约一年后，2008 年 10 月 29 日，Çağatay Çivici 启动了一个新的库——PrimeFaces。其名称源于Çağatay 的昵称“擎天柱”（Optimus
    Prime），即虚构的《变形金刚》宇宙中英勇的汽车人领袖。Çağatay 长期参与 JSF 开发，此前曾致力于 YUI4JSF JSF 组件库的工作。PrimeFaces
    最初基于 JSF 1.x，但随着 JSF 2.x 的临近以及该项目尚处早期阶段，它很快便转向了 JSF 2.x。


    2009 年 7 月 1 日，期待已久的 JSF 2.0 终于问世。JSF 2.0 确实修复了业界对 JSF 几乎所有的抱怨；最终，Facelets 被纳入作为默认的视图模板语言。JSP
    被有效弃用。Hookom 和 Winer 在三年前提出的状态保存问题也得到了解决；此后，JSF 仅保存增量状态（状态变更），并且在恢复视图时，组件树从模板重新加载，而非实际恢复。


    多年来 JSF 社区提出的另一个重大关切——JSF 对回发的过度强调——也得到了解决；GET 请求在 JSF 2.0 中成为了一等公民。JSF 一个众所周知的可用性问题（有时被称为“陷阱”）是，对于某些操作，所涉及的数据在原始请求和回发期间必须保持一致。这在
    JSF 1.x 中并非完全容易保证。JSF 2.0 为此引入了所谓的视图作用域，优雅地解决了该问题。自定义组件的创建——JSF 1.x 的另一个问题领域——也变得更加简单。JSF
    2.0 还引入了对 AJAX 的核心支持（其模式借鉴了 Ajax4Jsf 的工作方式）、资源 API、系统事件以及其他诸多特性。


    JSF 2.0 的目标之一——使其托管 Bean 设施可在 JSF 之外使用——通过 CDI 规范间接实现，该规范与 JSF 2.0 一同在 Java EE
    6 中引入。CDI 规范本身也有悠久的历史，但其决定性特征之一是 CDI Bean 强烈基于 JSF 托管 Bean，并且本质上是后者的超集。


    总而言之，所有这些修复和新特性的影响如此之大，以至于将社区基本一分为二：那些使用过 JSF 1.x 且再未回头的用户，以及那些转向 JSF 2.x 的用户，或者更具体地说，那些从
    JSF 2.0 开始使用且从未接触过 1.x 的用户。这常常引发激烈争论，1.x 一方认为 JSF 糟糕透顶，而 2.x 一方则完全无法理解为何会如此。即使在撰写本文时（距
    JSF 2.0 发布已近九年，比 JSF 1.x 存在的时间更长），这些情绪在某种程度上依然存在。


    尽管 JSF 2.0 做了许多正确的事，但仍有一个错失的良机：即使 CDI 现已可用并取代了 JSF 的托管 Bean，JSF 却选择不立即弃用其托管 Bean
    设施。更糟的是，它引入了一种基于注解的替代方案，以取代 JSF 1.x 用于定义托管 Bean 的基于 XML 的系统。既然 CDI 已经拥有像`javax.enterprise.context.RequestScoped`这样的注解，同时再引入一个功能完全相同的`javax.faces.bean.RequestScoped`注解，充其量只能说是值得商榷。专家组似乎意识到了这一冲突，因此设置了一个警告，指出这些新注解可能很快就会被平台功能所取代。


    12 月 23 日，Cay Horstmann 在一篇题为“@javax.faces.bean.ManagedBean 是否已胎死腹中？”的文章中表达了他对这一非常不受欢迎情况的担忧。回应相当明确：包括
    Java EE 书籍作者 Antonio Goncalves 在内的人们要求尽快纠正 JSF 2.0 犯下的这个巨大错误，并在即将到来的 JSF 2.1 维护版本中立即弃用`javax.faces.bean.ManagedBean`。该维护版本被要求（除其他事项外）纠正另一个错误（即
    JSF 2.0 引入的问题：除了自定义`ResourceResolver`之外，还必须提供自定义`ExternalContext`，这一点非常不明确）。为何`javax.faces.bean.ManagedBean`在
    JSF 2.1 MR 中未被弃用，至今仍是个谜。


    虽然基于 JSF 1.x API 编写的应用程序大多可在 JSF 2.0 上无需更改或仅需少量修改即可运行，但组件库的处境则艰难得多。具体来说，平台提供的
    AJAX 支持意味着现有组件库必须放弃自己的 AJAX 实现，并重新基于标准 API。显然，这绝非易事，组件库的迁移花费了很长时间，有些甚至从未真正完成切换。


    在这方面，PrimeFaces 显然具有优势。作为一个相对较新且没有太多历史包袱的库，它进行切换相对容易。无论是否巧合，PrimeFaces 人气的上升似乎正是在
    JSF 2.0 发布之后开始的，而这也正是 ICEfaces 和 RichFaces 似乎开始变得不那么流行的同一时间。尽管必须指出，确切的统计数据难以获取且包含多个方面（下载量、部署量、书籍、提问数量、可用职位、考虑不同行业等），但在
    2012 年左右，PrimeFaces 似乎已成为更受欢迎的 JSF 组件库。


    同年年初，2012 年 2 月 19 日，Arjan Tijms 和 Bauke Scholtz（巧合的是，他们也是本书的作者）启动了面向 JSF 的 OmniFaces
    库。OmniFaces 的目标是成为 JSF 的实用工具库，本质上类似于 Apache Commons 和 Google Guava 之于 Java SE。Tijms
    和 Scholtz 曾共同开发一个基于 JSF 的网站，发现两人都拥有一套在不同项目中重复使用的私有 JSF 实用工具，并且大量类似的实用工具在许多 JSF
    项目中基本上被反复重写，部分散落在论坛消息和博客文章等地方。OmniFaces 的设立尤其不是为了与 PrimeFaces 等组件库竞争，而是为了与它们协同工作。因此，面向视觉的组件在很大程度上不在
    OmniFaces 的范围内。

    '
- fmt: '# JSF 2.2 与 2.3 的发展历程


    2012 年，`JSF 2.2` 的规范制定工作也全面展开。`JSF 2.2` 最终于次年 5 月 21 日发布。`JSF 2.2` 特别提出了 `Facelets`
    可运行的替代模式的正式版本；不再在视图上放置组件标签，而是放置纯 `HTML`，并通过一个特殊的 `ID` 将标签链接到组件。这种模式通常对 `JSF` 开发者的吸引力较小，但特别吸引那些可以更轻松地使用纯
    `HTML` 工具处理此类视图的网页设计师。`JSF 2.2` 还引入了与 `CDI` 兼容的 `@ViewScoped` 注解，这消除了在 `JSF 2.1`
    中仍使用 `JSF` 托管 Bean 功能的最后一个原因之一，即在该版本中，`@ViewScoped` 仅适用于那些 Bean。`JSF 2.2` 还引入了两个重要的新特性：`Faces
    Flow` 和 `Resource Contracts`，但这些特性在实践中似乎很少被采用。


    就在 `JSF 2.3` 启动之前，2014 年 7 月 20 日，`RichFaces` 负责人 `Brian Leathem` 在其博客上宣布，`RichFaces`
    的下一代版本 `RichFaces 5` 将被取消。相反，`RichFaces` 将“追求稳定而非创新”，这意味着 `JBoss` 将使 `RichFaces
    4.x` 与 `JSF 2.2` 兼容，并回移植一些为 `RichFaces 5` 开发的功能。虽然这篇博文有些乐观，但看起来 `RichFaces` 的结局已定。


    2014 年 8 月 26 日，`JSF 2.3` 的规范工作启动。引入了一位新的联合规范负责人——`Manfred Riem`，他此前主要致力于 `Mojarra`
    的实现方面，例如将 `JSF` 著名的数百个测试从古老且已退役的 `Cactus` 框架迁移到更现代的基于 `Maven` 的框架，并确保将大量开放的 `Mojarra`
    问题减少到可控数量。`JSF 2.3` 开始时可能传达了一个值得注意的消息：`Oracle` 只有少量可用资源。在规范制定过程中，这些少量资源减少到了几乎无人能预料到的数字——绝对为零。基本上，在
    `JavaOne 2015` 之后，几乎所有规范负责人都不见了，大多数规范因此突然停滞不前。`Josh Juneau` 在其著名的研究《`Java EE 8`，当前状态如何：自
    2015 年底以来已完成工作的案例研究》中报告了这一点，该研究通过展示电子邮件、提交和已解决问题的图表，明确表明 `Oracle` 已经退出。


    幸运的是，`JSF` 及其参考实现 `Mojarra` 的开放性使得规范工作及其在 `Mojarra` 中的实现可以由其他 `EG` 成员继续进行，事实也确实如此。


    与此同时，2016 年 2 月 12 日，`Red Hat` 宣布 `RichFaces` 将于当年晚些时候（即 2016 年 6 月）停止服务（`EOL`）。曾经最流行的
    `JSF` 组件库之一，常被称为“三大巨头之一”，实际上已不复存在。2016 年 6 月 20 日，对该项目的最后一次实际提交完成：“`RF-14279:
    update JSDoc`”。两天后，`Red Hat` 发布了 `RichFaces 4.5.17`，`GitHub` 仓库被设置为归档（只读）模式。仍然是
    `JSF 2.3 EG` 成员的 `Brian Leathem` 在 2 月 18 日几天后宣布，他将不再从事任何与 `JSF` 相关的工作。


    ## 复兴


    2016 年底，`JSF` 规范负责人短暂回归，但带来的消息是规范必须在短短几周内完成，以便启动（有些）冗长的最终确定过程。2017 年 3 月 28 日，`JSF
    2.3` 最终发布，它带来了用 `CDI` 版本替换 `JSF` 原生工件的开端，并最终实现了本应多年前完成的事情：弃用 `JSF` 托管 Bean 功能，转而使用
    `CDI` Bean。其他特性包括：使用由 `OmniFaces` 捐赠的 `Java EE WebSocket` API 支持 `WebSocket`、系统中可用视图资源的自省，以及由
    `PrimeFaces` 捐赠的搜索表达式框架。


    继 `JSF 2.3` 规范有些动荡的发展之后，`Oracle` 在 2017 年宣布了更加动荡的消息：`Java EE`（因此包括 `JSF`）将移交给
    `Eclipse` 基金会。`Oracle` 将停止领导其之前拥有的规范，这同样包括 `JSF`。这意味着 `Mojarra` 将被重新许可，`JSF` 将通过一个可能由不同负责人领导的新流程来发展。在撰写本文时，这一移交工作正在全面进行中。


    © `Bauke Scholtz`, `Arjan Tijms` 2018


    `Bauke Scholtz` 和 `Arjan Tijms`，《`The Definitive Guide to JSF in Java EE 8`》，[https://doi.org/10.1007/978-1-4842-3387-0_2](https://doi.org/10.1007/978-1-4842-3387-0_2)


    # 2. 从零到 Hello World


    `Bauke Scholtz`^(1 ) 和 `Arjan Tijms`²


    (1) 威廉斯塔德，库拉索


    (2) 阿姆斯特丹，北荷兰省，荷兰


    在本章中，你将学习如何使用 `Eclipse IDE`（集成开发环境）、`Payara` 应用服务器和 `H2` 数据库从头开始搭建一个 `JSF`（`JavaServer
    Faces`）开发环境。


    ## 安装 Java SE JDK


    你可能已经知道，`Java SE` 以 `JRE` 形式提供给最终用户，以 `JDK` 形式提供给软件开发人员。`Eclipse` 本身并不严格要求 `JDK`，因为它有自己的编译器。`JSF`
    作为一个软件库，运行也不需要 `JDK`。然而，`Payara` 确实需要 `JDK` 才能运行，主要是为了能够编译 `JSP` 文件，尽管自 `JSF 2.0`
    以来，`JSP` 已被弃用为 `JSF` 视图技术。


    因此，你需要确保已按照 `Oracle` 的说明安装了 `JDK`。当前的 `Java SE` 版本是 9，但由于 `Java EE 8` 是为目前更成熟的
    `Java SE 8` 设计的，因此推荐使用 `JDK 8`：[https://docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html](https://docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html)。


    最重要的部分是：`PATH` 环境变量应包含包含 `Java` 可执行文件的 `/bin` 文件夹（例如，`"/path/to/jdk/bin"`），并且
    `JAVA_HOME` 环境变量应设置为 `JDK` 根文件夹（例如，`"/path/to/jdk"`）。`JSF` 并不严格要求这些，但 `Eclipse`
    和 `Payara` 需要它们。`Eclipse` 需要 `PATH` 来查找 `Java` 可执行文件。`Payara` 需要 `JAVA_HOME` 来查找
    `JDK` 工具。'
  raw: 'In 2012 the specification process for JSF 2.2 was also in full swing. JSF
    2.2 was eventually released on the May 21, the next year. JSF 2.2 specifically
    came up with a formal version of the alternative mode in which Facelets could
    operate; instead of putting component tags on a view, plain HTML was put on it,
    with a special ID linking the tag to a component. Such a mode is generally speaking
    somewhat less interesting to JSF developers but appeals specifically to web designers
    who can more easily use plain HTML tools for such views. JSF 2.2 also introduced
    a CDI compatible @ViewScoped annotation, which removed one of the last reasons
    to still use the JSF managed bean facility in JSF 2.1, namely, that in that version
    @ViewScoped only worked on those beans. JSF 2.2 also introduced two new big features,
    Faces Flow and Resource Contracts, but these seem to have seen little uptake in
    practice.


    Just prior to the start of JSF 2.3, on July 20, 2014, RichFaces lead Brian Leathem
    announced on his blog that RichFaces 5, the next-generation version of RichFaces,
    would be canceled. Instead, RichFaces would “pursue a path of stability over innovation,”
    which means that JBoss will make RichFaces 4.x compatible with JSF 2.2 and port
    back a few things that were in development for RichFaces 5\. While the post was
    somewhat optimistic, it strongly looked like the writing was on the wall for RichFaces.


    On August 26, 2014, the specification work for JSF 2.3 started. A new co-spec
    lead was introduced—Manfred Riem, who up to then had been working mostly on the
    implementation side of Mojarra, doing such things as migrating hundreds of the
    tests for which JSF is famous away from the ancient and retired Cactus framework
    to a more modern Maven-based one, and making sure the gazillions of open Mojarra
    issues were reduced to a manageable number. JSF 2.3 started off with a perhaps
    somewhat remarkable message that Oracle had only a few resources available. During
    the specification process those few resources dropped to a number that few would
    have expected—absolutely zero. Basically, after JavaOne 2015, nearly all of the
    spec leads just vanished and most specs as a result abruptly ground to a halt.
    Josh Juneau reported about this in his famous study, “Java EE 8, What Is the Current
    Status: Case Study for Completed Work Since Late 2015,” which undeniable makes
    it clear by showing graphs of e-mails, commits, and issues resolved that Oracle
    had just walked away.


    The openness of the JSF and its RI Mojarra were fortunately such that the specification
    work and implementation thereof in Mojarra can largely be carried on by the other
    EG members, which indeed happens.


    Meanwhile on February 12, 2016, Red Hat announced that RichFaces would be end
    of lived (EOL) later that year, namely, in June 2016\. One of the most popular
    JSF component libraries at some point, often named something like “One of the
    big three,” effectively was no more. On June 20, 2016, the last real commit to
    the project was done, “RF-14279: update JSDoc.” Two days later Red Hat released
    RichFaces 4.5.17 and the GitHub repos were put into archived (read only) mode.
    Brian Leathem, who is still a JSF 2.3 EG member, announced a few days later on
    February 18 that he would no longer be doing any JSF-related work.


    ## Rejuvenation


    In late 2016 the JSF spec leads briefly returned, but with the message that the
    spec must be completed in only a few weeks, so the (somewhat) lengthy finalization
    process could start. On March 28, 2017, JSF 2.3 was then eventually released,
    bringing with it the start of replacing JSF native artifacts with CDI versions,
    and finally something which should have happened years ago: the deprecation of
    the JSF managed bean facility in favor of using CDI beans. Other features are
    support for WebSocket using the Java EE WebSocket APIs donated by OmniFaces, the
    introspection of available view resources in the system, and a search expression
    framework donated by PrimeFaces.


    Following the somewhat turbulent development of the JSF 2.3 spec is the even more
    turbulent announcement by Oracle in 2017 that Java EE, thus including JSF, would
    be transferred to the Eclipse foundation. Oracle would stop leading the specs
    it owned before, which again includes JSF. This would mean that Mojarra would
    be re-licensed, and JSF would be evolved by a new process with likely different
    leads. At the time of writing, this transfer is in full swing.


    © Bauke Scholtz, Arjan Tijms 2018


    Bauke Scholtz and Arjan Tijms, The Definitive Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_2](#A454457_1_En_2_Chapter.xhtml)


    # 2. From Zero to Hello World


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    In this chapter you will learn how to set up a JSF (JavaServer Faces) development
    environment with the Eclipse IDE (integrated development environment), the Payara
    application server, and H2 database from scratch.


    ## Installing Java SE JDK


    You probably already know that Java SE is available as JRE for end users and as
    JDK for software developers. Eclipse itself does not strictly require a JDK as
    it has its own compiler. JSF being a software library does not require a JDK to
    run either. Payara, however, does require a JDK to run, primarily in order to
    be able to compile JSP files, even though JSP has been deprecated as JSF view
    technology since JSF 2.0.


    Therefore, you need to make sure that you already have a JDK installed as per
    Oracle’s instructions. The current Java SE version is 9, but as Java EE 8 was
    designed for Java SE 8 which is currently more mature, JDK 8 is recommended: [https://docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html](https://docs.oracle.com/javase/8/docs/technotes/guides/install/install_overview.html)
    .


    The most important parts are that the PATH environment variable covers the /bin
    folder containing the Java executables (e.g., "/path/to/jdk/bin"), and that the
    JAVA_HOME environment variable is set to the JDK root folder (e.g., "/path/to/jdk").
    This is not strictly required by JSF, but Eclipse and Payara need this. Eclipse
    will need the PATH in order to find the Java executables. Payara will need the
    JAVA_HOME in order to find the JDK tools.'
