  trans: "\n这已经算是不错的做法了，但仍有模板化的痕迹。如有必要，你还可以通过编程方式从后端 bean 添加 Ajax 渲染 ID。为此，你可以使用 `PartialViewContext#getRenderIds()`\
    \ ⁶。返回的集合是可变的，并且仅在渲染响应阶段（第六阶段）被使用。你还需要在此处指定一个绝对层级 ID，但有一个重要的区别：它不能以命名容器分隔符字符开头。换句话说，`:form:table:0:column2`\
    \ 是行不通的；你需要指定 `form:table:0:column2`。它始终相对于 `UIViewRoot` 进行解析。\n\n```\nFacesContext\
    \ context = FacesContext.getCurrentInstance();\nPartialViewContext ajaxContext\
    \ = context.getPartialViewContext();\najaxContext.getRenderIds().add(\"form:table:0:column2\"\
    );\n```\n\n作为提示，如果你难以确定绝对层级 ID 或记住哪些组件是命名容器，那么你始终可以查看生成的 HTML 输出。在你常用的浏览器中打开 JSF\
    \ 页面，执行*查看页面源代码*，找到目标 JSF 组件对应的 HTML 元素，获取其 `ID` 属性的值，最后在其前面加上命名容器分隔符字符。\n\n另外，如果你遇到以\
    \ `j_id` 为前缀的自动生成 ID，那么你绝对需要为相关的 JSF 组件指定一个固定的 ID；否则，当该组件在组件树中的位置可能因条件变化（例如，在目标组件位置之前有条件包含的组件）而改变时，其值就会出错。（另请参阅第\
    \ 4 章的“基于文本的输入组件”一节。）\n\n与相对本地 ID 类似，绝对层级 ID 可以使用 `UIComponent#findComponent()`\
    \ API 中描述的算法通过编程方式解析。⁷ 以下示例演示了如何获取代表 `<h:form id=\"form\"><h:dataTable id=\"table\"\
    >` 的 `UIData` 组件。\n\n```\nUIViewRoot root = FacesContext.getCurrentInstance().getViewRoot();\n\
    UIData table = (UIData) root.findComponent(\"form:table\");\n```\n\n## 标准搜索关键字\n\
    \nJSF 提供了一组更抽象的搜索表达式，称为“搜索关键字”。它们都以 `@` 字符开头。它们可用于在搜索表达式中替代固定的组件 ID。表 12-1 提供了它们的概述。\n\
    \n###### 表 12-1 JSF 提供的标准搜索关键字\n\n| 关键字 | 解析目标 | 起始版本 |\n| --- | --- | --- |\n\
    | @this | UIComponent#getCurrentComponent() | 2.0 |\n| @form | UIComponent#getNamingContainer()\
    \ 直到遇到 UIForm | 2.0 |\n| @all | 所有组件 | 2.0 |\n| @none | 无 | 2.0 |\n| @parent |\
    \ UIComponent#getParent() | 2.3 |\n| @child(index) | 给定索引处的 UIComponent#getChildren()\
    \ | 2.3 |\n| @next | UIComponent#getParent() 然后下一个索引处的 UIComponent#getChildren()\
    \ | 2.3 |\n| @previous | UIComponent#getParent() 然后上一个索引处的 UIComponent#getChildren()\
    \ | 2.3 |\n| @namingcontainer | UIComponent#getNamingContainer() | 2.3 |\n| @composite\
    \ | UIComponent#getCompositeComponentParent() | 2.3 |\n| @id(id) | 使用给定 ID 的 UIComponent#findComponent()\
    \ | 2.3 |\n| @root | FacesContext#getViewRoot() | 2.3 |\n\n在标准 JSF 组件集中，所有搜索关键字（包括自定义关键字）都可以用于以下组件属性：\n\
    \n*   `<f:ajax execute>` — 指定在 Ajax 回发请求的应用请求值、处理验证、更新模型值和调用应用阶段（第二、三、四、五阶段）期间必须处理的组件。默认为\
    \ `@this`。\n\n*   `<f:ajax render>` — 指定在 Ajax 回发请求的渲染响应阶段（第六阶段）期间必须处理的组件。默认为\
    \ `@none`。\n\n*   `<h:outputLabel for>` — 指定生成的 HTML `<label>` 元素的目标组件。默认为 `@none`。\n\
    \n*   `<h:message for>` — 指定必须为其渲染第一个 faces 消息的目标组件。默认为 `@none`。\n\n*   `<h:messages\
    \ for>` — 指定必须为其渲染所有 faces 消息的目标组件。默认为 `@none`。\n\n请注意，对于 `<h:outputLabel>`、`<h:message>`\
    \ 和 `<h:messages>` 的 `for` 属性，使用搜索关键字仅在 JSF 2.3 之后才成为可能。在旧版本中，仅支持相对 ID 和绝对 ID。\n\
    \n最常用的搜索关键字无疑是 `@form`。当你在一个旨在处理整个表单的 `UICommand` 组件中使用 `<f:ajax>` 时，基本上别无选择。\n\
    \n```\n<h:form>              \n    ...\n    <h:commandButton value=\"Submit\"\
    \ ...>\n        <f:ajax execute=\"@form\" />\n    </h:commandButton>\n</h:form>\
    \ \n```\n\n自 JSF 2.3 起，另一个新特性是搜索关键字可以与常规组件 ID 链接。以下示例扩展了前面“绝对层级 ID”一节中给出的示例。\n\
    \n```\n<h:form>\n    <h:outputLabel id=\"l_time\" for=\"time:hour\" value=\"Time\"\
    \ />\n    <t:inputLocalTime id=\"time\" value=\"#{schedule.time}\" required=\"\
    true\">\n        <f:ajax render=\"@form:m_time\" />\n    <h:message id=\"m_time\"\
    \ for=\"time\" />\n</h:form>\n```\n\n以下示例演示了在删除一行时更新整个表格。\n\n```\n<h:form>\n    <h:dataTable\
    \ value=\"#{products.list}\" var=\"product\">\n        ...\n        <h:column>\n\
                <h:commandButton id=\"delete\" value=\"Delete\"\n                action=\"\
    #{products.delete(product)}\">\n                <f:ajax render=\"@namingcontainer\"\
    \ />\n            </h:commandButton>\n        </h:column>\n    </h:dataTable>\n\
    </h:form>\n```\n\n特别注意，它引用的是最近的实现了 `NamingContainer` 接口的组件，在此上下文中是 `<h:dataTable>`，而不是\
    \ `<h:form>`。\n\n关于编程式解析，包含关键字的搜索表达式不能使用 `UIComponent#findComponent()` 进行编程式解析。为此，你需要使用\
    \ `SearchExpressionHandler#resolveComponent()` 或 `resolveComponents()` ⁸。`SearchExpressionHandler`\
    \ 又可以通过 `Application#getSearchExpressionHandler()` 获取。你还需要预先创建 `SearchExpressionContext`\
    \ ⁹，它封装了开始搜索的组件。\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
    UIComponent base = context.getViewRoot(); // 可以是任何组件。\nString expression = \"\
    @namingcontainer\";\n\nSearchExpressionContext searchContext = SearchExpressionContext\n\
        .createSearchExpressionContext(context, base);\nSearchExpressionHandler searchHandler\
    \ = context.getApplication()\n    .getSearchExpressionHandler();\nhandler.resolveComponent(searchContext,\
    \ expression, (ctx, found) -> {\n    System.out.println(found);\n});\n```\n\n\
    坦率地说，这相当冗长，但它是 JSF API 自带的。幸运的是，存在像 OmniFaces 这样的实用工具库。\n"
- fmt: "# Custom Search Keywords\n\nThe Component Search Expression Framework introduced\
    \ in JSF 2.3 also comes with an API which allows us to create custom search keywords.\
    \ Imagine that you have a form with multiple `<h:message>` components, and that\
    \ you’d like to re-render them all when submitting the form. Then you’d be tempted\
    \ also to use `@form` in the `render` attribute of `<f:ajax>`.\n\n```\n<h:form>\
    \                \n    <h:outputLabel for=\"input1\" ... />\n    <h:inputText\
    \ id=\"input1\" ... />\n    <h:message for=\"input1\" />\n\n<h:outputLabel for=\"\
    input2\" ... />\n    <h:inputText id=\"input2\" ... />\n    <h:message for=\"\
    input2\" />\n\n<h:outputLabel for=\"input3\" ... />\n    <h:inputText id=\"input3\"\
    \ ... />\n    <h:message for=\"input3\" />\n\n<h:commandButton value=\"Submit\"\
    \ ...>\n        <f:ajax execute=\"@form\" render=\"@form\" />\n    </h:commandButton>\n\
    </h:form> \n```\n\nBut this is not terribly efficient. In fact, it also unnecessarily\
    \ re-renders all label and input components and any other static content inside\
    \ the very same form which doesn’t at all change during the Ajax postback request.\
    \ This is a waste of resources. Ideally, we should have a search keyword like\
    \ `@messages` which basically references all message components within the same\
    \ form.\n\n```\n<h:form>\n    <h:outputLabel for=\"input1\" ... />\n    <h:inputText\
    \ id=\"input1\" ... />\n    <h:message id=\"m_input1\" for=\"input1\" />\n\n<h:outputLabel\
    \ for=\"input2\" ... />\n    <h:inputText id=\"input2\" ... />\n    <h:message\
    \ id=\"m_input2\" for=\"input2\" />\n\n<h:outputLabel for=\"input3\" ... />\n\
    \    <h:inputText id=\"input3\" ... />\n    <h:message id=\"m_input3\" for=\"\
    input3\" />\n\n<h:commandButton value=\"Submit\" ...>\n        <f:ajax execute=\"\
    @form\" render=\"@messages\" />\n    </h:commandButton>\n</h:form>\n```\n\nNote\
    \ that each `<h:message>` component has an explicit ID set, because without an\
    \ explicit ID, they will by default render nothing to the HTML output, and then\
    \ the JSF Ajax API JavaScript wouldn’t be able to find them in order to update\
    \ its content based on the Ajax response.\n\nIn order to get JSF to recognize\
    \ the new search keyword `@messages`, first extend the `javax.faces.component.search.SearchKeywordResolver`\
    \ as follows:\n\n```\npublic class MessagesKeywordResolver extends SearchKeywordResolver\
    \ {\n\n@Override\n    public boolean isResolverForKeyword\n        (SearchExpressionContext\
    \ context, String keyword)\n    {\n        return \"messages\".equals(keyword);\n\
    \    }\n\n@Override\n    public void resolve\n        (SearchKeywordContext context,\
    \ UIComponent base, String keyword)\n    {\n        UIComponent form = base.getNamingContainer();\n\
    \        while (!(form instanceof UIForm) && form != null) {\n            form\
    \ = form.getNamingContainer();\n        }\n\nif (form != null) {\n           \
    \ Set<String> messageClientIds = new HashSet<>();\n            VisitContext visitContext\
    \ = VisitContext.createVisitContext\n                (context.getSearchExpressionContext().getFacesContext());\n\
    \nform.visitTree(visitContext, (visit, child) -> {\n                if (child\
    \ instanceof UIMessage) {\n                    messageClientIds.add(child.getClientId());\n\
    \                }\n                return VisitResult.ACCEPT;\n            });\n\
    \nif (!messageClientIds.isEmpty()) {\n                context.invokeContextCallback(new\
    \ UIMessage() {\n                    @Override\n                    public String\
    \ getClientId(FacesContext context) {\n                        return String.join(\"\
    \ \", messageClientIds);\n                    }\n                });\n       \
    \     }\n        }\n\ncontext.setKeywordResolved(true);\n    }\n}\n```\n\nIt should\
    \ be noted that this approach is already slightly hacky. Namely, the intent of\
    \ the `SearchKeywordResolver` is to resolve a keyword to exactly one component\
    \ whose client ID will then be used to substitute the keyword. This component\
    \ will then be passed to `SearchKeywordContext#invokeContextCallback()`. In the\
    \ above approach, we instead collect the client IDs of all `UIMessage` components\
    \ found within the parent `UIForm` and then supply a fake `UIMessage` component\
    \ to `invokeContextCallback()` who will in turn call the `getClientId()` of the\
    \ fake `UIMessage` component which actually returns the desired collection of\
    \ client IDs.\n\nIt should also be noted that `UIComponent#visitTree()` is being\
    \ used instead of recursing over `UIComponent#getChildren()` in order to collect\
    \ the client IDs of any `UIMessage` component. Namely, when plain iterating over\
    \ children, you may sooner or later come across an iterator component such as\
    \ `<h:dataTable>` or `<ui:repeat>`, and if it happens to have only one `UIMessage`\
    \ component nested, then you’ll effectively end up with only one client ID, namely,\
    \ the one without the iteration index. `UIComponent#visitTree()` doesn’t do that;\
    \ any iterator component in the path will actually iterate over its model value\
    \ and visually give back multiple `UIMessage` components, each with the correct\
    \ client ID with the iteration index included.\n\nIn the end, `SearchKeywordContext#setKeywordResolved()`\
    \ must be called with `true` in order to inform the search context that the keyword\
    \ has successfully been resolved, even if it actually resolved to nothing. It\
    \ doesn’t actually do any harm if you forgot this, but if you don’t mark the search\
    \ keyword resolved this way, then the search context will continue consulting\
    \ all other search keyword resolvers, which might end up being less efficient.\n\
    \nFinally, in order to get the new `MessagesKeywordResolver` to run, register\
    \ it in `faces-config.xml` as follows:\n\n```\n<application>\n    <search-keyword-resolver>\n\
    \        com.example.project.MessagesKeywordResolver\n    </search-keyword-resolver>\n\
    </application>\n```\n\nOr, programmatically in a `@WebListener` as follows:\n\n\
    ```\n@WebListener\npublic class ApplicationConfig implements ServletContextListener\
    \ {\n\n@Override\n    public void contextInitialized(ServletContextEvent event)\
    \ {\n        FacesContext.getCurrentInstance().getApplication()\n            .addSearchKeywordResolver(new\
    \ MessagesKeywordResolver());\n    }\n}\n```\n\nNote that the `FacesContext` must\
    \ be available at this point and hence a `ServletContainerInitializer` won't necessarily\
    \ work, and that the `FacesServlet` may not have serviced a request yet and hence\
    \ registration in some managed bean won't necessarily work."
