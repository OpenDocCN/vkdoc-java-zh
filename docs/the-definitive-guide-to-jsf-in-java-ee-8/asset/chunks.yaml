- fmt: "## Phase Events\n\n`javax.faces.event.PhaseListener`接口[³](#A454457_1_En_3_Chapter.xhtml#Fn3)可用于监听JSF生命周期的任何阶段。该接口定义了三个方法：`getPhaseId()`应返回你感兴趣的阶段；`beforePhase()`将在指定阶段执行前被调用；`afterPhase()`将在指定阶段执行后被调用。因此，在`beforePhase()`和`afterPhase()`方法中，你可以在`getPhaseId()`指定的阶段之前或之后运行一些代码。\n\
    \n`javax.faces.event.PhaseId`类[⁴](#A454457_1_En_3_Chapter.xhtml#Fn4)定义了一组公共常量。它仍源自JSF\
    \ 1.0，该版本在Java 1.5发布前几个月才发布，因此未能及时成为真正的枚举。以下列出这些常量及其序数值。\n\n*   `PhaseId.ANY_PHASE`\
    \ (0)\n*   `PhaseId.RESTORE_VIEW` (1)\n*   `PhaseId.APPLY_REQUEST_VALUES` (2)\n\
    *   `PhaseId.PROCESS_VALIDATIONS` (3)\n*   `PhaseId.UPDATE_MODEL_VALUES` (4)\n\
    *   `PhaseId.INVOKE_APPLICATION` (5)\n*   `PhaseId.RENDER_RESPONSE` (6)\n\n阶段监听器实例可以通过多种方式注册。声明式地，可以通过`faces-config.xml`在应用范围内注册。\n\
    \n```\n<lifecycle>\n    <phase-listener>com.example.project.YourListener</phase-listener>\n\
    </lifecycle>\n```\n\n或者通过`<f:view>`内嵌的`<f:phaseListener>`标签在视图范围内注册。\n\n```\n\
    <f:view>\n    <f:phaseListener type=\"com.example.project.YourListener\" />\n\
    \    ...\n</f:view>\n```\n\n编程式地，可以通过`javax.faces.lifecycle.Lifecycle`实例的`addPhaseListener()`和`removePhaseListener()`方法在应用范围内添加和移除监听器[⁵](#A454457_1_En_3_Chapter.xhtml#Fn5)。然而，获取当前的`Lifecycle`实例略显复杂，因为公共JSF\
    \ API中（目前）没有直接的getter方法。\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
    String lifecycleId = context.getExternalContext()\n    .getInitParameter(FacesServlet.LIFECYCLE_ID_ATTR);\n\
    if (lifecycleId == null) {\n    lifecycleId = LifecycleFactory.DEFAULT_LIFECYCLE;\n\
    }\nLifecycleFactory lifecycleFactory = (LifecycleFactory)\n    FactoryFinder.getFactory(FactoryFinder.LIFECYCLE_FACTORY);\n\
    Lifecycle lifecycle = lifecycleFactory.getLifecycle(lifecycleId);\n```\n\n并且，可以通过`UIViewRoot`的`addPhaseListener()`和`removePhaseListener()`方法在视图范围内添加和移除监听器。关于`PhaseListener`的具体示例，请参见“自定义组件系统事件”一节。\n\
    \n## 组件系统事件\n\n如“生命周期”一节所述，在生命周期期间会触发一系列组件系统事件。它们继承自`javax.faces.event.ComponentSystemEvent`抽象类[⁶](#A454457_1_En_3_Chapter.xhtml#Fn6)。总结如下：\n\
    \n*   `PreRemoveFromViewEvent`：当组件即将从组件树中移除时触发。\n*   `PostAddToViewEvent`：当组件已添加到组件树时触发。\n\
    *   `PostRestoreStateEvent`（读作“PostRestoreViewEvent”）：当恢复视图阶段结束时，为每个组件触发。请注意，如果在此阶段视图构建尚未发生，则该事件仅针对`UIViewRoot`触发。如果在此阶段视图构建已发生，则该事件为树中的任何组件触发。\n\
    *   `PreValidateEvent`：当组件即将处理其转换器和验证器时触发，即使实际上没有转换器或验证器也会触发。\n*   `PostValidateEvent`：当组件完成处理其转换器和验证器时触发，即使实际上没有转换器或验证器也会触发。\n\
    *   `PreRenderViewEvent`：当`UIViewRoot`即将向HTTP响应写入HTML输出时触发。请注意，这是更改HTTP响应目标或以编程方式操作组件树的最晚安全时机。在此之后进行操作，无法保证对响应或组件树的任何程序性更改能按预期生效，因为此时响应可能已提交，或视图状态可能已保存。\n\
    *   `PreRenderComponentEvent`：当组件即将向HTTP响应写入其HTML输出时触发。\n*   `PostRenderViewEvent`：当`UIViewRoot`完成向HTTP响应写入HTML输出时触发。请注意，此事件自JSF\
    \ 2.3起新增。其余事件均来自JSF 2.0。\n\n还有两个组件系统事件未在“生命周期”一节中提及。\n\n*   `PostConstructViewMapEvent`：当`UIViewRoot`刚刚启动视图作用域时触发。\n\
    *   `PreDestroyViewMapEvent`：当`UIViewRoot`即将销毁视图作用域时触发。\n\n这两个事件并非严格绑定于基于组件的六阶段生命周期，它们基本上可以在生命周期中的任何时间发生。`PostConstructViewMapEvent`在应用首次调用`UIViewRoot#getViewMap()`时触发。默认情况下，这仅在当前视图状态的第一个`@ViewScoped`托管Bean被创建时发生。`PreDestroyViewMapEvent`在应用对`UIViewRoot#getViewMap()`调用`Map#clear()`时触发，这通常发生在调用`FacesContext#setViewRoot()`且已存在一个现有实例时。这将结束视图作用域并销毁任何活动的`@ViewScoped`托管Bean。通常，这仅在操作方法返回非空导航结果时发生。\n\
    \n你可以使用`javax.faces.event.ComponentSystemEventListener`接口[⁷](#A454457_1_En_3_Chapter.xhtml#Fn7)监听任何这些组件系统事件。在JSF\
    \ API中，`UIComponent`类本身已经实现了`ComponentSystemEventListener`。该接口提供了一个`processEvent()`方法，其参数为`ComponentSystemEvent`，而`ComponentSystemEvent`又包含一个`getComponent()`方法，用于返回触发该事件的具体`UIComponent`实例。`UIComponent#processEvent()`的默认实现主要检查当前事件是否为`PostRestoreStateEvent`的实例，以及是否指定了`binding`属性，如果是，则使用组件实例本身作为参数调用setter方法。\n\
    \n有三种方式可以为这些组件系统事件订阅监听器。第一种是声明式地在视图中使用`<f:event>`标签。该标签可以附加到任何组件标签上。在相对较多的JSF\
    \ 2.0/2.1相关资源中，你会看到的一个示例如下："
  raw: '## Phase Events


    The javax.faces.event. PhaseListener interface[³](#A454457_1_En_3_Chapter.xhtml#Fn3)
    can be used to listen on any phase of the JSF life cycle. This interface defines
    three methods: getPhaseId(), which should return the phase you’re interested in;
    beforePhase(), which will be invoked right before the specified phase is executed;
    and afterPhase(), which will be invoked right after the specified phase is executed.
    In the beforePhase() and afterPhase() methods you thus have the opportunity to
    run some code before or after the phase specified by getPhaseId().


    The javax.faces.event.PhaseId class[⁴](#A454457_1_En_3_Chapter.xhtml#Fn4) defines
    a set of public constants. It still dates from JSF 1.0 which was released only
    a few months before Java 1.5 and hence was too late in the game in order to become
    a real enum. The constants are listed below with their ordinal values.


    *   PhaseId.ANY_PHASE (0)


    *   PhaseId.RESTORE_VIEW (1)


    *   PhaseId.APPLY_REQUEST_VALUES (2)


    *   PhaseId.PROCESS_VALIDATIONS (3)


    *   PhaseId.UPDATE_MODEL_VALUES (4)


    *   PhaseId.INVOKE_APPLICATION (5)


    *   PhaseId.RENDER_RESPONSE (6)


    Phase listener instances can be registered in various ways. Declaratively, they
    can be registered application-wide via faces-config.xml.


    ```

    <lifecycle>

        <phase-listener>com.example.project.YourListener</phase-listener>

    </lifecycle>

    ```


    Or view-wide via <f:phaseListener> tag enclosed in <f:view>.


    ```

    <f:view>

        <f:phaseListener type="com.example.project.YourListener" />

        ...

    </f:view>

    ```


    Programmatically, they can be added and removed application-wide via the addPhaseListener()
    and removePhaseListener() methods of javax.faces.lifecycle.Lifecycle instance.[⁵](#A454457_1_En_3_Chapter.xhtml#Fn5)
    However, obtaining the current Lifecycle instance is slightly convoluted as there’s
    no direct getter method for that in the public JSF API (yet).


    ```

    FacesContext context = FacesContext.getCurrentInstance();

    String lifecycleId = context.getExternalContext()

        .getInitParameter(FacesServlet.LIFECYCLE_ID_ATTR);

    if (lifecycleId == null) {

        lifecycleId = LifecycleFactory.DEFAULT_LIFECYCLE;

    }

    LifecycleFactory lifecycleFactory = (LifecycleFactory)

        FactoryFinder.getFactory(FactoryFinder.LIFECYCLE_FACTORY);

    Lifecycle lifecycle = lifecycleFactory.getLifecycle(lifecycleId);

    ```


    And they can be added and removed view-wide via the addPhaseListener() and removePhaseListener()
    methods of UIViewRoot. A concrete example of a PhaseListener is given in the section
    “Custom Component System Events.”


    ## Component System Events


    As noted in the section “Life Cycle,” a bunch of component system events are fired
    during the life cycle. They extend from the javax.faces.event.ComponentSystemEvent
    abstract class .[⁶](#A454457_1_En_3_Chapter.xhtml#Fn6) In summary, those are


    *   PreRemoveFromViewEvent: fired when a component is about to be removed from
    the component tree.


    *   PostAddToViewEvent: fired when a component has been added to the component
    tree.


    *   PostRestoreStateEvent (read: "PostRestoreViewEvent"): fired for each component
    when the restore view phase ends. Note that this event is only fired for UIViewRoot
    when the view build time hasn’t yet taken place during this phase. If the view
    build time has taken place during this phase, then this event is fired for any
    component in the tree.


    *   PreValidateEvent: fired when a component is about to process its converter
    and validators, and also when there are actually none.


    *   PostValidateEvent: fired when a component is finished processing its converter
    and validators, and also when there are actually none.


    *   PreRenderViewEvent: fired when the UIViewRoot is about to write HTML output
    to the HTTP response. Note that this is the latest possible safe moment to change
    the destination of the HTTP response, or to programmatically manipulate the component
    tree. When doing so after this moment, there’s no guarantee that any programmatic
    changes to the response or the component tree will take place as intended, because
    by then the response may already be committed, or the view state may already be
    saved.


    *   PreRenderComponentEvent: fired when a component is about to write its HTML
    output to the HTTP response.


    *   PostRenderViewEvent: fired when the UIViewRoot is finished writing the HTML
    output to the HTTP response. Note that this event is new since JSF 2.3\. All others
    are from JSF 2.0.


    There are two more component system events that were left unmentioned in the section
    “Life Cycle.”


    *   PostConstructViewMapEvent: fired when the UIViewRoot has just started the
    view scope.


    *   PreDestroyViewMapEvent: fired when the UIViewRoot is about to destroy the
    view scope.


    These two are not strictly tied to the six-phase component-based life cycle and
    can happen basically any time during the life cycle. The PostConstructViewMapEvent
    is fired when the application invokes UIViewRoot#getViewMap() for the first time.
    By default, this happens only when the first @ViewScoped managed bean of the current
    view state has been created. The PreDestroyViewMapEvent is fired when the application
    invokes Map#clear() on the UIViewRoot#getViewMap(), which usually only happens
    when FacesContext#setViewRoot() is invoked while there is already an existing
    instance set. This will end the view scope and destroy any active @ViewScoped
    managed bean. Normally, this happens only when the action method has returned
    a non-null navigation outcome.


    You can listen on any of those component system events using the javax.faces.event.ComponentSystemEventListener
    interface .[⁷](#A454457_1_En_3_Chapter.xhtml#Fn7) In the JSF API, the UIComponent
    class itself already implements ComponentSystemEventListener. This interface provides
    a processEvent() method with a ComponentSystemEvent argument which in turn has
    among others a getComponent() method returning the concrete UIComponent instance
    the event was fired on. The default implementation of UIComponent#processEvent()
    basically checks if the current event is an instance of PostRestoreStateEvent
    and if the binding attribute is specified, and if so, then invokes the setter
    method with the component instance itself as argument.


    There are three ways to subscribe listeners to those component system events .
    The first is to declaratively use the <f:event> tag in the view. This can be attached
    to any component tag. One example you’ll see in relatively a lot of JSF 2.0/2.1
    targeted resources is the following:'
  trans: '

    ## 阶段事件


    `javax.faces.event.PhaseListener` 接口³可用于监听 JSF 生命周期的任何阶段。该接口定义了三个方法：`getPhaseId()`，应返回你感兴趣的阶段；`beforePhase()`，将在指定阶段执行前被调用；以及
    `afterPhase()`，将在指定阶段执行后被调用。因此，在 `beforePhase()` 和 `afterPhase()` 方法中，你有机会在 `getPhaseId()`
    指定的阶段之前或之后运行一些代码。


    `javax.faces.event.PhaseId` 类⁴定义了一组公共常量。它仍源自 JSF 1.0，该版本发布于 Java 1.5 之前仅几个月，因此为时已晚，未能成为真正的枚举。这些常量及其序数值如下所示。


    *   `PhaseId.ANY_PHASE` (0)

    *   `PhaseId.RESTORE_VIEW` (1)

    *   `PhaseId.APPLY_REQUEST_VALUES` (2)

    *   `PhaseId.PROCESS_VALIDATIONS` (3)

    *   `PhaseId.UPDATE_MODEL_VALUES` (4)

    *   `PhaseId.INVOKE_APPLICATION` (5)

    *   `PhaseId.RENDER_RESPONSE` (6)


    阶段监听器实例可以通过多种方式注册。声明式地，可以通过 `faces-config.xml` 在整个应用程序范围内注册。


    ```xml

    <lifecycle>

        <phase-listener>com.example.project.YourListener</phase-listener>

    </lifecycle>

    ```


    或者通过 `<f:view>` 内的 `<f:phaseListener>` 标签在整个视图范围内注册。


    ```xml

    <f:view>

        <f:phaseListener type="com.example.project.YourListener" />

        ...

    </f:view>

    ```


    编程式地，可以通过 `javax.faces.lifecycle.Lifecycle` 实例的 `addPhaseListener()` 和 `removePhaseListener()`
    方法在整个应用程序范围内添加和移除监听器。⁵ 然而，获取当前的 `Lifecycle` 实例略显复杂，因为在公共 JSF API 中（目前）还没有直接的 getter
    方法。


    ```java

    FacesContext context = FacesContext.getCurrentInstance();

    String lifecycleId = context.getExternalContext()

        .getInitParameter(FacesServlet.LIFECYCLE_ID_ATTR);

    if (lifecycleId == null) {

        lifecycleId = LifecycleFactory.DEFAULT_LIFECYCLE;

    }

    LifecycleFactory lifecycleFactory = (LifecycleFactory)

        FactoryFinder.getFactory(FactoryFinder.LIFECYCLE_FACTORY);

    Lifecycle lifecycle = lifecycleFactory.getLifecycle(lifecycleId);

    ```


    并且，可以通过 `UIViewRoot` 的 `addPhaseListener()` 和 `removePhaseListener()` 方法在整个视图范围内添加和移除监听器。关于
    `PhaseListener` 的具体示例，请参见“自定义组件系统事件”一节。


    ## 组件系统事件


    如“生命周期”一节所述，在生命周期期间会触发一系列组件系统事件。它们继承自 `javax.faces.event.ComponentSystemEvent`
    抽象类。⁶ 总结如下：


    *   `PreRemoveFromViewEvent`：当组件即将从组件树中移除时触发。

    *   `PostAddToViewEvent`：当组件已添加到组件树时触发。

    *   `PostRestoreStateEvent`（可理解为“PostRestoreViewEvent”）：当恢复视图阶段结束时，为每个组件触发。请注意，如果在此阶段视图构建尚未发生，则该事件仅针对
    `UIViewRoot` 触发。如果在此阶段视图构建已经发生，则该事件会为树中的任何组件触发。

    *   `PreValidateEvent`：当组件即将处理其转换器和验证器时触发，即使实际上没有转换器或验证器也会触发。

    *   `PostValidateEvent`：当组件完成处理其转换器和验证器时触发，即使实际上没有转换器或验证器也会触发。

    *   `PreRenderViewEvent`：当 `UIViewRoot` 即将向 HTTP 响应写入 HTML 输出时触发。请注意，这是更改 HTTP
    响应目标或以编程方式操作组件树的最晚安全时机。在此之后进行操作，无法保证对响应或组件树的任何程序化更改能按预期生效，因为此时响应可能已被提交，或视图状态可能已被保存。

    *   `PreRenderComponentEvent`：当组件即将向 HTTP 响应写入其 HTML 输出时触发。

    *   `PostRenderViewEvent`：当 `UIViewRoot` 完成向 HTTP 响应写入 HTML 输出时触发。请注意，此事件自 JSF
    2.3 起新增。其他所有事件均来自 JSF 2.0。


    还有两个组件系统事件在“生命周期”一节中未被提及。


    *   `PostConstructViewMapEvent`：当 `UIViewRoot` 刚刚启动视图作用域时触发。

    *   `PreDestroyViewMapEvent`：当 `UIViewRoot` 即将销毁视图作用域时触发。


    这两个事件并非严格绑定于基于组件的六阶段生命周期，它们基本上可以在生命周期中的任何时间发生。`PostConstructViewMapEvent` 在应用程序首次调用
    `UIViewRoot#getViewMap()` 时触发。默认情况下，这仅在当前视图状态的第一个 `@ViewScoped` 托管 Bean 被创建时发生。`PreDestroyViewMapEvent`
    在应用程序对 `UIViewRoot#getViewMap()` 调用 `Map#clear()` 时触发，这通常仅在已存在一个 `FacesContext#setViewRoot()`
    实例的情况下调用该方法时发生。这将结束视图作用域并销毁任何活动的 `@ViewScoped` 托管 Bean。通常，这仅在操作方法返回非空导航结果时发生。


    你可以使用 `javax.faces.event.ComponentSystemEventListener` 接口监听上述任何组件系统事件。⁷ 在 JSF
    API 中，`UIComponent` 类本身已经实现了 `ComponentSystemEventListener`。该接口提供了一个 `processEvent()`
    方法，其参数为 `ComponentSystemEvent`，而该事件对象又包含一个 `getComponent()` 方法，用于返回触发该事件的具体 `UIComponent`
    实例。`UIComponent#processEvent()` 的默认实现主要检查当前事件是否为 `PostRestoreStateEvent` 的实例，并且是否指定了
    `binding` 属性，如果是，则使用组件实例本身作为参数调用 setter 方法。


    有三种方式可以为这些组件系统事件订阅监听器。第一种是声明式地在视图中使用 `<f:event>` 标签。该标签可以附加到任何组件标签上。在相对较多的 JSF
    2.0/2.1 相关资源中，你会看到的一个示例如下：

    '
- fmt: "```xml\n<f:metadata>\n    <f:viewParam name=\"id\" value=\"#{bean.id}\" />\n\
    \    <f:event type=\"preRenderView\" listener=\"#{bean.onload()}\" />\n</f:metadata>\n\
    ```\n\n其中`onload()`方法通常实现如下：\n\n```java\npublic void onload() {\n    FacesContext\
    \ context = FacesContext.getCurrentInstance();\n    if (!context.isPostback()\
    \ && !context.isValidationFailed()) {\n        // ...\n    }\n}\n```\n\n注意，`<f:event\
    \ listener=\"#{bean.onload}\">`默认期望一个带有`ComponentSystemEvent`参数的方法，但如果不需要该参数，为简洁起见可以省略，并且方法表达式应加括号，尽管EL实现可能对此宽容。\n\
    \n`<f:event type=\"preRenderView\">`本质上是一种变通方法，以便能够基于`<f:viewParam>`设置的模型值在GET请求上执行调用应用阶段。这是必要的，因为`@PostConstruct`不适合，它在bean构造后立即被调用，但远在模型值更新之前。自JSF\
    \ 2.2引入新的`<f:viewAction>`后，不再需要`<f:event>`技巧：\n\n```xml\n<f:metadata>\n    <f:viewParam\
    \ name=\"id\" value=\"#{bean.id}\" />\n    <f:viewAction action=\"#{bean.onload}\"\
    \ />\n</f:metadata>\n```\n\n其中`onload()`方法只需实现如下：\n\n```java\npublic void onload()\
    \ {\n    // ...\n}\n```\n\n`<f:event>`的另一个实际示例是在复合组件的支持组件中实现类似`@PostConstruct`的行为，你可以安全地基于其属性执行任何必要的初始化。\n\
    \n```xml\n<cc:interface componentType=\"someComposite\">\n    ...\n</cc:interface>\n\
    <cc:implementation>\n    <f:event type=\"postAddToView\" listener=\"#{cc.init()}\"\
    \ />\n    ...\n    #{cc.someInitializedValue}\n</cc:implementation>\n```\n\n其中`SomeComposite`类的`init()`方法如下所示：\n\
    \n```java\nprivate Object someInitializedValue; // +getter\n\npublic void init()\
    \ {\n    Map<String, Object> attributes = getAttributes();\n    someInitializedValue\
    \ = initializeItBasedOn(attributes);\n}\n```\n\n第二种方式是在Java代码中以编程方式使用`UIComponent#subscribeToEvent()`。这允许你有条件地在现有组件上订阅组件系统事件监听器。重要的是要记住，组件系统事件监听器保存在视图状态中。换句话说，它在后续回发请求的恢复视图阶段期间被恢复到组件实例中。在使用`UIComponent#subscribeToEvent()`时请记住这一点；否则你可能最终多次订阅同一个监听器。JSF实现Mojarra对此有内部防护，前提是监听器实现的`equals()`方法正确实现，但MyFaces没有此防护，因为JSF规范尚未如此规定。\n\
    \n这使得为特定组件以编程方式正确注册组件系统事件监听器变得有些复杂。如果是现有组件，最好使用`<f:event>`，或者如果是自定义组件，最好使用`@ListenerFor`注解，这实际上是第三种方式。以下是一个以编程方式正确注册组件系统事件监听器的入门示例，前提是`YourListener`类正确实现了`equals()`和`hashCode()`方法，并且实现了`Serializable`、`Externalizable`或`javax.faces.component.StateHolder`，以便能正确保存在视图状态中。\n\
    \n```java\nClass<PreRenderViewEvent> event = PreRenderViewEvent.class;\nComponentSystemEventListener\
    \ listener = new YourListener();\n\nList<SystemEventListener> existingListeners\
    \ =\n    component.getListenersForEventClass(event);\n\nif (existingListeners\
    \ != null && !existingListeners.contains(listener)) {\n    component.subscribeToEvent(event,\
    \ listener);\n}\n```\n\n是的，那个空值检查是必要的。`UIComponent#getListenersForEventClass()`并未规定返回空列表。总之，这显然不是一个经过深思熟虑的API。最好使用`<f:event>`或`@ListenerFor`来避免脏代码和混淆。\n\
    \n如前所述，第三种方式是以声明方式使用`@ListenerFor`注解。此注解只能放在`UIComponent`或`Renderer`类上。不能将此注解放在支持bean类上。为此，应使用`<f:event>`。`@ListenerFor`注解将目标事件作为值。具体的`ComponentSystemEventListener`实例是`UIComponent`实例本身。如果注解声明在`Renderer`类上，则目标组件是其`UIComponent#getRendererType()`引用该特定`Renderer`类的`UIComponent`实例。以下示例展示了自定义组件`YourComponent`的用法：\n\
    \n```java\n@FacesComponent(\"project.YourComponent\")\n@ListenerFor(systemEventClass=PostAddToViewEvent.class)\n\
    public class YourComponent extends UIComponentBase {\n\n    @Override\n    public\
    \ void processEvent(ComponentSystemEvent event) {\n        if (event instanceof\
    \ PostAddToViewEvent) {\n            // ...\n        }\n        else {\n     \
    \       super.processEvent(event);\n        }\n    }\n\n    // ...\n}\n```\n\n\
    是的，那个`instanceof`检查是必要的。如“生命周期”部分所述，`PostRestoreStateEvent`默认会为树中的任何组件显式触发。`super.processEvent(event)`调用是必要的，以防此组件指定了`binding`属性；也就是说，默认的`UIComponent#processEvent()`实现会在`PostRestoreStateEvent`期间调用`binding`属性背后的setter方法。\n\
    \n## 自定义组件系统事件\n\n你可以创建自己的`ComponentSystemEvent`类型。基本上你需要做的是继承`ComponentSystemEvent`抽象类，在其上声明`@NamedEvent`注解，最后在期望的时刻调用`Application#publishEvent()`。\n\
    \n假设你想创建一个自定义组件系统事件，该事件在调用应用阶段（第五阶段）之前触发，即`PreInvokeApplicationEvent`。自定义事件如下所示：\n\
    \n```java\n@NamedEvent(shortName=\"preInvokeApplication\")\npublic class PreInvokeApplicationEvent\
    \ extends ComponentSystemEvent {\n    public PreInvokeApplicationEvent(UIComponent\
    \ component) {\n        super(component);\n    }\n}\n```\n\n以下是如何使用`PhaseListener`来发布它。\n\
    \n```java\npublic class PreInvokeApplicationListener implements PhaseListener\
    \ {\n\n    @Override\n    public PhaseId getPhaseId() {\n        return PhaseId.INVOKE_APPLICATION;\n\
    \    }\n\n    @Override\n    public void beforePhase(PhaseEvent event) {\n   \
    \     FacesContext context = FacesContext.getCurrentInstance();\n        context.getApplication().publishEvent(context,\n\
    \            PreInvokeApplicationEvent.class, context.getViewRoot());\n    }\n\
    \n    @Override\n    public void afterPhase(PhaseEvent event) {\n        // NOOP.\n\
    \    }\n}\n```\n\n在`faces-config.xml`中注册此阶段监听器后，你可以使用`<f:event>`或`@ListenerFor`来监听此事件。一个实际示例是将其嵌套在`<f:view>`或主模板中，或嵌套在特定的`<h:form>`中，这样你就不需要在模板客户端或表单中的多个`UICommand`组件上复制粘贴相同的`<f:actionListener>`。\n\
    \n```xml\n<f:event type=\"preInvokeApplication\"\n         listener=\"#{bean.prepareInvokeApplication}\"\
    \ />\n```"
  raw: '```

    <f:metadata>

        <f:viewParam name="id" value="#{bean.id}" />

        <f:event type="preRenderView" listener="#{bean.onload()}" />

    </f:metadata>

    ```


    where in the onload() method is often implemented as follows:


    ```

    public void onload() {

        FacesContext context = FacesContext.getCurrentInstance();

        if (!context.isPostback() && !context.isValidationFailed()) {

            // ...

        }

    }

    ```


    Note that the <f:event listener="#{bean.onload}"> by default expects a method
    with ComponentSystemEvent argument, but if you don’t need it, it can be omitted
    for brevity and the method expression should be parenthesized, although the EL
    implementation may be forgiving in this.


    The <f:event type="preRenderView"> is in essence a work-around in order to be
    able to perform the invoke application phase upon a GET request based on model
    values set by the <f:viewParam>. This was needed because the @PostConstruct was
    unsuitable as it was invoked directly after bean’s construction but far before
    the model values were updated. Since JSF 2.2 with its new <f:viewAction>, this
    <f:event> trick is not needed any more:


    ```

    <f:metadata>

        <f:viewParam name="id" value="#{bean.id}" />

        <f:viewAction action="#{bean.onload}" />

    </f:metadata>

    ```


    where in the onload() method is just implemented as follows:


    ```

    public void onload() {

        // ...

    }

    ```


    Another real-world example of <f:event> is to have a @PostConstruct-like behavior
    in the backing component of a composite component wherein you can safely perform
    any necessary initialization based on its attributes.


    ```

    <cc:interface componentType="someComposite">

        ...

    </cc:interface>

    <cc:implementation>

        <f:event type="postAddToView" listener="#{cc.init()}" />

        ...

        #{cc.someInitializedValue}

    </cc:implementation>

    ```


    and wherein the init() method of the SomeComposite class looks as follows:


    ```

    private Object someInitializedValue; // +getter


    public void init() {

        Map<String, Object> attributes = getAttributes();

        someInitializedValue = initializeItBasedOn(attributes);

    }

    ```


    The second way is to programmatically use UIComponent#subscribeToEvent() in Java
    code . This allows you to conditionally subscribe a component system event listener
    on an existing component. It is important to keep in mind that a component system
    event listener is saved in the view state. In other words, it’s restored in the
    component instance during the restore view phase of the subsequent postback request.
    Keep this in mind when using UIComponent#ubscribeToEvent(); otherwise you may
    end up subscribing the very same listener multiple times. The JSF implementation
    Mojarra has an internal guard against it, provided that the equals() method of
    the listener implementation is correctly implemented, but MyFaces doesn’t have
    a guard here because the JSF specification doesn’t say so (yet).


    This all makes it a little complicated to correctly register a component system
    event listener programmatically for a specific component. If it’s an existing
    component, you’d better use <f:event> instead, or if it’s a custom component,
    you’d better use @ListenerFor annotation, which is actually the third way. Below
    is a kickoff example of correctly registering a component system event listener
    programmatically, provided that YourListener class has its equals() and hashCode()
    methods correctly implemented, and that it implements Serializable or Externalizable
    or javax.faces.component.StateHolder so that it can be saved correctly in view
    state.


    ```

    Class<PreRenderViewEvent> event = PreRenderViewEvent.class;

    ComponentSystemEventListener listener = new YourListener();


    List<SystemEventListener> existingListeners =

        component.getListenersForEventClass(event);


    if (existingListeners != null && !existingListeners.contains(listener)) {

        component.subscribeToEvent(event, listener);

    }

    ```


    Yes, that null check is necessary. The UIComponent#getListenersForEventClass()
    isn’t specified to return an empty list instead. All in all, this is clearly not
    a carefully thought out API. You’d better use <f:event> or @ListenerFor instead
    to avoid dirty code and confusion.


    As previously stated, the third way is declaratively to use the @ListenerFor annotation.
    You can put this annotation only on a UIComponent or Renderer class . You can’t
    put this annotation on a backing bean class. For that, you should use <f:event>
    instead. The @ListenerFor annotation takes the target event(s) as value. The concrete
    ComponentSystemEventListener instance is the UIComponent instance itself. If the
    annotation is declared on a Renderer class , then the target component is the
    UIComponent instance whose UIComponent#getRendererType() refers the particular
    Renderer class. The following example shows it for a custom component YourComponent:


    ```

    @FacesComponent("project.YourComponent")

    @ListenerFor(systemEventClass=PostAddToViewEvent.class)

    public class YourComponent extends UIComponentBase {


    @Override

        public void processEvent(ComponentSystemEvent event) {

            if (event instanceof PostAddToViewEvent) {

                // ...

            }

            else {

                super.processEvent(event);

            }

        }


    // ...

    }

    ```


    Yes, that instanceof check is necessary. As noted in the section “Life Cycle,”
    the PostRestoreStateEvent is by default explicitly fired for any component in
    the tree. The super.processEvent(event) call is necessary in case this component
    has the binding attribute specified; that is, the default UIComponent#processEvent()
    implementation calls during PostRestoreStateEvent the setter method behind the
    binding attribute.


    ## Custom Component System Events


    You can create your own ComponentSystemEvent types. Basically all you need to
    do is to extend from the ComponentSystemEvent abstract class and declare the @NamedEvent
    annotation on it and finally invoke Application#publishEvent() at the desired
    moment.


    Imagine that you want to create a custom component system event which is fired
    before the invoke application phase (fifth phase), a PreInvokeApplicationEvent.
    The custom event looks as follows:


    ```

    @NamedEvent(shortName="preInvokeApplication")

    public class PreInvokeApplicationEvent extends ComponentSystemEvent {

        public PreInvokeApplicationEvent(UIComponent component) {

            super(component);

        }

    }

    ```


    And here’s how you can use a PhaseListener to publish it.


    ```

    public class PreInvokeApplicationListener implements PhaseListener {


        @Override

        public PhaseId getPhaseId() {

            return PhaseId.INVOKE_APPLICATION;

        }


        @Override

        public void beforePhase(PhaseEvent event) {

            FacesContext context = FacesContext.getCurrentInstance();

            context.getApplication().publishEvent(context,

                PreInvokeApplicationEvent.class, context.getViewRoot());

        }


        @Override

        public void afterPhase(PhaseEvent event) {

            // NOOP.

        }

    }

    ```


    After registering this phase listener in faces-config.xml, you can use <f:event>
    or @ListenerFor to listen on this event. One real-world example would be nested
    in the <f:view> or a master template, or in a particular <h:form>, so that you
    don’t need to copy/paste the very same <f:actionListener> over multiple UICommand
    components in template clients or forms.


    ```

    <f:event type="preInvokeApplication"

             listener="#{bean.prepareInvokeApplication}" />

    ```'
  trans: '

    ```

    <f:metadata>

        <f:viewParam name="id" value="#{bean.id}" />

        <f:event type="preRenderView" listener="#{bean.onload()}" />

    </f:metadata>

    ```


    其中，`onload()` 方法通常实现如下：


    ```

    public void onload() {

        FacesContext context = FacesContext.getCurrentInstance();

        if (!context.isPostback() && !context.isValidationFailed()) {

            // ...

        }

    }

    ```


    请注意，`<f:event listener="#{bean.onload}">` 默认期望一个带有 `ComponentSystemEvent` 参数的方法，但如果你不需要该参数，为简洁起见可以省略，并且方法表达式应加上括号，尽管
    EL 实现可能对此要求不严格。


    `<f:event type="preRenderView">` 本质上是一种变通方法，以便能够基于 `<f:viewParam>` 设置的模型值，在 GET
    请求上执行调用应用阶段。之所以需要这样做，是因为 `@PostConstruct` 不合适，因为它会在 bean 构造后立即被调用，但远在模型值更新之前。自
    JSF 2.2 引入新的 `<f:viewAction>` 后，就不再需要这种 `<f:event>` 技巧了：


    ```

    <f:metadata>

        <f:viewParam name="id" value="#{bean.id}" />

        <f:viewAction action="#{bean.onload}" />

    </f:metadata>

    ```


    其中，`onload()` 方法只需实现如下：


    ```

    public void onload() {

        // ...

    }

    ```


    `<f:event>` 的另一个实际应用示例是在复合组件的支持组件中实现类似 `@PostConstruct` 的行为，你可以安全地基于其属性执行任何必要的初始化。


    ```

    <cc:interface componentType="someComposite">

        ...

    </cc:interface>

    <cc:implementation>

        <f:event type="postAddToView" listener="#{cc.init()}" />

        ...

        #{cc.someInitializedValue}

    </cc:implementation>

    ```


    其中，`SomeComposite` 类的 `init()` 方法如下所示：


    ```

    private Object someInitializedValue; // +getter


    public void init() {

        Map<String, Object> attributes = getAttributes();

        someInitializedValue = initializeItBasedOn(attributes);

    }

    ```


    第二种方式是在 Java 代码中以编程方式使用 `UIComponent#subscribeToEvent()`。这允许你有条件地为现有组件订阅一个组件系统事件监听器。需要牢记的是，组件系统事件监听器会保存在视图状态中。换句话说，它会在后续回发请求的恢复视图阶段被恢复到组件实例中。在使用
    `UIComponent#subscribeToEvent()` 时请记住这一点；否则，你可能会多次订阅同一个监听器。只要监听器实现的 `equals()`
    方法正确实现，JSF 实现 Mojarra 对此有内部防护，但 MyFaces 没有此防护，因为 JSF 规范尚未对此做出规定。


    这使得为特定组件以编程方式正确注册组件系统事件监听器变得有些复杂。如果是现有组件，最好使用 `<f:event>`；如果是自定义组件，最好使用 `@ListenerFor`
    注解，这实际上是第三种方式。下面是一个以编程方式正确注册组件系统事件监听器的入门示例，前提是 `YourListener` 类正确实现了 `equals()`
    和 `hashCode()` 方法，并且实现了 `Serializable`、`Externalizable` 或 `javax.faces.component.StateHolder`，以便能正确保存在视图状态中。


    ```

    Class<PreRenderViewEvent> event = PreRenderViewEvent.class;

    ComponentSystemEventListener listener = new YourListener();


    List<SystemEventListener> existingListeners =

        component.getListenersForEventClass(event);


    if (existingListeners != null && !existingListeners.contains(listener)) {

        component.subscribeToEvent(event, listener);

    }

    ```


    是的，这个空值检查是必要的。`UIComponent#getListenersForEventClass()` 并未规定要返回一个空列表。总而言之，这显然不是一个经过深思熟虑的
    API。最好使用 `<f:event>` 或 `@ListenerFor` 来避免混乱的代码和困惑。


    如前所述，第三种方式是以声明方式使用 `@ListenerFor` 注解。此注解只能放在 `UIComponent` 或 `Renderer` 类上。不能将其放在支持
    bean 类上。对于支持 bean，应使用 `<f:event>`。`@ListenerFor` 注解将目标事件作为值。具体的 `ComponentSystemEventListener`
    实例就是 `UIComponent` 实例本身。如果注解声明在 `Renderer` 类上，那么目标组件是 `UIComponent` 实例，其 `UIComponent#getRendererType()`
    引用了特定的 `Renderer` 类。以下示例展示了自定义组件 `YourComponent` 的用法：


    ```

    @FacesComponent("project.YourComponent")

    @ListenerFor(systemEventClass=PostAddToViewEvent.class)

    public class YourComponent extends UIComponentBase {


    @Override

        public void processEvent(ComponentSystemEvent event) {

            if (event instanceof PostAddToViewEvent) {

                // ...

            }

            else {

                super.processEvent(event);

            }

        }


    // ...

    }

    ```


    是的，这个 `instanceof` 检查是必要的。如“生命周期”部分所述，默认情况下，`PostRestoreStateEvent` 会为树中的任何组件显式触发。如果此组件指定了
    `binding` 属性，则需要调用 `super.processEvent(event)`；也就是说，默认的 `UIComponent#processEvent()`
    实现会在 `PostRestoreStateEvent` 期间调用 `binding` 属性背后的 setter 方法。


    ## 自定义组件系统事件


    你可以创建自己的 `ComponentSystemEvent` 类型。基本上，你需要做的就是继承 `ComponentSystemEvent` 抽象类，在其上声明
    `@NamedEvent` 注解，最后在期望的时刻调用 `Application#publishEvent()`。


    假设你想创建一个自定义的组件系统事件，该事件在调用应用阶段（第五阶段）之前触发，即 `PreInvokeApplicationEvent`。自定义事件如下所示：


    ```

    @NamedEvent(shortName="preInvokeApplication")

    public class PreInvokeApplicationEvent extends ComponentSystemEvent {

        public PreInvokeApplicationEvent(UIComponent component) {

            super(component);

        }

    }

    ```


    以下是如何使用 `PhaseListener` 来发布该事件。


    ```

    public class PreInvokeApplicationListener implements PhaseListener {


        @Override

        public PhaseId getPhaseId() {

            return PhaseId.INVOKE_APPLICATION;

        }


        @Override

        public void beforePhase(PhaseEvent event) {

            FacesContext context = FacesContext.getCurrentInstance();

            context.getApplication().publishEvent(context,

                PreInvokeApplicationEvent.class, context.getViewRoot());

        }


        @Override

        public void afterPhase(PhaseEvent event) {

            // NOOP.

        }

    }

    ```


    在 `faces-config.xml` 中注册此阶段监听器后，你可以使用 `<f:event>` 或 `@ListenerFor` 来监听此事件。一个实际应用示例是将其嵌套在
    `<f:view>` 或主模板中，或者嵌套在特定的 `<h:form>` 中，这样你就不需要在模板客户端或表单中的多个 `UICommand` 组件上复制粘贴相同的
    `<f:actionListener>`。


    ```

    <f:event type="preInvokeApplication"

             listener="#{bean.prepareInvokeApplication}" />

    ```

