    这正是 JSF 2.3 引入的 `<f:validateWholeBean>` 标签在底层所做的事情。以下是一个使用该代码的示例表单：


    ```

    <h:form>

        <h:inputText a:type="date" value="#{booking.period.startDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText a:type="date" value="#{booking.period.endDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:commandButton value="提交" />

        <h:messages />

        <f:validateWholeBean value="#{booking.period}" />

    </h:form>

    ```


    配合以下支持 bean：


    ```

    @Named @ViewScoped

    public class Booking implements Serializable {


    private Period period = new Period();


    // 添加/生成 getter 方法。

    }

    ```


    请注意，`<f:validateWholeBean>` 被显式地放置在父级 `<h:form>` 的最后一个子元素位置，这确保了验证会在同一表单中所有单个输入组件处理完毕后，作为最后一步执行。这是符合规范的；如果标签位置放置不当，JSF
    实现可能会抛出运行时异常。


    ## Immediate 属性


    `EditableValueHolder`、`ActionSource` 和 `AjaxBehavior` 接口也定义了一个 `immediate` 属性，该属性基本上映射到所有
    `UIInput` 和 `UICommand` 组件以及 `<f:ajax>` 标签的 `immediate` 属性。当在 `EditableValueHolder`
    组件上将其设置为 `true` 时，通常在处理验证阶段（第三阶段）以及更新模型值阶段（第四阶段）发生的所有操作，都将在应用请求值阶段（第二阶段）执行。如果这些组件上的转换或验证失败，生命周期还将跳过处理验证阶段（第三阶段）。当在
    `ActionSource` 组件或 `AjaxBehavior` 标签上将其设置为 `true` 时，通常发生在调用应用程序阶段（第五阶段）的所有操作，都将在应用请求值阶段（第二阶段）执行，并且仅在转换和验证未失败的情况下执行。


    从历史上看，此属性主要用于能够在表单上执行“内部”操作，通常是根据父输入组件提交的值来加载子输入组件，而不会被同一表单中其他输入组件产生的转换或验证错误所阻塞。一个常见的用例是在父下拉列表更改时填充子下拉列表。


    ```

    <h:selectOneMenu value="#{bean.country}" required="true" immediate="true"

        onchange="submit()" valueChangeListener="#{bean.loadCities}">

        <f:selectItems value="#{bean.countries}" />

    </h:selectOneMenu>

    <h:selectOneMenu value="#{bean.city}" required="true">

        <f:selectItems value="#{bean.cities}" />

    </h:selectOneMenu>

    ```


    这种方法显然早于 Web 2.0 时代，在那个时代你只需使用 Ajax 即可实现此目的。需要理解的是，自 JSF 2.0 引入 `<f:ajax>` 以来，`immediate`
    属性在此用途上基本上已经变得无用。完全相同的用例可以通过以下更简洁的方式实现：


    ```

    <h:selectOneMenu value="#{bean.country}" required="true">

        <f:selectItems value="#{bean.countries}" />

        <f:ajax listener="#{bean.loadCities}" render="city" />

    </h:selectOneMenu>

    <h:selectOneMenu id="city" value="#{bean.city}" required="true">

        <f:selectItems value="#{bean.cities}" />

    </h:selectOneMenu>

    ```


    正如你在第 4 章中学到的，`<f:ajax>` 的 `execute` 属性默认值为 `@this`，因此这里省略了它。这也意味着同一表单中所有其他的 `EditableValueHolder`
    组件将不会被处理，因此不会导致 `#{bean.loadCities}` 被来自其他输入组件的转换或验证错误所阻塞。


    如今，有了 Ajax 魔法等特性，`immediate` 属性已经失去了其主要用例。即使没有它，JSF 也能很好地运行。由于其历史用途，许多初学者可能会误以为其主要目的是“跳过所有验证”。然而，事实并非如此。为此，你需要微调
    `<f:ajax>` 的 `execute` 属性，使其仅覆盖真正需要验证的输入组件。如果你希望在提交整个表单时实际“跳过所有验证”，最好使用 Bean Validation
    约束（如 `@NotNull` 等），并简单地将 `<f:validateBean disabled="true">` 包裹在整个表单周围。


    ## 自定义转换器


    从最初开始，JSF 就支持自定义转换器。其主要用例是能够转换非标准的模型值，例如特定于 Web 应用程序的持久化实体。不太常见的用例是扩展现有的标准转换器，并在其构造函数中设置一些常用的默认值，这样你就可以用更少的代码在视图中声明所需的标准转换器配置。


    想象一下，你希望能够在持久化实体上创建主从页面，并且希望将实体的 ID 作为请求参数从主页面传递到详细页面。以下是一个基于虚构的 `Product` 实体的主页面
    `/products/list.xhtml` 中的数据表示例：


    ```

    <h:dataTable value="#{listProducts.products}" var="product">

        <h:column>#{product.id}</h:column>

        <h:column>#{product.name}</h:column>

        <h:column>#{product.description}</h:column>

        <h:column>

            <h:link value="编辑" outcome="edit">

                <f:param name="id" value="#{product.id}" />

            </h:link>

        </h:column>

    </h:dataTable>

    ```


    注意表格的最后一列。它生成了一个指向详细页面 `/products/edit.xhtml` 的链接，其中实体的 ID 作为 GET 请求参数传递，例如 `/product.xhtml?id=42`。在详细页面中，你可以使用
    `<f:viewParam>` 将 GET 请求参数设置到支持 bean 中。


    ```

    <f:metadata>

        <f:viewParam name="id" value="#{editProduct.product}"

            required="true" requiredMessage="错误的请求">

        </f:viewParam>

    </f:metadata>

    ...

    <h:form>

        <h1>编辑产品 #{editProduct.product.id}</h1>

        <h:inputText value="#{editProduct.product.name}" />

        <h:inputText value="#{editProduct.product.description}" />

        ...

    </h:form>

    ```


    然而，有一个小问题：从 Java 角度来看，GET 请求参数本质上是一个表示产品 ID 的 `String`，而 `EditProduct` 支持 bean
    的 `product` 属性实际上期望的是一个由传入 ID 标识的完整 `Product` 实体。


    ```

    @Named @ViewScoped

    public class EditProduct implements Serializable {


    private Product product;


    // Getter+setter 方法。

    }

    ```


    正是为了这个转换步骤，需要创建一个自定义转换器，它能够将表示产品 ID 的 `String` 与表示 `Product` 实体的 `Object` 之间进行转换。JSF
    提供了 `javax.faces.convert.Converter` 接口²⁰ 来帮助你入门。以下是这样一个 `ProductConverter` 的具体示例：


    ```

    @FacesConverter(forClass=Product.class, managed=true)

    public class ProductConverter implements Converter<Product> {


    @Inject

        private ProductService productService;


    @Override

        public String getAsString

            (FacesContext context, UIComponent component, Product product)

        {

            if (product == null) {

                return "";

            }


    if (product.getId() != null) {

                return product.getId().toString();

            }

            else {

                throw new ConverterException(

                    new FacesMessage("无效的产品 ID"), e);

            }

        }


    @Override

        public Product getAsObject

             (FacesContext context, UIComponent component, String id)

        {

            if (id == null || id.isEmpty()) {

                return null;

            }


    try {

                return productService.getById(Long.valueOf(id));

            }

            catch (NumberFormatException e) {

                throw new ConverterException(

                    new FacesMessage("无效的产品 ID"), e);

            }

        }

    }

    ```

    '
- fmt: "在`@FacesConverter`注解中，有几个重要事项需要注意。首先，`forClass`属性指定了该转换器应在验证阶段（第三阶段）和渲染响应阶段（第六阶段）自动运行的目标实体类型。这样，您无需在视图中显式注册转换器。如果您希望显式注册，则可以用`value`属性替换`forClass`属性，指定转换器的唯一标识符，例如：\n\
    \n```\n@FacesConverter(value=\"project.ProductConverter\", managed=true)\n```\n\
    \n然后，您可以在任何`ValueHolder`组件的`converter`属性中，或任何嵌套的`<f:converter>`标签的`converterId`属性中，指定该转换器ID。\n\
    \n```\n<f:viewParam name=\"id\" value=\"#{editProduct.product}\"\n    converter=\"\
    project.ProductConverter\"\n    required=\"true\" requiredMessage=\"Bad request\"\
    >\n</f:viewParam>\n```\n\n但如果您坚持使用`forClass`属性，则无需这样做。请注意，不能同时指定两者。只能二选一，且`value`属性优先于`forClass`。因此，如果同时指定两者，`forClass`属性将被忽略。我们不希望出现这种情况，因为对于透明转换整个实体这一特定目的而言，`forClass`属性更强大。\n\
    \n注解中第二个需要注意的属性是`managed`。这是自JSF 2.3以来的新特性。本质上，它管理CDI上下文中的转换器实例。为了在转换器中实现依赖注入，必须将`managed`属性设置为`true`。以前，这是通过将转换器本身设为托管Bean来解决的。[^(21)](#A454457_1_En_5_Chapter.xhtml#Fn21)\n\
    \n如果您之前使用过JSF转换器，您还会注意到该接口现在终于支持泛型了。该接口诞生于Java 1.5之前，因此从一开始就没有泛型化。使用`Converter<T>`后，`getAsObject()`现在返回`T`而不是`Object`，`getAsString()`现在接受`T`作为`value`参数而不是`Object`。这省去了不必要的`instanceof`检查和类型转换。\n\
    \n请注意，JSF自身的标准转换器（目前基本上所有都是）在JSF 2.3之前就已存在，它们被冻结在时间中，无法利用这一特性，否则将无法向后兼容。换句话说，它们仍然是原始类型。也就是说，存在一种微小但并非不可避免的可能性：有人会在纯Java代码中以编程方式使用JSF转换器，而不是让JSF来处理它们。如果标准转换器被泛型化，那么这些纯Java代码将无法编译。这与`Map#get()`显式接受`Object`而不是`K`作为参数的原因基本相同。此外，还有一种更小但同样并非不可避免的可能性：有人创建了一个自定义转换器，它继承自标准转换器，但显式地重新声明了接口。类似如下代码：\n\
    \n```\npublic class ExtendedNumberConverter\n    extends NumberConverter implements\
    \ Converter\n{\n    // ...\n}\n```\n\n如果`NumberConverter`以某种方式被泛型化，那么这种晦涩的转换器将无法编译。即使我们将`NumberConverter`参数化为`Converter<Object>`，编译器也会在`ExtendedNumberConverter`上报错，从而破坏向后兼容性，错误信息如下：\n\
    \n> *接口`Converter`不能以不同的参数多次实现：`Converter<Object>`和`Converter`*\n\n回到我们的`ProductConverter`实现，在`getAsString()`中，您会注意到当模型值为`null`时，转换器显式返回一个空字符串。这是根据Javadoc的要求。[^(22)](#A454457_1_En_5_Chapter.xhtml#Fn22)\
    \ 技术原因是，当评估值为`null`时，JSF不会渲染关联的HTML属性。通常，这不是一个大问题。生成的HTML输出中未使用的属性越少越好。但是，这对于`<select>`元素的`<option>`来说，效果并不如预期。如果自定义转换器返回`null`而不是空字符串，那么`<option>`元素将在没有`value`属性的情况下被渲染，从而退而提交其文本内容。这确实很尴尬，但HTML规范中确实是这样规定的。[^(23)](#A454457_1_En_5_Chapter.xhtml#Fn23)\
    \ 换句话说，如果您有一个转换器错误地返回`null`而不是空字符串，并且您有一个包含关联实体和默认选项的下拉列表，如下所示：\n\n```\n<h:selectOneMenu\
    \ value=\"#{bean.product}\">\n    <f:selectItem itemValue=\"#{null}\" itemLabel=\"\
    Please select ...\" />\n    <f:selectItems value=\"#{bean.products}\"\n      \
    \  var=\"product\" itemLabel=\"#{product.name}\">\n    </f:selectItems>\n</h:selectOneMenu>\n\
    ```\n\n那么，在提交默认选项时，Web浏览器会将字面字符串“Please select …”发送到服务器，而不是空字符串。这将在`ProductConverter#getAsObject()`中导致`NumberFormatException`，而我们的意图是返回`null`。因此，正确的解决方案是让`getAsString()`在模型值为`null`时返回一个空字符串。\n\
    \n如果您有更多需要JSF转换器的持久化实体，并且希望避免为所有其他持久化实体重复编写基本相同的`ProductConverter`逻辑，您可以为它们创建一个通用的JSF转换器。这仅在您的所有持久化实体都继承自同一个定义了`getId()`的基类时才有效。\n\
    \n```\n@MappedSuperClass\npublic abstract class BaseEntity implements Serializable\
    \ {\n\n    @Id @GeneratedValue(strategy=IDENTITY)\n    private Long id;\n\n  \
    \  public Long getId() {\n        return id;\n    }\n}\n```\n\n并且如果您为所有实体都提供了一个基础实体服务：\n\
    \n```\n@Stateless\npublic class BaseEntityService {\n\n    @PersistenceContext\n\
    \    private EntityManager entityManager;\n\n    @TransactionAttribute(SUPPORTS)\n\
    \    public <E extends BaseEntity> E getById(Class<E> type, Long id) {\n     \
    \   return entityManager.find(type, id);\n    }\n}\n```\n\n那么通用转换器可以如下所示：\n\n\
    ```\n@FacesConverter(forClass=BaseEntity.class, managed=true)\npublic class BaseEntityConverter\
    \ implements Converter<BaseEntity> {\n\n    @Inject\n    private BaseEntityService\
    \ baseEntityService;\n\n    @Override\n    public String getAsString\n       \
    \ (FacesContext context, UIComponent component, BaseEntity entity)\n    {\n  \
    \      if (entity == null) {\n            return \"\";\n        }\n\n        if\
    \ (entity.getId() != null) {\n            return entity.getId().toString();\n\
    \        }\n        else {\n            throw new ConverterException(\n      \
    \          new FacesMessage(\"Invalid entity ID\"), e);\n        }\n    }\n\n\
    \    @Override\n    public BaseEntity getAsObject\n         (FacesContext context,\
    \ UIComponent component, String id)\n    {\n        if (id == null || id.isEmpty())\
    \ {\n            return null;\n        }\n\n        ValueExpression value = component.getValueExpression(\"\
    value\");\n        Class<? extends BaseEntity> type = (Class<? extends BaseEntity>)\n\
    \            value.getType(context.getELContext());\n\n        try {\n       \
    \     return baseEntityService.getById(type, Long.valueOf(id));\n        }\n \
    \       catch (NumberFormatException e) {\n            throw new ConverterException(\n\
    \                new FacesMessage(\"Invalid entity ID\"), e);\n        }\n   \
    \ }\n}\n```"
  raw: 'There are several important things to note here in the @FacesConverter annotation
    . First, the forClass attribute basically specifies the target entity type for
    which this converter should automatically run during the process validations phase
    (third phase) and the render response phase (sixth phase). This way you don’t
    need to explicitly register the converter in the view. In case you wanted to do
    so, you’d replace the forClass attribute by the value attribute specifying the
    unique identifier of the converter, for example:


    ```

    @FacesConverter(value="project.ProductConverter", managed=true)

    ```


    Then you can specify exactly that converter ID in the converter attribute of any
    ValueHolder component, or the converterId attribute of any nested <f:converter>
    tag.


    ```

    <f:viewParam name="id" value="#{editProduct.product}"

        converter="project.ProductConverter"

        required="true" requiredMessage="Bad request">

    </f:viewParam>

    ```


    But this is not necessary when you just keep using the forClass attribute. Note
    that you can’t specify both. It’s one or the other where the value attribute takes
    precedence over the forClass. So, if you specify both, the forClass attribute
    is essentially ignored. We don’t want to have that as it’s much more powerful
    for this particular purpose of transparently converting whole entities.


    The second thing to note in the annotation is the managed attribute. This is new
    since JSF 2.3\. Essentially, this manages the converter instance in the CDI context.
    Setting the managed attribute to true is mandatory in order to get dependency
    injection to work in the converter. Previously, this was worked around by making
    the converter itself a managed bean.[^(21)](#A454457_1_En_5_Chapter.xhtml#Fn21)


    If you have worked with JSF converters before, you’ll also notice the interface
    now finally being parameterized. The interface predates Java 1.5 and was hence
    not parameterized from the beginning. With a Converter<T>, the getAsObject() now
    returns a T instead of Object and the getAsString() now takes a T as value argument
    instead of Object. This saves unnecessary instanceof checks and/or casts.


    Note that JSF’s own standard converters which predate JSF 2.3 (currently, basically
    all of them thus) are frozen in time and cannot take advantage of this as they
    would otherwise no longer be backward compatible. In other words, they are still
    raw types. That is, there’s a small but not unavoidable chance that someone is
    programmatically using JSF converters in plain Java code instead of letting JSF
    deal with them. That plain Java code would no longer compile if the standard converters
    were parameterized. It’s essentially the same reason that the Map#get() explicitly
    takes Object instead of K as argument. Further there’s a yet smaller but still
    not unavoidable chance that someone has created a custom converter which extends
    a standard converter, but also explicitly redeclares the interface. Something
    like the following:


    ```

    public class ExtendedNumberConverter

        extends NumberConverter implements Converter

    {

        // ...

    }

    ```


    Such an obscure converter would no longer compile if NumberConverter was parameterized
    in some way. Even if we parameterize NumberConverter as a Converter<Object>, the
    compiler would error on ExtendedNumberConverter as follows and hence break backward
    compatibility:


    > *The interface Converter cannot be implemented more than once with different
    arguments: Converter<Object> and Converter*


    Coming back to our ProductConverter implementation, in the getAsString() you’ll
    notice that the converter explicitly returns an empty string when the model value
    is null. This is as per the Javadoc.[^(22)](#A454457_1_En_5_Chapter.xhtml#Fn22)
    The technical reason is that JSF won’t render the associated HTML attribute when
    the evaluated value is null. In general, this is not a big problem. The fewer
    unused attributes in the generated HTML output, the better it is. Only, this won’t
    work as expected for the <option> of a <select> element. If the custom converter
    would return null instead of an empty string, then the <option> element would
    be rendered without any value attribute and thus fall back to submitting its text
    content instead. Awkward indeed, but this is literally specified in the HTML specification.[^(23)](#A454457_1_En_5_Chapter.xhtml#Fn23)
    In other words, if you have a converter that incorrectly returns null instead
    of an empty string , and you have a drop-down list with the associated entities
    along with a default option as follows:


    ```

    <h:selectOneMenu value="#{bean.product}">

        <f:selectItem itemValue="#{null}" itemLabel="Please select ..." />

        <f:selectItems value="#{bean.products}"

            var="product" itemLabel="#{product.name}">

        </f:selectItems>

    </h:selectOneMenu>

    ```


    then the web browser would, during submitting the default option, send the literal
    string “Please select …” to the server instead of an empty string. This would
    cause a NumberFormatException in ProductConverter#getAsObject() while we intend
    to return null here. The correct solution is thus to let the getAsString() return
    an empty string in case the model value is null.


    In case you have more persistence entities for which you need a JSF converter,
    and want to avoid repeating essentially the same ProductConverter logic for all
    other persistence entities, you can create a generic JSF converter for them. This
    works only if all your persistence entities extend from the same base class wherein
    the getId() is defined.


    ```

    @MappedSuperClass

    public abstract class BaseEntity implements Serializable {


    @Id @GeneratedValue(strategy=IDENTITY)

        private Long id;


    public Long getId() {

            return id;

        }

    }

    ```


    And if you have a base entity service for all of them:


    ```

    @Stateless

    public class BaseEntityService {


    @PersistenceContext

        private EntityManager entityManager;


    @TransactionAttribute(SUPPORTS)

        public <E extends BaseEntity> E getById(Class<E> type, Long id) {

            return entityManager.find(type, id);

        }

    }

    ```


    the generic converter can then look as follows:


    ```

    @FacesConverter(forClass=BaseEntity.class, managed=true)

    public class BaseEntityConverter implements Converter<BaseEntity> {


    @Inject

        private BaseEntityService baseEntityService;


    @Override

        public String getAsString

            (FacesContext context, UIComponent component, BaseEntity entity)

        {

            if (entity == null) {

                return "";

            }


    if (entity.getId() != null) {

                return entity.getId().toString();

            }

            else {

                throw new ConverterException(

                    new FacesMessage("Invalid entity ID"), e);

            }

        }


    @Override

        public BaseEntity getAsObject

             (FacesContext context, UIComponent component, String id)

        {

            if (id == null || id.isEmpty()) {

                return null;

            }


    ValueExpression value = component.getValueExpression("value");

            Class<? extends BaseEntity> type = (Class<? extends BaseEntity>)

                value.getType(context.getELContext());


    try {

                return baseEntityService.getById(type, Long.valueOf(id));

            }

            catch (NumberFormatException e) {

                throw new ConverterException(

                    new FacesMessage("Invalid entity ID"), e);

            }

        }

    }

    ```'
