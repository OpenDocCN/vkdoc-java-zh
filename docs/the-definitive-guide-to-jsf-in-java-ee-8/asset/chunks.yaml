- fmt: "# Remember Me\n\nOnce a caller has been authenticated for a JSF (web) application,\
    \ we naturally don’t want to ask the caller to re-authenticate with every request.\
    \ To prevent this, the result of a successful authentication is typically coupled\
    \ in some way to the caller’s HTTP session. In fact, the `CustomFormAuthenticationMechanism`\
    \ internally uses the Java EE Security’s provided “auto-apply-session” service\
    \ to do just this. This service stores the data associated with said successful\
    \ authentication (at least the caller name plus any groups the caller is in).\
    \ Although implementation ultimately depends on where this data exactly lives\
    \ and with what lifetime, in practice it’s typically in a special section of the\
    \ server’s memory associated with the HTTP session. This section is special in\
    \ the way that it’s typically session scoped, but the data is not accessible via\
    \ `HttpSession#getAttribute()`.\n\nIn order to not exhaust the server’s memory,\
    \ an HTTP session expires after a certain amount of time. Typical expiration times\
    \ are between 10 minutes and an hour. If the caller accesses the application after\
    \ this time, authentication is required to be performed again.\n\nOften though\
    \ even re-authenticating after a period of inactivity as long as an hour is undesirable.\
    \ But extending the HTTP session to a longer period is undoable for the aforementioned\
    \ reasons of server resource exhaustion.\n\nHere’s where “Remember Me” (`remember-me`)\
    \ comes in. Remember-me is a somewhat playful term for a process where the caller’s\
    \ credentials are exchanged for a token, and where this token is typically stored\
    \ in a cookie that’s distinct from the HTTP session cookie and has a longer time\
    \ to live.\n\nA remember-me token effectively functions as a new credential for\
    \ the caller, without exposing the caller’s original password. A remember-me token\
    \ can basically be vended multiple times, for instance, once per device or IP\
    \ (Internet protocol) that the caller uses to connect to the application. Care\
    \ must be taken that while the token does not expose the caller’s original credentials,\
    \ it still functions as the key to a caller’s account and therefore should be\
    \ treated with the same precautions as one would apply to any other type of credential.\
    \ Specifically, cookies containing the remember-me token should be sent over HTTPS/SSL\
    \ only, and applications should not store the actual token verbatim but a strong\
    \ hash of it.\n\nAs the primary reason for having remember-me is to not exhaust\
    \ server memory and to be long-lived, the remember-me token is almost always stored\
    \ in stable storage (e.g., a database). As such, a lookup from such storage is\
    \ costlier than a lookup from the server’s memory, and this could seriously affect\
    \ performance when required to be done for every request, especially when many\
    \ Ajax requests are being done all the time.\n\nFor this reason, remember-me is\
    \ almost always used in combination with some kind of cache. The modular nature\
    \ of the services that the `CustomFormAuthenticationMechanism` uses makes it possible\
    \ for remember-me to be inserted between the `auto-apply-session` service mentioned\
    \ above and the actual authentication mechanism. That way we effectively get a\
    \ kind of memory hierarchy; the authentication data is first attempted to be found\
    \ in the HTTP session storage, if it’s not there the remember-me service is attempted,\
    \ and if that one doesn’t contain the data then finally the authentication mechanism\
    \ is tried.\n\nTo make use of remember-me, two things have to be done.\n\n1. Activating\
    \ the remember-me service for the installed authentication mechanism\n2. Providing\
    \ a special identity store that’s capable of vending and validating the remember-me\
    \ token\n\n## Activating Remember-Me Service\n\nThe remember-me service in Java\
    \ EE Security is represented by an `Interceptor`. Via the interceptor binding\
    \ annotation `@RememberMe` [the remember-me service] is easily applied to our\
    \ own custom authentication mechanism, one for which we have the source code.\
    \ Unfortunately, it isn’t as easy when these have to be applied to a bean for\
    \ which we don’t have the source code and in fact for which we don’t even know\
    \ the exact implementation type.\n\nAs the `CustomFormAuthenticationMechanism`\
    \ that we’ve been using for the examples above is indeed of the latter type, there’s\
    \ a bit more work to do. Essentially, we need to obtain a reference of the actual\
    \ `CustomFormAuthenticationMechanism` implementation that the container makes\
    \ available and then use the CDI 2.0 `InterceptionFactory` to programmatically\
    \ add the `@RememberMe` annotation. The result is then to be returned from an\
    \ alternative producer method.\n\nThis is demonstrated in the following code via\
    \ the new method `produceAuthenticationMechanism()` in the `ApplicationConfig`\
    \ bean which we showed before:\n\n```\n@CustomFormAuthenticationMechanismDefinition(\n\
    \    loginToContinue = @LoginToContinue(\n        loginPage = \"/login.xhtml\"\
    ,\n        useForwardToLogin = false,\n        errorPage = \"\"\n    )\n)\n@FacesConfig\
    \ @ApplicationScoped\n@Alternative @Priority(500)\npublic class ApplicationConfig\
    \ {\n\n@Produces\n    public HttpAuthenticationMechanism produceAuthenticationMechanism(\n\
    \        InterceptionFactory<HttpAuthenticationMechanismWrapper>\n        interceptionFactory,\
    \ BeanManager beanManager\n    ) {\n        @RememberMe\n        class RememberMeClass\
    \ {};\n        interceptionFactory.configure().add(\n            RememberMeClass.class.getAnnotation(RememberMe.class));\n\
    \        return interceptionFactory.createInterceptedInstance(\n            new\
    \ HttpAuthenticationMechanismWrapper(\n                (HttpAuthenticationMechanism)\
    \ beanManager\n                .getReference(beanManager\n                .resolve(beanManager\n\
    \                .getBeans((HttpAuthenticationMechanism.class).stream()\n    \
    \            .filter(b -> b.getBeanClass() != ApplicationConfig.class)\n     \
    \           .collect(Collectors.toSet())),\n                    HttpAuthenticationMechanism.class,\n\
    \                    beanManager.createCreationalContext(null))));\n    }\n}\n\
    ```\n\nThe `ApplicationConfig` bean is annotated with the `@Alternative` and `@Priority`\
    \ annotations. `@Alternative` is used here to indicate that the producer is not\
    \ just any regular producer but one that should be called instead of any existing\
    \ producer or bean. That is, the bean we are producing here is an alternative\
    \ for the bean with the same type that would otherwise be selected by CDI for\
    \ injection. `@Priority` is used to enable (activate) our alternative producer.\
    \ Without this annotation the producer is present but not enabled, meaning that\
    \ CDI won’t call it. Another way of enabling an alternative is using `beans.xml`.\
    \ The number `500` here is used to select between various alternatives if multiple\
    \ alternatives are enabled. In that case the one with the highest number is selected.\n\
    \nThe code shown above uses the somewhat well-known CDI pattern `BeanManager#getBeans()/resolve()/getReference()`\
    \ to obtain the `CustomFormAuthenticationMechanism` that the container makes available.\
    \ This pattern is more verbose than the simpler `CDI.current().select(...)` variant,\
    \ but it allows us to filter out the `Bean<T>` that represents the producer method.\
    \ Getting a reference from that `Bean<T>` from within the producer method would\
    \ invoke that same producer method again, and thus would cause a recursive series\
    \ of calls eventually leading to a stack overflow. It goes without saying this\
    \ is unwanted, hence the reason we filter that particular `Bean<T>` out."
  raw: '## Remember Me


    Once a caller has been authenticated for a JSF (web) application, we naturally
    don’t want to ask the caller to re-authenticate with every request. To prevent
    this, the result of a successful authentication is typically coupled in some way
    to the caller’s HTTP session. In fact, the CustomFormAuthenticationMechanism internally
    uses the Java EE Security’s provided “auto-apply-session” service to do just this.
    This service stores the data associated with said successful authentication (at
    least the caller name plus any groups the caller is in). Although implementation
    ultimately depends on where this data exactly lives and with what lifetime, in
    practice it’s typically in a special section of the server’s memory associated
    with the HTTP session. This section is special in the way that it’s typically
    session scoped, but the data is not accessible via HttpSession#getAttribute().


    In order to not exhaust the server’s memory, an HTTP session expires after a certain
    amount of time. Typical expiration times are between 10 minutes and an hour. If
    the caller accesses the application after this time, authentication is required
    to be performed again.


    Often though even re-authenticating after a period of inactivity as long as an
    hour is undesirable. But extending the HTTP session to a longer period is undoable
    for the aforementioned reasons of server resource exhaustion.


    Here’s where “Remember Me” (remember-me) comes in. Remember-me is a somewhat playful
    term for a process where the caller’s credentials are exchanged for a token, and
    where this token is typically stored in a cookie that’s distinct from the HTTP
    session cookie and has a longer time to live.


    A remember-me token effectively functions as a new credential for the caller,
    without exposing the caller’s original password. A remember-me token can basically
    be vended multiple times, for instance, once per device or IP (Internet protocol)
    that the caller uses to connect to the application. Care must be taken that while
    the token does not expose the caller’s original credentials, it still functions
    as the key to a caller’s account and therefore should be treated with the same
    precautions as one would apply to any other type of credential. Specifically,
    cookies containing the remember-me token should be sent over HTTPS/SSL only, and
    applications should not store the actual token verbatim but a strong hash of it.


    As the primary reason for having remember-me is to not exhaust server memory and
    to be long-lived, the remember-me token is almost always stored in stable storage
    (e.g., a database). As such, a lookup from such storage is costlier than a lookup
    from the server’s memory, and this could seriously affect performance when required
    to be done for every request, especially when many Ajax requests are being done
    all the time.


    For this reason, remember-me is almost always used in combination with some kind
    of cache. The modular nature of the services that the CustomFormAuthenticationMechanism
    uses makes it possible for remember-me to be inserted between the auto-apply-session
    service mentioned above and the actual authentication mechanism. That way we effectively
    get a kind of memory hierarchy; the authentication data is first attempted to
    be found in the HTTP session storage, if it’s not there the remember-me service
    is attempted, and if that one doesn’t contain the data then finally the authentication
    mechanism is tried.


    To make use of remember-me, two things have to be done.


    1.  Activating the remember-me service for the installed authentication mechanism


    2.  Providing a special identity store that’s capable of vending and validating
    the remember-me token


    ### Activating Remember-Me Service


    The remember-me service in Java EE Security is represented by an Interceptor.
    Via the interceptor binding annotation @ RememberMe [the remember-me service]
    is easily applied to our own custom authentication mechanism, one for which we
    have the source code. Unfortunately, it isn’t as easy when these have to be applied
    to a bean for which we don’t have the source code and in fact for which we don’t
    even know the exact implementation type.


    As the CustomFormAuthenticationMechanism that we’ve been using for the examples
    above is indeed of the latter type, there’s a bit more work to do. Essentially,
    we need to obtain a reference of the actual CustomFormAuthenticationMechanism
    implementation that the container makes available and then use the CDI 2.0 InterceptionFactory
    to programmatically add the @RememberMe annotation. The result is then to be returned
    from an alternative producer method.


    This is demonstrated in the following code via the new method produceAuthenticationMechanism()
    in the ApplicationConfig bean which we showed before:


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            useForwardToLogin = false,

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    @Alternative @Priority(500)

    public class ApplicationConfig {


    @Produces

        public HttpAuthenticationMechanism produceAuthenticationMechanism(

            InterceptionFactory<HttpAuthenticationMechanismWrapper>

            interceptionFactory, BeanManager beanManager

        ) {

            @RememberMe

            class RememberMeClass {};

            interceptionFactory.configure().add(

                RememberMeClass.class.getAnnotation(RememberMe.class));

            return interceptionFactory.createInterceptedInstance(

                new HttpAuthenticationMechanismWrapper(

                    (HttpAuthenticationMechanism) beanManager

                    .getReference(beanManager

                    .resolve(beanManager

                    .getBeans((HttpAuthenticationMechanism.class).stream()

                    .filter(b -> b.getBeanClass() != ApplicationConfig.class)

                    .collect(Collectors.toSet())),

                        HttpAuthenticationMechanism.class,

                        beanManager.createCreationalContext(null))));

        }

    }

    ```


    The ApplicationConfig bean is annotated with the @Alternative and @Priority annotations.
    @Alternative is used here to indicate that the producer is not just any regular
    producer but one that should be called instead of any existing producer or bean.
    That is, the bean we are producing here is an alternative for the bean with the
    same type that would otherwise be selected by CDI for injection. @Priority is
    used to enable (activate) our alternative producer. Without this annotation the
    producer is present but not enabled, meaning that CDI won’t call it. Another way
    of enabling an alternative is using beans.xml. The number 500 here is used to
    select between various alternatives if multiple alternatives are enabled. In that
    case the one with the highest number is selected.


    The code shown above uses the somewhat well-known CDI pattern BeanManager#getBeans()/resolve()/getReference()
    to obtain the CustomFormAuthenticationMechanism that the container makes available.
    This pattern is more verbose than the simpler CDI.current().select(...) variant,
    but it allows us to filter out the Bean<T> that represents the producer method.
    Getting a reference from that Bean<T> from within the producer method would invoke
    that same producer method again, and thus would cause a recursive series of calls
    eventually leading to a stack overflow. It goes without saying this is unwanted,
    hence the reason we filter that particular Bean<T> out.'
  trans: '

    ## 记住我（Remember Me）


    一旦调用者在 JSF（Web）应用程序中通过身份验证，我们自然不希望每次请求都要求调用者重新进行身份验证。为了防止这种情况，成功身份验证的结果通常会以某种方式与调用者的
    HTTP 会话关联。实际上，`CustomFormAuthenticationMechanism` 内部正是使用 Java EE Security 提供的“自动应用会话”服务来实现这一点的。该服务存储与所述成功身份验证相关的数据（至少包括调用者名称以及调用者所属的任何组）。虽然具体实现最终取决于这些数据的确切存储位置和生命周期，但在实践中，它们通常位于服务器内存中与
    HTTP 会话关联的一个特殊区域。这个区域之所以特殊，是因为它通常是会话作用域的，但数据无法通过 `HttpSession#getAttribute()`
    访问。


    为了避免耗尽服务器内存，HTTP 会话会在一定时间后过期。典型的过期时间在 10 分钟到 1 小时之间。如果调用者在此时间之后访问应用程序，则需要重新进行身份验证。


    然而，即使不活动时间长达一小时，重新进行身份验证也常常是不可取的。但出于上述服务器资源耗尽的原因，延长 HTTP 会话的时长又是不可行的。


    这时，“记住我”（remember-me）就派上了用场。“记住我”是一个略带俏皮的说法，指的是一个过程：调用者的凭证被交换为一个令牌，并且该令牌通常存储在一个与
    HTTP 会话 cookie 不同的 cookie 中，并且具有更长的生存时间。


    “记住我”令牌实际上充当了调用者的新凭证，同时不会暴露调用者的原始密码。“记住我”令牌基本上可以多次分发，例如，按调用者用于连接应用程序的每个设备或 IP（互联网协议）分发一次。必须注意，虽然令牌不会暴露调用者的原始凭证，但它仍然充当着访问调用者账户的钥匙，因此应像对待任何其他类型的凭证一样，采取同样的预防措施。具体来说，包含“记住我”令牌的
    cookie 应仅通过 HTTPS/SSL 发送，并且应用程序不应逐字存储实际令牌，而应存储其强哈希值。


    由于使用“记住我”的主要原因是避免耗尽服务器内存并实现长生命周期，因此“记住我”令牌几乎总是存储在稳定存储中（例如，数据库）。因此，从这种存储中查找数据比从服务器内存中查找成本更高，如果每次请求都需要执行此操作，可能会严重影响性能，尤其是在一直有大量
    Ajax 请求的情况下。


    出于这个原因，“记住我”几乎总是与某种缓存结合使用。`CustomFormAuthenticationMechanism` 所使用的服务的模块化特性，使得“记住我”可以插入到上述的自动应用会话服务与实际的身份验证机制之间。这样，我们实际上获得了一种内存层次结构：首先尝试在
    HTTP 会话存储中查找身份验证数据，如果找不到，则尝试“记住我”服务，如果该服务也不包含数据，则最后尝试身份验证机制。


    要使用“记住我”，需要完成两件事。


    1.  为已安装的身份验证机制激活“记住我”服务


    2.  提供一个能够分发和验证“记住我”令牌的特殊身份存储


    ### 激活“记住我”服务


    Java EE Security 中的“记住我”服务由一个拦截器（Interceptor）表示。通过拦截器绑定注解 `@RememberMe`，可以轻松地将[“记住我”服务]应用于我们自己的自定义身份验证机制，即我们拥有其源代码的机制。不幸的是，当需要将这些注解应用于我们没有源代码的
    bean，甚至不知道其确切实现类型的 bean 时，就没那么容易了。


    由于我们在上述示例中一直使用的 `CustomFormAuthenticationMechanism` 确实属于后一种类型，因此需要做更多的工作。本质上，我们需要获取容器提供的实际
    `CustomFormAuthenticationMechanism` 实现的引用，然后使用 CDI 2.0 的 `InterceptionFactory`
    以编程方式添加 `@RememberMe` 注解。然后，结果应从替代生产者方法中返回。


    以下代码通过我们之前展示的 `ApplicationConfig` bean 中的新方法 `produceAuthenticationMechanism()`
    演示了这一点：


    ```

    @CustomFormAuthenticationMechanismDefinition(

        loginToContinue = @LoginToContinue(

            loginPage = "/login.xhtml",

            useForwardToLogin = false,

            errorPage = ""

        )

    )

    @FacesConfig @ApplicationScoped

    @Alternative @Priority(500)

    public class ApplicationConfig {


    @Produces

        public HttpAuthenticationMechanism produceAuthenticationMechanism(

            InterceptionFactory<HttpAuthenticationMechanismWrapper>

            interceptionFactory, BeanManager beanManager

        ) {

            @RememberMe

            class RememberMeClass {};

            interceptionFactory.configure().add(

                RememberMeClass.class.getAnnotation(RememberMe.class));

            return interceptionFactory.createInterceptedInstance(

                new HttpAuthenticationMechanismWrapper(

                    (HttpAuthenticationMechanism) beanManager

                    .getReference(beanManager

                    .resolve(beanManager

                    .getBeans((HttpAuthenticationMechanism.class).stream()

                    .filter(b -> b.getBeanClass() != ApplicationConfig.class)

                    .collect(Collectors.toSet())),

                        HttpAuthenticationMechanism.class,

                        beanManager.createCreationalContext(null))));

        }

    }

    ```


    `ApplicationConfig` bean 使用了 `@Alternative` 和 `@Priority` 注解进行标注。`@Alternative`
    在此处用于指示该生产者不是普通的常规生产者，而是一个应被调用来替代任何现有生产者或 bean 的生产者。也就是说，我们在此处生成的 bean 是 CDI 原本会为注入选择的具有相同类型的
    bean 的替代品。`@Priority` 用于启用（激活）我们的替代生产者。没有此注解，生产者虽然存在但未被启用，这意味着 CDI 不会调用它。启用替代品的另一种方法是使用
    `beans.xml`。这里的数字 500 用于在启用了多个替代品时进行选择。在这种情况下，将选择数字最大的那个。


    上面显示的代码使用了较为知名的 CDI 模式 `BeanManager#getBeans()/resolve()/getReference()` 来获取容器提供的
    `CustomFormAuthenticationMechanism`。这种模式比更简单的 `CDI.current().select(...)` 变体更冗长，但它允许我们过滤掉代表生产者方法的
    `Bean<T>`。从生产者方法内部的该 `Bean<T>` 获取引用会再次调用同一个生产者方法，从而导致递归调用，最终导致堆栈溢出。不言而喻，这是不希望的，因此我们才需要过滤掉那个特定的
    `Bean<T>`。

    '
- fmt: "从`BeanManager#getReference()`返回的 bean 实例几乎肯定是一个代理；`CustomFormAuthenticationMechanism`被指定为应用作用域，并且它隐式地使用了一个拦截器。由于代理现有代理的技术困难（考虑到生成的代理通常是\
