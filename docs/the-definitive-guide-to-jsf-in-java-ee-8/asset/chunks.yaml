  raw: '## File-Based Input Component


    Yes, there is only one file-based input component . That’s the <h:inputFile>.
    It has only one additional requirement on the <h:form> it is being placed in,
    its enctype attribute has to be explicitly set to multipart/form-data to conform
    the HTML specification . This has no effect on other input components; they will
    continue to work just fine. It’s just that the default form encoding application/x-www-form-urlencoded
    doesn’t support embedding binary data. The multipart/form-data encoding supports
    this, but it is only slightly more verbose. Every request parameter value is preceded
    by a boundary line, a Content-Disposition header with the request parameter name,
    a Content Type header with the content type of the value, and two newlines. It
    is very inefficient compared to the default encoding wherein the URL-encoded request
    parameter name/value pairs are just concatenated by the & character, but it’s
    actually the only reliable way to be able to embed files in a HTTP POST request
    without inducing ambiguity, particularly when uploading text files whose content
    coincidentally resembles name/value pairs.


    The value attribute of the <h:inputFile> should be bound to a bean property of
    the javax.servlet.http.Part interface.


    Facelets file /test.xhtml:


    ```

    <h:form id="form" enctype="multipart/form-data">

        <h:inputFile id="file" value="#{bean.file}" />

        <h:commandButton id="submit" value="Submit"

            action="#{bean.submit}" />

    </h:form>

    ```


    Backing bean class com.example.project.view.Bean:


    ```

    @Named @RequestScoped

    public class Bean {


        private Part file;


        public void submit() throws IOException {

            System.out.println("Form has been submitted!");

            System.out.println("file: " + file);

            if (file != null) {

                System.out.println("name: " + file.getSubmittedFileName());

                System.out.println("type: " + file.getContentType());

                System.out.println("size: " + file.getSize());

                InputStream content = file.getInputStream();

                // Write content to disk or DB.

            }

        }


        // Add/generate getters and setters for every property here.

    }

    ```


