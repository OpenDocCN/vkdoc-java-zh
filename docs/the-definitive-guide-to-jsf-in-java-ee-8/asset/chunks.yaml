    历史上还有一个 `<f:verbatim>` 标签，但它的目标组件是自 JSF 2.0 起已弃用的 JSP（Java Server Pages）视图技术，因此自
    JSF 2.0 起它也被弃用了。


    “创建/处理的对象”列指定了核心标签在指定目标组件上创建或处理的对象。


    “目标组件”列指定了核心标签所支持的目标组件超类或接口。您应理解指定的类或接口来自 `javax.faces.component` 包。如果目标组件以可选复数形式出现（如
    `UIComponent(s)`），则表示核心标签可以嵌套在目标组件内部，也可以包裹一个或多个目标组件。如果目标组件以明确复数形式出现（如 `UIComponents`），则表示核心标签只能包裹一个或多个目标组件，而不能嵌套。


    关于目标组件接口：`ActionSource` 接口由 `UICommand` 组件实现。`ClientBehaviorHolder` 接口由 `UIForm`、`UIInput`、`UICommand`、`UIData`、`UIOutput`、`UIPanel`
    和 `UIOutcomeTarget` 组件实现。`ValueHolder` 接口由 `UIOutput` 和 `UIInput` 组件实现。`EditableValueHolder`
    接口由 `UIInput` 组件实现。基于表 3-1，您应该能够从中推导出实际的 HTML 组件。


    “起始版本”列指示了该核心标签首次可用的 JSF 版本。在本书撰写时，可用的 JSF 版本包括：1.0（2004 年 3 月）、1.1（2004 年 5 月）、1.2（2006
    年 5 月）、2.0（2009 年 7 月）、2.1（2010 年 11 月）、2.2（2013 年 3 月）和 2.3（2017 年 3 月）。


    大多数单独的核心标签将在后续各章节中详细说明。


    ## 生命周期


    JSF 拥有一个定义非常清晰的生命周期。它被分解为六个阶段。每个阶段都会让 HTTP 请求流经组件树，对其执行操作，并触发组件系统事件。本章引言部分已结合图表（图
    3-1）给出了简要描述。以下各节将描述生命周期的每个阶段。


    ### 恢复视图阶段（第一阶段）


    首先创建 `UIViewRoot` 实例，并根据任何 `<f:view>` 标签设置其属性（如区域设置）。此时组件树仍然是空的。只有当当前请求是回传请求，或者视图包含带有子元素的
    `<f:metadata>` 时，才会根据视图定义构建完整的组件树。基本上，会根据视图中定义的组件标签实例化一个特定的 `UIComponent` 子类，并用视图中定义的所有属性填充它，然后调用
    `UIComponent#setParent()`，并传入实际的父组件。


    `UIComponent#setParent()` 方法首先会检查是否已存在父组件，如果存在，则会在旧父组件上触发 `PreRemoveFromViewEvent`。然后，当新父组件设置完毕，当前组件成为组件树的一部分时，会使用当前组件触发
    `PostAddToViewEvent`。


    如果当前请求是回传请求，则会将由 `javax.faces.ViewState` 请求参数标识的“视图状态”恢复到新构建的组件树中。之后，会为树中的每个组件显式触发
    `PostRestoreStateEvent`，即使组件树实际上并未被构建或恢复。换句话说，即使不是回传请求，也会触发该事件。您最好将此事件重新解释为“PostRestoreViewPhase”。如果在
    `PostRestoreStateEvent` 期间，您确实关心它是否是回传请求，则还应查阅 `FacesContext#isPostback()`。


    在该阶段结束时，如果完整的组件树实际上尚未构建，则会立即进入渲染响应阶段（第六阶段），从而跳过中间的所有阶段。

