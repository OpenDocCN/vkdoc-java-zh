  trans: "\n最后，还有一堆 #{cc} 表达式并未直接引用这些属性。两个 <h:selectOneMenu> 下拉菜单都直接绑定为所谓支持组件（即复合组件背后的具体\
    \ UIComponent 实例）的属性。并且，两个 <f:selectItems> 选项也直接从支持组件获取其值。以下是支持组件类 `com.example.project.composite.InputLocalTime`。\n\
    \n```\n@FacesComponent(\"inputLocalTime\")\npublic class InputLocalTime extends\
    \ UIInput implements NamingContainer {\n\nprivate static final List<String> HOURS\
    \ =\n        IntStream.rangeClosed(0, 23).boxed()\n            .map(InputLocalTime::pad).collect(Collectors.toList());\n\
        private static final List<String> MINUTES =\n        IntStream.rangeClosed(0,\
    \ 59).boxed()\n            .map(InputLocalTime::pad).collect(Collectors.toList());\n\
    \nprivate UIInput hour;\n    private UIInput minute;\n\n@Override\n    public\
    \ String getFamily() {\n        return UINamingContainer.COMPONENT_FAMILY;\n    }\n\
    \n@Override\n    public void encodeBegin(FacesContext context) throws IOException\
    \ {                                                          \n        LocalTime\
    \ localTime = (LocalTime) getValue();\n\nif (localTime != null) {\n            hour.setValue(pad(localTime.getHour()));\n\
                minute.setValue(pad(localTime.getMinute()));\n        }\n\nsuper.encodeBegin(context);\n\
        }\n\n@Override\n    public Object getSubmittedValue() {\n        String submittedHour\
    \ = (String) hour.getSubmittedValue();\n        String submittedMinute = (String)\
    \ minute.getSubmittedValue();\n\nif (submittedHour == null || submittedMinute\
    \ == null) {\n            return null;\n        }\n        else if (submittedHour.isEmpty()\
    \ || submittedMinute.isEmpty()) {\n            return \"\";\n        }\n        else\
    \ {\n            return submittedHour + \":\" + submittedMinute;\n        }\n\
        }\n\n@Override\n    protected Object getConvertedValue\n        (FacesContext\
    \ context, Object submittedValue)\n    {\n        String submittedTime = (String)\
    \ submittedValue;\n\nif (submittedTime == null || submittedTime.isEmpty()) {\n\
                return null;\n        }\n\ntry {\n            return LocalTime.parse(submittedTime,\n\
                    DateTimeFormatter.ISO_LOCAL_TIME);\n        }\n        catch (DateTimeParseException\
    \ e) {                                                          \n            throw\
    \ new ConverterException(e);\n        }\n    }\n\nprivate static String pad(Integer\
    \ value) {\n        return String.format(\"%02d\", value);\n    }\n\npublic UIInput\
    \ getHour() { return hour; }\n    public void setHour(UIInput hour) { this.hour\
    \ = hour; }\n    public UIInput getMinute() { return minute; }\n       public\
    \ void setMinute(UIInput minute) { this.minute = minute; }\n    public List<String>\
    \ getHours() { return HOURS; }\n    public List<String> getMinutes() { return\
    \ MINUTES; }\n}\n```\n\n现在，代码量有点大。你不仅会看到 getter 和 setter 为了简洁而被折叠，还会看到我们的复合组件继承了\
    \ UIInput 并实现了 NamingContainer。继承 UIInput 的好处是，我们无需在支持组件中重复 UIInput 的大部分默认编码和解码行为，因此只需重写少数几个方法。实现\
    \ NamingContainer 是 `<cc:interface>` 的技术要求。这使您能够在同一上下文中使用复合组件的多个实例，而不会遇到“重复组件\
    \ ID”错误。此要求也体现在重写的 `getFamily()` 方法中，根据复合组件的约定，该方法必须返回 `UINamingContainer.COMPONENT_FAMILY`\
    \ 常量。\n\n构成复合组件的实际 UIInput 组件被声明为支持组件的属性。在本例中，它们都是通过 `binding` 属性绑定到这些属性的 `<h:selectOneMenu>`\
    \ 下拉菜单。这使我们能够在编码（即：处理 HTTP 响应）期间轻松设置它们的值，并在解码（即：处理 HTTP 请求）期间获取提交的值。你可以在重写的 `encodeBegin()`\
    \ 和 `getSubmittedValue()` 方法中找到相应的逻辑。\n\n因此，在 `encodeBegin()` 方法中，你有机会根据模型值（如果有）准备显示的值。`getValue()`\
    \ 方法继承自 UIInput 超类，并与 `value` 属性关联。你可以分解模型值，并在复合组件的各个 UIInput 组件中设置所需的值。`pad()`\
    \ 辅助方法只是在数字前补零，例如，将“1”显示为“01”。此辅助方法也用于专门为 `<f:selectItems>` 静态初始化可用小时和分钟列表。\n\n\
    在 `getSubmittedValue()` 方法中，你应该将各个 UIInput 组件的提交值组合成一个单独的字符串。在 `<t:inputLocalTime>`\
    \ 的具体情况下，我们按照 ISO 本地时间模式 `HH:mm` 组合成一个字符串。反过来，UIInput 超类将此值传递给 `getConvertedValue()`，我们在此有机会将组合后的字符串转换为具体的模型值，在本例中即\
    \ `LocalTime`。最终，UIInput 超类将确保在更新模型值阶段将其设置到支持 bean 中。现在你可以像下面这样使用它：\n\n```\n<ui:composition\
    \ template=\"/WEB-INF/templates/layout.xhtml\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:cc=\"http://xmlns.jcp.org/jsf/composite/components\"\
    \n>\n    <ui:define name=\"content\">\n        <h:form>\n            <h:outputLabel\
    \ for=\"time:hour\" value=\"时间\" />\n            <t:inputLocalTime id=\"time\"\
    \ value=\"#{bean.time}\" />\n            <h:commandButton value=\"提交\" action=\"\
    #{bean.submit}\">\n                <f:ajax execute=\"@form\" />\n            </h:commandButton>\n\
            </h:form>\n    </ui:define>\n</ui:composition>\n```\n\n其中由 `#{bean}` 表示的支持\
    \ bean 如下所示：\n\n```\n@Named @RequestScoped\npublic class Bean {\n\nprivate LocalTime\
    \ time;\n\npublic void submit() {\n        System.out.println(\"提交的本地时间: \" +\
    \ time);\n    }\n\npublic LocalTime getTime() {\n        return time;\n    }\n\
    \npublic void setTime(LocalTime time) {\n        this.time = time;\n    }\n}\n\
    ```\n\n如果你需要在复合组件内部嵌套 `<f:ajax>`，以便在任何一个下拉菜单的更改事件期间运行某些 Ajax，那么你可以通过添加针对两个下拉菜单的\
    \ `<cc:clientBehavior>` 来实现，如下所示：\n\n```\n<cc:interface ...>\n    ...\n    <cc:clientBehavior\
    \ name=\"change\" default=\"true\"\n        targets=\"hour minute\" event=\"change\"\
    >\n    </cc:clientBehavior>\n</cc:interface>\n```\n\n`name` 属性表示事件名称，你需要在模板客户端中声明该名称以触发它。\n\
    \n```\n<t:inputLocalTime id=\"time\" ...>\n    <f:ajax event=\"change\" execute=\"\
    time\" ... />\n</t:inputLocalTime>\n```\n\n`default=\"true\"` 表示这是默认事件，这意味着你可以省略它，就像你可以对现有的输入文本和下拉组件省略\
