  trans: '

    ## 基于文档的输出组件


    这些组件包括 `<h:doctype>`、`<h:head>` 和 `<h:body>`。请注意，并不存在 `<h:html>` 这样的组件。`<h:doctype>`
    可以说是整个标准 JSF HTML 组件集中使用最少的 HTML 组件。你完全可以只使用一个普通的 `<!DOCTYPE html>` 元素。`<h:doctype>`
    仅在你想以纯 XML 形式表示 `<!DOCTYPE>` 元素时才有用，而这通常只发生在你需要将整个 JSF 视图作为 JSF 上层某个更高抽象层的另一个
    XML 结构的一部分进行存储时。


    自 JSF 2.0 起，`<h:head>` 和 `<h:body>` 成为了最重要的标签，因为 `<f:view>` 在 Facelets 中已变为可选。从历史上看，在
    JSP 中，`<f:view>` 是强制性的，用于声明该 JSP 页面是一个 JSF 视图。虽然生成 HTML 文档的 `<head>` 和 `<body>`
    元素不需要任何特殊逻辑，并且 `<h:head>` 和 `<h:body>` 对于 Facelets 页面被识别为 JSF 视图来说并非强制要求，但这些标签对于正确自动处理同样在
    JSF 2.0 中引入的 JavaScript 和 CSS（层叠样式表）资源依赖关系是强制性的。


    `<h:head>` 和 `<h:body>` 允许 JSF 自动将 JavaScript 和 CSS 资源依赖关系重新定位到组件树中的正确位置，以便它们最终出现在生成的
    HTML 输出中的正确位置。在标准 JSF 组件集中，只有 `<h:commandLink>`、`<h:commandScript>`、`<f:ajax>`
    和 `<f:websocket>` 使用此功能。它们都要求最终的 HTML 文档中包含 `jsf.js` JavaScript 文件。在视图构建期间，它们基本上会使用
    `UIViewRoot#addComponentResource()` ¹ 在指定的目标组件（可以是 `<h:head>` 或 `<h:body>`）处注册组件资源依赖关系。在视图渲染期间，与
    `<h:head>` 和 `<h:body>` 组件关联的渲染器将通过 `UIViewRoot#getComponentResources()` ² 获取所有已注册的组件资源依赖关系，并生成带有引用相关资源依赖关系的
    URL（统一资源定位符）的 `<link rel="stylesheet">` 和 `<script>` 元素。


    如第 3 章“标准 HTML 组件”部分所示，以下代码是最精简且符合 HTML5 规范的 JSF 页面：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>标题</title>

        </h:head>

        <h:body>

            ...

        </h:body>

    </html>

    ```


    ## 基于文本的输出组件


    这些组件包括 `<h:outputText>`、`<h:outputFormat>`、`<h:outputLabel>` 和 `<h:outputLink>`。它们都继承自
    `UIOutput` 超类，并具有一个 `value` 属性，该属性可以绑定到受管 bean 的属性。在视图渲染期间，将调用 getter 方法来检索并显示任何预设值。这些组件永远不会调用
    setter 方法，因此可以安全地将其从受管 bean 类中省略，以减少未使用的代码。


    从历史上看，在基于 JSP（Java 服务器页面）的 JSF 1.x 中，`<h:outputText>` 是输出 bean 属性作为文本所必需的。JSP
    不支持在模板文本中使用 JSF 风格的 EL（表达式语言）`#{...}`。Facelets 支持在模板文本中使用 JSF 风格的 EL `#{...}`，因此
    bean 属性可以直接在 Facelets 中输出，而无需整个 JSF 组件。换句话说，以下代码在基于 Facelets 的 JSF 中是等价的，即 `<h:outputText>`：


    ```

    <p>欢迎，<h:outputText value="#{user.name}" />！</p>

    ```


    以及模板文本中的 EL：


    ```

    <p>欢迎，#{user.name}！</p>

    ```


    无需解释，后一段代码更简洁且更易读。然而，`<h:outputText>` 在 Facelets 中并未变得无用。它仍然适用于以下目的：


    *   禁用隐式 HTML 转义。

    *   附加显式转换器。

    *   在 `<f:ajax render>` 中引用。


    JSF 在所有地方都进行隐式 HTML 转义。任何输出到 HTML 响应的内容都会检查 HTML 特殊字符“<”、“>”、“&”，以及在输出到 HTML 元素的属性时可选地检查“"”。这些
    HTML 特殊字符将分别被替换为“&lt;”、“&gt;”、“&amp;”和“&quot;”。然后，Web 浏览器不会将这些字符解释为生成的 HTML 输出的一部分，而是将其视为纯文本，并最终作为字面字符呈现给最终用户。


    想象一下，一个用户选择 `<script>alert(''xss'')</script>` 作为用户名，并通过上述任一代码片段经由 `#{user.name}`
    输出；那么 JSF 将在生成的 HTML 输出中将其渲染如下：


    ```

    <p>欢迎，<script>alert(''xss'')</script>！</p>

    ```


    而 Web 浏览器将按字面意思显示为“欢迎，<script>alert(''xss'')</script>！”，而不是仅显示“欢迎，！”并附带一个显示文本“xss”的
    JavaScript 警告框，从而导致用户控制的 JavaScript 被无意中实际执行。最终用户能够执行任意 JavaScript 代码是危险的。这将允许恶意用户执行特定代码，当其他人登录并查看渲染了该恶意用户用户名的页面时，该代码会将有关会话
    cookie 的信息传输到外部主机。（另请参阅第 13 章的“跨站脚本防护”部分。）


    另一方面，也可能存在您希望将安全的 HTML 代码嵌入到生成的 HTML 输出中的情况。最常见的用例与在网站上为其他用户发布消息有关，其中允许使用有限的格式子集，例如粗体、斜体、链接、列表、标题等。通常，这些内容需要使用预定义的、对用户友好的标记格式（例如
    Markdown，或不太为人所知的 Wikicode，或古老的 BBCode）在文本区域元素中输入。它们都能够解析带有标记的原始文本，并将其转换为安全的 HTML
    代码，其中任何恶意的 HTML 代码都已被转义或剥离。


    ```

    <h:inputTextarea value="#{message.text}" />

    ```


    原始文本至少始终保存在数据库中以供记录，而生成的、安全的 HTML 代码以及所使用的解析器版本也可以保存在数据库中以提高性能，这样就不必为同一段原始文本不必要地重新执行解析器。假设我们将使用带有
    CommonMark³ 的 Markdown，并拥有以下 Markdown 接口，

    '
- fmt: "```java\nprivate interface Markdown {\n    public String getText();\n    public\
    \ void setHtml(String html);\n    public String getVersion();\n    public void\
    \ setVersion(String version);\n}\n```\n\nAnd the following `MarkdownListener`\
    \ entity listener:\n\n```java\npublic class MarkdownListener {\n\n    private\
    \ static final Parser PARSER = Parser.builder().build();\n    private static final\
    \ HtmlRenderer RENDERER =\n        HtmlRenderer.builder().escapeHtml(true).build();\n\
    \    private static final String VERSION = getCommonMarkVersion();\n\n    @PrePersist\n\
    \    public void parseMarkdown(Markdown markdown) {\n        String html = RENDERER.render(PARSER.parse(markdown.getText()));\n\
    \        markdown.setHtml(html);\n        markdown.setVersion(VERSION);\n    }\n\
    \n    @PreUpdate\n    public void parseMarkdownIfNecessary(Markdown markdown)\
    \ {\n        if (markdown.getVersion() == null) {\n            parseMarkdown(markdown);\n\
    \        }\n    }\n\n    @PostLoad\n    public void updateMarkdownIfNecessary(Markdown\
    \ markdown) {\n        if (!VERSION.equals(markdown.getVersion())) {\n       \
    \     parseMarkdown(markdown);\n        }\n    }\n\n    private static String\
    \ getCommonMarkVersion() {\n        try {\n            Properties properties =\
    \ new Properties();\n            properties.load(Parser.class.getResourceAsStream(\n\
    \                \"/META-INF/maven/com.atlassian.commonmark\"\n              \
    \      + \"/commonmark/pom.properties\"));\n            return properties.getProperty(\"\
    version\");\n        }\n        catch (IOException e) {\n            throw new\
    \ UncheckedIOException(e);\n        }\n    }                                 \
    \                                             \n}\n```\n\nThen the `Message` entity\
    \ implementing the `Markdown` interface and registered with the `MarkdownListener`\
    \ entity listener can look as follows:\n\n```java\n@Entity @EntityListeners(MarkdownListener.class)\n\
    public class Message implements Markdown, Serializable {\n\n    @Id @GeneratedValue(strategy=IDENTITY)\n\
    \    private Long id;\n\n    @Column(nullable = false) @Lob\n    private @NotNull\
    \ String text;\n\n    @Column(nullable = false) @Lob\n    private String html;\n\
    \n    @Column(nullable = false, length = 8)\n    private String version;\n\n \
    \   @Override\n    public void setText(String text) {\n        if (!text.equals(this.text))\
    \ {\n            this.text = text;\n            setVersion(null); // Trigger for\
    \ MarkdownListener @PreUpdate.\n        }\n    }\n\n    // Add/generate remaining\
    \ getters and setters.\n}\n```\n\nFinally, in order to present the safe HTML code\
    \ to the end user, you can use `<h:outputText>` with the `escape` attribute set\
    \ to `false`, whereby you thus instruct JSF that it doesn’t need to implicitly\
    \ HTML-escape the value.\n\n```xml\n<h:outputText value=\"#{message.html}\" escape=\"\
    false\" />\n```\n\nNext to implicit HTML escaping, JSF also supports implicit\
    \ conversion. For any property type which is emitted via `<h:outputText>` or even\
    \ EL in template text, JSF will look up the converter by class, invoke its `Converter#getAsString()`\
    \ method, and render the result. In case you want to explicitly use a specific\
    \ or a different converter, you have to replace any EL in template text by `<h:outputText>`\
    \ and explicitly register the converter on it. Generally, it is those kinds of\
    \ number- or datetime-related properties that need to be formatted in a locale-specific\
    \ pattern.\n\n```xml\n<h:outputText value=\"#{product.price}\">\n    <f:convertNumber\
    \ type=\"currency\" locale=\"en_US\" />\n</h:outputText>\n```\n\nThe last purpose\
    \ of `<h:outputText>` is being able to reference a piece of inline text in `<f:ajax\
    \ render>`. By default, `<h:outputText>` doesn’t generate any HTML code. But if\
    \ it has at least an attribute specified which must end up in the generated HTML\
    \ output, such as `id` or `styleClass`, then it will generate an HTML `<span>`\
    \ element. This is referenceable via JavaScript and thus useful for Ajax-updating\
    \ specific parts of text. Of course, you could also opt for Ajax-updating some\
    \ common container component, but this is far less efficient than Ajax-updating\
    \ only specific parts which really need to be updated.\n\n`<h:outputFormat>` is\
    \ an extension of `<h:outputText>` which parses the value using `java.text.MessageFormat`\
    \ API[⁴](#A454457_1_En_6_Chapter.xhtml#Fn4) beforehand. This is particularly useful\
    \ in combination with localized resource bundles. An example can be found in the\
    \ section “Parameterized Resource Bundle Values” in Chapter [14](#A454457_1_En_14_Chapter.xhtml).\n\
    \n`<h:outputLabel>` basically generates the HTML `<label>` element, which is an\
    \ essential part of HTML forms. This was already described in the section “Label\
    \ and Message Components” in Chapter [4](#A454457_1_En_4_Chapter.xhtml). It is\
    \ important to note that `<h:outputLabel>` and `<h:outputText>` are, in HTML perspective,\
    \ absolutely not interchangeable. In a relatively recent burst of low-quality\
    \ programming tutorial sites on the Internet which basically show code snippets\
    \ without any technical explanation for the sake of advertisement incomes, `<h:outputLabel>`\
    \ is often incorrectly being used to output a piece of text in a Hello World JSF\
    \ page. Such tutorial sites can better be ignored entirely.\n\n`<h:outputLink>`\
    \ generates an HTML `<a>` element. It’s somewhat a leftover of JSF 1.x and isn’t\
    \ terribly useful since the introduction of the much more useful `<h:link>` in\
    \ JSF 2.0. When you don’t need to reference a JSF view with a link, for which\
    \ you’d use `<h:link>` instead, you could as well just use a plain HTML `<a>`\
    \ element instead of `<h:outputLink>`. The following tags generate exactly the\
    \ same HTML.\n\n```xml\n<h:outputLink value=\"http://google.com\">Google</h:outputLink>\n\
    <a href=\"http://google.com\">Google</a>\n```\n\nThe plain HTML equivalent is\
    \ terser.\n\n## Navigation-Based Output Components\n\nThese components are `<h:link>`\
    \ and `<h:button>`, both extending from the `UIOutcomeTarget` superclass. They\
    \ have an `outcome` attribute which accepts a logical path to a JSF view. The\
    \ path will actually be validated if it’s a valid JSF view; otherwise, the link\
    \ or button will be rendered as disabled. In other words, they don’t accept a\
    \ path to a non-JSF resource, let alone an external URL. For this, you’d need\
    \ `<h:outputLink>` or plain HTML instead.\n\n`<h:link>` will generate an HTML\
    \ `<a>` element with the URL of the target JSF view specified as an `href` attribute.\
    \ `<h:button>` will generate an HTML `<input type=\"button\">` element with an\
    \ `onclick` attribute which assigns, with help of JavaScript, the URL of the target\
    \ JSF view to `window.location.href` property. This is indeed somewhat awkward,\
    \ but that’s just a limitation of HTML. Neither `<input type=\"button\">` nor\
    \ `<button>` supports an `href`-like attribute.\n\nGiven the following folder\
    \ structure in a Maven WAR project in Eclipse:\n\n![A454457_1_En_6_Figa_HTML.jpg](OEBPS/Images/A454457_1_En_6_Figa_HTML.jpg)\n\
    \nThe following `<h:link>` and `<a>` pairs enclosed in `/folder1/page1.xhtml`\
    \ will all generate exactly the same links.\n\n```xml\n<h:link outcome=\"page2\"\
    \ value=\"link1\" />\n<a href=\"#{request.contextPath}/folder1/page2.xhtml\">link1</a>\n\
    \n<h:link outcome=\"/folder2/page1\" value=\"link2\" />\n<a href=\"#{request.contextPath}/folder2/page1.xhtml\"\
    >link2</a>\n\n<h:link outcome=\"/folder2/page2\" value=\"link3\" />\n<a href=\"\
    #{request.contextPath}/folder2/page2.xhtml\">link3</a>\n\n<h:link outcome=\"/page1\"\
    \ value=\"link4\" />\n<a href=\"#{request.contextPath}/page1.xhtml\">link4</a>\n\
    \n<h:link outcome=\"/page2\" value=\"link5\" />\n<a href=\"#{request.contextPath}/page2.xhtml\"\
    >link5</a>\n```\n\nNote thus that `<h:link>` already automatically prepends any\
    \ context path of the web application project and appends the currently active\
    \ URL pattern of the `FacesServlet` mapping. Also note that without the leading\
    \ slash, the outcome is interpreted relative to the current folder, and with a\
    \ leading slash, the outcome is interpreted relative to the context path."
