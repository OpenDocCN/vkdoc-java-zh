- fmt: "Indeed, this also implements `javax.faces.event.ComponentSystemEventListener`.\
    \ This is not strictly required for a tag handler; it’s just done for code convenience\
    \ in this specific example. The overridden `apply()` method is for `TagHandler`\
    \ and the overridden `processEvent()` method is for `ComponentSystemEventListener`.\
    \ In the `apply()` method we have the opportunity to programmatically manipulate\
    \ the parent component, before it’s being added to the component tree.\n\nWe can\
    \ programmatically achieve the same behavior as `<f:event>` by calling `UIComponent#subscribeToEvent()`,\
    \ passing the component system event type and listener instance of interest. The\
    \ listener instance of interest happens to be just the current tag handler instance.\
    \ When the component system event of interest has been published by the application,\
    \ then the `processEvent()` method of the listener instance will be invoked.\n\
    \nThe first thing we do in `processEvent()` is to unsubscribe the listener instance.\
    \ This is done on purpose because component system event listeners are considered\
    \ stateful and therefore are inherently saved in the JSF view state. An easy way\
    \ to observe this is to reconfigure JSF to save the view state on the client side\
    \ by explicitly setting the `javax.faces.STATE_SAVING_METHOD` context parameter\
    \ to `client` in `web.xml` and inspecting the size of the `javax.faces.ViewState`\
    \ hidden input field in the generated HTML output of any JSF form. Every time\
    \ you add `<f:event>`, or don’t unsubscribe `ComponentSystemEventListener` after\
    \ it has done its job, the size of the JSF view state grows with the serialized\
    \ form of the listener instance. In this specific use case of a listener which\
    \ should only run during a non-postback, that’s just unnecessary; hence the explicit\
    \ unsubscribe.\n\nNow, in order to get it to run, register it in `/WEB-INF/example.taglib.xml`\
    \ as follows:\n\n```\n<tag>\n    <tag-name>viewParamValidationFailed</tag-name>\n\
    \    <handler-class>\n        com.example.project.taghandler.ViewParamValidationFailed\n\
    \    </handler-class>                                                    \n</tag>\n\
    ```\n\n## Packaging in a Distributable JAR\n\nIn case you have developed a bunch\
    \ of reusable components, renderers, tag handlers, tag files, composite components,\
    \ and what not, and you’d like to package it in a JAR file for inclusion in `/WEB-INF/lib`\
    \ of a web application, then you need to create a so-called web fragment project.\
    \ Basically all JSF-oriented components and utility libraries such as OmniFaces,\
    \ PrimeFaces, OptimusFaces, BootsFaces, ButterFaces, and DeltaSpike are built\
    \ like this. In Maven perspective, it’s merely a JAR project. The key is to put\
    \ files which you normally put in the `src/main/webapp` folder of a Maven WAR\
    \ project in the `src/main/resources/META-INF/resources/[libraryName]` folder\
    \ of the Maven JAR project. There is one main exception, all deployment descriptor\
    \ files which you normally put in `src/main/webapp/WEB-INF`, such as `web.xml`,\
    \ `faces-config.xml`, `*.taglib.xml`, and `beans.xml` go directly in the `src/main/resources/META-INF`\
    \ folder. Another exception is that the `web.xml` file is to be replaced by `web-fragment.xml`.\n\
    \nThe `[libraryName]` subfolder in the resources folder represents the “library\
    \ name” which is generally the URL-friendly form of the project name. For example,\
    \ “omnifaces”, “primefaces”, “optimusfaces”, “bsf”, “butterfaces”, etc. Exactly\
    \ this library name is then usable in the `library` attribute of resource components\
    \ such as `<h:outputScript>`, `<h:outputStylesheet>`, and `<h:graphicImage>`.\
    \ Below is what such a Maven JAR project looks like in Eclipse when organized\
    \ to conform to the “web fragment” rules. Note particularly the structure of the\
    \ `src/main/resources` folder. Of course, any Java classes can go inside the `src/main/java`\
    \ folder in the usual way.\n\n![A454457_1_En_11_Figa_HTML.jpg](OEBPS/Images/A454457_1_En_11_Figa_HTML.jpg)\n\
    \nWhereby the `common.taglib.xml` looks like the following, with the composite\
    \ library name set to a path relative to `src/main/resources/META-INF/resources`\
    \ and the tag file source set to a path relative to the location of the `*.taglib.xml`\
    \ file itself.\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n\
    \    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/common</namespace>\n\
    \    <short-name>common</short-name>\n    <composite-library-name>common/components</composite-library-name>\n\
    \n<tag>\n        <tag-name>someTag</tag-name>\n        <source>resources/common/tags/someTag.xhtml</source>\n\
    \    </tag>\n</facelet-taglib>\n```\n\nAnd whereby the `web-fragment.xml` looks\
    \ as follows, nearly identical to `web.xml`, only with a different root element,\
    \ `<web-fragment>` instead of `<web-app>`.\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<web-fragment\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\n\
    \    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n        http://xmlns.jcp.org/xml/ns/javaee/web-fragment_4_0.xsd\"\
    \n    version=\"4.0\"\n>\n    <name>common</name>\n</web-fragment>\n```\n\nOnce\
    \ such a web fragment project is built as a JAR file and included in `/WEB-INF/lib`\
    \ of the main web application project, then the resources of the JAR are available\
    \ in the Facelets files of the main web application project via the library name\
    \ “common” as follows:\n\n```\n<ui:composition template=\"/common/templates/some.xhtml\"\
    \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n    xmlns:common=\"http://example.com/common\"\
    \n>\n    <ui:define name=\"content\">\n        <common:someComposite />\n    \
    \    <h:graphicImage library=\"common\" name=\"js/some.svg\" />\n        <ui:include\
    \ src=\"/common/includes/some.xhtml\" />\n        <h:outputScript library=\"common\"\
    \ name=\"scripts/some.js\" />\n        <h:outputStylesheet library=\"common\"\
    \ name=\"styles/some.css\" />\n        <common:someTag />\n    </ui:define>  \
    \                                                  \n</ui:composition>\n```\n\n\
    ## Resource Dependencies\n\nThere may be cases whereby your custom component or\
    \ renderer depends on a specific JavaScript or Stylesheet resource, for which\
    \ you would like to avoid the end user having to manually include it via `<h:outputScript>`\
    \ or `<h:outputStylesheet>`. In such cases, you may find the `@javax.faces.application.ResourceDependency`\
    \ annotation useful. Imagine that you would like to automatically include `common:scripts/some.js`\
    \ and `common:styles/some.css` along with a particular custom component; then\
    \ you can do so as follows:\n\n```\n@ResourceDependency(library=\"common\", name=\"\
    some.css\", target=\"head\")\n@ResourceDependency(library=\"common\", name=\"\
    some.js\", target=\"head\")\npublic class SomeCustomComponent extends UIComponent\
    \ {\n    // ...\n}\n```\n\nYou can of course also include JSF’s own `javax.faces:jsf.js`\
    \ when necessary, i.e., when your custom component happens to rely on, for example,\
    \ the `jsf.ajax.request()` or other functions provided by the standard JSF JavaScript\
    \ API. `javax.faces:jsf.js` can be included as follows, with the script library\
    \ and name available as constants of `ResourceHandler`.\n\n```\n@ResourceDependency(\n\
    \    library=ResourceHandler.JSF_SCRIPT_LIBRARY_NAME,\n    name=ResourceHandler.JSF_SCRIPT_RESOURCE_NAME,\n\
    \    target=\"head\")\npublic class SomeCustomComponent extends UIComponent {\n\
    \    // ...\n}\n```"
