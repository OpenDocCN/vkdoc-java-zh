    code in the generated HTML output. Most common use cases are related to posting
    messages for other users on a web site, whereby a limited subset of formatting
    is allowed, such as bold, italics, links, lists, headings, etc. Generally, those
    are to be entered in a text area element using a predefined human-friendly markup
    format , such as Markdown, or the lesser known Wikicode, or the ancient BBCode.
