    # 8. Backing Beans


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    The “backing bean ” is a JSF-specific concept. It represents the sole JavaBean
    class which is ultimately used as a “managed bean ” responsible for providing
    data, actions, and/or UI (User Interface ) components in a JSF page.


    ## Model, View, or Controller?


    JSF (JavaServer Faces ) is a MVC (model-view-controller ) framework . It’s a widely
    used architectural design pattern for software applications which has its roots
    in desktop application development.[¹](#A454457_1_En_8_Chapter.xhtml#Fn1)


    In a JSF framework’s point of view, the model is represented by the backing bean,
    the view is represented by the component tree, which in turn is usually defined
    in a Facelets file, and the controller is represented by the FacesServlet which
    is already provided by JSF. From a Java EE application server’s point of view,
    however, the model is represented by the service layer which in turn is usually
    defined in EJB (Enterprise JavaBeans ) classes and JPA (Java Persistence API )
    entities, the view is represented by all your JSF-based code, and the controller
    is the FacesServlet. In a JSF developer’s point of view, the model is represented
    by the service layer, the view is represented by the Facelets file, and the controller
    is represented by the backing bean.


    The backing bean class can thus be either the model, view, or controller, depending
    on your point of view, while the service layer is always the model, and the Facelets
    file is always the view, and the FacesServlet is always the controller. Note that
    in this context, the “JSF developer ” is you, who develops a web application using
    the JSF framework for a Java EE application server.


    Figure [8-1](#A454457_1_En_8_Chapter.xhtml#Fig1) illustrates the position of the
    backing bean in JSF’s MVC paradigm. It’s a Venn diagram where the intersection
    of the controller and the view is represented by the JSF component tree which
    could be bound to a backing bean via the component’s binding attribute. The intersection
    of the view and the model is represented by property getters and setters of EL
    (Expression Language ) value expressions which could be bound to a backing bean,
    usually via the component’s value attribute. The intersection of the controller
    and the model is represented by action method invocations of EL method expressions
    which could be bound to a backing bean via the component’s action attribute. Finally,
    the intersection of all intersections is represented by the backing bean itself.


