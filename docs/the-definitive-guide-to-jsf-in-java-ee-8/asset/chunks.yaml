- fmt: "# Managed Bean Initialization and Destruction\n\nManaged bean instances can\
    \ be initialized based on injected dependencies in a `@PostConstruct` annotated\
    \ method. Managed bean instances can hook on destroy event in a `@PreDestroy`\
    \ annotated method.\n\n```java\n@Named\npublic class Bean {\n\n    @PostConstruct\n\
    \    public void init() {\n        // ...\n    }\n\n    @PreDestroy\n    public\
    \ void destroy() {\n        // ...\n    }\n}\n```\n\nThe method names are not\
    \ predefined. The method names `init()` and `destroy()` are basically taken over\
    \ from the `HttpServlet`. You can of course choose your own, such as `onload()`\
    \ and `cleanup()`. It’s useful to know that those annotations are inheritable.\
    \ In other words, you could put those methods and annotations in an abstract base\
    \ class.\n\nIn the `@PostConstruct` method you have the opportunity to perform\
    \ initialization based on injected dependencies. They are not available in the\
    \ constructor yet. The bean management facility can only inject the dependencies\
    \ after having constructed the managed bean instance. It will then immediately\
    \ invoke the `@PostConstruct` annotated method. In the `@PreDestroy` method you\
    \ have the opportunity to perform any necessary cleanup, such as closing resources,\
    \ deleting files, etc.\n\n# Injecting JSF Vended Types\n\nBacking beans can obviously\
    \ be injected as demonstrated many times over in the examples above. Next to injecting\
    \ your own types, a variety of JSF vended types can be injected via CDI as well.\
    \ These types largely correspond to the implicit EL objects we saw in Table [7-1](#A454457_1_En_7_Chapter.xhtml#Tab1)\
    \ in Chapter [7](#A454457_1_En_7_Chapter.xhtml). This is no coincidence. Internally\
    \ implicit objects in JSF are implemented by so-called `Bean<T>` instances from\
    \ CDI. These CDI `Bean<T>` instances are effectively the factory objects that\
    \ know how to generate beans, with what type and optional qualifier and/or with\
    \ what name.\n\nWhen the name of an implicit object is used in expression language,\
    \ the CDI EL resolver does a lookup for that object by name, which results in\
    \ a call to a certain `Bean<T>` instance. When we’re injecting, the type into\
    \ which we inject, together with any explicit or implicit qualifiers, forms an\
    \ alternative key that’s being used for this lookup. Both types of keys will result\
    \ in the exact same CDI `Bean<T>` instance being used.\n\nIt should be noted that\
    \ compared to the implicit EL objects mentioned in Table [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1)\
    \ a few are missing for CDI-injectable JSF vended types, namely:\n\n*   `#{component}`\n\
    *   `#{cc}`\n*   `#{request}`\n*   `#{session}`\n*   `#{application}`\n\nBoth\
    \ `#{component}` and `#{cc}` resolve to `UIComponent` which is not injectable,\
    \ since this would require a special proxy or custom scope that’s narrow enough\
    \ to resolve the “current” instance of those at the time the injected type is\
    \ accessed. Since such scope is not available in JSF yet, and there was only a\
    \ little time and few resources remaining to finish the JSF 2.3 spec, these had\
    \ been excluded from CDI injection.\n\nThe `#{request}`, `#{session}`, and `#{application}`,\
    \ respectively, representing `HttpServletRequest`, `HttpSession`, and `ServletContext`\
    \ in a Servlet container have been omitted since these types are not owned by\
    \ JSF and therefore JSF should not provide CDI injection capabilities for those.\
    \ The fact that JSF does provide implicit EL objects for those is mostly historical.\
    \ The only specification that should provide injection for those types is the\
    \ Servlet API, which owns those types directly.\n\nTable [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1)\
    \ shows the JSF vended types that are injectable via CDI.\n\n###### Table 8-1\
    \ Injectable JSF Vended types, All Since 2.3\n\n| Injectable JSF type | Resolves\
    \ to |\n| --- | --- |\n| `javax.faces.context.FacesContext` | `FacesContext#getCurrentInstance()`\
    \ |\n| `javax.faces.context.ExternalContext` | `FacesContext#getExternalContext()`\
    \ |\n| `javax.faces.component.UIViewRoot` | `FacesContext#getViewRoot()` |\n|\
    \ `javax.faces.context.Flash` | `ExternalContext#getFlash()` |\n| `@RequestMap\
    \ Map<String, Object>` | `ExternalContext#getRequestMap()` |\n| `@ViewMap Map<String,\
    \ Object>` | `UIViewRoot#getViewMap()` |\n| `@FlowMap Map<Object, Object>` | `FlowHandler#getCurrentFlowScope()`\
    \ |\n| `@SessionMap Map<String, Object>` | `ExternalContext#getSessionMap()` |\n\
    | `@ApplicationMap Map<String, Object>` | `ExternalContext#getApplicationMap()`\
    \ |\n| `@InitParameterMap Map<String, String>` | `ExternalContext#getInitParameterMap()`\
    \ |\n| `@RequestParameterMap Map<String, String>` | `ExternalContext#getRequestParameterMap()`\
    \ |\n| `@RequestParameterValuesMap Map<String, String[]>` | `ExternalContext#getRequestParameterValuesMap()`\
    \ |\n| `@HeaderMap Map<String, String>` | `ExternalContext#getRequestHeaderMap()`\
    \ |\n| `@HeaderValuesMap Map<String, String[]>` | `ExternalContext#getRequestHeaderValuesMap()`\
    \ |\n| `@RequestCookieMap Map<String, Cookie>` | `ExternalContext#getRequestCookieMap()`\
    \ |\n| `javax.faces.application.ResourceHandler` | `Application#getResourceHandler()`\
    \ |\n\nAs can be seen from Table [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1), for\
    \ objects for which there is only one instance and that instance is vended (owned)\
    \ by JSF, no qualifier is needed. When it concerns more general types, such as\
    \ the various maps, a qualifier is needed. All these qualifier annotations are\
    \ available from the `javax.faces.annotation` package.[^(13)](#A454457_1_En_8_Chapter.xhtml#Fn13)\n\
    \nA caveat is that all of the above types are request scoped, but the time during\
    \ which they are valid is actually smaller, namely, from shortly after the moment\
    \ the `service()` method of the `FacesServlet` is called until shortly before\
    \ the moment that method is exited. Care should be taken not to inject and access\
    \ these types outside that time. It’s expected that a future revision of the JSF\
    \ spec will address this problem.\n\nThe following shows an example of injecting\
    \ two of the JSF vended types:\n\n```java\n@Named @RequestScoped\npublic class\
    \ Bean {\n\n    @Inject\n    private Flash flash;\n\n    @Inject @RequestParameterMap\n\
    \    private Map<String, String> requestParameterMap;\n\n    public void someMethod()\
    \ {\n        if (requestParameterMap.containsKey(\"something\")) {\n         \
    \    flash.put(\"aKey\", \"aValue\");\n        }\n    }\n}\n```"
  raw: '## Managed bean initialization and destruction


    Managed bean instances can be initialized based on injected dependencies in a
    @PostConstruct annotated method. Managed bean instances can hook on destroy event
    in a @PreDestroy annotated method.


    ```

    @Named

    public class Bean {


        @PostConstruct

        public void init() {

            // ...

        }


        @PreDestroy

        public void destroy() {

            // ...

        }

    }

    ```


    The method names are not predefined. The method names init() and destroy() are
    basically taken over from the HttpServlet. You can of course choose your own,
    such as onload() and cleanup(). It’s useful to know that those annotations are
    inheritable. In other words, you could put those methods and annotations in an
    abstract base class.


    In the postconstruct method you have the opportunity to perform initialization
    based on injected dependencies. They are not available in the constructor yet.
    The bean management facility can only inject the dependencies after having constructed
    the managed bean instance. It will then immediately invoke the @PostConstruct
    annotated method. In the pre-destroy method you have the opportunity to perform
    any necessary cleanup, such as closing resources , deleting files, etc.


    ## Injecting JSF vended types


    Backing beans can obviously be injected as demonstrated many times over in the
    examples above. Next to injecting your own types, a variety of JSF vended types
    can be injected via CDI as well. These types largely correspond to the implicit
    EL objects we saw in Table [7-1](#A454457_1_En_7_Chapter.xhtml#Tab1) in Chapter
    [7](#A454457_1_En_7_Chapter.xhtml). This is no coincidence. Internally implicit
    objects in JSF are implemented by so-called Bean<T> instances from CDI. These
    CDI Bean<T> instances are effectively the factory objects that know how to generate
    beans, with what type and optional qualifier and/or with what name.


    When the name of an implicit object is used in expression language, the CDI EL
    resolver does a lookup for that object by name, which results in a call to a certain
    Bean<T> instance. When we’re injecting, the type into which we inject, together
    with any explicit or implicit qualifiers, forms an alternative key that’s being
    used for this lookup. Both types of keys will result in the exact same CDI Bean<T>
    instance being used.


    It should be noted that compared to the implicit EL objects mentioned in Table
    [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1) a few are missing for CDI-injectable
    JSF vended types, namely:


    *   #{component}


    *   #{cc}


    *   #{request}


    *   #{session}


    *   #{application}


    Both #{component} and #{cc} resolve to UIComponent which is not injectable, since
    this would require a special proxy or custom scope that’s narrow enough to resolve
    the “current” instance of those at the time the injected type is accessed. Since
    such scope is not available in JSF yet, and there was only a little time and few
    resources remaining to finish the JSF 2.3 spec, these had been excluded from CDI
    injection.


    The #{request}, #{session}, and #{application}, respectively, representing HttpServletRequest,
    HttpSession, and ServletContext in a Servlet container have been omitted since
    these types are not owned by JSF and therefore JSF should not provide CDI injection
    capabilities for those. The fact that JSF does provide implicit EL objects for
    those is mostly historical. The only specification that should provide injection
    for those types is the Servlet API, which owns those types directly.


    Table [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1) shows the JSF vended types that
    are injectable via CDI.


    ###### Table 8-1 Injectable JSF Vended types, All Since 2.3


    | Injectable JSF type | Resolves to |

    | --- | --- |

    | javax.faces.context.FacesContext | FacesContext#getCurrentInstance(  ) |

    | javax.faces.context.ExternalContext | FacesContext#getExternalContext(  ) |

    | javax.faces.component.UIViewRoot | FacesContext#getViewRoot(  ) |

    | javax.faces.context.Flash | ExternalContext#getFlash(  ) |

    | @RequestMap Map<String, Object> | ExternalContext#getRequestMap(  ) |

    | @ViewMap Map<String, Object> | UIViewRoot#getViewMap(  ) |

    | @FlowMap Map<Object, Object> | FlowHandler#getCurrentFlowScope(  ) |

    | @SessionMap Map<String, Object> | ExternalContext#getSessionMap(  ) |

    | @ApplicationMap Map<String, Object> | ExternalContext#getApplicationMap(  )
    |

    | @InitParameterMap Map<String, String> | ExternalContext#getInitParameterMap(  )
    |

    | @RequestParameterMap Map<String, String> | ExternalContext#getRequestParameterMap(  )
    |

    | @RequestParameterValuesMap Map<String, String[]> | ExternalContext#getRequestParameterValuesMap(  )
    |

    | @HeaderMap Map<String, String> | ExternalContext#getRequestHeaderMap(  ) |

    | @HeaderValuesMap Map<String, String[]> | ExternalContext#getRequestHeaderValuesMap(  )
    |

    | @RequestCookieMap Map<String, Cookie> | ExternalContext#getRequestCookieMap(  )
    |

    | javax.faces.application.ResourceHandler | Application#getResourceHandler(  )
    |


    As can be seen from Table [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1), for objects
    for which there is only one instance and that instance is vended (owned) by JSF,
    no qualifier is needed. When it concerns more general types, such as the various
    maps, a qualifier is needed. All these qualifier annotations are available from
    the javax.faces.annotation package.[^(13)](#A454457_1_En_8_Chapter.xhtml#Fn13)


    A caveat is that all of the above types are request scoped, but the time during
    which they are valid is actually smaller, namely, from shortly after the moment
    the service() method of the FacesServlet is called until shortly before the moment
    that method is exited. Care should be taken not to inject and access these types
    outside that time. It’s expected that a future revision of the JSF spec will address
    this problem.


    The following shows an example of injecting two of the JSF vended types :


    ```

    @Named @RequestScoped

    public class Bean {


        @Inject

        private Flash flash;


        @Inject @RequestParameterMap

        private Map<String, String> requestParameterMap;


        public void someMethod() {

            if (requestParameterMap.containsKey("something")) {

                 flash.put("aKey", "aValue");

            }

        }

    }

    ```'
  trans: '

    ## 托管 Bean 的初始化与销毁


    托管 Bean 实例可以在带有 `@PostConstruct` 注解的方法中，基于注入的依赖进行初始化。托管 Bean 实例可以在带有 `@PreDestroy`
    注解的方法中，挂载销毁事件。


    ```

    @Named

    public class Bean {


        @PostConstruct

        public void init() {

            // ...

        }


        @PreDestroy

        public void destroy() {

            // ...

        }

    }

    ```


    方法名称并非预定义。`init()` 和 `destroy()` 这两个方法名基本上是从 `HttpServlet` 继承而来的。当然，你可以选择自己的名称，例如
    `onload()` 和 `cleanup()`。了解这些注解是可继承的会很有用。换句话说，你可以将这些方法和注解放在一个抽象基类中。


    在 `@PostConstruct` 方法中，你有机会基于注入的依赖执行初始化。这些依赖在构造函数中尚不可用。Bean 管理设施只能在构造完托管 Bean
    实例之后才能注入依赖。然后它会立即调用带有 `@PostConstruct` 注解的方法。在 `@PreDestroy` 方法中，你有机会执行任何必要的清理工作，例如关闭资源、删除文件等。


    ## 注入 JSF 提供的类型


    显然，支持 Bean 可以被注入，正如上面示例中多次演示的那样。除了注入你自己的类型之外，各种 JSF 提供的类型也可以通过 CDI 进行注入。这些类型在很大程度上对应于我们在第
    7 章的表 7-1 中看到的隐式 EL 对象。这并非巧合。在 JSF 内部，隐式对象是通过 CDI 中所谓的 `Bean<T>` 实例来实现的。这些 CDI
    `Bean<T>` 实例实际上是工厂对象，它们知道如何生成 Bean，以及使用什么类型、可选的限定符和/或什么名称。


    当在表达式语言中使用隐式对象的名称时，CDI EL 解析器会按名称查找该对象，这会导致调用某个 `Bean<T>` 实例。当我们进行注入时，我们注入的类型，连同任何显式或隐式的限定符，构成了用于此查找的替代键。两种类型的键都会导致使用完全相同的
    CDI `Bean<T>` 实例。


    需要注意的是，与表 8-1 中提到的隐式 EL 对象相比，对于可通过 CDI 注入的 JSF 提供类型，缺少了几个，即：


    *   `#{component}`

    *   `#{cc}`

    *   `#{request}`

    *   `#{session}`

    *   `#{application}`


    `#{component}` 和 `#{cc}` 都解析为 `UIComponent`，它是不可注入的，因为这需要一个特殊的代理或自定义作用域，其范围要足够窄，以便在访问注入类型时解析出它们的“当前”实例。由于
    JSF 中尚不存在这样的作用域，并且完成 JSF 2.3 规范的时间和资源所剩无几，因此这些被排除在 CDI 注入之外。


    `#{request}`、`#{session}` 和 `#{application}` 分别代表 Servlet 容器中的 `HttpServletRequest`、`HttpSession`
    和 `ServletContext`，它们被省略了，因为这些类型不属于 JSF，因此 JSF 不应为它们提供 CDI 注入能力。JSF 确实为这些提供了隐式
    EL 对象，这主要是历史原因。唯一应该为这些类型提供注入的规范是 Servlet API，它直接拥有这些类型。


    表 8-1 显示了可通过 CDI 注入的 JSF 提供类型。


    ###### 表 8-1 可注入的 JSF 提供类型，自 2.3 版本起全部可用


    | 可注入的 JSF 类型 | 解析为 |

    | --- | --- |

    | javax.faces.context.FacesContext | FacesContext#getCurrentInstance(  ) |

    | javax.faces.context.ExternalContext | FacesContext#getExternalContext(  ) |

    | javax.faces.component.UIViewRoot | FacesContext#getViewRoot(  ) |

    | javax.faces.context.Flash | ExternalContext#getFlash(  ) |

    | @RequestMap Map<String, Object> | ExternalContext#getRequestMap(  ) |

    | @ViewMap Map<String, Object> | UIViewRoot#getViewMap(  ) |

    | @FlowMap Map<Object, Object> | FlowHandler#getCurrentFlowScope(  ) |

    | @SessionMap Map<String, Object> | ExternalContext#getSessionMap(  ) |

    | @ApplicationMap Map<String, Object> | ExternalContext#getApplicationMap(  )
    |

    | @InitParameterMap Map<String, String> | ExternalContext#getInitParameterMap(  )
    |

    | @RequestParameterMap Map<String, String> | ExternalContext#getRequestParameterMap(  )
    |

    | @RequestParameterValuesMap Map<String, String[]> | ExternalContext#getRequestParameterValuesMap(  )
    |

    | @HeaderMap Map<String, String> | ExternalContext#getRequestHeaderMap(  ) |

    | @HeaderValuesMap Map<String, String[]> | ExternalContext#getRequestHeaderValuesMap(  )
    |

    | @RequestCookieMap Map<String, Cookie> | ExternalContext#getRequestCookieMap(  )
    |

    | javax.faces.application.ResourceHandler | Application#getResourceHandler(  )
    |


    从表 8-1 可以看出，对于只有一个实例且该实例由 JSF 提供（拥有）的对象，不需要限定符。当涉及更通用的类型（例如各种 Map）时，则需要限定符。所有这些限定符注解都可以从
    `javax.faces.annotation` 包中获得。¹³


    需要注意的是，上述所有类型都是请求作用域的，但它们实际有效的时间更短，即从 `FacesServlet` 的 `service()` 方法被调用后不久，直到该方法退出前不久。应注意不要在此时间范围之外注入和访问这些类型。预计未来版本的
    JSF 规范将解决此问题。


    以下展示了注入两种 JSF 提供类型的示例：


    ```

    @Named @RequestScoped

    public class Bean {


        @Inject

        private Flash flash;


        @Inject @RequestParameterMap

        private Map<String, String> requestParameterMap;


        public void someMethod() {

            if (requestParameterMap.containsKey("something")) {

                 flash.put("aKey", "aValue");

            }

        }

    }

    ```

