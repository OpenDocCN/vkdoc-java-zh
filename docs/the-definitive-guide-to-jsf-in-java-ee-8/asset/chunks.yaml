    `true`，则会抛出上述验证错误。


    继续以 `BaseEntity` 为例，下面是你最好如何实现其 `equals()` 和 `hashCode()` 方法的方式。


    ```

    @Override

    public boolean equals(Object other) {

        if (getId() != null

            && getClass().isInstance(other)

            && other.getClass().isInstance(this))

        {

            return getId().equals(((BaseEntity) other).getId());

        }

        else {

            return (other == this);

        }

    }


    @Override

    public int hashCode() {

        if (getId() != null) {

            return Objects.hash(getId());

        }

        else {

            return super.hashCode();

        }

    }

    ```


    请注意 `equals()` 方法中的双向 `Class#isInstance()` 测试。这样做是为了替代 `getClass() == other.getClass()`，因为当你的持久化框架（如
    Hibernate）使用代理时，后者会返回 `false`。

