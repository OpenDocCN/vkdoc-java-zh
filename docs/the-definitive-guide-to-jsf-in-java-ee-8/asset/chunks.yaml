    instead of only “Welcome, !” along with a JavaScript alert with the text “xss”
    whereby the user-controlled JavaScript is unintentionally actually executed. The
    end user being able to execute arbitrary JavaScript code is dangerous. It would
    allow the malicious user to execute specific code which transfers information
    about session cookies to an external host when someone else logs in and views
    a page wherein the username of the malicious user is being rendered. (See also
    the section “Cross-Site Scripting Protection” in Chapter [13](#A454457_1_En_13_Chapter.xhtml).)


