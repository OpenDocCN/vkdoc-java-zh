    ## 选择组件


    JSF 提供了 `UISelectBoolean`、`UISelectOne` 和 `UISelectMany` 组件系列中的一系列选择组件，它们都继承自
    `UIInput`。除了 `UISelectBoolean` 之外，它们都期望通过嵌套在选择组件中的 `<f:selectItems>` 或 `<f:selectItem>`
    标签提供可用的选择项。`UISelectBoolean` 组件的 `value` 属性只能绑定到 `boolean` 或 `Boolean` 类型的 bean
    属性，并且不支持转换器，而其他组件支持转换器。`UISelectOne` 组件的 `value` 属性必须绑定到单值属性（例如 `String`），而 `UISelectMany`
    组件的 `value` 属性只能绑定到多值属性（例如 `Collection<String>` 或 `String[]`）。


    在现实世界的基于 HTML 的 Web 应用程序中，`<h:selectOneListbox>`（单选列表框）和 `<h:selectManyMenu>`（多选下拉菜单）并不是非常有用。通常，`<h:selectOneMenu>`（单选下拉菜单）和
    `<h:selectManyListBox>`（多选列表框）更受欢迎，因为它们对用户更友好。以下是一个基本用法示例，演示了除上述最不常用的选择组件之外的所有选择组件。如果您仍然想使用它们，只需按照演示的方法使用不同的标签名称即可。


    Facelets 文件 /test.xhtml：


    ```

    <h:form id="form">

        <h:selectBooleanCheckbox id="checked" value="#{bean.checked}" />

        <h:selectOneMenu id="oneMenu" value="#{bean.oneMenu}">

            <f:selectItems value="#{bean.availableItems}" />

        </h:selectOneMenu>

        <h:selectOneRadio id="oneRadio" value="#{bean.oneRadio}">

            <f:selectItems value="#{bean.availableItems}" />

        </h:selectOneRadio>

        <h:selectManyListbox id="manyListbox" value="#{bean.manyListbox}">

            <f:selectItems value="#{bean.availableItems}" />

