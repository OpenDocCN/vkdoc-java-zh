    # 7. Facelets Templating


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    When JSF (JavaServer Faces) came out for first time in 2004, only JSP (Java Server
    Pages) had view technology. It was immediately clear that it was an ill-suited
    view technology for web development with JSF. The problem with JSP is that it
    writes to the HTTP response as soon as it encounters template text, while JSF
    would like to first create a component tree based on the view declaration in order
    to be able to perform the life cycle processing on it. For example, the following
    JSF 1.0/1.1 page using JSP view technology,


    ```

    <h:commandLink action="...">

        <strong>strong link text</strong>

    </h:commandLink>

    ```


    would produce the following HTML output, with template text emitted by JSP before
    the generated HTML output of JSF components[¹](#A454457_1_En_7_Chapter.xhtml#Fn1):


    ```

    <strong>strong link text</strong>

    <a href="..." onclick="..."></a>

    ```


    The “correct approach” would be to wrap template text in <f:verbatim> tags,


    ```

    <h:commandLink action="...">

        <f:verbatim><strong>strong link text</strong><f:verbatim>

    </h:commandLink>

    ```


    which would produce the following HTML output:


    ```

    <a href="..." onclick="...">  <strong>strong link text</strong></a>

    ```


    This has obviously received a lot of criticism, and the general recommendation
    now is that people should not be mixing JSF with HTML. Another problem with JSF
    1.0/1.1 was that there was no component to represent an HTML <div>. That was around
    the time “web 2.0” had just started, and people also started to discommend the
    use of HTML tables to lay out a web page. The prevailing view was that only divs
    should be used, which made people dislike JSF 1.0/1.1 even more.


    The peculiar JSP behavior of causing a disorganized HTML output was worked around
    in JSF 1.2 which was released only two years later in 2006, and the missing component
    to represent an HTML <div> was solved by giving the <h:panelGroup> component a
    new layout="block" attribute so that it renders a <div> instead of <span>. So,
    already, since JSF 1.2, people can safely mix plain HTML with JSF components in
    a JSP page and continue using divs in both plain HTML and JSF ways. However, the
    recommended plan to avoid plain HTML while authoring JSF 1.0/1.1 pages turned
    into a persistent myth which is even today still alive among some people.


    Another problem with JSP is that existing JSP taglibs such as JSTL (JSP Standard
    Tag Library) and existing JSP expressions in the form of ${…} didn’t integrate
    at all into the JSF life cycle and therefore mixing existing JSP taglibs and JSP
    expressions with JSF components in a JSP page would result in confusing and unintuitive
    behavior. People couldn’t use <c:forEach> to render a list of JSF components as
    those components wouldn’t see the variable declared by <c:forEach var>. There
    was no dedicated JSF component to loop over a list other than <h:dataTable> and
    ultimately people are stuck with tables while creating lists in the JSF page.


    Finally, JSP also offers very limited templating capabilities with actually only
    one “templating” tag, <jsp:include>; therefore, templating with JSP would require
    a fairly complicated approach of creating a bunch of custom tags for every definition
    of a reusable template section.[²](#A454457_1_En_7_Chapter.xhtml#Fn2) This contradicts
    the philosophy of JSF, to have reusable components to minimize code duplication.
    With JSP, you would end up duplicating JSF components themselves. Existing templating
    frameworks such as Tiles and Thymeleaf are either JSP centric or don’t support
    JSF at all and thus cannot be used.'
