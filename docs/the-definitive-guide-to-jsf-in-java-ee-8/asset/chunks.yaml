- fmt: '# 14. Localization


    Bauke Scholtz^(1) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    JSF has always had decent internationalization support. Since JSF 1.0 you can
    supply `java.util.ResourceBundle`-based bundle files in different locales, which
    in turn get dynamically included as text in the web page at the declared places.
    Also, all JSF converters and validators have their own set of localized default
    messages which you can easily customize via a message bundle or, since JSF 1.2,
    via new `requiredMessage`, `converterMessage`, and `validatorMessage` attributes.
    JSF 2.0 adds, via the new `javax.faces.application.ResourceHandler`, API (application
    programing interface) support for localizable assets such as stylesheets, scripts,
    and images.


    The act of internationalization, “I18N,” is distinct from the act of localization,
    “L10N.” The internationalization part is basically already done by JSF (JavaServer
    Faces) itself as being a MVC (model-view-controller) framework. All you need to
    do is to take care of the localization part. Basically, you need to specify the
    “active locale” in the view, supply the desired resource bundle files, if necessary
    translated with help of a third-party translation service, and declare references
    to the bundle file in your JSF page.


    In this chapter you will learn how to prepare a JSF web application for different
    languages and how to develop it in order to make localization easier for yourself
    as to maintenance.


    ## Hello World, Olá mundo, ![A454457_1_En_14_Figa_HTML.gif](OEBPS/Images/A454457_1_En_14_Figa_HTML.gif)


    To start off, create a bunch of new bundle files in `main/java/resources` folder
    of the project. The `main/java/resources` folder of a Maven WAR project is intended
    for non-class files which are supposed to end up in the `/WEB-INF/classes` folder
    of the final build. The bundle files can be in `java.util.Properties` format,
    with the `.properties` extension.


    The filename of those files must have a common prefix (e.g., “text”), followed
    by an underscore and the two-letter ISO 639-1-Alpha-2[¹](#A454457_1_En_14_Chapter.xhtml#Fn1)
    language code (e.g., “en” for English, “pt” for Portuguese, and “hi” for Hindi).
    It can optionally be followed by another underscore and the two-letter ISO 3166-1-Alpha-2[²](#A454457_1_En_14_Chapter.xhtml#Fn2)
    country code (e.g., “GB” for Great Britain, “US” for United States, “BR” for Brazil,
    “PT” for Portugal).


    ```

    main/java/resources/com/example/project/i18n/text.properties

    title = Localization example

    heading = Hello World

    paragraph = Welcome to my website!

    main/java/resources/com/example/project/i18n/text_pt_BR.properties

    title = Exemplo de localização

    heading = Olá mundo

    paragraph = Bem-vindo ao meu site!

    main/java/resources/com/example/project/i18n/text_hi.properties

    ```


    ![A454457_1_En_14_Figb_HTML.gif](OEBPS/Images/A454457_1_En_14_Figb_HTML.gif)


    Do note that all those bundle files have common keys “title”, “heading”, and “paragraph”,
    which are usually in English. It’s basically the lingua franca of the Internet
    and web developers. It’s considered the best practice to keep the source code
    entirely in English, particularly if it is open source.


    Also note that the English bundle file doesn’t have the “en” language code in
    the filename as in `text_en.properties` but is just `text.properties`. Basically,
    it has become the fallback bundle file which is supposed to contain every single
    bundle key used in the entire web application. This way, when a bundle file with
    a specific language code doesn’t contain the desired bundle entry, then the value
    will be looked up from the fallback bundle file. This is useful for situations
    wherein you’d like to gradually upgrade the bundle files, or when you have certain
    sections in the web application which don’t necessarily need to be localized,
    such as back-end admin pages.


    ## Configuration


    In order to familiarize the JSF application with those bundle files and the desired
    locales, we need to edit its `faces-config.xml` file to add the following entries
    to the `<application>` element:


    ```

    <application>

        <locale-config>

            <default-locale>en</default-locale>

            <supported-locale>pt_BR</supported-locale>

            <supported-locale>hi</supported-locale>

        </locale-config>

        <resource-bundle>

            <base-name>com.example.project.i18n.text</base-name>

            <var>text</var>

        </resource-bundle>

    </application>

    ```


    The `<base-name>` must specify the fully qualified name (FQN) following the same
    convention as for Java classes and that it doesn’t include the file extension.
    The `<var>` basically declares the EL (Expression Language) variable name of the
    bundle file. This will make the currently loaded resource bundle available as
    a Map-like object in EL via `#{text}`. To avoid conflicts, you only need to make
    sure that this name isn’t already possessed by any managed bean or any implicit
    EL objects.'
  raw: '# 14. Localization


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    JSF has always had decent internationalization support. Since JSF 1.0 you can
    supply java.util.ResourceBundle-based bundle files in different locales, which
    in turn get dynamically included as text in the web page at the declared places.
    Also, all JSF converters and validators have their own set of localized default
    messages which you can easily customize via a message bundle or, since JSF 1.2,
    via new requiredMessage, converterMessage, and validatorMessage attributes. JSF
    2.0 adds, via the new javax.faces.application.ResourceHandler, API (application
    programing interface) support for localizable assets such as stylesheets, scripts,
    and images.


    The act of internationalization, “I18N,” is distinct from the act of localization,
    “L10N.” The internationalization part is basically already done by JSF (JavaServer
    Faces) itself as being a MVC (model-view-controller) framework. All you need to
    do is to take care of the localization part. Basically, you need to specify the
    “active locale” in the view, supply the desired resource bundle files, if necessary
    translated with help of a third-party translation service, and declare references
    to the bundle file in your JSF page.


    In this chapter you will learn how to prepare a JSF web application for different
    languages and how to develop it in order to make localization easier for yourself
    as to maintenance.


    ## Hello World, Olá mundo, ![A454457_1_En_14_Figa_HTML.gif](OEBPS/Images/A454457_1_En_14_Figa_HTML.gif)


    To start off, create a bunch of new bundle files in main/java/resources folder
    of the project. The main/java/resources folder of a Maven WAR project is intended
    for non-class files which are supposed to end up in the /WEB-INF/classes folder
    of the final build. The bundle files can be in java.util.Properties format, with
    the .properties extension.


    The filename of those files must have a common prefix (e.g., “text”), followed
    by an underscore and the two-letter ISO 639-1-Alpha-2[¹](#A454457_1_En_14_Chapter.xhtml#Fn1)
    language code (e.g., “en” for English, “pt” for Portuguese, and “hi” for Hindi).
    It can optionally be followed by another underscore and the two-letter ISO 3166-1-Alpha-2[²](#A454457_1_En_14_Chapter.xhtml#Fn2)
    country code (e.g., “GB” for Great Britain, “US” for United States, “BR” for Brazil,
    “PT” for Portugal).


    ```

    main/java/resources/com/example/project/i18n/text.properties

    title = Localization example

    heading = Hello World

    paragraph = Welcome to my website!

    main/java/resources/com/example/project/i18n/text_pt_BR.properties

    title = Exemplo de localização

    heading = Olá mundo

    paragraph = Bem-vindo ao meu site!

    main/java/resources/com/example/project/i18n/text_hi.properties

    ```


    ![A454457_1_En_14_Figb_HTML.gif](OEBPS/Images/A454457_1_En_14_Figb_HTML.gif)


    Do note that all those bundle files have common keys “title”, “heading”, and “paragraph”,
    which are usually in English. It’s basically the lingua franca of the Internet
    and web developers. It’s considered the best practice to keep the source code
    entirely in English, particularly if it is open source.


    Also note that the English bundle file doesn’t have the “en” language code in
    the filename as in text_en.properties but is just text.properties. Basically,
    it has become the fallback bundle file which is supposed to contain every single
    bundle key used in the entire web application. This way, when a bundle file with
    a specific language code doesn’t contain the desired bundle entry, then the value
    will be looked up from the fallback bundle file. This is useful for situations
    wherein you’d like to gradually upgrade the bundle files, or when you have certain
    sections in the web application which don’t necessarily need to be localized,
    such as back-end admin pages.


    ## Configuration


    In order to familiarize the JSF application with those bundle files and the desired
    locales, we need to edit its faces-config. xml file to add the following entries
    to the <application> element:


    ```

    <application>

        <locale-config>

            <default-locale>en</default-locale>

            <supported-locale>pt_BR</supported-locale>

            <supported-locale>hi</supported-locale>

        </locale-config>

        <resource-bundle>

            <base-name>com.example.project.i18n.text</base-name>

            <var>text</var>

        </resource-bundle>

    </application>

    ```


    The <base-name> must specify the fully qualified name (FQN) following the same
    convention as for Java classes and that it doesn’t include the file extension.
    The <var> basically declares the EL (Expression Language) variable name of the
    bundle file. This will make the currently loaded resource bundle available as
    a Map-like object in EL via #{text}. To avoid conflicts, you only need to make
    sure that this name isn’t already possessed by any managed bean or any implicit
    EL objects.'
  trans: '

    # 14. 本地化


    Bauke Scholtz¹ 与 Arjan Tijms²


    (1) 库拉索岛威廉斯塔德


    (2) 荷兰北荷兰省阿姆斯特丹


    JSF 一直拥有不错的国际化支持。自 JSF 1.0 起，你就可以提供基于 `java.util.ResourceBundle` 的、针对不同区域设置的资源包文件，这些文件会在声明的页面位置被动态地作为文本包含到网页中。此外，所有
    JSF 转换器和验证器都拥有自己的一套本地化默认消息，你可以通过消息包轻松自定义这些消息，或者从 JSF 1.2 开始，通过新的 `requiredMessage`、`converterMessage`
    和 `validatorMessage` 属性进行自定义。JSF 2.0 通过新的 `javax.faces.application.ResourceHandler`
    API（应用程序编程接口）增加了对可本地化资源（如样式表、脚本和图片）的支持。


    国际化（“I18N”）行为与本地化（“L10N”）行为是不同的。国际化部分基本上已由 JSF（JavaServer Faces）自身作为一个 MVC（模型-视图-控制器）框架完成。你所需做的就是处理本地化部分。基本上，你需要在视图中指定“活动区域设置”，提供所需的资源包文件（如有必要，可借助第三方翻译服务进行翻译），并在你的
    JSF 页面中声明对资源包文件的引用。


    在本章中，你将学习如何为不同语言准备一个 JSF Web 应用程序，以及如何开发它，以便于你自身在维护时进行本地化。


    ## Hello World, Olá mundo, ![A454457_1_En_14_Figa_HTML.gif](img/A454457_1_En_14_Figa_HTML.gif)


    首先，在项目的 `main/java/resources` 文件夹中创建一组新的资源包文件。Maven WAR 项目的 `main/java/resources`
    文件夹用于存放非类文件，这些文件最终会位于最终构建的 `/WEB-INF/classes` 文件夹中。资源包文件可以采用 `java.util.Properties`
    格式，扩展名为 `.properties`。


    这些文件的文件名必须有一个公共前缀（例如，“text”），后跟一个下划线和两个字母的 ISO 639-1-Alpha-2¹ 语言代码（例如，“en”代表英语，“pt”代表葡萄牙语，“hi”代表印地语）。它还可以选择性地再跟一个下划线和两个字母的
    ISO 3166-1-Alpha-2² 国家代码（例如，“GB”代表英国，“US”代表美国，“BR”代表巴西，“PT”代表葡萄牙）。


    ```

    main/java/resources/com/example/project/i18n/text.properties

    title = 本地化示例

    heading = Hello World

    paragraph = 欢迎来到我的网站！

    main/java/resources/com/example/project/i18n/text_pt_BR.properties

    title = Exemplo de localização

    heading = Olá mundo

    paragraph = Bem-vindo ao meu site!

    main/java/resources/com/example/project/i18n/text_hi.properties

    ```


    ![A454457_1_En_14_Figb_HTML.gif](img/A454457_1_En_14_Figb_HTML.gif)


    请注意，所有这些资源包文件都有共同的键“title”、“heading”和“paragraph”，这些键通常使用英语。它基本上是互联网和 Web 开发者的通用语言。最佳实践是将源代码完全保留为英文，特别是如果它是开源的。


    还要注意，英文资源包文件的文件名中没有像 `text_en.properties` 那样的“en”语言代码，而只是 `text.properties`。基本上，它已成为后备资源包文件，应包含整个
    Web 应用程序中使用的每一个资源包键。这样，当特定语言代码的资源包文件不包含所需的资源包条目时，将从后备资源包文件中查找该值。这对于你希望逐步升级资源包文件，或者
    Web 应用程序中有某些部分（例如后端管理页面）不一定需要本地化的情况非常有用。


    ## 配置


    为了让 JSF 应用程序识别这些资源包文件和所需的区域设置，我们需要编辑其 `faces-config.xml` 文件，在 `<application>`
    元素中添加以下条目：


    ```

    <application>

        <locale-config>

            <default-locale>en</default-locale>

            <supported-locale>pt_BR</supported-locale>

            <supported-locale>hi</supported-locale>

        </locale-config>

        <resource-bundle>

            <base-name>com.example.project.i18n.text</base-name>

            <var>text</var>

        </resource-bundle>

    </application>

    ```


    `<base-name>` 必须指定完全限定名称（FQN），遵循与 Java 类相同的约定，并且不包含文件扩展名。`<var>` 基本上声明了资源包文件的
    EL（表达式语言）变量名。这将使当前加载的资源包在 EL 中通过 `#{text}` 作为一个类似 Map 的对象可用。为避免冲突，你只需确保此名称尚未被任何受管
    Bean 或任何隐式 EL 对象占用。

