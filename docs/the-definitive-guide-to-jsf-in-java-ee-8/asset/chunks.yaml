- fmt: "# Composite Components\n\nSometimes, you would like to have a group of related\
    \ input components to represent a single model value. A classic example is having\
    \ three `<h:selectOneMenu>` drop-downs representing day, month, and year which\
    \ are ultimately bound to a single `java.time.LocalDate` property in the backing\
    \ bean. This is not trivial to implement with just an include file or a tag file.\
    \ You would need some additional Java-based logic which makes sure that, e.g.,\
    \ the day drop-down doesn’t show the values 29, 30, or 31 depending on the currently\
    \ selected month, and that it converts the submitted values to a full-fledged\
    \ `LocalDate` instance, and vice versa. But you can’t and shouldn’t put any Java\
    \ code in any Facelet.\n\nYou’ll perhaps think of just creating a dedicated backing\
    \ bean for this case. But this is not sufficient either. It doesn’t allow you\
    \ to cleanly hook on the component’s life cycle through the JSF phases: collecting\
    \ the individual submitted values from multiple components, converting them into\
    \ a single `LocalDate` instance, if necessary throwing a converter exception during\
    \ the validations phase, and letting the JSF life cycle automatically skip the\
    \ remaining phases. A backing bean’s setter method or action method is far from\
    \ the right place for that logic. It would be invoked too late anyway. And, it\
    \ would feel strange to be able to reference and potentially manipulate the very\
    \ same backing bean via an EL expression on an arbitrary place in the Facelet.\n\
    \nThis is exactly where composite components come into the picture: composing\
    \ a bunch of existing JSF components into virtually a single component tied to\
    \ a single model value and ultimately using it exactly the same way as you would\
    \ be using a plain `<h:inputText>`. Imagine a `<t:inputLocalTime>` composite component\
    \ composed of two `<h:selectOneMenu>` components tied to a single `java.time.LocalTime`\
    \ model value. Instead of a backing bean, you can use a full-fledged `UIComponent`\
    \ instance as a so-called backing component.\n\nFirst create a dedicated subfolder\
    \ in `main/webapp/resources` folder (and thus not `main/java/resources`!), for\
    \ example, `main/webapp/resources/components`. There you can put Facelets files\
    \ representing composite components. The subfolder is then to be used in the XML\
    \ namespace URI after `http://xmlns.jcp.org/jsf/composite` as shown next.\n\n\
    ```\nxmlns:t=\"http://xmlns.jcp.org/jsf/composite/components\"\n```\n\nNote that\
    \ the XML namespace prefix of `t` clashes with one which we already defined before\
    \ for tag files. This is of course not the intent. You may choose a different\
    \ XML namespace for composite components. It’s, however, also possible to let\
    \ them share the same custom XML namespace URI `http://example.com.tags`. This\
    \ can be achieved by adding a `<composite-library-name>` to the `*.taglib.xml`\
    \ which in turn must represent the name of the dedicated subfolder.\n\n```\n<composite-library-name>components</composite-library-name>\n\
    ```\n\nThis way all composite components are also available by the same XML namespace\
    \ as tag files.\n\n```\n<... xmlns:t=\"http://example.com/tags\">\n...\n<t:inputLocalTime\
    \ ... />\n```\n\nThe file name of the Facelets file representing the composite\
    \ component will become the tag name. So, in order to have a `<t:inputLocalTime>`,\
    \ we need an `inputLocalTime.xhtml` file in the `main/webapp/resources/components`\
    \ folder. Following is a kickoff example of what it can look like:\n\n```\n<ui:component\n\
    \    xmlns=\"http://www.w3.org/1999/xhtml\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n    xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\n>\n    <cc:interface componentType=\"\
    inputLocalTime\">\n        <cc:attribute name=\"value\" type=\"java.time.LocalTime\"\
    \n            shortDescription=\"Selected time. Defaults to 00:00.\">\n      \
    \  </cc:attribute>\n        <cc:attribute name=\"required\" type=\"boolean\"\n\
    \            shortDescription=\"Required state. Defaults to false.\">\n      \
    \  </cc:attribute>\n    </cc:interface>\n    <cc:implementation>\n        <span\
    \ id=\"#{cc.clientId}\" class=\"inputLocalTime\">\n            <h:selectOneMenu\
    \ id=\"hour\" binding=\"#{cc.hour}\"\n                required=\"#{cc.attrs.required}\"\
    >\n                <f:selectItem itemValue=\"#{null}\" />\n                <f:selectItems\
    \ value=\"#{cc.hours}\" />\n            </h:selectOneMenu>\n            :\n  \
    \          <h:selectOneMenu id=\"minute\" binding=\"#{cc.minute}\"\n         \
    \       required=\"#{cc.attrs.required}\">\n                <f:selectItem itemValue=\"\
    #{null}\" />\n                <f:selectItems value=\"#{cc.minutes}\" />\n    \
    \        </h:selectOneMenu>\n        </span>\n    </cc:implementation>\n</ui:component>\n\
    ```\n\nThere are several things to notice here which makes a composite component\
    \ different from a tag file. First, the composite component’s body is always divided\
    \ into two sections: an interface and an implementation.\n\nThe interface declares\
    \ a `componentType` attribute which should reference the value of either the `@FacesComponent`\
    \ annotation on a `UIComponent` subclass or the `<component-type>` entry of a\
    \ `<component>` as declared in either `faces-config.xml` or `*taglib.xml`. When\
    \ the `componentType` attribute is absent, it defaults to `UINamingContainer`.\
    \ The interface also declares the supported attributes. To keep it simple, we\
    \ restrict to only two: `value` and `required`. There are also implicitly inherited\
    \ attributes from the `UIComponent` superclass, which we don’t need to explicitly\
    \ define as `<cc:attribute>`: `id`, `binding`, and `rendered`. That makes it a\
    \ total of five attributes which you can use in the implementation.\n\nThe implementation\
    \ defines the actual markup of the composite component. There you can find the\
    \ two `<h:selectOneMenu>` drop-downs wrapped in a `<span>` element. There you\
    \ can also find several occurrences of the special EL variable `#{cc}` which refers\
    \ to the current `UIComponent` instance behind the composite component, which\
    \ is thus one of the type as declared in the `componentType` attribute, or, if\
    \ absent, a `UINamingContainer`. `#{cc.attrs}` is a shortcut to the component\
    \ attribute map as available by `UIComponent#getAttributes()`. `#{cc.attrs.required}`\
    \ as used in `<t:inputLocalTime>` thus refers to `<cc:attribute name=\"required\"\
    >`.\n\n`#{cc.clientId}` in the `<span>` element just prints the composite component’s\
    \ client ID as the `id` attribute of `<span>`. This is actually a trick in order\
    \ to be able to reference the “whole” composite component using a client ID search\
    \ expression from the template client on. Imagine the following case:\n\n```\n\
    <h:inputText ...>\n    <f:ajax render=\"time\" />\n</h:inputText>\n<t:inputLocalTime\
    \ id=\"time\" ... />\n```\n\nThis case wouldn’t have worked without the `#{cc.clientId}`\
    \ being rendered as an ID of any plain HTML element which wraps the entire body\
    \ of `<cc:implementation>`, usually a `<span>` or `<div>`. The technical problem\
    \ is, while the composite component itself is findable in the JSF component tree\
    \ by the component ID search expression, the HTML representation of the composite\
    \ component is by default not available by `document.getElementById(clientId)`\
    \ in JavaScript. In other words, JSF Ajax wouldn’t be able to update it. Explicitly\
    \ adding a plain HTML element with the composite component’s client ID thus solves\
    \ that."
  raw: '## Composite Components


    Sometimes, you would like to have a group of related input components to represent
    a single model value. A classic example is having three <h:selectOneMenu> drop-downs
    representing day, month, and year which are ultimately bound to a single java.time.LocalDate
    property in the backing bean. This is not trivial to implement with just an include
    file or a tag file. You would need some additional Java-based logic which makes
    sure that, e.g., the day drop-down doesn’t show the values 29, 30, or 31 depending
    on the currently selected month, and that it converts the submitted values to
    a full-fledged LocalDate instance, and vice versa. But you can’t and shouldn’t
    put any Java code in any Facelet.


    You’ll perhaps think of just creating a dedicated backing bean for this case.
    But this is not sufficient either. It doesn’t allow you to cleanly hook on the
    component’s life cycle through the JSF phases: collecting the individual submitted
    values from multiple components, converting them into a single LocalDate instance,
    if necessary throwing a converter exception during the validations phase, and
    letting the JSF life cycle automatically skip the remaining phases. A backing
    bean’s setter method or action method is far from the right place for that logic.
    It would be invoked too late anyway. And, it would feel strange to be able to
    reference and potentially manipulate the very same backing bean via an EL expression
    on an arbitrary place in the Facelet.


    This is exactly where composite components come into the picture: composing a
    bunch of existing JSF components into virtually a single component tied to a single
    model value and ultimately using it exactly the same way as you would be using
    a plain <h:inputText>. Imagine a <t:inputLocalTime> composite component composed
    of two <h:selectOneMenu> components tied to a single java.time.LocalTime model
    value. Instead of a backing bean, you can use a full-fledged UIComponent instance
    as a so-called backing component.


    First create a dedicated subfolder in main/webapp/resources folder (and thus not
    main/java/resources!), for example, main/webapp/resources/components. There you
    can put Facelets files representing composite components. The subfolder is then
    to be used in the XML namespace URI after [http://xmlns.jcp.org/jsf/composite](http://xmlns.jcp.org/jsf/composite)
    as shown next.


    ```

    xmlns:t="http://xmlns.jcp.org/jsf/composite/components"

    ```


    Note that the XML namespace prefix of “t” clashes with one which we already defined
    before for tag files. This is of course not the intent. You may choose a different
    XML namespace for composite components. It’s, however, also possible to let them
    share the same custom XML namespace URI [http://example.com.tags](http://example.com.tags)
    . This can be achieved by adding a <composite-library-name> to the *.taglib.xml
    which in turn must represent the name of the dedicated subfolder.


    ```

    <composite-library-name>components</composite-library-name>

    ```


    This way all composite components are also available by the same XML namespace
    as tag files.


    ```

    <... xmlns:t="http://example.com/tags">

    ...

    <t:inputLocalTime ... />

    ```


    The file name of the Facelets file representing the composite component will become
    the tag name. So, in order to have a <t:inputLocalTime>, we need an inputLocalTime.xhtml
    file in the main/webapp/resources/components folder. Following is a kickoff example
    of what it can look like:


    ```

    <ui:component

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

        xmlns:cc="http://xmlns.jcp.org/jsf/composite"

    >

        <cc:interface componentType="inputLocalTime">

            <cc:attribute name="value" type="java.time.LocalTime"

                shortDescription="Selected time. Defaults to 00:00.">

            </cc:attribute>

            <cc:attribute name="required" type="boolean"

                shortDescription="Required state. Defaults to false.">

            </cc:attribute>

        </cc:interface>

        <cc:implementation>

            <span id="#{cc.clientId}" class="inputLocalTime">

                <h:selectOneMenu id="hour" binding="#{cc.hour}"

                    required="#{cc.attrs.required}">

                    <f:selectItem itemValue="#{null}" />

                    <f:selectItems value="#{cc.hours}" />

                </h:selectOneMenu>

                :

                <h:selectOneMenu id="minute" binding="#{cc.minute}"

                    required="#{cc.attrs.required}">

                    <f:selectItem itemValue="#{null}" />

                    <f:selectItems value="#{cc.minutes}" />

                </h:selectOneMenu>

            </span>

        </cc:implementation>

    </ui:component>

    ```


    There are several things to notice here which makes a composite component different
    from a tag file. First, the composite component’s body is always divided into
    two sections: an interface and an implementation.


    The interface declares a componentType attribute which should reference the value
    of either the @FacesComponent annotation on a UIComponent subclass or the <component-type>
    entry of a <component> as declared in either faces-config.xml or *taglib.xml.
    When the componentType attribute is absent, it defaults to UINamingContainer.
    The interface also declares the supported attributes. To keep it simple, we restrict
    to only two: value and required. There are also implicitly inherited attributes
    from the UIComponent superclass, which we don’t need to explicitly define as <cc:attribute>:
    id, binding, and rendered. That makes it a total of five attributes which you
    can use in the implementation.


    The implementation defines the actual markup of the composite component. There
    you can find the two <h:selectOneMenu> drop-downs wrapped in a <span> element.
    There you can also find several occurrences of the special EL variable #{cc} which
    refers to the current UIComponent instance behind the composite component, which
    is thus one of the type as declared in the componentType attribute, or, if absent,
    a UINamingContainer. #{cc.attrs} is a shortcut to the component attribute map
    as available by UIComponent#getAttributes(). #{cc.attrs.required} as used in <t:inputLocalTime>
    thus refers to <cc:attribute name="required">.


    #{cc.clientId} in the <span> element just prints the composite component’s client
    ID as the id attribute of <span>. This is actually a trick in order to be able
    to reference the “whole” composite component using a client ID search expression
    from the template client on. Imagine the following case:


    ```

    <h:inputText ...>

        <f:ajax render="time" />

    </h:inputText>

    <t:inputLocalTime id="time" ... />

    ```


    This case wouldn’t have worked without the #{cc.clientId} being rendered as an
    ID of any plain HTML element which wraps the entire body of <cc:implementation>,
    usually a <span> or <div>. The technical problem is, while the composite component
    itself is findable in the JSF component tree by the component ID search expression,
    the HTML representation of the composite component is by default not available
    by document.getElementById(clientId) in JavaScript. In other words, JSF Ajax wouldn’t
    be able to update it. Explicitly adding a plain HTML element with the composite
    component’s client ID thus solves that.'
  trans: '

    ## 复合组件


    有时，您希望将一组相关的输入组件组合起来，以表示单个模型值。一个经典的例子是使用三个 `<h:selectOneMenu>` 下拉菜单分别表示日、月、年，并最终绑定到后台
    Bean 中的一个 `java.time.LocalDate` 属性。仅使用包含文件或标签文件来实现这一点并不简单。您需要一些额外的基于 Java 的逻辑，例如，确保日期的下拉菜单不会根据当前选择的月份显示
    29、30 或 31 这些值，并且能够将提交的值转换为一个完整的 `LocalDate` 实例，反之亦然。但是，您不能也不应该在任何 Facelet 中放入
    Java 代码。


    您可能会想到为此创建一个专用的后台 Bean。但这也不够。它无法让您通过 JSF 生命周期干净地挂接到组件的生命周期：从多个组件收集各个提交的值，将它们转换为单个
    `LocalDate` 实例，必要时在验证阶段抛出转换器异常，并让 JSF 生命周期自动跳过剩余阶段。后台 Bean 的 setter 方法或 action
    方法远非放置该逻辑的正确位置。无论如何，它被调用时都太晚了。而且，能够通过 Facelet 中任意位置的 EL 表达式引用并可能操作同一个后台 Bean，会让人感觉很奇怪。


    这正是复合组件发挥作用的地方：将一堆现有的 JSF 组件组合成一个虚拟的单个组件，该组件绑定到单个模型值，并且最终使用方式与使用普通的 `<h:inputText>`
    完全相同。想象一个 `<t:inputLocalTime>` 复合组件，它由两个 `<h:selectOneMenu>` 组件组成，并绑定到单个 `java.time.LocalTime`
    模型值。您可以使用一个完整的 `UIComponent` 实例作为所谓的后台组件，而不是使用后台 Bean。


    首先，在 `main/webapp/resources` 文件夹（注意不是 `main/java/resources`！）中创建一个专用子文件夹，例如 `main/webapp/resources/components`。您可以在其中放置代表复合组件的
    Facelets 文件。然后，该子文件夹将在 XML 命名空间 URI 中，位于 `http://xmlns.jcp.org/jsf/composite`
    之后使用，如下所示。


    ```

    xmlns:t="http://xmlns.jcp.org/jsf/composite/components"

    ```


    请注意，XML 命名空间前缀 "t" 与我们之前为标签文件定义的那个冲突了。这当然不是本意。您可以为复合组件选择不同的 XML 命名空间。然而，也可以让它们共享同一个自定义
    XML 命名空间 URI `http://example.com.tags`。这可以通过在 `*.taglib.xml` 中添加一个 `<composite-library-name>`
    来实现，该名称必须代表专用子文件夹的名称。


    ```

    <composite-library-name>components</composite-library-name>

    ```


    这样，所有复合组件也可以通过与标签文件相同的 XML 命名空间来使用。


    ```

    <... xmlns:t="http://example.com/tags">

    ...

    <t:inputLocalTime ... />

    ```


    代表复合组件的 Facelets 文件的文件名将成为标签名称。因此，为了拥有一个 `<t:inputLocalTime>`，我们需要在 `main/webapp/resources/components`
    文件夹中有一个 `inputLocalTime.xhtml` 文件。以下是一个入门示例，展示了它可能的样子：


    ```

    <ui:component

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

        xmlns:cc="http://xmlns.jcp.org/jsf/composite"

    >

        <cc:interface componentType="inputLocalTime">

            <cc:attribute name="value" type="java.time.LocalTime"

                shortDescription="选定的时间。默认为 00:00。">

            </cc:attribute>

            <cc:attribute name="required" type="boolean"

                shortDescription="必填状态。默认为 false。">

            </cc:attribute>

        </cc:interface>

        <cc:implementation>

            <span id="#{cc.clientId}" class="inputLocalTime">

                <h:selectOneMenu id="hour" binding="#{cc.hour}"

                    required="#{cc.attrs.required}">

                    <f:selectItem itemValue="#{null}" />

                    <f:selectItems value="#{cc.hours}" />

                </h:selectOneMenu>

                :

                <h:selectOneMenu id="minute" binding="#{cc.minute}"

                    required="#{cc.attrs.required}">

                    <f:selectItem itemValue="#{null}" />

                    <f:selectItems value="#{cc.minutes}" />

                </h:selectOneMenu>

            </span>

        </cc:implementation>

    </ui:component>

    ```


    这里有几件事需要注意，这使得复合组件与标签文件不同。首先，复合组件的主体始终分为两部分：接口和实现。


    接口声明了一个 `componentType` 属性，该属性应引用 `UIComponent` 子类上的 `@FacesComponent` 注解的值，或者在
    `faces-config.xml` 或 `*taglib.xml` 中声明的 `<component>` 的 `<component-type>` 条目。当
    `componentType` 属性不存在时，它默认为 `UINamingContainer`。接口还声明了支持的属性。为简单起见，我们只限制为两个：`value`
    和 `required`。还有一些从 `UIComponent` 超类隐式继承的属性，我们不需要显式地将其定义为 `<cc:attribute>`：`id`、`binding`
    和 `rendered`。这使得总共五个属性可以在实现中使用。


    实现定义了复合组件的实际标记。在这里，您可以看到两个 `<h:selectOneMenu>` 下拉菜单包裹在一个 `<span>` 元素中。在这里，您还可以看到特殊
    EL 变量 `#{cc}` 的多次出现，它引用了复合组件背后的当前 `UIComponent` 实例，因此它是 `componentType` 属性中声明的类型之一，或者，如果不存在，则是
    `UINamingContainer`。`#{cc.attrs}` 是组件属性映射的快捷方式，可通过 `UIComponent#getAttributes()`
    获得。因此，在 `<t:inputLocalTime>` 中使用的 `#{cc.attrs.required}` 引用了 `<cc:attribute name="required">`。


    `<span>` 元素中的 `#{cc.clientId}` 只是将复合组件的客户端 ID 打印为 `<span>` 的 `id` 属性。这实际上是一个技巧，以便能够使用来自模板客户端的客户端
    ID 搜索表达式来引用“整个”复合组件。想象以下情况：


    ```

    <h:inputText ...>

        <f:ajax render="time" />

    </h:inputText>

    <t:inputLocalTime id="time" ... />

    ```


    如果没有将 `#{cc.clientId}` 渲染为包裹 `<cc:implementation>` 整个主体的任何普通 HTML 元素（通常是 `<span>`
    或 `<div>`）的 ID，这种情况将无法工作。技术问题是，虽然复合组件本身可以通过组件 ID 搜索表达式在 JSF 组件树中找到，但复合组件的 HTML
    表示默认情况下无法通过 JavaScript 中的 `document.getElementById(clientId)` 获得。换句话说，JSF Ajax
    将无法更新它。因此，显式添加一个带有复合组件客户端 ID 的普通 HTML 元素可以解决这个问题。

