  trans: "\n## 基于面板的输出组件\n\n这些组件是 `<h:panelGroup>` 和 `<h:panelGrid>`，它们都继承自 `UIPanel`\
    \ 超类。`<h:panelGroup>` 具有多种职责。根据 `layout` 属性以及它是否被包含在 `<h:panelGrid>` 中，它可以生成一个\
    \ HTML `<span>`、`<div>` 甚至 `<td>` 元素。\n\n默认情况下，`<h:panelGroup>` 仅生成一个 HTML `<span>`\
    \ 元素，就像 `<h:outputText>` 一样。主要区别在于 `<h:panelGroup>` 没有 `value` 属性。相反，其内容由其子元素表示。它也不支持禁用\
    \ HTML 转义或附加转换器。这取决于任何 `<h:outputText>` 子元素。在这种上下文中，它并不是特别有用。当你需要使用 `<f:ajax render>`\
    \ 引用一个内联元素，而该元素又用于组合一组紧密相关的内联元素时，`<h:panelGroup>` 才比 `<h:outputText>` 更有用。类似下面的代码表示“用户资料”，它应该可以在某个用户资料编辑页面中通过\
    \ Ajax 更新。\n\n```\n<p>\n    欢迎，\n    <h:panelGroup id=\"userProfile\">\n        <img\
    \ src=\"#{user.imageUrl}\" />\n        #{user.name}\n    </h:panelGroup>\n</p>\n\
    ...\n<h:form>\n    ...\n    <f:ajax ... render=\":userProfile\" />\n    ...\n\
    </h:form>\n```\n\n当将 `<h:panelGroup>` 的 `layout` 属性设置为 `block` 时，它将生成一个 HTML `<div>`\
    \ 元素。在标准 HTML 中，“内联元素”⁵ 默认不会在新行开始，也不允许包含块级子元素。而“块级元素”⁶ 默认总是在新行开始，并且允许包含内联和块级元素作为子元素。因此，`<h:panelGroup>`\
    \ 的 `layout` 属性支持的值是 `\"inline\"` 和 `\"block\"`。从历史上看，`layout` 属性是在 JSF 1.2 中才添加的，原因是\
    \ JSF 开发者抱怨缺少一个用于表示 HTML `<div>` 元素的 JSF 组件。（另请参见第 7 章。）这可用于包装需要 Ajax 更新的较大区域；否则，一个普通的\
    \ HTML `<div>` 也足够了。\n\n```\n<h:panelGroup layout=\"block\" id=\"userProfile\"\
    >\n    <p>\n        欢迎，\n        <img src=\"#{user.imageUrl}\" />\n        #{user.name}\n\
        </p>\n</h:panelGroup>\n```\n\n请注意，在 HTML 中，将块级元素嵌套在内联元素中是非法的。`<p>` 是一个块级元素，因此在上述结构中\
    \ `layout=\"block\"` 是绝对必需的。如果你不指定此属性，从而让 JSF 渲染一个 HTML `<span>` 元素，那么 Web 浏览器的行为将是未指定的。一般的\
    \ Web 浏览器会将块级子元素渲染到内联元素之外，甚至可能在使用 JavaScript 操作此结构时出错，例如在 JSF Ajax 更新操作期间。\n\n\
    还要记住，在上述结构中，`<p>` 标签和“欢迎”文本也会在对 `<h:panelGroup>` 的任何 JSF Ajax 更新操作期间被更新。这本质上是对服务器端和客户端硬件资源的浪费，因为它们是静态的，永远不会发生变化。在进行\
    \ Ajax 更新时，你最好确保 `<f:ajax render>` 只引用那些绝对需要 Ajax 更新的组件，而不是一个不必要的大区域。\n\n当 `<h:panelGroup>`\
    \ 被嵌套在生成 HTML `<table>` 元素的 `<h:panelGrid>` 组件中时，`<h:panelGroup>` 的 `layout` 属性将被忽略，该组件将基本上充当一个组件容器，这些组件最终应位于表格的同一个单元格中。也就是说，`<h:panelGrid>`\
    \ 的渲染器将每个直接子组件视为一个单独的表格单元格。\n\n给定以下两列的 `<h:panelGrid>`，它应该生成一个两列的 HTML 表格，你猜实际生成的\
    \ HTML 输出应该是什么样子？\n\n```\n<h:panelGrid columns=\"2\">\n    one\n    <h:outputText\
    \ value=\"two\" />\n    three\n    four\n    <h:panelGroup>five</h:panelGroup>\n\
        six\n    seven\n    <h:panelGroup>\n        eight\n        nine\n    </h:panelGroup>\n\
    </h:panelGrid>\n```\n\n###### 提示\n\n两个 JSF 组件之间的每段模板文本在内部都被视为一个单独的 JSF 组件。在 Mojarra\
    \ 中，它由内部的 `UIInstructions` 组件表示。实际的组件树层次结构大致如下所示。\n\n```\n<h:panelGrid columns=\"\
    2\">\n    <ui:instructions>one</ui:instructions>\n    <h:outputText value=\"two\"\
    \ />\n    <ui:instructions>                                                  \
    \                                      \n        three\n        four\n    </ui:instructions>\n\
        <h:panelGroup>five</h:panelGroup>\n    <ui:instructions>\n        six\n        seven\n\
        </ui:instructions>\n    <h:panelGroup>\n        eight\n        nine\n    </h:panelGroup>\n\
    </h:panelGrid>\n```\n\n再次注意，Facelets 中不存在 `<ui:instructions>` 这样的组件。上面的标记纯粹是为了可视化，以便你的大脑能更好地处理它。这个\
    \ `<h:panelGrid>` 实际上有六个直接子元素，每个子元素最终都会位于自己的表格单元格中。由于有两列，这实际上将生成三行。以下是实际生成的 HTML\
    \ 输出（为便于阅读已重新格式化）。\n\n```\n<table>\n    <tbody>\n        <tr>\n            <td>one</td>\n\
                <td>two</td>\n        </tr>\n        <tr>\n            <td>three four</td>\n\
                <td>five</td>\n        </tr>\n        <tr>\n            <td>six seven</td>\n\
                <td>eight nine</td>\n        </tr>\n    </tbody>\n</table>\n```\n\n\
    在 Chrome 浏览器中渲染：\n\n![A454457_1_En_6_Figb_HTML.jpg](img/A454457_1_En_6_Figb_HTML.jpg)\n\
    \n你看，`<h:panelGroup>` 确保了“five”和“eight nine”不会与“six seven”位于同一个表格单元格中。还要注意，如果某个\
    \ JSF 组件已经代表一个单独的单元格，则无需将其包装在 `<h:panelGroup>` 中。因此，“two”后面的 `<h:outputText>`\
    \ 不需要包装在 `<h:panelGroup>` 中。当然，为了更好的源代码可读性，你可以这样做，但技术上并非必要。\n\n如果你碰巧需要基于视图作用域模型拥有动态数量的单元格，那么你可以在\
    \ `<h:panelGrid>` 中嵌套一个 JSTL（JSP 标准标签库）`<c:forEach>`，让它以固定列数的数据网格形式生成这些单元格。\n\n\
    ```\n<h:panelGrid columns=\"3\">\n    <c:forEach items=\"#{viewProducts.products}\"\
    \ var=\"product\">\n        <h:panelGroup>\n            <h3>#{product.name}</h3>\n\
                <p>#{product.description}</p>\n        </h:panelGroup>\n    </c:forEach>\n\
    </h:panelGrid>\n```\n\n因此请注意，与 `<c:forEach>` 相比，`<ui:repeat>` 在此处不合适，如第 3 章“JSTL\
    \ 核心标签”一节所述。它在技术上可以正常工作，但 `<h:panelGrid>` 的渲染器会将其解释为单个表格单元格。\n\n还要注意，模型是视图作用域非常重要，特别是当你在\
    \ `<h:panelGrid>` 内部有 JSF 表单组件时。技术原因是，在处理回发请求期间，JSF 期望迭代索引后面的模型项与页面呈现给最终用户时完全相同。换句话说，当\
    \ JSF 即将处理表单提交时，如果某个项在此期间被添加、删除甚至重新排序，导致迭代索引发生变化，那么提交的值和/或调用的操作可能会针对当前位于最初已知索引处的错误项执行。这对模型的完整性是危险的。如果你在\
    \ `<h:panelGrid>` 内部没有任何 JSF 表单组件，或者模型在视图作用域内不会发生变化（例如，因为它仅在应用程序启动时创建或更新），那么 `#{viewProducts}`\
    \ 背后的支持 bean 可以安全地是请求作用域的。\n"
- fmt: "# Data Iteration Component\n\nYes, there’s only one, `<h:dataTable>`, which\
    \ extends from the `UIData` superclass and generates an HTML `<table>` based on\
    \ an iterable data model whereby each item is represented as a single row. The\
    \ other data iteration component available in JSF, the Facelets `<ui:repeat>`,\
    \ doesn’t extend from the `UIData` superclass and doesn’t emit any HTML output\
    \ and therefore doesn’t technically count as an “output component.” Also, in the\
    \ standard JSF component set no such component generates an HTML `<ul>`, `<ol>`,\
    \ or `<dl>`, but this can relatively easily be created as a custom component extending\
    \ from `UIData`. (See also the section “Creating New Component and Renderer” in\
    \ Chapter [11](#A454457_1_En_11_Chapter.xhtml).)\n\nThe `value` attribute of `UIData`\
    \ supports `java.lang.Iterable`. In other words, you can supply any Java collection\
    \ as a model value. As index-based access is most used in `UIData`, most efficient\
    \ is the `java.util.ArrayList` as it offers O(1) access by index. The renderer\
    \ of the `<h:dataTable>` component supports only `<h:column>` as a direct child\
    \ component. Anything else is ignored. As its name hints, `<h:column>` represents\
    \ a single column. Each iteration round over the `value` of `<h:dataTable>` will\
    \ basically re-render all columns against the currently iterated item. As with\
    \ `<c:forEach>` and `<ui:repeat>`, the currently iterated item is exposed in EL\
    \ scope by the `var` attribute. Following is a basic example which iterates over\
    \ a `List<String>`.\n\n```\n<h:dataTable id=\"strings\" value=\"#{bean.strings}\"\
    \ var=\"string\">\n    <h:column>#{string}</h:column>\n</h:dataTable>\n```\n\n\
    Backing bean class `com.example.project.view.Bean`:\n\n```\n@Named @RequestScoped\n\
    public class Bean {\n\n    private List<String> strings;\n\n    @PostConstruct\n\
    \    public void init() {\n        strings = Arrays.asList(\"one\", \"two\", \"\
    three\");\n    }\n\n    public List<String> getStrings() {\n        return strings;\n\
    \    }\n}\n```\n\nGenerated HTML output:\n\n```\n<table>\n    <tbody>\n      \
    \  <tr><td>one</td></tr>\n        <tr><td>two</td></tr>\n        <tr><td>three</td></tr>\n\
    \    </tbody>\n</table>\n```\n\nRendering in Chrome browser:\n\n![A454457_1_En_6_Figc_HTML.jpg](OEBPS/Images/A454457_1_En_6_Figc_HTML.jpg)\n\
    \nIt is important to note that the variable name as specified by the `var` attribute\
    \ shouldn’t clash with existing managed bean names or even with implicit EL objects.\
    \ Implicit EL objects have higher precedence in EL resolving. One example of an\
    \ implicit EL object is `#{header}` which refers to `ExternalContext#getRequestHeaderMap()`.[⁷](#A454457_1_En_6_Chapter.xhtml#Fn7)\
    \ So when you happen to have `#{bean.headers}` and you’d like to present it in\
    \ an iterating component, then you can’t use `var=\"header\"` and you’d better\
    \ think of a different name, such as `var=\"head\"`.\n\nFollowing is a more elaborate\
    \ example which shows a list of products. A similar table was shown earlier in\
    \ Chapter [5](#A454457_1_En_5_Chapter.xhtml).\n\n```\n<h:dataTable id=\"products\"\
    \ value=\"#{products.list}\" var=\"product\">\n    <h:column>\n        <f:facet\
    \ name=\"header\">ID</f:facet>\n        #{product.id}\n    </h:column>\n    <h:column>\n\
    \        <f:facet name=\"header\">Name</f:facet>\n        #{product.name}\n  \
    \  </h:column>\n    <h:column>\n        <f:facet name=\"header\">Description</f:facet>\n\
    \        #{product.description}\n    </h:column>\n</h:dataTable>\n```\n\nBacking\
    \ bean class `com.example.project.view.Products`:\n\n```\n@Named @RequestScoped\n\
    public class Products {\n\n    private List<Product> list;\n\n    @Inject\n  \
    \  private ProductService productService;\n\n    @PostConstruct\n    public void\
    \ init() {\n        list = productService.list();\n    }\n\n    public List<Product>\
    \ getList() {\n        return list;\n    }\n}\n```\n\nProduct entity: `com.example.project.model.Product`:\n\
    \n```\n@Entity\npublic class Product {\n\n    @Id @GeneratedValue(strategy=IDENTITY)\n\
    \    private Long id;\n\n    @Column(nullable = false)\n    private @NotNull String\
    \ name;\n\n    @Column(nullable = false)\n    private @NotNull String description;\n\
    \n    // Add/generate getters+setters.\n}\n```\n\nProduct service: `com.example.project.service.ProductService`:\n\
    \n```\n@Stateless\npublic class ProductService {\n\n    @PersistenceContext\n\
    \    private EntityManager entityManager;\n\n    @TransactionAttribute(SUPPORTS)\n\
    \    public List<Product> list() {\n        return entityManager\n           \
    \ .createQuery(\"FROM Product ORDER BY id DESC\", Product.class)\n           \
    \ .getResultList();\n    }\n}\n```\n\nGenerated HTML output:\n\n```\n<table>\n\
    \    <thead>\n        <tr>\n            <th scope=\"col\">ID</th>\n          \
    \  <th scope=\"col\">Name</th>\n            <th scope=\"col\">Description</th>\n\
    \        </tr>\n    </thead>\n    <tbody>\n        <tr>\n            <td>3</td>\n\
    \            <td>Three</td>\n            <td>The third product</td>\n        </tr>\n\
    \        <tr>\n            <td>2</td>\n            <td>Two</td>\n            <td>The\
    \ second product</td>\n        </tr>\n        <tr>\n            <td>1</td>\n \
    \           <td>One</td>\n            <td>The first product</td>\n        </tr>\n\
    \    </tbody>\n</table>\n```\n\nRendering in Chrome browser:\n\n![A454457_1_En_6_Figd_HTML.jpg](OEBPS/Images/A454457_1_En_6_Figd_HTML.jpg)\n\
    \nIt is important to note that the model behind the `value` attribute of `<h:dataTable>`\
    \ must refer a bean property which is already prepared beforehand in a one-time\
    \ life cycle event, such as `@PostConstruct` or `<f:viewAction>`. This doesn’t\
    \ apply specifically to `UIData` components but to basically every JSF component.\
    \ That is, the getter method may be invoked multiple times during the JSF life\
    \ cycle, especially when referenced in the `value` attribute of an iteration component\
    \ or in the `rendered` attribute of any JSF component.\n\nThe technical reason\
    \ is that any EL value expression is, behind the scenes, created as a `javax.el.ValueExpression`\
    \ instance which internally basically just holds the literal EL string such as\
    \ `#{products.list}` and any `ValueExpression#getValue()` call on it would simply\
    \ re-evaluate the expression against the provided EL context. This is normally\
    \ a very cheap operation, done in nanoseconds, but it may slow down drastically\
    \ when the getter method in turn performs a relatively expensive database query\
    \ which may take tens or even hundreds of milliseconds.\n\nIteration components\
    \ may invoke the getter method during every phase of the JSF life cycle when the\
    \ iteration component happens to have form components nested. When you prepare\
    \ the model by obtaining a list from the database in the getter method, this would\
    \ cause the database to be queried on every single getter method call, which is\
    \ plainly inefficient. Moreover, the same problems with regard to resolving the\
    \ iterated item of interest based on the iteration index may occur as described\
    \ in the last paragraph of the previous section about `<h:panelGrid>` with `<c:forEach>`.\n\
    \nAnother thing to note is `<f:facet name=\"header\">`. This generates basically\
    \ `<thead>` with the content in `<th>`. `<h:dataTable>` also supports `<f:facet\
    \ name=\"footer\">` which will then generate the `<tfoot>` with the content in\
    \ `<td>`. You can usually find all supported `<f:facet>` names in the tag documentation,\
    \ as well as in the `<h:dataTable>` tag documentation.[⁸](#A454457_1_En_6_Chapter.xhtml#Fn8)\n\
    \nBasically, you can put anything inside `<h:column>` to represent the cell content.\
    \ Even form components or a nested `<h:dataTable>` or `<ui:repeat>`. Following\
    \ is a small example which shows a fictive `Set<Tag> tags` property of `Product`\
    \ entity in a nested `<ui:repeat>`.\n\n```\n<h:dataTable id=\"products\" value=\"\
    #{products.list}\" var=\"product\">\n    ...\n    <h:column>\n        <ui:repeat\
    \ value=\"#{product.tags}\" var=\"tag\">\n            #{tag.name}<br/>\n     \
    \   </ui:repeat>\n    </h:column>\n</h:dataTable>\n```"
  raw: '## Data Iteration Component


    Yes, there’s only one, <h:dataTable>, which extends from the UIData superclass
    and generates an HTML <table> based on an iterable data model whereby each item
    is represented as a single row. The other data iteration component available in
    JSF, the Facelets <ui:repeat>, doesn’t extend from the UIData superclass and doesn’t
    emit any HTML output and therefore doesn’t technically count as an “output component.”
    Also, in the standard JSF component set no such component generates an HTML <ul>,
    <ol>, or <dl>, but this can relatively easily be created as a custom component
    extending from UIData. (See also the section “Creating New Component and Renderer”
    in Chapter [11](#A454457_1_En_11_Chapter.xhtml).)


    The value attribute of UIData supports java.lang.Iterable. In other words, you
    can supply any Java collection as a model value. As index-based access is most
    used in UIData, most efficient is the java.util.ArrayList as it offers O(1) access
    by index. The renderer of the <h:dataTable> component supports only <h:column>
    as a direct child component. Anything else is ignored. As its name hints, <h:column>
    represents a single column. Each iteration round over the value of <h:dataTable>
    will basically re-render all columns against the currently iterated item. As with
    <c:forEach> and <ui:repeat>, the currently iterated item is exposed in EL scope
    by the var attribute. Following is a basic example which iterates over a List<String>.


    ```

    <h:dataTable id="strings" value="#{bean.strings}" var="string">

        <h:column>#{string}</h:column>

    </h:dataTable>

    ```


    Backing bean class com.example.project.view.Bean:


    ```

    @Named @RequestScoped

    public class Bean {


    private List<String> strings;


    @PostConstruct

        public void init() {

            strings = Arrays.asList("one", "two", "three");

        }


    public List<String> getStrings() {

            return strings;

        }

    }

    ```


    Generated HTML output:


    ```

    <table>

        <tbody>

            <tr><td>one</td></tr>

            <tr><td>two</td></tr>

            <tr><td>three</td></tr>

        </tbody>

    </table>

    ```


    Rendering in Chrome browser:


    ![A454457_1_En_6_Figc_HTML.jpg](OEBPS/Images/A454457_1_En_6_Figc_HTML.jpg)


    It is important to note that the variable name as specified by the var attribute
    shouldn’t clash with existing managed bean names or even with implicit EL objects.
    Implicit EL objects have higher precedence in EL resolving. One example of an
    implicit EL object is #{header} which refers to ExternalContext#getRequestHeaderMap().[⁷](#A454457_1_En_6_Chapter.xhtml#Fn7)
    So when you happen to have #{bean.headers} and you’d like to present it in an
    iterating component, then you can’t use var="header" and you’d better think of
    a different name, such as var="head".


    Following is a more elaborate example which shows a list of products . A similar
    table was shown earlier in Chapter [5](#A454457_1_En_5_Chapter.xhtml).


    ```

    <h:dataTable id="products" value="#{products.list}" var="product">

        <h:column>

            <f:facet name="header">ID</f:facet>

            #{product.id}

        </h:column>

        <h:column>

            <f:facet name="header">Name</f:facet>

            #{product.name}

        </h:column>

        <h:column>

            <f:facet name="header">Description</f:facet>

            #{product.description}

        </h:column>

    </h:dataTable>

    ```


    Backing bean class com.example.project.view.Products:


    ```

    @Named @RequestScoped

    public class Products {


    private List<Product> list;


    @Inject

        private ProductService productService;


    @PostConstruct

        public void init() {

            list = productService.list();

        }


    public List<Product> getList() {

            return list;

        }

    }

    ```


    Product entity: com.example.project.model. Product:


    ```

    @Entity

    public class Product {


    @Id @GeneratedValue(strategy=IDENTITY)

        private Long id;


    @Column(nullable = false)

        private @NotNull String name;


    @Column(nullable = false)

        private @NotNull String description;


    // Add/generate getters+setters.

    }

    ```


    Product service: com.example.project.service.ProductService:


    ```

    @Stateless

    public class ProductService {


    @PersistenceContext

        private EntityManager entityManager;


    @TransactionAttribute(SUPPORTS)

        public List<Product> list() {

            return entityManager

                .createQuery("FROM Product ORDER BY id DESC", Product.class)

                .getResultList();

        }

    }

    ```


    Generated HTML output :


    ```

    <table>

        <thead>

            <tr>

                <th scope="col">ID</th>

                <th scope="col">Name</th>

                <th scope="col">Description</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td>3</td>

                <td>Three</td>

                <td>The third product</td>

            </tr>

            <tr>

                <td>2</td>

                <td>Two</td>

                <td>The second product</td>

            </tr>

            <tr>

                <td>1</td>

                <td>One</td>

                <td>The first product</td>

            </tr>

        </tbody>

    </table>

    ```


    Rendering in Chrome browser:


    ![A454457_1_En_6_Figd_HTML.jpg](OEBPS/Images/A454457_1_En_6_Figd_HTML.jpg)


    It is important to note that the model behind the value attribute of <h: dataTable>
    must refer a bean property which is already prepared beforehand in a one-time
    life cycle event, such as @PostConstruct or <f:viewAction>. This doesn’t apply
    specifically to UIData components but to basically every JSF component. That is,
    the getter method may be invoked multiple times during the JSF life cycle, especially
    when referenced in the value attribute of an iteration component or in the rendered
    attribute of any JSF component.


    The technical reason is that any EL value expression is, behind the scenes, created
    as a javax.el.ValueExpression instance which internally basically just holds the
    literal EL string such as #{products.list} and any ValueExpression#getValue()
    call on it would simply re-evaluate the expression against the provided EL context.
    This is normally a very cheap operation, done in nanoseconds, but it may slow
    down drastically when the getter method in turn performs a relatively expensive
    database query which may take tens or even hundreds of milliseconds.


    Iteration components may invoke the getter method during every phase of the JSF
    life cycle when the iteration component happens to have form components nested.
    When you prepare the model by obtaining a list from the database in the getter
    method, this would cause the database to be queried on every single getter method
    call, which is plainly inefficient. Moreover, the same problems with regard to
    resolving the iterated item of interest based on the iteration index may occur
    as described in the last paragraph of the previous section about <h:panelGrid>
    with <c:forEach>.


    Another thing to note is <f:facet name="header">. This generates basically <thead>
    with the content in <th>. <h:dataTable> also supports <f:facet name="footer">
    which will then generate the <tfoot> with the content in <td>. You can usually
    find all supported <f:facet> names in the tag documentation, as well as in the
    <h:dataTable> tag documentation.[⁸](#A454457_1_En_6_Chapter.xhtml#Fn8)


    Basically, you can put anything inside <h:column> to represent the cell content.
    Even form components or a nested <h:dataTable> or <ui:repeat>. Following is a
    small example which shows a fictive Set<Tag> tags property of Product entity in
    a nested <ui:repeat>.


    ```

    <h:dataTable id="products" value="#{products.list}" var="product">

        ...

        <h:column>

            <ui:repeat value="#{product.tags}" var="tag">

                #{tag.name}<br/>

            </ui:repeat>

        </h:column>

    </h:dataTable>

    ```'
