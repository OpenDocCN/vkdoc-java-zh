    # 13. 安全性


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1)库拉索岛威廉斯塔德


    (2)荷兰北荷兰省阿姆斯特丹


    Web 应用程序的安全性是一个广泛的领域，涵盖诸多主题，例如保护对资源的访问、防御各种类型的注入攻击，以及防止用户被诱骗代表攻击者执行恶意操作。


    JSF（JavaServer Faces）以多种方式支持这些主题，要么提供原生解决方案，要么与 Java EE 平台的功能集成。对于资源访问（包括身份验证（调用者证明其身份）和授权（系统确定调用者有权访问哪些资源）），JSF（JavaServer
    Faces）与 Java EE 安全机制集成，而该机制又由 Servlet 规范和 Java EE 安全规范等定义。


    Java EE 安全（JSR 375）在 Java EE 8 的 Web 配置文件和完整配置文件中均受支持。此外，参考实现 Soteria 可在 Java
    EE 7 服务器上运行，并且由于它构建在 JASPIC（Java EE 身份验证 SPI）（JSR 196）之上，因此它也可以在支持 JASPIC 的 Servlet
    容器（例如 Tomcat 8.5 及更高版本和 Jetty 7.0 及更高版本）上运行。

