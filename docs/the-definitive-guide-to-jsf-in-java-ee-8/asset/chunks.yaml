    # 11. 自定义组件


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1)威廉斯塔德，库拉索


    (2)阿姆斯特丹，北荷兰省，荷兰


    在第 7 章中，您应该已经了解到，像 `<ui:composition>`、`<ui:include>` 和 `<ui:decorate>` 这样的 Facelet
    模板在您希望将主页面布局片段拆分为可重用的模板（如页眉、菜单、主要内容区域和页脚）时非常有用。而像 `<t:field>` 这样的 Facelet 标签文件在您希望拥有可重用的组件组以最大限度地减少代码重复时非常有用。并且，像
    `<t:inputLocalTime>` 这样的复合组件在您希望基于现有组件（以及必要时的一些 HTML）创建具有单一职责的自定义组件时非常有用。


    然而，在某些情况下，可能不存在完全符合您目的的单一组件，即使是由现有组件和一些 HTML 组合而成也不行。或者，组件可能存在，但其渲染器并未按您设想的方式工作。此时，您就需要创建一个自定义组件或自定义渲染器。


    JSF（JavaServer Faces）从一开始就围绕 UIComponent API（应用程序编程接口）提供了高度的抽象。您可以通过创建一个全新的自定义
    UIComponent，或扩展现有标准 HTML 组件集中的组件，或为现有组件插入自定义 Renderer 来自定义组件。

    '
- fmt: "# Component Type, Family, and Renderer Type\n\nEach `UIComponent` instance\
    \ has “component type,” “component family,” and “renderer type” associated with\
    \ it. The component type basically represents the unique component identifier\
    \ associated with the component tag. It can be registered into JSF via either\
    \ the `@FacesComponent` annotation or the `<component>` entry in `faces-config.xml`.\
    \ The following example demonstrates the usage of the annotation on a minimal\
    \ component class:\n\n```\n@FacesComponent(SomeComponent.COMPONENT_TYPE)\npublic\
    \ class SomeComponent extends UIComponentBase {\n\n    public static final String\
    \ COMPONENT_TYPE = \"project.SomeComponent\";\n    public static final String\
    \ COMPONENT_FAMILY = \"project.SomeFamily\";\n\n    public SomeComponent() {\n\
    \        setRendererType(SomeRenderer.RENDERER_TYPE);\n    }\n\n    @Override\n\
    \    public String getFamily() {\n        return COMPONENT_FAMILY;\n    }\n}\n\
    ```\n\nAnd the following example demonstrates the usage with the entry in `faces-config.xml`:\n\
    \n```\n<component>\n    <component-type>project.SomeComponent</component-type>\n\
    \    <component-class>\n        com.example.project.component.SomeComponent\n\
    \    </component-class>\n</component>\n```\n\nNote that when you register a Java\
    \ EE artifact via both the annotation and the XML ways using the same identifier,\
    \ then the XML declaration will always get precedence over the annotation declaration.\
    \ The same holds true for all JSF annotations.\n\nThe public constants `COMPONENT_TYPE`\
    \ and `COMPONENT_FAMILY` in the component class are not mandatory, but they follow\
    \ the same convention as the standard JSF component set does and therefore give\
    \ more consistency in developing with JSF. The public constant `COMPONENT_TYPE`\
    \ allows the developer to programmatically create the component without needing\
    \ to hard-code the component type.\n\n```\nUIComponent component = FacesContext.getCurrentInstance()\n\
    \    .getApplication().createComponent(SomeComponent.COMPONENT_TYPE);\n```\n\n\
    Note that programmatically creating `UIComponent` instances this way is generally\
    \ not the normal practice in an average JSF web application. Instead, you normally\
    \ define the components in the view and leave the job of creating `UIComponent`\
    \ instances up to JSF or any pluggable component library. In the case of Facelets\
    \ view technology, the component tags can be registered into JSF via either `@FacesComponent(createTag=true)`\
    \ or a `<tag>` entry in a `*.taglib.xml` file along with the component type as\
    \ follows:\n\n```\n<tag>\n    <tag-name>someComponent</tag-name>\n    <component>\n\
    \        <component-type>project.SomeComponent</component-type>\n    </component>\n\
    </tag>\n```\n\nAs said, the standard JSF component set has the component type\
    \ also defined in the concrete `UIComponent` classes behind the component tags.\
    \ Those `UIComponent` classes are all located in the `javax.faces.component.html`\
    \ package. The `UIComponent` class name can be derived from the component tag\
    \ name by prefixing it with “Html”. So is the component tag `<h:outputText>` backed\
    \ by the `HtmlOutputText` component. JSF can, via either the `@FacesComponent`\
    \ annotation or the `<component>` entry in `faces-config.xml`, figure out which\
    \ component class exactly is associated with the component tag, so JSF knows that,\
    \ for the `<h:outputText>` tag, it should create a concrete `HtmlOutputText` instance.\n\
    \nOnce JSF has the concrete `UIComponent` instance at hand, it can figure out\
    \ the component family as well as the renderer type by invoking the methods `UIComponent#getFamily()`\
    \ and `UIComponent#getRendererType()`, respectively. This information is mandatory\
    \ in order to create a concrete `Renderer` instance for the given `UIComponent`\
    \ instance, as you can see in the following snippet:\n\n```\nRenderer renderer\
    \ = FacesContext.getCurrentInstance().getRenderKit()\n    .getRenderer(component.getFamily(),\
    \ component.getRendererType());\n```\n\nThe component family is basically a “hard-coded”\
    \ constant which can be shared across multiple component types. It’s “hard-coded”\
    \ in such way that there’s no setter for it. This is needed in order to get the\
    \ concrete `Renderer` instances as they are not registered into JSF by component\
    \ type but rather by component family. This allows the developer of the pluggable\
    \ render kit to register the renderer type just once instead of multiple times\
    \ for each known standard component type and unknown custom component type. Normally,\
    \ the component family and renderer type are registered into JSF via either the\
    \ `@FacesRenderer` annotation or the `<renderer>` entry in `faces-config.xml`.\
    \ The following example demonstrates the usage with the annotation on a minimal\
    \ renderer class.\n\n```\n@FacesRenderer(\n    componentFamily=SomeComponent.COMPONENT_FAMILY,\n\
    \    rendererType=SomeRenderer.RENDERER_TYPE)\npublic class SomeRenderer extends\
    \ Renderer {\n    public static final String RENDERER_TYPE = \"project.SomeRenderer\"\
    ;\n}\n```\n\nAnd the following example demonstrates the usage with the entry in\
    \ `faces-config.xml`:\n\n```\n<render-kit>\n    <renderer>\n        <component-family>project.SomeFamily</component-family>\n\
    \        <renderer-type>project.SomeRenderer</renderer-type>\n        <renderer-class>\n\
    \            com.example.project.renderer.SomeRenderer\n        </renderer-class>\n\
    \    </renderer>\n</render-kit>\n```\n\nThe renderer type is by default defined\
    \ in the constructor of the concrete component class, as you might already have\
    \ noticed in the code snippet of the `SomeComponent` class as shown previously.\
    \ In case it’s needed, the component subclass developer or even yourself as component\
    \ end user can always override the default renderer instance of a component with\
    \ the desired renderer instance. This can be done in various ways, all via XML.\
    \ The first way is via the `<tag>` entry associated with the component tag in\
    \ the `*.taglib.xml` file.\n\n```\n<tag>\n    <tag-name>someComponent</tag-name>\n\
    \    <component>\n        <component-type>project.SomeComponent</component-type>\n\
    \        <renderer-type>custom.OtherRenderer</renderer-type>\n    </component>\n\
    </tag>\n```\n\nThis affects application-wide and targets only the specific component\
    \ tag. The second way is via a new `<renderer>` entry in `faces-config.xml` which\
    \ targets exactly the desired component family and its default renderer type.\n\
    \n```\n<render-kit>\n    <renderer>\n        <component-family>project.SomeFamily</component-family>\n\
    \        <renderer-type>project.SomeRenderer</renderer-type>\n        <renderer-class>\n\
    \            com.example.custom.renderers.OtherRenderer\n        </renderer-class>\n\
    \    </renderer>\n</render-kit>\n```\n\nThis affects application-wide and targets\
    \ *every* component tag associated with the given component family currently associated\
    \ with the given renderer type. The third way is via the `rendererType` attribute\
    \ of the component tag.\n\n```\n<x:someComponent ... rendererType=\"custom.OtherRenderer\"\
    \ />\n```\n\nThis affects only the declared component tag and not others. Table\
    \ [11-1](#A454457_1_En_11_Chapter.xhtml#Tab1) provides an overview of all component\
    \ types, families, and renderer types of the standard JSF component set."
  raw: '## Component Type, Family, and Renderer Type


    Each UIComponent instance has “component type,” “component family,” and “renderer
    type” associated with it. The component type basically represents the unique component
    identifier associated with the component tag. It can be registered into JSF via
    either the @FacesComponent annotation or the <component> entry in faces-config.xml.
    The following example demonstrates the usage of the annotation on a minimal component
    class:


    ```

    @FacesComponent(SomeComponent.COMPONENT_TYPE)

    public class SomeComponent extends UIComponentBase {


    public static final String COMPONENT_TYPE = "project.SomeComponent";

        public static final String COMPONENT_FAMILY = "project.SomeFamily";


    public SomeComponent() {

            setRendererType(SomeRenderer.RENDERER_TYPE);

        }


    @Override

        public String getFamily() {

            return COMPONENT_FAMILY;

        }

    }

    ```


    And the following example demonstrates the usage with the entry in faces-config.xml:


    ```

    <component>

        <component-type>project.SomeComponent</component-type>

        <component-class>

            com.example.project.component.SomeComponent

        </component-class>

    </component>

    ```


    Note that when you register a Java EE artifact via both the annotation and the
    XML ways using the same identifier, then the XML declaration will always get precedence
    over the annotation declaration. The same holds true for all JSF annotations.


    The public constants COMPONENT_ TYPE and COMPONENT_FAMILY in the component class
    are not mandatory, but they follow the same convention as the standard JSF component
    set does and therefore give more consistency in developing with JSF. The public
    constant COMPONENT_TYPE allows the developer to programmatically create the component
    without needing to hard-code the component type.


    ```

    UIComponent component = FacesContext.getCurrentInstance()

        .getApplication().createComponent(SomeComponent.COMPONENT_TYPE);

    ```


    Note that programmatically creating UIComponent instances this way is generally
    not the normal practice in an average JSF web application. Instead, you normally
    define the components in the view and leave the job of creating UIComponent instances
    up to JSF or any pluggable component library. In the case of Facelets view technology,
    the component tags can be registered into JSF via either @FacesComponent(createTag=true)
    or a <tag> entry in a *.taglib.xml file along with the component type as follows:


    ```

    <tag>

        <tag-name>someComponent</tag-name>

        <component>

            <component-type>project.SomeComponent</component-type>

        </component>

    </tag>

    ```


    As said, the standard JSF component set has the component type also defined in
    the concrete UIComponent classes behind the component tags. Those UIComponent
    classes are all located in the javax.faces.component.html package. The UIComponent
    class name can be derived from the component tag name by prefixing it with “Html”.
    So is the component tag <h:outputText> backed by the HtmlOutputText component.
    JSF can, via either the @FacesComponent annotation or the <component> entry in
    faces-config.xml, figure out which component class exactly is associated with
    the component tag, so JSF knows that, for the <h:outputText> tag, it should create
    a concrete HtmlOutputText instance .


    Once JSF has the concrete UIComponent instance at hand, it can figure out the
    component family as well as the renderer type by invoking the methods UIComponent#getFamily()
    and UIComponent#getRendererType(), respectively. This information is mandatory
    in order to create a concrete Renderer instance for the given UIComponent instance,
    as you can see in the following snippet:


    ```

    Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()

        .getRenderer(component.getFamily(), component.getRendererType());

    ```


    The component family is basically a “hard-coded” constant which can be shared
    across multiple component types. It’s “hard-coded” in such way that there’s no
    setter for it. This is needed in order to get the concrete Renderer instances
    as they are not registered into JSF by component type but rather by component
    family. This allows the developer of the pluggable render kit to register the
    renderer type just once instead of multiple times for each known standard component
    type and unknown custom component type. Normally, the component family and renderer
    type are registered into JSF via either the @FacesRenderer annotation or the <renderer>
    entry in faces-config.xml. The following example demonstrates the usage with the
    annotation on a minimal renderer class.


    ```

    @FacesRenderer(

        componentFamily=SomeComponent.COMPONENT_FAMILY,

        rendererType=SomeRenderer.RENDERER_TYPE)

    public class SomeRenderer extends Renderer {

        public static final String RENDERER_TYPE = "project.SomeRenderer";

    }

    ```


    And the following example demonstrates the usage with the entry in faces-config.xml:


    ```

    <render-kit>

        <renderer>

            <component-family>project.SomeFamily</component-family>

            <renderer-type>project.SomeRenderer</renderer-type>

            <renderer-class>

                com.example.project.renderer.SomeRenderer

            </renderer-class>

        </renderer>

    </render-kit>

    ```


    The renderer type is by default defined in the constructor of the concrete component
    class , as you might already have noticed in the code snippet of the SomeComponent
    class as shown previously. In case it’s needed, the component subclass developer
    or even yourself as component end user can always override the default renderer
    instance of a component with the desired renderer instance. This can be done in
    various ways, all via XML. The first way is via the <tag> entry associated with
    the component tag in the *.taglib.xml file.


    ```

    <tag>

        <tag-name>someComponent</tag-name>

        <component>

            <component-type>project.SomeComponent</component-type>

            <renderer-type>custom.OtherRenderer</renderer-type>

        </component>

    </tag>

    ```


    This affects application-wide and targets only the specific component tag. The
    second way is via a new <renderer> entry in faces-config.xml which targets exactly
    the desired component family and its default renderer type.


    ```

    <render-kit>

        <renderer>

            <component-family>project.SomeFamily</component-family>

            <renderer-type>project.SomeRenderer</renderer-type>

            <renderer-class>

                com.example.custom.renderers.OtherRenderer

            </renderer-class>

        </renderer>

    </render-kit>

    ```


    This affects application-wide and targets *every* component tag associated with
    the given component family currently associated with the given renderer type.
    The third way is via the rendererType attribute of the component tag.


    ```

    <x:someComponent ... rendererType="custom.OtherRenderer" />

    ```


    This affects only the declared component tag and not others. Table [11-1](#A454457_1_En_11_Chapter.xhtml#Tab1)
    provides an overview of all component types, families, and renderer types of the
    standard JSF component set.'
  trans: '

    ## 组件类型、组件族与渲染器类型


    每个 `UIComponent` 实例都关联着“组件类型”、“组件族”和“渲染器类型”。组件类型本质上代表了与组件标签关联的唯一组件标识符。它可以通过 `@FacesComponent`
    注解或 `faces-config.xml` 中的 `<component>` 条目注册到 JSF 中。以下示例演示了在一个最小组件类上使用注解的方式：


    ```

    @FacesComponent(SomeComponent.COMPONENT_TYPE)

    public class SomeComponent extends UIComponentBase {


    public static final String COMPONENT_TYPE = "project.SomeComponent";

        public static final String COMPONENT_FAMILY = "project.SomeFamily";


    public SomeComponent() {

            setRendererType(SomeRenderer.RENDERER_TYPE);

        }


    @Override

        public String getFamily() {

            return COMPONENT_FAMILY;

        }

    }

    ```


    以下示例演示了在 `faces-config.xml` 中使用条目的方式：


    ```

    <component>

        <component-type>project.SomeComponent</component-type>

        <component-class>

            com.example.project.component.SomeComponent

        </component-class>

    </component>

    ```


    请注意，当你同时通过注解和 XML 方式使用相同标识符注册 Java EE 工件时，XML 声明将始终优先于注解声明。这一点对所有 JSF 注解同样适用。


    组件类中的公共常量 `COMPONENT_TYPE` 和 `COMPONENT_FAMILY` 并非强制要求，但它们遵循与标准 JSF 组件集相同的约定，因此在使用
    JSF 开发时能提供更高的一致性。公共常量 `COMPONENT_TYPE` 允许开发者以编程方式创建组件，而无需硬编码组件类型。


    ```

    UIComponent component = FacesContext.getCurrentInstance()

        .getApplication().createComponent(SomeComponent.COMPONENT_TYPE);

    ```


    请注意，在一般的 JSF Web 应用程序中，以这种方式编程创建 `UIComponent` 实例通常并非标准做法。相反，你通常会在视图中定义组件，并将创建
    `UIComponent` 实例的工作交给 JSF 或任何可插拔的组件库。在使用 Facelets 视图技术的情况下，组件标签可以通过 `@FacesComponent(createTag=true)`
    或 `*.taglib.xml` 文件中的 `<tag>` 条目（同时指定组件类型）注册到 JSF 中，如下所示：


    ```

    <tag>

        <tag-name>someComponent</tag-name>

        <component>

            <component-type>project.SomeComponent</component-type>

        </component>

    </tag>

    ```


    如前所述，标准 JSF 组件集也在组件标签背后的具体 `UIComponent` 类中定义了组件类型。这些 `UIComponent` 类都位于 `javax.faces.component.html`
    包中。`UIComponent` 类名可以通过在组件标签名前加上“Html”前缀推导出来。例如，组件标签 `<h:outputText>` 由 `HtmlOutputText`
    组件支持。JSF 可以通过 `@FacesComponent` 注解或 `faces-config.xml` 中的 `<component>` 条目，确定哪个组件类确切地与组件标签关联，因此
    JSF 知道对于 `<h:outputText>` 标签，它应该创建一个具体的 `HtmlOutputText` 实例。


    一旦 JSF 获得了具体的 `UIComponent` 实例，它就可以通过分别调用 `UIComponent#getFamily()` 和 `UIComponent#getRendererType()`
    方法来确定组件族和渲染器类型。这些信息对于为给定的 `UIComponent` 实例创建具体的 `Renderer` 实例是必需的，如下面的代码片段所示：


    ```

    Renderer renderer = FacesContext.getCurrentInstance().getRenderKit()

        .getRenderer(component.getFamily(), component.getRendererType());

    ```


    组件族本质上是一个“硬编码”的常量，可以在多个组件类型之间共享。它之所以是“硬编码”的，是因为没有为其提供 setter 方法。这是为了获取具体的 `Renderer`
    实例所必需的，因为这些实例不是按组件类型注册到 JSF 中的，而是按组件族注册的。这允许可插拔渲染套件的开发者只需注册一次渲染器类型，而无需为每个已知的标准组件类型和未知的自定义组件类型多次注册。通常，组件族和渲染器类型通过
    `@FacesRenderer` 注解或 `faces-config.xml` 中的 `<renderer>` 条目注册到 JSF 中。以下示例演示了在一个最小渲染器类上使用注解的方式：


    ```

    @FacesRenderer(

        componentFamily=SomeComponent.COMPONENT_FAMILY,

        rendererType=SomeRenderer.RENDERER_TYPE)

    public class SomeRenderer extends Renderer {

        public static final String RENDERER_TYPE = "project.SomeRenderer";

    }

    ```


    以下示例演示了在 `faces-config.xml` 中使用条目的方式：


    ```

    <render-kit>

        <renderer>

            <component-family>project.SomeFamily</component-family>

            <renderer-type>project.SomeRenderer</renderer-type>

            <renderer-class>

                com.example.project.renderer.SomeRenderer

            </renderer-class>

        </renderer>

    </render-kit>

    ```


    渲染器类型默认在具体组件类的构造函数中定义，正如你可能已经在前面的 `SomeComponent` 类代码片段中注意到的那样。如果需要，组件子类的开发者，甚至作为组件最终用户的你，都可以随时用所需的渲染器实例覆盖组件的默认渲染器实例。这可以通过多种方式实现，全部通过
    XML 完成。第一种方式是通过 `*.taglib.xml` 文件中与组件标签关联的 `<tag>` 条目。


    ```

    <tag>

        <tag-name>someComponent</tag-name>

        <component>

            <component-type>project.SomeComponent</component-type>

            <renderer-type>custom.OtherRenderer</renderer-type>

        </component>

    </tag>

    ```


    这会影响整个应用程序，并且仅针对特定的组件标签。第二种方式是通过在 `faces-config.xml` 中添加一个新的 `<renderer>` 条目，该条目精确地针对所需的组件族及其默认渲染器类型。


    ```

    <render-kit>

        <renderer>

            <component-family>project.SomeFamily</component-family>

            <renderer-type>project.SomeRenderer</renderer-type>

            <renderer-class>

                com.example.custom.renderers.OtherRenderer

            </renderer-class>

        </renderer>

    </render-kit>

    ```


    这会影响整个应用程序，并且针对当前与给定渲染器类型关联的、属于给定组件族的*每个*组件标签。第三种方式是通过组件标签的 `rendererType` 属性。


    ```

    <x:someComponent ... rendererType="custom.OtherRenderer" />

    ```


    这仅影响声明的组件标签，而不影响其他标签。表 11-1 提供了标准 JSF 组件集中所有组件类型、组件族和渲染器类型的概览。

    '
