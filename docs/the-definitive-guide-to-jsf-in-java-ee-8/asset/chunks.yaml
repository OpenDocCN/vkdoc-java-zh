    is doing under the hood. Following is an example form wherein this code is being
    used:


    ```

    <h:form>

        <h:inputText a:type="date" value="#{booking.period.startDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText a:type="date" value="#{booking.period.endDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:commandButton value="Submit" />

        <h:messages />

        <f:validateWholeBean value="#{booking.period}" />

    </h:form>

    ```


    With this backing bean:


    ```

    @Named @ViewScoped

    public class Booking implements Serializable {


    private Period period = new Period();


    // Add/generate getter.

    }

    ```


    Do note that <f:validateWholeBean> is explicitly placed as the last child of the
    parent <h:form>, which ensures that the validation is performed as the last thing
    after all individual input components in the same form. This is as per the specification;
    the JSF implementation may throw a runtime exception when the tag is misplaced.


    ## Immediate Attribute


    The EditableValueHolder, ActionSource, and AjaxBehavior interfaces also specify
    an immediate property which basically maps to the immediate attribute of all UIInput
    and UICommand components and the <f:ajax> tag. When set to true on an EditableValueHolder
    component, then anything that normally takes place during the process validations
    phase (third phase) as well as the update model values phase (fourth phase) will
    be performed during the apply request values phase (second phase). When conversion
    or validation fails on them, then the life cycle will also skip the process validations
    phase (third phase). When set to true on an ActionSource component or AjaxBehavior
    tag, then anything that normally takes place during the invoke application phase
    (fifth phase) will be performed during the apply request values phase (second
    phase) and then only if conversion and validation haven’t failed.


    Historically, this attribute was mainly used to be able to perform an “inner”
    action on the form, usually to load a child input component depending on the submitted
    value of the parent input component, without being blocked by conversion or validation
    errors coming from other input components in the same form. A common use case
    was populating a child drop-down on the change of a parent drop-down.


    ```

    <h:selectOneMenu value="#{bean.country}" required="true" immediate="true"

        onchange="submit()" valueChangeListener="#{bean.loadCities}">

        <f:selectItems value="#{bean.countries}" />

    </h:selectOneMenu>

    <h:selectOneMenu value="#{bean.city}" required="true">

        <f:selectItems value="#{bean.cities}" />

    </h:selectOneMenu>

    ```


    This approach obviously predates the Web 2.0 era wherein you’d just use Ajax for
    this. Understand that the immediate attribute has essentially become useless for
    this purpose since the introduction of <f:ajax> in JSF 2.0\. Exactly the same
    use case can be achieved in a much cleaner way as follows:


    ```

    <h:selectOneMenu value="#{bean.country}" required="true">

        <f:selectItems value="#{bean.countries}" />

        <f:ajax listener="#{bean.loadCities}" render="city" />

    </h:selectOneMenu>

    <h:selectOneMenu id="city" value="#{bean.city}" required="true">

        <f:selectItems value="#{bean.cities}" />

    </h:selectOneMenu>

    ```


    As you learned in Chapter [4](#A454457_1_En_4_Chapter.xhtml), the execute attribute
    of <f:ajax> already defaults to @this, so it’s just omitted. This also means that
    all other EditableValueHolder components in the same form won’t be processed and
    thus won’t cause #{bean.loadCities} ever to be blocked by conversion or validation
    errors coming from other inputs.


    These days, with Ajax magic and all, the immediate attribute has thus lost its
    main use case. JSF could do as well without it. Due to its historic use case,
    many starters may mistake its primary purpose to be “skip all validation.” This
    is, however, not true. For that, you’d need to fine-tune the execute attribute
    of <f:ajax> so that it only covers the input components that really need to be
    validated. In case you want to actually “skip all validation” while submitting
    the entire form , you’d best use Bean Validation constraints instead (the @NotNull
    and friends) and simply have <f:validateBean disabled="true"> wrapping the entire
    form.


    ## Custom Converters


    From the beginning JSF has supported custom converters. The main use case is to
    be able to convert a non-standard model value, such as a persistence entity specific
    to the web application. The less common use case is to extend an existing standard
    converter and set some commonly used defaults in its constructor so that you can
    get away with less code in order to declare the desired standard converter configuration
    in the view.


    Imagine that you want to be able to create master-detail pages on your persistence
    entities wherein you’d like to pass the ID of the entity around as a request parameter
    from the master page to the detail page. Following is an example data table in
    the master page /products/list.xhtml based on a fictive Product entity :


    ```

    <h:dataTable value="#{listProducts.products}" var="product">

        <h:column>#{product.id}</h:column>

        <h:column>#{product.name}</h:column>

        <h:column>#{product.description}</h:column>

        <h:column>

            <h:link value="Edit" outcome="edit">

                <f:param name="id" value="#{product.id}" />

            </h:link>

        </h:column>

    </h:dataTable>

    ```


    Note the last column of the table . It generates a link to the detail page /products/edit.xhtml
    whereby the ID of the entity is passed as a GET request parameter as in /product.xhtml?id=42.
    In the detail page, you can use <f:viewParam> to set the GET request parameter
    in the backing bean.


    ```

    <f:metadata>

        <f:viewParam name="id" value="#{editProduct.product}"

            required="true" requiredMessage="Bad request">

        </f:viewParam>

    </f:metadata>

    ...

    <h:form>

        <h1>Edit product #{editProduct.product.id}</h1>

        <h:inputText value="#{editProduct.product.name}" />

        <h:inputText value="#{editProduct.product.description}" />

        ...

    </h:form>

    ```


    However, there’s one small problem: the GET request parameter is in Java perspective
    basically a String representing the product ID while the product property of the
    EditProduct backing bean actually expects a whole Product entity identified by
    the passed-in ID.


    ```

    @Named @ViewScoped

    public class EditProduct implements Serializable {


    private Product product;


    // Getter+setter.

    }

    ```


    For exactly this conversion step, a custom converter has to be created which is
    capable of converting between a String representing the product ID and an Object
    representing the Product entity. JSF offers the javax.faces.convert.Converter
    interface[^(20)](#A454457_1_En_5_Chapter.xhtml#Fn20) to get started. Following
    is a concrete example of such a ProductConverter:


    ```

    @FacesConverter(forClass=Product.class, managed=true)

    public class ProductConverter implements Converter<Product> {


    @Inject

        private ProductService productService;


    @Override

        public String getAsString

            (FacesContext context, UIComponent component, Product product)

        {

            if (product == null) {

                return "";

            }


    if (product.getId() != null) {

                return product.getId().toString();

            }

            else {

                throw new ConverterException(

                    new FacesMessage("Invalid product ID"), e);

            }

        }


    @Override

        public Product getAsObject

             (FacesContext context, UIComponent component, String id)

        {

            if (id == null || id.isEmpty()) {

                return null;

            }


    try {

                return productService.getById(Long.valueOf(id));

            }

            catch (NumberFormatException e) {

                throw new ConverterException(

                    new FacesMessage("Invalid product ID"), e);

            }

        }

    }

    ```'
