- fmt: "# Conditionally Rendering Based on Access\n\nIn web applications one often\
    \ wants to render parts of a view differently based on whether a caller is authenticated\
    \ or not, and if so based on what roles this caller is in.\n\n`JSF` component\
    \ tags don’t really need special attributes for this, as the existing implicit\
    \ objects combined with expression language are powerful enough to do most of\
    \ the checks needed for this.\n\nOne of the most common checks is determining\
    \ whether the user is authenticated. This was briefly shown in the `index.xhtml`\
    \ view above:\n\n```\n<c:if test=\"#{not empty request.userPrincipal}\">\n   \
    \ <p>Logged-in as #{request.userPrincipal}</p>\n</c:if>\n```\n\nYou can, of course,\
    \ also use the `rendered` attribute of any `JSF` component here.\n\n```\n<ui:fragment\
    \ rendered=\"#{not empty request.userPrincipal}\">\n    <p>Logged-in as #{request.userPrincipal}</p>\n\
    </ui:fragment>\n```\n\nHowever, as you learned in the section “JSTL Core Tags”\
    \ in Chapter [3](#A454457_1_En_3_Chapter.xhtml), this will only end up in a slightly\
    \ more verbose component tree. Moreover, the `rendered` attribute checks will\
    \ be done throughout the `JSF` life cycle over and over while `JSTL` tags are\
    \ executed only once during view build time.\n\nNote that we’re using the implicit\
    \ object `#{request}` here instead of the more general `SecurityContext`. This\
    \ is because in Java EE 8 there’s no implicit EL object available corresponding\
    \ to this `SecurityContext`. In Java EE Security, as well as in the Servlet API\
    \ (from which the `request`, which is of type `HttpServletRequest` originates)\
    \ it’s defined that a `null` return from `getUserPrincipal()` means the user is\
    \ not authenticated. A better alignment between Java EE Security and Expression\
    \ Language is planned for a future version of Java EE.\n\nAnother common check\
    \ as mentioned is to test for the caller being in a specific role. Here too we\
    \ can use the implicit object `#{request}`, as shown in the following:\n\n```\n\
    <c:if test=\"#{request.isUserInRole('foo')}\">\n    <!-- foo specific things here\
    \ -->\n</c:if>\n```\n\nIt’s good to remember that as explained in the beginning\
    \ of this chapter, the role “foo” doesn’t have to be something that we would call\
    \ a role in our normal usage of the word. That is, it doesn’t have to be something\
    \ like “admin”, or “manager”. In fact, for such very local usage as in a fragment\
    \ on a view it’s often preferred to use a finer-grained name (e.g., “CAN_UPDATE_SALARY”).\
    \ A common technique is to map fine-grained roles to more coarse-grained roles,\
    \ such as, indeed, “ADMIN”. Via this technique a user is given these more coarse-grained\
    \ roles, and the data store that stores the authentication data then only contains\
    \ these coarse-grained roles as well. When an identity store such as we saw above\
    \ retrieves this authentication data for a certain caller and sees “ADMIN” it\
    \ would return a collection of roles to which “ADMIN” is mapped (e.g., `{\"CAN_UPDATE_SALARY\"\
    , \"CAN_ADJUST_MARGINS\", ...}`).\n\nA special role that we can test for is the\
    \ “**” role which is an alternative for the `#{not empty request.userPrincipal}`\
    \ check. This role is implicitly assigned to any authenticated caller, but with\
    \ the caveat that the application has not declared this in any way. If it has\
    \ done so, “**” loses its special meaning and is just another opaque string for\
    \ which the security system explicitly tests. Using the “**” check, the first\
    \ fragment that we showed in this section looks as follows:\n\n```\n<c:if test=\"\
    #{request.isUserInRole('**')}\">\n    <p>Logged-in as #{request.userPrincipal}</p>\n\
    </c:if>\n```\n\nIn the standard Java EE programmatic APIs there are no methods\
    \ available to test whether the caller is in any of two or more roles, or in all\
    \ of two or more roles. If this is required, utility methods such as shown in\
    \ the following code can be used:\n\n```\npublic static boolean isInAnyRole(HttpServletRequest\
    \ request, String... roles) {\n    for (String roles : roles) {\n        if (request.isUserInRole(role))\
    \ {\n            return true;\n        }\n    }\n    return false;\n}\npublic\
