- fmt: '# JSF 早期发展史


    在2002年第二季度，JSF的另外两个基石被讨论：表达式语言（受`JSTL`启发），它对于所谓的从模板到后台代码的bean绑定至关重要；以及工厂查找器，它允许替换JSF的关键部分，尽管当时可能未被完全认识到，但这可能极大地促进了JSF在16年后仍然具有相关性。


    正是在同一季度，Craig McClanahan——Struts之父和Tomcat的Servlet容器架构师——接任了规范负责人。不久之后，关于使用`JSP`的讨论开始了，这个讨论，也许当时团队并未意识到，后来不幸地对JSF产生了相当负面的影响。大约在2002年底，Ed
    Burns——他和McClanahan一样也曾参与Tomcat的开发——作为联合规范负责人加入了团队。Burns后来成为了JSF的主要规范负责人，任期超过十年。


    当团队继续致力于诸如前述的受管bean和所谓的值绑定（即前述表达式语言绑定的Java表示）等事务时，第一个乌云出现在2003年春天，团队成员Hans Bergsten意识到使用`JSP`作为JSF的模板语言存在非常现实且重大的问题。他向团队提出了这些担忧，但最终这些问题没有得到解决，反而在接下来的几个月里，团队将精力花在了值绑定的一个变体上；后来才清楚，方法绑定和状态保存机制是JSF另一个不太理想的实现。


    `JSF 1.0`及其当时尚未命名的参考实现（RI）最终于2004年3月11日发布——巧合的是，仅比至今仍强大的另一个框架`Spring 1.0`的发布早了两周。`MyFaces`在几天后的3月19日发布了其`1.0.0`
    alpha版本。一个有趣的观察是，JSF带着一个完整的基于XML的依赖注入（DI）框架正式发布，时间恰好就在以DI著称的Spring正式发布之前。


    `JSF 1.0`普遍受到好评；尽管市场竞争激烈，有Tapestry、WebObjects、Velocity和Cocoon等对手，但在发布后的几个月内，Horst
    Caymann和Hans Bergsten等作者就出版了至少三本书，并且eXo平台（一个数字协作平台）立即开始使用JSF。


    然而，Hans Bergsten早先的担忧几乎同样迅速地变得痛苦而清晰；`JSP`技术基于从头到尾处理模板，在遇到标签时立即写入响应。而JSF需要一种分阶段的方法，组件需要在开始向响应写入任何内容之前，能够检查并作用于从页面标签构建的组件树。这种不匹配导致了许多奇怪的问题，例如内容消失或渲染顺序错乱。


    在JSF引入仅三个月后，Hans Bergsten在他传奇性的文章“通过抛弃JSP来改进JSF”中强烈主张放弃`JSP`。Bergsten在那篇文章中解释了`JSP`作为JSF模板语言是多么不合适，但他也带来了一线希望；由于JSF对可扩展性的出色支持，只需替换所谓的视图处理器（JSF明确允许这样做），就可以相对容易地引入替代模板方案。然而，直到五年后，JSF才真正附带了一个更合适的视图模板语言，尽管`JSP`在那个时候基本上已被弃用，但在撰写本文时它仍然存在于JSF中。


    ## 青春期


    回到2004年，JSF迎来了另一个第一；6月28日，Ed Burns宣布Sun公司发布了参考实现（RI）的源代码。这代表了一个重要的里程碑，因为在此之前，Sun公司积极使用的大多数技术都是闭源的。最初，源代码是在有些奇特的`JRL`许可下发布的，但后来改为双重许可：带有类路径例外的`GPL`和`CDDL`。在发布这一公告的同时，也建立了一个传统：每个新特性或错误修复都应附带一个测试，并且在提交更改之前应执行所有现有测试。大约14年后，从事RI源代码工作的人员已经大不相同，项目结构和代码约定也发生了变化，但测试驱动的传统仍然以其原始形式得以保持。


    那时，Ed Burns决定更多地关注JSF的规范方面，因为`JSF 1.2`的规范工作已经立即开始，而早期团队成员之一Jayashri Visvanathan承担了实现方面的领导角色，Ryan
    Lubke则担任TCK（技术兼容性套件）工程师。


    尽管JSF才问世几个月，各种JSF组件库已经开始涌现，尽管它们都是商业化的。其中包括来自Oracle的`ADF Faces`。`ADF Faces`在`JSF
    1.0`正式发布之前就已经被列入Oracle的路线图，其首个早期访问版本于2004年8月17日发布。它的负责人是Adam Winer，他代表Oracle参与了创建`JSF
    1.0`的团队。`ADF Faces`主要包含一组丰富的组件，还有一个对话框框架，并且值得注意的是，它已经具备了部分页面渲染（PPR）功能，这比后来出现的AJAX解决方案要早得多。`ADF
    Faces`还包含一个实际可用的“for each”标签（`af:forEach`）。Adam Winer在早期就解释说，这样的标签并非微不足道，但承诺Oracle会将相关知识回馈给JSF本身。


    `ADF Faces`组件主要源自早期的用户界面XML（UIX）框架，Adam Winer也是该框架的首席架构师。UIX的早期版本曾使用“Cabo”、“Baja”和“Marlin”这些名称。UIX是一个用于浏览器的富客户端框架。由于JSF与UIX有诸多相似之处，并且其负责人Adam
    Winer是原始JSF团队的成员，因此推测UIX影响了JSF并非不合理。这些相似之处包括：具有独立渲染器的组件概念、用于组合页面的`JSP`标签处理器和声明式选项，以及在Java中以编程方式实例化相同组件的能力。甚至存在概念上相似的数据绑定，尽管语法不够优雅。例如，UIX不会使用`value="#{user.age}"`，而是使用`data:value="age@user"`，但还需要在每个页面上定义一种生产者来声明“user”来自何处，然后将页面的内容嵌套在该声明中。相比之下，JSF和EL一直使用全局定义，并将避免名称冲突的责任留给用户。


    2004年最早（如果不是第一个）的开源组件库之一是Matthias Unverzagt的`OurFaces`。由于当时JSF没有自己的资源API（应用程序编程接口）来提供图像等内容，`OurFaces`需要在`web.xml`中添加一个Servlet，即所谓的`SkinServlet`（`ourfaces.common.webapp.SkinServlet`）。其重要性在于，这在当时成为了JSF库的一个相当普遍的要求：在使用组件库之前，用户需要手动向`web.xml`添加一些内容。'
  raw: 'In the second quarter of 2002 two other cornerstones of JSF were discussed:
    the Expression Language (inspired by JSTL), which is instrumental for the so-called
    bindings of beans from a template to backing code, and the factory finder, which
    allowed key parts of JSF to be replaced and although perhaps not fully realized
    at the time may have contributed greatly to JSF still being relevant some 16 years
    later.


    It was in this same quarter that Craig McClanahan took over as spec lead, father
    of Struts and architect of Tomcat’s Servlet container, took over. Not long after
    the discussion about using JSP started, a discussion, perhaps unbeknownst to the
    team at the time, that would, unfortunately, have a rather negative impact on
    JSF later on. Around the end of the year 2002, Ed Burns, who like McClanahan had
    also worked on Tomcat before, joined the team as co-spec lead. Burns is the person
    who would eventually become the main spec lead of JSF for well over a decade.


    While the team continued to work on things like the aforementioned managed beans
    and the so-called value binding, which is the Java representation of the also
    aforementioned expression language binding, the first dark cloud appeared when
    in the spring of 2003 team member Hans Bergsten realized that there were very
    real and major issues with using JSP as the templating language for JSF. He brought
    these concerns to the team, but ultimately they weren’t addressed and instead
    the following months were spent, among other things, on a variant of the value
    binding; it later on became clear that the method binding and the state saving
    mechanism were another of JSF’s less than ideal implementations.


    JSF 1.0 and its still nameless RI were eventually released on March 11, 2004—coincidentally,
    a mere two weeks before the release of another framework that’s still strong today,
    Spring 1.0. MyFaces released its 1.0.0 alpha version only days later, on March
    19\. It’s perhaps an interesting observation that JSF went final with a full-fledged
    XML-based dependency injection (DI) framework just before Spring, which is largely
    known for its DI, went final.


    JSF 1.0 was generally well received; despite a rather crowded market with competitors
    such as Tapestry, WebObjects, Velocity, and Cocoon operating, not less than three
    books from writers such as Horst Caymann and Hans Bergsten appeared in the months
    after, and the eXo platform (a Digital Collaboration Platform) started using JSF
    right away.


    Hans Bergsten’s earlier concerns, however, become painfully clear almost just
    as quickly; the JSP technology is based on processing a template from start to
    end, immediately writing to the response as tags are encountered. JSF, however,
    requires a phased approach where components need to be able to inspect and act
    on the component tree, which is built from the tags on the page, before starting
    to write anything to the response. This mismatch led to many strange issues, such
    as content disappearing or being rendered out of order.


    Only three months after the introduction of JSF, Hans Bergsten made a strong case
    of dropping JSP in his legendary article “Improving JSF by Dumping JSP.” There
    Bergsten explains how ill-suited JSP is for use a template language in JSF, but
    he also presents a glimmer of hope; because of JSF’s great support for extendibility,
    it’s relatively easy to introduce alternative templating simply by replacing the
    so-called view handler, something which JSF explicitly allows. It would, however,
    take five long years until JSF would indeed ship with a more suitable view templating
    language, and even though JSP had been essentially deprecated at that point it’s
    still present in JSF at the time of writing.


    ## The Adolescent Years


    Back in 2004 another first befell JSF; on June 28 Ed Burns announced that the
    source of the RI was released by Sun. This represented a major milestone as before
    that date most technology in active use by Sun was closed source. Initially the
    source was licensed under the somewhat exotic JRL, but later this would be changed
    to dual licenses, GPL with classpath exception and CDDL. At the same time as this
    announcement, the tradition was established that every new feature or bug fix
    should be accompanied by a test, and that all existing tests should be executed
    before committing the change. Some 14 years later there’s a largely different
    set of people working on the RI source, and the project structure and code conventions
    have changed as well, but the test-driven tradition is still being uphold in its
    original form.


    At that point Ed Burns decided to focus more on the specification aspects of JSF
    as the JSF 1.2 spec work had started right away, and Jayashri Visvanathan, one
    of the early team members, took on the lead role concerning the implementation
    aspects, with Ryan Lubke, working as the TCK (testing) engineer.


    Still only a few months old, a variety of component libraries for JSF had already
    started to pop up, although all of them commercial. Among those was the one from
    Oracle, ADF Faces. ADF Faces was put on Oracle’s roadmap well before JSF 1.0 went
    final, and the first early access release was presented on August 17, 2004\. Its
    lead was Adam Winer, who represented Oracle in the team that created JSF 1.0\.
    ADF Faces primarily contained a set of rich components, but also a dialog framework,
    and remarkably already featured partial page rendering (PPR), quite a bit ahead
    of the later crop of AJAX solutions. ADF Faces also contained a “for each” tag
    (af:forEach) that actually worked. Adam Winer explained in these early days that
    such tag is not quite trivial to build but promised that Oracle would contribute
    the knowledge back to JSF itself.


    The ADF Faces components originated mostly from the earlier User Interface XML
    (UIX) framework, of which Adam Winer was the lead architect as well. Earlier versions
    of UIX used the names “Cabo,” “Baja,” and “Marlin.” UIX was a rich client framework
    for use in the browser. With JSF sharing more than a few similarities to UIX,
    and with its lead, Adam Winer, being part of the original JSF team, it’s perhaps
    not unreasonable to surmise that UIX influenced JSF. Such similarities include
    the concept of components with separate renderers, JSP tag handlers and declarative
    options to compose a page, and the ability to instantiate those same components
    programmatically in Java. There was even a conceptually similar data binding,
    although with a less elegant syntax. Instead of, say, value="#{user.age}", UIX
    would use data:value="age@user" but also required a kind of producer to be defined
    on each page to declare where “user” comes from, and then nest the page’s content
    within that declaration. By contrast, JSF and EL have always used global definitions
    and left it up to the user to avoid name clashes.


    One of the first, if not the first open source component library in 2004 was Matthias
    Unverzagt’s OurFaces. As JSF did not had its own resource API (application programming
    interface) at the time to serve up things like images, OurFaces required a Servlet
    to be added to web.xml, the so-called SkinServlet (ourfaces.common.webapp.SkinServlet).
    The significance of this is that it became a rather common thing for JSF libraries
    in those days to ask their users: add something manually to web.xml before the
    component library can be used.'
