    specific converter. All UIOutput and UIInput components implement the ValueHolder
    interface. The converters which say “n/a” in the “Converter tag” column are implicit
    converters. In other words, you can just bind any bean property of type BigDecimal,
    BigInteger, boolean/Boolean, byte/Byte, char/Character, double/Double, enum/Enum,
    float/Float, int/Integer, long/Long, and short/Short to the value attribute of
    any ValueHolder component and have JSF to automatically convert it without any
    additional configuration. Only <f:convertDateTime> and <f:convertNumber> require
    explicit registration, because the desired conversion algorithm isn’t necessarily
    obvious from the model value alone.


    In all ValueHolder components , the converter will be invoked during the render
    response phase (sixth phase), converting the non-String-based model value to a
    String suitable for embedding in HTML. And in EditableValueHolder components,
    the converter will also be invoked during the process validations phase (third
    phase), converting the submitted String request parameter to the non-String-based
    model value. The EditableValueHolder interface extends the ValueHolder interface
    and is implemented by all UIInput components.


    However, this implicit conversion doesn’t work on bean properties where those
    types are parameterized. Imagine that you have a List<Integer> in the model and
    you’d like to be able to edit it as follows:


    ```

    <ui:repeat value="#{bean.integers}" varStatus="loop">

        <h:inputText value="#{bean.integers[loop.index]}" />

    </ui:repeat>

    ```


    Then, after submitting, you would end up with unconverted String values in the
    list and get baffled by class cast exceptions when attempting to iterate over
    the list. The reason is that the EL (Expression Language) API (application programming
    interface), which is responsible for processing those #{...} things that are,
    behind the scenes , represented by javax.el.ValueExpression instances, is in its
    current version not capable of detecting the parameterized type of a generic collection
    and just returns Object.class on ValueExpression#getType(). JSF can’t do much
    about that limitation of EL. All you can do is explicitly specify the desired
    converter on the input component.


    ```

    <ui:repeat value="#{bean.integers}" varStatus="loop">

        <h:inputText value="#{bean.integers[loop.index]}"

            converter="javax.faces.Integer">

        </h:inputText>

    </ui:repeat>

    ```


    An alternative is to replace the List<Integer> by Integer[] or even int[]. EL
    will then be able to recognize the value expression as an integer type and hence
    JSF will be able to locate the desired converter for it. However, plain arrays
    instead of collections in the model are a “no-no” these days.


    Coming back to the explicit standard converters <f:convertNumber> and <f:convertDateTime>,
    those can also be nested in any ValueHolder component. The difference between
    <f:convertNumber> and the implicit number-based converters is that the tags allow
    more fine-grained setting of conversion options, such as the number type or pattern,
    the amount of integer and/or fraction digits, whether grouping is used, and the
    locale.'
  trans: '

    ###### 表 5-1 JSF 提供的标准转换器


    | 转换器类 | 转换器 ID | 转换器标签 | 值类型 | 起始版本 |

    | --- | --- | --- | --- | --- |

    | BigDecimalConverter | javax.faces.BigDecimal | 无 | java.math.BigDecimal | 1.0
    |

    | BigIntegerConverter | javax.faces.BigInteger | 无 | java.math.BigInteger | 1.0
    |

    | BooleanConverter | javax.faces.Boolean | 无 | boolean/java.lang.Boolean | 1.0
    |

    | ByteConverter | javax.faces.Byte | 无 | byte/java.lang.Byte | 1.0 |

    | CharacterConverter | javax.faces.Character | 无 | char/java.lang.Character |
    1.0 |

    | DateTimeConverter | javax.faces.DateTime | <f:convertDateTime> | java.util.Datejava.time.LocalDatejava.time.LocalTimejava.time.OffsetTimejava.time.LocalDateTimejava.time.OffsetDateTimejava.time.ZonedDateTime
    | 1.02.32.32.32.32.32.3 |

    | DoubleConverter | javax.faces.Double | 无 | double/java.lang.Double | 1.0 |

    | EnumConverter | javax.faces.Enum | 无 | enum/java.lang.Enum | 1.0 |

    | FloatConverter | javax.faces.Float | 无 | float/java.lang.Float | 1.0 |

    | IntegerConverter | javax.faces.Integer | 无 | int/java.lang.Integer | 1.0 |

    | LongConverter | javax.faces.Long | 无 | long/java.lang.Long | 1.0 |

    | NumberConverter | javax.faces.Number | <f:convertNumber> | java.lang.Number
    | 1.0 |

    | ShortConverter | javax.faces.Short | 无 | short/java.lang.Short | 1.0 |


    “转换器 ID”列主要指定了转换器标识符，你可以将其用于任何 `ValueHolder` 组件的 `converter` 属性，或任何嵌套的 `<f:converter>`
    标签的 `converterId` 属性，以激活特定的转换器。所有 `UIOutput` 和 `UIInput` 组件都实现了 `ValueHolder`
    接口。在“转换器标签”列中标注为“无”的转换器是隐式转换器。换句话说，你可以直接将任何类型为 `BigDecimal`、`BigInteger`、`boolean/Boolean`、`byte/Byte`、`char/Character`、`double/Double`、`enum/Enum`、`float/Float`、`int/Integer`、`long/Long`
    和 `short/Short` 的 bean 属性绑定到任何 `ValueHolder` 组件的 `value` 属性，JSF 会自动进行转换，无需任何额外配置。只有
    `<f:convertDateTime>` 和 `<f:convertNumber>` 需要显式注册，因为仅凭模型值本身并不一定能明确所需的转换算法。


    在所有 `ValueHolder` 组件中，转换器将在渲染响应阶段（第六阶段）被调用，将非字符串类型的模型值转换为适合嵌入 HTML 的字符串。而在 `EditableValueHolder`
    组件中，转换器还会在处理验证阶段（第三阶段）被调用，将提交的字符串请求参数转换为非字符串类型的模型值。`EditableValueHolder` 接口扩展了
    `ValueHolder` 接口，并由所有 `UIInput` 组件实现。


    然而，当这些类型被参数化时，这种隐式转换在 bean 属性上不起作用。假设你的模型中有一个 `List<Integer>`，并且希望按如下方式进行编辑：


    ```

    <ui:repeat value="#{bean.integers}" varStatus="loop">

        <h:inputText value="#{bean.integers[loop.index]}" />

    </ui:repeat>

    ```


    那么，提交后，列表中最终会得到未转换的字符串值，并且在尝试遍历列表时，你会被类转换异常搞得一头雾水。原因是负责处理那些 `#{...}` 表达式（在幕后由
    `javax.el.ValueExpression` 实例表示）的 EL（表达式语言）API（应用程序编程接口），在其当前版本中无法检测泛型集合的参数化类型，并且在
    `ValueExpression#getType()` 上仅返回 `Object.class`。JSF 对 EL 的这一限制无能为力。你所能做的就是在输入组件上显式指定所需的转换器。


    ```

    <ui:repeat value="#{bean.integers}" varStatus="loop">

        <h:inputText value="#{bean.integers[loop.index]}"

            converter="javax.faces.Integer">

        </h:inputText>

    </ui:repeat>

    ```


    另一种替代方案是将 `List<Integer>` 替换为 `Integer[]` 甚至 `int[]`。这样 EL 就能将值表达式识别为整数类型，从而 JSF
    能够为其找到所需的转换器。然而，在模型中使用普通数组而不是集合，在当今是不推荐的。


    回到显式标准转换器 `<f:convertNumber>` 和 `<f:convertDateTime>`，它们也可以嵌套在任何 `ValueHolder`
    组件中。`<f:convertNumber>` 与隐式的基于数字的转换器之间的区别在于，这些标签允许更精细地设置转换选项，例如数字类型或模式、整数和/或小数位数、是否使用分组以及区域设置。'
- fmt: "### `<f:convertNumber>`\n\n`<f:convertNumber>` [²](#A454457_1_En_5_Chapter.xhtml#Fn2)\
    \ uses under the hood `java.text.NumberFormat`.[³](#A454457_1_En_5_Chapter.xhtml#Fn3)\
    \ The `type` attribute specifies which instance will be obtained and defaults\
    \ to `number`. Other allowable values are `currency` and `percent`. In other words,\
    \ the following tags,\n\n```\n<f:convertNumber type=\"number\" />\n<f:convertNumber\
    \ type=\"currency\" />\n<f:convertNumber type=\"percent\" />\n```\n\nwill under\
    \ the hood obtain the `NumberFormat` instance as follows:\n\n```\nNumberFormat\
    \ numberFormat = NumberFormat.getNumberInstance(locale);\nNumberFormat currencyFormat\
    \ = NumberFormat.getCurrencyInstance(locale);\nNumberFormat percentFormat = NumberFormat.getPercentInstance(locale);\n\
    ```\n\nwhere the `locale` argument can be specified by the `locale` attribute\
    \ of the `<f:convertNumber>` tag and defaults to `UIViewRoot#getLocale()` which\
    \ in turn can be specified by the `locale` attribute of `<f:view>`. In other words,\
    \ those instances will automatically apply the standard number format pattern\
    \ based on the number type and the specified locale. The following example,\n\n\
    ```\n<f:view locale=\"pt_BR\">\n    ...\n    <h:outputText value=\"#{product.price}\"\
    >\n        <f:convertNumber type=\"currency\" locale=\"en_US\" />\n    </h:outputText>\n\
    </f:view>\n```\n\nwill not format the price (a `BigDecimal` property) as R$ 12,34\
    \ (Brazilian real), but instead as $12.34 (US dollar). Note that the `locale`\
    \ attribute of the `<f:convertNumber>` tag does not necessarily need to be specified\
    \ as supported locale in `faces-config.xml`. Also noted should be that the `value`\
    \ attribute doesn’t necessarily need to refer a `BigDecimal`; any other `java.lang.Number`\
    \ type is also supported, but for prices we’d of course like to store the value\
    \ in a `BigDecimal` instead of, for example, a `Double` or `Float` to avoid arithmetic\
    \ errors due to the floating nature of floating point numbers.[⁴](#A454457_1_En_5_Chapter.xhtml#Fn4)\n\
    \nIn case you need to change the standard number format pattern for some reason—for\
    \ example, because you’re working on a banking application which stores financial\
    \ data with five fractions—and you’d like to present the full value in some back-end\
    \ admin screen so that humans can if necessary verify them, then you can use the\
    \ `pattern` attribute of the `<f:convertNumber>` tag to override the standard\
    \ number format pattern conform the rules of `java.text.DecimalFormat`.[⁵](#A454457_1_En_5_Chapter.xhtml#Fn5)\n\
    \n```\n<f:convertNumber pattern=\"¤ #,##0.00000\" locale=\"pt_BR\" />\n```\n\n\
    Note that when the `pattern` attribute is specified, the `type` attribute is ignored.\
    \ The “currency sign” pattern character “`¤`” specifies where the actual currency\
    \ symbol must be inserted. The actual currency symbol depends on the specified\
    \ locale. The “comma” pattern character “`,`” specifies when the grouping separator\
    \ must be inserted, which is relative to the decimal separator or the end of the\
    \ value. The actual inserted grouping separator symbol is coincidentally also\
    \ a comma in US dollar format but is a period in Brazilian real format. The “period”\
    \ pattern character “`.`” specifies the location of the decimal separator. The\
    \ actual inserted decimal separator symbol is coincidentally also a period in\
    \ US dollar format but is a comma in Brazilian real format. The “optional digit”\
    \ pattern character “`#`” is in this pattern merely used to indicate when the\
    \ grouping separator symbol should be inserted and won’t show anything when the\
    \ actual digit is absent. The “required digit” pattern character “`0`” specifies\
    \ the minimum format which will show zero when the actual digit is absent. Following\
    \ is an exercise code which should give insight into how `<f:convertNumber>` works\
    \ under the hood:\n\n```\nLocale locale = new Locale(\"pt\", \"BR\");\nDecimalFormatSymbols\
    \ symbols = new DecimalFormatSymbols(locale);\n\nSystem.out.println(\"Currency\
    \ symbol: \" + symbols.getCurrencySymbol());\nSystem.out.println(\"Grouping symbol:\
    \ \" + symbols.getGroupingSeparator());\nSystem.out.println(\"Decimal symbol:\
    \ \" + symbols.getDecimalSeparator());\n\nDecimalFormat formatter = new DecimalFormat(\"\
    ¤ #,##0.00000\", symbols);\n\nSystem.out.println(formatter.format(new BigDecimal(\"\
    12.34\")));\nSystem.out.println(formatter.format(new BigDecimal(\".1234\")));\n\
    System.out.println(formatter.format(new BigDecimal(\"1234\")));\nSystem.out.println(formatter.format(new\
    \ BigDecimal(\"1234567.1234567\")));\n```\n\nThe output should look as follows:\n\
    \n```\nCurrency symbol: R$\nGrouping symbol: .\nDecimal symbol:,\nR$ 12,34000\n\
    R$ 0,12340\nR$ 1.234,00000\nR$ 1.234.567,12346\n```\n\n`<f:convertNumber>` will\
    \ also render exactly those values. Apart from the `pattern` attribute, you can\
    \ also fine-grain the `type` attribute with additional attributes such as `currencySymbol`,\
    \ `integerOnly`, `groupingUsed`, `minIntegerDigits`, `maxIntegerDigits`, `minFractionDigits`,\
    \ and `maxFractionDigits`. You can basically achieve the same formatting pattern\
    \ “`¤ #,##0.00000`” as follows:\n\n```\n<f:convertNumber type=\"currency\" locale=\"\
    pt_BR\"\n    minFractionDigits=\"5\" maxFractionDigits=\"5\" />\n```\n\nThis is\
    \ actually more readable and more convenient in case you have a hard time getting\
    \ out the currency sign placeholder from your keyboard. The `pattern` attribute\
    \ is rarely more useful than fine-graining the `type` attribute with additional\
    \ attributes.\n\nIn case you’re using `<f:convertNumber>` in a `UIInput` component\
    \ and thus require the end user to enter the value, you should keep in mind that\
    \ `currency` and `percent` types explicitly require the end user to enter the\
    \ currency or percent symbol as well. For the currency input, you can easily disable\
    \ this by specifying an empty string as a currency symbol so that you can put\
    \ it outside the input component.\n\n```\n<span class=\"currency\">\n    <span\
    \ class=\"symbol\">$</span>\n    <h:inputText ...>\n        <f:convertNumber type=\"\
    currency\" currencySymbol=\"\" />\n    </h:inputText>\n</span>\n```\n\nFor the\
    \ percent type this is, unfortunately, not possible.\n\n### `<f:convertDateTime>`\n\
    \n`<f:convertDateTime>` [⁶](#A454457_1_En_5_Chapter.xhtml#Fn6) uses under the\
    \ hood `java.text.DateFormat`,[⁷](#A454457_1_En_5_Chapter.xhtml#Fn7) and, since\
    \ JSF 2.3, also `java.time.formatter.DateTimeFormatter`.[⁸](#A454457_1_En_5_Chapter.xhtml#Fn8)\
    \ In other words, you can use basically any kind of date for this. Also, this\
    \ tag has a `type` attribute which must actually correspond to the actual type\
    \ of the model value. Historically, it was not possible to programmatically detect\
    \ the desired type based on a `java.util.Date` instance. This has changed since\
    \ the new `java.time` API which offers distinct classes for each date time type.\
    \ However, in order to be able to reuse the existing `<f:convertDateTime>` API\
    \ for the new `java.time` API, new types had to be added. Table [5-2](#A454457_1_En_5_Chapter.xhtml#Tab2)\
    \ provides an overview."
  raw: '### <f:convertNumber>


    <f:convertNumber> [²](#A454457_1_En_5_Chapter.xhtml#Fn2) uses under the hood java.text.NumberFormat.[³](#A454457_1_En_5_Chapter.xhtml#Fn3)
    The type attribute specifies which instance will be obtained and defaults to number.
    Other allowable values are currency and percent. In other words, the following
    tags ,


    ```

    <f:convertNumber type="number" />

    <f:convertNumber type="currency" />

    <f:convertNumber type="percent" />

    ```


    will under the hood obtain the NumberFormat instance as follows:


    ```

    NumberFormat numberFormat = NumberFormat.getNumberInstance(locale);

    NumberFormat currencyFormat = NumberFormat.getCurrencyInstance(locale);

    NumberFormat percentFormat = NumberFormat.getPercentInstance(locale);

    ```


    where the locale argument can be specified by the locale attribute of the <f:convertNumber>
    tag and defaults to UIViewRoot#getLocale() which in turn can be specified by the
    locale attribute of <f:view>. In other words, those instances will automatically
    apply the standard number format pattern based on the number type and the specified
    locale. The following example,


    ```

    <f:view locale="pt_BR">

        ...

        <h:outputText value="#{product.price}">

            <f:convertNumber type="currency" locale="en_US" />

        </h:outputText>

    </f:view>

    ```


    will not format the price (a BigDecimal property) as R$ 12,34 (Brazilian real),
    but instead as $12.34 (US dollar). Note that the locale attribute of the <f:convertNumber>
    tag does not necessarily need to be specified as supported locale in faces-config.xml.
    Also noted should be that the value attribute doesn’t necessarily need to refer
    a BigDecimal; any other java.lang.Number type is also supported, but for prices
    we’d of course like to store the value in a BigDecimal instead of, for example,
    a Double or Float to avoid arithmetic errors due to the floating nature of floating
    point numbers.[⁴](#A454457_1_En_5_Chapter.xhtml#Fn4)


    In case you need to change the standard number format pattern for some reason—for
    example, because you’re working on a banking application which stores financial
    data with five fractions—and you’d like to present the full value in some back-end
    admin screen so that humans can if necessary verify them, then you can use the
    pattern attribute of the <f:convertNumber> tag to override the standard number
    format pattern conform the rules of java.text.DecimalFormat.[⁵](#A454457_1_En_5_Chapter.xhtml#Fn5)


    ```

    <f:convertNumber pattern="¤ #,##0.00000" locale="pt_BR" />

    ```


    Note that when the pattern attribute is specified, the type attribute is ignored.
    The “currency sign” pattern character “¤” specifies where the actual currency
    symbol must be inserted. The actual currency symbol depends on the specified locale.
    The “comma” pattern character “,” specifies when the grouping separator must be
    inserted, which is relative to the decimal separator or the end of the value.
    The actual inserted grouping separator symbol is coincidentally also a comma in
    US dollar format but is a period in Brazilian real format. The “period” pattern
    character “.” specifies the location of the decimal separator. The actual inserted
    decimal separator symbol is coincidentally also a period in US dollar format but
    is a comma in Brazilian real format. The “optional digit” pattern character “#”
    is in this pattern merely used to indicate when the grouping separator symbol
    should be inserted and won’t show anything when the actual digit is absent. The
    “required digit” pattern character “0” specifies the minimum format which will
    show zero when the actual digit is absent. Following is an exercise code which
    should give insight into how <f:convertNumber> works under the hood:


    ```

    Locale locale = new Locale("pt", "BR");

    DecimalFormatSymbols symbols = new DecimalFormatSymbols(locale);


    System.out.println("Currency symbol: " + symbols.getCurrencySymbol());

    System.out.println("Grouping symbol: " + symbols.getGroupingSeparator());

    System.out.println("Decimal symbol: " + symbols.getDecimalSeparator());


    DecimalFormat formatter = new DecimalFormat("¤ #,##0.00000", symbols);


    System.out.println(formatter.format(new BigDecimal("12.34")));

    System.out.println(formatter.format(new BigDecimal(".1234")));

    System.out.println(formatter.format(new BigDecimal("1234")));

    System.out.println(formatter.format(new BigDecimal("1234567.1234567")));

    ```


    The output should look as follows:


    ```

    Currency symbol: R$

    Grouping symbol: .

    Decimal symbol:,

    R$ 12,34000

    R$ 0,12340

    R$ 1.234,00000

    R$ 1.234.567,12346

    ```


    <f:convertNumber> will also render exactly those values. Apart from the pattern
    attribute, you can also fine-grain the type attribute with additional attributes
    such as currencySymbol, integerOnly, groupingUsed, minIntegerDigits, maxIntegerDigits,
    minFractionDigits, and maxFractionDigits. You can basically achieve the same formatting
    pattern “¤ #,##0.00000” as follows:


    ```

    <f:convertNumber type="currency" locale="pt_BR"

        minFractionDigits="5" maxFractionDigits="5" />

    ```


    This is actually more readable and more convenient in case you have a hard time
    getting out the currency sign placeholder from your keyboard. The pattern attribute
    is rarely more useful than fine-graining the type attribute with additional attributes.


    In case you’re using <f:convertNumber> in a UIInput component and thus require
    the end user to enter the value, you should keep in mind that currency and percent
    types explicitly require the end user to enter the currency or percent symbol
    as well. For the currency input , you can easily disable this by specifying an
    empty string as a currency symbol so that you can put it outside the input component.


    ```

    <span class="currency">

        <span class="symbol">$</span>

        <h:inputText ...>

            <f:convertNumber type="currency" currencySymbol="" />

        </h:inputText>

    </span>

    ```


    For the percent type this is, unfortunately, not possible.


    ### <f:convertDateTime>


    <f:convertDateTime> [⁶](#A454457_1_En_5_Chapter.xhtml#Fn6) uses under the hood
    java.text.DateFormat,[⁷](#A454457_1_En_5_Chapter.xhtml#Fn7) and, since JSF 2.3,
    also java.time.formatter.DateTimeFormatter.[⁸](#A454457_1_En_5_Chapter.xhtml#Fn8)
    In other words, you can use basically any kind of date for this. Also, this tag
    has a type attribute which must actually correspond to the actual type of the
    model value. Historically, it was not possible to programmatically detect the
    desired type based on a java.util.Date instance. This has changed since the new
    java.time API which offers distinct classes for each date time type. However,
    in order to be able to reuse the existing <f:convertDateTime> API for the new
    java.time API, new types had to be added. Table [5-2](#A454457_1_En_5_Chapter.xhtml#Tab2)
    provides an overview.'
  trans: '

    ### <f:convertNumber>


    <f:convertNumber> ² 在底层使用了 `java.text.NumberFormat`。³ `type` 属性指定了将获取哪个实例，默认值为
    `number`。其他允许的值为 `currency` 和 `percent`。换句话说，以下标签：


    ```

    <f:convertNumber type="number" />

    <f:convertNumber type="currency" />

    <f:convertNumber type="percent" />

    ```


    在底层将按如下方式获取 `NumberFormat` 实例：


    ```

    NumberFormat numberFormat = NumberFormat.getNumberInstance(locale);

    NumberFormat currencyFormat = NumberFormat.getCurrencyInstance(locale);

    NumberFormat percentFormat = NumberFormat.getPercentInstance(locale);

    ```


    其中，`locale` 参数可以通过 `<f:convertNumber>` 标签的 `locale` 属性指定，默认值为 `UIViewRoot#getLocale()`，而后者又可以通过
    `<f:view>` 的 `locale` 属性指定。换句话说，这些实例将根据数字类型和指定的区域设置自动应用标准的数字格式模式。以下示例：


    ```

    <f:view locale="pt_BR">

        ...

        <h:outputText value="#{product.price}">

            <f:convertNumber type="currency" locale="en_US" />

        </h:outputText>

    </f:view>

    ```


    将不会把价格（一个 `BigDecimal` 属性）格式化为 R$ 12,34（巴西雷亚尔），而是格式化为 $12.34（美元）。请注意，`<f:convertNumber>`
    标签的 `locale` 属性不一定需要指定为 `faces-config.xml` 中支持的区域设置。还应注意，`value` 属性不一定需要引用 `BigDecimal`；任何其他
    `java.lang.Number` 类型也受支持，但对于价格，我们当然希望将值存储在 `BigDecimal` 中，而不是例如 `Double` 或 `Float`，以避免由于浮点数的浮点特性而导致的算术错误。⁴


    如果你出于某种原因需要更改标准的数字格式模式——例如，因为你正在开发一个银行应用程序，该程序存储具有五位小数的财务数据——并且你希望在后端管理屏幕上显示完整值，以便人类在必要时可以验证它们，那么你可以使用
    `<f:convertNumber>` 标签的 `pattern` 属性来覆盖符合 `java.text.DecimalFormat` 规则的标准数字格式模式。⁵


    ```

    <f:convertNumber pattern="¤ #,##0.00000" locale="pt_BR" />

    ```


    请注意，当指定了 `pattern` 属性时，`type` 属性将被忽略。“货币符号”模式字符“¤”指定了实际货币符号必须插入的位置。实际的货币符号取决于指定的区域设置。“逗号”模式字符“,”指定了何时必须插入分组分隔符，该分隔符相对于小数分隔符或值的末尾。实际插入的分组分隔符符号在美元格式中恰好也是一个逗号，但在巴西雷亚尔格式中是一个句点。“句点”模式字符“.”指定了小数分隔符的位置。实际插入的小数分隔符符号在美元格式中恰好也是一个句点，但在巴西雷亚尔格式中是一个逗号。“可选数字”模式字符“#”在此模式中仅用于指示何时应插入分组分隔符符号，当实际数字不存在时不会显示任何内容。“必需数字”模式字符“0”指定了最小格式，当实际数字不存在时将显示零。以下是一个练习代码，应该能让你深入了解
    `<f:convertNumber>` 在底层是如何工作的：


    ```

    Locale locale = new Locale("pt", "BR");

    DecimalFormatSymbols symbols = new DecimalFormatSymbols(locale);


    System.out.println("货币符号: " + symbols.getCurrencySymbol());

    System.out.println("分组符号: " + symbols.getGroupingSeparator());

    System.out.println("小数符号: " + symbols.getDecimalSeparator());


    DecimalFormat formatter = new DecimalFormat("¤ #,##0.00000", symbols);


    System.out.println(formatter.format(new BigDecimal("12.34")));

    System.out.println(formatter.format(new BigDecimal(".1234")));

    System.out.println(formatter.format(new BigDecimal("1234")));

    System.out.println(formatter.format(new BigDecimal("1234567.1234567")));

    ```


    输出应如下所示：


    ```

    货币符号: R$

    分组符号: .

    小数符号: ,

    R$ 12,34000

    R$ 0,12340

    R$ 1.234,00000

    R$ 1.234.567,12346

    ```


    `<f:convertNumber>` 也将精确渲染这些值。除了 `pattern` 属性，你还可以使用其他属性（例如 `currencySymbol`、`integerOnly`、`groupingUsed`、`minIntegerDigits`、`maxIntegerDigits`、`minFractionDigits`
    和 `maxFractionDigits`）来微调 `type` 属性。你基本上可以通过以下方式实现相同的格式模式“¤ #,##0.00000”：


    ```

    <f:convertNumber type="currency" locale="pt_BR"

        minFractionDigits="5" maxFractionDigits="5" />

    ```


    这实际上更具可读性，并且在你难以从键盘上输入货币符号占位符时更加方便。`pattern` 属性很少比使用其他属性微调 `type` 属性更有用。


    如果你在 `UIInput` 组件中使用 `<f:convertNumber>`，因此需要最终用户输入值，你应该记住，`currency` 和 `percent`
    类型明确要求最终用户也输入货币或百分比符号。对于货币输入，你可以通过将空字符串指定为货币符号来轻松禁用此功能，以便你可以将其放在输入组件外部。


    ```

    <span class="currency">

        <span class="symbol">$</span>

        <h:inputText ...>

            <f:convertNumber type="currency" currencySymbol="" />

        </h:inputText>

    </span>

    ```


    不幸的是，对于百分比类型，这是不可能的。


    ### <f:convertDateTime>


    <f:convertDateTime> ⁶ 在底层使用了 `java.text.DateFormat`，⁷ 并且从 JSF 2.3 开始，也使用了 `java.time.formatter.DateTimeFormatter`。⁸
    换句话说，你基本上可以使用任何类型的日期。此外，此标签有一个 `type` 属性，该属性必须与模型值的实际类型相对应。从历史上看，无法基于 `java.util.Date`
    实例以编程方式检测所需的类型。自从新的 `java.time` API 为每种日期时间类型提供不同的类以来，这种情况已经改变。然而，为了能够将现有的 `<f:convertDateTime>`
    API 重用于新的 `java.time` API，必须添加新的类型。表 5-2 提供了一个概览。

    '
- fmt: "### Table 5-2 `<f:convertDateTime type>` Supported Values\n\n| Tag attribute\
    \ | Value type | Actual formatter | Since |\n| --- | --- | --- | --- |\n| `date`\
    \ (default) | `java.util.Date` (with zero time) | `DateFormat#getDateInstance()`\
    \ | 1.0 |\n| `time` | `java.util.Date` (with zero date) | `DateFormat#getTimeInstance()`\
    \ | 1.0 |\n| `both` | `java.util.Date` | `DateFormat#getDateTimeInstance()` |\
    \ 1.0 |\n| `localDate` | `java.time.LocalDate` | `DateTimeFormatter#ofLocalizedDate()`\
    \ | 2.3 |\n| `localTime` | `java.time.LocalTime` | `DateTimeFormatter#ofLocalizedTime()`\
    \ | 2.3 |\n| `localDateTime` | `java.time.LocalDateTime` | `DateTimeFormatter#ofLocalizedDateTime()`\
    \ | 2.3 |\n| `offsetTime` | `java.time.OffsetTime` | `DateTimeFormatter#ISO_OFFSET_TIME`\
    \ | 2.3 |\n| `offsetDateTime` | `java.time.OffsetDateTime` | `DateTimeFormatter#ISO_OFFSET_DATE_TIME`\
    \ | 2.3 |\n| `zonedDateTime` | `java.time.ZonedDateTime` | `DateTimeFormatter#ISO_ZONED_DATE_TIME`\
    \ | 2.3 |\n\nAlong with the `type` attribute, you should preferably also specify\
    \ the `pattern` attribute, particularly when requesting the end user to enter\
    \ a `java.util.Date` or `java.time.LocalXxx` value via a `UIInput` component,\
    \ because the actual pattern may vary in a not so self-documenting way across\
    \ various locales. `java.time.OffSetXxx` and `ZonedDateTime` don’t have that problem\
    \ because they default to the universal ISO 8601 format.\n\nThe `pattern` attribute\
    \ of `<f:convertDateTime>` follows, for `java.util.Date`, the same rules as specified\
    \ in the `java.text.SimpleDateFormat` Javadoc, and for the `java.time` API, the\
    \ same rules as specified in `java.time.format.DateTimeFormatter` Javadoc. They\
    \ are for the most part the same, but the `java.time` format supports more patterns.\
    \ For both APIs, the “day of month” pattern character is `d`, the “month of year”\
    \ pattern character is `M`, the “year” pattern character is `y`, the “24h hour”\
    \ pattern character is `H`, the “minute” pattern is `m`, and the “second” pattern\
    \ is `s`. The ISO 8601 date format is `yyyy-MM-dd` and the ISO 8601 time format\
    \ is `HH:mm:ss`. The offset and zoned times require an additional offset after\
    \ the time part, which is represented by the ISO 8601 time zone pattern character\
    \ `X`. Examples of valid values are `+01:00` for CET (Central European Time),\
    \ `-03:00` for BRT (Brasilia Time), and `+5:30` for IST (Indian Standard Time).\
    \ As before, the offset and zoned date and time need to be separated by the `T`\
    \ character instead of a space. Following is an overview of all possible `<f:convertDateTime>`\
    \ types whereby the localized ones have an explicitly specified pattern:\n\n```\n\
    <h:form id=\"form\">\n    <h:inputText id=\"date\" value=\"#{bean.date}\">\n \
    \       <f:convertDateTime type=\"date\" pattern=\"yyyy-MM-dd\" />\n    </h:inputText>\n\
    \    <h:inputText id=\"time\" value=\"#{bean.time}\">\n        <f:convertDateTime\
    \ type=\"time\" pattern=\"HH:mm:ss\" />\n    </h:inputText>\n    <h:inputText\
    \ id=\"both\" value=\"#{bean.both}\">\n        <f:convertDateTime type=\"both\"\
    \ pattern=\"yyyy-MM-dd HH:mm:ss\" />\n    </h:inputText>\n    <h:inputText id=\"\
    localDate\" value=\"#{bean.localDate}\">\n        <f:convertDateTime type=\"localDate\"\
    \ pattern=\"yyyy-MM-dd\" />\n    </h:inputText>\n    <h:inputText id=\"localTime\"\
    \ value=\"#{bean.localTime}\">\n        <f:convertDateTime type=\"localTime\"\
    \ pattern=\"HH:mm:ss\" />\n    </h:inputText>\n    <h:inputText id=\"localDateTime\"\
    \ value=\"#{bean.localDateTime}\">\n        <f:convertDateTime type=\"localDateTime\"\
    \n            pattern=\"yyyy-MM-dd HH:mm:ss\">\n        </f:convertDateTime>\n\
    \    </h:inputText>\n    <h:inputText id=\"offsetTime\" value=\"#{bean.offsetTime}\"\
    >\n        <f:convertDateTime type=\"offsetTime\" />\n    </h:inputText>\n   \
    \ <h:inputText id=\"offsetDateTime\" value=\"#{bean.offsetDateTime}\">\n     \
    \   <f:convertDateTime type=\"offsetDateTime\" />\n    </h:inputText>\n    <h:inputText\
    \ id=\"zonedDateTime\" value=\"#{bean.zonedDateTime}\">\n        <f:convertDateTime\
    \ type=\"zonedDateTime\" />\n    </h:inputText>\n    <h:commandButton value=\"\
    submit\" action=\"#{bean.submit}\" />\n    <h:messages showSummary=\"false\" showDetail=\"\
    true\"/>\n</h:form>\n```\n\nNote that `<h:messages>` is here reconfigured to show\
    \ the detail instead of just the summary, because the detail message of a date\
    \ time conversion error includes in standard JSF an example value which is more\
    \ useful for the end user in order to understand the required format. Following\
    \ is what the associated backing bean looks like:\n\n```\n@Named @RequestScoped\n\
    public class Bean {\n\n    private Date date;\n    private Date time;\n    private\
    \ Date both;\n    private LocalDate localDate;\n    private LocalTime localTime;\n\
    \    private LocalDateTime localDateTime;\n    private OffsetTime offsetTime;\n\
    \    private OffsetDateTime offsetDateTime;\n    private ZonedDateTime zonedDateTime;\n\
    \n    public void submit() {\n        System.out.println(\"date: \" + date);\n\
    \        System.out.println(\"time: \" + time);\n        System.out.println(\"\
    both: \" + both);\n        System.out.println(\"localDate: \" + localDate);\n\
    \        System.out.println(\"localTime: \" + localTime);\n        System.out.println(\"\
    localDateTime: \" + localDateTime);\n        System.out.println(\"offsetTime:\
    \ \" + offsetTime);\n        System.out.println(\"offsetDateTime: \" + offsetDateTime);\n\
    \        System.out.println(\"zonedDateTime: \" + zonedDateTime);\n    }\n\n \
    \   // Add/generate getters and setters.\n}\n```\n\nNow that HTML5 has been out\
    \ for some time and more and more browsers support the new HTML5 date and time\
    \ inputs, you’d better activate it by default, because it comes with a very useful\
    \ built-in date picker. The web browser may show the date pattern in the date\
    \ picker in a localized format, but it will always submit the value in ISO 8601\
    \ format. This is thus very useful. The HTML5 date and time inputs can be activated\
    \ by setting the `type` attribute of the input text field to `date`, `time`, or\
    \ `datetime-local` (and thus not `datetime` because it has been dropped). With\
    \ the JSF `<h:inputText>`, you’d need to set it as a pass-through attribute. Following\
    \ are some examples:\n\n```\n<h:form id=\"form\">\n    <h:inputText id=\"localDate\"\
    \ a:type=\"date\" value=\"#{bean.localDate}\">\n        <f:convertDateTime type=\"\
    localDate\" pattern=\"yyyy-MM-dd\" />\n    </h:inputText>\n    <h:inputText id=\"\
    localTime\" a:type=\"time\" value=\"#{bean.localTime}\">\n        <f:convertDateTime\
    \ type=\"localTime\" pattern=\"HH:mm\" />\n    </h:inputText>\n    <h:inputText\
    \ id=\"localDateTime\" a:type=\"datetime-local\"\n        value=\"#{bean.localDateTime}\"\
    >\n        <f:convertDateTime type=\"localDateTime\"\n            pattern=\"yyyy-MM-dd'T'HH:mm\"\
    >\n        </f:convertDateTime>\n    </h:inputText>\n    <h:commandButton value=\"\
    submit\" action=\"#{bean.submit}\" />\n    <h:messages showSummary=\"false\" showDetail=\"\
    true\"/>\n</h:form>\n```\n\nFollowing is how they’re rendered in Chrome browser\
    \ (with newlines added):\n\n![A454457_1_En_5_Figa_HTML.jpg](OEBPS/Images/A454457_1_En_5_Figa_HTML.jpg)\n\
    \n## Standard Validators\n\nWhen the submitted value is successfully converted\
    \ during the process validations phase (third phase), then JSF will immediately\
    \ advance to perform validation on the converted value. JSF already provides a\
    \ handful of standard validators out of the box. They are all available in the\
    \ `javax.faces.validator` package and they all implement the `Validator<T>` interface.\
    \ Table 5-3 provides an overview of them."
  raw: '###### Table 5-2 <f:convertDateTime type> Supported Values


    | Tag attribute | Value type | Actual formatter | Since |

    | --- | --- | --- | --- |

    | date (default) | java.util.Date (with zero time) | DateFormat#getDateInstance()
    | 1.0 |

    | time | java.util.Date (with zero date) | DateFormat#getTimeInstance() | 1.0
    |

    | both | java.util.Date | DateFormat#getDateTimeInstance() | 1.0 |

    | localDate | java.time.LocalDate | DateTimeFormatter#ofLocalizedDate() | 2.3
    |

    | localTime | java.time.LocalTime | DateTimeFormatter#ofLocalizedTime() | 2.3
    |

    | localDateTime | java.time.LocalDateTime | DateTimeFormatter#ofLocalizedDateTime()
    | 2.3 |

    | offsetTime | java.time.OffsetTime | DateTimeFormatter#ISO_OFFSET_TIME | 2.3
    |

    | offsetDateTime | java.time.OffsetDateTime | DateTimeFormatter#ISO_OFFSET_DATE_TIME
    | 2.3 |

    | zonedDateTime | java.time.ZonedDateTime | DateTimeFormatter#ISO_ZONED_DATE_TIME
    | 2.3 |


    Along with the type attribute, you should preferably also specify the pattern
    attribute, particularly when requesting the end user to enter a java.util.Date
    or java.time.LocalXxx value via a UIInput component, because the actual pattern
    may vary in a not so self-documenting way across various locales. java.time.OffSetXxx
    and ZonedDateTime don’t have that problem because they default to the universal
    ISO 8601 format .[⁹](#A454457_1_En_5_Chapter.xhtml#Fn9)


    The pattern attribute of <f:convertDateTime> follows, for java.util.Date, the
    same rules as specified in the java.text.SimpleDateFormat Javadoc,[^(10)](#A454457_1_En_5_Chapter.xhtml#Fn10)
    and for the java.time API, the same rules as specified in java.time.format.DateTimeFormatter
    Javadoc.[^(11)](#A454457_1_En_5_Chapter.xhtml#Fn11) They are for the most part
    the same, but the java.time format supports more patterns. For both APIs, the
    “day of month” pattern character is “d”, the “month of year” pattern character
    is “M”, the “year” pattern character is “y”, the “24h hour” pattern character
    is “H”, the “minute” pattern is “m”, and the “second” pattern is “s”. The ISO
    8601 date format is “yyyy-MM-dd” and the ISO 8601 time format is “HH:mm:ss”. The
    offset and zoned times require an additional offset after the time part, which
    is represented by the ISO 8601 time zone pattern character “X”. Examples of valid
    values are “+01:00” for CET (Central European Time), “-03:00” for BRT (Brasilia
    Time), and “+5:30” for IST (Indian Standard Time). As before, the offset and zoned
    date and time need to be separated by the “T” character instead of a space. Following
    is an overview of all possible <f:convertDateTime> types whereby the localized
    ones have an explicitly specified pattern:


    ```

    <h:form id="form">

        <h:inputText id="date" value="#{bean.date}">

            <f:convertDateTime type="date" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText id="time" value="#{bean.time}">

            <f:convertDateTime type="time" pattern="HH:mm:ss" />

        </h:inputText>

        <h:inputText id="both" value="#{bean.both}">

            <f:convertDateTime type="both" pattern="yyyy-MM-dd HH:mm:ss" />

        </h:inputText>

        <h:inputText id="localDate" value="#{bean.localDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText id="localTime" value="#{bean.localTime}">

            <f:convertDateTime type="localTime" pattern="HH:mm:ss" />

        </h:inputText>

        <h:inputText id="localDateTime" value="#{bean.localDateTime}">

            <f:convertDateTime type="localDateTime"

                pattern="yyyy-MM-dd HH:mm:ss">

            </f:convertDateTime>

        </h:inputText>

        <h:inputText id="offsetTime" value="#{bean.offsetTime}">

            <f:convertDateTime type="offsetTime" />

        </h:inputText>

        <h:inputText id="offsetDateTime" value="#{bean.offsetDateTime}">

            <f:convertDateTime type="offsetDateTime" />

        </h:inputText>

        <h:inputText id="zonedDateTime" value="#{bean.zonedDateTime}">

            <f:convertDateTime type="zonedDateTime" />

        </h:inputText>

        <h:commandButton value="submit" action="#{bean.submit}" />

        <h:messages showSummary="false" showDetail="true"/>

    </h:form>

    ```


    Note that <h:messages> is here reconfigured to show the detail instead of just
    the summary, because the detail message of a date time conversion error includes
    in standard JSF an example value which is more useful for the end user in order
    to understand the required format. Following is what the associated backing bean
    looks like:


    ```

    @Named @RequestScoped

    public class Bean {


    private Date date;

        private Date time;

        private Date both;

        private LocalDate localDate;

        private LocalTime localTime;

        private LocalDateTime localDateTime;

        private OffsetTime offsetTime;

        private OffsetDateTime offsetDateTime;

        private ZonedDateTime zonedDateTime;


    public void submit() {

            System.out.println("date: " + date);

            System.out.println("time: " + time);

            System.out.println("both: " + both);

            System.out.println("localDate: " + localDate);

            System.out.println("localTime: " + localTime);

            System.out.println("localDateTime: " + localDateTime);

            System.out.println("offsetTime: " + offsetTime);

            System.out.println("offsetDateTime: " + offsetDateTime);

            System.out.println("zonedDateTime: " + zonedDateTime);

        }


    // Add/generate getters and setters.

    }

    ```


    Now that HTML5 has been out for some time and more and more browsers support the
    new HTML5 date and time inputs ,[^(12)](#A454457_1_En_5_Chapter.xhtml#Fn12) you’d
    better activate it by default, because it comes with a very useful built-in date
    picker. The web browser may show the date pattern in the date picker in a localized
    format, but it will always submit the value in ISO 8601 format. This is thus very
    useful. The HTML5 date and time inputs can be activated by setting the type attribute
    of the input text field to “date”,[^(13)](#A454457_1_En_5_Chapter.xhtml#Fn13)
    “time”,[^(14)](#A454457_1_En_5_Chapter.xhtml#Fn14) or “datetime-local”[^(15)](#A454457_1_En_5_Chapter.xhtml#Fn15)
    (and thus not “datetime” because it has been dropped). With the JSF <h:inputText>,
    you’d need to set it as a pass-through attribute . Following are some examples:


    ```

    <h:form id="form">

        <h:inputText id="localDate" a:type="date" value="#{bean.localDate}">

            <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />

        </h:inputText>

        <h:inputText id="localTime" a:type="time" value="#{bean.localTime}">

            <f:convertDateTime type="localTime" pattern="HH:mm" />

        </h:inputText>

        <h:inputText id="localDateTime" a:type="datetime-local"

            value="#{bean.localDateTime}">

            <f:convertDateTime type="localDateTime"

                pattern="yyyy-MM-dd''T''HH:mm">

            </f:convertDateTime>

        </h:inputText>

        <h:commandButton value="submit" action="#{bean.submit}" />

        <h:messages showSummary="false" showDetail="true"/>

    </h:form>

    ```


    Following is how they’re rendered in Chrome browser (with newlines added):


    ![A454457_1_En_5_Figa_HTML.jpg](OEBPS/Images/A454457_1_En_5_Figa_HTML.jpg)


    ## Standard Validators


    When the submitted value is successfully converted during the process validations
    phase (third phase), then JSF will immediately advance to perform validation on
    the converted value. JSF already provides a handful of standard validators out
    of the box. They are all available in the javax.faces.validator package[^(16)](#A454457_1_En_5_Chapter.xhtml#Fn16)
    and they all implement the Validator<T> interface. Table [5-3](#A454457_1_En_5_Chapter.xhtml#Tab3)
    provides an overview of them.'
