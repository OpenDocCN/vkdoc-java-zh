    \ opening `/home.xhtml` should produce the final HTML output which you can inspect\
    \ by right-clicking *View page source* in the average web browser.\n\n## Single\
    \ Page Application\n\nA recent trend is the so-called Single Page Application\
    \ (SPA). This concept is on its own not so new; in fact, it is older than JSF\
    \ itself, but it was heavily popularized during “web 2.0” with JavaScript-based\
    \ frameworks such as Angular. Basically, an SPA lets the web application behave\
    \ like a desktop-oriented application by dynamically changing the main content\
    \ with an Ajax request when navigating to a different page instead of loading\
    \ the entire page via a GET request. Gmail is one such known example of an SPA.\n\
    \nSuch an SPA is also achievable with JSF by simply using `<ui:include>` whose\
    \ `src` attribute is dynamically updated by Ajax. Following is an example utilizing\
    \ the same master template as shown in the previous section, `/spa.xhtml`:\n\n\
    ```xml\n<ui:composition template=\"/WEB-INF/templates/layout.xhtml\"\n    xmlns=\"\
    http://www.w3.org/1999/xhtml\"\n    xmlns:jsf=\"http://xmlns.jcp.org/jsf\"\n \
    \   xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n>\n    <ui:param name=\"\
    title\" value=\"Single Page Application\" />\n\n<ui:define name=\"content\">\n\
    \        <aside>\n            <nav>\n                <h:form>\n              \
    \      <f:ajax render=\":content\">\n                        <ul>\n          \
    \                  <li><h:commandLink value=\"page1\"\n                      \
    \          action=\"#{spa.set('page1')}\" /></li>\n                          \
    \  <li><h:commandLink value=\"page2\"\n                                action=\"\
    #{spa.set('page2')}\" /></li>\n                            <li><h:commandLink\
    \ value=\"page3\"\n                                action=\"#{spa.set('page3')}\"\
    \ /></li>\n                        </ul>\n                    </f:ajax>\n    \
    \            </h:form>\n            </nav>\n        </aside>\n        <article\
    \ jsf:id=\"content\" data-page=\"#{spa.page}\">\n            <ui:include src=\"\
    /WEB-INF/includes/spa/#{spa.page}.xhtml\" />\n        </article>\n    </ui:define>\n\
    </ui:composition>\n```\n\nDo note that the `<article>` element is declared as\
    \ a so-called pass-through element by explicitly specifying a JSF identifier via\
    \ `jsf:id=\"…\"`. This feature was introduced in JSF 2.2. Under the hood, when\
    \ declaring an HTML element which has no JSF component equivalent, such as `<header>`,\
    \ `<footer>`, `<main>`, `<article>`, `<section>`, etc. as a pass-through element\
    \ this way, it is turned into a `UIPanel` component and is treated in the JSF\
    \ component tree exactly like `<h:panelGroup>`. This way you can cleanly keep\
    \ using semantic HTML5 markup while still being able to reference it as if it\
    \ were a JSF component and thus be able to Ajax-update it.\n\nAs you might have\
    \ deciphered in the above `/spa.xhtml` example, there’s a side navigation menu\
    \ which sets the current page in the managed bean identified by `#{spa}` and Ajax-updates\
    \ the component identified by `id=\"content\"` which in turn contains a dynamic\
    \ include. The above example excepts the following include files to be present\
    \ in the `/WEB-INF/includes/spa` folder: `page1.xhtml`, `page2.xhtml`, and `page3.xhtml`.\
    \ Each of them is a simple include file which looks as follows:\n\n```xml\n<ui:composition\n\
    \    xmlns=\"http://www.w3.org/1999/xhtml\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n>\n    <h1>First page</h1>\n\
    \    <p>Lorem ipsum dolor sit amet.</p>\n</ui:composition>\n```\n\nThe backing\
    \ bean associated with the `#{spa}` managed bean is fairly simple; it looks as\
    \ follows:\n\n```java\n@Named @ViewScoped\npublic class Spa implements Serializable\
    \ {\n\nprivate String page;\n\n@PostConstruct\n    public void init() {\n    \
    \    page = \"page1\";\n    }\n\npublic void set(String page) {\n        this.page\
    \ = page;\n    }\n\npublic String getPage() {\n        return page;\n    }\n}\n\
    ```\n\nThe default page is defined in `@PostConstruct`. Otherwise, the user might\
    \ face an error page with the message “Invalid path : `/WEB-INF/includes/spa/.xhtml`”."
