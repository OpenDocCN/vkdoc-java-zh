    ```


    This is thus another difference with the implicit javax.faces.ViewState token,
    which is always a POST parameter.


    ## Web Parameter Tampering Protection


    Web parameter tampering is an attack against an application where an attacker
    modifies parameter values that are sent (back) to the server hosting the application.
    If the application doesn’t validate those values correctly, an attacker could
    gain more benefits than entitled to, or may get the opportunity to carry out additional
    attacks.


    For example, suppose a web application renders a list of roles that can be assigned
    to another user, say “user,” “manager,” and “sales.” An attacker could attempt
    to modify the data posted back and change the selection of “user” into “admin.”
    If the server blindly accepts the input and “admin” is an existing value, this
    allows the attacker to give another user the “admin” role, even when the attacker
    is not privileged to do that.


    JSF has an implicit protection against a subset of this attack; namely, against
    values being posted back from a selection (specifically, from UISelectOne*-* and
    UISelectMany*-*based components). This works by JSF either restoring the view
    from javax.faces.ViewState after a postback (when full state saving is used) or
    re-creating it (when partial state saving is used). Only values that were also
    rendered are accepted. The usual caveat applies though, and that’s that with partial
    state saving, the data bound to the component needs to be identical before and
    after the postback. This, however, can easily be accomplished by using the view
    scope.


    To demonstrate, consider the following view:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

    >

        <h:head />

        <h:body>

            <h:form>

                <h:selectOneMenu value="#{bean.selected}">

                    <f:selectItems value="#{bean.available}" />

                </h:selectOneMenu>

                <h:commandButton value="Select" />

            </h:form>

            <p>Chosen value: #{bean.selected}</p>

        </h:body>

    </html>

    ```


    And the following backing bean:


    ```

    @Named @RequestScoped

    public class Bean {


        private List<String> available = Arrays.asList("foo", "bar", "kaz");

        private String selected;


        public List<String> getAvailable() {

            return available;

        }


        public String getSelected() {

            return selected;

        }

        public void setSelected (String selected) {

            this.selected = selected;

        }

    }

    ```


    Choosing, for example, “bar” and clicking “select” will render “Chosen value:
    bar,” as expected. Changing the value being sent can be done in various ways,
    for instance via an intercepting proxy like Burp Proxy or by editing the live
    source via the developer tools from a browser such as Chrome.


    ![A454457_1_En_13_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_13_Fig1_HTML.jpg)


    ###### Figure 13-1 Tampering the selected value in HTML source code


    Selecting the “foo” entry after the change as shown in Figure [13-1](#A454457_1_En_13_Chapter.xhtml#Fig1)
    and clicking the select button again will cause the “foox” value to be sent to
    the application. This value will be rejected by JSF and as a result “Chosen value:”
    will be rendered, indicating that our tampered value indeed has not been accepted.'
  trans: '

    假设我们第一个带有 CSRF 保护的应用程序 bar.xhtml 部署在 http://localhost:8080/project 上，点击第二个应用程序中的输出链接，将导致第一个应用程序再次抛出
    javax.faces.application.ProtectedViewException。请注意，referer 是一个可选检查，仅在 referer
    头实际存在时才会执行，就像第二个应用程序中的链接那样。


    如果我们在浏览器的地址栏中直接输入 http://localhost:8080/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr，或者通过
    wget 或 curl 等命令行工具直接请求它，则不会有 referer，请求将被接受。


    在实践中，GET 请求受 CSRF 攻击保护的价值较低，因为这些请求实际上*应该*是幂等的（不应有副作用，且仅应显示数据）。与其用 CSRF 保护令牌来屏蔽
    GET 请求，更好的做法可能是重构应用程序，使其不包含非幂等的 GET 请求。


    不过，对于回发（postback）来说，CSRF 保护令牌的工作方式大致相同。为了演示，请考虑将 /bar.xhtml 视图修改为以下内容：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <h:form>

                <h:commandButton value="测试" action="#{bar.submit}" />

            </h:form>

        </h:body>

    </html>

    ```


    渲染此页面将导致表单目标 URL 应用 CSRF 保护令牌，方式与我们之前看到的 GET 请求相同——例如：


    ```

    <form method="post"

        action="/project/bar.xhtml?javax.faces.Token=gdMhNbfOycv2v80gr" ...>

    ```


    因此，这与隐式的 javax.faces.ViewState 令牌（它始终是一个 POST 参数）是另一个不同之处。


    ## Web 参数篡改防护


    Web 参数篡改是一种针对应用程序的攻击，攻击者会修改发送（回）到托管应用程序的服务器的参数值。如果应用程序没有正确验证这些值，攻击者可能会获得超出其权限的更多利益，或者有机会执行额外的攻击。


    例如，假设一个 Web 应用程序渲染了一个角色列表，这些角色可以分配给其他用户，比如“用户”、“经理”和“销售”。攻击者可能会尝试修改回发的数据，将“用户”的选择改为“管理员”。如果服务器盲目地接受输入，并且“管理员”是一个存在的值，那么即使攻击者没有权限这样做，这也允许攻击者将“管理员”角色授予另一个用户。


    JSF 对此类攻击的一个子集具有隐式保护；即，针对从选择组件（具体来说，基于 UISelectOne* 和 UISelectMany* 的组件）回发的值。其工作原理是，JSF
    在回发后要么从 javax.faces.ViewState 恢复视图（当使用完整状态保存时），要么重新创建视图（当使用部分状态保存时）。只有那些也被渲染过的值才会被接受。不过，通常的注意事项仍然适用，那就是在使用部分状态保存时，组件绑定的数据在回发前后必须保持一致。然而，通过使用视图作用域，这很容易实现。


    为了演示，请考虑以下视图：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

    >

        <h:head />

        <h:body>

            <h:form>

                <h:selectOneMenu value="#{bean.selected}">

                    <f:selectItems value="#{bean.available}" />

                </h:selectOneMenu>

                <h:commandButton value="选择" />

            </h:form>

            <p>选中的值: #{bean.selected}</p>

        </h:body>

    </html>

    ```


    以及以下支持 bean：


    ```

    @Named @RequestScoped

    public class Bean {


        private List<String> available = Arrays.asList("foo", "bar", "kaz");

        private String selected;


        public List<String> getAvailable() {

            return available;

        }


        public String getSelected() {

            return selected;

        }

        public void setSelected (String selected) {

            this.selected = selected;

        }

    }

    ```


    例如，选择“bar”并点击“选择”，将按预期渲染“选中的值: bar”。可以通过多种方式更改正在发送的值，例如通过像 Burp Proxy 这样的拦截代理，或者通过
    Chrome 等浏览器的开发者工具编辑实时源代码。


    ![A454457_1_En_13_Fig1_HTML.jpg](img/A454457_1_En_13_Fig1_HTML.jpg)


    ###### 图 13-1 在 HTML 源代码中篡改选中的值


    如图 13-1 所示，在更改后选择“foo”条目并再次点击选择按钮，将导致“foox”值被发送到应用程序。该值将被 JSF 拒绝，因此将渲染“选中的值:”，表明我们篡改的值确实未被接受。

