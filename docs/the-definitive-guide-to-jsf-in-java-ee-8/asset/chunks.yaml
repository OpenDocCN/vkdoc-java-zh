    影响了 JSF 或许并非不合理。这些相似之处包括：具有独立渲染器的组件概念、用于组合页面的 JSP 标签处理器和声明式选项，以及在 Java 中以编程方式实例化相同组件的能力。甚至存在概念上相似的数据绑定，尽管语法不够优雅。例如，UIX
    不使用 value="#{user.age}"，而是使用 data:value="age@user"，但还需要在每个页面上定义一种生产者来声明“user”来自何处，然后将页面内容嵌套在该声明中。相比之下，JSF
    和 EL 一直使用全局定义，并让用户自行避免名称冲突。


    2004 年最早（如果不是最早的话）的开源组件库之一是 Matthias Unverzagt 的 OurFaces。由于当时 JSF 没有自己的资源 API
    来提供图像等内容，OurFaces 需要在 web.xml 中添加一个 Servlet，即所谓的 SkinServlet（ourfaces.common.webapp.SkinServlet）。其重要性在于，这在当时的
    JSF 库中变得相当普遍：要求用户在使用组件库之前，手动向 web.xml 添加一些内容。

    '
- fmt: '# JSF 发展史（2004-2007）


    2004年末至2005年初的大部分时间，JSF 1.2专家小组（EG）都在处理各种JSP和EL问题，例如`JSTL <c:forEach>`支持、JSP中的ID生成，以及令人头疼的“内容交织”问题——即渲染时内容出现在响应中错误位置的现象。


    虽然`OurFaces`可能是最早的组件库之一，但它并未持久，如今很少有人记得甚至听说过它。另一个起源于2005年初的框架则不同，即Alexander Smirnov的`Telamon`框架，后来更名为`Ajax4jsf`。该框架是首批将JSF与当时新兴的AJAX技术结合的框架之一。`Ajax4Jsf`的巧妙之处在于，它可以通过将现有组件包裹在`<a4j:region>`标签中，为那些原本未考虑AJAX支持的组件添加AJAX支持。这项技术被整合到2006年3月发布的`Exadel
    Visual Component Platform`中，该平台后来更名为`RichFaces`，并成为最令人难忘的JSF组件库之一。


    大约在同一时间，Alexander Smirnov开始着手开发最终成为`RichFaces`的项目，而一家名为`ICEsoft`的公司也开始研发JSF组件库。`ICEsoft`已运营数年，曾开发过基于Java的浏览器产品`ICEbrowser`，以及`ICEbrowser
    beans`产品——这些是“轻量级、可配置的JavaBean组件，可快速集成到Java客户端应用程序中”。在2005年6月27日的JavaOne大会上，`ICEsoft`宣布了其JSF组件库——`ICEfaces`。该库同样基于AJAX，但将AJAX直接集成到组件中。`ICEsoft`将其特定技术称为“专利申请中的`Direct-to-DOM™`”，这基本上意味着来自服务器的更改会直接注入网页的DOM树结构中。虽然最终版本并未立即发布，但提供了早期访问版本。该版本是闭源的，但免费使用。


    与此同时，受Hans Bergsten对JSP不适用性的担忧启发，JSF EG成员Jacob Hookom毅然决然地开始着手开发Bergsten所设想的替代模板语言。2005年8月，这项工作已进展到可用的初始版本。这种模板语言的名字是：`Facelets`！它迅速席卷了JSF世界。Kito
    Mann在第一个月就在`JSFCentral`上发表了关于它的系列文章的第一部分，而Richard Hightower则在几个月后发表了著名的文章“`Facelets
    fits JSF like a glove`”。


    Oracle在2005年也没有停滞不前。在经历了大约16次早期访问版本发布后，它于2005年底在安特卫普（现称Devoxx）的JavaPolis会议上宣布，`ADF
    Faces`将捐赠给`MyFaces`，从而成为开源项目。


    2006年第一个月，Jacob Hookom和Adam Winer思考了JSF状态保存机制的糟糕实现。该机制的工作原理是：首先从模板创建组件树，然后在请求接近结束时，盲目地序列化整个树及其在请求期间可能放入的所有数据。在回传期间，树会从这种序列化形式中恢复（因此得名“恢复视图”阶段）。这是一种巨大的浪费，因为大部分信息已经在模板中可用。尤其是在使用客户端状态保存进行AJAX请求时，这带来了非常大的负担，而且在服务器端存储此状态时也是一个问题，因为它会大幅增加JSF的内存使用量。以这种糟糕方式进行状态保存的主要原因之一，再次与那个决定有关：支持JSP。由于JSF
    1.2即将最终定稿，不幸的是没有时间在1.2版本中修复这个问题。


    尽管此时已清楚`Facelets`是JSF的未来，但当JSF 1.2最终于2006年5月发布时，它仍然只包含JSP。不过，情况并非全然糟糕。得益于JSF和JSP专家小组的合作，发布了JSP的修订版JSP
    2.1，该版本与JSF的需求更加契合。除此之外，JSP的表达式语言和JSF的表达式语言被合并。结果是`UEL`（统一表达式语言）。`UEL`的一个非常实用的优点是，JSF组件不再需要手动将字符串转换为表达式，而是直接从模板语言接收`ValueExpression`。JSP
    2.1和JSF 1.2都成为了同时发布的Java EE 5的一部分。


    2006年6月13日，`MyFaces`社区宣布捐赠的项目将更名为`Trinidad`。不过，`ADF Faces`在Oracle内部仍然存在，但它基于`Trinidad`并增加了一些额外功能（例如支持Portals、JSR
    227等）。就在此两周前，即2006年5月31日，`ICEsoft`宣布了其免费但仍为闭源的社区版。几个月后，即2006年11月14日，`ICEsoft`在MPL许可下完全开源了`ICEfaces`。当时仍为闭源并由`Exadel`销售的`RichFaces`也不会落后太久。大约四个月后，即2007年3月29日，`Exadel`宣布与Red
    Hat合作，使`RichFaces`在开源许可下可用，并通过其`JBoss`团队提供支持。'
  raw: 'Most of the last months of 2004 and early months of 2005 were spent by the
    JSF 1.2 expert group (EG) working on various JSP and EL issues, such as the JSTL
    <c:forEach> support and the generation of IDs in JSP, as well as on the dreaded
    “content interweaving” issue, which refers to the aforementioned content that
    appears at wrong places in the response when rendering.


    While OurFaces may have been one of the first component libraries, it didn’t last
    and few will remember it or have even heard about it today. This is not quite
    the same for another framework that has its roots in early 2005, namely, Alexander
    Smirnov’s Telamon framework, later renamed Ajax4jsf . This framework was one of
    the first of its kind that combined JSF and the then new and fresh AJAX technology.
    The beauty of Ajax4Jsf was that it could add AJAX support to existing components,
    which weren’t built with AJAX support in mind at all by enclosing them among others
    in the <a4j:region> tag. This technology was incorporated in the Exadel Visual
    Component Platform, which was released in March 2006 and would later be renamed
    RichFaces, and would become one of the most memorable JSF component libraries.


    At around the same time Alexander Smirnov started work on what eventually would
    become RichFaces, a company called ICEsoft started working on a JSF component
    library. ICEsoft had been in business for a couple of years and had been working
    on a product called ICEbrowser, a Java-based browser, and a product called ICEbrowser
    beans, which were “lightweight, configurable Javabean components that can be rapidly
    integrated into Java client applications.” During JavaOne 2005 of that year, on
    27 June, ICEsoft announced their its component library for JSF—ICEfaces. This
    was based on AJAX as well but incorporated AJAX directly into the components.
    ICEsoft called its specific technique “patent pending Direct-to-DOM™,” which basically
    meant that changes coming from the server were directly injected into the DOM
    tree structure of a web page. A final version wasn’t available right away though,
    but an early access release was provided. This was closed source but cost-free.


    Meanwhile, JSF EG member Jacob Hookom, inspired by Hans Bergsten’s concerns about
    the unsuitability of JSP, grabbed the bull by the horns and started working himself
    on that alternative templating language envisioned by Bergsten. In August 2005
    this work had progressed into a usable initial version. The name of this templating
    language? Facelets! It immediately took the JSF world by storm. Kito Mann published
    the first part of a series of articles about it on JSFCentral the very first month,
    and Richard Hightower published the famous article “Facelets fits JSF like a glove”
    several months later.


    Oracle had not been sitting still either in 2005, and after about 16(!) early
    access releases it announced in late 2005 at the JavaPolis conference in Antwerpen
    (nowadays called Devoxx) that ADF Faces would be donated to MyFaces and thus become
    open source.


    In the first month of 2006, Jacob Hookom and Adam Winer contemplated the terrible
    implementation of JSF’s state save mechanism. This worked by first creating a
    component tree from a template and then, near the end of the request, blindly
    serializing the entire tree with all data that may have been put there during
    the request. During a postback the tree is restored from this serialized form
    (hence the name of the phase “restore view”). This is a tremendous waste, as the
    majority of this information is already available in the template. Especially
    when doing AJAX requests with client-side state saving this poses a very big burden,
    but it is also a problem when storing this state on the server as it massively
    increases JSF’s memory usage. One of the main reasons for doing state saving in
    such terrible way again has to do with that one decision: to support JSP. With
    JSF 1.2 about to go final, there was unfortunately no time left to fix this for
    version 1.2.


    Even though it was clear at this point that Facelets was the future of JSF, when
    JSF 1.2 was eventually released in May 2006 it still contained only JSP. Not all
    was bad though. Thanks to a cooperation between the JSF and JSP EGs, a revision
    of JSP was released, JSP 2.1, which was much better aligned with the demands of
    JSF. On top of that, JSP’s expression language and JSF’s expression language were
    merged. The result was UEL (Unified Expression Language). A very practical advantage
    of UEL is that JSF components no longer have to convert Strings manually into
    expressions but directly receive a ValueExpression from the templating language.
    Both JSP 2.1 and JSF 1.2 became part of Java EE 5, which was released at the same
    time.


    On June 13, 2006, the MyFaces community announced that the donated project would
    have its name changed to Trinidad. ADF Faces kept existing at Oracle, though,
    but was based on Trinidad with some extra features (such as support for Portals,
    JSR 227, etc.). Just two weeks prior to that, on May 31, 2006, ICEsoft announced
    its free, although still closed source, community edition. A few months later,
    on November 14, 2006, ICEsoft would fully open source ICEfaces under the MPL license.
    RichFaces, still closed source at that point and being sold by Exadel, would not
    stay behind for long though, and some four months later, on March 29, 2007, Exadel
    announced a partnership with Red Hat that made RichFaces available under an open
    source license and available and supported via its JBoss group.'
