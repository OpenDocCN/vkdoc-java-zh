  trans: "\n## 急切初始化\n\n默认情况下，托管 bean 在首次被 EL 表达式引用或作为注入依赖项时才会进行懒加载。通过观察特定作用域初始化的观察者方法，可以使托管\
    \ bean 在任何作用域启动时进行急切初始化。之前在“@ViewScoped”部分曾给出过一个示例。方法模式如下：\n\n```\npublic void\
    \ startup(@Observes @Initialized(XxxScoped.class) S scope) {\n    // ...\n}\n\
    ```\n\n其中 `XxxScoped.class` 可以是任何兼容 CDI 的作用域，`S` 代表该作用域的所有者。对于以下作用域，对应关系如下：\n\n\
    *   `ApplicationScoped.class` – `javax.servlet.ServletContext`\n*   `SessionScoped.class`\
    \ – `javax.servlet.http.HttpSession`\n*   `ConversationScoped.class` – `javax.servlet.ServletRequest`\n\
    *   `FlowScoped.class` – `javax.faces.flow.Flow`\n*   `ViewScoped.class` – `javax.faces.component.UIViewRoot`\n\
    *   `RequestScoped.class` - `javax.servlet.ServletRequest`\n\n请注意，为了使 `@Observes\
    \ @Initialized` 生效，包含该方法的 bean 的作用域必须至少与观察的作用域相同。对于应用作用域的托管 bean，急切初始化的优势在于，你可以将其配置为“启动”bean，而无需在其他\
    \ bean 中引用它来触发初始化。\n\n```\n@ApplicationScoped\npublic class Startup {\n\npublic\
    \ void contextInitialized\n        (@Observes @Initialized(ApplicationScoped.class)\n\
                ServletContext context)\n    {\n        // ...\n    }\n}\n```\n\n\
    对于请求作用域的 bean，急切初始化的优势在于，如有必要，你可以在 `FacesServlet` 被调用之前很久就发起异步数据库查询。\n\n```\n\
    @Named @RequestScoped\npublic class EagerProducts {\n\nprivate Future<List<Product>>\
    \ list;\n\n@Inject\n    private ProductService productService;\n\npublic void\
    \ requestInitialized\n        (@Observes @Initialized(RequestScoped.class)\n            HttpServletRequest\
    \ request)\n    {\n        if (\"/products.xhtml\".equals(request.getServletPath()))\
    \ {\n            list = productService.asyncList();\n        }\n    }\n\npublic\
    \ List<Product> getList() {\n        try {\n            return list.get();\n        }\n\
            catch (InterruptedException e) {\n            Thread.currentThread().interrupt();\n\
                throw new FacesException(e);\n        }\n        catch (ExecutionException\
    \ e) {\n            throw new FacesException(e);\n        }\n    }\n}\n```\n\n\
    其中 `ProductService` 的代码如下：\n\n```\n@Stateless\npublic class ProductService {\n\
    \n@TransactionAttribute(SUPPORTS)\n    public List<Product> list() {\n        return\
    \ entityManager\n            .createQuery(\"FROM Product ORDER BY id DESC\", Product.class)\n\
                .getResultList();\n    }\n\n@Asynchronous\n    public Future<List<Product>>\
    \ asyncList() {\n        return new AsyncResult<>(list());\n    }\n}\n```\n\n\
    请特别注意 `requestInitialized()` 方法，它观察任何请求作用域的启动，因此需要预先确定实际路径，以避免不必要地访问业务服务。在这个具体示例中，只有当请求到达\
    \ `/products.xhtml` 时才会触发。该 JSF 页面可以像往常一样直接引用产品列表。\n\n```\n<h:dataTable value=\"\
    #{eagerProducts.list}\" var=\"product\">\n    ...\n</h:dataTable>\n```\n\n当打开这个\
    \ JSF 页面时，请求作用域的 bean 会在 `FacesServlet` 被调用之前初始化，并异步从数据库获取 `List<Products>`。根据所使用的服务器硬件、可用的服务器资源以及在第一个\
    \ Servlet 过滤器被调用到进入 JSF 渲染响应之间运行的所有代码，这种方法可能会为你提供 10ms ~ 500ms 的时间窗口（如果管道中存在低效代码，时间甚至可能更长），以便在与\
    \ HTTP 请求并行的不同线程中从数据库获取数据，从而获得与数据库获取数据所需时间相当的加速效果（这意味着该操作无需在与 HTTP 请求相同的线程中完成）。\n\
    \n## 分层\n\n在实现后台 bean 时，理解将 JSF 后台 bean 与 JPA 实体和 EJB 服务分离的重要性至关重要。换句话说，在开发后台\
    \ bean 时，应确保后台 bean 尽可能精简，并将尽可能多的模型属性委托给 JPA 实体，将业务逻辑委托给 EJB 服务。你应该认识到，JPA 实体和\
    \ EJB 服务应该能够在完全不同的前端（例如 JAX-RS 甚至纯 JSP/Servlet）中完全重用。\n\n这同样意味着，你应该确保不会直接或间接地在\
    \ JPA 实体或 EJB 服务中包含 JSF 特定的依赖项。例如，以下方法实际上是错误的：\n\n```\n@Entity\npublic class Product\
    \ {\n\n    private String name;\n    private String description;\n\n    public\
    \ static Product of(ProductBacking backingBean) {\n        Product product = new\
    \ Product();\n        product.setName(backingBean.getName());\n        product.setDescription(backingBean.getDescription());\n\
            return product;\n    }\n\n    // ...\n}\n```\n\n在这里，JPA 实体与 JSF 后台 bean\
    \ 紧密耦合。不仅实体的属性在后台 bean 中被重用，而且实体还依赖于后台 bean。这样就不可能将实体提取到一个可在不同 JSF Web 应用程序间重用的\
    \ JAR 模块中。\n\n以下方法实际上也是错误的：\n\n```\n@Stateless\npublic class ProductService {\n\
    \n    @Inject\n    private EntityManager entityManager;\n\n    public void create(Product\
    \ product) {\n        entityManager.persist(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
                new FacesMessage(\"Product created!\"));\n    }\n}\n```\n\n在这里，EJB\
    \ 直接操作 faces 上下文并设置消息。当从例如 JAX-RS 服务或 Servlet 调用该 EJB 方法时，这将导致 `NullPointerException`，因为那里不存在\
    \ faces 上下文的实例。这个 UI 消息传递任务不是后端代码的责任，而是前端代码的责任。换句话说，添加 faces 消息只应在 JSF 工件（例如后台\
    \ bean）中发生。\n\n正确的方法如下，正如之前在“模型、视图还是控制器？”部分中演示的那样：\n\n```\n@Named @RequestScoped\n\
    public class ProductBacking {\n\n    private Product product = new Product();\n\
    \n    @Inject\n    private ProductService productService;\n\n    public void save()\
    \ {\n        productService.create(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
                new FacesMessage(\"Product created!\"));\n    }\n\n    public Product\
    \ getProduct() {                                                          \n        return\
    \ product;\n    }\n}\n```\n"
- fmt: "# Naming Conventions\n\nThere is no strict convention specified by JSF itself.\
    \ I’ve seen the following conventions across various JSF projects:\n\n- `Foo`\n\
    - `FooBean`\n- `FooBacking`\n- `FooBackingBean`\n- `FooManager`\n- `FooManagedBean`\n\
    - `FooController`\n\nwhereby `Foo` can in turn represent one of the following:\n\
    \n- JSF view ID, e.g., `EditProduct` for `/edit/product.xhtml`\n- JSF view name,\
    \ e.g., `Products` for `/view/products.xhtml`\n- JPA entity name, e.g., `Product`\
    \ for `@Entity` class `Product`\n- JSF form ID, e.g., `EditProduct` for `<h:form\
    \ id=\"editProduct\">`\n\nFirst and foremost, names ending with `Bean` like `FooBean`,\
    \ `FooBackingBean`, and `FooManagedBean` must be avoided to all extent. The “bean”\
    \ suffix is superfluous and too ambiguous as practically any class in Java can\
    \ be marked as a JavaBean. You don’t immediately use `ProductBean` for your JPA\
    \ entity or `ProductServiceBean` or even `ProductServiceEnterpriseBean` for your\
    \ EJB service, right? True, `#{bean}` or `#{myBean}` or even `#{yourBean}` to\
    \ indicate a JSF or CDI managed bean is very often used across generic code examples\
    \ in blogs, forums, Q&A sites, and even this book. But this is merely done for\
    \ clarity and simplicity of the code snippets.\n\nThat leaves us with `Foo`, `FooBacking`,\
    \ `FooManager`, and `FooController`. All are equally acceptable. Personally, I\
    \ tend to use `FooBacking` for request-, view-, flow-, and conversation-scoped\
    \ beans, and `FooManager` for session- and application-scoped beans. As to the\
    \ naming convention of `Foo` part, that generally depends on whether the backing\
    \ bean is tightly tied to a particular JSF view or a JSF form, or generally reusable\
    \ across multiple JSF views or forms referring a particular entity.\n\nIn any\
    \ case, this is a pretty subjective item which can hardly be answered objectively\
    \ with “the One and Correct” answer. It really doesn’t matter that much to me\
    \ or anyone else what you make of it, as long as you’re consistent with it throughout\
    \ the entire project.\n\n# Footnotes\n\n[1](https://en.wikipedia.org/wiki/Model%E2%80%93view%E2%80%93controller)\n\
    [2](https://stackoverflow.com/q/3106452/157882)\n[3](https://javaee.github.io/javaee-spec/javadocs/javax/inject/Named.html)\n\
    [4](http://balusc.omnifaces.org/2013/10/how-to-install-cdi-in-tomcat.html)\n[5](http://butunclebob.com/ArticleS.UncleBob.SingletonVsJustCreateOne)\n\
    [6](https://github.com/weld/core/blob/master/modules/jsf/src/main/java/org/jboss/weld/module/jsf/ConversationAwareViewHandler.java)\n\
    [7](https://javaee.github.io/javaee-spec/javadocs/javax/faces/flow/builder/FlowBuilder.html)\n\
    [8](https://stackoverflow.com/q/4105439/157882)\n[9](http://showcase.omnifaces.org/cdi/ViewScoped)\n\
    [10](https://developer.mozilla.org/en-US/docs/Web/API/Navigator/sendBeacon)\n\
    [11](https://en.wikipedia.org/wiki/Law_of_Demeter)\n[12](https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/Flash.html%23setKeepMessages-boolean-)\n\
    [13](https://javaee.github.io/javaee-spec/javadocs/javax/faces/annotation/package-summary.html)\n\
    \n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz and Arjan Tijms, The Definitive\
    \ Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_9](https://doi.org/10.1007/978-1-4842-3387-0_9)\n\
    \n# 9. Exception Handling\n\nBauke Scholtz (1) and Arjan Tijms (2)\n\n(1) Willemstad,\
    \ Curaçao  \n(2) Amsterdam, Noord-Holland, The Netherlands\n\nSometimes things\
    \ can unexpectedly go wrong. In Java, that usually manifests as an `Exception`\
    \ being thrown. In Java EE, it’s basically no different. The issue is how and\
    \ when to properly handle them. By default, any uncaught exception during an HTTP\
    \ request will end up in a default error page provided by the application server.\
    \ Figure 9-1 shows what WildFly’s default HTTP 500 error page looks like:\n\n\
    ![A454457_1_En_9_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_9_Fig1_HTML.jpg)\n\n\
    ###### Figure 9-1 The default HTTP 500 error page of WildFly 11.0.0\n\nThe JSF\
    \ (JavaServer Faces) implementation being used may even provide its own default\
    \ error page. Both Mojarra and MyFaces provide an internal default implementation\
    \ based on the `javax.faces.context.ExceptionHandler` API, which is only shown\
    \ when the JSF project stage is set to `Development`. Figure 9-2 shows how that\
    \ page looks for Mojarra.\n\n![A454457_1_En_9_Fig2_HTML.jpg](OEBPS/Images/A454457_1_En_9_Fig2_HTML.jpg)\n\
    \n###### Figure 9-2 The default HTTP 500 error page of Mojarra 2.3.3 in development\
    \ stage\n\nIt not only includes the stack trace but also the textual representation\
    \ of the JSF component tree and any scoped variables, which might be helpful in\
    \ nailing down the root cause, although, in reality, the stack trace alone and\
    \ re-executing the use case with a debugger is much more helpful than that."
