  raw: '# 3. Components


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    JSF (JavaServer Faces) is a component-based MVC (Model-View-Controller) framework.
    In essence, JSF parses the view definition into a “component tree.” The root of
    this tree is represented by the “view root” instance associated with the current
    instance of the faces context.


    ```

    UIComponent tree = FacesContext.getCurrentInstance().getViewRoot();

    ```


    The view is usually defined using XHTML+XML markup in a Facelets file. XML is
    a markup language which is very suitable for defining a tree hierarchy using a
    minimum of code. The component tree can also be created and manipulated using
    Java code in a Java class, but this generally ends up in very verbose code in
    order to declare value or method expressions and to correlate parents and children
    with each other. Frequently, developers who do so aren’t aware of how tag handlers
    such as JSTL (JavaServer Pages Standard Tag Library) can be used to manipulate
    the component tree using just XML .


    The component tree basically defines how JSF should consume the HTTP request in
    order to apply request values coming from input components, convert and validate
    them, update the managed bean model values, and invoke the managed bean action.
    It also defines how JSF should produce the HTTP response by generating the necessary
    HTML output using renderers tied to the components whose attributes can in turn
    reference managed bean properties. In other words, the component tree defines
    how the phases of the JSF life cycle should be processed. The diagram in Figure
    [3-1](#A454457_1_En_3_Chapter.xhtml#Fig1) shows how a HTTP postback request is
    usually being processed by JSF.


    ![A454457_1_En_3_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_3_Fig1_HTML.jpg)


    ###### Figure 3-1 How JSF processes the HTTP postback request within the MVC architecture
    (the numbers represent the ordering)


    Following is a brief description of each step :


    1.  End user sends a HTTP request which matches the mapping of the FacesServlet
    and thus invokes it.


    2.  The FacesServlet will build the component tree based on the Facelet file identified
    by the HTTP request path.


    3.  The component tree will if necessary get the current model values from the
    backing bean during building the view. Any attribute of a Facelets template tag
    and a JSTL core tag and only the "id" and "binding" attributes of a JSF component
    will get executed.


    4.  The FacesServlet will restore the JSF view state on the component tree.


    5.  The FacesServlet will let the component tree apply the HTTP request parameters
    and input components will store them as “submitted value.”


    6.  The input and command components will if necessary get the current model values
    from the backing bean during consulting the "rendered", "disabled", and "readonly"
    attributes in order to check whether they are allowed to apply the request parameters.


    7.  The command components will queue the ActionEvent when it detects, based on
    HTTP request parameters, that it was being invoked in the client side.


    8.  The FacesServlet will let the component tree process all registered converters
    and validators on the submitted values and input components will store the newly
    converted and validated value as “local value.”


    9.  The input components will get the old model value from the backing bean and
    compare them with the new value.


    10.  If the new value is different from the old model value, then the input component
    will queue the ValueChangeEvent.


    11.  When all conversion and validation are finished, the FacesServlet will invoke
    the listener methods of any queued ValueChangeEvent on the backing bean.


    12.  The FacesServlet will let the component tree update all model values.


    13.  The input components will set the new model values in the backing bean.


    14.  The FacesServlet will invoke the listener methods of any queued ActionEvent
    on the backing bean.


    15.  The final action method of the backing bean will if necessary return a non-null
    String outcome referring the target view.


    16.  The FacesServlet will let the component tree render the response.


    17.  The component tree will if necessary get the current model values from the
    backing bean during generating the HTML output. Practically any attribute of a
    Facelet component and a JSF component which is involved in generating the HTML
    output will get executed.


    18.  The component tree will write the HTML output to the HTTP response.


    19.  The FacesServlet will return the HTTP response to the end user.


    This is different from a request-based MVC framework wherein the developer needs
    to write more boilerplate code in the “controller” class associated with the view
    in order to define which request parameters need to be applied, and/or how they
    should be converted and validated before populating the entity. The developer
    also often needs to manually populate the entity by manually invoking a bunch
    of getters and setters before passing the entity to the service layer while invoking
    the action. This all is unnecessary in JSF.


    It should be noted that the backing bean has a rather unique position in the MVC
    paradigm. It can act as a Model, a View, and the Controller, depending on the
    point of view. This is detailed in Chapter [8](#A454457_1_En_8_Chapter.xhtml).


    ## Standard HTML Components


    The default JSF implementation already provides an extensive set of components
    for authoring HTML pages with the help of Facelets view technology. Those HTML
    components are available under the [http://xmlns.jcp.org/jsf/html](http://xmlns.jcp.org/jsf/html)
    XML namespace URI (Uniform Resource Identifier) which should be assigned to the
    "h" XML namespace prefix.


    ```

    xmlns:h="http://xmlns.jcp.org/jsf/html"

    ```


    The most important HTML components which should always be present in your JSF
    page are the <h:head> and <h:body>. Without them, JSF won’t be able to auto-include
    any script or stylesheet resources associated with a particular component. For
    example, the <h:commandButton>, which generates a HTML submit button, requires
    for its Ajax functionality the jsf.js script file to be included in the HTML document.


    *   <h:commandButton>, generates a HTML submit button.


    *   <h:commandButton>, can optionally contain Ajax functionality.


    *   The Ajax functionality requires a jsf.js script file in the HTML document.


    The renderer of that component will automatically take care of that, but that
    would only work if <h:head> is present. The <h:body> is slightly less important
    here, but there may exist components which need to add a script to the end of
    the HTML body, such as the <f:websocket>. In other words, the most minimal and
    HTML5-valid JSF page would look as follows:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>Title</title>

        </h:head>

        <h:body>

            ...

        </h:body>

    </html>

    ```


    The generated HTML response, as you can inspect by right- clicking *View page
    source* in the average web browser , should look as follows:


    ```

    <!DOCTYPE html>

    <html lang="en" xmlns:="http://www.w3.org/1999/xhtml">

        <head>

            <title>Title</title>

        </head>

        <body>

            ...

        </body>

    </html>

    ```


    You see, JSF basically replaces all components in the page by their generated
    HTML output. As discussed previously, JSF provides an extensive set of standard
    HTML components . Table [3-1](#A454457_1_En_3_Chapter.xhtml#Tab1) provides an
    overview.'
