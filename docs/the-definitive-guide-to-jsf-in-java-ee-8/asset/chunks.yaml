    private ResourceBundle getCurrentInstance() {

            FacesContext context = FacesContext.getCurrentInstance();

            String key = CONTROL.getClass().getName();

            return (ResourceBundle) context.getAttributes()

                .computeIfAbsent(key, k -> ResourceBundle.getBundle(key,

                    context.getViewRoot().getLocale(),

                    Thread.currentThread().getContextClassLoader(),

                    CONTROL));

        }


    private static class DatabaseControl extends Control {

            @Override

            public ResourceBundle newBundle

                (String baseName, Locale locale, String format,

                    ClassLoader loader, boolean reload)

                throws IllegalAccessException, InstantiationException,

                    IOException

            {

                FacesContext context = FacesContext.getCurrentInstance();

                final Object[][] contents = CDI.current()

                    .select(TranslationService.class).get()

                    .getContent(

                        locale,

                        context.getApplication().getDefaultLocale());

                return new ListResourceBundle() {

                    @Override

                    protected Object[][] getContents() {

                        return contents;

                    }

                };

            }

        }

    }

    ```


    最后，调整 `faces-config.xml` 中的 `<resource-bundle><base-name>` 条目，指定自定义 `ResourceBundle`
    的完全限定名称，如下所示：


    ```

    <base-name>com.example.project.i18n.DatabaseResourceBundle</base-name>

    ```


    坦白说，这个 `ResourceBundle` 的实际实现有些取巧，仅仅是因为存在以下限制：


    1.  JSF 不允许通过 `faces-config.xml` 定义自定义的 `ResourceBundle.Control`。


    2.  通过 SPI（串行外设接口）以 `java.util.spi.ResourceBundleControlProvider` 方式提供自定义的 `ResourceBundle.Control`
    在 WAR 中无法生效。


    3.  为 `faces-config.xml` 中注册的每个区域设置创建多个独立的 `DatabaseResourceBundle` 子类，例如 `DatabaseResourceBundle_en`、`DatabaseResourceBundle_pt_BR`
    和 `DatabaseResourceBundle_hi`，以满足默认的 `ResourceBundle.Control` 行为，从长远来看不利于维护。


    此方法的另一个优点是，它允许您通过简单地调用 `ResourceBundle#clearCache()` 以编程方式清除缓存中的任何数据库包。也就是说，JSF
    实现可能会在其 `Application` 实现中进一步缓存它，导致 `ResourceBundle#clearCache()` 似乎完全没有效果。已知 Mojarra
    会这样做。⁹


    ## ResourceBundle 中的 HTML


    这是一种不良实践。它会增加维护负担。对于大段内容，您最好选择比 HTML 更轻量级的标记语言，例如 Markdown。¹⁰ 这不仅在 XSS（跨站脚本）风险方面更安全，而且用户通过某些内容管理系统（CMS）界面中的文本区域进行编辑也更容易。最好结合基于数据库的资源包来实现这一点。您可以向
    `Translation` 模型添加一个额外的布尔标志，指示该值是否应解析为 Markdown。


    ```

    @Column(nullable = false)

    private boolean markdown;

    ```


    然后，在 `TranslationService#getContents()` 内部，将其作为第三列进行选择。


    ```

    "SELECT t1.key, COALESCE(t2.value, t1.value), t1.markdown"

    ```


    最后，在 `DatabaseControl#newBundle()` 方法中，检索内容后，您可以根据该布尔值对它们进行后处理。您可以为此使用任何基于 Java
    的 Markdown 库，例如 CommonMark。¹¹


    ```

    static final Parser PARSER = Parser.builder().build();

    static final HtmlRenderer RENDERER = HtmlRenderer.builder().build();

    ...

    for (Object[] translation : contents) {

        if ((boolean) translation[2]) {

            translation[1] = RENDERER.render(PARSER.parse(translation[1]));

        }

    }

    ```


