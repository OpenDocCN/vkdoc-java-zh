- fmt: "# Channel Design Hints\n\nYou can declare multiple push channels on different\
    \ scopes with or without user target throughout the application. However, be aware\
    \ that the same channel name can easily be reused across multiple views, even\
    \ if it is view scoped. It’s more efficient if you use as few different channel\
    \ names as possible and tie the channel name to a specific push socket scope/user\
    \ combination, not to a specific JSF view. In case you intend to have multiple\
    \ view-scoped channels for different purposes, it is best to use only one view-scoped\
    \ channel and have a global JavaScript listener which can distinguish its task\
    \ based on the delivered message, for example, by sending the message in a server\
    \ as follows:\n\n```\nMap<String, Object> message = new HashMap<>();\nmessage.put(\"\
    functionName\", \"someFunction\");\nmessage.put(\"functionData\", functionData);\
    \ // Can be Map or Bean.\nsomeChannel.send(message);\n```\n\nwhich is then processed\
    \ in the `onmessage` JavaScript listener function as follows:\n\n```\nfunction\
    \ someSocketListener(message) {\n    window[message.functionName](message.functionData);\n\
    }\n\nfunction someFunction(data) {\n    // ...\n}\n\nfunction otherFunction(data)\
    \ {\n    // ...\n}\n\n// ...\n```\n\n# One-Time Push\n\nYou can use the `connected`\
    \ attribute to prevent the socket from automatically connecting during page load.\n\
    \n```\n<f:websocket ... connected=\"false\" />\n```\n\nThis is particularly useful\
    \ when you want to perform a one-time push of the result after invoking a view-scoped\
    \ Ajax action method which might take a bit more time to complete, and you’d like\
    \ the user to immediately continue using the very same page without being annoyed\
    \ about a “slow web site” experience. This approach only requires a bit of additional\
    \ work with the `jsf.push` JavaScript API (application programming interface).\
    \ It has three functions, but only two are of interest to us: `jsf.push.open(...)`\
    \ and `jsf.push.close(...)`. The third one, `jsf.push.init(...)`, basically initializes\
    \ the socket and that’s up to the renderer of the `<f:websocket>` tag.\n\nRight\
    \ before invoking the Ajax action method, you’d need to explicitly open the socket\
    \ by invoking the `jsf.push.open(...)` function with the socket client ID as argument.\
    \ And right after the push message arrives, you’d need to explicitly close the\
    \ socket by invoking the `jsf.push.close(...)` function with the socket client\
    \ ID as argument. The following example demonstrates this approach:\n\n```\n<script>\n\
    \    function startLongRunningProcess() {\n        jsf.push.open(\"push\");\n\
    \        document.getElementById(\"status\").innerHTML =\n            \"Long running\
    \ process has started ...\";\n    }\n    function endLongRunningProcess(result)\
    \ {\n        jsf.push.close(\"push\");\n        document.getElementById(\"status\"\
    ).innerHTML = result;\n    }\n</script>\n<h:form>\n    <h:commandButton value=\"\
    submit\"\n        onclick=\"startLongRunningProcess()\"\n        action=\"#{longRunningProcess.submit}\"\
    >\n        <f:ajax />\n    </h:commandButton>\n</h:form>\n<div id=\"status\" />\n\
    <f:websocket id=\"push\" channel=\"push\" scope=\"view\"\n    connected=\"false\"\
    \ onmessage=\"endLongRunningProcess\">\n</f:websocket>\n```\n\nIt must be said\
    \ that it’s a poor practice to put JavaScript code right in the HTML source as\
    \ shown above. It’s, of course, for demonstration purposes only. For better maintenance,\
    \ performance, and tooling support, you should, in real-world code, put JavaScript\
    \ code in a JS file and include it via `<h:outputScript>`. And then I’m not talking\
    \ about the lack of jQuery magic for demonstration purposes.\n\nIn the example,\
    \ opening the socket is performed during the `onclick` of the command button.\
    \ The `onmessage` listener function in turn closes the socket. Of course, you\
    \ can also keep the socket open all the time without fiddling with JavaScript,\
    \ but it may be a waste of resources if the socket isn’t used for purposes other\
    \ than presenting the result of a view-scoped Ajax action method. Here is what\
    \ the associated backing bean looks like:\n\n```\n@Named @RequestScoped\npublic\
    \ class LongRunningProcess {\n\n    @Inject\n    private LongRunningProcessService\
    \ service;\n\n    @Inject @Push\n    private PushContext push;\n\n    public void\
    \ submit() {\n        service.asyncSubmit(result -> push.send(result));\n    }\n\
    }\n```\n\nAnd here is what the service class looks like:\n\n```\n@Stateless\n\
    public class LongRunningProcessService {\n\n    @Asynchronous\n    public void\
    \ asyncSubmit(Consumer<String> callback) {\n        String result = someLongRunningProcess();\n\
    \        callback.accept(result);\n    }\n\n}\n```\n\nNote the EJB `@Asynchronous`\
    \ annotation. This is very important in this construct. It will ensure that the\
    \ EJB (Enterprise Java Bean) method is executed in a separate thread. This allows\
    \ the backing bean method to return immediately without waiting for the EJB method\
    \ to complete.\n\n# Stateful UI Updates\n\nAs you may have noticed, the `onmessage`\
    \ JavaScript listener function is generally only useful for small stateless tasks,\
    \ such as displaying a feedback message or adding a new item to some stateless\
    \ list using JavaScript. It isn’t terribly useful when you want to update a stateful\
    \ UI (user interface) represented by another JSF component. Think of replacing\
    \ a trivial loading image with a whole JSF table.\n\nFor that you’d better nest\
    \ `<f:ajax>` listening on a specific push message. Via its `render` attribute\
    \ you have the opportunity to automatically update an arbitrary JSF component\
    \ in an incoming push message. Following is an example which initially shows a\
    \ loading image and then the table when it’s ready to load:\n\n```\n<h:form>\n\
    \    <f:websocket channel=\"push\" scope=\"view\">\n        <f:ajax event=\"loaded\"\
    \ render=\":results\" />\n    </f:websocket>\n</h:form>\n<h:panelGroup id=\"results\"\
    \ layout=\"block\">\n    <h:graphicImage name=\"images/loading.gif\"\n       \
    \ rendered=\"#{empty longRunningSearch.results}\">\n    </h:graphicImage>\n  \
    \  <h:dataTable value=\"#{longRunningSearch.results}\" var=\"result\"\n      \
    \  rendered=\"#{not empty longRunningSearch.results}\">\n        <h:column>#{result.id}</h:column>\n\
    \        <h:column>#{result.name}</h:column>\n        <h:column>#{result.value}</h:column>\n\
    \    </h:dataTable>\n</h:panelGroup>\n```\n\nNote that `<f:websocket>` is placed\
    \ in `<h:form>`. This is mandatory when it has `<f:ajax>` nested. Normally this\
    \ is not required. Here is what the backing bean looks like:\n\n```\n@Named @ViewScoped\n\
    public class LongRunningSearch implements Serializable {\n\n    private List<Result>\
    \ results;\n\n    @Inject\n    private LongRunningSearchService service;\n\n \
    \   @Inject @Push\n    private PushContext push;\n\n    @PostConstruct\n    public\
    \ void init() {\n        service.asyncLoadResults(results -> {\n            this.results\
    \ = results;\n            push.send(\"loaded\");\n        });\n    }\n\n    public\
    \ List<Result> getResults() {\n        return results;\n    }\n}\n```\n\nNote\
    \ that the push message `\"loaded\"` matches exactly the `<f:ajax event>` value.\
    \ You can use any value you want and you can nest as many `<f:ajax>` tags as you\
    \ need. It’s important that the managed bean is `@ViewScoped` as the Ajax call\
    \ is basically performed in a different request within the same view. Finally\
    \ the service class looks as follows:\n\n```\n@Stateless\npublic class LongRunningSearchService\
    \ {\n\n    @Asynchronous\n    public void asyncLoadResults(Consumer<List<Result>>\
    \ callback) {\n        List<Result> results = someLongRunningProcess();\n    \
    \    callback.accept(results);\n    }\n}\n```\n\nThe `someLongRunningProcess()`\
    \ method represents your implementation of some long-running process (e.g., calling\
    \ a third-party web service API)."
