    # 5. 转换与验证


    Bauke Scholtz^(1 ) 和 Arjan Tijms²


    (1) 库拉索岛威廉斯塔德


    (2) 荷兰北荷兰省阿姆斯特丹


    JSF（JavaServer Faces）作为一个基于 HTML 表单的 MVC（模型-视图-控制器）框架，其核心基本上需要一直在 Java 对象（实体、Bean、值对象、数据传输对象等）和字符序列（字符串）之间进行转换。HTTP
    请求基本上被分解为表示标头和参数的纯文本字符串，而不是 Java 对象。HTTP 响应基本上被写成一个表示 HTML 或 XML 的大字符序列，而不是某种
    Java 对象的序列化形式。然而，JSF 页面背后的普通 Java 模型并不一定到处都包含 String 属性。那将违背 Java 强类型化的特性。这就是转换器发挥作用的地方：在模型中的对象和视图中的字符串之间进行转换。


    在使用新提交的（并在必要时转换后的）值更新模型值之前，你当然希望验证它们是否符合 Web 应用程序的业务规则，并在必要时向最终用户显示信息性错误消息，以便他们可以自行修复任何错误。通常，业务规则已经在数据存储（例如关系数据库管理系统）中得到了很好的定义。一个设计良好的数据库表已经在数据类型、最大大小、可空性和唯一性方面有严格的约束。你作为前端开发人员，应该绝对确保提交和转换后的值可以无误地插入到数据库中。


    例如，如果电子邮件地址列被约束为唯一且不可为空的列，最大长度为 254 个字符，那么你应该确保在将其插入数据库之前，提交的值已按此要求进行验证。否则，数据库插入将抛出一些异常，通常很难将其分解为详细信息来告知最终用户确切的错误。这就是验证器发挥作用的地方：在更新模型之前验证提交（和转换）的值。


    ## 标准转换器


    JSF 从一开始就提供了一组开箱即用的标准转换器。其中大多数甚至基于模型属性的 Java 类型完全透明地完成其工作。它们都在 `javax.faces.convert`
    包¹中，并且都实现了 `Converter<T>` 接口。表 5-1 提供了它们的概览。

    '
- fmt: "###### Table 5-1 Standard Converters Provided by JSF\n\n| Converter class\
    \ | Converter ID | Converter tag | Value type | Since |\n| --- | --- | --- | ---\
    \ | --- |\n| `BigDecimalConverter` | `javax.faces.BigDecimal` | n/a | `java.math.BigDecimal`\
    \ | 1.0 |\n| `BigIntegerConverter` | `javax.faces.BigInteger` | n/a | `java.math.BigInteger`\
    \ | 1.0 |\n| `BooleanConverter` | `javax.faces.Boolean` | n/a | `boolean`/`java.lang.Boolean`\
    \ | 1.0 |\n| `ByteConverter` | `javax.faces.Byte` | n/a | `byte`/`java.lang.Byte`\
    \ | 1.0 |\n| `CharacterConverter` | `javax.faces.Character` | n/a | `char`/`java.lang.Character`\
    \ | 1.0 |\n| `DateTimeConverter` | `javax.faces.DateTime` | `<f:convertDateTime>`\
    \ | `java.util.Date` `java.time.LocalDate` `java.time.LocalTime` `java.time.OffsetTime`\
    \ `java.time.LocalDateTime` `java.time.OffsetDateTime` `java.time.ZonedDateTime`\
    \ | 1.0 2.3 2.3 2.3 2.3 2.3 2.3 |\n| `DoubleConverter` | `javax.faces.Double`\
    \ | n/a | `double`/`java.lang.Double` | 1.0 |\n| `EnumConverter` | `javax.faces.Enum`\
    \ | n/a | `enum`/`java.lang.Enum` | 1.0 |\n| `FloatConverter` | `javax.faces.Float`\
    \ | n/a | `float`/`java.lang.Float` | 1.0 |\n| `IntegerConverter` | `javax.faces.Integer`\
    \ | n/a | `int`/`java.lang.Integer` | 1.0 |\n| `LongConverter` | `javax.faces.Long`\
    \ | n/a | `long`/`java.lang.Long` | 1.0 |\n| `NumberConverter` | `javax.faces.Number`\
    \ | `<f:convertNumber>` | `java.lang.Number` | 1.0 |\n| `ShortConverter` | `javax.faces.Short`\
    \ | n/a | `short`/`java.lang.Short` | 1.0 |\n\nThe “Converter ID” column basically\
    \ specifies the converter identifier as you could specify in the `converter` attribute\
    \ of any `ValueHolder` component, or the `converterId` attribute of any nested\
    \ `<f:converter>` tag in order to activate the specific converter. All `UIOutput`\
    \ and `UIInput` components implement the `ValueHolder` interface. The converters\
    \ which say “n/a” in the “Converter tag” column are implicit converters. In other\
    \ words, you can just bind any bean property of type `BigDecimal`, `BigInteger`,\
    \ `boolean`/`Boolean`, `byte`/`Byte`, `char`/`Character`, `double`/`Double`, `enum`/`Enum`,\
    \ `float`/`Float`, `int`/`Integer`, `long`/`Long`, and `short`/`Short` to the\
    \ `value` attribute of any `ValueHolder` component and have JSF to automatically\
    \ convert it without any additional configuration. Only `<f:convertDateTime>`\
    \ and `<f:convertNumber>` require explicit registration, because the desired conversion\
    \ algorithm isn’t necessarily obvious from the model value alone.\n\nIn all `ValueHolder`\
    \ components, the converter will be invoked during the render response phase (sixth\
    \ phase), converting the non-String-based model value to a String suitable for\
    \ embedding in HTML. And in `EditableValueHolder` components, the converter will\
    \ also be invoked during the process validations phase (third phase), converting\
    \ the submitted String request parameter to the non-String-based model value.\
    \ The `EditableValueHolder` interface extends the `ValueHolder` interface and\
    \ is implemented by all `UIInput` components.\n\nHowever, this implicit conversion\
    \ doesn’t work on bean properties where those types are parameterized. Imagine\
    \ that you have a `List<Integer>` in the model and you’d like to be able to edit\
    \ it as follows:\n\n```\n<ui:repeat value=\"#{bean.integers}\" varStatus=\"loop\"\
    >\n    <h:inputText value=\"#{bean.integers[loop.index]}\" />\n</ui:repeat>\n\
    ```\n\nThen, after submitting, you would end up with unconverted String values\
    \ in the list and get baffled by class cast exceptions when attempting to iterate\
    \ over the list. The reason is that the EL (Expression Language) API (application\
    \ programming interface), which is responsible for processing those `#{...}` things\
    \ that are, behind the scenes, represented by `javax.el.ValueExpression` instances,\
    \ is in its current version not capable of detecting the parameterized type of\
    \ a generic collection and just returns `Object.class` on `ValueExpression#getType()`.\
    \ JSF can’t do much about that limitation of EL. All you can do is explicitly\
    \ specify the desired converter on the input component.\n\n```\n<ui:repeat value=\"\
    #{bean.integers}\" varStatus=\"loop\">\n    <h:inputText value=\"#{bean.integers[loop.index]}\"\
    \n        converter=\"javax.faces.Integer\">\n    </h:inputText>\n</ui:repeat>\n\
    ```\n\nAn alternative is to replace the `List<Integer>` by `Integer[]` or even\
    \ `int[]`. EL will then be able to recognize the value expression as an integer\
    \ type and hence JSF will be able to locate the desired converter for it. However,\
    \ plain arrays instead of collections in the model are a “no-no” these days.\n\
    \nComing back to the explicit standard converters `<f:convertNumber>` and `<f:convertDateTime>`,\
    \ those can also be nested in any `ValueHolder` component. The difference between\
    \ `<f:convertNumber>` and the implicit number-based converters is that the tags\
    \ allow more fine-grained setting of conversion options, such as the number type\
    \ or pattern, the amount of integer and/or fraction digits, whether grouping is\
    \ used, and the locale."
