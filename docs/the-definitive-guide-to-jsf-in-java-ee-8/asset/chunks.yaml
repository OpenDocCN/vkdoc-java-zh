    \ least during the view scope). Also note that the id attribute of each component\
    \ has a static suffix so that you don’t end up with “Duplicate component ID found\
    \ in view” exceptions.\n\n```\n<c:set> versus <ui:param> \n```\n\nThey are not\
    \ interchangeable. The <c:set> sets a variable in the EL scope , which is accessible\
    \ only after the tag location during the view build time, but anywhere else in\
    \ the view during the view render time. The <ui:param> should only be nested in\
    \ <ui:include>, <ui:decorate template>, or <ui:composition template> and sets\
    \ a variable in the EL scope of the Facelets template, which is accessible only\
    \ in the template itself. Older JSF versions had bugs whereby the <ui:param> variable\
    \ was also available outside the Facelets template in question. This should never\
    \ be relied upon.\n\nThe <c:set> without a scope attribute will behave like an\
    \ alias. It does not cache the result of the EL expression in any scope. Its primary\
    \ purpose is to be able to have a shortcut to a relatively long EL expression\
    \ which is repeated several times in the same Facelets file. It can thus be used\
    \ perfectly well inside, for example, iterating JSF components.\n\n```\n<ui:repeat\
    \ value=\"#{bean.products}\" var=\"product\">\n    <c:set var=\"price\" value=\"\
    #{product.price}\" />\n    #{price}\n</ui:repeat>\n```\n\nIt's only not suitable,\
    \ for example, for calculating the sum in a loop . The following construct will\
    \ never work:\n\n```\n<c:set var=\"total\" value=\"#{0}\" />\n<ui:repeat value=\"\
    #{bean.products}\" var=\"product\">\n    <c:set var=\"total\" value=\"#{total\
    \ = total + product.price}\" />\n    #{product.price}\n</ui:repeat>\nTotal price:\
    \ #{total}\n```\n\nFor that, use EL 3.0 stream API instead.\n\n```\n<ui:repeat\
    \ value=\"#{bean.products}\" var=\"product\">\n    #{product.price}\n</ui:repeat>\n\
    Total price: #{bean.products.stream().map(product->product.price).sum()}\n```\n\
    \nHowever, when you set the scope attribute with one of allowable values request,\
    \ view, session, or application, then it will be evaluated immediately during\
    \ the view build time and stored in the specified scope.\n\n```\n<c:set var=\"\
    DEV\"\n    value=\"#{facesContext.application.projectStage eq 'Development'}\"\
    \n    scope=\"application\" />\n```\n\nThis will be evaluated only once during\
    \ the first time this view is being built and available as an EL variable #{DEV}\
    \ throughout the entire application. You’d best declare such <c:set> in the master\
    \ template file which is used by every single Facelets file in the entire application.\
    \ Note that the EL variable is capitalized to conform to Java naming conventions\
    \ for constants.\n\n###### CAVEATS\n\nUsing JSTL tags will only lead to unexpected\
    \ results when a JSTL tag attribute references an EL variable which is not available\
    \ during view build time. Examples of such EL variables are those defined by var\
    \ attribute of iterating components such as <h:dataTable> and <ui:repeat>, and\
    \ those set in model by <f:viewParam>, <f:viewAction>, and <f:event type=\"preRenderView\"\
    >.\n\nIn a nutshell, use JSTL tags only to control flow of JSF component tree\
    \ building and use JSF UI components only to control flow of HTML output generation.\
    \ In JSTL tags, do not rely on EL variables which are not available during view\
    \ build time.\n\n## Manipulating the Component Tree\n\nThis can be done declaratively\
    \ using JSTL tags as well as programmatically using Java code. The JSTL approach\
    \ has already been elaborated in the previous section. It’s also possible to use\
    \ Java code instead. As a precaution, this generally ends up in very verbose and\
    \ hard-to-maintain code. Tree-based hierarchies in code are best readable and\
    \ maintainable when using a hierarchical markup language such as XML. Facelets\
    \ itself is already XML based. JSTL is also XML based and therefore seamlessly\
    \ integrates in a Facelets file. JSTL is therefore the recommended approach to\
    \ dynamically manipulate the component tree, rather than Java code.\n\nThe Javadoc\
    \ of javax.faces.component.UIComponent [⁹](#A454457_1_En_3_Chapter.xhtml#Fn9)\
    \ specifies when you could safely manipulate the component tree:\n\n> *Dynamically\
    \ modifying the component tree can happen at any time, during and after restoring\
    \ the view, but not during state saving and needs to function properly with respect\
    \ to rendering and state saving.*\n\nIn other words, the earliest moment when\
    \ you can guarantee safely modifying the component tree is during the PostAddToViewEvent\
    \ and the latest moment when you can guarantee safely modifying the component\
    \ tree is during the PreRenderViewEvent. Any moment in between is thus also possible.\
    \ Before the PostAddToViewEvent there’s not necessarily a means of a concrete\
    \ UIViewRoot instance. After the PreRenderViewEvent there’s a risk that the state\
    \ is already saved and you’d rather not get trapped here. In other words, manipulating\
    \ the component tree during the render response phase (sixth phase) is a bad idea.\n\
    \nWhen you intend to manipulate the component tree by means of adding new components\
    \ based on a Java model which is at least view scoped, then listen on the PostAddToViewEvent\
    \ of the parent component of interest. When you intend to manipulate the component\
    \ tree based on the fully built component tree by means of adding/moving/removing\
    \ components, then listen on the PreRenderViewEvent of the UIViewRoot.\n\nThe\
    \ following example programmatically populates a dynamic form based on a Java\
    \ model during the PostAddToViewEvent:\n\n```\n<h:form id=\"dynamicFormId\">\n\
        <f:event type=\"postAddToView\" listener=\"#{dynamicForm.populate}\" />\n\
    </h:form>\n```\n\nwherein the #{dynamicForm} looks something like the following:\n\
    \n```\n@Named @RequestScoped\npublic class DynamicForm {\n\nprivate transient\
    \ UIForm form;\n    private Map<String, Object> values = new HashMap<>();\n\n\
    @Inject\n    private FieldService fieldService;\n\npublic void populate(ComponentSystemEvent\
    \ event) {\n        form = (UIForm) event.getComponent();\n        List<Field>\
    \ fields = fieldService.list(form.getId());\n        fields.forEach(field -> field.populate(this));\n\
        }\n\npublic void createOutputLabel(Field field) {\n        HtmlOutputLabel\
    \ label = new HtmlOutputLabel();\n        label.setId(field.getName() + \"_l\"\
    );\n        label.setFor(field.getName());\n        label.setValue(field.getLabel());\n\
            form.getChildren().add(label);\n    }\n\npublic void createInputText(Field\
    \ field) {\n        HtmlInputText text = new HtmlInputText();\n        text.setId(field.getName());\
    \ // Explicit ID is required!\n        text.setLabel(field.getLabel());\n        text.setValueExpression(\"\
    value\", createValueExpression(field));\n        form.getChildren().add(text);\n\
        }\n\npublic void createMessage(Field field) {\n        HtmlMessage message\
    \ = new HtmlMessage();\n        message.setId(field.getName() + \"_m\");\n        message.setFor(field.getName());\n\
            form.getChildren().add(message);\n    }\n\npublic static ValueExpression\
    \ createValueExpression(Field field) {\n        String el = \"#{dynamicForm.values['\"\
    \ + field.getName() + \"']}\"\n        FacesContext context = FacesContext.getCurrentInstance();\n\
            ELContext elContext = context.getELContext();\n        return context.getApplication().getExpressionFactory()\n\
                .createValueExpression(elContext, el, Object.class);\n    }"
