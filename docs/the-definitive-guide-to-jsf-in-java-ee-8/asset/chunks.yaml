- fmt: "# GET forms\n\nJSF has no concept of “GET forms,” but you can just use plain\
    \ HTML for this. JSF supports processing GET request parameters and invoking managed\
    \ bean actions on GET requests. For this, `<f:viewParam>` and `<f:viewAction>`\
    \ can be used. They must be placed in `<f:metadata>` which in turn can only be\
    \ declared in the top-level page. So, when using templating, it must be declared\
    \ in the template client and you can’t declare it in the master template. In other\
    \ words, `<f:metadata>` cannot be shared across template clients.\n\nTechnically,\
    \ the location of `<f:metadata>` in the view doesn’t matter, as long as it’s in\
    \ the top-level page. Most self-documenting would be to put it in the very top\
    \ of the view, directly after the root tag.\n\n```\n<!DOCTYPE html>\n<html lang=\"\
    en\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n    <f:metadata>\n       \
    \ ...\n    </f:metadata>\n\n<h:head>\n        ...\n    </h:head>\n\n<h:body>\n\
    \        ...\n    </h:body>\n</html>\n```\n\nWhen using templating, give it its\
    \ own template definition.\n\n```\n<ui:composition template=\"/WEB-INF/templates/layout.xhtml\"\
    \n    xmlns:=\"http://www.w3.org/1999/xhtml\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\
    \ \"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n>\n    <ui:define name=\"\
    metadata\">\n        <f:metadata>\n            ...\n        </f:metadata>\n  \
    \  </ui:define>\n\n<ui:define name=\"content\">\n        ...\n    </ui:define>\n\
    </ui:composition>\n```\n\nNo, you can’t put `<f:metadata>` in the master template\
    \ and keep `<f:viewParam>` and `<f:viewAction>` in the template client. This is\
    \ a technical limitation. The best you can do is to create a custom `<f:event>`\
    \ type which runs after the invoke application phase (fifth phase) and then declare\
    \ it in the master template. An example is given in the section “Create Custom\
    \ Component Event” in Chapter [3](#A454457_1_En_3_Chapter.xhtml).\n\nThe `<f:viewParam>`\
    \ tag is backed by the `UIViewParameter` component which in turn extends from\
    \ `UIInput` superclass. This means that it behaves almost exactly like `<h:inputText>`,\
    \ but then for GET parameters. The subtle differences are found in the process\
    \ validations phase (third phase). By default, an empty parameter would skip any\
    \ custom validators and bean validation. For example, the `@NotNull` bean validation\
    \ annotation will only work when the context parameter `javax.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL`\
    \ is explicitly set to `true` in `web.xml`. The other difference is in the render\
    \ response phase (sixth phase). Basically, it renders absolutely nothing.\n\n\
    The `<f:viewAction>` tag is backed by the `UIViewAction` component which in turn\
    \ implements the `ActionSource` interface. This means that it behaves almost exactly\
    \ like `<h:commandButton>`, but then for GET requests. Of course, you could also\
    \ use a `@PostConstruct` annotated method on a `@ViewScoped` managed bean for\
    \ performing logic on GET requests, but the problem is that it would run directly\
    \ after the managed bean instance is created, when `<f:viewParam>` hasn’t even\
    \ had a chance to run. `<f:viewAction>` will be invoked during the invoke application\
    \ phase (fifth phase), after the model values are updated. It even supports returning\
    \ a `String` representing a navigation outcome, which will then behave as a redirect.\n\
    \nFollowing is an example of a search form:\n\nFacelets file `/search.xhtml`:\n\
    \n```\n<f:metadata>\n    <f:viewParam id=\"query\" name=\"query\" value=\"#{search.query}\"\
    \ />\n    <f:viewAction action=\"#{search.onload}\" />\n</f:metadata>\n\n<h:body>\n\
    \    <form>\n        <label for=\"query\">Query</label>\n        <input type=\"\
    text\" name=\"query\"\n            value=\"#{empty search.query ? param.query\
    \ : search.query}\">\n        </input>\n        <input type=\"submit\" value=\"\
    Search\" />\n        <h:message for=\"query\" />\n    </form>\n    <h:dataTable\
    \ id=\"results\" rendered=\"#{not empty search.results}\"\n        value=\"#{search.results}\"\
    \ var=\"result\">\n        <h:column>#{result.name}</h:column>\n        <h:column>#{result.description}</h:column>\n\
    \    </h:dataTable>\n</h:body>\n```\n\nBacking bean class `com.example.project.view.Search`:\n\
    \n```\n@Named @RequestScoped\npublic class Search {\n\nprivate String query;\n\
    \    private List<Result> results;\n\n@Inject\n    private SearchService searchService;\n\
    \npublic void onload() {\n        results = searchService.getResults(query);\n\
    \    }\n\n// Add/generate getters and setters here.\n    // Note that results\
    \ doesn't need a setter.\n}\n```\n\nIn the Facelets file there are a couple of\
    \ things to notice apart from the plain HTML form approach. The `value` attribute\
    \ of the text input displays `#{param.query}` when `#{search.query}` is empty,\
    \ because the submitted value would otherwise not show up at all when there's\
    \ a conversion or validation error on `<f:viewParam>`. `#{param}` is actually\
    \ an implicit EL object referring the request parameter map. `#{param.query}`\
    \ basically prints the value of the request parameter with the name “query”. Please\
    \ note that this construct of the `value` attribute is invalid for JSF input components.\
    \ It would throw a `javax.el.PropertyNotWritableException` during the update model\
    \ values phase (fourth phase), and, moreover, it is already doing the very same\
    \ logic under the hood of the `<f:viewParam>`.\n\n`<h:message>` can be attached\
    \ to `<f:viewParam>`. In this specific construct, however, it’s not really used.\
    \ Only when you add a converter or validator to `<f:viewParam>`, for example,\
    \ by `<f:viewParam ... required=\"true\">` would you see the error message in\
    \ `<h:message>`, and then `<f:viewAction>` won’t be invoked.\n\nNow, when you\
    \ open the page and submit the form, the submitted value will appear as a query\
    \ string in the URL as in `/search.xhtml?query=jsf`. This is bookmarkable and\
    \ re-executable every time you open the URL."
  raw: '## GET forms


    JSF has no concept of “GET forms,” but you can just use plain HTML for this. JSF
    supports processing GET request parameters and invoking managed bean actions on
    GET requests. For this, <f:viewParam> and <f:viewAction> can be used. They must
    be placed in <f:metadata> which in turn can only be declared in the top-level
    page. So, when using templating , it must be declared in the template client and
    you can’t declare it in the master template. In other words, <f:metadata> cannot
    be shared across template clients.


    Technically, the location of <f:metadata> in the view doesn’t matter, as long
    as it’s in the top-level page. Most self-documenting would be to put it in the
    very top of the view, directly after the root tag.


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <f:metadata>

            ...

        </f:metadata>


    <h:head>

            ...

        </h:head>


    <h:body>

            ...

        </h:body>

    </html>

    ```


    When using templating, give it its own template definition.


    ```

    <ui:composition template="/WEB-INF/templates/layout.xhtml"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core "

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <ui:define name="metadata">

            <f:metadata>

                ...

            </f:metadata>

        </ui:define>


    <ui:define name="content">

            ...

        </ui:define>

    </ui:composition>

    ```


    No, you can’t put <f:metadata> in the master template and keep <f:viewParam> and
    <f:viewAction> in the template client. This is a technical limitation. The best
    you can do is to create a custom <f:event> type which runs after the invoke application
    phase (fifth phase) and then declare it in the master template. An example is
    given in the section “Create Custom Component Event” in Chapter [3](#A454457_1_En_3_Chapter.xhtml).


    The <f:viewParam> tag is backed by the UIViewParameter component which in turn
    extends from UIInput superclass. This means that it behaves almost exactly like
    <h:inputText>, but then for GET parameters. The subtle differences are found in
    the process validations phase (third phase). By default, an empty parameter would
    skip any custom validators and bean validation. For example, the @NotNull bean
    validation annotation will only work when the context parameter javax.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL
    is explicitly set to true in web.xml. The other difference is in the render response
    phase (sixth phase). Basically, it renders absolutely nothing.


    The <f:viewAction> tag is backed by the UIViewAction component which in turn implements
    the ActionSource interface. This means that it behaves almost exactly like <h:commandButton>,
    but then for GET requests. Of course, you could also use a @PostConstruct annotated
    method on a @ViewScoped managed bean for performing logic on GET requests, but
    the problem is that it would run directly after the managed bean instance is created,
    when <f:viewParam> hasn’t even had a chance to run. <f:viewAction> will be invoked
    during the invoke application phase (fifth phase), after the model values are
    updated. It even supports returning a String representing a navigation outcome,
    which will then behave as a redirect.


    Following is an example of a search form :


    Facelets file /search.xhtml:


    ```

    <f:metadata>

        <f:viewParam id="query" name="query" value="#{search.query}" />

        <f:viewAction action="#{search.onload}" />

    </f:metadata>


    <h:body>

        <form>

            <label for="query">Query</label>

            <input type="text" name="query"

                value="#{empty search.query ? param.query : search.query}">

            </input>

            <input type="submit" value="Search" />

            <h:message for="query" />

        </form>

        <h:dataTable id="results" rendered="#{not empty search.results}"

            value="#{search.results}" var="result">

            <h:column>#{result.name}</h:column>

            <h:column>#{result.description}</h:column>

        </h:dataTable>

    </h:body>

    ```


    Backing bean class com.example.project.view.Search:


    ```

    @Named @RequestScoped

    public class Search {


    private String query;

        private List<Result> results;


    @Inject

        private SearchService searchService;


    public void onload() {

            results = searchService.getResults(query);

        }


    // Add/generate getters and setters here.

        // Note that results doesn''t need a setter.

    }

    ```


    In the Facelets file there are a couple of things to notice apart from the plain
    HTML form approach. The value attribute of the text input displays #{param.query}
    when #{search.query} is empty, because the submitted value would otherwise not
    show up at all when there''s a conversion or validation error on <f:viewParam>.
    #{param} is actually an implicit EL object referring the request parameter map
    . #{param.query} basically prints the value of the request parameter with the
    name “query”. Please note that this construct of the value attribute is invalid
    for JSF input components. It would throw a javax.el.PropertyNotWritableException
    during the update model values phase (fourth phase), and, moreover, it is already
    doing the very same logic under the hood of the <f:viewParam>.


    <h:message> can be attached to <f:viewParam>. In this specific construct, however,
    it’s not really used. Only when you add a converter or validator to <f:viewParam>,
    for example, by <f:viewParam ... required="true"> would you see the error message
    in <h:message>, and then <f:viewAction> won’t be invoked.


    Now, when you open the page and submit the form, the submitted value will appear
    as a query string in the URL as in /search.xhtml?query=jsf. This is bookmarkable
    and re-executable every time you open the URL.'
  trans: '

    ## GET 表单


    JSF 本身没有“GET 表单”的概念，但你可以直接使用纯 HTML 来实现。JSF 支持处理 GET 请求参数，并在 GET 请求上调用托管 bean 的操作。为此，可以使用
    `<f:viewParam>` 和 `<f:viewAction>`。它们必须放置在 `<f:metadata>` 中，而 `<f:metadata>` 只能在顶层页面中声明。因此，在使用模板时，它必须在模板客户端中声明，而不能在主模板中声明。换句话说，`<f:metadata>`
    不能在模板客户端之间共享。


    从技术上讲，`<f:metadata>` 在视图中的位置并不重要，只要它在顶层页面中即可。最清晰的写法是将其放在视图的最顶部，紧跟在根标签之后。


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <f:metadata>

            ...

        </f:metadata>


    <h:head>

            ...

        </h:head>


    <h:body>

            ...

        </h:body>

    </html>

    ```


    当使用模板时，为其定义自己的模板定义。


    ```

    <ui:composition template="/WEB-INF/templates/layout.xhtml"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core "

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <ui:define name="metadata">

            <f:metadata>

                ...

            </f:metadata>

        </ui:define>


    <ui:define name="content">

            ...

        </ui:define>

    </ui:composition>

    ```


    不，你不能将 `<f:metadata>` 放在主模板中，而将 `<f:viewParam>` 和 `<f:viewAction>` 保留在模板客户端中。这是一个技术限制。你最多可以创建一个自定义的
    `<f:event>` 类型，它在调用应用程序阶段（第五阶段）之后运行，然后在主模板中声明它。第 3 章的“创建自定义组件事件”一节中给出了一个示例。


    `<f:viewParam>` 标签由 `UIViewParameter` 组件支持，该组件又继承自 `UIInput` 超类。这意味着它的行为几乎与 `<h:inputText>`
    完全相同，但用于 GET 参数。细微的差别在于处理验证阶段（第三阶段）。默认情况下，空参数会跳过任何自定义验证器和 bean 验证。例如，`@NotNull`
    bean 验证注解仅在 `web.xml` 中显式将上下文参数 `javax.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL`
    设置为 `true` 时才会生效。另一个区别在于渲染响应阶段（第六阶段）。基本上，它什么都不会渲染。


    `<f:viewAction>` 标签由 `UIViewAction` 组件支持，该组件又实现了 `ActionSource` 接口。这意味着它的行为几乎与
    `<h:commandButton>` 完全相同，但用于 GET 请求。当然，你也可以在 `@ViewScoped` 托管 bean 上使用 `@PostConstruct`
    注解的方法来执行 GET 请求的逻辑，但问题在于它会在托管 bean 实例创建后立即运行，而此时 `<f:viewParam>` 甚至还没有机会运行。`<f:viewAction>`
    将在模型值更新后的调用应用程序阶段（第五阶段）被调用。它甚至支持返回一个表示导航结果的字符串，该字符串将表现为重定向。


    以下是一个搜索表单的示例：


    Facelets 文件 /search.xhtml:


    ```

    <f:metadata>

        <f:viewParam id="query" name="query" value="#{search.query}" />

        <f:viewAction action="#{search.onload}" />

    </f:metadata>


    <h:body>

        <form>

            <label for="query">查询</label>

            <input type="text" name="query"

                value="#{empty search.query ? param.query : search.query}">

            </input>

            <input type="submit" value="搜索" />

            <h:message for="query" />

        </form>

        <h:dataTable id="results" rendered="#{not empty search.results}"

            value="#{search.results}" var="result">

            <h:column>#{result.name}</h:column>

            <h:column>#{result.description}</h:column>

        </h:dataTable>

    </h:body>

    ```


    后台 bean 类 com.example.project.view.Search:


    ```

    @Named @RequestScoped

    public class Search {


    private String query;

        private List<Result> results;


    @Inject

        private SearchService searchService;


    public void onload() {

            results = searchService.getResults(query);

        }


    // 在此处添加/生成 getter 和 setter。

        // 注意，results 不需要 setter。

    }

    ```


    在 Facelets 文件中，除了纯 HTML 表单方法之外，还有几点需要注意。文本输入的 `value` 属性在 `#{search.query}` 为空时显示
    `#{param.query}`，因为否则当 `<f:viewParam>` 上出现转换或验证错误时，提交的值根本不会显示。`#{param}` 实际上是一个隐式
    EL 对象，引用请求参数映射。`#{param.query}` 基本上会打印名为“query”的请求参数的值。请注意，这种 `value` 属性的构造对于
    JSF 输入组件是无效的。它会在更新模型值阶段（第四阶段）抛出 `javax.el.PropertyNotWritableException`，而且，它已经在
    `<f:viewParam>` 的内部执行了完全相同的逻辑。


    `<h:message>` 可以附加到 `<f:viewParam>`。然而，在这种特定的构造中，它实际上并未被使用。只有当你向 `<f:viewParam>`
    添加转换器或验证器时，例如通过 `<f:viewParam ... required="true">`，你才会在 `<h:message>` 中看到错误消息，并且
    `<f:viewAction>` 将不会被调用。


    现在，当你打开页面并提交表单时，提交的值将作为查询字符串出现在 URL 中，例如 `/search.xhtml?query=jsf`。这是可添加书签的，并且每次打开
    URL 时都可以重新执行。

