    # 6. Output Components


    Bauke Scholtz^(1) and Arjan Tijms²


    (1) Willemstad, Curaçao


    (2) Amsterdam, Noord-Holland, The Netherlands


    Technically, the input components as described in Chapter [4](#A454457_1_En_4_Chapter.xhtml)
    are also output components. They are not only capable of processing any submitted
    input values but also capable of outputting the model value during the render
    response phase (sixth phase). This is also visible in the JSF (JavaServer Faces)
    API (application programming interface): the `UIInput` superclass extends from
    the `UIOutput` superclass.


    There are also a bunch of components that merely output their model value or even
    just an HTML element. Those are the pure output components. They don’t participate
    in all phases of the JSF life cycle. Sometimes they participate during the restore
    view phase (first phase), in case they are dynamically created or manipulated,
    but the majority of their job is executed during the render response phase (sixth
    phase), while generating the HTML output. During the other phases, they don’t
    do many additional tasks.'
