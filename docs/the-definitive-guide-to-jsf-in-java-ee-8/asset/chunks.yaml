  trans: '

    ### 关于 Java EE 需要注意什么？


    请注意，你**不**需要从 Oracle.com 下载并安装 Java EE，即使 JSF 本身是 Java EE 的一部分。Java EE 基本上是一个抽象规范，而所谓的应用服务器则是其具体实现。这些应用服务器的例子包括
    Payara、WildFly、TomEE、GlassFish 和 Liberty。正是这些应用服务器，开箱即用地提供了 JSF（JavaServer Faces）、EL（表达式语言）、CDI（上下文和依赖注入）、EJB（企业级
    JavaBeans）、JPA（Java 持久化 API）、Servlet、WebSocket 和 JSON-P（JavaScript 对象表示法处理）等 API（应用程序编程接口）。


    还存在所谓的 Servlet 容器，它们基本上只开箱即用地提供 Servlet、JASPIC（Java 容器认证服务提供者接口）、JSP（JavaServer
    Pages）、EL 和 WebSocket API，例如 Tomcat 和 Jetty。然而，在这样的 Servlet 容器上手动安装和配置 JSF、JSTL（JSP
    标准标签库）、CDI、EJB 和 JPA 等组件需要一些工作。对于 EJB 来说，这甚至不是一件简单的事，因为它需要修改 Servlet 容器的内部结构。顺便提一下，这正是
    TomEE 存在的原因。它是一个基于裸机 Tomcat Servlet 容器引擎构建的 Java EE 应用服务器。


    回到 Oracle.com 上的 Java EE 下载，它基本上会提供 GlassFish 服务器，以及一堆文档和可选的 Netbeans IDE。我们不需要它，因为我们已经在使用
    Payara 作为 Java EE 应用服务器，并且将 Eclipse 作为 IDE。因此，Java SE JDK 就足够了。


    ## 安装 Payara


    Payara 是一个开源的 Java EE 应用服务器，于 2014 年从 GlassFish 分支出来。它基本上是对 Oracle 宣布停止对 GlassFish
    商业支持的一种回应，因此以前商业使用 GlassFish 的公司可以轻松切换到 Payara 并继续享受商业支持。得益于对以前使用 GlassFish 的商业客户提供的商业支持，Payara
    应用服务器软件可以持续进行错误修复和改进。


    第一个集成 JSF 2.3 的 Payara 版本是 5。你可以从 [`payara.fish`](https://payara.fish) 下载它。请确保你选择的是
    “Payara Server Full” 或 “Payara Server Web Profile” 下载，而不是例如 “Payara Micro” 或 “Payara
    Embedded”，因为它们有其他用途。安装基本上就是将下载的文件解压并放到你主目录下的某个位置。我们先把它放在那里，直到我们启动并运行 Eclipse，这样我们就可以将
    Payara 集成到 Eclipse 中，并让它管理服务器。


    ### 其他服务器呢？


    本书选择 Payara 的主要原因是，在撰写本文时，它是少数几个集成了 JSF 2.3 的 Java EE 应用服务器之一。另一个是 GlassFish，但我们不太推荐它，因为它基本上不提供商业支持或错误修复。GlassFish
    必须被视为其他应用服务器供应商的真正参考实现，以便他们可以在必要时通过示例构建自己的应用服务器实现。


    在撰写本文时，WildFly、TomEE 和 Liberty 还没有提供集成了 JSF 2.3 的版本。


    ## 安装 Eclipse


    Eclipse 是一个用 Java 编写的开源 IDE。它基本上就像一个记事本，但拥有成千上万甚至数百万的额外功能，例如自动编译类文件、用它们构建 WAR
    文件，并将其部署到应用服务器，而无需在命令控制台中手动摆弄 javac。


    Eclipse 有很多种版本。由于我们将使用 Java EE 进行开发，我们需要名为 “Eclipse IDE for Java EE developers”
    的版本。它通常是 [`eclipse.org/downloads/eclipse-packages/`](http://eclipse.org/downloads/eclipse-packages)
    上排名最高的下载链接。同样，安装基本上就是将下载的文件解压并放到你主目录下的某个位置。


    在 Windows 和 Linux 中，你会在解压后的文件夹中找到 eclipse.ini 配置文件。在 Mac OS 中，此配置文件位于 Eclipse.app/Contents/Eclipse
    中。打开此文件进行编辑。我们想要增加分配给 Eclipse 的内存。在 eclipse.ini 的底部，你会找到以下几行：


    ```

    -Xms256m

    -Xmx1024m

    ```


    这分别设置了 Eclipse 可以使用的初始和最大内存池大小。当你想开发一个像样的 Java EE 应用程序时，这有点太低了。让我们至少将这两个值都加倍。


    ```

    -Xms512m

    -Xmx2g

    ```


    注意，声明的内存不要超过可用的物理内存。当实际内存使用量超过可用物理内存时，它会继续使用虚拟内存，通常是磁盘上的交换文件。这将大大降低性能，并导致严重的卡顿和速度减慢。


    现在，你可以通过执行解压文件夹中的 eclipse 可执行文件来启动 Eclipse。系统会要求你选择一个目录作为工作空间。这是 Eclipse 将保存所有工作空间项目和元数据的目录。


    之后，Eclipse 会显示一个欢迎屏幕。目前这并不重要。你可以点击右上角的 *Workbench* 按钮来关闭欢迎屏幕。如有必要，请取消选中右下角的 “Always
    show Welcome at start up”。之后，你将进入工作台。默认情况下，它看起来像图 2-1 中的截图。


    ![A454457_1_En_2_Fig1_HTML.jpg](img/A454457_1_En_2_Fig1_HTML.jpg)


    ###### 图 2-1 Eclipse 工作台


    ### 配置 Eclipse


    在我们可以开始编写代码之前，我们想对 Eclipse 进行一些微调，以免最终遇到麻烦或烦恼。Eclipse 有大量的设置，其中一些默认值本不应该成为默认值。你可以通过
    *Window ➤ Preferences* 来查看和配置设置。


    *   *General ➤ Workspace ➤ Text file encoding* 必须设置为 **UTF-8**。特别是在 Windows 中，否则可能会默认使用专有的
    CP-1252 编码，该编码不支持拉丁语系以外的任何字符。当使用 CP-1252 读取和保存 Unicode 文件时，你可能会看到难以理解的字符序列。这也被称为“乱码”。¹


    *   *General ➤ Workspace ➤ New text file line delimiter* 必须设置为 **Unix**。它在 Windows
    上也能正常工作。这尤其能让版本控制系统保持满意。否则，在不同操作系统上拉取代码的开发人员可能会因为不同的换行符而面临令人困惑的冲突或差异。


    *   *General ➤ Editors ➤ Text editors ➤ Spelling* 最好**禁用**。这将为你避免一个潜在的巨大烦恼，因为它会不必要地检查
    faces-config.xml 和 web.xml 等 XML 配置文件中的拼写，导致这些文件中出现令人困惑的错误和警告。


    *   *Java ➤ Compiler ➤ Compiler compliance level* 必须设置为 **1.8**。这是 Java EE 8 所需的最低
    Java 版本。


    *   *Java ➤ Installed JREs* 必须设置为 **JDK**，而不是 JRE。此设置通常也用于执行集成的应用服务器，而应用服务器通常需要
    JDK。

    '
- fmt: '### Installing JBoss Tools Plug-in


    Standard Eclipse for Java EE in its current version does not support any CDI tools.
    It has no wizards to create CDI managed beans, or autocompletion and hyperlinking
    for CDI managed beans in JSF pages. The JBoss Tools plug-in is an extensive plug-in
    which offers among others the CDI tools.[²](#A454457_1_En_2_Chapter.xhtml#Fn2)
    This is very useful when developing a Java EE web application.


    In order to install it, go to *Help ➤ Eclipse Marketplace*. Enter in the search
    field "JBoss Tools" and click *Go*. Scroll a bit through the results until you
    see JBoss Tools Final and then click *Install* (see Figure [2-2](#A454457_1_En_2_Chapter.xhtml#Fig2)).


    ![A454457_1_En_2_Fig2_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig2_HTML.jpg)


    ###### Figure 2-2 JBoss Tools in the Eclipse Marketplace


    In the next step, you''ll see a fairly large list of all JBoss Tools'' offerings.
    We don''t need all of them. The list indeed also includes some JSF-related tools,
    but they are not terribly useful. The Visual Page Editor is not at all useful.
    Dragging and dropping together a JSF page doesn''t make you a good JSF developer.
    That can only be achieved by just writing code yourself. Moreover, having too
    many unused features installed and even implicitly enabled may make Eclipse terribly
    slow. The fewer features you select, the less chance that you will be surprised
    about changes in the IDE behavior. So, untick the top check box and then tick
    only the check box which says "Context and Dependency Injection Tools" (see Figure
    [2-3](#A454457_1_En_2_Chapter.xhtml#Fig3)).


    ![A454457_1_En_2_Fig3_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig3_HTML.jpg)


    ###### Figure 2-3 Select only the CDI tools for now


    Next, accept the terms of the license agreement and complete the wizard until
    Eclipse is restarted.


    ### Integrating New Server in Eclipse


    We need to familarize Eclipse with any installed application servers so that Eclipse
    can seamlessly link its Java EE API libraries in the project''s build path (read:
    the compile time classpath of the project). This is mandatory in order to be able
    to import classes from the Java EE API in your project. You know, the application
    server itself represents the concrete implementation of the abstract Java EE API.


    In order to integrate a new application server in Eclipse, first check the bottom
    section of the workbench with several tabs representing several *Views* (you can
    add new ones via *Window ➤ Show View*). Click the *Servers* tab to open the servers
    view (see Figure [2-4](#A454457_1_En_2_Chapter.xhtml#Fig4)). Click the link which
    says "No servers are available. Click this link to create a new server. . . ."


    ![A454457_1_En_2_Fig4_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig4_HTML.jpg)


    ###### Figure 2-4 Servers view of Eclipse Workbench


    From the list of available server tools, select *Oracle ➤ GlassFish Tools* (see
    Figure [2-5](#A454457_1_En_2_Chapter.xhtml#Fig5)).


    ![A454457_1_En_2_Fig5_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig5_HTML.jpg)


    ###### Figure 2-5 Selecting GlassFish Tools in New Server wizard


    After clicking *Next* for the first time, it will download the plug-in in the
    background and request you to accept the license agreement before installing the
    plug-in. This plug-in is mandatory in order to manage any GlassFish-based server
    from inside the workbench—among others, adding and removing Eclipse projects to
    the deployments folder, starting and stopping the server, and running the server
    in debug mode. Once it''s finished installing, it will request you to restart
    Eclipse. Take action accordingly.


    Once returned into the workspace, click the same link in the *Servers* view again.
    You''ll now see a *GlassFish* ➤ *GlassFish* option. Select this and set the *Server
    name* field to "Payara" (see Figure [2-6](#A454457_1_En_2_Chapter.xhtml#Fig6)).


    ![A454457_1_En_2_Fig6_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig6_HTML.jpg)


    ###### Figure 2-6 Selecting GlassFish server in New Server wizard and naming it
    Payara


    Advance to the next step. Here, you should point the *GlassFish location* field
    to the `glassfish` subfolder of the Payara installation, there where you have
    unzipped it after downloading (see Figure [2-7](#A454457_1_En_2_Chapter.xhtml#Fig7)).


    ![A454457_1_En_2_Fig7_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig7_HTML.jpg)


    ###### Figure 2-7 Specifying GlassFish location in New Server wizard


    Complete the remainder of the *New Server* wizard with default settings. You don''t
    need to edit any other fields. The newly added server will now appear in the *Servers*
    view (see Figure [2-8](#A454457_1_En_2_Chapter.xhtml#Fig8)).


    ![A454457_1_En_2_Fig8_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig8_HTML.jpg)


    ###### Figure 2-8 The Payara server in Servers view


    ## Creating New Project in Eclipse


    We''re now ready to create a new project for our JSF application in Eclipse. This
    can be done via the left section of the workbench which by default shows only
    one tab representing the *Project Explorer* view (also here, you can add new views
    via *Window ➤ Show View*). Right-click anywhere in this view and select *New ➤
    Project*. It''ll show the *New Project* wizard which may have a bit too many options.


    Eclipse, being an IDE for many different project tasks, offers a bewildering amount
    of different project types from which to choose. For a Java EE-based application
    which is going to be deployed as a simple WAR file, there are basically two project
    types that we could choose from: *Web ➤ Dynamic Web Project* and *Maven ➤ Maven
    Project*.


    The difference is that the first is an Eclipse native project that really only
    works on Eclipse, while the latter is a universal type of project that can be
    built by any IDE, as well as easily on the command line and by various CI servers
    such as Travis and Jenkins. For this reason, the Maven project type is really
    the only viable choice (see Figure [2-9](#A454457_1_En_2_Chapter.xhtml#Fig9)).


    ![A454457_1_En_2_Fig9_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig9_HTML.jpg)


    ###### Figure 2-9 Selecting Maven Project in New Project wizard (note the Dynamic
    Web Project as another but non-viable option)


    In the next step, make sure that the option *Create a simple project (skip archetype
    selection)* is checked (see Figure [2-10](#A454457_1_En_2_Chapter.xhtml#Fig10)).
    This will let us start with a really empty Maven project so that we can configure
    and populate it ourselves. Of course, you could also choose from an archetype,
    which is basically a template project with several already prepared files and
    configurations. But we don''t need any for now.


    ![A454457_1_En_2_Fig10_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig10_HTML.jpg)


    ###### Figure 2-10 Checking "Create a simple project" in New Maven Project wizard


    In the next step, we can specify our own Maven coordinates of the project. The
    Maven coordinates consist of, among others, *Group Id*, *Artifact Id*, and *Version*,
    also known as GAV in the Maven world. The *Group Id* usually matches the root
    package name you''re going to use, such as `com.example`. The *Artifact Id* usually
    represents the project name you''re going to use. For simplicity and in order
    to be consistent in the rest of the book, we''ll use `project`. The *Version*
    can be kept default at `0.0.1-SNAPSHOT`. Finally the *Packaging* should be set
    to `war`.


    ![A454457_1_En_2_Fig11_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig11_HTML.jpg)


    ###### Figure 2-11 Filling out the Maven GAV in new Maven Project wizard


    Complete the remainder of the *New Maven Project* wizard (see Figure [2-11](#A454457_1_En_2_Chapter.xhtml#Fig11)).
    You don''t need to edit any other fields. Once you''ve finished the wizard, you''ll
    get to see the project structure in the *Project Explorer* view (see Figure [2-12](#A454457_1_En_2_Chapter.xhtml#Fig12)).


    ![A454457_1_En_2_Fig12_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig12_HTML.jpg)'
