    # 13. Security


    Bauke Scholtz^(1) and Arjan Tijms²


    (1) Willemstad, Curaçao


    (2) Amsterdam, Noord-Holland, The Netherlands


    Security for web applications is a broad field and includes a number of topics
    such as protecting access to resources, shielding against injection attacks of
    various kinds, and preventing users from being tricked into doing malicious actions
    on behalf of an attacker.


    JSF (JavaServer Faces) supports these topics in various ways, either by providing
    native solutions or by integrating with the Java EE platform’s facilities. For
    access to resources, which includes both authentication (the caller proving its
    identity) and authorization (the system determining to which resources the caller
    has access) JSF (JavaServer Faces) integrates with the Java EE Security machinery,
    which in turn is defined by, among others, the Servlet spec and the Java EE Security
    spec.


    Java EE Security (JSR 375) is supported by both the Web- and Full profile in Java
    EE 8. Additionally, the reference implementation Soteria works on Java EE 7 servers,
    and because it’s built on JASPIC (Java EE authentication SPI) (JSR 196), it also
    works on Servlet containers that support JASPIC (such as Tomcat since 8.5 and
    Jetty since 7.0).'
