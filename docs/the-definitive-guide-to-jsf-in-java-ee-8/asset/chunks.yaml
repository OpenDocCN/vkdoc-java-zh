    For the JSF artifacts and components, if the class in turn specifies a getter
    method somewhere, such as `HttpServletRequest#getContextPath()`, then you can
    of course access it in EL the usual way as in `#{request.contextPath}`.


    For scoped maps, any property will be interpreted as the map key. If the property
    happens to contain period characters, then you can use the brace notation as in
    `#{map[''key.with.periods'']}` in order to access the map value. Note that `#{flash}`
    essentially extends from `Map<String, Object>`, so it could be treated as such.
    It should also be said that `#{flowScope}` indeed deviates from other scoped maps
    by accepting `Object` instead of `String` as a map key. This is most likely a
    historical mistake. The canonical approach to access scoped maps is to use a `String`-based
    key.


    `#{cookie}` is mapped by the cookie name and the value actually returns a `javax.servlet.http.Cookie`
    which in turn has a `getValue()` property. So, in order to access the `JSESSIONID`
    cookie, you basically need `#{cookie.JSESSIONID.value}`. Of course, you can also
    just use `#{session.id}` instead.


    `#{resource}` actually has its own EL resolver which interprets any property as
    a resource identifier in “library:name” format and then passes it to `ResourceHandler#createResource()`
    and finally returns the URL of the resource via `Resource#getRequestPath()`. This
    is very useful in CSS resources in order to reference a JSF image resource as
    a CSS background image. The following example will actually render the URL of
    `src/main/webapp/resources/images/background.svg`.


    ```

    body {

        background-image: url("#{resource[''images/background.svg'']}");

        background-size: cover;

    }

    ```'
  raw: 'However, it still doesn’t work. Under the hood, inside the nested composite,
    when the EL evaluator comes to #{cc.parent} and attempts to evaluate “attrs.value”
    on it, then the parent composite component would return yet another EL expression
    in form of #{cc.attrs.value} which ultimately gets evaluated. However, the #{cc}
    part still gets interpreted as “current composite component,” which is inside
    the nested composite component and thus the nested composite itself.


    We could only solve it to let the parent composite component not return yet another
    EL expression but instead the already-evaluated value. This can be achieved by
    overriding UIComponent#setValueExpression() in the backing component where you
    check whether the ValueExpression representing #{cc.attrs.value} is about to be
    set on the component and then immediately evaluate it and store the result as
    a local variable of the composite component. This shouldn’t cause harm as it’s
    supposed to be a read-only attribute.


    ```

    @FacesComponent("messageComposite")

    public class MessageComposite extends UINamingContainer {


    private Message message;


    @Override

        public void setValueExpression

            (String attributeName, ValueExpression expression)

        {

            if ("value".equals(attributeName)) {

                ELContext elContext = getFacesContext().getELContext();

                message = (Message) expression.getValue(elContext);

            }

            else {

                super.setValueExpression(attributeName, expression);

            }

        }


    public Message getMessage() {

            return message;

        }

    }

    ```


    With this backing component in place, and replacing “attrs.value” by “message”,
    it finally works.


    ```

    <cc:interface componentType="messageComposite">

        <cc:attribute name="value" type="com.example.Message" />

    </cc:interface>

    <cc:implementation>

        #{cc.message.text}

        <c:if test="#{not empty cc.message.replies}">

            <ul>

                <c:forEach items="#{cc.message.replies}" varStatus="loop">

                    <li>

                        <t:message

                            value="#{cc.parent.message.replies[loop.index]}">

                        </t:message>

                    </li>

                </c:forEach>

            </ul>

        </c:if>

    </cc:implementation>

    ```


