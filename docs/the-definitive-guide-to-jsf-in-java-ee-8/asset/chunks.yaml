- fmt: "# Eager Initialization\n\nManaged beans are by default lazily initialized\
    \ whenever they are, for the first time, referenced in an EL expression or as\
    \ an injected dependency. Managed beans can be eagerly initialized on the start\
    \ of any scope by an observer method which observes the initialization of the\
    \ scope of interest. One example was previously given in the “@ViewScoped” section.\
    \ The method pattern is as follows:\n\n```\npublic void startup(@Observes @Initialized(XxxScoped.class)\
    \ S scope) {\n    // ...\n}\n```\n\nWhere `XxxScoped.class` can be any CDI-compatible\
    \ scope and the `S` represents the owner of the scope. For the following scopes\
    \ that are thus:\n\n* `ApplicationScoped.class` – `javax.servlet.ServletContext`\n\
    * `SessionScoped.class` – `javax.servlet.http.HttpSession`\n* `ConversationScoped.class`\
    \ – `javax.servlet.ServletRequest`\n* `FlowScoped.class` – `javax.faces.flow.Flow`\n\
    * `ViewScoped.class` – `javax.faces.component.UIViewRoot`\n* `RequestScoped.class`\
    \ – `javax.servlet.ServletRequest`\n\nNote that the containing bean must be of\
    \ at least the same scope in order to have `@Observes @Initialized` take effect.\
    \ Eager initialization has for an application-scoped managed bean the advantage\
    \ that you can configure it as a “startup” bean without needing to reference it\
    \ in some other bean in order to get it initialized.\n\n```\n@ApplicationScoped\n\
    public class Startup {\n\n    public void contextInitialized\n            (@Observes\
    \ @Initialized(ApplicationScoped.class)\n                ServletContext context)\n\
    \    {\n        // ...\n    }\n}\n```\n\nEager initialization has for a request-scoped\
    \ bean the advantage that you can if necessary invoke an asynchronous DB query\
    \ long before the `FacesServlet` is invoked.\n\n```\n@Named @RequestScoped\npublic\
    \ class EagerProducts {\n\n    private Future<List<Product>> list;\n\n    @Inject\n\
    \    private ProductService productService;\n\n    public void requestInitialized\n\
    \            (@Observes @Initialized(RequestScoped.class)\n                HttpServletRequest\
    \ request)\n    {\n        if (\"/products.xhtml\".equals(request.getServletPath()))\
    \ {\n            list = productService.asyncList();\n        }\n    }\n\n    public\
    \ List<Product> getList() {\n        try {\n            return list.get();\n \
    \       }\n        catch (InterruptedException e) {\n            Thread.currentThread().interrupt();\n\
    \            throw new FacesException(e);\n        }\n        catch (ExecutionException\
    \ e) {\n            throw new FacesException(e);\n        }\n    }\n}\n```\n\n\
    Where the `ProductService` looks like this:\n\n```\n@Stateless\npublic class ProductService\
    \ {\n\n    @TransactionAttribute(SUPPORTS)\n    public List<Product> list() {\n\
    \        return entityManager\n            .createQuery(\"FROM Product ORDER BY\
    \ id DESC\", Product.class)\n            .getResultList();\n    }\n\n    @Asynchronous\n\
    \    public Future<List<Product>> asyncList() {\n        return new AsyncResult<>(list());\n\
    \    }\n}\n```\n\nNote particularly the `requestInitialized()` method which observes\
    \ the start of any request scope and thus needs to determine the actual path beforehand\
    \ so that it doesn’t unnecessarily hit the business service. In this specific\
    \ example, that will only happen once the request hits `/products.xhtml`. That\
    \ JSF page can in turn just reference the product list as usual.\n\n```\n<h:dataTable\
    \ value=\"#{eagerProducts.list}\" var=\"product\">\n    ...\n</h:dataTable>\n\
    ```\n\nWhen opening this JSF page, the request scoped bean will be initialized\
    \ before the `FacesServlet` is invoked and asynchronously fetch the `List<Product>`\
    \ from the database. Depending on the server hardware used, the available server\
    \ resources and all code running between the invocation of the first servlet filter\
    \ and entering the JSF render response, this approach may give you a time space\
    \ of 10ms ~ 500ms (or perhaps even more when there’s some inefficient code in\
    \ the pipeline) to fetch data from DB in a different thread parallel with the\
    \ HTTP request, and thus a speed improvement equivalent to the time the DB needs\
    \ to fetch the data (which thus doesn’t need to be done in the same thread as\
    \ the HTTP request).\n\n# Layers\n\nWhile implementing backing beans, it’s very\
    \ important to understand the importance of the separation of the JSF backing\
    \ bean from the JPA entity and the EJB service. In other words, when developing\
    \ backing beans, you should make sure that your backing beans are as slick as\
    \ possible and that they delegate as much as possible model properties to JPA\
    \ entities and business logic to EJB services. You should realize that JPA entities\
    \ and EJB services should be fully reusable on a completely different front end\
    \ than JSF, such as JAX-RS or even plain JSP/Servlet.\n\nThis thus also means\
    \ that you should make sure that you don’t directly or indirectly include a JSF-specific\
    \ dependency in a JPA entity or an EJB service. For example, the following approach\
    \ is factually wrong:\n\n```\n@Entity\npublic class Product {\n\n    private String\
    \ name;\n    private String description;\n\n    public static Product of(ProductBacking\
    \ backingBean) {\n        Product product = new Product();\n        product.setName(backingBean.getName());\n\
    \        product.setDescription(backingBean.getDescription());\n        return\
    \ product;\n    }\n\n    // ...\n}\n```\n\nHere, the JPA entity is tightly coupled\
    \ to a JSF backing bean. Not only are the entity properties reused in the backing\
    \ bean, but also the entity has a dependency on the backing bean. It wouldn’t\
    \ be possible to extract the entity into a JAR module which is reusable across\
    \ different JSF web applications.\n\nAnd the following approach is also factually\
    \ wrong:\n\n```\n@Stateless\npublic class ProductService {\n\n    @Inject\n  \
    \  private EntityManager entityManager;\n\n    public void create(Product product)\
    \ {\n        entityManager.persist(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
    \            new FacesMessage(\"Product created!\"));\n    }\n}\n```\n\nHere,\
    \ the EJB pokes the faces context and sets a message there. This would fail with\
    \ a `NullPointerException` when the EJB method is being invoked from, e.g., a\
    \ JAX-RS service or a Servlet, because there’s no instance of the faces context\
    \ anywhere over there. This UI messaging task is not the responsibility of the\
    \ back-end code but of the front-end code. In other words, adding a faces message\
    \ should only happen in the JSF artifact, such as a backing bean.\n\nThe correct\
    \ approach is as follows, as demonstrated previously in the section “Model, View,\
    \ or Controller?”:\n\n```\n@Named @RequestScoped\npublic class ProductBacking\
    \ {\n\n    private Product product = new Product();\n\n    @Inject\n    private\
    \ ProductService productService;\n\n    public void save() {\n        productService.create(product);\n\
    \        FacesContext.getCurrentInstance().addMessage(null,\n            new FacesMessage(\"\
    Product created!\"));\n    }\n\n    public Product getProduct() {\n        return\
    \ product;\n    }\n}\n```"
