- fmt: "注意，在 CSS 资源中解析 EL 表达式仅在 CSS 资源本身通过`<h:outputStylesheet>`（而非`<link>`）引入时有效。还需注意，JSF\
    \ 默认仅在首次请求 CSS 资源时记住其是否包含 EL 表达式。如果未包含，JSF 在后续请求中不会重新检查，即使在开发阶段也是如此。因此，如果你发现现有\
    \ CSS 资源中的第一个 EL 表达式似乎不起作用，最好重启 Web 应用程序。CSS 资源中的 EL 解析功能实际上非常有用。如果 SCSS（Sassy\
    \ CSS）对你来说过于复杂，你可以使用 EL 来参数化一些重复的 CSS 属性，例如颜色。\n\n```css\n.color-gray {\n    color:\
    \ #{applicationScope['gray']='#B8B8B8'};\n}\n\n...\n\n.someSelector {\n    border:\
    \ 1px solid #{gray};\n}\n.otherSelector {\n    color: #{gray};\n}\n\n...\n```\n\
    \n不，CSS 资源中的 EL 解析功能在 JS 资源中不可用。为此，你需要在全局作用域中打印一个 JS 对象，并在必要时让 JS 资源拦截它。例如：\n\n\
    ```xhtml\n<h:outputScript>var config = #{configuration.script};</h:outputScript>\n\
    <h:outputScript name=\"scripts/some.js\" />\n```\n\n其中`#{configuration.script}`从你的托管\
    \ Bean 返回一个 JSON 对象字符串。或者，你可以让 EL 将其打印为 HTML 元素的`data`属性：\n\n```xhtml\n<html lang=\"\
    en\" data-baseuri=\"#{request.contextPath}/\">\n    ...\n</html>\n```\n\n然后在 JS\
    \ 中按如下方式访问：\n\n```javascript\nvar baseuri = document.documentElement.dataset.baseuri;\n\
    ```\n\n或者，如果你是 jQuery 爱好者：\n\n```javascript\nvar baseuri = $(\"html\").data(\"\
    baseuri\");\n```\n\n也就是说，在 Java 端创建托管 Bean，或在 Facelets 端声明自定义 EL 变量（例如`<h:dataTable\
    \ var=\"foo\">`、`<ui:repeat var=\"foo\">`或`<c:set var=\"foo\">`）时，你必须绝对确保不会显式或隐式地选择与之前列出的隐式\
    \ EL 对象冲突的托管 Bean 名称或 EL 变量名称，因为隐式 EL 对象在 EL 解析中的优先级高于用户定义的名称。因此，例如，以下构造可能无法按预期工作：\n\
    \n```xhtml\n<ui:repeat value=\"#{bean.parameters}\" var=\"param\">\n    #{param}<br\
    \ />\n</ui:repeat>\n```\n\n它会在每次迭代中打印字面量“{}”，这基本上是空`Map`的默认`Map#toString()`格式。当你使用类似`?foo=bar`的查询字符串重新打开同一页面时，它会在每次迭代中打印字面量“{foo=bar}”。你最好将`var=\"\
    param\"`重命名为其他名称。\n\n# 脚注\n\n[1] [www.onjava.com/pub/a/onjava/2004/06/09/jsf.html](http://www.onjava.com/pub/a/onjava/2004/06/09/jsf.html)\n\
    \n[2] [https://stackoverflow.com/q/1296235/157882](https://stackoverflow.com/q/1296235/157882)\n\
    \n[3] [http://arjan-tijms.omnifaces.org/2011/09/authoring-jsf-pages-in-pure-java.html](http://arjan-tijms.omnifaces.org/2011/09/authoring-jsf-pages-in-pure-java.html)\n\
    \n[4] [https://developer.mozilla.org/en-US/docs/Web/API/History_API#Adding_and_modifying_history_entries](https://developer.mozilla.org/en-US/docs/Web/API/History_API%23Adding_and_modifying_history_entries)\n\
    \n[5] [http://balusc.omnifaces.org/2016/02/recursive-tree-of-composite-components.html](http://balusc.omnifaces.org/2016/02/recursive-tree-of-composite-components.html)\n\
    \n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz and Arjan Tijms, The Definitive\
    \ Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_8](https://doi.org/10.1007/978-1-4842-3387-0_8)\n\
    \n# 8. Backing Beans\n\nBauke Scholtz¹ and Arjan Tijms²\n\n(1) Willemstad, Curaçao\n\
    \n(2) Amsterdam, Noord-Holland, The Netherlands\n\n“Backing Bean”是一个 JSF 特定的概念。它代表最终用作“Managed\
    \ Bean”的单一 JavaBean 类，负责在 JSF 页面中提供数据、动作和/或 UI（用户界面）组件。\n\n## Model, View, or\
    \ Controller?\n\nJSF（JavaServer Faces）是一个 MVC（模型-视图-控制器）框架。它是一种广泛使用的软件应用程序架构设计模式，起源于桌面应用程序开发。[¹](#A454457_1_En_8_Chapter.xhtml#Fn1)\n\
    \n从 JSF 框架的角度来看，模型由 Backing Bean 表示，视图由组件树表示（组件树通常定义在 Facelets 文件中），控制器由 JSF 已提供的`FacesServlet`表示。然而，从\
    \ Java EE 应用服务器的角度来看，模型由服务层表示（服务层通常定义在 EJB（Enterprise JavaBeans）类和 JPA（Java Persistence\
    \ API）实体中），视图由所有基于 JSF 的代码表示，控制器是`FacesServlet`。从 JSF 开发者的角度来看，模型由服务层表示，视图由 Facelets\
    \ 文件表示，控制器由 Backing Bean 表示。\n\n因此，Backing Bean 类可以是模型、视图或控制器，具体取决于你的视角，而服务层始终是模型，Facelets\
    \ 文件始终是视图，`FacesServlet`始终是控制器。请注意，在此上下文中，“JSF 开发者”指的是你，即使用 JSF 框架为 Java EE 应用服务器开发\
    \ Web 应用程序的人。\n\n图 [8-1](#A454457_1_En_8_Chapter.xhtml#Fig1) 展示了 Backing Bean\
    \ 在 JSF 的 MVC 范式中的位置。这是一个维恩图，其中控制器和视图的交集由 JSF 组件树表示，该组件树可通过组件的`binding`属性绑定到 Backing\
    \ Bean。视图和模型的交集由 EL（表达式语言）值表达式的属性 getter 和 setter 表示，这些表达式通常通过组件的`value`属性绑定到\
    \ Backing Bean。控制器和模型的交集由 EL 方法表达式的动作方法调用表示，这些调用通常通过组件的`action`属性绑定到 Backing Bean。最后，所有交集的交集由\
    \ Backing Bean 本身表示。\n\n![A454457_1_En_8_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_8_Fig1_HTML.jpg)"
  raw: 'Note that resolving EL expressions in CSS resources only works when the CSS
    resource itself is included via <h:outputStylesheet> instead of <link>. Also noted
    should be that JSF remembers by default only on the very first request of the
    CSS resource whether it contains EL expressions or not. If it didn’t, then JSF
    won’t recheck it on a later request, even not in the development stage. So if
    you notice that your first EL expression in an existing CSS resource doesn’t seem
    to work, you’d better restart the web application. This feature of EL resolving
    in CSS resources is actually pretty useful. If SCSS (Sassy CSS) is a step too
    far for you, then you could use EL to parameterize some repeated CSS properties,
    such as colors.


    ```

    .color-gray {

        color: #{applicationScope[''gray'']=''#B8B8B8''};

    }


    ...


    .someSelector {

        border: 1px solid #{gray};

    }

    .otherSelector {

        color: #{gray};

    }


    ...

    ```


    No, this feature of EL resolving in CSS resources isn’t available in JS resources.
    For that, you’d instead need to print a JS object in the global scope and let
    your JS resources intercept it if necessary. For example,


    ```

    <h:outputScript>var config = #{configuration.script};</h:outputScript>

    <h:outputScript name="scripts/some.js" />

    ```


    whereby the #{configuration.script} just returns a JSON object as string from
    your managed bean. Or, you could let EL print it as a data attribute of an HTML
    element


    ```

    <html lang="en" data-baseuri="#{request.contextPath}/">

        ...

    </html>

    ```


    which is in turn accessible in JS as follows:


    ```

    var baseuri = document.documentElement.dataset.baseuri;

    ```


    or if you’re a jQuery fan:


    ```

    var baseuri = $   ("html").data("baseuri");

    ```


    That said, when creating managed beans on the Java side, or when declaring custom
    EL variables on the Facelets side, such as <h:dataTable var="foo">, <ui:repeat
    var="foo">, or <c:set var="foo">, you need to make absolutely sure that you don’t
    explicitly or implicitly choose a managed bean name or EL variable name which
    clashes with one of the previously listed implicit EL objects, because implicit
    EL objects have higher precedence in EL resolving than user defined names. So,
    for example, the following construct wouldn’t work as you might expect:


    ```

    <ui:repeat value="#{bean.parameters}" var="param">

        #{param}<br />

    </ui:repeat>

    ```


    It would print literally “{}” for each iteration round, which is basically the
    default Map#toString() format of an empty Map. When you reopen the same page with
    a query string like ?foo=bar, then it would print literally “{foo=bar}” for each
    iteration round. You’d better rename the var="param" to something else then.


