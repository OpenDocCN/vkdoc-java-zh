    ## Dynamic Extensions


    The previous examples were mostly about registering the extensions that we needed
    statically, e.g., by registering a factory or the type directly in faces-config.xml.
    Factories give us an opportunity for some dynamic behavior. That is, at the point
    the factory is called we can decide what new type (if any) to return.


    For even more dynamic behavior it’s frequently required to be able to dynamically
    add the factories, or in CDI to dynamically add the producers. CDI has an elaborate
    SPI (server provider interface) for this (simply called “CDI Extensions”) which
    are, however, somewhat outside the scope of this book.


    For classic factories and actually everything that’s in faces-config.xml, there’s
    a somewhat low-level method to add these dynamically: the Application Configuration
    Populator, which we’ll discuss next.'
  trans: '

    这里需要注意几点。首先，这类工厂都必须继承自一个预先定义的父工厂，在本例中就是 `ExternalContextFactory`。其次，存在一个必须遵循的隐式契约，即严格按照示例所示的方式实现构造函数。也就是说，添加一个公共构造函数，其单一参数的类型与超类完全相同，并将此参数传递给父构造函数。然后，该实例可以通过
    `getWrapped()` 方法在其他方法中使用。


    测试其是否正常工作相对简单。我们使用一个与 CDI 版本类似的支撑 bean：


    ```

    @Named @RequestScoped

    public class TestBean {


    @Inject

        private ExternalContext externalContext;


    public String getAuth() {

            return externalContext.getAuthType();

        }

    }

    ```


    以及以下 Facelet：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <p>Test: #{testBean.auth}</p>

        </h:body>

    </html>

    ```


    由于外部上下文也是一种可通过 CDI 注入的类型，细心的读者可能会好奇，当同时为该类型提供了 CDI 替代生产者和经典工厂时会发生什么。答案是，严格来说这并未被规范明确（因此属于未定义行为），但在实践中，强烈暗示经典工厂被用作最终获取外部上下文的来源。这意味着，`ExternalContext`
    的替代生产者只会影响 `ExternalContext` 的直接注入，而不会影响通过任何其他方式获取该类型的情况，例如，通过调用 `FacesContext#getExternalContext()`。这是用户应该清楚意识到的一点。不过，预计规范的未来修订版将使
    CDI 生产者成为初始来源。


    ## 插件


    JSF 在替代生产者和工厂之外提供的另一种扩展类型，本质上是一种插件。这里，核心 JSF 类型不会被替换或增强，而是向运行时的某些部分添加额外的功能。因此，这些新增功能中的大多数必须以某种方式声明它们具体添加了什么，这与仅提供
    X 或 Y 类型实现的工厂不同。


    插件作为 `faces-config.xml` 中 `<application>` 元素的子元素添加，就像上面提到的一些类似工厂的类型一样。支持以下类型：


    *   `<el-resolver>`


    *   `<property-resolver>`（已弃用）


    *   `<variable-resolver>`（已弃用）


    *   `<search-keyword-resolver>`


    我们已经在第 12 章的“自定义搜索关键字”一节中看到了搜索关键字解析器的一个示例。该解析器作为插件的一个特点是 `isResolverForKeyWord()`
    方法，通过该方法，插件可以指示它将为哪个关键字或关键字模式运行。


    我们在这里再看另一个示例，即 EL 解析器。属性解析器和变量解析器都已弃用，并被 EL 解析器取代。EL 解析器本身并非 JSF 特有的类型，而是源自表达式语言（EL）规范。不过，该规范的重要部分起源于
    JSF。


    EL 解析器允许我们以自定义方式解释表达式的所谓基对象和属性。考虑表达式 `#{foo.bar.kaz}`，那么在解析“bar”时，“foo”是基对象，“bar”是属性；而在解析“kaz”时，“bar”是基对象，“kaz”是属性。起初可能有点令人惊讶的是，当解析“foo”时，基对象为
    null，而“foo”是属性。


    在实践中，通常不需要添加自定义 EL 解析器，我们通常只需定义一个满足需求的命名 CDI bean 即可。然而，当 JSF 集成在一个完全不同的环境中时，自定义
    EL 解析器可能会发挥作用，例如，我们希望表达式解析到一个完全不同的（受管理的）bean 系统。即便如此，即使在这种情况下，CDI 到其他 bean 的桥接器可能是更好的选择，但了解自定义
    EL 解析器是我们武器库中的另一个工具也是件好事。


    无论如何，为了演示 EL 解析器的功能，我们将展示一个示例，其中 EL 表达式的基对象被解释为一个模式，这是我们无法直接用命名 CDI bean 做到的。


    以下展示了一个 EL 解析器示例：


    ```

    public class CustomELResolver extends ELResolver {


    protected boolean isResolverFor(Object base, Object property) {

            return base == null

                && property instanceof String

                && ((String) property).startsWith("dev");

        }


    @Override

        public Object getValue

            (ELContext context, Object base, Object property)

        {

            if (isResolverFor(base, property)) {

                context.setPropertyResolved(true);

                return property.toString().substring(3);

            }

            return null;

        }


    @Override

        public Class<?> getType

            (ELContext context, Object base, Object property)

        {

            if (isResolverFor(base, property)) {

                context.setPropertyResolved(true);

                return String.class;

            }

            return null;

        }


    @Override

        public Class<?> getCommonPropertyType

            (ELContext context, Object base)

        {

            return base == null ? getType(context, base, null) : null;

        }


    @Override

        public boolean isReadOnly

            (ELContext context, Object base, Object property)

        {

            return true;

        }


    @Override

        public void setValue

            (ELContext context, Object base, Object property, Object value)

        {

            // NOOP;

        }


    @Override

        public Iterator<FeatureDescriptor> getFeatureDescriptors

            (ELContext context, Object base)

        {

            return null;

        }

    }

    ```


    如果我们现在使用以下 Facelet：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head />

        <h:body>

            <p>Test: #{devThisIsDev}</p>

        </h:body>

    </html>

    ```


    我们会在请求时看到打印出“Test: ThisIsDev”。这里发生的是，自定义 EL 解析器处理所有以“dev”开头的名称。


    ## 动态扩展


    前面的示例主要涉及静态注册我们需要的扩展，例如，通过在 `faces-config.xml` 中直接注册工厂或类型。工厂为我们提供了一些实现动态行为的机会。也就是说，在调用工厂时，我们可以决定返回什么新类型（如果有的话）。


    为了实现更动态的行为，通常需要能够动态添加工厂，或者在 CDI 中动态添加生产者。CDI 为此提供了一个复杂的 SPI（服务提供者接口）（简称为“CDI 扩展”），但这在一定程度上超出了本书的范围。


    对于经典工厂以及实际上 `faces-config.xml` 中的所有内容，有一种相对底层的方法可以动态添加它们：应用程序配置填充器，我们接下来将讨论它。

    '
- fmt: "### Application Configuration Populator\n\nThe `ApplicationConfigurationPopulator`\
    \ is a mechanism to programmatically provide an additional `faces-config.xml`\
    \ file, albeit by using the XML DOM (Document Object Model) API (application programming\
    \ interface). This DOM API can be slightly obscure to use, and the power of the\
    \ `ApplicationConfigurationPopulator` is limited by its ability to only configure.\
    \ There’s no SPI in JSF to directly modify other `faces-config.xml` at this level.\n\
    \nThe mechanism works by implementing the abstract class `javax.faces.application.ApplicationConfigurationPopulator`\
    \ and putting the fully qualified class name of this in a `META-INF/services/javax.faces.application.ApplicationConfigurationPopulator`\
    \ file of a JAR library.\n\nTo demonstrate this, we’ll create another version\
    \ of the `ExternalContextProducer` that we demonstrated earlier, this time using\
    \ the mentioned `ApplicationConfigurationPopulator`. For this we take the same\
    \ code, remove the `faces-config.xml` file, and add the `META-INF/services` entry\
    \ as well as the following Java class:\n\n```\npublic class ConfigurationProvider\n\
    \    extends ApplicationConfigurationPopulator\n{\n    @Override\n    public void\
    \ populateApplicationConfiguration(Document document) {\n        String ns = document.getDocumentElement().getNamespaceURI();\n\
    \        Element factory = document.createElementNS(ns, \"factory\");\n      \
    \  Element externalContextFactory =\n            document.createElementNS(ns,\
    \ \"external-context-factory\");\n        externalContextFactory.appendChild(\n\
    \            document.createTextNode(\n                ExternalContextProducer.class.getName()));\n\
    \        factory.appendChild(externalContextFactory);\n        document.getDocumentElement().appendChild(factory);\n\
    \    }\n}\n```\n\nA caveat is that since this uses the `java.util.ServiceLoader`\
    \ under the hood, it really only works when `ConfigurationProvider` and `ExternalContextProducer`\
    \ are packaged together in an actual JAR library placed in the `/WEB-INF/lib`\
    \ of the WAR, instead of just being put directly in the WAR.\n\n### The Application\
    \ Main Class\n\nAbove we discussed the `ApplicationConfigurationPopulator`, which\
    \ as we saw is actually a `faces-config.xml` provider of sorts. This means it\
    \ works with fully qualified class names and elements that are still text in nature.\n\
    \nJSF features a variety of somewhat more traditional programmatic APIs as well,\
    \ with perhaps the most well-known of them being the `javax.faces.application.Application`\
    \ main class, which is among others a holder for the same singletons that we mentioned\
    \ previously in the section “Extending Classical Artifacts.” For completeness\
    \ we’ll repeat this list here.\n\n*   `javax.faces.application.NavigationHandler`\n\
    *   `javax.faces.application.ViewHandler`\n*   `javax.faces.application.ResourceHandler`\n\
    *   `javax.faces.component.search.SearchExpressionHandler`\n*   `javax.faces.flow.FlowHandler`\n\
    *   `javax.faces.application.StateManager`\n*   `javax.faces.event.ActionListener`\n\
    \nAll of these have corresponding setters on the `Application` class. For instance,\
    \ the following shows the Javadoc and method declaration for `ActionListener`:\n\
    \n```\n/**\n  * <p>\n  * Set the default {@link ActionListener} to be registered\
    \ for all\n  * {@link javax.faces.component.ActionSource} components.\n  * </p>\n\
    \  *\n  * @param listener The new default {@link ActionListener}\n  *\n  * @throws\
    \ NullPointerException\n  *            if <code>listener</code> is <code>null</code>\n\
    \  */\npublic abstract void setActionListener(ActionListener listener);\n```\n\
    \nLikewise, the `Application` class also has “add” methods for the plug-in types\
    \ we mentioned in the section “Plug-ins.”\n\n*   `javax.el.ELResolver`\n*   `javax.faces.el.PropertyResolver`\
    \ (deprecated)\n*   `javax.faces.el.VariableResolver` (deprecated)\n*   `javax.faces.component.serarch.SearchKeywordResolver`\n\
    \nA difficulty with using the `Application` class to set these singletons is,\
    \ first of all, that it’s timing sensitive. This means we can only set such classes\
    \ from a certain point, which is obviously not before the point that the `Application`\
    \ itself is available, and for some singletons not until the first request is\
    \ serviced. This first request is a somewhat difficult point to track.\n\nSpecifically,\
    \ the resource handler, view handler, flow handler, and state handler, uhhh, state\
    \ *manager*, can’t be set anymore after the first request, while the EL resolver\
    \ and search keyword resolver can’t be added either after said first request.\n\
    \nTo demonstrate this we’ll add the custom EL resolver again that we demonstrated\
    \ above, but in a more dynamic way now. To do this, we remove the EL resolver\
    \ from our `faces-config.xml` file and add a system listener instead. Our `faces-config.xml`\
    \ file then looks as follows:\n\n```\n<application>\n    <system-event-listener>\n\
    \        <system-event-listener-class>\n            com.example.project.ELResolverInstaller\n\
    \        </system-event-listener-class>\n        <system-event-class>\n      \
    \      javax.faces.event.PostConstructApplicationEvent\n        </system-event-class>\n\
    \    </system-event-listener>\n</application>\n```\n\nIndeed, this doesn’t get\
    \ rid of the XML and, in fact, it’s even more XML, but reducing or getting rid\
    \ of XML is not the main point here, which is the ability to register the EL resolver\
    \ in a more dynamic way.\n\nThe system event listener that we just registered\
    \ here looks as follows:\n\n```\npublic class ELResolverInstaller implements SystemEventListener\
    \ {\n\n@Override\n    public boolean isListenerForSource(Object source) {\n  \
    \      return source instanceof Application;\n    }\n\n@Override\n    public void\
    \ processEvent(SystemEvent event) {\n        Application application = (Application)\
    \ event.getSource();\n        application.addELResolver(new CustomELResolver());\n\
    \    }\n}\n```\n\nWhat we have here is a system event listener that listens to\
    \ the `PostConstructApplicationEvent`. This is generally a good moment to add\
    \ plug-ins like the EL resolver. The `Application` instance is guaranteed to be\
    \ available at this point, and request processing hasn’t started yet, so we’re\
    \ surely in time before the first request has been handled."
  raw: '### Application Configuration Populator


    The Application Configuration Populator is a mechanism to programmatically provide
    an additional faces-config.xml file, albeit by using the XML DOM (Document Object
    Model) API (application programming interface). This DOM API can be slightly obscure
    to use, and the power of the Application Configuration Populator is limited by
    its ability to only configure. There’s no SPI in JSF to directly modify other
    faces-config.xml at this level.


    The mechanism works by implementing the abstract class javax.faces.application.ApplicationConfigurationPopulator
    and putting the fully qualified class name of this in a META-INF/services/javax.faces.application.ApplicationConfigurationPopulator
    file of a JAR library.


    To demonstrate this, we’ll create another version of the ExternalContextProducer
    that we demonstrated earlier, this time using the mentioned ApplicationConfigurationPopulator.
    For this we take the same code, remove the faces-config.xml file, and add the
    META-INF/services entry as well as the following Java class :


    ```

    public class ConfigurationProvider

        extends ApplicationConfigurationPopulator

    {

        @Override

        public void populateApplicationConfiguration(Document document) {

            String ns = document.getDocumentElement().getNamespaceURI();

            Element factory = document.createElementNS(ns, "factory");

            Element externalContextFactory =

                document.createElementNS(ns, "external-context-factory");

            externalContextFactory.appendChild(

                document.createTextNode(

                    ExternalContextProducer.class.getName()));

            factory.appendChild(externalContextFactory);

            document.getDocumentElement().appendChild(factory);

        }

    }

    ```


    A caveat is that since this uses the java.util.ServiceLoader under the hood, it
    really only works when ConfigurationProvider and ExternalContextProducer are packaged
    together in an actual JAR library placed in the /WEB-INF/lib of the WAR, instead
    of just being put directly in the WAR.


    ### The Application Main Class


    Above we discussed the Application Configuration Populator, which as we saw is
    actually a faces-config.xml provider of sorts. This means it works with fully
    qualified class names and elements that are still text in nature.


    JSF features a variety of somewhat more traditional programmatic APIs as well,
    with perhaps the most well-known of them being the javax.faces.application.Application
    main class, which is among others a holder for the same singletons that we mentioned
    previously in the section “Extending Classical Artifacts.” For completeness we’ll
    repeat this list here.


    *   javax.faces.application.NavigationHandler


    *   javax.faces.application.ViewHandler


    *   javax.faces.application.ResourceHandler


    *   javax.faces.component.search.SearchExpressionHandler


    *   javax.faces.flow.FlowHandler


    *   javax.faces.application.StateManager


    *   javax.faces.event.ActionListener


    All of these have corresponding setters on the Application class. For instance,
    the following shows the Javadoc and method declaration for ActionListener:


    ```

    /**

      * <p>

      * Set the default {@link ActionListener} to be registered for all

      * {@link javax.faces.component.ActionSource} components.

      * </p>

      *

      * @param listener The new default {@link ActionListener}

      *

      * @throws NullPointerException

      *            if <code>listener</code> is <code>null</code>

      */

    public abstract void setActionListener(ActionListener listener);

    ```


    Likewise, the Application class also has “add” methods for the plug-in types we
    mentioned in the section “Plug-ins.”


    *   javax.el.ELResolver


    *   javax.faces.el.PropertyResolver (deprecated)


    *   javax.faces.el.VariableResolver (deprecated)


    *   javax.faces.component.serarch.SearchKeywordResolver


    A difficulty with using the Application class to set these singletons is, first
    of all, that it’s timing sensitive. This means we can only set such classes from
    a certain point, which is obviously not before the point that the Application
    itself is available, and for some singletons not until the first request is serviced.
    This first request is a somewhat difficult point to track.


    Specifically, the resource handler, view handler, flow handler, and state handler,
    uhhh, state *manager*, can’t be set anymore after the first request, while the
    EL resolver and search keyword resolver can’t be added either after said first
    request.


    To demonstrate this we’ll add the custom EL resolver again that we demonstrated
    above, but in a more dynamic way now. To do this, we remove the EL resolver from
    our faces-config.xml file and add a system listener instead. Our faces-config.xml
    file then looks as follows:


    ```

    <application>

        <system-event-listener>

            <system-event-listener-class>

                com.example.project.ELResolverInstaller

            </system-event-listener-class>

            <system-event-class>

                javax.faces.event.PostConstructApplicationEvent

            </system-event-class>

        </system-event-listener>

    </application>

    ```


    Indeed, this doesn’t get rid of the XML and, in fact, it’s even more XML, but
    reducing or getting rid of XML is not the main point here, which is the ability
    to register the EL resolver in a more dynamic way.


    The system event listener that we just registered here looks as follows:


    ```

    public class ELResolverInstaller implements SystemEventListener {


    @Override

        public boolean isListenerForSource(Object source) {

            return source instanceof Application;

        }


    @Override

        public void processEvent(SystemEvent event) {

            Application application = (Application) event.getSource();

            application.addELResolver(new CustomELResolver());

        }

    }

    ```


    What we have here is a system event listener that listens to the PostConstructApplicationEvent*.*
    This is generally a good moment to add plug-ins like the EL resolver. The Application
    instance is guaranteed to be available at this point, and request processing hasn’t
    started yet, so we’re surely in time before the first request has been handled.'
  trans: '

    ### 应用程序配置填充器


    应用程序配置填充器是一种机制，用于通过编程方式提供额外的 `faces-config.xml` 文件，尽管它使用的是 XML DOM（文档对象模型）API（应用程序编程接口）。这个
    DOM API 使用起来可能有些晦涩，而且应用程序配置填充器的功能受限于它只能进行配置。在 JSF 中，没有 SPI 能够在此层级直接修改其他 `faces-config.xml`。


    该机制通过实现抽象类 `javax.faces.application.ApplicationConfigurationPopulator`，并将该类的完全限定类名放入
    JAR 库的 `META-INF/services/javax.faces.application.ApplicationConfigurationPopulator`
    文件中来工作。


    为了演示这一点，我们将创建之前演示过的 `ExternalContextProducer` 的另一个版本，这次使用上述的 `ApplicationConfigurationPopulator`。为此，我们采用相同的代码，移除
    `faces-config.xml` 文件，并添加 `META-INF/services` 条目以及以下 Java 类：


    ```

    public class ConfigurationProvider

        extends ApplicationConfigurationPopulator

    {

        @Override

        public void populateApplicationConfiguration(Document document) {

            String ns = document.getDocumentElement().getNamespaceURI();

            Element factory = document.createElementNS(ns, "factory");

            Element externalContextFactory =

                document.createElementNS(ns, "external-context-factory");

            externalContextFactory.appendChild(

                document.createTextNode(

                    ExternalContextProducer.class.getName()));

            factory.appendChild(externalContextFactory);

            document.getDocumentElement().appendChild(factory);

        }

    }

    ```


    需要注意的是，由于这底层使用了 `java.util.ServiceLoader`，它仅在 `ConfigurationProvider` 和 `ExternalContextProducer`
    一起被打包到放置在 WAR 的 `/WEB-INF/lib` 目录下的实际 JAR 库中时才有效，而不是直接放在 WAR 中。


    ### 应用程序主类


    上面我们讨论了应用程序配置填充器，正如我们所看到的，它实际上是一种 `faces-config.xml` 提供者。这意味着它处理的是完全限定类名和本质上仍是文本的元素。


    JSF 也提供了一些更传统的编程式 API，其中最著名的可能是 `javax.faces.application.Application` 主类，它除了其他功能外，还持有我们在“扩展经典构件”一节中提到的那些单例。为了完整起见，我们在此重复这个列表。


    *   `javax.faces.application.NavigationHandler`


    *   `javax.faces.application.ViewHandler`


    *   `javax.faces.application.ResourceHandler`


    *   `javax.faces.component.search.SearchExpressionHandler`


    *   `javax.faces.flow.FlowHandler`


    *   `javax.faces.application.StateManager`


    *   `javax.faces.event.ActionListener`


    所有这些在 `Application` 类上都有相应的 setter 方法。例如，下面展示了 `ActionListener` 的 Javadoc 和方法声明：


    ```

    /**

      * <p>

      * 设置要为所有 {@link javax.faces.component.ActionSource} 组件注册的默认 {@link ActionListener}。

      * </p>

      *

      * @param listener 新的默认 {@link ActionListener}

      *

      * @throws NullPointerException

      *            如果 <code>listener</code> 为 <code>null</code>

      */

    public abstract void setActionListener(ActionListener listener);

    ```


    同样地，`Application` 类对于我们在“插件”一节中提到的插件类型也有“add”方法。


    *   `javax.el.ELResolver`


    *   `javax.faces.el.PropertyResolver`（已弃用）


    *   `javax.faces.el.VariableResolver`（已弃用）


    *   `javax.faces.component.serarch.SearchKeywordResolver`


    使用 `Application` 类来设置这些单例的一个困难在于，首先，它对时机很敏感。这意味着我们只能从某个特定时间点开始设置这些类，显然不能早于 `Application`
    本身可用的时间点，并且对于某些单例，直到第一个请求被处理时才能设置。这个第一个请求是一个比较难以追踪的时间点。


    具体来说，资源处理器、视图处理器、流程处理器和状态处理器，呃，状态*管理器*，在第一个请求之后就不能再设置了，而 EL 解析器和搜索关键字解析器在第一个请求之后也不能再添加。


    为了演示这一点，我们将再次添加上面演示过的自定义 EL 解析器，但这次采用更动态的方式。为此，我们从 `faces-config.xml` 文件中移除 EL
    解析器，并添加一个系统监听器。我们的 `faces-config.xml` 文件如下所示：


    ```

    <application>

        <system-event-listener>

            <system-event-listener-class>

                com.example.project.ELResolverInstaller

            </system-event-listener-class>

            <system-event-class>

                javax.faces.event.PostConstructApplicationEvent

            </system-event-class>

        </system-event-listener>

    </application>

    ```


    确实，这并没有摆脱 XML，实际上，XML 甚至更多了，但减少或摆脱 XML 并不是这里的重点，重点是以更动态的方式注册 EL 解析器的能力。


    我们刚刚在这里注册的系统事件监听器如下所示：


    ```

    public class ELResolverInstaller implements SystemEventListener {


    @Override

        public boolean isListenerForSource(Object source) {

            return source instanceof Application;

        }


    @Override

        public void processEvent(SystemEvent event) {

            Application application = (Application) event.getSource();

            application.addELResolver(new CustomELResolver());

        }

    }

    ```


    这里我们有一个系统事件监听器，它监听 `PostConstructApplicationEvent`。这通常是添加像 EL 解析器这样的插件的好时机。此时
    `Application` 实例保证可用，并且请求处理尚未开始，因此我们肯定能在第一个请求被处理之前及时完成。

