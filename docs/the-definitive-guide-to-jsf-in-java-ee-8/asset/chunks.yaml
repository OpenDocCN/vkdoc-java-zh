- fmt: "# Configuration\n\nThe JSR-356 WebSocket specification does not officially\
    \ support programmatic initialization of the socket end point during runtime.\
    \ So we cannot initialize it by simply declaring `<f:websocket>` in the view and\
    \ wait until a JSF page referencing it is being opened for the first time. We\
    \ really need to initialize it explicitly during deployment time. We could do\
    \ that by default, but having an unused WebSocket end point open forever is not\
    \ really nice if it’s never used by the web application. So we cannot avoid having\
    \ a context parameter to explicitly initialize it during deployment time.\n\n\
    ```\n<context-param>\n    <param-name>javax.faces.ENABLE_WEBSOCKET_ENDPOINT</param-name>\n\
    \    <param-value>true</param-value>\n</context-param>\n```\n\nIf you prefer programmatic\
    \ initialization over declarative initialization, then you can always use `ServletContext#setInitParameter()`\
    \ in a `ServletContainerInitializer` of your web fragment library as follows:\n\
    \n```\npublic class YourInitializer implements ServletContainerInitializer {\n\
    \n    @Override\n    public void onStartup(Set<Class<?>> types, ServletContext\
    \ context) {\n        context.setInitParameter(\n            PushContext.ENABLE_WEBSOCKET_ENDPOINT_PARAM_NAME,\
    \ \"true\");\n    }\n}\n```\n\nNote that it is not possible to perform this task\
    \ in a `ServletContextListener` as JSF will actually register the WebSocket end\
    \ point in its own `ServletContainerInitializer` implementation which always runs\
    \ before any `ServletContextListener`.\n\nOnce the WebSocket end point is enabled\
    \ and successfully initialized during deployment, it will listen for WebSocket\
    \ handshake requests on the URL (uniform resource locator) pattern `/javax.faces.push/*`.\
    \ The first path element will represent the WebSocket channel name.\n\nComing\
    \ back to “officially,” some WebSocket implementations do, however, support programmatic\
    \ initialization, such as the one provided by Undertow, which is in turn used\
    \ in WildFly. Unfortunately, the spec doesn’t say so, and there may be WebSocket\
    \ implementations that simply do not support programmatic initialization, such\
    \ as Tyrus as used in Payara.[¹](#A454457_1_En_10_Chapter.xhtml#Fn1)\n\nThe WebSocket\
    \ container will, by default, listen for handshake requests on the same port as\
    \ the application server is listening for HTTP requests. You can optionally change\
    \ the port with another `web.xml` context parameter:\n\n```\n<context-param>\n\
    \    <param-name>javax.faces.WEBSOCKET_ENDPOINT_PORT</param-name>\n    <param-value>8000</param-value>\n\
    </context-param>\n```\n\nOr programmatically in a `ServletContainerInitializer`:\n\
    \n```\ncontext.setInitParameter(\n    PushContext.WEBSOCKET_ENDPOINT_PORT_PARAM_NAME,\
    \ \"8000\");\n```\n\n# Usage\n\nIn your JSF page, just declare the `<f:websocket>`\
    \ tag along with the required `channel` attribute representing the channel name\
    \ and the optional `onmessage` attribute representing a reference to a JavaScript\
    \ function.\n\n```\n<f:websocket channel=\"test\" onmessage=\"logMessage\" />\n\
    \n<script>\n    function logMessage(message, channel, event) {\n        console.log(message);\n\
    \    }\n</script>\n```\n\nThe JavaScript function will be invoked with three arguments.\n\
    \n1. `message`: the push message as JSON object.\n2. `channel`: the WebSocket\
    \ channel name. This may be useful in case you intend to have a global listener,\
    \ or want to manually control the close of the WebSocket.\n3. `event`: the original\
    \ `MessageEvent` object. This may be useful in case you intend to inspect it in\
    \ the JavaScript function.\n\nOn the WAR side, you can inject the `PushContext`\
    \ via the `@Push` annotation in any web artifact that supports CDI injection.\
    \ This can be a simple CDI managed bean, but it can also be a `@WebServlet`, `@WebFilter`\
    \ or `@WebListener`.\n\n```\nimport javax.inject.Named;\nimport javax.enterprise.context.RequestScoped;\n\
    \nimport javax.inject.Inject;\nimport javax.faces.push.Push;\nimport javax.faces.push.PushContext;\n\
    \n@Named @RequestScoped\npublic class Bean {\n\n    @Inject @Push\n    private\
    \ PushContext test;\n\n    public void submit() {\n        test.send(\"Hello World!\"\
    );\n    }\n}\n```\n\nThe `PushContext` variable name `test` must match the channel\
    \ name declared in the JSF page. In case you cannot match the variable name with\
    \ the channel name, you can always specify the channel name in the optional `channel`\
    \ attribute of the `@Push` annotation.\n\n```\n@Inject @Push(channel=\"test\"\
    )\nprivate PushContext foo;\n```\n\nOnce the `submit()` method of the bean shown\
    \ before is invoked by some JSF command component, even in a different JSF page,\
    \ the push message “Hello World!” will be sent to **all** opened sockets on the\
    \ very same channel name, application wide.\n\n# Scopes and Users\n\nAs you may\
    \ have realized, `<f:websocket>` is thus, by default, application scoped. You\
    \ can control the scope by the optional `scope` attribute. Allowed values are\
    \ `application`, `session`, and `view`.\n\nWhen set to `session`, the message\
    \ will be sent to all opened sockets on the very same channel in the current session\
    \ only.\n\n```\n<f:websocket channel=\"progress\" scope=\"session\" />\n```\n\n\
    This is particularly useful for progress messages coming from long-running session-scoped\
    \ background tasks initiated by the user itself. This way the user can just continue\
    \ browsing the site without the need to wait for the result on the very same page.\n\
    \nAlternatively, you can also set the optional `user` attribute to a serializable\
    \ value representing the unique user identifier, which can be a `String` representing\
    \ the user login name or a `Long` representing the user ID. When this attribute\
    \ is set, the scope of the socket will automatically default to `session` and\
    \ it cannot be set to `application`.\n\n```\n<f:websocket channel=\"chat\" user=\"\
    #{loggedInUser.id}\" />\n```\n\nThis offers the opportunity to send a message\
    \ to a specific user as follows:\n\n```\nprivate String message;\nprivate User\
    \ recipient;\n\n@Inject @Push\nprivate PushContext chat;\n\npublic void sendMessage()\
    \ {\n    Long recipientId = recipient.getId();\n    chat.send(message, recipientId);\n\
    }\n```\n\nYou can even send it to multiple users by providing a `Set` argument.\n\
    \n```\nprivate String message;\nprivate Set<User> recipients;\n\n@Inject @Push\n\
    private PushContext chat;\n\npublic void sendMessage() {\n    Set<Long> recipientIds\
    \ = recipients.stream()\n        .map(User::getId)\n        .collect(Collectors.toSet());\n\
    \    chat.send(message, recipientIds);\n}\n```\n\nIn other words, you can easily\
    \ implement a chat box this way. Incidentally, real-time user targeted notifications\
    \ at, for example, Stack Overflow and Facebook work this way.\n\nWhen the scope\
    \ is set to `view`, the message will be sent to the opened socket on the specified\
    \ channel in the current view only. This won’t affect any sockets on the same\
    \ channel in all other views throughout the application.\n\n```\n<f:websocket\
    \ channel=\"push\" scope=\"view\" />\n```\n\nThis is also supported in combination\
    \ with the `user` attribute.\n\n```\n<f:websocket channel=\"chat\" user=\"#{user.id}\"\
    \ scope=\"view\" />\n```\n\nThis construct is somewhat unusual though and should\
    \ only be used if the logged-in user represented by `user` attribute can have\
    \ a shorter lifetime than the HTTP session. This is, however, in turn considered\
    \ a poor security practice. The best security practice is, namely, that the HTTP\
    \ session is invalidated during login and during logout. Invalidating the HTTP\
    \ session during login prevents session fixation attacks and invalidating the\
    \ session during logout prevents dirty user-specific data lingering around in\
    \ HTTP session."
  raw: '## Configuration


    The JSR-356 WebSocket specification does not officially support programmatic initialization
    of the socket end point during runtime. So we cannot initialize it by simply declaring
    <f:websocket> in the view and wait until a JSF page referencing it is being opened
    for the first time. We really need to initialize it explicitly during deployment
    time. We could do that by default, but having an unused WebSocket end point open
    forever is not really nice if it’s never used by the web application. So we cannot
    avoid having a context parameter to explicitly initialize it during deployment
    time.


    ```

    <context-param>

        <param-name>javax.faces.ENABLE_WEBSOCKET_ENDPOINT</param-name>

        <param-value>true</param-value>

    </context-param>

    ```


    If you prefer programmatic initialization over declarative initialization, then
    you can always use ServletContext#setInitParameter() in a ServletContainerInitializer
    of your web fragment library as follows:


    ```

    public class YourInitializer implements ServletContainerInitializer {


        @Override

        public void onStartup(Set<Class<?>> types, ServletContext context) {

            context.setInitParameter(

                PushContext.ENABLE_WEBSOCKET_ENDPOINT_PARAM_NAME, "true");

        }

    }

    ```


    Note that it is not possible to perform this task in a ServletContextListener
    as JSF will actually register the WebSocket end point in its own ServletContainerInitializer
    implementation which always runs before any ServletContextListener.


    Once the WebSocket end point is enabled and successfully initialized during deployment,
    it will listen for WebSocket handshake requests on the URL (uniform resource locator)
    pattern /javax.faces.push/*. The first path element will represent the WebSocket
    channel name.


    Coming back to “officially,” some WebSocket implementations do, however, support
    programmatic initialization, such as the one provided by Undertow , which is in
    turn used in WildFly. Unfortunately, the spec doesn’t say so, and there may be
    WebSocket implementations that simply do not support programmatic initialization,
    such as Tyrus as used in Payara.[¹](#A454457_1_En_10_Chapter.xhtml#Fn1)


    The WebSocket container will, by default, listen for handshake requests on the
    same port as the application server is listening for HTTP requests. You can optionally
    change the port with another web.xml context parameter,


    ```

    <context-param>

        <param-name>javax.faces.WEBSOCKET_ENDPOINT_PORT</param-name>

        <param-value>8000</param-value>

    </context-param>

    ```


    or programmatically in a ServletContainerInitializer:


    ```

    context.setInitParameter(

        PushContext.WEBSOCKET_ENDPOINT_PORT_PARAM_NAME, "8000");

    ```


    ## Usage


    In your JSF page , just declare the <f:websocket> tag along with the required
    channel attribute representing the channel name and the optional onmessage attribute
    representing a reference to a JavaScript function.


    ```

    <f:websocket channel="test" onmessage="logMessage" />


    <script>

        function logMessage(message, channel, event) {

            console.log(message);

        }

    </script>

    ```


    The JavaScript function will be invoked with three arguments.


    1.  message: the push message as JSON object.


    2.  channel: the WebSocket channel name. This may be useful in case you intend
    to have a global listener, or want to manually control the close of the WebSocket.


    3.  event: the original MessageEvent object. This may be useful in case you intend
    to inspect it in the JavaScript function.


    On the WAR side, you can inject the PushContext via the @Push annotation in any
    web artifact that supports CDI injection. This can be a simple CDI managed bean,
    but it can also be a @WebServlet, @WebFilter or @WebListener.


    ```

    import javax.inject.Named;

    import javax.enterprise.context.RequestScoped;


    import javax.inject.Inject;

    import javax.faces.push.Push;

    import javax.faces.push.PushContext;


    @Named @RequestScoped

    public class Bean {


        @Inject @Push

        private PushContext test;


        public void submit() {

            test.send("Hello World!");

        }

    }

    ```


    The PushContext variable name *test* must match the channel name declared in the
    JSF page. In case you cannot match the variable name with the channel name, you
    can always specify the channel name in the optional channel attribute of the @Push
    annotation.


    ```

    @Inject @Push(channel="test")

    private PushContext foo;

    ```


    Once the submit() method of the bean shown before is invoked by some JSF command
    component, even in a different JSF page, the push message “Hello World!” will
    be sent to **all** opened sockets on the very same channel name, application wide.


    ## Scopes and Users


    As you may have realized, <f:websocket> is thus, by default, application scoped.
    You can control the scope by the optional scope attribute. Allowed values are
    application, session, and view.


    When set to session, the message will be sent to all opened sockets on the very
    same channel in the current session only.


    ```

    <f:websocket channel="progress" scope="session" />

    ```


    This is particularly useful for progress messages coming from long-running session-scoped
    background tasks initiated by the user itself. This way the user can just continue
    browsing the site without the need to wait for the result on the very same page.


    Alternatively, you can also set the optional user attribute to a serializable
    value representing the unique user identifier, which can be a String representing
    the user login name or a Long representing the user ID. When this attribute is
    set, the scope of the socket will automatically default to session and it cannot
    be set to application.


    ```

    <f:websocket channel="chat" user="#{loggedInUser.id}" />

    ```


    This offers the opportunity to send a message to a specific user as follows:


    ```

    private String message;

    private User recipient;


    @Inject @Push

    private PushContext chat;


    public void sendMessage() {

        Long recipientId = recipient.getId();

        chat.send(message, recipientId);

    }

    ```


    You can even send it to multiple users by providing a Set argument.


    ```

    private String message;

    private Set<User> recipients;


    @Inject @Push

    private PushContext chat;


    public void sendMessage() {

        Set<Long> recipientIds = recipients.stream()

            .map(User::getId)

            .collect(Collectors.toSet());

        chat.send(message, recipientIds);

    }

    ```


    In other words, you can easily implement a chat box this way. Incidentally, real-time
    user targeted notifications at, for example, Stack Overflow and Facebook work
    this way.


    When the scope is set to view, the message will be sent to the opened socket on
    the specified channel in the current view only. This won’t affect any sockets
    on the same channel in all other views throughout the application.


    ```

    <f:websocket channel="push" scope="view" />

    ```


    This is also supported in combination with the user attribute.


    ```

    <f:websocket channel="chat" user="#{user.id}" scope="view" />

    ```


    This construct is somewhat unusual though and should only be used if the logged-in
    user represented by user attribute can have a shorter lifetime than the HTTP session.
    This is, however, in turn considered a poor security practice. The best security
    practice is, namely, that the HTTP session is invalidated during login and during
    logout. Invalidating the HTTP session during login prevents session fixation attacks
    and invalidating the session during logout prevents dirty user-specific data lingering
    around in HTTP session .'
