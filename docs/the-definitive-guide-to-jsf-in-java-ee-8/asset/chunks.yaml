    \ component or `AjaxBehavior` tag, then anything that normally takes place during\
    \ the invoke application phase (fifth phase) will be performed during the apply\
    \ request values phase (second phase) and then only if conversion and validation\
    \ haven’t failed.\n\nHistorically, this attribute was mainly used to be able to\
    \ perform an “inner” action on the form, usually to load a child input component\
    \ depending on the submitted value of the parent input component, without being\
    \ blocked by conversion or validation errors coming from other input components\
    \ in the same form. A common use case was populating a child drop-down on the\
    \ change of a parent drop-down.\n\n```\n<h:selectOneMenu value=\"#{bean.country}\"\
    \ required=\"true\" immediate=\"true\"\n    onchange=\"submit()\" valueChangeListener=\"\
    #{bean.loadCities}\">\n    <f:selectItems value=\"#{bean.countries}\" />\n</h:selectOneMenu>\n\
    <h:selectOneMenu value=\"#{bean.city}\" required=\"true\">\n    <f:selectItems\
    \ value=\"#{bean.cities}\" />\n</h:selectOneMenu>\n```\n\nThis approach obviously\
    \ predates the Web 2.0 era wherein you’d just use Ajax for this. Understand that\
    \ the `immediate` attribute has essentially become useless for this purpose since\
    \ the introduction of `<f:ajax>` in JSF 2.0. Exactly the same use case can be\
    \ achieved in a much cleaner way as follows:\n\n```\n<h:selectOneMenu value=\"\
    #{bean.country}\" required=\"true\">\n    <f:selectItems value=\"#{bean.countries}\"\
    \ />\n    <f:ajax listener=\"#{bean.loadCities}\" render=\"city\" />\n</h:selectOneMenu>\n\
    <h:selectOneMenu id=\"city\" value=\"#{bean.city}\" required=\"true\">\n    <f:selectItems\
    \ value=\"#{bean.cities}\" />\n</h:selectOneMenu>\n```\n\nAs you learned in Chapter\
    \ [4](#A454457_1_En_4_Chapter.xhtml), the `execute` attribute of `<f:ajax>` already\
    \ defaults to `@this`, so it’s just omitted. This also means that all other `EditableValueHolder`\
    \ components in the same form won’t be processed and thus won’t cause `#{bean.loadCities}`\
    \ ever to be blocked by conversion or validation errors coming from other inputs.\n\
    \nThese days, with Ajax magic and all, the `immediate` attribute has thus lost\
    \ its main use case. JSF could do as well without it. Due to its historic use\
    \ case, many starters may mistake its primary purpose to be “skip all validation.”\
    \ This is, however, not true. For that, you’d need to fine-tune the `execute`\
    \ attribute of `<f:ajax>` so that it only covers the input components that really\
    \ need to be validated. In case you want to actually “skip all validation” while\
    \ submitting the entire form, you’d best use Bean Validation constraints instead\
    \ (the `@NotNull` and friends) and simply have `<f:validateBean disabled=\"true\"\
    >` wrapping the entire form.\n\n## Custom Converters\n\nFrom the beginning JSF\
    \ has supported custom converters. The main use case is to be able to convert\
    \ a non-standard model value, such as a persistence entity specific to the web\
    \ application. The less common use case is to extend an existing standard converter\
    \ and set some commonly used defaults in its constructor so that you can get away\
    \ with less code in order to declare the desired standard converter configuration\
    \ in the view.\n\nImagine that you want to be able to create master-detail pages\
    \ on your persistence entities wherein you’d like to pass the ID of the entity\
    \ around as a request parameter from the master page to the detail page. Following\
    \ is an example data table in the master page `/products/list.xhtml` based on\
    \ a fictive `Product` entity:\n\n```\n<h:dataTable value=\"#{listProducts.products}\"\
    \ var=\"product\">\n    <h:column>#{product.id}</h:column>\n    <h:column>#{product.name}</h:column>\n\
    \    <h:column>#{product.description}</h:column>\n    <h:column>\n        <h:link\
    \ value=\"Edit\" outcome=\"edit\">\n            <f:param name=\"id\" value=\"\
    #{product.id}\" />\n        </h:link>\n    </h:column>\n</h:dataTable>\n```\n\n\
    Note the last column of the table. It generates a link to the detail page `/products/edit.xhtml`\
    \ whereby the ID of the entity is passed as a GET request parameter as in `/product.xhtml?id=42`.\
    \ In the detail page, you can use `<f:viewParam>` to set the GET request parameter\
    \ in the backing bean.\n\n```\n<f:metadata>\n    <f:viewParam name=\"id\" value=\"\
    #{editProduct.product}\"\n        required=\"true\" requiredMessage=\"Bad request\"\
    >\n    </f:viewParam>\n</f:metadata>\n...\n<h:form>\n    <h1>Edit product #{editProduct.product.id}</h1>\n\
    \    <h:inputText value=\"#{editProduct.product.name}\" />\n    <h:inputText value=\"\
    #{editProduct.product.description}\" />\n    ...\n</h:form>\n```\n\nHowever, there’s\
    \ one small problem: the GET request parameter is in Java perspective basically\
    \ a `String` representing the product ID while the `product` property of the `EditProduct`\
    \ backing bean actually expects a whole `Product` entity identified by the passed-in\
    \ ID.\n\n```\n@Named @ViewScoped\npublic class EditProduct implements Serializable\
    \ {\n\nprivate Product product;\n\n// Getter+setter.\n}\n```\n\nFor exactly this\
    \ conversion step, a custom converter has to be created which is capable of converting\
