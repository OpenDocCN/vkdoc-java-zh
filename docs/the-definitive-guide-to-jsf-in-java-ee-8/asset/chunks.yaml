- fmt: "# Custom Validators\n\nAlso, validators can be customized in JSF from the\
    \ beginning. As almost every basic use case is already covered by standard JSF\
    \ validators and even Bean Validation constraints, such as length, range, and\
    \ pattern validation, the most common use case left to a custom JSF validator\
    \ is validating the data integrity by testing the submitted value against database-based\
    \ constraints. Generally, those concern unique constraints.\n\nA good real-world\
    \ example is validating during e-mail-based signup or while changing the e-mail\
    \ address in the user account management page when the specified e-mail address\
    \ is not already in use. Particularly, the change event can’t be tested with a\
    \ Bean Validation constraint in a simple way, because Bean Validation doesn’t\
    \ offer the opportunity to compare the old value with the new value without re-obtaining\
    \ the entity from the database. To start, just implement the `javax.faces.validator.Validator`\
    \ interface accordingly.\n\n```\n@FacesValidator(value=\"project.UniqueEmailValidator\"\
    , managed=true)\npublic class UniqueEmailValidator implements Validator<String>\
    \ {\n\n@Inject\n    private UserService userService;\n\n@Override\n    public\
    \ void validate\n        (FacesContext context, UIComponent component, String\
    \ email)\n            throws ValidatorException\n    {\n        if (email == null\
    \ || email.isEmpty()) {\n            return; // Let @NotNull or required=true\
    \ handle this.\n        }\n\nString oldEmail = (String) ((UIInput) component).getValue();\n\
    \nif (!email.equals(oldEmail) && userService.exist(email)) {\n            throw\
    \ new ValidatorException(\n                new FacesMessage(\"Email already in\
    \ use\"));\n        }\n    }\n}\n```\n\nIn order to get it to run, just specify\
    \ exactly the declared validator ID in the `validator` attribute of any `EditableValueHolder`\
    \ component, or the `validatorId` attribute of any nested `<f:validator>` tag.\n\
    \n```\n<h:inputText value=\"#{signup.user.email}\"\n    validator=\"project.UniqueEmailValidator\"\
    >\n</h:inputText>\n```\n\nWhen looking at the `UniqueEmailValidator` class, you’ll\
    \ notice that the annotation and the interface also got the same JSF 2.3 changes\
    \ as the converter. Like the `@FacesConverter`, the `@FacesValidator` annotation,\
    \ since JSF 2.3, also got a new `managed` attribute which should enable dependency\
    \ injection in the validator implementation. And, like the `Converter<T>`, the\
    \ `Validator<T>` also got parameterized whereby the `validate()` method now takes\
    \ a `T` instead of `Object` as a value argument.\n\nYou also need to make sure\
    \ that your validators are implemented so that they skip validation when the value\
    \ argument is `null` or empty. Historically, in JSF 1.x, the `validate()` method\
    \ would always be skipped when the value argument is `null`. However, this has\
    \ changed since the integration of Bean Validation in JSF 2.0, thereby breaking\
    \ backward compatibility on existing JSF 1.x-based custom validators. This breaking\
    \ change could be turned off by explicitly setting the following `web.xml` context\
    \ parameter:\n\n```\n<context-param>\n    <param-name>javax.faces.VALIDATE_EMPTY_FIELDS</param-name>\n\
    \    <param-value>false</param-value>\n</context-param>\n```\n\nThe disadvantage\
    \ of this is that the `@NotNull` of Bean Validation won’t be triggered by JSF\
    \ and you’d basically need to repeat this constraint for all JSF input components\
    \ by explicitly setting their `required` attribute to `true`. You’d better not\
    \ do this and just keep performing the `null` and empty check in your custom validator.\
    \ Having validation constraints at a single place in the model with help of Bean\
    \ Validation is more Don’t Repeat Yourself (DRY) than repeating the validation\
    \ constraints across different layers using the very same model.\n\nFinally, the\
    \ old value can simply be obtained from `UIInput#getValue()` which basically returns\
    \ the current value attribute of the `UIInput` component.\n\nComing back to the\
    \ use case of validating the uniqueness of the submitted value, of course you\
    \ could also skip this and insert the data anyway and catch any constraint violation\
    \ exception coming from the persistence layer and display a faces message accordingly.\
    \ However, this doesn’t go well with the current trend of immediate feedback directly\
    \ after changing the input field in the user interface.\n\nIn this specific use\
    \ case of validating a unique e-mail address during signup, however, there may\
    \ be another reason not to give away too much detail about the uniqueness of the\
    \ specified e-mail address: security. In such a case, you’d best let the signup\
    \ complete exactly the same way as if it was successful whereby you tell the user\
    \ to check the mailbox, but behind the scenes actually send a different e-mail\
    \ to the target recipient, rather than an activation e-mail, preferably not more\
    \ than once daily. The e-mail would be similar to the following:\n\n> *Dear user,*\n\
    > \n> *It looks like you or someone else tried to sign up on* our web site *using\
    \ your email address foo@example.com while it is already associated with an existing\
    \ account. Perhaps you actually wanted to* log in *or to* reset your password\
    \ *? If it actually wasn’t you, please let us know by replying to this email and\
    \ we’ll investigate this.*\n> \n> *Sincerely, Example Company*\n\nFinally, you\
    \ might also want to consider invalidating or deduplicating e-mails that contain\
    \ the “+” character in the username part, followed by a sequence of characters,\
    \ representing an e-mail alias. For a lot of e-mail providers, notably Gmail,\
    \ e-mail addresses `foo@gmail.com` and `foo+bar@gmail.com` refer to exactly the\
    \ same e-mail account, thereby basically allowing the end user to create a nearly\
    \ unlimited amount of accounts."
