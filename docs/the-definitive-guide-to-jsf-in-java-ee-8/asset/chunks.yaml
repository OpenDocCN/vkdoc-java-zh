    # 5. Conversion and Validation


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    At its core, JSF (JavaServer Faces) as an HTML form-based MVC (Model-View-Controller)
    framework basically needs to convert between Java objects (entities, beans, value
    objects, data transfer objects, and what not) and character sequences (strings)
    all the time. The HTTP request is basically broken down into plain vanilla strings
    representing headers and parameters, not as Java objects. The HTTP response is
    basically written as one big sequence of characters representing HTML or XML,
    not as some sort of serialized form of a Java object. However, the average Java
    model behind a JSF page doesn’t necessarily contain String properties everywhere.
    That would defeat the strong typed nature of Java. This is where Converters come
    into the picture: converting between objects in model and strings in view.


    Before updating the model values with freshly submitted and, if necessary, converted
    values, you would of course like to validate whether they conform to the business
    rules of the web application and, if necessary, present end users an informative
    error message so that they can fix any errors themselves. Usually, the business
    rules are already very well defined in the data store, such as a relational database
    management system. A decently designed database table already has strict constraints
    on the data type, maximum size, nullability, and uniqueness. You as a front-end
    developer should make absolutely sure that the submitted and converted values
    can be inserted in the database without errors.


    If, for example, the e-mail address column is constrained as a unique and non-nullable
    column with a maximum size of 254 characters, then you should make sure that the
    submitted value is validated as such before inserting it in the database. Otherwise,
    the database insert would throw some exception which is generally cumbersome to
    break down into detailed information in order to tell the end user about the exact
    mistake. This is where Validators come into the picture: validating submitted
    (and converted) values before updating the model.


    ## Standard Converters


    JSF has, from the beginning, provided a bunch of standard converters out the box.
    Most of them even do their job fully transparently based on the Java type of the
    model property. They are all available in the javax.faces.convert package[¹](#A454457_1_En_5_Chapter.xhtml#Fn1)
    and they all implement the Converter<T> interface . Table [5-1](#A454457_1_En_5_Chapter.xhtml#Tab1)
