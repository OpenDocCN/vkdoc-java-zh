- fmt: "# Creating New Component and Renderer\n\nIf you paid closer attention to Table\
    \ [3-1](#A454457_1_En_3_Chapter.xhtml#Tab1) in Chapter [3](#A454457_1_En_3_Chapter.xhtml),\
    \ you might have noticed that JSF doesn’t provide any component to render a dynamic\
    \ `<ul>` or `<ol>` or even `<dl>` element based on a provided array or collection\
    \ value. It only supports that for the `<table>` element. True, the same could\
    \ be achieved with Facelets `<ui:repeat>` and a bit of custom HTML code, but we’ll\
    \ take this as an opportunity to create a new custom component which renders an\
    \ `<ul>` or `<ol>`.\n\nThe first step is to check which `UIComponent` subclass\
    \ is suitable for the task we have in mind, so that we can reduce the custom code\
    \ logic to a minimum. In the `javax.faces.component` package you can find a bunch\
    \ of `UIXxx` component subclasses. If you want to create a new form component,\
    \ extend from `UIForm`. If you want to create a new input component, extend from\
    \ `UIInput`. If you want to create a new output component, extend from `UIOutput`.\
    \ If you want to create a new data iterator component, extend from `UIData`. There\
    \ is rarely any need to extend from `UIComponent` directly. We’d like to be able\
    \ to iterate over a collection in order to generate `<li>` elements inside the\
    \ `<ul>`, so we’ll pick `UIData`. It has a lot of iteration and state saving logic\
    \ already implemented. Following is the custom component class `com.example.project.component.DataList`:\n\
    \n```java\n@FacesComponent(createTag=true)\npublic class DataList extends UIData\
    \ {\n\n    public DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
    \    }\n}\n```\n\nIs that really all? Yes, the `UIData` superclass already has\
    \ everything we need and all the HTML producing code just goes into the `DataListRenderer`\
    \ which will be shown shortly. You’ll notice that the `@FacesComponent` annotation\
    \ declares a `createTag=true` attribute. This basically instructs JSF that it\
    \ should automatically create a component tag the predefined XML namespace `http://xmlns.jcp.org/jsf/component`.\
    \ In other words, the above tag is available in the Facelets file as follows:\n\
    \n```xml\n< ... xmlns:my=\"http://xmlns.jcp.org/jsf/component\">\n    ...\n  \
    \  <my:dataList ...>\n        ...\n    </my:dataList>\n```\n\nThe XML namespace\
    \ prefix `my` is of course your choice. Generally, you’d like to pick some sort\
    \ of abbreviation of your company name here. You can also override the predefined\
    \ XML namespace with the `namespace` attribute.\n\n```java\n@FacesComponent(createTag=true,\
    \ namespace=\"http://example.com/ui\")\n```\n\nThis will then be available as\
    \ follows:\n\n```xml\n< ... xmlns:ex=\"http://example.com/ui\">\n    ...\n   \
    \ <ex:dataList ...>\n        ...\n    </ex:dataList>\n```\n\nThis namespace is\
    \ unfortunately not unifiable with the `<namespace>` of a custom `*.taglib.xml`\
    \ file. If you use the same namespace for both, then JSF will prefer the `*.taglib.xml`\
    \ one over the `@FacesComponent` one and hence be unable to find the custom component\
    \ tag. That is, in practically anything Java EE related, any XML-based registration\
    \ of a thing has higher precedence than Java annotation-based registration of\
    \ the very same thing.\n\nYou’d basically need to explicitly register the custom\
    \ component over there in the `*.taglib.xml` file as well. Here’s how the `/WEB-INF/example.taglib.xml`\
    \ as created in the section “Tag Files” in Chapter [7](#A454457_1_En_7_Chapter.xhtml)\
    \ could be extended with the registration of the custom component, which is essentially\
    \ the same as what the `@FacesComponent` is doing for you.\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n\
    \    <short-name>t</short-name>\n\n    <!-- Other tags here -->\n\n    <tag>\n\
    \        <description>Renders a HTML list.</description>\n        <tag-name>dataList</tag-name>\n\
    \        <component>\n            <component-type>dataList</component-type>\n\
    \        </component>\n    </tag>\n</facelet-taglib>\n```\n\nThis way the custom\
    \ component is available in the same namespace as the other tags.\n\n```xml\n\
    < ... xmlns:t=\"http://example.com/tags\">\n    ...\n    <t:dataList ...>\n  \
    \      ...\n    </t:dataList>\n```\n\nNow, you can essentially remove all attributes\
    \ of the `@FacesComponent` so that it becomes just `@FacesComponent`. Yes, as\
    \ you have seen in the `example.taglib.xml`, the component type defaults to the\
    \ class name with the first character lowercased. You can always override it by\
    \ explicitly specifying it as the value of the `@FacesComponent` annotation. Generally,\
    \ you’d like to prefix it with the name of the company. It’s a good practice to\
    \ define it as a public constant so that others could, if necessary, look it up\
    \ in the Javadoc and/or use it for `Application#createComponent()`.\n\n```java\n\
    @FacesComponent(DataList.COMPONENT_TYPE)\npublic class DataList extends UIData\
    \ {\n\n    public static final String COMPONENT_TYPE = \"example.DataList\";\n\
    \n    public DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
    \    }\n}\n```\n\nNow adjust the component type in the `example.taglib.xml` accordingly.\n\
    \n```xml\n<component>\n    <component-type>example.DataList</component-type>\n\
    </component>\n```\n\nThe `*.taglib.xml` also gives you room to register the attributes\
    \ via `<attribute>` entries, although that may end up in some verbose code. You\
    \ should already have seen that in the section “Tag files” in Chapter [7](#A454457_1_En_7_Chapter.xhtml).\
    \ Unfortunately, the current JSF version doesn’t offer an annotation to declaratively\
    \ declare an “official” component attribute. There’s no such thing as `@FacesAttribute\
    \ private Iterable value`. Yet. This may come in a JSF.next. The non-official\
    \ way, without any `<attribute>`, also works just fine. You can declare any attribute\
    \ you want on the component tag in the view.\n\n```xml\n<t:dataList foo=\"bar\"\
    \ bar=\"foo\" />\n```\n\nThat’s just the freedom of XML. Whether the actual component\
    \ or renderer implementation actually does something with it is another story.\
    \ You could even declare a custom attribute on an existing component and just\
    \ plug an extended `Renderer` in order to process that attribute. More later in\
    \ the section “Extending Existing Renderer.” Talking about renderers, our `<t:dataList>`\
    \ still needs its renderer as registered in its constructor. Here’s what the `com.example.project.renderer.DataListRenderer`\
    \ looks like.\n\n```java\n@FacesRenderer(\n    componentFamily=UIData.COMPONENT_FAMILY,\n\
    \    rendererType=DataListRenderer.RENDERER_TYPE)\npublic class DataListRenderer\
    \ extends Renderer {\n\n    public static final String RENDERER_TYPE = \"example.List\"\
    ;\n\n    @Override\n    public void encodeBegin\n        (FacesContext context,\
    \ UIComponent component)\n            throws IOException\n    {\n        ResponseWriter\
    \ writer = context.getResponseWriter();\n        UIData data = (UIData) component;\n\
    \n        if (data.getRowCount() > 0) {\n            writer.startElement(\"ul\"\
    , component);\n        }\n    }\n\n    @Override\n    public void encodeChildren\n\
    \        (FacesContext context, UIComponent component)\n            throws IOException\n\
    \    {\n        ResponseWriter writer = context.getResponseWriter();\n       \
    \ UIData data = (UIData) component;\n\n        for (int i = 0; i < data.getRowCount();\
    \ i++) {\n            data.setRowIndex(i);\n            writer.startElement(\"\
    li\", component);\n\n            if (component.getChildCount() > 0) {\n      \
    \          for (UIComponent child : component.getChildren()) {\n             \
    \       child.encodeAll(context);\n                }\n            }\n\n      \
    \      writer.endElement(\"li\");\n        }\n\n        data.setRowIndex(-1);\n\
    \    }\n\n    @Override\n    public void encodeEnd\n        (FacesContext context,\
    \ UIComponent component)\n            throws IOException\n    {\n        ResponseWriter\
    \ writer = context.getResponseWriter();\n        UIData data = (UIData) component;\n\
    ```"
  raw: "## Creating New Component and Renderer\n\nIf you paid closer attention to\
    \ Table [3-1](#A454457_1_En_3_Chapter.xhtml#Tab1) in Chapter [3](#A454457_1_En_3_Chapter.xhtml),\
    \ you might have noticed that JSF doesn’t provide any component to render a dynamic\
    \ <ul> or <ol> or even <dl> element based on a provided array or collection value.\
    \ It only supports that for the <table> element. True, the same could be achieved\
    \ with Facelets <ui:repeat> and a bit of custom HTML code, but we’ll take this\
    \ as an opportunity to create a new custom component which renders an <ul> or\
    \ <ol>.\n\nThe first step is to check which UIComponent subclass is suitable for\
    \ the task we have in mind, so that we can reduce the custom code logic to a minimum.\
    \ In the javax.faces.component package you can find a bunch of UIXxx component\
    \ subclasses. If you want to create a new form component, extend from UIForm.\
    \ If you want to create a new input component, extend from UIInput. If you want\
    \ to create a new output component, extend from UIOutput. If you want to create\
    \ a new data iterator component, extend from UIData. There is rarely any need\
    \ to extend from UIComponent directly. We’d like to be able to iterate over a\
    \ collection in order to generate <li> elements inside the <ul>, so we’ll pick\
    \ UIData. It has a lot of iteration and state saving logic already implemented.\
    \ Following is the custom component class com.example.project.component.DataList:\n\
    \n```\n@FacesComponent(createTag=true)\npublic class DataList extends UIData {\n\
    \npublic DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
        }\n}\n```\n\nIs that really all? Yes, the UIData superclass already hsd everything\
    \ we need and all the HTML producing code just goes into the DataListRenderer\
    \ which will be shown shortly. You’ll notice that the @FacesComponent annotation\
    \ declares a createTag=true attribute. This basically instructs JSF that it should\
    \ automatically create a component tag the predefined XML namespace [http://xmlns.jcp.org/jsf/component](http://xmlns.jcp.org/jsf/component)\
    \ . In other words, the above tag is available in the Facelets file as follows:\n\
    \n```\n< ... xmlns:my=\"http://xmlns.jcp.org/jsf/component\">\n    ...\n    <my:dataList\
    \ ...>\n        ...\n    </my:dataList>\n```\n\nThe XML namespace prefix “my”\
    \ is of course your choice. Generally, you’d like to pick some sort of abbreviation\
    \ of your company name here. You can also override the predefined XML namespace\
    \ with the namespace attribute.\n\n```\n@FacesComponent(createTag=true, namespace=\"\
    http://example.com/ui\")\n```\n\nThis will then be available as follows:\n\n```\n\
    < ... xmlns:ex=\"http://example.com/ui\">\n    ...\n    <ex:dataList ...>\n        ...\n\
        </ex:dataList>\n```\n\nThis namespace is unfortunately not unifiable with\
    \ the <namespace> of a custom *.taglib.xml file. If you use the same namespace\
    \ for both, then JSF will prefer the *.taglib.xml one over the @FacesComponent\
    \ one and hence be unable to find the custom component tag. That is, in practically\
    \ anything Java EE related, any XML-based registration of a thing has higher precedence\
    \ than Java annotation-based registration of the very same thing.\n\nYou’d basically\
    \ need to explicitly register the custom component over there in the *.taglib.xml\
    \ file as well. Here’s how the /WEB-INF/example.taglib.xml as created in the section\
    \ “Tag Files” in Chapter [7](#A454457_1_En_7_Chapter.xhtml) could be extended\
    \ with the registration of the custom component, which is essentially the same\
    \ as what the @FacesComponent is doing for you.\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n\
        <short-name>t</short-name>\n\n<!-- Other tags here -->\n\n<tag>\n        <description>Renders\
    \ a HTML list.</description>\n        <tag-name>dataList</tag-name>\n        <component>\n\
                <component-type>dataList</component-type>\n        </component>\n\
        </tag>\n</facelet-taglib>\n```\n\nThis way the custom component is available\
    \ in the same namespace as the other tags.\n\n```\n< ... xmlns:t=\"http://example.com/tags\"\
    >\n    ...\n    <t:dataList ...>\n        ...\n    </t:dataList> \n```\n\nNow,\
    \ you can essentially remove all attributes of the @FacesComponent so that it\
    \ becomes just @FacesComponent. Yes, as you have seen in the example.taglib.xml,\
    \ the component type defaults to the class name with the first character lowercased.\
    \ You can always override it by explicitly specifying it as the value of the @FacesComponent\
    \ annotation. Generally, you’d like to prefix it with the name of the company.\
    \ It’s a good practice to define it as a public constant so that others could,\
    \ if necessary, look it up in the Javadoc and/or use it for Application#createComponent().\n\
    \n```\n@FacesComponent(DataList.COMPONENT_TYPE)\npublic class DataList extends\
    \ UIData {\n\npublic static final String COMPONENT_TYPE = \"example.DataList\"\
    ;\n\npublic DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
        }\n}\n```\n\nNow adjust the component type in the example.taglib.xml accordingly.\n\
    \n```\n<component>\n    <component-type>example.DataList</component-type>\n</component>\n\
    ```\n\nThe *.taglib.xml also gives you room to register the attributes via <attribute>\
    \ entries, although that may end up in some verbose code. You should already have\
    \ seen that in the section “Tag files” in Chapter [7](#A454457_1_En_7_Chapter.xhtml).\
    \ Unfortunately, the current JSF version doesn’t offer an annotation to declaratively\
    \ declare an “official” component attribute . There’s no such thing as @FacesAttribute\
    \ private Iterable value. Yet. This may come in a JSF.next. The non-official way,\
    \ without any <attribute>, also works just fine. You can declare any attribute\
    \ you want on the component tag in the view.\n\n```\n<t:dataList foo=\"bar\" bar=\"\
    foo\" />\n```\n\nThat’s just the freedom of XML. Whether the actual component\
    \ or renderer implementation actually does something with it is another story.\
    \ You could even declare a custom attribute on an existing component and just\
    \ plug an extended Renderer in order to process that attribute. More later in\
    \ the section “Extending Existing Renderer.” Talking about renderers, our <t:dataList>\
    \ still needs its renderer as registered in its constructor. Here’s what the com.example.project.renderer.DataListRenderer\
    \ looks like.\n\n```\n@FacesRenderer(\n    componentFamily=UIData.COMPONENT_FAMILY,\n\
        rendererType=DataListRenderer.RENDERER_TYPE)\npublic class DataListRenderer\
    \ extends Renderer {\n\npublic static final String RENDERER_TYPE = \"example.List\"\
    ;\n\n@Override\n    public void encodeBegin\n        (FacesContext context, UIComponent\
    \ component)\n            throws IOException\n    {\n        ResponseWriter writer\
    \ = context.getResponseWriter();\n        UIData data = (UIData) component;\n\n\
    if (data.getRowCount() > 0) {\n            writer.startElement(\"ul\", component);\n\
            }\n    }\n\n@Override\n    public void encodeChildren\n        (FacesContext\
    \ context, UIComponent component)\n            throws IOException\n    {\n        ResponseWriter\
    \ writer = context.getResponseWriter();\n        UIData data = (UIData) component;\n\
    \nfor (int i = 0; i < data.getRowCount(); i++) {\n            data.setRowIndex(i);\n\
                writer.startElement(\"li\", component);\n\nif (component.getChildCount()\
    \ > 0) {\n                for (UIComponent child : component.getChildren()) {\n\
                        child.encodeAll(context);\n                }\n            }\n\
    \nwriter.endElement(\"li\");\n        }\n\ndata.setRowIndex(-1);\n    }\n\n@Override\n\
        public void encodeEnd\n        (FacesContext context, UIComponent component)\n\
                throws IOException\n    {\n        ResponseWriter writer = context.getResponseWriter();\n\
            UIData data = (UIData) component;"
  trans: "\n## 创建新组件和渲染器\n\n如果你更仔细地观察第 3 章的表格 3-1，可能会注意到 JSF 没有提供任何组件来根据提供的数组或集合值渲染动态的`<ul>`、`<ol>`甚至`<dl>`元素。它只支持`<table>`元素。诚然，使用\
    \ Facelets 的`<ui:repeat>`加上一些自定义 HTML 代码也能实现同样的效果，但我们将以此为契机，创建一个能够渲染`<ul>`或`<ol>`的新自定义组件。\n\
    \n第一步是检查哪个`UIComponent`子类适合我们设想的任务，以便将自定义代码逻辑降至最低。在`javax.faces.component`包中，你可以找到许多`UIXxx`组件子类。如果你想创建新的表单组件，请继承`UIForm`；如果想创建新的输入组件，请继承`UIInput`；如果想创建新的输出组件，请继承`UIOutput`；如果想创建新的数据迭代器组件，请继承`UIData`。通常很少需要直接继承`UIComponent`。我们希望能够在集合上迭代，以便在`<ul>`内部生成`<li>`元素，因此我们将选择`UIData`。它已经实现了大量迭代和状态保存逻辑。以下是自定义组件类`com.example.project.component.DataList`：\n\
    \n```\n@FacesComponent(createTag=true)\npublic class DataList extends UIData {\n\
    \npublic DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
        }\n}\n```\n\n就这些吗？是的，`UIData`超类已经包含了我们所需的一切，所有生成 HTML 的代码只需放入`DataListRenderer`中，稍后将展示。你会注意到`@FacesComponent`注解声明了`createTag=true`属性。这基本上指示\
    \ JSF 自动在预定义的 XML 命名空间`http://xmlns.jcp.org/jsf/component`中创建一个组件标签。换句话说，上述标签在\
    \ Facelets 文件中可以这样使用：\n\n```\n< ... xmlns:my=\"http://xmlns.jcp.org/jsf/component\"\
    >\n    ...\n    <my:dataList ...>\n        ...\n    </my:dataList>\n```\n\nXML\
    \ 命名空间前缀“my”当然由你选择。通常，你会在此处选择公司名称的某种缩写。你也可以使用`namespace`属性覆盖预定义的 XML 命名空间。\n\n\
    ```\n@FacesComponent(createTag=true, namespace=\"http://example.com/ui\")\n```\n\
    \n这样它将按如下方式可用：\n\n```\n< ... xmlns:ex=\"http://example.com/ui\">\n    ...\n    <ex:dataList\
    \ ...>\n        ...\n    </ex:dataList>\n```\n\n遗憾的是，此命名空间无法与自定义`*.taglib.xml`文件的`<namespace>`统一。如果对两者使用相同的命名空间，JSF\
    \ 将优先使用`*.taglib.xml`而非`@FacesComponent`，从而无法找到自定义组件标签。也就是说，在几乎所有与 Java EE 相关的内容中，任何基于\
    \ XML 的注册优先级都高于基于 Java 注解的注册。\n\n你基本上还需要在`*.taglib.xml`文件中显式注册自定义组件。以下是在第 7 章“标签文件”一节中创建的`/WEB-INF/example.taglib.xml`如何通过注册自定义组件进行扩展，这本质上与`@FacesComponent`为你所做的工作相同。\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<facelet-taglib\n    xmlns:=\"\
    http://xmlns.jcp.org/xml/ns/javaee\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n      http://xmlns.jcp.org/xml/ns/javaee/web-facelettaglibrary_2_3.xsd\"\
    \n    version=\"2.3\"\n>\n    <namespace>http://example.com/tags</namespace>\n\
        <short-name>t</short-name>\n\n<!-- 其他标签在此 -->\n\n<tag>\n        <description>渲染一个\
    \ HTML 列表。</description>\n        <tag-name>dataList</tag-name>\n        <component>\n\
                <component-type>dataList</component-type>\n        </component>\n\
        </tag>\n</facelet-taglib>\n```\n\n这样，自定义组件就可以与其他标签位于同一命名空间中。\n\n```\n< ...\
    \ xmlns:t=\"http://example.com/tags\">\n    ...\n    <t:dataList ...>\n        ...\n\
        </t:dataList> \n```\n\n现在，你可以基本上移除`@FacesComponent`的所有属性，使其仅保留`@FacesComponent`。是的，正如你在`example.taglib.xml`中看到的，组件类型默认为类名并将首字母小写。你始终可以通过在`@FacesComponent`注解中显式指定值来覆盖它。通常，你会用公司名称作为前缀。将其定义为公共常量是一个好习惯，这样其他人可以在必要时在\
    \ Javadoc 中查找它，或将其用于`Application#createComponent()`。\n\n```\n@FacesComponent(DataList.COMPONENT_TYPE)\n\
    public class DataList extends UIData {\n\npublic static final String COMPONENT_TYPE\
    \ = \"example.DataList\";\n\npublic DataList() {\n        setRendererType(DataListRenderer.RENDERER_TYPE);\n\
        }\n}\n```\n\n现在相应地调整`example.taglib.xml`中的组件类型。\n\n```\n<component>\n    <component-type>example.DataList</component-type>\n\
    </component>\n```\n\n`*.taglib.xml`还允许你通过`<attribute>`条目注册属性，尽管这可能会导致代码冗长。你应该已经在第\
    \ 7 章的“标签文件”一节中看到过。遗憾的是，当前版本的 JSF 没有提供注解来声明式地声明“官方”组件属性。目前还没有类似`@FacesAttribute\
    \ private Iterable value`这样的东西。这可能会在未来的 JSF 版本中出现。非官方的方式（不带任何`<attribute>`）也能正常工作。你可以在视图中的组件标签上声明任何你想要的属性。\n\
    \n```\n<t:dataList foo=\"bar\" bar=\"foo\" />\n```\n\n这只是 XML 的自由度。实际组件或渲染器实现是否对其做处理则是另一回事。你甚至可以在现有组件上声明自定义属性，并插入一个扩展的`Renderer`来处理该属性。更多内容将在“扩展现有渲染器”一节中介绍。说到渲染器，我们的`<t:dataList>`仍然需要在其构造函数中注册的渲染器。以下是`com.example.project.renderer.DataListRenderer`的样子。\n\
    \n```\n@FacesRenderer(\n    componentFamily=UIData.COMPONENT_FAMILY,\n    rendererType=DataListRenderer.RENDERER_TYPE)\n\
    public class DataListRenderer extends Renderer {\n\npublic static final String\
    \ RENDERER_TYPE = \"example.List\";\n\n@Override\n    public void encodeBegin\n\
            (FacesContext context, UIComponent component)\n            throws IOException\n\
        {\n        ResponseWriter writer = context.getResponseWriter();\n        UIData\
    \ data = (UIData) component;\n\nif (data.getRowCount() > 0) {\n            writer.startElement(\"\
    ul\", component);\n        }\n    }\n\n@Override\n    public void encodeChildren\n\
            (FacesContext context, UIComponent component)\n            throws IOException\n\
        {\n        ResponseWriter writer = context.getResponseWriter();\n        UIData\
    \ data = (UIData) component;\n\nfor (int i = 0; i < data.getRowCount(); i++) {\n\
                data.setRowIndex(i);\n            writer.startElement(\"li\", component);\n\
    \nif (component.getChildCount() > 0) {\n                for (UIComponent child\
    \ : component.getChildren()) {\n                    child.encodeAll(context);\n\
                    }\n            }\n\nwriter.endElement(\"li\");\n        }\n\n\
    data.setRowIndex(-1);\n    }\n\n@Override\n    public void encodeEnd\n        (FacesContext\
    \ context, UIComponent component)\n            throws IOException\n    {\n        ResponseWriter\
    \ writer = context.getResponseWriter();\n        UIData data = (UIData) component;\n"
- fmt: "```java\nif (data.getRowCount() > 0) {\n    writer.endElement(\"ul\");\n}\n\
    ```\n\nIn hindsight, it’s relatively simple. We’re delegating as much as possible\
    \ of the hard work to the JSF-provided `UIData` superclass. In the `encodeBegin()`\
    \ you start the `<ul>` element when the data model is not empty. This is to be\
    \ checked by examining the result of `UIData#getRowCount()`. Its Javadoc[¹](#A454457_1_En_11_Chapter.xhtml#Fn1)\
    \ basically says:\n\n> Return the number of rows in the underlying data model.\
    \ If the number of available rows is unknown, return -1.\n\nThe term “rows” is\
    \ indeed strongly related to tables. This is also what this superclass is originally\
    \ designed for: `<h:dataTable>`. The term “item” would have been more general,\
    \ but it is what it is.\n\nThen, in the `encodeChildren()` method, we set the\
    \ current row index via the `UIData#setRowIndex()` method, start the `<li>` element,\
    \ encode all children as is via `UIComponent#encodeAll()` on each of them, and\
    \ finally end the `<li>` element. Once the loop is done, we explicitly make it\
    \ clear to the `UIData` superclass by invoking `UIData#setRowIndex()` with a value\
    \ of -1. Its Javadoc[²](#A454457_1_En_11_Chapter.xhtml#Fn2) says:\n\n> If the\
    \ new `rowIndex` value is -1: If the `var` property is not null, remove the corresponding\
    \ request scope attribute (if any). Reset the state information for all descendant\
    \ components.\n\nIt thus clears out any state related to the iteration. This is\
    \ very important; otherwise it might cause side effects further down in the component\
    \ tree or even cause a corrupted view state when it by itself needs to traverse\
    \ the data model. Finally, in the `encodeEnd()` method, it will end the `<ul>`\
    \ element based on same conditions as in `encodeBegin()`.\n\nThe `UIData#setRowIndex()`\
    \ call in the `encodeChildren()` method will under the hood extract the data model\
    \ from the `value` attribute and wrap it in a suitable implementation of the `javax.faces.model.DataModel`\
    \ abstract class.[³](#A454457_1_En_11_Chapter.xhtml#Fn3) So far, as per the Javadoc\
    \ of `UIData#getValue()`,[⁴](#A454457_1_En_11_Chapter.xhtml#Fn4) the following\
    \ types of the object behind the `value` attribute are supported, in this scanning\
    \ order:\n\n1. `java.util.List` (since 1.0)\n2. Arrays (since 1.0)\n3. `java.sql.ResultSet`\
    \ (since 1.0)\n4. `javax.servlet.jsp.jstl.sql.Result` (since 1.0)\n5. `java.util.Collection`\
    \ (since 2.2)\n6. `java.lang.Iterable` (since 2.3)\n7. `java.util.Map` (since\
    \ 2.3)\n8. Types for which a suitable `DataModel` has been registered via `@FacesDataModel`\
    \ (since 2.3)\n9. All other types will be adapted using the `ScalarDataModel`\
    \ class, which will treat the object as a single row of data (since 1.0)\n\nYou\
    \ would indeed not expect to see anyone passing around a plain `java.sql.ResultSet`\
    \ in a modern Java EE application, let alone see JSP pages with JSTL `<sql:xxx>`\
    \ tags. But this all is for backward compatibility. Remember, JSF was introduced\
    \ in 2004. Backward compatibility was one of its strongest keys in surviving up\
    \ to today. They’re certainly candidates to be removed, but not now.\n\nAnd, there’s\
    \ indeed an overlap between some types; `List` and `Collection` could easily be\
    \ covered by `Iterable` as they both implement this interface. But this has a\
    \ performance reason. For a `List`, the items are accessed directly by index by\
    \ the `ListDataModel`; for a `Collection`, the items are extracted first via `Collection#toArray()`\
    \ and then accessed by index by the `CollectionDataModel`; and for an `Iterable`,\
    \ the items are simply iterated and collected into a new `List` first by the `IterableDataModel`.\
    \ It may make a difference.\n\nYou’ll also see that JSF 2.3 has not only added\
    \ two new data models but even introduces a new annotation to register a custom\
    \ one. Previously, you’d need to manually wrap the custom collection in the custom\
    \ data model every time before passing to a `UIData` component. The `DataModel`\
    \ abstract class has the disadvantage of not being `Serializable` itself which\
    \ more or less forces you to make a `@ViewScoped` bean holding such a data model\
    \ to have a lazy loading getter on a transient data model property as follows:\n\
    \n```java\nprivate YourCollection yourCollection;\nprivate transient YourDataModel\
    \ dataModel;\n\npublic DataModel getDataModel() {\n    if (dataModel == null)\
    \ {\n        dataModel = new YourDataModel(yourCollection);\n    }\n    return\
    \ dataModel;\n}\n```\n\nIdeally, the `UIData` should by itself recognize `YourCollection`\
    \ type and automatically wrap it in a `YourDataModel`. The new `@FacesDataModel`\
    \ annotation does exactly that.\n\n```java\n@FacesDataModel(forClass=YourCollection.class)\n\
    public class YourDataModel<E> extends DataModel<E> {}\n```\n\nComing back to the\
    \ custom renderer, there’s one method left unexplained: the `getRendersChildren()`.\
    \ It’s been overridden to explicitly return `true`. You’ll probably ask yourself,\
    \ why was it initially `false`? Why not just let it be the default behavior of\
    \ `encodeChildren()` and rely on any overridden `encodeChildren()` method whether\
    \ it wants to invoke `encodeAll()` on the children? This was actually an historic\
    \ oversight in the specification. Originally, the `encodeAll()` method didn’t\
    \ exist. It was only added in JSF 1.2 and it basically made the `getRendersChildren()`\
    \ obsolete. But for backward compatibility this complexity was introduced.\n\n\
    In a nutshell, always let `getRendersChildren()` return `true` if you have overridden\
    \ the `encodeChildren()` method. Otherwise the children won’t be encoded at all.\n\
    \nLast but not least, you’ll probably also wonder why we don’t “simply” override\
    \ the `encodeBegin()`, `encodeChildren()`, (and `getRendersChildren()`), and `encodeEnd()`\
    \ of the `DataList` component but instead create a “whole” renderer implementation.\
    \ The main reason is: simplicity and extensibility. Those methods are on `UIComponent`\
    \ specified to do more than only rendering. They also check if the `UIComponent#isRendered()`\
    \ returns `true`. `encodeBegin()` also fires `PreRenderComponentEvent` and pushes\
    \ the current component into the EL (Expression Language) scope as `#{component}`.\
    \ `encodeEnd()` pops `#{component}` out of the EL scope. And they also check if\
    \ there’s a renderer attached and, if so, delegate to it. That’s all specified\
    \ in their Javadoc. You’d need to manually take care of them yourself when you\
    \ override those methods. That’s unnecessarily repeated work. And, when someone\
    \ in the future wants to adjust the rendering of the component, they won’t be\
    \ able to plug a custom renderer if your component doesn’t check for it."
