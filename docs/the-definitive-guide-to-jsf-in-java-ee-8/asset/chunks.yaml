    \ is tightly coupled in the backing bean class. In other words, the backing bean\
    \ class has incorrectly taken over the responsibilities of the real model. One\
    \ would misinterpret such backing bean class as being the sole model. When we\
    \ eliminate this duplication and unreusability, we find another way:\n\n```\n\
    @Named @RequestScoped\npublic class ProductBacking {\n\n    private Product product\
    \ = new Product();\n\n    @Inject\n    private ProductService productService;\n\
    \n    public void save() {\n        productService.create(product);\n        FacesContext.getCurrentInstance().addMessage(null,\n\
    \            new FacesMessage(\"Product created!\"));\n    }\n\n    public Product\
    \ getProduct() {\n        return product;\n    }\n}\n```\n\nwhereby the `ProductService`\
    \ looks as follows:\n\n```\n@Stateless\npublic class ProductService {\n\n    @PersistenceContext\n\
    \    private EntityManager entityManager;\n\n    @Inject\n    private ActiveUser\
    \ activeUser;\n\n    public Long create(Product product) {\n        product.setCreatedBy(activeUser.get());\n\
    \        entityManager.persist(product);\n        return product.getId();\n  \
    \  }\n}\n```\n\nThis is actually the correct way of authoring backing beans. When\
    \ comparing it to the first way, you could argue that the backing bean has, in\
    \ the JSF developer’s point of view, become a controller for the EJB/JPA model.\
    \ The backing bean being a controller is not wrong from the JSF developer’s point\
    \ of view, but this is not actually correct from the JSF framework’s point of\
    \ view where the `FacesServlet` is the real controller. The `FacesServlet` treats\
    \ the backing bean as a model, because the `FacesServlet` doesn’t have direct\
    \ access to the real model, the service layer. You as the JSF developer can, of\
    \ course, in your context treat the backing bean as a controller, because you\
    \ can easily ignore all duties of the `FacesServlet` as you don’t need to worry\
    \ about its job while writing JSF code. All you need to worry about while writing\
    \ JSF code is the view, the model, and the backing bean. The rest is done transparently\
    \ by JSF.\n\n## Managed Beans\n\nThe conceptual difference between a “backing\
    \ bean” and a “managed bean” can be represented by the following lines of code\
    \ executed under the hood of the bean management facility:\n\n```\nBackingBeanClass\
    \ managedBeanInstance = new BackingBeanClass();\nsomeContext.put(\"managedBeanName\"\
    , managedBeanInstance, someScope);\n```\n\nIn other words, the backing bean is\
    \ the concrete class created by you, the JSF developer, and registered into some\
    \ bean management facility, such as CDI. The bean management facility will automatically\
    \ manage the bean’s life cycle by performing construction, dependency injection,\
    \ and destruction when necessary, without you having to do it manually. If you’ve\
    \ ever developed with JSP/Servlets, this basically removes the need to manually\
    \ instantiate beans and put them as an attribute of the `ServletContext`, `HttpSession`,\
    \ or `ServletRequest`.[²](#A454457_1_En_8_Chapter.xhtml#Fn2) To register a backing\
    \ bean class as a CDI managed bean for JSF views, simply put the `@javax.inject.Named`\
    \ annotation[³](#A454457_1_En_8_Chapter.xhtml#Fn3) on the class signature.\n\n\
    ```\n@Named\npublic class BackingBeanClass {\n    // ...\n}\n```\n\nIt will then\
    \ immediately be available in EL context by `#{backingBeanClass}` and in all other\
    \ managed beans via `@Inject`. The EL context is directly available in Facelets\
    \ files. By default, the managed bean name is derived from the backing bean’s\
    \ class name by lowercasing the first character. This can optionally be overridden\
    \ by specifying the value of the `@Named` annotation.\n\n```\n@Named(\"managedBeanName\"\
    )\npublic class BackingBeanClass {\n    // ...\n}\n```\n\nThis is now in EL context\
    \ available by `#{managedBeanName}`. Nothing has changed for the `@Inject` approach.\
    \ Once a JSF backing bean becomes a managed bean, it will be automatically instantiated\
    \ and initialized whenever it’s accessed for the first time in the context associated\
    \ with the bean’s scope. It will be automatically destroyed when the life cycle\
    \ associated with the bean’s scope has ended. More about managed bean scopes in\
    \ the next section.\n\nHistorically, JSF provided a native way to register backing\
    \ bean classes as managed beans: first, in JSF 1.x via `<managed-bean>` entries\
    \ in `faces-config.xml`, and since JSF 2.0 via `@javax.faces.bean.ManagedBean`\
    \ annotation, which is, since JSF 2.3, officially deprecated in favor of CDI `@Named`.\
    \ CDI was introduced for first time in Java EE 6, at the same time as JSF 2.0,\
    \ with the aim of unifying the management of context-sensitive instances and injecting\
    \ the currently available instances in each other. Unfortunately, the JSF 2.0\
    \ `@ManagedBean` was already set in stone long before CDI was finished, so those\
    \ two ways of managing beans did exist in parallel for some time. The CDI bean\
    \ management facility has several advantages on top of JSF bean management facility.\n\
    \nFirst, injecting one managed bean in another managed bean using CDI’s `@Inject`\
    \ doesn’t require a getter/setter pair in the parent backing bean class, while\
    \ JSF’s `@javax.faces.bean.ManagedProperty` requires a getter/setter pair, which\
    \ is considered poor practice as this exposes too much information to the outside,\
    \ which is potentially confusing. Should we access the injected bean via `#{bean}`\
    \ or `#{parentBean.bean}`?\n\nSecond, the injected CDI managed bean can be of\
    \ a narrower scope than the parent managed bean. This is possible because CDI\
    \ `@Inject` actually injects a proxy instance which in turn delegates to the currently\
    \ available instance, while JSF `@ManagedProperty` “injects” the actual instance\
    \ by invoking the setter method directly after the construction of the parent\
    \ bean.\n\nThird, CDI managed beans are accessible in all other Java EE artifacts\
    \ which are not directly managed by JSF, such as web servlets, web filters, web\
    \ listeners, socket end points, web service end points, enterprise beans, etc.\
    \ This allows a very easy way of exchanging data across various layers within\
    \ the same application, particularly within the same HTTP session."
  raw: '###### Figure 8-1 The position of the backing bean in JSF’s MVC paradigm


    In this MVC paradigm the backing bean has thus a rather unique position. Note
    that the backing bean doesn’t necessarily need to be represented by a single class.
    It can even be represented by multiple classes, each with its own managed bean
    scope, like the view can be represented by multiple Facelets files and the model
    can be represented by multiple EJB/JPA classes.


    Coming back to the JSF developer’s point of view, we can even get a step further
    with considering whether the backing bean is a model or a controller, depending
    on how you code the backing bean class. Following is one way:


    ```

    @Named @RequestScoped @Stateful

    public class ProductBacking {


        private String productName;

        private String productDescription;


        @Inject

        private ActiveUser activeUser;


        @PersistenceContext

        private EntityManager entityManager;


        public void save() {

            Product product = new Product();

            product.setName(productName);

            product.setDescription(productDescription);

            product.setCreatedBy(activeUser.get());

            entityManager.persist(product);

            FacesContext.getCurrentInstance().addMessage(null,

                new FacesMessage("Product created!"));

        }


        // Add/generate getters and setters for product name and description.

    }

    ```


    In this rather naïve way, the entity’s properties are essentially duplicated in
    the backing bean class and the business logic is tightly coupled in the backing
    bean class. In other words, the backing bean class has incorrectly taken over
    the responsibilities of the real model. One would misinterpret such backing bean
    class as being the sole model. When we eliminate this duplication and unreusability,
    we find another way:


    ```

    @Named @RequestScoped

    public class ProductBacking {


        private Product product = new Product();


        @Inject

        private ProductService productService;


        public void save() {

            productService.create(product);

            FacesContext.getCurrentInstance().addMessage(null,

                new FacesMessage("Product created!"));

        }


        public Product getProduct() {

            return product;

        }

    }

    ```


    whereby the ProductService looks as follows:


    ```

    @Stateless

    public class ProductService {


        @PersistenceContext

        private EntityManager entityManager;


        @Inject

        private ActiveUser activeUser;


        public Long create(Product product) {

            product.setCreatedBy(activeUser.get());

            entityManager.persist(product);

            return product.getId();

        }

    }

    ```


    This is actually the correct way of authoring backing beans . When comparing it
    to the first way, you could argue that the backing bean has, in the JSF developer’s
    point of view, become a controller for the EJB/JPA model. The backing bean being
    a controller is not wrong from the JSF developer’s point of view, but this is
    not actually correct from the JSF framework’s point of view where the FacesServlet
    is the real controller. The FacesServlet treats the backing bean as a model, because
    the FacesServlet doesn’t have direct access to the real model, the service layer.
    You as the JSF developer can, of course, in your context treat the backing bean
    as a controller, because you can easily ignore all duties of the FacesServlet
    as you don’t need to worry about its job while writing JSF code. All you need
    to worry about while writing JSF code is the view, the model, and the backing
    bean . The rest is done transparently by JSF.


    ## Managed Beans


    The conceptual difference between a “backing bean ” and a “managed bean ” can
    be represented by the following lines of code executed under the hood of the bean
    management facility:


    ```

    BackingBeanClass managedBeanInstance = new BackingBeanClass();

    someContext.put("managedBeanName", managedBeanInstance, someScope);

    ```


    In other words, the backing bean is the concrete class created by you, the JSF
    developer , and registered into some bean management facility, such as CDI. The
    bean management facility will automatically manage the bean’s life cycle by performing
    construction, dependency injection, and destruction when necessary, without you
    having to do it manually. If you’ve ever developed with JSP/Servlets, this basically
    removes the need to manually instantiate beans and put them as an attribute of
    the ServletContext, HttpSession, or ServletRequest.[²](#A454457_1_En_8_Chapter.xhtml#Fn2)
    To register a backing bean class as a CDI managed bean for JSF views, simply put
    the @javax.inject.Named annotation[³](#A454457_1_En_8_Chapter.xhtml#Fn3) on the
    class signature.


    ```

    @Named

    public class BackingBeanClass {

        // ...

    }

    ```


    It will then immediately be available in EL context by #{backingBeanClass} and
    in all other managed beans via @Inject. The EL context is directly available in
    Facelets files. By default, the managed bean name is derived from the backing
    bean’s class name by lowercasing the first character. This can optionally be overridden
    by specifying the value of the @Named annotation.


    ```

    @Named("managedBeanName")

    public class BackingBeanClass {

        // ...

    }

    ```


    This is now in EL context available by #{managedBeanName}. Nothing has changed
    for the @Inject approach. Once a JSF backing bean becomes a managed bean, it will
    be automatically instantiated and initialized whenever it’s accessed for the first
    time in the context associated with the bean’s scope. It will be automatically
    destroyed when the life cycle associated with the bean’s scope has ended. More
    about managed bean scopes in the next section.


    Historically, JSF provided a native way to register backing bean classes as managed
    beans: first, in JSF 1.x via <managed-bean> entries in faces-config.xml, and since
    JSF 2.0 via @javax.faces.bean.ManagedBean annotation, which is, since JSF 2.3,
    officially deprecated in favor of CDI @Named. CDI was introduced for first time
    in Java EE 6 , at the same time as JSF 2.0, with the aim of unifying the management
    of context-sensitive instances and injecting the currently available instances
    in each other. Unfortunately, the JSF 2.0 @ManagedBean was already set in stone
    long before CDI was finished, so those two ways of managing beans did exist in
    parallel for some time. The CDI bean management facility has several advantages
    on top of JSF bean management facility.


    First, injecting one managed bean in another managed bean using CDI’s @Inject
    doesn’t require a getter/setter pair in the parent backing bean class , while
    JSF’s @javax.faces.bean.ManagedProperty requires a getter/setter pair, which is
    considered poor practice as this exposes too much information to the outside,
    which is potentially confusing. Should we access the injected bean via #{bean}
    or #{parentBean.bean}?


    Second, the injected CDI managed bean can be of a narrower scope than the parent
    managed bean. This is possible because CDI @Inject actually injects a proxy instance
    which in turn delegates to the currently available instance, while JSF @ManagedProperty
    “injects” the actual instance by invoking the setter method directly after the
    construction of the parent bean.


    Third, CDI managed beans are accessible in all other Java EE artifacts which are
    not directly managed by JSF, such as web servlets, web filters, web listeners,
    socket end points, web service end points, enterprise beans, etc. This allows
    a very easy way of exchanging data across various layers within the same application,
    particularly within the same HTTP session.'
  trans: '

    ###### 图 8-1 支持 Bean 在 JSF 的 MVC 范式中的位置


    在这种 MVC 范式中，支持 Bean 因此占据了一个相当独特的位置。请注意，支持 Bean 不一定需要由单个类来表示。它甚至可以由多个类来表示，每个类都有自己的受管
    Bean 作用域，就像视图可以由多个 Facelets 文件表示，模型可以由多个 EJB/JPA 类表示一样。


    回到 JSF 开发者的视角，我们甚至可以更进一步，根据你编写支持 Bean 类的方式，来考虑支持 Bean 是模型还是控制器。以下是一种方式：


    ```

    @Named @RequestScoped @Stateful

    public class ProductBacking {


        private String productName;

        private String productDescription;


        @Inject

        private ActiveUser activeUser;


        @PersistenceContext

        private EntityManager entityManager;


        public void save() {

            Product product = new Product();

            product.setName(productName);

            product.setDescription(productDescription);

            product.setCreatedBy(activeUser.get());

            entityManager.persist(product);

            FacesContext.getCurrentInstance().addMessage(null,

                new FacesMessage("Product created!"));

        }


        // 为产品名称和描述添加/生成 getter 和 setter 方法

    }

    ```


    在这种相当简单的方式中，实体的属性基本上在支持 Bean 类中被重复了，并且业务逻辑紧密耦合在支持 Bean 类中。换句话说，支持 Bean 类错误地接管了真实模型的职责。有人可能会错误地将这种支持
    Bean 类解释为唯一的模型。当我们消除这种重复和不可重用性时，我们找到了另一种方式：


    ```

    @Named @RequestScoped

    public class ProductBacking {


        private Product product = new Product();


        @Inject

        private ProductService productService;


        public void save() {

            productService.create(product);

            FacesContext.getCurrentInstance().addMessage(null,

                new FacesMessage("Product created!"));

        }


        public Product getProduct() {

            return product;

        }

    }

    ```


    其中 `ProductService` 如下所示：


    ```

    @Stateless

    public class ProductService {


        @PersistenceContext

        private EntityManager entityManager;


        @Inject

        private ActiveUser activeUser;


        public Long create(Product product) {

            product.setCreatedBy(activeUser.get());

            entityManager.persist(product);

            return product.getId();

        }

    }

    ```


    这实际上是编写支持 Bean 的正确方式。与第一种方式相比，你可以认为，从 JSF 开发者的角度来看，支持 Bean 已经成为了 EJB/JPA 模型的控制器。从
    JSF 开发者的角度来看，支持 Bean 作为控制器并没有错，但从 JSF 框架的角度来看，这实际上并不正确，因为真正的控制器是`FacesServlet`。`FacesServlet`将支持
    Bean 视为模型，因为它无法直接访问真正的模型，即服务层。当然，作为 JSF 开发者，你可以在自己的上下文中将支持 Bean 视为控制器，因为在编写 JSF
    代码时，你无需担心`FacesServlet`的工作，可以轻松忽略它的所有职责。在编写 JSF 代码时，你只需要关心视图、模型和支持 Bean。其余的工作都由
    JSF 透明地完成。


    ## 受管 Bean


    “支持 Bean”和“受管 Bean”之间的概念差异可以通过在 Bean 管理设施底层执行的以下几行代码来表示：


    ```

    BackingBeanClass managedBeanInstance = new BackingBeanClass();

    someContext.put("managedBeanName", managedBeanInstance, someScope);

    ```


    换句话说，支持 Bean 是由你（JSF 开发者）创建的具体类，并注册到某个 Bean 管理设施（如 CDI）中。Bean 管理设施将通过执行构造、依赖注入和在必要时进行销毁来自动管理
    Bean 的生命周期，而无需你手动操作。如果你曾经使用 JSP/Servlet 进行开发，这基本上消除了手动实例化 Bean 并将其作为`ServletContext`、`HttpSession`或`ServletRequest`属性的需要。²
    要将支持 Bean 类注册为 JSF 视图的 CDI 受管 Bean，只需在类签名上添加`@javax.inject.Named`注解³。


    ```

    @Named

    public class BackingBeanClass {

        // ...

    }

    ```


    然后它将立即在 EL 上下文中通过`#{backingBeanClass}`可用，并在所有其他受管 Bean 中通过`@Inject`可用。EL 上下文在
    Facelets 文件中直接可用。默认情况下，受管 Bean 名称是通过将支持 Bean 类名的首字母小写派生而来的。这可以通过指定`@Named`注解的值来覆盖。


    ```

    @Named("managedBeanName")

    public class BackingBeanClass {

        // ...

    }

    ```


    现在它在 EL 上下文中通过`#{managedBeanName}`可用。`@Inject`方法没有任何变化。一旦 JSF 支持 Bean 成为受管 Bean，当它在与
    Bean 作用域关联的上下文中首次被访问时，它将被自动实例化和初始化。当与 Bean 作用域关联的生命周期结束时，它将被自动销毁。下一节将详细介绍受管 Bean
    作用域。


    历史上，JSF 提供了一种原生方式来将支持 Bean 类注册为受管 Bean：首先，在 JSF 1.x 中通过`faces-config.xml`中的`<managed-bean>`条目，自
    JSF 2.0 起通过`@javax.faces.bean.ManagedBean`注解，该注解自 JSF 2.3 起已正式弃用，转而推荐使用 CDI 的`@Named`。CDI
    首次引入是在 Java EE 6 中，与 JSF 2.0 同时期，旨在统一上下文敏感实例的管理，并允许将当前可用的实例相互注入。不幸的是，JSF 2.0 的`@ManagedBean`在
    CDI 完成之前就已经定型，因此这两种管理 Bean 的方式曾并行存在了一段时间。CDI Bean 管理设施相比 JSF Bean 管理设施有几个优势。


    首先，使用 CDI 的`@Inject`将一个受管 Bean 注入到另一个受管 Bean 中，不需要在父支持 Bean 类中提供 getter/setter
    对，而 JSF 的`@javax.faces.bean.ManagedProperty`则需要 getter/setter 对，这被认为是一种不良实践，因为这会向外部暴露过多信息，可能造成混淆。我们应该通过`#{bean}`还是`#{parentBean.bean}`来访问注入的
    Bean？


    其次，注入的 CDI 受管 Bean 的作用域可以比父受管 Bean 的作用域更窄。这是可能的，因为 CDI 的`@Inject`实际上注入的是一个代理实例，该代理实例再委托给当前可用的实例，而
    JSF 的`@ManagedProperty`则是在父 Bean 构造后直接调用 setter 方法来“注入”实际实例。


    第三，CDI 受管 Bean 可以在所有其他不由 JSF 直接管理的 Java EE 工件中访问，例如 Web Servlet、Web 过滤器、Web 监听器、Socket
    端点、Web 服务端点、企业 Bean 等。这使得在同一应用程序的不同层之间（尤其是在同一个 HTTP 会话内）交换数据变得非常容易。

