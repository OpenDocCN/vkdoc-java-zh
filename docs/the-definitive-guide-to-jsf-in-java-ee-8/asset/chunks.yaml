        }\n}\n```\n\nThe someLongRunningProcess() method represents your implementation\
    \ of some long-running process (e.g., calling a third-party web service API)."
  trans: "\n## 通道设计提示\n\n你可以在整个应用程序中，在不同作用域上声明多个推送通道，无论是否指定用户目标。但请注意，即使通道是视图作用域的，同一个通道名称也很容易在多个视图中被重复使用。如果你尽可能少用不同的通道名称，并将通道名称绑定到特定的推送套接字作用域/用户组合（而非特定的\
    \ JSF 视图），效率会更高。如果你打算为不同目的使用多个视图作用域的通道，最好只使用一个视图作用域的通道，并设置一个全局 JavaScript 监听器，该监听器能够根据传递的消息来区分其任务，例如，在服务器端按如下方式发送消息：\n\
    \n```\nMap<String, Object> message = new HashMap<>();\nmessage.put(\"functionName\"\
    , \"someFunction\");\nmessage.put(\"functionData\", functionData); // 可以是 Map\
    \ 或 Bean。\nsomeChannel.send(message);\n```\n\n然后在 `onmessage` JavaScript 监听器函数中按如下方式处理：\n\
    \n```\nfunction someSocketListener(message) {\n    windowmessage.functionName;\n\
    }\n\nfunction someFunction(data) {\n    // ...\n}\n\nfunction otherFunction(data)\
    \ {                                                          \n    // ...\n}\n\
    \n// ...\n```\n\n## 一次性推送\n\n你可以使用 `connected` 属性来防止套接字在页面加载时自动连接。\n\n```\n<f:websocket\
    \ ... connected=\"false\" />\n```\n\n当你希望在调用一个可能需要更长时间才能完成的视图作用域 Ajax 操作方法后，执行一次性的结果推送，并且希望用户能立即继续使用同一个页面，而不会因“网站响应慢”的体验而感到烦恼时，这尤其有用。这种方法只需要配合\
    \ `jsf.push` JavaScript API（应用程序编程接口）做一些额外的工作。² 它有三个函数，但我们只对其中的两个感兴趣：`jsf.push.open(...)`\
    \ 和 `jsf.push.close(...)`。第三个函数 `jsf.push.init(...)` 主要用于初始化套接字，这由 `<f:websocket>`\
    \ 标签的渲染器负责。\n\n在调用 Ajax 操作方法之前，你需要通过调用 `jsf.push.open(...)` 函数并传入套接字客户端 ID 作为参数来显式地打开套接字。而在推送消息到达之后，你需要通过调用\
    \ `jsf.push.close(...)` 函数并传入套接字客户端 ID 作为参数来显式地关闭套接字。以下示例演示了这种方法：\n\n```\n<script>\n\
        function startLongRunningProcess() {\n        jsf.push.open(\"push\");\n        document.getElementById(\"\
    status\").innerHTML =\n            \"长时间运行进程已启动...\";\n    }\n    function endLongRunningProcess(result)\
    \ {\n        jsf.push.close(\"push\");\n        document.getElementById(\"status\"\
    ).innerHTML = result;\n    }\n</script>\n<h:form>\n    <h:commandButton value=\"\
    提交\"\n        onclick=\"startLongRunningProcess()\"\n        action=\"#{longRunningProcess.submit}\"\
    >\n        <f:ajax />\n    </h:commandButton>                                \
    \                    \n</h:form>\n<div id=\"status\" />\n<f:websocket id=\"push\"\
    \ channel=\"push\" scope=\"view\"\n    connected=\"false\" onmessage=\"endLongRunningProcess\"\
    >\n</f:websocket>\n```\n\n必须指出，像上面那样将 JavaScript 代码直接放在 HTML 源码中是一种不好的做法。当然，这仅用于演示目的。为了更好的维护性、性能和工具支持，在实际代码中，你应该将\
    \ JavaScript 代码放在一个 JS 文件中，并通过 `<h:outputScript>` 引入。这里我甚至还没提到为了演示而缺少 jQuery 魔法的问题。\n\
    \n在这个例子中，打开套接字是在命令按钮的 `onclick` 事件中执行的。而 `onmessage` 监听器函数则负责关闭套接字。当然，你也可以让套接字始终保持打开状态，而无需操作\
    \ JavaScript，但如果套接字除了呈现视图作用域 Ajax 操作方法的结果之外没有其他用途，这可能会浪费资源。以下是关联的后台 Bean 的样子：\n\
    \n```\n@Named @RequestScoped\npublic class LongRunningProcess {\n\n    @Inject\n\
        private LongRunningProcessService service;\n\n    @Inject @Push\n    private\
    \ PushContext push;                                                          \n\
    \n    public void submit() {\n        service.asyncSubmit(result -> push.send(result));\n\
        }\n}\n```\n\n以下是服务类的样子：\n\n```\n@Stateless\npublic class LongRunningProcessService\
    \ {\n\n    @Asynchronous\n    public void asyncSubmit(Consumer<String> callback)\
    \ {\n        String result = someLongRunningProcess();\n        callback.accept(result);\n\
        }\n\n}\n```\n\n请注意 EJB 的 `@Asynchronous` 注解。这在此结构中非常重要。它将确保 EJB（企业 Java Bean）方法在单独的线程中执行。这允许后台\
    \ Bean 方法立即返回，而无需等待 EJB 方法完成。\n\n## 有状态 UI 更新\n\n你可能已经注意到，`onmessage` JavaScript\
    \ 监听器函数通常仅适用于小型无状态任务，例如显示反馈消息或使用 JavaScript 向某个无状态列表添加新项。当你想要更新由另一个 JSF 组件表示的有状态\
    \ UI（用户界面）时，它就不是那么有用了。想象一下，用一个完整的 JSF 表格替换一个简单的加载图片。\n\n为此，你最好嵌套一个监听特定推送消息的 `<f:ajax>`。通过其\
    \ `render` 属性，你可以在传入的推送消息中自动更新任意 JSF 组件。以下是一个示例，它最初显示一个加载图片，然后在表格准备好加载时显示表格：\n\
    \n```\n<h:form>\n    <f:websocket channel=\"push\" scope=\"view\">\n        <f:ajax\
    \ event=\"loaded\" render=\":results\" />\n    </f:websocket>\n</h:form>\n<h:panelGroup\
    \ id=\"results\" layout=\"block\">\n    <h:graphicImage name=\"images/loading.gif\"\
    \n        rendered=\"#{empty longRunningSearch.results}\">\n    </h:graphicImage>\n\
        <h:dataTable value=\"#{longRunningSearch.results}\" var=\"result\"\n        rendered=\"\
    #{not empty longRunningSearch.results}\">\n        <h:column>#{result.id}</h:column>\n\
            <h:column>#{result.name}</h:column>\n        <h:column>#{result.value}</h:column>\n\
        </h:dataTable>\n</h:panelGroup>\n```\n\n请注意，`<f:websocket>` 被放置在 `<h:form>`\
    \ 中。当它嵌套了 `<f:ajax>` 时，这是强制性的。通常情况下这不是必需的。以下是后台 Bean 的样子：\n\n```\n@Named @ViewScoped\n\
    public class LongRunningSearch implements Serializable {\n\n    private List<Result>\
    \ results;\n\n    @Inject\n    private LongRunningSearchService service;\n\n    @Inject\
    \ @Push\n    private PushContext push;\n\n    @PostConstruct\n    public void\
    \ init() {\n        service.asyncLoadResults(results -> {\n            this.results\
    \ = results;\n            push.send(\"loaded\");\n        });\n    }\n\n    public\
    \ List<Result> getResults() {\n        return results;\n    }\n}\n```\n\n请注意，推送消息\
    \ `\"loaded\"` 与 `<f:ajax event>` 的值完全匹配。你可以使用任何你想要的值，并且可以根据需要嵌套任意多个 `<f:ajax>`\
    \ 标签。托管 Bean 必须是 `@ViewScoped` 的，这一点很重要，因为 Ajax 调用基本上是在同一个视图内的不同请求中执行的。最后，服务类如下所示：\n\
    \n```\n@Stateless\npublic class LongRunningSearchService {\n\n    @Asynchronous\n\
        public void asyncLoadResults(Consumer<List<Result>> callback) {\n        List<Result>\
    \ results = someLongRunningProcess();\n        callback.accept(results);\n    }\n\
    }\n```\n\n`someLongRunningProcess()` 方法代表你对某个长时间运行进程的实现（例如，调用第三方 Web 服务 API）。\n"
- fmt: "# Site-Wide Push Notifications\n\nFor this, you can use an application-scoped\
    \ socket. Such a socket is particularly useful for application-wide feedback messages\
    \ triggered by the web application itself on a particular event which may be of\
    \ interest to all application users. Think of site-wide statistics, real-time\
    \ lists, stock updates, etc. The following example shows the case of a real-time\
    \ top 10 list:\n\n```\n<h:dataTable id=\"top10\" value=\"#{bean.top10}\" var=\"\
    item\">\n    <h:column>#{item.ranking}</h:column>\n    <h:column>#{item.name}</h:column>\n\
    \    <h:column>#{item.score}</h:column>\n</h:dataTable>\n<h:form>\n    <f:websocket\
    \ channel=\"top10Observer\">\n        <f:ajax event=\"updated\" render=\":top10\"\
    \ />\n    </f:websocket>\n</h:form>\n```\n\nHere is what the service class looks\
    \ like, with a little help from CDI events.\n\n```\n@Stateless\npublic class ItemService\
    \ {\n\n    @Inject\n    private EntityManager entityManager;\n\n    @Inject\n\
    \    private BeanManager beanManager;\n\n    public void update(Item item) {\n\
    \        List<Item> previousTop10 = getTop10();\n        entityManager.merge(item);\n\
    \        List<Item> currentTop10 = getTop10();\n\n        if (!currentTop10.equals(previousTop10))\
    \ {\n            beanManager.fireEvent(new Top10UpdatedEvent());\n        }\n\
    \    }\n\n    public List<Item> getTop10() {\n        return entityManager\n \
    \           .createNamedQuery(\"Item.top10\", Item.class)\n            .getResultList();\n\
    \    }\n}\n```\n\nNote that the `Top10UpdatedEvent` is, in this specific example,\
    \ basically just an empty class like `public class Top10UpdatedEvent {}`. Also\
    \ note that we’re not injecting the `PushContext` here. This is otherwise considered\
    \ tight coupling of layers. All JSF-related code belongs in the front end, not\
    \ in the back end. This way the back-end service classes are better reusable across\
    \ all kinds of front-end frameworks other than JSF, such as JAX-RS or even plain\
    \ vanilla JSP/Servlet. In other words, you should ensure that none of your back-end\
    \ classes directly or indirectly use any front-end-specific classes such as those\
    \ from `javax.faces.*`, `javax.ws.*`, and `javax.servlet.*` packages.\n\nAny event\
    \ fired with the `BeanManager#fireEvent()` method can be observed using CDI `@Observes`\
    \ annotation. This works across all layers. In other words, even when it’s fired\
    \ in the back end, you can observe it in the front end. The only requirement is\
    \ that the backing bean must be `@ApplicationScoped`. That is, there’s not necessarily\
    \ any means of an HTTP request, HTTP session, or JSF view anywhere at that moment.\n\
    \n```\n@Named @ApplicationScoped\npublic class Bean {\n\n    private List<Item>\
    \ top10;\n\n    @Inject\n    private ItemService service;\n\n    @Inject @Push\n\
    \    private PushContext top10Observer;\n\n    @PostConstruct\n    public void\
    \ load() {\n        top10 = service.getTop10();\n    }\n\n    public void onTop10Updated(@Observes\
    \ Top10UpdatedEvent event) {\n        load();\n        top10Observer.send(\"updated\"\
    );\n    }\n\n    public List<Item> getTop10() {\n        return top10;\n    }\n\
    }\n```\n\n## Keeping Track of Active Sockets\n\nIn order to keep track of active\
    \ sockets, you can in an application-scoped bean observe `@WebsocketEvent.Opened`\
    \ and `@WebsocketEvent.Closed` events. The following example assumes that you\
    \ have `<f:websocket channel=\"chat\" user=\"...\">` and that you intend to collect\
    \ “active chat users”:\n\n```\n@ApplicationScoped\npublic class WebsocketEventObserver\
    \ {\n\n    private Map<Serializable, AtomicInteger> users;\n\n    @PostConstruct\n\
    \    public void init() {\n        users = new ConcurrentHashMap<>();\n    }\n\
    \n    public void onopen(@Observes @Opened WebsocketEvent event) {\n        if\
    \ (\"chat\".equals(event.getChannel())) {\n            getCounter(event.getUser()).incrementAndGet();\n\
    \        }\n    }\n\n    public void onclose(@Observes @Closed WebsocketEvent\
    \ event) {\n        if (\"chat\".equals(event.getChannel())) {\n            getCounter(event.getUser()).decrementAndGet();\n\
    \        }\n    }\n\n    private AtomicInteger getCounter(Serializable user) {\n\
    \        return users.computeIfAbsent(user, k -> new AtomicInteger());\n    }\n\
    \n    public Set<Serializable> getActiveUsers() {\n        return users.entrySet().stream()\n\
    \            .filter(entry -> entry.getValue().intValue() > 0)\n            .map(entry\
    \ -> entry.getKey())\n            .collect(Collectors.toSet());\n    }\n}\n```\n\
    \nYou can use the above `getActiveUsers()` method to obtain a set of “active chat\
    \ users.” Do note that a single user can open the same web page multiple times\
    \ within the same session (e.g., multiple browser tabs) and that’s exactly why\
    \ a counter is used instead of simply adding and removing users from a `Set`.\n\
    \n## Detecting Session and View Expiration\n\nThe `<f:websocket>` tag will by\
    \ default keep the connection open forever, as long as the document is open—as\
    \ long as there’s no `connected=\"false\"` being set, or `jsf.push.close(clientId)`\
    \ being invoked, of course. When the first connection attempt fails, it will immediately\
    \ report an error. You can optionally use the `onclose` attribute to reference\
    \ a JavaScript function which acts as a close listener.\n\n```\n<f:websocket ...\
    \ onclose=\"logClose\" />\n\n<script>\n    function logClose(code, channel, event)\
    \ {\n        if (code == -1) {\n            // WebSocket API not supported by\
    \ client. E.g. IE9.\n        }\n        else if (code == 1000) {\n           \
    \ // Normal close as result of expired view or session.\n        }\n        else\
    \ {\n            // Abnormal close as result of a client or server error.\n  \
    \      }\n    }\n</script>\n```\n\nThe JavaScript function will be invoked with\
    \ three arguments.\n\n1. `code`: the close reason code as integer. If this is\
    \ -1, then the WebSocket JavaScript API is simply not supported by the client.\
    \ If this is 1000, then a normal closure has occurred as consequence of an expired\
    \ view or session in the server side.\n2. `channel`: the WebSocket channel name.\
    \ This may be useful in case you intend to have a global listener.\n3. `event`:\
    \ the original `CloseEvent` object. This may be useful in case you intend to inspect\
    \ it in the JavaScript function.\n\nWhen the first connection attempt succeeds\
    \ but it later gets disconnected for some reason (e.g., because the server is\
    \ restarting), then it will by default keep trying to reconnect. In the case of\
    \ Mojarra, it will keep retrying up to 25 times, with an interval which is incremented\
    \ 500ms each time, and it will eventually report an error.\n\nAs you might have\
    \ noticed in the aforementioned `onclose` listener function example, you could\
    \ just check if the close code of a `<f:websocket>` equals 1000 in order to perform\
    \ some client-side action via JavaScript (e.g., displaying a warning message and/or\
    \ redirecting to some “Session expired” page).\n\n```\n<f:websocket channel=\"\
    push\" scope=\"session\" onclose=\"closeListener\" />\n\n<script>\n    function\
    \ closeListener(code) {\n        if (code == 1000) {\n            window.location\
    \ = jsf.contextPath + \"/expired.xhtml\";\n        }\n    }\n</script>\n```\n\n\
    This works for both view- and session-scoped sockets. Application-scoped sockets,\
    \ however, remain open forever as long as the document is still open on client\
    \ side, even when the underlying view or session has expired."
