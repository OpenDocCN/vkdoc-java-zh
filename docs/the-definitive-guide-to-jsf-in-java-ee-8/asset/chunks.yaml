    ## 标签与消息组件


    在精心设计的表单中，输入元素通常伴随有标签元素和针对该输入字段的消息元素。在 HTML 中，标签由 `<label>` 元素表示。在 JSF 中，你可以使用
    `<h:outputLabel>` 组件来生成 HTML 的 `<label>` 元素。HTML 并没有专门用于表示消息的元素。在 JSF 中，`<h:message>`
    组件会生成一个 HTML `<span>` 元素，而 `<h:messages>` 组件则根据 `layout` 属性的值，生成 `<ul>` 元素或 `<table>`
    元素。


    标签元素具有多种 SEO（搜索引擎优化）和可用性优势。它用文本告知关联的输入元素。屏幕阅读器（例如视力障碍人士使用的设备）会找到标签并通过声音读出其内容。搜索引擎爬虫会找到标签并以此索引关联的输入元素。此外，点击标签本身会聚焦并激活关联的输入元素。基于文本的输入元素会显示文本光标。复选框和单选输入元素会被切换。列表框和下拉输入元素会被聚焦。文件输入元素会打开浏览对话框。提交按钮会被触发。


    消息元素通常用于显示来自服务器端的转换和验证错误消息。这样，最终用户就能了解表单的状态并采取相应操作，通常是修正输入值。你也可以用它来显示警告或提示性消息。


    在 JSF 中，`<h:outputLabel>`、`<h:message>` 和 `<h:messages>` 组件都有一个 `for` 属性，你通常在其中定义关联的
    `UIInput` 组件的 ID。以下是一个登录表单的示例：


    ```

    <h:form id="login">

        <fieldset>

            <legend>登录</legend>

            <section>

                <h:outputLabel for="email" value="电子邮件地址" />

                <h:inputText id="email" value="#{login.email}"

                    required="true" />

                <h:message id="m_email" for="email" />

            </section>

            <section>

                <h:outputLabel for="password" value="密码" />

                <h:inputSecret id="password" value="#{login.password}"

                    required="true" />

                <h:message id="m_password" for="password" />

            </section>

            <footer>

                <h:commandButton id="submit" value="登录"

                    action="#{login.submit}" />

            </footer>

        </fieldset>

    </h:form>

    ```


    实际上，你可以在 `for` 属性中使用任意组件搜索表达式。对于 `<h:outputLabel>` 组件，这没有太大意义。对于 `<h:message>`
    和 `<h:messages>` 组件，引用非 `UIInput` 组件的 ID 仅在你希望从托管 Bean 中以编程方式添加 faces 消息时才有意义。但你需要知道目标组件的客户端
    ID。


    ```

    <h:form id="login">

        ...

                <h:commandButton id="submit" value="登录"

                    action="#{login.submit}" />

                <h:message id="m_submit" for="submit" />

        ...

    </h:form>

    ```


    上述 `<h:commandButton>` 会在 HTML 输出中生成一个客户端 ID "login:submit"。然后你可以按如下方式以编程方式添加
    faces 消息：


    ```

    public String submit() {

        try {

            yourAuthenticator.authenticate(email, password);

            return "/user/home.xhtml?faces-redirect=true";

        }

        catch (YourAuthenticationException e) {

            FacesContext context = FacesContext.getCurrentInstance();

            FacesMessage message = new FacesMessage("认证失败");

            context.addMessage("login:submit", message);

            return null;

        }

    }

    ```


    然而，更好的做法是通过传递 `null` 作为客户端 ID，将 faces 消息添加为全局消息。


    ```

            context.addMessage(null, message);

    ```


    这样的消息只会出现在 `<h:messages globalOnly="true">` 中。


    ```

                <h:commandButton id="submit" value="登录"

                    action="#{login.submit}" />

                <h:messages id="messages" globalOnly="true"

                    rendered="#{component.namingContainer.submitted}" />

    ```


    请注意消息组件 `rendered` 属性中的逻辑。只有当父级 `NamingContainer` 的 `submitted` 属性计算结果为 `true`
    时，它才会被渲染。在这个特定例子中，它检查的是 `UIForm#isSubmitted()`。这在你有多个非 Ajax 表单，每个表单都有自己的全局消息组件，和/或在
    JSF 页面底部附近有一个“捕获所有”的 `<h:messages redisplay="false">` 组件（该组件使用 CSS 固定定位在顶部）时非常有用。否则，全局消息也会意外地在那里显示。


    在 Ajax 表单中，这种消息渲染逻辑并非必需，因为你可以通过在 `<f:ajax>` 的 `render` 属性中明确指定消息组件来精细调整消息渲染。此外，当
    `<f:ajax>` 的 `execute` 属性没有像 `execute="@form"` 那样明确指定表单时，`UIForm#isSubmitted()`
    会意外地返回 `false`。

