- fmt: "### `@ConversationScoped`\n\nA conversation-scoped managed bean is tied to\
    \ the lifetime of the injected `javax.enterprise.context.Conversation` instance\
    \ which offers `begin()` and `end()` methods which must be explicitly invoked\
    \ by the web application’s code in order to indicate the start and end of the\
    \ conversation scope. The conversation scope is represented by a predefined HTTP\
    \ request parameter with a default name of `\"cid\"` (`\"Conversation ID\"`) whose\
    \ value references represents the conversation ID. The conversation ID in turn\
    \ references an isolated mapping in the current HTTP session where the conversation-scoped\
    \ managed bean instances will be stored.\n\nAs long as the conversation scope\
    \ has not started, the conversation-scoped managed bean will behave like a request-scoped\
    \ managed bean. When the application code explicitly invokes `Conversation#begin()`,\
    \ then the conversation scope will start and a custom `javax.faces.application.ViewHandler`\
    \ provided by the CDI implementation will make sure that all its `getXxxURL()`\
    \ methods such as `getActionURL()` and `getBookmarkableURL()` return a URL (uniform\
    \ resource locator) with the conversation ID parameter included. In case of Weld,\
    \ that’s the `ConversationAwareViewHandler`.[⁶](#A454457_1_En_8_Chapter.xhtml#Fn6)\
    \ All JSF `UIForm` and `UIOutcomeTarget` components derive their action and target\
    \ URLs from those methods of the `ViewHandler`. The generated HTML output of those\
    \ components will thus ultimately include the conversation ID in the target URL.\n\
    \nOn an incoming HTTP request, when the conversation ID parameter is present in\
    \ the request, and it is still valid, the CDI implementation will obtain the associated\
    \ conversation scope from the HTTP session and make sure that all conversation-scoped\
    \ managed beans are obtained from exactly this conversation scope identified by\
    \ the conversation ID. This works on both GET and POST requests. Any form submit\
    \ or any link/navigation to a URL with the conversation ID included will provide\
    \ access to the very same conversation scope, as long as it’s still valid. The\
    \ conversation scope ends when the application code explicitly invokes `Conversation#end()`.\
    \ When the end user reuses the `\"cid\"` request parameter later, or manipulates\
    \ its value to one which isn’t started in its own browser session, or when the\
    \ underlying `HttpSession` instance is destroyed, then CDI will throw a `javax.enterprise.context.NonexistentConversationException`.\n\
    \nConversation-scoped managed beans are particularly useful in order to be able\
    \ to return to a particular stateful page within the same browser session after\
    \ being redirected elsewhere. A classic example is a third-party web service which\
    \ is included in an HTML `<iframe>` or opened in a new browser tab or even targeted\
    \ in the `action` attribute of a plain HTML `<form>`, and can, via a specific\
    \ request parameter, be configured to redirect back to your web application after\
    \ completing the service. When you include the conversation ID in the redirect\
    \ URL, then you will in the redirected page be able to resume with exactly the\
    \ same conversation-scoped managed bean instance as it was before the redirect.\
    \ This allows you the opportunity to finalize and unlock any pending transactions\
    \ and, of course, end the conversation.\n\nGiven a checkout button which looks\
    \ as follows,\n\n```\n<h:form>\n    ...\n    <ui:fragment rendered=\"#{empty payment.url}\"\
    >\n        ...\n        <h:commandButton value=\"Checkout\" action=\"#{payment.checkout}\"\
    >\n            <f:ajax render=\"@form\" />\n        </h:commandButton>\n    </ui:fragment>\n\
    \    <ui:fragment rendered=\"#{not empty payment.url}\">\n        <iframe src=\"\
    #{payment.url}\"></iframe>\n    </ui:fragment>\n</h:form>\n```\n\nhere’s what\
    \ the associated conversation-scoped bean behind `#{payment}` looks like:\n\n\
    ```\n@Named @ConversationScoped\npublic class Payment implements Serializable\
    \ {\n\n    private Order order;\n    private String url;\n\n    @Inject\n    private\
    \ Cart cart;\n\n    @Inject\n    private OrderService orderService;\n\n    @Inject\n\
    \    private Conversation conversation;\n\n    public void checkout() {\n    \
    \    conversation.begin();\n        order = orderService.lockProductsAndPrepareOrder(cart);\n\
    \        url = \"http://third.party.com/pay?returnurl=\"\n            + URLEncoder.encode(\"\
    http://my.site.com/paid?cid=\"\n            + conversation.getId(), \"UTF-8\"\
    );\n    }\n\n    public void confirm() {                                     \
    \                                                 \n        orderService.saveOrderAndCreateInvoice(order);\n\
    \        conversation.end();\n    }\n\n    @PreDestroy\n    public void destroy()\
    \ {\n        orderService.unlockProductsIfNecessary(order);\n    }\n\n    public\
    \ String getUrl() {\n        return url;\n    }\n}\n```\n\nBasically, the checkout\
    \ button is only rendered when there’s no payment URL set. Once the button is\
    \ pressed, all products of the shopping cart are locked and the order is prepared.\
    \ Also, depending on the third-party payment service, the URL referring it must\
    \ be prepared whereby you include the return URL as some query parameter in the\
    \ URL of the payment service. The return URL should in turn include the `\"cid\"\
    ` request parameter representing the conversation ID. In the redirected page which\
    \ will actually be loaded in the `<iframe>`, you can just mark the conversation\
    \ complete with `<f:viewAction>`.\n\n```\n<f:metadata>\n    <f:viewAction action=\"\
    #{payment.confirm}\" />\n</f:metadata>\n```\n\nOf course, the average third-party\
    \ payment service should have a more elaborate Java or even JavaScript API instead\
    \ of `<iframe>`; also, it should be possible to provide different return pages\
    \ for each payment outcome such as payment failed and payment aborted. The above\
    \ example is just to give the general idea."
