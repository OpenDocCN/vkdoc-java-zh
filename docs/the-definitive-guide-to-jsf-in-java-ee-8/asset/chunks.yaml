- fmt: "# Command Components\n\nYou’ll have noticed examples of the `<h:commandButton>`\
    \ in the previous sections about input and select components. This thus generates\
    \ an HTML `<input type=\"submit\">` element, which is the HTML way to send all\
    \ input values of the `<form>` element it is sitting in to the server. On the\
    \ server side, this component is also capable of invoking one or more Java methods,\
    \ which are usually defined in the `action` or `actionListener` attribute, or\
    \ via a `<f:actionListener>` tag nested in the command component. You’ll also\
    \ have read that the action listener method always runs before the method associated\
    \ with the `action` attribute.\n\nYou can use the `<f:actionListener>` tag to\
    \ register one or more additional action listeners on the very same command component.\
    \ All those action listeners are invoked in the same order as they’re declared\
    \ in the view and attached to the component. The target method can be declared\
    \ in three ways on the `<f:actionListener>` tag. One way is via the `type` attribute\
    \ and the other two ways are via the `binding` attribute.\n\n```\n<h:commandButton\
    \ ...>\n    <f:actionListener type=\"com.example.project.SomeActionListener\"\
    \ />\n    <f:actionListener binding=\"#{beanImplementingActionListener}\" />\n\
    \    <f:actionListener binding=\"#{bean.someActionListenerMethod()}\" />\n<h:commandButton>\n\
    ```\n\nThe `type` attribute in the first way must basically represent the fully\
    \ qualified name of the class implementing the `ActionListener` interface.\n\n\
    ```\npackage com.example.project;\n\nimport javax.faces.event.ActionListener;\n\
    import javax.faces.event.ActionEvent;\n\npublic class SomeActionListener implements\
    \ ActionListener {\n\n@Override\n    public void processAction(ActionEvent event)\
    \ {\n        // ...\n    }\n}\n```\n\nThe `binding` attribute in the second way\
    \ must basically reference a managed bean instance implementing the `ActionListener`\
    \ interface.\n\n```\n@Named @RequestScoped\npublic class BeanImplementingActionListener\
    \ implements ActionListener {\n\n@Override\n    public void processAction(ActionEvent\
    \ event) {\n        // ...\n    }\n}\n```\n\nAnd the `binding` attribute in the\
    \ third way can basically reference any arbitrary managed bean method which is\
    \ declared `void`.\n\n```\n@Named @RequestScoped\npublic class Bean {\n\npublic\
    \ void someActionListenerMethod() {\n        // ...\n    }\n}\n```\n\nNote that\
    \ the third way is more or less undocumented. It has only been possible since\
    \ the introduction of EL 2.2 (2009), wherein developers could start explicitly\
    \ declaring method expressions by simply adding the parenthesis, if necessary\
    \ with arguments. Coincidentally, the `binding` attribute of the `<f:actionListener>`\
    \ could deal with them. Under the hood of the `binding` attribute is treated as\
    \ a `ValueExpression` and the logic expected to obtain a managed bean instance\
    \ implementing the `ActionListener` interface when invoking `ValueExpression#getValue()`.\
    \ However, instead of a getter, a `void` method was invoked and returned nothing\
    \ which is interpreted as `null`. So, the logic continued silently as if there\
    \ were simply no bean instance available.\n\nThe action listeners have an additional\
    \ feature on top of the `action` attribute. When a `javax.faces.event.AbortProcessingException`\
    \ is explicitly thrown from an action listener, then JSF will swallow the exception\
    \ and abort processing the invoke application phase (fifth phase) and immediately\
    \ advance to the render response phase (sixth phase). All remaining action listeners\
    \ and the action method, if any, will be skipped. The swallowed exception won’t\
    \ end up in any error response. Given this fact, and the fact that action listeners\
    \ are always invoked before the action method, you could (ab)use it to perform\
    \ some conversion and validation based on already updated model values before\
    \ the action method is invoked.\n\n```\npublic void someActionListenerMethod()\
    \ {\n    try {\n        convertOrValidate(this);\n    } catch (SomeConversionOrValidationException\
    \ e) {\n        FacesContext context = FacesContext.getCurrentInstance()\n   \
    \     context.addMessage(null, new FacesMessage(e.getMessage()));\n        throw\
    \ new AbortProcessingException(e);\n    }\n}\n\npublic void someActionMethod()\
    \ {\n    // Won't be invoked when AbortProcessingException is thrown.\n}\n```\n\
    \nI’m saying “(ab)use” because it is essentially the responsibility of a normal\
    \ `Converter` or `Validator` implementation to perform such task, so that the\
    \ model values are not polluted with invalid values. However, for a long time\
    \ in JSF it was not possible to perform conversion or validation based on multiple\
    \ fields. Hence developers started using the action (listener) methods, which\
    \ is essentially a violation of the JSF life cycle.\n\nOnly in JSF 2.3 was a new\
    \ `<f:validateWholeBean>` tag introduced to perform validation on multiple fields.\
    \ You can read more about this in Chapter [5](#A454457_1_En_5_Chapter.xhtml).\
    \ So this leaves only one reasonable real-world use case open for action listener\
    \ methods: performing conversion based on one or more model values. One example\
    \ has already been demonstrated in the section “Selection Components” (the case\
    \ of using multiple `<h:selectBooleanCheckbox>` in `<ui:repeat>` to work around\
    \ the fact that the `<h:selectManyCheckbox>` generates an HTML table). Another\
    \ example would be invoking an external web service with the supplied model values\
    \ and obtaining its result as a “converted” value. The action method should then\
    \ still be used to execute business service logic. When the action method throws\
    \ an exception, the request will end up as an HTTP 500 error response. You can\
    \ find more about this in Chapter [9](#A454457_1_En_9_Chapter.xhtml).\n\nApart\
    \ from the `<h:commandButton>`, JSF offers two more command components: the `<h:commandLink>`\
    \ and the `<h:commandScript>`. The `<h:commandLink>` has basically an identical\
    \ life cycle as the `<h:commandButton>`, except that it generates an HTML `<a>`\
    \ element which submits the enclosed form with the help of JavaScript. Everywhere\
    \ where you use `<h:commandButton>`, it could be substituted with `<h:commandLink>`.\n\
    \n```\n<h:form id=\"form\">\n    ...\n    <h:commandLink id=\"submit\" value=\"\
    Submit\" action=\"#{bean.submit}\" />\n</h:form>\n```\n\nWhereby the generated\
    \ HTML output looks as follows:\n\n```\n<form id=\"form\" name=\"form\" method=\"\
    post\" action=\"/project/test.xhtml\"\n    enctype=\"application/x-www-form-urlencoded\"\
    >\n    <input type=\"hidden\" name=\"form\" value=\"form\" />\n    ...\n    <script\
    \ type=\"text/javascript\"\n        src=\"/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces\"\
    >\n    </script>\n    <a id=\"form:submit\" href=\"#\" onclick=\"\n        mojarra.jsfcljs(\n\
    \            document.getElementById('form'),\n            {'form:submit':'form:submit'},\n\
    \            ''\n        ); return false;\">Submit</a>\n    <input type=\"hidden\"\
    \ name=\"javax.faces.ViewState\"\n        id=\"j_id1:javax.faces.ViewState:0\"\
    \n        value=\"-6936791897896630173:-5064219023156239099\"\n        autocomplete=\"\
    off\" />\n</form>\n```\n\nAnd the rendering in Chrome browser:\n\n![A454457_1_En_4_Figj_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figj_HTML.jpg)\n\
    \nIn the generated HTML output, you’ll notice that it auto-includes the `jsf.js`\
    \ JavaScript file. This contains, among other things, the `jsf` object and the\
    \ JSF implementation-specific helper functions which are in case of the Mojarra\
    \ implementation put in the `mojarra` object. In plain HTML, there’s no way to\
    \ submit a `<form>` using an `<a>` element. Hence, some JavaScript has to be thrown\
    \ into the game."
  raw: '## Command Components


    You’ll have noticed examples of the <h:commandButton> in the previous sections
    about input and select components. This thus generates an HTML <input type="submit">
    element, which is the HTML way to send all input values of the <form> element
    it is sitting in to the server. On the server side, this component is also capable
    of invoking one or more Java methods, which are usually defined in the action
    or actionListener attribute, or via a <f:actionListener> tag nested in the command
    component. You’ll also have read that the action listener method always runs before
    the method associated with the action attribute.


    You can use the <f:actionListener> tag to register one or more additional action
    listeners on the very same command component. All those action listeners are invoked
    in the same order as they’re declared in the view and attached to the component.
    The target method can be declared in three ways on the <f:actionListener> tag.
    One way is via the type attribute and the other two ways are via the binding attribute
    .


    ```

    <h:commandButton ...>

        <f:actionListener type="com.example.project.SomeActionListener" />

        <f:actionListener binding="#{beanImplementingActionListener}" />

        <f:actionListener binding="#{bean.someActionListenerMethod()}" />

    <h:commandButton>

    ```


    The type attribute in the first way must basically represent the fully qualified
    name of the class implementing the ActionListener interface.


    ```

    package com.example.project;


    import javax.faces.event.ActionListener;

    import javax.faces.event.ActionEvent;


    public class SomeActionListener implements ActionListener {


    @Override

        public void processAction(ActionEvent event) {

            // ...

        }

    }

    ```


    The binding attribute in the second way must basically reference a managed bean
    instance implementing the ActionListener interface.


    ```

    @Named @RequestScoped

    public class BeanImplementingActionListener implements ActionListener {


    @Override

        public void processAction(ActionEvent event) {

            // ...

        }

    }

    ```


    And the binding attribute in the third way can basically reference any arbitrary
    managed bean method which is declared void.


    ```

    @Named @RequestScoped

    public class Bean {


    public void someActionListenerMethod() {

            // ...

        }

    }

    ```


    Note that the third way is more or less undocumented. It has only been possible
    since the introduction of EL 2.2 (2009), wherein developers could start explicitly
    declaring method expressions by simply adding the parenthesis, if necessary with
    arguments. Coincidentally, the binding attribute of the <f:actionListener> could
    deal with them. Under the hood of the binding attribute is treated as a ValueExpression
    and the logic expected to obtain a managed bean instance implementing the ActionListener
    interface when invoking ValueExpression#getValue(). However, instead of a getter,
    a void method was invoked and returned nothing which is interpreted as null. So,
    the logic continued silently as if there were simply no bean instance available.


    The action listeners have an additional feature on top of the action attribute.
    When a javax.faces.event.AbortProcessingException is explicitly thrown from an
    action listener , then JSF will swallow the exception and abort processing the
    invoke application phase (fifth phase) and immediately advance to the render response
    phase (sixth phase). All remaining action listeners and the action method, if
    any, will be skipped. The swallowed exception won’t end up in any error response.
    Given this fact, and the fact that action listeners are always invoked before
    the action method, you could (ab)use it to perform some conversion and validation
    based on already updated model values before the action method is invoked.


    ```

    public void someActionListenerMethod() {

        try {

            convertOrValidate(this);

        } catch (SomeConversionOrValidationException e) {

            FacesContext context = FacesContext.getCurrentInstance()

            context.addMessage(null, new FacesMessage(e.getMessage()));

            throw new AbortProcessingException(e);

        }

    }


    public void someActionMethod() {

        // Won''t be invoked when AbortProcessingException is thrown.

    }

    ```


    I’m saying “(ab)use” because it is essentially the responsibility of a normal
    Converter or Validator implementation to perform such task, so that the model
    values are not polluted with invalid values. However, for a long time in JSF it
    was not possible to perform conversion or validation based on multiple fields.
    Hence developers started using the action (listener) methods, which is essentially
    a violation of the JSF life cycle.


    Only in JSF 2.3 was a new <f:validateWholeBean> tag introduced to perform validation
    on multiple fields. You can read more about this in Chapter [5](#A454457_1_En_5_Chapter.xhtml).
    So this leaves only one reasonable real-world use case open for action listener
    methods : performing conversion based on one or more model values. One example
    has already been demonstrated in the section “Selection Components” (the case
    of using multiple <h:selectBooleanCheckbox> in <ui:repeat> to work around the
    fact that the <h:selectManyCheckbox> generates an HTML table). Another example
    would be invoking an external web service with the supplied model values and obtaining
    its result as a “converted” value. The action method should then still be used
    to execute business service logic. When the action method throws an exception,
    the request will end up as an HTTP 500 error response. You can find more about
    this in Chapter [9](#A454457_1_En_9_Chapter.xhtml).


    Apart from the <h:commandButton>, JSF offers two more command components: the
    <h:commandLink> and the <h:commandScript>. The <h:commandLink> has basically an
    identical life cycle as the <h:commandButton>, except that it generates an HTML
    <a> element which submits the enclosed form with the help of JavaScript. Everywhere
    where you use <h:commandButton>, it could be substituted with <h:commandLink>.


    ```

    <h:form id="form">

        ...

        <h:commandLink id="submit" value="Submit" action="#{bean.submit}" />

    </h:form>

    ```


    Whereby the generated HTML output looks as follows:


    ```

    <form id="form" name="form" method="post" action="/project/test.xhtml"

        enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="form" value="form" />

        ...

        <script type="text/javascript"

            src="/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces">

        </script>

        <a id="form:submit" href="#" onclick="

            mojarra.jsfcljs(

                document.getElementById(''form''),

                {''form:submit'':''form:submit''},

                ''''

            ); return false;">Submit</a>

        <input type="hidden" name="javax.faces.ViewState"

            id="j_id1:javax.faces.ViewState:0"

            value="-6936791897896630173:-5064219023156239099"

            autocomplete="off" />

    </form>

    ```


    And the rendering in Chrome browser:


    ![A454457_1_En_4_Figj_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figj_HTML.jpg)


    In the generated HTML output, you’ll notice that it auto-includes the jsf.js JavaScript
    file. This contains, among other things, the jsf object and the JSF implementation-specific
    helper functions which are in case of the Mojarra implementation put in the mojarra
    object. In plain HTML, there’s no way to submit a <form> using an <a> element.
    Hence, some JavaScript has to be thrown into the game.'
