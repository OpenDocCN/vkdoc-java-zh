- fmt: "## Referencing Bundle in JSF Page\n\nIt’s relatively simple, just treat `#{text}`\
    \ as a `Map` with the bundle keys as map keys.\n\n```\n<!DOCTYPE html>\n<html\
    \ lang=\"#{view.locale.toLanguageTag()}\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n    <h:head>\n        <title>#{text['title']}</title>\n\
    \    </h:head>\n    <h:body>\n        <h1>#{text['heading']}</h1>\n        <p>#{text['paragraph']}</p>\n\
    \    </h:body>\n</html>\n```\n\nJSF will already automatically determine the closest\
    \ matching active locale based on the HTTP `Accept-Language` header[³](#A454457_1_En_14_Chapter.xhtml#Fn3)\
    \ and set it as locale property of `UIViewRoot`. The `Accept-Language` header\
    \ is configurable in browser’s settings. In, for example, Chrome, you can configure\
    \ it via `chrome://settings/languages`. If you play around with it, for example,\
    \ by switching between English, Portuguese, and Hindi as the top-ranked language\
    \ setting in browser and refresh the JSF page, then you’ll notice that it changes\
    \ the text to conform the browser-specified language setting. If you check the\
    \ browser’s developer tools—usually accessible by pressing `F12`—and inspect the\
    \ HTTP request headers in the network monitor, then you’ll also notice that the\
    \ `Accept-Language` header changes accordingly.\n\nYou might have noticed that\
    \ the `lang` attribute of the `<html>` tag references `#{view.locale.toLanguageTag()}`.\
    \ Basically, this will print the IETF BCP 47 language tag[⁴](#A454457_1_En_14_Chapter.xhtml#Fn4)\
    \ of the locale property of the current `UIViewRoot`, which is in turn available\
    \ as an implicit EL object `#{view}`. The locale property is an instance of `java.util.Locale`\
    \ which has actually no getter method for the language tag such as `getLanguageTag()`,\
    \ but only a `toLanguageTag()` method, hence the direct method reference in EL\
    \ instead of the expected property reference.\n\nThe `lang` attribute of the `<html>`\
    \ tag is not mandatory for the functioning of JSF localization feature. Moreover,\
    \ JSF treats it as template text and does nothing special with it. You can safely\
    \ leave out it. It is, however, important for search engines. This way a search\
    \ engine like Google will be informed which language the page’s copy is in. This\
    \ is not only important in order to end up correctly in localized search results,\
    \ but also important in case you serve the very same page in different languages.\
    \ This would otherwise by the average search engine algorithm be penalized as\
    \ “duplicate content,” which is thus bad for SEO (search engine optimization)\
    \ ranking.\n\nYou’ll also have noticed that the bundle keys are specified in the\
    \ so-called brace notation `#{text['...']}`. The string between single quotes\
    \ basically represents the bundle key. In this specific case you could also have\
    \ used `#{text.title}`, `#{text.heading}`, and `#{text.paragraph}` instead. This\
    \ is, however, not the common practice. Using the brace notation not only gives\
    \ a generally clear meaning to what the EL variable represents (a resource bundle),\
    \ but it also allows you to use dots in the bundle key name such as `#{text['meta.description']}`.\
    \ The EL expression `#{text.meta.description}` has, namely, an entirely different\
    \ meaning: “get the `description` property of the nested `meta` property of the\
    \ `text` object,” which is incorrect.\n\n## Changing the Active Locale\n\nYou\
    \ can also change the active locale on the server side. This is best to be done\
    \ in a single place in a site-wide master template which contains the `<f:view>`\
    \ tag. The active locale can be set in the `locale` attribute of the `<f:view>`\
    \ which can accept either a static string representing the language tag or a concrete\
    \ `java.util.Locale` instance. The `locale` attribute accepts an EL expression\
    \ and can be changed programmatically via a managed bean. This offers you the\
    \ opportunity to let the user change it via the web page without fiddling around\
    \ in the browser’s language settings. You could present the available language\
    \ options to the user in a JSF page and let each selection change the active locale.\
    \ This can be achieved with the following JSF page:\n\n```\n<!DOCTYPE html>\n\
    <html lang=\"#{activeLocale.languageTag}\"\n    xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    >\n    <f:view locale=\"#{activeLocale.current}\">\n        <h:head>\n       \
    \     <title>#{text['title']}</title>\n        </h:head>\n        <h:body>\n \
    \           <h1>#{text['heading']}</h1>\n            <p>#{text['paragraph']}</p>\n\
    \            <h:form>\n                <h:selectOneMenu value=\"#{activeLocale.languageTag}\"\
    >\n                    <f:selectItems\n                        value=\"#{activeLocale.available}\"\
    \ var=\"l\"\n                        itemValue=\"#{l.toLanguageTag()}\"\n    \
    \                    itemLabel=\"#{l.getDisplayLanguage(l)}\">\n             \
    \       </f:selectItems>\n                    <f:ajax listener=\"#{activeLocale.reload()}\"\
    \ />\n                </h:selectOneMenu>\n            </h:form>\n        </h:body>\n\
    \    </f:view>\n</html>\n```\n\nIt is slightly adjusted from the previous example;\
    \ there is now `<f:view>` around `<h:head>` and `<h:body>`. The `locale` attribute\
    \ of `<f:view>` references the currently active locale via the `#{activeLocale}`\
    \ managed bean, which is as follows:\n\n```\n@Named @SessionScoped\npublic class\
    \ ActiveLocale implements Serializable {\n\nprivate Locale current;\n    private\
    \ List<Locale> available;\n\n@Inject\n    private FacesContext context;\n\n@PostConstruct\n\
    \    public void init() {\n        Application app = context.getApplication();\n\
    \        current = app.getViewHandler().calculateLocale(context);\n        available\
    \ = new ArrayList<>();\n        available.add(app.getDefaultLocale());\n     \
    \   app.getSupportedLocales().forEachRemaining(available::add);\n    }\n\npublic\
    \ void reload() {\n        context.getPartialViewContext().getEvalScripts()\n\
    \            .add(\"location.replace(location)\");\n    }\n\npublic Locale getCurrent()\
    \ {\n        return current;\n    }\n\npublic String getLanguageTag() {\n    \
    \    return current.toLanguageTag();\n    }\n\npublic void setLanguageTag(String\
    \ languageTag) {\n        current = Locale.forLanguageTag(languageTag);\n    }\n\
    \npublic List<Locale> getAvailable() {\n        return available;\n    }\n\n}\n\
    ```\n\nTo reiterate, `@Inject FacesContext` works only if you have placed `@FacesConfig`\
    \ on an arbitrary CDI bean somewhere in the web application. Otherwise you have\
    \ to replace it by inline `FacesContext.getCurrentInstance()` calls. There’s only\
    \ one caveat with those inline calls: you need to make absolutely sure that you\
    \ don’t assign it as a field in, for example, `@PostConstruct`, because the actual\
    \ instance is subject to being changed across method calls on the very same bean\
    \ instance. Injecting as a field via CDI takes transparently care of this, and\
    \ is therefore safe, but manually assigning is not.\n\nIn `@PostConstruct`, `ViewHandler#calculateLocale()`\
    \ is used to calculate the current locale based on `Accept-Language` header and\
    \ the default and supported locales as configured in `faces-config.xml`. This\
    \ follows exactly the same JSF-internal behavior as if when there’s no `<f:view\
    \ locale>` defined. Finally, the available locales are collected based on the\
    \ configured default and supported locales.\n\nThe available locales are, via\
    \ `<f:selectItems>` of `<h:selectOneMenu>`, presented to the user as drop-down\
    \ options (see Figure [14-1](#A454457_1_En_14_Chapter.xhtml#Fig1)). The nested\
    \ `<f:ajax>` makes sure that the selected option is set in the managed bean as\
    \ soon as the user changes the option.\n\n![A454457_1_En_14_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_14_Fig1_HTML.jpg)"
  raw: '## Referencing Bundle in JSF Page


    It’s relatively simple, just treat #{text} as a Map with the bundle keys as map
    keys .


    ```

    <!DOCTYPE html>

    <html lang="#{view.locale.toLanguageTag()}"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html">

        <h:head>

            <title>#{text[''title'']}</title>

        </h:head>

        <h:body>

            <h1>#{text[''heading'']}</h1>

            <p>#{text[''paragraph'']}</p>

        </h:body>

    </html>

    ```


    JSF will already automatically determine the closest matching active locale based
    on the HTTP Accept-Language header[³](#A454457_1_En_14_Chapter.xhtml#Fn3) and
    set it as locale property of UIViewRoot. The Accept-Language header is configurable
    in browser’s settings. In, for example, Chrome, you can configure it via chrome://settings/languages.
    If you play around with it, for example, by switching between English, Portuguese,
    and Hindi as the top-ranked language setting in browser and refresh the JSF page,
    then you’ll notice that it changes the text to conform the browser-specified language
    setting. If you check the browser’s developer tools—usually accessible by pressing
    F12—and inspect the HTTP request headers in the network monitor, then you’ll also
    notice that the Accept-Language header changes accordingly.


    You might have noticed that the lang attribute of the <html> tag references #{view.locale.toLanguageTag()}.
    Basically, this will print the IETF BCP 47 language tag[⁴](#A454457_1_En_14_Chapter.xhtml#Fn4)
    of the locale property of the current UIViewRoot, which is in turn available as
    an implicit EL object #{view}. The locale property is an instance of java.util.Locale
    which has actually no getter method for the language tag such as getLanguageTag(),
    but only a toLanguageTag() method, hence the direct method reference in EL instead
    of the expected property reference.


    The lang attribute of the <html> tag is not mandatory for the functioning of JSF
    localization feature. Moreover, JSF treats it as template text and does nothing
    special with it. You can safely leave out it. It is, however, important for search
    engines. This way a search engine like Google will be informed which language
    the page’s copy is in. This is not only important in order to end up correctly
    in localized search results, but also important in case you serve the very same
    page in different languages. This would otherwise by the average search engine
    algorithm be penalized as “duplicate content,” which is thus bad for SEO (search
    engine optimization) ranking.


    You’ll also have noticed that the bundle keys are specified in the so-called brace
    notation #{text[''...'']}. The string between single quotes basically represents
    the bundle key. In this specific case you could also have used #{text.title},
    #{text.heading}, and #{text.paragraph} instead. This is, however, not the common
    practice. Using the brace notation not only gives a generally clear meaning to
    what the EL variable represents (a resource bundle), but it also allows you to
    use dots in the bundle key name such as #{text[''meta.description'']}. The EL
    expression #{text.meta.description} has, namely, an entirely different meaning:
    “get the description property of the nested meta property of the text object,”
    which is incorrect.


    ## Changing the Active Locale


    You can also change the active locale on the server side. This is best to be done
    in a single place in a site-wide master template which contains the <f:view> tag.
    The active locale can be set in the locale attribute of the <f:view> which can
    accept either a static string representing the language tag or a concrete java.util.Locale
    instance. The locale attribute accepts an EL expression and can be changed programmatically
    via a managed bean. This offers you the opportunity to let the user change it
    via the web page without fiddling around in the browser’s language settings. You
    could present the available language options to the user in a JSF page and let
    each selection change the active locale. This can be achieved with the following
    JSF page:


    ```

    <!DOCTYPE html>

    <html lang="#{activeLocale.languageTag}"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html">

        <f:view locale="#{activeLocale.current}">

            <h:head>

                <title>#{text[''title'']}</title>

            </h:head>

            <h:body>

                <h1>#{text[''heading'']}</h1>

                <p>#{text[''paragraph'']}</p>

                <h:form>

                    <h:selectOneMenu value="#{activeLocale.languageTag}">

                        <f:selectItems

                            value="#{activeLocale.available}" var="l"

                            itemValue="#{l.toLanguageTag()}"

                            itemLabel="#{l.getDisplayLanguage(l)}">

                        </f:selectItems>

                        <f:ajax listener="#{activeLocale.reload()}" />

                    </h:selectOneMenu>

                </h:form>

            </h:body>

        </f:view>

    </html>

    ```


    It is slightly adjusted from the previous example; there is now <f:view> around
    <h:head> and <h:body>. The locale attribute of <f:view> references the currently
    active locale via the #{activeLocale} managed bean, which is as follows:


    ```

    @Named @SessionScoped

    public class ActiveLocale implements Serializable {


    private Locale current;

        private List<Locale> available;


    @Inject

        private FacesContext context;


    @PostConstruct

        public void init() {

            Application app = context.getApplication();

            current = app.getViewHandler().calculateLocale(context);

            available = new ArrayList<>();

            available.add(app.getDefaultLocale());

            app.getSupportedLocales().forEachRemaining(available::add);

        }


    public void reload() {

            context.getPartialViewContext().getEvalScripts()

                .add("location.replace(location)");

        }


    public Locale getCurrent() {

            return current;

        }


    public String getLanguageTag() {

            return current.toLanguageTag();

        }


    public void setLanguageTag(String languageTag) {

            current = Locale.forLanguageTag(languageTag);

        }


    public List<Locale> getAvailable() {

            return available;

        }


    }

    ```


    To reiterate, @Inject FacesContext works only if you have placed @ FacesConfig
    on an arbitrary CDI bean somewhere in the web application. Otherwise you have
    to replace it by inline FacesContext.getCurrentInstance() calls. There’s only
    one caveat with those inline calls: you need to make absolutely sure that you
    don’t assign it as a field in, for example, @PostConstruct, because the actual
    instance is subject to being changed across method calls on the very same bean
    instance. Injecting as a field via CDI takes transparently care of this, and is
    therefore safe, but manually assigning is not.


    In @ PostConstruct, ViewHandler#calculateLocale() is used to calculate the current
    locale based on Accept-Language header and the default and supported locales as
    configured in faces-config.xml. This follows exactly the same JSF-internal behavior
    as if when there’s no <f:view locale> defined. Finally, the available locales
    are collected based on the configured default and supported locales.


    The available locales are, via <f:selectItems> of <h:selectOneMenu>, presented
    to the user as drop-down options (see Figure [14-1](#A454457_1_En_14_Chapter.xhtml#Fig1)).
    The nested <f:ajax> makes sure that the selected option is set in the managed
    bean as soon as the user changes the option.


    ![A454457_1_En_14_Fig1_HTML.jpg](OEBPS/Images/A454457_1_En_14_Fig1_HTML.jpg)'
  trans: '

    ## 在 JSF 页面中引用资源包


    这相对简单，只需将 `#{text}` 视为一个 Map，其中资源包的键作为 Map 的键即可。


    ```

    <!DOCTYPE html>

    <html lang="#{view.locale.toLanguageTag()}"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html">

        <h:head>

            <title>#{text[''title'']}</title>

        </h:head>

        <h:body>

            <h1>#{text[''heading'']}</h1>

            <p>#{text[''paragraph'']}</p>

        </h:body>

    </html>

    ```


    JSF 会自动根据 HTTP `Accept-Language` 请求头³确定最匹配的活动区域设置，并将其设置为 `UIViewRoot` 的 `locale`
    属性。`Accept-Language` 请求头可在浏览器设置中配置。例如，在 Chrome 中，你可以通过 `chrome://settings/languages`
    进行配置。如果你尝试调整它，比如将英语、葡萄牙语和印地语依次设为浏览器中排名靠前的语言设置，然后刷新 JSF 页面，你会注意到页面文本会随之改变，以符合浏览器指定的语言设置。如果你打开浏览器的开发者工具（通常按
    F12 键可访问），并在网络监视器中检查 HTTP 请求头，你还会发现 `Accept-Language` 请求头也相应地发生了变化。


    你可能已经注意到，`<html>` 标签的 `lang` 属性引用了 `#{view.locale.toLanguageTag()}`。基本上，这会打印出当前
    `UIViewRoot` 的 `locale` 属性的 IETF BCP 47 语言标签⁴，而 `UIViewRoot` 本身作为一个隐式 EL 对象 `#{view}`
    可用。`locale` 属性是 `java.util.Locale` 的一个实例，它实际上没有像 `getLanguageTag()` 这样的语言标签 getter
    方法，只有一个 `toLanguageTag()` 方法，因此在 EL 中直接引用了该方法，而不是预期的属性引用。


    `<html>` 标签的 `lang` 属性对于 JSF 本地化功能的运行并非必需。此外，JSF 将其视为模板文本，不会对其进行任何特殊处理。你可以安全地省略它。然而，它对搜索引擎很重要。这样，像
    Google 这样的搜索引擎就能知道页面内容使用的是哪种语言。这不仅对于正确出现在本地化搜索结果中很重要，而且在你以不同语言提供同一页面时也很重要。否则，一般的搜索引擎算法可能会将其视为“重复内容”而进行惩罚，这对
    SEO（搜索引擎优化）排名不利。


    你还会注意到，资源包的键是以所谓的大括号表示法 `#{text[''...'']}` 指定的。单引号之间的字符串基本上代表了资源包的键。在这种特定情况下，你也可以使用
    `#{text.title}`、`#{text.heading}` 和 `#{text.paragraph}` 来代替。然而，这并非普遍做法。使用大括号表示法不仅能让
    EL 变量所代表的内容（一个资源包）的含义更加清晰，而且还允许你在资源包键名中使用点号，例如 `#{text[''meta.description'']}`。因为
    EL 表达式 `#{text.meta.description}` 的含义完全不同：“获取 text 对象的嵌套 meta 属性的 description
    属性”，这是不正确的。


    ## 更改活动区域设置


    你也可以在服务器端更改活动区域设置。最好在包含 `<f:view>` 标签的站点级主模板中的单一位置进行此操作。活动区域设置可以在 `<f:view>` 的
    `locale` 属性中设置，该属性可以接受表示语言标签的静态字符串，也可以接受具体的 `java.util.Locale` 实例。`locale` 属性接受
    EL 表达式，并可以通过受管 bean 以编程方式更改。这为你提供了让用户通过网页更改区域设置的机会，而无需在浏览器的语言设置中手动调整。你可以在 JSF
    页面中向用户展示可用的语言选项，并让每次选择都更改活动区域设置。这可以通过以下 JSF 页面实现：


    ```

    <!DOCTYPE html>

    <html lang="#{activeLocale.languageTag}"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html">

        <f:view locale="#{activeLocale.current}">

            <h:head>

                <title>#{text[''title'']}</title>

            </h:head>

            <h:body>

                <h1>#{text[''heading'']}</h1>

                <p>#{text[''paragraph'']}</p>

                <h:form>

                    <h:selectOneMenu value="#{activeLocale.languageTag}">

                        <f:selectItems

                            value="#{activeLocale.available}" var="l"

                            itemValue="#{l.toLanguageTag()}"

                            itemLabel="#{l.getDisplayLanguage(l)}">

                        </f:selectItems>

                        <f:ajax listener="#{activeLocale.reload()}" />

                    </h:selectOneMenu>

                </h:form>

            </h:body>

        </f:view>

    </html>

    ```


    它与之前的示例略有不同；现在 `<f:view>` 包裹了 `<h:head>` 和 `<h:body>`。`<f:view>` 的 `locale` 属性通过
    `#{activeLocale}` 受管 bean 引用当前活动的区域设置，该 bean 如下所示：


    ```

    @Named @SessionScoped

    public class ActiveLocale implements Serializable {


    private Locale current;

        private List<Locale> available;


    @Inject

        private FacesContext context;


    @PostConstruct

        public void init() {

            Application app = context.getApplication();

            current = app.getViewHandler().calculateLocale(context);

            available = new ArrayList<>();

            available.add(app.getDefaultLocale());

            app.getSupportedLocales().forEachRemaining(available::add);

        }


    public void reload() {

            context.getPartialViewContext().getEvalScripts()

                .add("location.replace(location)");

        }


    public Locale getCurrent() {

            return current;

        }


    public String getLanguageTag() {

            return current.toLanguageTag();

        }


    public void setLanguageTag(String languageTag) {

            current = Locale.forLanguageTag(languageTag);

        }


    public List<Locale> getAvailable() {

            return available;

        }


    }

    ```


    需要重申的是，`@Inject FacesContext` 仅当你在 Web 应用程序的某个位置任意一个 CDI bean 上放置了 `@FacesConfig`
    注解时才有效。否则，你必须将其替换为内联的 `FacesContext.getCurrentInstance()` 调用。这些内联调用只有一个注意事项：你需要绝对确保不要在例如
    `@PostConstruct` 中将其赋值给一个字段，因为实际的实例在同一个 bean 实例的不同方法调用之间可能会发生变化。通过 CDI 将其作为字段注入可以透明地处理这个问题，因此是安全的，但手动赋值则不安全。


    在 `@PostConstruct` 中，使用 `ViewHandler#calculateLocale()` 根据 `Accept-Language` 请求头以及
    `faces-config.xml` 中配置的默认和支持的区域设置来计算当前区域设置。这与未定义 `<f:view locale>` 时的 JSF 内部行为完全相同。最后，根据配置的默认和支持的区域设置收集可用的区域设置。


    可用的区域设置通过 `<h:selectOneMenu>` 的 `<f:selectItems>` 以下拉选项的形式呈现给用户（参见图 14-1）。嵌套的
    `<f:ajax>` 确保一旦用户更改选项，所选选项就会立即在受管 bean 中设置。


    ![A454457_1_En_14_Fig1_HTML.jpg](img/A454457_1_En_14_Fig1_HTML.jpg)

