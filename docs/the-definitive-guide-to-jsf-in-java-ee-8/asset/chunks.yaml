    off\" />\n</form>\n```\n\n它在Web浏览器中没有可见的HTML渲染。在生成的脚本中，你会看到它生成了一个与`name`属性中指定的名称相同的函数变量。在这个例子中，它确实在全局作用域中。由于这在JavaScript上下文中被认为是不良实践（“全局命名空间污染”），你最好提供一个带命名空间的函数名。这仅要求你之前在HTML文档中的某处声明了自己的命名空间，通常是通过`<head>`元素中的JavaScript文件。以下示例使用内联脚本简化了这一点：\n\
    \n```\n<h:head>\n    ...\n    <script>var mynamespace = mynamespace || {};</script>\n\
    </h:head>\n<h:body>\n    <h:form id=\"form\">\n        <h:commandScript id=\"\
    submit\" name=\"mynamespace.invokeBeanSubmit\"\n            action=\"#{bean.submit}\"\
    >\n        </h:commandScript>\n    </h:form>\n</h:body>\n```\n\n回到生成的函数变量，你还会看到它接受一个对象参数，并将其作为Mojarra特定的`mojarra.ab()`函数最后一个对象参数的`params`属性传递。该辅助函数将在`mojarra.ab()`函数的底层准备并调用标准JSF\
    \ JavaScript API的`jsf.ajax.request()`函数。换句话说，你可以通过这种方式将JavaScript变量传递给受管Bean的动作方法。它们可以通过`@ManagedProperty`注入，就像使用`<f:param>`一样。以下示例演示了使用JavaScript对象中的硬编码变量进行JavaScript调用，但你当然可以从JavaScript上下文中的任何地方获取这些变量：\n\
    \n```\nvar params = {\n    id: 42,\n    name: \"John Doe\",\n    email: \"john.doe@example.com\"\
    \n};\ninvokeBeanSubmit(params);\n```\n\n后台Bean类：\n\n```\n@Inject @ManagedProperty(\"\
    #{param.id}\")\nprivate Integer id;\n\n@Inject @ManagedProperty(\"#{param.name}\"\
    )\nprivate String name;\n\n@Inject @ManagedProperty(\"#{param.email}\")\nprivate\
    \ String email;\n\npublic void submit() {\n    System.out.println(\"Submitted\
    \ ID: \" + id);\n    System.out.println(\"Submitted name: \" + name);\n    System.out.println(\"\
    Submitted email: \" + email);\n}\n```\n\n`<h:commandScript>`也可以用于将HTML文档的部分渲染推迟到窗口加载事件。要实现这一点，只需将`autorun`属性设置为`true`，并在`render`属性中指定目标组件的客户端ID。以下示例仅在页面在客户端完成加载时加载并渲染一个数据表。"
  raw: 'In Mojarra’s specific case, the mojarra.jsfcljs() function will be invoked
    with the parent form as the first argument, the command component’s client ID
    as a request parameter name and value as the second argument, and the target attribute
    of the <h:commandLink> as the third argument, if any. Under the hood of the mojarra.jsfcljs()
    function will create <input type="hidden"> elements for each name/value pair in
    the second argument and add them to the form provided as the first argument, making
    sure that those parameters end up a postback request. Then it will create a temporary
    <input type="submit"> button, add it to the form, and invoke the click() function
    on it, as if you would be using a regular submit button. Finally, it will remove
    all of those dynamically created elements from the form.


    This function is actually also used by the <h:commandButton>, but only when you
    need to pass additional request parameters via one or more <f:param> tags nested
    in the command component.


    ```

    <h:form id="form">

        ...


    <h:commandButton id="submit" value="Submit" action="#{bean.submit}">

            <f:param name="id" value="#{otherBean.id}" />

        </h:commandButton>

    </h:form>

    ```


    Generated HTML output:


    ```

    <form id="form" name="form" method="post" action="/project/test.xhtml"

        enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="form" value="form" />

        <script type="text/javascript"

            src="/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces">

        </script>

        <input id="form:submit" type="submit" name="form:submit"

            value="Submit" onclick="mojarra.jsfcljs(

                document.getElementById(''form''),

                {''form:submit'':''form:submit'',''id'':''42''},

                '''');return false" />

        <input type="hidden" name="javax.faces.ViewState"

            id="j_id1:javax.faces.ViewState:0"

            value="886811437739939021:6102567809374231851"

            autocomplete="off" />

    </form>

    ```


    Rendering in Chrome browser:


    ![A454457_1_En_4_Figk_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figk_HTML.jpg)


    You can obtain them in the managed bean via @Inject @ ManagedProperty.


    ```

    @Inject @ManagedProperty("#{param.id}")

    private Integer id;


    public void submit() {

        System.out.println("Submitted ID: " + id);

    }

    ```


    Make sure that you import the @ManagedProperty from the right package. JSF offers
    two, one from the javax.faces.bean package which is deprecated since JSF 2.3 and
    another one from javax.faces.annotation package which you should be using for
    CDI. You also need to make sure that you explicitly activate the JSF 2.3-specific
    feature of CDI-aware EL resolvers by having at least one managed bean in the web
    application explicitly annotated with @FacesConfig; otherwise the CDI-aware @ManagedProperty
    would fail to find the current instance of FacesContext via CDI. Also here, <h:commandButton>
    is substitutable with <h:commandLink>.


    There’s another way of passing parameters around via command components—that is,
    by simply passing them as an action method argument .


    ```

    <h:form id="form">

        ...


    <h:commandButton id="submit" value="Submit"

            action="#{bean.submit(otherBean.id)}">

        </h:commandButton>

    </h:form>

    ```


    Whereby the modified action method looks as follows:


    ```

    public void submit(Integer id) {

        System.out.println("Submitted ID: " + id);

    }

    ```


    In case of the <h:commandButton>, this won’t generate any JavaScript and it thus
    looks identical as when you aren’t using any action method arguments . This thus
    also means that the #{otherBean.id} value isn’t passed via HTML source code back
    to the server as a request parameter. This in turn means that it’s only evaluated
    during the postback request when JSF is about to invoke the action method. This
    in turn means that the #{otherBean.id} must at least be @ViewScoped in order to
    be still available in the postback request. In other words, this argument passing
    approach is definitely not exchangeable with the <f:param> tag approach whereby
    both beans can be just @RequestScoped.


    The last command component offered by the standard JSF component set is <h:commandScript>.
    This is new since JSF 2.3\. It allows you to invoke a managed bean action method
    by just calling a named JavaScript function from your own script. The postback
    request will always be performed via Ajax.


    ```

    <h:form id="form">

        <h:commandScript id="submit" name="invokeBeanSubmit"

            action="#{bean.submit}">

        </h:commandScript>

    </h:form>

    ```


    Generated HTML output:


    ```

    <form id="form" name="form" method="post" action="/project/test.xhtml"

        enctype="application/x-www-form-urlencoded">

        <input type="hidden" name="form" value="form" />

        <script type="text/javascript"

            src="/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces">

        </script>

        <span id="form:submit">

            <script type="text/javascript">

                var invokeBeanSubmit = function(o) {

                    var o = (typeof o===''object'') && o ? o : {};

                    mojarra.ab(''form:submit'',null,''action'',0,0,{''params'':o});

                }

            </script>

        </span>

        <input type="hidden" name="javax.faces.ViewState"

            id="j_id1:javax.faces.ViewState:0"

            value="3568384626727188032:3956762118801488231"

            autocomplete="off" />

    </form>

    ```


    It has no visible HTML rendering in web browsers. In the generated script, you’ll
    see that it has generated a function variable with the same name as specified
    in the name attribute. In this example, it’s indeed in the global scope. As this
    is considered poor practice in the JavaScript context (“global namespace pollution”),
    you’d better provide a namespaced function name. This only pre-requires that you’ve
    already declared your own namespace somewhere before in the HTML document, usually
    via a JavaScript file in the <head> element. The following example simplifies
    it with an inline script:


    ```

    <h:head>

        ...

        <script>var mynamespace = mynamespace || {};</script>

    </h:head>

    <h:body>

        <h:form id="form">

            <h:commandScript id="submit" name="mynamespace.invokeBeanSubmit"

                action="#{bean.submit}">

            </h:commandScript>

        </h:form>

    </h:body>

    ```


    Coming back to the generated function variable, you’ll also see that it accepts
    an object argument and passes it through as “params” property of the last object
    argument of the Mojarra-specific mojarra.ab() function. That helper function will,
    under the hood of the mojarra.ab() function, prepare and invoke the jsf.ajax.request()
    function of the standard JSF JavaScript API. In other words, you can pass JavaScript
    variables to a managed bean action method this way. They are injectable via @ManagedProperty
    the same way as if you were using <f:param>. The following example demonstrates
    the JavaScript call with hard-coded variables in a JavaScript object, but you
    can of course obtain those variables from anywhere else in JavaScript context:


    ```

    var params = {

        id: 42,

        name: "John Doe",

        email: "john.doe@example.com"

    };

    invokeBeanSubmit(params);

    ```


    Backing bean class:


    ```

    @Inject @ManagedProperty("#{param.id}")

    private Integer id;


    @Inject @ManagedProperty("#{param.name}")

    private String name;


    @Inject @ManagedProperty("#{param.email}")

    private String email;


    public void submit() {

        System.out.println("Submitted ID: " + id);

        System.out.println("Submitted name: " + name);

        System.out.println("Submitted email: " + email);

    }

    ```


    The <h:commandScript> can also be used to defer the partial rendering of an HTML
    document to the window load event. To achieve this, simply set the autorun attribute
    to true and specify the client ID of the target component in the render attribute.
    The following example loads and renders a data table only when the page has finished
    loading in the client side:'
