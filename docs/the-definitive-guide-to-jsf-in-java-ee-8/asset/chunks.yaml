  raw: 'The targets attribute must define a space-separated collection of IDs of target
    UIInput components resembling the composite component on which you would like
    to trigger the Ajax event, and the event attribute must define the desired event
    name to be actually triggered on the target UIInput components. In other words,
    this does, under the hood, effectively the same as if the following is implemented
    in the composite component:


    ```

    <h:selectOneMenu id="hour" ...>

        <f:ajax event="change" ... />

    </h:selectOneMenu>

    <h:selectOneMenu id="minute" ...>

        <f:ajax event="change" ... />

    </h:selectOneMenu>

    ```


    In this specific example, the event attribute coincidentally has just the same
    value as the name attribute. This is perhaps confusing at first, but it allows
    you to easily define a custom event name. For example, following is the code to
    use when you want to trigger an event solely on the change of the hour drop-down:


    ```

    <cc:interface ...>

        ...

        <cc:clientBehavior name="hourChange"

            targets="hour" event="change">

        </cc:clientBehavior>

    </cc:interface>

    ```


    With this, the following Ajax listener will thus be fired only when the hour drop-down
    is changed and not when the minute drop-down is changed.


    ```

    <t:inputLocalTime id="time" ...>

        <f:ajax event="hourChange" execute="time"

            listener="#{bean.hourChanged}">

        </f:ajax>

    </t:inputLocalTime>

    ```


    Note that execute="time" is consistently explicitly specified in the given examples.
    This is because the default of execute="@this" still does not, in the current
    JSF 2.3 version, work correctly within the context of the composite component
    implementation. JSF could have derived the target components from any <cc:clientBehavior
    default="true">, but it isn’t specified as such yet.


    All in all, it must be said that composite components have been overhyped after
    they were first introduced in JSF 2.0\. People started using them to “composite”
    whole templates, includes, decorations, and even multiple tags, without using
    any backing component. That is, the zero-configuration nature as compared to tag
    files is very attractive. Everything is declared in the composite component file
    itself via <cc:interface>. And they can be directly used in the template client
    just by following a convention without the need to configure it in some XML file.


    The caveat is that composite components are, due to their internal design, relatively
    expensive during building and restoring the view as compared to plain include
    files, decorate files, and tag files, especially when deeply nested. The best
    practice is therefore to use them only if you actually need a backing component
    via <cc:interface componentType>. For any other case, just use an include, a decorate,
    or a tag file instead. In the previous section you may already have learned that
    tag files can be quite powerful with help of JSTL.


    ### Recursive Composite Component


    You can safely nest composite components in each other. However, when you nest
    the very same composite component recursively in itself, then it would fail with
    a stack overflow error when EL attempts to resolve the concrete composite component
    instance behind #{cc}.[⁵](#A454457_1_En_7_Chapter.xhtml#Fn5)


    Imagine that you’ve got a recursive tree model which represents some sort of discussion
    thread, such as e-mail messages and all their replies, or blog comments and all
    their replies, whereby each reply can in turn have another set of replies. This
    can be represented as a single JPA entity as follows:


    ```

    @Entity

    public class Message {


    @Id @GeneratedValue(strategy=IDENTITY)

        private Long id;


    @Lob

        @Column(nullable = false)

        private @NotNull String text;


    @ManyToOne

        private Message replyTo;


    @OneToMany(mappedBy = "replyTo")

        private List<Message> replies = Collections.emptyList();


    // Add/generate remaining getters and setters.

    }

    ```


    Note that the replyTo property represents the parent message which the current
    message is a reply to, and that the replies property represents all replies to
    the current message. The tree structure can then be queried as follows in a MessageService:


    ```

    public List<Message> tree() {

        return entityManager.createQuery(

            "SELECT DISTINCT m FROM Message m"

                + " LEFT JOIN FETCH m.replies r"

                + " ORDER BY m.id ASC", Message.class)

            .getResultList().stream()

            .filter(m -> m.getReplyTo() == null)

            .collect(toList());

    }

    ```


    Note that the filtering of the result list afterward is at first glance inefficient,
    but in reality every single message is retrieved only once and simply referenced
    in the replies property.


    Now, you’d intuitively implement the <t:message> composite component as something
    like the following:


    ```

    <cc:interface>

        <cc:attribute name="value" type="com.example.Message" />

    </cc:interface>

    <cc:implementation>

        #{cc.attrs.value.text}

        <c:if test="#{not empty cc.attrs.value.replies}">

            <ul>

                <c:forEach items="#{cc.attrs.value.replies}" var="reply">

                    <li>

                        <t:message value="#{reply}" />

                    </li>

                </c:forEach>

            </ul>

        </c:if>

    </cc:implementation>

    ```


    which is in turn used as follows:


    ```

    <c:forEach items="#{messages.tree}" var="message">

        <t:message value="#{message}" />

    </c:forEach>

    ```


    You’ll perhaps only wonder why <c:forEach> is being used instead of <ui:repeat>.
    The explanation is relatively simple: <ui:repeat> is ignored during view build
    time. In other words, <t:message> would include itself in an infinite loop. If
    you need to remember the why and how, head back to the section “JSTL Core Tags”
    in Chapter [3](#A454457_1_En_3_Chapter.xhtml).


    But even with the above implementation you would still run into an infinite loop.
    You know that #{cc} references the current instance of the composite component.
    Under the hood, when #{reply} is passed to the nested composite, then in reality
    a reference to #{cc.attrs.value.replies[index]} is being passed. This is, on its
    own, no problem. But when the nested composite in turn evaluates the #{cc} part
    from this alias, then it would reference itself instead of the parent composite.
    Hence, the infinite loop.


    Theoretically, you could solve this by replacing #{cc} with #{cc.parent} which
    returns UIComponent#getParent().


    ```

    <c:forEach items="#{cc.attrs.value.replies}" varStatus="loop">

        ...

        <t:message value="#{cc.parent.attrs.value.replies[loop.index]}" />

        ...

    </c:forEach>

    ```'
