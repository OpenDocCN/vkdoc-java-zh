    </ui:composition>

    ```


    现在，这真是极大的灵活性！在标签文件客户端中，你可以使用 `<ui:define name="beforeLabel">` 来定义一些应在字段标签之前显示的内容。你也可以使用
    `<ui:define name="label">` 来完全覆盖标签。你还可以使用 `<ui:define name="insideLabel">` 在标签内部追加一些（HTML）内容，以此类推。下面的示例演示了如何使用
    `insideLabel` 在密码字段的标签后追加一个“忘记密码？”链接：


    ```

    <t:field ...>

        <ui:define name="insideLabel">

            <h:link outcome="/reset-password" value="忘记密码？" />

        </ui:define>

    </t:field>

    ```


    请注意，`<ui:insert name="insideLabel">` 被包裹在一个 HTML `<span>` 标签中。这让你能够更轻松地通过 CSS
    选择最终出现在该位置上的“任何内容”，例如，你可以仅通过 `.field label > span { float: right; }` 让其中的内容向右浮动。


    标签文件客户端中任何不属于 `<ui:define>` 的内容，最终都会进入所选输入组件内部的无名 `<ui:insert>` 标签中。这让你能够轻松地为该输入组件嵌套任何特定的
    `<f:xxx>` 核心标签：


    ```

    <t:field ...>

        <f:attribute name="onkeypress" value="return event.key != ''Enter''" />

        <f:validateRegex pattern="[0-9]{4}" />

        <f:ajax render="otherField" />

    </t:field>

    ```


    这个具体示例通过当 `KeyboardEvent.key` 等于“Enter”时返回 `false`，阻止了表单在按下*回车*键时提交；同时注册了一个正则表达式验证器，通过匹配正则表达式模式
    `[0-9]{4}` 来仅接受四位数字的值；并指示 JSF 在值变更事件发生时，通过 Ajax 更新由“otherField”标识的组件。


    回到 `/WEB-INF/tags/field.xhtml` 中的标签文件实现，你可能已经注意到，这里使用的是老牌的 JSTL，而不是 JSF 自身的 `rendered`
    属性。这样做有优势，因为 JSTL 的生命周期与 JSF UI 组件不同。JSTL 在 JSF 组件树即将构建时（即视图构建阶段）执行。而 JSF 组件则在即将生成
    HTML 输出时（即视图渲染阶段）执行。此外，如果你使用 JSF 自身的 `rendered` 属性，那么由于多个具有相同 ID 的组件会物理上存在于 JSF
    组件树中，你将面临“重复组件 ID”的错误。


    如果你正在考虑使用纯 Java 代码，基于至少一个视图作用域的模型来动态创建组件树，那么你绝对应该重新考虑，转而使用 JSTL。由于 JSTL 本身也是基于
    XML 的，因此你可以将所有内容整合到一个 XHTML 文件中，最终你将获得可读性和可维护性都更好的“动态”组件代码。

