    \ type=\"hidden\">`元素，并将它们添加到作为第一个参数提供的表单中，确保这些参数最终出现在回发请求中。然后，它会创建一个临时的`<input\
    \ type=\"submit\">`按钮，将其添加到表单中，并调用其`click()`函数，就像使用常规提交按钮一样。最后，它会从表单中移除所有动态创建的元素。\n\
    \n这个函数实际上也被`<h:commandButton>`使用，但仅当需要通过嵌套在命令组件中的一个或多个`<f:param>`标签传递额外的请求参数时。\n\
    \n```\n<h:form id=\"form\">\n    ...\n\n<h:commandButton id=\"submit\" value=\"\
    Submit\" action=\"#{bean.submit}\">\n        <f:param name=\"id\" value=\"#{otherBean.id}\"\
    \ />\n    </h:commandButton>\n</h:form>\n```\n\n生成的HTML输出：\n\n```\n<form id=\"\
    form\" name=\"form\" method=\"post\" action=\"/project/test.xhtml\"\n    enctype=\"\
    application/x-www-form-urlencoded\">\n    <input type=\"hidden\" name=\"form\"\
    \ value=\"form\" />\n    <script type=\"text/javascript\"\n        src=\"/project/javax.faces.resource/jsf.js.xhtml?ln=javax.faces\"\
    >\n    </script>\n    <input id=\"form:submit\" type=\"submit\" name=\"form:submit\"\
    \n        value=\"Submit\" onclick=\"mojarra.jsfcljs(\n            document.getElementById('form'),\n\
    \            {'form:submit':'form:submit','id':'42'},\n            '');return\
    \ false\" />\n    <input type=\"hidden\" name=\"javax.faces.ViewState\"\n    \
    \    id=\"j_id1:javax.faces.ViewState:0\"\n        value=\"886811437739939021:6102567809374231851\"\
    \n        autocomplete=\"off\" />\n</form>\n```\n\n在Chrome浏览器中的渲染效果：\n\n![A454457_1_En_4_Figk_HTML.jpg](OEBPS/Images/A454457_1_En_4_Figk_HTML.jpg)\n\
    \n你可以在受管Bean中通过`@Inject @ManagedProperty`获取它们。\n\n```\n@Inject @ManagedProperty(\"\
    #{param.id}\")\nprivate Integer id;\n\npublic void submit() {\n    System.out.println(\"\
    Submitted ID: \" + id);\n}\n```\n\n确保从正确的包中导入`@ManagedProperty`。JSF提供了两个：一个来自`javax.faces.bean`包（自JSF\
    \ 2.3起已弃用），另一个来自`javax.faces.annotation`包（你应该为CDI使用这个）。你还需要确保通过至少在Web应用程序中显式使用`@FacesConfig`注解一个受管Bean，来显式激活JSF\
    \ 2.3特定的CDI感知EL解析器功能；否则，CDI感知的`@ManagedProperty`将无法通过CDI找到`FacesContext`的当前实例。同样，`<h:commandButton>`可以替换为`<h:commandLink>`。\n\
    \n还有另一种通过命令组件传递参数的方式——即，直接将它们作为动作方法参数传递。\n\n```\n<h:form id=\"form\">\n    ...\n\
    \n<h:commandButton id=\"submit\" value=\"Submit\"\n        action=\"#{bean.submit(otherBean.id)}\"\
    >\n    </h:commandButton>\n</h:form>\n```\n\n修改后的动作方法如下所示：\n\n```\npublic void\
    \ submit(Integer id) {\n    System.out.println(\"Submitted ID: \" + id);\n}\n\
    ```\n\n对于`<h:commandButton>`，这不会生成任何JavaScript，因此它看起来与不使用任何动作方法参数时完全相同。这也就意味着`#{otherBean.id}`值不会通过HTML源代码作为请求参数传递回服务器。这反过来意味着它仅在JSF即将调用动作方法时的回发请求期间被评估。这又意味着`#{otherBean.id}`至少必须是`@ViewScoped`，以便在回发请求中仍然可用。换句话说，这种参数传递方法绝对不能与`<f:param>`标签方法互换，后者中两个Bean都可以只是`@RequestScoped`。\n\
