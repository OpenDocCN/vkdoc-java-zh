    \n```\n<h:form id=\"form\">\n    <h:commandScript id=\"submit\" name=\"invokeBeanSubmit\"\
    \n        action=\"#{bean.submit}\">\n    </h:commandScript>\n</h:form>\n```\n\
    \n生成的HTML输出：\n\n```\n<form id=\"form\" name=\"form\" method=\"post\" action=\"\
