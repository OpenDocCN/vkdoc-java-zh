    }\n```\n\nDo note that `<f:validateWholeBean>` is explicitly placed as the last\
    \ child of the parent `<h:form>`, which ensures that the validation is performed\
    \ as the last thing after all individual input components in the same form. This\
    \ is as per the specification; the JSF implementation may throw a runtime exception\
    \ when the tag is misplaced.\n\n## Immediate Attribute\n\nThe `EditableValueHolder`,\
    \ `ActionSource`, and `AjaxBehavior` interfaces also specify an `immediate` property\
    \ which basically maps to the `immediate` attribute of all `UIInput` and `UICommand`\
    \ components and the `<f:ajax>` tag. When set to `true` on an `EditableValueHolder`\
