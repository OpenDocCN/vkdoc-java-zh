- fmt: "# Custom Constraints\n\nWhile not part of the JSF, for the sake of completeness\
    \ we’d like to show another example of a custom Bean Validation constraint. An\
    \ earlier example was already given in the section about `<f:validateWholeBean>`.\
    \ The Bean Validation API already offers a lot of existing constraints out of\
    \ the box which you can find in the `javax.validation.constraints` package. A\
    \ lot of new constraints have been added in Bean Validation 2.0, also part of\
    \ Java EE 8 like JSF 2.3, such as `@Email`.\n\nMost common use cases for a custom\
    \ Bean Validation constraint are related to localized patterns. Think of phone\
    \ numbers, zip codes, bank account numbers, and passwords. Of course, most of\
    \ those could be done with just a `@Pattern`, but this may end up in less self-documenting\
    \ code, particularly if the desired pattern is relatively complex.\n\nFollowing\
    \ is an example of a custom `@Phone` constraint which should match as many as\
    \ possible internationally known phone numbers:\n\n```\n@Constraint(validatedBy=PhoneValidator.class)\n\
    @Target(FIELD)\n@Retention(RUNTIME)\npublic @interface Phone {\n    String message()\
    \ default \"Invalid phone number\";\n    Class<?>[] groups() default {};\n   \
    \ Class<?>[] payload() default {};\n}\n```\n\nAnd here’s the associated `PhoneValidator`:\n\
    \n```\npublic class PhoneValidator\n    implements ConstraintValidator<Phone,\
    \ String>\n{\n    private static final Pattern SPECIAL_CHARS =\n        Pattern.compile(\"\
    [\\\\s().+-]|ext\", Pattern.CASE_INSENSITIVE);\n    private static final Pattern\
    \ DIGITS =\n        Pattern.compile(\"[0-9]{7,15}\");\n\n    @Override\n    public\
    \ boolean isValid\n        (String phone, ConstraintValidatorContext context)\n\
    \    {\n        if (phone == null || phone.isEmpty()) {\n            return true;\
    \ // Let @NotNull/@NotEmpty handle this.\n        }\n\n        return isValid(phone);\n\
    \    }\n\n    public static boolean isValid(String phone) {\n        String digits\
    \ = SPECIAL_CHARS.matcher(phone).replaceAll(\"\");\n        return DIGITS.matcher(digits).matches();\n\
    \    }\n}\n```\n\nIn order to activate it, simply annotate the associated entity\
    \ property.\n\n```\n@Phone\nprivate String phone;\n```\n\nThis will be triggered\
    \ on both the JSF and JPA sides: in JSF, during the process validations phase\
    \ (third phase); in JPA during the persist and merge. As noted in the `<f:validateBean>`/`<f:validateWholeBean>`\
    \ section, it can be disabled on both sides.\n\n# Custom Messages\n\nConversion\
    \ and validation error messages coming from JSF as well as Bean Validation are\
    \ fully customizable. Application-wide, they can be customized by supplying a\
    \ properties file which specifies the desired message as the value of a predefined\
    \ key. You can find predefined keys for JSF conversion and validation messages\
    \ in Chapter 2.5.2.4, “Localized Application Messages,” of the JSF 2.3 specification.\
    \ You can find predefined keys for Bean Validation messages in Appendix B, “Standard\
    \ ResourceBundle Messages,” of the Bean Validation 2.0 specification. For JSF,\
    \ the fully qualified name of the properties file must be registered as `<message-bundle>`\
    \ in `faces-config.xml`. For Bean Validation, the exact fully qualified name of\
    \ the properties file is `ValidationMessages`.\n\nAs an example, we’re going to\
    \ modify the default message of the JSF `required=\"true\"` validation and the\
    \ Bean Validation `@NotNull` constraint.\n\n```\nmain/java/resources/com/example/project/i18n/messages.properties\n\
    javax.faces.component.UIInput.REQUIRED = {0} is required.\njavax.faces.validator.BeanValidator.MESSAGE\
    \ = {1} {0}\nmain/java/resources/ValidationMessages.properties\njavax.validation.constraints.NotNull.message\
    \ = is required.\n```\n\nNote the absence of the label placeholder in the Bean\
    \ Validation message. Instead, the `{1}` of the `javax.faces.validator.BeanValidator.MESSAGE`\
    \ represents the label associated with the JSF component and `{0}` represents\
    \ the Bean Validation message. The custom Bean Validation message bundle file\
    \ is already automatically picked up. The custom JSF message bundle file needs\
    \ to be explicitly registered in the `faces-config.xml` first.\n\n```\n<application>\n\
    \    <message-bundle>com.example.project.i18n.messages</message-bundle>\n</application>\n\
    ```\n\nWith those properties files in place, the following input components will\
    \ thus show exactly the same validation error message:\n\n```\n<h:inputText id=\"\
    field\" label=\"First input\"\n    value=\"#{bean.field}\" required=\"true\">\n\
    </h:inputText>\n<h:message for=\"field\" />\n\n<h:inputText id=\"notNullField\"\
    \ label=\"Second input\"\n    value=\"#{bean.notNullField}\">\n</h:inputText>\n\
    <h:message for=\"notNullField\" />\n```\n\nIn case you want to fine-grain the\
    \ message on a per-component basis, you can use the `converterMessage`, `validatorMessage`,\
    \ and/or `requiredMessage` attribute of the `UIInput` component. The `converterMessage`\
    \ will be displayed on any conversion error.\n\n```\n<h:inputText value=\"#{bean.localDate}\"\
    \n    converterMessage=\"Please enter date in pattern YYYY-MM-DD.\">\n    <f:convertLocalDate\
    \ type=\"localDate\" pattern=\"yyyy-MM-dd\" />\n</h:inputText>\n```\n\nThe `validatorMessage`\
    \ will be displayed on any validation error, as well as those triggered by Bean\
    \ Validation.\n\n```\n<h:inputText value=\"#{bean.dutchZipCode}\" required=\"\
    true\"\n    validatorMessage=\"Please enter zip code in pattern 1234AB.\">\n \
    \   <f:validateRegex pattern=\"[0-9]{4}[A-Z]{2}\" />\n</h:inputText>\n```\n\n\
    Note that this won’t be shown when `required=\"true\"` isn’t satisfied. For that,\
    \ you need to use `requiredMessage` instead.\n\n```\n<h:inputText value=\"#{bean.dutchZipCode}\"\
    \ required=\"true\"\n    requiredMessage=\"Please enter zip code.\"\n    validatorMessage=\"\
    Please enter zip code in pattern 1234AB.\">\n    <f:validateRegex pattern=\"[0-9]{4}[A-Z]{2}\"\
    \ />\n</h:inputText>\n```\n\nNote that this won’t be shown for any Bean Validation\
    \ `@NotNull`. You should then use `validatorMessage` instead."
  raw: '## Custom Constraints


    While not part of the JSF, for the sake of completeness we’d like to show another
    example of a custom Bean Validation constraint . An earlier example was already
    given in the section about <f:validateWholeBean>. The Bean Validation API already
    offers a lot of existing constraints out of the box which you can find in the
    javax.validation.constraints package.[^(25)](#A454457_1_En_5_Chapter.xhtml#Fn25)
    A lot of new constraints have been added in Bean Validation 2.0, also part of
    Java EE 8 like JSF 2.3, such as @Email.


    Most common use cases for a custom Bean Validation constraint are related to localized
    patterns. Think of phone numbers, zip codes, bank account numbers, and passwords.
    Of course, most of those could be done with just a @Pattern, but this may end
    up in less self-documenting code , particularly if the desired pattern is relatively
    complex.


    Following is an example of a custom @Phone constraint which should match as many
    as possible internationally known phone numbers:


    ```

    @Constraint(validatedBy=PhoneValidator.class)

    @Target(FIELD)

    @Retention(RUNTIME)

    public @interface Phone {

        String message() default "Invalid phone number";

        Class<?>[] groups() default {};

        Class<?>[] payload() default {};

    }

    ```


    And here’s the associated PhoneValidator:


    ```

    public class PhoneValidator

        implements ConstraintValidator<Phone, String>

    {

        private static final Pattern SPECIAL_CHARS =

            Pattern.compile("[\\s().+-]|ext", Pattern.CASE_INSENSITIVE);

        private static final Pattern DIGITS =

            Pattern.compile("[0-9]{7,15}");


        @Override

        public boolean isValid

            (String phone, ConstraintValidatorContext context)

        {

            if (phone == null || phone.isEmpty()) {

                return true; // Let @NotNull/@NotEmpty handle this.

            }


            return isValid(phone);

        }


        public static boolean isValid(String phone) {

            String digits = SPECIAL_CHARS.matcher(phone).replaceAll("");

            return DIGITS.matcher(digits).matches();

        }

    }

    ```


    In order to activate it, simply annotate the associated entity property.


    ```

    @Phone

    private String phone;

    ```


    This will be triggered on both the JSF and JPA sides: in JSF, during the process
    validations phase (third phase); in JPA during the persist and merge. As noted
    in the <f:validateBean>/<f:validateWholeBean> section, it can be disabled on both
    sides.


    ## Custom Messages


    Conversion and validation error messages coming from JSF as well as Bean Validation
    are fully customizable. Application-wide, they can be customized by supplying
    a properties file which specifies the desired message as the value of a predefined
    key. You can find predefined keys for JSF conversion and validation messages in
    Chapter 2.5.2.4, “Localized Application Messages,” of the JSF 2.3 specification.[^(26)](#A454457_1_En_5_Chapter.xhtml#Fn26)
    You can find predefined keys for Bean Validation messages in Appendix B, “Standard
    ResourceBundle Messages,” of the Bean Validation 2.0 specification.[^(27)](#A454457_1_En_5_Chapter.xhtml#Fn27)
    For JSF, the fully qualified name of the properties file must be registered as
    <message-bundle> in faces-config.xml. For Bean Validation, the exact fully qualified
    name of the properties file is ValidationMessages.


    As an example, we’re going to modify the default message of the JSF required="true"
    validation and the Bean Validation @NotNull constraint.


    ```

    main/java/resources/com/example/project/i18n/messages.properties

    javax.faces.component.UIInput.REQUIRED = {0} is required.

    javax.faces.validator.BeanValidator.MESSAGE = {1} {0}

    main/java/resources/ValidationMessages.properties

    javax.validation.constraints.NotNull.message = is required.

    ```


    Note the absence of the label placeholder in the Bean Validation message. Instead,
    the {1} of the javax.faces.validator.BeanValidator.MESSAGE represents the label
    associated with the JSF component and {0} represents the Bean Validation message.
    The custom Bean Validation message bundle file is already automatically picked
    up. The custom JSF message bundle file needs to be explicitly registered in the
    faces-config.xml first.


    ```

    <application>

        <message-bundle>com.example.project.i18n.messages</message-bundle>

    </application>

    ```


    With those properties files in place, the following input components will thus
    show exactly the same validation error message:


    ```

    <h:inputText id="field" label="First input"

        value="#{bean.field}" required="true">

    </h:inputText>

    <h:message for="field" />


    <h:inputText id="notNullField" label="Second input"

        value="#{bean.notNullField}">

    </h:inputText>

    <h:message for="notNullField" />

    ```


    In case you want to fine-grain the message on a per-component basis, you can use
    the converterMessage, validatorMessage, and/or requiredMessage attribute of the
    UIInput component. The converterMessage will be displayed on any conversion error
    .


    ```

    <h:inputText value="#{bean.localDate}"

        converterMessage="Please enter date in pattern YYYY-MM-DD.">

        <f:convertLocalDate type="localDate" pattern="yyyy-MM-dd" />

    </h:inputText>

    ```


    The validatorMessage will be displayed on any validation error, as well as those
    triggered by Bean Validation.


    ```

    <h:inputText value="#{bean.dutchZipCode}" required="true"

        validatorMessage="Please enter zip code in pattern 1234AB.">

        <f:validateRegex pattern="[0-9]{4}[A-Z]{2}" />

    </h:inputText>

    ```


    Note that this won’t be shown when required="true" isn’t satisfied. For that,
    you need to use requiredMessage instead.


    ```

    <h:inputText value="#{bean.dutchZipCode}" required="true"

        requiredMessage="Please enter zip code."

        validatorMessage="Please enter zip code in pattern 1234AB.">

        <f:validateRegex pattern="[0-9]{4}[A-Z]{2}" />

    </h:inputText>

    ```


    Note that this won’t be shown for any Bean Validation @NotNull. You should then
    use validatorMessage instead.'
