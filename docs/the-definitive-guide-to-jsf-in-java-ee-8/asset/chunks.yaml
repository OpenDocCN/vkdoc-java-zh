  trans: "\n## 全站推送通知\n\n为此，你可以使用一个应用程序作用域的套接字。这种套接字对于由 Web 应用程序本身在某个可能对所有应用程序用户感兴趣的事件上触发的应用程序级反馈消息特别有用。可以想象一下全站统计、实时列表、股票更新等场景。以下示例展示了一个实时前十名列表的情况：\n\
    \n```\n<h:dataTable id=\"top10\" value=\"#{bean.top10}\" var=\"item\">\n    <h:column>#{item.ranking}</h:column>\n\
        <h:column>#{item.name}</h:column>\n    <h:column>#{item.score}</h:column>\n\
    </h:dataTable>\n<h:form>\n    <f:websocket channel=\"top10Observer\">\n        <f:ajax\
    \ event=\"updated\" render=\":top10\" />\n    </f:websocket>\n</h:form>\n```\n\
    \n以下是服务类的样子，借助了 CDI 事件的一点帮助。\n\n```\n@Stateless\npublic class ItemService {\n\n\
        @Inject\n    private EntityManager entityManager;\n\n    @Inject\n    private\
    \ BeanManager beanManager;\n\n    public void update(Item item) {\n        List<Item>\
    \ previousTop10 = getTop10();\n        entityManager.merge(item);\n        List<Item>\
    \ currentTop10 = getTop10();\n\n        if (!currentTop10.equals(previousTop10))\
    \ {\n            beanManager.fireEvent(new Top10UpdatedEvent());\n        }\n\
        }\n\n    pulic List<Item> getTop10() {\n        return entityManager\n            .createNamedQuery(\"\
    Item.top10\", Item.class)\n            .getResultList();\n    }\n}\n```\n\n请注意，在这个特定示例中，`Top10UpdatedEvent`\
    \ 基本上只是一个空类，比如 `public class Top10UpdatedEvent {}`。另外请注意，我们这里没有注入 `PushContext`。否则这会被认为是层之间的紧耦合。所有与\
    \ JSF 相关的代码都属于前端，而不是后端。这样，后端服务类就能更好地在各种前端框架（除了 JSF，例如 JAX-RS 甚至普通的 JSP/Servlet）中重用。换句话说，你应该确保你的后端类不会直接或间接地使用任何前端特定的类，例如来自\
    \ `javax.faces.*`、`javax.ws.*` 和 `javax.servlet.*` 包的类。\n\n任何通过 `BeanManager#fireEvent()`\
    \ 方法触发的事件都可以使用 CDI 的 `@Observes` 注解进行观察。这适用于所有层。换句话说，即使事件在后端触发，你也可以在前端观察到它。唯一的要求是支持\
    \ bean 必须是 `@ApplicationScoped` 的。也就是说，在那一刻，不一定存在任何 HTTP 请求、HTTP 会话或 JSF 视图。\n\
    \n```\n@Named @ApplicationScoped\npublic class Bean {\n\n    private List<Item>\
    \ top10;\n\n    @Inject\n    private ItemService service;\n\n    @Inject @Push\n\
        private PushContext top10Observer;\n\n    @PostConstruct\n    public void\
    \ load() {\n        top10 = service.getTop10();\n    }\n\n    public void onTop10Updated(@Observes\
    \ Top10UpdatedEvent event) {\n        load();\n        top10Observer.send(\"updated\"\
    );\n    }\n\n    public List<Item> getTop10() {                              \
    \                            \n        return top10;\n    }\n}\n```\n\n## 跟踪活跃的套接字\n\
    \n为了跟踪活跃的套接字，你可以在一个应用程序作用域的 bean 中观察 `@WebsocketEvent.Opened` 和 `@WebsocketEvent.Closed`\
    \ 事件。以下示例假设你有一个 `<f:websocket channel=\"chat\" user=\"...\">`，并且你打算收集“活跃的聊天用户”：\n\
    \n```\n@ApplicationScoped\npublic class WebsocketEventObserver {\n\n    private\
    \ Map<Serializable, AtomicInteger> users;\n\n    @PostConstruct\n    public void\
    \ init() {\n        users = new ConcurrentHashMap<>();\n    }\n\n    public void\
    \ onopen(@Observes @Opened WebsocketEvent event) {\n        if (\"chat\".equals(event.getChannel()))\
    \ {\n            getCounter(event.getUser()).incrementAndGet();\n        }\n    }\n\
    \n    public void onclose(@Observes @Closed WebsocketEvent event) {\n        if\
    \ (\"chat\".equals(event.getChannel())) {\n            getCounter(event.getUser()).decrementAndGet();\n\
            }\n    }\n\n    private AtomicInteger getCounter(Serializable user) {\n\
            return users.computeIfAbsent(user, k -> new AtomicInteger());\n    }\n\
    \n    public Set<Serializable> getActiveUsers() {\n        return users.entrySet().stream()\n\
                .filter(entry -> entry.getValue().intValue() > 0)\n            .map(entry\
    \ -> entry.getKey())\n            .collect(Collectors.toSet());\n    }\n}\n```\n\
    \n你可以使用上面的 `getActiveUsers()` 方法来获取一组“活跃的聊天用户”。请注意，单个用户可以在同一个会话中多次打开同一个网页（例如，多个浏览器标签页），这正是为什么使用计数器而不是简单地从\
    \ Set 中添加和删除用户的原因。\n\n## 检测会话和视图过期\n\n默认情况下，只要文档保持打开状态，`<f:websocket>` 标签就会保持连接永久打开——当然，前提是没有设置\
    \ `connected=\"false\"`，或者没有调用 `jsf.push.close(clientId)`。当第一次连接尝试失败时，它会立即报告一个错误。你可以选择使用\
    \ `onclose` 属性来引用一个充当关闭监听器的 JavaScript 函数。\n\n```\n<f:websocket ... onclose=\"\
    logClose\" />\n\n<script>\n    function logClose(code, channel, event) {\n        if\
    \ (code == -1) {\n            // 客户端不支持 WebSocket API。例如 IE9。\n        }\n        else\
    \ if (code == 1000) {\n            // 由于视图或会话过期导致的正常关闭。\n        }\n        else\
    \ {\n            // 由于客户端或服务器错误导致的异常关闭。\n        }\n    }\n</script>\n```\n\n\
    该 JavaScript 函数将被调用并传入三个参数。\n\n1.  `code`：作为整数的关闭原因代码。如果为 -1，则表示客户端根本不支持 WebSocket\
    \ JavaScript API³。如果为 1000，则表示由于服务器端的视图或会话过期而发生了正常关闭。\n\n2.  `channel`：WebSocket\
    \ 通道名称。如果你打算使用全局监听器，这可能会很有用。\n\n3.  `event`：原始的 `CloseEvent` 对象。如果你打算在 JavaScript\
    \ 函数中检查它，这可能会很有用。\n\n当第一次连接尝试成功，但后来由于某种原因（例如，服务器正在重启）断开连接时，默认情况下它会持续尝试重新连接。在 Mojarra\
    \ 的情况下，它会最多重试 25 次，每次间隔增加 500 毫秒，并最终报告一个错误。\n\n正如你可能在前面提到的 `onclose` 监听器函数示例中注意到的，你可以检查\
    \ `<f:websocket>` 的关闭代码是否等于 1000，以便通过 JavaScript 执行一些客户端操作（例如，显示警告消息和/或重定向到某个“会话已过期”页面）。\n\
    \n```\n<f:websocket channel=\"push\" scope=\"session\" onclose=\"closeListener\"\
    \ />\n\n<script>\n    function closeListener(code) {\n        if (code == 1000)\
    \ {\n            window.location = jsf.contextPath + \"/expired.xhtml\";\n        }\n\
        }\n</script>\n```\n\n这既适用于视图作用域的套接字，也适用于会话作用域的套接字。然而，只要文档在客户端仍然打开，应用程序作用域的套接字就会永久保持打开状态，即使底层的视图或会话已经过期。\n"
- fmt: '# Breaking Down Mojarra’s `f:websocket` Implementation


    The `<f:websocket>` API specifies the following classes and methods:


    - `javax.faces.push.Push`, a CDI qualifier to for `@Inject`. With help of this
    qualifier the socket channel name can be specified.

    - `javax.faces.push.PushContext`, an interface with three `send()` methods: `send(String
    message)`, `send(String message, S user)`, and `send(String message, Collection<S>
    users)`. All those methods accept the push message as `Object` and will for JavaScript
    convert it to a JSON string. All those methods return `Future<Void>` for each
    message. If it returns `null`, then the target socket isn’t open at all. If it
    doesn’t throw `ExecutionException` on `Future#get()` method call, then the message
    was successfully delivered.

    - `javax.faces.component.UIWebsocket`, a component which implements `ClientBehaviorHolder`
    in order to support nested `<f:ajax>`. Historically, the prototype tag used a
    `TagHandler` instead of `UIComponent`. It was later decided to let the tag support
    `<f:ajax>` as that would make complex and stateful UI updates much easier. However,
    it isn’t possible to let a `TagHandler` implement `ClientBehaviorHolder` and benefit
    all of built-in Ajax magic, hence the conversion to `UIComponent`.

    - `ViewHandler#getWebsocketURL()` method which takes a channel name and returns
    the absolute WebSocket URL in form of `ws://host:port/context/javax.faces.push/channel`
    with help of `ExternalContext#encodeWebsocketURL()`.

    - `ExternalContext#encodeWebsocketURL()` method which basically takes a relative
    WebSocket URI in form of `/context/javax.faces.push/channel` and returns the absolute
    WebSocket URL.


    The actual implementation is fairly extensive. It’s directly based on OmniFaces
    `<o:socket>` [⁴](#A454457_1_En_10_Chapter.xhtml#Fn4) with, here and there, a few
    adjustments such as using a component’s client ID instead of a channel name in
    JavaScript API functions.


    - `com.sun.faces.renderkit.html_basic.WebsocketRenderer`, a faces renderer class
    which registers during encoding the socket channel, scope and user in `WebsocketChannelManager`
    and retrieves the WebSocket URL from it. Then it auto-includes the `jsf.js` script
    containing the necessary `javax.push.*` functions, and renders the `jsf.push.init(...)`
    inline script function call with among others the WebSocket URL as an argument.
    This function should in turn in JavaScript create a new `WebSocket(url)`. The
    `WebsocketRenderer` will also subscribe the `WebsocketFacesListener` to the current
    view.

    - `com.sun.faces.push.WebsocketChannelManager`, a session-scoped CDI managed bean
    which keeps track of all so far registered `<f:websocket>` channels, scopes, and
    users and ensures that each socket gets its own unique channel identifier. It
    will register every channel identifier in `WebsocketSessionManager` and those
    of user-targeted sockets in `WebsocketUserManager`.

    - `com.sun.faces.push.WebsocketFacesListener`, a system event listener which listens
    on `PreRenderViewEvent` and renders if necessary the `jsf.push.open(...)` or `jsf.push.close(...)`
    inline script function calls depending on whether the connected attribute represents
    a dynamic EL expression which got changed during an Ajax request.

    - `com.sun.faces.push.WebsocketEndpoint`, a class which implements JSR-356 `javax.websocket.Endpoint`
    and listens on the URI template `/javax.faces.push/{channel}`. When a new `WebSocket(url)`
    is created and opened on client-side JavaScript, then a new `javax.websocket.Session`
    is created on server-side Java and the `WebsocketEndpoint` will add this `Session`
    to `WebsocketSessionManager`. Equivalently, when a socket is closed, then the
    `WebsocketEndpoint` will remove it from `WebsocketSessionManager`.

    - `com.sun.faces.push.WebsocketSessionManager`, an application-scoped CDI managed
    bean which collects all so far opened socket sessions and validates that their
    unique WebSocket URL has been registered by `WebsocketChannelManager`.

    - `com.sun.faces.push.WebsocketUserManager`, an application-scoped CDI managed
    bean which collects the channel identifiers of all so far opened user-targeted
    sockets.

    - `com.sun.faces.push.WebsocketPushContext`, the concrete implementation of the
    `PushContext` interface. It will send the push message via `WebsocketSessionManager`
    and if necessary obtain the user-targeted channels via `WebsocketUserManager`.

    - `com.sun.faces.push.WebsocketPushContextProducer`, the CDI producer which creates
    the `WebsocketPushContext` instance based on channel name as obtained from `@Push`
    qualifier, the `WebsocketSessionManager` and `WebsocketUserManager`.


    # Footnotes


    [1](#A454457_1_En_10_Chapter.xhtml#Fn1_source) [https://github.com/javaee/websocket-spec/issues/211](https://github.com/javaee/websocket-spec/issues/211)
    .


    [2](#A454457_1_En_10_Chapter.xhtml#Fn2_source) [https://javaserverfaces.github.io/docs/2.3/jsdocs/symbols/jsf.push.html](https://javaserverfaces.github.io/docs/2.3/jsdocs/symbols/jsf.push.html)
    .


    [3](#A454457_1_En_10_Chapter.xhtml#Fn3_source) [http://caniuse.com/#feat=websockets](http://caniuse.com/%23feat%3Dwebsockets)
    .


    [4](#A454457_1_En_10_Chapter.xhtml#Fn4_source) [http://showcase.omnifaces.org/push/socket](http://showcase.omnifaces.org/push/socket)
    .


    © Bauke Scholtz, Arjan Tijms 2018


    Bauke Scholtz and Arjan Tijms, The Definitive Guide to JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3387-0_11](#A454457_1_En_11_Chapter.xhtml)


    # 11. Custom Components


    Bauke Scholtz^(1 ) and Arjan Tijms²


    (1)Willemstad, Curaçao


    (2)Amsterdam, Noord-Holland, The Netherlands


    In Chapter [7](#A454457_1_En_7_Chapter.xhtml) you should have learned that Facelet
    templates as in `<ui:composition>`, `<ui:include>`, and `<ui:decorate>` are useful
    when you want to split main page layout fragments into reusable templates, such
    as header, menu, main content, and footer. And that Facelet tag files such as
    `<t:field>` are useful when you want to have a reusable group of components in
    order to minimize code duplication. And that composite components such as `<t:inputLocalTime>`
    are useful when you want to create a custom component with a single responsibility
    based on existing components and, if necessary, a bunch of HTML.


    However, there may be cases in which no single component exists for the purpose
    you had in mind, even not when composed of existing components and a bunch of
    HTML. Or, perhaps the component does exist, but its renderer is not doing things
    you had in mind. At this point, you would need to create a custom component or
    a custom renderer.


    JSF (JavaServer Faces) has since the beginning offered a high degree of abstraction
    around the `UIComponent` API (application programming interface). You can customize
    components by creating a brand-new custom `UIComponent`, or by extending an existing
    component from the standard HTML component set, or by plugging a custom `Renderer`
    for an existing component.'
