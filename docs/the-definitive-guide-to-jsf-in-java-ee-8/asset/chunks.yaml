    \ using Mojarra as JSF implementation, it’ll print as follows:\n\n```\nclass com.sun.faces.renderkit.html_basic.MessageRenderer\n\
    ```\n\nThat’s thus exactly the renderer class we’d like to extend. Mojarra is\
    \ open source and its source code is currently available at [https://github.com/javaserverfaces/mojarra](https://github.com/javaserverfaces/mojarra).\
    \ Once you’ve gotten the `MessageRenderer` source code at hands, the next step\
    \ is to figure out where exactly the summary and detail of the `FacesMessage`\
    \ is being rendered and how exactly we can override it with a minimum of code.\
    \ We can see in the source code that it takes place in the `encodeEnd()` method\
    \ which, in the current Mojarra 2.3.3 version, is already 182 lines of code. It’s\
    \ using `ResponseWriter#writeText()` [^(10)](#A454457_1_En_11_Chapter.xhtml#Fn10)\
    \ to render the summary and detail. We’d like to replace this by `ResponseWriter#write()`\
    \ so that it doesn’t perform any escaping."
  raw: 'Now the file’s content type attribute is filtered on the client side and validated
    on the server side. All good and well, but this of course only validates the file’s
    content type based on the file name and not the file’s actual content. Imagine
    that one creates a ZIP file and simply renames the file extension to become an
    image file, or even an executable file with malware. It would still pass through
    the file type validation on both the client and server side. Frankly, this responsibility
    is not up to the component itself, but to you, the JSF developer. The correct
    solution would be to create a custom validator and attach it to the component.
    Here’s what such an image file validator can look like, with a little help from
    the Java2D API which is capable of parsing image files. If it throws an exception
    or returns null, then it’s very definitely not an image file.


    ```

    @FacesValidator("project.ImageFileValidator")

    public class ImageFileValidator implements Validator<Part> {


    @Override

        public void validate

            (FacesContext context, UIComponent component, Part value)

                throws ValidatorException

        {

            if (value == null) {

                return; // Let @NotNull or required="true" handle.

            }


    try {

                ImageIO.read(value.getInputStream()).toString();

            }

            catch (Exception e) {

                String message = "Not an image file";

                throw new ValidatorException(new FacesMessage(message), e);

            }

        }

    }

    ```


    In order to get it to run, declare it as validator attribute of the component
    tag.


    ```

    <my:inputFile ... validator="project.ImageFileValidator" />

    ```


    It works beautifully. Now, when validation passes as well, the backing bean action
    method is invoked wherein you can save the uploaded file to the desired location
    . This could be implemented as follows:


    ```

    public void upload() {

        Path folder = Paths.get("/path/to/uploads");

        String fileName = Paths.get(photo.getSubmittedFileName())

            .getFileName().toString();

        int indexOfLastDot = fileName.lastIndexOf(''.'');

        String name = fileName.substring(0, indexOfLastDot);

        String extension = fileName.substring(indexOfLastDot);

        FacesMessage message = new FacesMessage();


    try (InputStream contents = photo.getInputStream()) {

            Path file = Files.createTempFile(folder, name + "-", extension);

            Files.copy(contents, file, StandardCopyOption.REPLACE_EXISTING);

            message.setSummary("Uploaded file successfully saved.");

        }

        catch (IOException e) {

            message.setSummary("Could not save uploaded file, try again.");

            message.setSeverity(FacesMessage.SEVERITY_ERROR);

            e.printStackTrace();

        }


    FacesContext.getCurrentInstance().addMessage(null, message);

    }

    ```


    You might wonder why it seems to save the uploaded file as a temporary file. This
    is actually not true. We’re just utilizing the Files#createTempFile() facility
    in order to guarantee the uniqueness of the file name of the saved file. It will
    automatically include a unique random string between the file name and the file
    extension. Otherwise, when multiple people upload different files with coincidentally
    the same name, they may overwrite each other and we’d lose information.


    ## Extending Existing Renderer


    Imagine that there’s an existing renderer which has logic bugs or shortcomings
    and you’d like to quickly patch it by extending it instead of rewriting from scratch.
    Unfortunately, it sounds far easier than it actually is. That is, standard renderer
    implementations are not part of the standard JSF API, contrary to standard HTML
    component implementations which are available in the javax.faces.component.html
    package. The actual standard HTML renderer implementations are provided by the
    JSF implementation itself. Mojarra has them in the com.sun.faces.renderkit.html_basic
    package and MyFaces has them in the org.apache.myfaces.renderkit.html package.


    Another problem with those standard HTML renderers is relatively poor abstraction
    of the code. Basically all those standard HTML renderers don’t have abstracted-out
    pieces of code which solely emit HTML markup in such way that it’s fully separated
    from the logic. In other words, when you need to fix some logic, you’d almost
    always also have to write or copy/paste all the code responsible for emitting
    HTML.


    A common real-world example is the desire to let <h:message> or <h:messages> render
    the faces message unescaped, so that you can embed some HTML code in a faces message,
    more than often to provide a link to the desired target page (e.g., “Unknown user,
    perhaps you want to <a href="login">Log in</a>?”). The standard <h:message> component
    doesn’t support such facility and the HTML-escaping is controlled by its renderer
    which in turn is thus JSF implementation dependent. This JSF built-in HTML escaping
    is found over all place and is a very important guard against possible XSS attack
    holes when you’re about to embed user-controlled data in the web page. There are
    a handful of components which have an explicit attribute to turn off this HTML-escaping,
    such as <h:outputText> with its escape attribute , <f:selectItem> with its itemEscaped
    attribute, and <f:selectItems> with its itemLabelEscaped attributes. Such an attribute
    is, however, absent in <h:message> and <h:messages>. See also JSF spec issue 634.[⁹](#A454457_1_En_11_Chapter.xhtml#Fn9)
