  raw: '###### Figure 2-24 The New JPA Entity wizard in Eclipse


    Modify the new entity class as follows:


    ```

    package com.example.project.model;


    import java.io.Serializable;

    import javax.persistence.Column;

    import javax.persistence.Entity;

    import javax.persistence.GeneratedValue;

    import javax.persistence.GenerationType;

    import javax.persistence.Id;

    import javax.persistence.Lob;

    import javax.validation.constraints.NotNull;


    @Entity

    public class Message implements Serializable {


        private static final long serialVersionUID = 1L;


        @Id @GeneratedValue(strategy=GenerationType.IDENTITY)

        private Long id;


        @Column(nullable = false) @Lob

        private @NotNull String text;


        // Add/generate getters and setters.

    }

    ```


    As a reminder, you can let Eclipse generate getters and setters by right-clicking
    anywhere in the class editor and choosing *Source ➤ Generate Getters and Setters*.


    We''ll briefly go through the annotations that are used here.


    *   **@Entity**—marks the bean as a JPA entity, so that the JPA implementation
    will automatically collect database-related metadata based on all its properties.


    *   **@Id @GeneratedValue(strategy=IDENTITY)**—marks a property to be mapped to
    a database column of SQL “IDENTITY” type. In MySQL terms, that’s the equivalent
    of “AUTO_INCREMENT”. In PostgreSQL terms, that’s the equivalent of “BIGSERIAL”.


    *   **@Column**—marks a property to be mapped to a regular database column. The
    actual database column type depends on the Java type being used. Without the additional
    @Lob annotation, that’s a VARCHAR(255) whose length can be manipulated by @Column(length=n).
    With the @Lob annotation, however, the column type becomes TEXT.


    *   **@Lob**—marks a String property to be mapped to a database column of type
    TEXT instead of a limited VARCHAR.


    *   **@NotNull**—this is actually not part of JPA but of “Bean Validation.” To
    the point, it ensures that the bean property is being validated never to be null
    when submitting a JSF form and when persisting the JPA entity. (See Chapter [5](#A454457_1_En_5_Chapter.xhtml).)
    Also note that this basically replicates the @Column(nullable=false), but that’s
    only because JPA doesn’t consider any Bean Validation annotations as valid database
    metadata in order to generate appropriate SQL tables.


    ### Creating the EJB Service


    Next, we need to create an EJB in order to be able to save an instance of the
    aforementioned JPA entity in the database, and to obtain a list of JPA entities.


    Right-click the src/main/java folder of the project and choose *New ➤ Class*.
    In the wizard, set the *Package* to com.example.project.service and set the *Name*
    to MessageService (see Figure [2-25](#A454457_1_En_2_Chapter.xhtml#Fig25)). The
    rest of the fields can be kept default or empty.


    ![A454457_1_En_2_Fig25_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig25_HTML.jpg)


    ###### Figure 2-25 The New Java Class wizard in Eclipse


    Modify the new service class as follows:


    ```

    package com.example.project.service;


    import java.util.List;

    import javax.ejb.Stateless;

    import javax.persistence.EntityManager;

    import javax.persistence.PersistenceContext;


    @Stateless

    public class MessageService {


        @PersistenceContext

        private EntityManager entityManager;


        public void create(Message message) {

            entityManager.persist(message);

        }


        public List<Message> list() {

            return entityManager

                .createQuery("FROM Message m", Message.class)

                .getResultList();

        }

    }

    ```


    That’s basically it. Let’s briefly go through the annotations .


    *   **@Stateless**—marks the bean as a stateless EJB service, so that the application
    server knows whether it should pool them and when to start and stop database transactions.
    The alternative annotations are @Stateful and @Singleton. Note that a @Stateless
    does not mean that the container will make sure that the class itself is stateless.
    You as developer are still responsible to ensure that the class doesn’t contain
    any shared and mutable instance variables. Otherwise, you’d better mark it as
    either @Stateful or @Singleton, depending on its purpose.


    *   **@PersistenceContext**—basically injects the JPA entity manager from the
    persistence unit as configured in the project’s persistence.xml. The entity manager
    is, in turn, responsible for mapping all JPA entities against a SQL database.
    It will, under cover, do all the hard JDBC work.


    ### Adjusting the Hello World


    Now we’re going to adjust the earlier created HelloWorld backing bean in order
    to save the messages in the database and display all of them in a table.


    ```

    @Named @RequestScoped

    public class HelloWorld {


        private Message message = new Message();

        private List<Message> messages;


        @Inject

        private MessageService messageService;


        @PostConstruct

        public void init() {

            messages = messageService.list();

        }


        public void submit() {

            messageService.create(message);

            messages.add(message);

        }


        public Message getMessage() {

            return message;

        }


        public List<Message> getMessages() {

            return messages;

        }

    }

    ```


    Note that you don’t need setters for message and messages. We’re going to use
    the getters and setters of the Message entity itself.


    Finally, adjust the <h:body> of hello.xhtml as follows:


    ```

    <h1>Hello World</h1>

    <h:form>

        <h:outputLabel for="input" value="Input" />

        <h:inputText id="input" value="#{helloWorld.message.text}" />

        <h:commandButton value="Submit"

            action="#{helloWorld.submit}">

            <f:ajax execute="@form" render=":table" />

        </h:commandButton>

    </h:form>

    <h:dataTable id="table" value="#{helloWorld.messages}" var="message">

        <h:column>#{message.id}</h:column>

        <h:column>#{message.text}</h:column>

    </h:dataTable>

    ```


    Now reload the page in your favorite web browser and create some messages (see
    Figure [2-26](#A454457_1_En_2_Chapter.xhtml#Fig26)).


    ![A454457_1_En_2_Fig26_HTML.jpg](OEBPS/Images/A454457_1_En_2_Fig26_HTML.jpg)


    ###### Figure 2-26 The Hello World using JSF, CDI, EJB, and JPA


