  trans: "\n```\nprivate interface Markdown {\n    public String getText();\n    public\
    \ void setHtml(String html);\n    public String getVersion();\n    public void\
    \ setVersion(String version);\n}\n```\n\n以及以下 `MarkdownListener` 实体监听器，\n\n```\n\
    public class MarkdownListener {\n\nprivate static final Parser PARSER = Parser.builder().build();\n\
        private static final HtmlRenderer RENDERER =\n        HtmlRenderer.builder().escapeHtml(true).build();\n\
        private static final String VERSION = getCommonMarkVersion();\n\n@PrePersist\n\
        public void parseMarkdown(Markdown markdown) {\n        String html = RENDERER.render(PARSER.parse(markdown.getText()));\n\
            markdown.setHtml(html);\n        markdown.setVersion(VERSION);\n    }\n\
    \n@PreUpdate\n    public void parseMarkdownIfNecessary(Markdown markdown) {\n\
            if (markdown.getVersion() == null) {\n            parseMarkdown(markdown);\n\
            }\n    }\n\n@PostLoad\n    public void updateMarkdownIfNecessary(Markdown\
    \ markdown) {\n        if (!VERSION.equals(markdown.getVersion())) {\n            parseMarkdown(markdown);\n\
            }\n    }\n\nprivate static String getCommonMarkVersion() {\n        try\
    \ {\n            Properties properties = new Properties();\n            properties.load(Parser.class.getResourceAsStream(\n\
                    \"/META-INF/maven/com.atlassian.commonmark\"\n                    +\
    \ \"/commonmark/pom.properties\"));\n            return properties.getProperty(\"\
    version\");\n        }\n        catch (IOException e) {\n            throw new\
    \ UncheckedIOException(e);\n        }\n    }                                 \
    \                                             \n}\n```\n\n那么，实现了 `Markdown` 接口并注册了\
    \ `MarkdownListener` 实体监听器的 `Message` 实体可以如下所示：\n\n```\n@Entity @EntityListeners(MarkdownListener.class)\n\
    public class Message implements Markdown, Serializable {\n\n@Id @GeneratedValue(strategy=IDENTITY)\n\
        private Long id;\n\n@Column(nullable = false) @Lob\n    private @NotNull String\
    \ text;\n\n@Column(nullable = false) @Lob\n    private String html;\n\n@Column(nullable\
    \ = false, length = 8)\n    private String version;\n\n@Override\n    public void\
    \ setText(String text) {\n        if (!text.equals(this.text)) {\n            this.text\
    \ = text;\n            setVersion(null); // 触发 MarkdownListener @PreUpdate。\n\
            }\n    }\n\n// 添加/生成其余的 getter 和 setter 方法。\n}\n```\n\n最后，为了向最终用户呈现安全的\
    \ HTML 代码，你可以使用 `escape` 属性设置为 `false` 的 `<h:outputText>`，从而指示 JSF 不需要隐式地对值进行\
    \ HTML 转义。\n\n```\n<h:outputText value=\"#{message.html}\" escape=\"false\" />\n\
    ```\n\n除了隐式 HTML 转义，JSF 还支持隐式转换。对于通过 `<h:outputText>` 或模板文本中的 EL 发出的任何属性类型，JSF\
    \ 都会按类查找转换器，调用其 `Converter#getAsString()` 方法，并渲染结果。如果你希望显式使用特定或不同的转换器，则必须将模板文本中的任何\
    \ EL 替换为 `<h:outputText>`，并显式在其上注册转换器。通常，那些与数字或日期时间相关的属性需要以特定于区域设置的格式进行格式化。\n\n\
    ```\n<h:outputText value=\"#{product.price}\">\n    <f:convertNumber type=\"currency\"\
    \ locale=\"en_US\" />\n</h:outputText>\n```\n\n`<h:outputText>` 的最后一个用途是能够在 `<f:ajax\
    \ render>` 中引用一段内联文本。默认情况下，`<h:outputText>` 不会生成任何 HTML 代码。但如果它指定了至少一个必须出现在生成的\
    \ HTML 输出中的属性（例如 `id` 或 `styleClass`），那么它将生成一个 HTML `<span>` 元素。该元素可通过 JavaScript\
    \ 引用，因此对于通过 Ajax 更新文本的特定部分非常有用。当然，你也可以选择通过 Ajax 更新某个通用容器组件，但这远不如仅更新真正需要更新的特定部分高效。\n\
    \n`<h:outputFormat>` 是 `<h:outputText>` 的扩展，它预先使用 `java.text.MessageFormat` API⁴\
    \ 解析值。这在与本地化资源包结合使用时特别有用。第 14 章的“参数化资源包值”一节中可以找到一个示例。\n\n`<h:outputLabel>` 基本上生成\
    \ HTML `<label>` 元素，这是 HTML 表单的重要组成部分。这已在第 4 章的“标签和消息组件”一节中描述过。需要注意的是，从 HTML 的角度来看，`<h:outputLabel>`\
    \ 和 `<h:outputText>` 绝对不可互换。在近期互联网上涌现的一批低质量编程教程网站中（这些网站基本上只展示代码片段，没有任何技术解释，以获取广告收入），`<h:outputLabel>`\
    \ 经常被错误地用于在 Hello World JSF 页面中输出一段文本。这类教程网站最好完全忽略。\n\n`<h:outputLink>` 生成一个 HTML\
    \ `<a>` 元素。它是 JSF 1.x 的遗留产物，自从 JSF 2.0 中引入了更有用的 `<h:link>` 之后，它的作用就不大了。当你不需要使用链接引用\
    \ JSF 视图时（这种情况应使用 `<h:link>`），你也可以直接使用纯 HTML `<a>` 元素来代替 `<h:outputLink>`。以下标签生成完全相同的\
    \ HTML。\n\n```\n<h:outputLink value=\"http://google.com\">Google</h:outputLink>\n\
    <a href=\"http://google.com\">Google</a>\n```\n\n纯 HTML 等效写法更简洁。\n\n## 基于导航的输出组件\n\
    \n这些组件是 `<h:link>` 和 `<h:button>`，它们都继承自 `UIOutcomeTarget` 超类。它们有一个 `outcome`\
    \ 属性，该属性接受指向 JSF 视图的逻辑路径。如果路径是有效的 JSF 视图，则会进行验证；否则，链接或按钮将呈现为禁用状态。换句话说，它们不接受指向非\
    \ JSF 资源的路径，更不用说外部 URL 了。对于这种情况，你需要使用 `<h:outputLink>` 或纯 HTML。\n\n`<h:link>`\
    \ 将生成一个 HTML `<a>` 元素，其 `href` 属性指定了目标 JSF 视图的 URL。`<h:button>` 将生成一个 HTML `<input\
    \ type=\"button\">` 元素，其 `onclick` 属性借助 JavaScript 将目标 JSF 视图的 URL 赋值给 `window.location.href`\
    \ 属性。这确实有些笨拙，但这只是 HTML 的限制。`<input type=\"button\">` 和 `<button>` 都不支持类似 `href`\
    \ 的属性。\n\n给定 Eclipse 中 Maven WAR 项目的以下文件夹结构，\n\n![A454457_1_En_6_Figa_HTML.jpg](img/A454457_1_En_6_Figa_HTML.jpg)\n\
    \n以下位于 `/folder1/page1.xhtml` 中的 `<h:link>` 和 `<a>` 对将生成完全相同的链接。\n\n```\n<h:link\
    \ outcome=\"page2\" value=\"link1\" />\n<a href=\"#{request.contextPath}/folder1/page2.xhtml\"\
    >link1</a>\n\n<h:link outcome=\"/folder2/page1\" value=\"link2\" />\n<a href=\"\
    #{request.contextPath}/folder2/page1.xhtml\">link2</a>\n\n<h:link outcome=\"/folder2/page2\"\
    \ value=\"link3\" />\n<a href=\"#{request.contextPath}/folder2/page2.xhtml\">link3</a>\n\
    \n<h:link outcome=\"/page1\" value=\"link4\" />\n<a href=\"#{request.contextPath}/page1.xhtml\"\
    >link4</a>\n\n<h:link outcome=\"/page2\" value=\"link5\" />\n<a href=\"#{request.contextPath}/page2.xhtml\"\
    >link5</a>\n```\n\n因此请注意，`<h:link>` 已经自动预置了 Web 应用程序项目的任何上下文路径，并附加了当前活动的 `FacesServlet`\
    \ 映射的 URL 模式。另请注意，如果没有前导斜杠，`outcome` 将相对于当前文件夹进行解释；如果有前导斜杠，则 `outcome` 将相对于上下文路径进行解释。\n"
- fmt: "# Panel-Based Output Components\n\nThese components are `<h:panelGroup>` and\
    \ `<h:panelGrid>`, both extending from the `UIPanel` superclass. `<h:panelGroup>`\
    \ has multiple responsibilities. It can generate an HTML `<span>`, or `<div>`,\
    \ or even `<td>`, depending on the `layout` attribute and whether it’s enclosed\
    \ in a `<h:panelGrid>`.\n\nBy default, `<h:panelGroup>` generates just an HTML\
    \ `<span>` element, like `<h:outputText>`. The main difference is that `<h:panelGroup>`\
    \ doesn’t have a `value` attribute. Instead, the content is represented by its\
    \ children. It also doesn’t support disabling HTML escaping or attaching a converter.\
    \ That’s up to any `<h:outputText>` child. In this context, it’s not terribly\
    \ useful. `<h:panelGroup>` is only more useful than `<h:outputText>` when you\
    \ need to be able to reference using `<f:ajax render>` an inline element which\
    \ in turn groups a bunch of closely related inline elements. Something like the\
    \ following represents the “user profile ,” which should be Ajax-updatable from\
    \ within some sort of user profile edit page.\n\n```\n<p>\n    Welcome,\n    <h:panelGroup\
    \ id=\"userProfile\">\n        <img src=\"#{user.imageUrl}\" />\n        #{user.name}\n\
    \    </h:panelGroup>\n</p>\n...\n<h:form>\n    ...\n    <f:ajax ... render=\"\
    :userProfile\" />\n    ...\n</h:form>\n```\n\nWhen setting the `layout` attribute\
    \ of `<h:panelGroup>` to `block`, then it will generate an HTML `<div>` element.\
    \ In standard HTML, “inline elements” don’t start at a new line by default and\
    \ don’t allow block element children. And, “block-level elements” always start\
    \ at a new line by default and allow inline as well as block elements as children.\
    \ Hence the supported values of the `layout` attribute of `<h:panelGroup>` are\
    \ `\"inline\"` and `\"block\"`. Historically, the `layout` attribute was only\
    \ added in JSF 1.2 after complaints from JSF developers about a missing JSF component\
    \ to represent an HTML `<div>` element. (See also Chapter 7.) This could be used\
    \ to wrap larger sections which need to be Ajax-updatable; otherwise a plain HTML\
    \ `<div>` is also sufficient.\n\n```\n<h:panelGroup layout=\"block\" id=\"userProfile\"\
    >\n    <p>\n        Welcome,\n        <img src=\"#{user.imageUrl}\" />\n     \
    \   #{user.name}\n    </p>\n</h:panelGroup>\n```\n\nNote that it’s illegal in\
    \ HTML to have a block element nested in an inline element. The `<p>` is a block\
    \ element and hence the `layout=\"block\"` is absolutely mandatory in the above\
    \ construct. If you don’t specify this attribute and thus effectively let JSF\
    \ render an HTML `<span>` element, then the web browser behavior is unspecified.\
    \ The average web browser will render the block element children outside the inline\
    \ element and even possibly error out when this construct is manipulated by JavaScript,\
    \ such as during a JSF Ajax update action.\n\nAlso keep in mind that in the above\
    \ construct, the `<p>` tags and the “Welcome” text are also updated during any\
    \ JSF Ajax update action on the `<h:panelGroup>`. This is essentially a waste\
    \ of hardware resources, on both the server side and the client side, as those\
    \ are static and never subject to changes. When Ajax-updating things, you should\
    \ preferably ensure that `<f:ajax render>` only references components that absolutely\
    \ need to be Ajax-updated and thus not an unnecessarily large section.\n\nWhen\
    \ `<h:panelGroup>` is being nested in a `<h:panelGrid>` component, which generates\
    \ an HTML `<table>` element, then the `layout` attribute of `<h:panelGroup>` is\
    \ ignored and the component will basically act as a container of components which\
    \ should ultimately end up in the very same cell of the table. That is, the renderer\
    \ of `<h:panelGrid>` considers every direct child component as an individual table\
    \ cell.\n\nGiven the following two-column `<h:panelGrid>`, which should generate\
    \ a two-column HTML table, what would you guess the actual generated HTML output\
    \ should look like?\n\n```\n<h:panelGrid columns=\"2\">\n    one\n    <h:outputText\
    \ value=\"two\" />\n    three\n    four\n    <h:panelGroup>five</h:panelGroup>\n\
    \    six\n    seven\n    <h:panelGroup>\n        eight\n        nine\n    </h:panelGroup>\n\
    </h:panelGrid>\n```\n\n## Hint\n\nEach section of template text between two JSF\
    \ components is internally considered a single JSF component. In Mojarra, it’s\
    \ represented by the internal `UIInstructions` component. The actual component\
    \ tree hierarchy is thus roughly represented as below.\n\n```\n<h:panelGrid columns=\"\
    2\">\n    <ui:instructions>one</ui:instructions>\n    <h:outputText value=\"two\"\
    \ />\n    <ui:instructions>                                                  \
    \                                      \n        three\n        four\n    </ui:instructions>\n\
    \    <h:panelGroup>five</h:panelGroup>\n    <ui:instructions>\n        six\n \
    \       seven\n    </ui:instructions>\n    <h:panelGroup>\n        eight\n   \
    \     nine\n    </h:panelGroup>\n</h:panelGrid>\n```\n\nNote again that there’s\
    \ no such component as `<ui:instructions>` in Facelets. The above markup is purely\
    \ for visualization so that your brain can better process it. This `<h:panelGrid>`\
    \ has thus effectively six direct children which will each end up in their own\
    \ table cell. With two columns, this will thus effectively generate three rows.\
    \ Here’s the actual generated HTML output (reformatted for readability).\n\n```\n\
    <table>\n    <tbody>\n        <tr>\n            <td>one</td>\n            <td>two</td>\n\
    \        </tr>\n        <tr>\n            <td>three four</td>\n            <td>five</td>\n\
    \        </tr>\n        <tr>\n            <td>six seven</td>\n            <td>eight\
    \ nine</td>\n        </tr>\n    </tbody>\n</table>\n```\n\nRendering in Chrome\
    \ browser:\n\n![A454457_1_En_6_Figb_HTML.jpg](OEBPS/Images/A454457_1_En_6_Figb_HTML.jpg)\n\
    \nYou see, `<h:panelGroup>` makes sure that “five” and “eight nine” don’t end\
    \ up in the very same table cell as “six seven.” Also note that it’s unnecessary\
    \ to wrap any JSF component in `<h:panelGroup>` if it should represent a single\
    \ cell already. Therefore, `<h:outputText>` behind “two” doesn’t need to be wrapped\
    \ in `<h:panelGroup>`. You can, of course, do so for better source code readability,\
    \ but this is technically unnecessary.\n\nIf you happen to have a dynamic amount\
    \ of cells based on a view-scoped model, then you can nest a JSTL (JSP Standard\
    \ Tag Library) `<c:forEach>` in `<h:panelGrid>` to have it generate them as a\
    \ data grid with a fixed amount of columns.\n\n```\n<h:panelGrid columns=\"3\"\
    >\n    <c:forEach items=\"#{viewProducts.products}\" var=\"product\">\n      \
    \  <h:panelGroup>\n            <h3>#{product.name}</h3>\n            <p>#{product.description}</p>\n\
    \        </h:panelGroup>\n    </c:forEach>\n</h:panelGrid>\n```\n\nNote thus that\
    \ `<ui:repeat>` is unsuitable here as compared to `<c:forEach>`, as explained\
    \ in the section “JSTL Core Tags” in Chapter 3. It will technically work just\
    \ fine, but the renderer of `<h:panelGrid>` will interpret it as a single table\
    \ cell.\n\nAlso note that it’s very important for the model to be view scoped,\
    \ particularly if you have JSF form components inside `<h:panelGrid>`. The technical\
    \ reason is that during processing the postback request, JSF expects the model\
    \ item behind the iteration index to be exactly the same as it was when the page\
    \ was presented to the end user. In other words, when JSF is about to process\
    \ a form submit, and an item has been added or removed or even reordered in the\
    \ meanwhile, causing the iteration index to be changed, the submitted values and/or\
    \ the invoked action would possibly be performed against the wrong item currently\
    \ at the initially known index. This is dangerous for the integrity of the model.\
    \ If you don’t have any JSF form components inside `<h:panelGrid>`, or if the\
    \ model isn’t subject to changes during the view scope, e.g., because it’s only\
    \ created or updated during application startup, then the backing bean behind\
    \ `#{viewProducts}` can safely be request scoped."
