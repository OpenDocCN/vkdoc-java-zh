  raw: '## Localizing Enums


    The cleanest approach to localize enums is to simply use their own identity as
    a bundle key. This keeps the enum class free of potential UI-specific clutter
    such as hard-coded bundle keys. Generally, the combination of the enum’s simple
    name and the enum value should suffice to represent a site-wide unique identifier
    (UI). Given the following com.example.project.model.Group enum representing a
    user group:


    ```

    public enum Group {

        USER,

        MANAGER,

        ADMINISTRATOR,

        DEVELOPER;

    }

    ```


    and the following resource bundle entries in text.properties:


    ```

    Group.USER = User

    Group.MANAGER = Manager

    Group.ADMINISTRATOR = Administrator

    Group.DEVELOPER = Developer

    ```


    you can easily localize them as follows:


    ```

    <f:metadata>

        <f:importConstants type="com.example.project.model.Group" />

    </f:metadata>

    ...

    <h:selectManyCheckbox value="#{editUserBacking.user.groups}">

        <f:selectItems value="#{Group.values()}" var="group"

            itemLabel="#{text[''Group.'' += group]}" />

    </h:selectManyCheckbox>

    ```


    Note that the <f:importConstants> is new since JSF 2.3\. It is required to be
    placed inside <f:metadata>. Its type attribute must represent the fully qualified
    name of the enum or any class or interface which contains public constants in
    flavor of public static final fields. <f:importConstants> will automatically import
    them into the EL scope as a Map<String, Object> wherein the map key represents
    the name of the constant as string and the map value represents the actual value
    of the constant.


    With #{Group.values()} you can thus obtain a collection of all constant values
    and each value is then localized in itemLabel. Also note that itemValue is omitted
    as it defaults to the value of the var attribute which is already sufficient.


    ## Parameterized Resource Bundle Values


    You can also parameterize your resource bundle entries using the {0} placeholders
    of the java.text.MessageFormat API.[⁸](#A454457_1_En_14_Chapter.xhtml#Fn8) They
    can on the JSF side only be substituted with <h:outputFormat> whereby the parameters
    are provided as <f:param> children, in the same order as the placeholders. Given
    the following entry:


    ```

    page_products.table.header = There {0, choice, 0#are no products

                                                 | 1#is one product

                                                 | 1<are {0} products}.

    ```


    it can be substituted using <h:outputFormat> as follows:


    ```

    <h:outputFormat value="#{text[''page_products.table.header'']}">

        <f:param value="#{bean.products.size()}" />

    </h:outputFormat>

    ```


    ## Database-Based ResourceBundle


    JSF also supports specifying a custom ResourceBundle implementation as <base-name>.
    This allows you to programmatically fill and supply the desired bundles, for example,
    from multiple bundle files, or even from a database. In this example we’ll replace
    the default properties file-based resource bundle by one which loads the entries
    from a database. This takes us a step further as to organizing the resource bundle
    keys. This way, you can even edit them via a web-based interface . Following is
    what the JPA entity looks like:


    ```

    @Entity

    @Table(uniqueConstraints = {

        @UniqueConstraint(columnNames = { "locale", "key" })

    })

    public class Translation {


    @Id @GeneratedValue(strategy = GenerationType.IDENTITY)

        private Long id;


    @Column(length = 5, nullable = false)

        private @NotNull Locale locale;


    @Column(length = 255, nullable = false)

        private @NotNull String key;


    @Lob @Column(nullable = false)

        private @NotNull String value;


    // Add/generate getters and setters here.

    }

    ```


    Note that the JPA (Java Persistence API) annotations provide sufficient hints
    as to what the DDL (Data Definition Language) of the table should look like. When
    having the property javax.persistence.schema-generation.database.action set to
    create or drop-and-create in persistence.xml, then it will automatically generate
    the proper DDL. For sake of completeness, here it is in HSQL/pgSQL flavor.


    ```

    CREATE TABLE Translation (

        id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,

        locale VARCHAR(5) NOT NULL,

        key VARCHAR(255) NOT NULL,

        value CLOB NOT NULL

    );


    ALTER TABLE Translation

        ADD CONSTRAINT UK_Translation_locale_key

        UNIQUE (locale, key);

    ```


    And here’s what the EJB (Enterprise JavaBeans) service looks like.


    ```

    @Stateless

    public class TranslationService {


    @PersistenceContext

        private EntityManager entityManager;


    @TransactionAttribute(value = REQUIRES_NEW)

        @SuppressWarnings("unchecked")

        public Object[][] getContent

            (Locale locale, Locale fallback)

        {

            List<Object[]> resultList = entityManager.createQuery(

                "SELECT t1.key, COALESCE(t2.value, t1.value)"

                    + " FROM Translation t1"

                    + " LEFT OUTER JOIN Translation t2"

                        + " ON t2.key = t1.key"

                        + " AND t2.locale = :locale"

                    + " WHERE t1.locale = :fallback")

                .setParameter("locale", locale)

                .setParameter("fallback", fallback)

                .getResultList();

            return resultList.toArray(new Object[resultList.size()][]);

        }

    }

    ```


    For JPA we only need an additional converter which converts between java.util.
    Locale in the model and VARCHAR in the database, which is represented by java.lang.String.
    You can use the JPA 2.0 AttributeConverter for this. It’s much like a JSF converter
    but for JPA entities. It’s relatively simple; there’s no additional configuration
    necessary. See the following:


    ```

    public class LocaleConverter

        implements AttributeConverter<Locale, String>

    {

        @Override

        public String convertToDatabaseColumn(Locale locale) {

            return locale.toLanguageTag();

        }


    @Override

        public Locale convertToEntityAttribute(String languageTag) {

            return Locale.forLanguageTag(languageTag);

        }

    }

    ```


    Now we have the custom ResourceBundle; it’s called Database ResourceBundle. Put
    it in the package com.example.project.i18n.


    ```

    public class DatabaseResourceBundle extends ResourceBundle {


    private static final Control CONTROL = new DatabaseControl();


    @Override

        public Object handleGetObject(String key) {

            return getCurrentInstance().getObject(key);

        }


    @Override

        public Enumeration<String> getKeys() {

            return getCurrentInstance().getKeys();

        }'
