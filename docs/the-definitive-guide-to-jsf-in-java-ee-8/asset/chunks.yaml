    # 3. 组件


    Bauke Scholtz¹ 与 Arjan Tijms²


    (1) 库拉索岛威廉斯塔德


    (2) 荷兰北荷兰省阿姆斯特丹


    JSF（JavaServer Faces）是一个基于组件的 MVC（模型-视图-控制器）框架。本质上，JSF 将视图定义解析为“组件树”。该树的根由与 faces
    上下文当前实例关联的“视图根”实例表示。


    ```

    UIComponent tree = FacesContext.getCurrentInstance().getViewRoot();

    ```


    视图通常使用 Facelets 文件中的 XHTML+XML 标记来定义。XML 是一种标记语言，非常适合用最少的代码来定义树形层次结构。组件树也可以在 Java
    类中使用 Java 代码创建和操作，但这通常会导致代码非常冗长，以便声明值或方法表达式，并关联父子关系。通常，这样做的开发者并没有意识到如何使用诸如 JSTL（JavaServer
    Pages 标准标签库）之类的标签处理器，仅通过 XML 来操作组件树。


    组件树基本上定义了 JSF 应如何处理 HTTP 请求，以便应用来自输入组件的请求值、转换和验证它们、更新托管 bean 模型值以及调用托管 bean 操作。它还定义了
    JSF 应如何通过使用与组件关联的渲染器生成必要的 HTML 输出来产生 HTTP 响应，这些组件的属性又可以引用托管 bean 属性。换句话说，组件树定义了应如何处理
    JSF 生命周期的各个阶段。图 3-1 中的图表显示了 HTTP 回传请求通常是如何被 JSF 处理的。


    ![A454457_1_En_3_Fig1_HTML.jpg](img/A454457_1_En_3_Fig1_HTML.jpg)


    ###### 图 3-1 JSF 如何在 MVC 架构中处理 HTTP 回传请求（数字表示顺序）


    以下是每个步骤的简要描述：


    1.  最终用户发送一个 HTTP 请求，该请求匹配 `FacesServlet` 的映射，从而调用它。


    2.  `FacesServlet` 将根据 HTTP 请求路径标识的 Facelet 文件构建组件树。


    3.  在构建视图期间，组件树将根据需要从支持 bean 获取当前模型值。任何 Facelets 模板标签和 JSTL 核心标签的属性，以及 JSF 组件的
    "id" 和 "binding" 属性都将被执行。


    4.  `FacesServlet` 将在组件树上恢复 JSF 视图状态。


    5.  `FacesServlet` 将让组件树应用 HTTP 请求参数，输入组件将它们存储为“提交的值”。


    6.  在检查 "rendered"、"disabled" 和 "readonly" 属性以检查它们是否被允许应用请求参数时，输入和命令组件将根据需要从支持
    bean 获取当前模型值。


    7.  当命令组件基于 HTTP 请求参数检测到它在客户端被调用时，它将排队 `ActionEvent`。


    8.  `FacesServlet` 将让组件树处理所有已注册的转换器和验证器对提交的值进行处理，输入组件将新转换和验证的值存储为“本地值”。


    9.  输入组件将从支持 bean 获取旧模型值，并将它们与新值进行比较。


    10. 如果新值与旧模型值不同，则输入组件将排队 `ValueChangeEvent`。


    11. 当所有转换和验证完成后，`FacesServlet` 将在支持 bean 上调用任何已排队的 `ValueChangeEvent` 的监听器方法。


    12. `FacesServlet` 将让组件树更新所有模型值。


    13. 输入组件将在支持 bean 中设置新的模型值。


    14. `FacesServlet` 将在支持 bean 上调用任何已排队的 `ActionEvent` 的监听器方法。


    15. 支持 bean 的最终操作方法将根据需要返回一个引用目标视图的非空字符串结果。


    16. `FacesServlet` 将让组件树渲染响应。


    17. 在生成 HTML 输出期间，组件树将根据需要从支持 bean 获取当前模型值。实际上，任何参与生成 HTML 输出的 Facelet 组件和 JSF
    组件的属性都将被执行。


    18. 组件树将把 HTML 输出写入 HTTP 响应。


    19. `FacesServlet` 将把 HTTP 响应返回给最终用户。


    这与基于请求的 MVC 框架不同，在后者中，开发者需要在与视图关联的“控制器”类中编写更多样板代码，以定义需要应用哪些请求参数，和/或在填充实体之前应如何转换和验证它们。开发者还经常需要在调用操作之前，通过手动调用一堆
    getter 和 setter 来手动填充实体。所有这些在 JSF 中都是不必要的。


    需要注意的是，支持 bean 在 MVC 范式中具有相当独特的地位。根据视角的不同，它可以充当模型、视图和控制器。这将在第 8 章中详细说明。


    ## 标准 HTML 组件


    默认的 JSF 实现已经提供了一套广泛的组件，用于借助 Facelets 视图技术编写 HTML 页面。这些 HTML 组件可在 `http://xmlns.jcp.org/jsf/html`
    XML 命名空间 URI（统一资源标识符）下找到，该 URI 应分配给 "h" XML 命名空间前缀。


    ```

    xmlns:h="http://xmlns.jcp.org/jsf/html"

    ```


    JSF 页面中始终应存在的最重要的 HTML 组件是 `<h:head>` 和 `<h:body>`。没有它们，JSF 将无法自动包含与特定组件关联的任何脚本或样式表资源。例如，生成
    HTML 提交按钮的 `<h:commandButton>`，其 Ajax 功能需要将 `jsf.js` 脚本文件包含在 HTML 文档中。


    *   `<h:commandButton>`，生成一个 HTML 提交按钮。

    *   `<h:commandButton>`，可以选择性地包含 Ajax 功能。

    *   Ajax 功能需要在 HTML 文档中包含一个 `jsf.js` 脚本文件。


    该组件的渲染器会自动处理这一点，但这仅在存在 `<h:head>` 时才有效。`<h:body>` 在这里稍微不那么重要，但可能存在需要在 HTML 正文末尾添加脚本的组件，例如
    `<f:websocket>`。换句话说，最精简且符合 HTML5 规范的 JSF 页面如下所示：


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

    >

        <h:head>

            <title>标题</title>

        </h:head>

        <h:body>

            ...

        </h:body>

    </html>

    ```


    生成的 HTML 响应，您可以通过在普通 Web 浏览器中右键单击*查看页面源代码*来检查，应如下所示：


    ```

    <!DOCTYPE html>

    <html lang="en" xmlns:="http://www.w3.org/1999/xhtml">

        <head>

            <title>标题</title>

        </head>

        <body>

            ...

        </body>

    </html>

    ```


    您看，JSF 基本上将页面中的所有组件替换为其生成的 HTML 输出。如前所述，JSF 提供了一套广泛的标准 HTML 组件。表 3-1 提供了一个概览。

    '
- fmt: '### Table 3-1 Standard HTML Components Provided by JSF


    | Component tag | Component superclass | Value type | HTML output | Since |

    | --- | --- | --- | --- | --- |

    | `<h:body>` | `UIOutput` | - | `<body>` | 2.0 |

    | `<h:button>` | `UIOutcomeTarget` | `String` | `<button onclick=window.location>`
    | 2.0 |

    | `<h:column>` | `UIColumn` | - | `<td>` (for `h:dataTable`) | 1.0 |

    | `<h:commandButton>` | `UICommand` | `String` | `<input type=submit>` | 1.0 |

    | `<h:commandLink>` | `UICommand` | `String` | `<a onclick=form.submit()>` | 1.0
    |

    | `<h:commandScript>` | `UICommand` | - | `<script>` (function to submit a form)
    | 2.3 |

    | `<h:dataTable>` | `UIData` | `Object[]` | `<table>` (dynamic) | 1.0 |

    | `<h:doctype>` | `UIOutput` | - | `<!DOCTYPE>` | 2.0 |

    | `<h:form>` | `UIForm` | - | `<form method=post>` | 1.0 |

    | `<h:graphicImage>` | `UIGraphic` | - | `<img src>` | 1.0 |

    | `<h:head>` | `UIOutput` | - | `<head>` | 2.0 |

    | `<h:inputFile>` | `UIInput` | `Part` | `<input type=file>` | 2.2 |

    | `<h:inputHidden>` | `UIInput` | `Object` | `<input type=hidden>` | 1.0 |

    | `<h:inputSecret>` | `UIInput` | `Object` | `<input type=password>` | 1.0 |

    | `<h:inputText>` | `UIInput` | `Object` | `<input type=text>` | 1.0 |

    | `<h:inputTextarea>` | `UIInput` | `Object` | `<textarea>` | 1.0 |

    | `<h:link>` | `UIOutcomeTarget` | `String` | `<a href>` | 2.0 |

    | `<h:message>` | `UIMessage` | - | `<span>` (if necessary) | 1.0 |

    | `<h:messages>` | `UIMessages` | - | `<ul>` | 1.0 |

    | `<h:messages layout=table>` | `UIMessages` | - | `<table>` | 1.0 |

    | `<h:outputFormat>` | `UIOutput` | `Object` | `<span>` (if necessary) | 1.0 |

    | `<h:outputLabel>` | `UIOutput` | `String` | `<label>` | 1.0 |

    | `<h:outputText>` | `UIOutput` | `Object` | `<span>` (if necessary) | 1.0 |

    | `<h:outputScript>` | `UIOutput` | - | `<script>` | 2.0 |

    | `<h:outputStylesheet>` | `UIOutput` | - | `<link rel=stylesheet>` | 2.0 |

    | `<h:panelGrid>` | `UIPanel` | - | `<table>` (static) | 1.0 |

    | `<h:panelGroup>` | `UIPanel` | - | `<span>` | 1.0 |

    | `<h:panelGroup layout=block>` | `UIPanel` | - | `<div>` | 1.2 |

    | `<h:selectBooleanCheckbox>` | `UIInput` | `Boolean` | `<input type=checkbox>`
    | 1.0 |

    | `<h:selectManyCheckbox>` | `UIInput` | `Object[]` | `<table><input type=checkbox>*`
    | 1.0 |

    | `<h:selectManyListbox>` | `UIInput` | `Object[]` | `<select multiple size=n><option>*`
    | 1.0 |

    | `<h:selectManyMenu>` | `UIInput` | `Object[]` | `<select multiple size=1><option>*`
    | 1.0 |

    | `<h:selectOneListbox>` | `UIInput` | `Object` | `<select size=n><option>*` |
    1.0 |

    | `<h:selectOneMenu>` | `UIInput` | `Object` | `<select size=1><option>*` | 1.0
    |

    | `<h:selectOneRadio>` | `UIInput` | `Object` | `<table><input type=radio>*` |
    1.0 |

    | `<h:selectOneRadio group>` | `UIInput` | `Object` | `<input type=radio name=group>`
    | 2.3 |


    The “Component superclass” column specifies the most important `UIComponent` superclass
    the component extends from. You must interpret the specified class to be from
    the `javax.faces.component` package.


    The “Value type” column specifies the supported type of the model value behind
    the component’s `value` attribute, if it has any. If the value type is `String`,
    it means that only the model value’s `toString()` outcome will be used as value
    of the component, generally in components which would render it as some sort of
    label. If it’s `Object`, it means that it supports any kind of value, generally
    in components which would render it as text or parse it as input value, if necessary
    with help of an implicit or explicit `Converter`. If the value type is `Object[]`,
    it means that it requires an array or collection of objects as model value, generally
    in data and multi-selection input components, if necessary with an implicit or
    explicit `Converter`.


    There are two specialized input components. The `<h:inputFile>` binds the uploaded
    file to a `javax.servlet.http.Part` property and doesn’t support outputting it—for
    security reasons—and the `<h:selectBooleanCheckbox>` which binds the checked value
    to a `boolean` property. Those two input components don’t support a `Converter`
    and therefore don’t support any other model value type.


    The “HTML output” column specifies the minimum generated HTML output. If the HTML
    output says “if necessary,” then it means that the specified HTML element is only
    emitted when the component has any attribute specified that requires being outputted
    as a HTML element attribute, such as `id`, `styleClass`, `onclick`, etc. That
    is, a component can have attributes that don’t end up in the generated HTML output
    at all, such as `binding`, `rendered`, `converter`, etc. If a component can have
    multiple HTML element representations, then that’s usually controlled by the `layout`
    attribute as you can see with `<h:messages>` and `<h:panelGroup>`. If the HTML
    output contains “*” (an asterisk), then it means that the component may emit zero
    or more of the specified nested HTML elements.


    The “Since” column indicates the first JSF version the HTML component was available
    in. At the time this book was written, the following JSF versions were available:
    1.0 (March 2004), 1.1 (May 2004), 1.2 (May 2006), 2.0 (July 2009), 2.1 (November
    2010), 2.2 (March 2013), and 2.3 (March 2017).


    The individual HTML components are detailed in Chapters [4](#A454457_1_En_4_Chapter.xhtml)
    and [6](#A454457_1_En_6_Chapter.xhtml).


    ## Standard Core Tags


    Next to the standard HTML components, JSF also provides a set of “core” tags.
    Those are essentially “helper” tags which allow you to declaratively configure
    one or more target HTML components by either nesting in them or wrapping around
