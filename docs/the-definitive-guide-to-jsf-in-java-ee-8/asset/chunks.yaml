    *   `<h:commandButton>`, can optionally contain Ajax functionality.\n*   The Ajax\
    \ functionality requires a `jsf.js` script file in the HTML document.\n\nThe renderer\
    \ of that component will automatically take care of that, but that would only\
    \ work if `<h:head>` is present. The `<h:body>` is slightly less important here,\
