- fmt: "Finally, there are a bunch of `#{cc}` expressions which don’t reference the\
    \ attributes directly. Both of the `<h:selectOneMenu>` drop-downs are directly\
    \ bound as properties of the so-called backing component, the concrete `UIComponent`\
    \ instance behind the composite component. And, both `<f:selectItems>` options\
    \ obtain their values directly from the backing component as well. Here’s the\
    \ backing component class, `com.example.project.composite.InputLocalTime`.\n\n\
    ```java\n@FacesComponent(\"inputLocalTime\")\npublic class InputLocalTime extends\
    \ UIInput implements NamingContainer {\n\n    private static final List<String>\
    \ HOURS =\n        IntStream.rangeClosed(0, 23).boxed()\n            .map(InputLocalTime::pad).collect(Collectors.toList());\n\
    \    private static final List<String> MINUTES =\n        IntStream.rangeClosed(0,\
    \ 59).boxed()\n            .map(InputLocalTime::pad).collect(Collectors.toList());\n\
    \n    private UIInput hour;\n    private UIInput minute;\n\n    @Override\n  \
    \  public String getFamily() {\n        return UINamingContainer.COMPONENT_FAMILY;\n\
    \    }\n\n    @Override\n    public void encodeBegin(FacesContext context) throws\
    \ IOException {                                                          \n  \
    \      LocalTime localTime = (LocalTime) getValue();\n\n        if (localTime\
    \ != null) {\n            hour.setValue(pad(localTime.getHour()));\n         \
    \   minute.setValue(pad(localTime.getMinute()));\n        }\n\n        super.encodeBegin(context);\n\
    \    }\n\n    @Override\n    public Object getSubmittedValue() {\n        String\
    \ submittedHour = (String) hour.getSubmittedValue();\n        String submittedMinute\
    \ = (String) minute.getSubmittedValue();\n\n        if (submittedHour == null\
    \ || submittedMinute == null) {\n            return null;\n        }\n       \
    \ else if (submittedHour.isEmpty() || submittedMinute.isEmpty()) {\n         \
    \   return \"\";\n        }\n        else {\n            return submittedHour\
    \ + \":\" + submittedMinute;\n        }\n    }\n\n    @Override\n    protected\
    \ Object getConvertedValue\n        (FacesContext context, Object submittedValue)\n\
    \    {\n        String submittedTime = (String) submittedValue;\n\n        if\
    \ (submittedTime == null || submittedTime.isEmpty()) {\n            return null;\n\
    \        }\n\n        try {\n            return LocalTime.parse(submittedTime,\n\
    \                DateTimeFormatter.ISO_LOCAL_TIME);\n        }\n        catch\
    \ (DateTimeParseException e) {                                               \
    \           \n            throw new ConverterException(e);\n        }\n    }\n\
    \n    private static String pad(Integer value) {\n        return String.format(\"\
    %02d\", value);\n    }\n\n    public UIInput getHour() { return hour; }\n    public\
    \ void setHour(UIInput hour) { this.hour = hour; }\n    public UIInput getMinute()\
    \ { return minute; }\n    public void setMinute(UIInput minute) { this.minute\
    \ = minute; }\n    public List<String> getHours() { return HOURS; }\n    public\
    \ List<String> getMinutes() { return MINUTES; }\n}\n```\n\nNow, that was a bit\
    \ of code. Not only will you see that the getters and setters are collapsed for\
    \ brevity, but you’ll also see that our composite extends `UIInput` and implements\
    \ `NamingContainer`. Extending from `UIInput` gives us the benefit that we don’t\
    \ need to repeat most of the default encoding and decoding behavior of `UIInput`\
    \ in our backing component, so we only need to override a few methods. Implementing\
    \ `NamingContainer` is a technical requirement of `<cc:interface>`. This enables\
    \ you to use multiple instances of the composite component in the same context\
    \ without facing “duplicate component ID” errors. This requirement is also reflected\
    \ by the overridden `getFamily()` method, which must as per the composite component’s\
    \ contract return the `UINamingContainer.COMPONENT_FAMILY` constant.\n\nThe actual\
    \ `UIInput` components composing the composite component are declared as properties\
    \ of the backing component. In this case they are both `<h:selectOneMenu>` drop-downs\
    \ which are, via the `binding` attribute, tied to those properties. This enables\
    \ us to easily set their values during encoding (read: processing the HTTP response),\
    \ and to obtain the submitted values during decoding (read: processing the HTTP\
    \ request). You can find the logic for that in the overridden `encodeBegin()`\
    \ and `getSubmittedValue()` methods, respectively.\n\nIn the `encodeBegin()` method\
    \ you thus have the opportunity to prepare the displayed values based on the model\
    \ value, if any. The `getValue()` method is inherited from the `UIInput` superclass\
    \ and is tied to the `value` attribute. You can break down the model value and\
    \ set the desired values in the individual `UIInput` components of the composite\
    \ component. The `pad()` helper method just pads the digit with a leading zero\
    \ so that, e.g., the “1” gets displayed as “01”. This helper method is also used\
    \ during static initialization of the lists of available hours and minutes specifically\
    \ for `<f:selectItems>`.\n\nIn the `getSubmittedValue()` method you should compose\
    \ the submitted values of the individual `UIInput` components together to a single\
    \ `String`. In the specific case of `<t:inputLocalTime>`, we compose a `String`\
    \ following the ISO local time pattern `HH:mm`. In turn, the `UIInput` superclass\
    \ passes this value through the `getConvertedValue()` wherein we thus have the\
    \ opportunity to convert the composed `String` to the concrete model value, which\
    \ is in our case the `LocalTime`. Ultimately the `UIInput` superclass will make\
    \ sure that this gets set in the backing bean during the update model values phase.\
    \ Now you can use it as follows:\n\n```xml\n<ui:composition template=\"/WEB-INF/templates/layout.xhtml\"\
    \n    xmlns=\"http://www.w3.org/1999/xhtml\"\n    xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n    xmlns:cc=\"http://xmlns.jcp.org/jsf/composite/components\"\n>\n    <ui:define\
    \ name=\"content\">\n        <h:form>\n            <h:outputLabel for=\"time:hour\"\
    \ value=\"Time\" />\n            <t:inputLocalTime id=\"time\" value=\"#{bean.time}\"\
    \ />\n            <h:commandButton value=\"Submit\" action=\"#{bean.submit}\"\
    >\n                <f:ajax execute=\"@form\" />\n            </h:commandButton>\n\
    \        </h:form>\n    </ui:define>\n</ui:composition>\n```\n\nwhere the backing\
    \ bean represented by `#{bean}` looks as follows:\n\n```java\n@Named @RequestScoped\n\
    public class Bean {\n\n    private LocalTime time;\n\n    public void submit()\
    \ {\n        System.out.println(\"Submitted local time: \" + time);\n    }\n\n\
    \    public LocalTime getTime() {\n        return time;\n    }\n\n    public void\
    \ setTime(LocalTime time) {\n        this.time = time;\n    }\n}\n```\n\nMight\
    \ it happen that you need to nest `<f:ajax>` inside the composite component in\
    \ order to run some Ajax during the change event of any of the individual drop-downs,\
    \ then you can achieve that by adding `<cc:clientBehavior>` targeting both drop-downs\
    \ as follows:\n\n```xml\n<cc:interface ...>\n    ...\n    <cc:clientBehavior name=\"\
    change\" default=\"true\"\n        targets=\"hour minute\" event=\"change\">\n\
    \    </cc:clientBehavior>\n</cc:interface>\n```\n\nThe `name` attribute represents\
    \ the event name which you should declare in template client in order to trigger\
    \ it.\n\n```xml\n<t:inputLocalTime id=\"time\" ...>\n    <f:ajax event=\"change\"\
    \ execute=\"time\" ... />\n</t:inputLocalTime>\n```\n\nThe `default=\"true\"`\
    \ indicates that this is the default event, which means that you could just omit\
    \ it, as you could do with `event=\"change\"` for existing input text and drop-down\
    \ components, and with `event=\"click\"` for existing check box and radio button\
    \ components, and with `event=\"action\"` for existing command components.\n\n\
    ```xml\n<t:inputLocalTime id=\"time\" ...>\n    <f:ajax execute=\"time\" ... />\n\
    </t:inputLocalTime>\n```"
