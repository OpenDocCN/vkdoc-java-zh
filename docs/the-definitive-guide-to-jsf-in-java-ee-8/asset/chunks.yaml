  raw: '## Stateless Forms


    State saving is particularly helpful in dynamically manipulated forms which use
    Ajax to conditionally render parts of the form, such as cascading drop-down menus
    and secondary input fields. JSF remembers the state of the form across Ajax postbacks
    on the same view. Generally, it is those forms where you absolutely need a view-scoped
    managed bean instead of a request-scoped managed bean.


    When your web site has "public" and "private" sections, you''d like to postpone
    the HTTP session creation as much as possible until the end user has actually
    logged in. This way robots won’t trigger the unnecessary creation of the HTTP
    session. However, if you have a standard JSF login form in the public section,
    the HTTP session would already be created by just accessing that page. This is
    an unnecessary cost in terms of server memory if the form has basically no dynamic
    state of its own and is tied to a request-scoped managed bean. You could consider
    using client-side state saving instead, but this will affect the entire web site
    and it has a cost in terms of network bandwidth and CPU (central procession unit)
    power. True, the cost is negligible if you have state-of-the-art hardware, but
    it''s not negligible if you have a lot of visitors and/or relatively poor hardware.


    In case of static forms tied to a request-scoped bean, such as a simple two-field
    login form which can theoretically safely be entirely cleared out on every postback,
    then the view state doesn’t necessarily need to be saved. This can be achieved
    by setting the transient attribute of <f:view> to true.


    ```

    <f:view transient="true">

        <h:form id="login">

            ...

        </h:form>

    </f:view>

    ```


    This way JSF won’t create any view state and the javax.faces.ViewState hidden
    input field will receive a fixed value of “stateless”. Note that this affects
    the entire view and there’s no way to toggle this for only a specific form. JSF
    currently does not support configuring the state saving method on a per-form basis.
    Also, statelessness has an additional disadvantage in that it''s theoretically
    easier to perform a CSRF (cross site request forgery) attack if there''s an open
    XSS hole. (See also the section “Cross Site Request Forgery Protection” in Chapter
    [13](#A454457_1_En_13_Chapter.xhtml).) Fortunately, with JSF it''s already very
    hard to accidentally introduce a XSS hole. The only way to get a XSS hole is to
    use <h:outputText escape="false"> to redisplay user-controlled data.


