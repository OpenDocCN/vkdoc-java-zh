- fmt: "# ViewExpiredException Handling\n\nIf you’ve worked with JSF before, then\
    \ the chance is great that you’ve seen or heard about a `ViewExpiredException`.\
    \ To the point, it will be thrown when the JSF view state associated with the\
    \ postback cannot be found in the HTTP session any more—in other words, when the\
    \ `javax.faces.STATE_SAVING_METHOD` context parameter is set to its default value\
    \ of “server”, and the end user submits a JSF form whose view state cannot be\
    \ found any more on the server side. Note that when the context parameter is set\
    \ to “client”, you still need a `jsf/ClientSideSecretKey` environment entry in\
    \ order to avoid expired views when the server restarts. This all is elaborated\
    \ in the section “View State” in Chapter [3](#A454457_1_En_3_Chapter.xhtml). Also,\
    \ in the section “@ViewScoped” in Chapter [8](#A454457_1_En_8_Chapter.xhtml),\
    \ you can find how to configure the amount of views and managed beans JSF will\
    \ save in the HTTP session.\n\nThere are several circumstances where a `ViewExpiredException`\
    \ may unexpectedly occur. All of them are related to page navigation and the browser\
    \ cache while the end user has recently logged out from the web application. Normally,\
    \ the HTTP session is, during logout, invalidated as a security measure, and the\
    \ end user is redirected to some landing page. When the previously visited web\
    \ page is cacheable, and the end user presses the browser’s back button after\
    \ logout, then the end user may successfully get to see the previously visited\
    \ web page from the browser cache. If it contains any JSF form, then its `javax.faces.ViewState`\
    \ hidden input field will actually refer a view state which does not exist in\
    \ the current session any more. When the end user submits such JSF form, then\
    \ JSF will inevitably throw a `ViewExpiredException`.\n\nAlthough this is an excellent\
    \ security measure, the end user may get confused as the previously visited web\
    \ page actually got successfully loaded in end user’s experience. This is not\
    \ good for user experience. You’d therefore best make sure that stateful JSF pages\
    \ are not cacheable, so that the web browser is forced to actually hit the web\
    \ server when the end user presses the back button and thus load a fresh new page\
    \ with a view state which is actually valid in the current HTTP session. This\
    \ can be achieved with a servlet filter which sets specific response headers which\
    \ instruct the client not to cache the HTTP response. Following is an example\
    \ of such a servlet filter:\n\n```\n@WebFilter(servletNames=\"facesServlet\")\n\
    public class NoCacheFilter implements Filter {\n\n@Override                  \
    \                                        \n    public void doFilter\n        (ServletRequest\
    \ req, ServletResponse res, FilterChain chain)\n            throws IOException,\
    \ ServletException\n    {\n        HttpServletRequest request = (HttpServletRequest)\
    \ req;\n        HttpServletResponse response = (HttpServletResponse) res;\n  \
    \      String resourcePath = request.getContextPath()\n            + ResourceHandler.RESOURCE_IDENTIFIER;\n\
    \nif (!request.getRequestURI().startsWith(resourcePath)) {\n            response.setHeader\n\
    \                (\"Cache-Control\", \"no-store, must-revalidate\");\n       \
    \ }\n\nchain.doFilter(request, response);\n    }\n}\n```\n\nBasically, it hooks\
    \ on all requests which are going to hit the `FacesServlet`, provided that it’s\
    \ configured on a servlet name of “facesServlet” in `web.xml` as follows:\n\n\
    ```\n<servlet>\n    <servlet-name>facesServlet</servlet-name>\n    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    </servlet>\n```\n\nAlternatively, if you have divided your web application into\
    \ a public area with only stateless JSF pages and a restricted area with only\
    \ stateful JSF pages, then you could also map this filter on a specific URL pattern\
    \ which matches only the stateful section, such as `/admin/*`.\n\n```\n@WebFilter(\"\
    /admin/*\")\n```\n\nThe filter example checks first if the HTTP request doesn’t\
    \ represent a JSF resource request before setting the cache control header. Those\
    \ requests are identified by the `/javax.faces.resource` path after the context\
    \ path, which is available by the `ResourceHandler#RESOURCE_IDENTIFIER` constant.\
    \ This is automatically used when you use a JSF resource component, such as `<h:graphicImage>`,\
    \ `<h:outputScript>`, or `<h:outputstyleSheet>`. (See also the section “Resource\
    \ Components” in Chapter [6](#A454457_1_En_6_Chapter.xhtml).) You don’t want to\
    \ disable the browser cache on them as that would otherwise impact the page loading\
    \ performance.\n\nThe cache control header being set is actually only recognized\
    \ by HTTP 1.1-capable clients. HTTP 1.1 was introduced in 1997. In case you would\
    \ like to cover HTTP 1.0 clients as well, which these days are generally only\
    \ ancient proxies or poor users who can’t get something better than Internet Explorer\
    \ 6.0, then you’d best add two more response headers.\n\n```\nresponse.setHeader(\"\
    Pragma\", \"no-cache\"); // HTTP 1.0.\nresponse.setDateHeader(\"Expires\", 0);\
    \ // Proxies.\n```\n\nNow, with this filter in place, the end user won’t any more\
    \ get to see any JSF page from the browser cache and thus can no longer get a\
    \ `ViewExpiredException` on them. However, there are still cases where a `ViewExpiredException`\
    \ is unavoidable. One such case is an end user who has several JSF pages open\
    \ in different browser tabs and logs out in one of them and then performs an action\
    \ in another tab without refreshing the page beforehand. For such a case, you’d\
    \ really need a “Sorry, your session has timed out” error page. This can easily\
    \ be configured as another error page in `web.xml` as follows:\n\n```\n<error-page>\
    \    \n    <exception-type>\n        javax.faces.application.ViewExpiredException\n\
    \    </exception-type>\n    <location>/WEB-INF/errorpages/expired.xhtml</location>\n\
    </error-page>\n```\n\nDo not let it point to a public JSF page, such as a login\
    \ page. In case you really need it to be a public JSF page, use a meta refresh\
    \ header in the error page which redirects the end user further to a public JSF\
    \ page.\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n    <head>\n        <title>Session\
    \ expired</title>\n        <meta http-equiv=\"refresh\"\n            content=\"\
    0;url=#{request.contextPath}/login.xhtml\" />\n    </head>\n    <body>\n     \
    \   <h1>Sorry, your session has timed out</h1>\n        <h3>You will be redirected\
    \ to login page</h3>\n        <p>\n             <a href=\"#{request.contextPath}/login.xhtml\"\
    >\n                 Click here if the redirect didn't work,\n                \
    \ or when you’re impatient.\n             </a>\n         </p>\n    </body>\n</html>\n\
    ```\n\nNote that the “0” in the meta refresh content represents the amount of\
    \ seconds before redirect. Thus, “0” means “redirect immediately.” You can use,\
    \ for example, “3” to let the browser wait 3 seconds before the redirect.\n\n\
    Keep in mind also to configure this location in any custom exception handler such\
    \ as the `AjaxExceptionHandler` demonstrated in the previous section. You also\
    \ need to make sure that your “general” error page is mapped on an error code\
    \ of 500 instead of an exception type of, e.g., `java.lang.Exception` or `java.lang.Throwable`;\
    \ otherwise all exceptions wrapped in `ServletException` would still end up in\
    \ the general error page. JSF will wrap any exception in a `ServletException`\
    \ when it’s thrown during a synchronous (non-Ajax) postback instead of an asynchronous\
    \ (Ajax) postback. The `web.xml` error page mechanism will only extract the root\
    \ cause from the `ServletException` for a second pass through error pages by exception\
    \ type when no matching error page by exception type is found."
  raw: "## ViewExpiredException Handling\n\nIf you’ve worked with JSF before, then\
    \ the chance is great that you’ve seen or heard about a ViewExpiredException .\
    \ To the point, it will be thrown when the JSF view state associated with the\
    \ postback cannot be found in the HTTP session any more—in other words, when the\
    \ javax.faces.STATE_SAVING_METHOD context parameter is set to its default value\
    \ of “server”, and the end user submits a JSF form whose view state cannot be\
    \ found any more on the server side. Note that when the context parameter is set\
    \ to “client”, you still need a “jsf/ClientSideSecretKey” environment entry in\
    \ order to avoid expired views when the server restarts. This all is elaborated\
    \ in the section “View State” in Chapter [3](#A454457_1_En_3_Chapter.xhtml). Also,\
    \ in the section “@ViewScoped” in Chapter [8](#A454457_1_En_8_Chapter.xhtml),\
    \ you can find how to configure the amount of views and managed beans JSF will\
    \ save in the HTTP session.\n\nThere are several circumstances where a ViewExpiredException\
    \ may unexpectedly occur. All of them are related to page navigation and the browser\
    \ cache while the end user has recently logged out from the web application. Normally,\
    \ the HTTP session is, during logout, invalidated as a security measure, and the\
    \ end user is redirected to some landing page. When the previously visited web\
    \ page is cacheable, and the end user presses the browser’s back button after\
    \ logout, then the end user may successfully get to see the previously visited\
    \ web page from the browser cache. If it contains any JSF form, then its javax.faces.ViewState\
    \ hidden input field will actually refer a view state which does not exist in\
    \ the current session any more. When the end user submits such JSF form, then\
    \ JSF will inevitably throw a ViewExpiredException.\n\nAlthough this is an excellent\
    \ security measure, the end user may get confused as the previously visited web\
    \ page actually got successfully loaded in end user’s experience. This is not\
    \ good for user experience. You’d therefore best make sure that stateful JSF pages\
    \ are not cacheable, so that the web browser is forced to actually hit the web\
    \ server when the end user presses the back button and thus load a fresh new page\
    \ with a view state which is actually valid in the current HTTP session. This\
    \ can be achieved with a servlet filter which sets specific response headers which\
    \ instruct the client not to cache the HTTP response. Following is an example\
    \ of such a servlet filter:\n\n```\n@WebFilter(servletNames=\"facesServlet\")\n\
    public class NoCacheFilter implements Filter {\n\n@Override                  \
    \                                        \n    public void doFilter\n        (ServletRequest\
    \ req, ServletResponse res, FilterChain chain)\n            throws IOException,\
    \ ServletException\n    {\n        HttpServletRequest request = (HttpServletRequest)\
    \ req;\n        HttpServletResponse response = (HttpServletResponse) res;\n        String\
    \ resourcePath = request.getContextPath()\n            + ResourceHandler.RESOURCE_IDENTIFIER;\n\
    \nif (!request.getRequestURI().startsWith(resourcePath)) {\n            response.setHeader\n\
                    (\"Cache-Control\", \"no-store, must-revalidate\");\n        }\n\
    \nchain.doFilter(request, response);\n    }\n}\n```\n\nBasically, it hooks on\
    \ all requests which are going to hit the FacesServlet, provided that it’s configured\
    \ on a servlet name of “facesServlet” in web.xml as follows:\n\n```\n<servlet>\n\
        <servlet-name>facesServlet</servlet-name>\n    <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n\
    </servlet>\n```\n\nAlternatively, if you have divided your web application into\
    \ a public area with only stateless JSF pages and a restricted area with only\
    \ stateful JSF pages, then you could also map this filter on a specific URL pattern\
    \ which matches only the stateful section, such as /admin/*.\n\n```\n@WebFilter(\"\
    /admin/*\")\n```\n\nThe filter example checks first if the HTTP request doesn’t\
    \ represent a JSF resource request before setting the cache control header. Those\
    \ requests are identified by the /javax.faces.resource path after the context\
    \ path, which is available by the ResourceHandler#RESOURCE_IDENTIFIER constant.\
    \ This is automatically used when you use a JSF resource component, such as <h:graphicImage>,\
    \ <h:outputScript>, or <h:outputstyleSheet>. (See also the section “Resource Components”\
    \ in Chapter [6](#A454457_1_En_6_Chapter.xhtml).) You don’t want to disable the\
    \ browser cache on them as that would otherwise impact the page loading performance.\n\
    \nThe cache control header being set is actually only recognized by HTTP 1.1-capable\
    \ clients. HTTP 1.1 was introduced in 1997\\. In case you would like to cover\
    \ HTTP 1.0 clients as well, which these days are generally only ancient proxies\
    \ or poor users who can’t get something better than Internet Explorer 6.0, then\
    \ you’d best add two more response headers.\n\n```\nresponse.setHeader(\"Pragma\"\
    , \"no-cache\"); // HTTP 1.0.\nresponse.setDateHeader(\"Expires\", 0); // Proxies.\n\
    ```\n\nNow, with this filter in place, the end user won’t any more get to see\
    \ any JSF page from the browser cache and thus can no longer get a ViewExpiredException\
    \ on them. However, there are still cases where a ViewExpiredException is unavoidable.\
    \ One such case is an end user who has several JSF pages open in different browser\
    \ tabs and logs out in one of them and then performs an action in another tab\
    \ without refreshing the page beforehand. For such a case, you’d really need a\
    \ “Sorry, your session has timed out” error page. This can easily be configured\
    \ as another error page in web.xml as follows:\n\n```\n<error-page>    \n    <exception-type>\n\
            javax.faces.application.ViewExpiredException\n    </exception-type>\n\
        <location>/WEB-INF/errorpages/expired.xhtml</location>\n</error-page>\n```\n\
    \nDo not let it point to a public JSF page, such as a login page. In case you\
    \ really need it to be a public JSF page, use a meta refresh header in the error\
    \ page which redirects the end user further to a public JSF page .\n\n```\n<!DOCTYPE\
    \ html>\n<html lang=\"en\">\n    <head>\n        <title>Session expired</title>\n\
            <meta http-equiv=\"refresh\"\n            content=\"0;url=#{request.contextPath}/login.xhtml\"\
    \ />\n    </head>\n    <body>\n        <h1>Sorry, your session has timed out</h1>\n\
            <h3>You will be redirected to login page</h3>\n        <p>\n             <a\
    \ href=\"#{request.contextPath}/login.xhtml\">\n                 Click here if\
    \ the redirect didn't work,\n                 or when you’re impatient.\n             </a>\n\
             </p>\n    </body>\n</html>\n```\n\nNote that the “0” in the meta refresh\
    \ content represents the amount of seconds before redirect. Thus, “0” means “redirect\
    \ immediately.” You can use, for example, “3” to let the browser wait 3 seconds\
    \ before the redirect.\n\nKeep in mind also to configure this location in any\
    \ custom exception handler such as the AjaxExceptionHandler demonstrated in the\
    \ previous section. You also need to make sure that your “general” error page\
    \ is mapped on an error code of 500 instead of an exception type of, e.g., java.lang.Exception\
    \ or java.lang.Throwable; otherwise all exceptions wrapped in ServletException\
    \ would still end up in the general error page. JSF will wrap any exception in\
    \ a ServletException when it’s thrown during a synchronous (non-Ajax) postback\
    \ instead of an asynchronous (Ajax) postback. The web.xml error page mechanism\
    \ will only extract the root cause from the ServletException for a second pass\
    \ through error pages by exception type when no matching error page by exception\
    \ type is found."
  trans: "\n## ViewExpiredException 处理\n\n如果你之前使用过 JSF，那么很可能见过或听说过 `ViewExpiredException`。简而言之，当与回发关联的\
    \ JSF 视图状态在 HTTP 会话中再也找不到时，就会抛出此异常——换句话说，当 `javax.faces.STATE_SAVING_METHOD` 上下文参数设置为其默认值\
    \ \"server\"，并且最终用户提交了一个 JSF 表单，但其视图状态在服务器端已无法找到时。请注意，当上下文参数设置为 \"client\" 时，你仍然需要一个\
    \ \"jsf/ClientSideSecretKey\" 环境条目，以避免在服务器重启时出现过期视图。所有这些都在第 3 章的 \"视图状态\" 一节中有详细说明。此外，在第\
    \ 8 章的 \"@ViewScoped\" 一节中，你可以找到如何配置 JSF 将在 HTTP 会话中保存的视图和托管 Bean 的数量。\n\n有几种情况可能会导致意外出现\
    \ `ViewExpiredException`。所有这些情况都与页面导航和浏览器缓存有关，同时最终用户最近已从 Web 应用程序注销。通常，在注销期间，HTTP\
    \ 会话会作为安全措施失效，并且最终用户会被重定向到某个登录页面。当之前访问过的网页是可缓存的，并且最终用户在注销后按下浏览器的后退按钮时，那么最终用户可能会成功地从浏览器缓存中看到之前访问过的网页。如果该网页包含任何\
    \ JSF 表单，那么其 `javax.faces.ViewState` 隐藏输入字段实际上会引用一个在当前会话中已不存在的视图状态。当最终用户提交这样的\
    \ JSF 表单时，JSF 将不可避免地抛出 `ViewExpiredException`。\n\n尽管这是一项出色的安全措施，但最终用户可能会感到困惑，因为之前访问过的网页实际上在最终用户的体验中已成功加载。这对用户体验不利。因此，你最好确保有状态的\
    \ JSF 页面不可缓存，这样当最终用户按下后退按钮时，Web 浏览器将被迫实际访问 Web 服务器，从而加载一个全新的页面，其视图状态在当前 HTTP 会话中实际上是有效的。这可以通过一个\
    \ Servlet 过滤器来实现，该过滤器设置特定的响应头，指示客户端不要缓存 HTTP 响应。以下是这样一个 Servlet 过滤器的示例：\n\n```\n\
    @WebFilter(servletNames=\"facesServlet\")\npublic class NoCacheFilter implements\
    \ Filter {\n\n@Override                                                      \
    \    \n    public void doFilter\n        (ServletRequest req, ServletResponse\
    \ res, FilterChain chain)\n            throws IOException, ServletException\n\
        {\n        HttpServletRequest request = (HttpServletRequest) req;\n        HttpServletResponse\
    \ response = (HttpServletResponse) res;\n        String resourcePath = request.getContextPath()\n\
                + ResourceHandler.RESOURCE_IDENTIFIER;\n\nif (!request.getRequestURI().startsWith(resourcePath))\
    \ {\n            response.setHeader\n                (\"Cache-Control\", \"no-store,\
    \ must-revalidate\");\n        }\n\nchain.doFilter(request, response);\n    }\n\
    }\n```\n\n基本上，它会拦截所有将要命中 `FacesServlet` 的请求，前提是它在 `web.xml` 中配置了一个名为 \"facesServlet\"\
    \ 的 Servlet 名称，如下所示：\n\n```\n<servlet>\n    <servlet-name>facesServlet</servlet-name>\n\
        <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>\n</servlet>\n\
    ```\n\n或者，如果你已将 Web 应用程序划分为一个仅包含无状态 JSF 页面的公共区域和一个仅包含有状态 JSF 页面的受限区域，那么你也可以将此过滤器映射到仅匹配有状态部分的特定\
    \ URL 模式，例如 `/admin/*`。\n\n```\n@WebFilter(\"/admin/*\")\n```\n\n该过滤器示例在设置缓存控制头之前，首先检查\
    \ HTTP 请求是否不代表 JSF 资源请求。这些请求由上下文路径之后的 `/javax.faces.resource` 路径标识，该路径可通过 `ResourceHandler#RESOURCE_IDENTIFIER`\
    \ 常量获得。当你使用 JSF 资源组件（例如 `<h:graphicImage>`、`<h:outputScript>` 或 `<h:outputstyleSheet>`）时，会自动使用此路径。（另请参阅第\
    \ 6 章的 \"资源组件\" 一节。）你不想禁用它们上的浏览器缓存，因为那样会影响页面加载性能。\n\n所设置的缓存控制头实际上仅被支持 HTTP 1.1\
    \ 的客户端识别。HTTP 1.1 于 1997 年引入。如果你还想覆盖 HTTP 1.0 客户端（如今通常仅指古老的代理或无法使用比 Internet Explorer\
    \ 6.0 更好的浏览器的可怜用户），那么你最好再添加两个响应头。\n\n```\nresponse.setHeader(\"Pragma\", \"no-cache\"\
    ); // HTTP 1.0.\nresponse.setDateHeader(\"Expires\", 0); // Proxies.\n```\n\n\
    现在，有了这个过滤器，最终用户将无法再从浏览器缓存中看到任何 JSF 页面，因此也就无法再在这些页面上遇到 `ViewExpiredException`。然而，仍然存在一些情况，`ViewExpiredException`\
    \ 是不可避免的。一种情况是，最终用户在多个浏览器标签页中打开了几个 JSF 页面，并在其中一个标签页中注销，然后在另一个标签页中执行操作，而没有事先刷新页面。对于这种情况，你确实需要一个\
    \ \"抱歉，您的会话已超时\" 的错误页面。这可以很容易地在 `web.xml` 中配置为另一个错误页面，如下所示：\n\n```\n<error-page>    \n\
        <exception-type>\n        javax.faces.application.ViewExpiredException\n    </exception-type>\n\
        <location>/WEB-INF/errorpages/expired.xhtml</location>\n</error-page>\n```\n\
    \n不要让它指向一个公共 JSF 页面，例如登录页面。如果你确实需要它成为一个公共 JSF 页面，请在错误页面中使用一个元刷新头，将最终用户进一步重定向到一个公共\
    \ JSF 页面。\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n    <head>\n        <title>会话已过期</title>\n\
            <meta http-equiv=\"refresh\"\n            content=\"0;url=#{request.contextPath}/login.xhtml\"\
    \ />\n    </head>\n    <body>\n        <h1>抱歉，您的会话已超时</h1>\n        <h3>您将被重定向到登录页面</h3>\n\
            <p>\n             <a href=\"#{request.contextPath}/login.xhtml\">\n                 如果重定向未生效，或者您等不及了，\n\
                     请点击此处。\n             </a>\n         </p>\n    </body>\n</html>\n\
    ```\n\n请注意，元刷新内容中的 \"0\" 表示重定向前的秒数。因此，\"0\" 意味着 \"立即重定向\"。例如，你可以使用 \"3\" 让浏览器在重定向前等待\
    \ 3 秒。\n\n还要记住，在任何自定义异常处理器（例如上一节演示的 `AjaxExceptionHandler`）中配置此位置。你还需要确保你的 \"\
    通用\" 错误页面映射到错误代码 500，而不是异常类型（例如 `java.lang.Exception` 或 `java.lang.Throwable`）；否则，所有包装在\
    \ `ServletException` 中的异常仍会进入通用错误页面。当异常在同步（非 Ajax）回发期间（而不是异步（Ajax）回发期间）抛出时，JSF\
    \ 会将任何异常包装在 `ServletException` 中。`web.xml` 错误页面机制仅在按异常类型找不到匹配的错误页面时，才会从 `ServletException`\
    \ 中提取根本原因，以便按异常类型进行第二次错误页面匹配。\n"
- fmt: "# 避免 `ViewExpiredException` 的替代方案\n\n避免 `ViewExpiredException` 的一个完全不同的替代方案是使用无状态\
    \ JSF 视图。这样，JSF 视图状态不会被保存，JSF 视图永远不会过期，而是在每个请求上从头重建。您可以通过将 `<f:view>` 的 `transient`\
    \ 属性设置为 `true` 来启用无状态视图。这在第 [4](#A454457_1_En_4_Chapter.xhtml) 章的“无状态表单”部分中有详细说明。\n\
    \n无论采用哪种解决方案，请确保**不要**使用特定于 Mojarra 的 `com.sun.faces.enableRestoreView11Compatibility`\
    \ 上下文参数。这基本上会开启 JSF 1.0/1.1 关于过期视图的行为。它不会再抛出 `ViewExpiredException`，但实际上也根本没有恢复原始视图状态。它基本上会从头重建视图和所有关联的视图作用域\
    \ bean，从而丢失所有原始状态。由于应用程序会以令人困惑的方式运行（“嘿，我的输入值去哪了..??”），这对用户体验很不利。最好改用无状态 JSF 视图，这样您就可以仅在特定视图中管理应用程序，而不是在所有视图中。\n\
    \n# `IOException` 处理\n\n底层 `HttpServletRequest` 和 `HttpServletResponse` 对象的某些方法可能会抛出\
    \ `IOException`。通常，这仅发生在网络连接意外中断时：例如，最终用户通过按 Web 浏览器中的 Esc 按钮突然停止 HTTP 请求，或者最终用户在当前页面仍在加载时突然导航到不同的网页，甚至最终用户的计算机或网线着火时。这些情况确实是无法避免的。对于作为\
    \ Web 应用程序开发人员的您来说，最好让任何 `IOException` 冒泡到 servlet 容器中。换句话说，绝对没有必要像下面这样捕获它：\n\n\
    ```java\npublic void someAjaxListener() {\n    try {\n        FacesContext.getCurrentInstance()\n\
    \            .getExternalContext().redirect(url);\n    }\n    catch (IOException\
    \ e) {\n        throw new UncheckedIOException(e);\n    }\n}\n```\n\n相反，直接让它通过即可。\n\
    \n```java\npublic void someAjaxListener() throws IOException {               \
    \                                                                       \n   \
    \ FacesContext.getCurrentInstance()\n        .getExternalContext().redirect(url);\n\
    }\n```\n\n# `EJBException` 处理\n\n有时，调用服务方法也可能导致异常。通常，这些异常是有意为之的，例如“实体未找到”、“唯一约束冲突”、“无效的用户凭据”、“实体已被另一个用户修改”等。默认情况下，任何非特定于应用程序的\
    \ `RuntimeException`，例如从 EJB 服务方法抛出的 `NullPointerException` 甚至 JPA 的 `PersistenceException`，都会被包装在\
    \ `EJBException` 中。这使得在 JSF 操作方法中确定实际的根本原因变得笨拙。\n\n```java\npublic void addProduct()\
    \ {\n    FacesMessage message;\n\n    try {\n        Long id = productService.create(product);\n\
    \        message = new FacesMessage(FacesMessage.SEVERITY_INFO,\n            \"\
    Product successfully saved\", \"ID is \" + id);\n    }\n    catch (EJBException\
    \ e) {\n        if (e.getCause() instanceof ConstraintViolationException) {\n\
    \            message = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n       \
    \         \"Duplicate product!\", e.getMessage());\n            context.validationFailed();\n\
    \        }\n        else {\n            throw e;\n        }\n    }\n\n    context.addMessage(null,\
    \ message);\n}\n```\n\n这不是最佳实践。您不仅需要通过检查 `Exception#getCause()` 来确定 EJB 异常的根本原因，而且\
    \ `web.xml` 错误页面机制也无法为例如 `ConstraintViolationException` 显示特定的错误页面，因为它被包装在 `EJBException`\
    \ 中。为了让 EJB 抛出未包装的异常，您需要首先创建一个自定义异常超类，然后使用 `@javax.ejb.ApplicationException` 对其进行注解。[⁴](#A454457_1_En_9_Chapter.xhtml#Fn4)\n\
    \n```java\n@ApplicationException(rollback=true)\npublic abstract class BusinessException\
    \ extends RuntimeException {\n    public BusinessException() {\n        super();\n\
    \    }\n    public BusinessException(Exception cause) {\n        super(cause);\n\
    \    }\n}\n```\n\n请注意注解上的 `rollback=true` 属性。如果您希望 EJB 容器在抛出此异常时回滚任何活动事务，这一点非常重要。以下是此自定义业务异常的一些子类示例。\n\
    \n```java\npublic abstract class QueryException extends BusinessException {}\n\
    public class EntityNotFoundException extends QueryException {}\npublic class DuplicateEntityException\
    \ extends QueryException {}\npublic abstract class CredentialsException extends\
    \ BusinessException {}\npublic class InvalidUsernameException extends CredentialsException\
    \ {}\npublic class InvalidPasswordException extends CredentialsException {}\n\
    ```\n\n请注意，您不必在所有子类上重复 `@ApplicationException`，因为它已经是 `@Inherited`。以下是一些可能抛出这些异常的具体用例：\n\
    \n```java\npublic User getById(Long id) {\n    try {\n        return entityManager\n\
    \            .createQuery(\"FROM User u WHERE u.id = :id\", User.class)\n    \
    \        .setParameter(\"id\", id)\n            .getSingleResult();\n    }\n \
    \   catch (NoResultException e) {\n        throw new EntityNotFoundException(e);\n\
    \    }\n}\n\npublic Optional<User> findByEmail(String email) {\n    try {\n  \
    \      return Optional.of(entityManager\n            .createQuery(\"FROM User\
    \ u\"\n                + \" WHERE u.email = :email\", User.class)\n          \
    \  .setParameter(\"email\", email)\n            .getSingleResult());\n    }\n\
    \    catch (NoResultException e) {\n        return Optional.empty();\n    }\n\
    }\n\npublic User getByEmailAndPassword(String email, String password) {      \
    \                                                                            \
    \              \n    User user = findByEmail(email)\n        .orElseThrow(InvalidUsernameException::new);\n\
    \    Credentials credentials = user.getCredentials();\n    byte[] passwordHash\
    \ = digest(password, credentials.getSalt());\n\n    if (!Arrays.equals(passwordHash,\
    \ credentials.getPasswordHash())) {\n        throw new InvalidPasswordException();\n\
    \    }\n\n    return user;\n}\n```"
  raw: "A completely different alternative to avoid ViewExpiredException is to use\
    \ stateless JSF views. This way nothing of the JSF view state will be saved and\
    \ the JSF views will never expire but will just be rebuilt from scratch on every\
    \ request. You can turn on stateless views by setting the transient attribute\
    \ of <f:view> to true. This is elaborated in the section “Stateless Forms” in\
    \ Chapter [4](#A454457_1_En_4_Chapter.xhtml).\n\nRegardless of the solution, make\
    \ sure you do **not** use the Mojarra-specific com.sun.faces.enableRestoreView11Compatibility\
    \ context parameter. This will basically turn on JSF 1.0/1.1 behavior with regard\
    \ to expired views. It won’t throw the ViewExpiredException any more, but neither\
    \ does it actually restore the original view state at all. It basically recreates\
    \ the view and all associated view scoped beans from scratch and hereby thus loses\
    \ all of original state. As the application will behave in a confusing way (“Hey,\
    \ where are my input values..??”), this is bad for user experience. Better use\
    \ stateless JSF views instead so that you can manage the application in specific\
    \ views only instead of for all views.\n\n## IOException Handling\n\nSome methods\
    \ of the underlying HttpServletRequest and HttpServletResponse objects may throw\
    \ an IOException . Usually, that only happens when the network connection unexpectedly\
    \ breaks: for example, when the end user abruptly stops the HTTP request by pressing\
    \ the Esc button in the web browser, or the end user abruptly navigates to a different\
    \ web page while the current page is still loading, or even when the end user’s\
    \ computer or network cable catches fire. Those circumstances are really unavoidable.\
    \ For you, as web application developer, it’s best to let any IOException bubble\
    \ up into the servlet container. In other words, there’s absolutely no need to\
    \ catch it as follows:\n\n```\npublic void someAjaxListener() {\n    try {\n        FacesContext.getCurrentInstance()\n\
                .getExternalContext().redirect(url);\n    }\n    catch (IOException\
    \ e) {\n        throw new UncheckedIOException(e);\n    }\n}\n```\n\nInstead,\
    \ just let it go.\n\n```\npublic void someAjaxListener() throws IOException {\
    \                                                                            \
    \          \n    FacesContext.getCurrentInstance()\n        .getExternalContext().redirect(url);\n\
    }\n```\n\n## EJBException Handling\n\nSometimes, invoking service methods may\
    \ also cause an exception. Generally, those are on purpose, such as “entity not\
    \ found,” “unique constraint violation,” “invalid user credentials”, “entity is\
    \ in meanwhile modified by another user,” etc. By default, any non-application-specific\
    \ RuntimeException, such as NullPointerException and even JPA’s PersistenceException\
    \ which is thrown from an EJB service method, is wrapped in an EJBException .\
    \ This makes it clumsy to nail down the actual root cause in the JSF action method.\n\
    \n```\npublic void addProduct() {\n    FacesMessage message;\n\ntry {\n        Long\
    \ id = productService.create(product);\n        message = new FacesMessage(FacesMessage.SEVERITY_INFO,\n\
                \"Product successfully saved\", \"ID is \" + id);\n    }\n    catch\
    \ (EJBException e) {\n        if (e.getCause() instanceof ConstraintViolationException)\
    \ {\n            message = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n                \"\
    Duplicate product!\", e.getMessage());\n            context.validationFailed();\n\
    \n}\n        else {\n            throw e;\n        }\n    }\n\ncontext.addMessage(null,\
    \ message);\n}\n```\n\nThis is not the best practice . Not only would you need\
    \ to determine the root cause of the EJB exception by inspecting Exception#getCause(),\
    \ the web.xml error page mechanism would also not be able to show a specific error\
    \ page for, for example, a ConstraintViolationException, because it’s wrapped\
    \ in an EJBException. In order to get EJB to throw it unwrapped, you need to create\
    \ a custom exception superclass first which you then annotate with @javax.ejb.ApplicationException.[⁴](#A454457_1_En_9_Chapter.xhtml#Fn4)\n\
    \n```\n@ApplicationException(rollback=true)\npublic abstract class BusinessException\
    \ extends RuntimeException {\n    public BusinessException() {\n        super();\n\
        }\n    public BusinessException(Exception cause) {\n        super(cause);\n\
        }\n}\n```\n\nNote the rollback=true attribute on the annotation. This is very\
    \ important in case you’d like the EJB container to roll back any active transaction\
    \ from where this exception is being thrown. Following are some examples of subclasses\
    \ of this custom business exception.\n\n```\npublic abstract class QueryException\
    \ extends BusinessException {}\npublic class EntityNotFoundException extends QueryException\
    \ {}\npublic class DuplicateEntityException extends QueryException {}\npublic\
    \ abstract class CredentialsException extends BusinessException {}\npublic class\
    \ InvalidUsernameException extends CredentialsException {}\npublic class InvalidPasswordException\
    \ extends CredentialsException {}\n```\n\nNote that you don’t necessarily need\
    \ to repeat the @ApplicationException over all subclasses as it’s already @Inherited.\
    \ Following are some concrete use cases on which those exceptions could be thrown:\n\
    \n```\npublic User getById(Long id) {\n    try {\n        return entityManager\n\
                .createQuery(\"FROM User u WHERE u.id = :id\", User.class)\n            .setParameter(\"\
    id\", id)\n            .getSingleResult();\n    }\n    catch (NoResultException\
    \ e) {\n        throw new EntityNotFoundException(e);\n    }\n}\n\npublic Optional<User>\
    \ findByEmail(String email) {\n    try {\n        return Optional.of(entityManager\n\
                .createQuery(\"FROM User u\"\n                + \" WHERE u.email =\
    \ :email\", User.class)\n            .setParameter(\"email\", email)\n            .getSingleResult());\n\
        }\n    catch (NoResultException e) {\n        return Optional.empty();\n    }\n\
    }\n\npublic User getByEmailAndPassword(String email, String password) {      \
    \                                                                            \
    \              \n    User user = findByEmail(email)\n        .orElseThrow(InvalidUsernameException::new);\n\
        Credentials credentials = user.getCredentials();\n    byte[] passwordHash\
    \ = digest(password, credentials.getSalt());\n\nif (!Arrays.equals(passwordHash,\
    \ credentials.getPasswordHash())) {\n        throw new InvalidPasswordException();\n\
        }\n\nreturn user;\n}"
  trans: "\n避免 `ViewExpiredException` 的另一种完全不同的方案是使用无状态 JSF 视图。这样，JSF 视图状态将不会被保存，JSF\
    \ 视图也永远不会过期，而是每次请求时都会从头重建。你可以通过将 `<f:view>` 的 `transient` 属性设置为 `true` 来启用无状态视图。第\
    \ 4 章的“无状态表单”一节对此进行了详细说明。\n\n无论采用哪种解决方案，请确保**不要**使用 Mojarra 特有的 `com.sun.faces.enableRestoreView11Compatibility`\
    \ 上下文参数。这基本上会开启 JSF 1.0/1.1 中关于过期视图的行为。它不会再抛出 `ViewExpiredException`，但也不会真正恢复原始的视图状态。它基本上会从头重建视图以及所有关联的视图作用域\
    \ Bean，从而丢失所有原始状态。由于应用程序的行为会令人困惑（“嘿，我输入的值去哪了..??”），这对用户体验很不好。更好的做法是改用无状态 JSF 视图，这样你可以在特定视图中管理应用程序，而不是在所有视图中。\n\
    \n## IOException 处理\n\n底层 `HttpServletRequest` 和 `HttpServletResponse` 对象的某些方法可能会抛出\
    \ `IOException`。通常，这仅发生在网络连接意外中断时：例如，最终用户通过按下 Web 浏览器中的 Esc 按钮突然停止 HTTP 请求，或者最终用户在当前页面仍在加载时突然导航到另一个网页，甚至最终用户的计算机或网线着火时。这些情况确实无法避免。作为\
    \ Web 应用程序开发者，最好的做法是让任何 `IOException` 向上冒泡到 Servlet 容器。换句话说，完全没有必要像下面这样捕获它：\n\n\
    ```\npublic void someAjaxListener() {\n    try {\n        FacesContext.getCurrentInstance()\n\
                .getExternalContext().redirect(url);\n    }\n    catch (IOException\
    \ e) {\n        throw new UncheckedIOException(e);\n    }\n}\n```\n\n相反，直接让它抛出即可。\n\
    \n```\npublic void someAjaxListener() throws IOException {                   \
    \                                                                   \n    FacesContext.getCurrentInstance()\n\
            .getExternalContext().redirect(url);\n}\n```\n\n## EJBException 处理\n\n\
    有时，调用服务方法也可能导致异常。通常，这些异常是有意为之的，例如“实体未找到”、“违反唯一约束”、“无效的用户凭据”、“实体已被其他用户修改”等。默认情况下，任何非特定于应用程序的\
    \ `RuntimeException`，例如 `NullPointerException`，甚至从 EJB 服务方法抛出的 JPA 的 `PersistenceException`，都会被包装在\
    \ `EJBException` 中。这使得在 JSF 操作方法中确定实际的根本原因变得笨拙。\n\n```\npublic void addProduct()\
    \ {\n    FacesMessage message;\n\ntry {\n        Long id = productService.create(product);\n\
            message = new FacesMessage(FacesMessage.SEVERITY_INFO,\n            \"\
    Product successfully saved\", \"ID is \" + id);\n    }\n    catch (EJBException\
    \ e) {\n        if (e.getCause() instanceof ConstraintViolationException) {\n\
                message = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n                \"\
    Duplicate product!\", e.getMessage());\n            context.validationFailed();\n\
    \n}\n        else {\n            throw e;\n        }\n    }\n\ncontext.addMessage(null,\
    \ message);\n}\n```\n\n这不是最佳实践。你不仅需要通过检查 `Exception#getCause()` 来确定 EJB 异常的根本原因，而且\
    \ web.xml 错误页面机制也无法为例如 `ConstraintViolationException` 显示特定的错误页面，因为它被包装在 `EJBException`\
    \ 中。为了让 EJB 抛出未包装的异常，你需要首先创建一个自定义异常超类，然后使用 `@javax.ejb.ApplicationException` 对其进行注解。⁴\n\
    \n```\n@ApplicationException(rollback=true)\npublic abstract class BusinessException\
    \ extends RuntimeException {\n    public BusinessException() {\n        super();\n\
        }\n    public BusinessException(Exception cause) {\n        super(cause);\n\
        }\n}\n```\n\n请注意注解上的 `rollback=true` 属性。如果你希望 EJB 容器在抛出此异常时回滚任何活动事务，这一点非常重要。以下是此自定义业务异常的一些子类示例。\n\
    \n```\npublic abstract class QueryException extends BusinessException {}\npublic\
    \ class EntityNotFoundException extends QueryException {}\npublic class DuplicateEntityException\
    \ extends QueryException {}\npublic abstract class CredentialsException extends\
    \ BusinessException {}\npublic class InvalidUsernameException extends CredentialsException\
    \ {}\npublic class InvalidPasswordException extends CredentialsException {}\n\
    ```\n\n请注意，你不需要在所有子类上重复 `@ApplicationException`，因为它已经是 `@Inherited` 的。以下是一些可能抛出这些异常的具体用例：\n\
    \n```\npublic User getById(Long id) {\n    try {\n        return entityManager\n\
                .createQuery(\"FROM User u WHERE u.id = :id\", User.class)\n            .setParameter(\"\
    id\", id)\n            .getSingleResult();\n    }\n    catch (NoResultException\
    \ e) {\n        throw new EntityNotFoundException(e);\n    }\n}\n\npublic Optional<User>\
    \ findByEmail(String email) {\n    try {\n        return Optional.of(entityManager\n\
                .createQuery(\"FROM User u\"\n                + \" WHERE u.email =\
    \ :email\", User.class)\n            .setParameter(\"email\", email)\n            .getSingleResult());\n\
        }\n    catch (NoResultException e) {\n        return Optional.empty();\n    }\n\
    }\n\npublic User getByEmailAndPassword(String email, String password) {      \
    \                                                                            \
    \              \n    User user = findByEmail(email)\n        .orElseThrow(InvalidUsernameException::new);\n\
        Credentials credentials = user.getCredentials();\n    byte[] passwordHash\
    \ = digest(password, credentials.getSalt());\n\nif (!Arrays.equals(passwordHash,\
    \ credentials.getPasswordHash())) {\n        throw new InvalidPasswordException();\n\
        }\n\nreturn user;\n}\n"
- fmt: "```java\npublic Long create(User user) {\n    if (findByEmail(user.getEmail()).isPresent())\
    \ {\n        throw new DuplicateEntityException();\n    }\n    entityManager.persist(user);\n\
    \    return user.getId();\n}\n```\n\n在 JSF 后台 bean 的动作方法中，你可以相应地处理它们。\n\n```java\n\
    public void signup() {\n    FacesMessage message;\n\n    try {\n        userService.create(product);\n\
    \        message = new FacesMessage(\"You are successfully signed up!\");\n  \
    \  }\n    catch (DuplicateEntityException e) {\n        message = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n\
    \            \"Sorry, username already taken!\", e.getMessage());\n        context.validationFailed();\n\
    \    }\n\n    context.addMessage(null, message);\n}\n```\n\n为了进一步减少样板代码，你甚至可以让所有业务异常自行传播，并使用自定义异常处理器来处理它们。\n\
    \n```java\npublic class BusinessExceptionHandler extends ExceptionHandlerWrapper\
    \ {\n\n    public BusinessExceptionHandler(ExceptionHandler wrapped) {\n     \
    \   super(wrapped);\n    }\n\n    @Override\n    public void handle() {\n    \
    \    handleBusinessException(FacesContext.getCurrentInstance());\n        getWrapped().handle();\n\
    \    }\n\n    protected void handleBusinessException(FacesContext context) {\n\
    \        Iterator<ExceptionQueuedEvent> unhandledExceptionQueuedEvents =\n   \
    \         getUnhandledExceptionQueuedEvents().iterator();\n\n        if (context\
    \ == null\n            || !unhandledExceptionQueuedEvents.hasNext()\n        )\
    \ {\n            return;\n        }\n\n        Throwable exception = unhandledExceptionQueuedEvents\n\
    \            .next().getContext().getException();\n\n        while (exception.getCause()\
    \ != null\n            && (exception instanceof FacesException\n             \
    \   || exception instanceof ELException)\n        ) {\n            exception =\
    \ exception.getCause();\n        }\n\n        if (!(exception instanceof BusinessException))\
    \ {\n            return;\n        }\n\n        context.addMessage(null, new FacesMessage(\
    \                                                                            \
    \                    \n            FacesMessage.SEVERITY_FATAL,\n            exception.toString(),\n\
    \            exception.getMessage()));\n        context.validationFailed();\n\
    \        context.getPartialViewContext()\n            .getRenderIds().add(\"globalMessages\"\
    );\n\n        unhandledExceptionQueuedEvents.remove();\n\n        while (unhandledExceptionQueuedEvents.hasNext())\
    \ {\n            unhandledExceptionQueuedEvents.next();\n            unhandledExceptionQueuedEvents.remove();\n\
    \        }\n    }\n\n    public static class Factory extends ExceptionHandlerFactory\
    \ {\n\n        public Factory(ExceptionHandlerFactory wrapped) {\n           \
    \ super(wrapped);\n        }\n\n        @Override\n        public ExceptionHandler\
    \ getExceptionHandler() {\n            return new BusinessExceptionHandler\n \
    \               (getWrapped().getExceptionHandler());\n        }\n    }\n}\n```\n\
    \n是的，这确实类似于前面“Ajax 异常处理器”一节中展示的`AjaxExceptionHandler`。然而，第一个区别是，当响应已提交或不是 Ajax\
    \ 请求时，它不会跳过异常处理。第二个区别在于提取异常根本原因和排空剩余未处理异常事件之间的逻辑。这个`BusinessExceptionHandler`将检查根本原因是否是`BusinessException`的实例，如果是，它将添加一个\
    \ faces 消息，并指示 JSF 显式更新由`\"globalMessages\"`标识的组件，该组件应指向主模板中的全局消息组件，如下所示：\n\n\
    ```xml\n<h:messages id=\"globalMessages\" globalOnly=\"true\" />\n```\n\n最终，所有与业务异常相关的\
    \ faces 消息都将汇集到那里。你可能已经注意到，通过调用`FacesContext#validationFailed()`，faces 上下文被显式标记为“验证失败”。这通常在\
    \ Facelet 模板中的任何代码依赖于此状态时非常有用。如果你希望将其与非业务异常的`AjaxExceptionHandler`一起运行，则需要在`faces-config.xml`中*在*`AjaxExceptionHandler`*之后*注册它。在`faces-config.xml`中声明较晚的任何内容都将有效地包装先前声明的内容。这也适用于自定义异常处理器工厂。当`BusinessExceptionHandler`确认异常不是`BusinessException`的实例时，它将把未处理的异常留在队列中，从方法返回，并最终委托给被包装的`ExceptionHandler`的`handle()`方法，即`AjaxExceptionHandler`。\n\
    \n```xml\n<factory>\n    <exception-handler-factory>\n        com.example.project.AjaxExceptionHandler$Factory\n\
    \    </exception-handler-factory>\n    <exception-handler-factory>\n        com.example.project.BusinessExceptionHandler$Factory\n\
    \    </exception-handler-factory>\n</factory>\n```\n\n有了`BusinessExceptionHandler`，你可以进一步简化后台\
    \ bean 的动作方法，如下所示：\n\n```java\npublic void signup() {\n    userService.create(product);\n\
    \    context.addMessage(null,\n        new FacesMessage(\"You are successfully\
    \ signed up!\"));\n}\n```\n\n# 脚注\n\n1.  [https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandler.html](https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandler.html)\n\
    2.  [https://javaee.github.io/javaee-spec/javadocs/javax/servlet/RequestDispatcher.html#ERROR_EXCEPTION](https://javaee.github.io/javaee-spec/javadocs/javax/servlet/RequestDispatcher.html%23ERROR_EXCEPTION)\n\
    3.  [https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandlerFactory.html](https://javaee.github.io/javaee-spec/javadocs/javax/faces/context/ExceptionHandlerFactory.html)\n\
    4.  [https://javaee.github.io/javaee-spec/javadocs/javax/ejb/ApplicationException.html](https://javaee.github.io/javaee-spec/javadocs/javax/ejb/ApplicationException.html)\n\
    \n© Bauke Scholtz, Arjan Tijms 2018\n\nBauke Scholtz 和 Arjan Tijms，《Java EE 8\
    \ 中 JSF 的权威指南》，[https://doi.org/10.1007/978-1-4842-3387-0_10](https://doi.org/10.1007/978-1-4842-3387-0_10)\n\
    \n# 10. WebSocket 推送\n\nBauke Scholtz¹ 和 Arjan Tijms²\n\n(1) 荷兰，威廉斯塔德，库拉索\n\n\
    (2) 荷兰，北荷兰省，阿姆斯特丹\n\nJSF 1.0 引入了基于 HTML 表单的 POST 动作支持。JSF 2.0 引入了基于 AJAX 的 POST\
    \ 支持。JSF 2.0 引入了 GET 查询字符串参数映射支持。JSF 2.2 引入了基于 GET 的动作支持。JSF 2.3 引入了 WebSocket\
    \ 支持。\n\nJSF 的 WebSocket 支持由新的`<f:websocket>`标签、`PushContext`接口和`@Push`注解表示。它建立在\
    \ Java EE 7 中引入的 JSR-356 WebSocket 规范之上。因此，从技术上讲，它也可以在 Java EE 7 环境中使用。自 7.0.27\
    \ 版本起，Tomcat 原生支持 JSR-356，自 9.1.0 版本起，Jetty 也原生支持。\n\n在 Mojarra 中，`<f:websocket>`有一个额外的\
    \ Java EE 7 依赖：JSON-P (JSR-353)。如果你的目标环境是 Tomcat 或 Jetty 而非 Java EE 应用服务器，你可能需要单独安装它。JSON-P\
    \ 在内部用于将 Java 对象转换为 JSON 字符串，以便可以轻松地传输到客户端，并作为附加到`<f:websocket>`的 JavaScript 监听器函数的参数提供。"
  raw: "public Long create(User user) {\n    if (findByEmail(user.getEmail()).isPresent())\
    \ {\n        throw new DuplicateEntityException();\n    }\n    entityManager.persist(user);\n\
        return user.getId();\n}\n```\n\nIn the JSF backing bean action methods, you\
    \ could then handle them accordingly.\n\n```\npublic void signup() {\n    FacesMessage\
    \ message;\n\ntry {\n        userService.create(product);\n        message = new\
    \ FacesMessage(\"You are successfully signed up!\");\n    }\n    catch (DuplicateEntityException\
    \ e) {\n        message = new FacesMessage(FacesMessage.SEVERITY_ERROR,\n            \"\
    Sorry, username already taken!\", e.getMessage());\n        context.validationFailed();\n\
        }\n\ncontext.addMessage(null, message);\n}\n```\n\nIn order to further reduce\
    \ the boilerplate code , you could even let all business exceptions go and have\
    \ a custom exception handler to handle them.\n\n```\npublic class BusinessExceptionHandler\
    \ extends ExceptionHandlerWrapper {\n\npublic BusinessExceptionHandler(ExceptionHandler\
    \ wrapped) {\n        super(wrapped);\n    }\n\n@Override\n    public void handle()\
    \ {\n        handleBusinessException(FacesContext.getCurrentInstance());\n        getWrapped().handle();\n\
        }\n\nprotected void handleBusinessException(FacesContext context) {\n        Iterator<ExceptionQueuedEvent>\
    \ unhandledExceptionQueuedEvents =\n            getUnhandledExceptionQueuedEvents().iterator();\n\
    \nif (context == null\n            || !unhandledExceptionQueuedEvents.hasNext()\n\
            ) {\n            return;\n        }\n\nThrowable exception = unhandledExceptionQueuedEvents\n\
                .next().getContext().getException();\n\nwhile (exception.getCause()\
    \ != null\n            && (exception instanceof FacesException\n                ||\
    \ exception instanceof ELException)\n        ) {\n            exception = exception.getCause();\n\
            }\n\nif (!(exception instanceof BusinessException)) {\n            return;\n\
            }\n\ncontext.addMessage(null, new FacesMessage(                      \
    \                                                                          \n\
                FacesMessage.SEVERITY_FATAL,\n            exception.toString(),\n\
                exception.getMessage()));\n        context.validationFailed();\n        context.getPartialViewContext()\n\
                .getRenderIds().add(\"globalMessages\");\n\nunhandledExceptionQueuedEvents.remove();\n\
    \nwhile (unhandledExceptionQueuedEvents.hasNext()) {\n            unhandledExceptionQueuedEvents.next();\n\
                unhandledExceptionQueuedEvents.remove();\n        }\n    }\n\npublic\
    \ static class Factory extends ExceptionHandlerFactory {\n\npublic Factory(ExceptionHandlerFactory\
    \ wrapped) {\n            super(wrapped);\n        }\n\n@Override\n        public\
    \ ExceptionHandler getExceptionHandler() {\n            return new BusinessExceptionHandler\n\
                    (getWrapped().getExceptionHandler());\n        }\n    }\n\n}\n\
    ```\n\nYes, it’s indeed similar to the AjaxExceptionHandler as shown in the earlier\
    \ section “Ajax Exception Handler .” However, the first difference is that it\
    \ doesn’t skip handling the exception when the response is already committed or\
    \ when it’s not an Ajax request. The second difference is the logic between extracting\
    \ the root cause of the exception and draining the remaining unhandled exception\
    \ events. This BusinessExceptionHandler will instead check if the root cause is\
    \ an instance of BusinessException and if so, it will add a faces message and\
    \ instruct JSF to explicitly update the component identified by “globalMessages”,\
    \ which should refer to a global messages component in your master template something\
    \ like the following:\n\n```\n<h:messages id=\"globalMessages\" globalOnly=\"\
    true\" />\n```\n\nUltimately, all business exception-related faces messages will\
    \ end up there. You might have noticed that the faces context is explicitly marked\
    \ as “validation failed” via the FacesContext#validationFailed() call. This is\
    \ generally useful in case any code in the Facelet template is relying on it.\
    \ If you would like to run it together with the AjaxExceptionHandler for non-business\
    \ exceptions, then you need to register it in the faces-config.xml *after* the\
    \ AjaxExceptionHandler. Anything that is declared later in the faces-config.xml\
    \ will effectively wrap the previously declared one. This also applies to custom\
    \ exception handler factories. When the BusinessExceptionHandler confirms that\
    \ the exception is not an instance of BusinessException, then it will leave the\
    \ unhandled exception in the queue and return from the method and finally delegate\
    \ to the handle() method of the wrapped ExceptionHandler, which shall be the AjaxExceptionHandler.\n\
    \n```\n<factory>\n    <exception-handler-factory>\n        com.example.project.AjaxExceptionHandler$Factory\n\
        </exception-handler-factory>\n    <exception-handler-factory>\n        com.example.project.BusinessExceptionHandler$Factory\n\
        </exception-handler-factory>\n</factory>\n```\n\nWith the BusinessExceptionHandler\
