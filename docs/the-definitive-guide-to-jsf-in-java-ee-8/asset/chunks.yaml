- fmt: "They will be rendered in the same order as they are declared in the view.\
    \ Only when you use an unordered `Map` implementation as value, such as `HashMap`,\
    \ the order of items provided by `<f:selectItems>` will be undefined. It’s therefore\
    \ better to use an ordered `Map` implementation, such as `TreeMap` or `LinkedHashMap`.\
    \ When populating the available items as a `Map`, keep in mind that the map key\
    \ represents the item label and the map value represents the item value. You’d\
    \ perhaps intuitively expect it to be the other way around, but this was a technical\
    \ limitation. That is, on the Java side, the map key enforces uniqueness while\
    \ the map value doesn’t. And on the HTML side, the option label is supposed to\
    \ be unique while the option value doesn’t need to be. Following is how you can\
    \ populate such a map:\n\n```\nprivate Map<String, String> availableItems;\n\n\
    @PostConstruct\npublic void init() {\n    availableItems = new LinkedHashMap<>();\n\
    \    availableItems.put(\"First item\", \"one\");\n    availableItems.put(\"Second\
    \ item\", \"two\");\n    availableItems.put(\"Third item\", \"three\");\n}\n\n\
    // Add/generate getter. Note that a setter is unnecessary.\n```\n\nAs said, you\
    \ can also use a `TreeMap` or `HashMap`, but then the item labels will become,\
    \ respectively, sorted or unsorted, regardless of the insertion order.\n\nIn case\
    \ you’d really like to swap the map keys and values around on the view side, you\
    \ can always do so by manually assigning the map entry value as an item label\
    \ and the map entry key as an item value. You can do that with help of the `var`\
    \ attribute of the `<f:selectItems>` by which you can declare the EL variable\
    \ name of the currently iterated item. This can, in turn, be accessed in the `itemValue`\
    \ and `itemLabel` attributes of the same tag. When you pass `Map#entrySet()` to\
    \ the `value` attribute of the `<f:selectItems>`, then each iterated item will\
    \ represent a `Map.Entry` instance. This has, in turn, `getKey()` and `getValue()`\
    \ methods which are thus perfectly usable as EL properties.\n\n```\n<f:selectItems\
    \ value=\"#{bean.availableItems.entrySet()}\" var=\"entry\"\n    itemValue=\"\
    #{entry.key}\" itemLabel=\"#{entry.value}\">\n</f:selectItems>\n```\n\nThis also\
    \ works when using a `Collection` or array as available items. You don’t explicitly\
    \ need to first convert it to a `Set` (more specifically, `Iterable`), as demonstrated\
    \ above. This is particularly useful when you have a `Collection` or an array\
    \ of complex objects as available items, such as model entities.\n\nModel entity\
    \ representing a “country”:\n\n```\npublic class Country {\n\nprivate Long id;\n\
    \    private String code;\n    private String name;\n\n// Add/generate getters\
    \ and setters.\n}\n```\n\nBacking bean:\n\n```\n@Named @RequestScoped\npublic\
    \ class Bean {\n\nprivate String countryCode;\n    private List<Country> availableCountries;\n\
    \n@Inject\n    private CountryService countryService;\n\n@PostConstruct\n    public\
    \ void init() {\n        availableCountries = countryService.getAll();\n    }\n\
    \n// Add/generate getters and setters.\n    // Note that a setter is unnecessary\
    \ for availableCountries.\n}\n```\n\nView:\n\n```\n<h:selectOneMenu id=\"countryCode\"\
    \ value=\"#{bean.countryCode}\">\n    <f:selectItem itemValue=\"#{null}\" itemLabel=\"\
    -- select one --\" />\n    <f:selectItems value=\"#{bean.availableCountries}\"\
    \ var=\"country\">\n        itemValue=\"#{country.code}\" itemLabel=\"#{country.name}\"\
    \n    </f:selectItems>\n</h:selectOneMenu>\n```\n\nNote that any persistence framework-specific\
    \ annotations, such as JPA’s `@Entity` and `@Id`, and the actual implementation\
    \ of `CountryService`, are omitted for clarity. Those are irrelevant to any front-end\
    \ framework, such as JSF.\n\nWith the above construct, the value as obtained from\
    \ `Country#getCode()` will end up as value of the generated HTML `<option>` element.\
    \ Now, when the form is submitted, it will become the submitted value of the selection\
    \ component, which will in turn invoke the setter method behind the `#{bean.countryCode}`\
    \ property with exactly that value. Of course, you can also use the whole `Country`\
    \ object as the property value of the selection component, but that would require\
    \ a converter which can convert between the complex object and a unique string\
    \ suitable to be embedded in HTML output and sent as an HTTP request parameter.\
    \ You can read more in Chapter [5](#A454457_1_En_5_Chapter.xhtml).\n\n## SelectItemGroup\n\
    \nIn case you’d like to group a bunch of options under a common label, you can\
    \ use the `javax.faces.model.SelectItemGroup`, which you in turn reference in\
