- fmt: "# Custom Error Pages\n\nWhile useful to the average web developer, those default\
    \ error pages are, quite frankly, scary to the average end user. The “look ’n’\
    \ feel” is completely off from the rest of the site and the text is like abracadabra\
    \ to the average end user. Such an error page doesn’t even provide escape points\
    \ for the end user. The disgruntled end user cannot quickly find its way to the\
    \ home or contact page. Fortunately for the end user, you can override those default\
    \ error pages by including an error page in the web application and registering\
    \ its location in an `<error-page>` entry in `web.xml`.\n\n```\n<error-page>\n\
    \    <error-code>500</error-code>\n    <location>/WEB-INF/errorpages/500.xhtml</location>\n\
    </error-page>\n```\n\nThe custom error page is purposefully being placed in a\
    \ `/WEB-INF` folder so that end users can’t access or bookmark them directly.\
    \ By default, the servlet container will set error page related attributes in\
    \ the request scope whose keys are defined as `javax.servlet.RequestDispatcher.ERROR_XXX`\
    \ constants. This way you can, if necessary, include them in the custom error\
    \ page. Following is an example:\n\n```\n<dl>\n    <dt>Request URI</dt>\n    <dd>#{requestScope['javax.servlet.error.request_uri']}</dd>\n\
    \    <dt>Exception type</dt>\n    <dd>#{requestScope['javax.servlet.error.exception']['class']}</dd>\n\
    \    <dt>Exception message</dt>\n    <dd>#{requestScope['javax.servlet.error.exception'].message}</dd>\n\
    \    <dt>Stack trace</dt>\n    <dd><pre>#{\n        facesContext.externalContext.response.writer.flush()\n\
    \     }#{\n        requestScope['javax.servlet.error.exception'].printStackTrace\n\
    \            (facesContext.externalContext.response.writer)\n     }</pre></dd>\n\
    </dl>\n```\n\nNote the trick to print the stack trace. It’s important that the\
    \ response writer is flushed before printing the stack trace, and that there’s\
    \ no whitespace in template text outside the EL (Expression Language) expressions\
    \ within the `<pre>` element, otherwise it would be appended to the stack trace.\n\
    \nComing back to the scariness of such an error page, you’d better hide away all\
    \ the error detail behind a condition that evaluates only true when the JSF project\
    \ stage equals `Development`. First set an application-scoped shortcut variable\
    \ in some master template:\n\n```\n<c:set var=\"DEV\" scope=\"application\"\n\
    \    value=\"#{facesContext.application.projectStage eq 'Development'}\">\n</c:set>\n\
    ```\n\nNow you can conditionally display technical information in the error page\
    \ when the JSF project stage equals `Development`.\n\n```\n<c:if test=\"#{DEV}\"\
    >\n    <h3>Error detail for developer</h3>\n    <dl>\n        ...\n    </dl>\n\
    </c:if>\n```\n\nIn any case, it’s very important that the error page is entirely\
    \ stateless. In other words, a decent error page may not contain any JSF forms,\
    \ not even a logout form. Not only will you avoid the risk that the form submit\
    \ fails because the initial exception was actually caused by a corrupted JSF state,\
    \ but those forms will actually submit to the wrong URL (uniform resource locator),\
    \ namely, the one of the error page itself. As the error page is hidden in the\
    \ `/WEB-INF` folder, the form submit would only result in a 404 error. Instead\
    \ of moving the error page outside the `/WEB-INF` folder, you could work around\
    \ the logout case by using a plain HTML form which submits to a plain `Servlet`.\
    \ The `SecurityContext` is also just injectable over there, as are session-scoped\
    \ managed beans, if any.\n\n# Ajax Exception Handling\n\nBy default, when an exception\
    \ occurs during a JSF Ajax request, the end user would not get any form of feedback\
    \ whether or not the action was successfully performed. In Mojarra, only when\
    \ the JSF project stage is set to `Development`, the end user would see a bare\
    \ JavaScript alert with only the exception type and message (see Figure 9-3).\n\
    \n![A454457_1_En_9_Fig3_HTML.jpg](OEBPS/Images/A454457_1_En_9_Fig3_HTML.jpg)\n\
    \n###### Figure 9-3 The JavaScript alert when an exception is thrown during an\
    \ Ajax request in Mojarra 2.3.3 in Development stage\n\nThis isn’t terribly useful.\
    \ And in the `Production` stage the end user wouldn’t even get any feedback. The\
    \ web application would fail silently, leaving the end user behind as if nothing\
    \ had happened, which is just confusing and bad for user experience. It would\
    \ make more sense if exceptions during JSF Ajax requests are handled the same\
    \ way as exceptions during synchronous requests, which reuse exactly the same\
    \ error page as the one declared as `<error-page>` in `web.xml`. In other words,\
    \ the end user should be able to see the error page in full glory. This can be\
    \ achieved by creating a custom `ExceptionHandler` implementation which basically\
    \ instructs JSF to create a new `UIViewRoot` based on the error page and then\
    \ build and render it. It’s only quite a bit of code. At its simplest it can look\
    \ as follows:\n\n```\npublic class AjaxExceptionHandler extends ExceptionHandlerWrapper\
    \ {\n\n    public AjaxExceptionHandler(ExceptionHandler wrapped) {\n        super(wrapped);\n\
    \    }\n\n    @Override\n    public void handle() {\n        handleAjaxException(FacesContext.getCurrentInstance());\n\
    \        getWrapped().handle();\n    }\n\n    protected void handleAjaxException(FacesContext\
    \ context) {\n        Iterator<ExceptionQueuedEvent> unhandledExceptionQueuedEvents\
    \ =\n            getUnhandledExceptionQueuedEvents().iterator();\n\n        if\
    \ (context == null\n            || context.getExternalContext().isResponseCommitted()\n\
    \            || !context.getPartialViewContext().isAjaxRequest()\n           \
    \ || !unhandledExceptionQueuedEvents.hasNext()\n        ) {\n            return;\n\
    \        }\n\n        Throwable exception = unhandledExceptionQueuedEvents\n \
    \           .next().getContext().getException();\n\n        while (exception.getCause()\
    \ != null\n            && (exception instanceof FacesException\n             \
    \   || exception instanceof ELException)\n        ) {\n            exception =\
    \ exception.getCause();\n        }\n\n        ExternalContext external = context.getExternalContext();\n\
    \        String uri = external.getRequestContextPath()\n            + external.getRequestServletPath();\n\
    \        Map<String, Object> requestScope = external.getRequestMap();\n      \
    \  requestScope.put(RequestDispatcher.ERROR_REQUEST_URI, uri);\n        requestScope.put(RequestDispatcher.ERROR_EXCEPTION,\
    \ exception);\n\n        String viewId = \"/WEB-INF/errorpages/500.xhtml\";\n\
    \        Application application = context.getApplication();\n        ViewHandler\
    \ viewHandler = application.getViewHandler();\n        UIViewRoot viewRoot = viewHandler.createView(context,\
    \ viewId);\n        context.setViewRoot(viewRoot);\n\n        try {\n        \
    \    external.responseReset();\n            ViewDeclarationLanguage viewDeclarationLanguage\
    \ =\n                viewHandler.getViewDeclarationLanguage(context, viewId);\n\
    \            viewDeclarationLanguage.buildView(context, viewRoot);\n         \
    \   context.getPartialViewContext().setRenderAll(true);\n            viewDeclarationLanguage.renderView(context,\
    \ viewRoot);\n            context.responseComplete();\n        }\n        catch\
    \ (IOException e) {\n            throw new FacesException(e);\n        }\n   \
    \     finally {\n            requestScope.remove(RequestDispatcher.ERROR_EXCEPTION);\n\
    \        }\n\n        unhandledExceptionQueuedEvents.remove();\n\n        while\
    \ (unhandledExceptionQueuedEvents.hasNext()) {\n            unhandledExceptionQueuedEvents.next();\n\
    \            unhandledExceptionQueuedEvents.remove();\n        }\n    }\n\n  \
    \  public static class Factory\n            extends ExceptionHandlerFactory {\n\
    \n        public Factory(ExceptionHandlerFactory wrapped) {\n            super(wrapped);\n\
    \        }\n\n        @Override\n        public ExceptionHandler getExceptionHandler()\
    \ {\n            return new AjaxExceptionHandler\n                (getWrapped().getExceptionHandler());\n\
    \        }\n    }\n}\n```"
  raw: '## Custom Error Pages


    While useful to the average web developer , those default error pages are, quite
    frankly, scary to the average end user. The “look ’n’ feel” is completely off
    from the rest of the site and the text is like abracadabra to the average end
    user. Such an error page doesn’t even provide escape points for the end user.
    The disgruntled end user cannot quickly find its way to the home or contact page.
    Fortunately for the end user, you can override those default error pages by including
    an error page in the web application and registering its location in an <error-page>
    entry in web.xml.


    ```

    <error-page>

        <error-code>500</error-code>

        <location>/WEB-INF/errorpages/500.xhtml</location>

    </error-page>

    ```


    The custom error page is purposefully being placed in a /WEB-INF folder so that
    end users can’t access or bookmark them directly. By default, the servlet container
    will set error page related attributes in the request scope whose keys are defined
    as javax.servlet.RequestDispatcher.ERROR_XXX constants.[²](#A454457_1_En_9_Chapter.xhtml#Fn2)
    This way you can, if necessary, include them in the custom error page. Following
    is an example:


    ```

    <dl>

        <dt>Request URI</dt>

        <dd>#{requestScope[''javax.servlet.error.request_uri'']}</dd>

        <dt>Exception type</dt>

        <dd>#{requestScope[''javax.servlet.error.exception''][''class'']}</dd>

        <dt>Exception message</dt>

        <dd>#{requestScope[''javax.servlet.error.exception''].message}</dd>

        <dt>Stack trace</dt>

        <dd><pre>#{

            facesContext.externalContext.response.writer.flush()

         }#{

            requestScope[''javax.servlet.error.exception''].printStackTrace

                (facesContext.externalContext.response.writer)

         }</pre></dd>

    </dl>

    ```


    Note the trick to print the stack trace. It’s important that the response writer
    is flushed before printing the stack trace, and that there’s no whitespace in
    template text outside the EL (Expression Language) expressions within the <pre>
    element, otherwise it would be appended to the stack trace.


    Coming back to the scariness of such an error page, you’d better hide away all
    the error detail behind a condition that evaluates only true when the JSF project
    stage equals Development. First set an application-scoped shortcut variable in
    some master template:


    ```

    <c:set var="DEV" scope="application"

        value="#{facesContext.application.projectStage eq ''Development''}">

    </c:set>

    ```


    Now you can conditionally display technical information in the error page when
    the JSF project stage equals Development.


    ```

    <c:if test="#{DEV}">

        <h3>Error detail for developer</h3>

        <dl>

            ...

        </dl>

    </c:if>

    ```


    In any case, it’s very important that the error page is entirely stateless. In
    other words, a decent error page may not contain any JSF forms, not even a logout
    form. Not only will you avoid the risk that the form submit fails because the
    initial exception was actually caused by a corrupted JSF state, but those forms
    will actually submit to the wrong URL (uniform resource locator), namely, the
    one of the error page itself. As the error page is hidden in the /WEB-INF folder,
    the form submit would only result in a 404 error. Instead of moving the error
    page outside the /WEB-INF folder, you could work around the logout case by using
    a plain HTML form which submits to a plain Servlet. The SecurityContext is also
    just injectable over there, as are session-scoped managed beans , if any.


    ## Ajax Exception Handling


    By default, when an exception occurs during a JSF Ajax request, the end user would
    not get any form of feedback whether or not the action was successfully performed.
    In Mojarra , only when the JSF project stage is set to Development, the end user
    would see a bare JavaScript alert with only the exception type and message (see
    Figure [9-3](#A454457_1_En_9_Chapter.xhtml#Fig3)).


    ![A454457_1_En_9_Fig3_HTML.jpg](OEBPS/Images/A454457_1_En_9_Fig3_HTML.jpg)


    ###### Figure 9-3 The JavaScript alert when an exception is thrown during an Ajax
    request in Mojarra 2.3.3 in Development stage


    This isn’t terribly useful. And in the Production stage the end user wouldn’t
    even get any feedback. The web application would fail silently, leaving the end
    user behind as if nothing had happened, which is just confusing and bad for user
    experience. It would make more sense if exceptions during JSF Ajax requests are
    handled the same way as exceptions during synchronous requests, which reuse exactly
    the same error page as the one declared as <error-page> in web.xml. In other words,
    the end user should be able to see the error page in full glory. This can be achieved
    by creating a custom ExceptionHandler implementation which basically instructs
    JSF to create a new UIViewRoot based on the error page and then build and render
    it. It’s only quite a bit of code . At its simplest it can look as follows:


    ```

    public class AjaxExceptionHandler extends ExceptionHandlerWrapper {


    public AjaxExceptionHandler(ExceptionHandler wrapped) {

            super(wrapped);

        }


    @Override

        public void handle() {

            handleAjaxException(FacesContext.getCurrentInstance());

            getWrapped().handle();

        }


    protected void handleAjaxException(FacesContext context) {

            Iterator<ExceptionQueuedEvent> unhandledExceptionQueuedEvents =

                getUnhandledExceptionQueuedEvents().iterator();


    if (context == null

                || context.getExternalContext().isResponseCommitted()

                || !context.getPartialViewContext().isAjaxRequest()

                || !unhandledExceptionQueuedEvents.hasNext()

            ) {

                return;

            }


    Throwable exception = unhandledExceptionQueuedEvents

                .next().getContext().getException();


    while (exception.getCause() != null

                && (exception instanceof FacesException

                    || exception instanceof ELException)

            ) {

                exception = exception.getCause();

            }


    ExternalContext external = context.getExternalContext();

            String uri = external.getRequestContextPath()

                + external.getRequestServletPath();

            Map<String, Object> requestScope = external.getRequestMap();

            requestScope.put(RequestDispatcher.ERROR_REQUEST_URI, uri);

            requestScope.put(RequestDispatcher.ERROR_EXCEPTION, exception);


    String viewId = "/WEB-INF/errorpages/500.xhtml";

            Application application = context.getApplication();

            ViewHandler viewHandler = application.getViewHandler();

            UIViewRoot viewRoot = viewHandler.createView(context, viewId);

            context.setViewRoot(viewRoot);


    try {

                external.responseReset();

                ViewDeclarationLanguage viewDeclarationLanguage =

                    viewHandler.getViewDeclarationLanguage(context, viewId);

                viewDeclarationLanguage.buildView(context, viewRoot);

                context.getPartialViewContext().setRenderAll(true);

                viewDeclarationLanguage.renderView(context, viewRoot);

                context.responseComplete();

            }

            catch (IOException e) {

                throw new FacesException(e);

            }

            finally {

                requestScope.remove(RequestDispatcher.ERROR_EXCEPTION);

            }


    unhandledExceptionQueuedEvents.remove();


    while (unhandledExceptionQueuedEvents.hasNext()) {

                unhandledExceptionQueuedEvents.next();

                unhandledExceptionQueuedEvents.remove();

            }

        }


    public static class Factory                                                                               extends
    ExceptionHandlerFactory {


    public Factory(ExceptionHandlerFactory wrapped) {

                super(wrapped);

            }


    @Override

            public ExceptionHandler getExceptionHandler() {

                return new AjaxExceptionHandler

                    (getWrapped().getExceptionHandler());

            }

        }

    }

    ```'
  trans: '

    ## 自定义错误页面


    虽然默认的错误页面对于普通 Web 开发者来说很有用，但坦率地说，它们对普通最终用户来说相当吓人。其“外观与感觉”与网站其他部分完全脱节，文本对普通最终用户而言如同天书。这样的错误页面甚至没有为最终用户提供退出途径。不满的最终用户无法快速找到返回首页或联系页面的路径。幸运的是，对于最终用户而言，你可以通过在
    Web 应用程序中包含一个错误页面，并在 `web.xml` 的 `<error-page>` 条目中注册其位置，来覆盖这些默认错误页面。


    ```

    <error-page>

        <error-code>500</error-page>

        <location>/WEB-INF/errorpages/500.xhtml</location>

    </error-page>

    ```


    自定义错误页面特意被放置在 `/WEB-INF` 文件夹中，这样最终用户就无法直接访问或为其添加书签。默认情况下，Servlet 容器会在请求作用域中设置与错误页面相关的属性，这些属性的键被定义为
    `javax.servlet.RequestDispatcher.ERROR_XXX` 常量。² 这样，如有必要，你可以将它们包含在自定义错误页面中。示例如下：


    ```

    <dl>

        <dt>请求 URI</dt>

        <dd>#{requestScope[''javax.servlet.error.request_uri'']}</dd>

        <dt>异常类型</dt>

        <dd>#{requestScope[''javax.servlet.error.exception''][''class'']}</dd>

        <dt>异常消息</dt>

        <dd>#{requestScope[''javax.servlet.error.exception''].message}</dd>

        <dt>堆栈跟踪</dt>

        <dd><pre>#{

            facesContext.externalContext.response.writer.flush()

         }#{

            requestScope[''javax.servlet.error.exception''].printStackTrace

                (facesContext.externalContext.response.writer)

         }</pre></dd>

    </dl>

    ```


    请注意打印堆栈跟踪的技巧。在打印堆栈跟踪之前刷新响应写入器非常重要，并且 `<pre>` 元素内 EL（表达式语言）表达式之外的模板文本中不能有空白字符，否则这些空白字符会被附加到堆栈跟踪中。


    回到此类错误页面的吓人之处，你最好将所有错误细节隐藏在一个条件之后，该条件仅在 JSF 项目阶段等于 Development 时才评估为 true。首先，在某个主模板中设置一个应用程序作用域的快捷变量：


    ```

    <c:set var="DEV" scope="application"

        value="#{facesContext.application.projectStage eq ''Development''}">

    </c:set>

    ```


    现在，当 JSF 项目阶段等于 Development 时，你可以有条件地在错误页面中显示技术信息。


    ```

    <c:if test="#{DEV}">

        <h3>面向开发者的错误详情</h3>

        <dl>

            ...

        </dl>

    </c:if>

    ```


    无论如何，错误页面完全无状态是非常重要的。换句话说，一个像样的错误页面不能包含任何 JSF 表单，甚至不能包含登出表单。这不仅是为了避免因初始异常实际上是由损坏的
    JSF 状态引起而导致表单提交失败的风险，而且这些表单实际上会提交到错误的 URL（统一资源定位符），即错误页面本身的 URL。由于错误页面隐藏在 `/WEB-INF`
    文件夹中，表单提交只会导致 404 错误。与其将错误页面移出 `/WEB-INF` 文件夹，不如通过使用一个提交到普通 Servlet 的纯 HTML 表单来解决登出问题。`SecurityContext`
    在那里也是可注入的，会话作用域的管理 Bean（如果有的话）也是如此。


    ## Ajax 异常处理


    默认情况下，当 JSF Ajax 请求期间发生异常时，最终用户不会收到任何关于操作是否成功执行的反馈。在 Mojarra 中，只有当 JSF 项目阶段设置为
    Development 时，最终用户才会看到一个仅包含异常类型和消息的原始 JavaScript 警告框（参见图 9-3）。


    ![A454457_1_En_9_Fig3_HTML.jpg](img/A454457_1_En_9_Fig3_HTML.jpg)


    ###### 图 9-3 在 Mojarra 2.3.3 的 Development 阶段，Ajax 请求期间抛出异常时的 JavaScript 警告框


    这并不十分有用。而在 Production 阶段，最终用户甚至不会收到任何反馈。Web 应用程序会静默失败，让最终用户感觉好像什么都没发生，这只会令人困惑，并且对用户体验不利。如果
    JSF Ajax 请求期间的异常能够像同步请求期间的异常一样被处理，重用与 `web.xml` 中声明的 `<error-page>` 完全相同的错误页面，那将更有意义。换句话说，最终用户应该能够完整地看到错误页面。这可以通过创建一个自定义的
    `ExceptionHandler` 实现来实现，该实现基本上指示 JSF 基于错误页面创建一个新的 `UIViewRoot`，然后构建并渲染它。这需要相当多的代码。最简单的形式如下所示：


    ```

    public class AjaxExceptionHandler extends ExceptionHandlerWrapper {


    public AjaxExceptionHandler(ExceptionHandler wrapped) {

            super(wrapped);

        }


    @Override

        public void handle() {

            handleAjaxException(FacesContext.getCurrentInstance());

            getWrapped().handle();

        }


    protected void handleAjaxException(FacesContext context) {

            Iterator<ExceptionQueuedEvent> unhandledExceptionQueuedEvents =

                getUnhandledExceptionQueuedEvents().iterator();


    if (context == null

                || context.getExternalContext().isResponseCommitted()

                || !context.getPartialViewContext().isAjaxRequest()

                || !unhandledExceptionQueuedEvents.hasNext()

            ) {

                return;

            }


    Throwable exception = unhandledExceptionQueuedEvents

                .next().getContext().getException();


    while (exception.getCause() != null

                && (exception instanceof FacesException

                    || exception instanceof ELException)

            ) {

                exception = exception.getCause();

            }


    ExternalContext external = context.getExternalContext();

            String uri = external.getRequestContextPath()

                + external.getRequestServletPath();

            Map<String, Object> requestScope = external.getRequestMap();

            requestScope.put(RequestDispatcher.ERROR_REQUEST_URI, uri);

            requestScope.put(RequestDispatcher.ERROR_EXCEPTION, exception);


    String viewId = "/WEB-INF/errorpages/500.xhtml";

            Application application = context.getApplication();

            ViewHandler viewHandler = application.getViewHandler();

            UIViewRoot viewRoot = viewHandler.createView(context, viewId);

            context.setViewRoot(viewRoot);


    try {

                external.responseReset();

                ViewDeclarationLanguage viewDeclarationLanguage =

                    viewHandler.getViewDeclarationLanguage(context, viewId);

                viewDeclarationLanguage.buildView(context, viewRoot);

                context.getPartialViewContext().setRenderAll(true);

                viewDeclarationLanguage.renderView(context, viewRoot);

                context.responseComplete();

            }

            catch (IOException e) {

                throw new FacesException(e);

            }

            finally {

                requestScope.remove(RequestDispatcher.ERROR_EXCEPTION);

            }


    unhandledExceptionQueuedEvents.remove();


    while (unhandledExceptionQueuedEvents.hasNext()) {

                unhandledExceptionQueuedEvents.next();

                unhandledExceptionQueuedEvents.remove();

            }

        }


    public static class Factory                                                                               extends
    ExceptionHandlerFactory {


    public Factory(ExceptionHandlerFactory wrapped) {

                super(wrapped);

            }


    @Override

            public ExceptionHandler getExceptionHandler() {

                return new AjaxExceptionHandler

                    (getWrapped().getExceptionHandler());

            }

        }

    }

    ```

