    ## 自定义验证器


    此外，从最初开始，JSF 就支持自定义验证器。由于几乎所有基本用例都已由标准 JSF 验证器甚至 Bean Validation 约束（例如长度、范围和模式验证）覆盖，因此留给自定义
    JSF 验证器的最常见用例是通过针对基于数据库的约束测试提交值来验证数据完整性。通常，这些涉及唯一性约束。


    一个很好的实际例子是在基于电子邮件的注册过程中进行验证，或者在用户账户管理页面更改电子邮件地址时，验证指定的电子邮件地址是否尚未被使用。特别是，更改事件无法通过
    Bean Validation 约束以简单方式进行测试，因为 Bean Validation 无法在不从数据库重新获取实体的情况下比较旧值和新值。首先，只需相应地实现
    `javax.faces.validator.Validator` 接口²⁴。


    ```

    @FacesValidator(value="project.UniqueEmailValidator", managed=true)

    public class UniqueEmailValidator implements Validator<String> {


    @Inject

        private UserService userService;


    @Override

        public void validate

            (FacesContext context, UIComponent component, String email)

                throws ValidatorException

        {

            if (email == null || email.isEmpty()) {

                return; // 让 @NotNull 或 required=true 处理此情况

            }


    String oldEmail = (String) ((UIInput) component).getValue();


    if (!email.equals(oldEmail) && userService.exist(email)) {

                throw new ValidatorException(

                    new FacesMessage("Email already in use"));

            }

        }

    }

    ```


    为了使其运行，只需在任何 `EditableValueHolder` 组件的 `validator` 属性中指定声明的验证器 ID，或在任何嵌套的 `<f:validator>`
    标签的 `validatorId` 属性中指定即可。


    ```

    <h:inputText value="#{signup.user.email}"

        validator="project.UniqueEmailValidator">

    </h:inputText>

    ```


    查看 `UniqueEmailValidator` 类时，您会注意到注解和接口也经历了与转换器相同的 JSF 2.3 更改。与 `@FacesConverter`
    类似，自 JSF 2.3 起，`@FacesValidator` 注解也新增了一个 `managed` 属性，该属性应支持在验证器实现中进行依赖注入。并且，与
    `Converter<T>` 类似，`Validator<T>` 也进行了参数化，因此 `validate()` 方法现在接受 `T` 而不是 `Object`
    作为值参数。


    您还需要确保验证器的实现能够在值参数为 `null` 或空时跳过验证。历史上，在 JSF 1.x 中，当值参数为 `null` 时，`validate()`
    方法总是会被跳过。然而，自从 JSF 2.0 集成了 Bean Validation 后，这一行为发生了变化，从而破坏了与现有基于 JSF 1.x 的自定义验证器的向后兼容性。可以通过显式设置以下
    `web.xml` 上下文参数来关闭此破坏性更改：


    ```

    <context-param>

        <param-name>javax.faces.VALIDATE_EMPTY_FIELDS</param-name>

        <param-value>false</param-value>

    </context-param>

    ```


    这样做的缺点是，Bean Validation 的 `@NotNull` 将不会被 JSF 触发，您基本上需要通过显式设置所有 JSF 输入组件的 `required`
    属性为 `true` 来重复此约束。您最好不要这样做，而是继续在自定义验证器中执行 `null` 和空检查。借助 Bean Validation 在模型中的单一位置设置验证约束，比使用相同模型在不同层重复验证约束更符合“不要重复自己”（DRY）原则。


    最后，旧值可以简单地通过 `UIInput#getValue()` 获取，该方法基本上返回 `UIInput` 组件的当前值属性。


    回到验证提交值唯一性的用例，当然您也可以跳过此步骤，无论如何都插入数据，并捕获来自持久层的任何约束违反异常，然后相应地显示 faces 消息。然而，这与当前在用户界面中更改输入字段后立即提供即时反馈的趋势不符。


    然而，在注册过程中验证唯一电子邮件地址的这个特定用例中，可能还有另一个原因不透露指定电子邮件地址唯一性的过多细节：安全性。在这种情况下，您最好让注册过程以与成功时完全相同的方式完成，即告诉用户检查邮箱，但在幕后实际向目标收件人发送一封不同的电子邮件，而不是激活邮件，最好每天不超过一次。该电子邮件内容类似于以下内容：


    > *亲爱的用户，*

    >

    > *看起来您或其他人试图在我们的网站上使用您的电子邮件地址 foo@example.com 进行注册，而该地址已与一个现有账户关联。也许您实际上是想*登录*或*重置密码*？如果确实不是您，请回复此邮件告知我们，我们将进行调查。*

    >

    > *此致，示例公司*


    最后，您可能还需要考虑使包含“+”字符（后跟一串字符，表示电子邮件别名）的用户名部分的电子邮件失效或去重。对于许多电子邮件提供商，尤其是 Gmail，电子邮件地址
    `foo@gmail.com` 和 `foo+bar@gmail.com` 指向完全相同的电子邮件账户，这基本上允许最终用户创建几乎无限数量的账户。

