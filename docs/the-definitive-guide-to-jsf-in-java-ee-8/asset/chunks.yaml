- fmt: "# Extending Existing Component\n\nImagine that there’s an existing component\
    \ whose behavior you’d like to adjust, usually by adding one or more new custom\
    \ attributes. If those attributes are purely output-only, then you could just\
    \ make use of the pass-through attributes feature which was introduced in JSF\
    \ 2.2. Previously, any custom attribute which wasn’t officially supported by the\
    \ component was simply ignored during view render time. For example, when you’d\
    \ like to add the missing `accept` attribute to the existing `<h:inputFile>` component,\
    \ simply adding the attribute as follows won’t work.\n\n```\n<h:inputFile id=\"\
    photo\" value=\"#{editProfile.photo}\" accept=\"image/*\" />\n```\n\nWith the\
    \ pass-through attributes feature you could explicitly instruct JSF to render\
    \ the custom attribute anyway. This can be done in two ways. The first way is\
    \ registering it via the `http://xmlns.jcp.org/jsf/passthrough` XML namespace.\n\
    \n```\n< ... xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:a=\"http://xmlns.jcp.org/jsf/passthrough\"\
    >\n    ...\n    <h:form enctype=\"multipart/form-data\">\n        <h:inputFile\
    \ ... a:accept=\"image/*\" />\n    </h:form>\n```\n\nAnother way is declaring\
    \ it via the `<f:passThroughAttribute>` tag.\n\n```\n< ... xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    \n    xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n    ...\n    <h:form enctype=\"\
    multipart/form-data\">\n        <h:inputFile ...>\n            <f:passThroughAttribute\
    \ name=\"accept\" value=\"image/*\" />\n        </h:inputFile>\n    </h:form>\n\
    ```\n\nIt’ll just work fine on the client side either way. On the browsers supporting\
    \ this attribute, the file browse dialog will only show the files matching the\
    \ comma separated IANA (Internet Assigned Numbers Authority) media types specified\
    \ in the `accept` attribute. However, this won’t work in browsers not supporting\
    \ this attribute, nor will it validate anything on the server side. Even if the\
    \ browser supports it, any malicious-minded end user can easily manipulate the\
    \ retrieved HTML document and remove the `accept` attribute and hence be able\
    \ to upload a different file type.\n\nFor exactly that server-side work, you’d\
    \ like to extend the `<h:inputFile>` component to perform validation based on\
    \ the `accept` attribute. The first step is looking at which `UIComponent` class\
    \ exactly is represented by `<h:inputFile>`. As you can see in Table 11-1, that’s\
    \ `javax.faces.component.html.HtmlInputFile`. Let’s start by extending it and\
    \ adding the new `accept` attribute.\n\n```\n@FacesComponent(createTag=true)\n\
    public class InputFile extends HtmlInputFile {\n\n    @Override\n    public void\
    \ encodeBegin(FacesContext context) throws IOException {\n        String accept\
    \ = getAccept();\n        if (accept != null) {\n            getPassThroughAttributes().put(\"\
    accept\", accept);\n        }\n        super.encodeBegin(context);\n    }\n\n\
    \    public String getAccept() {\n        return (String) getStateHelper().eval(\"\
    accept\");\n    }\n\n    public void setAccept(String accept) {\n        getStateHelper().put(\"\
    accept\", accept);\n    }\n}\n```\n\nNote that there’s no property for the `accept`\
    \ attribute. Any public component attribute must be represented by a getter/setter\
    \ pair which delegates further to `UIComponent#getStateHelper()`. Basically, you\
    \ must delegate all view-scoped component attributes to the `StateHelper`. This\
    \ will in turn take care that the right deltas end up in the JSF view state. This\
    \ is of course optional, but not doing so will make the component instance not\
    \ programmatically manipulatable. Any changes performed during a previous HTTP\
    \ request would get lost during the subsequent HTTP postback request for the very\
    \ simple reason that the `UIComponent` instance is recreated from scratch.\n\n\
    Also note that the new `accept` attribute is simply added as a pass-through attribute\
    \ in the `encodeBegin()` method before delegating to the superclass method where\
    \ the actual rendering job takes place. This removes the need to create a whole\
    \ custom renderer for the particular purpose of rendering a new attribute. Let’s\
    \ test it now.\n\n```\n< ... xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n    xmlns:my=\"\
    http://xmlns.jcp.org/jsf/component\">\n    ...\n    <h:form enctype=\"multipart/form-data\"\
    >\n        <my:inputFile id=\"photo\" value=\"#{editProfile.photo}\"\n       \
    \     accept=\"image/*\" required=\"true\">\n            <f:ajax listener=\"#{editProfile.upload}\"\
    \ render=\"photo_m\" />\n        </my:inputFile>\n        <h:message id=\"photo_m\"\
    \ for=\"photo\" />\n    </h:form>\n```\n\nFor the sake of completeness, here’s\
    \ what the backing bean looks like.\n\n```\n@Named @RequestScoped\npublic class\
    \ EditProfile {\n\n    private Part photo;\n\n    public void upload() {\n   \
    \     String fileName = photo.getSubmittedFileName();\n        String fileType\
    \ = photo.getContentType();\n        long fileSize = photo.getSize();\n\n    \
    \    System.out.println(\"File name: \" + fileName);\n        System.out.println(\"\
    File type: \" + fileType);\n        System.out.println(\"File size: \" + fileSize);\n\
    \    }\n\n    // Add/generate getter and setter.\n}\n```\n\nNow we have basically\
    \ created the `UIComponent` equivalent of `<h:inputFile>` with a pass-through\
    \ `accept` attribute. The next step is implementing server-side validation of\
    \ whether the media type of the uploaded file matches the specified `accept` attribute.\
    \ For this, we’d like to override `UIInput#validateValue()` in our `InputFile`\
    \ class as below. This runs during the process validations phase (third phase).\n\
    \n```\n@Override\nprotected void validateValue(FacesContext context, Object newValue)\
    \ {\n    String accept = getAccept();\n\n    if (accept != null && newValue instanceof\
    \ Part) {\n        Part part = (Part) newValue;\n        String contentType =\
    \ context.getExternalContext()\n            .getMimeType(part.getSubmittedFileName());\n\
    \        String acceptPattern = accept.trim()\n            .replace(\"*\", \"\
    .*\").replaceAll(\"\\\\s*,\\\\s*\", \"|\");\n\n        if (contentType == null\
    \ || !contentType.matches(acceptPattern)) {\n            String message = \"Unacceptable\
    \ file type\";\n            context.addMessage(getClientId(context), new FacesMessage(\n\
    \                FacesMessage.SEVERITY_ERROR, message, null));\n            setValid(false);\n\
    \        }\n    }\n\n    if (isValid()) {\n        super.validateValue(context,\
    \ newValue);\n    }\n}\n```\n\nAs you see, it will basically check if the `accept`\
    \ attribute is specified and if there’s a submitted file, and if so then convert\
    \ the `accept` attribute to a regular expression pattern and match the content\
    \ type of the submitted file against it. The `accept` attribute represents a comma\
    \ separated string of IANA media types wherein the asterisk is used as a wildcard\
    \ and the comma is used as a disjunction operator. An example `accept` value of\
    \ `\"image/*,application/pdf\"` is this way converted to a regular expression\
    \ of `\"image/.*|application/pdf\"`. If it doesn’t match, then it will add a faces\
    \ message associated with the component to the faces context and mark the component\
    \ as invalid by calling `UIInput#setValid()` with `false`. In the end, if the\
    \ component is valid, it will continue the validation call to the superclass.\n\
    \nFurther there’s another thing to mention: the content type is not obtained from\
    \ `Part#getContentType()` but from `ExternalContext#getMimeType()` based on the\
    \ submitted file name. This is just to cover the corner case that the client doesn’t\
    \ send a content type along, or even sends one which is not understood by the\
    \ server. `ExternalContext#getMimeType()` basically obtains the list of known\
    \ content types from `<mime-mapping>` entries in `web.xml`. The server itself\
    \ has some default values and you can override or extend them in the web application’s\
    \ own `web.xml`."
  raw: '## Extending Existing Component


    Imagine that there’s an existing component whose behavior you’d like to adjust,
    usually by adding one or more new custom attributes. If those attributes are purely
    output-only, then you could just make use of the pass-through attributes feature
    which was introduced in JSF 2.2\. Previously, any custom attribute which wasn’t
    officially supported by the component was simply ignored during view render time.
    For example, when you’d like to add the missing accept attribute[⁵](#A454457_1_En_11_Chapter.xhtml#Fn5)
    to the existing <h:inputFile> component,[⁶](#A454457_1_En_11_Chapter.xhtml#Fn6)
    simply adding the attribute as follows won’t work.


    ```

    <h:inputFile id="photo" value="#{editProfile.photo}" accept="image/*" />

    ```


    With the pass-through attributes feature you could explicitly instruct JSF to
    render the custom attribute anyway. This can be done in two ways. The first way
    is registering it via the [http://xmlns.jcp.org/jsf/passthrough](http://xmlns.jcp.org/jsf/passthrough)
    XML namespace.


    ```

    < ... xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:a="http://xmlns.jcp.org/jsf/passthrough">

        ...

        <h:form enctype="multipart/form-data">

            <h:inputFile ... a:accept="image/*" />

        </h:form>

    ```


    Another way is declaring it via the <f:passThroughAttribute> tag.


    ```

    < ... xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html">

        ...

        <h:form enctype="multipart/form-data">

            <h:inputFile ...>

                <f:passThroughAttribute name="accept" value="image/*" />

            </h:inputFile>

        </h:form>

    ```


    It’ll just work fine on the client side either way. On the browsers supporting
    this attribute, the file browse dialog will only show the files matching the comma
    separated IANA (Internet Assigned Numbers Authority ) media types[⁷](#A454457_1_En_11_Chapter.xhtml#Fn7)
    specified in the accept attribute. However, this won’t work in browsers not supporting
    this attribute,[⁸](#A454457_1_En_11_Chapter.xhtml#Fn8) nor will it validate anything
    on the server side. Even if the browser supports it, any malicious-minded end
    user can easily manipulate the retrieved HTML document and remove the accept attribute
    and hence be able to upload a different file type.


    For exactly that server-side work, you’d like to extend the <h:inputFile> component
    to perform validation based on the accept attribute. The first step is looking
    at which UIComponent class exactly is represented by <h:inputFile>. As you can
    see in Table [11-1](#A454457_1_En_11_Chapter.xhtml#Tab1), that’s javax.faces.component.html.HtmlInputFile.
    Let’s start by extending it and adding the new accept attribute.


    ```

    @FacesComponent(createTag=true)

    public class InputFile extends HtmlInputFile {


    @Override

        public void encodeBegin(FacesContext context) throws IOException {

            String accept = getAccept();

            if (accept != null) {

                getPassThroughAttributes().put("accept", accept);

            }

            super.encodeBegin(context);

        }


    public String getAccept() {

            return (String) getStateHelper().eval("accept");

        }


    public void setAccept(String accept) {

            getStateHelper().put("accept", accept);

        }

    }

    ```


    Note that there’s no property for the accept attribute. Any public component attribute
    must be represented by a getter/setter pair which delegates further to UIComponent#getStateHelper().
    Basically, you must delegate all view-scoped component attributes to the StateHelper.
    This will in turn take care that the right deltas end up in the JSF view state.
    This is of course optional, but not doing so will make the component instance
    not programmatically manipulatable. Any changes performed during a previous HTTP
    request would get lost during the subsequent HTTP postback request for the very
    simple reason that the UIComponent instance is recreated from scratch.


    Also note that the new accept attribute is simply added as a pass-through attribute
    in the encodeBegin() method before delegating to the superclass method where the
    actual rendering job takes place. This removes the need to create a whole custom
    renderer for the particular purpose of rendering a new attribute. Let’s test it
    now.


    ```

    < ... xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:my="http://xmlns.jcp.org/jsf/component">

        ...

        <h:form enctype="multipart/form-data">

            <my:inputFile id="photo" value="#{editProfile.photo}"

                accept="image/*" required="true">

                <f:ajax listener="#{editProfile.upload}" render="photo_m" />

            </my:inputFile>

            <h:message id="photo_m" for="photo" />

        </h:form>

    ```


    For the sake of completeness, here’s what the backing bean looks like.


    ```

    @Named @RequestScoped

    public class EditProfile {


    private Part photo;


    public void upload() {

            String fileName = photo.getSubmittedFileName();

            String fileType = photo.getContentType();

            long fileSize = photo.getSize();


    System.out.println("File name: " + fileName);

            System.out.println("File type: " + fileType);

            System.out.println("File size: " + fileSize);

        }


    // Add/generate getter and setter.

    }

    ```


    Now we have basically created the UIComponent equivalent of <h:inputFile> with
    a pass-through accept attribute. The next step is implementing server-side validation
    of whether the media type of the uploaded file matches the specified accept attribute.
    For this, we’d like to override UIInput#validateValue() in our InputFile class
    as below. This runs during the process validations phase (third phase).


    ```

    @Override

    protected void validateValue(FacesContext context, Object newValue) {

        String accept = getAccept();


    if (accept != null && newValue instanceof Part) {

            Part part = (Part) newValue;

            String contentType = context.getExternalContext()

                .getMimeType(part.getSubmittedFileName());

            String acceptPattern = accept.trim()

                .replace("*", ".*").replaceAll("\\s*,\\s*", "|");


    if (contentType == null || !contentType.matches(acceptPattern)) {

                String message = "Unacceptable file type";

                context.addMessage(getClientId(context), new FacesMessage(

                    FacesMessage.SEVERITY_ERROR, message, null));

                setValid(false);

            }

        }


    if (isValid()) {

            super.validateValue(context, newValue);

        }

    }

    ```


    As you see, it will basically check if the accept attribute is specified and if
    there’s a submitted file, and if so then convert the accept attribute to a regular
    expression pattern and match the content type of the submitted file against it.
    The accept attribute represents a comma separated string of IANA media types wherein
    the asterisk is used as a wildcard and the comma is used as a disjunction operator.
    An example accept value of "image/*,application/pdf" is this way converted to
    a regular expression of "image/.*|application/pdf". If it doesn’t match, then
    it will add a faces message associated with the component to the faces context
    and mark the component as invalid by calling UIInput#setValid() with false. In
    the end, if the component is valid, it will continue the validation call to the
    superclass.


    Further there’s another thing to mention: the content type is not obtained from
    Part#getContentType() but from ExternalContext#getMimeType() based on the submitted
    file name. This is just to cover the corner case that the client doesn’t send
    a content type along, or even sends one which is not understood by the server.
    ExternalContext#getMimeType() basically obtains the list of known content types
    from <mime-mapping> entries in web.xml. The server itself has some default values
    and you can override or extend them in the web application’s own web.xml.'
  trans: '

    ## 扩展现有组件


    假设有一个现有组件，你希望调整其行为，通常是通过添加一个或多个新的自定义属性。如果这些属性纯粹是输出型的，那么你可以直接使用 JSF 2.2 中引入的透传属性功能。在此之前，任何组件官方不支持的属性在视图渲染时都会被忽略。例如，当你希望为现有的
    `<h:inputFile>` 组件添加缺失的 `accept` 属性时，简单地像下面这样添加属性是行不通的。


    ```

    <h:inputFile id="photo" value="#{editProfile.photo}" accept="image/*" />

    ```


    利用透传属性功能，你可以明确指示 JSF 无论如何都要渲染该自定义属性。这可以通过两种方式实现。第一种方式是通过 [`xmlns.jcp.org/jsf/passthrough`](http://xmlns.jcp.org/jsf/passthrough)
    XML 命名空间进行注册。


    ```

    < ... xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:a="http://xmlns.jcp.org/jsf/passthrough">

        ...

        <h:form enctype="multipart/form-data">

            <h:inputFile ... a:accept="image/*" />

        </h:form>

    ```


    另一种方式是通过 `<f:passThroughAttribute>` 标签进行声明。


    ```

    < ... xmlns:f="http://xmlns.jcp.org/jsf/core"

        xmlns:h="http://xmlns.jcp.org/jsf/html">

        ...

        <h:form enctype="multipart/form-data">

            <h:inputFile ...>

                <f:passThroughAttribute name="accept" value="image/*" />

            </h:inputFile>

        </h:form>

    ```


    无论哪种方式，在客户端都能正常工作。在支持该属性的浏览器上，文件浏览对话框只会显示与 `accept` 属性中指定的、以逗号分隔的 IANA（互联网号码分配机构）媒体类型相匹配的文件。然而，在不支持该属性的浏览器上，这将无法生效，并且也不会在服务器端进行任何验证。即使浏览器支持该属性，任何恶意的最终用户都可以轻易地操纵检索到的
    HTML 文档，移除 `accept` 属性，从而能够上传不同类型的文件。


    正是为了处理服务器端的工作，你希望扩展 `<h:inputFile>` 组件，使其能够基于 `accept` 属性执行验证。第一步是查看 `<h:inputFile>`
    具体代表哪个 `UIComponent` 类。如 表 11-1 所示，它是 `javax.faces.component.html.HtmlInputFile`。让我们从扩展它并添加新的
    `accept` 属性开始。


    ```

    @FacesComponent(createTag=true)

    public class InputFile extends HtmlInputFile {


    @Override

        public void encodeBegin(FacesContext context) throws IOException {

            String accept = getAccept();

            if (accept != null) {

                getPassThroughAttributes().put("accept", accept);

            }

            super.encodeBegin(context);

        }


    public String getAccept() {

            return (String) getStateHelper().eval("accept");

        }


    public void setAccept(String accept) {

            getStateHelper().put("accept", accept);

        }

    }

    ```


    请注意，`accept` 属性没有对应的属性。任何公共组件属性都必须由一个 getter/setter 对来表示，该对进一步委托给 `UIComponent#getStateHelper()`。基本上，你必须将所有视图范围的组件属性委托给
    `StateHelper`。这将反过来确保正确的增量最终进入 JSF 视图状态。这当然是可选的，但不这样做将导致组件实例无法通过编程方式进行操作。在前一个
    HTTP 请求期间执行的任何更改都会在随后的 HTTP 回发请求中丢失，原因很简单：`UIComponent` 实例是从头开始重新创建的。


    还要注意，新的 `accept` 属性只是在 `encodeBegin()` 方法中作为透传属性添加，然后才委托给执行实际渲染工作的父类方法。这消除了为渲染新属性这一特定目的而创建整个自定义渲染器的需要。现在让我们测试一下。


    ```

    < ... xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:my="http://xmlns.jcp.org/jsf/component">

        ...

        <h:form enctype="multipart/form-data">

            <my:inputFile id="photo" value="#{editProfile.photo}"

                accept="image/*" required="true">

                <f:ajax listener="#{editProfile.upload}" render="photo_m" />

            </my:inputFile>

            <h:message id="photo_m" for="photo" />

        </h:form>

    ```


    为了完整起见，以下是后台 bean 的样子。


    ```

    @Named @RequestScoped

    public class EditProfile {


    private Part photo;


    public void upload() {

            String fileName = photo.getSubmittedFileName();

            String fileType = photo.getContentType();

            long fileSize = photo.getSize();


    System.out.println("File name: " + fileName);

            System.out.println("File type: " + fileType);

            System.out.println("File size: " + fileSize);

        }


    // 添加/生成 getter 和 setter。

    }

    ```


    现在，我们基本上创建了等同于 `<h:inputFile>` 并带有透传 `accept` 属性的 `UIComponent`。下一步是实现服务器端验证，检查上传文件的媒体类型是否与指定的
    `accept` 属性匹配。为此，我们希望在我们的 `InputFile` 类中重写 `UIInput#validateValue()`，如下所示。这将在处理验证阶段（第三阶段）运行。


    ```

    @Override

    protected void validateValue(FacesContext context, Object newValue) {

        String accept = getAccept();


    if (accept != null && newValue instanceof Part) {

            Part part = (Part) newValue;

            String contentType = context.getExternalContext()

                .getMimeType(part.getSubmittedFileName());

            String acceptPattern = accept.trim()

                .replace("*", ".*").replaceAll("\\s*,\\s*", "|");


    if (contentType == null || !contentType.matches(acceptPattern)) {

                String message = "不可接受的文件类型";

                context.addMessage(getClientId(context), new FacesMessage(

                    FacesMessage.SEVERITY_ERROR, message, null));

                setValid(false);

            }

        }


    if (isValid()) {

            super.validateValue(context, newValue);

        }

    }

    ```


    如你所见，它基本上会检查是否指定了 `accept` 属性以及是否有提交的文件，如果是，则将 `accept` 属性转换为正则表达式模式，并将提交文件的内容类型与之匹配。`accept`
    属性表示一个以逗号分隔的 IANA 媒体类型字符串，其中星号用作通配符，逗号用作析取运算符。例如，`accept` 值为 `"image/*,application/pdf"`
    会这样转换为正则表达式 `"image/.*|application/pdf"`。如果不匹配，它将向 faces 上下文添加一条与该组件关联的 faces
    消息，并通过调用 `UIInput#setValid(false)` 将组件标记为无效。最后，如果组件有效，它将继续向父类进行验证调用。


    另外还有一点需要提及：内容类型不是从 `Part#getContentType()` 获取的，而是基于提交的文件名从 `ExternalContext#getMimeType()`
    获取的。这只是为了覆盖客户端不发送内容类型，或者发送了服务器无法理解的内容类型这种边界情况。`ExternalContext#getMimeType()`
    基本上是从 `web.xml` 中的 `<mime-mapping>` 条目获取已知内容类型的列表。服务器本身有一些默认值，你可以在 Web 应用程序自己的
    `web.xml` 中覆盖或扩展它们。

