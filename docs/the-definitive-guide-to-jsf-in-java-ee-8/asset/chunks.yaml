    Changing this to something else like a hyphen “-” or even an underscore “_” is
    **not** recommended.[⁴](#A454457_1_En_12_Chapter.xhtml#Fn4)


    In the long term, it is confusing and brittle as those characters are also allowed
    in the ID attribute itself. JSF does not validate the component ID against the
    currently configured naming container separator character and thus it may easily
    slip through and cause trouble while referencing such a component in a search
    expression.


    Coming back to referencing a specific UIInput component within a naming container
    from <h:outputLabel> on, in the example composite component <t:inputLocalTime>
    as demonstrated in the section “Composite Components” in Chapter [7](#A454457_1_En_7_Chapter.xhtml),
    the hour drop-down component has an ID of “hour”. Thus, for <h:outputLabel>, when
    using the default naming container separator character, the relative local ID
    of the hour dropdown inside the composite component is “time:hour”.


    ```

    <h:outputLabel id="l_time" for="time:hour" value="Time" />

    <t:inputLocalTime id="time" value="#{schedule.time}" required="true" />

    <h:message id="m_time" for="time" />

    ```


    Note that this is not necessary for <h:message> as faces messages are under the
    hood already added to the faces context with the client ID of the composite component
    itself.


    Using relative local IDs also works within the context of <h:column> of <h:dataTable>.
    It’s then interpreted in the context of the currently iterated row, even when
    the target component is sitting in another column. The following example demonstrates
    that:


    ```

    <h:dataTable id="users" value="#{admin.users}" var="user">

        ...

        <h:column>

            <f:facet name="header">Country</f:facet>

            <h:selectOneMenu id="country" value="#{user.address.country}">

                <f:selectItems value="#{data.countries}" />

                <f:ajax render="city" />

            </h:selectOneMenu>

        </h:column>

        <h:column>

            <f:facet name="header">City</f:facet>

            <h:selectOneMenu id="city" value="#{user.address.city}">

                <f:selectItems value="#{user.address.country.cities}" />

            </h:selectOneMenu>

        </h:column>

        ...

    </h:dataTable>

    ```


    Under the hood, relative local IDs are resolved using the algorithm as described
    in the UIComponent#findComponent() API.[⁵](#A454457_1_En_12_Chapter.xhtml#Fn5)
    This means that you can also resolve them programmatically. You only need to ensure
    that the findComponent() method is invoked on the correct base component , not
    on, for example, UIViewRoot.


    ## Absolute Hierarchical IDs


    In case the target component is not within the same naming container parent as
    the current component, then you need an absolute hierarchical ID instead of a
    local relative ID. The key difference is that an absolute hierarchical ID starts
    with the naming container separator character. It will then search for the target
    component from the UIViewRoot on. Such construct is often used in the render attribute
    of <f:ajax> when it needs to reference a component that is not located inside
    the same form.


    ```

    <h:form id="search">

        ...

        <h:commandButton id="submit" ...>

            <f:ajax execute="@form" render=":results" />

        </h:commandButton>

    </h:form>

    <h:panelGroup id="results" layout="block">

        ...

    </h:panelGroup>

    ```


    A less common use case where an absolute hierarchical ID is needed is when you
    need to reference a component that is in turn nested in another naming container—for
    example, when you want to update <h:message> associated with a composite component
    during a <cc:clientBehavior> event inside the composite component .


    ```

    <h:form id="form">

        <h:outputLabel id="l_time" for="time:hour" value="Time" />

        <t:inputLocalTime id="time" value="#{schedule.time}" required="true">

            <f:ajax render=":form:m_time" />

        <h:message id="m_time" for="time" />

    </h:form>

    ```


    You could argue that this is a bug or an oversight in the JSF specification. This
    is very true and should be worked on for a next version of JSF. Another yet less
    common use case is when you need to update a specific iteration round of an iteration
    component, such as <h:dataTable> and <ui:repeat>.


    ```

    <h:form id="form">

        <h:dataTable id="table" value="#{bean.items}" var="item">

            <h:column>

                <h:panelGroup id="column1" layout="block">

                    ...

                </h:panelGroup>

            </h:column>

            <h:column>

                <h:panelGroup id="column2" layout="block">

                    ...

                </h:panelGroup>

            </h:column>

        </h:dataTable>

        <h:commandButton value="Update second row">

            <f:ajax render=":form:table:1:column1

                            :form:table:1:column2">

            </f:ajax>

        </h:commandButton>

    </h:form>

    ```


    Note that the iteration index is zero-based as with normal Java collections and
    arrays. Also note that you basically need to wrap the cell’s content in another
    component in order to properly reference the cell’s content, and that you need
    to explicitly specify every column in order to update the entire row, as demonstrated
    above. Updating the entire column is also possible, but less convenient because
    you basically need to specify the search expression for every single row. Fortunately,
    the render attribute can take an EL (Expression Language) expression and the EL
    stream API can be used to concatenate a bunch of strings in the :form:table:[i]:column
    format depending on the amount of items in the table.


    ```

    <h:commandButton value="Update second column">

        <f:ajax render="#{bean.items.stream()

            .map(i -> '' :form:list:'' += bean.items.indexOf(i) += '':column2'')

            .reduce((l, r) -> (l += r)).get()}">

        </f:ajax>

    </h:commandButton>

    ```


    Admittedly, this is not the most elegant approach. You’d better delegate to a
    custom function in an application-scoped bean. It could look something like the
    following:


    ```

    <h:commandButton value="Update second column">

        <f:ajax

            render="#{ajax.columnIds(bean.items, '':form:table::column2'')}"

        </f:ajax>

    </h:commandButton>

    ```


    Whereby the #{ajax} application-scoped bean looks something like the following:


    ```

    @Named @ApplicationScoped

    public class Ajax {


    public String columnIds(List<?> list, String idTemplate) {

            return IntStream.range(0, list.size()).boxed()

                .map(i -> idTemplate.replace("::", ":" + i + ":"))

                .collect(Collectors.joining(" "));

        }

    }

    ```'
