    ## SelectItem 标签


    为 UISelectOne 和 UISelectMany 组件提供可用项有多种方式。如上一节所示，你可以使用嵌套在选择组件中的 `<f:selectItems>`
    和 `<f:selectItem>` 标签来实现。你可以使用 `<f:selectItem>` 标签在视图端完全定义可用项。以下是一个使用 `<h:selectOneMenu>`
    的示例，但你可以以相同的方式在任何其他 UISelectOne 和 UISelectMany 组件中使用它：


    ```

    <h:selectOneMenu id="selectedItem" value="#{bean.selectedItem}">

        <f:selectItem itemValue="#{null}" itemLabel="-- 请选择 --" />

        <f:selectItem itemValue="one" itemLabel="第一项" />

        <f:selectItem itemValue="two" itemLabel="第二项" />

        <f:selectItem itemValue="three" itemLabel="第三项" />

    </h:selectOneMenu>

    ```


    请注意，当选择组件的 value 属性关联的 bean 属性为 null 时，可以使用值为 `#{null}` 的选择项来呈现默认选择。如果你查阅过 `<f:selectItem>`
    的标签文档，你可能会注意到 `noSelectionOption` 属性，并认为它旨在表示“无选择选项”。实际上，这并不正确。正如你在许多论坛、问答网站和互联网上质量低劣的教程中所见，许多初学者确实这么认为。尽管属性名称具有误导性，但它并不表示“无选择选项”。更好的属性名称应该是
    `hideWhenOtherOptionIsSelected`（当其他选项被选中时隐藏），即便如此，它也只有当父选择组件显式设置了 `hideNoSelectionOption="true"`
    属性时才有效，如下所示：


    ```

    <h:selectOneMenu id="selectedItem" value="#{bean.selectedItem}"

        hideNoSelectionOption="true">

        <f:selectItem itemValue="#{null}" itemLabel="-- 请选择 --"

            noSelectionOption="true" />

        <f:selectItem itemValue="one" itemLabel="第一项" />

        <f:selectItem itemValue="two" itemLabel="第二项" />

        <f:selectItem itemValue="three" itemLabel="第三项" />

    </h:selectOneMenu>

    ```


    因此，`hideWhenOtherOptionIsSelectedAndHideNoSelectionOptionIsTrue`（当其他选项被选中且 hideNoSelectionOption
    为 true 时隐藏）最终会成为最不言自明的属性名称。不幸的是，在 JSF 1.2 中实现 `noSelectionOption` 时，这一点并未考虑周全。这个属性需要两个属性才能生效，本不应该是必要的。这对属性的主要目的是防止网站用户在组件已有非
    null 值时重新选择“无选择选项”——例如，通过在 `@PostConstruct` 方法中准备该值，或者在表单提交后使用非 null 值重新渲染组件。


    也就是说，`<f:selectItem>` 的 `itemValue` 属性表示在表单提交时将作为 bean 属性设置的值，以及在生成 HTML 输出时将从任何非
    null bean 属性中预选的值。`itemLabel` 属性表示将向网站用户显示的标签。当 `itemLabel` 属性缺失时，JSF 将默认使用 `itemValue`。请注意，标签绝不会提交回服务器。也就是说，在生成的
    HTML 输出中，`<option>` 标签不是 `<option>` 值的一部分。


    你可以使用 `<f:selectItems>` 标签来引用支持 bean 中的 `Collection`、`Map` 或可用项数组。你甚至可以将其与 `<f:selectItem>`
    标签混合使用。


    ```

    <h:selectOneMenu id="selectedItem" value="#{bean.selectedItem}">

        <f:selectItem itemValue="#{null}" itemLabel="-- 请选择 --" />

        <f:selectItems value="#{bean.availableItems}" />

    </h:selectOneMenu>

    ```

