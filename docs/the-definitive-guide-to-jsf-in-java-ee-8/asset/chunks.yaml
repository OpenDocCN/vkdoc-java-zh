  trans: '

    ## Java EE 安全概述与历史


    在 Java EE 中，安全并非由单一规范定义，而是分散在多个以不同方式相互集成的规范中。虽然这允许安全的不同方面以各自的速度演进，并且实际上甚至允许某些部分被非规范实现所替代，但这确实模糊了各规范各自负责的领域。


    在本入门章节中，我们将首先对各个组成部分及其如何协同工作提供一个较为广泛的概述。我们将重点关注安全的 Web 方面。安全也存在于诸如 EJB（企业 JavaBeans）和
    JCA（Java 连接器架构）连接器等组件中，但这些内容不在本书的讨论范围之内。


    从历史上看，Java EE 的安全主要基于 Servlet 规范引入的安全模型。也就是说，该模型的核心元素包括一个“认证机制”（FORM、BASIC 等）、一组在
    `web.xml` 中定义的安全约束（其中特定的 URL 模式与一组角色（包括空角色集合）相结合），以及几种以编程方式测试调用者详细信息的方法，例如 `HttpServletRequest.isUserInRole`。


    虽然有效，但在早期许多细节被遗漏了。Servlet 规范确实要求实现（Servlet 容器）在认证机制方面是可扩展的，但没有具体说明应该如何实现。同样，Servlet
    规范隐含地要求一个“身份存储”（文件、数据库、LDAP 等）来保存调用者的详细信息，如凭证、名称和角色，但将所有关于如何配置这些的细节留给了 Servlet
    容器。


    Servlet 规范没有定义任何以编程方式访问 `web.xml` 中定义的安全约束的方法，也没有定义以编程方式影响其执行的方法（例如，使某些约束基于时间）。此外，Servlet
    规范的早期版本并没有以最严格的方式指定约束解析，这导致了不同 Servlet 容器之间在解释上存在一些细微差异。


    第一个解决这些问题的附加规范是 JACC（JSR 115），简单来说，它处理的是授权问题。JACC 规定了 `web.xml` 中的安全约束应如何在代码中表示，即作为一组
    `Permission` 实例。JACC 还规定了代码如何访问（查询）这些实例，并最终允许自定义授权模块替换或增强容器用于确定其访问决策的逻辑。关于 JACC，一个可能有点难以理解的地方是，它本身并不是一个可以独立实现然后添加到
    Servlet 容器中的东西（就像我们可以对 JSF 做的那样），而是标准化并更精确地规定了所有 Servlet 容器内部已经在做的事情。


    第二个解决上述问题的附加规范是 JASPIC（JSR 196），它处理的是认证问题。JASPIC 规定了 Servlet 容器应在何时调用认证机制，并为这些认证机制定义了一个明确的接口类型，因此自定义认证机制可以使用此接口，而不是
    Servlet 容器专有的接口，从而使其可移植。JASPIC 对身份存储有一些规定，但太少，以至于在实践中无法真正使用。与 JACC 类似，JASPIC 也不是可以独立实现的东西，但它标准化了所有
    Servlet 容器已经在做的事情。


    JACC 和 JASPIC 都定义了低层级的 SPI（服务提供者接口），这些接口主要旨在由供应商实现和使用，以提供扩展产品。它们相当原始且相当抽象。因此，它们不是面向应用程序开发人员的（丰富的）API（应用程序编程接口）。这就是
    Java EE 安全 API（JSR 375）的用武之地。Java EE 安全提供了 JASPIC 认证模块的一个更高级、更易于注册（只需实现接口）且更易于使用（基于
    CDI）的版本。Java EE 安全 API 还完整定义了身份存储构件，但也许最重要的是，它提供了所有这些构件的多个具体实现，其中包括一个针对 JSF 使用优化的基于
    FORM 的认证机制，以及多个身份存储，例如 JDBC（Java 数据库连接）存储和 LDAP（轻量级目录访问协议）存储。


    Java EE 安全 API 的 RI（参考实现）称为 Soteria。该实现当然由 Java EE 8 的 RI GlassFish 及其衍生版 Payara
    提供。Soteria 与 Mojarra 和 MyFaces 一样，被设计为可以独立运行在基本上任何遵循 JASPIC 规范的 Servlet 容器上（正如本章引言中提到的，Tomcat
    和 Jetty 都遵循该规范）。其依赖项（在撰写本文时，针对 Soteria 1.0）是 CDI 1.2 和表达式语言 3.0。这两个依赖项由所有 Java
    EE 7 实现提供。Servlet 容器通常提供 EL（表达式语言）支持，而 CDI 可以单独添加，例如，使用 RI Weld。对于少数*可选*功能，Soteria
    利用了遵循 JACC 规范的 Servlet 容器。


    ## 保护对资源的访问


    在 JSF 中，需要保护的主要资源是通过 URL 模式访问的视图。因此，我们需要为这些 URL 模式定义安全约束。这些约束主要在 `web.xml` 中定义。事实上，从
    Java EE 8 开始，`web.xml` 几乎是唯一可行的为 JSF 视图定义安全约束的地方。


    Java EE 有三种安全约束：


    *   排除

    *   未检查

    *   按角色

