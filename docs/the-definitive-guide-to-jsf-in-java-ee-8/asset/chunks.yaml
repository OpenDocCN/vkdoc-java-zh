- fmt: "在 Ajax 请求的应用请求值阶段（第二阶段），对于 `<f:ajax>` 标签的 `execute` 属性所覆盖的每个组件，JSF 除了执行默认的解码过程外，还会检查\
    \ `javax.faces.source` 请求参数是否等于当前组件的客户端 ID。如果是，JSF 会将 `AjaxBehaviorEvent` 排入调用应用阶段（第五阶段）的队列。在\
    \ `AjaxBehaviorEvent` 入队的底层实现中，其逻辑归结如下：\n\n```\nFacesContext context = FacesContext.getCurrentInstance();\n\
    ExternalContext externalContext = context.getExternalContext();\nMap<String, String>\
    \ formData = externalContext.getRequestParameterMap();\n\nString clientId = component.getClientId(context);\n\
    String source = formData.get(\"javax.faces.source\");\nString event = formData.get(\"\
    javax.faces.behavior.event\");\n\nif (clientId.equals(source)) {\n    component.getClientBehaviors().get(event)\n\
    \        .forEach(behavior -> component.queueEvent(\n            new AjaxBehaviorEvent(context,\
    \ component, behavior)));\n}\n```\n\n在这里，`ClientBehavior` 基本上代表了 `<f:ajax>` 标签的定义。基于此逻辑，你可以得出结论：可以在同一个组件上附加多个\
    \ `<f:ajax>` 标签，即使是针对相同的事件类型。其优势在于，如有必要，你可以在完全相同的事件类型上注册多个 Ajax 行为监听器。\n\n```\n\
    <h:inputText id=\"foo\" ...>\n    <f:ajax listener=\"#{bean.onchangeFoo}\" />\n\
    \    <f:ajax listener=\"#{otherBean.onchangeFoo}\" />\n</h:inputText>\n```\n\n\
    这些 Ajax 行为监听器方法将在调用应用阶段（第五阶段）被调用；当然，前提是在处理验证阶段（第三阶段）没有发生转换或验证错误。对于命令组件，这些 Ajax\
    \ 行为监听器方法总是在动作监听器方法和动作方法之前被调用。无论目标组件是什么，Ajax 行为监听器方法必须是一个 `public void` 方法，并且可以选择性地接受\
    \ `AjaxBehaviorEvent` 参数。\n\n```\npublic void onchangeFoo(AjaxBehaviorEvent event)\
    \ {\n    // ...\n}\n```\n\n这为你在输入和选择组件中提供了机会，可以在特定的 Ajax 事件上执行某些业务任务。最常见的实际案例包括准备另一个\
    \ bean 属性，该属性随后会在另一个组件中渲染。可以想象一下级联下拉菜单，其中子下拉菜单的可用选项取决于父下拉菜单的选中项。在动作组件中，`<f:ajax\
    \ listener>` 并不是特别有用。你已经可以在动作监听器和/或动作方法中执行业务任务。即使附加了 `<f:ajax>`，你也可以继续使用它们。\n\n\
    在 Ajax 请求的渲染响应阶段（第六阶段），JSF 会为 `<f:ajax>` 标签的 `render` 属性所覆盖的每个组件生成一个 XML `<update>`\
    \ 元素，该元素仅包含该特定组件及其所有子组件（如果有）的 HTML 输出。标准 JSF JavaScript API 的 `jsf.ajax.response()`\
    \ 函数（由 `jsf.ajax.request()` 注册为 Ajax 回调函数）会提取 `<update>` 元素的 `id` 属性（代表目标组件的客户端\
    \ ID），并通过 JavaScript 的 `document.getElementById()` 获取具体的 HTML 元素，然后用 `<update>`\
    \ 元素的内容替换 HTML DOM 树中的该元素。\n\n以下是一个表单示例，其中包含一个带有消息的必填输入字段，以及一个显式指定消息组件为目标的命令按钮：\n\
    \n```\n<h:form id=\"form\">\n    <h:inputText id=\"text\" value=\"#{bean.text}\"\
    \ required=\"true\" />\n    <h:message id=\"m_text\" for=\"text\" />\n    <br\
    \ />\n    <h:commandButton id=\"submit\" value=\"Submit\" action=\"#{bean.submit}\"\
    >\n        <f:ajax execute=\"@form\" render=\"m_text\" />\n    </h:commandButton>\n\
    </h:form>\n```\n\n图 [4-2](#A454457_1_En_4_Chapter.xhtml#Fig2) 展示了在输入字段未填写的情况下提交表单后，Chrome\
    \ 如何呈现 Ajax 响应。这是一个很长的单行响应，因此稍微滚动了一下，以便从感兴趣的 `<update>` 元素开始查看。它包含了 `<h:message\
    \ id=\"m_text\">` 组件生成的 HTML 输出。\n\n![A454457_1_En_4_Fig2_HTML.jpg](OEBPS/Images/A454457_1_En_4_Fig2_HTML.jpg)\n\
    \n###### 图 4-2 Chrome 开发者工具——网络——响应\n\n如果在 XML 响应中继续向下滚动，你还会注意到一个 `<update id=\"\
    j_id1:javax.faces.ViewState:0\">` 元素，其中包含 `javax.faces.ViewState` 隐藏输入元素的值。这对于\
    \ JSF 在 Ajax 请求之间维护视图状态至关重要。当 `render` 属性恰好覆盖了一个 `UIForm` 组件时，当前 HTML 文档中的 `javax.faces.ViewState`\
    \ 隐藏输入元素基本上会在用 Ajax 响应的 `<update>` 元素内容替换 HTML DOM 树中的元素时被完全清除。\n\n缺失的 `javax.faces.ViewState`\
    \ 隐藏输入元素最终会被附加到当前 `UIViewRoot` 的每个 `<form method=\"post\">` 中。这种设计实际上出于两个原因：（1）因为视图状态值可能在\
    \ Ajax 请求之间发生变化，因此必须更新 HTML 文档中现有的表单以跟上这种变化，以防这些表单未被 `render` 属性覆盖；（2）因为当 JSF\
    \ 状态保存方法显式设置为 `\"client\"` 时，`javax.faces.ViewState` 隐藏输入字段的值可能会变得非常大，因此如果 `render`\
    \ 属性恰好覆盖了多个表单，否则会生成低效的 Ajax 响应。\n\n## Ajax 中的导航\n\n在具有正确定义的动作方法的 `UICommand` 组件中，情况并无不同。然而，有时你可能希望在附加到\
    \ `UIInput` 组件的 Ajax 监听器中执行导航。存在合理的实际用例。但是，`UIInput` 类不支持定义动作方法，并且 `<f:ajax listener>`\
    \ 不支持返回导航结果。因此，你唯一的选择是以编程方式执行导航。这可以通过两种方式实现。第一种方式是使用 `javax.faces.application.NavigationHandler`。[⁵](#A454457_1_En_4_Chapter.xhtml#Fn5)\n\
    \n```\npublic void ajaxListener(AjaxBehaviorEvent event) {\n    // ...\n\n   \
    \ String outcome = \"/otherview?faces-redirect=true\";\n    FacesContext context\
    \ = FacesContext.getCurrentInstance();\n    Application application = context.getApplication();\n\
    \    NavigationHandler handler = application.getNavigationHandler();\n    handler.handleNavigation(context,\
    \ null, outcome);\n}\n```\n\n第二种方式是使用 `javax.faces.context.ExternalContext#redirect()`。[⁶](#A454457_1_En_4_Chapter.xhtml#Fn6)\n\
    \n```\npublic void ajaxListener(AjaxBehaviorEvent event) throws IOException {\n\
    \    // ...\n\n    String path = \"/otherview.xhtml\";\n    FacesContext context\
    \ = FacesContext.getCurrentInstance();\n    ExternalContext externalContext =\
    \ context.getExternalContext();\n    String uri = externalContext.getRequestContextPath()\
    \ + path;\n    externalContext.redirect(uri);\n}\n```\n\n两者之间存在一些差异。最重要的是，`NavigationHandler`\
    \ 可以处理隐式导航结果值，但 `ExternalContext#redirect()` 只能处理实际路径，并且在涉及 Web 应用程序资源时需要手动添加请求上下文路径前缀。然而，它基本上可以处理任何\
    \ URI，例如外部 URL，如 `externalContext.redirect(\"http://example.com\")`，而 `NavigationHandler`\
    \ 无法处理它们。"
  raw: 'During the apply request values phase (second phase) of the Ajax request,
    JSF will, for each component covered by the execute attribute of the <f:ajax>
    tag in addition to the default decode process, also check if the javax.faces.source
    request parameter equals the current component’s client ID. If so, then JSF will
    queue the AjaxBehaviorEvent for the invoke application phase (fifth phase). Under
    the hood of queueing the AjaxBehaviorEvent, it boils down to the following logic:


    ```

    FacesContext context = FacesContext.getCurrentInstance();

    ExternalContext externalContext = context.getExternalContext();

    Map<String, String> formData = externalContext.getRequestParameterMap();


    String clientId = component.getClientId(context);

    String source = formData.get("javax.faces.source");

    String event = formData.get("javax.faces.behavior.event");


    if (clientId.equals(source)) {

        component.getClientBehaviors().get(event)

            .forEach(behavior -> component.queueEvent(

                new AjaxBehaviorEvent(context, component, behavior)));

    }

    ```


    Here, the ClientBehavior basically represents the definition of the <f:ajax> tag.
    Based on this logic, you will conclude that you can have multiple <f:ajax> tags
    attached in the very same component, even on same event types. The advantage is
    that you can, if necessary, register multiple Ajax behavior listeners on the very
    same event type.


    ```

    <h:inputText id="foo" ...>

        <f:ajax listener="#{bean.onchangeFoo}" />

        <f:ajax listener="#{otherBean.onchangeFoo}" />

    </h:inputText>

    ```


    Those Ajax behavior listener methods will thus be invoked during the invoke application
    phase (fifth phase); of course, only when there’s no conversion or validation
    error during the process validations phase (third phase). In case of command components,
    those Ajax behavior listener methods will always be invoked before the action
    listener methods and the action method. Regardless of the target component, the
    Ajax behavior listener method must be a public void method which can optionally
    take the AjaxBehaviorEvent argument.


    ```

    public void onchangeFoo(AjaxBehaviorEvent event) {

        // ...

    }

    ```


    This gives you, in input and select components, the opportunity to perform some
    business task on a specific Ajax event. Most occurring real-world examples involve
    preparing another bean property which in turn gets rendered in another component.
    Think of cascading drop-down menus wherein the available items of the child drop-down
    menu depend on the selected item of the parent drop-down. In action components,
    <f:ajax listener> isn’t terribly useful. You already have the possibility to perform
    the business task in action listener and/or action method. You can just continue
    using them even when having <f:ajax> attached.


    During the render response phase (sixth phase) of the Ajax request, JSF will for
    each component covered by the render attribute of the <f:ajax> tag generate a
    XML <update> element which contains the generated HTML output of only the particular
    component and all of its children, if any. The jsf.ajax.response() function of
    the standard JSF JavaScript API, which is by the jsf.ajax.request() registered
    as Ajax callback function, will extract the id attribute of the <update> element,
    which represents the client ID of the target component, and obtain via JavaScript’s
    document.getElementById() on the client ID the concrete HTML element and replace
    it in the HTML DOM tree with the contents of the <update> element.


    Following is an example of a form with one required input field having a message
    attached, and a command button which explicitly targets the message component
    :


    ```

    <h:form id="form">

        <h:inputText id="text" value="#{bean.text}" required="true" />

        <h:message id="m_text" for="text" />

        <br />

        <h:commandButton id="submit" value="Submit" action="#{bean.submit}">

            <f:ajax execute="@form" render="m_text" />

        </h:commandButton>

    </h:form>

    ```


    Figure [4-2](#A454457_1_En_4_Chapter.xhtml#Fig2) shows how Chrome presents the
    Ajax response after submitting the form with the input field not filled out. It’s
    a big one-liner, so it’s scrolled a bit so it starts at the <update> element of
    interest. It contains the generated HTML output of the <h:message id="m_text">
    component.


    ![A454457_1_En_4_Fig2_HTML.jpg](OEBPS/Images/A454457_1_En_4_Fig2_HTML.jpg)


    ###### Figure 4-2 Chrome Developer Tools—Network—Response


    If you scroll further in the XML response, then you’ll also notice an <update
    id="j_id1:javax.faces.ViewState:0"> element containing the value of the javax.faces.ViewState
    hidden input element . This is important for JSF in order to maintain the view
    state across Ajax requests. When the render attribute happens to cover a UIForm
    component, then the javax.faces.ViewState hidden input element currently in the
    HTML document will basically be completely wiped out during the replacement of
    the element in the HTML DOM tree with contents of the <update> element of the
    Ajax response.


    The missing javax.faces.ViewState hidden input element will eventually be appended
    to every <form method="post"> of the current UIViewRoot. This approach is actually
    by design for two reasons: (1) because the view state value could change across
    Ajax requests and therefore the existing forms currently in the HTML document
    have to be updated to catch up this change, just in case those forms are not covered
    by the render attribute; and (2) because the value of the javax.faces.ViewState
    hidden input field can get quite large when the JSF state saving method is explicitly
    set to “client” and thus otherwise render an inefficient Ajax response when the
    render attribute happens to cover multiple forms.


    ## Navigation in Ajax


    In UICommand components with a properly defined action method, it’s not different.
    However, sometimes you’d like to perform navigation in an Ajax listener attached
    to n UIInput component. There are reasonable real-world use cases for this. However,
    the UIInput class doesn’t support defining an action method and <f:ajax listener>
    doesn’t support returning a navigation outcome. Therefore, your only option is
    to perform the navigation programmatically. This can be done in two ways. The
    first way is to use the javax.faces.application.NavigationHandler.[⁵](#A454457_1_En_4_Chapter.xhtml#Fn5)


    ```

    public void ajaxListener(AjaxBehaviorEvent event) {

        // ...


        String outcome = "/otherview?faces-redirect=true";

        FacesContext context = FacesContext.getCurrentInstance();

        Application application = context.getApplication();

        NavigationHandler handler = application.getNavigationHandler();

        handler.handleNavigation(context, null, outcome);

    }

    ```


    The second way is to use the javax.faces.context.ExternalContext#redirect().[⁶](#A454457_1_En_4_Chapter.xhtml#Fn6)


    ```

    public void ajaxListener(AjaxBehaviorEvent event) throws IOException {

        // ...


        String path = "/otherview.xhtml";

        FacesContext context = FacesContext.getCurrentInstance();

        ExternalContext externalContext = context.getExternalContext();

        String uri = externalContext.getRequestContextPath() + path;

        externalContext.redirect(uri);

    }

    ```


    There are several differences. Most important, the NavigationHandler can deal
    with implicit navigation outcome values, but ExternalContext#redirect() can only
    deal with actual paths and requires manual prefixing of the request context path
    when it concerns a web application resource. However, it can take basically any
    URI, such as an external URL as in externalContext.redirect("http://example.com"),
    whereas the NavigationHandler can’t deal with them.'
