- fmt: "# Extension Types\n\nThere are a couple of different ways by which to use\
    \ the various extension points in JSF. A major distinction is between the “classical”\
    \ approach and the “CDI-centric approach.”\n\nIn the latter approach there’s very\
    \ little to nothing that JSF has to explicitly support extensibility, as CDI has\
    \ a number of mechanisms built in to support extending or replacing CDI artifacts.\
    \ This is the planned future for JSF (making most if not everything a CDI artifact),\
    \ but for the moment JSF 2.3 is in an early transitional phase and only a few\
    \ artifacts are vended via CDI. Table [8-1](#A454457_1_En_8_Chapter.xhtml#Tab1)\
    \ in Chapter [8](#A454457_1_En_8_Chapter.xhtml) showed these artifacts.\n\n# Extending\
    \ CDI Artifacts\n\nOne of the ways CDI augments or replaces a type fully is to\
    \ provide an alternative producer. We already saw this technique being used in\
    \ Chapter [13](#A454457_1_En_13_Chapter.xhtml), albeit for a slightly different\
    \ use case.\n\nThe easiest way is if you need to fully replace the type. If augmenting\
    \ is needed, some code is necessary to obtain the previous type, which with the\
    \ current version of CDI (2.0) is slightly verbose.\n\nThe following shows an\
    \ example where we replace the request parameter map with a new map that has all\
    \ the values of the original map, plus an additional value that we add ourselves:\n\
    \n```\n@Dependent @Alternative @Priority(APPLICATION)\npublic class RequestParameterMapProducer\
    \ {\n\n    @Produces @RequestScoped @RequestParameterMap\n    public Map<String,\
    \ String> producer(BeanManager beanManager) {\n        Map<String, String> previousMap\
    \ = getPreviousMap(beanManager);\n        Map<String, String> newMap = new HashMap<>(previousMap);\n\
    \        newMap.put(\"test\", \"myTestValue\");\n        return newMap;\n    }\n\
    }\n```\n\nThe `getPreviousMap()` method is, as mentioned, somewhat verbose. It’s\
    \ defined as follows:\n\n```\nprivate Map<String, String> getPreviousMap(BeanManager\
