- fmt: 'There was clearly a strong need for a new-JSF oriented view technology which
    should supplant JSP and solve all of its problems with the JSF life cycle. And
    then Facelets was introduced in 2006. It could be installed separately for JSF
    1.1 and 1.2, and it shipped built-in with JSF 2.0. It became the default view
    technology for JSF and JSP was deprecated as view technology for JSF. New tags
    introduced in JSF 2.0, such as `<f:ajax>`, `<h:head>`, `<h:body>`, `<h:outputScript>`,
    and `<h:outputStylesheet>`, are only available for Facelets and not for JSP. JSF
    2.0 also introduced a new interface to more easily plug a custom view declaration
    language (VDL) as alternative to JSP and even Facelets, the `ViewDeclarationLanguage`
    API. This way, one could create, for example, a pure Java-based VDL for JSF.[³](#A454457_1_En_7_Chapter.xhtml#Fn3)


    ## XHTML


    The Facelets VDL specifies that the views are defined in XML-based files which
    are compiled using a SAX parser and kept around in memory. This memory cache is,
    since JSF 2.1, configurable using a custom `FaceletCacheFactory`. When the JSF
    project stage is set to `Development`, the SAX-compiled representations of Facelets
    files are by default not cached. This allows easier development against an already
    running server by just editing the Facelets files from inside an IDE (integrated
    development environment) which supports hot-publishing the local changes to the
    target runtime.


    The Facelets files themselves usually use the `.xhtml` extension and therefore
    starters often call them “XHTML” instead of “Facelets.” This is okay when talking
    in the context of JSF, but the term “XHTML” has another side in the web development
    world. At its core, XHTML is a markup language for HTML pages which need to be
    compiled using an XML-based tool. In other words, developers basically create
    XML files with HTML markup mixed with web framework-specific XML tags, after which
    the web framework will parse them into an XML tree, generate some web framework-specific
    representation of the XML tree (which is in JSF the `UIViewRoot`), and ultimately
    generate the desired HTML output based on the framework’s internal representation
    of the XML tree.


    But around the time of Facelets’ introduction in 2006, XHTML was being overhyped
    by another group of web developers who were basically disappointed by seeing the
    W3 validator invalidate their HTML4 documents—generally because of the desire
    to explicitly close all tags for consistency, including those which should actually
    not be closed as per HTML4 specification, such as `<link>`, `<meta>`, `<br>`,
    and `<hr>`—and sometimes because of the desire to specify custom tag attributes
    in order to have some JavaScript plug-ins to interact more cleanly with the HTML
    document, which is also disallowed by the HTML4 specification.


    Even though basically every single web browser in the world leniently accepted
    that, including Jurassic IE6, those developers didn’t want to see their carefully
    crafted HTML4 documents being invalidated by the W3 validator and changed their
    HTML doctype declaration to use the XHTML DTD, an extension to HTML which requires
    every tag to be closed and allows custom attributes to be specified on existing
    tags. However, this is essentially abuse of XHTML as they didn’t at all actually
    use any XML tool to compile the document and generate the desired HTML output.
    It was merely to keep the W3 validator happy.


    Coincidentally, also around that time, HTML5 was just started in draft. Essentially,
    developers could just strip out any DTD from the HTML doctype declaration in order
    to get an HTML document which allows XML-based syntax wherein all tags are always
    closed and custom elements and attributes are allowed and, importantly, validated
    correctly in the W3 validator. In other words, `<!DOCTYPE html>` was been sufficient
    for those developers, even in IE6. Unfortunately, it took ages before HTML5 was
    officially finished, so developers kept abusing the XHTML doctype before they
    could switch back to the HTML doctype. When talking about Facelets to those group
    of developers, don’t call it “XHTML” but just “Facelets”; otherwise it will generate
    confusion.


    ## Template Compositions


    Facelets provides tags for easily creating template compositions based on a single
    master template file. This should reduce code duplication for site-wide sections
    which are repeated across all web pages, such as header, navigation menu, and
    footer. The master template file should represent a full-blown web page layout
    with all site-wide sections and use `<ui:insert>` tags to represent places where
    the page-specific sections can be inserted. Following is a basic example of such
    a master template file, `/WEB-INF/templates/layout.xhtml`:


    ```

    <!DOCTYPE html>

    <html lang="en"

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

    >

        <h:head>

            <title>#{title}</title>

        </h:head>

        <h:body>

            <header>

                <ui:include src="/WEB-INF/includes/layout/header.xhtml" />

            </header>

            <main>

                <ui:insert name="content" />

            </main>

            <footer>

                <ui:include src="/WEB-INF/includes/layout/footer.xhtml" />

            </footer>

        </h:body>

    </html>

    ```


    Note that the master template file and include files are explicitly placed in
    the `/WEB-INF` folder. This is done in order to prevent direct access by users
    who are guessing the path in URL. Also note that the page title is declared as
    a simple EL (Expression Language) expression `#{title}` instead of `<ui:insert>`.
    It is not allowed to have any markup in the `<title>` element.


    The `xmlns` attribute basically defines, via a URI (uniform resource identifier),
    which tags can be used in the declared XML namespace. The root XML namespace specifies
    the URI of the W3 XHTML standard [http://www.w3.org/1999/xhtml](http://www.w3.org/1999/xhtml)
    which thus defines “any XHTML and HTML5+ tag,” such as `<html>`, `<title>`, `<header>`,
    `<main>`, and `<footer>` in above example. The Facelets compiler is aware of this
    standard XML namespace and will pass through all elements as “general UI instructions.”
    The “h” XML namespace specifies the JSF HTML taglib URI and the “ui” XML namespace
    specifies the JSF Facelets taglib URI, which are both present in the JSF implementation
    JAR file and registered to Facelets during the web application’s startup. The
    Facelets compiler can this way find the associated tag handlers, components, and
    composite components, which in turn do the hard work of building the view, decoding
    the HTTP request, and encoding the HTTP response. Those URIs are thus not per
    definition live Internet addresses. You can even specify your own via a `*.taglib.xml`
    file. This will be expanded later in the section “Tag Files.”


    Following is what the include file `/WEB-INF/includes/layout/header.xhtml` looks
    like:


    ```

    <ui:composition

        xmlns:="http://www.w3.org/1999/xhtml"

        xmlns:h="http://xmlns.jcp.org/jsf/html"

        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

    >

        <a href="#{request.contextPath}/">

            <h:graphicImage name="images/layout/logo.svg" />

        </a>

        <nav>

            <ul>

                <li><h:link outcome="/about" value="About" /></li>

                <li><h:link outcome="/help" value="Help" /></li>

                <li><h:link outcome="/contact" value="Contact" /></li>

            </ul>

        </nav>

    </ui:composition>

    ```


    Note the link around the logo. It points to `#{request.contextPath}/`. This basically
    prints the domain-relative URL to the application’s root. `#{request}` is an implicit
    EL object referring the current `HttpServletRequest` instance. `contextPath` refers
    to one of its properties, implied by the `getContextPath()` method.


    Following is what the include file `/WEB-INF/includes/layout/footer.xhtml` looks
