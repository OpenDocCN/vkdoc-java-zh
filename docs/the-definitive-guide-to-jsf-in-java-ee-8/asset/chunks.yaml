    The request processing life cycle is the same as for text-based input components,
    except for the apply request values phase (second phase). Instead of extracting
    the submitted file as a request parameter in the UIInput#decode() method, the
    submitted file is being extracted as a request part in the renderer associated
    with the file input component. The default implementation basically looks as follows:


    ```

    FacesContext context = FacesContext.getCurrentInstance();

